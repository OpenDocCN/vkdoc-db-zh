- fmt: 'Let''s assume that after some careful thought it is agreed that only the total
    delivery time is required. We can now restate the main objectives of the project:


    *To record orders for meals so that summaries of the number, value, and overall
    time taken to process orders can be retrieved for different time periods.*


    ## What Data are Required to Satisfy the Objective?


    We can now revisit each of the tasks in [Table 3-1](#9781430242093_Ch03.xhtml#table-1)
    with the more clearly stated objective in mind. After further consultation with
    the client, we can produce some more precise descriptions of the tasks, such as
    the ones below.


    ### Take order

    If we are to provide statistics by month or week, we will need to record a date.
    The client has confirmed that there is a price list of different meals, and it
    would be useful for the receptionist to be able to make selections from this list.
    We will therefore need an additional task: to enter and maintain information about
    meals and their prices. The client confirms that the cost of the order is just
    the total cost of all the meals.


    ### Dispatch driver

    We need to know how a driver is chosen and determine what we need to record. Let''s
    assume we discover that the drivers are assigned to be on duty for various time
    units. Obviously, being able to maintain and print out duty rosters would be useful.
    However, automating rosters doesn''t directly contribute to our main objective.
    It is agreed to leave the rosters outside the scope of the system for now. The
    receptionist will use information available independently of the database (probably
    a list of names pinned to a notice board) to determine who should be assigned
    to deliver an order.


    Even though the receptionist will assign the driver manually, we still need to
    consider what the system will need to record. How important is the accuracy of
    the driver information? If we want to keep data about what particular drivers
    do (for example to calculate pay or analyze performance) then keeping accurate
    information is important. If, for this system, it is only necessary to be able
    to contact the driver to place the order and check its progress, then a contact
    phone number on the order will be sufficient. This needs to be clarified with
    the client with a question such as, "Is it important for you to know how many
    orders were delivered by different drivers?" Let''s say for now that this is not
    required in the initial stages.


    Where does the driver go to pick up the pizzas? Is it part of the system to suggest
    or record the outlet? Once again, if the purpose of the statistics is to streamline
    the business, knowing where each driver traveled and how long they had to wait
    at various outlets would be essential. Given that we have determined that this
    is not the main objective, we decide not to maintain information about outlets
    for now.


    ### Pick up meals

    We agreed with the client that only the overall time from initial contact to final
    delivery of an order is required. This means we do not need to record the times
    at every stage of the process. Even if we don''t record the pickup times, might
    it still be useful to know that a meal has been picked up and is on its way to
    the customer? Certainly this will be useful information when there is a delay
    or a problem. However, to satisfy our main objective, it is not necessary for
    the system to record information about the status of a delivery. If there is a
    problem, the receptionist has a contact number for the driver and can call him
    and find out the stage of the order. So in the first instance, we need to record
    nothing about picking up meals.


    ### Deliver meals

    If we want to have statistics on overall delivery times, we clearly need to record
    the time that each meal is delivered. We don''t need to be concerned at this stage
    how that information gets into the database. The driver may call the depot or
    write the time on a time sheet for entering later. At this stage, we are only
    concerned that the system is capable of storing the delivery time for each order.
    When the order is delivered, the receptionist also needs to know that the driver
    is free to take another order. We decided in the section about dispatching drivers
    that for now these decisions would be independent of the database. The receptionist
    would probably just make a manual note that the driver was able to take a new
    order.


    ### Enter time sheets

    We already have the driver''s name, information about the order, and delivery
    times recorded. Is there anything else we need to record at this step? Let''s
    say that a look at the current manual time sheets confirms that we already have
    all the information we need.


    We have gone to a lot of trouble to ask questions to clarify the scope of the
    problem and the data necessary to support that. The decisions to which we have
    come are hypothetical. They are not right or wrong. Even for a real problem there
    will not be right or wrong answers; we can only ever hope for a good pragmatic
    solution. If the database is designed sensibly, being able to add additional information
    or increase the scope should be reasonably straightforward at a later stage. It
    may take considerable time to come to some decision about the size and scope of
    the system, so having arrived at some agreement, it is important to clearly express
    what the new scope is. [Example 3-2](#9781430242093_Ch03.xhtml#ex3-2) restates
    the problem in light of our rethink.


    ### [EXAMPLE 3-2](#9781430242093_Ch03.xhtml#exc2). RESTATEMENT OF MEAL DELIVERY
    PROBLEM


    The system will record and provide information about meals and their current prices.
    It will maintain data about orders including the date, the meals requested, and
    contact information for the customer and the driver assigned to the delivery.
    It will also maintain the time the order was placed and the time it was finally
    delivered. Given this, the system will be able to provide summary information
    about the number and value of orders within particular time periods and also summaries
    of the time taken for total processing of orders. The system will not maintain
    any additional information about drivers nor about which drivers were associated
    with a particular order. The system will not maintain any information about outlets
    nor which were used for any particular order.


    ## What are the Input Use Cases?


    Recall that use cases are simply textual descriptions of the ways users interact
    with the system. There are many different levels of use case from very high-level
    descriptions of objectives to very low–level tasks. The most useful level for
    our purposes of trying to understand and describe a database system is the user
    task level. In his book *Writing Effective Use Cases*,[²](#9781430242093_Ch03.xhtml#fn2)
    Alistair Cockburn describes this as something small enough ”that a user could
    do in less than about twenty minutes and then go off and have a coffee.” He also
    says it should be a job “significant enough so that if a user did several of the
    tasks in a day he could use it as evidence for a raise.” So something like “manage
    the orders for the business” would be too broad for a task and “look up driver’s
    phone number” would probably be too insignificant.


    Now that we have a clearer idea of the objectives and the scope of the system,
    we can return to our list of jobs that involve data entry (which appears earlier
    in [Table 3-1](#9781430242093_Ch03.xhtml#table-1)) and decide what interaction
    with the system needs to take place at each point. The interactions are shown
    in [Table 3-2](#9781430242093_Ch03.xhtml#table-2).'
