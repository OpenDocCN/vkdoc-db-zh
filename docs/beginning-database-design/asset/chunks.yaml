    \ 9-9](#9781430242093_Ch09.xhtml#F9]）？在[图 9-10](#9781430242093_Ch09.xhtml#F10]中，我们有一个内置在表设计中的约束。如果以后添加了额外的会员类型，则必须更改约束的定义。这需要由系统管理员或至少是受信任可以更改设计的人员来完成。从积极的方面看，我们的数据库中少了一个表。"
  raw: 'Paddock(farmID, paddock_num, area) with farmID being a foreign key referring
    to Paddock


    Visit(visitID, date, farm, paddock) with (farm, paddock) being a foreign key referring
    to Paddock


    Sample(visit, sample_num, count) with visit *being a foreign key referring toVisit*


    *The paddocks are numbered within farms, the visits are numbered chronologically,
    and the samples are numbered within a visit. All our introduced ID numbers therefore
    have some meaning, and the sample table is considerably smaller than in the previous
    design. In summary, choosing a primary key may not be straightforward. There are
    times when an automatically generated ID number will be necessary but won ’t solve
    all our problems. We might like to consider a primary key that is a concatenation
    of ID numbers (e.g., numbering paddocks within farms or samples within visits).
    There will always be a trade–off between concatenated ID numbers that might be
    more meaningful and having potentially cumbersome foreign keys in other related
    tables. There are always going to be alternative ways to choose a primary key,
    and as with most design issues, there is no hard–and–fast set of rules to say
    which choice is best.


    Unique Constraints


    Let ’s take another look at our Visit table, shown in [Figure 9-4](#9781430242093_Ch09.xhtml#F4).
    We have two candidate keys: visitID and the combination (date, farm, paddock).
    For the reasons discussed in the previous section, we choose visitID as the primary
    key. Do we lose anything by making this choice?


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-04_fmt.jpeg)


    [**Figure 9-4.**](#9781430242093_Ch09.xhtml#FG4) Visit table with a generated
    visitID


    If the (date, farm, paddock) combination is not a primary key, we have lost the
    constraint that each row must have unique values for this combination of fields.
    This means we could mistakenly insert two rows for a visit to paddock 3, farm
    17, on 1/04/2011\. We still want to maintain the uniqueness of this combination,
    and we can do this by setting up a unique constraint.


    [Listing 9-1](#9781430242093_Ch09.xhtml#L1) shows the SQL to create the Visit
    table with a unique constraint to ensure that the combination (date, farm, paddock)
    is not duplicated in the table.


    ***[Listing 9-1.](#9781430242093_Ch09.xhtml#Lis1)** SQL to Create the Visit Table
    with a Unique Constraint*


    CREATE TABLE Visit (


    visitID INT PRIMARY KEY,


    date DATE,


    farm INT,


    paddock INT ,


    FOREIGN KEY (farm, paddock) REFERENCES Paddock


    UNIQUE (date, farm, paddock) )


    Unique constraints are also a way to enforce a 1–1 relationship between tables.
    Consider the class diagram for sports teams in [Figure 9-5](#9781430242093_Ch09.xhtml#F5),
    where each team has a member as its captain.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-05_fmt.jpeg)


    [**Figure 9-5.**](#9781430242093_Ch09.xhtml#FG5) A 1–1 relationship between Team
    and Member


    When we set up the classes in [Figure 9-5](#9781430242093_Ch09.xhtml#F5) in a
    relational database, the 1–1 relationship will be represented by a foreign key
    in the Team table as shown in [Figure 9-6](#9781430242093_Ch09.xhtml#F6).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-06_fmt.jpeg)


    [**Figure 9-6.**](#9781430242093_Ch09.xhtml#FG6) Team table


    Each team can have only one captain (because we only have one captain field);
    however, we have yet to discuss a way of ensuring that each member can captain
    only one team as required by the 1–1 relationship. In [Figure 9-6](#9781430242093_Ch09.xhtml#F6),
    note that member 203 is the captain of more than one team. We can prevent this
    from happening by adding a unique constraint on the captain field in the Team
    table. This will prevent a value being entered into the captain field in more
    than one row. The SQL to create the Team table with a unique constraint on the
    captain field is shown in [Listing 9-2](#9781430242093_Ch09.xhtml#L2).


    ***[Listing 9-2](#9781430242093_Ch09.xhtml#Lis2).** Ensuring a 1–1 Captain Relationship
    Between Member and Team*


    CREATE TABLE Team (


    team_name VARCHAR(20) PRIMARY KEY,


    captain INT UNIQUE FOREIGN KEY REFERENCES Member)


    Unique constraints are able to help us with a couple of design issues: enforcing
    a 1–1 relationship and maintaining uniqueness for a candidate key that has not
    been chosen as a primary key.


    Using Constraints Instead of Category Classes


    Much of our discussion about classes and their corresponding tables in a relational
    database has involved introducing new classes and tables in order to keep data
    accurate and consistent. Now we are going to have a look at when you might decide
    not to add additional classes and why. Let ’s think about members of a club and
    their membership type (e.g., Senior, Junior, or Social). If we include membership
    type as a field in the Member table, we can have problems with consistency as
    can be shown by the misspelling in the first row of the table in [Figure 9-7](#9781430242093_Ch09.xhtml#F7).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-07_fmt.jpeg)


    [**Figure 9-7.**](#9781430242093_Ch09.xhtml#FG7) Keeping membership type as a
    field in the Member table


    If we are interested in creating reports that group all the members of different
    types (e.g., all the Seniors, and all the Juniors, etc.), we are going to run
    into trouble with the table in [Figure 9-7](#9781430242093_Ch09.xhtml#F7) where
    we have different spellings of the types. Our solution in previous chapters was
    to create an additional class (table) to keep the different membership types and
    set up a 1–Many relationship as shown in [Figure 9-8](#9781430242093_Ch09.xhtml#F8).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-08_fmt.jpeg)


    [**Figure 9-8.**](#9781430242093_Ch09.xhtml#FG8) Representing membership type
    with a class


    We can now have objects of the Type class or rows in a Type table to represent
    each of our types: Junior, Senior, and so on. This ensures that we have consistency
    in naming the different types. Take a look at the tables in [Figure 9-9](#9781430242093_Ch09.xhtml#F9).
    The Type table seems a bit superfluous.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-09_fmt.png)


    [**Figure 9-9.**](#9781430242093_Ch09.xhtml#FG9) Membership type is a separate
    table


    All the additional Type table is achieving is to ensure the consistency of the
    entries in the type field of the Member table. We can achieve the same thing by
    putting a check constraint on the type field. We discussed constraints on fields
    in [Chapter 7](#9781430242093_Ch07.xhtml). [Figure 9-10](#9781430242093_Ch09.xhtml#F10)
    shows how easily this can be done in a product like Access, and [Listing 9-3](#9781430242093_Ch09.xhtml#L3)
    shows the equivalent SQL.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-10_fmt.jpeg)


    [**Figure 9-10.**](#9781430242093_Ch09.xhtml#FG10) Membership type with a constraint


    ***[Listing 9-3](#9781430242093_Ch09.xhtml#Lis3).** Placing a Constraint on a
    Field*


    CREATE TABLE Member (


    memberID INT PRIMARY KEY,


    last_name VARCHAR(20),


    first_name VARCHAR(20),


    type VARCHAR(20) CHECK type IN (‘Senior ’, ‘Junior ’, ‘Social ’))


    Which should we prefer: a table with a constraint on a field ([Figure 9-10](#9781430242093_Ch09.xhtml#F10))
    or one with a reference to another table ([Figure 9-9](#9781430242093_Ch09.xhtml#F9))?
    In [Figure 9-10](#9781430242093_Ch09.xhtml#F10), we have a constraint built into
    the design of the table. If additional membership types are added at a later date,
    the definition of the constraint would have to be changed. This is something that
    needs to be done by a system manager or at least someone trusted to alter the
    design. On the positive side, we have one fewer table in our database.'
