    \n## 7. 草拟第一个数据模型\n\n图 A-10 展示了一个数据模型。\n\n![9781430242093_APP01-10.tif](img/9781430242093_APP01-10_fmt.jpeg)\n\
    \n`图 A-10.` 记录学生缺勤的类图\n\n对于图 A-10 中的模型，以下陈述成立：\n\n*   每个学生只有一位班级教师，但可以有多次缺勤。\n\
    *   每位教师可能作为班级教师负责许多学生（但有些教师可能不是班级教师）。\n*   每次缺勤只针对一个学生。\n\n## 8. 根据收集的数据，头脑风暴可能的输出\n\
    \n我们拥有报告每个学生或所有学生缺勤次数所需的全部信息。我们还能检索到哪些进一步的信息？我们已决定不保留缺勤时长。那么缺勤原因呢？添加一些缺勤类别（如生病、学校旅行、体育比赛等）将是一个简单的补充。这可能值得与客户讨论。\n\
    \n草拟信息输出用例。\n\n图 A-11 展示了一些满足系统主要目标的输出用例。\n\n![9781430242093_APP01-11.eps](img/9781430242093_APP01-11_fmt.png)\n\
    \n`图 A-11.` 报告信息的用例\n\n以下是图 A-11 中所示用例的简要描述。\n\n4.  体育教师完整列表：查找今天日期的所有缺勤记录。打印出相关学生的姓名。\n\
    \    班级教师列表：查找今天日期的所有缺勤记录。打印出学生姓名和教师姓名，并按教师分组。\n5.  提交给教育部门：查找相关时间段内日期的所有缺勤记录并进行计数。\n\
    \    用于学校报告：对于每个学生，统计相关时间段内日期的所有缺勤次数。\n\n# 练习\n\n## 练习 4-1\n\n图 A-12 展示了一个初步草图，用于对一家出版公司希望保存作者和书籍信息的场景进行建模。考虑关系`writes`两端的可能可选性，并据此确定书籍和作者的一些可能定义。\n\
    \n![9781430242093_APP01-12.tif](img/9781430242093_APP01-12_fmt.jpeg)\n\n`图 A-12.`\
    \ 考虑作者写书关系的可能可选性\n\n起初我们可能认为，一个作者总会至少有一本他写的书，一本书也总会至少有一个作者（即使我们可能不知道是谁）。这对于*实际的*书籍和作者来说可能是正确的，但这里我们关心的是关于书籍和作者的*信息*。一家出版公司可能会经常看到某个主题的出书机会，并在寻找作者时记录该信息。同样，出版商可能会保留一个潜在的作者并存储其信息，即使该人尚未为该出版商写过书。\n\
    \n可能的定义可能包括：*书籍是已写成或计划写成的作品；作者是已经或可能在将来写书的人*。\n\n## 练习 4-2\n\n图 A-13 展示了一个鸡尾酒配方的可能数据模型。缺少了什么？\n\
    \n![9781430242093_APP01-13.tif](img/9781430242093_APP01-13_fmt.jpeg)\n\n`图 A-13.`\
    \ 鸡尾酒及其成分；缺少了什么？\n\n每种鸡尾酒可能有多种成分（曼哈顿：味美思，威士忌；玛格丽特：龙舌兰，橙味酒，酸橙）。缺少的是用量。正如多对多关系中常见的情况，需要一个中间类。用量取决于鸡尾酒和成分的特定配对。图\
    \ A-14 展示了一个更好的模型，并附带了一些可能的数据。包含`Recipe`类允许我们保存诸如制作“大吉利”需要多少朗姆酒，而制作“缆车”又需要多少等信息。\n\
    \n![9781430242093_APP01-14.eps](img/9781430242093_APP01-14_fmt.png)\n\n`图 A-14.`\
    \ 一个中间类`Recipe`可以记录每种鸡尾酒和成分配对的用量。\n\n## 练习 4-3\n\n图 A-15 展示了关于旅馆客人的部分数据模型。如何修改该模型以保存关于房间占用情况的历史信息？\n\
    \n![9781430242093_APP01-15.tif](img/9781430242093_APP01-15_fmt.jpeg)\n\n`图 A-15.`\
    \ 如何修改此模型以保存关于房间占用的历史信息？\n\n该数据模型表明，对于单人间的旅馆，一个房间可能空置或最多有一位住客。每位当前的客人占用一个房间。然而，随着时间的推移，一个房间将会有许多不同的客人，客人也可能返回并入住不同的房间。这需要被建模为一个多对多关系，如图\
    \ A-16 所示。（顺便说一句，从客人与房间关联的可选性为`1`，你可以推断出，我们对客人的定义是在某个阶段被分配了房间的人——而不仅仅是任何可能或不可能来旅馆的人。）\n\
    \n![9781430242093_APP01-16.tif](img/9781430242093_APP01-16_fmt.jpeg)\n\n`图 A-16.`\
    \ 用多对多关系建模客人与房间\n\n现在我们有了一个多对多关系，我们需要问：有什么缺失吗？显然缺失的是关于特定客人在何时占用特定房间的信息。这需要一个中间类，如图\
    \ A-17 所示。\n\n![9781430242093_APP01-17.tif](img/9781430242093_APP01-17_fmt.jpeg)\n\
    \n`图 A-17.` 包含一个`Booking`类以保存客人占用房间的日期信息\n"
- fmt: '# 预订模型的问题与业务规则


    每位客人可以随时间拥有多个预订，一个房间也可以被多次预订。每次预订对应一位客人和一个特定房间。这里需要提醒注意——我们最初的数据模型（[Figure A-16](#9781430242093_APP.xhtml#F16)）表明一个房间只能容纳一位客人。既然我们现在允许一个房间随时间容纳多位客人，我们就丢失了这样一个信息：在任何特定时间点，一个房间只能有一位客人入住。我们在[Figure
    A-17](#9781430242093_APP.xhtml#F17)中的模型无法防止多人同时预订同一个房间。这类问题从来不简单！记录关于同时预订的业务规则的一种方法，是在用于为房间添加预订的用例中进行描述。它可能会这样写：*不能为已有预订日期重叠的房间添加新的预订*。数据模型为我们提供了大量的洞见，但它本身并不能完整地描述问题。


    ## 练习 5-1


    [Figure A-18](#9781430242093_APP.xhtml#F18)中的类记录了关于一个部门的信息。对于部门的经理和位置信息进行建模，还有哪些其他选择？


    ![9781430242093_APP01-18.tif](images/9781430242093_APP01-18_fmt.jpeg)


    [Figure A-18.](#9781430242093_APP.xhtml#FG18) 部门信息建模的初步尝试


    首先考虑位置。我们想用这些信息做什么？能够找到所有位于同一地点的部门可能很有用——例如，可以通知他们CEO要来访。如果我们想根据属性的值来检索对象，就必须确保该值在每个对象中存储一致。创建一个新类有助于解决这个问题。如果引入一个`Location`类，我们就可以存储每个位置的信息，并在部门和位置之间建立关系。引入`Location`类还允许我们保留关于位置的额外信息：地址、电话等等。


    我们不太可能经常需要根据经理的姓名来检索部门对象，因为在大多数情况下，经理只与一个部门相关联。然而，关于一位经理，我们需要了解大量的额外信息。如何联系他至少是一个起点。我们已经有这些信息了吗？公司肯定存储了其所有员工的信息，所以在这里我们应该将经理建模为指向现有`Employee`类的关系。


    [Figure A-19](#9781430242093_APP.xhtml#F19)展示了一个更好的模型。如果你感兴趣，可以尝试基于这个新模型来考虑历任经理。


    ![9781430242093_APP01-19.tif](images/9781430242093_APP01-19_fmt.jpeg)


    [Figure A-19.](#9781430242093_APP.xhtml#FG19) 更灵活的部门信息模型


    ## 练习 5-2


    一所大学想要为课程教学的信息建模。可能有多名教职员工参与一门课程的教学，其中一名教职员工被指定为课程主管。请提出一个初步的数据模型。


    我们为这种情况有两个显而易见的类：`Course`（课程）和`StaffMember`（教职员工）。这两个类之间有两种不同的关系：`teaches`（教）和`supervises`（监督）。[Figure
    A-20](#9781430242093_APP.xhtml#F20)展示了一个可能的模型。从右向左阅读：每门课程有一位或多位教师，每门课程只有一位主管。从左向右阅读：教职员工可能教授和/或监督任意数量的课程。在这个模型中，我们没有考虑任何历史信息；也没有考虑其他可能的约束，例如，主管是否必须是教师之一？


    ![9781430242093_APP01-20.tif](images/9781430242093_APP01-20_fmt.jpeg)


    [Figure A-20.](#9781430242093_APP.xhtml#FG20) 使用两种关系对课程教学和监督进行建模


    ## 练习 5-3


    你会如何为婚姻信息建模？考虑所有可能产生的情况（为简单起见，暂时不必担心参与者的性别）。


    我们需要保存关于人的信息——至少是他们的名字。一个人与另一个人结婚，因此需要一个自反关系，如[Figure A-21](#9781430242093_APP.xhtml#F21)所示。


    ![9781430242093_APP01-21.tif](images/9781430242093_APP01-21_fmt.jpeg)


    [Figure A-21.](#9781430242093_APP.xhtml#FG21) 使用自反关系对婚姻建模


    可选性很容易理解——人们不必与他人结婚。基数（Cardinalities）呢？通常是一次只有一段婚姻（但不总是如此）。然而，从历史上看，一个人可能有多次婚姻。这就需要一个多对多（Many–Many）关系。当我们有一个多对多关系时，谨慎的做法总是要问：“关于特定的一对对象，哪些附加信息可能有用？”在这种情况下，婚姻的日期会很有用。这些信息可以保存在一个中间类`Marriage`中。我们还可以保存关于婚姻结束原因（离婚、分居、配偶去世等）的详细信息。一个`EndType`类将有助于准确维护这些类别，[Figure
    A-22](#9781430242093_APP.xhtml#F22)中的数据模型就能捕获大量这类细节。每段婚姻恰好涉及两个人（`Marriage`和`Person`之间的两条线），而每个人可以涉及任意多次婚姻。一些婚姻已经结束，因此有一个与之关联的可选类别。


    ![9781430242093_APP01-22.tif](images/9781430242093_APP01-22_fmt.jpeg)


    [Figure A-22.](#9781430242093_APP.xhtml#FG22) 包含附加类以捕获婚姻信息


    ## 练习 5-4


    一个管弦乐队保存关于其音乐家、曲目和音乐会的信息。一个部分数据模型如[Figure A-23](#9781430242093_APP.xhtml#F23)所示。


    从这个初始模型中可能推导出哪些错误信息？


    修改模型，使其能正确维护以下信息：

    *   特定音乐会中哪些演奏者参与了特定的作品

    *   音乐会上将呈现哪些作品

    *   演奏者在特定音乐会中出场获得的酬金


    ![9781430242093_APP01-23.tif](images/9781430242093_APP01-23_fmt.jpeg)


    [Figure A-23.](#9781430242093_APP.xhtml#FG23) 管弦乐队音乐会信息的部分模型


    这个模型存在一个扇形陷阱（fan trap）：两个关系的外端都具有多（Many）基数。例如，如果我们知道Joe Smith被要求参加周六的音乐会，并且贝多芬的小提琴奏鸣曲将在周六的音乐会上演出，我们可能会错误地推断Joe会演奏这首小提琴奏鸣曲。


    如果我们想知道在特定音乐会上，哪些演奏者参与了哪些特定的作品，我们需要一个同时涉及`Player`（演奏者）、`Concert`（音乐会）和`Work`（作品）这三个类的三元关系。[Figure
    A-24](#9781430242093_APP.xhtml#F24)通过一个新的`Appearance`（出场）类来表示这种三元关系。


    ![9781430242093_APP01-24.tif](images/9781430242093_APP01-24_fmt.jpeg)


    [Figure A-24.](#9781430242093_APP.xhtml#FG24) 通过附加类表示的三元关系


    `Appearance`类的每个对象都与一位演奏者、一部作品和一场音乐会相关联。它允许我们保存如[Figure A-25](#9781430242093_APP.xhtml#F25)中表格所示的数据。我们可以看到Joe在周六演奏了奏鸣曲和交响曲，而Linda只演奏了奏鸣曲。


    ![9781430242093_APP01-25.tif](images/9781430242093_APP01-25_fmt.jpeg)


    [Figure A-25.](#9781430242093_APP.xhtml#FG25) 由`Appearance`类表示的示例数据'
  raw: 'Each guest can have several bookings over time, as can a room. Each booking
    is for one guest in a particular room. A word of caution here though—our original
    data model ([Figure A-16](#9781430242093_APP.xhtml#F16)) indicated that a room
    could only have a single guest. Now that we have allowed many guests in a room
    over time, we have lost the information that at any one time a room can have only
    one guest. Our model in [Figure A-17](#9781430242093_APP.xhtml#F17) would not
    prevent several people all having a simultaneous booking for one room. These sorts
    of problems are never simple! One way to record a business rule about simultaneous
    bookings would be to describe it in the use case for adding a booking for a room.
    It could say something such as: *no booking can be added to a room where an existing
    booking has overlapping dates*. A data model gives us a huge amount of insight,
    but on its own it is not a complete description of a problem.


    Exercise 5-1


    The class in [Figure A-18](#9781430242093_APP.xhtml#F18) records information about
    a department. What other options are there for modeling information about the
    manager and location of a department?


    ![9781430242093_APP01-18.tif](images/9781430242093_APP01-18_fmt.jpeg)


    [**Figure A-18.**](#9781430242093_APP.xhtml#FG18) Initial attempt at modeling
    the information about a department


    Let’s first think about location. What might we want to do with this information?
    It may be useful to be able to find all the departments that are in the same location—to
    let them know the CEO is visiting, say. If we want to retrieve an object based
    on the value of an attribute, then we must ensure that the value is stored consistently
    in each object. Creating a new class can help with that. If we introduce a Location
    class, then we can store information about each location and set up a relationship
    between departments and location. Introducing a Location class also allows us
    to keep additional information about the location: address, phone, and so on.


    It is unlikely that we will regularly want to retrieve department objects based
    on the manager’s name, as for the most part managers will only be attached to
    a single department. However, there is a great deal of additional information
    we need to know about a manager. How to contact him would be a start. Do we already
    have this information? The company will surely have information stored about all
    its employees, so here we should model manager as a relationship to an existing
    Employee class.


    A better model is shown in [Figure A-19](#9781430242093_APP.xhtml#F19). If you
    are keen, try developing this new model to account for previous managers.


    ![9781430242093_APP01-19.tif](images/9781430242093_APP01-19_fmt.jpeg)


    [**Figure A-19.**](#9781430242093_APP.xhtml#FG19) *More flexible model for department
    information*


    Exercise 5-2


    A university wants to model information about the teaching of courses. A number
    of staff members may contribute to teaching a course and one staff member is denoted
    as the course supervisor. Suggest an initial data model.


    We have two obvious classes for this situation: Course and StaffMember. There
    are two different relationships between the classes: teaches and supervises. A
    possible model is shown in [Figure A-20](#9781430242093_APP.xhtml#F20). Reading
    from right to left, each course has one or more teachers and each course has a
    single supervisor. From left to right, staff members might teach and/or supervise
    any number of courses. In this model we haven’t considered any historical information;
    nor have we considered other possible constraints, such as, does the supervisor
    need to be one of the teachers?


    ![9781430242093_APP01-20.tif](images/9781430242093_APP01-20_fmt.jpeg)


    [**Figure A-20.**](#9781430242093_APP.xhtml#FG20) *Modeling the teaching and supervision
    of courses with two relationships*


    Exercise 5-3


    How would you model the information about marriages? Think about all the different
    situations that could eventuate (for simplicity, do not worry at this stage about
    the gender of the participants).


    We need to keep information about people—their names, at least. One person marries
    another person, so a self relationship is required as in [Figure A-21](#9781430242093_APP.xhtml#F21).


    ![9781430242093_APP01-21.tif](images/9781430242093_APP01-21_fmt.jpeg)


    [**Figure A-21.**](#9781430242093_APP.xhtml#FG21) *Modeling marriage with a self
    relationship*


    Optionalities are easy—people are not required to be married to someone else.
    What about the cardinalities? Generally it is one marriage at a time (but not
    always). However, historically a person may have many marriages. This would require
    a Many–Many relationship. When we have a Many–Many relationship it is always prudent
    to ask, “What additional information could be useful about a particular pair of
    objects?” In this case the dates of the marriage would be useful. These can be
    kept in an intermediate class, Marriage. We could also keep details on the cause
    of the end of the marriage (divorce, separation, death of spouse, etc.). A class,
    EndType, to maintain these categories accurately would be useful, and something
    like the data model in [Figure A-22](#9781430242093_APP.xhtml#F22) would capture
    much of this detail. Each marriage involves exactly two people (the two lines
    between Marriage and Person) and each person can be involved in any number of
    marriages. Some marriages have ended and so have an optional category associated
    with them.


    ![9781430242093_APP01-22.tif](images/9781430242093_APP01-22_fmt.jpeg)


    [**Figure A-22.**](#9781430242093_APP.xhtml#FG22) *Including additional classes
    to capture marriage information*


    Exercise 5-4


    An orchestra keeps information about its musicians, repertoire, and concerts.
    A partial data model is shown in [Figure A-23](#9781430242093_APP.xhtml#F23).


    What false information could be deduced from this initial model?


    Amend the model so that it can maintain the following information correctly:


    *   Which players are involved in particular works in a concert

    *   The works being presented at a concert

    *   The fee a player receives for appearing in a particular concert


    ![9781430242093_APP01-23.tif](images/9781430242093_APP01-23_fmt.jpeg)


    [**Figure A-23.**](#9781430242093_APP.xhtml#FG23) *A partial model for an orchestra’s
    concert information*


    This model contains a fan trap: there are Many cardinalities at the outside ends
    of the two relationships. For example, if we have information that Joe Smith is
    required for Saturday’s concert and that Beethoven’s violin sonata is to be performed
    at Saturday’s concert, we could incorrectly make the deduction that Joe performs
    in the violin sonata.


    If we want to know which players are involved in particular works in a concert
    we need a ternary relationship that involves the three classes, Player, Concert,
    and Work, simultaneously. [Figure A-24](#9781430242093_APP.xhtml#F24) shows the
    ternary relationship represented by a new class, Appearance.


    ![9781430242093_APP01-24.tif](images/9781430242093_APP01-24_fmt.jpeg)


    [**Figure A-24.**](#9781430242093_APP.xhtml#FG24) *A ternary relationship represented
    by an additional class*


    Each object of the Appearance class is related to one player, one work, and one
    concert. It allows us to keep data as in the table in [Figure A-25](#9781430242093_APP.xhtml#F25).
    We can see that Joe played in the Sonata and the Symphony on Saturday, while Linda
    played only in the Sonata.


    ![9781430242093_APP01-25.tif](images/9781430242093_APP01-25_fmt.jpeg)


    [**Figure A-25.**](#9781430242093_APP.xhtml#FG25) *Example data represented by
    the class Appearance*'
