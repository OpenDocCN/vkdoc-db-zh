    The relationships store information such as that Joe Smith is required for Saturday’s
    concert and that Beethoven’s violin sonata is to be performed at Saturday’s concert.


    ![9781430242093_Fig05-22.tif](images/9781430242093_Fig05-22_fmt.jpeg)


