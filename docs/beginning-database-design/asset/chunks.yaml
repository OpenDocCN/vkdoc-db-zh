    \ `Field`) (新表)\n\n最终我们得到以下四个表（键带下划线，外键用斜体）。\n\n*   (`FarmID`, `FarmName`)\n*\
    \   (`VisitID`, *`FarmID`*, `Date`)\n*   (*`VisitID`*, `SampleID`, `Field`)\n\
    *   (*`VisitID`*, *`SampleID`*, `Insect`, `Count`) (原表的剩余部分)\n\n如果我们从[Figure A-36](#9781430242093_APP.xhtml#F36)中的类图开始，也能推导出这些表。\n\
    \n![9781430242093_APP01-36.tif](images/9781430242093_APP01-36_fmt.jpeg)\n\n[`Figure\
    \ A-36.`](#9781430242093_APP.xhtml#FG36) `昆虫数据类图`\n\n类图本质上表示一个农场获得多次访问。每次访问有许多关联的样本，对于每个样本，我们可以记录昆虫的数量。我想你会看到，从类图开始会省去很多麻烦，并且还会促使我们思考其他一些可能的类，比如`Field`和`Insect`。然而，这两种方法是达到类似结果的等效途径。\n\
    \n## 练习 9-1\n\n这里我们再次看到非常有用的“客户订购产品”示例。设计将代表[Figure A-37](#9781430242093_APP.xhtml#F37)中`Order`类的表。考虑约束、主键和外键以及更新规则。\n\
    \n![9781430242093_APP01-37.tif](images/9781430242093_APP01-37_fmt.jpeg)\n\n[`Figure\
    \ A-37.`](#9781430242093_APP.xhtml#FG37) `客户下订单模型`\n\n我们假设`customerID`和`product_name`分别是`Product`和`Customer`表的主键。为了表示这两个关系，这些主键将作为新的外键字段包含在`Order`表中。我们将有（外键用斜体）：\n\
    \n`Order` (`customer`, `product`, `date`, `quantity`)\n\n什么是主键？一个客户可能多次订购一个产品，可能在同一日期甚至相同数量。（你可能为你的聚会订购了三打点心，意识到你误算了某些客人的胃口，并立即又订购了三打。）这是一个（相当罕见的）情况，其中没有属性组合可以保证是唯一的，需要添加一个生成的订单号。所有属性都是必要的，因此应具有`NOT\
    \ NULL`约束。如果日期是订单下达的日期，那么它不应该是未来的日期——但如果它是订单生效的日期，也许未来日期是有意义的——我们现在先不限定这个。至于更新规则，我们必须选择`Disallow\
    \ Delete`（默认）。如果删除了客户或产品，我们仍然希望出于会计目的保留订单（如[第9章](#9781430242093_Ch09.xhtml)所讨论的，我们可能也希望保留产品和客户）。`Nullify\
    \ Delete`将使订单信息无用，因为我们留下的数据会是这样的：“在某个特定日期，某人订购了六件某物。”\n\n创建该表的SQL语句将类似于清单A-2所示。\n\
    \n**清单 A-2.** 创建订单表的SQL——禁止删除是默认更新规则\n\n```sql\nCREATE TABLE Order (\n    order_num\
    \ INT PRIMARY KEY,\n    product INT NOT NULL FOREIGN KEY REFERENCES Product,\n\
    \    customer INT NOT NULL FOREIGN KEY REFERENCES Customer,\n    quantity INT\
    \ NOT NULL,\n    date DATE NOT NULL,\n);\n```\n\n## 练习 9-2\n\n思考为汽车销售场设置品牌和车型表的可用选项。\n\
    \n我们有品牌（makes）、车型（models）、类型（types）和实际的汽车（cars）。如果我们回溯到[第2章](#9781430242093_Ch02.xhtml)，思考用户可能用于排序或搜索的属性并将它们作为单独的类是很有用的。（我们在植物案例中对属（genus）这样做了，以确保所有桉树（Eucalyptus）物种的拼写正确）。在这里，我们很可能希望能够找到关于所有福特（Fords）、所有西耶那（Siestas），甚至所有轿车（sedans）或所有蓝色汽车的信息。初始模型可能类似于[Figure\
    \ A-38](#9781430242093_APP.xhtml#F38)中的样子。\n\n![9781430242093_APP01-38.tif](images/9781430242093_APP01-38_fmt.jpeg)"
  raw: '*   FarmID![image](images/rarrow.jpg)FarmName? Yes. If I know the ID I can
    tell you the name (or I should be able to do so if the spelling errors are removed).

    *   FarmID![image](images/rarrow.jpg)Visit? No. Farm 1 has two associated visits
    (14 and 15) in the data shown in [Figure A-35](#9781430242093_APP.xhtml#F35).
    If this functional dependency was true that would mean only one visit per farm—clearly
    not the intention.

    *   Visit![image](images/rarrow.jpg)Date? This is certainly true for the data
    shown, but will it always be true? It would mean that a visit was on a single
    day—something to be checked with the client. We’ll say yes for now.

    *   Date![image](images/rarrow.jpg)Visit? No. That would mean only one visit a
    day. February 9th has two associated visits: 14 and 16.

    *   Visit![image](images/rarrow.jpg)FarmID? The data shown support this. In general
    we need to confirm that a visit is for just one farm (i.e., it doesn’t include
    a tour around the country). We’ll say yes.

    *   SampleID![image](images/rarrow.jpg)Field? If we know the sample we should
    surely know which field it comes from, right? However, some rows with SampleID
    having a value 2 have F1 for the Field value while others have F2\. So, no—we
    can’t tell the value of Field from knowing the value of SampleID. This is because
    the SampleID field doesn’t uniquely identify a sample. There are several SampleID
    2 s from different visits. To identify a sample we need to also know on which
    visit it was collected.

    *   (SampleID, VisitID)![image](images/rarrow.jpg)Field? Yes—see preceding! The
    data supports this. Sample 2 for Visit 14 is associated with only F2 and Sample
    2 for Visit 16 is associated only with F1.

    *   (SampleID, Insect)![image](images/rarrow.jpg)Count? In an actual sample, if
    we specify the insect then we should come up with a unique count. But remember,
    the SampleID field doesn’t uniquely identify an actual sample. Take a look at
    the rows where SampleID = 2, and Insect = Beetle. (What a coincidence!)

    *   VisitID, SampleID, Insect![image](images/rarrow.jpg)Count? See preceding.
    Now that we include the VisitID with SampleID, we can identify the actual test
    tube (or whatever) and know the number of Beetles.


    c)  Is (VisitID, SampleID, Insect) a suitable key?


    From question 2, Let’s summarize the functional dependencies (FD) that hold for
    this data.


    FD1: FarmID - > FarmName


    FD2: VisitID - > Date, FarmID


    FD3: SampleID, VisitID - > Field


    FD4: VisitID, SampleID, Insect - > Count


    What field values can I determine if I have values for (VisitID, SampleID and
    Insect)?


    We know Count (FD4), Field (FD3), Date, and FarmID (FD2), and because I now know
    FarmID I can tell you FarmName (FD1). That’s everything, so this set is a key.
    It is a primary key because if you remove any of the fields then you won’t know
    everything (I’ll leave that to the really keen readers to verify).


    d)  Decompose the data in [Figure A-35](#9781430242093_APP.xhtml#F35) into a set
    of tables in 3rd Normal form.


    Here are the fields (with the primary key underlined):


    (FarmID, VisitID, SampleID, Date, FarmName, Field, Insect, Count)


    Is this in 1st Normal Form?


    Yes. We are not trying to put more than one piece of information in a cell.


    Is this in 2nd Normal Form, or equivalently do the non-key fields depend on the
    whole key?


    No. We can determine FarmName by just knowing FarmID (FD1), so it should be removed
    into another table with what it depends on. This leaves us with:


    (FarmID, VisitID, SampleID, Date, FarmName, Field, Insect, Count)


    (FarmID, FarmName) (new table)


    Date and FarmID can be determined by knowing just Visit (FD2). Removing these
    two fields leaves us with:


    (FarmID, VisitID, SampleID, Date, FarmName, Field, Insect, Count)


    (VisitID, FarmID, Date) (new table)


    Field can be determined by knowing just SampleID and VisitID (FD3). So this needs
    to be removed.


    (FarmID, VisitID, SampleID, Date, FarmName, Field, Insect, Count)


    (VisitID, SampleID, Field) (new table)


    Finally we have the following four table (keys underlined, foreign keys italicized).


    (FarmID, FarmName)


    (VisitID, *FarmID*, Date)


    (*VisitID*, SampleID, Field)


    (*VisitID*, *SampleID*, Insect, Count) (remains of original table)


    These tables would have been derived if we had started with the class diagram
    in [Figure A-36](#9781430242093_APP.xhtml#F36).


    ![9781430242093_APP01-36.tif](images/9781430242093_APP01-36_fmt.jpeg)


    [**Figure A-36.**](#9781430242093_APP.xhtml#FG36) *Class diagram* *for insect
    data*


    The class diagram essentially says a farm gets many visits. Each visit has a number
    of associated samples and for each sample we can record the numbers of insects.
    I think you will see that starting with the class diagram would have been a great
    deal less trouble and would also have made us think about some other possible
    classes, such as Field and Insect. However, the two approaches are equivalent
    ways of arriving at similar outcomes.


    Exercise 9-1


    Here we have the ever–useful “customer orders product” example again. Design the
    table that will represent the Order class in [Figure A-37](#9781430242093_APP.xhtml#F37).
    Consider constraints, primary and foreign keys, and updating rules.


    ![9781430242093_APP01-37.tif](images/9781430242093_APP01-37_fmt.jpeg)


    [**Figure A-37.**](#9781430242093_APP.xhtml#FG37) *Model for customers placing
    orders*


    Let’s assume that customerID and product_name are primary keys for the Product
    and Customer tables. To represent the two relationships, these primary keys will
    be included as new foreign key fields in the Order table. We will have (foreign
    keys in italics):


    Order (customer, product, date, quantity)


    What is the primary key? A customer might order a product more than once, possibly
    on the same day and even for the same quantity. (You might order three dozen savories
    for your party, realize you’ve miscalculated the appetites of certain of your
    guests and immediately order another three dozen.) This is a (fairly rare) case
    where no combination of attributes can be guaranteed to be unique and a generated
    order number needs to be added. All attributes are necessary and so should have
    a NOT NULL constraint. If the date is when the order is placed then it should
    not be in the future—but if it is the date the order is to take effect, maybe
    a future date makes sense—Let’s not tie this down just now. As for updating rules,
    we must choose Disallow Delete (the default). If a customer or product is deleted
    we will still want to retain the order for accounting purposes (and as discussed
    in [Chapter 9](#9781430242093_Ch09.xhtml), we will probably want to retain the
    product and customer as well). A Nullify Delete would render the order information
    useless as we would be left with data such as, “On a particular date someone ordered
    six of something.”


    The SQL for creating the table would be something like that shown in Listing A-2.


    ***Listing A-2**. SQL to Create Order Table – Delete Disallowed is the Default
    Updating Rule*


    |   | CREATE TABLE Order | (order_num INT PRIMARY KEY, product INT NOT NULL FOREIGN
    KEY REFERENCES Product, customer INT NOT NULL FOREIGN KEY REFERENCES Customer,
    quantity INT NOT NULL,date DATE NOT NULL,); |


    Exercise 9-2


    Think about the options available for setting up tables for makes and models of
    cars at a car sale yard.


    We have makes, models, types, and actual cars. If we wind right back to [Chapter
    2](#9781430242093_Ch02.xhtml), it is useful to think about attributes by which
    users might like to sort or search and have these as separate classes. (We did
    this for genus in the plant case so we could ensure all the Eucalyptus species
    were spelled correctly). Here we are likely to want to be able to find information
    about all Fords, or all Siestas, or even all sedans or all blue cars. An initial
    model may look like the one in [Figure A-38](#9781430242093_APP.xhtml#F38).


    ![9781430242093_APP01-38.tif](images/9781430242093_APP01-38_fmt.jpeg)'
