- fmt: 'Do we need a relationship between `Work` and `Concert` so that we can know
    what is on the program? From [Figure A-25](#9781430242093_APP.xhtml#F25) we can
    see that Saturday’s concert features the Sonata and the Symphony. However, the
    program will probably be decided long before any players are involved, so we need
    the information about works in a particular concert, independent of the players.
    The binary relationship between `Concert` and `Work` in [Figure A-26](#9781430242093_APP.xhtml#F26)
    can record that information; a concert has one or more works on the program and
    a work might be performed at many concerts.


    What about the fee a player is paid for performing in a concert? If the fees go
    with each work, then they could be included as attributes in `Appearance`. Joe
    is paid $30 for playing the Sonata on Saturday and $50 for playing the Symphony,
    for example. If a fee is for the entire concert (e.g., a travel allowance), then
    it is independent of the works and a new binary relationship between `Player`
    and `Concert` will be required. The relationship will be Many–Many (a player may
    be involved in many concerts and a concert will have many players). The new intermediate
    class `Player/Concert` is required so that we have somewhere to include the fee
    for particular pairings of player and concert.


    ![9781430242093_APP01-26.tif](images/9781430242093_APP01-26_fmt.jpeg)


    [Figure A-26.](#9781430242093_APP.xhtml#FG26) A more comprehensive model for concert
    information


    ## Exercise 6-1


    Consider the model in [Figure A-27](#9781430242093_APP.xhtml#F27) which describes
    purchases of a product by customers of a small mail order company The company
    changes the way it does business to allow customers to walk in off the street
    and pay cash. No customer needs to be associated with a cash purchase.


    ![9781430242093_APP01-27.tif](images/9781430242093_APP01-27_fmt.jpeg)


    [Figure A-27.](#9781430242093_APP.xhtml#FG27) Customers purchase products.


    Discuss how effective the following changes to the data would be.


    *   Change the optionality at the customer end of the relationship to 0 so that
    not all purchases need a customer.


    This solution solves the immediate problem of a cash sale not requiring a customer.
    With care, it can be made to work. However, there is the problem of not having
    a record of the customer when a mail order purchase needs to be invoiced or delivered.


    *   Leave the optionality as 1 but include a dummy customer object with the name
    “Cash Customer.”


    We now have to nominate a customer for the purchase. This is probably a bit safer
    than the preceding option. However, one of the objectives for the project was
    to provide statistics on customer habits. Mr. Cash Customer is likely to have
    a large number of purchases and this could skew the results for statistics such
    as average value or average number of purchases. It is possible, if you remember,
    to remove purchases made by “Cash Customer” before doing statistics, but it is
    a fiddle. It depends on how important these statistics are and how often they
    are required.


    *   Create subclasses of `Customer`: `Cash_Customer` and `Account_Customer`.


    This really doesn’t achieve anything more than the preceding option and is much
    more difficult to implement. We are not collecting information about our cash
    customers, so having a class for them is pointless.


    *   Create subclasses of `Purchase`: `Cash_Purchase` and `Account_Purchase`.


    We will have many cash purchases (with no customer) and many account purchases
    (with a mandatory customer), so a class for each is a reasonable idea. It makes
    deriving statistics for the different customer types simple. It doesn’t really
    have much advantage over the dummy cash customer for the present set of requirements,
    but if we want to start recording the method of payment (cash, EFTPOS, credit
    card, etc.) then they will be easy to add. [Figure A-28](#9781430242093_APP.xhtml#F13)
    shows how this can be modeled.


    ![9781430242093_APP01-28.tif](images/9781430242093_APP01-28_fmt.jpeg)


    [Figure A-28.](#9781430242093_APP.xhtml#FG28) A purchase can be for a customer
    with an account or can be an anonymous cash transaction.


    ## Exercise 6-2


    A farmer keeps information about the application of fertilizer to his crops (e.g.,
    amount, date, etc.). His farm is made up of large sections which are divided into
    fields. Usually an application of fertilizer is applied to an entire section,
    but occasionally it is to an individual field. How would you model this?


    We can start by having a class called `Application` which can record the date
    and the amount of fertilizer and which is associated with some sort of area—a
    section or a field. Sections and fields are both “areas” that have something in
    common (name, size, the fact that fertilizer can be applied, etc.), and so this
    is a candidate for generalization. Have a look at the model in [Figure A-29](#9781430242093_APP.xhtml#F13).


    ![9781430242093_APP01-29.tif](images/9781430242093_APP01-29_fmt.jpeg)


    [Figure A-29.](#9781430242093_APP.xhtml#FG29) Fertilizer applications are made
    to areas which are either sections or fields.


    In addition to an area being either a section or a field we also have that fields
    may be one of many in a section. Now we can record that an application has been
    to a section and know which fields have received the treatment. We can also make
    an application to a single field if we wish.


    [Figure A-29](#9781430242093_APP.xhtml#F29) is a good solution; however using
    the composite pattern, as in [Figure A-30](#9781430242093_APP.xhtml#F30), gives
    a more general solution. We can record an application for an entire farm, which
    is made up of sections which are made up of fields. We can also record the fertilizer
    application at any of these levels. This is analogous to the checks on buildings
    problem discussed in [Chapter 6](#9781430242093_Ch06.xhtml).


    ![9781430242093_APP01-30.tif](images/9781430242093_APP01-30_fmt.jpeg)


    [Figure A-30.](#9781430242093_APP.xhtml#FG30) The composite pattern allows applications
    to all levels of area.


    ## Exercise 6-3


    A volunteer library has staff, members, and books. It is necessary to know which
    books are on loan to whom and how to contact the borrower, and to record fees
    charged for overdue books. Reference books cannot be borrowed. Members are fined
    $5 per day for overdue books but staff do not receive fines. How might you model
    this situation? Some initial classes are shown in [Figure A-31](#9781430242093_APP.xhtml#F31).


    ![9781430242093_APP01-31.tif](images/9781430242093_APP01-31_fmt.jpeg)


    [Figure A-31.](#9781430242093_APP.xhtml#FG31) People can borrow books.


    We know that we have two types of books (ordinary and reference) and two types
    of people (staff and members). The important question now is: do we need inheritance?
    For people, the only difference in the problem stated is in the value of a fine
    for overdue books. There is no behavioral difference. We could create a `Type`
    class (with objects for staff and member) which is associated with each person.
    This class could record the value of the fine for that type ($5.00 for members,
    $0.00 for staff). Similarly we could categorize each book as being of a type and
    build into the use cases a rule that reference books cannot be associated with
    a loan. This different behavior, however, probably warrants considering an inheritance
    solution. [Figure A-32](#9781430242093_APP.xhtml#F32) depicts a possible solution
    with an association to represent the different types of person and inheritance
    for the different types of book. Note that we have introduced an abstract `Book`
    class so that we can make changes to the ordinary and reference book classes independently.


    ![9781430242093_APP01-32.tif](images/9781430242093_APP01-32_fmt.jpeg)


    [Figure A-32.](#9781430242093_APP.xhtml#FG32) One of many possible ways to represent
    different types of books and people


