    the current guest with reference to objects of only two classes (**Room** and
    **Guest**). With the model in [Figure 5-5](#9781430242093_Ch05.xhtml#F5) we needed
    to inspect date attribute values of the **Group** object as well. To find empty
    rooms, we can now simply look for all rooms that have no current guest.


    There are a few problems with modeling the data in this way as some extra updating
    is required to keep the data consistent. For example, when a group checks out,
    we will have to update the **date_out** in **Group**, and we will also have to
    remove each *is currently in* relationship instance to reﬂect that the room is
    now empty. This extra maintenance step is caused because we are in effect storing
    the same piece of information in more than one way. While the *retrieval* of information
    about empty rooms and current guests is simpler for the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6),
    the *updating* of data is more complex. [Table 5-1](#9781430242093_Ch05.xhtml#table-1)
    shows possible use cases for checking out a group, and a report for listing all
    currently empty rooms for each data model.


    *[**Table 5-1.**](#9781430242093_Ch05.xhtml#T5_1) Some Possible Use Cases for
    the Alternative Guest and Room Models*


    |   | **With Data Model in [Figure 5-5](#9781430242093_Ch05.xhtml#F5)** | **With
    Data Model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6)** |

    | Check out a group | Update **date_out** for appropriate **Group** object. |
    Update **date_out** for appropriate **Group** object. Find all associated **Guest**
    objects and remove the *currently in* association with the **Room** object. |

    | List all currently empty rooms | First find the occupied rooms: find all **Group**
    objects with **date_out** in the future. Find all the associated **Guest** objects
    for these groups, and the set of all **Room** **o**bjects associated with these
    guests. List the **room_number** for all **Room** objects *not* included in this
    set. | Find all **Room** objects that do not have an associated current **Guest**
    object. |


    It is clear that the reporting is simpler for a model such as that in [Figure
    5-6](#9781430242093_Ch05.xhtml#F6), while the maintenance is simpler for one like
    [Figure 5-5](#9781430242093_Ch05.xhtml#F5). The problem with the model in [Figure
    5-6](#9781430242093_Ch05.xhtml#F6) is that if the updating required when checking
    out a group is not done correctly, we will end up with a database that has inconsistent
    information. While the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6) appears
    easier to query, it is so at the expense of making the maintenance more difficult
    and therefore the reliability more likely to be compromised. As you shall see
    in the next section, it is best to avoid the situation where we have information
    stored more than once.


    At this point we realize that neither of the models in [Figures 5-5](#9781430242093_Ch05.xhtml#F5)
    or [5-6](#9781430242093_Ch05.xhtml#F6) is particularly good for the hostel problem
    if we want to keep historical data about room occupancy. The solution discussed
    in [Chapter 4](#9781430242093_Ch04.xhtml) allowed us to keep information about
    what groups had been to the hostel, who the guests were, and the current occupant
    of a room. That all worked well. Once we try to add the historical data about
    room occupancy, the model becomes difficult to manage. An alternative solution
    is suggested in the Testing Your Understanding section for [Chapter 4](#9781430242093_Ch04.xhtml).


    Different Routes Between Classes


    Using the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6), we can find the
    current guest in a room by two routes: via the relationship *currently in* or
    by checking the **date_out** for each guest who has occupied the room. The problem
    here is that if the data are not carefully maintained, we might find that we come
    up with two different answers. For example, if a group is checked out but we did
    not remove all the *is currently in* associations (as in the use case in [Table
    5-1](#9781430242093_Ch05.xhtml#table-1)), the first route will give us the previous
    guest in the room, while the second route will show an empty room.'
  trans: '

    你可能在想，团队的队长是否应该始终是团队中的一员。如图 5-4 所示的模型，并未对此类约束给出任何说明。有多种方式可以表示此类约束。一种可能是将约束纳入相关的用例中。对于描述录入团队信息的用例，我们会规定队长必须是团队成员之一。由对象管理组开发的*对象约束语言（OCL）*^(1)，作为对统一建模语言（UML）的补充，为约束提供了形式化规范。在本书中，我将不深入探讨形式化方法，而更倾向于在用例文本中指出这些额外的约束。


    另一种可能需要考虑类之间存在两种关系的情况是当我们拥有历史数据时。示例 5-2 重新审视了我们在第 4 章中首次探讨的`Rooms`（房间）、`Groups`（团体）和`Guests`（客人）示例。


    **示例 5-2：小型旅社**


    一个小型旅社由单人房组成。通常，团体（如学校班级）会住在该旅社。我们将扩展第 4 章的问题，保留以往客人和当前客人的信息。一个房间随着时间的推移会有许多客人入住。（为简化，我们假设每位客人只入住一次，且只住一间房。）修改后的模型如图
    5-5 所示。


    ![9781430242093_Fig05-05.tif](img/9781430242093_Fig05-05_fmt.jpeg)


    图 5-5. 单人房随时间拥有多个客人的模型


    该旅社主要接待团体游客，因此入住和退房日期属于团体信息，而非每位客人个人。


    我们能从图 5-5 的模型中发现什么？如果我们想查询某位客人，可以轻松找到其房号，还可以通过查看相关团体对象的日期来确定其入住时长。如果我们想找出当前占用某房间的客人姓名（比如有噪音投诉），事情就变得稍微复杂一些。每个房间随着时间的推移关联的客人越来越多，那么我们该如何找到当前这位客人呢？一种方法是搜索与该房间关联的所有客人，并检查他们相关的团体信息，以找到一个`date_out`（退房日期）在未来的记录。另一个可能的任务是检索空房列表。为此，我们必须找出那些没有关联`date_out`在未来的团体的客人居住的房间。


    这些解决方案是可行的，但对于可能需要定期执行的任务来说，它们既复杂又繁琐。另一种选择是考虑在`Room`（房间）和`Guest`（客人）之间为*当前*客人建立第二种关系。所有客人都将像图
    5-5 中那样与一个房间关联，但我们在当前客人与房间之间增加一个额外的关系。如图 5-6 所示。


    ![9781430242093_Fig05-06.tif](img/9781430242093_Fig05-06_fmt.jpeg)


    图 5-6. 房间随时间拥有多个客人的替代模型


    使用图 5-6 的数据模型，我们只需参考两个类（`Room`和`Guest`）的对象即可找到当前客人。而使用图 5-5 的模型，我们还需要检查`Group`对象的日期属性值。要查找空房，我们现在只需查找所有没有当前客人的房间即可。


    以这种方式建模数据存在一些问题，因为需要额外的更新来保持数据一致性。例如，当一个团体退房时，我们必须更新`Group`中的`date_out`，同时还需要移除每个*当前入住*关系实例，以反映房间现在为空。这个额外的维护步骤是因为我们实际上以不止一种方式存储了同一信息。虽然图
    5-6 的模型在*检索*空房和当前客人信息时更简单，但数据的*更新*却更复杂。表 5-1 展示了针对团体退房以及为每种数据模型列出当前所有空房报告的可能用例。


    表 5-1. 两种客人与房间模型的一些可能用例对比


    |   | **使用图 5-5 的数据模型** | **使用图 5-6 的数据模型** |

    | :--- | :--- | :--- |

    | 团体退房 | 更新相应`Group`对象的`date_out`。 | 更新相应`Group`对象的`date_out`。查找所有关联的`Guest`对象，并移除与`Room`对象的*当前入住*关联。
    |

    | 列出所有当前空房 | 首先找出被占用的房间：查找所有`date_out`在未来的`Group`对象。找出这些团体的所有关联`Guest`对象，以及这些客人关联的所有`Room`对象的集合。列出*未*包含在此集合中的所有`Room`对象的`room_number`。
    | 查找所有没有关联当前`Guest`对象的`Room`对象。 |


    很明显，对于图 5-6 这类模型，报告生成更简单；而对于图 5-5 这类模型，维护更简单。图 5-6 模型的问题在于，如果团体退房时所需的更新操作没有正确执行，最终会导致数据库信息不一致。虽然图
    5-6 的模型看起来更容易查询，但这是以增加维护难度、从而更可能损害可靠性为代价的。正如你将在下一节看到的，最好避免信息被存储不止一次的情况。


    至此，我们意识到，如果我们想保留房间占用的历史数据，那么图 5-5 或 5-6 中的模型对于旅社问题都不算特别好。第 4 章讨论的方案允许我们保留哪些团体曾入住旅社、客人是谁以及房间当前居住者的信息。这些都运作良好。一旦我们尝试添加关于房间占用的历史数据，模型就变得难以管理。第
    4 章的“测试你的理解”部分提出了另一种解决方案。


    ## 类之间的不同路径


    使用图 5-6 的模型，我们可以通过两种路径找到房间的当前客人：通过*当前入住*关系，或者通过检查每位曾入住该房间客人的`date_out`日期。这里的问题是，如果数据维护不当，我们可能会得到两个不同的答案。例如，如果一个团体退房了，但我们没有移除所有*当前入住*关联（如表
    5-1 中的用例），那么第一条路径会给出房间的前一位客人，而第二条路径则会显示该房间为空。

