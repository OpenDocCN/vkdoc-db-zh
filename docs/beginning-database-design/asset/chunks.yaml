    # CHAPTER 6

    ## Generalization and Specialization


    As the data model begins to develop, situations will sometimes arise where we
    find that a class may not describe our possible objects as neatly as we might
    like. We might find that we have some objects for which some of the attributes
    do not really apply. For example, if we have a class to record information about
    all the people associated with a company, we might find that some have hourly
    pay rates while others have annual salaries. In many respects, much of the information
    about each of the employees is similar, but there are differences. We may also
    come across the case where we have started with two separate classes, for example
    `Lecturers` and `Students`, and then begin to realize that there is a great deal
    of information in common or that they are involved in the same relationships (who
    has parking permits, say). How do we handle these “same only different” cases
    in a pragmatic way?


    Some questions that are useful to keep in mind are:


    `Do the two classes have enough in common to reconsider how they are defined?`

    `Are some of the objects in a given class different enough from other objects
    to warrant reconsidering how they are defined?`


    ## Classes or Objects with Much in Common


    Consider a company wishing to keep information about its employees. For all employees
    it needs to keep employee numbers, names, contact addresses, and job type, but
    depending on the type of job, the rest of the information might be different.
    Administrators might have a grade and technicians might have a date their certification
    needs to be renewed. Some workers might have a yearly salary, while others might
    have an hourly rate.


    Let’s just take a simple case of an outsourcing company keeping information about
    administrators and technicians. We could, as a start, consider having just one
    class, `Employee`, as shown in [Figure 6-1](#9781430242093_Ch06.xhtml#F1). In
    [Figure 6-2](#9781430242093_Ch06.xhtml#F2), we show some possible objects of that
    class.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-01_fmt.jpeg)


    [**Figure 6-1.**](#9781430242093_Ch06.xhtml#FG1) Information about different types
    of workers kept in one class


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-02_fmt.jpeg)


    [**Figure 6-2.**](#9781430242093_Ch06.xhtml#FG2) Some possible objects of the
    class `Employee`'
