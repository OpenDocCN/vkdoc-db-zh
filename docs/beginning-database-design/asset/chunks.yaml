  raw: 'In [Figure 9-9](#9781430242093_Ch09.xhtml#F9), we have the additional complexity
    of an extra table. However, if another membership type is required, it can be
    added simply as a new row in the Type table. This is just a data entry job and
    doesn ’t involve any change to the design of the database. If the types are going
    to be fairly constant, the constraint is simpler, whereas the reference to another
    table makes it easy for a user to add different types.


    There is one case in which the extra table will always be the appropriate choice.
    This is when there are (or may later be) some additional attributes belonging
    to the Type class. For example, if we wish to keep a fee for each different membership
    type, the only way we can do this is via a Type class as shown in [Figure 9-11](#9781430242093_Ch09.xhtml#F11).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-11_fmt.jpeg)


    [**Figure 9-11.**](#9781430242093_Ch09.xhtml#FG11) An extra class is needed if
    there are additional attributes.


    In summary, when we have a piece of data that acts like a category (e.g., membership
    type), we sometimes have a choice as to whether we store this as a simple field
    in a table and keep the values consistent by way of a constraint or validation
    rule, or we have a separate table of categories to which we refer. If the number
    of categories is likely to increase, the second option is better, as this then
    becomes a simple matter of adding additional rows to the category table rather
    than changing the constraint on the parent table. If there are or are likely to
    be other attributes associated with the category, the additional table is the
    only option. If neither of these situations applies, it is worth thinking about
    whether a simple field with a constraint may be more appropriate.


    Deleting Referenced Records


    You have seen how we can use foreign keys to represent relationships between two
    tables. Have another look at our model of teams and members in [Figure 9-5](#9781430242093_Ch09.xhtml#F5).
    We can represent the relationship *is captain of* with a foreign key (captain)
    in the Team table, as shown in [Figure 9-12](#9781430242093_Ch09.xhtml#F12).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-12_fmt.png)


    [**Figure 9-12.**](#9781430242093_Ch09.xhtml#FG12) Teams and members


    A foreign key ensures that we have referential integrity. Recall from [Chapter
    7](#9781430242093_Ch07.xhtml) that referential integrity prevents us from having
    a value in the foreign key field captain if the value does not exist in the primary
    key field memberID in the Member table. This ensures that all of our captains
    are members for which we have already recorded names and other details. Unlike
    a primary key, a foreign key field is not necessarily mandatory, and the captain
    field may be empty (i.e., referential integrity does not make it necessary for
    every team to have a captain). We can of course impose that extra constraint if
    we want to, by specifying that the captain field must be NOT NULL.


    So far we have only looked at referential integrity from the point of view of
    adding new teams and captains. However, we also have the situation of deleting
    members from the Member table. If we attempt to delete member 156, for example,
    we shall have a problem with the referential integrity in the Team table. The
    captain of SeniorB will no longer exist in the Member table.


    There are three ways to deal with this situation. Database software products vary
    in their ability to provide each of these options, but all will provide the first,
    as follows:


    **Disallow delete:** You cannot delete a row that is being referenced. For example,
    the deletion of member 156 will not be allowed while it is being referenced by
    the Team table. If we want to delete member 156, we will first have to remove
    the reference to him in the Team table and then delete him from the Member table.


    **Nullify delete:** If member 156 is deleted, the field that is referencing it,
    captain, will be nullified (made empty). This essentially is saying that if a
    captain of a team leaves the club, that team has no captain—which is probably
    quite sensible in this situation.


    **Cascade delete:** If a row is deleted, all the rows referencing it will be deleted
    also (and the rows referencing them, and on and on). In this case, deleting member
    156 would mean that the team SeniorB would be deleted. This is clearly not desirable.


    When we set up a field as a foreign key, we can specify what should occur when
    there is an attempt to delete the row to which it refers. [Listing 9-4](#9781430242093_Ch09.xhtml#L4)
    shows the SQL statement for specifying a “nullify delete” for the foreign key
    captain when we create the Team table. If you do not specify an option, the default
    is generally “disallow delete.”


    ***[Listing 9-4](#9781430242093_Ch09.xhtml#Lis4).** Specifying a Deletion Option
    on a Foreign Key*


    CREATE TABLE Team (


    team_name VARCHAR(20),


    captain INT FOREIGN KEY REFERENCES Member ON DELETE NULLIFY )


    Depending on the particular problem, we can choose the deletion option that is
    most appropriate. For the team and member situation, a “nullify delete” seems
    sensible for the foreign key captain. We want to be able to delete members, and
    it makes sense that if member 156 leaves, there will be a vacancy for the captain
    of the SeniorB team. Our model as it stands in [Figure 9-5](#9781430242093_Ch09.xhtml#F5)
    doesn ’t allow this, however. It says every team must have a captain. Maybe it
    is worth reconsidering this. While in the normal course of events we expect all
    our teams to have captains, we are going to come across cases where people unexpectedly
    leave or resign. What do we want to happen to the data we are keeping in these
    cases? If we insist that every team has a captain (by making that field required),
    we will have to find a new captain before we can delete the old captain from our
    membership list. Perhaps this is what we want to do, or maybe that will be too
    restrictive. We talked in previous chapters about the consequences of making fields
    required. Thinking about deletions from the database may make us reconsider the
    relationship *is captain of* and whether or not it should be optional.


    Let ’s consider a different situation, of orders and products, as in [Figure 9-13](#9781430242093_Ch09.xhtml#F13).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-13_fmt.png)


    [**Figure 9-13.**](#9781430242093_Ch09.xhtml#FG13) Orders and products: What happens
    if we delete a product?


    What happens if we no longer stock product 809? If we delete this row in the Product
    table, our referential integrity will be compromised as order number 10034 refers
    to it. What are our choices? A “nullify delete” means having nothing in the foreign
    key product field in the Order table. This makes no sense. We would have that
    there was once an order for four of some product—but we don ’t know what that
    product was and we have no way of finding the price. Clearly, this is not going
    to be useful. A “cascade delete” would mean that all the orders for product 809
    would be deleted. This doesn ’t seem sensible either, as a business is going to
    need to keep track of all its orders to determine profits, tax, and so on. Our
    only choice in this case, then, is the “disallow delete” option. If there is an
    order for the product, we can ’t delete that product from the Product table.'
