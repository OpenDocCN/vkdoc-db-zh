    \ Smith，83 SomePlace，Christchurch）在表中添加一行。\n\n## 创建表\n\n所有关系数据库都允许你使用SQL创建表，SQL是一种用于创建、更新和查询数据库的语言。首先我们需要一个存储所有表的数据库。要创建一个表，我们需要提供表的名称以及每列的名称和域。域指定了该特定列允许的值集。我们将在本章后面稍作讨论域。对于许多目的，仅指定数据类型就足够了，例如日期（8/4/12）、一段文本或一组字符（\"\
    Mary Smith\"）、一个整数（467）或其他类型的数字（3.57）。特定的数据库产品提供不同的数据类型，我们将在“选择数据类型”一节中稍后讨论合适的选择。\n\
    \n除了提供SQL作为创建表的方式外，许多数据库还提供更图形化的前端，用户可以通过它提供有关列及其数据类型的信息。创建一个非常简单的`Member`表的等效方式如[清单7-1](#9781430242093_Ch07.xhtml#L1)以及[图7-3](#9781430242093_Ch07.xhtml#F3)和[7-4](#9781430242093_Ch07.xhtml#F4)所示。[图7-3](#9781430242093_Ch07.xhtml#F3)显示了MySQL\
    \ Workbench前端，而[图7-4](#9781430242093_Ch07.xhtml#F4)显示了MS Access中的等效界面。这两个程序都会生成类似于[清单7-1](#9781430242093_Ch07.xhtml#L1)所示的SQL语句。请注意，这两个字段的数据类型在Access中称为`Text`，在SQL中称为`VarChar`。它们都表示用户将能够输入最多指定最大数量（姓名为25，地址为40）的任意数量的字符。\n\
