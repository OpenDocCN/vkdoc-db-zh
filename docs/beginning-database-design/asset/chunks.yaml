    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-16_fmt.png)


    [**Figure 6-16.**](#9781430242093_Ch06.xhtml#FG16) Multiple inheritance to capture
    objects of two classes (not recommended)


    There are difficulties with the approach in [Figure 6-16](#9781430242093_Ch06.xhtml#F16).
    The obvious problem, from a purely pragmatic design point of view, is that when
    more classes are added at the middle level, we will be in trouble. If we add new
    classes (e.g., **Administrator** and **Cleaner**) as additional subclasses of
