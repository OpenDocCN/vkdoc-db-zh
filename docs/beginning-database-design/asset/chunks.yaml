    In `Figure 9-9`，我们面临一个额外表的复杂性。然而，如果需要另一种会员类型，只需将其作为`Type`表中的一个新行添加即可。这只是一个数据录入工作，不涉及数据库设计的任何更改。如果类型将保持相当恒定，则约束更简单，而对另一个表的引用则使用户易于添加不同类型。


    有一种情况，额外的表将始终是合适的选择。这就是当存在（或以后可能存在）属于`Type`类的某些额外属性时。例如，如果我们希望为每种不同的会员类型保留费用，我们唯一能做到这一点的方法是通过如`Figure
    9-11`所示的`Type`类。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-11_fmt.jpeg)


    `Figure 9-11`：如果存在额外属性，则需要一个额外的类。


    总之，当我们有一个表现得像类别（例如，会员类型）的数据项时，我们有时可以选择是将其作为表中的一个简单字段存储并通过约束或验证规则保持值一致，还是拥有一个单独的类别表供我们引用。如果类别的数量可能增加，第二种选择更好，因为这变成了向类别表添加额外行的简单事情，而不是更改父表上的约束。如果存在或可能存在与该类别相关的其他属性，则额外的表是唯一的选择。如果这两种情况都不适用，值得考虑带有约束的简单字段是否更合适。


    ## 删除被引用的记录


    你已经看到了我们如何使用外键来表示两个表之间的关系。再看一下我们在`Figure 9-5`中关于团队和成员的模型。我们可以在`Team`表中使用外键（`captain`）来表示`is
    captain of`关系，如`Figure 9-12`所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-12_fmt.png)


    `Figure 9-12`：团队和成员


    外键确保我们具有参照完整性。回顾`Chapter 7`，参照完整性防止我们在外键字段`captain`中拥有一个值，如果该值在`Member`表的主键字段`memberID`中不存在。这确保了我们所有的队长都是我们已经记录了姓名和其他详细信息的成员。与主键不同，外键字段不一定是强制的，`captain`字段可以为空（即，参照完整性并不要求每个团队都必须有一个队长）。我们当然可以施加那个额外的约束，通过指定`captain`字段必须为`NOT
    NULL`。


    到目前为止，我们只从添加新团队和队长的角度看参照完整性。然而，我们还面临从`Member`表中删除成员的情况。例如，如果我们试图删除成员156，我们将在`Team`表中遇到参照完整性问题。`SeniorB`的队长将不再存在于`Member`表中。


    有三种方法来处理这种情况。数据库软件产品在提供这些选项的能力上各不相同，但所有产品都会提供第一种，如下所示：


    `Disallow delete`：你不能删除正在被引用的行。例如，当成员156正在被`Team`表引用时，删除操作将不被允许。如果我们想要删除成员156，我们将首先必须移除`Team`表中对他的引用，然后才能从`Member`表中删除他。


    `Nullify delete`：如果成员156被删除，引用它的字段`captain`将被置空（变为空）。这本质上是说，如果一个团队的队长离开了俱乐部，该团队就没有队长——在这种情况下这可能是相当合理的。


    `Cascade delete`：如果删除一行，所有引用它的行也将被删除（以及引用它们的行，依此类推）。在这种情况下，删除成员156将意味着团队`SeniorB`将被删除。这显然不是我们想要的。


    当我们设置一个字段为外键时，我们可以指定当尝试删除其引用的行时应发生什么。`Listing 9-4`显示了在创建`Team`表时，为外键`captain`指定“nullify
    delete”的SQL语句。如果你没有指定选项，默认通常是“disallow delete”。


    `Listing 9-4`：在外键上指定删除选项


    ```sql

    CREATE TABLE Team (

    team_name VARCHAR(20),

    captain INT FOREIGN KEY REFERENCES Member ON DELETE NULLIFY )

    ```


    根据具体问题，我们可以选择最合适的删除选项。对于团队和成员的情况，“nullify delete”对于外键`captain`似乎是合理的。我们希望能够删除成员，并且如果成员156离开，`SeniorB`团队的队长职位将会空缺，这是有道理的。然而，我们`Figure
    9-5`中的模型目前不允许这一点。它说每个团队必须有一个队长。也许值得重新考虑这一点。虽然在正常情况下我们期望所有团队都有队长，但我们会遇到人们意外离开或辞职的情况。在这些情况下，我们希望对我们保存的数据发生什么？如果我们坚持每个团队都有一个队长（通过使该字段为必需），我们将必须在能够从会员列表中删除旧队长之前找到一个新队长。也许这正是我们想要的，或者那可能限制性太强。我们在前面的章节中讨论了使字段成为必需字段的后果。考虑从数据库中删除记录可能会让我们重新考虑`is
    captain of`关系以及它是否应该是可选的。


    让我们考虑一个不同的情况，即订单和产品，如`Figure 9-13`所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-13_fmt.png)


    `Figure 9-13`：订单和产品：如果我们删除一个产品会发生什么？


    如果我们不再库存产品809会怎样？如果我们在`Product`表中删除这一行，我们的参照完整性将受到损害，因为订单号10034引用了它。我们有哪些选择？“nullify
    delete”意味着在`Order`表的外键`product`字段中没有任何内容。这没有意义。我们会有一个曾经订购了四个某种产品的记录——但我们不知道那个产品是什么，而且我们无法找到价格。显然，这不会是有用的。“cascade
    delete”将意味着所有产品809的订单都将被删除。这似乎也不合理，因为企业需要跟踪其所有订单以确定利润、税收等。因此，在这种情况下，我们唯一的选择是“disallow
    delete”选项。如果存在对该产品的订单，我们就不能从`Product`表中删除该产品。

