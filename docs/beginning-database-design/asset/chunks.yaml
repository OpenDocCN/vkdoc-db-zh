    captain INT FOREIGN KEY REFERENCES Member ON DELETE NULLIFY )

    ```


    根据具体问题，我们可以选择最合适的删除选项。对于团队和成员的情况，“置空删除”对于外键`captain`似乎是合理的。我们希望能够删除成员，并且如果成员 156
    离开，`SeniorB`团队的队长职位将会空缺，这是有道理的。然而，我们`图 9-5`中的模型目前不允许这一点。它说每个团队必须有一个队长。也许值得重新考虑这一点。虽然在正常情况下我们期望所有团队都有队长，但我们会遇到人们意外离开或辞职的情况。在这些情况下，我们希望对我们保存的数据发生什么？如果我们坚持每个团队都有一个队长（通过使该字段为必需），我们将必须在能够从会员列表中删除旧队长之前找到一个新队长。也许这正是我们想要的，或者那可能限制性太强。我们在前面的章节中讨论了使字段成为必需字段的后果。考虑从数据库中删除记录可能会让我们重新考虑`is
    captain of`关系以及它是否应该是可选的。


    让我们考虑一个不同的情况，即订单和产品，如`图 9-13`所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig09-13_fmt.png)


    `图 9-13`：订单和产品：如果我们删除一个产品会发生什么？


    如果我们不再库存产品 809 会怎样？如果我们在`Product`表中删除这一行，我们的参照完整性将受到损害，因为订单号 10034 引用了它。我们有哪些选择？“置空删除”意味着在`Order`表的外键`product`字段中没有任何内容。这没有意义。我们会有一个曾经订购了四个某种产品的记录——但我们不知道那个产品是什么，而且我们无法找到价格。显然，这不会是有用的。“级联删除”将意味着所有产品
    809 的订单都将被删除。这似乎也不合理，因为企业需要跟踪其所有订单以确定利润、税收等。因此，在这种情况下，我们唯一的选择是“不允许删除”选项。如果存在对该产品的订单，我们就不能从`Product`表中删除该产品。


