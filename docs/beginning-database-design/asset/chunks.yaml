    \n[**图7-5**](#9781430242093_Ch07.xhtml#FG5). 通过MS Access界面输入数据\n\n## 选择数据类型\n\n\
    类中的每个属性都成为表中的一个`field`或列。当我们创建表时，我们需要为该字段提供一个名称（例如，`name`，`address`）并指定将存储在该字段中的数据类型。数据库产品通常提供数量惊人、各不相同的数据类型，但它们基本上分为以下几类：\n\
    \n**字符类型**：这些类型允许你输入任意组合的字符——数字、字母和标点符号。它们用于姓名、地址、描述等。你通常需要为进入该字段的数据提供一个最大长度。在SQL中，`VARCHAR(60)`类型允许你输入最多60个字符。在Access中，等效类型称为`Text`。如果你有大量文本（注释、讨论等），你可能需要查看其他类型（例如，SQL\
    \ Server中的`Text`或Access中的`Memo`）。\n\n**整数类型**：这些类型用于输入没有小数部分的数字。它们非常适合用于客户编号等ID号以及任何你可以计数的东西。数据库系统通常提供不同大小的整数类型（`long`、`short`、`byte`等），它们可以输入的最大数字也不同。除非你有特定的性能问题或数据量极大，否则使用普通整数类型（SQL中的`INT`）可能就足够了。只需检查它能处理的最大数字是否足够你的数据。\n\
    \n**带小数部分的数字**：这些用于你测量的东西（身高、体重等）以及诸如平均值等计算产生的数字。大多数情况下，使用称为`float`或`single`（取决于你使用的产品）的类型就足够了。如果你需要特别精确的测量或计算，还存在其他类型。一种`float`可能不适用的情况是当你需要准确记录相当大数额的金钱时。许多产品现在为此提供了`money`或`currency`类型，或者你可能会发现该类型被称为类似`fixed-length\
    \ decimal`。这些类型使你能够拥有许多有效数字，从而可以准确地跟踪你的数十亿资产，精确到几分之一美分！\n\n**日期**：不用猜也能知道你可以在这类字段中存放什么类型的数据。如果你的产品有不同的日期类型，有些可能允许你包含时间，而另一些可能允许你访问更久远的过去或将来的日期。\n\
    \n为什么选择正确的数据类型很重要？你可以争辩说，既然你可以将任何东西放入字符字段，那么你可以为所有东西都使用字符字段（我确实见过这么做的！）。选择适合每个字段的数据类型主要有三个原因：\n\
    \n**值的约束**：字符字段类型对你可输入的内容没有约束；然而，大多数其他字段类型有约束。数字字段不允许你意外地输入错误，例如，输入额外的小写字母`O`而不是数字`0`。日期字段不允许输入2月29日，除非是闰年，等等。因此，电话号码（可能包含括号`()`等额外符号）需要存储在字符字段而不是数字字段中。\n\
    \n**排序**：不同类型的字段有不同的比较或排序值的方法。例如，字符字段可以按字母顺序（A到Z）排序，数字字段可以按数字顺序（从小到大）排序，日期可以按时间顺序（较早的优先）排序。如果你将数字存储在字符字段中，然后要求你的产品对它们排序，你可能会得到类似这样的结果：10，12，123，2，200，36。字符字段中的日期可能像这样排序：August\
    \ 1，2012；February 1，2012；May 4，2012。你能看出为什么吗？"
  raw: 'The first step is to design a database table for each class. The attributes
    of the class will become the field or column names of the table, and when the
    data is added, each row, or record, in the table will represent an object. For
    example, as a start we would create a table called Member for the Member class
    in [Figure 7-2](#9781430242093_Ch07.xhtml#F2). The table would have two fields
    or columns, one for a member’s name and one for the address. We would then add
    a row to the table for each member object (e.g., John Smith, 83 SomePlace, Christchurch).


    Creating a Table


    All relational databases allow you to create a table using SQL, which is a language
    for creating, updating, and querying databases. First we need a database that
    stores all our tables. To create a table, we need to provide a name for the table
    and a name and domain for each of the columns. The domain specifies the set of
    values that is allowed for that particular column. We will talk a little more
    about domains later in this chapter. For many purposes it is sufficient to just
    specify a data type, for example a date (8/4/12), a piece of text or a set of
    characters (“Mary Smith”), an integer (467), or some other type of number (3.57).
    Particular database products provide different data types, and we will talk about
    suitable choices a little later on in the section “Choosing Data Types.”


    In addition to providing SQL as a way of creating a table, many databases provide
    a more graphical front end through which the user can provide information about
    the columns and their data types. Equivalent ways of creating a very simple Member
    table are shown in [Listing 7-1](#9781430242093_Ch07.xhtml#L1) and [Figures 7-3](#9781430242093_Ch07.xhtml#F3)
    and [7-4](#9781430242093_Ch07.xhtml#F4). [Figure 7-3](#9781430242093_Ch07.xhtml#F3)
    shows the MySQLWorkbench front end, while [Figure 7-4](#9781430242093_Ch07.xhtml#F4)
    shows the equivalent in MS Access. Both programs will generate SQL statements
    similar to those shown in [Listing 7-1](#9781430242093_Ch07.xhtml#L1). Note that
    the data type for the two fields is called *Text* in Access and *VarChar* in SQL.
    These both just mean that the user will be able to enter any number of characters
    up to the maximum number stated (25 for name and 40 for address).


    ***[Listing 7-1](#9781430242093_Ch07.xhtml#Lis1).** Standard SQL Command to Create
    a Customer Table with Two Fields*


    CREATE TABLE Member (


    member_name VARCHAR(25),


    member_address VARCHAR(40)


    )


    ![9781430242093_Fig07-03.tif](images/9781430242093_Fig07-03.jpg)


    [**Figure 7-3**](#9781430242093_Ch07.xhtml#FG3). Creating a Member table in MySQL
    Workbench


    ![9781430242093_Fig07-04.tif](images/9781430242093_Fig07-04_fmt.jpeg)


    [**Figure 7-4**](#9781430242093_Ch07.xhtml#FG4). Creating a Member table in Microsoft
    Access


    As you can see in [Figures 7-3](#9781430242093_Ch07.xhtml#F3) and [7-4](#9781430242093_Ch07.xhtml#F4),
    there are many additional possible specifications for columns. We will come to
    some of those later. For now we have just declared the minimum requirements of
    a name and data type for each of the columns. Once the table has been created,
    we can enter data. In the case of the Member table, we would enter a row for each
    member object. Once again, this can be done with SQL commands as in [Listing 7-2](#9781430242093_Ch07.xhtml#L2)
    or for many products through a table-like front end as shown for Access in [Figure
    7-5](#9781430242093_Ch07.xhtml#F5).


    ***[Listing 7-2](#9781430242093_Ch07.xhtml#Lis2).** SQL Command for Entering a
    Record into the Member Table*


    INSERT INTO Member (name, address)


    VALUES (‘Green, Ruth’ ‘36 Some Street, Christchurch’ )


    ![9781430242093_Fig07-05.tif](images/9781430242093_Fig07-05_fmt.jpeg)


    [**Figure 7-5**](#9781430242093_Ch07.xhtml#FG5). Entering data through the MS
    Access interface


    Choosing Data Types


    Each attribute in a class becomes a *field* or a column in a table. When we create
    the table, we need to provide a name for the field (e.g., name, address) and specify
    the type of data that will be stored in that field. Database products often offer
    a bewildering number of different data types, but they basically fall into the
    following groups:


    **Character types**: These allow you to enter any combination of characters—numbers,
    letters, and punctuation. They are used for names, addresses, descriptions, and
    so on. You usually need to provide a maximum length for the data going into the
    field. In SQL, a type of VARCHAR(60) would allow you to enter any number of characters
    up to 60\. In Access, the equivalent type is called Text. If you have very large
    amounts of text (notes, discussions, and so on), you might like to look at other
    types (e.g., Text in SQL Server or Memo in Access).


    **Integer types**: These types are for entering numbers with no fractional part.
    They are great for ID numbers such as customer numbers and for anything that you
    can count. Database systems often provide different–sized integer types (long,
    short, byte, etc.) that have different maximum numbers that can be entered. Unless
    you have particular performance problems or extremely large amounts of data, you
    will probably be fine if you use the ordinary integer type (INT in SQL). Just
    check that the biggest number it can handle is large enough for your data.


    **Numbers with a fractional part**: These are used for things that you measure
    (heights, weights, etc.) and also for numbers that result from calculations such
    as averages. Most of the time you will be just fine with what is called a *float*
    or *single* (depending on the product you are using). Other types exist if you
    need particularly accurate measurements or calculations. One situation when a
    float may not be suitable is when you need to record rather large amounts of money
    accurately. Many products now provide *money* or *currency* types for this situation,
    or you may find the type is called something like *fixed–length decimal*. These
    types enable you to have many significant figures so that you can accurately keep
    track of your billions, down to a fraction of a cent!


    **Dates:** No prizes for guessing the type of data you can put in fields with
    these types. If your product has different date types, some may allow you to include
    times and others may allow you to access dates further into the past or future.


    Why is it important to get the correct data type? You could argue that since you
    can put anything in a character field, you can have character fields for everything
    (and I’ve seen it done!). There are three main reasons why it is important to
    choose an appropriate data type for each of your fields:


    **Constraints on the values:** A character field type has no constraints on what
    you can enter; however, most other fields do. Number fields won’t allow you to
    accidentally mistype a number, say, by putting in an extra decimal point or a
    letter “O” instead of the number 0\. Dates won’t allow February 29 unless it is
    in a leap year, and so on. For this reason, phone numbers, which are likely to
    have extra symbols like ( ) for area codes, need to be stored in character rather
    than number fields.


    **Ordering:** Different types of fields have different ways for comparing or ordering
    values. For example, character fields can be sorted alphabetically (A to Z), number
    fields numerically (small to large), and dates chronologically (older first).
    If you store numbers in character fields and then ask your product to sort them
    for you, you might get something like this: 10, 12, 123, 2, 200, 36\. Dates in
    a character field might be sorted like this: August 1, 2012; February 1, 2012;
    May 4, 2012\. Can you see why?'
  trans: "\n# 设计数据库表\n\n第一步是为每个类设计一个数据库表。类的属性将成为表中的字段或列名，当数据被添加时，表中的每一行或记录将代表一个对象。例如，作为开始，我们将为图\
    \ 7-2 中的`Member`类创建一个名为`Member`的表。该表将有两个字段或列，一个用于存储成员的姓名，一个用于存储地址。然后，我们将为每个成员对象（例如，John\
    \ Smith，83 SomePlace，Christchurch）在表中添加一行。\n\n## 创建表\n\n所有关系数据库都允许你使用 SQL 创建表，SQL\
    \ 是一种用于创建、更新和查询数据库的语言。首先，我们需要一个存储所有表的数据库。要创建一个表，我们需要提供表的名称以及每列的名称和域。域指定了该特定列允许的值集。我们将在本章后面稍作讨论域。对于许多目的，仅指定数据类型就足够了，例如日期（8/4/12）、一段文本或一组字符（\"\
    Mary Smith\"）、一个整数（467）或其他类型的数字（3.57）。特定的数据库产品提供不同的数据类型，我们将在“选择数据类型”一节中稍后讨论合适的选择。\n\
    \n除了提供 SQL 作为创建表的方式外，许多数据库还提供更图形化的前端，用户可以通过它提供有关列及其数据类型的信息。创建一个非常简单的`Member`表的等效方式如清单\
    \ 7-1 以及图 7-3 和图 7-4 所示。图 7-3 显示了 MySQL Workbench 前端，而图 7-4 显示了 MS Access 中的等效界面。这两个程序都会生成类似于清单\
    \ 7-1 所示的 SQL 语句。请注意，这两个字段的数据类型在 Access 中称为`Text`，在 SQL 中称为`VarChar`。它们都表示用户将能够输入最多指定最大数量（姓名为\
    \ 25，地址为 40）的任意数量的字符。\n\n**清单 7-1.** 用于创建包含两个字段的 Member 表的标准 SQL 命令\n\n```sql\n\
    CREATE TABLE Member (\n    member_name VARCHAR(25),\n    member_address VARCHAR(40)\n\
    );\n```\n\n![9781430242093_Fig07-03.tif](img/9781430242093_Fig07-03.jpg)\n\n**图\
    \ 7-3**. 在 MySQL Workbench 中创建 Member 表\n\n![9781430242093_Fig07-04.tif](img/9781430242093_Fig07-04_fmt.jpeg)\n\
    \n**图 7-4**. 在 Microsoft Access 中创建 Member 表\n\n正如你在图 7-3 和图 7-4 中看到的，列还有许多其他可能的规格说明。我们将在后面讨论其中的一些。现在我们只是为每列声明了名称和数据类型的最低要求。表创建后，我们就可以输入数据。对于`Member`表，我们将为每个成员对象输入一行。同样，这可以通过如清单\
    \ 7-2 中的 SQL 命令完成，或者对于许多产品，可以通过类似表格的前端完成，如 Access 中的图 7-5 所示。\n\n**清单 7-2.** 用于向\
    \ Member 表插入记录的 SQL 命令\n\n```sql\nINSERT INTO Member (name, address)\nVALUES ('Green,\
    \ Ruth', '36 Some Street, Christchurch');\n```\n\n![9781430242093_Fig07-05.tif](img/9781430242093_Fig07-05_fmt.jpeg)\n\
    \n**图 7-5**. 通过 MS Access 界面输入数据\n\n## 选择数据类型\n\n类中的每个属性都成为表中的一个`field`或列。当我们创建表时，我们需要为该字段提供一个名称（例如，`name`，`address`）并指定将存储在该字段中的数据类型。数据库产品通常提供数量惊人、各不相同的数据类型，但它们基本上分为以下几类：\n\
    \n**字符类型**：这些类型允许你输入任意组合的字符——数字、字母和标点符号。它们用于姓名、地址、描述等。你通常需要为进入该字段的数据提供一个最大长度。在\
    \ SQL 中，`VARCHAR(60)`类型允许你输入最多 60 个字符。在 Access 中，等效类型称为`Text`。如果你有大量文本（注释、讨论等），你可能需要查看其他类型（例如，SQL\
    \ Server 中的`Text`或 Access 中的`Memo`）。\n\n**整数类型**：这些类型用于输入没有小数部分的数字。它们非常适合用于客户编号等\
    \ ID 号以及任何你可以计数的东西。数据库系统通常提供不同大小的整数类型（`long`、`short`、`byte`等），它们可以输入的最大数字也不同。除非你有特定的性能问题或数据量极大，否则使用普通整数类型（SQL\
    \ 中的`INT`）可能就足够了。只需检查它能处理的最大数字是否足够你的数据。\n\n**带小数部分的数字**：这些用于你测量的东西（身高、体重等）以及诸如平均值等计算产生的数字。大多数情况下，使用称为`float`或`single`（取决于你使用的产品）的类型就足够了。如果你需要特别精确的测量或计算，还存在其他类型。一种`float`可能不适用的情况是当你需要准确记录相当大数额的金钱时。许多产品现在为此提供了`money`或`currency`类型，或者你可能会发现该类型被称为类似`fixed-length\
    \ decimal`。这些类型使你能够拥有许多有效数字，从而可以准确地跟踪你的数十亿资产，精确到几分之一美分！\n\n**日期**：不用猜也能知道你可以在这类字段中存放什么类型的数据。如果你的产品有不同的日期类型，有些可能允许你包含时间，而另一些可能允许你访问更久远的过去或将来的日期。\n\
    \n为什么选择正确的数据类型很重要？你可以争辩说，既然你可以将任何东西放入字符字段，那么你可以为所有东西都使用字符字段（我确实见过这么做的！）。选择适合每个字段的数据类型主要有三个原因：\n\
    \n**值的约束**：字符字段类型对你可输入的内容没有约束；然而，大多数其他字段类型有约束。数字字段不允许你意外地输入错误，例如，输入额外的小写字母`O`而不是数字`0`。日期字段不允许输入\
    \ 2 月 29 日，除非是闰年，等等。因此，电话号码（可能包含括号`()`等额外符号）需要存储在字符字段而不是数字字段中。\n\n**排序**：不同类型的字段有不同的比较或排序值的方法。例如，字符字段可以按字母顺序（A\
    \ 到 Z）排序，数字字段可以按数字顺序（从小到大）排序，日期可以按时间顺序（较早的优先）排序。如果你将数字存储在字符字段中，然后要求你的产品对它们排序，你可能会得到类似这样的结果：10，12，123，2，200，36。字符字段中的日期可能像这样排序：August\
    \ 1，2012；February 1，2012；May 4，2012。你能看出为什么吗？\n"
- fmt: "**Calculations:** Your database product can do arithmetic and perform other\
    \ functions on your data, but only if it is the correct type. For example, it\
    \ will be able to add, multiply, and average numbers; figure out how many days\
    \ fall between two dates; and look for particular characters in a piece of text.\
    \ You need to have the correct types in order to take advantage of this functionality.\
    \ And getting back to phone numbers, you never want to subtract them, average\
    \ them, or order them numerically, so they can and should generally be stored\
    \ in a character field type.\n\n## Domains and Constraints\n\nA domain is a set\
    \ of values allowed for an attribute or field. For something like a product description\
    \ it might be sufficient for the domain to be any set of characters up to some\
    \ specified length. Other attributes might have more specific domains. For example,\
    \ a gender attribute might only allow the values “M” or “F”; a day of the week\
    \ might be constrained to the characters “Mon,” “Tue,” “Wed,” “Thu,” “Fri,” “Sat,”\
    \ and “Sun”; possible marks for an exam might be whole numbers between 0 and 100.\n\
    \nSome database products (e.g., SQL Server) allow users to create their own domains\
    \ or data types. For example, you might define the type `ExamMark` as an integer\
    \ between 0 and 100. This user defined domain or type can then be used in all\
    \ the tables in the database. Other products (e.g., Access) do not permit the\
    \ creation of domains, but all products allow constraints to be declared on individual\
    \ columns. For instance, we could declare `gender` as being a character type of\
    \ length 1 with the constraint that it can only accept the values “M” or “F.”\
    \ The difference between a constraint and a domain is that the former has to be\
    \ specified in every table whereas the latter only needs to be declared once in\
    \ the database.\n\nThe SQL code for creating a table with a constraint on the\
    \ values for a `gender` field is shown in [Listing 7-3](#9781430242093_Ch07.xhtml#L3).\n\
    \n**[Listing 7-3](#9781430242093_Ch07.xhtml#Lis3). SQL for Creating a Table with\
    \ a Constraint**\n\n```sql\nCREATE TABLE Member (\n    member_name VARCHAR(25),\n\
    \    member_address VARCHAR(40),\n    gender VARCHAR(1) CHECK gender IN (‘M’,\
    \ ‘F’)\n)\n```\n\nOne very important constraint is specifying whether a value\
    \ is required or can be left empty. A field with nothing in it is said to be `null`,\
    \ and when a table is created we can specify which fields are not allowed to have\
    \ nulls. This is shown in SQL in [Listing 7-4](#9781430242093_Ch07.xhtml#L4).\n\
    \n**[Listing 7-4](#9781430242093_Ch07.xhtml#Lis4). SQL for Specifying That the\
    \ Name Field Must Have Values**\n\n```sql\nCREATE TABLE Member (\n    member_name\
    \ VARCHAR(20) NOT NULL,\n    member_address VARCHAR(45),\n    gender VARCHAR(1)\
    \ CHECK gender IN (‘M’, ‘F’)\n)\n```\n\nLooking at the code in [Listing 7-4](#9781430242093_Ch07.xhtml#L4),\
    \ it is reasonable to ask why we haven’t insisted `gender` must always have a\
    \ value as well. All members have a gender, after all. In general, there are two\
    \ main reasons why we might need to put a `null` in a field: either the field\
    \ doesn’t apply for a particular record (a person may or may not have a driver’s\
    \ license number) or the field does apply, but at the moment we don’t know the\
    \ actual value. For the situation with `gender` then, clearly the value applies,\
    \ but there could be situations where we do not know what it is. If we force a\
    \ value to always be entered, we risk not being able to enter the record or having\
    \ a distressed data entry operator taking a guess at a likely value.\n\nConsider\
    \ a university administrator entering details from a stack of student applications,\
    \ a couple of which have left the box for gender empty. The university would much\
    \ rather have the student’s information entered incompletely than not at all.\
    \ At least then they can extract some fees and contact the person about the gender\
    \ at a later time. What about name—should that be allowed to be `null`? It is\
    \ always a judgment call, but personally I think recording details about a nameless\
    \ student is probably going to result in trouble somewhere down the line.\n\n\
    Even if you think a value is going to be essential for the accuracy of your data,\
    \ do not underestimate the likelihood that disallowing `null`s might cause an\
    \ incorrect value to be entered. I find myself doing this all the time when filling\
    \ in web forms for US sites that demand a value for a state. I live in New Zealand.\
    \ We don’t have states, so I just make something up. Some sites accept “XXX,”\
    \ while others demand a real US state; in those cases I use “Virginia.” I don’t\
    \ know why. What I do know is that this situation drives me crazy, and that any\
    \ statistics being gathered about the states of site visitors are going to be\
    \ hopelessly inaccurate.\n\n### Checking Character Fields\n\nCharacter fields\
    \ are a bit different from other field types. With a character field, we can enter\
    \ anything we like (if there are no other constraints), and so it is possible\
    \ to enter several values into a field. Other fields such as numbers and dates\
    \ only ever allow one value to be entered.\n\nYou have seen examples of storing\
    \ several values in one character field in [Figure 7-5](#9781430242093_Ch07.xhtml#F5).\
    \ The `member_name` field as it stands could contain data about the first name,\
    \ last name, possibly other names, initials, and titles. To find the record shown\
    \ in [Figure 7-5](#9781430242093_Ch07.xhtml#F5) is going to be very difficult.\
    \ Will the user know whether to search for Mrs. Green, Mrs. Rose Green, Rose Green,\
    \ Mrs. R. Green, or Ms. Green? It is also going to be difficult to sort the records\
    \ sensibly. We usually want to order people by last names, and this is not going\
    \ to be possible with the way we are recording the data in [Figure 7-5](#9781430242093_Ch07.xhtml#F5).\
    \ The way the address data is being recorded is going to make it difficult to\
    \ select records by city or print nicely formatted address labels easily. Separating\
    \ the data into fields as in [Figure 7-6](#9781430242093_Ch07.xhtml#F6) makes\
    \ the data much more useful. A good rule of thumb is that any data that you are\
    \ likely to want to search for, sort by, or extract in some way should be in a\
    \ field all by itself.\n\n![9781430242093_Fig07-06.tif](images/9781430242093_Fig07-06_fmt.jpeg)\n\
    \n[**Figure 7-6**](#9781430242093_Ch07.xhtml#FG6). Improved fields to describe\
    \ a customer\n\nIf the accuracy of values in a field is really crucial to the\
    \ project, maybe that particular piece of information should actually be in a\
    \ class of its own. You might recall that we separated `genus` out of our `Plant`\
    \ class (refer to the discussion of [Figure 2-12](#9781430242093_Ch07.xhtml#F12))\
    \ because its accuracy was important and we didn’t want any misspellings. In the\
    \ table in [Figure 7-6](#9781430242093_Ch07.xhtml#F6) we might ask how important\
    \ it is for the values in the `city` field to be accurately recorded. If accuracy\
    \ is essential (e.g., we regularly want to target advertising to customers in\
    \ a particular city), we may need two classes, `City` and `Customer`, with a 1–Many\
    \ relationship between them. If we only want the address for sending general mail,\
    \ accuracy isn’t so important, as the postman can probably cope with the odd misspelling.\n\
    \n## Primary Key"
  raw: '**Calculations:** Your database product can do arithmetic and perform other
    functions on your data, but only if it is the correct type. For example, it will
    be able to add, multiply, and average numbers; figure out how many days fall between
    two dates; and look for particular characters in a piece of text. You need to
    have the correct types in order to take advantage of this functionality. And getting
    back to phone numbers, you never want to subtract them, average them, or order
    them numerically, so they can and should generally be stored in a character field
    type.


    Domains and Constraints


    A domain is a set of values allowed for an attribute or field. For something like
    a product description it might be sufficient for the domain to be any set of characters
    up to some specified length. Other attributes might have more specific domains.
    For example, a gender attribute might only allow the values “M” or “F”; a day
    of the week might be constrained to the characters “Mon,” “Tue,” “Wed,” “Thu,”
    “Fri,” “Sat,” and “Sun”; possible marks for an exam might be whole numbers between
    0 and 100.


    Some database products (e.g., SQL Server) allow users to create their own domains
    or data types. For example, you might define the type ExamMark as an integer between
    0 and 100\. This user defined domain or type can then be used in all the tables
    in the database. Other products (e.g., Access) do not permit the creation of domains,
    but all products allow constraints to be declared on individual columns. For instance,
    we could declare gender as being a character type of length 1 with the constraint
    that it can only accept the values “M” or “F.” The difference between a constraint
    and a domain is that the former has to be specified in every table whereas the
    latter only needs to be declared once in the database.


    The SQL code for creating a table with a constraint on the values for a gender
    field is shown in [Listing 7-3](#9781430242093_Ch07.xhtml#L3).


    ***[Listing 7-3](#9781430242093_Ch07.xhtml#Lis3).** SQL for Creating a Table with
    a Constraint*


    **CREATE TABLE Member** (


    member_name VARCHAR(25),


    member_address VARCHAR(40),


    gender VARCHAR(1) CHECK gender IN (‘M’, ‘F’)


    )


    One very important constraint is specifying whether a value is required or can
    be left empty. A field with nothing in it is said to be *null*, and when a table
    is created we can specify which fields are not allowed to have nulls. This is
    shown in SQL in [Listing 7-4](#9781430242093_Ch07.xhtml#L4).


    ***[Listing 7-4](#9781430242093_Ch07.xhtml#Lis4).** SQL for Specifying That the
    Name Field Must Have Values*


    CREATE TABLE Member (


    member_name VARCHAR(20) NOT NULL,


    member_address VARCHAR(45),


    gender VARCHAR(1) CHECK gender IN (‘M’, ‘F’)


    )


    Looking at the code in [Listing 7-4](#9781430242093_Ch07.xhtml#L4), it is reasonable
    to ask why we haven’t insisted gender must always have a value as well. All members
    have a gender, after all. In general, there are two main reasons why we might
    need to put a null in a field: either the field doesn’t apply for a particular
    record (a person may or may not have a driver’s license number) or the field does
    apply, but at the moment we don’t know the actual value. For the situation with
    gender then, clearly the value applies, but there could be situations where we
    do not know what it is. If we force a value to always be entered, we risk not
    being able to enter the record or having a distressed data entry operator taking
    a guess at a likely value.


    Consider a university administrator entering details from a stack of student applications,
    a couple of which have left the box for gender empty. The university would much
    rather have the student’s information entered incompletely than not at all. At
    least then they can extract some fees and contact the person about the gender
    at a later time. What about name—should that be allowed to be null? It is always
    a judgment call, but personally I think recording details about a nameless student
    is probably going to result in trouble somewhere down the line.


    Even if you think a value is going to be essential for the accuracy of your data,
    do not underestimate the likelihood that disallowing nulls might cause an incorrect
    value to be entered. I find myself doing this all the time when filling in web
    forms for US sites that demand a value for a state. I live in New Zealand. We
    don’t have states, so I just make something up. Some sites accept “XXX,” while
    others demand a real US state; in those cases I use “Virginia.” I don’t know why.
    What I do know is that this situation drives me crazy, and that any statistics
    being gathered about the states of site visitors are going to be hopelessly inaccurate.


    Checking Character Fields


    Character fields are a bit different from other field types. With a character
    field, we can enter anything we like (if there are no other constraints), and
    so it is possible to enter several values into a field. Other fields such as numbers
    and dates only ever allow one value to be entered.


    You have seen examples of storing several values in one character field in [Figure
    7-5](#9781430242093_Ch07.xhtml#F5). The member_name field as it stands could contain
    data about the first name, last name, possibly other names, initials, and titles.
    To find the record shown in [Figure 7-5](#9781430242093_Ch07.xhtml#F5) is going
    to be very difficult. Will the user know whether to search for Mrs. Green, Mrs.
    Rose Green, Rose Green, Mrs. R. Green, or Ms. Green? It is also going to be difficult
    to sort the records sensibly. We usually want to order people by last names, and
    this is not going to be possible with the way we are recording the data in [Figure
    7-5](#9781430242093_Ch07.xhtml#F5). The way the address data is being recorded
    is going to make it difficult to select records by city or print nicely formatted
    address labels easily. Separating the data into fields as in [Figure 7-6](#9781430242093_Ch07.xhtml#F6)
    makes the data much more useful. A good rule of thumb is that any data that you
    are likely to want to search for, sort by, or extract in some way should be in
    a field all by itself.


    ![9781430242093_Fig07-06.tif](images/9781430242093_Fig07-06_fmt.jpeg)


    [**Figure 7-6**](#9781430242093_Ch07.xhtml#FG6). Improved fields to describe a
    customer


    If the accuracy of values in a field is really crucial to the project, maybe that
    particular piece of information should actually be in a class of its own. You
    might recall that we separated genus out of our Plant class (refer to the discussion
    of [Figure 2-12](#9781430242093_Ch07.xhtml#F12)) because its accuracy was important
    and we didn’t want any misspellings. In the table in [Figure 7-6](#9781430242093_Ch07.xhtml#F6)
    we might ask how important it is for the values in the city field to be accurately
    recorded. If accuracy is essential (e.g., we regularly want to target advertising
    to customers in a particular city), we may need two classes, City and Customer,
    with a 1–Many relationship between them. If we only want the address for sending
    general mail, accuracy isn’t so important, as the postman can probably cope with
    the odd misspelling.


    Primary Key'
  trans: "\n**计算：** 你的数据库产品可以对数据进行算术运算和执行其他功能，但前提是数据类型必须正确。例如，它将能够对数字进行加、乘和平均运算；计算两个日期之间相隔的天数；以及在一段文本中查找特定字符。你需要拥有正确的数据类型才能利用这些功能。回到电话号码的例子，你绝不应该对它们进行减法、平均或按数字排序，因此它们通常可以且应该存储在字符字段类型中。\n\
    \n## 域与约束\n\n域是允许用于属性或字段的一组值。对于像产品描述这样的情况，域可以是任意字符集（直到某个指定长度）可能就足够了。其他属性可能具有更具体的域。例如，性别属性可能只允许值“M”或“F”；星期几可能被约束为字符“Mon”、“Tue”、“Wed”、“Thu”、“Fri”、“Sat”和“Sun”；考试的可能分数可能是\
    \ 0 到 100 之间的整数。\n\n一些数据库产品（例如 SQL Server）允许用户创建自己的域或数据类型。例如，你可以将类型 `ExamMark`\
    \ 定义为 0 到 100 之间的整数。然后，这个用户定义的域或类型可以在数据库的所有表中使用。其他产品（例如 Access）不允许创建域，但所有产品都允许在单个列上声明约束。例如，我们可以将\
    \ `gender` 声明为长度为 1 的字符类型，并约束它只接受值“M”或“F”。约束和域之间的区别在于，前者必须在每个表中指定，而后者只需在数据库中声明一次。\n\
    \n创建具有 `gender` 字段值约束的表的 SQL 代码如 列表 7-3 所示。\n\n**列表 7-3. 创建带约束的表的 SQL**\n\n```sql\n\
    CREATE TABLE Member (\n    member_name VARCHAR(25),\n    member_address VARCHAR(40),\n\
    \    gender VARCHAR(1) CHECK gender IN (‘M’, ‘F’)\n)\n```\n\n一个非常重要的约束是指定一个值是必需的还是可以留空。一个没有任何内容的字段被称为\
    \ `null`，当创建表时，我们可以指定哪些字段不允许为 null。这在 SQL 中如 列表 7-4 所示。\n\n**列表 7-4. 指定名称字段必须包含值的\
    \ SQL**\n\n```sql\nCREATE TABLE Member (\n    member_name VARCHAR(20) NOT NULL,\n\
    \    member_address VARCHAR(45),\n    gender VARCHAR(1) CHECK gender IN (‘M’,\
    \ ‘F’)\n)\n```\n\n查看 列表 7-4 中的代码，很自然会问为什么我们没有同样坚持 `gender` 也必须始终有值。毕竟所有成员都有性别。一般来说，我们可能需要在字段中放入\
    \ `null` 有两个主要原因：要么该字段不适用于特定记录（一个人可能有也可能没有驾照号码），要么该字段适用，但我们目前不知道实际值。对于 `gender`\
    \ 的情况，显然这个值适用，但也可能存在我们不知道它是什么的情况。如果我们强制要求始终输入一个值，我们可能面临无法输入记录的风险，或者导致苦恼的数据录入员猜测一个可能的值。\n\
    \n想象一位大学管理员正在处理一堆学生申请表，其中几份的性别栏留空了。大学宁愿让学生的信息不完整地录入，也不要完全不录入。至少这样他们可以收取一些费用，并在以后联系该学生询问性别。那么姓名呢——应该允许它为\
    \ `null` 吗？这通常是一个判断问题，但我个人认为，记录一个无名学生的详细信息可能会在将来导致麻烦。\n\n即使你认为某个值对于数据的准确性至关重要，也不要低估禁止\
    \ `null` 可能导致输入错误值的可能性。我在填写美国网站的表格时经常这样做，这些网站要求必须提供州（state）的信息。我住在新西兰。我们没有州，所以我只能编造一个。有些网站接受“XXX”，而另一些则要求真实的美国州名；在后一种情况下，我使用“弗吉尼亚州（Virginia）”。我不知道为什么。但我知道这种情况让我抓狂，并且任何关于网站访问者所在州的统计数据都将是极不准确的。\n\
    \n### 检查字符字段\n\n字符字段与其他字段类型略有不同。对于字符字段，我们可以输入任何我们想要的内容（如果没有其他约束），因此有可能在一个字段中输入多个值。其他字段如数字和日期只允许输入一个值。\n\
    \n你已经在 图 7-5 中看到了在一个字符字段中存储多个值的例子。`member_name` 字段目前可以包含关于名字、姓氏、可能包括其他名字、首字母和称谓的数据。要找到\
    \ 图 7-5 中显示的记录将会非常困难。用户会知道是搜索 Mrs. Green、Mrs. Rose Green、Rose Green、Mrs. R. Green\
    \ 还是 Ms. Green 吗？对记录进行合理排序也会很困难。我们通常希望按姓氏对人员排序，而按照 图 7-5 中记录数据的方式，这将无法实现。地址数据的记录方式将使得按城市选择记录或轻松打印格式美观的地址标签变得困难。将数据分离成如\
    \ 图 7-6 所示的字段，会使数据更有用。一个好的经验法则是：任何你可能希望用于搜索、排序或以某种方式提取的数据都应该单独放在一个字段中。\n\n![9781430242093_Fig07-06.tif](img/9781430242093_Fig07-06_fmt.jpeg)\n\
    \n**图 7-6**. 用于描述客户的改进字段\n\n如果某个字段中值的准确性对项目确实至关重要，那么也许这个特定的信息实际上应该自成一类。你可能还记得，我们将\
    \ `genus`（属）从我们的 `Plant`（植物）类中分离出来（参考对 图 2-12 的讨论），因为其准确性很重要，我们不希望出现任何拼写错误。在 图\
    \ 7-6 的表中，我们可能会问：`city` 字段中的值被准确记录有多重要？如果准确性至关重要（例如，我们经常希望针对特定城市的客户投放广告），我们可能需要两个类，`City`\
    \ 和 `Customer`，并在它们之间建立一对多（1-Many）关系。如果我们只需要地址用于发送普通邮件，准确性就不那么重要了，因为邮递员大概能应付偶尔的拼写错误。\n\
    \n## 主键\n"
- fmt: "\n## Primary Keys\n\nWe have taken our model and for each class we have created\
    \ a table. Each attribute in the class is represented by a field with a particular\
    \ data type, and we can apply some constraints to the values we allow into a field.\
    \ We have thus far overlooked one constraint that is so important that it gets\
    \ a section all to itself. This involves choosing a primary key for the table.\
    \ It is imperative that we can always find a particular object (or row or record\
    \ in a table). This means that all records must be unique; otherwise, you can’t\
    \ distinguish between two that are identical.\n\nConsider the consequences of\
    \ two identical records: when a member pays his annual fee, we need to connect\
    \ that payment to the member somehow. What if we have two identical rows in our\
    \ Member table for Ruth Smith? How will we know which row is associated with a\
    \ payment of fees? If we get it wrong, then one Mrs. Smith will be pretty upset\
    \ when she receives another invoice. Every member needs to be able to be uniquely\
    \ identified. There must never be two identical records in any of our tables.\n\
    \n### Determining a Primary Key\n\nA key is a field, or combination of fields,\
    \ that is guaranteed to have a unique value for every record in the table. It\
    \ is possible to learn quite a bit about a problem by considering which fields\
    \ are likely to be possible keys. We will see later that there can be more than\
    \ one set of fields that can have unique values in a table. We choose one of these\
    \ to be the primary key and then use that to enable us to identify records uniquely.\n\
    \nConsider which fields could be keys for the following table where the names\
    \ of the fields are given in parentheses after the table name:\n\n`Member` (`name`,\
    \ `address`, `phone`, `birth_date`)\n\nHow about `name` for a key? No; it is entirely\
    \ possible that we may have two members with the same name, and we will need to\
    \ be able to distinguish them. What about the combination (`name`, `address`)?\
    \ This is more promising, but then dads have been known to name their sons after\
    \ themselves, and it is not improbable that they may at various times of their\
    \ lives share the same address and be members of the same club. Many organizations\
    \ sometimes key their clients on the combination (`name`, `birth_date`), feeling\
    \ this is unlikely to be duplicated. However, there are regular horror stories\
    \ in the press of people who suddenly discover they have a namesake twin as they\
    \ struggle to fend off bailiffs and police.\n\nA potential key must be guaranteed\
    \ to be unique for every possible record. In cases like our Member table, there\
    \ is not much choice but to add a new attribute or field such as `member_number`\
    \ and then assign all members their own unique numbers so we can distinguish them.\
    \ This is sometimes called a surrogate key. In real life, we can always distinguish\
    \ individuals, but when we look at the data we are storing about them, we may\
    \ not be able to find a unique set of values. In many cases, privacy laws prevent\
    \ information such as social security or tax numbers being used to identify people,\
    \ so each business or organization is often compelled to provide its own personal\
    \ identification number.\n\nWhen we create a table in our database, we can specify\
    \ the field which is to be the primary key of the table. The SQL to do this is\
    \ shown in [Listing 7-5](#9781430242093_Ch07.xhtml#L5). Most database products\
    \ also usually provide you with an interface to help create a table and select\
    \ the field(s) that make up the primary key.\n\n**Listing 7-5. Specifying a Primary\
    \ Key**\n\n```sql\nCREATE TABLE Member (\n    member_number INT PRIMARY KEY,\n\
    \    member_name VARCHAR (25)\n)\n```\n\nWith the primary key field specified,\
    \ a constraint is put on the table that will ensure that every record must have\
    \ a unique value for `member_number`. The user will never be able to put in two\
    \ records with the same value for `member_number`, and so every member in our\
    \ table can be uniquely distinguished. The constraint also ensures that the primary\
    \ key field always has a value, so every record is certain to have a value for\
    \ `member_number`.\n\nIt is possible to get the database to automatically generate\
    \ unique values for fields like `member_number`. Depending on the product you\
    \ are using, you will find a field type called `identity`, `auto_increment`, `autonumber`,\
    \ or something similar. You can then specify some starting number and a step size,\
    \ and every new row entered into the table will automatically be assigned the\
    \ next available number.\n\n### Concatenated Keys\n\nIt isn’t always necessary\
    \ or even advisable to introduce a new automatically incrementing number field\
    \ into a table to act as a primary key. With the case of members, there was no\
    \ other way to ensure a unique field for every record, but often a unique field\
    \ or combination of fields already exists in the table. When we have a combination\
    \ of fields that can uniquely identify a record, this is referred to as a concatenated\
    \ or composite key. Thinking about which combinations of fields are possible keys\
    \ can help you discover and understand subtleties of the problem. Here is an example.\n\
    \nWhat is a possible key for the table in [Figure 7-7](#9781430242093_Ch07.xhtml#F7),\
    \ which is keeping information about students enrolling in courses?\n\n![9781430242093_Fig07-07.tif](images/9781430242093_Fig07-07_fmt.jpeg)\n\
    \n**Figure 7-7. Enrollments table**\n\n`student` will not be suitable as a key,\
    \ as a student will have a record for each of the courses in which he enrolls\
    \ (we can see that the value 17625 appears in at least two records). Similarly,\
    \ `course` will not do, as a course will have many enrollments each with its own\
    \ record (the value `COMP102` is duplicated). In fact, every column has duplicated\
    \ values, so no single field is suitable as a key.\n\nWhat about the combination\
    \ (`student`, `course`)? In the few records shown in [Figure 7-7](#9781430242093_Ch07.xhtml#F7),\
    \ this combination is always unique, but we have to be sure this will *always*\
    \ be the case for every record we may need to enter. We need to find out a bit\
    \ more about the problem. Consider this dialog:\n\n*Analyst:* Could student 17625\
    \ enroll in `COMP101` a second time to try and improve his grade?\n\n*Client:*\
    \ Yes.\n\nNow we see that `student` and `course` will *not* be a suitable key.\
    \ As soon as the student tries to enroll in the course again, we will have another\
    \ row with the same values for student number and course.\n\nLet’s try the combination\
    \ (`studentID`, `course`, `year`):\n\n*Analyst*: Is it possible for a student\
    \ to enroll in the same course again in the same year (say during the summer)?\n\
    \n*Client*: It is for some subjects.\n\n*Analyst*: If a student did reenroll in\
    \ the same subject in the summer, would you want to keep both her previous and\
    \ her new grade?\n\n*Client*: Of course!\n\nThe combination (`studentID`, `course`,\
    \ `year`) will not do as a key either because we will have to repeat the values\
    \ of the three fields when a student enrolls in the same course later in the same\
    \ year. Clearly, we need an additional attribute (semester maybe) to differentiate\
    \ these enrollments. Thinking about a possible key has revealed a little more\
    \ of the complexity of this problem and helped us spot a missing attribute or\
    \ field.\n\nWhenever we are checking the suitability of a combination of fields\
    \ as a key, we need to find a question that checks that the combination will always\
    \ be unique. In this case, we needed to ask questions such as the following:\n\
    \n*Is a student ever likely to enroll in a course more than once?*\n*Yes. (`student`,\
    \ `course`) is not a suitable key.*\n\n*Is it possible that a student will enroll\
    \ in the same course more than once in a single year?*\n"
