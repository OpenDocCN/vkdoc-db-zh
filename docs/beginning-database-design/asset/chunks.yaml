- fmt: 'Once we are satisfied that our class diagram captures the information correctly,
    we can then represent the diagram as a set of tables and primary and foreign keys
    as described in [`Chapter 7`](#9781430242093_Ch07.xhtml). At this point, it is
    then a good idea to look at each table and see whether it is normalized. We might
    have an `Employee` table with fields `empID`, `last_name`, `first_name`, `salary`,
    and `tax_rate`, with `empID` as the primary key. Now we might ask about the functional
    dependencies between `salary` and `tax_rate`. If there is a functional dependency,
    our table is not in third normal form (`tax_rate` depends on something other than
    the primary key) and it should not be in this table.


    The data model is great for the big picture, and normalization is great for the
    finer details. Use both these tools to ensure that you get the best structure
    for your database.


    ## Additional Considerations


    We have looked at functional dependencies and the normal forms that are defined
    using them: first, second, third, and Boyce–Codd normal form. There are other
    dependencies that can exist between pieces of data and additional normal forms
    that protect against some problems that may occur. I am not going to describe
    these in any very formal way, but I will point out what aspects of data models
    they relate to.


    ### Fourth and fifth normal forms


    Fourth and fifth normal forms deal with tables for which there are multi–valued
    dependencies. We have already seen a case where this can occur. Let’s reconsider
    the sports team example from [`Chapter 5`](#9781430242093_Ch05.xhtml). We have
    `Player`s, `Match`es, and `Team`s. If I name a team, there are multiple values
    of match associated with that team, and similarly multiple associated players.
    Let’s say we are particularly interested in matches—who plays in them and what
    teams are involved. We need to consider whether we should have the intermediate
    table (`Appearance`) and/or the other relationships in [`Figure 8-12`](#9781430242093_Ch08.xhtml#F12).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-12_fmt.jpeg)


    `Figure 8-12.` What relationships are needed between `Member`, `Team`, and `Match`?


    If we represent the model in [`Figure 8-12`](#9781430242093_Ch08.xhtml#F12) in
    a relational database, we would need tables for each of the classes `Member`,
    `Team`, `Match`, and `Appearance`. We would also need two additional tables to
    represent the Many–Many relationships between `Match` and `Team`, and between
    `Match` and `Member`. [`Figure 8-13`](#9781430242093_Ch08.xhtml#F13) shows some
    data that could be in the tables.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-13_fmt.png)


    `Figure 8-13.` Sample data representing the relationships in [`Figure 8-12`](#9781430242093_Ch08.xhtml#F12)


    For each of the tables in [`Figure 8-13`](#9781430242093_Ch08.xhtml#F13), the
    primary key is made up of all the fields. There are no non–key fields, and there
    are no functional dependencies. They are all therefore in Boyce–Codd normal form
    because there are no determinants that are not possible keys (there are no determinants!).
    The question is, “Do we need all three tables?” There is clearly some repeated
    information with the data as it stands. For example, the fact that Jim is involved
    in `MatchA` can be seen from both the `MatchMember` and the `Appearance` tables.
    When information is stored twice, there is always the danger of it becoming inconsistent.
    So what (if anything) do we need to get rid of?


    A match has many members involved in it and many (two) teams taking part. The
    question we need to answer is, “Are these two sets of information independent
    for our problem?” If they are, we don’t need (and shouldn’t have) the `Appearance`
    table. However, as we discussed in [`Chapter 5`](#9781430242093_Ch05.xhtml), it
    is likely that we will need to know which member played for which team in a particular
    match. We cannot work that out with just the data in the other two tables (nor
    even if we included a `MemberTeam` table). So for this situation where we need
    to know “who played for which team in which match,” the `Appearance` table is
    necessary.


    What about the other two tables in [`Figure 8-13`](#9781430242093_Ch08.xhtml#F13)?
    If we have the `Appearance` table, do we need these other two as well? Recapping
    the discussion in [`Chapter 5`](#9781430242093_Ch05.xhtml), the questions we need
    to ask are, “Do we want to know about matches and teams independent of the members
    involved?” and, “Do we want to know about members and matches independent of the
    teams?” Let’s think about the first question. What happens when the original draw
    for the competition is determined? We will probably need to record in our database
    that `Team1` and `Team2` are scheduled to play in `MatchA`. If we only have the
    `Appearance` table, we cannot insert appropriate records. Why? Because as all
    the fields are part of the primary key, none can be empty, and we have nothing
    to put in the `Member` field. We want to record the fact that this match is scheduled,
    and we need to do that independently of the members involved. We may also have
    additional information to record about matches and teams that is independent of
    members. For example, we will probably need to record a score. Without a `MatchTeam`
    table, where would we store that? Which row in the `Appearance` table would it
    go in? Many of them. So yes, we do need the `MatchTeam` table if we want to store
    all this information. You can go through a similar thought process to decide whether
    the table `MatchMember` is also necessary.


    These sorts of questions arise every time we have three (or more) classes that
    are interrelated in any way. Are there situations when we need to know about combinations
    of objects from all three classes? Do we have information about combinations of
    objects from two of the classes independent of the third? If we figure out the
    answers to these questions correctly, we can be confident that the final tables
    will adequately represent the problem.


    ## Summary


    If we have poorly structured tables in a database, we run the risk of having problems
    with updating data. These include:


    *   **Modification problems**: If information is repeated, it will become inconsistent
    if not updated everywhere.

    *   **Insertion problems**: If we don’t have information for each of the primary
    key fields, we will not be able to enter a record

    *   **Deletion problems**: If we delete a record to remove a piece of information,
    we might as a consequence lose some additional information.


    By understanding the concepts of functional dependencies, primary keys, and normalization,
    we can ensure that our tables are structured in such a way as to avoid the update
    problems described previously.


    *   A functional dependency exists between two sets of fields in a table: If field
    `A` functionally determines field `B`, this means that if I know the value for
    `A`, I can uniquely tell you a value for `B`.

    *   A primary key is a (minimal) set of field(s) that functionally determines
    all the other fields in the table.

    *   The first three normal forms can be summed up as `A table is based on the
    key, the whole key, and nothing but the key`.

    *   A table in Boyce–Codd normal form is one in which every determinant could
    be a primary key.

    *   Where you have three or more interrelated classes, ask questions about what
    information, if any, you need to know that involves all three classes and what
    information involves two classes independent of the third.


