    either a lecturer or a student.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-15_fmt.png)


    [**Figure 6-15.**](#9781430242093_Ch06.xhtml#FG15) Students and lecturers are
    distinct.


    [Figure 6-15](#9781430242093_Ch06.xhtml#F15) copes with the simple case of lecturers
    and students being distinct. What is more likely, however, is that there is some
    overlap between the two. What if lecturer John is also doing some part–time study
    for an arts degree and student Linda is doing some part–time teaching to fund
    her fees? Where do we store John’s major and Linda’s salary?


    We could make another two objects, an additional **Student** object for John and
    a **Lecturer** object for Linda, but there are problems with this approach. We
    would now have six **Person** objects in total when in reality there are only
    four people. Any counts or summaries of numbers of people will be inaccurate.
