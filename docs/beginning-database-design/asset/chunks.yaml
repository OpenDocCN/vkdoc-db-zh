    [**Figure 6-22.**](#9781430242093_Ch06.xhtml#FG22) 表示组合模式的数据库表


    ## 并不容易


    继承提供了一些非常优雅的方式来为非常复杂的问题建模。然而，获得一个能处理所有最终数据的类和子类层次结构是非常困难的。我们在本章中仅涉及了继承的*数据*方面。如果我们需要向类添加*行为*（或方法），处理继承的类会变得相当困难。然而，添加行为超出了本书中考虑的基于数据的问题的范围。


    即使对于静态数据，当我们尝试设计继承层次结构时，仍然可能遇到问题。考虑 [Figure 6-23](#9781430242093_Ch06.xhtml#F23)
    中的模型。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-23_fmt.jpg)


    [**Figure 6-23.**](#9781430242093_Ch06.xhtml#FG23) 一位业余生物学家用于保存动物数据的模型


    将动物分为鱼类、哺乳动物、鸟类等，在输入有关熊、狗、鲨鱼和麻雀的数据时可能效果很好。但是当我们遇到鲸鱼时会发生什么？鲸鱼完全不符合 [Figure 6-13](#9781430242093_Ch06.xhtml#F13)
    的模型。鲸鱼是哺乳动物，但它也需要被显示为生活在海水中，类似于鱼类。如果数据库已经实现并输入了大量数据，插入层级或移动子类之间可能非常困难。一开始就正确设计非常重要。构思不佳的继承可能比解决的问题带来更多问题，因此在数据库问题中要非常谨慎地使用它。


    在 [Chapter 7](#9781430242093_Ch07.xhtml) 中，我们将看到如何在关系数据库中捕获这些数据模型的最重要部分。


    ## 总结


    继承可能适用的情况包括以下几种：


    [^1]: 设计模式是软件设计中常见问题的通用可重用解决方案。'
  raw: '![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-18_fmt.png)


    [**Figure 6-18.**](#9781430242093_Ch06.xhtml#FG18) Using roles (contracts) as
    an alternative to multiple inheritance


    The approach in [Figure 6-17](#9781430242093_Ch06.xhtml#F17) is easy to adapt
    when new roles are added (e.g., administrator, cleaner). If we wish to include
    administrators with information specific to their contracts, we just add another
    subclass, **Administrator_Contract**, to our **Contract** class.


    There is a slight problem, however. In [Figure 6-17](#9781430242093_Ch06.xhtml#F17),
    we have that a person can be related to many contracts, but we don’t have any
    constraints as to which type of contracts. The model does not prevent Linda being
    associated with several **Lecturer** contracts and/or several **Student** contracts.
    In reality, this may be what the problem actually requires. Linda may follow her
    arts degree with a science degree. John may be promoted and take out a new contract
    for $120,000\. We can add some date attributes to the parent **Contract** class
    so the contracts can be recognized as being in succession or overlapping. Overall,
    the model in [Figure 6-17](#9781430242093_Ch06.xhtml#F17) is very ﬂexible and
    allows us to address many complications in a transparent manner.


    However, we need to be sure the objectives of our problem require this sort of
    accuracy about people and the roles they undertake. If the objective is to keep
    reliable statistics about different types of employees, their pay, and their qualifications,
    then this sort of model is necessary to help us understand what is going on. If
    that information is of only secondary importance (i.e., our main objective is
    keeping student enrollments and results), then maybe we do not need to introduce
    subclasses to keep the specialized data about the other more minor roles that
    people might play.


    Composites and Aggregates


    Often we have objects that are made up of other objects: a forest is made up of
    trees or a building is made up of rooms. Some people use a special notation for
    this type of relationship, but I’ve never found it particularly helpful to do
    so.


    When dealing with situations in which we have this type of composition or aggregation
    of objects, inheritance can become useful. Consider a building that has a number
    of rooms, as in [Figure 6-19](#9781430242093_Ch06.xhtml#F19). Every year the building
    must undergo a safety check. Occasionally an individual room will need to be checked.
    We can have a **Check** class which records the date. Should the **Check** class
    be associated with the **Building** or the **Room** class, or both?


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-19_fmt.jpeg)


    [**Figure 6-19.**](#9781430242093_Ch06.xhtml#FG19) A building has many rooms.


    For the purposes of this problem a **Room** and a **Building** have something
    in common. They both can be associated with safety checks. This therefore becomes
    a candidate for an inheritance solution. A first attempt is shown in [Figure 6-20](#9781430242093_Ch06.xhtml#F20).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-20_fmt.jpeg)


    [**Figure 6-20.**](#9781430242093_Ch06.xhtml#FG20) Buildings and rooms are both
    types of structures that may have safety checks.


    Now we can store data about a single check that incorporates a building (and we
    know what rooms were included). However, if necessary the check can be associated
    with a single room. While this solution is fine, it can be made much more general
    by using a software pattern. There are a number of design patterns[¹](#9781430242093_Ch06.xhtml#fn1)
    that are useful for software developers. They mostly deal with behavior whereas
    our focus is on data. The solution in [Figure 6-21](#9781430242093_Ch06.xhtml#F21)
    is based on the **Composite** pattern.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-21_fmt.jpeg)


    [**Figure 6-21.**](#9781430242093_Ch06.xhtml#FG21) Using the Composite pattern.
    Checks are made on components, which may be a single room or a composite of other
    components.


    The model in [Figure 6-21](#9781430242093_Ch06.xhtml#F21) says that we have something
    (a component) on which a safety check can be made. That component may be an individual
    component (in this case a room) or a collection of other components. For instance,
    we can have a **Composite** object, which is a building that is made up of rooms.
    This would be analagous to [Figure 6-20](#9781430242093_Ch06.xhtml#F20). However,
    our new model is more general because a **Composite** can be made up of other
    composites. For example: an industrial estate may be made up of buildings, each
    being made up of ﬂoors, which each contain rooms. With the **Composite** pattern
    in [Figure 6-21](#9781430242093_Ch06.xhtml#F21), we can record safety checks at
    any of these levels (room, ﬂoor, building, etc.).


    We will look at how to represent inheritance in a relational database in [Chapter
    7](#9781430242093_Ch07.xhtml). In the meantime, the tables in [Figure 6-22](#9781430242093_Ch06.xhtml#F22)
    show how the information might be recorded. The **Check** table shows that Component
    3 was checked on 3/02/2012\. From the **Composite** table we can deduce (by looking
    down the right hand column) that **Components** 40 and 60 belong in 3 and that
    **Components** 113, 115, and 117 belong in 40 or 60\. The **Component** table
    records what all these entities are, so we know that the check on 3/02/2012 was
    on the Forbes Building, which contains a 4^(th) and 6^(th) ﬂoor, which in turn
    contain rooms F403, F409, and F632\. On 10/02/2012 there was a check for 113 (Room
    F408) which has no subparts (does not appear in the right hand column of the **Composite**
    table).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-22_fmt.png)


    [**Figure 6-22.**](#9781430242093_Ch06.xhtml#FG22) Database tables representing
    the Composite pattern


    It Isn’t Easy


    Inheritance offers some wonderfully elegant ways to model very complicated problems.
    However, getting a hierarchy of classes and subclasses that will cope with all
    the eventual data is very difficult. We have only touched on the *data* aspects
    of inheritance here in this chapter. Dealing with inherited classes becomes considerably
    more difficult if we need to add *behavior* (or methods) to our classes. Adding
    behavior, however, is outside the scope of the data-based problems we are considering
    in this book.


    Even for just static data, we can still run into problems when we try to design
    an inheritance hierarchy. Consider the model in [Figure 6-23](#9781430242093_Ch06.xhtml#F23).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-23_fmt.jpg)


    [**Figure 6-23.**](#9781430242093_Ch06.xhtml#FG23) An amateur biologist’s model
    for keeping data about animals


    Dividing animals up into fish, mammals, birds, and so on may do quite well as
    we enter data about bears, dogs, sharks, and sparrows. But what happens when we
    come to whales? Whale doesn’t fit at all into [Figure 6-13](#9781430242093_Ch06.xhtml#F13)’s
    model. A whale is a mammal, but it also needs to be shown as living in sea water,
    similar to a fish. If a database has been implemented and lots of data entered,
    it can be very difficult to insert layers or move subclasses between layers. Getting
    it correct at the start is very important. Poorly thought–out inheritance can
    cause more problems than it solves, so use it very sparingly in database problems.


    In [Chapter 7](#9781430242093_Ch07.xhtml), we will see how to capture the most
    important parts of these data models in a relational database.


    Summary


    Situations when inheritance is a possibility include the following:'
