- fmt: '# 函数依赖与规范化


    对于[图 8-2](#9781430242093_Ch08.xhtml#F2)所描述的情况，如果我知道一名员工的ID是1001，我就可以告诉你他的姓氏是Smith。那么反过来是否也成立？如果我知道一名员工的姓氏，我能唯一确定他的员工ID号吗？从表中显示的数据来看，你可能会说“可以”。然而，要使一个函数依赖成立，它必须对于将来可能存入我们表中的任何数据都为真。我们知道，长远来看，很可能有多名员工都叫Smith，因此仅凭姓氏无法唯一确定ID。或者更正式地说，`last_name`不能函数决定`empID`。


    让我们尝试另一个例子。对于[图 8-2](#9781430242093_Ch08.xhtml#F2)中的数据库表，员工ID号和他所分配的项目之间是否存在函数依赖？如果我知道员工的ID是1001，我无法告诉你一个*唯一*的项目编号。它可能是项目3或项目6，因此员工的ID号不能函数决定（或唯一决定）一个项目编号。


    确定函数依赖需要我们理解具体情况的复杂性。对于员工和项目的情况，我们需要知道一个员工是否只能被分配到一个项目，或者他是否可以被分配到许多不同的项目。这听起来熟悉吗？确定属性之间是否函数依赖，与我们在理解[第4章](#9781430242093_Ch04.xhtml)数据模型时所经历的同类型问题有关。


    对于包含`Employee`类和`Project`类的数据模型，我们会问：“一个员工是否可能被关联到多个项目？”


    如果答案是“否”，那么员工和项目之间就是1对多（1-Many）关系，如[图 8-3a](#9781430242093_Ch08.xhtml#F3)所示；否则，我们有多对多（Many-Many）关系，如[图
    8-3b](#9781430242093_Ch08.xhtml#F3)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-03_fmt.png)


    [**图 8-3.**](#9781430242093_Ch08.xhtml#FG3) `Employee`与`Project`之间的不同关系


    从函数依赖的角度来看，我们有一个类似的问题：“如果我知道一个员工的ID号，我能告诉你一个唯一的项目编号吗？”


    如果答案是“是”，那么`empID →proj_num`；否则，员工ID不能函数决定项目编号。理解函数依赖与理解类及其关系，是我们弄清楚所要建模问题的复杂性的两种不同方法。


    ## 函数依赖与主键


    现在你了解了函数依赖，我们有另一种方式来思考主键的含义。如果我们知道表中键字段的值，我们就能在表中找到唯一的一行。一旦我们有了那一行，我们就知道该行所有其他字段的值。例如，如果我知道`empID`，我就可以在`Employee`表中找到一个唯一的行，从而确定`last_name`和`first_name`。或者，用函数依赖的术语来说：


    `empID → last_name, first_name`


    这引出了我们定义键的一种更正式的方式：


    *键字段函数决定表中的所有其他字段。*


    如果我知道键的值，我保证能告诉你行中每个其他字段的值。这就是为什么`last_name`不能作为我们`Employee`表的键字段。如果我知道一名员工的姓氏是Smith，我无法保证我能找到一个单一的行并告诉你`empID`的值。


    你可能已经注意到，在过去的几段中，我一直在使用术语*key*（键）而不是*primary key*（主键）。这两者是有区别的。想一想。属性对`(`empID`,
    `last_name`)`是我们`Employee``表的一个可能的键吗？我们对键的定义是，如果我们知道键字段的值，我们就能找到一个唯一的行。如果我们知道`empID`和`last_name`，这当然是成立的。然而，我相信你能看出`last_name`是冗余的。属性对`(`empID`,
    `last_name`)`是一个键，仅仅是因为`empID`是一个键。如果我们知道`empID`，我们就能找到那一行，而不管我们有什么额外信息；我们不需要同时知道`last_name`。


    键中包含多余字段的想法，正是键与主键候选键之间的区别。要被视为主键，必须没有任何不必要的字段。更正式地说：


    *主键没有任何子集本身也是一个键。*


    为什么这很重要？假设我们的每个项目都有一名经理，如数据模型片段[图 8-4](#9781430242093_Ch08.xhtml#F4)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-04_fmt.jpeg)


    [**图 8-4.**](#9781430242093_Ch08.xhtml#FG4) 一个1对多关系


    还记得我们在数据库中如何表示1对多关系吗？我们从“一”端的表（`Employee`）中获取主键字段，并将这些字段作为外键放入`Project`表中。如果我们错误地使用了对`(`empID`,
    `last_name`)`作为`Employee`表的主键，我们将得到一个如[图 8-5](#9781430242093_Ch08.xhtml#F5)所示的`Project`表。我相信你能看到其中的信息冗余和潜在问题。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-05_fmt.png)


    [**图 8-5.**](#9781430242093_Ch08.xhtml#FG5) 由于没有合适的主键而导致的冗余问题


    现在你了解了什么是函数依赖以及主键的更正式定义，我们可以看看规范化如何帮助确保我们的表设计良好。


    ## 范式


    “规范化”的表通常将避免我们在本章前面研究的更新问题。有多个级别的规范化，称为*范式*，每个范式都针对可能发生问题的额外情况。在本节中，我们将查看使用函数依赖定义的范式。


    ### 第一范式


    第一范式是最重要的，它基本上指出，我们不应该试图将多条数据塞进一个字段中。我们的第一个关于可能出错情况的例子，[例 1-1](#9781430242093_Ch01.xhtml#ex1-1)
    “植物数据库”，就是一个有问题的情况。在植物数据库中，我们保存有关不同植物物种及其适合的不同用途的信息。一些可能的（但不推荐的！）保存每种植物多种用途的方法如[图
    8-6](#9781430242093_Ch08.xhtml#F6)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-06_fmt.png)


    [**图 8-6.**](#9781430242093_Ch08.xhtml#FG6) 保存多种用途信息的非推荐方式


    我们在[例 1-1](#9781430242093_Ch01.xhtml#ex1-1)中看到了将植物数据保存在如[图 8-6](#9781430242093_Ch08.xhtml#F6)所示的表中所产生的问题。例如，可能难以找到具有特定用途的所有植物（例如，所有防护植物）。'
  raw: 'For the situation depicted in [Figure 8-2](#9781430242093_Ch08.xhtml#F2),
    if I know an employee’s ID is 1001, I can tell you that his last name is Smith.
    Does it work the other way round? If I know an employee’s last name, can I uniquely
    tell you his employee ID number? From the data displayed in the tables, you might
    say, “Yes, you can.” However, for a functional dependency to hold, it must be
    true for any data that can ever be put in our tables. We know that in the long
    term it is possible we might have several employees called Smith, so that knowing
    the last name does not uniquely determine the ID. Or more formally, last_name
    does not functionally determine empID.


    Let’s try another example. For the database tables in [Figure 8-2](#9781430242093_Ch08.xhtml#F2),
    do we have a functional dependency between an employee’s ID number and a project
    to which he is assigned? If I know the employee’s ID is 1001, I cannot tell you
    a *unique* project number. It could be project 3 or project 6, and so an employee’s
    ID number does not functionally determine (or uniquely determine) a project number.


    Determining the functional dependencies requires us to understand the intricacies
    of the specific situation. For the case of employees and projects we need to know
    whether an employee can be assigned to only one project or whether he can be assigned
    to many different projects. Does this sound familiar? Determining whether attributes
    functionally determine each other involves the same sort of questions we went
    through when trying to understand the data model in [Chapter 4](#9781430242093_Ch04.xhtml).


    In terms of a data model with an Employee class and a Project class, we would
    ask, “Can an employee ever be associated with more than one project?”


    If the answer is “No,” we have a 1–Many relationship between employees and projects
    as in [Figure 8-3a](#9781430242093_Ch08.xhtml#F3); otherwise, we have a Many–Many
    relationship as in [Figure 8-3b](#9781430242093_Ch08.xhtml#F3).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-03_fmt.png)


    [**Figure 8-3.**](#9781430242093_Ch08.xhtml#FG3) Different relationships between
    Employee and Project


    In terms of functional dependencies, we have an analogous question: “If I know
    an employee’s ID number, can I tell you a unique project number?”


    If the answer is “Yes,” empID →proj_num; otherwise, employee ID does not functionally
    determine the project number. Understanding the functional dependencies and understanding
    classes and their relationships are two different approaches to figuring out the
    intricacies of the problem we are trying to model.


    Functional Dependencies and Primary Keys


    Now that you know about functional dependencies, we have another way of thinking
    about what we mean by a primary key. If we know the values of the key fields of
    a table, we can find a unique row in the table. Once we have that row, then we
    know the value of all the other fields in that row. For example, if I know empID,
    I can find a unique row in the Employee table and so be able to determine the
    last_name and first_name. Or, in terms of functional dependencies:


    empID → last_name, first_name


    This leads us to a more formal way of defining a key:


    *The key fields functionally determine all the other fields in the table.*


    If I know the value of the key, I guarantee I can tell you the value of every
    other field in the row. This is why last_name cannot be a key field for our Employee
    table. If I know the last name of an employee is Smith, I cannot guarantee that
    I can find a single row and tell you the value for empID.


    You have probably noticed that I’ve been using the term *key* rather than *primary
    key* in the last couple of paragraphs. There is a distinction between the two.
    Think about this. Is the pair of attributes (empID, last_name) a possible key
    for our Employee table? Our definition of a key is that if we know the value of
    the key fields, we can find a unique row. That is certainly the case if we know
    empID and last_name. However, I’m sure you can see that last_name is redundant.
    The pair of attributes (empID, last_name) is a key because empID is a key. If
    we know empID, we can find the row regardless of what additional information we
    have; we don’t need to know last_name as well.


    This idea of having fields in our key that are superfluous is the distinction
    between a key and a candidate for a primary key. To be considered as a primary
    key, there must be no unnecessary fields. More formally:


    *A primary key has no subset of the fields that is also a key.*


    Why is this important? Say each of our projects has one manager as shown in the
    snippet of the data model in [Figure 8-4](#9781430242093_Ch08.xhtml#F4).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-04_fmt.jpeg)


    [**Figure 8-4.**](#9781430242093_Ch08.xhtml#FG4) A 1–Many relationship


    Remember how we represent a 1–Many relationship in our database. We take the primary
    key field(s) from the table at the 1 end (Employee) and put those field(s) as
    a foreign key in the Project table. If we had mistakenly used the pair (empID,
    last_name) as a primary key for the Employee table, we would get a Project table
    as shown in [Figure 8-5](#9781430242093_Ch08.xhtml#F5). I’m sure you can see the
    information redundancy and potential for problems there.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-05_fmt.png)


    [**Figure 8-5.**](#9781430242093_Ch08.xhtml#FG5) Redundancy problems caused by
    not having a suitable primary key


    Now that you have an idea of what a functional dependency is and a more formal
    definition of a primary key, we can look at how normalization can help ensure
    that we have a good design for our tables.


    Normal Forms


    Tables that are “normalized” will generally avoid the updating problems we examined
    earlier in the chapter. There are several levels of normalization called *normal
    forms*, each addressing additional situations where problems may occur. In this
    section we will look at the normal forms that are defined using functional dependencies.


    First Normal Form


    First normal form is the most important, and essentially says that we should not
    try to cram several pieces of data into a single field. Our very first example
    of what can go wrong, [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1), “The Plant
    Database,” was a situation where this was a problem. In the plant database, we
    were keeping information about different plant species and the different uses
    for which they were suited. Some possible (but not recommended!) ways of keeping
    several uses for each plant are shown in [Figure 8-6](#9781430242093_Ch08.xhtml#F6).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-06_fmt.png)


    [**Figure 8-6.**](#9781430242093_Ch08.xhtml#FG6) Nonrecommended ways of keeping
    information about multiple uses


    We saw in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1) the problems that eventuate
    from keeping the plant data in tables like those in [Figure 8-6](#9781430242093_Ch08.xhtml#F6).
    For example, it can be difficult to find all the plants with particular uses (e.g.,
    all the shelter plants).'
