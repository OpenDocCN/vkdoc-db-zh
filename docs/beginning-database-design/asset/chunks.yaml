    ## CHAPTER 9


    ![image](images/frontdot.jpg)


    ### More on Keys and Constraints


    In previous chapters, you have seen how to take a class diagram and represent
    it as a set of relational database tables. We looked at how to represent relationships
    between classes with primary and foreign keys and then applied the ideas of normalization
    to ensure the attributes were in the right tables. In this chapter, we take another
    look at some of these ideas and think about some alternative possibilities. In
    particular, we take a closer look at primary keys and how to choose them. We also
    take a look at how we can maintain referential integrity when data is being constantly
    updated.


    #### Choosing a Primary Key


    In the previous two chapters, I described how we need to choose a field or combination
    of fields to use as a primary key for a database table representing a class. The
    key fields will have unique values and so can be used to identify a particular
    row in a table. The primary key is also used to set up relationships between rows
    in different tables by way of a foreign key. Choosing a primary key is not always
    straightforward. For a person, combinations such as name and birth date are sometimes
    used as a key, but they cannot be guaranteed to be unique. You saw that introducing
    a customer number or using some sort of automatically generated ID number can
    ensure that we have a field that is unique for every row. Now let ’s have another
    look at this idea of ID numbers.


    #### More About ID Numbers


    A generated ID number does not solve all of our problems. If we have two rows
    in our table that are identical in every respect except for their ID, we are going
    to be in real trouble. Two John Smiths with the same birth date living at the
    same address are going to complicate matters whether they have different customer
    numbers or not. Are they the same person or are they different people? It would
    be intolerable if the only thing distinguishing one person from another was some
    generated ID. For one thing, who can ever remember all of their perhaps hundreds
    of different ID numbers? We always expect that a business will be able to find
    our customer number for us from information that differentiates us from everyone
    else.


    So, does that mean that there will (or should) always be a possible key made up
    of some combination of the data kept about a customer? Probably yes. In that case,
    why do we need ID numbers? Wouldn ’t a primary key made up of all the fields in
    the table be OK?


    One of the main reasons that ID numbers are necessary in many cases is that while
    there might always be some information that distinguishes one customer from another,
    it is likely that some of those values are constantly changing. If we decide that
    name, birth date, address, mother ’s maiden name, and so on will identify a customer,
    it is no use to us as a primary key in a table. Addresses are certain to change,
    names are likely to change, and this is where we have a problem. We use the primary
    key in order to make connections to rows in different tables. For example, we
    would use the `Customer` table primary key as a foreign key in the `Order` table
    to identify which customer placed a specific order. If we have to put a combination
    of names and addresses into our `Order` table as a foreign key, I ’m sure you
    can imagine the sorts of problems we are likely to encounter associating orders
    with particular customers when they move to a new address. An ID number, however,
    will be constant. One order might be associated with customer `3602` for example,
    the information in the `Customer` table about customer `3602` can change as much
    as it likes. Jane Green can move and remarry as much as she pleases, and we can
    still keep track of her orders through her constant customer number.


    When storing information about people in a database, an ID number is almost always
    necessary. People are generally fairly resistant to being described by a number,
    and yet they are likely to have a different one for every business they deal with.
    Universal ID numbers are resisted by many civil liberties groups for privacy reasons,
    although in many countries social security, tax, or driver license numbers have
    almost become default universal IDs. Many web sites now use an email address as
    a form of identification—although this can cause problems when you share a personal
    email address with a spouse or partner. (I know this!)


    While ID numbers are essential, there are still problems with them. One problem
    arises when a person is assigned two ID numbers for the same organization. Consider
    being admitted to a hospital. You are ill, and your friends are asked for your
    name and address and whether you have ever been admitted before. The name they
    give may be different from your exact name. They call you Rob Brown, but your
    real name is Jacob Robert Brown, and they don ’t know that you were once admitted
    as a child with tonsillitis. A new patient is therefore entered into the database
    with a new number. Now there are real problems: Rob Brown has two patient numbers
    and two rows in the patient table. Allergies may be associated with one patient
    number, and treatments with the other. Anecdotally, at various times the number
    of patients associated with New Zealand hospitals has been about 25% more than
    the total population!'
