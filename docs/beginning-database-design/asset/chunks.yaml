    (e.g., administrators have grades but technicians have dates), consider specialized
    subclasses.

    *   When you think *this is like that except for…* consider subclasses.

    *   When two classes have a similar relationship with another class, consider
    a new generalized superclass (e.g., if both students and staff are assigned parking
    spaces, consider a generalized class for people).


    Before you use inheritance, make sure that


    *   you have not confused objects with subclasses (e.g., Rover is probably an
    object, Dog or Cat could be classes).

    *   you have considered whether an association with a category class would be
    sufficient (e.g., Labrador and Corgi could be objects of a Breed class, and each
    dog could be associated with a breed).

    *   it is not just the value of an attribute that is different (e.g., don’t consider
    inheritance because the fees for Labrador and Collie are different).


    Other considerations:


    *   Classes that have subclasses should be abstract, which means they will never
    have any objects. This allows the problem to be more readily extended.

    *   Consider associations with roles when you come across the *my object is a
    member of both these classes* dilemma.

    *   Don’t introduce the complexity of inheritance unless the specialized data
    in the subclasses is important to the main objectives of the project.


