  trans: "\n将已停产的产品保留在表格中是重要的，但我们也希望能够将它们与当前产品区分开来。对于这种情况，我们可以考虑在`Product`表中添加一个额外的字段（例如`current`字段）来区分当前产品与已停产产品。现在我们面临一个新问题：如何防止为已停产产品输入新订单？这开始超出了本书的讨论范围。许多数据库应用程序允许通过`触发器`对表格施加额外的约束。触发器是一种由表中的更改（例如添加或更新行）触发的程序，并将执行指定的操作。在这种情况下，触发器会检查`Order`表中潜在的新行是否对应已停产产品，如果是，则阻止该行被永久添加到表中。诸如仅允许当前产品订单之类的约束也可以通过数据库界面实现，我们将在第\
    \ 11 章中探讨这种方法的优缺点。\n\n何时选择“级联删除”是合适的？这是一个相当粗暴的解决方案，设置时应非常谨慎。如果我们有一个科目的注册信息，然后该科目被取消，那么也许可以合理地期望删除该科目的所有注册信息。但我们必须小心，确保没有往年的历史注册记录。删除信息并不像你预期的那样频繁发生。产品和科目可能会停产，但如果我们要保留已停产科目的历史订单或注册信息，就需要保留这些信息。在这些情况下，`禁止删除`选项是最佳选择。当客户和订单确实不再有用时，通常更常见的做法是将重要的或汇总的信息存档并存储到其他地方，而不是完全删除。请谨慎使用`级联删除`选项。\n\
    \n综上所述，我们可能会认为最安全的选项是永不删除任何内容。可以设置表格使得任何行都无法被删除。然而，尽管这似乎是个好主意，但我们总是需要删除那些误输入到表中的记录。例如，假设我们不小心输入了同一个客户两次（但客户编号不同）。我们需要尽快将那条多余的记录从表中移除，以免引起各种问题。\n\
    \n## 总结\n\n在本章中，我们探讨了在更新表中数据时，选择适当的主键以及确保参照完整性所涉及的一些问题。需要记住的一些要点如下：\n\n*   我们通常需要引入一个生成的\
    \ ID 号，以确保我们有一个值稳定且唯一的字段，可以将其用作主键。这对于人员信息尤其重要，因为姓名和地址等标识信息可能会发生变化。\n*   请注意，数据录入错误可能导致同一个人在您的数据库中以两个不同的\
    \ ID 号出现。请尽量避免这种情况！\n*   当主键由多个拼接字段组成时，值得考虑使用生成的 ID 号来减小引用该表的外键的大小。\n*   在引入生成\
    \ ID 的情况下，应使用约束来保持被替换为主键的字段组合的唯一性。\n*   唯一约束可用于强制实现 1 对 1 关系。\n*   对字段值的约束可能比关联到另一个（非常简单的）表的关系更合适。\n\
    *   当您希望删除一个被外键引用的行时，有三种选项：\n    *   禁止删除。\n    *   将引用被删除行的字段设为`NULL`（`空值删除`）。\n\
    \    *   删除所有引用被删除行的行（`级联删除`）。\n\n## 测试你的理解\n\n### 练习 9-1\n\n又是非常实用的“客户订购产品”示例——总有新东西可发掘。设计将表示图\
    \ 9-14 中`Order`类的表。考虑约束、主键和外键，以及更新规则。\n\n![9781430242093_Fig01-01.tif](img/9781430242093_Fig09-14_fmt.jpeg)\n\
    \n**图 9-14.** 客户下单模型\n\n### 练习 9-2\n\n汽车销售场需要保存有关可用汽车的品牌和型号信息，以及他们库存中单个汽车的注册信息。例如，福特\
    \ Siesta 有轿车和掀背车，他们目前有一辆蓝色轿车，注册号为 TC545。对于某些型号，您可能可以选择自动或手动变速箱，有些还提供不同的排量（例如 1.5\
    \ 升或 2.0 升）。思考为此情况设置表格的可用选项。\n\n## 第 10 章\n\n![image](img/frontdot.jpg)\n\n##\
    \ 查询基础\n\n我们花费了大量精力设计数据库，以确保数据能够以一致和准确的方式存储。在本章中，我们将探讨如何将信息提取出来。数据将存储在许多独立的表中，根据我们提出的问题，我们需要以多种不同的方式组合来自这些表的数据。本章只是查询艺术的一个简要介绍。如需进一步了解，您可能有兴趣查阅我的书\
    \ *SQL 查询入门：从新手到专业*。^(1)\n\n### 单表简单查询\n\n让我们从只看一个表开始。我们将使用`Student`表（其一小部分如图\
    \ 10-1 所示）来说明一些主要的查询类型。\n\n![9781430242093_Fig10-01.tif](img/9781430242093_Fig10-01_fmt.jpeg)\n\
    \n**图 10-1**. `Student`表的一小部分\n\n随着时间的推移，`Student`表可能会累积数十万条记录，实际上还会有更多列来记录出生日期、电话号码、移民身份等信息。对用户相关的是这些信息的可管理子集。我们应该回顾项目最初用例，看看人们会对数据提出哪些问题。注册主任可能想要一份今年开始学习的所有学生的名单；校友经理可能想要一份居住在基督城的当前和过去学生的名单；系主任可能想要一份今年注册文学学士学位学生的名单；管理层可能需要过去十年的注册人数以确定趋势。所有这些信息都可以从这个表中收集。为此，我们可以使用基本的关系运算`选择`和`投影`，以及排序和聚合函数。\n\
    \n### 投影操作\n\n投影操作允许我们指定要检索表的哪些列。如果我们想要一份姓名列表，我们其实不想看到关于每个学生的所有其他信息。如果我们只想看到每个学生的\
    \ ID 号和姓名，我们只投影（或检索）前三列。清单 10-1 展示了如何用 SQL 命令实现这一点。第一行说明需要哪些列，第二行说明从哪个表中检索。\n\n\
    **清单 10-1.** 用于从`Student`表投影三列的 SQL\n\n```sql\nSELECT studentID, first_name, last_name\n\
    FROM Student\n```\n"
- fmt: 'The result of the query in [Listing 10-1](#9781430242093_Ch10.xhtml#L1) will
    be a new set of rows with just the three fields or columns we have specified.
    The project operation is one of the simplest of the operations on a table, but
    even for this simple process we have to think carefully about what we are doing.
    Every row in a table is guaranteed to be unique because we always have a primary
    key. However, if the primary key is not one of the columns we specify in our query,
    the rows resulting from a project operation may not be unique. What should we
    do about the duplicate rows? The answer depends entirely on what your query is
    to be used for.


    Consider a couple of examples of queries that would produce duplicates from the
    small sample of data in the `Student` table in [Figure 10-1](#9781430242093_Ch10.xhtml#F1).
    Say the alumni manager is organizing a dinner and wants a list from which to produce
    name tags for all the guests. He projects `first_name` and `last_name` from the
    `Student` table, and there are two rows with `John Smith`. Does he need them both?
    He certainly does, as two distinct people with the same name are going to be turning
    up for the dinner. Now consider that the alumni manager wants to set up alumni
    branches and so would like a list of all the cities that students come from. He
    projects `city` from the `Student` table and gets several rows with `Christchurch`.
    Does he want them all? No. He just wants to know the set of cities.


    So, sometimes we want the duplicate rows in a query and other times we don’ t.
    By default, an SQL statement such as the one in [Listing 10-1](#9781430242093_Ch10.xhtml#L1)
    will retrieve duplicates. If you don’ t want the duplicates, you can use the keyword
    `DISTINCT` as in [Listing 10-2](#9781430242093_Ch10.xhtml#L2).


    [Listing 10-2.](#9781430242093_Ch10.xhtml#Lis2) `Specifying Only Unique Records
    Be Retrieved`


    ```sql

    SELECT DISTINCT city

    FROM Student

    ```


    ## The Select Operation


    The other thing that we want to do with a single table is to retrieve just some
    of the rows. For example, we may want to retrieve information about those students
    who are doing a science degree or just those students who first enrolled in 2011\.
    Retrieving a subset of the rows is known as a *select* operation. We need to specify
    how we will determine which rows we want. We do this by specifying a test condition
    that, for each row, is either true or false. To find all the science students,
    we would specify the condition `degree = ‘Science’` , while to find all the students
    entering the university in 2011, the condition would be `year = 2011\. The condition
    is checked for each row in turn, and if it is true, then that row is included
    in the set being retrieved. We can build up more complicated conditions by using
    operators such as `AND`, `OR`, and `NOT`. For example, if we want just the science
    students enrolling in 2011, the condition would be `degree = ‘Science’ and year
    = 2011\. If we wanted a list of all commerce and arts students (but not any other
    degree), the condition would be `degree = ‘Arts’ OR degree = ‘Commerce’`


    A select operation is specified in an SQL statement, by using the keyword `WHERE`
    followed by the appropriate condition as shown in [Listing 10-3](#9781430242093_Ch10.xhtml#L3).
    The `*` in the first line means retrieve *all* the columns or fields for the selected
    rows.


    [Listing 10-3.](#9781430242093_Ch10.xhtml#Lis3) `Specifying Which Rows Are to
    Be Retrieved`


    ```sql

    SELECT *

    FROM Student

    WHERE degree = ‘Science’ and year = 2011

    ```


    One small but important point to bear in mind is that if a field (e.g., `degree`)
    has no value, then the truth of a statement such as `degree = ‘Science’` is unknown.
    SQL queries only return those rows for which the condition statement is *known*
    to be true. If we retrieve rows for `degree = ‘Science’` and then retrieve rows
    for `degree <> ‘Science’` we will miss the rows that have no value in `degree`
    because we do not know the value (it might be Science and it might not). To find
    those fields which are empty we can use the expression where `degree is NULL`.


    Most queries will require a combination of the select and project operations.
    In this case, the rows are first selected according to the condition, and then
    the specified columns are retrieved. Rather than seeing all the information about
    each of our selected students as in [Listing 10-3](#9781430242093_Ch10.xhtml#L3),
    we may just want to see their ID numbers and names. [Listing 10-4](#9781430242093_Ch10.xhtml#L4)
    shows the select and project operations being combined in an SQL statement.


    [Listing 10-4.](#9781430242093_Ch10.xhtml#Lis4) `Specifying Which Rows and Columns
    Are to Be Retrieved`


    ```sql

    SELECT studentID, first_name, last_name

    FROM Student

    WHERE degree = ‘Science’ and year = 2011

    ```


    Note that the fields involved in the condition (`degree` and `year`) do not have
    to appear in the columns being projected.


    ## Aggregates


    The other types of information that we might want to retrieve from our `Student`
    table are counts, averages, and totals. For example, we might want to know the
    number of students that have ever enrolled, the number enrolled in each degree,
    or the number enrolled each year for the last ten years. If we had more columns
    in the `Student` table, we might want to total fees or average ages, and so on.


    SQL provides a number of different functions for counting, and for aggregating
    numeric data (e.g., `COUNT`, `AVG`, `SUM`, `MAX`, `MIN`). We will now look at
    how to do a couple of different queries.


    If we just want a simple count of how many students have ever enrolled at the
    university, we can issue an SQL statement such as the one in [Listing 10-5](#9781430242093_Ch10.xhtml#L5).


    [Listing 10-5.](#9781430242093_Ch10.xhtml#Lis5) `Selecting a Single Count`


    ```sql

    SELECT COUNT(*)

    FROM Student

    ```


    `COUNT(*)` simply means count each record. This will return us just one number,
    which is the number of rows in the table. Had we wanted to find the largest `studentID`,
    we would have issued a similar statement, but specifying the field for which we
    want to find the maximum value, as in [Listing 10-6](#9781430242093_Ch10.xhtml#L6).


    [Listing 10-6](#9781430242093_Ch10.xhtml#Lis6). `Finding the Maximum Value of
    a Field`


    ```sql

    SELECT MAX(studentID)

    FROM Student

    ```


    We can specify a particular field in a `COUNT` statement. What do you think will
    be returned if we ask for `COUNT(studentID)` or `COUNT(city)`? In both these cases,
    we will probably get the same answer (the number of rows), as most versions of
    SQL will default to just counting all the rows with a value in that field. This
    is probably what we want if we ask to count the student IDs, but when we ask for
    a count of the cities, we are really asking for how many distinct cities appear
    in the table. This can be achieved by adding the keyword `DISTINCT` in the `COUNT`
    function as in [Listing 10-7](#9781430242093_Ch10.xhtml#L7).


    [Listing 10-7.](#9781430242093_Ch10.xhtml#Lis7) `Counting the Number of Distinct
    Cities`


    ```sql

    SELECT COUNT(DISTINCT city)

    FROM Student

    ```


    Each of these aggregate statements can be combined with a select operation to
    first of all retrieve a subset of the rows. We can do this by adding a `WHERE`
    clause to specify the rows to which we want to apply the aggregate. For example,
    to find the number of students that have ever enrolled in a science degree, we
    would use the statement in [Listing 10-8](#9781430242093_Ch10.xhtml#L8). We can
    think of this as first retrieving the appropriate rows and then counting them.


    [Listing 10-8.](#9781430242093_Ch10.xhtml#Lis8) `Counting a Subset of the Rows`'
