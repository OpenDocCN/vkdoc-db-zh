    \  \n[Index](#9781430242093_Index.xhtml)\n\n# Foreword\n\nWhen I wrote the foreword\
    \ to the first edition of *Beginning Database Design*, I expressed my hopes to\
    \ see this book become a popular classic. I felt that it deserved to be so. As\
    \ the technical reviewer, I had thoroughly enjoyed Clare’s skill in turning a\
    \ subject that is often presented dryly into a vivid and interesting book, and\
    \ her skill in dissecting the thought process that lets you go from functional\
    \ requirements to the design of a database that will be able to keep data consistent,\
    \ grow, and bear the load. *Beginning Database Design* doesn’t enunciate, like\
    \ so many books, quasi–divine rules with pretentious jargon. It explains the goals,\
    \ the common mistakes, why they are mistakes, and what you should do instead.\
    \ It brings to light the logic behind the rules, all in a short and very readable\
    \ book.\n\nThere is much satisfaction in seeing five years later that my hopes\
    \ have been fulfilled, and that *Beginning Database Design* has become one of\
    \ the leading titles on this important topic—databases are everywhere and database\
    \ design belongs to the core body of knowledge of any serious software developer.\
    \ This edition has retained all the qualities that made the first one successful,\
    \ including Clare’s lucid writing and humor, and if the page count has increased\
    \ it has mostly been to include exercises allowing readers to test their understanding\
    \ and compare their solutions to the answers that are provided. As the technical\
