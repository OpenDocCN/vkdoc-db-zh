- fmt: '# Database Normalization


    Thinking back to our new definition of a primary key, Let’s reconsider the primary
    keys of the two tables in [Figure 8-6](#9781430242093_Ch08.xhtml#F6). `plantID`
    is a primary key of both tables in the sense that it is different in every row.
    Does it functionally determine all the other attributes? If I know the value of
    `plantID` (e.g., `plantID = 1`), can I tell you a unique use? Well, in the top
    table I can tell you the character string in the `uses` field, and in the second
    table I can tell you what is in any particular one of the three columns, so in
    a very formal sense, yes, I can. However, if we are thinking about the meanings
    behind these fields, I can’t give you any information about a unique use just
    by knowing the plant’s ID. I can only tell you about a collection of uses for
    each plant.


    The two tables are not in first normal form (except in a technical sense). They
    are both trying in a roundabout way to keep multiple values of use.


    `A table is not in first normal form if it is keeping multiple values for a piece
    of information.`


    Normalization has given us a formal way of determining that there is something
    wrong with the design of the tables in [Figure 8-6](#9781430242093_Ch08.xhtml#F6).
    It also gives us a method for solving the problem.


    `If a table is not in first normal form, remove the multivalued information from
    the table. Create a new table with that information and the primary key of the
    original table.`


    For our plant database example, this means setting up two tables, as in [Figure
    8-7](#9781430242093_Ch08.xhtml#F7).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-07_fmt.png)


    [**Figure 8-7.**](#9781430242093_Ch08.xhtml#FG7) Removing the multivalued field
    from unnormalized table to create an additional table


    When we considered this problem by way of a data model, we decided that we actually
    had two classes, `Plant` and `Use`, with a Many–Many relationship between them.
    In [Chapter 7](#9781430242093_Ch07.xhtml), you saw that to represent a Many–Many
    relationship, we needed to add an intermediate table. If you go back and take
    a look at [Figures 7-17](#9781430242093_Ch07.xhtml#F17) to [7-19](#9781430242093_Ch07.xhtml#F19),
    you will see that the new table is the same as the `PlantUse` table in [Figure
    8-7](#9781430242093_Ch08.xhtml#F7). We arrived at the same normalized solution,
    but via two different routes. As discussed in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    normalized tables such as those in [Figure 8-7](#9781430242093_Ch08.xhtml#F7)
    avoid the many problems associated with the original, unnormalized tables of [Figure
    8-6](#9781430242093_Ch08.xhtml#F6).


    ## Second Normal Form


    It is possible for a table in first normal form to still have updating problems.
    The `Assignment` table in [Figure 8-8](#9781430242093_Ch08.xhtml#F8), which we
    discussed at the beginning of this chapter, is an example. It has the information
    about the names and contacts of projects repeated several times, with the result
    that eventually the information might become inconsistent. We also saw that there
    could be problems with inserting new records and losing information as a by-product
    of deleting certain records.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-08_fmt.jpeg)


    [**Figure 8-8.**](#9781430242093_Ch08.xhtml#FG8) Assignment table with update
    anomalies


    The definition of both first and second normal form requires us to know the primary
    key of the table we are assessing. The primary key of the `Assignment` table is
    the combination of the `empID` and `proj_num` fields. Is the table in first normal
    form? If I tell you an employee ID and a project number (e.g., `1005` and `1`),
    can you tell me unique values for all the other non–key fields? Yes. The project
    name is `Jennings Ltd`, the contact is `325-1234`, and the hours are `8`. There
    are no multivalued fields in this table. We are not trying to squeeze several
    bits of information into one field anywhere. But there is still a problem with
    update anomalies.


    The problem here is that while I can figure out the value of all the non–key fields
    by knowing the primary key, I don’t actually need both fields of the primary key
    to do that. If I want to know the number of hours, I need to know the values of
    both `empID` and `proj_num`. However, if I want to know the contact number or
    the project name, I only need to know the value of the `proj_num`. Here is where
    our problem arises, and it leads us to the definition of second normal form.


    `A table is in second normal form if it is in first normal form AND we need ALL
    the fields in the key to determine the values of the non–key fields.`


    We also have a way of fixing a table that is not in second normal form.


    `If a table is not in second normal form, remove those non–key fields that are
    not dependent on the whole of the primary key. Create another table with these
    fields and the part of the primary key on which they do depend.`


    This means that we remove the non–key fields `proj_name` and `contact` from the
    `Assignment` table and put them in a new table with `proj_num` (the part of the
    key on which they do depend). This splitting up of an unnormalized table is often
    referred to as *decomposition*. So we could say the original `Assignment` table
    is decomposed into the two tables in second normal form, as shown in [Figure 8-9](#9781430242093_Ch08.xhtml#F9).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-09_fmt.png)


    [**Figure 8-9.**](#9781430242093_Ch08.xhtml#FG9) Assignment table decomposed into
    two tables


    Had we approached this from a data modeling perspective, we would have said we
    have two classes, `Employee` and `Project`, with a Many–Many relationship between
    them as in [Figure 8-3b](#9781430242093_Ch08.xhtml#F3). As discussed in [Chapter
    7](#9781430242093_Ch07.xhtml), to represent this relationship we need to add an
    intermediary table, and we would have come up with exactly the same tables (along
    with an `Employee` table), as in [Figure 8-9](#9781430242093_Ch08.xhtml#F9).


    Once again, we have arrived at the same solution via two routes: thinking about
    the classes and their relationships, or considering the functional dependencies
    and normalization.


    ## Third Normal Form


    You guessed it. Tables in second normal form can still cause us problems. This
    time, consider our `Employee` table with some added information about the department
    for which an employee works. Take a look at the table in [Figure 8-10](#9781430242093_Ch08.xhtml#F10).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-10_fmt.jpeg)


    [**Figure 8-10.**](#9781430242093_Ch08.xhtml#FG10) Employee table with updating
    problems


    What is the primary key for the `Employee` table in [Figure 8-10](#9781430242093_Ch08.xhtml#F10)?
    If an employee works for only one department, it is enough to know just the `empID`
    to find a particular row. Is the table in first normal form? Yes. If I know the
    value of `empID` (e.g., `1029`), I can tell you a unique value for each of the
    other fields. Is the table in second normal form? Yes, the primary key is only
    one field now, so nothing can depend on “part” of the key. Are there still problems?
    Yes. The information about the department name is repeated on several rows and
    is liable to become inconsistent.


    The situation in this table is that the name of the department is determined by
    more than one field. If I know that the value of the primary key field `empID`
    is `1001`, I can tell you that the department name is `Marketing`. However, if
    I know that the value of `dept_num` is `2`, I can also tell you that the department
    name is `Marketing`. There are two different fields determining what the value
    of the department name is. This is where the problem arises this time, and it
    leads to a definition for third normal form.


    `A table is in third normal form if it is in second normal form AND no non–key
    fields depend on a field(s) that is not the primary key.`


    As in the other normal forms, we also have a simple method for correcting a table
    that is not in third normal form.'
