  trans: '

    假设经过一些仔细思考，大家一致认为只需要记录总的配送时间。现在我们可以重新阐述项目的主要目标：


    *记录订单信息，以便能够检索不同时间段内订单的数量、价值以及处理订单所花费的总时间等汇总数据。*


    ## 需要哪些数据来实现目标？


    现在，我们可以带着更明确的目标，重新审视表 3-1 中的每一项任务。在与客户进一步磋商后，我们可以对这些任务产生更精确的描述，如下所示。


    ### 接单

    如果我们需要按月或周提供统计数据，就需要记录日期。客户已确认有一份不同餐品的价格表，让接待员能够从此列表中选择将非常有用。因此，我们需要一项额外的任务：录入并维护餐品及其价格信息。客户确认，订单成本就是所有餐品的总成本。


    ### 派单给司机

    我们需要了解如何选择司机，并确定我们需要记录什么。假设我们发现司机是按不同时间单位排班的。显然，能够维护并打印出值班表会很有用。然而，自动化排班并不直接有助于实现我们的主要目标。目前大家同意暂时将排班表排除在系统范围之外。接待员将使用独立于数据库的信息（可能是钉在公告板上的名单）来决定应该指派谁去配送订单。


    即使接待员将手动指派司机，我们仍需考虑系统需要记录什么。司机信息的准确性有多重要？如果我们想要保存关于特定司机工作情况的数据（例如用于计算工资或分析绩效），那么保存准确的信息就很重要。如果对于这个系统来说，只需要能够联系司机下达订单并检查进度，那么在订单上记录一个联系电话就足够了。这需要向客户澄清，可以问这样的问题：“了解不同司机配送了多少订单对您来说重要吗？”
    假设在初始阶段不需要这个功能。


    司机去哪里取披萨？系统的一部分是否应该建议或记录取餐点？同样，如果统计的目的是为了优化业务，那么了解每个司机去了哪里以及在各个取餐点等待了多长时间将是至关重要的。鉴于我们已经确定这不是主要目标，我们决定目前不维护取餐点信息。


    ### 取餐

    我们与客户达成一致，只需要记录从初次联系到最终送达订单的总时间。这意味着我们不需要记录流程中每个阶段的时间。即使我们不记录取餐时间，知道餐品已被取走并且正在送往客户手中，是否仍然有用？当然，当出现延误或问题时，这将是有用的信息。然而，为了满足我们的主要目标，系统没有必要记录配送状态信息。如果有问题，接待员有司机的联系电话，可以打电话询问订单所处的阶段。因此，首先，我们不需要记录任何关于取餐的信息。


    ### 送达餐品

    如果我们想要获得整体配送时间的统计数据，显然需要记录每份餐品送达的时间。现阶段我们不需要关心这些信息是如何进入数据库的。司机可能会打电话到仓库，或者将时间写在时间表上稍后录入。在这个阶段，我们只关心系统能否存储每个订单的送达时间。订单送达时，接待员还需要知道司机可以接新订单了。我们在关于派单司机的章节中已经决定，目前这些决定将独立于数据库。接待员可能只会手动记录一下司机可以接新订单了。


    ### 录入时间表

    我们已经记录了司机姓名、订单信息和送达时间。在这个步骤中，我们还需要记录其他什么吗？假设查看当前的手工时间表确认我们已经掌握了所有需要的信息。


    我们费了很大力气去提问，以澄清问题的范围以及支持该范围所需的数据。我们做出的决定是假设性的。它们没有对错之分。即使对于一个实际问题，也不会有绝对的对错答案；我们只能期望得到一个良好的实用解决方案。如果数据库设计得合理，那么在后期能够添加额外信息或扩大范围应该是相当直接的事情。就系统的规模和范围做出某些决定可能需要相当长的时间，因此在达成一些共识后，清晰地表达新的范围非常重要。示例
    3-2 根据我们的重新思考，重新陈述了问题。


    ### 示例 3-2. 餐品配送问题的重新陈述


    系统将记录并提供有关餐品及其当前价格的信息。它将维护订单数据，包括日期、所订餐品、客户联系信息以及分配负责配送的司机信息。它还将维护订单下达时间和最终送达时间。基于此，系统将能够提供特定时间段内订单数量和价值的汇总信息，以及订单整体处理所用时间的汇总信息。系统不会维护关于司机的任何额外信息，也不会维护特定订单与哪些司机关联的信息。系统不会维护关于取餐点的任何信息，也不会记录任何特定订单使用了哪个取餐点。


    ## 输入用例是什么？


    回想一下，用例只是描述用户与系统交互方式的文本说明。用例有许多不同的层次，从非常高层次的目标描述到非常低层次的任务。对于我们试图理解和描述数据库系统的目的而言，最有用的层次是用户任务层次。Alistair
    Cockburn 在他的著作《编写有效用例》²中，将其描述为小到“用户可以在大约二十分钟内完成，然后去喝杯咖啡”的任务。他还说，它应该是一个“足够重要的工作，以至于如果一个用户一天内完成了几个这样的任务，他可以以此作为要求加薪的证据。”
    因此，像“管理业务的订单”这样的描述对于一个任务来说过于宽泛，而“查找司机的电话号码”可能又过于琐碎。


    既然我们对目标和系统范围有了更清晰的认识，就可以回到涉及数据录入的任务列表（之前出现在表 3-1 中），并决定在每个节点需要与系统进行哪些交互。这些交互显示在表
    3-2 中。

    '
- fmt: '# `Table 3-2`. Physical User Tasks for Data Entry and Interaction with the
    Proposed System


    | **Task** | **Physical Jobs** | **Interaction with System** |

    | :--- | :--- | :--- |

    | 0 | Record available meals. | Enter and maintain data about each item that can
    be ordered (ID, description, current price). |

    | 1 | Take order. | Enter order data (order number, time, address, phone) and
    the ID of each meal required (assume for now that prices don'' change). |

    | 2 | Dispatch driver. | Record driver''s contact number with appropriate order.
    |

    | 3 | Pick up meals. | Nothing. |

    | 4 | Deliver meals. | Record delivery time for the appropriate order (here or
    possibly at the next step). |

    | 5 | Enter time sheet. | Nothing. |


    The interactions in `Table 3-2` form the basis for our first attempt at writing
    down some data entry use cases. How big should each use case be? Should we combine
    some tasks or split others into more than one use case? The overriding consideration
    is readability and communication. At the first pass, about five to ten use cases
    is enough (and not too many) to give a clear view of the components of a small
    problem.


    We could consider combining all the tasks that involve data about an order into
    one use case (i.e., entering the original order, adding the driver contact, and
    updating the delivery time). However, for this problem these tasks are all quite
    separate, performed at different times, and possibly by different people. It may
    not be possible to assign a driver to an order immediately (during busy times
    we may have to wait to see which driver becomes available first), so entering
    the driver contact data should be a separate task from entering the order. Similarly,
    recording the delivery time is a separate task performed at a different time.
    Each of these tasks to do with updating an order are central to the whole business
    and will be repeated several times a day, so it is reasonable to consider providing
    each with its own use case. However, the mechanics of adding the driver contact
    and adding the delivery time are almost identical in that information about a
    particular order has to be found and then updated. We can (if we feel like it)
    combine these into one use case called, for example, “Update Order Status.”


    Thinking about updating the status of an existing order leads us to ponder how
    the user will be able to locate a particular order. It might be useful to provide
    lists of orders yet to be assigned a driver or yet to be delivered. We will not
    look at specific user interface design at this stage (i.e., how such a list would
    be presented or how a user might select the appropriate one); however, making
    such information available will be important. We have enough data stored to be
    able to find orders with no driver contact number or no delivery time. Given that
    this information will be almost essential to the receptionist and it is readily
    available in the system, we will add reporting on uncompleted orders as a use
    case also. `Example 3-3` shows the use cases so far.


    ## `EXAMPLE 3-3`. INITIAL USE CASES FOR MEAL DELIVERIES


    `Figure 3-5` shows the initial use cases for the meal delivery problem, and the
    text for each use case is given after the figure.


    ![9781430242093_Fig03-05.eps](images/9781430242093_Fig03-05_fmt.png)


    ### `Figure 3-5`. Use cases for meal deliveries


    *   **Use case 1**: Maintain meal data. Enter and update data on meals (ID, description,
    current price).

    *   **Use case 2**: Enter an order. Enter initial order information (order number,
    date, address, phone) and for each meal record the ID. (This assumes prices do
    not change. We will consider price changes later in the chapter in the section
    “Changing Prices.”) Each meal must be one that is already in the system.

    *   **Use case 3**: Update order status. For a particular order already in the
    system, add driver contact number or delivery time.

    *   **Use case 4**: Report on order status. Retrieve all orders satisfying required
    status (e.g., no driver contact number or no delivery time).


    ## What Is the First Data Model?


    Now that we have some idea of the data we need to maintain, we can sketch a first
    data model for the problem. We clearly have data about at least two separate things,
    orders and the types of meals that can be supplied, and so have two classes as
    shown in `Figure 3-6`. The objects of the `Meal` class will be each of the meal
    types that appear on the menus in a client’s motel or hotel room.


    ![9781430242093_Fig03-06.tif](images/9781430242093_Fig03-06_fmt.jpeg)


    ### `Figure 3-6`.First attempt at a data model for meal delivery database


    In `Figure 3-6`, we have separated each of the pieces of data we are recording
    and put them as attributes in the most likely class. Let’s recap from `Chapter
    2` what a model like `Figure 3-6` means. Reading from left to right, we have that
    a particular order (e.g., “to Colombo Street at 8:30 on April 1st”) can involve
    one or more meal types. From right to left, we have that each type of meal (e.g.,
    chicken vindaloo) could appear on many orders but may not appear on any (e.g.,
    no one may ever want to order spinach and anchovy pizza). Just in case there is
    any confusion, when we talk about a meal, we mean a type of meal as it appears
    on the menu. We don’t mean that a particular portion of curry may end up on more
    than one order!


    Note that this model is only a first attempt and overlooks some important details
    that we will consider later in the chapter.


    ## What Are the Output Use Cases?


    We now need to reconsider the required reporting and summarizing tasks in terms
    of the data we are keeping, as in the data model in `Figure 3-6`. We have already
    determined that it would be useful to report on orders awaiting the assignment
    of a driver or orders yet to be delivered, and have included that in use case
    4 in `Example 3-3`.


    Let’s think about the statistics on orders and delivery times that are part of
    our main objective. The statistics on orders can be found by considering the `Order`
    objects. We can find the value of each order by summing the prices of each meal
    associated with that order, given (for now) that prices remain constant. We can
    also determine the time taken for each order by subtracting the `order_time` from
    the `delivery_time`. By selecting those order objects that are in the date period
    of interest, we can determine different statistics about the times (e.g., averages
    or totals) during a particular week or month or whatever is required. We have
    enough information stored in our data model to satisfy the requirements of our
    main objective.'
