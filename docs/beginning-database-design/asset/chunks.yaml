    \ 客户购买产品。\n\n讨论以下数据修改方式的效果如何。\n\n*   将关系客户端的可选性改为 0，这样并非所有购买都需要关联客户。\n\n    这个方案解决了现金销售无需关联客户的当前问题。如果处理得当，它可以工作。然而，存在一个问题：当邮购购买需要开具发票或交付时，将没有客户的记录。\n\
    \n*   保持可选性为 1，但包含一个名为“现金客户”的虚拟客户对象。\n\n    我们现在必须为每笔购买指定一个客户。这可能比前一个选项稍微安全一些。然而，该项目的目标之一是提供关于客户习惯的统计数据。“现金客户先生”可能会有大量的购买记录，这可能会扭曲平均价值或平均购买次数等统计数据的结果。如果记得的话，可以在进行统计前移除“现金客户”的购买记录，但这很繁琐。这取决于这些统计的重要性以及需求的频率。\n\
    \n*   创建 `Customer` 的子类：`Cash_Customer`（现金客户）和 `Account_Customer`（账户客户）。\n\n \
    \   这实际上并不比前一个选项实现更多目标，而且实现起来要困难得多。我们没有收集关于现金客户的信息，因此为它们设立一个类是无意义的。\n\n*   创建\
    \ `Purchase`（购买）的子类：`Cash_Purchase`（现金购买）和 `Account_Purchase`（账户购买）。\n\n    我们将有许多现金购买（无关联客户）和许多账户购买（有强制关联的客户），因此为每种类型设立一个类是一个合理的想法。这使得为不同客户类型推导统计信息变得简单。对于当前的需求集，它比虚拟现金客户并没有太大优势，但如果我们想开始记录支付方式（现金、EFTPOS、信用卡等），那么添加这些会很容易。图\
    \ A-28 展示了如何对此建模。\n\n![9781430242093_APP01-28.tif](img/9781430242093_APP01-28_fmt.jpeg)\n\
    \n图 A-28. 购买可以是针对有账户的客户，也可以是匿名的现金交易。\n\n## 练习 6-2\n\n一位农民记录其农作物施用肥料的信息（例如，用量、日期等）。他的农场由大的区域（section）组成，这些区域又划分为田地（field）。通常，一次肥料施用是针对整个区域的，但偶尔也针对单个田地。你会如何为此建模？\n\
    \n我们可以从一个名为 `Application`（施用）的类开始，它可以记录日期和肥料用量，并且与某种区域——一个区域或一块田地——相关联。区域和田地都是“区域”，它们有共同之处（名称、大小、可施肥等），因此这是泛化的一个候选。看看图\
    \ A-29 中的模型。\n\n![9781430242093_APP01-29.tif](img/9781430242093_APP01-29_fmt.jpeg)\n\
    \n图 A-29. 肥料施用于区域，这些区域要么是区域（section），要么是田地（field）。\n\n除了一个区域要么是区域（section）要么是田地（field）之外，我们还知道一个区域（section）中可能包含许多田地（field）。现在我们可以记录一次施用是针对某个区域（section）的，并知道哪些田地接受了处理。如果需要，我们也可以记录针对单个田地的施肥。\n\
    \n图 A-29 是一个好的解决方案；然而，使用图 A-30 中的组合模式，可以提供一个更通用的解决方案。我们可以记录对整个农场的施肥，农场由区域（section）组成，区域又由田地（field）组成。我们也可以在这任意层级记录肥料施用。这类似于第\
    \ 6 章讨论的建筑物检查问题。\n\n![9781430242093_APP01-30.tif](img/9781430242093_APP01-30_fmt.jpeg)\n\
    \n图 A-30. 组合模式允许对所有层级的区域进行施肥记录。\n\n## 练习 6-3\n\n一个志愿者图书馆有工作人员、会员和书籍。需要知道哪些书借给了谁以及如何联系借阅者，并记录因书籍逾期产生的费用。参考书不可外借。会员因书籍逾期每天被罚款\
    \ 5 美元，但工作人员不被罚款。你会如何为此情况建模？一些初始类如图 A-31 所示。\n\n![9781430242093_APP01-31.tif](img/9781430242093_APP01-31_fmt.jpeg)\n\
    \n图 A-31. 人们可以借书。\n\n我们知道有两种类型的书（普通书和参考书）和两种类型的人（工作人员和会员）。现在的重要问题是：我们需要继承吗？对于人，问题陈述中唯一的区别是逾期罚款的数值。没有行为上的差异。我们可以创建一个\
    \ `Type`（类型）类（包含工作人员和会员对象），该类与每个人相关联。这个类可以记录该类型的罚款金额（会员 5.00 美元，工作人员 0.00 美元）。类似地，我们可以将每本书分类为某种类型，并在用例中内置一条规则，即参考书不能关联到借阅。然而，这种不同的行为可能值得考虑继承解决方案。图\
    \ A-32 描述了一个可能的解决方案，使用一个关联来表示不同类型的人，使用继承来表示不同类型的书。注意，我们引入了一个抽象的 `Book`（书）类，以便我们可以独立地修改普通书和参考书类。\n\
    \n![9781430242093_APP01-32.tif](img/9781430242093_APP01-32_fmt.jpeg)\n\n图 A-32.\
    \ 表示不同类型书籍和人员的众多可能方法之一\n\n## 练习 7-1\n"
- fmt: '# 图书馆数据模型与关系数据库设计


    a) [图 A-33](#9781430242093_APP.xhtml#F33) 展示了一个小型图书馆的初始数据模型。向图书管理员解释这个初始数据模型的含义。


    b) 为关系数据库设计表，以捕获该模型所表示的信息。包括主键、外键以及其他适当的约束。


    ![9781430242093_APP01-33.tif](images/9781430242093_APP01-33_fmt.jpeg)


    **[图 A-33.](#9781430242093_APP.xhtml#FG33)** 一个小型图书馆的草稿数据模型


    ## 解释数据模型


    a) 以下是一种向图书管理员解释数据模型含义的可能方式。


    “该模型显示，您打算保存有关人员的信息（每个人都有一个编号和姓名）。您还保存有关馆藏图书书目的信息：作者、书名和类别。对于每个书目，至少有一个副本，也可能有更多。这些副本有一个副本编号和购买日期。您将保存有关哪些人员借阅了特定副本的信息。”


    显然，这个模型中缺少一些重要的内容——我们稍后会提到其中一些！


    ## 转换为关系数据库


    b) 现在让我们看看如何在关系数据库中表示该模型。


    对于每个类，我们需要一个表，其字段用于表示属性。


    直接转换得到：


    ```

    Person      (ID, last_name, first_name)


    Title       (cat_num, title, author)


    Item        (copy_num, purchase_date)


    Category    (name)

    ```


    我们需要为字段指定一些类型。`ID` 应该是一个整数，您可以考虑某种自动递增的类型。根据编目系统，`cat_num` 很可能是一个文本字段。`copy_num`
    将是一个整数（1, 2, 3 等），`purchase_date` 显然是一个日期，其他字段都是文本。我们可能应该更仔细地查看作者字段。这里有一些可能性；至少它应该被分成名字和姓氏，但由于人们可能希望按作者搜索，它可能应该是一个独立的类。我们现在暂时不考虑这一点。


    约束呢？所有这些字段对我来说似乎都很重要，我看不出有什么理由不将它们全部设为必填（非空）。购买日期可能应该是一个过去的日期，但那样如果需要存储计划中的未来购买可能会造成问题（而这扩大了范围，所以我们现在也暂时不考虑）。


    `Person`（`ID`）、`Title`（`cat_num`）和 `Category`（`name`）表的主键很容易确定，但 `Item` 表没有一个明显的主键候选。每个书目都会有一个
    `copy_num = 1` 的副本，并且它们可能是在同一天购买的。因此，没有任何字段或字段组合是合适的。我们可以添加一个唯一标识符，但我们将稍作等待，看看后续情况。


    现在来表示关系。`Title` 和 `Category` 之间的一对多（1–Many）关系可以通过在 `Title` 表中添加一个外键来表示，同样，我们需要在
    `Item` 表中添加一个引用 `Title` 表的外键。这些外键的数据类型必须与它们所引用的表中的数据类型相同。为了表示“借阅”这个多对多（Many–Many）关系，我们需要首先添加一个新类（`Loan`），如[图
    A-34](#9781430242093_APP.xhtml#F34)所示。


    ![9781430242093_APP01-34.tif](images/9781430242093_APP01-34_fmt.jpeg)


    **[图 A-34.](#9781430242093_APP.xhtml#FG34)** 一个用于帮助表示多对多关系“借阅”的新类


    在这个阶段，我们应该意识到（你可能早就意识到了）需要存储有关 `Person` 和 `Item` 配对的信息（`date_out`、`due_date` 等）。这些需要与客户讨论。我们现在先做个记录。为了表示[图
    A-34](#9781430242093_APP.xhtml#F34)中的两个一对多关系，我们将在 `Loan` 表中添加两个外键，分别引用 `Person`
    和 `Item`。


    下面，我总结了我们目前的进展。（我使用加粗下划线表示主键，斜体表示外键。）


    |   | Person | (`ID`, last_name, first_name) |

    |   | Title | (cat_num, title, author, *category*) |

    |   | Item | (`copy_num`, purchase_date, *title_cat_num*) |

    |   | Category | (`name`) |

    |   | Loan | (`<dates>`, *item*, *person*) |


    我们快完成了；我们只需要决定 `Item` 和 `Loan` 表的主键。对于 `Item` 表，现在可以使用 `title_cat_num` 和 `copy_num`
    的组合作为主键。每个书目都有一个唯一的目录编号，并且每个书目只会有一个副本1、一个副本2，依此类推。对于 `Loan` 表，`item` 和 `person`
    的组合并不合适；同一个人可能第二次借阅同一件物品。然而，如果我们包含借出日期，那么这三个字段将是唯一的（假设您不会在同一天借出同一件物品两次）。也可以在 `Loan`
    表中添加一个唯一的贷款编号作为主键（我们在[第 8 章](#9781430242093_Ch08.xhtml)中探讨这个选择）。


    代码清单 A-1 展示了在 SQL Server 中创建这些表的 SQL（我们尚未在本设计书籍中涵盖处理连接键和外键的所有必需语法，但它相当容易理解）。


    **代码清单 A-1.** 创建图书馆数据库的 SQL


    ```sql

    CREATE TABLE Category (name VARCHAR (20) PRIMARY KEY);


    CREATE TABLE Person (ID INT PRIMARY KEY, last_name VARCHAR(20) NOT NULL, first_name
    VARCHAR(20) NOT NULL);


    CREATE TABLE Title (cat_num VARCHAR(40) PRIMARY KEY, title VARCHAR(80) NOT NULL,
    author VARCHAR(80) NOT NULL, category VARCHAR(20) NOT NULL FOREIGN KEY REFERENCES
    Category);


    CREATE TABLE Item (title_cat_num VARCHAR (40) FOREIGN KEY REFERENCES Title, copy_num
    INT, purchase_date DATE NOT NULL, PRIMARY KEY (title_cat_num, copy_num));


    CREATE TABLE Loan (date_out DATE, cat_num VARCHAR(40), copy_num INT, borrower
    INT FOREIGN KEY REFERENCES Person, FOREIGN KEY (cat_num, copy_num) REFERENCES
    Item, PRIMARY KEY (date_out, cat_num, copy_num, borrower) );

    ```


    # 练习 8-3


    [图 A-35](#9781430242093_APP.xhtml#F35) 展示了示例 1-3 中讨论的未规范化昆虫数据的一个版本。


    ![9781430242093_APP01-35.tif](images/9781430242093_APP01-35_fmt.jpeg)


    **[图 A-35.](#9781430242093_APP.xhtml#FG35)** *未规范化的昆虫数据*


    a) 可能会出现哪些更新问题？


    最明显的问题很可能源于重复信息导致的不一致数据。每个农场的名称被记录了多次，并且不可避免地导致 `HighGate` 出现了拼写错误。访问日期 14 是 2
    月 9 日这一事实被记录了多次，数据输入错误是可能的。由于数据存储在电子表格中，没有主键，因此不会出现插入和删除问题。


    b) 以下哪些函数依赖成立？'
  raw: 'a)  [Figure A-33](#9781430242093_APP.xhtml#F33) shows an initial data model
    for a small library.Explain to the librarian what the initial data model means.


    b)  Design tables for a relational database which would capture the information
    represented by the model. Include primary and foreign keys and other appropriate
    constraints.


    ![9781430242093_APP01-33.tif](images/9781430242093_APP01-33_fmt.jpeg)


    [**Figure A-33.**](#9781430242093_APP.xhtml#FG33) Draft data model for a small
    library


    a)  Here is a possible way to explain to the librarian what the data model means.


    “The model shows that you are intending to keep information about people (who
    each have a number and names). You are also keeping information about the book
    titles you stock: author, title, and category. For each of these titles there
    is at least one copy and possibly more. These copies have a copy number and the
    date it was purchased. You will be keeping information about which people borrow
    a particular copy.”


    There are clearly important things missing from this model—we will get to some
    of them!


    b)  Now Let’s look at how to represent the model in a relational database.


    For each class we need a table with fields to represent the attributes.


    A direct translation gives us:


    Person     (ID, last_name, first_name)


    Title      (cat_num, title, author)


    Item       (copy_num, purchase_date)


    Category   (name)


    We need some types for the fields. ID should be an integer and you might consider
    some sort of auto-incrementing type. Depending on the cataloging system, cat_num
    will probably be a text field. copy_num will be an integer (1, 2, 3, etc.), purchase_date
    is obviously a date, and the other fields are all text. We should probably look
    more closely at the author field. There are a few possibilities here; at the least
    it should be split into first and last names, but as people are likely to want
    to search by author it probably should be a class on its own. We won’t worry about
    that for now.


    What about constraints? All the fields seem very important to me and I see no
    reason not to make them all required (not null). The purchase date could perhaps
    be a date in the past, but then that might cause problems if planned future purchases
    need to be stored (and that increases the scope so we’ll just leave that for now
    too.)


    Primary keys are easy for the Person (ID), Title (cat_num), and Category (name)
    tables, but the Item table does not have an obvious candidate for a primary key.
    Every title will have a copy with copy_num = 1 and they may have been purchased
    on the same date. So no field or combination of fields is suitable. We could add
    a unique identifier but we’ll wait a bit to see what eventuates.


    Now to represent the relationships. The 1–Many between Title and Category can
    be represented with a foreign key in the Title table and similarly we need a foreign
    key in the Item table referencing the Title table. These must have the same datatypes
    as the tables they are referencing. To represent the Many–Many relationship borrows,
    we need to first add a new class (Loan) as in [Figure A-34](#9781430242093_APP.xhtml#F34).


    ![9781430242093_APP01-34.tif](images/9781430242093_APP01-34_fmt.jpeg)


    [**Figure A-34.**](#9781430242093_APP.xhtml#FG34) A new class to help represent
    the Many–Many relationship borrows


    At this stage we should realize (you probably did before now) that there is information
    about pairings of Person and Item that need to be stored (date_out, due_date,
    etc). These will need to be discussed with the client. We’ll just make a note
    of it for now. To represent the two 1–Many relationships in [Figure A-34](#9781430242093_APP.xhtml#F34)
    we will need two foreign keys in the Loan table referencing Person and Item.


    Below, I have recapped our progress so far. (I have used emboldened underlines
    to denote primary keys and italics to denote foreign keys.)


    |   | Person | (ID, last_name, first_name) |

    |   | Title | (cat num, title, author, *category*) |

    |   | Item | (copy_num, purchase_date, *title_cat_num*) |

    |   | Category | (name) |

    |   | Loan | (<dates>, *item, person*) |


    We are nearly there; we just have the primary keys for the Item and Loan tables
    to decide. For the Item table it is now possible to use the combination of title_cat_num
    and copy_num as a primary key. Each title has a unique catalog number and each
    title will have only one copy1, one copy2, and so on. For the Loan table the combination
    item and person is not suitable; someone may check out the same item a second
    time. However, if we include the date it was taken out, then the three fields
    would be unique (assuming you don’t check an item out twice in one day). It would
    also be possible to add a unique loan number to act as a primary key in the Loan
    table (we look at this choice in [Chapter 8](#9781430242093_Ch08.xhtml)).


    Listing A-1 shows the SQL to create these tables in SQL Server (we haven’t covered
    all the required syntax for dealing with concatenated keys and foreign keys in
    this design book, but it is fairly self explanatory).


    ***Listing A-1**. SQL to Create Library Database*


    CREATE TABLE Category (name VARCHAR (20) PRIMARY KEY);


    |   | CREATE TABLE Person | (ID INT PRIMARY KEY, last_name VARCHAR(20) NOT NULL,
    first_name VARCHAR(20) NOT NULL); |

    |   |

    |   | CREATE TABLE Title | (cat_num VARCHAR(40) PRIMARY KEY, title VARCHAR(80)
    NOT NULL, author VARCHAR(80) NOT NULL, category VARCHAR(20) NOT NULL FOREIGN KEY
    REFERENCES Category); |

    |   |

    |   | CREATE TABLE Item | (title_cat_num VARCHAR (40) FOREIGN KEY REFERENCES Title,
    copy_num INT, purchase_date DATE NOT NULL, PRIMARY KEY (title_cat_num, copy_num));
    |

    |   |

    |   | CREATE TABLE Loan | (date_out DATE, cat_num VARCHAR(40), copy_num INT, borrower
    INT FOREIGN KEY REFERENCES Person, FOREIGN KEY (cat_num, copy_num) REFERENCES
    Item, PRIMARY KEY (date_out, cat_num, copy_num, borrower) ) |


    Exercise 8-3


    [Figure A-35](#9781430242093_APP.xhtml#F35) shows a version of the unnormalized
    insect data discussed in Example 1-3.


    ![9781430242093_APP01-35.tif](images/9781430242093_APP01-35_fmt.jpeg)


    [**Figure A-35.**](#9781430242093_APP.xhtml#FG35) *Unnormalized* *insect data*


    a)  What are some of the updating problems that could occur?


    The most obvious problems are likely to arise from inconsistent data caused by
    repeated information. The name of each farm is recorded several times and has
    inevitably resulted in a spelling error for HighGate. The fact that Visit 14 is
    on February 9th is recorded several times and a data input error is possible.
    Because the data was stored in a spreadsheet there is no primary key, so the insertion
    and deletion problems don’t arise.


    b)  Which of the following functional dependencies hold?'
  trans: '# 图书馆数据模型与关系数据库设计


    a) 图 A-33 展示了一个小型图书馆的初始数据模型。向图书管理员解释这个初始数据模型的含义。


    b) 为关系数据库设计表，以捕获该模型所表示的信息。包括主键、外键以及其他适当的约束。


    ![9781430242093_APP01-33.tif](img/9781430242093_APP01-33_fmt.jpeg)


    **图 A-33.** 一个小型图书馆的草稿数据模型


