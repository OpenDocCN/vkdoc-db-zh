    We have now taken the complete trip from original imprecise problem statement
    to a possible final solution for our very simple plants and uses example. The
    steps are summarized here and illustrated in [Figure 2-19](#9781430242093_Ch02.xhtml#F19).


    1.  Express the problem in terms of what a user might want to achieve. For a database
    problem, this will typically be in terms of the data to be stored and the information
    that needs to be retrieved. Sketch some initial use cases and a data model.


    2.  Think about other possible uses of the information and how the data might
    be usefully ordered or grouped. Undertake an iterative analysis process of reconsidering
    the data model and the use cases, until you are satisfied that you have a complete
    and precise understanding of the problem. For larger problems, this stage may
    include making some simplifying or other pragmatic choices. The bulk of this book
    will concentrate on this phase of the process.


    3.  Choose the type of product to manage the data and create an appropriate design.
    For a relational database, this will involve designing tables, keys, and foreign
    keys. Different structures will be required if the project is to be implemented
    in some other type of product such as a programming language or a spreadsheet.
    The design phase is discussed more fully in [Chapters 7](#9781430242093_Ch07.xhtml)
    to [Chapter 9](#9781430242093_Ch09.xhtml).


    4.  Build the application. For a relational database, this will include setting
    up the tables and developing forms and reports to satisfy the use cases. The mechanics
    of how to do this in any particular product is outside the scope of this book,
    but there are numerous how–to books available that will help you.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-19_fmt.png)


    [**Figure 2-19.**](#9781430242093_Ch02.xhtml#FG19) The development process for
    our simple database example


