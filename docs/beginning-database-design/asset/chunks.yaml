    [**Figure 2-11.**](#9781430242093_Ch02.xhtml#FG11) First attempt at a data model
    for plants example


    We now need to check whether this model is able to satisfy the requirements of
    the three use cases in [Figure 2-4](#9781430242093_Ch02.xhtml#F4):


    **Use case 1:** Maintain plant information. We can create objects for each plant
    and record the attributes we might require now or in the future. We can create
    use objects, and we can specify relationship instances between particular plant
    and use objects.


    **Use case 2:** Report on plants. We can take a particular plant object (or each
    one in turn) and find the values of its attributes. We can then find all the use
    objects related to that plant object.


    **Use case 3:** Report on uses. We can take a particular use object and find all
    the plant objects that are related to it.


    So far not too bad. But Let’s look a bit more carefully. Use case 1 is really
    two or maybe three separate tasks. If we consider how the database will actually
    work in practice, it seems likely that the different uses (hedging, shelter, etc.)
    would be entered right at the start of the project and be updated from time to
    time. Entering information about uses is a task that a user might want to perform
    independently of any specific plant information. At some later time, the same
    user, or someone else, may want to enter details of a plant and relate it to the
    uses that are already recorded.


    These are important questions to consider about any use cases related to input.
    How will it be done in practice? Will different people be involved? Will bits
    of the data be entered at different times? Answering these questions is the first
    part of the analysis, where we have to get inside the users’ heads to find out
    what they really do. (Don’t ever rely on them telling you.)


    ![images](images/sq.jpg) Tip For data entry or editing, separate the tasks done
    by different people or at different times into their own use cases.


    Now Let’s look at use case 2 where we want to report about plants. We can find
    out more about the problem by probing a bit more deeply into how the user envisages
    the reporting of information about plants. Think about the following dialog:


    *You*: Would you like to be able to print out a list of all your plants to put
    in a folder or send to people?


    *User*: That would be good.


    *You*: What order would you like the plants to be listed in?


    *User*: By their genus, I guess. Alphabetical?


    *You*: Genus? So you’d like, for example, all the Eucalyptus plants together.


    *User*: Yep, that would be good.


    At this point in the conversation, we see another level of the problem. (Give
    yourself bonus points if you’ve already thought of the issue I’m about to describe.)
    If we look carefully at the data in the original table, we can see that it appears
    that each genus includes a number of species, and each of these species can have
    many uses. Another question can confirm whether we understand the relationship
    between genus and species correctly.


    *You*: So each species belongs to just one genus? Is that right?


    *User*: That’s right.


    We can see that asking questions about the reporting use cases in the initial
    problem statement is another excellent way to find out more about the problem.


    ![images](images/sq.jpg) Tip For data retrieval or reporting tasks, ask questions
    about which attributes might be used for sorting, grouping, or selecting data.
    These attributes may be candidates for additional classes.


    We now realize that we have a new class, Genus, to add to our data model. Why
    is it important to include this new class? Well, if genus remains as simply an
    attribute of our original Plant class, we can enter pretty much any value for
    each object. Two objects with genus *Eucalyptus* might end up with different spellings
    (almost certainly if I were doing the data entry). This would cause problems every
    time we wanted to find or count or report on all *Eucalyptus* plants. The fact
    that our user has mentioned that grouping by genus would be useful means that
    it is important to get the genus data stored appropriately. Our revised data model
    in [Figure 2-12](#9781430242093_Ch02.xhtml#F12) shows how genus can be represented
    so that the data is kept accurately.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-12_fmt.jpeg)


    [**Figure 2-12.**](#9781430242093_Ch02.xhtml#FG12) Revised data model for our
    plant problem


    We now have a set of genus objects, and each plant must be associated with exactly
    one of them. You will see in [Figure 2-12](#9781430242093_Ch02.xhtml#F12) that
    we have also renamed the Plant class to Species, as it is the species, or type
    of plant, about which we are keeping information, not actual physical plants.
    This opens the way for future extension of the model to keep information about
    actual plants if we so wish (e.g., when each was planted, when it was pruned,
    and so on).


    Entering the values of each genus will likely be a separate job from entering
    data for each species, so it should have its own use case. We don’t want or need
    to enter a new object for the *Eucalyptus* genus every time we enter a new species.


    [Example 2-2](#9781430242093_Ch02.xhtml#ex2-2) shows the amended use cases. See
    how the reporting use cases can now be much more precisely defined in terms of
    the data model.


    [EXAMPLE 2-2](#9781430242093_Ch02.xhtml#exb2). REVISED USE CASES FOR THE PLANT
    DATABASE


    [Figure 2-13](#9781430242093_Ch02.xhtml#F13) shows the revised use cases for the
    plant problem. Text following the figure describes each use case.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-13_fmt.png)


    [**Figure 2-13.**](#9781430242093_Ch02.xhtml#FG13) Revised use cases for the plant
    problem


    **Use case 1**: Maintain uses. Create or update a use object. Enter (or update)
    the name.


    **Use case 2**: Maintain genus. Create or update a genus object. Enter the name.


    **Use case 3**: Maintain species. Create a species object. Generate a unique ID,
    and enter the species and common name. Associate the new species object with one
    of the existing genus objects and optionally associate it with any number of the
    existing uses.


    **Use case 4**: Report plant information. For each genus object, write out the
    name and find all the associated species objects. For each species object, write
    out the species and common name. Find all the associated uses and write out their
    names.


    **Use case 5**: Report use information. For each use object, write out the name.
    Find all the associated species objects, and write out for each the associated
    genus name and the species and common names.


    What we have done here is taken some initial use cases and explored the details
    (e.g., how would you like the plants ordered in the report?). This led us to update
    the class diagram. We then looked at how the new class diagram copes with the
    tasks we need to carry out. This is an iterative process and forms the main part
    of the analysis of the problem. After a few iterations, we will have a much clearer
    idea of what the users want and what they mean by many of the terms they use.


    Design'
  trans: '

    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-11_fmt.jpeg)


    **图 2-11.** 植物示例数据模型的首次尝试


    现在，我们需要检查这个模型是否能够满足 图 2-4 中三个用例的要求：


    **用例 1：** 维护植物信息。我们可以为每棵植物创建对象，并记录我们现在或将来可能需要的属性。我们可以创建用途对象，并且可以在特定的植物和用途对象之间指定关系实例。


    **用例 2：** 报告植物信息。我们可以获取一个特定的植物对象（或依次获取每一个），并找出其属性的值。然后，我们可以找到所有与该植物对象相关的用途对象。


    **用例 3：** 报告用途信息。我们可以获取一个特定的用途对象，并找出所有与之相关的植物对象。


    到目前为止还不错。但让我们再仔细看看。用例 1 实际上是两个，甚至可能是三个独立的任务。如果我们考虑数据库在实际中如何运作，很可能不同的用途（`hedging`、`shelter`
    等）会在项目一开始就被输入，并且会不时更新。输入用途信息是一项用户可能希望独立于任何特定植物信息执行的任务。在稍后的某个时间，同一个用户或其他人可能希望输入一棵植物的详细信息，并将其与已记录的用途关联起来。


    这些都是关于任何与输入相关的用例时需要考虑的重要问题。在实践中将如何完成？会涉及不同的人吗？数据的不同部分会在不同的时间输入吗？回答这些问题是分析的第一部分，在这里我们必须深入了解用户的想法，以发现他们实际做什么。（永远不要依赖他们会告诉你。）


    ![images](img/sq.jpg) **提示** 对于数据输入或编辑，将由不同人员执行或在不同时间完成的任务分离到它们自己的用例中。


    现在，让我们看看用例 2，我们想要报告植物信息。通过更深入地探究用户设想如何报告植物信息，我们可以发现更多问题。思考以下对话：


    *你*：您希望能够打印出您所有植物的列表，放在文件夹里或发送给别人吗？


    *用户*：那会很好。


    *你*：您希望植物按什么顺序列出？


    *用户*：按它们的属，我猜。按字母顺序？


    *你*：属？所以您希望，例如，所有的 `Eucalyptus` 植物列在一起。


    *用户*：是的，那会很好。


    在对话的这一点上，我们看到了问题的另一个层面。（如果你已经想到了我即将描述的问题，请给自己加分。）如果我们仔细查看原始表格中的数据，我们可以看到每个属似乎包含多个物种，而每个物种又可以有多种用途。另一个问题可以确认我们对属与物种之间关系的理解是否正确。


    *你*：所以每个物种只属于一个属？对吗？


    *用户*：没错。


    我们可以看到，在最初的问题陈述中，询问关于报告用例的问题是了解更多问题的另一个绝佳方式。


    ![images](img/sq.jpg) **提示** 对于数据检索或报告任务，询问有关哪些属性可能用于排序、分组或选择数据的问题。这些属性可能是额外类别的候选。


    我们现在意识到，需要在我们的数据模型中添加一个新的类别，`Genus`（属）。为什么包含这个新类别很重要？嗯，如果 `genus` 只是作为我们原始 `Plant`（植物）类别的一个简单属性，我们几乎可以为每个对象输入任何值。两个
    `genus` 为 `Eucalyptus` 的对象最终可能会有拼写差异（如果是我输入数据，几乎肯定会这样）。每当我们想要查找、计数或报告所有 `Eucalyptus`
    植物时，这都会导致问题。我们的用户提到按 `genus` 分组会有用，这一事实意味着正确存储 `genus` 数据非常重要。我们在 图 2-12 中修订的数据模型展示了如何表示
    `genus` 以使数据保持准确。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-12_fmt.jpeg)


    **图 2-12.** 针对我们植物问题的修订数据模型


    我们现在有了一组 `genus` 对象，每个 `plant` 必须与其中恰好一个相关联。你会在 图 2-12 中看到，我们还将 `Plant` 类别重命名为
    `Species`（物种），因为我们存储信息的对象是物种或植物类型，而不是实际的物理植株。这为我们未来扩展模型以保存关于实际植株的信息（例如，每棵植株是何时种植的、何时修剪的等等）开辟了道路。


    输入每个 `genus` 的值可能与输入每个 `species` 的数据是分开的工作，因此它应该有自己的用例。我们不希望也不需要每次输入一个新的 `species`
    时都为 `Eucalyptus` 属输入一个新对象。


    示例 2-2 展示了修订后的用例。看看报告用例现在如何能够根据数据模型更精确地定义。


    ## 示例 2-2. 植物数据库的修订用例


    图 2-13 展示了植物问题的修订用例。图后的文字描述了每个用例。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-13_fmt.png)


    **图 2-13.** 植物问题的修订用例


    **用例 1：** 维护用途。创建或更新一个 `use` 对象。输入（或更新）名称。


    **用例 2：** 维护属。创建或更新一个 `genus` 对象。输入名称。


    **用例 3：** 维护物种。创建一个 `species` 对象。生成一个唯一的 ID，并输入物种名和俗名。将新的 `species` 对象与一个现有的 `genus`
    对象关联，并可以选择将其与任意数量的现有 `uses` 关联。


    **用例 4：** 报告植物信息。对于每个 `genus` 对象，写出其名称并找出所有关联的 `species` 对象。对于每个 `species` 对象，写出物种名和俗名。找出所有关联的
    `uses` 并写出它们的名称。


    **用例 5：** 报告用途信息。对于每个 `use` 对象，写出其名称。找出所有关联的 `species` 对象，并为每个 `species` 写出其关联的
    `genus` 名称以及物种名和俗名。


    我们在这里所做的是，从一些初始用例出发，探索了细节（例如，您希望报告中植物按什么顺序排列？）。这引导我们更新了类图。然后我们研究了新的类图如何处理我们需要执行的任务。这是一个迭代过程，并且构成了问题分析的主要部分。经过几次迭代，我们将更清楚地了解用户想要什么，以及他们使用的许多术语是什么意思。


    ## 设计

