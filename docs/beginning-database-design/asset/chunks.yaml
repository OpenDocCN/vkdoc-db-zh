    # CHAPTER 3


    ![image](images/frontdot.jpg)


    # Initial Requirements and Use Cases


    In this chapter, we consider part of the first step from real-world problem to
    eventual real–world solution as described in [Chapter 2](#9781430242093_Ch02.xhtml).
    First we need to make sure we really understand the problem. This may sound obvious,
    but it is surprising how often people set about implementing a database before
    they understand the problem completely. There are two things we need to do: understand
    what tasks need to be carried out by all the people who will use the system, and
    then figure out what data needs to be stored to support them. Use cases and class
    diagrams as shown in [Figure 3-1](#9781430242093_Ch03.xhtml#F1) are a great way
    to start to consolidate our understanding of a problem.


    ![9781430242093_Fig03-01.eps](images/9781430242093_Fig03-01_fmt.png)


    *[**Figure 3-1**](#9781430242093_Ch03.xhtml#FG1). The first step: developing an
    abstract model of the real-world problem*


    First, we have to *fully* understand the real problem. It is not enough to have
    a rough idea of what a business or club or scientist does. One of my favorite
    quotations comes from Peter Coad and Ed Yourdon’s book *Object Oriented Analysis*,^([1](#9781430242093_Ch03.xhtml#fn1))
    in which they have this to say about analyzing an air traffic control system:


    *The analyst needs to immerse himself in the problem domain so deeply that he
    begins to discover nuances that even those who live with air traffic control every
    day have not fully considered.*


    While the people involved are the experts in their particular real-world problem,
    they seldom need to think in an abstract way about the details. Exceptions and
    irregularities can just be “dealt with” as they arise. In a manual system, someone
    can scribble a note, post an additional invoice, or adjust some totals. However,
    an automated system cannot be so forgiving, and possible irregularities need to
    be considered right from the start.


    People will not usually volunteer information about the little oddities of their
    problem, and even when questioned will often not recognize that they might be
    important. Answers such as “No, not really,” or “Hardly ever,” or “Umm, no, I
    don’t think so, umm, well maybe,” are a sign that a complication exists that needs
    to be understood before any design of a database should proceed further.


    As you have seen in the previous chapters, databases are often set up to solve
    one immediate problem with little regard for what may come next or how sometimes
    the situation may vary from the norm. In [Example 1-4](#9781430242093_Ch01.xhtml#ex1-4),
    “Academic Results,” tables were set up to record students’ marks without considering
    the (sadly not altogether uncommon) case of a student having to repeat a subject.


    In this chapter, we look at ways to get an initial, accurate overview of the problem
    and express this with use cases. Then, having understood all the definitions,
    details, exceptions, irregularities, reasonable extensions, and uses of the system
    (gasp), we have to ensure that our abstract model captures the most important
    features accurately. It is, after all, the abstract model that will eventually
    be implemented.


    You may be designing your own database, or perhaps you are designing one for someone
    else. In either case, there are two views of the problem. One is the concrete,
    real-world view from the person who will be the eventual user (I will call this
    person the client), and the other view is the more abstract model from the person
    who is designing and possibly developing the system (I’ll call this person the
    analyst). If you are designing your own database, then wear two hats and swap
    them as necessary.'
