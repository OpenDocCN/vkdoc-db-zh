- fmt: '## Constraints on a Form


    The data entry operator enters the details into the white boxes, but as the `studentID`
    and `courseID` are entered, the corresponding names will appear, providing some
    feedback to the user. It is also possible to constrain what the user is allowed
    to do. In the form in [Figure 11-6](#9781430242093_Ch11.xhtml#F6), the properties
    of the three name fields have been changed to read–only so that the user can see,
    but not accidentally change, the values. Graying out the background makes it clear
    to the users that these three fields are just for information. Default values
    can also make forms more efficient to use. At the beginning of any particular
    year, it is probable that only enrollments for that year will be entered, so specifying
    a default value in the year field will speed data entry. Form generators allow
    forms such as that in [Figure 11-6](#9781430242093_Ch11.xhtml#F6) to be quickly
    developed. Web software such as Expression Web or Dreamweaver allows similar forms
    to be generated which allow access to a database through web browsers.


    How else could we improve the form for enrollment entry? Have another look at
    the data model in [Figure 11-2](#9781430242093_Ch11.xhtml#F2). Both the `Student`
    class and the `Course` class have a 1–Many relationship with the `Enrollment`
    class. Each student has many enrollments, as does each course. From the point
    of view of data entry, which of these is most relevant? At the beginning of the
    year, it is likely that a student will turn up in the registrar’s office and want
    to make all his enrollments at one time. It makes sense to let our form reflect
    this 1–Many relationship between a student and his enrollments.


    The form in [Figure 11-7](#9781430242093_Ch11.xhtml#F7) is a combination of two
    forms. The top part is a form based on fields from the `Student` table. The bottom
    part is a subform set out in a similar way to the one in [Figure 11-6](#9781430242093_Ch11.xhtml#F6)
    but based on a view joining the `Enrollment` and `Course` tables. The two forms
    are related so that we only see enrollments for the student displayed at the top.
    Now once a particular student’s record is located, the data entry operator can
    enter all the enrollments in one place.


    ![9781430242093_Fig11-07.tif](images/9781430242093_Fig11-07_fmt.jpeg)


    `[Figure 11-7.](#9781430242093_Ch11.xhtml#FG7)` Form based on `Student` with a
    subform based on a join between `Enrollment` and `Course`


    The next obvious addition to help with data entry is to allow a user to choose
    from a list of available choices rather than having to type them in. For example,
    in the enrollment form in [Figure 11-7](#9781430242093_Ch11.xhtml#F7), referential
    integrity requires that the course codes entered into the `Enrollment` table must
    be ones that already exist in the `Course` table. If the user enters a code that
    does not exist, he will get an error message from the underlying database system.
    Rather than have that happen, we can present the user with a drop–down list of
    allowed courses. In [Figure 11-8](#9781430242093_Ch11.xhtml#F8), we have changed
    the text box for the course code to a list box. We then specify that the list
    box is to display the primary key values from the `Course` table.


    ![9781430242093_Fig11-08.tif](images/9781430242093_Fig11-08_fmt.jpeg)


    `[Figure 11-8.](#9781430242093_Ch11.xhtml#FG8)` A list box to allow the user to
    select a subject


    We can also use a list box for other constraints. A likely situation is that in
    our table of course data, we might specify that particular subjects are or are
    not being offered, as in [Figure 11-9](#9781430242093_Ch11.xhtml#F9).


    ![9781430242093_Fig11-09.tif](images/9781430242093_Fig11-09_fmt.jpeg)


    `[Figure 11-9.](#9781430242093_Ch11.xhtml#FG9)` Course table with field for whether
    a course is being offered


    When entering new enrollments in the `Enrollment` table, we want to restrict the
    value of `course` to just those courses from the `Course` table with `''Y''` in
    the `offered` field. How are we to do this? A check constraint as described in
    [Chapter 9](#9781430242093_Ch09.xhtml) won’t do. Check constraints are based on
    values in the table we are updating. Here we are updating one table, `Enrollment`,
    but we need to check something about a row in a different table, `Course`. Referential
    integrity won’t help because that only requires the course code to exist in the
    `Course` table and would therefore allow `C205`. We can use a list box as in [Figure
    11-8](#9781430242093_Ch11.xhtml#F8) to help with this problem. Instead of populating
    the list box with all values from the `Course` table, we can populate it with
    values from a view that selects just those courses that are offered. The SQL to
    create such a view is shown in [Listing 11-2.](#9781430242093_Ch11.xhtml#L2)


    `[Listing 11-2.](#9781430242093_Ch11.xhtml#Lis2)` A Query that Will Select the
    Codes of Offered Courses


    ```sql

    CREATE VIEW OfferedCourses AS

    SELECT courseID FROM Course

    WHERE offered = ''Y''

    ```


    Now if we restrict the user to just those values in the list box populated with
    this query, we have effectively applied our constraint. Be aware that this constraint
    only takes effect for this particular form. If we update the `Enrollment` table
    in any other way, the constraint will not be in place. The only way to ensure
    that a constraint will always be in place is to put it directly on the table.
    This can be by a check constraint or, for constraints across more than one table,
    by a trigger as discussed in [Chapter 10](#9781430242093_Ch10.xhtml).


    There is a place for constraints that take effect only on some forms. Our enrollment
    example is one of them. The `offered` field is relevant for the current year.
    There will be many rows in our `Enrollment` table from previous years for courses
    that are no longer offered. We may need to retrospectively update some of those
    rows, so we don’t actually want the constraint on the table. We just want to restrict
    *new* rows to courses being offered in the current year. A data entry form is
    a good place to apply that constraint. This is the same as the problem discussed
    in [Chapter 9](#9781430242093_Ch09.xhtml) involving how to prevent orders being
    placed for items that are no longer in stock. The same solution will work there,
    too. In effect, we have a set of permanent constraints applied to our database
    tables through the table design. In addition, we can have other constraints on
    our forms that apply only in certain situations.


    ## Restricting Access to a Form


    Forms offer designers a great deal of versatility on what they can allow users
    to do. Most form design software will allow you to specify whether the form can
    be used just for viewing the data, or for updating or deleting records. You can
    also specify that certain fields on a form cannot be changed. For example, in
    [Figure 11-8](#9781430242093_Ch11.xhtml#F8) we would probably not want a user
    who is meant to be entering enrollments to change a student’s ID number or change
    the name of a course. However, we do want him to be able to see these values for
    confirmation that he has the correct records. Allowing read–only access to the
    ID and course name fields will prevent accidental changes to that data.


    Because the forms are based on views or tables, we can also restrict *who* can
    see or update the data through the form. We can do this by granting different
    permissions to the underlying views to different groups of users as described
    in [Chapter 10](#9781430242093_Ch10.xhtml). We might grant a responsible group,
    such as administrators, update permission to our view, while allowing less–reliable
    groups such as academics read permission only.


    ## Reports'
