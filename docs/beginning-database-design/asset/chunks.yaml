    图 5-13 展示了一些示例对象。我们有一个员工与一个单一组之间的直接联系（Jim 在 A 组工作），以及另一个组与其所属的一个部门之间的联系（A 组属于
    1 部门）。因此，我们可以在 Jim 和 1 部门之间建立明确且唯一的联系。


    ![9781430242093_Fig05-13.eps](img/9781430242093_Fig05-13_fmt.png)


    图 5-13. 一个 `断层陷阱`


    到目前为止，一切顺利。然而，在类似情况下，检查这种联系是否始终存在总是有用的。如果 Ann 没有分配到具体的组呢？也许她是 1 部门的总管理员，为所有组服务。如果一个员工不一定属于某个组，那么图
    5-12 中的模型就无法提供 Ann 与其部门之间的链接。要找到合适的 `部门` 对象，我们需要知道其所在的 `组`，但 Ann 没有相关的 `组` 对象。如果我们需要知道这个信息，那就有问题了。这有时被称为
    `断层陷阱`（我们无法从这里到达那里）。


    这又是一个通过仔细研究数据模型而对问题提出有趣疑问的案例。对于像图 5-12 这样的模型，我们应该始终检查员工可能未附加到任何组的特殊情况。


    如何解决 `断层陷阱` 问题取决于我们正在建模的情况。一种可能是在部门和员工之间添加另一个关系，这样我们总是可以建立那种联系。然而，这种额外的关系会导致信息冗余。对于许多员工来说，我们将有两种方式将他们与部门联系起来：直接联系和通过其所在的组联系。这就是我们在示例
    5-3 中遇到的情况，并可能导致连接员工和部门的结果不一致。**不推荐**。


    在示例 5-4 中解决问题的另一种方法是引入另一个组对象（管理或辅助人员）。Ann 可以属于这个组，然后我们可以坚持每个员工 `必须` 属于一个组。然而，也许这个问题需要完全重新建模。通常最好回到用例，重新考虑对问题而言什么信息是最重要的。在资源有限的项目中，不可能捕捉到每一个细节，因此务实主义变得非常重要。


    ## 同类对象之间的关系


    让我们回到示例 5-1 中的体育俱乐部。许多俱乐部要求新成员由现有成员介绍或担保。如果需要存储担保信息，数据模型的初步尝试可能如图 5-14 所示。


    ![9781430242093_Fig05-14.tif](img/9781430242093_Fig05-14_fmt.jpeg)


    图 5-14. 对成员和担保人建模（不正确）


    图 5-14 中模型的问题在于（根据定义）担保人是成员。该模型意味着，如果 Jim 担保俱乐部的一名新成员，我们将为他存储两个对象（一个在 `成员` 类中，一个在
    `担保人` 类中），两者可能包含相同的信息（直到不可避免地变得不一致）。这里真正发生的是成员相互担保。这可以通过如图 5-15 所示的 `自关联` 来表示。


    ![9781430242093_Fig05-15.tif](img/9781430242093_Fig05-15_fmt.jpeg)


    图 5-15. 成员担保其他成员


    图 5-15 中的关系读起来与两个不同类之间的关系完全一样。顺时针阅读，我们有 *一个特定成员可以担保许多成员*，而逆时针阅读，我们有 *一个特定成员恰好由一个成员担保*。与所有关系一样，我们必须根据方向改变动词（即
    *担保* 和 *由...担保*）。我已经在图 5-15 上做了标注，以消除关于我们朝哪个方向进行的任何困惑。


    这个数据模型中没有任何内容阻止成员担保自己。此类约束需要被记录下来，最有效的方法是在适当的用例中提及它们（例如，添加成员时）。


    `自关联` 出现在很多情况中。对于与谱系或动物育种相关的数据来说尤其如此。考虑图 5-16 中的情况，我们记录有关动物及其母亲的信息（为了让例子简单，我省略了父亲！）。


    ![9781430242093_Fig05-16.tif](img/9781430242093_Fig05-16_fmt.jpeg)


    图 5-16. 关于动物的谱系数据


    顺时针阅读，我们有 *一只动物可能是多只其他动物的母亲*，而逆时针阅读，我们有 *每只动物最多有一位母亲*。为什么不是 *恰好* 一位母亲？每只动物都应该有妈妈，不是吗？这就是我们必须非常清楚我们的类定义的地方。`动物`
    类代表那些我们正在保存其数据的动物，而不是所有动物。例如，如果我们追溯一只纯种狗的血统，我们可能会在我们的数据库中找到他的母亲，以及她的母亲，但最终我们会找到一片空白。你可能会争辩说，为了完整性应该添加额外的世代，但这可能意味着要追溯到原始的泥浆。我们的数据模型并不是说
    *有些动物没有母亲*，而仅仅是说 *有些动物没有记录在我们数据库中的母亲*。


    顺便说一句，请注意，我们的 `动物` 类可能包含两种性别的动物。显然，如果我们确定两个 `动物` 对象之间存在 `是...的母亲` 关系，那么母亲必须是雌性。就目前而言，模型中没有任何内容阻止雄性动物被记录为母亲。这种约束可以在用例中表达，但如果这是一个严肃的谱系数据库，我们可能希望对雄性和雌性进行稍微不同的处理。我们将在第
    6 章 中讨论如何使用称为 `泛化` 和 `特化` 的技术来处理此类情况。


    ## 涉及两个以上类的关系


    在到目前为止的例子中，我们感兴趣的信息通常涉及两个类之间的关系（例如，哪些成员在哪个队中，或哪个员工在哪个组中）。有时我们的数据依赖于两个以上类的对象。让我们重新考虑一个体育俱乐部。除了保存有关成员及其当前队伍的数据外，我们可能还想保存有关队伍之间比赛的信息。现在忽略像轮空这样的复杂情况，^(3)
    我们可以说一场比赛恰好有两支队伍参加。一个可能的数据模型如图 5-17 所示。


    ![9781430242093_Fig05-17.tif](img/9781430242093_Fig05-17_fmt.jpeg)


    图 5-17. 成员、队伍和比赛的可能数据模型

