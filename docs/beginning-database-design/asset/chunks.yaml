  trans: "\n## 图 A-38：保存车辆信息的可能模型\n\n如果我们进行从类到表的转换，我们会从以下表开始（主键带下划线，外键用斜体表示）：\n\n\
    品牌（`品牌名称`）\n\n型号（`型号名称`，`品牌名称`）\n\n版本（`类型名称`，`排量`，`变速箱`，`价格`，`型号名称`，`品牌名称`）（主键？）\n\
    \n车辆（`车牌号`，`颜色`，？）\n\n让我们在这里停一下。`型号`表的主键是`型号名称`和`品牌名称`的组合，这似乎是合理的。我们不能保证型号名称在不同品牌间是唯一的，而引入一个生成的\
    \ ID 在这里似乎并没有增加太多价值。\n\n`版本`表的问题更大。我们需要除`价格`外的所有字段来构成主键：`福特嘉年华自动 1.5 升轿车`与`福特嘉年华自动\
    \ 2.0 升轿车`是不同的版本。拥有这样一个长主键本身没有问题，直到我们处理`车辆`表时。那五个属性的集合将成为外键，并且需要出现在`车辆`表的每一行中。这将变得非常麻烦。\n\
    \n在这一点上，为`版本`表考虑一个生成的 ID 可能是值得的。然后我们可以得到以下表。\n\n品牌（`品牌名称`）\n\n型号（`型号名称`，`品牌名称`）\n\
    \n版本（`版本 ID`，`类型名称`，`排量`，`变速箱`，`价格`，`型号名称`，`品牌名称`）\n\n车辆（`车牌号`，`颜色`，`版本`）\n\n\
    那么类型（如`轿车`、`掀背车`等）怎么办？这里你有两种选择：引入一个新表，或者在`版本`表的`类型名称`字段上创建一个约束。我们可以对颜色做类似的处理。我可能倾向于为类型单独建一个表：随着我们开始考虑三门或五门掀背车以及其他变体，新类型会被不断添加。我甚至不想去想颜色。如果我们能只假设红色、绿色和蓝色，那会很容易，但我敢肯定你会发现有叫做`樱桃色`、`火焰红`、`猩红色`等等颜色。\n\
    \n## 练习 10-1\n\n图 A-39 展示了第 3 章中讨论的订餐问题的数据库表和一些可能的数据。在`订单 _ 餐品`表中，`订单`和`餐品`分别是引用`订单`表和`餐品`表的外键。\n\
    \n![9781430242093_APP01-39.eps](img/9781430242093_APP01-39_fmt.png)\n\n### 图 A-39：用于送餐的表\n\
    \n确定可提供以下信息的查询。\n\n**a) 确定特定订单（例如 232 号）的费用。**\n\n需要哪些表来获取此信息？我们实际上不需要`订单`表。`订单\
    \ _ 餐品`表有订单号和餐品名称，`餐品`表有价格。在`餐品`和`订单 _ 餐品`之间进行连接，条件是`名称 = 餐品`，将给我们提供图 A-40 中的虚拟表。\n\
    \n![9781430242093_APP01-40.tif](img/9781430242093_APP01-40_fmt.jpeg)\n\n### 图\
    \ A-40：餐品表和订单 _ 餐品表连接的结果\n\n图 A-40 中的数据包含了我们需要的所有信息。对于每一行，我们可以将`价格`乘以`数量`。我们可以检索订单`232`的所有行并汇总这些金额。\n\
    \n看一下清单 A-3 中的 SQL 代码，看看是否能理解。\n\n**清单 A-3. 用于查找订单 232 费用的 SQL 代码**\n```sql\n\
    SELECT SUM (quantity * price)\nFROM Meals INNER JOIN Order_Meal on name = meal\n\
    WHERE order = 232\n```\n\n**b) 准备一份未送达订单的列表。**\n\n我们只需要`订单`表来获取此信息。任何没有送达时间的订单都尚未送达（或未记录为已送达）。因此，一个简单的`select`操作来查找`送达时间`字段为空的行即可实现我们的目标。代码如清单\
    \ A-4 所示。\n\n**清单 A-4. 用于查找未送达订单的 SQL 代码**\n```sql\nSELECT *\nFROM Orders\nWHERE\
    \ deliver_time is NULL\n```\n\n清单 A-4 中的查询将为我们提供每个未完成订单的`订单号`、`地址`、`电话`、`司机`和`下单时间`。这足以打电话给司机询问情况。如果我们还想知道点了哪些餐，那么我们需要将`订单`表与`餐品\
    \ _ 订单`表进行连接，以获取所点菜品的名称和数量。\n\n**c) 确定某个月份不同类型餐品的收入。**\n\n这个查询有相当多的步骤，你需要一点练习才能快速得出答案。然而，如果慢慢来，它是很容易理解的。我们需要`餐品`表（用于价格）、`订单\
    \ _ 餐品`表（用于数量）和`订单`表（用于查找日期）。清单 A-5 展示了这三个表之间的连接。\n\n**清单 A-5. 连接餐品数据库中三个表的 SQL\
    \ 代码**\n```sql\nSELECT *\nFROM (Meal INNER JOIN Order_Meal ON name = meal)\n \
    \         INNER JOIN Orders ON order = order_num\n```\n\n图 A-41 展示了清单 A-5 中连接产生的一些最相关的列。前三列来自`餐品`表，接下来三列来自`订单\
    \ _ 餐品`表，其余列来自`订单`表。\n\n![9781430242093_APP01-41.tif](img/9781430242093_APP01-41_fmt.jpeg)\n\
    \n### 图 A-41：餐品表、订单 _ 餐品表和订单表连接后的部分列\n\n一个`WHERE`子句将找到所需时间段内的行。（例如，`WHERE 下单时间\
    \ >= 2012/02/01 AND 下单时间 < 2012/03/01` 将检索 2012 年 2 月的行。）我们可以进行`数量`和`价格`的乘法运算来计算总额，类似于本问题\
    \ a)部分的做法。一个`GROUP BY`子句将允许我们找到每种餐品类型的总额。\n\n清单 A-6 展示了最终的查询。试着识别不同的部分。\n\n**清单\
    \ A-6. 用于查找 2012 年 2 月不同类型餐品收入的 SQL 代码**\n```sql\nSELECT type, SUM (quantity *\
    \ price)\nFROM (Meal INNER JOIN Order_Meal ON name = meal)\n          INNER JOIN\
    \ Orders ON order = order_num\nWHERE Order_time >= 02/01/2012 AND Order_time <=\
    \ 03/01/2012\nGROUP BY type\n```\n\n## 练习 11-1\n\n在练习 3-1 中，我们研究了学校记录学生缺勤的问题。初始用例如图\
    \ A-42 所示，初始数据模型如图 A-43 所示。设计一些表单以满足数据输入需求（用例 1-3），并设计一些报告以满足输出用例（4 和 5）。\n\n\
    ![9781430242093_APP01-42.eps](img/9781430242093_APP01-42_fmt.png)\n\n### 图 A-42：记录和报告学校缺勤情况的用例\n\
    \n![9781430242093_APP01-43.tif](img/9781430242093_APP01-43_fmt.jpeg)\n\n### 图\
    \ A-43：记录学校缺勤情况的数据模型\n\nA-44 展示了一些具有代表性的表数据：外键，`学生`和`教师`，已分别添加到`缺勤`表和`学生`表中。\n\
    \n![9781430242093_APP01-44.eps](img/9781430242093_APP01-44_fmt.png)\n\n### 图 A-44：学校缺勤情况的一些数据\n\
    \n用于输入教师和学生数据的表单非常简单，因为它们各自基于单个表。记录缺勤的表单需要在`缺勤`表中输入`学生 ID`和`日期`。然而，接听家长电话的学校秘书会希望处理姓名而非\
    \ ID，因此提供姓名信息对于数据输入很重要。图 A-45 展示了一个基于`缺勤`表和`学生`表连接的表单。一个下拉列表按字母顺序显示所有学生的 ID 和姓名，方便选择；只读字段显示学生姓名；新条目的日期默认为今天的日期。\n\
    \n![9781430242093_APP01-45.tif](img/9781430242093_APP01-45_fmt.jpeg)\n"
- fmt: "# Figure A-45. A form for entering absences\n\nFor reporting to teachers,\
    \ we need information from all three tables. Listing A-7 shows the SQL for a view\
    \ which joins the tables. Note that we have an outer join on the `Student` table\
    \ so that all students are included even if they have no absences.\n\n## Listing\
    \ A-7. SQL to Retrieve Information from All Three Tables\n\n```sql\nCREATE VIEW\
    \ AllInfo AS\nSELECT * FROM Teacher INNER JOIN\n(Student LEFT JOIN Absence ON\
    \ studentID = student)\nON teacherID = teacher;\n```\n\n[Figure A-46](#9781430242093_APP.xhtml#F46)\
    \ shows some data resulting from the view in Listing A-7.\n\n![9781430242093_APP01-46.tif](images/9781430242093_APP01-46_fmt.jpeg)\n\
    \n# Figure A-46. Data retrieved from view in A-8\n\nThe data in [Figure A-46](#9781430242093_APP.xhtml#F46)\
    \ has everything we need for all our reports. We just need to select the relevant\
    \ rows, then do some grouping and summarizing.\n\nWe can get the daily absences\
    \ by selecting only those rows for the current day. Ordering that data by student\
    \ name will be fine for the sports teacher, while grouping the data by teacher\
    \ as in [Figure A-47](#9781430242093_APP.xhtml#F47) will be a more useful way\
    \ of getting the information to each classroom teacher.\n\n![9781430242093_APP01-47.tif](images/9781430242093_APP01-47_fmt.jpeg)\n\
    \n# Figure A-47. Current absences grouped for each classroom teacher\n\nAdding\
    \ some counts, selecting data from relevant time periods, and adding grouping\
    \ can provide a number of different reports. [Figure A-48](#9781430242093_APP.xhtml#F13)\
    \ shows two reports: one showing total absences for each day, and the other showing\
    \ total absences for each student in February.\n\n![9781430242093_APP01-48.eps](images/9781430242093_APP01-48_fmt.png)\n\
    \n# Figure A-48. Examples of reports possible with different groupings and summarizing\n\
