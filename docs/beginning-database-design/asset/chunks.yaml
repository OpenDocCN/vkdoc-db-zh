- fmt: 'You may be wondering whether a captain of the team should always be one of
    the players in that team. The model as drawn in [Figure 5-4](#9781430242093_Ch05.xhtml#F4)
    does not have anything to tell us about such a constraint. There are a number
    of ways to represent constraints such as this. It is possible to make the constraints
    part of the relevant use case. For the use case describing entering information
    about a team, we would say that the captain has to be one of the players. The
    *Object Constraint Language (OCL)*, developed by the Object Management Group,^([1](#9781430242093_Ch05.xhtml#fn1))
    to supplement the Unified Modeling Language, UML, provides a formal specification
    for constraints. I will not delve into formal methods in this book, preferring
    to draw attention to these additional constraints in the use case text.


    Another situation in which it is possible to consider two relationships between
    classes is when we have historical data. [Example 5-2](#9781430242093_Ch05.xhtml#ex5-2)
    revisits the `Rooms`, `Groups`, and `Guests` example that we first examined in
    [Chapter 4](#9781430242093_Ch04.xhtml).


    EXAMPLE 5-2: SMALL HOSTEL


    A small hostel consists of single-occupancy rooms. Typically, groups of people
    (e.g. school classes) stay at the hostel. We will expand the problem from [Chapter
    4](#9781430242093_Ch04.xhtml) by keeping information about previous guests as
    well as current guests. A room will have many guests over time.(For simplification,
    we will assume that a guest only stays once and in one room.) The revised model
    is shown in [Figure 5-5](#9781430242093_Ch05.xhtml#F5).


    ![9781430242093_Fig05-05.tif](images/9781430242093_Fig05-05_fmt.jpeg)


    [Figure 5-5.](#9781430242093_Ch05.xhtml#FG5) Model for a single occupancy room
    having many guests over time


    The hostel primarily caters to groups of visitors and so the check–in and check–out
    dates belong with the group rather than each individual guest.


    What can we find out from the model in [Figure 5-5](#9781430242093_Ch05.xhtml#F5)?
    If we have some query about a guest, we can easily find his room number, and we
    can also find the length of the stay by checking the dates of the related group
    object. Things become a little more complicated if we want to find the name of
    the guest currently occupying a room (say there has been a complaint about noise).
    There are an increasing number of guests associated with each room over time,
    so how do we go about finding the current one? One way would be to search through
    all the guests associated with the room and check their associated group information
    to find one with a `date_out` value in the future. Another likely task is to retrieve
    a list of empty rooms. To do this, we would have to find those rooms without a
    guest belonging to a group with a `date_out` in the future.


    These solutions are quite feasible, but for tasks that are likely to be required
    regularly, they are complicated and tedious. A different option is to consider
    having a second relationship between `Room` and `Guest` for the *current* guest.
    All guests will be associated with a room as in [Figure 5-5](#9781430242093_Ch05.xhtml#F5),
    but we add an additional relationship between the current guest and the room.
    This is shown in [Figure 5-6](#9781430242093_Ch05.xhtml#F6).


    ![9781430242093_Fig05-06.tif](images/9781430242093_Fig05-06_fmt.jpeg)


    [Figure 5-6.](#9781430242093_Ch05.xhtml#FG6) Alternative model for a room having
    many guests over time


    With the data model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6), we can find
    the current guest with reference to objects of only two classes (`Room` and `Guest`).
    With the model in [Figure 5-5](#9781430242093_Ch05.xhtml#F5) we needed to inspect
    date attribute values of the `Group` object as well. To find empty rooms, we can
    now simply look for all rooms that have no current guest.


    There are a few problems with modeling the data in this way as some extra updating
    is required to keep the data consistent. For example, when a group checks out,
    we will have to update the `date_out` in `Group`, and we will also have to remove
    each *is currently in* relationship instance to reﬂect that the room is now empty.
    This extra maintenance step is caused because we are in effect storing the same
    piece of information in more than one way. While the *retrieval* of information
    about empty rooms and current guests is simpler for the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6),
    the *updating* of data is more complex. [Table 5-1](#9781430242093_Ch05.xhtml#table-1)
    shows possible use cases for checking out a group, and a report for listing all
    currently empty rooms for each data model.


    [Table 5-1.](#9781430242093_Ch05.xhtml#T5_1) Some Possible Use Cases for the Alternative
    Guest and Room Models


    |   | **With Data Model in [Figure 5-5](#9781430242093_Ch05.xhtml#F5)** | **With
    Data Model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6)** |

    | :--- | :--- | :--- |

    | Check out a group | Update `date_out` for appropriate `Group` object. | Update
    `date_out` for appropriate `Group` object. Find all associated `Guest` objects
    and remove the *currently in* association with the `Room` object. |

    | List all currently empty rooms | First find the occupied rooms: find all `Group`
    objects with `date_out` in the future. Find all the associated `Guest` objects
    for these groups, and the set of all `Room` objects associated with these guests.
    List the `room_number` for all `Room` objects *not* included in this set. | Find
    all `Room` objects that do not have an associated current `Guest` object. |


    It is clear that the reporting is simpler for a model such as that in [Figure
    5-6](#9781430242093_Ch05.xhtml#F6), while the maintenance is simpler for one like
    [Figure 5-5](#9781430242093_Ch05.xhtml#F5). The problem with the model in [Figure
    5-6](#9781430242093_Ch05.xhtml#F6) is that if the updating required when checking
    out a group is not done correctly, we will end up with a database that has inconsistent
    information. While the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6) appears
    easier to query, it is so at the expense of making the maintenance more difficult
    and therefore the reliability more likely to be compromised. As you shall see
    in the next section, it is best to avoid the situation where we have information
    stored more than once.


    At this point we realize that neither of the models in [Figures 5-5](#9781430242093_Ch05.xhtml#F5)
    or [5-6](#9781430242093_Ch05.xhtml#F6) is particularly good for the hostel problem
    if we want to keep historical data about room occupancy. The solution discussed
    in [Chapter 4](#9781430242093_Ch04.xhtml) allowed us to keep information about
    what groups had been to the hostel, who the guests were, and the current occupant
    of a room. That all worked well. Once we try to add the historical data about
    room occupancy, the model becomes difficult to manage. An alternative solution
    is suggested in the Testing Your Understanding section for [Chapter 4](#9781430242093_Ch04.xhtml).


    ## Different Routes Between Classes


    Using the model in [Figure 5-6](#9781430242093_Ch05.xhtml#F6), we can find the
    current guest in a room by two routes: via the relationship *currently in* or
    by checking the `date_out` for each guest who has occupied the room. The problem
    here is that if the data are not carefully maintained, we might find that we come
    up with two different answers. For example, if a group is checked out but we did
    not remove all the *is currently in* associations (as in the use case in [Table
    5-1](#9781430242093_Ch05.xhtml#table-1)), the first route will give us the previous
    guest in the room, while the second route will show an empty room.'
