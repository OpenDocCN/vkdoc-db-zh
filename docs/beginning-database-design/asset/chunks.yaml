    on (or even a filtering or sorting of) the Uses table will enable the user to
    find, for example, all shelter plants. There is no restriction now on how many
    uses a plant can have. The initial setup is slightly more costly, in time and
    expertise, than for the single table described in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    but these separate tables will be able to provide a great deal of additional information.


    [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1) shows us one way we can satisfactorily
    deal with categories. Unfortunately, there are other problems in store. In [Example
    1-1](#9781430242093_Ch01.xhtml#ex1-1), the categories were quite clear cut, but
    this is not always the case. [Example 1-2](#9781430242093_Ch01.xhtml#ex1-2) shows
    the problems that occur when categories and keywords are not so easily determined.


    [EXAMPLE 1-2.](#9781430242093_Ch01.xhtml#exa2) RESEARCH INTERESTS


    An employee of a university’s liaison team often receives calls asking to speak
    to a specialist in a particular topic. The liaison team decides to set up a small
    spreadsheet to maintain data about each staff member’s main research interests.
    Originally, the intention is to record just one main area for each staff member,
    but academics, being what they are, cannot be so constrained. The problem of an
    indeterminate number of interests is solved by adding a few extra columns in order
    to accommodate all the interests each staff member supplies. Part of the spreadsheet
    is shown in [Figure 1-3](#9781430242093_Ch01.xhtml#F3).


    ![9781430242093_Fig01-03.tif](images/9781430242093_Fig01-03_fmt.jpeg)


    [**Figure 1-3.**](#9781430242093_Ch01.xhtml#FG3) Research interests in a spreadsheet


    We are able to see at a glance the research interests of a particular person,
    but as was the case in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1), it is awkward
    to do the reverse and find who is interested in a particular topic. However, we
    have an additional problem here. Many of the research interests look similar but
    they are described differently. How easy will it be to find a researcher who is
    able to “visualize data”?'
  trans: '

    本章通过现实生活的例子，来说明当数据存储在设计不佳的电子表格或表格中时，会遇到的一些非常基础的问题类型。这些都是我在自己的设计工作中遇到的真实案例，它们并非出自教科书或试卷。部分数据已被移除或修改，以保护相关责任方的身份。


    ## 关键词与类别处理不当


    数据库设计中的一个常见问题是未能妥善处理关键词和类别。许多数据库应用涉及的数据都有某种分类方式；产品或事件可能对特定类别的人群有吸引力，而客户也可能按年龄、兴趣或收入（或三者兼有）进行分类。在输入数据时，你通常会想到某个项目及其特定的类别或关键词列表。然而，当你准备报告或进行分析时，可能需要反过来查看数据。你常常希望看到某个类别及其所有项目列表，或项目的数量统计。例如，你可能会问：“我们有多少比例的客户属于高收入群体？”如果关键词和类别最初存储方式不当，生成这类报告就会变得非常困难。


    示例 1-1 描述了一个案例，其中关于植物用途的信息以一种乍看合理的方式记录，但最终却妨碍了某些你认为理应能够执行的查询类型。


    ### 示例 1-1. 植物数据库


    图 1-1 展示了一个记录植物信息的数据库表的片段。开发者决定在记录每种植物的学名和俗名之外，顺便保留其用途信息，以帮助潜在买家判断该植物是否符合他们的需求。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig01-01_fmt.jpeg)


    **图 1-1.** 植物数据库


    如果我们查找一种植物，可以立即看到它的用途。然而，如果我们想找所有适合做树篱的植物，就会遇到问题。我们需要逐一搜索每个用途列。要生成一份所有树篱植物的报告，需要类似这样的逻辑：“`IF
    use1 = ‘hedging’ OR use2 = ‘hedging’ OR use3=‘hedging’`”。此外，当前的数据库表设计限制了一种植物最多只能有三个用途。现在这或许足够，但如果这个三用途的限制需要改变，表结构就必须重新设计以添加新的列。所有相关逻辑也需要修改以包含“`OR
    use4=‘hedging’`”。而且我们心里都明白，无论我们选择多少个用途列，最终总会遇到一种植物需要再多一个用途的情况。精心收集的数据不幸地以一种难以使用和维护的方式保存了下来。


    在示例 1-1 中，真正可惜的是，所有数据都经过精心收集和录入，但表的设计却使得回答“哪些植物适合做防风林？”这类问题变得极其困难。这位开发者已经比许多人做得更好，他将用途分到了独立的列中。通常，类似的数据会被存储在单个列中，用逗号或其他标点符号分隔。（例如，一个用途列的条目可能写着：“shelter,
    hedging, soil stability。”）这种设计比图 1-1 所示的方案更难管理。


    问题在于，数据库的设计主要是为了满足用户的即时需求，即：“我需要存储我拥有的关于每种植物的所有信息。”开发者从单一类型或类别的角度思考数据，即`Plant`（植物），并将每种用途视为植物的一个属性，就像其属名或俗名一样。如果你只想知道诸如“这种植物有什么用途？”这类问题的答案，这种设计没问题。但当反过来搜索具有特定用途的植物时，这种方法就不那么有用了。


    在示例 1-1 中，我们实际上有两组或两类数据：`Plants`（植物）和`Uses`（用途），我们感兴趣的是它们之间的关联。本书后续章节描述的数据建模技术，是一种实用方法，可以帮助你厘清对数据的期望，并帮助你确定支持这些期望的最佳数据库设计。


    稍微提前看一下植物数据库问题的解决方案，你可以通过创建如图 1-2 所示的两个表，快速建立一个有用的关联数据库。（添加一些额外的表会更好，但这将在第 2 章中详细讨论。）


    ![9781430242093_Fig01-02.eps](img/9781430242093_Fig01-02_fmt.png)


    **图 1-2.** 用于表示植物和用途的改进数据库设计


    一位具备基本数据库技能的最终用户，就能够设置适当的键、关系和连接，并生成一些有用的报告。对`Uses`表进行一个简单的查询（甚至只是筛选或排序），用户就能找到所有防风植物。现在，一种植物可以拥有的用途数量没有任何限制。与示例
    1-1 中描述的单表设计相比，这种分离表设计的初始设置在时间和专业知识上成本稍高，但这些独立的表将能够提供大量额外信息。


    示例 1-1 向我们展示了处理类别的一种满意方式。不幸的是，还有其他问题在等着我们。在示例 1-1 中，类别相当明确，但情况并非总是如此。示例 1-2 展示了当类别和关键词不那么容易确定时会出现的问题。


    ### 示例 1-2. 研究兴趣


    一所大学联络团队的员工经常接到电话，要求与某个特定主题的专家通话。该团队决定建立一个小电子表格来维护每位员工主要研究兴趣的数据。最初，他们只打算为每位员工记录一个主要领域，但学者们的天性使其无法受到如此限制。不确定数量的兴趣问题，通过添加几个额外列来容纳每位员工提供的所有兴趣而得到解决。该电子表格的一部分如图
    1-3 所示。


    ![9781430242093_Fig01-03.tif](img/9781430242093_Fig01-03_fmt.jpeg)


    **图 1-3.** 电子表格中的研究兴趣


    我们可以一目了然地看到特定人员的研究兴趣，但和示例 1-1 的情况一样，反过来查找对某个特定主题感兴趣的人就变得很麻烦。然而，我们在这里还有一个额外的问题。许多研究兴趣看起来相似，但描述方式不同。要找到一位能够“可视化数据”的研究人员会有多容易？

    '
- fmt: '## Data Classes and Relationships


    As in Example 1-1, the table has been designed taking just one class of data into
    consideration: in this case, `People`. Really, though, we have two classes, `People`
    and `Interests`, and we are concerned with the connections or relationships between
    them. A solution analogous to that in Example 1-1 would be much more useful in
    this case, too.


    Creating a table of people is reasonably straightforward, but the table of interests
    poses some problems. In Example 1-1, the different possible uses were fairly clear
    (hedging, shelter, etc.). What are the different possible research interests in
    Example 1-2? The answer is not so obvious. A quick glance at the data displayed
    shows eight interests, but it is reasonable to assume that `visualisation` and
    `visualization` are merely different spellings of the same topic. But what about
    `scientific visualisation` and `visualisation of data`—are these the same in the
    context of the problem? What about `computer visualisation`? Any staff member
    with one of these interests would probably be useful for an outside inquiry about
    how to visualize some data.


    Having decided on two classes of data, `People` and `Interests`, we now need to
    clearly define what we mean by them. `People` isn’t too difficult—you might have
    to think about which staff members are to be involved and whether postgraduate
    students should also be included. However, `Interests` is more difficult. In the
    current example, an interest is anything that a staff member might think of. Such
    a fuzzy definition is going to cause us a number of problems, especially when
    it comes to doing any reporting or analysis about specific interests. One solution
    is to predetermine a set of broad topics and ask people to nominate those applicable
    to them. But that task is far from simple. People will be aggrieved that their
    pet topic is not included verbatim and hours (probably months) could be wasted
    attempting to find agreement on a complete list. And this list may well comprise
    a whole hierarchy of categories and subcategories. Libraries and journals expend
    considerable energy and expertise devising and maintaining such lists. Maybe such
    a list will be useful for the problem in Example 1-2, but then again maybe not.


    Having foreseen the difficulties, you may decide that the effort is still worthwhile,
    or you may reconsider and choose a different solution. In the latter case, it
    may well be easier for the liaison team to make a stab at the most likely individual
    and let a real human being sort out what is required. In just the three-month
    period prior to drafting this chapter, I have seen three different attempts at
    setting up spreadsheets or databases to record research interests. Each time,
    a number of hours were spent collecting and storing data before the perpetrator
    started to run into the problems I’ve just described. None of the databases is
    being maintained or used as envisioned.


    ## Repeated Information


    Another common problem is unnecessarily storing the same piece of information
    several times. Such redundancy is often a result of the database design reﬂecting
    some sort of input form. For example, in a small business, each order form may
    record the associated information of a customer’s name, address, and phone number.
    If we design a table that reﬂects such a form, the customer’s name, address, and
    phone number are recorded every time an order is placed. This inevitably leads
    to inconsistencies and problems, especially when the customer moves from one address
    to another. We might want to send out an advertising catalog, and there will be
    uncertainty as to which address should be used. Sometimes the repeated information
    is not quite so obvious. Example 1-3 illustrates one such case.


    ### EXAMPLE 1-3. INSECT DATA[¹](#9781430242093_Ch01.xhtml#fn1)


    Team members of a long-term environmental project regularly visit farms and take
    samples to determine the numbers of particular insect species present. Each field
    on a farm has been given a unique code, and on each visit to a field a number
    of representative samples are taken. The counts of each species present in each
    sample are recorded.


    Figure 1-4 shows a portion of the data as it was recorded in a spreadsheet.


    ![9781430242093_Fig01-04.tif](images/9781430242093_Fig01-04_fmt.jpeg)


    `Figure 1-4.` Insect data in a spreadsheet


    The information about each farm was recorded (quite correctly) elsewhere, thus
    avoiding that data being repeated. However, there are still problems. The fact
    that field `ADhc` is on `farm 1` is recorded every visit, and it does not take
    long to find the first data entry error in row 269. (The coding used for the fields
    raises other issues that we will not address just now.)


    On the face of it, the error of listing field `ADhc` under `farm 2` instead of
    `farm 1` in Figure 1-4 doesn’t seem like such a big deal—but it is avoidable.
    The fact that the farm was recorded in this spreadsheet means that the data is
    probably likely to be analyzed by farm, and now any results for `farm 1` and `farm
    2` are potentially inaccurate. And how many other data entry errors will there
    be over the lifetime of the project? Given that the results in Example 1-3 came
    from a carefully designed, long–term experiment and were to be statistically analyzed,
    it seems a shame that such errors are able to slip in when they can be easily
    prevented.


    It is important to distinguish the difference between data input errors (anyone
    can make typos now and then) and design errors. The problem in Example 1-3 is
    not that field `ADhc` was wrongly associated with `farm 2` (a simple error that
    could be easily fixed), but that the association between `farm` and `field` was
    recorded so many times that an eventual error became almost certain. And errors
    such as these can be very difficult to detect.


    Another piece of information is also repeated in the spreadsheet in Example 1-3:
    the date of a visit. The information that field `ADhc` was visited on `Aug-11`
    is repeated in rows 268 to 278, creating another source of avoidable errors (e.g.,
    we could accidentally put `Aug-10` in row 273). Such an error would affect any
    analyses based on `date`.


    The repeated visit date information in Example 1-3 also gives rise to an additional
    and more serious problem: what do you do with miscellaneous information about
    a particular visit (e.g., it was raining at the time—quite important if you are
    counting insects)? Is it just included on one row (making it difficult to find
    all the affected samples), or does it go on every row for that visit (awkward
    and compounding the repeated information problem)? In fact, the weather information
    in this case was recorded quite separately in a text document, thereby making
    it impossible to use the power of the software to help in any analyses of weather.'
