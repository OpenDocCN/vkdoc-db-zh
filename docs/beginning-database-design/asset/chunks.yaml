    [Exercise 3-1](#9781430242093_APP.xhtml#_ex3-1)


    Consider the following scenario and sketch some use cases and an initial data
    model. Assume that the main objectives for the system are to record student absences
    for the classroom teacher, for school reports, and for statistics for the Department
    of Education.


    *When parents call to say that children are sick, we have to let their classroom
    teachers know, and if it’s sports day and the child is on a school team, the sports
    teacher might have to sort out substitutes. Then we need to count up all the days
    missed to put on the child’s report. The Department of Education needs the totals
    each term, too.*


    Let’s run through the steps in the summary section of [Chapter 3](#9781430242093_Ch03.xhtml).


    1.  Determine the main objective of the system.


    We agreed with the client that the main objectives are to record the absences
    for the classroom teacher, for school reports, and for statistics for the Department
    of Education.


    2.  Determine the jobs different users do in an average day.


    *   Secretary takes phone calls and records name of each student.

    *   Secretary collates the absences for each classroom teacher and informs them
    of which students are away.

    *   Secretary gives list of absences to sports teacher if it is a sports day.

    *   Each student’s absences are totaled for his or her report.

    *   All absences are totaled for Department of Education.


    3.   Brainstorm the data that could be associated with each job.


    a.  Secretary takes phone calls and records name of each student.


    Because the absences need to be collated for each student, we need to ensure that
    the correct student is identified. This student data is going to be an essential
    part of the system. We will need to record names for all students and should consider
    introducing an ID number to distinguish students who might have the same name.
    We also need to record the current date.


    b.  Secretary collates the absences for each classroom teacher and informs them
    of which students are away.


    We need to be able to associate each student with a classroom teacher. We will
    need the names of teachers and some contact information. How is the teacher informed?
    Do they get delivered a printed list or are they called on their phones? Maybe
    we could e-mail them. Recording contact information such as room numbers, phone
    numbers, and e-mail addresses for teachers would give us flexibility and is easy
    to do right from the start.


    c.  Secretary gives list of sports team absences to sports teacher if it is a
    competition day.


    This isn’t one of the main objectives, so recording members of sports teams looks
    like it is outside the scope of the problem for now. Being able to print a list
    of all today’s absences is probably sufficient at this point, and we have all
    that information.


    d.  Each student’s absences are totaled for his or her report.


    We are collecting dates of absences and the IDs of the students so we can count
    absences for each student for any required time period (week, term, or year).


    e.  All absences are totaled for Department of Education.


    Same as the preceding, but totaled over all students.


    4.   Agree on the scope of the project and decide on the relevant data.


    At a minimum we need:


    For each teacher: Name and contact details (maybe an ID)'
  trans: "\n虽然所有信息都包含在表格中，但要让报告的呈现形式与图 A-3 完全一致并非易事。因此，这里需要做出权衡。我个人非常想要图 A-3 中的表格格式，但我愿意在格式上妥协，以换取图\
    \ A-4 所提供的额外数据视图。\n\n## 练习 2-1\n\n一个小型体育俱乐部需要管理其会员及他们会费缴纳的信息。秘书希望能够录入会员缴费数据，并打印一份类似图\
    \ A-5 的报告。\n\n![9781430242093_APP01-05.tif](img/9781430242093_APP01-05_fmt.jpeg)\n\
    \n**图 A-5.** 一个小型俱乐部的会员数据\n\n### a)  思考不同数据项可能在何时录入。为数据录入绘制一个初始的用例图。\n\n乍一看，我们可能会认为录入数据是一个一步完成的任务，但仔细观察后会发现，可能存在三个不同的流程。不同会员类型的会费很可能在当年年初就已确定，并可在那时录入。一些会员数据可能已经存在，但我们需要在会员加入俱乐部时添加新成员。会费可能会在稍后的某个日期缴纳（特别是对于现有会员）。因此，初始的用例图应反映这些独立的任务。\n\
    \n![9781430242093_APP01-06.eps](img/9781430242093_APP01-06_fmt.png)\n\n**图 A-6.**\
    \ *用于录入俱乐部数据的可能用例*\n\n### b)  考虑你需要维护哪些不同类型的信息，并绘制一个简单的类图。\n\n数据在不同阶段录入这一事实，为我们提供了一些线索，表明有多个不同的类参与其中。我们有关于会员类型和会费的信息、关于会员的信息以及关于付款的信息。如下的类图草稿展示了初始设想。\n\
    \n![9781430242093_APP01-07.tif](img/9781430242093_APP01-07_fmt.jpeg)\n\n**图 A-7.**\
    \ *代表俱乐部数据的类图初稿*\n\n现在考虑一下基数。从表面上看，我们有这样的关系：一个特定的类型（例如，全费会员）会关联许多会员；一个会员只属于一种类型；一笔付款只关联一个会员。一个会员可能会有多少笔付款？这取决于我们是只保存一年的信息还是长期保存。有时，像俱乐部秘书这样的人可能只关心手头的工作，即整理好今年的信息——而这可能就是全部需求。然而，如果你费心建立一个数据库，那么拥有一个能够长期应对的数据库是至关重要的。（然后我们将不得不担心会费随时间变化的问题，但稍后再详述。目前我们假设会费保持不变。）包含基数的完整类图如图\
    \ A-8 所示。请注意，会员（目前）可能没有任何付款记录，并且在某些时候，可能存在一些没有任何关联会员的会员类型。\n\n![9781430242093_APP01-08.tif](img/9781430242093_APP01-08_fmt.jpeg)\n\
    \n**图 A-8.** *代表俱乐部数据的类图，包括基数*\n\n### c)  你可以向俱乐部建议哪些不同的报告呈现方式？你的类图是否能方便地获取所需信息？\n\
    \n能够按类型区分会员可能对计算付款汇总和小计很有用（拥有类型类将确保此信息的准确性）。找出未付款的会员将是必不可少的。如果我们只保存单一年度的付款记录，这很容易——只需找出没有关联付款记录的会员即可。然而，如果我们长期保存付款记录，事情就变得有点棘手了。我们需要知道一笔付款是针对哪一年缴纳的，而不是它何时被支付（有些会员可能会非常拖延）。检查某一年是否已付款可能并不令人满意。我们将在后续章节中探讨处理这类问题的方案。\n\
    \n## 练习 3-1\n\n考虑以下场景，并绘制一些用例图和初始数据模型。假设系统的主要目标是：为课堂教师记录学生缺勤情况，为学校报告提供信息，以及为教育部提供统计数据。\n\
    \n*当家长打电话说孩子生病时，我们必须通知他们的课堂教师；如果那天是运动日，而孩子在校队里，体育老师可能需要安排替补。然后，我们需要统计所有缺勤天数，写入孩子的报告。教育部每个学期也需要这些总数。*\n\
    \n让我们按照第 3 章总结部分的步骤来进行。\n\n1.  **确定系统的主要目标。**\n\n    我们与客户达成一致，主要目标是为课堂教师、学校报告和教育部的统计数据记录缺勤情况。\n\
    \n2.  **确定不同用户在平均一天内所做的工作。**\n\n    *   秘书接听电话并记录每个学生的姓名。\n    *   秘书为每位课堂教师整理缺勤信息，并通知他们哪些学生缺席。\n\
    \    *   如果是比赛日，秘书将缺勤名单交给体育老师。\n    *   统计每个学生的缺勤总数，用于其个人报告。\n    *   汇总所有学生的缺勤总数，用于教育部。\n\
    \n3.  **头脑风暴与每项工作相关的数据。**\n\n    a.  秘书接听电话并记录每个学生的姓名。\n\n    由于缺勤信息需要按学生整理，我们必须确保正确识别学生。这些学生数据将是系统的重要组成部分。我们需要记录所有学生的姓名，并应考虑引入\
    \ ID 编号来区分可能有相同姓名的学生。我们还需要记录当前日期。\n\n    b.  秘书为每位课堂教师整理缺勤信息，并通知他们哪些学生缺席。\n\n\
    \    我们需要能够将每个学生与一位课堂教师关联起来。我们需要教师的姓名和一些联系信息。如何通知教师？是给他们送去打印的名单，还是打电话？也许我们可以发电子邮件。从一开始就记录教师的联系信息，如房间号、电话号码和电子邮件地址，会给我们带来灵活性，而且很容易做到。\n\
    \n    c.  如果是比赛日，秘书将运动队缺勤名单交给体育老师。\n\n    这不是主要目标之一，因此记录运动队成员信息目前看来超出了问题范围。能够打印一份当天所有缺勤人员的名单可能就足够了，而我们已经掌握了所有这些信息。\n\
    \n    d.  统计每个学生的缺勤总数，用于其个人报告。\n\n    我们正在收集缺勤日期和学生的 ID，这样我们就可以按任何所需的时间段（周、学期或年）统计每个学生的缺勤次数。\n\
    \n    e.  汇总所有学生的缺勤总数，用于教育部。\n\n    与上一步相同，但汇总所有学生。\n\n4.  **商定项目范围并确定相关数据。**\n\
    \n    至少我们需要：\n\n    对于每位教师：姓名和联系方式（可能还需要一个 ID）\n"
- fmt: "# 学生出勤系统设计过程\n\n## 5. 草拟数据输入用例——考虑异常情况——检查现有表单\n\n[图 A-9](#9781430242093_APP.xhtml#F9)\
    \ 展示了一些初始的数据输入用例。\n\n![9781430242093_APP01-09.eps](images/9781430242093_APP01-09_fmt.png)\n\
    \n`图 A-9.` 数据输入用例\n\n以下是[图 A-9](#9781430242093_APP.xhtml#F9) 中所示用例的简要描述。\n\n1.\
    \  维护教师详情：记录或更新姓名和联系方式。\n2.  维护学生详情：为新学生分配学号。记录或更新姓名，并将学生与现有的班级教师关联。\n3.  记录每次缺勤的日期和缺勤学生的学号。\n\
    \n## 6. 考虑异常情况和复杂问题\n\n一个想到的问题是：我们如何记录一个学生连续缺勤多天的情况？我们有几个选择；我们可以将每一天记录为一次单独的缺勤，或者我们可以记录一次缺勤并带有开始日期和结束日期。前者是最简单的选择。然而，如果学校可能需要关于缺勤类型的一些统计数据（例如，平均缺勤时长是多少？有多少学生一次缺勤超过一周？），那么我们就必须重新考虑我们的方法。由于主要目标只是统计总的缺勤天数，我们目前将每次缺勤记录为单独的一天。另一个问题涉及那些缺勤但未接到家长电话的学生。班级教师将能够使用现有的用例，但这引发了一个问题：缺勤是否有不同的类别。目前，我们只在缺勤数据中添加一条备注。\n\
    \n## 7. 草拟第一个数据模型\n\n[图 A-10](#9781430242093_APP.xhtml#F10) 展示了一个数据模型。\n\n![9781430242093_APP01-10.tif](images/9781430242093_APP01-10_fmt.jpeg)\n\
    \n`图 A-10.` 记录学生缺勤的类图\n\n对于[图 A-10](#9781430242093_APP.xhtml#F10) 中的模型，以下陈述成立：\n\
    \n*   每个学生只有一位班级教师，但可以有多次缺勤。\n*   每位教师可能作为班级教师负责许多学生（但有些教师可能不是班级教师）。\n*   每次缺勤只针对一个学生。\n\
    \n## 8. 根据收集的数据，头脑风暴可能的输出\n\n我们拥有报告每个学生或所有学生缺勤次数所需的全部信息。我们还能检索到哪些进一步的信息？我们已决定不保留缺勤时长。那么缺勤原因呢？添加一些缺勤类别（如生病、学校旅行、体育比赛等）将是一个简单的补充。这可能值得与客户讨论。\n\
    \n草拟信息输出用例。\n\n[图 A-11](#9781430242093_APP.xhtml#F11) 展示了一些满足系统主要目标的输出用例。\n\n\
    ![9781430242093_APP01-11.eps](images/9781430242093_APP01-11_fmt.png)\n\n`图 A-11.`\
    \ 报告信息的用例\n\n以下是[图 A-11](#9781430242093_APP.xhtml#F11) 中所示用例的简要描述。\n\n4.  体育教师完整列表：查找今天日期的所有缺勤记录。打印出相关学生的姓名。\n\
    \    班级教师列表：查找今天日期的所有缺勤记录。打印出学生姓名和教师姓名，并按教师分组。\n5.  提交给教育部门：查找相关时间段内日期的所有缺勤记录并进行计数。\n\
    \    用于学校报告：对于每个学生，统计相关时间段内日期的所有缺勤次数。\n\n# 练习\n\n## 练习 4-1\n\n[图 A-12](#9781430242093_APP.xhtml#F12)\
    \ 展示了一个初步草图，用于对一家出版公司希望保存作者和书籍信息的场景进行建模。考虑关系`writes`两端的可能可选性，并据此确定书籍和作者的一些可能定义。\n\
    \n![9781430242093_APP01-12.tif](images/9781430242093_APP01-12_fmt.jpeg)\n\n`图\
    \ A-12.` 考虑作者写书关系的可能可选性\n\n起初我们可能认为，一个作者总会至少有一本他写的书，一本书也总会至少有一个作者（即使我们可能不知道是谁）。这对于*实际的*书籍和作者来说可能是正确的，但这里我们关心的是关于书籍和作者的*信息*。一家出版公司可能会经常看到某个主题的出书机会，并在寻找作者时记录该信息。同样，出版商可能会保留一个潜在的作者并存储其信息，即使该人尚未为该出版商写过书。\n\
    \n可能的定义可能包括：*书籍是已写成或计划写成的作品；作者是已经或可能在将来写书的人*。\n\n## 练习 4-2\n\n[图 A-13](#9781430242093_APP.xhtml#F13)\
    \ 展示了一个鸡尾酒配方的可能数据模型。缺少了什么？\n\n![9781430242093_APP01-13.tif](images/9781430242093_APP01-13_fmt.jpeg)\n\
    \n`图 A-13.` 鸡尾酒及其成分；缺少了什么？\n\n每种鸡尾酒可能有多种成分（曼哈顿：味美思，威士忌；玛格丽特：龙舌兰，橙味酒，酸橙）。缺少的是用量。正如多对多关系中常见的情况，需要一个中间类。用量取决于鸡尾酒和成分的特定配对。[图\
    \ A-14](#9781430242093_APP.xhtml#F14) 展示了一个更好的模型，并附带了一些可能的数据。包含`Recipe`类允许我们保存诸如制作“大吉利”需要多少朗姆酒，而制作“缆车”又需要多少等信息。\n\
    \n![9781430242093_APP01-14.eps](images/9781430242093_APP01-14_fmt.png)\n\n`图 A-14.`\
    \ 一个中间类`Recipe`可以记录每种鸡尾酒和成分配对的用量。\n\n## 练习 4-3\n\n[图 A-15](#9781430242093_APP.xhtml#F15)\
    \ 展示了关于旅馆客人的部分数据模型。如何修改该模型以保存关于房间占用情况的历史信息？\n\n![9781430242093_APP01-15.tif](images/9781430242093_APP01-15_fmt.jpeg)\n\
    \n`图 A-15.` 如何修改此模型以保存关于房间占用的历史信息？\n\n该数据模型表明，对于单人间的旅馆，一个房间可能空置或最多有一位住客。每位当前的客人占用一个房间。然而，随着时间的推移，一个房间将会有许多不同的客人，客人也可能返回并入住不同的房间。这需要被建模为一个多对多关系，如[图\
    \ A-16](#9781430242093_APP.xhtml#F16)所示。（顺便说一句，从客人与房间关联的可选性为`1`，你可以推断出，我们对客人的定义是在某个阶段被分配了房间的人——而不仅仅是任何可能或不可能来旅馆的人。）\n\
    \n![9781430242093_APP01-16.tif](images/9781430242093_APP01-16_fmt.jpeg)\n\n`图\
    \ A-16.` 用多对多关系建模客人与房间\n\n现在我们有了一个多对多关系，我们需要问：有什么缺失吗？显然缺失的是关于特定客人在何时占用特定房间的信息。这需要一个中间类，如[图\
    \ A-17](#9781430242093_APP.xhtml#F17)所示。\n\n![9781430242093_APP01-17.tif](images/9781430242093_APP01-17_fmt.jpeg)\n\
    \n`图 A-17.` 包含一个`Booking`类以保存客人占用房间的日期信息"
  raw: 'For each student: An ID, name, and classroom teacher


    For each absence: Student ID and date


    5.   Sketch data input use cases—consider exceptions—check existing forms.


    [Figure A-9](#9781430242093_APP.xhtml#F9) shows some initial input use cases.


    ![9781430242093_APP01-09.eps](images/9781430242093_APP01-09_fmt.png)


    [**Figure A-9.**](#9781430242093_APP.xhtml#FG9) *Use cases for data input*


    Here are brief descriptions of the use cases depicted in [Figure A-9](#9781430242093_APP.xhtml#F9).


    1.  Maintain teacher details: Record or update name and contact details.


    2.  Maintain student details: Assign IDs for new students. Record or update names
    and associate the student with an existing classroom teacher.


    3.  Record the date of each absence and the ID of the absent student.


    6.   Consider exceptions and complications.


    One question that springs to mind is: how do we record that a student is away
    for several days at one time? We have a couple of choices; we could record each
    day as a separate absence or we could have one absence with a start date and end
    date. The former is the easiest option. However, if the school is likely to want
    some statistics about the types of absences (e.g., what is the average length
    of an absence? How many students are away for longer than a week at a time?),
    then we would have to rethink our approach. As the main objective is just to total
    the overall number of days, we will record each day as a separate absence for
    now. Another issue involves students that are absent without a call from their
    parents. Classroom teachers will be able to use existing use cases, but this raises
    the question as to whether there are different categories of absence. For now
    we will just add a comment to the data about absences.


    7.   Sketch a first data model.


    A data model is shown in [Figure A-10](#9781430242093_APP.xhtml#F10).


    ![9781430242093_APP01-10.tif](images/9781430242093_APP01-10_fmt.jpeg)


    [**Figure A-10.**](#9781430242093_APP.xhtml#FG10) *Class diagram to record student
    absences*


    For the model in [Figure A-10](#9781430242093_APP.xhtml#F10) the following statements
    are true:


    *   Each student has just one classroom teacher and could have many absences.

    *   Each teacher may be responsible as a classroom teacher for many students (but
    some teachers may not be classroom teachers).

    *   Each absence is for exactly one student.


    8.   Brainstorm the possible outputs given the data being collected.


    We have all the information we need for reporting the number of absences for each
    student or for all students. What further information could we retrieve? We have
    decided not to keep durations of absences. What about the reason for an absence?
    It would be a simple addition to keep some categories of absences (illness, school
    trip, sports match, etc.). That may be worth discussing with the client.


    Sketch information output use cases.


    [Figure A-11](#9781430242093_APP.xhtml#F11) shows some output use cases which
    satisfy the main objectives of the system.


    ![9781430242093_APP01-11.eps](images/9781430242093_APP01-11_fmt.png)


    [**Figure A-11.**](#9781430242093_APP.xhtml#FG11) *Use cases for reporting information*


    Here are brief descriptions of the use cases depicted in [Figure A-11](#9781430242093_APP.xhtml#F11).


    4.   Full list for sports teacher: Find all the absences with today’s date. Print
    out names of associated students.


    Lists for classroom teachers: Find all the absences with today’s date. Print out
    names of students and names of teachers, and group by teacher.


    5.   For Department of Education: Find all the absences with dates in the relevant
    time period and count them.


    For school reports: For each student, count all the absences with dates in the
    relevant time period.


    Exercise 4-1


    [Figure A-12](#9781430242093_APP.xhtml#F12) shows a first draft of modeling the
    situation where a publishing company wants to keep information about authors and
    books. Consider the possible optionalities at each end of the relationships writes,
    and so determine some possible definitions for a book and an author.


    ![9781430242093_APP01-12.tif](images/9781430242093_APP01-12_fmt.jpeg)


    [**Figure A-12.**](#9781430242093_APP.xhtml#FG12) *Consider possible optionalities
    for authors writing books*


    At first we might think that an author will always have at least one book he has
    written and a book will always have at least one author (even if we might not
    know who it is). This may be true for *actual* books and authors, but here we
    are concerned with *information* about books and authors. A publishing company
    might often see an opportunity for a book on a particular topic and record that
    information while they search for an author. Similarly, a publisher might retain
    a potential author and store information even though no books have yet been written
    for the publisher by that person.


    Possible definitions might include: *a book is a work that has been written or
    is planned to be written; an author is a person who has or might in the future
    write a book*.


    Exercise 4-2


    [Figure A-13](#9781430242093_APP.xhtml#F13) shows a possible data model for cocktail
    recipes. What is missing?


    ![9781430242093_APP01-13.tif](images/9781430242093_APP01-13_fmt.jpeg)


    [**Figure A-13.**](#9781430242093_APP.xhtml#FG13) *Cocktails and their ingredients;
    what is missing?*


    Each cocktail may have a number of ingredients (Manhattan: Vermouth, Whisky; Margarita:
    Tequila, Triple Sec, Lime). What are missing are the quantities. As is often the
    case with a Many–Many relationship, an intermediate class is required. The quantities
    depend on a particular pairing of Cocktail and Ingredient. A better model is shown
    in [Figure A-14](#9781430242093_APP.xhtml#F14), along with some possible data.
    The inclusion of the Recipe class allows us to keep information such as how much
    Rum is required for a Daiquiri as opposed to a Cable Car.


    ![9781430242093_APP01-14.eps](images/9781430242093_APP01-14_fmt.png)


    [**Figure A-14.**](#9781430242093_APP.xhtml#FG14) *An intermediate class, Recipe,
    can record quantities for each pairing of cocktail and ingredient.*


    Exercise 4-3


    Part of the data model about guests at a hostel is shown in [Figure A-15](#9781430242093_APP.xhtml#F15).
    How could the model be amended to keep historical information about room occupancy?


    ![9781430242093_APP01-15.tif](images/9781430242093_APP01-15_fmt.jpeg)


    [**Figure A-15.**](#9781430242093_APP.xhtml#FG15) *How could this be amended to
    keep historical information about room occupancy?*


    The data model indicates that, for a hostel with single occupancy rooms, a room
    might be empty or have at most one occupant. Each current guest occupies one room.
    Over time, however, a room will have many different guests, and guests may return
    and occupy different rooms. This needs to be modeled as a Many–Many relationship
    as in [Figure A-16](#9781430242093_APP.xhtml#F16). (As an aside, you can deduce
    from the optionality of 1 for a guest being associated with a room, that our definition
    of a guest is someone who has been assigned a room at some stage—not just any
    person who might or might not come to the hostel.)


    ![9781430242093_APP01-16.tif](images/9781430242093_APP01-16_fmt.jpeg)


    [**Figure A-16.**](#9781430242093_APP.xhtml#FG16) *Guests and rooms modeled with
    a Many–Many relationship*


    Now that we have a Many–Many relationship we need to ask the question: is anything
    missing? Clearly what is missing is information about when a particular guest
    occupied a particular room. This requires an intermediate class as in [Figure
    A-17](#9781430242093_APP.xhtml#F17).


    ![9781430242093_APP01-17.tif](images/9781430242093_APP01-17_fmt.jpeg)


    [**Figure A-17.**](#9781430242093_APP.xhtml#FG17) *Including a Booking class to
    keep information about the dates that guests occupy rooms*'
  trans: "\n# 学生出勤系统设计过程\n\n## 5. 草拟数据输入用例——考虑异常情况——检查现有表单\n\n图 A-9 展示了一些初始的数据输入用例。\n\
    \n![9781430242093_APP01-09.eps](img/9781430242093_APP01-09_fmt.png)\n\n`图 A-9.`\
    \ 数据输入用例\n\n以下是图 A-9 中所示用例的简要描述。\n\n1.  维护教师详情：记录或更新姓名和联系方式。\n2.  维护学生详情：为新学生分配学号。记录或更新姓名，并将学生与现有的班级教师关联。\n\
