    \ (FD4)，`Field` (FD3)，`Date`和`FarmID` (FD2)，并且因为现在我知道了`FarmID`，我就能告诉你`FarmName`\
    \ (FD1)。这就是所有信息，所以这个集合是一个键。它是一个主键，因为如果你移除了任何字段，你就无法知道所有信息（我将把验证这一点留给非常热衷的读者）。\n\
    \n## 问题 d)\n\n将图 A-35 中的数据分解为一组符合第三范式（3rd Normal form）的表。\n\n字段如下（主键带下划线）：\n\n\
    (`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
    \n这符合第一范式（1st Normal Form）吗？\n\n是的。我们没有试图在一个单元格中放入多个信息。\n\n这符合第二范式（2nd Normal\
    \ Form），或者说非键字段是否依赖于整个键？\n\n不是。我们仅通过知道`FarmID`就能确定`FarmName` (FD1)，所以它应该被移除到另一个与它所依赖的字段一起的表中。这给我们留下：\n\
    \n(`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
    \n(`FarmID`, `FarmName`) (新表)\n\n仅通过知道`Visit`就能确定`Date`和`FarmID` (FD2)。移除这两个字段后剩下：\n\
    \n(`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
    \n(`VisitID`, `FarmID`, `Date`) (新表)\n\n仅通过知道`SampleID`和`VisitID`就能确定`Field` (FD3)。所以这需要被移除。\n\
    \n(`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
    \n(`VisitID`, `SampleID`, `Field`) (新表)\n\n最终我们得到以下四个表（键带下划线，外键用斜体）。\n\n*   (`FarmID`,\
    \ `FarmName`)\n*   (`VisitID`, *`FarmID`*, `Date`)\n*   (*`VisitID`*, `SampleID`,\
    \ `Field`)\n*   (*`VisitID`*, *`SampleID`*, `Insect`, `Count`) (原表的剩余部分)\n\n如果我们从图\
    \ A-36 中的类图开始，也能推导出这些表。\n\n![9781430242093_APP01-36.tif](img/9781430242093_APP01-36_fmt.jpeg)\n\
    \n**图 A-36.** `昆虫数据类图`\n\n类图本质上表示一个农场获得多次访问。每次访问有许多关联的样本，对于每个样本，我们可以记录昆虫的数量。我想你会看到，从类图开始会省去很多麻烦，并且还会促使我们思考其他一些可能的类，比如`Field`和`Insect`。然而，这两种方法是达到类似结果的等效途径。\n\
    \n## 练习 9-1\n\n这里我们再次看到非常有用的“客户订购产品”示例。设计将代表图 A-37 中`Order`类的表。考虑约束、主键和外键以及更新规则。\n\
    \n![9781430242093_APP01-37.tif](img/9781430242093_APP01-37_fmt.jpeg)\n\n**图 A-37.**\
    \ `客户下订单模型`\n\n我们假设`customerID`和`product_name`分别是`Product`和`Customer`表的主键。为了表示这两个关系，这些主键将作为新的外键字段包含在`Order`表中。我们将有（外键用斜体）：\n\
    \n`Order` (`customer`, `product`, `date`, `quantity`)\n\n什么是主键？一个客户可能多次订购一个产品，可能在同一日期甚至相同数量。（你可能为你的聚会订购了三打点心，意识到你误算了某些客人的胃口，并立即又订购了三打。）这是一个（相当罕见的）情况，其中没有属性组合可以保证是唯一的，需要添加一个生成的订单号。所有属性都是必要的，因此应具有`NOT\
    \ NULL`约束。如果日期是订单下达的日期，那么它不应该是未来的日期——但如果它是订单生效的日期，也许未来日期是有意义的——我们现在先不限定这个。至于更新规则，我们必须选择`Disallow\
    \ Delete`（默认）。如果删除了客户或产品，我们仍然希望出于会计目的保留订单（如第 9 章所讨论的，我们可能也希望保留产品和客户）。`Nullify\
    \ Delete`将使订单信息无用，因为我们留下的数据会是这样的：“在某个特定日期，某人订购了六件某物。”\n\n创建该表的 SQL 语句将类似于清单 A-2\
    \ 所示。\n\n**清单 A-2.** 创建订单表的 SQL——禁止删除是默认更新规则\n\n```sql\nCREATE TABLE Order (\n\
    \    order_num INT PRIMARY KEY,\n    product INT NOT NULL FOREIGN KEY REFERENCES\
    \ Product,\n    customer INT NOT NULL FOREIGN KEY REFERENCES Customer,\n    quantity\
    \ INT NOT NULL,\n    date DATE NOT NULL,\n);\n```\n\n## 练习 9-2\n\n思考为汽车销售场设置品牌和车型表的可用选项。\n\
    \n我们有品牌（makes）、车型（models）、类型（types）和实际的汽车（cars）。如果我们回溯到第 2 章，思考用户可能用于排序或搜索的属性并将它们作为单独的类是很有用的。（我们在植物案例中对属（genus）这样做了，以确保所有桉树（Eucalyptus）物种的拼写正确）。在这里，我们很可能希望能够找到关于所有福特（Fords）、所有西耶那（Siestas），甚至所有轿车（sedans）或所有蓝色汽车的信息。初始模型可能类似于图\
    \ A-38 中的样子。\n\n![9781430242093_APP01-38.tif](img/9781430242093_APP01-38_fmt.jpeg)"
- fmt: "## Figure A-38: Possible model for keeping car information\n\nIf we do a translation\
    \ from class to tables we would start with the following tables (primary keys\
    \ underlined and foreign keys in italics):\n\nMake (`make name`)\n\nModel (`model\
    \ name`, `make name`)\n\nVersion (`type_name`, `capacity`, `transmission`, `price`,\
    \ `model_name`, `make_name`) (primary key?)\n\nCar (`registration`, `color`, ?)\n\
    \nLet’s pause here. The primary key for the `Model` table being the combination\
    \ of `model_name` and `make_name` seems reasonable. We can’t guarantee model names\
    \ will be unique across makes, and introducing a generated ID doesn’t really seem\
    \ to add much here.\n\nThe `Version` table is more problematic. We need all the\
    \ fields except `price` for a primary key: a `Ford Fiesta automatic 1.5 l sedan`\
    \ is a different version than a `Ford Fiesta automatic 2.0 l sedan`. There is\
    \ no problem with having such a long primary key until we come to the `Car` table.\
    \ That set of five attributes will be the foreign key and will need to be in every\
    \ row of the `Car` table. This is going to become very cumbersome.\n\nAt this\
    \ point it is probably worth considering a generated ID for the `Version`. We\
    \ can then have the following tables.\n\nMake (`make name`)\n\nModel (`model name`,\
    \ `make name`)\n\nVersion (`versionID`, `type_name`, `capacity`, `transmission`,\
    \ `price`, `model_name`, `make_name`)\n\nCar (`registration`, `color`, `version`)\n\
    \nWhat about types (`sedans`, `hatchbacks`, etc.)? You have an option here of\
    \ introducing a new table or of creating a constraint on the `type_name` field\
    \ of the `Version` table. We could do similarly for colors. I’d probably favor\
    \ a table for type: extra types will be constantly added as we start to consider\
    \ three– or five–door hatchbacks and other variants. I don’t even want to think\
    \ about colors. If we could just assume red, green, and blue then it would be\
    \ easy, but I’m sure you will find there are colors called `cherry` and `fire`\
    \ and `scarlet` and…\n\n## Exercise 10-1\n\n[Figure A-39](#9781430242093_APP.xhtml#F39)\
    \ shows the database tables and some possible data for the meal ordering problem\
    \ discussed in [Chapter 3](#9781430242093_Ch03.xhtml). In the `Order_Meal` table,\
    \ `order` and `meal` are foreign keys to the `Orders` and `Meals` tables respectively.\n\
    \n![9781430242093_APP01-39.eps](images/9781430242093_APP01-39_fmt.png)\n\n###\
    \ Figure A-39: Tables for meal delivery\n\nDetermine the queries that would provide\
    \ the following information.\n\n**a) Determine the cost of a specific order (e.g.,\
    \ 232).**\n\nWhich tables are required for this information? We don’t actually\
    \ need the `Orders` table. The `Order_Meal` table has the order number and the\
    \ name of the meal and the `Meals` table has the prices. A join between `Meals`\
    \ and `Order_Meal` with the condition that `name = meal` will give us the virtual\
    \ table in [Figure A-40](#9781430242093_APP.xhtml#F40).\n\n![9781430242093_APP01-40.tif](images/9781430242093_APP01-40_fmt.jpeg)\n\
    \n### Figure A-40: The result of a join between Meals and Order_Meal\n\nThe data\
    \ in [Figure A-40](#9781430242093_APP.xhtml#F40) has all the information we need.\
    \ For each row we can multiply `price` by `quantity`. We can retrieve all the\
    \ rows for order `232` and total those amounts.\n\nHave a look at the SQL in Listing\
    \ A-3 and see if you can understand it.\n\n**Listing A-3. SQL to Find the Cost\
    \ of Order 232**\n```sql\nSELECT SUM (quantity * price)\nFROM Meals INNER JOIN\
    \ Order_Meal on name = meal\nWHERE order = 232\n```\n\n**b) Prepare a list of\
    \ undelivered orders.**\n\nWe only need the `Orders` table to find this information.\
    \ Any order without a delivery time is not yet delivered (or recorded as delivered).\
    \ So a simple `select` operation to find rows with no value in the `deliver_time`\
    \ field will achieve what we want. The code is shown in Listing A-4.\n\n**Listing\
    \ A-4. SQL to Find Undelivered Orders**\n```sql\nSELECT *\nFROM Orders\nWHERE\
    \ deliver_time is NULL\n```\n\nThe query in Listing A-4 will give us the `order\
    \ number`, `address`, `phone`, `driver` and `order time` for each outstanding\
    \ order. That is enough to call the driver and ask what is going on. If we also\
    \ want to know which meals were ordered, then we would need to join the `Orders`\
    \ table with the `Meal_Order` table to get the names and quantities of the dishes\
    \ ordered.\n\n**c) Determine the income from different types of meals in a given\
    \ month.**\n\nThis query has quite a few steps and you will need a bit of practice\
    \ before being able to come up with the answer quickly. However, if taken slowly\
    \ it is quite easy to follow. We need the `Meals` table (for the prices), the\
    \ `Order_Meal` table for the quantities, and the `Order` table to find the dates.\
    \ Listing A-5 shows a join between these three tables.\n\n**Listing A-5. SQL to\
    \ Join the Three Tables in the Meal Database**\n```sql\nSELECT *\nFROM (Meal INNER\
    \ JOIN Order_Meal ON name = meal)\n          INNER JOIN Orders ON order = order_num\n\
    ```\n\n[Figure A-41](#9781430242093_APP.xhtml#F41) shows some of the most relevant\
    \ columns resulting from the join in Listing A-5. The first three columns come\
    \ from the `Meals` table, the next three are from the `Order_Meal` table, and\
    \ the remaining columns are from the `Orders` table.\n\n![9781430242093_APP01-41.tif](images/9781430242093_APP01-41_fmt.jpeg)\n\
    \n### Figure A-41: Some of the columns from a join between Meals, Order_Meal,\
    \ and Orders\n\nA `WHERE` clause will find the rows for the required time period.\
    \ (e.g., `WHERE Order_time >= 02/01/2012 AND Order_time < 03/01/2012` will retrieve\
    \ the rows for February 2012.) We can do a multiplication of `quantity` and `price`\
    \ to find totals, similar to what we did in part a) of this question. A `GROUP\
    \ BY` clause will allow us to find totals for each separate meal type.\n\nListing\
    \ A-6 shows the final query. Try to identify the different parts.\n\n**Listing\
    \ A-6. SQL to Find the Income from Different Types of Meals in February 2012**\n\
    ```sql\nSELECT type, SUM (quantity * price)\nFROM (Meal INNER JOIN Order_Meal\
    \ ON name = meal)\n          INNER JOIN Orders ON order = order_num\nWHERE Order_time\
    \ >= 02/01/2012 AND Order_time <= 03/01/2012\nGROUP BY type\n```\n\n## Exercise\
    \ 11-1\n\nIn [Exercise 3-1](#9781430242093_APP.xhtml#ex3-1) we looked at the problem\
    \ of a school recording student absences. The initial use cases are shown in [Figure\
    \ A-42](#9781430242093_APP.xhtml#F42) and a first data model in [Figure A-43](#9781430242093_APP.xhtml#F43).\
    \ Design some forms to satisfy the data entry requirements (use cases 1–3) and\
    \ reports to satisfy the output use cases (4 and 5).\n\n![9781430242093_APP01-42.eps](images/9781430242093_APP01-42_fmt.png)\n\
    \n### Figure A-42: Use cases for recording and reporting school absences\n\n![9781430242093_APP01-43.tif](images/9781430242093_APP01-43_fmt.jpeg)\n\
    \n### Figure A-43: Data model for recording school absences\n\nSome representative\
    \ data for the tables is shown in A-44: foreign keys, `student` and `teacher`,\
    \ have been added to the `Absence` and `Student` tables respectively.\n\n![9781430242093_APP01-44.eps](images/9781430242093_APP01-44_fmt.png)\n\
    \n### Figure A-44: Some data for the school absences\n\nThe forms to enter data\
    \ about teachers and students are very straightforward as they each are based\
    \ on a single table. The form to record absences requires an entry of a `student\
    \ ID` and a `date` in the `Absence` table. However, the school secretary taking\
    \ calls from parents will want to deal with names rather than IDs, so providing\
    \ information about name is important for data entry purposes. [Figure A-45](#9781430242093_APP.xhtml#F45)\
    \ shows a form based on a join between the `Absence` and `Student` tables. A drop–down\
    \ list shows the IDs and names of all students in alphabetical order for easy\
    \ selection, read–only fields show the names of the students, and the date for\
    \ new entries defaults to today’s date.\n\n![9781430242093_APP01-45.tif](images/9781430242093_APP01-45_fmt.jpeg)"
  raw: '[**Figure A-38.**](#9781430242093_APP.xhtml#FG38) *Possible model for keeping
    car information*


    If we do a translation from class to tables we would start with the following
    tables (primary keys underlined and foreign keys in italics):


    Make (make name)


    Model (model name, make name)


    Version (type_name, capacity, transmission, price, model_name, make_name) (primary
    key?)


    Car (registration, color,?)


    Let’s pause here. The primary key for the Model table being the combination of
    model_name and make_name seems reasonable. We can’t guarantee model names will
    be unique across makes, and introducing a generated ID doesn’t really seem to
    add much here.


    The Version table is more problematic. We need all the fields except price for
    a primary key: a Ford Fiesta automatic 1.5 l sedan is a different version than
    a Ford Fiesta automatic 2.0 l sedan. There is no problem with having such a long
    primary key until we come to the Car table. That set of five attributes will be
    the foreign key and will need to be in every row of the Car table. This is going
    to become very cumbersome.


    At this point it is probably worth considering a generated ID for the Version.
    We can then have the following tables.


    Make (make name)


    Model (model name, *make name*)


    Version (versionID, type_name, capacity, transmission, price, model_name, make_name)


    Car (registration, color, version)


    What about types (sedans, hatchbacks, etc.)? You have an option here of introducing
    a new table or of creating a constraint on the type_name field of the Version
    table. We could do similarly for colors. I’d probably favor a table for type:
    extra types will be constantly added as we start to consider three– or five–door
    hatchbacks and other variants. I don’t even want to think about colors. If we
    could just assume red, green, and blue then it would be easy, but I’m sure you
    will find there are colors called cherry and fire and scarlet and…


    Exercise 10-1


    [Figure A-39](#9781430242093_APP.xhtml#F39) shows the database tables and some
    possible data for the meal ordering problem discussed in [Chapter 3](#9781430242093_Ch03.xhtml).
    In the Order_Meal table, order and meal are foreign keys to the Orders and Meals
    tables respectively.


    ![9781430242093_APP01-39.eps](images/9781430242093_APP01-39_fmt.png)


    [**Figure A-39.**](#9781430242093_APP.xhtml#FG39) *Tables for meal delivery*


    Determine the queries that would provide the following information.


    a)  Determine the cost of a specific order (e.g., 232).


    Which tables are required for this information? We don’t actually need the Orders
    table. The Order_Meal table has the order number and the name of the meal and
    the Meals table has the prices. A join between Meals and Order_Meal with the condition
    that name = meal will give us the virtual table in [Figure A-40](#9781430242093_APP.xhtml#F40).


    ![9781430242093_APP01-40.tif](images/9781430242093_APP01-40_fmt.jpeg)


    [**Figure A-40.**](#9781430242093_APP.xhtml#FG40) *The result of a join between
    Meals and Order_Meal*


    The data in [Figure A-40](#9781430242093_APP.xhtml#F40) has all the information
    we need. For each row we can multiply price by quantity. We can retrieve all the
    rows for order 232 and total those amounts.


    Have a look at the SQL in Listing A-3 and see if you can understand it.


    ***Listing A-3**. SQL to Find the Cost of Order 232*


    SELECT SUM (quantity * price)

    FROM Meals INNER JOIN Order_Meal on name = meal

    WHERE order = 232


    b)  Prepare a list of undelivered orders.


    We only need the Orders table to find this information. Any order without a delivery
    time is not yet delivered (or recorded as delivered). So a simple select operation
    to find rows with no value in the deliver_time field will achieve what we want.
    The code is shown in Listing A-4.


    ***Listing A-4**. SQL to Find Undelivered Orders*


    SELECT *

    FROM Orders

    WHERE deliver_time is NULL


    The query in Listing A-4 will give us the order number, address, phone, driver
    and order time for each outstanding order. That is enough to call the driver and
    ask what is going on. If we also want to know which meals were ordered, then we
    would need to join the Orders table with the Meal_Order table to get the names
    and quantities of the dishes ordered.


    c)  Determine the income from different types of meals in a given month.


    This query has quite a few steps and you will need a bit of practice before being
    able to come up with the answer quickly. However, if taken slowly it is quite
    easy to follow. We need the Meals table (for the prices), the Order_Mealtable
    for the quantities, and the Order table to find the dates. Listing A-5 shows a
    join between these three tables.


    ***Listing A-5**. SQL to Join the Three Tables in the Meal Database*


    SELECT *

    FROM (Meal INNER JOIN Order_Meal ON name = meal)

                 INNER JOIN Orders ON order = order_num


    [Figure A-41](#9781430242093_APP.xhtml#F41) shows some of the most relevant columns
    resulting from the join in Listing A-5\. The first three columns come from the
    Meals table, the next three are from the Order_Mealtable, and the remaining columns
    are from the Orders table.


    ![9781430242093_APP01-41.tif](images/9781430242093_APP01-41_fmt.jpeg)


    [**Figure A-41.**](#9781430242093_APP.xhtml#FG41) *Some of the columns from a
    join between Meals, Order_Meal, and Orders*


    A WHERE clause will find the rows for the required time period. (e.g., WHERE Order_time
    >= 02/01/2012 AND Order_time < 03/01/2012will retrieve the rows for February 2012.)
    We can do a multiplication of quantity and price to find totals, similar to what
    we did in part a) of this question. A GROUP BY clause will allow us to find totals
    for each separate meal type.


    Listing A-6 shows the final query. Try to identify the different parts.


    ***Listing A-6**. SQL to Find the Income from Different Types of Meals in February
    2012*


    SELECT type, SUM (quantity * price

    FROM (Meal INNER JOIN Order_Meal ON name = meal)

                 INNER JOIN Orders ON order = order_num

    WHERE Order_time >= 02/01/2012 AND Order_time <= 03/01/2012

    GROUP BY type


    Exercise 11-1


    In [Exercise 3-1](#9781430242093_APP.xhtml#ex3-1) we looked at the problem of
    a school recording student absences. The initial use cases are shown in [Figure
    A-42](#9781430242093_APP.xhtml#F42) and a first data model in [Figure A-43](#9781430242093_APP.xhtml#F43).
    Design some forms to satisfy the data entry requirements (use cases 1–3) and reports
    to satisfy the output use cases (4 and 5).


    ![9781430242093_APP01-42.eps](images/9781430242093_APP01-42_fmt.png)


    [**Figure A-42.**](#9781430242093_APP.xhtml#FG42) Use cases for recording and
    reporting school absences


    ![9781430242093_APP01-43.tif](images/9781430242093_APP01-43_fmt.jpeg)


    [**Figure A-43.**](#9781430242093_APP.xhtml#FG43) *Data model for recording school
    absences*


    Some representative data for the tables is shown in A-44: foreign keys, student
    and teacher, have been added to the Absence and Student tables respectively.


    ![9781430242093_APP01-44.eps](images/9781430242093_APP01-44_fmt.png)


    **Figure A-44.** *Some data for the school absences*


    The forms to enter data about teachers and students are very straightforward as
    they each are based on a single table. The form to record absences requires an
    entry of a student ID and a date in the Absence table. However, the school secretary
    taking calls from parents will want to deal with names rather than IDs, so providing
    information about name is important for data entry purposes. [Figure A-45](#9781430242093_APP.xhtml#F45)
    shows a form based on a join between the Absence and Student tables. A drop–down
    list shows the IDs and names of all students in alphabetical order for easy selection,
    read–only fields show the names of the students, and the date for new entries
    defaults to today’s date.


