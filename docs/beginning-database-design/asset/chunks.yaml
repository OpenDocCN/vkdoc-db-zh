- fmt: "# Views\n\nWhich fields to index and which type of index to use are not easy\
    \ questions to answer. Different arrangements of indexes will be more suitable\
    \ depending on the type of queries or updating procedures being undertaken at\
    \ any given time. Large database products will usually provide a query analyzer\
    \ that will show you how indexes are being used in a given query and estimate\
    \ the time it will take. If a particular query is causing performance problems,\
    \ you can use the analyzer tools to experiment with different index types to determine\
    \ the best arrangement for that query. This arrangement, sadly, may be suboptimal\
    \ for other queries or updating procedures that you require. After all, database\
    \ design is an art rather than an exact science!\n\n# Creating Views\n\nTo create\
    \ a view, we simply issue the statement for the query we want and preface it with\
    \ the words `CREATE VIEW ... AS`. [Listing 10-17](#9781430242093_Ch10.xhtml#L17)\
    \ shows the SQL statement to create a view that joins the `Customer` and `Order`\
    \ tables. `Cust_Ord` is just a name given to the view so that we can refer to\
    \ it.\n\n**[Listing 10-17.](#9781430242093_Ch10.xhtml#Lis17)** Creating a View\
    \ Joining the Customer and Order Tables\n\n```sql\nCREATE VIEW Cust_Ord AS\nSELECT\
    \ * FROM Customer INNER JOIN Order ON custID = customer\n```\n\nWhen we run or\
    \ open the view, the system will carry out the join and return the results as\
    \ a single virtual table, which it will call `Cust_Ord`. We can treat that table\
    \ as we would any other table, combining it with other tables in new queries and\
    \ so on. It does not physically exist, however. If the data in the underlying\
    \ tables changes, so will the resulting rows in the view.\n\nPart of the design\
    \ of a database includes providing a set of views that will be helpful to the\
    \ users. Referring back to the original use cases will be the best guide as to\
    \ the views that will be most important.\n\n# Uses for Views\n\nClearly, views\
    \ are useful for retrieving data from the database. You will see in the next chapter\
    \ how to use views as a basis for reports such as invoices or price lists. Views\
    \ can also sometimes be used for entering data. If we have a customer who places\
    \ an order for a product, we need to enter a new row in the `Order` table, find\
    \ the customer number from `Customer` table, and probably look up the product\
    \ number and price in a `Product` table. Accessing all these tables individually\
    \ is not going to be efficient, and in the next chapter you will see how to use\
    \ views underneath forms in order to manage data entry and maintenance.\n\nAnother\
    \ use for views is providing some security for our data. Consider an `Employee`\
    \ table. It will have information that everyone will need such as offices and\
    \ phone numbers. It will also have quite private information such as salaries\
    \ that only managers should be able to see. There is also the issue of updating\
    \ information. A secretary might be able to change a phone number but not a salary.\n\
    \nA complete discussion of security issues is well beyond the scope of this book,\
    \ but it is useful to see how views can be used to manage who can see and do what.\
    \ For example, we can set up two views on our `Employee` table. One will display\
    \ employee names and phone numbers, and the other will include salaries. These\
    \ are shown in [Listing 10-18](#9781430242093_Ch10.xhtml#L18).\n\n**[Listing 10-18](#9781430242093_Ch10.xhtml#Lis18).**\
    \ Two Views of the Employee Table\n\n```sql\nCREATE VIEW Phone_view AS\nSELECT\
    \ empID, last_name, first_name, phone from Employee;\n\nCREATE VIEW Manager_view\n\
    AS SELECT empID, last_name, first_name, phone, salary from Employee;\n```\n\n\
    When a table or a view is created, it is owned by the person who created it. This\
    \ will typically be some sort of data administrator. By default, he will be the\
    \ only one to be able to see or update the table or view. The owner of the table\
    \ or view can grant permission to other users or groups of users to read, update,\
    \ or delete from the table or view as appropriate.\n\nTypically, the users of\
    \ the database will be placed into groups that will have different security levels\
    \ or rights. There will always be a `Public` group, which will consist of all\
    \ the users, and for controlling who can view or update different data, we might\
    \ consider groups such as `Managers` and/or `Secretaries`.\n\nWe would like everyone\
    \ to be able to view the names and phone numbers, so we can grant everyone (the\
    \ `Public` group) permission to retrieve or select information from the `Phone_view`.\
    \ We only want managers to be able to see the salaries, so we grant only that\
    \ group permission to see rows from the `Manager_view`. The SQL to give these\
    \ permissions is shown in [Listing 10-19](#9781430242093_Ch10.xhtml#L19).\n\n\
    **[Listing 10-19.](#9781430242093_Ch10.xhtml#Lis19)** Granting Different Groups\
    \ Read Access to Different Views\n\n```sql\nGRANT SELECT on Phone_view TO Public\n\
    GRANT SELECT on Manager_view TO Managers\n```\n\nThere are a number of different\
    \ types of permissions that can be granted to individual database users or groups\
    \ of users. [Listing 10-20](#9781430242093_Ch10.xhtml#L20) shows how we can allow\
    \ the `Secretaries` group to update the information in our view of employees and\
    \ phone numbers.\n\n**[Listing 10-20.](#9781430242093_Ch10.xhtml#Lis20)** Granting\
    \ a Group of Users the Right to Update Data Through a View\n\n```sql\nGRANT UPDATE\
    \ on Phone_view TO Secretaries\n```\n\n# Summary\n\nThis chapter has provided\
    \ a very brief introduction to how queries can be used to retrieve information\
    \ from a database.\n\n*   We can retrieve different subsets of data from our database\
    \ using a number of different relational database operations. These include the\
    \ following:\n    *   Retrieving a subset of rows from a table or view.\n    *\
    \   Retrieving a subset of columns from a table or view.\n    *   Combining two\
    \ tables or views with a join.\n    *   Performing set operations (`intersect`,\
    \ `union`, and `difference`) on tables or views with the same columns.\n*   Indexes\
    \ can help speed up queries. You should consider indexes on fields that are involved\
    \ in `select` or `join` conditions in your queries or are used regularly for ordering\
    \ data. Indexing a foreign key can be beneficial in many situations. Remember\
    \ that indexes can speed up retrieval but may slow down the updating of data.\n\
    *   Views are a way of storing the specification of a query so you can reuse it.\
    \ Views are useful as a basis for forms and reports and can help with controlling\
    \ access for different groups of users.\n\n# TESTING YOUR UNDERSTANDING\n\n##\
    \ Exercise 10-1\n\n[Figure 10-15](#9781430242093_Ch10.xhtml#F15) shows a data\
    \ model describing the meal delivery problem considered in [Chapter 3](#9781430242093_Ch03.xhtml).\
    \ It shows the available meals and which ones appear in each order.\n\n![9781430242093_Fig10-15.tif](images/9781430242093_Fig10-15_fmt.jpeg)\n\
    \n**[Figure 10-15](#9781430242093_Ch10.xhtml#FG15).** Data model for meal delivery\n\
    \nSome of the requirements identified by the client include the following:\n\n\
    a) Determine the cost of a specific order.\nb) Prepare a list of undelivered orders.\n\
    c) Determine the income from different types of meals in a given month.\n\nDetermine\
    \ the queries that would provide the required information. (Caution: after such\
    \ a brief introduction to queries it is not reasonable to expect that a novice\
    \ would be able to write down the queries in full, but do think about what joins\
    \ might be required, which rows need to be selected, and so on.) To help you think\
    \ about the problem, [Figure 10-16](#9781430242093_Ch10.xhtml#F16) shows the database\
    \ tables and some possible data. In the `Order_Meal` table, `order` and `meal`\
    \ are foreign keys to the `Orders` and `Meals` tables respectively."
  raw: "Which fields to index and which type of index to use are not easy questions\
    \ to answer. Different arrangements of indexes will be more suitable depending\
    \ on the type of queries or updating procedures being undertaken at any given\
    \ time. Large database products will usually provide a query analyzer that will\
    \ show you how indexes are being used in a given query and estimate the time it\
    \ will take. If a particular query is causing performance problems, you can use\
    \ the analyzer tools to experiment with different index types to determine the\
    \ best arrangement for that query. This arrangement, sadly, may be suboptimal\
    \ for other queries or updating procedures that you require. After all, database\
    \ design is an art rather than an exact science!\n\nViews\n\nIn our discussion\
    \ of queries so far, we have thought of them as one–off questions that we might\
    \ like to ask the database. Many queries, however, will be ones that we want to\
    \ carry out regularly—for example, retrieving order information to construct an\
    \ invoice or product information for printing a catalog. *Views* are a way of\
    \ saving the specifications of queries so that they can be reused.\n\nCreating\
    \ Views\n\nTo create a view, we simply issue the statement for the query we want\
    \ and preface it with the words “CREATE VIEW … AS.” [Listing 10-17](#9781430242093_Ch10.xhtml#L17)\
    \ shows the SQL statement to create a view that joins the Customer and Order tables.\
    \ Cust_Ord is just a name given to the view so that we can refer to it.\n\n***[Listing\
    \ 10-17.](#9781430242093_Ch10.xhtml#Lis17)** Creating a View Joining the Customer\
    \ and Order Tables*\n\nCREATE VIEW Cust_Ord AS\n\nSELECT * FROM Customer INNER\
    \ JOIN Order ON custID = customer\n\nWhen we run or open the view, the system\
    \ will carry out the join and return the results as a single virtual table, which\
    \ it will call Cust_Ord. We can treat that table as we would any other table,\
    \ combining it with other tables in new queries and so on. It does not physically\
    \ exist, however. If the data in the underlying tables changes, so will the resulting\
    \ rows in the view.\n\nPart of the design of a database includes providing a set\
    \ of views that will be helpful to the users. Referring back to the original use\
    \ cases will be the best guide as to the views that will be most important.\n\n\
    Uses for Views\n\nClearly, views are useful for retrieving data from the database.\
    \ You will see in the next chapter how to use views as a basis for reports such\
    \ as invoices or price lists. Views can also sometimes be used for entering data.\
    \ If we have a customer who places an order for a product, we need to enter a\
    \ new row in the Order table, find the customer number from Customer table, and\
    \ probably look up the product number and price in a Product table. Accessing\
    \ all these tables individually is not going to be efficient, and in the next\
    \ chapter you will see how to use views underneath forms in order to manage data\
    \ entry and maintenance.\n\nAnother use for views is providing some security for\
    \ our data. Consider an Employee table. It will have information that everyone\
    \ will need such as offices and phone numbers. It will also have quite private\
    \ information such as salaries that only managers should be able to see. There\
    \ is also the issue of updating information. A secretary might be able to change\
    \ a phone number but not a salary.\n\nA complete discussion of security issues\
    \ is well beyond the scope of this book, but it is useful to see how views can\
    \ be used to manage who can see and do what. For example, we can set up two views\
    \ on our Employee table. One will display employee names and phone numbers, and\
    \ the other will include salaries. These are shown in [Listing 10-18](#9781430242093_Ch10.xhtml#L18).\n\
    \n***[Listing 10-18](#9781430242093_Ch10.xhtml#Lis18).** Two Views of the Employee\
    \ Table*\n\nCREATE VIEW Phone_view AS\n\nSELECT empID, last_name, first_name,\
    \ phone from Employee;\n\nCREATE VIEW Manager_view\n\nAS SELECT empID, last_name,\
    \ first_name, phone, salary from Employee;\n\nWhen a table or a view is created,\
    \ it is owned by the person who created it. This will typically be some sort of\
    \ data administrator. By default, he will be the only one to be able to see or\
    \ update the table or view. The owner of the table or view can grant permission\
    \ to other users or groups of users to read, update, or delete from the table\
    \ or view as appropriate.\n\nTypically, the users of the database will be placed\
    \ into groups that will have different security levels or rights. There will always\
    \ be a Public group, which will consist of all the users, and for controlling\
    \ who can view or update different data, we might consider groups such as Managers\
    \ and/or Secretaries.\n\nWe would like everyone to be able to view the names and\
    \ phone numbers, so we can grant everyone (the Public group) permission to retrieve\
    \ or select information from the Phone_view. We only want managers to be able\
    \ to see the salaries, so we grant only that group permission to see rows from\
    \ the Manager_view. The SQL to give these permissions is shown in [Listing 10-19](#9781430242093_Ch10.xhtml#L19).\n\
    \n***[Listing 10-19.](#9781430242093_Ch10.xhtml#Lis19)** Granting Different Groups\
    \ Read Access to Different Views*\n\nGRANT SELECT on Phone_view\n\nTO Public\n\
    \nGRANT SELECT on Manager_view\n\nTO Managers\n\nThere are a number of different\
    \ types of permissions that can be granted to individual database users or groups\
    \ of users. [Listing 10-20](#9781430242093_Ch10.xhtml#L20) shows how we can allow\
    \ the Secretaries group to update the information in our view of employees and\
    \ phone numbers.\n\n***[Listing 10-20.](#9781430242093_Ch10.xhtml#Lis20)** Granting\
    \ a Group of Users the Right to Update Data Through a View*\n\nGRANT UPDATE on\
    \ Phone_view\n\nTO Secretaries\n\nSummary\n\nThis chapter has provided a very\
    \ brief introduction to how queries can be used to retrieve information from a\
    \ database.\n\n*   We can retrieve different subsets of data from our database\
    \ using a number of different relational database operations. These include the\
    \ following:\n    *   Retrieving a subset of rows from a table or view\n    *\
    \   Retrieving a subset of columns from a table or view\n    *   Combining two\
    \ tables or views with a join\n    *   Performing set operations (intersect, union,\
    \ and difference) on tables or views with the same columns\n*   Indexes can help\
    \ speed up queries. You should consider indexes on fields that are involved in\
    \ select or join conditions in your queries or are used regularly for ordering\
    \ data. Indexing a foreign key can be beneficial in many situations. Remember\
    \ that indexes can speed up retrieval but may slow down the updating of data.\n\
    *   Views are a way of storing the specification of a query so you can reuse it.\
    \ Views are useful as a basis for forms and reports and can help with controlling\
    \ access for different groups of users.\n\nTESTING YOUR UNDERSTANDING\n\nExercise\
    \ 10-1\n\n[Figure 10-15](#9781430242093_Ch10.xhtml#F15) shows a data model describing\
    \ the meal delivery problem considered in [Chapter 3](#9781430242093_Ch03.xhtml).\
    \ It shows the available meals and which ones appear in each order.\n\n![9781430242093_Fig10-15.tif](images/9781430242093_Fig10-15_fmt.jpeg)\n\
    \n[**Figure 10-15**](#9781430242093_Ch10.xhtml#FG15). Data model for meal delivery\n\
    \nSome of the requirements identified by the client include the following:\n\n\
    a)  Determine the cost of a specific order.\n\nb)  Prepare a list of undelivered\
    \ orders.\n\nc)  Determine the income from different types of meals in a given\
    \ month.\n\nDetermine the queries that would provide the required information.\
    \ (Caution: after such a brief introduction to queries it is not reasonable to\
    \ expect that a novice would be able to write down the queries in full, but do\
    \ think about what joins might be required, which rows need to be selected, and\
    \ so on.) To help you think about the problem, [Figure 10-16](#9781430242093_Ch10.xhtml#F16)\
    \ shows the database tables and some possible data. In the Order_Meal table, order\
    \ and meal are foreign keys to the Orders and Meals tables respectively."
  trans: "\n# 视图\n\n要为哪些字段建立索引以及使用哪种类型的索引，并不是容易回答的问题。索引的不同安排会根据特定时刻所执行的查询或更新操作类型而更加适用。大型数据库产品通常会提供一个查询分析器，向你展示索引在给定查询中的使用情况，并估算所需时间。如果某个特定查询导致性能问题，你可以使用分析器工具尝试不同的索引类型，以确定该查询的最佳安排。遗憾的是，这种安排对于你需要的其他查询或更新操作可能是次优的。毕竟，数据库设计是一门艺术，而非精确科学！\n\
    \n# 创建视图\n\n要创建视图，我们只需发出我们想要的查询语句，并在前面加上 `CREATE VIEW ... AS` 这些词。列表 10-17 展示了创建一个连接\
    \ `Customer` 表和 `Order` 表的视图的 SQL 语句。`Cust_Ord` 只是赋予该视图的名称，以便我们可以引用它。\n\n**列表\
    \ 10-17.** 创建连接客户表和订单表的视图\n\n```sql\nCREATE VIEW Cust_Ord AS\nSELECT * FROM Customer\
    \ INNER JOIN Order ON custID = customer\n```\n\n当我们运行或打开视图时，系统将执行连接操作并返回结果作为一个单一的虚拟表，该表将被称为\
    \ `Cust_Ord`。我们可以像对待其他任何表一样处理这个表，在新的查询中将其与其他表组合等等。然而，它并不物理存在。如果底层表中的数据发生变化，视图中的结果行也会随之改变。\n\
    \n数据库设计的一部分包括提供一组对用户有用的视图。回顾最初的用例将是确定哪些视图最重要的最佳指南。\n\n# 视图的用途\n\n显然，视图对于从数据库中检索数据很有用。你将在下一章看到如何将视图用作发票或价目表等报表的基础。视图有时也可用于输入数据。如果有一个客户订购了某种产品，我们需要在\
    \ `Order` 表中插入一个新行，从 `Customer` 表中找到客户编号，并且很可能需要在 `Product` 表中查找产品编号和价格。单独访问所有这些表效率不高，在下一章你将看到如何在表单底层使用视图来管理数据输入和维护。\n\
    \n视图的另一个用途是为我们的数据提供一定的安全性。考虑一个 `Employee` 表。它将包含每个人都需要的信息，如办公室和电话号码。它还将包含相当私密的信息，如只有经理才能看到的薪水。还有一个信息更新的问题。秘书可能能够更改电话号码，但不能更改薪水。\n\
    \n全面讨论安全问题远远超出了本书的范围，但了解如何使用视图来管理谁能查看和做什么是非常有用的。例如，我们可以在 `Employee` 表上建立两个视图。一个将显示员工姓名和电话号码，另一个将包含薪水。这些视图如列表\
    \ 10-18 所示。\n\n**列表 10-18.** 员工表的两个视图\n\n```sql\nCREATE VIEW Phone_view AS\nSELECT\
    \ empID, last_name, first_name, phone from Employee;\n\nCREATE VIEW Manager_view\n\
    AS SELECT empID, last_name, first_name, phone, salary from Employee;\n```\n\n\
    当创建表或视图时，它由创建者所有。这通常是某种数据管理员。默认情况下，他将是唯一能够查看或更新该表或视图的人。表或视图的所有者可以授予其他用户或用户组读取、更新或删除该表或视图中数据的适当权限。\n\
    \n通常，数据库用户将被分组到不同的安全级别或权限组中。总会有一个 `Public` 组，由所有用户组成，为了控制谁能查看或更新不同的数据，我们可能会考虑诸如\
    \ `Managers` 和/或 `Secretaries` 这样的组。\n\n我们希望每个人都能查看姓名和电话号码，因此我们可以授予每个人（`Public`\
    \ 组）从 `Phone_view` 检索或选择信息的权限。我们只希望经理能看到薪水，因此我们只授予该组从 `Manager_view` 查看行的权限。授予这些权限的\
    \ SQL 如列表 10-19 所示。\n\n**列表 10-19.** 授予不同组对不同视图的读取权限\n\n```sql\nGRANT SELECT on\
    \ Phone_view TO Public\nGRANT SELECT on Manager_view TO Managers\n```\n\n可以授予单个数据库用户或用户组多种不同类型的权限。列表\
    \ 10-20 展示了如何允许 `Secretaries` 组更新我们员工和电话号码视图中的信息。\n\n**列表 10-20.** 授予用户组通过视图更新数据的权利\n\
    \n```sql\nGRANT UPDATE on Phone_view TO Secretaries\n```\n\n# 小结\n\n本章非常简要地介绍了如何使用查询从数据库中检索信息。\n\
    \n*   我们可以使用多种不同的关系数据库操作从数据库中检索不同的数据子集。这些操作包括：\n    *   从表或视图中检索行的子集。\n    * \
    \  从表或视图中检索列的子集。\n    *   使用连接组合两个表或视图。\n    *   在具有相同列的表或视图上执行集合操作（`intersect`、`union`\
    \ 和 `difference`）。\n*   索引可以帮助加速查询。你应该考虑在查询中涉及 `select` 或 `join` 条件的字段上建立索引，或者那些经常用于数据排序的字段。在许多情况下，为外键建立索引可能是有益的。请记住，索引可以加快检索速度，但可能会减慢数据的更新速度。\n\
    *   视图是一种存储查询规范的方式，以便你可以重用它。视图作为表单和报表的基础非常有用，并且可以帮助控制不同用户组的访问。\n\n# 测试你的理解\n\n\
    ## 练习 10-1\n\n图 10-15 展示了一个描述第 3 章中考虑的送餐问题的数据模型。它显示了可用的餐点以及哪些餐点出现在每个订单中。\n\n![9781430242093_Fig10-15.tif](img/9781430242093_Fig10-15_fmt.jpeg)\n\
    \n**图 10-15.** 送餐问题的数据模型\n\n客户确认的一些需求包括：\n\na) 确定特定订单的成本。\nb) 准备一份未送达订单的清单。\n\
    c) 确定给定月份内不同类型餐点的收入。\n\n确定能提供所需信息的查询。（注意：在如此简要地介绍查询之后，期望新手能够完整地写出查询是不合理的，但请思考可能需要哪些连接、需要选择哪些行等等。）为了帮助你思考这个问题，图\
    \ 10-16 展示了数据库表和一些可能的数据。在 `Order_Meal` 表中，`order` 和 `meal` 分别是 `Orders` 表和 `Meals`\
    \ 表的外键。\n"
- fmt: '# CHAPTER 11


    ## User Interface


    Right back at the beginning of this book, we looked at defining our database problem
    in terms of what different users of the database would need to do. We specified
    these requirements in terms of use cases, and most fell into one of two categories:
    tasks a user would need to carry out to enter data efficiently and tasks for retrieving
    information in the form of different reports.


    In the intervening chapters, we have mostly been concerned with separating our
    data into several normalized tables in order to ensure the data is kept in a way
    that will allow the construction of different reports as the database evolves.
    This separation of data also ensures that it is kept in an accurate and consistent
    manner.


    In [Chapter 10](#9781430242093_Ch01.xhtml), we looked at how queries and views
    allow us to gather together information from several tables in a number of different
    ways. In this chapter, we take a brief look at how to design forms and reports
    that will satisfy the original use cases. These can be added as a front end to
    your database to provide a convenient, friendly, and efficient way for users to
    interact with the data.


    ### Input Forms


    [Figure 11-1](#9781430242093_Ch11.xhtml#F1) shows some possible use cases for
    our (very tiny) university database. Use cases 1 through 3 involve data entry,
    and use cases 4 and 5 are reporting tasks.


    ![9781430242093_Fig11-01.eps](images/9781430242093_Fig11-01_fmt.png)


    `[Figure 11-1.](#9781430242093_Ch11.xhtml#FG1)` Use cases for the university database


    A simple data model for satisfying the use cases in [Figure 11-1](#9781430242093_Ch11.xhtml#F1)
    is shown in [Figure 11-2](#9781430242093_Ch11.xhtml#F2), along with some representative
    data in [Figure 11-3](#9781430242093_Ch11.xhtml#F3).


    ![9781430242093_Fig11-02.tif](images/9781430242093_Fig11-02_fmt.jpeg)


    `[Figure 11-2.](#9781430242093_Ch11.xhtml#FG2)` Simple data model for the university
    database


    ![9781430242093_Fig11-03.eps](images/9781430242093_Fig11-03_fmt.png)


    `[Figure 11-3.](#9781430242093_Ch11.xhtml#FG3)` A small portion of the data in
    the university database


    #### Data Entry Forms Based on a Single Table


    Let’s look at use case 1 first. This is a task likely to be carried out when a
    student first enters the university and at infrequent times when her contact information
    or other details change. The data entry involves interacting with just one table,
    the `Student` table in [Figure 11-3](#9781430242093_Ch11.xhtml#F3). Form–generating
    software that may come with your database system usually offers a number of different
    ways to input data to a single table. One way is to design a form that shows several
    records in a grid (similar to the tables in [Figure 11-3](#9781430242093_Ch11.xhtml#F3)).
    This is useful in cases where each record only has a few fields that can all fit
    across a screen. In reality, our `Student` table is going to have many more fields
    than we have shown. Where there are many fields, it is preferable to have just
    one record displayed per form. An example is shown in [Figure 11-4](#9781430242093_Ch11.xhtml#F4).


    ![9781430242093_Fig11-04.tif](images/9781430242093_Fig11-04_fmt.jpeg)


    `[Figure 11-4.](#9781430242093_Ch11.xhtml#FG4)` Form to update a single student’s
    details


    The form in [Figure 11-4](#9781430242093_Ch11.xhtml#F4) was produced using the
    default options from the `MS Access Form Design Wizard` with a few alterations.
    I’ve added a title, relocated and resized some of the fields, and added some borders
    to keep similar fields together. A proper graphic designer would do an infinitely
    superior job! The default form provides navigation buttons along the bottom to
    move between records or to add a new one, and there are also built–in search features
    that enable you to move quickly to records matching a value you might type into
    a field. We would create a similar form for entering course data.


    #### Data Entry Forms Based on Several Tables


    The use case for entering `enrollment` data requires a bit more thought. On the
    face of it, we only need to enter information into the `Enrollment` table, but
    in practice we need to see corresponding information in the other two tables.
    Let’s say that James Smith is an existing student wanting to enroll in three subjects
    in 2012. We need a convenient way to add something like the bottom three rows
    shown in the `Enrollment` table in [Figure 11-3](#9781430242093_Ch11.xhtml#F3).
    If typing into a form based only on the `Enrollment` table, the data entry operator
    would have to type the year and the `studentID` three times (once on each row),
    and there is no feedback to let him know that 18887 is actually the correct number
    for James Smith. Typing each of the `course` codes may also lead to errors.


    Referential integrity between the tables will ensure each enrollment is for an
    existing student and an existing course. However, the data entry operator will
    only get an error message after he tries to enter an enrollment record for a nonexistent
    student or course. Fortunately, forms based on views allow us to make the process
    much more efficient and less prone to error.


    We can create a view with the relevant information from all three tables. [Listing
    11-1](#9781430242093_Ch11.xhtml#L1) shows the `SQL` to join the three tables and
    [Figure 11-5](#9781430242093_Ch11.xhtml#F5) shows the resulting data.


    `[Listing 11-1](#9781430242093_Ch11.xhtml#Lis1)`. `SQL` to create a view which
    joins the `Enrollment`, `Student`, and `Course` tables


    ```sql

    CREATE VIEW all_info as

    SELECT * FROM

    (Course INNER JOIN Enrollment on courseID = course)

    INNER JOIN Student on studentID = student

    ```


    ![9781430242093_Fig11-05.tif](images/9781430242093_Fig11-05_fmt.jpeg)


    `[Figure 11-5.](#9781430242093_Ch11.xhtml#FG5)` Some data resulting from joining
    the `Enrollment` table with the `Student` and `Course` tables


    We can base a form on the view in [Figure 11-5](#9781430242093_Ch11.xhtml#F5)
    and then apply some conditions and formatting to the fields to produce something
    like [Figure 11-6](#9781430242093_Ch11.xhtml#F6).


    ![9781430242093_Fig11-06.tif](images/9781430242093_Fig11-06_fmt.jpeg)


    `[Figure 11-6.](#9781430242093_Ch11.xhtml#FG6)` Form based on view in [Figure
    11-5](#9781430242093_Ch11.xhtml#F5)'
