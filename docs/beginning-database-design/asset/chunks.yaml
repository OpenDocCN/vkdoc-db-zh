- fmt: 'It is possible to capture all the required information with the model in [Figure
    6-12](#9781430242093_Ch06.xhtml#F12), but it is not so easy to keep the data accurate.
    We run into much the same problems as we had with our model of `Employees` in
    [Figures 6-1](#9781430242093_Ch06.xhtml#F1) and [6-2](#9781430242093_Ch06.xhtml#F2).
    What about dogs with no `id_number` that are associated with a club and vice versa?
    Are these show dogs, or has there just been a data entry mishap?


    The decision of whether to use inheritance or not depends on how important the
    completeness and accuracy of the data are to the objective of the project. We
    get right back to the questions we considered in [Chapter 3](#9781430242093_Ch03.xhtml).
    What is the main objective? What is the scope? How important is the accuracy of
    this data? On the whole, when you are starting out on a problem, it is best to
    keep your solution as simple as possible. Inheritance provides an elegant solution
    to many problems involving specialization and generalization, but you should only
    use it when it is necessary.


    ## Should the Superclass Have Objects?


    In [Figure 6-11](#9781430242093_Ch06.xhtml#F11), we had a class of dogs with show
    dogs as a subclass. The implication here is that your ordinary old pet will be
    an object of the superclass `Dog`, while show dogs will be objects of the subclass.
    This can lead to a few problems as the project evolves.


    As we have seen, we should only be considering inheritance when we have objects
    with specialized data that needs to be accurately maintained. We need to make
    sure that the model we develop will be able to cope with changes or additions
    to the scope in the future.


    Consider a library that sets up a small database to maintain information about
    books (catalog number, title, author). After some time it includes audio books
    in its collection. An audio book has all the same attributes as an ordinary book,
    but in addition it has a playing time. This seems like a reasonable candidate
    for setting up a specialized subclass, and we may arrive at a model as in [Figure
    6-13](#9781430242093_Ch06.xhtml#F13).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-13_fmt.jpeg)


    [`Figure 6-13.`](#9781430242093_Ch06.xhtml#FG13) A specialized class for audio
    books


    If we set up a database based on this model, we will probably have some objects
    of type `Book` (with a value for number, title, and author) and some objects of
    type `AudioBook` (with a value for number, title, author, and playing time). Some
    time later, the problem may change and we may want to keep some additional information
    about our regular books—say, number of pages. We now have a problem. Our audio
    books are objects of the superclass: if we add an attribute `page_num` to the
    parent `Book` class, it will be inherited by our `AudioBook` subclass objects,
    which is not what we want at all.


    This problem can occur when a parent class of a data model has objects. It is
    generally advisable that any class which has subclasses should be an `abstract`
    class, meaning that it cannot have objects. The idea of an abstract class is to
    keep information that is common to its subclasses and which the objects of those
    classes can inherit. Following this advice we would have had an abstract class
    (say `Item`) at the top of our hierarchy with two subclasses, `Book` and `AudioBook`,
    as in [Figure 6-14](#9781430242093_Ch06.xhtml#F14). This way we can make changes
    to each of our subclasses without affecting the other.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-14_fmt.jpeg)


    [`Figure 6-14.`](#9781430242093_Ch06.xhtml#FG14) `Item` as an abstract class


    It does not matter that `Book` might have no additional attributes originally.
    The class is there, ready for when we want to make a change. We can now add the
    number of pages to the `Book` class without it affecting the `AudioBook` class.


    ## Objects That Belong to More Than One Subclass


    In most of the examples in this chapter, the problems have been very simplified.
    In [Figure 6-15](#9781430242093_Ch06.xhtml#F15), we have a model with `Lecturer`
    and `Student` represented as subclasses of a `Person` class, along with some objects
    of the two subclasses. We see that for this case our objects have to be either
    a lecturer or a student.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-15_fmt.png)


    [`Figure 6-15.`](#9781430242093_Ch06.xhtml#FG15) Students and lecturers are distinct.


    [Figure 6-15](#9781430242093_Ch06.xhtml#F15) copes with the simple case of lecturers
    and students being distinct. What is more likely, however, is that there is some
    overlap between the two. What if lecturer John is also doing some part–time study
    for an arts degree and student Linda is doing some part–time teaching to fund
    her fees? Where do we store John’s major and Linda’s salary?


    We could make another two objects, an additional `Student` object for John and
    a `Lecturer` object for Linda, but there are problems with this approach. We would
    now have six `Person` objects in total when in reality there are only four people.
    Any counts or summaries of numbers of people will be inaccurate. An additional
    problem is that we would have two objects for Linda, and they will both have values
    for `name` and `phone`, causing problems when Linda’s contact details change.
    They will have to be updated in two places.


    One solution is to consider another class that inherits from both `Student` and
    `Lecturer`. Inheriting from two different parents is sometimes referred to as
    `multiple inheritance`. Objects of our new `Lecturer/Student` class will have
    attributes `name`, `phone`, `salary`, and `major` as in [Figure 6-16](#9781430242093_Ch06.xhtml#F16).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-16_fmt.png)


    [`Figure 6-16.`](#9781430242093_Ch06.xhtml#FG16) Multiple inheritance to capture
    objects of two classes (not recommended)


    There are difficulties with the approach in [Figure 6-16](#9781430242093_Ch06.xhtml#F16).
    The obvious problem, from a purely pragmatic design point of view, is that when
    more classes are added at the middle level, we will be in trouble. If we add new
    classes (e.g., `Administrator` and `Cleaner`) as additional subclasses of `Person`,
    we will need to add a whole slew of subclasses at the bottom level to cope with
    all the possible combinations. For example, administrators who do some lecturing,
    cleaners who do some study, poor students who do a whole raft of extra jobs to
    fund their studies, and so on. This approach very soon gets out of hand.


    Our problem is that we have been thinking of students and lecturers as different
    types of people when in fact they are all just people doing different things.
    A better way to think of this type of scenario is not so much that there are different
    types of `people`, but that there are people who play many different `roles`.
    We can model these jobs or roles as a class with many different subclasses for
    the jobs about which we need to store different information. Rather than have
    subclasses of `People`, we can have another class (Let’s call it `Contract`) that
    has subclasses for the different roles we need to describe. Each person can then
    have many contracts as shown in the model in [Figure 6-17](#9781430242093_Ch06.xhtml#F17).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-17_fmt.jpeg)


    [`Figure 6-17.`](#9781430242093_Ch06.xhtml#FG17) People can have many roles (contracts)


    Some objects of a data model like [Figure 6-17](#9781430242093_Ch06.xhtml#F17)
    and consistent with the scenario in [Figure 6-16](#9781430242093_Ch06.xhtml#F16)
    are shown in [Figure 6-18](#9781430242093_Ch06.xhtml#F18). We see that we very
    clearly have four people who are undertaking a number of different roles. A person
    can have more than one contract, and each contract is associated with a single
    person.'
  raw: 'It is possible to capture all the required information with the model in [Figure
    6-12](#9781430242093_Ch06.xhtml#F12), but it is not so easy to keep the data accurate.
    We run into much the same problems as we had with our model of **Employees** in
    [Figures 6-1](#9781430242093_Ch06.xhtml#F1) and [6-2](#9781430242093_Ch06.xhtml#F2).
    What about dogs with no **id_number** that are associated with a club and vice
