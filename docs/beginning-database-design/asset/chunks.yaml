    “Academic Results,” tables were set up to record students’ marks without considering
    the (sadly not altogether uncommon) case of a student having to repeat a subject.


    In this chapter, we look at ways to get an initial, accurate overview of the problem
    and express this with use cases. Then, having understood all the definitions,
    details, exceptions, irregularities, reasonable extensions, and uses of the system
    (gasp), we have to ensure that our abstract model captures the most important
    features accurately. It is, after all, the abstract model that will eventually
    be implemented.


    You may be designing your own database, or perhaps you are designing one for someone
    else. In either case, there are two views of the problem. One is the concrete,
    real-world view from the person who will be the eventual user (I will call this
    person the client), and the other view is the more abstract model from the person
    who is designing and possibly developing the system (I’ll call this person the
    analyst). If you are designing your own database, then wear two hats and swap
    them as necessary.'
  trans: '# 总结


    至此，我们已经完成了从最初模糊的问题陈述到我们非常简单的植物和用途示例的一个可能最终解决方案的完整旅程。步骤在此总结，并通过图 2-19 加以说明。


    1.  根据用户想要达成的目标来表述问题。对于一个数据库问题，这通常涉及需要存储的数据和需要检索的信息。勾勒出一些初始的用例和一个数据模型。


    2.  思考信息的其他可能用途，以及数据如何可以被有序地或分组地组织。进行一个迭代的分析过程，重新审视数据模型和用例，直到你确信自己对问题有了完整且精确的理解。对于更大的问题，此阶段可能包括做出一些简化或其他实用的选择。本书的大部分内容将集中于流程的这一阶段。


    3.  选择管理数据的产品类型并创建适当的设计。对于关系数据库，这将涉及设计表、键和外键。如果项目要用其他类型的产品（如编程语言或电子表格）来实现，则需要不同的结构。设计阶段在第
    7 章至第 9 章中有更充分的讨论。


    4.  构建应用程序。对于关系数据库，这将包括设置表格以及开发表单和报告以满足用例。如何在任何特定产品中完成这些操作的具体机制超出了本书的范围，但市面上有大量指导书籍可以帮助你。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-19_fmt.png)


    **图 2-19.** 我们简单数据库示例的开发过程


    我们可以通过按属（genus）而非用途（use）对数据进行分组，创建一个类似于图 2-17 的报告。然而，从数据库中访问信息的方式有多种。图 2-18 展示了我们的
    Access 数据库一个非常简单的网页视图。它允许用户选择一个属并查看相关的物种和用途（该网页是使用 Microsoft Expression Web 开发的）。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-18_fmt.jpeg)


    **图 2-18.** 一个简单的网页前端，满足按属分组返回植物信息的用例


    # 测试你的理解


    ## 练习 2-1


    一个小型体育俱乐部保存其会员及所缴会费的信息。秘书希望能够记录会员缴费时间，并打印一份类似于图 2-20 的报告。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-20_fmt.jpeg)


    **图 2-20.** 一个小型俱乐部的会员数据


    a) 思考不同的数据项可能在何时被输入。为数据输入勾勒一个初始的用例图。

    b) 考虑你正在保存信息的不同对象，并勾勒一个简单的类图。

    c) 你可以向俱乐部建议哪些不同的报告呈现方式？你的类图是否能方便地提供这些信息？


    ¹ Marvin V. Zelkowitz, Alan C. Shaw, and John D. Gannon, *Principles of Software
    Engineering and Design* (Englewood Cliffs, NJ: Prentice-Hall, 1979), p. 5.


    ² Grady Booch, James Rumbaugh, and Ivar Jacobsen, *The Unified Modeling Language
    User Guide* (Boston, MA: Addison Wesley, 1999).


    ³ Alistair Cockburn, *Writing Effective Use Cases* (Boston, MA: Addison Wesley,
    2001).


    ⁴ 本书中的图表是使用 Rational Rose ([`www.rational.com`](http://www.rational.com)/)准备的。该软件通过
    Rational 的软件工程教育开发计划（SEED Program）提供。


    # 第 3 章


    ![image](img/frontdot.jpg)


    # 初始需求与用例


    在本章中，我们将考虑从现实世界问题到最终现实世界解决方案的第一步，如第 2 章所述。首先，我们需要确保自己真正理解了问题。这听起来可能显而易见，但令人惊讶的是，人们经常在完全理解问题之前就开始着手实施数据库。我们需要做两件事：理解系统所有用户需要执行的任务，然后弄清楚需要存储什么数据来支持这些任务。如图
    3-1 所示的用例和类图，是开始整合我们对问题理解的好方法。


    ![9781430242093_Fig03-01.eps](img/9781430242093_Fig03-01_fmt.png)


    ***图 3-1**. 第一步：为现实世界问题开发一个抽象模型*


    首先，我们必须*完全*理解真正的问题。仅仅对业务、俱乐部或科学家所做的事情有一个粗略的了解是不够的。我最喜欢的引述之一来自 Peter Coad 和 Ed
    Yourdon 的书*《面向对象分析》*^(1)，其中他们对分析空中交通控制系统有如下说法：


    *分析师需要将自己沉浸于问题领域中，其深度要达到他开始发现一些细微差别，而这些差别甚至连每天与空中交通管制打交道的人都未曾完全考虑过。*


    虽然相关人员是他们特定现实世界问题的专家，但他们很少需要以抽象的方式思考细节。例外和异常情况可以在出现时直接“处理”。在人工系统中，有人可以草草记下笔记、补开一张发票或调整一些总额。然而，自动化系统不能如此宽容，可能的异常情况需要从一开始就加以考虑。


    人们通常不会主动提供关于他们问题中那些小异常的信息，即使在被询问时，也常常意识不到这些信息可能很重要。诸如“不，没什么。”或“几乎没有。”或“嗯，不，我想没有，嗯，也许吧。”这样的回答，都是存在需要深入理解的复杂问题的信号，在进一步进行数据库设计之前必须理解这些复杂问题。


    正如你在前面章节中所看到的，数据库的建立往往只为解决一个眼前问题，很少考虑接下来可能会发生什么，或者情况有时会如何偏离常规。在示例 1-4“学业成绩”中，表格的设置是为了记录学生的分数，却没有考虑到（不幸的是这并非完全不常见）学生需要重修一门科目这种情况。


    在本章中，我们将探讨获取问题的初始、准确概述并用用例来表达它的方法。然后，在理解了所有的定义、细节、例外、异常、合理扩展以及系统用途（天啊）之后，我们必须确保我们的抽象模型准确地捕捉到了最重要的特征。毕竟，最终将被实现的是这个抽象模型。


    你可能是在设计自己的数据库，也可能是在为别人设计一个数据库。无论是哪种情况，对问题都有两种视角。一种是来自最终用户（我将称此人为客户）的具体、现实世界的视角，另一种是来自设计并可能开发系统的人（我将称此人为分析师）的更为抽象的模型视角。如果你是在设计自己的数据库，那么请同时戴上两顶帽子，并根据需要进行切换。'
- fmt: '# 现实与抽象视图


    由于对现实世界问题的良好理解极其依赖于客户与分析师能够相互理解，我们将花点时间来看看对一个问题的两种不同视角。


    ## 问题的现实与抽象视图


    分析师主要以抽象的方式看待问题。对于我们考虑的这类数据库问题，处理过程大多可以分为：


    *   输入、编辑或以其他方式维护数据。

    *   根据某些条件从数据库中提取信息。问题的这种视图如[图 3-2](#9781430242093_Ch03.xhtml#F2)所示。


    ![9781430242093_Fig03-02.eps](images/9781430242093_Fig03-02_fmt.png)


    `Figure 3-2`. 分析师对典型数据库系统的视图


    分析师首先要做的是充分理解客户的问题，以帮助确定输入和输出需求（即时和潜在的）。这些可以用用例来表达。然后，分析师需要开发一个能够支持这些需求的数据模型。正如你将在后面章节中看到的，数据模型提供了对系统细节的相当深入的理解，因此用例和数据模型通常是并行开发的。


    建立用例并非易事。用户或客户很少对整个流程有清晰的了解。许多数据库项目属于下一节描述的两类情况之一，从客户的视角审视这些情况是有益的。


    ## 数据整理


    数据整理项目涉及一个需要照看其数据的客户。研究结果通常属于这种情况。科学家可能会设计一个实验来收集数据，以便进行专门的统计分析。这里分析师的责任是提前思考，并询问数据还可能如何被使用，并以一种能够满足即时和未来可能需求的方式存储它。这个过程如[图
    3-3](#9781430242093_Ch03.xhtml#F3)所示。


    ![9781430242093_Fig03-03.eps](images/9781430242093_Fig03-03_fmt.png)


    `Figure 3-3`. 数据整理问题的分析


    在这个阶段进行仔细分析有助于避免一种非常常见且令人恼火的情况：知道数据“在里面”，但无法方便地“取出来”。根据正在收集的数据类型，预测潜在的输出需求是存储数据最困难的方面之一。


    ## 任务自动化


    许多项目涉及一个客户，其工作需要自动化。这可能是小企业、俱乐部或学校，他们一直用手动或需要更新的软件保存记录。也许他们希望将数据转移到具有Web界面的数据库中。这些客户通常对他们所做的工作有清晰的认识。分析师的工作是将客户*所做的*与需要*记录*和*报告的*分开，并如图
    3-4所示重新定义问题。


    ![9781430242093_Fig03-04.eps](images/9781430242093_Fig03-04_fmt.png)


    `Figure 3-4`. 任务自动化问题的分析


    一个本地学校任务自动化问题的典型描述可能是这样的：


    *当家长打电话来说孩子生病时，我们必须通知他们的班级老师，如果那天是运动会日，孩子在校队里，体育老师可能需要安排替补。然后我们需要统计所有缺勤天数，放到孩子的报告中。教育部每个学期也需要这些总数。*


    记录缺勤并能够以多种方式报告显然是主要需求。然而，关于运动队呢？系统是否需要区分那些在队中的孩子（如果是，是否需要知道是哪些队）？系统是否需要知道哪些日期有校际比赛？可能不需要。区分客户*所做*的（如果是运动会日，告诉体育老师）与需要*记录*的，是范围界定过程的一部分。对于体育部分问题的最终解决方案可能像记录所有关于队伍、替补和比赛日期的细节一样复杂，也可能像每天给体育老师一份所有缺勤者的名单并让她自己处理一样简单。


    每个问题都是不同的，所以我们需要一个通用的框架来发现和表示数据库问题的复杂性。一个好的开始是确定以下问题的答案：


    *   用户做什么？

    *   涉及什么数据？

    *   系统的主要目标是什么？

    *   满足这个目标需要什么数据？

    *   输入用例是什么？

    *   第一个数据模型是什么？

    *   输出用例是什么？


    前面的步骤是迭代的。随着我们对问题了解更多，我们可能需要返回到早期的步骤并进行调整。我们将在[示例 3-1](#9781430242093_Ch03.xhtml#ex3-1)的背景下逐步完成这些步骤。


    `EXAMPLE 3-1`. 餐食递送


    入住当地汽车旅馆或酒店房间的游客会获得一项服务，可以为他们递送各种快餐或外卖餐食（披萨、汉堡、印度外卖等）。访客致电公司并下订单购买一些餐食。一名司机被选中并被派往相应的快餐店取餐。司机将餐食送给客户，接收付款，并通知仓库。他稍后还会填写一份时间表交回仓库。


    希望自动化这一目前手动流程的原因之一，是为了能够生成关于所接订单数量以及完成订单所需时间的统计数据。


    ### 用户做什么？


    “用户做什么？”这个问题对于任务自动化问题特别相关。作为开始，列出用户定期执行的任务是有用的。以下是当前手动餐食递送示例中执行的任务的起始列表：


    *   接待员记录订单详情（地址、电话号码、餐食、总价）。

    *   接待员选择一名司机并告诉他有关订单的信息。

    *   司机从快餐店取餐。

    *   司机送餐并通知仓库。

    *   司机在下班时交回时间表。

    *   接待员或经理生成每周和每月的统计数据。


    前面五个任务可能涉及向系统输入数据，而最后一个任务则涉及报告系统中已有的信息。


    ### 涉及什么数据？


    上一节描述的任务很大程度上是从用户的角度陈述的，是实际发生的事情。我们需要退后一步，戴上分析师的帽子，思考在每一步需要记录或检索什么数据（如果有的话）。


    从思考一个典型订单可能涉及的内容开始是有用的。假设一个家庭在汽车旅馆住了一晚，打电话订购咖喱给父母，披萨给孩子。集思广益一下，在工作的每一步可以记录哪些数据。一些可能性如[表
    3-1](#9781430242093_Ch03.xhtml#table-1)所示。


    `Table 3-1`. 物理用户任务及相关数据'
  raw: 'As a good understanding of a real–world problem depends so critically on the
    client and analyst being able to understand each other, we will take a moment
    to look at the two different views of a problem.


    Real and Abstract Views of a Problem


    The analyst sees the problem in a mostly abstract way. For the type of database
    problems we are considering, the processing can mostly be separated into:


    *   Entering, editing, or otherwise maintaining data.

    *   Extracting information from the database based on some criteria. This view
    of the problem is shown in [Figure 3-2](#9781430242093_Ch03.xhtml#F2).


    ![9781430242093_Fig03-02.eps](images/9781430242093_Fig03-02_fmt.png)


    *[**Figure 3-2**](#9781430242093_Ch03.xhtml#FG2). An analyst’s view of a typical
    database system*


    The first thing an analyst must do is understand the client’s problem in sufficient
    detail to help determine the input and output requirements (both immediate and
    potential). These can be expressed in use cases. The analyst then needs to develop
    a data model that will support those requirements. As you shall see in later chapters,
    the data model provides considerable insight into the details of a system, so
    the use cases and data model are often developed in tandem.


    Establishing the use cases is not a simple problem. Users or clients seldom have
    a clear idea of the whole process. Many database projects fall into one of the
    two categories described in the next sections, and it is useful to look at these
    from the client’s perspective.


    Data Minding


    A data–minding project involves a client who has data that needs to be looked
    after. This is often the case for research results. A scientist may devise an
    experiment to collect data that will allow a specialist statistical analysis to
    be undertaken. The analyst’s responsibility here is to think ahead and ask questions
    about how else the data might be used, and store it in such a way as to allow
    for the immediate and possible future requirements. This process is depicted in
    [Figure 3-3](#9781430242093_Ch03.xhtml#F3).


    ![9781430242093_Fig03-03.eps](images/9781430242093_Fig03-03_fmt.png)


    *[**Figure 3-3**](#9781430242093_Ch03.xhtml#FG3). The analysis of a data-minding
    problem*


    A careful analysis at this stage helps prevent the very common and infuriating
    situation of knowing the data is “in there” but not being able to “get it out”
    conveniently. Predicting the potential output requirements, given the type of
    data that is being collected, is one of the most difficult aspects of storing
    data.


    Task Automation


    Many projects involve a client with a job that needs to be automated. This could
    be a small business, club, or school that has been keeping records by hand or
    with software that needs to be updated. Maybe they are looking to transfer their
    data to a database with a web interface. These clients usually have a clear idea
    of what they do. The analyst’s job here is to separate what the client *does*
    from what needs to be *recorded* and *reported*, and recast the problem as shown
    in [Figure 3-4](#9781430242093_Ch03.xhtml#F4).


    ![9781430242093_Fig03-04.eps](images/9781430242093_Fig03-04_fmt.png)


    *[**Figure 3-4**](#9781430242093_Ch03.xhtml#FG4). The analysis of a task automation
    problem*


    A typical description for a task automation problem at a local school might go
    like this:


    *When parents call up to say that children are sick, we have to let their classroom
    teachers know, and if it’s sports day and the child is on a school team, the sports
    teacher might have to sort out substitutes. Then we need to count up all the days
    missed to put on the child’s report. The Department of Education needs the totals
    each term, too.*


    Recording the absence and being able to report it in several ways are clearly
    prime requirements. However, what about the sports teams? Does the system need
    to differentiate those children on teams (and if so does it need to know which
    teams)? Does the system need to know on which dates there are interschool matches?
    Probably not. Differentiating what the client *does* (if it’s sports day, tell
    the sports teacher) from what needs to be *recorded* is part of the scoping process.
    The eventual solution for the sports part of the problem may be as complicated
    as recording all the details about teams, substitutes, and match dates, or may
    be as simple as handing the sports teacher a list of everyone who is absent each
    day and letting her sort it out.


    Every problem is different, so we need a general framework for discovering and
    representing the intricacies of a database problem. A good start is to determine
    answers to the following questions:


    *   What does the user do?

    *   What data are involved?

    *   What is the main objective of the system?

    *   What data are needed to satisfy this objective?

    *   What are the input use cases?

    *   What is the first data model?

    *   What are the output use cases?


    The preceding steps are iterative. As we learn more about the problem, we will
    probably have to return to the early steps and adjust them. We will work through
    these steps in the context of [Example 3-1](#9781430242093_Ch03.xhtml#ex3-1).


    [EXAMPLE 3-1](#9781430242093_Ch03.xhtml#exc1). MEAL DELIVERIES


    Visitors to the city staying in local motel or hotel rooms are offered a service
    that will deliver to them a variety of fast food or takeaway meals (pizzas, burgers,
    Indian takeout, and so on). A visitor phones the company and places an order for
    some meals. A driver is selected and dispatched to pick up the meals from the
    appropriate fast-food outlets. The driver delivers the meals to the customer,
    receives the payment, and informs the depot. He also fills in a time sheet, which
    he returns to the depot later.


    One of the reasons given for wanting to automate this currently manual process
    is to be able to produce statistics about the numbers of orders taken and about
    the time taken to complete orders.


    What Does the User Do?


    “What does the user do?” is a question particularly relevant to task automation
    problems. As a start, it is useful to list the jobs that the user regularly undertakes.
    Here is a starting list of tasks undertaken in the current manual meal deliveries
    example:


    *   Receptionist records details of order (address, phone number, meals, total
    price).

    *   Receptionist selects a driver and gives him the information about the order.

    *   Driver picks up meal(s) from fast food outlet(s).

    *   Driver delivers meal(s) and informs the depot.

    *   Driver hands in time sheet at the end of his shift.

    *   Receptionist or manager produces weekly and monthly statistics.


    The first five of the preceding tasks may involve entering data into the system,
    while the last task involves reporting on information already in the system.


    What Data Are Involved?


    The tasks described in the previous section are very much stated from the users’
    point of view and are what physically take place. We need to step back a bit,
    put on our analysts’ hats, and think about what data, if any, need to be recorded
    or retrieved at each step.


    It is useful to start by thinking about what a typical order might involve. Let’s
    say a family is in a motel for the night and rings up for curries for mum and
    dad and pizzas for the kids. Brainstorm about what data could be recorded at each
    step of the job. Some possibilities are shown in [Table 3-1](#9781430242093_Ch03.xhtml#table-1).


    ***[Table 3-1](#9781430242093_Ch03.xhtml#T3_1). Physical User Tasks and Related
    Data***'
  trans: '

    # 现实与抽象视图


    由于对现实世界问题的良好理解极其依赖于客户与分析师能够相互理解，我们将花点时间来看看对一个问题的两种不同视角。


    ## 问题的现实与抽象视图


    分析师主要以抽象的方式看待问题。对于我们考虑的这类数据库问题，处理过程大多可以分为：


    *   输入、编辑或以其他方式维护数据。

    *   根据某些条件从数据库中提取信息。问题的这种视图如图 3-2 所示。


    ![9781430242093_Fig03-02.eps](img/9781430242093_Fig03-02_fmt.png)


    `Figure 3-2`. 分析师对典型数据库系统的视图


    分析师首先要做的是充分理解客户的问题，以帮助确定输入和输出需求（即时和潜在的）。这些可以用用例来表达。然后，分析师需要开发一个能够支持这些需求的数据模型。正如你将在后面章节中看到的，数据模型提供了对系统细节的相当深入的理解，因此用例和数据模型通常是并行开发的。


    建立用例并非易事。用户或客户很少对整个流程有清晰的了解。许多数据库项目属于下一节描述的两类情况之一，从客户的视角审视这些情况是有益的。


    ## 数据整理


    数据整理项目涉及一个需要照看其数据的客户。研究结果通常属于这种情况。科学家可能会设计一个实验来收集数据，以便进行专门的统计分析。这里分析师的责任是提前思考，并询问数据还可能如何被使用，并以一种能够满足即时和未来可能需求的方式存储它。这个过程如图
    3-3 所示。


    ![9781430242093_Fig03-03.eps](img/9781430242093_Fig03-03_fmt.png)


    `Figure 3-3`. 数据整理问题的分析


    在这个阶段进行仔细分析有助于避免一种非常常见且令人恼火的情况：知道数据“在里面”，但无法方便地“取出来”。根据正在收集的数据类型，预测潜在的输出需求是存储数据最困难的方面之一。


    ## 任务自动化


    许多项目涉及一个客户，其工作需要自动化。这可能是小企业、俱乐部或学校，他们一直用手动或需要更新的软件保存记录。也许他们希望将数据转移到具有 Web 界面的数据库中。这些客户通常对他们所做的工作有清晰的认识。分析师的工作是将客户*所做的*与需要*记录*和*报告的*分开，并如图
    3-4 所示重新定义问题。


    ![9781430242093_Fig03-04.eps](img/9781430242093_Fig03-04_fmt.png)


    `Figure 3-4`. 任务自动化问题的分析


    一个本地学校任务自动化问题的典型描述可能是这样的：


    *当家长打电话来说孩子生病时，我们必须通知他们的班级老师，如果那天是运动会日，孩子在校队里，体育老师可能需要安排替补。然后我们需要统计所有缺勤天数，放到孩子的报告中。教育部每个学期也需要这些总数。*


    记录缺勤并能够以多种方式报告显然是主要需求。然而，关于运动队呢？系统是否需要区分那些在队中的孩子（如果是，是否需要知道是哪些队）？系统是否需要知道哪些日期有校际比赛？可能不需要。区分客户*所做*的（如果是运动会日，告诉体育老师）与需要*记录*的，是范围界定过程的一部分。对于体育部分问题的最终解决方案可能像记录所有关于队伍、替补和比赛日期的细节一样复杂，也可能像每天给体育老师一份所有缺勤者的名单并让她自己处理一样简单。


    每个问题都是不同的，所以我们需要一个通用的框架来发现和表示数据库问题的复杂性。一个好的开始是确定以下问题的答案：


    *   用户做什么？

    *   涉及什么数据？

    *   系统的主要目标是什么？

    *   满足这个目标需要什么数据？

    *   输入用例是什么？

    *   第一个数据模型是什么？

    *   输出用例是什么？


    前面的步骤是迭代的。随着我们对问题了解更多，我们可能需要返回到早期的步骤并进行调整。我们将在示例 3-1 的背景下逐步完成这些步骤。


    `EXAMPLE 3-1`. 餐食递送


    入住当地汽车旅馆或酒店房间的游客会获得一项服务，可以为他们递送各种快餐或外卖餐食（披萨、汉堡、印度外卖等）。访客致电公司并下订单购买一些餐食。一名司机被选中并被派往相应的快餐店取餐。司机将餐食送给客户，接收付款，并通知仓库。他稍后还会填写一份时间表交回仓库。


    希望自动化这一目前手动流程的原因之一，是为了能够生成关于所接订单数量以及完成订单所需时间的统计数据。


    ### 用户做什么？


    “用户做什么？”这个问题对于任务自动化问题特别相关。作为开始，列出用户定期执行的任务是有用的。以下是当前手动餐食递送示例中执行的任务的起始列表：


    *   接待员记录订单详情（地址、电话号码、餐食、总价）。

    *   接待员选择一名司机并告诉他有关订单的信息。

    *   司机从快餐店取餐。

    *   司机送餐并通知仓库。

    *   司机在下班时交回时间表。

    *   接待员或经理生成每周和每月的统计数据。


    前面五个任务可能涉及向系统输入数据，而最后一个任务则涉及报告系统中已有的信息。


    ### 涉及什么数据？


    上一节描述的任务很大程度上是从用户的角度陈述的，是实际发生的事情。我们需要退后一步，戴上分析师的帽子，思考在每一步需要记录或检索什么数据（如果有的话）。


    从思考一个典型订单可能涉及的内容开始是有用的。假设一个家庭在汽车旅馆住了一晚，打电话订购咖喱给父母，披萨给孩子。集思广益一下，在工作的每一步可以记录哪些数据。一些可能性如表
    3-1 所示。


    `Table 3-1`. 物理用户任务及相关数据

    '
- fmt: '# 外卖配送系统数据分析


    ## 任务与数据记录


    | **任务** | **实际工作** | **可记录的数据** |

    | :--- | :--- | :--- |

    | 1 | 接单。 | 订单号、地址、电话、姓名、餐品、价格、时间。 |

    | 2 | 派单给司机。 | 司机姓名（或ID？）、订单号、时间、需前往的出餐点。 |

    | 3 | 取餐。 | 订单号、每份餐品的取餐时间。 |

    | 4 | 送餐。 | 订单号、送达时间。 |

    | 5 | 录入工时表。 | 除了每个订单已有的信息外，还需要其他信息吗？签到时间、签退时间？ |


    让我们看看这些任务各自可能引发的一些问题：


    ### 接单


    记录订单信息看似相当直接。我们需要能够轻松识别一个订单。我们可以参考顾客和下单时间，但通常分配一个订单号将使其更容易在各个阶段被追踪。关于顾客的信息是显而易见的。我们至少需要记录餐品的送达地点以及如何联系顾客。那么，关于所请求的餐品呢？我们如何记录这些信息？大概顾客是从某个可用餐品列表中进行选择的。系统是否应该能以某种方式向接线员提供该餐品列表以便进行选择？价格呢？如果我们有了餐品数据，我们就会知道价格。是否需要输入其他费用？比如里程费？


    ### 派单给司机


    首先，我们需要考虑如何知道是哪位司机将去配送订单。系统需要跟踪司机的位置并确定最合适的司机吗？接线员是从值班司机列表中选择吗？系统是否需要跟踪哪些司机有空或当前正在配送？如果所有司机都忙了，怎么办？


    决定好司机后，我们需要告诉他订单详情（两份咖喱，两份披萨）。我们还需要告诉他去哪里取餐吗（例如，有多个披萨店可供选择）？系统是否需要记录为该订单提供餐品的出餐点？如果披萨店和咖喱店相距很远，是否可能需要两名司机参与？


    ### 取餐


    关于司机取餐，我们想记录什么？我们是否希望系统能够告诉我们订单的当前状态（例如，“咖喱已于8:40取走，披萨尚未收集”）？最终的统计是否需要将餐品取餐时间和送达时间分开，还是只需要总时间？


    ### 送餐


    如果时间统计很重要，记录餐品送达的时间将是必不可少的。


    ### 录入工时表


    假设工时表目前是手动管理的，查看现有的工时表将非常有帮助。手工工时表可能包含我们已经讨论过的一些信息。是否有我们尚未记录的数据？系统是否需要记录有关司机工资率和支付情况的信息？我们在“深入了解问题”一节中再次讨论了查看现有手工表格的问题。


    ## 系统目标是什么？


    显然，一个用于记录送餐情况的系统可能非常小，也可能非常大，这取决于我们决定记录前一节中的多少信息。带着分析师的视角，我们需要理清主要目标并提供务实的解决方案（而不是包罗万象的方案）。


    如果你与他人合作，一个常见的问题是，当你提出类似于前一节描述的问题时，你的客户可能会对扩大系统范围以包含越来越多功能变得相当热衷。不过，当他们意识到额外的功能需要付出成本时，他们很快就会平静下来。


    重要的是，不要将一切*可能*自动化的事情都视为*应该*自动化的事情。许多工作手动完成要方便得多，而且通常让任务或决定有一些人的参与会更好。一个很好的例子是为实验室课程分配演示员。虽然数据库可能有关于需求和可用性的所有信息，但实际的匹配工作可能由真正的人来做会更好，因为他们掌握额外的信息（例如，谁有睡懒觉的倾向，谁可能和谁闹翻，谁在周五下午5:30可能最有耐心）。


    在分析的早期阶段，最好将问题范围保持得尽可能小且定义严格。首先满足最紧迫的需求。一个设计良好的数据库在必要时或随着时间的推移和资金的允许，应该不会太难扩展。让我们思考一下外卖配送的例子。开发数据库的最初动机是提供关于订单和所涉及时间的汇总信息。汇总的订单信息可能包括订单总数和/或它们的总价值，可能是在某个时间范围内（每周或每月）。这些信息可能让公司识别出一些趋势并相应地调整其业务。


    让我们思考一下时间统计。它们应该有多详细？这正是你需要发挥想象力的地方。像“你想要关于时间的哪些统计？”这样的问题可能无法从客户那里得到足够的细节。如果不行，你可以试着想想能实现什么，并提出一些更具体的问题。这里有一些建议：


    *   你需要统计数据来支持诸如“我们的餐品在40分钟内送达”或“我们的平均送餐时间是15分钟”这样的陈述吗？

    *   你需要能够分解送餐时间以查看延迟在哪里吗？例如：一个订单通常需要等待多久才有司机可用？等待餐品准备的时间占多大比例？从出餐点送达顾客的平均时间是多少？

    *   你需要能够按司机分解这些统计吗？例如，找出是否有司机经常比别人慢？

    *   你需要能够按出餐点分解这些统计吗？例如，你是否需要查看每个出餐点的平均等待时间，以确定是否有明显较慢的？


    这些问题的目的是确定最紧迫的需求。让我们假设，对于这家小企业，主要目标只是大致了解从打电话到送达的总时间。提出其他问题可能（也可能不会）导致客户变得过于雄心勃勃：“我从未想过这个。好主意。把这个也加进去吧。”


    在大家忘乎所以之前，必须考虑获得足够可靠的数据来实现这些额外想法有多现实。总的送餐时间这个主要目标不是太难。它需要记录呼叫时间以及最终送达时间。任何比这更详细的记录都需要付出巨大成本。司机必须不断记录时间或在每个阶段通知仓库。是否需要额外的接线员来处理维护所有这些额外数据的工作？如果这些额外功能对客户不是必需的，那么范围就应该排除它们。然而，如果额外信息是获取该系统的主要目的之一，仍然有一些问题需要考虑。数据会有多准确？如果司机怀疑时间被记录在他们的名字旁边，他们是否会感到压力，有时变得不那么准确？建立一个复杂的系统来分析不准确的数字，是在浪费每个人的时间和金钱。'
  raw: '| **Task** | **Physical Jobs** | **Data That Could Be Recorded** |

    | 1 | Take order. | Order number, address, phone, name, meals, price, time. |

    | 2 | Dispatch driver. | Driver’s name (or ID?), order number, time, outlets to
    visit. |

    | 3 | Pick up meals. | Order number, time of picking up each meal. |

    | 4 | Deliver meals. | Order number, time of delivery. |

    | 5 | Enter time sheet. | Anything other than what we already have for each order?
    Sign–in time, sign–out time? |


    Let’s look at some of the questions each of these jobs might raise:


    **Take order**: Recording the information about an order seems fairly straightforward.
    We need to be able to identify an order easily. We could refer to the customer
    and the time of placing the order, but generally assigning an order number will
    make it easier to track the order through its various stages. The information
    about the customer is fairly obvious. We need to at least record where the meals
    are to be delivered and how to get in touch with the customer. What about the
    meals that have been requested? How do we record this information? Presumably
    the customer is choosing from some list of available meals. Should the system
    be able to somehow provide that list of meals to the receptionist so that a selection
    can be made? What about price? If we have data about the meals, we will know the
    price. Is there some other cost that needs to be entered? Is there a mileage charge
    perhaps?


    **Dispatch driver**: First up, we need to think about how we know which driver
    is going to deliver the order. Does the system need to keep track of the whereabouts
    of drivers and determine which driver is the most appropriate? Does the receptionist
    choose from a list of drivers on duty? Does the system need to keep track of which
    drivers are available or which are currently on a delivery? If all the drivers
    are busy, what happens?


    Having decided on a driver, we then need to tell him about the order (two curries,
    two pizzas). Do we also tell him where to go to get them (e.g., are there several
    pizza outlets from which to choose)? Does the system need to record which outlets
    provided the meal for this order? If the outlets for pizzas and curries are far
    apart, might two drivers be involved?


    **Pick up meals**: What do we want to record about a driver picking up a meal?
    Do we want the system to be able to tell us the current stage of an order (e.g.,
    “Curries were picked up at 8:40, pizzas have not been collected yet”)? Do the
    eventual statistics need to be separated into times that meals were picked up
    and times that meals were delivered, or will overall times do?


    **Deliver meals**: If statistics on time are important, recording the time the
    meals were delivered will be essential.


    **Enter time sheets**: Assuming that time sheets are currently managed manually,
    looking at an existing time sheet will be very helpful. It is possible that the
    manual time sheet will contain some of the information we have already discussed.
    Is there any data that we have not recorded yet? Does the system need to record
    information about pay rates and payments made to the drivers? We discuss looking
    at existing manual forms again in the section “Finding Out More About the Problem.”


    What Is the Objective of the System?


    Clearly, a system to record meal deliveries could be quite small or very large
    depending on how much of the information in the previous section we decide to
    record. With our analysts’ hats on, we need to sort out the main objectives and
    provide pragmatic solutions (as opposed to all-encompassing ones).


    One common problem if you are working with other people is that when you ask questions
    similar to the ones described in the previous section, your clients may become
    quite enthusiastic about broadening the scope of the system to include more and
    more. They will soon settle down, though, when they realize that extras come at
    a cost.


    It is important not to see everything that *could* be automated as something that
    *should* be automated. Many jobs are much more conveniently done manually and
    often a task or a decision is better for having some human involvement. A good
    example is assigning demonstrators to laboratory classes. While the database may
    have all the information about requirements and availability, the actual matching
    up may be better done by a real person who has additional information (e.g., who
    has a tendency to sleep in, who is likely to fall out with whom, who is likely
    to be most patient at 5:30 on a Friday afternoon).


    It is best to keep the scope of the problem as small and tightly defined as possible
    in the early stages of the analysis. Satisfy the most pressing requirements first.
    A properly designed database should not be too difficult to expand later as necessity
    dictates or as time and funds allow. Let’s think about the meal delivery example.
    The initial incentive for developing the database was to provide summary information
    about the orders and the times involved. Information about orders in a summary
    might include the total number of orders and/or their combined value, probably
    within some timeframe (weekly or monthly). This information might allow the company
    to identify some trends and adapt its business accordingly.


    Let’s think about the time statistics. How detailed should they be? Here is where
    you need to be imaginative. A question such as “What statistics do you want about
    time?” may not elicit adequate detail from a client. If it doesn’t, you might
    try to think of what could be achieved and try some more specific questions. Here
    are a few suggestions:


    *   Do you need to have statistics to back up statements such as “Our meals are
    delivered within 40 minutes” or “Our average delivery time is 15 minutes”?

    *   Do you need to be able to break down the delivery time to see where the delays
    are? For example: How long does an order typically have to wait before a driver
    becomes available? What proportion of the time is spent waiting for the meals
    to be prepared? What is the average time taken to deliver a meal from outlet to
    customer?

    *   Do you need to be able to break these statistics down by driver? For example,
    to find out if any drivers are regularly slower than others?

    *   Do you need to be able to break these statistics down by outlet? For example,
    do you need to see the average waiting times for each outlet to determine whether
    any are significantly slower?


    The purpose of these questions is to determine the most pressing requirements.
    Let’s assume that for this small business the main objective is just to get some
    idea of the overall times from phone call to delivery. Asking the other questions
    may (or may not) lead the client to become too ambitious: “I never thought of
    that. What a good idea. Throw that in as well.”


    Before everyone gets carried away, it is essential to consider how realistic it
    is to obtain data sufficiently reliable to fulfill these extra ideas. The main
    objective of overall delivery times isn’t too difficult. It requires the time
    of the call to be logged, as well as the time of final delivery. Any more detail
    than that comes at significant cost. Drivers will have to be constantly recording
    times or informing the depot at each stage of the process. Will an extra receptionist
    be required to cope with maintaining all this extra data? If these extras are
    not essential to the client, the scope should exclude them. If, however, the extra
    information is one of the main purposes of acquiring the system, there are still
    issues to consider. How accurate will the data be? If drivers suspect that times
    are being recorded next to their names, might they feel pressured into being less
    than accurate sometimes? Setting up a complicated system to analyze inaccurate
    numbers is a waste of everybody’s time and money.'
