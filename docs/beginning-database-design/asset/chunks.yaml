    \n## 唯一约束\n\n让我们再看一下`Visit`表，如[图 9-4](#9781430242093_Ch09.xhtml#F4)所示。我们有两个候选键：`visitID`和组合(`date`,\
    \ `farm`, `paddock`)。基于上一节讨论的原因，我们选择`visitID`作为主键。这个选择会让我们失去什么吗？\n\n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-04_fmt.jpeg)\n\
    \n[**图 9-4.**](#9781430242093_Ch09.xhtml#FG4) 带有生成的`visitID`的`Visit`表\n\n如果(`date`,\
    \ `farm`, `paddock`)组合不是主键，我们就失去了每行必须在此字段组合上具有唯一值的约束。这意味着我们可能会错误地插入两行记录：2011年4月1日访问17号农场3号牧场。我们仍然希望保持此组合的唯一性，为此可以设置一个唯一约束。\n\
    \n[清单 9-1](#9781430242093_Ch09.xhtml#L1)展示了创建`Visit`表的SQL，其中包含一个唯一约束，以确保(`date`,\
    \ `farm`, `paddock`)组合在表中不重复。\n\n***[清单 9-1.](#9781430242093_Ch09.xhtml#Lis1)**\
