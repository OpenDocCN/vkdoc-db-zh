- fmt: '![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-02_fmt.png)


    [**Figure 4-2.**](#9781430242093_Ch04.xhtml#FG2) Objects and relationship instances
    consistent with [Figure 4-1](#9781430242093_Ch04.xhtml#F1)


    Notice that `room` 104 is empty as is allowed by the data model (a `room` does
    not have to be associated with a `guest`). Now that we have read what the data
    model tells us in a mechanical way, Let’s think a little bit more deeply about
    what the model is telling us about the real problem and how it is being handled.


    What is the definition of a `group` for this hostel? We see that in the example
    data in [Figure 4-2](#9781430242093_Ch04.xhtml#F2) the `Boys High` `group` consists
    of four people. There is only one arrival date and departure date for the entire
    `group` and just the one set of contact information that applies to all the `group`
    members. In this respect, our definition of `group` is a little different from
    what we might expect in normal conversation. It is not a set of people who all
    know each other and feel as though they belong together, but a set of people with
    the same arrival and departure dates and common contact information. For the most
    part this model will work well for the hostel, but there will be the odd exceptional
    case. What would we do if `A. Taylor` and `W. Long` need to leave the `Boys High`
    `group` a day early? How could we record this information? There is no place to
    store dates with `Taylor`’s or `Long`’s `Guest` object, and there is only room
    for one departure date to be stored with the `Boys High Group` object. Within
    this model, we could capture this information by creating another `Group` object
    for `Taylor` and `Long` (`Boys High Early Leavers`, say) with a different set
    of dates. That would cope with knowing who is coming and going when. If it is
    essential, however, that the system needs to record that these two groups of `Boys
    High` people are somehow “together,” the data would need to be modeled differently.


    The data model also tells us that a `guest` *must* belong to a `group`. What else
    does this tell us about the definition of a `group`? What about a lone traveler
    wishing to stay at the hostel? Given that the hostel is primarily set up for groups
    of people this is unlikely, but it can be accommodated within the model. We can
    have a `group` with just one `guest`. In this respect, the definition of `group`
    for this database problem is once again different from the way the word is used
    in normal conversation. We would not generally refer to a *group of one person*;
    however, for this data model that is a possibility that might eventuate.


    So our original data model, which at first glance looked quite simple, has told
    us quite a bit about how the problem is being dealt with. It has led us to a precise
    definition for a `group`:


    *A `group` is a set of `guest`s with common contact information and with identical
    arrival and departure dates. A separate `group` will need to be formed for each
    different set of arrival and departure dates. A `group` can have one or more `guest`s
    associated with it.*


    By being careful with the definition of the `Group` class, we have avoided needing
    special cases for `group`s with more than one set of dates or for `guest`s traveling
    alone. This keeps the problem and its solution simple. Of course, if the majority
    of `guest`s were lone travelers, we would rethink the problem and model it in
    an entirely different way.


    In the rest of this chapter, we will look at questions we can ask about small
    pieces of a data model in order to learn more about the problem at hand. The questions
    we will look at only apply to relationships between two classes, but they can
    open up a great deal of discussion about the problem. As more is understood about
    a problem, what we learn from the data model can be reflected in the use cases.
    The questions we will consider are as follows:


    *   **Optionality:** Should it be 0 or 1?

    *   **Cardinality of 1:** Might it occasionally be 2?

    *   **Cardinality of 1:** What about historical data?

    *   **Many–Many:** Are we missing anything?


    # Optionality: Should It Be 0 or 1?


    As described in [Chapter 2](#9781430242093_Ch02.xhtml), the optionality of one
    end of a relationship is the smallest number of objects that can be associated
    with an object at the other end. This is usually 0 or 1. For example, in [Figure
    4-1](#9781430242093_Ch04.xhtml#F1), reading the relationship between `guest` and
    `room` from left to right, we have that a particular `guest` *must* be associated
    with a `room` (optionality 1), whereas reading the relationship from right to
    left, we see that a particular `room` may have no related `guest` (optionality
    0).


    Optionalities can provide a great deal of information about the definitions of
    classes and the scope of the problem. We will look at a few small examples, each
    of which illustrates some aspect of deciding on the appropriate optionality.


    ## Student Course Example


    Consider the data model in [Figure 4-3](#9781430242093_Ch04.xhtml#F3), which shows
    a relationship between `student`s and `course`s in which they enroll.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-03_fmt.png)


    [**Figure 4-3.**](#9781430242093_Ch04.xhtml#FG3) Data model for `student`s enrolling
    in `course`s


    On first sight this is quite trivial: a `student` can enroll in many `course`s,
    and a `course` can have many `student`s enrolled in it. What about the optionalities?
    Can a `student` be enrolled in no `course`s? Our normal conversational definition
    of a `student` is someone who is studying or, more accurately, is formally enrolled
    in a `course` (which is quite different really!). What is our definition of `student`
    for this database? It has been a long time since I’ve been able to be described
    as a `student` in normal conversation, but I am quite sure I still feature in
    the `student` database at my former university. For the purpose of this example
    then, we might define a `student` as someone who is, or has been, enrolled in
    a `course`.


    Does it make any sense to have a “`student`” in our database that is not and has
    never been enrolled in any `course`s? What about a person who has been accepted
    into a university but has not yet made final decisions about any specific `course`s?
    Is this person a `student`? The university would certainly want to keep information
    about such a person (her `ID`, `name`, `address`, and so on). We can accommodate
    this situation by expanding our definition of a `student` to include people accepted
    by and/or registered with the university.


    What about a person who has contacted the university and asked to be sent information
    about enrollment? Any typically cash–strapped institution will want to keep information
    about such a person. Asking this question starts to involve issues about the scope
    of the problem as well as the definition of a `student`. It is important that
    questions such as “Exactly who are these people you call `student`s?” are considered
    right at the start of the analysis process. Is the system to include contact details
    for everyone who has ever expressed an interest in attending the university, or
    is the scope to be restricted (at least for the time being) to records of current
    and former `student`s?


    Clearly, only the client can answer these questions. It is useful to see how careful
    consideration of the details of even the most simple data model can lead to important
    questions about much wider aspects of the problem. Asking whether a `student`
    must be enrolled in a `course` may seem pedantic at first, but until we can answer
    that question clearly, we have not even begun to understand the problem we are
    trying to solve.'
