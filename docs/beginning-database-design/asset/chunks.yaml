- fmt: 'The rows in [Figure 10-7](#9781430242093_Ch10.xhtml#F7) may not be what we
    were expecting if we thought we were going to see a row for each course. The inner
    join returns combinations of rows from the two tables where `examiner` = `personID`
    and this will never be true where the `examiner` field is `Null`. The course `COMP205`
    is missing from the resulting table because it does not have an examiner. If the
    question is more accurately worded as “Retrieve *all* the courses and, *for those
    courses that have one*, the examiner as well,” we can use what is called an *outer
    join* as shown in [Listing 10-13](#9781430242093_Ch10.xhtml#L13).


    ***[Listing 10-13.](#9781430242093_Ch10.xhtml#Lis13)** Outer Join to Retrieve
    All Courses Along with Examiners*


    ```sql

    SELECT *

    FROM Course LEFT OUTER JOIN Lecturer ON examiner = personID

    ```


    The result of this query, shown in [Figure 10-8](#9781430242093_Ch10.xhtml#F8),
    is the same as for the inner join, but in addition, any rows in the left–hand
    table (`Course`) with nothing in the join field (`examiner`) will appear as well.


    ![9781430242093_Fig10-08.tif](images/9781430242093_Fig10-08_fmt.jpeg)


    [**Figure 10-8**](#9781430242093_Ch10.xhtml#FG8). Result of outer join to retrieve
    all the courses


    Which way around you put your tables in the join statement doesn’ t matter, so
    `Course LEFT OUTER JOIN Lecturer` is equivalent to `Lecturer RIGHT OUTER JOIN
    Course`. Standard SQL also supports a full outer join, which means that every
    row from both tables will be represented in the result. `Lecturer FULL OUTER JOIN
    Course` will retrieve all the lecturers (even if they don’ t examine a course)
    and all the courses (even if they don’ t have an examiner). While a full outer
    join is part of standard SQL, not all systems support it explicitly (MS Access
    doesn’ t). However, we can always achieve the same result by combining two outer
    joins with a *union* operation (which I describe in the next section).


    ## Set Operations


    While joins are probably the most often used operation for combining information
    from several tables, there are a number of other operations. A join can be used
    between any two tables. Set operations are used on two tables (or virtual tables)
    that have the same number and type of columns. They are used for queries such
    as “Retrieve the rows that appear in both these tables” or “Retrieve the rows
    that are in this table but not that one.” We can use the `Enrollment` table in
    [Figure 10-9](#9781430242093_Ch10.xhtml#F9) to illustrate these ideas.


    ![9781430242093_Fig10-09.tif](images/9781430242093_Fig10-09_fmt.jpeg)


    [**Figure 10-9**](#9781430242093_Ch10.xhtml#FG9). `Enrollment` table


    Here are some queries we might like to carry out:


    *   Retrieve the `ID` numbers of all students who have done *both* `COMP101` *and*
    `COMP102`.

    *   Retrieve the `ID` numbers of all students who have done *either* `COMP101`
    *or* `COMP102`.

    *   Retrieve the `ID` numbers of all students who have done `COMP101` *but not*
    `COMP102`.


    First we need two queries that will return the `ID`s of students who have done
    `COMP101` and `COMP102`, respectively. These queries and the virtual tables they
    produce are shown in [Figure 10-10](#9781430242093_Ch10.xhtml#F10).


    ![9781430242093_Fig10-10.eps](images/9781430242093_Fig10-10_fmt.png)


    [**Figure 10-10**](#9781430242093_Ch10.xhtml#FG10). Results of queries to select
    students who have done particular papers


    A little reordering and overlaying of the two virtual tables as shown in [Figure
    10-11](#9781430242093_Ch10.xhtml#F11) can help us see what rows will satisfy each
    of our questions.


    ![9781430242093_Fig10-11.eps](images/9781430242093_Fig10-11_fmt.png)


    [**Figure 10-11**](#9781430242093_Ch10.xhtml#FG11). Using set operations to find
    answers to questions about enrollments


    The three set operations shown in [Figure 10-11](#9781430242093_Ch10.xhtml#F11)
    show us those students who have done *both* subjects (`intersect`), *either* subject
    (`union`), and `COMP101` *but not* `COMP102` (`except`). Oracle uses the key word
    `MINUS` instead of `EXCEPT`. [Listing 10-14](#9781430242093_Ch10.xhtml#L14) shows
    the SQL to retrieve the union of the two sets of `studentID`s starting from the
    original real tables.


    ***[Listing 10-14.](#9781430242093_Ch10.xhtml#Lis14)** The studentIDs for Those
    Students Who Have Done Either COMP101 or COMP102*


    ```sql

    SELECT distinct studentID FROM Enrollment WHERE course = ‘COMP101’

    UNION

    SELECT distinct studentID FROM Enrollment WHERE course = ‘COMP102’

    ```


    In principle, in SQL we can replace the keyword `UNION` in [Listing 10-11](#9781430242093_Ch10.xhtml#L11)
    with the keywords `INTERSECT` and `EXCEPT` to obtain the other set operations.
    In practice, not all database systems provide these latter two keywords. This
    is because it is possible to obtain the same results using some other SQL statements.
    How this is done is getting beyond this introduction, but can be found in my SQL
    Queries book. The important thing is to know that your relational database system
    will allow you to write an SQL statement to retrieve rows equivalent to each of
    the set operations in [Figure 10-11](#9781430242093_Ch10.xhtml#F11).


    ## How Indexes Can Help


    Many queries will require joining a number of tables, extracting particular rows
    and columns, and possibly presenting the result in a specified order. As tables
    become large, these operations will clearly become more time consuming. Indexes
    are a way of enabling particular rows in a database table to be found quickly.


    ![images](images/sq.jpg) Note This is a very brief introduction to how indexes
    can help in query execution. If you are responsible for ­creating indexes on large
    databases, you’ ll want to read more on the topic. Books such as *Expert Indexing
    in Oracle Database 11 g* (Apress, 2012) and *Expert Performance Indexing for SQL
    Server 2012* (Apress, 2012) can help.


    Depending on your database software, you may find that a number of indexes are
    put on your tables by default. There are also several considerations for planning
    useful indexes:


    *   Whether you are updating or retrieving data;

    *   Whether you are retrieving very general or very specific data;

    *   The relative sizes of tables involved in joins;

    *   The sizes of the rows in the table;

    *   A myriad of other imponderables.


    I am not attempting to address these issues here. Hopefully this chapter will
    make you aware of what indexes can do, so that you can begin to learn more and
    also have a useful discussion with your database administrator.


    ## Indexes and Simple Queries


    Let’ s start by looking at simple queries on a single table such as the `Enrollment`
    table in [Figure 10-12](#9781430242093_Ch10.xhtml#F12). We will want to retrieve
    different subsets of the rows for different purposes.


    ![9781430242093_Fig10-12.tif](images/9781430242093_Fig10-12_fmt.jpeg)


    [**Figure 10-12**](#9781430242093_Ch10.xhtml#FG12). A small part of a potentially
    very large table


    It is likely that we will want to access this table by `course` (in order to retrieve
    the students enrolled in a particular class) and at other times by `studentID`
    (to get a student record). Indexes help us to do both these tasks efficiently.
    A database index acts very much like an index that you would find in the back
    of a book. For example, if you have an index on names, it would store all the
    values of the `name` field in alphabetical order and also store a pointer or reference
    to the full record elsewhere. The reference is like storing a page number in a
    book index. [Figure 10-13](#9781430242093_Ch10.xhtml#F13) shows how you can envisage
    indexes on the `Enrollment` table.


    ![9781430242093_Fig10-13.eps](images/9781430242093_Fig10-13_fmt.png)


    [**Figure 10-13**](#9781430242093_Ch10.xhtml#FG13). Two indexes on the `Enrollment`
    table'
