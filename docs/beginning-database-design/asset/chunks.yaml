- fmt: 'Reading the relationship from right to left and questioning whether a course
    must have a student enrolled in it leads to a similar debate about how we define
    a course. What data might we want to keep about a course? Think about all the
    different situations we might need to deal with. We might need to consider former,
    current, or proposed courses; popular courses offered more than once concurrently
    (two streams); and unpopular courses that are on the books but lack students.
    You cannot come up with absolute answers without being able to discuss the situation
    with a client, but you can come up with some possible definitions for consideration.


    ## Customer Order Example


    Here is an easier example. (Or is it?) We keep information on customers and the
    orders they place. Our first instinct is to say that customers can place many
    orders and each order is placed by one customer. This can be represented as in
    [Figure 4-4](#9781430242093_Ch04.xhtml#F4).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-04_fmt.jpeg)


    [**Figure 4-4.**](#9781430242093_Ch04.xhtml#FG4) Data model for customers placing
    orders


    What about the optionalities? Consider the relationship from left to right. Can
    a customer be associated with no orders? This depends on the definition of a customer.
    For the purposes of many businesses, it might be *anyone I am hopeful of selling
    something to*. A working definition such as *anyone who has ever placed an order
    and other people who are to be sent catalogs* seems reasonable and suggests an
    optionality of 0 (i.e., customers in our database have not necessarily placed
    an order). However, this definition should probably spark a few questions such
    as, “Do you want to be able to identify people who have previously placed orders
    but who are now fed up with being sent catalogs?”


    Reading the relationship from right to left, we want to know whether each order
    *must* have an associated customer. This seems trivial. What is the point of an
    order if we don’t know who it is for? If an order arrives in the mail with no
    name or address, it would be reasonable to say that it should not be entered in
    the database, and so from this perspective we can insist that every order must
    have a customer (optionality 1).


    However, there is a subtle difference between knowing for whom an order has been
    placed and relating it to a customer object in the database. A written order may
    come in the mail from Mrs. Smith of Riccarton Road. While we know who placed the
    order, that is different from associating it with a customer. We may have to create
    a new object if Mrs. Smith is a new customer, or we may be faced with deciding
    which of the existing three Mrs. Smiths this order is from. The problem of distinguishing
    customers with similar details or deciding whether two or more entries in the
    customer database actually refer to the same real person can be difficult. Once
    again, we are not trying to solve any of these issues just now. We are simply
    using the data model to make us think clearly about some of the issues we will
    have to confront.


    ## Insect Example


    Here is another example of how investigating the optionalities of a relationship
    can lead to questions about the scope of the problem. [Figure 4-5](#9781430242093_Ch04.xhtml#F5)
    shows part of a possible data model from [Example 1-3](#9781430242093_Ch01.xhtml#ex1-3)
    in which farms were visited and several samples of insects were collected. A `Visit`
    object would contain information about the date and conditions of a particular
    visit and would be associated with several `Sample` objects. Each sample object
    would contain information about the number of insects collected.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-05_fmt.jpeg)


    [**Figure 4-5.**](#9781430242093_Ch04.xhtml#FG5) Data model for collecting samples


    Asking whether a sample *must* be associated with a visit is like the question
    in the previous section about whether an order *must* have a customer. If for
    this research project our samples only come from farms, it is reasonable that
    we had to visit a farm to collect them, and so each sample should always be associated
    with a visit. However, if the scope of the database is broader, with records of
    samples that have been stored for years and whose origin is uncertain, we may
    have to reconsider. If we insist that a sample is associated with a visit then
    we will not easily be able to record information about these historical samples.


    Asking whether each visit must have an associated sample (should the optionality
    at the sample end be 0 or 1?) leads to an interesting question. Is it possible
    that at some time we may want to record visits to farms for reasons other than
    collecting samples? These questions may seem trivial, but the broad understanding
    of the larger problem can only be improved.


    ## A Cardinality of 1: Might It Occasionally Be Two?


    Every part of a problem is susceptible to exceptional occurrences. During the
    analysis of a situation, it is important to think carefully about different scenarios
    to ensure that the database will be able to cope adequately with all the data
    that may eventuate. Some “exceptions” are really complications that have been
    overlooked. Real life and real problems are always complicated. Even something
    as simple as *write down your usual address* can have hidden difficulties, as
    many children in shared custody discover when they have to fill out an address
    on a school form. It might seem picky to insist on asking “Might a person have
    more than one usual address?” but thousands of modern–day families cannot be shrugged
    off as exceptional.


    In this section, we will look at how to deal with “exceptions” that do not warrant
    a complete overhaul of the problem but nevertheless are likely to turn up during
    the lifetime of the database. We have already seen an example of a likely exception
    earlier in this chapter in the hostel data model. There we considered the case
    in which some members of a group might want to leave before the others. In the
    hostel data model, rather than complicating the problem by allowing each group
    to have several dates, we redefined what we meant by *group* for the purposes
    of storing the data (i.e., a set of people arriving and leaving on the same dates).


    The following sections provide some other examples where a different definition
    can help cope with some foreseeable, but unusual, events.


    ### Insect Example


    In the previous section we looked at the example of a scientist visiting a farm
    to collect insect samples. Some insects might behave differently if it is fine
    or raining so it may be important to record information about the weather when
    the sample was collected. To record the weather conditions consistently, the scientist
    may decide to choose from one of a number of categories. Introducing a `Weather`
    class with objects for the different conditions (e.g. fine, overcast, raining)
    can ensure that this information is recorded consistently. Part of a possible
    class diagram to represent the data is shown in [Figure 4-6](#9781430242093_Ch04.xhtml#F6).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-06_fmt.jpeg)


    [**Figure 4-6.**](#9781430242093_Ch04.xhtml#FG6) Associating a weather category
    with a visit


    Reading the relationship between weather category and visit from left to right,
    it is reasonable that a visit will have one weather type that describes it, but
    there might also be occasions when a thunderstorm arrives while the last few samples
    are being collected. If so, do we care? The answer will, of course, depend on
    the client, but it is up to the analyst to ask the question and propose some possibilities.'
