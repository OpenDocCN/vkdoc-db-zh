    were expecting if we thought we were going to see a row for each course. The inner
    join returns combinations of rows from the two tables where examiner = personID
    and this will never be true where the examinerfield is Null. The course COMP205
    is missing from the resulting table because it does not have an examiner. If the
    question is more accurately worded as “Retrieve *all* the courses and, *for those
    courses that have one*, the examiner as well,” we can use what is called an *outer
    join* as shown in [Listing 10-13](#9781430242093_Ch10.xhtml#L13).


    ***[Listing 10-13.](#9781430242093_Ch10.xhtml#Lis13)** Outer Join to Retrieve
    All Courses Along with Examiners*


    SELECT *


    FROM Course LEFT OUTER JOIN Lecturer ON examiner = personID


    The result of this query, shown in [Figure 10-8](#9781430242093_Ch10.xhtml#F8),
    is the same as for the inner join, but in addition, any rows in the left–hand
    table (Course) with nothing in the join field (examiner) will appear as well.


