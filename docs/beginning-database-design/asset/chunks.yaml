    Most database systems will have the facility to import and export data to and
    from XML files. For example, the file in [Listing 12-5](#9781430242093_Ch12.xhtml#L5)
    can be imported directly into Access to create and populate three database tables
    (student, course, and enroll).


    Defining XML types


    The XML in the previous sections was very flexible. However, in practice we usually
    need more precision in the way data elements are described. It is possible to
    define a course as an element that has a code and a title with a DTD (Document
    Type Definition). The code in [Listing 12-6](#9781430242093_Ch12.xhtml#L6) is
    a definition of a course. It says that a course is made up of a code and a title,
    and that codes and titles are character data. The lines of code at the bottom
    then provide some values for a course.


    ***[Listing 12-6](#9781430242093_Ch12.xhtml#Lis6)**. A DTD for a Course*


    <?xml version=“1.0”?>


    <!DOCTYPE course[


    <!ELEMENT course (code, title)>


    <!ELEMENT code (#CDATA)>


    <!ELEMENT title (#CDATA)>


    ]>


    <course>


    <code>C102</code>


    <title>Programming</title>


    </course>


    Importing an XML document such as that in [Listing 12-6](#9781430242093_Ch12.xhtml#L6)
    into Access would create a table with two text columns (code and title) and one
    row with values C102 and Programming. This is an excellent way of transferring
    information about the structure and the values of data between applications.


    A more expressive method of defining XML data types is by using XML Schema Language.
    An XML schema document (XSD) is XML code to describe data. [Listing 12-7](#9781430242093_Ch12.xhtml#L7)
    shows a very simple XSD to define a course. Because definitions of elements are
    likely to be reused in many different situations we may run into the situation
    in which two or more elements from different documents have the same name. For
    example, we may find in another definition that there is a different element named
    “title.” XSD has the concept of a name space so that all elements can be uniquely
    identified. The second line of code in [Listing 12-7](#9781430242093_Ch12.xhtml#L7)
    says that any definitions prefixed by “xs” come from this definition for our university.
    The rest of the code says that a course is a complex type made up of a sequence
    of code and title which are both strings (or character types).


    ***[Listing 12-7](#9781430242093_Ch12.xhtml#Lis7)**. Very Basic XSD for a Course*


    <?xml version=“1.0”?>


    <xs:schema xmlns:xs=“http://university”>


    <xs:element name=“course”>


    <xs:complexType>


    <xs:sequence>


    <xs:element name=“code” type=“xs:string”/>


    <xs:element name=“title” type=“xs:string”/>


    </xs:sequence>


    </xs:complexType>


    </xs:element>


    </xs:schema>


    XSD is a large language and will let you define constraints on values, specify
    cardinalities (e.g., the minimum and maximum number of courses a student could
    have), specify default values, declare that elements must have unique values,
    and so on. The full specification can be found at [http://www.w3.org/XML/Schema](http://www.w3.org/XML/Schema).
    Essentially, it allows you to specify the equivalent of database tables but with
    a platform independent text document. It is useful for transferring schema description
    between applications.


    Querying XML


    This section on querying XML data is only to give a brief idea of what is possible
    and to point you to further information. Consider the XML description of some
    student data in [Listing 12-8.](#9781430242093_Ch12.xhtml#L8)


    ***[Listing 12-8](#9781430242093_Ch12.xhtml#Lis8)**. XML to Describe Some Student
    Data*


    <?xml version=“1.0”?>


    <university>


    <student>


    <studentID>15673</studentID>


    <last_name>Smith</last_name>


    <first_name>Jim</first_name>


    <age>18</age>


    </student>


    <student>


    <studentID>23543</studentID>


    <last_name>Green</last_name>


    <first_name>Ruby</first_name>


    <age>22</age>


    </student>


    </university>


    The hierarchical structure means we can parse the text to find students which
    match particular criteria. XPath is a succinct language which allows the hierarchy
    to be traversed to retrieve elements satisfying different criteria. For example,
    the XPath code in [Listing 12-9](#9781430242093_Ch12.xhtml#L9) would retrieve
    the last names of all students over age 20.


    ***[Listing 12-9](#9781430242093_Ch12.xhtml#Lis9)**. XPath Expression to Retrieve
    the Last Names of Students Over 20*


    /university/student[age>20]/last_name


    The code will traverse the university tree and find all the elements defined as
    students and then find their last names—but just those which match the criteria
    that the value of the age element is greater than 20. XQuery is an extension to
    XPath that allows results to be transformed in various ways (e.g., sorted alphabetically)
    and even allows the equivalent of joins between sets of data. The specification
    for XPath and XQuery can be found at [http://www.w3.org/standards/xml/](http://www.w3.org/standards/xml/).


    NoSQL


    This book has focused on small databases. We have been particularly interested
    in highly structured data where the emphasis is on being able to retrieve different
    types of information. This is only one small portion of the overall database world.
    The internet has given rise to huge data sets that often need to be stored on
    hundreds of computers across continents. Highly structured data models and their
    representation in relational or SQL databases are not an effective way to manage
    such data.


    NoSQL databases offer a less structured way to manage large amounts of data. One
    example is a key–value database. Key data (say a string) is stored and is searchable,
    and the value is a reference to where the rest of the data can be found. There
    are no constraints on how that data is structured, so these databases are very
    flexible. Other examples are document databases and big table databases (in which
    the rows can all have different structures.) While these types of databases have
    many advantages for storing large amounts of data, the downside is the ease of
    querying and finding connections between different pieces of data. Without a rigorous
    structure you cannot have the operations available in SQL such as joins. This
    kind of logic is generally handled in NoSQL databases with front–end programming.
    Graph databases can reflect associations between different pieces of data by maintaining
    links between them. Once again the actual data can be structured in any way and
    the prescribed links can provide fast access between items of data. Ad hoc queries
    are difficult.


    SQL databases provide efficient storage and querying for well–structured data.
    NoSQL databases offer flexible ways of managing large amounts of data of many
    different types.


    Summary


    In this chapter, we have looked at alternatives to using a relational database
    to represent a data model.


    Object–Oriented Databases


    Object–oriented databases offer a number of advantages over relational databases
    in terms of complex data types (e.g., names and addresses), methods (e.g., outputting
    different formats of names), and accurately representing inheritance. The drawback
    is that complex queries may be more difficult to set up.


