    CHAPTER 12


    ![image](images/frontdot.jpg)


    Other Implementations


    In the first few chapters of this book, we focused on obtaining a set of use cases
    and a data model that accurately represented the scope of a problem and the interrelation
    of the different data items. [Chapters 7](#9781430242093_Ch07.xhtml) through [9](#9781430242093_Ch09.xhtml)
    showed how we could take the data model and represent it in a relational database
    as a set of normalized tables with the relationships implemented by foreign keys.
    The previous two chapters showed how we could efficiently enter data into these
    tables and use queries to extract meaningful information and reports.


    Now we will have a brief look at other ways to represent the data model. We will
    look at object–oriented databases, spreadsheets (for simple data models), and
    XML as ways to represent data models.


    Object–Oriented Implementation


    Our data models are *object oriented*. This means that we look at the data and
    relationships in terms of specific objects, as in this description of a 1–Many
    relationship: “One object of the Customer class can be associated with many objects
    of the Order class.” A programmer in object–oriented (OO) languages such as Java,
    VB .NET, or C# can create and manipulate objects directly. OO languages also have
    additional features that are not present in most relational database software.
    These features include the ability to have complex types for attributes (an object
    or a collection of objects) and the ability to store methods describing the behavior
    of an object as part of the class definition. Another advantage of an OO language
    is that it is able to directly implement and maintain classes and subclasses and
    so make full use of inheritance. One thing that is sometimes missing in OO languages
    is a way of saving and retrieving objects to and from persistent storage in a
    transparent manner. OO databases provide a way of seamlessly creating objects,
    storing them to disk, and then finding them again. The design of OO programs is
    a huge topic, so here I merely outline some of the main techniques in capturing
    the essential elements of a data model.


    Classes and Objects


    Unlike relational databases, OO programming languages support the idea of classes
    and objects directly. Classes are a definition or a template for how objects are
    going to be constructed. For example, a Customer class will specify the attributes
    that each Customer object will have (e.g., a name, an address, etc.). Each Customer
    object will be created according to the definition of the class and will have
    its own values for each of the attributes. Classes are just an abstract idea,
    but the objects themselves are independent entities. By contrast, in a relational
    database we think in terms of tables. We construct a table to represent each class,
    and the objects are represented by rows. We perform operations such as joins and
    unions on tables, not rows. Whereas operations within a relational database are
    firmly based on tables, in an OO environment the emphasis is on objects (hence
    “object oriented”).


    The difference between OO languages and relational databases is particularly marked
    when we consider inheritance. In [Chapter 6](#9781430242093_Ch06.xhtml) we saw
    how the ideas of specialization and generalization could help us model particular
    situations where we had classes that had much in common. In [Figure 12-1](#9781430242093_Ch12.xhtml#F1),
    we have a data model which captures the similarities between students and lecturers
    in a parent Person class.


    ![9781430242093_Fig12-01.tif](images/9781430242093_Fig12-01_fmt.jpeg)


    [**Figure 12-1.**](#9781430242093_Ch12.xhtml#FG1) Data model with inheritance


    [Figure 12-2](#9781430242093_Ch12.xhtml#F2) shows how we attempt to capture the
    main features of this data model with tables in a relational database.


    ![9781430242093_Fig12-02.tif](images/9781430242093_Fig12-02_fmt.jpeg)


    [**Figure 12-2.**](#9781430242093_Ch12.xhtml#FG2) Inheritance represented with
    1–1 relationships


    The representation in [Figure 12-2](#9781430242093_Ch12.xhtml#F2) requires three
    tables. Each student will be represented by two rows: one in the Person table
    and one in the Student table. If we want all the information about a particular
    student, we need to join the Student and Person tables in order to retrieve both
    the degree and the names. In an OO environment, if we create an object of either
    the Student or Lecturer class, it will have all the relevant attributes embedded
    in that object. We do not need to look up any other object or refer to any other
    class to retrieve the required information. This is depicted in [Figure 12-3](#9781430242093_Ch12.xhtml#F3).


    ![9781430242093_Fig12-03.eps](images/9781430242093_Fig12-03_fmt.png)


    [**Figure 12-3.**](#9781430242093_Ch12.xhtml#FG3) A student and lecturer object
    in an OO environment


    In an OO environment, each object is a separate entity with its own unique object
    identification (OID). Because each object has its own identification, there is
    no requirement that the values of its attributes be unique. Put another way, from
    an implementation point of view, there is no need to provide the equivalent of
    a primary key that we needed in a relational database. For example, the two objects
    in [Figure 12-4](#9781430242093_Ch12.xhtml#F4) can each be identified by the system
    via their unique OID, even though the values of their attributes are the same.
    However, the OID is not necessarily available, nor is it meaningful to the user.
    The program can distinguish the objects, but can the user?


    ![9781430242093_Fig12-04.eps](images/9781430242093_Fig12-04_fmt.png)


    [**Figure 12-4.**](#9781430242093_Ch12.xhtml#FG4) Two distinct objects; but can
    the user tell them apart?


    In reality there will be some information that will differentiate the two different
    students (e.g., an address or birth date). Although it is not essential, a unique
    identifier such as a student ID number is probably still useful for helping users
    refer to particular people. Referring to student 128675 is easier than referring
    to the Jane Smith who lives in Beckenham.


