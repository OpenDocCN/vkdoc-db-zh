- fmt: '# Attribute, class, or relationship?


    Here are some examples of questions to help you decide.

    `Might I want to select objects based on the value of an attribute`? For example,
    might you want to select teams based on grade? If the answer is yes, consider
    introducing a class for that information (create a grade class).

    `Am I likely now or in the future to store other data about this information?`
    For example, might I want to keep additional information about the captain: phone,
    address, and so on? If yes, consider introducing a class.

    `Am I storing (or should I be storing) such information already?` For example,
    the information about a captain is the same or similar to information about members.
    Consider a relationship between existing classes.


    # More than one relationship between two classes


    Consider more than one relationship between two classes if there is different
    information involving both classes. For example, a member might `play` for a team,
    `captain` a team, `manage` a team, and so on.


    # Consider self relationships


    Objects of a class can be related to each other. For example, members `sponsor`
    other members, people `are parents of` other people.


    # Different routes between classes


    Check wherever there is a closed loop to see whether the same information is being
    stored more than once.

    Check to ensure you are not inferring more than you should from a route; that
    is, look out for fan traps where a class is related to two other classes and there
    is a cardinality of Many at both outer ends.

    Check to ensure a path is available for all objects; that is, look out for chasm
    traps (are there optional relationships along the route?).


    # Information dependent on objects of more than two classes


    Consider introducing a new class where you need to know about combinations of
    objects from three or more classes simultaneously; for example, which member played
    for which team in which match?

    Any attributes in the new class must depend on a particular combination of objects
    from *each* of the participating classes; such as, what do I need to know about
    a particular `member` playing on a particular `team` in a particular `match`?

    Consider what information might be pertinent to two objects from *pairs* of the
    contributing classes; for example, what do I need to know about a particular member
    and a particular team *independent* of any match?


