  trans: '

    ## 数据类与关系


    如示例 1-1 所示，该表的设计仅考虑了一类数据：本例中是 `People`（人员）。但实际上，我们拥有两类数据，`People` 和 `Interests`（兴趣），并且我们关注它们之间的连接或关系。在这种情况下，一个类似于示例
    1-1 的解决方案也会有用得多。


    创建人员表相对简单直接，但兴趣表则带来了一些问题。在示例 1-1 中，各种可能的用途相当明确（如防风、遮蔽等）。但在示例 1-2 中，不同的研究兴趣有哪些呢？答案并不那么显而易见。快速浏览显示的数据可以看到八种兴趣，但我们有理由假设
    `visualisation` 和 `visualization` 只是同一主题的不同拼写。但是 `scientific visualisation` 和
    `visualisation of data` 呢——在问题背景下，这些是相同的吗？`computer visualisation` 又如何呢？任何有其中一项兴趣的员工，对于外界关于如何可视化某些数据的咨询，都可能是合适人选。


    在决定采用两类数据——`People` 和 `Interests`——之后，我们现在需要明确定义它们的含义。`People` 并不太难——你可能需要考虑哪些员工将被纳入，以及是否也应包括研究生。然而，`Interests`
    则更困难。在当前示例中，兴趣是任何员工可能想到的东西。如此模糊的定义会给我们带来一系列问题，尤其是在对特定兴趣进行任何报告或分析时。一种解决方案是预先确定一组广泛的主题，并让人们从中选择适用的选项。但这项任务远非易事。人们会因为自己热衷的主题未能原样包含而感到不满，并且可能花费数小时（甚至数月）试图就一个完整的列表达成一致。而这个列表很可能包含一系列层级化的类别和子类别。图书馆和期刊投入了大量的精力和专业知识来设计并维护此类列表。也许这样的列表对示例
    1-2 中的问题有用，但同样也可能没用。


    预见到这些困难后，你可能会认为这种努力仍然是值得的，或者你可能会重新考虑并选择不同的解决方案。在后一种情况下，联络团队直接尝试找出最可能的人选，让真实的人来梳理所需内容，可能反而更容易。就在起草本章之前的三个月内，我看到了三种不同的尝试，试图建立电子表格或数据库来记录研究兴趣。每次，人们都花费数小时收集和存储数据，然后创建者开始遇到我刚才描述的问题。目前，没有一个数据库按预期被维护或使用。


    ## 重复信息


    另一个常见问题是不必要地将同一信息存储多次。这种冗余通常是数据库设计反映某种输入表单的结果。例如，在一个小企业中，每张订单表单可能记录客户的姓名、地址和电话号码等关联信息。如果我们设计一个反映此类表单的表，那么每次下订单时都会记录客户的姓名、地址和电话号码。这不可避免地导致不一致和问题，尤其是当客户从一个地址搬迁到另一个地址时。我们可能想发送广告目录，但不确定应该使用哪个地址。有时，重复的信息并不那么明显。示例
    1-3 说明了一种这样的情况。


    ### 示例 1-3. 昆虫数据¹


    一个长期环境项目的团队成员定期访问农场并采集样本，以确定特定昆虫物种的数量。农场的每块田地都被赋予了一个唯一的代码，每次访问田地时，都会采集一些代表性样本。记录每个样本中每种昆虫的数量。


    图 1-4 显示了部分数据在电子表格中的记录方式。


    ![9781430242093_Fig01-04.tif](img/9781430242093_Fig01-04_fmt.jpeg)


    `图 1-4.` 电子表格中的昆虫数据


    每个农场的信息被（相当正确地）记录在其他地方，从而避免了该数据的重复。然而，仍然存在问题。字段 `ADhc` 位于 `农场 1` 这一事实每次访问都被记录，很快在第
    269 行就能发现第一个数据录入错误。（用于田地的编码带来了其他问题，我们暂不讨论。）


    表面上看，图 1-4 中将字段 `ADhc` 列在 `农场 2` 而非 `农场 1` 下的错误似乎没什么大不了——但它是可以避免的。农场信息被记录在此电子表格中这一事实意味着数据很可能需要按农场进行分析，而现在
    `农场 1` 和 `农场 2` 的任何结果都可能不准确。而且在项目的整个生命周期中，还会有多少其他数据录入错误呢？考虑到示例 1-3 中的结果来自一个精心设计的长期实验，并将用于统计分析，如此容易预防的错误竟能混入其中，似乎令人遗憾。


    重要的是区分数据输入错误（任何人都可能偶尔打错字）和设计错误。示例 1-3 中的问题不在于字段 `ADhc` 被错误地关联到 `农场 2`（这是一个可以轻松修复的简单错误），而在于
    `农场` 与 `田地` 之间的关联被记录了如此多次，以至于最终出现错误几乎成为必然。而且，这类错误可能非常难以检测。


    示例 1-3 的电子表格中还有另一项信息也被重复了：访问日期。字段 `ADhc` 在 `8 月 11 日` 被访问这一信息在第 268 至 278 行重复出现，制造了另一个可避免错误的来源（例如，我们可能不小心在第
    273 行填入 `8 月 10 日`）。这样的错误会影响任何基于 `日期` 的分析。


    示例 1-3 中重复的访问日期信息还引发了另一个更严重的问题：如何处理与某次特定访问相关的杂项信息（例如，当时正在下雨——如果你在数昆虫，这点相当重要）？是只放在一行中（导致难以找到所有受影响的样本），还是放在该次访问的每一行（操作麻烦且加剧了重复信息问题）？事实上，本例中的天气信息被单独记录在一个文本文档中，从而无法利用软件的功能来协助任何天气分析。

    '
- fmt: '## Techniques described more fully in later chapters would have prevented
    the problems encountered in [`Example 1-3`](#9781430242093_Ch01.xhtml#ex1-3).
    Rather than thinking of the data in terms of `the counts in each sample`, the
    designer would have thought about `Farms`, `Fields`, `Visits`, and `Insects` as
    separate classes of data in which researchers are interested both individually
    and together. For example, the researchers may want to find information about
    fields with particular soil types or visits undertaken in fine weather conditions.
    [`Figure 1-5`](#9781430242093_Ch01.xhtml#F5) shows how separating information
    about fields and visits into separate tables not only reduces problems with repeated
    information, but allows more data (soil types for fields, weather conditions for
    visits) to be easily added. The `Counts` table still suffers the same problems
    as the tables in [`Examples 1-1`](#9781430242093_Ch01.xhtml#ex1-1) and [`1-2`](#9781430242093_Ch01.xhtml#ex1-2),
    but that can be addressed. We will return to this example in [`Chapter 4`](#9781430242093_Ch04.xhtml).


    ![9781430242093_Fig01-05.tif](images/9781430242093_Fig01-05_fmt.png)


    [`Figure 1-5`](#9781430242093_Ch01.xhtml#FG5). An improved database design for
    the insect problem


    ### Designing for a Single Report


    Another cause of a problematic database is to design a table to match the requirements
    of a particular report. A small business might have in mind a format that is required
    for an invoice. A school secretary may want to see the whereabouts of teachers
    during the week. Thinking backward from one specific report can lead to a database
    with many ﬂaws. [`Example 1-4`](#9781430242093_Ch01.xhtml#ex1-4) is a particular
    favorite of mine, because the first time I was ever paid real money to fix up
    a database was because of this problem (clearly student record software has moved
    on a great deal since then!).


    [`EXAMPLE 1-4.`](#9781430242093_Ch01.xhtml#exa4) ACADEMIC RESULTS


    A university department needs to have its final–year results in a format appropriate
    for taking along to the examiners’ meeting. The course was very rigidly prescribed
    with all students completing the same subjects, and a report similar to the one
    in [`Figure 1-6`](#9781430242093_Ch01.xhtml#F6) was generated by hand prior to
    the system being computerized. This format allowed each student’s performance
    to be easily compared across subjects, helping to determine honors’ boundaries.


    ![9781430242093_Fig01-06.tif](images/9781430242093_Fig01-06_fmt.jpeg)


    [`Figure 1-6`](#9781430242093_Ch01.xhtml#FG6). Report required for students’ results


    A database table was designed to exactly match the report in [`Figure 1-6`](#9781430242093_Ch01.xhtml#F6),
    with a field for each column. The first year the database worked a treat. The
    next year the problems started. Can you anticipate them?


    Some students were permitted to replace one of the papers with one of their own
    choosing. The table was amended to include columns for option name and option
    mark. Then some subjects were replaced, but the old ones had to be retained for
    those students who had taken them in the past. The table became messier, but it
    could still cope with the data.


    What the design couldn’t handle was students who failed and then reenrolled in
    a subject. The complete academic record for a student needed to be recorded, and
    the design of the table made it impossible to record more than one mark if a student
    completed a subject several times. That problem wasn’t noticed until the second
    year in operation (when the first students started failing). By then, a fair amount
    of effort had gone into development and data entry. The somewhat curious solution
    was to create a new table for each year, and then to apply some tortuous logic
    to extract a student’s marks from the appropriate tables. When the original developer
    left for a new job, several years’ worth of data were left in a state that no
    one else could comprehend. And that’s how I got my first database job (and the
    database coped with changing requirements over several years).


    [`Example 1-4`](#9781430242093_Ch01.xhtml#ex1-4) is particularly good for showing
    how much trouble you can get into with a poor design. The developer could see
    the problem from the point of view of the required report. He thought in terms
    of one class: `Student`. In reality, at the very minimum, we have two classes,
    `Student` and `Subject`, and we are interested in the relationship between them.
    In particular, we would like to know what mark a particular student earned in
    a particular subject. [`Chapter 4`](#9781430242093_Ch04.xhtml) will show how an
    investigation of a Many–Many relationship such as the one between `Subject` and
    `Student` would have led to the introduction of another class, `Enrollment`. This
    allows different marks to be recorded for different attempts at a subject. Taking
    this approach the oversight concerning how to deal with a student’s failure would
    have been discovered, and this whole sorry mess would have been avoided.


    ## Summary


    The first thoughts about how to design a database may be inﬂuenced by a particular
    report or by a particular method of input. Sometimes the driver for a database
    is simply that some valuable information has come to hand and needs to be “put
    somewhere.” The hurried creation of a database or spreadsheet can lead to a design
    that cannot cope with even simple changes to the information you would like to
    retrieve. It is important to think carefully about the underlying data, and design
    the database to reﬂect the information being stored rather than what you might
    want to do with the data in the short term.


    ## TESTING YOUR UNDERSTANDING


    ### Exercise 1-1


    A school is planning some outdoor activities for its students. The staff wants
    to create a database of how parents can help. The secretary sets up the database
    table in [`Figure 1-7`](#9781430242093_Ch01.xhtml#F7) to keep the information.


    ![9781430242093_Fig01-07.tif](images/9781430242093_Fig01-07_fmt.jpeg)


    [`Figure 1-7.`](#9781430242093_Ch01.xhtml#FG7) Initial database table for recording
    parent contributions


    What problems can you foresee in making good use of this information?


    Suggest some better ways that this information could be stored.


    ### Exercise 1-2


    A small library keeps a roster of who will be at the desk each day. They have
    a database table as shown in [`Figure 1-8`](#9781430242093_Ch01.xhtml#F8).


    ![9781430242093_Fig01-08.tif](images/9781430242093_Fig01-08_fmt.jpeg)


    [`Figure 1-8.`](#9781430242093_Ch01.xhtml#FG8) An initial database table to record
    roster duties


    What problems can you foresee in making good use of this information?


    Suggest some better ways that this information could be stored.'
