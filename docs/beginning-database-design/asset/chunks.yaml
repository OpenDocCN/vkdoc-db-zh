  raw: '*   Define a class for each class.

    *   Consider creating classes for complex data types such as addresses or names.

    *   Consider adding methods to classes (e.g., for formatting addresses or performing
    calculations).

    *   Give thought to how a user will identify objects (the equivalent of a primary
    key).

    *   For the Many part of a relationship, include a collection that has references
    to several objects (e.g., a Customer will have a collection of many Order objects).

    *   For the 1 part of a relationship, include a reference to the particular object
    (e.g., an Order will have a reference to one Customer object).


    Spreadsheets


    Spreadsheets are a marvelous tool for data analysis and calculations. They are
    not really designed for storing data but are commonly used for this purpose, as
    they are often considered to be simpler and more immediately useful than databases.
    For small data models with simple relationships between the classes, it is possible
    to design a spreadsheet that is both useful and accurate.


    To represent very simple 1–Many relationships in a spreadsheet:


    *   Create a separate sheet for each class.

    *   Create a sheet where all the information will be brought together.

    *   Use exact match lookups to display information from other sheets.

    *   Use data validation features to provide the equivalent of referential integrity
    between sheets.


    There are several ways to represent Many–Many relationships in a spreadsheet:


    *   Repeated columns (good for validation and reporting, but not querying)

    *   Categories as columns (good for validation, reporting, and querying)

    *   Normalized ranges (good for validation and querying, but poor for reporting
    and ease of use)


    XML


    XML provides a way of expressing both the structure of data and the values of
    data elements in a text format. It is useful for platform–independent specification
    of data and for transferring the description and values of data between applications.


    *   A simple XML document is a tree of elements specified by tags.

    *   We can represent relationships by using the hierarchical nature of the XML
    tree. For example, students can be nested within courses or vice versa.

    *   A Many–Many relationship can also be represented by defining three complex
    XML elements, such as students, courses, and enrollments (similar to the tables
    used to represent a Many–Many relationship in a relational database).

    *   Document Type Definitions (DTD) and XML Schema Definitions (XSD) can be used
    to define the structure of the data.

    *   XPath and XQuery are two languages which enable the retrieval of specific
    elements from an XML document.


