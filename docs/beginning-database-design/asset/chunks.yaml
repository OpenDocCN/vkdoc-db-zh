- fmt: '# 面向对象设计：继承的适用性、误区与权衡


    ## 什么时候考虑继承（子类与超类）


    当你发现自己在思考诸如“但一个停车位可能关联给讲师*或者*学生”，或者“一次预订可能为个人*或者*公司”等等情况时，考虑使用一个超类来捕获共同行为。


    当你发现，“有些对象会有这个属性的值，但没有那个属性的值”，或者“只有部分类的对象会与那个类的对象存在关联”，你应该考虑创建一些子类来捕获这种专业行为。


    要检查继承（子类和超类）是否适用于某个特定问题，你应该问以下问题。例如，要检查[图6-8](#9781430242093_Ch06.xhtml#F8)中的`SubClassA`是否真的是`SuperClass`的子类，可以问：


    * `SubClassA`的对象是否总是`SuperClass`的一种？（总是/有时/从不）

    * `SuperClass`的对象是否总是`SubClassA`的一种？（总是/有时/从不）


    如果第一个问题的答案是“总是”，而第二个问题的答案是“有时”，那么这个问题就非常适合用继承模型来解决。例如，我们可以通过提问来检验[图6-3](#9781430242093_Ch06.xhtml#F3)的有效性：


    * 管理员是否总是员工的一种？（总是）

    * 员工是否总是管理员的一种？（有时）


    这些答案意味着将`Administrator`作为`Employee`的子类是可行的。


    提出“总是/有时/从不”的问题有助于理清复杂的问题描述。假设我们有一个复杂的员工层级结构，包括管理员、代理人、销售人员等等。这两个“总是/有时/从不”的问题可以帮助我们梳理清楚。假设我们发现：


    * 代理人总是销售人员，而销售人员总是代理人。


    我们知道，在这种情况下，“销售人员”和“代理人”是同一个事物的两种不同称呼。我们应该只有一个类，叫做`Salesperson`或者`Agent`。


    然而，假设我们发现：


    * 销售人员总是代理人，而代理人有时是销售人员。


    这里，我们就有充分的理由考虑将`Salesperson`类作为`Agent`的子类。


    ## 何时继承不是一个好主意


    数据模型中的继承并不像你最初想象的那么常见。人类非常擅长将事物分类到层级结构中，一旦人们掌握了数据建模中的继承概念，就可能会想在所有地方都使用它。在上一节中，我谨慎地说明，对“A是否是B的一种？”这个问题的肯定回答，只意味着使用继承*可能*是一种理清问题的可能方式。在本节中，我们将看几个例子，在这些例子中，继承绝对不是思考问题的好方法。


    ### 混淆对象与子类


    考虑一个不同品种的狗的数据库。我们可能有一个品种的层级结构，乍一看可能认为继承是一个可行的方案。考虑以下陈述：


    * 柯基犬是一种狗。

    * 罗孚是一只柯基犬。

    * 奎因是一只拉布拉多犬。

    * 拉布拉多犬是一种狗。


    虽然这四句话很相似，但它们并不都暗示子类。罗孚和奎因不是类；它们是某个狗类的*对象*。另一方面，柯基犬和拉布拉多犬可能是某个超类`Dog`的子类，但也许也不是。让我们考虑如何判断某物是对象还是类。为什么罗孚很可能是对象，而柯基犬可能是类？


    一个快速帮助判断某物是类还是对象的方法是提出这样的问题：“我是否可能拥有多个<某物>，并且我是否对它们作为一个群体感兴趣？”例如：


    * 我是否可能拥有多只柯基犬，并且我对它们作为一个群体感兴趣？很可能。因此柯基犬是一个潜在的类。

    * 我是否可能拥有多只罗孚，并且我对它们作为一个群体感兴趣？很可能有多只名叫罗孚的狗，但很难想象为什么仅仅因为它们有相同的名字，我们就会对它们作为一个群体感兴趣。


    柯基犬和拉布拉多犬是潜在的类，而奎因和罗孚更可能是我们某个狗类的对象。一个可能的层级结构以及一些符合前述陈述的对象如[图6-9](#9781430242093_Ch06.xhtml#F9)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-09_fmt.png)


    [**图 6-9.**](#9781430242093_Ch06.xhtml#FG9) 狗数据模型的一些可能的类、子类和对象


    ### 混淆关联与子类


    [图6-9](#9781430242093_Ch06.xhtml#F9)中的模型起初可能看起来不错，但实际上我们不需要继承来维护关于我们狗的不同品种的简单信息。到目前为止，我们并没有为拉布拉多犬保存任何与柯基犬或其他品种不同的信息。我们只是注意到我们的狗中有些是柯基犬，有些是拉布拉多犬，这可以通过在`Dog`对象与另一个名为`Breed`的类的对象之间建立简单的关联来实现，如[图6-10](#9781430242093_Ch06.xhtml#F10)所示（假设为纯种狗）。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-10_fmt.png)


    [**图 6-10.**](#9781430242093_Ch06.xhtml#FG10) 每个`Dog`对象都关联到一个品种。


    [图6-10](#9781430242093_Ch06.xhtml#F10)中的模型比[图6-9](#9781430242093_Ch06.xhtml#F9)中的模型简单得多。由此产生的数据库也将更容易维护。在[图6-9](#9781430242093_Ch06.xhtml#F9)中，如果我们添加一个新品种，就需要添加一个新的*子类*。而对于[图6-10](#9781430242093_Ch06.xhtml#F10)的模型，我们只需要再添加一个`Breed`类的*对象*。


    如果问题变成我们想保留支付给养犬俱乐部的费用，并且这些费用因品种而异（例如，拉布拉多犬花费100美元，柯基犬80美元，梗犬85美元）呢？现在我们有了一些关于品种的不同信息，是否应该重新考虑专门的类？


    不。我们这里有的只是一个属性`fee`的不同*值*，这可以很容易地在`Breed`类中容纳。只有当我们拥有不同的属性或关系（而不仅仅是属性值不同）时，才需要考虑专门的类。


    ## 何时值得考虑继承


    我们已经看到，看起来像继承的东西通常可以通过简单的关系更简单（且有效地）表示。在什么情况下值得考虑继承呢？让我们为我们的狗模型设想另一个场景。


    假设镇议会保留了一份狗的登记册。其中一些只是普通的家庭宠物，而另一些可能是与养犬俱乐部有关联的参展犬。如果（一个很大的如果）议会想要保留这些信息，那么像[图6-11](#9781430242093_Ch06.xhtml#F11)这样的模型可能值得考虑。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-11_fmt.jpeg)


    [**图 6-11.**](#9781430242093_Ch06.xhtml#FG11) 使用继承展示不同行为的可能模型


    在[图6-11](#9781430242093_Ch06.xhtml#F11)中，我们看到参展犬不仅拥有额外的属性（例如，`id_number`可能用于指向其谱系记录），而且拥有不同的关联（即，参展犬会在养犬俱乐部注册，而普通宠物不会）。


    我们还能如何建模呢？嗯，我们可以给所有狗一个`id_number`属性（对于普通宠物可以留空），并让所有狗都与俱乐部有一个可选的关系，如[图6-12](#9781430242093_Ch06.xhtml#F12)所示。你能看出这个模型有什么缺点吗？


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-12_fmt.jpeg)


    [**图 6-12.**](#9781430242093_Ch06.xhtml#FG12) 不使用继承的可能模型'
  raw: 'Whenever you find yourself thinking things like, “But a parking space could
    be associated with a lecturer OR a student,” or, “A booking could be for an individual
    OR a company,” and so on, consider a superclass to capture the common behavior.


    When you find yourself thinking, “Some objects will have a value for this attribute
    but not that one,” or, “Only some objects of this class will have a relationship
    with an object of that class,” you should consider creating some subclasses to
    capture that specialist behavior.


    To check whether inheritance (subclasses and superclasses) is applicable to a
    given problem, you should ask the following questions. For example, to check whether
    **SubClassA** is really a subclass of **SuperClass** in [Figure 6-8](#9781430242093_Ch06.xhtml#F8),
    ask:


    *Is an object of **SubClassA** a type of **SuperClass**? (always/sometimes/never)*

    *Is an object of **SuperClass** a type of **SubClassA**? (always/sometimes/never)*


    If the answer to the first question is “always” and the answer to the second is
    “sometimes,” the problem is a good candidate for an inheritance model. For example,
    we can check the validity of [Figure 6-3](#9781430242093_Ch06.xhtml#F3) by asking:


    *Is an administrator a type of employee? (always)*

    *Is an employee a type of administrator? (sometimes)*


    These answers mean that making **Administrator** a subclass of **Employee** is
    possible.


    Asking the always/sometimes/never questions can help make sense of complicated
    problem descriptions. Say we have a complex employee hierarchy with administrators,
    agents, salespeople, and so on. Those two always/sometimes/never questions can
    sort things out. Let’s say we discover that:


    *An agent is always a salesperson, and a salesperson is always an agent.*


    We know that for this particular situation “salesperson” and “agent” are two different
    words for the same thing. We should have one class called either **Salesperson**
    or **Agent**.


    However, say we have that:


    *A salesperson is always an agent, and an agent is sometimes a salesperson.*


    Here we have good grounds for considering a **Salesperson** class as a subclass
    of **Agent**.


    When Inheritance Is Not a Good Idea


    Inheritance in a data model is not as common as you might think at first. Humans
    are very good at categorizing things into hierarchies, and once people get a hold
    of the idea of inheritance in data modeling, there can be a temptation to use
    it everywhere. In the last section, I was careful to say that an affirmative answer
    to the question “Is A a type of B?” only meant that using inheritance *might*
    be a possible way of making sense of a problem. In this section, we will look
    at a couple of examples where inheritance is definitely not a good way to think
    about a problem.


    Confusing Objects with Subclasses


    Consider a database of dogs of different breeds. We may have a hierarchy of breeds
    and might at first sight think that inheritance is a possibility. Consider the
    following statements:


    *   A Corgi is a dog.

    *   Rover is a Corgi.

    *   Quin is a Labrador.

    *   A Labrador is a dog.


    While the four statements are similar, they do not all suggest subclasses. Rover
    and Quin are not classes; they are *objects* of some class of dog. Corgi and Labrador,
    on the other hand, could possibly be subclasses of some super Dog class, but then
    again maybe not. Let’s consider how we know whether something is an object or
    a class. Why is Rover probably an object and Corgi possibly a class?


    A quick way to help decide whether something is a class or an object is to ask
    a question such as, “Am I likely to have several of <whatever> and am I interested
    in them as a group?” For example:


    *Am I likely to have several Corgis and am I interested in them as a group?* Probably.
    Therefore Corgi is a potential class.

    *Might I have several Rovers and am I interested in them as a group? There might
    well be several dogs called Rover, but it is hard to think of why we would be
    interested in them as a group just because of their common name.*


    Corgis and Labradors are potential classes, whereas Quin and Rover are more likely
    to be objects of one of our dog classes. A possible hierarchy and some objects
    that are consistent with the preceding statements are shown in [Figure 6-9](#9781430242093_Ch06.xhtml#F9).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-09_fmt.png)


    [**Figure 6-9.**](#9781430242093_Ch06.xhtml#FG9) Some possible classes, subclasses,
    and objects of a dog data model


    Confusing an Association with a Subclass


    The model in [Figure 6-9](#9781430242093_Ch06.xhtml#F9) may look fine for a start,
    but in fact we don’t need inheritance to maintain simple information about the
    different breeds of our dogs. We are not keeping any different information about
    Labradors than we are about Corgis or any other breed (so far). We are merely
    noting that some of our dogs are Corgis and some are Labradors, and this can be
    done with a simple association between our **Dog** objects and objects of another
    class called **Breed** as shown in [Figure 6-10](#9781430242093_Ch06.xhtml#F10)
    (assuming pure–bred dogs for now).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-10_fmt.png)


    [**Figure 6-10.**](#9781430242093_Ch06.xhtml#FG10) Each Dog object is associated
    with a breed.


    The model in [Figure 6-10](#9781430242093_Ch06.xhtml#F10) is a much simpler way
    of representing our problem than the model in [Figure 6-9](#9781430242093_Ch06.xhtml#F9).
    The resulting database will be much easier to maintain also. In [Figure 6-9](#9781430242093_Ch06.xhtml#F9),
    if we add a new breed, we need to add a new *subclass*. For the model in [Figure
    6-10](#9781430242093_Ch06.xhtml#F10), we just need to add another *object* of
    our **Breed** class.


    What if the problem changed to say that we want to keep the fees payable to the
    kennel club and that these are different for the different breeds (e.g., a Labrador
    will cost $100, a Corgi $80, and a Terrier $85)? Now that we have some different
    information about the breeds, should we reconsider specialized classes?


    No. What we have here are just different *values* for an attribute, **fee**, which
    can easily be accommodated in the **Breed** class. We only need to consider specialized
    classes if we have different attributes or relationships (not just different values
    for an attribute).


    When Is Inheritance Worth Considering?


    We have seen that what looks like inheritance can often be represented more simply
    (and effectively) by simple relationships. At what point is it worth considering
    inheritance? Let’s think of another scenario for our dog model.


    Let’s say the town council keeps a register of dogs. Some of these dogs are just
    your plain old family pet, while others might be show dogs with affiliations to
    kennel clubs. If (big if) the council wanted to keep this information, a model
    such as the one in [Figure 6-11](#9781430242093_Ch06.xhtml#F11) might be worth
    considering.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-11_fmt.jpeg)


    [**Figure 6-11.**](#9781430242093_Ch06.xhtml#FG11) Possible model using inheritance
    to show different behavior


    In [Figure 6-11](#9781430242093_Ch06.xhtml#F11), we see that show dogs have not
    only additional attributes (e.g., an **id_number** to perhaps point to records
    of their genealogy), but also different associations (i.e., a show dog will be
    registered with a kennel club whereas an ordinary pet will not).


    How else could we have modeled this? Well, we could have given all dogs an **id_number**
    attribute (that could be left unspecified for ordinary pets) and let all dogs
    have an optional relationship with a club as shown in [Figure 6-12](#9781430242093_Ch06.xhtml#F12).
    Can you see any drawbacks to this model?


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-12_fmt.jpeg)


    [**Figure 6-12.**](#9781430242093_Ch06.xhtml#FG12) Possible model without using
    inheritance'
