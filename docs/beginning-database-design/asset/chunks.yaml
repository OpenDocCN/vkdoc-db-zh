    `Person`（`ID`）、`Title`（`cat_num`）和 `Category`（`name`）表的主键很容易确定，但 `Item` 表没有一个明显的主键候选。每个书目都会有一个
    `copy_num = 1` 的副本，并且它们可能是在同一天购买的。因此，没有任何字段或字段组合是合适的。我们可以添加一个唯一标识符，但我们将稍作等待，看看后续情况。


