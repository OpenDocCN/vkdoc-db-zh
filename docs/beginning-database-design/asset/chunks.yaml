  trans: '# 数据库规范化


    回想一下我们对主键的新定义，让我们重新审视图 8-6 中两个表的`主键`。`plantID`在每行都不同的意义上，是两个表的主键。它是否在函数上决定了所有其他属性？如果我知道`plantID`的值（例如，`plantID
    = 1`），我能否告诉你一个唯一的用途？嗯，在上面的表中，我可以告诉你`uses`字段中的字符串，而在第二个表中，我可以告诉你三个列中任何一个特定列的内容，所以从一个非常正式的角度来看，是的，我可以。然而，如果我们考虑这些字段背后的含义，仅通过知道植物的
    ID，我无法给你提供关于一个独特用途的信息。我只能告诉你每种植物的一系列用途。


    这两个表不符合第一范式（从技术意义上讲）。它们都在以一种迂回的方式试图保存多个用途值。


    > `如果一个表为一条信息保存了多个值，那么该表就不符合第一范式。`


    规范化给了我们一种正式的方法来确定图 8-6 中表的设计存在问题。它还为我们提供了一种解决问题的方法。


    > `如果一个表不符合第一范式，请从表中移除多值信息。用该信息和原始表的主键创建一个新表。`


    对于我们这个植物数据库的例子，这意味着像图 8-7 那样设置两个表。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig08-07_fmt.png)


    **图 8-7.** 从未规范化的表中移除多值字段以创建额外的表


    当我们通过数据模型考虑这个问题时，我们决定实际上有两个类，`Plant`和`Use`，它们之间存在多对多关系。在第 7 章中，你看到要表示一个多对多关系，我们需要添加一个中间表。如果你回头看看图
    7-17 到 7-19，你会发现新表与图 8-7 中的`PlantUse`表相同。我们通过两条不同的路径得到了相同的规范化解决方案。正如例 1-1 所讨论的，像图
    8-7 这样的规范化表避免了与图 8-6 中原始未规范化表相关的许多问题。


    ## 第二范式


    一个符合第一范式的表仍然可能存在更新问题。本章开头我们讨论过的图 8-8 中的`Assignment`表就是一个例子。其中关于项目名称和联系人的信息被重复了多次，结果可能导致信息最终变得不一致。我们还看到，插入新记录可能会出现问题，而删除某些记录可能会导致信息丢失。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig08-08_fmt.jpeg)


    **图 8-8.** 存在更新异常的 Assignment 表


    第一和第二范式的定义都要求我们知道我们正在评估的表的主键。`Assignment`表的主键是`empID`和`proj_num`字段的组合。这个表符合第一范式吗？如果我告诉你一个员工
    ID 和一个项目编号（例如，`1005`和`1`），你能告诉我所有其他非键字段的唯一值吗？是的。项目名称是`Jennings Ltd`，联系人是`325-1234`，工时是`8`。这个表中没有多值字段。我们没有在任何地方试图将多个信息位挤入一个字段。但更新异常的问题仍然存在。


    这里的问题是，虽然我可以通过知道主键来找出所有非键字段的值，但我实际上并不需要主键的两个字段都能做到这一点。如果我想知道工时数，我需要知道`empID`和`proj_num`的值。但是，如果我想知道联系电话或项目名称，我只需要知道`proj_num`的值。问题就出在这里，它引出了我们对第二范式的定义。


    > `如果一个表符合第一范式，并且我们需要键中的所有字段来确定非键字段的值，那么该表就符合第二范式。`


    我们也有办法修正一个不符合第二范式的表。


    > `如果一个表不符合第二范式，请移除那些不依赖于整个主键的非键字段。用这些字段和它们所依赖的那部分主键创建另一个表。`


    这意味着我们将非键字段`proj_name`和`contact`从`Assignment`表中移除，并将它们与`proj_num`（它们所依赖的那部分键）一起放入一个新表中。这种拆分未规范化表的过程通常被称为*分解*。因此，我们可以说原始的`Assignment`表被分解成了两个符合第二范式的表，如图
    8-9 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig08-09_fmt.png)


    **图 8-9.** Assignment 表分解为两个表


    如果我们从数据建模的角度来处理这个问题，我们会说有两个类，`Employee`和`Project`，它们之间存在如图 8-3b 所示的多对多关系。正如第 7
    章所讨论的，要表示这种关系，我们需要添加一个中间表，这样我们就会得到完全相同的表（外加一个`Employee`表），如图 8-9 所示。


    我们再次通过两条路径得到了相同的解决方案：思考类及其关系，或者考虑函数依赖和规范化。


    ## 第三范式


    你猜对了。符合第二范式的表仍然可能给我们带来问题。这次，考虑一下我们的`Employee`表，其中添加了一些关于员工所在部门的信息。看看图 8-10 中的表。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig08-10_fmt.jpeg)


    **图 8-10.** 存在更新问题的 Employee 表


    图 8-10 中`Employee`表的主键是什么？如果一个员工只在一个部门工作，那么仅知道`empID`就足以找到特定的行。这个表符合第一范式吗？是的。如果我知道`empID`的值（例如，`1029`），我可以告诉你其他每个字段的唯一值。这个表符合第二范式吗？是的，现在主键只是一个字段，所以没有什么可以依赖于“部分”键。还有问题吗？是的。部门名称的信息在几行上重复，很可能变得不一致。


    这个表的情况是，部门名称由不止一个字段决定。如果我知道主键字段`empID`的值是`1001`，我可以告诉你部门名称是`Marketing`。然而，如果我知道`dept_num`的值是`2`，我也可以告诉你部门名称是`Marketing`。有两个不同的字段决定了部门名称的值。这就是这次问题出现的地方，并引出了第三范式的定义。


    > `如果一个表符合第二范式，并且没有非键字段依赖于非主键的字段，那么该表就符合第三范式。`


    与其他范式一样，我们也有一个简单的方法来修正不符合第三范式的表。'
- fmt: '*If a table is not in third normal form, remove the non–key fields that are
    dependent on a field(s) that is not the primary key. Create another table with
    this field(s) and the field on which it does depend.*


    For the Employee table in [Figure 8-10](#9781430242093_Ch08.xhtml#F10), this would
    mean removing the field `dept_name` from the original `Employee` table and putting
    it in a new table along with the field on which it depends (`dept_num`),v as shown
    in [Figure 8-11](#9781430242093_Ch08.xhtml#F11). The field `dept_num` will be
    the primary key of our new table and will also remain in the `Employee` table
    as a foreign key.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-11_fmt.png)


    [**Figure 8-11.**](#9781430242093_Ch08.xhtml#FG11) Employee table decomposed to
    two tables


    ## Boyce–Codd Normal Form


    This is the last normal form that involves functional dependencies. For most tables,
    it is equivalent to third normal form, but it is a slightly stronger statement
    for some tables where there is more than one possible combination of fields that
    could be used as a primary key. We are not going to consider those here. However,
    Boyce–Codd normal form is quite an elegant statement that encapsulates the first
    three normal forms.


    *A table is in Boyce–Codd normal form if every determinant could be a primary
    key.*


    Let’s see how this works. Say I know that the value of a particular field (e.g.,
    `proj_num`) determines the value of another field (e.g., `proj_name`). We say
    that `proj_num` is a *determinant* (it determines the value of something else).
    In any table where this is the case, then `proj_num` must be able to be the primary
    key.


    Consider the `Assignment` table in [Figure 8-8](#9781430242093_Ch08.xhtml#F8).
    `proj_num` determines `proj_name`, but `proj_num` is not able to be a primary
    key (there can be several rows with the same value of `proj_num`). In this case,
    Boyce–Codd normal form is a more general statement of second normal form—`proj_num`
    is a determinant, but it is not the whole key. In the `Employee` table in [Figure
    8-10](#9781430242093_Ch08.xhtml#F10), `dept_num` is a determinant, but it cannot
    be a primary key because it is not different in every row. In this case, Boyce–Codd
    normal form is a statement that includes third normal form.


    One of the sweetest ways to sum up the normal forms we have discussed is from
    Bill Kent.[²](#9781430242093_Ch08.xhtml#fn2) He summarizes the normal forms this
    way:


    > *A table is based on*

    > *the key,*

    > *the whole key,*

    > *and nothing but the key (so help me Codd)*


    Just remembering this simple quotation can help you ensure all your tables are
    normalized to third normal form.


    ## Data Models or Functional Dependencies?


    In our discussions of the normal forms, based on functional dependencies, you
    have seen that in most of the examples we have arrived at the same set of tables
    as we did, in previous chapters, by considering classes and their relationships.
    What are the differences between the two approaches? In general, how should we
    go about our database design?


    Essentially, we have two tools at our dipsosal, and we should use either or both
    when we find them helpful. This will depend on particular people and the particular
    problem we are trying to model. Whichever tool we use, the most essential thing
    is to understand the scope of the problem and the intricacies of the relationships
    between pieces of data. A detailed understanding requires us to ask very specific
    questions about the project. We can represent the answers with either part of
    a data model or by writing down a functional dependency. Sometimes one way just
    feels more natural than the other. Let’s look at some examples.


    For a particular problem, I may know I am going to require data about employees
    and projects, and I need to know more about the relationships between them.


    From a data modeling perspective, I might ask, “Can an employee be associated
    with more than one project?”


    I can use the answer to decide whether the relationship between the employee class
    and project class is 1–Many or Many–Many. To me, this feels like a natural way
    to think about and discuss the issue. From a functional dependency perspective,
    I would ask something like, “If I know the employee’s ID number, can I know a
    unique project with which she is associated?”


    If the answer is “Yes,” I would represent this as the functional dependency


    ```

    empID → project

    ```


    To me, this latter way of describing this aspect of the problem doesn’t feel natural.
    Other people might think quite differently. The two questions and the two ways
    of representing them (class diagram or functional dependency) contain pretty much
    the same information about the relationship between employees and projects.


    Let’s try another example. What about the relationship between salary and tax
    rate? From a functional dependency perspective, I would ask, “If I know the salary,
    can I uniquely determine the tax rate?”


    To me, that feels like a good way to think about this aspect of the problem. If
    the answer is “Yes,” I can represent it as the functional dependency


    ```

    salary → tax_rate

    ```


    From a data–modeling perspective, I’m not sure what question I would ask. I probably
    don’t have a salary class or a tax rate class, so thinking about relationships
    between classes is not such a natural way to come to terms with this intricacy.


    What would happen if we tried to do our whole database design in terms of functional
    dependencies and normalization? We could start out with one huge table with a
    field to hold every piece of information. This is sometimes referred to as the
    *universal relation*. We could make a list of all the functional dependencies
    that apply between all the different fields and then apply our normalization rules
    to gradually decompose our big table into a set of normalized tables. There are
    in fact algorithms that allow you to do exactly that automatically. However, putting
    all the rules about our database in terms of functional dependencies and treating
    all the pieces of information as independent fields of one big table is rarely
    a practical way to start.


    When we first start thinking about a problem, it is natural to think in quite
    general terms. For example, we might know we have to keep data about people, and
    information about projects, and we mustn’t forget the buildings. We might not
    have a clear idea at the start what data we want to keep about each of these things,
    so trying to capture this original information with functional dependencies is
    not going to be helpful. However, the very basic ideas about the project fall
    quite naturally into classes. A data model or class diagram will show us that
    we need classes for buildings, projects, and people, and will allow us to start
    thinking about the relationships. Do people work in a particular building? Do
    people work on more than one project? Do people have other relationships with
    projects (e.g., might they manage them as well as work on them)? Do people manage
    each other?


    All these broad initial ideas about a project are easily captured by the data
    model. The data model also helps us to find out more detailed information as we
    question the cardinalities and optionalities of the relationships, or look for
    fan traps, or check to see whether some relationships are redundant.'
