    程序的设计是一个巨大的主题，因此在此我仅概述一些捕获数据模型基本要素的主要技术。


    ### 类与对象


    与关系数据库不同，OO 编程语言直接支持类和对象的概念。类是对象将如何构造的定义或模板。例如，一个 `Customer` 类将指定每个 `Customer`
    对象将具有的属性（例如，名称、地址等）。每个 `Customer` 对象将根据类的定义创建，并将拥有其各自属性的值。类只是一个抽象概念，但对象本身是独立的实体。相比之下，在关系数据库中，我们从表的角度思考。我们构造一个表来表示每个类，而对象由行表示。我们对表执行连接和联合等操作，而不是对行。关系数据库中的操作严格基于表，而在
    OO 环境中，重点是对象（因此称为“面向对象”）。


    当我们考虑继承时，OO 语言和关系数据库之间的差异尤其明显。在第 6 章中，我们看到了特化和泛化的概念如何帮助我们建模那些有许多共同点的类所在的特定情况。在图
    12-1 中，我们有一个数据模型，它捕获了学生和讲师在父类 `Person` 中的相似之处。


    ![9781430242093_Fig12-01.tif](img/9781430242093_Fig12-01_fmt.jpeg)


    图 12-1. 具有继承关系的数据模型


    图 12-2 展示了我们如何尝试在关系数据库中使用表来捕获此数据模型的主要特征。


    ![9781430242093_Fig12-02.tif](img/9781430242093_Fig12-02_fmt.jpeg)


    图 12-2. 用 1-1 关系表示的继承


    图 12-2 中的表示需要三个表。每个学生将由两行表示：一行在 `Person` 表中，另一行在 `Student` 表中。如果我们想要某个特定学生的所有信息，我们需要连接
    `Student` 和 `Person` 表以检索学位和姓名。在 OO 环境中，如果我们创建一个 `Student` 或 `Lecturer` 类的对象，该对象将包含嵌入其中的所有相关属性。我们不需要查找任何其他对象或引用任何其他类来检索所需信息。这描绘在图
    12-3 中。


    ![9781430242093_Fig12-03.eps](img/9781430242093_Fig12-03_fmt.png)


    图 12-3. OO 环境中的学生和讲师对象


    在 OO 环境中，每个对象都是一个独立的实体，拥有自己唯一的对象标识符。因为每个对象都有自己的标识，所以不要求其属性值是唯一的。换句话说，从实现的角度来看，不需要提供我们在关系数据库中需要的等效主键。例如，图
    12-4 中的两个对象都可以通过其唯一的 `OID` 被系统识别，尽管它们的属性值是相同的。然而，`OID` 不一定可用，对用户也没有意义。程序可以区分对象，但用户能区分吗？


    ![9781430242093_Fig12-04.eps](img/9781430242093_Fig12-04_fmt.png)


    图 12-4. 两个不同的对象；但用户能区分它们吗？


    现实中会有一些信息可以区分两个不同的学生（例如，地址或出生日期）。虽然不是必须的，但像学号这样的唯一标识符对于帮助用户引用特定的人可能仍然有用。引用学生 128675
    比引用住在 Beckenham 的 Jane Smith 更容易。


    ### 复杂类型与方法

    '
- fmt: '## 使用复杂属性类型


    在大多数关系型系统中，我们通常使用简单类型（例如，数字、文本、日期等）的属性。在面向对象的环境中，我们可以拥有更复杂的属性。


    考虑地址和名称的问题。在[第 7 章](#9781430242093_Ch07.xhtml)中，我们认为单一的地址字段是不够的，因此我们引入了诸如`street`、`city`、`post_code`和`country`等独立字段。我们对名称做了类似的事情，引入了`title`、`first_name`、`last_name`、`initials`等字段。这样使得按国家或姓氏有效地搜索或排序行，以及在报告中正确格式化地址成为可能。在关系型数据库中，这些字段都是独立的；如果不创建一个新表，就没有简单的方法来说明*这些字段应该以某种方式保持在一起，因为它们共同构成了一个地址*。创建一个新表来保存地址属性并不会真正带来太多好处，因为每次我们需要获取某人及其地址的所有信息时，都需要创建连接。对于额外的开销来说，这几乎没有实现什么。


    在面向对象的环境中，我们可以定义一个`Address`类，它有自己的属性（`street`、`city`、`country`、`postcode`），然后在`Customer`类中，我们可以有一个属性`address`，它引用一个`Address`对象。[图
    12-5](#9781430242093_Ch12.xhtml#F5) 说明了地址和名称的这个想法。


    ![9781430242093_Fig12-05.eps](images/9781430242093_Fig12-05_fmt.png)


    [**图 12-5.**](#9781430242093_Ch12.xhtml#FG5) 一个`Person`对象可以引用一个`Address`对象和一个`Name`对象。


    在`Person`类中，我们有三个属性：`name`和`address`（它们是对我们的新`Name`和`Address`类的对象的引用），以及`birth_date`（这是一个简单的日期类型）。拥有这些新类的主要优点之一是我们能够声明可以在属性上执行的方法或指令集。让我们看一个`Name`类的简单例子。在[图
    12-6](#9781430242093_Ch12.xhtml#F6)中，我们有一个和之前类似的类图，但现在底部的矩形中有一些方法。


    ![9781430242093_Fig12-06.eps](images/9781430242093_Fig12-06_fmt.jpeg)


    [**图 12-6.**](#9781430242093_Ch12.xhtml#FG6) 包含两个方法的`Name`类


    方法`formal_name()`可能会指示程序打印出`title`、`initials`和`last_name`（例如，Mr. J. A. Wilson），而`full_name()`可能会打印出`first_name`、`last_name`（例如，John
    Wilson）。在关系型数据库中，这些类型的指令将与特定的报告或表单保存在一起。每次我们需要一个新报告时，都必须重新发出这些指令。在面向对象环境中，这些指令与数据保存在一起。无论我们在哪里使用`Name`对象，我们只需要请求`full_name`，这些指令就是可用的。


    ## 对象集合


    面向对象环境具有对象的*集合*（或集合或列表）的概念。就像`Student`表是管理关系型数据库中所有行的方式一样，在面向对象环境中，我们可以建立许多不同的对象集合。每个特定类的对象可能都有一个内置集合（例如，所有`Student`对象），但我们也创建自己的集合。我们可能有名为`AllStudents`、`CurrentStudents`、`Lecturers`、`People`等的集合。每个集合都将包含一组对单个对象的引用。[图
    12-7](#9781430242093_Ch12.xhtml#F7) 显示了如何可视化集合和对象。特定对象可能被多个集合引用（例如，一个`Lecturer`对象可能被`People`集合引用，也被`Lecturers`集合引用）。


    ![9781430242093_Fig12-07.eps](images/9781430242093_Fig12-07_fmt.png)


    [**图 12-7.**](#9781430242093_Ch12.xhtml#FG7) 引用对象的集合


    集合对于表示对象之间的关系非常重要，正如你将在下一节中看到的。集合还可以用于帮助确保对象具有唯一值的某些属性，以便用户能够区分它们。在面向对象环境中没有像主键这样的概念，但我们可以使用集合来强制实施类似的唯一性约束。通常，有不同类型的集合可供选择。一种有用的集合类型是可以在特定属性或属性组合上进行键控的集合。例如，一个在`studentID`上键控的集合`AllStudents`，其设置方式将非常高效，可以在给定ID号时定位特定对象。在`last_name`上键控的集合将能够高效地基于姓名查找特定对象。在键控集合中查找特定对象与在具有索引的表中查找行非常相似。与关系模型一样，我们可以指定特定的键控集合可能只具有键的唯一值。如果我们有一个在`studentID`上唯一键控的集合`AllStudents`，并且我们确保所有`Student`对象都添加到这个集合中，我们就有效地强制实施了约束：没有两个`Student`对象具有相同的`studentID`值。这确保了我们所有的对象都有一个（或一组）让用户可识别的属性。


    ## 表示关系


    对对象和对象集合的引用可用于表示数据模型中的关系。考虑[图 12-8](#9781430242093_Ch12.xhtml#F8)中的模型，其中客户可以有多个订单，而每个订单恰好对应一个客户。


    ![9781430242093_Fig12-08.tif](images/9781430242093_Fig12-08_fmt.jpeg)


    [**图 12-8.**](#9781430242093_Ch12.xhtml#FG8) 客户与订单之间关系的数据模型


    我们将有两个类，`Customer`和`Order`。每个客户将有自己的对象，每个订单也将有自己的对象。那么这两个对象之间的关系呢？让我们看看关系的“1”端。每个订单有一个关联的`Customer`对象。因为我们可以将复杂类型作为类中的属性，所以每个`Order`中可以有一个属性，它是对相应`Customer`对象的引用。[图
    12-9](#9781430242093_Ch12.xhtml#F9) 说明了这一点。


    ![9781430242093_Fig12-09.eps](images/9781430242093_Fig12-09_fmt.png)


    [**图 12-9.**](#9781430242093_Ch12.xhtml#FG9) 每个`Order`对象包含一个对`Customer`对象的引用。


    `Order`对象中的这个引用与关系模型中的外键概念并非完全不同；不同之处在于，外键的引用指向表，应用程序必须找到关联的行。在面向对象环境中，引用直接指向相关的`Customer`对象。


    现在让我们考虑关系的“多”端。每个`Customer`对象有多个`Order`对象，我们也可以直接建立这种关联。我们可以在`Customer`类中包含一个`Order`引用的集合作为属性，如[图
    12-10](#9781430242093_Ch12.xhtml#F10)所示。


    ![9781430242093_Fig12-10.eps](images/9781430242093_Fig12-10_fmt.png)


    [**图 12-10.**](#9781430242093_Ch12.xhtml#FG10) 一个`Customer`对象有一个对其关联`Order`对象的引用集合。'
  raw: 'In most relational systems, we generally use attributes of a simple type (e.g.,
    number, text, date, etc.). In an object–oriented environment, we can have more
    complex attributes.


    Consider the issue of addresses and names. In [Chapter 7](#9781430242093_Ch07.xhtml),
    we argued that a single address field was inadequate, and we introduced individual
    fields such as street, city, post_code, and country. We did a similar thing for
    names by introducing fields such as title, first_name, last_name, initials, and
    so on. This made it possible to effectively search or sort the rows by country
    or last name, and to format addresses properly in reports. In a relational database,
    these fields are all independent; without creating a new table, there is no simple
    way to say *these fields should all be kept together in some way because they
    form an address*. Creating a new table to hold the address attributes would not
    really achieve much, as we would need to create joins each time we needed all
    the information about a person and his address. Little is really achieved for
    that extra overhead.


    In an object–oriented environment, we can define a class, Address, with its own
    attributes (street, city, country, postcode) and then in a Customer class we can
    have an attribute, address, which refers to an Address object. [Figure 12-5](#9781430242093_Ch12.xhtml#F5)
    illustrates this idea for addresses and names.


    ![9781430242093_Fig12-05.eps](images/9781430242093_Fig12-05_fmt.png)


    [**Figure 12-5.**](#9781430242093_Ch12.xhtml#FG5) A Person object can refer to
    an Address object and a Name object.


    In the Person class, we have three attributes: name and address, which are references
    to objects of our new Name and Address classes, and birth_date which is a simple
    date type. One of the main advantages of having these new classes is that we are
    able to declare methods or sets of instructions that can be carried out on the
    attributes. Let ’s look at a simple example for the Name class. In [Figure 12-6](#9781430242093_Ch12.xhtml#F6),
    we have a class diagram as before, but now we have some methods in the bottom
    rectangle.


    ![9781430242093_Fig12-06.eps](images/9781430242093_Fig12-06_fmt.jpeg)


    [**Figure 12-6.**](#9781430242093_Ch12.xhtml#FG6) The Name class with two methods


    The method formal_name() might instruct the program to print out title, initials,
    and last_name (e.g., Mr. J. A. Wilson), while full_name() might print out first_name,
    last_name (e.g., John Wilson). In a relational database, these types of instruction
    would be kept with particular reports or forms. Every time we needed a new report,
    we would have to reissue the instructions. In an OO environment, these instructions
    are kept with the data. Everywhere we use a Name object, we just need to ask for
    full_name, and the instructions are available.


    Collections of Objects


    OO environments have the concept of *collections* (or sets or lists) of objects.
    In much the same way that a Student table is a way of managing all the rows in
    a relational database, in an OO environment we can set up many different collections
    of objects. There is probably a built–in collection for every object in a particular
    class (all Student objects, for example), but we can also create our own collections.
    We might have collections called AllStudents, CurrentStudents, Lecturers, People,
    and so on. Each of these collections will contain a set of references to individual
    objects. [Figure 12-7](#9781430242093_Ch12.xhtml#F7) shows how you can visualize
    collections and objects. Particular objects may be referred to by more than one
    collection (e.g., a Lecturer object might be referred to by the People collection
    and also by the Lecturers collection).


    ![9781430242093_Fig12-07.eps](images/9781430242093_Fig12-07_fmt.png)


    [**Figure 12-7.**](#9781430242093_Ch12.xhtml#FG7) Collections referring to objects


    Collections are important for representing relationships between objects, as you
    will see in the following section. Collections can also be used to help ensure
    that objects have some attribute(s) that have unique values so that they can be
    distinguished by the user. There is no such concept as a primary key in an OO
    environment, but we can use collections to enforce a similar uniqueness constraint.
    Typically, there will be different types of collections from which we can choose.
    A useful type of collection is one that can be keyed on a particular attribute
    or combination of attributes. A collection, say AllStudents, keyed on studentID,
    will be set up in such a way as to be very efficient at locating a particular
    object when given an ID number. A collection keyed on last_name will be efficient
    at finding a particular object based on a name. Finding particular objects in
    a keyed collection is very similar to finding rows in a table that has an index
    on it. As in the relational model, we can specify that a particular keyed collection
    may only have unique values of the key. If we have a collection, AllStudents,
    uniquely keyed on studentID, and we ensure that all our Student objects are added
    to this collection, we have effectively enforced the constraint that no two Student
    objects have the same value for studentID. This ensures that all our objects have
    an attribute (or set of attributes) that make them identifiable to the user.


    Representing Relationships


    References to objects and collections of objects can be used to represent the
    relationships in a data model. Consider the model in [Figure 12-8](#9781430242093_Ch12.xhtml#F8),
    in which a customer can have many orders and each order is for exactly one customer.


    ![9781430242093_Fig12-08.tif](images/9781430242093_Fig12-08_fmt.jpeg)


    [**Figure 12-8.**](#9781430242093_Ch12.xhtml#FG8) Data model for a relationship
    between customer and orders


    We will have two classes, Customer and Order. Each customer will have its own
    object, and each order will have its own object. What about the relationship between
    these two objects? Let ’s look at the 1 end of the relationship. Every order has
    one associated Customer object. Because we are able to have complex types as attributes
    in a class, we can have an attribute in each Order, which is a reference to the
    appropriate Customer object. This is illustrated in [Figure 12-9](#9781430242093_Ch12.xhtml#F9).


    ![9781430242093_Fig12-09.eps](images/9781430242093_Fig12-09_fmt.png)


    [**Figure 12-9.**](#9781430242093_Ch12.xhtml#FG9) Each Order object contains a
    reference to a Customer object.


    This reference in the Order object is not so unlike the idea of a foreign key
    in the relational model; it is different in the sense that with a foreign key
    the reference is to the table, and the application will have to find the associated
    row. In the OO environment, the reference is directly to the relevant Customer
    object.


    Now let ’s think about the Many end of the relationship. Each Customer object
    has many Order objects, and we can set up this association directly also. We can
    include a collection of Order references as an attribute in the Customer class
    as shown in [Figure 12-10](#9781430242093_Ch12.xhtml#F10).


    ![9781430242093_Fig12-10.eps](images/9781430242093_Fig12-10_fmt.png)


    [**Figure 12-10.**](#9781430242093_Ch12.xhtml#FG10) A Customer object has a collection
    of references to its associated Order objects.'
