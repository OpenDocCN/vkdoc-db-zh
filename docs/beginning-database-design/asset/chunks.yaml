- fmt: '`Farm(farmID, farm_name, address, owner)`

    `Paddock(paddock_num, area)`


    To represent the relationship between `Farm` and `Paddock`, we include the primary
    key from the `Farm` table as a foreign key field in the `Paddock` table: `Paddock(paddock_num,
    area, farm)`, where `farm` is a foreign key the value of which will be the `farmID`
    of the corresponding farm.


    Now we have a decision to make. Is the paddock number a unique number over all
    paddocks, or is it just unique within a farm? The two possibilities are shown
    in [Figure 9-2](#9781430242093_Ch09.xhtml#F2). In [Figure 9-2a](#9781430242093_Ch09.xhtml#F2),
    the primary key would be `paddock_num`, and in [Figure 9-2b](#9781430242093_Ch09.xhtml#F2),
    the primary key would be the combination (`farm`, `paddock_num`).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-02_fmt.png)


    [Figure 9-2.](#9781430242093_Ch09.xhtml#FG2) Simple and concatenated primary keys
    for the `Paddock` table


    In [Figure 9-2a](#9781430242093_Ch09.xhtml#F2), we only need the one field as
    a primary key; however as the project grows, the numbers for a paddock will get
    large, and they don ’t mean very much. In the second option, the numbers for `paddock_num`
    are no longer unique (they restart from 1 for each farm), and we need two fields
    to identify a paddock. However, paddock (17, 2) means more to the owner of farm
    17 than paddock 345\. At this stage, the choice doesn ’t matter too much.


    This relationship between `farm` and `paddock` (a 1–Many with a compulsory 1 end)
    is sometimes referred to as an `ownership` relation. The `paddock` `must` have
    an associated `farm`, or looking at it the other way around, the `farm` `owns`
    the `paddock`. When we get a long line of 1–Many ownership relationships, the
    issue of the size of the foreign key becomes more pressing. Consider some more
    of the insect data model as shown in [Figure 9-3](#9781430242093_Ch09.xhtml#F3).
    The model describes a somewhat simplified version of the problem we considered
    before. Each `visit` has to be associated with a `paddock`, and each `sample`
    has to be associated with a particular `visit`.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-03_fmt.jpeg)


    [Figure 9-3.](#9781430242093_Ch09.xhtml#FG3) Several 1–Many ownership relationships


    For each of the 1–Many relationships, we need to include the primary key from
    the 1 end as a foreign key in the Many end. Let ’s assume that a `paddock` can
    only be visited once on any given date. One possible set of tables for the preceding
    model could be as follows:


    `Farm(farmID, farm_name, address, owner)`


    `Paddock(farmID, paddock_num, area)`, with `farmID` being a foreign key referring
    to `Farm`


    `Visit(date, farm, paddock,)` with (`farm`, `paddock`) being a foreign key referring
    to `Paddock`


    `Sample(date, farm,, paddock, sample_num, count)` with (`date`, `farm`, `paddock`)
    being a foreign key referring to `Visit`


    In this set of tables, we are assuming paddocks are numbered from 1 within each
    farm and samples are numbered from 1 within each `visit`. The `Visit` table doesn
    ’t need to have an ID because the combination (`date`, `farm`, `paddock`) is unique
    for this problem.


    The `Sample` table is now looking quite cumbersome because the foreign key referring
    to the `Visit` table is a combination of three fields. This table is going to
    have the most rows eventually, so in addition to it just looking ugly, there could
    also be a size consideration. Had we used the alternative in [Figure 9-2a](#9781430242093_Ch09.xhtml#F2)
    of a single key for `Paddock`, the foreign keys in the `Visit` and `Sample` tables
    would be a little smaller, but at the expense of having less–intuitive identifications
    for paddocks.


    What other options do we have? Introducing a `visitID` makes some sense. `Visit`s
    will probably be in a chronological order so that the ID number will mean something.
    `Visit` 458 will probably be the one that occurred after `visit` 457, whereas
    `paddock` 458 has no obvious relationship to `paddock` 457.


    A happy compromise might be the following set of tables:


    `Farm(farmID, farm_name, address, owner)`'
