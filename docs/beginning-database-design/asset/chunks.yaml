  raw: 'What happens if a family orders three chicken vindaloos, one hamburger, and
    one pork fried rice? Where do we put these quantities? The quantity cannot be
    an attribute in the Order class (for this order there are three quantities and
    they each depend on the particular meal) nor in the Meal class (for there will
    potentially be hundreds of orders involving a particular type of meal, each with
    different quantities).


    Once again, our problem of where to put the additional data is solved by including
    a new class as shown in [Figure 4-21](#9781430242093_Ch04.xhtml#F21).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-21_fmt.jpeg)


    [**Figure 4-21.**](#9781430242093_Ch04.xhtml#FG21) Orders for different types
    of meal—with additional class to store quantities


    For some problems, it can be difficult to come up with a meaningful name for the
    intermediate class. In such a case, it is always possible to use a concatenation
    of the two original class names as we have done here with Order/Meal. We could
    maybe have called the class Orderline, in this example, as it represents each
    line in the order (i.e., a meal and the quantity). You might find it helpful to
    sketch some objects of the three classes in [Figure 4-21](#9781430242093_Ch04.xhtml#F21)
    to clarify what is happening.


    We can also use this new intermediate class to solve one of the other problems
    we deferred in [Chapter 3](#9781430242093_Ch03.xhtml). This was the problem of
    coping with the price of a meal changing over time. In the Meal class in [Figure
    4-21](#9781430242093_Ch04.xhtml#F21), we can define the price attribute as being
    the current price for that type of meal. An order placed for that meal today will
    be at that price. How do we know what was charged for this type of meal on an
    order several months ago? To deal with the problem of changing prices, we can
    include an attribute, price, in the intermediate class Order/Meal. This will be
    the price charged for a particular meal on a particular order and will not change
    when the current price changes in the Meal class. This way we have a complete
    history of the prices for each meal on each order. A price attribute in this intermediate
    class can allow us to keep historical data and also to deal with “unusual” situations
    such as specials or discounts. We are always keeping the price that was actually
    charged for that type of meal on that particular order.


    The question that needed to be asked about the original Many–Many relationship
    in [Figure 4-20](#9781430242093_Ch04.xhtml#F20) was:


    *Are there any data we need to store about a particular meal type on a particular
    order?*


    And the answer is:


    *Yes, the quantity of that meal type ordered and the price being charged for that
    meal type on the order.*


    When a Many–Many Doesn’t Need an Intermediate Class


    A few Many–Many relationships contain complete information for a problem without
    the need for an intermediate class in the data model. Problems that involve categories
    as part of the data often do not require an additional class. [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    “The Plant Database,” involved plants and uses to which they could be put. The
    original data model is repeated in [Figure 4-22](#9781430242093_Ch04.xhtml#F22).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-22_fmt.jpeg)


    [**Figure 4-22.**](#9781430242093_Ch04.xhtml#FG22) Plants and their uses


    We can ask the question, “Is there any information we want to keep about a particular
    species and a particular use?”


    In this case, the answer is probably, “No*.*” A Many–Many relationship that doesn’t
    require any additional information often occurs when we have something that belongs
    to a number of different categories; for example, a plant has many different uses
    and all we want to know is what they are.


    It is possible, however, that in a different situation we might want to record
    whether a particular plant is excellent or just reasonable at hedging. Or we may
    want to note how many of a particular species are needed to be sufficient for
    attracting bees. In both these cases, we might need an intermediate class. Try
    sketching a new model for these situations.


    Summary


    Even at the very early stages of analysis, a simple data model can provide us
    with a number of questions. The answers to these questions will help us to understand
    a problem better. The resulting clarifications to the problem should eventually
    be reﬂected in the use cases and may affect the final model and the eventual implementation.


    In this chapter, we have suggested some questions about a single relationship
    between two classes. Some of the questions we have discussed are reviewed here.


    **Optionality:** Should it be 0 or 1? Considering whether an optionality should
    be 0 or 1 might affect definitions of our classes; for example, “Would a student
    who was not enrolled in any courses still be considered a student for the purposes
    of our database?”


    **A cardinality of 1***:* Might it occasionally be 2? We need to consider whether
    there might be exceptional cases in which we might want to squeeze two numbers
    or categories into a box designed for one; for example, “What happens if the weather
    changes during a visit?” Redefining a class might help out for the exceptional
    cases, as in, “If the weather changes, we will call it two visits.”


    **A cardinality of 1:** What about historical data? Always consider whether the
    1 in a relationship really means “just one at a time.” For example, “A department
    has one manager. Do we want to know who the previous managers of the department
    were?” If so, the relationship should be Many–Many.


    **Many–Many:** Are we missing anything? Consider whether there is information
    we need to record about a particular pairing of objects from each class; for example,
    “What might we want to know about a particular student and a particular course?”
    If there is such information (e.g., the grade), introduce a new intermediate class.


    TESTING YOUR UNDERSTANDING


