    ![image](images/frontdot.jpg)


    ## What Can Go Wrong


    Another hidden cost comes from inaccuracies in the data. Poor database design
    allows what should be avoidable inconsistencies to be present in the data. Poor
    handling of categories can cause summaries and reports to be misleading or, to
    be blunt, wrong. In large organizations, the accumulated effects of each department’s
    inaccurate summary information may go unnoticed.


    Problems with a database are not necessarily caused by a lack of knowledge about
    the database product itself (though this will eventually become a constraint)
    but are often the result of having chosen the wrong attributes to group together
    in a particular table. This comes about for two main reasons:


    The creator does not have a clear idea of what information the database is meant
    to be delivering in the short and medium term


    The creator does not have a clear model of the different classes of data and their
    relationships to each other


    This book describes techniques for gaining a precise understanding of what a problem
    is about, how to develop a conceptual model of the data involved, and how to translate
    that model into a database design. You’ll learn to design better databases. You’ll
    avoid the cost of “getting it wrong.”


    ## Create a Data Model


    The chasm between having a basic idea of what your database needs to be able to
    do and designing the appropriate tables is bridged by having a clear data model.
    Data modeling involves thinking very carefully about the different sets or classes
    of data needed for a particular problem.


    Here is a very simple textbook example: a small business might have customers,
    products, and orders. We need to record a customer’s name. That clearly belongs
    with our set of customer data. What about address? Now, does that mean the customer’s
    contact address (in which case it belongs to the customer data) or where we are
    shipping the order (in which case it belongs with information about the order)?
    What about discount rate? Does that belong with the customer (some are gold card
    customers), or the product (dinner sets are on special at the moment), or the
    order (20% off orders over $400.00), or none of the above, or all of the above,
    or does it depend on the boss’s mood?


    Getting the correct answers to these questions is obviously vital if you are going
    to provide a useful database for yourself or your client. It is no good heading
    up a column in your spreadsheet “Discount” before you have a very precise understanding
    of exactly what a discount means in the context of the current problem. Data modeling–
    diagrams provide very precise and easy–to–interpret documentation for answers
    to questions such as those just posed. Even more importantly, the process of constructing
    a data model leads you to ask the questions in the first place. It is this, more
    than anything else, that makes data modeling such a useful tool.


    The data models we will be looking at in this book are small. They may represent
    small problems in their entirety, but more likely they will be small parts of
    larger problems. The emphasis will be on looking very carefully at the relationships
    between a few classes of data and getting the detail right. This means using the
    first attempts at the model to form questions for the user, to find the exceptions
    (before they find you), and then to make some pragmatic decisions about how much
    of the detail is necessary to make a useful database. Without a good data model,
    any database is pretty much doomed before it is started.


    Data models are often represented visually using some sort of diagram. Diagrams
    allow you to take in a large amount of information at a glance, giving you the
    ability to quickly get the gist of a database design without having to read a
    lot of text. We will be using the class diagram notation from `UML` to represent
    our data models, but many other notations are equally useful.


    ## Database Implementation


    Once you have a data model that supports your use cases (and all the other details
    that you have discovered along the way), you know how big your problem is and
    the type of detail it will involve. You now have a good foundation for designing
    a suitable application and undertaking the implementation.


    Conceptually, the translation from data model to designing a database or spreadsheet
    is simple. In Chapters 7 through 9, we will look at how to design tables and relationships
    in a relational database (such as `Microsoft Access`), which represent the information
    in the data model. In Chapter 12, we also look at how this might be done in an
    object–oriented database or language (e.g., `JADE`, `Visual Basic`), and for problems
    with not too many classes of data, how you might capture some of the information
    in a spreadsheet product such as `Microsoft Excel`.


    The translation from data model to database design is fairly straightforward;
    however, the actual implementation is not quite so simple. A great deal of work
    is necessary to ensure that the database is convenient for the eventual user.
    This will mean designing a user interface with a clear logic, good input facilities,
    the ability to quickly find data for editing or deleting, adaptable and accurate
    querying and reporting features, the ability to import and export data, and good
    maintenance facilities such as backup and archiving. Do not underestimate the
    time and expertise necessary to complete a useful application even for the smallest
    database! Considerations such as user interface, maintenance, archiving, and such
    are outside the scope of this work but are well covered in numerous books on specific
    database products and texts on interface design.


    ## Objective of This Book


    Setting up a database even for a small problem can be a big job (if you do it
    properly). This book is primarily for beginners or those people who want to set
    up a small, single–user database. The ideas are applicable to larger, multiuser
    projects, but there are considerable additional problems that you will encounter
    there. We do not look at problems to do with concurrency (many users acting together),
    nor efficiencies, nor how you manage a large project. There are many excellent
    books on software engineering and database management that deal with these issues.


    The main objective of this book is to ensure that the people starting out on setting
    up a database have a sufficient understanding of the underlying data so that any
    effort expended on actual implementation will yield satisfying results. Even small
    problems are more complicated than they appear at first sight. A data model will
    help you understand the intricacies of the problem so that some pragmatic decisions
    can be made about what should be attempted. Once you have a data model that you
    are happy with, you can be confident that the resulting database design (if implemented
    faithfully) will not disappoint. It may be that after doing the modeling you decide
    a database is not the appropriate solution. Better to decide this early than after
    hours of effort have gone into a doomed implementation.'
  raw: 'Another hidden cost comes from inaccuracies in the data. Poor database design
    allows what should be avoidable inconsistencies to be present in the data. Poor
    handling of categories can cause summaries and reports to be misleading or, to
    be blunt, wrong. In large organizations, the accumulated effects of each department’s
    inaccurate summary information may go unnoticed.


    Problems with a database are not necessarily caused by a lack of knowledge about
    the database product itself (though this will eventually become a constraint)
    but are often the result of having chosen the wrong attributes to group together
    in a particular table. This comes about for two main reasons:


    The creator does not have a clear idea of what information the database is meant
    to be delivering in the short and medium term


    The creator does not have a clear model of the different classes of data and their
    relationships to each other


    This book describes techniques for gaining a precise understanding of what a problem
    is about, how to develop a conceptual model of the data involved, and how to translate
    that model into a database design. You’ll learn to design better databases. You’ll
    avoid the cost of “getting it wrong.”


    Create a Data Model


    The chasm between having a basic idea of what your database needs to be able to
    do and designing the appropriate tables is bridged by having a clear data model.
    Data modeling involves thinking very carefully about the different sets or classes
    of data needed for a particular problem.


    Here is a very simple textbook example: a small business might have customers,
    products, and orders. We need to record a customer’s name. That clearly belongs
    with our set of customer data. What about address? Now, does that mean the customer’s
    contact address (in which case it belongs to the customer data) or where we are
    shipping the order (in which case it belongs with information about the order)?
    What about discount rate? Does that belong with the customer (some are gold card
    customers), or the product (dinner sets are on special at the moment), or the
    order (20% off orders over $400.00), or none of the above, or all of the above,
    or does it depend on the boss’s mood?


    Getting the correct answers to these questions is obviously vital if you are going
    to provide a useful database for yourself or your client. It is no good heading
    up a column in your spreadsheet “Discount” before you have a very precise understanding
    of exactly what a discount means in the context of the current problem. Data modeling–
    diagrams provide very precise and easy–to–interpret documentation for answers
    to questions such as those just posed. Even more importantly, the process of constructing
    a data model leads you to ask the questions in the first place. It is this, more
    than anything else, that makes data modeling such a useful tool.


    The data models we will be looking at in this book are small. They may represent
    small problems in their entirety, but more likely they will be small parts of
    larger problems. The emphasis will be on looking very carefully at the relationships
    between a few classes of data and getting the detail right. This means using the
    first attempts at the model to form questions for the user, to find the exceptions
    (before they find you), and then to make some pragmatic decisions about how much
    of the detail is necessary to make a useful database. Without a good data model,
    any database is pretty much doomed before it is started.


    Data models are often represented visually using some sort of diagram. Diagrams
    allow you to take in a large amount of information at a glance, giving you the
    ability to quickly get the gist of a database design without having to read a
    lot of text. We will be using the class diagram notation from UML to represent
    our data models, but many other notations are equally useful.


    Database Implementation


    Once you have a data model that supports your use cases (and all the other details
    that you have discovered along the way), you know how big your problem is and
    the type of detail it will involve. You now have a good foundation for designing
    a suitable application and undertaking the implementation.


    Conceptually, the translation from data model to designing a database or spreadsheet
    is simple. In [Chapters 7](#9781430242093_Ch07.xhtml) through [9](#9781430242093_Ch09.xhtml),
    we will look at how to design tables and relationships in a relational database
    (such as Microsoft Access), which represent the information in the data model.
    In [Chapter 12](#9781430242093_Ch12.xhtml), we also look at how this might be
    done in an object–oriented database or language (e.g., JADE, Visual Basic), and
    for problems with not too many classes of data, how you might capture some of
    the information in a spreadsheet product such as Microsoft Excel.


    The translation from data model to database design is fairly straightforward;
    however, the actual implementation is not quite so simple. A great deal of work
    is necessary to ensure that the database is convenient for the eventual user.
    This will mean designing a user interface with a clear logic, good input facilities,
    the ability to quickly find data for editing or deleting, adaptable and accurate
    querying and reporting features, the ability to import and export data, and good
    maintenance facilities such as backup and archiving. Do not underestimate the
    time and expertise necessary to complete a useful application even for the smallest
    database! Considerations such as user interface, maintenance, archiving, and such
    are outside the scope of this work but are well covered in numerous books on specific
    database products and texts on interface design.


    Objective of This Book


    Setting up a database even for a small problem can be a big job (if you do it
    properly). This book is primarily for beginners or those people who want to set
    up a small, single–user database. The ideas are applicable to larger, multiuser
    projects, but there are considerable additional problems that you will encounter
    there. We do not look at problems to do with concurrency (many users acting together),
    nor efficiencies, nor how you manage a large project. There are many excellent
    books on software engineering and database management that deal with these issues.


    The main objective of this book is to ensure that the people starting out on setting
    up a database have a sufficient understanding of the underlying data so that any
    effort expended on actual implementation will yield satisfying results. Even small
    problems are more complicated than they appear at first sight. A data model will
    help you understand the intricacies of the problem so that some pragmatic decisions
    can be made about what should be attempted. Once you have a data model that you
    are happy with, you can be confident that the resulting database design (if implemented
    faithfully) will not disappoint. It may be that after doing the modeling you decide
    a database is not the appropriate solution. Better to decide this early than after
    hours of effort have gone into a doomed implementation.


    CHAPTER 1


    ![image](images/frontdot.jpg)


    What Can Go Wrong


    The problem with a number of small databases (and quite probably with many large
    ones) is that the initial idea of how to record and store the data is not necessarily
    the most useful one. Often a table or spreadsheet is designed to mimic a possible
    data entry screen or a hoped–for report. This practice may be adequate for solving
    the immediate problem (e.g., storing the data somewhere); however, mimicking a
    data entry screen or report in your design inevitably leads to problems as the
    requirements evolve. It can make it difficult, if not impossible, to get information
    for different reports or summaries that were not originally envisaged but nevertheless
    should be available given the data collected.'
  trans: '

    # 第一章


    ![image](img/frontdot.jpg)


    ## 可能出错的地方


    另一个隐藏成本来自于数据的不准确性。糟糕的数据库设计使得本可避免的不一致性存在于数据中。对类别处理不当可能导致汇总和报告具有误导性，或者坦白地说，是错误的。在大型组织中，每个部门不准确的汇总信息所带来的累积影响可能不会被注意到。


    数据库的问题并不一定源于对数据库产品本身缺乏了解（尽管这最终会成为一种限制），而往往是由于在特定表中选择了错误的属性进行分组所致。这主要有两个原因：


    1.  创建者对于数据库在中短期内应该提供什么信息没有清晰的想法

    2.  创建者对于不同的数据类别及其相互关系没有清晰的模型


    本书描述了如何精确理解问题所在，如何为所涉及的数据开发概念模型，以及如何将该模型转化为数据库设计。你将学会设计更好的数据库。你将避免“做错事”的成本。


    ## 创建数据模型


    从对数据库需要能够做什么有一个基本想法，到设计出合适的表，这之间的鸿沟是通过一个清晰的数据模型来架设桥梁的。数据建模涉及为特定问题仔细思考所需的不同数据集或类别。


    这里有一个非常简单的教科书例子：一家小企业可能有客户、产品和订单。我们需要记录客户的姓名。这显然属于我们的客户数据集。那么地址呢？现在，这指的是客户的联系地址（在这种情况下它属于客户数据），还是我们运送订单的目的地（在这种情况下它属于订单信息）？折扣率呢？那是属于客户（有些是金卡客户），还是产品（餐具套装目前特价），还是订单（订单超过
    400 美元打八折），还是不属于以上任何一种，还是属于以上所有，还是取决于老板的心情？


    显然，如果你要为自己或客户提供一个有用的数据库，正确回答这些问题至关重要。在你非常精确地理解“折扣”在当前问题背景下的确切含义之前，在你的电子表格中将一列命名为“折扣”是没有用的。数据模型图表为回答刚刚提出的那些问题提供了非常精确且易于理解的文档。更重要的是，构建数据模型的过程首先引导你提出这些问题。正是这一点，比其他任何东西都更能说明数据建模为何是一个如此有用的工具。


    我们将在本书中研究的数据模型都很小。它们可能完整地代表小问题，但更可能是更大问题中的一小部分。重点将是仔细审视少数几个数据类别之间的关系，并确保细节正确。这意味着使用模型的初步尝试来向用户提出问题，发现异常情况（在它们找到你之前），然后对哪些细节对于构建一个有用的数据库是必要的做出一些务实的决定。没有一个好的数据模型，任何数据库几乎在开始之前就注定要失败。


    数据模型通常使用某种图表进行可视化表示。图表让你能够一目了然地获取大量信息，使你能够快速把握数据库设计的要点，而不必阅读大量文字。我们将使用来自`UML`的类图符号来表示我们的数据模型，但许多其他符号同样有用。


    ## 数据库实现


    一旦你有了一个支持你的用例的数据模型（以及你在此过程中发现的所有其他细节），你就知道你的问题有多大，以及它将涉及哪种细节。你现在有了一个良好的基础来设计合适的应用程序并进行实施。


    从概念上讲，从数据模型到设计数据库或电子表格的转换是简单的。在第 7 章到第 9 章中，我们将探讨如何在关系数据库（如`Microsoft Access`）中设计表和关系，这些表和关系代表了数据模型中的信息。在第
    12 章中，我们还将探讨如何在面向对象数据库或语言（例如`JADE`、`Visual Basic`）中完成这项工作，以及对于数据类别不是特别多的问题，如何在诸如`Microsoft
    Excel`之类的电子表格产品中捕获部分信息。


    从数据模型到数据库设计的转换相当直接；然而，实际实施却不那么简单。需要做大量的工作来确保数据库对最终用户来说是方便的。这将意味着设计一个具有清晰逻辑的用户界面、良好的输入设施、快速查找数据进行编辑或删除的能力、适应性强且准确的查询和报告功能、导入和导出数据的能力，以及良好的维护设施，如备份和归档。即使是最小的数据库，也不要低估完成一个有用的应用程序所需的时间和专业知识！诸如用户界面、维护、归档等方面的考虑超出了本书的范围，但在许多关于特定数据库产品的书籍以及关于界面设计的教材中都有很好的介绍。


    ## 本书目标


    即使是一个小问题，正确地建立数据库也可能是一项大工程。本书主要面向初学者或希望建立小型、单用户数据库的人。其中的思想也适用于更大、多用户的项目，但那里会遇到相当多的额外问题。我们不涉及并发（多个用户同时操作）、效率问题或如何管理大型项目等问题。有许多关于软件工程和数据库管理的优秀书籍涉及这些问题。


    本书的主要目标是确保刚开始建立数据库的人对底层数据有足够的理解，以便在实际实施上付出的任何努力都能产生令人满意的结果。即使是小问题也比乍看起来更复杂。数据模型将帮助你理解问题的复杂性，从而能够就应该尝试做什么做出一些务实的决定。一旦你有了一个令你满意的数据模型，你就可以确信最终的数据库设计（如果忠实地实施）不会让你失望。可能的情况是，在建模之后，你决定数据库不是合适的解决方案。尽早做出这个决定，总比在付出了数小时的努力投入到一个注定失败的实施之后再决定要好。

