- fmt: 'The model in [Figure 5-17](#9781430242093_Ch05.xhtml#F17) allows us to record
    a player’s current or main team, the current members of a particular team, and
    the matches in which teams are involved. However, we cannot deduce that a particular
    player played in any given match (he may have been sick or injured). This is an
    example of the fan trap described earlier in the chapter. A team has many players
    and is involved in many matches, but we cannot say any more about which players
    were involved in particular matches. We could attempt to address this by adding
    a relationship between `Member` and `Match` as shown in [Figure 5-18](#9781430242093_Ch05.xhtml#F18).
    Look carefully at the new data model. Can you see where there is a possibility
    that the data might become inconsistent?


    ![9781430242093_Fig05-18.tif](images/9781430242093_Fig05-18_fmt.jpeg)


    [Figure 5-18.](#9781430242093_Ch05.xhtml#FG18) Another model to represent members,
    teams, and matches


    From [Figure 5-18](#9781430242093_Ch05.xhtml#F18), it is possible to have the
    following relationship instances:


    *   John plays for Team A.

    *   John plays in the match on Tuesday.

    *   The match on Tuesday is between Teams B and C.


    If John plays for only one team (as the model indicates), then something weird
    is going on here.


    Let’s think through this problem with members, teams, and matches a bit further.
    If we want to keep track of who plays in which matches, our problem has some intricacies
    that the model does not adequately represent. If we are allowing for people being
    injured and not taking part, we also need to account for the situation in which
    someone from another team may need to fill in as a replacement. For example, John
    normally plays for Team A, but filled in for Team B on Tuesday because Scott was
    injured. Our scenario in the previous paragraph is not so weird—just a bit more
    complicated than we originally thought.


    We still have a problem, however. We are happy that John normally plays for Team
    A and that he just happened to play in the match between Team B and Team C on
    Tuesday, but the model doesn’t tell us which team he was playing for.


    We need to step back, revisit the use cases, and figure out exactly what it is
    we want to know. If we want to know exactly which players played on each team
    for each match, then no combination of the relationships in [Figure 5-18](#9781430242093_Ch05.xhtml#F18)
    will tell us that. The crucial point is that who played for which team in which
    match requires simultaneous knowledge of objects from three classes: which `Member`,
    which `Team`, and which `Match`. This is sometimes referred to as a *ternary relationship*
    (and, similarly, quaternary for four classes and so on).


    When we have a case where the information we need requires simultaneous information
    from objects of three (or more) classes, we introduce a new class connected to
    all three classes as shown in [Figure 5-19](#9781430242093_Ch05.xhtml#F19).


    ![9781430242093_Fig05-19.tif](images/9781430242093_Fig05-19_fmt.jpeg)


    [Figure 5-19.](#9781430242093_Ch05.xhtml#FG19) Members and the team for which
    they played in a particular match


    We might be able to think of an appropriate name for this class; in this case
    `Appearance` would be sensible. If not, concatenating the other three class names
    will suffice (e.g., `Team/Member/Match`). This is not unlike introducing a new
    class in the Many–Many relationships we considered in [Chapter 4](#9781430242093_Ch04.xhtml).
    As in that case, the cardinality at each of the outer classes is 1.


    Reading this model, we have something like this: each appearance involves one
    member, one team, and one match (e.g., Jim appeared for Team A in the match on
    Saturday the 12th); each member may have many appearances (Jim can appear in many
    matches, possibly for different teams); a team will have many players appearing
    in different matches; and a match will have many players appearing for each of
    the teams.


    The new class may or may not have attributes. It may just be a holding place for
    valid combinations of `Member`, `Team`, and `Match` objects. If there are attributes
    for the new class, they must be something that involves all three classes. For
    example, what do we need to know about a particular player playing for a particular
    team in a particular match? Possibly the position. If we wanted to know that Jim
    played fullback for Team A in the match on Saturday the 12th, our new class is
    the place to record that information.


    [Figure 5-19](#9781430242093_Ch05.xhtml#F19) clearly has additional information
    that is impossible to deduce from [Figure 5-18](#9781430242093_Ch05.xhtml#F18).
    What about vice versa? Can we re–create all the information in [Figure 5-18](#9781430242093_Ch05.xhtml#F18)
    from 5-19? By looking at [Figure 5-19](#9781430242093_Ch05.xhtml#F19), we can
    deduce all the teams a player played for, all the matches in which a player played,
    and the teams involved in each match. We do not need to add extra relationships
    between each pair of classes to figure out this information. In fact, it would
    be dangerous to do so as we would then have two routes for finding a piece of
    information and, as we have seen, that redundancy can lead to inconsistencies.
    However, there may be other information about each pair of classes that we would
    like to keep. For instance, in [Figure 5-19](#9781430242093_Ch05.xhtml#F19) we
    know all the teams Jim played for but we don’t know the team with which he regularly
    trains. Some binary relationships between each of the three classes may be required
    in addition to the relationships with the new class.


    Whenever we have a pattern such as that in [Figure 5-19](#9781430242093_Ch05.xhtml#F19),
    we should check whether the other binary relationships are necessary. If we have
    classes A, B, and C connected to a third class, for each pair of classes we should
    ask a question like, “Is there something I need to know about a relationship between
    A and B that is independent of C?” For the preceding example, we could ask, “Is
    there something I need to know about player and team that is independent of the
    match?” The answer here would be, “Yes. I want to know the player’s main team.”
    We would therefore add a binary relationship to represent that information, as
    shown in [Figure 5-20](#9781430242093_Ch05.xhtml#F20).


    ![9781430242093_Fig05-20.tif](images/9781430242093_Fig05-20_fmt.jpeg)


    [Figure 5-20.](#9781430242093_Ch05.xhtml#FG20) Including a binary relationship
    for information independent of one class


    We need to ask a similar question for each of the other combinations; for example,
    “What do I need to know about a particular team and a particular match independent
    of the members?” The winning team maybe. “What do I need to know about a particular
    member and particular match independent of the teams?” Perhaps who was refereeing.


    ## Summary


    This chapter has described a miscellany of common modeling situations. Investigating
    these leads to a more precise understanding and representation of the real–life
    problem. These situations are summarized as follows:'
