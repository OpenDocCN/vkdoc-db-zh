    `示例 1-3`（回顾 `第 1 章`）是一个关于未规范化数据的很好的现实例子。简要回顾一下：农场被访问，并从不同的田地采集多个样本。记录每个样本中每种物种（目前仅有弹尾虫和甲虫）的数量。该数据的一个版本如
    `图 8-14` 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig08-14_fmt.jpeg)


    `图 8-14.` 昆虫数据的未规范化版本


    思考以下问题：


    a)  `图 8-14` 中的表可能会出现哪些更新异常问题？


    b)  以下哪些功能依赖关系适用于该昆虫数据？


    *   `农场 ID` → `农场名称`？

    *   `农场 ID` → `访问`？

    *   `访问` → `日期`？

    *   `日期` → `访问`？

    *   `访问` → `农场 ID`？

    *   `样本` → `田地`？

    *   (`样本`, `访问 ID`) → `田地`？

    *   (`样本`, `昆虫`) → `数量`？


    c)  (`访问 ID`, `样本`, `昆虫`) → `数量` ？(`访问 ID`, `样本`, `昆虫`) 被建议作为合适的主键。你能通过知道这三个字段的值来确定所有其他值吗？它会是一个合适的主键吗？


    d)  使用 Part C 中的字段作为主键，运用规范化规则将 `图 8-14` 中的表分解为一组符合第三范式的表。


    ¹ Edgar F. Codd, (1970 年 6 月). “大型共享数据库的关系数据模型。” *ACM 通讯*： 13(6): 第 377–387 页。

    ² William Kent, “关系数据库理论中第五范式的简单指南，” ACM 通讯 26(2), 1983 年 2 月, 120-125.


    ## 第 9 章


    ![image](img/frontdot.jpg)


    ### 关于键和约束的更多内容


    在前面的章节中，你已经了解了如何将类图表示为一组关系数据库表。我们研究了如何用主键和外键表示类之间的关系，然后应用规范化的思想来确保属性位于正确的表中。在本章中，我们将重新审视其中一些思想，并思考一些其他的可能性。特别是，我们将更仔细地研究主键以及如何选择它们。我们还将看看在数据不断更新时，如何维护参照完整性。


    #### 选择主键


    在前两章中，我描述了我们需要如何选择一个字段或字段组合作为表示类的数据库表的主键。关键字段将具有唯一值，因此可用于标识表中的特定行。主键还用于通过外键建立不同表中行之间的关系。选择主键并非总是直截了当的。对于一个人，有时会使用姓名和出生日期等组合作为键，但它们不能保证唯一。你已经看到，引入客户编号或使用某种自动生成的
    ID 号可以确保我们拥有一个对每一行都唯一的字段。现在，让我们再看看这个 ID 号码的概念。


    #### 关于 ID 号码的更多内容


    一个生成的 ID 号码并不能解决我们所有的问题。如果我们的表中有两行，除了 ID 之外在所有方面都相同，我们就会陷入真正的麻烦。两个同名同姓且出生日期相同的约翰·史密斯住在同一个地址，无论他们是否有不同的客户编号，都会使事情变得复杂。他们是同一个人还是不同的人？如果区分一个人与另一个人的唯一依据是某个生成的
    ID，那将是无法容忍的。首先，谁能记住他们可能数百个不同的 ID 号码呢？我们总是期望企业能够根据能将我们与其他人区分开来的信息，为我们找到客户编号。


    那么，这是否意味着总会存在（或应该存在）一个由关于客户保存的数据的某种组合构成的可能键呢？很可能是的。那么，为什么我们还需要 ID 号码呢？由表中所有字段组成的主键不行吗？


    ID 号码在许多情况下是必要的，主要原因之一是，尽管可能总存在某些信息可以将一个客户与另一个客户区分开，但这些值中的一些很可能在不断变化。如果我们决定用姓名、出生日期、地址、母亲娘家姓名等来标识一个客户，那么将其作为表中的主键对我们来说没有用处。地址肯定会改变，姓名很可能改变，这就是我们遇到问题的地方。我们使用主键是为了与不同表中的行建立连接。例如，我们会使用
    `客户` 表的主键作为 `订单` 表中的外键，以标识哪个客户下了特定订单。如果必须将姓名和地址的组合作为外键放入我们的 `订单` 表中，我相信你能想象当客户搬迁到新地址时，我们可能会遇到的与特定客户关联订单的各类问题。然而，一个
    ID 号码将是恒定不变的。例如，一个订单可能与客户 `3602` 相关联，而 `客户` 表中关于客户 `3602` 的信息可以随意更改。简·格林可以随心所欲地搬家和再婚，而我们仍然可以通过她恒定的客户编号来跟踪她的订单。


    在数据库中存储有关人员的信息时，ID 号码几乎总是必需的。人们通常相当抗拒被一个数字所描述，但他们很可能与他们打交道的每个企业都有一个不同的号码。出于隐私原因，许多公民自由团体抵制通用
    ID 号码，尽管在许多国家，社会保障号码、税务号码或驾照号码几乎已成为默认的通用 ID。许多网站现在使用电子邮件地址作为一种身份识别形式——尽管当你与配偶或伴侣共享个人电子邮件地址时，这可能会导致问题。（我知道这个！）


    虽然 ID 号码是必不可少的，但它们仍然存在问题。当一个人被同一组织分配了两个 ID 号码时，就会出现一个问题。考虑一下入院的情况。你生病了，你的朋友被询问你的姓名、地址以及你以前是否住过院。他们给出的姓名可能与你的确切姓名不同。他们叫你罗布·布朗，但你的真实姓名是雅各布·罗伯特·布朗，他们不知道你小时候曾因扁桃体炎住过院。因此，一个新的病人被输入数据库并获得一个新编号。现在真正的问题来了：罗布·布朗有两个病人编号，在病人表中有两行。过敏信息可能关联到一个病人编号，而治疗信息则关联到另一个。据传闻，在不同时期，与新西兰医院相关的病人数量大约比总人口多
    25%！

    '
