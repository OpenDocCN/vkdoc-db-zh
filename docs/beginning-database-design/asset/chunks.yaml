    我们接着面临的问题是，我们的餐点集合中包含了一些不应与新订单关联的项目。处理这个问题的一种方法是，在`Meal`类中添加一个`available`属性，用于指示该餐点当前是否可以订购。我们需要修改录入订单的用例，规定只有`available`的餐点才能被包含在内。然而，我们的报告用例可能会包含报告期内所有被订购的餐点。


    ## 特定餐点的数量


    如果我们的顾客点了两份鸡肉文达洛 os（chicken vindaloos）怎么办？我们可以将`Order`对象与`Meal`对象关联起来，但关于此订单需要配送多少份该特定餐点的信息，我们保存在哪里呢？这是一个非常严重的疏忽，要修复它需要在`Order`和`Meal`类之间引入一个新类。当我们处理多对多（Many–Many）关系时，这种情况经常发生。我们将在第
    4 章进一步讨论这一点。


    ## 小结


    分析过程的第一部分是理解项目的主要目标和范围。分析师的工作是深入了解所有将使用系统的不同类型用户的想法，以理解他们当前的需求以及未来可能的需求。这个过程是迭代的，但可能包括以下步骤：


    *   确定系统的主要目标。

    *   确定不同用户在平均一天中从事的工作。

    *   头脑风暴与每项工作可能关联的数据。

    *   商定项目范围，并确定相关数据。

    *   勾勒数据输入用例，考虑异常情况，并检查现有表格。

    *   勾勒初始数据模型。

    *   根据正在收集的数据，头脑风暴可能的输出。

    *   勾勒信息输出用例。

    *   检查数据模型是否能够方便地提供输出信息。


    ## 检验你的理解


    练习 3-1。


    考虑本章开头描述的场景：


    *当家长打电话说孩子生病时，我们必须通知他们的班级老师；如果当天是运动会日并且孩子在校运动队中，体育老师可能需要安排替补。然后我们需要统计所有缺勤天数以记录在孩子的报告上。教育部门每个学期也需要这些总数。*


    按照小结部分中的步骤，勾勒一些用例和一个初始数据模型。假设主要目标是为班级老师记录缺勤情况、用于学校报告以及提供给教育部的统计数据。


    ¹ Peter Coad 和 Ed Yourdon，《面向对象分析》（Object Oriented Analysis）（新泽西州上鞍 River：Yourdon
    Press, 1991）。


    ² Alistair Cockburn，《编写有效用例》（Writing Effective Use Cases）（马萨诸塞州波士顿：Addison Wesley,
    2001）。


    # 第 4 章


    ![image](img/frontdot.jpg)


    ## 从数据模型中学习


    在上一章中，我们试图提取现实世界问题中涉及的基本任务，并用用例来表达它们。我们也首次尝试确定支持这些任务所必需的数据，并形成了一个初始数据模型，我们用类图对其进行了描绘。在本章中，我们将更仔细地研究数据模型，看看它如何能加深我们对数据库系统的理解。


    数据模型是对为现实世界问题存储的数据的精确描述，其方式类似于数学方程描述现实世界的物理事件，或建筑图纸描述建筑物的规划。然而，就像数学方程或建筑规划一样，数据模型既不是现实情况的完整描述，也不是其精确描述。它总是基于定义和假设，并且具有有限的范围。例如，一个高中生描述抛向空中的球路径的简单数学方程，可能会对重力的恒定性、空气阻力的缺失做出假设，并可能假设在速度较低时相对论效应可以忽略不计。该方程对于所做的假设是精确和正确的，但它并不能完全反映真实问题。不过，它是一个良好、实用且极其有用的描述，抓住了真实物理事件的本质。


    数据模型具有与数学方程类似的优点和局限性。它是关于问题的*正在存储*的*数据项*之间关系的模型，但它不是现实问题本身的完整模型。资金、时间和专业知识的限制总是意味着问题需要被界定范围并做出假设，以提取基本要素。至关重要的是，定义和假设要清晰地表达出来，这样客户和分析师才不会各说各话。


    在分析的早期阶段，当客户和开发人员试图理解问题（以及彼此）时，细节必然是模糊的。在本章中，我们将探讨如何使用初始数据模型来发现哪些定义和范围可能需要更严格地表达。


    ## 数据模型回顾


    数据模型的基本方面已在第 2 章中定义。我们将通过一个例子重新审视这些方面，该例子将突出一些额外的特性。设想一个小旅馆，为参观国家公园的学校团体提供若干单人间。该旅馆有一个小型数据库来跟踪其房间和当前入住的人员。由于旅馆主要处理的是具有单一联系点的学生团体，因此“团体”的概念是其业务模型的核心。了解特定学生或教师被分配到哪个房间仍然很重要。捕捉此信息的初始数据模型如图
    4-1 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-01_fmt.jpeg)


    **图 4-1.** 一家小旅馆当前入住情况的初始数据模型


    你可以看到`Group`和`Guest`类之间存在一对多（1–Many）关系。从左向右阅读图 4-1，我们得知一个特定团体与一位或多位宾客相关；从右向左看，一位特定宾客只与一个团体关联。图
    4-1 还描绘了`Guest`和`Room`之间的一对一（1–1）关系。从左向右看，每位宾客必须关联一个房间；反过来，一个房间最多关联一位宾客，但也可能没有宾客。用通俗的话说，团体由多位宾客组成，每位宾客都有一个房间。房间仅供一位宾客使用，并且可能并非全部住满。这些对象和关系的一些可能实例如图
    4-2 所示。我们有两个团体：Green High（关联三位宾客）和 Boys High（关联四位宾客）。每位宾客都关联一个房间（有些房间是空的）。花点时间确认一下图
    4-1 中的类图是如何表示这种情况的。

