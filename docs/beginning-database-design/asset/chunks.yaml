    Most database products also usually provide you with an interface to help create
    a table and select the field(s) that make up the primary key.


    ***[Listing 7-5](#9781430242093_Ch07.xhtml#Lis5).** Specifying a Primary Key*


    CREATE TABLE Member (


    member_number INT PRIMARY KEY,


    member_name VARCHAR (25)


    )


    With the primary key field specified, a constraint is put on the table that will
    ensure that every record must have a unique value for member_number. The user
    will never be able to put in two records with the same value for member_number,
    and so every member in our table can be uniquely distinguished. The constraint
    also ensures that the primary key field always has a value, so every record is
    certain to have a value for member_number.


    It is possible to get the database to automatically generate unique values for
    fields like member_number. Depending on the product you are using, you will find
    a field type called identity, auto_increment, autonumber, or something similar.
    You can then specify some starting number and a step size, and every new row entered
    into the table will automatically be assigned the next available number.


    Concatenated Keys


    It isn’t always necessary or even advisable to introduce a new automatically incrementing
    number field into a table to act as a primary key. With the case of members, there
    was no other way to ensure a unique field for every record, but often a unique
    field or combination of fields already exists in the table. When we have a combination
    of fields that can uniquely identify a record, this is referred to as a *concatenated*
    or *composite* key.Thinking about which combinations of fields are possible keys
    can help you discover and understand subtleties of the problem. Here is an example.


    What is a possible key for the table in [Figure 7-7](#9781430242093_Ch07.xhtml#F7),
    which is keeping information about students enrolling in courses?


    ![9781430242093_Fig07-07.tif](images/9781430242093_Fig07-07_fmt.jpeg)


    [**Figure 7-7**](#9781430242093_Ch07.xhtml#FG7). Enrollments table


    student will not be suitable as a key, as a student will have a record for each
    of the courses in which he enrolls (we can see that the value 17625 appears in
    at least two records). Similarly, course will not do, as a course will have many
    enrollments each with its own record (the value COMP102 is duplicated).In fact,
    every column has duplicated values, so no single field is suitable as a key.


    What about the combination (student, course)? In the few records shown in [Figure
    7-7](#9781430242093_Ch07.xhtml#F7), this combination is always unique, but we
    have to be sure this will *always* be the case for every record we may need to
    enter. We need to find out a bit more about the problem. Consider this dialog:


    *Analyst:* Could student 17625 enroll in COMP101 a second time to try and improve
    his grade?


    *Client:* Yes.


    Now we see that student and course will *not* be a suitable key. As soon as the
    student tries to enroll in the course again, we will have another row with the
    same values for student number and course.


    Let’s try the combination (studentID, course, year):


    *Analyst*: Is it possible for a student to enroll in the same course again in
    the same year (say during the summer)?


    *Client*: It is for some subjects.


    *Analyst*: If a student did reenroll in the same subject in the summer, would
    you want to keep both her previous and her new grade?


    *Client*: Of course!


    The combination (studentID, course, year) will not do as a key either because
    we will have to repeat the values of the three fields when a student enrolls in
    the same course later in the same year. Clearly, we need an additional attribute
    (semester maybe) to differentiate these enrollments. Thinking about a possible
    key has revealed a little more of the complexity of this problem and helped us
    spot a missing attribute or field.


    Whenever we are checking the suitability of a combination of fields as a key,
    we need to find a question that checks that the combination will always be unique.
    In this case, we needed to ask questions such as the following:


    *Is a student ever likely to enroll in a course more than once?*


    *Yes. (*student*,* course*) is not a suitable key.*


    *Is it possible that a student will enroll in the same course more than once in
    a single year?*'
  trans: "\n\n## 主键\n\n我们以模型为基础，为每个类创建了一张表。类中的每个属性都由一个具有特定数据类型的字段来表示，并且我们可以对允许存入字段的值施加一些约束。到目前为止，我们忽略了一个如此重要的约束，以至于它值得单独成节来讨论。这涉及到为表选择一个主键。我们必须总能定位到一个特定的对象（即表中的一行或一条记录），这一点至关重要。这意味着所有记录必须是唯一的；否则，你就无法区分两条相同的记录。\n\
    \n设想一下两条相同记录的后果：当会员支付年度会费时，我们需要将这笔付款与会员关联起来。假设我们的会员表中有两行关于 Ruth Smith 的完全相同的记录，我们如何知道哪一行与某笔会费支付相关联？如果搞错了，那么当另一位\
    \ Smith 女士收到另一张发票时，她会非常恼火。每个会员都必须能够被唯一标识。在任何表中都绝不允许存在两条完全相同的记录。\n\n### 确定主键\n\n\
    键是一个字段，或是字段的组合，它保证对于表中的每条记录都具有唯一值。通过考虑哪些字段可能是候选键，我们可以深入了解问题。我们稍后会看到，一个表中可能存在不止一组可以具有唯一值的字段。我们从中选择一个作为主键，然后使用它来唯一地标识记录。\n\
    \n考虑以下表的哪些字段可以作为键，表中字段名称在表名后的括号中给出：\n\n`Member` (`name`, `address`, `phone`, `birth_date`)\n\
    \n用 `name` 作为键怎么样？不行；完全有可能我们会有两个同名的会员，我们需要能够区分他们。那么组合 (`name`, `address`) 呢？这个更有希望，但众所周知，父亲会用自己的名字给儿子命名，而且他们在人生的不同时期共享同一地址并成为同一俱乐部会员也并非不可能。许多机构有时会使用组合\
    \ (`name`, `birth_date`) 作为客户键，认为这不太可能重复。然而，新闻中经常报道一些令人震惊的故事，人们在努力躲避法警和警察时，突然发现自己有一个同名的孪生兄弟。\n\
    \n一个候选键必须保证对于每条可能的记录都是唯一的。在像我们的会员表这样的情况下，除了添加一个新的属性或字段，如 `member_number`，然后为所有会员分配他们自己唯一的号码以便我们区分他们之外，几乎没有太多选择。这有时被称为代理键。在现实生活中，我们总是可以区分个体，但当我们查看我们存储的关于他们的数据时，可能无法找到一组唯一的值。在许多情况下，隐私法阻止使用诸如社会保障号或税务编号之类的信息来识别个人，因此每个企业或组织通常都被迫提供其自己的个人识别号。\n\
    \n当我们在数据库中创建表时，我们可以指定哪个字段将作为表的主键。实现这一点的 SQL 语句如 代码清单 7-5 所示。大多数数据库产品通常也提供一个界面来帮助创建表并选择构成主键的字段。\n\
    \n**代码清单 7-5. 指定主键**\n\n```sql\nCREATE TABLE Member (\n    member_number INT PRIMARY\
    \ KEY,\n    member_name VARCHAR (25)\n)\n```\n\n指定了主键字段后，就对表施加了一个约束，确保每条记录的 `member_number`\
    \ 都必须具有唯一值。用户将永远无法输入两条 `member_number` 值相同的记录，因此我们表中的每个会员都可以被唯一地区分。该约束还确保主键字段始终有值，因此每条记录必定有一个\
    \ `member_number` 值。\n\n可以让数据库自动生成像 `member_number` 这样的字段的唯一值。根据你所使用的产品，你会发现一种名为\
    \ `identity`、`auto_increment`、`autonumber` 或类似的字段类型。然后，你可以指定某个起始数和一个步长，输入表中的每一行新记录都会自动被分配下一个可用的数字。\n\
    \n### 连接键\n\n并不总是必须或甚至可取地在表中引入一个新的自动递增数字字段作为主键。在会员的例子中，没有其他方法可以确保每条记录都有一个唯一字段，但通常表中已经存在一个唯一的字段或字段组合。当我们有一个可以唯一标识记录的字段组合时，这被称为连接键或复合键。思考哪些字段组合可能是候选键，可以帮助你发现和理解问题的微妙之处。这里有一个例子。\n\
    \n图 7-7 中的表用于保存学生选课信息，它的一个可能的键是什么？\n\n![9781430242093_Fig07-07.tif](img/9781430242093_Fig07-07_fmt.jpeg)\n\
    \n**图 7-7. 选课表**\n\n`student` 不适合作为键，因为一个学生会有一条关于他所选每门课程的记录（我们可以看到值 17625 出现在至少两条记录中）。同样，`course`\
    \ 也不行，因为一门课程会有多次选课，每次选课都有其自己的记录（值 `COMP102` 重复了）。事实上，每一列都有重复值，因此没有单个字段适合作为键。\n\
    \n组合 (`student`, `course`) 怎么样？在 图 7-7 所示的少量记录中，这个组合总是唯一的，但我们必须确保对于我们可能需要输入的每条记录，这*总是*如此。我们需要进一步了解这个问题。考虑以下对话：\n\
    \n*分析师：* 学生 17625 能否第二次选修 `COMP101` 以尝试提高成绩？\n\n*客户：* 是的。\n\n现在我们看到 `student`\
    \ 和 `course` *不会*是一个合适的键。一旦学生尝试再次选修该课程，我们将有另一行具有相同的学号和课程值。\n\n让我们尝试组合 (`studentID`,\
    \ `course`, `year`)：\n\n*分析师：* 学生是否可能在同一学年（比如在夏季）再次选修同一门课程？\n\n*客户：* 对于某些科目是可以的。\n\
    \n*分析师：* 如果一个学生确实在夏季重新选修了同一门科目，您是否希望同时保留她之前的成绩和新的成绩？\n\n*客户：* 当然！\n\n组合 (`studentID`,\
    \ `course`, `year`) 也不能作为键，因为当一个学生在同一年的稍后时间再次选修同一门课程时，我们将不得不重复这三个字段的值。显然，我们需要一个额外的属性（可能是学期）来区分这些选课记录。思考一个可能的键揭示了这个问题更多的复杂性，并帮助我们发现了一个缺失的属性或字段。\n\
    \n每当我们检查一组字段作为键的适用性时，我们需要找到一个问题来验证该组合是否*永远*是唯一的。在这个案例中，我们需要提出以下问题：\n\n*学生是否可能多次选修同一门课程？*\n\
    *是的。 (`student`, `course`) 不是一个合适的键。*\n\n*学生是否可能在同一年内多次选修同一门课程？*\n\n"
- fmt: "## Representing Relationships\n\nSo far we have represented each class as\
    \ a table, each attribute as a field with a particular type, and decided on a\
    \ field, or combination of fields with unique values, to be a primary key. We\
    \ can now use this primary key to help us represent relationships between the\
    \ classes in our model.\n\nLet’s consider our sports club example. A simple data\
    \ model is shown in [Figure 7-8](#9781430242093_Ch07.xhtml#F8) with some possible\
    \ objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9). A member may have *one*\
    \ team that he currently plays for, and each team has exactly *one* captain.\n\
    \n![9781430242093_Fig07-08.tif](images/9781430242093_Fig07-08_fmt.jpeg)\n\n[Figure\
    \ 7-8](#9781430242093_Ch07.xhtml#FG8). Sports club data model\n\n![9781430242093_Fig07-09.eps](images/9781430242093_Fig07-09_fmt.png)\n\
    \n[Figure 7-9](#9781430242093_Ch07.xhtml#FG9). Members, teams, and instances of\
    \ the relationships between them\n\nFirst we design two tables to represent the\
    \ classes and choose a primary key for each. We will adopt the convention of underlining\
    \ the primary key fields.\n\n*   Member: (`member_ID`, `last_name`, `first_name`)\n\
    *   Team: (`team_name`)\n\nEach of the objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9)\
    \ will be a row in the appropriate table.\n\nTo represent the relationships `plays\
    \ for` and `is captain of`, we need a way of specifying each of the lines between\
    \ the objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9). For example, we need\
    \ to show that Bob Jones plays for SeniorB, and the captain of JuniorA is Harvey\
    \ Norton.\n\nAs we have primary keys established, we can easily identify the row\
    \ associated with each object (e.g., Harvey Norton is the row in the Member table\
    \ where the primary key field `member_ID` has the value `199`). To represent the\
    \ relationship between the objects, we use these key values by way of a *foreign\
    \ key* as described in the next section.\n\n## Foreign Keys\n\n[Figure 7-10](#9781430242093_Ch07.xhtml#F10)\
    \ shows the two tables Member and Team again, but now we have added a field to\
    \ show who is the captain of each team. What we have done is put a new field in\
    \ the Team table (`captain`) that will contain the key value of the member who\
    \ is its captain. This is a foreign key. A foreign key is a field(s) (in this\
    \ case `captain`) that refers to the primary key field(s) in some other table\
    \ (in this case it contains a value of the key field `member_ID` from the table\
    \ Member). In this way, we establish the relationships between objects of different\
    \ classes.\n\n![9781430242093_Fig07-10.eps](images/9781430242093_Fig07-10_fmt.png)\n\
    \n[Figure 7-10](#9781430242093_Ch07.xhtml#FG10). The Team table has a foreign\
    \ key field (`captain`) referring to the Member table.\n\nThe SQL statement for\
    \ creating the table Team with a foreign key referring to the Member table is\
    \ shown in [Listing 7-6](#9781430242093_Ch07.xhtml#L6). Many products also provide\
    \ a diagrammatic interface for specifying foreign keys. The interface for setting\
    \ up a foreign key in Access is shown in [Figure 7-11](#9781430242093_Ch07.xhtml#F11).\n\
    \n[Listing 7-6](#9781430242093_Ch07.xhtml#Lis6). SQL to Create a Team Table with\
    \ a Foreign Key\n\n```sql\nCREATE TABLE Team (\n    team_name VARCHAR(10) PRIMARY\
    \ KEY,\n    captain INT FOREIGN KEY REFERENCES Member\n)\n```\n\n![9781430242093_Fig07-11.tif](images/9781430242093_Fig07-11_fmt.jpeg)\n\
    \n[Figure 7-11](#9781430242093_Ch07.xhtml#FG11). Access interface for specifying\
    \ `captain` is a foreign key referring to the Member table\n\nThe two fields `member_ID`\
    \ and `captain` will both have values from the same domain, that is, the set of\
    \ MemberIDs. Formally, a foreign key and the primary key of the table it references\
    \ must have the same domain. In most database products this is softened to requiring\
    \ them to be the same data type or a compatible data type. The types of data that\
    \ are regarded as compatible will depend on the database software being used (e.g.,\
    \ character fields of different lengths are compatible in some products, but not\
    \ in others).\n\n## Referential Integrity\n\nArm-in-arm with the idea of a foreign\
    \ key is the concept of *referential integrity*. This is a constraint that says\
    \ that each *value* in a foreign key field (i.e., `199` and `105` in the Team\
    \ table in [Figure 7-10](#9781430242093_Ch07.xhtml#F10)) must exist as values\
    \ in the primary key field of the table being referred to (i.e., `199` and `105`\
    \ must exist as values in the `member_ID` field in Member). This prevents us putting\
    \ a nonexistent member (say, `765`) as the captain of a team. It also means that\
    \ we cannot remove members `199` and `105` from our member table while they are\
    \ captains of teams. As soon as you set up a foreign key, this referential integrity\
    \ constraint is automatically taken care of for you.\n\n## Representing 1–Many\
    \ Relationships\n\nIn the previous sections, you have seen how it is possible\
    \ to represent instances of a relationship in the data model by using a foreign\
    \ key. In general, the process for a 1–Many relationship is as follows:\n\nFor\
    \ a 1–Many relationship, the key field from the table representing the class at\
    \ the 1 end is added as a foreign key in the table representing the class at the\
    \ Many end.\n\nWe have already represented the relationship `is captain of` in\
    \ [Figure 7-8](#9781430242093_Ch07.xhtml#F8). Let’s now use our general guideline\
    \ to do the same thing for the relationship `plays for` between Member and Team.\n\
    \nThe class at the 1 end is Team, so we take the primary key field from the Team\
    \ table and add it as a new foreign key attribute in the Member table. We can\
    \ give the field any name we like, but it should clearly indicate the relationship\
    \ it is representing, for example `current_team`. This is shown in [Figure 7-12](#9781430242093_Ch07.xhtml#F12).\n\
    \n![9781430242093_Fig07-12.eps](images/9781430242093_Fig07-12_fmt.png)\n\n[Figure\
    \ 7-12](#9781430242093_Ch07.xhtml#FG12). Both relationships in sports club model\
    \ represented by foreign keys"
  raw: '*Yes. (*student*,* course*,* year*) is not a suitable key.*


    *Is it possible that a student will enroll in the same course more than once in
    a single semester of a given year?*


    *No. (*student*,* course*,* year*,* semester*) is a possible key.*


    Now look at the other fields in the table:


    *Is it possible that a student might need to have more than one grade for a given
    enrollment (e.g., an initial grade and a revised grade)?*


    *Maybe. (In that case, the problem is much more complicated than we thought.)*


    Would it all have been easier if we had just abandoned looking for a concatenated
    key and added an automatically generated enrollment_number field that could be
    guaranteed to be always unique?


    Enrollment (enrollment_number, student, course, semester, year, grade)


    Consider the case where a student can only enroll in a course once a semester.
    The enrollment table now has two possible keys: enrollment_number and the combination
    (studentID, course, semester, year). What are the pros and cons of choosing one
    key over the other?


    enrollment_number is shorter than the concatenated key, and you will see in [Chapter
    9](#9781430242093_Ch09.xhtml) that this may be a consideration. However, if we
    make the combination of fields (student, course, semester, year) the key, the
    database will ensure that we never enter duplicate values (i.e., it will impose
    the constraint that a student cannot enroll in the course more than once a semester).
    This will effectively ensure enrollments do not get entered twice accidentally.
    If we choose the enrollment_number as the key, we will need to find another way
    to prevent such duplications.


    An automatically generated number may be a sensible key, but it should not be
    included in a table because we can’t be bothered thinking about alternatives.
    If we don’t think about what values are suitable keys, we may miss discovering
    some subtleties of the problem.


    Representing Relationships


    So far we have represented each class as a table, each attribute as a field with
    a particular type, and decided on a field, or combination of fields with unique
    values, to be a primary key. We can now use this primary key to help us represent
    relationships between the classes in our model.


    Let’s consider our sports club example. A simple data model is shown in [Figure
    7-8](#9781430242093_Ch07.xhtml#F8) with some possible objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9).
    A member may have *one* team that he currently plays for, and each team has exactly
    *one* captain.


    ![9781430242093_Fig07-08.tif](images/9781430242093_Fig07-08_fmt.jpeg)


    [**Figure 7-8**](#9781430242093_Ch07.xhtml#FG8). Sports club data model


    ![9781430242093_Fig07-09.eps](images/9781430242093_Fig07-09_fmt.png)


    [**Figure 7-9**](#9781430242093_Ch07.xhtml#FG9). Members, teams, and instances
    of the relationships between them


    First we design two tables to represent the classes and choose a primary key for
    each. We will adopt the convention of underlining the primary key fields.


    *   Member: (member_ID, last_name, first_name)

    *   Team: (team_name)


    Each of the objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9) will be a row
    in the appropriate table.


    To represent the relationships *plays for* and *is captain of*, we need a way
    of specifying each of the lines between the objects in [Figure 7-9](#9781430242093_Ch07.xhtml#F9).
    For example, we need to show that Bob Jones plays for SeniorB, and the captain
    of JuniorA is Harvey Norton.


    As we have primary keys established, we can easily identify the row associated
    with each object (e.g., Harvey Norton is the row in the Member table where the
    primary key field member_ID has the value 199). To represent the relationship
    between the objects, we use these key values by way of a *foreign key* as described
    in the next section.


    Foreign Keys


    [Figure 7-10](#9781430242093_Ch07.xhtml#F10) shows the two tables Member and Team
    again, but now we have added a field to show who is the captain of each team.
    What we have done is put a new field in the Team table (captain) that will contain
    the key value of the member who is its captain. This is a foreign key. A foreign
    key is a field(s) (in this case captain) that refers to the primary key field(s)
    in some other table (in this case it contains a value of the key field member_ID
    from the table Member). In this way, we establish the relationships between objects
    of different classes.


    ![9781430242093_Fig07-10.eps](images/9781430242093_Fig07-10_fmt.png)


    [**Figure 7-10**](#9781430242093_Ch07.xhtml#FG10). The Team table has a foreign
    key field (captain) referring to the Member table.


    The SQL statement for creating the table Team with a foreign key referring to
    the Member table is shown in [Listing 7-6](#9781430242093_Ch07.xhtml#L6). Many
    products also provide a diagrammatic interface for specifying foreign keys. The
    interface for setting up a foreign key in Access is shown in [Figure 7-11](#9781430242093_Ch07.xhtml#F11).


    ***[Listing 7-6](#9781430242093_Ch07.xhtml#Lis6)**. SQL to Create a Team Table
    with a Foreign Key*


    CREATE TABLE Team (


    team_name VARCHAR(10) PRIMARY KEY,


    captain INT FOREIGN KEY REFERENCES Member


    )


    ![9781430242093_Fig07-11.tif](images/9781430242093_Fig07-11_fmt.jpeg)


    [**Figure 7-11**](#9781430242093_Ch07.xhtml#FG11). Access interface for specifying
    captain is a foreign key referring to the Member table


    The two fields member_ID and captain will both have values from the same domain,
    that is, the set of MemberIDs. Formally, a foreign key and the primary key of
    the table it references must have the same domain. In most database products this
    is softened to requiring them to be the same data type or a compatible data type.
    The types of data that are regarded as compatible will depend on the database
    software being used (e.g., character fields of different lengths are compatible
    in some products, but not in others).


    Referential Integrity


    Arm-in-arm with the idea of a foreign key is the concept of *referential integrity*.
    This is a constraint that says that each *value* in a foreign key field (i.e.,
    199 and 105 in the Team table in [Figure 7-10](#9781430242093_Ch07.xhtml#F10))
    must exist as values in the primary key field of the table being referred to (i.e.,
    199 and 105 must exist as values in the member_ID field in Member). This prevents
    us putting a nonexistent member (say, 765) as the captain of a team. It also means
    that we cannot remove members 199 and 105 from our member table while they are
    captains of teams. As soon as you set up a foreign key, this referential integrity
    constraint is automatically taken care of for you.


    Representing 1–Many Relationships


    In the previous sections, you have seen how it is possible to represent instances
    of a relationship in the data model by using a foreign key. In general, the process
    for a 1–Many relationship is as follows:


    *For a 1–Many relationship, the key field from the table representing the class
    at the 1 end is added as a foreign key in the table representing the class at
    the Many end.*


    We have already represented the relationship *is captain of* in [Figure 7-8](#9781430242093_Ch07.xhtml#F8).
    Let’s now use our general guideline to do the same thing for the relationship
    *plays for* between Member and Team.


    The class at the 1 end is Team, so we take the primary key field from the Team
    table and add it as a new foreign key attribute in the Member table. We can give
    the field any name we like, but it should clearly indicate the relationship it
    is representing, for example current_team. This is shown in [Figure 7-12](#9781430242093_Ch07.xhtml#F12).


    ![9781430242093_Fig07-12.eps](images/9781430242093_Fig07-12_fmt.png)


    [**Figure 7-12**](#9781430242093_Ch07.xhtml#FG12). Both relationships in sports
    club model represented by foreign keys'
  trans: "\n## 表示关系\n\n到目前为止，我们将每个类表示为一个表，每个属性表示为具有特定类型的字段，并确定了一个字段或字段组合作为具有唯一值的**主键**。现在，我们可以利用这个主键来帮助我们表示模型中类之间的关系。\n\
    \n让我们考虑体育俱乐部的例子。一个简单的数据模型如图 7-8 所示，其中一些可能的对象如图 7-9 所示。一个成员可能*只*为*一个*当前效力的球队效力，而每支球队恰好有*一位*队长。\n\
    \n![9781430242093_Fig07-08.tif](img/9781430242093_Fig07-08_fmt.jpeg)\n\n图 7-8.\
    \ 体育俱乐部数据模型\n\n![9781430242093_Fig07-09.eps](img/9781430242093_Fig07-09_fmt.png)\n\
    \n图 7-9. 成员、球队以及它们之间关系的实例\n\n首先，我们设计两个表来表示这些类，并为每个表选择一个主键。我们将采用为主键字段加下划线的约定。\n\
    \n*   Member (成员): (`member_ID`, `last_name`, `first_name`)\n*   Team (球队): (`team_name`)\n\
    \n图 7-9 中的每个对象都将是相应表中的一行。\n\n为了表示 `plays for`（效力于）和 `is captain of`（担任...队长）的关系，我们需要一种方法来指定图\
    \ 7-9 中对象之间的每一条连线。例如，我们需要显示 Bob Jones 效力于 SeniorB 队，而 JuniorA 队的队长是 Harvey Norton。\n\
    \n既然我们已经建立了主键，就可以轻松地识别与每个对象关联的行（例如，Harvey Norton 是 Member 表中主键字段 `member_ID` 值为\
    \ `199` 的那一行）。为了表示对象之间的关系，我们通过下一节将描述的*外键*机制来使用这些键值。\n\n## 外键\n\n图 7-10 再次展示了 Member\
    \ 和 Team 这两个表，但现在我们增加了一个字段来显示每支球队的队长是谁。我们所做的是在 Team 表中添加一个新字段 (`captain`)，它将包含担任队长的成员的键值。这就是一个外键。外键是一个字段（或字段组）（此处是\
    \ `captain`），它引用另一个表（此处是 Member 表）中的主键字段（此处包含来自 Member 表键字段 `member_ID` 的值）。通过这种方式，我们建立了不同类对象之间的关系。\n\
    \n![9781430242093_Fig07-10.eps](img/9781430242093_Fig07-10_fmt.png)\n\n图 7-10.\
    \ Team 表有一个外键字段 (`captain`) 引用 Member 表。\n\n创建带有引用 Member 表的外键的 Team 表的 SQL 语句如清单\
    \ 7-6 所示。许多产品还提供图形化界面来指定外键。在 Access 中设置外键的界面如图 7-11 所示。\n\n清单 7-6. 创建带有外键的 Team\
    \ 表的 SQL\n\n```sql\nCREATE TABLE Team (\n    team_name VARCHAR(10) PRIMARY KEY,\n\
    \    captain INT FOREIGN KEY REFERENCES Member\n)\n```\n\n![9781430242093_Fig07-11.tif](img/9781430242093_Fig07-11_fmt.jpeg)\n\
    \n图 7-11. 在 Access 中指定 `captain` 是引用 Member 表的外键的界面\n\n`member_ID` 和 `captain`\
    \ 这两个字段的值将来自同一个域，即 MemberIDs 集合。形式上，一个外键和它引用的表的主键必须具有相同的域。在大多数数据库产品中，这一要求被放宽为它们必须是相同或兼容的数据类型。被视为兼容的数据类型取决于所使用的数据库软件（例如，在某些产品中，不同长度的字符字段是兼容的，但在其他产品中则不是）。\n\
    \n## 参照完整性\n\n与外键概念相伴而生的是*参照完整性*的概念。这是一个约束，它要求外键字段中的每个*值*（即图 7-10 中 Team 表的 `199`\
    \ 和 `105`）必须作为值存在于被引用表的主键字段中（即 `199` 和 `105` 必须作为值存在于 Member 表的 `member_ID` 字段中）。这可以防止我们将一个不存在的成员（例如\
    \ `765`）设为球队的队长。这也意味着，在成员 `199` 和 `105` 担任球队队长期间，我们不能将他们从成员表中删除。一旦你设置了一个外键，这种参照完整性约束就会自动为你处理好。\n\
    \n## 表示一对多关系\n\n在之前的章节中，你已经看到了如何通过使用外键在数据模型中表示关系的实例。一般来说，处理一对多关系的过程如下：\n\n对于一对多关系，将代表“一”端类的表中的键字段作为外键添加到代表“多”端类的表中。\n\
    \n我们已经在图 7-8 中表示了 `is captain of`（担任...队长）的关系。现在，让我们使用通用准则，为 Member 和 Team 之间的\
    \ `plays for`（效力于）关系做同样的事情。\n\n“一”端的类是 Team，因此我们将 Team 表中的主键字段作为新的外键属性添加到 Member\
    \ 表中。我们可以给这个字段起任何喜欢的名字，但它应该清楚地表明它所代表的关系，例如 `current_team`（当前球队）。这如图 7-12 所示。\n\
    \n![9781430242093_Fig07-12.eps](img/9781430242093_Fig07-12_fmt.png)\n\n图 7-12.\
    \ 体育俱乐部模型中的两个关系都通过外键表示\n"
- fmt: '## 引用完整性


    引用完整性是通过将 `current_team` 字段设置为外键实现的，它确保输入 `current_team` 的值能在 `Team` 表的主键列（`team_name`）中找到。这保证了成员只能为已存在于
    `Team` 表中的球队效力。


    请注意，外键字段可以为空。Grant Brown 不属于任何球队，因此他记录中的外键字段没有值。这与[图 7-8](#9781430242093_Ch07.xhtml#F8)
    中“效力于”关系的可选性一致。如果该关系不是可选的，我们就必须对该字段施加额外的约束，不允许为空值。如果我们想确保每支球队都有队长（正如数据模型所示），那么除了将
    `Team` 表中的 `captain` 字段设为外键外，我们还需要指定它永远不能为空。


    ## 自关系示例


    让我们看另一个一对多关系的例子——这次是一个自关系。我们将考虑这样一种情况：一个成员赞助其他希望获得俱乐部会员资格的成员。数据模型的相关部分如[图 7-13](#9781430242093_Ch07.xhtml#F13)所示，一些对象及其关系如[图
    7-14](#9781430242093_Ch07.xhtml#F14)所示。


    ![9781430242093_Fig07-13.tif](images/9781430242093_Fig07-13_fmt.jpeg)


    [图 7-13](#9781430242093_Ch07.xhtml#FG13). 自关系：成员赞助其他成员。


    ![9781430242093_Fig07-14.eps](images/9781430242093_Fig07-14_fmt.png)


    [图 7-14](#9781430242093_Ch07.xhtml#FG14). 互相赞助的成员实例


    这种自关系是一个一对多关系，我们处理它的方式与处理任何其他一对多关系完全相同。我们从代表关系“一”端的类对应的表中取出主键（`member_ID`），并将其作为外键添加到代表关系“多”端的类对应的表（`Member`）中。即使这是同一个表也没有关系。我们为这个新的外键字段起一个描述关系的名字，比如
    `sponsor`，该表将如[图 7-15](#9781430242093_Ch07.xhtml#F15)所示。


    ![9781430242093_Fig07-15.tif](images/9781430242093_Fig07-15_fmt.jpeg)


    [图 7-15](#9781430242093_Ch07.xhtml#FG15). 代表自关系的外键 (`sponsor`)


    `Member` 表有一个外键 `sponsor`，引用其自身表。Jim Smith 由成员 118（即 Bob Jones）赞助。与主键不同，外键如 `sponsor`
    没有必须唯一的限制。在[图 7-15](#9781430242093_Ch07.xhtml#F15) 中，我们可以看到 118（Bob Jones）正在赞助多名成员。引用完整性确保成员只能由已经是会员的人赞助。如果关系是强制性的，也就是说我们在
    `sponsor` 字段上添加了不允许为空的约束，就会有点问题。当没有现有成员可以赞助她时，你如何将第一个成员录入数据库呢？这不只是一个数据库问题，它实际上是我们问题描述的一部分。所有新成员都需要一个赞助人，但创始成员呢？让
    `sponsor` 字段成为必填项可能不是一个好主意。


    ## 表示多对多关系


    你可能还记得在[第 4 章](#9781430242093_Ch04.xhtml)中，多对多关系并不像你最初想象的那么常见。它们通常表明问题的某些信息最初被忽略了，需要一个中间类来存储这些信息。然而，当我们拥有同时属于许多类别的对象时，它们确实会真实存在。[图
    7-16](#9781430242093_Ch07.xhtml#F16) 和 [7-17](#9781430242093_Ch07.xhtml#F17) 回顾了来自[第
    2 章](#9781430242093_Ch02.xhtml)的植物数据库，那里我们有适用于多种用途的植物物种。


    ![9781430242093_Fig07-16.tif](images/9781430242093_Fig07-16_fmt.jpeg)


    [图 7-16](#9781430242093_Ch07.xhtml#FG16). 植物数据库的数据模型


    ![9781430242093_Fig07-17.eps](images/9781430242093_Fig07-17_fmt.png)


    [图 7-17](#9781430242093_Ch07.xhtml#FG17). 一些物种及其用途的示例


    我们该如何表示这种关系的所有实例呢？外键不再管用，因为我们永远不知道一个特定物种会有多少用途，也不知道一个特定用途会关联多少物种。为了在关系数据库中处理这个问题，我们必须在数据模型中引入一个新的中间类。在[第
    4 章](#9781430242093_Ch04.xhtml)中，当我们有一些需要新类的附加信息时，你已经看到了如何做到这一点。在这种多对多的情况下，新的中间类将没有任何属性，因为我们对特定的
    `Species` 和 `Use` 组合没有需要了解的信息。我们使用这个新类 (`Species_Use`) 只是为了存储所有相关的 `Use` 和 `Species`
    配对。如同[第 4 章](#9781430242093_Ch04.xhtml)一样，新类通过两个一对多关系连接到现有类，如[图 7-18](#9781430242093_Ch07.xhtml#F18)所示。我们可以这样解读该图：“每个
    `Species_Use` 对象（或配对）恰好包含一个物种和一个用途。”


    ![9781430242093_Fig07-18.tif](images/9781430242093_Fig07-18_fmt.jpeg)


    [图 7-18](#9781430242093_Ch07.xhtml#FG18). 在关系数据库中添加另一个类来表示多对多关系


    现在，这两个一对多关系可以像处理其他任何一对多关系一样处理了。首先，我们需要为我们的新类创建一个表 `Species_Use`。然后，对于每一个一对多关系，我们将代表关系“一”端的类对应的表中的主键字段作为外键添加到代表关系“多”端的类对应的表中。这意味着在
    `Species_Use` 表中添加两个新的外键属性：`species` 和 `use`。这些外键将分别引用 `Species` 和 `Use` 表。包含一些数据的结果表如[图
    7-19](#9781430242093_Ch07.xhtml#F19)所示。


    ![9781430242093_Fig07-19.eps](images/9781430242093_Fig07-19_fmt.png)


    [图 7-19](#9781430242093_Ch07.xhtml#FG19). 使用带有两个外键的附加表来表示多对多关系


    我们现在必须为新的 `Species_Use` 表确定一个主键。两个外键字段（`speciesID`, `use`）的组合可以做到这一点。在多对多关系中引入中间表的情况下，这种将外键组合形成主键的做法很常见。


    ## 表示一对一关系


    在之前的所有章节中，我们最终总是将关系“一”端的主键字段作为外键放在另一端的表中。如果关系的两端基数都是 1，我们应该以哪种方式来做呢？


    我们的成员和球队的例子中有一个一对一关系：*担任…的队长*。数据模型的那部分如[图 7-20](#9781430242093_Ch07.xhtml#F20)所示。


    ![9781430242093_Fig07-20.tif](images/9781430242093_Fig07-20_fmt.jpeg)


    [图 7-20](#9781430242093_Ch07.xhtml#FG20). “担任…的队长”是一个一对一关系。


    问题是将 `member_ID` 作为外键放在 `Team` 表中，还是将 `team_name` 作为外键放在 `Member` 表中。这两种方案生成的表如[图
    7-21](#9781430242093_Ch07.xhtml#F21)所示。


    ![9781430242093_Fig07-21.eps](images/9781430242093_Fig07-21_fmt.png)


    [图 7-21](#9781430242093_Ch07.xhtml#FG21). 表示一对一关系的两种方式


    两种表都表示了相同的信息。我们绝不能同时采用两种方式，否则可能会导致数据不一致。例如，根据 `Member` 表，可能是 Bob 担任 SeniorB 队的队长，而根据
    `Team` 表，却是 Jim 担任队长。


    ```

    Member 表：Bob 是 SeniorB 的队长。

    Team 表：SeniorB 的队长是 Jim。（数据不一致）

    ```'
  raw: 'Referential integrity, which is a result of making the current_team field
    a foreign key, will ensure that the value entered in current_team can be found
    in the primary column (team_name) of the Team table. This ensures that members
    can only play for teams that already exist in the Team table.


    Note that a foreign key field can be null. Grant Brown does not belong to a team,
    so there is no value in the foreign key field in his record. This is consistent
    with the optionality of the *plays for* relationship in the class diagram back
    in [Figure 7-8](#9781430242093_Ch07.xhtml#F8). If the relationship was not optional,
    we would have to impose an additional constraint on the field to say that nulls
    were not permitted. If we wanted to ensure that every team had a captain (as the
    data model suggests), then as well as making the captain field in the Team table
    a foreign key, we would also specify that it cannot ever be null.


    Let’s look at another example of a 1–Many relationship—this time a self relationship.
    We will consider the case where a member sponsors other members who wish to obtain
    membership with the club. The relevant part of the data model is shown in [Figure
    7-13](#9781430242093_Ch07.xhtml#F13), and some objects and their relationships
    are shown in [Figure 7-14](#9781430242093_Ch07.xhtml#F14).


    ![9781430242093_Fig07-13.tif](images/9781430242093_Fig07-13_fmt.jpeg)


    [**Figure 7-13**](#9781430242093_Ch07.xhtml#FG13). Self relationship: Member sponsors
    other members.


    ![9781430242093_Fig07-14.eps](images/9781430242093_Fig07-14_fmt.png)


    [**Figure 7-14**](#9781430242093_Ch07.xhtml#FG14). Instances of members who sponsor
    each other


    This self relationship is a 1–Many relationship, and we do exactly the same as
    we do for any other 1–Many relationship. We take the key from the table representing
    the class at the 1 end (member_ID) and add it as a foreign key to the table representing
    the class at the Many end (Member). It makes no difference that it is the same
    table. We give the new foreign key field a name that describes the relationship,
    say *sponsor*, and the table will look like that in [Figure 7-15](#9781430242093_Ch07.xhtml#F15).


    ![9781430242093_Fig07-15.tif](images/9781430242093_Fig07-15_fmt.jpeg)


    [**Figure 7-15**](#9781430242093_Ch07.xhtml#FG15). A foreign key (sponsor) representing
    a self relationship


    The table Member has a foreign key, sponsor, referencing its own table. Jim Smith
    is sponsored by member 118, who is Bob Jones. Unlike a primary key, there is no
    restriction that a foreign key such as sponsor must be unique. In [Figure 7-15](#9781430242093_Ch07.xhtml#F15)
    we can see that 118 (Bob Jones) is sponsoring several members. Referential integrity
    ensures that a member can only be sponsored by someone who is already a member.
    There is a bit of a problem if the relationship is compulsory, which means we
    add a constraint not to allow nulls in the sponsor field. How do you ever get
    the first member into the database when there is no existing member to sponsor
    her? This isn’t just a database problem, it is actually part of our problem description.
    All new members need a sponsor, but what about the founding members? Making the
    sponsor field required is probably not a good idea.


    Representing Many–Many Relationships


    You may remember from [Chapter 4](#9781430242093_Ch04.xhtml) that Many–Many relationships
    are not as common as you might at first expect. Often they are a sign that some
    information about the problem has been initially overlooked, and an intermediate
    class is required to store that information. They do, however, genuinely occur
    where we have objects that simultaneously belong in many categories. [Figures
    7-16](#9781430242093_Ch07.xhtml#F16) and [7-17](#9781430242093_Ch07.xhtml#F17)
    review the plant database from [Chapter 2](#9781430242093_Ch02.xhtml) where we
    had species of plants that were suitable for a variety of uses.


    ![9781430242093_Fig07-16.tif](images/9781430242093_Fig07-16_fmt.jpeg)


    [**Figure 7-16**](#9781430242093_Ch07.xhtml#FG16). Data model for plant database


    ![9781430242093_Fig07-17.eps](images/9781430242093_Fig07-17_fmt.png)


    [**Figure 7-17**](#9781430242093_Ch07.xhtml#FG17). Some examples of species and
    their uses


    How are we to represent all the instances of this relationship? Foreign keys will
    no longer do the trick, as we will never know how many uses a particular species
    will have, nor how many species will be related to a particular use. To deal with
    this in a relational database, we have to introduce a new intermediate class in
    our data model. You saw how to do this in [Chapter 4](#9781430242093_Ch04.xhtml)
    when we had some additional information that required a new class. In this Many–Many
    situation, the new intermediate class will not have any attributes, as there is
    nothing we wish to know about a particular combination of Species and Use. We
    use the new class (Species_Use) simply to store all the relevant pairings of Use
    and Species. As in [Chapter 4](#9781430242093_Ch04.xhtml), the new class connects
    to the existing classes with two 1–Many relationships as shown in [Figure 7-18](#9781430242093_Ch07.xhtml#F18).
    We can interpret the diagram as: “Each Species_Use object (or pairing) consists
    of exactly one species and exactly one use.”


    ![9781430242093_Fig07-18.tif](images/9781430242093_Fig07-18_fmt.jpeg)


    [**Figure 7-18**](#9781430242093_Ch07.xhtml#FG18). Adding another class to represent
    a Many–Many relationship in a relational database


    The two 1–Many relationships can now be dealt with like any other 1–Many relationship.
    First we need to create a table, Species_Use, for our new class. Then for each
    of the 1–Many relationships, we add the primary key field from the table representing
    the class at the 1 end as a foreign key in the table representing the class at
    the Many end. This means adding two new foreign key attributes, species and use,
    to the Species_Use table. These foreign keys will reference the Species and Use
    tables, respectively. The resulting tables with some data are shown in [Figure
    7-19](#9781430242093_Ch07.xhtml#F19).


    ![9781430242093_Fig07-19.eps](images/9781430242093_Fig07-19_fmt.png)


    [**Figure 7-19**](#9781430242093_Ch07.xhtml#FG19). Representing a Many–Many relationship
    with an additional table with two foreign keys


    We now have to decide on a primary key for the new Species_Use table. The combination
    of the two foreign key fields (speciesID, use) will do the trick. This combining
    of foreign keys to form a primary key is often the case in the situation where
    an intermediate table has been introduced in a Many–Many relationship.


    Representing 1–1 Relationships


    In all of the previous sections, we have always ended up taking the primary key
    field at the 1 end of the relationship and using it as a foreign key in the table
    at the other end. If both ends of the relationship have a cardinality of 1, which
    way around should we do this?


    Our example of members and teams had a 1–1 relationship: *is captain of*. That
    part of the data model is shown in [Figure 7-20](#9781430242093_Ch07.xhtml#F20).


    ![9781430242093_Fig07-20.tif](images/9781430242093_Fig07-20_fmt.jpeg)


    [**Figure 7-20**](#9781430242093_Ch07.xhtml#FG20). Is captain of is a 1–1 relationship.


    The question is whether to put member_ID as a foreign key in the Team table or
    team_name as a foreign key in the Member table. The resulting tables for these
    alternatives are shown in [Figure 7-21](#9781430242093_Ch07.xhtml#F21).


    ![9781430242093_Fig07-21.eps](images/9781430242093_Fig07-21_fmt.png)


    [**Figure 7-21**](#9781430242093_Ch07.xhtml#FG21). Alternative ways to represent
    the 1–1 relationship


    The same information is represented in both tables. We mustn’t do both simultaneously,
    as we might end up with inconsistent data. For example, we could end up with Bob
    being captain of SeniorB according to the Member table, but Jim being the captain
    according to the Team table.'
  trans: '

    ## 引用完整性


    引用完整性是通过将 `current_team` 字段设置为外键实现的，它确保输入 `current_team` 的值能在 `Team` 表的主键列（`team_name`）中找到。这保证了成员只能为已存在于
    `Team` 表中的球队效力。


    请注意，外键字段可以为空。Grant Brown 不属于任何球队，因此他记录中的外键字段没有值。这与图 7-8 中“效力于”关系的可选性一致。如果该关系不是可选的，我们就必须对该字段施加额外的约束，不允许为空值。如果我们想确保每支球队都有队长（正如数据模型所示），那么除了将
    `Team` 表中的 `captain` 字段设为外键外，我们还需要指定它永远不能为空。


    ## 自关系示例


    让我们看另一个一对多关系的例子——这次是一个自关系。我们将考虑这样一种情况：一个成员赞助其他希望获得俱乐部会员资格的成员。数据模型的相关部分如图 7-13
    所示，一些对象及其关系如图 7-14 所示。


    ![9781430242093_Fig07-13.tif](img/9781430242093_Fig07-13_fmt.jpeg)


    图 7-13. 自关系：成员赞助其他成员。


    ![9781430242093_Fig07-14.eps](img/9781430242093_Fig07-14_fmt.png)


    图 7-14. 互相赞助的成员实例


    这种自关系是一个一对多关系，我们处理它的方式与处理任何其他一对多关系完全相同。我们从代表关系“一”端的类对应的表中取出主键（`member_ID`），并将其作为外键添加到代表关系“多”端的类对应的表（`Member`）中。即使这是同一个表也没有关系。我们为这个新的外键字段起一个描述关系的名字，比如
    `sponsor`，该表将如图 7-15 所示。


    ![9781430242093_Fig07-15.tif](img/9781430242093_Fig07-15_fmt.jpeg)


    图 7-15. 代表自关系的外键 (`sponsor`)


    `Member` 表有一个外键 `sponsor`，引用其自身表。Jim Smith 由成员 118（即 Bob Jones）赞助。与主键不同，外键如 `sponsor`
    没有必须唯一的限制。在图 7-15 中，我们可以看到 118（Bob Jones）正在赞助多名成员。引用完整性确保成员只能由已经是会员的人赞助。如果关系是强制性的，也就是说我们在
    `sponsor` 字段上添加了不允许为空的约束，就会有点问题。当没有现有成员可以赞助她时，你如何将第一个成员录入数据库呢？这不只是一个数据库问题，它实际上是我们问题描述的一部分。所有新成员都需要一个赞助人，但创始成员呢？让
    `sponsor` 字段成为必填项可能不是一个好主意。


    ## 表示多对多关系


    你可能还记得在第 4 章中，多对多关系并不像你最初想象的那么常见。它们通常表明问题的某些信息最初被忽略了，需要一个中间类来存储这些信息。然而，当我们拥有同时属于许多类别的对象时，它们确实会真实存在。图
    7-16 和 7-17 回顾了来自第 2 章的植物数据库，那里我们有适用于多种用途的植物物种。


    ![9781430242093_Fig07-16.tif](img/9781430242093_Fig07-16_fmt.jpeg)


    图 7-16. 植物数据库的数据模型


    ![9781430242093_Fig07-17.eps](img/9781430242093_Fig07-17_fmt.png)


    图 7-17. 一些物种及其用途的示例


    我们该如何表示这种关系的所有实例呢？外键不再管用，因为我们永远不知道一个特定物种会有多少用途，也不知道一个特定用途会关联多少物种。为了在关系数据库中处理这个问题，我们必须在数据模型中引入一个新的中间类。在第
    4 章中，当我们有一些需要新类的附加信息时，你已经看到了如何做到这一点。在这种多对多的情况下，新的中间类将没有任何属性，因为我们对特定的 `Species`
    和 `Use` 组合没有需要了解的信息。我们使用这个新类 (`Species_Use`) 只是为了存储所有相关的 `Use` 和 `Species` 配对。如同第
    4 章一样，新类通过两个一对多关系连接到现有类，如图 7-18 所示。我们可以这样解读该图：“每个 `Species_Use` 对象（或配对）恰好包含一个物种和一个用途。”


    ![9781430242093_Fig07-18.tif](img/9781430242093_Fig07-18_fmt.jpeg)


    图 7-18. 在关系数据库中添加另一个类来表示多对多关系


    现在，这两个一对多关系可以像处理其他任何一对多关系一样处理了。首先，我们需要为我们的新类创建一个表 `Species_Use`。然后，对于每一个一对多关系，我们将代表关系“一”端的类对应的表中的主键字段作为外键添加到代表关系“多”端的类对应的表中。这意味着在
    `Species_Use` 表中添加两个新的外键属性：`species` 和 `use`。这些外键将分别引用 `Species` 和 `Use` 表。包含一些数据的结果表如图
    7-19 所示。


    ![9781430242093_Fig07-19.eps](img/9781430242093_Fig07-19_fmt.png)


    图 7-19. 使用带有两个外键的附加表来表示多对多关系


    我们现在必须为新的 `Species_Use` 表确定一个主键。两个外键字段（`speciesID`, `use`）的组合可以做到这一点。在多对多关系中引入中间表的情况下，这种将外键组合形成主键的做法很常见。


    ## 表示一对一关系


    在之前的所有章节中，我们最终总是将关系“一”端的主键字段作为外键放在另一端的表中。如果关系的两端基数都是 1，我们应该以哪种方式来做呢？


    我们的成员和球队的例子中有一个一对一关系：*担任…的队长*。数据模型的那部分如图 7-20 所示。


    ![9781430242093_Fig07-20.tif](img/9781430242093_Fig07-20_fmt.jpeg)


    图 7-20. “担任…的队长”是一个一对一关系。


    问题是将 `member_ID` 作为外键放在 `Team` 表中，还是将 `team_name` 作为外键放在 `Member` 表中。这两种方案生成的表如图
    7-21 所示。


    ![9781430242093_Fig07-21.eps](img/9781430242093_Fig07-21_fmt.png)


    图 7-21. 表示一对一关系的两种方式


    两种表都表示了相同的信息。我们绝不能同时采用两种方式，否则可能会导致数据不一致。例如，根据 `Member` 表，可能是 Bob 担任 SeniorB 队的队长，而根据
    `Team` 表，却是 Jim 担任队长。


    ```

    Member 表：Bob 是 SeniorB 的队长。

    Team 表：SeniorB 的队长是 Jim。（数据不一致）

    ```

