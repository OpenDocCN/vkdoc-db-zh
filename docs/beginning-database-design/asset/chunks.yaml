    \ 具有命名空间的概念，因此所有元素都可以被唯一标识。清单 12-7 中的第二行代码表明，任何以`xs`为前缀的定义都来自我们大学的这个定义。其余代码说明`course`是一个由`code`和`title`序列组成的复杂类型，两者都是字符串（或字符类型）。\n\
    \n***清单 12-7**. 非常基础的课程 XSD*\n\n```xml\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"\
    http://university\">\n  <xs:element name=\"course\">\n    <xs:complexType>\n \
    \     <xs:sequence>\n        <xs:element name=\"code\" type=\"xs:string\"/>\n\
    \        <xs:element name=\"title\" type=\"xs:string\"/>\n      </xs:sequence>\n\
    \    </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\n`XSD`是一个庞大的语言，它允许你定义值的约束、指定基数（例如，一个学生可能拥有的最少和最多课程数）、指定默认值、声明元素必须具有唯一值等等。完整规范可以在\
    \ [`www.w3.org/XML/Schema`](http://www.w3.org/XML/Schema) 找到。本质上，它允许你指定等同于数据库表的结构，但使用的是平台无关的文本文档。它对于在应用程序之间传输模式描述非常有用。\n\
    \n## 查询 XML\n\n本节关于查询`XML`数据的内容仅旨在简要介绍其可能性，并指引你获取更多信息。请参考清单 12-8 中一些学生数据的`XML`描述。\n\
    \n***清单 12-8**. 描述一些学生数据的 XML*\n\n```xml\n<?xml version=\"1.0\"?>\n<university>\n\
    \  <student>\n    <studentID>15673</studentID>\n    <last_name>Smith</last_name>\n\
    \    <first_name>Jim</first_name>\n    <age>18</age>\n  </student>\n  <student>\n\
    \    <studentID>23543</studentID>\n    <last_name>Green</last_name>\n    <first_name>Ruby</first_name>\n\
    \    <age>22</age>\n  </student>\n</university>\n```\n\n这种分层结构意味着我们可以解析文本来查找符合特定条件的学生。`XPath`是一种简洁的语言，允许遍历层次结构以检索满足不同条件的元素。例如，清单\
    \ 12-9 中的`XPath`代码将检索所有年龄超过 20 岁的学生的姓氏。\n\n***清单 12-9**. 检索年龄超过 20 岁的学生的姓氏的 XPath\
    \ 表达式*\n\n```\n/university/student[age>20]/last_name\n```\n\n该代码将遍历`university`树，找到所有定义为`student`的元素，然后找到他们的`last_name`——但仅限于满足`age`元素值大于\
    \ 20 这一条件的记录。`XQuery`是`XPath`的扩展，它允许以各种方式（例如，按字母顺序排序）转换结果，甚至允许在数据集之间进行等同于连接（`join`）的操作。`XPath`和`XQuery`的规范可以在\
    \ [`www.w3.org/standards/xml/`](http://www.w3.org/standards/xml/) 找到。\n\n## NoSQL\n\
    \n本书重点关注小型数据库。我们特别关注高度结构化的数据，其中重点在于能够检索不同类型的信息。这只是整个数据库世界中的一小部分。互联网催生了巨大的数据集，这些数据通常需要存储在横跨各大洲的数百台计算机上。高度结构化的数据模型及其在关系型或`SQL`数据库中的表示方式并不是管理此类数据的有效方法。\n\
    \n`NoSQL`数据库提供了一种结构化程度较低的方式来管理大量数据。一个例子是键值数据库。键数据（比如一个字符串）被存储且可搜索，值则是指向可以找到其余数据的位置的引用。对于数据的结构方式没有约束，因此这些数据库非常灵活。其他例子包括文档数据库和大表数据库（其中所有行可以具有不同的结构）。虽然这些类型的数据库在存储大量数据方面有许多优势，但缺点在于查询的难易程度以及发现不同数据片段之间联系的能力。没有严格的结构，你无法拥有`SQL`中可用的操作，如连接（`join`）。这种逻辑通常在`NoSQL`数据库中通过前端编程来处理。图数据库可以通过维护数据项之间的链接来反映不同数据片段之间的关联。同样，实际数据可以以任何方式结构化，而预设的链接可以在数据项之间提供快速访问。临时查询是困难的。\n\
    \n`SQL`数据库为结构良好的数据提供了高效的存储和查询。`NoSQL`数据库则提供了管理大量不同类型数据的灵活方式。\n\n## 总结\n\n在本章中，我们探讨了使用关系型数据库之外的替代方案来表示数据模型。\n\
    \n## 面向对象数据库\n\n面向对象数据库在处理复杂数据类型（例如姓名和地址）、方法（例如输出不同格式的名称）以及准确表示继承方面，相比关系型数据库具有许多优势。缺点在于复杂的查询可能更难建立。\n\
    \n要在面向对象语言或数据库中表示数据模型：\n"
- fmt: '# 数据存储与表示


    ## 面向对象数据库设计注意事项


    *   为每个类定义一个类。

    *   考虑为复杂数据类型（如地址或名称）创建类。

    *   考虑向类添加方法（例如，用于格式化地址或执行计算）。

    *   思考用户将如何识别对象（等同于主键）。

    *   对于关系中的“多”端，包含一个集合，该集合拥有对多个对象的引用（例如，一个`Customer`将拥有一个包含许多`Order`对象的集合）。

    *   对于关系中的“一”端，包含对特定对象的引用（例如，一个`Order`将拥有一个对单个`Customer`对象的引用）。


    ## Spreadsheets


    电子表格是数据分析和计算的绝佳工具。它们并非真正为存储数据而设计，但由于通常被认为比数据库更简单且更直接有用，因此常被用于此目的。对于具有类之间简单关系的**小型数据模型**，可以设计出既实用又准确的电子表格。


    要在电子表格中表示非常简单的1-多关系：


    *   为每个类创建一个独立的工作表。

    *   创建一个工作表，用于汇集所有信息。

    *   使用精确匹配查找来显示来自其他工作表的信息。

    *   使用数据验证功能来提供工作表之间等同于**参照完整性**的功能。


    在电子表格中表示多-多关系有几种方式：


    *   重复列（适用于验证和报告，但不适用于查询）

    *   将类别作为列（适用于验证、报告和查询）

    *   规范化范围（适用于验证和查询，但报告和易用性较差）


    ## XML


    XML 提供了一种以文本格式表达数据结构以及数据元素值的方法。它对于平台无关的数据规范以及在应用程序之间传输数据描述和值非常有用。


    *   一个简单的 XML 文档是由标签指定的元素树。

    *   我们可以通过利用 XML 树的层次结构来表示关系。例如，学生可以嵌套在课程中，反之亦然。

    *   多-多关系也可以通过定义三个复杂的 XML 元素来表示，例如学生（students）、课程（courses）和注册（enrollments）（类似于关系数据库中用于表示多-多关系的表）。

    *   文档类型定义（DTD）和 XML 模式定义（XSD）可用于定义数据的结构。

    *   XPath 和 XQuery 是两种能够从 XML 文档中检索特定元素的语言。


