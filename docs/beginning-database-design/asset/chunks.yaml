    SQL 语句获得相同的结果。如何实现这一点超出了本入门介绍的范围，但可以在我的《SQL 查询》书中找到。重要的是要知道，你的关系数据库系统将允许你编写 SQL
    语句来检索等价于图 10-11 中每个集合操作的行。


    ## 索引如何提供帮助


    许多查询需要连接多个表、提取特定的行和列，并可能按指定的顺序呈现结果。随着表变得越来越大，这些操作显然会变得更加耗时。索引是一种能够快速找到数据库表中特定行的方法。


    ![images](img/sq.jpg) 注意 这是关于索引如何帮助查询执行的一个非常简短的介绍。如果你负责为大型数据库创建索引，你需要阅读更多关于这个主题的资料。诸如
    *Expert Indexing in Oracle Database 11g* (Apress, 2012) 和 *Expert Performance
    Indexing for SQL Server 2012* (Apress, 2012) 之类的书籍可以提供帮助。


    根据你使用的数据库软件，你可能会发现你的表默认被添加了许多索引。规划有用的索引还有几个考虑因素：


    *   你是在更新数据还是检索数据；

    *   你检索的是非常通用还是非常具体的数据；

    *   涉及连接的表的相对大小；

    *   表中行的大小；

    *   无数其他难以预料的因素。


    我在此不打算讨论这些问题。希望本章能让你意识到索引的作用，这样你就可以开始学习更多知识，并与你的数据库管理员进行有益的讨论。


    ## 索引与简单查询


    让我们从查看对单个表（如图 10-12 中的 `Enrollment` 表）的简单查询开始。我们将需要为不同的目的检索行的不同子集。


    ![9781430242093_Fig10-12.tif](img/9781430242093_Fig10-12_fmt.jpeg)


    **图 10-12**. 一个潜在非常大的表的一小部分


    我们很可能会希望通过 `course` 来访问此表（以便检索选修特定班级的学生），而在其他时候通过 `studentID`（以获取学生记录）。索引帮助我们高效地完成这两项任务。数据库索引的作用非常类似于你在书后找到的索引。例如，如果你在名称上有一个索引，它会按字母顺序存储
    `name` 字段的所有值，并在其他地方存储指向完整记录的指针或引用。这个引用就像在书的索引中存储页码一样。图 10-13 展示了你如何设想 `Enrollment`
    表上的索引。


    ![9781430242093_Fig10-13.eps](img/9781430242093_Fig10-13_fmt.png)


    **图 10-13**. `Enrollment` 表上的两个索引

    '
- fmt: '# 索引如何提升查询速度


    如果我们想要一门课程 `COMP101` 的选课名单，系统可以快速搜索课程索引来找到 `COMP101` 的条目。该索引还包含指向 `Enrollment`
    表中完整行的引用，因此系统可以快速定位其余信息。或者，如果我们需要记录学生 `17625` 的进度，我们可以使用学生索引来快速访问该学生的相应记录。


    [清单 10-15](#9781430242093_Ch10.xhtml#L15) 展示了在 `Enrollment` 表的 `student` 和 `course`
    字段上创建两个索引的 SQL 语句。


    ### 清单 10-15. 在 `Enrollment` 表上创建两个索引

    ```sql

    CREATE INDEX IDX_student ON Enrollment (studentID)

    CREATE INDEX IDX_course ON Enrollment (course)

    ```


    让我们看另一个使用 `Student` 表的例子，如图 [10-14](#9781430242093_Ch10.xhtml#F14) 所示。


    ![9781430242093_Fig10-14.tif](images/9781430242093_Fig10-14_fmt.jpeg)


    **图 10-14**. `Student` 表


    在 `Student` 表中，主键字段是 `studentID`。当我们指定一个字段为主键时，大多数数据库会自动为该字段创建一个索引。该索引将被指定为 `unique`（唯一），这意味着只能包含每个值的一个条目。这个索引就是主键约束在物理上的实现方式。当我们在表中添加新行时，系统会快速搜索索引，查看主键值是否已经存在，如果存在则拒绝新行。


    对于 `Student` 表，我们经常需要做的两件事是按姓名查找特定学生，以及按字母顺序检索学生。由于表中可能有数千个条目，我们不希望为了查找某个学生姓名而扫描整个表，因此某种涉及姓名的索引将非常有用。如果我们只是想查找某个特定学生，对
    `last_name` 字段建立索引会加快速度，因为所有的史密斯姓氏会排在一起，并且需要扫描的记录更少。为了进一步改善访问，我们可以设置一个复合索引，其中姓氏有序排列，对于重复的姓氏则按名字排序。如果需要按字母顺序访问表记录，这个索引可以非常快速地完成。创建复合索引的
    SQL 如 [清单 10-16](#9781430242093_Ch10.xhtml#L16) 所示。


    ### 清单 10-16. 在 `Student` 表上创建一个复合索引

    ```sql

    CREATE INDEX IDX_fullName ON Student (last_name, first_name)

    ```


    `Student` 表中另一个可能适合建立索引的字段是 `degree` 字段。这很可能是一个外键，引用另一个包含不同学位信息的表 `Degree`。对外键字段建立索引的一个原因是为了加速对其引用的表进行的更新。例如，如果
    `Degree` 表中的某一行被标记为删除，则需要检查它是否被 `Student` 表引用。由于 `Student` 表可能变得很大，如果没有 `degree`
    字段上的索引，查找任何引用 `Degree` 表的行可能会很慢。外键字段也经常参与连接条件，适当的索引也有助于在这种情况下找到匹配的行。


    总之，索引可以帮助我们加速那些需要查找特定记录集的 `select` 查询（例如，`Enrollment` 表中学生 `17625` 的所有行），或者查找特定记录（例如，根据姓名查找学生）。它们有时也对加速带有
    `ORDER BY` 子句的查询有用，并且外键上的索引可以加快对引用表的更新以及连接的执行。


    ## 索引的缺点


    显然，索引对于加速查询非常有用。然而，在我们过于热衷并开始为所有列创建索引之前，我们需要考虑其缺点。


    让我们看看 `Enrollment` 表及其两个索引（一个在 `studentID`，一个在 `course`）会发生什么。这个表可能会非常庞大，这两个索引将加速检索特定学生记录或选课名单的行。但是，当我们向表中添加新行时会发生什么？系统不仅需要添加实际的行，还需要更新两个索引。这将涉及在每个索引中找到正确的位置，插入一个条目，并添加对新行的引用。删除行时也需要类似的过程。数据库系统在管理索引方面实际上相当聪明，但尽管如此，仍然存在性能成本。


    数据库管理员需要仔细权衡更新记录时降低的性能与检索记录时提升的性能。在选课场景中，检索操作很可能每天都在发生，而新的选课可能只在每个学期开始时录入。检索性能的提升可能会超过数据维护性能的任何损失。然而，在超市收银台的情况又如何呢？每次进行购买时，都可能向数据库表中插入一条记录。每小时成千上万的更新，这需要尽可能高效。如果每次购买都必须更新该表上的几个索引，可能会显著降低性能。相比之下，从表中检索信息（如总计和摘要）可能可以在夜间或不太繁忙、速度不那么关键的时候进行。


    ## 索引类型


    到目前为止我们讨论的索引都是所谓的 `nonclustered`（非聚集）索引。非聚集索引是指我们仅按顺序保存一个（或几个）字段的值，并附带对完整行的引用，而完整行则保存在其他地方。非聚集索引可以被指定为
    `unique`（唯一），这意味着任何条目都不能重复。当我们声明一个字段具有唯一约束时（如我们在上一章所做），系统很可能会构建一个唯一的非聚集索引来管理该约束。一个表应该始终至少有一个唯一索引，那就是其主键字段上的索引；这是系统确保主键值对于每一行都不同的方式。如果看起来合理，一个表也可以有其他几个非聚集索引。


    另一种索引类型是 `clustered`（聚集）索引。聚集索引影响记录或行在磁盘上的物理存储方式。当我们请求数据库系统为我们查找记录时，它会检索一个通常包含多条记录的磁盘区域。如果我们经常需要同时获取的记录在物理上存储在一起，这将加快速度。例如，如果我们经常需要按名称顺序获取客户信息，那么按该顺序将所有记录存储在磁盘上可能会很有用。显然，一个表只能有一个聚集索引。如果我们不指定聚集索引，同时添加的行可能会存储在彼此附近，但我们不能依赖这一点。聚集索引包含表中的所有数据，而非聚集索引仅包含索引字段和对表的引用。这意味着在索引中找到所需值后，在表中查找其余信息会有一些开销。'
  raw: 'If we want a class list for COMP101, the system can quickly search the course
    index to find the COMP101 entries. The index also contains a reference to the
    full row in the Enrollment table so the system can quickly locate the rest of
    the information. Alternatively, if we need a record of student 17625’ s progress,
    we can use the student index to quickly access the appropriate records for that
    student.


    [Listing 10-15](#9781430242093_Ch10.xhtml#L15) shows the SQL statements to create
    the two indexes on the student and course fields of the Enrollment table.


    ***[Listing 10-15.](#9781430242093_Ch10.xhtml#Lis15)** Creating Two Indexes on
    the Enrollment Table*


    CREATE INDEX IDX_student ON Enrollment (studentID)


    CREATE INDEX IDX_course ON Enrollment (course)


    Let’s look at another example using the Student table in [Figure 10-14](#9781430242093_Ch10.xhtml#F14).


    ![9781430242093_Fig10-14.tif](images/9781430242093_Fig10-14_fmt.jpeg)


    [**Figure 10-14**](#9781430242093_Ch10.xhtml#FG14). Student table


    In the Student table, the primary key field is studentID. When we specify a field
    as a primary key, most databases will automatically create an index for that field.
    The index will be specified as being *unique*, meaning that only one entry for
    each value can be included. This index is how the primary key constraint is physically
    implemented. When we add a new row to the table, the system quickly searches the
    index to see whether the primary key value is already there, and if so it rejects
    the new row.


    With the Student table, two things that we will regularly want to do are find
    a particular student by name and retrieve students in alphabetical order. As the
    table is likely to have several thousands of entries, we do not want to have to
    scan the entire table looking for a particular student’ s name, so some sort of
    index involving names will be useful. If we are just looking for a particular
    student, an index on the field last_name will speed things up, as all the Smiths
    will be together, and there will be fewer records to scan to find the one we want.
    To improve access further, we can set up a compound index in which the last names
    are ordered, and where there are duplicate last names the entries are ordered
    by first name. This index can be used to access the records of the table very
    quickly if they are required to be in alphabetical order. The SQL for creating
    a compound index is shown in [Listing 10-16](#9781430242093_Ch10.xhtml#L16).


    ***[Listing 10-16.](#9781430242093_Ch10.xhtml#Lis16)** Creating a Compound Index
    on the Student Table*


    CREATE INDEX IDX_fullName ON Student (last_name, first_name)


    Another likely candidate for an index in the Student table might be the degree
    field. This is likely to be a foreign key referencing another table, Degree, which
    contains information about the different degrees. One reason for an index on a
    foreign key field is to speed updates for the table to which it refers. For example,
    if a row in the Degree table is marked for deletion it is necessary to see if
    it is being referred to by the Student table. As the Student table is likely to
    become large, it could be slow to find any rows referencing the Degree table if
    there is no index on the degree field. Foreign key fields are also often involved
    in join conditions and appropriate indexes may help find matching rows in this
    situation also.


    In summary, indexes can help us speed up select queries where we want to find
    a particular set of records (e.g., all the rows for student 17625 in the Enrollment
    table) or to find a particular record (e.g., for a student given her names). They
    are also sometimes useful for speeding up queries with an ORDER BY clause, and
    indexes on foreign keys can speed the updating of referenced tables and the execution
    of joins.


    Disadvantages of Indexes


    Clearly, indexes are very useful for speeding up queries. However, before we get
    too carried away and start indexing all our columns, we need to consider any disadvantages.


    Let’ s look at what happens with our Enrollment table and its two indexes, one
    on studentID and one on course. This table is likely to be huge, and these two
    indexes are going to speed up the retrieval of specific rows for a student record
    or a class list. But what happens when we add a new row to the table? The system
    will have to add the actual row, but it will also have to update the two indexes.
    This will involve finding the correct place in each index, inserting an entry
    and adding a reference to the new row. A similar process will be necessary if
    rows are deleted. Database systems are actually pretty clever about how they manage
    indexes, but nevertheless there is a performance cost.


    A database administrator needs to carefully weigh the reduced performance in updating
    records compared with the increased performance of retrieving records. In the
    enrollment case, the retrieval is likely to be happening every day, whereas new
    enrollments are probably only entered at the beginning of each semester. The increased
    performance in retrieval will probably outweigh any loss of performance in data
    maintenance. However, what about the situation at a supermarket checkout? Every
    time a purchase is made, an entry may be made into a database table. With thousands
    of updates an hour, this needs to be as efficient as possible. Maintaining a couple
    of indexes on this table might considerably reduce performance if they had to
    be updated with every purchase. By contrast, retrieving information from the table
    (such as totals and summaries) can probably be done overnight or at less busy
    times when speed is not such an issue.


    Types of Indexes


    The indexes we have been discussing so far have all been what are called *nonclustered*
    indexes. A nonclustered index is where we keep the values from just one (or a
    couple) of the fields in order, along with a reference to the full row, which
    is kept elsewhere. Nonclustered indexes can be specified as being unique, which
    means none of the entries can be duplicated. When we declare a field as having
    a unique constraint, as we did in the last chapter, it is likely the system will
    construct a unique nonclustered index to manage that constraint. A table should
    always have at least one unique index, and that will be on its primary key field;
    this is how the system ensures that the value of the primary key is different
    for every row. A table can also have several other nonclustered indexes if that
    seems sensible.


    Another type of index is a *clustered index.* A clustered index affects how the
    complete records or rows are physically stored on disk. When we ask the database
    system to find records for us, it retrieves an area of disk that will usually
    contain several records. If records that we are often likely to want at the same
    time are physically stored together, this will speed things up. For example, if
    we regularly want to fetch customer information in order of name, storing all
    the records in that order on the disk might be useful. Clearly, we can only have
    one clustered index on a table. If we don’ t specify a clustered index, rows that
    have been added at the same time are likely to be stored near each other, but
    we can’ t rely on that. A clustered index contains all the data in the table,
    while a nonclustered index contains only the indexing fields and a reference to
    the table. This means that after finding the required value in the index there
    is some overhead in looking up the rest of the information in the table.'
  trans: '

    # 索引如何提升查询速度


    如果我们想要一门课程 `COMP101` 的选课名单，系统可以快速搜索课程索引来找到 `COMP101` 的条目。该索引还包含指向 `Enrollment`
    表中完整行的引用，因此系统可以快速定位其余信息。或者，如果我们需要记录学生 `17625` 的进度，我们可以使用学生索引来快速访问该学生的相应记录。


    清单 10-15 展示了在 `Enrollment` 表的 `student` 和 `course` 字段上创建两个索引的 SQL 语句。


    ### 清单 10-15. 在 `Enrollment` 表上创建两个索引

    ```sql

    CREATE INDEX IDX_student ON Enrollment (studentID)

    CREATE INDEX IDX_course ON Enrollment (course)

    ```


    让我们看另一个使用 `Student` 表的例子，如图 10-14 所示。


    ![9781430242093_Fig10-14.tif](img/9781430242093_Fig10-14_fmt.jpeg)


    **图 10-14**. `Student` 表


    在 `Student` 表中，主键字段是 `studentID`。当我们指定一个字段为主键时，大多数数据库会自动为该字段创建一个索引。该索引将被指定为 `unique`（唯一），这意味着只能包含每个值的一个条目。这个索引就是主键约束在物理上的实现方式。当我们在表中添加新行时，系统会快速搜索索引，查看主键值是否已经存在，如果存在则拒绝新行。


    对于 `Student` 表，我们经常需要做的两件事是按姓名查找特定学生，以及按字母顺序检索学生。由于表中可能有数千个条目，我们不希望为了查找某个学生姓名而扫描整个表，因此某种涉及姓名的索引将非常有用。如果我们只是想查找某个特定学生，对
    `last_name` 字段建立索引会加快速度，因为所有的史密斯姓氏会排在一起，并且需要扫描的记录更少。为了进一步改善访问，我们可以设置一个复合索引，其中姓氏有序排列，对于重复的姓氏则按名字排序。如果需要按字母顺序访问表记录，这个索引可以非常快速地完成。创建复合索引的
    SQL 如 清单 10-16 所示。


    ### 清单 10-16. 在 `Student` 表上创建一个复合索引

    ```sql

    CREATE INDEX IDX_fullName ON Student (last_name, first_name)

    ```


    `Student` 表中另一个可能适合建立索引的字段是 `degree` 字段。这很可能是一个外键，引用另一个包含不同学位信息的表 `Degree`。对外键字段建立索引的一个原因是为了加速对其引用的表进行的更新。例如，如果
    `Degree` 表中的某一行被标记为删除，则需要检查它是否被 `Student` 表引用。由于 `Student` 表可能变得很大，如果没有 `degree`
    字段上的索引，查找任何引用 `Degree` 表的行可能会很慢。外键字段也经常参与连接条件，适当的索引也有助于在这种情况下找到匹配的行。


    总之，索引可以帮助我们加速那些需要查找特定记录集的 `select` 查询（例如，`Enrollment` 表中学生 `17625` 的所有行），或者查找特定记录（例如，根据姓名查找学生）。它们有时也对加速带有
    `ORDER BY` 子句的查询有用，并且外键上的索引可以加快对引用表的更新以及连接的执行。


    ## 索引的缺点


    显然，索引对于加速查询非常有用。然而，在我们过于热衷并开始为所有列创建索引之前，我们需要考虑其缺点。


    让我们看看 `Enrollment` 表及其两个索引（一个在 `studentID`，一个在 `course`）会发生什么。这个表可能会非常庞大，这两个索引将加速检索特定学生记录或选课名单的行。但是，当我们向表中添加新行时会发生什么？系统不仅需要添加实际的行，还需要更新两个索引。这将涉及在每个索引中找到正确的位置，插入一个条目，并添加对新行的引用。删除行时也需要类似的过程。数据库系统在管理索引方面实际上相当聪明，但尽管如此，仍然存在性能成本。


    数据库管理员需要仔细权衡更新记录时降低的性能与检索记录时提升的性能。在选课场景中，检索操作很可能每天都在发生，而新的选课可能只在每个学期开始时录入。检索性能的提升可能会超过数据维护性能的任何损失。然而，在超市收银台的情况又如何呢？每次进行购买时，都可能向数据库表中插入一条记录。每小时成千上万的更新，这需要尽可能高效。如果每次购买都必须更新该表上的几个索引，可能会显著降低性能。相比之下，从表中检索信息（如总计和摘要）可能可以在夜间或不太繁忙、速度不那么关键的时候进行。


    ## 索引类型


    到目前为止我们讨论的索引都是所谓的 `nonclustered`（非聚集）索引。非聚集索引是指我们仅按顺序保存一个（或几个）字段的值，并附带对完整行的引用，而完整行则保存在其他地方。非聚集索引可以被指定为
    `unique`（唯一），这意味着任何条目都不能重复。当我们声明一个字段具有唯一约束时（如我们在上一章所做），系统很可能会构建一个唯一的非聚集索引来管理该约束。一个表应该始终至少有一个唯一索引，那就是其主键字段上的索引；这是系统确保主键值对于每一行都不同的方式。如果看起来合理，一个表也可以有其他几个非聚集索引。


