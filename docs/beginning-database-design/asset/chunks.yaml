    # 第 8 章


    ![image](img/frontdot.jpg)


    ## 规范化


    我们在数据库设计方面做得相当不错。到目前为止，你已经学习了用例和数据模型如何帮助你理解试图表示问题的许多复杂性。在上一章中，你看到了如何在关系型数据库中表示数据模型的主要部分。回顾一下：


    ```

    *   每个类由一个表表示。

    *   每个属性由一个具有数据类型和可能约束的字段表示。

    *   每个对象成为表中的一行。

    *   对于每个表，我们确定一个主键，它是唯一标识每行的一个字段（或字段组合）。

    *   我们使用主键字段通过外键来表示类之间的关系。

    ```

    '
- fmt: '# 数据库规范化


    在这一阶段，一切看起来可能完全正常，但同样可能，我们的模型中有些类（或数据库中的表）仍可能给我们带来问题。规范化是一种正式的方法，用于检查字段是否位于正确的表中，或者我们是否可能需要重组或增加额外的表来帮助保持数据的准确性。规范化最初的想法由
    E. F. Codd [¹](#9781430242093_Ch08.xhtml#fn1) 于 1970 年首次提出，并从那时起一直作为关系数据库设计的基石。本书的一些读者可能会惊恐地举手抗议，我竟然把这个重要主题留到[第
    8 章](#9781430242093_Ch08.xhtml)才讲。然而，实际上我们从[示例 1-1](#9781430242093_Ch01.xhtml#ex1-1)开始就在对数据库进行规范化，当时我们看到需要两个类来保存关于植物及其用途的信息。


    在本章中，我们将首先探讨为何所有属性都必须在正确的表中至关重要，以及规范化如何帮助我们确保这一点。


    ## 更新异常


    让我们看一个简单的例子，其中属性位于错误的表中可能会在维护数据时导致若干问题。假设我们有一个数据库，用于维护公司许多不同方面的信息。可能会有几个表用于维护客户、产品、订单、供应商等，还有两个表如[图
    8-1](#9781430242093_Ch08.xhtml#F1)所示，分别关于员工以及他们被分配到的一些小型项目。你能看出`Assignment`表中潜藏的问题吗？


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-01_fmt.png)


    [**Figure 8-1.**](#9781430242093_Ch08.xhtml#FG1) 存在潜在更新问题的表


    `Assignment`表的一个问题，是我们早在[示例 1-3](#9781430242093_Ch01.xhtml#ex1-3)“昆虫数据”中就遇到过的。我们重复存储了关于一个项目的信息。如果一个项目有超过一名员工参与，那么该项目的编号、名称和联系人可能会在这个表中重复出现多次。这几乎不可避免地会导致某些行（例如项目编号为
    3 的行）在某个阶段拥有不一致的名称或联系电话。对于[图 8-1](#9781430242093_Ch08.xhtml#F1)中的数据，这相对容易发现，但通常可能不那么明显。如果我们没有两名员工参与项目
    3 的数据，我们可能甚至意识不到存在这种可能性。规范化为我们提供了一种正式的方法，在我们陷入麻烦之前检查此类情况。


    除了数据不一致的可能性外，`Assignment`表的设计还可能导致其他问题。这些问题通常统称为*更新异常*。我们现在来看其中一些其他问题。


    ### 插入问题


    您会记得，我们数据库中的每个表都需要有一个主键。这是为了使我们能够唯一地标识每一行，并拥有一种关联不同表中行的机制。对于[图 8-1](#9781430242093_Ch08.xhtml#F1)中的`Assignment`表，一个可能的主键是什么？仅查看表中的数据，我们可以看到没有单个字段是潜在的主键字段。每一列都有重复的值。我们需要寻找一个连接键，而`emp`和`project_num`这对字段是可能的。我们需要确认每个员工只与一个项目关联一次，如果情况如此，那么`emp`和`proj_num`这对值就是合适的主键。


    然而，我们有一个问题。如果我们想保存关于某个特定项目的信息，但目前还没有员工在该项目上工作，那么我们就缺少`emp`的值，而`emp`是构成我们主键的字段之一。如果一个字段对于唯一确定我们表中的某一行是必不可少的，那么它可以是空值就说不通了。正如您可能从前一章回忆到的，为主键施加的约束之一是，所涉及的字段必须始终有值。我们不能输入一个记录，其中`emp`作为主键的一部分却为空。因此，在有人参与项目之前，我们无法记录任何关于该项目的信息。


    ### 删除问题


    这是另一种可能发生的情况。员工 1001 可能完成了在 Smith&Co 项目上的工作。如果发生这种情况，我们将从`Assignment`表中删除该行。删除此行可能带来的副作用是什么？嗯，如果员工
    1001 是唯一参与该项目的人员，那么对 Smith&Co 的所有引用都将消失，我们将丢失该项目的联系电话。通过删除关于员工 1001 参与项目的信息，我们不恰当地丢失了关于该项目的信息。


    ## 处理更新异常


    我们已经看到了[图 8-1](#9781430242093_Ch08.xhtml#F1)中`Assignment`表的三种不同更新问题：当修改重复信息时可能出现不一致的数据；由于主键部分可能为空而导致插入新记录的问题；以及作为删除的副产品而意外丢失信息的问题。


    我相信您早就发现了这些问题的解决方案。我们需要的是另一个表来记录项目信息，如[图 8-2](#9781430242093_Ch08.xhtml#F2)所示。采用这种设计，我们不会多次记录一个项目的联系电话；即使没有人工作，我们也可以在`Project`表中添加一个新项目；并且我们可以删除一个分配（例如员工
    1001 在项目 6 上工作）而不会意外丢失关于项目的信息。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-02_fmt.png)


    [**Figure 8-2.**](#9781430242093_Ch08.xhtml#FG2) 已消除更新异常的表


    很可能，在您最初的用例分析和数据模型中，`Project`表已经出现了。但是，您如何能确定没有遗漏任何东西呢？这就是规范化表的形式化定义发挥作用的地方。


    ## 函数依赖


    规范化帮助我们确定我们的表结构是否能够避免上一节描述的更新异常。规范化定义的核心是*函数依赖*的概念。函数依赖是描述我们表中属性或字段之间相互依赖关系的一种方式。有了函数依赖的定义，我们可以为主键提供一个更正式的定义，解释规范化表的含义，并讨论不同形式的规范化。


    ### 函数依赖的定义


    函数依赖本质上是一条陈述：“如果我知道这个（些）属性的值，我就可以唯一地告诉你某个其他（些）属性的值。” 例如，我们可以说：


    如果我知道一名员工的 ID 号，我就能确定地告诉你他的姓氏。


    或者等价地：


    员工的 ID 号函数决定员工的姓氏。


    或者用符号表示：


    `empID → last_name`'
  raw: 'At this stage, everything could be absolutely fine, but then again there may
    be some classes in our model (or tables in our database) that might still cause
    us problems. Normalization is a formal way of checking the fields to ensure they
    are in the right table or to see if perhaps we might need restructured or additional
    tables to help keep our data accurate. The initial idea of normalization was first
    proposed by E. F. Codd [¹](#9781430242093_Ch08.xhtml#fn1) in 1970 and has been
    a cornerstone of relational database design since then. Some readers of this book
    may be throwing up their hands in horror that I have left this important topic
    until [Chapter 8](#9781430242093_Ch08.xhtml). However, we have actually been normalizing
    our database right from [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1) when we
    saw that two classes were needed to keep information about plants and their uses.


    In this chapter, we will first look at why it is critical that all the attributes
    are in the right table and how normalization helps us make sure they are.


    Update Anomalies


    Let’s have a look at a simple example where having the attributes in the wrong
    table can cause a number of problems in maintaining data. Let’s say we have a
    database for maintaining information about many different aspects of a company.
    There may be several tables for maintaining customers, products, orders, suppliers,
    and so on, and there are also two tables as shown in [Figure 8-1](#9781430242093_Ch08.xhtml#F1)
    about employees and some small projects to which they have been assigned. Can
    you see a problem lurking in the Assignment table?


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-01_fmt.png)


    [**Figure 8-1.**](#9781430242093_Ch08.xhtml#FG1) Tables with potential update
    problems


    A problem with the Assignment table is one that we encountered way back in [Example
    1-3](#9781430242093_Ch01.xhtml#ex1-3), “Insect Data.” We have repeated information
    about a project. The number, name, and contact can be repeated several times in
    this table if there is more than one employee working on the project. This will
    almost inevitably lead to some rows (for, say, project number 3) having inconsistent
    names or contact numbers at some stage. This is relatively easy to spot for the
    data in [Figure 8-1](#9781430242093_Ch08.xhtml#F1), but often it can be less easy
    to see. If we hadn’t had data for two employees working on project 3, we might
    not have even realized this was a possibility. Normalization gives us a formal
    way of checking for such situations before we get into trouble.


    As well as the possibility of inconsistent data, there are other problems that
    the design of the Assignment table can cause. These are often collectively referred
    to as *update anomalies*. We will look at some of these other problems now.


    Insertion Problems


    You will recall that it is necessary to have a primary key for every table in
    our database. This is so we can uniquely identify each row and have a mechanism
    for relating rows in different tables. What is a possible primary key for the
    Assignment table in [Figure 8-1](#9781430242093_Ch08.xhtml#F1)? Just looking at
    the data in the table, we can see that there is no single field that is a potential
    primary key field. Every column has duplicated values. We need to look for a concatenated
    key, and the pair emp and project_num is possible. We need to confirm that each
    employee is associated with a project just once, and if that is the case, the
    pair of values for emp and proj_num is a suitable primary key.


    However, we have a problem. If we want to keep information about a particular
    project but there is no employee yet working on it, we have no value for emp,
    which is one of the fields making up our primary key. If a field is essential
    to uniquely determine a particular row in our table, it makes no sense that it
    can be empty. As you may recall from the previous chapter, one of the constraints
    imposed by putting a primary key on a table is that the fields involved must always
    have a value. We cannot enter a record for which the value of emp, being part
    of the primary key, is empty. Therefore we have no way of recording information
    about any project before someone is working on it.


    Deletion Problems


    Here is another situation that might occur. Employee 1001 may finish working on
    the Smith&Co project. If this happens, we will remove that row from the Assignment
    table. What is a possible side effect of deleting this row? Well, if employee
    1001 was the only person working on the project, every reference to Smith&Co will
    have gone, and we will have lost the project’s contact number. By deleting information
    about employee 1001’s involvement in a project, we have inappropriately lost information
    about the project.


    Dealing With Update Anomalies


    We have seen three different updating problems with the Assignment table in [Figure
    8-1](#9781430242093_Ch08.xhtml#F1): possible inconsistent data when repeated information
    is modified, problems inserting new records because part of the primary key may
    be empty, and accidental loss of information as a by-product of a deletion.


    I’m sure you have spotted the solution to these problems ages ago. What we need
    is another table to record information about projects, as in [Figure 8-2](#9781430242093_Ch08.xhtml#F2).
    With this design, we don’t have a project’s contact number recorded more than
    once, we can add a new project in the Project table even if no one is working
    on it, and we can delete an assignment (employee 1001 working on project 6) without
    accidentally losing information about the project.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig08-02_fmt.png)


    [**Figure 8-2.**](#9781430242093_Ch08.xhtml#FG2) Tables with update anomalies
    removed


    Chances are that the Project table would have surfaced in your original analysis
    of use cases and the data model. But how can you be sure you haven’t missed anything?
    This is where the formal definition of a normalized table helps.


    Functional Dependencies


    Normalization helps us to determine whether our tables are structured in such
    a way as to avoid the update anomalies described in the previous section. Central
    to the definition of normalization is the idea of a *functional dependency*. Functional
    dependencies are a way of describing the interdependence of attributes or fields
    in our tables. With a definition of functional dependencies, we can provide a
    more formal definition of a primary key, explain what is meant by a normalized
    table, and discuss the different forms of normalization.


    Definition of a Functional Dependency


    A functional dependency is a statement that essentially says, “If I know the value
    for this attribute(s), I can uniquely tell you the value of some other attribute(s).”
    For example, we can say,


    If I know the value of an employee’s ID number, I can tell you his last name with
    certainty.


    Or equivalently,


    Employee’s ID number functionally determines employee’s last name.


    Or in symbols,


    empID → last_name'
