  trans: '## 表单上的约束


    数据录入操作员将详细信息输入到白色框中，但当输入 `studentID` 和 `courseID` 时，相应的名称将出现，为用户提供一些反馈。也可以约束用户被允许的操作。在图
    11-6 所示的表单中，三个姓名字段的属性已更改为只读，以便用户可以查看但不会意外更改这些值。将背景设为灰色可以清楚地向用户表明这三个字段仅用于显示信息。默认值也可以让表单使用起来更高效。在任何特定学年的开始，很可能只需要录入该年的注册信息，因此在年份字段中指定一个默认值将加快数据录入速度。表单生成器允许快速开发诸如图
    11-6 所示的表单。像 Expression Web 或 Dreamweaver 这样的 Web 软件允许生成类似的表单，这些表单允许通过 Web 浏览器访问数据库。


    我们还能如何改进用于录入注册信息的表单？再看一下图 11-2 中的数据模型。`Student` 类和 `Course` 类都与 `Enrollment` 类具有一对多的关系。每个学生有多次注册，每门课程也有多次注册。从数据录入的角度来看，哪一个关系更相关？在学年开始时，很可能有学生来到注册处办公室，想一次性完成他所有的注册。让我们的表单反映学生与其注册之间这种一对多关系是有意义的。


    图 11-7 中的表单是两个表单的组合。顶部部分是基于 `Student` 表字段的表单。底部部分是一个子表单，其布局与图 11-6 中的表单类似，但基于一个连接
    `Enrollment` 和 `Course` 表的视图。这两个表单是关联的，因此我们只看到顶部显示的学生的注册信息。这样，一旦定位到特定学生的记录，数据录入操作员就可以在一个地方录入所有的注册信息。


    ![9781430242093_Fig11-07.tif](img/9781430242093_Fig11-07_fmt.jpeg)


    `图 11-7.` 基于 `Student` 的表单，带有基于 `Enrollment` 和 `Course` 连接视图的子表单


    下一个明显的改进以帮助数据录入是允许用户从可用选项列表中进行选择，而不是必须手动键入。例如，在图 11-7 的注册表单中，参照完整性要求输入到 `Enrollment`
    表的课程代码必须是 `Course` 表中已经存在的代码。如果用户输入一个不存在的代码，他将从底层数据库系统获得错误消息。为了避免这种情况发生，我们可以向用户展示一个允许课程的下拉列表。在图
    11-8 中，我们将课程代码的文本框更改为列表框。然后我们指定列表框显示 `Course` 表中的主键值。


    ![9781430242093_Fig11-08.tif](img/9781430242093_Fig11-08_fmt.jpeg)


    `图 11-8.` 一个允许用户选择科目的列表框


    我们还可以使用列表框来实现其他约束。一个可能的情况是，在我们的课程数据表中，我们可能会指定特定科目是否正在开设，如图 11-9 所示。


    ![9781430242093_Fig11-09.tif](img/9781430242093_Fig11-09_fmt.jpeg)


    `图 11-9.` 包含“课程是否正在开设”字段的课程表


    当在 `Enrollment` 表中输入新的注册信息时，我们希望将 `course` 的值限制为 `Course` 表中那些 `offered` 字段为 `''Y''`
    的课程。我们该如何做到这一点？第 9 章中描述的检查约束是行不通的。检查约束基于我们正在更新的表中的值。这里我们正在更新一个表，即 `Enrollment`，但我们需要检查另一个不同表
    `Course` 中的某一行。参照完整性也帮不上忙，因为它只要求课程代码在 `Course` 表中存在，因此会允许 `C205`。我们可以像图 11-8 那样使用列表框来帮助解决这个问题。我们不是用
    `Course` 表中的所有值来填充列表框，而是用某个视图中的值来填充，该视图只选择那些正在开设的课程。用于创建这样一个视图的 SQL 如清单 11-2.所示。


    `清单 11-2.` 一个将选择正在开设课程代码的查询


    ```sql

    CREATE VIEW OfferedCourses AS

    SELECT courseID FROM Course

    WHERE offered = ''Y''

    ```


    现在，如果我们限制用户只能从用此查询填充的列表框中选择值，我们就有效地应用了我们的约束。请注意，此约束仅在此特定表单中生效。如果我们以任何其他方式更新 `Enrollment`
    表，该约束将不会生效。确保约束始终生效的唯一方法是将其直接放在表上。这可以通过检查约束实现，或者对于跨多个表的约束，可以通过如第 10 章讨论的触发器实现。


    仅在某些表单上生效的约束有其适用之处。我们的注册示例就是其中之一。`offered` 字段与当前年份相关。在我们的 `Enrollment` 表中，会有许多来自往年、对应已不再开设课程的记录。我们可能需要追溯更新其中一些记录，因此我们实际上并不希望在表上设置此约束。我们只想限制*新*记录只能选择当前年份正在开设的课程。数据录入表单是应用该约束的好地方。这与第
    9 章讨论的问题相同，即如何防止对已无库存的物品下订单。同样的解决方案在那里也适用。实际上，我们有一组通过表设计应用于数据库表的永久性约束。此外，我们还可以在表单上设置其他约束，这些约束仅在某些情况下适用。


    ## 限制对表单的访问


    表单为设计者提供了极大的灵活性，可以控制用户能做什么。大多数表单设计软件都允许您指定表单是仅用于查看数据，还是可以用于更新或删除记录。您还可以指定表单上的某些字段不能被更改。例如，在图
    11-8 中，我们可能不希望一个本应录入注册信息的学生用户更改学生的 ID 号或更改课程名称。然而，我们确实希望他能够看到这些值，以确认他拥有正确的记录。对
    ID 和课程名称字段提供只读访问权限将防止对该数据的意外更改。


    由于表单基于视图或表，我们还可以限制*谁*能通过表单查看或更新数据。这可以通过如第 10 章所述，向不同用户组授予底层视图的不同权限来实现。我们可能会授予负责的组（例如管理员）对我们视图的更新权限，而只允许可靠性较低的组（例如学术人员）拥有读取权限。


    ## 报告

    '
- fmt: '# 数据库报表基础


    用例4和5在[图11-1](#9781430242093_Ch11.xhtml#F1)的示意图中都涉及输出。它们要求基于我们表中的数据生成有用且易于阅读的报告。对于普通用户来说，报告可能是数据库中最显眼的部分。我们的大学数据库需要能够提供班级名单和学生记录；企业则需要提供产品清单、发票和销售摘要。所有这些报告都基于数据的子集，例如特定客户未付款交易的发票、上个月的销售摘要、特定课程的注册情况，等等。


    许多数据库系统提供报告生成软件，也有一些独立产品，例如 `Crystal Reports`。大多数软件都使用相同的原则来设计报告，因此我们来看看其基本要素。


    ## 基于视图创建报告


    大多数信息丰富的报告都需要来自多个表的数据。如果我们对注册信息的细节感兴趣，我们可能不仅想看到学生的 `ID`，还想看到她的姓名，以及课程代码对应的课程名称。显然，我们需要一个连接这三个表的视图。这里需要小心。我们可能希望看到所有的课程和所有的学生，即使是那些没有注册记录的。正如我们在上一章讨论的，这需要外连接，如[清单11-3](#9781430242093_Ch11.xhtml#L3)所示。


    ***[清单11-3](#9781430242093_Ch11.xhtml#Lis3)**. 一个用于检索*注册*信息的视图


    ```sql

    CREATE EnrollView AS

    SELECT courseID course_name, studentID, last_name, first_name, year

    FROM (Course FULL OUTER JOIN Enrollment ON courseID = course)

    FULL OUTER JOIN Student ON studentID = student

    ```


    运行[清单11-3](#9781430242093_Ch11.xhtml#L3)中的视图时，检索到的部分行如[图11-10](#9781430242093_Ch11.xhtml#F10)所示。


    ![9781430242093_Fig11-10.tif](images/9781430242093_Fig11-10_fmt.jpeg)


    **[图11-10.](#9781430242093_Ch11.xhtml#FG10)** 对`Enrollment`表进行外连接`Student`和`Course`表后得到的视图结果


    请注意，外连接意味着我们为没有注册记录的课程（`C205`）和没有注册记录的学生（`John Smith`）也显示了行。现在我们有了这个底层视图，就可以基于它创建许多不同的报告。


    ## 报告的主要组成部分


    报告生成器通常包含以下部分：


    **报告标题**：出现在报告顶部的文本，通常是标题和日期


    **页面标题**：出现在每页顶部的文本，例如列标题


    **明细**：你希望从查询或报告所基于的表中每一行看到的数值


    **页脚**：出现在每页底部的文本，通常是页码


    **报告脚注**：出现在报告末尾的文本，通常是整体摘要


    [图11-11](#9781430242093_Ch11.xhtml#F11)展示了一个包含报告标题和页面标题的报告，所有字段都显示在明细区域（查询结果中的每一行对应一个明细区域）。在报告设计中，我们可以指定明细行的显示顺序（本例中按`StudentID`排序），报告软件会处理分页等所有必要的格式问题。


    ![9781430242093_Fig11-11.tif](images/9781430242093_Fig11-11_fmt.jpeg)


    **[图11-11.](#9781430242093_Ch11.xhtml#FG11)** 基于`EnrollView`的基本报告


    [图11-12](#9781430242093_Ch11.xhtml#F12)中的报告目前用处不大，但我们可以做一些简单的改进。通常，对要查看的行设置一个选择条件会很有用（例如，特定课程的行）。我们可以将这个条件包含在底层视图中，但这意味着每次需要特定课程的列表时都要更改视图。更有用的方法是将这些标准构建到报告的设计中，这样每次运行报告时都可以指定条件。根据你使用的工具，会有不同的实现方法。


    ![9781430242093_Fig11-12.eps](images/9781430242093_Fig11-12_fmt.png)


    **[图11-12.](#9781430242093_Ch11.xhtml#FG12)** 基于`EnrollView`的两个采用不同分组方式的报告部分


    ## 分组与汇总


    我们可以调整[图11-11](#9781430242093_Ch11.xhtml#F11)中的基本报告，以便更有效地满足用例需求。基本报告提供了我们所需的所有信息，只是结构不太合适。使用报告生成器的*分组*功能可以提供合适的结构。对于班级名单，我们希望看到每个班级的所有注册信息分组在一起；而对于学生记录，我们希望注册信息按学生分组。这本质上反映了我们数据模型中的两个一对多关系——一个学生有多次注册，一门课程有多次注册。我们的模型允许我们根据需要从任一角度进行报告。


    应用分组时，报告生成器允许我们为该组相关的特定信息添加组标题和组脚注。其原理是：如果按`courseID`分组，视图中的行（如[图11-10](#9781430242093_Ch11.xhtml#F10)所示）将按`courseID`顺序排序。当报告输出每一行时，每当`courseID`的值发生变化，它就会插入一个脚注和标题。[图11-12](#9781430242093_Ch11.xhtml#F12)展示了两个基于`EnrollView`的报告：一个按`studentID`分组，另一个先按`courseID`再按`year`分组。


    在学生记录报告中，我们有一个组标题，显示每个学生的`studentID`、姓氏和名字，而明细部分则显示课程数据。在班级名单报告中，第一个组标题包含课程信息，下一个组标题包含年份，最后明细部分包含学生信息。在班级名单中，我们还有一个组脚注，用于汇总该课程的学生人数。这是通过一个计算字段完成的，该字段会有一个公式，类似于
    `= Count(*)`。如果愿意，我们可以限制这两个报告，使其仅显示特定课程、特定学生或特定年份的数据。


    至此，我们已经满足了两个报告用例的需求。还可以生成许多其他报告。例如，我们可以选择抑制报告的明细部分，这样我们就只会看到每个组的标题和/或脚注。一个按`courseID`分组、抑制了明细部分并在报告脚注中显示总计数的报告将如[图11-13](#9781430242093_Ch11.xhtml#F13)所示。


    ![9781430242093_Fig11-13.tif](images/9781430242093_Fig11-13_fmt.jpeg)


    **[图11-13.](#9781430242093_Ch11.xhtml#FG13)** 按课程分组的汇总报告


    我们可以看到，许多非常有用的报告都可以基于我们关于注册数据的这一个视图。所有这些报告都可以设置选择条件，以便用户将它们限制在特定的年份、特定的课程子集或单个学生。我们数据库设计的一部分工作，应该是提供一组能够满足设计初期商定用例的报告。


    ## 总结


    设计一个有用数据库的一部分工作，是为用户提供一个方便的界面来输入数据和检索信息。最初的用例将很好地指示出需要什么功能。'
  raw: 'Use cases 4 and 5 in the diagram in [Figure 11-1](#9781430242093_Ch11.xhtml#F1)
    are both concerned with output. They require useful, easy–to–read reports based
    on the data in our tables. Reports are probably the most visible part of a database
    for a casual user. Our university database needs to be able to provide class lists
    and student records; a business would need to provide product lists, invoices,
    and summaries of sales. All of these reports are based on a subset of the data,
    such as invoices for unpaid transactions for a particular client, summaries of
    sales for the last month, enrollments for a particular course, and so on.


    Many database systems provide report–generating software, and there are also independent
    products such as Crystal Reports. Most software uses the same principles for designing
    reports, so we will take a look at the basic elements.


    Basing Reports on Views


    Most informative reports are going to need data from more than one table. If we
    are interested in the details of enrollment information, we will likely want to
    see a student’s name as well as her ID, and the course name along with its code.
    Clearly, we are going to need a view joining these three tables. Be careful here.
    It is probable that we will want to see all the courses and all the students,
    even those with no enrollments. As we discussed in the last chapter, this requires
    outer joins as in [Listing 11-3](#9781430242093_Ch11.xhtml#L3).


    ***[Listing 11-3](#9781430242093_Ch11.xhtml#Lis3)**. A View to Retrieve Information
    About* Enrollments


    CREATE EnrollView AS


    SELECT courseID course_name, studentID, last_name, first_name, year


    FROM (Course FULL OUTER JOIN Enrollment ON courseID = course)


    FULL OUTER JOIN Student ON studentID = student


    Some of the rows retrieved when the view in [Listing 11-3](#9781430242093_Ch11.xhtml#L3)
    is run are shown in [Figure 11-10](#9781430242093_Ch11.xhtml#F10).


    ![9781430242093_Fig11-10.tif](images/9781430242093_Fig11-10_fmt.jpeg)


    **[Figure 11-10.](#9781430242093_Ch11.xhtml#FG10)** Result of a view on Enrollment
    outer joined with Student and Course


    Note that the outer joins mean we have a row for courses with no enrollments (C205)
    and also for students with no enrollments (John Smith). Now that we have this
    underlying view, we can create a host of different reports based on it.


    Main Parts of a Report


    Report generators generally have the following parts:


    **Report header**: Text appearing at the top of the report, typically a title
    and date


    **Page header:** Text appearing at the top of each page, such as column headings


    **Detail:** The values you want to see from each row in the query or table on
    which the report is based


    **Page footer:** Text appearing at the bottom of each page, typically page numbers


    **Report footer:** Text appearing at the end of the report, often overall summaries


    [Figure 11-11](#9781430242093_Ch11.xhtml#F11) shows a report with a report header
    and page header, and with all the fields being displayed in the detail area (one
    for each row in the query result). In the report design, we can specify the order
    in which the detail rows are displayed (in this case by StudentID), and the report
    software will do all the necessary formatting to deal with page breaks and so
    on.


    ![9781430242093_Fig11-11.tif](images/9781430242093_Fig11-11_fmt.jpeg)


    **[Figure 11-11.](#9781430242093_Ch11.xhtml#FG11)** Basic report based on EnrollView


    The report in [Figure 11-12](#9781430242093_Ch11.xhtml#F12) isn’t of much use
    at the moment, but there are a couple of simple things we can do to improve it.
    Often it is useful to put a select condition on the rows we want to see (e.g.,
    the rows for a particular course). We could include this in the underlying view,
    but that would mean changing the view each time we want a list for a particular
    course. It is more useful to build these criteria into the design of the report
    so that each time we run the report we can specify the condition. Depending on
    what tool you are using, there will be different ways of doing this.


    ![9781430242093_Fig11-12.eps](images/9781430242093_Fig11-12_fmt.png)


    **[Figure 11-12.](#9781430242093_Ch11.xhtml#FG12)** Parts of two reports based
    on EnrollView with different grouping


    Grouping and Summarizing


    It is possible to adapt our basic report in [Figure 11-11](#9781430242093_Ch11.xhtml#F11)
    in order to satisfy the use cases more effectively. The basic report provides
    all the information we need, but it is just not structured appropriately. Using
    the *grouping* features of a report generator can provide the appropriate structure.
    For a class list, we want to see all the enrollments for each class grouped together,
    whereas for a student record, we want the enrollments grouped by student. This
    is essentially reflecting the two 1–Many relationships in our data model—a student
    has many enrollments, and a course has many enrollments. Our model allows us to
    report from either point of view as required.


    When we apply grouping, the report generator allows us to add a group header and
    footer for information relevant to that group. What happens is this: if we group
    by courseID, the rows in the view (as shown back in [Figure 11-10](#9781430242093_Ch11.xhtml#F10))
    will be sorted in order of courseID. When the report writes out each row, it will
    insert a footer and header each time the value of courseID changes. [Figure 11-12](#9781430242093_Ch11.xhtml#F12)
    shows two reports, both based on EnrollView: one is grouped on studentID, the
    other on courseID and then year.


    In the student record report, we have a group header displaying each student’s
    studentID, last name, and first name, while the detail displays the course data.
    In the class list report, the first group header has the course information, the
    next group header has the year, and finally the detail contains the student information.
    In the class list, we also have a group footer that summarizes the number of students
    in that course. This is done with a calculated field that will have a formula,
    something like = Count(*). We can restrict these two reports to only presenting
    data for a specified course, student, or year if we wish.


    We have now satisfied the requirements of our two reporting use cases. A number
    of other reports are also possible. For example, we can choose to suppress the
    detail section of a report, in which case we will just see the header and/or footer
    of each group. A report grouped on courseID with the detail suppressed and a report
    footer for the overall count would look like [Figure 11-13](#9781430242093_Ch11.xhtml#F13).


    ![9781430242093_Fig11-13.tif](images/9781430242093_Fig11-13_fmt.jpeg)


    **[Figure 11-13.](#9781430242093_Ch11.xhtml#FG13)** A summary report grouped by
    course


    We can see that there are numerous very useful reports that can all be based on
    our one view of the enrollment data. All these reports can have a select condition
    placed on them so that the user can limit them to particular years, particular
    subsets of courses, or an individual student. Part of our database design should
    be to provide a set of reports that will satisfy the use cases agreed upon in
    the early stages of the design.


    Summary


    Part of the design of a useful database is to provide a convenient interface for
    users to enter data and retrieve information. The original use cases will be a
    good indication of what is required.'
