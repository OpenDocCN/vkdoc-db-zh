- fmt: '# 冗余、陷阱与数据模型


    正如前一节所论证的，易于检索的优势似乎可能超过随之而来的数据维护复杂性。我们应不惜一切代价避免的是，当没有相应的复杂性降低时，为一条信息提供替代路径。


    ## 冗余信息


    本应相同的信息通过两种不同路径获取，可被称为 **冗余信息**。在上一节中，关于当前房间住户的信息就是冗余的。我们可以通过检查 `is currently
    in` 关系来找到当前住户，或者通过查看团队的退房日期来推断当前住户。


    让我们看一下[示例 5-3](#9781430242093_Ch05.xhtml#ex5-3)，这是冗余信息的另一个案例。


    ### 示例 5-3：创业孵化器


    一家创业孵化器有若干员工，他们各自为一个或多个小型项目团队工作。每个团队及其所有员工都安置在一个特定的房间里，较大的房间会容纳多个团队。我们可能需要诸如每位员工的工位在哪里、特定员工的电话号码、某个团队在哪里、哪些员工在每个团队中、谁在每个房间等信息。一种可能的数据模型如[图
    5-7](#9781430242093_Ch05.xhtml#F7)所示。花点时间理解这个数据模型及其所包含的关于特定问题（如一个房间内有多少团队等）的信息。该模型存在冗余信息。你能看出来吗？


    ![9781430242093_Fig05-07.tif](images/9781430242093_Fig05-07_fmt.jpeg)


    *[**图 5-7.**](#9781430242093_Ch05.xhtml#FG7) 包含冗余关系的员工、团队和房间*


    关于[示例 5-3](#9781430242093_Ch05.xhtml#ex5-3)，如果我们经常需要查找员工的电话号码，可能会认为图 5-7 中 `Employee`
    和 `Room` 之间的顶部关系是一个有用的直接路径。然而，通过 `Group` 的替代路径，同样可以非常容易地获得此信息。我们可以找到该员工（唯一）所属的团队，然后找到该团队（唯一）所在的房间。这是一个非常简单的检索过程（它不涉及困扰[示例
    5-2](#9781430242093_Ch05.xhtml#ex5-2)中那家小旅馆的日期相关复杂问题）。


    然而，这个额外关系不仅是不必要的，而且是危险的。对于相同信息有两条路径，我们有可能得到两个不同的答案，除非数据得到非常仔细的维护。每当员工更换团队或团队转移房间时，都需要更新两个关系实例。如果没有非常仔细的更新流程，我们最终可能会得到“Jim
    在 A 团队，A 团队在 12 号房间”，而另一条路径可能直接将 Jim 关联到 15 号房间。**冗余信息容易导致不一致，应始终予以移除。**


    > **注意** 每当数据模型中存在封闭路径时（如[图 5-7](#9781430242093_Ch05.xhtml#F7)），值得仔细检查以确保没有关系是冗余的。


    ## 提供不同信息的路径


    并非所有封闭路径都必然意味着数据冗余。其中一条路径可能包含不同的信息。稍微修改[示例 5-3](#9781430242093_Ch05.xhtml#ex5-3)中的问题，允许一名员工为多个小型项目团队工作。如[图
    5-8](#9781430242093_Ch05.xhtml#F8)所示。现在你能推断出某位员工在哪个房间吗？


    ![9781430242093_Fig05-08.tif](images/9781430242093_Fig05-08_fmt.jpeg)


    *[**图 5-8.**](#9781430242093_Ch05.xhtml#FG8) 为多个项目团队工作的员工*


    在[图 5-8](#9781430242093_Ch05.xhtml#F8)的模型中，没有确定明确的路径连接员工和特定房间。例如，A 团队可能在 12 号房间，B
    团队在 16 号房间，而 Jim 可能同时为两个团队工作。因此，Jim 可能在 12 号房间，也可能在 16 号房间。仅仅缩小这种可能性可能就是问题所需的全部。然而，如果每位员工有一个主办公室，而我们希望记录该信息，就需要在员工和房间之间建立一个额外的关系，如[图
    5-9](#9781430242093_Ch05.xhtml#F9)所示。


    ![9781430242093_Fig05-09.tif](images/9781430242093_Fig05-09_fmt.jpeg)


    [**图 5-9.**](#9781430242093_Ch05.xhtml#FG9) 不同的路径提供不同的信息。


    看起来我们似乎引入了另一条路径，对于诸如“Jim 在哪个房间？”这样的问题会给出不同的答案。[图 5-9](#9781430242093_Ch05.xhtml#F9)
    允许我们让 Jim 的办公室不同于他工作的任何一个团队所在的房间。对于现实生活中的问题，这可能正是所需要的。房间的大小和团队的员工数量不太可能总是匹配。重要的是确保两条路径不包含本应相同的信息，这样我们就不会引入可避免的不一致性。


    ## 路径产生的虚假信息（扇形陷阱）


    无法从[图 5-8](#9781430242093_Ch05.xhtml#F8)推断出员工的房间，是一个更普遍问题的例子。请看[示例 5-4](#9781430242093_Ch05.xhtml#ex5-4)。


    ### 示例 5-4：更大的组织


    一个组织有多个部门。每个部门拥有许多员工，并进一步划分为若干团队。我们可以将其建模为[图 5-10](#9781430242093_Ch05.xhtml#F10)。看看这个模型。关于特定员工与哪个（或哪些）团队相关联，我们能推断出什么？


    ![9781430242093_Fig05-10.tif](images/9781430242093_Fig05-10_fmt.jpeg)


    [**图 5-10.**](#9781430242093_Ch05.xhtml#FG10) 对组织进行建模的一种（危险）方式


    [图 5-10](#9781430242093_Ch05.xhtml#F10) 代表了一个非常常见的问题，通常被称为 **扇形陷阱**。这里的危险在于，沿着员工和团队之间的路径进行推断，可能会得出并非本意的结论。[图
    5-11](#9781430242093_Ch05.xhtml#F11) 展示了一些与[图 5-10](#9781430242093_Ch05.xhtml#F10)模型一致的可能对象实例。


    ![9781430242093_Fig05-11.eps](images/9781430242093_Fig05-11_fmt.png)


    [**图 5-11.**](#9781430242093_Ch05.xhtml#FG11) 一个扇形陷阱


    考虑员工 Jim 和 Sue。无法推断 Jim 或 Sue 在哪些团队工作。只能得到许多共享同一部门的 `Group` 对象和 `Employee` 对象的组合：Jim
    A、Jim B、Sue B、Jane D 等等。^([2](#9781430242093_Ch05.xhtml#fn2)) 我们绝不能将这些组合误认为是所需的信息——例如，Jane
    属于哪个（或哪些）团队？


    让我们意识到扇形陷阱的特征是：一个类在两端具有“多”基数性的两个关系。这导致了[图 5-11](#9781430242093_Ch05.xhtml#F11)中的扇形形状。


    我们能对此做些什么？如果系统能够显示员工工作的团队对我们很重要，那么我们需要在 `Group` 和 `Employee` 之间建立另一种关系，或者我们可能需要以完全不同的方式建模该问题（如下一节所示）。


    ## 类之间路径的缺口（峡谷陷阱）


    我们可能会选择以层次结构的方式对部门、团队和员工之间的关系进行建模，如[图 5-12](#9781430242093_Ch05.xhtml#F12)（即一个部门拥有多个团队，一个团队拥有多名员工）。员工-团队关系一端的可选性尚未指定。思考一下不同的可能性。


    ![9781430242093_Fig05-12.tif](images/9781430242093_Fig05-12_fmt.jpeg)


    [**图 5-12.**](#9781430242093_Ch05.xhtml#FG12) 对组织建模的另一种方式'
  raw: 'As argued in the previous section, the advantages in easy retrieval may appear
    to outweigh the associated data maintenance complications. What we should avoid
    at all costs is having alternative routes for a piece of information when there
    is no associated reduction in complexity.


    Redundant Information


    Having what should be the same piece of information available by two different
    routes can be referred to as *redundant information*. In the previous section,
    we had redundant information about the current occupant of a room. We could find
    the current occupant by inspecting the *is currently in* relation, or we could
    deduce the current occupant by looking at the check–out dates of the groups.


    Let’s have a look at [Example 5-3](#9781430242093_Ch05.xhtml#ex5-3), which is
    another case of redundant information.


    EXAMPLE 5-3: STARTUP INCUBATOR


    A startup incubator has employees who each work for one of a number of different
    small project groups. Each group and all its employees are housed in one particular
    room, with larger rooms housing several groups. We may require information such
    as where each employee is located, a particular employee’s phone number, where
    to find a particular group, which employees work in each group, who is in each
    room, and so on. One possible data model is shown in [Figure 5-7](#9781430242093_Ch05.xhtml#F7).
    Take a moment to understand the data model and the information it contains about
    the number of groups in a room and so on for this particular problem. The model
    has redundant information. Can you see what it is?


    ![9781430242093_Fig05-07.tif](images/9781430242093_Fig05-07_fmt.jpeg)


    *[**Figure 5-7.**](#9781430242093_Ch05.xhtml#FG7) Employee, Group, and Room with
    a redundant relationship*


    With respect to [Example 5-3](#9781430242093_Ch05.xhtml#ex5-3), if we regularly
    want to find an employee’s phone number, we might think that the top relationship
    in Figure 5-7 between **Employee** and **Room** would be a useful direct route.
    However, this same information is very easily available by an alternative route
    through **Group**. We can find the employee’s (one only) group and then find that
    group’s (one only) room. This is a very simple retrieval (it does not involve
    all the complications with dates that plagued the small hostel in [Example 5-2](#9781430242093_Ch05.xhtml#ex5-2)).


    However, the extra relationship is not just unnecessary, it is dangerous. With
    two routes for the same information, we risk getting two different answers unless
    the data is very carefully maintained. Whenever an employee changes groups or
    a group shifts rooms, there will be two relationship instances to update. Without
    very careful updating procedures, we could end up having that Jim is in Group
    A, which is in Room 12, while the other route may have Jim associated directly
    with Room 15\. Redundant information is prone to inconsistencies and should always
    be removed.


    ![images](images/sq.jpg) Note Whenever there is a closed path in a data model
    (as in [Figure 5-7](#9781430242093_Ch05.xhtml#F7)), it is worth checking carefully
    to ensure that none of the relationships are redundant.


    Routes Providing Different Information


    Not all closed paths necessarily mean redundant data. One of the routes may contain
    different information. Alter the problem in [Example 5-3](#9781430242093_Ch05.xhtml#ex5-3)
    slightly to allow an employee to work for more than one of the small project groups.
    This is shown in [Figure 5-8](#9781430242093_Ch05.xhtml#F8). Can you deduce which
    room an employee is in now?


    ![9781430242093_Fig05-08.tif](images/9781430242093_Fig05-08_fmt.jpeg)


    *[**Figure 5-8.**](#9781430242093_Ch05.xhtml#FG8) Employees working for more than
    one project group*


    In the model in [Figure 5-8](#9781430242093_Ch05.xhtml#F8), there is no certain
    clear route between an employee and a particular room. For example, Group A may
    be in Room 12, Group B in Room 16, and Jim may work for both groups. Thus, Jim
    could be in either Room 12 or Room 16\. Just narrowing the possibilities like
    that may be all the problem requires. If, however, each employee has a home room
    and we wish to record that information, we will need an additional relationship
    between employee and room as in [Figure 5-9](#9781430242093_Ch05.xhtml#F9).


    ![9781430242093_Fig05-09.tif](images/9781430242093_Fig05-09_fmt.jpeg)


    [**Figure 5-9.**](#9781430242093_Ch05.xhtml#FG9) Different routes are providing
    different information.


    It might seem that we have introduced another path that will give different answers
    to a question such as, “What room is Jim in?” [Figure 5-9](#9781430242093_Ch05.xhtml#F9)
    allows us to have Jim based in a room different from that of any of the groups
    he works for. For real–life problems, this may be exactly what is required. The
    size of a room and the number of employees in a group are unlikely to always match.
    The important thing is to ensure that two routes do not contain what should be
    identical information so we do not introduce avoidable inconsistencies.


    False Information from a Route (Fan Trap)


    Not being able to deduce an employee’s room from [Figure 5-8](#9781430242093_Ch05.xhtml#F8)
    is an example of a more general problem. Take a look at [Example 5-4](#9781430242093_Ch05.xhtml#ex5-4).


    EXAMPLE 5-4: LARGER ORGANIZATION


    An organization has several divisions. Each of these divisions has many employees
    and is broken down into a number of groups. We might model this as in [Figure
    5-10](#9781430242093_Ch05.xhtml#F10). Have a look at the model. What can we deduce
    about which group or groups a particular employee is associated with?


    ![9781430242093_Fig05-10.tif](images/9781430242093_Fig05-10_fmt.jpeg)


    [**Figure 5-10.**](#9781430242093_Ch05.xhtml#FG10) One (dangerous) way to model
    an organization


    [Figure 5-10](#9781430242093_Ch05.xhtml#F10) represents a very common problem
    often referred to as a *fan trap*. The danger here is to take a route between
    employee and group and infer something that was not intended. [Figure 5-11](#9781430242093_Ch05.xhtml#F11)
    shows some possible objects consistent with the model in [Figure 5-10](#9781430242093_Ch05.xhtml#F10).


    ![9781430242093_Fig05-11.eps](images/9781430242093_Fig05-11_fmt.png)


    [**Figure 5-11.**](#9781430242093_Ch05.xhtml#FG11) A fan trap


    Consider employees Jim and Sue. It is not possible to infer anything about which
    groups Jim or Sue work for. It is only possible to get many combinations of a
    **Group** object and an **Employee** object th at have a **Division** in common:
    Jim A, Jim B, Sue B, Jane D, and so on.^([2](#9781430242093_Ch05.xhtml#fn2)) We
    must not mistake these combinations for the information we require—for example,
    which group or groups does Jane belong to?


    The feature that alerts us to a fan trap is a class with two relationships with
    a Many cardinality at the outside ends. This leads to the fan shape in [Figure
    5-11](#9781430242093_Ch05.xhtml#F11).


    What can we do about it? If it is important for our system to be able to show
    the groups for which an employee works, we will need another relationship between
    **Group** and **Employee**, or we may need to model the problem quite differently
    (as shown in the next section).


    Gaps in a Route Between Classes (Chasm Trap)


    We might choose to model the relationships between divisions, groups, and employees
    in a hierarchical way as in [Figure 5-12](#9781430242093_Ch05.xhtml#F12) (i.e.,
    a division has groups and groups have employees). The optionality at one end of
    the employee–group relationship has not been specified. Think about the different
    possibilities.


    ![9781430242093_Fig05-12.tif](images/9781430242093_Fig05-12_fmt.jpeg)


    [**Figure 5-12.**](#9781430242093_Ch05.xhtml#FG12) Another way of modeling an
    organization'
  trans: '# 冗余、陷阱与数据模型


    正如前一节所论证的，易于检索的优势似乎可能超过随之而来的数据维护复杂性。我们应不惜一切代价避免的是，当没有相应的复杂性降低时，为一条信息提供替代路径。


    ## 冗余信息


    本应相同的信息通过两种不同路径获取，可被称为 **冗余信息**。在上一节中，关于当前房间住户的信息就是冗余的。我们可以通过检查 `is currently
    in` 关系来找到当前住户，或者通过查看团队的退房日期来推断当前住户。


    让我们看一下示例 5-3，这是冗余信息的另一个案例。


    ### 示例 5-3：创业孵化器


    一家创业孵化器有若干员工，他们各自为一个或多个小型项目团队工作。每个团队及其所有员工都安置在一个特定的房间里，较大的房间会容纳多个团队。我们可能需要诸如每位员工的工位在哪里、特定员工的电话号码、某个团队在哪里、哪些员工在每个团队中、谁在每个房间等信息。一种可能的数据模型如图
    5-7 所示。花点时间理解这个数据模型及其所包含的关于特定问题（如一个房间内有多少团队等）的信息。该模型存在冗余信息。你能看出来吗？


    ![9781430242093_Fig05-07.tif](img/9781430242093_Fig05-07_fmt.jpeg)


    ***图 5-7.** 包含冗余关系的员工、团队和房间*


    关于示例 5-3，如果我们经常需要查找员工的电话号码，可能会认为图 5-7 中 `Employee` 和 `Room` 之间的顶部关系是一个有用的直接路径。然而，通过
    `Group` 的替代路径，同样可以非常容易地获得此信息。我们可以找到该员工（唯一）所属的团队，然后找到该团队（唯一）所在的房间。这是一个非常简单的检索过程（它不涉及困扰示例
    5-2 中那家小旅馆的日期相关复杂问题）。


    然而，这个额外关系不仅是不必要的，而且是危险的。对于相同信息有两条路径，我们有可能得到两个不同的答案，除非数据得到非常仔细的维护。每当员工更换团队或团队转移房间时，都需要更新两个关系实例。如果没有非常仔细的更新流程，我们最终可能会得到“Jim
    在 A 团队，A 团队在 12 号房间”，而另一条路径可能直接将 Jim 关联到 15 号房间。**冗余信息容易导致不一致，应始终予以移除。**


    > **注意** 每当数据模型中存在封闭路径时（如图 5-7），值得仔细检查以确保没有关系是冗余的。


    ## 提供不同信息的路径


    并非所有封闭路径都必然意味着数据冗余。其中一条路径可能包含不同的信息。稍微修改示例 5-3 中的问题，允许一名员工为多个小型项目团队工作。如图 5-8 所示。现在你能推断出某位员工在哪个房间吗？


    ![9781430242093_Fig05-08.tif](img/9781430242093_Fig05-08_fmt.jpeg)


    ***图 5-8.** 为多个项目团队工作的员工*


    在图 5-8 的模型中，没有确定明确的路径连接员工和特定房间。例如，A 团队可能在 12 号房间，B 团队在 16 号房间，而 Jim 可能同时为两个团队工作。因此，Jim
    可能在 12 号房间，也可能在 16 号房间。仅仅缩小这种可能性可能就是问题所需的全部。然而，如果每位员工有一个主办公室，而我们希望记录该信息，就需要在员工和房间之间建立一个额外的关系，如图
    5-9 所示。


    ![9781430242093_Fig05-09.tif](img/9781430242093_Fig05-09_fmt.jpeg)


    **图 5-9.** 不同的路径提供不同的信息。


    看起来我们似乎引入了另一条路径，对于诸如“Jim 在哪个房间？”这样的问题会给出不同的答案。图 5-9 允许我们让 Jim 的办公室不同于他工作的任何一个团队所在的房间。对于现实生活中的问题，这可能正是所需要的。房间的大小和团队的员工数量不太可能总是匹配。重要的是确保两条路径不包含本应相同的信息，这样我们就不会引入可避免的不一致性。


    ## 路径产生的虚假信息（扇形陷阱）


    无法从图 5-8 推断出员工的房间，是一个更普遍问题的例子。请看示例 5-4。


    ### 示例 5-4：更大的组织


    一个组织有多个部门。每个部门拥有许多员工，并进一步划分为若干团队。我们可以将其建模为图 5-10。看看这个模型。关于特定员工与哪个（或哪些）团队相关联，我们能推断出什么？


    ![9781430242093_Fig05-10.tif](img/9781430242093_Fig05-10_fmt.jpeg)


    **图 5-10.** 对组织进行建模的一种（危险）方式


    图 5-10 代表了一个非常常见的问题，通常被称为 **扇形陷阱**。这里的危险在于，沿着员工和团队之间的路径进行推断，可能会得出并非本意的结论。图 5-11
    展示了一些与图 5-10 模型一致的可能对象实例。


    ![9781430242093_Fig05-11.eps](img/9781430242093_Fig05-11_fmt.png)


    **图 5-11.** 一个扇形陷阱


    考虑员工 Jim 和 Sue。无法推断 Jim 或 Sue 在哪些团队工作。只能得到许多共享同一部门的 `Group` 对象和 `Employee` 对象的组合：Jim
    A、Jim B、Sue B、Jane D 等等。^(2) 我们绝不能将这些组合误认为是所需的信息——例如，Jane 属于哪个（或哪些）团队？


    让我们意识到扇形陷阱的特征是：一个类在两端具有“多”基数性的两个关系。这导致了图 5-11 中的扇形形状。


    我们能对此做些什么？如果系统能够显示员工工作的团队对我们很重要，那么我们需要在 `Group` 和 `Employee` 之间建立另一种关系，或者我们可能需要以完全不同的方式建模该问题（如下一节所示）。


    ## 类之间路径的缺口（峡谷陷阱）


    我们可能会选择以层次结构的方式对部门、团队和员工之间的关系进行建模，如图 5-12（即一个部门拥有多个团队，一个团队拥有多名员工）。员工-团队关系一端的可选性尚未指定。思考一下不同的可能性。


    ![9781430242093_Fig05-12.tif](img/9781430242093_Fig05-12_fmt.jpeg)


    **图 5-12.** 对组织建模的另一种方式'
- fmt: '[Figure 5-13](#9781430242093_Ch05.xhtml#F13) shows some example objects. We
    have a direct connection between an employee and a single group (Jim works for
    Group A) and another between a group and its one division (Group A is in Division
    1). We can therefore make a confident and unique connection between Jim and Division
    1.


    ![9781430242093_Fig05-13.eps](images/9781430242093_Fig05-13_fmt.png)


    [Figure 5-13.](#9781430242093_Ch05.xhtml#FG13) A `chasm trap`


    So far, so good. However, in situations such as this, it is always useful to check
    that that connection is always there. What if Ann is not attached to a specific
    group? Maybe she is a general administrator for Division 1 and serves all groups.
    If an employee does not necessarily belong to a group, the model in [Figure 5-12](#9781430242093_Ch05.xhtml#F12)
    does not provide a link between Ann and her division. To find the appropriate
    `Division` object, we need to know the `Group`, and Ann has no related `Group`
    object. If we need to know this information, we have a problem. This is sometimes
    referred to as a `chasm trap` (we can’t get there from here).


    This is yet another case where careful study of the data model provides quite
    interesting questions about the problem. For a model such as the one in [Figure
    5-12](#9781430242093_Ch05.xhtml#F12), we should always check for the exceptional
    case of an employee who may not be attached to any group.


    How we solve the problem of a `chasm trap` depends on the situation we are modeling.
    One possibility is to add another relationship between division and employee so
    we can always make that connection. However, this extra relationship is going
    to cause redundant information. For many employees, we will have two routes for
    connecting them with a division: directly and via their group. This is the situation
    we had in [Example 5-3](#9781430242093_Ch05.xhtml#ex5-3) and can lead to inconsistent
    results for connecting employees and divisions. This is not recommended.


    A different way to get around the problem in [Example 5-4](#9781430242093_Ch05.xhtml#ex5-4)
    is to introduce another group object (administration or ancillary staff). Ann
    could belong to this group, and we can then insist that every employee `must`
    be in a group. However, it may be that the problem needs to be remodeled entirely.
    It is often best to go back to the use cases and reconsider what information is
    the most important for the problem. It is never possible to capture every detail
    in a project with finite resources, so pragmatism becomes very important.


    ## Relationships Between Objects of the Same Class


    Let’s return to our sports club from [Example 5-1](#9781430242093_Ch05.xhtml#ex5-1).
    Many clubs require a new member to be introduced or sponsored by an existing member.
    If it is necessary to store sponsorship information, a first attempt at a data
    model might be as shown in [Figure 5-14](#9781430242093_Ch05.xhtml#F14).


    ![9781430242093_Fig05-14.tif](images/9781430242093_Fig05-14_fmt.jpeg)


    [Figure 5-14.](#9781430242093_Ch05.xhtml#FG14) Modeling members and sponsors (not
    correct)


    The problem with the model in [Figure 5-14](#9781430242093_Ch05.xhtml#F14) is
    that (by definition) a sponsor is a member. The model will mean that if Jim sponsors
    a new member of the club, we will be storing two objects for him (one in the `Member`
    class and one in the `Sponsor` class), both probably containing the same information
    (until it inevitably becomes inconsistent). What is really happening here is that
    members sponsor each other. This can be represented by a `self relationship` as
    shown in [Figure 5-15](#9781430242093_Ch05.xhtml#F15).


    ![9781430242093_Fig05-15.tif](images/9781430242093_Fig05-15_fmt.jpeg)


    [Figure 5-15.](#9781430242093_Ch05.xhtml#FG15) Members sponsor other members


    The relationship in [Figure 5-15](#9781430242093_Ch05.xhtml#F15) is read exactly
    the same as a relationship between two different classes. Reading clockwise, we
    have *a particular member may sponsor many members*, while counterclockwise we
    have *a particular member is sponsored by exactly one member*. As with all relationships,
    we have to change the verb depending on the direction (i.e., *sponsors* and *is
    sponsored by*). I have annotated [Figure 5-15](#9781430242093_Ch05.xhtml#F15)
    to dispel any confusion about which way around we are going.


    Nothing in this data model prevents members from sponsoring themselves. Such constraints
    need to be noted, most usefully by mentioning them in the appropriate use case
    (e.g., adding a member).


    `Self relationships` appear in many situations. This is certainly true for data
    pertaining to genealogy or animal breeding. Consider the case in [Figure 5-16](#9781430242093_Ch05.xhtml#F16)
    in which we record information about animals and their mothers (I am only leaving
    out fathers to keep the example simple!).


    ![9781430242093_Fig05-16.tif](images/9781430242093_Fig05-16_fmt.jpeg)


    [Figure 5-16.](#9781430242093_Ch05.xhtml#FG16) Genealogical data about animals


    Reading clockwise, we have that *one animal may be the mother of several other
    animals*, and counterclockwise, that *each animal has at most one mother*. Why
    not *exactly* one mother? Every animal has to have a mum, does it not? This is
    where we have to be quite sure about the definitions of our classes. The class
    `Animal` represents those animals about which we are keeping data, not all animals.
    If we trace back the ancestry of a pure–bred dog for example, we may find his
    mother in our database, as well as her mother, but eventually we will come to
    a blank. You might argue that the additional generations should be added for completeness,
    but this could mean tracing back to the primeval slime. Our data model does not
    say that *some animals do not have mothers*, but merely that *some animals do
    not have mothers that are recorded in our database*.


    As an aside, note that our `Animal` class will presumably contain animals of both
    sexes. Clearly if we establish an `is mother of` relationship between two `Animal`
    objects, the mother must be female. As it stands, there is nothing in the model
    to prevent male animals being recorded as mothers. This constraint could be expressed
    in the use case, but if this is a serious genealogical database, we may wish to
    treat males and females slightly differently. We will discuss ways to use techniques
    called `generalization` and `specialization` for situations such as this in [Chapter
    6](#9781430242093_Ch06.xhtml).


    ## Relationships Involving More Than Two Classes


    In the examples so far, the information in which we have been interested generally
    relates to relationships involving two classes (e.g., which members are on which
    team, or which employee is in which group). Sometimes we have data that depend
    on objects of more than two classes. Let’s reconsider a sports club. As well as
    keeping data about members and their current team, we might also want to keep
    information about games or matches between teams. Ignoring, now, complications
    such as byes,^([3](#9781430242093_Ch05.xhtml#fn3)) we can say that exactly two
    teams play in a match. A possible data model is shown in [Figure 5-17](#9781430242093_Ch05.xhtml#F17).


    ![9781430242093_Fig05-17.tif](images/9781430242093_Fig05-17_fmt.jpeg)


    [Figure 5-17.](#9781430242093_Ch05.xhtml#FG17) Possible data model for members,
    teams, and matches'
