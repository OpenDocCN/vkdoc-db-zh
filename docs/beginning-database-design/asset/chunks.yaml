    \ 9-5](#9781430242093_Ch09.xhtml#F5)的类时，1-1关系将通过`Team`表中的外键表示，如[图 9-6](#9781430242093_Ch09.xhtml#F6)所示。\n\
    \n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-06_fmt.jpeg)\n\n[**图\
    \ 9-6.**](#9781430242093_Ch09.xhtml#FG6) `Team`表\n\n每个队只能有一名队长（因为只有一个`captain`字段）；然而，我们尚未讨论如何确保每位成员按照1-1关系的要求只能担任一个队的队长。在[图\
    \ 9-6](#9781430242093_Ch09.xhtml#F6)中，注意成员203是多个队的队长。我们可以通过在`Team`表的`captain`字段上添加唯一约束来防止这种情况发生。这将阻止同一个值被输入到多行的`captain`字段中。创建在`captain`字段上带有唯一约束的`Team`表的SQL如[清单\
    \ 9-2](#9781430242093_Ch09.xhtml#L2)所示。\n\n***[清单 9-2](#9781430242093_Ch09.xhtml#Lis2).**\
    \ 确保 `Member` 和 `Team` 之间的 1-1 队长关系*\n```sql\nCREATE TABLE Team (\n    team_name\
    \ VARCHAR(20) PRIMARY KEY,\n    captain INT UNIQUE FOREIGN KEY REFERENCES Member\n\
    )\n```\n唯一约束能帮助我们解决一些设计问题：强制1-1关系，以及维护未被选为主键的候选键的唯一性。\n\n## 使用约束代替类别类\n\n我们关于类及其在关系数据库中对应表的讨论，很多都涉及引入新的类和表以保持数据的准确性和一致性。现在我们将看看何时你可能决定不添加额外的类以及原因。让我们思考俱乐部的成员及其会员类型（例如，高级会员`Senior`、初级会员`Junior`或社交会员`Social`）。如果我们在`Member`表中将会员类型作为一个字段，可能会出现一致性问题，如[图\
    \ 9-7](#9781430242093_Ch09.xhtml#F7)中表的第一行所示的拼写错误。\n\n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-07_fmt.jpeg)\n\
    \n[**图 9-7.**](#9781430242093_Ch09.xhtml#FG7) 将会员类型作为`Member`表中的一个字段\n\n如果我们有兴趣创建报告，将所有不同类型的成员分组（例如，所有高级会员、所有初级会员等），在[图\
    \ 9-7](#9781430242093_Ch09.xhtml#F7)的表中，我们遇到类型拼写不一致的问题。我们在前几章中的解决方案是创建一个额外的类（表）来保存不同的会员类型，并建立一个1-多关系，如[图\
    \ 9-8](#9781430242093_Ch09.xhtml#F8)所示。\n\n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-08_fmt.jpeg)\n\
    \n[**图 9-8.**](#9781430242093_Ch09.xhtml#FG8) 用类表示会员类型\n\n我们现在可以有`Type`类的对象或`Type`表的行来表示我们的每种类型：`Junior`、`Senior`等。这确保了我们在命名不同类型时的一致性。看看[图\
    \ 9-9](#9781430242093_Ch09.xhtml#F9)中的表。`Type`表看起来有点多余。\n\n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-09_fmt.png)\n\
    \n[**图 9-9.**](#9781430242093_Ch09.xhtml#FG9) 会员类型是一个单独的表\n\n这个额外的`Type`表所实现的，只是确保`Member`表中`type`字段条目的统一性。我们可以通过在`type`字段上设置检查约束来达到同样的目的。我们在[第7章](#9781430242093_Ch07.xhtml)讨论了字段上的约束。[图\
    \ 9-10](#9781430242093_Ch09.xhtml#F10)展示了在像Access这样的产品中如何轻松完成此操作，[清单 9-3](#9781430242093_Ch09.xhtml#L3)展示了等效的SQL。\n\
    \n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-10_fmt.jpeg)\n\n[**图\
    \ 9-10.**](#9781430242093_Ch09.xhtml#FG10) 带有约束的会员类型\n\n***[清单 9-3](#9781430242093_Ch09.xhtml#Lis3).**\
    \ 在字段上放置约束*\n```sql\nCREATE TABLE Member (\n    memberID INT PRIMARY KEY,\n  \
    \  last_name VARCHAR(20),\n    first_name VARCHAR(20),\n    type VARCHAR(20) CHECK\
