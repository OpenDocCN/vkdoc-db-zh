    Foreword


    When I wrote the foreword to the first edition of *Beginning Database Design*,
    I expressed my hopes to see this book become a popular classic. I felt that it
    deserved to be so. As the technical reviewer, I had thoroughly enjoyed Clare’s
    skill in turning a subject that is often presented dryly into a vivid and interesting
    book, and her skill in dissecting the thought process that lets you go from functional
    requirements to the design of a database that will be able to keep data consistent,
    grow, and bear the load. *Beginning Database Design* doesn’t enunciate, like so
    many books, quasi–divine rules with pretentious jargon. It explains the goals,
    the common mistakes, why they are mistakes, and what you should do instead. It
    brings to light the logic behind the rules, all in a short and very readable book.


    There is much satisfaction in seeing five years later that my hopes have been
    fulfilled, and that *Beginning Database Design* has become one of the leading
    titles on this important topic—databases are everywhere and database design belongs
    to the core body of knowledge of any serious software developer. This edition
    has retained all the qualities that made the first one successful, including Clare’s
    lucid writing and humor, and if the page count has increased it has mostly been
    to include exercises allowing readers to test their understanding and compare
    their solutions to the answers that are provided. As the technical reviewer once
    again, I was in a privileged position to witness the small improvements—there
    wasn’t that much to improve—that Clare has brought to her book, clarifying a sentence
    here, improving an example there. There is a great quote by Saint-Exupéry, the
    author of *The Litte Prince*, that says that perfection is achieved not when there
    is nothing left to add, but when there is nothing left to remove. I am sure that
    Clare will agree with me that this remark, written with aircraft engineering in
    mind, applies to database design as well. I also feel that there is nothing to
    remove from this book.


    Stéphane Faroult

    Database, SQL, and Performance Consultant

    RoughSea Limited


    About the Author


    | ![FM01.tif](images/FM01_fmt.jpeg) | **Clare Churcher** (B.Sc. [Honors], Ph.D.)
    has designed and implemented databases for a variety of clients and research projects.
    She is currently the Head of the Applied Computing Department at Lincoln University
    in Lincoln, Canterbury, New Zealand. Clare has designed and delivered a range
    of courses including analysis and design of information systems, databases, and
    programming. She has received a university teaching award in recognition of her
    expertise in communicating her knowledge. Clare has road–tested her design principles
    by supervising over 70 undergraduate group database design projects. Examples
    from these real–life situations are used to illustrate the ideas in this book.
    |


    About the Technical Reviewer


    **Stéphane Faroult** first discovered relational databases and the SQL language
    back in 1983\. He joined Oracle France in its early days (after a brief spell
    with IBM and a bout of teaching at the University of Ottawa) and soon developed
    an interest in performance and tuning topics. After leaving Oracle in 1988, he
    brieﬂy tried to reform and did a bit of operational research; but after one year,
    he succumbed again to relational databases. He has been continuously performing
    database consultancy since then, and founded RoughSea Limited in 1998\. He is
    the author of *The Art of SQL* (O’Reilly, 2006) and of *Refactoring SQL Applications*
    (O’Reilly, 2008).


    Acknowledgments


    Thanks to my family, friends, and colleagues who helped with the two editions
    of this book. First of all, I want to say thanks very much to my husband, Neville,
    for introducing me to this subject a long time ago and for always being prepared
    to offer advice and support. Thanks also to all my friends and colleagues at Lincoln
    University for their interest and input. Most of the examples in these books are
    based on scenarios that have cropped up during my teaching at Lincoln. So, a big
    thank you to my students for all the quirky insights, understandings, and misunderstandings
    they have introduced me to over the last 19 years.


    Thanks again to my editor Jonathan Gennick for suggesting I write a second edition
    and providing helpful suggestions, and also to Stéphane Faroult for his good–humored
    expertise as technical reviewer.


    Introduction


    Everyone keeps data. Big organizations spend millions to look after their payroll,
    customer, and transaction data. The penalties for getting it wrong are severe:
    businesses may collapse, shareholders and customers lose money, and for many organizations
    (airlines, health boards, energy companies), it is not exaggerating to say that
    even personal safety may be put at risk. And then there are the lawsuits. The
    problems in successfully designing, installing, and maintaining such large databases
    are the subject of numerous books on data management and software engineering.
    However, many small databases are used within large organizations and also for
    small businesses, clubs, and private concerns. When these go wrong, it doesn’t
    make the front page of the papers; but the costs, often hidden, can be just as
    serious.


    Where do we find these smaller electronic databases? Sports clubs will have membership
    information and match results; small businesses might maintain their own customer
    data. Within large organizations, there will also be a number of small projects
    to maintain data information that isn’t easily or conveniently managed by the
    large system–wide databases. Researchers may keep their own experiment and survey
    results; groups will want to manage their own rosters or keep track of equipment;
    departments may keep their own detailed accounts and submit just a summary to
    the organization’s financial software.


    Most of these small databases are set up by end users. These are people whose
    main job is something other than that of a computer professional. They will typically
    be scientists, administrators, technicians, accountants, or teachers, and many
    will have only modest skills when it comes to spreadsheet or database software.


    The resulting databases often do not live up to expectations. Time and energy
    is expended to set up a few tables in a database product such as Microsoft Access,
    or in setting up a spreadsheet in a product such as Excel. Even more time is spent
    collecting and keying in data. But invariably (often within a short time frame)
    there is a problem producing what seems to be a quite simple report or query.
    Often this is because the way the tables have been set up makes the required result
    very awkward, if not impossible, to achieve.


    Getting It Wrong


    A database that does not fulfill expectations becomes a costly exercise in more
    ways than one. We clearly have the cost of the time and effort expended on setting
    up an unsatisfactory application. However, a much more serious problem is the
    inability to make the best use of valuable data. This is especially so for research
    data. Scientific and social researchers may spend considerable money and many
    years designing experiments, hiring assistants, and collecting and analyzing data,
    but often very little thought goes into storing it in an appropriately designed
    database. Unfortunately, some quite simple mistakes in design can mean that much
    of the potential information is lost. The immediate objective may be satisfied,
    but unforeseen uses of the data may be seriously compromised. Next year’s grant
    opportunities are lost.'
