    # 预订模型的问题与业务规则


    每位客人可以随时间拥有多个预订，一个房间也可以被多次预订。每次预订对应一位客人和一个特定房间。这里需要提醒注意——我们最初的数据模型（图 A-16）表明一个房间只能容纳一位客人。既然我们现在允许一个房间随时间容纳多位客人，我们就丢失了这样一个信息：在任何特定时间点，一个房间只能有一位客人入住。我们在图
    A-17 中的模型无法防止多人同时预订同一个房间。这类问题从来不简单！记录关于同时预订的业务规则的一种方法，是在用于为房间添加预订的用例中进行描述。它可能会这样写：*不能为已有预订日期重叠的房间添加新的预订*。数据模型为我们提供了大量的洞见，但它本身并不能完整地描述问题。


    ## 练习 5-1


    图 A-18 中的类记录了关于一个部门的信息。对于部门的经理和位置信息进行建模，还有哪些其他选择？


    ![9781430242093_APP01-18.tif](img/9781430242093_APP01-18_fmt.jpeg)


    图 A-18. 部门信息建模的初步尝试


    首先考虑位置。我们想用这些信息做什么？能够找到所有位于同一地点的部门可能很有用——例如，可以通知他们 CEO 要来访。如果我们想根据属性的值来检索对象，就必须确保该值在每个对象中存储一致。创建一个新类有助于解决这个问题。如果引入一个`Location`类，我们就可以存储每个位置的信息，并在部门和位置之间建立关系。引入`Location`类还允许我们保留关于位置的额外信息：地址、电话等等。


    我们不太可能经常需要根据经理的姓名来检索部门对象，因为在大多数情况下，经理只与一个部门相关联。然而，关于一位经理，我们需要了解大量的额外信息。如何联系他至少是一个起点。我们已经有这些信息了吗？公司肯定存储了其所有员工的信息，所以在这里我们应该将经理建模为指向现有`Employee`类的关系。


    图 A-19 展示了一个更好的模型。如果你感兴趣，可以尝试基于这个新模型来考虑历任经理。


    ![9781430242093_APP01-19.tif](img/9781430242093_APP01-19_fmt.jpeg)


    图 A-19. 更灵活的部门信息模型


    ## 练习 5-2


    一所大学想要为课程教学的信息建模。可能有多名教职员工参与一门课程的教学，其中一名教职员工被指定为课程主管。请提出一个初步的数据模型。


    我们为这种情况有两个显而易见的类：`Course`（课程）和`StaffMember`（教职员工）。这两个类之间有两种不同的关系：`teaches`（教）和`supervises`（监督）。图
    A-20 展示了一个可能的模型。从右向左阅读：每门课程有一位或多位教师，每门课程只有一位主管。从左向右阅读：教职员工可能教授和/或监督任意数量的课程。在这个模型中，我们没有考虑任何历史信息；也没有考虑其他可能的约束，例如，主管是否必须是教师之一？


    ![9781430242093_APP01-20.tif](img/9781430242093_APP01-20_fmt.jpeg)


    图 A-20. 使用两种关系对课程教学和监督进行建模


    ## 练习 5-3


    你会如何为婚姻信息建模？考虑所有可能产生的情况（为简单起见，暂时不必担心参与者的性别）。


    我们需要保存关于人的信息——至少是他们的名字。一个人与另一个人结婚，因此需要一个自反关系，如图 A-21 所示。


    ![9781430242093_APP01-21.tif](img/9781430242093_APP01-21_fmt.jpeg)


    图 A-21. 使用自反关系对婚姻建模


    可选性很容易理解——人们不必与他人结婚。基数（Cardinalities）呢？通常是一次只有一段婚姻（但不总是如此）。然而，从历史上看，一个人可能有多次婚姻。这就需要一个多对多（Many–Many）关系。当我们有一个多对多关系时，谨慎的做法总是要问：“关于特定的一对对象，哪些附加信息可能有用？”在这种情况下，婚姻的日期会很有用。这些信息可以保存在一个中间类`Marriage`中。我们还可以保存关于婚姻结束原因（离婚、分居、配偶去世等）的详细信息。一个`EndType`类将有助于准确维护这些类别，图
    A-22 中的数据模型就能捕获大量这类细节。每段婚姻恰好涉及两个人（`Marriage`和`Person`之间的两条线），而每个人可以涉及任意多次婚姻。一些婚姻已经结束，因此有一个与之关联的可选类别。


    ![9781430242093_APP01-22.tif](img/9781430242093_APP01-22_fmt.jpeg)


    图 A-22. 包含附加类以捕获婚姻信息


    ## 练习 5-4


    一个管弦乐队保存关于其音乐家、曲目和音乐会的信息。一个部分数据模型如图 A-23 所示。


    从这个初始模型中可能推导出哪些错误信息？


    修改模型，使其能正确维护以下信息：

    *   特定音乐会中哪些演奏者参与了特定的作品

    *   音乐会上将呈现哪些作品

    *   演奏者在特定音乐会中出场获得的酬金


    ![9781430242093_APP01-23.tif](img/9781430242093_APP01-23_fmt.jpeg)


    图 A-23. 管弦乐队音乐会信息的部分模型


    这个模型存在一个扇形陷阱（fan trap）：两个关系的外端都具有多（Many）基数。例如，如果我们知道 Joe Smith 被要求参加周六的音乐会，并且贝多芬的小提琴奏鸣曲将在周六的音乐会上演出，我们可能会错误地推断
    Joe 会演奏这首小提琴奏鸣曲。


    如果我们想知道在特定音乐会上，哪些演奏者参与了哪些特定的作品，我们需要一个同时涉及`Player`（演奏者）、`Concert`（音乐会）和`Work`（作品）这三个类的三元关系。图
    A-24 通过一个新的`Appearance`（出场）类来表示这种三元关系。


    ![9781430242093_APP01-24.tif](img/9781430242093_APP01-24_fmt.jpeg)


    图 A-24. 通过附加类表示的三元关系


    `Appearance`类的每个对象都与一位演奏者、一部作品和一场音乐会相关联。它允许我们保存如图 A-25 中表格所示的数据。我们可以看到 Joe 在周六演奏了奏鸣曲和交响曲，而
    Linda 只演奏了奏鸣曲。


    ![9781430242093_APP01-25.tif](img/9781430242093_APP01-25_fmt.jpeg)


    图 A-25. 由`Appearance`类表示的示例数据

