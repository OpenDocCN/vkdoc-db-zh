- fmt: '![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-11_fmt.jpeg)


    **Figure 2-11.** First attempt at a data model for plants example


    We now need to check whether this model is able to satisfy the requirements of
    the three use cases in [Figure 2-4](#9781430242093_Ch02.xhtml#F4):


    **Use case 1:** Maintain plant information. We can create objects for each plant
    and record the attributes we might require now or in the future. We can create
    use objects, and we can specify relationship instances between particular plant
    and use objects.


    **Use case 2:** Report on plants. We can take a particular plant object (or each
    one in turn) and find the values of its attributes. We can then find all the use
    objects related to that plant object.


    **Use case 3:** Report on uses. We can take a particular use object and find all
    the plant objects that are related to it.


    So far not too bad. But Let’s look a bit more carefully. Use case 1 is really
    two or maybe three separate tasks. If we consider how the database will actually
    work in practice, it seems likely that the different uses (`hedging`, `shelter`,
    etc.) would be entered right at the start of the project and be updated from time
    to time. Entering information about uses is a task that a user might want to perform
    independently of any specific plant information. At some later time, the same
    user, or someone else, may want to enter details of a plant and relate it to the
    uses that are already recorded.


    These are important questions to consider about any use cases related to input.
    How will it be done in practice? Will different people be involved? Will bits
    of the data be entered at different times? Answering these questions is the first
    part of the analysis, where we have to get inside the users’ heads to find out
    what they really do. (Don’t ever rely on them telling you.)


    ![images](images/sq.jpg) Tip For data entry or editing, separate the tasks done
    by different people or at different times into their own use cases.


    Now Let’s look at use case 2 where we want to report about plants. We can find
    out more about the problem by probing a bit more deeply into how the user envisages
    the reporting of information about plants. Think about the following dialog:


    *You*: Would you like to be able to print out a list of all your plants to put
    in a folder or send to people?


    *User*: That would be good.


    *You*: What order would you like the plants to be listed in?


    *User*: By their genus, I guess. Alphabetical?


    *You*: Genus? So you’d like, for example, all the `Eucalyptus` plants together.


    *User*: Yep, that would be good.


    At this point in the conversation, we see another level of the problem. (Give
    yourself bonus points if you’ve already thought of the issue I’m about to describe.)
    If we look carefully at the data in the original table, we can see that it appears
    that each genus includes a number of species, and each of these species can have
    many uses. Another question can confirm whether we understand the relationship
    between genus and species correctly.


    *You*: So each species belongs to just one genus? Is that right?


    *User*: That’s right.


    We can see that asking questions about the reporting use cases in the initial
    problem statement is another excellent way to find out more about the problem.


    ![images](images/sq.jpg) Tip For data retrieval or reporting tasks, ask questions
    about which attributes might be used for sorting, grouping, or selecting data.
    These attributes may be candidates for additional classes.


    We now realize that we have a new class, `Genus`, to add to our data model. Why
    is it important to include this new class? Well, if `genus` remains as simply
    an attribute of our original `Plant` class, we can enter pretty much any value
    for each object. Two objects with `genus` `Eucalyptus` might end up with different
    spellings (almost certainly if I were doing the data entry). This would cause
    problems every time we wanted to find or count or report on all `Eucalyptus` plants.
    The fact that our user has mentioned that grouping by `genus` would be useful
    means that it is important to get the `genus` data stored appropriately. Our revised
    data model in [Figure 2-12](#9781430242093_Ch02.xhtml#F12) shows how `genus` can
    be represented so that the data is kept accurately.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-12_fmt.jpeg)


    **Figure 2-12.** Revised data model for our plant problem


    We now have a set of `genus` objects, and each `plant` must be associated with
    exactly one of them. You will see in [Figure 2-12](#9781430242093_Ch02.xhtml#F12)
    that we have also renamed the `Plant` class to `Species`, as it is the species,
    or type of plant, about which we are keeping information, not actual physical
    plants. This opens the way for future extension of the model to keep information
    about actual plants if we so wish (e.g., when each was planted, when it was pruned,
    and so on).


    Entering the values of each `genus` will likely be a separate job from entering
    data for each `species`, so it should have its own use case. We don’t want or
    need to enter a new object for the `Eucalyptus` genus every time we enter a new
    `species`.


    [Example 2-2](#9781430242093_Ch02.xhtml#ex2-2) shows the amended use cases. See
    how the reporting use cases can now be much more precisely defined in terms of
    the data model.


    ## Example 2-2. Revised Use Cases for the Plant Database


    [Figure 2-13](#9781430242093_Ch02.xhtml#F13) shows the revised use cases for the
    plant problem. Text following the figure describes each use case.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-13_fmt.png)


    **Figure 2-13.** Revised use cases for the plant problem


    **Use case 1**: Maintain uses. Create or update a `use` object. Enter (or update)
    the name.


    **Use case 2**: Maintain genus. Create or update a `genus` object. Enter the name.


    **Use case 3**: Maintain species. Create a `species` object. Generate a unique
    ID, and enter the species and common name. Associate the new `species` object
    with one of the existing `genus` objects and optionally associate it with any
    number of the existing `uses`.


    **Use case 4**: Report plant information. For each `genus` object, write out the
    name and find all the associated `species` objects. For each `species` object,
    write out the species and common name. Find all the associated `uses` and write
    out their names.


    **Use case 5**: Report use information. For each `use` object, write out the name.
    Find all the associated `species` objects, and write out for each the associated
    `genus` name and the species and common names.


    What we have done here is taken some initial use cases and explored the details
    (e.g., how would you like the plants ordered in the report?). This led us to update
    the class diagram. We then looked at how the new class diagram copes with the
    tasks we need to carry out. This is an iterative process and forms the main part
    of the analysis of the problem. After a few iterations, we will have a much clearer
    idea of what the users want and what they mean by many of the terms they use.


    ## Design'
