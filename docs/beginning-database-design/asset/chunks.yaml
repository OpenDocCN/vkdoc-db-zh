  trans: "# 图 A-45. 录入缺勤情况的表单\n\n为了向教师报告，我们需要来自全部三张表的信息。代码清单 A-7 展示了用于连接这些表的视图的 SQL。请注意，我们在\
    \ `Student` 表上使用了外连接，以便即使学生没有缺勤记录也能被包含在内。\n\n## 代码清单 A-7. 从所有三张表中检索信息的 SQL\n\n\
    ```sql\nCREATE VIEW AllInfo AS\nSELECT * FROM Teacher INNER JOIN\n(Student LEFT\
    \ JOIN Absence ON studentID = student)\nON teacherID = teacher;\n```\n\n图 A-46\
    \ 展示了基于代码清单 A-7 中视图查询出的一些数据。\n\n![9781430242093_APP01-46.tif](img/9781430242093_APP01-46_fmt.jpeg)\n\
    \n# 图 A-46. 从图 A-8 中视图检索出的数据\n\n图 A-46 中的数据包含了我们制作所有报告所需的一切。我们只需要选择相关的行，然后进行一些分组和汇总操作。\n\
    \n通过仅选择当天的行，我们可以获取每日缺勤情况。按学生姓名对数据进行排序对于体育老师来说就可以了，但如图 A-47 那样按教师对数据进行分组，则是向每位班级教师提供信息的一种更有用的方式。\n\
    \n![9781430242093_APP01-47.tif](img/9781430242093_APP01-47_fmt.jpeg)\n\n# 图 A-47.\
    \ 为每位班级教师分组的当前缺勤情况\n\n添加一些计数、选择相关时间段的数据以及增加分组，可以提供多种不同的报告。图 A-48 展示了两份报告：一份显示每日缺勤总数，另一份显示二月份每位学生的缺勤总数。\n\
    \n![9781430242093_APP01-48.eps](img/9781430242093_APP01-48_fmt.png)\n\n# 图 A-48.\
    \ 通过不同分组和汇总方式可能生成的报告示例\n\n## 索引\n\n### A\n\n抽象模型\n\n学术数据报告\n\n聚合\n\n异常更新\n- 任务表\n\
    - 删除问题\n- 插入问题\n- 修改问题\n- 项目表\n\n### B\n\nBoyce-Codd 范式\n\n### C\n\n基数\n- 历史数据示例\n\
    - 昆虫样本收集问题\n- 体育俱乐部问题\n\n字符类型\n\n深渊陷阱，组织模型\n\n聚集索引\n\n复合键。*参见* 连接键\n\n组合\n\n连接键\n\
    \n约束。*参见* 唯一约束\n\n客户订单下单问题\n\n### D\n\n数据抽象\n\n数据分析\n- 类与对象\n- 关系\n\n数据库开发过程\n\
    - 数据抽象\n- 数据分析\n  - 类与对象\n  - 关系\n- 数据独立性\n- 设计实现\n  - 输入用例的接口\n  - 植物数据库表"
