  trans: '

    从右往左看这个关系，并质疑一门课程是否**必须**有学生注册，这引发了关于我们如何定义课程的类似讨论。我们可能希望保留关于课程的哪些数据？思考一下我们可能需要处理的所有不同情况。我们可能需要考虑已开过的、当前正在开设的或计划开设的课程；多次同时开设的热门课程（两个班）；以及在册但没有学生的冷门课程。在不与客户讨论具体情况的情况下，你无法得出绝对的答案，但你可以提出一些可能的定义供考虑。


    ## 客户订单示例


    这是一个更简单的例子。（真的吗？）我们保存客户及其所下订单的信息。我们的第一反应是说客户可以下多个订单，而每个订单由一位客户下达。这可以如图 4-4 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-04_fmt.jpeg)


    **图 4-4.** 客户下单的数据模型


    那么可选性呢？从左到右考虑这个关系。一个客户能否没有相关联的订单？这取决于客户的定义。出于许多业务的目的，客户可能是*任何我希望能向其销售产品的人*。像*任何曾经下过订单以及将要收到产品目录的其他人*这样的工作定义似乎是合理的，并表明可选性为
    0（即，我们数据库中的客户不一定下过订单）。然而，这个定义可能会引发一些问题，例如：“你是否希望能够识别出那些曾经下过订单但现在厌倦了收到产品目录的人？”


    从右往左看这个关系，我们想知道每个订单是否**必须**有一个关联的客户。这似乎是显而易见的。如果我们不知道订单是给谁的，那订单有什么意义？如果收到一封没有姓名或地址的邮购订单，我们可以合理地认为它不应被输入数据库，因此从这个角度，我们可以坚持每个订单必须有一个客户（可选性为
    1）。


    然而，知道订单是为谁下的，与将其关联到数据库中的客户对象之间，存在细微的差别。一封书面订单可能来自里卡通路的史密斯太太。虽然我们知道是谁下的订单，但这与将其关联到一个客户不同。如果史密斯太太是新客户，我们可能不得不创建一个新对象；或者我们可能面临决定这个订单来自现有的三个史密斯太太中的哪一个。区分细节相似的客户，或决定客户数据库中的两个或多个条目是否实际上指的是同一个人，可能很困难。再次强调，我们现在并不是要解决这些问题。我们只是利用数据模型来促使我们清晰地思考我们将要面对的一些问题。


    ## 昆虫示例


    这是另一个关于如何调查关系可选性可能引发对问题范围思考的例子。图 4-5 展示了来自示例 1-3 的一个可能的数据模型的一部分，其中访问了农场并收集了多个昆虫样本。一个`访问`对象将包含有关特定访问日期和条件的信息，并与多个`样本`对象相关联。每个样本对象将包含有关收集到的昆虫数量的信息。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-05_fmt.jpeg)


    **图 4-5.** 收集样本的数据模型


    询问一个样本是否**必须**关联到一次访问，就像上一节中关于订单是否**必须**有客户的问题一样。如果对于这个研究项目，我们的样本只来自农场，那么我们必须访问农场才能收集它们是合理的，因此每个样本应该总是与一次访问相关联。然而，如果数据库的范围更广，包含了存储多年且来源不确定的样本记录，我们可能需要重新考虑。如果我们坚持一个样本必须关联到一次访问，那么我们将无法轻松地记录这些历史样本的信息。


    询问每次访问是否必须有一个相关联的样本（样本端的可选性应为 0 还是 1？）引出了一个有趣的问题：是否可能在某些时候，我们想记录为收集样本以外的原因访问农场的情况？这些问题看似微不足道，但只有这样才能增进对更广泛问题的理解。


    ## 基数为 1：它偶尔会是 2 吗？


    问题的每个部分都可能受到特殊情况的影响。在分析情况时，仔细考虑不同的场景非常重要，以确保数据库能够充分处理所有可能出现的数据。一些“例外”实际上是被忽视的复杂情况。现实生活和真正的问题总是复杂的。即使是像*写下你通常的地址*这样简单的事情，也可能隐藏着困难，就像许多共享监护权的孩子在填写学校表格上的地址时所发现的那样。坚持问“一个人可能有不止一个常用地址吗？”可能显得吹毛求疵，但成千上万的现代家庭不能被轻易地当作例外。


    在本节中，我们将探讨如何处理那些不值得对问题进行彻底改革，但在数据库的生命周期内仍可能出现的“例外”。在本章前面的旅舍数据模型示例中，我们已经看到了一个可能的例外。在那里，我们考虑了团体中某些成员可能想提前离开的情况。在旅舍数据模型中，我们没有通过允许每个团体有多个离开日期来使问题复杂化，而是重新定义了用于存储数据目的的“团体”含义（即一组在同一日期到达和离开的人）。


    以下部分提供了一些其他例子，在这些例子中，不同的定义可以帮助应对一些可预见的、但不寻常的事件。


    ### 昆虫示例


    在上一节中，我们看了科学家访问农场收集昆虫样本的例子。如果天气晴朗或下雨，某些昆虫的行为可能不同，因此记录样本收集时的天气信息可能很重要。为了始终如一地记录天气状况，科学家可能决定从几个类别中选择。引入一个包含不同天气状况对象（例如，晴天、多云、下雨）的`天气`类可以确保信息被一致地记录。代表该数据的部分可能类图如图
    4-6 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-06_fmt.jpeg)


    **图 4-6.** 将天气类别与访问相关联


    从左到右阅读天气类别和访问之间的关系，一次访问有一个描述它的天气类型是合理的，但也可能有这样的情况：在收集最后几个样本时，一场雷暴来了。如果是这样，我们在意吗？答案当然取决于客户，但提出这个问题并提供一些可能性是分析师的责任。

    '
- fmt: 'At one extreme, the conditions under which each individual sample is collected
    may be vital. In this case, it might be more sensible to associate each sample
    with its own weather condition, as shown in [Figure 4-7.](#9781430242093_Ch04.xhtml#F7)


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-07_fmt.jpeg)


    [**Figure 4-7.**](#9781430242093_Ch04.xhtml#FG7) Associating each sample with
    a weather category


    This latter solution may be overkill when the majority of visits have stable weather
    conditions. It seems pointless to record the same weather condition for each of
    50 samples. A compromise solution may be to say that, if the weather changes markedly,
    we will create another visit. This way all visits have a single associated weather
    type, and we can cope with the “exceptional” case by redefining what we mean by
    a visit. For example:


    *A visit is a time spent on a farm during constant weather conditions on a single
    day. It is possible to have more than one visit to a farm per day.*


    This compromised solution is similar to our redefinition of a group for people
    with different departure and arrival dates in the hostel example. The data model
    remains unchanged, but our revised definition of a visit is in place for the inevitable
    day when lightning strikes, so to speak.


    ## Sports Club Example


    Here is another little snippet of a database problem. A local sports club may
    want to keep a list of its membership and the team for which each member currently
    plays (`SeniorB`, `JuniorA`, `Veteran`, etc.). One way to model this data is shown
    in [Figure 4-8](#9781430242093_Ch04.xhtml#F8).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-08_fmt.jpeg)


    [**Figure 4-8.**](#9781430242093_Ch04.xhtml#FG8) Members and their current teams


    The data model as it stands does not require all members to be associated with
    a team (optionality 0 at the team end). This means members may be purely social
    or may miss out on being selected for a team. However, we should still ask questions
    about the maximum number of teams with which a member might be associated. For
    example, “Can a member play for more than one team and, if so, do we care?” The
    data model clearly does not allow for historical records to be kept. If a player
    is promoted from one team to another, he will simply be associated with the new
    team, and we will lose information about his association with his previous team.
    If the scope of the database is simply to record current affiliations of members
    with teams, then that is OK. (If not, just wait a few moments until the next section.)


    Even if we are only keeping information on current team membership, we are always
    going to come across the situation where injury or sickness necessitates a member
    of one team filling in for another team for a particular match. How will this
    affect the data model? This is a question of scope. Why are we keeping this data
    and what information do we want to be able to extract from the database? If we
    want to keep track of which players played in particular matches, our data model
    is woefully inadequate. We will need to introduce a `Match` class and consider
    other complications (see [Chapter 5](#9781430242093_Ch05.xhtml)).


    However, the scope of the problem may simply be to record a person’s `main` team.
    This may be to enable team members to be on a list to be phoned if a match is
    canceled or if there is to be a rescheduled practice or a social outing. If this
    is the case, the cardinality of 1 in the data model in [Figure 4-8](#9781430242093_Ch04.xhtml#F8)
    is fine, so long as it is understood that the relationship `plays for` means a
    player’s `main` team rather than just any team they may play for.


    ## A Cardinality of 1: What About Historical Data?


    We have had a number of examples of relationships with a cardinality of 1 at one
    end. A room has one guest; a club member plays for one team. In both these cases,
    we have been careful to add the word `currently` because over time a room will
    have many guests and a player many teams. An important question is, “Do we want
    our system to keep track of previous guests or previous team affiliations?” This
    is often overlooked during the analysis, and sometimes the oversight does not
    become evident for some time. A sports club will find its system just fine for
    the first season but may get a surprise when the next year’s teams replace the
    previous ones, which are then lost forever. In this section, we will look at a
    few different examples to illustrate how we can manage historical data.


    ### Sports Club Example


    To illustrate how the sports club might lose its historical data, Let’s look at
    some simple data as it might be kept in a database table. If each member is associated
    with just one team, that team becomes a characteristic of the member, and the
    relationship can be represented as an attribute in the `Member` class as in [Figure
    4-9](#9781430242093_Ch04.xhtml#F9).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-09_fmt.jpeg)


    [**Figure 4-9.**](#9781430242093_Ch04.xhtml#FG9) Members and their current teams


    The following season when Bill Brown graduates to the `SeniorB` team, his previous
    association with the `JuniorA` team will be lost. If the historical data are important,
    the problem must be remodeled to reflect the fact that members will be associated
    with many teams over time. A revised model is shown in [Figure 4-10](#9781430242093_Ch04.xhtml#F10).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-10_fmt.jpeg)


    [**Figure 4-10.**](#9781430242093_Ch04.xhtml#FG10) Members and the teams for which
    they play


    ### Departments Example


    [Figure 4-11](#9781430242093_Ch04.xhtml#F11) is an example that often appears
    in textbooks. Reading from left to right, we have that each department has one
    employee as its manager. But clearly this means one at a time. Over time, the
    department will have several different managers.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-11_fmt.jpeg)


    [**Figure 4-11.**](#9781430242093_Ch04.xhtml#FG11) Each department has a manager.


    The important question for this situation is, “Do we want to keep track of former
    managers?” Why are we keeping information about managers at all? If it is just
    to have someone to call when something goes wrong, probably the current manager
    is all that is required. However, if we want to know who was in charge when something
    went wrong last year, we will need to keep a history. The data model will need
    to change so that a department can be associated with several managers as in [Figure
    4-12](#9781430242093_Ch04.xhtml#F12).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-12_fmt.jpeg)


    [**Figure 4-12.**](#9781430242093_Ch04.xhtml#FG12) A department has several managers
    over time.


    We will see in the next section how the introduction of an intermediate class
    will allow us to keep the dates for each manager.


