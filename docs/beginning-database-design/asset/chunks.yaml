- fmt: '# 数据模型中的多对多关系：缺失信息与中间类


    ## 数据模型的问题：历史记录的重要性


    最初，[图 4-13](#9781430242093_Ch04.xhtml#F13) 中的数据模型似乎足以满足其目的，但这仅仅是因为在项目运行期间农场类型没有发生变化。然而，真正的麻烦还在后头。在此模型中，一个农场只能与一种农场类型相关联。当一个农场最终发生变化时，例如从传统种植农场转变为有机农场，如果数据库是这样设置的，之前的农场类型信息将会丢失。


    一个农场只能在`at a time`与一种农场类型相关联。需要提出的关键问题是：“类型可能会随时间变化吗？系统记录该历史数据是否重要？”在这个案例中，保留农场类型的历史信息对整个实验至关重要，但这个问题之前没有被注意到，因为变化的时间跨度非常长。


    ## 多对多关系：我们是否遗漏了什么？


    到目前为止，我们在示例中已经遇到了相当多的多对多关系。例如，一个学生可以选修多门课程，一门课程也可以有许多学生注册。如果我们将一些示例的范围扩大到包含历史数据，如上一节所述，许多一对多关系将变成多对多关系（即，部门可能有许多经理，成员有许多团队，农场在长时间内有许多类型）。


    我们经常发现需要保留一些关于多对多关系的额外信息。在运动队的例子中，我们修改了成员和团队的模型，以允许一个成员与多个团队相关联。然而，如果我们看一下[图 4-10](#9781430242093_Ch04.xhtml#F10)
    中的模型，我们无从得知那些关联是*何时*发生的。没有附加日期的历史数据用处不大。但日期该放在哪里呢？在[图 4-10](#9781430242093_Ch04.xhtml#F10)
    中，我们有两个类：`Member`和`Team`。日期不属于`Member`的属性，因为它将取决于我们感兴趣的团队。同样，日期也不能是`Team`类的属性，因为每个球员会有不同的日期。这个问题经常出现，通常的解决办法是引入一个新类。


    我们需要提出这个问题：


    > 是否有任何我们需要记录的数据，取决于多对多关系中两个类的特定实例？


    在这个例子中，问题会是：


    > 是否有任何数据取决于特定的球员和特定的团队？


    答案是：


    > 是的——该球员为该团队效力的日期。


    [图 4-14](#9781430242093_Ch04.xhtml#F14) 展示了如何在多对多关系中引入一个中间类，以便可以包含那些取决于每个类对象特定配对的数据。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-14_fmt.jpeg)


    [图 4-14.](#9781430242093_Ch04.xhtml#FG14) 在多对多关系中引入一个新类


    在我们拥有取决于多对多关系中两个类实例的数据的情况下，多对多关系被一个新类和两个一对多关系所取代。新关系的“多”端总是连接到新的中间类。我们将看看这对于一些我们已经检查过的例子意味着什么。


    ## 运动俱乐部示例


    让我们重新考虑成员和团队的问题。我们将在类中放入一些属性，以更清楚地说明每个类维护的信息。模型如[图 4-15](#9781430242093_Ch04.xhtml#F15)
    所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-15_fmt.jpeg)


    [图 4-15.](#9781430242093_Ch04.xhtml#FG15) 成员与团队之间的多对多关系


    正如我们已经提到的，特定成员为特定团队效力的日期不能存在于`Member`类中（因为一个成员会随时间效力许多不同的团队），也不能存在于`Team`类中。[图
    4-16](#9781430242093_Ch04.xhtml#F16) 以与[图 4-14](#9781430242093_Ch04.xhtml#F14)
    相同的方式引入了一个新的中间类`Contract`。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-16_fmt.jpeg)


    [图 4-16.](#9781430242093_Ch04.xhtml#FG16) 中间类`Contract`，用于容纳成员为团队效力的日期


    从中间类向外读，模型告诉我们每个`Contract`恰好对应一个团队和一个成员。从外向内读，我们看到每个成员可以有多个`Contract`，每个团队也可以有多个`Contract`。[图
    4-17](#9781430242093_Ch04.xhtml#F17) 显示了可能出现在这样一个数据模型中的对象。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-17_fmt.png)


    [图 4-17.](#9781430242093_Ch04.xhtml#FG17) `Member`、`Contract`和`Team`类的一些可能对象


    我们现在可以看到成员是哪几年为特定团队效力的。我们可以看到比尔·布朗（287）在2004年为`JuniorA`队效力，在2005年为`SeniorB`队效力。这些数据将存储在如[图
    4-18](#9781430242093_Ch04.xhtml#F18) 所示的数据库表中。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-18_fmt.png)


    [图 4-18.](#9781430242093_Ch04.xhtml#FG18) 球员、合同和团队的数据


    ## 学生课程示例


    现在让我们回到学生注册课程的多对多关系（[图 4-3](#9781430242093_Ch04.xhtml#F3)）。这不仅仅是一个历史问题，尽管我们显然会想知道学生何时完成了课程。但即使我们只为一个学年或学期保留学生注册信息，我们仍然应该看看是否有缺失的信息可能需要一个额外的类。需要提出的问题是：


    > 是否有任何我希望保留的数据，是特定于某个学生及其在特定课程中的注册的？


    一个明显符合前述标准的数据是成绩或分数。同样，我们不能将成绩保存在`Student`类中（因为它需要知道是哪门课程），也不能保存在`Course`类中（因为成绩取决于哪个学生）。以与我们在[图
    4-14](#9781430242093_Ch04.xhtml#F14) 中处理这种情况相同的方式，我们可以在`Student`和`Course`类之间引入一个新类`Enrollment`，如[图
    4-19](#9781430242093_Ch04.xhtml#F19) 所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-19_fmt.jpeg)


    [图 4-19.](#9781430242093_Ch04.xhtml#FG19) 中间类，用于容纳成绩（和学年）


    一个学生和一门课程都可以有许多`Enrollment`，一个特定的`Enrollment`恰好对应一个学生和一门课程。如果我们画一些对象，我们会得到一幅与[图
    4-17](#9781430242093_Ch04.xhtml#F17) 非常相似的图片，用学生、注册和课程替换了球员、合同和团队。


    ## 送餐服务示例


    作为我们何时可能需要一个额外类来保留多对多关系信息的最后一个例子，让我们再次看看前一章的送餐问题（[例 3-1](#9781430242093_Ch03.xhtml#ex3-1)）。初始数据模型在餐食类型和订单之间有一个多对多关系。一种特定的餐食类型（比如鸡肉印度咖喱）可能出现在许多订单上，而一个特定的订单可能包含许多不同的餐食类型，如[图
    4-20](#9781430242093_Ch04.xhtml#F20) 所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-20_fmt.jpeg)


    [图 4-20.](#9781430242093_Ch04.xhtml#FG20) 不同餐食类型的订单'
  raw: 'At first the data model in [Figure 4-13](#9781430242093_Ch04.xhtml#F13) seemed
    to be serving its purpose adequately, but this was only because the farming types
    had not changed during the time the project had been running. However, real trouble
    was in store. A farm can only be associated with one farm type in this model.
    When a farm did eventually change, say from a conventional cropping farm to an
    organic farm, the previous farming type would be lost if the database was set
    up this way.


    A farm can only be associated with one farming type *at a time*. The important
    question to ask is, “Might the type change over time, and is it important for
    the system to record that historical data?” In this case, it was critical to the
    whole experiment to keep information about the history of the farm types, but
    no one had noticed the problem because the time frames for change were very long.


    A Many–Many: Are We Missing Anything?


    We have come across quite a few Many–Many relationships in our examples so far.
    For example, a student can enroll in many courses, and a course can have many
    students enrolled in it. If we widen the scope of some of the examples to include
    historical data, as in the previous section, a number of 1–Many relationships
    will become Many–Many relationships (i.e., departments may have many managers,
    members many teams, and farms many types over a length of time).


    Often we find that we need to keep some additional information about a Many–Many
    relationship. In the sports team example, we altered the model of members and
    teams to allow a member to be associated with more than one team. However, if
    we look at the model in [Figure 4-10](#9781430242093_Ch04.xhtml#F10), we have
    no idea *when* those associations occurred. The historical data will not be of
    much use without a date attached somewhere. But where will the date go? In [Figure
    4-10](#9781430242093_Ch04.xhtml#F10), we have two classes: Member and Team. The
    date does not belong as an attribute of Member because it will be dependent on
    which team we are interested in. Similarly, the date cannot be an attribute of
    the Team class because there will be different dates for each of the players.
    This problem occurs often and is usually remedied by the introduction of a new
    class.


    We need to ask the question:


    *Is there any data that we need to record that depend on particular instances
    of each of the classes in our Many–Many relationship?*


    In this example, the question would be:


    *Is there any data that depend on a particular player and a particular team?*


    And the answer is:


    *Yes—the dates that player played for that team.*


    [Figure 4-14](#9781430242093_Ch04.xhtml#F14) shows how an intermediate class can
    be incorporated into the Many–Many relationship so that data that depend on a
    particular pairing of objects from each class can be included.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-14_fmt.jpeg)


    [**Figure 4-14.**](#9781430242093_Ch04.xhtml#FG14) Introducing a new class in
    a Many–Many relationship


    In situations where we have data that depend on instances of both classes in a
    Many–Many relationship, the Many–Many relationship is replaced by a new class
    and two 1–Many relationships. The many ends of the new relationships are always
    attached to the new intermediate class. We will see what this means for some of
    the examples we have already examined.


    Sports Club Example


    Let’s reconsider the member and team problem. We’ll put some attributes in the
    classes to make it clearer what information each is maintaining. The model is
    shown in [Figure 4-15](#9781430242093_Ch04.xhtml#F15).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-15_fmt.jpeg)


    [**Figure 4-15.**](#9781430242093_Ch04.xhtml#FG15) Many–Many relationship between
    members and teams


    As we have already mentioned, the date that a particular member plays for a particular
    team cannot live in the Member class (because a member will play for many different
    teams over time) nor can it live in the Team class. [Figure 4-16](#9781430242093_Ch04.xhtml#F16)
    introduces a new intermediate class, Contract, in the same way as was done in
    [Figure 4-14](#9781430242093_Ch04.xhtml#F14).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-16_fmt.jpeg)


    [**Figure 4-16.**](#9781430242093_Ch04.xhtml#FG16) Intermediate class, Contract,
    to accommodate the date a member played for a team


    Reading from the middle class outward, the model tells us that each contract is
    for exactly one team and exactly one member. Reading from the outside inward,
    we see that each member can have many contracts as can each team. [Figure 4-17](#9781430242093_Ch04.xhtml#F17)
    shows some objects that might occur in such a data model.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-17_fmt.png)


    [**Figure 4-17.**](#9781430242093_Ch04.xhtml#FG17) Some possible objects of the
    Member, Contract, and Team classes


    We can now see what years members played for particular teams. We can see that
    Bill Brown (287) played for the JuniorA team in 2004 and for the SeniorB team
    in 2005\. These data would be stored in database tables as shown in [Figure 4-18](#9781430242093_Ch04.xhtml#F18).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-18_fmt.png)


    [**Figure 4-18.**](#9781430242093_Ch04.xhtml#FG18) Data for players, contracts,
    and teams


    Student Course Example


    Let’s now return to the Many–Many relationship of students enrolling in courses
    ([Figure 4-3](#9781430242093_Ch04.xhtml#F3)). This isn’t just a historical problem,
    although we clearly will want to know when the student completed the course. But
    even if we were only keeping student enrollments for a single year or semester,
    we should still look to see whether there is missing information that might require
    an extra class. The question that needs to be asked is:


    *Are there any data that I want to keep that are specific to a particular student
    and his or her enrollment in a particular course?*


    One obvious piece of data that fits the preceding criteria is the result or grade.
    Once again, we cannot keep the grade with the Student class (because it requires
    knowledge of which course) nor with Course class (because the grade depends on
    which student). In the same way as we dealt with this situation in [Figure 4-14](#9781430242093_Ch04.xhtml#F14),
    we can introduce a new class, Enrollment, between the Student and Course classes
    as shown in [Figure 4-19](#9781430242093_Ch04.xhtml#F19).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-19_fmt.jpeg)


    [**Figure 4-19.**](#9781430242093_Ch04.xhtml#FG19) Intermediate class to accommodate
    the result (and the year)


    A student and a course can each have many enrollments, and a particular enrollment
    is for exactly one student and one course. If we were to draw some objects, we
    would get a picture very like that in [Figure 4-17](#9781430242093_Ch04.xhtml#F17)
    with students, enrollments, and courses replacing players, contracts, and teams.


    Meal Delivery Example


    As a final example of when we might need an additional class to keep information
    about a Many–Many relationship, Let’s look again at the meal delivery problem
    ([Example 3-1](#9781430242093_Ch03.xhtml#ex3-1)) from the previous chapter. The
    initial data model had a Many–Many relationship between types of meal and orders.
    A particular type of meal (a chicken vindaloo, say) might appear on many orders,
    and a particular order May include many different meal types, as shown in [Figure
    4-20.](#9781430242093_Ch04.xhtml#F20)


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-20_fmt.jpeg)


    [**Figure 4-20.**](#9781430242093_Ch04.xhtml#FG20) Orders for different meal types'
  trans: '# 数据模型中的多对多关系：缺失信息与中间类


    ## 数据模型的问题：历史记录的重要性


    最初，图 4-13 中的数据模型似乎足以满足其目的，但这仅仅是因为在项目运行期间农场类型没有发生变化。然而，真正的麻烦还在后头。在此模型中，一个农场只能与一种农场类型相关联。当一个农场最终发生变化时，例如从传统种植农场转变为有机农场，如果数据库是这样设置的，之前的农场类型信息将会丢失。


    一个农场只能在`at a time`与一种农场类型相关联。需要提出的关键问题是：“类型可能会随时间变化吗？系统记录该历史数据是否重要？”在这个案例中，保留农场类型的历史信息对整个实验至关重要，但这个问题之前没有被注意到，因为变化的时间跨度非常长。


    ## 多对多关系：我们是否遗漏了什么？


    到目前为止，我们在示例中已经遇到了相当多的多对多关系。例如，一个学生可以选修多门课程，一门课程也可以有许多学生注册。如果我们将一些示例的范围扩大到包含历史数据，如上一节所述，许多一对多关系将变成多对多关系（即，部门可能有许多经理，成员有许多团队，农场在长时间内有许多类型）。


    我们经常发现需要保留一些关于多对多关系的额外信息。在运动队的例子中，我们修改了成员和团队的模型，以允许一个成员与多个团队相关联。然而，如果我们看一下图 4-10
    中的模型，我们无从得知那些关联是*何时*发生的。没有附加日期的历史数据用处不大。但日期该放在哪里呢？在图 4-10 中，我们有两个类：`Member`和`Team`。日期不属于`Member`的属性，因为它将取决于我们感兴趣的团队。同样，日期也不能是`Team`类的属性，因为每个球员会有不同的日期。这个问题经常出现，通常的解决办法是引入一个新类。


    我们需要提出这个问题：


    > 是否有任何我们需要记录的数据，取决于多对多关系中两个类的特定实例？


    在这个例子中，问题会是：


    > 是否有任何数据取决于特定的球员和特定的团队？


    答案是：


    > 是的——该球员为该团队效力的日期。


    图 4-14 展示了如何在多对多关系中引入一个中间类，以便可以包含那些取决于每个类对象特定配对的数据。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-14_fmt.jpeg)


    图 4-14. 在多对多关系中引入一个新类


    在我们拥有取决于多对多关系中两个类实例的数据的情况下，多对多关系被一个新类和两个一对多关系所取代。新关系的“多”端总是连接到新的中间类。我们将看看这对于一些我们已经检查过的例子意味着什么。


    ## 运动俱乐部示例


    让我们重新考虑成员和团队的问题。我们将在类中放入一些属性，以更清楚地说明每个类维护的信息。模型如图 4-15 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-15_fmt.jpeg)


    图 4-15. 成员与团队之间的多对多关系


    正如我们已经提到的，特定成员为特定团队效力的日期不能存在于`Member`类中（因为一个成员会随时间效力许多不同的团队），也不能存在于`Team`类中。图
    4-16 以与图 4-14 相同的方式引入了一个新的中间类`Contract`。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-16_fmt.jpeg)


    图 4-16. 中间类`Contract`，用于容纳成员为团队效力的日期


    从中间类向外读，模型告诉我们每个`Contract`恰好对应一个团队和一个成员。从外向内读，我们看到每个成员可以有多个`Contract`，每个团队也可以有多个`Contract`。图
    4-17 显示了可能出现在这样一个数据模型中的对象。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-17_fmt.png)


    图 4-17. `Member`、`Contract`和`Team`类的一些可能对象


    我们现在可以看到成员是哪几年为特定团队效力的。我们可以看到比尔·布朗（287）在 2004 年为`JuniorA`队效力，在 2005 年为`SeniorB`队效力。这些数据将存储在如图
    4-18 所示的数据库表中。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-18_fmt.png)


    图 4-18. 球员、合同和团队的数据


    ## 学生课程示例


    现在让我们回到学生注册课程的多对多关系（图 4-3）。这不仅仅是一个历史问题，尽管我们显然会想知道学生何时完成了课程。但即使我们只为一个学年或学期保留学生注册信息，我们仍然应该看看是否有缺失的信息可能需要一个额外的类。需要提出的问题是：


    > 是否有任何我希望保留的数据，是特定于某个学生及其在特定课程中的注册的？


    一个明显符合前述标准的数据是成绩或分数。同样，我们不能将成绩保存在`Student`类中（因为它需要知道是哪门课程），也不能保存在`Course`类中（因为成绩取决于哪个学生）。以与我们在图
    4-14 中处理这种情况相同的方式，我们可以在`Student`和`Course`类之间引入一个新类`Enrollment`，如图 4-19 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-19_fmt.jpeg)


    图 4-19. 中间类，用于容纳成绩（和学年）


    一个学生和一门课程都可以有许多`Enrollment`，一个特定的`Enrollment`恰好对应一个学生和一门课程。如果我们画一些对象，我们会得到一幅与图
    4-17 非常相似的图片，用学生、注册和课程替换了球员、合同和团队。


    ## 送餐服务示例


    作为我们何时可能需要一个额外类来保留多对多关系信息的最后一个例子，让我们再次看看前一章的送餐问题（例 3-1）。初始数据模型在餐食类型和订单之间有一个多对多关系。一种特定的餐食类型（比如鸡肉印度咖喱）可能出现在许多订单上，而一个特定的订单可能包含许多不同的餐食类型，如图
    4-20 所示。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-20_fmt.jpeg)


    图 4-20. 不同餐食类型的订单'
- fmt: 'What happens if a family orders three chicken vindaloos, one hamburger, and
    one pork fried rice? Where do we put these quantities? The quantity cannot be
    an attribute in the `Order` class (for this order there are three quantities and
    they each depend on the particular meal) nor in the `Meal` class (for there will
    potentially be hundreds of orders involving a particular type of meal, each with
    different quantities).


    Once again, our problem of where to put the additional data is solved by including
    a new class as shown in [Figure 4-21](#9781430242093_Ch04.xhtml#F21).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-21_fmt.jpeg)


    [**Figure 4-21.**](#9781430242093_Ch04.xhtml#FG21) Orders for different types
    of meal—with additional class to store quantities


    For some problems, it can be difficult to come up with a meaningful name for the
    intermediate class. In such a case, it is always possible to use a concatenation
    of the two original class names as we have done here with `Order/Meal`. We could
    maybe have called the class `Orderline`, in this example, as it represents each
    line in the order (i.e., a meal and the quantity). You might find it helpful to
    sketch some objects of the three classes in [Figure 4-21](#9781430242093_Ch04.xhtml#F21)
    to clarify what is happening.


    We can also use this new intermediate class to solve one of the other problems
    we deferred in [Chapter 3](#9781430242093_Ch03.xhtml). This was the problem of
    coping with the price of a meal changing over time. In the `Meal` class in [Figure
    4-21](#9781430242093_Ch04.xhtml#F21), we can define the `price` attribute as being
    the current price for that type of meal. An order placed for that meal today will
    be at that price. How do we know what was charged for this type of meal on an
    order several months ago? To deal with the problem of changing prices, we can
    include an attribute, `price`, in the intermediate class `Order/Meal`. This will
    be the price charged for a particular meal on a particular order and will not
    change when the current price changes in the `Meal` class. This way we have a
    complete history of the prices for each meal on each order. A `price` attribute
    in this intermediate class can allow us to keep historical data and also to deal
    with "unusual" situations such as specials or discounts. We are always keeping
    the price that was actually charged for that type of meal on that particular order.


    The question that needed to be asked about the original Many–Many relationship
    in [Figure 4-20](#9781430242093_Ch04.xhtml#F20) was:


    *Are there any data we need to store about a particular meal type on a particular
    order?*


    And the answer is:


    *Yes, the quantity of that meal type ordered and the price being charged for that
    meal type on the order.*


    When a Many–Many Doesn’t Need an Intermediate Class


    A few Many–Many relationships contain complete information for a problem without
    the need for an intermediate class in the data model. Problems that involve categories
    as part of the data often do not require an additional class. [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    “The Plant Database,” involved plants and uses to which they could be put. The
    original data model is repeated in [Figure 4-22](#9781430242093_Ch04.xhtml#F22).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig04-22_fmt.jpeg)


    [**Figure 4-22.**](#9781430242093_Ch04.xhtml#FG22) Plants and their uses


    We can ask the question, “Is there any information we want to keep about a particular
    species and a particular use?”


    In this case, the answer is probably, “No*.*” A Many–Many relationship that doesn’t
    require any additional information often occurs when we have something that belongs
    to a number of different categories; for example, a plant has many different uses
    and all we want to know is what they are.


    It is possible, however, that in a different situation we might want to record
    whether a particular plant is excellent or just reasonable at hedging. Or we may
    want to note how many of a particular species are needed to be sufficient for
    attracting bees. In both these cases, we might need an intermediate class. Try
    sketching a new model for these situations.


    Summary


    Even at the very early stages of analysis, a simple data model can provide us
    with a number of questions. The answers to these questions will help us to understand
    a problem better. The resulting clarifications to the problem should eventually
    be reﬂected in the use cases and may affect the final model and the eventual implementation.


    In this chapter, we have suggested some questions about a single relationship
    between two classes. Some of the questions we have discussed are reviewed here.


    **Optionality:** Should it be 0 or 1? Considering whether an optionality should
    be 0 or 1 might affect definitions of our classes; for example, “Would a student
    who was not enrolled in any courses still be considered a student for the purposes
    of our database?”


    **A cardinality of 1***:* Might it occasionally be 2? We need to consider whether
    there might be exceptional cases in which we might want to squeeze two numbers
    or categories into a box designed for one; for example, “What happens if the weather
    changes during a visit?” Redefining a class might help out for the exceptional
    cases, as in, “If the weather changes, we will call it two visits.”


    **A cardinality of 1:** What about historical data? Always consider whether the
    1 in a relationship really means “just one at a time.” For example, “A department
    has one manager. Do we want to know who the previous managers of the department
    were?” If so, the relationship should be Many–Many.


    **Many–Many:** Are we missing anything? Consider whether there is information
    we need to record about a particular pairing of objects from each class; for example,
    “What might we want to know about a particular student and a particular course?”
    If there is such information (e.g., the grade), introduce a new intermediate class.


    TESTING YOUR UNDERSTANDING


