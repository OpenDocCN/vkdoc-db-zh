    all the courses


    Which way around you put your tables in the join statement doesn’ t matter, so
    Course LEFT OUTER JOIN Lecturer is equivalent to Lecturer RIGHT OUTER JOIN Course.
    Standard SQL also supports a full outer join, which means that every row from
    both tables will be represented in the result. Lecturer FULL OUTER JOIN Course
    will retrieve all the lecturers (even if they don’ t examine a course) and all
    the courses (even if they don’ t have an examiner). While a full outer join is
    part of standard SQL, not all systems support it explicitly (MS Access doesn’
    t). However, we can always achieve the same result by combining two outer joins
    with a *union* operation (which I describe in the next section).


