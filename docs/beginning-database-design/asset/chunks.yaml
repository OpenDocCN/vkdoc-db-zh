- fmt: "We have managed to separate the data for our three classes so as to avoid\
    \ inconsistencies, used data validation to simulate referential integrity to a\
    \ degree, and used lookups to perform something similar to a join. So we have\
    \ some control over the accuracy of the data. We can use sorting and filtering\
    \ tools to do the equivalent of selecting rows, and we can hide columns to simulate\
    \ projecting columns. Spreadsheets also offer a huge range of analysis features.\
    \ What we don ’t have is the ability to easily perform complex queries that require\
    \ other relational operations, such as, *which customers have ordered both product\
    \ 76253 and 56789?*\n\n## Many–Many Relationships\n\nLet ’s now have a look at\
    \ Many–Many relationships in a spreadsheet. This situation often arises where\
    \ we have categories, and we will take one last look at our plant example data\
    \ model shown in [Figure 12-18](#9781430242093_Ch12.xhtml#F18).\n\n![9781430242093_Fig12-18.tif](images/9781430242093_Fig12-18_fmt.jpeg)\n\
    \n[**Figure 12-18.**](#9781430242093_Ch12.xhtml#FG18) A Many–Many relationship\
    \ representing plants with many uses\n\nThere are a number of different ways you\
    \ can store multiple values for uses in a spreadsheet. We will look at some of\
    \ the advantages and disadvantages of three different methods: `repeated columns`,\
    \ `categories as columns`, and `normalized ranges`.\n\n### Repeated Columns\n\n\
    [Figure 12-19](#9781430242093_Ch12.xhtml#F19) shows a common way that people store\
    \ multivalued categories in a spreadsheet (and often in a database!): `repeated\
    \ columns`.\n\n![9781430242093_Fig12-19.tif](images/9781430242093_Fig12-19_fmt.jpeg)\n\
    \n[**Figure 12-19.**](#9781430242093_Ch12.xhtml#FG19) Representing multiple values\
    \ of use in `repeated columns`\n\nThe reason this way of storing the data is so\
    \ popular is that it is in a format the user finds useful. The user probably initially\
    \ thought of the data in terms of plants and their uses, and this format displays\
    \ each plant with all its uses on one line. (This can be difficult output to achieve\
    \ from normalized database tables.) We have already discussed in [Chapter 1](#9781430242093_Ch01.xhtml)\
    \ some of the problems of storing the data this way, but by using some spreadsheet\
    \ functionality, we can reduce some of the problems. One issue was ensuring that\
    \ the entries in columns D through F had consistent spelling. This can be achieved\
    \ in a spreadsheet by using the `data validation` feature and insisting that values\
    \ in those columns come from a list of possible uses stored on another sheet.\
    \ Another significant problem is being able to find all the plants with a specific\
    \ use (e.g., shelter). It is not sufficient to just sort or filter column D, for\
    \ example, to find all the values of shelter; this is because shelter may have\
    \ been recorded in any of the columns D through F. It is possible to check all\
    \ three columns using `advanced filters` and criteria tables, but this is well\
    \ beyond the capabilities of the casual user. With this level of skill, the user\
    \ would have been better off to use a database right from the start. `Repeated\
    \ columns`, therefore can provide some checking of the use data, a good reporting\
    \ format but poor querying in terms of plants for a given use.\n\n### Categories\
    \ as Columns\n\nAnother common storage method is to have a separate category for\
    \ each column and use check marks to specify whether they apply for a particular\
    \ species. This is shown in [Figure 12-20](#9781430242093_Ch12.xhtml#F20).\n\n\
    ![9781430242093_Fig12-20.tif](images/9781430242093_Fig12-20_fmt.jpeg)\n\n[**Figure\
    \ 12-20.**](#9781430242093_Ch12.xhtml#FG20) Representing multiple values of use\
    \ with `categories as columns`\n\nThis is actually a very useful representation.\
    \ As long as there are not too many categories, it is quite good for reporting\
    \ purposes, as you can see all the uses on one line. There are no issues with\
    \ spelling use names as these only appear once in the heading row. It is also\
    \ possible to quite simply find all the plants with a specific use. If we want\
    \ to find all Hedging plants, we can simply sort or filter column F. Simple filtering\
    \ will also allow us to perform more complex queries such as *find plants that\
    \ are suitable for Hedging AND Firewood*. The `categories–as–columns` arrangement\
    \ therefore offers good reporting, good data entry consistency, and useful querying.\n\
    \n### Normalized Ranges\n\nThe last method is what we will call `normalized ranges`.\
    \ This method actually mimics a relational database by introducing the equivalent\
    \ of an intermediary class in [Figure 12-18](#9781430242093_Ch12.xhtml#F18) and\
    \ turning the Many–Many relationship into two 1–Many relationships. We now have\
    \ a situation very similar to the orders spreadsheet described earlier. We would\
    \ have a sheet with all the species information (with an ID column), a sheet with\
    \ all the uses, and a third sheet for the pairings of species and uses with `lookups`\
    \ or `validations` to the other sheets. This is shown in [Figure 12-21](#9781430242093_Ch12.xhtml#F21).\
    \ Columns B through D are looked up in the plants sheet, and column E can be validated\
    \ from the use sheet.\n\n![9781430242093_Fig12-21.tif](images/9781430242093_Fig12-21_fmt.jpeg)\n\
    \n[**Figure 12-21.**](#9781430242093_Ch12.xhtml#FG21) Representing multiple values\
    \ of usage with `normalized ranges` and `lookups`\n\nWith this method of keeping\
    \ the data, we have good checking of the data, we can sort or filter column A\
    \ to find all the usages for a particular plant, and we can sort or filter column\
    \ E to find all the plants with a particular use. So far, so good. However, the\
    \ reporting is awful. The format of the data is not in a form that anyone would\
    \ want to print out and it is not particularly nice to use. If the data is going\
    \ to be stored in this way, it might as well be in three tables in a database\
    \ where we have access to better querying, data entry, and reporting features.\n\
    \n## Implementing in XML\n\nXML (Extensible Markup Language)[⁶](#9781430242093_Ch12.xhtml#fn6)\
    \ was designed as a way to exchange information. It is based on a hierarchy of\
    \ tagged elements that contain both a description and a value for a piece of information.\
    \ As an example, [Listing 12-2](#9781430242093_Ch12.xhtml#L2) shows a tagged element\
    \ to represent a piece of data representing a name. We have opening and closing\
    \ tags which describe the content of the data (a first name) and between the tags\
    \ is the value, “James.”\n\n***[Listing 12-2](#9781430242093_Ch12.xhtml#Lis2)**.\
    \ An XML Tag to Represent a First Name*\n\n```xml\n<first_name>James</first_name>\n\
    ```\n\nElements can also have attributes and elements can be nested inside each\
    \ other. [Listing 12-3](#9781430242093_Ch12.xhtml#L3) shows an XML definition\
    \ of a student. Student is an element with an attribute, `studentID`, and the\
    \ last name and first name are declared as elements.\n\n***[Listing 12-3](#9781430242093_Ch12.xhtml#Lis3)**.\
    \ Using Elements and Attributes to Represent Student Data*\n\n```xml\n<student\
    \ studentID=“113452”>\n    <first_name>James</first_name>\n    <last_name>Green</last_name>\n\
    </student>\n```\n\nIf you are asking why `studentID` is an attribute and the names\
    \ are elements, you are not alone! The student information could be reflected\
    \ with many different combinations of attribute or element, although usually anything\
    \ that is regarded as important to a human reader is represented by an element.\
    \ The important thing to note about [Listing 12-3](#9781430242093_Ch12.xhtml#L3)\
    \ is that the XML contains both a definition of the structure of the data (a student\
    \ has an ID, and first and last names) and also the value of the data (this student\
    \ is James Green with ID 113452)"
  raw: 'We have managed to separate the data for our three classes so as to avoid
    inconsistencies, used data validation to simulate referential integrity to a degree,
    and used lookups to perform something similar to a join. So we have some control
    over the accuracy of the data. We can use sorting and filtering tools to do the
    equivalent of selecting rows, and we can hide columns to simulate projecting columns.
    Spreadsheets also offer a huge range of analysis features. What we don ’t have
    is the ability to easily perform complex queries that require other relational
    operations, such as, *which customers have ordered both product 76253 and 56789?*


    Many–Many Relationships


    Let ’s now have a look at Many–Many relationships in a spreadsheet. This situation
    often arises where we have categories, and we will take one last look at our plant
    example data model shown in [Figure 12-18](#9781430242093_Ch12.xhtml#F18).


    ![9781430242093_Fig12-18.tif](images/9781430242093_Fig12-18_fmt.jpeg)


    [**Figure 12-18.**](#9781430242093_Ch12.xhtml#FG18) A Many–Many relationship representing
    plants with many uses


    There are a number of different ways you can store multiple values for uses in
    a spreadsheet. We will look at some of the advantages and disadvantages of three
    different methods: repeated columns, categories as columns, and normalized ranges.


    [Figure 12-19](#9781430242093_Ch12.xhtml#F19) shows a common way that people store
    multivalued categories in a spreadsheet (and often in a database!): repeated columns.


    ![9781430242093_Fig12-19.tif](images/9781430242093_Fig12-19_fmt.jpeg)


    [**Figure 12-19.**](#9781430242093_Ch12.xhtml#FG19) Representing multiple values
    of use in repeated columns


    The reason this way of storing the data is so popular is that it is in a format
    the user finds useful. The user probably initially thought of the data in terms
    of plants and their uses, and this format displays each plant with all its uses
    on one line. (This can be difficult output to achieve from normalized database
    tables.) We have already discussed in [Chapter 1](#9781430242093_Ch01.xhtml) some
    of the problems of storing the data this way, but by using some spreadsheet functionality,
    we can reduce some of the problems. One issue was ensuring that the entries in
    columns D through F had consistent spelling. This can be achieved in a spreadsheet
    by using the data validation feature and insisting that values in those columns
    come from a list of possible uses stored on another sheet. Another significant
    problem is being able to find all the plants with a specific use (e.g., shelter).
    It is not sufficient to just sort or filter column D, for example, to find all
    the values of shelter; this is because shelter may have been recorded in any of
    the columns D through F. It is possible to check all three columns using advanced
    filters and criteria tables, but this is well beyond the capabilities of the casual
    user. With this level of skill, the user would have been better off to use a database
    right from the start. Repeated columns, therefore can provide some checking of
    the use data, a good reporting format but poor querying in terms of plants for
    a given use.


    Another common storage method is to have a separate category for each column and
    use check marks to specify whether they apply for a particular species. This is
    shown in [Figure 12-20](#9781430242093_Ch12.xhtml#F20).


    ![9781430242093_Fig12-20.tif](images/9781430242093_Fig12-20_fmt.jpeg)


    [**Figure 12-20.**](#9781430242093_Ch12.xhtml#FG20) Representing multiple values
    of use with categories as columns


    This is actually a very useful representation. As long as there are not too many
    categories, it is quite good for reporting purposes, as you can see all the uses
    on one line. There are no issues with spelling use names as these only appear
    once in the heading row. It is also possible to quite simply find all the plants
    with a specific use. If we want to find all Hedging plants, we can simply sort
    or filter column F. Simple filtering will also allow us to perform more complex
    queries such as *find plants that are suitable for Hedging AND Firewood*. The
    categories–as–columns arrangement therefore offers good reporting, good data entry
    consistency, and useful querying.


    The last method is what we will call normalized ranges. This method actually mimics
    a relational database by introducing the equivalent of an intermediary class in
    [Figure 12-18](#9781430242093_Ch12.xhtml#F18) and turning the Many–Many relationship
    into two 1–Many relationships. We now have a situation very similar to the orders
    spreadsheet described earlier. We would have a sheet with all the species information
    (with an ID column), a sheet with all the uses, and a third sheet for the pairings
    of species and uses with lookups or validations to the other sheets. This is shown
    in [Figure 12-21](#9781430242093_Ch12.xhtml#F21). Columns B through D are looked
    up in the plants sheet, and column E can be validated from the use sheet.


    ![9781430242093_Fig12-21.tif](images/9781430242093_Fig12-21_fmt.jpeg)


    [**Figure 12-21.**](#9781430242093_Ch12.xhtml#FG21) Representing multiple values
    of usage with normalized ranges and lookups


    With this method of keeping the data, we have good checking of the data, we can
    sort or filter column A to find all the usages for a particular plant, and we
    can sort or filter column E to find all the plants with a particular use. So far,
    so good. However, the reporting is awful. The format of the data is not in a form
    that anyone would want to print out and it is not particularly nice to use. If
    the data is going to be stored in this way, it might as well be in three tables
    in a database where we have access to better querying, data entry, and reporting
    features.


    Implementing in XML


    XML (Extensible Markup Language)[⁶](#9781430242093_Ch12.xhtml#fn6) was designed
    as a way to exchange information. It is based on a hierarchy of tagged elements
    that contain both a description and a value for a piece of information. As an
    example, [Listing 12-2](#9781430242093_Ch12.xhtml#L2) shows a tagged element to
    represent a piece of data representing a name. We have opening and closing tags
    which describe the content of the data (a first name) and between the tags is
    the value, “James.”


    ***[Listing 12-2](#9781430242093_Ch12.xhtml#Lis2)**. An XML Tag to Represent a
    First Name*


    <first_name>James</first_name>


    Elements can also have attributes and elements can be nested inside each other.
    [Listing 12-3](#9781430242093_Ch12.xhtml#L3) shows an XML definition of a student.
    Student is an element with an attribute, studentID, and the last name and first
    name are declared as elements.


    ***[Listing 12-3](#9781430242093_Ch12.xhtml#Lis3)**. Using Elements and Attributes
    to Represent Student Data*


    <student studentID=“113452”>


    <first_name>James</first_name>


    <last_name>Green</last_name>


    </student>


    If you are asking why studentID is an attribute and the names are elements, you
    are not alone! The student information could be reflected with many different
    combinations of attribute or element, although usually anything that is regarded
    as important to a human reader is represented by an element. The important thing
    to note about [Listing 12-3](#9781430242093_Ch12.xhtml#L3) is that the XML contains
    both a definition of the structure of the data (a student has an ID, and first
    and last names) and also the value of the data (this student is James Green with
    ID 113452)'
  trans: "\n我们设法分隔了三个班级的数据以避免不一致性，使用数据验证在一定程度上模拟了参照完整性，并通过查找功能实现了类似联接的操作。因此我们对数据的准确性有了一定的控制。我们可以使用排序和筛选工具来实现等效的行选择操作，并能通过隐藏列来模拟列投影。电子表格还提供了大量的分析功能。我们所缺乏的是轻松执行需要其他关系运算的复杂查询的能力，例如，*哪些客户同时订购了产品\
    \ 76253 和 56789？*\n\n## 多对多关系\n\n现在让我们看看电子表格中的多对多关系。这种情况经常出现在我们拥有分类数据时，我们将最后一次查看图\
    \ 12-18 中展示的植物示例数据模型。\n\n![9781430242093_Fig12-18.tif](img/9781430242093_Fig12-18_fmt.jpeg)\n\
    \n**图 12-18.** 一个表示具有多种用途的植物的多对多关系\n\n有几种不同的方法可以在电子表格中存储多个用途值。我们将探讨三种不同方法的优缺点：`重复列`、`类别作为列`和`规范化范围`。\n\
    \n### 重复列\n\n图 12-19 展示了一种人们在电子表格（也经常在数据库中！）中存储多值类别的常见方法：`重复列`。\n\n![9781430242093_Fig12-19.tif](img/9781430242093_Fig12-19_fmt.jpeg)\n\
    \n**图 12-19.** 使用`重复列`表示多种用途值\n\n这种数据存储方式如此受欢迎的原因在于它采用了一种对用户有用的格式。用户最初可能从植物及其用途的角度考虑数据，而这种格式将每种植物及其所有用途显示在一行上。（从规范化的数据库表中生成这种输出可能很困难。）我们已经在第\
    \ 1 章中讨论过以这种方式存储数据的一些问题，但通过使用一些电子表格功能，我们可以减少部分问题。其中一个问题是确保 D 列到 F 列中的条目拼写一致。这可以通过在电子表格中使用`数据验证`功能来实现，即要求这些列中的值来自存储在另一张工作表上的可能用途列表。另一个重要问题是能够找到具有特定用途（例如，遮荫）的所有植物。仅仅对\
    \ D 列进行排序或筛选来查找所有遮荫值是不够的；这是因为遮荫可能记录在 D 列到 F 列中的任何一列。可以使用`高级筛选`和条件表来检查所有三列，但这远远超出了普通用户的能力范围。具备这种技能的用户，从一开始就使用数据库会更好。因此，`重复列`可以对用途数据进行一些检查，提供良好的报告格式，但在根据给定用途查找植物方面查询能力较差。\n\
    \n### 类别作为列\n\n另一种常见的存储方法是让每一列对应一个独立的类别，并使用复选标记来指定它们是否适用于特定物种。如图 12-20 所示。\n\n\
    ![9781430242093_Fig12-20.tif](img/9781430242093_Fig12-20_fmt.jpeg)\n\n**图 12-20.**\
    \ 使用`类别作为列`表示多种用途值\n\n这实际上是一种非常有用的表示方法。只要类别数量不是太多，它就很适合报告目的，因为您可以在一行上看到所有用途。不存在用途名称拼写问题，因为这些名称只在标题行中出现一次。也能够非常简单地找到具有特定用途的所有植物。如果我们想找到所有的树篱植物，我们可以简单地对\
    \ F 列进行排序或筛选。简单的筛选还允许我们执行更复杂的查询，例如*查找既适用于树篱又适用于柴火的植物*。因此，`类别作为列`的安排提供了良好的报告、良好的数据录入一致性和有用的查询功能。\n\
    \n### 规范化范围\n\n最后一种方法是我们称之为`规范化范围`的方法。这种方法实际上模仿了关系数据库，引入了等同于图 12-18 中的中间类，将多对多关系转换为两个一对多关系。我们现在的情况与前面描述的订单电子表格非常相似。我们会有一个包含所有物种信息的工作表（带有一个\
    \ ID 列），一个包含所有用途的工作表，以及第三个工作表用于存储物种和用途的配对，并使用`查找`或`验证`功能关联到其他工作表。如图 12-21 所示。B\
    \ 列到 D 列在植物工作表中进行查找，E 列可以从用途工作表进行验证。\n\n![9781430242093_Fig12-21.tif](img/9781430242093_Fig12-21_fmt.jpeg)\n\
    \n**图 12-21.** 使用`规范化范围`和`查找`表示多种用途值\n\n使用这种数据保存方法，我们对数据进行了良好的检查，我们可以对 A 列进行排序或筛选以查找特定植物的所有用途，也可以对\
    \ E 列进行排序或筛选以查找具有特定用途的所有植物。到目前为止，一切都很好。然而，报告效果很差。数据的格式不是任何人想要打印出来的形式，使用起来也不是特别方便。如果数据要以这种方式存储，不如将其存储在数据库中的三个表里，这样我们就能使用更好的查询、数据录入和报告功能。\n\
    \n## 在 XML 中实现\n\nXML（可扩展标记语言）⁶被设计为一种交换信息的方式。它基于带标签元素的层次结构，这些元素包含信息的描述和值。例如，清单\
    \ 12-2 显示了一个表示名字数据片段的带标签元素。我们有开始标签和结束标签，它们描述了数据内容（名字），标签之间是值“James”。\n\n***清单\
    \ 12-2**. 表示名字的 XML 标签*\n\n```xml\n<first_name>James</first_name>\n```\n\n元素也可以有属性，并且元素可以相互嵌套。清单\
    \ 12-3 显示了学生的 XML 定义。`student`是一个带有属性`studentID`的元素，姓氏和名字被声明为元素。\n\n***清单 12-3**.\
    \ 使用元素和属性表示学生数据*\n\n```xml\n<student studentID=“113452”>\n    <first_name>James</first_name>\n\
    \    <last_name>Green</last_name>\n</student>\n```\n\n如果你在问为什么`studentID`是属性而名字是元素，你并不孤单！学生信息可以用属性或元素的许多不同组合来反映，尽管通常任何被认为对人类读者重要的东西都用元素表示。关于清单\
    \ 12-3 需要注意的重要一点是，XML 既包含了数据结构的定义（学生有 ID、名字和姓氏），也包含了数据的值（这个学生是 ID 为 113452 的 James\
    \ Green）。\n"
- fmt: 'XML非常灵活，元素可以在任何时候定义。其规则之一是整体结构为一棵树，包含一个根元素，所有其他元素都必须嵌套在其中。[Listing 12-3](#9781430242093_Ch12.xhtml#L3)
    是可以的，因为它只表示一个学生；但要表示多个学生，我们需要一个包容性的根元素，如 `<university>`，如 [Listing 12-4.](#9781430242093_Ch12.xhtml#L4)
    所示。


    `[Listing 12-4](#9781430242093_Ch12.xhtml#Lis4)`. 表示多个学生的层次结构*


    ```

    <university>


    <student studentID=“113452”>


    <first_name>James</first_name>


    <last_name>Green</last_name>


    </student>


    <student studentID=“113756”>


    <first_name>Mary</first_name>


    <last_name>Smith</last_name>


    <degree>Science</degree>


    </student>


    <student studentID=“116543”>


    <first_name>Sally</first_name>


    <last_name>Hunter</last_name>


    <hostel>Helliers</hostel>


    </student>


    </university>

    ```


    XML允许我们为每个学生保存不同类型的数据。在 [Listing 12-4](#9781430242093_Ch12.xhtml#L4) 中，我们看到Mary有关于学位的信息，而Sally有关于宿舍的信息。用这种方式表示数据极其灵活，因为它不需要像关系型数据库表那样预定义结构。可以轻松添加额外信息，因为描述和值都保存在一起。这种灵活性的缺点是你永远无法确切知道一个学生是如何被描述的，因此查询数据将会很困难。


    ## 表示关系


    XML的层次特性允许我们将元素相互嵌套，因此一对多关系很容易表示。我们可以取一个包含多个部门元素的 `organization` 元素，每个部门元素内部又嵌套了
    `employee` 元素。让我们看看如何使用XML来表示 [Figure 12-22](#9781430242093_Ch12.xhtml#F22) 中的多对多关系。


    ![9781430242093_Fig12-22.tif](images/9781430242093_Fig12-22_fmt.jpeg)


    `[Figure 12-22.](#9781430242093_Ch12.xhtml#FG22)` 学生选课的数据模型


    我们可以从两个方面来思考 [Figure12-22](#9781430242093_Ch12.xhtml#F22) 中的信息：作为每个学生拥有一组课程，或作为每门课程拥有一组学生。[Figure
    12-23](#9781430242093_Ch12.xhtml#F23) 展示了表示学生和课程相关数据的两种可能的XML树版本。


    ![9781430242093_Fig12-23.eps](images/9781430242093_Fig12-23_fmt.png)


    `[Figure 12-23.](#9781430242093_Ch12.xhtml#FG23)` 表示学生和课程的两种可能的XML树


    在 [Figure 12-23](#9781430242093_Ch12.xhtml#FG23) 的树中，每个方框都是一个元素，拥有自己嵌套的元素和属性。例如，James
    Green 的每个方框都将用 [Listing 12-3](#9781430242093_Ch12.xhtml#L3) 中的代码表示。显然，这里存在一个信息重复的问题。在
    [Figure 12-23a](#9781430242093_Ch12.xhtml#F23) 中，每个学生的数据会为每门课程重复；而在 [Figure 12-23b](#9781430242093_Ch12.xhtml#F23)
    中，每门课程的信息会为每个学生重复。如果XML仅用作不同应用程序之间传输数据的手段，这不一定是个问题，但如果有人试图直接更新数据，这显然会成为问题。


    表示 [Figure 12-22](#9781430242093_Ch12.xhtml#F22) 中模型的另一种方式是引入第三种类型的元素（`enroll`），这与我们在关系型数据库中引入中间表的方式非常相似。[Listing
    12-5](#9781430242093_Ch12.xhtml#L5) 展示了表示两门课程、两名学生及其在C102课程中注册情况的代码。


    `[Listing 12-5](#9781430242093_Ch12.xhtml#Lis5)`. 表示学生、课程以及关联它们的注册关系的层次结构*


    ```

    <?xml version=“1.0”?>


    <university>


    <courses>


    <course>


    <code>C102</code>


    <title>Programming</title>


    </course>


    <course>


    <code>C106</code>


    <title>Databases</title>


    </course>


    </courses>


    <students>

    ```'
  raw: 'XML is very flexible, with elements able to be defined at any time. One of
    the few rules is that the overall structure is a tree with one root element, inside
    which all other elements need to be nested. [Listing 12-3](#9781430242093_Ch12.xhtml#L3)
    is fine as it represents just one student; but to represent several students we
    need an encompassing root element such as <university> as in [Listing 12-4.](#9781430242093_Ch12.xhtml#L4)


    ***[Listing 12-4](#9781430242093_Ch12.xhtml#Lis4)**. A Hierarchy to Represent
    Several Students*


    <university>


    <student studentID=“113452”>


    <first_name>James</first_name>


    <last_name>Green</last_name>


    </student>


    <student studentID=“113756”>


    <first_name>Mary</first_name>


    <last_name>Smith</last_name>


    <degree>Science</degree>


    </student>


    <student studentID=“116543”>


    <first_name>Sally</first_name>


    <last_name>Hunter</last_name>


    <hostel>Helliers</hostel>


    </student>


    </university


    XML allows us to keep different types of data about each of our students. In [Listing
    12-4](#9781430242093_Ch12.xhtml#L4) we see that Mary has information about a degree
    and Sally has information about a hostel. Representing the data in this way is
    extremely flexible since there is no predefined structure as is required for a
    relational database table. Extra information can easily be added because the description
    and the values are all kept together. The downside of this flexibility is that
    you will never quite know how a student is actually described, so querying the
    data will be difficult.


    Representing Relationships


    The hierarchical nature of XML allows us to nest elements inside each other so
    a 1–Many relationship is quite easy to represent. We could take an organization
    element with several department elements, each of which has employee elements
    nested within it. Let ’s have a look at how we could use XML to represent the
    Many–Many relationship in [Figure 12-22](#9781430242093_Ch12.xhtml#F22).


    ![9781430242093_Fig12-22.tif](images/9781430242093_Fig12-22_fmt.jpeg)


    [**Figure 12-22.**](#9781430242093_Ch12.xhtml#FG22) Data model for students enrolling
    in courses


    We can think of the information in [Figure12-22](#9781430242093_Ch12.xhtml#F22)
    in two ways: as students each with a set of courses or as courses each with a
    set of students. [Figure 12-23](#9781430242093_Ch12.xhtml#F23) shows these two
    versions of an XML tree that would represent some data about students and courses.


    ![9781430242093_Fig12-23.eps](images/9781430242093_Fig12-23_fmt.png)


    [**Figure 12-23.**](#9781430242093_Ch12.xhtml#FG23) Two possible XML trees to
    represent students and courses


    In the trees in [Figure 12-23](#9781430242093_Ch12.xhtml#FG23), each box would
    be an element with its own nested elements and attributes. For example, each of
    the boxes for James Green would be represented with the code in [Listing 12-3](#9781430242093_Ch12.xhtml#L3).
