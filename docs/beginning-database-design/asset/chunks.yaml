    # 第 12 章 其他实现方式


    ![image](images/frontdot.jpg)


    在本书的前几章中，我们专注于获取一组用例和一个能准确表示问题范围及不同数据项相互关联的数据模型。[第 7 章](#9781430242093_Ch07.xhtml)到[第
    9 章](#9781430242093_Ch09.xhtml)展示了我们如何将数据模型在关系数据库中表示为一组规范化表，并通过外键实现关系。前两章展示了我们如何高效地向这些表中输入数据并使用查询来提取有意义的信息和报告。


    现在，我们将简要了解表示数据模型的其他方法。我们将研究面向对象数据库、电子表格（用于简单的数据模型）和 XML 作为表示数据模型的方式。


    ## 面向对象实现


    我们的数据模型是*面向对象的*。这意味着我们从特定对象的角度来看待数据和关系，就像这个对“一对多”关系的描述：“一个 `Customer` 类对象可以与多个
    `Order` 类对象关联。” 使用 Java、VB .NET 或 C# 等面向对象语言的程序员可以直接创建和操作对象。OO 语言还具有大多数关系数据库软件中不具备的附加功能。这些功能包括为属性使用复杂类型（对象或对象集合）的能力，以及将描述对象行为的方法作为类定义一部分存储的能力。OO
    语言的另一个优势是能够直接实现和维护类与子类，从而充分利用继承。有时 OO 语言中缺少的是以透明方式将对象保存到持久性存储和从中检索对象的方法。OO 数据库提供了一种无缝创建对象、将其存储到磁盘然后再找到它们的方法。OO
    程序的设计是一个巨大的主题，因此在此我仅概述一些捕获数据模型基本要素的主要技术。


    ### 类与对象


    与关系数据库不同，OO 编程语言直接支持类和对象的概念。类是对象将如何构造的定义或模板。例如，一个 `Customer` 类将指定每个 `Customer`
    对象将具有的属性（例如，名称、地址等）。每个 `Customer` 对象将根据类的定义创建，并将拥有其各自属性的值。类只是一个抽象概念，但对象本身是独立的实体。相比之下，在关系数据库中，我们从表的角度思考。我们构造一个表来表示每个类，而对象由行表示。我们对表执行连接和联合等操作，而不是对行。关系数据库中的操作严格基于表，而在
    OO 环境中，重点是对象（因此称为“面向对象”）。


    当我们考虑继承时，OO 语言和关系数据库之间的差异尤其明显。在[第 6 章](#9781430242093_Ch06.xhtml)中，我们看到了特化和泛化的概念如何帮助我们建模那些有许多共同点的类所在的特定情况。在[图
    12-1](#9781430242093_Ch12.xhtml#F1)中，我们有一个数据模型，它捕获了学生和讲师在父类 `Person` 中的相似之处。


    ![9781430242093_Fig12-01.tif](images/9781430242093_Fig12-01_fmt.jpeg)


    [图 12-1.](#9781430242093_Ch12.xhtml#FG1) 具有继承关系的数据模型


    [图 12-2](#9781430242093_Ch12.xhtml#F2) 展示了我们如何尝试在关系数据库中使用表来捕获此数据模型的主要特征。


    ![9781430242093_Fig12-02.tif](images/9781430242093_Fig12-02_fmt.jpeg)


    [图 12-2.](#9781430242093_Ch12.xhtml#FG2) 用 1-1 关系表示的继承


    [图 12-2](#9781430242093_Ch12.xhtml#F2)中的表示需要三个表。每个学生将由两行表示：一行在 `Person` 表中，另一行在
    `Student` 表中。如果我们想要某个特定学生的所有信息，我们需要连接 `Student` 和 `Person` 表以检索学位和姓名。在 OO 环境中，如果我们创建一个
    `Student` 或 `Lecturer` 类的对象，该对象将包含嵌入其中的所有相关属性。我们不需要查找任何其他对象或引用任何其他类来检索所需信息。这描绘在[图
    12-3](#9781430242093_Ch12.xhtml#F3)中。


    ![9781430242093_Fig12-03.eps](images/9781430242093_Fig12-03_fmt.png)


    [图 12-3.](#9781430242093_Ch12.xhtml#FG3) OO 环境中的学生和讲师对象


    在 OO 环境中，每个对象都是一个独立的实体，拥有自己唯一的对象标识符。因为每个对象都有自己的标识，所以不要求其属性值是唯一的。换句话说，从实现的角度来看，不需要提供我们在关系数据库中需要的等效主键。例如，[图
    12-4](#9781430242093_Ch12.xhtml#F4)中的两个对象都可以通过其唯一的 `OID` 被系统识别，尽管它们的属性值是相同的。然而，`OID`
    不一定可用，对用户也没有意义。程序可以区分对象，但用户能区分吗？


    ![9781430242093_Fig12-04.eps](images/9781430242093_Fig12-04_fmt.png)


    [图 12-4.](#9781430242093_Ch12.xhtml#FG4) 两个不同的对象；但用户能区分它们吗？


    现实中会有一些信息可以区分两个不同的学生（例如，地址或出生日期）。虽然不是必须的，但像学号这样的唯一标识符对于帮助用户引用特定的人可能仍然有用。引用学生 128675
    比引用住在 Beckenham 的 Jane Smith 更容易。


