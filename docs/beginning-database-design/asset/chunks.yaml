    CHAPTER 2


    ![image](images/frontdot.jpg)


    Guided Tour of the Development Process


    The decision to set up a small database usually arises because there is some specific
    task in mind: a scientist may have some experimental results that need safekeeping;
    a small business may wish to produce invoices and monthly statements for its customers;
    a sports club may want to keep track of teams and subscriptions.


    The important thing is not to focus solely on the immediate task at hand but to
    try to understand the data that are going to support that task *and other likely
    tasks*. This is sometimes referred to as *data independence*. In general, the
    fundamental data items (names, amounts, dates) that you keep for a problem will
    change very little over a long time. The values will of course be constantly changing,
    but not the fact that we are keeping values for names, amounts, and dates. What
    you do with these pieces of data is likely to change quite often. Designing a
    database to reﬂect the type of data involved, rather than what you currently think
    is the main use for the data, will be more advantageous in the long term.


    For example, a small business may want to send invoices and statements to its
    customers. Rather than thinking in terms of a statement and what goes on it, it
    is important to think about the underlying data items. In this case, these items
    are customers and their transactions. A statement is simply a report of a particular
    customer’s transactions over some period of time. In the long term, the format
    of the statement may change, for example, to include aging or interest charges.
