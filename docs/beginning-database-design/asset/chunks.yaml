- fmt: "It is important that we keep discontinued products in the table, but we will\
    \ want to be able to distinguish them from current products. For a case like this,\
    \ we might decide to add an additional field to our `Product` table (say `current`)\
    \ to distinguish current products from discontinued ones. We have a new problem\
    \ now. How do we prevent new orders from being entered for discontinued products?\
    \ This is starting to get outside the scope of this book. Many database applications\
    \ allow you to put additional constraints on a table by way of `triggers`. A trigger\
    \ is a procedure that is fired by a change to a table (e.g., adding or updating\
    \ a row) and will carry out specified actions. In this case, the trigger would\
    \ check whether a potential new row in the `Order` table was for a discontinued\
    \ product, and if so prevent that row from being permanently added to the table.\
    \ Constraints such as only allowing orders for current products can also be implemented\
    \ through the interface of the database, and we will look at the benefits and\
    \ drawbacks of this in [Chapter 11](#9781430242093_Ch11.xhtml).\n\nWhen might\
    \ a \"cascade delete\" be a good choice? It is a fairly brutal solution, and you\
    \ should be very careful about setting it up. If we have enrollments for a subject,\
    \ and then that subject is cancelled, it is perhaps reasonable to expect that\
    \ all the enrollments for it should be deleted also. We have to be careful, though,\
    \ that there aren't historical enrollments from previous years. Deleting information\
    \ does not happen as often as you might expect. Products and subjects may be discontinued,\
    \ but if we have historical orders or enrollments for subjects which have since\
    \ been discontinued, we need to keep the information. In these cases, the `disallow\
    \ delete` option is the best bet. When customers and orders do outlive their usefulness,\
    \ it is more usual to archive the important, or summarized, information and store\
    \ it elsewhere rather than deleting it entirely. Use the `cascade delete` option\
    \ with caution.\n\nHaving said all that, we might think that the safest option\
    \ is to never delete anything. It is possible to set up tables so that no rows\
    \ can ever be deleted. However, while this might seem like a good idea, we will\
    \ always need to delete records that have been entered into a table by mistake.\
    \ Say we accidentally enter the same customer twice (with a different customer\
    \ number), for example. We need to get that extra record out of the table as quickly\
    \ as possible before it causes us all sorts of problems.\n\n## Summary\n\nIn this\
    \ chapter, we have looked at some issues involved with choosing appropriate primary\
    \ keys and for ensuring referential integrity is maintained when we update the\
    \ data in our tables. Some of the important points to remember are the following:\n\
    \n*   We often need to introduce a generated ID number to ensure we have a field,\
    \ with stable and unique values, that we can use as a primary key. This is particularly\
    \ true for people, where identifying information such as names and addresses are\
    \ likely to change.\n*   Be aware that mistakes in data entry means it is possible\
    \ to have a person in your database twice with two different ID numbers. Try to\
    \ avoid this!\n*   Where a primary key is made up of several concatenated fields,\
    \ it is worth considering a generated ID number to reduce the size of the foreign\
    \ keys referencing the table.\n*   Where a generated ID has been introduced, constraints\
    \ should be used to retain the uniqueness of the combinations of fields that have\
    \ been replaced as a primary key.\n*   Unique constraints can be used to enforce\
    \ a 1–1 relationship.\n*   A constraint on the value of a field may be more appropriate\
    \ than a relationship to another (very simple) table.\n*   You have three options\
    \ when you wish to delete a row that it is being referenced by a foreign key:\n\
    \    *   Disallow the deletion.\n    *   Make the field referencing the deleted\
    \ row `NULL` (`nullify delete`).\n    *   Remove all rows that reference the deleted\
    \ row (`cascade delete`).\n\n## TESTING YOUR UNDERSTANDING\n\n### Exercise 9-1\n\
    \nThe ever–useful \"customer orders product\" example again—there is always something\
    \ new to discover. Design the table that will represent the `Order` class in [Figure\
    \ 9-14](#9781430242093_Ch09.xhtml#F14). Consider constraints, primary and foreign\
    \ keys, and updating rules.\n\n![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-14_fmt.jpeg)\n\
    \n[**Figure 9-14.**](#9781430242093_Ch09.xhtml#FG14) Model for customers placing\
    \ orders\n\n### Exercise 9-2\n\nA car sales yard needs to keep information about\
    \ makes and models of cars that are available, and also the registrations of the\
    \ individual cars they have in stock. For example, Ford Siestas are available\
    \ in sedans and hatchbacks, and they currently have a blue sedan with registration\
    \ TC545 in stock. For some models you might be able to choose automatic or manual\
    \ transmission and some come with different capacities (e.g., 1.5 l or 2.0 l).\
    \ Think about the options available for setting up tables for this situation.\n\
    \n## CHAPTER 10\n\n![image](images/frontdot.jpg)\n\n## Query Basics\n\nWe have\
    \ spent a considerable amount of effort designing our database in order to make\
    \ sure the data can be stored in a consistent and accurate way. In this chapter,\
    \ we are going to look at how to get information back out again. The data will\
    \ be stored in many separate tables, and depending on the questions we are asking,\
    \ we will need to combine data from those tables in a number of different ways.\
    \ This chapter is just a brief introduction to the art of querying. For further\
    \ information you might be interested in looking at my book *Beginning SQL Queries:\
    \ From Novice to Professional*.^([1](#9781430242093_Ch10.xhtml#fn1))\n\n### Simple\
    \ Queries on One Table\n\nLet's start with looking at just one table. We'll use\
    \ the `Student` table, a small part of which is shown in [Figure 10-1](#9781430242093_Ch10.xhtml#F1),\
    \ to illustrate some of the main types of queries that are possible.\n\n![9781430242093_Fig10-01.tif](images/9781430242093_Fig10-01_fmt.jpeg)\n\
    \n[**Figure 10-1**](#9781430242093_Ch10.xhtml#FG1). A small part of the `Student`\
    \ table\n\nOver time, the `Student` table is likely to accumulate hundreds of\
    \ thousands of records, and in reality there are going to be several more columns\
    \ to record birth dates, phone numbers, immigration status, and so on. It is manageable\
    \ subsets of this information that are going to be relevant for users. We should\
    \ look back at the original use cases for the project to see what sort of questions\
    \ people are going to ask about the data. The registrar might want a list of all\
    \ students starting their studies this year; the alumni manager might want a list\
    \ of current and past students living in Christchurch; a dean might want lists\
    \ of students enrolling this year in an Arts degree; the management might need\
    \ the numbers of enrollments in the last ten years to determine trends. All that\
    \ information can be gleaned from this one table. To do this, we can use the basic\
    \ relational operations `select` and `project`, along with ordering and aggregating\
    \ functions.\n\n### The Project Operation\n\nThe project operation allows us to\
    \ specify which columns of the table we would like to retrieve. If we want a list\
    \ of names, we don't really want to see all the other information about each student.\
    \ If we just want to see the ID number and the names of every student, we project\
    \ (or retrieve) just the first three columns. [Listing 10-1](#9781430242093_Ch10.xhtml#L1)\
    \ shows how to achieve this with an SQL command. The first line says which columns\
    \ are required and the second line says from which table they are to be retrieved.\n\
    \n[**Listing 10-1.**](#9781430242093_Ch10.xhtml#Lis1) SQL for Projecting Three\
    \ Columns from the `Student` Table\n\n```sql\nSELECT studentID, first_name, last_name\n\
    FROM Student\n```"
