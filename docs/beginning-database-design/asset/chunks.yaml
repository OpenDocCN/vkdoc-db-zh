- fmt: '# 数据建模：继承


    ## 数据不一致问题


    我们该如何看待 Ann？她被记录为一名技术人员，但没有到期日期，而是有一个等级。这里就有点令人困惑了。她既是技术人员又是行政人员吗？如果她是技术人员，为什么没有到期日期？或者（正如最可能的情况）是否出现了某种数据录入混乱？一个允许明显不一致或不完整数据输入的数据库，将无法提供准确或可靠的信息。我们本可以在用例描述中对维护**员工**数据添加一些约束（例如，如果**工作类型**=技术人员，则**等级**必须为空且**日期**必须有值），但这相当混乱，并且随着其他工作类型的加入只会变得越来越复杂。我们可以考虑完全移除**工作类型**字段，理由是我们可以根据到期日期或等级的存在与否来推断工作类型。我们可以推断
    Jane 是一名行政人员，即使**工作类型**字段为空。然而，如果我们移除**工作类型**字段，关于 Pat 我们又能推断出什么呢？目前，我们知道她是一名行政人员，其等级目前未知或不需要。没有了**工作类型**字段，我们将一无所知。


    当然，真正的问题是：“我们是否真的能输入不一致或不完整的数据，这真的重要吗？”对于某些应用程序来说，可能并不重要。然而，如果项目的目标之一是能够生成关于员工工作类型和能力的可靠统计数据，那么[图
    6-1](#9781430242093_Ch06.xhtml#F1)中简单的类显然不太实用。


    ## 专业化


    上一节的情况是*专业化*的一个例子。通常，我们有许多具有共同特征的员工，但根据每个人的工作类型，我们可能希望保存不同的专业化数据。数据建模通过*子类*和*超类*为这个想法提供了一种机制，这个概念被称为*继承*。[图
    6-3](#9781430242093_Ch06.xhtml#F3)显示了一个名为**Employee**的类，以及它的两个子类（有时称为*继承类*），名为**Administrator**和**Technician**。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-03_fmt.jpeg)


    **[图 6-3.](#9781430242093_Ch06.xhtml#FG3)** 包含专业化信息的子类


    箭头下的两个类派生自**Employee**，这意味着除了它们自己的任何属性之外，它们还将拥有**Employee**类的所有属性。


    我们现在有三个类：**Employee**的对象将具有**number**和**name**（以及通常与所有员工相关的任何其他信息）；**Administrator**的对象将具有**number**、**name**和**grade**；**Technician**的对象将具有**number**、**name**和**date**。一些可能的对象如[图
    6-4](#9781430242093_Ch06.xhtml#F4)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-04_fmt.jpeg)


    **[图 6-4.](#9781430242093_Ch06.xhtml#FG4)** 符合图 6-3 模型的一些对象


    每个对象都是三个类之一：**Employee**、**Administrator**或**Technician**。现在不可能再出现一个有等级的技术人员了。然而，也有可能存在像
    Pat 这样的员工，她是一名行政人员但等级未知。我们还有一个既不是行政人员也不是技术员的员工（尽管我们将在本章后面看到，这并不推荐）。


    通过这个模型，我们能够准确保存不同类型员工及其工作的专业数据。如果我们需要保存其他类型员工的信息，只需添加更多子类即可。例如，我们可能发现需要添加另一个类来保存电工及其注册号的信息。


    能够在不干扰现有类所保存数据的情况下添加新类，对于创建能够随情况变化而演进的软件非常重要。在软件工程中，这被称为开闭原则：*软件实体（例如类）应该对扩展开放，对修改封闭*。观察[图
    6-3](#9781430242093_Ch06.xhtml#F3)，这意味着一旦开始存储数据，我们就不应更改顶层类**Employee**。对该类的任何更改都会影响所有现有的子类（**Technician**和**Administrator**），这可能会影响使用它们的任何应用程序。但是，我们可以通过添加额外的子类（例如**Electrician**）来扩展问题。这意味着顶层或父类必须在开始时非常仔细地设计；它应该尽可能通用。


    ## 一般化


    当我们从两个不同的类开始并发现它们有一些共同行为时，使用类和子类的模型也很有用。让我们考虑一个如[图 6-5](#9781430242093_Ch06.xhtml#F5)所示的数据库，其中包含关于讲师和学生以及他们教授或注册课程的信息。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-05_fmt.jpeg)


    **[图 6-5.](#9781430242093_Ch06.xhtml#FG5)** 作为独立类的讲师和学生


    大学可能（像所有大学一样）有停车问题，并决定每个人被允许拥有一个且仅有一个指定的停车位。如果我们希望在模型中包含此信息，可能会尝试如[图 6-6](#9781430242093_Ch06.xhtml#F6)所示的解决方案。然而，我们很快遇到了一个真正的问题。你能看出是什么吗？


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-06_fmt.jpeg)


    **[图 6-6.](#9781430242093_Ch06.xhtml#FG6)** 用于维护停车信息的可能模型


    从底到顶阅读模型，我们看到学生和讲师每人最多可以有一个停车位。这没问题。然而，从顶到底看，我们发现一个停车位可以分配给一个学生，同一个车位又可以分配给一个讲师。模型没有显示的是，一个停车位不能同时分配给一个学生和一个讲师。


    我们以前遇到过对特定对象的约束，我们可以在维护数据的用例中指定这些约束。然而，这里我们有一个更优雅的解决方案。在许多方面，我们的**Lecturer**和**Student**对象具有相同的行为——它们被分配了停车位。它们也有共同的属性——它们都有一个名字和一个
    ID。我们可以通过创建一个超类来捕获这些共同的数据和行为，如[图 6-7](#9781430242093_Ch06.xhtml#F7)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-07_fmt.jpeg)


    **[图 6-7.](#9781430242093_Ch06.xhtml#FG7)** 捕获在超类中的共同行为


    在这个模型中，我们有“人”，具有 ID 和名字（以及其他共同属性），每人可以被分配一个停车位。学生是有专业并注册课程的人，而讲师是有薪水并教授课程的人。我们现在没有棘手的额外约束问题，因为一个停车位不能同时分配给一个讲师*和*一个学生；我们只是规定一个停车位分配给一个人。


    ## 继承总结


    本章到目前为止我们所看的例子中，专业化和一般化只是同一枚硬币的两面。它们都导向如[图 6-8](#9781430242093_Ch06.xhtml#F8)所示的通用数据模型。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-08_fmt.jpeg)


    **[图 6-8.](#9781430242093_Ch06.xhtml#FG8)** 显示继承关系的数据模型


    **SubClassA**和**SubClassB**都是类**SuperClass**的专业化类型。它们将拥有**SuperClass**的所有属性，并额外拥有自己的专业化属性和/或其他类的关系。'
  raw: 'What are we supposed to make of Ann? She is recorded as a technician, but
    instead of an expiry date, she has a grade. There is a bit of confusion here now.
    Is she both a technician and an administrator? If she is a technician, why doesn’t
    she have an expiry date? Or (as is most likely) has there been some sort of data
    entry mess–up? A database that allows for obviously inconsistent or incomplete
    data to be entered is not going to deliver accurate or reliable information. We
    could have added some constraints to our use case description on maintaining the
    **Employee** data (e.g., if **job_type** = Tech, then **grade** must be empty
    and **date** must have a value), but this is quite messy and can only become more
    and more complicated as other job types are added. We could contemplate removing
    **job_type** altogether on the grounds that we can infer the type of job from
    the presence or absence of an expiration date or grade. We can deduce that Jane
    is an administrator even though the **job_type** field is empty. However, if we
    remove the **job_type** field, what can we deduce about Pat? At the moment, we
    know that she is an administrator whose grade is currently unknown or not required.
    Without the **job_type** field, we would know nothing.


    The real question, of course, is, “Does it really matter whether we can enter
    inconsistent or incomplete data?” For some applications, it may not. However,
    if one of the objectives of the project is to be able to produce reliable statistics
    about the types of job and abilities of employees, clearly the simple class in
    [Figure 6-1](#9781430242093_Ch06.xhtml#F1) is not very practical.


    Specialization


    The situation in the previous section is an example of *specialization*. In general,
    we have employees who share many characteristics, but depending on each person’s
    job type, we may wish to keep different specialized data. Data modeling provides
    a mechanism for this idea through *sub-* and *superclasses*, an idea known as
    *inheritance*. [Figure 6-3](#9781430242093_Ch06.xhtml#F3) shows a class, **Employee**,
    with two subclasses, sometimes called *inherited classes*, named **Administrator**
    and **Technician**.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-03_fmt.jpeg)


    [**Figure 6-3.**](#9781430242093_Ch06.xhtml#FG3) Subclasses to contain specialized
    information


    The two classes beneath the arrow are derived from **Employee**, which means that
    in addition to any of their own attributes, they will also have all the attributes
    from the **Employee** class.


    We now have three classes: objects of **Employee** will have a **number** and
    a **name** (and in general any other information that is relevant to all employees);
    objects of **Administrator** will have a **number**, **name**, and **grade**;
    and objects of **Technician** will have a **number**, **name**, and a **date**.
    Some possible objects are shown in [Figure 6-4](#9781430242093_Ch06.xhtml#F4).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-04_fmt.jpeg)


    [**Figure 6-4.**](#9781430242093_Ch06.xhtml#FG4) Some objects consistent with
    the model in Figure 6-3


    Each object is of one of the three classes: **Employee**, **Administrator**, or
    **Technician**. There is now no possibility of having a technician with a grade.
    It is, however, possible to have an employee such as Pat who is an administrator
    with an unknown grade. We also have an employee who is neither an administrator
    nor a technician (although we will see later in the chapter that this is not recommended).


    With this model, we are able to keep accurate information about the different
    types of employees and the specialist data associated with their jobs. If we need
    to keep information about other types of employees, we can simply add more subclasses.
    For example, we might find we need to add another class to keep information about
    electricians and their registration numbers.


    The ability to add new classes without disrupting the data kept about existing
    classes is very important for creating software that can evolve as situations
    change. In software engineering it is known as the Open Closed Principle: *Software
    entities (e.g. classes) should be open for extension and closed for modification*.
    Looking at [Figure 6-3](#9781430242093_Ch06.xhtml#F3), this means that we should
    not alter the top class **Employee** once we start storing data. Any changes to
    that class will affect all the existing subclasses (**Technician** and **Administrator**)
    and that may have an impact on any applications that use them. However, we can
    extend the problem by adding additional subclasses (such as **Electrician**).
    This means that the top or parent class must be designed very carefully at the
    start**;** it should be as general as possible.


    Generalization


    A model using classes and subclasses is also useful when we start with two distinct
    classes and find that they have some behavior in common. Let’s consider a database
    such as in [Figure 6-5](#9781430242093_Ch06.xhtml#F5), with information about
    lecturers and students and the courses they teach or enroll in.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-05_fmt.jpeg)


    [**Figure 6-5.**](#9781430242093_Ch06.xhtml#FG5) Lecturers and students as independent
    classes


    The university may, as all universities do, have a parking problem and decide
    that each person is allowed one and only one designated parking space. If we wish
    to include this information in our model, we may try a solution as in [Figure
    6-6](#9781430242093_Ch06.xhtml#F6). However, we run into a real problem pretty
    soon. Can you see what it is?


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-06_fmt.jpeg)


    [**Figure 6-6.**](#9781430242093_Ch06.xhtml#FG6) Possible model for maintaining
    car parking information


    Reading the model from the bottom to the top, we have that students and lecturers
    can each have at most one parking space. That is fine. However, from the top to
    bottom, we have that a parking space could be assigned to a student, and the same
    space could be assigned to a lecturer. What the model doesn’t show is that a single
    parking space cannot be assigned to both a student and lecturer simultaneously.


    We have come across constraints on particular objects before, and we could specify
    these in the use cases for maintaining the data. However, we have a more elegant
    solution here. In many respects, our **Lecturer** and **Student** objects have
    the same behavior—they are assigned parking spaces. They also have attributes
    in common—they each have a name and an ID. We can capture this common data and
    behavior by creating a superclass, as in [Figure 6-7](#9781430242093_Ch06.xhtml#F7).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-07_fmt.jpeg)


    [**Figure 6-7.**](#9781430242093_Ch06.xhtml#FG7) Common behavior captured in a
    superclass


    In this model we have people, with IDs and names (and other common attributes),
    who can each be assigned a parking space. Students are people with a major who
    enroll in courses, whereas lecturers are people with a salary who teach courses.
    We do not have the problem now of extra tricky constraints because a parking space
    cannot be assigned to both a lecturer *and* a student; we just have that a parking
    space is assigned to one person.


    Inheritance in Summary


    Specialization and generalization in the examples we have looked at so far in
    this chapter are just two sides of the same coin. They both lead to the type of
    generic data model shown in [Figure 6-8](#9781430242093_Ch06.xhtml#F8).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-08_fmt.jpeg)


    [**Figure 6-8.**](#9781430242093_Ch06.xhtml#FG8) A data model showing inheritance


    **SubClassA** and **SubClassB** are both specialized types of the class **SuperClass**.
    They will have all the properties of the **SuperClass** and in addition have their
    own specialized attributes and/or relationships with other classes.'
