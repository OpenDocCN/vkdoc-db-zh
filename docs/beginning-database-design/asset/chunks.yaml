    For reporting to teachers, we need information from all three tables. Listing
    A-7 shows the SQL for a view which joins the tables. Note that we have an outer
    join on the Student table so that all students are included even if they have
    no absences.


    **Listing A-7**. SQL to Retrieve Information from All Three Tables


    CREATE VIEW AllInfo AS

    SELECT * FROM Teacher INNER JOIN

    (Student LEFT JOIN Absence ON studentID = student)

    ON teacherID = teacher;


    [Figure A-46](#9781430242093_APP.xhtml#F46) shows some data resulting from the
    view in Listing A-7.


