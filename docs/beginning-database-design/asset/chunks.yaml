    # 第二章


    ## 开发过程导览


    建立一个小型数据库的决定通常源于手头有某个具体任务：一位科学家可能有一些需要妥善保管的实验结果；一家小企业可能希望为客户开具发票和月度账单；一个体育俱乐部可能想要跟踪球队和会员缴费情况。


    重要的事情是不要仅仅专注于手头的直接任务，而要尝试理解将要支持该任务*以及其他可能任务*的数据。这有时被称为 `数据独立性`。一般来说，你为某个问题保留的基本数据项（姓名、金额、日期）在很长一段时间内变化会非常小。数据值当然会不断变化，但我们记录姓名、金额和日期值这一事实本身不会变。而你用这些数据做的事情则可能经常变化。设计一个反映数据类型本身、而非你当前认为的主要用途的数据库，从长远来看会更有利。


    例如，一家小企业可能想要向其客户发送账单和结算单。与其思考结算单及其包含什么，重要的是思考底层的数据项。在这个案例中，这些数据项是客户及其交易记录。结算单只是某个特定客户在一段时间内交易的一个报告。长远来看，结算单的格式可能会改变，例如，加入账龄分析或利息费用。然而，底层的交易数据将是相同的。如果数据库被设计为反映基本数据（客户和交易），它将能够随着需求的变化而演进。数据的类型将保持不变，但报告可以改变。我们可能也会改变数据输入的方式（交易可能通过网页或电子邮件输入），并且我们可能会发现数据的其他用途（客户数据可能用于邮件群发以及开具发票）。


    为数据库项目找到一个好的解决方案，需要对问题进行一定的抽象，以便各种可能性变得清晰。在本章中，我们将快速浏览如何从最初的问题陈述，通过一个抽象模型，到（希望是）有用的应用程序的最终实现来处理这个过程。图
    2-1 中的图表是思考这个过程的一种有用方式。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-01_fmt.png)


    **图 2-1.** 软件过程（基于 Zelkowitz 等人，1979¹）


    以图 2-1 作为思考软件过程的方式，我们现在将通过把这些步骤应用到示例 1-1“植物数据库”中，来看看各个步骤如何与建立一个数据库项目相关联。


    ### 初始问题陈述


    我们从对问题的初步描述开始。描述问题的一种方式是使用 `用例`，它是 `统一建模语言`（`UML`）² 的一部分，这是一组用于描绘软件过程各个方面的图示技术。用例是不同类型的用户（更正式地称为
    `参与者`）如何与系统交互的描述。大多数系统分析的教科书都包含对用例的讨论。（Alistair Cockburn 的书《编写有效用例》³ 是一本特别易读且务实的论述。）用例可以存在于许多不同的层级，从高层的公司目标到底层的小程序模块描述。我们将专注于坐在台式计算机前的人试图执行的任务。对于一个数据库项目，这些任务很可能是输入或更新数据，以及基于这些数据提取信息。


    UML 的用例表示法涉及：用小人图形代表（在我们这里）用户类型，用椭圆形代表用户需要能够执行的每项任务。例如，图 2-2 展示了一个用例，其中用户执行三个目前未知的任务。然而，仅凭这些小人和椭圆并不足以描述与系统的特定交互。在编写用例时，除了图表，你还应该创建一个文本文档，更详细地描述该用例所涉及的内容。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-02_fmt.png)


    **图 2-2.** 用例的 UML 表示法⁴


    让我们看看如何将用例应用到上一章示例 1-1 的问题上。图 2-3 回顾了我们最初建立的一个记录植物及其用途的初始数据库表。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-03_fmt.jpeg)


    **图 2-3.** 植物及其用途的原始数据


    如果我们考虑典型用户可能想对图 2-3 中展示的数据做什么，那么示例 2-1 中建议的用例将是一个起点。


    ### 示例 2-1. 植物数据库的初始用例


    图 2-4 展示了植物数据库的一些初始用例。图后的文字描述了每个用例。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig02-04_fmt.png)


    **图 2-4.** 植物数据库用例的首次尝试


    **用例 1:** 输入（或编辑）我们拥有的关于每种植物的所有数据；即，植物 ID、属、种、俗名和用途。


    **用例 2:** 查找或报告关于一种植物（或每种植物）的信息，并查看它有什么用途。


    **用例 3:** 指定一个用途并找到合适的植物（或报告所有用途）。


    如前一章所述，如果数据像图 2-3 那样存储，我们就无法方便地满足示例 2-1 中所有用例的要求。通过查看表中的每一行，可以很容易地获得关于每种植物的信息（用例
    2）。然而，要找到所有满足特定用途的植物则极其麻烦。尝试找出所有适合当柴火的植物。你必须检查每一行中的每个用途列。


    ### 分析与简单数据模型


    现在我们已经有了一个初步的方向，我们需要进行一些抽象，并形成一个关于问题实质的模型。在图 2-1 的语境下，我们正在图表顶部横向移动。

    '
- fmt: '# 数据建模入门：使用UML类图


    一种实际的方法是通过勾勒一个初始数据模型来感受数据涉及的内容，该模型代表不同类型数据之间的交互方式。UML提供的类图是表示此类信息的实用方法。虽然有许多产品可以维护类图，但对于早期的小型模型，用铅笔和纸进行草图绘制就足够了。本书的大部分内容都在探讨数据建模的复杂性，接下来的章节将快速概述相关定义和符号。


    ## 类与对象


    每个`class`可以被视为存储关于一组相似事物（地点、事件或人）的数据的模板。让我们参考[示例 2-1](#9781430242093_Ch02.xhtml#ex2-1)中关于植物及其用途的描述。我们的第一个类的一个明显候选者是`Plant`这个概念。每株植物都可以用类似的方式描述，因为每株都有属（`genus`）、种（`species`）、通用名（`common_name`），或许还有一个植物ID号（`plantID`）。我们将为每株植物保存的这些信息片段被称为该类的`attributes`（或`properties`）。[图
    2-5](#9781430242093_Ch02.xhtml#F5)展示了类及其属性的UML表示法。类的名称出现在顶部面板，中间面板包含属性。对于某些类型的软件系统，可能存在一个类需要负责执行的流程。例如，一个与在线购物车相关的`Order`类可能有一个计算含税价格的流程。这些被称为`methods`，并出现在底部面板中。对于以信息为主的问题，在设计的早期阶段，方法通常不是主要考虑因素，我们现在将忽略它们。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-05_fmt.jpeg)


    [**图 2-5.**](#9781430242093_Ch02.xhtml#FG5) 类的UML表示法


    我们想要保存数据的每株植物都将符合[图 2-5](#9781430242093_Ch02.xhtml#F5)中的模板；也就是说，每株植物都将（或可以）为其属性`plantID`、`genus`、`species`和`common_name`拥有自己的值。每株单独的植物被称为`Plant`类的一个`object`。`Plant`类和一些对象在[图
    2-6](#9781430242093_Ch02.xhtml#F6)中描绘。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-06_fmt.png)


    [**图 2-6.**](#9781430242093_Ch02.xhtml#FG6) 一个类及其部分对象


    `Plant`类可以包含其他属性，例如典型高度、寿命等。那么植物的用途呢？在[图 2-3](#9781430242093_Ch02.xhtml#F3)的数据库表中，这些用途被作为植物的几个属性（`use1`、`use2`等）包含在内。在[示例
    1-1](#9781430242093_Ch01.xhtml#ex1-1)中，我们看到将用途存储为几个属性导致了一些问题。我们这里遇到的是另一个类的候选者：`Use`。在[第5章](#9781430242093_Ch05.xhtml)中，我们将更详细地讨论如何判断是否需要类或属性来保存信息。我们的新类`Use`不会有太多属性，可能只有`name`。`Use`类的每个对象都将有一个`name`值，例如“hedging”、“shelter”或“bird
    food”。对于我们这个例子，特别有趣的是`Use`和`Plant`类之间的`relationship`。


    ## 关系


    一个特定的植物对象可以有多种用途。例如，我们可以从[图 2-3](#9781430242093_Ch02.xhtml#F3)中看到，Akeake可用于土壤稳定、树篱和防护。我们可以将此视为`Plant`类的特定对象与`Use`类对象之间的关系（或关联）。这种关系的一些具体实例如[图
    2-7](#9781430242093_Ch02.xhtml#F7)所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-07_fmt.png)


    [**图 2-7.**](#9781430242093_Ch02.xhtml#FG7) `Plant`与`Use`之间关系的一些实例


    在数据库中，我们通常会为每个类创建一个表，关于每个对象的信息将作为该表中的一行记录，如[图 2-8](#9781430242093_Ch02.xhtml#F8)所示。关于特定关系实例的信息也会记录在一个表中。对于关系型数据库，你会期望找到像[图
    2-8](#9781430242093_Ch02.xhtml#F8)中的表来表示[图 2-7](#9781430242093_Ch02.xhtml#F7)中所示的植物和关系实例。我们将在[第7章](#9781430242093_Ch07.xhtml)进一步探讨如何以及为何设计这样的表。现在，你只需要确信它包含了适当的信息。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-08_fmt.png)


    [**图 2-8.**](#9781430242093_Ch02.xhtml#FG8) 在数据库表中表达的`Plant`对象以及`Plants`与`Uses`之间关系的实例


    在UML中，关系由两个类矩形之间的线表示，如[图 2-9](#9781430242093_Ch02.xhtml#F9)所示。可以为线命名以明确关系是什么（例如，“can
    be used for”），但如果上下文明显，也不必命名。线两端的数字表示一个类的多少个对象可以与另一个类的特定对象相关联。第一个数字是最小数量。这通常是0或1，因此有时被称为`optionality`（即，它指示是否必须有一个相关对象）。第二个数字是相关对象的最大数量。它通常是1或多个（用`n`表示），尽管其他数字也是可能的。总的来说，这些数字可以称为关系的`cardinality`或`multiplicity`。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-09_fmt.png)


    [**图 2-9.**](#9781430242093_Ch02.xhtml#FG9) 一个表示为UML类图的数据模型


    关系是双向解读的。[图 2-9](#9781430242093_Ch02.xhtml#F9)显示了右侧类的多少个对象可以与左侧类的一个特定对象相关联，反之亦然。当我们想知道有多少个`ClassB`的对象与`ClassA`相关联时，我们查看最靠近`ClassB`的数字。


    通过研究关系的基数可以了解到很多关于数据的信息，我们将在[第4章](#9781430242093_Ch04.xhtml)进一步探讨基数问题。本章重点介绍类图的表示法以及这些图可以告诉你关于不同类之间关系的哪些信息。[图
    2-10](#9781430242093_Ch02.xhtml#F10)展示了一些关系，它们可能与你在[第1章](#9781430242093_Ch01.xhtml)中看到的某些示例的小部分相关联。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-10_fmt.png)


    [**图 2-10.**](#9781430242093_Ch02.xhtml#FG10) 不同基数关系的示例


    [图 2-10](#9781430242093_Ch02.xhtml#F10)是一致的，因为右侧列中的短语准确地描述了图表。但每个图表是否适用于特定问题则完全是另一个问题。例如，在[图
    2-10](#9781430242093_Ch02.xhtml#F10)的第一行中，为什么我们会想要一个没有任何植物与之关联的用途？正是像这样的问题帮助我们理解问题的复杂性，我们将在[第4章](#9781430242093_Ch04.xhtml)讨论这些问题。目前，问题尚未充分定义，无法知道[图
    2-10](#9781430242093_Ch02.xhtml#F10)中的图表是否准确，但它们是合理的初步尝试。


    ## 进一步分析：重新审视用例


    使用类图的表示法，我们可以初步尝试绘制一个数据模型图来表示我们的植物示例。我们有一个用于植物和用途的类，它们之间的关系看起来像[图 2-11](#9781430242093_Ch02.xhtml#F11)。'
  raw: 'A practical way to start to get a feel for what the data involves is to sketch
    an initial data model that is a representation of how the different types of data
    interact. UML provides class diagrams that are a useful way of representing this
    information. There are many products that will maintain class diagrams, but a
    sketch with pencil and paper is quite sufficient for early and small models. A
    large portion of this book is about the intricacies of data modeling, and the
    following sections provide a quick overview of the definitions and notation.


    Classes and Objects


    Each *class* can be considered a template for storing data about a set of similar
    things (places, events, or people). Let’s consider [Example 2-1](#9781430242093_Ch02.xhtml#ex2-1)
    about plants and their uses. An obvious candidate for our first class is the idea
    of a Plant. Each plant can be described in a similar way in that each has a genus,
    a species, a common_name, and perhaps a plantID number. These pieces of information,
    that we will keep about each plant, are referred to as the *attributes* (or *properties*)
    of the class. [Figure 2-5](#9781430242093_Ch02.xhtml#F5) shows the UML notation
    for a class and its attributes. The name of the class appears in the top panel,
    and the middle panel contains the attributes. For some types of software systems,
    there may be processes that a class would be responsible for carrying out. For
    example, an Order class related to an online shopping cart might have a process
    for calculating a price including tax. These are known as *methods* and appear
    in the bottom panel. For predominantly information–based problems, methods are
    not usually a major consideration in the early stages of the design, and we will
    ignore them for now.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-05_fmt.jpeg)


    [**Figure 2-5.**](#9781430242093_Ch02.xhtml#FG5) UML notation for a class


    Each plant about which we want to keep data will conform to the template in [Figure
    2-5](#9781430242093_Ch02.xhtml#F5); that is, each will have (or could have) its
    own value for the attributes plantID, genus, species, and common_name. Each individual
    plant is referred to as an *object* of the Plant class. The Plant class and some
    objects are depicted in [Figure 2-6.](#9781430242093_Ch02.xhtml#F6)


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-06_fmt.png)


    [**Figure 2-6.**](#9781430242093_Ch02.xhtml#FG6) A class and some of its objects


    The Plant class could include other attributes, such as typical height, lifespan,
    and so on. What about the uses to which a plant can be put? In the database table
    in [Figure 2-3](#9781430242093_Ch02.xhtml#F3), these uses were included as several
    attributes (use1, use2, and so on) of a plant. In [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    we saw how having uses stored as several attributes caused a number of problems.
    What we have here is another candidate for a class: Use. In [Chapter 5](#9781430242093_Ch05.xhtml),
    we will discuss in more detail how we can figure out whether we need classes or
    attributes to hold information. Our new class, Use, will not have many attributes,
    possibly just name. Each object of the Use class will have a value for name such
    as “hedging,” “shelter,” or “bird food.” What is particularly interesting for
    our example is the *relationship* between the Use and Plant classes.


    Relationships


    One particular plant object can have many uses. As an example, we can see from
    [Figure 2-3](#9781430242093_Ch02.xhtml#F3) that Akeake can be used for soil stability,
    hedging, and shelter. We can think of this as a relationship (or association)
    between particular objects of the Plant class and objects of the Use class. Some
    specific instances of this relationship are shown in [Figure 2-7](#9781430242093_Ch02.xhtml#F7).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-07_fmt.png)


    [**Figure 2-7.**](#9781430242093_Ch02.xhtml#FG7) Some instances of the relationship
    between Plant and Use


    In a database, we would usually create a table for each class, and the information
    about each object would be recorded as a row in that table as shown in [Figure
    2-8](#9781430242093_Ch02.xhtml#F8). The information about the specific relationship
    instances would also be recorded in a table. For a relational database, you would
    expect to find tables such as those in [Figure 2-8](#9781430242093_Ch02.xhtml#F8)
    to represent the plants and relationship instances shown in [Figure 2-7](#9781430242093_Ch02.xhtml#F7).
    We will look further at how and why we design tables like these in [Chapter 7](#9781430242093_Ch07.xhtml).
    For now, just convince yourself that it contains the appropriate information.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-08_fmt.png)


    [**Figure 2-8.**](#9781430242093_Ch02.xhtml#FG8) Plant objects and instances of
    the relationship between Plants and Uses expressed in database tables


    In UML, a relationship is represented by a line between two class rectangles,
    as shown in [Figure 2-9](#9781430242093_Ch02.xhtml#F9). The line can be named
    to make it clear what the relationship is (e.g., “can be used for”), but it doesn’t
    need to have a name if the context is obvious. The pair of numbers at each end
    of the line indicates how many objects of one class can be associated with a particular
    object of the other class. The first number is the minimum number. This is usually
    0 or 1 and is therefore sometimes known as the *optionality* (i.e., it indicates
    whether there must be a related object). The second number is the greatest number
    of related objects. It is usually 1 or many (denoted n), although other numbers
    are possible. Collectively, these numbers can be referred to as the *cardinality*
    or the *multiplicity* of the relationship.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-09_fmt.png)


    [**Figure 2-9.**](#9781430242093_Ch02.xhtml#FG9) A data model expressed as a UML
    class diagram


    Relationships are read in both directions. [Figure 2-9](#9781430242093_Ch02.xhtml#F9)
    shows how many objects of the right–hand class can be associated with one particular
    object of the left–hand class and vice versa. When we want to know how many objects
    of ClassB are associated with ClassA, we look at the numbers nearest ClassB.


    A great deal can be learned about data by investigating the cardinality of relationships,
    and we will look at the issue of cardinality further in [Chapter 4](#9781430242093_Ch04.xhtml).
    The current chapter concentrates on the notation for class diagrams and what the
    diagrams can tell you about the relationships between different classes. [Figure
    2-10](#9781430242093_Ch02.xhtml#F10) shows some relationships that could be associated
    with small parts of some of the examples you saw in the [Chapter 1](#9781430242093_Ch01.xhtml).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-10_fmt.png)


    [**Figure 2-10.**](#9781430242093_Ch02.xhtml#FG10) Examples of relationships with
    different cardinalities


    [Figure 2-10](#9781430242093_Ch02.xhtml#F10) is consistent in that the phrases
    in the right-hand columns accurately describe the diagrams. Whether each diagram
    is appropriate for a particular problem is quite a different question. For example,
    in the first row in [Figure 2-10](#9781430242093_Ch02.xhtml#F10), why would we
    want a use that has no plants associated with it? It is questions like this that
    help us to understand the intricacies of a problem, and we will discuss these
    in [Chapter 4](#9781430242093_Ch04.xhtml). At the moment, none of the problems
    have been sufficiently defined to know if the diagrams in [Figure 2-10](#9781430242093_Ch02.xhtml#F10)
    are accurate, but they are reasonable first attempts.


    Further Analysis: Revisiting the Use Cases


    Using the notation for class diagrams, we can make a first attempt at a data model
    diagram to represent our plants example. We have a class for both plants and uses,
    and the relationship between them looks like [Figure 2-11](#9781430242093_Ch02.xhtml#F11).'
