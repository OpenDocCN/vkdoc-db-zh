    # Candidate Keys


    In the previous chapter, we used functional dependencies to help us define what
    we meant by a key.


    `The key fields functionally determine all the other fields in a table.`


    This means that if we know the value of the key fields, we can locate a single
    row in our table, and then we can see the values of all the other fields. We also
    talked about fields that were not necessary to make a set of fields a possible
    key. For example, if we have `customerID` as a key in a `Customer` table, then
    by our definition the combination `customerID` and `customer_name` would also
    be a key. Clearly, `customer_name` is superfluous, and in Chapter 8 we discussed
    how this extra field would cause problems if we used it as part of a foreign key.
    The term `candidate key` is used to describe a key with no unnecessary fields.


    `A candidate key is a key where no subset of the fields is also a key.`


    With this definition, we see that the combination `customerID` and `customer_name`
    is not a candidate key, as the subset `customerID` is a key on its own. There
    may be more than one candidate key in a table. For example, in the `Customer`
    table, we may also store the customer''s tax or social security number.


    ```

    Customer(customerID, customer_name, address, phone, birth_date, tax_number)

    ```


    Now we have two candidate keys: `customerID` and `tax_number`. Both will be unique
    for every record, and (so long as every customer is able and prepared to supply
    a tax number) either would be sufficient to uniquely identify a record. In a situation
    such as this, you choose one of the candidate keys as the primary key for the
    table. What are the considerations for choosing a primary key from among two or
    more candidates?


