- fmt: '# 电子表格在数据管理中的应用


    对于那些拥有数据并需要快速找到统计或计算结果的人来说，电子表格非常出色。电子表格通过其丰富的函数和特性，提供了惊人的强大功能。然而，它们也可能相当危险。任何考虑使用电子表格执行重要计算的人都应该访问一些专门讨论困扰大多数电子表格的各类错误的网站。


    ## 电子表格的优缺点


    电子表格非常适合执行计算，但不太适合存储可能需要以多种方式提取的数据。要轻松查询和报告数据，所需信息通常需要放在一个工作表上。这有点像将所有问题数据保存在一个数据库表中。我们在第一章中展示了一些这样做的问题示例。本书的其余部分主要讨论了如何通过将数据拆分为类或规范化的表来避免这些问题。然而，电子表格是如此流行的工具，因此值得研究如何有效地使用它们来表示一个小型数据模型。


    对于那些类很多且关系复杂的问题，电子表格无法以可维护的方式准确捕捉其复杂性。对于只有少数几个类（主要是类别型类）的问题，有时可以通过精心设计的电子表格来捕捉数据模型的相当一部分复杂性。


    ## 示例：简单订单模型


    考虑一个将客户交易数据保存在电子表格中的小企业。您可能会想象，初步的电子表格设计可能类似于图12-12。


    ![9781430242093_Fig12-12.tif](images/9781430242093_Fig12-12_fmt.jpeg)


    **图 12-12.** 用于处理客户（非常）简单产品订单的电子表格


    到目前为止，您应该能够看到这种解决方案的潜在问题。数据是重复的（例如，客户地址和产品价格），存在不一致的可能性（如第3行和第4行）。订单可以在没有关联客户的情况下输入（第2行），而且据我们所见，这里没有检查是否输入了有效的产品代码（真的有产品76253吗？）。


    ## 优化的数据模型


    针对上述情况的一个合适数据模型（假设订单仅针对单一产品）如图12-13所示。通过将客户和产品信息分离到不同的类中，我们可以确保交易始终针对有效的客户和产品，并且相关的名称、地址和价格是一致的。


    ![9781430242093_Fig12-13.tif](images/9781430242093_Fig12-13_fmt.jpeg)


    **图 12-13.** 客户订购产品的数据模型


    ## 在电子表格中实现关系


    在电子表格中，我们计算和分析的主要焦点将是订单。我们将需要按日期排序、汇总金额、按客户搜索等。为此，所有信息必须集中在一张工作表上，如图12-12所示。那么，我们如何对数据的一致性和准确性保持一定的控制呢？


    图12-13中的数据模型有两个“一对多”关系，因此我们首先看看如何在电子表格中表示这些关系。


    ### 表示一对多关系


    为了表示如图12-13所示的涉及“一对多”关系的数据模型，我们首先为“一”端的每个类设置一个单独的工作表。图12-14显示了一个包含客户信息的工作表，其中数据被赋予了一个范围名称（`all_Customers`）。还会有另一个包含产品信息的工作表。单独的客户工作表使得行可以独立于其他信息（订单和产品）添加或更新。


    ![9781430242093_Fig12-14.tif](images/9781430242093_Fig12-14_fmt.jpeg)


    **图 12-14.** 包含客户信息的工作表，范围名称为`all_Customers`


    然后，我们为“多”端的类（订单）创建第三张工作表，我们将在其中汇总所有需要的信息。我们无需输入每个客户的全部信息，而可以输入客户ID并显示来自客户工作表的匹配数据。这可以通过一个名为`VLOOKUP`的函数来完成。


    ```

    =VLOOKUP(1672,all_Customers,2,FALSE)

    ```


    列表12-1中的公式获取值（例如1672）并在范围`all_Customers`（图12-14）中查找它；参数“2”表示返回该范围中第二列的相关值（姓名 -
    Li）。“FALSE”表示如果该值不在表中，则返回错误消息。列表12-1中的公式在Excel、Google Docs以及（如果将逗号替换为分号）Open Office中都是有效的。


    图12-15显示了列C中VLOOKUP函数的结果。列D和G也包含用于从相应工作表查找数据的函数。史密斯先生地址不一致的问题（图12-12）已得到解决，并且在第6行有一个警告，提示在`all_Customers`中没有客户1657。


    ![9781430242093_Fig12-15.tif](images/9781430242093_Fig12-15_fmt.jpeg)


    **图 12-15.** 带有客户和产品详情查找的订单表


    ## 数据验证与参照完整性


    图12-15中的`custID`列的行为有点类似于关系表中的外键。然而，与外键不同的是，到目前为止，没有任何东西阻止我们在列B中输入一个在客户工作表中不存在的值（第6行），但如果我们使用**精确匹配**查找（包括列表12-1中的“FALSE”参数），我们会得到一个非常明确的信号，即错误消息`#N/A`（不可用），表明存在问题。


    电子表格产品还提供数据验证工具，因此我们可以控制输入到列B的客户编号。我们可以指定订单表上列B中的值必须来自客户工作表的ID列中的值列表。Google Docs中的实现方式如图12-16所示。我们将客户工作表上包含客户编号的单元格范围命名为`custIDs`。


    ![9781430242093_Fig12-16.tif](images/9781430242093_Fig12-16_fmt.jpeg)


    **图 12-16.** Google Docs验证工具


    除了限制我们可以输入到列中的值之外，验证工具还提供了一个方便的有效值列表框以帮助数据录入，如图12-17所示。


    ![9781430242093_Fig12-17.tif](images/9781430242093_Fig12-17_fmt.jpeg)


    **图 12-17.** 使用数据验证工具限制列中的值


    在图12-17的列B上使用数据验证，为我们提供了一种在订单表上输入或更新数据时的参照完整性。查找函数本身的行为有点像连接操作。图12-15中的订单表将来自客户和产品工作表的数据汇集在一起，其方式与关系数据库中三个表之间的外连接非常相似。当我们的模型中存在大量不同的类时，这种处理关系的方法很快就会失控，但对于小型问题来说，这是一个不错的近似方案。'
  raw: 'For those people who have some data and who need to find statistical or calculated
    results quickly, a spreadsheet is wonderful. Spreadsheets have amazing power readily
    available in the form of an abundance of functions and features. However, they
    can also be quite dangerous. Anyone who contemplates using a spreadsheet for performing
    important calculations should visit one of the web sites [⁵](#9781430242093_Ch12.xhtml#fn5)
    that discuss the many and varied mistakes and errors that plague most spreadsheets.


    Spreadsheets are great for performing calculations but are less suited to storing
    data that may need to be extracted in a variety of ways. To query and report on
    data easily, the required information usually needs to be on one sheet. This is
    a bit like keeping all the data for a problem in one database table. We showed
    some examples of the problems of doing this in [Chapter 1](#9781430242093_Ch01.xhtml).
    The rest of the book has essentially been about how to avoid these problems by
    splitting our data into classes or normalized tables. However, spreadsheets are
    such a popular tool that it is worth looking at how to use them to represent a
    small data model effectively.


    Where there are many classes with complex relationships, a spreadsheet will not
    be able to capture the complexities accurately and in a maintainable way. For
    problems that have only a few classes, , (mostly category type classes) it is
    sometimes possible to capture quite a substantial amount of the complexity of
    a data model with a properly designed spreadsheet.


    Consider a small business that is keeping data about the transactions of its customers
    in a spreadsheet. You might imagine that a first attempt at a spreadsheet would
    look something like [Figure 12-12](#9781430242093_Ch12.xhtml#F12).


    ![9781430242093_Fig12-12.tif](images/9781430242093_Fig12-12_fmt.jpeg)


    [**Figure 12-12.**](#9781430242093_Ch12.xhtml#FG12) Spreadsheet for (very) simple
    orders from customers for products


    By now, you should be able to see the potential problems in such a solution. Data
    is repeated (e.g., the address of a customer and price of a product) with the
    potential to become inconsistent as in rows 3 and 4. Orders can be entered without
    an associated customer (row 2), and as far as we can see here there is no check
    on whether a valid product code has been entered (is there really a product 76253?).


    A suitable data model for the preceding situation (assuming orders are just for
    a single product) is shown in [Figure 12-13](#9781430242093_Ch12.xhtml#F13). By
    separating the information about customers and products into separate classes,
    we can ensure that transactions are always for valid customers and products, and
    that the associated names, addresses, and prices are consistent.


    ![9781430242093_Fig12-13.tif](images/9781430242093_Fig12-13_fmt.jpeg)


    [**Figure 12-13.**](#9781430242093_Ch12.xhtml#FG13) Data model for customers ordering
    products


    In a spreadsheet, the main focus for our calculations and analyses is going to
    be the orders. We will want to sort them by date, total the amounts, search for
    them by customer, and so on. To do this, all the information has to be on one
    sheet as in [Figure 12-12](#9781430242093_Ch12.xhtml#F12). How do we maintain
    some control over the consistency and accuracy of the data?


    The data model in [Figure 12-13](#9781430242093_Ch12.xhtml#F13) has two 1–Many
    relationships, so let ’s first look at how to represent those in a spreadsheet.


    1–Many Relationships


    To represent a data model involving 1–Many relationships as in [Figure 12-13](#9781430242093_Ch12.xhtml#F13),
    we first set up a separate sheet for each class at the 1 end. [Figure 12-14](#9781430242093_Ch12.xhtml#F14)
    shows a sheet containing the information about customers with the data given a
    range name (all_Customers). There would be another sheet with information about
    products. The separate customer sheet enables rows to be added or updated independently
    of other information (orders and products).


    ![9781430242093_Fig12-14.tif](images/9781430242093_Fig12-14_fmt.jpeg)


    [**Figure 12-14.**](#9781430242093_Ch12.xhtml#FG14) Sheet with information about
    customers with the range name all_Customers


    We then create a third sheet for the class at the Many end (orders) where we will
    accumulate all the information we need. Rather than type in all the information
    about each customer, we can enter the customer ID and display the matching data
    from the customer sheet. This can be done with a function called VLOOKUP.


    ***[Listing 12-1](#9781430242093_Ch12.xhtml#Lis1)**. VLookup Function*


    =VLOOKUP(1672,all_Customers,2,FALSE)


    The formula in [Listing 12-1](#9781430242093_Ch12.xhtml#L1) takes the value (e.g.
    1672) and finds it in the range all_Customers ([Figure 12-14](#9781430242093_Ch12.xhtml#F14));
    the parameter “2” means return the associated value in the second column of that
    range (the name - Li). The “FALSE” means if the value isn ’t in the table, return
    an error message. [Listing 12-1](#9781430242093_Ch12.xhtml#L1) is valid in Excel,
    Google Docs, and (if the commas are replaced by semicolons) Open Office.


    [Figure 12-15](#9781430242093_Ch12.xhtml#F15) shows the results from the VLOOKUP
    function in column C. Columns D and G also contain functions to look up data from
    the appropriate sheets. The problem with the inconsistent address for Mr. Smith
    ([Figure 12-12](#9781430242093_Ch12.xhtml#F12)) has been resolved and we have
    a warning that there is a problem on row 6 in that there is no customer 1657 in
    all_Customers.


    ![9781430242093_Fig12-15.tif](images/9781430242093_Fig12-15_fmt.jpeg)


    [**Figure 12-15.**](#9781430242093_Ch12.xhtml#FG15) Order sheet with lookups to
    customer and product details


    The custID column in [Figure 12-15](#9781430242093_Ch12.xhtml#F15) is acting somewhat
    like a foreign key in a relational table. Unlike a foreign key, though, there
    is nothing so far to stop us from entering a value in column B that is not represented
    in the customer sheet (row 6), but if we use *exact match* lookups (including
    the parameter “FALSE” as in [Listing 12-1](#9781430242093_Ch12.xhtml#L1)), we
    get a very clear signal with the error message #N/A (not available) that there
    is a problem.


    Spreadsheet products also offer data validation tools so that we can have control
    over the customer numbers we enter into column B. We can specify that the values
    in column B on our order sheet must come from the list of values in the ID column
    of the customer sheet. The way this is done in Google Docs is shown in [Figure
    12-16](#9781430242093_Ch12.xhtml#F16). We have named the range of cells containing
    the customer numbers on the customer sheet custIDs.


    ![9781430242093_Fig12-16.tif](images/9781430242093_Fig12-16_fmt.jpeg)


    [**Figure 12-16.**](#9781430242093_Ch12.xhtml#FG16) Google Docs validation tool


    In addition to restricting the values we can enter into the column, validation
    tools also provide a convenient list box of the valid values to help data entry,
    as shown in [Figure 12-17](#9781430242093_Ch12.xhtml#F17).


    ![9781430242093_Fig12-17.tif](images/9781430242093_Fig12-17_fmt.jpeg)


    [**Figure 12-17.**](#9781430242093_Ch12.xhtml#FG17) Using data validation tools
    to restrict values in a column


    Using a data validation on column B in [Figure 12-17](#9781430242093_Ch12.xhtml#F17)
    has given us a type of referential integrity at the point where data is entered
    or updated on the order sheet. The lookup functions themselves act a bit like
    joins. The order sheet in [Figure 12-15](#9781430242093_Ch12.xhtml#F15) has brought
    together data from the customer and product sheets in a manner quite similar to
    an outer join between three tables in a relational database. This method of dealing
    with relationships rapidly gets out of hand where there are lots of different
    classes in our model, but it is not a bad approximation for small problems.'
