- fmt: '# 属性、类还是关系？


    在之前的章节中，你已经看到了如何通过考虑系统用户需要执行的任务来确定数据库问题的需求。任务用用例表示，并开发了一个简单的数据模型来表示所需的数据。在[第4章](#9781430242093_Ch04.xhtml)中，你看到通过质疑简单关系的一些细节（特别是关系两端涉及的对象数量）可以学到很多关于问题的知识。在本章中，你将了解到几个经常出现的问题，以扩大你解决棘手情况的“武器库”。


    ## 属性、类或关系？


    永远不可能说某个给定的数据模型是*唯一*正确的。我们只能说它在给定范围内满足了问题的需求，并且基于某些假设或近似。如果我们有一段描述某个人、物或事件的数据，可能有不同的方式来表示该信息。在本节中，我们将看一个简单的问题，如[示例
    5-1](#9781430242093_Ch05.xhtml#ex5-1)所述，其中各种数据片段可以根据问题的总体需求表示为属性、类或关系。


    ### 示例 5-1：体育俱乐部


    假设我们正在维护一个体育俱乐部当前队伍的信息。俱乐部希望保留非常简单的记录，包括队名、级别和队长。作为开始，我们可以有一个类来包含这些信息，如[图 5-1](#9781430242093_Ch05.xhtml#F1)所示。


    ![9781430242093_Fig05-01.tif](images/9781430242093_Fig05-01_fmt.jpeg)


    [**图 5-1**](#9781430242093_Ch05.xhtml#FG1)。队伍的简单类


    在[图 5-1](#9781430242093_Ch05.xhtml#F1)中，我们为队伍捕获的每一条信息——名称、级别和队长的名字——都表示为一个属性。使用这个模型，我们可以找到任何给定队伍的属性值，但这就是我们能做的全部了。当然，这可能就是我们想做的全部！


    在之前的章节中，我们看到考虑存储的数据未来如何使用是很重要的。对于[图 5-1](#9781430242093_Ch05.xhtml#F1)中的数据，我们很可能希望找到某个级别的所有队伍。简单的数据模型允许这样做吗？当然可以找到所有具有给定`grade`属性值的`Team`对象；然而，为了获得可靠的数据，我们需要数据录入完全准确。如果不同对象的`grade`属性值被分别记录为“Senior”、“snr”、“Sen
    Grade”、“Senior Grd”等，我们就无法获得Senior级别的所有队伍的准确列表。我们在[示例 2-1](#9781430242093_Ch02.xhtml#ex2-1)中看到了类似的问题，当时我们想确保植物属信息（如*Eucalyptus*）的拼写始终正确。如果可靠地记录和提取关于级别的信息对我们的体育俱乐部很重要，那么我们需要一个能确保级别被一致记录的数据模型。这可以通过将队伍的级别表示为一个类来实现，如[图
    5-2](#9781430242093_Ch05.xhtml#F2)所示。每个可能的级别都成为`Grade`类的一个对象，每个队伍都与相应的`Grade`对象相关联。


    ![9781430242093_Fig05-02.tif](images/9781430242093_Fig05-02_fmt.jpeg)


    [**图 5-2.**](#9781430242093_Ch05.xhtml#FG2) 将队伍级别表示为一个类


    因此，根据项目的需求，我们可以选择将级别表示为`Team`的一个属性（如果拼写的一致性不重要），或者表示为它自己的一个类（例如，如果我们认为可能想要查找属于同一级别的所有队伍）。


    现在考虑[图 5-1](#9781430242093_Ch05.xhtml#F1)中的`captain`属性。一个人不太可能同时担任多支队伍的队长，因此类似于上一节中的查询（查找Jenny目前担任队长的所有队伍）不太可能是一个高优先级需求。然而，我们可能希望保存一些关于队长的额外数据：也许是她的电话号码和地址。在体育俱乐部的背景下，这些信息很可能已经存在于某个会员名单中。我们很可能有另一个类`Member`，它保存了体育俱乐部所有会员的联系信息。如果是这样，我们可以将队伍的队长表示为`Team`和`Member`类之间的关系，如[图
    5-3](#9781430242093_Ch05.xhtml#F3)所示。一个特定的`Member`对象是一个`Team`对象的队长。


    ![9781430242093_Fig05-03.tif](images/9781430242093_Fig05-03_fmt.jpeg)


    [**图 5-3.**](#9781430242093_Ch05.xhtml#FG3) 将队长表示为一个关系


    再次，根据问题的不同，我们有不同的方式来表示队伍的队长。我们可以选择将队长表示为`Team`的一个属性，或者表示为`Member`和`Team`之间的关系。这里的决定因素将是问题是否需要关于会员的一般信息。


    在考虑是否将信息表示为属性、类或关系时，可以问一些有用的问题，总结如下：


    *   “我是否可能想要使用某个给定的信息片段进行汇总、分组或选择？” 例如，你是否可能想根据级别选择队伍？如果是，请考虑将该信息片段变成一个类。

    *   “我现在或将来是否可能存储关于这个信息片段的其他数据？” 例如，你是否可能想保存队长的电话和地址等信息？这些信息是否（或应该）已经存在于另一个类中？如果是，请考虑将该信息片段表示为类之间的关系。


    ## 类之间的两个或更多关系


    如果我们还想保存关于为一支队伍打球的人的信息，[图 5-3](#9781430242093_Ch05.xhtml#F3)中的模型将如何改变？我们可能需要知道他们的名字和电话号码。将所有信息作为`Team`类的属性保存将很快变得难以处理。我们将需要诸如`player1Name`、`player1Phone`等属性。我们很可能已经在一个`Member`类中拥有了我们需要的关于球员的信息。特定会员为特定队伍效力这一事实因此可以表示为类之间的关系。这与[示例
    2-1](#9781430242093_Ch02.xhtml#ex2-1)中植物对象与特定用途对象相关联的情况非常相似。[图 5-4](#9781430242093_Ch05.xhtml#F4)展示了在我们的数据模型中添加的`Member`和`Team`之间的这种关系。


    ![9781430242093_Fig05-04.tif](images/9781430242093_Fig05-04_fmt.jpeg)


    [**图 5-4.**](#9781430242093_Ch05.xhtml#FG4) Member和Team之间的不同关系


    现在在我们的`Member`和`Team`类之间有两个关系。一个是关于哪些会员为队伍效力（可能有很多）。另一个是关于哪个会员是队伍的队长（只有一个）。[图
    5-4](#9781430242093_Ch05.xhtml#F4)中的模型也允许有不为任何队伍效力或担任任何队伍队长的会员（他们可能是俱乐部的社交会员）。这样的会员将简单地不与任何队伍关联。'
  raw: 'In the previous chapters, you’ve seen how to determine the requirements of
    a database problem by considering the tasks users of the system need to carry
    out. Tasks were represented with use cases, and a simple data model was developed
    to represent the required data. In [Chapter 4](#9781430242093_Ch04.xhtml), you
    saw that a great deal can be learned about a problem by questioning some of the
    details of simple relationships, particularly the number of objects involved at
    each end of a relationship. In this chapter, you’ll be introduced to a few problems
    that frequently occur in order to enlarge your armory for attacking tricky situations.


    Attribute, Class, or Relationship?


    It is never possible to say that a given data model is *the* correct one. We can
    only say that it meets the requirements of a problem within a given scope, and
    subject to certain assumptions or approximations. If we have a piece of data describing
    some person or thing or event, it is possible that there may be different ways
    of representing that information. In this section, we look at a simple problem,
    described in [Example 5-1](#9781430242093_Ch05.xhtml#ex5-1), for which various
    pieces of data may be represented as an attribute, class, or relationship depending
    on the overall requirements of the problem.


    EXAMPLE 5-1: SPORTS CLUB


    Let’s say we are keeping information about current teams for a sports club. The
    club wishes to keep very simple records of the team name, its grade, and the captain.
    As a start we could have a class to contain this information as shown in [Figure
    5-1](#9781430242093_Ch05.xhtml#F1).


    ![9781430242093_Fig05-01.tif](images/9781430242093_Fig05-01_fmt.jpeg)


    [**Figure 5-1**](#9781430242093_Ch05.xhtml#FG1). Simple class for Team


    In [Figure 5-1](#9781430242093_Ch05.xhtml#F1), each of the pieces of information
    we are capturing about a team, the name, grade, and the name of the captain is
    represented by an attribute. With this model, we can find the values of the attributes
    for any given team, but that is about all we can do. Of course, that may be all
    we want to do!


    In previous chapters, we saw that it is important to consider how the data being
    stored might be used in the future. With the data in [Figure 5-1](#9781430242093_Ch05.xhtml#F1),
    it is quite likely we may want to find all the teams in a given grade. Will the
    simple data model allow this? It is certainly possible to find all the **Team**
    objects with a given value for the **grade** attribute; however, to obtain reliable
    data, we would require the data entry to be exact. We would not get an accurate
    list of all teams in senior grade if the value of the **grade** attribute for
    different objects was variously recorded as “Senior,” “snr,” “Sen Grade,” “Senior
    Grd,” and so on. We saw a similar problem in [Example 2-1](#9781430242093_Ch02.xhtml#ex2-1)
    where we wanted to ensure plant genus information (like *Eucalyptus*) was always
    spelled correctly. If reliable recording and extracting of data about grades is
    important for our sports club, we need a data model that will ensure grades are
    recorded consistently. This can be done by representing the grade of a team as
    a class as in [Figure 5-2](#9781430242093_Ch05.xhtml#F2). Each possible grade
    becomes an object of the **Grade** class, and each team is related to the appropriate
    **Grade** object.


    ![9781430242093_Fig05-02.tif](images/9781430242093_Fig05-02_fmt.jpeg)


    *[**Figure 5-2.**](#9781430242093_Ch05.xhtml#FG2) Representing a team’s grade
    as a class*


    Therefore, depending on the requirements of the project, we might choose to represent
    the grade as an attribute of **Team** (if the consistency of the spelling is not
    important) or as a class of its own (if we think we may want to find all the teams
    belonging to the same grade, for example).


    Now consider the **captain** attribute in [Figure 5-1](#9781430242093_Ch05.xhtml#F1).
    It’s unlikely that a person will captain more than one team at a time, so a query
    analogous to the one in the previous section (find all the teams Jenny currently
    captains) is unlikely to be a high priority. However, there may be some additional
    data about a captain that we might like to keep: perhaps her phone number and
    address. In the context of a sports club, it is highly likely that this information
    already exists in some membership list. We very possibly have another class, **Member**,
    that keeps contact information about all the members of the sports club. If so,
    we can represent a team’s captain as a relationship between the **Team** and **Member**
    classes as shown in [Figure 5-3](#9781430242093_Ch05.xhtml#F3). A particular object
    of the **Member** class is the captain of an object of the **Team** class.


    ![9781430242093_Fig05-03.tif](images/9781430242093_Fig05-03_fmt.jpeg)


    [**Figure 5-3.**](#9781430242093_Ch05.xhtml#FG3) Representing captain as a relationship


    Once again, depending on the problem, we have different ways to represent a team’s
    captain. We might choose to represent the captain as an attribute of **Team**
    or as a relationship between **Member** and **Team**. The determining factor here
    will be whether the problem requires information about members in general.


    Some useful questions to ask when considering whether to represent information
    as an attribute, class, or relationship are summarized here:


    *   “Am I likely to want to summarize, group, or select using a given piece of
    information?” For example, might you want to select teams based on grade? If so,
    consider making the piece of information into a class.

    *   “Am I likely now or in the future to store other data about this piece of
    information?” For example, might you want to keep information such as phone and
    address about a captain? Does (or should) this information already exist in another
    class? If so, consider representing the piece of information as a relationship
    between the classes.


    Two or More Relationships Between Classes


    How would the model in [Figure 5-3](#9781430242093_Ch05.xhtml#F3) change if we
    also wanted to keep information about the people playing for a team? We may need
    to know their names and phone numbers. Keeping all this information as attributes
    of the **Team** class will rapidly become unwieldy. We would need attributes such
    as **player1Name**, **player1Phone**, and so on. Once again, we probably have
    the information we require about players already in a **Member** class. The fact
    that particular members play for a particular team can therefore be represented
    as a relationship between the classes. This is very similar to the situation in
    [Example 2-1](#9781430242093_Ch02.xhtml#ex2-1) where plant objects were related
    to particular use objects. [Figure 5-4](#9781430242093_Ch05.xhtml#F4) shows the
    addition of this relationship between **Member** and **Team** in our data model.


    ![9781430242093_Fig05-04.tif](images/9781430242093_Fig05-04_fmt.jpeg)


    [**Figure 5-4.**](#9781430242093_Ch05.xhtml#FG4) Different relationships between
    Member and Team


    We now have two relationships between our **Member** and **Team** classes. One
    is about which members play for the team (could be many). The other is about which
    member is the captain of the team (just one). The model in [Figure 5-4](#9781430242093_Ch05.xhtml#F4)
    also allows for members who do not play for or captain any teams (they may be
    social members of the club). Such members would simply not be linked to a team.'
  trans: '

    # 属性、类还是关系？


    在之前的章节中，你已经看到了如何通过考虑系统用户需要执行的任务来确定数据库问题的需求。任务用用例表示，并开发了一个简单的数据模型来表示所需的数据。在第 4
    章中，你看到通过质疑简单关系的一些细节（特别是关系两端涉及的对象数量）可以学到很多关于问题的知识。在本章中，你将了解到几个经常出现的问题，以扩大你解决棘手情况的“武器库”。


    ## 属性、类或关系？


    永远不可能说某个给定的数据模型是*唯一*正确的。我们只能说它在给定范围内满足了问题的需求，并且基于某些假设或近似。如果我们有一段描述某个人、物或事件的数据，可能有不同的方式来表示该信息。在本节中，我们将看一个简单的问题，如示例
    5-1 所述，其中各种数据片段可以根据问题的总体需求表示为属性、类或关系。


    ### 示例 5-1：体育俱乐部


    假设我们正在维护一个体育俱乐部当前队伍的信息。俱乐部希望保留非常简单的记录，包括队名、级别和队长。作为开始，我们可以有一个类来包含这些信息，如图 5-1 所示。


    ![9781430242093_Fig05-01.tif](img/9781430242093_Fig05-01_fmt.jpeg)


    **图 5-1**。队伍的简单类


    在图 5-1 中，我们为队伍捕获的每一条信息——名称、级别和队长的名字——都表示为一个属性。使用这个模型，我们可以找到任何给定队伍的属性值，但这就是我们能做的全部了。当然，这可能就是我们想做的全部！


    在之前的章节中，我们看到考虑存储的数据未来如何使用是很重要的。对于图 5-1 中的数据，我们很可能希望找到某个级别的所有队伍。简单的数据模型允许这样做吗？当然可以找到所有具有给定`grade`属性值的`Team`对象；然而，为了获得可靠的数据，我们需要数据录入完全准确。如果不同对象的`grade`属性值被分别记录为“Senior”、“snr”、“Sen
    Grade”、“Senior Grd”等，我们就无法获得 Senior 级别的所有队伍的准确列表。我们在示例 2-1 中看到了类似的问题，当时我们想确保植物属信息（如*Eucalyptus*）的拼写始终正确。如果可靠地记录和提取关于级别的信息对我们的体育俱乐部很重要，那么我们需要一个能确保级别被一致记录的数据模型。这可以通过将队伍的级别表示为一个类来实现，如图
    5-2 所示。每个可能的级别都成为`Grade`类的一个对象，每个队伍都与相应的`Grade`对象相关联。


    ![9781430242093_Fig05-02.tif](img/9781430242093_Fig05-02_fmt.jpeg)


    **图 5-2.** 将队伍级别表示为一个类


    因此，根据项目的需求，我们可以选择将级别表示为`Team`的一个属性（如果拼写的一致性不重要），或者表示为它自己的一个类（例如，如果我们认为可能想要查找属于同一级别的所有队伍）。


    现在考虑图 5-1 中的`captain`属性。一个人不太可能同时担任多支队伍的队长，因此类似于上一节中的查询（查找 Jenny 目前担任队长的所有队伍）不太可能是一个高优先级需求。然而，我们可能希望保存一些关于队长的额外数据：也许是她的电话号码和地址。在体育俱乐部的背景下，这些信息很可能已经存在于某个会员名单中。我们很可能有另一个类`Member`，它保存了体育俱乐部所有会员的联系信息。如果是这样，我们可以将队伍的队长表示为`Team`和`Member`类之间的关系，如图
    5-3 所示。一个特定的`Member`对象是一个`Team`对象的队长。


    ![9781430242093_Fig05-03.tif](img/9781430242093_Fig05-03_fmt.jpeg)


    **图 5-3.** 将队长表示为一个关系


    再次，根据问题的不同，我们有不同的方式来表示队伍的队长。我们可以选择将队长表示为`Team`的一个属性，或者表示为`Member`和`Team`之间的关系。这里的决定因素将是问题是否需要关于会员的一般信息。


    在考虑是否将信息表示为属性、类或关系时，可以问一些有用的问题，总结如下：


    *   “我是否可能想要使用某个给定的信息片段进行汇总、分组或选择？” 例如，你是否可能想根据级别选择队伍？如果是，请考虑将该信息片段变成一个类。

    *   “我现在或将来是否可能存储关于这个信息片段的其他数据？” 例如，你是否可能想保存队长的电话和地址等信息？这些信息是否（或应该）已经存在于另一个类中？如果是，请考虑将该信息片段表示为类之间的关系。


    ## 类之间的两个或更多关系


    如果我们还想保存关于为一支队伍打球的人的信息，图 5-3 中的模型将如何改变？我们可能需要知道他们的名字和电话号码。将所有信息作为`Team`类的属性保存将很快变得难以处理。我们将需要诸如`player1Name`、`player1Phone`等属性。我们很可能已经在一个`Member`类中拥有了我们需要的关于球员的信息。特定会员为特定队伍效力这一事实因此可以表示为类之间的关系。这与示例
    2-1 中植物对象与特定用途对象相关联的情况非常相似。图 5-4 展示了在我们的数据模型中添加的`Member`和`Team`之间的这种关系。


    ![9781430242093_Fig05-04.tif](img/9781430242093_Fig05-04_fmt.jpeg)


    **图 5-4.** Member 和 Team 之间的不同关系


    现在在我们的`Member`和`Team`类之间有两个关系。一个是关于哪些会员为队伍效力（可能有很多）。另一个是关于哪个会员是队伍的队长（只有一个）。图 5-4
    中的模型也允许有不为任何队伍效力或担任任何队伍队长的会员（他们可能是俱乐部的社交会员）。这样的会员将简单地不与任何队伍关联。

