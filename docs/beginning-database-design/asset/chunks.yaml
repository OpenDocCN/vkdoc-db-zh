- fmt: '# 数据库设计中的继承与组合模式


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-18_fmt.png)


    ## 使用角色（契约）作为多重继承的替代方案


    [Figure 6-17](#9781430242093_Ch06.xhtml#F17) 中的方法在添加新角色时很容易调整（例如，管理员、清洁工）。如果我们希望将与其契约特定信息一起包含的管理员，只需向
    `Contract` 类添加另一个子类 `Administrator_Contract`。


    然而，存在一个小问题。在 [Figure 6-17](#9781430242093_Ch06.xhtml#F17) 中，一个人可以关联多个契约，但我们对契约的类型没有任何约束。该模型无法阻止
    Linda 与多个 `Lecturer` 契约和/或多个 `Student` 契约关联。在现实中，这可能正是问题所需。Linda 可能在完成艺术学位后继续攻读科学学位。John
    可能被晋升并签订一份新的 120,000 美元契约。我们可以向父 `Contract` 类添加一些日期属性，以便契约可以被识别为连续或重叠。总体而言，[Figure
    6-17](#9781430242093_Ch06.xhtml#F17) 中的模型非常灵活，并允许我们以透明的方式处理许多复杂情况。


    然而，我们需要确保我们问题的目标需要这种关于人员及其所承担角色的准确性。如果目标是维护关于不同类型员工、他们的薪酬和资格的可靠统计，那么这种模型对于帮助我们理解现状是必要的。如果这些信息仅是次要的（即，我们的主要目标是维护学生注册和结果），那么我们可能不需要引入子类来维护人员可能扮演的其他次要角色的专门数据。


    ## 组合与聚合


    通常，我们有由其他对象组成的对象：森林由树木组成或建筑物由房间组成。有些人使用特殊符号表示这种关系，但我从未发现这样做特别有帮助。


    当处理我们拥有这种对象的组合或聚合的情况时，继承会变得有用。考虑一栋建筑有多个房间，如 [Figure 6-19](#9781430242093_Ch06.xhtml#F19)
    所示。每年建筑物必须进行安全检查。偶尔需要检查个别房间。我们可以有一个记录日期的 `Check` 类。`Check` 类应该与 `Building` 类关联，还是与
    `Room` 类关联，或与两者关联？


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-19_fmt.jpeg)


    [**Figure 6-19.**](#9781430242093_Ch06.xhtml#FG19) 一栋建筑有许多房间。


    出于此问题的目的，`Room` 和 `Building` 有共同之处。它们都可以与安全检查关联。因此，这成为继承解决方案的候选。首次尝试如 [Figure
    6-20](#9781430242093_Ch06.xhtml#F20) 所示。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-20_fmt.jpeg)


    [**Figure 6-20.**](#9781430242093_Ch06.xhtml#FG20) 建筑和房间都是可能进行安全检查的结构类型。


    现在我们可以存储关于单次检查的数据，其中包含建筑物（并且我们知道包括了哪些房间）。然而，如果需要，检查也可以与单个房间关联。虽然这个解决方案很好，但使用软件模式可以使其更加通用。有许多对软件开发人员有用的设计模式[^1]。它们主要处理行为，而我们的重点是数据。[Figure
    6-21](#9781430242093_Ch06.xhtml#F21) 中的解决方案基于 `Composite` 模式。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig06-21_fmt.jpeg)


    [**Figure 6-21.**](#9781430242093_Ch06.xhtml#FG21) 使用组合模式。对组件进行检查，该组件可能是单个房间或其他组件的组合。


    [Figure 6-21](#9781430242093_Ch06.xhtml#F21) 中的模型说明，我们有一个可以进行安全检查的东西（组件）。该组件可能是一个单独的组件（在本例中是一个房间）或其他组件的集合。例如，我们可以有一个
    `Composite` 对象，它是一个由房间组成的建筑物。这类似于 [Figure 6-20](#9781430242093_Ch06.xhtml#F20)。然而，我们的新模型更通用，因为
    `Composite` 可以由其他组合构成。例如：一个工业区可能由建筑物组成，每栋建筑物由楼层组成，每个楼层包含房间。使用 [Figure 6-21](#9781430242093_Ch06.xhtml#F21)
    中的 `Composite` 模式，我们可以在任何级别（房间、楼层、建筑物等）记录安全检查。


    我们将在 [Chapter 7](#9781430242093_Ch07.xhtml) 中研究如何在关系数据库中表示继承。与此同时，[Figure 6-22](#9781430242093_Ch06.xhtml#F22)
    中的表显示了信息可能如何记录。`Check` 表显示组件 3 在 2012年2月3日 被检查。从 `Composite` 表中，我们可以推断（通过查看右列）组件
    40 和 60 属于 3，而组件 113、115 和 117 属于 40 或 60。`Component` 表记录了所有这些实体是什么，因此我们知道 2012年2月3日
    的检查是在福布斯大楼上，该大楼包含 4 楼和 6 楼，其中又包含房间 F403、F409 和 F632。在 2012年2月10日，对 113（房间 F408）进行了一次检查，该房间没有子部分（未出现在
    `Composite` 表的右列中）。


