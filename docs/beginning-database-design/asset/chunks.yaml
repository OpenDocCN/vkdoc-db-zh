    From Data Model to Relational Database Design


    Let’s recap the story so far, in our endeavors to design a database. We started
    with use cases to describe the basic requirements of a problem and developed an
    initial data model. By looking carefully at the details of the model, we were
    able to develop questions to help understand further subtleties and complexities
    of the real–world problem. We then looked at a number of situations that occur
    in many models in the hope that these would be useful when difficult situations
    arose in other contexts.


    The goal is not to attempt to get a perfect or complete model. The outcome we
    are seeking is agreement on a model that accurately reflects the essential requirements
    of the real–world problem. This will involve numerous iterations as the use cases
    adjust to reflect the improved understanding and the changing scope. Having arrived
    at a set of use cases and a data model with which everyone is comfortable, we
    can now move on to the third phase of the development process, as shown in the
    bottom–right square of [Figure 7-1](#9781430242093_Ch07.xhtml#F1).


    ![9781430242093_Fig07-01.eps](images/9781430242093_Fig07-01_fmt.png)


    [**Figure 7-1**](#9781430242093_Ch07.xhtml#FG1). Database development process


    In this and the following chapters, we will look at how to design a database that
    could be implemented in a relational database product (e.g., MySQL, Microsoft
    Access, SQL Server, Oracle, etc.).


    Representing the Model


    We have gone to a great deal of trouble to capture as much detail as possible
    in the data model. Much of this detail can be represented and enforced by standard
    techniques built into relational database management software. A good model, implemented
    using the standard techniques, allows us to capture many of the constraints implied
    by the relationships between classes without recourse to programming or complex
    interface design.


    In this chapter, I will show you how many of the aspects of the data model can
    be captured by standard database functionality. To give you an idea of what is
    coming up, I have summarized the techniques in [Table 7-1](#9781430242093_Ch07.xhtml#table-1).


    *[**Table 7-1**](#9781430242093_Ch07.xhtml#T7_1). Techniques to Represent Aspects
    of the Data Model*


    | **Feature in Model** | **Technique Used in Relational Database** |

    | Class | Add a table with a primary key. |

    | Attribute | Add a field with an appropriate data type to the table. |

    | Object | Add a row of data to the table. |

    | 1–Many relationship | Use a foreign key, i.e., a reference to a particular row
    (or object) in the table at the 1 end of the relationship. |

    | Many–Many relationship | Add a new table with two foreign keys. |

    | Optionality of 1 at the 1 end of a relationship | Make the value of the foreign
    key required. |

    | Parent and child classes (inheritance) | Add a table for the parent class. Add
    tables for each child class with a primary key that is also a foreign key referencing
    the parent table (not an exact representation but OK). |


    All of the techniques described in [Table 7-1](#9781430242093_Ch07.xhtml#table-1)
    can be carried out in most database management products as part of the specification
    of the tables. More complex constraints may require some additional procedures
    or checking at data input time, but with a good model this can be minimized. By
    using the built–in facilities of the database product, the time required for implementation,
    maintenance, and expansion of the application is greatly reduced.


