    `Item` 表中添加一个引用 `Title` 表的外键。这些外键的数据类型必须与它们所引用的表中的数据类型相同。为了表示“借阅”这个多对多（Many–Many）关系，我们需要首先添加一个新类（`Loan`），如图
    A-34 所示。


    ![9781430242093_APP01-34.tif](img/9781430242093_APP01-34_fmt.jpeg)


    **图 A-34.** 一个用于帮助表示多对多关系“借阅”的新类


    在这个阶段，我们应该意识到（你可能早就意识到了）需要存储有关 `Person` 和 `Item` 配对的信息（`date_out`、`due_date` 等）。这些需要与客户讨论。我们现在先做个记录。为了表示图
    A-34 中的两个一对多关系，我们将在 `Loan` 表中添加两个外键，分别引用 `Person` 和 `Item`。


    下面，我总结了我们目前的进展。（我使用加粗下划线表示主键，斜体表示外键。）


    |   | Person | (`ID`, last_name, first_name) |

    |   | Title | (cat_num, title, author, *category*) |

    |   | Item | (`copy_num`, purchase_date, *title_cat_num*) |

    |   | Category | (`name`) |

    |   | Loan | (`<dates>`, *item*, *person*) |


    我们快完成了；我们只需要决定 `Item` 和 `Loan` 表的主键。对于 `Item` 表，现在可以使用 `title_cat_num` 和 `copy_num`
    的组合作为主键。每个书目都有一个唯一的目录编号，并且每个书目只会有一个副本 1、一个副本 2，依此类推。对于 `Loan` 表，`item` 和 `person`
    的组合并不合适；同一个人可能第二次借阅同一件物品。然而，如果我们包含借出日期，那么这三个字段将是唯一的（假设您不会在同一天借出同一件物品两次）。也可以在 `Loan`
    表中添加一个唯一的贷款编号作为主键（我们在第 8 章中探讨这个选择）。


    代码清单 A-1 展示了在 SQL Server 中创建这些表的 SQL（我们尚未在本设计书籍中涵盖处理连接键和外键的所有必需语法，但它相当容易理解）。


    **代码清单 A-1.** 创建图书馆数据库的 SQL


    ```sql

    CREATE TABLE Category (name VARCHAR (20) PRIMARY KEY);


    CREATE TABLE Person (ID INT PRIMARY KEY, last_name VARCHAR(20) NOT NULL, first_name
    VARCHAR(20) NOT NULL);


    CREATE TABLE Title (cat_num VARCHAR(40) PRIMARY KEY, title VARCHAR(80) NOT NULL,
    author VARCHAR(80) NOT NULL, category VARCHAR(20) NOT NULL FOREIGN KEY REFERENCES
    Category);


    CREATE TABLE Item (title_cat_num VARCHAR (40) FOREIGN KEY REFERENCES Title, copy_num
    INT, purchase_date DATE NOT NULL, PRIMARY KEY (title_cat_num, copy_num));


    CREATE TABLE Loan (date_out DATE, cat_num VARCHAR(40), copy_num INT, borrower
    INT FOREIGN KEY REFERENCES Person, FOREIGN KEY (cat_num, copy_num) REFERENCES
    Item, PRIMARY KEY (date_out, cat_num, copy_num, borrower) );

    ```


    # 练习 8-3


    图 A-35 展示了示例 1-3 中讨论的未规范化昆虫数据的一个版本。


    ![9781430242093_APP01-35.tif](img/9781430242093_APP01-35_fmt.jpeg)


    **图 A-35.** *未规范化的昆虫数据*


    a) 可能会出现哪些更新问题？


    最明显的问题很可能源于重复信息导致的不一致数据。每个农场的名称被记录了多次，并且不可避免地导致 `HighGate` 出现了拼写错误。访问日期 14 是 2
    月 9 日这一事实被记录了多次，数据输入错误是可能的。由于数据存储在电子表格中，没有主键，因此不会出现插入和删除问题。


    b) 以下哪些函数依赖成立？'
- fmt: "## 函数依赖分析\n\n*   `FarmID` -> `FarmName`? 是的。如果我知道ID就能告诉你名称（或者在拼写错误被纠正后应该可以）。\n\
    *   `FarmID` -> `Visit`? 不是。如[Figure A-35](#9781430242093_APP.xhtml#F35)中所示的数据，农场1有两个关联的访问（14和15）。如果这个函数依赖成立，那就意味着每个农场只有一个访问——显然不是本意。\n\
    *   `Visit` -> `Date`? 对于所示数据这肯定是正确的，但这会永远成立吗？这将意味着一次访问发生在单日——需要与客户确认。我们暂时说是。\n\
    *   `Date` -> `Visit`? 不是。那将意味着每天只有一次访问。2月9日有两个关联的访问：14和16。\n*   `Visit` -> `FarmID`?\
    \ 所示数据支持这一点。通常我们需要确认一次访问只针对一个农场（即不包含全国巡游）。我们暂时说是。\n*   `SampleID` -> `Field`?\
    \ 如果我们知道样本，肯定也应该知道它来自哪个田地，对吗？然而，一些`SampleID`为2的行，`Field`值是F1，而另一些是F2。所以，不行——我们无法通过知道`SampleID`的值来确定`Field`的值。这是因为`SampleID`字段不能唯一标识一个样本。存在多个来自不同访问的`SampleID`为2的样本。要标识一个样本，我们还需要知道它是在哪次访问中收集的。\n\
    *   (`SampleID`, `VisitID`) -> `Field`? 是的——见上文！数据支持这一点。访问14的样本2只关联F2，访问16的样本2只关联F1。\n\
    *   (`SampleID`, `Insect`) -> `Count`? 在一个实际样本中，如果我们指定了昆虫，那么应该得出一个唯一的计数。但记住，`SampleID`字段不能唯一标识一个实际样本。看看`SampleID\
    \ = 2`且`Insect = 'Beetle'`的那些行。（多么巧合！）\n*   (`VisitID`, `SampleID`, `Insect`)\
    \ -> `Count`? 见上文。现在我们将`VisitID`与`SampleID`一起包含，就可以识别出实际的试管（或其他容器）并知道甲虫的数量。\n\n\
    ## 问题 c)\n\n(`VisitID`, `SampleID`, `Insect`) 是一个合适的键吗？\n\n从问题2，让我们总结一下对这些数据成立的函数依赖（FD）。\n\
    \n*   FD1: `FarmID` -> `FarmName`\n*   FD2: `VisitID` -> `Date`, `FarmID`\n* \
    \  FD3: `SampleID`, `VisitID` -> `Field`\n*   FD4: `VisitID`, `SampleID`, `Insect`\
    \ -> `Count`\n\n如果我有(`VisitID`, `SampleID`, `Insect`)的值，我能确定哪些字段值？\n\n我们知道`Count`\
    \ (FD4)，`Field` (FD3)，`Date`和`FarmID` (FD2)，并且因为现在我知道了`FarmID`，我就能告诉你`FarmName`\
    \ (FD1)。这就是所有信息，所以这个集合是一个键。它是一个主键，因为如果你移除了任何字段，你就无法知道所有信息（我将把验证这一点留给非常热衷的读者）。\n\
    \n## 问题 d)\n\n将[Figure A-35](#9781430242093_APP.xhtml#F35)中的数据分解为一组符合第三范式（3rd\
    \ Normal form）的表。\n\n字段如下（主键带下划线）：\n\n(`FarmID`, `VisitID`, `SampleID`, `Date`,\
    \ `FarmName`, `Field`, `Insect`, `Count`)\n\n这符合第一范式（1st Normal Form）吗？\n\n是的。我们没有试图在一个单元格中放入多个信息。\n\
    \n这符合第二范式（2nd Normal Form），或者说非键字段是否依赖于整个键？\n\n不是。我们仅通过知道`FarmID`就能确定`FarmName`\
    \ (FD1)，所以它应该被移除到另一个与它所依赖的字段一起的表中。这给我们留下：\n\n(`FarmID`, `VisitID`, `SampleID`,\
