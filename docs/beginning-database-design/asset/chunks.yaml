- fmt: 'We then have the problem that our set of meals includes some that should not
    be associated with new orders. One way to deal with this is to add an attribute,
    `available`, to the `Meal` class that indicates whether the meal can be ordered
    at the present time. We would need to alter our use case for entering an order
    to say that only meals that are `available` can be included. Our reporting use
    cases, however, would probably include all meals that were ordered during the
    reporting period.


    ## Quantities of Particular Meals


    What if our customer orders two chicken vindaloos? We can associate the `Order`
    object with the `Meal` object, but where do we keep the information about how
    many of this particular meal is to be delivered for this order? This is a very
    serious oversight, and to fix it requires a new class between the `Order` and
    `Meal` classes. This often happens when we have Many–Many relationships. We will
    discuss this further in [Chapter 4](#9781430242093_Ch04.xhtml).


    ## Summary


    The first part of the analysis process is to understand the main objectives and
    the scope of the project. The analyst’s job is to get inside the heads of all
    the different types of people who will use the system to understand what they
    require now and what they are likely to need in the future. The process is iterative
    but is likely to include the following steps:


    *   Determine the main objective of the system.

    *   Determine the jobs different users do in an average day.

    *   Brainstorm the data that could be associated with each job.

    *   Agree on the scope of the project and decide on the relevant data.

    *   Sketch data input use cases, consider exceptions, and check existing forms.

    *   Sketch a first data model.

    *   Brainstorm the possible outputs given the data being collected.

    *   Sketch information output use cases.

    *   Check that the data model can readily provide the output information


    ## TESTING YOUR UNDERSTANDING


    Exercise 3-1.


    Consider the scenario described at the beginning of this chapter:


    *When parents call to say that children are sick, we have to let their classroom
    teachers know, and if it’s sports day and the child is on a school team, the sports
    teacher might have to sort out substitutes. Then we need to count up all the days
    missed to put on the child’s report. The Department of Education needs the totals
    each term, too.*


    Run through the steps in the summary section and sketch some use cases and an
    initial data model. Assume that the main objectives are to record the absences
    for the classroom teacher, for school reports, and for statistics given to the
    Department of Education.


