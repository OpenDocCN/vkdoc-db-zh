    Testing Your Understanding


    In this Appendix we will discuss the problems from the end of each chapter. I
    emphasize that these are discussions as opposed to answers. There may be other
    acceptable ways to approach the different scenarios.


    Exercise 1-1


    A school is planning some outdoor pursuits for its students. It wants to create
    a database of how parents can help. The secretary sets up the database table as
    in [Figure A-1](#9781430242093_APP.xhtml#F1) to keep the information.


    ![9781430242093_APP01-01.tif](images/9781430242093_APP01-01_fmt.jpeg)


    [**Figure A-1.**](#9781430242093_APP.xhtml#FG1) Initial database table for recording
    parent contributions


    a)  What problems can you foresee in making good use of the information in the
    table in [Figure A-1](#9781430242093_APP.xhtml#F1)?


    The table was probably designed as in [Figure A-1](#9781430242093_APP.xhtml#F1)
    because the school secretary prepared a list of people and asked them to fill
    in what they could do to help with the school camping trips. However the main
    use of the data will likely be the other way around—who can provide this help?
    If you want to find someone to help with driving then you will have to check both
    columns, so filtering or sorting the table to find the drivers will be difficult.
    There is also a category or keyword problem. Some people have called their willingness
    to get the children to a camp “driving,” while others call it “transport.” This
    makes any automated selection of appropriate people almost impossible. A human
    would need to check every row.


    b)  Suggest some better ways that this information could be stored.


    One improvement would be to predetermine some categories: transport, provide equipment,
    and food preparation. A simple spreadsheet or table based on these categories,
    as shown in [Figure A-2](#9781430242093_APP.xhtml#F2), would be much easier to
    manipulate. For example, some simple filtering of the transport column will find
    all the drivers very quickly.


    ![9781430242093_APP01-02.tif](images/9781430242093_APP01-02_fmt.jpeg)


    [**Figure A-2.**](#9781430242093_APP.xhtml#FG2) A spreadsheet or database table
    using categories


    The solution in [Figure A-2](#9781430242093_APP.xhtml#F2) is fine if this is all
    the information the school wants to keep, and that may very well be the case.
    However, if the school later decides that it wants to elaborate on tasks such
    as food preparation, or keep dates about availability, then the design will be
    difficult to amend. We are actually storing information about two things, People
    and Contributions, and the relationship between them (i.e., who can provide what
    and possibly when). A solution similar to that proposed in [Figure 2-1](#9781430242093_APP.xhtml#F2)
    for plants and uses would be a more general solution for this problem but it might
    not be worth the effort. There is always a tension between providing a good, cheap
    solution for the current problem and providing an extensible design which has
    the ability to evolve.


    Exercise 1-2


    a)  What problems can you foresee in making good use of the information in the
    database table in [Figure A-3](#9781430242093_APP.xhtml#F3)?


    ![9781430242093_APP01-03.tif](images/9781430242093_APP01-03_fmt.jpeg)


    [**Figure A-3.**](#9781430242093_APP.xhtml#FG3) *An initial database table to
    record roster duties*


    This table is based on a report that the user has envisaged. It will be handy
    to print out for a given month and place by the phone or on the wall. That is
    pretty much all it will be useful for, though, and it could just as easily have
    been written on a piece of paper. One additional piece of information that could
    be available from this data is a report for each person showing the days on which
    they are rostered. The data is there but it is not at all easy to extract it with
    this design. Once again, it is useful to think about the data rather than the
    output. We are keeping information about two things: people and days, and the
    relationships between them.


    b)  Suggest some better ways that this information could be stored.


    A table or spreadsheet similar to the one in [Figure A-4](#9781430242093_APP.xhtml#F4)
    would enable many more views of the data. We can filter by name to get the roster
    for a person or select particular weeks to get the same information, as in [Figure
    A-3](#9781430242093_APP.xhtml#F3).


