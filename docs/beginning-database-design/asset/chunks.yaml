- fmt: '# CHAPTER 2


    ## Guided Tour of the Development Process


    The decision to set up a small database usually arises because there is some specific
    task in mind: a scientist may have some experimental results that need safekeeping;
    a small business may wish to produce invoices and monthly statements for its customers;
    a sports club may want to keep track of teams and subscriptions.


    The important thing is not to focus solely on the immediate task at hand but to
    try to understand the data that are going to support that task *and other likely
    tasks*. This is sometimes referred to as `data independence`. In general, the
    fundamental data items (names, amounts, dates) that you keep for a problem will
    change very little over a long time. The values will of course be constantly changing,
    but not the fact that we are keeping values for names, amounts, and dates. What
    you do with these pieces of data is likely to change quite often. Designing a
    database to reﬂect the type of data involved, rather than what you currently think
    is the main use for the data, will be more advantageous in the long term.


    For example, a small business may want to send invoices and statements to its
    customers. Rather than thinking in terms of a statement and what goes on it, it
    is important to think about the underlying data items. In this case, these items
    are customers and their transactions. A statement is simply a report of a particular
    customer’s transactions over some period of time. In the long term, the format
    of the statement may change, for example, to include aging or interest charges.
    However, the underlying transaction data will be the same. If the database is
    designed to reﬂect the fundamental data (customers and transactions), it will
    be able to evolve as the requirements change. The type of data will stay the same,
    but the reports can change. We might also change the way data is entered (transactions
    might be entered through a web page or via e-mail), and we might find additional
    uses for the data (customer data might be used for mail–outs as well as invoicing).


    Arriving at a good solution for a database project requires some abstraction of
    the problem so that the possibilities become clear. In this chapter, we take a
    quick tour of how we will approach the process from initial problem statement,
    through an abstract model, to the final implementation of a (hopefully) useful
    application. The diagram in [Figure 2-1](#9781430242093_Ch02.xhtml#F1) is a useful
    way of considering the process.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-01_fmt.png)


    [**Figure 2-1.**](#9781430242093_Ch02.xhtml#FG1) The software process (based on
    Zelkowitz et al., 1979[¹](#9781430242093_Ch02.xhtml#fn1))


    Using [Figure 2-1](#9781430242093_Ch02.xhtml#F1) as a way of thinking about software
    processes, we will now look at how the various steps relate to setting up a database
    project by applying those steps to [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    “The Plant Database.”


    ### Initial Problem Statement


    We start with some initial description of the problem. One way to represent a
    description is with `use cases`, which are part of the `Unified Modeling Language`
    (`UML`),[²](#9781430242093_Ch02.xhtml#fn2) a set of diagramming techniques used
    to depict various aspects of the software process. Use cases are descriptions
    of how different types of users (more formally known as `actors`) might interact
    with the system. Most texts on systems analysis include discussions about use
    cases. (Alistair Cockburn’s book *Writing Effective Use Cases*[³](#9781430242093_Ch02.xhtml#fn3)
    is a particularly readable and pragmatic account.) Use cases can be at many different
    levels, from high–level corporate goals down to descriptions of small program
    modules. We will concentrate on the tasks someone sitting in front of a desktop
    computer would be trying to carry out. For a database project, these tasks are
    most likely to be entering or updating data, and extracting information based
    on that data.


    The UML notation for use cases involves stick figures representing, in our case,
    types of users, and ovals representing each of the tasks that the user needs to
    be able to carry out. For example, [Figure 2-2](#9781430242093_Ch02.xhtml#F2)
    illustrates a use case in which a user performs three as yet unknown tasks. However,
    those stick figures and ovals aren’t really enough to describe a given interaction
    with a system. When writing a use case, along with a diagram you should create
    a text document describing in more detail what the use case entails.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-02_fmt.png)


    [**Figure 2-2.**](#9781430242093_Ch02.xhtml#FG2) UML notation for use cases[⁴](#9781430242093_Ch02.xhtml#fn4)


    Let’s see how use cases can be applied to the problem from [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1)
    in the last chapter. [Figure 2-3](#9781430242093_Ch02.xhtml#F3) recaps where we
    started with an initial database table recording plants and their uses.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-03_fmt.jpeg)


    [**Figure 2-3.**](#9781430242093_Ch02.xhtml#FG3) Original data of plants and uses


    If we consider what typical people might want to do with the data shown in [Figure
    2-3](#9781430242093_Ch02.xhtml#F3), the use cases suggested in [Example 2-1](#9781430242093_Ch02.xhtml#ex2-1)
    would be a start.


    ### EXAMPLE 2-1. INITIAL USE CASES FOR THE PLANT DATABASE


    [Figure 2-4](#9781430242093_Ch02.xhtml#F4) shows some initial use cases for the
    plant database. The text following the figure describes each use case.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-04_fmt.png)


    [**Figure 2-4.**](#9781430242093_Ch02.xhtml#FG4) First attempt at use cases for
    the plant database


    **Use case 1:** Enter (or edit) all the data we have about each plant; that is,
    plant ID, genus, species, common name, and uses.


    **Use case 2**: Find or report information about a plant (or every plant) and
    see what it is useful for.


    **Use case 3**: Specify a use and find the appropriate plants (or report for all
    uses).


    As explained in the previous chapter, if the data is stored as in [Figure 2-3](#9781430242093_Ch02.xhtml#F3),
    we cannot conveniently satisfy the requirements of all the use cases in [Example
    2-1](#9781430242093_Ch02.xhtml#ex2-1). It is easy to get information about each
    plant (use case 2) by looking at each row in the table. However, finding all the
    plants that satisfy a particular use is extremely awkward. Have a go at finding
    all the plants suitable for firewood. You have to look in each of the use columns
    for every row.


    ### Analysis and Simple Data Model


    Now that we have an initial idea of where we are heading, we need to become a
    little abstract and form a model of what the problem is really about. In terms
    of [Figure 2-1](#9781430242093_Ch02.xhtml#F1), we are moving across the top of
    the diagram.'
