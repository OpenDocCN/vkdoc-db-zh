    ![9781430242093_Fig10-11.eps](img/9781430242093_Fig10-11_fmt.png)


    **图 10-11**. 使用集合操作查找关于选课问题的答案


    图 10-11 中展示的三种集合操作，分别向我们显示了那些选修了*两门*科目（`intersect`）、*任一门*科目（`union`）以及选修了 `COMP101`
    *但未*选修 `COMP102`（`except`）的学生。Oracle 使用关键字 `MINUS` 代替 `EXCEPT`。代码清单 10-14 展示了从原始真实表出发，检索这两个
    `studentID` 集合之并集的 SQL。


