    我们将有两个类，`Customer`和`Order`。每个客户将有自己的对象，每个订单也将有自己的对象。那么这两个对象之间的关系呢？让我们看看关系的“1”端。每个订单有一个关联的`Customer`对象。因为我们可以将复杂类型作为类中的属性，所以每个`Order`中可以有一个属性，它是对相应`Customer`对象的引用。图
    12-9 说明了这一点。


    ![9781430242093_Fig12-09.eps](img/9781430242093_Fig12-09_fmt.png)


    **图 12-9.** 每个`Order`对象包含一个对`Customer`对象的引用。


    `Order`对象中的这个引用与关系模型中的外键概念并非完全不同；不同之处在于，外键的引用指向表，应用程序必须找到关联的行。在面向对象环境中，引用直接指向相关的`Customer`对象。


    现在让我们考虑关系的“多”端。每个`Customer`对象有多个`Order`对象，我们也可以直接建立这种关联。我们可以在`Customer`类中包含一个`Order`引用的集合作为属性，如图
    12-10 所示。


    ![9781430242093_Fig12-10.eps](img/9781430242093_Fig12-10_fmt.png)


    **图 12-10.** 一个`Customer`对象有一个对其关联`Order`对象的引用集合。'
- fmt: '## 导航与关系表示


    我们可以选择在`Order`类中包含对`Customer`的引用（[Figure 12-9](#9781430242093_Ch12.xhtml#F9)），在`Customer`类中包含`Order`的集合（[Figure
    12-10](#9781430242093_Ch12.xhtml#F10)），或者两者都包含。决策将取决于我们希望如何在类之间*导航*。用例将指导我们。如果我们想知道特定客户下了哪些订单，就需要通过`Order`对象的集合，从`Customer`导航到`Orders`。如果有一个未收集的订单，而我们想知道客户的姓名，则需要通过`Customer`对象的引用，从`Order`导航到`Customer`。


    这与关系数据库有何不同？在关系数据库中，`Order`表中的每一行都有一个外键`customer`指向`Customer`表，但我们没有行之间的直接连接。如果需要来自`Customer`和`Order`表的信息，我们需要连接这两个表并创建一个新的虚拟表。那个表非常对称，我们能够从这个虚拟表中为特定订单查找客户，也能为特定客户查找订单。这非常有用。回想一下前一章，我们如何能够从一个虚拟表创建两个截然不同的报告——学生记录和班级列表。


    相比之下，在面向对象（OO）环境中，如果我们认为需要这些路径，就必须显式地提供两条路径。如果`Customer`中没有集合，我们就无法轻易找到特定客户的订单。如果在`Order`对象中没有对客户的引用，我们将没有直接的方法来找到合适的客户。然而，我们可以提供的直接链接对于在对象之间导航非常高效。


    ## 多对多关系的表示


    既然我们可以用对象集合来表示关系的“多”端，那么多对多（Many-Many）关系就可以直接表示。这与关系模型形成对比，在关系模型中，我们必须创建一个新的中间表来处理多对多关系。例如，在[Figure
    12-11](#9781430242093_Ch12.xhtml#F11)的模型中，植物（plants）和用途（uses）之间的多对多关系可以通过让每个`Plant`对象关联一个`Use`对象的集合，以及每个`Use`对象关联一个`Plant`对象的集合来表示。对象之间的关联是直接的；我们不需要额外的表，也不需要像关系模型那样执行两次连接。


    ![9781430242093_Fig12-11.tif](images/9781430242093_Fig12-11_fmt.jpeg)


    [**Figure 12-11.**](#9781430242093_Ch12.xhtml#FG11) 一个多对多关系


    你可能已经发现了其中的潜在问题。以客户和订单的例子为例。如果我们选择同时包含引用和集合，如[Figures 12-9](#9781430242093_Ch12.xhtml#F9)和[12-10](#9781430242093_Ch12.xhtml#F10)所示，我们可能存储了关于对象间关联的信息两次。一个特定的订单会在客户的订单集合中，同时客户引用也会与订单一起保存。现在有产生不一致性的风险。订单A可能在客户Smith的集合中，但订单A对象可能引用客户Green。如何管理这一点取决于你使用的软件。更多内容将在下一节中讨论。


    ## OO环境


    有许多开发平台使用面向对象的概念。许多现代编程语言（例如`VB .NET`、`C#`、`Java`、`C++`、`Python`）都基于类和对象。然而，使用这些语言来维护数据不一定容易。虽然它们提供了我们迄今为止讨论的所有概念，但当你尝试永久存储数据时，问题就来了。当你向关系数据库输入一行时，软件会自动负责将其保存到磁盘，以便在软件和计算机关闭并重新启动后数据仍然可用。这是*永久*或*持久*的数据。其他变量——计算的中间结果等——不会以这种方式保存，被称为*临时*数据。


    在OO编程语言中，程序员通常必须专门保存和检索关于对象的数据，而这并非易事。专门设计的OO数据库系统（例如Intersystems的`Cache`[¹](#9781430242093_Ch12.xhtml#fn1)和`JADE`[²](#9781430242093_Ch12.xhtml#fn2)）可以透明地处理对象的存储和检索。像`JADE`这样的系统允许你获取数据模型并定义类层次结构。可以指定类中对象之间的关系并自动维护。例如，前一节提到的关于`Order`和`Customer`对象之间引用不一致的问题就不会出现。如果从客户的集合中移除一个订单，`Order`对象中对该客户的引用将自动更新。


    一个良好的面向对象数据库产品提供了许多优势。它可以充分利用继承的全部能力，管理复杂类型，将方法与数据一起存储，并在相关对象之间提供非常高效的链接。然而（总是有个然而），关系模型最强大的方面之一是我们可以对表执行的操作集合，以检索复杂的数据子集，如[Chapter
    10](#9781430242093_Ch10.xhtml)所述：连接、并集、交集等。执行这些操作的`SQL`命令相对直接，并且是任何关系数据库系统不可或缺的一部分。但是，所有这些操作都是在表上定义的，在OO系统中没有直接的对应部分。目前正在大力开发面向对象数据库的标准和OO数据库查询语言[³](#9781430242093_Ch12.xhtml#fn3)。


    介于完整的OO数据库和关系数据库之间的一种折中方案是，使用OO编程语言连接到关系数据库。对象被转换为表中的行，然后可以利用关系数据库的全部数据管理能力进行存储和检索。在编程语言内部，可以使用`SQL`与数据库通信并插入和检索数据。诸如`Hibernate`[⁴](#9781430242093_Ch12.xhtml#fn4)之类的工具促进了这种对象关系映射的过程。然而，在执行对象和表之间的转换时，我们可能会失去针对数据对象的许多特定OO优势。


    ## 在电子表格中实现数据模型


    电子表格也许是桌面广泛可用的应用程序中最通用的之一。有许多产品可供选择，包括`Microsoft Excel`、`Open Office`和`Google
    Docs`。电子表格的流行源于能够打开工作表并立即开始输入数字和公式——无需声明变量或设计表。'
  raw: 'We can choose to include the reference to a Customer in the Order class ([Figure
    12-9](#9781430242093_Ch12.xhtml#F9)), the collection of Orders in the Customer
    class ([Figure 12-10](#9781430242093_Ch12.xhtml#F10)), or both. The decision will
    depend on which way we want to *navigate* between classes. The use cases will
    be our guide. If we want to know what orders a particular customer has placed,
    we need to navigate from Customer to Orders through the collection of Order objects.
    If we have an uncollected order and we want to know the name of the customer,
    we need to navigate from Order to Customer through the reference to the Customer
    object.


    How is this different from a relational database? In a relational database, each
    row in the Order table has a foreign key, customer, referring to the Customer
    table, but we do not have a direct connection between specific rows. If we want
    information from both Customer and Order tables, we need to join the two tables
    and create a new virtual table. That table is quite symmetric, and we are able
    to find customers for particular orders and orders for particular customers from
    this one virtual table. This is very useful. Recall from the previous chapter
    how we were able to create two very different reports, a student record and a
    class list, both from a single virtual table.


    By contrast, in an OO environment, we have to explicitly provide both paths if
    we think we will need them. If we don ’t have the collection in Customer, then
    we cannot easily find a particular customer ’s orders. If we don ’t have the reference
    to a customer in the Order objects, we would have no straightforward way of finding
    the appropriate customer. However, the direct links we can provide are very efficient
    for navigating between objects.


    Given that we can represent a Many end of a relationship with a collection of
    objects, Many–Many relationships can be represented directly. This is in contrast
    to the relational model, where we had to create a new intermediate table to handle
    Many–Many relationships. For example, in the model in [Figure 12-11](#9781430242093_Ch12.xhtml#F11),
    the Many–Many relationship between plants and uses can be represented by having
    a collection of Use objects associated with each Plant object and a collection
    of Plant objects associated with each Use object. The association between objects
    is direct; we do not need an additional table, nor do we need to perform two joins
    as in the relational model.


    ![9781430242093_Fig12-11.tif](images/9781430242093_Fig12-11_fmt.jpeg)


    [**Figure 12-11.**](#9781430242093_Ch12.xhtml#FG11) A Many–Many relationship


    You may have spotted the potential problem with all this. Take the example about
    customers and orders. If we choose to include both the reference and the collection
    as shown in [Figures 12-9](#9781430242093_Ch12.xhtml#F9) and [12-10](#9781430242093_Ch12.xhtml#F10),
    we are potentially storing information about an association between objects twice.
    A particular order will be in a customer ’s collection of orders, and a customer
    reference will be kept with the order. There is potential now for inconsistencies
    to arise. Order A may be in customer Smith ’s collection, but the Order A object
    may refer to customer Green. How this is managed depends on the software you are
    using. More about that in the next section.


    OO Environments


    There are numerous development platforms that use object–oriented concepts. Many
    modern programming languages (e.g., VB .NET, C#, Java, C++, Python) are based
    on classes and objects. However, it is not necessarily easy to use these languages
    to maintain data. While they provide all the concepts we have discussed so far,
    the problem comes when you try to store the data permanently. When you enter a
    row into a relational database, the software automatically takes care of saving
    it to disk so that it will be available after the software and the computer are
    shut down and restarted. This is *permanent*, or *persistent*, data. Other variables—intermediate
    results of calculations and so on—are not saved in this way and are known as *transient*
    data.


    In OO programming languages, the programmer usually has to specifically save and
    retrieve the data about objects, and this is not necessarily a trivial matter.
    Specially designed OO database systems (e.g., Cache from Intersystems[¹](#9781430242093_Ch12.xhtml#fn1)
    and JADE[²](#9781430242093_Ch12.xhtml#fn2)) can handle the storage and retrieval
    of objects transparently. A system like JADE allows you to take your data model
    and define a hierarchy of classes. The relationships between objects in the classes
    can be specified and are automatically maintained. For example, the problem mentioned
    in the previous section about inconsistent references between Order and Customer
    objects would not arise. If an order is removed from a customer ’s collection,
    the reference to that customer in the Order object will be automatically updated.


    A good object–oriented database product provides a great many advantages. It can
    employ the full power of inheritance, manage complex types, store methods with
    the data, and provide very efficient links between related objects. However (there
    is always a however), one of the most powerful aspects of the relational model
    is the set of operations that we can perform on tables to retrieve complex subsets
    of data, as described in [Chapter 10](#9781430242093_Ch10.xhtml): joins, unions,
    intersections, and so on. The SQL commands to carry out these operations are relatively
    straightforward and are an integral part of any relational database system. However,
    the operations are all defined on tables and have no direct counterpart in an
    OO system. There is much work in progress to develop a set of standards for object–oriented
    databases and to develop OO database query languages[³](#9781430242093_Ch12.xhtml#fn3).


    One compromise between a full OO database and a relational database is an OO programming
    language connecting to a relational database. Objects are converted to rows in
    a table, and then the full data management power of the relational database can
    be used for storage and retrieval. Within the programming language, it is then
    possible to communicate with the database and insert and retrieve data using SQL.
    Tools such as Hibernate[⁴](#9781430242093_Ch12.xhtml#fn4) facilitate this process
    of object relational mapping. In doing the transfer between objects and tables,
    however, we can lose many of the specific OO advantages with respect to our data
    objects.


    Implementing a Data Model in a Spreadsheet


    Spreadsheets are perhaps one of the most versatile of the applications widely
    available on the desktop. There are many products to choose from, including Microsoft
    Excel, Open Office, and Google Docs. The popularity of spreadsheets stems from
    the ability to open a sheet and start entering numbers and equations immediately—there
    is no need to declare variables or design tables.'
