- fmt: '# 数据库设计与实现


    经过几轮对用例和类图的评估，我们应该得到了一个初始的数据模型以及一套详细展示我们如何满足用户需求的用例。下一步是考虑什么类型的软件适合实现该项目。对于一个数据库项目，我们可以选择使用关系数据库产品（例如
    `MySQL` 或 `Microsoft Access`）、编程语言（例如 `Visual Basic` 或 `Java`），或者对于小型问题，电子表格（如
    `Microsoft Excel`）可能就足够了。


    以下是在关系数据库中进行设计的简要概述。我们将在[第7章](#9781430242093_Ch07.xhtml)到[第9章](#9781430242093_Ch09.xhtml)中更详细地考虑细节，因此如果您没有完全理解这里的推理，请不要惊慌。对于那些已经了解一些数据库设计的读者，请原谅这里的简化。


    ## 关系数据库设计概述


    从广义上讲，每个类将由一个数据库表表示。由于每个物种可以有多种用途，反之亦然，我们需要一个额外的表来表示这种关系。这对于两端基数都大于1的关系（称为多对多关系）通常是这种情况。（关于这些额外表的更多信息将在[第7章](#9781430242093_Ch07.xhtml)中介绍。）这些表在`Microsoft
    Access`中的样子如[图2-14](#9781430242093_Ch02.xhtml#F14)所示。三个表对应于[图2-12](#9781430242093_Ch02.xhtml#F12)中的类，而额外的表`PlantUse`为我们提供了一个存放植物物种与用途之间关系的地方（见[图2-7](#9781430242093_Ch02.xhtml#F7)和[图2-8](#9781430242093_Ch02.xhtml#F8)）。类之间的其他关系可以通过在四个表之间设置参照完整性在数据库中表示（更多关于此的内容在[第7章](#9781430242093_Ch07.xhtml)）。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-14_fmt.jpeg)


    [图 2-14.](#9781430242093_Ch02.xhtml#FG14) 在 `Microsoft Access` 中表示类和关系


    对于那些了解一些数据库设计的读者，我们在`Species`表中包含了一个属性`speciesID`，这是一个对每个物种唯一的数字。这种拥有一个属性（或可能是一个属性组合）来唯一标识每个对象的概念很重要，我们将在[第8章](#9781430242093_Ch08.xhtml)中进一步探讨。在关系数据库中，这些唯一标识符被称为*键字段*，它们在[图2-14](#9781430242093_Ch02.xhtml#F14)中用一个小钥匙图标表示。（我们本可以在`Use`和`Genus`表中也添加一个额外的`ID`字段，但由于名称是唯一的，我们选择不这样做。）我们还引入了一些额外的属性来帮助建立表之间的关系。对于`Species`表，我们包含了一个属性`genus`，并要求其值必须来自`Genus`表中的一个条目。（这个新属性在技术术语中被称为*外键*，而要求它匹配`Genus`表中现有值的规则被称为*参照完整性*——更多内容在[第7章](#9781430242093_Ch07.xhtml)。）`Genus`表和`Species`表之间的线表明`Species`表中的`genus`字段是一个外键，因此其值必须存在于`Genus`表中。这种设计意味着我们永远不必担心*桉树属*的不同拼写方式。类似地，我们在`PlantUse`表中包含了外键属性`use`和`plant`。


    ## 实现


    我们不会深入探讨如何在任何特定程序中实现数据库的复杂性，但从一般意义上了解分析将引导我们走向何方是有用的。[图2-12](#9781430242093_Ch02.xhtml#F12)中的数据模型可以在关系数据库产品（如`MySQL`或`Microsoft
    Access`）中非常准确地表示出来，如[图2-14](#9781430242093_Ch02.xhtml#F14)所示。实现的第一步是根据设计建立这些表和表示关系的外键，然后输入一些数据。[图2-15](#9781430242093_Ch02.xhtml#F15)显示了根据[图2-14](#9781430242093_Ch02.xhtml#F14)的设计建立的关系数据库表中将要包含的一些数据。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-15_fmt.png)


    [图 2-15.](#9781430242093_Ch02.xhtml#FG15) 植物数据库表中的示例数据


    我们现在已经实现了我们的设计，但仍然需要提供便捷的方式来维护和检索数据。这意味着我们必须提供表单和报告，以高效地满足我们修订后的用例集中的需求。


    ## 用于输入用例的界面


    我们需要为我们的植物系统用户提供一种友好的方式来输入他们的数据。维护属和用途数据的用例很容易处理。我们可以通常通过表单或网页等界面直接将数据输入到相应的表中。维护物种信息的用例则稍微复杂一些。我们需要更新两个表：`Species`（存放每个物种的数据）和`PlantUse`（因为我们需要指定每个物种与哪些用途相关联）。一些数据库工具有实用程序来方便同时向两个表输入数据，通常是通过表单。或者，我们可以有一个带有脚本的网页，将数据插入到相应的表中。


    [图2-16](#9781430242093_Ch02.xhtml#F16)显示了一个用于输入特定物种数据的非常基础的表单。它是使用`Microsoft Access`中的表单向导创建的。这个表单允许我们输入数据，这些数据最终将成为`Species`表中的一行和`PlantUse`表中的若干行（每个用途一行）。该表单还通过提供包含所有可能的`genus`或`use`对象的下拉列表，提供了建立物种与其属和用途之间关系的便捷方法。这是满足用例3（维护物种数据）要求的一种可能的解决方案，既准确又方便。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-16_fmt.png)


    [图 2-16.](#9781430242093_Ch02.xhtml#FG16) 一个满足维护物种数据用例的表单


    ## 用于输出用例的报告


    数据存储在不同的表中，数据库产品中的报告和查询功能使得提取（简单的）信息相当直接。我们现在不会深入探讨如何设置查询和报告的细节，但我们将看两个可能满足我们报告用例的报告。大多数优秀的报告生成器允许以各种方式选择、排序和分组数据。通过按`genus`或`use`分组，我们可以非常简单地提供信息来满足[图2-13](#9781430242093_Ch02.xhtml#F13)中的两个报告用例。[图2-17](#9781430242093_Ch02.xhtml#F17)显示了一个按用途分组的报告，显示了适用于每种用途的植物。该报告是使用`Access`报告向导中的默认选项非常简单地创建的。


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-17_fmt.jpeg)


    [图 2-17.](#9781430242093_Ch02.xhtml#FG17) 一个满足为特定用途提供合适植物信息用例的简单报告'
  raw: 'After a few iterations of evaluating the use cases and class diagrams, we
    should have an initial data model and a set of use cases that show in some detail
    how we intend to satisfy the requirements of the users. The next stage is to consider
    what type of software would be suitable for implementing the project. For a database
    project, we could choose to use a relational database product (such as MySQL or
    Microsoft Access), a programming language (for example, Visual Basic or Java),
    or for small problems maybe a spreadsheet (such as Microsoft Excel) will be sufficient.


    Here is a brief overview of how the design might be done in a relational database.
    We consider the details more thoroughly in [Chapters 7](#9781430242093_Ch07.xhtml)
    to [9](#9781430242093_Ch09.xhtml), so if you don’t follow all the reasoning here,
    don’t panic. For those readers who already know something about database design,
    please excuse the simplifications.


    In very broad terms, each class will be represented by a database table. Because
    each species can have many uses and vice versa, we need an additional table for
    that relationship. This is generally the case for relationships having a cardinality
    greater than 1 at both ends (known as Many–Many relationships). (There will be
    more about these additional tables in [Chapter 7](#9781430242093_Ch07.xhtml).)
    The tables are shown in [Figure 2-14](#9781430242093_Ch02.xhtml#F14) as they would
    look in Microsoft Access. Three tables correspond to the classes in [Figure 2-12](#9781430242093_Ch02.xhtml#F12)
    and the extra table, PlantUse, gives us somewhere to keep the relationships between
    plant species and uses ([Figures 2-7](#9781430242093_Ch02.xhtml#F7) and [2-8](#9781430242093_Ch02.xhtml#F8)).
    The other relationships between the classes can be represented within the database
    by setting referential integrity between the four tables (more about this in [Chapter
    7](#9781430242093_Ch07.xhtml)).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-14_fmt.jpeg)


    [**Figure 2-14.**](#9781430242093_Ch02.xhtml#FG14) Representing classes and relationships
    in Microsoft Access


    For those readers who know a bit about database design we have included an attribute
    speciesID in the Species table, which is a number unique to each species. This
    notion of having one attribute (or possibly a combination of attributes) that
    uniquely identifies each object is important, and we will look at it more in [Chapter
    8](#9781430242093_Ch08.xhtml). In a relational database, these unique identifiers
    are known as *key fields* and they are shown with a small key in [Figure 2-14](#9781430242093_Ch02.xhtml#F14).
    (We could also have added an extra ID field in the Use and Genus tables, but as
    the names are unique we have chosen not to do so.) We have also introduced some
    additional attributes to help create the relationships between the tables. For
    the Species table we have included an attribute, genus, and have insisted that
    its value must come from an entry in our table Genus. (This new attribute is referred
    to in technical jargon as a *foreign key*, and the insistence that it match an
    existing value in the Genus table is known as *referential integrity*—more about
    this in [Chapter 7](#9781430242093_Ch07.xhtml).) The line between the Genus and
    Species tables says that the genus field in the Species table is a foreign key
    and so must have a value that exists in the Genus table. This design means we
    won’t ever have to worry about different spellings of *Eucalyptus*. Similarly,
    we have included foreign key attributes, use and plant, in the PlantUse table.


    We have now done some analysis to understand the details of the problem and represented
    those details with use cases and a class diagram. We have also started a design
    for a relational product such as Access, SQL Server, or MySQL that represents
    our class diagram as tables. We can now think about implementing the database.


    Implementation


    We will not be going into the intricacies of how to implement a database in any
    particular program, but it is useful to see where the analysis is leading us in
    general terms. The data model in [Figure 2-12](#9781430242093_Ch02.xhtml#F12)
    can be represented very accurately in a relational database product such as MySQL
    or Microsoft Access as shown in [Figure 2-14](#9781430242093_Ch02.xhtml#F14).
    The first stage in the implementation is to set up these tables and the foreign
    keys that represent the relationships, and then input some data. [Figure 2-15](#9781430242093_Ch02.xhtml#F15)
    shows some of the data that would be in relational database tables set up according
    to the design in [Figure 2-14](#9781430242093_Ch02.xhtml#F14).


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-15_fmt.png)


    [**Figure 2-15.**](#9781430242093_Ch02.xhtml#FG15) Example data in tables for
    the plant database


    We have now implemented our design, but we still need to provide convenient ways
    to maintain and retrieve the data. This means we have to provide forms and reports
    that will efficiently satisfy the requirements in our revised set of use cases.


    Interfaces for Input Use Cases


    We need to provide the users of our plant system with a nice way to input their
    data. The use cases for maintaining genus and use data are easily taken care of.
    We can enter the data directly into the appropriate table usually via an interface
    such as a form or a web page. The use case for maintaining species information
    is a little trickier. We need to update two tables: Species (for the data about
    each species) and PlantUse (because we need to specify which uses each species
    is associated with). Some database products have utilities to facilitate the entry
    of data into two tables simultaneously, usually via a form. Alternatively, we
    might have a web page with a script to insert the data into the appropriate tables.


    [Figure 2-16](#9781430242093_Ch02.xhtml#F16) shows a very basic form for entering
    data about a particular species, It was created using the Form Wizard in Microsoft
    Access. This form allows us to enter data that will end up as one row in the Species
    table and several rows in the PlantUse table (one for each use for this particular
    species). The form also provides convenient ways to establish the relationships
    between a species and its genus and uses by providing drop–down lists that will
    contain each of the possible genus or use objects. This is one possible solution
    to satisfy the requirements of use case 3 (maintaining species data) in an accurate
    and convenient way.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-16_fmt.png)


    [**Figure 2-16.**](#9781430242093_Ch02.xhtml#FG16) A form to satisfy the use case
    for maintaining species data


    Reports for Output Use Cases


    With the data stored in separate tables, the reporting and querying facilities
    in database products make extracting (simple) information reasonably straightforward.
    We will not go into the detail of how to set up queries and reports now, but we
    will look at two possible reports that would satisfy our reporting use cases.
    Most good report generators allow the data to be selected, ordered, and grouped
    in various ways. By grouping on either genus or use, we can quite simply provide
    the information to satisfy the two reporting use cases from [Figure 2-13](#9781430242093_Ch02.xhtml#F13).
    [Figure 2-17](#9781430242093_Ch02.xhtml#F17) shows a report grouped by uses and
    shows the plants that are appropriate for each use. The report was created very
    simply using default options in the Access Report Wizard.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig02-17_fmt.jpeg)


    [**Figure 2-17.**](#9781430242093_Ch02.xhtml#FG17) A simple report satisfying
    the use case for providing information on plants suitable for a specific use'
