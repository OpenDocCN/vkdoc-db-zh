    synonym for a field on a farm, `paddock`.


    Let''s build up the class diagram and the associated tables slowly. To start,
    we need to keep information about each farm as well as about the paddocks on that
    farm. A possible class diagram is shown in Figure 9-1.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig09-01_fmt.jpeg)


    **Figure 9-1.** Farms and paddocks


    What will be a suitable primary key for the table representing the `Farm` class?
    Over time the name and owner may change, and in any case one person may own several
    farms, so the value of `owner` may not be unique. The farm is not going to shift,
    but the address may well change when roads are altered or boundaries change. An
    ID number seems the safest bet.


    What about paddocks? Each farmer probably has some numbering system for his own
    paddocks. Just considering the two classes in Figure 9-1, we could therefore set
    up two tables:'
