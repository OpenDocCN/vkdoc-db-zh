- fmt: '# Chapter 7


    ## Representing Inheritance


    Relational databases do not have the concept of inheritance built into them; however,
    it is possible to approximate the idea of inheritance.


    As discussed in [Chapter 6](#9781430242093_Ch06.xhtml), inheritance is very useful
    to model tricky problems, but it should only be used when other more simple patterns
    cannot fully represent some essential complications. [Figure 7-22](#9781430242093_Ch07.xhtml#F22)
    shows a simple case of inheritance in which lecturers and students inherit the
    attributes of a person and also have some specialized attributes of their own.


    ![9781430242093_Fig07-22.tif](images/9781430242093_Fig07-22_fmt.jpeg)


    [**Figure 7-22**](#9781430242093_Ch07.xhtml#FG22). Simple model with inheritance


    One way to capture the main aspects of inheritance in a relational database is
    to set up classes for each parent class and subclass and include a 1–1 relationship
    between each subclass and its parent as shown in [Figure 7-23](#9781430242093_Ch07.xhtml#F23).
    The relationships (reading upward) say that a lecturer `is a` person and a student
    `is a` person, which is a natural way to think about the model.


    ![9781430242093_Fig07-23.tif](images/9781430242093_Fig07-23_fmt.jpeg)


    [**Figure 7-23**](#9781430242093_Ch07.xhtml#FG23). Inheritance approximated with
    1–1 is a relationship


    The relationship between `Student` and `Person` in [Figure 7-23](#9781430242093_Ch07.xhtml#F23)
    is compulsory at the top end because every student is a person, but optional at
    the bottom end because a person does not have to be a student. We can now set
    up tables as we did for the 1–1 relationship in the previous section. We choose
    to put the foreign key (`personID`) in the `Student` table (because a student
    has to be a person) and similarly for the `Lecturer` table. `personID` will also
    be the primary key of the `Lecturer` and the `Student` tables. We will end up
    with three tables as shown in [Figure 7-24](#9781430242093_Ch07.xhtml#F24).


    ![9781430242093_Fig07-24.eps](images/9781430242093_Fig07-24_fmt.png)


    [**Figure 7-24**](#9781430242093_Ch07.xhtml#FG24). Tables representing the model
    in [Figure 7-23](#9781430242093_Ch07.xhtml#F23)


    What elements of the inheritance have we captured? Well, we have the contact details
    of each person in just one place—the `Person` table. We know who are lecturers
    and who are students, and we have the specialist attributes of each role neatly
    stored in the appropriate tables. As a special bonus, we have also managed to
    capture multiple inheritance! John and Linda feature in both the lecturer and
    the student tables.


    What is different from true inheritance? In the model in [Figure 7-23](#9781430242093_Ch07.xhtml#F23),
    we have just `one` object for Sue (a `Lecturer` object). In [Figure 7-24](#9781430242093_Ch07.xhtml#F24),
    we have `two` rows (a row in the `Person` table and a row in the `Lecturer` table)
    with a relationship between them. Extending the model is also different in the
    two cases. If, at a later date, we require an additional subclass (e.g., `Administrator`),
    this can be added quite simply to the hierarchy in [Figure 7-22](#9781430242093_Ch07.xhtml#F22).
    In [Figure 7-23](#9781430242093_Ch07.xhtml#F23), we would need to add another
    class but in addition also create and maintain another relationship.


    ## Summary


    We have taken a data model and represented the main features using the functionality
    available in relational database products. Following is a summary of the steps:


    1.  For each class, create a table.

    2.  For each attribute, create a field and choose an appropriate data type. Consider
    whether some attributes (e.g., `address`) should be split into several fields.

    3.  Think about which fields should be required to have a value.

    4.  Consider what constraints need to be placed on the values of fields. Possibly
    create a new domain if your database product supports this.

    5.  Choose a field or combination of fields as the primary key. Ask careful questions
    to ensure that the key fields will always have unique values.

    6.  For each Many–Many relationship, insert a new intermediary class and two 1–Many
    relationships.

    7.  For each 1–Many relationship, take the primary key field(s) from the table
    representing the class at the 1 end and add this field(s) as a foreign key in
    the table representing the class at the Many end.

    8.  For a 1–1 relationship, put the foreign key in the table where it is most
    likely to have a value or where the attribute is most important.

    9.  For compulsory relationships, add a constraint to the foreign key fields that
    they must not be `null`.

    10. For inheritance (an approximation), alter the model to have a 1–1 `is a` relationship
    between the parent and each child class. Create tables and foreign keys as in
    point seven.


    ## TESTING YOUR UNDERSTANDING


    Exercise 7-1.


    [Figure 7-25](#9781430242093_Ch07.xhtml#F25) shows an initial data model for a
    small library. It is incomplete, so as you answer the questions below consider
    what else might need to be included.


    a)  Explain to the librarian what the initial data model means.

    b)  Design tables for a relational database which would capture the information
    represented by the model. Include primary and foreign keys and other appropriate
    constraints.


    ![9781430242093_Fig07-25.tif](images/9781430242093_Fig07-25_fmt.jpeg)


    [**Figure 7-25**](#9781430242093_Ch07.xhtml#FG25). Draft data model for a small
    library


    # CHAPTER 8


    ![image](images/frontdot.jpg)


    ## Normalization


    We are doing pretty well at designing a database. So far, you have learned how
    use cases and a data model can help you understand many of the complexities of
    the problem you are trying to represent. In the previous chapter, you saw how
    to represent the main parts of the data model in a relational database. To recap:


    ```

    *   Each class is represented by a table.

    *   Each attribute is represented by a field with a datatype and possible constraints.

    *   Each object becomes a row in a table.

    *   For each table, we determine a primary key, which is a field(s) that uniquely
    identifies each row.

    *   We use the primary key field(s) to represent relationships between classes
    by way of foreign keys.

    ```'
  raw: 'In the Member table in [Figure 7-21](#9781430242093_Ch07.xhtml#F21), we have
    many empty values for the field is_captain_of because that end of the relationship
    is optional (a member doesn’t have to be a captain and most members won’t be).
    In general, you should put the foreign key in the table that has the compulsory
    association if there is one. A team *must* have a captain, so put the foreign
    key in the Team table.


    Putting the foreign key in the Team table ensures that each team only has one
    captain, however there is nothing to prevent a member being captain of more than
    one team (e.g., there is nothing currently in the design of the Team table to
    prevent us putting 199 on more than one row). With the foreign key in the Member
    table we have the opposite situation: a person can only captain one team but we
    could have JuniorA appearing on several rows, and so effectively having several
    captains. We will see how to enforce both constraints with unique indexes in [Chapter
    9](#9781430242093_Ch09.xhtml).


