    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-02_fmt.png)


    **图 4-2.** 与图 4-1 一致的对象和关系实例


    注意，`room` 104 是空的，这是数据模型所允许的（一个 `room` 不一定非要关联一个 `guest`）。既然我们已经以机械的方式解读了数据模型告诉我们的信息，让我们更深入地思考一下，这个模型就现实问题向我们揭示了什么，以及它是如何处理这个问题的。


    对于这家旅舍，`group`（团体）的定义是什么？我们在图 4-2 的示例数据中看到，`Boys High` 这个 `group` 由四个人组成。整个 `group`
    只有一个抵达日期和一个离开日期，并且只有一套适用于所有 `group` 成员的联系信息。在这方面，我们对 `group` 的定义与日常对话中我们可能预期的含义略有不同。它不是指一群彼此认识、感觉属于一体的人，而是指一群拥有相同抵达和离开日期以及共同联系信息的人。在大多数情况下，这个模型对于旅舍是适用的，但也会存在一些例外情况。如果
    `A. Taylor` 和 `W. Long` 需要比 `Boys High` `group` 提前一天离开，我们该怎么办？我们如何记录这条信息？`Taylor`
    或 `Long` 的 `Guest` 对象中没有存储日期的位置，而 `Boys High Group` 对象中只有一个存放离开日期的位置。在这个模型内，我们可以通过为
    `Taylor` 和 `Long` 创建另一个 `Group` 对象（比如叫 `Boys High Early Leavers`），并附上一组不同的日期来捕获这条信息。这样就能处理知道谁在何时来、何时走的问题。然而，如果系统有必要记录这两组
    `Boys High` 的人是某种意义上的“一起的”，那么数据就需要以不同的方式建模。


    数据模型还告诉我们，一个 `guest` *必须*属于一个 `group`。这又向我们揭示了关于 `group` 定义的哪些信息呢？对于一个希望住在旅舍的独自旅行者怎么办？鉴于旅舍主要是为团体设立的，这种情况不太常见，但模型可以容纳这种情况。我们可以有一个只包含一个
    `guest` 的 `group`。在这方面，这个数据库问题中 `group` 的定义再次与日常对话中这个词的用法不同。我们通常不会说“*一个人的团体*”；然而，对于这个数据模型来说，这是一种可能出现的情况。


    因此，我们最初的数据模型，乍一看相当简单，却已经就问题的处理方式告诉了我们很多信息。它引导我们得出了一个关于 `group` 的精确定义：


    *   一个 `group` 是一组具有共同联系信息以及相同抵达和离开日期的 `guest`。对于每组不同的抵达和离开日期，都需要组成一个独立的 `group`。一个
    `group` 可以关联一个或多个 `guest`。


    通过仔细定义 `Group` 类，我们避免了为拥有多组日期的 `group` 或独自旅行的 `guest` 设置特例的需要。这保持了问题和解决方案的简洁性。当然，如果大多数
    `guest` 都是独自旅行者，我们会重新思考问题，并以完全不同的方式来建模。


    在本章剩余部分，我们将探讨可以对数据模型的细小部分提出哪些问题，以便更深入地理解手头的问题。我们将要探讨的问题只适用于两个类之间的关系，但它们可以引发关于问题的大量讨论。随着对问题理解的加深，我们从数据模型中学到的东西可以反映在用例中。我们将考虑的问题如下：


    *   **可选性**：应该是 0 还是 1？

    *   **基数 1**：偶尔会是 2 吗？

    *   **基数 1**：历史数据怎么办？

    *   **多对多**：我们是否遗漏了什么？


    # 可选性：应该是 0 还是 1？


    如第 2 章所述，关系一端的可选性是指另一端可以与某个对象关联的对象的最小数量。这通常是 0 或 1。例如，在图 4-1 中，从左向右阅读 `guest`
    和 `room` 之间的关系，我们得到：一个特定的 `guest` *必须*关联一个 `room`（可选性为 1）；而从右向左阅读该关系，我们看到一个特定的
    `room` 可能没有相关的 `guest`（可选性为 0）。


    可选性可以提供大量关于类定义和问题范围的信息。我们将看几个小例子，每个例子都说明了决定适当可选性时需要考虑的某个方面。


    ## 学生选课示例


    考虑图 4-3 中的数据模型，它显示了 `student`（学生）和他们所注册的 `course`（课程）之间的关系。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig04-03_fmt.png)


    **图 4-3.** `student` 注册 `course` 的数据模型


    乍一看这相当简单：一个 `student` 可以注册许多 `course`，一个 `course` 可以有许多 `student` 注册。那么可选性呢？一个
    `student` 可以不注册任何 `course` 吗？我们在日常对话中对 `student` 的定义通常是正在学习的人，或者更准确地说，是正式注册了某个
    `course` 的人（这实际上很不一样！）。在这个数据库中，我们对 `student` 的定义是什么？虽然我已经很久不能被日常对话描述为 `student`
    了，但我确信我仍然出现在我母校的 `student` 数据库中。因此，就本例而言，我们可能将 `student` 定义为正在或曾经注册过某个 `course`
    的人。


    在我们的数据库中存在一个从未注册过任何 `course` 的“`student`”是否有意义呢？一个已被大学录取但尚未对任何具体 `course` 做出最终决定的人呢？这个人是
    `student` 吗？大学当然希望保存关于此人的信息（她的 `ID`、`name`、`address` 等）。我们可以通过扩展 `student` 的定义来容纳这种情况，将被大学录取和/或在大学注册的人包括在内。


    对于一个联系大学并要求发送注册信息的人呢？任何典型的资金紧张的机构都会希望保存关于此类人的信息。提出这个问题开始涉及问题范围以及 `student` 定义相关的问题。重要的是，在分析过程一开始就要考虑诸如“你们称为
    `student` 的这些人到底是谁？”这样的问题。系统是要包含曾表示有兴趣入读该大学的所有人的联系信息，还是（至少目前）将范围限制在当前和以往 `student`
    的记录上？


    显然，只有客户才能回答这些问题。我们可以看到，即使对最简单的数据模型的细节进行仔细考量，也能引出关于问题更广泛方面的关键问题，这是非常有用的。询问一个 `student`
    是否必须注册某个 `course` 一开始可能显得迂腐，但直到我们能清楚地回答这个问题之前，我们甚至还没有开始理解我们试图解决的问题。

