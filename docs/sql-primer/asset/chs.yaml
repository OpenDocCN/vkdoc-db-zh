- "# 前言\n\n#### 解释表\n\n关系数据库中的表本质上是一个二维数据矩阵，其中列描述数据类型，行包含待存储的实际数据。请查看表 1-1 以了解数据库中表的可视化形式。\n\
  \n表 1-1\n\n描述编程语言的表\n\n| ID | 语言 | 作者 | 年份 |\n| --- | --- | --- | --- |\n| 1 | Fortran\
  \ | Backus | 1955 |\n| 2 | Lisp | McCarthy | 1958 |\n| 3 | Cobol | Hopper | 1959\
  \ |\n\n上表存储了关于编程语言的数据。它由四列（`id`、`language`、`author` 和 `year`）和三行组成。数据库中列的正式术语是**字段**，行被称为**记录**。\n\
  \n**注意**\n\n本书中的示例表主要涉及编程语言、其作者以及创建年份。我们本可以使用数据库查询语言，但它们的数量要少得多。\n\n自 20 世纪 50 年代和\
  \ 60 年代以来，我们的计算机硬件和技术已经发生了很大变化，但那个时代的早期编程语言对今天的编程语言仍然有着持久的影响。Lisp——由约翰·麦卡锡于 1958\
  \ 年构想²——至今仍以 Common Lisp、Scheme 和 Clojure 的形式存在。甚至 Fortran 在科学计算中仍然被定期使用。\n\n示例表中有两点值得注意。第一点是\
  \ `id` 字段本身除了表示其在表中的顺序位置外，几乎不能提供任何关于编程语言的信息。第二点是，尽管我们可以通过查看字段名来理解它们，但我们还没有正式为它们分配数据类型，也就是说，我们还没有限制（至少目前还没有）一个字段应该包含字母、数字还是两者的组合。\n\
  \n这里的 `id` 字段充当了表中的**主键**。它使得表中的每条记录都是唯一的，其优势在后续章节中将变得更加清晰。但现在请思考一下，如果一种语言的创造者在同一年创造了两种语言；我们将很难精确地定位记录。`id`\
  \ 字段通常是一个很好的主键，因为它保证是唯一的，但并不限制使用其他字段来达到此目的。\n\n表的一个关键概念是它们本质上是概念性的，可能与实际存储数据的文件无关。当用户创建电子表格时，他们会将一个文件名与该电子表格关联起来，并将其放置在磁盘上的某个位置。但关系数据库对用户隐藏了所有这些细节。表在磁盘上的物理存储可能对应单个文件，或多个文件，甚至可能是多个表存储在单个文件中的关系。你的数据库管理系统有责任提供读写表的方法。\n\
  \n#### SQL 中的数据类型\n\n就像编程语言一样，SQL 也有数据类型，用于定义其字段中将存储何种数据。在上面的表中，我们可以看到字段 `language`\
  \ 和 `author` 必须存储英文字符。`id` 和 `year` 字段都存储整数。\n\n你在后续章节中会遇到的常用数据类型如表 1-2 所示。\n\n\
  表 1-2\n\nSQL 中的各种数据类型\n\n| 字符类型 | `char`, `varchar` |\n| --- | --- |\n| 整数值 | `integer`,\
  \ `smallint` |\n| 小数 | `numeric`, `decimal` |\n| 日期数据类型 | `date` |\n\n一串字符通常存储在\
  \ `char` 或 `varchar` 中。前者在你指定字段时会保留你所需的空间，但如果你存储的值较短，剩余的空间就会被浪费。然而，`varchar` 代表可变长度字符，将精确占用字符串的长度，没有浪费。不过，你可以为这类字段分配的字符串值的最大长度是有限制的，这个限制在字段定义时指定。\n\
  \n```\nchar(12)\nvarchar(12)\n```\n\n如果你存储值 'McCarthy'（8 个字符长），`char` 会存储它但会浪费四个字符的空间。`varchar`\
  \ 会精确地将其存储为八个字符，但这种动态性是以速度为代价的。尽管如此，速度差异非常小，以至于在大多数情况下，你会看到使用可变字符数据类型。\n\n对于数值，我们主要分为两大类——`integer`\
  \ 用于存储整数，`numeric` 用于存储带小数点的数值。它们所能存储的值的范围和限制因你选择的数据库管理系统而异。然而，一个好的经验法则是使用能够满足应用程序当前和可预见未来需求的最小数据类型。\n\
  \n例如，如果我要存储学生学号，使用 `smallint` 就很合适。在大多数实现中，这种数据类型允许的最大值为 32767，我预计这个数字在任何班级中都远大于学生人数。\n\
  \n小数点的指定更为复杂。我们使用 `numeric` 数据类型来固定数字可以有多大以及小数点后可以有多少位数字。\n\n```\nnumeric(精度, 标度)\n\
  numeric(5, 2)\n```\n\n总位数由 `精度` 指定，小数点后的位数由 `标度` 表示。因此，在给定的示例中，我们将能够存储像 999.99 这样的数字，但不能再大。\n\
  \n由于数据类型因数据库管理系统的实现而异，我建议你手边常备你的数据库管理系统手册。每种实现都为你提供了许多其他类型可供使用，但出于我们的学习目的，以上这些应该足够了。\n\
  \n**脚注** 1\n\nCodd, E. F.; “大型共享数据库的关系模型,” Communications of the ACM, vol 13, no\
  \ 6, June 1970, [`https://www.seas.upenn.edu/~zives/03f/cis550/codd.pdf`](https://www.seas.upenn.edu/%7Ezives/03f/cis550/codd.pdf)\n\
  \n2\n\nMcCarthy, John; “符号表达式的递归函数及其机器计算，第一部分,” Communications of the ACM, vol 3,\
  \ issue 4, April 1960, [`http://jmc.stanford.edu/articles/recursive/recursive.pdf`](http://jmc.stanford.edu/articles/recursive/recursive.pdf)\n\
  \n### 2. 准备你的数据库\n\n学习 SQL 的最佳方法是在真实的关系数据库管理系统上练习编写命令。在本书中，SQL 将使用以下系统之一进行教授：PostgreSQL\
  \ 或 SQLite。选择这些数据库管理系统的原因很简单——它们是免费且开源的，并且在大多数主要平台上可用。PostgreSQL 是一个功能齐全的企业级数据库管理系统，拥有庞大的社区。SQLite\
  \ 是一个小型但健壮的系统，特别适合学习目的。如果你对软件安装不熟悉，请选择后者。\n\n然而，任何你能接触到的关系数据库产品都应该能满足你的需求。在某些情况下，你可能已经在你的组织中拥有访问权限，但请务必申请将其用于学习目的的许可。不同供应商之间可能存在微小的不兼容性，因此，如果你在阅读本书时选择其他系统进行练习，最好手边备有该数据库供应商的用户手册。\n\
  \n由于本文主要以独立于产品的方式教授 SQL，而不是教授特定的数据库管理系统，因此有关安装和特定产品操作的细节将保持在最低限度。相反，重点放在几个特定的步骤上，这些步骤将帮助你尽快开始编写\
  \ SQL。\n\n\n\n#### 使用 PostgreSQL\n\n本书撰写时，PostgreSQL 的最新版本是 9.6。你并不一定需要最新版本；实际上，我在本文中使用的版本是\
  \ 9.5。\n\n你可以从 [`https://www.postgresql.org/download/`](https://www.postgresql.org/download/)\
  \ 下载适用于你平台的 PostgreSQL 最新版本。为了最快、最简单的安装，我建议你从“二进制包”列表中选择你的平台。预编译的二进制文件意味着你可以像安装其他任何软件一样，通过图形化的分步安装程序下载并安装\
  \ PostgreSQL。\n\n选择平台后，你可能仍然会看到多种安装方式。我建议选择来自 BigSQL 或 EnterpriseDB 等第三方供应商的图形化安装程序版本。我为我的\
  \ Fedora Linux 机器选择了 EnterpriseDB 安装程序，当我运行下载的文件时，一个友好的安装过程就会弹出，询问诸如安装目录之类的详细信息（图\
  \ 2-1）。\n\n![A457348_1_En_2_Fig1_HTML.jpg](img/A457348_1_En_2_Fig1_HTML.jpg)\n\n\
  **图 2-1**  \nEnterpriseDB PostgreSQL 安装向导\n\n系统还会询问其他一些细节，最重要的是端口号和密码。端口号的默认值 `5432`\
  \ 应该就足够了。安装完成后，你的系统上将拥有一个名为 `postgres` 的用户以及一个可用的数据库安装。\n\n你可以使用 `psql` 来快速验证一切是否顺利，这是一个用于与你的\
  \ PostgreSQL 安装交互的命令行实用程序。我在下面捕获了来自我系统的命令和输出（清单 2-1）。\n\n```\n[~]$ /opt/PostgreSQL/9.5/bin/psql\
  \ -U postgres\npsql.bin (9.5.8)\nType \"help\" for help.\npostgres=#\n```\n**清单\
  \ 2-1**  \n启动 `psql` shell\n\n如果你得到类似的输出，那么你就可以开始使用你的 PostgreSQL 安装了。如果没有，恐怕你得自己做一些排查了。你也可以选择\
  \ SQLite，它将在下一节讨论，其安装过程要容易得多。\n\n#### 使用 SQLite\n\n如果安装 PostgreSQL 看起来很困难，那么你很幸运。有一个非常可靠、免费的替代数据库供你练习。它叫做\
  \ SQLite，其创建者 D. Richard Hipp 将其慷慨地许可在公共领域。你可以从项目页面下载：[`https://www.sqlite.org/download.html`](https://www.sqlite.org/download.html)\n\
  \n和上一节一样，为了最快开始，你需要寻找与你操作系统对应的预编译二进制文件。SQLite 非常小巧；在大多数平台上，其核心引擎不到一兆字节！\n\n如果你使用的是\
  \ Microsoft Windows，你需要查找标题为“Precompiled Binaries for Windows”的部分。下载 SQLite DLL\
  \ zip 归档文件，名称类似于 `sqlite-dll-win32-x86-xxxxxxx.zip`，它包含了 SQLite 但没有交互方式。为此，你必须下载\
  \ SQLite shell，名称类似于 `sqlite-tools-win32-x86-xxxxxxx.zip`，这将允许我们通过命令行创建和查询 SQLite\
  \ 数据库。\n\n将这两个归档文件解压到同一个目录中，就完成了 SQLite 的安装。你的文件夹现在应该至少包含三个文件：\n\n*   `sqlite3.dll`\n\
  *   `sqlite3.def`\n*   `sqlite3.exe`\n\n最后一个文件是用于与 SQLite 数据库交互的命令行 shell。\n\n如果你使用的是\
  \ Linux 或 MacOS X 系统，很可能你已经安装了 SQLite。为了测试这一点，你可以尝试启动 SQLite shell `sqlite3`（清单\
  \ 2-2）。\n\n```\n[~]$ sqlite3\nSQLite version 3.13.0 2016-05-18 10:57:30\nEnter \"\
  .help\" for usage hints.\nConnected to a transient in-memory database.\nUse \".open\
  \ FILENAME\" to reopen on a persistent database.\nsqlite>\n```\n**清单 2-2**  \n启动\
  \ `sqlite3` shell\n\n如果你得到如上所示的输出，那么你就拥有了运行 SQLite 所需的一切。或者，如果你收到错误消息，则意味着你需要自己安装它。你可以使用类似的平台预编译二进制方法，或者使用系统安装程序。\n\
  \n对于像 Red Hat Enterprise Linux、Scientific Linux 和 CentOS 这样的系统，你可以使用 `yum` 来安装 SQLite。\n\
  \n```\n# yum install sqlite\n```\n\n在 Fedora Linux 系统上，你必须使用 `dnf`，如下所示。\n\n```\n\
  # dnf install sqlite\n```\n\n如果你恰好使用基于 Debian 或 Ubuntu 的系统，你可以通过以下方式实现相同的结果。\n\n\
  ```\n$ sudo apt-get install sqlite3\n```\n\n安装完成后，你可以像之前一样通过启动 SQLite shell 来验证安装。\n\
  \n#### 创建你自己的数据库\n\n像 PostgreSQL 这样的数据库管理系统允许你创建多个数据库。出于练习目的，建议创建你自己的数据库，这样你就可以自由地对其进行任何操作。\n\
  \n大多数数据库系统在提供数据库创建设施的方式上有所不同。PostgreSQL 通过提供多种方式来实现这一点，包括通过 `pgAdmin III` 图形化工具。然而，出于教学目的，我们将改用命令操作来创建我们的数据库。打开\
  \ `psql` shell 并输入如下命令（清单 2-3）。\n\n```\nCREATE DATABASE testdb;\n```\n**清单 2-3**\
  \  \n在 PostgreSQL 中创建数据库\n\n命令 `CREATE DATABASE` 用于创建一个数据库，该数据库将作为你表的容器。在上面显示的示例和输出中，我们创建了一个名为\
  \ `testdb` 的数据库供我们使用。你连接 `psql` 时使用的登录用户（在大多数情况下是 `postgres`）现在就是此数据库的所有者，并完全控制其中的实体。这类似于在操作系统中创建文件，创建者获得完全访问控制权，并可以选择授予其他用户和组特定的权限。\n\
  \n根据 SQL 标准的定义，允许以大小写不敏感的方式编写命令和关键字。在本书中，我们将在语句中使用大写字母来编写它们，这是一种被广泛接受的实践。\n\n> **注意**\n\
  >\n> 奇怪的是，SQL 标准并不包含 `CREATE DATABASE` 命令。在 1992 年的标准（恰当地命名为 SQL-92）中，有一个 `CREATE\
  \ SCHEMA` 命令与前者接近但不完全相同。\n>\n> 然而在现代，像 MySQL 这样的数据库将这两个命令视为彼此的同义词。\n\n如果你使用的是 SQLite，请启动命令\
  \ shell，你会看到一条打印版本信息的欢迎文本（清单 2-4）。这与我们之前在验证 SQLite 安装时看到的信息完全相同。\n\n```\nSQLite\
  \ version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\nConnected\
  \ to a transient in-memory database.\nUse \".open FILENAME\" to reopen on a persistent\
  \ database.\nsqlite>\n```\n**清单 2-4**  \n打开 SQLite shell\n\n在这里，我们输入 `.open` 命令来创建\
  \ SQLite 数据库，或者在它已存在时打开它。\n\n```\nsqlite> .open testdb\n```\n\n在 Linux 系统上，你也可以简单地在\
  \ SQLite shell 命令后写上数据库名称，如下所示，这样你就能够打开指定的数据库。\n\n```\nsqlite3 testdb\n```\n\n有趣的是，这种调用方式不会创建\
  \ `testdb`，它只是在数据库存在时打开它。如果你不执行任何其他操作并关闭 shell（`Ctrl-D`），那么在 Linux 上你的机器上将不会有 `testdb`\
  \ 文件。在 Windows 系统上，你将得到一个长度为 0 字节的空文件。\n\n\n#### 表创建\n\n我们已经探索了关系模型中表的概念。现在是时候使用标准的\
  \ SQL 命令 `CREATE TABLE` 来创建一个表了（参见清单 2-5）。\n\n```sql\nCREATE TABLE \n( ,\n ,\n\\\
  . \\. \\.\n );\n```\n清单 2-5\nCREATE TABLE 语句的通用语法\n\n这是能为你创建一个表的最简单的有效语句，不包含任何额外选项。随着学习的深入，我们会进一步探讨子句和约束，但现在让我们使用这个通用语法来实际创建我们在第\
  \ 1 章介绍的编程语言表（参见清单 2-6）。\n\n```sql\nCREATE TABLE proglang_tbl (\nid        INTEGER,\n\
  language  VARCHAR(20),\nauthor    VARCHAR(25),\nyear      INTEGER);\n```\n清单 2-6\n\
  创建编程语言表\n\n我们必须在 PostgreSQL 的 `psql` shell 中输入此命令。注意，当我们启动 shell 时，光标等待的最后一行看起来像下面这样：\n\
  \n```\npostgres=#\n```\n\n这实际上意味着我们连接到了名为 `postgres` 的数据库，这是 PostgreSQL 安装时出于管理目的内部使用的数据库。我们已经创建了我们自己的数据库。在创建表之前，让我们使用\
  \ `\\c` 切换到那个数据库（参见清单 2-7）。\n\n```\npostgres=# \\c testdb\nYou are now connected\
  \ to database \"testdb\" as user \"postgres\".\ntestdb=#\n```\n清单 2-7\n在 psql 中连接到不同的数据库\n\
  \n注意，最后一行的文本已经改变，指示了我们当前连接的数据库。现在你可以输入清单 2-6 中给出的建表语句，如果你没有遗漏任何重要的标点符号或拼错大写的关键字，你的表就会被创建，shell\
  \ 将简单地回复：\n\n```\nCREATE TABLE\ntestdb=#\n```\n\n一个不成功的命令会产生一个带有有用解释的错误。为了实际看到这一点，让我们再次运行完全相同的建表命令。现在\
  \ shell 会响应：\n\n```\nERROR:  relation \"proglang_tbl\" already exists\n```\n\n这个语句本身足够简单，因为它类似于清单\
  \ 2-5 的通用语法。有趣的是字段所选的数据类型。为了简单起见，`id` 和 `year` 都被指定为 `INTEGER`，尽管有更好的替代方案。`language`\
  \ 字段被分配了 20 个字符的空间来存储编程语言的名称，而 `author` 字段可以容纳 25 个字符来存储创建者的姓名。\n\n最后的英文分号是 SQL\
  \ 语句的分隔符，它标记着一个语句的结束。\n\n如果你使用的是 SQLite，语句与清单 2-6 完全相同。唯一的区别是，由于 SQLite 数据库是一个特定的文件，并且你在打开\
  \ SQLite shell 时就已经打开了它，因此不需要切换数据库（参见清单 2-8）。\n\n```\n[~]$ sqlite3 testdb\nSQLite\
  \ version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\nsqlite>\
  \ CREATE TABLE proglang_tbl (\n...> id        INTEGER,\n...> language  VARCHAR(20),\n\
  ...> author    VARCHAR(25),\n...> year      INTEGER);\nsqlite>\n```\n清单 2-8\n在 SQLite\
  \ 中创建编程语言表\n\n注意，这里没有操作成功的消息。如果一切顺利，SQLite shell 只是继续运行。为了做些实验，如果我们尝试再次创建相同的表，我们会得到一个错误信息：\n\
  \n```\nError: table proglang_tbl already exists\n```\n\n这又是一个有帮助且更友好的错误消息。\n\n####\
  \ 插入数据\n\n我们刚刚创建的表是空的，所以我们现在的任务是向其中插入一些示例数据。为了以行的形式填充这些数据，我们使用 DML 命令 `INSERT`，其通用语法如下（参见清单\
  \ 2-9）。\n\n```sql\nINSERT INTO \nVALUES ('Value1', 'Value2', ...);\n```\n清单 2-9\n\
  INSERT INTO TABLE 的通用语法\n\n只要记住我们要插入行的表的结构，将一些示例值套用到这个通用语法中是非常简单的。为了像我们在第 1 章看到的那样向\
  \ `proglang_tbl` 填充行，我们需要使用三个如下的 `INSERT` 语句（参见清单 2-10）。\n\n```sql\nINSERT INTO\
  \ proglang_tbl\nVALUES (1, 'Fortran', 'Backus', 1955);\nINSERT INTO proglang_tbl\n\
  VALUES (2, 'Lisp', 'McCarthy', 1958);\nINSERT INTO proglang_tbl\nVALUES (3, 'Cobol',\
  \ 'Hopper', 1959);\n```\n清单 2-10\n向 proglang_tbl 表插入数据\n\n如果你没有从 `psql` 或 `sqlite3`（或你选择的\
  \ DBMS 的 SQL 接口）收到任何错误，那么你已经成功地向你的表中插入了三行数据。注意我们是如何仔细地将字段的顺序保持为与我们创建表时所使用的顺序一致的。这种严格的顺序限制可以被移除，我们稍后会看到如何实现这一点。\n\
  \n如果你在 `psql` 中运行了这三条语句，每条语句执行完毕后，你会收到一条类似下面的消息：\n\n```\nINSERT 0 1\n```\n\n表示成功。\n\
  \n\n#### 编写你的第一个查询\n\n现在，让我们将注意力转向编写一个简单的查询，以验证我们之前操作的结果——我们创建了一个表并向其中插入了三行数据。为此，我们将使用一种名为\
  \ `SELECT` 的数据查询语言（DQL）命令。\n\n查询就是一个 SQL 语句，它允许你检索数据库中包含的有用数据子集。你可能已经注意到，`INSERT`\
  \ 和 `CREATE TABLE` 命令被称为语句，但使用 `SELECT` 进行的获取操作属于查询范畴。\n\n在 SQL 环境中，你日常的大部分操作将涉及查询，因为数据库结构只需创建一次（仅在需要时修改），并且只有在新数据可用时才插入行。虽然一个典型的\
  \ `SELECT` 查询相当复杂，包含许多子句，但我们的旅程将从编写一个仅用于验证表内容的查询开始。一个简单查询的通用语法如下所示（见清单 2-11）。\n\n\
  ```sql\nSELECT  FROM ;\n```\n*清单 2-11*\n*简单 SQL 查询的通用语法*\n\n将其转化为我们的结果验证查询是一项简单的任务（见清单\
  \ 2-12）。我们已经知道想要查询的表是 `proglang_tbl`，对于我们的选择，我们将使用 `* (星号)`，它将选择表中的所有行和字段。\n\n```sql\n\
  SELECT * FROM proglang_tbl;\n```\n\n此查询的输出将是我们预期的矩阵格式的所有 (3) 行数据。如果你通过 `psql` 运行此命令，将会得到类似下面的输出。\n\
  \n```sql\ntestdb=# select * from proglang_tbl;\nid | language |  author  | year\n\
  ----+----------+----------+------\n1 | Fortran  | Backus   | 1955\n2 | Lisp    \
  \ | McCarthy | 1958\n3 | Cobol    | Hopper   | 1959\n(3 rows)\ntestdb=#\n```\n*清单\
  \ 2-12*\n*在 psql 中验证表的内容*\n\nSQLite 的输出一开始可能稍显杂乱，但让我们一步一步来优化它（见清单 2-13）。\n\n```sql\n\
  sqlite> select * from proglang_tbl;\n1|Fortran|Backus|1955\n2|Lisp|McCarthy|1958\n\
  3|Cobol|Hopper|1959\nsqlite>\n```\n*清单 2-13*\n*在 sqlite3 中验证表的内容*\n\n显然这不是最整洁的输出，但设置几个选项就能解决这个问题。第一个选项叫做：\n\
  \n```\n.mode column\n```\n\n这将输出一个间距整齐的结果集，而不是我们之前看到的挤压在一起的样子（见清单 2-14）。\n\n```sql\n\
  sqlite> .mode column\nsqlite> select * from proglang_tbl;\n1           Fortran \
  \    Backus      1955\n2           Lisp        McCarthy    1958\n3           Cobol\
  \       Hopper      1959\n```\n*清单 2-14*\n*开启列模式*\n\n啊，好多了！但这里还有改进的空间。我们看到输出中仍然缺少列标题，而拥有标题会很有帮助。于是我们开启\
  \ headers 选项，结果开始看起来相当整洁了（见清单 2-15）。\n\n```sql\nsqlite> .headers on\nsqlite> select\
  \ * from proglang_tbl;\nid          language    author      year\n----------  ----------\
  \  ----------  ----------\n1           Fortran     Backus      1955\n2         \
  \  Lisp        McCarthy    1958\n3           Cobol       Hopper      1959\n```\n\
  *清单 2-15*\n*在 sqlite3 中开启标题显示*\n\n我建议你在学习过程中保持这些选项开启。这样输出结果会变得更容易一眼看清。\n\n#### 约束条件的好处\n\
  \n关系型数据库作为数据存储和组织机制，其主导地位已经进入了第四个十年。其成功在很大程度上归功于数据模型的灵活性。很容易想象各种数据都能整齐地放入带有预定义列的表格结构中。\n\
  \n这种灵活性也延伸到了查询方面——在创建和填充表时，对于你能从表中查询什么几乎没有限制。你可能会尝试从一个你以前没有想到的角度，从表中产生全新的见解。为了实现这一切，关系型数据库期望你在设计表时，预先投入一定量的规范和思考。整洁、定义良好的数据类型表是成功的关键，而某些规则有助于你遵循这条良好数据库设计的道路。\n\
  \n约束是你在进行 SQL 操作时应用或遵守的规则。当你希望使数据库中的数据更有意义和/或更有结构时，它们非常有用。\n\n##### 空值约束\n\n考虑编程语言表的例子——每一个被创造出来的编程语言都必须有作者（无论是个人、两人还是委员会）。同样，它应该有一个被引入的年份，无论是它首次作为研究论文出现的年份，还是为其编写了可用编译器的年份。在这种情况下，以某种方式创建你的表，使得某些字段不接受\
  \ `NULL`（空）值，是有意义的。\n\n空值并不意味着 `0`（零）或像 `''` 这样的空字符串。可以将其理解为“空”或“未定义”。如果你在填充表时没有捕获某人的年龄，你不能假设他们的年龄是\
  \ `0`。如果有人使用这些数据进行统计分析，这可能会产生严重的后果。在那里放置一个空值则合理得多。\n\n现在我们修改之前的 `CREATE TABLE` 语句，以便可以对某些字段应用\
  \ `NULL` 约束（见清单 3-1）。\n\n```sql\nCREATE TABLE proglang_tblcopy (\nid        INTEGER\
  \     NOT NULL,\nlanguage  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\n\
  year      INTEGER     NOT NULL,\nstandard  VARCHAR(10) NULL);\n```\n*清单 3-1*\n*创建带有空值约束的表*\n\
  \n在这个表中，我们只允许 `standard` 字段有空值。其他每个字段都以 `NOT NULL` 选项结尾，这指定了该字段必须有一个值。在大多数数据库管理系统中，所有字段默认都是可为空的，因此你必须指定一个不可为空的字段。写\
  \ `NULL` 字词来指定一个可为空的字段是可选的。\n\n如果我们尝试向这个表中插入一行数据，并在某个不可为空的字段（如 `year`）中使用 `NULL`\
  \ 值，我们预期会收到一条错误信息。在 SQLite 和 PostgreSQL 中，我们都使用字面量 `null` 来表示空值，注意这里没有通常包围字符串的引号（见清单\
  \ 3-2 和 3-3）。`Null` 不是一个字符串值，写 `'null'` 会产生一个实际长度为 4 的字符串，这显然不是空值。其他数据库管理系统可能以不同的方式表示空值，因此请查阅你的手册了解详细信息。\n\
  \n```sql\nsqlite> INSERT INTO proglang_tblcopy\nVALUES (1, 'Fortran', 'Backus',\
  \ null, 'ANSI');\nError: NOT NULL constraint failed: proglang_tblcopy.year\n```\n\
  *清单 3-2*\n*在 SQLite 中插入空值*\n\n```sql\ntestdb=# INSERT INTO proglang_tblcopy\nVALUES\
  \ (1, 'Fortran', 'Backus', null, 'ANSI');\nERROR:  null value in column \"year\"\
  \ violates not-null constraint\nDETAIL:  Failing row contains (1, Fortran, Backus,\
  \ null, ANSI).\n```\n*清单 3-3*\n*在 PostgreSQL 中插入空值*\n\n我们看到，在这种情况下，我们实现了目标：创建了一个表，其中\
  \ `id`、`language`、`author` 和 `year` 字段对于任何行都不能为空，但新字段 `standard` 可以取空值。现在，我们尝试使用另一种\
  \ `INSERT` 语法向此表中插入新行。\n\n\n\n#### 选择字段 INSERT\n\n从我们上次接触`INSERT`语句开始，我们看到必须按照表创建时指定的顺序来提供要插入的数据。现在，我们将了解另一种变体，它允许我们克服这一限制，并通过根本不指定字段来处理插入其字段中包含\
  \ NULL 值的行（参见清单 3-4）。虽然这种方法最初可能看起来有些冗长，但其优势很快就超过了任何与语句长度相关的顾虑。\n\n```\nINSERT INTO\
  \ table_name\n(field1,\n field2,\n . . .\n)\nVALUES\n(value1,\n value2,\n . . .\n\
  );\n```\n*清单 3-4 选择字段插入的通用语法*\n\n由于我们在语句本身中指定了字段顺序，因此我们可以自由地在同一个语句中重新排序值序列，从而消除了第一个限制。此外，如果我们希望在一条记录的任何字段中输入空（NULL）值，只需在语句的第一部分不包含该字段的名称，即可轻松实现。只要这些字段没有附加`NOT\
  \ NULL`约束，语句就可以在不指定任何您希望省略的字段的情况下正常运行。\n\n我们现在为`proglang_tblcopy`表编写一些`INSERT`语句，尝试插入一些未被任何组织标准化的语言和一些已被标准化的语言（参见清单\
  \ 3-5）。\n\n```\nINSERT INTO proglang_tblcopy\n(id, language, author, year, standard)\n\
  VALUES\n(1, 'Prolog', 'Colmerauer', '1972', 'ISO');\n\nINSERT INTO proglang_tblcopy\n\
  (id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\n\nINSERT INTO\
  \ proglang_tblcopy\n(id, year, standard, language, author)\nVALUES\n(3, '1964',\
  \ 'ANSI', 'APL', 'Iverson');\n```\n*清单 3-5 向 proglang_tblcopy 表插入新数据*\n\n当您通过 SQL\
  \ 界面运行此命令时，三行新数据将被插入表中。请注意第三行的顺序；它与我们创建表时使用的序列不同。此外，由于 Perl（行 id 2）尚未被国际机构标准化，因此我们在执行`INSERT`操作时不指定字段名本身。这确保了该行的`standard`字段填充为\
  \ null。\n\n为了验证这些语句的结果（表 3-1）并确保正确的数据进入了正确的字段，我们像之前一样运行一个简单的查询。\n\n**表 3-1 在 proglang_tblcopy\
  \ 上运行查询的结果**\n\n| id | language | author | year | standard |\n| --- | --- | ---\
  \ | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987\
  \ | |\n| 3 | APL | Iverson | 1964 | ANSI |\n\n```\nSELECT * FROM proglang_tblcopy;\n\
  ```\n\nSQL 接口通常使用空格、问号（?）或有时甚至是单词'null'或'(null)'来显示空值。由于供应商之间没有标准化，每个实现可以自由选择其表示方式。\n\
  \n#### 检查约束\n\n数据必须有意义，人们才能从中获得见解。关系数据库的一大优势是它们能够实现良好的数据结构、基于适当数据类型的存储和空值规则。检查约束更进一步，通过验证特定字段中允许的值来加强数据完整性。\n\
  \n它们允许您提供一个逻辑表达式，插入的值会根据该表达式进行测试，然后被接受或拒绝。例如，假设我们希望确保在我们的编程语言表中，语言创建年份不能小于或等于 1950（参见清单\
  \ 3-6）。这将阻止有人输入像 190 这样的年份值，除非我们想捕捉罗马帝国时期创建的编程语言，否则这是有意义的！\n\n```\nCREATE TABLE\
  \ proglang_constraints (\nid        INTEGER     NOT NULL,\nlanguage  VARCHAR(20)\
  \ NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\nyear      INTEGER     NOT NULL\n \
  \           CHECK (year > 1950),\nstandard  VARCHAR(10) NULL);\n```\n*清单 3-6 为年份字段创建检查约束*\n\
  \n请注意年份字段的完整定义，它在`NOT NULL`约束之后定义了检查约束。我们用于测试的逻辑表达式是`year > 1950`，它禁止任何包含小于 1951\
  \ 的年份值的行。让我们尝试输入这样一行来测试这个假设（参见清单 3-7）。\n\n```\ntestdb=# INSERT INTO proglang_constraints\n\
  (id, language, author, year)\nVALUES\n(1, 'Short Code', 'Mauchly', 1949);\nERROR:\
  \  new row for relation \"proglang_constraints\" violates check constraint \"proglang_constraints_year_check\"\
  \nDETAIL:  Failing row contains (1, Short Code, Mauchly, 1949, null).\n```\n*清单\
  \ 3-7 尝试违反检查约束*\n\n虽然这是一个未被充分利用的功能，但检查约束非常有用。许多应用软件代码的目的是验证要插入的数据，而检查约束可以在这方面提供巨大帮助。\n\
  \n\n#### 主键约束\n\n关系数据模型背后的数学概念是集合论。这个离散数学的分支处理无序的值包，这些包中的值可以被唯一标识，即不包含重复项。对于一个表而言，一个值是一条数据记录，而用记录中的一个键列来识别它是完美的方式。\n\
  \n主键通过强制某个字段的值唯一，从而至少以一种方式确保每条记录是唯一的。主键不一定限于一个字段；字段的组合也可以被定义为表的主键。在选择某个字段或其组合作为主键时，必须仔细考虑其逻辑含义。\n\
  \n通常，最佳的主键候选者并非我们直觉中的标识符。如果你存储的是关于人的数据，他们的名字是我们在现实生活中识别他们的方式。但在主键这个不容犯错的世界里，如果两个人都叫‘David\
  \ Childs’会发生什么？\n\n在我们的编程语言表中，`id`字段是应用主键约束的一个好选择。我们现在将修改`CREATE TABLE`语句来加入这个约束（参见代码清单\
  \ 3-8）。\n\n```\nCREATE TABLE proglang_tbltmp (\nid        INTEGER     NOT NULL \
  \ PRIMARY KEY,\nlanguage  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\n\
  year      INTEGER     NOT NULL,\nstandard  VARCHAR(10) NULL);\n```\n代码清单 3-8\n包含主键的`CREATE\
  \ TABLE`语句\n\nID 字段通常被选作主键。注意在这个特定的表中，`language`字段也可以工作，因为语言名称是唯一的。但是，如果我们有一个描述人的表，我们应该尝试找到一个逻辑上唯一的字段，比如他们的\
  \ SSN 号码或员工 ID 号码。\n\n尽管主键的概念看起来自然且必要，但大多数数据库实现并没有真正强制执行它。这包括本书中用于示例的两个数据库——PostgreSQL\
  \ 和 SQLite。你可以自由地创建一个没有任何主键的表（就像我们在本节之前所做的那样），并一遍又一遍地插入完全重复的数据。这不是理想的情况，但如果你愿意，仍然是允许的。\n\
  \n让我们在本章开头使用的`proglang_tblcopy`表中添加一些重复的行（参见代码清单 3-9）。\n\n```\nINSERT INTO proglang_tblcopy\n\
  (id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\nINSERT INTO\
  \ proglang_tblcopy\n(id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\n\
  ```\n代码清单 3-9\n在没有主键的表中插入重复数据\n\n请注意，表中原本已有三条唯一的行，我们又添加了两条重复的行。`INSERT`语句的执行是静默的，表示成功。现在让我们验证表的内容（表\
  \ 3-2）。\n\n表 3-2\n在`proglang_tblcopy`上运行查询的结果，显示重复的行\n\n| id | 语言 | 作者 | 年份 | 标准\
  \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
  | 2 | Perl | Wall | 1987 |  |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 2 | Perl |\
  \ Wall | 1987 |  |\n| 2 | Perl | Wall | 1987 |  |\n\n```\nSELECT * FROM proglang_tblcopy;\n\
  ```\n\n如果我们尝试在包含主键约束的表——`proglang_tbltmp`中添加重复记录，我们立刻会收到一个错误（代码清单 3-10）。\n\n```\n\
  INSERT INTO proglang_tbltmp\n(id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall',\
  \ '1987');\nERROR:  duplicate key value violates unique constraint \"proglang_tbltmp_pkey\"\
  \nDETAIL:  Key (id)=(2) already exists.\n```\n代码清单 3-10\n尝试添加违反主键约束的重复记录\n\n####\
  \ 唯一键约束\n\n唯一键像主键一样，也用于使表中的每条记录唯一。一旦你定义了表的主键，任何你希望强制为唯一的其他字段都通过此约束来完成。经过深思熟虑的唯一性约束对于确保表中的数据健全大有帮助。\n\
  \n例如，在我们的数据库中，现在对`language`字段设置唯一键约束是有意义的（代码清单 3-11）。这将确保即使`id`字段不同，也不会有任何记录重复关于同一编程语言的信息。\n\
  \n```\nCREATE TABLE proglang_tbluk (\nid        INTEGER     NOT NULL  PRIMARY KEY,\n\
  language  VARCHAR(20) NOT NULL  UNIQUE,\nauthor    VARCHAR(25) NOT NULL,\nyear \
  \     INTEGER     NOT NULL,\nstandard  VARCHAR(10) NULL);\n```\n代码清单 3-11\n带有唯一键约束的编程语言表\n\
  \n我们现在将尝试插入两条关于 Prolog 语言的行，巧妙地更改`id`字段来测试我们的唯一约束（代码清单 3-12）。\n\n```\ntestdb=# INSERT\
  \ INTO proglang_tbluk\n(id, language, author, year, standard)\nVALUES\n(1, 'Prolog',\
  \ 'Colmerauer', 1972, 'ISO');\nINSERT 0 1\ntestdb=# INSERT INTO proglang_tbluk\n\
  (id, language, author, year, standard)\nVALUES\n(2, 'Prolog', 'Colmerauer', 1972,\
  \ 'ISO');\nERROR:  duplicate key value violates unique constraint \"proglang_tbluk_language_key\"\
  \nDETAIL:  Key (language)=(Prolog) already exists.\n```\n代码清单 3-12\n在带有唯一键约束的表中插入重复数据\n\
  \n注意，我们在字段前写了`UNIQUE`这个词，并在表创建命令中省略了`KEY`。你可以根据需要为任意多的字段应用唯一约束。\n\n我们将在第 15 章讨论索引时再次回顾唯一键和主键约束。\n\
  \n#### 主键与唯一键的区别\n\n你可能已经注意到上述两种约束在用途上是相似的。然而，它们之间有一些区别。\n\n1.  主键字段不能取`NULL`值，而具有唯一约束的字段可以。然而，由于约束的定义要求每个值必须是唯一的，因此只能有一条这样的记录。\n\
  2.  你被允许只为一个表定义一个主键约束，但你可以对任意多的字段应用唯一约束。\n\n根据我的经验，这是任何涉及 SQL 的工作最喜欢的面试问题之一。考虑到这些约束对逻辑数据模型的重要性，这并不太不公平。只需记住将主键视为`NOT\
  \ NULL UNIQUE`约束。\n\n主键确保了一种区分表中行的逻辑方式。它是区分记录的最低标准。唯一约束通常作为附加规则添加，以在考虑业务或领域规则的同时确保数据健全。虽然没有它们也可以，但它们扮演着守门人的角色，只允许好的数据通过。\n\
  \n### 4. 表操作\n\n表是关系世界中的基本存储容器。一个数据库通常包含许多表，每个表代表一个实体的集合。随着需求的发展，数据库中的表也会发展，数据库管理员（DBA）经常对单个表执行管理操作，比如删除它们或更改它们的定义。虽然典型的数据库用户没有被授予在大型生产数据库上执行此类操作的权限，但出于教学目的，熟悉它们仍然很重要。\n\
  \n你可能已经注意到，每当我们引入一个新概念时，我们都在不断创建新表。这产生了并非理想的后果，即我们的数据库中充斥着许多类似的表，每个表都保存着编程语言数据，但定义和约束略有不同。我们现在将着手删除不需要的表并修改现有的表以满足我们的需求。\n\
  \n\n#### 删除表\n\nSQL 中删除表是通过`DROP TABLE`命令实现的。`DROP`实际上是一个顶级的 SQL 命令，与`CREATE`非常相似，它可以对多种数据库对象执行删除操作。要删除一个表，我们只需在命令后加上数据库对象类型——在本例中是`TABLE`。\n\
  \n我们现在将删除在之前的课程中创建的所有多余表（见清单 4-1）。请注意，删除表意味着删除该表及其内部的所有数据，且无法恢复。因此，在编写`DROP`命令时要格外小心。\n\
  \n```\nDROP TABLE proglang_tbl;\nDROP TABLE proglang_tblcopy;\nDROP TABLE proglang_constraints;\n\
  DROP TABLE proglang_tbltmp;\n清单 4-1\n删除我们创建的临时表\n```\n\n如果没有返回错误，就意味着表已被删除。`DROP\
  \ TABLE`通常只支持一次删除单个表，但有一些巧妙的方法可以用一条语句删除多个表。\n\n要验证表是否确实已被删除，你有两种选择。一个简单的方法是针对该表编写任意查询，你会收到一个类似`Error:\
  \ no such table: proglang_tbl`的错误。另一种方法是从数据库目录中获取当前存在的表的列表，这是 DBMS 内部用来跟踪用户创建的数据库、表和其他对象的一个数据库。在\
  \ SQLite 中查询目录以获取表列表极其简单（见清单 4-2）。\n\n```\nsqlite> .tables\nproglang_tbluk\n清单 4-2\n\
  在 SQLite 中列出存在的表\n```\n\n在 PostgreSQL 中做同样的事情稍微复杂一些，但它是针对目录数据库的一个`SELECT`查询（见清单\
  \ 4-3）。\n\n```\ntestdb=# SELECT table_name\nFROM information_schema.tables\nWHERE\
  \ table_schema = 'public'\nAND table_type = 'BASE TABLE';\ntable_name\n\nproglang_tbluk\n\
  (1 row)\n清单 4-3\n在 PostgreSQL 中列出存在的表\n```\n\n如果这个查询对你来说显得复杂，那是因为它包含了我们尚未讲解的部分和语法。不过请放心，到查询章节结束时，这些语法就会变得完全合理了。目前我们可以推断，PostgreSQL\
  \ 中的表数据存储在`information_schema.tables`这个目录表中。\n\n#### 从现有表创建新表\n\n你可能已经注意到我们删除了`proglang_tbl`表，现在我们手上只剩下`proglang_tbluk`表，它包含所有必要的约束和字段。后者的名称是在我们讨论唯一键约束时选择的，但现在将该表结构（以及任何相应数据）迁移回`proglang_tbl`这个名称似乎是合乎逻辑的。我们通过组合使用`CREATE\
  \ TABLE`和`SELECT`命令来创建一个表的副本，并在此过程中学习一个新的子句——`AS`（见清单 4-4）。这个组合有一个特别容易记住的名字——CTAS，它在\
  \ SQL:2003 标准中被引入，但并非所有 DBMS 系统都实现了它，尤其是 Microsoft SQL Server。\n\n```\nCREATE TABLE\
  \ <new_table_name>\nAS\nSELECT <column_list> FROM <existing_table_name>;\n清单 4-4\n\
  从现有表创建新表的通用语法\n```\n\n由于我们的`proglang_tbluk`只包含一条记录，我们将向其中插入一些示例数据，以便稍后验证记录本身是否被复制。注意，我们显式地给出了字段名，否则第二行（不包含标准字段值）在\
  \ SQLite 中会产生类似这样的错误：\n\n```\nsqlite> INSERT INTO proglang_tbluk\nVALUES\n(2, 'Perl',\
  \ 'Wall', 1987);\nError: table proglang_tbluk has 5 columns but 4 values were supplied\n\
  ```\n\n许多其他 DBMS，如 Ingres，也不会接受这种随意的插入数据方式。然而，PostgreSQL 会接受这样的语句，前提是它能够明确地插入数据——在本例中，由于省略的值只是最后一个可为空的字段，因此它是可以处理的。我建议尽可能显式地编写列名。我们将在清单\
  \ 4-5 中遵循这一明智的建议。\n\n```\nINSERT INTO proglang_tbluk (id, language, author, year)\n\
  VALUES (2, 'Perl', 'Wall', '1987');\nINSERT INTO proglang_tbluk (id, year, standard,\
  \ language, author)\nVALUES (3, '1964', 'ANSI', 'APL', 'Iverson');\n清单 4-5\n向 proglang_tbluk\
  \ 表插入更多数据\n```\n\n为了创建现有表的精确副本，我们使用与之前所见相同的选择条件——`*`（星号）。这将从现有表中选择所有字段，并用它们以及任何记录来创建新表（见清单\
  \ 4-6）。通过修改选择条件，也可以只使用旧表中字段的子集，我们稍后会看到这一点。\n\n```\nCREATE TABLE proglang_tbl\nAS\n\
  SELECT * FROM proglang_tbluk;\n清单 4-6\n从现有表重新创建一个新表\n```\n\n如果你使用的是`psql`，你会看到提示符显示`SELECT\
  \ 3`，这表明有多少行被选中并插入到新表中。我们现在运行一个简单的`SELECT`查询来看看我们的目标是否达成（见表 4-1）。\n\n**表 4-1** 在`proglang_tbl`上运行的查询结果\n\
  \n| id | language | author | year | standard |\n| --- | --- | --- | --- | --- |\n\
  | 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |  |\n| 3 | APL\
  \ | Iverson | 1964 | ANSI |\n\n```\nSELECT * FROM proglang_tbl;\n```\n\n这两个表现在完全相同，但彼此之间没有任何关联。如果你删除其中任何一个表，另一个都不会受到影响。同样地，从现在起，在其中一个表中插入新数据也不会将数据插入到另一个表中。\n\
  \n\n#### 修改表\n\n在创建表后，你仍然可以使用 `ALTER TABLE` 命令（代码清单 4-7）来修改其结构。所谓修改，是指你可以更改字段类型、大小，甚至添加或删除列。并非所有的数据库管理系统都支持\
  \ `ALTER TABLE` 的所有操作。为了绕过这些限制，人们经常将数据复制到具有新结构的新表中。虽然修改表不是一个你会经常使用的 SQL 命令（希望如此！），但你应该熟悉它。\n\
  \n在修改表时，有一些规则你必须遵守，这些规则通常会由你所使用的 DBMS 手册详细说明。现在，我们将看一个简单的例子，来修改 `proglang_tbl` 表中的\
  \ `author` 字段。\n\n```\nALTER TABLE   ;\nListing 4-7\nALTER TABLE 命令的通用语法\n```\n\n\
  为了保持我们的 `proglang_tbl` 不变，我们将对旧的 `proglang_tbluk` 表进行更改。我们希望 `author` 字段能容纳稍多一点的最大数据长度，即\
  \ 30 个字符，而不是 25 个。在这种情况下，我们要选择的操作是 `ALTER COLUMN`，它将修改我们现有的字段（代码清单 4-8）。\n\n```\n\
  ALTER TABLE proglang_tbluk\nALTER COLUMN author TYPE varchar(30);\nListing 4-8\n\
  修改 author 字段\n```\n\n如果你没有使用 SQLite，上面的查询在 PostgreSQL 中应该能安静地执行。不幸的是，SQLite 不支持修改列大小，但它愉快地支持添加新列。所以让我们增加另一个需求，向我们的表字段中添加一个可为空的\
  \ `current_status` 列（代码清单 4-9）。\n\n```\nALTER TABLE proglang_tbluk\nADD COLUMN current_status\
  \ VARCHAR(32) NULL;\nListing 4-9\n添加一个新的 current_status 字段\n```\n\n在这种情况下，我们对 `ALTER\
  \ TABLE` 命令使用了 `ADD COLUMN` 操作。不出所料，我们希望用这条语句向我们的 `proglang_tbluk` 中添加这个新的 32 字符长度的列。\n\
  \n##### ALTER TABLE 的多种形式\n\n修改表是那种即使过了三十年，仍然存在差异的命令之一。例如，你已经看到 `ALTER COLUMN` 在\
  \ SQLite 中不起作用。另一个 DBMS Ingres 要求你只写 `ALTER`，这碰巧在 PostgreSQL 中也能正常工作。我们选择前者是为了更明确。另一方面，Oracle\
  \ 走了一条完全不同的路，它使用 `MODIFY` 而不是 `ALTER COLUMN`。\n\n类似地，在添加列时，在 PostgreSQL 或 SQLite\
  \ 中你可以只写 `ADD <列名>`，并期望它能工作。\n\n然而，在修改数据类型时，PostgreSQL 期望你在列名和新的数据类型说明之间写上 `TYPE`，而\
  \ Ingres 则不期望这样。\n\n请务必随身携带你的 DBMS 手册！\n\n#### 在 PostgreSQL 中显示表信息\n\n如果你正在考虑使用数据库系统目录来获取表定义信息以验证你的\
  \ `ALTER TABLE` 结果，恭喜你！你确实想对了。和以前一样，查询可能看起来有点复杂，在本文的这个阶段可能难以完全掌握，但它的输出高度可读（代码清单\
  \ 4-10）。\n\n```\ntestdb=# SELECT column_name,\ndata_type,\ncharacter_maximum_length\n\
  FROM INFORMATION_SCHEMA.COLUMNS\nWHERE table_name = 'proglang_tbluk';\ncolumn_name\
  \   |     data_type     | character_maximum_length\n----------------+-------------------+--------------------------\n\
  id             | integer           |\nlanguage       | character varying |     \
  \                  20\nauthor         | character varying |                    \
  \   30\nyear           | integer           |\nstandard       | character varying\
  \ |                       10\ncurrent_status | character varying |             \
  \          32\n(6 rows)\nListing 4-10\n通过查询目录在 PostgreSQL 中查看字段信息\n```\n\n我们对 `author`\
  \ 和 `current_status` 字段的修改似乎都得到了正确的反映。还有其他一些数据库可以使用这样的查询，但不幸的是，这也是一个不同 DBMS 实现差异很大的领域。\n\
  \n一个 PostgreSQL `psql` 特有的方法是使用 `\\d+ <表名>`，默认情况下它会提供几乎相同的信息以及一些其他值（代码清单 4-11）。我个人更喜欢查询目录的代码清单\
  \ 4-10 版本。\n\n```\ntestdb=# \\d+ proglang_tbluk;\nTable \"public.proglang_tbluk\"\
  \nColumn       |         Type          | Modifiers | Storage  |\n---------------+-----------------------+-----------+----------+\n\
  id            | integer               |           | plain    |\nlanguage      |\
  \ character varying(20) |           | extended |\nauthor        | character varying(30)\
  \ |           | extended |\nyear          | integer               |           |\
  \ plain    |\nstandard      | character varying(10) |           | extended |\ncurrent_status\
  \ | character varying(32) |           | extended |\nIndexes:\n\"proglang_tbluk_pkey\"\
  \ PRIMARY KEY, btree (id)\n\"proglang_tbluk_language_key\" UNIQUE CONSTRAINT, btree\
  \ (language)\nListing 4-11\n在 psql 中描述表的模式\n```\n\n#### 在 SQLite 中显示表信息\n\n正如我们已经讨论过的，在撰写本文时，SQLite\
  \ 不支持使用 `ALTER TABLE` 来修改表中列的大小。然而，它确实允许你添加一个新列，并且我们像在 PostgreSQL 中一样添加了 `current_status`\
  \ 字段。现在让我们通过查看 SQLite shell 内部的表信息来验证这一点。\n\nSQLite 有自己的特殊点语法命令，允许执行某些有用的数据库管理任务。我们已经见过用于创建和打开数据库的\
  \ `.open` 命令，以及用于列出表名的 `.tables` 命令。类似地，我们可以使用 `.schema` 命令来获取表信息（代码清单 4-12）。\n\n\
  ```\nsqlite> .schema proglang_tbluk\nCREATE TABLE proglang_tbluk (\nid         \
  \    INTEGER     NOT NULL  PRIMARY KEY,\nlanguage       VARCHAR(20) NOT NULL  UNIQUE,\n\
  author         VARCHAR(25) NOT NULL,\nyear           INTEGER     NOT NULL,\nstandard\
  \       VARCHAR(10) NULL,\ncurrent_status VARCHAR(32) NULL);\nListing 4-12\n在 SQLite\
  \ 中显示模式信息\n```\n\n注意新列是如何被添加到末尾的，而 `author` 字段的长度仍然是 25 个字符。\n\n#### 在其他 DBMS 中显示表信息\n\
  \n如果你没有在上述两种 DBMS 实现上进行练习，可能还有其他方法来验证表字段级别的信息。例如，Ingres 使用 `HELP TABLE <表名>` 命令，可以在它的\
  \ `isql` shell 中运行。\n\n许多其他 DBMS，如 Oracle，使用 `DESCRIBE` 命令来查看表定义。虽然这个命令显示的信息可能因\
  \ DBMS 而异，但它们至少会显示字段名、其数据类型以及该字段是否允许 NULL 值。该命令的通用语法如下所示（代码清单 4-13）。\n\n```\nDESCRIBE\
  \ ;\nListing 4-13\nDESCRIBE 语句的通用语法\n```\n\n### 5. 编写基础查询\n\n查询是一种 SQL 语句，用于从你的数据库中提取数据子集，并以可读的格式呈现。正如我们之前看到的，`SELECT`\
  \ 命令用于在 SQL 中运行查询。你可以向查询中添加子句以获取经过筛选的、更有意义的结果。SQL 提供的灵活性是它作为查询语言取得成功的原因之一。虽然 `SELECT`\
  \ 有一系列完整的附加功能，但在本章中，我们将只关注其中两个——`ORDER BY` 和 `WHERE`。\n\n对于一个经过深思熟虑的模式，数据库管理任务很少且间隔很长，但使用查询检索有意义的结果是每个人例行都会做的事情。由于对数据库的大多数操作都涉及查询，因此详细理解它们非常重要。虽然本章只涉及在单个表上运行的查询，但你可以在一条语句中对多个表运行\
  \ `SELECT` 操作。\n\n#### 选择有限数量的列\n\nSQL 自始至终的意图是为日常用户提供一个易于使用的查询系统。他们不应该为了使其报告可读而求助于编程语言。实现这一点的一个主要功能是能够在输出中显示有限的列集合，而不是表中的所有字段。\n\
  \n我们在前几章验证结果时已经看到了如何从表中提取所有数据。但正如你可能在我们的一些目录查询中注意到的——我们也可以提取数据的一个子集。我们首先通过限制查询输出中显示的字段数量来进行测试，方法是指定字段名作为一个逗号分隔的列表，而不是\
  \ `*` 选择标准（清单 5-1）。\n\n| language | year |\n| --- | --- |\n| Prolog | 1972 |\n|\
  \ Perl | 1987 |\n| APL | 1964 |\n\n```sql\nSELECT language, year FROM proglang_tbl;\n\
  ```\n\n清单 5-1：从表中选择字段的子集\n\n你可以看到，我们构建的查询指定了我们希望看到的字段，即 `language` 和 `year`。同时请注意，这个查询的结果本身就是一个有用的报告，用于查看编程语言创建的年代顺序。虽然这不是\
  \ SQL 或关系数据库管理系统强制执行的规则，但以这样的方式构建查询是有意义的：如果输出旨在供人阅读，其含义应该是不言自明的。这就是我们在查询中省略 `id`\
  \ 字段的原因，因为它对读者来说没有内在意义，除非他们希望了解表中记录存储的顺序。\n\n你可以自由决定输出中字段的顺序。`CREATE TABLE` 语句中字段的定位对你运行在该表上的任何\
  \ `SELECT` 查询都没有影响。实际上，你甚至可以在输出中自由地多次复制一个字段。这样做是否有意义是有争议的！但只要 `SELECT` 的逗号分隔列表中的字段名是有效的，它就会显示在输出中。\n\
  \n#### 对结果排序\n\n你可能已经注意到，在我们之前的查询输出中，语言是按照我们插入它们的相同顺序打印出来的。但是，如果我们想按语言创建的年份对结果进行排序呢？如果我们希望查看几十年来编程语言的发展，按时间顺序排列可能更有意义。在这种情况下，我们借助\
  \ `ORDER BY` 子句。为了实现我们的目的，我们通过添加这个子句来修改查询（清单 5-2）。\n\n| language | year |\n| ---\
  \ | --- |\n| APL | 1964 |\n| Prolog | 1972 |\n| Perl | 1987 |\n\n```sql\nSELECT\
  \ language, year FROM proglang_tbl ORDER BY year;\n```\n\n清单 5-2：ORDER BY 子句的用法\n\
  \n细心的读者会注意到，我们的 `ORDER BY` 子句输出是升序的。这是默认的排序方式，可以通过在希望排序的列后附加参数 `ASC` 来显式指定。要反转这个顺序，我们在\
  \ `ORDER BY` 子句中使用参数 `DESC`，如下所示（清单 5-3）。\n\n| language | year |\n| --- | --- |\n\
  | Perl | 1987 |\n| Prolog | 1972 |\n| APL | 1964 |\n\n```sql\nSELECT language, year\
  \ FROM proglang_tbl ORDER BY year DESC;\n```\n\n清单 5-3：使用带 DESC 参数的 ORDER BY 子句\n\
  \n排序不仅限于数字字段。你也可以对基于字符的列进行排序。排序方法是从第一个字符开始按字母顺序排列，如果字符相同，则依次移动到下一个字符。这次让我们尝试按 `language`\
  \ 字段对查询结果进行排序（清单 5-4）。\n\n| language | year |\n| --- | --- |\n| APL | 1964 |\n|\
  \ Perl | 1987 |\n| Prolog | 1972 |\n\n```sql\nSELECT language, year FROM proglang_tbl\
  \ ORDER BY language;\n```\n\n清单 5-4：对基于字符的列使用 ORDER BY 子句\n\n#### 使用字段缩写进行排序\n\n\
  SQL 中一个有用的快捷方式涉及使用整数缩写而不是完整的字段名对查询结果进行排序。缩写从 1 开始形成，它被赋予查询中指定的第一个字段；2 给第二个字段；依此类推。让我们重写我们的查询，使用字段缩写按年份降序排序输出（清单\
  \ 5-5）。\n\n| language | year |\n| --- | --- |\n| Perl | 1987 |\n| Prolog | 1972\
  \ |\n| APL | 1964 |\n\n```sql\nSELECT language, year FROM proglang_tbl ORDER BY\
  \ 2 DESC;\n```\n\n清单 5-5：使用字段缩写按降序排序的 SELECT 查询\n\n赋予 `ORDER BY` 子句的 `2` 参数表示按查询中指定的第二个字段排序，即\
  \ `year`。随着时间的推移，我意识到字段缩写最好在交互式查询数据库系统时使用。如果你正在将 SQL 嵌入编程语言中，使用字段缩写通常不是一个好主意。\n\n\
  #### 按多列排序\n\n如果你希望按不止一列对结果进行排序怎么办？当排序列中的某些值相同时，这是一个合理的情景。例如，假设你有一个包含学生成绩和姓名的表。你想按成绩对学生进行排序，但很多学生都获得了\
  \ A 等级。因此，你应用第二个排序，按姓名对所有 A 等级学生进行字母排序，然后是 B 等级学生，依此类推。\n\n让我们尝试使用我们的编程语言表来查看一个实际的例子。但为此，我们需要在其中插入更多行（清单\
  \ 5-6）。\n\n```sql\nINSERT INTO proglang_tbl (id, language, author, year, standard)\n\
  VALUES (4, 'JOVIAL', 'Schwartz', 1959, 'US-DOD');\n\nINSERT INTO proglang_tbl (id,\
  \ language, author, year, standard)\nVALUES (5, 'APT', 'Ross', 1959, 'ISO');\n```\n\
  \n清单 5-6：向我们的表中插入更多语言\n\n现在让我们按 `year` 和 `language` 对编程语言表进行排序，记住我们新插入的语言具有相同的创建年份（清单\
  \ 5-7）。\n\n| language | year |\n| --- | --- |\n| APT | 1959 |\n| JOVIAL | 1959 |\n\
  | APL | 1964 |\n| Prolog | 1972 |\n| Perl | 1987 |\n\n```sql\nSELECT language, year\
  \ FROM proglang_tbl ORDER BY year, language;\n```\n\n清单 5-7：按多列排序\n\n你甚至可以对每一列使用不同的排序类型（清单\
  \ 5-8）。\n\n| language | year |\n| --- | --- |\n| Perl | 1987 |\n| Prolog | 1972\
  \ |\n| APL | 1964 |\n| APT | 1959 |\n| JOVIAL | 1959 |\n\n```sql\nSELECT language,\
  \ year FROM proglang_tbl ORDER BY year DESC, language ASC;\n```\n\n清单 5-8：结合不同的排序类型\n\
  \n注意 `APT` 是如何排在 `JOVIAL` 之前的，因为我们为 `language` 字段指定了升序。\n\n#### 使用 WHERE 设置条件\n\n\
  我们已经了解了如何通过限制查询的字段来选取表中数据的一个子集。现在，我们将学习如何使用条件来限制查询中检索的记录数量。`WHERE` 子句正是用于实现这一目的，并且它可以与显式的字段选择或排序子句结合使用，以提供有意义的输出。\n\
  \n为了使一个查询能够成功运行并从表中获取数据，它必须至少包含两个部分——`SELECT` 子句和 `FROM` 子句。¹ 在此之后，我们可以放置可选的 `WHERE`\
  \ 条件，然后是排序子句。因此，如果我们想查看由 ANSI 标准化的编程语言（及其作者），我们的查询可以这样写（参见代码清单 5-9）。\n\n| language\
  \ | author |\n| --- | --- |\n| APL | Iverson |\n\n```sql\nSELECT language,\nauthor\n\
  FROM proglang_tbl\nWHERE standard = 'ANSI';\n```\n代码清单 5-9：使用 `WHERE` 条件\n\n你可能已经注意到，我们构建的查询指定了语言和作者字段，但条件却是施加在一个完全不同的字段上——`standard`。因此我们可以肯定地说，虽然我们可以选择要显示的列，但我们的条件判断可以作用于记录的任意字段。\n\
  \n你绝非只能使用 `=`（等于）作为条件运算符。完全可以选择其他运算符，如 `<` 和 `>`。你还可以加入 `ORDER BY` 子句对输出进行排序。下面给出一个示例（代码清单\
  \ 5-10）。\n\n| language | author | year |\n| --- | --- | --- |\n| Prolog | Colmerauer\
  \ | 1972 |\n| Perl | Wall | 1987 |\n\n```sql\nSELECT language,\nauthor,\nyear\n\
  FROM proglang_tbl\nWHERE year > 1970\nORDER BY author;\n```\n代码清单 5-10：结合使用 `WHERE`\
  \ 和 `ORDER BY`\n\n请注意，输出仅显示了 1970 年之后开发的编程语言（至少根据我们的数据库）。此外，由于排序是基于 `varchar` 类型的字段完成的，因此排序是按字母顺序升序排列的。\n\
  \n#### 组合条件\n\n如果我们只能使用 `WHERE` 子句指定一个条件，那将只能满足现实世界中的一小部分需求。然而，我们可以使用布尔运算符 `AND`\
  \ 和 `OR` 来构造复杂的条件。\n\n当我们希望结果集满足多个条件中的全部条件时，我们使用 `AND` 运算符（代码清单 5-11）。\n\n| language\
  \ | author | year |\n| --- | --- | --- |\n| Perl | Wall | 1987 |\n\n```sql\nSELECT\
  \ language,\nauthor,\nyear\nFROM proglang_tbl\nWHERE year > 1970 AND standard IS\
  \ NULL;\n```\n代码清单 5-11：使用 `AND` 运算符组合条件\n\n我们现在组合了两个条件，这意味着结果集中的任何一行都必须满足所提及的两个标准。在我们的例子中，只有一行满足——Perl。\n\
  \n一个值得注意的有趣点是我们对第二个条件的构造。我们通过指定 `IS NULL` 来表明 `standard` 字段应该是一个空值。这与 `standard\
  \ = NULL` 的说法是不同的。如果我们尝试将后者写成条件，我们将得到一个空的结果。\n\n虽然这看起来违反直觉，但实际上非常合理。空值应该表示未定义的值，而不是像无穷大、0\
  \ 甚至复数那样精确的值。我们无法为空值合理化精确的等值运算符 `=`，因此 SQL 解释器使用 `IS NULL` 进行比较。\n\n如果我们希望结果集满足我们条件中的任何一个，我们使用\
  \ `OR` 运算符。让我们在上面的例子中使用这个运算符，但意图不同。我们想要所有在 1970 年之后创建**或**没有标准化机构的语言（代码清单 5-12）。\n\
  \n| language | author | year |\n| --- | --- | --- |\n| Prolog | Colmerauer | 1972\
  \ |\n| Perl | Wall | 1987 |\n\n```sql\nSELECT language,\nauthor,\nyear\nFROM proglang_tbl\n\
  WHERE year > 1970 OR standard IS NULL;\n```\n代码清单 5-12：使用 `OR` 运算符\n\nProlog 只满足第一个标准，即它在\
  \ 1970 年之后创建，但实际上是由 ISO 标准化的。Perl 同时满足两个标准，因此也正确地显示出来。如果我们的表中有一种语言在 1970 年之前创建但没有标准化机构，它也会出现在这里的结果集中。\n\
  \n我们甚至可以通过组合 `AND` 和 `OR` 运算符来创建更复杂的查询。需要注意的是，不要使用这些运算符使过滤逻辑变得复杂或难以阅读。\n\n#### 脚注\n\
  \n1 如果我们放弃“从表中查询”的要求，我们可以只写一个包含 `SELECT` 的查询。在你的 DBMS 中试试 `SELECT 1`，看看输出结果。\n\n\
  ### 6. 操作数据\n\n在本章中，我们将学习 SQL 的数据操作语言（DML）部分，它用于对关系型数据库内的数据进行更改。DML 的三个基本命令如下。\n\
  \n*   `INSERT` 用新数据填充表\n*   `UPDATE` 更新现有数据\n*   `DELETE` 从表中删除数据\n\n我们已经看过一些关于\
  \ `INSERT` 语句的例子，包括简单插入、选择性字段插入和空值插入。因此，我们将专注于使用此语句的其他方式。\n\n\n#### 从另一张表向表中插入数据\n\
  \n你可以通过结合使用 `INSERT` 和 `SELECT` 语句，从另一张表向目标表插入新记录。这与我们之前结合 `CREATE TABLE` 和 `SELECT`\
  \ 来根据另一张表的行创建新表的方式非常相似。\n\n由于查询会返回一些记录，将其与插入命令结合就能将这些记录输入到新表中。你甚至可以使用 `WHERE` 条件来限制或筛选你希望插入新表的记录。我们现在将创建一个名为\
  \ `stdlang_tbl` 的新表，它只包含两个字段——`language` 和 `standard`。我们将向其中插入 `proglang_tbl` 表中\
  \ `standard` 字段值非空的行（代码清单 6-1）。这也将演示我们首次使用布尔运算符——`NOT`。\n\n```sql\nCREATE TABLE\
  \ stdlang_tbl\n(language varchar(20),\nstandard varchar (10));\nINSERT INTO stdlang_tbl\n\
  SELECT language,\nstandard\nFROM proglang_tbl\nWHERE standard IS NOT NULL;\n```\n\
  代码清单 6-1\n使用 `INSERT` 和 `SELECT` 有条件地将数据加载到另一张表\n\n请注意，在这种情况下，我们必须先单独创建表，然后使用 `INSERT`\
  \ 和 `SELECT` 向其中插入数据。`NOT` 会反转 `IS NULL` 的测试结果，也就是说，如果某个值是空值，正常情况下应返回 `true`，但加上\
  \ `NOT` 后，该条件会返回 `false`。\n\n`NOT`、`NULL`、`True` 和 `False`\n\n如果我们考虑布尔逻辑原理，与 `NULL`\
  \ 最接近的类比是 `false` 值。然而，`NOT` 会反转布尔值：`true` 变为 `false`，`false` 变为 `true`。\n\n使用 `IS\
  \ NULL` 测试一个值是 SQL 的比较操作，对每个空值都返回 `true`。这正是我们在上面的例子中使用 `NOT` 所反转的内容。不要将这个比较的含义与\
  \ `NULL` 所紧密代表的布尔值混淆。\n\n当你查看此表的内容时，会注意到它只选取了那些 `standard` 列确实有值的语言（表 6-1）。\n\n\
  表 6-1\n我们新建的 `stdlang_tbl` 表的内容\n\n| 语言 | 标准 |\n| --- | --- |\n| Prolog | ISO |\n\
  | APL | ANSI |\n| JOVIAL | US-DOD |\n| APT | ISO |\n\n由 `INSERT INTO` 和 `SELECT`\
  \ 填充的数据必须遵守在创建表时定义的约束。如果我们的 `stdlang_tbl` 将 `language` 定义为主键，那么除非遇到重复的 `language`\
  \ 值，否则我们的插入语句都能正常运行（代码清单 6-2）。在当前情况下这不成问题，因为语言名称本身是唯一的。\n\n```sql\nDROP TABLE stdlang_tbl;\n\
  CREATE TABLE stdlang_tbl\n(language varchar(20) PRIMARY KEY,\nstandard varchar (10));\n\
  INSERT INTO stdlang_tbl\nSELECT language,\nstandard\nFROM proglang_tbl\nWHERE standard\
  \ IS NOT NULL;\n```\n代码清单 6-2\n`stdlang_tbl` 的一个修改后的定义，包含主键\n\n如果我们以某种方式违反了约束会发生什么？例如，让我们创建一个新表\
  \ `standardizing_bodies`，它只包含一个字段——`name`。该表上唯一的约束是 `UNIQUE`。我们已经知道，`proglang_tbl`\
  \ 中的 Prolog 和 APT 都是由 ISO 标准化的。让我们尝试用代码模拟这个过程（代码清单 6-3）。\n\n```sql\nCREATE TABLE\
  \ standardizing_bodies\n( name varchar(10) UNIQUE );\nINSERT INTO standardizing_bodies\n\
  SELECT standard FROM proglang_tbl\nWHERE standard IS NOT NULL;\nERROR:  duplicate\
  \ key value violates unique constraint \"standardizing_bodies_name_key\"\nDETAIL:\
  \  Key (name)=(ISO) already exists.\n```\n代码清单 6-3\n在执行 `INSERT INTO … SELECT` 时违反\
  \ `UNIQUE` 约束\n\n请注意，这个新表 `standardizing_bodies` 的内容将是空的。我们的 `INSERT` 操作是一个单一语句，而非一组独立的插入。因此，当约束被违反时，没有数据被插入。\n\
  \n#### 更新现有数据\n\n要修改记录中的某些数据，我们使用 `UPDATE` 命令。虽然它不能添加或删除记录（这些职责委托给其他命令），但如果一条记录存在，它甚至可以一次性修改其多个字段的数据并应用条件。`UPDATE`\
  \ 语句的一般语法如下（代码清单 6-4）。\n\n```sql\nUPDATE <table_name> SET\n<column1> = <value1>,\n\
  <column2> = <value2>,\n<column3> = <value3>\n. . .\nWHERE <condition>;\n```\n代码清单\
  \ 6-4\n`UPDATE` 命令的一般语法\n\n现在让我们回到 `proglang_tbl` 表，并添加两行关于 Forth 和 Tcl 编程语言的新数据（代码清单\
  \ 6-5）。\n\n```sql\nINSERT INTO proglang_tbl\n(id, language, author, year, standard)\n\
  VALUES\n(6, 'Forth', 'Moore', 1973, NULL);\nINSERT INTO proglang_tbl\n(id, language,\
  \ author, year, standard)\nVALUES\n(7, 'Tcl', 'Ousterhout', 1988, NULL);\n```\n\
  代码清单 6-5\n在我们的编程语言表中填充更多数据\n\n如果我们突然想给每种语言的创建年份加上 10 年怎么办？由于我们想将 `UPDATE` 逻辑应用到每一行，我们可以省略搜索条件（代码清单\
  \ 6-6）。\n\n```sql\nUPDATE proglang_tbl SET\nyear = year + 10;\n```\n代码清单 6-6\n对表的所有行执行\
  \ `UPDATE`\n\n这个查询会将所有语言的创建年份增加 10。这里没有歧义，因为等号右侧的 `year + 10` 会先被计算，然后赋值给 `year`\
  \ 字段。这对所有行都生效。要恢复到我们原始的日期，只需运行相同的查询，将 `SET` 的列改为 `year = year – 10`。\n\n我们后来意识到\
  \ Forth 语言大约是在 1972 年创建的（而不是 1973 年），并且它实际上在 1994 年被 ANSI 标准化了。因此，我们现在通过编写更新查询来纠正错误，以反映这些数据（代码清单\
  \ 6-7）。我们应该注意，必须包含一个仅针对 Forth 语言的搜索条件。\n\n```sql\nUPDATE proglang_tbl SET\nyear\
  \ = 1972\nWHERE language = 'Forth';\nUPDATE proglang_tbl SET\nstandard = 'ANSI'\n\
  WHERE language = 'Forth';\n```\n代码清单 6-7\n更新 Forth 语言的详细信息\n\n我们本可以轻松地将多个字段的更新合并到一个语句中，从而为\
  \ DBMS 引擎省去再次查找该行的麻烦（代码清单 6-8）。\n\n```sql\nUPDATE proglang_tbl SET\nyear = 1972,\n\
  standard = 'ANSI'\nWHERE language = 'Forth';\n```\n代码清单 6-8\n在单个语句中更新多个字段\n\n如果你正确输入了语句并且没有返回错误，那么目标记录的内容应该已被按预期修改。要验证结果，只需运行一个简单的查询，就像我们在前面的例子中看到的那样。\n\
  \n\n\n#### 从表中删除数据\n\n你可以使用 `DELETE` 命令从表中删除记录。这意味着你可以根据条件选择要删除的记录，或者删除所有记录，但不能使用此语句删除记录中的特定字段。`DELETE`\
  \ 语句的一般语法如下所示（见清单 6-9）。\n\n```\nDELETE FROM <表名>\nWHERE <条件>;\n清单 6-9\nDELETE 的通用语法\n\
  ```\n\n虽然在 `DELETE` 语句中加入条件子句是可选的，但它几乎总是被使用——因为如果不使用它，将导致表中的所有记录被删除，这在实际中很少是真正需要的。幸运的是，我们有一个不再需要的备用表\
  \ `stdlang_tbl`，让我们尝试从中删除所有行（见清单 6-10）。\n\n```\nDELETE FROM stdlang_tbl;\n清单 6-10\n\
  从表中删除所有记录\n```\n\n如果我们尝试查看此表的内容，将不会返回任何数据行。只会显示列标题。\n\n| language | standard |\n\
  \n现在，我们编写完整的语句来删除表中对应于 Forth 的记录。同样，我们必须在 `WHERE` 子句中包含搜索条件（见清单 6-11 和表 6-2）。\n\n\
  **表 6-2** 记录删除后 `proglang_tbl` 的内容\n\n| id | language | author | year | standard\
  \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
  | 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL\
  \ | Schwartz | 1959 | US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout\
  \ | 1988 |   |\n\n```\nDELETE FROM proglang_tbl WHERE language = 'Forth';\n清单 6-11\n\
  从 proglang_tbl 表中删除一条记录\n```\n\n你在 `DELETE` 语句中添加的 `WHERE` 子句时应始终小心。它们决不应该范围太广，以免最终删除了比你预期更多的数据。\n\
  \n### 7. 组织你的数据\n\n由于这是一篇旨在向不熟悉 SQL 的人教授 SQL 的文章，我们的数据一直非常简单。你希望在数据库中存储的字段数量可能会比我们在前面章节看到的五列表更大。此外，对于将在表中存储的数据类型，我们隐含地做了一些假设。但在现实生活中，情况并非总是如此。\n\
  \n实际上，我们遇到的数据会很复杂，甚至是冗余的。这就是数据建模技术和数据库设计研究的用武之地。虽然建议读者参考关于此主题的更全面的论述，但我们将尝试研究一些良好的关系数据库设计原则，因为这些研究在学习用于多表的\
  \ SQL 语句时会派上用场。\n\n#### 规范化\n\n让我们假设我们有一个虚构机构的员工数据库，如下所示（表 7-1）。如果数据库结构没有经过建模，而是从原始信息集合中提取出来的，那么预计会出现冗余。\n\
  \n**表 7-1** 虚构公司的员工数据\n\n| employee_id | name | skill | manager_id | location |\n\
  | --- | --- | --- | --- | --- |\n| 1 | Socrates | Philosophy | (null) | Greece |\n\
  | 2 | Plato | Writing | 1 | Greece |\n| 3 | Aristotle | Science | 2 | Greece |\n\
  | 4 | Descartes | Philosophy | (null) | France |\n| 4 | Descartes | Philosophy |\
  \ (null) | Netherlands |\n\n我们可以看到笛卡尔有两行，因为他一生中在法国和荷兰都生活过。看起来不太优雅，对吧？如果以后我们决定希望将他归类为不同的技能，我们就必须更新他的两行，因为它们应该包含相同（主要）的技能。\n\
  \n如果有一个单独的技能表，并以某种方式让共享相同技能的记录引用此表，这不是更合理吗？这样，如果我们希望反映苏格拉底和笛卡尔都是西方哲学的思想家，只需在第二个表中重命名技能记录即可。\n\
  \n这种将原始数据库分解为逻辑表并消除冗余的过程称为**规范化**。甚至还有称为范式的规范化级别，它们规定了如何实现所需的设计。\n\n有五种公认的范式，是认真的数据库管理员和开发人员所熟悉的。它们从第一范式\
  \ **1NF** 到第五范式 **5NF**。这些范式本质上是渐进的，这意味着一个符合 3NF 的设计同时也符合 1NF 和 2NF。由于这些范式的起源是基于学术研究，实际开发人员在大多数情况下通常将自己限制在\
  \ 3NF 或 4NF。我们再次建议读者参考更全面的关于数据库设计和**规范化**的文本。我们将只是浅尝辄止地探索这些广阔的领域。\n\n现在，让我们转向我们的编程语言数据，看看规范化的必要性如何体现出来。\n\
  \n#### 原子性\n\n在我们看到的编程语言示例中，我们的假设始终是一种语言只有一位作者。但是有无数语言是由多人共同贡献核心设计的，他们理应在我们的表中被承认。我们将如何制作这样的记录呢？让我们以\
  \ BASIC 为例，它由 John Kemeny 和 Thomas Kurtz 设计。将此新记录添加到表中的最简单选项是将两位作者都放入作者字段（表 7-2）。\n\
  \n**表 7-2** 包含非原子字段值的记录\n\n| id | language | author | year | standard |\n| --- |\
  \ --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl\
  \ | Wall | 1987 | (null) |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | Tcl | Ousterhout\
  \ | 1988 | (null) |\n| 5 | BASIC | Kemeny, Kurtz | 1964 | ANSI |\n\n你可以立即看出，很难编写一个基于作者字段来检索此记录的查询。如果数据写为“Kemeny,\
  \ Kurtz”或“Kurtz, Kemeny”甚至“Kemeny & Kurtz”，那么在查询的 `WHERE` 条件子句中放入正确的字符串将极其困难。毕竟，插入数据的人可能与查询它的人不同。\n\
  \n正确的解决方案是重新设计表结构，使所有字段值都是原子的。值的原子性意味着行与列的每个交点都必须包含一个单一的、不可分割的值。如果你的当前设计中包含一些非原子值的字段，你就需要开始考虑更改你的表结构了。\n\
  \n#### 重复组\n\n另一个想到的简单（但最终是错误的）方法是将作者字段拆分为两部分——`author1` 和 `author2`。如果一种语言只有一位作者，则\
  \ `author2` 字段将包含空值（表 7-3）。你能发现这种设计决策将导致什么问题吗？\n\n**表 7-3** 包含重复组的表\n\n| id | language\
  \ | author1 | author2 | year | standard |\n| --- | --- | --- | --- | --- | --- |\n\
  | 1 | Prolog | Colmerauer | (null) | 1972 | ISO |\n| 2 | Perl | Wall | (null) |\
  \ 1987 | (null) |\n| 3 | APL | Iverson | (null) | 1964 | ANSI |\n| 4 | Tcl | Ousterhout\
  \ | (null) | 1988 | (nul) |\n| 5 | BASIC | Kemeny | Kurtz | 1964 | ANSI |\n\n这对一种语言可以拥有的作者数量施加了人为的限制。对于少数作者来说，它似乎可以正常工作，但如果一种编程语言是由十几人或更多人组成的委员会设计的，并且我们确实希望将他们全部列入署名中呢？在数据库设计时，我们如何确定我们希望支持的作者数量？\n\
  \n这种设计被称为**重复组**，必须积极避免。它还带来一个不良影响，即在某些字段中出现过多的空值，这是糟糕的数据库设计的第一个迹象。\n\n\n\n####\
  \ 拆分表格\n\n我们最初设计的表格将语言和作者信息混杂在一起。这样想是很自然的，因为我们对数据的第一印象是所有字段构成了一个逻辑整体。对我们来说，所有数据都属于被描述的实体——编程语言。\n\
  \n但正如我们上面所看到的，在我们的数据中，语言的作者似乎是一个独立的实体。我们甚至还没有开始捕捉同一作者创造的多种语言，就已经迫切感到需要将语言和作者区分为不同的实体。\n\
  \n要解决上述问题，正确的设计是将表格拆分成两个——一个保存作者详情（表格 `7-5`），一个详细描述语言（表格 `7-4`）。\n\n表格 `7-5`\n\n\
  一个保存作者详情的表格\n\n| 作者 ID | 作者 | 语言 ID |\n| --- | --- | --- |\n| 1 | Colmerauer | 1\
  \ |\n| 2 | Wall | 2 |\n| 3 | Ousterhout | 4 |\n| 4 | Iverson | 3 |\n| 5 | Kemeny\
  \ | 5 |\n| 6 | Kurtz | 5 |\n\n表格 `7-4`\n\n一个保存编程语言详情的表格\n\n| ID | 编程语言 | 年份 | 标准\
  \ |\n| --- | --- | --- | --- |\n| 1 | Prolog | 1972 | ISO |\n| 2 | Perl | 1987 |\
  \ (空) |\n| 3 | APL | 1964 | ANSI |\n| 4 | Tcl | 1988 | (空) |\n| 5 | BASIC | 1964\
  \ | ANSI |\n\n一旦你消除了字段的非原子性和重复组，并为你的表格分配了唯一的 `id`，你的表格结构就达到了第一范式。作者表中的 `language_id`\
  \ 字段引用了语言表中的 `id` 字段，这被称为外键约束（`代码清单 7-1`）。\n\n```\nCREATE TABLE newlang_tbl\n(id\
  \       INTEGER     NOT NULL PRIMARY KEY,\nlanguage VARCHAR(20) NOT NULL,\nyear\
  \     INTEGER     NOT NULL,\nstandard VARCHAR(10) NULL);\nCREATE TABLE authors_tbl\n\
  (author_id   INTEGER     NOT NULL,\nauthor      VARCHAR(25) NOT NULL,\nlanguage_id\
  \ INTEGER REFERENCES newlang_tbl(id));\n```\n\n`代码清单 7-1`\n创建新表格\n\n请注意，在作者表中，我们使用关键字\
  \ `REFERENCES` 让 `language_id` 字段引用新的编程语言表的 `id` 字段，从而创建了一个外键约束。你只能将外键引用创建为主键或唯一键；否则在约束创建时，我们会收到一个类似下面的错误。\n\
  \n```\nERROR:  there is no unique constraint matching given keys for referenced\
  \ table \"newlang_tbl\"\n```\n\n由于我们已经创建了一个指向 `language_id` 的引用，如果在作者表中插入一行，而该行引用的语言条目尚不存在，也会导致错误，这称为违反引用完整性（`代码清单\
  \ 7-2`）。\n\n```\nINSERT INTO authors_tbl\n(author_id, author, language_id)\nVALUES\n\
  (5, 'Kemeny', 5)\nERROR:  insert or update on table \"authors_tbl\" violates foreign\
  \ key constraint \"authors_tbl_language_id_fkey\"\nDETAIL:  Key (language_id)=(5)\
  \ is not present in table \"newlang_tbl\".\n```\n\n`代码清单 7-2`\n一个违反引用完整性的例子\n\n\
  然而，如果按顺序操作，即先插入语言，然后再在作者表中插入相应的条目，一切就能正常工作（`代码清单 7-3`）。\n\n```\nINSERT INTO newlang_tbl\n\
  (id, language, year, standard)\nVALUES\n(5, 'BASIC', 1964, 'ANSI');\nINSERT INTO\
  \ authors_tbl\n(author_id, author, language_id)\nVALUES\n(5, 'Kemeny', 5);\n```\n\
  \n`代码清单 7-3`\n在两张表中为 BASIC 创建条目\n\nSQLite 中的引用完整性\n\n如果你尝试在 SQLite 中运行 `代码清单 7-2`，尽管\
  \ `newlang_tbl` 中没有 `language_id` 为 5 的记录，你也不会收到错误。出于向后兼容的原因，SQLite 默认关闭了引用完整性检查。要为你的数据库启用它，请在命令行中运行以下\
  \ `pragma`。\n\n```\nPRAGMA foreign_keys = ON;\n```\n\n如果你现在违反引用完整性，我们就会收到熟悉的 `Error:\
  \ FOREIGN KEY constraint failed` 错误信息。\n\n引用完整性是良好关系型数据库设计的一个关键优势。由于它应用于相关联的实体，因此能确保这些实体的数据保持同步。在上面的例子中，这个约束确保了我们永远不会出现一个作者的数据，而其所创建的编程语言却没有在语言表中被捕获。\n\
  \n在设计数据库以解决业务问题时，决定如何运用引用完整性是一个重大决策。这主要需要与领域专家讨论，他们理解你试图捕捉的实体数据的业务逻辑。\n\n用于填充完整表格的其他语句如下所示（`代码清单\
  \ 7-4`）。\n\n```\nINSERT INTO newlang_tbl\n(id, language, year,  standard)\nVALUES\n\
  (1, 'Prolog', 1972, 'ISO');\nINSERT INTO newlang_tbl\n(id, language, year)\nVALUES\n\
  (2, 'Perl', 1987);\nINSERT INTO newlang_tbl\n(id, language, year,  standard)\nVALUES\n\
  (3, 'APL', 1964, 'ANSI');\nINSERT INTO newlang_tbl\n(id, language, year)\nVALUES\n\
  (4, 'Tcl', 1988);\nINSERT INTO authors_tbl\n(author_id, author, language_id)\nVALUES\
  \ (6, 'Kurtz', 5);\nINSERT INTO authors_tbl\n(author_id, author, language_id)\n\
  VALUES (1, 'Colmerauer', 1);\nINSERT INTO authors_tbl\n(author_id, author, language_id)\n\
  VALUES (2, 'Wall', 2);\nINSERT INTO authors_tbl\n(author_id, author, language_id)\n\
  VALUES (3, 'Ousterhout', 4);\nINSERT INTO authors_tbl\n(author_id, author, language_id)\n\
  VALUES (4, 'Iverson', 3);\n```\n\n`代码清单 7-4`\n完全填充新创建的表格\n\n"
- "# 对规范化的追求\n\n创建了关系模型，并进而提出规范化理论的人——科德博士（Dr. Codd）——是一位学术天才。虽然他当时在 IBM 工作，这显然不属于学术界，但整件事都带有一种数学纯粹性的气息。\n\
  \n但是，消除数据冗余的代价是速度。虽然可能存在许多高级范式（从 1NF 到 5NF，以及不太为人所知的博伊斯-科德范式），但我们不能过于拘泥地追求更高范式。数据库设计师的头脑中必须让常识占据上风。\n\
  \n在某些情况下，反规范化确实有加快访问速度的好处。事实上，许多流行的 NoSQL 数据库系统将冗余数据存储标榜为一项特性。这显然是以真理的一致性为代价的。但话说回来，当我们在网络上看似随机的点击被捕捉和分析，以决定最适合我们的保险提供商时，也许损失一点真实性是可以接受的。\n\
  \n尽管如此，如果 40 年的主导地位能说明什么问题的话，那就是除非你遇到了非常特殊的情况，否则科德（以及关系模型）总是对的。\n\n### 8. 用查询做更多事情\n\
  \nSQL 这门语言是为数据库系统的终端用户而创建的。它碰巧也被程序员使用，但其目标始终是一种简单的、声明式的、类似英语的语言，让任何熟悉计算机和相关领域的人都能够从数据库系统中提取有意义的报告。这些报告功能是\
  \ SQL 查询的直接输出，因此从一开始，就有很多选项和子句可以与 `SELECT` 一起使用，以使输出更加清晰易读。\n\n我们已经看了一些基本查询，如何对查询结果排序，以及如何对查询输出设置条件。现在让我们看看更多如何修改\
  \ `SELECT` 语句以适应我们不断增长的报告需求的例子。\n\n\n#### 统计表中的记录数\n\n有时我们只想知道表中存在多少条记录，而不实际输出这些记录的全部内容。这可以通过使用一个名为\
  \ `COUNT` 的 SQL 函数来实现。让我们先看看上次离开时 `proglang_tbl` 表的内容（表 8-1）。\n\n**表 8-1**\n\n来自第\
  \ 6 章的 `proglang_tbl` 内容\n\n| id | language | author | year | standard |\n| ---\
  \ | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl\
  \ | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL | Schwartz\
  \ | 1959 | US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout | 1988\
  \ |   |\n\n我们可以清楚地看到，使用表的最后一行（本例中为 7）的 id 显然不是一个好主意。虽然过去表中可能有 7 行，但我们实际上删除了 Forth\
  \ 语言那一行。此外，我们不能总是依赖这样一个字段，特别是当我们可以插入一个 id 为 4711 而没有人抱怨时。显然，我们需要 `COUNT` 来拯救我们（代码清单\
  \ 8-1）。\n\n```sql\nSELECT COUNT(*) FROM proglang_tbl;\n```\n\n**代码清单 8-1**\n统计表中记录数的查询\n\
  \n返回的输出将是一个包含单个字段的单条记录，其值为 `6`。函数 `COUNT` 接受一个参数，即要计数的内容，我们提供了 `*`，这意味着整个记录。这样我们就达到了统计表中记录数的目的。\n\
  \n如果改为指定一个列来计数，会发生什么？如果该列有 null 值呢？让我们通过统计表中的 `standard` 字段来看看这种情况（代码清单 8-2）。\n\n\
  ```sql\nSELECT COUNT(standard) FROM proglang_tbl;\n```\n\n**代码清单 8-2**\n统计表中 standard\
  \ 字段非空值数量的查询\n\n如果你猜这个查询的输出值是 `4`，那就对了。在六行中，有两条记录的 standard 值为 null，留下四种语言有标准。\n\
  \n#### 在 COUNT 中使用 DISTINCT\n\n细心的读者可能已经注意到，标准化语言的数量是通过计算非空 standard 值的数量得出的。然而，结果集中包含了一个重复的标准机构值——APT\
  \ 和 Prolog 都是 ISO。\n\n有时，能够排除这样的重复项是很有用的。`DISTINCT` 子句允许我们只利用输入的非重复值，并且通常与 `COUNT`\
  \ 结合使用。在看实际操作之前，让我们向表中添加另一行，以便清楚地展示使用 `DISTINCT` 的结果（代码清单 8-3）。\n\n```sql\nINSERT\
  \ INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n(6, 'PL/I',\
  \ 'IBM', 1964, 'ECMA');\n```\n\n**代码清单 8-3**\n在编程语言表中插入新行\n\n请注意我们为新行选择的新数据。有了 PL/I，我们现在有了第四个独特的标准机构——ECMA。PL/I\
  \ 还与 APL 共享相同的诞生年份（1964 年），这给我们带来了一个重复的年份字段。现在让我们运行一个查询来检查表中有哪些不同的年份值（代码清单 8-4）。\n\
  \n```sql\nSELECT DISTINCT year\nFROM proglang_tbl;\n```\n\n**代码清单 8-4**\n表中的不同年份值\n\
  \n| Year |\n| --- |\n| 1972 |\n| 1988 |\n| 1987 |\n| 1964 |\n| 1959 |\n\n正如我们所期望的，1964\
  \ 和 1959 都只出现了一次。`DISTINCT` 的一个常见用例是将其与 `COUNT` 函数结合使用，以输出表中唯一值的数量（代码清单 8-5）。对年份尝试同样的操作，我们得到了预期的结果\
  \ `5`。\n\n```sql\nSELECT COUNT (DISTINCT year)\nFROM proglang_tbl;\n> 5\n```\n\n\
  **代码清单 8-5**\n统计不同年份值的数量\n\n在 `standard` 字段上使用 `DISTINCT` 产生的输出与我们最初猜想的略有不同（代码清单\
  \ 8-6）。\n\n```sql\nSELECT DISTINCT standard\nFROM proglang_tbl;\n```\n\n**代码清单 8-6**\n\
  列出不同的 standard 值\n\n| standard |\n| --- |\n| (null) |\n| ECMA |\n| ANSI |\n| ISO\
  \ |\n| US-DOD |\n\n实际上，我们的输出得到了五行，包括 null 值，因为对于 `DISTINCT` 子句来说，它是一个独特的单独值。将其与\
  \ `COUNT` 结合使用则去掉了 null 行的重要性，得到值 `4`（代码清单 8-7）。\n\n```sql\nSELECT COUNT (DISTINCT\
  \ standard)\nFROM proglang_tbl;\n> 4\n```\n\n**代码清单 8-7**\n统计不同 standard 值的数量\n\n\
  #### 列别名\n\n查询经常被直接用作报告，因为 SQL 提供了足够的功能来对存储在关系数据库管理系统（RDBMS）中的数据进行有意义的表示。允许这样做的特性之一是列别名，它允许你重命名结果输出中的列标题。创建列别名的一般语法如下（代码清单\
  \ 8-8）。\n\n```sql\nSELECT column1 AS alias1,\n       column2 AS alias2,\n...\nFROM\
  \ table_name;\n```\n\n**代码清单 8-8**\n创建列别名的一般语法\n\n例如，我们希望输出编程语言表的几列。但我们不想将语言的作者称为\
  \ authors。想要这份报告的人希望他们被称为 creators。这可以通过使用下面的查询简单实现（代码清单 8-9）。\n\n```sql\nSELECT\
  \ id,\n       language,\n       author creator\nFROM proglang_tbl;\n```\n\n**代码清单\
  \ 8-9**\n出于报告目的将 author 字段重命名为 creator\n\n| id | language | creator |\n| --- | ---\
  \ | --- |\n| 1 | Prolog | Colmerauer |\n| 2 | Perl | Wall |\n| 3 | APL | Iverson\
  \ |\n| 4 | JOVIAL | Schwartz |\n| 5 | APT | Ross |\n| 7 | Tcl | Ousterhout |\n|\
  \ 6 | PL/I | IBM |\n\n虽然创建列别名不会永久重命名字段，但它会在结果输出中显示出来。不同的实现对于是否允许在列列表以外的其他查询部分使用列别名有所不同。例如，让我们尝试在\
  \ PostgreSQL 的 `WHERE` 子句中使用列别名 `creator`（代码清单 8-10）。\n\n```sql\nSELECT id,\n  \
  \     language,\n       author creator\nFROM proglang_tbl WHERE creator = 'Ross';\n\
  ERROR:  column \"creator\" does not exist\nLINE 4: FROM proglang_tbl WHERE creator\
  \ = 'Ross';\n```\n\n**代码清单 8-10**\n在 PostgreSQL 的 WHERE 子句中使用列别名\n\n啊哈，PostgreSQL\
  \ 明确告诉我们这是不行的。让我们看看 SQLite 是否稍微宽容一些（代码清单 8-11）。\n\n```sql\nsqlite> SELECT id,\n\
  \       language,\n       author creator\nFROM proglang_tbl\nWHERE creator=\"Ross\"\
  ;\nid          language    creator\n----------  ----------  ----------\n5      \
  \     APT         Ross\n```\n\n**代码清单 8-11**\n在 SQLite 的 WHERE 子句中使用列别名\n\n虽然 SQLite\
  \ 确实允许这样做，但我并不真正喜欢在输出列重命名之外的任何地方使用列别名。我建议你也这样做，除非有非常强的可读性改进理由，并且你的实现允许它（而允许的实现非常少）。\n\
  \n\n#### SELECT 查询的执行顺序\n\n查询并非从左向右求值；其各部分的求值遵循特定顺序，如下所示。\n\n1.  `FROM` 子句\n2. \
  \ `WHERE` 子句\n3.  `GROUP BY` 子句\n4.  `HAVING` 子句\n5.  `SELECT` 子句\n6.  `ORDER BY`\
  \ 子句\n\n`SELECT` 的求值顺序低于 `WHERE` 子句，这有一个有趣的推论。你能猜到是什么吗？\n\n那就是 PostgreSQL、DB2 和\
  \ Microsoft SQL Server 等数据库管理系统无法在 `WHERE` 子句中使用列别名。在查询执行到使用所提供条件进行过滤的阶段之前，它尚未解析查询的列别名。\n\
  \n让我们通过在 PostgreSQL 中运行一个查询来测试这一点，我们在 `ORDER BY` 子句中使用列别名，这是唯一一个优先级较低的子句（清单 8-12）。\n\
  \n```sql\ntestdb=# SELECT id,\nlanguage,\nauthor creator\nFROM proglang_tbl\nORDER\
  \ BY creator;\nid | language |  creator\n----+----------+------------\n1 | Prolog\
  \   | Colmerauer\n6 | PL/I     | IBM\n3 | APL      | Iverson\n7 | Tcl      | Ousterhout\n\
  5 | APT      | Ross\n4 | JOVIAL   | Schwartz\n2 | Perl     | Wall\n(7 rows)\n```\n\
  \n**清单 8-12**\n在 `ORDER BY` 子句中使用列别名\n\n我们的推理得到了正确输出的回报，不过我仍然建议在使用列别名时要经过适当的思考。\n\
  \n#### 使用 `LIKE` 操作符\n\n在使用 `WHERE` 子句为查询设置条件时，我们已经看到了比较操作符 `=` 和 `IS NULL`。现在我们来看看\
  \ `LIKE` 操作符，它将帮助我们进行通配符比较。为了匹配，我们提供了两个通配符字符与 `LIKE` 一起使用。\n\n-   `%` （百分号）用于匹配多个字符，包括单个字符和零个字符\n\
  -   `_` （下划线）用于精确匹配一个字符\n\n我们将首先使用 `%` 字符进行通配符匹配。假设我们希望列出以字母 P 开头的语言（清单 8-13）。\n\
  \n| id | language | author | year | standard |\n| --- | --- | --- | --- | --- |\n\
  | 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |   |\n| 6 |\
  \ PL/I | IBM | 1964 | ECMA |\n\n```sql\nSELECT * FROM proglang_tbl\nWHERE language\
  \ LIKE 'P%';\n```\n\n**清单 8-13**\n所有以 P 开头的语言\n\n上面查询的输出是所有名称以大写字母 P 开头的语言记录。虽然我们没有这样的记录，但请注意，此结果集不会包含任何以小写字母\
  \ p 开头的语言。\n\n我们可以看到，使用 `%` 通配符允许我们匹配多个字符，比如 `Perl` 中的 `erl`。但是，如果我们想限制要匹配的字符数量怎么办？如果我们的目标是编写一个查询，显示以字母\
  \ `l` 结尾但长度仅为三个字符的语言怎么办？第一个条件本可以使用模式 `%l` 来满足，但要在同一查询中满足这两个条件，我们使用 `_` 通配符。像 `%l`\
  \ 这样的模式会返回 `Perl` 和 `Tcl`，但我们适当地修改模式以仅返回后者（清单 8-14）。\n\n| id | language | author\
  \ | year | standard |\n| --- | --- | --- | --- | --- |\n| 7 | Tcl | Ousterhout |\
  \ 1988 |   |\n\n```sql\nSELECT * FROM proglang_tbl\nWHERE language LIKE '__l';\n\
  ```\n\n**清单 8-14**\n所有以 l 结尾且长度为 3 个字符的语言\n\n请注意，结果中没有包含 `Perl`，因为我们明确使用了两个下划线来仅匹配两个字符。它也没有匹配\
  \ `APL` 或 `JOVIAL`，因为 SQL 数据区分大小写，且 `l` 不等于 `L`。\n\n我们还可以将 `NOT` 与 `LIKE` 结合使用来否定或反转结果。如果我们在清单\
  \ 8-14 的条件子句中使用 `NOT`，我们期望在结果中得到什么语言？包含 `Perl`、`APL` 和 `JOVIAL` 当然是正确的，但它们并不是整个结果集。任何不是以小写\
  \ `l` 结尾且长度不是三个字符的语言都会出现在输出中（清单 8-15）。\n\n| id | language | author | year | standard\
  \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
  | 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL\
  \ | Schwartz | 1959 | US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 6 | PL/I | IBM\
  \ | 1964 | ECMA |\n\n```sql\nSELECT * FROM proglang_tbl\nWHERE language NOT LIKE\
  \ '__l';\n```\n\n**清单 8-15**\n结合使用 `NOT` 与 `LIKE`\n\n使用 `LIKE` 时要小心；它的比较在数据库上计算成本高昂，尤其是涉及多个\
  \ `%` 通配符的比较。\n\n#### 计算字段\n\n我们已经了解了列别名，它允许我们在查询输出中重命名字段名称。但我们经常遇到需要更改字段值的情况。这就是计算字段概念的用武之地。\n\
  \n##### 数学计算\n\n任何数字字段都可以由我们熟悉的数学操作符进行操作。我们可以相当轻松地进行加、减、乘、除，甚至求除法的余数。虽然不同实现支持的操作符有所不同，但下面列出的操作符应该在你遇到的任何关系数据库管理系统中都可用（表\
  \ 9-1）。\n\n**表 9-1**\nSQL 中可用的数学操作符\n\n| 操作 | 操作符 |\n| --- | --- |\n| 加法 | `+` |\n\
  | 减法 | `-` |\n| 乘法 | `*` |\n| 除法 | `/` |\n| 余数 | `%` |\n\n让我们以编程语言表为例，尝试找出该语言是在哪个十年间创建的。例如，`Prolog`\
  \ 创建于 20 世纪 70 年代。让我们尝试从我们拥有的创建 `year` 中找出这个事实。一种方法是求年份除以 10 的余数，10 是一个十年包含的年数（清单\
  \ 9-1）。这个值指定了自该十年开始以来过去了多少年。\n\n| language | remain |\n| --- | --- |\n| Prolog |\
  \ 2 |\n| Perl | 7 |\n| APL | 4 |\n| JOVIAL | 9 |\n| APT | 9 |\n| Tcl | 8 |\n| PL/I\
  \ | 4 |\n\n```sql\nSELECT language,\n(year % 10) remain\nFROM proglang_tbl;\n```\n\
  \n**清单 9-1**\n使用余数运算\n\n现在，如果我们将此值从创建 `year` 本身中减去，我们将得到编程语言创建的十年（清单 9-2）。\n\n|\
  \ language | decade |\n| --- | --- |\n| Prolog | 1970 |\n| Perl | 1980 |\n| APL\
  \ | 1960 |\n| JOVIAL | 1950 |\n| APT | 1950 |\n| Tcl | 1980 |\n| PL/I | 1960 |\n\
  \n```sql\nSELECT language,\nyear - (year % 10) decade\nFROM proglang_tbl;\n```\n\
  \n**清单 9-2**\n找出语言的创建十年\n\n另一种方法是将 `year` 除以 10，然后再乘以 10。这种方法稍微不那么直接，因为它依赖于 `integer`\
  \ 数据类型的定义。由于整数不能存储小数点，除以 10 会静默地截掉余数。1972 年除以 10 将是 197，舍弃了 .2 部分。如果我们将此值乘以 10，我们将得到所需的十年值（清单\
  \ 9-3）。\n\n```sql\nSELECT language,\n(year / 10) * 10 decade\nFROM proglang_tbl;\n\
  ```\n\n**清单 9-3**\n使用替代计算找出语言的创建十年\n\n\n### 10. 聚合与分组\n\nSQL 在技术领域一直保持着突出地位，这得益于它能满足广泛的商业智能和分析请求。虽然数据库常被用于“大海捞针”，即缩小范围直至找到单行数据，但\
  \ SQL 的大量交互式应用都围绕着从一堆数据行中生成聚合洞察。\n\n确实，基于 SQL 的系统相较于 NoSQL 数据存储解决方案的一个主要优势在于，前者中的分组与聚合操作非常直观。\n\
  \n#### 字符串操作\n\n迄今为止，最常用的字符串操作是连接。它指的是拼接或组合字符串。然而，即使数值字段也可以被视为字符串，因此我们也可以对它们使用连接运算符\
  \ `||`。请参见下面的例子，我们修改了“年代”字段，为其添加一些字符（参见列表 9-4）。\n\n| language | decade |\n| ---\
  \ | --- |\n| Prolog | The 1970s |\n| Perl | The 1980s |\n| APL | The 1960s |\n|\
  \ JOVIAL | The 1950s |\n| APT | The 1950s |\n| Tcl | The 1980s |\n| PL/I | The 1960s\
  \ |\n\n```sql\nSELECT language,\n'The '||((year/10)*10)||'s' decade\nFROM proglang_tbl;\n\
  ```\n*列表 9-4*\n使用字符串连接运算符\n\n请注意，连接运算符在不同的实现中以不同的形式出现。PostgreSQL、SQLite 和 Oracle\
  \ 使用所示的 `||` 符号，而 Ingres、MySQL 和 Microsoft SQL Server 则使用 `+` 表示连接。不过，它们的效果是相同的。\n\
  \n字符串连接运算符在各种编程语言中也有所不同。大多数 SQL 实现中使用的 `||` 字符，源自 IBM 的 PL/I——一种在 60 和 70 年代相当流行，但在现代已很少见的语言。\n\
  \n最后一个字符 `I` 实际上是罗马数字 1，它被特意设计出来，以弥合专注于业务流程的语言和迎合科学计算的语言之间日益扩大的差距。\n\n另一个常见的字符串操作是子字符串，它只返回字符串字段值的一部分。例如，如果我们只需要获取每种编程语言的前两个字符，我们会使用\
  \ `SUBSTR` 函数。该函数的一般语法如下所示（参见列表 9-5）。\n\n```sql\nSELECT SUBSTR(, , ),\n...\nFROM\
  \ ;\n```\n*列表 9-5*\n子字符串的一般语法\n\n起始位置是你希望开始提取的字符位置。与大多数编程语言不同，这里的字符串索引位置不是从 0 开始，而是从\
  \ 1 开始。第三个参数“长度”指定结果中应包含多少个字符。对于编程语言的前两个字符，起始位置将是 1，长度将是 2（参见列表 9-6）。\n\n| substr\
  \ | year |\n| --- | --- |\n| Pr | 1972 |\n| Pe | 1987 |\n| AP | 1964 |\n| JO | 1959\
  \ |\n| AP | 1959 |\n| Tc | 1988 |\n| PL | 1964 |\n\n```sql\nSELECT SUBSTR(language,\
  \ 1, 2),\nyear\nFROM proglang_tbl;\n```\n*列表 9-6*\n提取编程语言的前两个字符\n\n有趣的是，一方面，PostgreSQL\
  \ 在使用 `SUBSTRING` 代替 `SUBSTR` 时会给出相同的结果，因为它将它们视为别名。然而，SQLite 只能与 `SUBSTR` 一起使用。另一方面，Microsoft\
  \ SQL Server 只能与 `SUBSTRING` 一起使用。请查阅你的数据库手册以了解你的实现期望使用哪个版本。\n\n另一类经常派上用场的字符串操作是\
  \ `UPPER` 和 `LOWER`，它们分别将字符串值的大小写更改为大写和小写。这一点最好通过一个例子来说明（参见列表 9-7）。\n\n| upper |\
  \ lower |\n| --- | --- |\n| PROLOG | iso |\n| PERL |   |\n| APL | ansi |\n| JOVIAL\
  \ | us-dod |\n| APT | iso |\n| TCL |   |\n| PL/I | ecma |\n\n```sql\nSELECT UPPER(language),\n\
  LOWER(standard)\nFROM proglang_tbl;\n```\n*列表 9-7*\n更改字段的大小写\n\n#### 字面值\n\n在某些情况下，需要将一个固定的字面值用作新列的值。就像列别名可以改变列标题以提高可读性一样，字面值改变记录的值。从某种意义上说，它们不是计算字段，而是插入到记录特定位置的固定字段。一个例子将有助于说明这一点——假设你希望明确语言的创建年份，不仅是作为一个数字，还要包含\
  \ `AD` 字符（参见列表 9-8）。\n\n| language | year | AD |\n| --- | --- | --- |\n| Prolog\
  \ | 1972 | AD |\n| Perl | 1987 | AD |\n| APL | 1964 | AD |\n| JOVIAL | 1959 | AD\
  \ |\n| APT | 1959 | AD |\n| Tcl | 1988 | AD |\n| PL/I | 1964 | AD |\n\n```sql\n\
  SELECT language,\nyear,\n'AD'\nFROM proglang_tbl;\n```\n*列表 9-8*\n使用字面值\n\n我们甚至可以以同样的方式使用数值字面值，省略此类值的引号。字面值的一个常见用途是当用户需要将数据库查询输出中的数据复制粘贴到另一个工具（如电子表格或文字处理器）中时。\n\
  \n#### 聚合函数\n\n聚合函数用于从一个或多个表中计算汇总信息。我们已经见过用于计数匹配记录的 `COUNT` 聚合函数。类似地，SQL 中还有其他聚合函数，例如用于计算平均值的\
  \ `AVG`；用于计算总和的 `SUM`；以及用于找出最大值和最小值的极值函数 `MAX` 和 `MIN`。\n\n计数和极值函数适用于所有数据类型，但像 `SUM`\
  \ 和 `AVG` 这样的函数仅对数值类型有意义，因此只能与数值类型一起使用。\n\n现在，让我们尝试对我们表中唯一有意义的数值型字段 `year` 使用 `AVG`（代码清单\
  \ 10-1）。你可以将下面的查询视为找出我们表中所有编程语言记录的平均创建 `year` 值的一种方式。\n\n```sql\nSELECT AVG(year)\
  \ FROM proglang_tbl;\n```\n**代码清单 10-1**\n在我们的编程语言表中找出平均创建年份\n\n![A457348_1_En_10_Figa_HTML.gif](img/A457348_1_En_10_Figa_HTML.gif)\n\
  \n我们可以看到结果是一个十进制数，在 PostgreSQL 中小数点后默认显示 16 位数字。在 SQLite 中，这个位数略降至 10 位，但对于除极少数情况外，这已经绰绰有余了。\n\
  \n虽然平均值被精确计算出来了，但有人可能会认为，像这样指定 `year` 的值并不实用。我们真正想要的是一个可读的 `year` 值，它看起来像一个实际的年份，具体来说是一个整数值。因此，我们将这个平均值转换为整数（代码清单\
  \ 10-2）。\n\n```sql\nSELECT CAST(AVG(year) AS INTEGER)\nFROM proglang_tbl;\n```\n\
  **代码清单 10-2**\n将值转换为整数\n\n![A457348_1_En_10_Figb_HTML.gif](img/A457348_1_En_10_Figb_HTML.gif)\n\
  \n使用 `CAST` 进行数据类型转换仅适用于兼容的数据类型，如数值型和整型。如果你尝试将一个 `varchar` 转换为整数，DBMS（数据库管理系统）会如常地输出一条错误信息（代码清单\
  \ 10-3）。\n\n```sql\ntestdb=# SELECT CAST(language AS INTEGER)\nFROM proglang_tbl;\n\
  ERROR:  invalid input syntax for integer: \"Prolog\"\n```\n**代码清单 10-3**\n转换不兼容的类型\n\
  \n这里的一个例外是 SQLite，它会顺从地将 `varchar` 值转换为 0。这可能是因为其底层引擎实现而做出的最明智选择；不过，我要提醒你避免使用这类令人惊讶的转换操作。\n\
  \n让我们试试另一个常用的数值聚合函数——`SUM`。假设我们希望找出表中 `year` 值的总和——可以使用 `SUM` 以直接的方式编写查询（代码清单 10-4）。\n\
  \n```sql\nSELECT SUM(year)\nFROM proglang_tbl;\n```\n**代码清单 10-4**\n使用 `SUM` 聚合函数\n\
  \n![A457348_1_En_10_Figc_HTML.gif](img/A457348_1_En_10_Figc_HTML.gif)\n\n如前所述，如果我们在\
  \ `varchar` 字段上使用 `SUM`，PostgreSQL 会报错，而 SQLite 则会静默地给出值 0.0（代码清单 10-5）。\n\n```sql\n\
  testdb=# SELECT SUM(language)\nFROM proglang_tbl;\nERROR:  function sum(character\
  \ varying) does not exist\nLINE 1: SELECT SUM(language) FROM proglang_tbl;\n^\n\
  HINT:  No function matches the given name and argument types. You might need to\
  \ add explicit type casts.\n```\n**代码清单 10-5**\n在 PostgreSQL 中的 `varchar` 字段上使用\
  \ `SUM`\n\n#### 使用极值函数 – MAX 和 MIN\n\n`MAX` 和 `MIN` 统称为极值函数，因为它们本质上是从一组列值中找出极值。它们最直观的应用是处理数字数据，但这些函数也可以应用于其他数据库类型。\n\
  \n这些函数相当容易理解和使用。我们先看 `MIN`。它查看一组特定的行，并找出作为参数提供给它的列的最小值。例如，在我们的表中，我们希望找出从哪一年开始有编程语言的记录，即最早的编程语言年份。分析手头的问题，我们看到，如果对表中\
  \ `year` 字段应用聚合函数 `MIN`，我们应该能得到所需的输出（代码清单 10-6）。\n\n```sql\nSELECT MIN(year)\nFROM\
  \ proglang_tbl;\n```\n**代码清单 10-6**\n使用 `MIN` 极值聚合函数\n\n![A457348_1_En_10_Figd_HTML.gif](img/A457348_1_En_10_Figd_HTML.gif)\n\
  \n我们的表中在 1959 年对应两种语言——APT 和 JOVIAL。但因为这是最小值，所以无论有多少语言具有相同的值，它都只返回一次结果。函数 `MAX`\
  \ 类似，但它的结果将表示表中某一种语言被创建的最新年份（代码清单 10-7）。\n\n```sql\nSELECT MAX(year)\nFROM proglang_tbl;\n\
  ```\n**代码清单 10-7**\n使用 `MAX` 极值聚合函数\n\n![A457348_1_En_10_Fige_HTML.gif](img/A457348_1_En_10_Fige_HTML.gif)\n\
  \n当然，你可以在一个查询中将它们组合起来，直接在单行中获得结果（代码清单 10-8）。\n\n| max | min |\n| --- | --- |\n|\
  \ 1988 | 1959 |\n\n```sql\nSELECT MAX(year),\nMIN(year)\nFROM proglang_tbl;\n```\n\
  **代码清单 10-8**\n同时使用 `MAX` 和 `MIN`\n\n正如我们之前读到的，这些函数并不局限于数值类型。那么，让我们将查找 `MAX` `year`\
  \ 值与 `MIN` `language` 值结合起来（代码清单 10-9）。\n\n| max | min |\n| --- | --- |\n| 1988\
  \ | APL |\n\n```sql\nSELECT MAX(year),\nMIN(language)\nFROM proglang_tbl;\n```\n\
  **代码清单 10-9**\n混合使用 `MAX` 和 `MIN` 类型\n\n找到的 `MIN` `language` 是 APL，因为它在字母顺序上排第一。请注意，APT\
  \ 未被选中，因为在比较字母时 L < T。\n\n我们在解读这个结果时需要小心。乍一看，它会给人一个误导性的印象，认为 1988 对应的是 APL，但事实并非如此。我们的查询只是给出了表中这两个字段的极值，而不论它们是否来自同一条记录。\n\
  \n\n#### 数据分组\n\n`SELECT`查询中的`GROUP BY`子句用于根据字段值对记录进行分组。该子句位于`WHERE`条件之后。例如，在我们的示例表中，我们可以根据制定其标准的委员会对数据进行分组。在向表中插入另一条记录后，让我们看看此操作，以便分组的逻辑性质变得更加清晰（清单\
  \ 10-10）。\n\n| standard |\n| --- |\n| ECMA |\n| ANSI |\n| ISO |\n| US-DOD |\n\n\
  ```sql\nINSERT INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n\
  (8, 'Fortran', 'Backus', 1957, 'ANSI');\nSELECT standard FROM proglang_tbl\nWHERE\
  \ standard IS NOT NULL\nGROUP BY standard;\n清单 10-10\n按字段对记录进行分组\n```\n\n注意不同的标准是如何被分组为单个值的，无论它们在表中出现了多少次。让我们尝试将`language`列添加到上述查询的输出中（清单\
  \ 10-11）。\n\n```sql\nSELECT standard,\nlanguage\nFROM proglang_tbl\nWHERE standard\
  \ IS NOT NULL\nGROUP BY standard;\nERROR:  column \"proglang_tbl.language\" must\
  \ appear in the GROUP BY clause or be used in an aggregate function\n清单 10-11\n\
  尝试将 language 添加到输出字段\n```\n\n数据库引擎为这个查询返回了一个错误。这是合理的，因为尽管分组子句将不同的标准归类在一起，但应该选择哪个`language`与之一起显示是模糊的。让我们按照错误信息的第一个建议，在`GROUP\
  \ BY`子句中也包含`language`字段（清单 10-12）。\n\n| standard | language |\n| --- | --- |\n|\
  \ ECMA | PL/I |\n| ANSI | APL |\n| US-DOD | JOVIAL |\n| ISO | Prolog |\n| ISO |\
  \ APT |\n| ANSI | Fortran |\n\n```sql\nSELECT standard,\nlanguage\nFROM proglang_tbl\n\
  WHERE standard IS NOT NULL\nGROUP BY standard, language;\n清单 10-12\n将 language 添加到输出字段\n\
  ```\n\n这里需要注意的一个有趣规则是：`SELECT`子句中列出的列必须也出现在`GROUP BY`子句中。这引出了以下两个推论。\n\n1.  你不能对一个不在`SELECT`列表中的列进行分组。\n\
  2.  你必须在分组子句中指定所有出现在`SELECT`列表中的列。\n\nSQLite 中的裸露列\n\n如果你在 SQLite 中尝试执行清单 10-11，你不会得到错误。这是因为\
  \ SQLite 中的裸露列特性，它允许一列在`SELECT`子句中不使用聚合函数而存在，同时可以不在`GROUP BY`子句中。\n\n这与大多数 DBMS\
  \ 系统非常不同，我建议你避免认真使用此特性，因为它涉及未定义的行为。不过，阅读 SQLite 网站上提供的详细信息是好的。\n\n[`https://www.sqlite.org/lang_select.html`](https://www.sqlite.org/lang_select.html)\n\
  \n#### 分组与聚合函数\n\n使用分组的另一种有用方式是将该操作与聚合函数结合。假设我们希望统计某个组织在我们的表中有多少个标准。这可以通过将`GROUP\
  \ BY`子句与`COUNT`聚合函数结合来实现，如下所示（清单 10-13）。\n\n| standard | count |\n| --- | --- |\n\
  | <null> | 2 |\n| ECMA | 1 |\n| ANSI | 2 |\n| ISO | 2 |\n| US-DOD | 1 |\n\n```sql\n\
  SELECT standard,\nCOUNT(*)\nFROM proglang_tbl\nGROUP BY standard;\n清单 10-13\n将 GROUP\
  \ BY 与聚合函数结合使用\n```\n\n输出非常直观，无需进一步解释，但查询本身很有趣。注意`GROUP BY`子句只包含了`standard`。聚合函数是分组列归类的结果。\n\
  \n当与聚合函数明智地结合使用时，分组在 SQL 中才真正有意义。数据库的许多实用性和智能性都源于分析师在精心设计的模型上应用这些功能的组合。让我们再看一个例子，这次将`GROUP\
  \ BY`与多个聚合函数结合使用。\n\n假设我们希望找出同一年创建了多少种语言，以及这些语言中按字母顺序哪个排第一（清单 10-14）。我们可以立即看到，这里需要一个基于`year`的`GROUP\
  \ BY`，同时需要几个不同的聚合函数。\n\n| year | min | count |\n| --- | --- | --- |\n| 1972 | Prolog\
  \ | 1 |\n| 1957 | Fortan | 1 |\n| 1988 | Tcl | 1 |\n| 1987 | Perl | 1 |\n| 1964\
  \ | APL | 2 |\n| 1959 | APT | 2 |\n\n```sql\nSELECT year,\nMIN(language),\nCOUNT(*)\n\
  FROM proglang_tbl\nGROUP BY year;\n清单 10-14\n将 GROUP BY 与多个聚合函数结合使用\n```\n\n####\
  \ HAVING 子句\n\n就像`WHERE`子句对查询的字段设置条件一样，`HAVING`子句对`GROUP BY`创建的组设置条件。它必须紧跟在`GROUP\
  \ BY`之后，但在`ORDER BY`子句之前（清单 10-15）。\n\n| language | standard | year |\n| --- | ---\
  \ | --- |\n| APT | ISO | 1959 |\n| JOVIAL | US-DOD | 1959 |\n| APL | ANSI | 1964\
  \ |\n| Fortran | ANSI | 1957 |\n| PL/I | ECMA | 1964 |\n| Prolog | ISO | 1972 |\n\
  \n```sql\nSELECT language,\nstandard,\nyear\nFROM proglang_tbl\nGROUP BY standard,\n\
  year,\nlanguage\nHAVING year < 1980;\n清单 10-15\nHAVING 子句演示\n```\n\n从输出中我们可以清楚地看到，Perl\
  \ 和 Tcl 的记录被排除在外，因为它们不满足`HAVING`条件（即在 1980 年之前创建）。\n\n你可能想知道为什么我们需要两个不同的过滤子句——`WHERE`和`HAVING`。`WHERE`子句不允许在其条件中使用聚合函数，而这正是`HAVING`子句的主要目标。例如，假设我们想检查哪些`standard`值在我们的表中出现超过一次。我们使用`GROUP\
  \ BY`子句的初步尝试可能看起来像这样（清单 10-16）。\n\n```sql\nSELECT standard\nFROM proglang_tbl\n\
  WHERE COUNT(standard) > 1\nGROUP BY standard;\nERROR:  aggregate functions are not\
  \ allowed in WHERE\n清单 10-16\n尝试在 WHERE 中使用聚合函数\n```\n\n正如我们所想，我们的 SQL 解释器不允许这种做法。相反，我们将在`HAVING`子句中使用相同的条件（清单\
  \ 10-17）。\n\n| standard |\n| --- |\n| ANSI |\n| ISO |\n\n```sql\nSELECT standard\n\
  FROM proglang_tbl\nGROUP BY standard\nHAVING COUNT(standard) > 1;\n清单 10-17\n带有聚合函数的\
  \ HAVING 子句\n```\n\n它正确地返回了两个出现次数超过一次的`standard`值。有趣的是，如果我们将条件改为`COUNT(*)`，我们会得到一个额外的行（清单\
  \ 10-18）。\n\n| standard |\n| --- |\n| (null) |\n| ANSI |\n| ISO |\n\n```sql\nSELECT\
  \ standard\nFROM proglang_tbl\nGROUP BY standard\nHAVING COUNT(*) > 1;\n清单 10-18\n\
  更改聚合函数的行为\n```\n\n现在，过滤条件不再局限于`standard`列的非空值。由于该字段中有多个包含`null`值的记录，它们也会被包含在结果中。\n\
  \n\n\n### 11. 理解连接\n\n连接操作允许你在单个 `SELECT` 查询中从多个表中检索数据。两个表可以通过单个连接运算符进行连接，但其结果还可以再次与其他表连接。被连接的表之间必须存在相同或相似的列。\n\
  \n当你使用诸如规范化之类良好的设计原则来设计整个数据库系统时，我们通常需要使用连接来为用户的查询提供完整的视图。例如，我们在第 7 章中将编程语言表拆分为两个——一个保存作者详细信息（表\
  \ 11-2），另一个保存语言本身的信息（表 11-1）。为了显示列出作者及其所创建编程语言的报告，我们将不得不使用连接。\n\n表 11-2\n\n`authors_tbl`\
  \ 的内容\n\n| author_id | author | language_id |\n| --- | --- | --- |\n| 1 | Colmerauer\
  \ | 1 |\n| 2 | Wall | 2 |\n| 3 | Ousterhout | 4 |\n| 4 | Iverson | 3 |\n| 5 | Kemeny\
  \ | 5 |\n| 6 | Kurtz | 5 |\n\n表 11-1\n\n`newlang_tbl` 的内容\n\n| id | language | year\
  \ | standard |\n| --- | --- | --- | --- |\n| 1 | Prolog | 1972 | ISO |\n| 2 | Perl\
  \ | 1987 | (null) |\n| 3 | APL | 1964 | ANSI |\n| 4 | Tcl | 1988 | (null) |\n| 5\
  \ | BASIC | 1964 | ANSI |\n\n我们现在构造一个查询来显示所需的输出——所有作者及其开发的相应语言的列表（代码清单 11-1）。我们选择\
  \ `authors` 表的 `language_id` 字段作为连接列。这对应于 `languages` 表的 `id` 字段。\n\n| author |\
  \ language |\n| --- | --- |\n| Colmerauer | Prolog |\n| Wall | Perl |\n| Ousterhout\
  \ | APL |\n| Iverson | Tcl |\n| Kemeny | BASIC |\n| Kurtz | BASIC |\n\n```sql\n\
  SELECT author, language\nFROM authors_tbl, newlang_tbl\nWHERE language_id = id;\n\
  ```\n\n代码清单 11-1\n在我们的两个表上执行连接操作\n\n我们查询的输出结合了来自两个表的列，为我们提供了更好的报告。`language_id =\
  \ id` 被称为连接条件。由于连接条件中使用的运算符是相等运算符（`=`），因此这种连接被称为**等值连接**。另一个需要注意的重要事项是，参与连接条件的列并非我们选择出现在查询结果中的列。\n\
  \n请记住，连接表以查看结果集完全不会影响表本身。表的结构或数据本身不会发生任何物理变化。形成的隐式连接仅存在于连接查询执行期间。\n\n#### 替代连接语法\n\
  \n你可能已经注意到，我们构建连接查询时没有使用太多特殊语法，而是使用了常规的 `FROM/WHERE` 组合。SQL-92 标准引入了 `JOIN` 关键字，允许我们构建连接查询。由于\
  \ `FROM/WHERE` 语法引入较早，它在连接中仍然相当流行。但现在大多数数据库供应商已经实现了大部分 SQL-92 标准，`JOIN` 语法也被广泛使用。下面是我们刚刚编写的查询的\
  \ `JOIN` 语法等效形式，用于显示哪位作者创建了哪种编程语言（代码清单 11-2）。\n\n```sql\nSELECT author, language\n\
  FROM authors_tbl JOIN newlang_tbl\nON language_id = id;\n```\n\n代码清单 11-2\n使用 `JOIN`（SQL-92）语法重写我们的查询\n\
  \n请注意，我们使用 `JOIN` 关键字，而不是用逗号分隔两个表（从而使其成为列表）。参与连接条件的列前面加上 `ON` 关键字。在指定连接条件（`ON` 子句）之后，如果需要，可以使用\
  \ `WHERE` 子句来指定任何进一步的条件。\n\n那些完全不匹配连接条件的行会被排除在外的连接类型被称为**内连接**。因此，我们可以在查询中选择性地使用完整的关键字\
  \ `INNER JOIN`，而不会影响结果集（代码清单 11-3）。\n\n```sql\nSELECT author, language\nFROM authors_tbl\
  \ INNER JOIN newlang_tbl\nON language_id = id;\n```\n\n代码清单 11-3\n显式指定 `INNER JOIN`\n\
  \n#### 解决连接列中的歧义\n\n在我们的示例中，连接条件字段具有不同的名称——`id` 和 `language_id`。但是，如果在我们的语言表中，我们将键字段命名为\
  \ `language_id` 呢？这将在连接条件中产生歧义，变成令人困惑的 `language_id = language_id`。为了解决这个问题，我们需要通过在该列前添加它所属的表名和一个\
  \ `.`（句点）来限定它（代码清单 11-4）。\n\n| author | language |\n| --- | --- |\n| Ousterhout\
  \ | Tcl |\n\n```sql\nCREATE TABLE languages_tbl\n(language_id INTEGER, language\
  \ VARCHAR(20));\nINSERT INTO languages_tbl VALUES (4, 'Tcl');\nSELECT author, language\n\
  FROM authors_tbl JOIN languages_tbl\nON language_id = language_id;\n=> ERROR:  column\
  \ reference \"language_id\" is ambiguous\nSELECT author, language\nFROM authors_tbl\
  \ JOIN languages_tbl\nON authors_tbl.language_id = languages_tbl.language_id;\n\
  ```\n\n代码清单 11-4\n通过限定列名来解决命名歧义\n\n解决此类歧义的另一种方法是使用表别名来限定列。其概念是给表一个短名称，然后使用这个别名来限定列，而不是使用冗长、笨拙的表名（代码清单\
  \ 11-5）。\n\n```sql\nSELECT author, language\nFROM authors_tbl a JOIN newlang_tbl\
  \ l\nON a.language_id = l.id;\n```\n\n代码清单 11-5\n使用表别名\n\n这里 `authors` 表被赋予别名 `a`，`languages`\
  \ 表被赋予别名 `l`。无论是否存在名称歧义，通常都认为限定连接条件中的列名是一种良好的实践。\n\n\n\n#### 外连接\n\n既然我们在代码清单 11-3\
  \ 中遇到了内连接，这让我们联想到外连接的存在。在这种连接中，结果集由满足连接条件的行以及**其中一个表**中不满足条件的行组成。如果我们希望结果集中包含第一个表中那些不满足条件的行，我们就使用`左外连接`。反之，当需要第二个表中的行时，我们则使用`右外连接`。\n\
  \n这起初听起来有点令人困惑，因此让我们通过一个例子来澄清这个概念。让我们向 `newlang_tbl` 表中添加一行关于 Lisp 编程语言的数据，但我们不会为此在\
  \ `authors` 表中创建任何条目（代码清单 11-6）。\n\n```sql\nINSERT INTO newlang_tbl\nVALUES (6,\
  \ 'Lisp', 1958, 'ANSI');\n```\n\n代码清单 11-6\n添加新行以说明外连接\n\n如果我们像代码清单 11-1 那样对两个表运行\
  \ `内连接` 查询，我们将得到与当时类似的输出。我们添加的这行新数据不会出现在结果集中。但是，让我们尝试一个 `左外连接`，我们明确希望尽管在 `authors`\
  \ 表中没有对应条目，也要让这行新数据出现在结果中。这样，我们的第一个表必须是 `newlang_tbl`，查询将如下所示（代码清单 11-7）。\n\n| 语言\
  \ (language) | 作者 (author) |\n| --- | --- |\n| Prolog | Colmerauer |\n| Perl | Wall\
  \ |\n| APL | Ousterhout |\n| Tcl | Iverson |\n| BASIC | Kemeny |\n| BASIC | Kurtz\
  \ |\n| Lisp | |\n\n```sql\nSELECT language, author\nFROM newlang_tbl n LEFT OUTER\
  \ JOIN authors_tbl a\nON n.id = a.language_id;\n```\n\n代码清单 11-7\n左外连接示例\n\n啊哈，成功了！`左外连接`\
  \ 允许我们将 Lisp 这一行“偷偷”放入结果集，其作者值为 `null`。查看查询清单，如果你立即想到，只需交换连接表的顺序，我们就可以将其转换为 `右外连接`，那么你绝对正确（代码清单\
  \ 11-8）。\n\n```sql\nSELECT language, author\nFROM authors_tbl a RIGHT OUTER JOIN\
  \ newlang_tbl n\nON n.id = a.language_id;\n```\n\n代码清单 11-8\n右外连接示例\n\n此查询的输出将与代码清单\
  \ 11-7 中的完全相同。注意，我们在 `ON` 子句中指定的连接条件不需要任何顺序更改。由于所有的右外连接都可以写成左外连接（反之亦然），因此很少见到右外连接在实际中的许多应用。SQLite\
  \ 甚至完全不支持右外连接，这倒也无妨。\n\n#### 交叉连接\n\n你可能会想，如果我们从查询中省略连接条件会发生什么。运行连接查询时，后台发生的事情是：首先，由参与连接的表生成所有可能的行组合。然后，选择满足连接条件的行进行输出（或进一步处理）。如果我们省略连接条件，作为输出我们将得到所有可能的记录组合（代码清单\
  \ 11-9）。这被称为 `交叉连接` 或表的 `笛卡尔积`，通常用符号 `X` 表示。\n\n| 作者 (author) | 语言 (language) |\n\
  | --- | --- |\n| Colmerauer | Prolog |\n| Colmerauer | Perl |\n| Colmerauer | APL\
  \ |\n| Colmerauer | Tcl |\n| Colmerauer | BASIC |\n| Colmerauer | Lisp |\n| Wall\
  \ | Prolog |\n| Wall | Perl |\n| Wall | APL |\n| Wall | Tcl |\n| Wall | BASIC |\n\
  | Wall | Lisp |\n| Ousterhout | Prolog |\n| … | … |\n\n```sql\nSELECT author, language\n\
  FROM authors_tbl, newlang_tbl;\n```\n\n代码清单 11-9\n显示我们表笛卡尔积的查询\n\n这里的查询输出被截断了，但在你的计算机上运行时，结果集中应该得到\
  \ 36 行，包含每个作者和语言的组合。重写此查询的另一种方法是实际使用 `JOIN` 关键字，并在前面加上 `CROSS` 参数，如下所示（代码清单 11-10）。\n\
  \n```sql\nSELECT author, language\nFROM authors_tbl CROSS JOIN newlang_tbl;\n```\n\
  \n代码清单 11-10\n使用 CROSS JOIN 重写我们的查询\n\n注意这里没有 `ON` 子句，这意味着没有连接条件。\n\n如果我们从 `newlang_tbl`\
  \ 中选择多个列，比如同时选择 `language` 和 `year` 呢？组合的数量会从我们上面的交叉连接急剧增加吗？事实证明不会，结果集中的记录数量将与之前完全相同（代码清单\
  \ 11-11）。笛卡尔积是参与连接的表之间的记录组合，而不是单个表记录单元内的组合。\n\n| 作者 (author) | 语言 (language) | 年份\
  \ (year) |\n| --- | --- | --- |\n| Colmerauer | Prolog | 1972 |\n| Colmerauer |\
  \ Perl | 1987 |\n| Colmerauer | APL | 1964 |\n| … | … | … |\n\n```sql\nSELECT author,\
  \ language, year\nFROM authors_tbl CROSS JOIN newlang_tbl;\n```\n\n代码清单 11-11\n\
  从参与交叉连接的表中选择多列\n\n交叉连接并不是你经常遇到的东西。当其中一张表很小（即只有几行）并且你需要将其所有值与一张更大的表进行组合时，它有一定的用处。然而，我建议不要在实际的生产数据库服务器上运行交叉连接，除非你真的理解为什么在该场景下需要它们。\n\
  \n#### 自连接\n\n有时，一个表在其自身列内包含有意义的数据，但其中一个（或多个）字段引用了同一表中的另一个字段。例如，如果我们有一个表，用于记录哪些编程语言影响了其他编程语言，并通过语言\
  \ ID 表示影响关系，为了显示解析后的输出，我们必须将表与其自身连接。这也称为 `自连接`。请考虑下面创建的表，并密切关注插入的数据（代码清单 11-12）。\n\
  \n| id | 语言 (language) | 受影响于 (influenced_by) |\n| --- | --- | --- |\n| 1 | Fortran\
  \ | |\n| 2 | Pascal | 3 |\n| 3 | Algol | 1 |\n\n```sql\nCREATE TABLE inflang_tbl\
  \ (id INTEGER PRIMARY KEY,\nlanguage VARCHAR(20) NOT NULL,\ninfluenced_by INTEGER);\n\
  \nINSERT INTO inflang_tbl (id, language)\nVALUES (1, 'Fortran');\n\nINSERT INTO\
  \ inflang_tbl (id, language, influenced_by)\nVALUES (2, 'Pascal', 3);\n\nINSERT\
  \ INTO inflang_tbl (id, language, influenced_by)\nVALUES (3, 'Algol', 1);\n```\n\
  \n代码清单 11-12\n创建并填充我们的语言影响表\n\n我们现在的目标是编写一个 `自连接` 查询，以显示哪种语言影响了哪一种，即解析 `influenced_by`\
  \ 列（代码清单 11-13）。\n\n| id | 语言 (language) | 被影响 (influenced) |\n| --- | --- | ---\
  \ |\n| 3 | Algol | Pascal |\n| 1 | Fortran | Algol |\n\n```sql\nSELECT l1.id,\n\
  \       l1.language,\n       l2.language AS influenced\nFROM inflang_tbl l1, inflang_tbl\
  \ l2\nWHERE l1.id = l2.influenced_by;\n```\n\n代码清单 11-13\n运行自连接查询\n\n注意这里使用了表别名来限定连接条件列，并将其区分开，同时使用了\
  \ `AS` 关键字在输出中重命名列。\n\n如果我们想使用另一种 SQL-92 的 `JOIN` 语法来进行自连接呢？事实证明，没有特殊的 `自连接` 关键字或子句，因为不需要。对于\
  \ SQL 查询解释器来说，你是在两个内容恰好完全相同的表上创建了一个 `内连接`。因此，我们可以使用熟悉的 `JOIN` 关键字重写代码清单 11-13 的查询，如下所示（代码清单\
  \ 11-14）。\n\n```sql\nSELECT l1.id,\n       l1.language,\n       l2.language AS influenced\n\
  FROM inflang_tbl l1 JOIN inflang_tbl l2\nON l1.id = l2.influenced_by;\n```\n\n代码清单\
  \ 11-14\n使用 JOIN 运行自连接查询\n\n\n\n#### 非等值连接\n\n到目前为止我们看到的连接，其连接条件主要处理的是相等关系。虽然这是将表连接在一起的最常见方式，但我们绝不限于只使用相等条件。这次，让我们在\
  \ `newlang_tbl` 和 `authors_tbl` 表之间，对 `id` 和 `author_id` 字段设定另一个连接条件（清单 11-15）。\n\
  \n| id | author_id | author | language |\n| --- | --- | --- | --- |\n| 1 | 2 | Wall\
  \ | Prolog |\n| 1 | 3 | Ousterhout | Prolog |\n| 2 | 3 | Ousterhout | Perl |\n|\
  \ 1 | 4 | Iverson | Prolog |\n| 2 | 4 | Iverson | Perl |\n| 3 | 4 | Iverson | APL\
  \ |\n| 1 | 5 | Kemeny | Prolog |\n| 2 | 5 | Kemeny | Perl |\n| 3 | 5 | Kemeny |\
  \ APL |\n| 4 | 5 | Kemeny | Tcl |\n| 1 | 6 | Kurtz | Prolog |\n| 2 | 6 | Kurtz |\
  \ Perl |\n| 3 | 6 | Kurtz | APL |\n| 4 | 6 | Kurtz | Tcl |\n| 5 | 6 | Kurtz | BASIC\
  \ |\n\n```\nSELECT id,\nauthor_id,\nauthor,\nlanguage\nFROM authors_tbl, newlang_tbl\n\
  WHERE id < author_id;\nListing 11-15\n一个非等值连接\n```\n\n虽然结果在逻辑上不是最合理的，但它确实满足了我们的非等值连接条件，即每一行中\
  \ `id` 字段的值都小于对应的 `author_id` 字段值。我们还可以使用熟悉的 `AND` 运算符，在同一查询中自由地将此结果与等值条件混合（清单 11-16）。\n\
  \n| id | author_id | author | language |\n| --- | --- | --- | --- |\n| 3 | 4 | Iverson\
  \ | APL |\n| 5 | 6 | Kurtz | BASIC |\n\n```\nSELECT id,\nauthor_id,\nauthor,\nlanguage\n\
  FROM authors_tbl, newlang_tbl\nWHERE id < author_id\nAND id = language_id;\nListing\
  \ 11-16\n同时使用等值和非等值条件\n```\n\n现在的结果包含这样的记录：语言作者的 `author_id` 值大于他们所创建语言的 `id`。\n\
  \n## 12. 子查询\n\n简而言之，子查询是作为更大语句一部分编写的查询。可以将其视为另一个 `SELECT` 语句内部的 `SELECT` 语句。内部\
  \ `SELECT` 的结果随后可以在外部查询中使用。让我们用一个简单的例子来说明。\n\n考虑与连接章节中相同的源表——`authors_tbl` 和 `newlang_tbl`。我们将尝试编写一个查询（和一个子查询）来显示特定语言的作者（清单\
  \ 12-1）。\n\n```\nSELECT author FROM authors_tbl\nWHERE language_id IN\n( SELECT\
  \ id FROM newlang_tbl\nWHERE language=\"Tcl\");\nListing 12-1\n一个简单的子查询示例\n\n![A457348_1_En_12_Figa_HTML.gif](img/A457348_1_En_12_Figa_HTML.gif)\n\
  ```\n\n子查询 `SELECT id FROM newlang_tbl WHERE language='Tcl'` 从 `newlang_tbl` 中选取正确的语言\
  \ `id`，并将其传递给针对作者表的外部查询。这使我们免于使用语言 `id` 字段连接两个表的责任。\n\n我们可以想象一下子查询已经解析为一个值的中间步骤。查询现在看起来像这样：`SELECT\
  \ author FROM authors_tbl WHERE language_id IN (4)`。\n\n在特定情况下采用哪种方法——连接、子查询或两者结合——主要取决于个人偏好。而在其他时候，一种方法显然是更优的选择。请记住，所有连接都可以改写为子查询，但反之则并非在所有情况下都成立。\n\
  \n##### 子查询的类型\n\n我们可以大致将子查询分为三类。\n\n1.  **标量子查询** 一种仅返回单行单列作为其输出的子查询。上一节中的示例，子查询返回\
  \ Tcl 的 `id`，就是一个标量子查询。\n2.  **行子查询** 一种返回单行但多列的子查询。这是最不重要的子查询类型，因为大多数数据库管理系统不支持它，包括\
  \ SQLite。\n3.  **表子查询** 表子查询可以返回多行，并且每行可以包含多列。本质上，它可以返回一个表本身来参与你的外部查询。\n\n为了说明表子查询的用法，让我们举一个例子，我们希望显示所有在\
  \ 1980 年之后创建了语言的编程语言作者（清单 12-2）。\n\n| author | language |\n| --- | --- |\n| Wall\
  \ | Perl |\n| Ousterhout | Tcl |\n\n```\nSELECT author, language\nFROM authors_tbl\
  \ a,\n(SELECT id, language\nFROM newlang_tbl\nWHERE year > 1980) n\nWHERE a.language_id\
  \ = n.id;\nListing 12-2\n一个表子查询示例\n```\n\n仔细研究上面查询的 `FROM` 子句。我们的表子查询放在其中，它返回一组在\
  \ 1980 年之后创建的语言。结果包含两行两列，其中一列，即 `language`，被选取用于最终输出。\n\n##### 子查询中的存在性测试\n\n关键字\
  \ `EXISTS` 测试子查询返回的行数是否存在。我们通常不关心子查询返回的列，只关心是否存在满足特定条件的行。让我们尝试使用 `EXISTS` 测试来显示在\
  \ `authors_tbl` 中有作者条目的语言（清单 12-3）。\n\n| language | year |\n| --- | --- |\n| Prolog\
  \ | 1972 |\n| Perl | 1987 |\n| APL | 1964 |\n| Tcl | 1988 |\n| BASIC | 1964 |\n\n\
  ```\nSELECT language,\nyear\nFROM newlang_tbl\nWHERE EXISTS (SELECT * FROM authors_tbl\n\
  WHERE newlang_tbl.id = language_id);\nListing 12-3\n使用存在性测试\n```\n\n注意本例中的子查询 `WHERE`\
  \ 子句。它有效地使用 `newlang_tbl.id` 引用了外部表的字段。对于满足此存在性测试的任何语言，外部查询都会将其加入结果集。\n\n我们可以在存在性测试中添加\
  \ `NOT` 选项来查找结果的补集（清单 12-4）。\n\n```\nSELECT language,\nyear\nFROM newlang_tbl\n\
  WHERE NOT EXISTS (SELECT * FROM authors_tbl\nWHERE newlang_tbl.id = language_id);\n\
  Listing 12-4\n在存在性测试中使用 NOT\n```\n\n| language | year |\n| --- | --- |\n| Lisp |\
  \ 1958 |\n\n回想一下，我们在上一章中从未在作者表中为 Lisp 放入相应的条目。\n\n那么，到底是谁创造了 Lisp？\n\nLisp 是第二古老的编程语言，其主要方言至今仍被积极使用。John\
  \ McCarthy 在 1958 年作为其研究的一部分创建了 Lisp，其他人也纷纷加入，帮助在当时的计算机上实现它。\n\nMcCarthy 普遍被认为是一位天才级的智者，深受同行钦佩。他是人工智能领域的先驱之一，甚至创造了这个术语。随着\
  \ Lisp 的创建，他在编程语言设计领域取得了巨大的飞跃。在过去的三十年里，Lisp 的特性正慢慢渗入主流编程语言。许多著名的技术专家仍然对已有数十年历史的\
  \ Lisp 方言——Common Lisp 和 Scheme——的设计感到惊叹。\n\n尽管 McCarthy 于 2011 年去世，享年 84 岁，但他的遗产和工作仍然存在。\n\
  \n\n\n#### 在 INSERT 语句中使用子查询\n\n我们甚至可以在其他 SQL 语句（如`INSERT`）中使用子查询。让我们尝试向表中添加一种新语言和一个新作者，并通过使用子查询来略微简化我们记忆\
  \ ID 号码的任务（参见列表 12-5）。\n\n```\nINSERT INTO newlang_tbl\n(id, language, year, standard)\n\
  VALUES (7, 'Pascal', 1970, 'ISO');\n列表 12-5\n插入一种新的编程语言\n```\n\n现在，我们编程语言表更新后的内容如下所示（表\
  \ 12-1）。\n\n表 12-1\n\n`newlang_tbl`的内容\n\n| id | language | year | standard |\n\
  | --- | --- | --- | --- |\n| 1 | Prolog | 1972 | ISO |\n| 2 | Perl | 1987 |   |\n\
  | 3 | APL | 1964 | ANSI |\n| 4 | Tcl | 1988 |   |\n| 5 | BASIC | 1964 | ANSI |\n\
  | 6 | Lisp | 1958 | ANSI |\n| 7 | Pascal | 1970 | ISO |\n\n在向`authors_tbl`插入新条目时，我们既可以记住为\
  \ Pascal 使用的`language_id`是 7，也可以使用一个子查询。让我们看看后一种方法的例子（列表 12-6）。毕竟，章节的标题已经揭示了我们的方法！\n\
  \n```\nINSERT INTO authors_tbl\n(author_id, author, language_id)\nVALUES (7, 'Wirth',\n\
  (SELECT id FROM newlang_tbl WHERE language=\"Pascal\")\n);\n列表 12-6\n使用子查询插入新作者\n\
  ```\n\n我们相信这应该会为 Wirth 先生设置正确的语言 ID，因为他创造了 Pascal。让我们通过查看表的内容来验证这一信念。\n\n| author_id\
  \ | author | language_id |\n| --- | --- | --- |\n| 1 | Colmerauer | 1 |\n| 2 | Wall\
  \ | 2 |\n| 3 | Ousterhout | 4 |\n| 4 | Iverson | 3 |\n| 5 | Kemeny | 5 |\n| 6 |\
  \ Kurtz | 5 |\n| 7 | Wirth | 7 |\n\n你甚至可以使用子查询来控制你的`UPDATE`和`DELETE`语句。其逻辑与在`SELECT`和`INSERT`中使用子查询基本一致。\n\
  \n#### 使用 ANY 和 ALL\n\n`ANY`运算符与算术比较运算符一起使用，可用于将列值与子查询生成的一个或多个类似值进行比较。例如，如果我们想显示所有语言但排除最古老的一种，我们可以结合使用`>`和`ANY`来实现（列表\
  \ 12-7）。\n\n| language |\n| --- |\n| Prolog |\n| Perl |\n| APL |\n| Tcl |\n| BASIC\
  \ |\n| Pascal |\n\n```\nSELECT language\nFROM newlang_tbl\nWHERE year > ANY (SELECT\
  \ year FROM newlang_tbl);\n列表 12-7\n使用 ANY 运算符\n```\n\n只有`Lisp`的创建年份并不大于子查询返回的任何值列表中的任何一个值。显然，这是因为返回的最小值是`Lisp`本身的创建年份，因此它没有出现在最终结果中。\n\
  \n那么，如果我们把比较运算符反转为`< ANY`会怎样呢？结果将包括其年份值小于子查询返回的任何一个创建年份的所有语言（列表 12-8）。\n\n| language\
  \ |\n| --- |\n| Prolog |\n| Perl |\n| APL |\n| BASIC |\n| Lisp |\n| Pascal |\n\n\
  ```\nSELECT language\nFROM newlang_tbl\nWHERE year < ANY (SELECT year FROM newlang_tbl);\n\
  列表 12-8\n与<一起使用 ANY 运算符\n```\n\n我们注意到`Lisp`已经悄悄进入了结果集，而`Tcl`则明显缺席。这是因为`Tcl`的年份，即\
  \ 1988 年，并不小于子查询返回的任何值。等于？当然，但不是明确地小于。\n\n我们可以与`ANY`一起使用的另一个比较连词是`=`，但这很少见，因为它等同于使用`IN`，而后者要直观得多。\n\
  \n**SQLite 不支持 ANY 或 ALL 运算符**\n\n如果你尝试在 SQLite 中运行上面的例子，你会得到如下的错误信息。\n\n```\nError:\
  \ near \"SELECT\": syntax error\n```\n\nSQLite 目前不支持这些关键字，但我们仍然可以使用现有的工具来实现相同的结果。让我们尝试重写列表\
  \ 12-7，显示除最古老语言之外的所有语言。\n\n```\nSELECT language FROM newlang_tbl\nWHERE year > (SELECT\
  \ MIN(year) FROM newlang_tbl);\n```\n\n上面的查询很好地计算出了我们期望的结果集，并且相当易读。有些人，包括本作者本人，实际上更喜欢它而不是`ANY`语法。如果你对`<>`感到疑惑，它的意思是“不等于”。\n\
  \n`ALL`运算符的工作方式类似，但`WHERE`子句中的值必须对于子查询返回的所有值都成立（列表 12-9）。`ALL`的一个使用场景是查找与极值（如最小值和最大值）相关的数据。你当然也可以自由选择内置函数`MAX`和`MIN`来实现此目的。\n\
  \n```\nSELECT language\nFROM newlang_tbl\nWHERE year <= ALL (SELECT year FROM newlang_tbl);\n\
  列表 12-9\n使用 ALL 运算符\n```\n\n![A457348_1_En_12_Figb_HTML.gif](img/A457348_1_En_12_Figb_HTML.gif)\n\
  \n只有`Lisp`作为我们表中最古老的语言，会满足`ALL`标准，即其年份值小于或等于子查询中的所有值。同样，我们可以使用`ALL`来查找最新的语言（列表 12-10）。\n\
  \n```\nSELECT language\nFROM newlang_tbl\nWHERE year >= ALL (SELECT year FROM newlang_tbl);\n\
  列表 12-10\n与>=一起使用 ALL 运算符\n```\n\n![A457348_1_En_12_Figc_HTML.gif](img/A457348_1_En_12_Figc_HTML.gif)\n\
  \n### 13. 集合操作\n\n集合论是离散数学的一个分支，处理对象的集合。集合论与关系数据库概念之间有大量的概念重叠。难怪查询的输出经常被称为结果集。\n\
  \n原始的集合理论操作，如并集、交集和差集，在各种实现中得到了越来越多的支持。我们现在将探索这些操作背后的理论以及如何在 SQL 中使用它们。\n\n\n\n\
  #### 并集\n\n并集是一种将两个集合的元素组合起来的操作。假设我们有以下两个由一堆数字组成的集合（见代码清单 13-1）。\n\n```\nset1 =\
  \ { 1, 3, 5 }\nset2 = { 1, 2, 3 }\n代码清单 13-1\n包含数字的两个集合\n```\n\n得到的并集将是一个由所有这些元素组成的集合，每个元素恰好出现一次，即不允许重复（见代码清单\
  \ 13-2）。请注意，集合的顺序无关紧要。可以将其视为一个元素的袋子，而不是一个有序的集合。\n\n```\nset1 UNION set2 = { 1, 3,\
  \ 5, 2 }\n代码清单 13-2\n数学上的并集（UNION）操作\n```\n\n现在让我们看看如何在 SQL 中模拟并集操作。回顾一下我们在第 10\
  \ 章最后使用的编程语言表及其数据（见表 13-1）。\n\n表 13-1\n`proglang_tbl` 表的内容\n\n| id | 语言 (language)\
  \ | 作者 (author) | 年份 (year) | 标准 (standard) |\n| --- | --- | --- | --- | --- |\n\
  | 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |   |\n| 3 |\
  \ APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL | Schwartz | 1959 | US-DOD |\n| 5\
  \ | APT | Ross | 1959 | ISO |\n| 6 | PL/I | IBM | 1964 | ECMA |\n| 7 | Tcl | Ousterhout\
  \ | 1988 |   |\n| 8 | Fortran | Backus | 1957 | ANSI |\n\n如果我们想获取那些由 `ANSI` 或 `ISO`\
  \ 标准化的语言的创建年份列表，我们可以使用 `UNION` 关键字来实现（见代码清单 13-3）。\n\n| 年份 (year) |\n| --- |\n|\
  \ 1959 |\n| 1957 |\n| 1964 |\n| 1972 |\n\n```\nSELECT year FROM proglang_tbl\nWHERE\
  \ standard=\"ANSI\"\nUNION\nSELECT year FROM proglang_tbl\nWHERE standard=\"ISO\"\
  ;\n代码清单 13-3\n使用 UNION 操作符\n```\n\n由于我们的表中有四条记录的 `standard` 值为 `ANSI` 或 `ISO`，因此结果集中得到了预期的四行数据。请注意，这里没有需要处理的重复条目。但是，如果使用\
  \ `UNION` 操作时存在需要处理的重复条目会怎样呢（见代码清单 13-4）？\n\n```\nSELECT standard FROM proglang_tbl\n\
  WHERE language = 'Fortran'\nUNION\nSELECT standard FROM proglang_tbl\nWHERE language\
  \ = 'APL';\n代码清单 13-4\n使用 UNION 操作符消除重复值\n```\n\n![A457348_1_En_13_Figa_HTML.jpg](img/A457348_1_En_13_Figa_HTML.jpg)\n\
  \n我们在 `WHERE` 子句中指定的两种语言都是由 `ANSI` 标准化的。`UNION` 操作，就像在离散数学中一样，移除了重复的值，并输出单行作为结果。\n\
  \n还有另一个相关的 SQL 操作 `UNION ALL`，它会模拟组合操作但不会消除重复项（见代码清单 13-5）。使用这个操作的优点是性能提升，因为 SQL\
  \ 引擎不必费心检查重复项。如果你构建的参与查询的方式确保没有重复值，那么使用 `UNION ALL` 将提高你的查询处理时间。\n\n| 标准 (standard)\
  \ |\n| --- |\n| ANSI |\n| ANSI |\n\n```\nSELECT standard FROM proglang_tbl\nWHERE\
  \ language = 'Fortran'\nUNION ALL\nSELECT standard FROM proglang_tbl\nWHERE language\
  \ = 'APL';\n代码清单 13-5\n使用 UNION ALL 操作符\n```\n\n#### 交集\n\n交集操作仅输出输入集合中的共同元素。如果我们将交集应用于上一节中的两个集合，我们会得到一个包含两个元素的结果集（见代码清单\
  \ 13-6）。\n\n```\nset1 INTERSECTION set2 = { 1, 3 }\n代码清单 13-6\n数学上的交集（INTERSECTION）操作\n\
  ```\n\n与并集一样，每个共同值只显示一次。重复项会从最终结果集中移除。\n\n将其转换为 SQL 非常简单；我们不是使用 `UNION`，而是使用关键字\
  \ `INTERSECT` 来获取共同元素（见代码清单 13-7）。\n\n```\nSELECT standard FROM proglang_tbl\nWHERE\
  \ year=1964\nINTERSECT\nSELECT standard FROM proglang_tbl\nWHERE year=1957;\n代码清单\
  \ 13-7\n在 SQL 中使用 INTERSECT\n```\n\n![A457348_1_En_13_Figb_HTML.jpg](img/A457348_1_En_13_Figb_HTML.jpg)\n\
  \n这里需要记住的一点是，`INTERSECT` 操作符会查找其前后两个查询之间完全相同的公共值。这意味着是整个记录的公共值，而不仅仅是部分字段的公共值。虽然在之前的例子中，我们的结果集只有一列需要返回——`standard`，但让我们看看当我们在结果列表中添加另一列时会发生什么（见代码清单\
  \ 13-8）。\n\n```\nSELECT year, standard FROM proglang_tbl\nWHERE year=1964\nINTERSECT\n\
  SELECT year, standard FROM proglang_tbl\nWHERE year=1957;\n=> (0 rows)\n代码清单 13-8\n\
  在结果中使用包含多列的 INTERSECT\n```\n\n输出结果是空，没有任何行。第一个查询会选择 `PL/I` 和 `APL` 的记录，而第二个查询会选择\
  \ `Fortran`。但这些语言的 (`year`, `standard`) 组合值都不同，因此给我们的是零结果。\n\n请注意，虽然 `ANSI` SQL\
  \ 标准规定了 `INTERSECT ALL` 操作符，但我尚未遇到实现它的数据库管理系统。`PostgreSQL` 会愉快地忽略你写的 `ALL` 子句，只是简单地返回一个\
  \ `INTERSECT` 结果。\n\n\n\n"
- "# 差集\n\n集合之间的差集运算，写作 `set1 - set2`，表示所有在 `set1` 中但不在 `set2` 中的元素列表（参见代码清单 13-9）。如果某个元素仅存在于\
  \ `set2` 中，它不会被简单的差集运算所捕获。\n\n```\nset1 DIFFERENCE set2 = { 5 }\nset2 DIFFERENCE\
  \ set1 = { 2 }\nListing 13-9\n数学的 DIFFERENCE 操作\n```\n\n让我们尝试使用熟悉的 `IN` 和 `NOT IN`\
  \ 操作符来编写一个模拟此逻辑的 SQL 语句。但首先，我们需要向表中插入一行数据，以便观察差集运算的实际效果（参见代码清单 13-10）。\n\n```\n\
  INSERT INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n(9, 'RPG',\
  \ 'IBM', 1964, 'ISO');\nListing 13-10\n为 RPG 插入新行\n```\n\n假设我们希望列出那些由 ISO 标准化而非由\
  \ ANSI 标准化的编程语言的创建年份（参见代码清单 13-11）。从源表中，我们发现有三种语言由 ISO 标准化，年份分别是 1972 年、1959 年和\
  \ 1964 年。但由于在 1964 年，APL 语言被创建，并最终由 ANSI 标准化，理想情况下，我们得到的答案应该是 1972 年和 1959 年。\n\n\
  | year |\n| --- |\n| 1972 |\n| 1959 |\n| 1964 |\n\n```\nSELECT year FROM proglang_tbl\n\
  WHERE standard IN ('ISO')\nAND standard NOT IN ('ANSI');\nListing 13-11\n尝试用 IN\
  \ 编写集合差集\n```\n\n哇，这是什么魔法！我们以为 1964 年会因为 ANSI 标准化而被排除。但显然情况并非如此。实际发生的情况是，首先扫描了 ISO\
  \ 的行——得到三个值。然后，ANSI 的行被排除，但排除的范围是整张表，而不一定是第一次扫描的结果。因此，虽然 1964 年的 APL 被排除了，但新插入的\
  \ 1964 年的 RPG 仍然保留了下来，这实际上使我们的第二个条件失效了。实现此目的的正确方法是使用差集运算符 `EXCEPT`，如下所示（参见代码清单 13-12）。\n\
  \n| year |\n| --- |\n| 1972 |\n| 1959 |\n\n```\nSELECT year FROM proglang_tbl WHERE\
  \ standard IN ('ISO')\nEXCEPT\nSELECT year FROM proglang_tbl WHERE standard IN ('ANSI');\n\
  Listing 13-12\n使用 EXCEPT 的集合差集\n```\n\n瞧，这似乎得出了正确的答案！如果你使用的是 Oracle 系统，请用 `MINUS`\
  \ 替换 `EXCEPT` 来获得完全相同的结果。\n\n当我们在一个查询中编写多个 `SELECT` 语句，并使用集合理论运算符（如 `UNION`）将它们连接起来时，这样的语句被称为复合查询。需要注意的是，许多数据库管理系统限制将复合查询作为子查询使用。Sybase\
  \ Adaptive Server Enterprise 就是这样一个流行的 DBMS，它不允许你在子查询中编写 `UNION`。\n\n### 14. 视图\n\
  \n关系数据模型和 SQL 的一个美妙之处在于，查询的输出本身也是一个表，确切地说是一个关系。它可能只包含一列或一行，但它仍然是一个表。视图就是一个可以像表一样使用的查询。\n\
  \n你可以把它想象成一个虚拟表，为了查看者的方便，它存储了一个预先计算好的结果集。它并不像基础表那样真实存在，而是提供了一个不同的视角来查看数据，省去了处理繁琐细节的麻烦。\n\
  \n#### 为什么需要视图？\n\n大多数生产数据库系统都会包含大量的表。由于领域的复杂性，其中一些表可能包含大量的字段。视图可以为临时数据库用户（即并非数据库系统所有部分的专家）提供帮助。他们有特定的、重复性的需求，而视图为他们提供了访问所需数据的一个更简单的接口。\n\
  \n视图带来的另一个优势是安全性。我们可以限制对基础表的访问，只提供包含特定用户组被允许查看的数据的视图。良好的数据库设计规则常常迫使敏感列与经常访问的字段放在一起。在这种情况下，如果你选择隐藏敏感列，视图可以有效地解决这个问题。\n\
  \n对于数据库设计者来说，视图提供了独立性。在合理的程度上，视图允许底层基础表改变其结构以适应不断变化的需求，而视图本身可以保持不变。在其他情况下，可以重新创建视图，其底层的查询可能不同，但它将以相同的格式包含相同的数据，从而为用户提供连续性。\n\
  \n#### 创建视图\n\n创建视图的基本语法非常简单（参见代码清单 14-1）。实际上，它可能就像你所能做到的那样精简和自然。\n\n```\nCREATE\
  \ VIEW <view_name> AS <select_statement>\nListing 14-1\n视图创建的通用语法\n```\n\n现在让我们为自己创建一个视图——`language_chronology`，它将只有两个字段，即语言及其创建年份（参见代码清单\
  \ 14-2）。\n\n```\nCREATE VIEW language_chronology AS\nSELECT language, year\nFROM\
  \ proglang_tbl\nORDER BY year ASC;\nListing 14-2\n创建一个 language_chronology 视图\n\
  ```\n\n请注意，我们如何在视图创建中显式添加了排序子句。对于 `CREATE VIEW` 查询部分允许的内容，限制非常少。现在让我们通过像查询表一样查询视图来验证结果（参见代码清单\
  \ 14-3）。\n\n| language | year |\n| --- | --- |\n| Fortran | 1957 |\n| JOVIAL | 1959\
  \ |\n| APT | 1959 |\n| RPG | 1964 |\n| APL | 1964 |\n| PL/I | 1964 |\n| Prolog |\
  \ 1972 |\n| Perl | 1987 |\n| Tcl | 1988 |\n\n```\nSELECT * FROM language_chronology;\n\
  Listing 14-3\n列出视图内容\n```\n\n我们还可以在视图创建的查询部分包含计算字段。我们必须记住的唯一一点是如何重命名计算字段列，否则无疑会导致清晰度下降。让我们根据第\
  \ 9 章的十年查询重新创建一个视图（参见代码清单 14-4）。\n\n| language | decade |\n| --- | --- |\n| Prolog\
  \ | The 1970s |\n| Perl | The 1980s |\n| APL | The 1960s |\n| JOVIAL | The 1950s\
  \ |\n| APT | The 1950s |\n| Tcl | The 1980s |\n| PL/I | The 1960s |\n| Fortran |\
  \ The 1950s |\n| RPG | The 1960s |\n\n```\nCREATE VIEW language_decade AS\nSELECT\
  \ language,\n'The '||((year/10)*10)||'s' decade\nFROM proglang_tbl;\nListing 14-4\n\
  创建带有计算字段的视图\n```\n\n如果我们未能将列重命名为 `decade`，我们的 DBMS 系统会执行视图创建，但结果视图实际上将无法使用。PostgreSQL\
  \ 可能会将列重命名为神秘的 `?column?`，而 SQLite 则会将整个表达式 `'The '||((year/10)*10)||'s'` 作为第二个字段的名称。不用说，我们最好重命名视图的字段。\n\
  \n另一种重命名字段的方法是在视图定义子句中指定，而不是在填充它的查询中指定（参见代码清单 14-5）。这种方法同样有效，并且可以说更清晰，因为它预先列出了所有字段。\n\
  \n| lang | era |\n| --- | --- |\n| APL | The 1960s |\n| JOVIAL | The 1950s |\n|\
  \ APT | The 1950s |\n| PL/I | The 1960s |\n| Fortran | The 1950s |\n| RPG | The\
  \ 1960s |\n\n```\nCREATE VIEW language_era (lang, era) AS\nSELECT language,\n'The\
  \ '||((year/10)*10)||'s'\nFROM proglang_tbl\nWHERE year < 1971;\nListing 14-5\n\
  在视图定义子句中重命名字段\n```\n\n如果你选择这种重命名列的方法，你必须指定视图中所有列的名称。请注意，重命名字段不会影响其数据类型或可空状态。\n\n\
  \n\n#### 通过视图修改数据\n\n关于通过视图修改数据是否是个好主意，存在着广泛的不同意见。有些人倾向于将视图视为只读的内容列表，但大多数数据库管理系统（DBMS）都提供了一些通过视图修改数据的能力。\n\
  \n让我们首先尝试通过我们的 `language_chronology` 表（清单 14-6）对 `year` 列进行一次简单的更新。请记住，我们将 `year`\
  \ 字段连同语言名称一起拉入了视图。\n\n```sql\nUPDATE language_chronology\nSET year=1977\nWHERE language=\"\
  Fortran\";\n清单 14-6\n通过行更新值\n```\n\n该语句在 PostgreSQL 中执行成功。现在，为了验证它是否真的产生了影响，让我们先验证视图的内容（清单\
  \ 14-7）。\n\n| language | year |\n| --- | --- |\n| Fortran | 1977 |\n\n```sql\nSELECT\
  \ * FROM language_chronology\nWHERE language=\"Fortran\";\n清单 14-7\n检查我们修改后的视图内容\n\
  ```\n\n视图中一切似乎都符合预期。虽然我们隐约感觉到基表也应该被更新了，但让我们也验证一下这一点（清单 14-8）。\n\n| id | language\
  \ | author | year | standard |\n| --- | --- | --- | --- | --- |\n| 8 | Fortran |\
  \ Backus | 1977 | ANSI |\n\n```sql\nSELECT * FROM proglang_tbl\nWHERE language=\"\
  Fortran\";\n清单 14-8\n检查我们的基表内容\n```\n\n这也意味着，另一个依赖于 `proglang_tbl` 的视图 `language_era`\
  \ 将不再包含 Fortran 的行，因为它的创建使用了条件 `WHERE year < 1971`。随着底层基表内容随时间变化，记录会在视图中移入移出。\n\n\
  ##### SQLite 中的视图修改\n\n如果你尝试在 SQLite 中执行此 `UPDATE` 命令，它会抛出一个类似这样的错误：\n\n```sql\n\
  Error: cannot modify language_chronology because it is a view\n```\n\nSQLite 明确表示它不允许通过视图修改数据。我碰巧同意这个设计选择。\n\
  \n让我们尝试另一次数据修改，但这次我们将尝试更新视图 `language_era` 内部的计算字段（清单 14-9）。我们知道 `JOVIAL` 是在 `1959`\
  \ 年创造的，因此我们希望四舍五入这个值，使其 `era` 变为 `The 1960s`。\n\n```sql\nUPDATE language_era SET\
  \ era='The 1960s'\nWHERE lang=\"JOVIAL\";\n> ERROR:  cannot update column \"era\"\
  \ of view \"language_era\"\n> DETAIL:  View columns that are not columns of their\
  \ base relation are not updatable.\n清单 14-9\n尝试修改视图的计算字段\n```\n\nDBMS 拒绝了我们更新计算字段的请求，因为\
  \ `era` 在基表 `proglang_tbl` 中并不存在。如果我们想一想，这很合理，因为 SQL 解释器不知道要在基表中放入哪个 `year` 值。从\
  \ `1960` 到 `1969` 之间的任何值都会使 `era` 值变为 `The 1960s`。DBMS 不会尝试选择任何随机值，因为它的推理将是模糊不清的。\n\
  \n更改同一视图的 `lang` 字段则是完全明确的，因此是被允许的（清单 14-10）。\n\n| id | language | author | year\
  \ | standard |\n| --- | --- | --- | --- | --- |\n| 4 | Jovial | Schwartz | 1959\
  \ | US-DOD |\n\n```sql\nUPDATE language_era SET lang=\"Jovial\"\nWHERE lang=\"JOVIAL\"\
  ;\n> UPDATE 1\nSELECT * FROM proglang_tbl\nWHERE id=4;\n清单 14-10\n修改视图非计算字段的查询\n\
  ```\n\n类似地，我们可以使用 `GROUP BY` 子句创建包含聚合列的视图，但不允许修改此类视图的内容（清单 14-11）。\n\n| standard\
  \ | count |\n| --- | --- |\n|   | 2 |\n| ECMA | 1 |\n| ANSI | 2 |\n| ISO | 3 |\n\
  | US-DOD | 1 |\n\n```sql\nCREATE VIEW standards AS\nSELECT standard, count(*)\n\
  FROM proglang_tbl\nGROUP BY standard;\n清单 14-11\n创建包含聚合列的视图\n```\n\n我们从之前的经验中知道，添加新行或修改聚合列将是模糊的，因此不被允许。但是，如果我们尝试像处理\
  \ `JOVIAL` 那样仅更新 `standard` 字段值会怎样（清单 14-12）？更新会反映到包含该字段值的所有行吗？\n\n```sql\nUPDATE\
  \ standards SET standard=\"IS\"\nWHERE standard=\"ISO\";\n> ERROR:  cannot update\
  \ view \"standards\"\n> DETAIL:  Views containing GROUP BY are not automatically\
  \ updatable.\n> HINT:  To enable updating the view, provide an INSTEAD OF UPDATE\
  \ trigger or an unconditional ON UPDATE DO INSTEAD rule.\n清单 14-12\n尝试修改聚合视图中的字段值\n\
  ```\n\n该操作被禁止，但 PostgreSQL 给了我们一个提示，告诉我们如何实现这一目标。虽然我们不会介绍该技术，但知道在极少数需要它的情况下，它在某些数据库系统中是可用的，这很好。\n\
  \n##### 删除视图\n\n要完全删除或移除一个视图，我们使用 `DROP VIEW` 命令。它与我们在第 4 章看到的 `DROP TABLE` 命令非常相似（清单\
  \ 14-13）。\n\n```sql\nDROP VIEW standards;\n清单 14-13\n删除一个视图\n```\n\n请注意，你不能意外地使用\
  \ `DROP VIEW` 删除表，这让人松了一口气（清单 14-14）。\n\n```sql\nDROP VIEW proglang_tbl;\n> ERROR:\
  \  \"proglang_tbl\" is not a view\n> HINT:  Use DROP TABLE to remove a table.\n\
  清单 14-14\n尝试删除视图（实为表）\n```\n\n### 15. 索引\n\n长期以来，数据库一直是获取洞察的主要数据存储组件。随着企业越来越多地采用技术支持的工作流程，数据生成率已大幅增长。随着互联网和移动计算的采用，这一趋势加速发展。\n\
  \n在 20 世纪 90 年代，一个规模合适的关联数据库通常只有几百兆字节。如今，听到数据库系统达到几百千兆字节甚至几太字节的情况并不少见。作为一名专业人士，你经常会遇到包含数百万行的表。\n\
  \n到目前为止，我们已经学习了 SQL 中允许你执行操作和运行查询的部分，但我们还没有触及任何接近性能调优的内容。当你想在包含数百万条记录的表上运行查询时，认真考虑性能优化不是可选项。\n\
  \n最常见的性能优化技术之一是索引。索引允许 SQL 引擎在表中快速查找特定记录。这就像当你想知道单词 \"wistful\" 的含义时，直接跳到字典中的字母\
  \ W 一样。从 A 开始按顺序翻阅所有页面直到找到目标单词会相当繁琐。\n\n本章中的许多命令都是特定于所使用的 DBMS 的。虽然索引的基本概念以及创建和删除索引的基本命令在不同产品之间保持相似，但无法回避的事实是，随着我们深入\
  \ SQL 之旅，基于供应商的差异会变得更加明显。\n\n\n\n#### 创建索引\n\n与 SQL 中的大多数语句一样，创建索引非常简单。你可以使用 `CREATE\
  \ INDEX` 命令来完成这个操作（参见代码清单 15-1）。\n\n```\nCREATE INDEX  ON  ();\n代码清单 15-1\nCREATE\
  \ INDEX 的通用语法\n```\n\n让我们在 `proglang_tbl` 表的 `language` 列上创建一个简单的索引（代码清单 15-2）。我们做一个合理的假设：将会有大量查询在\
  \ `WHERE` 子句中使用 `language` 字段，在其上创建索引将会提升性能。\n\n```\nCREATE INDEX language_idx ON\
  \ proglang_tbl(language);\n代码清单 15-2\n在 proglang_tbl 上创建索引\n```\n\n如果此命令在 `psql`\
  \ 中成功执行，你将不会收到错误，但也没有其他可视化的提示。我们可以通过列出表描述来验证索引创建尝试，就像在第 4 章中所做的那样。我们将使用稍紧凑的 `\\\
  d <表名>` 命令（代码清单 15-3）来替代详细的 `\\d+ <表名>` 选项。\n\n```\n\\d proglang_tbl;\nTable \"\
  public.proglang_tbl\"\nColumn  |         Type          | Modifiers\n----------+-----------------------+-----------\n\
  id       | integer               |\nlanguage | character varying(20) |\nauthor \
  \  | character varying(25) |\nyear     | integer               |\nstandard | character\
  \ varying(10) |\nIndexes:\n\"language_idx\" btree (language)\n代码清单 15-3\n在 PostgreSQL\
  \ 中验证索引创建\n```\n\n我们可以在输出的最末尾看到，有一个关于我们的索引 `language_idx` 的条目。在 SQLite 中运行相同的 `CREATE\
  \ INDEX` 命令也会成功，并且有两种主要方法来验证创建。第一种是我们在第 4 章中见过的 `.schema` 命令（代码清单 15-4）。\n\n```\n\
  sqlite> .schema proglang_tbl\nCREATE TABLE proglang_tbl (\nid        INTEGER   \
  \  NOT NULL,\nlanguage  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\n\
  year      INTEGER     NOT NULL,\nstandard  VARCHAR(10) NULL);\nCREATE INDEX language_idx\
  \ ON proglang_tbl (language);\n代码清单 15-4\n使用 .schema 在 SQLite 中验证索引创建\n```\n\n这向我们展示了用于创建表及其相关实体（如索引）的\
  \ DDL 命令。另一种方法是使用 SQLite 的 `pragma` 来列出表上的所有索引（代码清单 15-5）。`pragma` 是 SQLite 提供的语句，用于查询其自身的元数据，例如索引信息。\n\
  \n```\nsqlite> PRAGMA index_list(proglang_tbl);\nseq         name          unique\
  \      origin      partial\n----------  ------------  ----------  ----------  ----------\n\
  0           language_idx  0           c           0\n代码清单 15-5\n使用 pragma 在 SQLite\
  \ 中验证索引创建\n```\n\n#### 使用 EXPLAIN 查看索引如何工作\n\n我们现在已经看到我们创建的索引确实存在，但我们如何看到它在实际中发挥作用呢？在一个大表上，我们应该能够获得可测量的速度提升。`EXPLAIN`\
  \ 命令将在这里帮助我们。但首先，让我们创建一个大表来运行启用索引的查询。\n\n获得一个大表的快速而简单的方法是使用笛卡尔积或交叉连接。我们已经有包含 5 列\
  \ 9 行的 `proglang_tbl`。对每个字段进行相互的笛卡尔积运算应该会产生 9 的 5 次方 = 59049 行（代码清单 15-6）。这无论如何都不算是一个巨大的表，但它将允许我们看到索引对查询执行的影响。\n\
  \n```\nSELECT a.language,\nb.author,\nc.year,\nd.standard,\ne.id\nINTO biglang_tbl\n\
  FROM proglang_tbl a, proglang_tbl b, proglang_tbl c, proglang_tbl d, proglang_tbl\
  \ e;\nSELECT count(*) FROM biglang_tbl;\ncount\n\n代码清单 15-6\n在 PostgreSQL 中使用交叉连接创建大表\n\
  ```\n\n现在我们有了一个填充好的表，让我们尝试使用 `EXPLAIN` 来分析查找所有 Fortran 行的查询时间（代码清单 15-7）。虽然这个命令不在\
  \ SQL 标准中，但大多数关系型数据库系统都实现了它。\n\n```\nEXPLAIN SELECT * FROM biglang_tbl WHERE language=\"\
  Fortran\";\nQUERY PLAN\n\nSeq Scan on biglang_tbl  (cost=0.00..1150.11 rows=6486\
  \ width=24)\nFilter: ((language)::text = 'Fortran'::text)\n(2 rows)\n代码清单 15-7\n\
  在 PostgreSQL 中对查询使用 EXPLAIN\n```\n\n嗯，这里有一些输出，尽管还不完全清楚我们看到的是什么。`查询计划` 是 SQL 引擎将如何执行你的查询的术语。现在让我们将这个输出与在\
  \ `language` 字段上创建索引后的输出进行对比（代码清单 15-8）。\n\n```\nCREATE INDEX biglang_idx ON biglang_tbl\
  \ (language);\nEXPLAIN SELECT * FROM biglang_tbl WHERE language=\"Fortran\";\nQUERY\
  \ PLAN\n\nBitmap Heap Scan on biglang_tbl  (cost=126.56..619.63 rows=6486 width=24)\n\
  Recheck Cond: ((language)::text = 'Fortran'::text)\n->  Bitmap Index Scan on biglang_idx\
  \  (cost=0.00..124.94 rows=6486 width=0)\nIndex Cond: ((language)::text = 'Fortran'::text)\n\
  (4 rows)\n代码清单 15-8\n在 PostgreSQL 中创建索引后对查询使用 EXPLAIN\n```\n\n我们立即看到这个输出与前一个不同，它涉及到使用我们最近创建的索引。之前的输出提到了\
  \ `Seq Scan` 或顺序扫描，顾名思义，这涉及到按顺序遍历我们的记录。而当前的输出提到了 `Bitmap Heap Scan` 和 `Bitmap Index\
  \ Scan`，听起来比完全的简单扫描快得多。这些特定扫描如何工作的细节超出了本文的范围，但我们可以查看输出中的另一个参数来大致了解我们索引在此情况下的效率。\n\
  \n两个计划都提到了一个类似 `cost=<第一个值>..<第二个值>` 的参数。第二个值是查询执行的估计总成本。这个值越小，查询执行的效率就越高。在没有索引的第一个输出中，这个值估计为\
  \ 1150.11，而在创建索引后，我们将其降低到 619.63，这是我们的一大胜利。\n\n虽然在 SQLite 中创建索引与其他数据库类似，但如果你尝试在其中执行代码清单\
  \ 15-6，你会得到一个错误，内容类似于 `Error: near \"INTO\": syntax error`。在 SQLite 中创建 `biglang_tbl`\
  \ 的支持方式是使用 `CREATE TABLE .. AS .. <查询>`（代码清单 15-9）。\n\n```\nCREATE TABLE biglang_tbl\
  \ AS\nSELECT a.language,\nb.author,\nc.year,\nd.standard,\ne.id\nFROM proglang_tbl\
  \ a, proglang_tbl b, proglang_tbl c,\nproglang_tbl d, proglang_tbl e;\n代码清单 15-9\n\
  在 SQLite 中创建 biglang_tbl\n```\n\n另外，我们不使用简单的 `EXPLAIN`（它初次使用时会给出庞大且相当难以理解的输出），而是使用更简洁的\
  \ `EXPLAIN QUERY PLAN` 语句，如下所示（代码清单 15-10）。\n\n```\nEXPLAIN QUERY PLAN SELECT *\
  \ FROM biglang_tbl WHERE language=\"Fortran\";\nselectid    order       from   \
  \     detail\n----------  ----------  ----------  ---------------------------\n\
  0           0           0           SEARCH TABLE biglang_tbl USING INDEX biglang_idx\
  \ (language=?)\n代码清单 15-10\n在 SQLite 中使用 EXPLAIN QUERY PLAN\n```\n\n虽然输出比 PostgreSQL\
  \ 的小很多，但我们可以清楚地看到它将使用我们的索引来搜索表中 `language` 为 Fortran 的行。\n\n\n#### 唯一索引\n\n在创建索引时，我们可以选择指定关键字\
  \ `UNIQUE`，以创建一个只允许非重复值的索引（参见代码清单 15-11）。这使得索引在提升性能的同时，也承担了数据完整性的双重责任。\n\n```\n\
  CREATE UNIQUE INDEX  ON  ()\n代码清单 15-11\nUNIQUE 索引创建的通用语法\n```\n\n然而，由于其隐含的数据完整性含义，我们不能在已知包含重复值的字段上使用这种索引。在我们新创建的\
  \ `biglang_tbl` 表中，由于我们的交叉连接条件，`ID` 字段实际上重复了很多次。在此字段上创建唯一索引将导致错误（参见代码清单 15-12）。\n\
  \n```\nCREATE UNIQUE INDEX id_idx ON biglang_tbl (id);\nERROR:  could not create\
  \ unique index \"id_idx\"\nDETAIL:  Key (id)=(4) is duplicated.\n代码清单 15-12\n无法在包含重复值的字段上创建唯一索引\n\
  ```\n\n类似地，向一个具有唯一索引的字段中添加重复值也会导致错误，类似于 `ERROR: duplicate key value violates unique\
  \ constraint \"<index name>\"`。\n\n如果你记忆力超群，你会记得这与我们在第 3 章讨论唯一约束时在代码清单 3-12 中看到的错误相同。如果我们现在尝试描述涉及的表\
  \ `proglang_tbluk` 的结构，我们将看到 PostgreSQL 是如何以索引来定义这些约束的（参见代码清单 15-13）。\n\n```\n\\\
  d proglang_tbluk;\nTable \"public.proglang_tbluk\"\nColumn     |          Type \
  \         | Modifiers\n----------------+------------------------+-----------\nid\
  \             | integer                | not null\nlanguage       | character varying(20)\
  \  | not null\nauthor         | character varying(30)  | not null\nyear        \
  \   | integer                | not null\nstandard       | character varying(10)\
  \  |\ncurrent_status | character varying(32)  |\nIndexes:\n\"proglang_tbluk_pkey\"\
  \ PRIMARY KEY, btree (id)\n\"proglang_tbluk_language_key\" UNIQUE CONSTRAINT, btree\
  \ (language)\n代码清单 15-13\n描述一个同时包含主键和唯一索引的表\n```\n\n实际上，这也是我们在第 4 章的代码清单 4-11 中尝试过的，但当时我们并没有非常仔细地关注输出的\
  \ `INDEXES` 部分。\n\n#### 索引如何工作？\n\n对索引工作原理有一个高层概览，可以帮助用户编写有效、执行快速的查询。大多数 SQL 用户忽略了索引的概念性理解，但实际上它们并不难掌握。\n\
  \n在本章开头，我们将数据库索引比作在字典中查找单词。字典的字母排序特性使查找过程更加容易。同样地，书籍索引通过按字母顺序列出概念及其讨论的页码，使你能够查找书中讨论的概念。\n\
  \n这与实际的数据库索引非常相似。虽然底层细节因实现而异，但将其视为一个有序的查找表是很有帮助的。被索引字段的值经过排序存储，并带有指向基础表中实际记录位置的指针。\n\
  \n如果我们在 `proglang_tbl` 的 `standard` 字段上创建一个索引，该索引的简化表示如图 15-1 所示。SQL 解释器无需遍历整个表来查找\
  \ `standard` 字段为 `ANSI` 的两行。这种低效的全表遍历有时被称为全表扫描或顺序扫描。索引的目的就是为了避免这种扫描。\n\n![A457348_1_En_15_Fig1_HTML.jpg](img/A457348_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\n索引工作原理的可视化表示\n\n当有人编写一个带有 `WHERE` 子句的查询，以查找特定的 `standard` 值时，这个索引会自动生效，而无需用户指定使用它。添加或删除具有不同该字段值的行也会自动更新索引，因此索引始终引用表中的最新数据。\n\
  \n#### 索引开销\n\n尽管索引无需太多复杂命令就能为用户带来诸多好处，但有时用户会想为每一个可能的列都创建索引。毕竟，目前看起来索引创建似乎没有缺点。\n\
  \n然而，事实证明，就像世界上的其他事物一样，天下没有免费的午餐。如果一个有 N 个字段的表在每一列上都有索引，那么对于每一个 `INSERT`、`UPDATE`\
  \ 或 `DELETE` 这样的 DML 语句，都必须保持这 N 个索引同步。这会使大型表的数据更改变得缓慢，有时令人烦恼，有时令人担忧。\n\n过多索引带来的另一个严重开销是它们的存储需求。索引和表一样，会在磁盘上占用物理空间。尽管近年来存储变得便宜，但数据库管理员对服务器空闲空间的态度并不随意。\n\
  \n让我们检查一下磁盘如何受索引创建的影响。我们将重点关注 `biglang_tbl` 及其索引 `biglang_idx`。首先，让我们找出表及其相关对象占用的总空间（参见代码清单\
  \ 15-14）。\n\n```\nSELECT pg_size_pretty(pg_total_relation_size('biglang_tbl'));\n\
  pg_size_pretty\n----------------\n4608 kB\n(1 row)\n代码清单 15-14\n在 PostgreSQL 中显示表及其相关对象的总大小\n\
  ```\n\n函数 `pg_total_relation_size` 会返回表、其索引以及其他一些东西占用的磁盘空间。`pg_size_pretty` 用于将输出美化为更易读的单位（如\
  \ kB）而不是字节数。从这些函数名可以明显看出，它们是 PostgreSQL 特有的。如果你使用的是不同的产品，请查阅你的 DBMS 手册以获取查询数据库目录的命令。\n\
  \n现在，让我们找出表和索引各自占用了多少空间（参见代码清单 15-15）。这应该能让我们对索引的大小有一个相对的概念。\n\n```\ntestdb=# SELECT\
  \ pg_size_pretty(pg_relation_size('biglang_tbl'));\npg_size_pretty\n----------------\n\
  3296 kB\n(1 row)\ntestdb=# SELECT pg_size_pretty(pg_relation_size('biglang_idx'));\n\
  pg_size_pretty\n----------------\n1312 kB\n(1 row)\n代码清单 15-15\n在 PostgreSQL 中显示表及其索引的大小\n\
  ```\n\n我们的索引大小大约是表大小的 39%！更不用说它占用了 `biglang_tbl` 总关联大小的 28%。请记住，我们这里讨论的只是一个字段上的单个索引。显然，我们需要在索引创建上有所节制。\n\
  \n一个好的经验法则是在查询中大量依赖主键和唯一索引。随着时间的推移，你会开始看到运行缓慢的查询模式。如果这些查询不常运行，也许我们可以忍受额外花费的时间。但如果运行缓慢的查询是定期执行的，并且\
  \ `WHERE` 子句中经常包含相同的未索引字段，那么它就是创建索引的完美候选。\n\n##### SQLite 中的索引大小\n\n你可能注意到我们只讨论了\
  \ PostgreSQL 中的索引大小。像 `pg_size_pretty`、`pg_total_relation_size` 和 `pg_relation_size`\
  \ 这样的辅助函数是 PostgreSQL 特有的，不是 SQL 标准的一部分。\n\n我还没找到一种在 SQLite 中计算索引大小的好方法。由于它是一个自包含的单文件数据库，你可以在创建索引前后验证文件大小，以获得一个粗略的估计。\n\
  \n#### 删除索引\n\n如果你不再需要某个索引，SQL 提供了 `DROP INDEX` 命令来删除它。该命令的基本语法足够简单（见列表 15-16）。\n\
  \n```\nDROP INDEX \n列表 15-16\nDROP INDEX 的通用语法\n```\n\n请注意，这不会以任何方式改变底层表的数据（见列表\
  \ 15-17）。你所做的仅仅是删除索引，因此查询时间可能会变慢。\n\n```\nDROP INDEX biglang_idx;\nSELECT COUNT(*)\
  \ FROM biglang_tbl;\ncount\n\n(1 row)\n列表 15-17\nDROP INDEX 不会改变底层表的内容\n```\n\n\
  ### 16. 访问控制语句\n\n由于其易用性、丰富的功能集和可靠性，基于 SQL 的关系数据库管理系统已成为各地企业可信的数据源。当大公司考虑存储关键数据时，他们心中唯一的问题是选择哪家关系型数据库管理系统供应商，而非选择何种数据存储。\n\
  \n当如此重要的数据被存储在系统中，并且数据库管理系统成为整个组织的中心数据存储时，某种程度的访问控制是绝对必要的。\n\n访问控制指的是软件系统内的权限。当你登录到一台服务器，有时甚至是自己的电脑时，你已被授予访问系统资源的权限。通常，当你希望在自己的机器上安装新软件时，你需要\
  \ root 或管理员权限。这就是操作系统访问控制机制在发挥作用。\n\n可以理解，关系型数据库也拥有非常强大的访问控制机制。虽然大多数系统在提供访问控制的方式上差异很大，但几乎所有供应商都提供了\
  \ `GRANT` 和 `REVOKE` 这两个数据控制语言命令。\n\n##### SQLite 中的访问控制\n\n权限真正在多用户系统中发挥作用，即当多个用户访问一个系统但权限不均等时。这在像\
  \ PostgreSQL、Sybase ASE 等客户端-服务器数据库系统中是典型情况。\n\nSQLite 是一个基于单文件的系统，通常用于我们需要在有限约束或应用程序内嵌入简单数据库的场景。虽然它有一些条款允许一定程度的多用户访问，但它并非真正为多用户访问而设计。这并不意味着它不是一个有能力的数据库管理系统。我个人认为，如果在许多本应使用更昂贵、资源消耗更大的系统的地方改用\
  \ SQLite，世界会变得更好，但这将是另一次讨论的话题。\n\nSQLite 作为基于单文件的系统，依赖于操作系统来授予或限制对其数据文件的访问。因此，它没有实现任何\
  \ `GRANT` 或 `REVOKE` 命令。本章的其余部分将重点介绍使用 PostgreSQL 示例的访问控制机制。\n\n##### 在 PostgreSQL\
  \ 中创建新用户\n\n为了运行本书中的示例，我们一直使用用户 `postgres`。作为一个拥有所有权限的万能账户，它很好地服务了我们。回顾一下，我们过去常常通过\
  \ `-U` 选项指定用户名来启动 `psql` 会话，如下所示（见列表 16-1）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql\
  \ -U postgres\n列表 16-1\n使用 postgres 用户启动 psql 会话的命令\n```\n\n但这并不能准确反映真实世界的设置。通常你会有自己的用户账户，其权限将少于管理员账户。这对于你和数据库管理员来说都更安全，因为知道一个账户被入侵不会影响系统中的所有内容。\n\
  \n让我们通过 `psql` 在 PostgreSQL 中创建一个新用户（见列表 16-2），然后我们将继续指定该特定用户拥有的权限。\n\n```\npostgres=#\
  \ CREATE USER primer with PASSWORD 'hunter2';\nCREATE ROLE\npostgres=#\n列表 16-2\n\
  在 psql 中创建新用户\n```\n\n当你执行此命令时，一个名为 `primer` 的新用户被创建，密码为 `hunter2`，控制台显示消息 `CREATE\
  \ ROLE`。由于会话是以 `postgres` 用户创建的，并且 `=#` 之前的文本仍然是 `postgres`，我们可以看到 `CREATE USER`\
  \ 命令并没有直接切换到新用户，而是继续使用 `postgres` 进行同一会话。\n\n##### hunter2 的传说\n\n在社交网络流行之前，互联网中继聊天主导着即时通讯领域。人们连接到\
  \ IRC 服务器，加入一个或多个称为频道的聊天室，并与志同道合的人交谈。\n\n如果某次对话特别有趣，人们会将其发布到网站 Bash.org 上。大约在 2004\
  \ 年，有人发布了一段两个用户之间的有趣对话，其中第一个用户说服另一个用户，当他们在 IRC 中输入真实密码时，其他人只会看到 ******。这当然不是真的，但无论如何很有趣。对话是否真的发生过也无法验证，而讨论中的密码是\
  \ ‘hunter2’。\n\n你可以在此处阅读 Bash.org 的条目：[`http://www.bash.org/?244321`](http://www.bash.org/?244321)\n\
  \n我们现在尝试验证该用户是否确实已创建（见列表 16-3）。像之前一样，`psql` 为我们提供了一个简短的命令来完成此操作——`\\du`。\n\n```\n\
  postgres=# \\du\nList of roles\nRole name |                    Attributes      \
  \            | Member of\n-----------+------------------------------------------------+\n\
  postgres  | Superuser, Create role, Create DB, Replication,|\n| Bypass RLS     \
  \                                | {}\nprimer    |                             \
  \                   | {}\n列表 16-3\n检查用户 primer 是否已创建\n```\n\n我们看到我们的用户确实已经创建，尽管其属性列表为空。别担心，我们稍后会处理这一点。\n\
  \n如果你想在不使用 `psql` 元命令的情况下验证相同的信息，我们可以查询内置的数据库目录信息（见列表 16-4）。\n\n| usename | usesysid\
  \ | usecreatedb | usesuper |\n| --- | --- | --- | --- |\n| postgres | 10 | t | t\
  \ |\n| primer | 41095 | f | f |\n\n```\nSELECT usename,\nusesysid,\nusecreatedb,\n\
  usesuper FROM pg_user;\n列表 16-4\n从数据库目录查询用户信息\n```\n\n#### 向用户授予权限\n\n让我们尝试使用这个新创建的用户打开一个\
  \ psql 会话。我们将把值 `primer` 传递给 psql 的 `-U` 选项（参见清单 16-5）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql\
  \ -U primer\nPassword for user primer:\npsql.bin: FATAL:  database \"primer\" does\
  \ not exist\n```\n*清单 16-5 尝试使用我们新创建的用户登录*\n\n除了用户之外，它还尝试打开新用户的默认数据库，该数据库的名称被假定与用户名相同。我们将通过明确声明我们要操作\
  \ `testdb` 数据库来补救这一点（参见清单 16-6）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql -U primer\
  \ -d testdb\nPassword for user primer:\npsql.bin (9.5.8)\nType \"help\" for help.\n\
  testdb=> SELECT * FROM proglang_tbl;\nERROR:  permission denied for relation proglang_tbl\n\
  ```\n*清单 16-6 使用 primer 用户连接到 testdb*\n\n成功登录了 `testdb` 数据库。但当我们在其中一个表上运行基本查询时，它立即给出了\
  \ `permission denied` 错误。回想起来，这似乎合乎逻辑，因为我们还没有授予 `primer` 任何特殊访问权限。我们不希望任何新用户能够立即访问我们精心创建的表。\n\
  \n我们将使用 `GRANT` 语句向我们新创建的用户授予特定权限。`GRANT` 的一般语法如下所示（参见清单 16-7）。\n\n```\nGRANT <privilege>\
  \ ON <object> TO <user>;\n```\n*清单 16-7 GRANT 的一般语法*\n\n我们最希望给予 `primer` 用户的权限是能够查询\
  \ `proglang_tbl` 表。这相当于授予该用户对该特定表的只读访问权限。我们以超级用户 `postgres` 的身份运行此语句，他将把权限授予其他用户（参见清单\
  \ 16-8）。\n\n```\nGRANT SELECT ON proglang_tbl TO primer;\n```\n*清单 16-8 向 primer\
  \ 授予 SELECT 权限*\n\n现在我们可以作为 `postgres` 退出 psql 会话，并以用户 `primer` 重新打开 `testdb`。我们将尝试先查询然后更新表中的一行，以查看\
  \ `GRANT` 语句是否按预期工作（参见清单 16-9）。\n\n```\ntestdb=> SELECT count(*) FROM proglang_tbl;\n\
  count\n-------\n    4\n(1 row)\ntestdb=> UPDATE proglang_tbl SET year=1982 WHERE\
  \ author=\"Ross\";\nERROR:  permission denied for relation proglang_tbl\n```\n*清单\
  \ 16-9 验证 primer 是否可以查询或更新表*\n\n查询工作正常，但行更新没有成功，因此一切如预期般运作。您可能已经猜到，我们需要为第二条语句也 `GRANT`\
  \ `UPDATE` 权限，它才能生效。\n\n`SELECT` 和 `UPDATE` 并非用于细粒度访问控制的唯一可用权限。您还可以指定其他权限，如 `INSERT`\
  \ 和 `DELETE`。最后，还有一个 `ALL` 权限，它会将特定数据库对象上的所有可用权限授予指定的用户。如果您希望一次指定多个权限，可以将它们列成一个清单（参见清单\
  \ 16-10）。\n\n```\nGRANT SELECT, UPDATE, INSERT ON proglang_tbl TO primer;\n```\n\
  *清单 16-10 一次授予多个权限*\n\n授予权限通常在需要访问相关表或数据库对象的用户不是其创建者时进行。如果一个用户创建了一个表，他们默认拥有该表的所有权限。\n\
  \n大多数数据库管理系统中还有比我们介绍的四种基本权限更多的其他权限。然而，它们的使用通常对数据库管理员而非查询用户更有意义。请随时查阅您的数据库手册以了解有关支持权限的更多信息。\n\
  \n#### 撤销权限\n\n`REVOKE` 命令与 `GRANT` 恰好相反。它允许您从用户那里移除对数据库对象的权限。其一般语法与 `GRANT` 类似，不同之处在于它使用\
  \ `FROM` 而不是 `TO`（参见清单 16-11）。\n\n```\nREVOKE <privilege> ON <object> FROM <user>;\n\
  ```\n*清单 16-11 REVOKE 的一般语法*\n\n在第 14 章讨论视图时，我们曾提到视图如何通过提供仅包含您想向他人显示的字段的虚拟表来帮助保障数据安全。但如果用户也能查询基表，这个计划就会失败。在这里使用\
  \ `REVOKE` 是个好主意。我们将允许用户查询视图，但不允许查询底层表（参见清单 16-12）。这样，我们确保可用性不受影响，同时仍能在数据建模层面将所有有意义的字段组合在一起。\n\
  \n```\ntestdb=# GRANT SELECT ON language_decade TO primer;\ntestdb=# REVOKE SELECT\
  \ ON proglang_tbl FROM primer;\n```\n*清单 16-12 撤销对基表的访问权限*\n\n我们正在使用超级用户 `postgres`\
  \ 运行这些命令。现在让我们以用户 `primer` 的身份登录，看看这些语句如何影响了我们的权限（参见清单 16-13）。\n\n```\nSELECT *\
  \ FROM proglang_tbl;\nERROR:  permission denied for relation proglang_tbl\nSELECT\
  \ * FROM language_decade WHERE decade='The 1950s';\n language |   decade\n----------+-----------\n\
  \ Jovial   | The 1950s\n APT      | The 1950s\n(2 rows)\n```\n*清单 16-13 检查用户 primer\
  \ 的权限*\n\n我们注意到用户可以查询视图，但不能查询基表。这实际上是大型数据库中非常常见的访问控制工作流程。在数据定义过程之后，会根据我们期望的数据查询方式创建不同的视图，然后撤销基表的权限以用于交互式查询。\n\
  \n虽然我们可以在 `GRANT` 和 `REVOKE` 中指定用户列表，但我们不能合理地假设数据库系统的用户列表会始终保持不变。大多数 DBMS 软件提供一个关键字\
  \ `PUBLIC` 来指代系统的所有当前和未来用户。这可以与我们的访问控制语句一起使用，以最大程度地减少日常访问管理的需求（参见清单 16-14）。\n\n\
  ```\ntestdb=# GRANT ALL ON proglang_tbl TO PUBLIC;\ntestdb=# REVOKE DELETE ON proglang_tbl\
  \ FROM PUBLIC;\n```\n*清单 16-14 在访问控制语句中使用 PUBLIC*\n\n这两条连续语句将实现的效果是：首先向所有人开放 `proglang_tbl`，然后仅移除\
  \ `DELETE` 权限。其他权限如 `INSERT`、`UPDATE` 等将对系统的所有用户可用，而无需我们逐一列出。如果创建了新用户，这些访问控制级别也将适用于他们。\n\
  \n### 延伸阅读\n\n本文始终旨在为没有 SQL 经验的人提供一个简短的教程式入门。但这并不意味着我们已经学习了关于 SQL 的全部知识。事实上，我们还远未达到。\n\
  \n虽然我很高兴您读到了本文的结尾，但为了公平起见，我应该为您提供一些指引，告诉您如何继续您的 SQL 学习之旅。以下是我认为值得一读的书籍清单。并非所有书籍都适合您，因此我附上了简短的描述，说明我对它们的感受，以帮助您决定。\n\
  \n\n#### 推荐的 SQL 书籍\n\n1.  *实用 SQL 手册：使用 SQL 变体*（第 4 版，Addison-Wesley Professional，2001）作者：Judith\
  \ S Bowman, Sandra L Emerson, Marcy Darnovsky：这也许是我读过的最好的 `SQL` 书籍，**无出其右**。行文清晰，篇幅适中，且专注于\
  \ `SQL` 在现实世界中的应用，而非过多晦涩的理论。唯一的不足是自 2001 年以来再未更新；但鉴于 `SQL` 的基础知识变化甚少，结合数据库手册一起使用，足以让你游刃有余。\n\
  2.  *SQL 入门：掌握关系数据库语言*（第 4 版，Addison-Wesley Professional，2006）作者：Rick F van der\
  \ Lans：这是 `SQL` 参考书的**黄金标准**。这本厚重巨著涵盖了所有你想了解的 `SQL` 知识。行文有时略显枯燥，章节编排可能也不完全适合初学者，但我认为他们本就不是目标读者。如果你经常遇到网络论坛无法解决的问题，我推荐你手边常备此书。\n\
  3.  *SQL 查询必知必会：SQL 数据操作实战指南*（第 3 版，Addison-Wesley Professional，2014）作者：John L Viescas\
  \ 和 Michael J Hernandez：如果你觉得当前文本节奏太快，这是一份详尽而细致的 `SQL` 教程。作者们一步步详细讲解了如何将用自然语言表述的需求转化为\
  \ `SQL` 查询。书中示例丰富，专为完全的初学者设计。这是一本广受欢迎且备受推崇的书，当之无愧。\n4.  *SQL 可视化介绍*（第 2 版，Wiley，2001）作者：David\
  \ Chappell 和 J Harvey Trimble Jr.：又是一本经典之作，虽然也有一段时间没有更新，但在今天同样实用。作为 `SQL` 的可视化教程入门读物，它直击要点，在大约\
  \ 250 页内涵盖了一系列主题。很适合从图书馆借来，花上一个月时间通读。\n5.  *数据库管理与设计*（第 2 版，Prentice Hall，1995）作者：Gary\
  \ W Hansen 和 James V Hansen：数据库理论书籍世界中的**隐藏瑰宝**。如果你想了解数据库和 `SQL` 的理论基础，如果还能找到的话，这是值得一读的文本。它比那些更流行的同类书籍更清晰、更简明。遗憾的是，这个千禧年之后再无新版，但它依然在我的推荐列表中。不过，你需要能接受书中用于示例的过时软件。\n\
  6.  *SQL Cookbook：数据库开发人员的查询方案与技巧*（第 1 版，O’Reilly Media，2005）作者：Anthony Molinaro：一份出色的现实世界\
  \ `SQL` 查询示例合集。本书试图涵盖所有主流 `DBMS` 软件包，并对语句本身给出了精彩的解释。如果你是职场人士，并且经常需要编写那些不那么显而易见的查询，这将是一本极好的参考伴侣书。\n\
  7.  *SQL 的艺术*（第 1 版，O’Reilly Media，2006）作者：Stephane Faroult 和 Peter Robson：一种高级但有趣的视角，来看待\
  \ `SQL` 和关系数据库。效仿《孙子兵法》，这本书凝聚了关于应如何正确使用基于 `SQL` 的数据库的智慧。本书直接切入数据库设计、性能优化等主题的核心细节，因此假定读者已对\
  \ `SQL` 基础有深入了解。\n8.  *SQL 反模式：避免数据库编程的陷阱*（第 1 版，Pragmatic Bookshelf，2010）作者：Bill\
  \ Karwin：这是一门关于使用 `SQL` 时**不应做什么**的速成课程。在你积累了一些经验后，你会更加欣赏它，这是一本无论何时有空都值得浏览的好书。书不厚，大约\
  \ 300 页，充满了关于如何避免糟糕的数据库设计和使用的实用建议。\n\n### 数据库管理系统与工具\n\n自 20 世纪 80 年代以来，关系数据库管理系统一直有相当多的选择。但自世纪之交以来，开源世界也有了充足的选择。事实上，一些最强大的\
  \ `RDBMS` 工具就是开源的。\n\n以下是我推荐的一些优秀的 `RDBMS` 系统和工具列表。它偏向于免费和开源软件。由于这是单个人的观点列表，难免会遗漏一些好资源。尽管如此，我希望这能作为一个良好的起点。\n\
  \n#### 关系数据库管理系统\n\n1.  `PostgreSQL` [`https://www.postgresql.org/`](https://www.postgresql.org/)\
  \ 目前最优秀、功能最丰富开源数据库。当你需要为多个程序和用户选择一个 `RDBMS` 时，它应该是你的默认选择。其成熟度和安全性无出其右，且改进稳步进行。但对我来说，它最好的特性是它的文档。随附的用户手册既是出色的\
  \ `SQL` 参考，又简洁明了。\n2.  `SQLite` [`https://sqlite.org/`](https://sqlite.org/) 一个轻量级、单文件、可嵌入的数据库。极其流行，各处都能获得大量帮助和文档。当你构建单用户系统或并发用户数较少时，它应该是你的\
  \ `RDBMS` 选择。其实际能力常被低估，它可以轻松处理大约 15–16GB 大小的数据库。\n3.  `Firebird` [`http://firebirdsql.org/`](http://firebirdsql.org/)\
  \ 开源 `DBMS` 世界中的隐藏瑰宝。虽然不如一些同行知名，但 `Firebird` 仍然是一个稳定、功能丰富且符合标准的 `RDBMS`。它从嵌入式小型数据库系统到大型企业级系统都扩展性良好。它始于\
  \ 2000 年从 Borland 的 `Interbase` 分支而来，但现在这两个产品已经差异很大。\n4.  `MariaDB` [`https://mariadb.org/`](https://mariadb.org/)\
  \ `MySQL` 的社区开发分支，现在被视为寻找类似 `MySQL` 产品的默认选择。`MySQL` 周围有一个良好的生态系统，`MariaDB` 自动继承了这些，并且新功能正在定期添加。\n\
  5.  `HyperSQL` [`http://hsqldb.org/`](http://hsqldb.org/) 也称为 `HSQLDB`，这是一个流行、成熟的基于\
  \ `Java` 的关系数据库引擎。它既可以作为嵌入式数据库，也可以作为客户端/服务器模式的 `DBMS`。非常适合与 `JVM` 语言一起使用。可以把它看作\
  \ `Java` 世界中的 `SQLite` 替代品，而且和 `SQLite` 一样，它的功能可能远超你的预期。\n6.  `H2` [`http://www.h2database.com`](http://www.h2database.com)\
  \ 另一个小型、功能丰富的基于 `Java` 的数据库引擎，可用于嵌入式和客户端/服务器模式。它的设计目标与 `HSQLDB` 类似，但做出了不同的权衡取舍。无论如何，你都能免费获得一个优秀、小型、开源的数据库引擎。\n\
  \n\n\n#### SQL 开发环境\n\n自从商业智能和数据分析领域兴起以来，对关系型数据库内存储数据进行探索性分析的需求急剧增长。因此，出现了一类新的工具，允许你以交互方式查询数据库，并以格式美观的方式查看结果。\n\
  \n就像关系数据库管理系统一样，这里的工具选择也令人眼花缭乱。有许多免费、开源的 SQL 工具可供使用。其中一些工具的付费版本提供了更多功能，但对于初学者来说，免费版本已经足够使用。\n\
  \n1.  DBeaver [`https://dbeaver.jkiss.org/`](https://dbeaver.jkiss.org/) 我最喜欢的 SQL\
  \ 开发环境。它的功能如此丰富，以至于我惊讶地发现它最初只是一个业余项目。它可以连接到许多数据库系统，并提供了大量的功能。然而，所有这些优势是以速度和资源消耗为代价的。这么说吧，如果你的系统配置较旧，请先看看其他选择。\n\
  2.  DB Browser for SQLite [`http://sqlitebrowser.org/`](http://sqlitebrowser.org/)\
  \ 如果你使用的是 SQLite，那么这是一个顶级的数据浏览器。它允许你编写查询，同样也能输出格式整齐的表格，但对于大多数基本操作，比如对某一列进行筛选，你根本不需要编写查询。它的浏览功能将表格转换成类似电子表格的抽象界面，允许对数值进行筛选。\n\
  \n### SQL 与关系数据库的历史\n\n计算机在 20 世纪 40 年代末和 50 年代诞生之初是作为高级计算机器。但很快，企业就意识到了它们在自动化处理和记录保存方面的重要性。到了\
  \ 20 世纪 60 年代，计算机越来越多地使用面向文件的系统来存储数据。\n\n一个典型的工作流程是：所有相关数据存储为一个文件，然后一个应用程序专门操作这个文件以提供输出。这种操作通常在夜间完成，并且存在多个数据文件以及多个处理这些文件的应用程序，以支持不同的数据处理任务。\n\
  \n#### 复杂面向文件系统的兴起\n\n早期的计算机使用磁带存储数据。这意味着数据访问仅限于对记录进行顺序扫描。你读取第一条记录，然后是下一条，以此类推，无法跳转或返回，除非从头开始读取过程。对于处理存储在多个文件中、以此种方式拆分的数据的应用程序，它们必须确保在实际处理开始之前，数据文件已按特定字段排序。这样做可以使从一个文件读取的记录与从其他文件读取的记录保持同步，从而能够一次性处理与该记录相关的所有完整信息。\n\
  \n随着存储技术的进步以及磁盘和磁带的发明，复杂的数据访问方法也随之出现。除了简单的顺序访问，索引顺序访问方法 (`ISAM`) 在 20 世纪 60 年代变得突出。IBM\
  \ 开发了`ISAM`及其后继者虚拟存储访问方法 (`VSAM`)，作为面向文件的技术，为其大型机系统提供基于键的直接访问。\n\n这些系统与 COBOL 和\
  \ PL/I 等编程语言一起使用。由于其集成的特性，它们在企业环境中变得流行并持续了相当长一段时间。然而，人们已经感觉到对更结构化方案的需求。\n\n####\
  \ 数据库系统的登场\n\n虽然随机访问技术确实提高了吞吐量，但它们从未解决当组织开始将多个流程转移到自动化数据处理系统时出现的另一类问题。\n\n数据被分散在多个独立的文件中，没有集中化的逻辑结构。冗余的列增加了存储成本，并导致不同文件之间数据不一致的现实可能性。一个更严重的问题是数据控制，同形异义词变得不可避免。当同一个字段名在多个文件中用于截然不同的事物时，就产生了同形异义词，这使得对系统进行合理的理解成为一项艰巨的任务。\n\
  \n逻辑数据模型和数据库系统应运而生，旨在解决面向文件系统的部分缺陷。它们充当了集成、集中化的数据结构，在一定程度上遏制了冗余问题。伴随数据库管理系统出现的一个重要概念是数据字典，它为存储在数据库中的字段提供了含义。多亏了一个管理良好的数据字典，每个人突然都能访问受控的、有意义的记录集。\n\
  \nIBM 于 1966 年发布了信息管理系统 (`IMS`)，用于传奇的美国宇航局阿波罗计划。它是一种层次数据库，假设所有数据关系都可以组织成层次结构。虽然底层数据存储仍然是通过指针连接的文件，但`IMS`是数据建模上的一次飞跃，需要认真思考如何最好地将数据构建为层次结构。\n\
  \n20 世纪 60 年代末期兴起的另一种数据模型是网络数据模型。它允许你不仅以严格的层次结构表示数据，还可以表示实体相互引用的复杂网络。这为对业务流程中产生的数据进行建模提供了一种更自然的方式。这种模型最早的成功实现之一是集成数据存储\
  \ (`IDS`)，始于 1964 年。它对行业产生了巨大影响，其设计在很大程度上影响了网络模型标准——`CODASYL DBTG`标准。\n\n#### 关系模型的起源\n\
  \n尽管取得了成功，但层次和网络模型在设计上存在一个固有缺陷。它们的建模是从程序员的视角出发的，程序员需要深入了解如何将多个实体相互连接。一旦设计完成，查询只能按照程序员的设想运行，几乎没有进一步灵活性的空间。\n\
  \n然而，科德博士在 1970 年提出的关系理论坚持不使用物理指针建立僵化的预定关系。他相信，通过理解数据领域，自然、逻辑的关系会显现出来，系统应该为灵活的查询做好准备。他的模型建立在健全的数学理论之上，而不是之前方案所依赖的复杂编程技巧之上。\n\
  \n关系数据库的诞生地是 IBM 在圣何塞的研究实验室，科德在 20 世纪 70 年代和 80 年代在此工作。IBM 提出了`SystemR`项目，作为关系数据库管理系统的原型，但在认识到其巨大价值后未能迅速推进。一家名为\
  \ Relational Software Inc.的公司在 1979 年借鉴 IBM 在`SystemR`上的研究，创建了第一个广泛应用的工业级关系数据库管理系统。Relational\
  \ Software Inc.后来更名为甲骨文公司。\n\n在 20 世纪 70 年代，另一个项目在学术环境中从`SystemR`汲取灵感。加州大学伯克利分校的迈克尔·斯通布雷克和尤金·张启动了自己的关系数据库管理系统研究项目，名为`Ingres`。它在\
  \ 20 世纪 80 年代被证明是甲骨文最大的竞争对手。虽然`Ingres`如今不如当年普及，但该项目对整个数据库行业产生了极其深远的影响。许多早期参与该项目或阅读其易获取源代码的程序员，后来都为其他数据库系统做出了贡献。\n\
  \n\n\n#### 查询语言的艰苦奋战\n\n在关系数据库的早期，SQL 并非占主导地位的查询语言。事实上，科德（Codd）曾为数据操作和查询提出了两种早期语言——`关系代数`和`关系演算`。顾名思义，它们是数学符号，而非旨在打造具有广泛吸引力的查询语言。\n\
  \n科德尝试创建真正查询语言的作品是`Alpha`，发表于他 1971 年的论文《基于关系演算的数据库子语言》中。然而，`SystemR`项目使用了一种名为`SEQUEL`的独立查询语言，该语言由唐·钱伯林（Don\
  \ Chamberlin）和雷蒙德·博伊斯（Raymond Boyce）于 1973 年左右创建。这种语言最终被更名为`SQL`。\n\n`Ingres`项目创建了他们自己的查询语言`QUEL`，其设计受到了`Alpha`的影响。然而，在\
  \ 1980 年代，主要的数据库系统供应商，包括 IBM 和 Oracle，都在推广`SQL`，随着开创性的`Ingres`逐渐失宠，`QUEL`也缓慢消亡。到\
  \ 1980 年代末，`SQL`已牢固地确立了其作为事实上的数据库查询语言的地位，并保持至今。\n\n#### 索引和术语表\n\n##### A\n- **访问控制**：向用户授予权限，通用语法，`GRANT`\n\
