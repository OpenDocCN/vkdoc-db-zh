  trans: '# 1. SQL 简介


    现代社会由数据驱动。无论是在个人层面，比如一本写满笔记的笔记本；还是在国家层面，例如人口普查数据，它已经渗透到我们所有的工作流程中。始终存在一个日益增长的需求，即高效地存储和组织数据，以便从原始数据中提取有意义的信息。


    数据库不过是组织化数据的集合。它不必是数字格式才能被称为数据库。电话目录就是一个很好的例子，它存储了个人和组织的联系号码数据。待办事项列表也是一种初级的数据库形式。随着对最普通流程收集的数据量也变得越来越大，数字数据库自
    1960 年代诞生以来已变得日益重要。


    用于管理数字数据库的软件被称为数据库管理系统（`DBMS`）。当你听到有人谈论 `PostgreSQL` 或 `MySQL` 时，他们指的就是一种 `DBMS`。数据库是当你使用
    `DBMS` 软件来存储对你或你的组织有意义的某些主题的数据时所创建的东西。例如，你的公司可能使用 `PostgreSQL` 来存储手机的库存信息——这是你销售的产品。在这种情况下，你使用
    `PostgreSQL` 作为 `DBMS` 创建了一个库存数据库。


    ## 关系模型与 SQL


    数据有无数种形态和规模，并且每种情境生成数据的方式都不同。银行记录账户余额生成的数据，与追踪家谱成员的数据是不同的。但为了让 `DBMS` 提供统一的数据管理和报告能力，我们必须遵循一种数据组织结构或数据模型。


    最普遍的数据库组织模型是关系模型，由 E. F. Codd 博士在他 1970 年的开创性研究论文《大型共享数据库的关系模型》中提出。¹ 在这个模型中，待存储的数据以表格格式组织，包含行和列。表中的每一行代表一条独特的记录，列标题指定了所存储数据的类型。这与电子表格类似，第一行可以看作是列标题，随后的行存储实际数据。


    一个数据库通常由多个表组成，每个表有不同的列标题。某些列可能在表之间是共通的，但这是我们将在本书后面讨论的主题。


    **问题**


    `关系型数据库`中的“关系”这个词是什么意思？


    一个常见的误解是，“关系”这个词意味着表之间存在关联。关系（relation）是一个数学术语，大致相当于表本身。当与“数据库”一词结合使用时，我们意指这个特定的系统以表格方式排列数据。


    这种误解可能源于 1980 年代的 `DBMS` `dBase` 中的 `set relation` 命令。该命令确实用于在表之间创建链接，但它与关系理论毫无关系。


    `SQL` 代表结构化查询语言，它是与关系型数据库交互的事实标准。你将遇到的几乎所有数据库管理系统都会有一个 `SQL` 实现。`SQL` 由美国国家标准协会（`ANSI`）于
    1986 年标准化，并经历了多次修订，最著名的是在 1992 年和 1999 年。然而，并非所有 `DBMS` 都严格遵循定义的标准，而是会移除一些特性并添加其他特性，以提供独特的功能集。尽管如此，标准化过程在数据库交互语言方面为供应商提供了统一的方向。


    虽然 `SQL` 是一种计算机语言，但它不同于你可能听说过的其他编程语言，如 `Python` 或 `C`。这类编程语言是通用的，适用于从编程基本计算系统到高级模拟模型的各种任务。`SQL`
    是一种特殊用途的查询语言，旨在用于与关系型数据库交互。除了这个上下文之外，它没有其他用途。


    这并不意味着它是唯一存在的数据库查询语言。在 1980 年代，另一种来自 `Ingres` 的语言 `QUEL` 相当流行，但围绕 `SQL` 的标准化工作巩固了它的地位。近年来，我们看到在
    `NoSQL` 的统称下开发了大量非关系型数据库。然而，它们的查询语言大多与 `SQL` 有相似之处，即使它们的数据模型与关系模型有显著不同。


    ## 使用 SQL 的优势


    *   它是标准化的——无论你选择哪种关系型数据库，它都会内置一个 `SQL` 查询解释器。`SQL` 的极大普及性使得任何与数据系统交互的人都值得花时间学习它。

    *   它具有合理的类英语语法。使用 `SQL` 时，不必指定像 `C` 或 `Java` 这类编程语言的繁琐细节。它简洁、易于理解，并且易于编写数据库查询。它是声明式的，意味着你只需声明你想要实现什么，而不是详述实现结果的步骤。

    *   它提供了一种统一的方式来查询和管理关系型数据库。许多数据库管理命令都是标准的 `SQL` 命令，使得技能迁移更加容易。

    *   它是成熟的——`SQL` 已存在超过 35 年。虽然许多新功能已被添加，但 `SQL` 的核心基本保持不变。掌握一些基本的 `SQL` 概念和命令，你就能获得很多实用价值，并且它们在未来也将很好地为你服务。


    ## SQL 命令分类


    `SQL` 是一种用于与数据库交互的语言。它由许多命令组成，并有进一步的选项让你能够对数据库执行操作。虽然不同的 `DBMS` 提供的命令子集有所不同，但通常你会发现以下分类。


    *   数据定义语言（`DDL`）：`CREATE TABLE`、`ALTER TABLE`、`DROP TABLE` 等。这些命令允许你创建或修改数据库结构。

    *   数据操作语言（`DML`）：`INSERT`、`UPDATE`、`DELETE`。这些命令用于操作存储在数据库中的数据。

    *   数据查询语言（`DQL`）：`SELECT`。用于从数据库中查询或选择数据子集。

    *   数据控制语言（`DCL`）：`GRANT`、`REVOKE` 等。用于控制对数据库中数据的访问，常用于授予用户权限。

    *   事务控制命令：`COMMIT`、`ROLLBACK` 等。用于将一组语句作为一个工作单元进行管理。


    除此之外，你的数据库管理系统可能会提供其他命令集，以便更高效地工作或提供额外功能。但可以肯定地说，上述命令几乎存在于你遇到的所有 `DBMS` 中。'
- fmt: '# 前言


    ## Explaining Tables


    A table in a relational database is nothing but a two-dimensional matrix of data
    where the columns describe the type of data, and the row contains the actual data
    to be stored. Have a look at Table [1-1](#A457348_1_En_1_Chapter.html#Tab1) to
    get a sense of the visualization of a table in a database.


    Table 1-1


    A Table Describing Programming Languages


    | ID | Language | Author | Year |

    | --- | --- | --- | --- |

    | 1 | Fortran | Backus | 1955 |

    | 2 | Lisp | McCarthy | 1958 |

    | 3 | Cobol | Hopper | 1959 |


    The above table stores data about programming languages. It consists of four columns
    (`id`, `language`, `author`, and `year`) and three rows. The formal term for a
    column in a database is a field and a row is known as a record.


    **Note**


    The example tables in this book primarily deal with programming languages, their
    authors, and the year they were created. We could have used database query languages,
    but they are far fewer in number.


    Our computer hardware and technologies have changed quite a bit since the 1950s
    and 1960s, but the early programming languages from that era still have a lasting
    impact on the programming languages of today. Lisp – imagined by John McCarthy
    in 1958[²](#A457348_1_En_1_Chapter.html#Fn2) is still alive in the form of Common
    Lisp, Scheme, and Clojure. Even Fortran still sees regular use in scientific computing.


    There are two things of note in the example table. The first one is that the `id`
    field effectively tells you nothing about the programming language by itself,
    other than its sequential position in the table. The second is that though we
    can understand the fields by looking at their names, we have not formally assigned
    a data type to them, that is, we have not restricted (not yet anyways) whether
    a field should contain alphabets or numbers or a combination of both.


    The `id` field here serves the purpose of a primary key in the table. It makes
    each record in the table unique, and its advantages will become clearer in chapters
    to come. But for now consider this, what if a language creator made two languages
    in the same year; we would have a difficult time narrowing down on the records.
    An `id` field usually serves as a good primary key since it’s guaranteed to be
    unique, but usage of other fields for this purpose is not restricted.


    A key concept of tables is that they are conceptual in nature and may not have
    any bearing upon the actual files where the data is stored. When users create
    a spreadsheet, they associate a file name with the spreadsheet and place it somewhere
    on their disk. But relational databases hide all these details from the user.
    The physical storage of a table on the disk might be to a single file, or to many
    files, or even have a relationship of storing many tables in a single file. It
    is the responsibility of your DBMS to provide a way to read and write to tables.


    ## Data Types in SQL


    Just like programming languages, SQL also has data types to define the kind of
    data that will be stored in its fields. In the table given above, we can see that
    the fields `language` and `author` must store English language characters. The
    `id` and `year` fields both store whole numbers.


    The commonly used data types you will encounter in subsequent chapters are shown
    in Table [1-2](#A457348_1_En_1_Chapter.html#Tab2).


    Table 1-2


    Various Data Types in SQL


    | Character types | `char`, `varchar` |

    | --- | --- |

    | Integer values | `integer`, `smallint` |

    | Decimal numbers | `numeric`, `decimal` |

    | Date data type | `date` |


    A string of characters is usually stored in either `char` or `varchar`. The former
    reserves as much space as you want when you specify the field, but if the value
    you store in it is shorter, the remaining space is wasted. A `varchar`, however,
    stands for a varying character and will occupy the exact length of the string,
    nothing wasted. There is, however, a maximum limit to how long a string value
    you can assign to such a field, and that is specified during the field definition
    itself.


    ```

    char(12)

    varchar(12)

    ```


    If you store the value ‘McCarthy’ that is eight characters long, the `char` will
    store it but waste four characters. The `varchar` will store it as exactly eight
    characters but the whole dynamism comes at a cost of speed. Nonetheless, the speed
    difference is small enough that for most scenario’s you would see the varying
    character data type being used.


    In case of number values, we get a split across two major classes – `integer`
    for storing whole numbers and `numeric` for storing number values with a decimal
    point in them. The ranges and limits of the values being stored in them vary with
    your choice of DBMS. However, a good rule of thumb to follow is to use the smallest
    data type that will suffice for the present and foreseeable future of your application.


    For example, if I were storing student roll numbers, using a `smallint` would
    suit just fine. In most implementations, this data type allows a maximum value
    of 32767, a number I mostly expect to be much greater than the number of students
    in any class.


    Decimal point numbers are trickier to specify. We use the `numeric` data type
    to fix how large the number could be and how many numbers can occur after the
    decimal point.


    ```

    numeric(precision, scale)

    numeric(5, 2)

    ```


    The total number of digits is specified by the `precision` and the number of digits
    after the decimal point is represented by `scale`. So in the example given, we
    would be able to store a number like 999.99 but not any further.


    Since data types still vary from a DBMS implementation to another, I suggest you
    keep your DBMS manual handy. Each implementation gives you many other types to
    work with, but for our learning purposes, the ones above should suffice.


    **Footnotes** [1](#A457348_1_En_1_Chapter.html#Fn1_source)


    Codd, E. F.; “A Relational Model of Data for Large Data Banks,” Communications
    of the ACM, vol 13, no 6, June 1970, [`https://www.seas.upenn.edu/~zives/03f/cis550/codd.pdf`](https://www.seas.upenn.edu/%7Ezives/03f/cis550/codd.pdf)


    [2](#A457348_1_En_1_Chapter.html#Fn2_source)


    McCarthy, John; “Recursive functions of symbolic expressions and their computation
    by machine, Part I,” Communications of the ACM, vol 3, issue 4, April 1960, [`http://jmc.stanford.edu/articles/recursive/recursive.pdf`](http://jmc.stanford.edu/articles/recursive/recursive.pdf)


    # 2. Getting Your Database Ready


    The best way to learn SQL is to practice writing the commands on a real relational
    database management system. In this book SQL is taught using either one of the
    following systems: PostgreSQL or SQLite. The reasons for choosing these DBMS systems
    are simple – they are free and open source, with availability on most major platforms.
    PostgreSQL is a full-features enterprise class database management system with
    a great community. SQLite is a small but robust system that is especially suited
    for learning purposes. Choose the latter if you are not comfortable with software
    installations.


    However, any relational database product that you can get your hands on should
    serve you just fine. In some cases, you may already have access to one in your
    organization, but be sure to ask for permissions to use it for learning purposes.
    There might be minor incompatibilities between different vendors, so if you choose
    something else to practice on while reading this book, it would be a good idea
    to keep the database vendor''s user manual handy.


    Since this text deals largely with teaching SQL in a product-independent manner,
    rather than the teaching of a specific DBMS system, details with respect to installation
    and specific operations of the product will be kept to a minimum. Emphasis is
    instead placed on a few specific steps that will help you to get working on writing
    SQL as fast as possible.'
