  trans: '# 5. 编写基础查询


    查询是一种 SQL 语句，用于从你的数据库中提取数据子集，并以可读的格式呈现。正如我们之前看到的，`SELECT` 命令用于在 SQL 中运行查询。你可以向查询中添加子句以获取经过筛选的、更有意义的结果。SQL
    提供的灵活性是它作为查询语言取得成功的原因之一。虽然 `SELECT` 有一系列完整的附加功能，但在本章中，我们将只关注其中两个——`ORDER BY` 和
    `WHERE`。


    对于一个经过深思熟虑的模式，数据库管理任务很少且间隔很长，但使用查询检索有意义的结果是每个人例行都会做的事情。由于对数据库的大多数操作都涉及查询，因此详细理解它们非常重要。虽然本章只涉及在单个表上运行的查询，但你可以在一条语句中对多个表运行
    `SELECT` 操作。


    ## 选择有限数量的列


    SQL 自始至终的意图是为日常用户提供一个易于使用的查询系统。他们不应该为了使其报告可读而求助于编程语言。实现这一点的一个主要功能是能够在输出中显示有限的列集合，而不是表中的所有字段。


    我们在前几章验证结果时已经看到了如何从表中提取所有数据。但正如你可能在我们的一些目录查询中注意到的——我们也可以提取数据的一个子集。我们首先通过限制查询输出中显示的字段数量来进行测试，方法是指定字段名作为一个逗号分隔的列表，而不是
    `*` 选择标准（清单 5-1）。


    | language | year |

    | --- | --- |

    | Prolog | 1972 |

    | Perl | 1987 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl;

    ```


    清单 5-1：从表中选择字段的子集


    你可以看到，我们构建的查询指定了我们希望看到的字段，即 `language` 和 `year`。同时请注意，这个查询的结果本身就是一个有用的报告，用于查看编程语言创建的年代顺序。虽然这不是
    SQL 或关系数据库管理系统强制执行的规则，但以这样的方式构建查询是有意义的：如果输出旨在供人阅读，其含义应该是不言自明的。这就是我们在查询中省略 `id`
    字段的原因，因为它对读者来说没有内在意义，除非他们希望了解表中记录存储的顺序。


    你可以自由决定输出中字段的顺序。`CREATE TABLE` 语句中字段的定位对你运行在该表上的任何 `SELECT` 查询都没有影响。实际上，你甚至可以在输出中自由地多次复制一个字段。这样做是否有意义是有争议的！但只要
    `SELECT` 的逗号分隔列表中的字段名是有效的，它就会显示在输出中。


    ## 对结果排序


    你可能已经注意到，在我们之前的查询输出中，语言是按照我们插入它们的相同顺序打印出来的。但是，如果我们想按语言创建的年份对结果进行排序呢？如果我们希望查看几十年来编程语言的发展，按时间顺序排列可能更有意义。在这种情况下，我们借助
    `ORDER BY` 子句。为了实现我们的目的，我们通过添加这个子句来修改查询（清单 5-2）。


    | language | year |

    | --- | --- |

    | APL | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year;

    ```


    清单 5-2：ORDER BY 子句的用法


    细心的读者会注意到，我们的 `ORDER BY` 子句输出是升序的。这是默认的排序方式，可以通过在希望排序的列后附加参数 `ASC` 来显式指定。要反转这个顺序，我们在
    `ORDER BY` 子句中使用参数 `DESC`，如下所示（清单 5-3）。


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year DESC;

    ```


    清单 5-3：使用带 DESC 参数的 ORDER BY 子句


    排序不仅限于数字字段。你也可以对基于字符的列进行排序。排序方法是从第一个字符开始按字母顺序排列，如果字符相同，则依次移动到下一个字符。这次让我们尝试按 `language`
    字段对查询结果进行排序（清单 5-4）。


    | language | year |

    | --- | --- |

    | APL | 1964 |

    | Perl | 1987 |

    | Prolog | 1972 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY language;

    ```


    清单 5-4：对基于字符的列使用 ORDER BY 子句


    ## 使用字段缩写进行排序


    SQL 中一个有用的快捷方式涉及使用整数缩写而不是完整的字段名对查询结果进行排序。缩写从 1 开始形成，它被赋予查询中指定的第一个字段；2 给第二个字段；依此类推。让我们重写我们的查询，使用字段缩写按年份降序排序输出（清单
    5-5）。


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY 2 DESC;

    ```


    清单 5-5：使用字段缩写按降序排序的 SELECT 查询


    赋予 `ORDER BY` 子句的 `2` 参数表示按查询中指定的第二个字段排序，即 `year`。随着时间的推移，我意识到字段缩写最好在交互式查询数据库系统时使用。如果你正在将
    SQL 嵌入编程语言中，使用字段缩写通常不是一个好主意。


    ## 按多列排序


    如果你希望按不止一列对结果进行排序怎么办？当排序列中的某些值相同时，这是一个合理的情景。例如，假设你有一个包含学生成绩和姓名的表。你想按成绩对学生进行排序，但很多学生都获得了
    A 等级。因此，你应用第二个排序，按姓名对所有 A 等级学生进行字母排序，然后是 B 等级学生，依此类推。


    让我们尝试使用我们的编程语言表来查看一个实际的例子。但为此，我们需要在其中插入更多行（清单 5-6）。


    ```sql

    INSERT INTO proglang_tbl (id, language, author, year, standard)

    VALUES (4, ''JOVIAL'', ''Schwartz'', 1959, ''US-DOD'');


    INSERT INTO proglang_tbl (id, language, author, year, standard)

    VALUES (5, ''APT'', ''Ross'', 1959, ''ISO'');

    ```


    清单 5-6：向我们的表中插入更多语言


    现在让我们按 `year` 和 `language` 对编程语言表进行排序，记住我们新插入的语言具有相同的创建年份（清单 5-7）。


    | language | year |

    | --- | --- |

    | APT | 1959 |

    | JOVIAL | 1959 |

    | APL | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year, language;

    ```


    清单 5-7：按多列排序


    你甚至可以对每一列使用不同的排序类型（清单 5-8）。


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |

    | APT | 1959 |

    | JOVIAL | 1959 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year DESC, language ASC;

    ```


    清单 5-8：结合不同的排序类型


    注意 `APT` 是如何排在 `JOVIAL` 之前的，因为我们为 `language` 字段指定了升序。'
- fmt: '## Putting Conditions with WHERE


    We have already seen how to select a subset of data available in a table by limiting
    the fields queried. We will now limit the number of records retrieved in a query
    using conditions. The `WHERE` clause is used to achieve this, and it can be combined
    with explicit field selection or ordering clauses to provide meaningful output.


    For a query to run successfully and fetch data from a table, it must have at least
    two parts – the `SELECT` and the `FROM` clause.[¹](#A457348_1_En_5_Chapter.html#Fn1)
    After this we place the optional `WHERE` condition and then the ordering clause.
    Thus, if we wanted to see the programming language (and its author), which was
    standardized by ANSI, we''d write our query as below (Listing [5-9](#A457348_1_En_5_Chapter.html#Par28)).


    | language | author |

    | --- | --- |

    | APL | Iverson |


    ```sql

    SELECT language,

    author

    FROM proglang_tbl

    WHERE standard = ''ANSI'';

    ```

    Listing 5-9: Using a `WHERE` conditional


    As you may have noticed, the query we formulated specified the language and author
    fields, but the condition was imposed on a separate field altogether – `standard`.
    Thus we can safely say that while we can choose what columns to display, our conditionals
    can work on a record with any of its fields.


    You are by no means restricted to use `=` (equals) for your conditions. It is
    perfectly acceptable to choose other operators like `<` and `>`. You can also
    include the `ORDER BY` clause and sort your output. An example is given below
    (Listing [5-10](#A457348_1_En_5_Chapter.html#Par31)).


    | language | author | year |

    | --- | --- | --- |

    | Prolog | Colmerauer | 1972 |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970

    ORDER BY author;

    ```

    Listing 5-10: Combining the `WHERE` and `ORDER BY`


    Notice that the output only shows programming languages developed after 1970 (at
    least according to our database). Also since the ordering is done by a `varchar`
    field, the sorting is done alphabetically in an ascending order.


    ## Combining Conditions


    If we can only specify one condition using the `WHERE` clause, it will fulfill
    only a tiny fraction of real-world requirements. We can however construct complex
    conditions using the boolean operators `AND` and `OR`.


    When we want our resultset to satisfy all of the multiple conditions, we use the
    `AND` operator (Listing [5-11](#A457348_1_En_5_Chapter.html#Par35)).


    | language | author | year |

    | --- | --- | --- |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970 AND standard IS NULL;

    ```

    Listing 5-11: Using the `AND` operator to combine conditions


    We have now combined the two conditions, meaning any row in the resultset must
    satisfy both the criteria mentioned. In our case, there is only one such row –
    Perl.


    An interesting point to note is our construction of the second conditional. We
    specify that the `standard` field should be a null value by specifying `IS NULL`.
    This is not the same as saying `standard = NULL`. If we attempt to write the latter
    as our conditional, we would get an empty result.


    While this may seem counterintuitive, it actually makes perfect sense. A null
    is supposed to signify undefined values, not a precise value like infinity or
    0 or even a complex number. We cannot rationalize the precise equivalence operator
    `=` for a null, and thus SQL interpreters use the `IS NULL` comparison.


    If we want our resultset to satisfy any one of our conditions, we use the `OR`
    operator. Let’s use this operator in the above example but with a different intention.
    We want all languages that were either created after 1970 or don’t have a standardizing
    body (Listing [5-12](#A457348_1_En_5_Chapter.html#Par40)).


    | language | author | year |

    | --- | --- | --- |

    | Prolog | Colmerauer | 1972 |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970 OR standard IS NULL;

    ```

    Listing 5-12: Using the `OR` operator


    Prolog only satisfies the first criterion that it was created after 1970 but was
    actually standardized by ISO. Perl satisfies both criteria and is also rightly
    shown. If we had a language in our table without a standardizing body but created
    before 1970, it would also sneak up on the resultset here.


    We can even create yet more complex queries by combining the `AND` and `OR` operators.
    One has to be careful to not make the logic of the filtering using these operators
    complex or unreadable.


    ## Footnotes


    [1](#A457348_1_En_5_Chapter.html#Fn1_source) If we let go of our from a table
    requirement, we can write a query with just `SELECT`. Try `SELECT 1` in your DBMS
    and see the output.


    # 6. Manipulating Data


    In this chapter we study the Data Manipulation Language (DML) part of SQL that
    is used to make changes to the data inside a relational database. The three basic
    commands of DML are as follows.


    *   `INSERT` Populates tables with new data

    *   `UPDATE` Updates existing data

    *   `DELETE` Deletes data from tables


    We have already seen a few examples on the `INSERT` statement including simple
    inserts, selective field insertions, and null value inserts. Thus we will concentrate
    on other ways to use this statement.'
