  trans: '

    # 前言


    ## 解释表


    关系数据库中的表本质上是一个二维数据矩阵，其中列描述数据类型，行包含待存储的实际数据。请查看表 1-1 以了解数据库中表的可视化形式。


    表 1-1


    描述编程语言的表


    | ID | 语言 | 作者 | 年份 |

    | --- | --- | --- | --- |

    | 1 | Fortran | Backus | 1955 |

    | 2 | Lisp | McCarthy | 1958 |

    | 3 | Cobol | Hopper | 1959 |


    上表存储了关于编程语言的数据。它由四列（`id`、`language`、`author` 和 `year`）和三行组成。数据库中列的正式术语是**字段**，行被称为**记录**。


    **注意**


    本书中的示例表主要涉及编程语言、其作者以及创建年份。我们本可以使用数据库查询语言，但它们的数量要少得多。


    自 20 世纪 50 年代和 60 年代以来，我们的计算机硬件和技术已经发生了很大变化，但那个时代的早期编程语言对今天的编程语言仍然有着持久的影响。Lisp——由约翰·麦卡锡于
    1958 年构想²——至今仍以 Common Lisp、Scheme 和 Clojure 的形式存在。甚至 Fortran 在科学计算中仍然被定期使用。


    示例表中有两点值得注意。第一点是 `id` 字段本身除了表示其在表中的顺序位置外，几乎不能提供任何关于编程语言的信息。第二点是，尽管我们可以通过查看字段名来理解它们，但我们还没有正式为它们分配数据类型，也就是说，我们还没有限制（至少目前还没有）一个字段应该包含字母、数字还是两者的组合。


    这里的 `id` 字段充当了表中的**主键**。它使得表中的每条记录都是唯一的，其优势在后续章节中将变得更加清晰。但现在请思考一下，如果一种语言的创造者在同一年创造了两种语言；我们将很难精确地定位记录。`id`
    字段通常是一个很好的主键，因为它保证是唯一的，但并不限制使用其他字段来达到此目的。


    表的一个关键概念是它们本质上是概念性的，可能与实际存储数据的文件无关。当用户创建电子表格时，他们会将一个文件名与该电子表格关联起来，并将其放置在磁盘上的某个位置。但关系数据库对用户隐藏了所有这些细节。表在磁盘上的物理存储可能对应单个文件，或多个文件，甚至可能是多个表存储在单个文件中的关系。你的数据库管理系统有责任提供读写表的方法。


    ## SQL 中的数据类型


    就像编程语言一样，SQL 也有数据类型，用于定义其字段中将存储何种数据。在上面的表中，我们可以看到字段 `language` 和 `author` 必须存储英文字符。`id`
    和 `year` 字段都存储整数。


    你在后续章节中会遇到的常用数据类型如表 1-2 所示。


    表 1-2


    SQL 中的各种数据类型


    | 字符类型 | `char`, `varchar` |

    | --- | --- |

    | 整数值 | `integer`, `smallint` |

    | 小数 | `numeric`, `decimal` |

    | 日期数据类型 | `date` |


    一串字符通常存储在 `char` 或 `varchar` 中。前者在你指定字段时会保留你所需的空间，但如果你存储的值较短，剩余的空间就会被浪费。然而，`varchar`
    代表可变长度字符，将精确占用字符串的长度，没有浪费。不过，你可以为这类字段分配的字符串值的最大长度是有限制的，这个限制在字段定义时指定。


    ```

    char(12)

    varchar(12)

    ```


    如果你存储值 ''McCarthy''（8 个字符长），`char` 会存储它但会浪费四个字符的空间。`varchar` 会精确地将其存储为八个字符，但这种动态性是以速度为代价的。尽管如此，速度差异非常小，以至于在大多数情况下，你会看到使用可变字符数据类型。


    对于数值，我们主要分为两大类——`integer` 用于存储整数，`numeric` 用于存储带小数点的数值。它们所能存储的值的范围和限制因你选择的数据库管理系统而异。然而，一个好的经验法则是使用能够满足应用程序当前和可预见未来需求的最小数据类型。


    例如，如果我要存储学生学号，使用 `smallint` 就很合适。在大多数实现中，这种数据类型允许的最大值为 32767，我预计这个数字在任何班级中都远大于学生人数。


    小数点的指定更为复杂。我们使用 `numeric` 数据类型来固定数字可以有多大以及小数点后可以有多少位数字。


    ```

    numeric(精度, 标度)

    numeric(5, 2)

    ```


    总位数由 `精度` 指定，小数点后的位数由 `标度` 表示。因此，在给定的示例中，我们将能够存储像 999.99 这样的数字，但不能再大。


    由于数据类型因数据库管理系统的实现而异，我建议你手边常备你的数据库管理系统手册。每种实现都为你提供了许多其他类型可供使用，但出于我们的学习目的，以上这些应该足够了。


    **脚注** 1


    Codd, E. F.; “大型共享数据库的关系模型,” Communications of the ACM, vol 13, no 6, June 1970,
    [`https://www.seas.upenn.edu/~zives/03f/cis550/codd.pdf`](https://www.seas.upenn.edu/%7Ezives/03f/cis550/codd.pdf)


    2


    McCarthy, John; “符号表达式的递归函数及其机器计算，第一部分,” Communications of the ACM, vol 3, issue
    4, April 1960, [`http://jmc.stanford.edu/articles/recursive/recursive.pdf`](http://jmc.stanford.edu/articles/recursive/recursive.pdf)


    # 2. 准备你的数据库


    学习 SQL 的最佳方法是在真实的关系数据库管理系统上练习编写命令。在本书中，SQL 将使用以下系统之一进行教授：PostgreSQL 或 SQLite。选择这些数据库管理系统的原因很简单——它们是免费且开源的，并且在大多数主要平台上可用。PostgreSQL
    是一个功能齐全的企业级数据库管理系统，拥有庞大的社区。SQLite 是一个小型但健壮的系统，特别适合学习目的。如果你对软件安装不熟悉，请选择后者。


    然而，任何你能接触到的关系数据库产品都应该能满足你的需求。在某些情况下，你可能已经在你的组织中拥有访问权限，但请务必申请将其用于学习目的的许可。不同供应商之间可能存在微小的不兼容性，因此，如果你在阅读本书时选择其他系统进行练习，最好手边备有该数据库供应商的用户手册。


    由于本文主要以独立于产品的方式教授 SQL，而不是教授特定的数据库管理系统，因此有关安装和特定产品操作的细节将保持在最低限度。相反，重点放在几个特定的步骤上，这些步骤将帮助你尽快开始编写
    SQL。

    '
- fmt: "## 使用 PostgreSQL\n\n本书撰写时，PostgreSQL 的最新版本是 9.6。你并不一定需要最新版本；实际上，我在本文中使用的版本是\
    \ 9.5。\n\n你可以从 [`https://www.postgresql.org/download/`](https://www.postgresql.org/download/)\
    \ 下载适用于你平台的 PostgreSQL 最新版本。为了最快、最简单的安装，我建议你从“二进制包”列表中选择你的平台。预编译的二进制文件意味着你可以像安装其他任何软件一样，通过图形化的分步安装程序下载并安装\
    \ PostgreSQL。\n\n选择平台后，你可能仍然会看到多种安装方式。我建议选择来自 BigSQL 或 EnterpriseDB 等第三方供应商的图形化安装程序版本。我为我的\
    \ Fedora Linux 机器选择了 EnterpriseDB 安装程序，当我运行下载的文件时，一个友好的安装过程就会弹出，询问诸如安装目录之类的详细信息（图\
    \ [2-1](#A457348_1_En_2_Chapter.html#Fig1)）。\n\n![A457348_1_En_2_Fig1_HTML.jpg](A457348_1_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1**  \nEnterpriseDB PostgreSQL 安装向导\n\n系统还会询问其他一些细节，最重要的是端口号和密码。端口号的默认值\
    \ `5432` 应该就足够了。安装完成后，你的系统上将拥有一个名为 `postgres` 的用户以及一个可用的数据库安装。\n\n你可以使用 `psql`\
    \ 来快速验证一切是否顺利，这是一个用于与你的 PostgreSQL 安装交互的命令行实用程序。我在下面捕获了来自我系统的命令和输出（清单 [2-1](#A457348_1_En_2_Chapter.html#Par9)）。\n\
    \n```\n[~]$ /opt/PostgreSQL/9.5/bin/psql -U postgres\npsql.bin (9.5.8)\nType \"\
    help\" for help.\npostgres=#\n```\n**清单 2-1**  \n启动 `psql` shell\n\n如果你得到类似的输出，那么你就可以开始使用你的\
    \ PostgreSQL 安装了。如果没有，恐怕你得自己做一些排查了。你也可以选择 SQLite，它将在下一节讨论，其安装过程要容易得多。\n\n## 使用\
    \ SQLite\n\n如果安装 PostgreSQL 看起来很困难，那么你很幸运。有一个非常可靠、免费的替代数据库供你练习。它叫做 SQLite，其创建者\
    \ D. Richard Hipp 将其慷慨地许可在公共领域。你可以从项目页面下载：[`https://www.sqlite.org/download.html`](https://www.sqlite.org/download.html)\n\
    \n和上一节一样，为了最快开始，你需要寻找与你操作系统对应的预编译二进制文件。SQLite 非常小巧；在大多数平台上，其核心引擎不到一兆字节！\n\n如果你使用的是\
    \ Microsoft Windows，你需要查找标题为“Precompiled Binaries for Windows”的部分。下载 SQLite DLL\
    \ zip 归档文件，名称类似于 `sqlite-dll-win32-x86-xxxxxxx.zip`，它包含了 SQLite 但没有交互方式。为此，你必须下载\
    \ SQLite shell，名称类似于 `sqlite-tools-win32-x86-xxxxxxx.zip`，这将允许我们通过命令行创建和查询 SQLite\
    \ 数据库。\n\n将这两个归档文件解压到同一个目录中，就完成了 SQLite 的安装。你的文件夹现在应该至少包含三个文件：\n\n*   `sqlite3.dll`\n\
    *   `sqlite3.def`\n*   `sqlite3.exe`\n\n最后一个文件是用于与 SQLite 数据库交互的命令行 shell。\n\n\
    如果你使用的是 Linux 或 MacOS X 系统，很可能你已经安装了 SQLite。为了测试这一点，你可以尝试启动 SQLite shell `sqlite3`（清单\
    \ [2-2](#A457348_1_En_2_Chapter.html#Par20)）。\n\n```\n[~]$ sqlite3\nSQLite version\
    \ 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\nConnected to a\
    \ transient in-memory database.\nUse \".open FILENAME\" to reopen on a persistent\
    \ database.\nsqlite>\n```\n**清单 2-2**  \n启动 `sqlite3` shell\n\n如果你得到如上所示的输出，那么你就拥有了运行\
    \ SQLite 所需的一切。或者，如果你收到错误消息，则意味着你需要自己安装它。你可以使用类似的平台预编译二进制方法，或者使用系统安装程序。\n\n对于像\
    \ Red Hat Enterprise Linux、Scientific Linux 和 CentOS 这样的系统，你可以使用 `yum` 来安装 SQLite。\n\
    \n```\n# yum install sqlite\n```\n\n在 Fedora Linux 系统上，你必须使用 `dnf`，如下所示。\n\n```\n\
    # dnf install sqlite\n```\n\n如果你恰好使用基于 Debian 或 Ubuntu 的系统，你可以通过以下方式实现相同的结果。\n\
    \n```\n$ sudo apt-get install sqlite3\n```\n\n安装完成后，你可以像之前一样通过启动 SQLite shell\
    \ 来验证安装。\n\n## 创建你自己的数据库\n\n像 PostgreSQL 这样的数据库管理系统允许你创建多个数据库。出于练习目的，建议创建你自己的数据库，这样你就可以自由地对其进行任何操作。\n\
    \n大多数数据库系统在提供数据库创建设施的方式上有所不同。PostgreSQL 通过提供多种方式来实现这一点，包括通过 `pgAdmin III` 图形化工具。然而，出于教学目的，我们将改用命令操作来创建我们的数据库。打开\
    \ `psql` shell 并输入如下命令（清单 [2-3](#A457348_1_En_2_Chapter.html#Par31)）。\n\n```\n\
    CREATE DATABASE testdb;\n```\n**清单 2-3**  \n在 PostgreSQL 中创建数据库\n\n命令 `CREATE\
    \ DATABASE` 用于创建一个数据库，该数据库将作为你表的容器。在上面显示的示例和输出中，我们创建了一个名为 `testdb` 的数据库供我们使用。你连接\
    \ `psql` 时使用的登录用户（在大多数情况下是 `postgres`）现在就是此数据库的所有者，并完全控制其中的实体。这类似于在操作系统中创建文件，创建者获得完全访问控制权，并可以选择授予其他用户和组特定的权限。\n\
    \n根据 SQL 标准的定义，允许以大小写不敏感的方式编写命令和关键字。在本书中，我们将在语句中使用大写字母来编写它们，这是一种被广泛接受的实践。\n\n\
    > **注意**\n>\n> 奇怪的是，SQL 标准并不包含 `CREATE DATABASE` 命令。在 1992 年的标准（恰当地命名为 SQL-92）中，有一个\
    \ `CREATE SCHEMA` 命令与前者接近但不完全相同。\n>\n> 然而在现代，像 MySQL 这样的数据库将这两个命令视为彼此的同义词。\n\n\
    如果你使用的是 SQLite，请启动命令 shell，你会看到一条打印版本信息的欢迎文本（清单 [2-4](#A457348_1_En_2_Chapter.html#Par37)）。这与我们之前在验证\
    \ SQLite 安装时看到的信息完全相同。\n\n```\nSQLite version 3.13.0 2016-05-18 10:57:30\nEnter\
    \ \".help\" for usage hints.\nConnected to a transient in-memory database.\nUse\
    \ \".open FILENAME\" to reopen on a persistent database.\nsqlite>\n```\n**清单 2-4**\
    \  \n打开 SQLite shell\n\n在这里，我们输入 `.open` 命令来创建 SQLite 数据库，或者在它已存在时打开它。\n\n```\n\
    sqlite> .open testdb\n```\n\n在 Linux 系统上，你也可以简单地在 SQLite shell 命令后写上数据库名称，如下所示，这样你就能够打开指定的数据库。\n\
    \n```\nsqlite3 testdb\n```\n\n有趣的是，这种调用方式不会创建 `testdb`，它只是在数据库存在时打开它。如果你不执行任何其他操作并关闭\
    \ shell（`Ctrl-D`），那么在 Linux 上你的机器上将不会有 `testdb` 文件。在 Windows 系统上，你将得到一个长度为 0 字节的空文件。"
  raw: '## Using PostgreSQL


    The latest version of PostgreSQL as of writing this book was 9.6\. You don’t absolutely
    need the latest version; in fact I use version 9.5 in this text.


    You can download the latest version of PostgreSQL from [`https://www.postgresql.org/download/`](https://www.postgresql.org/download/)
    for your platform. For the fastest and easiest installation, I would recommend
    you choose your platform from the Binary Packages list. Pre-built binaries mean
    that you can simply download and install PostgreSQL like any other software using
    a graphical step-by-step installer.


    After choosing your platform, you might still get multiple ways to perform an
    installation. I’d recommend choosing the graphical installer version from third-party
    vendors like BigSQL or EnterpriseDB. I had chosen the EnterpriseDB installer for
    my Fedora Linux machine, and a friendly installation procedure popped up when
    I ran the downloaded file, asking for details like the installation directory
    (Figure [2-1](#A457348_1_En_2_Chapter.html#Fig1)).


    ![A457348_1_En_2_Fig1_HTML.jpg](A457348_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    EnterpriseDB PostgreSQL installation wizard


    Some other details will also be asked for, most importantly the port number and
    password. The default value of 5432 for the port number should suffice. At the
    end of installation, you would have user named ‘postgres’ on your system and a
    working database installation.


    You can quickly verify that everything went well using psql, which is a command-line
    utility to interact with your PostgreSQL installation. I am capturing the command
    and output from my system below (Listing [2-1](#A457348_1_En_2_Chapter.html#Par9)).


    ```

    [~]$ /opt/PostgreSQL/9.5/bin/psql -U postgres

    psql.bin (9.5.8)

    Type "help" for help.

    postgres=#

    Listing 2-1

    Launching the psql shell

    ```


    If you get a similar output, you are ready to start using your PostgreSQL installation.
    If not, I’m afraid you will have to do some digging on your own. You can also
    choose SQLite, which is discussed in the next section and has a much easier installation
    procedure.


    ## Using SQLite


    If installing PostgreSQL seems like a daunting task, you are in luck. There is
    a very credible, free alternative database for you to practice on. It is called
    SQLite and its creator D. Richard Hipp has generously licensed it in the public
    domain. You can download it from the project page at: [`https://www.sqlite.org/download.html`](https://www.sqlite.org/download.html)


    Like the previous section, what you are looking for to get the fastest start is
    precompiled binaries corresponding to your operating system. SQLite is tiny; on
    most platforms its core engine is less than one megabyte!


    If you are using Microsoft Windows, you are looking for the section titled “Precompiled
    Binaries for Windows.” Download the SQLite DLL zip archive, named like sqlite-dll-win32-x86-xxxxxxx.zip,
    which contains SQLite but not a way to interact with it. For that you must download
    the SQLite shell, named like sqlite-tools-win32-x86-xxxxxxx.zip, which will allow
    us to create and query SQLite databases through the command line.


    Extract both these archives into the same directory and you are done installing
    SQLite. Your folder should now contain at least three files:


    *   sqlite3.dll

    *   sqlite3.def

    *   sqlite3.exe


    The last one launches the command shell used to interact with SQLite databases.


    If you are on a Linux or MacOS X system, chances are high that you already have
    SQLite installed. To test this, you can attempt launching the SQLite shell sqlite3
    (Listing [2-2](#A457348_1_En_2_Chapter.html#Par20)).


    ```

    [~]$ sqlite3

    SQLite version 3.13.0 2016-05-18 10:57:30

    Enter ".help" for usage hints.

    Connected to a transient in-memory database.

    Use ".open FILENAME" to reopen on a persistent database.

    sqlite>

    Listing 2-2

    Launching the sqlite3 shell

    ```


    If you get the output as above, you have everything you need to run SQLite. Alternatively,
    if you get an error message, it means you have to install it yourself. You can
    either use the similar precompiled binary method for your platform or you could
    use the system installer.


    For systems like Red Hat Enterprise Linux, Scientific Linux, and CentOS, you can
    use yum to install SQLite.


    ```

    # yum install sqlite

    ```


    On a Fedora Linux system, you have to use dnf as below.


    ```

    # dnf install sqlite

    ```


    If you happen to use a Debian- or Ubuntu-based system, you can achieve the same
    result with the following.


    ```

    $ sudo apt-get install sqlite3

    ```


    Once the installation is done, you can verify the installation by launching the
    SQLite shell as before.


    ## Creating Your Own Database


    Database management systems like PostgreSQL allow you to create multiple databases.
    For practice purposes, it''s advisable to create your own database, so that you
    are free to perform any operations on it.


    Most database systems differ in the way they provide database creation facilities.
    PostgreSQL achieves the same by providing you multiple ways to do this, including
    through the pgAdmin III graphical utility. However, for didactic purposes, we
    will instead use a command operation to create our database. Open up the psql
    shell and enter the command as below (Listing [2-3](#A457348_1_En_2_Chapter.html#Par31)).


    ```

    CREATE DATABASE testdb;

    Listing 2-3

    Creating a database in PostgreSQL

    ```


    The command CREATE DATABASE is used to create a database that will serve as a
    holding envelope for your tables. In the example and output shown above, we created
    a database called `testdb` for our use. The login user you used while connecting
    with `psql`, in most cases `postgres`, is now the owner of this database and has
    full control of entities within it. This is analogous to creating a file in an
    operating system where the creator gets full access control rights and may choose
    to give other users and groups specific rights.


    The SQL standard by definition allows commands and keywords to be written in a
    case-insensitive manner. In this book we will use uppercase letters while writing
    them in statements, which is a widely accepted practice.


    Note


    Oddly enough, the SQL standard doesn’t include the CREATE DATABASE command. In
    the 1992 standard, aptly named SQL-92, there is a CREATE SCHEMA command that was
    close to the former but not exactly similar.


    In modern times, however, databases like MySQL treat the two commands as synonyms
    of each other.


    If you are using SQLite, fire up the command shell, and you will be greeted with
    a text printing version information (Listing [2-4](#A457348_1_En_2_Chapter.html#Par37)).
    This is exactly the same message we saw in the previous section when we were verifying
    our SQLite installation.


    ```

    SQLite version 3.13.0 2016-05-18 10:57:30

    Enter ".help" for usage hints.

    Connected to a transient in-memory database.

    Use ".open FILENAME" to reopen on a persistent database.

    sqlite>

    Listing 2-4

    Opening the SQLite shell

    ```


    Here we enter our `.open` command to both create a SQLite database or open it
    in case it already exists.


    ```

    sqlite> .open testdb

    ```


    On a Linux system, you could also simply write the database name after the command
    of the SQLite shell like below, and you would be able to open the said database.


    ```

    sqlite3 testdb

    ```


    Interestingly, this invocation would not result in creation of testdb, it would
    simply open it if it exists. If you don’t perform any other operation and close
    the shell (Ctrl-D), there would be no testdb file on your machine on Linux. On
    a Windows system, you would get an empty file with a length of 0 bytes.'
