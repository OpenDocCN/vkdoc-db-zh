  trans: '## 使用 WHERE 设置条件


    我们已经了解了如何通过限制查询的字段来选取表中数据的一个子集。现在，我们将学习如何使用条件来限制查询中检索的记录数量。`WHERE` 子句正是用于实现这一目的，并且它可以与显式的字段选择或排序子句结合使用，以提供有意义的输出。


    为了使一个查询能够成功运行并从表中获取数据，它必须至少包含两个部分——`SELECT` 子句和 `FROM` 子句。¹ 在此之后，我们可以放置可选的 `WHERE`
    条件，然后是排序子句。因此，如果我们想查看由 ANSI 标准化的编程语言（及其作者），我们的查询可以这样写（参见代码清单 5-9）。


    | language | author |

    | --- | --- |

    | APL | Iverson |


    ```sql

    SELECT language,

    author

    FROM proglang_tbl

    WHERE standard = ''ANSI'';

    ```

    代码清单 5-9：使用 `WHERE` 条件


    你可能已经注意到，我们构建的查询指定了语言和作者字段，但条件却是施加在一个完全不同的字段上——`standard`。因此我们可以肯定地说，虽然我们可以选择要显示的列，但我们的条件判断可以作用于记录的任意字段。


    你绝非只能使用 `=`（等于）作为条件运算符。完全可以选择其他运算符，如 `<` 和 `>`。你还可以加入 `ORDER BY` 子句对输出进行排序。下面给出一个示例（代码清单
    5-10）。


    | language | author | year |

    | --- | --- | --- |

    | Prolog | Colmerauer | 1972 |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970

    ORDER BY author;

    ```

    代码清单 5-10：结合使用 `WHERE` 和 `ORDER BY`


    请注意，输出仅显示了 1970 年之后开发的编程语言（至少根据我们的数据库）。此外，由于排序是基于 `varchar` 类型的字段完成的，因此排序是按字母顺序升序排列的。


    ## 组合条件


    如果我们只能使用 `WHERE` 子句指定一个条件，那将只能满足现实世界中的一小部分需求。然而，我们可以使用布尔运算符 `AND` 和 `OR` 来构造复杂的条件。


    当我们希望结果集满足多个条件中的全部条件时，我们使用 `AND` 运算符（代码清单 5-11）。


    | language | author | year |

    | --- | --- | --- |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970 AND standard IS NULL;

    ```

    代码清单 5-11：使用 `AND` 运算符组合条件


    我们现在组合了两个条件，这意味着结果集中的任何一行都必须满足所提及的两个标准。在我们的例子中，只有一行满足——Perl。


    一个值得注意的有趣点是我们对第二个条件的构造。我们通过指定 `IS NULL` 来表明 `standard` 字段应该是一个空值。这与 `standard
    = NULL` 的说法是不同的。如果我们尝试将后者写成条件，我们将得到一个空的结果。


    虽然这看起来违反直觉，但实际上非常合理。空值应该表示未定义的值，而不是像无穷大、0 甚至复数那样精确的值。我们无法为空值合理化精确的等值运算符 `=`，因此
    SQL 解释器使用 `IS NULL` 进行比较。


    如果我们希望结果集满足我们条件中的任何一个，我们使用 `OR` 运算符。让我们在上面的例子中使用这个运算符，但意图不同。我们想要所有在 1970 年之后创建**或**没有标准化机构的语言（代码清单
    5-12）。


    | language | author | year |

    | --- | --- | --- |

    | Prolog | Colmerauer | 1972 |

    | Perl | Wall | 1987 |


    ```sql

    SELECT language,

    author,

    year

    FROM proglang_tbl

    WHERE year > 1970 OR standard IS NULL;

    ```

    代码清单 5-12：使用 `OR` 运算符


    Prolog 只满足第一个标准，即它在 1970 年之后创建，但实际上是由 ISO 标准化的。Perl 同时满足两个标准，因此也正确地显示出来。如果我们的表中有一种语言在
    1970 年之前创建但没有标准化机构，它也会出现在这里的结果集中。


    我们甚至可以通过组合 `AND` 和 `OR` 运算符来创建更复杂的查询。需要注意的是，不要使用这些运算符使过滤逻辑变得复杂或难以阅读。


    ## 脚注


    1 如果我们放弃“从表中查询”的要求，我们可以只写一个包含 `SELECT` 的查询。在你的 DBMS 中试试 `SELECT 1`，看看输出结果。


    # 6. 操作数据


    在本章中，我们将学习 SQL 的数据操作语言（DML）部分，它用于对关系型数据库内的数据进行更改。DML 的三个基本命令如下。


    *   `INSERT` 用新数据填充表

    *   `UPDATE` 更新现有数据

    *   `DELETE` 从表中删除数据


    我们已经看过一些关于 `INSERT` 语句的例子，包括简单插入、选择性字段插入和空值插入。因此，我们将专注于使用此语句的其他方式。'
- fmt: '## Inserting Data into a Table from Another Table


    You can insert new records into a table from another one by using a combination
    of `INSERT` and `SELECT`. This is pretty close to the way we combined `CREATE
    TABLE` and `SELECT` to create a new table with rows from another table.


    Since a query would return you some records, combining it with an insertion command
    would enter these records into the new table. You can even use a `WHERE` conditional
    to limit or filter the records you wish to enter into the new table. We will now
    create a new table called `stdlang_tbl`, which will have only two fields – `language`
    and `standard`. In this we would insert rows from the `proglang_tbl` table that
    have a non-null value in the `standard` field (Listing 6-1). This will also demonstrate
    our first use of a boolean operator – `NOT`.


    ```sql

    CREATE TABLE stdlang_tbl

    (language varchar(20),

    standard varchar (10));

    INSERT INTO stdlang_tbl

    SELECT language,

    standard

    FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ```

    Listing 6-1

    Using `INSERT` and `SELECT` to conditionally load data into another table


    Note that we had to create the table separately in this case and then insert data
    into it using `INSERT` and `SELECT`. The `NOT` inverts the `IS NULL` test, that
    is, if something is a null value instead of normally returning a `true`, the `NOT`
    makes the conditional return a `false`.


    `NOT`, `NULL`, `True` and `False`


    If we consider boolean logic principles, the closest analogue to `NULL` is the
    value `false`. However `NOT` inverts a boolean value: `true` becomes `false`,
    and `false` becomes `true`.


    Testing a value with `IS NULL` is an SQL comparison, returning a `true` for every
    null value. This is what we have inverted in the example above using `NOT`. Don’t
    confuse the meaning of this comparison with what boolean value a `NULL` closely
    represents.


    When you view the contents of this table, you will notice that it has picked up
    the languages that actually had a `standard` column value (Table 6-1).


    Table 6-1

    Contents of Our Newly Created `stdlang_tbl` table


    | language | standard |

    | --- | --- |

    | Prolog | ISO |

    | APL | ANSI |

    | JOVIAL | US-DOD |

    | APT | ISO |


    The data being populated by `INSERT INTO` and `SELECT` must adhere to the constraints
    defined during table creation. If our `stdlang_tbl` had defined `language` as
    its primary key, our insert statements would run fine unless we encountered a
    duplicate `language` value (Listing 6-2). This is not a problem in our case currently
    since the languages are themselves unique.


    ```sql

    DROP TABLE stdlang_tbl;

    CREATE TABLE stdlang_tbl

    (language varchar(20) PRIMARY KEY,

    standard varchar (10));

    INSERT INTO stdlang_tbl

    SELECT language,

    standard

    FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ```

    Listing 6-2

    An altered definition of `stdlang_tbl` with the primary key


    What would happen if we somehow violated the constraints? For example, let us
    go about creating a new table `standardizing_bodies` that contains only one field
    – `name`. The only constraint on this is `UNIQUE`. We already know that both Prolog
    and APT from our `proglang_tbl` were standardized by ISO. Let’s try to simulate
    this using code (Listing 6-3).


    ```sql

    CREATE TABLE standardizing_bodies

    ( name varchar(10) UNIQUE );

    INSERT INTO standardizing_bodies

    SELECT standard FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ERROR:  duplicate key value violates unique constraint "standardizing_bodies_name_key"

    DETAIL:  Key (name)=(ISO) already exists.

    ```

    Listing 6-3

    Violating the `UNIQUE` constraint while `INSERT INTO … SELECT`


    Note that the contents of this new table `standardizing_bodies` will be empty.
    Our `INSERT` operation was a single statement, not a collection of unique inserts.
    Thus when the constraint was violated, no data was inserted.


    ## Updating Existing Data


    To modify some data in a record, we use the `UPDATE` command. While it cannot
    add or delete records (those responsibilities are delegated to other commands),
    if a record exists it can modify its data even affecting multiple fields in one
    go and applying conditions. The general syntax of an `UPDATE` statement is given
    below (Listing 6-4).


    ```sql

    UPDATE <table_name> SET

    <column1> = <value1>,

    <column2> = <value2>,

    <column3> = <value3>

    . . .

    WHERE <condition>;

    ```

    Listing 6-4

    General syntax of the `UPDATE` command


    Let us now return to our `proglang_tbl` table and add a new row about the Forth
    and Tcl programming languages (Listing 6-5).


    ```sql

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (6, ''Forth'', ''Moore'', 1973, NULL);

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (7, ''Tcl'', ''Ousterhout'', 1988, NULL);

    ```

    Listing 6-5

    Populating some more data in our programming languages table


    What if we suddenly wanted to add 10 years to each language’s creation year? Since
    we want to apply the `UPDATE` logic to every row, we can forego the search conditions
    (Listing 6-6).


    ```sql

    UPDATE proglang_tbl SET

    year = year + 10;

    ```

    Listing 6-6

    Running an `UPDATE` on all rows of a table


    This query would increase all language creation years by 10. There is no ambiguity
    here, since the right-hand side `year + 10` is calculated first and then assigned
    to the `year` field. This happens for all rows. To get back to our original dates,
    simply run the same query with the `SET` column as `year = year – 10`.


    We later realize that the Forth language was created near 1972 (instead of 1973),
    and it actually has been standardized in 1994 by the ANSI. Thus we now go about
    correcting our mistakes by writing our update queries to reflect this data (Listing
    6-7). We should note that we must include a search condition for the Forth language
    only.


    ```sql

    UPDATE proglang_tbl SET

    year = 1972

    WHERE language = ''Forth'';

    UPDATE proglang_tbl SET

    standard = ''ANSI''

    WHERE language = ''Forth'';

    ```

    Listing 6-7

    Updating the Forth language details


    We could have easily combined updating the multiple fields in a single statement,
    thus saving the DBMS engine the trouble to find the row again (Listing 6-8).


    ```sql

    UPDATE proglang_tbl SET

    year = 1972,

    standard = ''ANSI''

    WHERE language = ''Forth'';

    ```

    Listing 6-8

    Updating multiple fields in a single statement


    If you''ve typed the statement correctly and no errors are thrown back, the contents
    of the record in question would have been modified as intended. Verifying the
    result of the same involves a simple query the likes of which we have seen in
    previous examples.'
  raw: "## Inserting Data into a Table from Another Table\n\nYou can insert new records\
    \ into a table from another one by using a combination of `INSERT` and `SELECT`.\
    \ This is pretty close to the way we combined `CREATE TABLE` and `SELECT` to create\
    \ a new table with rows from another table.\n\nSince a query would return you\
    \ some records, combining it with an insertion command would enter these records\
    \ into the new table. You can even use a `WHERE` conditional to limit or filter\
    \ the records you wish to enter into the new table. We will now create a new table\
    \ called stdlang_tbl, which will have only two fields – language and standard.\
    \ In this we would insert rows from the proglang_tbl table that have a non-null\
    \ value in the standard field (Listing [6-1](#A457348_1_En_6_Chapter.html#Par8)).\
    \ This will also demonstrate our first use of a boolean operator – `NOT`.\n\n\
    ```\nCREATE TABLE stdlang_tbl\n(language varchar(20),\nstandard varchar (10));\n\
    INSERT INTO stdlang_tbl\nSELECT language,\nstandard\nFROM proglang_tbl\nWHERE\
    \ standard IS NOT NULL;\nListing 6-1\nUsing INSERT and SELECT to conditionally\
    \ load data into another table\n```\n\nNote that we had to create the table separately\
    \ in this case and then insert data into it using `INSERT` and `SELECT`. The `NOT`\
    \ inverts the `IS NULL` test, that is, if something is a null value instead of\
    \ normally returning a true, the `NOT` makes the conditional return a false.\n\
    \nNOT, NULL, True and False\n\nIf we consider boolean logic principles, the closest\
    \ analogue to `NULL` is the value false. However `NOT` inverts a boolean value:\
    \ true becomes false, and false becomes true.\n\nTesting a value with `IS NULL`\
    \ is an SQL comparison, returning a true for every null value. This is what we\
    \ have inverted in the example above using `NOT`. Don’t confuse the meaning of\
    \ this comparison with what boolean value a `NULL` closely represents.\n\nWhen\
    \ you view the contents of this table, you will notice that it has picked up the\
    \ languages that actually had a standard column value (Table [6-1](#A457348_1_En_6_Chapter.html#Tab1)).\n\
    \nTable 6-1\n\nContents of Our Newly Created stdlang_tbl table\n\n| language |\
    \ standard |\n| --- | --- |\n| Prolog | ISO |\n| APL | ANSI |\n| JOVIAL | US-DOD\
    \ |\n| APT | ISO |\n\nThe data being populated by `INSERT INTO` and `SELECT` must\
    \ adhere to the constraints defined during table creation. If our stdlang_tbl\
    \ had defined language as its primary key, our insert statements would run fine\
    \ unless we encountered a duplicate language value (Listing [6-2](#A457348_1_En_6_Chapter.html#Par14)).\
    \ This is not a problem in our case currently since the languages are themselves\
    \ unique.\n\n```\nDROP TABLE stdlang_tbl;\nCREATE TABLE stdlang_tbl\n(language\
    \ varchar(20) PRIMARY KEY,\nstandard varchar (10));\nINSERT INTO stdlang_tbl\n\
    SELECT language,\nstandard\nFROM proglang_tbl\nWHERE standard IS NOT NULL;\nListing\
    \ 6-2\nAn altered definition of stdlang_tbl with the primary key\n```\n\nWhat\
    \ would happen if we somehow violated the constraints? For example, let us go\
    \ about creating a new table standardizing_bodies that contains only one field –\
    \ name. The only constraint on this is `UNIQUE`. We already know that both Prolog\
    \ and APT from our proglang_tbl were standardized by ISO. Let’s try to simulate\
    \ this using code (Listing [6-3](#A457348_1_En_6_Chapter.html#Par16)).\n\n```\n\
    CREATE TABLE standardizing_bodies\n( name varchar(10) UNIQUE );\nINSERT INTO standardizing_bodies\n\
    SELECT standard FROM proglang_tbl\nWHERE standard IS NOT NULL;\nERROR:  duplicate\
    \ key value violates unique constraint \"standardizing_bodies_name_key\"\nDETAIL:\
    \  Key (name)=(ISO) already exists.\nListing 6-3\nViolating the UNIQUE constraint\
    \ while INSERT INTO … SELECT\n```\n\nNote that the contents of this new table\
    \ standardizing_bodies will be empty. Our `INSERT` operation was a single statement,\
    \ not a collection of unique inserts. Thus when the constraint was violated, no\
    \ data was inserted.\n\n## Updating Existing Data\n\nTo modify some data in a\
    \ record, we use the `UPDATE` command. While it cannot add or delete records (those\
    \ responsibilities are delegated to other commands), if a record exists it can\
    \ modify its data even affecting multiple fields in one go and applying conditions.\
    \ The general syntax of an `UPDATE` statement is given below (Listing [6-4](#A457348_1_En_6_Chapter.html#Par19)).\n\
    \n```\nUPDATE  SET\n = ,\n = ,\n = \n. . .\nWHERE ;\nListing 6-4\nGeneral syntax\
    \ of the UPDATE command\n```\n\nLet us now return to our proglang_tbl table and\
    \ add a new row about the Forth and Tcl programming languages (Listing [6-5](#A457348_1_En_6_Chapter.html#Par21)).\n\
    \n```\nINSERT INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n\
    (6, 'Forth', 'Moore', 1973, NULL);\nINSERT INTO proglang_tbl\n(id, language, author,\
    \ year, standard)\nVALUES\n(7, 'Tcl', 'Ousterhout', 1988, NULL);\nListing 6-5\n\
    Populating some more data in our programming languages table\n```\n\nWhat if we\
    \ suddenly wanted to add 10 years to each language’s creation year? Since we want\
    \ to apply the `UPDATE` logic to every row, we can forego the search conditions\
    \ (Listing [6-6](#A457348_1_En_6_Chapter.html#Par23)).\n\n```\nUPDATE proglang_tbl\
    \ SET\nyear = year + 10;\nListing 6-6\nRunning an UPDATE on all rows of a table\n\
    ```\n\nThis query would increase all language creation years by 10\\. There is\
    \ no ambiguity here, since the right-hand side `year + 10` is calculated first\
    \ and then assigned to the year field. This happens for all rows. To get back\
    \ to our original dates, simply run the same query with the `SET` column as `year\
    \ = year – 10`.\n\nWe later realize that the Forth language was created near 1972\
    \ (instead of 1973), and it actually has been standardized in 1994 by the ANSI.\
    \ Thus we now go about correcting our mistakes by writing our update queries to\
    \ reflect this data (Listing [6-7](#A457348_1_En_6_Chapter.html#Par26)). We should\
    \ note that we must include a search condition for the Forth language only.\n\n\
    ```\nUPDATE proglang_tbl SET\nyear = 1972\nWHERE language = 'Forth';\nUPDATE proglang_tbl\
    \ SET\nstandard = 'ANSI'\nWHERE language = 'Forth';\nListing 6-7\nUpdating the\
    \ Forth language details\n```\n\nWe could have easily combined updating the multiple\
    \ fields in a single statement, thus saving the DBMS engine the trouble to find\
    \ the row again (Listing [6-8](#A457348_1_En_6_Chapter.html#Par28)).\n\n```\n\
    UPDATE proglang_tbl SET\nyear = 1972,\nstandard = 'ANSI'\nWHERE language = 'Forth';\n\
    Listing 6-8\nUpdating multiple fields in a single statement\n```\n\nIf you've\
    \ typed the statement correctly and no errors are thrown back, the contents of\
    \ the record in question would have been modified as intended. Verifying the result\
    \ of the same involves a simple query the likes of which we have seen in previous\
    \ examples."
