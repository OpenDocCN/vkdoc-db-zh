    ### G

    - **Genesis of relational model**

    - **`GROUP BY` clause**: adding language, aggregate functions, `COUNT`, multiple
    standard group records, `SELECT` clause

    - **Grouping data** (See `GROUP BY` clause)


    ### H

    - **`HAVING` clause**

    - **H2 database**

    - **Hierarchical database**

    - **Homonym**

    - **HyperSQL**


    ### I

    - **Indexed Sequential Access Method (ISAM)**

    - **Indexing**: `CREATE INDEX` command, databases, `DROP INDEX` command, `pg_size_pretty`
    function, `pg_total_relation_size` function, `proglang_tbl` storage syntax, table
    and index size verification, PostgreSQL, SQLite, `pragma`, SQLite schema visual
    representation

    - **Information Management System (IMS)**

    - **Ingres**

    - **Inner joins**

    - **Integrated Data Store (IDS)**

    - **Intersection operation**: `INTERSECT ALL` operator, `INTERSECT` keyword, multiple
    columns, SQL translation


    ### J, K

    - **Joins**: columns, resolving ambiguity, cross, equijoin, `FROM/WHERE` syntax,
    inner, non-equi, normalization, outer, self, syntax, table aliases


    ### L

    - **`LIKE` operator**

    - **Literal values**

    - **Logical data models**


    ### M

    - **MariaDB**

    - **Mathematical calculations**: creation decade, language operators, remainder
    operation


    ### N

    - **Network data model**

    - **Non-equi joins**

    - **Normalization**

    - **`NULL` constraints**: `CREATE TABLE` statement, error message, PostgreSQL,
    selective fields `INSERT`, general syntax, `proglang_tblcopy` table, SQLite, standard
    field


    ### O

    - **Organizing data**: atomicity, normalization, repeating groups, tables, foreign
    key constraint, referential integrity

    - **Outer joins**


    ### P

    - **PostgreSQL**: Binary Packages command, `CREATE DATABASE`, DBMS systems download,
    latest version, inserting data, installation directory, EnterpriseDB, port number
    and password, `psql` command and output, table creation, table information

    - **Primary key constraint**: `CREATE TABLE` statement, definition, ID fields,
    `proglang_tblcopy` table, vs . unique key

    - **Primitive set theoretic operations**

    - `PUBLIC` keyword


    ### Q

    - **`QUEL`**

    - **Queries**: `AND` operator, column aliases, counting records, table, database
    administration, `DISTINCT` with `COUNT`, field abbreviations, `LIKE` operator,
    number of fields, `ORDER BY` clause, ordering by multiple columns, `OR` operator,
    `SELECT` command, `SELECT` evaluation, `*`, selection criteria, `WHERE` condition

    - **Query plan**


    ### R

    - **Referential integrity**

    - **Relational algebra**

