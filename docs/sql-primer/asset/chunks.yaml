- fmt: '## Using Subqueries in INSERT Statements


    We can even use subqueries inside other SQL statement like `INSERT`. Let us try
    to add a new language and a new author in our tables and ease our task of remembering
    id numbers by just a bit by using subqueries (Listing [12-5](#A457348_1_En_12_Chapter.html#Par24)).


    ```

    INSERT INTO newlang_tbl

    (id, language, year, standard)

    VALUES (7, ''Pascal'', 1970, ''ISO'');

    Listing 12-5

    Inserting a new programming language

    ```


    The updated content of our programming languages table now looks as shown below
    (Table [12-1](#A457348_1_En_12_Chapter.html#Tab1)).


    Table 12-1


    Contents of `newlang_tbl`


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 |   |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 |   |

    | 5 | BASIC | 1964 | ANSI |

    | 6 | Lisp | 1958 | ANSI |

    | 7 | Pascal | 1970 | ISO |


    While inserting a new entry into the `authors_tbl`, we can either remember that
    we used the `language_id` as 7 for Pascal or use a subquery. Let us see an example
    of the latter approach (Listing [12-6](#A457348_1_En_12_Chapter.html#Par27)).
    After all, the title of the chapter gave away our approach!


    ```

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (7, ''Wirth'',

    (SELECT id FROM newlang_tbl WHERE language="Pascal")

    );

    Listing 12-6

    Inserting a new author using a subquery

    ```


    We believe that this should put the correct language id for Mr. Wirth since he
    created Pascal. Let us verify this belief by looking at the contents of the table.


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |

    | 7 | Wirth | 7 |


    You can even use subqueries to control your `UPDATE` and `DELETE` statements.
    The logic remains much the same as with using subqueries in `SELECT` and `INSERT`.


    ## Using ANY and ALL


    The `ANY` operator used with the arithmetic comparison operators can be used to
    check a column value in comparison to a similar value(s) generated in the subquery.
    For example, if we wanted to display all the languages but exclude the oldest
    one from the result, we could combine `>` and `ANY` to achieve this (Listing [12-7](#A457348_1_En_12_Chapter.html#Par31)).


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | Tcl |

    | BASIC |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year > ANY (SELECT year FROM newlang_tbl);

    Listing 12-7

    Using the ANY operator

    ```


    Only `Lisp` does not have a creation year that is not greater than any of the
    list of values returned by the subquery. Obviously, this is because the smallest
    value returned is the creation year of `Lisp` itself, and thus it does not feature
    in the final result.


    Now what would happen if we reversed our comparison operator to `<` `ANY`? The
    result would include all languages whose year value is less than any one of the
    creation years returned by the subquery (Listing [12-8](#A457348_1_En_12_Chapter.html#Par34)).


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | BASIC |

    | Lisp |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year < ANY (SELECT year FROM newlang_tbl);

    Listing 12-8

    Using the ANY operator with <

    ```


    We notice that `Lisp` has snuck into the resultset but `Tcl` is notably absent.
    This is because the year of `Tcl`, that is, 1988 is not less than any of the values
    returned by the subquery. Equal to? Sure, but not distinctly less than.


    The other comparison conjunction we can use with `ANY` is `=`, but that is rarely
    seen because it is equivalent to using `IN`, which is much more intuitive.


    **SQLite does not support ANY or ALL operators**


    If you tried running the above examples in SQLite, you would get an error message
    as below.


    ```

    Error: near "SELECT": syntax error

    ```


    SQLite currently does not support these keywords, but we can still achieve the
    same results using what we have to work with. Let’s attempt to rewrite Listing
    [12-7](#A457348_1_En_12_Chapter.html#Par31) displaying all languages but the oldest
    one.


    ```

    SELECT language FROM newlang_tbl

    WHERE year > (SELECT MIN(year) FROM newlang_tbl);

    ```


    The above query computes our desired resultset just fine and is pretty readable.
    Some, including yours truly, actually prefer it to the `ANY` syntax. If you are
    wondering about `<>`, it means not equal to.


    The `ALL` operator works similarly, but the value in the `WHERE` clause must hold
    true for all of the values returned from the subquery (Listing [12-9](#A457348_1_En_12_Chapter.html#Par43)).
    One scenario where `ALL` gets usage is to find data related to extreme values
    like minima and maxima. You are of course free to choose the built-in functions
    `MAX` and `MIN` for the purpose too.


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year <= ALL (SELECT year FROM newlang_tbl);

    Listing 12-9

    Using the ALL operator

    ```


    ![A457348_1_En_12_Figb_HTML.gif](A457348_1_En_12_Figb_HTML.gif)


    Only `Lisp` being the oldest language in our table would satisfy the `ALL` criteria
    of having a year value less than or equal to all the values from the subquery.
    Similarly, we can use `ALL` to find the latest language too (Listing [12-10](#A457348_1_En_12_Chapter.html#Par45)).


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year >= ALL (SELECT year FROM newlang_tbl);

    Listing 12-10

    Using the ALL operator with >=

    ```


    ![A457348_1_En_12_Figc_HTML.gif](A457348_1_En_12_Figc_HTML.gif)


    # 13. Working in Sets


    Set theory is a branch of discrete mathematics that deals with a collection of
    objects. There is a lot of conceptual overlap between set theory and relational
    database concepts. It is no wonder that the output of a query is frequently called
    a resultset.


    Primitive set theoretic operations like union, intersection, and difference are
    increasingly supported in various implementations. We will now explore the theory
    behind these operations and how to use them in SQL.'
  raw: '## Using Subqueries in INSERT Statements


    We can even use subqueries inside other SQL statement like `INSERT`. Let us try
    to add a new language and a new author in our tables and ease our task of remembering
    id numbers by just a bit by using subqueries (Listing [12-5](#A457348_1_En_12_Chapter.html#Par24)).


    ```

    INSERT INTO newlang_tbl

    (id, language, year, standard)

    VALUES (7, ''Pascal'', 1970, ''ISO'');

    Listing 12-5

    Inserting a new programming language

    ```


    The updated content of our programming languages table now looks as shown below
    (Table [12-1](#A457348_1_En_12_Chapter.html#Tab1)).


    Table 12-1


    Contents of newlang_tbl


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 |   |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 |   |

    | 5 | BASIC | 1964 | ANSI |

    | 6 | Lisp | 1958 | ANSI |

    | 7 | Pascal | 1970 | ISO |


    While inserting a new entry into the authors_tbl, we can either remember that
    we used the language_id as 7 for Pascal or use a subquery. Let us see an example
    of the latter approach (Listing [12-6](#A457348_1_En_12_Chapter.html#Par27)).
    After all, the title of the chapter gave away our approach!


    ```

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (7, ''Wirth'',

    (SELECT id FROM newlang_tbl WHERE language="Pascal")

    );

    Listing 12-6

    Inserting a new author using a subquery

    ```


    We believe that this should put the correct language id for Mr. Wirth since he
    created Pascal. Let us verify this belief by looking at the contents of the table.


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |

    | 7 | Wirth | 7 |


    You can even use subqueries to control your `UPDATE` and `DELETE` statements.
    The logic remains much the same as with using subqueries in `SELECT` and `INSERT`.


    ## Using ANY and ALL


    The `ANY` operator used with the arithmetic comparison operators can be used to
    check a column value in comparison to a similar value(s) generated in the subquery.
    For example, if we wanted to display all the languages but exclude the oldest
    one from the result, we could combine `>` and `ANY` to achieve this (Listing [12-7](#A457348_1_En_12_Chapter.html#Par31)).


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | Tcl |

    | BASIC |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year > ANY (SELECT year FROM newlang_tbl);

    Listing 12-7

    Using the ANY operator

    ```


    Only Lisp does not have a creation year that is not greater than any of the list
    of values returned by the subquery. Obviously, this is because the smallest value
    returned is the creation year of Lisp itself, and thus it does not feature in
    the final result.


    Now what would happen if we reversed our comparison operator to `<` `ANY` ? The
    result would include all languages whose year value is less than any one of the
    creation years returned by the subquery (Listing [12-8](#A457348_1_En_12_Chapter.html#Par34)).


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | BASIC |

    | Lisp |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year < ANY (SELECT year FROM newlang_tbl);

    Listing 12-8

    Using the ANY operator with <

    ```


    We notice that Lisp has snuck into the resultset but Tcl is notably absent. This
    is because the year of Tcl, that is, 1988 is not less than any of the values returned
    by the subquery. Equal to? Sure, but not distinctly less than.


    The other comparison conjunction we can use with `ANY` is `=`, but that is rarely
    seen because it is equivalent to using `IN (),` which is much more intuitive.


    SQLite does not support ANY or ALL operators


    If you tried running the above examples in SQLite, you would get an error message
    as below.


    ```

    Error: near "SELECT": syntax error

    ```


    SQLite currently does not support these keywords, but we can still achieve the
    same results using what we have to work with. Let’s attempt to rewrite Listing
    [12-7](#A457348_1_En_12_Chapter.html#Par31) displaying all languages but the oldest
    one.


    ```

    SELECT language FROM newlang_tbl

    WHERE year  (SELECT MIN(year) FROM newlang_tbl);

    ```


    The above query computes our desired resultset just fine and is pretty readable.
    Some, including yours truly, actually prefer it to the `ANY` syntax. If you are
    wondering about `<>`, it means not equal to.


    The `ALL` operator works similarly, but the value in the `WHERE` clause must hold
    true for all of the values returned from the subquery (Listing [12-9](#A457348_1_En_12_Chapter.html#Par43)).
    One scenario where `ALL` gets usage is to find data related to extreme values
    like minima and maxima. You are of course free to choose the built-in functions
    `MAX` and `MIN` for the purpose too.


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year <= ALL (SELECT year FROM newlang_tbl);

    Listing 12-9

    Using the ALL operator

    ```


    ![A457348_1_En_12_Figb_HTML.gif](A457348_1_En_12_Figb_HTML.gif)


    Only Lisp being the oldest language in our table would satisfy the `ALL` criteria
    of having a year value less than or equal to all the values from the subquery.
    Similarly, we can use `ALL` to find the latest language too (Listing [12-10](#A457348_1_En_12_Chapter.html#Par45)).


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year >= ALL (SELECT year FROM newlang_tbl);

    Listing 12-10

    Using the ALL operator with >=

    ```


    ![A457348_1_En_12_Figc_HTML.gif](A457348_1_En_12_Figc_HTML.gif)


    # 13. Working in Sets


    Set theory is a branch of discrete mathematics that deals with a collection of
    objects. There is a lot of conceptual overlap between set theory and relational
    database concepts. It is no wonder that the output of a query is frequently called
    a resultset.


    Primitive set theoretic operations like union, intersection, and difference are
    increasingly supported in various implementations. We will now explore the theory
    behind these operations and how to use them in SQL.'
  trans: '

    ## 在 INSERT 语句中使用子查询


    我们甚至可以在其他 SQL 语句（如`INSERT`）中使用子查询。让我们尝试向表中添加一种新语言和一个新作者，并通过使用子查询来略微简化我们记忆 ID 号码的任务（参见列表
    12-5）。


    ```

    INSERT INTO newlang_tbl

    (id, language, year, standard)

    VALUES (7, ''Pascal'', 1970, ''ISO'');

    列表 12-5

    插入一种新的编程语言

    ```


    现在，我们编程语言表更新后的内容如下所示（表 12-1）。


    表 12-1


    `newlang_tbl`的内容


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 |   |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 |   |

    | 5 | BASIC | 1964 | ANSI |

    | 6 | Lisp | 1958 | ANSI |

    | 7 | Pascal | 1970 | ISO |


    在向`authors_tbl`插入新条目时，我们既可以记住为 Pascal 使用的`language_id`是 7，也可以使用一个子查询。让我们看看后一种方法的例子（列表
    12-6）。毕竟，章节的标题已经揭示了我们的方法！


    ```

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (7, ''Wirth'',

    (SELECT id FROM newlang_tbl WHERE language="Pascal")

    );

    列表 12-6

    使用子查询插入新作者

    ```


    我们相信这应该会为 Wirth 先生设置正确的语言 ID，因为他创造了 Pascal。让我们通过查看表的内容来验证这一信念。


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |

    | 7 | Wirth | 7 |


    你甚至可以使用子查询来控制你的`UPDATE`和`DELETE`语句。其逻辑与在`SELECT`和`INSERT`中使用子查询基本一致。


    ## 使用 ANY 和 ALL


    `ANY`运算符与算术比较运算符一起使用，可用于将列值与子查询生成的一个或多个类似值进行比较。例如，如果我们想显示所有语言但排除最古老的一种，我们可以结合使用`>`和`ANY`来实现（列表
    12-7）。


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | Tcl |

    | BASIC |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year > ANY (SELECT year FROM newlang_tbl);

    列表 12-7

    使用 ANY 运算符

    ```


    只有`Lisp`的创建年份并不大于子查询返回的任何值列表中的任何一个值。显然，这是因为返回的最小值是`Lisp`本身的创建年份，因此它没有出现在最终结果中。


    那么，如果我们把比较运算符反转为`< ANY`会怎样呢？结果将包括其年份值小于子查询返回的任何一个创建年份的所有语言（列表 12-8）。


    | language |

    | --- |

    | Prolog |

    | Perl |

    | APL |

    | BASIC |

    | Lisp |

    | Pascal |


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year < ANY (SELECT year FROM newlang_tbl);

    列表 12-8

    与<一起使用 ANY 运算符

    ```


    我们注意到`Lisp`已经悄悄进入了结果集，而`Tcl`则明显缺席。这是因为`Tcl`的年份，即 1988 年，并不小于子查询返回的任何值。等于？当然，但不是明确地小于。


    我们可以与`ANY`一起使用的另一个比较连词是`=`，但这很少见，因为它等同于使用`IN`，而后者要直观得多。


    **SQLite 不支持 ANY 或 ALL 运算符**


    如果你尝试在 SQLite 中运行上面的例子，你会得到如下的错误信息。


    ```

    Error: near "SELECT": syntax error

    ```


    SQLite 目前不支持这些关键字，但我们仍然可以使用现有的工具来实现相同的结果。让我们尝试重写列表 12-7，显示除最古老语言之外的所有语言。


    ```

    SELECT language FROM newlang_tbl

    WHERE year > (SELECT MIN(year) FROM newlang_tbl);

    ```


    上面的查询很好地计算出了我们期望的结果集，并且相当易读。有些人，包括本作者本人，实际上更喜欢它而不是`ANY`语法。如果你对`<>`感到疑惑，它的意思是“不等于”。


    `ALL`运算符的工作方式类似，但`WHERE`子句中的值必须对于子查询返回的所有值都成立（列表 12-9）。`ALL`的一个使用场景是查找与极值（如最小值和最大值）相关的数据。你当然也可以自由选择内置函数`MAX`和`MIN`来实现此目的。


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year <= ALL (SELECT year FROM newlang_tbl);

    列表 12-9

    使用 ALL 运算符

    ```


    ![A457348_1_En_12_Figb_HTML.gif](img/A457348_1_En_12_Figb_HTML.gif)


    只有`Lisp`作为我们表中最古老的语言，会满足`ALL`标准，即其年份值小于或等于子查询中的所有值。同样，我们可以使用`ALL`来查找最新的语言（列表 12-10）。


    ```

    SELECT language

    FROM newlang_tbl

    WHERE year >= ALL (SELECT year FROM newlang_tbl);

    列表 12-10

    与>=一起使用 ALL 运算符

    ```


    ![A457348_1_En_12_Figc_HTML.gif](img/A457348_1_En_12_Figc_HTML.gif)


    # 13. 集合操作


    集合论是离散数学的一个分支，处理对象的集合。集合论与关系数据库概念之间有大量的概念重叠。难怪查询的输出经常被称为结果集。


    原始的集合理论操作，如并集、交集和差集，在各种实现中得到了越来越多的支持。我们现在将探索这些操作背后的理论以及如何在 SQL 中使用它们。

