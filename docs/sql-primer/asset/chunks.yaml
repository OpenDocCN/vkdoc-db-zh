  trans: '

    ## 通过视图修改数据


    关于通过视图修改数据是否是个好主意，存在着广泛的不同意见。有些人倾向于将视图视为只读的内容列表，但大多数数据库管理系统（DBMS）都提供了一些通过视图修改数据的能力。


    让我们首先尝试通过我们的 `language_chronology` 表（清单 14-6）对 `year` 列进行一次简单的更新。请记住，我们将 `year`
    字段连同语言名称一起拉入了视图。


    ```sql

    UPDATE language_chronology

    SET year=1977

    WHERE language="Fortran";

    清单 14-6

    通过行更新值

    ```


    该语句在 PostgreSQL 中执行成功。现在，为了验证它是否真的产生了影响，让我们先验证视图的内容（清单 14-7）。


    | language | year |

    | --- | --- |

    | Fortran | 1977 |


    ```sql

    SELECT * FROM language_chronology

    WHERE language="Fortran";

    清单 14-7

    检查我们修改后的视图内容

    ```


    视图中一切似乎都符合预期。虽然我们隐约感觉到基表也应该被更新了，但让我们也验证一下这一点（清单 14-8）。


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 8 | Fortran | Backus | 1977 | ANSI |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language="Fortran";

    清单 14-8

    检查我们的基表内容

    ```


    这也意味着，另一个依赖于 `proglang_tbl` 的视图 `language_era` 将不再包含 Fortran 的行，因为它的创建使用了条件 `WHERE
    year < 1971`。随着底层基表内容随时间变化，记录会在视图中移入移出。


    ### SQLite 中的视图修改


    如果你尝试在 SQLite 中执行此 `UPDATE` 命令，它会抛出一个类似这样的错误：


    ```sql

    Error: cannot modify language_chronology because it is a view

    ```


    SQLite 明确表示它不允许通过视图修改数据。我碰巧同意这个设计选择。


    让我们尝试另一次数据修改，但这次我们将尝试更新视图 `language_era` 内部的计算字段（清单 14-9）。我们知道 `JOVIAL` 是在 `1959`
    年创造的，因此我们希望四舍五入这个值，使其 `era` 变为 `The 1960s`。


    ```sql

    UPDATE language_era SET era=''The 1960s''

    WHERE lang="JOVIAL";

    > ERROR:  cannot update column "era" of view "language_era"

    > DETAIL:  View columns that are not columns of their base relation are not updatable.

    清单 14-9

    尝试修改视图的计算字段

    ```


    DBMS 拒绝了我们更新计算字段的请求，因为 `era` 在基表 `proglang_tbl` 中并不存在。如果我们想一想，这很合理，因为 SQL 解释器不知道要在基表中放入哪个
    `year` 值。从 `1960` 到 `1969` 之间的任何值都会使 `era` 值变为 `The 1960s`。DBMS 不会尝试选择任何随机值，因为它的推理将是模糊不清的。


    更改同一视图的 `lang` 字段则是完全明确的，因此是被允许的（清单 14-10）。


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 4 | Jovial | Schwartz | 1959 | US-DOD |


    ```sql

    UPDATE language_era SET lang="Jovial"

    WHERE lang="JOVIAL";

    > UPDATE 1

    SELECT * FROM proglang_tbl

    WHERE id=4;

    清单 14-10

    修改视图非计算字段的查询

    ```


    类似地，我们可以使用 `GROUP BY` 子句创建包含聚合列的视图，但不允许修改此类视图的内容（清单 14-11）。


    | standard | count |

    | --- | --- |

    |   | 2 |

    | ECMA | 1 |

    | ANSI | 2 |

    | ISO | 3 |

    | US-DOD | 1 |


    ```sql

    CREATE VIEW standards AS

    SELECT standard, count(*)

    FROM proglang_tbl

    GROUP BY standard;

    清单 14-11

    创建包含聚合列的视图

    ```


    我们从之前的经验中知道，添加新行或修改聚合列将是模糊的，因此不被允许。但是，如果我们尝试像处理 `JOVIAL` 那样仅更新 `standard` 字段值会怎样（清单
    14-12）？更新会反映到包含该字段值的所有行吗？


    ```sql

    UPDATE standards SET standard="IS"

    WHERE standard="ISO";

    > ERROR:  cannot update view "standards"

    > DETAIL:  Views containing GROUP BY are not automatically updatable.

    > HINT:  To enable updating the view, provide an INSTEAD OF UPDATE trigger or
    an unconditional ON UPDATE DO INSTEAD rule.

    清单 14-12

    尝试修改聚合视图中的字段值

    ```


    该操作被禁止，但 PostgreSQL 给了我们一个提示，告诉我们如何实现这一目标。虽然我们不会介绍该技术，但知道在极少数需要它的情况下，它在某些数据库系统中是可用的，这很好。


    ### 删除视图


    要完全删除或移除一个视图，我们使用 `DROP VIEW` 命令。它与我们在第 4 章看到的 `DROP TABLE` 命令非常相似（清单 14-13）。


    ```sql

    DROP VIEW standards;

    清单 14-13

    删除一个视图

    ```


    请注意，你不能意外地使用 `DROP VIEW` 删除表，这让人松了一口气（清单 14-14）。


    ```sql

    DROP VIEW proglang_tbl;

    > ERROR:  "proglang_tbl" is not a view

    > HINT:  Use DROP TABLE to remove a table.

    清单 14-14

    尝试删除视图（实为表）

    ```


    # 15. 索引


    长期以来，数据库一直是获取洞察的主要数据存储组件。随着企业越来越多地采用技术支持的工作流程，数据生成率已大幅增长。随着互联网和移动计算的采用，这一趋势加速发展。


    在 20 世纪 90 年代，一个规模合适的关联数据库通常只有几百兆字节。如今，听到数据库系统达到几百千兆字节甚至几太字节的情况并不少见。作为一名专业人士，你经常会遇到包含数百万行的表。


    到目前为止，我们已经学习了 SQL 中允许你执行操作和运行查询的部分，但我们还没有触及任何接近性能调优的内容。当你想在包含数百万条记录的表上运行查询时，认真考虑性能优化不是可选项。


    最常见的性能优化技术之一是索引。索引允许 SQL 引擎在表中快速查找特定记录。这就像当你想知道单词 "wistful" 的含义时，直接跳到字典中的字母 W
    一样。从 A 开始按顺序翻阅所有页面直到找到目标单词会相当繁琐。


    本章中的许多命令都是特定于所使用的 DBMS 的。虽然索引的基本概念以及创建和删除索引的基本命令在不同产品之间保持相似，但无法回避的事实是，随着我们深入 SQL
    之旅，基于供应商的差异会变得更加明显。

    '
- fmt: '## Creating an Index


    与SQL中的大多数语句一样，创建索引非常简单。你可以使用 `CREATE INDEX` 命令来完成这个操作（参见代码清单 [15-1](#A457348_1_En_15_Chapter.html#Par7)）。


    ```

    CREATE INDEX  ON  ();

    Listing 15-1

    CREATE INDEX 的通用语法

    ```


    让我们在 `proglang_tbl` 表的 `language` 列上创建一个简单的索引（代码清单 [15-2](#A457348_1_En_15_Chapter.html#Par9)）。我们做一个合理的假设：将会有大量查询在
    `WHERE` 子句中使用 `language` 字段，在其上创建索引将会提升性能。


    ```

    CREATE INDEX language_idx ON proglang_tbl(language);

    Listing 15-2

    在 proglang_tbl 上创建索引

    ```


    如果此命令在 `psql` 中成功执行，你将不会收到错误，但也没有其他可视化的提示。我们可以通过列出表描述来验证索引创建尝试，就像在第 [4](#A457348_1_En_4_Chapter.html)
    章中所做的那样。我们将使用稍紧凑的 `\d <表名>` 命令（代码清单 [15-3](#A457348_1_En_15_Chapter.html#Par11)）来替代详细的
    `\d+ <表名>` 选项。


    ```

    \d proglang_tbl;

    Table "public.proglang_tbl"

    Column  |         Type          | Modifiers

    ----------+-----------------------+-----------

    id       | integer               |

    language | character varying(20) |

    author   | character varying(25) |

    year     | integer               |

    standard | character varying(10) |

    Indexes:

    "language_idx" btree (language)

    Listing 15-3

    在 PostgreSQL 中验证索引创建

    ```


    我们可以在输出的最末尾看到，有一个关于我们的索引 `language_idx` 的条目。在 SQLite 中运行相同的 `CREATE INDEX` 命令也会成功，并且有两种主要方法来验证创建。第一种是我们在第
    [4](#A457348_1_En_4_Chapter.html) 章中见过的 `.schema` 命令（代码清单 [15-4](#A457348_1_En_15_Chapter.html#Par13)）。


    ```

    sqlite> .schema proglang_tbl

    CREATE TABLE proglang_tbl (

    id        INTEGER     NOT NULL,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    CREATE INDEX language_idx ON proglang_tbl (language);

    Listing 15-4

    使用 .schema 在 SQLite 中验证索引创建

    ```


    这向我们展示了用于创建表及其相关实体（如索引）的 DDL 命令。另一种方法是使用 SQLite 的 `pragma` 来列出表上的所有索引（代码清单 [15-5](#A457348_1_En_15_Chapter.html#Par15)）。`pragma`
    是 SQLite 提供的语句，用于查询其自身的元数据，例如索引信息。


    ```

    sqlite> PRAGMA index_list(proglang_tbl);

    seq         name          unique      origin      partial

    ----------  ------------  ----------  ----------  ----------

    0           language_idx  0           c           0

    Listing 15-5

    使用 pragma 在 SQLite 中验证索引创建

    ```


    ## Using EXPLAIN to See Indexes at Work


    我们现在已经看到我们创建的索引确实存在，但我们如何看到它在实际中发挥作用呢？在一个大表上，我们应该能够获得可测量的速度提升。`EXPLAIN` 命令将在这里帮助我们。但首先，让我们创建一个大表来运行启用索引的查询。


    获得一个大表的快速而简单的方法是使用笛卡尔积或交叉连接。我们已经有包含 5 列 9 行的 `proglang_tbl`。对每个字段进行相互的笛卡尔积运算应该会产生
    9 的 5 次方 = 59049 行（代码清单 [15-6](#A457348_1_En_15_Chapter.html#Par18)）。这无论如何都不算是一个巨大的表，但它将允许我们看到索引对查询执行的影响。


    ```

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    INTO biglang_tbl

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c, proglang_tbl d, proglang_tbl
    e;

    SELECT count(*) FROM biglang_tbl;

    count


    Listing 15-6

    在 PostgreSQL 中使用交叉连接创建大表

    ```


    现在我们有了一个填充好的表，让我们尝试使用 `EXPLAIN` 来分析查找所有 Fortran 行的查询时间（代码清单 [15-7](#A457348_1_En_15_Chapter.html#Par20)）。虽然这个命令不在
    SQL 标准中，但大多数关系型数据库系统都实现了它。


    ```

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Seq Scan on biglang_tbl  (cost=0.00..1150.11 rows=6486 width=24)

    Filter: ((language)::text = ''Fortran''::text)

    (2 rows)

    Listing 15-7

    在 PostgreSQL 中对查询使用 EXPLAIN

    ```


    嗯，这里有一些输出，尽管还不完全清楚我们看到的是什么。`查询计划` 是 SQL 引擎将如何执行你的查询的术语。现在让我们将这个输出与在 `language`
    字段上创建索引后的输出进行对比（代码清单 [15-8](#A457348_1_En_15_Chapter.html#Par22)）。


    ```

    CREATE INDEX biglang_idx ON biglang_tbl (language);

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Bitmap Heap Scan on biglang_tbl  (cost=126.56..619.63 rows=6486 width=24)

    Recheck Cond: ((language)::text = ''Fortran''::text)

    ->  Bitmap Index Scan on biglang_idx  (cost=0.00..124.94 rows=6486 width=0)

    Index Cond: ((language)::text = ''Fortran''::text)

    (4 rows)

    Listing 15-8

    在 PostgreSQL 中创建索引后对查询使用 EXPLAIN

    ```


    我们立即看到这个输出与前一个不同，它涉及到使用我们最近创建的索引。之前的输出提到了 `Seq Scan` 或顺序扫描，顾名思义，这涉及到按顺序遍历我们的记录。而当前的输出提到了
    `Bitmap Heap Scan` 和 `Bitmap Index Scan`，听起来比完全的简单扫描快得多。这些特定扫描如何工作的细节超出了本文的范围，但我们可以查看输出中的另一个参数来大致了解我们索引在此情况下的效率。


    两个计划都提到了一个类似 `cost=<第一个值>..<第二个值>` 的参数。第二个值是查询执行的估计总成本。这个值越小，查询执行的效率就越高。在没有索引的第一个输出中，这个值估计为
    1150.11，而在创建索引后，我们将其降低到 619.63，这是我们的一大胜利。


    虽然在 SQLite 中创建索引与其他数据库类似，但如果你尝试在其中执行代码清单 [15-6](#A457348_1_En_15_Chapter.html#Par18)，你会得到一个错误，内容类似于
    `Error: near "INTO": syntax error`。在 SQLite 中创建 `biglang_tbl` 的支持方式是使用 `CREATE
    TABLE .. AS .. <查询>`（代码清单 [15-9](#A457348_1_En_15_Chapter.html#Par26)）。


    ```

    CREATE TABLE biglang_tbl AS

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c,

    proglang_tbl d, proglang_tbl e;

    Listing 15-9

    在 SQLite 中创建 biglang_tbl

    ```


    另外，我们不使用简单的 `EXPLAIN`（它初次使用时会给出庞大且相当难以理解的输出），而是使用更简洁的 `EXPLAIN QUERY PLAN` 语句，如下所示（代码清单
    [15-10](#A457348_1_En_15_Chapter.html#Par28)）。


    ```

    EXPLAIN QUERY PLAN SELECT * FROM biglang_tbl WHERE language="Fortran";

    selectid    order       from        detail

    ----------  ----------  ----------  ---------------------------

    0           0           0           SEARCH TABLE biglang_tbl USING INDEX biglang_idx
    (language=?)

    Listing 15-10

    在 SQLite 中使用 EXPLAIN QUERY PLAN

    ```


    虽然输出比 PostgreSQL 的小很多，但我们可以清楚地看到它将使用我们的索引来搜索表中 `language` 为 Fortran 的行。'
  raw: '## Creating an Index


    As with most statements in SQL, index creation is pretty straightforward. You
    use the `CREATE INDEX` command to achieve this (Listing [15-1](#A457348_1_En_15_Chapter.html#Par7)).


    ```

    CREATE INDEX  ON  ();

    Listing 15-1

    General syntax of CREATE INDEX

    ```


    Let’s create a simple index on the language column of proglang_tbl (Listing [15-2](#A457348_1_En_15_Chapter.html#Par9)).
    We make a reasonable assumption that there are going to be a lot of queries using
    the language field in the `WHERE` clause, and creating an index on it would increase
    performance.


    ```

    CREATE INDEX language_idx ON proglang_tbl(language);

    Listing 15-2

    Creating an index on proglang_tbl

    ```


    If this command succeeds in psql, you would not get an error back but no other
    visual indication. Let’s verify our index creation attempt by listing the table
    description like we did in Chapter [4](#A457348_1_En_4_Chapter.html). Instead
    of the detailed `\d+ <table name>` option, we will use the slightly compact `\d
    <table name>` command (Listing [15-3](#A457348_1_En_15_Chapter.html#Par11)).


    ```

    \d proglang_tbl;

    Table "public.proglang_tbl"

    Column  |         Type          | Modifiers

    ----------+-----------------------+-----------

    id       | integer               |

    language | character varying(20) |

    author   | character varying(25) |

    year     | integer               |

    standard | character varying(10) |

    Indexes:

    "language_idx" btree (language)

    Listing 15-3

    Verifying index creation in PostgreSQL

    ```


    We can see at the very end of the output, there is an entry for our index language_idx.
    Running the same `CREATE INDEX` on SQLite also succeeds, and there are two primary
    ways to verify the creation. The first is the `.schema` command we had seen in
    Chapter [4](#A457348_1_En_4_Chapter.html) (Listing [15-4](#A457348_1_En_15_Chapter.html#Par13)).


    ```

    sqlite> .schema proglang_tbl

    CREATE TABLE proglang_tbl (

    id        INTEGER     NOT NULL,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    CREATE INDEX language_idx ON proglang_tbl (language);

    Listing 15-4

    Verifying index creation in SQLite using .schema

    ```


    This showed us the DDL commands that were used to create the table and its related
    entities like indexes. Another approach is to use an SQLite pragma to list all
    indexes on a table (Listing [15-5](#A457348_1_En_15_Chapter.html#Par15)). Pragmas
    are statements provided by SQLite to query its own metadata such as index information.


    ```

    sqlite> PRAGMA index_list(proglang_tbl);

    seq         name          unique      origin      partial

    ----------  ------------  ----------  ----------  ----------

    0           language_idx  0           c           0

    Listing 15-5

    Verifying index creation in SQLite using a pragma

    ```


    ## Using EXPLAIN to See Indexes at Work


    We have now seen that the index we created actually exists, but how do we see
    it in action? We should be able to get a measurable speed up on a large table.
    The `EXPLAIN` command would come to our rescue here. But first let’s go about
    creating a large table to run our index-enabled queries on.


    A quick and dirty way to get a large table would be to use a cartesian product
    or cross joins. We already have our proglang_tbl with 5 columns and 9 rows in
    it. Doing a cartesian product on each of the fields with each other should yield
    us 9 to the power 5 = 59049 rows (Listing [15-6](#A457348_1_En_15_Chapter.html#Par18)).
    This is not a huge table by any means but it would allow us to see the effect
    an index has on query execution.


    ```

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    INTO biglang_tbl

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c, proglang_tbl d, proglang_tbl
    e;

    SELECT count(*) FROM biglang_tbl;

    count


    Listing 15-6

    Creating a big table using cross joins in PostgreSQL

    ```


    Now that we have a populated table, let us try to analyze the query time for finding
    all Fortran rows using `EXPLAIN` (Listing [15-7](#A457348_1_En_15_Chapter.html#Par20)).
    While this command is not in the SQL standard, most relational database systems
    implement it.


    ```

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Seq Scan on biglang_tbl  (cost=0.00..1150.11 rows=6486 width=24)

    Filter: ((language)::text = ''Fortran''::text)

    (2 rows)

    Listing 15-7

    Using EXPLAIN on a query in PostgreSQL

    ```


    Well there is some output even though it is not entirely evident yet what we are
    seeing, A query plan , is a term for how the SQL engine is going to execute your
    query. Let us now contrast this output with the one after creating an index on
    the language field (Listing [15-8](#A457348_1_En_15_Chapter.html#Par22)).


    ```

    CREATE INDEX biglang_idx ON biglang_tbl (language);

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Bitmap Heap Scan on biglang_tbl  (cost=126.56..619.63 rows=6486 width=24)

    Recheck Cond: ((language)::text = ''Fortran''::text)

    ->  Bitmap Index Scan on biglang_idx  (cost=0.00..124.94 rows=6486 width=0)

    Index Cond: ((language)::text = ''Fortran''::text)

    (4 rows)

    Listing 15-8

    Using EXPLAIN on a query in PostgreSQL after creating an index

    ```


    We immediately see that this output is different from the previous one, and it
    involves the use of our recently created index. The previous output mentioned
    a `Seq Scan` or a sequential scan, which as the name suggests, involves going
    through our records sequentially. The current output, however, mentions `Bitmap
    Heap Scan` and `Bitmap Index Scan` `,` which sound way faster than a full simple
    scan. The details of how these particular scans work is out of the scope of this
    text, but we can look at another parameter in the output to get a relative sense
    of the efficiency of our index in this case.


    Both plans mention a parameter-like `cost=<1st value>..<2nd value>`. The second
    value is the estimated total cost of query execution. The smaller this value is,
    the greater is the efficiency of query execution. In the first output without
    the index, this value is estimated as 1150.11 while after index creation, we reduce
    it down to 619.63, a big win for us.


    While index creation on SQLite is similar to other databases, if you had tried
    to execute Listing [15-6](#A457348_1_En_15_Chapter.html#Par18) in it, you would
    have gotten an error saying something along the lines of `Error: near "INTO":
    syntax error`. The supported way to create the biglang_tbl in SQLite would be
    to use the `CREATE TABLE .. AS .. <query>` (Listing [15-9](#A457348_1_En_15_Chapter.html#Par26)).


    ```

    CREATE TABLE biglang_tbl AS

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c,

    proglang_tbl d, proglang_tbl e;

    Listing 15-9

    Creating the biglang_tbl in SQLite

    ```


    Also instead of using the simple `EXPLAIN,` which gives a huge and pretty incomprehensible
    output at first glance, we use the more succinct `EXPLAIN QUERY PLAN` statement
    like below (Listing [15-10](#A457348_1_En_15_Chapter.html#Par28)).


    ```

    EXPLAIN QUERY PLAN SELECT * FROM biglang_tbl WHERE language="Fortran";

    selectid    order       from        detail

    ----------  ----------  ----------  ---------------------------

    0           0           0           SEARCH TABLE biglang_tbl USING INDEX biglang_idx
    (language=?)

    Listing 15-10

    Using EXPLAIN QUERY PLAN in SQLite

    ```


    While the output is pretty small as compared to the one from PostgreSQL, we can
    clearly see that it is going to use our index to search our table for Fortran
    rows.'
  trans: '

    ## 创建索引


    与 SQL 中的大多数语句一样，创建索引非常简单。你可以使用 `CREATE INDEX` 命令来完成这个操作（参见代码清单 15-1）。


    ```

    CREATE INDEX  ON  ();

    代码清单 15-1

    CREATE INDEX 的通用语法

    ```


    让我们在 `proglang_tbl` 表的 `language` 列上创建一个简单的索引（代码清单 15-2）。我们做一个合理的假设：将会有大量查询在 `WHERE`
    子句中使用 `language` 字段，在其上创建索引将会提升性能。


    ```

    CREATE INDEX language_idx ON proglang_tbl(language);

    代码清单 15-2

    在 proglang_tbl 上创建索引

    ```


    如果此命令在 `psql` 中成功执行，你将不会收到错误，但也没有其他可视化的提示。我们可以通过列出表描述来验证索引创建尝试，就像在第 4 章中所做的那样。我们将使用稍紧凑的
    `\d <表名>` 命令（代码清单 15-3）来替代详细的 `\d+ <表名>` 选项。


    ```

    \d proglang_tbl;

    Table "public.proglang_tbl"

    Column  |         Type          | Modifiers

    ----------+-----------------------+-----------

    id       | integer               |

    language | character varying(20) |

    author   | character varying(25) |

    year     | integer               |

    standard | character varying(10) |

    Indexes:

    "language_idx" btree (language)

    代码清单 15-3

    在 PostgreSQL 中验证索引创建

    ```


    我们可以在输出的最末尾看到，有一个关于我们的索引 `language_idx` 的条目。在 SQLite 中运行相同的 `CREATE INDEX` 命令也会成功，并且有两种主要方法来验证创建。第一种是我们在第
    4 章中见过的 `.schema` 命令（代码清单 15-4）。


    ```

    sqlite> .schema proglang_tbl

    CREATE TABLE proglang_tbl (

    id        INTEGER     NOT NULL,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    CREATE INDEX language_idx ON proglang_tbl (language);

    代码清单 15-4

    使用 .schema 在 SQLite 中验证索引创建

    ```


    这向我们展示了用于创建表及其相关实体（如索引）的 DDL 命令。另一种方法是使用 SQLite 的 `pragma` 来列出表上的所有索引（代码清单 15-5）。`pragma`
    是 SQLite 提供的语句，用于查询其自身的元数据，例如索引信息。


    ```

    sqlite> PRAGMA index_list(proglang_tbl);

    seq         name          unique      origin      partial

    ----------  ------------  ----------  ----------  ----------

    0           language_idx  0           c           0

    代码清单 15-5

    使用 pragma 在 SQLite 中验证索引创建

    ```


    ## 使用 EXPLAIN 查看索引如何工作


    我们现在已经看到我们创建的索引确实存在，但我们如何看到它在实际中发挥作用呢？在一个大表上，我们应该能够获得可测量的速度提升。`EXPLAIN` 命令将在这里帮助我们。但首先，让我们创建一个大表来运行启用索引的查询。


    获得一个大表的快速而简单的方法是使用笛卡尔积或交叉连接。我们已经有包含 5 列 9 行的 `proglang_tbl`。对每个字段进行相互的笛卡尔积运算应该会产生
    9 的 5 次方 = 59049 行（代码清单 15-6）。这无论如何都不算是一个巨大的表，但它将允许我们看到索引对查询执行的影响。


    ```

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    INTO biglang_tbl

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c, proglang_tbl d, proglang_tbl
    e;

    SELECT count(*) FROM biglang_tbl;

    count


    代码清单 15-6

    在 PostgreSQL 中使用交叉连接创建大表

    ```


    现在我们有了一个填充好的表，让我们尝试使用 `EXPLAIN` 来分析查找所有 Fortran 行的查询时间（代码清单 15-7）。虽然这个命令不在 SQL
    标准中，但大多数关系型数据库系统都实现了它。


    ```

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Seq Scan on biglang_tbl  (cost=0.00..1150.11 rows=6486 width=24)

    Filter: ((language)::text = ''Fortran''::text)

    (2 rows)

    代码清单 15-7

    在 PostgreSQL 中对查询使用 EXPLAIN

    ```


    嗯，这里有一些输出，尽管还不完全清楚我们看到的是什么。`查询计划` 是 SQL 引擎将如何执行你的查询的术语。现在让我们将这个输出与在 `language`
    字段上创建索引后的输出进行对比（代码清单 15-8）。


    ```

    CREATE INDEX biglang_idx ON biglang_tbl (language);

    EXPLAIN SELECT * FROM biglang_tbl WHERE language="Fortran";

    QUERY PLAN


    Bitmap Heap Scan on biglang_tbl  (cost=126.56..619.63 rows=6486 width=24)

    Recheck Cond: ((language)::text = ''Fortran''::text)

    ->  Bitmap Index Scan on biglang_idx  (cost=0.00..124.94 rows=6486 width=0)

    Index Cond: ((language)::text = ''Fortran''::text)

    (4 rows)

    代码清单 15-8

    在 PostgreSQL 中创建索引后对查询使用 EXPLAIN

    ```


    我们立即看到这个输出与前一个不同，它涉及到使用我们最近创建的索引。之前的输出提到了 `Seq Scan` 或顺序扫描，顾名思义，这涉及到按顺序遍历我们的记录。而当前的输出提到了
    `Bitmap Heap Scan` 和 `Bitmap Index Scan`，听起来比完全的简单扫描快得多。这些特定扫描如何工作的细节超出了本文的范围，但我们可以查看输出中的另一个参数来大致了解我们索引在此情况下的效率。


    两个计划都提到了一个类似 `cost=<第一个值>..<第二个值>` 的参数。第二个值是查询执行的估计总成本。这个值越小，查询执行的效率就越高。在没有索引的第一个输出中，这个值估计为
    1150.11，而在创建索引后，我们将其降低到 619.63，这是我们的一大胜利。


    虽然在 SQLite 中创建索引与其他数据库类似，但如果你尝试在其中执行代码清单 15-6，你会得到一个错误，内容类似于 `Error: near "INTO":
    syntax error`。在 SQLite 中创建 `biglang_tbl` 的支持方式是使用 `CREATE TABLE .. AS .. <查询>`（代码清单
    15-9）。


    ```

    CREATE TABLE biglang_tbl AS

    SELECT a.language,

    b.author,

    c.year,

    d.standard,

    e.id

    FROM proglang_tbl a, proglang_tbl b, proglang_tbl c,

    proglang_tbl d, proglang_tbl e;

    代码清单 15-9

    在 SQLite 中创建 biglang_tbl

    ```


    另外，我们不使用简单的 `EXPLAIN`（它初次使用时会给出庞大且相当难以理解的输出），而是使用更简洁的 `EXPLAIN QUERY PLAN` 语句，如下所示（代码清单
    15-10）。


    ```

    EXPLAIN QUERY PLAN SELECT * FROM biglang_tbl WHERE language="Fortran";

    selectid    order       from        detail

    ----------  ----------  ----------  ---------------------------

    0           0           0           SEARCH TABLE biglang_tbl USING INDEX biglang_idx
    (language=?)

    代码清单 15-10

    在 SQLite 中使用 EXPLAIN QUERY PLAN

    ```


    虽然输出比 PostgreSQL 的小很多，但我们可以清楚地看到它将使用我们的索引来搜索表中 `language` 为 Fortran 的行。

    '
- fmt: '## 唯一索引


    在创建索引时，我们可以选择指定关键字 `UNIQUE`，以创建一个只允许非重复值的索引（参见代码清单 [15-11](#A457348_1_En_15_Chapter.html#Par31)）。这使得索引在提升性能的同时，也承担了数据完整性的双重责任。


    ```

    CREATE UNIQUE INDEX  ON  ()

    代码清单 15-11

    UNIQUE 索引创建的通用语法

    ```


    然而，由于其隐含的数据完整性含义，我们不能在已知包含重复值的字段上使用这种索引。在我们新创建的 `biglang_tbl` 表中，由于我们的交叉连接条件，`ID`
    字段实际上重复了很多次。在此字段上创建唯一索引将导致错误（参见代码清单 [15-12](#A457348_1_En_15_Chapter.html#Par33)）。


    ```

    CREATE UNIQUE INDEX id_idx ON biglang_tbl (id);

    ERROR:  could not create unique index "id_idx"

    DETAIL:  Key (id)=(4) is duplicated.

    代码清单 15-12

    无法在包含重复值的字段上创建唯一索引

    ```


    类似地，向一个具有唯一索引的字段中添加重复值也会导致错误，类似于 `ERROR: duplicate key value violates unique constraint
    "<index name>"`。


    如果你记忆力超群，你会记得这与我们在第 [3](#A457348_1_En_3_Chapter.html) 章讨论唯一约束时在代码清单 [3-12](#A457348_1_En_3_Chapter.html#Par45)
    中看到的错误相同。如果我们现在尝试描述涉及的表 `proglang_tbluk` 的结构，我们将看到 PostgreSQL 是如何以索引来定义这些约束的（参见代码清单
    [15-13](#A457348_1_En_15_Chapter.html#Par36)）。


    ```

    \d proglang_tbluk;

    Table "public.proglang_tbluk"

    Column     |          Type          | Modifiers

    ----------------+------------------------+-----------

    id             | integer                | not null

    language       | character varying(20)  | not null

    author         | character varying(30)  | not null

    year           | integer                | not null

    standard       | character varying(10)  |

    current_status | character varying(32)  |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    代码清单 15-13

    描述一个同时包含主键和唯一索引的表

    ```


    实际上，这也是我们在第 [4](#A457348_1_En_4_Chapter.html) 章的代码清单 [4-11](#A457348_1_En_4_Chapter.html#Par39)
    中尝试过的，但当时我们并没有非常仔细地关注输出的 `INDEXES` 部分。


    ## 索引如何工作？


    对索引工作原理有一个高层概览，可以帮助用户编写有效、执行快速的查询。大多数 SQL 用户忽略了索引的概念性理解，但实际上它们并不难掌握。


    在本章开头，我们将数据库索引比作在字典中查找单词。字典的字母排序特性使查找过程更加容易。同样地，书籍索引通过按字母顺序列出概念及其讨论的页码，使你能够查找书中讨论的概念。


    这与实际的数据库索引非常相似。虽然底层细节因实现而异，但将其视为一个有序的查找表是很有帮助的。被索引字段的值经过排序存储，并带有指向基础表中实际记录位置的指针。


    如果我们在 `proglang_tbl` 的 `standard` 字段上创建一个索引，该索引的简化表示如图 [15-1](#A457348_1_En_15_Chapter.html#Fig1)
    所示。SQL 解释器无需遍历整个表来查找 `standard` 字段为 `ANSI` 的两行。这种低效的全表遍历有时被称为全表扫描或顺序扫描。索引的目的就是为了避免这种扫描。


    ![A457348_1_En_15_Fig1_HTML.jpg](A457348_1_En_15_Fig1_HTML.jpg)


    图 15-1


    索引工作原理的可视化表示


    当有人编写一个带有 `WHERE` 子句的查询，以查找特定的 `standard` 值时，这个索引会自动生效，而无需用户指定使用它。添加或删除具有不同该字段值的行也会自动更新索引，因此索引始终引用表中的最新数据。


    ## 索引开销


    尽管索引无需太多复杂命令就能为用户带来诸多好处，但有时用户会想为每一个可能的列都创建索引。毕竟，目前看起来索引创建似乎没有缺点。


    然而，事实证明，就像世界上的其他事物一样，天下没有免费的午餐。如果一个有 N 个字段的表在每一列上都有索引，那么对于每一个 `INSERT`、`UPDATE`
    或 `DELETE` 这样的 DML 语句，都必须保持这 N 个索引同步。这会使大型表的数据更改变得缓慢，有时令人烦恼，有时令人担忧。


    过多索引带来的另一个严重开销是它们的存储需求。索引和表一样，会在磁盘上占用物理空间。尽管近年来存储变得便宜，但数据库管理员对服务器空闲空间的态度并不随意。


    让我们检查一下磁盘如何受索引创建的影响。我们将重点关注 `biglang_tbl` 及其索引 `biglang_idx`。首先，让我们找出表及其相关对象占用的总空间（参见代码清单
    [15-14](#A457348_1_En_15_Chapter.html#Par47)）。


    ```

    SELECT pg_size_pretty(pg_total_relation_size(''biglang_tbl''));

    pg_size_pretty

    ----------------

    4608 kB

    (1 row)

    代码清单 15-14

    在 PostgreSQL 中显示表及其相关对象的总大小

    ```


    函数 `pg_total_relation_size` 会返回表、其索引以及其他一些东西占用的磁盘空间。`pg_size_pretty` 用于将输出美化为更易读的单位（如
    kB）而不是字节数。从这些函数名可以明显看出，它们是 PostgreSQL 特有的。如果你使用的是不同的产品，请查阅你的 DBMS 手册以获取查询数据库目录的命令。


    现在，让我们找出表和索引各自占用了多少空间（参见代码清单 [15-15](#A457348_1_En_15_Chapter.html#Par50)）。这应该能让我们对索引的大小有一个相对的概念。


    ```

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_tbl''));

    pg_size_pretty

    ----------------

    3296 kB

    (1 row)

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_idx''));

    pg_size_pretty

    ----------------

    1312 kB

    (1 row)

    代码清单 15-15

    在 PostgreSQL 中显示表及其索引的大小

    ```


    我们的索引大小大约是表大小的 39%！更不用说它占用了 `biglang_tbl` 总关联大小的 28%。请记住，我们这里讨论的只是一个字段上的单个索引。显然，我们需要在索引创建上有所节制。


    一个好的经验法则是在查询中大量依赖主键和唯一索引。随着时间的推移，你会开始看到运行缓慢的查询模式。如果这些查询不常运行，也许我们可以忍受额外花费的时间。但如果运行缓慢的查询是定期执行的，并且
    `WHERE` 子句中经常包含相同的未索引字段，那么它就是创建索引的完美候选。


    ### SQLite 中的索引大小


    你可能注意到我们只讨论了 PostgreSQL 中的索引大小。像 `pg_size_pretty`、`pg_total_relation_size` 和 `pg_relation_size`
    这样的辅助函数是 PostgreSQL 特有的，不是 SQL 标准的一部分。


    我还没找到一种在 SQLite 中计算索引大小的好方法。由于它是一个自包含的单文件数据库，你可以在创建索引前后验证文件大小，以获得一个粗略的估计。'
  raw: '## Unique Indexes


    We can optionally specify the keyword `UNIQUE` during index creation to make an
    index that only allows non-duplicate values (Listing [15-11](#A457348_1_En_15_Chapter.html#Par31)).
    This makes the index have a dual responsibility of data integrity along with performance
    enhancement.


    ```

    CREATE UNIQUE INDEX  ON  ()

    Listing 15-11

    General syntax of UNIQUE index creation

    ```


    However, since it has an implied data integrity meaning, we cannot use this kind
    of index on a field that is already known to have duplicate values. In our newly
    created biglang_tbl, the ID field is actually duplicated many times due to our
    cross join conditions. Creating a unique index on this field would result in an
    error (Listing [15-12](#A457348_1_En_15_Chapter.html#Par33)).


    ```

    CREATE UNIQUE INDEX id_idx ON biglang_tbl (id);

    ERROR:  could not create unique index "id_idx"

    DETAIL:  Key (id)=(4) is duplicated.

    Listing 15-12

    Cannot create a unique index on a field containing duplicate values

    ```


    Similarly adding a duplicate value into a field that has a unique index would
    result in an error along the lines of `ERROR: duplicate key value violates unique
    constraint "<index name>"`.


    If you have an extremely sharp memory, you’d recall that this is the same error
    we saw in Listing [3-12](#A457348_1_En_3_Chapter.html#Par45) back in Chapter [3](#A457348_1_En_3_Chapter.html)
    when we were discussing unique constraints. If we now try to describe the schema
    of the involved table proglang_tbluk, we would see how PostgreSQL defined the
    constraints in terms of indexes (Listing [15-13](#A457348_1_En_15_Chapter.html#Par36)).


    ```

    \d proglang_tbluk;

    Table "public.proglang_tbluk"

    Column     |          Type          | Modifiers

    ----------------+------------------------+-----------

    id             | integer                | not null

    language       | character varying(20)  | not null

    author         | character varying(30)  | not null

    year           | integer                | not null

    standard       | character varying(10)  |

    current_status | character varying(32)  |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    Listing 15-13

    Describing a table with both a Primary Key and a Unique index

    ```


    Actually, this is also something we had tried in Chapter [4](#A457348_1_En_4_Chapter.html)
    in Listing [4-11](#A457348_1_En_4_Chapter.html#Par39), but we were not paying
    very close attention to the `INDEXES` section of the output back then.


    ## How Do Indexes Work?


    Having a high-level overview of how indexes work can help the user write effective,
    fast-executing queries. Most SQL users ignore the conceptual understanding of
    indexes, but they are not really hard to grasp.


    At the beginning of the chapter, we compared the database index to looking up
    a word in a dictionary. That lookup process was made easier by the alphabetical
    ordering nature of a dictionary. Similarly a book index allows you to look up
    concepts discussed in the book by listing them alphabetically with a page number
    where the concept is discussed.


    This is very similar to an actual database index. While the underlying details
    vary from implementation to implementation, it is helpful to think of it as an
    ordered lookup table. The values of the field being indexed are sorted and stored
    along with the pointers to the locations of the actual record in the base table.


    If we created an index on the standard field of proglang_tbl, a simplified representation
    of the index would look like Figure [15-1](#A457348_1_En_15_Chapter.html#Fig1).
    The SQL interpreter would not have to traverse through the whole of the table
    to find the two rows with ANSI as the standard field. The inefficient whole table
    traversal is what is sometimes referred to as full table scan or sequential scan.
    The point of an index is to avoid this kind of scan.


    ![A457348_1_En_15_Fig1_HTML.jpg](A457348_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    A visual representation of the workings of an index


    When someone writes a query with a `WHERE` clause finding the specific value of
    a standard, this index would come into effect automatically without the user having
    to specify using it. Adding or deleting more rows with differing values of this
    field would automatically update the index too, so that the index always refers
    to the latest data in the table.


    ## Index Overheads


    With all the niceties that indexes bring to the user without much effort in terms
    of arcane commands, sometimes users want to create indexes for every column possible.
    After all, there doesn’t seem to be a downside to index creation yet.


    Well as it turns out, like with everything else in the world, there is no free
    lunch. If there is an index on every column for a table with N fields, then for
    every DML statement like `INSERT`, `UPDATE,` or `DELETE,` the N indexes have to
    be kept in sync. This makes changing data slow for large tables, sometimes annoyingly
    and sometimes worryingly.


    Another serious overhead that too many indexes bring is their storage requirements.
    Indexes occupy physical space on the disk just like a table. While storage has
    become cheap in recent times, database administrators are not known for their
    cavalier attitude toward server free space.


    Let’s check how the disk is impacted by index creation. We will keep our focus
    on the biglang_tbl and its index biglang_idx. First let’s find the total space
    occupied by the table and its related objects (Listing [15-14](#A457348_1_En_15_Chapter.html#Par47)).


    ```

    SELECT pg_size_pretty(pg_total_relation_size(''biglang_tbl''));

    pg_size_pretty


    4608 kB

    (1 row)

    Listing 15-14

    Displaying the total size of a table and its related objects in PostgreSQL

    ```


    The function `pg_total_relation_` `size` would return the disk space occupied
    by the table, its indexes, and a few other things. The `pg_size_` `pretty` is
    for prettifying the output to a more human-readable unit of kB rather than the
    number of bytes. As is evident from these function names, they are specific to
    PostgreSQL. Check your DBMS manual for commands to query the database catalog
    in case you are using a different product.


    Now let’s find how much space the table and index take out of this figure (Listing
    [15-15](#A457348_1_En_15_Chapter.html#Par50)). That should give us a relative
    idea about how big indexes get.


    ```

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_tbl''));

    pg_size_pretty


    3296 kB

    (1 row)

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_idx''));

    pg_size_pretty


    1312 kB

    (1 row)

    Listing 15-15

    Displaying the size of a table and its index in PostgreSQL

    ```


    Our index is roughly 39% of the size of our table! Not to mention it occupies
    28% of the total relation size of biglang_tbl. Keep in mind that we are talking
    about a single index on one column here. Clearly we need to be parsimonious with
    our index creation.


    A good rule of thumb is to rely on the primary key and unique indexes a lot during
    your queries. Over time you will start seeing patterns of slow-running queries.
    If these queries are not run often, perhaps we can live with the extra time taken.
    But if the slow-running queries are run regularly and often contain the same field
    in the `WHERE` clause that is not indexed, it is a perfect candidate for index
    creation.


    Index size in SQLite


    You might have noticed that we discussed index sizes in PostgreSQL only. The helper
    functions like `pg_size_pretty`, `pg_total_relation_size,` and `pg_relation_size`
    are specific to PostgreSQL and are not a part of the SQL standard.


    I haven’t found a good way to calculate index sizes in SQLite. Since it is a self-contained
    single file database, you could verify the file size before and after index creation
    to get a rough estimate.'
