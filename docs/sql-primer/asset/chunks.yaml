    | APT | 1959 | AD |

    | Tcl | 1988 | AD |

    | PL/I | 1964 | AD |


    ```

    SELECT language,

    year,

    ''AD''

    FROM proglang_tbl;

    Listing 9-8

    Using literal values

    ```


    We can even use numeric literal values the same way, omitting the quotation marks
    for such values. A common utility for literal values arises when the user has
    to copy-paste data from their database query output into another tool like a spreadsheet
    or word processor.


    # 10. Aggregation and Grouping


    SQL has maintained its prominent position in the technical world due to its ability
    to cater to a wide range of business intelligence and analytic requests. While
    databases are often used for finding a needle in a haystack, that is, narrowing
    down to a single row, a lot of interactive usage of SQL revolves around generating
    aggregated insights from a bunch of rows.


    Indeed, a major advantage that SQL-based systems have over NoSQL data storage
    solutions is how intuitive grouping and aggregation is in the former category.'
  trans: '# 10. 聚合与分组


    SQL 在技术领域一直保持着突出地位，这得益于它能满足广泛的商业智能和分析请求。虽然数据库常被用于“大海捞针”，即缩小范围直至找到单行数据，但 SQL 的大量交互式应用都围绕着从一堆数据行中生成聚合洞察。


    确实，基于 SQL 的系统相较于 NoSQL 数据存储解决方案的一个主要优势在于，前者中的分组与聚合操作非常直观。


    ## 字符串操作


    迄今为止，最常用的字符串操作是连接。它指的是拼接或组合字符串。然而，即使数值字段也可以被视为字符串，因此我们也可以对它们使用连接运算符 `||`。请参见下面的例子，我们修改了“年代”字段，为其添加一些字符（参见列表
    9-4）。


    | language | decade |

    | --- | --- |

    | Prolog | The 1970s |

    | Perl | The 1980s |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | Tcl | The 1980s |

    | PL/I | The 1960s |


    ```sql

    SELECT language,

    ''The ''||((year/10)*10)||''s'' decade

    FROM proglang_tbl;

    ```

    *列表 9-4*

    使用字符串连接运算符


    请注意，连接运算符在不同的实现中以不同的形式出现。PostgreSQL、SQLite 和 Oracle 使用所示的 `||` 符号，而 Ingres、MySQL
    和 Microsoft SQL Server 则使用 `+` 表示连接。不过，它们的效果是相同的。


    字符串连接运算符在各种编程语言中也有所不同。大多数 SQL 实现中使用的 `||` 字符，源自 IBM 的 PL/I——一种在 60 和 70 年代相当流行，但在现代已很少见的语言。


    最后一个字符 `I` 实际上是罗马数字 1，它被特意设计出来，以弥合专注于业务流程的语言和迎合科学计算的语言之间日益扩大的差距。


    另一个常见的字符串操作是子字符串，它只返回字符串字段值的一部分。例如，如果我们只需要获取每种编程语言的前两个字符，我们会使用 `SUBSTR` 函数。该函数的一般语法如下所示（参见列表
    9-5）。


    ```sql

    SELECT SUBSTR(, , ),

    ...

    FROM ;

    ```

    *列表 9-5*

    子字符串的一般语法


    起始位置是你希望开始提取的字符位置。与大多数编程语言不同，这里的字符串索引位置不是从 0 开始，而是从 1 开始。第三个参数“长度”指定结果中应包含多少个字符。对于编程语言的前两个字符，起始位置将是
    1，长度将是 2（参见列表 9-6）。


    | substr | year |

    | --- | --- |

    | Pr | 1972 |

    | Pe | 1987 |

    | AP | 1964 |

    | JO | 1959 |

    | AP | 1959 |

    | Tc | 1988 |

    | PL | 1964 |


    ```sql

    SELECT SUBSTR(language, 1, 2),

    year

    FROM proglang_tbl;

    ```

    *列表 9-6*

    提取编程语言的前两个字符


    有趣的是，一方面，PostgreSQL 在使用 `SUBSTRING` 代替 `SUBSTR` 时会给出相同的结果，因为它将它们视为别名。然而，SQLite
    只能与 `SUBSTR` 一起使用。另一方面，Microsoft SQL Server 只能与 `SUBSTRING` 一起使用。请查阅你的数据库手册以了解你的实现期望使用哪个版本。


    另一类经常派上用场的字符串操作是 `UPPER` 和 `LOWER`，它们分别将字符串值的大小写更改为大写和小写。这一点最好通过一个例子来说明（参见列表 9-7）。


    | upper | lower |

    | --- | --- |

    | PROLOG | iso |

    | PERL |   |

    | APL | ansi |

    | JOVIAL | us-dod |

    | APT | iso |

    | TCL |   |

    | PL/I | ecma |


    ```sql

    SELECT UPPER(language),

    LOWER(standard)

    FROM proglang_tbl;

    ```

    *列表 9-7*

    更改字段的大小写


    ## 字面值


    在某些情况下，需要将一个固定的字面值用作新列的值。就像列别名可以改变列标题以提高可读性一样，字面值改变记录的值。从某种意义上说，它们不是计算字段，而是插入到记录特定位置的固定字段。一个例子将有助于说明这一点——假设你希望明确语言的创建年份，不仅是作为一个数字，还要包含
    `AD` 字符（参见列表 9-8）。


    | language | year | AD |

    | --- | --- | --- |

    | Prolog | 1972 | AD |

    | Perl | 1987 | AD |

    | APL | 1964 | AD |

    | JOVIAL | 1959 | AD |

    | APT | 1959 | AD |

    | Tcl | 1988 | AD |

    | PL/I | 1964 | AD |


    ```sql

    SELECT language,

    year,

    ''AD''

    FROM proglang_tbl;

    ```

    *列表 9-8*

    使用字面值


    我们甚至可以以同样的方式使用数值字面值，省略此类值的引号。字面值的一个常见用途是当用户需要将数据库查询输出中的数据复制粘贴到另一个工具（如电子表格或文字处理器）中时。'
- fmt: '# Aggregate Functions


    An aggregate function is used to compute summarization information from a table
    or tables. We have already seen the `COUNT` aggregate function that counts the
    records matched. Similarly, there are other aggregation functions in SQL like
    `AVG` for calculating averages; `SUM` for computing totals; and the extreme functions
    `MAX`, `MIN` for finding out maxima and minima values respectively.


    The count and extreme functions work with all data types, but functions like `SUM`
    and `AVG` make sense only with numeric types and thus work only with them.


    Let’s now try to use `AVG` on the only sensible numeric choice we have in our
    table – `year` (Listing [10-1](#A457348_1_En_10_Chapter.html#Par6)). You can think
    of the below query as a way of finding out the mean `year` value of all the programming
    language records we have in our table.


    ```sql

    SELECT AVG(year) FROM proglang_tbl;

    ```

    **Listing 10-1**

    Finding the Average year of creation in our programming languages table


    ![A457348_1_En_10_Figa_HTML.gif](A457348_1_En_10_Figa_HTML.gif)


    We can see the result as a decimal number with a default of 16 digits after the
    decimal point in PostgreSQL. This is slightly lowered to 10 digits after the decimal
    point in SQLite but more than enough still to cover all but the rare scenarios.


    While the average value was calculated accurately, one can argue that a value
    like this to specify `year` is not useful. What we really want is a readable `year`
    value that looks like an actual year, an integer value specifically. Thus we go
    about casting this average value to an integer (Listing [10-2](#A457348_1_En_10_Chapter.html#Par9)).


    ```sql

    SELECT CAST(AVG(year) AS INTEGER)

    FROM proglang_tbl;

    ```

    **Listing 10-2**

    Casting values to integers


    ![A457348_1_En_10_Figb_HTML.gif](A457348_1_En_10_Figb_HTML.gif)


    Conversion of data types using `CAST` only works with compatible data types like
    numerics and integers. If you try to convert a `varchar` into an integer, the
    DBMS will spit out an error message as is proper (Listing [10-3](#A457348_1_En_10_Chapter.html#Par11)).


    ```sql

    testdb=# SELECT CAST(language AS INTEGER)

    FROM proglang_tbl;

    ERROR:  invalid input syntax for integer: "Prolog"

    ```

    **Listing 10-3**

    Casting incompatible types


    The exception here is SQLite, which will obediently convert the `varchar` value
    to 0. This may be the most sensible choice for it because of its underlying engine
    implementation; however, I would warn you to stay away from such surprising cast
    operations.


    Let’s try the other numeric aggregate function that is commonly used – `SUM`.
    Suppose we wish to find the sum of the `year` values in our table – the query
    would be written in a straightforward way using `SUM` (Listing [10-4](#A457348_1_En_10_Chapter.html#Par14)).


    ```sql

    SELECT SUM(year)

    FROM proglang_tbl;

    ```

    **Listing 10-4**

    Using the `SUM` aggregate function


    ![A457348_1_En_10_Figc_HTML.gif](A457348_1_En_10_Figc_HTML.gif)


    As before, if we use `SUM` on a `varchar` field, PostgreSQL would spit out an
    error while SQLite would quietly give a value of 0.0 (Listing [10-5](#A457348_1_En_10_Chapter.html#Par16)).


    ```sql

    testdb=# SELECT SUM(language)

    FROM proglang_tbl;

    ERROR:  function sum(character varying) does not exist

    LINE 1: SELECT SUM(language) FROM proglang_tbl;

    ^

    HINT:  No function matches the given name and argument types. You might need to
    add explicit type casts.

    ```

    **Listing 10-5**

    Using `SUM` on a `varchar` field in PostgreSQL


    ## Using the Extreme Functions – MAX and MIN


    `MAX` and `MIN` are collectively called the extreme functions because they essentially
    find the extreme values from a set of column values. Their most intuitive application
    is with numeric data, but these functions can be applied to other database types
    as well.


    These functions are fairly straightforward to understand and use. Let’s take the
    `MIN` first. It looks at a particular set of rows and finds the minimum value
    of the column that is provided as an argument to it. For example, in our table
    we wish to find out from which `year` do we have records of programming languages,
    that is, the earliest language year. Analyzing the problem at hand, we see that
    if we apply the aggregate function `MIN` to the field `year` in our table, we
    should get the desired output (Listing [10-6](#A457348_1_En_10_Chapter.html#Par19)).


    ```sql

    SELECT MIN(year)

    FROM proglang_tbl;

    ```

    **Listing 10-6**

    Using the `MIN` extreme aggregate function


    ![A457348_1_En_10_Figd_HTML.gif](A457348_1_En_10_Figd_HTML.gif)


    We had two languages in our table corresponding to the year 1959 – APT and JOVIAL.
    But since this is the minimum value, it was the result once regardless of how
    many languages had the same value. The function `MAX` is similar, but its result
    would signify the latest year in which one of the languages in our table was created
    (Listing [10-7](#A457348_1_En_10_Chapter.html#Par21)).


    ```sql

    SELECT MAX(year)

    FROM proglang_tbl;

    ```

    **Listing 10-7**

    Using the `MAX` extreme aggregate function


    ![A457348_1_En_10_Fige_HTML.gif](A457348_1_En_10_Fige_HTML.gif)


    Of course you can combine them in a single query to get the result in a single
    row itself (Listing [10-8](#A457348_1_En_10_Chapter.html#Par23)).


    | max | min |

    | --- | --- |

    | 1988 | 1959 |


    ```sql

    SELECT MAX(year),

    MIN(year)

    FROM proglang_tbl;

    ```

    **Listing 10-8**

    Using `MAX` and `MIN` together


    Like we read before, these functions are not limited to numeric types. So let’s
    combine finding the `MAX` `year` value with the `MIN` `language` value (Listing
    [10-9](#A457348_1_En_10_Chapter.html#Par25)).


    | max | min |

    | --- | --- |

    | 1988 | APL |


    ```sql

    SELECT MAX(year),

    MIN(language)

    FROM proglang_tbl;

    ```

    **Listing 10-9**

    Mixing `MAX` and `MIN` types


    The `MIN` `language` found was APL since it’s the first alphabetically. Notice
    that APT was not chosen since L < T when comparing alphabets.


    We need to be careful while reading this result though. At first glance it gives
    a misleading view that 1988 corresponds to APL, which is not the case. Our query
    simply gives the extreme values of these two fields in our table, whether they
    are from the same record or not.'
