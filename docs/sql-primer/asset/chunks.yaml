    ERROR:  could not create unique index "id_idx"

    DETAIL:  Key (id)=(4) is duplicated.

    代码清单 15-12

    无法在包含重复值的字段上创建唯一索引

    ```


    类似地，向一个具有唯一索引的字段中添加重复值也会导致错误，类似于 `ERROR: duplicate key value violates unique constraint
    "<index name>"`。


    如果你记忆力超群，你会记得这与我们在第 3 章讨论唯一约束时在代码清单 3-12 中看到的错误相同。如果我们现在尝试描述涉及的表 `proglang_tbluk`
    的结构，我们将看到 PostgreSQL 是如何以索引来定义这些约束的（参见代码清单 15-13）。


    ```

    \d proglang_tbluk;

    Table "public.proglang_tbluk"

    Column     |          Type          | Modifiers

    ----------------+------------------------+-----------

    id             | integer                | not null

    language       | character varying(20)  | not null

    author         | character varying(30)  | not null

    year           | integer                | not null

    standard       | character varying(10)  |

    current_status | character varying(32)  |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    代码清单 15-13

    描述一个同时包含主键和唯一索引的表

    ```


    实际上，这也是我们在第 4 章的代码清单 4-11 中尝试过的，但当时我们并没有非常仔细地关注输出的 `INDEXES` 部分。


    ## 索引如何工作？


    对索引工作原理有一个高层概览，可以帮助用户编写有效、执行快速的查询。大多数 SQL 用户忽略了索引的概念性理解，但实际上它们并不难掌握。


    在本章开头，我们将数据库索引比作在字典中查找单词。字典的字母排序特性使查找过程更加容易。同样地，书籍索引通过按字母顺序列出概念及其讨论的页码，使你能够查找书中讨论的概念。


    这与实际的数据库索引非常相似。虽然底层细节因实现而异，但将其视为一个有序的查找表是很有帮助的。被索引字段的值经过排序存储，并带有指向基础表中实际记录位置的指针。


    如果我们在 `proglang_tbl` 的 `standard` 字段上创建一个索引，该索引的简化表示如图 15-1 所示。SQL 解释器无需遍历整个表来查找
    `standard` 字段为 `ANSI` 的两行。这种低效的全表遍历有时被称为全表扫描或顺序扫描。索引的目的就是为了避免这种扫描。


    ![A457348_1_En_15_Fig1_HTML.jpg](img/A457348_1_En_15_Fig1_HTML.jpg)


    图 15-1


    索引工作原理的可视化表示


    当有人编写一个带有 `WHERE` 子句的查询，以查找特定的 `standard` 值时，这个索引会自动生效，而无需用户指定使用它。添加或删除具有不同该字段值的行也会自动更新索引，因此索引始终引用表中的最新数据。


    ## 索引开销


    尽管索引无需太多复杂命令就能为用户带来诸多好处，但有时用户会想为每一个可能的列都创建索引。毕竟，目前看起来索引创建似乎没有缺点。


    然而，事实证明，就像世界上的其他事物一样，天下没有免费的午餐。如果一个有 N 个字段的表在每一列上都有索引，那么对于每一个 `INSERT`、`UPDATE`
    或 `DELETE` 这样的 DML 语句，都必须保持这 N 个索引同步。这会使大型表的数据更改变得缓慢，有时令人烦恼，有时令人担忧。


    过多索引带来的另一个严重开销是它们的存储需求。索引和表一样，会在磁盘上占用物理空间。尽管近年来存储变得便宜，但数据库管理员对服务器空闲空间的态度并不随意。


    让我们检查一下磁盘如何受索引创建的影响。我们将重点关注 `biglang_tbl` 及其索引 `biglang_idx`。首先，让我们找出表及其相关对象占用的总空间（参见代码清单
    15-14）。


    ```

    SELECT pg_size_pretty(pg_total_relation_size(''biglang_tbl''));

    pg_size_pretty

    ----------------

    4608 kB

    (1 row)

    代码清单 15-14

    在 PostgreSQL 中显示表及其相关对象的总大小

    ```


    函数 `pg_total_relation_size` 会返回表、其索引以及其他一些东西占用的磁盘空间。`pg_size_pretty` 用于将输出美化为更易读的单位（如
    kB）而不是字节数。从这些函数名可以明显看出，它们是 PostgreSQL 特有的。如果你使用的是不同的产品，请查阅你的 DBMS 手册以获取查询数据库目录的命令。


    现在，让我们找出表和索引各自占用了多少空间（参见代码清单 15-15）。这应该能让我们对索引的大小有一个相对的概念。


    ```

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_tbl''));

    pg_size_pretty

    ----------------

    3296 kB

    (1 row)

    testdb=# SELECT pg_size_pretty(pg_relation_size(''biglang_idx''));

    pg_size_pretty

    ----------------

    1312 kB

    (1 row)

    代码清单 15-15

    在 PostgreSQL 中显示表及其索引的大小

    ```


    我们的索引大小大约是表大小的 39%！更不用说它占用了 `biglang_tbl` 总关联大小的 28%。请记住，我们这里讨论的只是一个字段上的单个索引。显然，我们需要在索引创建上有所节制。


    一个好的经验法则是在查询中大量依赖主键和唯一索引。随着时间的推移，你会开始看到运行缓慢的查询模式。如果这些查询不常运行，也许我们可以忍受额外花费的时间。但如果运行缓慢的查询是定期执行的，并且
    `WHERE` 子句中经常包含相同的未索引字段，那么它就是创建索引的完美候选。


    ### SQLite 中的索引大小


    你可能注意到我们只讨论了 PostgreSQL 中的索引大小。像 `pg_size_pretty`、`pg_total_relation_size` 和 `pg_relation_size`
    这样的辅助函数是 PostgreSQL 特有的，不是 SQL 标准的一部分。


    我还没找到一种在 SQLite 中计算索引大小的好方法。由于它是一个自包含的单文件数据库，你可以在创建索引前后验证文件大小，以获得一个粗略的估计。'
- fmt: "## Deleting an Index\n\nIf you no longer need an index, SQL gives you the\
    \ `DROP INDEX` command to delete an index. The general syntax of this command\
    \ is simple enough (Listing [15-16](#A457348_1_En_15_Chapter.html#Par56)).\n\n\
    ```\nDROP INDEX \nListing 15-16\nGeneral syntax of DROP INDEX\n```\n\nNote that\
    \ this does not change the data of the underlying table in any way (Listing [15-17](#A457348_1_En_15_Chapter.html#Par58)).\
    \ All you are doing is dropping the index, so the query time may become slower.\n\
    \n```\nDROP INDEX biglang_idx;\nSELECT COUNT(*) FROM biglang_tbl;\ncount\n\n(1\
    \ row)\nListing 15-17\nDROP INDEX doesn’t change the contents of the underlying\
    \ table\n```\n\n# 16. Access Control Statements\n\nDue to their ease of use, extensive\
    \ feature sets, and reliability, SQL-based relational database management systems\
    \ have become the golden source of truth for enterprises everywhere. When large\
    \ companies think of storing critical data, the only question in their minds is\
    \ which relational DBMS vendor and not what kind of data store.\n\nWhen such important\
    \ data is being stored in the system and when the DBMS becomes the central data\
    \ store across the organization, some level of access control is absolutely essential.\n\
    \nAccess control refers to permissions within a software system. When you log\
    \ onto a server or sometimes even your own computer, you have been given permission\
    \ to access the resources of the system. Often when you wish to install new software\
    \ on your machine, you require root or administrator privileges. This is the operating\
    \ system’s access control mechanisms at work.\n\nRelational databases understandably\
    \ also have very powerful access control mechanisms. While most systems vary widely\
    \ in how they provide access control, almost all vendors do provide the Data Control\
    \ Language (DCL) SQL commands of `GRANT` and `REVOKE`.\n\n### Access Control in\
    \ SQLite\n\nPermissions truly come into play in multi-user systems, that is, when\
    \ multiple users have access to a system but not equally. This is typically the\
    \ case in client-server database systems like PostgreSQL, Sybase ASE, etc.\n\n\
    SQLite is a single file-based system typically used in scenarios where we need\
    \ to embed a simple database within tight constraints or within an application.\
    \ It is not truly meant for multi-user access though there are provisions in it\
    \ to allow it to some degree. This does not mean that it is not a capable RDBMS.\
    \ I personally think the world would be better off using SQLite in half the cases\
    \ where more expensive and resource-hungry systems were put, but that is a discussion\
    \ for another time.\n\nSQLite being single file-based relies on the operating\
    \ systems to grant or restrict access to its data file. Consequently, it does\
    \ not implement any `GRANT` or `REVOKE` commands. The rest of the chapter focuses\
    \ on access control mechanisms using PostgreSQL examples.\n\n### Creating New\
    \ Users in PostgreSQL\n\nFor running the examples in the book, we have been using\
    \ the user `postgres`. This has served us well as a catch-all account with all\
    \ rights and permissions. Just to recap, we used to start our `psql` session by\
    \ specifying the username in the `-U` option as below (Listing [16-1](#A457348_1_En_16_Chapter.html#Par9)).\n\
    \n```\n/opt/PostgreSQL/9.5/bin/psql -U postgres\nListing 16-1\nThe psql session\
    \ start command with user postgres\n```\n\nBut this does not accurately reflect\
    \ the real-world setup. Usually you would have your own user account, which will\
    \ have lesser privileges than the administrator account. This is safer both for\
    \ you and the database administrators knowing that one account being compromised\
    \ does not affect everything in the system.\n\nLet us go about creating a new\
    \ user in PostgreSQL though `psql` (Listing [16-2](#A457348_1_En_16_Chapter.html#Par12)),\
    \ and then we’ll go on to specifying the rights that the particular user gets.\n\
    \n```\npostgres=# CREATE USER primer with PASSWORD 'hunter2';\nCREATE ROLE\npostgres=#\n\
    Listing 16-2\nCreating a new user in psql\n```\n\nWhen you execute this command,\
    \ a new user by the name `primer` is created with the password `hunter2` and the\
    \ console displays the message `CREATE ROLE`. Since the session was created with\
    \ the user `postgres` and the text before the `=#` is still the same, we can see\
    \ that the `CREATE USER` command does not switch to the new user directly but\
    \ continues the same session with `postgres`.\n\n### The legend of hunter2\n\n\
    Before social networks were popular, Internet Relay Chat (IRC) ruled the instant\
    \ messaging landscape. People connected to an IRC server and joined one or more\
    \ chat rooms called channels and talked with like-minded people.\n\nIf a conversation\
    \ was particularly funny, people would post it to a site Bash.org. Around 2004,\
    \ somebody posted a funny exchange between two users where the first user convinces\
    \ the other one that when they type their real password in IRC, everyone else\
    \ sees only ******’s. This was of course not true, but funny nonetheless. Whether\
    \ the conversation truly happened can also not be verified, but the password in\
    \ question was ‘hunter2’.\n\nYou can read the Bash.org entry here: [`http://www.bash.org/?244321`](http://www.bash.org/?244321)\n\
    \nWe will now try to verify whether the user was indeed created (Listing [16-3](#A457348_1_En_16_Chapter.html#Par18)).\
    \ Like before, `psql` gives us a short command for this – `\\du`.\n\n```\npostgres=#\
    \ \\du\nList of roles\nRole name |                    Attributes             \
    \     | Member of\n-----------+------------------------------------------------+\n\
    postgres  | Superuser, Create role, Create DB, Replication,|\n| Bypass RLS   \
    \                                  | {}\nprimer    |                         \
    \                       | {}\nListing 16-3\nChecking if the user primer has been\
    \ created\n```\n\nWe see that indeed our user has been created, though the list\
    \ of its attributes is empty. Don’t worry, we will get to that in a bit.\n\nIf\
    \ you want to verify the same information without using the `psql` metacommand,\
    \ we can query the inbuilt database catalog information (Listing [16-4](#A457348_1_En_16_Chapter.html#Par21)).\n\
    \n| usename | usesysid | usecreatedb | usesuper |\n| --- | --- | --- | --- |\n\
    | postgres | 10 | t | t |\n| primer | 41095 | f | f |\n\n```\nSELECT usename,\n\
    usesysid,\nusecreatedb,\nusesuper FROM pg_user;\nListing 16-4\nQuerying user information\
    \ from the database catalog\n```"
