    ```


    从输出中我们可以清楚地看到，Perl 和 Tcl 的记录被排除在外，因为它们不满足`HAVING`条件（即在 1980 年之前创建）。


    你可能想知道为什么我们需要两个不同的过滤子句——`WHERE`和`HAVING`。`WHERE`子句不允许在其条件中使用聚合函数，而这正是`HAVING`子句的主要目标。例如，假设我们想检查哪些`standard`值在我们的表中出现超过一次。我们使用`GROUP
    BY`子句的初步尝试可能看起来像这样（清单 10-16）。


    ```sql

    SELECT standard

    FROM proglang_tbl

    WHERE COUNT(standard) > 1

    GROUP BY standard;

    ERROR:  aggregate functions are not allowed in WHERE

    清单 10-16

    尝试在 WHERE 中使用聚合函数

    ```


    正如我们所想，我们的 SQL 解释器不允许这种做法。相反，我们将在`HAVING`子句中使用相同的条件（清单 10-17）。


    | standard |

    | --- |

    | ANSI |

    | ISO |


    ```sql

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(standard) > 1;

    清单 10-17

    带有聚合函数的 HAVING 子句

    ```


    它正确地返回了两个出现次数超过一次的`standard`值。有趣的是，如果我们将条件改为`COUNT(*)`，我们会得到一个额外的行（清单 10-18）。


    | standard |

    | --- |

    | (null) |

    | ANSI |

    | ISO |


    ```sql

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(*) > 1;

    清单 10-18

    更改聚合函数的行为

    ```


    现在，过滤条件不再局限于`standard`列的非空值。由于该字段中有多个包含`null`值的记录，它们也会被包含在结果中。

