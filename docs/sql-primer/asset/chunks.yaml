    ## 从另一张表向表中插入数据


    你可以通过结合使用 `INSERT` 和 `SELECT` 语句，从另一张表向目标表插入新记录。这与我们之前结合 `CREATE TABLE` 和 `SELECT`
    来根据另一张表的行创建新表的方式非常相似。


    由于查询会返回一些记录，将其与插入命令结合就能将这些记录输入到新表中。你甚至可以使用 `WHERE` 条件来限制或筛选你希望插入新表的记录。我们现在将创建一个名为
    `stdlang_tbl` 的新表，它只包含两个字段——`language` 和 `standard`。我们将向其中插入 `proglang_tbl` 表中
    `standard` 字段值非空的行（代码清单 6-1）。这也将演示我们首次使用布尔运算符——`NOT`。


    ```sql

    CREATE TABLE stdlang_tbl

    (language varchar(20),

    standard varchar (10));

    INSERT INTO stdlang_tbl

    SELECT language,

    standard

    FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ```

    代码清单 6-1

    使用 `INSERT` 和 `SELECT` 有条件地将数据加载到另一张表


    请注意，在这种情况下，我们必须先单独创建表，然后使用 `INSERT` 和 `SELECT` 向其中插入数据。`NOT` 会反转 `IS NULL` 的测试结果，也就是说，如果某个值是空值，正常情况下应返回
    `true`，但加上 `NOT` 后，该条件会返回 `false`。


    `NOT`、`NULL`、`True` 和 `False`


    如果我们考虑布尔逻辑原理，与 `NULL` 最接近的类比是 `false` 值。然而，`NOT` 会反转布尔值：`true` 变为 `false`，`false`
    变为 `true`。


    使用 `IS NULL` 测试一个值是 SQL 的比较操作，对每个空值都返回 `true`。这正是我们在上面的例子中使用 `NOT` 所反转的内容。不要将这个比较的含义与
    `NULL` 所紧密代表的布尔值混淆。


    当你查看此表的内容时，会注意到它只选取了那些 `standard` 列确实有值的语言（表 6-1）。


    表 6-1

    我们新建的 `stdlang_tbl` 表的内容


    | 语言 | 标准 |

    | --- | --- |

    | Prolog | ISO |

    | APL | ANSI |

    | JOVIAL | US-DOD |

    | APT | ISO |


    由 `INSERT INTO` 和 `SELECT` 填充的数据必须遵守在创建表时定义的约束。如果我们的 `stdlang_tbl` 将 `language`
    定义为主键，那么除非遇到重复的 `language` 值，否则我们的插入语句都能正常运行（代码清单 6-2）。在当前情况下这不成问题，因为语言名称本身是唯一的。


    ```sql

    DROP TABLE stdlang_tbl;

    CREATE TABLE stdlang_tbl

    (language varchar(20) PRIMARY KEY,

    standard varchar (10));

    INSERT INTO stdlang_tbl

    SELECT language,

    standard

    FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ```

    代码清单 6-2

    `stdlang_tbl` 的一个修改后的定义，包含主键


    如果我们以某种方式违反了约束会发生什么？例如，让我们创建一个新表 `standardizing_bodies`，它只包含一个字段——`name`。该表上唯一的约束是
    `UNIQUE`。我们已经知道，`proglang_tbl` 中的 Prolog 和 APT 都是由 ISO 标准化的。让我们尝试用代码模拟这个过程（代码清单
    6-3）。


    ```sql

    CREATE TABLE standardizing_bodies

    ( name varchar(10) UNIQUE );

    INSERT INTO standardizing_bodies

    SELECT standard FROM proglang_tbl

    WHERE standard IS NOT NULL;

    ERROR:  duplicate key value violates unique constraint "standardizing_bodies_name_key"

    DETAIL:  Key (name)=(ISO) already exists.

    ```

    代码清单 6-3

    在执行 `INSERT INTO … SELECT` 时违反 `UNIQUE` 约束


    请注意，这个新表 `standardizing_bodies` 的内容将是空的。我们的 `INSERT` 操作是一个单一语句，而非一组独立的插入。因此，当约束被违反时，没有数据被插入。


    ## 更新现有数据


    要修改记录中的某些数据，我们使用 `UPDATE` 命令。虽然它不能添加或删除记录（这些职责委托给其他命令），但如果一条记录存在，它甚至可以一次性修改其多个字段的数据并应用条件。`UPDATE`
    语句的一般语法如下（代码清单 6-4）。


    ```sql

    UPDATE <table_name> SET

    <column1> = <value1>,

    <column2> = <value2>,

    <column3> = <value3>

    . . .

    WHERE <condition>;

    ```

    代码清单 6-4

    `UPDATE` 命令的一般语法


    现在让我们回到 `proglang_tbl` 表，并添加两行关于 Forth 和 Tcl 编程语言的新数据（代码清单 6-5）。


    ```sql

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (6, ''Forth'', ''Moore'', 1973, NULL);

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (7, ''Tcl'', ''Ousterhout'', 1988, NULL);

    ```

    代码清单 6-5

    在我们的编程语言表中填充更多数据


    如果我们突然想给每种语言的创建年份加上 10 年怎么办？由于我们想将 `UPDATE` 逻辑应用到每一行，我们可以省略搜索条件（代码清单 6-6）。


    ```sql

    UPDATE proglang_tbl SET

    year = year + 10;

    ```

    代码清单 6-6

    对表的所有行执行 `UPDATE`


    这个查询会将所有语言的创建年份增加 10。这里没有歧义，因为等号右侧的 `year + 10` 会先被计算，然后赋值给 `year` 字段。这对所有行都生效。要恢复到我们原始的日期，只需运行相同的查询，将
    `SET` 的列改为 `year = year – 10`。


    我们后来意识到 Forth 语言大约是在 1972 年创建的（而不是 1973 年），并且它实际上在 1994 年被 ANSI 标准化了。因此，我们现在通过编写更新查询来纠正错误，以反映这些数据（代码清单
    6-7）。我们应该注意，必须包含一个仅针对 Forth 语言的搜索条件。


    ```sql

    UPDATE proglang_tbl SET

    year = 1972

    WHERE language = ''Forth'';

    UPDATE proglang_tbl SET

    standard = ''ANSI''

    WHERE language = ''Forth'';

    ```

    代码清单 6-7

    更新 Forth 语言的详细信息


    我们本可以轻松地将多个字段的更新合并到一个语句中，从而为 DBMS 引擎省去再次查找该行的麻烦（代码清单 6-8）。


    ```sql

    UPDATE proglang_tbl SET

    year = 1972,

    standard = ''ANSI''

    WHERE language = ''Forth'';

    ```

    代码清单 6-8

    在单个语句中更新多个字段


    如果你正确输入了语句并且没有返回错误，那么目标记录的内容应该已被按预期修改。要验证结果，只需运行一个简单的查询，就像我们在前面的例子中看到的那样。

    '
- fmt: "# Deleting Data from Tables\n\nYou can use the `DELETE` command to delete\
    \ records from a table. This means that you can choose which records you want\
    \ to delete based on a condition or delete all records, but you cannot delete\
    \ certain fields of a record using this statement. The general syntax of the `DELETE`\
    \ statement is given below (Listing [6-9](#A457348_1_En_6_Chapter.html#Par31)).\n\
    \n```\nDELETE FROM \nWHERE ;\nListing 6-9\nGeneral syntax of DELETE\n```\n\nWhile\
    \ putting a conditional clause in the `DELETE` is optional, it is almost always\
    \ used – simply because not using it would cause all the records to be deleted\
    \ from a table, which is a rarely valid need. Luckily, we have a spare table `stdlang_tbl`\
    \ that is not needed anymore, so let’s try deleting all rows from it (Listing\
    \ [6-10](#A457348_1_En_6_Chapter.html#Par33)).\n\n```\nDELETE FROM stdlang_tbl;\n\
    Listing 6-10\nDeleting all records from a table\n```\n\nIf we try to verify contents\
    \ of this table, we’d get no data rows back. Only the column headers would be\
    \ visible.\n\n| language | standard |\n\nWe now write the full statement to delete\
    \ the record corresponding to Forth from the table. Again, we will have to include\
    \ the search condition in the `WHERE` clause (Listing [6-11](#A457348_1_En_6_Chapter.html#Par36),\
    \ Table [6-2](#A457348_1_En_6_Chapter.html#Tab2)).\n\n**Table 6-2** `proglang_tbl`\
    \ contents After the Record Deletion\n\n| id | language | author | year | standard\
    \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
    | 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL\
    \ | Schwartz | 1959 | US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout\
    \ | 1988 |   |\n\n```\nDELETE FROM proglang_tbl WHERE language = 'Forth';\nListing\
    \ 6-11\nDeleting a record from the proglang_tbl table\n```\n\nYou should always\
    \ be careful about the `WHERE` clauses you put on a `DELETE` statement. They should\
    \ never be too broad, lest you end up deleting more data than you intended.\n\n\
    # 7. Organizing Your Data\n\nSince this is a text meant to teach SQL to people\
    \ unfamiliar with it, our data has been very simplistic. The number of fields\
    \ you’d wish to store in your database would be a larger value than the five-column\
    \ table we saw in earlier chapters. Also, some assumptions were made intrinsically\
    \ on the kind of data we will store in the table. But this is not always the case\
    \ in real life.\n\nIn reality the data we encounter will be complex, even redundant.\
    \ This is where the study of data modeling techniques and database design come\
    \ in. While it is advised that the reader refer to a more comprehensive treatise\
    \ on this subject, nonetheless we will try to study some good relational database\
    \ design principles since the study would come in handy while learning SQL statements\
    \ for multiple tables.\n\n## Normalization\n\nLet us suppose we have a database\
    \ of employees in a fictional institution as given below (Table [7-1](#A457348_1_En_7_Chapter.html#Tab1)).\
    \ If the database structure has not been modeled but has been extracted from a\
    \ raw collection of information available, redundancy is expected.\n\n**Table\
    \ 7-1** The Fictional Firm’s Employee Data\n\n| employee_id | name | skill | manager_id\
    \ | location |\n| --- | --- | --- | --- | --- |\n| 1 | Socrates | Philosophy |\
    \ (null) | Greece |\n| 2 | Plato | Writing | 1 | Greece |\n| 3 | Aristotle | Science\
    \ | 2 | Greece |\n| 4 | Descartes | Philosophy | (null) | France |\n| 4 | Descartes\
    \ | Philosophy | (null) | Netherlands |\n\nWe can see that Descartes has two rows\
    \ because he spent his life in both France and Netherlands. Doesn’t seem very\
    \ elegant, does it? Now if at a later point we decide that we wish to classify\
    \ him with a different skill, we would have to update both his rows since they\
    \ should contain an identical (primary) skill.\n\nWouldn’t it be saner to have\
    \ a separate table for skills and somehow allow the records that share the same\
    \ skill to refer to this table? This way if we wish to reflect that both Socrates\
    \ and Descartes were thinkers in Western Philosophy, renaming the skill record\
    \ in the second table would do the trick.\n\nThis process of breaking down a raw\
    \ database into logical tables and removing redundancies is called **Normalization**.\
    \ There are even levels of normalization called normal forms that dictate how\
    \ to achieve the desired design.\n\nThere are five accepted normal forms that\
    \ serious database administrators and developers are familiar with. They range\
    \ from first normal form **1NF** to fifth normal form **5NF**. These forms are\
    \ progressive in nature, meaning that a design in 3NF is also 1NF and 2NF compliant.\
    \ Since the origin of these forms are based in academic research, the working\
    \ developers usually restrict themselves to 3NF or 4NF in most cases. Again, we\
    \ advise the reader refer to a more comprehensive text dealing with database design\
    \ and **normalization**. We will do mere lip service in exploring these vast fields.\n\
    \nFor now, let’s turn to our programming languages data to see the need for normalization\
    \ playing out.\n\n## Atomicity\n\nIn the programming language examples that we’ve\
    \ seen, our assumption has always been that a language has a single author. But\
    \ there are countless languages where multiple people contributed to the core\
    \ design and should rightfully be acknowledged in our table. How would we go about\
    \ making such a record? Let us take the case of BASIC, which was designed by John\
    \ Kemeny and Thomas Kurtz. The easiest option to add this new record into the\
    \ table is to fit both authors in the author field (Table [7-2](#A457348_1_En_7_Chapter.html#Tab2)).\n\
    \n**Table 7-2** A Record with a Non-Atomic Field Value\n\n| id | language | author\
    \ | year | standard |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer\
    \ | 1972 | ISO |\n| 2 | Perl | Wall | 1987 | (null) |\n| 3 | APL | Iverson | 1964\
    \ | ANSI |\n| 4 | Tcl | Ousterhout | 1988 | (null) |\n| 5 | BASIC | Kemeny, Kurtz\
    \ | 1964 | ANSI |\n\nYou can immediately see that it would be difficult to write\
    \ a query to retrieve this record based on the author field. If the data written\
    \ as “Kemeny, Kurtz” or “Kurtz, Kemeny” or even “Kemeny & Kurtz,” it would be\
    \ extremely difficult to put the right string in the `WHERE` conditional clause\
    \ of the query. After all, it is possible that the person who inserted the data\
    \ is not the same as the one querying it.\n\nThe correct solution is to redesign\
    \ the table structure to make all field values atomic. Atomicity of values means\
    \ that every intersection of a row and column must contain a single, indivisible\
    \ value. If in your current design you have some fields containing non-atomic\
    \ values, you need to start thinking of changing your table structures.\n\n##\
    \ Repeating Groups\n\nAnother simple (but ultimately wrong) approach that comes\
    \ to mind is to split the author field into two parts – `author1` and `author2`.\
    \ If a language has only one author, the `author2` field would contain a null\
    \ value (Table [7-3](#A457348_1_En_7_Chapter.html#Tab3)). Can you spot the problem\
    \ that will arise from this design decision?\n\n**Table 7-3** A Table with a Repeating\
    \ Group\n\n| id | language | author1 | author2 | year | standard |\n| --- | ---\
    \ | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | (null) | 1972 | ISO |\n\
    | 2 | Perl | Wall | (null) | 1987 | (null) |\n| 3 | APL | Iverson | (null) | 1964\
    \ | ANSI |\n| 4 | Tcl | Ousterhout | (null) | 1988 | (nul) |\n| 5 | BASIC | Kemeny\
    \ | Kurtz | 1964 | ANSI |\n\nThis imposes an artificial constraint on how many\
    \ authors a language can have. It seems to work fine for a couple of them, but\
    \ what if a programming language was designed by a committee of a dozen or more\
    \ people, and we did want to include all of them in the credits? At the database\
    \ design time, how do we fix the number of authors we wish to support?\n\nThis\
    \ kind of design is referred to as a repeating group and must be actively avoided.\
    \ This also has an ugly effect of having too many null values in some of the fields,\
    \ a first sign of bad database design."
  raw: "## Deleting Data from Tables\n\nYou can use the `DELETE` command to delete\
    \ records from a table. This means that you can choose which records you want\
    \ to delete based on a condition or delete all records, but you cannot delete\
    \ certain fields of a record using this statement. The general syntax of the `DELETE`\
    \ statement is given below (Listing [6-9](#A457348_1_En_6_Chapter.html#Par31)).\n\
    \n```\nDELETE FROM \nWHERE ;\nListing 6-9\nGeneral syntax of DELETE\n```\n\nWhile\
    \ putting a conditional clause in the `DELETE` is optional, it is almost always\
    \ used – simply because not using it would cause all the records to be deleted\
    \ from a table, which is a rarely valid need. Luckily, we have a spare table stdlang_tbl\
    \ that is not needed anymore, so let’s try deleting all rows from it (Listing\
    \ [6-10](#A457348_1_En_6_Chapter.html#Par33)).\n\n```\nDELETE FROM stdlang_tbl;\n\
    Listing 6-10\nDeleting all records from a table\n```\n\nIf we try to verify contents\
    \ of this table, we’d get no data rows back. Only the column headers would be\
    \ visible.\n\n| language | standard |\n\nWe now write the full statement to delete\
    \ the record corresponding to Forth from the table. Again, we will have to include\
    \ the search condition in the `WHERE` clause (Listing [6-11](#A457348_1_En_6_Chapter.html#Par36),\
    \ Table [6-2](#A457348_1_En_6_Chapter.html#Tab2)).\n\nTable 6-2\n\nproglang_tbl\
    \ contents After the Record Deletion\n\n| id | language | author | year | standard\
    \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
    | 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL\
    \ | Schwartz | 1959 | US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout\
    \ | 1988 |   |\n\n```\nDELETE FROM proglang_tbl WHERE language = 'Forth';\nListing\
    \ 6-11\nDeleting a record from the proglang_tbl table\n```\n\nYou should always\
    \ be careful about the `WHERE` clauses you put on a `DELETE` statement. They should\
    \ never be too broad, lest you end up deleting more data than you intended.\n\n\
    # 7. Organizing Your Data\n\nSince this is a text meant to teach SQL to people\
    \ unfamiliar with it, our data has been very simplistic. The number of fields\
    \ you’d wish to store in your database would be a larger value than the five-column\
    \ table we saw in earlier chapters. Also, some assumptions were made intrinsically\
    \ on the kind of data we will store in the table. But this is not always the case\
    \ in real life.\n\nIn reality the data we encounter will be complex, even redundant.\
    \ This is where the study of data modeling techniques and database design come\
    \ in. While it is advised that the reader refer to a more comprehensive treatise\
    \ on this subject, nonetheless we will try to study some good relational database\
    \ design principles since the study would come in handy while learning SQL statements\
    \ for multiple tables.\n\n## Normalization\n\nLet us suppose we have a database\
    \ of employees in a fictional institution as given below (Table [7-1](#A457348_1_En_7_Chapter.html#Tab1)).\
    \ If the database structure has not been modeled but has been extracted from a\
    \ raw collection of information available, redundancy is expected.\n\nTable 7-1\n\
    \nThe Fictional Firm’s Employee Data\n\n| employee_id | name | skill | manager_id\
    \ | location |\n| --- | --- | --- | --- | --- |\n| 1 | Socrates | Philosophy |\
    \ (null) | Greece |\n| 2 | Plato | Writing | 1 | Greece |\n| 3 | Aristotle | Science\
    \ | 2 | Greece |\n| 4 | Descartes | Philosophy | (null) | France |\n| 4 | Descartes\
    \ | Philosophy | (null) | Netherlands |\n\nWe can see that Descartes has two rows\
    \ because he spent his life in both France and Netherlands. Doesn’t seem very\
    \ elegant, does it? Now if at a later point we decide that we wish to classify\
    \ him with a different skill, we would have to update both his rows since they\
    \ should contain an identical (primary) skill.\n\nWouldn’t it be saner to have\
    \ a separate table for skills and somehow allow the records that share the same\
    \ skill to refer to this table? This way if we wish to reflect that both Socrates\
    \ and Descartes were thinkers in Western Philosophy, renaming the skill record\
    \ in the second table would do the trick.\n\nThis process of breaking down a raw\
    \ database into logical tables and removing redundancies is called Normalization\
    \ . There are even levels of normalization called normal forms that dictate how\
    \ to achieve the desired design.\n\nThere are five accepted normal forms that\
    \ serious database administrators and developers are familiar with. They range\
    \ from first normal form 1NF to fifth normal form 5NF These forms are progressive\
    \ in nature, meaning that a design in 3NF is also 1NF and 2NF compliant. Since\
    \ the origin of these forms are based in academic research, the working developers\
    \ usually restrict themselves to 3NF or 4NF in most cases. Again, we advise the\
    \ reader refer to a more comprehensive text dealing with database design and normalization\
    \ . We will do mere lip service in exploring these vast fields.\n\nFor now, let’s\
    \ turn to our programming languages data to see the need for normalization playing\
    \ out.\n\n## Atomicity\n\nIn the programming language examples that we’ve seen,\
    \ our assumption has always been that a language has a single author. But there\
    \ are countless languages where multiple people contributed to the core design\
    \ and should rightfully be acknowledged in our table. How would we go about making\
    \ such a record? Let us take the case of BASIC, which was designed by John Kemeny\
    \ and Thomas Kurtz. The easiest option to add this new record into the table is\
    \ to fit both authors in the author field (Table [7-2](#A457348_1_En_7_Chapter.html#Tab2)).\n\
    \nTable 7-2\n\nA Record with a Non-Atomic Field Value\n\n| id | language | author\
    \ | year | standard |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer\
    \ | 1972 | ISO |\n| 2 | Perl | Wall | 1987 | (null) |\n| 3 | APL | Iverson | 1964\
    \ | ANSI |\n| 4 | Tcl | Ousterhout | 1988 | (null) |\n| 5 | BASIC | Kemeny, Kurtz\
    \ | 1964 | ANSI |\n\nYou can immediately see that it would be difficult to write\
    \ a query to retrieve this record based on the author field. If the data written\
    \ as “Kemeny, Kurtz” or “Kurtz, Kemeny” or even “Kemeny & Kurtz,” it would be\
    \ extremely difficult to put the right string in the `WHERE` conditional clause\
    \ of the query. After all, it is possible that the person who inserted the data\
    \ is not the same as the one querying it.\n\nThe correct solution is to redesign\
    \ the table structure to make all field values atomic. Atomicity of values means\
    \ that every intersection of a row and column must contain a single, indivisible\
    \ value. If in your current design you have some fields containing non-atomic\
    \ values, you need to start thinking of changing your table structures.\n\n##\
    \ Repeating Groups\n\nAnother simple (but ultimately wrong) approach that comes\
    \ to mind is to split the author field into two parts – author1 and author2\\\
    . If a language has only one author, the author2 field would contain a null value\
    \ (Table [7-3](#A457348_1_En_7_Chapter.html#Tab3)). Can you spot the problem that\
    \ will arise from this design decision?\n\nTable 7-3\n\nA Table with a Repeating\
    \ Group\n\n| id | language | author1 | author2 | year | standard |\n| --- | ---\
    \ | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | (null) | 1972 | ISO |\n\
    | 2 | Perl | Wall | (null) | 1987 | (null) |\n| 3 | APL | Iverson | (null) | 1964\
    \ | ANSI |\n| 4 | Tcl | Ousterhout | (null) | 1988 | (nul) |\n| 5 | BASIC | Kemeny\
    \ | Kurtz | 1964 | ANSI |\n\nThis imposes an artificial constraint on how many\
    \ authors a language can have. It seems to work fine for a couple of them, but\
    \ what if a programming language was designed by a committee of a dozen or more\
    \ people, and we did want to include all of them in the credits? At the database\
    \ design time, how do we fix the number of authors we wish to support?\n\nThis\
    \ kind of design is referred to as a repeating group and must be actively avoided.\
    \ This also has an ugly effect of having too many null values in some of the fields,\
    \ a first sign of bad database design."
  trans: '

    # 从表中删除数据


    你可以使用 `DELETE` 命令从表中删除记录。这意味着你可以根据条件选择要删除的记录，或者删除所有记录，但不能使用此语句删除记录中的特定字段。`DELETE`
    语句的一般语法如下所示（见清单 6-9）。


    ```

    DELETE FROM <表名>

    WHERE <条件>;

    清单 6-9

    DELETE 的通用语法

    ```


    虽然在 `DELETE` 语句中加入条件子句是可选的，但它几乎总是被使用——因为如果不使用它，将导致表中的所有记录被删除，这在实际中很少是真正需要的。幸运的是，我们有一个不再需要的备用表
    `stdlang_tbl`，让我们尝试从中删除所有行（见清单 6-10）。


    ```

    DELETE FROM stdlang_tbl;

    清单 6-10

    从表中删除所有记录

    ```


    如果我们尝试查看此表的内容，将不会返回任何数据行。只会显示列标题。


    | language | standard |


    现在，我们编写完整的语句来删除表中对应于 Forth 的记录。同样，我们必须在 `WHERE` 子句中包含搜索条件（见清单 6-11 和表 6-2）。


    **表 6-2** 记录删除后 `proglang_tbl` 的内容


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 7 | Tcl | Ousterhout | 1988 |   |


    ```

    DELETE FROM proglang_tbl WHERE language = ''Forth'';

    清单 6-11

    从 proglang_tbl 表中删除一条记录

    ```


    你在 `DELETE` 语句中添加的 `WHERE` 子句时应始终小心。它们决不应该范围太广，以免最终删除了比你预期更多的数据。


    # 7. 组织你的数据


    由于这是一篇旨在向不熟悉 SQL 的人教授 SQL 的文章，我们的数据一直非常简单。你希望在数据库中存储的字段数量可能会比我们在前面章节看到的五列表更大。此外，对于将在表中存储的数据类型，我们隐含地做了一些假设。但在现实生活中，情况并非总是如此。


    实际上，我们遇到的数据会很复杂，甚至是冗余的。这就是数据建模技术和数据库设计研究的用武之地。虽然建议读者参考关于此主题的更全面的论述，但我们将尝试研究一些良好的关系数据库设计原则，因为这些研究在学习用于多表的
    SQL 语句时会派上用场。


    ## 规范化


    让我们假设我们有一个虚构机构的员工数据库，如下所示（表 7-1）。如果数据库结构没有经过建模，而是从原始信息集合中提取出来的，那么预计会出现冗余。


    **表 7-1** 虚构公司的员工数据


    | employee_id | name | skill | manager_id | location |

    | --- | --- | --- | --- | --- |

    | 1 | Socrates | Philosophy | (null) | Greece |

    | 2 | Plato | Writing | 1 | Greece |

    | 3 | Aristotle | Science | 2 | Greece |

    | 4 | Descartes | Philosophy | (null) | France |

    | 4 | Descartes | Philosophy | (null) | Netherlands |


    我们可以看到笛卡尔有两行，因为他一生中在法国和荷兰都生活过。看起来不太优雅，对吧？如果以后我们决定希望将他归类为不同的技能，我们就必须更新他的两行，因为它们应该包含相同（主要）的技能。


    如果有一个单独的技能表，并以某种方式让共享相同技能的记录引用此表，这不是更合理吗？这样，如果我们希望反映苏格拉底和笛卡尔都是西方哲学的思想家，只需在第二个表中重命名技能记录即可。


    这种将原始数据库分解为逻辑表并消除冗余的过程称为**规范化**。甚至还有称为范式的规范化级别，它们规定了如何实现所需的设计。


    有五种公认的范式，是认真的数据库管理员和开发人员所熟悉的。它们从第一范式 **1NF** 到第五范式 **5NF**。这些范式本质上是渐进的，这意味着一个符合
    3NF 的设计同时也符合 1NF 和 2NF。由于这些范式的起源是基于学术研究，实际开发人员在大多数情况下通常将自己限制在 3NF 或 4NF。我们再次建议读者参考更全面的关于数据库设计和**规范化**的文本。我们将只是浅尝辄止地探索这些广阔的领域。


    现在，让我们转向我们的编程语言数据，看看规范化的必要性如何体现出来。


    ## 原子性


    在我们看到的编程语言示例中，我们的假设始终是一种语言只有一位作者。但是有无数语言是由多人共同贡献核心设计的，他们理应在我们的表中被承认。我们将如何制作这样的记录呢？让我们以
    BASIC 为例，它由 John Kemeny 和 Thomas Kurtz 设计。将此新记录添加到表中的最简单选项是将两位作者都放入作者字段（表 7-2）。


    **表 7-2** 包含非原子字段值的记录


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 | (null) |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | Tcl | Ousterhout | 1988 | (null) |

    | 5 | BASIC | Kemeny, Kurtz | 1964 | ANSI |


    你可以立即看出，很难编写一个基于作者字段来检索此记录的查询。如果数据写为“Kemeny, Kurtz”或“Kurtz, Kemeny”甚至“Kemeny &
    Kurtz”，那么在查询的 `WHERE` 条件子句中放入正确的字符串将极其困难。毕竟，插入数据的人可能与查询它的人不同。


    正确的解决方案是重新设计表结构，使所有字段值都是原子的。值的原子性意味着行与列的每个交点都必须包含一个单一的、不可分割的值。如果你的当前设计中包含一些非原子值的字段，你就需要开始考虑更改你的表结构了。


    ## 重复组


    另一个想到的简单（但最终是错误的）方法是将作者字段拆分为两部分——`author1` 和 `author2`。如果一种语言只有一位作者，则 `author2`
    字段将包含空值（表 7-3）。你能发现这种设计决策将导致什么问题吗？


    **表 7-3** 包含重复组的表


    | id | language | author1 | author2 | year | standard |

    | --- | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | (null) | 1972 | ISO |

    | 2 | Perl | Wall | (null) | 1987 | (null) |

    | 3 | APL | Iverson | (null) | 1964 | ANSI |

    | 4 | Tcl | Ousterhout | (null) | 1988 | (nul) |

    | 5 | BASIC | Kemeny | Kurtz | 1964 | ANSI |


    这对一种语言可以拥有的作者数量施加了人为的限制。对于少数作者来说，它似乎可以正常工作，但如果一种编程语言是由十几人或更多人组成的委员会设计的，并且我们确实希望将他们全部列入署名中呢？在数据库设计时，我们如何确定我们希望支持的作者数量？


    这种设计被称为**重复组**，必须积极避免。它还带来一个不良影响，即在某些字段中出现过多的空值，这是糟糕的数据库设计的第一个迹象。

    '
- fmt: '## Splitting the Table


    Our first stab at table design lumps the languages and authors together. It is
    natural to think that way because our understanding of the data at first glance
    views all the fields as a logical whole. All the data to us belongs to the programming
    languages, the entity being described.


    But as we have seen above, the authors of the languages seem to be a distinct
    entity in our data. We have not even begun to capture multiple languages by the
    same author, and already we feel a pressing need to distinguish between languages
    and authors as entities.


    The correct design to remove the problems listed above is to split the table into
    two – one holding the author details (Table `7-5`) and one detailing the language
    (Table `7-4`).


    Table `7-5`


    A Table Holding Author Details


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |


    Table `7-4`


    A Table Holding Programming Language Details


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 | (null) |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 | (nul) |

    | 5 | BASIC | 1964 | ANSI |


    Once you have removed the non-atomicity of fields and repeating groups along with
    assigning unique `id`s to your tables, your table structure is now in the first
    normal form. The author table’s `language_id` field, which refers to the `id`
    field of the language table, is called a foreign key constraint (`Listing 7-1`).


    ```

    CREATE TABLE newlang_tbl

    (id       INTEGER     NOT NULL PRIMARY KEY,

    language VARCHAR(20) NOT NULL,

    year     INTEGER     NOT NULL,

    standard VARCHAR(10) NULL);

    CREATE TABLE authors_tbl

    (author_id   INTEGER     NOT NULL,

    author      VARCHAR(25) NOT NULL,

    language_id INTEGER REFERENCES newlang_tbl(id));

    ```


    `Listing 7-1`

    Creating the new tables


    Notice that in the author’s table we’ve made a foreign key constraint by making
    the `language_id` field reference the `id` field of the new programming languages
    table using the keyword `REFERENCES`. You can only create a foreign key reference
    as a primary or unique key; otherwise during the constraint creation time we would
    receive an error similar to the following.


    ```

    ERROR:  there is no unique constraint matching given keys for referenced table
    "newlang_tbl"

    ```


    Since we have created a reference to the `language_id`, inserting a row in the
    author’s table that does not yet have a language entry would also result in an
    error, called a Referential Integrity violation (`Listing 7-2`).


    ```

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES

    (5, ''Kemeny'', 5)

    ERROR:  insert or update on table "authors_tbl" violates foreign key constraint
    "authors_tbl_language_id_fkey"

    DETAIL:  Key (language_id)=(5) is not present in table "newlang_tbl".

    ```


    `Listing 7-2`

    A referential integrity violation


    However, when done sequentially, that is, the language first and then its corresponding
    entry in the author table, everything works out (`Listing 7-3`).


    ```

    INSERT INTO newlang_tbl

    (id, language, year, standard)

    VALUES

    (5, ''BASIC'', 1964, ''ANSI'');

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES

    (5, ''Kemeny'', 5);

    ```


    `Listing 7-3`

    Making entries for BASIC in both the tables


    Referential Integrity in SQLite


    If you tried to run `Listing 7-2` in SQLite, you wouldn’t get an error back despite
    there being no `language_id` 5 in the `newlang_tbl`. SQLite, by default, turns
    off referential integrity checking for backward compatibility reasons. To turn
    it on for your database, run the following `pragma` in its command shell.


    ```

    PRAGMA foreign_keys = ON;

    ```


    If you now violate referential integrity, we would get a familiar `Error: FOREIGN
    KEY constraint failed` error message.


    Referential integrity is a key benefit of good relational database design. Since
    it applies to related entities, it ensures that the values of these remain in
    sync. In our example above, this constraint made sure that we never have an author’s
    data whose created programming language is not captured in the languages table.


    When designing databases to solve a business problem, deciding how referential
    integrity comes into play is a big decision. This is done mainly in discussion
    with domain experts who understand the business logic of the entities data you
    are trying to capture.


    The other statements to get fully populated tables are given below (`Listing 7-4`).


    ```

    INSERT INTO newlang_tbl

    (id, language, year,  standard)

    VALUES

    (1, ''Prolog'', 1972, ''ISO'');

    INSERT INTO newlang_tbl

    (id, language, year)

    VALUES

    (2, ''Perl'', 1987);

    INSERT INTO newlang_tbl

    (id, language, year,  standard)

    VALUES

    (3, ''APL'', 1964, ''ANSI'');

    INSERT INTO newlang_tbl

    (id, language, year)

    VALUES

    (4, ''Tcl'', 1988);

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (6, ''Kurtz'', 5);

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (1, ''Colmerauer'', 1);

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (2, ''Wall'', 2);

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (3, ''Ousterhout'', 4);

    INSERT INTO authors_tbl

    (author_id, author, language_id)

    VALUES (4, ''Iverson'', 3);

    ```


    `Listing 7-4`

    Fully populating the newly created tables


    # The Pursuit of Normalization


    The man who created the Relational Model and in turn normalization – Dr. Codd
    – was an academic genius. While he was working at IBM at the time, decidedly non-academia,
    the whole thing has a whiff of mathematical purity about it.


    But the cost of removing redundancies in data is speed. While there may be many
    advanced levels of normal forms, 1NF-5NF and the lesser-known Boyce-Codd Normal
    Form, we must not be too pedantic about pursuing the higher normal form. Common
    sense must prevail in the head of the database designer.


    In some cases, denormalization does have the benefit of faster access. Indeed,
    many in-vogue NoSQL database systems tout redundant data storage as a feature.
    This obviously comes at the cost of consistency of truth. But then again, when
    our seemingly random clicks on the Web are captured and analyzed to decide our
    most suitable insurance provider, perhaps a loss of truth is acceptable.


    Nevertheless if 40 years of dominance is anything to go by, unless you have run
    into a very special case, Codd (and the relational model) is always right.


    # 8. Doing More with Queries


    SQL as a language was created for the end users of the database systems. It just
    happened to be used by programmers too, but the goal was always a simple, declarative,
    English-like language to allow anybody familiar with computers and the domain
    to make sensible reports out of the database system. These reporting capabilities
    were the direct output of an SQL query, and thus from the very beginning, there
    have been a lot of options and clauses that can be used with `SELECT` to make
    the output more legible.


    We have already seen some basic queries, how to order the results of a query,
    and how to put conditions on the query output. Let us now see more examples of
    how we can modify our `SELECT` statements to suit our ever-growing reporting needs.'
