    ## 查询语言的艰苦奋战


    在关系数据库的早期，SQL 并非占主导地位的查询语言。事实上，科德（Codd）曾为数据操作和查询提出了两种早期语言——`关系代数`和`关系演算`。顾名思义，它们是数学符号，而非旨在打造具有广泛吸引力的查询语言。


    科德尝试创建真正查询语言的作品是`Alpha`，发表于他 1971 年的论文《基于关系演算的数据库子语言》中。然而，`SystemR`项目使用了一种名为`SEQUEL`的独立查询语言，该语言由唐·钱伯林（Don
    Chamberlin）和雷蒙德·博伊斯（Raymond Boyce）于 1973 年左右创建。这种语言最终被更名为`SQL`。


    `Ingres`项目创建了他们自己的查询语言`QUEL`，其设计受到了`Alpha`的影响。然而，在 1980 年代，主要的数据库系统供应商，包括 IBM
    和 Oracle，都在推广`SQL`，随着开创性的`Ingres`逐渐失宠，`QUEL`也缓慢消亡。到 1980 年代末，`SQL`已牢固地确立了其作为事实上的数据库查询语言的地位，并保持至今。


