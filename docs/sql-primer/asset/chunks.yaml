  trans: '# 聚合函数


    聚合函数用于从一个或多个表中计算汇总信息。我们已经见过用于计数匹配记录的 `COUNT` 聚合函数。类似地，SQL 中还有其他聚合函数，例如用于计算平均值的
    `AVG`；用于计算总和的 `SUM`；以及用于找出最大值和最小值的极值函数 `MAX` 和 `MIN`。


    计数和极值函数适用于所有数据类型，但像 `SUM` 和 `AVG` 这样的函数仅对数值类型有意义，因此只能与数值类型一起使用。


    现在，让我们尝试对我们表中唯一有意义的数值型字段 `year` 使用 `AVG`（代码清单 10-1）。你可以将下面的查询视为找出我们表中所有编程语言记录的平均创建
    `year` 值的一种方式。


    ```sql

    SELECT AVG(year) FROM proglang_tbl;

    ```

    **代码清单 10-1**

    在我们的编程语言表中找出平均创建年份


    ![A457348_1_En_10_Figa_HTML.gif](img/A457348_1_En_10_Figa_HTML.gif)


    我们可以看到结果是一个十进制数，在 PostgreSQL 中小数点后默认显示 16 位数字。在 SQLite 中，这个位数略降至 10 位，但对于除极少数情况外，这已经绰绰有余了。


    虽然平均值被精确计算出来了，但有人可能会认为，像这样指定 `year` 的值并不实用。我们真正想要的是一个可读的 `year` 值，它看起来像一个实际的年份，具体来说是一个整数值。因此，我们将这个平均值转换为整数（代码清单
    10-2）。


    ```sql

    SELECT CAST(AVG(year) AS INTEGER)

    FROM proglang_tbl;

    ```

    **代码清单 10-2**

    将值转换为整数


    ![A457348_1_En_10_Figb_HTML.gif](img/A457348_1_En_10_Figb_HTML.gif)


    使用 `CAST` 进行数据类型转换仅适用于兼容的数据类型，如数值型和整型。如果你尝试将一个 `varchar` 转换为整数，DBMS（数据库管理系统）会如常地输出一条错误信息（代码清单
    10-3）。


    ```sql

    testdb=# SELECT CAST(language AS INTEGER)

    FROM proglang_tbl;

    ERROR:  invalid input syntax for integer: "Prolog"

    ```

    **代码清单 10-3**

    转换不兼容的类型


    这里的一个例外是 SQLite，它会顺从地将 `varchar` 值转换为 0。这可能是因为其底层引擎实现而做出的最明智选择；不过，我要提醒你避免使用这类令人惊讶的转换操作。


    让我们试试另一个常用的数值聚合函数——`SUM`。假设我们希望找出表中 `year` 值的总和——可以使用 `SUM` 以直接的方式编写查询（代码清单 10-4）。


    ```sql

    SELECT SUM(year)

    FROM proglang_tbl;

    ```

    **代码清单 10-4**

    使用 `SUM` 聚合函数


    ![A457348_1_En_10_Figc_HTML.gif](img/A457348_1_En_10_Figc_HTML.gif)


    如前所述，如果我们在 `varchar` 字段上使用 `SUM`，PostgreSQL 会报错，而 SQLite 则会静默地给出值 0.0（代码清单 10-5）。


    ```sql

    testdb=# SELECT SUM(language)

    FROM proglang_tbl;

    ERROR:  function sum(character varying) does not exist

    LINE 1: SELECT SUM(language) FROM proglang_tbl;

    ^

    HINT:  No function matches the given name and argument types. You might need to
    add explicit type casts.

    ```

    **代码清单 10-5**

    在 PostgreSQL 中的 `varchar` 字段上使用 `SUM`


    ## 使用极值函数 – MAX 和 MIN


    `MAX` 和 `MIN` 统称为极值函数，因为它们本质上是从一组列值中找出极值。它们最直观的应用是处理数字数据，但这些函数也可以应用于其他数据库类型。


    这些函数相当容易理解和使用。我们先看 `MIN`。它查看一组特定的行，并找出作为参数提供给它的列的最小值。例如，在我们的表中，我们希望找出从哪一年开始有编程语言的记录，即最早的编程语言年份。分析手头的问题，我们看到，如果对表中
    `year` 字段应用聚合函数 `MIN`，我们应该能得到所需的输出（代码清单 10-6）。


    ```sql

    SELECT MIN(year)

    FROM proglang_tbl;

    ```

    **代码清单 10-6**

    使用 `MIN` 极值聚合函数


    ![A457348_1_En_10_Figd_HTML.gif](img/A457348_1_En_10_Figd_HTML.gif)


    我们的表中在 1959 年对应两种语言——APT 和 JOVIAL。但因为这是最小值，所以无论有多少语言具有相同的值，它都只返回一次结果。函数 `MAX`
    类似，但它的结果将表示表中某一种语言被创建的最新年份（代码清单 10-7）。


    ```sql

    SELECT MAX(year)

    FROM proglang_tbl;

    ```

    **代码清单 10-7**

    使用 `MAX` 极值聚合函数


    ![A457348_1_En_10_Fige_HTML.gif](img/A457348_1_En_10_Fige_HTML.gif)


    当然，你可以在一个查询中将它们组合起来，直接在单行中获得结果（代码清单 10-8）。


    | max | min |

    | --- | --- |

    | 1988 | 1959 |


    ```sql

    SELECT MAX(year),

    MIN(year)

    FROM proglang_tbl;

    ```

    **代码清单 10-8**

    同时使用 `MAX` 和 `MIN`


    正如我们之前读到的，这些函数并不局限于数值类型。那么，让我们将查找 `MAX` `year` 值与 `MIN` `language` 值结合起来（代码清单
    10-9）。


    | max | min |

    | --- | --- |

    | 1988 | APL |


    ```sql

    SELECT MAX(year),

    MIN(language)

    FROM proglang_tbl;

    ```

    **代码清单 10-9**

    混合使用 `MAX` 和 `MIN` 类型


    找到的 `MIN` `language` 是 APL，因为它在字母顺序上排第一。请注意，APT 未被选中，因为在比较字母时 L < T。


    我们在解读这个结果时需要小心。乍一看，它会给人一个误导性的印象，认为 1988 对应的是 APL，但事实并非如此。我们的查询只是给出了表中这两个字段的极值，而不论它们是否来自同一条记录。'
- fmt: '## Grouping Data


    `SELECT`查询的`GROUP BY`子句用于根据字段值对记录进行分组。该子句位于`WHERE`条件之后。例如，在我们的示例表中，我们可以根据制定其标准的委员会对数据进行分组。在向表中插入另一条记录后，让我们看看此操作，以便分组的逻辑性质变得更加清晰（清单[10-10](#A457348_1_En_10_Chapter.html#Par29)）。


    | standard |

    | --- |

    | ECMA |

    | ANSI |

    | ISO |

    | US-DOD |


    ```sql

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (8, ''Fortran'', ''Backus'', 1957, ''ANSI'');

    SELECT standard FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard;

    Listing 10-10

    Grouping records by its fields

    ```


    注意不同的标准是如何被分组为单个值的，无论它们在表中出现了多少次。让我们尝试将`language`列添加到上述查询的输出中（清单[10-11](#A457348_1_En_10_Chapter.html#Par31)）。


    ```sql

    SELECT standard,

    language

    FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard;

    ERROR:  column "proglang_tbl.language" must appear in the GROUP BY clause or be
    used in an aggregate function

    Listing 10-11

    Trying to add language to our output fields

    ```


    数据库引擎为这个查询返回了一个错误。这是合理的，因为尽管分组子句将不同的标准归类在一起，但应该选择哪个`language`与之一起显示是模糊的。让我们按照错误信息的第一个建议，在`GROUP
    BY`子句中也包含`language`字段（清单[10-12](#A457348_1_En_10_Chapter.html#Par33)）。


    | standard | language |

    | --- | --- |

    | ECMA | PL/I |

    | ANSI | APL |

    | US-DOD | JOVIAL |

    | ISO | Prolog |

    | ISO | APT |

    | ANSI | Fortran |


    ```sql

    SELECT standard,

    language

    FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard, language;

    Listing 10-12

    Adding language to our output fields

    ```


    这里需要注意的一个有趣规则是：`SELECT`子句中列出的列必须也出现在`GROUP BY`子句中。这引出了以下两个推论。


    1.  你不能对一个不在`SELECT`列表中的列进行分组。

    2.  你必须在分组子句中指定所有出现在`SELECT`列表中的列。


    SQLite中的裸露列


    如果你在SQLite中尝试执行清单[10-11](#A457348_1_En_10_Chapter.html#Par31)，你不会得到错误。这是因为SQLite中的裸露列特性，它允许一列在`SELECT`子句中不使用聚合函数而存在，同时可以不在`GROUP
    BY`子句中。


    这与大多数DBMS系统非常不同，我建议你避免认真使用此特性，因为它涉及未定义的行为。不过，阅读SQLite网站上提供的详细信息是好的。


    [`https://www.sqlite.org/lang_select.html`](https://www.sqlite.org/lang_select.html)


    ## Grouping and Aggregate Functions


    使用分组的另一种有用方式是将该操作与聚合函数结合。假设我们希望统计某个组织在我们的表中有多少个标准。这可以通过将`GROUP BY`子句与`COUNT`聚合函数结合来实现，如下所示（清单[10-13](#A457348_1_En_10_Chapter.html#Par41)）。


    | standard | count |

    | --- | --- |

    | <null> | 2 |

    | ECMA | 1 |

    | ANSI | 2 |

    | ISO | 2 |

    | US-DOD | 1 |


    ```sql

    SELECT standard,

    COUNT(*)

    FROM proglang_tbl

    GROUP BY standard;

    Listing 10-13

    Using GROUP BY with aggregate functions

    ```


    输出非常直观，无需进一步解释，但查询本身很有趣。注意`GROUP BY`子句只包含了`standard`。聚合函数是分组列归类的结果。


    当与聚合函数明智地结合使用时，分组在SQL中才真正有意义。数据库的许多实用性和智能性都源于分析师在精心设计的模型上应用这些功能的组合。让我们再看一个例子，这次将`GROUP
    BY`与多个聚合函数结合使用。


    假设我们希望找出同一年创建了多少种语言，以及这些语言中按字母顺序哪个排第一（清单[10-14](#A457348_1_En_10_Chapter.html#Par45)）。我们可以立即看到，这里需要一个基于`year`的`GROUP
    BY`，同时需要几个不同的聚合函数。


    | year | min | count |

    | --- | --- | --- |

    | 1972 | Prolog | 1 |

    | 1957 | Fortan | 1 |

    | 1988 | Tcl | 1 |

    | 1987 | Perl | 1 |

    | 1964 | APL | 2 |

    | 1959 | APT | 2 |


    ```sql

    SELECT year,

    MIN(language),

    COUNT(*)

    FROM proglang_tbl

    GROUP BY year;

    Listing 10-14

    Using GROUP BY with multiple aggregate functions

    ```


    ## The HAVING Clause


    就像`WHERE`子句对查询的字段设置条件一样，`HAVING`子句对`GROUP BY`创建的组设置条件。它必须紧跟在`GROUP BY`之后，但在`ORDER
    BY`子句之前（清单[10-15](#A457348_1_En_10_Chapter.html#Par47)）。


    | language | standard | year |

    | --- | --- | --- |

    | APT | ISO | 1959 |

    | JOVIAL | US-DOD | 1959 |

    | APL | ANSI | 1964 |

    | Fortran | ANSI | 1957 |

    | PL/I | ECMA | 1964 |

    | Prolog | ISO | 1972 |


    ```sql

    SELECT language,

    standard,

    year

    FROM proglang_tbl

    GROUP BY standard,

    year,

    language

    HAVING year < 1980;

    Listing 10-15

    Demonstration of the HAVING clause

    ```


    从输出中我们可以清楚地看到，Perl和Tcl的记录被排除在外，因为它们不满足`HAVING`条件（即在1980年之前创建）。


    你可能想知道为什么我们需要两个不同的过滤子句——`WHERE`和`HAVING`。`WHERE`子句不允许在其条件中使用聚合函数，而这正是`HAVING`子句的主要目标。例如，假设我们想检查哪些`standard`值在我们的表中出现超过一次。我们使用`GROUP
    BY`子句的初步尝试可能看起来像这样（清单[10-16](#A457348_1_En_10_Chapter.html#Par50)）。


    ```sql

    SELECT standard

    FROM proglang_tbl

    WHERE COUNT(standard) > 1

    GROUP BY standard;

    ERROR:  aggregate functions are not allowed in WHERE

    Listing 10-16

    Trying aggregate functions in WHERE

    ```


    正如我们所想，我们的SQL解释器不允许这种做法。相反，我们将在`HAVING`子句中使用相同的条件（清单[10-17](#A457348_1_En_10_Chapter.html#Par52)）。


    | standard |

    | --- |

    | ANSI |

    | ISO |


    ```sql

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(standard) > 1;

    Listing 10-17

    HAVING clause with aggregate functions

    ```


    它正确地返回了两个出现次数超过一次的`standard`值。有趣的是，如果我们将条件改为`COUNT(*)`，我们会得到一个额外的行（清单[10-18](#A457348_1_En_10_Chapter.html#Par54)）。


    | standard |

    | --- |

    | (null) |

    | ANSI |

    | ISO |


    ```sql

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(*) > 1;

    Listing 10-18

    Changing the aggregate function behavior

    ```


    现在，过滤条件不再局限于`standard`列的非空值。由于该字段中有多个包含`null`值的记录，它们也会被包含在结果中。'
  raw: '## Grouping Data


    The `GROUP BY` clause of a `SELECT` query is used to group records based upon
    their field values. This clause is placed after the `WHERE` conditional. For example,
    in our sample table we can group data by which committee decided on their standard.
    Let’s see this action after we insert another record in our table so that the
    logical nature of grouping becomes clearer (Listing [10-10](#A457348_1_En_10_Chapter.html#Par29)).


    | standard |

    | --- |

    | ECMA |

    | ANSI |

    | ISO |

    | US-DOD |


    ```

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (8, ''Fortran'', ''Backus'', 1957, ''ANSI'');

    SELECT standard FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard;

    Listing 10-10

    Grouping records by its fields

    ```


    Notice how the different standards are grouped into a single value, regardless
    of how many times they occur in the table. Let’s try to add the language column
    to the output of the above query (Listing [10-11](#A457348_1_En_10_Chapter.html#Par31)).


    ```

    SELECT standard,

    language

    FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard;

    ERROR:  column "proglang_tbl.language" must appear in the GROUP BY clause or be
    used in an aggregate function

    Listing 10-11

    Trying to add language to our output fields

    ```


    The database engine gave us an error for this query. This makes sense because
    while it bunched the different standards together because of our grouping clause,
    which language it should choose to display with it is ambiguous. Let us take the
    error message’s first suggestion and also include the language field in the `GROUP
    BY` clause (Listing [10-12](#A457348_1_En_10_Chapter.html#Par33)).


    | standard | language |

    | --- | --- |

    | ECMA | PL/I |

    | ANSI | APL |

    | US-DOD | JOVIAL |

    | ISO | Prolog |

    | ISO | APT |

    | ANSI | Fortran |


    ```

    SELECT standard,

    language

    FROM proglang_tbl

    WHERE standard IS NOT NULL

    GROUP BY standard, language;

    Listing 10-12

    Adding language to our output fields

    ```


    The interesting thing to note here is the rule that the columns listed in the
    `SELECT` clause must be present in the `GROUP BY` clause. This leads us to the
    following two corollaries.


    1.  You cannot group by a column that is not present in the `SELECT` list.  

    2.  You must specify all the columns in the grouping clause that are present in
    the `SELECT` list.  


    Bare Columns in SQLite


    If you tried executing Listing [10-11](#A457348_1_En_10_Chapter.html#Par31) in
    SQLite, you would not get an error. This is because of the bare column feature
    in SQLite that allows a column to be present without aggregation in the `SELECT`
    clause and still be absent from the `GROUP BY` clause.


    This is quite different from most DBMS systems out there, and I would suggest
    that you stay away from using this feature seriously because of the undefined
    behavior involved. However, it is good to read up on the details present at the
    SQLite website.


    [`https://www.sqlite.org/lang_select.html`](https://www.sqlite.org/lang_select.html)


    ## Grouping and Aggregate Functions


    Another useful way to use grouping is to combine the operation with an aggregate
    function. Suppose we wish to count how many standards a particular organization
    has in our table. This can be achieved by combining the `GROUP BY` clause with
    the `COUNT` aggregate function as given below (Listing [10-13](#A457348_1_En_10_Chapter.html#Par41)).


    | standard | count |

    | --- | --- |

    | <null> | 2 |

    | ECMA | 1 |

    | ANSI | 2 |

    | ISO | 2 |

    | US-DOD | 1 |


    ```

    SELECT standard,

    COUNT(*)

    FROM proglang_tbl

    GROUP BY standard;

    Listing 10-13

    Using GROUP BY with aggregate functions

    ```


    The output is intuitive enough to warrant no further explanation, but the query
    itself is interesting. Notice that the `GROUP BY` clause consisted of only the
    standard . The aggregate function is a result of the bunching of the grouped columns.


    Grouping truly makes sense in SQL when used judiciously with aggregate functions.
    A lot of utility and intelligence from databases are derived from analysts using
    a combination of these applied on a well-designed model. Let’s see another example
    of combining `GROUP BY` with multiple aggregate functions this time.


    Suppose we wish to find out how many languages were made in the same year, and
    of those languages which come first alphabetically (Listing [10-14](#A457348_1_En_10_Chapter.html#Par45)).
    We can immediately see that a `GROUP BY` on year is needed here along with a couple
    of different aggregate functions.


    | year | min | count |

    | --- | --- | --- |

    | 1972 | Prolog | 1 |

    | 1957 | Fortan | 1 |

    | 1988 | Tcl | 1 |

    | 1987 | Perl | 1 |

    | 1964 | APL | 2 |

    | 1959 | APT | 2 |


    ```

    SELECT year,

    MIN(language),

    COUNT(*)

    FROM proglang_tbl

    GROUP BY year;

    Listing 10-14

    Using GROUP BY with multiple aggregate functions

    ```


    ## The HAVING Clause


    Like a `WHERE` clause places conditions on the fields of a query, the `HAVING`
    clause places conditions on the groups created by `GROUP BY`. It must be placed
    immediately after the `GROUP BY` but before the `ORDER BY` clause (Listing [10-15](#A457348_1_En_10_Chapter.html#Par47)).


    | language | standard | year |

    | --- | --- | --- |

    | APT | ISO | 1959 |

    | JOVIAL | US-DOD | 1959 |

    | APL | ANSI | 1964 |

    | Fortran | ANSI | 1957 |

    | PL/I | ECMA | 1964 |

    | Prolog | ISO | 1972 |


    ```

    SELECT language,

    standard,

    year

    FROM proglang_tbl

    GROUP BY standard,

    year,

    language

    HAVING year < 1980;

    Listing 10-15

    Demonstration of the HAVING clause

    ```


    From the output we can clearly see that the records for Perl and Tcl are left
    out since they do not satisfy the `HAVING` conditional of being created before
    1980.


    You might wonder why we need two different filtering clauses – `WHERE` and `HAVING`.
    A `WHERE` clause does not allow aggregate functions in its conditionals, a prime
    target for the `HAVING` clause. For example, suppose we wish to check which standard
    values exist more than once in our table. Our first stab at this using the `GROUP
    BY` clause might look something like this (Listing [10-16](#A457348_1_En_10_Chapter.html#Par50)).


    ```

    SELECT standard

    FROM proglang_tbl

    WHERE COUNT(standard) > 1

    GROUP BY standard;

    ERROR:  aggregate functions are not allowed in WHERE

    Listing 10-16

    Trying aggregate functions in WHERE

    ```


    Just like we thought, our SQL interpreter did not allow such a travesty. Instead
    we’ll use the same conditional in the `HAVING` clause (Listing [10-17](#A457348_1_En_10_Chapter.html#Par52)).


    | standard |

    | --- |

    | ANSI |

    | ISO |


    ```

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(standard) > 1;

    Listing 10-17

    HAVING clause with aggregate functions

    ```


    It correctly gave us the names of the two standard values with more than one occurrence.
    Interestingly, if we tweak the conditional to `COUNT(*)`, we get an additional
    row (Listing [10-18](#A457348_1_En_10_Chapter.html#Par54)).


    | standard |

    | --- |

    | (null) |

    | ANSI |

    | ISO |


    ```

    SELECT standard

    FROM proglang_tbl

    GROUP BY standard

    HAVING COUNT(*) > 1;

    Listing 10-18

    Changing the aggregate function behavior

    ```


    The filtering clause is now not restricted to non-null values of the standard
    column. Since there are multiple records with null values in the field, it will
    also be included in the result.'
