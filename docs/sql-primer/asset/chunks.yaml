    \ and you open it when opening the SQLite shell, there is no switching of database\
    \ required (Listing [2-8](#A457348_1_En_2_Chapter.html#Par58)).\n\n```\n[~]$ sqlite3\
    \ testdb\nSQLite version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage\
