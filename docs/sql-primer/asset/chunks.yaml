    ## 编写你的第一个查询


    现在，让我们将注意力转向编写一个简单的查询，以验证我们之前操作的结果——我们创建了一个表并向其中插入了三行数据。为此，我们将使用一种名为 `SELECT`
    的数据查询语言（DQL）命令。


    查询就是一个 SQL 语句，它允许你检索数据库中包含的有用数据子集。你可能已经注意到，`INSERT` 和 `CREATE TABLE` 命令被称为语句，但使用
    `SELECT` 进行的获取操作属于查询范畴。


    在 SQL 环境中，你日常的大部分操作将涉及查询，因为数据库结构只需创建一次（仅在需要时修改），并且只有在新数据可用时才插入行。虽然一个典型的 `SELECT`
    查询相当复杂，包含许多子句，但我们的旅程将从编写一个仅用于验证表内容的查询开始。一个简单查询的通用语法如下所示（见清单 2-11）。


    ```sql

    SELECT  FROM ;

    ```

    *清单 2-11*

    *简单 SQL 查询的通用语法*


    将其转化为我们的结果验证查询是一项简单的任务（见清单 2-12）。我们已经知道想要查询的表是 `proglang_tbl`，对于我们的选择，我们将使用 `*
    (星号)`，它将选择表中的所有行和字段。


    ```sql

    SELECT * FROM proglang_tbl;

    ```


    此查询的输出将是我们预期的矩阵格式的所有 (3) 行数据。如果你通过 `psql` 运行此命令，将会得到类似下面的输出。


    ```sql

    testdb=# select * from proglang_tbl;

    id | language |  author  | year

    ----+----------+----------+------

    1 | Fortran  | Backus   | 1955

    2 | Lisp     | McCarthy | 1958

    3 | Cobol    | Hopper   | 1959

    (3 rows)

    testdb=#

    ```

    *清单 2-12*

    *在 psql 中验证表的内容*


    SQLite 的输出一开始可能稍显杂乱，但让我们一步一步来优化它（见清单 2-13）。


    ```sql

    sqlite> select * from proglang_tbl;

    1|Fortran|Backus|1955

    2|Lisp|McCarthy|1958

    3|Cobol|Hopper|1959

    sqlite>

    ```

    *清单 2-13*

    *在 sqlite3 中验证表的内容*


    显然这不是最整洁的输出，但设置几个选项就能解决这个问题。第一个选项叫做：


    ```

    .mode column

    ```


    这将输出一个间距整齐的结果集，而不是我们之前看到的挤压在一起的样子（见清单 2-14）。


    ```sql

    sqlite> .mode column

    sqlite> select * from proglang_tbl;

    1           Fortran     Backus      1955

    2           Lisp        McCarthy    1958

    3           Cobol       Hopper      1959

    ```

    *清单 2-14*

    *开启列模式*


    啊，好多了！但这里还有改进的空间。我们看到输出中仍然缺少列标题，而拥有标题会很有帮助。于是我们开启 headers 选项，结果开始看起来相当整洁了（见清单
    2-15）。


    ```sql

    sqlite> .headers on

    sqlite> select * from proglang_tbl;

    id          language    author      year

    ----------  ----------  ----------  ----------

    1           Fortran     Backus      1955

    2           Lisp        McCarthy    1958

    3           Cobol       Hopper      1959

    ```

    *清单 2-15*

    *在 sqlite3 中开启标题显示*


    我建议你在学习过程中保持这些选项开启。这样输出结果会变得更容易一眼看清。


    ## 约束条件的好处


    关系型数据库作为数据存储和组织机制，其主导地位已经进入了第四个十年。其成功在很大程度上归功于数据模型的灵活性。很容易想象各种数据都能整齐地放入带有预定义列的表格结构中。


    这种灵活性也延伸到了查询方面——在创建和填充表时，对于你能从表中查询什么几乎没有限制。你可能会尝试从一个你以前没有想到的角度，从表中产生全新的见解。为了实现这一切，关系型数据库期望你在设计表时，预先投入一定量的规范和思考。整洁、定义良好的数据类型表是成功的关键，而某些规则有助于你遵循这条良好数据库设计的道路。


    约束是你在进行 SQL 操作时应用或遵守的规则。当你希望使数据库中的数据更有意义和/或更有结构时，它们非常有用。


    ### 空值约束


    考虑编程语言表的例子——每一个被创造出来的编程语言都必须有作者（无论是个人、两人还是委员会）。同样，它应该有一个被引入的年份，无论是它首次作为研究论文出现的年份，还是为其编写了可用编译器的年份。在这种情况下，以某种方式创建你的表，使得某些字段不接受
    `NULL`（空）值，是有意义的。


    空值并不意味着 `0`（零）或像 `''''` 这样的空字符串。可以将其理解为“空”或“未定义”。如果你在填充表时没有捕获某人的年龄，你不能假设他们的年龄是
    `0`。如果有人使用这些数据进行统计分析，这可能会产生严重的后果。在那里放置一个空值则合理得多。


    现在我们修改之前的 `CREATE TABLE` 语句，以便可以对某些字段应用 `NULL` 约束（见清单 3-1）。


    ```sql

    CREATE TABLE proglang_tblcopy (

    id        INTEGER     NOT NULL,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    *清单 3-1*

    *创建带有空值约束的表*


    在这个表中，我们只允许 `standard` 字段有空值。其他每个字段都以 `NOT NULL` 选项结尾，这指定了该字段必须有一个值。在大多数数据库管理系统中，所有字段默认都是可为空的，因此你必须指定一个不可为空的字段。写
    `NULL` 字词来指定一个可为空的字段是可选的。


    如果我们尝试向这个表中插入一行数据，并在某个不可为空的字段（如 `year`）中使用 `NULL` 值，我们预期会收到一条错误信息。在 SQLite 和 PostgreSQL
    中，我们都使用字面量 `null` 来表示空值，注意这里没有通常包围字符串的引号（见清单 3-2 和 3-3）。`Null` 不是一个字符串值，写 `''null''`
    会产生一个实际长度为 4 的字符串，这显然不是空值。其他数据库管理系统可能以不同的方式表示空值，因此请查阅你的手册了解详细信息。


    ```sql

    sqlite> INSERT INTO proglang_tblcopy

    VALUES (1, ''Fortran'', ''Backus'', null, ''ANSI'');

    Error: NOT NULL constraint failed: proglang_tblcopy.year

    ```

    *清单 3-2*

    *在 SQLite 中插入空值*


    ```sql

    testdb=# INSERT INTO proglang_tblcopy

    VALUES (1, ''Fortran'', ''Backus'', null, ''ANSI'');

    ERROR:  null value in column "year" violates not-null constraint

    DETAIL:  Failing row contains (1, Fortran, Backus, null, ANSI).

    ```

    *清单 3-3*

    *在 PostgreSQL 中插入空值*


    我们看到，在这种情况下，我们实现了目标：创建了一个表，其中 `id`、`language`、`author` 和 `year` 字段对于任何行都不能为空，但新字段
    `standard` 可以取空值。现在，我们尝试使用另一种 `INSERT` 语法向此表中插入新行。

