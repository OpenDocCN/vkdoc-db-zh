    To Mum and Dad.


    ## Introduction


    I wrote the predecessor text to this book in late 2012 and put it on the Internet
    hoping someone would find it useful. There was enough response that I continued
    writing and we have this book as a result. There have been lots of changes and
    additions over time, but the core aim remains the same – a brief introduction
    to `SQL` assuming no prior experience in it.


    After reading this text, the reader should be able to recognize the parts of queries
    they encounter and even be able to write simple `SQL` statements and queries themselves.
    The book, however, is not intended as a reference work or for a full-time database
    administrator since it does not have exhaustive topic coverage.


    The book is written in a linear fashion – you start from Chapter 1 and work your
    way forward. Being example heavy, I hope readers are able to jump to certain topics
    and get a quick recap. The examples are worked out in `PostgreSQL` and `SQLite`,
    but the goal is to remain `DBMS` implementation agnostic as far as possible.


    I encourage you to tinker with the statements and queries as you progress through
    the book. Also, be sure to check out the appendices for book recommendations to
    help you dig deeper in the world of `SQL` and databases.


    Your questions, comments, criticism, encouragement, and corrections are most welcome
    and you can e-mail me at `rhlbatra@hotmail.com`.


    ## Acknowledgments


    I got into computing early, when I was around 12 years old. In those days, buying
    a personal computer was an expensive affair. Especially in a developing country
    like India where the computer revolution was slow to reach the household level.
    I owe a debt of gratitude to my parents and my sister for providing me with a
    `PC`. Without it, I certainly would not have had as much passion for the field
    as I do now. Thank you for your unwavering belief in me.


    My wife not only acted as an editor for the early drafts of this text but also
    took the lion’s share of taking care of our child while I was writing the book.
    Thank you for your patience and encouragement.


    Completing a book is rarely an individual effort. I thank the team at `Apress`
    for working with me to bring this to fruition. Thank you, Jonathan and Jill for
    taking a chance on me and keeping me focused. Thank you, Stefan and Laura for
    combing through the text and improving the finished product immensely.


    Finally, thanks are in order to my early readers who suggested improvements and
    caught errors – Keith Thompson, Nathan Adams, Paul Guilbault, Jim Noh, and Sean
    Farrell.'
