    \ statements as below (Listing [2-10](#A457348_1_En_2_Chapter.html#Par65)).\n\n\
    ```\nINSERT INTO proglang_tbl\nVALUES (1, 'Fortran', 'Backus', 1955);\nINSERT\
    \ INTO proglang_tbl\nVALUES (2, 'Lisp', 'McCarthy', 1958);\nINSERT INTO proglang_tbl\n\
    VALUES (3, 'Cobol', 'Hopper', 1959);\nListing 2-10\nInserting data into the proglang_tbl\
