  trans: '

    ## 推荐的 SQL 书籍


    1.  *实用 SQL 手册：使用 SQL 变体*（第 4 版，Addison-Wesley Professional，2001）作者：Judith S Bowman,
    Sandra L Emerson, Marcy Darnovsky：这也许是我读过的最好的 `SQL` 书籍，**无出其右**。行文清晰，篇幅适中，且专注于
    `SQL` 在现实世界中的应用，而非过多晦涩的理论。唯一的不足是自 2001 年以来再未更新；但鉴于 `SQL` 的基础知识变化甚少，结合数据库手册一起使用，足以让你游刃有余。

    2.  *SQL 入门：掌握关系数据库语言*（第 4 版，Addison-Wesley Professional，2006）作者：Rick F van der
    Lans：这是 `SQL` 参考书的**黄金标准**。这本厚重巨著涵盖了所有你想了解的 `SQL` 知识。行文有时略显枯燥，章节编排可能也不完全适合初学者，但我认为他们本就不是目标读者。如果你经常遇到网络论坛无法解决的问题，我推荐你手边常备此书。

    3.  *SQL 查询必知必会：SQL 数据操作实战指南*（第 3 版，Addison-Wesley Professional，2014）作者：John L
    Viescas 和 Michael J Hernandez：如果你觉得当前文本节奏太快，这是一份详尽而细致的 `SQL` 教程。作者们一步步详细讲解了如何将用自然语言表述的需求转化为
    `SQL` 查询。书中示例丰富，专为完全的初学者设计。这是一本广受欢迎且备受推崇的书，当之无愧。

    4.  *SQL 可视化介绍*（第 2 版，Wiley，2001）作者：David Chappell 和 J Harvey Trimble Jr.：又是一本经典之作，虽然也有一段时间没有更新，但在今天同样实用。作为
    `SQL` 的可视化教程入门读物，它直击要点，在大约 250 页内涵盖了一系列主题。很适合从图书馆借来，花上一个月时间通读。

    5.  *数据库管理与设计*（第 2 版，Prentice Hall，1995）作者：Gary W Hansen 和 James V Hansen：数据库理论书籍世界中的**隐藏瑰宝**。如果你想了解数据库和
    `SQL` 的理论基础，如果还能找到的话，这是值得一读的文本。它比那些更流行的同类书籍更清晰、更简明。遗憾的是，这个千禧年之后再无新版，但它依然在我的推荐列表中。不过，你需要能接受书中用于示例的过时软件。

    6.  *SQL Cookbook：数据库开发人员的查询方案与技巧*（第 1 版，O’Reilly Media，2005）作者：Anthony Molinaro：一份出色的现实世界
    `SQL` 查询示例合集。本书试图涵盖所有主流 `DBMS` 软件包，并对语句本身给出了精彩的解释。如果你是职场人士，并且经常需要编写那些不那么显而易见的查询，这将是一本极好的参考伴侣书。

    7.  *SQL 的艺术*（第 1 版，O’Reilly Media，2006）作者：Stephane Faroult 和 Peter Robson：一种高级但有趣的视角，来看待
    `SQL` 和关系数据库。效仿《孙子兵法》，这本书凝聚了关于应如何正确使用基于 `SQL` 的数据库的智慧。本书直接切入数据库设计、性能优化等主题的核心细节，因此假定读者已对
    `SQL` 基础有深入了解。

    8.  *SQL 反模式：避免数据库编程的陷阱*（第 1 版，Pragmatic Bookshelf，2010）作者：Bill Karwin：这是一门关于使用
    `SQL` 时**不应做什么**的速成课程。在你积累了一些经验后，你会更加欣赏它，这是一本无论何时有空都值得浏览的好书。书不厚，大约 300 页，充满了关于如何避免糟糕的数据库设计和使用的实用建议。


    # 数据库管理系统与工具


    自 20 世纪 80 年代以来，关系数据库管理系统一直有相当多的选择。但自世纪之交以来，开源世界也有了充足的选择。事实上，一些最强大的 `RDBMS` 工具就是开源的。


    以下是我推荐的一些优秀的 `RDBMS` 系统和工具列表。它偏向于免费和开源软件。由于这是单个人的观点列表，难免会遗漏一些好资源。尽管如此，我希望这能作为一个良好的起点。


    ## 关系数据库管理系统


    1.  `PostgreSQL` [`https://www.postgresql.org/`](https://www.postgresql.org/)
    目前最优秀、功能最丰富开源数据库。当你需要为多个程序和用户选择一个 `RDBMS` 时，它应该是你的默认选择。其成熟度和安全性无出其右，且改进稳步进行。但对我来说，它最好的特性是它的文档。随附的用户手册既是出色的
    `SQL` 参考，又简洁明了。

    2.  `SQLite` [`https://sqlite.org/`](https://sqlite.org/) 一个轻量级、单文件、可嵌入的数据库。极其流行，各处都能获得大量帮助和文档。当你构建单用户系统或并发用户数较少时，它应该是你的
    `RDBMS` 选择。其实际能力常被低估，它可以轻松处理大约 15–16GB 大小的数据库。

    3.  `Firebird` [`http://firebirdsql.org/`](http://firebirdsql.org/) 开源 `DBMS`
    世界中的隐藏瑰宝。虽然不如一些同行知名，但 `Firebird` 仍然是一个稳定、功能丰富且符合标准的 `RDBMS`。它从嵌入式小型数据库系统到大型企业级系统都扩展性良好。它始于
    2000 年从 Borland 的 `Interbase` 分支而来，但现在这两个产品已经差异很大。

    4.  `MariaDB` [`https://mariadb.org/`](https://mariadb.org/) `MySQL` 的社区开发分支，现在被视为寻找类似
    `MySQL` 产品的默认选择。`MySQL` 周围有一个良好的生态系统，`MariaDB` 自动继承了这些，并且新功能正在定期添加。

    5.  `HyperSQL` [`http://hsqldb.org/`](http://hsqldb.org/) 也称为 `HSQLDB`，这是一个流行、成熟的基于
    `Java` 的关系数据库引擎。它既可以作为嵌入式数据库，也可以作为客户端/服务器模式的 `DBMS`。非常适合与 `JVM` 语言一起使用。可以把它看作
    `Java` 世界中的 `SQLite` 替代品，而且和 `SQLite` 一样，它的功能可能远超你的预期。

    6.  `H2` [`http://www.h2database.com`](http://www.h2database.com) 另一个小型、功能丰富的基于
    `Java` 的数据库引擎，可用于嵌入式和客户端/服务器模式。它的设计目标与 `HSQLDB` 类似，但做出了不同的权衡取舍。无论如何，你都能免费获得一个优秀、小型、开源的数据库引擎。

    '
- fmt: '# SQL Development Environments


    Exploratory analysis of data stored inside relational databases has really picked
    up since the advent of the business intelligence and analytics fields. Consequently
    there is a new class of tools that allow you to interactively query your database
    and see the results in a nicely formatted manner.


    Just like with RDBMS systems, you are spoiled for choice here. There are many
    free-to-use, open source SQL tools available. Some of them give even more features
    in their paid offerings, but for beginners the free versions go a long way.


    1.  DBeaver [`https://dbeaver.jkiss.org/`](https://dbeaver.jkiss.org/) My favorite
    SQL development environment. It is so full featured that I was surprised to know
    that it started out as a hobby project. Connects to many database systems and
    provides a plethora of features. However, all of this comes at a cost of speed
    and resources. Let’s just say that if you have an old system, look elsewhere first.

    2.  DB Browser for SQLite [`http://sqlitebrowser.org/`](http://sqlitebrowser.org/)
    If you are working with SQLite, this is a top-notch data browser for it. It allows
    you to write queries and spits out a neatly formatted table too, but for most
    primitive operations like filtering on a column you don’t need to write a query
    at all. Its browsing capabilities turn the tables into a spreadsheet-like abstraction
    allowing filtering of values.


    # A History of SQL and Relational Databases


    Computers began their life as advanced calculating machines in the late 1940s
    and 1950s. But soon, businesses realized their importance in automated processing
    and recordkeeping. By the 1960s, computers increasingly used file-oriented systems
    to store data.


    A typical workflow would consist of all related data stored as a single file and
    then an application program would operate on this file exclusively to provide
    an output. This operation would typically be done over night and there were multiple
    data files and multiple application programs working on them to support different
    data processing tasks.


    ## The Rise of Sophisticated File-Oriented Systems


    The very early computers used tape storage to store data. This meant that data
    access was restricted to sequential scanning of the records. You read the first
    record, then the next, and so on with no way to jump or go back without starting
    the read process from the very beginning. For application programs to process
    data stored in this fashion split in multiple files, they had to ensure that the
    data files were sorted by a specific field before the actual processing began.
    Doing this would enable a flow where the record read from one file would be in
    tandem with the records read from other files, and the complete information related
    to the record could be processed in one go.


    With advancements in storage technology and the invention of magnetic disks and
    tapes, sophisticated data access methods also came around. Instead of simple sequential
    access, the Indexed Sequential Access Method (`ISAM`) became prominent in the
    1960s. IBM developed `ISAM` and its successor Virtual Storage Access Method (`VSAM`)
    as file-oriented technologies allowing key-based direct access for its mainframe
    systems.


    These systems were to be used with programming languages like COBOL and PL/I.
    Because of their integrated nature, they became popular in the enterprise environment
    and remained so for quite some time. However, a need for something more structured
    was already being felt.


    ## The Entry of Database Systems


    While the random access techniques did increase throughput, they never addressed
    another kind of problem that cropped up when organizations started moving multiple
    processes to automated data processing systems.


    Data was split in multiple, independent files with no centralized logical structure
    in place. Redundant columns increased storage costs and the very real possibility
    of data inconsistency between various files. An even worse problem was data control
    with homonyms becoming inevitable. A homonym is created when the same field name
    is used for very different things in multiple files making a sensible understanding
    of the system an arduous task.


    Logical data models and database systems arose to address some of the shortcomings
    of the file-oriented systems. They acted as integrated, centralized data structures
    that curbed the redundancy problem to a degree. An important concept that came
    around with database management systems was a Data Dictionary that provided meaning
    to the fields stored in the database. Suddenly everyone had access to a controlled,
    meaningful set of records thanks to a well-regulated data dictionary.


    IBM released the Information Management System (`IMS`) in 1966 for use in the
    legendary NASA Apollo program. It was a hierarchical database that assumed all
    the data relationships can be structured as hierarchies. While the underlying
    data storage was still files tied together by pointers, `IMS` was a leap in data
    modeling where proper thought had to be given on how to best structure your data
    as a hierarchy.


    Another kind of data model that picked up steam during the late 1960s was the
    network data model. It allowed you to represent data not just in a strict hierarchy
    but a complex network with entities referring to each other. This allowed for
    a more natural way of modeling data that was being generated in business processes.
    One of the earliest successful implementations of this model was the Integrated
    Data Store (`IDS`), which started in 1964. It had such an impact on the industry
    that its design largely influenced the network model standard – the `CODASYL DBTG`
    standard.


    ## Genesis of the Relational Model


    While successful, the hierarchical and network models suffered from one inherent
    flaw in their design. Their modeling was driven from the viewpoint of a programmer
    with intricate knowledge of how they would interconnect multiple entities. Once
    the design was done, queries could be run as envisioned by the programmers with
    little chance for any further flexibility.


    However Dr. Codd’s relational theory proposed in 1970 insisted on not having rigid
    predetermined relationships through physical pointers. He believed that natural,
    logical relationships would manifest themselves by understanding the domain of
    the data and that the system should be ready for flexible querying. He built his
    model on sound mathematical theory rather than the intricacies of programming,
    which wasn’t the case with what had come before.


    The birthplace of relational databases was the IBM Research Labs at San Jose where
    Codd worked in the ‘70s and ‘80s. IBM came up with the `SystemR` project as a
    sort of a prototype relational database management system but failed to move fast
    enough in recognizing the gold they had struck. A company by the name of Relational
    Software Inc. created the first widely available industrial RDBMS in 1979 by borrowing
    IBM’s research on `SystemR`. Relational Software Inc. went on to rename itself
    Oracle Corporation.


    In the ‘70s, another project was drawing inspiration from `SystemR` but in an
    academic setting. Michael Stonebraker and Eugene Wong from the University of California,
    Berkeley, started their own research RDBMS called `Ingres`. It would prove to
    be Oracle’s biggest competitor in the 1980s. While not as prevalent today as it
    once was, the `Ingres` project was tremendously impactful on the database industry
    as a whole. A lot of programmers who worked on it or read its easily available
    source code in the early years went on to subsequently contribute to other database
    systems.'
  raw: '## SQL Development Environments


    Exploratory analysis of data stored inside relational databases has really picked
    up since the advent of the business intelligence and analytics fields. Consequently
    there is a new class of tools that allow you to interactively query your database
    and see the results in a nicely formatted manner.


    Just like with RDBMS systems, you are spoiled for choice here. There are many
    free-to-use, open source SQL tools available. Some of them give even more features
    in their paid offerings, but for beginners the free versions go a long way.


    1.  DBeaver [`https://dbeaver.jkiss.org/`](https://dbeaver.jkiss.org/) My favorite
    SQL development environment. It is so full featured that I was surprised to know
    that it started out as a hobby project. Connects to many database systems and
    provides a plethora of features. However, all of this comes at a cost of speed
    and resources. Let’s just say that if you have an old system, look elsewhere first.
     

    2.  DB Browser for SQLite [`http://sqlitebrowser.org/`](http://sqlitebrowser.org/)
    If you are working with SQLite, this is a top-notch data browser for it. It allows
    you to write queries and spits out a neatly formatted table too, but for most
    primitive operations like filtering on a column you don’t need to write a query
    at all. Its browsing capabilities turn the tables into a spreadsheet-like abstraction
    allowing filtering of values.


    # A History of SQL and Relational Databases


    Computers began their life as advanced calculating machines in the late 1940s
    and 1950s. But soon, businesses realized their importance in automated processing
    and recordkeeping. By the 1960s, computers increasingly used file-oriented systems
    to store data.


    A typical workflow would consist of all related data stored as a single file and
    then an application program would operate on this file exclusively to provide
    an output. This operation would typically be done over night and there were multiple
    data files and multiple application programs working on them to support different
    data processing tasks.


    ## The Rise of Sophisticated File-Oriented Systems


    The very early computers used tape storage to store data. This meant that data
    access was restricted to sequential scanning of the records. You read the first
    record, then the next, and so on with no way to jump or go back without starting
    the read process from the very beginning. For application programs to process
    data stored in this fashion split in multiple files, they had to ensure that the
    data files were sorted by a specific field before the actual processing began.
    Doing this would enable a flow where the record read from one file would be in
    tandem with the records read from other files, and the complete information related
    to the record could be processed in one go.


    With advancements in storage technology and the invention of magnetic disks and
    tapes, sophisticated data access methods also came around. Instead of simple sequential
    access, the Indexed Sequential Access Method (ISAM) became prominent in the 1960s.
    IBM developed ISAM and its successor Virtual Storage Access Method (VSAM) as file-oriented
    technologies allowing key-based direct access for its mainframe systems.


    These systems were to be used with programming languages like COBOL and PL/I.
    Because of their integrated nature, they became popular in the enterprise environment
    and remained so for quite some time. However, a need for something more structured
    was already being felt.


    ## The Entry of Database Systems


    While the random access techniques did increase throughput, they never addressed
    another kind of problem that cropped up when organizations started moving multiple
    processes to automated data processing systems.


    Data was split in multiple, independent files with no centralized logical structure
    in place. Redundant columns increased storage costs and the very real possibility
    of data inconsistency between various files. An even worse problem was data control
    with homonyms becoming inevitable. A homonym is created when the same field name
    is used for very different things in multiple files making a sensible understanding
    of the system an arduous task.


    Logical data models and database systems arose to address some of the shortcomings
    of the file-oriented systems. They acted as integrated, centralized data structures
    that curbed the redundancy problem to a degree. An important concept that came
    around with database management systems was a Data Dictionary that provided meaning
    to the fields stored in the database. Suddenly everyone had access to a controlled,
    meaningful set of records thanks to a well-regulated data dictionary.


    IBM released the Information Management System (IMS) in 1966 for use in the legendary
    NASA Apollo program. It was a hierarchical database that assumed all the data
    relationships can be structured as hierarchies. While the underlying data storage
    was still files tied together by pointers, IMS was a leap in data modeling where
    proper thought had to be given on how to best structure your data as a hierarchy.


    Another kind of data model that picked up steam during the late 1960s was the
    network data model . It allowed you to represent data not just in a strict hierarchy
    but a complex network with entities referring to each other. This allowed for
    a more natural way of modeling data that was being generated in business processes.
    One of the earliest successful implementations of this model was the Integrated
    Data Store (IDS) , which started in 1964\. It had such an impact on the industry
    that its design largely influenced the network model standard – the CODASYL DBTG
    standard.


    ## Genesis of the Relational Model


    While successful, the hierarchical and network models suffered from one inherent
    flaw in their design. Their modeling was driven from the viewpoint of a programmer
    with intricate knowledge of how they would interconnect multiple entities. Once
    the design was done, queries could be run as envisioned by the programmers with
    little chance for any further flexibility.


    However Dr. Codd’s relational theory proposed in 1970 insisted on not having rigid
    predetermined relationships through physical pointers. He believed that natural,
    logical relationships would manifest themselves by understanding the domain of
    the data and that the system should be ready for flexible querying. He built his
    model on sound mathematical theory rather than the intricacies of programming,
    which wasn’t the case with what had come before.


    The birthplace of relational databases was the IBM Research Labs at San Jose where
    Codd worked in the ‘70s and ‘80s. IBM came up with the SystemR project as a sort
    of a prototype relational database management system but failed to move fast enough
    in recognizing the gold they had struck. A company by the name of Relational Software
    Inc. created the first widely available industrial RDBMS in 1979 by borrowing
    IBM’s research on SystemR. Relational Software Inc. went on to rename itself Oracle
    Corporation.


    In the ‘70s, another project was drawing inspiration from SystemR but in an academic
    setting. Michael Stonebraker and Eugene Wong from the University of California,
    Berkeley, started their own research RDBMS called Ingres . It would prove to be
    Oracle’s biggest competitor in the 1980s. While not as prevalent today as it once
    was, the Ingres project was tremendously impactful on the database industry as
    a whole. A lot of programmers who worked on it or read its easily available source
    code in the early years went on to subsequently contribute to other database systems.'
  trans: '

    # SQL 开发环境


    自从商业智能和数据分析领域兴起以来，对关系型数据库内存储数据进行探索性分析的需求急剧增长。因此，出现了一类新的工具，允许你以交互方式查询数据库，并以格式美观的方式查看结果。


    就像关系数据库管理系统一样，这里的工具选择也令人眼花缭乱。有许多免费、开源的 SQL 工具可供使用。其中一些工具的付费版本提供了更多功能，但对于初学者来说，免费版本已经足够使用。


    1.  DBeaver [`https://dbeaver.jkiss.org/`](https://dbeaver.jkiss.org/) 我最喜欢的 SQL
    开发环境。它的功能如此丰富，以至于我惊讶地发现它最初只是一个业余项目。它可以连接到许多数据库系统，并提供了大量的功能。然而，所有这些优势是以速度和资源消耗为代价的。这么说吧，如果你的系统配置较旧，请先看看其他选择。

    2.  DB Browser for SQLite [`http://sqlitebrowser.org/`](http://sqlitebrowser.org/)
    如果你使用的是 SQLite，那么这是一个顶级的数据浏览器。它允许你编写查询，同样也能输出格式整齐的表格，但对于大多数基本操作，比如对某一列进行筛选，你根本不需要编写查询。它的浏览功能将表格转换成类似电子表格的抽象界面，允许对数值进行筛选。


    # SQL 与关系数据库的历史


    计算机在 20 世纪 40 年代末和 50 年代诞生之初是作为高级计算机器。但很快，企业就意识到了它们在自动化处理和记录保存方面的重要性。到了 20 世纪
    60 年代，计算机越来越多地使用面向文件的系统来存储数据。


    一个典型的工作流程是：所有相关数据存储为一个文件，然后一个应用程序专门操作这个文件以提供输出。这种操作通常在夜间完成，并且存在多个数据文件以及多个处理这些文件的应用程序，以支持不同的数据处理任务。


    ## 复杂面向文件系统的兴起


    早期的计算机使用磁带存储数据。这意味着数据访问仅限于对记录进行顺序扫描。你读取第一条记录，然后是下一条，以此类推，无法跳转或返回，除非从头开始读取过程。对于处理存储在多个文件中、以此种方式拆分的数据的应用程序，它们必须确保在实际处理开始之前，数据文件已按特定字段排序。这样做可以使从一个文件读取的记录与从其他文件读取的记录保持同步，从而能够一次性处理与该记录相关的所有完整信息。


    随着存储技术的进步以及磁盘和磁带的发明，复杂的数据访问方法也随之出现。除了简单的顺序访问，索引顺序访问方法 (`ISAM`) 在 20 世纪 60 年代变得突出。IBM
    开发了`ISAM`及其后继者虚拟存储访问方法 (`VSAM`)，作为面向文件的技术，为其大型机系统提供基于键的直接访问。


    这些系统与 COBOL 和 PL/I 等编程语言一起使用。由于其集成的特性，它们在企业环境中变得流行并持续了相当长一段时间。然而，人们已经感觉到对更结构化方案的需求。


    ## 数据库系统的登场


    虽然随机访问技术确实提高了吞吐量，但它们从未解决当组织开始将多个流程转移到自动化数据处理系统时出现的另一类问题。


    数据被分散在多个独立的文件中，没有集中化的逻辑结构。冗余的列增加了存储成本，并导致不同文件之间数据不一致的现实可能性。一个更严重的问题是数据控制，同形异义词变得不可避免。当同一个字段名在多个文件中用于截然不同的事物时，就产生了同形异义词，这使得对系统进行合理的理解成为一项艰巨的任务。


    逻辑数据模型和数据库系统应运而生，旨在解决面向文件系统的部分缺陷。它们充当了集成、集中化的数据结构，在一定程度上遏制了冗余问题。伴随数据库管理系统出现的一个重要概念是数据字典，它为存储在数据库中的字段提供了含义。多亏了一个管理良好的数据字典，每个人突然都能访问受控的、有意义的记录集。


    IBM 于 1966 年发布了信息管理系统 (`IMS`)，用于传奇的美国宇航局阿波罗计划。它是一种层次数据库，假设所有数据关系都可以组织成层次结构。虽然底层数据存储仍然是通过指针连接的文件，但`IMS`是数据建模上的一次飞跃，需要认真思考如何最好地将数据构建为层次结构。


    20 世纪 60 年代末期兴起的另一种数据模型是网络数据模型。它允许你不仅以严格的层次结构表示数据，还可以表示实体相互引用的复杂网络。这为对业务流程中产生的数据进行建模提供了一种更自然的方式。这种模型最早的成功实现之一是集成数据存储
    (`IDS`)，始于 1964 年。它对行业产生了巨大影响，其设计在很大程度上影响了网络模型标准——`CODASYL DBTG`标准。


    ## 关系模型的起源


    尽管取得了成功，但层次和网络模型在设计上存在一个固有缺陷。它们的建模是从程序员的视角出发的，程序员需要深入了解如何将多个实体相互连接。一旦设计完成，查询只能按照程序员的设想运行，几乎没有进一步灵活性的空间。


    然而，科德博士在 1970 年提出的关系理论坚持不使用物理指针建立僵化的预定关系。他相信，通过理解数据领域，自然、逻辑的关系会显现出来，系统应该为灵活的查询做好准备。他的模型建立在健全的数学理论之上，而不是之前方案所依赖的复杂编程技巧之上。


    关系数据库的诞生地是 IBM 在圣何塞的研究实验室，科德在 20 世纪 70 年代和 80 年代在此工作。IBM 提出了`SystemR`项目，作为关系数据库管理系统的原型，但在认识到其巨大价值后未能迅速推进。一家名为
    Relational Software Inc.的公司在 1979 年借鉴 IBM 在`SystemR`上的研究，创建了第一个广泛应用的工业级关系数据库管理系统。Relational
    Software Inc.后来更名为甲骨文公司。


    在 20 世纪 70 年代，另一个项目在学术环境中从`SystemR`汲取灵感。加州大学伯克利分校的迈克尔·斯通布雷克和尤金·张启动了自己的关系数据库管理系统研究项目，名为`Ingres`。它在
    20 世纪 80 年代被证明是甲骨文最大的竞争对手。虽然`Ingres`如今不如当年普及，但该项目对整个数据库行业产生了极其深远的影响。许多早期参与该项目或阅读其易获取源代码的程序员，后来都为其他数据库系统做出了贡献。

    '
- fmt: '## The Hard Fought Battle of Query Languages


    SQL wasn’t the dominant query language of the early years of relational databases.
    In fact, Codd had proposed two early languages for data manipulation and querying
    – `relational algebra` and `relational calculus`. As is evident from the name,
    they were mathematical notations rather than attempts to make a query language
    with wide appeal.


    Codd’s attempt at making a real query language was `Alpha`, proposed in his 1971
    paper “A Data Base Sublanguage Founded on the Relational Calculus.” However, the
    `SystemR` project used a separate query language called `SEQUEL` created by Don
    Chamberlin and Raymond Boyce around 1973. This language eventually got renamed
    to `SQL`.


    The `Ingres` project created their own query language called `QUEL`, influenced
    by the design of `Alpha`. However, in the 1980s the dominant vendors of database
    systems were pushing `SQL`, including IBM and Oracle, and `QUEL` died a slow death
    with the diminishing popularity of the trailblazing `Ingres`. By the late 1980s,
    `SQL` had firmly stamped its mark as the de facto database query language, a position
    it holds to this day.


    ## 索引和术语表


    ### A

    - **Access control**: granting privileges to users, general syntax, `GRANT`

    - **Aggregate functions**: `AVG`, casting values, integers, `COUNT`, `MAX` and
    `MIN`, `SUM`, `varchar` value

    - `ALTER TABLE` command

    - **American National Standards Institute (ANSI)**: 《The Art of SQL》

    - **Atomicity**

    - **Atomicity**


    ### B

    - **Bitmap Heap Scan**

    - **Bitmap Index Scan**


    ### C

    - **Check constraints**

    - **Compound queries**

    - **Concatenation operator**

    - **Constraints**: check `NULL` (See `NULL constraints`), primary key, relational
    databases, selective fields `INSERT`, unique key

    - `CREATE USER` command

    - **Cross joins**


    ### D

    - **Database and database administrators (DBA’s)**

    - 《Database Management and Design》

    - **Database Management System (DBMS)**

    - **Data Control Language (DCL)**

    - **Data Definition Language (DDL)**

    - **Data Dictionary**

    - **Data Manipulation Language (DML)**: `DELETE` command, `INSERT` and `SELECT`
    commands, `UPDATE` command

    - **Data Query Language (DQL)**

    - **Data types**

    - **DB Browser for SQLite**

    - **DBeaver**

    - **Denormalization**

    - **Difference operation**: `EXCEPT` operator, `IN` and `NOT IN` operators, mathematical

    - **`DROP` commands**: `DROP TABLE` command


    ### E

    - **Entry of database systems**

    - **Equijoin**

    - **`EXPLAIN` command**: create index, PostgreSQL query, `EXPLAIN QUERY PLAN`,
    PostgreSQL query

    - **File-oriented systems**

