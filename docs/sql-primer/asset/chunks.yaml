    \ 数据库。\n\n将这两个归档文件解压到同一个目录中，就完成了 SQLite 的安装。你的文件夹现在应该至少包含三个文件：\n\n*   `sqlite3.dll`\n\
    *   `sqlite3.def`\n*   `sqlite3.exe`\n\n最后一个文件是用于与 SQLite 数据库交互的命令行 shell。\n\n\
    如果你使用的是 Linux 或 MacOS X 系统，很可能你已经安装了 SQLite。为了测试这一点，你可以尝试启动 SQLite shell `sqlite3`（清单\
    \ 2-2）。\n\n```\n[~]$ sqlite3\nSQLite version 3.13.0 2016-05-18 10:57:30\nEnter\
    \ \".help\" for usage hints.\nConnected to a transient in-memory database.\nUse\
    \ \".open FILENAME\" to reopen on a persistent database.\nsqlite>\n```\n**清单 2-2**\
    \  \n启动 `sqlite3` shell\n\n如果你得到如上所示的输出，那么你就拥有了运行 SQLite 所需的一切。或者，如果你收到错误消息，则意味着你需要自己安装它。你可以使用类似的平台预编译二进制方法，或者使用系统安装程序。\n\
    \n对于像 Red Hat Enterprise Linux、Scientific Linux 和 CentOS 这样的系统，你可以使用 `yum` 来安装\
    \ SQLite。\n\n```\n# yum install sqlite\n```\n\n在 Fedora Linux 系统上，你必须使用 `dnf`，如下所示。\n\
    \n```\n# dnf install sqlite\n```\n\n如果你恰好使用基于 Debian 或 Ubuntu 的系统，你可以通过以下方式实现相同的结果。\n\
    \n```\n$ sudo apt-get install sqlite3\n```\n\n安装完成后，你可以像之前一样通过启动 SQLite shell\
    \ 来验证安装。\n\n## 创建你自己的数据库\n\n像 PostgreSQL 这样的数据库管理系统允许你创建多个数据库。出于练习目的，建议创建你自己的数据库，这样你就可以自由地对其进行任何操作。\n\
    \n大多数数据库系统在提供数据库创建设施的方式上有所不同。PostgreSQL 通过提供多种方式来实现这一点，包括通过 `pgAdmin III` 图形化工具。然而，出于教学目的，我们将改用命令操作来创建我们的数据库。打开\
    \ `psql` shell 并输入如下命令（清单 2-3）。\n\n```\nCREATE DATABASE testdb;\n```\n**清单 2-3**\
    \  \n在 PostgreSQL 中创建数据库\n\n命令 `CREATE DATABASE` 用于创建一个数据库，该数据库将作为你表的容器。在上面显示的示例和输出中，我们创建了一个名为\
    \ `testdb` 的数据库供我们使用。你连接 `psql` 时使用的登录用户（在大多数情况下是 `postgres`）现在就是此数据库的所有者，并完全控制其中的实体。这类似于在操作系统中创建文件，创建者获得完全访问控制权，并可以选择授予其他用户和组特定的权限。\n\
    \n根据 SQL 标准的定义，允许以大小写不敏感的方式编写命令和关键字。在本书中，我们将在语句中使用大写字母来编写它们，这是一种被广泛接受的实践。\n\n\
    > **注意**\n>\n> 奇怪的是，SQL 标准并不包含 `CREATE DATABASE` 命令。在 1992 年的标准（恰当地命名为 SQL-92）中，有一个\
    \ `CREATE SCHEMA` 命令与前者接近但不完全相同。\n>\n> 然而在现代，像 MySQL 这样的数据库将这两个命令视为彼此的同义词。\n\n\
    如果你使用的是 SQLite，请启动命令 shell，你会看到一条打印版本信息的欢迎文本（清单 2-4）。这与我们之前在验证 SQLite 安装时看到的信息完全相同。\n\
    \n```\nSQLite version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\n\
    Connected to a transient in-memory database.\nUse \".open FILENAME\" to reopen\
    \ on a persistent database.\nsqlite>\n```\n**清单 2-4**  \n打开 SQLite shell\n\n在这里，我们输入\
    \ `.open` 命令来创建 SQLite 数据库，或者在它已存在时打开它。\n\n```\nsqlite> .open testdb\n```\n\n\
    在 Linux 系统上，你也可以简单地在 SQLite shell 命令后写上数据库名称，如下所示，这样你就能够打开指定的数据库。\n\n```\nsqlite3\
    \ testdb\n```\n\n有趣的是，这种调用方式不会创建 `testdb`，它只是在数据库存在时打开它。如果你不执行任何其他操作并关闭 shell（`Ctrl-D`），那么在\
    \ Linux 上你的机器上将不会有 `testdb` 文件。在 Windows 系统上，你将得到一个长度为 0 字节的空文件。\n"
- fmt: "## Table Creation\n\nWe have already explored the concept of a table in a\
    \ relational model. It is now time to create one using a standard SQL command\
    \ – `CREATE TABLE` (Listing [2-5](#A457348_1_En_2_Chapter.html#Par44)).\n\n```sql\n\
    CREATE TABLE \n( ,\n ,\n\\. \\. \\.\n );\n```\nListing 2-5\nGeneral Syntax of\
    \ a CREATE TABLE statement\n\nThis is the simplest valid statement that will create\
    \ a table for you, devoid of any extra options. We'll further this with clauses\
    \ and constraints as we go along, but for now let us use this general syntax to\
    \ actually create the table of programming languages we introduced in Chapter\
    \ [1](#A457348_1_En_1_Chapter.html) (Listing [2-6](#A457348_1_En_2_Chapter.html#Par46)).\n\
    \n```sql\nCREATE TABLE proglang_tbl (\nid        INTEGER,\nlanguage  VARCHAR(20),\n\
    author    VARCHAR(25),\nyear      INTEGER);\n```\nListing 2-6\nCreating the programming\
    \ languages table\n\nWe have to key this command in PostgreSQL on the `psql` shell.\
    \ Notice that when we launch the shell, the last line where our cursor waits looks\
    \ as below:\n\n```\npostgres=#\n```\n\nThis actually means that we are connected\
    \ to the database named postgres, which is something the PostgreSQL installation\
    \ uses internally for management purposes. We have already created our very own\
    \ database. Let’s switch to that before creating our tables using `\\c` (Listing\
    \ [2-7](#A457348_1_En_2_Chapter.html#Par50)).\n\n```\npostgres=# \\c testdb\n\
    You are now connected to database \"testdb\" as user \"postgres\".\ntestdb=#\n\
    ```\nListing 2-7\nConnecting to a different database in psql\n\nNotice that the\
    \ text on the last line has changed, indicating the current database we are connected\
    \ to. Now you can key in the table creation statement given in Listing [2-6](#A457348_1_En_2_Chapter.html#Par46),\
    \ and if you don’t miss any of the important punctuation or misspell the keywords\
    \ written in uppercase, your table would be created and the shell would reply\
    \ simply with:\n\n```\nCREATE TABLE\ntestdb=#\n```\n\nA non-successful command\
    \ would yield an error with a helpful explanation. To see this in action, let’s\
    \ run the exact same table creation command again. The shell would now respond:\n\
    \n```\nERROR:  relation \"proglang_tbl\" already exists\n```\n\nThe statement\
    \ by itself is simple enough since it resembles the general syntax of Listing\
    \ [2-5](#A457348_1_En_2_Chapter.html#Par44). It is interesting to note the data\
    \ types chosen for the fields. Both `id` and `year` are specified as `INTEGER`\
    \ for simplicity, even though there are better alternatives. The `language` field\
    \ is given a space of 20 characters to store the name of the programming language\
    \ while the `author` field can hold 25 characters for the creator's name.\n\n\
    The semicolon at the last position is the delimiter for SQL statements, and it\
    \ marks the end of a statement.\n\nIf you are using SQLite, the statement remains\
    \ exactly the same as Listing [2-6](#A457348_1_En_2_Chapter.html#Par46). The only\
    \ difference being that since an SQLite database is a particular file and you\
    \ open it when opening the SQLite shell, there is no switching of database required\
    \ (Listing [2-8](#A457348_1_En_2_Chapter.html#Par58)).\n\n```\n[~]$ sqlite3 testdb\n\
    SQLite version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\n\
    sqlite> CREATE TABLE proglang_tbl (\n...> id        INTEGER,\n...> language  VARCHAR(20),\n\
    ...> author    VARCHAR(25),\n...> year      INTEGER);\nsqlite>\n```\nListing 2-8\n\
    Creating the programming languages table in SQLite\n\nNotice that there is no\
    \ successful operation message. If all goes well, SQLite shell simply moves on.\
    \ Just for some experimentation, if we try to create the same table again, we\
    \ get an error saying:\n\n```\nError: table proglang_tbl already exists\n```\n\
    \nwhich is again a helpful and somewhat friendlier error message.\n\n## Inserting\
    \ Data\n\nThe table we have just created is empty so our task now becomes insertion\
    \ of some sample data inside it. To populate this data in the form of rows, we\
    \ use the DML command `INSERT`, whose general syntax is given below (Listing [2-9](#A457348_1_En_2_Chapter.html#Par63)).\n\
    \n```sql\nINSERT INTO \nVALUES ('Value1', 'Value2', ...);\n```\nListing 2-9\n\
    General syntax of INSERT INTO TABLE\n\nFitting some sample values into this general\
    \ syntax is simple enough, provided we keep in mind the structure of the table\
    \ we are trying to insert the row in. For populating the `proglang_tbl` with rows\
    \ like we saw in Chapter [1](#A457348_1_En_1_Chapter.html), we would have to use\
    \ three `INSERT` statements as below (Listing [2-10](#A457348_1_En_2_Chapter.html#Par65)).\n\
    \n```sql\nINSERT INTO proglang_tbl\nVALUES (1, 'Fortran', 'Backus', 1955);\nINSERT\
    \ INTO proglang_tbl\nVALUES (2, 'Lisp', 'McCarthy', 1958);\nINSERT INTO proglang_tbl\n\
    VALUES (3, 'Cobol', 'Hopper', 1959);\n```\nListing 2-10\nInserting data into the\
    \ proglang_tbl table\n\nIf you do not receive any errors from `psql` or `sqlite3`\
    \ (or the SQL interface for your chosen DBMS), then you have managed to successfully\
    \ insert three rows of data into your table. Notice how we've carefully kept the\
    \ ordering of the fields in the same sequence as we used for creating our table.\
    \ This strict ordering limitation can be removed, and we will see how to achieve\
    \ that later on.\n\nIf you ran these three statements in `psql`, at the end of\
    \ each executed statement, you would receive a message like:\n\n```\nINSERT 0\
    \ 1\n```\n\nindicating a success."
