- fmt: '# 11. Understanding Joins


    A join operation allows you to retrieve data from multiple tables in a single
    `SELECT` query. Two tables can be joined by a single join operator, but the result
    can be joined again with other tables. There must exist a same or similar column
    between the tables being joined.


    When you design an entire database system using good design principles like normalization,
    we often require the use of joins to give a complete picture to a user''s query.
    For example, we split our programming languages table into two in Chapter [7](#A457348_1_En_7_Chapter.html)
    – one holding the author details (Table [11-2](#A457348_1_En_11_Chapter.html#Tab2))
    and the other holding information about the languages itself (Table [11-1](#A457348_1_En_11_Chapter.html#Tab1)).
    To show a report listing authors and which programming language they created,
    we would have to use a join.


    Table 11-2


    Contents of `authors_tbl`


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |


    Table 11-1


    Contents of `newlang_tbl`


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 | (null) |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 | (null) |

    | 5 | BASIC | 1964 | ANSI |


    We now form a query to show our desired output – the list of all authors with
    the corresponding language they developed (Listing [11-1](#A457348_1_En_11_Chapter.html#Par4)).
    We choose our join column as the `language_id` field from the `authors` table.
    This corresponds to the `id` field in the `languages` table.


    | author | language |

    | --- | --- |

    | Colmerauer | Prolog |

    | Wall | Perl |

    | Ousterhout | APL |

    | Iverson | Tcl |

    | Kemeny | BASIC |

    | Kurtz | BASIC |


    ```sql

    SELECT author, language

    FROM authors_tbl, newlang_tbl

    WHERE language_id = id;

    ```


    Listing 11-1

    Running a join operation on our two tables


    The output of our query combines a column from both tables giving us a better
    report. The `language_id = id` is called the join condition. Since the operator
    used in the join condition is an equality operator (`=`), this join is called
    an equijoin. Another important thing to note is that the columns participating
    in the join condition are not the ones we choose to be in the result of the query.


    Remember that the joining of tables to view a resultset does not affect the tables
    at all. Nothing physically changes in the tables themselves with respect to their
    structure or data. The implicit connection forming is only within the lifetime
    of the join query execution.


    ## Alternative Join Syntax


    You would have noticed that we formed our join query without much special syntax,
    using our regular `FROM/WHERE` combination. The SQL-92 standard introduced the
    `JOIN` keyword to allow us to form join queries. Since it was introduced earlier,
    the `FROM/WHERE` syntax is still quite popular for joins. But now that the majority
    of database vendors have implemented most of the SQL-92 standard, the `JOIN` syntax
    is also in widespread use. Below is the `JOIN` syntax equivalent of the query
    we just wrote to display which author created which programming language (Listing
    [11-2](#A457348_1_En_11_Chapter.html#Par8)).


    ```sql

    SELECT author, language

    FROM authors_tbl JOIN newlang_tbl

    ON language_id = id;

    ```


    Listing 11-2

    Rewriting our query using the `JOIN` (SQL-92) syntax


    Notice that instead separating the two tables using a comma (thereby making it
    a list), we use the `JOIN` keyword. The columns that participate in the join condition
    are preceded by the `ON` keyword. The `WHERE` clause can then be used after the
    join condition specification (`ON` clause) to specify any further conditions if
    needed.


    The kind of joins where all rows that don’t match the join condition exactly are
    eliminated are called inner joins. Thus we can optionally use the full keyword
    `INNER JOIN` in our queries without affecting the resultset (Listing [11-3](#A457348_1_En_11_Chapter.html#Par11)).


    ```sql

    SELECT author, language

    FROM authors_tbl INNER JOIN newlang_tbl

    ON language_id = id;

    ```


    Listing 11-3

    Specifying `INNER JOIN` explicitly


    ## Resolving Ambiguity in Join Columns


    In our example the join condition fields had distinct names – `id` and `language_id`.
    But what if in our languages table we kept the key field''s name as `language_id`?
    This would create an ambiguity in the join condition, which would become the confusing
    `language_id = language_id`. To resolve this, we need to qualify the column by
    prepending it by the table name it belongs to and a `.` (period) (Listing [11-4](#A457348_1_En_11_Chapter.html#Par13)).


    | author | language |

    | --- | --- |

    | Ousterhout | Tcl |


    ```sql

    CREATE TABLE languages_tbl

    (language_id INTEGER, language VARCHAR(20));

    INSERT INTO languages_tbl VALUES (4, ''Tcl'');

    SELECT author, language

    FROM authors_tbl JOIN languages_tbl

    ON language_id = language_id;

    => ERROR:  column reference "language_id" is ambiguous

    SELECT author, language

    FROM authors_tbl JOIN languages_tbl

    ON authors_tbl.language_id = languages_tbl.language_id;

    ```


    Listing 11-4

    Resolving the naming ambiguity by qualifying the columns


    Another way to solve such ambiguity is to qualify the columns using table aliases.
    The concept is to give a short name to a table and then use this to qualify the
    columns instead of a long, unwieldy table name (Listing [11-5](#A457348_1_En_11_Chapter.html#Par15)).


    ```sql

    SELECT author, language

    FROM authors_tbl a JOIN newlang_tbl l

    ON a.language_id = l.id;

    ```


    Listing 11-5

    Using table aliases


    Here the `authors` table is given the alias `a` and the `languages` table is given
    the alias `l`. It is generally considered a good practice to qualify column names
    of a join condition regardless of whether there is a name ambiguity or not.'
