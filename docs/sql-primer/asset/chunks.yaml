- fmt: '## Union


    The union is an operation that combines elements of two sets. Let’s say we have
    the following two sets consisting of a bunch of numbers (Listing [13-1](#A457348_1_En_13_Chapter.html#Par4)).


    ```

    set1 = { 1, 3, 5 }

    set2 = { 1, 2, 3 }

    Listing 13-1

    Two sets containing numbers

    ```


    The resulting union set will be a set consisting of all of these elements repeated
    exactly once, that is, no duplicates are allowed (Listing [13-2](#A457348_1_En_13_Chapter.html#Par6)).
    Note that the order of a set is unimportant. Think of it as a bag of elements
    rather than an ordered collection.


    ```

    set1 UNION set2 = { 1, 3, 5, 2 }

    Listing 13-2

    The mathematical UNION operation

    ```


    Let''s now look at how to use simulate the union operation in SQL. Consider our
    programming languages table and its data below as we last left it in Chapter [10](#A457348_1_En_10_Chapter.html)
    (Table [13-1](#A457348_1_En_13_Chapter.html#Tab1)).


    Table 13-1

    Contents of `proglang_tbl`


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 6 | PL/I | IBM | 1964 | ECMA |

    | 7 | Tcl | Ousterhout | 1988 |   |

    | 8 | Fortran | Backus | 1957 | ANSI |


    If we wanted to get the list of creation years of languages standardized by either
    `ANSI` or `ISO`, we could use a `UNION` keyword to achieve this (Listing [13-3](#A457348_1_En_13_Chapter.html#Par9)).


    | year |

    | --- |

    | 1959 |

    | 1957 |

    | 1964 |

    | 1972 |


    ```

    SELECT year FROM proglang_tbl

    WHERE standard="ANSI"

    UNION

    SELECT year FROM proglang_tbl

    WHERE standard="ISO";

    Listing 13-3

    Using a UNION operator

    ```


    Since we had four entries in our table with a standard value as `ANSI` or `ISO`,
    we got our expected four rows in the resultset. Note that there were no duplicate
    entries to be processed. But what if there were duplicate entries to process with
    the `UNION` operation (Listing [13-4](#A457348_1_En_13_Chapter.html#Par11))?


    ```

    SELECT standard FROM proglang_tbl

    WHERE language = ''Fortran''

    UNION

    SELECT standard FROM proglang_tbl

    WHERE language = ''APL'';

    Listing 13-4

    Using a UNION operator to eliminate duplicate values

    ```


    ![A457348_1_En_13_Figa_HTML.jpg](A457348_1_En_13_Figa_HTML.jpg)


    Both the languages we specified in our `WHERE` clause were standardized by `ANSI`.
    The `UNION` operation, just like in discrete maths, removed the duplicated value
    and gave out a single row as the result.


    There is another related SQL operation `UNION ALL` that will simulate the act
    of combination but will not eliminate duplicates (Listing [13-5](#A457348_1_En_13_Chapter.html#Par14)).
    The advantage you get by using this is performance improvement since the SQL engine
    does not have to bother with checking for duplicates. If you have constructed
    your participating queries in such a way that there are no repeated values, using
    a `UNION ALL` would improve your query processing time.


    | standard |

    | --- |

    | ANSI |

    | ANSI |


    ```

    SELECT standard FROM proglang_tbl

    WHERE language = ''Fortran''

    UNION ALL

    SELECT standard FROM proglang_tbl

    WHERE language = ''APL'';

    Listing 13-5

    Using a UNION ALL operator

    ```


    ## Intersection


    The intersection operation outputs only the common elements in the input sets.
    If we apply an intersection to the two sets in the previous section, we get a
    resulting set of two elements (Listing [13-6](#A457348_1_En_13_Chapter.html#Par16)).


    ```

    set1 INTERSECTION set2 = { 1, 3 }

    Listing 13-6

    The mathematical INTERSECTION operation

    ```


    As with union, each common value is displayed only once. Duplicates are removed
    from the final result set.


    Translating this to SQL is pretty simple; instead of using `UNION` we use the
    keyword `INTERSECT` to get common elements (Listing [13-7](#A457348_1_En_13_Chapter.html#Par19)).


    ```

    SELECT standard FROM proglang_tbl

    WHERE year=1964

    INTERSECT

    SELECT standard FROM proglang_tbl

    WHERE year=1957;

    Listing 13-7

    Using the INTERSECT in SQL

    ```


    ![A457348_1_En_13_Figb_HTML.jpg](A457348_1_En_13_Figb_HTML.jpg)


    Something to keep in mind here is that the `INTERSECT` operator would find the
    exact common values between the two queries that precede and succeed it. That
    means the entire records of the result and not just common values from a part
    of it. While in the previous example, our result set had only one column to be
    given back – standard, let’s see what happens when we add another column to the
    result list (Listing [13-8](#A457348_1_En_13_Chapter.html#Par21)).


    ```

    SELECT year, standard FROM proglang_tbl

    WHERE year=1964

    INTERSECT

    SELECT year, standard FROM proglang_tbl

    WHERE year=1957;

    => (0 rows)

    Listing 13-8

    Using the INTERSECT with multiple columns in the results

    ```


    The output is no rows at all. The first query would select records for `PL/I`
    and `APL` while the second for `Fortran`. But all these languages have a different
    combined value of (`year`, `standard`), giving us a net zero result.


    Note that while the `ANSI` SQL standard does provision for an `INTERSECT ALL`
    operator, I''m yet to come across a database management system that implements
    it. `PostgreSQL` happily ignores that you wrote the `ALL` clause and simply gives
    back an `INTERSECT` result.'
