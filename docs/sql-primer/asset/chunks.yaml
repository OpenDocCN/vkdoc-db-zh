    - **SQL Antipatterns**

    - 《SQL Cookbook》

    - **SQLite**: column mode, DBMS system, DLL zip archive download, Fedora Linux
    system headers, installing precompiled binaries, shell `sqlite3`, table creation,
    table information, `yum`

    - 《SQL Queries for mere mortals》

    - **SQL variants**

    - **String operations**: concatenation operator, substring, `UPPER` and `LOWER`

    - **Structured Query Language (SQL)**: advantages, commands classification, database,
    data types, DBMS, development environments, relational model, tables

    - **Subqueries**: `ALL` operator, `ANY` operator, existence tests, `INSERT` statements,
    types, row subqueries, scalar subqueries, table subqueries

    - **Substring**

    - **`SystemR` project**


    ### T

    - **Tables**: `ALTER TABLE` command, creating new tables from existing, DBA’s,
    DBMS, `DROP` commands, PostgreSQL, SQLite

    - **Transaction Control Commands**


    ### U

    - `UNION` keyword

    - **Union operation**: duplicate values, elimination, mathematical, programming
    languages, table, `UNION ALL` operator, usage

    - **Unique indexes**: creation, duplicate values

    - **Unique key constraints**


    ### V, W, X, Y, Z

    - **Views**: advantage, calculated field, creation, data modification, aggregate
    columns, base table, checking calculated field, field value, modified view, non-calculated
    field, updating value, definition, `DROP VIEW` command, field renaming, `language_chronology`
    syntax

    - **Virtual Storage Access Method (VSAM)**

    - **Virtual table**'
