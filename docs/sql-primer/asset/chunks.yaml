  trans: "# 向用户授予权限\n\n让我们尝试使用这个新创建的用户打开一个 psql 会话。我们将把值 `primer` 传递给 psql 的 `-U`\
    \ 选项（参见清单 16-5）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql -U primer\nPassword for\
    \ user primer:\npsql.bin: FATAL:  database \"primer\" does not exist\n```\n*清单\
    \ 16-5 尝试使用我们新创建的用户登录*\n\n除了用户之外，它还尝试打开新用户的默认数据库，该数据库的名称被假定与用户名相同。我们将通过明确声明我们要操作\
    \ `testdb` 数据库来补救这一点（参见清单 16-6）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql -U primer\
    \ -d testdb\nPassword for user primer:\npsql.bin (9.5.8)\nType \"help\" for help.\n\
    testdb=> SELECT * FROM proglang_tbl;\nERROR:  permission denied for relation proglang_tbl\n\
    ```\n*清单 16-6 使用 primer 用户连接到 testdb*\n\n成功登录了 `testdb` 数据库。但当我们在其中一个表上运行基本查询时，它立即给出了\
    \ `permission denied` 错误。回想起来，这似乎合乎逻辑，因为我们还没有授予 `primer` 任何特殊访问权限。我们不希望任何新用户能够立即访问我们精心创建的表。\n\
    \n我们将使用 `GRANT` 语句向我们新创建的用户授予特定权限。`GRANT` 的一般语法如下所示（参见清单 16-7）。\n\n```\nGRANT\
    \ <privilege> ON <object> TO <user>;\n```\n*清单 16-7 GRANT 的一般语法*\n\n我们最希望给予 `primer`\
    \ 用户的权限是能够查询 `proglang_tbl` 表。这相当于授予该用户对该特定表的只读访问权限。我们以超级用户 `postgres` 的身份运行此语句，他将把权限授予其他用户（参见清单\
    \ 16-8）。\n\n```\nGRANT SELECT ON proglang_tbl TO primer;\n```\n*清单 16-8 向 primer\
    \ 授予 SELECT 权限*\n\n现在我们可以作为 `postgres` 退出 psql 会话，并以用户 `primer` 重新打开 `testdb`。我们将尝试先查询然后更新表中的一行，以查看\
    \ `GRANT` 语句是否按预期工作（参见清单 16-9）。\n\n```\ntestdb=> SELECT count(*) FROM proglang_tbl;\n\
    count\n-------\n    4\n(1 row)\ntestdb=> UPDATE proglang_tbl SET year=1982 WHERE\
    \ author=\"Ross\";\nERROR:  permission denied for relation proglang_tbl\n```\n\
    *清单 16-9 验证 primer 是否可以查询或更新表*\n\n查询工作正常，但行更新没有成功，因此一切如预期般运作。您可能已经猜到，我们需要为第二条语句也\
    \ `GRANT` `UPDATE` 权限，它才能生效。\n\n`SELECT` 和 `UPDATE` 并非用于细粒度访问控制的唯一可用权限。您还可以指定其他权限，如\
    \ `INSERT` 和 `DELETE`。最后，还有一个 `ALL` 权限，它会将特定数据库对象上的所有可用权限授予指定的用户。如果您希望一次指定多个权限，可以将它们列成一个清单（参见清单\
    \ 16-10）。\n\n```\nGRANT SELECT, UPDATE, INSERT ON proglang_tbl TO primer;\n```\n\
    *清单 16-10 一次授予多个权限*\n\n授予权限通常在需要访问相关表或数据库对象的用户不是其创建者时进行。如果一个用户创建了一个表，他们默认拥有该表的所有权限。\n\
    \n大多数数据库管理系统中还有比我们介绍的四种基本权限更多的其他权限。然而，它们的使用通常对数据库管理员而非查询用户更有意义。请随时查阅您的数据库手册以了解有关支持权限的更多信息。\n\
    \n# 撤销权限\n\n`REVOKE` 命令与 `GRANT` 恰好相反。它允许您从用户那里移除对数据库对象的权限。其一般语法与 `GRANT` 类似，不同之处在于它使用\
    \ `FROM` 而不是 `TO`（参见清单 16-11）。\n\n```\nREVOKE <privilege> ON <object> FROM <user>;\n\
    ```\n*清单 16-11 REVOKE 的一般语法*\n\n在第 14 章讨论视图时，我们曾提到视图如何通过提供仅包含您想向他人显示的字段的虚拟表来帮助保障数据安全。但如果用户也能查询基表，这个计划就会失败。在这里使用\
    \ `REVOKE` 是个好主意。我们将允许用户查询视图，但不允许查询底层表（参见清单 16-12）。这样，我们确保可用性不受影响，同时仍能在数据建模层面将所有有意义的字段组合在一起。\n\
    \n```\ntestdb=# GRANT SELECT ON language_decade TO primer;\ntestdb=# REVOKE SELECT\
    \ ON proglang_tbl FROM primer;\n```\n*清单 16-12 撤销对基表的访问权限*\n\n我们正在使用超级用户 `postgres`\
    \ 运行这些命令。现在让我们以用户 `primer` 的身份登录，看看这些语句如何影响了我们的权限（参见清单 16-13）。\n\n```\nSELECT\
    \ * FROM proglang_tbl;\nERROR:  permission denied for relation proglang_tbl\n\
    SELECT * FROM language_decade WHERE decade='The 1950s';\n language |   decade\n\
    ----------+-----------\n Jovial   | The 1950s\n APT      | The 1950s\n(2 rows)\n\
    ```\n*清单 16-13 检查用户 primer 的权限*\n\n我们注意到用户可以查询视图，但不能查询基表。这实际上是大型数据库中非常常见的访问控制工作流程。在数据定义过程之后，会根据我们期望的数据查询方式创建不同的视图，然后撤销基表的权限以用于交互式查询。\n\
    \n虽然我们可以在 `GRANT` 和 `REVOKE` 中指定用户列表，但我们不能合理地假设数据库系统的用户列表会始终保持不变。大多数 DBMS 软件提供一个关键字\
    \ `PUBLIC` 来指代系统的所有当前和未来用户。这可以与我们的访问控制语句一起使用，以最大程度地减少日常访问管理的需求（参见清单 16-14）。\n\n\
    ```\ntestdb=# GRANT ALL ON proglang_tbl TO PUBLIC;\ntestdb=# REVOKE DELETE ON\
    \ proglang_tbl FROM PUBLIC;\n```\n*清单 16-14 在访问控制语句中使用 PUBLIC*\n\n这两条连续语句将实现的效果是：首先向所有人开放\
    \ `proglang_tbl`，然后仅移除 `DELETE` 权限。其他权限如 `INSERT`、`UPDATE` 等将对系统的所有用户可用，而无需我们逐一列出。如果创建了新用户，这些访问控制级别也将适用于他们。\n\
    \n# 延伸阅读\n\n本文始终旨在为没有 SQL 经验的人提供一个简短的教程式入门。但这并不意味着我们已经学习了关于 SQL 的全部知识。事实上，我们还远未达到。\n\
    \n虽然我很高兴您读到了本文的结尾，但为了公平起见，我应该为您提供一些指引，告诉您如何继续您的 SQL 学习之旅。以下是我认为值得一读的书籍清单。并非所有书籍都适合您，因此我附上了简短的描述，说明我对它们的感受，以帮助您决定。"
- fmt: '## 推荐的SQL书籍


    1.  *The Practical SQL Handbook: Using SQL Variants* (4th Edition, Addison-Wesley
    Professional, 2001) by Judith S Bowman, Sandra L Emerson, Marcy Darnovsky: This
    is perhaps the best book on `SQL` that I have read, bar none. The writing is crisp,
    it is just the right size, and it focuses on the real-world aspects of `SQL` rather
    than too much obscure theory. The only downside is that it has not been updated
    since 2001; but since the basics of `SQL` change infrequently, coupling this with
    your database manual can help you get by swimmingly.

    2.  *Introduction to SQL: Mastering the Relational Database Language* (4th Edition,
    Addison-Wesley Professional, 2006) by Rick F van der Lans: The gold standard in
    `SQL` references. Everything you ever wanted to know about `SQL` is covered in
    this heavy tome. The writing is a bit dry at times and the chapter organization
    might not suit complete beginners, but I don’t think they were the intended audience
    anyways. I’d recommend you keep this handy if you frequently run into issues that
    Internet forums don’t solve.

    3.  *SQL Queries for Mere Mortals: A Hands-On Guide to Data Manipulation in SQL*
    (3rd Edition, Addison-Wesley Professional, 2014) by John L Viescas and Michael
    J Hernandez: An extremely gentle but verbose tutorial on `SQL` in case you found
    the current text to be fast paced. The authors give a detailed step-by-step approach
    to translating plain English requirements to `SQL` queries. The examples are plentiful
    and is intended for complete beginners. This is a popular and well-regarded book
    and deservedly so.

    4.  *A Visual Introduction to SQL* (2nd Edition, Wiley, 2001) by David Chappell
    and J Harvey Trimble Jr.: Another classic that has not been updated for quite
    a while but is just as useful today. Meant as a visual tutorial introduction to
    `SQL`, it is to the point and covers a whole range of topics in 250 pages or so.
    A good choice to pick up from your library and go through in a month.

    5.  *Database Management and Design* (2nd Edition, Prentice Hall, 1995) by Gary
    W Hansen and James V Hansen: The hidden gem of the database theory book world.
    If you ever wanted to know the theoretical underpinnings of databases and `SQL`,
    this is text to read if you can find it. It is clearer and crisper than its more
    popular counterparts. It is unfortunate that there hasn’t been a new edition in
    this millennium, and yet it still remains in my recommendation list. You would
    have to get past the outdated software that is used for examples in the book though.

    6.  *SQL Cookbook: Query Solutions and Techniques for Database Developers* (1st
    Edition, O’Reilly Media, 2005) by Anthony Molinaro: A superb collection of examples
    of real-world `SQL` queries. The book tries to cover all major `DBMS` packages
    and gives great explanations about the statements themselves. A great companion
    book if you are a working professional and frequently need to write queries that
    are not immediately obvious.

    7.  *The Art of SQL* (1st Edition, O’Reilly Media, 2006) by Stephane Faroult and
    Peter Robson: An advanced but fun way to look at `SQL` and relational databases.
    Modeled on Sun Tzu’s Art of War, this book is distilled wisdom on how `SQL`-based
    databases ought to be used. This book immediately jumps into the nitty gritty
    of database design, performance optimization, and other such topics, so the reader
    is assumed to be well versed in the basics of `SQL`.

    8.  *SQL Antipatterns: Avoiding the Pitfalls of Database Programming* (1st Edition,
    Pragmatic Bookshelf, 2010) by Bill Karwin: This book is a crash course on what
    NOT to do while using `SQL`. You will learn to appreciate it after you have some
    experience under your belt, but a great book to browse through whenever you have
    time. The book is not too lengthy, roughly 300 pages, and is full of great tips
    on how to avoid bad database design and usage.


    # Database Management Systems and Tools


    Ever since the 1980s there has always been a fair amount of choice in relational
    database management systems. But since the turn of the millennium, we now have
    ample choice in the open source world too. In fact, some of the strongest `RDBMS`
    tools are open source.


    Below is a listing of my recommendations of good `RDBMS` systems and tools. It
    is biased toward free and open source software. Since it is an opinionated list
    by a single person, there are bound to be good resources that I have missed. Nonetheless,
    I hope this serves as a good starting point.


    ## Relational Database Management Systems


    1.  `PostgreSQL` [`https://www.postgresql.org/`](https://www.postgresql.org/)
    The best, most feature-rich open source database right now. It should be your
    default choice when trying to choose a `RDBMS` to be used by multiple programs
    and users. Its maturity and security are second to none and improvements trickle
    in at a steady pace. But its best feature for me is its documentation. The user
    manual that accompanies it serves as a great reference for `SQL` while being simple
    and succinct.

    2.  `SQLite` [`https://sqlite.org/`](https://sqlite.org/) A lightweight, single
    file, embeddable database. Extremely popular with lots of help and documentation
    available everywhere. Should be your choice of `RDBMS` when making a single user
    system or when the number of concurrent users is less. Does more than most people
    give it credit for, and it easily handles databases around 15–16GB in size.

    3.  `Firebird` [`http://firebirdsql.org/`](http://firebirdsql.org/) The hidden
    gem of the open source `DBMS` world. While not as well known as some of its peers,
    `Firebird` remains a stable, feature-rich and standard-compliant `RDBMS`. It scales
    well from small embeddable database systems to large, enterprise-wide ones. It
    began as a fork of Borland’s `Interbase` in 2000 but now the two products have
    diverged quite a bit.

    4.  `MariaDB` [`https://mariadb.org/`](https://mariadb.org/) The community-developed
    fork of `MySQL`, now regarded as the default choice when looking for something
    that works like `MySQL`. There was a good ecosystem around `MySQL` that `MariaDB`
    automatically inherits and new features are being added to it on a regular basis.

    5.  `HyperSQL` [`http://hsqldb.org/`](http://hsqldb.org/) Also known as `HSQLDB`,
    this is a popular, mature `Java`-based relational database engine. It can work
    both as an embedded and client/server-based `DBMS`. Perfect for use with `JVM`
    languages. Think of it as an `SQLite` alternative in the `Java` universe, and
    just like `SQLite` it probably does a lot more than you expect it to.

    6.  `H2` [`http://www.h2database.com`](http://www.h2database.com) Another small,
    feature-rich `Java`-based database engine that can be used in embedded and client/server
    modes. It has similar design goals as `HSQLDB` but makes different trade-offs.
    In any case, you get an excellent, small, and open source database engine free
    of cost.'
