    \ some more data into the proglang_tbluk table\n```\n\nTo create an exact copy\
    \ of the existing table, we use the same selection criteria as we have seen before\
    \ - `*` (star). This will select all the fields from the existing table and create\
    \ the new table with them along with any records (Listing [4-6](#A457348_1_En_4_Chapter.html#Par19)).\
    \ It is possible to use only a subset of fields from the old table by modifying\
    \ the selection criteria and we will see this later.\n\n```\nCREATE TABLE proglang_tbl\n\
    AS\nSELECT * FROM proglang_tbluk;\nListing 4-6\nRe-creating a new table from an\
    \ existing one\n```\n\nIf you are using psql, you would see the prompt displaying\
    \ `SELECT 3,` which gives an indicator of how many rows were selected and inserted\
    \ into the new table. We now run a simple `SELECT` query to see whether our objective\
    \ was achieved or not (Table [4-1](#A457348_1_En_4_Chapter.html#Tab1)).\n\nTable\
    \ 4-1\n\nResult of the Query Run on proglang_tbl\n\n| id | language | author |\
    \ year | standard |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer\
    \ | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson | 1964 |\
    \ ANSI |\n\n```\nSELECT * FROM proglang_tbl;\n```\n\nThe two tables are now exactly\
    \ identical but are not linked to each other in any way. If you drop any of the\
    \ tables, the other one will not be affected. Similarly, inserting new data in\
    \ one of them will not insert the data in the other one from now on."
  trans: '

    # 删除表


    SQL 中删除表是通过`DROP TABLE`命令实现的。`DROP`实际上是一个顶级的 SQL 命令，与`CREATE`非常相似，它可以对多种数据库对象执行删除操作。要删除一个表，我们只需在命令后加上数据库对象类型——在本例中是`TABLE`。


    我们现在将删除在之前的课程中创建的所有多余表（见清单 4-1）。请注意，删除表意味着删除该表及其内部的所有数据，且无法恢复。因此，在编写`DROP`命令时要格外小心。


    ```

    DROP TABLE proglang_tbl;

    DROP TABLE proglang_tblcopy;

    DROP TABLE proglang_constraints;

    DROP TABLE proglang_tbltmp;

    清单 4-1

    删除我们创建的临时表

    ```


    如果没有返回错误，就意味着表已被删除。`DROP TABLE`通常只支持一次删除单个表，但有一些巧妙的方法可以用一条语句删除多个表。


    要验证表是否确实已被删除，你有两种选择。一个简单的方法是针对该表编写任意查询，你会收到一个类似`Error: no such table: proglang_tbl`的错误。另一种方法是从数据库目录中获取当前存在的表的列表，这是
    DBMS 内部用来跟踪用户创建的数据库、表和其他对象的一个数据库。在 SQLite 中查询目录以获取表列表极其简单（见清单 4-2）。


    ```

    sqlite> .tables

    proglang_tbluk

    清单 4-2

    在 SQLite 中列出存在的表

    ```


    在 PostgreSQL 中做同样的事情稍微复杂一些，但它是针对目录数据库的一个`SELECT`查询（见清单 4-3）。


    ```

    testdb=# SELECT table_name

    FROM information_schema.tables

    WHERE table_schema = ''public''

    AND table_type = ''BASE TABLE'';

    table_name


    proglang_tbluk

    (1 row)

    清单 4-3

    在 PostgreSQL 中列出存在的表

    ```


    如果这个查询对你来说显得复杂，那是因为它包含了我们尚未讲解的部分和语法。不过请放心，到查询章节结束时，这些语法就会变得完全合理了。目前我们可以推断，PostgreSQL
    中的表数据存储在`information_schema.tables`这个目录表中。


    # 从现有表创建新表


    你可能已经注意到我们删除了`proglang_tbl`表，现在我们手上只剩下`proglang_tbluk`表，它包含所有必要的约束和字段。后者的名称是在我们讨论唯一键约束时选择的，但现在将该表结构（以及任何相应数据）迁移回`proglang_tbl`这个名称似乎是合乎逻辑的。我们通过组合使用`CREATE
    TABLE`和`SELECT`命令来创建一个表的副本，并在此过程中学习一个新的子句——`AS`（见清单 4-4）。这个组合有一个特别容易记住的名字——CTAS，它在
    SQL:2003 标准中被引入，但并非所有 DBMS 系统都实现了它，尤其是 Microsoft SQL Server。


    ```

    CREATE TABLE <new_table_name>

    AS

    SELECT <column_list> FROM <existing_table_name>;

    清单 4-4

    从现有表创建新表的通用语法

    ```


    由于我们的`proglang_tbluk`只包含一条记录，我们将向其中插入一些示例数据，以便稍后验证记录本身是否被复制。注意，我们显式地给出了字段名，否则第二行（不包含标准字段值）在
    SQLite 中会产生类似这样的错误：


    ```

    sqlite> INSERT INTO proglang_tbluk

    VALUES

    (2, ''Perl'', ''Wall'', 1987);

    Error: table proglang_tbluk has 5 columns but 4 values were supplied

    ```


    许多其他 DBMS，如 Ingres，也不会接受这种随意的插入数据方式。然而，PostgreSQL 会接受这样的语句，前提是它能够明确地插入数据——在本例中，由于省略的值只是最后一个可为空的字段，因此它是可以处理的。我建议尽可能显式地编写列名。我们将在清单
    4-5 中遵循这一明智的建议。


    ```

    INSERT INTO proglang_tbluk (id, language, author, year)

    VALUES (2, ''Perl'', ''Wall'', ''1987'');

    INSERT INTO proglang_tbluk (id, year, standard, language, author)

    VALUES (3, ''1964'', ''ANSI'', ''APL'', ''Iverson'');

    清单 4-5

    向 proglang_tbluk 表插入更多数据

    ```


    为了创建现有表的精确副本，我们使用与之前所见相同的选择条件——`*`（星号）。这将从现有表中选择所有字段，并用它们以及任何记录来创建新表（见清单 4-6）。通过修改选择条件，也可以只使用旧表中字段的子集，我们稍后会看到这一点。


    ```

    CREATE TABLE proglang_tbl

    AS

    SELECT * FROM proglang_tbluk;

    清单 4-6

    从现有表重新创建一个新表

    ```


    如果你使用的是`psql`，你会看到提示符显示`SELECT 3`，这表明有多少行被选中并插入到新表中。我们现在运行一个简单的`SELECT`查询来看看我们的目标是否达成（见表
    4-1）。


    **表 4-1** 在`proglang_tbl`上运行的查询结果


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |  |

    | 3 | APL | Iverson | 1964 | ANSI |


    ```

    SELECT * FROM proglang_tbl;

    ```


    这两个表现在完全相同，但彼此之间没有任何关联。如果你删除其中任何一个表，另一个都不会受到影响。同样地，从现在起，在其中一个表中插入新数据也不会将数据插入到另一个表中。

    '
- fmt: '## Modifying Tables


    在创建表后，你仍然可以使用 `ALTER TABLE` 命令（代码清单 [4-7](#A457348_1_En_4_Chapter.html#Par25)）来修改其结构。所谓修改，是指你可以更改字段类型、大小，甚至添加或删除列。并非所有的数据库管理系统都支持
    `ALTER TABLE` 的所有操作。为了绕过这些限制，人们经常将数据复制到具有新结构的新表中。虽然修改表不是一个你会经常使用的 SQL 命令（希望如此！），但你应该熟悉它。


    在修改表时，有一些规则你必须遵守，这些规则通常会由你所使用的 DBMS 手册详细说明。现在，我们将看一个简单的例子，来修改 `proglang_tbl` 表中的
    `author` 字段。


    ```

    ALTER TABLE   ;

    Listing 4-7

    ALTER TABLE 命令的通用语法

    ```


    为了保持我们的 `proglang_tbl` 不变，我们将对旧的 `proglang_tbluk` 表进行更改。我们希望 `author` 字段能容纳稍多一点的最大数据长度，即
    30 个字符，而不是 25 个。在这种情况下，我们要选择的操作是 `ALTER COLUMN`，它将修改我们现有的字段（代码清单 [4-8](#A457348_1_En_4_Chapter.html#Par27)）。


    ```

    ALTER TABLE proglang_tbluk

    ALTER COLUMN author TYPE varchar(30);

    Listing 4-8

    修改 author 字段

    ```


    如果你没有使用 SQLite，上面的查询在 PostgreSQL 中应该能安静地执行。不幸的是，SQLite 不支持修改列大小，但它愉快地支持添加新列。所以让我们增加另一个需求，向我们的表字段中添加一个可为空的
    `current_status` 列（代码清单 [4-9](#A457348_1_En_4_Chapter.html#Par29)）。


    ```

    ALTER TABLE proglang_tbluk

    ADD COLUMN current_status VARCHAR(32) NULL;

    Listing 4-9

    添加一个新的 current_status 字段

    ```


    在这种情况下，我们对 `ALTER TABLE` 命令使用了 `ADD COLUMN` 操作。不出所料，我们希望用这条语句向我们的 `proglang_tbluk`
    中添加这个新的 32 字符长度的列。


    ### ALTER TABLE 的多种形式


    修改表是那种即使过了三十年，仍然存在差异的命令之一。例如，你已经看到 `ALTER COLUMN` 在 SQLite 中不起作用。另一个 DBMS Ingres
    要求你只写 `ALTER`，这碰巧在 PostgreSQL 中也能正常工作。我们选择前者是为了更明确。另一方面，Oracle 走了一条完全不同的路，它使用
    `MODIFY` 而不是 `ALTER COLUMN`。


    类似地，在添加列时，在 PostgreSQL 或 SQLite 中你可以只写 `ADD <列名>`，并期望它能工作。


    然而，在修改数据类型时，PostgreSQL 期望你在列名和新的数据类型说明之间写上 `TYPE`，而 Ingres 则不期望这样。


    请务必随身携带你的 DBMS 手册！


    ## Showing Table Information in PostgreSQL


    如果你正在考虑使用数据库系统目录来获取表定义信息以验证你的 `ALTER TABLE` 结果，恭喜你！你确实想对了。和以前一样，查询可能看起来有点复杂，在本文的这个阶段可能难以完全掌握，但它的输出高度可读（代码清单
    [4-10](#A457348_1_En_4_Chapter.html#Par36)）。


    ```

    testdb=# SELECT column_name,

    data_type,

    character_maximum_length

    FROM INFORMATION_SCHEMA.COLUMNS

    WHERE table_name = ''proglang_tbluk'';

    column_name   |     data_type     | character_maximum_length

    ----------------+-------------------+--------------------------

    id             | integer           |

    language       | character varying |                       20

    author         | character varying |                       30

    year           | integer           |

    standard       | character varying |                       10

    current_status | character varying |                       32

    (6 rows)

    Listing 4-10

    通过查询目录在 PostgreSQL 中查看字段信息

    ```


    我们对 `author` 和 `current_status` 字段的修改似乎都得到了正确的反映。还有其他一些数据库可以使用这样的查询，但不幸的是，这也是一个不同
    DBMS 实现差异很大的领域。


    一个 PostgreSQL `psql` 特有的方法是使用 `\d+ <表名>`，默认情况下它会提供几乎相同的信息以及一些其他值（代码清单 [4-11](#A457348_1_En_4_Chapter.html#Par39)）。我个人更喜欢查询目录的代码清单
    [4-10](#A457348_1_En_4_Chapter.html#Par36) 版本。


    ```

    testdb=# \d+ proglang_tbluk;

    Table "public.proglang_tbluk"

    Column       |         Type          | Modifiers | Storage  |

    ---------------+-----------------------+-----------+----------+

    id            | integer               |           | plain    |

    language      | character varying(20) |           | extended |

    author        | character varying(30) |           | extended |

    year          | integer               |           | plain    |

    standard      | character varying(10) |           | extended |

    current_status | character varying(32) |           | extended |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    Listing 4-11

    在 psql 中描述表的模式

    ```


    ## Showing Table Information in SQLite


    正如我们已经讨论过的，在撰写本文时，SQLite 不支持使用 `ALTER TABLE` 来修改表中列的大小。然而，它确实允许你添加一个新列，并且我们像在
    PostgreSQL 中一样添加了 `current_status` 字段。现在让我们通过查看 SQLite shell 内部的表信息来验证这一点。


    SQLite 有自己的特殊点语法命令，允许执行某些有用的数据库管理任务。我们已经见过用于创建和打开数据库的 `.open` 命令，以及用于列出表名的 `.tables`
    命令。类似地，我们可以使用 `.schema` 命令来获取表信息（代码清单 [4-12](#A457348_1_En_4_Chapter.html#Par42)）。


    ```

    sqlite> .schema proglang_tbluk

    CREATE TABLE proglang_tbluk (

    id             INTEGER     NOT NULL  PRIMARY KEY,

    language       VARCHAR(20) NOT NULL  UNIQUE,

    author         VARCHAR(25) NOT NULL,

    year           INTEGER     NOT NULL,

    standard       VARCHAR(10) NULL,

    current_status VARCHAR(32) NULL);

    Listing 4-12

    在 SQLite 中显示模式信息

    ```


    注意新列是如何被添加到末尾的，而 `author` 字段的长度仍然是 25 个字符。


    ## Showing Table Information in Other DBMS’s


    如果你没有在上述两种 DBMS 实现上进行练习，可能还有其他方法来验证表字段级别的信息。例如，Ingres 使用 `HELP TABLE <表名>` 命令，可以在它的
    `isql` shell 中运行。


    许多其他 DBMS，如 Oracle，使用 `DESCRIBE` 命令来查看表定义。虽然这个命令显示的信息可能因 DBMS 而异，但它们至少会显示字段名、其数据类型以及该字段是否允许
    NULL 值。该命令的通用语法如下所示（代码清单 [4-13](#A457348_1_En_4_Chapter.html#Par46)）。


    ```

    DESCRIBE ;

    Listing 4-13

    DESCRIBE 语句的通用语法

    ```'
  raw: '## Modifying Tables


    After a table has been created, you can still modify its structure using the `ALTER
    TABLE` command (Listing [4-7](#A457348_1_En_4_Chapter.html#Par25)). What we mean
    by modify is that you can change field types, sizes, even add or delete columns.
    Not all database management systems support all operations of `ALTER TABLE`. To
    get around such limitations, people frequently copy the data over to a new table
    that has the newly required structure. While altering a table is not an SQL command
    you’d use very often (hopefully!), you should be familiar with it.


    There are some rules you have to abide by while altering a table and these are
    usually spelled out in detail by your particular DBMS manual. For now, we will
    see a simple example to modify the field author for the proglang_tbl table.


    ```

    ALTER TABLE   ;

    Listing 4-7

    General syntax of a simple ALTER TABLE command

    ```


    To keep our proglang_tbl intact, we are going to be making our changes to the
    old proglang_tbluk table. We want to make the author field hold a tad bit more
    maximum data length of 30 characters instead of 25\. The operation to choose in
    this case is `ALTER COLUMN,` which would modify our existing field (Listing [4-8](#A457348_1_En_4_Chapter.html#Par27)).


    ```

    ALTER TABLE proglang_tbluk

    ALTER COLUMN author TYPE varchar(30);

    Listing 4-8

    Altering the author field

    ```


    If you not using SQLite, the above query should execute quietly in PostgreSQL.
    SQLite unfortunately does not support altering a column size but happily supports
    addition of new columns. So let’s add another requirement of adding a nullable
    column current_status to our table fields (Listing [4-9](#A457348_1_En_4_Chapter.html#Par29)).


    ```

    ALTER TABLE proglang_tbluk

    ADD COLUMN current_status VARCHAR(32) NULL;

    Listing 4-9

    Adding a new current_status field

    ```


    We have used the `ADD COLUMN` operation in this case for the ALTER TABLE command
    . Unsurprisingly we hope to add this new 32-character length column to our proglang_tbluk
    with this statement.


    The many faces of ALTER TABLE


    Altering a table is one of those commands where even after three decades, there
    are discrepancies. For example, you already saw that the `ALTER COLUMN` doesn’t
    work in SQLite. Ingres; another, DBMS, expects you to write `ALTER` only, which
    coincidentally also works fine for PostgreSQL. We choose the former to be explicit.
    Oracle on the other hand has gone a completely different way, and it uses `MODIFY`
    instead of `ALTER COLUMN`.


    Similarly, while adding a column, you could write only `ADD <column name>` in
    PostgreSQL or SQLite and expect it to work.


    However, while altering data types, PostgreSQL expects you to write `TYPE` between
    the column name and the new data type specification whereas Ingres wouldn’t expect
    it.


    Always keep the manual of your DBMS handy!


    ## Showing Table Information in PostgreSQL


    If you are thinking about using the database system catalog to get table definition
    information to verify your ALTER TABLE results, congratulations! You are indeed
    correct in thinking that. As before, the query might seem a little more than we
    can handle correctly at this point in the text, but it’s output is highly readable
    (Listing [4-10](#A457348_1_En_4_Chapter.html#Par36)).


    ```

    testdb=# SELECT column_name,

    data_type,

    character_maximum_length

    FROM INFORMATION_SCHEMA.COLUMNS

    WHERE table_name = ''proglang_tbluk'';

    column_name   |     data_type     | character_maximum_length

    ----------------+-------------------+--------------------------

    id             | integer           |

    language       | character varying |                       20

    author         | character varying |                       30

    year           | integer           |

    standard       | character varying |                       10

    current_status | character varying |                       32

    (6 rows)

    Listing 4-10

    Viewing field information in PostgreSQL by querying the catalog

    ```


    Both our changes to the fields author and current_status seem to be reflected
    correctly. There are a few other databases where such a query would work, but
    unfortunately this is another area where a lot of DBMS implementations differ
    widely.


    A PostgreSQL psql-specific method is to use `\d+ <table name>,` which gives almost
    the same information along with some other values by default (Listing [4-11](#A457348_1_En_4_Chapter.html#Par39)).
    I personally prefer the Listing [4-10](#A457348_1_En_4_Chapter.html#Par36) version
    that queries the catalog.


    ```

    testdb=# \d+ proglang_tbluk;

    Table "public.proglang_tbluk"

    Column       |         Type          | Modifiers | Storage  |

    ---------------+-----------------------+-----------+----------+

    id            | integer               |           | plain    |

    language      | character varying(20) |           | extended |

    author        | character varying(30) |           | extended |

    year          | integer               |           | plain    |

    standard      | character varying(10) |           | extended |

    current_status | character varying(32) |           | extended |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    Listing 4-11

    Describing the schema of the table in psql

    ```


    ## Showing Table Information in SQLite


    As we have already discussed SQLite, as of the writing of this text, does not
    support modification to column sizes in a table using `ALTER TABLE`. It does however
    allow you to add a new column, and we added the current_status field like with
    PostgreSQL. Let’s now verify this by looking at the table information inside the
    SQLite shell.


    SQLite has its own special dot syntax commands that allow certain useful database
    management tasks. We have already seen the `.open` command used to create and
    open a database and `.tables` to list the table names. Similarly we can use the
    `.schema` command to get table information (Listing [4-12](#A457348_1_En_4_Chapter.html#Par42)).


    ```

    sqlite> .schema proglang_tbluk

    CREATE TABLE proglang_tbluk (

    id             INTEGER     NOT NULL  PRIMARY KEY,

    language       VARCHAR(20) NOT NULL  UNIQUE,

    author         VARCHAR(25) NOT NULL,

    year           INTEGER     NOT NULL,

    standard       VARCHAR(10) NULL,

    current_status VARCHAR(32) NULL);

    Listing 4-12

    Displaying schema information in SQLite

    ```


    Notice how the new column is added at the end while the length of the author field
    remains 25 characters.


    ## Showing Table Information in Other DBMS’s


    If you are not practicing on either of the DBMS implementations mentioned above,
    there might be other ways to verify table field-level information. For example,
    Ingres utilizes the `HELP TABLE <table name>` command, which can be run on its
    isql shell.


    A lot of other DBMS’s like Oracle use the `DESCRIBE` command to view a table definition.
    While the information this command shows may vary from one DBMS to another, they
    at least show the field name, its data type, and whether or not NULL values are
    allowed for the particular field. The general syntax of the command is given below
    (Listing [4-13](#A457348_1_En_4_Chapter.html#Par46)).


    ```

    DESCRIBE ;

    Listing 4-13

    The general syntax of the DESCRIBE statement

    ```'
  trans: '## 修改表


    在创建表后，你仍然可以使用 `ALTER TABLE` 命令（代码清单 4-7）来修改其结构。所谓修改，是指你可以更改字段类型、大小，甚至添加或删除列。并非所有的数据库管理系统都支持
    `ALTER TABLE` 的所有操作。为了绕过这些限制，人们经常将数据复制到具有新结构的新表中。虽然修改表不是一个你会经常使用的 SQL 命令（希望如此！），但你应该熟悉它。


    在修改表时，有一些规则你必须遵守，这些规则通常会由你所使用的 DBMS 手册详细说明。现在，我们将看一个简单的例子，来修改 `proglang_tbl` 表中的
    `author` 字段。


    ```

    ALTER TABLE   ;

    Listing 4-7

    ALTER TABLE 命令的通用语法

    ```


    为了保持我们的 `proglang_tbl` 不变，我们将对旧的 `proglang_tbluk` 表进行更改。我们希望 `author` 字段能容纳稍多一点的最大数据长度，即
    30 个字符，而不是 25 个。在这种情况下，我们要选择的操作是 `ALTER COLUMN`，它将修改我们现有的字段（代码清单 4-8）。


    ```

    ALTER TABLE proglang_tbluk

    ALTER COLUMN author TYPE varchar(30);

    Listing 4-8

    修改 author 字段

    ```


    如果你没有使用 SQLite，上面的查询在 PostgreSQL 中应该能安静地执行。不幸的是，SQLite 不支持修改列大小，但它愉快地支持添加新列。所以让我们增加另一个需求，向我们的表字段中添加一个可为空的
    `current_status` 列（代码清单 4-9）。


    ```

    ALTER TABLE proglang_tbluk

    ADD COLUMN current_status VARCHAR(32) NULL;

    Listing 4-9

    添加一个新的 current_status 字段

    ```


    在这种情况下，我们对 `ALTER TABLE` 命令使用了 `ADD COLUMN` 操作。不出所料，我们希望用这条语句向我们的 `proglang_tbluk`
    中添加这个新的 32 字符长度的列。


    ### ALTER TABLE 的多种形式


    修改表是那种即使过了三十年，仍然存在差异的命令之一。例如，你已经看到 `ALTER COLUMN` 在 SQLite 中不起作用。另一个 DBMS Ingres
    要求你只写 `ALTER`，这碰巧在 PostgreSQL 中也能正常工作。我们选择前者是为了更明确。另一方面，Oracle 走了一条完全不同的路，它使用
    `MODIFY` 而不是 `ALTER COLUMN`。


    类似地，在添加列时，在 PostgreSQL 或 SQLite 中你可以只写 `ADD <列名>`，并期望它能工作。


    然而，在修改数据类型时，PostgreSQL 期望你在列名和新的数据类型说明之间写上 `TYPE`，而 Ingres 则不期望这样。


    请务必随身携带你的 DBMS 手册！


    ## 在 PostgreSQL 中显示表信息


    如果你正在考虑使用数据库系统目录来获取表定义信息以验证你的 `ALTER TABLE` 结果，恭喜你！你确实想对了。和以前一样，查询可能看起来有点复杂，在本文的这个阶段可能难以完全掌握，但它的输出高度可读（代码清单
    4-10）。


    ```

    testdb=# SELECT column_name,

    data_type,

    character_maximum_length

    FROM INFORMATION_SCHEMA.COLUMNS

    WHERE table_name = ''proglang_tbluk'';

    column_name   |     data_type     | character_maximum_length

    ----------------+-------------------+--------------------------

    id             | integer           |

    language       | character varying |                       20

    author         | character varying |                       30

    year           | integer           |

    standard       | character varying |                       10

    current_status | character varying |                       32

    (6 rows)

    Listing 4-10

    通过查询目录在 PostgreSQL 中查看字段信息

    ```


    我们对 `author` 和 `current_status` 字段的修改似乎都得到了正确的反映。还有其他一些数据库可以使用这样的查询，但不幸的是，这也是一个不同
    DBMS 实现差异很大的领域。


    一个 PostgreSQL `psql` 特有的方法是使用 `\d+ <表名>`，默认情况下它会提供几乎相同的信息以及一些其他值（代码清单 4-11）。我个人更喜欢查询目录的代码清单
    4-10 版本。


    ```

    testdb=# \d+ proglang_tbluk;

    Table "public.proglang_tbluk"

    Column       |         Type          | Modifiers | Storage  |

    ---------------+-----------------------+-----------+----------+

    id            | integer               |           | plain    |

    language      | character varying(20) |           | extended |

    author        | character varying(30) |           | extended |

    year          | integer               |           | plain    |

    standard      | character varying(10) |           | extended |

    current_status | character varying(32) |           | extended |

    Indexes:

    "proglang_tbluk_pkey" PRIMARY KEY, btree (id)

    "proglang_tbluk_language_key" UNIQUE CONSTRAINT, btree (language)

    Listing 4-11

    在 psql 中描述表的模式

    ```


    ## 在 SQLite 中显示表信息


    正如我们已经讨论过的，在撰写本文时，SQLite 不支持使用 `ALTER TABLE` 来修改表中列的大小。然而，它确实允许你添加一个新列，并且我们像在
    PostgreSQL 中一样添加了 `current_status` 字段。现在让我们通过查看 SQLite shell 内部的表信息来验证这一点。


    SQLite 有自己的特殊点语法命令，允许执行某些有用的数据库管理任务。我们已经见过用于创建和打开数据库的 `.open` 命令，以及用于列出表名的 `.tables`
    命令。类似地，我们可以使用 `.schema` 命令来获取表信息（代码清单 4-12）。


    ```

    sqlite> .schema proglang_tbluk

    CREATE TABLE proglang_tbluk (

    id             INTEGER     NOT NULL  PRIMARY KEY,

    language       VARCHAR(20) NOT NULL  UNIQUE,

    author         VARCHAR(25) NOT NULL,

    year           INTEGER     NOT NULL,

    standard       VARCHAR(10) NULL,

    current_status VARCHAR(32) NULL);

    Listing 4-12

    在 SQLite 中显示模式信息

    ```


    注意新列是如何被添加到末尾的，而 `author` 字段的长度仍然是 25 个字符。


    ## 在其他 DBMS 中显示表信息


    如果你没有在上述两种 DBMS 实现上进行练习，可能还有其他方法来验证表字段级别的信息。例如，Ingres 使用 `HELP TABLE <表名>` 命令，可以在它的
    `isql` shell 中运行。


    许多其他 DBMS，如 Oracle，使用 `DESCRIBE` 命令来查看表定义。虽然这个命令显示的信息可能因 DBMS 而异，但它们至少会显示字段名、其数据类型以及该字段是否允许
    NULL 值。该命令的通用语法如下所示（代码清单 4-13）。


    ```

    DESCRIBE ;

    Listing 4-13

    DESCRIBE 语句的通用语法

    ```'
- fmt: '# 5. Writing Basic Queries


    A query is an SQL statement that is used to extract a subset of data from your
    database and presents it in a readable format. As we have seen previously, the
    `SELECT` command is used to run queries in SQL. You can further add clauses to
    your query to get a filtered, more meaningful result. The level of flexibility
    afforded by SQL is one of the reasons it has succeeded as a query language. While
    there is an entire gamut of add-ons to `SELECT`, in this chapter we will focus
    on only two – `ORDER BY` and `WHERE`.


    Database administration tasks for a well thought-out schema are few and far between,
    but retrieving meaningful results using queries is something everyone does routinely.
    Since the majority of operations on a database involve queries, it is important
    to understand them in detail. While this chapter will only deal with queries run
    on a single table, you can run a `SELECT` operation on multiple tables in a single
    statement.


    ## Selecting a Limited Number of Columns


    The intention since the beginning of SQL was to provide an easy-to-use query system
    to everyday users. They should not have to reach for a programming language to
    make their report readable. A major facility for this is the ability to display
    a finite set of columns in the output rather than all the fields of a table.


    We have already seen how to extract all the data from a table when we were verifying
    our results in the previous chapters. But as you might have noted in some of our
    catalog queries – we can extract a subset of data too. We first test this by limiting
    the number of fields to show in the query output by not specifying the `*` selection
    criteria, but by naming the fields explicitly as a comma-separated list (Listing
    5-1).


    | language | year |

    | --- | --- |

    | Prolog | 1972 |

    | Perl | 1987 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl;

    ```


    Listing 5-1: Selecting a subset of fields from a table


    You can see that the query we constructed mentioned the fields we wish to see,
    that is, `language` and `year`. Also note that the result of this query is useful
    by itself as a report for looking at the chronology of programming language creation.
    While this is not a rule enforced by SQL or a relation database management system,
    it makes sense to construct your query in such a way that the meaning is self-evident
    if the output is meant to be read by a human. This is the reason we left out the
    field `id` in the query, since it has no inherent meaning to the reader except
    if they wish to know the sequential order of the storage of records in the table.


    You are free to decide the ordering of the fields in your output. The positioning
    of a field in a `CREATE TABLE` statement has no effect on any `SELECT` query you
    run on it. Indeed, you are even free to duplicate a field as many times as you
    wish in your output. Whether it makes sense to do so is debatable! But as long
    as the field names in the comma-separated list to `SELECT` is valid, it will show
    up in the output.


    ## Ordering the Results


    You might have noticed that in our previous query output, the languages were printed
    out in the same order as we had inserted them. But what if we wanted to sort the
    results by the year the language was created in. The chronological order might
    make more sense if we wish to view the development of programming languages through
    the decades. In such cases, we take the help of the `ORDER BY` clause. To achieve
    our purpose, we modify our query with this additional clause (Listing 5-2).


    | language | year |

    | --- | --- |

    | APL | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year;

    ```


    Listing 5-2: Usage of the ORDER BY clause


    The astute reader will notice that the output of our `ORDER BY` clause was ascending.
    This is the default ordering that can be made explicit by appending the argument
    `ASC` to the column we wish to sort. To reverse this, we use the argument `DESC`
    to our `ORDER BY` clause as below (Listing 5-3).


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year DESC;

    ```


    Listing 5-3: Usage of the ORDER BY clause with the DESC argument


    Ordering is not limited to numeric fields. You can order character-based columns
    too. The sorting method is alphabetical starting with the first character and
    subsequently moving to the next sequential characters if the character is the
    same. Let us try ordering our query result by the `language` field this time (Listing
    5-4).


    | language | year |

    | --- | --- |

    | APL | 1964 |

    | Perl | 1987 |

    | Prolog | 1972 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY language;

    ```


    Listing 5-4: Usage of the ORDER BY clause with a character based column


    ## Ordering Using Field Abbreviations


    A useful shortcut in SQL involves ordering a query result using an integer abbreviation
    instead of the complete field name. The abbreviations are formed starting with
    1, which is given to the first field specified in the query; 2 to the second field;
    and so on. Let’s rewrite our query to sort the output by descending year using
    field abbreviations (Listing 5-5).


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY 2 DESC;

    ```


    Listing 5-5: Ordered SELECT query in descending order using field abbreviations


    The `2` argument given to the `ORDER BY` clause signifies ordering by the second
    field specified in the query, namely `year`. Over time I have realized that the
    best use of field abbreviations is while you are querying a database system interactively.
    Rarely is it a good idea to use field abbreviations if you are embedding SQL inside
    a programming language.


    ## Ordering by Multiple Columns


    What if you wanted to order your results by more than one column? It would be
    a plausible scenario where some of the values of the ordering column are the same.
    For example, supposing you had a table having student grades and names. You want
    to order the students by their grades, but a lot of students have gotten the Grade
    A. So you apply a second ordering by name, sorting alphabetically all grade A
    students, then grade B students and so on.


    Let’s try to see a working example of this using our programming languages table.
    But for that we need to insert a few more rows in there (Listing 5-6).


    ```sql

    INSERT INTO proglang_tbl (id, language, author, year, standard)

    VALUES (4, ''JOVIAL'', ''Schwartz'', 1959, ''US-DOD'');


    INSERT INTO proglang_tbl (id, language, author, year, standard)

    VALUES (5, ''APT'', ''Ross'', 1959, ''ISO'');

    ```


    Listing 5-6: Inserting a few more languages in our table


    Now let us order our programming languages table by `year` and `language` keeping
    in mind that our newly inserted languages have the same year of creation (Listing
    5-7).


    | language | year |

    | --- | --- |

    | APT | 1959 |

    | JOVIAL | 1959 |

    | APL | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year, language;

    ```


    Listing 5-7: Ordering by more than one columns


    You can even use different ordering types for each of the columns (Listing 5-8).


    | language | year |

    | --- | --- |

    | Perl | 1987 |

    | Prolog | 1972 |

    | APL | 1964 |

    | APT | 1959 |

    | JOVIAL | 1959 |


    ```sql

    SELECT language, year FROM proglang_tbl ORDER BY year DESC, language ASC;

    ```


    Listing 5-8: Combining different ordering types


    Notice how `APT` came before `JOVIAL` because we had mentioned an ascending order
    for the `language` field.'
