- fmt: "# 统计表中的记录数\n\n有时我们只想知道表中存在多少条记录，而不实际输出这些记录的全部内容。这可以通过使用一个名为 `COUNT` 的 SQL\
    \ 函数来实现。让我们先看看上次离开时 `proglang_tbl` 表的内容（表 8-1）。\n\n**表 8-1**\n\n来自第 6 章的 `proglang_tbl`\
    \ 内容\n\n| id | language | author | year | standard |\n| --- | --- | --- | ---\
    \ | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987\
    \ |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL | Schwartz | 1959 |\
    \ US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout | 1988 | \
    \  |\n\n我们可以清楚地看到，使用表的最后一行（本例中为 7）的 id 显然不是一个好主意。虽然过去表中可能有 7 行，但我们实际上删除了 Forth\
    \ 语言那一行。此外，我们不能总是依赖这样一个字段，特别是当我们可以插入一个 id 为 4711 而没有人抱怨时。显然，我们需要 `COUNT` 来拯救我们（代码清单\
    \ 8-1）。\n\n```sql\nSELECT COUNT(*) FROM proglang_tbl;\n```\n\n**代码清单 8-1**\n统计表中记录数的查询\n\
    \n返回的输出将是一个包含单个字段的单条记录，其值为 `6`。函数 `COUNT` 接受一个参数，即要计数的内容，我们提供了 `*`，这意味着整个记录。这样我们就达到了统计表中记录数的目的。\n\
    \n如果改为指定一个列来计数，会发生什么？如果该列有 null 值呢？让我们通过统计表中的 `standard` 字段来看看这种情况（代码清单 8-2）。\n\
    \n```sql\nSELECT COUNT(standard) FROM proglang_tbl;\n```\n\n**代码清单 8-2**\n统计表中\
    \ standard 字段非空值数量的查询\n\n如果你猜这个查询的输出值是 `4`，那就对了。在六行中，有两条记录的 standard 值为 null，留下四种语言有标准。\n\
    \n## 在 COUNT 中使用 DISTINCT\n\n细心的读者可能已经注意到，标准化语言的数量是通过计算非空 standard 值的数量得出的。然而，结果集中包含了一个重复的标准机构值——APT\
    \ 和 Prolog 都是 ISO。\n\n有时，能够排除这样的重复项是很有用的。`DISTINCT` 子句允许我们只利用输入的非重复值，并且通常与 `COUNT`\
    \ 结合使用。在看实际操作之前，让我们向表中添加另一行，以便清楚地展示使用 `DISTINCT` 的结果（代码清单 8-3）。\n\n```sql\nINSERT\
    \ INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n(6, 'PL/I',\
    \ 'IBM', 1964, 'ECMA');\n```\n\n**代码清单 8-3**\n在编程语言表中插入新行\n\n请注意我们为新行选择的新数据。有了\
    \ PL/I，我们现在有了第四个独特的标准机构——ECMA。PL/I 还与 APL 共享相同的诞生年份（1964 年），这给我们带来了一个重复的年份字段。现在让我们运行一个查询来检查表中有哪些不同的年份值（代码清单\
    \ 8-4）。\n\n```sql\nSELECT DISTINCT year\nFROM proglang_tbl;\n```\n\n**代码清单 8-4**\n\
    表中的不同年份值\n\n| Year |\n| --- |\n| 1972 |\n| 1988 |\n| 1987 |\n| 1964 |\n| 1959\
    \ |\n\n正如我们所期望的，1964 和 1959 都只出现了一次。`DISTINCT` 的一个常见用例是将其与 `COUNT` 函数结合使用，以输出表中唯一值的数量（代码清单\
    \ 8-5）。对年份尝试同样的操作，我们得到了预期的结果 `5`。\n\n```sql\nSELECT COUNT (DISTINCT year)\nFROM\
    \ proglang_tbl;\n> 5\n```\n\n**代码清单 8-5**\n统计不同年份值的数量\n\n在 `standard` 字段上使用 `DISTINCT`\
    \ 产生的输出与我们最初猜想的略有不同（代码清单 8-6）。\n\n```sql\nSELECT DISTINCT standard\nFROM proglang_tbl;\n\
    ```\n\n**代码清单 8-6**\n列出不同的 standard 值\n\n| standard |\n| --- |\n| (null) |\n|\
    \ ECMA |\n| ANSI |\n| ISO |\n| US-DOD |\n\n实际上，我们的输出得到了五行，包括 null 值，因为对于 `DISTINCT`\
    \ 子句来说，它是一个独特的单独值。将其与 `COUNT` 结合使用则去掉了 null 行的重要性，得到值 `4`（代码清单 8-7）。\n\n```sql\n\
    SELECT COUNT (DISTINCT standard)\nFROM proglang_tbl;\n> 4\n```\n\n**代码清单 8-7**\n\
    统计不同 standard 值的数量\n\n## 列别名\n\n查询经常被直接用作报告，因为 SQL 提供了足够的功能来对存储在关系数据库管理系统（RDBMS）中的数据进行有意义的表示。允许这样做的特性之一是列别名，它允许你重命名结果输出中的列标题。创建列别名的一般语法如下（代码清单\
    \ 8-8）。\n\n```sql\nSELECT column1 AS alias1,\n       column2 AS alias2,\n...\n\
    FROM table_name;\n```\n\n**代码清单 8-8**\n创建列别名的一般语法\n\n例如，我们希望输出编程语言表的几列。但我们不想将语言的作者称为\
    \ authors。想要这份报告的人希望他们被称为 creators。这可以通过使用下面的查询简单实现（代码清单 8-9）。\n\n```sql\nSELECT\
    \ id,\n       language,\n       author creator\nFROM proglang_tbl;\n```\n\n**代码清单\
    \ 8-9**\n出于报告目的将 author 字段重命名为 creator\n\n| id | language | creator |\n| --- |\
    \ --- | --- |\n| 1 | Prolog | Colmerauer |\n| 2 | Perl | Wall |\n| 3 | APL | Iverson\
    \ |\n| 4 | JOVIAL | Schwartz |\n| 5 | APT | Ross |\n| 7 | Tcl | Ousterhout |\n\
    | 6 | PL/I | IBM |\n\n虽然创建列别名不会永久重命名字段，但它会在结果输出中显示出来。不同的实现对于是否允许在列列表以外的其他查询部分使用列别名有所不同。例如，让我们尝试在\
    \ PostgreSQL 的 `WHERE` 子句中使用列别名 `creator`（代码清单 8-10）。\n\n```sql\nSELECT id,\n\
    \       language,\n       author creator\nFROM proglang_tbl WHERE creator = 'Ross';\n\
    ERROR:  column \"creator\" does not exist\nLINE 4: FROM proglang_tbl WHERE creator\
    \ = 'Ross';\n```\n\n**代码清单 8-10**\n在 PostgreSQL 的 WHERE 子句中使用列别名\n\n啊哈，PostgreSQL\
    \ 明确告诉我们这是不行的。让我们看看 SQLite 是否稍微宽容一些（代码清单 8-11）。\n\n```sql\nsqlite> SELECT id,\n\
    \       language,\n       author creator\nFROM proglang_tbl\nWHERE creator=\"\
    Ross\";\nid          language    creator\n----------  ----------  ----------\n\
    5           APT         Ross\n```\n\n**代码清单 8-11**\n在 SQLite 的 WHERE 子句中使用列别名\n\
    \n虽然 SQLite 确实允许这样做，但我并不真正喜欢在输出列重命名之外的任何地方使用列别名。我建议你也这样做，除非有非常强的可读性改进理由，并且你的实现允许它（而允许的实现非常少）。"
  raw: "## Counting the Records in a Table\n\nSometimes we just wish to know how many\
    \ records exist in a table without actually outputting the entire contents of\
    \ these records. This can be achieved through the use of an SQL function called\
    \ `COUNT`. Let us first see the contents of the proglang_tbl table when we last\
    \ left it (Table [8-1](#A457348_1_En_8_Chapter.html#Tab1)).\n\nTable 8-1\n\nproglang_tbl\
    \ contents from Chapter [6](#A457348_1_En_6_Chapter.html)\n\n| id | language |\
    \ author | year | standard |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog |\
    \ Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |   |\n| 3 | APL | Iverson\
    \ | 1964 | ANSI |\n| 4 | JOVIAL | Schwartz | 1959 | US-DOD |\n| 5 | APT | Ross\
    \ | 1959 | ISO |\n| 7 | Tcl | Ousterhout | 1988 |   |\n\nWe can clearly see that\
    \ using the id of the last row of the table, 7 in this case, is clearly not a\
    \ good idea. While there may have been 7 rows in the table at some point in the\
    \ past, we had actually deleted the Forth language row. Additionally we cannot\
    \ always rely on such a field, especially when we could have inserted an id of\
    \ 4711 in the field without anybody complaining. Clearly, we need `COUNT` to come\
    \ to our rescue (Listing [8-1](#A457348_1_En_8_Chapter.html#Par5)).\n\n```\nSELECT\
    \ COUNT(*) FROM proglang_tbl;\nListing 8-1\nQuery to count number of records in\
    \ the table\n```\n\nThe output returned will be a single record with a single\
    \ field with the value as `6`. The function `COUNT` took one argument, that is,\
    \ what to count and we provided it with `*` that means the entire record. Thus\
    \ we achieved our purpose of counting records in a table.\n\nWhat would happen\
    \ if instead of giving an entire record to count, we explicitly specify a column?\
    \ And what if the column had null values? Let's see this scenario by counting\
    \ on the standard field of the table (Listing [8-2](#A457348_1_En_8_Chapter.html#Par8)).\n\
    \n```\nSELECT COUNT(standard) FROM proglang_tbl;\nListing 8-2\nQuery to count\
    \ number of standard field values in the table\n```\n\nIf you guessed the output\
    \ of this query as the value `4`, you are correct. Out of the six rows, two records\
    \ contain null as their standard value leaving out four languages with a standard.\n\
    \n## Using DISTINCT with COUNT\n\nThe astute reader might have noticed that the\
    \ number of standardized languages was computed by counting the number of non-null\
    \ standard values. However the resultset contained a duplicate standards body\
    \ value – ISO for both APT and Prolog.\n\nSometimes it is useful to be able to\
    \ leave out such duplicates. The `DISTINCT` clause allows us to utilize only non-duplicated\
    \ values of the input specified and is commonly used in conjunction with `COUNT`.\
    \ Before seeing it in action, let’s add another row to our table so that the results\
    \ of using `DISTINCT` jump out clearly (Listing [8-3](#A457348_1_En_8_Chapter.html#Par12)).\n\
    \n```\nINSERT INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n\
    (6, 'PL/I', 'IBM', 1964, 'ECMA');\nListing 8-3\nInserting a new row in our programming\
    \ languages table\n```\n\nNote the new data choice that we are populating with\
    \ our new row. With PL/I we now have a fourth distinctive standards organization –\
    \ ECMA. PL/I also shares the same birth year as APL (1964) giving us a duplicate\
    \ year field. Now let us run a query to check what distinct year values we have\
    \ in the table (Listing [8-4](#A457348_1_En_8_Chapter.html#Par14)).\n\n| Year\
    \ |\n| --- |\n| 1972 |\n| 1988 |\n| 1987 |\n| 1964 |\n| 1959 |\n\n```\nSELECT\
    \ DISTINCT year\nFROM proglang_tbl;\nListing 8-4\nDistinct year values in the\
    \ table\n```\n\nBoth 1964 and 1959 make an appearance only once as we desired.\
    \ A common use case for `DISTINCT` is to combine it with the `COUNT` function\
    \ to output the number of unique values we have in the table (Listing [8-5](#A457348_1_En_8_Chapter.html#Par16)).\
    \ Attempting the same for year, we get our expected result of `5`.\n\n```\nSELECT\
    \ COUNT (DISTINCT year)\nFROM proglang_tbl;\n> 5\nListing 8-5\nCounting distinct\
    \ year values\n```\n\nUsing `DISTINCT` on the standard field has a slightly different\
    \ output than we might expect at first guess (Listing [8-6](#A457348_1_En_8_Chapter.html#Par18)).\n\
    \n| standard |\n| --- |\n| (null) |\n| ECMA |\n| ANSI |\n| ISO |\n| US-DOD |\n\
    \n```\nSELECT DISTINCT standard\nFROM proglang_tbl;\nListing 8-6\nListing distinct\
    \ standard values\n```\n\nWe actually get five rows in our output including the\
    \ null value because for the `DISTINCT` clause, it is a uniquely separate value.\
    \ Combining this with `COUNT` removes the significance of the null row giving\
    \ us the value `4` (Listing [8-7](#A457348_1_En_8_Chapter.html#Par20)).\n\n```\n\
    SELECT COUNT (DISTINCT standard)\nFROM proglang_tbl;\n> 4\nListing 8-7\nCounting\
    \ distinct standard values\n```\n\n## Column Aliases\n\nQueries are frequently\
    \ consumed directly as reports since SQL provides enough functionality to give\
    \ a meaningful representation to the data stored inside a RDBMS. One of the features\
    \ allowing this is Column Aliases, which let you rename column headings in the\
    \ resultant output. The general syntax for creating a column alias is given below\
    \ (Listing [8-8](#A457348_1_En_8_Chapter.html#Par22)).\n\n```\nSELECT  ,\n ,\n\
    ...\nFROM ;\nListing 8-8\nGeneral syntax for creating column aliases\n```\n\n\
    For example, we wish to output our programming languages table with a few columns\
    \ only. But we do not wish to call the authors of the language as authors. The\
    \ person wanting the report wishes they be called creators. This can be simply\
    \ done by using the query below (Listing [8-9](#A457348_1_En_8_Chapter.html#Par24)).\n\
    \n| id | language | creator |\n| --- | --- | --- |\n| 1 | Prolog | Colmerauer\
    \ |\n| 2 | Perl | Wall |\n| 3 | APL | Iverson |\n| 4 | JOVIAL | Schwartz |\n|\
    \ 5 | APT | Ross |\n| 7 | Tcl | Ousterhout |\n| 6 | PL/I | IBM |\n\n```\nSELECT\
    \ id,\nlanguage,\nauthor creator\nFROM proglang_tbl;\nListing 8-9\nRenaming the\
    \ author field to creator for reporting purposes\n```\n\nWhile creating a column\
    \ alias will not permanently rename a field, it will show up in the resultant\
    \ output. Implementations differ on whether they allow column aliases to be used\
    \ in other parts of the query other than column listing. For example, let’s try\
    \ using the column alias creator in the `WHERE` clause of a query in PostgreSQL\
    \ (Listing [8-10](#A457348_1_En_8_Chapter.html#Par26)).\n\n```\nSELECT id,\nlanguage,\n\
    author creator\nFROM proglang_tbl WHERE creator = 'Ross';\nERROR:  column \"creator\"\
    \ does not exist\nLINE 4: FROM proglang_tbl WHERE creator = 'Ross';\nListing 8-10\n\
    Using column aliases in the WHERE clause in PostgreSQL\n```\n\nAha, PostgreSQL\
    \ explicitly told us that this is a no-go. Let’s see if SQLite is slightly more\
    \ forgiving (Listing [8-11](#A457348_1_En_8_Chapter.html#Par28)).\n\n```\nsqlite>\
    \ SELECT id,\nlanguage,\nauthor creator\nFROM proglang_tbl\nWHERE creator=\"Ross\"\
    ;\nid          language    creator\n----------  ----------  ----------\n5    \
    \       APT         Ross\nListing 8-11\nUsing column aliases in the WHERE clause\
    \ in SQLite\n```\n\nWhile SQLite did allow it, I’m not really fond of using column\
    \ aliases in anything other than column renaming for the output. I’d advise that\
    \ you do the same unless there is a very strong case of readability improvement\
    \ and your implementation allows it (and there are very few that allow it)."
  trans: "# 统计表中的记录数\n\n有时我们只想知道表中存在多少条记录，而不实际输出这些记录的全部内容。这可以通过使用一个名为 `COUNT` 的 SQL\
    \ 函数来实现。让我们先看看上次离开时 `proglang_tbl` 表的内容（表 8-1）。\n\n**表 8-1**\n\n来自第 6 章的 `proglang_tbl`\
    \ 内容\n\n| id | language | author | year | standard |\n| --- | --- | --- | ---\
    \ | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987\
    \ |   |\n| 3 | APL | Iverson | 1964 | ANSI |\n| 4 | JOVIAL | Schwartz | 1959 |\
    \ US-DOD |\n| 5 | APT | Ross | 1959 | ISO |\n| 7 | Tcl | Ousterhout | 1988 | \
    \  |\n\n我们可以清楚地看到，使用表的最后一行（本例中为 7）的 id 显然不是一个好主意。虽然过去表中可能有 7 行，但我们实际上删除了 Forth\
    \ 语言那一行。此外，我们不能总是依赖这样一个字段，特别是当我们可以插入一个 id 为 4711 而没有人抱怨时。显然，我们需要 `COUNT` 来拯救我们（代码清单\
    \ 8-1）。\n\n```sql\nSELECT COUNT(*) FROM proglang_tbl;\n```\n\n**代码清单 8-1**\n统计表中记录数的查询\n\
    \n返回的输出将是一个包含单个字段的单条记录，其值为 `6`。函数 `COUNT` 接受一个参数，即要计数的内容，我们提供了 `*`，这意味着整个记录。这样我们就达到了统计表中记录数的目的。\n\
    \n如果改为指定一个列来计数，会发生什么？如果该列有 null 值呢？让我们通过统计表中的 `standard` 字段来看看这种情况（代码清单 8-2）。\n\
    \n```sql\nSELECT COUNT(standard) FROM proglang_tbl;\n```\n\n**代码清单 8-2**\n统计表中\
    \ standard 字段非空值数量的查询\n\n如果你猜这个查询的输出值是 `4`，那就对了。在六行中，有两条记录的 standard 值为 null，留下四种语言有标准。\n\
    \n## 在 COUNT 中使用 DISTINCT\n\n细心的读者可能已经注意到，标准化语言的数量是通过计算非空 standard 值的数量得出的。然而，结果集中包含了一个重复的标准机构值——APT\
    \ 和 Prolog 都是 ISO。\n\n有时，能够排除这样的重复项是很有用的。`DISTINCT` 子句允许我们只利用输入的非重复值，并且通常与 `COUNT`\
    \ 结合使用。在看实际操作之前，让我们向表中添加另一行，以便清楚地展示使用 `DISTINCT` 的结果（代码清单 8-3）。\n\n```sql\nINSERT\
    \ INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n(6, 'PL/I',\
    \ 'IBM', 1964, 'ECMA');\n```\n\n**代码清单 8-3**\n在编程语言表中插入新行\n\n请注意我们为新行选择的新数据。有了\
    \ PL/I，我们现在有了第四个独特的标准机构——ECMA。PL/I 还与 APL 共享相同的诞生年份（1964 年），这给我们带来了一个重复的年份字段。现在让我们运行一个查询来检查表中有哪些不同的年份值（代码清单\
    \ 8-4）。\n\n```sql\nSELECT DISTINCT year\nFROM proglang_tbl;\n```\n\n**代码清单 8-4**\n\
    表中的不同年份值\n\n| Year |\n| --- |\n| 1972 |\n| 1988 |\n| 1987 |\n| 1964 |\n| 1959\
    \ |\n\n正如我们所期望的，1964 和 1959 都只出现了一次。`DISTINCT` 的一个常见用例是将其与 `COUNT` 函数结合使用，以输出表中唯一值的数量（代码清单\
    \ 8-5）。对年份尝试同样的操作，我们得到了预期的结果 `5`。\n\n```sql\nSELECT COUNT (DISTINCT year)\nFROM\
    \ proglang_tbl;\n> 5\n```\n\n**代码清单 8-5**\n统计不同年份值的数量\n\n在 `standard` 字段上使用 `DISTINCT`\
    \ 产生的输出与我们最初猜想的略有不同（代码清单 8-6）。\n\n```sql\nSELECT DISTINCT standard\nFROM proglang_tbl;\n\
    ```\n\n**代码清单 8-6**\n列出不同的 standard 值\n\n| standard |\n| --- |\n| (null) |\n|\
    \ ECMA |\n| ANSI |\n| ISO |\n| US-DOD |\n\n实际上，我们的输出得到了五行，包括 null 值，因为对于 `DISTINCT`\
    \ 子句来说，它是一个独特的单独值。将其与 `COUNT` 结合使用则去掉了 null 行的重要性，得到值 `4`（代码清单 8-7）。\n\n```sql\n\
    SELECT COUNT (DISTINCT standard)\nFROM proglang_tbl;\n> 4\n```\n\n**代码清单 8-7**\n\
    统计不同 standard 值的数量\n\n## 列别名\n\n查询经常被直接用作报告，因为 SQL 提供了足够的功能来对存储在关系数据库管理系统（RDBMS）中的数据进行有意义的表示。允许这样做的特性之一是列别名，它允许你重命名结果输出中的列标题。创建列别名的一般语法如下（代码清单\
    \ 8-8）。\n\n```sql\nSELECT column1 AS alias1,\n       column2 AS alias2,\n...\n\
    FROM table_name;\n```\n\n**代码清单 8-8**\n创建列别名的一般语法\n\n例如，我们希望输出编程语言表的几列。但我们不想将语言的作者称为\
    \ authors。想要这份报告的人希望他们被称为 creators。这可以通过使用下面的查询简单实现（代码清单 8-9）。\n\n```sql\nSELECT\
    \ id,\n       language,\n       author creator\nFROM proglang_tbl;\n```\n\n**代码清单\
    \ 8-9**\n出于报告目的将 author 字段重命名为 creator\n\n| id | language | creator |\n| --- |\
    \ --- | --- |\n| 1 | Prolog | Colmerauer |\n| 2 | Perl | Wall |\n| 3 | APL | Iverson\
    \ |\n| 4 | JOVIAL | Schwartz |\n| 5 | APT | Ross |\n| 7 | Tcl | Ousterhout |\n\
    | 6 | PL/I | IBM |\n\n虽然创建列别名不会永久重命名字段，但它会在结果输出中显示出来。不同的实现对于是否允许在列列表以外的其他查询部分使用列别名有所不同。例如，让我们尝试在\
    \ PostgreSQL 的 `WHERE` 子句中使用列别名 `creator`（代码清单 8-10）。\n\n```sql\nSELECT id,\n\
    \       language,\n       author creator\nFROM proglang_tbl WHERE creator = 'Ross';\n\
    ERROR:  column \"creator\" does not exist\nLINE 4: FROM proglang_tbl WHERE creator\
    \ = 'Ross';\n```\n\n**代码清单 8-10**\n在 PostgreSQL 的 WHERE 子句中使用列别名\n\n啊哈，PostgreSQL\
    \ 明确告诉我们这是不行的。让我们看看 SQLite 是否稍微宽容一些（代码清单 8-11）。\n\n```sql\nsqlite> SELECT id,\n\
    \       language,\n       author creator\nFROM proglang_tbl\nWHERE creator=\"\
    Ross\";\nid          language    creator\n----------  ----------  ----------\n\
    5           APT         Ross\n```\n\n**代码清单 8-11**\n在 SQLite 的 WHERE 子句中使用列别名\n\
    \n虽然 SQLite 确实允许这样做，但我并不真正喜欢在输出列重命名之外的任何地方使用列别名。我建议你也这样做，除非有非常强的可读性改进理由，并且你的实现允许它（而允许的实现非常少）。"
- fmt: '## Order of Execution of SELECT Queries


    A query is not evaluated from left to right; there is a specific sequence in which
    its various parts are evaluated as given below.


    1.  `FROM` clause

    2.  `WHERE` clause

    3.  `GROUP BY` clause

    4.  `HAVING` clause

    5.  `SELECT` clause

    6.  `ORDER BY` clause


    There is an interesting corollary of having the `SELECT` evaluation being lower
    than the `WHERE` clause. Can you guess what it is?


    It is the inability of database management systems like PostgreSQL, DB2, and Microsoft
    SQL Server to use column aliases in the `WHERE` clause. Until the point the query
    execution is on the filtering stage using the conditions provided, it has still
    not resolved the column aliases of the query.


    Let’s test this by running a query in PostgreSQL where we use the column alias
    in the `ORDER BY` clause, the only one with a lower precedence (Listing [8-12](#A457348_1_En_8_Chapter.html#Par40)).


    ```sql

    testdb=# SELECT id,

    language,

    author creator

    FROM proglang_tbl

    ORDER BY creator;

    id | language |  creator

    ----+----------+------------

    1 | Prolog   | Colmerauer

    6 | PL/I     | IBM

    3 | APL      | Iverson

    7 | Tcl      | Ousterhout

    5 | APT      | Ross

    4 | JOVIAL   | Schwartz

    2 | Perl     | Wall

    (7 rows)

    ```


    **Listing 8-12**

    Using column aliases in the `ORDER BY` clause


    Our reasoning was rewarded with the correct output, not that I would change my
    advice of using column aliases only with proper thought.


    ## Using the `LIKE` Operator


    While putting conditions on a query using `WHERE` clauses, we have already seen
    comparison operators `=` and `IS NULL`. Now we take a look at the `LIKE` operator,
    which will help us with wildcard comparisons. For matching we are provided with
    two wildcard characters to use with `LIKE`.


    - `%` (Percent) Used to match multiple characters including a single character
    and no character

    - `_` (Underscore) Used to match exactly one character


    We will first use the `%` character for wildcard matching. Let us suppose we wish
    to list out languages that start with the letter P (Listing [8-13](#A457348_1_En_8_Chapter.html#Par46)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''P%'';

    ```


    **Listing 8-13**

    All languages starting with P


    The output of the above query is all language records whose name begins with the
    letter capital P. While we don’t have such a record, note that this resultset
    would not include any language that starts with the small letter p.


    We can see that using the `%` wildcard allowed us to match multiple characters
    like `erl` in the case of `Perl`. But what if we wanted to restrict how many characters
    we wished to match? What if our goal was to write a query that displays the languages
    ending in the letter `l`, but are only three characters in length? The first condition
    could have been satisfied using the pattern `%l`, but to satisfy both conditions
    in the same query we use the `_` wildcard. A pattern like `%l` would result in
    returning both `Perl` and `Tcl`, but we modify our pattern suitably to return
    only the latter (Listing [8-14](#A457348_1_En_8_Chapter.html#Par49)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 7 | Tcl | Ousterhout | 1988 |   |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''__l'';

    ```


    **Listing 8-14**

    All languages ending with l and 3 characters long


    Note that the result did not include `Perl` since we explicitly gave two underscores
    to match two characters only. Also it did not match `APL` or `JOVIAL` since SQL
    data is case sensitive and `l` is not equal to `L`.


    We can also use `NOT` in conjunction with `LIKE` to negate or inverse the result.
    If we used a `NOT` in the conditional clause of Listing [8-14](#A457348_1_En_8_Chapter.html#Par49),
    what languages do we expect to get back in the result? Having `Perl`, `APL`, and
    `JOVIAL` is certainly right, but they are not the entire resultset. Any language
    that is not three characters long and ending with a lowercase `l` would be in
    the output (Listing [8-15](#A457348_1_En_8_Chapter.html#Par52)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language NOT LIKE ''__l'';

    ```


    **Listing 8-15**

    Using `NOT` with `LIKE`


    Be careful when using `LIKE`; its comparisons are computationally expensive on
    the database, especially the ones involving multiple `%` wildcards.


    ## Calculated Fields


    We have already seen column aliases that allow us to rename a field''s name in
    the query output. But we frequently encounter conditions that require changes
    to a field value. This is where the concept of a calculated field comes in.


    ### Mathematical Calculations


    Any numeric field can be operated upon by mathematical operators we are all familiar
    with. We can add, subtract, multiply, divide, and even find the remainder of a
    division operation fairly easily. While the operators supported differ in various
    implementations, the ones given below should be available across any RDBMS you
    come across (Table [9-1](#A457348_1_En_9_Chapter.html#Tab1)).


    **Table 9-1**

    Mathematical Operators Available in SQL


    | Operation | Operator |

    | --- | --- |

    | Addition | `+` |

    | Subtraction | `-` |

    | Multiplication | `*` |

    | Division | `/` |

    | Remainder | `%` |


    Let us take our programming languages table and try to find out the decade in
    which the language was created. For example, `Prolog` was created in the 1970s
    decade. Let us try to find out this fact from the `year` of creation available
    to us. One approach is to find the remainder of the year when divided by 10, which
    is the number of years in a decade (Listing [9-1](#A457348_1_En_9_Chapter.html#Par4)).
    This is the value that specifies how many years it has been since the start of
    that decade.


    | language | remain |

    | --- | --- |

    | Prolog | 2 |

    | Perl | 7 |

    | APL | 4 |

    | JOVIAL | 9 |

    | APT | 9 |

    | Tcl | 8 |

    | PL/I | 4 |


    ```sql

    SELECT language,

    (year % 10) remain

    FROM proglang_tbl;

    ```


    **Listing 9-1**

    Using the remainder operation


    Now if we subtract this value from the `year` of creation itself, we would get
    the decade in which the programming language was created (Listing [9-2](#A457348_1_En_9_Chapter.html#Par6)).


    | language | decade |

    | --- | --- |

    | Prolog | 1970 |

    | Perl | 1980 |

    | APL | 1960 |

    | JOVIAL | 1950 |

    | APT | 1950 |

    | Tcl | 1980 |

    | PL/I | 1960 |


    ```sql

    SELECT language,

    year - (year % 10) decade

    FROM proglang_tbl;

    ```


    **Listing 9-2**

    Finding the creation decade of a language


    Another approach is to divide the `year` by 10 and then multiply it by 10. This
    is slightly less straightforward because it relies on the definition of the `integer`
    data type. Since an integer cannot store decimal points, division by 10 would
    silently chop off the remainder. The year 1972 divided by 10 would be 197 discarding
    the .2 bit. If we multiply this value by 10, we would get our desired decade value
    (Listing [9-3](#A457348_1_En_9_Chapter.html#Par8)).


    ```sql

    SELECT language,

    (year / 10) * 10 decade

    FROM proglang_tbl;

    ```


    **Listing 9-3**

    Finding the creation decade of a language using an alternative calculation'
  raw: '## Order of Execution of SELECT Queries


    A query is not evaluated from left to right; there is a specific sequence in which
    its various parts are evaluated as given below.


    1.  FROM clause  

    2.  WHERE clause  

    3.  GROUP BY clause  

    4.  HAVING clause  

    5.  SELECT clause  

    6.  ORDER BY clause  


    There is an interesting corollary of having the `SELECT` evaluation being lower
    than the `WHERE` clause. Can you guess what it is?


    It is the inability of database management systems like PostgreSQL, DB2, and Microsoft
    SQL Server to use column aliases in the `WHERE` clause. Until the point the query
    execution is on the filtering stage using the conditions provided, it has still
    not resolved the column aliases of the query.


    Let’s test this by running a query in PostgreSQL where we use the column alias
    in the `ORDER BY` clause, the only one with a lower precedence (Listing [8-12](#A457348_1_En_8_Chapter.html#Par40)).


    ```

    testdb=# SELECT id,

    language,

    author creator

    FROM proglang_tbl

    ORDER BY creator;

    id | language |  creator

    ----+----------+------------

    1 | Prolog   | Colmerauer

    6 | PL/I     | IBM

    3 | APL      | Iverson

    7 | Tcl      | Ousterhout

    5 | APT      | Ross

    4 | JOVIAL   | Schwartz

    2 | Perl     | Wall

    (7 rows)

    Listing 8-12

    Using column aliases in the ORDER BY clause

    ```


    Our reasoning was rewarded with the correct output, not that I would change my
    advice of using column aliases only with proper thought.


    ## Using the LIKE Operator


    While putting conditions on a query using `WHERE` clauses, we have already seen
    comparison operators `=` and `IS NULL`. Now we take a look at the `LIKE` operator,
    which will help us with wildcard comparisons. For matching we are provided with
    two wildcard characters to use with `LIKE`.


    *   % (Percent) Used to match multiple characters including a single character
    and no character

    *   _ (Underscore) Used to match exactly one character


    We will first use the `%` character for wildcard matching. Let us suppose we wish
    to list out languages that start with the letter P (Listing [8-13](#A457348_1_En_8_Chapter.html#Par46)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''P%'';

    Listing 8-13

    All languages starting with P

    ```


    The output of the above query is all language records whose name begins with the
    letter capital P. While we don’t have such a record, note that this resultset
    would not include any language that starts with the small letter p.


    We can see that using the `%` wildcard allowed us to match multiple characters
    like erl in the case of Perl. But what if we wanted to restrict how many characters
    we wished to match? What if our goal was to write a query that displays the languages
    ending in the letter l, but are only three characters in length? The first condition
    could have been satisfied using the pattern `%l`, but to satisfy both conditions
    in the same query we use the `_` wildcard. A pattern like `%l` would result in
    returning both Perl and Tcl, but we modify our pattern suitably to return only
    the latter (Listing [8-14](#A457348_1_En_8_Chapter.html#Par49)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 7 | Tcl | Ousterhout | 1988 |   |


    ```

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''__l'';

    Listing 8-14

    All languages ending with l and 3 characters long

    ```


    Note that the result did not include Perl since we explicitly gave two underscores
    to match two characters only. Also it did not match APL or JOVIAL since SQL data
    is case sensitive and l is not equal to L.


    We can also use `NOT` in conjunction with `LIKE` to negate or inverse the result.
    If we used a `NOT` in the conditional clause of Listing [8-14](#A457348_1_En_8_Chapter.html#Par49),
    what languages do we expect to get back in the result? Having Perl, APL, and JOVIAL
    is certainly right, but they are not the entire resultset. Any language that is
    not three characters long and ending with a lowercase l would be in the output
    (Listing [8-15](#A457348_1_En_8_Chapter.html#Par52)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```

    SELECT * FROM proglang_tbl

    WHERE language NOT LIKE ''__l'';

    Listing 8-15

    Using NOT with LIKE

    ```


    Be careful when using `LIKE` ; its comparisons are computationally expensive on
    the database, especially the ones involving multiple `%` wildcards.


    # 9. Calculated Fields


    We have already seen column aliases that allow us to rename a field''s name in
    the query output. But we frequently encounter conditions that require changes
    to a field value. This is where the concept of a calculated field comes in.


    ## Mathematical Calculations


    Any numeric field can be operated upon by mathematical operators we are all familiar
    with. We can add, subtract, multiply, divide, and even find the remainder of a
    division operation fairly easily. While the operators supported differ in various
    implementations, the ones given below should be available across any RDBMS you
    come across (Table [9-1](#A457348_1_En_9_Chapter.html#Tab1)).


    Table 9-1


    Mathematical Operators Available in SQL


    | Addition | `+` |

    | Subtraction | `-` |

    | Multiplication | `*` |

    | Division | `/` |

    | Remainder | `%` |


    Let us take our programming languages table and try to find out the decade in
    which the language was created. For example, Prolog was created in the 1970s decade.
    Let us try to find out this fact from the year of creation available to us. One
    approach is to find the remainder of the year when divided by 10, which is the
    number of years in a decade (Listing [9-1](#A457348_1_En_9_Chapter.html#Par4)).
    This is the value that specifies how many years it has been since the start of
    that decade.


    | language | remain |

    | --- | --- |

    | Prolog | 2 |

    | Perl | 7 |

    | APL | 4 |

    | JOVIAL | 9 |

    | APT | 9 |

    | Tcl | 8 |

    | PL/I | 4 |


    ```

    SELECT language,

    (year % 10) remain

    FROM proglang_tbl;

    Listing 9-1

    Using the remainder operation

    ```


    Now if we subtract this value from the year of creation itself, we would get the
    decade in which the programming language was created (Listing [9-2](#A457348_1_En_9_Chapter.html#Par6)).


    | language | decade |

    | --- | --- |

    | Prolog | 1970 |

    | Perl | 1980 |

    | APL | 1960 |

    | JOVIAL | 1950 |

    | APT | 1950 |

    | Tcl | 1980 |

    | PL/I | 1960 |


    ```

    SELECT language,

    year - (year % 10) decade

    FROM proglang_tbl;

    Listing 9-2

    Finding the creation decade of a language

    ```


    Another approach is to divide the year by 10 and then multiply it by 10. This
    is slightly less straightforward because it relies on the definition of the `integer`
    data type. Since an integer cannot store decimal points, division by 10 would
    silently chop off the remainder. The year 1972 divided by 10 would be 197 discarding
    the .2 bit. If we multiply this value by 10, we would get our desired decade value
    (Listing [9-3](#A457348_1_En_9_Chapter.html#Par8)).


    ```

    SELECT language,

    (year / 10) * 10 decade

    FROM proglang_tbl;

    Listing 9-3

    Finding the creation decade of a language using an alternative calculation

    ```'
  trans: '

    ## SELECT 查询的执行顺序


    查询并非从左向右求值；其各部分的求值遵循特定顺序，如下所示。


    1.  `FROM` 子句

    2.  `WHERE` 子句

    3.  `GROUP BY` 子句

    4.  `HAVING` 子句

    5.  `SELECT` 子句

    6.  `ORDER BY` 子句


    `SELECT` 的求值顺序低于 `WHERE` 子句，这有一个有趣的推论。你能猜到是什么吗？


    那就是 PostgreSQL、DB2 和 Microsoft SQL Server 等数据库管理系统无法在 `WHERE` 子句中使用列别名。在查询执行到使用所提供条件进行过滤的阶段之前，它尚未解析查询的列别名。


    让我们通过在 PostgreSQL 中运行一个查询来测试这一点，我们在 `ORDER BY` 子句中使用列别名，这是唯一一个优先级较低的子句（清单 8-12）。


    ```sql

    testdb=# SELECT id,

    language,

    author creator

    FROM proglang_tbl

    ORDER BY creator;

    id | language |  creator

    ----+----------+------------

    1 | Prolog   | Colmerauer

    6 | PL/I     | IBM

    3 | APL      | Iverson

    7 | Tcl      | Ousterhout

    5 | APT      | Ross

    4 | JOVIAL   | Schwartz

    2 | Perl     | Wall

    (7 rows)

    ```


    **清单 8-12**

    在 `ORDER BY` 子句中使用列别名


    我们的推理得到了正确输出的回报，不过我仍然建议在使用列别名时要经过适当的思考。


    ## 使用 `LIKE` 操作符


    在使用 `WHERE` 子句为查询设置条件时，我们已经看到了比较操作符 `=` 和 `IS NULL`。现在我们来看看 `LIKE` 操作符，它将帮助我们进行通配符比较。为了匹配，我们提供了两个通配符字符与
    `LIKE` 一起使用。


    -   `%` （百分号）用于匹配多个字符，包括单个字符和零个字符

    -   `_` （下划线）用于精确匹配一个字符


    我们将首先使用 `%` 字符进行通配符匹配。假设我们希望列出以字母 P 开头的语言（清单 8-13）。


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''P%'';

    ```


    **清单 8-13**

    所有以 P 开头的语言


    上面查询的输出是所有名称以大写字母 P 开头的语言记录。虽然我们没有这样的记录，但请注意，此结果集不会包含任何以小写字母 p 开头的语言。


    我们可以看到，使用 `%` 通配符允许我们匹配多个字符，比如 `Perl` 中的 `erl`。但是，如果我们想限制要匹配的字符数量怎么办？如果我们的目标是编写一个查询，显示以字母
    `l` 结尾但长度仅为三个字符的语言怎么办？第一个条件本可以使用模式 `%l` 来满足，但要在同一查询中满足这两个条件，我们使用 `_` 通配符。像 `%l`
    这样的模式会返回 `Perl` 和 `Tcl`，但我们适当地修改模式以仅返回后者（清单 8-14）。


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 7 | Tcl | Ousterhout | 1988 |   |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language LIKE ''__l'';

    ```


    **清单 8-14**

    所有以 l 结尾且长度为 3 个字符的语言


    请注意，结果中没有包含 `Perl`，因为我们明确使用了两个下划线来仅匹配两个字符。它也没有匹配 `APL` 或 `JOVIAL`，因为 SQL 数据区分大小写，且
    `l` 不等于 `L`。


    我们还可以将 `NOT` 与 `LIKE` 结合使用来否定或反转结果。如果我们在清单 8-14 的条件子句中使用 `NOT`，我们期望在结果中得到什么语言？包含
    `Perl`、`APL` 和 `JOVIAL` 当然是正确的，但它们并不是整个结果集。任何不是以小写 `l` 结尾且长度不是三个字符的语言都会出现在输出中（清单
    8-15）。


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 6 | PL/I | IBM | 1964 | ECMA |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language NOT LIKE ''__l'';

    ```


    **清单 8-15**

    结合使用 `NOT` 与 `LIKE`


    使用 `LIKE` 时要小心；它的比较在数据库上计算成本高昂，尤其是涉及多个 `%` 通配符的比较。


    ## 计算字段


    我们已经了解了列别名，它允许我们在查询输出中重命名字段名称。但我们经常遇到需要更改字段值的情况。这就是计算字段概念的用武之地。


    ### 数学计算


    任何数字字段都可以由我们熟悉的数学操作符进行操作。我们可以相当轻松地进行加、减、乘、除，甚至求除法的余数。虽然不同实现支持的操作符有所不同，但下面列出的操作符应该在你遇到的任何关系数据库管理系统中都可用（表
    9-1）。


    **表 9-1**

    SQL 中可用的数学操作符


    | 操作 | 操作符 |

    | --- | --- |

    | 加法 | `+` |

    | 减法 | `-` |

    | 乘法 | `*` |

    | 除法 | `/` |

    | 余数 | `%` |


    让我们以编程语言表为例，尝试找出该语言是在哪个十年间创建的。例如，`Prolog` 创建于 20 世纪 70 年代。让我们尝试从我们拥有的创建 `year`
    中找出这个事实。一种方法是求年份除以 10 的余数，10 是一个十年包含的年数（清单 9-1）。这个值指定了自该十年开始以来过去了多少年。


    | language | remain |

    | --- | --- |

    | Prolog | 2 |

    | Perl | 7 |

    | APL | 4 |

    | JOVIAL | 9 |

    | APT | 9 |

    | Tcl | 8 |

    | PL/I | 4 |


    ```sql

    SELECT language,

    (year % 10) remain

    FROM proglang_tbl;

    ```


    **清单 9-1**

    使用余数运算


    现在，如果我们将此值从创建 `year` 本身中减去，我们将得到编程语言创建的十年（清单 9-2）。


    | language | decade |

    | --- | --- |

    | Prolog | 1970 |

    | Perl | 1980 |

    | APL | 1960 |

    | JOVIAL | 1950 |

    | APT | 1950 |

    | Tcl | 1980 |

    | PL/I | 1960 |


    ```sql

    SELECT language,

    year - (year % 10) decade

    FROM proglang_tbl;

    ```


    **清单 9-2**

    找出语言的创建十年


    另一种方法是将 `year` 除以 10，然后再乘以 10。这种方法稍微不那么直接，因为它依赖于 `integer` 数据类型的定义。由于整数不能存储小数点，除以
    10 会静默地截掉余数。1972 年除以 10 将是 197，舍弃了 .2 部分。如果我们将此值乘以 10，我们将得到所需的十年值（清单 9-3）。


    ```sql

    SELECT language,

    (year / 10) * 10 decade

    FROM proglang_tbl;

    ```


    **清单 9-3**

    使用替代计算找出语言的创建十年

