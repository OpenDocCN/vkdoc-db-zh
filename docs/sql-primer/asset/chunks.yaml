    # 差集


    集合之间的差集运算，写作 `set1 - set2`，表示所有在 `set1` 中但不在 `set2` 中的元素列表（参见代码清单 13-9）。如果某个元素仅存在于
    `set2` 中，它不会被简单的差集运算所捕获。


    ```

    set1 DIFFERENCE set2 = { 5 }

    set2 DIFFERENCE set1 = { 2 }

    Listing 13-9

    数学的 DIFFERENCE 操作

    ```


    让我们尝试使用熟悉的 `IN` 和 `NOT IN` 操作符来编写一个模拟此逻辑的 SQL 语句。但首先，我们需要向表中插入一行数据，以便观察差集运算的实际效果（参见代码清单
    13-10）。


    ```

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (9, ''RPG'', ''IBM'', 1964, ''ISO'');

    Listing 13-10

    为 RPG 插入新行

    ```


    假设我们希望列出那些由 ISO 标准化而非由 ANSI 标准化的编程语言的创建年份（参见代码清单 13-11）。从源表中，我们发现有三种语言由 ISO 标准化，年份分别是
    1972 年、1959 年和 1964 年。但由于在 1964 年，APL 语言被创建，并最终由 ANSI 标准化，理想情况下，我们得到的答案应该是 1972
    年和 1959 年。


    | year |

    | --- |

    | 1972 |

    | 1959 |

    | 1964 |


    ```

    SELECT year FROM proglang_tbl

    WHERE standard IN (''ISO'')

    AND standard NOT IN (''ANSI'');

    Listing 13-11

    尝试用 IN 编写集合差集

    ```


    哇，这是什么魔法！我们以为 1964 年会因为 ANSI 标准化而被排除。但显然情况并非如此。实际发生的情况是，首先扫描了 ISO 的行——得到三个值。然后，ANSI
    的行被排除，但排除的范围是整张表，而不一定是第一次扫描的结果。因此，虽然 1964 年的 APL 被排除了，但新插入的 1964 年的 RPG 仍然保留了下来，这实际上使我们的第二个条件失效了。实现此目的的正确方法是使用差集运算符
    `EXCEPT`，如下所示（参见代码清单 13-12）。


    | year |

    | --- |

    | 1972 |

    | 1959 |


    ```

    SELECT year FROM proglang_tbl WHERE standard IN (''ISO'')

    EXCEPT

    SELECT year FROM proglang_tbl WHERE standard IN (''ANSI'');

    Listing 13-12

    使用 EXCEPT 的集合差集

    ```


    瞧，这似乎得出了正确的答案！如果你使用的是 Oracle 系统，请用 `MINUS` 替换 `EXCEPT` 来获得完全相同的结果。


    当我们在一个查询中编写多个 `SELECT` 语句，并使用集合理论运算符（如 `UNION`）将它们连接起来时，这样的语句被称为复合查询。需要注意的是，许多数据库管理系统限制将复合查询作为子查询使用。Sybase
    Adaptive Server Enterprise 就是这样一个流行的 DBMS，它不允许你在子查询中编写 `UNION`。


    # 14. 视图


    关系数据模型和 SQL 的一个美妙之处在于，查询的输出本身也是一个表，确切地说是一个关系。它可能只包含一列或一行，但它仍然是一个表。视图就是一个可以像表一样使用的查询。


    你可以把它想象成一个虚拟表，为了查看者的方便，它存储了一个预先计算好的结果集。它并不像基础表那样真实存在，而是提供了一个不同的视角来查看数据，省去了处理繁琐细节的麻烦。


    ## 为什么需要视图？


    大多数生产数据库系统都会包含大量的表。由于领域的复杂性，其中一些表可能包含大量的字段。视图可以为临时数据库用户（即并非数据库系统所有部分的专家）提供帮助。他们有特定的、重复性的需求，而视图为他们提供了访问所需数据的一个更简单的接口。


    视图带来的另一个优势是安全性。我们可以限制对基础表的访问，只提供包含特定用户组被允许查看的数据的视图。良好的数据库设计规则常常迫使敏感列与经常访问的字段放在一起。在这种情况下，如果你选择隐藏敏感列，视图可以有效地解决这个问题。


    对于数据库设计者来说，视图提供了独立性。在合理的程度上，视图允许底层基础表改变其结构以适应不断变化的需求，而视图本身可以保持不变。在其他情况下，可以重新创建视图，其底层的查询可能不同，但它将以相同的格式包含相同的数据，从而为用户提供连续性。


    ## 创建视图


    创建视图的基本语法非常简单（参见代码清单 14-1）。实际上，它可能就像你所能做到的那样精简和自然。


    ```

    CREATE VIEW <view_name> AS <select_statement>

    Listing 14-1

    视图创建的通用语法

    ```


    现在让我们为自己创建一个视图——`language_chronology`，它将只有两个字段，即语言及其创建年份（参见代码清单 14-2）。


    ```

    CREATE VIEW language_chronology AS

    SELECT language, year

    FROM proglang_tbl

    ORDER BY year ASC;

    Listing 14-2

    创建一个 language_chronology 视图

    ```


    请注意，我们如何在视图创建中显式添加了排序子句。对于 `CREATE VIEW` 查询部分允许的内容，限制非常少。现在让我们通过像查询表一样查询视图来验证结果（参见代码清单
    14-3）。


    | language | year |

    | --- | --- |

    | Fortran | 1957 |

    | JOVIAL | 1959 |

    | APT | 1959 |

    | RPG | 1964 |

    | APL | 1964 |

    | PL/I | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |

    | Tcl | 1988 |


    ```

    SELECT * FROM language_chronology;

    Listing 14-3

    列出视图内容

    ```


    我们还可以在视图创建的查询部分包含计算字段。我们必须记住的唯一一点是如何重命名计算字段列，否则无疑会导致清晰度下降。让我们根据第 9 章的十年查询重新创建一个视图（参见代码清单
    14-4）。


    | language | decade |

    | --- | --- |

    | Prolog | The 1970s |

    | Perl | The 1980s |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | Tcl | The 1980s |

    | PL/I | The 1960s |

    | Fortran | The 1950s |

    | RPG | The 1960s |


    ```

    CREATE VIEW language_decade AS

    SELECT language,

    ''The ''||((year/10)*10)||''s'' decade

    FROM proglang_tbl;

    Listing 14-4

    创建带有计算字段的视图

    ```


    如果我们未能将列重命名为 `decade`，我们的 DBMS 系统会执行视图创建，但结果视图实际上将无法使用。PostgreSQL 可能会将列重命名为神秘的
    `?column?`，而 SQLite 则会将整个表达式 `''The ''||((year/10)*10)||''s''` 作为第二个字段的名称。不用说，我们最好重命名视图的字段。


    另一种重命名字段的方法是在视图定义子句中指定，而不是在填充它的查询中指定（参见代码清单 14-5）。这种方法同样有效，并且可以说更清晰，因为它预先列出了所有字段。


    | lang | era |

    | --- | --- |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | PL/I | The 1960s |

    | Fortran | The 1950s |

    | RPG | The 1960s |


    ```

    CREATE VIEW language_era (lang, era) AS

    SELECT language,

    ''The ''||((year/10)*10)||''s''

    FROM proglang_tbl

    WHERE year < 1971;

    Listing 14-5

    在视图定义子句中重命名字段

    ```


    如果你选择这种重命名列的方法，你必须指定视图中所有列的名称。请注意，重命名字段不会影响其数据类型或可空状态。

    '
- fmt: '## Modifying Data Through Views


    There are widely ranging opinions on whether data modification through views is
    a good idea. Some people prefer to treat views as a read-only listing of contents,
    but most DBMS systems provide some data modification ability through views.


    Let us first try a simple update of the `year` column through our `language_chronology`
    table (Listing [14-6](#A457348_1_En_14_Chapter.html#Par20)). Remember we had pulled
    the `year` field into the view along with the language name.


    ```sql

    UPDATE language_chronology

    SET year=1977

    WHERE language="Fortran";

    Listing 14-6

    Updating a value through a row

    ```


    The statement executes fine in PostgreSQL. Now to verify whether it actually made
    a difference, let us verify the contents of the view first (Listing [14-7](#A457348_1_En_14_Chapter.html#Par22)).


    | language | year |

    | --- | --- |

    | Fortran | 1977 |


    ```sql

    SELECT * FROM language_chronology

    WHERE language="Fortran";

    Listing 14-7

    Checking contents of our modified view

    ```


    All seems to be as expected in the view. While we have an inkling that the base
    table would also have been updated, let’s verify this too (Listing [14-8](#A457348_1_En_14_Chapter.html#Par24)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 8 | Fortran | Backus | 1977 | ANSI |


    ```sql

    SELECT * FROM proglang_tbl

    WHERE language="Fortran";

    Listing 14-8

    Checking contents of our base table

    ```


    This also means that the other view `language_era` that was dependent on `proglang_tbl`
    would not contain the row for Fortran since its creation involved the use of the
    condition `WHERE year < 1971`. Records move in and out of views as the underlying
    base table contents change over time.


    ### View modification in SQLite


    If you attempted to execute this `UPDATE` command in SQLite, it would throw you
    an error like:


    ```sql

    Error: cannot modify language_chronology because it is a view

    ```


    SQLite has clearly stated that it would not stand for data modification through
    a view. A design choice I happen to agree with.


    Let’s attempt another data modification, but this time we will try to update the
    calculated field inside the view `language_era` (Listing [14-9](#A457348_1_En_14_Chapter.html#Par30)).
    We know that `JOVIAL` was made in the year `1959`, so we wish to round off the
    value and make its `era` to `The 1960s`.


    ```sql

    UPDATE language_era SET era=''The 1960s''

    WHERE lang="JOVIAL";

    > ERROR:  cannot update column "era" of view "language_era"

    > DETAIL:  View columns that are not columns of their base relation are not updatable.

    Listing 14-9

    Attempting to modify a calculated field of a view

    ```


    The DBMS has rejected our request to update a calculated field because `era` does
    not exist in the base table `proglang_tbl`. If we think about it, this makes sense
    because the SQL interpreter would not know what `year` value to put in the base
    table. A value of `1960`, a value of `1969`, and everything in between would make
    the `era` value as `The 1960s`. The DBMS would not attempt to choose any random
    value because its reasoning would be ambiguous.


    Changing the `lang` field of the same view is perfectly unambiguous and hence
    allowed (Listing [14-10](#A457348_1_En_14_Chapter.html#Par33)).


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 4 | Jovial | Schwartz | 1959 | US-DOD |


    ```sql

    UPDATE language_era SET lang="Jovial"

    WHERE lang="JOVIAL";

    > UPDATE 1

    SELECT * FROM proglang_tbl

    WHERE id=4;

    Listing 14-10

    Query to modify a non-calculated field of a view

    ```


    Similarly, we can create a view with aggregated columns using the `GROUP BY` clause,
    but modifying the contents of such a view is not allowed (Listing [14-11](#A457348_1_En_14_Chapter.html#Par35)).


    | standard | count |

    | --- | --- |

    |   | 2 |

    | ECMA | 1 |

    | ANSI | 2 |

    | ISO | 3 |

    | US-DOD | 1 |


    ```sql

    CREATE VIEW standards AS

    SELECT standard, count(*)

    FROM proglang_tbl

    GROUP BY standard;

    Listing 14-11

    Creating a view with aggregate columns

    ```


    We know from previous experience that adding a new row or modifying the aggregated
    column would be ambiguous and thus not allowed. But what if we attempted to just
    update the `standard` field value just like we did with `JOVIAL` (Listing [14-12](#A457348_1_En_14_Chapter.html#Par37))?
    Would the update be reflected in all rows containing the field value?


    ```sql

    UPDATE standards SET standard="IS"

    WHERE standard="ISO";

    > ERROR:  cannot update view "standards"

    > DETAIL:  Views containing GROUP BY are not automatically updatable.

    > HINT:  To enable updating the view, provide an INSTEAD OF UPDATE trigger or
    an unconditional ON UPDATE DO INSTEAD rule.

    Listing 14-12

    Trying to modify a field value in an aggregated view

    ```


    The operation was disallowed but PostgreSQL gave us a hint on how to go about
    achieving this. While we won’t cover that technique, it’s good to know that in
    the rare case you do need it, it’s available in some database systems.


    ### Deleting Views


    To delete or remove a view in its entirety, we use the `DROP VIEW` command. It
    is very similar to the `DROP TABLE` command we saw in Chapter [4](#A457348_1_En_4_Chapter.html)
    (Listing [14-13](#A457348_1_En_14_Chapter.html#Par40)).


    ```sql

    DROP VIEW standards;

    Listing 14-13

    Dropping a view

    ```


    Note that you cannot accidentally drop a table using `DROP VIEW`, which is a relief
    (Listing [14-14](#A457348_1_En_14_Chapter.html#Par42)).


    ```sql

    DROP VIEW proglang_tbl;

    > ERROR:  "proglang_tbl" is not a view

    > HINT:  Use DROP TABLE to remove a table.

    Listing 14-14

    Dropping a view

    ```


    # 15. Indexing


    Databases have long been the primary data storage components from which insights
    are derived. As businesses increasingly adopt technology-enabled workflows, the
    rate of data generation has grown substantially. This trend has accelerated with
    the adoption of the Internet and mobile computing.


    A well-sized relational database used to run into hundreds of megabytes in the
    1990s. It is not uncommon to hear of database systems running into hundreds of
    gigabytes or even a few terabytes nowadays. As a professional, you will frequently
    encounter tables with million rows in them.


    Until now we have seen the parts of SQL that allow you to perform operations and
    run queries, but we haven’t touched anything close to performance tuning. When
    you want to run your queries on multimillion record tables, taking a hard look
    at performance optimization is not optional.


    One of the most common performance optimization techniques is indexing. An index
    allows the SQL engine to quickly look up specific records in a table. This is
    not unlike jumping directly to the letter W in a dictionary when you wish to know
    the meaning of wistful. It would be quite tedious to go through all the pages
    sequentially starting with A until we reach our desired word.


    A lot of commands in this chapter are specific to the DBMS at hand. While the
    general concept of indexes and basic commands to create and delete indexes remain
    similar across products, there is no getting around the fact that as we get deeper
    into our SQL journey, vendor-based differences become more visible.'
