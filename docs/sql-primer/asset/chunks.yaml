  trans: "## 表创建\n\n我们已经探索了关系模型中表的概念。现在是时候使用标准的 SQL 命令 `CREATE TABLE` 来创建一个表了（参见清单\
    \ 2-5）。\n\n```sql\nCREATE TABLE \n( ,\n ,\n\\. \\. \\.\n );\n```\n清单 2-5\nCREATE\
    \ TABLE 语句的通用语法\n\n这是能为你创建一个表的最简单的有效语句，不包含任何额外选项。随着学习的深入，我们会进一步探讨子句和约束，但现在让我们使用这个通用语法来实际创建我们在第\
    \ 1 章介绍的编程语言表（参见清单 2-6）。\n\n```sql\nCREATE TABLE proglang_tbl (\nid        INTEGER,\n\
    language  VARCHAR(20),\nauthor    VARCHAR(25),\nyear      INTEGER);\n```\n清单 2-6\n\
    创建编程语言表\n\n我们必须在 PostgreSQL 的 `psql` shell 中输入此命令。注意，当我们启动 shell 时，光标等待的最后一行看起来像下面这样：\n\
    \n```\npostgres=#\n```\n\n这实际上意味着我们连接到了名为 `postgres` 的数据库，这是 PostgreSQL 安装时出于管理目的内部使用的数据库。我们已经创建了我们自己的数据库。在创建表之前，让我们使用\
    \ `\\c` 切换到那个数据库（参见清单 2-7）。\n\n```\npostgres=# \\c testdb\nYou are now connected\
    \ to database \"testdb\" as user \"postgres\".\ntestdb=#\n```\n清单 2-7\n在 psql\
    \ 中连接到不同的数据库\n\n注意，最后一行的文本已经改变，指示了我们当前连接的数据库。现在你可以输入清单 2-6 中给出的建表语句，如果你没有遗漏任何重要的标点符号或拼错大写的关键字，你的表就会被创建，shell\
    \ 将简单地回复：\n\n```\nCREATE TABLE\ntestdb=#\n```\n\n一个不成功的命令会产生一个带有有用解释的错误。为了实际看到这一点，让我们再次运行完全相同的建表命令。现在\
    \ shell 会响应：\n\n```\nERROR:  relation \"proglang_tbl\" already exists\n```\n\n\
    这个语句本身足够简单，因为它类似于清单 2-5 的通用语法。有趣的是字段所选的数据类型。为了简单起见，`id` 和 `year` 都被指定为 `INTEGER`，尽管有更好的替代方案。`language`\
    \ 字段被分配了 20 个字符的空间来存储编程语言的名称，而 `author` 字段可以容纳 25 个字符来存储创建者的姓名。\n\n最后的英文分号是 SQL\
    \ 语句的分隔符，它标记着一个语句的结束。\n\n如果你使用的是 SQLite，语句与清单 2-6 完全相同。唯一的区别是，由于 SQLite 数据库是一个特定的文件，并且你在打开\
    \ SQLite shell 时就已经打开了它，因此不需要切换数据库（参见清单 2-8）。\n\n```\n[~]$ sqlite3 testdb\nSQLite\
    \ version 3.13.0 2016-05-18 10:57:30\nEnter \".help\" for usage hints.\nsqlite>\
    \ CREATE TABLE proglang_tbl (\n...> id        INTEGER,\n...> language  VARCHAR(20),\n\
    ...> author    VARCHAR(25),\n...> year      INTEGER);\nsqlite>\n```\n清单 2-8\n\
    在 SQLite 中创建编程语言表\n\n注意，这里没有操作成功的消息。如果一切顺利，SQLite shell 只是继续运行。为了做些实验，如果我们尝试再次创建相同的表，我们会得到一个错误信息：\n\
    \n```\nError: table proglang_tbl already exists\n```\n\n这又是一个有帮助且更友好的错误消息。\n\n\
    ## 插入数据\n\n我们刚刚创建的表是空的，所以我们现在的任务是向其中插入一些示例数据。为了以行的形式填充这些数据，我们使用 DML 命令 `INSERT`，其通用语法如下（参见清单\
    \ 2-9）。\n\n```sql\nINSERT INTO \nVALUES ('Value1', 'Value2', ...);\n```\n清单 2-9\n\
    INSERT INTO TABLE 的通用语法\n\n只要记住我们要插入行的表的结构，将一些示例值套用到这个通用语法中是非常简单的。为了像我们在第 1 章看到的那样向\
    \ `proglang_tbl` 填充行，我们需要使用三个如下的 `INSERT` 语句（参见清单 2-10）。\n\n```sql\nINSERT INTO\
    \ proglang_tbl\nVALUES (1, 'Fortran', 'Backus', 1955);\nINSERT INTO proglang_tbl\n\
    VALUES (2, 'Lisp', 'McCarthy', 1958);\nINSERT INTO proglang_tbl\nVALUES (3, 'Cobol',\
    \ 'Hopper', 1959);\n```\n清单 2-10\n向 proglang_tbl 表插入数据\n\n如果你没有从 `psql` 或 `sqlite3`（或你选择的\
    \ DBMS 的 SQL 接口）收到任何错误，那么你已经成功地向你的表中插入了三行数据。注意我们是如何仔细地将字段的顺序保持为与我们创建表时所使用的顺序一致的。这种严格的顺序限制可以被移除，我们稍后会看到如何实现这一点。\n\
    \n如果你在 `psql` 中运行了这三条语句，每条语句执行完毕后，你会收到一条类似下面的消息：\n\n```\nINSERT 0 1\n```\n\n表示成功。"
- fmt: '## Writing Your First Query


    Let us now turn our attention to writing a simple query to check the results of
    our previous operations in which we created a table and inserted three rows of
    data into it. For this, we would use a Data Query Language (DQL) command called
    `SELECT`.


    A query is simply a SQL statement that allows you to retrieve a useful subset
    of data contained within your database. You might have noticed the `INSERT` and
    `CREATE TABLE` commands were referred to as statements, but a fetching operation
    with `SELECT` falls under the query category.


    Most of your day-to-day operations in an SQL environment would involve queries,
    since you''d be creating the database structure once (modifying it only on a need
    basis) and inserting rows only when new data is available. While a typical `SELECT`
    query is fairly complex with many clauses, we will begin our journey by writing
    down a query just to verify the contents of our table. The general syntax of a
    simple query is given below (Listing [2-11](#A457348_1_En_2_Chapter.html#Par73)).


    ```sql

    SELECT  FROM ;

    ```

    *Listing 2-11*

    *General syntax of a simple SQL query*


    Transforming this into our result verification query is a simple task (Listing
    [2-12](#A457348_1_En_2_Chapter.html#Par75)). We already know the table we wish
    to query – `proglang_tbl` and for our selection we would use `* (star)`, which
    will select all rows and fields from the table.


    ```sql

    SELECT * FROM proglang_tbl;

    ```


    The output of this query would be all the (3) rows displayed in a matrix format
    just as we intended. If you are running this through `psql`, you would get an
    output similar to the one given below.


    ```sql

    testdb=# select * from proglang_tbl;

    id | language |  author  | year

    ----+----------+----------+------

    1 | Fortran  | Backus   | 1955

    2 | Lisp     | McCarthy | 1958

    3 | Cobol    | Hopper   | 1959

    (3 rows)

    testdb=#

    ```

    *Listing 2-12*

    *Verifying the contents of our table in psql*


    The output from SQLite would be slightly messier at first, but let’s fix that
    one step at a time (Listing [2-13](#A457348_1_En_2_Chapter.html#Par79)).


    ```sql

    sqlite> select * from proglang_tbl;

    1|Fortran|Backus|1955

    2|Lisp|McCarthy|1958

    3|Cobol|Hopper|1959

    sqlite>

    ```

    *Listing 2-13*

    *Verifying the contents of our table in sqlite3*


    Clearly not the cleanest output, but setting a few options would fix that. The
    first of them is called:


    ```

    .mode column

    ```


    and this would output a neatly spaces resultset rather than the squashed one we
    saw before (Listing [2-14](#A457348_1_En_2_Chapter.html#Par83)).


    ```sql

    sqlite> .mode column

    sqlite> select * from proglang_tbl;

    1           Fortran     Backus      1955

    2           Lisp        McCarthy    1958

    3           Cobol       Hopper      1959

    ```

    *Listing 2-14*

    *Turning on the column mode*


    Ah, much better! But there is still a little room for improvement here. We see
    that column headers are still missing from the output and having them would be
    advantageous. So we turn on the headers option and the result starts looking pretty
    neat (Listing [2-15](#A457348_1_En_2_Chapter.html#Par85)).


    ```sql

    sqlite> .headers on

    sqlite> select * from proglang_tbl;

    id          language    author      year

    ----------  ----------  ----------  ----------

    1           Fortran     Backus      1955

    2           Lisp        McCarthy    1958

    3           Cobol       Hopper      1959

    ```

    *Listing 2-15*

    *Turning on the headers in sqlite3*


    I recommend that you keep these options turned on for your learning sessions.
    The output becomes much easier to verify at a glance.


    ## The Benefit of Constraints


    Relational databases are well into their fourth decade of dominance as a data
    storage and organization mechanism. A large part of this success is owed to the
    flexibility of the data model. It is easy to visualize all kinds of data fitting
    into a neat tabular structure with predefined columns.


    The flexibility also extends to querying – while creating and populating tables,
    little restriction is placed upon what you can query from a table. You might try
    to generate completely new insights from a table you hadn’t thought of before.
    To enable all of this, relational databases expect a certain amount of discipline
    and thought being put upfront when designing your tables. Neat tables with well-defined
    data types are essential for success, and certain rules help you keep on this
    path of good database design.


    A constraint is a rule that you apply or abide by while doing SQL operations.
    They are useful in cases where you wish to make the data inside your database
    more meaningful and/or structured.


    ### The Null Constraint


    Consider the example of the programming languages table – every programming language
    that has been created must have an author (whether a single person, a couple,
    or committee). Similarly it should have a year when it was introduced, be it the
    year it first appeared as a research paper or the year a working compiler for
    it was written. In such cases, it makes sense to create your table in such a way
    that certain fields do not accept a `NULL` (empty) value.


    A null value does not mean `0` (zero) or an empty string like `''''`. Think of
    it as either empty or undefined. If you haven’t captured someone’s age while populating
    a table, you can’t assume their age to be `0`. This might have serious implications
    if someone was using this data for statistical analysis. Putting a null value
    there makes much more sense.


    We now modify our previous `CREATE TABLE` statement so that we can apply the `NULL`
    constraint to some fields (Listing [3-1](#A457348_1_En_3_Chapter.html#Par7)).


    ```sql

    CREATE TABLE proglang_tblcopy (

    id        INTEGER     NOT NULL,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    *Listing 3-1*

    *Creating a table with NULL constraints*


    In this table, we only allow the `standard` field to have a null value. Every
    other field ends with the option `NOT NULL`, which specifies that this field must
    necessarily have a value. All fields by default are nullable in most database
    management systems, so you have to specify a non-nullable field. Writing the word
    `NULL` to specify a nullable field is optional.


    If we try to insert a row into this table with a `NULL` value in one of the non-nullable
    fields like `year`, we expect an error message to be thrown at us. In both SQLite
    and PostgreSQL, we represent a null value with the literal `null` noting the lack
    of any quotation marks that generally enclose strings (Listings [3-2](#A457348_1_En_3_Chapter.html#Par10),
    [3-3](#A457348_1_En_3_Chapter.html#Par11)). `Null` is not a string value and writing
    `''null''` makes an actual string of length 4 and is decidedly non-null. Other
    database management systems might represent null values in a different way, so
    check your manual for such details.


    ```sql

    sqlite> INSERT INTO proglang_tblcopy

    VALUES (1, ''Fortran'', ''Backus'', null, ''ANSI'');

    Error: NOT NULL constraint failed: proglang_tblcopy.year

    ```

    *Listing 3-2*

    *Inserting a null value in SQLite*


    ```sql

    testdb=# INSERT INTO proglang_tblcopy

    VALUES (1, ''Fortran'', ''Backus'', null, ''ANSI'');

    ERROR:  null value in column "year" violates not-null constraint

    DETAIL:  Failing row contains (1, Fortran, Backus, null, ANSI).

    ```

    *Listing 3-3*

    *Inserting a null value in PostgreSQL*


    We see in this case that we have achieved our objective of creating a table in
    which the field''s `id`, `language`, `author`, and `year` cannot be empty for
    any row, but the new field `standard` can take empty values. We now go about trying
    to insert new rows into this table using an alternative `INSERT` syntax.'
