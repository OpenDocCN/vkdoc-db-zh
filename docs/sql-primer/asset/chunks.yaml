  trans: '

    # 11. 理解连接


    连接操作允许你在单个 `SELECT` 查询中从多个表中检索数据。两个表可以通过单个连接运算符进行连接，但其结果还可以再次与其他表连接。被连接的表之间必须存在相同或相似的列。


    当你使用诸如规范化之类良好的设计原则来设计整个数据库系统时，我们通常需要使用连接来为用户的查询提供完整的视图。例如，我们在第 7 章中将编程语言表拆分为两个——一个保存作者详细信息（表
    11-2），另一个保存语言本身的信息（表 11-1）。为了显示列出作者及其所创建编程语言的报告，我们将不得不使用连接。


    表 11-2


    `authors_tbl` 的内容


    | author_id | author | language_id |

    | --- | --- | --- |

    | 1 | Colmerauer | 1 |

    | 2 | Wall | 2 |

    | 3 | Ousterhout | 4 |

    | 4 | Iverson | 3 |

    | 5 | Kemeny | 5 |

    | 6 | Kurtz | 5 |


    表 11-1


    `newlang_tbl` 的内容


    | id | language | year | standard |

    | --- | --- | --- | --- |

    | 1 | Prolog | 1972 | ISO |

    | 2 | Perl | 1987 | (null) |

    | 3 | APL | 1964 | ANSI |

    | 4 | Tcl | 1988 | (null) |

    | 5 | BASIC | 1964 | ANSI |


    我们现在构造一个查询来显示所需的输出——所有作者及其开发的相应语言的列表（代码清单 11-1）。我们选择 `authors` 表的 `language_id`
    字段作为连接列。这对应于 `languages` 表的 `id` 字段。


    | author | language |

    | --- | --- |

    | Colmerauer | Prolog |

    | Wall | Perl |

    | Ousterhout | APL |

    | Iverson | Tcl |

    | Kemeny | BASIC |

    | Kurtz | BASIC |


    ```sql

    SELECT author, language

    FROM authors_tbl, newlang_tbl

    WHERE language_id = id;

    ```


    代码清单 11-1

    在我们的两个表上执行连接操作


    我们查询的输出结合了来自两个表的列，为我们提供了更好的报告。`language_id = id` 被称为连接条件。由于连接条件中使用的运算符是相等运算符（`=`），因此这种连接被称为**等值连接**。另一个需要注意的重要事项是，参与连接条件的列并非我们选择出现在查询结果中的列。


    请记住，连接表以查看结果集完全不会影响表本身。表的结构或数据本身不会发生任何物理变化。形成的隐式连接仅存在于连接查询执行期间。


    ## 替代连接语法


    你可能已经注意到，我们构建连接查询时没有使用太多特殊语法，而是使用了常规的 `FROM/WHERE` 组合。SQL-92 标准引入了 `JOIN` 关键字，允许我们构建连接查询。由于
    `FROM/WHERE` 语法引入较早，它在连接中仍然相当流行。但现在大多数数据库供应商已经实现了大部分 SQL-92 标准，`JOIN` 语法也被广泛使用。下面是我们刚刚编写的查询的
    `JOIN` 语法等效形式，用于显示哪位作者创建了哪种编程语言（代码清单 11-2）。


    ```sql

    SELECT author, language

    FROM authors_tbl JOIN newlang_tbl

    ON language_id = id;

    ```


    代码清单 11-2

    使用 `JOIN`（SQL-92）语法重写我们的查询


    请注意，我们使用 `JOIN` 关键字，而不是用逗号分隔两个表（从而使其成为列表）。参与连接条件的列前面加上 `ON` 关键字。在指定连接条件（`ON` 子句）之后，如果需要，可以使用
    `WHERE` 子句来指定任何进一步的条件。


    那些完全不匹配连接条件的行会被排除在外的连接类型被称为**内连接**。因此，我们可以在查询中选择性地使用完整的关键字 `INNER JOIN`，而不会影响结果集（代码清单
    11-3）。


    ```sql

    SELECT author, language

    FROM authors_tbl INNER JOIN newlang_tbl

    ON language_id = id;

    ```


    代码清单 11-3

    显式指定 `INNER JOIN`


    ## 解决连接列中的歧义


    在我们的示例中，连接条件字段具有不同的名称——`id` 和 `language_id`。但是，如果在我们的语言表中，我们将键字段命名为 `language_id`
    呢？这将在连接条件中产生歧义，变成令人困惑的 `language_id = language_id`。为了解决这个问题，我们需要通过在该列前添加它所属的表名和一个
    `.`（句点）来限定它（代码清单 11-4）。


    | author | language |

    | --- | --- |

    | Ousterhout | Tcl |


    ```sql

    CREATE TABLE languages_tbl

    (language_id INTEGER, language VARCHAR(20));

    INSERT INTO languages_tbl VALUES (4, ''Tcl'');

    SELECT author, language

    FROM authors_tbl JOIN languages_tbl

    ON language_id = language_id;

    => ERROR:  column reference "language_id" is ambiguous

    SELECT author, language

    FROM authors_tbl JOIN languages_tbl

    ON authors_tbl.language_id = languages_tbl.language_id;

    ```


    代码清单 11-4

    通过限定列名来解决命名歧义


    解决此类歧义的另一种方法是使用表别名来限定列。其概念是给表一个短名称，然后使用这个别名来限定列，而不是使用冗长、笨拙的表名（代码清单 11-5）。


    ```sql

    SELECT author, language

    FROM authors_tbl a JOIN newlang_tbl l

    ON a.language_id = l.id;

    ```


    代码清单 11-5

    使用表别名


    这里 `authors` 表被赋予别名 `a`，`languages` 表被赋予别名 `l`。无论是否存在名称歧义，通常都认为限定连接条件中的列名是一种良好的实践。

    '
- fmt: "## Outer Joins\n\nSince we encountered inner joins in Listing [11-3](#A457348_1_En_11_Chapter.html#Par11),\
    \ it gave us a clue to the existence of outer joins. In this kind of join, the\
    \ resultset consists of rows that match the join condition and the rows that don’t\
    \ match the condition from one of the tables. If the rows from the first table\
    \ that don’t match the condition are desired in the resultset, we use a `LEFT\
    \ OUTER JOIN`. Otherwise when rows from the second table are required, we use\
    \ a `RIGHT OUTER JOIN`.\n\nThis sounds a bit confusing at first, so let’s clarify\
    \ the concept using an example. Let’s add a single row to the `newlang_tbl` about\
    \ the Lisp programming language, but we will not make any entry into the `authors`\
    \ table for this (Listing [11-6](#A457348_1_En_11_Chapter.html#Par19)).\n\n```sql\n\
    INSERT INTO newlang_tbl\nVALUES (6, 'Lisp', 1958, 'ANSI');\n```\n\nListing 11-6\n\
    Adding a new row to illustrate outer joins\n\nIf we ran an `INNER JOIN` query\
    \ on the two tables like Listing [11-1](#A457348_1_En_11_Chapter.html#Par4), we\
    \ would get a similar output as the query gave that time around. This new row\
    \ we added would not feature in the resultset. But let’s try a `LEFT OUTER JOIN`\
    \ where we explicitly want this new row to be in the results despite not having\
    \ an entry in the `authors` table. Our first table must then be the `newlang_tbl`\
    \ and the query would be as below (Listing [11-7](#A457348_1_En_11_Chapter.html#Par21)).\n\
    \n| language | author |\n| --- | --- |\n| Prolog | Colmerauer |\n| Perl | Wall\
    \ |\n| APL | Ousterhout |\n| Tcl | Iverson |\n| BASIC | Kemeny |\n| BASIC | Kurtz\
    \ |\n| Lisp | |\n\n```sql\nSELECT language, author\nFROM newlang_tbl n LEFT OUTER\
    \ JOIN authors_tbl a\nON n.id = a.language_id;\n```\n\nListing 11-7\nA left outer\
    \ join example\n\nAha, success! The `LEFT OUTER JOIN` allowed us to sneak the\
    \ Lisp row into the resultset with a `null` author value. Looking at the query\
    \ listing, if you immediately think that just by switching the order of the joined\
    \ tables, we can convert this into a `RIGHT OUTER JOIN`, then you are absolutely\
    \ right (Listing [11-8](#A457348_1_En_11_Chapter.html#Par23)).\n\n```sql\nSELECT\
    \ language, author\nFROM authors_tbl a RIGHT OUTER JOIN newlang_tbl n\nON n.id\
    \ = a.language_id;\n```\n\nListing 11-8\nA right outer join example\n\nThe output\
    \ of this query would be exactly the same as in Listing [11-7](#A457348_1_En_11_Chapter.html#Par21).\
    \ Notice that our join condition specified in the `ON` clause did not need any\
    \ order change. Since all right outer joins can be written as left outer joins\
    \ (and vice versa), it is rare to find many real-world usages of right outer joins.\
    \ SQLite goes as far as not support right outer joins at all, which is just as\
    \ well.\n\n## Cross Joins\n\nYou might think what would happen if we left out\
    \ the join condition from our query. Well what happens in the background of running\
    \ a join query is that first all possible combinations of rows are made from the\
    \ tables participating in the join. Then the rows that satisfy the join condition\
    \ are chosen for the output (or further processing). If we leave out the join\
    \ condition, we get as the output all possible combinations of records (Listing\
    \ [11-9](#A457348_1_En_11_Chapter.html#Par26)). This is called a `CROSS JOIN`\
    \ or `Cartesian Product` of the tables usually denoted by the sign `X`.\n\n| author\
    \ | language |\n| --- | --- |\n| Colmerauer | Prolog |\n| Colmerauer | Perl |\n\
    | Colmerauer | APL |\n| Colmerauer | Tcl |\n| Colmerauer | BASIC |\n| Colmerauer\
    \ | Lisp |\n| Wall | Prolog |\n| Wall | Perl |\n| Wall | APL |\n| Wall | Tcl |\n\
    | Wall | BASIC |\n| Wall | Lisp |\n| Ousterhout | Prolog |\n| … | … |\n\n```sql\n\
    SELECT author, language\nFROM authors_tbl, newlang_tbl;\n```\n\nListing 11-9\n\
    Query for showing the cartesian product of our tables\n\nThe output of the query\
    \ is truncated here, but when you run it on your computer you should get 36 rows\
    \ in the result containing each author and language combination. Another way to\
    \ rewrite this query is to actually use the `JOIN` keyword with a preceding argument\
    \ `CROSS` as shown below (Listing [11-10](#A457348_1_En_11_Chapter.html#Par28)).\n\
    \n```sql\nSELECT author, language\nFROM authors_tbl CROSS JOIN newlang_tbl;\n\
    ```\n\nListing 11-10\nRewriting our query using CROSS JOIN\n\nNotice the lack\
    \ of the `ON` clause, which means no join condition.\n\nWhat if we were selecting\
    \ more than one column from the `newlang_tbl`, say both `language` and `year`?\
    \ Would the number of combinations increase dramatically from our cross join above?\
    \ Turns out that no, the number of records in the resultset would be exactly the\
    \ same as before (Listing [11-11](#A457348_1_En_11_Chapter.html#Par31)). A cartesian\
    \ product is the combination of records from the tables participating in the joins,\
    \ not within the unit of record for a single table.\n\n| author | language | year\
    \ |\n| --- | --- | --- |\n| Colmerauer | Prolog | 1972 |\n| Colmerauer | Perl\
    \ | 1987 |\n| Colmerauer | APL | 1964 |\n| … | … | … |\n\n```sql\nSELECT author,\
    \ language, year\nFROM authors_tbl CROSS JOIN newlang_tbl;\n```\n\nListing 11-11\n\
    Selecting multiple columns from a table participating in a cross join\n\nA cross\
    \ join is not something you would come across often. It is of some utility when\
    \ either of the tables is small, that is, consisting of a few rows, and you need\
    \ a combination of all the values of it joined with a bigger table. However I’d\
    \ advise against running cross joins on actual production database servers unless\
    \ you really understand why you need them in the scenario.\n\n## Self Joins\n\n\
    Sometimes a table within its own columns has meaningful data but one (or more)\
    \ of its fields refer to another field in the same table. For example, if we have\
    \ a table in which we capture programming languages that influenced other programming\
    \ languages and denote the influence relationship by the language id, to show\
    \ the resolved output we would have to join the table with itself. This is also\
    \ called a `self join`. Consider the table created below and pay close attention\
    \ to the data being inserted (Listing [11-12](#A457348_1_En_11_Chapter.html#Par34)).\n\
    \n| id | language | influenced_by |\n| --- | --- | --- |\n| 1 | Fortran | |\n\
    | 2 | Pascal | 3 |\n| 3 | Algol | 1 |\n\n```sql\nCREATE TABLE inflang_tbl (id\
    \ INTEGER PRIMARY KEY,\nlanguage VARCHAR(20) NOT NULL,\ninfluenced_by INTEGER);\n\
    \nINSERT INTO inflang_tbl (id, language)\nVALUES (1, 'Fortran');\n\nINSERT INTO\
    \ inflang_tbl (id, language, influenced_by)\nVALUES (2, 'Pascal', 3);\n\nINSERT\
    \ INTO inflang_tbl (id, language, influenced_by)\nVALUES (3, 'Algol', 1);\n```\n\
    \nListing 11-12\nCreating and populating our language influence table\n\nOur goal\
    \ is now to write a `self join` query to display which language influenced which\
    \ one, that is, resolve the `influenced_by` column (Listing [11-13](#A457348_1_En_11_Chapter.html#Par36)).\n\
    \n| id | language | influenced |\n| --- | --- | --- |\n| 3 | Algol | Pascal |\n\
    | 1 | Fortran | Algol |\n\n```sql\nSELECT l1.id,\n       l1.language,\n      \
    \ l2.language AS influenced\nFROM inflang_tbl l1, inflang_tbl l2\nWHERE l1.id\
    \ = l2.influenced_by;\n```\n\nListing 11-13\nRunning a self join query\n\nNotice\
    \ the use of table aliases to qualify the join condition columns as separate and\
    \ the use of the `AS` keyword that renames the column in the output.\n\nWhat if\
    \ we wanted to use the alternative SQL-92 `JOIN` syntax for our self join? Well\
    \ as it turns out, there is no special `self join` keyword or clause because it\
    \ is not needed. To the SQL query interpreter, you have created an `INNER JOIN`\
    \ on two tables who just happen to have exactly similar contents. So we can rewrite\
    \ the Listing [11-13](#A457348_1_En_11_Chapter.html#Par36) query using our familiar\
    \ `JOIN` keyword as below (Listing [11-14](#A457348_1_En_11_Chapter.html#Par39)).\n\
    \n```sql\nSELECT l1.id,\n       l1.language,\n       l2.language AS influenced\n\
    FROM inflang_tbl l1 JOIN inflang_tbl l2\nON l1.id = l2.influenced_by;\n```\n\n\
    Listing 11-14\nRunning a self join query using JOIN"
  raw: '## Outer Joins


    Since we encountered inner joins in Listing [11-3](#A457348_1_En_11_Chapter.html#Par11),
    it gave us a clue to the existence of outer joins. In this kind of join, the resultset
    consists of rows that match the join condition and the rows that don’t match the
    condition from one of the tables. If the rows from the first table that don’t
    match the condition are desired in the resultset, we use a left outer join. Otherwise
    when rows from the second table are required, we use a right outer join.


    This sounds a bit confusing at first, so let’s clarify the concept using an example.
    Let’s add a single row to the newlang_tbl about the Lisp programming language,
    but we will not make any entry into the authors table for this (Listing [11-6](#A457348_1_En_11_Chapter.html#Par19)).


    ```

    INSERT INTO newlang_tbl

    VALUES (6, ''Lisp'', 1958, ''ANSI'');

    Listing 11-6

    Adding a new row to illustrate outer joins

    ```


    If we ran an inner join query on the two tables like Listing [11-1](#A457348_1_En_11_Chapter.html#Par4),
    we would get a similar output as the query gave that time around. This new row
    we added would not feature in the resultset. But let’s try a left outer join where
    we explicitly want this new row to be in the results despite not having an entry
    in the authors table. Our first table must then be the newlang_tbl and the query
    would be as below (Listing [11-7](#A457348_1_En_11_Chapter.html#Par21)).


    | language | author |

    | --- | --- |

    | Prolog | Colmerauer |

    | Perl | Wall |

    | APL | Ousterhout |

    | Tcl | Iverson |

    | BASIC | Kemeny |

    | BASIC | Kurtz |

    | Lisp |   |


    ```

    SELECT language, author

    FROM newlang_tbl n LEFT OUTER JOIN authors_tbl a

    ON n.id = a.language_id;

    Listing 11-7

    A left outer join example

    ```


    Aha, success! The `LEFT OUTER JOIN` allowed us to sneak the Lisp row into the
    resultset with a null author value. Looking at the query listing, if you immediately
    think that just by switching the order of the joined tables, we can convert this
    into a `RIGHT OUTER JOIN`, then you are absolutely right (Listing [11-8](#A457348_1_En_11_Chapter.html#Par23)).


    ```

    SELECT language, author

    FROM authors_tbl a RIGHT OUTER JOIN newlang_tbl n

    ON n.id = a.language_id;

    Listing 11-8

    A right outer join example

    ```


    The output of this query would be exactly the same as in Listing [11-7](#A457348_1_En_11_Chapter.html#Par21).
    Notice that our join condition specified in the `ON` clause did not need any order
    change. Since all right outer joins can be written as left outer joins (and vice
    versa), it is rare to find many real-world usages of right outer joins. SQLite
    goes as far as not support right outer joins at all, which is just as well.


    ## Cross Joins


    You might think what would happen if we left out the join condition from our query.
    Well what happens in the background of running a join query is that first all
    possible combinations of rows are made from the tables participating in the join.
    Then the rows that satisfy the join condition are chosen for the output (or further
    processing). If we leave out the join condition, we get as the output all possible
    combinations of records (Listing [11-9](#A457348_1_En_11_Chapter.html#Par26)).
    This is called a Cross Join or Cartesian Product of the tables usually denoted
    by the sign `X`.


    | author | language |

    | --- | --- |

    | Colmerauer | Prolog |

    | Colmerauer | Perl |

    | Colmerauer | APL |

    | Colmerauer | Tcl |

    | Colmerauer | BASIC |

    | Colmerauer | Lisp |

    | Wall | Prolog |

    | Wall | Perl |

    | Wall | APL |

    | Wall | Tcl |

    | Wall | BASIC |

    | Wall | Lisp |

    | Ousterhout | Prolog |

    | … | … |


    ```

    SELECT author, language

    FROM authors_tbl, newlang_tbl;

    Listing 11-9

    Query for showing the cartesian product of our tables

    ```


    The output of the query is truncated here, but when you run it on your computer
    you should get 36 rows in the result containing each author and language combination.
    Another way to rewrite this query is to actually use the `JOIN` keyword with a
    preceding argument `CROSS` as shown below (Listing [11-10](#A457348_1_En_11_Chapter.html#Par28)).


    ```

    SELECT author, language

    FROM authors_tbl CROSS JOIN newlang_tbl;

    Listing 11-10

    Rewriting our query using CROSS JOIN

    ```


    Notice the lack of the `ON` clause, which means no join condition.


    What if we were selecting more than one column from the newlang_tbl, say both
    language and year? Would the number of combinations increase dramatically from
    our cross join above? Turns out that no, the number of records in the resultset
    would be exactly the same as before (Listing [11-11](#A457348_1_En_11_Chapter.html#Par31)).
    A cartesian product is the combination of records from the tables participating
    in the joins, not within the unit of record for a single table.


    | author | language | year |

    | --- | --- | --- |

    | Colmerauer | Prolog | 1972 |

    | Colmerauer | Perl | 1987 |

    | Colmerauer | APL | 1964 |

    | … | … | … |


    ```

    SELECT author, language, year

    FROM authors_tbl CROSS JOIN newlang_tbl;

    Listing 11-11

    Selecting multiple columns from a table participating in a cross join

    ```


    A cross join is not something you would come across often. It is of some utility
    when either of the tables is small, that is, consisting of a few rows, and you
    need a combination of all the values of it joined with a bigger table. However
    I’d advise against running cross joins on actual production database servers unless
    you really understand why you need them in the scenario.


    ## Self Joins


    Sometimes a table within its own columns has meaningful data but one (or more)
    of its fields refer to another field in the same table. For example, if we have
    a table in which we capture programming languages that influenced other programming
    languages and denote the influence relationship by the language id, to show the
    resolved output we would have to join the table with itself. This is also called
    a self join. Consider the table created below and pay close attention to the data
    being inserted (Listing [11-12](#A457348_1_En_11_Chapter.html#Par34)).


    | id | language | influenced_by |

    | --- | --- | --- |

    | 1 | Fortran |   |

    | 2 | Pascal | 3 |

    | 3 | Algol | 1 |


    ```

    CREATE TABLE inflang_tbl (id INTEGER PRIMARY KEY,

    language VARCHAR(20) NOT NULL,

    influenced_by INTEGER);

    INSERT INTO inflang_tbl (id, language)

    VALUES (1, ''Fortran'');

    INSERT INTO inflang_tbl (id, language, influenced_by)

    VALUES (2, ''Pascal'', 3);

    INSERT INTO inflang_tbl (id, language, influenced_by)

    VALUES (3, ''Algol'', 1);

    Listing 11-12

    Creating and populating our language influence table

    ```


    Our goal is to now write a self join query to display which language influenced
    which one, that is, resolve the influenced_by column (Listing [11-13](#A457348_1_En_11_Chapter.html#Par36)).


    | id | language | influenced |

    | --- | --- | --- |

    | 3 | Algol | Pascal |

    | 1 | Fortran | Algol |


    ```

    SELECT l1.id,

    l1.language,

    l2.language AS influenced

    FROM inflang_tbl l1, inflang_tbl l2

    WHERE l1.id = l2.influenced_by;

    Listing 11-13

    Running a self join query

    ```


    Notice the use of table aliases to qualify the join condition columns as separate
    and the use of the `AS` keyword that renames the column in the output.


    What if we wanted to use the alternative SQL-92 `JOIN` syntax for our self join?
    Well as it turns out, there is no special self join keyword or clause because
    it is not needed. To the SQL query interpreter, you have created an inner join
    on two tables who just happen to have exactly similar contents. So we can rewrite
    the Listing [11-13](#A457348_1_En_11_Chapter.html#Par36) query using our familiar
    `JOIN` keyword as below (Listing [11-14](#A457348_1_En_11_Chapter.html#Par39)).


    ```

    SELECT l1.id,

    l1.language,

    l2.language AS influenced

    FROM inflang_tbl l1 JOIN inflang_tbl l2

    ON l1.id = l2.influenced_by;

    Listing 11-14

    Running a self join query using JOIN

    ```'
  trans: "\n## 外连接\n\n既然我们在代码清单 11-3 中遇到了内连接，这让我们联想到外连接的存在。在这种连接中，结果集由满足连接条件的行以及**其中一个表**中不满足条件的行组成。如果我们希望结果集中包含第一个表中那些不满足条件的行，我们就使用`左外连接`。反之，当需要第二个表中的行时，我们则使用`右外连接`。\n\
    \n这起初听起来有点令人困惑，因此让我们通过一个例子来澄清这个概念。让我们向 `newlang_tbl` 表中添加一行关于 Lisp 编程语言的数据，但我们不会为此在\
    \ `authors` 表中创建任何条目（代码清单 11-6）。\n\n```sql\nINSERT INTO newlang_tbl\nVALUES (6,\
    \ 'Lisp', 1958, 'ANSI');\n```\n\n代码清单 11-6\n添加新行以说明外连接\n\n如果我们像代码清单 11-1 那样对两个表运行\
    \ `内连接` 查询，我们将得到与当时类似的输出。我们添加的这行新数据不会出现在结果集中。但是，让我们尝试一个 `左外连接`，我们明确希望尽管在 `authors`\
    \ 表中没有对应条目，也要让这行新数据出现在结果中。这样，我们的第一个表必须是 `newlang_tbl`，查询将如下所示（代码清单 11-7）。\n\n\
    | 语言 (language) | 作者 (author) |\n| --- | --- |\n| Prolog | Colmerauer |\n| Perl\
    \ | Wall |\n| APL | Ousterhout |\n| Tcl | Iverson |\n| BASIC | Kemeny |\n| BASIC\
    \ | Kurtz |\n| Lisp | |\n\n```sql\nSELECT language, author\nFROM newlang_tbl n\
    \ LEFT OUTER JOIN authors_tbl a\nON n.id = a.language_id;\n```\n\n代码清单 11-7\n\
    左外连接示例\n\n啊哈，成功了！`左外连接` 允许我们将 Lisp 这一行“偷偷”放入结果集，其作者值为 `null`。查看查询清单，如果你立即想到，只需交换连接表的顺序，我们就可以将其转换为\
    \ `右外连接`，那么你绝对正确（代码清单 11-8）。\n\n```sql\nSELECT language, author\nFROM authors_tbl\
    \ a RIGHT OUTER JOIN newlang_tbl n\nON n.id = a.language_id;\n```\n\n代码清单 11-8\n\
    右外连接示例\n\n此查询的输出将与代码清单 11-7 中的完全相同。注意，我们在 `ON` 子句中指定的连接条件不需要任何顺序更改。由于所有的右外连接都可以写成左外连接（反之亦然），因此很少见到右外连接在实际中的许多应用。SQLite\
    \ 甚至完全不支持右外连接，这倒也无妨。\n\n## 交叉连接\n\n你可能会想，如果我们从查询中省略连接条件会发生什么。运行连接查询时，后台发生的事情是：首先，由参与连接的表生成所有可能的行组合。然后，选择满足连接条件的行进行输出（或进一步处理）。如果我们省略连接条件，作为输出我们将得到所有可能的记录组合（代码清单\
    \ 11-9）。这被称为 `交叉连接` 或表的 `笛卡尔积`，通常用符号 `X` 表示。\n\n| 作者 (author) | 语言 (language)\
    \ |\n| --- | --- |\n| Colmerauer | Prolog |\n| Colmerauer | Perl |\n| Colmerauer\
    \ | APL |\n| Colmerauer | Tcl |\n| Colmerauer | BASIC |\n| Colmerauer | Lisp |\n\
    | Wall | Prolog |\n| Wall | Perl |\n| Wall | APL |\n| Wall | Tcl |\n| Wall | BASIC\
    \ |\n| Wall | Lisp |\n| Ousterhout | Prolog |\n| … | … |\n\n```sql\nSELECT author,\
    \ language\nFROM authors_tbl, newlang_tbl;\n```\n\n代码清单 11-9\n显示我们表笛卡尔积的查询\n\n\
    这里的查询输出被截断了，但在你的计算机上运行时，结果集中应该得到 36 行，包含每个作者和语言的组合。重写此查询的另一种方法是实际使用 `JOIN` 关键字，并在前面加上\
    \ `CROSS` 参数，如下所示（代码清单 11-10）。\n\n```sql\nSELECT author, language\nFROM authors_tbl\
    \ CROSS JOIN newlang_tbl;\n```\n\n代码清单 11-10\n使用 CROSS JOIN 重写我们的查询\n\n注意这里没有\
    \ `ON` 子句，这意味着没有连接条件。\n\n如果我们从 `newlang_tbl` 中选择多个列，比如同时选择 `language` 和 `year`\
    \ 呢？组合的数量会从我们上面的交叉连接急剧增加吗？事实证明不会，结果集中的记录数量将与之前完全相同（代码清单 11-11）。笛卡尔积是参与连接的表之间的记录组合，而不是单个表记录单元内的组合。\n\
    \n| 作者 (author) | 语言 (language) | 年份 (year) |\n| --- | --- | --- |\n| Colmerauer\
    \ | Prolog | 1972 |\n| Colmerauer | Perl | 1987 |\n| Colmerauer | APL | 1964 |\n\
    | … | … | … |\n\n```sql\nSELECT author, language, year\nFROM authors_tbl CROSS\
    \ JOIN newlang_tbl;\n```\n\n代码清单 11-11\n从参与交叉连接的表中选择多列\n\n交叉连接并不是你经常遇到的东西。当其中一张表很小（即只有几行）并且你需要将其所有值与一张更大的表进行组合时，它有一定的用处。然而，我建议不要在实际的生产数据库服务器上运行交叉连接，除非你真的理解为什么在该场景下需要它们。\n\
    \n## 自连接\n\n有时，一个表在其自身列内包含有意义的数据，但其中一个（或多个）字段引用了同一表中的另一个字段。例如，如果我们有一个表，用于记录哪些编程语言影响了其他编程语言，并通过语言\
    \ ID 表示影响关系，为了显示解析后的输出，我们必须将表与其自身连接。这也称为 `自连接`。请考虑下面创建的表，并密切关注插入的数据（代码清单 11-12）。\n\
    \n| id | 语言 (language) | 受影响于 (influenced_by) |\n| --- | --- | --- |\n| 1 | Fortran\
    \ | |\n| 2 | Pascal | 3 |\n| 3 | Algol | 1 |\n\n```sql\nCREATE TABLE inflang_tbl\
    \ (id INTEGER PRIMARY KEY,\nlanguage VARCHAR(20) NOT NULL,\ninfluenced_by INTEGER);\n\
    \nINSERT INTO inflang_tbl (id, language)\nVALUES (1, 'Fortran');\n\nINSERT INTO\
    \ inflang_tbl (id, language, influenced_by)\nVALUES (2, 'Pascal', 3);\n\nINSERT\
    \ INTO inflang_tbl (id, language, influenced_by)\nVALUES (3, 'Algol', 1);\n```\n\
    \n代码清单 11-12\n创建并填充我们的语言影响表\n\n我们现在的目标是编写一个 `自连接` 查询，以显示哪种语言影响了哪一种，即解析 `influenced_by`\
    \ 列（代码清单 11-13）。\n\n| id | 语言 (language) | 被影响 (influenced) |\n| --- | --- | ---\
    \ |\n| 3 | Algol | Pascal |\n| 1 | Fortran | Algol |\n\n```sql\nSELECT l1.id,\n\
    \       l1.language,\n       l2.language AS influenced\nFROM inflang_tbl l1, inflang_tbl\
    \ l2\nWHERE l1.id = l2.influenced_by;\n```\n\n代码清单 11-13\n运行自连接查询\n\n注意这里使用了表别名来限定连接条件列，并将其区分开，同时使用了\
    \ `AS` 关键字在输出中重命名列。\n\n如果我们想使用另一种 SQL-92 的 `JOIN` 语法来进行自连接呢？事实证明，没有特殊的 `自连接` 关键字或子句，因为不需要。对于\
    \ SQL 查询解释器来说，你是在两个内容恰好完全相同的表上创建了一个 `内连接`。因此，我们可以使用熟悉的 `JOIN` 关键字重写代码清单 11-13\
    \ 的查询，如下所示（代码清单 11-14）。\n\n```sql\nSELECT l1.id,\n       l1.language,\n      \
    \ l2.language AS influenced\nFROM inflang_tbl l1 JOIN inflang_tbl l2\nON l1.id\
    \ = l2.influenced_by;\n```\n\n代码清单 11-14\n使用 JOIN 运行自连接查询\n"
- fmt: '## Non-Equi Joins


    The joins we have seen till now have largely dealt with equality in their join
    condition. While this is the most common way of joining tables together, we are
    by no means restricted to use only equality. Let’s put another join condition
    between the `newlang_tbl` and `authors_tbl` between the `id` and `author_id` this
    time (Listing 11-15).


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 1 | 2 | Wall | Prolog |

    | 1 | 3 | Ousterhout | Prolog |

    | 2 | 3 | Ousterhout | Perl |

    | 1 | 4 | Iverson | Prolog |

    | 2 | 4 | Iverson | Perl |

    | 3 | 4 | Iverson | APL |

    | 1 | 5 | Kemeny | Prolog |

    | 2 | 5 | Kemeny | Perl |

    | 3 | 5 | Kemeny | APL |

    | 4 | 5 | Kemeny | Tcl |

    | 1 | 6 | Kurtz | Prolog |

    | 2 | 6 | Kurtz | Perl |

    | 3 | 6 | Kurtz | APL |

    | 4 | 6 | Kurtz | Tcl |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id;

    Listing 11-15

    A non-equi join

    ```


    While not the most logical of results, it does however satisfy our non-equality
    join condition that in each row the `id` field is lesser than the corresponding
    `author_id` field value. We can also freely mix this result with an equality condition
    using the familiar `AND` operator within the same query (Listing 11-16).


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 3 | 4 | Iverson | APL |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id

    AND id = language_id;

    Listing 11-16

    Using the equality and non-equality conditions

    ```


    The result now consists of records where the author of a language has their `author_id`
    value greater than their created languages’ `id`.


    ## 12. Subqueries


    A subquery, simply put, is a query written as a part of a bigger statement. Think
    of it as a `SELECT` statement inside another one. The result of the inner `SELECT`
    can then be used in the outer query. Let us take a simple example to illustrate
    this.


    Consider the same source tables as the ones in the joins chapter – `authors_tbl`
    and `newlang_tbl`. We will try to write a query (and a subquery) to display the
    author of a particular language (Listing 12-1).


    ```

    SELECT author FROM authors_tbl

    WHERE language_id IN

    ( SELECT id FROM newlang_tbl

    WHERE language="Tcl");

    Listing 12-1

    A simple subquery example

    ```


    ![A457348_1_En_12_Figa_HTML.gif](A457348_1_En_12_Figa_HTML.gif)


    The subquery `SELECT id FROM newlang_tbl WHERE language=''Tcl''` picks the correct
    language `id` from the `newlang_tbl` and passes it on to the outer query on the
    authors table. This frees us from the responsibility of joining the two tables
    using the language `id` field.


    We can visualize the intermediate step where the subquery has already resolved
    to a value. The query would now look something like `SELECT author FROM authors_tbl
    WHERE language_id IN (4)`.


    Which approach to take in certain situations – a join, a subquery, or a combination
    of both – is mostly a matter of personal preference. Other times, one approach
    will be clearly the superior choice. Remember that all joins can be rewritten
    as subqueries, but the reverse is not true in all cases.


    ### Types of Subqueries


    We can broadly classify subqueries into three categories.


    1.  **Scalar subqueries** A subquery that returns only a single column of a single
    row as its output. The example in the previous section, where the subquery returns
    the `id` for Tcl, is a scalar subquery.

    2.  **Row subqueries** A subquery that returns a single row but more than one
    column. These are the least important type of subqueries since most database management
    systems do not support it, including SQLite.

    3.  **Table subqueries** A table subquery can return more than a single row and
    many columns per row. In essence, it can return a table itself to take part in
    your outer query.


    To illustrate the usage of table subqueries, let us take an example where we wish
    to display all the programming language writers who created a language after 1980
    (Listing 12-2).


    | author | language |

    | --- | --- |

    | Wall | Perl |

    | Ousterhout | Tcl |


    ```

    SELECT author, language

    FROM authors_tbl a,

    (SELECT id, language

    FROM newlang_tbl

    WHERE year > 1980) n

    WHERE a.language_id = n.id;

    Listing 12-2

    A table subquery example

    ```


    Carefully study the `FROM` clause of the query above. Our table subquery is placed
    within it, and it returns a set of languages that were created after 1980. The
    result consists of two rows and two columns, one of which, that is, `language`
    is picked up to be displayed in the final output.


    ### Existence Tests in Subqueries


    The keyword `EXISTS` tests the presence of any number of rows returned from a
    subquery. We usually don’t care about the columns being returned by the mere existence
    of rows satisfying a specific criterion. Let’s try to use `EXISTS` test to display
    languages who have an author entry in the `authors_tbl` (Listing 12-3).


    | language | year |

    | --- | --- |

    | Prolog | 1972 |

    | Perl | 1987 |

    | APL | 1964 |

    | Tcl | 1988 |

    | BASIC | 1964 |


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-3

    Using an existence test

    ```


    Notice the subquery `WHERE` clause in this case. It is effectively referencing
    the outer table field using `newlang_tbl.id`. For whichever languages this existence
    test will be satisfied, the outer query will add to the resultset.


    We can add the option `NOT` to the existence test to find the complement of the
    result (Listing 12-4).


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE NOT EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-4

    Using NOT in the existence test

    ```


    | language | year |

    | --- | --- |

    | Lisp | 1958 |


    Recall that we had never put the corresponding entry in the authors table for
    Lisp in the last chapter.


    So who created Lisp anyway?


    Lisp is the second oldest programming language whose major dialect is still in
    active use. John McCarthy created Lisp in 1958 as a part of his research, and
    other people chipped in to help implement it on the computers of that era.


    McCarthy by all accounts was a genius-level intellect, widely admired by his peers.
    He was one of the pioneers of the field of Artificial Intelligence and even coined
    the term. With the creation of Lisp, he advanced the field of programming language
    design by leaps and bounds. Over the past three decades, features from Lisp are
    slowly trickling into mainstream programming languages. Many renowned technologists
    still marvel at the design of the decades-old Lisp dialects – Common Lisp and
    Scheme.


    Though McCarthy died in 2011 at the age of 84, his legacy and work lives on.'
  raw: '## Non-Equi Joins


    The joins we have seen till now have largely dealt with equality in their join
    condition. While this is the most common way of joining tables together, we are
    by no means restricted to use only equality. Let’s put another join condition
    between the newlang_tbl and authors_tbl between the id and author_id this time
    (Listing [11-15](#A457348_1_En_11_Chapter.html#Par41)).


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 1 | 2 | Wall | Prolog |

    | 1 | 3 | Ousterhout | Prolog |

    | 2 | 3 | Ousterhout | Perl |

    | 1 | 4 | Iverson | Prolog |

    | 2 | 4 | Iverson | Perl |

    | 3 | 4 | Iverson | APL |

    | 1 | 5 | Kemeny | Prolog |

    | 2 | 5 | Kemeny | Perl |

    | 3 | 5 | Kemeny | APL |

    | 4 | 5 | Kemeny | Tcl |

    | 1 | 6 | Kurtz | Prolog |

    | 2 | 6 | Kurtz | Perl |

    | 3 | 6 | Kurtz | APL |

    | 4 | 6 | Kurtz | Tcl |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id;

    Listing 11-15

    A non-equi join

    ```


    While not the most logical of results, it does however satisfy our non-equality
    join condition that in each row the id field is lesser than the corresponding
    author_id field value. We can also freely mix this result with an equality condition
    using the familiar AND operator within the same query (Listing [11-16](#A457348_1_En_11_Chapter.html#Par43)).


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 3 | 4 | Iverson | APL |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id

    AND id = language_id;

    Listing 11-16

    Using the equality and non-equality conditions

    ```


    The result now consists of records where the author of a language has their author_id
    value greater than their created languages’ id.


    # 12. Subqueries


    A subquery, simply put, is a query written as a part of a bigger statement. Think
    of it as a `SELECT` statement inside another one. The result of the inner `SELECT`
    can then be used in the outer query. Let us take a simple example to illustrate
    this.


    Consider the same source tables as the ones in the joins chapter – authors_tbl
    and newlang_tbl. We will try to write a query (and a subquery) to display the
    author of a particular language (Listing [12-1](#A457348_1_En_12_Chapter.html#Par3)).


    ```

    SELECT author FROM authors_tbl

    WHERE language_id IN

    ( SELECT id FROM newlang_tbl

    WHERE language="Tcl");

    Listing 12-1

    A simple subquery example

    ```


    ![A457348_1_En_12_Figa_HTML.gif](A457348_1_En_12_Figa_HTML.gif)


    The subquery `SELECT id FROM newlang_tbl WHERE language=''Tcl`'' picks the correct
    language id from the newlang_tbl and passes it on to the outer query on the authors
    table. This frees us from the responsibility of joining the two tables using the
    language id field.


    We can visualize the intermediate step where the subquery has already resolved
    to a value. The query would now look something like `SELECT author FROM authors_tbl
    WHERE language_id IN (4)`.


    Which approach to take in certain situations – a join, a subquery, or a combination
    of both – is mostly a matter of personal preference. Other times, one approach
    will be clearly the superior choice. Remember that all joins can be rewritten
    as subqueries, but the reverse is not true in all cases.


    ## Types of Subqueries


    We can broadly classify subqueries into three categories.


    1.  Scalar subqueries A subquery that returns only a single column of a single
    row as its output. The example in the previous section, where the subquery returns
    the `id` for Tcl, is a scalar subquery.  

    2.  Row subqueries A subquery that returns a single row but more than one column.
    These are the least important type of subqueries since most database management
    systems do not support it, including SQLite.  

    3.  Table subqueries A table subquery can return more than a single row and many
    columns per row. In essence, it can return a table itself to take part in your
    outer query.  


    To illustrate the usage of table subqueries, let us take an example where we wish
    to display all the programming language writers who created a language after 1980
    (Listing [12-2](#A457348_1_En_12_Chapter.html#Par12)).


    | author | language |

    | --- | --- |

    | Wall | Perl |

    | Ousterhout | Tcl |


    ```

    SELECT author, language

    FROM authors_tbl a,

    (SELECT id, language

    FROM newlang_tbl

    WHERE year > 1980) n

    WHERE a.language_id = n.id;

    Listing 12-2

    A table subquery example

    ```


    Carefully study the `FROM` clause of the query above. Our table subquery is placed
    within it, and it returns a set of languages that were created after 1980\. The
    result consists of two rows and two columns, one of which, that is, language is
    picked up to be displayed in the final output.


    ## Existence Tests in Subqueries


    The keyword `EXISTS` tests the presence of any number of rows returned from a
    subquery. We usually don’t care about the columns being returned by the mere existence
    of rows satisfying a specific criterion. Let’s try to use `EXISTS` test to display
    languages who have an author entry in the authors_tbl (Listing [12-3](#A457348_1_En_12_Chapter.html#Par15)).


    | language | year |

    | --- | --- |

    | Prolog | 1972 |

    | Perl | 1987 |

    | APL | 1964 |

    | Tcl | 1988 |

    | BASIC | 1964 |


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-3

    Using an existence test

    ```


    Notice the subquery `WHERE` clause in this case. It is effectively referencing
    the outer table field using `newlang_tbl.id`. For whichever languages this existence
    test will be satisfied, the outer query will add to the resultset.


    We can add the option `NOT` to the existence test to find the complement of the
    result (Listing [12-4](#A457348_1_En_12_Chapter.html#Par18)).


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE NOT EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-4

    Using NOT in the existence test

    ```


    | language | year |

    | --- | --- |

    | Lisp | 1958 |


    Recall that we had never put the corresponding entry in the authors table for
    Lisp in the last chapter.


    So who created Lisp anyway?


    Lisp is the second oldest programming language whose major dialect is still in
    active use. John McCarthy created Lisp in 1958 as a part of his research, and
    other people chipped in to help implement it on the computers of that era.


    McCarthy by all accounts was a genius-level intellect, widely admired by his peers.
    He was one of the pioneers of the field of Artificial Intelligence and even coined
    the term. With the creation of Lisp, he advanced the field of programming language
    design by leaps and bounds. Over the past three decades, features from Lisp are
    slowly trickling into mainstream programming languages. Many renowned technologists
    still marvel at the design of the decades-old Lisp dialects – Common Lisp and
    Scheme.


    Though McCarthy died in 2011 at the age of 84, his legacy and work lives on.'
  trans: '

    ## 非等值连接


    到目前为止我们看到的连接，其连接条件主要处理的是相等关系。虽然这是将表连接在一起的最常见方式，但我们绝不限于只使用相等条件。这次，让我们在 `newlang_tbl`
    和 `authors_tbl` 表之间，对 `id` 和 `author_id` 字段设定另一个连接条件（清单 11-15）。


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 1 | 2 | Wall | Prolog |

    | 1 | 3 | Ousterhout | Prolog |

    | 2 | 3 | Ousterhout | Perl |

    | 1 | 4 | Iverson | Prolog |

    | 2 | 4 | Iverson | Perl |

    | 3 | 4 | Iverson | APL |

    | 1 | 5 | Kemeny | Prolog |

    | 2 | 5 | Kemeny | Perl |

    | 3 | 5 | Kemeny | APL |

    | 4 | 5 | Kemeny | Tcl |

    | 1 | 6 | Kurtz | Prolog |

    | 2 | 6 | Kurtz | Perl |

    | 3 | 6 | Kurtz | APL |

    | 4 | 6 | Kurtz | Tcl |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id;

    Listing 11-15

    一个非等值连接

    ```


    虽然结果在逻辑上不是最合理的，但它确实满足了我们的非等值连接条件，即每一行中 `id` 字段的值都小于对应的 `author_id` 字段值。我们还可以使用熟悉的
    `AND` 运算符，在同一查询中自由地将此结果与等值条件混合（清单 11-16）。


    | id | author_id | author | language |

    | --- | --- | --- | --- |

    | 3 | 4 | Iverson | APL |

    | 5 | 6 | Kurtz | BASIC |


    ```

    SELECT id,

    author_id,

    author,

    language

    FROM authors_tbl, newlang_tbl

    WHERE id < author_id

    AND id = language_id;

    Listing 11-16

    同时使用等值和非等值条件

    ```


    现在的结果包含这样的记录：语言作者的 `author_id` 值大于他们所创建语言的 `id`。


    ## 12. 子查询


    简而言之，子查询是作为更大语句一部分编写的查询。可以将其视为另一个 `SELECT` 语句内部的 `SELECT` 语句。内部 `SELECT` 的结果随后可以在外部查询中使用。让我们用一个简单的例子来说明。


    考虑与连接章节中相同的源表——`authors_tbl` 和 `newlang_tbl`。我们将尝试编写一个查询（和一个子查询）来显示特定语言的作者（清单
    12-1）。


    ```

    SELECT author FROM authors_tbl

    WHERE language_id IN

    ( SELECT id FROM newlang_tbl

    WHERE language="Tcl");

    Listing 12-1

    一个简单的子查询示例


    ![A457348_1_En_12_Figa_HTML.gif](img/A457348_1_En_12_Figa_HTML.gif)

    ```


    子查询 `SELECT id FROM newlang_tbl WHERE language=''Tcl''` 从 `newlang_tbl` 中选取正确的语言
    `id`，并将其传递给针对作者表的外部查询。这使我们免于使用语言 `id` 字段连接两个表的责任。


    我们可以想象一下子查询已经解析为一个值的中间步骤。查询现在看起来像这样：`SELECT author FROM authors_tbl WHERE language_id
    IN (4)`。


    在特定情况下采用哪种方法——连接、子查询或两者结合——主要取决于个人偏好。而在其他时候，一种方法显然是更优的选择。请记住，所有连接都可以改写为子查询，但反之则并非在所有情况下都成立。


    ### 子查询的类型


    我们可以大致将子查询分为三类。


    1.  **标量子查询** 一种仅返回单行单列作为其输出的子查询。上一节中的示例，子查询返回 Tcl 的 `id`，就是一个标量子查询。

    2.  **行子查询** 一种返回单行但多列的子查询。这是最不重要的子查询类型，因为大多数数据库管理系统不支持它，包括 SQLite。

    3.  **表子查询** 表子查询可以返回多行，并且每行可以包含多列。本质上，它可以返回一个表本身来参与你的外部查询。


    为了说明表子查询的用法，让我们举一个例子，我们希望显示所有在 1980 年之后创建了语言的编程语言作者（清单 12-2）。


    | author | language |

    | --- | --- |

    | Wall | Perl |

    | Ousterhout | Tcl |


    ```

    SELECT author, language

    FROM authors_tbl a,

    (SELECT id, language

    FROM newlang_tbl

    WHERE year > 1980) n

    WHERE a.language_id = n.id;

    Listing 12-2

    一个表子查询示例

    ```


    仔细研究上面查询的 `FROM` 子句。我们的表子查询放在其中，它返回一组在 1980 年之后创建的语言。结果包含两行两列，其中一列，即 `language`，被选取用于最终输出。


    ### 子查询中的存在性测试


    关键字 `EXISTS` 测试子查询返回的行数是否存在。我们通常不关心子查询返回的列，只关心是否存在满足特定条件的行。让我们尝试使用 `EXISTS` 测试来显示在
    `authors_tbl` 中有作者条目的语言（清单 12-3）。


    | language | year |

    | --- | --- |

    | Prolog | 1972 |

    | Perl | 1987 |

    | APL | 1964 |

    | Tcl | 1988 |

    | BASIC | 1964 |


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-3

    使用存在性测试

    ```


    注意本例中的子查询 `WHERE` 子句。它有效地使用 `newlang_tbl.id` 引用了外部表的字段。对于满足此存在性测试的任何语言，外部查询都会将其加入结果集。


    我们可以在存在性测试中添加 `NOT` 选项来查找结果的补集（清单 12-4）。


    ```

    SELECT language,

    year

    FROM newlang_tbl

    WHERE NOT EXISTS (SELECT * FROM authors_tbl

    WHERE newlang_tbl.id = language_id);

    Listing 12-4

    在存在性测试中使用 NOT

    ```


    | language | year |

    | --- | --- |

    | Lisp | 1958 |


    回想一下，我们在上一章中从未在作者表中为 Lisp 放入相应的条目。


    那么，到底是谁创造了 Lisp？


    Lisp 是第二古老的编程语言，其主要方言至今仍被积极使用。John McCarthy 在 1958 年作为其研究的一部分创建了 Lisp，其他人也纷纷加入，帮助在当时的计算机上实现它。


    McCarthy 普遍被认为是一位天才级的智者，深受同行钦佩。他是人工智能领域的先驱之一，甚至创造了这个术语。随着 Lisp 的创建，他在编程语言设计领域取得了巨大的飞跃。在过去的三十年里，Lisp
    的特性正慢慢渗入主流编程语言。许多著名的技术专家仍然对已有数十年历史的 Lisp 方言——Common Lisp 和 Scheme——的设计感到惊叹。


    尽管 McCarthy 于 2011 年去世，享年 84 岁，但他的遗产和工作仍然存在。

