- fmt: "## Selective Fields INSERT\n\n从我们上次接触`INSERT`语句开始，我们看到必须按照表创建时指定的顺序来提供要插入的数据。现在，我们将了解另一种变体，它允许我们克服这一限制，并通过根本不指定字段来处理插入其字段中包含NULL值的行（参见清单[3-4](#A457348_1_En_3_Chapter.html#Par14)）。虽然这种方法最初可能看起来有些冗长，但其优势很快就超过了任何与语句长度相关的顾虑。\n\
    \n```\nINSERT INTO table_name\n(field1,\n field2,\n . . .\n)\nVALUES\n(value1,\n\
    \ value2,\n . . .\n);\n```\n*清单 3-4 选择字段插入的通用语法*\n\n由于我们在语句本身中指定了字段顺序，因此我们可以自由地在同一个语句中重新排序值序列，从而消除了第一个限制。此外，如果我们希望在一条记录的任何字段中输入空（NULL）值，只需在语句的第一部分不包含该字段的名称，即可轻松实现。只要这些字段没有附加`NOT\
    \ NULL`约束，语句就可以在不指定任何您希望省略的字段的情况下正常运行。\n\n我们现在为`proglang_tblcopy`表编写一些`INSERT`语句，尝试插入一些未被任何组织标准化的语言和一些已被标准化的语言（参见清单[3-5](#A457348_1_En_3_Chapter.html#Par17)）。\n\
    \n```\nINSERT INTO proglang_tblcopy\n(id, language, author, year, standard)\n\
    VALUES\n(1, 'Prolog', 'Colmerauer', '1972', 'ISO');\n\nINSERT INTO proglang_tblcopy\n\
    (id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\n\nINSERT INTO\
    \ proglang_tblcopy\n(id, year, standard, language, author)\nVALUES\n(3, '1964',\
    \ 'ANSI', 'APL', 'Iverson');\n```\n*清单 3-5 向 proglang_tblcopy 表插入新数据*\n\n当您通过SQL界面运行此命令时，三行新数据将被插入表中。请注意第三行的顺序；它与我们创建表时使用的序列不同。此外，由于Perl（行id\
    \ 2）尚未被国际机构标准化，因此我们在执行`INSERT`操作时不指定字段名本身。这确保了该行的`standard`字段填充为null。\n\n为了验证这些语句的结果（表[3-1](#A457348_1_En_3_Chapter.html#Tab1)）并确保正确的数据进入了正确的字段，我们像之前一样运行一个简单的查询。\n\
    \n**表 3-1 在 proglang_tblcopy 上运行查询的结果**\n\n| id | language | author | year | standard\
    \ |\n| --- | --- | --- | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n\
    | 2 | Perl | Wall | 1987 | |\n| 3 | APL | Iverson | 1964 | ANSI |\n\n```\nSELECT\
    \ * FROM proglang_tblcopy;\n```\n\nSQL接口通常使用空格、问号（?）或有时甚至是单词'null'或'(null)'来显示空值。由于供应商之间没有标准化，每个实现可以自由选择其表示方式。\n\
    \n## Check Constraints\n\n数据必须有意义，人们才能从中获得见解。关系数据库的一大优势是它们能够实现良好的数据结构、基于适当数据类型的存储和空值规则。检查约束更进一步，通过验证特定字段中允许的值来加强数据完整性。\n\
    \n它们允许您提供一个逻辑表达式，插入的值会根据该表达式进行测试，然后被接受或拒绝。例如，假设我们希望确保在我们的编程语言表中，语言创建年份不能小于或等于1950（参见清单[3-6](#A457348_1_En_3_Chapter.html#Par24)）。这将阻止有人输入像190这样的年份值，除非我们想捕捉罗马帝国时期创建的编程语言，否则这是有意义的！\n\
    \n```\nCREATE TABLE proglang_constraints (\nid        INTEGER     NOT NULL,\n\
    language  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\nyear      INTEGER\
    \     NOT NULL\n            CHECK (year > 1950),\nstandard  VARCHAR(10) NULL);\n\
    ```\n*清单 3-6 为年份字段创建检查约束*\n\n请注意年份字段的完整定义，它在`NOT NULL`约束之后定义了检查约束。我们用于测试的逻辑表达式是`year\
    \ > 1950`，它禁止任何包含小于1951的年份值的行。让我们尝试输入这样一行来测试这个假设（参见清单[3-7](#A457348_1_En_3_Chapter.html#Par26)）。\n\
    \n```\ntestdb=# INSERT INTO proglang_constraints\n(id, language, author, year)\n\
    VALUES\n(1, 'Short Code', 'Mauchly', 1949);\nERROR:  new row for relation \"proglang_constraints\"\
    \ violates check constraint \"proglang_constraints_year_check\"\nDETAIL:  Failing\
    \ row contains (1, Short Code, Mauchly, 1949, null).\n```\n*清单 3-7 尝试违反检查约束*\n\
    \n虽然这是一个未被充分利用的功能，但检查约束非常有用。许多应用软件代码的目的是验证要插入的数据，而检查约束可以在这方面提供巨大帮助。"
  raw: "## Selective Fields INSERT\n\nFrom our last encounter with the `INSERT` statement,\
    \ we saw that we had to specify the data to be inserted in the same order as specified\
    \ during the creation of the table in question. We now look at another variation\
    \ that will allow us to overcome this limitation and handle inserting rows with\
    \ embedded NULL values in their fields by not specifying them at all (Listing\
    \ [3-4](#A457348_1_En_3_Chapter.html#Par14)). While this approach may seem verbose\
    \ initially, its advantages quickly outweigh any statement length-related concerns.\n\
    \n```\nINSERT INTO \n(,\n,\n. . .\n)\nVALUES\n(,\n,\n. . .\n);\nListing 3-4\n\
    General Syntax of INSERT with selected fields\n```\n\nSince we specify the field\
    \ order in the statement itself, we are free to reorder the values sequence in\
    \ the same statement, thus removing the first limitation. Also, if we wish to\
    \ enter an empty (NULL) value in any of the fields for a record, it is easy to\
    \ do so by simply not including the field’s name in the first part of the statement.\
    \ The statement would run fine without specifying any fields you wish to omit,\
    \ provided they do not have a `NOT NULL` constraint attached to them.\n\nWe now\
    \ write some INSERT statements for the proglang_tblcopy table, in which we try\
    \ to insert some languages that have not been standardized by any organizations\
    \ and some which have been (Listing [3-5](#A457348_1_En_3_Chapter.html#Par17)).\n\
    \n```\nINSERT INTO proglang_tblcopy\n(id, language, author, year, standard)\n\
    VALUES\n(1, 'Prolog', 'Colmerauer', '1972', 'ISO');\nINSERT INTO proglang_tblcopy\n\
    (id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\nINSERT INTO\
    \ proglang_tblcopy\n(id, year, standard, language, author)\nVALUES\n(3, '1964',\
    \ 'ANSI', 'APL', 'Iverson');\nListing 3-5\nInserting new data into the proglang_tblcopy\
    \ table\n```\n\nWhen you run this through your SQL interface, three new rows would\
    \ be inserted into the table. Notice the ordering of the third row; it is not\
    \ the same sequence we used to create the table. Also, since Perl (row id 2) has\
    \ not been standardized by an international body yet, so we do not specify the\
    \ field name itself while doing the `INSERT` operation. This ensures that the\
    \ standard field for the row is populated with null.\n\nTo verify the results\
    \ of these statements (Table [3-1](#A457348_1_En_3_Chapter.html#Tab1)) and to\
    \ make sure that the correct data went into the correct fields, we run a simple\
    \ query as before.\n\nTable 3-1\n\nResult of the Query Run on proglang_tblcopy\n\
    \n| id | language | author | year | standard |\n| --- | --- | --- | --- | ---\
    \ |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall | 1987 |   |\n\
    | 3 | APL | Iverson | 1964 | ANSI |\n\n```\nSELECT * FROM proglang_tblcopy;\n\
    ```\n\nNulls are often shown by SQL interfaces by a blank space or a question\
    \ mark (?) or sometimes even the word ‘null’ or ‘(null)’. Each implementation\
    \ is free to choose its representation since it is not standardized among vendors.\n\
    \n## Check Constraints\n\nData must be meaningful for someone to derive insights\
    \ from it. A great advantage of relational databases is that they enable good\
    \ structuring of data, proper data type-based storage, and null value rules. Check\
    \ constraints go a step even further by providing validation of what values are\
    \ allowed in a particular field.\n\nThey allow you to provide a logical expression\
    \ against which inserted values are tested and subsequently accepted or rejected.\
    \ For example, suppose we wish to ensure that in our programming languages table,\
    \ no language creation year could be less than or equal to 1950 (Listing [3-6](#A457348_1_En_3_Chapter.html#Par24)).\
    \ This would stop someone from entering values like 190 for the year, which makes\
    \ sense unless we wish to capture programming languages created during the Roman\
    \ Empire!\n\n```\nCREATE TABLE proglang_constraints (\nid        INTEGER     NOT\
    \ NULL,\nlanguage  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\nyear\
    \      INTEGER     NOT NULL\nCHECK (year > 1950),\nstandard  VARCHAR(10) NULL);\n\
    Listing 3-6\nCreating a check constraint for the year field\n```\n\nNote the full\
    \ definition of the year field that defines the check constraint after the `NOT\
    \ NULL` constraint. The logical expression we are testing against is `year > 1950,`\
    \ which disallows any row containing a year value less than 1951\\. Let’s try\
    \ entering such a row to test the hypotheses (Listing [3-7](#A457348_1_En_3_Chapter.html#Par26)).\n\
    \n```\ntestdb=# INSERT INTO proglang_constraints\n(id, language, author, year)\n\
    VALUES\n(1, 'Short Code', 'Mauchly', 1949);\nERROR:  new row for relation \"proglang_constraints\"\
    \ violates check constraint \"proglang_constraints_year_check\"\nDETAIL:  Failing\
    \ row contains (1, Short Code, Mauchly, 1949, null).\nListing 3-7\nTrying to violate\
    \ a check constraint\n```\n\nWhile an underused feature, check constraints are\
    \ extremely useful. A lot of application software code is written with the purpose\
    \ of validating data to be inserted, an area where check constraints can help\
    \ immensely."
  trans: "\n## 选择字段 INSERT\n\n从我们上次接触`INSERT`语句开始，我们看到必须按照表创建时指定的顺序来提供要插入的数据。现在，我们将了解另一种变体，它允许我们克服这一限制，并通过根本不指定字段来处理插入其字段中包含\
    \ NULL 值的行（参见清单 3-4）。虽然这种方法最初可能看起来有些冗长，但其优势很快就超过了任何与语句长度相关的顾虑。\n\n```\nINSERT\
    \ INTO table_name\n(field1,\n field2,\n . . .\n)\nVALUES\n(value1,\n value2,\n\
    \ . . .\n);\n```\n*清单 3-4 选择字段插入的通用语法*\n\n由于我们在语句本身中指定了字段顺序，因此我们可以自由地在同一个语句中重新排序值序列，从而消除了第一个限制。此外，如果我们希望在一条记录的任何字段中输入空（NULL）值，只需在语句的第一部分不包含该字段的名称，即可轻松实现。只要这些字段没有附加`NOT\
    \ NULL`约束，语句就可以在不指定任何您希望省略的字段的情况下正常运行。\n\n我们现在为`proglang_tblcopy`表编写一些`INSERT`语句，尝试插入一些未被任何组织标准化的语言和一些已被标准化的语言（参见清单\
    \ 3-5）。\n\n```\nINSERT INTO proglang_tblcopy\n(id, language, author, year, standard)\n\
    VALUES\n(1, 'Prolog', 'Colmerauer', '1972', 'ISO');\n\nINSERT INTO proglang_tblcopy\n\
    (id, language, author, year)\nVALUES\n(2, 'Perl', 'Wall', '1987');\n\nINSERT INTO\
    \ proglang_tblcopy\n(id, year, standard, language, author)\nVALUES\n(3, '1964',\
    \ 'ANSI', 'APL', 'Iverson');\n```\n*清单 3-5 向 proglang_tblcopy 表插入新数据*\n\n当您通过\
    \ SQL 界面运行此命令时，三行新数据将被插入表中。请注意第三行的顺序；它与我们创建表时使用的序列不同。此外，由于 Perl（行 id 2）尚未被国际机构标准化，因此我们在执行`INSERT`操作时不指定字段名本身。这确保了该行的`standard`字段填充为\
    \ null。\n\n为了验证这些语句的结果（表 3-1）并确保正确的数据进入了正确的字段，我们像之前一样运行一个简单的查询。\n\n**表 3-1 在 proglang_tblcopy\
    \ 上运行查询的结果**\n\n| id | language | author | year | standard |\n| --- | --- | ---\
    \ | --- | --- |\n| 1 | Prolog | Colmerauer | 1972 | ISO |\n| 2 | Perl | Wall |\
    \ 1987 | |\n| 3 | APL | Iverson | 1964 | ANSI |\n\n```\nSELECT * FROM proglang_tblcopy;\n\
    ```\n\nSQL 接口通常使用空格、问号（?）或有时甚至是单词'null'或'(null)'来显示空值。由于供应商之间没有标准化，每个实现可以自由选择其表示方式。\n\
    \n## 检查约束\n\n数据必须有意义，人们才能从中获得见解。关系数据库的一大优势是它们能够实现良好的数据结构、基于适当数据类型的存储和空值规则。检查约束更进一步，通过验证特定字段中允许的值来加强数据完整性。\n\
    \n它们允许您提供一个逻辑表达式，插入的值会根据该表达式进行测试，然后被接受或拒绝。例如，假设我们希望确保在我们的编程语言表中，语言创建年份不能小于或等于\
    \ 1950（参见清单 3-6）。这将阻止有人输入像 190 这样的年份值，除非我们想捕捉罗马帝国时期创建的编程语言，否则这是有意义的！\n\n```\n\
    CREATE TABLE proglang_constraints (\nid        INTEGER     NOT NULL,\nlanguage\
    \  VARCHAR(20) NOT NULL,\nauthor    VARCHAR(25) NOT NULL,\nyear      INTEGER \
    \    NOT NULL\n            CHECK (year > 1950),\nstandard  VARCHAR(10) NULL);\n\
    ```\n*清单 3-6 为年份字段创建检查约束*\n\n请注意年份字段的完整定义，它在`NOT NULL`约束之后定义了检查约束。我们用于测试的逻辑表达式是`year\
    \ > 1950`，它禁止任何包含小于 1951 的年份值的行。让我们尝试输入这样一行来测试这个假设（参见清单 3-7）。\n\n```\ntestdb=#\
    \ INSERT INTO proglang_constraints\n(id, language, author, year)\nVALUES\n(1,\
    \ 'Short Code', 'Mauchly', 1949);\nERROR:  new row for relation \"proglang_constraints\"\
    \ violates check constraint \"proglang_constraints_year_check\"\nDETAIL:  Failing\
    \ row contains (1, Short Code, Mauchly, 1949, null).\n```\n*清单 3-7 尝试违反检查约束*\n\
    \n虽然这是一个未被充分利用的功能，但检查约束非常有用。许多应用软件代码的目的是验证要插入的数据，而检查约束可以在这方面提供巨大帮助。\n"
- fmt: '## Primary Key Constraint


    关系数据模型背后的数学概念是集合论。这个离散数学领域处理无序的值包，这些值可以被唯一标识，即不包含重复项。对于一个表，一个值是一条数据记录，而每条记录的一个键列是识别它的完美方式。


    主键用于通过强制某个字段具有唯一值，从而至少以一种方式使每条记录唯一。它们不一定仅限于一个字段；字段的组合也可以被定义为表的主键。选择某个字段或其组合作为主键时，必须仔细考虑其逻辑含义。


    通常，最佳的主键候选者并非我们直觉中的标识符。如果你存储的是关于人的数据，他们的名字是我们现实生活中识别他们的方式。但在主键这个不容犯错的世界里，如果两个人都叫‘David
    Childs’会发生什么？


    在我们的编程语言表中，`id`字段是应用主键约束的一个好选择。我们现在将修改`CREATE TABLE`语句来加入这个约束（参见代码清单[3-8](#A457348_1_En_3_Chapter.html#Par32)）。


    ```

    CREATE TABLE proglang_tbltmp (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    代码清单 3-8

    包含主键的`CREATE TABLE`语句


    ID字段通常被选作主键。注意在这个特定的表中，`language`字段也可以工作，因为语言名称是唯一的。但是，如果我们有一个描述人的表，我们应该尝试找到一个逻辑上唯一的字段，比如他们的SSN号码或员工ID号码。


    尽管主键的概念看起来自然且必要，但大多数数据库实现并没有真正强制执行它。这包括本书中用于示例的两个数据库——PostgreSQL和SQLite。你可以自由地创建一个没有任何主键的表（就像我们在本节之前所做的那样），并一遍又一遍地插入完全重复的数据。这不是理想的情况，但如果你愿意，仍然是允许的。


    让我们在本章开头使用的`proglang_tblcopy`表中添加一些重复的行（参见代码清单[3-9](#A457348_1_En_3_Chapter.html#Par36)）。


    ```

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    ```

    代码清单 3-9

    在没有主键的表中插入重复数据


    请注意，表中原本已有三条唯一的行，我们又添加了两条重复的行。`INSERT`语句的执行是静默的，表示成功。现在让我们验证表的内容（表[3-2](#A457348_1_En_3_Chapter.html#Tab2)）。


    表 3-2

    在`proglang_tblcopy`上运行查询的结果，显示重复的行


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 2 | Perl | Wall | 1987 |   |

    | 2 | Perl | Wall | 1987 |   |


    ```

    SELECT * FROM proglang_tblcopy;

    ```


    如果我们尝试在包含主键约束的表——`proglang_tbltmp`中添加重复记录，我们立刻会收到一个错误（代码清单[3-10](#A457348_1_En_3_Chapter.html#Par40)）。


    ```

    INSERT INTO proglang_tbltmp

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbltmp_pkey"

    DETAIL:  Key (id)=(2) already exists.

    ```

    代码清单 3-10

    尝试添加违反主键约束的重复记录


    ## Unique Key Constraints


    唯一键像主键一样，也用于使表中的每条记录唯一。一旦你定义了表的主键，任何你希望强制为唯一的其他字段都通过此约束来完成。经过深思熟虑的唯一性约束对于确保表中的数据健全大有帮助。


    例如，在我们的数据库中，现在对`language`字段设置唯一键约束是有意义的（代码清单[3-11](#A457348_1_En_3_Chapter.html#Par43)）。这将确保即使`id`字段不同，也不会有任何记录重复关于同一编程语言的信息。


    ```

    CREATE TABLE proglang_tbluk (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL  UNIQUE,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    代码清单 3-11

    带有唯一键约束的编程语言表


    我们现在将尝试插入两条关于Prolog语言的行，巧妙地更改`id`字段来测试我们的唯一约束（代码清单[3-12](#A457348_1_En_3_Chapter.html#Par45)）。


    ```

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (1, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    INSERT 0 1

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (2, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbluk_language_key"

    DETAIL:  Key (language)=(Prolog) already exists.

    ```

    代码清单 3-12

    在带有唯一键约束的表中插入重复数据


    注意，我们在字段前写了`UNIQUE`这个词，并在表创建命令中省略了`KEY`。你可以根据需要为任意多的字段应用唯一约束。


    我们将在第[15](#A457348_1_En_15_Chapter.html)章讨论索引时再次回顾唯一键和主键约束。


    ## Differences Between a Primary Key and a Unique Key


    你可能已经注意到上述两种约束在用途上是相似的。然而，它们之间有一些区别。


    1.  主键字段不能取`NULL`值，而具有唯一约束的字段可以。然而，由于约束的定义要求每个值必须是唯一的，因此只能有一条这样的记录。

    2.  你被允许只为一个表定义一个主键约束，但你可以对任意多的字段应用唯一约束。


    根据我的经验，这是任何涉及SQL的工作最喜欢的面试问题之一。考虑到这些约束对逻辑数据模型的重要性，这并不太不公平。只需记住将主键视为`NOT NULL UNIQUE`约束。


    主键确保了一种区分表中行的逻辑方式。它是区分记录的最低标准。唯一约束通常作为附加规则添加，以在考虑业务或领域规则的同时确保数据健全。虽然没有它们也可以，但它们扮演着守门人的角色，只允许好的数据通过。


    # 4. Operations on Tables


    表是关系世界中的基本存储容器。一个数据库通常包含许多表，每个表代表一个实体的集合。随着需求的发展，数据库中的表也会发展，数据库管理员（DBA）经常对单个表执行管理操作，比如删除它们或更改它们的定义。虽然典型的数据库用户没有被授予在大型生产数据库上执行此类操作的权限，但出于教学目的，熟悉它们仍然很重要。


    你可能已经注意到，每当我们引入一个新概念时，我们都在不断创建新表。这产生了并非理想的后果，即我们的数据库中充斥着许多类似的表，每个表都保存着编程语言数据，但定义和约束略有不同。我们现在将着手删除不需要的表并修改现有的表以满足我们的需求。'
  raw: '## Primary Key Constraint


    The mathematical concept behind the relational data model was Set theory. This
    area of discrete maths deals with unordered bag of values that can be uniquely
    identified, that is, contains no duplicates. For a table, a value is a record
    of data and a key column for each record is the perfect way to identify it.


    A primary key is used to make each record unique in at least one way by forcing
    a field to have a unique value. They do not have to be restricted to only one
    field; a combination of them can also be defined as a primary key for a table.
    One must think carefully about the logical implications of choosing a field or
    a combination of them as a primary key.


    Often the best primary key candidates are not our instinctive identifiers for
    a collection. If you were storing data about people, their names are something
    we identify them with in real-life scenarios. But what would happen in the unforgiving
    world of primary keys if two people were named ‘David Childs’?


    In our programming languages table, the id field is a good choice for applying
    the primary key constraint. We will now modify our `CREATE TABLE` statement to
    incorporate this (Listing [3-8](#A457348_1_En_3_Chapter.html#Par32)).


    ```

    CREATE TABLE proglang_tbltmp (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    Listing 3-8

    A CREATE TABLE statement with a primary key

    ```


    ID fields are usually chosen as primary fields. Note that in this particular table,
    the language field would have also worked, since a language name is unique. However,
    if we have a table that describes people, we should try to find a logically unique
    field like their SSN number or employee ID number.


    Even though the concept of a primary key seems to be natural and necessary, most
    database implementations don’t really enforce it. This includes the two databases
    used for examples in this book – PostgreSQL and SQLite. You are free to create
    a table without any primary keys (like we did before this section came along)
    and insert exactly duplicated data again and again. Not an ideal scenario but
    allowed nonetheless if you are so inclined.


    Let us add some duplicated rows in our proglang_tblcopy table that we were working
    with in the beginning of the chapter (Listing [3-9](#A457348_1_En_3_Chapter.html#Par36)).


    ```

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    Listing 3-9

    Inserting duplicate data in a table without a primary key

    ```


    Note that we already had three unique rows in the table to which we added two
    duplicated ones. The execution of the `INSERT` statements was silent, indicating
    success. Let’s verify the contents of the table now (Table [3-2](#A457348_1_En_3_Chapter.html#Tab2)).


    Table 3-2


    Result of the Query Run on proglang_tblcopy Showing Duplicated Rows


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 2 | Perl | Wall | 1987 |   |

    | 2 | Perl | Wall | 1987 |   |


    ```

    SELECT * FROM proglang_tblcopy;

    ```


    If we try to add duplicate records in our table containing the primary key constraint –
    proglang_tbltmp, we promptly get an error thrown at us (Listing [3-10](#A457348_1_En_3_Chapter.html#Par40)).


    ```

    INSERT INTO proglang_tbltmp

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbltmp_pkey"

    DETAIL:  Key (id)=(2) already exists.

    Listing 3-10

    Trying to add a duplicate record violating a primary key constraint

    ```


    ## Unique Key Constraints


    A unique key like a primary key is also used to make each record inside a table
    unique. Once you have defined the primary key of a table, any other fields you
    wish to enforce as unique is done through this constraint. Well thought-out uniqueness
    constraints go a long way in ensuring that the data inside the table is sane.


    For example, in our database it now makes sense to have a unique key constraint
    on the language field (Listing [3-11](#A457348_1_En_3_Chapter.html#Par43)). This
    would ensure none of the records would duplicate information about the same programming
    language even if the id field was non-matching.


    ```

    CREATE TABLE proglang_tbluk (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL  UNIQUE,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    Listing 3-11

    Programming languages table with the unique key constraint

    ```


    We will now try to insert two rows about the language Prolog cleverly changing
    the id field to test out our unique constraint (Listing [3-12](#A457348_1_En_3_Chapter.html#Par45)).


    ```

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (1, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    INSERT 0 1

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (2, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbluk_language_key"

    DETAIL:  Key (language)=(Prolog) already exists.

    Listing 3-12

    Inserting duplicate data in a table with a unique key constraint

    ```


    Note that we write the word `UNIQUE` in front of the field and omit the `KEY`
    in the table creation command. You can have as many fields with unique constraints
    as you wish.


    We will revisit the unique and primary key constraints again in Chapter [15](#A457348_1_En_15_Chapter.html)
    when we discuss indexing.


    ## Differences Between a Primary Key and a Unique Key


    You might have noticed that the two constraints discussed above are similar in
    their purpose. However, there are a couple of differences between them.


    1.  A primary key field cannot take on a `NULL` value, whereas a field with a
    unique constraint can. However, there can be only one such record since each value
    must be unique due to the very definition of the constraint.  

    2.  You are allowed to define only one primary key constraint for a table, but
    you can apply the unique constraint to as many fields as you like.  


    This is a favorite interview question for any job that deals with SQL as far as
    my experience goes. It is not too unfair considering the importance of these constraints
    to a logical data model. Just remember to think of a primary key as a `NOT NULL
    UNIQUE` constraint.


    A primary key ensures a logical way to differentiate between rows of a table.
    It is the bare minimum criterion for a differentiated record. Unique constraints
    are usually added as additional rules to ensure data sanity while keeping the
    business or domain rules in mind. It’s not necessary to have them, but they act
    as gatekeepers to allow only good data through.


    # 4. Operations on Tables


    Tables are the fundamental storage containers of the relational world. A database
    will typically contain many tables, each representing a collection of entities.
    As requirements evolve, so do the tables within a database and database administrators
    (DBA’s) routinely perform administrative operations on individual tables like
    deleting them or changing their definition. While typical database users are not
    granted permissions to perform such operations on large production databases,
    nonetheless it is important to be familiar with them for didactic purposes.


    You might have noticed that we keep on making new tables whenever we are introducing
    a new concept. This has had the not-so-desirable effect of populating our database
    with many similar tables each holding programming languages data but with slightly
    varying definitions and constraints. We will now go about dropping unneeded tables
    and modifying existing ones to suit our needs.'
  trans: '## 主键约束


    关系数据模型背后的数学概念是集合论。这个离散数学的分支处理无序的值包，这些包中的值可以被唯一标识，即不包含重复项。对于一个表而言，一个值是一条数据记录，而用记录中的一个键列来识别它是完美的方式。


    主键通过强制某个字段的值唯一，从而至少以一种方式确保每条记录是唯一的。主键不一定限于一个字段；字段的组合也可以被定义为表的主键。在选择某个字段或其组合作为主键时，必须仔细考虑其逻辑含义。


    通常，最佳的主键候选者并非我们直觉中的标识符。如果你存储的是关于人的数据，他们的名字是我们在现实生活中识别他们的方式。但在主键这个不容犯错的世界里，如果两个人都叫‘David
    Childs’会发生什么？


    在我们的编程语言表中，`id`字段是应用主键约束的一个好选择。我们现在将修改`CREATE TABLE`语句来加入这个约束（参见代码清单 3-8）。


    ```

    CREATE TABLE proglang_tbltmp (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    代码清单 3-8

    包含主键的`CREATE TABLE`语句


    ID 字段通常被选作主键。注意在这个特定的表中，`language`字段也可以工作，因为语言名称是唯一的。但是，如果我们有一个描述人的表，我们应该尝试找到一个逻辑上唯一的字段，比如他们的
    SSN 号码或员工 ID 号码。


    尽管主键的概念看起来自然且必要，但大多数数据库实现并没有真正强制执行它。这包括本书中用于示例的两个数据库——PostgreSQL 和 SQLite。你可以自由地创建一个没有任何主键的表（就像我们在本节之前所做的那样），并一遍又一遍地插入完全重复的数据。这不是理想的情况，但如果你愿意，仍然是允许的。


    让我们在本章开头使用的`proglang_tblcopy`表中添加一些重复的行（参见代码清单 3-9）。


    ```

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    INSERT INTO proglang_tblcopy

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    ```

    代码清单 3-9

    在没有主键的表中插入重复数据


    请注意，表中原本已有三条唯一的行，我们又添加了两条重复的行。`INSERT`语句的执行是静默的，表示成功。现在让我们验证表的内容（表 3-2）。


    表 3-2

    在`proglang_tblcopy`上运行查询的结果，显示重复的行


    | id | 语言 | 作者 | 年份 | 标准 |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |  |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 2 | Perl | Wall | 1987 |  |

    | 2 | Perl | Wall | 1987 |  |


    ```

    SELECT * FROM proglang_tblcopy;

    ```


    如果我们尝试在包含主键约束的表——`proglang_tbltmp`中添加重复记录，我们立刻会收到一个错误（代码清单 3-10）。


    ```

    INSERT INTO proglang_tbltmp

    (id, language, author, year)

    VALUES

    (2, ''Perl'', ''Wall'', ''1987'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbltmp_pkey"

    DETAIL:  Key (id)=(2) already exists.

    ```

    代码清单 3-10

    尝试添加违反主键约束的重复记录


    ## 唯一键约束


    唯一键像主键一样，也用于使表中的每条记录唯一。一旦你定义了表的主键，任何你希望强制为唯一的其他字段都通过此约束来完成。经过深思熟虑的唯一性约束对于确保表中的数据健全大有帮助。


    例如，在我们的数据库中，现在对`language`字段设置唯一键约束是有意义的（代码清单 3-11）。这将确保即使`id`字段不同，也不会有任何记录重复关于同一编程语言的信息。


    ```

    CREATE TABLE proglang_tbluk (

    id        INTEGER     NOT NULL  PRIMARY KEY,

    language  VARCHAR(20) NOT NULL  UNIQUE,

    author    VARCHAR(25) NOT NULL,

    year      INTEGER     NOT NULL,

    standard  VARCHAR(10) NULL);

    ```

    代码清单 3-11

    带有唯一键约束的编程语言表


    我们现在将尝试插入两条关于 Prolog 语言的行，巧妙地更改`id`字段来测试我们的唯一约束（代码清单 3-12）。


    ```

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (1, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    INSERT 0 1

    testdb=# INSERT INTO proglang_tbluk

    (id, language, author, year, standard)

    VALUES

    (2, ''Prolog'', ''Colmerauer'', 1972, ''ISO'');

    ERROR:  duplicate key value violates unique constraint "proglang_tbluk_language_key"

    DETAIL:  Key (language)=(Prolog) already exists.

    ```

    代码清单 3-12

    在带有唯一键约束的表中插入重复数据


    注意，我们在字段前写了`UNIQUE`这个词，并在表创建命令中省略了`KEY`。你可以根据需要为任意多的字段应用唯一约束。


    我们将在第 15 章讨论索引时再次回顾唯一键和主键约束。


    ## 主键与唯一键的区别


    你可能已经注意到上述两种约束在用途上是相似的。然而，它们之间有一些区别。


    1.  主键字段不能取`NULL`值，而具有唯一约束的字段可以。然而，由于约束的定义要求每个值必须是唯一的，因此只能有一条这样的记录。

    2.  你被允许只为一个表定义一个主键约束，但你可以对任意多的字段应用唯一约束。


    根据我的经验，这是任何涉及 SQL 的工作最喜欢的面试问题之一。考虑到这些约束对逻辑数据模型的重要性，这并不太不公平。只需记住将主键视为`NOT NULL
    UNIQUE`约束。


    主键确保了一种区分表中行的逻辑方式。它是区分记录的最低标准。唯一约束通常作为附加规则添加，以在考虑业务或领域规则的同时确保数据健全。虽然没有它们也可以，但它们扮演着守门人的角色，只允许好的数据通过。


    # 4. 表操作


    表是关系世界中的基本存储容器。一个数据库通常包含许多表，每个表代表一个实体的集合。随着需求的发展，数据库中的表也会发展，数据库管理员（DBA）经常对单个表执行管理操作，比如删除它们或更改它们的定义。虽然典型的数据库用户没有被授予在大型生产数据库上执行此类操作的权限，但出于教学目的，熟悉它们仍然很重要。


    你可能已经注意到，每当我们引入一个新概念时，我们都在不断创建新表。这产生了并非理想的后果，即我们的数据库中充斥着许多类似的表，每个表都保存着编程语言数据，但定义和约束略有不同。我们现在将着手删除不需要的表并修改现有的表以满足我们的需求。'
- fmt: '# Dropping Tables


    The deletion of tables in SQL is achieved through the `DROP TABLE` command. `DROP`
    is actually a top-level SQL command, much like `CREATE`, which performs a deletion
    operation on many kinds of database objects. To delete a table, we simply append
    it with the database object type – a `TABLE` in this case.


    We will now drop any superfluous tables we have created during the previous lessons
    (Listing [4-1](#A457348_1_En_4_Chapter.html#Par5)). Note that dropping a table
    means deleting a table and any data inside it without a chance of recovery. So
    be careful while writing `DROP` commands.


    ```

    DROP TABLE proglang_tbl;

    DROP TABLE proglang_tblcopy;

    DROP TABLE proglang_constraints;

    DROP TABLE proglang_tbltmp;

    Listing 4-1

    Dropping the temporary tables we created

    ```


    If you get no errors returned, it means that the tables have been deleted. `DROP
    TABLE` only supports dropping a single table at a time conventionally though there
    are clever ways to go about deleting multiple tables with a single statement.


    To verify whether the tables have actually been dropped you have two choices.
    A simplistic one is to write any query for the table, and you would get an error
    back similar to `Error: no such table: proglang_tbl`. The other way is to get
    the listing of currently existing tables from the database catalog, which is a
    database that the DBMS internally uses to keep a track of databases, tables, and
    other objects that users create. Querying the catalog in SQLite for a listing
    of tables is extremely simple (Listing [4-2](#A457348_1_En_4_Chapter.html#Par8)).


    ```

    sqlite> .tables

    proglang_tbluk

    Listing 4-2

    Listing existing tables in SQLite

    ```


    Doing the same thing in PostgreSQL is slightly longer, but it is a `SELECT` query
    on the catalog database (Listing [4-3](#A457348_1_En_4_Chapter.html#Par10)).


    ```

    testdb=# SELECT table_name

    FROM information_schema.tables

    WHERE table_schema = ''public''

    AND table_type = ''BASE TABLE'';

    table_name


    proglang_tbluk

    (1 row)

    Listing 4-3

    Listing existing tables in PostgreSQL

    ```


    If the query seems complicated to you, it is because it contains parts and syntax
    that we have not covered yet. But rest assured, the syntax will start making perfect
    sense by the end of the chapter on queries. For now we can infer that the table
    data in PostgreSQL is stored in the `information_schema.tables` catalog table.


    # Creating New Tables from Existing Tables


    You might have noticed that we have dropped the `proglang_tbl` table, and we now
    have with us only the `proglang_tbluk` table that has all the necessary constraints
    and fields. The latter''s name was chosen when we were discussing the unique key
    constraint, but it now seems logical to migrate this table structure (and any
    corresponding data) back to the name `proglang_tbl`. We achieve this by creating
    a copy of the table using a combination of both `CREATE TABLE` and `SELECT` commands
    and learn a new clause in the process – `AS` (Listing [4-4](#A457348_1_En_4_Chapter.html#Par13)).
    This combination has a particularly catchy name – CTAS and was introduced in the
    SQL:2003 standard but not all DBMS systems implement it yet, notably Microsoft
    SQL Server.


    ```

    CREATE TABLE <new_table_name>

    AS

    SELECT <column_list> FROM <existing_table_name>;

    Listing 4-4

    General syntax for creating a new table from an existing one

    ```


    Since our `proglang_tbluk` contains only one record, we will push some more sample
    data in it so that we can later verify whether the records themselves got copied
    or not. Notice that we give the field names explicitly, or else the second row
    (which contains no standard field value) would give an error similar to:


    ```

    sqlite> INSERT INTO proglang_tbluk

    VALUES

    (2, ''Perl'', ''Wall'', 1987);

    Error: table proglang_tbluk has 5 columns but 4 values were supplied

    ```


    in SQLite. A lot of other DBMS’s like Ingres would also not accept such a cavalier
    approach to inserting data. PostgreSQL, however, would accept such a statement
    provided it could unambiguously insert the data that in this case it can due to
    the omitted value being the last nullable field only. I would advise writing the
    column names explicitly wherever possible. We will follow this sage advice in
    Listing [4-5](#A457348_1_En_4_Chapter.html#Par17).


    ```

    INSERT INTO proglang_tbluk (id, language, author, year)

    VALUES (2, ''Perl'', ''Wall'', ''1987'');

    INSERT INTO proglang_tbluk (id, year, standard, language, author)

    VALUES (3, ''1964'', ''ANSI'', ''APL'', ''Iverson'');

    Listing 4-5

    Inserting some more data into the proglang_tbluk table

    ```


    To create an exact copy of the existing table, we use the same selection criteria
    as we have seen before - `*` (star). This will select all the fields from the
    existing table and create the new table with them along with any records (Listing
    [4-6](#A457348_1_En_4_Chapter.html#Par19)). It is possible to use only a subset
    of fields from the old table by modifying the selection criteria and we will see
    this later.


    ```

    CREATE TABLE proglang_tbl

    AS

    SELECT * FROM proglang_tbluk;

    Listing 4-6

    Re-creating a new table from an existing one

    ```


    If you are using `psql`, you would see the prompt displaying `SELECT 3`, which
    gives an indicator of how many rows were selected and inserted into the new table.
    We now run a simple `SELECT` query to see whether our objective was achieved or
    not (Table [4-1](#A457348_1_En_4_Chapter.html#Tab1)).


    **Table 4-1** Result of the Query Run on `proglang_tbl`


    | id | language | author | year | standard |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |  |

    | 3 | APL | Iverson | 1964 | ANSI |


    ```

    SELECT * FROM proglang_tbl;

    ```


    The two tables are now exactly identical but are not linked to each other in any
    way. If you drop any of the tables, the other one will not be affected. Similarly,
    inserting new data in one of them will not insert the data in the other one from
    now on.'
