  trans: '

    ## 并集


    并集是一种将两个集合的元素组合起来的操作。假设我们有以下两个由一堆数字组成的集合（见代码清单 13-1）。


    ```

    set1 = { 1, 3, 5 }

    set2 = { 1, 2, 3 }

    代码清单 13-1

    包含数字的两个集合

    ```


    得到的并集将是一个由所有这些元素组成的集合，每个元素恰好出现一次，即不允许重复（见代码清单 13-2）。请注意，集合的顺序无关紧要。可以将其视为一个元素的袋子，而不是一个有序的集合。


    ```

    set1 UNION set2 = { 1, 3, 5, 2 }

    代码清单 13-2

    数学上的并集（UNION）操作

    ```


    现在让我们看看如何在 SQL 中模拟并集操作。回顾一下我们在第 10 章最后使用的编程语言表及其数据（见表 13-1）。


    表 13-1

    `proglang_tbl` 表的内容


    | id | 语言 (language) | 作者 (author) | 年份 (year) | 标准 (standard) |

    | --- | --- | --- | --- | --- |

    | 1 | Prolog | Colmerauer | 1972 | ISO |

    | 2 | Perl | Wall | 1987 |   |

    | 3 | APL | Iverson | 1964 | ANSI |

    | 4 | JOVIAL | Schwartz | 1959 | US-DOD |

    | 5 | APT | Ross | 1959 | ISO |

    | 6 | PL/I | IBM | 1964 | ECMA |

    | 7 | Tcl | Ousterhout | 1988 |   |

    | 8 | Fortran | Backus | 1957 | ANSI |


    如果我们想获取那些由 `ANSI` 或 `ISO` 标准化的语言的创建年份列表，我们可以使用 `UNION` 关键字来实现（见代码清单 13-3）。


    | 年份 (year) |

    | --- |

    | 1959 |

    | 1957 |

    | 1964 |

    | 1972 |


    ```

    SELECT year FROM proglang_tbl

    WHERE standard="ANSI"

    UNION

    SELECT year FROM proglang_tbl

    WHERE standard="ISO";

    代码清单 13-3

    使用 UNION 操作符

    ```


    由于我们的表中有四条记录的 `standard` 值为 `ANSI` 或 `ISO`，因此结果集中得到了预期的四行数据。请注意，这里没有需要处理的重复条目。但是，如果使用
    `UNION` 操作时存在需要处理的重复条目会怎样呢（见代码清单 13-4）？


    ```

    SELECT standard FROM proglang_tbl

    WHERE language = ''Fortran''

    UNION

    SELECT standard FROM proglang_tbl

    WHERE language = ''APL'';

    代码清单 13-4

    使用 UNION 操作符消除重复值

    ```


    ![A457348_1_En_13_Figa_HTML.jpg](img/A457348_1_En_13_Figa_HTML.jpg)


    我们在 `WHERE` 子句中指定的两种语言都是由 `ANSI` 标准化的。`UNION` 操作，就像在离散数学中一样，移除了重复的值，并输出单行作为结果。


    还有另一个相关的 SQL 操作 `UNION ALL`，它会模拟组合操作但不会消除重复项（见代码清单 13-5）。使用这个操作的优点是性能提升，因为 SQL
    引擎不必费心检查重复项。如果你构建的参与查询的方式确保没有重复值，那么使用 `UNION ALL` 将提高你的查询处理时间。


    | 标准 (standard) |

    | --- |

    | ANSI |

    | ANSI |


    ```

    SELECT standard FROM proglang_tbl

    WHERE language = ''Fortran''

    UNION ALL

    SELECT standard FROM proglang_tbl

    WHERE language = ''APL'';

    代码清单 13-5

    使用 UNION ALL 操作符

    ```


    ## 交集


    交集操作仅输出输入集合中的共同元素。如果我们将交集应用于上一节中的两个集合，我们会得到一个包含两个元素的结果集（见代码清单 13-6）。


    ```

    set1 INTERSECTION set2 = { 1, 3 }

    代码清单 13-6

    数学上的交集（INTERSECTION）操作

    ```


    与并集一样，每个共同值只显示一次。重复项会从最终结果集中移除。


    将其转换为 SQL 非常简单；我们不是使用 `UNION`，而是使用关键字 `INTERSECT` 来获取共同元素（见代码清单 13-7）。


    ```

    SELECT standard FROM proglang_tbl

    WHERE year=1964

    INTERSECT

    SELECT standard FROM proglang_tbl

    WHERE year=1957;

    代码清单 13-7

    在 SQL 中使用 INTERSECT

    ```


    ![A457348_1_En_13_Figb_HTML.jpg](img/A457348_1_En_13_Figb_HTML.jpg)


    这里需要记住的一点是，`INTERSECT` 操作符会查找其前后两个查询之间完全相同的公共值。这意味着是整个记录的公共值，而不仅仅是部分字段的公共值。虽然在之前的例子中，我们的结果集只有一列需要返回——`standard`，但让我们看看当我们在结果列表中添加另一列时会发生什么（见代码清单
    13-8）。


    ```

    SELECT year, standard FROM proglang_tbl

    WHERE year=1964

    INTERSECT

    SELECT year, standard FROM proglang_tbl

    WHERE year=1957;

    => (0 rows)

    代码清单 13-8

    在结果中使用包含多列的 INTERSECT

    ```


    输出结果是空，没有任何行。第一个查询会选择 `PL/I` 和 `APL` 的记录，而第二个查询会选择 `Fortran`。但这些语言的 (`year`, `standard`)
    组合值都不同，因此给我们的是零结果。


    请注意，虽然 `ANSI` SQL 标准规定了 `INTERSECT ALL` 操作符，但我尚未遇到实现它的数据库管理系统。`PostgreSQL` 会愉快地忽略你写的
    `ALL` 子句，只是简单地返回一个 `INTERSECT` 结果。

    '
- fmt: '# Difference


    集合之间的差集运算，写作 `set1 - set2`，表示所有在 `set1` 中但不在 `set2` 中的元素列表（参见代码清单 [13-9](#A457348_1_En_13_Chapter.html#Par25)）。如果某个元素仅存在于
    `set2` 中，它不会被简单的差集运算所捕获。


    ```

    set1 DIFFERENCE set2 = { 5 }

    set2 DIFFERENCE set1 = { 2 }

    Listing 13-9

    The mathematical DIFFERENCE operation

    ```


    让我们尝试使用熟悉的 `IN` 和 `NOT IN` 操作符来编写一个模拟此逻辑的SQL语句。但首先，我们需要向表中插入一行数据，以便观察差集运算的实际效果（参见代码清单
    [13-10](#A457348_1_En_13_Chapter.html#Par27)）。


    ```

    INSERT INTO proglang_tbl

    (id, language, author, year, standard)

    VALUES

    (9, ''RPG'', ''IBM'', 1964, ''ISO'');

    Listing 13-10

    Inserting a new row for RPG

    ```


    假设我们希望列出那些由 ISO 标准化而非由 ANSI 标准化的编程语言的创建年份（参见代码清单 [13-11](#A457348_1_En_13_Chapter.html#Par29)）。从源表中，我们发现有三种语言由
    ISO 标准化，年份分别是1972年、1959年和1964年。但由于在1964年，APL 语言被创建，并最终由 ANSI 标准化，理想情况下，我们得到的答案应该是1972年和1959年。


    | year |

    | --- |

    | 1972 |

    | 1959 |

    | 1964 |


    ```

    SELECT year FROM proglang_tbl

    WHERE standard IN (''ISO'')

    AND standard NOT IN (''ANSI'');

    Listing 13-11

    Trying to write set difference with IN

    ```


    哇，这是什么魔法！我们以为1964年会因为 ANSI 标准化而被排除。但显然情况并非如此。实际发生的情况是，首先扫描了 ISO 的行——得到三个值。然后，ANSI
    的行被排除，但排除的范围是整张表，而不一定是第一次扫描的结果。因此，虽然1964年的 APL 被排除了，但新插入的1964年的 RPG 仍然保留了下来，这实际上使我们的第二个条件失效了。实现此目的的正确方法是使用差集运算符
    `EXCEPT`，如下所示（参见代码清单 [13-12](#A457348_1_En_13_Chapter.html#Par31)）。


    | year |

    | --- |

    | 1972 |

    | 1959 |


    ```

    SELECT year FROM proglang_tbl WHERE standard IN (''ISO'')

    EXCEPT

    SELECT year FROM proglang_tbl WHERE standard IN (''ANSI'');

    Listing 13-12

    Set difference with EXCEPT

    ```


    瞧，这似乎得出了正确的答案！如果你使用的是 Oracle 系统，请用 `MINUS` 替换 `EXCEPT` 来获得完全相同的结果。


    当我们在一个查询中编写多个 `SELECT` 语句，并使用集合理论运算符（如 `UNION`）将它们连接起来时，这样的语句被称为复合查询。需要注意的是，许多数据库管理系统限制将复合查询作为子查询使用。Sybase
    Adaptive Server Enterprise 就是这样一个流行的DBMS，它不允许你在子查询中编写 `UNION`。


    # 14. Views


    关系数据模型和 SQL 的一个美妙之处在于，查询的输出本身也是一个表，确切地说是一个关系。它可能只包含一列或一行，但它仍然是一个表。视图就是一个可以像表一样使用的查询。


    你可以把它想象成一个虚拟表，为了查看者的方便，它存储了一个预先计算好的结果集。它并不像基础表那样真实存在，而是提供了一个不同的视角来查看数据，省去了处理繁琐细节的麻烦。


    ## Why Are Views Needed?


    大多数生产数据库系统都会包含大量的表。由于领域的复杂性，其中一些表可能包含大量的字段。视图可以为临时数据库用户（即并非数据库系统所有部分的专家）提供帮助。他们有特定的、重复性的需求，而视图为他们提供了访问所需数据的一个更简单的接口。


    视图带来的另一个优势是安全性。我们可以限制对基础表的访问，只提供包含特定用户组被允许查看的数据的视图。良好的数据库设计规则常常迫使敏感列与经常访问的字段放在一起。在这种情况下，如果你选择隐藏敏感列，视图可以有效地解决这个问题。


    对于数据库设计者来说，视图提供了独立性。在合理的程度上，视图允许底层基础表改变其结构以适应不断变化的需求，而视图本身可以保持不变。在其他情况下，可以重新创建视图，其底层的查询可能不同，但它将以相同的格式包含相同的数据，从而为用户提供连续性。


    ## Creating a View


    创建视图的基本语法非常简单（参见代码清单 [14-1](#A457348_1_En_14_Chapter.html#Par7)）。实际上，它可能就像你所能做到的那样精简和自然。


    ```

    CREATE VIEW <view_name> AS <select_statement>

    Listing 14-1

    General syntax of view creation

    ```


    现在让我们为自己创建一个视图——`language_chronology`，它将只有两个字段，即语言及其创建年份（参见代码清单 [14-2](#A457348_1_En_14_Chapter.html#Par9)）。


    ```

    CREATE VIEW language_chronology AS

    SELECT language, year

    FROM proglang_tbl

    ORDER BY year ASC;

    Listing 14-2

    Creating a language_chronology view

    ```


    请注意，我们如何在视图创建中显式添加了排序子句。对于 `CREATE VIEW` 查询部分允许的内容，限制非常少。现在让我们通过像查询表一样查询视图来验证结果（参见代码清单
    [14-3](#A457348_1_En_14_Chapter.html#Par11)）。


    | language | year |

    | --- | --- |

    | Fortran | 1957 |

    | JOVIAL | 1959 |

    | APT | 1959 |

    | RPG | 1964 |

    | APL | 1964 |

    | PL/I | 1964 |

    | Prolog | 1972 |

    | Perl | 1987 |

    | Tcl | 1988 |


    ```

    SELECT * FROM language_chronology;

    Listing 14-3

    Listing the contents of a view

    ```


    我们还可以在视图创建的查询部分包含计算字段。我们必须记住的唯一一点是如何重命名计算字段列，否则无疑会导致清晰度下降。让我们根据第 [9](#A457348_1_En_9_Chapter.html)
    章的十年查询重新创建一个视图（参见代码清单 [14-4](#A457348_1_En_14_Chapter.html#Par13)）。


    | language | decade |

    | --- | --- |

    | Prolog | The 1970s |

    | Perl | The 1980s |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | Tcl | The 1980s |

    | PL/I | The 1960s |

    | Fortran | The 1950s |

    | RPG | The 1960s |


    ```

    CREATE VIEW language_decade AS

    SELECT language,

    ''The ''||((year/10)*10)||''s'' decade

    FROM proglang_tbl;

    Listing 14-4

    Creating a view with a calculated field

    ```


    如果我们未能将列重命名为 `decade`，我们的DBMS系统会执行视图创建，但结果视图实际上将无法使用。PostgreSQL 可能会将列重命名为神秘的 `?column?`，而
    SQLite 则会将整个表达式 `''The ''||((year/10)*10)||''s''` 作为第二个字段的名称。不用说，我们最好重命名视图的字段。


    另一种重命名字段的方法是在视图定义子句中指定，而不是在填充它的查询中指定（参见代码清单 [14-5](#A457348_1_En_14_Chapter.html#Par16)）。这种方法同样有效，并且可以说更清晰，因为它预先列出了所有字段。


    | lang | era |

    | --- | --- |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | PL/I | The 1960s |

    | Fortran | The 1950s |

    | RPG | The 1960s |


    ```

    CREATE VIEW language_era (lang, era) AS

    SELECT language,

    ''The ''||((year/10)*10)||''s''

    FROM proglang_tbl

    WHERE year < 1971;

    Listing 14-5

    Renaming the field in the view definition clause

    ```


    如果你选择这种重命名列的方法，你必须指定视图中所有列的名称。请注意，重命名字段不会影响其数据类型或可空状态。'
  raw: "## Difference\n\nThe difference operation between sets, written as `set1 -\
    \ set2` is a list of all elements in set1 that do not occur in set2 (Listing [13-9](#A457348_1_En_13_Chapter.html#Par25)).\
    \ If an element is only in set2, it will not be captured by the plain difference\
    \ operation.\n\n```\nset1 DIFFERENCE set2 = { 5 }\nset2 DIFFERENCE set1 = { 2\
    \ }\nListing 13-9\nThe mathematical DIFFERENCE operation\n```\n\nLet's try and\
    \ write a SQL statement to emulate this logic with our familiar `IN` and `NOT\
    \ IN` operators. But first let’s insert a row into our table so that we can see\
    \ the difference operation in action (Listing [13-10](#A457348_1_En_13_Chapter.html#Par27)).\n\
    \n```\nINSERT INTO proglang_tbl\n(id, language, author, year, standard)\nVALUES\n\
    (9, 'RPG', 'IBM', 1964, 'ISO');\nListing 13-10\nInserting a new row for RPG\n\
    ```\n\nSuppose we wish to list out the years of creation of languages that were\
    \ standardized by ISO but not the ANSI (Listing [13-11](#A457348_1_En_13_Chapter.html#Par29)).\
    \ From our source table, we find that three languages were standardized by ISO\
    \ with years 1972, 1959, and 1964\\. But since in 1964, APL was created, which\
    \ was eventually standardized by ANSI, we should ideally be left with the answer\
    \ 1972 and 1959.\n\n| year |\n| --- |\n| 1972 |\n| 1959 |\n| 1964 |\n\n```\nSELECT\
    \ year FROM proglang_tbl\nWHERE standard IN ('ISO')\nAND standard NOT IN ('ANSI');\n\
    Listing 13-11\nTrying to write set difference with IN\n```\n\nWhoa, what sorcery\
    \ is this!?! We thought 1964 would be ineligible because of ANSI standardization.\
    \ But clearly this is not the case. What has happened actually is that first there\
    \ was a scan of ISO rows – giving us three values. Then ANSI rows were discounted\
    \ but not necessarily from the first result but the table as a whole. So while\
    \ the APL 1964 was left off, the freshly inserted RPG 1964 still remained, effectively\
    \ making our second condition worthless. The correct way to achieve this is using\
    \ the set difference operator `EXCEPT` as below (Listing [13-12](#A457348_1_En_13_Chapter.html#Par31)).\n\
    \n| year |\n| --- |\n| 1972 |\n| 1959 |\n\n```\nSELECT year FROM proglang_tbl\
    \ WHERE standard IN ('ISO')\nEXCEPT\nSELECT year FROM proglang_tbl WHERE standard\
    \ IN ('ANSI');\nListing 13-12\nSet difference with EXCEPT\n```\n\nVoila, this\
    \ seems to yield the correct answer! If you happen to be using an Oracle system,\
    \ replace EXCEPT with MINUS to achieve the exact same result.\n\nWhen we write\
    \ more than a single `SELECT` as a part of a single query and join them using\
    \ a set theoretic operator, such statements are called compound queries . Do note\
    \ that many database management systems restrict the use of compound queries as\
    \ subqueries. Sybase Adaptive Server Enterprise is one such popular DBMS that\
    \ doesn’t allow you to write a `UNION` inside a subquery.\n\n# 14. Views\n\nOne\
    \ of the beautiful aspects of the relational data model and SQL is that the output\
    \ of a query is also a table, a relation to be precise. It may consist of a single\
    \ column or a single row, but it is a table nonetheless. A view is a query that\
    \ can be used like a table.\n\nThink of it as a virtual table that stores for\
    \ the viewer’s convenience a pre-computed resultset. It does not truly exist like\
    \ a base table but provides a different angle to view the data without the tedium\
    \ of details.\n\n## Why Are Views Needed?\n\nMost production database systems\
    \ would contain a lot of tables. It is also possible that some of these tables\
    \ consist of a lot of fields because of the complexity of the domain. Views would\
    \ come to the rescue of the casual database user, people who are not experts in\
    \ all parts of the database system. They have a specific, repetitive need, and\
    \ views provide them with a simpler interface to the data they need.\n\nAnother\
    \ advantage that views bring to the table is security. We can restrict access\
    \ to base tables and provide views containing only the data a particular group\
    \ of users is allowed to see. Good database design rules often force sensitive\
    \ columns to be lumped together with oft-accessed fields. Views come to the rescue\
    \ in such cases by effectively hiding the sensitive columns if you so choose.\n\
    \nFor the database designers, views provide independence. To a reasonable degree,\
    \ views allow the underlying base tables to change their structure to cater to\
    \ evolving needs and yet views can remain the same. In other cases, views can\
    \ be re-created with a different query underlying it but will contain the same\
    \ data in the same format, providing a continuity to the user.\n\n## Creating\
    \ a View\n\nThe general syntax of creating a view is pretty straightforward (Listing\
    \ [14-1](#A457348_1_En_14_Chapter.html#Par7)). In fact, it probably is as minimal\
    \ and natural as you can get.\n\n```\nCREATE VIEW  AS \nListing 14-1\nGeneral\
    \ syntax of view creation\n```\n\nNow let us create a view for ourselves – language_chronology\
    \ that will have only two fields, namely, languages and their years of creation\
    \ (Listing [14-2](#A457348_1_En_14_Chapter.html#Par9)).\n\n```\nCREATE VIEW language_chronology\
    \ AS\nSELECT language, year\nFROM proglang_tbl\nORDER BY year ASC;\nListing 14-2\n\
    Creating a language_chronology view\n```\n\nNotice how we have explicitly added\
    \ the ordering clause to the view creation. There are very few restrictions on\
    \ what is allowed in the query part of `CREATE VIEW`. Let us now verify the results\
    \ by running a query on the view exactly the same way as we would on a table (Listing\
    \ [14-3](#A457348_1_En_14_Chapter.html#Par11)).\n\n| language | year |\n| ---\
    \ | --- |\n| Fortran | 1957 |\n| JOVIAL | 1959 |\n| APT | 1959 |\n| RPG | 1964\
    \ |\n| APL | 1964 |\n| PL/I | 1964 |\n| Prolog | 1972 |\n| Perl | 1987 |\n| Tcl\
    \ | 1988 |\n\n```\nSELECT * FROM language_chronology;\nListing 14-3\nListing the\
    \ contents of a view\n```\n\nWe can also include calculated fields in the query\
    \ part of view creation. The only thing we must keep in mind is how we rename\
    \ the calculated field column, failing which would undoubtedly result in a loss\
    \ of clarity. Let’s re-create our decade query from Chapter [9](#A457348_1_En_9_Chapter.html),\
    \ this time as a view (Listing [14-4](#A457348_1_En_14_Chapter.html#Par13)).\n\
    \n| language | decade |\n| --- | --- |\n| Prolog | The 1970s |\n| Perl | The 1980s\
    \ |\n| APL | The 1960s |\n| JOVIAL | The 1950s |\n| APT | The 1950s |\n| Tcl |\
    \ The 1980s |\n| PL/I | The 1960s |\n| Fortran | The 1950s |\n| RPG | The 1960s\
    \ |\n\n```\nCREATE VIEW language_decade AS\nSELECT language,\n'The '||((year/10)*10)||'s'\
    \ decade\nFROM proglang_tbl;\nListing 14-4\nCreating a view with a calculated\
    \ field\n```\n\nIf we had failed to rename the column as decade, our DBMS systems\
    \ would execute the view creation but the resultant view would be practically\
    \ unusable. PostgreSQL would have renamed the column to a mysterious `?column?`\
    \ whereas SQLite would have put the entire expression as the name of the second\
    \ field `'The '||((year/10)*10)||'s'`. Needless to say, we are better off renaming\
    \ the fields of the view.\n\nAnother way to rename the fields is to specify it\
    \ in the view definition clause rather than the query that populates it (Listing\
    \ [14-5](#A457348_1_En_14_Chapter.html#Par16)). This works just as well and is\
    \ arguably clearer because it lists the fields upfront.\n\n| lang | era |\n| ---\
    \ | --- |\n| APL | The 1960s |\n| JOVIAL | The 1950s |\n| APT | The 1950s |\n\
    | PL/I | The 1960s |\n| Fortran | The 1950s |\n| RPG | The 1960s |\n\n```\nCREATE\
    \ VIEW language_era (lang, era) AS\nSELECT language,\n'The '||((year/10)*10)||'s'\n\
    FROM proglang_tbl\nWHERE year < 1971;\nListing 14-5\nRenaming the field in the\
    \ view definition clause\n```\n\nIf you choose this method of renaming columns,\
    \ you must specify the names of all the columns in the view. Note that renaming\
    \ a field has no effect on its data type or null status."
