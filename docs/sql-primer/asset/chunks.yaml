- fmt: '# 10. Aggregation and Grouping


    SQL has maintained its prominent position in the technical world due to its ability
    to cater to a wide range of business intelligence and analytic requests. While
    databases are often used for finding a needle in a haystack, that is, narrowing
    down to a single row, a lot of interactive usage of SQL revolves around generating
    aggregated insights from a bunch of rows.


    Indeed, a major advantage that SQL-based systems have over NoSQL data storage
    solutions is how intuitive grouping and aggregation is in the former category.


    ## String Operations


    By far the most commonly used string operation is concatenation. It means to join
    or combine strings. However, since even numeric fields can be treated as a string,
    we can use the concatenation operator `||` on them too. See the example below
    to modify our decade field to include some characters (Listing [9-4](#A457348_1_En_9_Chapter.html#Par10)).


    | language | decade |

    | --- | --- |

    | Prolog | The 1970s |

    | Perl | The 1980s |

    | APL | The 1960s |

    | JOVIAL | The 1950s |

    | APT | The 1950s |

    | Tcl | The 1980s |

    | PL/I | The 1960s |


    ```sql

    SELECT language,

    ''The ''||((year/10)*10)||''s'' decade

    FROM proglang_tbl;

    ```

    *Listing 9-4*

    Using the string concatenation operator


    Note that the concatenation operator manifests itself in different forms in different
    implementations. PostgreSQL, SQLite, and Oracle use the shown `||` symbols whereas
    Ingres, MySQL, and Microsoft SQL Server use `+` to denote concatenation. Their
    effect, however, is the same.


    The string concatenation operator differs in various programming languages too.
    The `||` character, which is used in most SQL implementations, comes from the
    IBM PL/I – a language quite popular in the ‘60s and ‘70s but rarely seen in modern
    times.


    The last character `I` actually is the roman numeral for 1, as it was built purposely
    to unify the growing gap between languages specializing in business processes
    and those catering to scientific computation.


    Another common string operation is substring, which returns only a part of the
    string field value. For example, if we needed to get only the first two characters
    of each programming language, we would use the `SUBSTR` function. The general
    syntax of this function is given below (Listing [9-5](#A457348_1_En_9_Chapter.html#Par15)).


    ```sql

    SELECT SUBSTR(, , ),

    ...

    FROM ;

    ```

    *Listing 9-5*

    General syntax of substring


    The starting position is the character you wish to start extracting from. Unlike
    most programming languages, the string index positions here don’t start from 0
    but 1. The third argument length specifies how many characters should be a part
    of the result. For the first two characters of a programming language, the starting
    position would be 1 and the length would be 2 (Listing [9-6](#A457348_1_En_9_Chapter.html#Par17)).


    | substr | year |

    | --- | --- |

    | Pr | 1972 |

    | Pe | 1987 |

    | AP | 1964 |

    | JO | 1959 |

    | AP | 1959 |

    | Tc | 1988 |

    | PL | 1964 |


    ```sql

    SELECT SUBSTR(language, 1, 2),

    year

    FROM proglang_tbl;

    ```

    *Listing 9-6*

    Extracting the first two characters of a programming language


    Interestingly, on one hand, PostgreSQL gives the same result when we use `SUBSTRING`
    instead of `SUBSTR`, because it treats them as aliases. SQLite, however, works
    only with `SUBSTR`. Microsoft SQL Server, on the other hand, works only with `SUBSTRING`.
    Check your database manual for which version your implementation expects.


    Another class of string operations that often comes in handy are `UPPER` and `LOWER`,
    which change the case of a string value to upper- and lowercase respectively.
    This is best illustrated with an example (Listing [9-7](#A457348_1_En_9_Chapter.html#Par20)).


    | upper | lower |

    | --- | --- |

    | PROLOG | iso |

    | PERL |   |

    | APL | ansi |

    | JOVIAL | us-dod |

    | APT | iso |

    | TCL |   |

    | PL/I | ecma |


    ```sql

    SELECT UPPER(language),

    LOWER(standard)

    FROM proglang_tbl;

    ```

    *Listing 9-7*

    Changing the case of fields


    ## Literal Values


    There are cases when one needs to use a fixed literal value as the values of a
    new column. Like column aliases can change the column header for readability,
    literal values change record values. In a sense they are not calculated fields,
    but fixed fields inserted in specific positions of a record. An example will help
    illustrate this – supposing you wish to really clarify the year of language creation,
    as not just a number but also to include the characters `AD` (Listing [9-8](#A457348_1_En_9_Chapter.html#Par22)).


    | language | year | AD |

    | --- | --- | --- |

    | Prolog | 1972 | AD |

    | Perl | 1987 | AD |

    | APL | 1964 | AD |

    | JOVIAL | 1959 | AD |

    | APT | 1959 | AD |

    | Tcl | 1988 | AD |

    | PL/I | 1964 | AD |


    ```sql

    SELECT language,

    year,

    ''AD''

    FROM proglang_tbl;

    ```

    *Listing 9-8*

    Using literal values


    We can even use numeric literal values the same way, omitting the quotation marks
    for such values. A common utility for literal values arises when the user has
    to copy-paste data from their database query output into another tool like a spreadsheet
    or word processor.'
