  trans: "## 删除索引\n\n如果你不再需要某个索引，SQL 提供了 `DROP INDEX` 命令来删除它。该命令的基本语法足够简单（见列表 15-16）。\n\
    \n```\nDROP INDEX \n列表 15-16\nDROP INDEX 的通用语法\n```\n\n请注意，这不会以任何方式改变底层表的数据（见列表\
    \ 15-17）。你所做的仅仅是删除索引，因此查询时间可能会变慢。\n\n```\nDROP INDEX biglang_idx;\nSELECT COUNT(*)\
    \ FROM biglang_tbl;\ncount\n\n(1 row)\n列表 15-17\nDROP INDEX 不会改变底层表的内容\n```\n\n\
    # 16. 访问控制语句\n\n由于其易用性、丰富的功能集和可靠性，基于 SQL 的关系数据库管理系统已成为各地企业可信的数据源。当大公司考虑存储关键数据时，他们心中唯一的问题是选择哪家关系型数据库管理系统供应商，而非选择何种数据存储。\n\
    \n当如此重要的数据被存储在系统中，并且数据库管理系统成为整个组织的中心数据存储时，某种程度的访问控制是绝对必要的。\n\n访问控制指的是软件系统内的权限。当你登录到一台服务器，有时甚至是自己的电脑时，你已被授予访问系统资源的权限。通常，当你希望在自己的机器上安装新软件时，你需要\
    \ root 或管理员权限。这就是操作系统访问控制机制在发挥作用。\n\n可以理解，关系型数据库也拥有非常强大的访问控制机制。虽然大多数系统在提供访问控制的方式上差异很大，但几乎所有供应商都提供了\
    \ `GRANT` 和 `REVOKE` 这两个数据控制语言命令。\n\n### SQLite 中的访问控制\n\n权限真正在多用户系统中发挥作用，即当多个用户访问一个系统但权限不均等时。这在像\
    \ PostgreSQL、Sybase ASE 等客户端-服务器数据库系统中是典型情况。\n\nSQLite 是一个基于单文件的系统，通常用于我们需要在有限约束或应用程序内嵌入简单数据库的场景。虽然它有一些条款允许一定程度的多用户访问，但它并非真正为多用户访问而设计。这并不意味着它不是一个有能力的数据库管理系统。我个人认为，如果在许多本应使用更昂贵、资源消耗更大的系统的地方改用\
    \ SQLite，世界会变得更好，但这将是另一次讨论的话题。\n\nSQLite 作为基于单文件的系统，依赖于操作系统来授予或限制对其数据文件的访问。因此，它没有实现任何\
    \ `GRANT` 或 `REVOKE` 命令。本章的其余部分将重点介绍使用 PostgreSQL 示例的访问控制机制。\n\n### 在 PostgreSQL\
    \ 中创建新用户\n\n为了运行本书中的示例，我们一直使用用户 `postgres`。作为一个拥有所有权限的万能账户，它很好地服务了我们。回顾一下，我们过去常常通过\
    \ `-U` 选项指定用户名来启动 `psql` 会话，如下所示（见列表 16-1）。\n\n```\n/opt/PostgreSQL/9.5/bin/psql\
    \ -U postgres\n列表 16-1\n使用 postgres 用户启动 psql 会话的命令\n```\n\n但这并不能准确反映真实世界的设置。通常你会有自己的用户账户，其权限将少于管理员账户。这对于你和数据库管理员来说都更安全，因为知道一个账户被入侵不会影响系统中的所有内容。\n\
    \n让我们通过 `psql` 在 PostgreSQL 中创建一个新用户（见列表 16-2），然后我们将继续指定该特定用户拥有的权限。\n\n```\npostgres=#\
    \ CREATE USER primer with PASSWORD 'hunter2';\nCREATE ROLE\npostgres=#\n列表 16-2\n\
    在 psql 中创建新用户\n```\n\n当你执行此命令时，一个名为 `primer` 的新用户被创建，密码为 `hunter2`，控制台显示消息 `CREATE\
    \ ROLE`。由于会话是以 `postgres` 用户创建的，并且 `=#` 之前的文本仍然是 `postgres`，我们可以看到 `CREATE USER`\
    \ 命令并没有直接切换到新用户，而是继续使用 `postgres` 进行同一会话。\n\n### hunter2 的传说\n\n在社交网络流行之前，互联网中继聊天主导着即时通讯领域。人们连接到\
    \ IRC 服务器，加入一个或多个称为频道的聊天室，并与志同道合的人交谈。\n\n如果某次对话特别有趣，人们会将其发布到网站 Bash.org 上。大约在\
    \ 2004 年，有人发布了一段两个用户之间的有趣对话，其中第一个用户说服另一个用户，当他们在 IRC 中输入真实密码时，其他人只会看到 ******。这当然不是真的，但无论如何很有趣。对话是否真的发生过也无法验证，而讨论中的密码是\
    \ ‘hunter2’。\n\n你可以在此处阅读 Bash.org 的条目：[`http://www.bash.org/?244321`](http://www.bash.org/?244321)\n\
    \n我们现在尝试验证该用户是否确实已创建（见列表 16-3）。像之前一样，`psql` 为我们提供了一个简短的命令来完成此操作——`\\du`。\n\n```\n\
    postgres=# \\du\nList of roles\nRole name |                    Attributes    \
    \              | Member of\n-----------+------------------------------------------------+\n\
    postgres  | Superuser, Create role, Create DB, Replication,|\n| Bypass RLS   \
    \                                  | {}\nprimer    |                         \
    \                       | {}\n列表 16-3\n检查用户 primer 是否已创建\n```\n\n我们看到我们的用户确实已经创建，尽管其属性列表为空。别担心，我们稍后会处理这一点。\n\
    \n如果你想在不使用 `psql` 元命令的情况下验证相同的信息，我们可以查询内置的数据库目录信息（见列表 16-4）。\n\n| usename | usesysid\
    \ | usecreatedb | usesuper |\n| --- | --- | --- | --- |\n| postgres | 10 | t |\
    \ t |\n| primer | 41095 | f | f |\n\n```\nSELECT usename,\nusesysid,\nusecreatedb,\n\
    usesuper FROM pg_user;\n列表 16-4\n从数据库目录查询用户信息\n```"
- fmt: "# Grant Privileges to Users\n\nLet us try to open a psql session using this\
    \ newly created user. We will pass the value `primer` to the `-U` option of psql\
    \ (Listing [16-5](#A457348_1_En_16_Chapter.html#Par23)).\n\n```\n/opt/PostgreSQL/9.5/bin/psql\
    \ -U primer\nPassword for user primer:\npsql.bin: FATAL:  database \"primer\"\
    \ does not exist\n```\n*Listing 16-5 Trying to log in using our newly created\
    \ user*\n\nAlong with the user, it also tried to open the default database for\
    \ the new user whose name was assumed to be the same as the username. We’ll remedy\
    \ this by explicitly stating that we want to operate on `testdb` (Listing [16-6](#A457348_1_En_16_Chapter.html#Par25)).\n\
    \n```\n/opt/PostgreSQL/9.5/bin/psql -U primer -d testdb\nPassword for user primer:\n\
    psql.bin (9.5.8)\nType \"help\" for help.\ntestdb=> SELECT * FROM proglang_tbl;\n\
    ERROR:  permission denied for relation proglang_tbl\n```\n*Listing 16-6 Connecting\
    \ to testdb using primer user*\n\nLogging into the `testdb` database worked. But\
    \ when we ran a basic query on one of the tables, it immediately gave us a `permission\
    \ denied` error. This seems logical in retrospect since we haven’t granted any\
    \ special access to `primer`. We don’t want any new user to immediately gain access\
    \ to our meticulously created tables.\n\nWe will use the `GRANT` statement to\
    \ give specific privileges to our newly created user. The general syntax of `GRANT`\
    \ is given below (Listing [16-7](#A457348_1_En_16_Chapter.html#Par28)).\n\n```\n\
    GRANT <privilege> ON <object> TO <user>;\n```\n*Listing 16-7 General syntax of\
    \ GRANT*\n\nThe most obvious privilege we wish to give the `primer` user is the\
    \ ability to query `proglang_tbl`. This is equivalent to giving the user a read-only\
    \ access to the particular table. We run this statement as the superuser `postgres`\
    \ who will bestow privileges to other users (Listing [16-8](#A457348_1_En_16_Chapter.html#Par30)).\n\
    \n```\nGRANT SELECT ON proglang_tbl TO primer;\n```\n*Listing 16-8 Granting SELECT\
    \ to primer*\n\nNow we can exit the psql session as `postgres` and reopen `testdb`\
    \ as the user `primer`. We will attempt to first query and then update a row in\
    \ the table just to see whether the `GRANT` statement worked as advertised (Listing\
    \ [16-9](#A457348_1_En_16_Chapter.html#Par32)).\n\n```\ntestdb=> SELECT count(*)\
    \ FROM proglang_tbl;\ncount\n-------\n    4\n(1 row)\ntestdb=> UPDATE proglang_tbl\
    \ SET year=1982 WHERE author=\"Ross\";\nERROR:  permission denied for relation\
    \ proglang_tbl\n```\n*Listing 16-9 Verifying whether primer can query or update\
    \ the table*\n\nThe query worked fine but the row update did not, so everything\
    \ is working as expected. As you might have guessed, we would need to `GRANT`\
    \ the `UPDATE` privilege too for the second statement to work.\n\n`SELECT` and\
    \ `UPDATE` are not the only privileges available for fine-grained access control.\
    \ You can specify other privileges like `INSERT` and `DELETE` too. Finally, there\
    \ is an `ALL` privilege that grants all the available privileges on that particular\
    \ database object to the user specified. If you wish to specify multiple privileges\
    \ in one go, you can specify them like a list (Listing [16-10](#A457348_1_En_16_Chapter.html#Par35)).\n\
    \n```\nGRANT SELECT, UPDATE, INSERT ON proglang_tbl TO primer;\n```\n*Listing\
    \ 16-10 Granting multiple privileges in one go*\n\nGranting privileges is usually\
    \ done when the users who wish to access the table or database object in question\
    \ are not the ones who created it. If a user has created a table, they get all\
    \ privileges on it by default.\n\nThere are other privileges in most DBMS systems\
    \ out there than the four basic ones we covered. However their use is usually\
    \ of interest to the database administrators rather than query users. Feel free\
    \ to refer to your DB manual to know more about the supported privileges.\n\n\
    # Revoking Privileges\n\nThe `REVOKE` command is the exact opposite of `GRANT`.\
    \ It allows you to remove privileges from a user for a database object. Its general\
    \ syntax is similar to `GRANT` with the exception that it uses `FROM` instead\
    \ of `TO` (Listing [16-11](#A457348_1_En_16_Chapter.html#Par39)).\n\n```\nREVOKE\
    \ <privilege> ON <object> FROM <user>;\n```\n*Listing 16-11 General syntax of\
    \ REVOKE*\n\nWhile discussing views in Chapter [14](#A457348_1_En_14_Chapter.html),\
    \ we had mentioned how views help in data security by providing a virtual table\
    \ containing only the fields you want to show to others. But this plan would be\
    \ foiled if the users could query the base table too. Using `REVOKE` here is a\
    \ good idea. We’d allow users to query the view but not the underlying table (Listing\
    \ [16-12](#A457348_1_En_16_Chapter.html#Par41)). This way we ensure that usability\
    \ is not hampered while still being able to keep all kinds of fields together\
    \ that make sense on a data-modeling level.\n\n```\ntestdb=# GRANT SELECT ON language_decade\
    \ TO primer;\ntestdb=# REVOKE SELECT ON proglang_tbl FROM primer;\n```\n*Listing\
    \ 16-12 Revoking access on the base table*\n\nWe are running these commands using\
    \ the superuser `postgres`. Let us now log in as the user `primer` and see how\
    \ these statements have affected our privileges (Listing [16-13](#A457348_1_En_16_Chapter.html#Par43)).\n\
    \n```\nSELECT * FROM proglang_tbl;\nERROR:  permission denied for relation proglang_tbl\n\
    SELECT * FROM language_decade WHERE decade='The 1950s';\n language |   decade\n\
    ----------+-----------\n Jovial   | The 1950s\n APT      | The 1950s\n(2 rows)\n\
    ```\n*Listing 16-13 Checking privileges of the user primer*\n\nWe notice that\
    \ the user can query the view but not the base table. This is in fact a very common\
    \ access control workflow in large databases. Right after the data definition\
    \ process, different views are created on the basis of how we expect the data\
    \ to be queried, and then base table privileges are revoked for interactive querying.\n\
    \nWhile we can specify a list of users in `GRANT` and `REVOKE`, we cannot reasonably\
    \ expect the list of users of a database system to remain the same over time.\
    \ Most DBMS software provides a keyword `PUBLIC` to refer to all current and future\
    \ users of a system. This can be used with our access control statements to minimize\
    \ the need for routine access administration (Listing [16-14](#A457348_1_En_16_Chapter.html#Par46)).\n\
    \n```\ntestdb=# GRANT ALL ON proglang_tbl TO PUBLIC;\ntestdb=# REVOKE DELETE ON\
    \ proglang_tbl FROM PUBLIC;\n```\n*Listing 16-14 Using PUBLIC with access control\
    \ statements*\n\nWhat these two statements in succession would achieve is to first\
    \ open up the `proglang_tbl` for everyone and then remove only the `DELETE` privilege.\
    \ The other privileges like `INSERT`, `UPDATE`, etc., would be available to all\
    \ users of the system without us having to list them one by one. If a new user\
    \ is created, these access control levels would be applicable to them too.\n\n\
    # Further Reading\n\nThis text was always meant to be a short, tutorial introduction\
    \ to SQL for people who did not have prior experience with it. But this doesn’t\
    \ mean that we have learned all there is to learn about SQL. Indeed, we are far\
    \ from it.\n\nWhile I am happy that you got to the end of this text, it’s only\
    \ fair that I give you pointers on how to continue your SQL journey forward. Below\
    \ is a list of books that I consider worthy of reading. Not all of them may suit\
    \ you, so I am including a short description of what I felt about them to help\
    \ you decide."
