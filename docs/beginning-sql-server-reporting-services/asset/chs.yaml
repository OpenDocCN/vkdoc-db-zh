  \    *图 2-5. 数据源属性*\n4.  点击`Next`进入`Design the Query`页面。在此页面，您可以使用`Query Builder`可视化地创建查询，也可以直接输入查询而无需额外辅助。由于本书并非旨在教授您`T-SQL`，查询语句已提供。作者所著的《Beginning\
  \ T-SQL (Third Edition)》（Apress，2014）可用于学习更多关于`T-SQL`查询语言的知识。\n5.  输入或粘贴以下代码（该代码可在\
