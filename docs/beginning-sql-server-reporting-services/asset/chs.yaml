  \    *图 10-38. **连接到服务器** 属性*\n\n3.  除非您正在使用安全套接字层 (`SSL`)，否则请取消选中 **使用安全连接**。如果\
  \ SSRS 安装在您的本地工作站上，您很可能没有使用 `SSL`。\n4.  点击 **连接**。`移动报表发布工具` 将记住此连接。\n\n下一步是向 Web\
  \ 门户添加数据集，这些数据集将用于填充移动报表，而不是使用模拟数据。请按照以下步骤创建数据集：\n\n1.  最小化 `移动报表发布工具`。\n2.  在 Web\
  \ 门户中，选择 **新建** ➤ **数据集** 以启动 `报表生成器`。\n3.  使用此查询和 `AdventureWorks2016` 数据源创建一个新的名为\
  \ `SalesByState` 的共享数据集。如果您需要帮助，\"使用报表生成器\" 部分提供了创建数据集的说明。\n\n    ```sql\n    SELECT\
  \ SUM(TotalDue) AS Sales, vS.CountryRegionName, vS.StateProvinceName,\n        YEAR(OrderDate)\
  \ AS OrderYear\n    FROM Sales.SalesOrderHeader AS SOH\n        JOIN Person.BusinessEntityAddress\
  \ AS BEA\n            ON BEA.BusinessEntityID = SOH.CustomerID\n        JOIN Person.Address\
  \ AS A ON BEA.AddressID = A.AddressID\n        JOIN Person.vStateProvinceCountryRegion\
  \ AS vS\n            ON A.StateProvinceID = vS.StateProvinceID\n    WHERE CountryRegionName\
  \ = 'United States'\n    GROUP BY A.City, vS.CountryRegionName, vS.StateProvinceName,\n\
  \        YEAR(OrderDate);\n    ```\n\n4.  将新数据集保存在 **数据集** 文件夹中。\n5.  创建一个名为 `Sales`\
  \ 的数据集，使用以下查询，并将其保存到 **数据集** 文件夹中：\n\n    ```sql\n    WITH\n    Sales AS (\n   \
  \     SELECT SUM(TotalDue) AS Sales, MONTH(OrderDate) AS OrderMonth,\n         \
  \   YEAR(OrderDate) AS OrderYear,\n            LAG(SUM(TotalDue),12,600000) OVER(ORDER\
  \ BY YEAR(OrderDate),\n            MONTH(OrderDate)) * 1.10 AS Quota\n        FROM\
  \ Sales.SalesOrderHeader\n        GROUP BY MONTH(OrderDate), YEAR(OrderDate)\n \
  \   ),\n    Comparison AS (\n        SELECT OrderYear, Sales, OrderMonth, Quota,\n\
  \            Sales/Quota AS PercentOfGoal\n        FROM Sales)\n    SELECT OrderYear,\
  \ Sales, 'M' + RIGHT('0' + CAST(OrderMonth AS VARCHAR(2)),2) AS OrderMonth, Quota,\n\
  \        PercentOfGoal, DATEFROMPARTS(OrderYear,OrderMonth, 1) AS OrderDate,\n \
  \       CASE WHEN PercentOfGoal >= 0.98 THEN 1\n            WHEN PercentOfGoal >=\
  \ 0.9 THEN 0\n            ELSE -1 END AS Status\n    FROM Comparison;\n    ```\n\
  \n6.  关闭 `报表生成器`。\n\n您现在应该有两个可用于新移动报表的数据集。您将通过以下步骤将数据集连接到报表对象：\n\n\n1. 最大化 Mobile\
