  \    图 10-55. 报表自动调整\n\n每个控件还有一个 `Drill-Through Target` 属性，你可以将其设置为导航到另一个移动报表或任何\
  \ URL。用于在移动设备上运行报表的新应用程序包括 `Power BI for iOS`、`Power BI for Android` 和 `Power BI\
  \ for Windows`。\n\n\n\n## 概述\n\n借助企业版中新增的移动报表功能，Microsoft 发布了一款能够随时随地向多种设备交付数据的产品。构建报表非常简单，并且内置了交互性，无需特殊编码。报表生成器自\
  \ 2005 年起就已存在。从那时起，它作为一款帮助高级用户构建自有报表和仪表板的工具，已经取得了显著的改进。新的关键绩效指标（KPI）也能让高管们只需瞥一眼，经过少量的开发时间，就能获取信息。\n\
  \n本书面向初学者，但仍有更多内容值得学习。第 11 章讨论了一些随着您经验积累可能希望探索的高级主题。\n\n"
- '# 11. 后续学习路径


  为任何技术领域的初学者撰写书籍都面临着独特的挑战。哪些主题是合适的？哪些超出了范围？如何包含足够的内容让读者打好基础，又不至于使书籍过于庞大和昂贵？在每一章中，我都从开发人员和管理员的角度，思考了
  SQL Server Reporting Services（SSRS）新手可能会提出的问题。我试图用简单的方式解释，并涵盖足够的内容帮助您入门。为了避免增加不必要的复杂性，我没有提及某些功能。我希望本书能激发您学习更多知识的兴趣，并且它仅仅标志着您旅程的开始。


  当我撰写第 10 章时，我已经在思考本章将涵盖哪些内容。我意识到可以将高级信息分为五个领域：安装、架构与配置、开发、管理，以及与其他报告工具的集成。在本章中，我将在不深入细节的情况下，向您介绍这些领域中的一些高级功能。


  ## SSRS 安装


  在第 1 章中，您学习了如何在本机模式下将 SSRS 安装到您自己的计算机上，以便学习如何部署和管理报表。该章没有涵盖在 SharePoint 集成模式下安装
  SSRS。在过去几个版本的 SQL Server 和 SharePoint 中，在 SharePoint 模式下安装和配置 SSRS 变得更容易了，但仍然需要几个步骤。您还需要有一个
  SharePoint 场，而许多初学者可能无法获得。


  在 SharePoint 集成模式下运行 SSRS 有几个优点。您可以将报表开发添加到 SharePoint 内置的工作流功能中。例如，您可以要求新报表获得批准，并在发生更改时发送电子邮件通知。
  SharePoint 还具有文档版本管理功能，这是 Web 门户所不具备的。


  SharePoint 模式提供两个本机模式所不具备的功能。其一是 Power View 报表。这些报表旨在通过拖放操作供最终用户进行即席报告。报表基于预定义的数据模型，创建报表的人可以在构建报表的同时探索数据。报表具有高度交互性。例如，通过单击图表中的某个条形，整个报表就会被筛选。只需单击即可快速将可视化效果更改为不同类型。图
  11-1 是我根据预定义的数据模型，通过大约 30 次鼠标点击创建的 Power View 报表设计视图图片。其中的可视化反映的是实际数据。


  ![A395630_1_En_11_Fig1_HTML.jpg](img/A395630_1_En_11_Fig1_HTML.jpg)


  图 11-1. Power View 报表


  另一个仅在部署到 SharePoint 的报表中可用的功能是数据警报。根据数据警报中定义的条件，当报表的数据发生变化时，将触发一封电子邮件。这样，只有当数据发生重要变化时，才查看报表。


  如果您喜欢新的 Web 门户，但希望能自定义其外观和感觉，那么您很幸运。从 SSRS 2016 开始，您可以利用自定义品牌功能来调整 Web 门户的外观。图 11-2
  是来自 SSRS 团队博客（网址为 [`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/)
  ）的一个带有 Xbox 品牌的 Web 门户图片。


