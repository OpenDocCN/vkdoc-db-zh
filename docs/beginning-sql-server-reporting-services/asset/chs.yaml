  \n关闭代码窗口，点击`Preview`运行报告。图 2-10 显示了报告的第一页。\n\n![A395630_1_En_2_Fig10_HTML.jpg](img/A395630_1_En_2_Fig10_HTML.jpg)\n\
  *图 2-10. 报告第 1 页*\n\n请注意，您看到的是第 1 页，但总页数显示为“2？”。为了更快地将结果返回给最终用户，报告的开头部分可能在中间和结尾部分构建完成之前就已返回。点击右箭头查看更多页面。当您到达报告的最后一页时，问号会消失，因为此时已知总页数，如图\
  \ 2-11 所示。\n\n![A395630_1_En_2_Fig11_HTML.jpg](img/A395630_1_En_2_Fig11_HTML.jpg)\n\
  *图 2-11. 报告的最后一页*\n\n在向导的`Choose the Table Layout`页面（参见图 2-7），您勾选了`Enable drilldown`属性。这就是为什么您在`Australia`旁边看到加号的原因。点击加号展开该部分。`Order\
  \ Year`数据现在可见。点击展开`2011`和`Order Month 6`。现在该部分的详细信息就显示出来了。要查看`drilldown`属性的设置方式，请转到设计视图并选择`Region`行。在报告下方的`Row\
  \ Groups`部分，右键单击`table1_OrderYear`组并选择`Group Properties`。`Visibility`页面显示了`Region`如何控制`OrderYear`组的可见性，如图\
  \ 2-12 所示。根据我的实践经验，这个功能并不常用。\n\n![A395630_1_En_2_Fig12_HTML.jpg](img/A395630_1_En_2_Fig12_HTML.jpg)\n\
  *图 2-12. 可见性属性*\n\n再次预览报告并展开各个部分。图 2-13 显示了报告应有的样子。\n\n![A395630_1_En_2_Fig13_HTML.jpg](img/A395630_1_En_2_Fig13_HTML.jpg)\n\
  *图 2-13. 报告*\n\n### 使用预览按钮\n\n您可能会注意到此报告存在一些格式问题，但在学习如何纠正它们之前，请先看一下预览报告时位于报告上方、如图\
  \ 2-14 所示的按钮。\n\n![A395630_1_En_2_Fig14_HTML.jpg](img/A395630_1_En_2_Fig14_HTML.jpg)\n\
  *图 2-14. 报告预览图标*\n\n在导航控件的右侧，您会看到一个指向左边的箭头，即`Back to parent`按钮。在第 6 章开发相互链接的报告时会用到它。您还会看到一个用于停止执行长时间运行的报告的按钮和一个刷新报告的按钮。中间是一个`Print`按钮。最有趣的按钮位于`Print`按钮的右侧。\n\
  \n#### 打印布局按钮\n\n在大约十几年前部署了一组报告后，我接到了项目经理的紧急电话。她问道，为什么报告在每一页打印内容后都会打印一页空白？当然，在从`Visual\
  \ Studio`或`Report Manager`预览报告时，报告看起来是完美的。只有在打印时，问题才会显现出来。\n\n为了查看报告在打印时的实际效果，您应该点击`Print\
  \ Layout`按钮。该按钮就在打印按钮的右侧，可在在线视图和打印视图之间切换。\n\n通过在打印布局视图中滚动浏览报告页面，您可以发现并纠正问题，然后再部署报告。在部署之前，请务必以打印布局视图查看您创建的每个报告。\n\
  \n#### 页面设置按钮\n\n`Page Setup`按钮允许您调整报告的边距，并选择纸张大小、来源和方向。默认情况下，报告的页边距为一英寸。这些边距可能过大。通过修改属性，您可以确保报告更好地适应打印页面。关于使报告适应页面的其他方法，将在第\
  \ 4 章学习。图 2-15 显示了`Page Setup`对话框。\n\n![A395630_1_En_2_Fig15_HTML.jpg](img/A395630_1_En_2_Fig15_HTML.jpg)\n\
  *图 2-15. 页面设置对话框*\n\n\n### 额外的按钮\n\n对最终用户而言，导出报告与打印报告同等重要。系统提供了带有多种导出类型的`导出`按钮，例如导出为\
  \ XML、Excel、Word 和 PDF。导出报告的结果会因导出类型的功能而异。\n\n你可以使用`缩放`按钮将预览窗口放大到多种尺寸，并通过`查找`和`下一个`按钮在报告中搜索文本。\n\
  \n## 格式化向导报告\n\n通过向导创建的表格报告看起来很不错，但它仍有改进空间。在预览时，我列出了需要修复的事项清单：\n*   从`OrderDate`中移除时间\n\
  *   将美元金额四舍五入到最近的分\n*   将金额格式设置为货币\n*   移除`SalesOrderID`的汇总值\n*   将`OrderMonth`从数字更改为月份名称\n\
  *   调整列宽\n*   为每个`组`以及整个报告添加总计。\n\n点击`设计`以查看报告的设计视图。在网格底部找到`OrderDate`字段。右键单击该单元格并选择`文本框属性`。\n\
  \n**注意**\n在表格网格中选择单元格可能需要一些练习。你可以选择单元格或其内容。选择单元格时，它将显示轮廓。如果遇到困难，请尝试点击单元格的边缘。\n\n\
  在`文本框属性`对话框中，选择左侧的`数字`。在`类别`下，选择`日期`。对于类型，选择一种不包含时间的日期格式，如图 2-16 所示，然后点击`确定`。\n\n\
  ![A395630_1_En_2_Fig16_HTML.jpg](img/A395630_1_En_2_Fig16_HTML.jpg)\n图 2-16. 更改日期格式\n\
  \n右键单击网格右下角的`TotalDue`单元格并选择`文本框属性`。选择`数字`，但这次选择`货币`。勾选`使用千位分隔符 (,)`。如果你在美国，其属性将如图\
  \ 2-17 所示。\n\n![A395630_1_En_2_Fig17_HTML.jpg](img/A395630_1_En_2_Fig17_HTML.jpg)\n\
  图 2-17. 格式化 `TotalDue` 字段\n\n点击`确定`接受该格式。现在，为了避免对三个汇总字段重复此过程，请调出`属性`窗口。你可以通过按 `F4`\
  \ 键或在`视图`菜单中找到它。定位到`格式`属性。图 2-18 显示了你要找的内容。\n\n![A395630_1_En_2_Fig18_HTML.jpg](img/A395630_1_En_2_Fig18_HTML.jpg)\n\
  图 2-18. `格式` 属性\n\n将`格式`值复制到`剪贴板`。按住 Shift 键并选择`TotalDue`标题下的三个汇总框。现在属性窗口会同时针对这三个文本框进行选择。找到`格式`属性并粘贴该值。\n\
  \n你可以随时预览报告以检查进度。每次预览时，报告定义都会被保存。此时，在展开各部分后，报告应类似于图 2-19。\n\n![A395630_1_En_2_Fig19_HTML.jpg](img/A395630_1_En_2_Fig19_HTML.jpg)\n\
  图 2-19. 应用了一些格式的报告\n\n向导自动为`SalesOrderID`列创建了汇总，因为它包含数字数据。对该值求和没有意义。返回设计视图，点击包含该公式的每个单元格并按删除键以移除`[Sum(SalesOrderID)]`。需要从第二、第三和第四行中移除它。\n\
  \n清单上的下一项是将`Order Month`列更改为显示月份名称。要将其更改为显示名称，请按照以下步骤操作：\n1.  在设计视图中，右键单击`OrderMonth`单元格并选择`表达式`。\n\
  2.  这将打开`表达式`对话框。你可以看到现有表达式`=Fields!OrderMonth.Value`。\n3.  展开`类别`框中的`常用函数`。\n4.\
  \  选择`日期和时间`。\n5.  将光标定位在等号和表达式中的字母 F 之间。\n6.  在`项`列表中双击`MonthName`。\n7.  在表达式末尾添加一个右括号。表达式现在应为`=MonthName(Fields!OrderMonth.Value)`。`表达式`对话框应如图\
  \ 2-20 所示。\n\n![A395630_1_En_2_Fig20_HTML.jpg](img/A395630_1_En_2_Fig20_HTML.jpg)\n\
  图 2-20. 月份名称的表达式\n\n8.  验证表达式后点击`确定`。由于表达式变得更复杂，单元格值将变为`<<Exp>>`。\n\n有些标题如果列更宽一些会更好看。当表格被选中时，顶部和左侧会出现控制柄。通过在顶部控制柄的列之间点击并拖动，你可以扩展或缩小列宽以容纳列标题。\n\
  \n清单上还有一项任务，添加一个总计和一个每个`组`（`美国`、`欧洲`和`太平洋`）的总计。这比你想象的要容易。你将在第 2 章了解更多关于使用分组级别的内容，但目前要理解，添加在一个级别的总计会显示在上一个级别。例如，在`区域`级别添加的总计会显示在`组`级别。请按照以下步骤添加`组`总计：\n\
  1.  在设计视图中，右键单击位于`区域`和`应纳税额`的单元格，如图 2-21 所示。\n\n![A395630_1_En_2_Fig21_HTML.jpg](img/A395630_1_En_2_Fig21_HTML.jpg)\n\
  图 2-21. 位于 `区域` 和 `应纳税额` 的单元格\n\n2.  选择`添加总计`。网格底部将出现一个新行，其中包含`[Sum(TotalDue)]`表达式。\n\
  3.  在网格底部的`销售订单 ID`列对应的单元格中输入以下内容：`[组]的总计`。请注意，你能够在同一个单元格中包含文本和字段（称为占位符），而无需创建表达式。\n\
  \n报告定义应如图 2-22 所示。\n\n![A395630_1_En_2_Fig22_HTML.jpg](img/A395630_1_En_2_Fig22_HTML.jpg)\n\
  图 2-22. 添加`组`总计后的报告定义\n\n在设计窗口的底部，你会看到`行组`和`列组`部分，你将在第 5 章了解更多关于它们的内容。分组级别可以在这些部分中添加和配置。选择报告顶部的`组`文本框，这会改变`行组`部分中显示的内容。右键单击`行组`下的`list1_Group`，然后选择`添加总计`\
  \ ➤ `之后`，如图 2-23 所示。\n\n![A395630_1_En_2_Fig23_HTML.jpg](img/A395630_1_En_2_Fig23_HTML.jpg)\n\
  图 2-23. 添加总计\n\n这只是添加了一行，你还需要在其中添加表达式。右键单击报告底部的新文本框并选择`表达式`。输入此表达式并点击`确定`：\n\n```\n\
  =\"总计 \" & FormatCurrency(Sum(Fields!TotalDue.Value),2,0,True,True)\n```\n\n在屏幕顶部，你会看到一个格式化菜单栏，如图\
  \ 2-24 所示。此菜单栏类似于在其他程序（如 Microsoft Word）中的操作。\n\n![A395630_1_En_2_Fig24_HTML.jpg](img/A395630_1_En_2_Fig24_HTML.jpg)\n\
  图 2-24. 格式化菜单栏\n\n确保选中新文本框，然后单击右对齐图标。点击`B`图标以加粗文本。报告定义现在应类似于图 2-25。\n\n![A395630_1_En_2_Fig25_HTML.jpg](img/A395630_1_En_2_Fig25_HTML.jpg)\n\
  图 2-25. 添加总计后的报告定义\n\n现在预览报告。每一页都将包含该`组`的总计。最后一页将包含一个总计。图 2-26 显示了报告第 3 页及新增的总计。\n\
  \n![A395630_1_En_2_Fig26_HTML.jpg](img/A395630_1_En_2_Fig26_HTML.jpg)\n图 2-26. 带有新总计的格式化报告的第\
  \ 3 页\n\n"
- "# 第二部分\n## 报告开发\n\n## 创建矩阵报告\n\n在上一个练习中，您通过运行向导创建了解决方案、项目以及报告。您也可以使用向导向现有项目添加新报告。在本节中，您将向项目添加一个矩阵报告。\n\
  \n矩阵报告通常比表格报告更为紧凑。在矩阵报告中，数据的某一列或多列将被透视转换为列标题。在本示例中，数据将按年份进行透视。为说明其工作原理，请查看以下查询的结果，该查询返回北美地区按年份统计的总销售额。\n\
  \n```sql\nSELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\nSUM(TotalDue)\
  \ AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory AS\
  \ T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group] = 'North America'\nGROUP\
  \ BY T.[Group], T.Name , YEAR(OrderDate)\nORDER BY Region, OrderYear;\n```\n\n您可以在图\
  \ 2-27 中查看该查询的部分结果。\n\n![A395630_1_En_2_Fig27_HTML.jpg](img/A395630_1_En_2_Fig27_HTML.jpg)\n\
  \n图 2-27. 按年份统计的总销售额（部分结果）\n\n为了按年份进行比较——换句话说，为了轻松比较 2011 年加拿大地区与中部地区的销售额——您可以对数据进行透视。下面是一个将\
  \ `OrderYear` 的值透视为列的查询。\n\n```sql\nSELECT [Group], Region,\n[2011], [2012], [2013],\
  \ [2014]\nFROM\n(SELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\n\
  SUM(TotalDue) AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory\
  \ AS T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group] = 'North America'\nGROUP\
  \ BY T.[Group], T.Name , YEAR(OrderDate)\n) AS SourceTable\nPIVOT\n(SUM(TotalSales)\n\
  FOR OrderYear IN ([2011], [2012], [2013], [2014])\n)\nAS PivotTable\nORDER BY Region;\n\
  ```\n\n图 2-28 显示了结果。\n\n![A395630_1_En_2_Fig28_HTML.jpg](img/A395630_1_En_2_Fig28_HTML.jpg)\n\
  \n图 2-28. 透视后的结果\n\nT-SQL 的透视查询语法很复杂，而且您必须在查询中硬编码列名。幸运的是，在 SSRS 中创建透视结果非常简单，并且无需硬编码。\n\
  \n请按照以下步骤创建矩阵报告：\n\n1.  要在项目中启动向导，请在 `解决方案资源管理器` 窗口中右键单击 `报告` 文件夹，然后选择 `添加新报告`，如图\
  \ 2-29 所示。\n\n![A395630_1_En_2_Fig29_HTML.jpg](img/A395630_1_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29. 如何启动向导\n\n2.  向导启动后，单击 `下一步` 跳过欢迎页面。\n3.  在 `选择数据源` 页面上，单击 `编辑` 以调出 `连接属性`。像本章前面“创建您的第一份报告”一节中那样填写连接信息。\n\
  4.  配置好数据源后，单击 `下一步`。在 `设计查询` 页面中，使用与前面示例相同的查询：\n\n```sql\n    SELECT T.[Group],\
  \ T.Name As Region, YEAR(OrderDate) AS OrderYear,\n    Month(OrderDate) AS OrderMonth,\n\
  \    OrderDate, SalesOrderID, TotalDue\n    FROM Sales.SalesOrderHeader AS SOH\n\
  \    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID;\n```\n\n\
  5.  单击 `下一步` 转到 `选择报告类型` 页面。选择 `矩阵` 并单击 `下一步`。\n6.  按照图 2-30 所示配置 `设计矩阵` 页面。当您在右侧选择一个字段时，报告中该字段将显示的区域会高亮显示。这可以帮助您弄清楚哪些字段放在哪里。\n\
  \n![A395630_1_En_2_Fig30_HTML.jpg](img/A395630_1_En_2_Fig30_HTML.jpg)\n\n图 2-30.\
  \ 矩阵字段配置\n\n7.  单击 `下一步` 并填写报告名称。将其命名为 `矩阵报告`。\n8.  单击 `完成` 以结束向导。\n\n现在您将在 `解决方案资源管理器`\
  \ 的 `报告` 文件夹中看到两份报告。要打开报告，请双击其名称。您也可以在设计区域中切换已打开的报告。要查看矩阵报告的效果，请单击 `预览`。报告应如图 2-31\
  \ 所示。\n\n![A395630_1_En_2_Fig31_HTML.jpg](img/A395630_1_En_2_Fig31_HTML.jpg)\n\n\
  图 2-31. 查看矩阵报告\n\n表格报告与矩阵报告的一个显著区别在于，矩阵报告具有跨列的分组级别。您将在第 5 章中学习更多关于矩阵报告的知识。同时，回到报告的设计视图查看属性。图\
  \ 2-32 展示了矩阵报告的设计实际上是多么简单。\n\n![A395630_1_En_2_Fig32_HTML.jpg](img/A395630_1_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32. 矩阵报告设计\n\n运用您在本章前面学到的技能，格式化摘要文本框。为了使这份报告更完整，您将添加三个总计字段。请按照以下说明添加总计。\n\n\
  1.  右键单击包含表达式 `[Sum(TotalDue)]` 的文本框。\n2.  选择 `添加总计` ➤ `行`。\n3.  现在重复此过程，但这次选择 `添加总计`\
  \ ➤ `列`。\n4.  右键单击 `区域` 和 `总计` 交叉点处的单元格。选择 `添加总计`。\n5.  选择 `总计` 列，然后在设计菜单中单击 **B**\
  \ 以将字体加粗。\n6.  选择最后一行，然后单击 **B** 以将字体加粗。\n7.  将第一行右对齐。\n\n报告设计现在将如图 2-33 所示。\n\n\
  ![A395630_1_En_2_Fig33_HTML.jpg](img/A395630_1_En_2_Fig33_HTML.jpg)\n\n图 2-33. 添加总计后的报告设计\n\
  \n预览报告。您现在拥有所有区域的总计以及跨年份的总计。图 2-34 显示了该报告。\n\n![A395630_1_En_2_Fig34_HTML.jpg](img/A395630_1_En_2_Fig34_HTML.jpg)\n\
  \n图 2-34. 带有总计的矩阵报告\n\n## 小结\n\n大多数报告，特别是那些利用了 SSRS 一些高级功能的报告，无法使用向导创建。然而，对于简单报告来说，向导是完美的工具。它也是帮助您开始学习开发\
  \ SSRS 报告的绝佳辅助工具。在本章中，您创建了两份报告。然后您修改了属性，使它们看起来专业且已准备好部署。\n\n在第 3 章中，您将学习如何配置数据源和数据集，这是报告最基本的元素。\n\
  \n## 3. 理解数据源和数据集\n\n我第一次部署 SSRS 报告组是在 2004 年，当时 SQL Server Reporting Services (`SSRS`)\
  \ 刚刚发布。这些报告非常成功，消息传到了我工作公司的其他部门。很快，我就收到了多到无法处理的报告请求。我的首要职位是数据库管理员，创建报告只是我工作的一小部分。不久之后，我组织了一个为期一天的\
  \ `SSRS` 研讨会，教授来自每个部门的一小部分人员如何开发他们自己的报告。\n\n自那以后，我通过课程、文章和我的第一本 `SSRS` 书籍，向数十人教授了\
  \ `SSRS` 开发。本章涵盖的数据源和数据集知识是构建报告的基础。在教授 `SSRS` 的过程中，我认识到这些主题同样具有挑战性。在继续学习之前，请确保您完全理解了本章涵盖的材料，并且在需要帮助时务必回头查阅。\n\
  \n本章涵盖数据源和数据集。您将学习它们是什么、如何创建它们，以及何时在报告之间共享它们是合理的。在第 2 章中，您通过运行向导创建了项目和两份报告。在本章中，您将手动构建报告。\n\
  \n\n"
- "# 创建共享数据源\n\n如果您以前使用过数据库，可能熟悉**连接字符串**的概念。连接字符串就像是一个地址，告诉您与数据库通信所需的所有信息，例如数据库类型、位置以及用于连接的账户。以下是一个可能的连接字符串：\n\
  ```\nProvider=SQLNCLI11;Server=localhost\\INST1;Database=AdventureWorks2016;\nTrusted_Connection=yes;\n\
  ```\n此连接字符串表明连接类型是使用最新版本 Native Client 的 SQL Server。服务器位于本地计算机上，且是一个名为 `INST1` 的命名实例。要连接的数据库是\
  \ `AdventureWorks2016`。它没有提供用户名和密码，而是使用 Windows 凭据。\n\n连接字符串看起来可能有些吓人，但您不必自己琢磨。大多数应用程序（`SSRS`\
  \ 也包括在内）都有一个直观的工具来构建连接字符串。\n\n在第 2 章中，您创建了一个包含一个项目的解决方案。在项目内部，您创建了两个报表。为了保持简单并专注于使用向导创建报表，我让您将每个数据源嵌入到报表中。这意味着数据源成为了报表定义的一部分。如果您查看这些报表的\
  \ XML 源代码，就会找到连接字符串。\n\n在大多数情况下，数据源应该在报表之间共享。想象一下，您有 100 个或更多报表，每个报表中都嵌入了相同的连接字符串。然后您得知数据库将在周末迁移到新服务器。您将面临数小时的编辑和测试每个报表的工作。如果数据源是共享的而不是嵌入的，您只需要做一个简单的更改，您所有的报表就会指向新的数据库位置。\n\
  \n作为最佳实践，数据源应该是共享的，而 `SSRS` 使得这一点很容易做到。要了解如何为您的项目创建共享数据源，请执行以下步骤：\n1.  启动 `SQL Server\
  \ Data Tools 2015 (SSDT)`。\n2.  点击 `文件 ➤ 新建项目` 来创建一个新项目。\n3.  新建项目对话框打开后，在 `已安装\
  \ ➤ 模板 ➤ 商业智能` 下找到 Reporting Services 模板。\n4.  选择 `报表服务器项目`，如图 3-1 所示。\n\n    ![A395630_1_En_3_Fig1_HTML.jpg](img/A395630_1_En_3_Fig1_HTML.jpg)\n\
  \    *图 3-1. 报表服务器项目*\n\n5.  在“项目名称”中填入 `Data Sources and Datasets`。\n6.  在“解决方案名称”中填入\
  \ `Beginning SSRS Chapter 3`，如图 3-2 所示。\n\n    ![A395630_1_En_3_Fig2_HTML.jpg](img/A395630_1_En_3_Fig2_HTML.jpg)\n\
  \    *图 3-2. 项目和解决方案名称*\n\n7.  确保解决方案将保存在您可以找到的位置。默认情况下，它将在上一个解决方案的位置创建。点击 `确定`\
  \ 创建项目。\n8.  确保您能看到“解决方案资源管理器”窗口。如果不可见，请从“视图”菜单启用它。您也可以使用键盘快捷键 `CTRL + ALT + L`。图\
  \ 3-3 显示了“解决方案资源管理器”应有的样子。\n\n    ![A395630_1_En_3_Fig3_HTML.jpg](img/A395630_1_En_3_Fig3_HTML.jpg)\n\
  \    *图 3-3. 解决方案资源管理器*\n\n项目可以包含三种类型的对象：`共享数据源`、`共享数据集` 和 `报表`。唯一真正的要求是有一个报表；数据源和数据集可以嵌入在报表中。在这种情况下，您将不会在这些文件夹中看到它们。要添加共享数据源，请按照以下步骤操作：\n\
  1.  右键单击 `共享数据源` 并选择 `添加新数据源`，如图 3-4 所示。\n\n    ![A395630_1_En_3_Fig4_HTML.jpg](img/A395630_1_En_3_Fig4_HTML.jpg)\n\
  \    *图 3-4. 添加新数据源*\n\n2.  这将打开“共享数据源属性”对话框，如图 3-5 所示。在“名称:”处填入数据源名称 `AdventureWorks2016`。为每个数据源命名非常重要，以便以后可以识别。\n\
  \n    ![A395630_1_En_3_Fig5_HTML.jpg](img/A395630_1_En_3_Fig5_HTML.jpg)\n    *图\
  \ 3-5. 共享数据源属性*\n\n3.  数据源的 `类型` 应为 `Microsoft SQL Server`。\n4.  点击 `编辑` 按钮以打开“连接属性”对话框。\n\
  5.  填入您的 `SQL Server` 实例的服务器名称和登录属性。如果您难以确定服务器实例名称，请参阅第 1 章中的“确定 SQL Server 名称”部分，或向您的数据库管理员寻求帮助。\n\
  6.  在 `选择或输入数据库名称` 下，选择 `AdventureWorks2016` 数据库。属性应类似于图 3-6 所示。\n\n    ![A395630_1_En_3_Fig6_HTML.jpg](img/A395630_1_En_3_Fig6_HTML.jpg)\n\
  \    *图 3-6. 连接属性*\n\n    **注意** 从现在开始，本书中的示例将假定您知道如何连接到自己的数据库。\n\n7.  点击 `测试连接`\
  \ 以确保连接信息正确。点击 `确定` 关闭测试框，再次点击 `确定` 接受连接属性。`连接字符串` 属性现在应该已被填入。\n\n点击 `确定` 接受数据源的属性。数据源现在将在解决方案资源管理器中可见，如图\
  \ 3-7 所示。\n\n![A395630_1_En_3_Fig7_HTML.jpg](img/A395630_1_En_3_Fig7_HTML.jpg)\n\
  *图 3-7. 新数据源*\n\n请注意，数据源实际上是一个 `XML` 文件。您无法在 `Visual Studio` 中查看文件内容，但如果您愿意，可以导航到\
  \ `.rds` 文件并在文本编辑器中打开它。图 3-8 显示了我的数据源文件内容。\n\n![A395630_1_En_3_Fig8_HTML.jpg](img/A395630_1_En_3_Fig8_HTML.jpg)\n\
  *图 3-8. 数据源文件*\n\n如果您需要编辑数据源属性，请单击数据源或右键单击它并选择 `打开`。这可能有点反直觉，但如果您右键单击并选择 `属性`，您只会在属性窗口中看到\
  \ `文件名` 和 `文件路径`，如图 3-9 所示。\n\n![A395630_1_En_3_Fig9_HTML.jpg](img/A395630_1_En_3_Fig9_HTML.jpg)\n\
  *图 3-9. 数据源的属性*\n\n设置项目中报表所需的任何连接。作为最佳实践，请为共享数据源命名，以便以后可以识别。您应避免使用服务器名称命名数据源。通常，您会在本地、开发或测试服务器上进行开发。已发布的报表通常会指向名称不同的生产服务器。\n\
  \n**注意**\n如果您想使用代码下载中的项目，可能需要修改数据源属性才能连接到您自己的 `SQL Server` 实例。\n\n\n\n## 创建共享数据集\n\
  \n一个数据集就是一个查询，是你向数据库提出的问题。与数据源不同，数据集通常对报告是唯一的，大多数不应共享。然而，也有几个例外。例如，你可能需要在多个报告中复用一个参数列表。还有一些新功能，例如移动报告，它们需要共享数据集。在本例中，你将创建一个参数列表作为共享数据集。\n\
  \n创建共享数据集请遵循以下步骤：\n\n1.  右键单击 `Shared Datasets` 文件夹并选择 **添加新数据集**。\n2.  这将打开 `共享数据集属性`\
  \ 对话框。在 `名称` 属性中键入 `Year`。\n3.  确保在上一节创建的数据源 `AdventureWorks2016` 已在 `数据源` 属性中被选中。\n\
  4.  确保 `查询类型` 属性选择的是 `文本`。\n5.  在 `查询` 文本框中键入以下代码：\n    ```sql\n    SELECT DISTINCT\
  \ YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\n    ORDER BY OrderYear;\n\
  \    ```\n6.  属性应如图 3-10 所示。点击 **确定** 创建新的共享数据集。\n    ![A395630_1_En_3_Fig10_HTML.jpg](img/A395630_1_En_3_Fig10_HTML.jpg)\n\
  \    图 3-10. `共享数据集属性`\n\n现在你应该能在 `Shared Datasets` 文件夹中看到 `Year` 数据集，如图 3-11 所示。与数据源类似，查看其属性会显示文件位置。要编辑属性，可以单击名称或右键单击并选择\
  \ **打开**。\n\n![A395630_1_En_3_Fig11_HTML.jpg](img/A395630_1_En_3_Fig11_HTML.jpg)\n\
  图 3-11. 新的共享数据集\n\n你可以根据需要创建额外的数据集。请记住，除非数据集将在多个报告中使用，否则共享它没有意义。典型的用例是用于参数列表。\n\n\
  ### 注意\n\n在 SQL Server 2016 发布时，存在一个涉及共享数据集的错误。要解决此问题，请导航到项目文件并打开 `Year.rsd` 文件。将代码\
  \ `<Dataset>` 更改为 `<Dataset Name=\"Year\">`，然后保存文件。Microsoft 已承诺尽快修复此问题，因此在你阅读本书时，这可能已不是问题。\n\
  \n## 使用数据源和数据集\n\n创建数据源和数据集的目的就是在报告中使用它们。现在你将进行此操作。请按照以下步骤创建报告：\n\n1.  右键单击 `Reports`\
  \ 文件夹并选择 **添加** ➤ **新建项**，如图 3-12 所示。确保不要选择 **添加新报告**，因为这会启动向导。\n    ![A395630_1_En_3_Fig12_HTML.jpg](img/A395630_1_En_3_Fig12_HTML.jpg)\n\
  \    图 3-12. 添加新报告\n2.  在 **添加新项 – 数据源和数据集** 对话框中，选择 `报告`。\n3.  在报告名称属性中填入 `Sales\
  \ by Year`。对话框应如图 3-13 所示。\n    ![A395630_1_En_3_Fig13_HTML.jpg](img/A395630_1_En_3_Fig13_HTML.jpg)\n\
  \    图 3-13. 新报告属性\n4.  点击 **添加** 以创建新报告。\n\n报告现在应该在解决方案资源管理器中可见并在设计视图中打开。如果没有，请双击报告名称将其打开。下一个任务是设置报告内的数据源，使其指向共享数据源。\n\
  \n找到 `报表数据` 窗口，它可能位于左侧。如果不可见，请单击报告的设计画布，然后单击 **视图** 菜单底部的 **报表数据**。`报表数据` 窗口包含几个文件夹，如图\
  \ 3-14 所示。\n\n![A395630_1_En_3_Fig14_HTML.jpg](img/A395630_1_En_3_Fig14_HTML.jpg)\n\
  图 3-14. `报表数据` 窗口\n\n请按照以下步骤设置报告的数据源：\n\n1.  右键单击 `数据源` 文件夹并选择 **添加数据源**。\n2.  这将打开\
  \ `数据源属性` 对话框。在 `名称` 属性中填入 `AdventureWorks`。作为最佳实践，始终为每个数据源指定一个描述性名称。此数据源将链接到 `AdventureWorks2016`\
  \ 共享数据源。如果你愿意，可以给它完全相同的名称。在本例中，你将稍微更改名称，以便轻松区分共享数据源和报告中的数据源。\n3.  对话框中部允许你将此报告数据源创建为嵌入数据源，其连接属性仅对此报告可见。相反，请选择\
  \ **使用数据源引用**。在列表中找到 `AdventureWorks2016`。对话框应如图 3-15 所示。\n    ![A395630_1_En_3_Fig15_HTML.jpg](img/A395630_1_En_3_Fig15_HTML.jpg)\n\
  \    图 3-15. 报告数据源属性\n4.  点击 **确定** 创建数据源。\n\n图 3-15 所示对话框上的 **编辑** 按钮允许你在需要时修改共享数据源。请记住，以此方式进行的更改将影响所有使用此数据源的报告。你也可以创建一个新的共享数据源。作为最佳实践，并避免混淆，始终在项目级别创建和编辑共享数据源。\n\
  \n现在你应该在 `报表数据` 窗口的 `数据源` 文件夹中看到 `AdventureWorks` 数据源，如图 3-16 所示。图标上的小箭头表示它指向一个共享数据源。\n\
  \n![A395630_1_En_3_Fig16_HTML.jpg](img/A395630_1_En_3_Fig16_HTML.jpg)\n图 3-16. 新的数据源\n\
  \n创建报告的下一步是添加一个数据集。数据集是查询，是向数据库或其他数据源提出的问题。数据集通常特定于某个报告，因此共享大多数数据集没有意义。要为此报告创建第一个数据集，请遵循以下步骤：\n\
  \n1.  右键单击 `数据集` 文件夹并选择 **添加数据集**。这将打开 `数据集属性` 对话框。默认情况下，它设置为 **使用共享数据集**，如图 3-17\
  \ 所示。\n    ![A395630_1_En_3_Fig17_HTML.jpg](img/A395630_1_En_3_Fig17_HTML.jpg)\n\
  \    图 3-17.\n\n\n\n"
- "# “数据集属性”对话框\n\n2.  在 `Name` 属性中填写 `Sales`。\n3.  选择 `使用嵌入在我报表中的数据集`。操作后，对话框会发生变化。它不再显示共享数据集，而是显示嵌入数据集的属性。图\
  \ 3-18 显示了更改后对话框的外观。\n\n![A395630_1_En_3_Fig18_HTML.jpg](img/A395630_1_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18. 嵌入数据集的数据集属性\n\n4.  在 `数据源` 下的下拉框中找到 `AdventureWorks`。此列表中只显示已作为报表一部分设置好的数据源。\n\
  5.  如果尚未选择，请将 `查询` 类型选择为 `文本`。\n6.  在 `查询` 属性中输入以下代码：\n\n```sql\nSELECT SUM(TotalDue)\
  \ AS TotalSales, MONTH(OrderDate) AS OrderMonth, YEAR(OrderDate) AS OrderYear\n\
  FROM Sales.SalesOrderHeader\nGROUP BY MONTH(OrderDate), YEAR(OrderDate);\n```\n\n\
  7.  点击 `确定` 以创建数据集。\n\n现在，`Sales` 数据集应该在“报表数据”窗口中可见，如图 3-19 所示。除了数据集名称外，您还将看到可用的字段。\n\
  \n![A395630_1_En_3_Fig19_HTML.jpg](img/A395630_1_En_3_Fig19_HTML.jpg)\n\n图 3-19.\
  \ Sales 数据集\n\n现在，您可以在报表上显示来自该数据集的数据。请按照以下步骤设置一个简单的报表：\n\n1.  显示 `工具箱` 窗口。如果不可见，请单击报表设计画布，然后从\
  \ `视图` 菜单中选择 `工具箱`。工具箱如图 3-20 所示。\n\n![A395630_1_En_3_Fig20_HTML.jpg](img/A395630_1_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20. 工具箱\n\n2.  将一个 `表` 控件从 `工具箱` 拖到报表设计画布上。您也可以右键单击设计界面，然后选择 `插入` ➤ `表` 来添加表。图\
  \ 3-21 显示了报表上的表控件。\n\n![A395630_1_En_3_Fig21_HTML.jpg](img/A395630_1_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21. 表控件\n\n3.  填充表格有几种方式。从“报表数据”窗口中，将 `OrderYear` 字段拖到 `数据` 行最左边的单元格。`标题`\
  \ 行会自动填充。\n4.  将鼠标悬停在 `数据` 行中间的单元格上，直到单元格中出现一个小图标。单击该图标以显示可用字段列表。选择 `OrderMonth`。\n\
  5.  单击 `数据` 行右侧的单元格。输入以下代码：\n\n```text\n[TotalSales]\n```\n\n6.  在上方的标题行中，输入 `Total\
  \ Sales`。表格网格应如图 3-22 所示。\n\n![A395630_1_En_3_Fig22_HTML.jpg](img/A395630_1_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 已填充单元格的表格\n\n点击 `预览` 以查看报表。显然，此报表尚未准备好发布，但它确实演示了将报表连接到数据所需的步骤。\n\n## 使用共享数据集\n\
  \n共享数据集对于将在整个项目中重用的查询非常有用。SSRS 允许您创建报表，让运行报表的用户能够动态进行筛选。通常，相同的条件将用于多个报表，这是共享数据集的绝佳用途。请按照以下步骤添加共享数据集：\n\
  \n1.  切换回 `设计` 视图。\n2.  在“报表数据”窗口中，右键单击 `数据集` 并选择 `添加数据集`。\n3.  将数据集命名为 `Year`。\n\
  4.  确保选择了 `使用共享数据集`，并从窗口中选择 `Year`。数据集属性对话框应如图 3-23 所示。\n\n    ![A395630_1_En_3_Fig23_HTML.jpg](img/A395630_1_En_3_Fig23_HTML.jpg)\n\
  \    图 3-23. 使用共享数据集\n\n5.  点击 `确定` 以创建新数据集。\n\n下一步是修改 `Sales` 数据集，使其需要参数。双击 `Sales`\
  \ 数据集以打开其属性。您也可以右键单击并选择 `属性`。将 `查询` 更改为以下代码。现在，在运行报表时将需要提供年份：\n\n```sql\nSELECT\
  \ SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth, YEAR(OrderDate) AS\
  \ OrderYear\nFROM Sales.SalesOrderHeader\nWHERE YEAR(OrderDate) = @Year\nGROUP BY\
  \ MONTH(OrderDate), YEAR(OrderDate);\n```\n\n运行报表时，您现在需要先输入年份才能看到结果。预览报表。输入 `2011`\
  \ 并点击 `查看报表`。显示的总计将仅针对 `2011` 年，如图 3-24 所示。\n\n![A395630_1_En_3_Fig24_HTML.jpg](img/A395630_1_En_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 按年份筛选的结果\n\n报表已成功按年份筛选。用户必须已经知道哪些年份对报表有效。对于有效年份来说，这不是大问题，但对于部门或客户呢？为了提供有效的年份列表供用户选择，请按照以下步骤操作：\n\
  \n1.  切换回 `设计` 视图，并在“报表数据”窗口中展开 `参数` 文件夹。\n2.  当您更改查询以按 `@Year` 筛选时，`Year` 参数已自动添加。如图\
  \ 3-25 所示。\n\n    ![A395630_1_En_3_Fig25_HTML.jpg](img/A395630_1_En_3_Fig25_HTML.jpg)\n\
  \    图 3-25. Year 参数\n\n3.  右键单击 `Year` 并选择 `参数属性`，这将打开“报表参数属性”对话框。\n4.  在 `常规`\
  \ 页上，将 `数据类型` 更改为 `整数`。\n5.  切换到 `可用值` 页。\n6.  将 `从以下选项中选择` 更改为 `从查询中获取值`。\n7. \
  \ 将 `数据集` 属性更改为 `Year`。\n8.  将 `值字段` 更改为 `OrderYear`。\n9.  将 `标签字段` 更改为 `OrderYear`。对话框应如图\
  \ 3-26 所示。\n\n    ![A395630_1_En_3_Fig26_HTML.jpg](img/A395630_1_En_3_Fig26_HTML.jpg)\n\
  \    图 3-26. 参数属性\n\n10. 点击 `确定` 以接受这些属性。\n\n您将在第 6 章中了解更多关于参数的信息。现在，请预览报表。您将看到一个有效年份的下拉列表，如图\
  \ 3-27 所示。\n\n![A395630_1_En_3_Fig27_HTML.jpg](img/A395630_1_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27. 参数列表\n\n尝试为 `Year` 参数使用不同的值运行报表。报表数据应随所选年份的不同而改变。\n\n## 总结\n\n理解数据源和数据集对于报表开发至关重要。数据源是到数据库或其他数据源的连接字符串。数据集是查询。在一个项目中的报表之间共享数据源和数据集是可行的。作为最佳实践，请始终共享数据集。如果查询可以在多个报表中使用，例如用于常用参数，则应共享数据集。\n\
  \n当您向项目添加新报表时，请记住下一步是向报表添加数据源。然后是添加数据集。\n\n第 4 章将介绍如何使用表、文本框以及报表中常用的其他控件。\n\n\n\n"
- "# 4. 处理表格、控件和报表区域\n\n过去大约 15 年是真人秀电视节目的时代。但早在《改头换面：家庭版》和《美国偶像》之前，公共电视上就已经存在真人秀节目了。我记得小时候和青少年时期观看过关于烹饪、房屋改造和瑜伽的无剧本节目。我最喜欢的是关于艺术的节目。理论上，你可以通过观看艺术家将空白画布变成美丽的静物或风景画来学习如何创作杰作。\n\
  \n虽然报表可能不是艺术品，但它们有一些相似之处。你也将从一张空白的画布开始，虽然报表上的数据至关重要，但报表的外观也同样重要。\n\n在本章中，你将学习更多关于表格以及用于构建报表的其他几种常见控件的知识。你还将学习如何添加页眉和页脚，为报表增添功能，使其更专业并准备好发布。\n\
  \n## 处理表格\n\n一个报表由多个对象组成，其中一些对象与数据集链接。其他对象向查看者提供有关报表的信息，例如标题或页数。还有一些对象是为了赋予报表特定的外观和感觉，例如公司徽标。最常用的数据区域是表格控件。第\
  \ 2 章和第 3 章介绍了表格。你将表格与数据链接并修改了一些属性。在本节中，你将学习更多关于表格的知识。\n\n注意\n\n在第 3 章中，你学习了如何创建项目、数据源和数据集。你还学习了如何向项目添加报表。从本章开始，我将不再逐步告诉你如何创建这些对象，而只会告诉你需要创建什么。记住在向项目添加新报表时点击\
  \ `添加` ➤ `新建项`，以避免启动向导。如果遇到问题，请回顾第 3 章。\n\n请按照以下步骤开始：\n\n1.  启动 `SQL Server Data\
  \ Tools (SSDT)`。\n2.  创建一个新的报表服务器项目，名称为 `Building Reports`，解决方案名称为 `Beginning SSRS\
  \ Chapter 4`。\n3.  添加一个指向 `AdventureWorks2016` 数据库的新的共享数据源。将其命名为 `AdventureWorks2016`。\n\
  4.  创建一个名为 `Working with Tables` 的新报表。确保你添加的是空白报表；不要启动向导。如果需要帮助，请参阅第 3 章。解决方案资源管理器应如图\
  \ 4-1 所示。\n\n![A395630_1_En_4_Fig1_HTML.jpg](img/A395630_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 解决方案资源管理器\n\n注意\n\n`始终显示解决方案` 属性决定当解决方案中只有一个项目时，解决方案名称是否可见。要了解如何设置此选项，请参见第\
  \ 1 章中的“SSDT 导览”部分。\n\n5.  在“报表数据”窗口中，添加一个数据源 `AdventureWorks`，指向共享数据源 `AdventureWorks2016`。\n\
  6.  为报表创建一个新的嵌入数据集，名为 `SalesSummary`，指向 `AdventureWorks` 数据源。\n7.  为报表键入以下查询：\n\n\
  ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, SUM(TotalDue) AS TotalSales\n \
  \   FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate);\n```\n\n8.  数据集属性应如图\
  \ 4-2 所示。点击确定以创建数据集。\n\n![A395630_1_En_4_Fig2_HTML.jpg](img/A395630_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 数据集属性\n\n9.  创建第二个嵌入数据集，名为 `SalesDetails`，指向 `AdventureWorks` 数据源。\n10.\
  \ 将此查询添加到数据集并点击确定。\n\n```sql\n    SELECT CustomerID, SalesOrderID, OrderDate, TotalDue\n\
  \    FROM Sales.SalesOrderHeader;\n```\n\n“报表数据”窗口应如图 4-3 所示。\n\n![A395630_1_En_4_Fig3_HTML.jpg](img/A395630_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 报表数据窗口\n\n现在数据集已就位，你可以开始构建报表了。向设计图面添加一个新表格。你可以通过从工具箱拖入表格控件，或者右键单击图面并选择\
  \ `插入` ➤ `表格` 来实现。\n\n每个表格只能链接到一个数据集。在本例中，你有两个数据集。一旦添加了第一个字段，表格就会链接到该字段所属的数据集。将鼠标悬停在单元格上会显示一个小的字段列表图标。如果只有一个数据集，你将点击该图标以调出字段列表。在本例中，由于有两个数据集，请将鼠标悬停在数据源名称上以查看两个数据集，如图\
  \ 4-4 所示。点击数据集名称会显示字段列表。\n\n![A395630_1_En_4_Fig4_HTML.jpg](img/A395630_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4. 表格可用的两个数据集\n\n选择 `SalesSummary` 下的 `OrderYear`。现在，当你移动到下一个数据单元格时，只有 `SalesSummary`\
  \ 的字段可用。为中间的单元格选择 `TotalSales`。你在右侧有一列多余。右键单击最右侧列上方的控制柄，选择 `删除列` 将其移除。\n\n在第一个表格下方向报表添加第二个表格。当你在图面上拖动第二个表格时，会出现蓝色的对齐参考线，帮助你确保对象对齐。对于此表，从\
  \ `SalesDetails` 数据集将 `CustomerID`、`SalesOrderID` 和 `OrderDate` 字段添加到报表中。默认情况下，表格有三列，但你需要显示四个字段。你可以通过将字段拖到第三列的右侧来添加额外的列。当你看到出现一个蓝色括号时，放下该字段。图\
  \ 4-5 显示了其外观。\n\n![A395630_1_En_4_Fig5_HTML.jpg](img/A395630_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 将新字段拖到表格中\n\n你也可以右键单击第三列并在其右侧插入一列。\n\n每当字段被添加到数据单元格时，单元格的名称会更改为字段的名称。标题单元格也会填充一个值，并在大写字母前添加空格。如果需要，你始终可以编辑标题单元格。\n\
  \n\n### 属性窗口属性\n\n一个表格有数十个属性。你可以在“属性”窗口中设置其中一部分。选中第一个表格行句柄与列句柄的交叉点以选中表格。表格被选中后，按\
  \ `F4` 键打开“属性”窗口。你也可以从菜单中点击 `视图 ➤ 属性窗口`。在图 4-6 所示窗口的顶部，你会看到表格根本就不是被称为“表格”。它是一个 `Tablix`。\n\
  \n图 4-6.\n![A395630_1_En_4_Fig6_HTML.jpg](img/A395630_1_En_4_Fig6_HTML.jpg)\n\n\
  表格即 Tablix 备注\n\n一个数据区域，例如表格、矩阵或列表，实际上被称为 `Tablix`。每一种都有其特定的数据显示布局。你可以从一个表格开始，然后通过按列分组将其转换为矩阵。\n\
  \n“属性”窗口中的属性可以按属性类别或按字母顺序显示。点击“属性”窗口顶部的图 4-7 所示的图标可在两者间切换。还有一个类似于扳手的图标，用于打开“属性页”窗口。你将在下一节了解更多关于属性页的内容。\n\
  \n图 4-7.\n![A395630_1_En_4_Fig7_HTML.jpg](img/A395630_1_En_4_Fig7_HTML.jpg)\n\n\
  属性窗口图标\n\n由于本章将多次引用 `Tablix1`，请给它起一个有意义的名称：`tblSalesSummary`。为此，在“属性”窗口的“常规”类别中更改\
  \ `Name` 属性。\n\n在“常规”属性类别中找到 `DataSetName` 属性。请注意该属性已设置为 `SalesSummary`。\n\n当你点击每个属性时，你会在“属性”窗口底部看到该属性功能的描述。“属性”窗口中的大多数属性无需更改，但你所更改的任何属性都将影响整个表格。将\
  \ `边框样式(默认)` 属性更改为 `点线`，将 `边框宽度(默认)` 属性更改为 `3 pt`。“属性”窗口应如图 4-8 所示。\n\n图 4-8.\n\
  ![A395630_1_En_4_Fig8_HTML.jpg](img/A395630_1_En_4_Fig8_HTML.jpg)\n\n已修改的属性\n\n\
  预览报表。它应如图 4-9 所示。\n\n图 4-9.\n![A395630_1_En_4_Fig9_HTML.jpg](img/A395630_1_En_4_Fig9_HTML.jpg)\n\
  \n`tblSalesSummary` 带有虚线边框的报表\n\n### 属性对话框属性\n\n除了“属性”窗口，大多数报表对象还有一个属性对话框。两种方法之间可更改的属性有所重叠。一些更高级的属性，例如涉及与其他报表交互的属性，仅在属性对话框中可用。我个人的观点是，只要可能，在对话框中工作会容易得多。\n\
  \n备注\n\n添加到报表的每个对象都有一个名称。默认情况下，名称将是对象类型加一个数字。你可能想知道是否应该为每个对象都起一个描述性的名称。我的规则是为任何将在表达式或计算中引用的对象命名。\n\
  \n切换回设计视图并选中第二个 `Tablix`。当控点出现时，右键单击两个控点的交叉点。选择 `Tablix 属性`，如图 4-10 所示。\n\n图 4-10.\n\
  ![A395630_1_En_4_Fig10_HTML.jpg](img/A395630_1_En_4_Fig10_HTML.jpg)\n\n选择 `Tablix\
  \ 属性`\n\n`Tablix 属性` 对话框有多个页面。在图 4-11 所示的“常规”页面上，将 `名称` 更改为 `tblSalesDetails`。在\
  \ `工具提示` 属性中输入 `销售明细`。在 `分页符` 选项下，勾选 `在前面添加分页符`。\n\n图 4-11.\n![A395630_1_En_4_Fig11_HTML.jpg](img/A395630_1_En_4_Fig11_HTML.jpg)\n\
  \n`Tablix 属性` 的“常规”页面\n\n点击“确定”接受属性更改。预览报表。现在 `tblSalesDetails` 将出现在第二页。将鼠标悬停在报表上可查看工具提示。\n\
  \n再看一下图 4-11。“行标题”部分中用于控制标题的那些属性看起来很棒。然而，它们不起作用。如果你回到设计视图，选中这些属性并查看报表，你会发现它们没有任何区别。表格标题不会在每个页面上重复，并且在滚动时标题行也不可见。在第\
  \ 5 章中，你将学习如何控制行标题和列标题。\n\n图 4-12 显示了“可见性”属性页。你可以选择显示或隐藏表格，并根据表达式设置表格的可见性。参数的值可能是一个很好的表达式。\n\
  \n图 4-12.\n![A395630_1_En_4_Fig12_HTML.jpg](img/A395630_1_En_4_Fig12_HTML.jpg)\n\
  \n“可见性”属性\n\n理论上，你可以通过从下拉列表中选择一个项目来切换可见性。如果你勾选“显示可以由此报表项切换”并将该属性设置为列表中的任何项目，报表在运行时将显示错误，因此在关闭对话框前请确保取消勾选此项。发生错误的原因是列表中的所有项目都是表格的一部分，它们无法在报表运行前被点击。\n\
  \n“筛选器”页面允许你向数据集返回的数据添加筛选器。通常，这不是一个好主意，因为你应该在数据库层面进行筛选。然而，如果数据源不可筛选（例如来自 XML 文件），此功能很有用。几年前我确实遇到过一个用例。我需要在同一个报表的几个表格中使用同一个数据集，只是应用不同的筛选器。我没有使用不同的筛选器多次提取数据，而是使用了一个数据集，并在每个表格处进行筛选。\n\
  \n我发现调出 `Tablix 属性` 框最常见的原因是更改数据的显示顺序。“排序”页面如图 4-13 所示。点击“添加”并选择 `CustomerID`。再次点击“添加”并选择\
  \ `SalesOrderID`。保存属性并预览报表以查看数据现在已排序。\n\n图 4-13.\n![A395630_1_En_4_Fig13_HTML.jpg](img/A395630_1_En_4_Fig13_HTML.jpg)\n\
  \n“排序”页面\n\n## 其他报表组件\n\n你可以向报表中添加许多其他元素，以实现附加功能或使报表看起来更具吸引力和专业性。第 7 章涵盖了图表和指标等视觉元素，但本节我们将看看你可以添加的一些更基本的对象。\n\
  \n有许多理由向报表添加独立的 `文本框`（例如，报表标题和页码）。大多数此类对象应在每一页上显示。如果你只是在报表正文顶部添加一个 `文本框`，它只会显示一次。要使其显示在每一页上，需将信息包含在报表页眉中。\n\
  \n### 页面页眉\n\n与文本框和表格类似，页面页眉也具有可修改的属性，用于更改其外观或行为。例如，您可以添加背景色或图片。请按照以下步骤将页面页眉添加到报表中。\n\
  \n1.  右键单击报表画布，选择“插入” ➤ “页面页眉”。您也可以从“报表”菜单插入页面页眉。\n2.  右键单击页眉并选择“插入”。如图 4-14 所示，您可以添加的控件列表非常短。它仅限于无需连接到数据的控件。选择\
  \ `文本框`。\n    ![A395630_1_En_4_Fig14_HTML.jpg](img/A395630_1_En_4_Fig14_HTML.jpg)\n\
  \    图 4-14.\n    页眉的控件列表\n3.  在 `报表数据` 窗格中，展开 `内置字段`，将 `报表名称` 拖动到文本框。您也可以直接将字段拖到页眉以自动添加文本框。\n\
  4.  单击文本框的边缘，使其控制柄显示，如图 4-15 所示。\n    ![A395630_1_En_4_Fig15_HTML.jpg](img/A395630_1_En_4_Fig15_HTML.jpg)\n\
  \    图 4-15.\n    文本框上的控制柄\n5.  通过拖动控制柄，重新定位文本框，使其位于报表的左侧。\n6.  展开文本框，使其宽度与画布相同。\n\
  7.  选中文本框后，将文本居中。您可以通过单击菜单中的 `居中` 图标，或在 `文本框属性` 对话框的 `对齐` 页面上更改 `水平` 属性来实现。\n8.\
  \  将字体大小更改为 `16 pt`。同样，有多种方法可以做到这一点。选择您喜欢的方式：设计菜单、`属性` 窗格或属性对话框。文本框会自动垂直增长，但您也可以手动增加其高度。\n\
  9.  单击文本框，在占位符后添加此文本：`: 销售详情`\n10. 选中文字 `销售详情`。如果 `属性` 窗格已打开，您会看到当前所选对象的名称是 `Selected\
  \ Text`。\n11. 将文字 `销售详情` 设为斜体。文本框应如图 4-16 所示。\n    ![A395630_1_En_4_Fig16_HTML.jpg](img/A395630_1_En_4_Fig16_HTML.jpg)\n\
  \    图 4-16.\n    单个文本框中的多种格式\n12. 在报表页眉中、文本框下方添加一个线条控件。\n13. 通过上下拖动一端来调整线条，使其变为水平。\n\
  14. 通过拖动两端来增加线条的长度。\n15. 在 `属性` 窗格中将 `线条宽度` 更改为 `2pt`。`线条宽度` 属性表示线条的粗细。线条是最简单的对象。它们没有属性对话框。\n\
  16. 复制该线条并粘贴到页眉中。\n17. 移动第二条线，使其靠近第一条线并位于其下方。\n18. 右键单击报表页眉，选择 `页眉属性`。\n19. 在 `打印`\
  \ 选项部分，取消选中 `在首页打印`。\n20. 单击 `确定`。\n\n现在预览报表时，您将看到页眉从第 2 页开始显示，如图 4-17 所示。查看后续页面时，您将继续看到页面页眉。\n\
  ![A395630_1_En_4_Fig17_HTML.jpg](img/A395630_1_En_4_Fig17_HTML.jpg)\n图 4-17.\n报表的第\
  \ 2 页\n\n### 表格单元格格式化\n\n显然，您还可以做很多事情来使此报表看起来更好。首先，按照以下步骤更改 `OrderDate` 和 `TotalDue`\
  \ 字段的格式：\n\n1.  切换到设计视图。\n2.  右键单击 `OrderDate` 单元格，选择 `文本框属性`。\n3.  选择 `数字` 选项卡，在\
  \ `类别` 下选择 `日期`。\n4.  选择 `2000-01-31` 格式，然后单击 `确定`。\n5.  打开 `TotalDue` 单元格的 `文本框属性`。\n\
  6.  选择 `数字` 选项卡，在 `类别` 下选择 `货币`。\n7.  确保 `小数位数` 设置为 `2`。\n8.  勾选 `使用千位分隔符 (,)`，然后单击\
  \ `确定`。\n\n预览报表时，表格应如图 4-18 所示。\n![A395630_1_En_4_Fig18_HTML.jpg](img/A395630_1_En_4_Fig18_HTML.jpg)\n\
  图 4-18.\n格式化后的表格\n\n下一步是格式化标题行。幸运的是，您无需单独格式化每个单元格。请按照以下步骤格式化该行：\n\n1.  在设计视图中，单击\
  \ `tblSalesDetails` 的一个单元格。\n2.  此时会出现行和列的控制柄。选择标题行旁边的控制柄。\n3.  在 `属性` 窗格中，将 `背景色`\
  \ 更改为 `矢车菊蓝`。\n4.  将 `字体颜色` 属性更改为 `白色`。\n5.  将 `字体粗细` 属性更改为 `加粗`。\n6.  现在，单击 `销售订单\
  \ ID` 列。\n7.  通过逐个选中各列，然后在设计菜单中单击 `右对齐` 图标，将每列右对齐。\n8.  表格可能无法很好地对齐在报表页眉下方。请按照以下步骤调整报表。\n\
  9.  右键单击报表画布，选择 `视图` ➤ `标尺`。\n10. 拖动报表标题的右边缘，使其宽度为 `5 英寸（12.5 厘米）`。\n11. 选中两条线。按住\
  \ `CTRL` 键并按向右箭头键，直到线条排列在标题下方。\n12. 将报表画布的右边缘尽可能向左拖动，直到它碰到某个控件为止。\n\n为了使长报表更易于阅读，您可能希望交替显示行的背景色。不幸的是，没有可以直接更改的属性来实现这一点。但是，您可以使用表达式来控制\
  \ `背景色` 属性。选择数据行。在 `属性` 窗格中，将 `背景色` 更改为 `= IIf(RowNumber(Nothing) Mod 2 = 0, \"\
  浅蓝\", \"白色\")`。\n\n现在预览报表。报表的第 2 页应如图 4-19 所示。\n![A395630_1_En_4_Fig19_HTML.jpg](img/A395630_1_En_4_Fig19_HTML.jpg)\n\
  图 4-19.\n格式化后的销售报表\n\n使用表达式控制几乎任何属性的值是 SQL Server Reporting Services (SSRS) 的一个强大功能。要确定某个属性是否可以用表达式控制，请在属性列表或页面中查找\
  \ `表达式` 一词或 `fx` 符号。\n\n### 页面页脚\n\n页面页脚对于显示页码和查看报表的日期等信息也相当有用。要添加页面页脚，请按照以下步骤操作：\n\
  \n1.  切换到设计视图。\n2.  右键单击报表正文，选择 `插入` ➤ `页面页脚`。\n3.  右键单击页脚，选择 `页脚属性`。\n4.  在 `打印`\
  \ 选项部分，取消选中 `在首页打印` 属性。\n5.  单击 `确定` 接受更改。\n6.  从 `报表数据` 窗格的 `内置字段` 文件夹中，将 `执行时间`\
  \ 拖动到页脚。\n7.  增加该字段的宽度，使其约为原始宽度的两倍。\n8.  在页脚中添加一个文本框。确保它在水平方向上与执行时间文本框对齐。\n9.  在文本框中输入此表达式：`第\
  \ [&PageNumber] 页/共 [&TotalPages] 页`。您也可以打开 `表达式` 对话框来帮助您编写。\n\n    **注意**\n   \
  \ 通过添加 `总页数` 属性，报表必须在将第一页返回给用户之前完全构建完成。如果报表非常大，这可能会给人一种性能问题的印象。\n\n10. 将文本框的宽度加倍。\n\
  11. 在页脚顶部添加一条线。\n12. 将线条调平，并将其两端拖动至报表宽度。\n\n运行报表时，第二页的报表页脚应如图 4-20 所示。\n![A395630_1_En_4_Fig20_HTML.jpg](img/A395630_1_En_4_Fig20_HTML.jpg)\n\
  图 4-20.\n报表页脚\n\n\n### 报告封面页\n\n报告的第一页可以作为封面页。你无法向设计画布添加单独的页面，但可以在表格或其他一些对象之前或之后添加分页符。在此例中，你已为\
  \ `tblSalesDetails` 表开启了分页前分页，并为第一页关闭了页眉和页脚。在此例中，你将添加一个矩形控件作为其他控件的容器。你将设置该矩形的 `PageBreak`\
  \ 属性以强制分页。\n\n要创建封面页，请按照以下步骤操作：\n\n1.  在设计视图中，向下拖动页脚顶部以将报表体的大小增加到 7 英寸（18 厘米）。图\
  \ 4-21 显示了页脚顶部（虚线）。\n\n    ![A395630_1_En_4_Fig21_HTML.jpg](img/A395630_1_En_4_Fig21_HTML.jpg)\n\
  \n    图 4-21.\n    报表页脚\n2.  向下拖动 `tblSalesSummary` 表，使其刚好位于页脚上方。\n3.  删除 `tblSalesSummary`\
  \ 表。\n4.  向报表添加一个矩形控件。\n5.  展开矩形，使其顶部紧接页眉下方，底部紧接 `tblSalesDetail` 表上方，且边缘与报表画布同宽。\n\
  6.  右键单击矩形内部并选择“矩形属性”。将边框属性更改为如图 4-22 所示。\n\n    ![A395630_1_En_4_Fig22_HTML.jpg](img/A395630_1_En_4_Fig22_HTML.jpg)\n\
  \n    图 4-22.\n    矩形边框属性\n7.  在“常规”页面上，勾选“之后添加分页符”。确保“尽可能将内容保持在单个页面上”被勾选。单击“确定”保存属性。\n\
  8.  调出 `tblSalesDetails` 表的“Tablix 属性”，取消勾选“之前添加分页符”属性，然后单击“确定”。\n9.  向矩形添加一个文本框并输入\
  \ `Sales Report`。\n10. 将字体大小更改为 `20 pt`。\n11. 将文本框定位在顶部附近并居中，然后适当调整其大小。\n12. 向矩形添加一个表格。\n\
  13. 从 `SalesSummary` 数据集填充 `OrderYear` 和 `TotalSales`。\n14. 删除最右边的列。\n15. 选择标题行并将字体加粗。\n\
  16. 将 `TotalSales` 单元格格式设置为货币格式，无小数位，带千位分隔符。\n17. 将每列右对齐。\n18. 更改表格，使其按 `OrderYear`\
  \ 排序。\n19. 向矩形顶部添加一个图像控件。\n20. 将出现“图像属性”对话框。单击“导入”并导航到本章代码所在位置的 `AdventureWorks.jpg`\
  \ 文件。\n21. 单击“确定”保存属性。调整图像大小。\n\n这个封面页相当简单。它有一个蓝色边框、一个标题和数据摘要。对于你的报表任务，你可以添加背景颜色或图形以及更多信息。图\
  \ 4-23 显示了封面页的顶部。\n\n![A395630_1_En_4_Fig23_HTML.jpg](img/A395630_1_En_4_Fig23_HTML.jpg)\n\
  \n图 4-23.\n封面页\n\n页面页脚将详细信息的第一页显示为第 2 页。由于你有一个封面页，你可能希望该页显示为第 1 页。要解决此问题，请按照以下步骤操作：\n\
  \n1.  切换回设计视图。\n2.  删除 `pages` 文本框。\n3.  在页面页脚中添加一个新的文本框。\n4.  右键单击新的文本框并选择“表达式”。\n\
  5.  输入此表达式：\n\n    ```\n    =\"Page \" & Globals!PageNumber -1 & \" of \" & Globals!TotalPages\
  \ -1\n    ```\n\n6.  单击“确定”。\n\n### 包含数据的文本框\n\n你已经看到数据区域是由文本框构成的。你也看到了包含非连接信息的文本框，例如文本框中的报表名称。可以从一个数据集中填充独立的文本框。该文本框无法显示详细数据；它必须显示摘要值。要查看此操作，请将\
  \ `TotalSales` 字段从 `SalesSummary` 数据集拖到报表画布上。查看如图 4-24 所示的表达式属性。你可以通过右键单击文本框并选择“表达式”来找到它。\n\
  \n![A395630_1_En_4_Fig24_HTML.jpg](img/A395630_1_En_4_Fig24_HTML.jpg)\n\n图 4-24.\n\
  文本框表达式属性\n\n该值已使用 `Sum` 函数自动汇总。第二个参数 `SalesSummary` 是数据集上下文。\n\n### 计算字段\n\n报表通常需要计算字段，例如销售利润率。有许多方法可以实现这一点。如果数据源自数据库系统，通常可以将计算添加到查询本身。如果不可行（例如，数据源不支持或报表开发人员无法修改查询），则可以在单元格内创建计算。但是，如果该单元格的结果需要在另一个单元格的表达式中使用，则会出现问题。你无法将包含表达式的单元格嵌套在另一个表达式中。\n\
  \n如果计算需要在多个表达式中使用，你可以向数据集添加计算字段。要了解如何添加计算字段，请按照以下步骤操作：\n\n1.  在“解决方案资源管理器”中，添加一个名为\
  \ `Calculated Field` 的新报表。\n2.  向报表添加一个名为 `AdventureWorks` 的数据源，指向 `AdventureWorks2016`\
  \ 共享数据源。如果需要帮助，请回顾第 3 章。\n3.  添加一个名为 `Sales` 的新数据集，指向 `AdventureWorks` 数据源，并使用此嵌入查询：\n\
  \n    ```\n    SELECT TOP(1000) SOD.SalesOrderID, SOH.OrderDate,\n    SOD.OrderQty,\
  \ SOD.UnitPrice,\n    P.StandardCost\n    FROM Sales.SalesOrderHeader AS SOH\n \
  \   JOIN Sales.SalesOrderDetail AS SOD\n    ON SOH.SalesOrderID = SOD.SalesOrderID\n\
  \    JOIN Production.Product AS P ON P.ProductID = SOD.ProductID;\n    ```\n\n4.\
  \  保存数据集后，右键单击并选择“添加计算字段”，这将打开“数据集属性”对话框的“字段”页面。\n5.  图 4-25 所示的对话框显示了现有字段，底部有一个空白行。\n\
  \n    ![A395630_1_En_4_Fig25_HTML.jpg](img/A395630_1_En_4_Fig25_HTML.jpg)\n\n  \
  \  图 4-25.\n    字段页面\n6.  在第一个新“字段名称”中输入 `ExtendedCost`。\n7.  单击 `fx` 图标以调出表达式窗口。\n\
  8.  在“类别”列表中，选择“字段 (Sales)”。\n9.  在“值”列表中，双击 `OrderQty` 字段。\n10. 在字段名称后添加乘号 (`*`)。\n\
  11. 双击 `StandardCost` 字段。最终表达式为：\n\n    ```\n    =Fields!OrderQty.Value * Fields!StandardCost.Value\n\
  \    ```\n\n12. 单击“确定”接受表达式。\n13. 单击“添加 ➤ 计算字段”创建另一个名为 `ExtendedPrice` 的表达式。此表达式为：\n\
  \n    ```\n    =Fields!OrderQty.Value * Fields!UnitPrice.Value\n    ```\n\n14. 单击“确定”保存表达式。\n\
  15. 单击“确定”保存新字段。你将在 `Sales` 数据集字段列表中看到新字段，如图 4-26 所示。\n\n    ![A395630_1_En_4_Fig26_HTML.jpg](img/A395630_1_En_4_Fig26_HTML.jpg)\n\
  \n    图 4-26.\n    新计算字段\n16. 向报表画布添加一个表格控件。\n17. 将以下字段添加到表格：`SalesOrderID`, `OrderDate`,\
  \ `OrderQty`, `StandardCost`, `ExtendedCost`, `UnitPrice`, `ExtendedPrice`。\n18.\
  \ 向表格添加一个新列。\n19. 右键单击新的数据单元格并选择“表达式”。\n20. 输入此表达式：\n\n    ```\n    =Fields!ExtendedPrice.Value\
  \ - Fields!ExtendedCost.Value\n    ```\n\n21. 在标题单元格中输入 `Margin`。\n\n当你预览报表时，你会看到计算字段按预期工作。\n\
  \n\n### 列表控件\n\n列表控件的工作方式与表格类似，但它不是使用单元格，而是为每一行数据重复一个自由格式的布局区域。在本节中，你将创建一个使用列表控件的新报告。请按照以下步骤创建报告。\n\
  \n1.  在项目中添加一个名为 `List Report` 的新报告。\n2.  向报告中添加一个名为 `AdventureWorks` 的新数据源，该数据源链接到\
  \ `AdventureWorks2016` 共享数据源。如果此步骤需要帮助，请回顾第 3 章。\n3.  创建一个名为 `ProductList` 的新数据集，指向\
  \ `AdventureWorks` 数据源，并使用以下嵌入式查询：\n\n    ```sql\n    SELECT P.ProductID, P.Name,\
  \ PH.LargePhoto\n    FROM Production.Product AS P\n    JOIN Production.ProductProductPhoto\
  \ AS PP ON P.ProductID = PP.ProductID\n    JOIN Production.ProductPhoto AS PH ON\
  \ PP.ProductPhotoID = PH.ProductPhotoID\n    JOIN Production.ProductSubcategory\
  \ AS SC ON SC.ProductSubcategoryID = P.ProductSubcategoryID\n    JOIN Production.ProductCategory\
  \ AS C ON C.ProductCategoryID = SC.ProductCategoryID\n    WHERE PP.[Primary] = 1\
  \ AND C.ProductCategoryID IN (1,4);\n    ```\n\n4.  在报告画布上添加一个 `列表` 控件。\n5.  从 `ProductList`\
  \ 数据集中，将 `ProductID` 和 `Name` 拖放到列表中。系统会自动创建文本框来容纳这些字段。\n6.  将列表的宽度加倍。\n7.  将列表的\
  \ `BorderStyle Default` 属性更改为 `Solid`。\n8.  从工具箱中，将一个 `图像` 控件拖放到列表中。\n9.  这将打开 `图像属性`\
  \ 对话框。按照图 4-27 所示设置属性。\n\n    ![A395630_1_En_4_Fig27_HTML.jpg](img/A395630_1_En_4_Fig27_HTML.jpg)\n\
  \    *图 4-27. 图像属性框*\n\n10. 点击 `确定` 接受属性设置。\n11. 调整 `图像` 控件的大小以扩展。\n\n现在，当你预览报告时（如图\
  \ 4-28 所示），你将看到数据库中为每个产品存储的图像。有些产品的图像只显示“无可用图像”。这不是 SSRS 在图像缺失时的功能；它是一张真实的图片。\n\n\
  ![A395630_1_En_4_Fig28_HTML.jpg](img/A395630_1_En_4_Fig28_HTML.jpg)\n*图 4-28. 列表报告*\n\
  \n## 设置报告属性\n\n在第 2 章中，我向你介绍了打印报告时可能遇到的问题。在某些情况下，报告打印出来会每隔一页是空白页。在本节中，你将看到如何解决这个问题。请按照以下步骤创建一个因过宽而无法打印的报告：\n\
  \n1.  在任何报告的设计视图中，通过右键单击报告画布并选择 `视图` ➤ `标尺` 来启用标尺。\n2.  拖动报告的右侧，使报告宽度大约为 9 英寸（22.5\
  \ 厘米）。\n3.  预览报告。\n4.  切换到打印布局视图。\n5.  逐页滚动浏览报告。\n\n因为报告宽度超过了默认纸张尺寸，所以它会在每个已填充页面之后打印一个空白页。如果控件放置在画布右侧过远的位置，你还会看到报告被分割到多个页面上。要解决此问题，你需要确保报告宽度不超过打印所用的纸张尺寸。\n\
  \n通常，在开发人员处理报告时，添加和删除对象可能会导致画布在不被注意的情况下扩展。第一步是拖动报告右侧以移除任何空白区域。\n\n以下是你可以用来解决报告打印问题的几种方法：\n\
  \n*   将纸张方向从纵向更改为横向。\n*   修改页边距。\n*   更改纸张尺寸。确保这与你用于打印报告的纸张相匹配。\n*   调整列宽。\n\n图\
  \ 4-29 显示了 `报告属性` 对话框。它可以在 `报告` 菜单中找到。\n\n![A395630_1_En_4_Fig29_HTML.jpg](img/A395630_1_En_4_Fig29_HTML.jpg)\n\
  *图 4-29. 报告属性对话框*\n\n根据经验法则，报告宽度加上左右边距不应超过纸张宽度。\n\n## 总结\n\n在本章中，你学习了如何从空白画布创建报告。你可以向报告添加许多组件，包括页眉和页脚。几乎所有属性的值都可以通过表达式控制，并且你可以向数据集添加计算字段。始终确保报告能适应打印页面非常重要，本章介绍了如何调整报告属性来实现这一点。\n\
  \n在第 5 章中，你将学习如何向报告添加分组级别。\n\n"
- "# 5. 向报告添加分组级别\n\n我六岁生日时举办了一个生日派对。我记得我要求了一个巧克力蛋糕配巧克力糖霜、巧克力冰淇淋和巧克力牛奶。我还想要我的蛋糕是多层的婚礼蛋糕。直到多年后我真正的婚礼招待会上，我才得到婚礼蛋糕，而且我确信我妈妈为我六岁生日烤的蛋糕是一个单层的巧克力烤盘蛋糕。\n\
  \n你在第 3 和 4 章中创建的报告，每个表格只显示了一个层级，很像我生日派对上的那个简单蛋糕。在本章中，你将学习如何创建包含多个分组级别的报告，包括矩阵报告。\n\
  \n## 设计你的报告\n\n任何项目，无论大小，最重要的阶段都是设计。在开始构建解决方案之前，你必须知道要尝试完成什么。SQL Server Reporting\
  \ Services (SSRS) 报告本身是一个相对较小的项目，但在启动 SQL Server Data Tools (SSDT) 之前，理解需求并提出设计方案将为你节省时间和减少挫折感。\n\
  \n根据你公司或部门对文档的要求，你最终可能只使用白板或纸张来勾勒设计。对于需要多个分组级别、计算或任何高级功能的报告，花些时间弄清楚报告应该是什么样子。如果你幸运的话，提出报告需求的人会随需求一起提供一个设计布局。\n\
  \n你的公司可能有一个非常正式的新报告请求程序，需求明确。或者，也许一个报告请求可能只是通过一个电话提出。在本章中，你将经历基于一个简单请求构建报告的过程。\n\
  \n### 报告需求\n\n你收到了销售部门经理的报告请求：\n\n“我们需要一个显示按区域和年份的销售情况的报告。”\n\n此时，你可以开始构建报告，但也许你应该在启动\
  \ `SSDT` 之前问一些问题。\n\n我如何确定区域？报告上需要显示哪些字段？你需要看到小计或其他计算吗？报告应该先按区域分组再按年份分组，还是反过来？报告上需要显示的最低详细级别是什么？\n\
  \n在与经理会面时，你了解到以下信息：\n\n*   查询将会被提供。\n*   首先按年份分组，然后在年份内按区域分组。\n*   对于每一年，显示总销售额和跨区域的平均销售额。\n\
  *   对于每个区域，显示区域名称、ID 和总销售额。\n*   作为最低详细信息，显示商店名称、客户 ID 和总销售额。\n*   按总销售额降序对详细信息排序。\n\
  *   按降序对年份排序。\n*   按字母顺序对区域排序。\n\n你现在有了更具体的需求，这些需求可能完整也可能不完整。根据我的经验，提出报告需求的人通常在看到实际的报告后，会对报告上应该包含什么以及如何组织有更好的想法。\n\
  \n\n### 报表布局\n\n现在你有了更多细节，可以在白板或纸上开始勾画报表布局了。你设计出了如图 5-1 所示的布局。\n\n![A395630_1_En_5_Fig1_HTML.jpg](img/A395630_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 报表布局\n\n销售经理批准了该布局，你就可以开始构建实际的报表了。\n\n## 构建具有分组级别的报表\n\n这个报表将有三个级别，但它仍然是一个相对简单的报表。你在本章学到的技能将很容易应用于更复杂的报表。\n\
  \n**注意**\n\n第 3 章涵盖了数据源和数据集的使用。第 4 章涵盖了添加控件以及如何修改属性。如果你需要这些主题的逐步指导，请参考这些章节。\n\n\
  请按照以下步骤开始：\n\n1.  使用 `SSDT`，在一个名为 `Beginning SSRS Chapter` 5 的解决方案中创建一个名为 `Grouping\
  \ Level Reports` 的新报表项目。\n2.  创建一个指向 `AdventureWorks2016` 的共享数据源，也命名为 `AdventureWorks2016`。\n\
  3.  向项目中添加一个名为 `Sales by Territory` 的新报表。\n4.  向报表中添加一个名为 `AdventureWorks` 的数据源。该数据源应指向\
  \ `AdventureWorks2016` 共享数据源。\n5.  向报表中添加一个名为 `SalesByTerritory` 的嵌入数据集，该数据集使用 `AdventureWorks`\
  \ 数据源。使用此查询：\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\
  \ SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
  \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
  \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
  \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    GROUP BY C.CustomerID,\
  \ T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\n6.  向报表设计画布中添加一个表格。\n\
  7.  将 `CustomerID`、`Store` 和 `Sales` 字段添加到 `Data` 行。\n\n报表设计应如图 5-2 所示。\n\n![A395630_1_En_5_Fig2_HTML.jpg](img/A395630_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2. 报表设计\n\n### 向表行添加分组级别\n\n到目前为止，详细信息行已经就位。详细信息行将嵌套在基于 `TerritoryID` 的分组级别中。有两种方法可以添加分组级别，你将学习这两种方法。请按照以下步骤向表格添加分组级别：\n\
  \n1.  `右键单击` 数据行中的任意单元格。\n2.  选择 `添加组` ➤ `行组` ➤ `父组`，如图 5-3 所示。\n\n    ![A395630_1_En_5_Fig3_HTML.jpg](img/A395630_1_En_5_Fig3_HTML.jpg)\n\
  \n    图 5-3. 添加父组\n3.  这将打开 `Tablix 组` 对话框。在 `分组依据` 下拉框中选择 `TerritoryID`。\n4.  选择\
  \ `添加组头`。\n5.  对话框应如图 5-4 所示。\n\n    ![A395630_1_En_5_Fig4_HTML.jpg](img/A395630_1_En_5_Fig4_HTML.jpg)\n\
  \n    图 5-4. Tablix 组属性\n6.  `单击` `确定`。图 5-5 显示了添加了第一个分组级别的表格。\n\n    ![A395630_1_En_5_Fig5_HTML.jpg](img/A395630_1_En_5_Fig5_HTML.jpg)\n\
  \n    图 5-5. 添加到表格的第一个组\n\n在此图中，选中了 `Sales` 数据单元格。注意，`CustomerID` 单元格左侧可见一个橙色括号。这表示所选单元格的分组级别。在此情况下，它是详细信息级别。`单击`\
  \ 其中一个空白单元格。现在可以在 `TerritoryID` 单元格上找到括号，如图 5-6 所示。\n\n![A395630_1_En_5_Fig6_HTML.jpg](img/A395630_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6. 括号位于 TerritoryID 上\n\n这意味着中间行的单元格属于 `TerritoryID` 组。将 `Sales` 字段添加到右侧的空白单元格。因为这是详细信息之外的一个分组级别，该字段会自动求和，如图\
  \ 5-7 所示。\n\n![A395630_1_En_5_Fig7_HTML.jpg](img/A395630_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7. 销售额被自动求和\n\n在 `CustomerID` 列中，将 `Territory` 字段添加到空白单元格。占位符没有显示它，但它是该组中找到的第一个值。由于每个\
  \ `TerritoryID` 对应一个 `Territory`，此表达式将有效。`预览` 报表；此时它应如图 5-8 所示。\n\n![A395630_1_En_5_Fig8_HTML.jpg](img/A395630_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8. 报表预览\n\n### 向分组窗口添加分组级别\n\n报表底部的分组窗口提供了另一种添加和配置分组级别的方法。右侧的 `列组` 用于矩阵报表。你将在本章后面的“构建矩阵报表”一节中学习矩阵报表。\n\
  \n此时，切换回设计视图后，你应该在窗口中看到 `TerritoryID` 行组。要添加下一个分组级别，请按照以下步骤操作：\n\n1.  如果报表画布下方没有显示\
  \ `分组` 窗口，`右键单击` 报表并选择 `视图` ➤ `分组`。\n2.  在 `行组` 窗口中，`单击` `TerritoryID` 旁边的向下箭头。\n\
  3.  选择 `添加组` ➤ `父组`，如图 5-9 所示。\n\n    ![A395630_1_En_5_Fig9_HTML.jpg](img/A395630_1_En_5_Fig9_HTML.jpg)\n\
  \n    图 5-9. 添加父组\n4.  在 `Tablix 组` 对话框中，为 `分组依据` 属性选择 `OrderYear`。\n5.  `勾选` `添加组头`。\n\
  6.  `单击` `确定`。`行组` 部分现在将如图 5-10 所示。\n\n    ![A395630_1_En_5_Fig10_HTML.jpg](img/A395630_1_En_5_Fig10_HTML.jpg)\n\
  \n    图 5-10. 行组\n7.  在 `Sales` 列的空白单元格中，添加 `Sales`。这将是年度总计。\n8.  在 `Store` 列第二行的空白单元格中，创建一个表达式，公式如下：`=Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)`。这将给出各区域的平均销售额，换句话说，是总和的平均值。\n\
  \n报表设计应如图 5-11 所示。\n\n![A395630_1_En_5_Fig11_HTML.jpg](img/A395630_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11. 报表设计\n\n当你 `预览` 报表时，你会发现还需要做一些清理工作。此时报表如图 5-12 所示。\n\n![A395630_1_En_5_Fig12_HTML.jpg](img/A395630_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12. 预览模式下的报表\n\n\n\n"
- '# 格式化报告


  请按以下步骤开始格式化报告：


  1.  切换到设计视图。

  2.  将引用了 `Sales` 字段的四个单元格格式化为带千位分隔符、不带小数点的货币格式。请记住，格式化一个单元格后，你可以选择其他三个单元格并一次性粘贴该格式。

  3.  减小 `Order Year` 和 `Territory ID` 列的宽度。

  4.  增加 `Store` 列的宽度。


  该报告采用的是为报告添加分组级别时的默认分组布局，但你始终可以重新排列它。现在，你将添加两行新行来修改布局。请按以下步骤操作：


  1.  右键单击 `TerritoryID` 单元格，选择 插入行 ➤ 组内 ➤ 上方。这会为 `TerritoryID` 组添加一个新行。

  2.  再次右键单击 `TerritoryID` 单元格，选择 插入行 ➤ 组外 ➤ 上方。这会为 `OrderYear` 组添加一个新行。表格布局应如图 5-13
  所示。


  ![A395630_1_En_5_Fig13_HTML.jpg](img/A395630_1_En_5_Fig13_HTML.jpg)

  *图 5-13. 添加了两行新行的报告布局*


  3.  在第 2 列，将 `Territory ID` 标题移动到 `TerritoryID` 上方的单元格。

  4.  在第 3 列，将 `Territory` 数据字段向上移动一行。

  5.  将 `Customer ID` 标题移动到 `CustomerID` 数据单元格上方。

  6.  在 `Territory` 数据单元格上方键入 `Name`。此时，布局应如图 5-14 所示。


  ![A395630_1_En_5_Fig14_HTML.jpg](img/A395630_1_En_5_Fig14_HTML.jpg)

  *图 5-14. 重新排列单元格后的报告预览*


  7.  在第 4 列，将 `Store` 标题移动到 `Store` 数据单元格上方的单元格。

  8.  在顶部行，平均销售额表达式的上方，键入 `Average Sales`。此时，布局应如图 5-15 所示。


  ![A395630_1_En_5_Fig15_HTML.jpg](img/A395630_1_En_5_Fig15_HTML.jpg)

  *图 5-15. 重新排列第 4 列后的布局*


  9.  在第 5 列，将第 1 行的标题更改为 `Total Sales`。

  10. 在第 3 行（区域标题行），键入 `Total Sales`。

  11. 在第 4 行，添加将自动求和的 `Sales` 字段。

  12. 将单元格格式化为不带小数、带千位分隔符的货币格式。

  13. 在第 5 行（明细标题行），将 `Sales` 字段更改为文本 `Total Sales`。布局应如图 5-16 所示。


  ![A395630_1_En_5_Fig16_HTML.jpg](img/A395630_1_En_5_Fig16_HTML.jpg)

  *图 5-16. 重新排列第 5 列后的布局*


  14. 选择 `Average Sales` 列。将对齐方式设置为 `右对齐`。

  15. 选择 `Total Sales` 列。将对齐方式设置为 `右对齐`。

  16. 预览报告。它应如图 5-17 所示。


  ![A395630_1_En_5_Fig17_HTML.jpg](img/A395630_1_En_5_Fig17_HTML.jpg)

  *图 5-17. 预览模式下的格式化报告*


  你可以使用颜色和其他格式方面来突出显示分组级别。请按以下步骤格式化分组：


  1.  切换回设计视图。

  2.  选择顶部行并查看属性窗口。将 `FontSize`（字体大小）更改为 `12 pt`，将 `BackgroundColor`（背景色）更改为 `CornflowerBlue`（矢车菊蓝），并将“字体”部分中的
  `Color`（颜色）属性更改为 `White`（白色）。

  3.  对第二行重复此格式设置。

  4.  选择第三行。将 `BackgroundColor` 更改为 `LightBlue`（浅蓝色），并将 `FontWeight`（字体粗细）更改为 `Bold`（加粗）。

  5.  对第四行重复此格式设置。

  6.  选择第五行。将字体加粗。


  现在当你预览报告时，它看起来如图 5-18。


  ![A395630_1_En_5_Fig18_HTML.jpg](img/A395630_1_En_5_Fig18_HTML.jpg)

  *图 5-18. 带格式设置的报告预览*


  当你滚动浏览报告时，你会看到标题在后续页面上消失了。要使标题在每一页上重复，请按以下步骤操作：


  1.  切换回设计视图。

  2.  单击“列组”窗口右侧的下拉箭头，选择 `高级模式`，如图 5-19 所示。


  ![A395630_1_En_5_Fig19_HTML.jpg](img/A395630_1_En_5_Fig19_HTML.jpg)

  *图 5-19. 选择高级模式*


  3.  选择 `高级模式` 后，“行组”和“列组”将展开。你将看到静态节，如图 5-20 所示。


  ![A395630_1_En_5_Fig20_HTML.jpg](img/A395630_1_En_5_Fig20_HTML.jpg)

  *图 5-20. 展开的分组窗口*


  4.  使用属性窗口，为“行组”下找到的每个静态区域将 `RepeatOnNewPage`（在新页上重复）值更改为 `True`（真）。


  现在当你预览报告时，标题将在每一页上重复。


