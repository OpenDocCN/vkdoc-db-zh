- "# 对分组进行排序\n\n还有一个要求尚未解决，即排序。明细必须按销售总额降序排列。报告还必须按年份降序排列。请按以下步骤根据要求修改排序顺序。\n\n1.\
  \  在“行组”窗口中，右键单击“明细”组并选择“组属性”。\n2.  在“组属性”对话框中，选择“排序”选项卡。\n3.  单击“添加”。\n4.  在“排序依据”属性中选择\
  \ `Sales`。\n5.  在“顺序”属性中选择 `Z 到 A`。“组属性”对话框应如图 5-21 所示。\n\n    ![A395630_1_En_5_Fig21_HTML.jpg](img/A395630_1_En_5_Fig21_HTML.jpg)\n\
  \    *图 5-21. 排序属性对话框*\n\n6.  单击“确定”接受属性设置。\n7.  修改 `OrderYear` 组属性，使报告按 `OrderYear`\
  \ 降序排序。组会自动按分组字段排序。\n8.  右键单击 `TerritoryID` 组并调出“组属性”。\n9.  选择“排序”选项卡。将现有的排序顺序从\
  \ `TerritoryID` 字段更改为 `Territory` 字段。完成后单击“确定”。\n\n"
- "# 完成报告\n\n报告已基本准备好向经理展示。请按以下步骤完成报告：\n\n1.  切换到设计视图。\n2.  将表格拖动到报告的顶部和左侧。\n3.  拖动报告画布的底部和右侧边缘。\n\
  4.  在“报告”菜单中，单击“添加页面页眉”和“添加页面页脚”。\n5.  在页面页眉中添加一个文本框。键入 `Territory Sales`。\n6. \
  \ 将文本框扩展到画布的宽度。\n7.  居中文本。\n8.  将字体大小增加到 `18 pt`。\n9.  从“报告数据”窗口的“内置字段”中，将 `Execution\
  \ Time`（执行时间）拖到报告页脚。\n10. 将文本框的宽度加倍。\n11. 在页脚添加另一个文本框。\n12. 将此表达式添加到文本框中：\n\n  \
  \  ```\n    =\"第 \" & Globals!PageNumber & \" 页，共 \" & Globals!TotalPages & \" 页\"\
  \n    ```\n\n13. 从“报告”菜单启动“报告属性”对话框。\n14. 将 `上` 和 `下` 页边距更改为 `0.25 in` 或 `0.635\
  \ cm`。\n15. 查看报告。调整任何合理的设置。\n\n现在，你已准备好将报告展示给经理以获取反馈。\n\n\n\n## 使用备用布局构建报表\n\n查看报表后，经理确认数字正确，但希望采用不同的布局。备用布局类似于您在第\
  \ 2 章中使用向导创建的报表，如图 5-22 所示。\n\n![A395630_1_En_5_Fig22_HTML.jpg](img/A395630_1_En_5_Fig22_HTML.jpg)\n\
  \n图 5-22.\n备用报表布局\n\n要创建具有此布局的报表，请按照以下步骤操作：\n\n1.  向项目中添加一个新报表，命名为“按区域的销售额 2”。\n\
  2.  向报表添加一个名为 AdventureWorks 的数据源，指向 AdventureWorks2016 共享数据源。\n3.  向报表添加一个名为 SalesByTerritory\
  \ 的嵌入数据集，指向 AdventureWorks 数据源，使用以下查询：\n    ```\n    SELECT YEAR(OrderDate) AS OrderYear,\
  \ C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory,\
  \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
  \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
  \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
  \    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n\
  \    ```\n4.  向报表画布添加一个表。\n5.  将 CustomerID、Store 和 Sales 添加到数据行。\n6.  向 CustomerID\
  \ 添加一个父行组。\n7.  在 Tablix 组对话框中，在“分组依据”属性中填写 TerritoryID。\n8.  选中“添加组标题”。单击“确定”接受属性。\n\
  9.  向 TerritoryID 添加一个父行组。\n10. 在“分组依据”属性中填写 OrderYear。\n11. 选中“添加组标题”。单击“确定”接受属性。报表应如图\
  \ 5-23 所示。\n\n![A395630_1_En_5_Fig23_HTML.jpg](img/A395630_1_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23.\n具有分组级别的报表设计\n\n12. 删除“订单年份”和“区域 ID”列。这不会删除分组。\n13. 右键单击“客户 ID”列，选择“插入列”\
  \ ➤ “左侧”。\n14. 重复三次，使总共有四列空列。\n15. 在标题行中键入以下值：订单年份、平均销售额、区域 ID、名称。报表设计应如图 5-24 所示。\n\
  \n![A395630_1_En_5_Fig24_HTML.jpg](img/A395630_1_En_5_Fig24_HTML.jpg)\n\n图 5-24.\n\
  添加标题后的报表布局\n\n16. 第二行是 `OrderYear` 组的一部分，但如果您将 `OrderYear` 拖动到“订单年份”标题下方的单元格中，由于它是数字字段，它将自动求和。请改为键入\
  \ `[OrderYear]`。\n17. 在“区域 ID”列的第三行中，键入 `[TerritoryID]`。同样，请确保此字段不会对值进行求和。\n18.\
  \ 将 Territory 字段添加到第三行“名称”下方的单元格中。\n19. 使用“表达式”对话框，将以下表达式添加到第二行“平均销售额”下方的单元格：\n\
  \    ```\n    =Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)\n\
  \    ```\n20. 将 Sales 字段添加到“销售额”标题下的两个空单元格中。它们将自动求和，这是正确的。\n\n现在，您就有了一个具有备用布局的分组报表。当您预览报表时，它应如图\
  \ 5-25 所示。\n\n![A395630_1_En_5_Fig25_HTML.jpg](img/A395630_1_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25.\n格式化前的报表预览\n\n您现在已准备好格式化报表。请按照以下步骤操作：\n\n1.  将所有涉及 Sales 的单元格格式设置为货币，无小数点，并使用千位分隔符。\n\
  2.  选择标题行并查看“属性”窗口。将 `BackgroundColor` 更改为 CornflowerBlue。\n3.  将 `FontSize` 更改为\
  \ 12 pt，并将“字体”部分中的 `Color` 属性更改为 White。\n4.  减小“订单年份”、“平均销售额”、“区域 ID”和“名称”列的宽度。\n\
  5.  增加“店铺”列的宽度。\n6.  将第二行的 `BackgroundColor` 更改为 `#8fb3f3`。\n7.  将第三行的 `BackgroundColor`\
  \ 更改为 `#c7d9f9`。\n8.  将“销售额”列右对齐。报表设计应如图 5-26 所示。\n\n![A395630_1_En_5_Fig26_HTML.jpg](img/A395630_1_En_5_Fig26_HTML.jpg)\n\
  \n图 5-26.\n格式化后的报表布局\n\n报表对每个级别的排序有非常具体的说明。请按照以下步骤对数据进行排序：\n\n1.  通过“组属性”对话框，将 `OrderYear`\
  \ 组的排序顺序更改为降序。\n2.  将详细信息行的排序顺序更改为 `Sales` 降序。\n3.  将 `TerritoryID` 组的排序顺序更改为使用\
  \ `Territory` 而不是 `TerritoryID`。\n\n最后一套任务是添加页眉和页脚并修改页眉的行为。请按照以下步骤完成报表：\n\n1.  启用分组窗口的“高级模式”。\n\
  2.  在“属性”窗口中，为“行组”侧找到的每个“静态”级别将 `RepeatOnNewPage` 设置为 True。\n3.  将“行组”侧找到的每个“静态”级别的\
  \ `KeepWithGroup` 更改为 After。\n4.  为使标题行在向下滚动时保持原地不动，请选择顶部的“静态”项。\n5.  将 `FixedData`\
  \ 属性更改为 True。\n6.  将表重新定位在左上角。\n7.  通过向内拖动边缘来收紧画布。\n8.  添加报表页脚和报表页眉。\n9.  向页眉添加一个文本框，文本为\
  \ Territory Sales。\n10. 将字体大小更改为 18 pt。将文本框居中。\n11. 通过从“报表数据”窗口的“内置字段”文件夹中拖动 Execution\
  \ Time 字段，将其添加到页脚。\n12. 向页脚添加一个包含以下表达式的文本框：\n    ```\n    =\"Page \" & Globals!PageNumber\
  \ & \" of \" & Globals!TotalPages\n    ```\n13. 将报表的上边距和下边距更改为 0.25 英寸或 0.635 厘米。\n\
  \n预览报表并试用滚动功能。进行任何需要的额外调整。报表应如图 5-27 所示。\n\n![A395630_1_En_5_Fig27_HTML.jpg](img/A395630_1_En_5_Fig27_HTML.jpg)\n\
  \n图 5-27.\n具有备用布局的 Territory Sales 报表\n\n如果向下滚动，您应该会看到标题行保持在原位。\n\n\n\n## 使用节省空间的布局构建报表\n\
  \n上一节中展示的备选布局可能更受欢迎，但它比默认布局占用更多空间。不过，有一种方法可以节省一些空间。请按照以下步骤创建节省空间的布局报表：\n\n1.  在\
  \ `Solution Explorer` 中右键单击 `Sales by Territory 2` 报表，然后选择 `Copy`。\n2.  按 `CTRL\
  \ + V` 创建报表的副本。\n3.  将其名称更改为 `Sales by Territory 3`。\n4.  双击新报表，使其在设计视图中打开。\n5.\
  \  右键单击第二行，选择 `Insert Row` ➤ `Inside Group – Below`。\n6.  在第三行 `Order Year` 列下的单元格中，键入\
  \ `Territory ID`。\n7.  展开 `Order Year` 列。\n8.  在第三行 `Average Sales` 列下的单元格中，键入 `Name`。\n\
  9.  在第四行 `Order Year` 列下的单元格中，添加 `[TerritoryID]`。输入此占位符以避免对值进行求和。\n10. 在第四行 `Average\
  \ Sales` 列下的单元格中，添加 `Territory` 字段。\n11. 删除 `Territory ID` 和 `Name` 列。报表布局应如图 5-28\
  \ 所示。\n![A395630_1_En_5_Fig28_HTML.jpg](img/A395630_1_En_5_Fig28_HTML.jpg)\n图 5-28.\
  \ 节省空间的布局\n\n现在，您可以根据需要减小报表画布的宽度或向报表中添加一些额外的字段。您可能还想修改某些格式，例如将第二行加粗。\n\n您可以利用文本框的\
  \ `Padding` 属性来缩进单元格的内容，以创建层次结构效果。请按照以下步骤了解如何操作：\n\n1.  将第一列向左对齐。\n2.  选择与区域相关的四个单元格，如图\
  \ 5-29 所示。\n![A395630_1_En_5_Fig29_HTML.jpg](img/A395630_1_En_5_Fig29_HTML.jpg)\n\
  图 5-29. 选择区域单元格\n3.  打开 `Properties` 窗口。\n4.  在 `Alignment` 类别中找到 `Indent` 属性。\n\
  5.  将 `Left Indent` 属性更改为 `15 pt`。\n6.  稍微扩展第二列的宽度。当您预览报表时，它将如图 5-30 所示。\n![A395630_1_En_5_Fig30_HTML.jpg](img/A395630_1_En_5_Fig30_HTML.jpg)\n\
  图 5-30. 区域单元格缩进后的报表\n\n## 构建矩阵报表\n\n经理对 `Sales by Territory 2` 报表感到满意，但有另一个请求。他希望您创建一个矩阵报表，该报表按区域汇总销售额，并按订单年份进行透视。透视意味着该字段中的数据将成为列标题。\n\
  \n虽然矩阵报表乍一看可能令人生畏，但创建起来其实非常容易。就像常规报表一样，花些时间弄清楚分组级别。在本例中，行级别分组将是 `TerritoryID`，列级别分组将是\
  \ `OrderYear`。您还需要确定数据字段，这是您希望聚合的值。\n\n图 5-31 显示了在填充任何单元格之前的矩阵控件。请注意，`Data` 单元格是行组和列组的交叉点。\n\
  ![A395630_1_En_5_Fig31_HTML.jpg](img/A395630_1_En_5_Fig31_HTML.jpg)\n图 5-31. 矩阵控件\n\
  \n要创建矩阵报表，请按照以下步骤操作：\n\n1.  向项目中添加一个名为 `Sales by Territory Matrix` 的新报表。\n2.  添加一个名为\
  \ `AdventureWorks` 的数据源，指向 `AdventureWorks2016` 共享数据源。\n3.  添加一个名为 `SalesByTerritory`\
  \ 的嵌入数据集，指向 `AdventureWorks` 数据源，并使用以下查询：\n```sql\nSELECT YEAR(OrderDate) AS OrderYear,\
  \ C.CustomerID, SUM(TotalDue) AS Sales,\nT.TerritoryID, T.Name AS Territory, s.Name\
  \ AS Store\nFROM sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory AS T ON\
  \ SOH.TerritoryID = T.TerritoryID\nJOIN Sales.Customer AS C ON SOH.CustomerID =\
  \ C.CustomerID\nJOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\nGROUP BY\
  \ C.CustomerID, T.TerritoryID, T.Name,\nYEAR(OrderDate), S.Name;\n```\n4.  将矩阵控件拖到报表上。\n\
  5.  在 `Columns` 单元格中，添加 `OrderYear`。这是透视后的数据。\n6.  在 `Rows` 单元格中，添加 `TerritoryID`。\n\
  7.  在 `Data` 单元格中，添加 `Sales`。它将自动求和，这正是您需要的。\n8.  右键单击第一列，选择 `Insert Columns` ➤\
  \ `Inside Group Right`。\n9.  在第二行的新单元格中添加 `Territory` 字段。\n10. 在第一行，将 `Territory`\
  \ 标题更改为 `Name`。矩阵布局应如图 5-32 所示。\n![A395630_1_En_5_Fig32_HTML.jpg](img/A395630_1_En_5_Fig32_HTML.jpg)\n\
  图 5-32. 矩阵报表布局\n11. 将 `Data` 单元格格式设置为货币格式，不带小数位，并使用千位分隔符。\n12. 将第一行加粗。\n13. 预览报表。它应如图\
  \ 5-33 所示。\n![A395630_1_En_5_Fig33_HTML.jpg](img/A395630_1_En_5_Fig33_HTML.jpg)\n\
  图 5-33. 矩阵报表预览\n14. 切换回设计视图。\n15. 右键单击 `Sum(Sales)` 单元格，选择 `Add Total` ➤ `Row`。\n\
  16. 再次右键单击该单元格，选择 `Add Total` ➤ `Column`。报表布局应如图 5-34 所示。\n![A395630_1_En_5_Fig34_HTML.jpg](img/A395630_1_En_5_Fig34_HTML.jpg)\n\
  图 5-34. 添加总计后的矩阵\n17. 将 `Sales` 字段添加到 `Total` 下的空单元格中。它将自动求和。\n18. 该单元格不会自动应用格式，因此请将其格式设置为与其他\
  \ `Sales` 单元格相同。\n19. 将底行加粗。\n20. 将最右侧的列加粗。当您预览报表时，它应如图 5-35 所示。\n![A395630_1_En_5_Fig35_HTML.jpg](img/A395630_1_En_5_Fig35_HTML.jpg)\n\
  图 5-35. 格式化总计后的矩阵\n\n表格和矩阵控件的一个有趣之处在于，您可以从一个开始，通过修改分组，切换到另一个。这就是这些控件被称为 `Tablix`\
  \ 的原因。要将矩阵更改为表格，请按照以下步骤操作：\n\n1.  切换到设计视图。\n2.  选择矩阵，右键单击句柄的交叉部分。图 5-36 显示了右键单击的位置。\n\
  ![A395630_1_En_5_Fig36_HTML.jpg](img/A395630_1_En_5_Fig36_HTML.jpg)\n图 5-36. 右键单击句柄交叉点\n\
  3.  单击 `Copy`，然后粘贴到报表画布上以创建矩阵的副本。\n4.  选择新矩阵，在列分组窗口中右键单击 `OrderYear2` 分组级别。\n5.\
  \  删除该组。\n6.  在 `Delete Group` 对话框上，选择 `Delete Group and Related Rows and Columns`。单击\
  \ `OK`。\n\n该矩阵现在已变成表格，如图 5-37 所示。您也可以从表格开始，通过添加列组将其转换为矩阵。\n![A395630_1_En_5_Fig37_HTML.jpg](img/A395630_1_En_5_Fig37_HTML.jpg)\n\
  图 5-37. 矩阵现在是一个表格\n\n## 总结\n\n创建报表是一个迭代的过程。您可能从一个简单的请求开始，需要与请求者合作以最终确定设计。或者，您可能从一套详尽的要求（包括详细的布局）开始。无论何时，当您创建具有多个分组级别或复杂功能的报表时，如果未提供设计，请务必先勾勒出布局草图。\n\
  \n大多数报表需要一个或多个分组级别。本章引导您通过几种技术添加分组级别和格式化报表。您还创建了一个简单的矩阵报表。在继续下一章之前，请务必理解如何添加和配置分组。\n\
  \n在 `第 [6] 章` 中，您将学习如何通过添加参数、链接报表、允许用户控制排序等操作，使您的报表具有动态性。\n\n\n\n"
- "# 6. 使报表动态化\n\n如果你一直跟着之前的演示操作，你应该已经知道如何创建具有多个分组级别的格式美观的报表了。想象一下，在第 5 章中提出报表需求的部门经理，现在希望为每个订单年份单独生成一份报表。或者，他/她可能想改变排序顺序，或者点击某一行来下钻查看详细信息。\n\
  \n在我担任数据库管理员的职业生涯中，我经常为公司的一些部门创建报表，像这样的场景实在太常见了。我很快就学会了提出问题并预想需求者下一步可能会问什么。我很少在不提供选项（例如参数）的情况下创建报表。\n\
  \n在本章中，你将学习如何使报表动态化。这将为你节省时间，并让你看起来像一位 SQL Server Reporting Services (SSRS) 的超级明星！\n\
  \n## 向报表添加参数\n\n报表开发人员最常使用参数来控制报表上显示的数据。你在第 3 章看到过，向数据集中的查询添加参数会自动在报表中创建一个参数。你也可以手动创建参数。无论哪种方式，报表中的许多元素都可以随着用户运行报表而动态变化。\n\
  \n在本节中，你将从一个已完成的报表开始，并添加一个参数来控制显示的数据。请按照以下步骤开始：\n\n1.  启动 SQL Server Data Tools\
  \ (`SSDT`)。\n2.  在名为 `Beginning SSRS Chapter 6` 的解决方案中，创建一个新的名为 `Dynamic Reports`\
  \ 的 SSRS 报表项目。\n3.  创建一个名为 `AdventureWorks2016` 的共享数据源，指向 `AdventureWorks2016` 数据库。\n\
  4.  在解决方案资源管理器中右键单击 `Reports` 文件夹，选择 `添加` ➤ `现有项`，如图 6-1 所示。\n    ![A395630_1_En_6_Fig1_HTML.jpg](img/A395630_1_En_6_Fig1_HTML.jpg)\n\
  \    图 6-1. 添加现有报表\n5.  导航到在第 5 章创建的项目中找到的 `Sales by Territory Matrix.rdl` 文件。如果你没有创建该报表，可以使用\
  \ Apress 网站 (`Apress.com`) 的代码/下载区域中的报表文件。\n6.  点击 `添加` 导入报表，如图 6-2 所示。\n    ![A395630_1_En_6_Fig2_HTML.jpg](img/A395630_1_En_6_Fig2_HTML.jpg)\n\
  \    图 6-2. 导入现有报表\n7.  双击报表以在设计视图中打开。\n8.  如果报表上有两个 `Tablix` 控件，请删除表格控件并保留矩阵控件。参考图\
  \ 6-3。\n    ![A395630_1_En_6_Fig3_HTML.jpg](img/A395630_1_En_6_Fig3_HTML.jpg)\n\
  \    图 6-3. 删除表格控件\n9.  预览报表以确保它能运行。\n10. 切换回设计视图。\n11. 在 `报表数据` 窗口中，打开 `SalesByTerritory`\
  \ 数据集的属性。\n12. 将查询更改为\n    ```\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\
  \ SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
  \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
  \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
  \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
  \ = @Year\n    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate),\
  \ S.Name;\n    ```\n13. 点击 `确定` 保存更改。\n\n此查询与原始查询的区别在于 `WHERE` 子句。该查询现在由 `@Year`\
  \ 参数进行筛选。向查询添加参数会自动向报表添加一个参数。展开 `报表数据` 窗口中的 `参数` 文件夹。应该可以看到该参数，如图 6-4 所示。\n![A395630_1_En_6_Fig4_HTML.jpg](img/A395630_1_En_6_Fig4_HTML.jpg)\n\
  图 6-4. 新参数\n\n现在当你预览报表时，系统会提示你填写年份。尝试输入几个值进行测试。只要你输入一个介于 2011 和 2014 之间的整数，运行报表时就会看到数据。\n\
  \n为了确保运行报表的人提供一个有效的值，你可以提供一个下拉列表供用户选择。\n\n### 硬编码的参数列表\n\n参数列表可以是硬编码的列表，也可以来自数据集的查询结果。按照以下步骤创建年份列表：\n\
  \n1.  右键单击 `Year` 参数并选择 `参数属性`。\n2.  选择 `可用值` 页。\n3.  选择 `指定值`。\n4.  点击 `添加`。\n\
  5.  在 `标签` 和 `值` 中都输入 `2011`。\n6.  为 `2012`、`2013` 和 `2014` 年重复此操作。对话框应如图 6-5 所示。\n\
  \    ![A395630_1_En_6_Fig5_HTML.jpg](img/A395630_1_En_6_Fig5_HTML.jpg)\n    图 6-5.\
  \ 向参数添加值\n7.  点击 `确定`。现在当你预览报表时，将有一个列表可供选择，如图 6-6 所示。\n    ![A395630_1_En_6_Fig6_HTML.jpg](img/A395630_1_En_6_Fig6_HTML.jpg)\n\
  \    图 6-6. 参数列表\n\n参数的 `标签` 属性是最终用户看到的内容；`值` 属性是传递给查询的内容。在本例中，它们是相同的。\n\n\n\n"
- "# 基于查询添加参数列表\n\n大多数情况下，基于查询来构建参数列表是合理的。这将节省时间，因为随着数据变化，该列表无需手动维护。参数列表通常会被重用，因此创建共享数据集而非嵌入式数据集是明智之举。要基于查询创建参数列表，请按照以下步骤操作：\n\
  \n1.  切换回设计视图。\n2.  在 `解决方案资源管理器` 中，右键单击 `共享数据集` 文件夹，选择 `添加新数据集`。\n3.  将数据集命名为 `Territory`。\n\
  4.  `数据源` 属性应指向 `AdventureWorks2016`。\n5.  确保 `查询` 类型设置为 `文本`。\n6.  将 `查询` 设置为：\n\
  \n    ```sql\n    SELECT TerritoryID, Name AS Territory\n    FROM Sales.SalesTerritory;\n\
  \    ```\n\n7.  `共享数据集属性` 应如图 6-7 所示。单击 `确定`。\n\n    ![A395630_1_En_6_Fig7_HTML.jpg](img/A395630_1_En_6_Fig7_HTML.jpg)\n\
  \n    图 6-7. `Territory` 数据集\n\n8.  使用 `报表数据` 窗口向报表添加一个名为 `Territory` 的新数据集。\n9.\
  \  选择 `使用共享数据集`。\n10. 从对话框中选择 `Territory` 数据集，如图 6-8 所示。\n\n    ![A395630_1_En_6_Fig8_HTML.jpg](img/A395630_1_En_6_Fig8_HTML.jpg)\n\
  \n    图 6-8. 报表中的 `Territory` 数据集\n\n11. 单击 `确定`。\n12. 打开 `SalesByTerritory` 数据集的属性，并将查询更改为：\n\
  \n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue)\
  \ AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader\
  \ AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n\
  \    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store\
  \ AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate) = @Year AND\
  \ T.TerritoryID = @Territory\n    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n\
  \    YEAR(OrderDate), S.Name;\n    ```\n\n13. 这将通过 `Year` 和 `Territory` 两个维度筛选数据集。打开\
  \ `Territory` 参数的属性。\n14. 选择 `可用值` 选项卡。\n15. 选择 `从查询中获取值`。\n16. 在 `数据集` 属性中，选择 `Territory`。\n\
  17. 在 `值字段` 属性中，选择 `TerritoryID`。这是查询中所需要的。\n18. 为 `标签字段` 属性选择 `Territory`。这是最终用户将看到的。对话框将如图\
  \ 6-9 所示。\n\n    ![A395630_1_En_6_Fig9_HTML.jpg](img/A395630_1_En_6_Fig9_HTML.jpg)\n\
  \n    图 6-9. `Territory` 列表属性\n\n注意：`SSDT` 发布时存在一个影响共享数据集的错误。Microsoft 已承诺在后续版本中修复此问题。在此之前，要解决此问题，请关闭项目并找到\
  \ `Territory.rsd` 文件。将 `<Dataset>` 更改为 `<Dataset Name=\"Territory\">`。保存文件并重新启动项目。\n\
  \n单击 `确定` 接受参数后，预览报表。新参数应如图 6-10 所示。\n\n![A395630_1_En_6_Fig10_HTML.jpg](img/A395630_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10. `Territory` 参数列表\n\n多次运行报表并选择不同的参数集。您将看到每次显示的数据如何变化。\n\n"
- "# 默认参数\n\n通常，有一组参数是最可能被选中的。为了节省用户时间，您可以为每个参数添加一个默认值。启动报表时，它将使用默认参数运行一次。然后，用户如果需要，可以选择不同的参数集再次运行。要演示这一点，请按照以下步骤操作：\n\
  \n1.  单击 `确定` 接受属性设置。\n2.  使用相同方法为 `Territory` 参数添加默认值。\n3.  提供值 `7`。这些值必须来自 `TerritoryID`\
  \ 字段，因为这是传递给查询的值。\n4.  单击 `确定` 接受属性并预览报表。它应该在不提供参数值的情况下运行，并如图 6-12 所示。\n\n    ![A395630_1_En_6_Fig12_HTML.jpg](img/A395630_1_En_6_Fig12_HTML.jpg)\n\
  \n    图 6-12. 使用默认参数运行后的报表\n\n5.  切换回设计视图。\n6.  打开 `Year` 参数的属性，选择 `默认值` 选项卡。\n\
  7.  选择 `指定值`。\n8.  单击 `添加`。\n9.  填入 `2012`。对话框应如图 6-11 所示。\n\n    ![A395630_1_En_6_Fig11_HTML.jpg](img/A395630_1_En_6_Fig11_HTML.jpg)\n\
  \n    图 6-11. `默认值` 属性\n\n"
- "# 多值参数\n\n到目前为止，您创建的参数允许用户从列表中选择一个值。也可以创建允许多选的参数。为此，必须修改查询以选择一个值列表。不再使用 `ColumnName\
  \ = @Parameter`，而是使用 `ColumnName IN (@Parameter)`。按照以下步骤创建多值参数：\n\n1.  切换回设计视图。\n\
  2.  打开 `Year` 参数的属性。\n3.  在 `常规` 选项卡上，勾选 `允许多个值`。\n4.  在 `默认值` 选项卡上，切换回 `无默认值`。\n\
  5.  单击 `确定` 保存更改。\n6.  打开 `SalesByTerritory` 数据集。\n7.  为使 `WHERE` 子句中的表达式能够接受值列表，必须将运算符从等于\
  \ (`=`) 改为 `IN`。将 `查询` 属性更改为：\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear,\
  \ C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory,\
  \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
  \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
  \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
  \    WHERE YEAR(OrderDate) IN (@Year) AND T.TerritoryID = @Territory\n    GROUP\
  \ BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\
  \n8.  运行报表。`Year` 参数应如图 6-13 所示。\n\n    ![A395630_1_En_6_Fig13_HTML.jpg](img/A395630_1_En_6_Fig13_HTML.jpg)\n\
  \n    图 6-13. 多值参数\n\n您现在可以选择一个或多个年份。多次运行报表，看看选择不同参数集时数据如何变化。\n\n\n\n### 级联参数\n\n\
  您可能已经注意到，某些区域在 2011 年没有销售数据。如果您选择了 2011 年，所有区域仍然会显示在参数列表中。您可以设计一个参数，使其基于另一个参数的值。请按照以下步骤，根据\
  \ `Year` 参数调整 `Territory` 参数列表。\n\n1.  切换到设计视图。\n2.  打开 `Territory` 数据集的属性。\n3.\
  \  切换到“使用嵌入在报表中的数据集”。\n4.  将“数据源”属性设置为 `AdventureWorks`。\n5.  将“查询”属性设置为\n\n   \
  \ ```sql\n    SELECT DISTINCT T.TerritoryID, T.Name AS Territory\n    FROM sales.SalesOrderHeader\
  \ AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n\
  \    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store\
  \ AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate) IN (@Year);\n\
  \    ```\n\n6.  单击“确定”保存更改。\n7.  打开 `Territory` 参数属性。\n8.  在“默认值”页面上，更改为“无默认值”。\n\
  9.  单击“确定”保存更改。\n\n现在，当您预览报表时，在选定年份之前，`Territory` 参数将显示为灰色。选择 2011 年。`Territory`\
  \ 参数列表将如图 6-14 所示。\n\n![A395630_1_En_6_Fig14_HTML.jpg](img/A395630_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14. 基于 2011 年销售数据的区域参数列表\n\n您可能已经注意到，`Territory` 参数的查询与 `SalesByTerritory`\
  \ 查询类似。它没有查询报表所需的值，而是生成了一个区域的唯一列表。查询中使用的表是相同的。`WHERE` 子句中的表达式 `YEAR(OrderDate) IN\
  \ (@Year)` 用于根据所选的 `Year` 参数值进行筛选。\n\n您可以级联更多参数，每个参数都基于前一个参数的值。但是，请注意不要对性能产生负面影响。例如，从\
  \ `Sales.SalesTerritory` 表显示区域列表比用于仅显示特定年份有销售数据的区域的查询效率高得多。顺便说一句，您也可以选择所有年份，级联仍然有效。\n\
  \n### 参数位置\n\n在设计视图中，您可能注意到报表上方有一个参数区域。如果看不到，请右键单击设计画布并选择“视图” ➤ “参数”。参数区域应如图 6-15\
  \ 所示。\n\n![A395630_1_En_6_Fig15_HTML.jpg](img/A395630_1_En_6_Fig15_HTML.jpg)\n\n\
  图 6-15. 参数区域\n\n此功能是 SQL Server 2016 的新增功能，提供了更灵活的参数布局。在 SQL Server 的早期版本中，您可以通过从\
  \ `Parameters` 文件夹中选择一个参数并单击向上或向下箭头来更改参数的顺序，如图 6-16 所示。\n\n![A395630_1_En_6_Fig16_HTML.jpg](img/A395630_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16. 用于移动参数的箭头\n\n使用 SSRS 早期版本中的方法更改位置并不总能产生最佳的放置效果。无法控制哪些参数最终位于同一行。如果您有一个包含开始和结束日期的报表，您可能希望将日期保持在同一行，但这并非总是可行。\n\
  \n从 SQL Server 2016 开始，最多可以显示六个参数。您现在可以通过将参数拖动到不同的单元格来控制参数的放置。例如，将 `Territory` 参数拖到\
  \ `Year` 参数下方。参数窗格应如图 6-17 所示。\n\n![A395630_1_En_6_Fig17_HTML.jpg](img/A395630_1_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17. 重新排列后的参数\n\n当您预览报表时，参数显示如图 6-18 所示。\n\n![A395630_1_En_6_Fig18_HTML.jpg](img/A395630_1_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18. 预览模式下的参数\n\n默认情况下，有两行参数。要增加行数，请在设计视图中右键单击参数区域，然后选择“在上方插入行”或“在下方插入行”。但是，如果您正在使用级联功能，在移动参数时要小心。确保需要首先使用的参数也首先显示，以避免依赖错误。\n\
  \n### 参数数据类型\n\n到目前为止，您一直在使用数值参数，尽管默认类型是文本。您也可以使用其他数据类型的参数，控件将根据类型发生变化。请按照以下说明查看其他数据类型：\n\
  \n1.  确保已保存对“按区域矩阵销售”报表的最新更改。您可以单击“保存”图标或运行报表。\n2.  右键单击“按区域矩阵销售”报表，然后选择“复制”。\n\
  3.  右键单击项目名称 `Dynamic Reports`，然后选择“粘贴”。\n4.  将新报表的名称更改为 `Data Types`。\n5.  在设计视图中，右键单击\
  \ `Parameters` 文件夹，然后选择“添加参数”。\n6.  这将打开“报表参数属性”对话框。将参数命名为 `DateParameter`。\n7.\
  \  在“提示”中填写 `Date Parameter`。提示是用户在运行报表时将看到的内容。\n8.  将“数据类型”更改为“日期/时间”。“常规”页面将如图\
  \ 6-19 所示。\n\n    ![A395630_1_En_6_Fig19_HTML.jpg](img/A395630_1_En_6_Fig19_HTML.jpg)\n\
  \n    图 6-19. 参数的常规属性\n9.  单击“默认值”页面。\n10. 选择“指定值”。\n11. 单击“添加”。\n12. 不要键入值，而是单击如图\
  \ 6-20 所示的 `fx` 符号以打开表达式对话框。\n\n    ![A395630_1_En_6_Fig20_HTML.jpg](img/A395630_1_En_6_Fig20_HTML.jpg)\n\
  \n    图 6-20. 表达式按钮\n13. 在表达式中填写 `=Today()` 并单击“确定”。\n14. 单击“确定”接受属性。\n15. 您现在应该在网格中看到带有日历图标的\
  \ `Date Parameter`，如图 6-21 所示。\n\n    ![A395630_1_En_6_Fig21_HTML.jpg](img/A395630_1_En_6_Fig21_HTML.jpg)\n\
  \n    图 6-21. 新的日期参数\n16. 预览报表。\n17. 如果 `Date Parameter` 显示为灰色，请为 `Year` 和 `Territory`\
  \ 选择值。当前日期应自动被选中。您可以键入或使用日历选取器控件选择其他日期。至少在我使用的版本中，`Date/Time` 参数必须位于第一个位置，才能在其他参数被选定之前可用。\n\
  18. 切换回设计视图并添加另一个参数。\n19. 将此参数命名为 `TrueFalse`，提示为 `True or False`。\n20. 将“数据类型”更改为“布尔值”并单击“确定”。\n\
  21. 这将添加一组单选按钮，如图 6-22 所示。\n\n    ![A395630_1_En_6_Fig22_HTML.jpg](img/A395630_1_En_6_Fig22_HTML.jpg)\n\
  \n    图 6-22. 新的“真或假”参数\n\n您还可以通过在“默认值”页面上添加 `True` 或 `False` 来为布尔数据类型设置默认值。\n\n\
  默认数据类型是“文本”，允许用户输入任何内容。如果您希望将输入限制为数字，可以选择 `Integer` 或 `Float` 数据类型。该控件看起来像一个常规文本框，但将分别只接受整数或小数。\n\
  \n\n## 使用存储过程\n\nSQL Server 存储过程（也称为 stored procs 或 sprocs）是包含 T-SQL 脚本的对象。这些存储过程可能包含循环等编程逻辑，可能更新数据，或者仅包含一个\
  \ `SELECT` 查询。存储过程常用于 SSRS 数据集中，并且根据定义可能需要参数。如果您使用的是网络 SQL Server，您可能需要联系数据库管理员以获取创建存储过程的权限。否则，要创建存储过程，请按照以下步骤操作。\n\
  \n1.  使用 SQL Server Management Studio（SSMS）连接到您的 SQL Server。\n2.  单击“新建查询”，这将打开一个查询窗口。\n\
  3.  在查询窗口中输入此代码，可以手动键入或从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制。该代码创建一个需要一个参数\
  \ `TerritoryID` 的存储过程，然后返回按该 `TerritoryID` 筛选的结果。\n\n```\nUSE AdventureWorks2016;\n\
  GO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT NULL\n    DROP PROC usp_SalesByTerritory;\n\
  GO\nCREATE PROC usp_SalesByTerritory @Year INT, @TerritoryID INT AS\nSELECT YEAR(OrderDate)\
  \ AS OrderYear, C.CustomerID,\n       SUM(TotalDue) AS Sales,\n       T.TerritoryID,\
  \ T.Name AS Territory, s.Name AS Store\nFROM sales.SalesOrderHeader AS SOH\n   \
  \ JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer\
  \ AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID\
  \ = C.StoreID\nWHERE YEAR(OrderDate) = @Year AND T.TerritoryID = @TerritoryID\n\
  GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n         YEAR(OrderDate), S.Name;\n\
  ```\n\n4.  单击菜单栏中的“执行”或按 F5 来创建该过程，如图 6-23 所示。\n\n![A395630_1_En_6_Fig23_HTML.jpg](img/A395630_1_En_6_Fig23_HTML.jpg)\n\
  \n图 6-23. “执行”图标。\n\n5.  单击“新建查询”。在新的查询窗口中，通过运行以下代码测试该过程：\n\n```\nusp_SalesByTerritory\
  \ @Year = 2011, @TerritoryID = 6;\n```\n\n在数据集中使用存储过程与使用查询没有太大区别。请按照以下步骤创建一个使用新存储过程的报表。\n\
  \n1.  向项目添加一个名为“Stored Proc”的新报表。\n2.  添加一个指向 `AdventureWorks2016` 的数据源，并将其命名为 `AdventureWorks`。\n\
  3.  向报表添加一个名为 `SalesByTerritory` 的嵌入数据集。使用 `AdventureWorks` 数据源。\n4.  将查询类型更改为“存储过程”。\n\
  5.  执行此操作后，对话框会发生变化。您将看到一个下拉框，列出了数据库中的存储过程。选择 `usp_SalesByTerritory`。对话框应如图 6-24\
  \ 所示。\n\n![A395630_1_En_6_Fig24_HTML.jpg](img/A395630_1_En_6_Fig24_HTML.jpg)\n\n\
  图 6-24. 在数据集中使用存储过程。\n\n6.  单击“确定”以创建数据集。它也会自动将参数添加到报表中。\n7.  将一个矩阵控件拖到报表画布上。\n\
  8.  将 `OrderYear` 添加到“列”单元格。\n9.  将 `Sales` 添加到“数据”单元格。它将自动求和。\n10. 将 `TerritoryID`\
  \ 添加到“行”单元格。布局应如图 6-25 所示。\n\n![A395630_1_En_6_Fig25_HTML.jpg](img/A395630_1_En_6_Fig25_HTML.jpg)\n\
  \n图 6-25. 矩阵设计。\n\n当您预览报表时，系统将提示您输入 `OrderYear` 和 `TerritoryID`。填入 2012 和 7 以查看数据。\n\
  \n然而，使用存储过程存在一个问题。如果您将参数切换为接受多个值，报表将不再工作。这是因为存储过程期望每个参数接收一个整数值，而不是一个变量列表。要查看问题，请按照以下步骤操作。\n\
  \n1.  切换回设计视图。\n2.  修改 `Year` 参数，使其允许多个值。\n3.  在“可用值”页面上，选择“指定值”并添加 2011 到 2014。\n\
  4.  单击“确定”保存更改。\n5.  预览报表。\n6.  选择一个以上的年份。为 `TerritoryID` 输入 7。\n7.  当您单击“查看报表”时，您将看到一条错误消息，如图\
  \ 6-26 所示。\n\n![A395630_1_En_6_Fig26_HTML.jpg](img/A395630_1_En_6_Fig26_HTML.jpg)\n\
  \n图 6-26. 当为 `OrderYear` 选择多个值时出现的错误。\n\n作为解决方法，必须修改存储过程的参数以接受字符串值，而不仅仅是整数。然后，必须向过程中添加逻辑以处理逗号分隔的列表，而不是每个参数的一个值。通常使用一个函数来解析列表并将值保存到临时表中。请按照以下步骤修改存储过程，使其能够接受多个值。\n\
  \n1.  在 SSMS 中，运行此代码创建一个函数，用于将值列表转换为表。您可以从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制代码。\n\
  \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('udf_ListToTable') IS NOT NULL\n\
  \    DROP FUNCTION dbo.udf_ListToTable;\nGO\nCREATE FUNCTION dbo.udf_ListToTable(@List\
  \ NVARCHAR(4000),\n    @Delimiter NCHAR(1))\nRETURNS @ValueList TABLE (ListItem\
  \ NVARCHAR(50)) AS\nBEGIN\n    DECLARE @Pos INT;\n    DECLARE @Item NVARCHAR(50);\n\
  \    --Find the first delimiter\n    SET @Pos = CHARINDEX(@Delimiter,@List);\n \
  \   --loop until all items are processed\n    WHILE @Pos > 0 BEGIN\n        --insert\
  \ the current item\n        INSERT INTO @ValueList(ListItem)\n            SELECT\
  \ LEFT(@List,@Pos-1);\n        --remove current item from the string\n        SET\
  \ @List = SUBSTRING(@List,@Pos+1,4000);\n        --find the next delimiter\n   \
  \     SET @Pos = CHARINDEX(@Delimiter,@List);\n    END;\n    --add the last item\n\
  \    INSERT INTO @ValueList(ListItem)\n        SELECT @List;\n    RETURN;\nEND;\n\
  GO\n```\n\n2.  单击“执行”来运行代码并创建该函数。\n3.  单击“新建查询”以打开另一个查询窗口。\n4.  在 SSMS 中运行此代码以修改存储过程。\n\
  \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT\
  \ NULL\n    DROP PROC usp_SalesByTerritory;\nGO\nCREATE PROC usp_SalesByTerritory\n\
  \    @YearList NVARCHAR(4000), @TerritoryIDList NVARCHAR(4000) AS\n    DECLARE @Years\
  \ TABLE (OrderYear INT);\n    DECLARE @Territories TABLE(TerritoryID INT);\n   \
  \ --Save the lists into table variables\n    INSERT INTO @Years(OrderYear)\n   \
  \     SELECT ListItem\n        FROM dbo.udf_ListToTable(@YearList,',');\n    INSERT\
  \ INTO @Territories(TerritoryID)\n        SELECT ListItem\n        FROM dbo.udf_ListToTable(@TerritoryIDList,',');\n\
  \    --Change the query to use IN lists in the WHERE clause\n    SELECT YEAR(OrderDate)\
  \ AS OrderYear, C.CustomerID,\n           SUM(TotalDue) AS Sales,\n           T.TerritoryID,\
  \ T.Name AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n\
  \        JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n   \
  \     JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n        JOIN Sales.Store\
  \ AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate) IN (SELECT OrderYear\
  \ FROM @Years)\n      AND T.TerritoryID IN (SELECT TerritoryID FROM @Territories)\n\
  \    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n             YEAR(OrderDate),\
  \ S.Name;\nGO\n```\n\n5.  单击“执行”来运行代码。\n\n现在，每当您遇到此问题时，都可以使用这个函数。该存储过程使用新函数将每个列表插入到一个表变量中。然后，在\
  \ `WHERE` 子句中，这些表变量被用作 `IN` 列表。如果您的数据源托管在 SQL Server 2016 上，您可以使用一个新的内置函数 `STRING_SPLIT()`\
  \ 来代替本示例中使用的自定义函数。\n\n## 修改报告以配合存储过程的更改\n\n现在需要对报告进行一些更改，以适应存储过程的变更。请遵循以下步骤：\n\n\
  1.  切换到“存储过程报告”的设计视图。\n2.  打开 `SalesByTerritory` 数据集的属性。\n3.  在“查询”选项卡上，单击“刷新字段”。这将创建与更新后的存储过程匹配的新参数：`@YearList`\
  \ 和 `@TerritoryIDList`。\n4.  单击“确定”。\n5.  展开“参数”文件夹。\n6.  删除 `Year` 和 `TerritoryID`\
  \ 参数。对于修改后的存储过程，它们不再需要。\n7.  创建一个名为 `Territory` 的新数据集。它应指向共享的 `Territory` 数据集。\n\
  8.  打开 `TerritoryIDList` 参数的属性。\n9.  勾选“允许多个值”。\n10. 在“可用值”页面上，选择“从查询中获取值”。\n11.\
  \ 从“数据集”列表中选择 `Territory`。\n12. 从“值字段”列表中选择 `TerritoryID`。\n13. 从“标签字段”列表中选择 `Territory`。\n\
  14. 单击“确定”接受更改。\n15. 打开 `YearList` 参数的属性。\n16. 勾选“允许多个值”。\n17. 在“可用值”页面上，输入 2011\
  \ 至 2014 作为硬编码值。\n18. 单击“确定”保存属性。\n19. 在参数窗格中将参数向左拖动。被删除的两个参数留下了空位。\n20. 预览报告；当选择多个值时，它现在应按预期工作。\n\
  \n在 SSRS 中工作时，存储过程通常是首选的命令类型。它们允许代码重用，并且可以创建得比仅允许用户对表运行查询更安全。主要缺点是报表开发人员可能没有在数据库中创建或修改存储过程的权限。\n\
  \n## 控制属性\n\n虽然筛选数据是使报表动态化的常见原因，但你也可以动态控制几乎任何属性。为此，你将利用基于数据或参数的表达式。你在第 [4] 章中看到了一个这样的例子，在那里设置了交替的背景颜色。\n\
  \n你可以控制任何属性为“表达式”作为属性选择，或属性旁边带有 `fx` 图标的属性。本节涵盖几个示例。\n\n### 可见性\n\n你可以使用表达式来显示或隐藏表格或行等对象，但表达式的值必须在报表实际显示之前已知。请遵循以下步骤，使用参数控制可见性。\n\
  \n1.  在项目中添加一个名为 `Visibility` 的新报表。\n2.  向报表添加两个矩形控件。\n3.  将两个矩形的“填充颜色”更改为深色，例如蓝色。\n\
  4.  调整大小，使一个为大矩形，一个为小正方形。报表布局应如图 [6-27] 所示。\n5.  向报表添加一个名为 `ShowRectangle` 的参数，其“提示”属性设置为\
  \ `Show Rectangle`。\n6.  将“数据类型”更改为“布尔值”。\n7.  单击“确定”创建参数。\n8.  添加第二个名为 `ShowSquare`\
  \ 的参数，其“提示”属性设置为 `Show Square`。\n9.  将“数据类型”更改为“布尔值”。\n10. 单击“确定”创建第二个参数。\n11. 右键单击矩形形状，选择“矩形属性”。\n\
  12. 切换到“可见性”页面。\n13. 将“报表最初运行时”属性更改为“基于表达式显示或隐藏”。\n14. 单击 `fx` 图标以打开“表达式”对话框。请注意，你将设置一个表达式来隐藏矩形，如图\
  \ [6-28] 所示。这可能看起来违反直觉，因此在为此属性创建表达式时请务必牢记。\n15. 在“类别”列表中，选择“参数”。你将在“值”列表中看到列出的两个参数，如图\
  \ [6-29] 所示。\n16. 双击 `ShowRectangle`。\n17. 如果表达式的计算结果为 `True`，矩形将被隐藏。将表达式更改为：\n\
  \    ```\n    =Not Parameters!ShowRectangle.Value\n    ```\n18. 单击“确定”关闭“表达式”对话框，然后单击“确定”关闭“矩形属性”对话框。\n\
  19. 对小正方形形状重复此过程，选择 `ShowSquare` 参数。\n20. 预览报表进行测试。图 [6-30] 显示了一个示例。\n\n另一种控制可见性的方法通常与组一起使用。这在\
  \ [2] 章的向导报告中已演示，你可以单击加号展开详细信息。\n\n你将在组上设置一个属性，以根据在父组中找到的单元格切换可见性。要手动执行此操作，请按照以下步骤操作：\n\
  \n1.  通过右键单击“报告”并选择“添加”➤“现有项”，从 [5] 章项目中导入 `Sales by Territory 2.rdl` 文件。\n2.  双击报表在设计视图中打开它。\n\
  3.  右键单击 `TerritoryID` 单元格，选择“文本框属性”。\n4.  如果尚未设置，则将“名称”属性更改为 `TerritoryID`。\n5.\
  \  单击“确定”接受更改。\n6.  在“行组”窗口中，右键单击“详细信息”组。这是最内层的子组。\n7.  选择“组属性”。\n8.  选择“可见性”页面。\n\
  9.  选择“隐藏”，并勾选“可以通过此报表项切换显示”。\n10. 在下拉列表中，选择 `TerritoryID`。属性应如图 [6-31] 所示。\n\n\n\
  ## 可见性设置\n\n11. 单击 **确定** 接受属性。\n12. 确保 `OrderYear` 单元格被命名为 `OrderYear`，就像处理 `TerritoryID`\
  \ 时那样。\n13. 右键单击 `TerritoryID` 组，选择 **组属性**。\n14. 在 **可见性** 页面上，选择 **隐藏** 并使此组由\
  \ `OrderYear` 切换。\n15. 单击 **确定** 接受属性。您无需在 `OrderYear` 组上设置属性，因为它是最高级别的父级。\n16.\
  \ 预览报表。它应如图 6-32 所示。\n\n![A395630_1_En_6_Fig32_HTML.jpg](img/A395630_1_En_6_Fig32_HTML.jpg)\n\
  \n图 6-32. 带有折叠部分的报表\n\n当您单击年份旁边的加号时，您将看到该年份的地区。当您单击 `TerritoryID` 旁边的加号时，您将看到该地区的详细信息，如图\
  \ 6-33 所示。\n\n![A395630_1_En_6_Fig33_HTML.jpg](img/A395630_1_En_6_Fig33_HTML.jpg)\n\
  \n图 6-33. 展开的报表\n\n此方法的主要缺点是您一次只能展开一个组。要显示所有详细信息需要点击很多次。更好的解决方案是向报表添加参数以控制组的可见性。为此，请遵循以下步骤：\n\
  \n1. 在 **解决方案资源管理器** 中，创建 `Sales by Territory 2` 报表的副本。将新报表命名为 `Visibility by Parameters`。\n\
  2. 添加一个名为 `DisplayTerritories` 的参数。提示应为 `Display Territories`，数据类型应为 **布尔值**。将默认值设置为\
  \ **False**。\n3. 添加另一个名为 `DisplayDetailRows` 的参数。提示应为 `Display Detail Rows`。它也应是一个默认值为\
  \ **False** 的 **布尔值**。\n4. 打开 **详细信息** 组的 **组属性**。\n5. 在 **可见性** 页面上，取消选中 **可以通过此报表项切换显示**。\n\
  6. 选择 **根据表达式显示或隐藏**。对话框应如图 6-34 所示。`TerritoryID` 字段可能仍作为报表项可见，但已禁用。\n\n![A395630_1_En_6_Fig34_HTML.jpg](img/A395630_1_En_6_Fig34_HTML.jpg)\n\
  \n图 6-34. 组属性对话框\n7. 单击 **fx** 图标以打开 **表达式** 对话框。\n8. 添加此表达式：\n\n```\n=NOT Parameters!DisplayDetailRows.Value\n\
  ```\n\n9. 单击 **确定** 接受表达式，然后再次单击 **确定** 关闭 **组属性** 对话框。\n10. 对 `TerritoryID` 组重复此过程。这次表达式为：\n\
  \n```\n=NOT Parameters!DisplayTerritories.Value\n```\n\n11. 预览报表。在更改参数之前，它应如图 6-35\
  \ 所示。\n\n![A395630_1_En_6_Fig35_HTML.jpg](img/A395630_1_En_6_Fig35_HTML.jpg)\n\n\
  图 6-35. 仅显示摘要的报表\n\n请注意，年份旁边的加号消失了。如果将 `Display Territories` 更改为 **True** 并再次运行报表，这次所有地区都将显示。要查看详细信息，必须将两个参数都设置为\
  \ **true**。\n\n### 格式化\n\n几乎任何属性都可以由表达式控制。该表达式可以包含数据集中的字段。为了演示，您将把销售额超过 $2,000,000\
  \ 的地区行的字体加粗。请遵循以下步骤：\n\n1. 切换到 `Sales by Territory 2` 报表的设计视图。\n2. 选择地区行。\n3. 在\
  \ **属性** 窗口中，找到 `FontWeight` 属性。\n4. 从下拉列表中，选择 `<表达式>`，这将打开 **表达式** 对话框。\n5. 添加此表达式：\n\
  \n```\n=Iif(SUM(Fields!Sales.Value)>=2000000,\"Bold\",\"Default\")\n```\n\n6. 单击\
  \ **确定** 保存更改。\n7. 预览报表并展开以查看地区。报表将如图 6-36 所示。\n\n![A395630_1_En_6_Fig36_HTML.jpg](img/A395630_1_En_6_Fig36_HTML.jpg)\n\
  \n图 6-36. 销售额达到或超过 $2,000,000 的地区以粗体显示\n\n`Iif` 函数，也称为内联 if，接受三个参数。第一个是要测试的表达式。如果表达式返回\
  \ true，则返回第二个参数。如果表达式返回 false，则返回第三个值。表达式返回的值用作属性值。在此示例中，当销售额至少为 $2,000,000 时，返回单词\
  \ **Bold**。\n\n### 交互排序\n\n可以使用标题行中单元格的属性来控制排序。根据我的经验，它与折叠部分配合得不太好。请遵循以下步骤启用交互排序：\n\
  \n1. 创建 `Sales by Territory 2` 的副本。将其名称更改为 `Interactive Sort`。\n2. 在 **解决方案资源管理器**\
  \ 中双击新报表以在设计视图中打开它。\n3. 清除 `TerritoryID` 和 `详细信息` 组的可见性设置。将两者都设置回 **显示** 并取消选中 **可以通过此报表项切换显示**。\n\
  4. 预览报表以确保组和详细信息均可见。\n5. 切换回设计视图。\n6. 右键单击 `Order Year` 标题单元格，选择 **文本框属性**。\n7.\
  \ 选择 **交互排序** 页面。\n8. 选中 **在此文本框上启用交互排序**。\n9. 在 **选择要排序的内容** 下，选择 **组**。\n10. 从下拉框中，选择\
  \ `OrderYear`。这是要排序的部分。\n11. 从 **排序依据** 列表中，选择 `[OrderYear]`。对话框应如图 6-37 所示。\n\n\
  ![A395630_1_En_6_Fig37_HTML.jpg](img/A395630_1_En_6_Fig37_HTML.jpg)\n\n图 6-37. 交互排序属性\n\
  12. 单击 **确定** 接受属性。\n13. 为 `Territory ID` 标题单元格设置交互排序属性。排序应应用于 `TerritoryID` 组并按\
  \ `TerritoryID` 排序。\n14. 为 `Customer ID` 标题单元格设置交互排序属性。排序应应用于 **详细信息** 行。按 `CustomerID`\
  \ 排序。\n15. 为 `Store` 标题单元格设置交互排序属性。排序应应用于 **详细信息** 行。按 `Store` 排序。\n16. 预览报表。您将在每个可排序列旁边看到箭头图标，如图\
  \ 6-38 所示。\n\n![A395630_1_En_6_Fig38_HTML.jpg](img/A395630_1_En_6_Fig38_HTML.jpg)\n\
  \n图 6-38. 排序图标\n\n单击图标可更改报表的排序顺序。第一次单击时，排序将变为升序。再次单击可更改为降序。您可以将 `Order Year` 列从降序更改为升序。您可以在\
  \ `Customer ID` 和 `Store` 之间切换详细信息的排序。\n\n\n## 创建钻取报告\n\n本章介绍了许多让报告动态化的绝佳方法，可能性无限。还有一个经常被要求的功能要向你展示：即能够点击报告中的某个单元格，自动导航至包含明细行的另一份报告。\n\
  \n请按照以下步骤创建明细报告：\n1.  在项目中新建一个名为 `Sales Details` 的报告。\n2.  向报告添加一个名为 `AdventureWorks`\
  \ 的数据源，该数据源指向 `AdventureWorks2016` 共享数据源。\n3.  向报告添加一个名为 `SalesDetails` 的嵌入式数据集。它应指向\
  \ `AdventureWorks` 数据源。\n4.  查询语句应为：\n    ```\n    SELECT C.CustomerID, SalesOrderID,\
  \ OrderDate, TotalDue,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
  \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
  \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
  \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
  \ = @Year AND T.TerritoryID = @Territory;\n    ```\n5.  向报告添加一个表格控件。\n6.  用以下字段填充表格控件：`CustomerID`、`Store`、`SalesOrderID`、`OrderDate`\
  \ 和 `TotalDue`。\n7.  将标题行加粗，并将 `TotalDue` 单元格格式设置为货币。设计应类似于图 6-39。\n    ![A395630_1_En_6_Fig39_HTML.jpg](img/A395630_1_En_6_Fig39_HTML.jpg)\n\
  \    图 6-39. 明细布局\n8.  将表格拖动到左上角，并收紧报告画布。\n9.  向报告添加一个报告页眉。\n10. 从“内置字段”文件夹中将“报告名称”拖入页眉。\n\
  11. 将字体大小更改为 14 磅，并展开文本框的宽度。\n12. 将 `Year` 参数拖动到页眉。\n13. 将 `SalesDetails` 数据集中的\
  \ `Territory` 字段拖动到页眉。由于这在表格外部，它将从数据集中提取第一个值。这是可行的，因为报告已按 `TerritoryID` 筛选，因此只有一个\
  \ `Territory` 值可用。报告布局应类似于图 6-40。\n    ![A395630_1_En_6_Fig40_HTML.jpg](img/A395630_1_En_6_Fig40_HTML.jpg)\n\
  \    图 6-40. 报告布局\n\n此时，运行报告以确保其正常运行是合理的。运行时，只需为参数输入 `2011` 和 `3`。此报告不会显示参数列表，而是将从另一份报告接收值。最终用户将始终通过点击汇总报告来运行报告，且应永远不需要看到参数。请按照以下步骤隐藏参数：\n\
  1.  切换回明细报告的设计视图。\n2.  打开 `Year` 参数的属性。\n3.  将 `选择参数可见性` 属性更改为 `隐藏`，并点击“确定”接受更改。\n\
  4.  对 `Territory` 参数重复此过程。\n\n下一步是向汇总报告中的某个单元格添加操作。请按照以下步骤添加操作：\n1.  创建 `Sales by\
  \ Territory Matrix` 报告的副本。将其命名为 `Sales Summary`。\n2.  双击 `Sales Summary` 报告以在设计视图中打开它。\n\
  3.  右键单击位于 `TerritoryID` 和 `OrderYear` 交叉处的单元格，调出“文本框属性”。图 6-41 显示了要选择的单元格。\n  \
  \  ![A395630_1_En_6_Fig41_HTML.jpg](img/A395630_1_En_6_Fig41_HTML.jpg)\n    图 6-41.\
  \ 要选择的单元格\n4.  选择“操作”页面。\n5.  选择 `转到报告`。\n6.  在 `指定报告` 中，选择 `Sales Details`。\n7.\
  \  点击 `添加`。这将从 `Sales Details` 报告添加一个参数以映射到 `Sales Summary` 报告。`名称` 属性是 `Sales Details`\
  \ 报告所需的参数。在 `值` 属性中，你将映射汇总报告中的某些内容以传递到明细报告。\n8.  在 `名称` 列中选择 `Year` 参数。\n9.  从 `值`\
  \ 列表中选择 `OrderYear`。\n10. 再次点击 `添加`。这次，将 `Territory` 映射到 `TerritoryID` 字段。对话框应类似于图\
  \ 6-42。\n    ![A395630_1_En_6_Fig42_HTML.jpg](img/A395630_1_En_6_Fig42_HTML.jpg)\n\
  \    图 6-42. 操作属性\n11. 点击“确定”接受属性设置。\n\n现在，当你运行报告时，点击 `Territory` 行上的任何总销售额值。`Sales\
  \ Details` 报告将打开，并已根据你选择的值进行筛选。要导航回 `Sales Summary` 报告，请点击 `返回父报告` 按钮。\n\n## 总结\n\
  \n在本章中，你看到了许多方法，可以根据用户交互性或数据本身使报告动态化。你可以让用户能够使用参数筛选数据或修改属性。文本框和其他控件可以通过基于数据的表达式进行格式化。你可以做的事情没有限制。\n\
  \n在第 7 章中，你将了解可以添加到报告中的视觉元素。这些元素可用于让报告仅凭一眼就能传达更多信息，或者用于创建仪表板。\n\n"
- '# 7. 用视觉呈现让数据生动起来


  一图胜千言。对于报告而言，一张图也胜过上千个数字。通过添加图表、仪表和地图，一份报告就能讲述一个完整的故事。我经常开玩笑说，在组织结构图中职位越高，报告中需要的图片就越多。这些图片能让忙碌的高管一眼就看出趋势和公司的健康状况。


  在第 4 章中，你看到了如何将存储在数据库中的图像添加到报告中。在第 10 章中，你将学习一个同样利用视觉元素的激动人心的新功能：移动报告。在本章中，你将向报告添加与数据连接的视觉元素，并创建一个仪表板。2016
  版中所有视觉元素的外观都已更新，因此它们看起来与之前版本中的有很大不同。



  '
- "# 向报表添加图表和图形\n\nSQL Server Reporting Services (SSRS) 使您能够通过图表控件向报表添加图表和图形。图表（chart）和图形（graph）有什么区别？严格来说，图形（graph）展示的是数据随时间变化的关系，而图表（chart）则用于比较不同类别。例如，图形可能显示按月统计的全年销售情况，而图表可能比较特定年份内不同区域的销售业绩。您可以在图\
  \ 7-1 中看到区别。\n\n![A395630_1_En_7_Fig1_HTML.jpg](img/A395630_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 比较图形与图表\n\n如果您想查看这些数据元素所使用的设计，请在本书的 Apress 网站 ([`www.Apress.com`](http://www.Apress.com))\
  \ 的 Code/Download 区域查找一个名为 Chart and Graph 的报表。在开始创建图表和图形之前，请先看一下图 7-2，以便了解构成这些可视化元素的各个部分。\n\
  \n![A395630_1_En_7_Fig2_HTML.jpg](img/A395630_1_En_7_Fig2_HTML.jpg)\n\n图 7-2. 图表的组成部分\n\
  \nSSRS 提供了丰富的图表类型。其中一些是 3-D 的；但是，应谨慎且有节制地使用 3-D 效果。将可视化元素设为 3-D 并不会增加其价值，反而可能扭曲尺寸，使理解控件所表示的数据变得更加困难。在本节中，您将学习如何向报表添加图表和图形。请按照以下步骤开始：\n\
  \n1.  创建一个新的 SSRS 项目，命名为 Visual Reports。解决方案名称应为 Beginning SSRS Chapter 7。\n2. \
  \ 向项目添加一个新的共享数据源，指向 `AdventureWorks2016` 数据库，命名为 `AdventureWorks2016`。如果需要回顾如何添加数据源和数据集，请参阅第\
  \ 3 章。\n3.  向项目添加一个新的共享数据集，命名为 `Year`。它应指向 `AdventureWorks` 共享数据源。此数据集将在多个报表中使用，因此能够重用它是有意义的。查询如下：\n\
  \    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\n\
  \    GROUP BY YEAR(OrderDate)\n    ORDER BY YEAR(OrderDate);\n    ```\n4.  如果 Microsoft\
  \ 的修复程序尚未发布，请务必修正共享数据集文件。更多信息请参见第 6 章。\n5.  向项目添加一个新报表，命名为 Charts。\n6.  向报表添加一个数据源，命名为\
  \ `AdventureWorks`，指向该共享数据源。\n7.  向报表添加一个新数据集，命名为 `Year`。选择“使用共享数据集”，并选择项目中的 `Year`\
  \ 数据集。对话框应如图 7-3 所示。\n    ![A395630_1_En_7_Fig3_HTML.jpg](img/A395630_1_En_7_Fig3_HTML.jpg)\n\
  \    图 7-3. Year 数据集\n8.  添加一个嵌入数据集，命名为 `Sales`，指向 `AdventureWorks` 数据源，并使用以下查询：\n\
  \    ```sql\n    SELECT SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth,\n\
  \    T.TerritoryID, T.Name AS TerritoryName,\n    Sum(Sum(TotalDue)) OVER(PARTITION\
  \ BY T.TerritoryID) AS TerritoryTotal\n    FROM Sales.SalesOrderHeader AS SOH\n\
  \    JOIN Sales.SalesTerritory AS T ON T.TerritoryID = SOH.TerritoryID\n    WHERE\
  \ YEAR(OrderDate) = @Year\n    GROUP BY MONTH(OrderDate), T.TerritoryID, T.Name;\n\
  \    ```\n9.  该查询通过 `@Year` 进行筛选。数据集将自动创建一个参数。展开“参数”文件夹，打开 `Year` 参数的属性。\n10. 选择“可用值”页面，并选择“从查询中获取值”。\n\
  11. 将“数据集”设置为 `Year`。将“值字段”和“标签字段”设置为 `OrderYear`。“可用值”页面应如图 7-4 所示。\n    ![A395630_1_En_7_Fig4_HTML.jpg](img/A395630_1_En_7_Fig4_HTML.jpg)\n\
  \    图 7-4. 可用值属性\n12. 设置一个默认值 `2012`。“默认值”页面应如图 7-5 所示。\n    ![A395630_1_En_7_Fig5_HTML.jpg](img/A395630_1_En_7_Fig5_HTML.jpg)\n\
  \    图 7-5. 默认值属性\n13. 单击“确定”接受更改。\n14. “报表数据”窗口现在应如图 7-6 所示。\n    ![A395630_1_En_7_Fig6_HTML.jpg](img/A395630_1_En_7_Fig6_HTML.jpg)\n\
  \    图 7-6. 添加完所有报表对象后的报表数据窗口\n\n看一下如图 7-7 所示的“工具箱”。图表、仪表和地图通常作为独立对象添加到报表中。数据栏、迷你图和指示器通常添加到\
  \ Tablix 的单元格中。在本节中，您将学习图表控件。\n\n![A395630_1_En_7_Fig7_HTML.jpg](img/A395630_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7. 工具箱\n\n请按照以下步骤向报表添加图表：\n\n1.  在设计视图中，将图表拖到设计画布上。\n2.  这将打开如图 7-8 所示的“选择图表类型”对话框，您可以在其中选择多种图表类型中的一种。\n\
  \    ![A395630_1_En_7_Fig8_HTML.jpg](img/A395630_1_En_7_Fig8_HTML.jpg)\n    图 7-8.\
  \ “选择图表类型”对话框\n3.  默认类型是柱形图。单击“确定”将其添加到报表中。\n4.  在进行任何修改之前，图表将如图 7-9 所示。\n    ![A395630_1_En_7_Fig9_HTML.jpg](img/A395630_1_En_7_Fig9_HTML.jpg)\n\
  \    图 7-9. 图表控件\n5.  要将数据连接到图表，请双击图表。这将打开如图 7-10 所示的“图表数据”窗口。\n    ![A395630_1_En_7_Fig10_HTML.jpg](img/A395630_1_En_7_Fig10_HTML.jpg)\n\
  \    图 7-10. 图表数据窗口\n6.  “图表数据”窗口分为三个部分。∑ 值窗口包含您想要度量的字段，由柱形的高度表示。单击加号并导航到 `AdventureWorks`\
  \ ➤ `Sales` 下的 `TotalSales` 字段以添加它。它将自动求和。\n7.  “类别组”部分包含用于横轴的值。将默认的“详细信息”更改为 `TerritoryName`。如果保持默认值，它将为数据集中的每一行显示一个柱形。在我们的例子中，我们希望每个区域一个柱形。\n\
  8.  “系列组”允许您将类别分解为多个更小的项目。您将在后面的示例中了解这一点。目前，“图表数据”窗口应如图 7-11 所示。\n    ![A395630_1_En_7_Fig11_HTML.jpg](img/A395630_1_En_7_Fig11_HTML.jpg)\n\
  \    图 7-11. 填写属性后的图表数据窗口\n9.  增加图表大小，使其宽度约为五英寸（13 厘米），高度约为四英寸（10 厘米）。为了辅助调整图表大小，您可以通过右键单击报表并选择“视图”\
  \ ➤ “标尺”来添加标尺。\n10. 预览报表。图表应如图 7-12 所示。\n    ![A395630_1_En_7_Fig12_HTML.jpg](img/A395630_1_En_7_Fig12_HTML.jpg)\n\
  \    图 7-12. 格式化前的图表\n\n此时，您可以看到柱形高度不同，并且横轴上显示了一些区域名称。显然，这个图表还需要大量调整，而且幸运的是，它的可定制性很高。图表的每个部分都有自己的属性窗口，可用于控制格式和位置。以下是需要修正的项目列表：\n\
  \n*   显示所有区域名称。\n*   添加两个坐标轴标题。\n*   将图表标题更改为 `按区域统计的销售总额` 以及年份。\n*   删除图例。\n* \
  \  格式化纵轴。\n*   添加一个工具提示，显示每个区域的精确金额。\n\n请按照以下步骤格式化图表：\n\n\n\n"
- "# 图表格式化与高级类型\n\n## 柱状图格式化\n\n1.  切换回设计视图。\n2.  右键单击水平轴并选择“水平轴属性”。\n3.  这将打开“水平轴属性”对话框。在“轴选项”页面上，将`Interval`属性更改为`1`并点击“确定”。这将使所有区域都在图表上显示。\n\
  4.  右键单击水平轴并选择“显示轴标题”。\n5.  右键单击水平“轴标题”并选择“轴标题属性”。\n6.  这将打开“轴标题属性”对话框。将文本标题更改为`Territory`并点击“确定”。\n\
  7.  右键单击垂直轴并选择“显示轴标题”。\n8.  除了通过打开“轴标题属性”对话框来更改轴标题，你也可以通过点击它并输入来更改。将垂直“轴标题”更改为`Sales\
  \ in thousands`。\n9.  右键单击“图表标题”并打开其属性。\n10. 在“标题文本”旁边，点击`fx`以打开“表达式”对话框。\n11. 要将年份参数添加到标题中，表达式应为：\n\
  \n    ```\n    =\"Total Sales by Territory for \" & Parameters!Year.Value\n    ```\n\
  \n12. 点击“确定”两次以接受属性设置。\n13. 选择图例“Total Sales”并按`Delete`键。在这种情况下，图表图例对报表没有增加任何价值。\n\
  14. 右键单击垂直轴并选择“垂直轴属性”。\n15. 在“垂直轴属性”对话框的“数字”页面上，在“类别”下选择“货币”。\n16. 将“小数位数”更改为`0`。\n\
  17. 勾选“使用千位分隔符 (,)”并勾选“以千为单位显示值”。“数字”页面应如图 7-13 所示。\n\n    ![A395630_1_En_7_Fig13_HTML.jpg](img/A395630_1_En_7_Fig13_HTML.jpg)\n\
  \n    图 7-13. 垂直轴的数字属性\n\n18. 点击“确定”以接受属性设置。\n19. 右键单击其中一个数据条并选择“系列属性”。\n20. 在“系列属性”对话框的“系列数据”页面上，点击“工具提示”旁边的`fx`符号。\n\
  21. 表达式应为：\n\n    ```\n    =FormatCurrency(Sum(Fields!TotalSales.Value),0)\n   \
  \ ```\n\n22. 点击“确定”两次以接受更改。\n\n现在当你预览报表时，图表应该类似于图 7-14。务必在一个或多个数据条上悬停光标以查看工具提示。\n\
  \n![A395630_1_En_7_Fig14_HTML.jpg](img/A395630_1_En_7_Fig14_HTML.jpg)\n\n图 7-14.\
  \ 格式化后的图表\n\n## 按销售额排序\n\n报表看起来相当不错，但你还可以做更多。比如，按总销售额对数据条排序，而不是按字母顺序？要执行此操作，请遵循以下步骤：\n\
  \n1.  切换到设计视图并双击图表以打开“图表数据”窗口。\n2.  点击`TerritoryName`旁边的向下箭头，并选择“类别组属性”，如图 7-15\
  \ 所示。\n\n    ![A395630_1_En_7_Fig15_HTML.jpg](img/A395630_1_En_7_Fig15_HTML.jpg)\n\
  \n    图 7-15. 选择“类别组属性”\n\n3.  选择“排序”页面，并将“排序依据”属性从`TerritoryName`更改为`TerritoryTotal`。此字段已作为每个区域的和进行了预聚合。你不能使用`Sum(TotalDue)`表达式进行排序。\n\
  4.  点击“确定”并预览报表。报表应如图 7-16 所示。\n\n    ![A395630_1_En_7_Fig16_HTML.jpg](img/A395630_1_En_7_Fig16_HTML.jpg)\n\
  \n    图 7-16. 按总销售额排序的图表\n\n## 树状图\n\n这种图表类型可能是显示此信息的最佳方式，但你还可以使用其他几种类型。可以使用饼图，但由于类别数量多，用户可能难以理解。漏斗图或金字塔图也可能适用，但你也可以选择树状图控件。这种图表类型是\
  \ SSRS 2016 的新功能。\n\n按照以下步骤学习如何使用新的树状图：\n\n1.  切换回设计视图。\n2.  增加报表画布的长度，为下一个图表腾出空间。\n\
  3.  向报表添加一个图表。\n4.  在“选择图表类型”对话框中，选择“树状图”，如图 7-17 所示，然后点击“确定”。\n\n    ![A395630_1_En_7_Fig17_HTML.jpg](img/A395630_1_En_7_Fig17_HTML.jpg)\n\
  \n    图 7-17. 选择新的“树状图”图表\n\n5.  增大图表的尺寸。\n6.  通过双击图表打开“图表数据”窗口。\n7.  将`TotalSales`添加到`∑`值部分。\n\
  8.  将“类别组”值设置为`TerritoryName`。这将为每个区域创建一个部分，但它们的颜色将相同。\n9.  为使每个区域颜色不同，同时将“序列组”也设置为`TerritoryName`。\n\
  10. 预览报表。此时，图表将如图 7-18 所示。\n\n    ![A395630_1_En_7_Fig18_HTML.jpg](img/A395630_1_En_7_Fig18_HTML.jpg)\n\
  \n    图 7-18. 格式化前的树状图图表\n\n注意，某些单元格显示了两次区域，而有些则没有任何显示。为了解决这个问题，使用工具提示来显示信息。按照以下步骤添加工具提示并完成格式化：\n\
  \n1.  切换回设计视图。\n2.  右键单击一个序列单元格并点击“显示数据标签”，如图 7-19 所示。这实际上会将底部的标签切换为总销售额。\n\n  \
  \  ![A395630_1_En_7_Fig19_HTML.jpg](img/A395630_1_En_7_Fig19_HTML.jpg)\n\n    图\
  \ 7-19. 显示数据标签\n\n3.  右键单击其中一个数字并选择“序列标签属性”。\n4.  选择“序列标签属性”对话框的“数字”页面，格式化为货币，无小数位，并使用千位分隔符。\n\
  5.  点击“确定”接受更改。\n6.  右键单击一个序列单元格并选择“序列属性”。\n7.  点击“工具提示”属性旁边的`fx`，使用以下表达式：\n\n \
  \   ```\n    =Fields!TerritoryName.Value & \" \" &\n    FormatCurrency(Sum(Fields!TotalSales.Value),0)\n\
  \    ```\n\n8.  点击“确定”两次以关闭对话框。\n9.  将“图表标题”更改为以下表达式：\n\n    ```\n    =\"Sales by\
  \ Territory for \" & Parameters!Year.Value\n    ```\n\n10. 预览报表。图表应类似于图 7-20。\n\n\
  \    ![A395630_1_En_7_Fig20_HTML.jpg](img/A395630_1_En_7_Fig20_HTML.jpg)\n\n   \
  \ 图 7-20. 格式化后的树状图图表\n\n## 折线图\n\n折线图类型也很有趣。使用它，你可以创建一个图表，比较多个类别随时间的变化。在这种情况下，你将创建一个图表，显示一年内每个月各区域的销售情况。按照以下步骤创建该图表：\n\
  \n1.  切换回设计视图。\n2.  扩大报表画布的尺寸。\n3.  向报表添加一个新图表，如图 7-21 所示。\n\n    ![A395630_1_En_7_Fig21_HTML.jpg](img/A395630_1_En_7_Fig21_HTML.jpg)\n\
  \n    图 7-21. 选择折线图\n\n4.  增大图表的尺寸。\n5.  按照图 7-22 所示设置“图表数据”属性。“序列组”属性会将折线分割为各个区域。\n\
  \n    ![A395630_1_En_7_Fig22_HTML.jpg](img/A395630_1_En_7_Fig22_HTML.jpg)\n\n  \
  \  图 7-22. 图表数据属性\n\n6.  将水平轴的`Interval`属性更改为`1`，以便显示所有月份。\n7.  要将水平轴中的月份从数字更改为月份名称，请点击“图表数据”窗口中`OrderMonth`旁边的向下箭头，并选择“类别组属性”，如图\
  \ 7-23 所示。\n\n    ![A395630_1_En_7_Fig23_HTML.jpg](img/A395630_1_En_7_Fig23_HTML.jpg)\n\
  \n    图 7-23. 选择“类别组属性”\n\n8.  点击“标签”旁边的`fx`图标并添加此表达式：\n\n    ```\n    =MonthName(Fields!OrderMonth.Value)\n\
  \    ```\n\n9.  点击“确定”两次以关闭两个对话框。\n10. 选择其中一个序列线并选择“序列属性”。\n11. 将工具提示属性更改为以下表达式：\n\
  \n\n\n"
- "# 配置图表\n\n```\n=Fields!TerritoryName.Value & \" \" & FormatCurrency(Fields!TotalSales.Value,0)\n\
  ```\n\n12. 单击 **OK** 关闭 **Expressions** 对话框，然后选择 **Markers** 页面。\n13. 将 **Marker\
  \ Type** 更改为 **Circle** 并单击 **OK**。\n14. 右键单击图例并打开其属性。\n15. 将图例位置更改为顶部，如图 7-24 所示。\n\
  \    ![A395630_1_En_7_Fig24_HTML.jpg](img/A395630_1_En_7_Fig24_HTML.jpg)\n    **图\
  \ 7-24. 图例位置**\n16. 单击 **OK** 接受更改。\n17. 将图表标题更改为\n    ```\n    =\"Sales by Month\
  \ for \" & Parameters!Year.Value\n    ```\n18. 打开垂直轴属性并设置垂直轴格式，使其显示为货币格式，无小数位，并包含千位分隔符。\n\
  19. 仅以千为单位显示数值，然后单击 **OK** 保存更改。\n20. 右键单击垂直轴并选择 **Show Axis Title**。标题应为 **Sales\
  \ in Thousands**。\n21. 将水平轴的 **Interval** 属性设置为 `1`，以显示所有月份。\n22. 预览报表。它应类似于图 7-25。\n\
  \    ![A395630_1_En_7_Fig25_HTML.jpg](img/A395630_1_En_7_Fig25_HTML.jpg)\n    **图\
  \ 7-25. 销售图表**\n\n"
- "# 向报表添加仪表\n\n图表和图形用于在类别、时间或两者上比较值。仪表可用于显示单个目标是否达成。达到销售配额就是一个很好的例子。仪表看起来像温度计和表盘，它们的配置比图表更复杂。\n\
  \n在深入细节之前，先了解一下构成仪表的不同部分，如图 7-26 所示。\n![A395630_1_En_7_Fig26_HTML.jpg](img/A395630_1_En_7_Fig26_HTML.jpg)\n\
  **图 7-26. 仪表的组成部分**\n\n**刻度** 代表您预期的值范围。它可以是数值（如美元）或百分比。刻度的最高值可以是目标或配额。但是，如果可能超过目标，您可能希望将最高值设置得比目标高，例如目标加上\
  \ 25%。\n\n**范围** 突出显示刻度上的某些区域。例如，您可能希望突出显示目标。您可以自定义范围的颜色，一种方法是将范围的颜色从红色渐变到绿色。可以添加多个范围以对颜色进行更精细的控制。\n\
  \n**指针** 代表已实现的值。一眼就能看出目标是否达成，这取决于指针距离目标有多近。有几种类型的仪表可供选择，包括带有两个表盘的仪表和带有对数刻度的仪表。要了解如何使用仪表，请按照以下步骤操作：\n\
  \n1.  向项目添加一个名为 `Gauges` 的新报表。\n2.  设置一个指向 `AdventureWorks2016` 的数据源，命名为 `AdventureWorks`。\n\
  3.  添加一个名为 `Year` 的数据集，指向 `Year` 共享数据集。\n4.  `AdventureWorks` 数据库中有一个包含配额的表，但与销售相比，这些值不太合理。因此，创建一个名为\
  \ `SalesQuota` 的数据集，使用此包含硬编码值的查询：\n    ```\n    SELECT * FROM\n    (VALUES(2011,1000,\
  \ 899),\n    (2012,1000,1010),\n    (2013,1200,1100),\n    (2014,1200,1220))\n \
  \   AS Quota ([Year],[Target],Sales)\n    WHERE [Year] = @Year;\n    ```\n5.  将自动创建一个\
  \ `Year` 参数。将 **Available Values** 更改为 **Get values from a query**。**Dataset** 为\
  \ `Year`。**Value field** 和 **Label field** 应设置为 `OrderYear`。\n6.  向报表添加一个仪表。选择 **Radial\
  \ graph**，如图 7-27 所示。\n    ![A395630_1_En_7_Fig27_HTML.jpg](img/A395630_1_En_7_Fig27_HTML.jpg)\n\
  \    **图 7-27. 向报表添加径向仪表**\n7.  单击仪表时，将打开 **Gauge Data** 窗口。在 `LinearPointer1` 下，将\
  \ `Unspecified` 更改为 `Sales`。它将自动求和，如图 7-28 所示。\n    ![A395630_1_En_7_Fig28_HTML.jpg](img/A395630_1_En_7_Fig28_HTML.jpg)\n\
  \    **图 7-28. 仪表数据属性**\n8.  右键单击仪表内部。选择 **Gauge Panel** ➤ **Scale Properties**。\n\
  9.  默认情况下，刻度范围是 0 到 100。要将其更改为与数据中的值匹配，请在 **General** 页面上单击 **Maximum** 属性的 `fx`\
  \ 符号。\n10. 将表达式更改为\n    ```\n    =Fields!Target.Value * 1.25\n    ```\n11. 切换到 **Number**\
  \ 页面并格式化为 **Currency**，无小数位。\n12. 单击 **OK** 接受属性。\n13. 通过右键单击仪表并选择 **Gauge Panel**\
  \ ➤ **Range (LinearRange3) Properties**，打开最顶部范围的属性。\n14. 在 **General** 页面上，将 **Start\
  \ range at scale value** 属性更改为以下表达式：\n    ```\n    =Fields!Target.Value * .95\n\
  \    ```\n15. 将 **End range at scale value** 更改为以下表达式：\n    ```\n    =Fields!Target.Value\
  \ * 1.25\n    ```\n16. 单击 **OK** 接受属性。\n17. 打开中间范围 `LinearRange2` 的属性。\n18. 将 **Start\
  \ range at scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n    ```\n\
  19. 将 **End Range at Scale Value** 设置为\n    ```\n    =Fields!Target.Value * .95\n\
  \    ```\n20. 单击 **OK**。\n21. 打开最底部范围 `LinearRange1` 的属性。\n22. 将 **End range at\
  \ scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n    ```\n\n\n\n##\
  \ 仪表盘配置与表格集成\n\n1.  切换到设计视图。\n2.  要在一个报表中显示所有年份，请添加一个名为 `SalesAllYears` 的新数据集，其查询如下：\n\
  \n    ```sql\n    SELECT * FROM\n    (VALUES(2011,1000, 899),\n    (2012,1000,1010),\n\
  \    (2013,1200,1100),\n    (2014,1200,1220))\n    AS Quota ([Year],[Target],Sales);\n\
  \    ```\n\n3.  向报表添加一个表格。\n4.  从 `SalesAllYears` 数据集向表格添加字段 `Year`、`Target` 和 `Sales`。\n\
  5.  在右侧添加一个新列。\n6.  将一个仪表盘拖到新的数据单元格中。\n7.  选择线性水平仪表盘，如图 7-30 所示。\n\n    ![A395630_1_En_7_Fig30_HTML.jpg](img/A395630_1_En_7_Fig30_HTML.jpg)\n\
  \n    **图 7-30.**\n\n    线性水平仪表盘\n\n8.  调整单元格的高度和宽度，使表格设计看起来如图 7-31。\n\n    ![A395630_1_En_7_Fig31_HTML.jpg](img/A395630_1_En_7_Fig31_HTML.jpg)\n\
  \n    **图 7-31.**\n\n    表格设计\n\n9.  双击仪表盘，调出“仪表盘数据”窗口。将 `LinearPointer1` 下的值更改为\
  \ `Sales`。它将自动求和。\n10. 调出“刻度属性”，将“最大值”更改为以下表达式：\n\n    ```sql\n    =Fields!Target.Value\
  \ * 1.25\n    ```\n\n11. 将“间隔”属性更改为 `200`。\n12. 在“数字”页面，将“类别”更改为“货币”。\n13. 更改为 0\
  \ 位小数，并选中“使用千位分隔符 (,)”。\n14. 在“标签”页面，取消选中“在刻度末端显示标签”。\n15. 单击“确定”接受更改。\n16. 右键单击仪表盘并选择“添加范围”。\n\
  17. 调出“范围属性”。\n18. 将“范围起始刻度值”和“范围结束刻度值”都更改为 `Sum(Target)`。\n19. 在“边框”页面，将“线宽”更改为\
  \ `5 pt`。\n20. 单击“确定”接受更改。\n21. 选择包含仪表盘的单元格。\n22. 在“属性”窗口中，将 `BorderStyle Default`\
  \ 属性更改为 `Solid`，将 `BorderColor` 属性更改为 `LightGray`。\n\n当您预览报表时，表格应如图 7-32 所示。\n\n\
  ![A395630_1_En_7_Fig32_HTML.jpg](img/A395630_1_En_7_Fig32_HTML.jpg)\n\n**图 7-32.**\n\
  \n带有嵌入式仪表盘的表格\n\n## 向表格添加数据条、迷你图和指示器\n\n您在上一节中看到了可以向表格单元格添加仪表盘。有三种可视化控件——数据条、迷你图和指示器——设计用于在单元格内使用。指示器是简化的仪表盘。数据条和迷你图是简化的图表。要了解如何添加指示器，请按照以下步骤操作：\n\
  \n1.  向项目添加一个名为 `SmallControls` 的新报表。\n2.  添加指向共享 `AdventureWorks2016` 数据集的 `AdventureWorks`\
  \ 数据源。\n3.  添加一个名为 `Sales` 的嵌入数据集，其查询如下：\n\n    ```sql\n    SELECT YEAR(OrderDate)\
  \ AS OrderYear, MONTH(OrderDate) AS OrderMonth,\n    SUM(TotalDue) AS Sales\n  \
  \  FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate), MONTH(OrderDate);\n\
  \    ```\n\n4.  向报表添加一个表格。\n5.  向详细信息行添加 `Sales` 字段。\n6.  右键单击详细信息行并选择“添加组”➤“父组”。\n\
  7.  在“Tablix 组”对话框中，为“分组依据”属性选择 `OrderYear`。\n8.  选中“添加组标题”。对话框应如图 7-33 所示。\n\n\
  \    ![A395630_1_En_7_Fig33_HTML.jpg](img/A395630_1_En_7_Fig33_HTML.jpg)\n\n   \
  \ **图 7-33.**\n\n    `OrderYear` 组\n\n9.  单击“确定”。\n10. 通过右键单击行并选择“删除行”来删除详细信息行。\n\
  11. 当询问是否要删除行和组时，单击“确定”。\n12. 在 `Sales` 下的数据单元格中，选择 `Sales`。它将自动求和。\n13. 将一个“指示器”从工具箱拖到该行的第三个数据单元格中。\n\
  14. 选择默认的“方向”样式并单击“确定”。\n15. 删除空列。\n16. 单击带有指示器的单元格。您将在“属性”窗口中看到 `GaugePanel1`。将\
  \ `BorderStyle Default` 属性更改为 `Solid`。\n17. 双击保存指示器的单元格。将“仪表盘数据”值更改为 `Sales`。它将自动求和，如图\
  \ 7-34 所示。\n\n    ![A395630_1_En_7_Fig34_HTML.jpg](img/A395630_1_En_7_Fig34_HTML.jpg)\n\
  \n    **图 7-34.**\n\n    仪表盘数据属性\n\n当您运行报表时，它将如图 7-35 所示。\n\n![A395630_1_En_7_Fig35_HTML.jpg](img/A395630_1_En_7_Fig35_HTML.jpg)\n\
  \n**图 7-35.**\n\n带有指示器的报表\n\n默认情况下，指示器设置为根据销售百分比显示三个可能的图标。在设计视图中，右键单击单元格并选择“指示器属性”。您可以在“值和状态”页面上更改指示器的行为，如图\
  \ 7-36 所示。\n\n![A395630_1_En_7_Fig36_HTML.jpg](img/A395630_1_En_7_Fig36_HTML.jpg)\n\
  \n**图 7-36.**\n\n“值和状态”页面\n\n更改“起始值”和“结束值”以匹配图 7-37。\n\n![A395630_1_En_7_Fig37_HTML.jpg](img/A395630_1_En_7_Fig37_HTML.jpg)\n\
  \n**图 7-37.**\n\n新的指示器属性\n\n单击“确定”接受更改。现在当您运行报表时，处于第 50 个百分位数的所有销售指示器都将是红色的向下箭头，如图\
  \ 7-38 所示。\n\n![A395630_1_En_7_Fig38_HTML.jpg](img/A395630_1_En_7_Fig38_HTML.jpg)\n\
  \n**图 7-38.**\n\n指示器更改后的结果\n\n此报表在年份级别显示数据。您可以使用迷你图来显示各月的销售情况。请按照以下步骤了解如何操作：\n\n\
  1.  切换到设计视图。\n2.  在指示器右侧添加一个新列。\n3.  将一个迷你图控件拖到新的数据单元格中。\n4.  选择“带标记的折线图”迷你图类型，如图\
  \ 7-39 所示，然后单击“确定”。\n\n    ![A395630_1_En_7_Fig39_HTML.jpg](img/A395630_1_En_7_Fig39_HTML.jpg)\n\
  \n    **图 7-39.**\n\n\n\n## 带标记的折线图\n5.  双倍调整包含折线图的表格单元格的宽度。\n6.  双击该单元格以打开“图表数据”属性。\n\
  7.  将 ∑ 值更改为 `Sales`，并将“类别组”更改为 `OrderMonth`。\n8.  单击折线图，直到标记亮起。\n9.  右键单击折线图，然后选择“系列属性”。\n\
  10. 将 `ToolTip` 属性更改为以下表达式，然后单击“确定”：\n```\n=MonthName(Fields!OrderMonth.Value) &\
  \ \" \"\n& FormatCurrency(Fields!Sales.Value,0)\n```\n11. 选择包含折线图的单元格。在“属性”窗口中，将\
  \ `BorderStyle` 的默认属性更改为 `Solid`。\n\n现在，当您运行报表时，可以将光标悬停在线上以查看月份名称和该月的销售总额。图 7-40\
  \ 显示了报表应有的外观：\n![A395630_1_En_7_Fig40_HTML.jpg](img/A395630_1_En_7_Fig40_HTML.jpg)\n\
  图 7-40.\n带有折线图的报表\n\n可以像添加和配置折线图一样添加和配置数据条。区别在于，每个数据点将对应一个单独的条形，而不是一条线。请按照以下步骤添加数据条：\n\
  1.  切换到设计视图。\n2.  向表格添加一个新列。\n3.  将数据条拖到新单元格中。\n4.  如图 7-41 所示，选择“数据列”类型。\n![A395630_1_En_7_Fig41_HTML.jpg](img/A395630_1_En_7_Fig41_HTML.jpg)\n\
  图 7-41.\n添加数据条\n5.  扩展单元格的宽度。\n6.  在“图表数据”窗口中，在 ∑ 值属性下选择 `Sales`。\n7.  将 `OrderMonth`\
  \ 添加到“类别组”部分。\n8.  在这种情况下，您将按值而非月份排序。单击“类别组”部分中 `OrderMonth` 旁边的箭头。\n9.  选择“类别组属性”。\n\
  10. 在“排序”页面上，将 `OrderMonth` 替换为 `Sales`。\n11. 单击“确定”。\n12. 单击单元格。在“属性”窗口中，将 `BorderStyle`\
  \ 的默认属性更改为 `Solid`。\n13. 单击其中一个数据条，直到每个数据条上方出现一个小圆圈。\n14. 右键单击并打开“系列属性”。\n15. 将以下表达式添加到“工具提示”属性：\n\
  ```\n=MonthName(Fields!OrderMonth.Value) & \" \"\n& FormatCurrency(Fields!Sales.Value,0)\n\
  ```\n预览报表时，其外观应如图 7-42 所示。\n![A395630_1_En_7_Fig42_HTML.jpg](img/A395630_1_En_7_Fig42_HTML.jpg)\n\
  图 7-42.\n带有数据条的报表\n\n## 向报表添加地图\n可以说，SSRS 最引人入胜的功能是能够向报表添加地图。在本节中，您将学习如何添加一个连接到来自\
  \ AdventureWorks 地理数据的地图。这只是地图功能所能实现的冰山一角。事实上，整个主题可以写成一本书。请按照以下步骤学习如何向报表添加一个简单的地图：\n\
  1.  向项目添加一个名为 `Map` 的新报表。\n2.  添加一个名为 `AdventureWorks` 的数据源，指向共享的 `AdventureWorks2016`\
  \ 数据源。\n3.  添加一个名为 `Year` 的数据集，指向共享的 `Year` 数据集。\n4.  添加一个名为 `MapData` 的嵌入数据集，使用以下查询：\n\
  ```\nDECLARE @Year INT = 2013;\nSELECT SUM(TotalDue) AS Sales, vS.CountryRegionName,\
  \ vS.StateProvinceName\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Person.BusinessEntityAddress\
  \ AS BEA\nON BEA.BusinessEntityID = SOH.CustomerID\nJOIN Person.Address AS A ON\
  \ BEA.AddressID = A.AddressID\nJOIN Person.vStateProvinceCountryRegion AS vS\nON\
  \ A.StateProvinceID = vS.StateProvinceID\nWHERE CountryRegionName = 'United States'\n\
  AND YEAR(OrderDate) = @Year\nGROUP BY A.City, vS.CountryRegionName, vS.StateProvinceName;\n\
  ```\n5.  `Year` 参数将自动添加。将可用值连接到 `Year` 数据集。此时，`MapData` 数据集是硬编码为 2013 年的，这是使地图向导工作所必需的。地图完成后，您将使报表动态化。\n\
  6.  向报表添加一个地图控件，这将启动一个向导。\n7.  在“选择空间数据源”页面上，选择“地图库”并选择“美国（按州）”，如图 7-43 所示。\n![A395630_1_En_7_Fig43_HTML.jpg](img/A395630_1_En_7_Fig43_HTML.jpg)\n\
  图 7-43.\n选择地图数据源\n8.  单击“下一步”。\n9.  在“选择空间数据和地图视图选项”页面上，您可以修改地图的分辨率、位置和缩放级别。通过向下拖动左侧的指针使地图稍微小一些。通过抓取地图并移动它来调整位置，使阿拉斯加、夏威夷和美国大陆都可见。单击“下一步”。\n\
  10. 在“选择地图可视化效果”页面上，选择“颜色分析地图”，然后单击“下一步”。\n11. 在“选择分析数据集”页面上，选择 `MapData`，然后单击“下一步”。\n\
  12. “指定空间数据和分析数据的匹配字段”页面用于将地图属性连接到数据中的字段。勾选 `STATENAME` 旁边的框。\n13. 在“分析数据集字段”下拉框中，选择\
  \ `StateProvinceName`。您可以通过比较底部两个部分中突出显示的列来验证是否做出了正确的选择，如图 7-44 所示。\n![A395630_1_En_7_Fig44_HTML.jpg](img/A395630_1_En_7_Fig44_HTML.jpg)\n\
  图 7-44.\n地图数据连接到数据集列\n14. 单击“下一步”。\n15. 在“选择颜色主题和数据可视化效果”页面上，从“要可视化的字段”列表中选择 `Sum(Sales)`。\n\
  16. 在“颜色规则”列表中，选择“红-黄-绿”。\n17. 该页面应如图 7-45 所示。\n![A395630_1_En_7_Fig45_HTML.jpg](img/A395630_1_En_7_Fig45_HTML.jpg)\n\
  图 7-45.\n“选择颜色主题和数据可视化效果”页面\n18. 单击“完成”。\n19. 打开 `MapData` 数据集属性。\n20. 从以下查询中删除此文本：\n\
  ```\nDECLARE @Year INT = 2013;\n```\n21. 单击“确定”以接受更改。为了将数据连接到地图，必须提供参数的值。现在地图已完成，可以删除此行。\n\
  \n当您预览报表并选择 2012 年时，应该会看到已填充的地图，如图 7-46 所示。\n![A395630_1_En_7_Fig46_HTML.jpg](img/A395630_1_En_7_Fig46_HTML.jpg)\n\
  图 7-46.\n已填充的地图\n\n要向地图添加工具提示，请按照以下步骤操作：\n1.  切换回设计视图。\n2.  单击地图以打开“地图图层”窗口。\n3.\
  \  单击 `PolygonLayer` 中的向下箭头，然后选择“多边形属性”，如图 7-47 所示。\n![A395630_1_En_7_Fig47_HTML.jpg](img/A395630_1_En_7_Fig47_HTML.jpg)\n\
  图 7-47.\n打开多边形属性\n4.  将 `Tooltip` 属性更改为以下表达式：\n```\n=Fields!StateProvinceName.Value\
  \ & \" \" &  FormatCurrency(Fields!Sales.Value,0)\n```\n5.  将地图标题更改为以下表达式：\n```\n\
  =\"US Sales by State \" & Parameters!Year.Value\n```\n6.  右键单击地图图例并打开属性。将“图例位置”更改为地图底部。\n\
  7.  勾选“在视区外部显示图例”，如图 7-48 所示。\n![A395630_1_En_7_Fig48_HTML.jpg](img/A395630_1_En_7_Fig48_HTML.jpg)\n\
  图 7-48.\n更改地图图例位置\n8.  单击“确定”。\n9.  将地图图例标题从“标题”更改为“Sales”。\n10. 删除“颜色比例尺”。\n11.\
  \ 删除“距离比例尺”。\n\n当您运行报表并选择 2012 年时，报表应如图 7-49 所示。\n![A395630_1_En_7_Fig49_HTML.jpg](img/A395630_1_En_7_Fig49_HTML.jpg)\n\
  图 7-49.\n最终的地图报表\n\n\n\n"
- "# 第三部分\n部署报表\n\n## 构建仪表板\n\n仪表板让繁忙的高管只需一瞥就能看到业务的当前状况。他们可以看到随时间变化的趋势以及关键绩效指标的达成情况。在本节中，您将把创建的多个可视化元素组合到一份报表中。\n\
  \n请按照以下步骤开始：\n\n1.  添加一个名为 `Dashboard` 的新报表。\n2.  从“报表”菜单中打开“报表属性”。\n3.  将报表的布局更改为“横向”。\n\
  4.  将所有页边距更改为 0.25 英寸或 0.625 厘米，如图 7-50 所示。\n\n![A395630_1_En_7_Fig50_HTML.jpg](img/A395630_1_En_7_Fig50_HTML.jpg)\n\
  \n图 7-50. 报表属性页面\n\n5.  单击“确定”保存更改。\n6.  向报表添加一个名为 `AdventureWorks` 的数据源，该数据源指向共享数据源\
  \ `AdventureWorks2016`。\n7.  添加一个名为 `Year` 的数据集，该数据集指向共享数据集 `Year`。\n8.  添加一个名为\
  \ `Year` 的参数，数据类型为整数。“常规”页面应如图 7-51 所示。\n\n![A395630_1_En_7_Fig51_HTML.jpg](img/A395630_1_En_7_Fig51_HTML.jpg)\n\
  \n图 7-51. Year 参数属性\n\n9.  将可用值连接到 `Year` 数据集。\n10. 为参数添加一个默认值 `2014`。\n11. 单击“确定”。\n\
  12. 创建一个新的嵌入数据集 `Sales`，指向 `AdventureWorks`，并使用以下查询：\n\n```sql\n    SELECT SUM(TotalDue)\
  \ AS TotalSales, MONTH(OrderDate) AS OrderMonth,\n    T.TerritoryID, T.Name AS TerritoryName,\n\
  \    Sum(Sum(TotalDue)) OVER(PARTITION BY T.TerritoryID) AS TerritoryTotal\n   \
  \ FROM Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON T.TerritoryID\
  \ = SOH.TerritoryID\n    WHERE YEAR(OrderDate) = @Year\n    GROUP BY MONTH(OrderDate),\
  \ T.TerritoryID, T.Name;\n```\n\n13. 向报表添加一个页面页眉。\n14. 在页眉中添加一个文本框，使用以下表达式：\n\n\
  ```expression\n    =\"Sales Dashboard for \" & Parameters!Year.Value\n```\n\n15.\
  \ 将文本框的字体大小增加到 16 磅。\n16. 扩展文本框的宽度。\n17. 在设计视图中打开 `Charts` 报表。\n18. 使用 `CTRL+C`\
  \ 快捷键从该报表中复制条形图，并将其粘贴到 `Dashboard` 报表中。\n\n当您运行报表时，它应如图 7-52 所示。\n\n![A395630_1_En_7_Fig52_HTML.jpg](img/A395630_1_En_7_Fig52_HTML.jpg)\n\
  \n图 7-52. 包含第一个可视化元素的仪表板\n\n您可以继续向仪表板添加嵌入式可视化元素，但也可以添加包含表格或可视化元素的子报表。请按照以下步骤添加子报表：\n\
  \n1.  切换到 `Map` 报表的设计视图。\n2.  将地图拖动到报表的左上角。\n3.  尽可能向内拖动报表的边距。\n4.  保存报表。\n5.  在\
  \ `Dashboard` 报表的设计视图中，在条形图右侧添加一个子报表控件。\n6.  调整子报表的大小，使其与条形图的大小大致相同。\n7.  右键单击子报表，选择“子报表属性”。\n\
  8.  将“将此报表用作子报表”属性设置为 `Map`。\n9.  在“参数”页面上，您可以将子报表所需的任何参数映射到父报表中的值。单击“添加”以添加第一个参数。\n\
  10. 在“名称”下选择 `Year`。这是子报表所需的参数。\n11. 在“值”下，选择 `fx` 图标以打开表达式生成器。\n12. 将表达式更改为 `=Parameters!Year.Value`，然后单击“确定”两次。\n\
  13. 预览报表。您可以根据需要调整 `Map` 报表中地图和子报表的大小。报表应如图 7-53 所示。\n\n![A395630_1_En_7_Fig53_HTML.jpg](img/A395630_1_En_7_Fig53_HTML.jpg)\n\
  \n图 7-53. 包含两个可视化元素的仪表板\n\n14. 在设计视图中打开 `SmallControls` 报表。\n15. 将表格拖动到左上角。\n16.\
  \ 向内拖动报表边缘。\n17. 如果之前未操作，请将 `sales` 字段格式化为货币，无小数位，并使用千位分隔符。\n18. 保存 `SmallControls`\
  \ 报表。\n19. 将 `SmallControls` 报表作为子报表添加到 `Dashboard` 报表中条形图的下方。此子报表没有需要映射的参数。\n\n\
  当您查看报表时，它应类似于图 7-54。\n\n![A395630_1_En_7_Fig54_HTML.jpg](img/A395630_1_En_7_Fig54_HTML.jpg)\n\
  \n图 7-54. 完成的仪表板\n\n## 小结\n\nSSRS 提供了多种连接到数据集的可视化元素。这些对象还具有许多可配置属性，可以增强报表和仪表板的视觉吸引力。本章向您介绍了所有的图表、仪表和地图，包括几种旨在放入\
  \ Tablix 单元格中的图表。\n\n在第 8 章中，您将学习如何将报表发布到新的 Reporting Services Web 门户。\n\n## 8.\
  \ 发布报表\n\n我撰写文章、博客帖子、书籍和每月的通讯。在它们发布之前，它们只存在于我的笔记本电脑上，只有我能看到。我写作的目的是让其他人也能阅读。我的目标是向全世界的人们传授\
  \ SQL Server 知识，为了实现这一点，我的作品必须被发布。\n\n您可以在计算机上使用 SQL Server Data Tools (`SSDT`)\
  \ 创建出色的报表，但在这些报表发布之前，对于请求它们的人来说它们是没有用的。在本章中，您将学习如何发布您在本书中创建的报表。\n\n\n\n## 在 Web\
  \ 门户中导航\n\n在 SQL Server Reporting Services (SSRS) 的所有历史版本中，当其以本机模式安装时，SSRS 报表的默认用户界面一直是\
  \ `报表管理器`，如图 8-1 所示。\n\n![A395630_1_En_8_Fig1_HTML.jpg](img/A395630_1_En_8_Fig1_HTML.jpg)\n\
  图 8-1. `报表管理器`\n\n从 `SSRS` 2016 版本开始，`报表管理器` 已被新的 `SSRS Web 门户` 所取代。这一变化不仅代表了一次升级，还使\
  \ `SSRS` 能够适应新的移动世界，提供了旨在用于智能手机和平板电脑的新报表类型。如果你在过去几年中管理过 `SSRS` 报表，很可能收到过关于 Web 浏览器兼容性的投诉。从\
  \ 2016 版本开始，现代 Web 浏览器得到了支持！\n\n在过去几个版本中，许多新的 `SSRS` 功能仅在 `SSRS` 以 SharePoint 集成模式安装时才可用。本次发布则很好地偏离了这一趋势。那些仅限\
  \ SharePoint 的功能，例如数据驱动报表，并未向后移植到本机模式，但有几个新功能仅在本机模式下可用。图 8-2 展示了新的门户。\n\n![A395630_1_En_8_Fig2_HTML.jpg](img/A395630_1_En_8_Fig2_HTML.jpg)\n\
  图 8-2. 新的 `Web 门户`\n\n除了承载传统的分页报表外，`Web 门户` 还承载独立的 `KPI`（关键绩效指标）以及可在平板电脑和智能手机上运行的移动报表。你将在第\
  \ 10 章学习如何构建 `KPI` 和移动报表。\n\n`Web 门户` 有两个页面或模式：`收藏夹` 和 `浏览`。`浏览` 页面看起来更像传统的视图。你可以在那里看到存储报表和其他对象的文件夹，如图\
  \ 8-3 所示。\n\n![A395630_1_En_8_Fig3_HTML.jpg](img/A395630_1_En_8_Fig3_HTML.jpg)\n\
  图 8-3. `浏览` 页面\n\n当你点击一个文件夹，例如 `报表` 文件夹时，你将看到该文件夹内的对象。图 8-4 显示了 `报表` 文件夹的内容。\n\n\
  ![A395630_1_En_8_Fig4_HTML.jpg](img/A395630_1_En_8_Fig4_HTML.jpg)\n图 8-4. `报表` 文件夹\n\
  \n在每个文件夹内部，你可以存储 `KPI`、移动报表和分页报表。你还会看到文件夹，通常位于 `主目录` 文件夹中，用于存放数据源和其他可以发布的对象。在文件夹顶部，你可以看到一条返回\
  \ `主目录` 文件夹的路径。要运行分页报表，你只需导航到该报表并点击它即可。\n\n`收藏夹` 页面是由每个用户专门填充的。要将报表添加到 `收藏夹` 页面，只需点击对象旁边的省略号，然后点击\
  \ `添加到收藏夹`，如图 8-5 所示。\n\n![A395630_1_En_8_Fig5_HTML.jpg](img/A395630_1_En_8_Fig5_HTML.jpg)\n\
  图 8-5. 将报表添加到 `收藏夹` 页面\n\n要在 `Web 门户` 中完成许多管理任务，你将需要从页面右上角的菜单开始，如图 8-6 所示。\n\n![A395630_1_En_8_Fig6_HTML.jpg](img/A395630_1_En_8_Fig6_HTML.jpg)\n\
  图 8-6. 菜单\n\n最终用户只需知道在哪里找到他们想要运行的报表。他们可以通过利用 `收藏夹` 页面来让操作对自己更方便。`SSRS` 开发人员和管理员则需要了解更多。本章的其余部分将介绍开发人员和管理员为提供便捷的报表体验所执行的任务。\n\
  \n## 从 SSDT 部署报表\n\n报表可以直接从 `SSDT` 部署，也可以在 `Web 门户` 内直接上传。从 `SSDT` 部署时，任何需要的文件夹也会被创建。要开始，请按照以下步骤配置项目以进行部署：\n\
  \n1.  要查看 `SSRS` Web 服务 URL（统一资源定位符），请打开 `Reporting Services 配置管理器`，这是随 SQL Server\
  \ 安装的一个实用程序。\n2.  连接到你的 `SSRS` 实例，如图 8-7 所示。如果它不是命名实例，那么 `报表服务器实例` 将是 `MSSQLSERVICE`。\n\
  \n![A395630_1_En_8_Fig7_HTML.jpg](img/A395630_1_En_8_Fig7_HTML.jpg)\n图 8-7. `Reporting\
  \ Services 配置连接` 对话框连接到命名实例\n\n3.  在 `Reporting Services 配置管理器` 上，点击左侧菜单中的 `Web\
  \ 服务 URL`。\n4.  记录图 8-8 中显示的 URL。后续步骤将需要此信息。\n\n![A395630_1_En_8_Fig8_HTML.jpg](img/A395630_1_En_8_Fig8_HTML.jpg)\n\
  图 8-8. `Web 服务 URL`\n\n5.  点击 `退出` 关闭 `Reporting Services 配置管理器`。\n6.  启动 `SSDT`。\n\
  7.  通过 `文件` 菜单下的 `最近的项目和解决方案` 找到并打开在第 7 章创建的解决方案。如果你没有跟随第 7 章的操作，可以在本书的 Apress 网站\
  \ ( [`www.Apress.com`](http://www.Apress.com) ) 的代码/下载区域找到该解决方案。\n8.  在 `解决方案资源管理器`\
  \ 中，右键单击项目名称 `可视化报表`，然后选择 `属性`。\n9.  在 `部署` 部分，你将看到几个已填充默认值的配置项。如果尚未填充，请将你在步骤 4\
  \ 中记录的 URL 输入到 `TargetServerURL` 属性中，如图 8-9 所示。\n\n![A395630_1_En_8_Fig9_HTML.jpg](img/A395630_1_En_8_Fig9_HTML.jpg)\n\
  图 8-9. 配置 `TargetServerURL`\n\n10. 点击 `确定` 保存更改。你可能已经注意到，如果端口号是默认的 80，它会自动消失。\n\n\
  看一下图 8-10。`OverwriteDatasets` 和 `OverwriteDataSources` 属性默认设置为 `False`。这可以防止你覆盖已部署的数据集和数据源。如果你的数据源指向开发或测试数据库服务器，这将非常方便。当你将项目部署到生产环境时，你不会用开发连接字符串覆盖现有的数据源。\n\
  \n![A395630_1_En_8_Fig10_HTML.jpg](img/A395630_1_En_8_Fig10_HTML.jpg)\n图 8-10. `OverwriteDatasets`\
  \ 和 `OverwriteDataSources` 属性\n\n现在你的项目已配置完毕，可以部署项目了。请按照以下步骤操作：\n\n1.  右键单击项目名称并选择\
  \ `部署`，如图 8-11 所示。\n\n![A395630_1_En_8_Fig11_HTML.jpg](img/A395630_1_En_8_Fig11_HTML.jpg)\n\
  图 8-11. 部署项目\n\n**注意**\n如果你的 `SSRS` 安装是本地的，在部署项目和查看 `Web 门户` 时可能会遇到权限问题。请参见第 1 章中的“配置本地\
  \ SSRS 设置”部分。\n\n1.  查看 `输出` 窗口，确认部署是否成功，如图 8-12 所示。\n\n![A395630_1_En_8_Fig12_HTML.jpg](img/A395630_1_En_8_Fig12_HTML.jpg)\n\
  图 8-12. `输出` 窗口\n\n2.  现在项目已部署，你可以在 `Web 门户` 中查看报表了。要找到要使用的 URL，请返回 `SSRS 配置管理器`。这次选择\
  \ `Web 门户 URL`。要打开 `Web 门户`，请点击该 URL，如图 8-13 所示。\n\n![A395630_1_En_8_Fig13_HTML.jpg](img/A395630_1_En_8_Fig13_HTML.jpg)\n\
  图 8-13. `报表管理器 URL`\n\n`可视化报表` 文件夹现在应该可以在 `Web 门户` 的 `主目录` 文件夹中找到，如图 8-14 所示。\n\n\
  \n\n![A395630_1_En_8_Fig14_HTML.jpg](img/A395630_1_En_8_Fig14_HTML.jpg)\n图 8-14.\n\
  \n新的文件夹\"笔记\"\n\n在 SQL Server 2016 发布时，Web 门户有时会在服务器重启后无法运行。如果您看到“服务不可用”错误，您应该使用\
  \ `Reporting Services 配置管理器` 来停止并启动服务。\n\n如果您点击 `可视化报表` 文件夹，您将看到在第 7 章中创建的所有报表。您可以点击一个报表来查看它。任何参数都会显示在顶部。图\
  \ 8-15 显示了图表报表。\n\n![A395630_1_En_8_Fig15_HTML.jpg](img/A395630_1_En_8_Fig15_HTML.jpg)\n\
  图 8-15.\n\n图表报表\n\n如果出于某种原因需要单独部署某个报表、数据集或数据源，您只需在 `SSDT` 的解决方案资源管理器中右键单击该对象，然后选择\
  \ `部署`。\n\n与从 `SSDT` 一样，您可以打印或导出报表。旧版本的 `SSRS` 使用 ActiveX 控件进行打印，这导致与现代 Web 浏览器存在许多兼容性问题。目前，打印机图标允许您将报表另存为\
  \ PDF，然后进行打印。保存图标允许您以包括 PowerPoint 在内的多种格式导出报表。\n\n## 上传报表\n\n除了从 `SSDT` 部署，您还可以通过上传到\
  \ Web 门户来发布报表。请按照以下步骤上传报表：\n\n1.  启动 Web 门户。\n2.  在主文件夹中，点击 `新建` ➤ `文件夹` 以创建一个新文件夹，如图\
  \ 8-16 所示。\n    ![A395630_1_En_8_Fig16_HTML.jpg](img/A395630_1_En_8_Fig16_HTML.jpg)\n\
  \    图 8-16.\n    创建新文件夹。\n3.  将文件夹命名为 `上传示例` 并点击 `创建`。\n4.  文件夹创建后，点击它将其打开。\n5.\
  \  点击 `上传` 并导航到一个报表文件。报表文件的扩展名为 `rdl`，可以在项目文件夹中找到，如图 8-17 所示。\n    ![A395630_1_En_8_Fig17_HTML.jpg](img/A395630_1_En_8_Fig17_HTML.jpg)\n\
  \    图 8-17.\n    导航到报表文件。\n6.  选择报表文件后，点击 `打开`。\n7.  您现在应该能在文件夹中看到该报表。点击报表以查看它。\n\
  \n您将不会打开报表，而是会看到如图 8-18 所示的错误消息。\n\n![A395630_1_En_8_Fig18_HTML.jpg](img/A395630_1_En_8_Fig18_HTML.jpg)\n\
  图 8-18.\n错误消息\n\n当您上传报表时，它不会自动链接到数据源。您可以按照以下步骤轻松更正：\n\n1.  在路径中点击 `上传示例` 以离开错误消息页面。\n\
  2.  点击报表名称旁边的省略号，然后选择 `管理`。\n3.  这将打开一个包含许多选项的页面。选择 `数据源`。您将看到一条关于数据源错误的消息。\n4.\
  \  点击 `连接到` 下方的省略号，如图 8-19 所示。\n    ![A395630_1_En_8_Fig19_HTML.jpg](img/A395630_1_En_8_Fig19_HTML.jpg)\n\
  \    图 8-19.\n    数据源属性。\n5.  这会在主文件夹中打开一个窗口。点击 `数据源`。\n6.  选择 `AdventureWorks2016`\
  \ 数据源，如图 8-20 所示。\n    ![A395630_1_En_8_Fig20_HTML.jpg](img/A395630_1_En_8_Fig20_HTML.jpg)\n\
  \    图 8-20.\n    数据源文件夹。\n7.  您现在应该能看到正确映射的数据源，如图 8-21 所示。\n    ![A395630_1_En_8_Fig21_HTML.jpg](img/A395630_1_En_8_Fig21_HTML.jpg)\n\
  \    图 8-21.\n    修正后的数据源。\n8.  点击 `保存`。\n9.  导航回 `上传示例` 文件夹并尝试运行报表。现在它应该能按预期运行了。\n\
  \n显然，从 `SSDT` 部署更容易，但如果您确实需要上传单个报表，这些信息将会很有帮助。\n\n## 创建数据源\n\n`AdventureWorks2016`\
  \ 数据源是在项目部署时自动创建的。您也可以通过 Web 门户手动创建数据源。请按照以下步骤创建数据源：\n\n1.  启动 Web 门户。\n2.  点击 `数据源`\
  \ 文件夹。\n3.  点击 `AdventureWorks2016` 旁边的省略号，然后点击 `管理` 以打开属性。\n4.  选择 `连接字符串` 属性并将其复制到剪贴板，如图\
  \ 8-22 所示。\n    ![A395630_1_En_8_Fig22_HTML.jpg](img/A395630_1_En_8_Fig22_HTML.jpg)\n\
  \    图 8-22.\n    连接字符串属性。\n5.  向下滚动并点击 `取消` 以关闭属性。\n6.  点击 `新建` ➤ `数据源` 以打开“新建数据源”页面。\n\
  7.  在名称中填写 `TestDataSource`。\n8.  将之前复制的连接字符串粘贴到 `连接字符串` 属性中。\n9.  向下滚动并点击 `测试连接`。\n\
  10. 点击 `创建`。\n11. 您现在应该能在文件夹中看到这两个数据源。\n\n虽然您可能不需要通过此界面创建许多数据源，但您将需要使用它来管理数据源。每当数据库迁移到新服务器时，您都需要在此处为报表进行更改。在第\
  \ 9 章中，您将了解数据源属性的“凭据”部分。\n\n## 部署报表部件\n\n除了数据源、数据集和报表外，您还可以部署报表部件。报表部件是构成报表的对象，如图表、表格和仪表。已发布的报表部件随后可以与\
  \ `报表生成器` 工具一起使用，该工具将在第 10 章中介绍。\n\n要在报表上发布对象，您必须将各个项标记为可发布。请按照以下步骤部署报表的部件：\n\n\
  1.  如果尚未打开，请启动 `SSDT` 以及来自第 7 章的项目。\n2.  在解决方案资源管理器中，双击图表报表以在设计视图中打开它。\n3.  如果“报表”菜单不可见，请单击报表的设计画布。\n\
  4.  选择 `报表` ➤ `发布报表部件`，这将打开一个对话框，显示可以发布的对象，如图 8-23 所示。\n    ![A395630_1_En_8_Fig23_HTML.jpg](img/A395630_1_En_8_Fig23_HTML.jpg)\n\
  \    图 8-23.\n    “发布报表部件”对话框。\n5.  勾选 `报表部件` 以选择每个项。\n6.  点击第一个图表旁边的箭头。这允许您查看图表的图片并填写描述。\n\
  7.  每个项都有默认名称，这在 Web 门户中可能没有帮助。将每个名称更改为与图 8-24 匹配。\n    ![A395630_1_En_8_Fig24_HTML.jpg](img/A395630_1_En_8_Fig24_HTML.jpg)\n\
  \    图 8-24.\n    每个图表的新名称。\n8.  点击 `确定`。\n9.  在解决方案资源管理器中，右键单击图表报表并部署它。\n10. 打开\
  \ Web 门户。\n11. 导航到主文件夹。\n12. 您应该会看到一个新的 `报表部件` 文件夹。\n13. 点击该文件夹以查看已发布的报表部件，如图 8-25\
  \ 所示。您将在第 10 章中使用它们。\n    ![A395630_1_En_8_Fig25_HTML.jpg](img/A395630_1_En_8_Fig25_HTML.jpg)\n\
  \    图 8-25.\n    报表部件文件夹。\n\n\n\n"
- "# 将报表部署到 SharePoint\n\n在 SharePoint 模式下安装和配置 SSRS 超出了本书的范围。但我确实认为，如果您需要将报表部署到现有的\
  \ SharePoint 场，可以回到本章学习如何操作。就像本机模式 SSRS 一样，您可以通过上传或从 SSDT 发布来发布报表。本节假设您使用的是 SharePoint\
  \ 2013 或更高版本，并且 SSRS 文档库已正确配置。\n\n请按照以下步骤学习如何将 SSRS 报表上传到 SharePoint 报表库：\n\n1.\
  \  启动 SharePoint 并导航到报表库。图 8-26 展示了一个典型的报表文件夹。\n    ![A395630_1_En_8_Fig26_HTML.jpg](img/A395630_1_En_8_Fig26_HTML.jpg)\n\
  \    图 8-26. SharePoint 报表文件夹\n2.  单击 **文件**。\n3.  单击 **上传文档**，如图 8-27 所示。\n   \
  \ ![A395630_1_En_8_Fig27_HTML.jpg](img/A395630_1_En_8_Fig27_HTML.jpg)\n    图 8-27.\
  \ “上传文档”图标\n4.  在“添加文档”对话框中，单击 **浏览** 导航到 SSRS 报表 `rdl` 文件。\n5.  单击 **确定**。\n6.\
  \  在“报表”对话框中，将内容类型选择为 **报表生成器报表**，如图 8-28 所示。\n    ![A395630_1_En_8_Fig28_HTML.jpg](img/A395630_1_En_8_Fig28_HTML.jpg)\n\
  \    图 8-28. “报表”对话框\n7.  单击 **保存**。报表现在应该会显示在文件夹中。\n8.  由于您上传了文件，因此需要配置数据源。单击报表名称旁边的省略号\
  \ (…)。\n9.  这将打开一个菜单对话框；单击此对话框上的省略号 (…)。\n10. 选择 **管理数据源**，如图 8-29 所示。\n    ![A395630_1_En_8_Fig29_HTML.jpg](img/A395630_1_En_8_Fig29_HTML.jpg)\n\
  \    图 8-29. 报表属性菜单\n11. 在“管理数据源”页面上，单击数据源名称。\n12. 在数据源的属性页上，单击省略号 (…)，如图 8-30 所示。\n\
  \    ![A395630_1_En_8_Fig30_HTML.jpg](img/A395630_1_En_8_Fig30_HTML.jpg)\n    图\
  \ 8-30. 数据源属性\n13. 在“选择项”对话框中，导航到正确的数据源，如图 8-31 所示。单击 **向上** 按钮进行导航。\n    ![A395630_1_En_8_Fig31_HTML.jpg](img/A395630_1_En_8_Fig31_HTML.jpg)\n\
  \    图 8-31. “选择项”对话框\n14. 单击 **确定** 以保存数据源名称并关闭对话框。\n15. 在报表的数据源属性上单击 **确定** 以保存更改。\n\
  16. 导航到报表并测试它。\n\n您也可以上传数据源文件 (`rds`) 或创建它们。要创建新数据源，请按照以下步骤操作：\n\n1.  启动 SharePoint\
  \ 并导航到“数据源”文件夹。\n2.  单击 **文件** ➤ **新建文档**，如图 8-32 所示。\n    ![A395630_1_En_8_Fig32_HTML.jpg](img/A395630_1_En_8_Fig32_HTML.jpg)\n\
  \    图 8-32. “新建文档”图标\n3.  选择 **报表数据源**，如图 8-33 所示。\n    ![A395630_1_En_8_Fig33_HTML.jpg](img/A395630_1_En_8_Fig33_HTML.jpg)\n\
  \    图 8-33. “报表数据源”菜单项\n4.  在“数据源属性”页面上填写属性，如图 8-34 所示。\n    ![A395630_1_En_8_Fig34_HTML.jpg](img/A395630_1_En_8_Fig34_HTML.jpg)\n\
  \    图 8-34. 数据源属性\n5.  单击 **确定** 以保存新数据源。\n\n要从 SSDT 部署报表和其他对象，您需要在项目属性中为每种类型的项配置\
  \ SharePoint 库文件夹的确切路径。否则，该过程与部署到本机模式实例相同。图 8-35 展示了如何为我的 SharePoint 站点进行配置。\n![A395630_1_En_8_Fig35_HTML.jpg](img/A395630_1_En_8_Fig35_HTML.jpg)\n\
  图 8-35. 部署到 SharePoint 时的属性\n\n## 总结\n\n除非 SSRS 报表发布到最终用户可以访问的地方，否则它们没有太大价值。在本章中，您认识了新的\
  \ Web 门户。您通过 SSDT 和上传的方式部署了报表。如果您安装了 SharePoint 模式的 SSRS 实例，您也看到了如何将报表部署到 SharePoint。\n\
  \n只要涉及数据，安全就至关重要。在第 9 章中，您将了解 SSRS 的安全方面。\n\n## 9. 保护您的报表\n\n几乎每周都有重大的数据泄露事件被报道。最先引起我注意的之一是\
  \ 2012 年南卡罗来纳州纳税人数据库失窃事件。2015 年，黑客窃取了数百万美国联邦政府雇员的电子记录。报表开发人员可能不需要配置安全，但他或她应该能够理解\
  \ SQL Server Reporting Services (SSRS) 安全的工作原理，以便在管理员请求时提供协助。\n\n部署 SSRS 报表时，需要考虑两层安全：数据源处的权限和\
  \ SSRS 内部的权限。在本章中，您将学习 SSRS 的安全特性以及 SSRS 如何与 SQL Server 安全交互。\n\n## 理解 SQL Server\
  \ 安全\n\n即使允许最终用户运行报表，SQL Server 实例也可能不会返回请求的数据。数据源中的设置决定了发送到 SQL Server 的凭据。\n\n\
  **注意**\n\n全面回顾 SQL Server 安全超出了本书的范围。报表的数据也可能来自许多其他来源，例如 Oracle 数据库和 Analysis Services\
  \ 多维数据集。请查阅供应商文档以了解任何特定产品的安全性。\n\n对于 SQL Server，将使用两种类型的帐户进行连接：Windows 登录名和在 SQL\
  \ Server 实例内定义的登录名。这两种登录名都映射到在数据库内具有特定权限的数据库用户。SQL Server 的另一个功能称为 **包含数据库**，允许您直接在数据库中创建用户。图\
  \ 9-1 说明了这些概念。\n![A395630_1_En_9_Fig1_HTML.jpg](img/A395630_1_En_9_Fig1_HTML.jpg)\n\
  图 9-1. SQL Server 内的身份验证\n\n\n\n### 设置 SQL 账户\n\n默认情况下，SQL Server 仅接受 Windows 身份验证。可以在安装期间启用\
  \ SQL Server 身份验证，也可以在事后进行配置。要使用本章中的所有示例，必须启用 SQL Server 身份验证。如果你是在本地安装的 SQL Server\
  \ 实例，你将能够修改身份验证属性。否则，你需要与数据库管理员合作，在你网络上的开发实例中配置安全性。要更改 SQL Server 的身份验证属性，请按照以下步骤操作：\n\
  \n1.  启动 `SQL Server Management Studio (SSMS)`。\n2.  输入如图 9-2 所示的 SQL Server 名称属性和身份验证方法。如果不确定这些属性，请参阅第\
  \ 1 章中的“确定 SQL Server 名称”部分。\n    ![A395630_1_En_9_Fig2_HTML.jpg](img/A395630_1_En_9_Fig2_HTML.jpg)\n\
  \    图 9-2. 连接到服务器对话框\n    **注意** 修改服务器身份验证属性需要重启 SQL Server。\n3.  单击“连接”。\n4. \
  \ 在 SSMS 的“对象资源管理器”中，右键单击服务器名称并选择 `属性`。\n5.  选择 `安全性` 页。\n6.  如果 `服务器身份验证` 设置为 `Windows\
  \ 身份验证模式`，请将其切换为 `SQL Server 和 Windows 身份验证模式`，如图 9-3 所示。\n    ![A395630_1_En_9_Fig3_HTML.jpg](img/A395630_1_En_9_Fig3_HTML.jpg)\n\
  \    图 9-3. SQL Server 和 Windows 身份验证模式\n7.  单击“确定”接受更改。\n8.  右键单击服务器名称并选择 `重启`\
  \ 来重启 SQL Server。\n\n现在 SQL Server 已配置为接受 SQL Server 身份验证，你需要创建一个登录名并授予其权限。按照以下步骤设置登录名：\n\
  \n1.  在“对象资源管理器”中，展开 `安全性`。\n2.  右键单击 `登录名` 并选择 `新建登录名`。\n3.  这将打开 `登录名 - 新建` 对话框。\n\
  4.  在 `登录名` 中填写 `SQLReportUser`。\n5.  选择 `SQL Server 身份验证`。\n6.  输入并确认一个你能记住的密码。\n\
  7.  由于这只是一个示例，请取消选中 `强制实施密码策略`，如图 9-4 所示。\n    ![A395630_1_En_9_Fig4_HTML.jpg](img/A395630_1_En_9_Fig4_HTML.jpg)\n\
  \    图 9-4. `SQLReportUser` 账户属性\n8.  单击“确定”创建账户。\n9.  右键单击该账户并选择 `属性`。\n10. 切换到\
  \ `用户映射` 页。\n11. 在 `AdventureWorks2016` 旁边打勾，如图 9-5 所示。\n    ![A395630_1_En_9_Fig5_HTML.jpg](img/A395630_1_En_9_Fig5_HTML.jpg)\n\
  \    图 9-5. 用户映射页面\n12. 勾选 `db_owner` 角色。在生产数据库中，只授予所需的权限。我注意到在 AdventureWorks 中，有时新用户会自动选中\
  \ `db_owner`，但这不会持久生效。如果需要，请返回查看属性并重新设置。\n13. 单击“确定”保存权限。\n\n### 连接到 SQL Server\n\
  \n在第 3 章中，你学习了如何创建数据源，并且很可能使用了你的 Windows 凭据来连接 SQL Server。在本节中，你将创建一个使用 SQL Server\
  \ 账户的新数据源。按照以下步骤在项目中创建一个接受 SQL Server 凭据的新数据源：\n\n1.  启动 `SQL Server Data Tools\
  \ (SSDT)` 并打开第 6 章的解决方案。\n2.  右键单击 `共享数据源` 并选择 `添加新数据源`。\n3.  在“常规”页上，将 `名称` 属性设置为\
  \ `AdventureWorks2016SQL`，如图 9-6 所示。\n    ![A395630_1_En_9_Fig6_HTML.jpg](img/A395630_1_En_9_Fig6_HTML.jpg)\n\
  \    图 9-6. 名称属性\n4.  如你在本书中一直所做的那样，单击 `编辑` 按钮来设置 `连接字符串` 属性。\n5.  在 `凭据` 页上，选择\
  \ `使用此用户名和密码`。\n6.  输入你先前创建的账户的 `用户名` 和 `密码`。“凭据”页应如图 9-7 所示。\n    ![A395630_1_En_9_Fig7_HTML.jpg](img/A395630_1_En_9_Fig7_HTML.jpg)\n\
  \    图 9-7. 新凭据\n7.  单击“确定”保存更改。\n8.  双击 `按区域销售矩阵` 报表以在设计视图中打开它。\n9.  在 `报表数据` 窗口中，打开\
  \ `AdventureWorks` 数据源的属性。\n10. 在 `常规` 页上，为 `使用共享数据源引用` 属性选择 `AdventureWorks2016SQL`，如图\
  \ 9-8 所示。\n    ![A395630_1_En_9_Fig8_HTML.jpg](img/A395630_1_En_9_Fig8_HTML.jpg)\n\
  \    图 9-8. 新的共享数据源引用\n11. 单击“确定”保存更改。\n12. 预览报表以确保其正常工作。\n\n现在报表已配置为使用 SQL Server\
  \ 账户检索数据。当项目部署后，最终用户将使用其 Windows 账户连接到 Web 门户。然后，SSRS 将使用存储在数据源属性中的账户凭据连接到 SQL Server。按照以下步骤部署项目并在\
  \ Web 门户中查看新数据源：\n\n1.  在“解决方案资源管理器”中，右键单击项目名称并选择 `属性`。\n2.  将 `TargetServerURL`\
  \ 设置为你的 Web 服务 URL（统一资源定位符），如果尚未设置的话。如果不确定如何操作，请参阅第 8 章中的“从 SSDT 部署报表”部分。\n3.  单击“确定”保存更改。\n\
  4.  右键单击项目名称并选择 `部署`。\n5.  如果部署成功，请启动 Web 门户。如果需要帮助，请参阅第 8 章中的“从 SSDT 部署报表”部分。\n\
  6.  单击 `数据源` 文件夹。\n7.  单击 `AdventureWorks2016SQL` 数据源旁边的省略号，并选择 `管理`。\n8.  这将打开数据源的属性。向下滚动到\
  \ `凭据` 部分并查看属性。请注意，你也可以指定一个硬编码的 Windows 账户。图 9-9 显示了“凭据”部分。\n    ![A395630_1_En_9_Fig9_HTML.jpg](img/A395630_1_En_9_Fig9_HTML.jpg)\n\
  \    图 9-9. 数据源凭据\n\n你可能想知道为什么不能总是指定 `作为查看报表的用户`。在某些情况下，这是不可能的。以下是在数据源中保存硬编码凭据的一些可能原因：\n\
  \n*   最终用户或设备可能不属于 Windows 域。\n*   最终用户可能未被允许在数据库中拥有直接权限。\n*   订阅功能需要硬编码的凭据。\n*\
  \   数据库服务器可能与 SSRS 不在同一台服务器上。\n\n**注意** 必须配置 `Kerberos` 委派才能在服务器之间转发凭据。这是一个高级安全主题，超出了本书的范围。要了解有关\
  \ `Kerberos` 委派的更多信息，请参见 Pluralsight 课程“为 SSRS 配置 Kerberos”。\n\n\n\n## 配置站点安全\n\n\
  SSRS 安全性基于角色。角色具有某些预定义的权限。将帐户或组添加到角色即可让该帐户或组拥有该角色所定义的权限。安全性的某些方面可以在站点级别配置，而其他方面则基于位置或对象。在本节中，你将了解站点安全性。\n\
  \n注意\n\n对于这些示例，我将使用在独立 Windows Server 2012 R2 上创建的几个 Windows 帐户。在你的环境中，你可能在域内运行，或者在运行多种最终用户版本\
  \ Windows 的独立笔记本电脑上运行。由于存在多种可能的变化，我不会逐步指导你创建这些帐户。\n\n我已经创建了一个信息技术（IT）组，并将以下本地 Windows\
  \ 帐户添加到我的服务器上的该组中：\n- `CIO`\n- `Director`\n- `Manager`\n- `TeamLeader`\n- `TeamMember`\n\
  \n在 Web 门户的站点级别，有两个可能的角色：`System Administrator`（系统管理员）和 `System User`（系统用户）。任何属于\
  \ `System Administrator` 角色的帐户或组成员都拥有对站点的完全控制权，包括控制安全性。对于将要使用 `Report Builder`（报表生成器）的任何人，`System\
  \ User` 属性都很重要，你将在第 10 章中了解相关内容。要将帐户添加到站点级别的角色，请按照以下步骤操作：\n1.  启动 Web 门户。\n2.  单击齿轮图标并选择\
  \ `Site Settings`（站点设置），如图 9-10 所示。\n    ![A395630_1_En_9_Fig10_HTML.jpg](img/A395630_1_En_9_Fig10_HTML.jpg)\n\
  \    图 9-10. 选择 `Site settings`（站点设置）\n3.  这将打开站点属性。单击 `Security`（安全性）。\n4.  单击\
  \ `Add group or user`（添加组或用户），如图 9-11 所示。\n    ![A395630_1_En_9_Fig11_HTML.jpg](img/A395630_1_En_9_Fig11_HTML.jpg)\n\
  \    图 9-11. 单击 `Add group or user`（添加组或用户）\n5.  对于 `Group or user`（组或用户），输入 `CIO`。\n\
  6.  选择 `System Administrator`（系统管理员），如图 9-12 所示。\n    ![A395630_1_En_9_Fig12_HTML.jpg](img/A395630_1_En_9_Fig12_HTML.jpg)\n\
  \    图 9-12. 添加帐户\n7.  单击 `OK`（确定）以创建角色成员身份。\n8.  重复该过程，将 `Manager` 帐户添加到 `System\
  \ User`（系统用户）角色。\n\n你还可以在此页面上从站点级别的角色中移除帐户。\n\n## 配置文件夹和报表安全性\n\n在公司中发布第一份报表之前，你应该规划\
  \ Web 门户内的文件夹结构，以简化安全管理。最终用户只能查看他们有权查看的那些文件夹和报表。作为最佳实践，仅在文件夹级别配置安全性。安全性可以在单个报表上配置，但这会使长期管理变得非常困难。\n\
  \n要访问特定文件夹，最终用户应拥有其上层文件夹的权限。默认情况下，文件夹从父文件夹继承权限，报表从其所在文件夹继承权限。随着路径向下延伸，权限应设置为限制性更强。例如，你可能希望在\
  \ `Home`（主文件夹）级别授予域中每个人的权限。然后在 `Home` 下为每个部门创建文件夹。在每个部门文件夹内，为经理创建文件夹。\n\n在文件夹和对象级别定义了几种角色。表\
  \ 9-1 列出了 `Security`（安全性）页面上显示的角色和定义。\n\n表 9-1. 文件夹和对象级别的角色\n| 角色 | 用途 |\n| ---\
  \ | --- |\n| `Browser`（浏览器用户） | 可以查看文件夹和报表，并订阅报表。 |\n| `Content Manager`（内容经理） |\
  \ 可以管理报表服务器中的内容。包括文件夹、报表和资源。 |\n| `My Reports`（我的报表） | 可以发布报表和链接报表；管理用户 `My Reports`（我的报表）文件夹中的文件夹、报表和资源。\
  \ |\n| `Publisher`（发布者） | 可以向报表服务器发布报表和链接报表。 |\n| `Report Builder`（报表生成器） | 可以查看报表定义。\
  \ |\n\n按照以下步骤为 IT 部门创建和配置文件夹：\n1.  在 Web 门户中，导航到 `Home`（主文件夹）。如果你在 `Site Settings`（站点设置）中，请单击页面顶部的\
  \ `SQL Server Reporting Services`。\n2.  单击 `Manage Folder`（管理文件夹），如图 9-13 所示。\n\
  \    ![A395630_1_En_9_Fig13_HTML.jpg](img/A395630_1_En_9_Fig13_HTML.jpg)\n    图\
  \ 9-13. `Manage Folder`（管理文件夹）图标\n3.  这将打开 `Home`（主文件夹）的 `Security`（安全性）页面。单击 `New\
  \ Role Assignment`（新建角色分配）。\n4.  输入 `Users`（用户）。对于域环境，这将是 `Everyone`（所有人）组。\n5.\
  \  勾选 `Browser`（浏览器用户），如图 9-14 所示。这将授予所有用户在站点中运行任何报表的权限，除非文件夹中的安全性已被覆盖。\n    ![A395630_1_En_9_Fig14_HTML.jpg](img/A395630_1_En_9_Fig14_HTML.jpg)\n\
  \    图 9-14. 将 `Users`（用户）添加到 `Browser`（浏览器用户）角色\n6.  单击 `OK`（确定）保存更改。\n7.  单击 `Home`（主页）链接导航回文件夹视图。\n\
  8.  单击 `New Folder`（新建文件夹）。\n9.  在名称中填写 `IT`，然后单击 `Create`（创建）。\n10. 单击新 `IT` 文件夹旁边的省略号，然后选择\
  \ `Manage`（管理）。\n11. 这将打开文件夹属性。单击 `Security`（安全性）。\n12. 单击 `Customize security`（自定义安全性），如图\
  \ 9-15 所示。\n    ![A395630_1_En_9_Fig15_HTML.jpg](img/A395630_1_En_9_Fig15_HTML.jpg)\n\
  \    图 9-15. 文件夹的安全性页面\n13. 这会显示一个关于中断从父项继承权限的警告，如图 9-16 所示。单击 `OK`（确定）。\n    ![A395630_1_En_9_Fig16_HTML.jpg](img/A395630_1_En_9_Fig16_HTML.jpg)\n\
  \    图 9-16. 确认安全性将不同\n14. 单击 `Add group or user`（添加组或用户）。\n15. 将 `IT` 组以 `Browser`（浏览器用户）角色添加到该文件夹，然后单击\
  \ `OK`（确定）。\n16. 勾选 `Builtin\\Users`（内置\\用户）旁边的框。如果你在域环境中工作，请移除 `Everyone`（所有人）组。\n\
  17. 单击 `Delete`（删除），然后单击 `OK`（确定）进行确认。\n18. 导航回 `Home`（主文件夹）。\n\n现在你有了一个只能由 `IT`\
  \ 组成员查看的文件夹。根据表 9-2，继续使用前面步骤中学到的技能添加文件夹并修改权限，以设置站点的安全性。\n\n表 9-2. 站点的安全性配置\n| 文件夹\
  \ | 帐户或组 | 角色成员身份 |\n| --- | --- | --- |\n| `Home/IT` | `IT` | `Browser`（浏览器用户）\
  \ |\n| `Home/IT` | `Manager` | `Content Manager`（内容经理） |\n| `Home/IT` | `Manager`\
  \ | `Report Builder`（报表生成器） |\n| `Home/IT/Management` | `CIO`, `Director` | `Browser`（浏览器用户）\
  \ |\n| `Home/IT/Management` | `Manager` | `Content Manager`（内容经理） |\n| `Home/IT/Management`\
  \ | `Manager` | `Report Builder`（报表生成器） |\n| `Home/IT/Management/Confidential` |\
  \ `CIO` | `Content Manager`（内容经理） |\n\n显然，这是一个简化的例子，但它应该说明了应如何配置安全性。图 9-17 演示了随着路径向下延伸，帐户数量如何减少。\n\
  ![A395630_1_En_9_Fig17_HTML.jpg](img/A395630_1_En_9_Fig17_HTML.jpg)\n图 9-17. 文件夹权限\n\
  \n要进行测试，以任何帐户运行浏览器，确保该帐户只能看到预期的文件夹。图 9-18 显示了 `Director` 和 `TeamLeader` 在查看 `IT`\
  \ 文件夹时所看到的差异。\n![A395630_1_En_9_Fig18_HTML.jpg](img/A395630_1_En_9_Fig18_HTML.jpg)\n\
  图 9-18. `Manager` 和 `TeamLeader` 的文件夹视图\n\n此时，`Manager` 帐户已控制大多数文件夹的内容，并拥有使用 `Report\
  \ Builder`（报表生成器）的权限。你将在第 10 章中看到 `Report Builder`（报表生成器）的实际应用。\n\n\n\n## 使用订阅自动发送报表\n\
  \nSQL Server Reporting Services (SSRS) 最实用的功能之一就是可以调度报表自动运行并通过订阅发送。报表可以通过电子邮件发送，也可以传送到网络共享文件夹。通过电子邮件发送时，报表可以直接嵌入邮件正文，也可以发送一个链接。\n\
  \n> **注意**\n>\n> 订阅功能需要 SQL Server Standard Edition 或更高版本支持。\n\n由于订阅传递不涉及人工操作，因此为特定报表创建订阅必须满足两个条件：报表使用的所有数据源必须包含硬编码的凭据；必须在订阅中确定并配置默认参数。\n\
  \n在早期版本的 SSRS 中，需要通过域内的 SMTP（简单邮件传输协议）服务器来发送邮件报表。从 SSRS 2016 开始，现在可以使用域外的电子邮件服务器（如\
  \ Gmail）来发送报表。要将报表发送到网络共享，必须先创建该共享文件夹。需要有 Windows 账户拥有在该共享中创建报表的权限，并且最终用户必须有打开文件的权限。对于两种类型的订阅，托管\
  \ ReportServer 数据库的服务器上还必须运行 `SQL Server Agent`。\n\n要通过电子邮件发送报表，必须先配置 SMTP 账户设置。选择“电子邮件设置”页面来填写\
  \ SMTP 属性。有关如何配置多种服务设置的信息，请参阅 Reporting Services 团队博客，网址为：[`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/)。\n\
  \n将报表传送到网络共享的设置比通过电子邮件配置要简单得多。本节示例将涵盖如何将报表传送到共享文件夹。当你配置订阅将报表传送到共享时，你需要指定一个拥有创建文件权限的“文件共享账户”。你可以为整个\
  \ SSRS 实例设置一个账户，也可以为单个订阅指定一个账户。图 9-19 显示了可用于传递到网络共享订阅的“文件共享账户”的属性。\n\n![A395630_1_En_9_Fig19_HTML.jpg](img/A395630_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19. 文件共享账户属性\n\n你还需要创建将用来存放报表的共享文件夹。要配置网络共享，请按照以下步骤操作：\n\n1.  导航到你计算机上的 `C:\\\
  ` 驱动器或其他驱动器。\n2.  创建一个名为 `Reports` 的新文件夹。\n3.  右键单击该文件夹并选择“属性”。\n4.  选择“共享”选项卡。\n\
  5.  单击“共享”，这将打开“文件共享”对话框。\n6.  添加共享所需的账户和权限，如图 9-20 所示。\n\n![A395630_1_En_9_Fig20_HTML.jpg](img/A395630_1_En_9_Fig20_HTML.jpg)\n\
  \n图 9-20. “文件共享”对话框\n7.  单击“共享”、“完成”和“关闭”以创建共享并关闭对话框。\n\n一旦网络共享创建完毕，启动 `SSMS` 并确保\
  \ `SQL Server Agent` 正在运行。`SQL Server Agent` 是为 `SQL Server` 运行计划作业的服务。就 `SQL Server`\
  \ 而言，`SSRS` 订阅只不过是一种作业类型。\n\n现在基础设施已经就绪，你可以创建订阅了。请按照以下步骤配置订阅：\n\n1.  在 Web 门户中，导航到\
  \ `Dynamic Reports` 文件夹。\n2.  `Sales by Territory Matrix` 报表应该连接到使用存储凭据的 `AdventureWorks2016SQL`\
  \ 数据源。如果不是，请重新配置数据源。\n3.  测试 `Sales by Territory Matrix` 报表。\n4.  导航回 `Dynamic Reports`\
  \ 文件夹。\n5.  单击 `Sales by Territory Matrix` 旁边的省略号（...），然后选择“管理”。\n6.  单击“订阅”。\n\
  7.  单击“新建订阅”。\n8.  在“订阅”属性页上，在“描述”属性中输入 `Sales by Territory`。\n9.  “所有者”属性应自动默认为你的账户。\n\
  10. 对于此示例，接受默认计划。对于生产订阅，务必创建一个计划。图 9-21 显示了到目前为止的属性。\n\n![A395630_1_En_9_Fig21_HTML.jpg](img/A395630_1_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21. 订阅属性\n11. 向下滚动到“目标”属性并选择“Windows 文件共享”。\n12. 键入网络共享的路径。\n13. 为“呈现格式”选择\
  \ `PDF`。\n14. 如果你想覆盖“文件共享账户”，请选择“使用以下 Windows 用户凭据”。填写特定账户的“用户名”和“密码”。\n15. 根据你的要求修改“覆盖选项”。这部分属性应类似于图\
  \ 9-22。\n\n![A395630_1_En_9_Fig22_HTML.jpg](img/A395630_1_En_9_Fig22_HTML.jpg)\n\
  \n图 9-22. 订阅的传递选项\n16. 向下滚动到“报表参数”部分。\n17. 为 `Year` 参数选择一个值。\n18. 设置好 `Year` 值后，`Territory`\
  \ 的值将会填充。选择一个区域。参数属性应类似于图 9-23。\n\n![A395630_1_En_9_Fig23_HTML.jpg](img/A395630_1_En_9_Fig23_HTML.jpg)\n\
  \n图 9-23. 订阅的报表参数\n19. 单击“创建订阅”。\n20. 订阅现在应该显示在列表中，如图 9-24 所示。\n\n![A395630_1_En_9_Fig24_HTML.jpg](img/A395630_1_En_9_Fig24_HTML.jpg)\n\
  \n图 9-24. 新订阅\n\n每个订阅都会创建一个 `SQL Server Agent` 作业。不幸的是，作业的名称是一个全局唯一标识符（GUID），你无法通过查看来分辨哪个作业对应哪个订阅。要弄清楚哪个订阅映射到哪个作业，你需要在你的\
  \ `ReportServer` 数据库中运行类似下面的查询：\n\n```sql\nSELECT Name AS ReportName, ScheduleID\
  \ AS JobName, s.[Description]\nFROM [Catalog] c\nJOIN Subscriptions s ON c.ItemID\
  \ = s.Report_OID\nJOIN ReportSchedule rs ON c.ItemID = rs.ReportID\nAND rs.SubscriptionID\
  \ = s.SubscriptionID;\n```\n\n图 9-25 显示了该查询的结果。\n\n![A395630_1_En_9_Fig25_HTML.jpg](img/A395630_1_En_9_Fig25_HTML.jpg)\n\
  \n图 9-25. 报表名称映射到作业名称\n\n要测试订阅，运行该作业。作业一旦启动订阅就会报告成功。即使报表没有传递成功，它也会报告成功。你可以通过检查共享文件夹中是否有报表，或者刷新“订阅”页面查看状态来确认结果。\n\
  \n在早期版本的 SSRS 中，你必须导航到每个文件夹和报表才能找到和管理订阅。Web 门户有一个名为“我的订阅”的新功能。单击菜单中的齿轮图标，你会看到一个指向“我的订阅”的链接。在这里，你可以看到你所用账户拥有的订阅列表及其位置。你还可以启用、禁用或删除你的订阅。图\
  \ 9-26 显示了该链接和列表。\n\n![A395630_1_En_9_Fig26_HTML.jpg](img/A395630_1_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26. 新的“我的订阅”功能\n\n\n## 确保交付安全\n\n默认情况下，报表数据在网络上以未加密方式传输。在您的环境中，这可能构成安全风险。您可以配置\
  \ `SSRS` 使用安全套接层 (`SSL`) 协议。这是您在进行网上购物或访问银行网站时看到的、用于建立安全连接的网络协议。要正确配置 `SSL`，您需要从受信任的证书颁发机构购买证书。\n\
  \n获取证书并将其安装在服务器上后，可以通过启动 `Reporting Service Configuration Manager` 来进行配置。在 `Web\
  \ Portal URL` 页面上，点击 `Advanced`。通过点击 `Advanced Multiple Web Site Configuration`\
  \ 对话框底部的 `Add`，可以将 `SSL` 证书绑定到 `SSRS`。图 9-27 显示了您将用于配置 `SSL` 的对话框。\n\n![A395630_1_En_9_Fig27_HTML.jpg](img/A395630_1_En_9_Fig27_HTML.jpg)\n\
  \n图 9-27. 用于配置 `SSL` 的对话框\n\n## 总结\n\n保护您的报表安全非常重要，但如果您在开始发布报表之前没有制定策略，可能会变得非常复杂且难以管理。请务必规划好文件夹的布局，并且切勿直接在报表上配置安全设置，只应在文件夹上进行配置。\n\
  \n安全配置在两个层面进行：数据源层面和 `SSRS` 层面。预定义的服务器和文件夹角色使安全管理更加简单。您还可以通过订阅配置报表自动交付。\n\n第 10\
  \ 章将介绍如何直接使用 `Report Builder` 通过 `web portal` 创建报表。同时也会涵盖 2016 版新增的两种报表类型：`KPIs`\
  \ 和 `Mobile Reports`。\n\n"
- '# 10. 创建自助式和移动报表


  不久前，我和我四岁的孙女以及即将满两岁的孙子在桌边玩游戏。当我的智能手机在够不着的地方发出收到几条短信的提示音时，我的孙子抓起设备递给我，一边说：“你的电话！你的电话！”当我让他看手机上的照片时，他立刻开始滑动屏幕。我知道他是在模仿周围大人的行为，但今天的孩子们从出生起就接触科技了。


  过去几年世界变化如此之大。我们要求能够立即从任何所在位置访问我们的数据。当我们持续连接到社交媒体和工作岗位时，工作和娱乐常常交融在一起。无论好坏，这都是新的现实。


  在本书中，您一直使用 `Visual Studio` 内的 `SQL Server Data Tools (SSDT)` 来创建报表。`Visual Studio`
  是一款开发工具，但终端用户常常希望创建自己的报表和仪表板。他们也要求在公司内网之外使用平板电脑和手机时能跟上数据更新。在本章中，您将学习如何使用终端用户工具 `Report
  Builder` 创建报表。您还将创建 `mobile reports` 和 `key performance indicators (KPIs)`，这是 `SQL
  Server 2016` 的 `Enterprise` 和 `Developer Editions` 中提供的两个新功能。


  ## 使用 Report Builder


  自首次随 `SQL Server 2005` 发布以来，`Report Builder` 已经历了数次迭代。当前版本利用已发布的数据集和报表部件，使得构建报表比在
  `SSDT` 中容易得多。不过，也可以从头开始构建报表，其方式与使用 `SSDT` 非常相似。`Report Builder` 还包含 `SSDT` 中没有的附加向导。本书中您学到的功能仍然存在，例如属性页和表达式。表
  10-1 列出了 `SSDT` 和 `Report Builder` 之间的区别。


  表 10-1. `SSDT` 和 `Report Builder` 之间的区别


  | 功能 | SSDT | Report Builder |

  | --- | --- | --- |

  | 目标受众 | 报表开发人员 | 高级用户 |

  | 外观和感觉 | Visual Studio | Microsoft Office |

  | 组织方式 | 基于项目 | 单个报表 |

  | 部署方式 | 部署或上传 | 保存 |

  | 报表部件 | 部署报表部件 | 使用和部署报表部件 |


  组织中希望创建自己报表的高级用户和其他人将受益于可使用的预构建报表部件、参数列表和数据集。这仍然会给报表开发人员带来工作，但有助于确保高级用户无需成为专业的 `T-SQL`
  程序员或完全理解源数据库，就能高效使用 `Report Builder`。


  第 8 章描述了如何部署报表，包括报表部件。如果您没有跟随第 8 章的操作，请返回并完成“从 `SSDT` 部署报表”和“部署报表部件”小节中的步骤。要开始使用
  `Report Builder`，请按照以下步骤操作：


  1.  启动 `web portal`。

  2.  通过从菜单中选择 `New` ➤ `Folder` 创建一个新文件夹。

  3.  输入 `Ad Hoc Reports` 作为名称，然后单击 `Create`。

  4.  创建文件夹后，单击它以导航进入其中。

  5.  单击 `New` ➤ `Paginated Report`，如图 10-1 所示。


  ![A395630_1_En_10_Fig1_HTML.jpg](img/A395630_1_En_10_Fig1_HTML.jpg)


  图 10-1. 创建新的分页报表

  6.  您可能会看到一条消息，询问是否允许浏览器启动应用程序。单击 `Allow`。

  7.  如果这是您第一次启动 `Report Builder`，您将看到一条消息，提示您下载并安装它，如图 10-2 所示。


  ![A395630_1_En_10_Fig2_HTML.jpg](img/A395630_1_En_10_Fig2_HTML.jpg)


  图 10-2. 安装 `Report Builder` 的链接

  8.  `Get Report Builder` 链接将带您到 `Microsoft.com` 上的一个页面，您可以在那里下载该应用程序。请按照页面上的说明操作。即使在安装了
  `Report Builder` 后，我仍然会看到该消息，但我只是将其关闭。

  9.  运行安装向导时，系统将提示您输入目标服务器 `URL`（统一资源定位符）。输入您在第 8 章“从 `SSDT` 部署报表”小节中确定的 `web service
  URL`。图 10-3 显示了一个示例 `URL`。


  ![A395630_1_En_10_Fig3_HTML.jpg](img/A395630_1_En_10_Fig3_HTML.jpg)


  图 10-3. `Default Target Server` 属性

  10.  安装后，您可能需要再次从菜单中选择 `New` ➤ `Paginated Report` 才能实际启动 `Report Builder` 工具。

  11.  同意可能出现的任何警告。

  12.  `Report Builder` 启动后，您将看到 `New Report or Dataset` 对话框，如图 10-4 所示。


  ![A395630_1_En_10_Fig4_HTML.jpg](img/A395630_1_En_10_Fig4_HTML.jpg)


  图 10-4. `New Report or Dataset` 对话框

  13.  选择 `Blank Report`。

  14.  您将看到报表设计区域，如图 10-5 所示。


  ![A395630_1_En_10_Fig5_HTML.jpg](img/A395630_1_En_10_Fig5_HTML.jpg)


  图 10-5. 报表设计区域



