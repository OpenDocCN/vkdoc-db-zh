  trans: "## 创建 KPI\n\n在 SSRS 的早期版本中，您已经能够向报表添加 KPI 或关键绩效指标。从 2008 R2 版本开始，您可以将 `Indicator`\
    \ 控件添加到 `Tablix` 单元格中。在此之前，您可以通过使用表达式来动态控制单元格颜色或显示图像以实现相同目的，但这需要做更多工作。SSRS 2016\
    \ 让您能够在 `web portal` 中创建和显示独立的 KPI。这些 KPI 可以一目了然地提供有关目标和重要指标的即时信息，而无需运行报表。它们依赖于已就位的\
    \ `shared datasets`。\n\nKPI 可以非常简单，也可以相当复杂，这取决于您定义的属性。您可以仅显示一个数字，将值与目标进行比较，显示状态，显示趋势，或显示这些的某种组合。\n\
    \n### 创建 KPI 数据集\n\n请按照以下步骤创建将用于 KPI 的数据集：\n\n1.  在 `web portal` 中，导航到 `Datasets`\
    \ 文件夹。\n2.  点击 `New` ➤ `Dataset`，这将启动 `Report Builder`。如果您看到关于运行程序的警告，请点击 `Allow`。`Report\
    \ Builder` 将打开，准备创建数据集。\n3.  在 `Choose a data source connection or model to create\
    \ a shared dataset` 页面上，如果 `AdventureWorks2016` 数据源在对话框中可见，请选择它。\n4.  如果您没有看到所需的数据源，请点击\
    \ `Browse other data sources` 并导航到 `Data Sources` 文件夹以找到它，如图 10-19 所示。\n\n   \
    \ ![A395630_1_En_10_Fig19_HTML.jpg](img/A395630_1_En_10_Fig19_HTML.jpg)\n\n  \
    \  *图 10-19. 选择或定位数据源*\n\n5.  点击 `Create`。\n6.  这将打开 `Query Designer`，您可以通过选择表和列来构建查询，如图\
    \ 10-20 所示。\n\n    ![A395630_1_En_10_Fig20_HTML.jpg](img/A395630_1_En_10_Fig20_HTML.jpg)\n\
    \n    *图 10-20. 查询设计器*\n\n7.  在本例中，您将粘贴一个查询。点击图 10-21 所示的 `Edit as Text`，从可视化的查询构建器切换到基于文本的查询设计器窗口。\n\
    \n    ![A395630_1_En_10_Fig21_HTML.jpg](img/A395630_1_En_10_Fig21_HTML.jpg)\n\n\
    \    *图 10-21. 点击 Edit as Text*\n\n8.  粘贴以下查询：\n\n    ```sql\n    WITH\n    Sales\
    \ AS (\n    SELECT SUM(TotalDue) AS Sales, MONTH(OrderDate) AS OrderMonth,\n \
    \   YEAR(OrderDate) AS OrderYear,\n    LAG(SUM(TotalDue),12) OVER(ORDER BY YEAR(OrderDate),\n\
    \    MONTH(OrderDate)) * 1.10 AS Quota\n    FROM Sales.SalesOrderHeader\n    GROUP\
    \ BY MONTH(OrderDate), YEAR(OrderDate)\n    ),\n    Comparison AS (\n    SELECT\
    \ OrderYear, Sales, OrderMonth, Quota,SUM(Sales)\n    OVER(PARTITION BY OrderYear)/SUM(Quota)\n\
    \    OVER(PARTITION BY OrderYear) AS PercentOfGoal\n    FROM Sales)\n    SELECT\
    \ Sales, OrderMonth, Quota,\n    CASE WHEN PercentOfGoal >= .98 THEN 1\n    WHEN\
    \ PercentOfGoal > .9 THEN 0\n    ELSE -1 END AS Status\n    FROM Comparison\n\
    \    WHERE OrderYear = 2014;\n    ```\n\n9.  点击感叹号图标运行查询。结果应如图 10-22 所示。\n\n \
    \   ![A395630_1_En_10_Fig22_HTML.jpg](img/A395630_1_En_10_Fig22_HTML.jpg)\n\n\
    \    *图 10-22. 查询结果*\n\n10. 从 `File` 菜单中，点击 `Save`。\n11. `Save as Dataset` 对话框打开后，导航到\
    \ `Datasets` 文件夹。\n12. 将数据集命名为 `2014 Sales` 并点击 `OK`。\n13. 关闭 `Report Builder`。\n\
    \n### 创建 KPI\n\n现在数据集已发布到 `web portal`，您可以创建使用它的 KPI。KPI 设计页面一个非常有趣的方面是，您可以在连接数据之前设计\
    \ KPI 的外观。实际上，当您最初创建 KPI 时，它将填充一个随机值和可视化效果。请按照以下步骤创建新的 KPI：\n\n1.  导航到 `Ad Hoc\
    \ Reports` 文件夹，如果您之前没有跟随“使用 Report Builder”部分操作，请创建它。\n2.  从菜单中点击 `New` ➤ `KPI`。\n\
    3.  这将打开如图 10-23 所示的页面，您可以在其中看到 KPI 的所有属性，包括已填充的随机值。\n\n    ![A395630_1_En_10_Fig23_HTML.jpg](img/A395630_1_En_10_Fig23_HTML.jpg)\n\
    \n    *图 10-23. KPI 设计页面*\n\n4.  将 `KPI Name` 更改为 `2014 Sales`。\n5.  将 `Value\
    \ format` 更改为 `Abbreviated currency`。\n6.  将 `Value` 设置更改为 `Dataset field`。\n\
    7.  点击 `Pick dataset field` 下的省略号，如图 10-24 所示。\n\n    ![A395630_1_En_10_Fig24_HTML.jpg](img/A395630_1_En_10_Fig24_HTML.jpg)\n\
    \n    *图 10-24. 点击省略号*\n\n8.  这将打开 `Pick a Dataset` 对话框。导航到 `Datasets` 文件夹。\n\
    9.  选择 `2014 Sales` 数据集，如图 10-25 所示。\n\n    ![A395630_1_En_10_Fig25_HTML.jpg](img/A395630_1_En_10_Fig25_HTML.jpg)\n\
    \n    *图 10-25. 选择 Sales 数据集*\n\n10. 这将打开一个允许您选择字段和聚合的对话框。为 `Aggregation` 选择 `Sum`。\n\
    11. 选择 `Sales` 作为字段，如图 10-26 所示。\n\n    ![A395630_1_En_10_Fig26_HTML.jpg](img/A395630_1_En_10_Fig26_HTML.jpg)\n\
    \n    *图 10-26. 值属性*\n\n12. 点击 `OK`。\n13. 按照相同步骤填充 `Goal`。选择 `Quota` 字段和 `Sum`\
    \ 聚合。\n14. 对 `Status` 使用相同的数据集。选择 `First` 聚合和 `Status` 字段。\n15. 对 `Trend Set`\
    \ 使用相同的数据集。本例中没有聚合。选择 `Sales` 字段。\n16. 如果尚未选择，请选择 `Bar` 可视化。属性应如图 10-27 所示。\n\n\
    \    ![A395630_1_En_10_Fig27_HTML.jpg](img/A395630_1_En_10_Fig27_HTML.jpg)\n\n\
    \    *图 10-27. KPI 属性*\n\n17. 点击屏幕底部的 `Create`。\n\n现在，当您导航到 `Ad Hoc Reports` 文件夹时，您应该会看到新的\
    \ KPI，如图 10-28 所示。2014 年的销售额为 2240 万美元，比配额低 3%。您还可以在小图表中看到各月的趋势。\n\n![A395630_1_En_10_Fig28_HTML.jpg](img/A395630_1_En_10_Fig28_HTML.jpg)\n\
    \n*图 10-28. 新的 KPI*\n\n### 添加相关资源\n\nKPI 可以链接到其他报表或网页。通过点击矩形内的省略号并选择 `Manage`\
    \ 返回编辑器。要添加到分页报表的链接，请在编辑器底部找到的 `Related content` 属性中选择 `Custom URL`。粘贴从您的一个报表复制的\
    \ URL，如图 10-29 所示。您也可以通过选择 `Mobile Report` 来添加到移动报表的链接。本例中，您将浏览到报表以填写 URL。\n\n\
    ![A395630_1_En_10_Fig29_HTML.jpg](img/A395630_1_En_10_Fig29_HTML.jpg)\n\n*图 10-29.\
    \ 相关资源属性*\n\n如果填充了 `Related content`，则在点击 KPI 时链接将可见，如图 10-30 所示。\n\n![A395630_1_En_10_Fig30_HTML.jpg](img/A395630_1_En_10_Fig30_HTML.jpg)\n\
    \n*图 10-30. 相关资源链接*"
- fmt: "## Creating Mobile Reports\n\nThe new mobile reports feature is by far the\
    \ most anticipated enhancement found with SSRS 2016. Before the feature was announced\
    \ at the PASS Summit in Seattle in October 2015, I would have guessed this feature\
    \ would be available only in SharePoint integrated mode. I am thrilled that Microsoft\
    \ is making this investment in native mode SSRS. In my opinion, native mode is\
    \ much easier to configure and manage. I’m glad this great feature is available\
    \ and simple to manage.\n\nWhen creating a KPI, sample data is created so that\
    \ you can see how the KPI will look before connecting it to data. The same is\
    \ true for the mobile reports. To get started you will need to download and install\
    \ the new `Mobile Report Publisher` application. You will find the link by clicking\
    \ the down arrow and selecting `Mobile Report Publisher` as shown in Figure [10-31](#A395630_1_En_10_Chapter.html#Fig31).\n\
    \n![A395630_1_En_10_Fig31_HTML.jpg](A395630_1_En_10_Fig31_HTML.jpg)\n*Figure 10-31.\
    \ The `Mobile Report Publisher` link*\n\nDownload and install the application\
    \ according to the instructions found on the linked page. Once it is installed,\
    \ you can launch it from the web portal or create a shortcut.\n\n> **Note**\n\
    >\n> At the release of SQL Server 2016, the `Mobile Report Publisher` also required\
    \ a patch for a Visual C++ component. If that update is not in place, you will\
    \ be prompted during the installation. Be sure to download the `x86` version.\n\
    \nJust like the KPIs, you will need to create shared datasets to build mobile\
    \ reports. Mobile reports will also work with data imported from Excel. The downside\
    \ to Excel data is that it must be refreshed manually.\n\n> **Note**\n>\n> Starting\
    \ with 2016, you can store Excel spreadsheets in SSRS. At least with the version\
    \ available at the time of this writing, the files stored in SSRS could not be\
    \ used for the mobile reports.\n\nTo get started, you will build the mobile report\
    \ with simulated data by following these steps:\n\n1.  From the web portal, click\
    \ **New** ➤ **Mobile Report**.\n2.  OK any warnings about running the application.\
    \ To avoid this message in the future, create a shortcut to the app instead of\
    \ launching through the web portal.\n3.  You should now see the `SQL Server Mobile\
    \ Report Publisher` where you will build the mobile report as shown in Figure\
    \ [10-32](#A395630_1_En_10_Chapter.html#Fig32).\n\n    ![A395630_1_En_10_Fig32_HTML.jpg](A395630_1_En_10_Fig32_HTML.jpg)\n\
    \    *Figure 10-32. The mobile report design canvas*\n\n4.  From the left side,\
    \ drag a `Selection list` to the top and left part of the grid. Drag the right\
    \ side so that it expands to cover four squares. The `Selection list` will be\
    \ used to filter the report.\n5.  Drag a `Half-donut` under `Selection list`.\
    \ Expand it so that it covers an area of two-by-two squares.\n6.  Drag a `Gradient\
    \ heat map` next to the `Half-donut`. Expand it so that it also covers a two-by-two\
    \ square area.\n7.  Fill the bottom squares with a `Category chart`. The layout\
    \ should look like Figure [10-33](#A395630_1_En_10_Chapter.html#Fig33).\n\n  \
    \  ![A395630_1_En_10_Fig33_HTML.jpg](A395630_1_En_10_Fig33_HTML.jpg)\n    *Figure\
    \ 10-33. The mobile report layout*\n\n8.  Click the **Preview** button. The report\
    \ should look like Figure [10-34](#A395630_1_En_10_Chapter.html#Fig34).\n\n  \
    \  ![A395630_1_En_10_Fig34_HTML.jpg](A395630_1_En_10_Fig34_HTML.jpg)\n    *Figure\
    \ 10-34. The mobile report preview*\n\n9.  From `Selection List 1`, select one\
    \ of the items. You will see the data change automatically.\n10. Click the title\
    \ of `Category Chart 1`. The chart will expand to fill the screen.\n11. If you\
    \ click one of the columns and hold down the cursor, the data for the column will\
    \ display as shown in Figure [10-35](#A395630_1_En_10_Chapter.html#Fig35).\n\n\
    \    ![A395630_1_En_10_Fig35_HTML.jpg](A395630_1_En_10_Fig35_HTML.jpg)\n    *Figure\
    \ 10-35. The data for one column*\n\n12. Click the `Category Chart` title to go\
    \ back to the report.\n13. Click the back arrow to the left of the report title\
    \ to go to design view.\n\nI hope you are impressed at this point at how you easily\
    \ you can prototype a report and how interactive it is. The next step is to give\
    \ each report item a title. Table [10-2](#A395630_1_En_10_Chapter.html#Tab2) shows\
    \ the title for each item.\n\n*Table 10-2. The Report Item Titles*\n\n| Item |\
    \ Title |\n| --- | --- |\n| `Selection List` | Year |\n| `Half-Donut` | Quota\
    \ |\n| `Gradient Heat Map` | US Sales by State |\n| `Category Chart` | Sales by\
    \ Month |\n\nFollow these steps to set the titles:\n\n1.  Inside the `Mobile Report\
    \ Publisher` design view, make sure that the **Layout** view is selected.\n2.\
    \  Select an item from the design grid.\n3.  Fill in the `Title` found in the\
    \ **Visual** properties section as shown in Figure [10-36](#A395630_1_En_10_Chapter.html#Fig36).\n\
    \n    ![A395630_1_En_10_Fig36_HTML.jpg](A395630_1_En_10_Fig36_HTML.jpg)\n    *Figure\
    \ 10-36. The `Title` property*\n\n4.  Repeat the process for each item.\n5.  To\
    \ make sure that you do not lose your work, save the report definition on your\
    \ local machine as an `rsmobile` file.\n\nAt this point, you have a design, but\
    \ it is connected to simulated data. The next step is to connect the report to\
    \ the SSRS server. Follow these steps.\n\n1.  Click the **Server Connections**\
    \ icon shown in Figure [10-37](#A395630_1_En_10_Chapter.html#Fig37).\n\n    ![A395630_1_En_10_Fig37_HTML.jpg](A395630_1_En_10_Fig37_HTML.jpg)\n\
    \    *Figure 10-37. The **Server Connections** icon*\n\n2.  Fill in the **Server\
    \ address** as shown in Figure [10-38](#A395630_1_En_10_Chapter.html#Fig38).\n\
    \n    ![A395630_1_En_10_Fig38_HTML.jpg](A395630_1_En_10_Fig38_HTML.jpg)\n    *Figure\
    \ 10-38. The **Connect to a server** properties*\n\n3.  Unless you are using secure\
    \ socket layer (`SSL`), uncheck **Use secure connection**. If SSRS is installed\
    \ on your local workstation, you are probably not using `SSL`.\n4.  Click **Connect**.\
    \ The `Mobile Report Publisher` will remember the connection.\n\nThe next step\
    \ is to add datasets to the web portal that will be used to populate the mobile\
    \ report instead of using simulated data. Follow these steps to create the datasets:\n\
    \n1.  Minimize the `Mobile Report Publisher`.\n2.  From the web portal, select\
    \ **New** ➤ **Dataset** to launch `Report Builder`.\n3.  Create a new shared dataset\
    \ named `SalesByState` using this query and the `AdventureWorks2016` data source.\
    \ The section “Using Report Builder” has instructions on creating a dataset if\
    \ you need help.\n\n    ```sql\n    SELECT SUM(TotalDue) AS Sales, vS.CountryRegionName,\
    \ vS.StateProvinceName,\n        YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\
    \ AS SOH\n        JOIN Person.BusinessEntityAddress AS BEA\n            ON BEA.BusinessEntityID\
    \ = SOH.CustomerID\n        JOIN Person.Address AS A ON BEA.AddressID = A.AddressID\n\
    \        JOIN Person.vStateProvinceCountryRegion AS vS\n            ON A.StateProvinceID\
    \ = vS.StateProvinceID\n    WHERE CountryRegionName = 'United States'\n    GROUP\
    \ BY A.City, vS.CountryRegionName, vS.StateProvinceName,\n        YEAR(OrderDate);\n\
    \    ```\n\n4.  Save the new dataset in the **Datasets** folder.\n5.  Create a\
    \ dataset named `Sales` with the following query and save it to the **Datasets**\
    \ folder:\n\n    ```sql\n    WITH\n    Sales AS (\n        SELECT SUM(TotalDue)\
    \ AS Sales, MONTH(OrderDate) AS OrderMonth,\n            YEAR(OrderDate) AS OrderYear,\n\
    \            LAG(SUM(TotalDue),12,600000) OVER(ORDER BY YEAR(OrderDate),\n   \
    \         MONTH(OrderDate)) * 1.10 AS Quota\n        FROM Sales.SalesOrderHeader\n\
    \        GROUP BY MONTH(OrderDate), YEAR(OrderDate)\n    ),\n    Comparison AS\
    \ (\n        SELECT OrderYear, Sales, OrderMonth, Quota,\n            Sales/Quota\
    \ AS PercentOfGoal\n        FROM Sales)\n    SELECT OrderYear, Sales, 'M' + RIGHT('0'\
    \ + CAST(OrderMonth AS VARCHAR(2)),2) AS OrderMonth, Quota,\n        PercentOfGoal,\
    \ DATEFROMPARTS(OrderYear,OrderMonth, 1) AS OrderDate,\n        CASE WHEN PercentOfGoal\
    \ >= 0.98 THEN 1\n            WHEN PercentOfGoal >= 0.9 THEN 0\n            ELSE\
    \ -1 END AS Status\n    FROM Comparison;\n    ```\n\n6.  Close `Report Builder`.\n\
    \nYou should now have the two datasets available for use in the new mobile report.\
    \ You will connect the datasets to the report objects by following these steps:"
