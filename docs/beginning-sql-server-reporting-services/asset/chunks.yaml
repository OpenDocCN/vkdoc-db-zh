    \ 2-14 所示的按钮。\n\n![A395630_1_En_2_Fig14_HTML.jpg](img/A395630_1_En_2_Fig14_HTML.jpg)\n\
    *图 2-14. 报告预览图标*\n\n在导航控件的右侧，您会看到一个指向左边的箭头，即`Back to parent`按钮。在第 6 章开发相互链接的报告时会用到它。您还会看到一个用于停止执行长时间运行的报告的按钮和一个刷新报告的按钮。中间是一个`Print`按钮。最有趣的按钮位于`Print`按钮的右侧。\n\
    \n#### 打印布局按钮\n\n在大约十几年前部署了一组报告后，我接到了项目经理的紧急电话。她问道，为什么报告在每一页打印内容后都会打印一页空白？当然，在从`Visual\
    \ Studio`或`Report Manager`预览报告时，报告看起来是完美的。只有在打印时，问题才会显现出来。\n\n为了查看报告在打印时的实际效果，您应该点击`Print\
    \ Layout`按钮。该按钮就在打印按钮的右侧，可在在线视图和打印视图之间切换。\n\n通过在打印布局视图中滚动浏览报告页面，您可以发现并纠正问题，然后再部署报告。在部署之前，请务必以打印布局视图查看您创建的每个报告。\n\
    \n#### 页面设置按钮\n\n`Page Setup`按钮允许您调整报告的边距，并选择纸张大小、来源和方向。默认情况下，报告的页边距为一英寸。这些边距可能过大。通过修改属性，您可以确保报告更好地适应打印页面。关于使报告适应页面的其他方法，将在第\
    \ 4 章学习。图 2-15 显示了`Page Setup`对话框。\n\n![A395630_1_En_2_Fig15_HTML.jpg](img/A395630_1_En_2_Fig15_HTML.jpg)\n\
    *图 2-15. 页面设置对话框*\n"
- fmt: '### Additional Buttons


    To the end user, exporting reports is just as important as printing them. An `Export`
    button with a variety of export types is available such as to XML, Excel, Word,
    and PDF. The results of the exported report will vary depending on the functionality
    of the export type.


    You can magnify the preview window to several sizes with the `Zoom` button and
    search for text within the report with the `Find` and `Next` buttons.


    ## Formatting the Wizard Report


    The tabular report created with the wizard looks pretty good, but it can be improved.
    While looking at the preview, make a list of things to fix. This is what I came
    up with:

    *   Remove time from `OrderDate`

    *   Round dollar amounts to the nearest cent

    *   Format amounts as currency

    *   Remove summary values of `SalesOrderID`

    *   Change `OrderMonth` from numbers to month name

    *   Modify column widths

    *   Add a grand totals for each `Group` and the overall report.


    Click `Design` to see the design view of the report. Find the `OrderDate` field
    in the bottom of the grid. Right-click the cell and select `Text Box Properties`.


    **Note**

    It may take a bit of practice when selecting cells in the table grid. You can
    select the cell or the contents of the cell. When selecting the cell, it will
    be outlined. If you have trouble, try clicking the edge of the cell.


    In the `Text Box Properties` dialog, select `Number` on the left. Under `Category`,
    choose `Date`. For the type, select a date format without the time as shown in
    Figure [2-16](#A395630_1_En_2_Chapter.html#Fig16) and click `OK`.


    ![A395630_1_En_2_Fig16_HTML.jpg](A395630_1_En_2_Fig16_HTML.jpg)

    Figure 2-16. Change the date format


    Right-click the `TotalDue` cell at the bottom right of the grid and select `Text
    Box Properties`. Select `Number`, but this time choose `Currency`. Check `Use
    1000 separator (,)`. The properties will look like those in Figure [2-17](#A395630_1_En_2_Chapter.html#Fig17)
    if you are in the United States.


    ![A395630_1_En_2_Fig17_HTML.jpg](A395630_1_En_2_Fig17_HTML.jpg)

    Figure 2-17. Format the `TotalDue` field


    Click `OK` to accept the format. Now, to avoid repeating this process for the
    three summary fields, bring up the `Properties` window. You can bring this up
    by pressing `F4` or find it in the `View` menu. Locate the `Format` property.
    Figure [2-18](#A395630_1_En_2_Chapter.html#Fig18) shows what you are looking for.


    ![A395630_1_En_2_Fig18_HTML.jpg](A395630_1_En_2_Fig18_HTML.jpg)

    Figure 2-18. The `Format` property


    Copy the `Format` value to the `Clipboard`. Hold down the shift key and select
    the three summary boxes under the `TotalDue` heading. The property window is now
    selected for all three text boxes. Find the `Format` property and paste in the
    value.


    Feel free to preview the report as often as you would like to check the progress.
    Each time you preview, the report definition is saved. At this point, the report
    should resemble Figure [2-19](#A395630_1_En_2_Chapter.html#Fig19) after expanding
    the sections.


    ![A395630_1_En_2_Fig19_HTML.jpg](A395630_1_En_2_Fig19_HTML.jpg)

    Figure 2-19. The report with some formatting


    The wizard automatically created summaries for the `SalesOrderID` column since
    it contains numeric data. Summing up this value doesn’t make sense. Go back to
    design view and remove `[Sum(SalesOrderID)]` by clicking within each cell with
    that formula and pressing the delete key. It needs to be removed from the second,
    third, and fourth rows.


    The next item on the list is to change the `Order Month` column to display the
    month name. To change it to display the name instead, follow these steps:

    1.  In design view, right-click the `OrderMonth` cell and select `Expression`.

    2.  This brings up the `Expression` dialog box. You can see the existing expression,
    `=Fields!OrderMonth.Value`.

    3.  Expand `Common Functions` in the `Category` box.

    4.  Select `Date & Time`.

    5.  Position the cursor between the equal sign and the letter F in the expression.

    6.  Double-click `MonthName` in the `Item` list.

    7.  Add a closing parentheses at the end of the expression. The expression should
    now be `=MonthName(Fields!OrderMonth.Value)`. The `Expression` dialog should look
    like Figure [2-20](#A395630_1_En_2_Chapter.html#Fig20).


    ![A395630_1_En_2_Fig20_HTML.jpg](A395630_1_En_2_Fig20_HTML.jpg)

    Figure 2-20. The expression for month name


    8.  Click `OK` after verifying the expression. Now that the expression is more
    complex, the cell value will change to `<<Exp>>`.


    Some of the headings would look better if the columns were wider. When the table
    is selected, handles at the top and left appear. By clicking in the divisions
    between the columns of the header handle and dragging, you can expand or narrow
    the column widths to accommodate the column headings.


    There is one more task on the list, adding a grand total and a total for each
    `Group` (`US`, `Europe`, and `Pacific`). This is easier to do than you might think.
    You’ll learn more about working with grouping levels in Chapter [2](#A395630_1_En_2_Chapter.html),
    but understand at this point that a total added at one level lands at the next
    level up. For example, a total added at the `Region` level is displayed in the
    `Group` level. Follow these steps to add the `Group` totals:

    1.  In design view, right-click the cell located at `Region` and `Total Due` as
    shown in Figure [2-21](#A395630_1_En_2_Chapter.html#Fig21).


    ![A395630_1_En_2_Fig21_HTML.jpg](A395630_1_En_2_Fig21_HTML.jpg)

    Figure 2-21. The cell found at `Region` and `Total Due`


    2.  Select `Add Total`. A new row will show up at the bottom of the grid containing
    the `[Sum(TotalDue)]` expression.

    3.  Type the following into the cell found at the bottom of the grid in the `Sales
    Order ID` column: `Total for [Group]`. Notice that you were able to include text
    and a field, called a placeholder, in the same cell without creating an expression.


    The report definition should look like Figure [2-22](#A395630_1_En_2_Chapter.html#Fig22).


    ![A395630_1_En_2_Fig22_HTML.jpg](A395630_1_En_2_Fig22_HTML.jpg)

    Figure 2-22. The report definition after adding the `Group` total


    At the bottom of the design window, you will see the `Row Groups` and `Column
    Groups` sections, which you will learn more about in Chapter [5](#A395630_1_En_5_Chapter.html).
    Grouping levels can be added and configured in these sections. Select the `Group`
    text box at the top of the report which changes what appears in the `Row Groups`
    section. Right-click `list1_Group` under `Row Groups`, and select `Add Total`
    ➤ `After` as shown in Figure [2-23](#A395630_1_En_2_Chapter.html#Fig23).


    ![A395630_1_En_2_Fig23_HTML.jpg](A395630_1_En_2_Fig23_HTML.jpg)

    Figure 2-23. Adding a grand total


    This just adds a row where you will need to add the expression. Right-click the
    new text box at the bottom of the report and select `Expression`. Type in this
    expression and click `OK`:


    ```

    ="Grand Total " & FormatCurrency(Sum(Fields!TotalDue.Value),2,0,True,True)

    ```


    At the top of the screen, you will see a formatting menu bar as shown in Figure
    [2-24](#A395630_1_En_2_Chapter.html#Fig24). This menu bar is similar to working
    in other programs such as Microsoft Word.


    ![A395630_1_En_2_Fig24_HTML.jpg](A395630_1_En_2_Fig24_HTML.jpg)

    Figure 2-24. The formatting menu bar


    Make sure that the new text box is selected and click the icon to align right.
    Click the `B` icon to bold the text. The report definition should now resemble
    Figure [2-25](#A395630_1_En_2_Chapter.html#Fig25).


    ![A395630_1_En_2_Fig25_HTML.jpg](A395630_1_En_2_Fig25_HTML.jpg)

    Figure 2-25. The report definition after adding totals


    Now preview the report. Each page will have a total for the `group`. The very
    last page will have a grand total. Figure [2-26](#A395630_1_En_2_Chapter.html#Fig26)
    shows page 3 of the report with the new totals.


    ![A395630_1_En_2_Fig26_HTML.jpg](A395630_1_En_2_Fig26_HTML.jpg)

    Figure 2-26. Page 3 of the formatted report with the new totals'
