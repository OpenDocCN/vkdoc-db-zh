- fmt: "## Installing SQL Server with SSRS\n\nYou can follow along with many of the\
    \ examples in the book by installing the developer tools without installing SSRS.\
    \ You could also work with an SSRS instance that is already in your company’s\
    \ network. I do recommend that, if at all possible, you install SSRS on your development\
    \ computer. That will allow you to learn how to do some administrative tasks as\
    \ well as develop the reports.\n\nSQL Server is available in several editions.\
    \ Each edition has a specific set of features and price. For development and learning,\
    \ you can download the free Developer Edition. Just search the web for \"SQL Server\
    \ Developer Edition download\" to find the file. There is also an Express Edition\
    \ that is free, but the features are very limited.\n\nNote\n\nAt the time of this\
    \ writing, the media is an iso file. My Windows 10 laptop can easily handle iso\
    \ files, but your operating system may not. You can search for a utility to mount\
    \ or extract iso files if needed.\n\nFrom the media, you should see a `setup`\
    \ icon shown in Figure 1-3.\n\n![A395630_1_En_1_Fig3_HTML.jpg](A395630_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. The setup icon\n\nFollow these instructions to install a SQL Server\
    \ instance with SSRS:\n\n1.  Double-click `setup` to launch the `SQL Server Installation\
    \ Center`.\n2.  Click `Installation` on the left.\n3.  Click `New SQL Server stand-alone\
    \ installation or add features to an existing installation` at the top as shown\
    \ in Figure 1-4.\n\n    ![A395630_1_En_1_Fig4_HTML.jpg](A395630_1_En_1_Fig4_HTML.jpg)\n\
    \n    Figure 1-4. The SQL Server Installation Center\n\n4.  An installation wizard\
    \ will launch. On the initial information pages, click `Next`.\n5.  On the `License\
    \ Terms` page, click `I accept the License Terms` and click `Next`.\n6.  Click\
    \ `Next` on the `Microsoft Update` page.\n7.  After checking for updates, click\
    \ `Next` on the `Product Updates`.\n8.  On the `Install Rules` page, click `Next`\
    \ once it is done. If there are any `Failed` statuses, you will need to click\
    \ the message to find out what is wrong and correct it.\n9.  On the `Feature Selection`\
    \ page, select `Database Engine Services` and `Reporting Services – Native` as\
    \ shown in Figure 1-5.\n\n    ![A395630_1_En_1_Fig5_HTML.jpg](A395630_1_En_1_Fig5_HTML.jpg)\n\
    \n    Figure 1-5. The feature selection\n\n10. On the `Instance Configuration`\
    \ page, you must decide whether to install a default instance with `Instance ID`\
    \ `MSSQLSERVER` or a named instance. Each instance of SQL Server on a computer\
    \ must be unique. If there are existing instances of SQL Server installed, you\
    \ will see them listed. If no other default instance is installed, select `Default\
    \ Instance` and click `Next`. Otherwise, select `Named Instance` and type in a\
    \ name before clicking `Next`. Figure 1-6 shows this page.\n\n    ![A395630_1_En_1_Fig6_HTML.jpg](A395630_1_En_1_Fig6_HTML.jpg)\n\
    \n    Figure 1-6. The Instance Configuration page\n\n11. On the `Server Configuration`\
    \ page, accept the defaults and click `Next`.\n12. On the `Database Engine Configuration`\
    \ page, click `Add Current User`. This will make your account an administrator\
    \ in SQL Server. Click `Next`.\n13. On the `Reporting Services Configuration`\
    \ page, make sure that you choose `Install and configure` as shown in Figure 1-7\
    \ and click `Next`.\n\n    ![A395630_1_En_1_Fig7_HTML.jpg](A395630_1_En_1_Fig7_HTML.jpg)\n\
    \n    Figure 1-7. The Reporting Service Configuration page\n\n14. On the `Ready\
    \ to Install` page, click `Install`.\n15. Restart the computer if requested to\
    \ do so at the end of the installation.\n\nIt may take several minutes to install\
    \ the SQL Server instance and SSRS. There are dozens of things that could prevent\
    \ a successful installation, and it would be impossible for me to help you troubleshoot\
    \ via a book. My advice is to navigate to `C:\\Program Files\\Microsoft SQL Server\\\
    130\\Setup Bootstrap\\Log`. There will be log files with the messages generated\
    \ during the installation. You can search the Internet using any error messages\
    \ that you find for help and advice if the installation fails. That said, you\
    \ may need to be connected to the Internet during the installation, and you may\
    \ need to run the `setup` as an administrator for a successful install.\n\nPrevious\
    \ versions of SQL Server allowed you to install `SQL Server Management Studio`\
    \ (`SSMS`) with your SQL Server instance install. Starting with SQL Server 2016,\
    \ Microsoft plans to release frequent updates to this tool, and make it available\
    \ only by downloading. To find the link, relaunch the `SQL Server Installation\
    \ Center` if you have closed it. On the `Installation` page, click `Install SQL\
    \ Server Management Tools`. Follow the instructions found on the download page.\n\
    \n## Installing SQL Server Data Tools\n\nThe primary development tool for SSRS\
    \ is `SSDT`, mentioned earlier, and it runs inside `Visual Studio`. Microsoft\
    \ has changed the name and the source of the development tool over several versions\
    \ of SQL Server. At one time, you could install `Business Intelligence Development\
    \ Studio`, also known as `BIDS`, directly from the SQL Server installation media.\
    \ At one point, Microsoft changed the name to `SQL Server Data Tools – BI`, and\
    \ it was a separate download. To make things confusing, there was also another\
    \ product called `SSDT` used for database projects, not BI projects like reports.\
    \ Luckily, in 2016, Microsoft has combined the two products into one `SSDT` download.\n\
    \nYou can find the link to download and install `SSDT` on the `Installation` page\
    \ of the `SQL Server Installation Server` as shown in Figure 1-8.\n\n![A395630_1_En_1_Fig8_HTML.jpg](A395630_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8. The link for SQL Server Data Tools\n\nAt the time of this writing,\
    \ you can download the `SSDTSetup.exe` file and install from that, or you can\
    \ scroll down the page to download an iso file. If you download the iso file,\
    \ then run `SSDTSetup.exe` from the media to get the install started. Follow these\
    \ steps to install `SSDT`:\n\n1.  Running `SSDTSetup.exe` starts the wizard. On\
    \ the first page, make sure that `SQL Server Reporting Services` is checked as\
    \ shown in Figure 1-9. You can leave the others checked as well.\n\n    ![A395630_1_En_1_Fig9_HTML.jpg](A395630_1_En_1_Fig9_HTML.jpg)\n\
    \n    Figure 1-9. SQL Server Reporting Services is checked\n\n2.  Click `Next`.\n\
    3.  On the `License Terms` page, check `I agree to the license terms and conditions`.\n\
    4.  Click `Install`."
