  trans: "\n# 向报表添加图表和图形\n\nSQL Server Reporting Services (SSRS) 使您能够通过图表控件向报表添加图表和图形。图表（chart）和图形（graph）有什么区别？严格来说，图形（graph）展示的是数据随时间变化的关系，而图表（chart）则用于比较不同类别。例如，图形可能显示按月统计的全年销售情况，而图表可能比较特定年份内不同区域的销售业绩。您可以在图\
    \ 7-1 中看到区别。\n\n![A395630_1_En_7_Fig1_HTML.jpg](img/A395630_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1. 比较图形与图表\n\n如果您想查看这些数据元素所使用的设计，请在本书的 Apress 网站 ([`www.Apress.com`](http://www.Apress.com))\
    \ 的 Code/Download 区域查找一个名为 Chart and Graph 的报表。在开始创建图表和图形之前，请先看一下图 7-2，以便了解构成这些可视化元素的各个部分。\n\
    \n![A395630_1_En_7_Fig2_HTML.jpg](img/A395630_1_En_7_Fig2_HTML.jpg)\n\n图 7-2.\
    \ 图表的组成部分\n\nSSRS 提供了丰富的图表类型。其中一些是 3-D 的；但是，应谨慎且有节制地使用 3-D 效果。将可视化元素设为 3-D 并不会增加其价值，反而可能扭曲尺寸，使理解控件所表示的数据变得更加困难。在本节中，您将学习如何向报表添加图表和图形。请按照以下步骤开始：\n\
    \n1.  创建一个新的 SSRS 项目，命名为 Visual Reports。解决方案名称应为 Beginning SSRS Chapter 7。\n2.\
    \  向项目添加一个新的共享数据源，指向 `AdventureWorks2016` 数据库，命名为 `AdventureWorks2016`。如果需要回顾如何添加数据源和数据集，请参阅第\
    \ 3 章。\n3.  向项目添加一个新的共享数据集，命名为 `Year`。它应指向 `AdventureWorks` 共享数据源。此数据集将在多个报表中使用，因此能够重用它是有意义的。查询如下：\n\
    \    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\n\
    \    GROUP BY YEAR(OrderDate)\n    ORDER BY YEAR(OrderDate);\n    ```\n4.  如果\
    \ Microsoft 的修复程序尚未发布，请务必修正共享数据集文件。更多信息请参见第 6 章。\n5.  向项目添加一个新报表，命名为 Charts。\n\
    6.  向报表添加一个数据源，命名为 `AdventureWorks`，指向该共享数据源。\n7.  向报表添加一个新数据集，命名为 `Year`。选择“使用共享数据集”，并选择项目中的\
    \ `Year` 数据集。对话框应如图 7-3 所示。\n    ![A395630_1_En_7_Fig3_HTML.jpg](img/A395630_1_En_7_Fig3_HTML.jpg)\n\
    \    图 7-3. Year 数据集\n8.  添加一个嵌入数据集，命名为 `Sales`，指向 `AdventureWorks` 数据源，并使用以下查询：\n\
    \    ```sql\n    SELECT SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth,\n\
    \    T.TerritoryID, T.Name AS TerritoryName,\n    Sum(Sum(TotalDue)) OVER(PARTITION\
    \ BY T.TerritoryID) AS TerritoryTotal\n    FROM Sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON T.TerritoryID = SOH.TerritoryID\n    WHERE\
    \ YEAR(OrderDate) = @Year\n    GROUP BY MONTH(OrderDate), T.TerritoryID, T.Name;\n\
    \    ```\n9.  该查询通过 `@Year` 进行筛选。数据集将自动创建一个参数。展开“参数”文件夹，打开 `Year` 参数的属性。\n10.\
    \ 选择“可用值”页面，并选择“从查询中获取值”。\n11. 将“数据集”设置为 `Year`。将“值字段”和“标签字段”设置为 `OrderYear`。“可用值”页面应如图\
    \ 7-4 所示。\n    ![A395630_1_En_7_Fig4_HTML.jpg](img/A395630_1_En_7_Fig4_HTML.jpg)\n\
    \    图 7-4. 可用值属性\n12. 设置一个默认值 `2012`。“默认值”页面应如图 7-5 所示。\n    ![A395630_1_En_7_Fig5_HTML.jpg](img/A395630_1_En_7_Fig5_HTML.jpg)\n\
    \    图 7-5. 默认值属性\n13. 单击“确定”接受更改。\n14. “报表数据”窗口现在应如图 7-6 所示。\n    ![A395630_1_En_7_Fig6_HTML.jpg](img/A395630_1_En_7_Fig6_HTML.jpg)\n\
    \    图 7-6. 添加完所有报表对象后的报表数据窗口\n\n看一下如图 7-7 所示的“工具箱”。图表、仪表和地图通常作为独立对象添加到报表中。数据栏、迷你图和指示器通常添加到\
    \ Tablix 的单元格中。在本节中，您将学习图表控件。\n\n![A395630_1_En_7_Fig7_HTML.jpg](img/A395630_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7. 工具箱\n\n请按照以下步骤向报表添加图表：\n\n1.  在设计视图中，将图表拖到设计画布上。\n2.  这将打开如图 7-8 所示的“选择图表类型”对话框，您可以在其中选择多种图表类型中的一种。\n\
    \    ![A395630_1_En_7_Fig8_HTML.jpg](img/A395630_1_En_7_Fig8_HTML.jpg)\n    图\
    \ 7-8. “选择图表类型”对话框\n3.  默认类型是柱形图。单击“确定”将其添加到报表中。\n4.  在进行任何修改之前，图表将如图 7-9 所示。\n\
    \    ![A395630_1_En_7_Fig9_HTML.jpg](img/A395630_1_En_7_Fig9_HTML.jpg)\n    图\
    \ 7-9. 图表控件\n5.  要将数据连接到图表，请双击图表。这将打开如图 7-10 所示的“图表数据”窗口。\n    ![A395630_1_En_7_Fig10_HTML.jpg](img/A395630_1_En_7_Fig10_HTML.jpg)\n\
    \    图 7-10. 图表数据窗口\n6.  “图表数据”窗口分为三个部分。∑ 值窗口包含您想要度量的字段，由柱形的高度表示。单击加号并导航到 `AdventureWorks`\
    \ ➤ `Sales` 下的 `TotalSales` 字段以添加它。它将自动求和。\n7.  “类别组”部分包含用于横轴的值。将默认的“详细信息”更改为\
    \ `TerritoryName`。如果保持默认值，它将为数据集中的每一行显示一个柱形。在我们的例子中，我们希望每个区域一个柱形。\n8.  “系列组”允许您将类别分解为多个更小的项目。您将在后面的示例中了解这一点。目前，“图表数据”窗口应如图\
    \ 7-11 所示。\n    ![A395630_1_En_7_Fig11_HTML.jpg](img/A395630_1_En_7_Fig11_HTML.jpg)\n\
    \    图 7-11. 填写属性后的图表数据窗口\n9.  增加图表大小，使其宽度约为五英寸（13 厘米），高度约为四英寸（10 厘米）。为了辅助调整图表大小，您可以通过右键单击报表并选择“视图”\
    \ ➤ “标尺”来添加标尺。\n10. 预览报表。图表应如图 7-12 所示。\n    ![A395630_1_En_7_Fig12_HTML.jpg](img/A395630_1_En_7_Fig12_HTML.jpg)\n\
    \    图 7-12. 格式化前的图表\n\n此时，您可以看到柱形高度不同，并且横轴上显示了一些区域名称。显然，这个图表还需要大量调整，而且幸运的是，它的可定制性很高。图表的每个部分都有自己的属性窗口，可用于控制格式和位置。以下是需要修正的项目列表：\n\
    \n*   显示所有区域名称。\n*   添加两个坐标轴标题。\n*   将图表标题更改为 `按区域统计的销售总额` 以及年份。\n*   删除图例。\n\
    *   格式化纵轴。\n*   添加一个工具提示，显示每个区域的精确金额。\n\n请按照以下步骤格式化图表：\n"
- fmt: "# 图表格式化与高级类型\n\n## 柱状图格式化\n\n1.  切换回设计视图。\n2.  右键单击水平轴并选择“水平轴属性”。\n3.  这将打开“水平轴属性”对话框。在“轴选项”页面上，将`Interval`属性更改为`1`并点击“确定”。这将使所有区域都在图表上显示。\n\
    4.  右键单击水平轴并选择“显示轴标题”。\n5.  右键单击水平“轴标题”并选择“轴标题属性”。\n6.  这将打开“轴标题属性”对话框。将文本标题更改为`Territory`并点击“确定”。\n\
    7.  右键单击垂直轴并选择“显示轴标题”。\n8.  除了通过打开“轴标题属性”对话框来更改轴标题，你也可以通过点击它并输入来更改。将垂直“轴标题”更改为`Sales\
    \ in thousands`。\n9.  右键单击“图表标题”并打开其属性。\n10. 在“标题文本”旁边，点击`fx`以打开“表达式”对话框。\n11.\
    \ 要将年份参数添加到标题中，表达式应为：\n\n    ```\n    =\"Total Sales by Territory for \" & Parameters!Year.Value\n\
    \    ```\n\n12. 点击“确定”两次以接受属性设置。\n13. 选择图例“Total Sales”并按`Delete`键。在这种情况下，图表图例对报表没有增加任何价值。\n\
    14. 右键单击垂直轴并选择“垂直轴属性”。\n15. 在“垂直轴属性”对话框的“数字”页面上，在“类别”下选择“货币”。\n16. 将“小数位数”更改为`0`。\n\
    17. 勾选“使用千位分隔符 (,)”并勾选“以千为单位显示值”。“数字”页面应如图 [7-13](#A395630_1_En_7_Chapter.html#Fig13)所示。\n\
    \n    ![A395630_1_En_7_Fig13_HTML.jpg](A395630_1_En_7_Fig13_HTML.jpg)\n\n    图\
    \ 7-13. 垂直轴的数字属性\n\n18. 点击“确定”以接受属性设置。\n19. 右键单击其中一个数据条并选择“系列属性”。\n20. 在“系列属性”对话框的“系列数据”页面上，点击“工具提示”旁边的`fx`符号。\n\
    21. 表达式应为：\n\n    ```\n    =FormatCurrency(Sum(Fields!TotalSales.Value),0)\n \
    \   ```\n\n22. 点击“确定”两次以接受更改。\n\n现在当你预览报表时，图表应该类似于图 [7-14](#A395630_1_En_7_Chapter.html#Fig14)。务必在一个或多个数据条上悬停光标以查看工具提示。\n\
    \n![A395630_1_En_7_Fig14_HTML.jpg](A395630_1_En_7_Fig14_HTML.jpg)\n\n图 7-14. 格式化后的图表\n\
    \n## 按销售额排序\n\n报表看起来相当不错，但你还可以做更多。比如，按总销售额对数据条排序，而不是按字母顺序？要执行此操作，请遵循以下步骤：\n\n\
    1.  切换到设计视图并双击图表以打开“图表数据”窗口。\n2.  点击`TerritoryName`旁边的向下箭头，并选择“类别组属性”，如图 [7-15](#A395630_1_En_7_Chapter.html#Fig15)所示。\n\
    \n    ![A395630_1_En_7_Fig15_HTML.jpg](A395630_1_En_7_Fig15_HTML.jpg)\n\n    图\
    \ 7-15. 选择“类别组属性”\n\n3.  选择“排序”页面，并将“排序依据”属性从`TerritoryName`更改为`TerritoryTotal`。此字段已作为每个区域的和进行了预聚合。你不能使用`Sum(TotalDue)`表达式进行排序。\n\
    4.  点击“确定”并预览报表。报表应如图 [7-16](#A395630_1_En_7_Chapter.html#Fig16)所示。\n\n    ![A395630_1_En_7_Fig16_HTML.jpg](A395630_1_En_7_Fig16_HTML.jpg)\n\
    \n    图 7-16. 按总销售额排序的图表\n\n## 树状图\n\n这种图表类型可能是显示此信息的最佳方式，但你还可以使用其他几种类型。可以使用饼图，但由于类别数量多，用户可能难以理解。漏斗图或金字塔图也可能适用，但你也可以选择树状图控件。这种图表类型是\
    \ SSRS 2016 的新功能。\n\n按照以下步骤学习如何使用新的树状图：\n\n1.  切换回设计视图。\n2.  增加报表画布的长度，为下一个图表腾出空间。\n\
    3.  向报表添加一个图表。\n4.  在“选择图表类型”对话框中，选择“树状图”，如图 [7-17](#A395630_1_En_7_Chapter.html#Fig17)所示，然后点击“确定”。\n\
    \n    ![A395630_1_En_7_Fig17_HTML.jpg](A395630_1_En_7_Fig17_HTML.jpg)\n\n    图\
    \ 7-17. 选择新的“树状图”图表\n\n5.  增大图表的尺寸。\n6.  通过双击图表打开“图表数据”窗口。\n7.  将`TotalSales`添加到`∑`值部分。\n\
    8.  将“类别组”值设置为`TerritoryName`。这将为每个区域创建一个部分，但它们的颜色将相同。\n9.  为使每个区域颜色不同，同时将“序列组”也设置为`TerritoryName`。\n\
    10. 预览报表。此时，图表将如图 [7-18](#A395630_1_En_7_Chapter.html#Fig18)所示。\n\n    ![A395630_1_En_7_Fig18_HTML.jpg](A395630_1_En_7_Fig18_HTML.jpg)\n\
    \n    图 7-18. 格式化前的树状图图表\n\n注意，某些单元格显示了两次区域，而有些则没有任何显示。为了解决这个问题，使用工具提示来显示信息。按照以下步骤添加工具提示并完成格式化：\n\
    \n1.  切换回设计视图。\n2.  右键单击一个序列单元格并点击“显示数据标签”，如图 [7-19](#A395630_1_En_7_Chapter.html#Fig19)所示。这实际上会将底部的标签切换为总销售额。\n\
    \n    ![A395630_1_En_7_Fig19_HTML.jpg](A395630_1_En_7_Fig19_HTML.jpg)\n\n    图\
    \ 7-19. 显示数据标签\n\n3.  右键单击其中一个数字并选择“序列标签属性”。\n4.  选择“序列标签属性”对话框的“数字”页面，格式化为货币，无小数位，并使用千位分隔符。\n\
    5.  点击“确定”接受更改。\n6.  右键单击一个序列单元格并选择“序列属性”。\n7.  点击“工具提示”属性旁边的`fx`，使用以下表达式：\n\n\
    \    ```\n    =Fields!TerritoryName.Value & \" \" &\n    FormatCurrency(Sum(Fields!TotalSales.Value),0)\n\
    \    ```\n\n8.  点击“确定”两次以关闭对话框。\n9.  将“图表标题”更改为以下表达式：\n\n    ```\n    =\"Sales\
    \ by Territory for \" & Parameters!Year.Value\n    ```\n\n10. 预览报表。图表应类似于图 [7-20](#A395630_1_En_7_Chapter.html#Fig20)。\n\
    \n    ![A395630_1_En_7_Fig20_HTML.jpg](A395630_1_En_7_Fig20_HTML.jpg)\n\n    图\
    \ 7-20. 格式化后的树状图图表\n\n## 折线图\n\n折线图类型也很有趣。使用它，你可以创建一个图表，比较多个类别随时间的变化。在这种情况下，你将创建一个图表，显示一年内每个月各区域的销售情况。按照以下步骤创建该图表：\n\
    \n1.  切换回设计视图。\n2.  扩大报表画布的尺寸。\n3.  向报表添加一个新图表，如图 [7-21](#A395630_1_En_7_Chapter.html#Fig21)所示。\n\
    \n    ![A395630_1_En_7_Fig21_HTML.jpg](A395630_1_En_7_Fig21_HTML.jpg)\n\n    图\
    \ 7-21. 选择折线图\n\n4.  增大图表的尺寸。\n5.  按照图 [7-22](#A395630_1_En_7_Chapter.html#Fig22)所示设置“图表数据”属性。“序列组”属性会将折线分割为各个区域。\n\
    \n    ![A395630_1_En_7_Fig22_HTML.jpg](A395630_1_En_7_Fig22_HTML.jpg)\n\n    图\
    \ 7-22. 图表数据属性\n\n6.  将水平轴的`Interval`属性更改为`1`，以便显示所有月份。\n7.  要将水平轴中的月份从数字更改为月份名称，请点击“图表数据”窗口中`OrderMonth`旁边的向下箭头，并选择“类别组属性”，如图\
    \ [7-23](#A395630_1_En_7_Chapter.html#Fig23)所示。\n\n    ![A395630_1_En_7_Fig23_HTML.jpg](A395630_1_En_7_Fig23_HTML.jpg)\n\
    \n    图 7-23. 选择“类别组属性”\n\n8.  点击“标签”旁边的`fx`图标并添加此表达式：\n\n    ```\n    =MonthName(Fields!OrderMonth.Value)\n\
    \    ```\n\n9.  点击“确定”两次以关闭两个对话框。\n10. 选择其中一个序列线并选择“序列属性”。\n11. 将工具提示属性更改为以下表达式："
  raw: "1.  Switch back to design view.  \n2.  Right-click the horizontal axis and\
    \ select Horizontal Axis Properties.  \n3.  This brings up the Horizontal Axis\
    \ Properties dialog box. On the Axis Options page, change the Interval property\
    \ to 1 and click OK. This will cause all territories to display on the chart.\
    \  \n4.  Right-click the horizontal axis and select Show Axis Title.  \n5.  Right-click\
    \ the horizontal Axis Title and select Axis Title Properties.  \n6.  This brings\
    \ up the Axis Title Properties dialog. Change the Text Title to Territory and\
    \ click OK.  \n7.  Right-click the vertical axis and select Show Axis Title.  \n\
    8.  In addition to changing the axis title by bringing up the Axis Title Properties\
    \ dialog, you can also change an axis title by clicking into it and typing. Change\
    \ the vertical Axis Title to Sales in thousands.  \n9.  Right-click the Chart\
    \ Title and bring up the properties.  \n10.  Next to the Title Text, click fx\
    \ to open the Expressions dialog.  \n11.  To add the year parameter to the title,\
    \ the expression should be\n\n```\n    =\"Total Sales by Territory for \" & Parameters!Year.Value\n\
    \    ```\n\n12.  Click OK twice to accept the properties.  \n13.  Select the chart\
    \ legend, Total Sales, and click the Delete key. In this case, the chart legend\
    \ doesn’t add anything to the report.  \n14.  Right-click the vertical axis and\
    \ select Vertical Axis Properties.  \n15.  On the Number page of the Vertical\
    \ Axis Properties dialog, select Currency under Category.  \n16.  Change Decimal\
    \ places to 0.  \n17.  Check Use 1000 separator (,) and check Show values in Thousands.\
    \ The Number page should look like Figure [7-13](#A395630_1_En_7_Chapter.html#Fig13).\n\
    \n![A395630_1_En_7_Fig13_HTML.jpg](A395630_1_En_7_Fig13_HTML.jpg)\n\nFigure 7-13.\n\
    \nThe Number properties of the vertical axis  \n18.  Click OK to accept the properties.\
    \  \n19.  Right-click one of the bars and select Series Properties.  \n20.  On\
    \ the Series Data page of the Series Properties dialog, click the fx symbol next\
    \ to Tooltip.  \n21.  The expression should be\n\n```\n    =FormatCurrency(Sum(Fields!TotalSales.Value),0)\n\
    \    ```\n\n22.  Click OK twice to accept the change.\n\nNow when you preview\
    \ the report, the chart should resemble Figure [7-14](#A395630_1_En_7_Chapter.html#Fig14).\
    \ Be sure to hold the cursor over one or more of the bars to see the tooltip.\n\
    \n![A395630_1_En_7_Fig14_HTML.jpg](A395630_1_En_7_Fig14_HTML.jpg)\n\nFigure 7-14.\n\
    \nThe chart with formatting\n\nThe report looks pretty good, but you can do more.\
    \ What about sorting the bars by the total sales instead of alphabetically? To\
    \ do this, follow these steps:\n\n1.  Switch to design view and double-click the\
    \ chart to open the Chart Data window.  \n2.  Click the down arrow next to TerritoryName\
    \ and select Category Group Properties as shown in Figure [7-15](#A395630_1_En_7_Chapter.html#Fig15).\n\
    \n![A395630_1_En_7_Fig15_HTML.jpg](A395630_1_En_7_Fig15_HTML.jpg)\n\nFigure 7-15.\n\
    \nSelect Category Group Properties  \n3.  Select the Sorting page and change the\
    \ Sort by property from TerritoryName to TerritoryTotal. This field has been pre-aggregated\
    \ as a sum for each territory. You cannot use the `Sum(TotalDue)` expression to\
    \ sort.  \n4.  Click OK and preview the report. The report should look like Figure\
    \ [7-16](#A395630_1_En_7_Chapter.html#Fig16).\n\n![A395630_1_En_7_Fig16_HTML.jpg](A395630_1_En_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16.\n\nThe chart sorted by total sales\n\nThis chart type is probably\
    \ the best way to display this information, but there are several other types\
    \ you could use. A pie chart could be used, but it would be difficult for the\
    \ user to understand because of the high number of categories. Funnel or pyramid\
    \ charts may work as well, but you could also choose the tree map control. This\
    \ type of chart is new with SSRS 2016.\n\nFollow these steps to learn how to use\
    \ the new tree map chart :\n\n1.  Switch back to design view.  \n2.  Increase\
    \ the length of the report canvas to make room for the next chart.  \n3.  Add\
    \ a chart to the report.  \n4.  On the Select Chart Type dialog, select the Tree\
    \ Map as shown in Figure [7-17](#A395630_1_En_7_Chapter.html#Fig17) and click\
    \ OK.\n\n![A395630_1_En_7_Fig17_HTML.jpg](A395630_1_En_7_Fig17_HTML.jpg)\n\nFigure\
    \ 7-17.\n\nSelect the new Tree Map chart  \n5.  Increase the size of the chart.\
    \  \n6.  Open the Chart Data window by double-clicking the chart.  \n7.  Add TotalSales\
    \ to the ∑ Values section.  \n8.  Set the Category Groups values to TerritoryName.\
    \ This will create a section for each territory, but they will be the same color.\
    \  \n9.  To make each territory a different color, also set the Series Groups\
    \ to TerritoryName.  \n10.  Preview the report. At this point, the chart will\
    \ look like Figure [7-18](#A395630_1_En_7_Chapter.html#Fig18).\n\n![A395630_1_En_7_Fig18_HTML.jpg](A395630_1_En_7_Fig18_HTML.jpg)\n\
    \nFigure 7-18.\n\nThe Tree Map chart before formatting\n\nNotice that some of\
    \ the cells have the territory displayed twice, but some do not have anything\
    \ displayed. To get around this, use a tooltip to display the information. Follow\
    \ these steps to add the tooltip and complete the formatting:\n\n1.  Switch back\
    \ to design view.  \n2.  Right-click a series cell and click Show Data Labels\
    \ as shown in Figure [7-19](#A395630_1_En_7_Chapter.html#Fig19). This actually\
    \ switches the labels at the bottom to the total sales.\n\n![A395630_1_En_7_Fig19_HTML.jpg](A395630_1_En_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19.\n\nShow Data Labels  \n3.  Right-click one of the numbers and select\
    \ Series Label Properties.  \n4.  Select the Number page of the Series Label Properties\
    \ dialog and format as Currency with no decimal places and use the 1000 separator.\
    \  \n5.  Click OK to accept the change.  \n6.  Right-click a series cell and select\
    \ Series Properties.  \n7.  Click fx next to the ToolTip property and use the\
    \ following expression:\n\n```\n    =Fields!TerritoryName.Value & \" \" &\n  \
    \  FormatCurrency(Sum(Fields!TotalSales.Value),0)\n    ```\n\n8.  Click OK twice\
    \ to dismiss the dialogs.  \n9.  Change the Chart Title to the following expression:\n\
    \n```\n    =\"Sales by Territory for \" & Parameters!Year.Value\n    ```\n\n10.\
    \  Preview the report. The chart should look similar to Figure [7-20](#A395630_1_En_7_Chapter.html#Fig20).\n\
    \n![A395630_1_En_7_Fig20_HTML.jpg](A395630_1_En_7_Fig20_HTML.jpg)\n\nFigure 7-20.\n\
    \nThe formatted tree map chart\n\nThe Line chart type is also interesting. With\
    \ it you can create a graph that compares multiple categories over time. In this\
    \ case, you will create a graph that displays the sales for the territories over\
    \ each month for one year. Follow these steps to create the graph:\n\n1.  Switch\
    \ back to design view.  \n2.  Expand the size of the report canvas.  \n3.  Add\
    \ a new chart to the report as shown in Figure [7-21](#A395630_1_En_7_Chapter.html#Fig21).\n\
    \n![A395630_1_En_7_Fig21_HTML.jpg](A395630_1_En_7_Fig21_HTML.jpg)\n\nFigure 7-21.\n\
    \nSelect the Line chart  \n4.  Increase the size of the chart.  \n5.  Set the\
    \ Chart Data properties as shown in Figure [7-22](#A395630_1_En_7_Chapter.html#Fig22).\
    \ The Series Groups property will split the line into individual territories.\n\
    \n![A395630_1_En_7_Fig22_HTML.jpg](A395630_1_En_7_Fig22_HTML.jpg)\n\nFigure 7-22.\n\
    \nThe Chart Data properties  \n6.  Change the Interval property of the horizontal\
    \ axis to 1 so that all months will display.  \n7.  To change the months in the\
    \ horizontal axis to the month name instead of number, click the down arrow in\
    \ the Chart Data window next to OrderMonth and select Category Group Properties\
    \ as shown in Figure [7-23](#A395630_1_En_7_Chapter.html#Fig23).\n\n![A395630_1_En_7_Fig23_HTML.jpg](A395630_1_En_7_Fig23_HTML.jpg)\n\
    \nFigure 7-23.\n\nSelect Category Group Properties  \n8.  Click the fx icon next\
    \ to Label and add this expression:\n\n```\n    =MonthName(Fields!OrderMonth.Value)\n\
    \    ```\n\n9.  Click OK twice to dismiss both dialog boxes.  \n10.  Select one\
    \ of the series lines and select Series Properties.  \n11.  Change the tooltip\
    \ property to this expression:"
  trans: "\n# 图表格式化与高级类型\n\n## 柱状图格式化\n\n1.  切换回设计视图。\n2.  右键单击水平轴并选择“水平轴属性”。\n3.\
    \  这将打开“水平轴属性”对话框。在“轴选项”页面上，将`Interval`属性更改为`1`并点击“确定”。这将使所有区域都在图表上显示。\n4.  右键单击水平轴并选择“显示轴标题”。\n\
    5.  右键单击水平“轴标题”并选择“轴标题属性”。\n6.  这将打开“轴标题属性”对话框。将文本标题更改为`Territory`并点击“确定”。\n7.\
    \  右键单击垂直轴并选择“显示轴标题”。\n8.  除了通过打开“轴标题属性”对话框来更改轴标题，你也可以通过点击它并输入来更改。将垂直“轴标题”更改为`Sales\
    \ in thousands`。\n9.  右键单击“图表标题”并打开其属性。\n10. 在“标题文本”旁边，点击`fx`以打开“表达式”对话框。\n11.\
    \ 要将年份参数添加到标题中，表达式应为：\n\n    ```\n    =\"Total Sales by Territory for \" & Parameters!Year.Value\n\
    \    ```\n\n12. 点击“确定”两次以接受属性设置。\n13. 选择图例“Total Sales”并按`Delete`键。在这种情况下，图表图例对报表没有增加任何价值。\n\
    14. 右键单击垂直轴并选择“垂直轴属性”。\n15. 在“垂直轴属性”对话框的“数字”页面上，在“类别”下选择“货币”。\n16. 将“小数位数”更改为`0`。\n\
    17. 勾选“使用千位分隔符 (,)”并勾选“以千为单位显示值”。“数字”页面应如图 7-13 所示。\n\n    ![A395630_1_En_7_Fig13_HTML.jpg](img/A395630_1_En_7_Fig13_HTML.jpg)\n\
    \n    图 7-13. 垂直轴的数字属性\n\n18. 点击“确定”以接受属性设置。\n19. 右键单击其中一个数据条并选择“系列属性”。\n20. 在“系列属性”对话框的“系列数据”页面上，点击“工具提示”旁边的`fx`符号。\n\
    21. 表达式应为：\n\n    ```\n    =FormatCurrency(Sum(Fields!TotalSales.Value),0)\n \
    \   ```\n\n22. 点击“确定”两次以接受更改。\n\n现在当你预览报表时，图表应该类似于图 7-14。务必在一个或多个数据条上悬停光标以查看工具提示。\n\
    \n![A395630_1_En_7_Fig14_HTML.jpg](img/A395630_1_En_7_Fig14_HTML.jpg)\n\n图 7-14.\
    \ 格式化后的图表\n\n## 按销售额排序\n\n报表看起来相当不错，但你还可以做更多。比如，按总销售额对数据条排序，而不是按字母顺序？要执行此操作，请遵循以下步骤：\n\
    \n1.  切换到设计视图并双击图表以打开“图表数据”窗口。\n2.  点击`TerritoryName`旁边的向下箭头，并选择“类别组属性”，如图 7-15\
    \ 所示。\n\n    ![A395630_1_En_7_Fig15_HTML.jpg](img/A395630_1_En_7_Fig15_HTML.jpg)\n\
    \n    图 7-15. 选择“类别组属性”\n\n3.  选择“排序”页面，并将“排序依据”属性从`TerritoryName`更改为`TerritoryTotal`。此字段已作为每个区域的和进行了预聚合。你不能使用`Sum(TotalDue)`表达式进行排序。\n\
    4.  点击“确定”并预览报表。报表应如图 7-16 所示。\n\n    ![A395630_1_En_7_Fig16_HTML.jpg](img/A395630_1_En_7_Fig16_HTML.jpg)\n\
    \n    图 7-16. 按总销售额排序的图表\n\n## 树状图\n\n这种图表类型可能是显示此信息的最佳方式，但你还可以使用其他几种类型。可以使用饼图，但由于类别数量多，用户可能难以理解。漏斗图或金字塔图也可能适用，但你也可以选择树状图控件。这种图表类型是\
    \ SSRS 2016 的新功能。\n\n按照以下步骤学习如何使用新的树状图：\n\n1.  切换回设计视图。\n2.  增加报表画布的长度，为下一个图表腾出空间。\n\
    3.  向报表添加一个图表。\n4.  在“选择图表类型”对话框中，选择“树状图”，如图 7-17 所示，然后点击“确定”。\n\n    ![A395630_1_En_7_Fig17_HTML.jpg](img/A395630_1_En_7_Fig17_HTML.jpg)\n\
    \n    图 7-17. 选择新的“树状图”图表\n\n5.  增大图表的尺寸。\n6.  通过双击图表打开“图表数据”窗口。\n7.  将`TotalSales`添加到`∑`值部分。\n\
    8.  将“类别组”值设置为`TerritoryName`。这将为每个区域创建一个部分，但它们的颜色将相同。\n9.  为使每个区域颜色不同，同时将“序列组”也设置为`TerritoryName`。\n\
    10. 预览报表。此时，图表将如图 7-18 所示。\n\n    ![A395630_1_En_7_Fig18_HTML.jpg](img/A395630_1_En_7_Fig18_HTML.jpg)\n\
    \n    图 7-18. 格式化前的树状图图表\n\n注意，某些单元格显示了两次区域，而有些则没有任何显示。为了解决这个问题，使用工具提示来显示信息。按照以下步骤添加工具提示并完成格式化：\n\
    \n1.  切换回设计视图。\n2.  右键单击一个序列单元格并点击“显示数据标签”，如图 7-19 所示。这实际上会将底部的标签切换为总销售额。\n\n\
    \    ![A395630_1_En_7_Fig19_HTML.jpg](img/A395630_1_En_7_Fig19_HTML.jpg)\n\n \
    \   图 7-19. 显示数据标签\n\n3.  右键单击其中一个数字并选择“序列标签属性”。\n4.  选择“序列标签属性”对话框的“数字”页面，格式化为货币，无小数位，并使用千位分隔符。\n\
    5.  点击“确定”接受更改。\n6.  右键单击一个序列单元格并选择“序列属性”。\n7.  点击“工具提示”属性旁边的`fx`，使用以下表达式：\n\n\
    \    ```\n    =Fields!TerritoryName.Value & \" \" &\n    FormatCurrency(Sum(Fields!TotalSales.Value),0)\n\
    \    ```\n\n8.  点击“确定”两次以关闭对话框。\n9.  将“图表标题”更改为以下表达式：\n\n    ```\n    =\"Sales\
    \ by Territory for \" & Parameters!Year.Value\n    ```\n\n10. 预览报表。图表应类似于图 7-20。\n\
    \n    ![A395630_1_En_7_Fig20_HTML.jpg](img/A395630_1_En_7_Fig20_HTML.jpg)\n\n\
    \    图 7-20. 格式化后的树状图图表\n\n## 折线图\n\n折线图类型也很有趣。使用它，你可以创建一个图表，比较多个类别随时间的变化。在这种情况下，你将创建一个图表，显示一年内每个月各区域的销售情况。按照以下步骤创建该图表：\n\
    \n1.  切换回设计视图。\n2.  扩大报表画布的尺寸。\n3.  向报表添加一个新图表，如图 7-21 所示。\n\n    ![A395630_1_En_7_Fig21_HTML.jpg](img/A395630_1_En_7_Fig21_HTML.jpg)\n\
    \n    图 7-21. 选择折线图\n\n4.  增大图表的尺寸。\n5.  按照图 7-22 所示设置“图表数据”属性。“序列组”属性会将折线分割为各个区域。\n\
    \n    ![A395630_1_En_7_Fig22_HTML.jpg](img/A395630_1_En_7_Fig22_HTML.jpg)\n\n\
    \    图 7-22. 图表数据属性\n\n6.  将水平轴的`Interval`属性更改为`1`，以便显示所有月份。\n7.  要将水平轴中的月份从数字更改为月份名称，请点击“图表数据”窗口中`OrderMonth`旁边的向下箭头，并选择“类别组属性”，如图\
    \ 7-23 所示。\n\n    ![A395630_1_En_7_Fig23_HTML.jpg](img/A395630_1_En_7_Fig23_HTML.jpg)\n\
    \n    图 7-23. 选择“类别组属性”\n\n8.  点击“标签”旁边的`fx`图标并添加此表达式：\n\n    ```\n    =MonthName(Fields!OrderMonth.Value)\n\
    \    ```\n\n9.  点击“确定”两次以关闭两个对话框。\n10. 选择其中一个序列线并选择“序列属性”。\n11. 将工具提示属性更改为以下表达式：\n"
- fmt: "# 配置图表\n\n```\n=Fields!TerritoryName.Value & \" \" & FormatCurrency(Fields!TotalSales.Value,0)\n\
    ```\n\n12. 单击 **OK** 关闭 **Expressions** 对话框，然后选择 **Markers** 页面。\n13. 将 **Marker\
    \ Type** 更改为 **Circle** 并单击 **OK**。\n14. 右键单击图例并打开其属性。\n15. 将图例位置更改为顶部，如图 [7-24](#A395630_1_En_7_Chapter.html#Fig24)\
    \ 所示。\n    ![A395630_1_En_7_Fig24_HTML.jpg](A395630_1_En_7_Fig24_HTML.jpg)\n \
    \   **图 7-24. 图例位置**\n16. 单击 **OK** 接受更改。\n17. 将图表标题更改为\n    ```\n    =\"Sales\
    \ by Month for \" & Parameters!Year.Value\n    ```\n18. 打开垂直轴属性并设置垂直轴格式，使其显示为货币格式，无小数位，并包含千位分隔符。\n\
    19. 仅以千为单位显示数值，然后单击 **OK** 保存更改。\n20. 右键单击垂直轴并选择 **Show Axis Title**。标题应为 **Sales\
    \ in Thousands**。\n21. 将水平轴的 **Interval** 属性设置为 `1`，以显示所有月份。\n22. 预览报表。它应类似于图\
    \ [7-25](#A395630_1_En_7_Chapter.html#Fig25)。\n    ![A395630_1_En_7_Fig25_HTML.jpg](A395630_1_En_7_Fig25_HTML.jpg)\n\
    \    **图 7-25. 销售图表**\n\n# 向报表添加仪表\n\n图表和图形用于在类别、时间或两者上比较值。仪表可用于显示单个目标是否达成。达到销售配额就是一个很好的例子。仪表看起来像温度计和表盘，它们的配置比图表更复杂。\n\
    \n在深入细节之前，先了解一下构成仪表的不同部分，如图 [7-26](#A395630_1_En_7_Chapter.html#Fig26) 所示。\n![A395630_1_En_7_Fig26_HTML.jpg](A395630_1_En_7_Fig26_HTML.jpg)\n\
    **图 7-26. 仪表的组成部分**\n\n**刻度** 代表您预期的值范围。它可以是数值（如美元）或百分比。刻度的最高值可以是目标或配额。但是，如果可能超过目标，您可能希望将最高值设置得比目标高，例如目标加上\
    \ 25%。\n\n**范围** 突出显示刻度上的某些区域。例如，您可能希望突出显示目标。您可以自定义范围的颜色，一种方法是将范围的颜色从红色渐变到绿色。可以添加多个范围以对颜色进行更精细的控制。\n\
    \n**指针** 代表已实现的值。一眼就能看出目标是否达成，这取决于指针距离目标有多近。有几种类型的仪表可供选择，包括带有两个表盘的仪表和带有对数刻度的仪表。要了解如何使用仪表，请按照以下步骤操作：\n\
    \n1. 向项目添加一个名为 `Gauges` 的新报表。\n2. 设置一个指向 `AdventureWorks2016` 的数据源，命名为 `AdventureWorks`。\n\
    3. 添加一个名为 `Year` 的数据集，指向 `Year` 共享数据集。\n4. `AdventureWorks` 数据库中有一个包含配额的表，但与销售相比，这些值不太合理。因此，创建一个名为\
    \ `SalesQuota` 的数据集，使用此包含硬编码值的查询：\n    ```\n    SELECT * FROM\n    (VALUES(2011,1000,\
    \ 899),\n    (2012,1000,1010),\n    (2013,1200,1100),\n    (2014,1200,1220))\n\
    \    AS Quota ([Year],[Target],Sales)\n    WHERE [Year] = @Year;\n    ```\n5.\
    \ 将自动创建一个 `Year` 参数。将 **Available Values** 更改为 **Get values from a query**。**Dataset**\
    \ 为 `Year`。**Value field** 和 **Label field** 应设置为 `OrderYear`。\n6. 向报表添加一个仪表。选择\
    \ **Radial graph**，如图 [7-27](#A395630_1_En_7_Chapter.html#Fig27) 所示。\n    ![A395630_1_En_7_Fig27_HTML.jpg](A395630_1_En_7_Fig27_HTML.jpg)\n\
    \    **图 7-27. 向报表添加径向仪表**\n7. 单击仪表时，将打开 **Gauge Data** 窗口。在 `LinearPointer1`\
    \ 下，将 `Unspecified` 更改为 `Sales`。它将自动求和，如图 [7-28](#A395630_1_En_7_Chapter.html#Fig28)\
    \ 所示。\n    ![A395630_1_En_7_Fig28_HTML.jpg](A395630_1_En_7_Fig28_HTML.jpg)\n \
    \   **图 7-28. 仪表数据属性**\n8. 右键单击仪表内部。选择 **Gauge Panel** ➤ **Scale Properties**。\n\
    9. 默认情况下，刻度范围是 0 到 100。要将其更改为与数据中的值匹配，请在 **General** 页面上单击 **Maximum** 属性的 `fx`\
    \ 符号。\n10. 将表达式更改为\n    ```\n    =Fields!Target.Value * 1.25\n    ```\n11. 切换到\
    \ **Number** 页面并格式化为 **Currency**，无小数位。\n12. 单击 **OK** 接受属性。\n13. 通过右键单击仪表并选择\
    \ **Gauge Panel** ➤ **Range (LinearRange3) Properties**，打开最顶部范围的属性。\n14. 在 **General**\
    \ 页面上，将 **Start range at scale value** 属性更改为以下表达式：\n    ```\n    =Fields!Target.Value\
    \ * .95\n    ```\n15. 将 **End range at scale value** 更改为以下表达式：\n    ```\n    =Fields!Target.Value\
    \ * 1.25\n    ```\n16. 单击 **OK** 接受属性。\n17. 打开中间范围 `LinearRange2` 的属性。\n18. 将\
    \ **Start range at scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n\
    \    ```\n19. 将 **End Range at Scale Value** 设置为\n    ```\n    =Fields!Target.Value\
    \ * .95\n    ```\n20. 单击 **OK**。\n21. 打开最底部范围 `LinearRange1` 的属性。\n22. 将 **End\
    \ range at scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n    ```"
  raw: "```\n    =Fields!TerritoryName.Value & \" \" & FormatCurrency(Fields!TotalSales.Value,0)\n\
    \    ```\n\n12.  Click OK to dismiss the Expressions dialog and then select the\
    \ Markers page.  \n13.  Change the Marker Type to Circle and click OK.  \n14.\
    \  Right-click the legend and bring up the properties.  \n15.  Change the Legend\
    \ position to the top as shown in Figure [7-24](#A395630_1_En_7_Chapter.html#Fig24).\n\
    \n![A395630_1_En_7_Fig24_HTML.jpg](A395630_1_En_7_Fig24_HTML.jpg)\n\nFigure 7-24.\n\
    \nThe Legend position  \n16.  Click OK to accept the change.  \n17.  Change the\
    \ Chart Title to\n\n```\n    =\"Sales by Month for \" & Parameters!Year.Value\n\
    \    ```\n\n18.  Bring up the Vertical Axis properties and format the vertical\
    \ axis so that it displays currency with no decimal places and with a thousands\
    \ separator.  \n19.  Only show values in thousands and click OK to save the changes.\
    \  \n20.  Right-click the vertical axis and select Show Axis Title. The title\
    \ should say Sales in Thousands.  \n21.  Set the Interval property of the horizontal\
    \ axis to 1 so that all months display.  \n22.  Preview the report. It should\
    \ look similar to Figure [7-25](#A395630_1_En_7_Chapter.html#Fig25).\n\n![A395630_1_En_7_Fig25_HTML.jpg](A395630_1_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25.\n\nThe sales graph\n\n## Adding Gauges to Reports\n\nCharts and\
    \ graphs compare values over categories, time, or both. A gauge can be used to\
    \ show if a single goal was met. Meeting a sales quota is a good example. Gauges\
    \ look like thermometers and dials, and they are more complex to configure than\
    \ charts.\n\nBefore diving in to the details, take a look at the different parts\
    \ that make up a gauge as shown in Figure [7-26](#A395630_1_En_7_Chapter.html#Fig26).\n\
    \n![A395630_1_En_7_Fig26_HTML.jpg](A395630_1_En_7_Fig26_HTML.jpg)\n\nFigure 7-26.\n\
    \nThe parts of a gauge\n\nThe scale represents the range of values you expect.\
    \ It can be in terms of a numeric value such as dollars or a percent. The top\
    \ value of the scale could be the goal or quota. However, if it is possible to\
    \ exceed the goal, you may want to make the top value higher than the goal, such\
    \ as the goal plus 25%.\n\nThe range highlights certain areas on the scale. For\
    \ example, you may want to highlight the goal. You can customize the range with\
    \ color, and one way might be to color the range from red to green. It’s possible\
    \ to add multiple ranges to have even more granular control over the color.\n\n\
    The pointer represents the value achieved. At a glance, you can tell if the goal\
    \ was met by how close it lands to the target. Several types of gauges are available,\
    \ including those with two dials and those with logarithmic scales. To learn how\
    \ to work with gauges, follow these steps:\n\n1.  Add a new report to the project\
    \ named Gauges.  \n2.  Set up a data source pointing to AdventureWorks2016 named\
    \ AdventureWorks.  \n3.  Add a dataset named Year with pointing to the Year shared\
    \ dataset.  \n4.  There is a table with quotas in the AdventureWorks database,\
    \ but the values do not make much sense compared to the sales. Instead, create\
    \ a dataset named SalesQuota with this query containing hard-coded values:\n\n\
    ```\n    SELECT * FROM\n    (VALUES(2011,1000, 899),\n    (2012,1000,1010),\n\
    \    (2013,1200,1100),\n    (2014,1200,1220))\n    AS Quota ([Year],[Target],Sales)\n\
    \    WHERE [Year] = @Year;\n    ```\n\n5.  A Year parameter will automatically\
    \ be created. Change the Available Values to Get values from a query. The Dataset\
    \ is Year. The Value field and Label field should be set to OrderYear.  \n6. \
    \ Add a gauge to the report. Select the Radial graph as shown in Figure [7-27](#A395630_1_En_7_Chapter.html#Fig27).\n\
    \n![A395630_1_En_7_Fig27_HTML.jpg](A395630_1_En_7_Fig27_HTML.jpg)\n\nFigure 7-27.\n\
    \nAdd a Radial gauge to the report  \n7.  When you click the gauge, the Gauge\
    \ Data window opens. Under LinearPointer1, change Unspecified to Sales. It will\
    \ automatically sum as shown in Figure [7-28](#A395630_1_En_7_Chapter.html#Fig28).\n\
    \n![A395630_1_En_7_Fig28_HTML.jpg](A395630_1_En_7_Fig28_HTML.jpg)\n\nFigure 7-28.\n\
    \nThe Gauge Data properties  \n8.  Right-click inside the gauge. Select Gauge\
    \ Panel ➤ Scale Properties.  \n9.  By default, the scale goes from 0 to 100\\\
    . To change it to match the values in the data, click the fx symbol for the Maximum\
    \ property on the General page.  \n10.  Change the expression to\n\n```\n    =Fields!Target.Value\
    \ * 1.25\n    ```\n\n11.  Switch to the Number page and format as Currency with\
    \ no decimal places.  \n12.  Click OK to accept the properties.  \n13.  Bring\
    \ up the Range Properties of the top range by right-clicking the gauge and selecting\
    \ Gauge Panel ➤ Range (LinearRange3) Properties.  \n14.  On the General page,\
    \ change the Start range at scale value property to the following expression:\n\
    \n```\n    =Fields!Target.Value * .95\n    ```\n\n15.  Change the End range at\
    \ scale value to this expression:\n\n```\n    =Fields!Target.Value * 1.25\n  \
    \  ```\n\n16.  Click OK to accept the properties.  \n17.  Bring up the Range Properties\
    \ of the middle range, LinearRange2.  \n18.  Set the Start range at scale value\
    \ to\n\n```\n    =Fields!Target.Value * .75\n    ```\n\n19.  Set the End Range\
    \ at Scale Value to\n\n```\n    =Fields!Target.Value * .95\n    ```\n\n20.  Click\
    \ OK.  \n21.  Bring up the Range Properties of the bottom range, LinearRange1.\
    \  \n22.  Set the End range at scale value to\n\n```\n    =Fields!Target.Value\
    \ * .75\n    ```"
  trans: "\n# 配置图表\n\n```\n=Fields!TerritoryName.Value & \" \" & FormatCurrency(Fields!TotalSales.Value,0)\n\
    ```\n\n12. 单击 **OK** 关闭 **Expressions** 对话框，然后选择 **Markers** 页面。\n13. 将 **Marker\
    \ Type** 更改为 **Circle** 并单击 **OK**。\n14. 右键单击图例并打开其属性。\n15. 将图例位置更改为顶部，如图 7-24\
    \ 所示。\n    ![A395630_1_En_7_Fig24_HTML.jpg](img/A395630_1_En_7_Fig24_HTML.jpg)\n\
    \    **图 7-24. 图例位置**\n16. 单击 **OK** 接受更改。\n17. 将图表标题更改为\n    ```\n    =\"Sales\
    \ by Month for \" & Parameters!Year.Value\n    ```\n18. 打开垂直轴属性并设置垂直轴格式，使其显示为货币格式，无小数位，并包含千位分隔符。\n\
    19. 仅以千为单位显示数值，然后单击 **OK** 保存更改。\n20. 右键单击垂直轴并选择 **Show Axis Title**。标题应为 **Sales\
    \ in Thousands**。\n21. 将水平轴的 **Interval** 属性设置为 `1`，以显示所有月份。\n22. 预览报表。它应类似于图\
    \ 7-25。\n    ![A395630_1_En_7_Fig25_HTML.jpg](img/A395630_1_En_7_Fig25_HTML.jpg)\n\
    \    **图 7-25. 销售图表**\n\n# 向报表添加仪表\n\n图表和图形用于在类别、时间或两者上比较值。仪表可用于显示单个目标是否达成。达到销售配额就是一个很好的例子。仪表看起来像温度计和表盘，它们的配置比图表更复杂。\n\
    \n在深入细节之前，先了解一下构成仪表的不同部分，如图 7-26 所示。\n![A395630_1_En_7_Fig26_HTML.jpg](img/A395630_1_En_7_Fig26_HTML.jpg)\n\
    **图 7-26. 仪表的组成部分**\n\n**刻度** 代表您预期的值范围。它可以是数值（如美元）或百分比。刻度的最高值可以是目标或配额。但是，如果可能超过目标，您可能希望将最高值设置得比目标高，例如目标加上\
    \ 25%。\n\n**范围** 突出显示刻度上的某些区域。例如，您可能希望突出显示目标。您可以自定义范围的颜色，一种方法是将范围的颜色从红色渐变到绿色。可以添加多个范围以对颜色进行更精细的控制。\n\
    \n**指针** 代表已实现的值。一眼就能看出目标是否达成，这取决于指针距离目标有多近。有几种类型的仪表可供选择，包括带有两个表盘的仪表和带有对数刻度的仪表。要了解如何使用仪表，请按照以下步骤操作：\n\
    \n1.  向项目添加一个名为 `Gauges` 的新报表。\n2.  设置一个指向 `AdventureWorks2016` 的数据源，命名为 `AdventureWorks`。\n\
    3.  添加一个名为 `Year` 的数据集，指向 `Year` 共享数据集。\n4.  `AdventureWorks` 数据库中有一个包含配额的表，但与销售相比，这些值不太合理。因此，创建一个名为\
    \ `SalesQuota` 的数据集，使用此包含硬编码值的查询：\n    ```\n    SELECT * FROM\n    (VALUES(2011,1000,\
    \ 899),\n    (2012,1000,1010),\n    (2013,1200,1100),\n    (2014,1200,1220))\n\
    \    AS Quota ([Year],[Target],Sales)\n    WHERE [Year] = @Year;\n    ```\n5.\
    \  将自动创建一个 `Year` 参数。将 **Available Values** 更改为 **Get values from a query**。**Dataset**\
    \ 为 `Year`。**Value field** 和 **Label field** 应设置为 `OrderYear`。\n6.  向报表添加一个仪表。选择\
    \ **Radial graph**，如图 7-27 所示。\n    ![A395630_1_En_7_Fig27_HTML.jpg](img/A395630_1_En_7_Fig27_HTML.jpg)\n\
    \    **图 7-27. 向报表添加径向仪表**\n7.  单击仪表时，将打开 **Gauge Data** 窗口。在 `LinearPointer1`\
    \ 下，将 `Unspecified` 更改为 `Sales`。它将自动求和，如图 7-28 所示。\n    ![A395630_1_En_7_Fig28_HTML.jpg](img/A395630_1_En_7_Fig28_HTML.jpg)\n\
    \    **图 7-28. 仪表数据属性**\n8.  右键单击仪表内部。选择 **Gauge Panel** ➤ **Scale Properties**。\n\
    9.  默认情况下，刻度范围是 0 到 100。要将其更改为与数据中的值匹配，请在 **General** 页面上单击 **Maximum** 属性的 `fx`\
    \ 符号。\n10. 将表达式更改为\n    ```\n    =Fields!Target.Value * 1.25\n    ```\n11. 切换到\
    \ **Number** 页面并格式化为 **Currency**，无小数位。\n12. 单击 **OK** 接受属性。\n13. 通过右键单击仪表并选择\
    \ **Gauge Panel** ➤ **Range (LinearRange3) Properties**，打开最顶部范围的属性。\n14. 在 **General**\
    \ 页面上，将 **Start range at scale value** 属性更改为以下表达式：\n    ```\n    =Fields!Target.Value\
    \ * .95\n    ```\n15. 将 **End range at scale value** 更改为以下表达式：\n    ```\n    =Fields!Target.Value\
    \ * 1.25\n    ```\n16. 单击 **OK** 接受属性。\n17. 打开中间范围 `LinearRange2` 的属性。\n18. 将\
    \ **Start range at scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n\
    \    ```\n19. 将 **End Range at Scale Value** 设置为\n    ```\n    =Fields!Target.Value\
    \ * .95\n    ```\n20. 单击 **OK**。\n21. 打开最底部范围 `LinearRange1` 的属性。\n22. 将 **End\
    \ range at scale value** 设置为\n    ```\n    =Fields!Target.Value * .75\n    ```\n"
- fmt: "## 仪表盘配置与表格集成\n\n1.  切换到设计视图。\n2.  要在一个报表中显示所有年份，请添加一个名为 `SalesAllYears` 的新数据集，其查询如下：\n\
    \n    ```sql\n    SELECT * FROM\n    (VALUES(2011,1000, 899),\n    (2012,1000,1010),\n\
    \    (2013,1200,1100),\n    (2014,1200,1220))\n    AS Quota ([Year],[Target],Sales);\n\
    \    ```\n\n3.  向报表添加一个表格。\n4.  从 `SalesAllYears` 数据集向表格添加字段 `Year`、`Target` 和\
    \ `Sales`。\n5.  在右侧添加一个新列。\n6.  将一个仪表盘拖到新的数据单元格中。\n7.  选择线性水平仪表盘，如图 [7-30](#A395630_1_En_7_Chapter.html#Fig30)\
    \ 所示。\n\n    ![A395630_1_En_7_Fig30_HTML.jpg](A395630_1_En_7_Fig30_HTML.jpg)\n\
    \n    **图 7-30.**\n\n    线性水平仪表盘\n\n8.  调整单元格的高度和宽度，使表格设计看起来如图 [7-31](#A395630_1_En_7_Chapter.html#Fig31)。\n\
    \n    ![A395630_1_En_7_Fig31_HTML.jpg](A395630_1_En_7_Fig31_HTML.jpg)\n\n    **图\
    \ 7-31.**\n\n    表格设计\n\n9.  双击仪表盘，调出“仪表盘数据”窗口。将 `LinearPointer1` 下的值更改为 `Sales`。它将自动求和。\n\
    10. 调出“刻度属性”，将“最大值”更改为以下表达式：\n\n    ```sql\n    =Fields!Target.Value * 1.25\n\
    \    ```\n\n11. 将“间隔”属性更改为 `200`。\n12. 在“数字”页面，将“类别”更改为“货币”。\n13. 更改为 0 位小数，并选中“使用千位分隔符\
    \ (,)”。\n14. 在“标签”页面，取消选中“在刻度末端显示标签”。\n15. 单击“确定”接受更改。\n16. 右键单击仪表盘并选择“添加范围”。\n\
    17. 调出“范围属性”。\n18. 将“范围起始刻度值”和“范围结束刻度值”都更改为 `Sum(Target)`。\n19. 在“边框”页面，将“线宽”更改为\
    \ `5 pt`。\n20. 单击“确定”接受更改。\n21. 选择包含仪表盘的单元格。\n22. 在“属性”窗口中，将 `BorderStyle Default`\
    \ 属性更改为 `Solid`，将 `BorderColor` 属性更改为 `LightGray`。\n\n当您预览报表时，表格应如图 [7-32](#A395630_1_En_7_Chapter.html#Fig32)\
    \ 所示。\n\n![A395630_1_En_7_Fig32_HTML.jpg](A395630_1_En_7_Fig32_HTML.jpg)\n\n**图\
    \ 7-32.**\n\n带有嵌入式仪表盘的表格\n\n## 向表格添加数据条、迷你图和指示器\n\n您在上一节中看到了可以向表格单元格添加仪表盘。有三种可视化控件——数据条、迷你图和指示器——设计用于在单元格内使用。指示器是简化的仪表盘。数据条和迷你图是简化的图表。要了解如何添加指示器，请按照以下步骤操作：\n\
    \n1.  向项目添加一个名为 `SmallControls` 的新报表。\n2.  添加指向共享 `AdventureWorks2016` 数据集的 `AdventureWorks`\
    \ 数据源。\n3.  添加一个名为 `Sales` 的嵌入数据集，其查询如下：\n\n    ```sql\n    SELECT YEAR(OrderDate)\
    \ AS OrderYear, MONTH(OrderDate) AS OrderMonth,\n    SUM(TotalDue) AS Sales\n\
    \    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate), MONTH(OrderDate);\n\
    \    ```\n\n4.  向报表添加一个表格。\n5.  向详细信息行添加 `Sales` 字段。\n6.  右键单击详细信息行并选择“添加组”➤“父组”。\n\
    7.  在“Tablix 组”对话框中，为“分组依据”属性选择 `OrderYear`。\n8.  选中“添加组标题”。对话框应如图 [7-33](#A395630_1_En_7_Chapter.html#Fig33)\
    \ 所示。\n\n    ![A395630_1_En_7_Fig33_HTML.jpg](A395630_1_En_7_Fig33_HTML.jpg)\n\
    \n    **图 7-33.**\n\n    `OrderYear` 组\n\n9.  单击“确定”。\n10. 通过右键单击行并选择“删除行”来删除详细信息行。\n\
    11. 当询问是否要删除行和组时，单击“确定”。\n12. 在 `Sales` 下的数据单元格中，选择 `Sales`。它将自动求和。\n13. 将一个“指示器”从工具箱拖到该行的第三个数据单元格中。\n\
    14. 选择默认的“方向”样式并单击“确定”。\n15. 删除空列。\n16. 单击带有指示器的单元格。您将在“属性”窗口中看到 `GaugePanel1`。将\
    \ `BorderStyle Default` 属性更改为 `Solid`。\n17. 双击保存指示器的单元格。将“仪表盘数据”值更改为 `Sales`。它将自动求和，如图\
    \ [7-34](#A395630_1_En_7_Chapter.html#Fig34) 所示。\n\n    ![A395630_1_En_7_Fig34_HTML.jpg](A395630_1_En_7_Fig34_HTML.jpg)\n\
    \n    **图 7-34.**\n\n    仪表盘数据属性\n\n当您运行报表时，它将如图 [7-35](#A395630_1_En_7_Chapter.html#Fig35)\
    \ 所示。\n\n![A395630_1_En_7_Fig35_HTML.jpg](A395630_1_En_7_Fig35_HTML.jpg)\n\n**图\
    \ 7-35.**\n\n带有指示器的报表\n\n默认情况下，指示器设置为根据销售百分比显示三个可能的图标。在设计视图中，右键单击单元格并选择“指示器属性”。您可以在“值和状态”页面上更改指示器的行为，如图\
    \ [7-36](#A395630_1_En_7_Chapter.html#Fig36) 所示。\n\n![A395630_1_En_7_Fig36_HTML.jpg](A395630_1_En_7_Fig36_HTML.jpg)\n\
    \n**图 7-36.**\n\n“值和状态”页面\n\n更改“起始值”和“结束值”以匹配图 [7-37](#A395630_1_En_7_Chapter.html#Fig37)。\n\
    \n![A395630_1_En_7_Fig37_HTML.jpg](A395630_1_En_7_Fig37_HTML.jpg)\n\n**图 7-37.**\n\
    \n新的指示器属性\n\n单击“确定”接受更改。现在当您运行报表时，处于第 50 个百分位数的所有销售指示器都将是红色的向下箭头，如图 [7-38](#A395630_1_En_7_Chapter.html#Fig38)\
    \ 所示。\n\n![A395630_1_En_7_Fig38_HTML.jpg](A395630_1_En_7_Fig38_HTML.jpg)\n\n**图\
    \ 7-38.**\n\n指示器更改后的结果\n\n此报表在年份级别显示数据。您可以使用迷你图来显示各月的销售情况。请按照以下步骤了解如何操作：\n\n1.\
    \  切换到设计视图。\n2.  在指示器右侧添加一个新列。\n3.  将一个迷你图控件拖到新的数据单元格中。\n4.  选择“带标记的折线图”迷你图类型，如图\
    \ [7-39](#A395630_1_En_7_Chapter.html#Fig39) 所示，然后单击“确定”。\n\n    ![A395630_1_En_7_Fig39_HTML.jpg](A395630_1_En_7_Fig39_HTML.jpg)\n\
    \n    **图 7-39.**"
  raw: "23.  Click OK.  \n24.  Right-click the scale and select Scale Properties.\
    \  \n25.  Select the Labels page.  \n26.  Uncheck Show labels at end of scale.\
    \  \n27.  Click OK.\n\nNow when you preview the report and select 2014 for the\
    \ Year parameter, the gauge will look like Figure [7-29](#A395630_1_En_7_Chapter.html#Fig29).\n\
    \n![A395630_1_En_7_Fig29_HTML.jpg](A395630_1_En_7_Fig29_HTML.jpg)\n\nFigure 7-29.\n\
    \nThe configured gauge\n\nWhile you will generally see gauges as a stand-alone\
    \ section of a report, you can also add gauges to a table cell. Follow these steps\
    \ to learn how to do it:\n\n1.  Switch to design view.  \n2.  To display all years\
    \ in one report, add a new dataset named SalesAllYears with the following query:\n\
    \n```\n    SELECT * FROM\n    (VALUES(2011,1000, 899),\n    (2012,1000,1010),\n\
    \    (2013,1200,1100),\n    (2014,1200,1220))\n    AS Quota ([Year],[Target],Sales);\n\
    \    ```\n\n3.  Add a table to the report.  \n4.  Add the fields Year, Target,\
    \ and Sales to the table from the SalesAllYears dataset.  \n5.  Add a new column\
    \ to the right.  \n6.  Drag a gauge into the new data cell.  \n7.  Select the\
    \ Linear Horizontal guage as shown in Figure [7-30](#A395630_1_En_7_Chapter.html#Fig30).\n\
    \n![A395630_1_En_7_Fig30_HTML.jpg](A395630_1_En_7_Fig30_HTML.jpg)\n\nFigure 7-30.\n\
    \nThe Linear horizontal gauge  \n8.  Expand the height and width of the cell so\
    \ that the table design looks like Figure [7-31](#A395630_1_En_7_Chapter.html#Fig31).\n\
    \n![A395630_1_En_7_Fig31_HTML.jpg](A395630_1_En_7_Fig31_HTML.jpg)\n\nFigure 7-31.\n\
    \nThe table design  \n9.  Double-click the gauge to bring up the Guage Data window.\
    \ Change the value under LinearPointer1 to Sales. It will automatically sum.  \n\
    10.  Bring up the Scale Properties and change the Maximum to the following expression:\n\
    \n```\n    =Fields!Target.Value * 1.25\n    ```\n\n11.  Change the Interval property\
    \ to 200.  \n12.  On the Number page, change the Category to Currency.  \n13.\
    \  Change to 0 decimal places and check Use 1000 separator (,).  \n14.  On the\
    \ Labels page, uncheck Show labels at the end of scale.  \n15.  Click OK to accept\
    \ the changes.  \n16.  Right-click the gauge and select Add Range.  \n17.  Bring\
    \ up the Range properties.  \n18.  Change both Start range at scale value and\
    \ End range at scale value to Sum(Target).  \n19.  On the Border page, change\
    \ the Line Width to 5 pt.  \n20.  Click OK to accept the changes.  \n21.  Select\
    \ the cell that holds the gauge.  \n22.  In the Properties window, change the\
    \ BorderStyle Default property to Solid and BorderColor property to LightGray.\n\
    \nWhen you preview the report, the table should look like Figure [7-32](#A395630_1_En_7_Chapter.html#Fig32).\n\
    \n![A395630_1_En_7_Fig32_HTML.jpg](A395630_1_En_7_Fig32_HTML.jpg)\n\nFigure 7-32.\n\
    \nThe table with an embedded gauge\n\n## Adding Data Bars, Sparklines, and Indicators\
    \ to Tables\n\nYou saw that you can add gauges to table cells in the last section.\
    \ Three visual controls, data bars, sparklines and indicators, are meant to be\
    \ used within cells. Indicators are simplified gauges. Data bars and sparklines\
    \ are simplified charts and graphs. To learn how to add an indicator , follow\
    \ these steps:\n\n1.  Add a new report named SmallControls to the project.  \n\
    2.  Add the AdventureWorks data source pointing to the shared AdventureWorks2016\
    \ dataset.  \n3.  Add an embedded dataset named Sales with the following query:\n\
    \n```\n    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,\n\
    \    SUM(TotalDue) AS Sales\n    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate),\
    \ MONTH(OrderDate);\n    ```\n\n4.  Add a table to the report.  \n5.  Add the\
    \ Sales field to the detail row.  \n6.  Right-click the detail row and select\
    \ Add Group ➤ Parent Group.  \n7.  In the Tablix Group dialog, select OrderYear\
    \ for the Group by property.  \n8.  Check Add group header. The dialog should\
    \ look like Figure [7-33](#A395630_1_En_7_Chapter.html#Fig33).\n\n![A395630_1_En_7_Fig33_HTML.jpg](A395630_1_En_7_Fig33_HTML.jpg)\n\
    \nFigure 7-33.\n\nThe OrderYear group  \n9.  Click OK.  \n10.  Delete the detail\
    \ row by right-clicking the row and selecting Delete rows.  \n11.  Click OK when\
    \ asked if you want to delete the row and group.  \n12.  In the data cell under\
    \ Sales, select Sales. It will automatically sum.  \n13.  Drag an Indicator from\
    \ the Toolbox to the third data cell in the row.  \n14.  Select the default Directional\
    \ style and click OK.  \n15.  Delete the empty column.  \n16.  Click the cell\
    \ with the Indicator. You’ll see GaugePanel1 in the Properties window. Change\
    \ the BorderStyle Default property to Solid.  \n17.  Double-click the cell holding\
    \ the indicator. Change the Gauge Data value to Sales. It will automatically sum\
    \ as shown in Figure [7-34](#A395630_1_En_7_Chapter.html#Fig34).\n\n![A395630_1_En_7_Fig34_HTML.jpg](A395630_1_En_7_Fig34_HTML.jpg)\n\
    \nFigure 7-34.\n\nThe Gauge Data properties\n\nWhen you run the report, it will\
    \ look like Figure [7-35](#A395630_1_En_7_Chapter.html#Fig35).\n\n![A395630_1_En_7_Fig35_HTML.jpg](A395630_1_En_7_Fig35_HTML.jpg)\n\
    \nFigure 7-35.\n\nThe report with the indicator\n\nBy default, the indicator is\
    \ set to display the three possible icons based on the percentage of sales. In\
    \ design view, right-click the cell and select Indicator Properties. You can change\
    \ the behavior of the indicator on the Value and States page as shown in Figure\
    \ [7-36](#A395630_1_En_7_Chapter.html#Fig36).\n\n![A395630_1_En_7_Fig36_HTML.jpg](A395630_1_En_7_Fig36_HTML.jpg)\n\
    \nFigure 7-36.\n\nThe Value and States page\n\nChange the Start and End values\
    \ to match Figure [7-37](#A395630_1_En_7_Chapter.html#Fig37).\n\n![A395630_1_En_7_Fig37_HTML.jpg](A395630_1_En_7_Fig37_HTML.jpg)\n\
    \nFigure 7-37.\n\nThe new indicator properties\n\nClick OK to accept the changes.\
    \ Now when you run the report, all sales indicators at the 50th percentile will\
    \ be the red down arrow as shown in Figure [7-38](#A395630_1_En_7_Chapter.html#Fig38).\n\
    \n![A395630_1_En_7_Fig38_HTML.jpg](A395630_1_En_7_Fig38_HTML.jpg)\n\nFigure 7-38.\n\
    \nThe results after the indicator change\n\nThis report displays the data at the\
    \ year level. You can use a sparkline to display the sales over the months. Follow\
    \ these steps to learn how:\n\n1.  Switch to design view.  \n2.  Add a new column\
    \ to the right of the indicator.  \n3.  Drag a sparkline control to the new data\
    \ cell.  \n4.  Select the Line with Markers sparkline type as shown in Figure\
    \ [7-39](#A395630_1_En_7_Chapter.html#Fig39) and click OK.\n\n![A395630_1_En_7_Fig39_HTML.jpg](A395630_1_En_7_Fig39_HTML.jpg)\n\
    \nFigure 7-39."
  trans: "\n## 仪表盘配置与表格集成\n\n1.  切换到设计视图。\n2.  要在一个报表中显示所有年份，请添加一个名为 `SalesAllYears`\
    \ 的新数据集，其查询如下：\n\n    ```sql\n    SELECT * FROM\n    (VALUES(2011,1000, 899),\n\
    \    (2012,1000,1010),\n    (2013,1200,1100),\n    (2014,1200,1220))\n    AS Quota\
    \ ([Year],[Target],Sales);\n    ```\n\n3.  向报表添加一个表格。\n4.  从 `SalesAllYears` 数据集向表格添加字段\
    \ `Year`、`Target` 和 `Sales`。\n5.  在右侧添加一个新列。\n6.  将一个仪表盘拖到新的数据单元格中。\n7.  选择线性水平仪表盘，如图\
    \ 7-30 所示。\n\n    ![A395630_1_En_7_Fig30_HTML.jpg](img/A395630_1_En_7_Fig30_HTML.jpg)\n\
    \n    **图 7-30.**\n\n    线性水平仪表盘\n\n8.  调整单元格的高度和宽度，使表格设计看起来如图 7-31。\n\n    ![A395630_1_En_7_Fig31_HTML.jpg](img/A395630_1_En_7_Fig31_HTML.jpg)\n\
    \n    **图 7-31.**\n\n    表格设计\n\n9.  双击仪表盘，调出“仪表盘数据”窗口。将 `LinearPointer1` 下的值更改为\
    \ `Sales`。它将自动求和。\n10. 调出“刻度属性”，将“最大值”更改为以下表达式：\n\n    ```sql\n    =Fields!Target.Value\
    \ * 1.25\n    ```\n\n11. 将“间隔”属性更改为 `200`。\n12. 在“数字”页面，将“类别”更改为“货币”。\n13. 更改为\
    \ 0 位小数，并选中“使用千位分隔符 (,)”。\n14. 在“标签”页面，取消选中“在刻度末端显示标签”。\n15. 单击“确定”接受更改。\n16.\
    \ 右键单击仪表盘并选择“添加范围”。\n17. 调出“范围属性”。\n18. 将“范围起始刻度值”和“范围结束刻度值”都更改为 `Sum(Target)`。\n\
    19. 在“边框”页面，将“线宽”更改为 `5 pt`。\n20. 单击“确定”接受更改。\n21. 选择包含仪表盘的单元格。\n22. 在“属性”窗口中，将\
    \ `BorderStyle Default` 属性更改为 `Solid`，将 `BorderColor` 属性更改为 `LightGray`。\n\n当您预览报表时，表格应如图\
    \ 7-32 所示。\n\n![A395630_1_En_7_Fig32_HTML.jpg](img/A395630_1_En_7_Fig32_HTML.jpg)\n\
    \n**图 7-32.**\n\n带有嵌入式仪表盘的表格\n\n## 向表格添加数据条、迷你图和指示器\n\n您在上一节中看到了可以向表格单元格添加仪表盘。有三种可视化控件——数据条、迷你图和指示器——设计用于在单元格内使用。指示器是简化的仪表盘。数据条和迷你图是简化的图表。要了解如何添加指示器，请按照以下步骤操作：\n\
    \n1.  向项目添加一个名为 `SmallControls` 的新报表。\n2.  添加指向共享 `AdventureWorks2016` 数据集的 `AdventureWorks`\
    \ 数据源。\n3.  添加一个名为 `Sales` 的嵌入数据集，其查询如下：\n\n    ```sql\n    SELECT YEAR(OrderDate)\
    \ AS OrderYear, MONTH(OrderDate) AS OrderMonth,\n    SUM(TotalDue) AS Sales\n\
    \    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate), MONTH(OrderDate);\n\
    \    ```\n\n4.  向报表添加一个表格。\n5.  向详细信息行添加 `Sales` 字段。\n6.  右键单击详细信息行并选择“添加组”➤“父组”。\n\
    7.  在“Tablix 组”对话框中，为“分组依据”属性选择 `OrderYear`。\n8.  选中“添加组标题”。对话框应如图 7-33 所示。\n\n\
    \    ![A395630_1_En_7_Fig33_HTML.jpg](img/A395630_1_En_7_Fig33_HTML.jpg)\n\n \
    \   **图 7-33.**\n\n    `OrderYear` 组\n\n9.  单击“确定”。\n10. 通过右键单击行并选择“删除行”来删除详细信息行。\n\
    11. 当询问是否要删除行和组时，单击“确定”。\n12. 在 `Sales` 下的数据单元格中，选择 `Sales`。它将自动求和。\n13. 将一个“指示器”从工具箱拖到该行的第三个数据单元格中。\n\
    14. 选择默认的“方向”样式并单击“确定”。\n15. 删除空列。\n16. 单击带有指示器的单元格。您将在“属性”窗口中看到 `GaugePanel1`。将\
    \ `BorderStyle Default` 属性更改为 `Solid`。\n17. 双击保存指示器的单元格。将“仪表盘数据”值更改为 `Sales`。它将自动求和，如图\
    \ 7-34 所示。\n\n    ![A395630_1_En_7_Fig34_HTML.jpg](img/A395630_1_En_7_Fig34_HTML.jpg)\n\
    \n    **图 7-34.**\n\n    仪表盘数据属性\n\n当您运行报表时，它将如图 7-35 所示。\n\n![A395630_1_En_7_Fig35_HTML.jpg](img/A395630_1_En_7_Fig35_HTML.jpg)\n\
    \n**图 7-35.**\n\n带有指示器的报表\n\n默认情况下，指示器设置为根据销售百分比显示三个可能的图标。在设计视图中，右键单击单元格并选择“指示器属性”。您可以在“值和状态”页面上更改指示器的行为，如图\
    \ 7-36 所示。\n\n![A395630_1_En_7_Fig36_HTML.jpg](img/A395630_1_En_7_Fig36_HTML.jpg)\n\
    \n**图 7-36.**\n\n“值和状态”页面\n\n更改“起始值”和“结束值”以匹配图 7-37。\n\n![A395630_1_En_7_Fig37_HTML.jpg](img/A395630_1_En_7_Fig37_HTML.jpg)\n\
    \n**图 7-37.**\n\n新的指示器属性\n\n单击“确定”接受更改。现在当您运行报表时，处于第 50 个百分位数的所有销售指示器都将是红色的向下箭头，如图\
    \ 7-38 所示。\n\n![A395630_1_En_7_Fig38_HTML.jpg](img/A395630_1_En_7_Fig38_HTML.jpg)\n\
    \n**图 7-38.**\n\n指示器更改后的结果\n\n此报表在年份级别显示数据。您可以使用迷你图来显示各月的销售情况。请按照以下步骤了解如何操作：\n\
    \n1.  切换到设计视图。\n2.  在指示器右侧添加一个新列。\n3.  将一个迷你图控件拖到新的数据单元格中。\n4.  选择“带标记的折线图”迷你图类型，如图\
    \ 7-39 所示，然后单击“确定”。\n\n    ![A395630_1_En_7_Fig39_HTML.jpg](img/A395630_1_En_7_Fig39_HTML.jpg)\n\
    \n    **图 7-39.**\n"
- fmt: '## The Line with markers sparkline

    5. Double the width of the table cell containing the sparkline.

    6. Double-click the cell to bring up the Chart Data properties.

    7. Change the ∑ Value to `Sales` and the Category Groups to `OrderMonth`.

    8. Click the sparkline until the markers light up.

    9. Right-click the sparkline and select Series Properties.

    10. Change the `ToolTip` property to the following expression and click OK:

    ```

    =MonthName(Fields!OrderMonth.Value) & " "

    & FormatCurrency(Fields!Sales.Value,0)

    ```

    11. Select the cell with the sparkline. In the Properties window, change the `BorderStyle`
    Default property to `Solid`.


    Now, when you run the report, you can run your cursor over the line to see the
    month name and the total sales for that month. Figure [7-40](#A395630_1_En_7_Chapter.html#Fig40)
    shows how the report should look:

    ![A395630_1_En_7_Fig40_HTML.jpg](A395630_1_En_7_Fig40_HTML.jpg)

    Figure 7-40.

    The report with a sparkline


    A data bar can be added and configured just like the sparkline. The difference
    is that there will be separate bars for each data point instead of a line. Follow
    these steps to add the data bar:

    1. Switch to design view.

    2. Add a new column to the table.

    3. Drag a data bar to the new cell.

    4. Select the Data Column type as shown in Figure [7-41](#A395630_1_En_7_Chapter.html#Fig41).

    ![A395630_1_En_7_Fig41_HTML.jpg](A395630_1_En_7_Fig41_HTML.jpg)

    Figure 7-41.

    Add a data bar

    5. Expand the width of the cell.

    6. In the Chart Data window, select `Sales` under the ∑ Value property.

    7. Add `OrderMonth` to the Category Groups section.

    8. In this case, you will sort by value instead of the month. Click the arrow
    next to `OrderMonth` in the Category Groups section.

    9. Select Category Group Properties.

    10. On the Sorting page, replace `OrderMonth` with `Sales`.

    11. Click OK.

    12. Click the cell. In the Properties window, change the `BorderStyle` Default
    property to `Solid`.

    13. Click one of the data bars until a small circle appears above each of them.

    14. Right-click and bring up Series Properties.

    15. Add the following expression to the Tooltip property:

    ```

    =MonthName(Fields!OrderMonth.Value) & " "

    & FormatCurrency(Fields!Sales.Value,0)

    ```

    When previewing the report, it should look like Figure [7-42](#A395630_1_En_7_Chapter.html#Fig42).

    ![A395630_1_En_7_Fig42_HTML.jpg](A395630_1_En_7_Fig42_HTML.jpg)

    Figure 7-42.

    The report with the data bars


    ## Adding a Map to a Report

    Arguably the most intriguing feature of SSRS is the ability to add maps to reports.
    In this section, you will learn how to add a map connected to geographic data
    from AdventureWorks. This just touches the surface of what can be done with maps.
    In fact, an entire book could be written on this topic. Follow these steps to
    learn how to add a simple map to a report:

    1. Add a new report named `Map` to the project.

    2. Add a data source named `AdventureWorks` pointing to the shared `AdventureWorks2016`
    data source.

    3. Add a dataset named `Year` pointing to the shared `Year` dataset.

    4. Add an embedded dataset named `MapData` with the following query:

    ```

    DECLARE @Year INT = 2013;

    SELECT SUM(TotalDue) AS Sales, vS.CountryRegionName, vS.StateProvinceName

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Person.BusinessEntityAddress AS BEA

    ON BEA.BusinessEntityID = SOH.CustomerID

    JOIN Person.Address AS A ON BEA.AddressID = A.AddressID

    JOIN Person.vStateProvinceCountryRegion AS vS

    ON A.StateProvinceID = vS.StateProvinceID

    WHERE CountryRegionName = ''United States''

    AND YEAR(OrderDate) = @Year

    GROUP BY A.City, vS.CountryRegionName, vS.StateProvinceName;

    ```

    5. The `Year` parameter will be added automatically. Connect the available values
    to the `Year` dataset. At this point, the `MapData` dataset is hard-coded for
    2013, which is needed to get the map wizard to work. Once the map is done, you
    will make the report dynamic.

    6. Add a map control to the report which kicks off a wizard.

    7. On the Choose a source of spatial data page, select Map gallery and choose
    USA by State as shown in Figure [7-43](#A395630_1_En_7_Chapter.html#Fig43).

    ![A395630_1_En_7_Fig43_HTML.jpg](A395630_1_En_7_Fig43_HTML.jpg)

    Figure 7-43.

    Select the source of map data

    8. Click Next.

    9. On the Choose Spatial Data and Map View Options page, you can modify the resolution,
    position, and zoom level of the map. Make the map slightly smaller by dragging
    down the pointer on the left. Adjust the position by grabbing the map and moving
    it so that Alaska, Hawaii, and the continental United States are visible. Click
    Next.

    10. On the Choose Map Visualization page, select the Color Analytical Map and
    click Next.

    11. On the Choose the Analytical Dataset, select `MapData` and click Next.

    12. The Specify the Match Fields for Spatial and Analytical Data page is where
    you connect the map properties to fields in the data. Check the box next to `STATENAME`.

    13. In the Analytical Dataset Fields dropdown box, select `StateProvinceName`.
    You can verify that you made the correct choices by comparing the highlighted
    columns in the two bottom sections as shown in Figure [7-44](#A395630_1_En_7_Chapter.html#Fig44).

    ![A395630_1_En_7_Fig44_HTML.jpg](A395630_1_En_7_Fig44_HTML.jpg)

    Figure 7-44.

    Map data connected to the dataset column

    14. Click Next.

    15. On the Choose color theme and data visualization page select `Sum(Sales)`
    from the Field to Visualize list.

    16. In the Color Rule list, select Red-Yellow-Green.

    17. The page should look like Figure [7-45](#A395630_1_En_7_Chapter.html#Fig45).

    ![A395630_1_En_7_Fig45_HTML.jpg](A395630_1_En_7_Fig45_HTML.jpg)

    Figure 7-45.

    The Choose color theme and data visualization page

    18. Click Finish.

    19. Open the `MapData` dataset properties.

    20. Remove this text from the following query:

    ```

    DECLARE @Year INT = 2013;

    ```

    21. Click OK to accept the change. In order to connect the data to the map, a
    value for the parameter had to be provided. Now that the map is complete, this
    line can be removed.


    When you preview the report and select 2012, you should see the populated map
    as shown in Figure [7-46](#A395630_1_En_7_Chapter.html#Fig46).

    ![A395630_1_En_7_Fig46_HTML.jpg](A395630_1_En_7_Fig46_HTML.jpg)

    Figure 7-46.

    The populated map


    To add a tooltip to the map follow these steps:

    1. Switch back to design view.

    2. Click the map to open the Map Layers window.

    3. Click the down arrow in the PolygonLayer and select Polygon Properties as shown
    in Figure [7-47](#A395630_1_En_7_Chapter.html#Fig47).

    ![A395630_1_En_7_Fig47_HTML.jpg](A395630_1_En_7_Fig47_HTML.jpg)

    Figure 7-47.

    Open the polygon properties

    4. Change the `Tooltip` property to the following expression:

    ```

    =Fields!StateProvinceName.Value & " " &  FormatCurrency(Fields!Sales.Value,0)

    ```

    5. Change the Map Title to the following expression:

    ```

    ="US Sales by State " & Parameters!Year.Value

    ```

    6. Right-click the map legend and bring up the properties. Change the Legend Position
    to the bottom of the map.

    7. Check Show legend outside the viewport as shown in Figure [7-48](#A395630_1_En_7_Chapter.html#Fig48).

    ![A395630_1_En_7_Fig48_HTML.jpg](A395630_1_En_7_Fig48_HTML.jpg)

    Figure 7-48.

    Change the map legend position

    8. Click OK.

    9. Change the map legend title from Title to Sales.

    10. Remove the Color Scale.

    11. Remove the Distance Scale.


    When you run the report and select 2012, the report should look like Figure [7-49](#A395630_1_En_7_Chapter.html#Fig49).

    ![A395630_1_En_7_Fig49_HTML.jpg](A395630_1_En_7_Fig49_HTML.jpg)

    Figure 7-49.

    The final map report'
