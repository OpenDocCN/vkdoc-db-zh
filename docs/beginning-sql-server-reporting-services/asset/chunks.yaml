    ## Deploying Reports from SSDT


    Reports can be deployed directly from SSDT or by uploading directly within the
    web portal. When deploying from SSDT, any required folders are created as well.
    To get started, follow these steps to configure a project for deployment:


    1.  To view the SSRS web services URL (uniform resource locator), open the Reporting
    Services Configuration Manager, one of the utilities installed with SQL Server.
     

    2.  Connect to your instance of SSRS as shown in Figure [8-7](#A395630_1_En_8_Chapter.html#Fig7).
    If it is not a named instance, then the Report Server Instance will be MSSQLSERVICE.


    ![A395630_1_En_8_Fig7_HTML.jpg](A395630_1_En_8_Fig7_HTML.jpg)


    Figure 8-7.


    The Reporting Services Configuration Connection dialog connecting to a named instance
     

    3.  On the Reporting Services Configuration Manager, click Web Service URL on
    the menu on the left.  

    4.  Record the URL shown in Figure [8-8](#A395630_1_En_8_Chapter.html#Fig8). This
    information will be needed in a subsequent step.


    ![A395630_1_En_8_Fig8_HTML.jpg](A395630_1_En_8_Fig8_HTML.jpg)


    Figure 8-8.


    The web service URL  

    5.  Click Exit to close the Reporting Services Configuration Manager.  

    6.  Launch SSDT.  

    7.  Open the solution created in Chapter [7](#A395630_1_En_7_Chapter.html) by
    locating it in the File menu under Recent Projects and Solutions. If you did not
    follow along in Chapter [7](#A395630_1_En_7_Chapter.html), you can find the solution
    in the Code/Download area of the Apress web site ( [`www.Apress.com`](http://www.Apress.com)
    ) for this book.  

    8.  In the Solution Explorer, right-click the project name, Visual Reports, and
    select Properties.  

    9.  In the Deployment section, you will see several configuration items with defaults
    filled in. If it is not already populated, enter the URL that you recorded in
