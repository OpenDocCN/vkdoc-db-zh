  trans: '### 属性窗口属性


    一个表格有数十个属性。你可以在“属性”窗口中设置其中一部分。选中第一个表格行句柄与列句柄的交叉点以选中表格。表格被选中后，按 `F4` 键打开“属性”窗口。你也可以从菜单中点击
    `视图 ➤ 属性窗口`。在图 4-6 所示窗口的顶部，你会看到表格根本就不是被称为“表格”。它是一个 `Tablix`。


    图 4-6.

    ![A395630_1_En_4_Fig6_HTML.jpg](img/A395630_1_En_4_Fig6_HTML.jpg)


    表格即 Tablix 备注


    一个数据区域，例如表格、矩阵或列表，实际上被称为 `Tablix`。每一种都有其特定的数据显示布局。你可以从一个表格开始，然后通过按列分组将其转换为矩阵。


    “属性”窗口中的属性可以按属性类别或按字母顺序显示。点击“属性”窗口顶部的图 4-7 所示的图标可在两者间切换。还有一个类似于扳手的图标，用于打开“属性页”窗口。你将在下一节了解更多关于属性页的内容。


    图 4-7.

    ![A395630_1_En_4_Fig7_HTML.jpg](img/A395630_1_En_4_Fig7_HTML.jpg)


    属性窗口图标


    由于本章将多次引用 `Tablix1`，请给它起一个有意义的名称：`tblSalesSummary`。为此，在“属性”窗口的“常规”类别中更改 `Name`
    属性。


    在“常规”属性类别中找到 `DataSetName` 属性。请注意该属性已设置为 `SalesSummary`。


    当你点击每个属性时，你会在“属性”窗口底部看到该属性功能的描述。“属性”窗口中的大多数属性无需更改，但你所更改的任何属性都将影响整个表格。将 `边框样式(默认)`
    属性更改为 `点线`，将 `边框宽度(默认)` 属性更改为 `3 pt`。“属性”窗口应如图 4-8 所示。


    图 4-8.

    ![A395630_1_En_4_Fig8_HTML.jpg](img/A395630_1_En_4_Fig8_HTML.jpg)


    已修改的属性


    预览报表。它应如图 4-9 所示。


    图 4-9.

    ![A395630_1_En_4_Fig9_HTML.jpg](img/A395630_1_En_4_Fig9_HTML.jpg)


    `tblSalesSummary` 带有虚线边框的报表


    ### 属性对话框属性


    除了“属性”窗口，大多数报表对象还有一个属性对话框。两种方法之间可更改的属性有所重叠。一些更高级的属性，例如涉及与其他报表交互的属性，仅在属性对话框中可用。我个人的观点是，只要可能，在对话框中工作会容易得多。


    备注


    添加到报表的每个对象都有一个名称。默认情况下，名称将是对象类型加一个数字。你可能想知道是否应该为每个对象都起一个描述性的名称。我的规则是为任何将在表达式或计算中引用的对象命名。


    切换回设计视图并选中第二个 `Tablix`。当控点出现时，右键单击两个控点的交叉点。选择 `Tablix 属性`，如图 4-10 所示。


    图 4-10.

    ![A395630_1_En_4_Fig10_HTML.jpg](img/A395630_1_En_4_Fig10_HTML.jpg)


    选择 `Tablix 属性`


    `Tablix 属性` 对话框有多个页面。在图 4-11 所示的“常规”页面上，将 `名称` 更改为 `tblSalesDetails`。在 `工具提示`
    属性中输入 `销售明细`。在 `分页符` 选项下，勾选 `在前面添加分页符`。


    图 4-11.

    ![A395630_1_En_4_Fig11_HTML.jpg](img/A395630_1_En_4_Fig11_HTML.jpg)


    `Tablix 属性` 的“常规”页面


    点击“确定”接受属性更改。预览报表。现在 `tblSalesDetails` 将出现在第二页。将鼠标悬停在报表上可查看工具提示。


    再看一下图 4-11。“行标题”部分中用于控制标题的那些属性看起来很棒。然而，它们不起作用。如果你回到设计视图，选中这些属性并查看报表，你会发现它们没有任何区别。表格标题不会在每个页面上重复，并且在滚动时标题行也不可见。在第
    5 章中，你将学习如何控制行标题和列标题。


    图 4-12 显示了“可见性”属性页。你可以选择显示或隐藏表格，并根据表达式设置表格的可见性。参数的值可能是一个很好的表达式。


    图 4-12.

    ![A395630_1_En_4_Fig12_HTML.jpg](img/A395630_1_En_4_Fig12_HTML.jpg)


    “可见性”属性


    理论上，你可以通过从下拉列表中选择一个项目来切换可见性。如果你勾选“显示可以由此报表项切换”并将该属性设置为列表中的任何项目，报表在运行时将显示错误，因此在关闭对话框前请确保取消勾选此项。发生错误的原因是列表中的所有项目都是表格的一部分，它们无法在报表运行前被点击。


    “筛选器”页面允许你向数据集返回的数据添加筛选器。通常，这不是一个好主意，因为你应该在数据库层面进行筛选。然而，如果数据源不可筛选（例如来自 XML 文件），此功能很有用。几年前我确实遇到过一个用例。我需要在同一个报表的几个表格中使用同一个数据集，只是应用不同的筛选器。我没有使用不同的筛选器多次提取数据，而是使用了一个数据集，并在每个表格处进行筛选。


    我发现调出 `Tablix 属性` 框最常见的原因是更改数据的显示顺序。“排序”页面如图 4-13 所示。点击“添加”并选择 `CustomerID`。再次点击“添加”并选择
    `SalesOrderID`。保存属性并预览报表以查看数据现在已排序。


    图 4-13.

    ![A395630_1_En_4_Fig13_HTML.jpg](img/A395630_1_En_4_Fig13_HTML.jpg)


    “排序”页面


    ## 其他报表组件


    你可以向报表中添加许多其他元素，以实现附加功能或使报表看起来更具吸引力和专业性。第 7 章涵盖了图表和指标等视觉元素，但本节我们将看看你可以添加的一些更基本的对象。


    有许多理由向报表添加独立的 `文本框`（例如，报表标题和页码）。大多数此类对象应在每一页上显示。如果你只是在报表正文顶部添加一个 `文本框`，它只会显示一次。要使其显示在每一页上，需将信息包含在报表页眉中。'
- fmt: "### Page Headers\n\nJust like text boxes and tables, the page header has properties\
    \ that you can modify to change the look or behavior. For example, you can add\
    \ a background color or image. Follow these steps to add the page header to the\
    \ report.\n\n1.  Right-click the report canvas and select Insert ➤ Page Header.\
    \ You can also insert the page header from the Report menu.\n2.  Right-click the\
    \ header and select Insert. The list of controls, as shown in Figure [4-14](#A395630_1_En_4_Chapter.html#Fig14),\
    \ you can add is very short. It’s limited to controls that do not require being\
    \ connected to data. Choose `Text Box`.\n    ![A395630_1_En_4_Fig14_HTML.jpg](A395630_1_En_4_Fig14_HTML.jpg)\n\
    \    Figure 4-14.\n    The list of controls for the header\n3.  From the `Report\
    \ Data` window, expand `Built-in Fields` and drag `Report Name` to the text box.\
    \ You can also drag fields directly to the header to add the text box automatically.\n\
    4.  Click the edge of the text box so that the handle appears as shown in Figure\
    \ [4-15](#A395630_1_En_4_Chapter.html#Fig15).\n    ![A395630_1_En_4_Fig15_HTML.jpg](A395630_1_En_4_Fig15_HTML.jpg)\n\
    \    Figure 4-15.\n    The handle on the text box\n5.  By dragging the handle,\
    \ reposition the text box so that it is located on the left side of the report.\n\
    6.  Expand the text box so that it is as wide as the canvas.\n7.  With the text\
    \ box selected, center the text. You can do this by clicking the `Center` icon\
    \ in the menu or by changing the `Horizontal` property on the `Alignment` page\
    \ of the `Text Box Properties` dialog.\n8.  Change the font size to `16 pt`. Again,\
    \ there are multiple ways to do this. Choose your favorite method: design menu,\
    \ `Properties` window, or Property dialog. The text box will automatically grow\
    \ vertically, but you can also increase the height.\n9.  Click the text box and\
    \ add this text after the placeholder: `: Sales Details`\n10. Select the words\
    \ `Sales Details`. If you have the `Properties` window open, you will see that\
    \ that the name of the currently selected object is `Selected Text`.\n11. Italicize\
    \ the words `Sales Details`. The text box should look like Figure [4-16](#A395630_1_En_4_Chapter.html#Fig16).\n\
    \    ![A395630_1_En_4_Fig16_HTML.jpg](A395630_1_En_4_Fig16_HTML.jpg)\n    Figure\
    \ 4-16.\n    Multiple formats in one text box\n12. Add a line control to the report\
    \ header below the text box.\n13. Adjust the line so that it is horizontal by\
    \ dragging one end up or down.\n14. Increase the size of the line by dragging\
    \ each end.\n15. Change `LineWidth` to `2pt` in the `Properties` window. The `LineWidth`\
    \ property is the thickness of the line. Lines are the simplest objects. They\
    \ do not have a property dialog box.\n16. Copy the line and paste in the header.\n\
    17. Move the second line so that it is close to and under the first line.\n18.\
    \ Right-click the report header and select `Header Properties`.\n19. Uncheck `Print\
    \ on first page` under `Print` options.\n20. Click `OK`.\n\nNow when you preview\
    \ the report, you will see the header beginning with page 2 as shown in Figure\
    \ [4-17](#A395630_1_En_4_Chapter.html#Fig17). As you view subsequent pages, you\
    \ will continue to see the page header.\n![A395630_1_En_4_Fig17_HTML.jpg](A395630_1_En_4_Fig17_HTML.jpg)\n\
    Figure 4-17.\nPage 2 of the report\n\n### Table Cell Formatting\n\nObviously,\
    \ there is much you can do to make this report look better. To start, change the\
    \ formats of the `OrderDate` and `TotalDue` fields by following these steps:\n\
    \n1.  Return to design view.\n2.  Right-click the `OrderDate` cell and select\
    \ `Text Box Properties`.\n3.  Select the `Number` page and choose `Date` under\
    \ `Category`.\n4.  Select the `2000-01-31` format and click `OK`.\n5.  Bring up\
    \ the `Text Box Properties` of the `TotalDue` cell.\n6.  Select the `Number` page\
    \ and choose `Currency` under `Category`.\n7.  Make sure that `Decimal places`\
    \ is set to `2`.\n8.  Check `use 1000 separator (,)` and click `OK`.\n\nWhen you\
    \ preview the report, the table should look like Figure [4-18](#A395630_1_En_4_Chapter.html#Fig18).\n\
    ![A395630_1_En_4_Fig18_HTML.jpg](A395630_1_En_4_Fig18_HTML.jpg)\nFigure 4-18.\n\
    The table with formatting\n\nThe next step is to format the header row. Luckily,\
    \ you do not need to format each cell individually. Follow these steps to format\
    \ the row:\n\n1.  In design view, click a cell of `tblSalesDetails`.\n2.  When\
    \ you do, the row and column handles appear. Select the handle next to the header\
    \ row.\n3.  In the `Properties` window, change the `BackgroundColor` to `CornflowerBlue`.\n\
    4.  Change the `Font Color` property to `White`.\n5.  Change the `FontWeight`\
    \ property to `Bold`.\n6.  Now, click the `Sales Order ID` column.\n7.  Align\
    \ each column to the right by selecting each one and then clicking the `Align\
    \ Right` icon in the design menu.\n8.  The table may not line up well under the\
    \ report header. Follow these steps to adjust the report.\n9.  Right click the\
    \ report canvas and select `View` ➤ `Ruler`.\n10. Drag the right edge of the report\
    \ title so that it is `5 inches (12.5 cm)` wide.\n11. Select both lines. Hold\
    \ down the `CTRL` key and press the right arrow until the lines are arranged under\
    \ the title.\n12. Drag the right edge of the report canvas to the left as far\
    \ as it will go, which will be when it bumps up against a control.\n\nTo make\
    \ long reports easier to read, you may want to alternate the background color\
    \ of the rows. Unfortunately, there is no property that you can change to accomplish\
    \ this. You can, however, use an expression to control the `BackgroundColor` property.\
    \ Select the data row. In the `Properties` window, change the `BackgroundColor`\
    \ to `= IIf(RowNumber(Nothing) Mod 2 = 0, \"LightBlue\", \"White\")`.\n\nNow preview\
    \ the report. Page 2 of the report should look like Figure [4-19](#A395630_1_En_4_Chapter.html#Fig19).\n\
    ![A395630_1_En_4_Fig19_HTML.jpg](A395630_1_En_4_Fig19_HTML.jpg)\nFigure 4-19.\n\
    The formatted Sales report\n\nThe ability to control the value of just about any\
    \ property with an expression is a wonderful feature of SQL Server Reporting Services\
    \ (SSRS). To know if a property can be controlled with an expression, look for\
    \ the word `Expression` or the symbol `fx` in the property list or page.\n\n###\
    \ Page Footers\n\nA page footer is also quite useful for displaying information\
    \ such as the page number and date the report was viewed. To add the page footer,\
    \ follow these steps:\n\n1.  Switch to design view.\n2.  Right-click the report\
    \ body and select `Insert` ➤ `Page Footer`.\n3.  Right-click the footer and select\
    \ `Footer Properties`.\n4.  Uncheck the `Print on first page` property in the\
    \ `Print` options section.\n5.  Click `OK` to accept the change.\n6.  From the\
    \ `Built-in Fields` folder in the `Report Data` window, drag `Execution Time`\
    \ into the footer.\n7.  Increase the width of the field so that it is about double\
    \ the original width.\n8.  Add a text box to the footer. Be sure it lines up horizontally\
    \ with the execution time text box.\n9.  Type this expression into the text box:\
    \ `Page [&PageNumber] of [&TotalPages]`. You could also bring up the `Expression`\
    \ dialog to help you write it.\n\n    **Caution**\n    By adding the `Total Pages`\
    \ property, the report must be completely built before the first page is returned\
    \ to the user. If the report is extremely large, this could give the impression\
    \ of a performance problem.\n\n10. Double the width of the text box.\n11. Add\
    \ a line to the top of the footer.\n12. Level the line and drag the edges to the\
    \ width of the report.\n\nWhen you run the report , the report footer on the second\
    \ page should look like Figure [4-20](#A395630_1_En_4_Chapter.html#Fig20).\n![A395630_1_En_4_Fig20_HTML.jpg](A395630_1_En_4_Fig20_HTML.jpg)\n\
    Figure 4-20.\nThe report footer"
  raw: "### Page Headers\n\nJust like text boxes and tables, the page header has properties\
    \ that you can modify to change the look or behavior. For example, you can add\
    \ a background color or image. Follow these steps to add the page header to the\
    \ report.\n\n1.  Right-click the report canvas and select Insert ➤ Page Header.\
    \ You can also insert the page header from the Report menu.  \n2.  Right-click\
    \ the header and select Insert. The list of controls, as shown in Figure [4-14](#A395630_1_En_4_Chapter.html#Fig14),\
    \ you can add is very short. It’s limited to controls that do not require being\
    \ connected to data. Choose Text Box.\n\n    ![A395630_1_En_4_Fig14_HTML.jpg](A395630_1_En_4_Fig14_HTML.jpg)\n\
    \n    Figure 4-14.\n\n    The list of controls for the header  \n3.  From the\
    \ Report Data window, expand Built-in Fields and drag Report Name to the text\
    \ box. You can also drag fields directly to the header to add the text box automatically.\
    \  \n4.  Click the edge of the text box so that the handle appears as shown in\
    \ Figure [4-15](#A395630_1_En_4_Chapter.html#Fig15).\n\n    ![A395630_1_En_4_Fig15_HTML.jpg](A395630_1_En_4_Fig15_HTML.jpg)\n\
    \n    Figure 4-15.\n\n    The handle on the text box  \n5.  By dragging the handle,\
    \ reposition the text box so that it is located on the left side of the report.\
    \  \n6.  Expand the text box so that it is as wide as the canvas.  \n7.  With\
    \ the text box selected, center the text. You can do this by clicking the Center\
    \ icon in the menu or by changing the Horizontal property on the Alignment page\
    \ of the Text Box Properties dialog.  \n8.  Change the font size to 16 pt. Again,\
    \ there are multiple ways to do this. Choose your favorite method: design menu,\
    \ Properties window, or Property dialog. The text box will automatically grow\
    \ vertically, but you can also increase the height.  \n9.  Click the text box\
    \ and add this text after the placeholder: `: Sales Details`  \n10.  Select the\
    \ words Sales Details. If you have the Properties window open, you will see that\
    \ that the name of the currently selected object is Selected Text.  \n11.  Italicize\
    \ the words Sales Details. The text box should look like Figure [4-16](#A395630_1_En_4_Chapter.html#Fig16).\n\
    \n    ![A395630_1_En_4_Fig16_HTML.jpg](A395630_1_En_4_Fig16_HTML.jpg)\n\n    Figure\
    \ 4-16.\n\n    Multiple formats in one text box  \n12.  Add a line control to\
    \ the report header below the text box.  \n13.  Adjust the line so that it is\
    \ horizontal by dragging one end up or down.  \n14.  Increase the size of the\
    \ line by dragging each end.  \n15.  Change LineWidth to 2pt in the Properties\
    \ window. The LineWidth property is the thickness of the line. Lines are the simplest\
    \ objects. They do not have a property dialog box.  \n16.  Copy the line and paste\
    \ in the header.  \n17.  Move the second line so that it is close to and under\
    \ the first line.  \n18.  Right-click the report header and select Header Properties.\
    \  \n19.  Uncheck Print on first page under Print options.  \n20.  Click OK.  \n\
    \nNow when you preview the report, you will see the header beginning with page\
    \ 2 as shown in Figure [4-17](#A395630_1_En_4_Chapter.html#Fig17). As you view\
    \ subsequent pages, you will continue to see the page header.\n\n![A395630_1_En_4_Fig17_HTML.jpg](A395630_1_En_4_Fig17_HTML.jpg)\n\
    \nFigure 4-17.\n\nPage 2 of the report\n\n### Table Cell Formatting\n\nObviously,\
    \ there is much you can do to make this report look better. To start, change the\
    \ formats of the OrderDate and TotalDue fields by following these steps:\n\n1.\
    \  Return to design view.  \n2.  Right-click the OrderDate cell and select Text\
    \ Box Properties.  \n3.  Select the Number page and choose Date under Category.\
    \  \n4.  Select the 2000-01-31 format and click OK.  \n5.  Bring up the Text Box\
    \ Properties of the TotalDue cell.  \n6.  Select the Number page and choose Currency\
    \ under Category.  \n7.  Make sure that Decimal places is set to 2.  \n8.  Check\
    \ use 1000 separator (,) and click OK.  \n\nWhen you preview the report, the table\
    \ should look like Figure [4-18](#A395630_1_En_4_Chapter.html#Fig18).\n\n![A395630_1_En_4_Fig18_HTML.jpg](A395630_1_En_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18.\n\nThe table with formatting\n\nThe next step is to format the\
    \ header row. Luckily, you do not need to format each cell individually. Follow\
    \ these steps to format the row:\n\n1.  In design view, click a cell of tblSalesDetails.\
    \  \n2.  When you do, the row and column handles appear. Select the handle next\
    \ to the header row.  \n3.  In the Properties window, change the BackgroundColor\
    \ to CornflowerBlue.  \n4.  Change the Font Color property to White.  \n5.  Change\
    \ the FontWeight property to Bold.  \n6.  Now, click the Sales Order ID column.\
    \  \n7.  Align each column to the right by selecting each one and then clicking\
    \ the Align Right icon in the design menu.  \n8.  The table may not line up well\
    \ under the report header. Follow these steps to adjust the report.  \n9.  Right\
    \ click the report canvas and select View ➤ Ruler.  \n10.  Drag the right edge\
    \ of the report title so that it is 5 inches (12.5 cm) wide.  \n11.  Select both\
    \ lines. Hold down the CTRL key and press the right arrow until the lines are\
    \ arranged under the title.  \n12.  Drag the right edge of the report canvas to\
    \ the left as far as it will go, which will be when it bumps up against a control.\
    \  \n\nTo make long reports easier to read, you may want to alternate the background\
    \ color of the rows. Unfortunately, there is no property that you can change to\
    \ accomplish this. You can, however, use an expression to control the BackgroundColor\
    \ property. Select the data row. In the Properties window, change the BackgroundColor\
    \ to `= IIf(RowNumber(Nothing) Mod 2 = 0, \"LightBlue\", \"White\")`.\n\nNow preview\
    \ the report. Page 2 of the report should look like Figure [4-19](#A395630_1_En_4_Chapter.html#Fig19).\n\
    \n![A395630_1_En_4_Fig19_HTML.jpg](A395630_1_En_4_Fig19_HTML.jpg)\n\nFigure 4-19.\n\
    \nThe formatted Sales report\n\nThe ability to control the value of just about\
    \ any property with an expression is a wonderful feature of SQL Server Reporting\
    \ Services (SSRS). To know if a property can be controlled with an expression,\
    \ look for the word Expression or the symbol fx in the property list or page.\n\
    \n### Page Footers\n\nA page footer is also quite useful for displaying information\
    \ such as the page number and date the report was viewed. To add the page footer,\
