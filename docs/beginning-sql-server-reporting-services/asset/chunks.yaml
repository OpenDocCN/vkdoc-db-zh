    \n    Figure 6-36.\n\n    The territories with sales at $2,000,000 or more are\
    \ in bold  \n\nThe `Iif` function , also called inline if, takes three arguments.\
    \ The first is an expression to test. If the expression returns true, then the\
    \ second argument is returned. If the expression returns false, then the third\
    \ value is returned. The value returned by the expression is used as the property\
    \ value. In this example, the word Bold is returned when the sales are at least\
    \ $2,000,000.\n\n### Interactive Sorting\n\nSorting can be controlled using a\
    \ property of the cells in the header row. In my experience, it doesn’t work well\
