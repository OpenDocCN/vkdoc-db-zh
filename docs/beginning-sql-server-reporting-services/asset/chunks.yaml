  trans: "## 创建钻取报告\n\n本章介绍了许多让报告动态化的绝佳方法，可能性无限。还有一个经常被要求的功能要向你展示：即能够点击报告中的某个单元格，自动导航至包含明细行的另一份报告。\n\
    \n请按照以下步骤创建明细报告：\n1.  在项目中新建一个名为 `Sales Details` 的报告。\n2.  向报告添加一个名为 `AdventureWorks`\
    \ 的数据源，该数据源指向 `AdventureWorks2016` 共享数据源。\n3.  向报告添加一个名为 `SalesDetails` 的嵌入式数据集。它应指向\
    \ `AdventureWorks` 数据源。\n4.  查询语句应为：\n    ```\n    SELECT C.CustomerID, SalesOrderID,\
    \ OrderDate, TotalDue,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
    \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) = @Year AND T.TerritoryID = @Territory;\n    ```\n\
    5.  向报告添加一个表格控件。\n6.  用以下字段填充表格控件：`CustomerID`、`Store`、`SalesOrderID`、`OrderDate`\
    \ 和 `TotalDue`。\n7.  将标题行加粗，并将 `TotalDue` 单元格格式设置为货币。设计应类似于图 6-39。\n    ![A395630_1_En_6_Fig39_HTML.jpg](img/A395630_1_En_6_Fig39_HTML.jpg)\n\
    \    图 6-39. 明细布局\n8.  将表格拖动到左上角，并收紧报告画布。\n9.  向报告添加一个报告页眉。\n10. 从“内置字段”文件夹中将“报告名称”拖入页眉。\n\
    11. 将字体大小更改为 14 磅，并展开文本框的宽度。\n12. 将 `Year` 参数拖动到页眉。\n13. 将 `SalesDetails` 数据集中的\
    \ `Territory` 字段拖动到页眉。由于这在表格外部，它将从数据集中提取第一个值。这是可行的，因为报告已按 `TerritoryID` 筛选，因此只有一个\
    \ `Territory` 值可用。报告布局应类似于图 6-40。\n    ![A395630_1_En_6_Fig40_HTML.jpg](img/A395630_1_En_6_Fig40_HTML.jpg)\n\
    \    图 6-40. 报告布局\n\n此时，运行报告以确保其正常运行是合理的。运行时，只需为参数输入 `2011` 和 `3`。此报告不会显示参数列表，而是将从另一份报告接收值。最终用户将始终通过点击汇总报告来运行报告，且应永远不需要看到参数。请按照以下步骤隐藏参数：\n\
    1.  切换回明细报告的设计视图。\n2.  打开 `Year` 参数的属性。\n3.  将 `选择参数可见性` 属性更改为 `隐藏`，并点击“确定”接受更改。\n\
    4.  对 `Territory` 参数重复此过程。\n\n下一步是向汇总报告中的某个单元格添加操作。请按照以下步骤添加操作：\n1.  创建 `Sales\
    \ by Territory Matrix` 报告的副本。将其命名为 `Sales Summary`。\n2.  双击 `Sales Summary` 报告以在设计视图中打开它。\n\
    3.  右键单击位于 `TerritoryID` 和 `OrderYear` 交叉处的单元格，调出“文本框属性”。图 6-41 显示了要选择的单元格。\n\
    \    ![A395630_1_En_6_Fig41_HTML.jpg](img/A395630_1_En_6_Fig41_HTML.jpg)\n   \
    \ 图 6-41. 要选择的单元格\n4.  选择“操作”页面。\n5.  选择 `转到报告`。\n6.  在 `指定报告` 中，选择 `Sales Details`。\n\
    7.  点击 `添加`。这将从 `Sales Details` 报告添加一个参数以映射到 `Sales Summary` 报告。`名称` 属性是 `Sales\
    \ Details` 报告所需的参数。在 `值` 属性中，你将映射汇总报告中的某些内容以传递到明细报告。\n8.  在 `名称` 列中选择 `Year` 参数。\n\
    9.  从 `值` 列表中选择 `OrderYear`。\n10. 再次点击 `添加`。这次，将 `Territory` 映射到 `TerritoryID`\
    \ 字段。对话框应类似于图 6-42。\n    ![A395630_1_En_6_Fig42_HTML.jpg](img/A395630_1_En_6_Fig42_HTML.jpg)\n\
    \    图 6-42. 操作属性\n11. 点击“确定”接受属性设置。\n\n现在，当你运行报告时，点击 `Territory` 行上的任何总销售额值。`Sales\
    \ Details` 报告将打开，并已根据你选择的值进行筛选。要导航回 `Sales Summary` 报告，请点击 `返回父报告` 按钮。\n\n## 总结\n\
    \n在本章中，你看到了许多方法，可以根据用户交互性或数据本身使报告动态化。你可以让用户能够使用参数筛选数据或修改属性。文本框和其他控件可以通过基于数据的表达式进行格式化。你可以做的事情没有限制。\n\
    \n在第 7 章中，你将了解可以添加到报告中的视觉元素。这些元素可用于让报告仅凭一眼就能传达更多信息，或者用于创建仪表板。\n\n# 7. 用视觉呈现让数据生动起来\n\
    \n一图胜千言。对于报告而言，一张图也胜过上千个数字。通过添加图表、仪表和地图，一份报告就能讲述一个完整的故事。我经常开玩笑说，在组织结构图中职位越高，报告中需要的图片就越多。这些图片能让忙碌的高管一眼就看出趋势和公司的健康状况。\n\
    \n在第 4 章中，你看到了如何将存储在数据库中的图像添加到报告中。在第 10 章中，你将学习一个同样利用视觉元素的激动人心的新功能：移动报告。在本章中，你将向报告添加与数据连接的视觉元素，并创建一个仪表板。2016\
    \ 版中所有视觉元素的外观都已更新，因此它们看起来与之前版本中的有很大不同。"
- fmt: "# Adding Charts and Graphs to Reports\n\nSQL Server Reporting Services (SSRS)\
    \ gives you the ability to add charts and graphs to your reports with the chart\
    \ control. What is the difference between a chart and a graph? Strictly speaking,\
    \ a graph displays the relationship of data over time while a chart compares categories.\
    \ For example, a graph might display the sales over a year by month while a chart\
    \ might compare the sales among territories for a particular year. You can see\
    \ the difference in Figure 7-1.\n\n![A395630_1_En_7_Fig1_HTML.jpg](A395630_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. Comparing a graph to a chart\n\nIf you would like to see the design\
    \ used for these data elements, look for a report named Chart and Graph in the\
    \ Code/Download area of the Apress web site ([`www.Apress.com`](http://www.Apress.com))\
    \ for this book. Before diving in to create charts and graphs, take a look at\
    \ Figure 7-2 so that you will understand the parts that make up one of these visual\
    \ elements.\n\n![A395630_1_En_7_Fig2_HTML.jpg](A395630_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2. The parts of a chart\n\nSSRS has a wealth of different chart types.\
    \ Some of them are 3-D; however, use 3-D sparingly and with caution. Making a\
    \ visual element 3-D doesn't add anything to the value, and it can distort the\
    \ sizes and make understanding the data represented by the control more difficult.\
    \ In this section, you will learn how to add charts and graphs to your reports.\
    \ Follow these steps to get started:\n\n1.  Create a new SSRS project named Visual\
    \ Reports. The solution name should be Beginning SSRS Chapter 7.\n2.  Add a new\
    \ shared data source pointing to the `AdventureWorks2016` database named `AdventureWorks2016`\
    \ to the project. Remember to refer back to Chapter 3 if you need to review how\
    \ to add data sources and datasets.\n3.  Add a new shared dataset named `Year`\
    \ to the project. It should point to the `AdventureWorks` shared data source.\
    \ This dataset will be used in several reports, so it makes sense to be able to\
    \ reuse it. Here is the query:\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear\n\
    \    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate)\n    ORDER BY YEAR(OrderDate);\n\
    \    ```\n4.  Be sure to correct the shared dataset file if the fix from Microsoft\
    \ is not available. See Chapter 6 for more information.\n5.  Add a new report\
    \ named Charts to the project.\n6.  Add a data source to the report named `AdventureWorks`\
    \ pointing to the shared data source.\n7.  Add a new dataset to the report named\
    \ `Year`. Select Use a shared dataset and select the `Year` dataset from the project.\
    \ The dialog should look like that in Figure 7-3.\n    ![A395630_1_En_7_Fig3_HTML.jpg](A395630_1_En_7_Fig3_HTML.jpg)\n\
    \    Figure 7-3. The Year dataset\n8.  Add an embedded dataset named `Sales` pointing\
    \ to the `AdventureWorks` data source with the following query:\n    ```sql\n\
    \    SELECT SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth,\n   \
    \ T.TerritoryID, T.Name AS TerritoryName,\n    Sum(Sum(TotalDue)) OVER(PARTITION\
    \ BY T.TerritoryID) AS TerritoryTotal\n    FROM Sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON T.TerritoryID = SOH.TerritoryID\n    WHERE\
    \ YEAR(OrderDate) = @Year\n    GROUP BY MONTH(OrderDate), T.TerritoryID, T.Name;\n\
    \    ```\n9.  The query is filtered by `@Year`. The dataset will automatically\
    \ create a parameter. Expand the Parameters folder and bring up the properties\
    \ of the `Year` parameter.\n10. Select the Available Values page and select Get\
    \ values from a query.\n11. Set Dataset to `Year`. Set the Value Field and Label\
    \ Field to `OrderYear`. The Available Values page should look like Figure 7-4.\n\
    \    ![A395630_1_En_7_Fig4_HTML.jpg](A395630_1_En_7_Fig4_HTML.jpg)\n    Figure\
    \ 7-4. The Available Values properties\n12. Set a default value of `2012`. The\
    \ Default Values page should look like Figure 7-5.\n    ![A395630_1_En_7_Fig5_HTML.jpg](A395630_1_En_7_Fig5_HTML.jpg)\n\
    \    Figure 7-5. The Default Values properties\n13. Click OK to accept the changes.\n\
    14. The Report Data window should now look like Figure 7-6.\n    ![A395630_1_En_7_Fig6_HTML.jpg](A395630_1_En_7_Fig6_HTML.jpg)\n\
    \    Figure 7-6. The Report Data window after all report objects added\n\nTake\
    \ a look at the Toolbox as shown in Figure 7-7. The Chart, Gauge, and Map are\
    \ usually added as stand-alone objects in the report. The Data Bar, Sparkline,\
    \ and Indicator are usually added to a cell of Tablix. In this section, you will\
    \ learn about the chart control.\n\n![A395630_1_En_7_Fig7_HTML.jpg](A395630_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7. The Toolbox\n\nFollow these steps to add a chart to the report:\n\
    \n1.  In design view, drag a chart to the design canvas.\n2.  This opens the Select\
    \ Chart Type dialog shown in Figure 7-8 where you can select one of many types\
    \ of charts.\n    ![A395630_1_En_7_Fig8_HTML.jpg](A395630_1_En_7_Fig8_HTML.jpg)\n\
    \    Figure 7-8. The Select Chart Type dialog\n3.  The default type is the Column\
    \ chart. Click OK to add it to the report.\n4.  Before making any modifications,\
    \ the chart will look like Figure 7-9.\n    ![A395630_1_En_7_Fig9_HTML.jpg](A395630_1_En_7_Fig9_HTML.jpg)\n\
    \    Figure 7-9. The chart control\n5.  To connect the data to the chart, double-click\
    \ the chart. This opens the Chart Data window as shown in Figure 7-10.\n    ![A395630_1_En_7_Fig10_HTML.jpg](A395630_1_En_7_Fig10_HTML.jpg)\n\
    \    Figure 7-10. The Chart Data window\n6.  The Chart Data window is divided\
    \ into three sections. The ∑ Values window holds the field you want to measure,\
    \ represented by the height of the bar. Click the plus sign and navigate to the\
    \ `TotalSales` field from `AdventureWorks` ➤ `Sales` to add it. It will automatically\
    \ sum.\n7.  The Category Groups section holds the values used for the horizontal\
    \ axis. Change from the default of Details to `TerritoryName`. If left as the\
    \ default, it will display a bar for each row in the dataset. In our case, we\
    \ want one bar per territory.\n8.  Series Groups allows you to break down the\
    \ category into multiple smaller items. You will learn about this in a later example.\
    \ For now, the Chart Data window should look like Figure 7-11.\n    ![A395630_1_En_7_Fig11_HTML.jpg](A395630_1_En_7_Fig11_HTML.jpg)\n\
    \    Figure 7-11. The Chart Data window with the properties filled in\n9.  Increase\
    \ the size of the chart so that it is about five inches (13 cm) wide by four inches\
    \ (10 cm) tall. To assist with resizing the chart, you can add the ruler by right-clicking\
    \ the report and selecting View ➤ Ruler.\n10. Preview the report. The chart should\
    \ look like Figure 7-12.\n    ![A395630_1_En_7_Fig12_HTML.jpg](A395630_1_En_7_Fig12_HTML.jpg)\n\
    \    Figure 7-12. The chart before formatting\n\nAt this point, you can see that\
    \ the bars are different heights, and you can see some of the territory names\
    \ along the horizontal axis. Obviously, this chart needs quite a bit of work,\
    \ and, fortunately, it is highly customizable. Each section of the chart has its\
    \ own property window which you can use to control format and position. Following\
    \ is a list of items that need to be corrected:\n\n*   Display all territory names.\n\
    *   Add the two axis titles.\n*   Change the Chart Title to `Total Sales by Territory`\
    \ along with the year.\n*   Remove the legend.\n*   Format the vertical axis.\n\
    *   Add a tooltip with the exact amount for each territory.\n\nFollow these steps\
    \ to format the chart:"
