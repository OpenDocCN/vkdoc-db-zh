  trans: "\n# 将报表部署到 SharePoint\n\n在 SharePoint 模式下安装和配置 SSRS 超出了本书的范围。但我确实认为，如果您需要将报表部署到现有的\
    \ SharePoint 场，可以回到本章学习如何操作。就像本机模式 SSRS 一样，您可以通过上传或从 SSDT 发布来发布报表。本节假设您使用的是 SharePoint\
    \ 2013 或更高版本，并且 SSRS 文档库已正确配置。\n\n请按照以下步骤学习如何将 SSRS 报表上传到 SharePoint 报表库：\n\n\
    1.  启动 SharePoint 并导航到报表库。图 8-26 展示了一个典型的报表文件夹。\n    ![A395630_1_En_8_Fig26_HTML.jpg](img/A395630_1_En_8_Fig26_HTML.jpg)\n\
    \    图 8-26. SharePoint 报表文件夹\n2.  单击 **文件**。\n3.  单击 **上传文档**，如图 8-27 所示。\n \
    \   ![A395630_1_En_8_Fig27_HTML.jpg](img/A395630_1_En_8_Fig27_HTML.jpg)\n    图\
    \ 8-27. “上传文档”图标\n4.  在“添加文档”对话框中，单击 **浏览** 导航到 SSRS 报表 `rdl` 文件。\n5.  单击 **确定**。\n\
    6.  在“报表”对话框中，将内容类型选择为 **报表生成器报表**，如图 8-28 所示。\n    ![A395630_1_En_8_Fig28_HTML.jpg](img/A395630_1_En_8_Fig28_HTML.jpg)\n\
    \    图 8-28. “报表”对话框\n7.  单击 **保存**。报表现在应该会显示在文件夹中。\n8.  由于您上传了文件，因此需要配置数据源。单击报表名称旁边的省略号\
    \ (…)。\n9.  这将打开一个菜单对话框；单击此对话框上的省略号 (…)。\n10. 选择 **管理数据源**，如图 8-29 所示。\n    ![A395630_1_En_8_Fig29_HTML.jpg](img/A395630_1_En_8_Fig29_HTML.jpg)\n\
    \    图 8-29. 报表属性菜单\n11. 在“管理数据源”页面上，单击数据源名称。\n12. 在数据源的属性页上，单击省略号 (…)，如图 8-30\
    \ 所示。\n    ![A395630_1_En_8_Fig30_HTML.jpg](img/A395630_1_En_8_Fig30_HTML.jpg)\n\
    \    图 8-30. 数据源属性\n13. 在“选择项”对话框中，导航到正确的数据源，如图 8-31 所示。单击 **向上** 按钮进行导航。\n  \
    \  ![A395630_1_En_8_Fig31_HTML.jpg](img/A395630_1_En_8_Fig31_HTML.jpg)\n    图\
    \ 8-31. “选择项”对话框\n14. 单击 **确定** 以保存数据源名称并关闭对话框。\n15. 在报表的数据源属性上单击 **确定** 以保存更改。\n\
    16. 导航到报表并测试它。\n\n您也可以上传数据源文件 (`rds`) 或创建它们。要创建新数据源，请按照以下步骤操作：\n\n1.  启动 SharePoint\
    \ 并导航到“数据源”文件夹。\n2.  单击 **文件** ➤ **新建文档**，如图 8-32 所示。\n    ![A395630_1_En_8_Fig32_HTML.jpg](img/A395630_1_En_8_Fig32_HTML.jpg)\n\
    \    图 8-32. “新建文档”图标\n3.  选择 **报表数据源**，如图 8-33 所示。\n    ![A395630_1_En_8_Fig33_HTML.jpg](img/A395630_1_En_8_Fig33_HTML.jpg)\n\
    \    图 8-33. “报表数据源”菜单项\n4.  在“数据源属性”页面上填写属性，如图 8-34 所示。\n    ![A395630_1_En_8_Fig34_HTML.jpg](img/A395630_1_En_8_Fig34_HTML.jpg)\n\
    \    图 8-34. 数据源属性\n5.  单击 **确定** 以保存新数据源。\n\n要从 SSDT 部署报表和其他对象，您需要在项目属性中为每种类型的项配置\
    \ SharePoint 库文件夹的确切路径。否则，该过程与部署到本机模式实例相同。图 8-35 展示了如何为我的 SharePoint 站点进行配置。\n\
    ![A395630_1_En_8_Fig35_HTML.jpg](img/A395630_1_En_8_Fig35_HTML.jpg)\n图 8-35. 部署到\
    \ SharePoint 时的属性\n\n## 总结\n\n除非 SSRS 报表发布到最终用户可以访问的地方，否则它们没有太大价值。在本章中，您认识了新的\
    \ Web 门户。您通过 SSDT 和上传的方式部署了报表。如果您安装了 SharePoint 模式的 SSRS 实例，您也看到了如何将报表部署到 SharePoint。\n\
    \n只要涉及数据，安全就至关重要。在第 9 章中，您将了解 SSRS 的安全方面。\n\n## 9. 保护您的报表\n\n几乎每周都有重大的数据泄露事件被报道。最先引起我注意的之一是\
    \ 2012 年南卡罗来纳州纳税人数据库失窃事件。2015 年，黑客窃取了数百万美国联邦政府雇员的电子记录。报表开发人员可能不需要配置安全，但他或她应该能够理解\
    \ SQL Server Reporting Services (SSRS) 安全的工作原理，以便在管理员请求时提供协助。\n\n部署 SSRS 报表时，需要考虑两层安全：数据源处的权限和\
    \ SSRS 内部的权限。在本章中，您将学习 SSRS 的安全特性以及 SSRS 如何与 SQL Server 安全交互。\n\n## 理解 SQL Server\
    \ 安全\n\n即使允许最终用户运行报表，SQL Server 实例也可能不会返回请求的数据。数据源中的设置决定了发送到 SQL Server 的凭据。\n\
    \n**注意**\n\n全面回顾 SQL Server 安全超出了本书的范围。报表的数据也可能来自许多其他来源，例如 Oracle 数据库和 Analysis\
    \ Services 多维数据集。请查阅供应商文档以了解任何特定产品的安全性。\n\n对于 SQL Server，将使用两种类型的帐户进行连接：Windows\
    \ 登录名和在 SQL Server 实例内定义的登录名。这两种登录名都映射到在数据库内具有特定权限的数据库用户。SQL Server 的另一个功能称为 **包含数据库**，允许您直接在数据库中创建用户。图\
    \ 9-1 说明了这些概念。\n![A395630_1_En_9_Fig1_HTML.jpg](img/A395630_1_En_9_Fig1_HTML.jpg)\n\
    图 9-1. SQL Server 内的身份验证\n"
- fmt: "### Setting Up an SQL Account\n\nBy default, SQL Server will accept only Windows\
    \ authentication. SQL Server authentication can be enabled during installation,\
    \ or you can configure it after the fact. To follow along with all of the examples\
    \ in this chapter, SQL Server authentication must be enabled. If you installed\
    \ your SQL Server instance locally, you will be able to modify the authentication\
    \ properties. Otherwise, you will need to work with your database administrator\
    \ to configure security on a development instance in your network. To change the\
    \ authentication properties of SQL Server, follow these steps:\n\n1.  Launch `SQL\
    \ Server Management Studio (SSMS)`.\n2.  Type in the SQL Server name property\
    \ and Authentication method as shown in Figure [9-2](#A395630_1_En_9_Chapter.html#Fig2).\
    \ If you are not sure about these properties, refer to the section \"Determining\
    \ the SQL Server Name\" in Chapter [1](#A395630_1_En_1_Chapter.html).\n    ![A395630_1_En_9_Fig2_HTML.jpg](A395630_1_En_9_Fig2_HTML.jpg)\n\
    \    Figure 9-2. The Connect to Server dialog\n    **Caution** Modifying the server\
    \ authentication property requires a restart of SQL Server.\n3.  Click Connect.\n\
    4.  In Object Explorer of SSMS, right-click the server name and select `Properties`.\n\
    5.  Select the `Security` page.\n6.  If the `Server Authentication` is set to\
    \ `Windows Authentication mode`, switch it to `SQL Server and Windows Authentication\
    \ mode` as shown in Figure [9-3](#A395630_1_En_9_Chapter.html#Fig3).\n    ![A395630_1_En_9_Fig3_HTML.jpg](A395630_1_En_9_Fig3_HTML.jpg)\n\
    \    Figure 9-3. SQL Server and Windows Authentication mode\n7.  Click OK to accept\
    \ the change.\n8.  Restart SQL Server by right-clicking the server name and selecting\
    \ `Restart`.\n\nNow that SQL Server is configured to accept SQL Server authentication,\
    \ you will need to create a login and give it permissions. Follow these steps\
    \ to set up the login:\n\n1.  In Object Explorer, expand `Security`.\n2.  Right-click\
    \ `Logins` and select `New Login`.\n3.  This opens the `Login – New` dialog box.\n\
    4.  Fill in `SQLReportUser` for the `Login Name`.\n5.  Select `SQL Server Authentication`.\n\
    6.  Type in and confirm a password that you will remember.\n7.  Since this is\
    \ just for an example, uncheck `Enforce password policy` as shown in Figure [9-4](#A395630_1_En_9_Chapter.html#Fig4).\n\
    \    ![A395630_1_En_9_Fig4_HTML.jpg](A395630_1_En_9_Fig4_HTML.jpg)\n    Figure\
    \ 9-4. The `SQLReportUser` account properties\n8.  Click OK to create the account.\n\
    9.  Right-click the account and select `Properties`.\n10. Switch to the `User\
    \ Mapping` page.\n11. Check next to `AdventureWorks2016` as shown in Figure [9-5](#A395630_1_En_9_Chapter.html#Fig5).\n\
    \    ![A395630_1_En_9_Fig5_HTML.jpg](A395630_1_En_9_Fig5_HTML.jpg)\n    Figure\
    \ 9-5. The User Mapping page\n12. Check the `db_owner` role. In a production database,\
    \ give only the rights needed. I've noticed that sometimes `db_owner` is automatically\
    \ selected for new users in AdventureWorks, but it doesn't stick. Go back and\
    \ view the properties and reset it if needed.\n13. Click OK to save the permissions.\n\
    \n### Connecting to SQL Server\n\nIn Chapter [3](#A395630_1_En_3_Chapter.html),\
    \ you learned how to create a data source and most likely used your Windows credentials\
    \ to connect to SQL Server. In this section, you will create a new data source\
    \ that uses a SQL Server account. Follow these steps to create a new data source\
    \ in the project to accept SQL Server credentials:\n\n1.  Launch `SQL Server Data\
    \ Tools (SSDT)` and open the solution from Chapter [6](#A395630_1_En_6_Chapter.html).\n\
    2.  Right-click `Shared Data Sources` and select `Add New Data Source`.\n3.  On\
    \ the General page, set the `Name` property to `AdventureWorks2016SQL` as shown\
    \ in Figure [9-6](#A395630_1_En_9_Chapter.html#Fig6).\n    ![A395630_1_En_9_Fig6_HTML.jpg](A395630_1_En_9_Fig6_HTML.jpg)\n\
    \    Figure 9-6. The Name property\n4.  As you have done throughout the book,\
    \ click the `Edit` button to set the `Connection string` property.\n5.  On the\
    \ `Credentials` page, select `Use this user name and password`.\n6.  Type in the\
    \ `User name` and `Password` from the account you previously created. The Credentials\
    \ page should look like Figure [9-7](#A395630_1_En_9_Chapter.html#Fig7).\n   \
    \ ![A395630_1_En_9_Fig7_HTML.jpg](A395630_1_En_9_Fig7_HTML.jpg)\n    Figure 9-7.\
    \ The new credentials\n7.  Click OK to save the changes.\n8.  Double-click the\
    \ `Sales by Territory Matrix` report to open it in design view.\n9.  In the `Report\
    \ Data` window, open the properties of the `AdventureWorks` data source.\n10.\
    \ On the `General` page, select `AdventureWorks2016SQL` for the `Use shared data\
    \ source reference` property as shown in Figure [9-8](#A395630_1_En_9_Chapter.html#Fig8).\n\
    \    ![A395630_1_En_9_Fig8_HTML.jpg](A395630_1_En_9_Fig8_HTML.jpg)\n    Figure\
    \ 9-8. The new shared data source reference\n11. Click OK to save the changes.\n\
    12. Preview the report to make sure it works.\n\nNow the report is configured\
    \ to use a SQL Server account to retrieve the data. When the project is deployed,\
    \ the end users will connect to the web portal with their Windows accounts. SSRS\
    \ will then connect to SQL Server with the account credentials that have been\
    \ stored in the data source properties. Follow these steps to deploy the project\
    \ and view the new data source in the web portal:\n\n1.  In the Solution Explorer,\
    \ right-click the project name and select `Properties`.\n2.  Set the `TargetServerURL`\
    \ to your web service URL (uniform resource locator) if it is not already set.\
    \ See the section \"Deploying Reports from SSDT\" in Chapter [8](#A395630_1_En_8_Chapter.html)\
    \ if you are not sure how to do this.\n3.  Click OK to save the changes.\n4. \
    \ Right-click the project name and select `Deploy`.\n5.  If the deployment was\
    \ successful, launch the web portal. See the section \"Deploying Reports from\
    \ SSDT\" in Chapter [8](#A395630_1_En_8_Chapter.html) if you need help with this.\n\
    6.  Click the `Data Sources` folder.\n7.  Click the ellipsis next to the `AdventureWorks2016SQL`\
    \ data source and select `Manage`.\n8.  This opens the properties of the data\
    \ source. Scroll down to the `Credentials` section and view the properties. Notice\
    \ that you can also specify a hard-coded Windows account. Figure [9-9](#A395630_1_En_9_Chapter.html#Fig9)\
    \ shows the Credentials section.\n    ![A395630_1_En_9_Fig9_HTML.jpg](A395630_1_En_9_Fig9_HTML.jpg)\n\
    \    Figure 9-9. The data source credentials\n\nYou may be wondering why you do\
    \ not specify `As the user viewing the report` all the time. In some cases, it\
    \ is not possible. Following is a list of possible reasons to save hard-coded\
    \ credentials in data sources:\n\n*   End users or devices may not be part of\
    \ the Windows domain.\n*   End users may not be allowed to have direct rights\
    \ in the database.\n*   Subscriptions require hard-coded credentials.\n*   The\
    \ database server may not reside on the same server as SSRS.\n\n**Note** `Kerberos`\
    \ delegation must be configured to forward credentials between servers. This is\
    \ an advanced security topic beyond the scope of this book. To learn more about\
    \ `Kerberos` delegation, see the Pluralsight course \"Configuring Kerberos for\
    \ SSRS.\""
