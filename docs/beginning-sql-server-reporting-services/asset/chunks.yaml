- fmt: "# Part III\nDeploying Reports\n\n## Building a Dashboard\n\nDashboards allow\
    \ busy executives to see the current status of the business with just a glance.\
    \ They can see trends over time and how key performance indicators are being met.\
    \ In this section, you will combine several of the visualizations you created\
    \ into one report.\n\nTo get started, follow these steps:\n\n1.  Add a new report\
    \ named `Dashboard`.\n2.  Open the Report Properties from the Report menu.\n3.\
    \  Change the layout of the report to Landscape.\n4.  Change the margins so that\
    \ each margin is 0.25 inches or 0.625 cm as shown in Figure [7-50](#A395630_1_En_7_Chapter.html#Fig50).\n\
    \n![A395630_1_En_7_Fig50_HTML.jpg](A395630_1_En_7_Fig50_HTML.jpg)\n\nFigure 7-50.\
    \ The Report Properties page\n\n5.  Click OK to save the changes.\n6.  Add a data\
    \ source to the report named `AdventureWorks` pointing to the `AdventureWorks2016`\
    \ shared data source.\n7.  Add a dataset named `Year` pointing to the shared `Year`\
    \ dataset.\n8.  Add a parameter named `Year` of data type integer. The General\
    \ page should look like Figure [7-51](#A395630_1_En_7_Chapter.html#Fig51).\n\n\
    ![A395630_1_En_7_Fig51_HTML.jpg](A395630_1_En_7_Fig51_HTML.jpg)\n\nFigure 7-51.\
    \ The Year parameter properties\n\n9.  Connect the available values to the `Year`\
    \ dataset.\n10. Add a default to the parameter with the value `2014`.\n11. Click\
    \ OK.\n12. Create a new embedded dataset named `Sales` pointing to `AdventureWorks`\
    \ with the following query:\n\n```sql\n    SELECT SUM(TotalDue) AS TotalSales,\
    \ MONTH(OrderDate) AS OrderMonth,\n    T.TerritoryID, T.Name AS TerritoryName,\n\
    \    Sum(Sum(TotalDue)) OVER(PARTITION BY T.TerritoryID) AS TerritoryTotal\n \
    \   FROM Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ T.TerritoryID = SOH.TerritoryID\n    WHERE YEAR(OrderDate) = @Year\n    GROUP\
    \ BY MONTH(OrderDate), T.TerritoryID, T.Name;\n```\n\n13. Add a page header to\
    \ the report.\n14. Add a text box to the header with the following expression:\n\
    \n```expression\n    =\"Sales Dashboard for \" & Parameters!Year.Value\n```\n\n\
    15. Increase the font size of the text box to 16 pt.\n16. Expand the width of\
    \ the text box.\n17. Open the `Charts` report in design view.\n18. Copy the bar\
    \ chart from the report using the `CTRL+C` shortcut and paste it into the `Dashboard`\
    \ report.\n\nWhen you run the report, it should look like Figure [7-52](#A395630_1_En_7_Chapter.html#Fig52).\n\
    \n![A395630_1_En_7_Fig52_HTML.jpg](A395630_1_En_7_Fig52_HTML.jpg)\n\nFigure 7-52.\
    \ The dashboard with the first visualizations\n\nYou can continue adding embedded\
    \ visualizations to the dashboard, but you can also add subreports that contain\
    \ tables or visualizations. Follow these steps to add subreports:\n\n1.  Switch\
    \ to design view of the `Map` report.\n2.  Drag the map to the upper left corner\
    \ of the report.\n3.  Drag in the margins of the report as far as possible.\n\
    4.  Save the report.\n5.  In design view of the `Dashboard` report, add a subreport\
    \ control to the right of the bar chart.\n6.  Adjust the size of the subreport\
    \ so that it is about the same size as the bar chart.\n7.  Right-click the subreport\
    \ and select Subreport Properties.\n8.  Set the Use This Report as a Subreport\
    \ property to `Map`.\n9.  On the Parameters page you map any parameters needed\
    \ for the subreport to values from the parent report. Click Add to add the first\
    \ parameter.\n10. Select `Year` under Name. This is the parameter required by\
    \ the subreport.\n11. Under Value, select the `fx` icon to open the Expression\
    \ builder.\n12. Change the expression to `=Parameters!Year.Value` and click OK\
    \ twice.\n13. Preview the report. You can adjust the size of the map in the `Map`\
    \ report and the subreport as required. The report should look like Figure [7-53](#A395630_1_En_7_Chapter.html#Fig53).\n\
    \n![A395630_1_En_7_Fig53_HTML.jpg](A395630_1_En_7_Fig53_HTML.jpg)\n\nFigure 7-53.\
    \ The dashboard with two visualizations\n\n14. Open the `SmallControls` report\
    \ in design view.\n15. Drag the table to the upper left corner.\n16. Drag in the\
    \ report edges.\n17. If you haven’t done it previously, format the `sales` field\
    \ as currency with no decimal places and with a thousands separator.\n18. Save\
    \ the `SmallControls` report.\n19. Add the `SmallControls` report as a subreport\
    \ to the `Dashboard` report below the bar chart. This subreport doesn’t have a\
    \ parameter to map.\n\nWhen you view the report, it should resemble Figure [7-54](#A395630_1_En_7_Chapter.html#Fig54).\n\
    \n![A395630_1_En_7_Fig54_HTML.jpg](A395630_1_En_7_Fig54_HTML.jpg)\n\nFigure 7-54.\
    \ The completed dashboard\n\n## Summary\n\nSSRS provides a wide variety of visual\
    \ elements that connect to datasets. These objects also have many configurable\
    \ properties that can enhance the visual appeal of reports and dashboards. This\
    \ chapter introduced you to all of the charts, gauges, and maps, including several\
    \ that are meant to fit inside a Tablix cell.\n\nIn Chapter [8](#A395630_1_En_8_Chapter.html),\
    \ you will learn how to publish reports to the new Reporting Services Web Portal.\n\
    \n## 8. Publishing Reports\n\nI write articles, blog posts, books, and a monthly\
    \ newsletter. Until these are published, they exist on my laptop where only I\
    \ can see them. The point of my writing is to make it available for others to\
    \ read. My goal is to teach people all over the world about SQL Server, and to\
    \ accomplish this, my works must be published.\n\nYou can create brilliant reports\
    \ using SQL Server Data Tools (`SSDT`) on your computer, but until those reports\
    \ are published, they are not useful for the people who requested them. In this\
    \ chapter, you will learn how to publish the reports that you have created throughout\
    \ the book."
