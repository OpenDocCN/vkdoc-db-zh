    \nThe matrix is now a table\n\n## Summary\n\nCreating reports is an iterative\
    \ process. You may start with a simple request and need to work with the requester\
    \ to finalize the design. Or, you may start with an elaborate set of requirements\
    \ including a detailed layout. Whenever you are creating a report with multiple\
    \ grouping levels or complex features, be sure to sketch out the layout if a design\
    \ is not given to you.\n\nMost reports require one or more grouping levels. This\
    \ chapter walked you through adding grouping levels and formatting the report\
    \ using several techniques. You also created a simple matrix report. Be sure you\
    \ understand how to add and configure groups before moving on to the next chapter.\n\
    \nIn Chapter [6](#A395630_1_En_6_Chapter.html), you will learn how to make your\
    \ report dynamic by adding parameters, linking reports, allowing the user to control\
    \ sorting, and more."
