  trans: "\n# 第三部分\n部署报表\n\n## 构建仪表板\n\n仪表板让繁忙的高管只需一瞥就能看到业务的当前状况。他们可以看到随时间变化的趋势以及关键绩效指标的达成情况。在本节中，您将把创建的多个可视化元素组合到一份报表中。\n\
    \n请按照以下步骤开始：\n\n1.  添加一个名为 `Dashboard` 的新报表。\n2.  从“报表”菜单中打开“报表属性”。\n3.  将报表的布局更改为“横向”。\n\
    4.  将所有页边距更改为 0.25 英寸或 0.625 厘米，如图 7-50 所示。\n\n![A395630_1_En_7_Fig50_HTML.jpg](img/A395630_1_En_7_Fig50_HTML.jpg)\n\
    \n图 7-50. 报表属性页面\n\n5.  单击“确定”保存更改。\n6.  向报表添加一个名为 `AdventureWorks` 的数据源，该数据源指向共享数据源\
    \ `AdventureWorks2016`。\n7.  添加一个名为 `Year` 的数据集，该数据集指向共享数据集 `Year`。\n8.  添加一个名为\
    \ `Year` 的参数，数据类型为整数。“常规”页面应如图 7-51 所示。\n\n![A395630_1_En_7_Fig51_HTML.jpg](img/A395630_1_En_7_Fig51_HTML.jpg)\n\
    \n图 7-51. Year 参数属性\n\n9.  将可用值连接到 `Year` 数据集。\n10. 为参数添加一个默认值 `2014`。\n11. 单击“确定”。\n\
    12. 创建一个新的嵌入数据集 `Sales`，指向 `AdventureWorks`，并使用以下查询：\n\n```sql\n    SELECT SUM(TotalDue)\
    \ AS TotalSales, MONTH(OrderDate) AS OrderMonth,\n    T.TerritoryID, T.Name AS\
    \ TerritoryName,\n    Sum(Sum(TotalDue)) OVER(PARTITION BY T.TerritoryID) AS TerritoryTotal\n\
    \    FROM Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ T.TerritoryID = SOH.TerritoryID\n    WHERE YEAR(OrderDate) = @Year\n    GROUP\
    \ BY MONTH(OrderDate), T.TerritoryID, T.Name;\n```\n\n13. 向报表添加一个页面页眉。\n14. 在页眉中添加一个文本框，使用以下表达式：\n\
    \n```expression\n    =\"Sales Dashboard for \" & Parameters!Year.Value\n```\n\n\
    15. 将文本框的字体大小增加到 16 磅。\n16. 扩展文本框的宽度。\n17. 在设计视图中打开 `Charts` 报表。\n18. 使用 `CTRL+C`\
    \ 快捷键从该报表中复制条形图，并将其粘贴到 `Dashboard` 报表中。\n\n当您运行报表时，它应如图 7-52 所示。\n\n![A395630_1_En_7_Fig52_HTML.jpg](img/A395630_1_En_7_Fig52_HTML.jpg)\n\
    \n图 7-52. 包含第一个可视化元素的仪表板\n\n您可以继续向仪表板添加嵌入式可视化元素，但也可以添加包含表格或可视化元素的子报表。请按照以下步骤添加子报表：\n\
    \n1.  切换到 `Map` 报表的设计视图。\n2.  将地图拖动到报表的左上角。\n3.  尽可能向内拖动报表的边距。\n4.  保存报表。\n5.\
    \  在 `Dashboard` 报表的设计视图中，在条形图右侧添加一个子报表控件。\n6.  调整子报表的大小，使其与条形图的大小大致相同。\n7.  右键单击子报表，选择“子报表属性”。\n\
    8.  将“将此报表用作子报表”属性设置为 `Map`。\n9.  在“参数”页面上，您可以将子报表所需的任何参数映射到父报表中的值。单击“添加”以添加第一个参数。\n\
    10. 在“名称”下选择 `Year`。这是子报表所需的参数。\n11. 在“值”下，选择 `fx` 图标以打开表达式生成器。\n12. 将表达式更改为 `=Parameters!Year.Value`，然后单击“确定”两次。\n\
    13. 预览报表。您可以根据需要调整 `Map` 报表中地图和子报表的大小。报表应如图 7-53 所示。\n\n![A395630_1_En_7_Fig53_HTML.jpg](img/A395630_1_En_7_Fig53_HTML.jpg)\n\
    \n图 7-53. 包含两个可视化元素的仪表板\n\n14. 在设计视图中打开 `SmallControls` 报表。\n15. 将表格拖动到左上角。\n\
    16. 向内拖动报表边缘。\n17. 如果之前未操作，请将 `sales` 字段格式化为货币，无小数位，并使用千位分隔符。\n18. 保存 `SmallControls`\
    \ 报表。\n19. 将 `SmallControls` 报表作为子报表添加到 `Dashboard` 报表中条形图的下方。此子报表没有需要映射的参数。\n\
    \n当您查看报表时，它应类似于图 7-54。\n\n![A395630_1_En_7_Fig54_HTML.jpg](img/A395630_1_En_7_Fig54_HTML.jpg)\n\
    \n图 7-54. 完成的仪表板\n\n## 小结\n\nSSRS 提供了多种连接到数据集的可视化元素。这些对象还具有许多可配置属性，可以增强报表和仪表板的视觉吸引力。本章向您介绍了所有的图表、仪表和地图，包括几种旨在放入\
    \ Tablix 单元格中的图表。\n\n在第 8 章中，您将学习如何将报表发布到新的 Reporting Services Web 门户。\n\n## 8.\
    \ 发布报表\n\n我撰写文章、博客帖子、书籍和每月的通讯。在它们发布之前，它们只存在于我的笔记本电脑上，只有我能看到。我写作的目的是让其他人也能阅读。我的目标是向全世界的人们传授\
    \ SQL Server 知识，为了实现这一点，我的作品必须被发布。\n\n您可以在计算机上使用 SQL Server Data Tools (`SSDT`)\
    \ 创建出色的报表，但在这些报表发布之前，对于请求它们的人来说它们是没有用的。在本章中，您将学习如何发布您在本书中创建的报表。\n"
- fmt: '## Getting Around in the Web Portal


    Throughout all the versions of SQL Server Reporting Services (SSRS), the default
    user interface for SSRS reports when installed in native mode was the `Report
    Manager` as shown in Figure 8-1.


    ![A395630_1_En_8_Fig1_HTML.jpg](A395630_1_En_8_Fig1_HTML.jpg)

    Figure 8-1. The `Report Manager`


    Starting with `SSRS` 2016, the `Report Manager` has been replaced with the new
    `SSRS web portal`. This change not only represents an upgrade but enables `SSRS`
    to play in the new mobile world with new report types intended for smartphones
    and tablets. If you have managed `SSRS` reports over the past few years, you have
    probably received complaints about web browser compatibility. Starting with 2016,
    modern web browsers are supported!


    Over the past few releases, many of the new `SSRS` features were available only
    when `SSRS` was installed in SharePoint integrated mode. This release is a nice
    departure from that trend. Those SharePoint-only features, such as data-driven
    reports, have not been back-ported to native mode, but several new features are
    available in native mode only. Figure 8-2 shows the new portal.


    ![A395630_1_En_8_Fig2_HTML.jpg](A395630_1_En_8_Fig2_HTML.jpg)

    Figure 8-2. The new `web portal`


    In addition to hosting the traditional paginated reports, the `web portal` hosts
    independent `KPIs`, or key performance indicators, and mobile reports that will
    run on tablets and smartphones. You will learn how to build the `KPIs` and mobile
    reports in Chapter 10.


    The `web portal` has two pages or modes: `Favorites` and `Browse`. The `Browse`
    page looks more like the traditional view. There you can see the folders where
    the reports and other objects are stored as shown in Figure 8-3.


    ![A395630_1_En_8_Fig3_HTML.jpg](A395630_1_En_8_Fig3_HTML.jpg)

    Figure 8-3. The `Browse` page


    When you click a folder, such as the `Reports` folder, you will see the objects
    within that folder. Figure 8-4 shows the contents of the `Reports` folder.


    ![A395630_1_En_8_Fig4_HTML.jpg](A395630_1_En_8_Fig4_HTML.jpg)

    Figure 8-4. The `Reports` folder


    Inside each folder, you can store `KPIs`, mobile reports, and paginated reports.
    You will also have folders, usually in the `Home` folder, for data sources and
    the other objects that can be published. Across the top of the folder, you can
    see a path back to the `Home` folder. To run a paginated report, you just have
    to navigate to it and then click it.


    The `Favorites` page is populated specifically by each user. To add a report to
    the `Favorites` page, just click the ellipsis next to the object and click `Add
    to Favorites` as shown in Figure 8-5.


    ![A395630_1_En_8_Fig5_HTML.jpg](A395630_1_En_8_Fig5_HTML.jpg)

    Figure 8-5. Add a report to the `Favorites` page


    To accomplish many of the management tasks in the `web portal`, you will need
    to start with the menu at the top right of the page as shown in Figure 8-6.


    ![A395630_1_En_8_Fig6_HTML.jpg](A395630_1_En_8_Fig6_HTML.jpg)

    Figure 8-6. The menu


    End users just need to know where to find the reports they want to run. They can
    make things more convenient for themselves by utilizing the `Favorites` page.
    `SSRS` developers and administrators need to understand much more. The rest of
    the chapter will cover the tasks that developers and administrators do to provide
    a convenient reporting experience.


    ## Deploying Reports from SSDT


    Reports can be deployed directly from `SSDT` or by uploading directly within the
    `web portal`. When deploying from `SSDT`, any required folders are created as
    well. To get started, follow these steps to configure a project for deployment:


    1.  To view the `SSRS` web services URL (uniform resource locator), open the `Reporting
    Services Configuration Manager`, one of the utilities installed with SQL Server.

    2.  Connect to your instance of `SSRS` as shown in Figure 8-7. If it is not a
    named instance, then the `Report Server Instance` will be `MSSQLSERVICE`.


    ![A395630_1_En_8_Fig7_HTML.jpg](A395630_1_En_8_Fig7_HTML.jpg)

    Figure 8-7. The `Reporting Services Configuration Connection` dialog connecting
    to a named instance


    3.  On the `Reporting Services Configuration Manager`, click `Web Service URL`
    on the menu on the left.

    4.  Record the URL shown in Figure 8-8. This information will be needed in a subsequent
    step.


    ![A395630_1_En_8_Fig8_HTML.jpg](A395630_1_En_8_Fig8_HTML.jpg)

    Figure 8-8. The `web service URL`


    5.  Click `Exit` to close the `Reporting Services Configuration Manager`.

    6.  Launch `SSDT`.

    7.  Open the solution created in Chapter 7 by locating it in the `File` menu under
    `Recent Projects and Solutions`. If you did not follow along in Chapter 7, you
    can find the solution in the Code/Download area of the Apress web site ( [`www.Apress.com`](http://www.Apress.com)
    ) for this book.

    8.  In the `Solution Explorer`, right-click the project name, `Visual Reports`,
    and select `Properties`.

    9.  In the `Deployment` section, you will see several configuration items with
    defaults filled in. If it is not already populated, enter the URL that you recorded
    in step 4 into the `TargetServerURL` property as shown in Figure 8-9.


    ![A395630_1_En_8_Fig9_HTML.jpg](A395630_1_En_8_Fig9_HTML.jpg)

    Figure 8-9. Configure the `TargetServerURL`


    10. Click `OK` to save the change. You may have noticed that the port number automatically
    disappears if it’s at the default of 80.


    Take a look at Figure 8-10. The `OverwriteDatasets` and `OverwriteDataSources`
    properties are set to `False` by default. This prevents you from overwriting data
    sources and datasets that have been deployed. This will come in handy if your
    data sources are pointing to development or test database servers. When you deploy
    a project to production, you won’t overwrite existing data sources with development
    connection strings.


    ![A395630_1_En_8_Fig10_HTML.jpg](A395630_1_En_8_Fig10_HTML.jpg)

    Figure 8-10. The `OverwriteDatasets` and `OverwriteDataSources` properties


    Now that your project is configured, you can deploy the project. Follow these
    steps:


    1.  Right-click the project name and select `Deploy` as shown in Figure 8-11.


    ![A395630_1_En_8_Fig11_HTML.jpg](A395630_1_En_8_Fig11_HTML.jpg)

    Figure 8-11. Deploy the project


    **Note**

    If your `SSRS` installation is local, you may experience permission problems deploying
    the project and viewing the `web portal`. See the section “Configuring Local SSRS
    Settings” in Chapter 1.


    1.  Review the `Output` window to see if the deployment was successful as shown
    in Figure 8-12.


    ![A395630_1_En_8_Fig12_HTML.jpg](A395630_1_En_8_Fig12_HTML.jpg)

    Figure 8-12. The `Output` window


    2.  Now that the project is deployed, you can view the reports in the `web portal`.
    To find the URL to use, go back to `SSRS Configuration Manager`. This time select
    `Web Portal URL`. To open the `web portal`, click the URL as shown in Figure 8-13.


    ![A395630_1_En_8_Fig13_HTML.jpg](A395630_1_En_8_Fig13_HTML.jpg)

    Figure 8-13. The `Report Manager URL`


    The `Visual Reports` folder should now be found in the `Home` folder of the `web
    portal` as shown in Figure 8-14.'
