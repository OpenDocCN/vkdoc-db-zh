    \nFigure 6-33.\n\nThe expanded report\n\nThe main drawback of this method is that\
    \ you can only expand one group at a time. That’s a lot of clicking to display\
    \ all the details. A better solution would be to add parameters to the report\
    \ to control the visibility of the groups. To do this, follow these steps :\n\n\
    1.  In Solution Explorer, create a copy of the Sales by Territory 2 report. Name\
    \ the new report Visibility by Parameters.  \n2.  Add a parameter named DisplayTerritories.\
    \ The Prompt should be Display Territories and the data type should be Boolean.\
