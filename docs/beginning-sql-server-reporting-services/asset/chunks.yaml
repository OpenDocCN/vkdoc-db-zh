    \ Save the file and relaunch the project.\n\nAfter you click OK to accept the\
    \ parameter, preview the report. The new parameter should look like Figure [6-10](#A395630_1_En_6_Chapter.html#Fig10).\n\
    \n![A395630_1_En_6_Fig10_HTML.jpg](A395630_1_En_6_Fig10_HTML.jpg)\n\nFigure 6-10.\n\
    \nThe Territory parameter list\n\nRun the report multiple times selecting different\
