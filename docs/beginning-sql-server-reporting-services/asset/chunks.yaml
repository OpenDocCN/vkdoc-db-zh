- fmt: '## Summary


    With the new Mobile Reports feature available with Enterprise Edition, Microsoft
    has released a product that will deliver data anytime, anywhere, and to many devices.
    Building the reports is easy to do, and interactivity is built in without special
    coding. Report Builder has been around since 2005\. It has improved considerably
    since then as a tool to enable power users to build their own reports and dashboards.
    The new KPIs will also provide information to executives with just a glance and
    a small amount of development time.


    This book is meant for beginners, and there is more to learn. Chapter [11](#A395630_1_En_11_Chapter.html)
    talks about advanced topics you may wish to explore as you gain experience.


    # 11. Where to Go from Here


    Writing a book meant for beginners in any technology has its own special challenges.
    What topics are appropriate and which ones are out of scope? How can enough material
    be included so that the reader gets a good foundation without making the book
    too large and expensive? Within every single chapter, I thought about the questions
    someone new to SQL Server Reporting Services (SSRS) might ask from both a developer
    and an administrator point of view. I tried to explain things in a simple way
    and cover enough to get you started. I didn’t mention some features just to avoid
    adding unneeded complexity. My hope is that this book inspires you to learn more,
    and that it just marks the beginning of your journey.


    As I wrote Chapter [10](#A395630_1_En_10_Chapter.html), I was already thinking
    about what this chapter would cover. I realized that I could break the advanced
    information into five areas: installation, architecture and configuration, development,
    administration, and integration with other reporting tools. In this chapter, without
    going too deep into the details, I will tell you about some advanced features
    in each of these areas.


    ## SSRS Installation


    In Chapter [1](#A395630_1_En_1_Chapter.html), you learned how to install SSRS
    on your own computer in native mode so that you could learn how to deploy and
    manage reports. The chapter did not cover installing SSRS in SharePoint integrated
    mode. Over the past few releases of both SQL Server and SharePoint, installing
    and configuring SSRS in SharePoint mode have become easier, but there are still
    several steps. You also need a SharePoint farm in place, and many beginners will
    not have that available to them.


    There are a couple of advantages when running SSRS in SharePoint integrated mode.
    You can add the development of reports to the workflow functionality built into
    SharePoint. For example, you could require that new reports be approved and that
    there will be an e-mail notification when changes are made. SharePoint also has
    document versions, something that you won’t find with the web portal.


    There are two features that are available with Sharepoint mode but not Native
    mode. One is Power View reports. These reports are intended for end-user ad hoc
    reporting using drag and drop. The reports are based on predefined data models,
    and the person creating the report can explore the data while he or she builds
    the report. The report is very interactive. By clicking a bar in a chart, for
    example, the entire report is filtered. Visualizations are quickly changed to
    different types with just a click. Figure [11-1](#A395630_1_En_11_Chapter.html#Fig1)
    is a picture of a Power View report in design view that I created from a predefined
    data model and about 30 clicks of the mouse. The visualizations reflect actual
    data.


    ![A395630_1_En_11_Fig1_HTML.jpg](A395630_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. A Power View report


    Another feature only available in reports deployed to SharePoint is data alerts.
    Based on criteria defined in the data alert, an e-mail will fire when the data
    of a report changes . This way, the report can be viewed only when there is an
    important change in the data.


    If you like the new web portal but you wish you could customize its look and feel,
    you are in luck. Starting with SSRS 2016, you can take advantage of the custom
    branding feature to tailor the look of the web portal. Figure [11-2](#A395630_1_En_11_Chapter.html#Fig2)
    is an image of an Xbox-branded web portal from the SSRS Team Blog found at [`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/)
    .


    ![A395630_1_En_11_Fig2_HTML.jpg](A395630_1_En_11_Fig2_HTML.jpg)


    Figure 11-2. A custom web portal


    ## Architecture and Configuration


    While you have been learning SSRS, you probably have everything you need installed
    on one computer: a SQL Server instance with a source database and the Reporting
    Services databases, Visual Studio with SQL Server Data Tools (SSDT), and an SSRS
    instance. This is the simplest configuration possible. Most of the time, the developer
    may have only Visual Studio with SSDT installed locally while the SSRS and SQL
    Server instances are hosted on other servers. Even more complex than this is the
    scale-out configuration where the SSRS instance is deployed over two or more servers.
    This configuration allows a larger number of reports to run at any given time.
    Figure [11-3](#A395630_1_En_11_Chapter.html#Fig3) shows how the scaled-out architecture
    looks.


    ![A395630_1_En_11_Fig3_HTML.jpg](A395630_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. The scaled-out architecture


    Even with the typical SSRS deployment, there are several settings that you may
    need to change for your particular situation that are not available through the
    Reporting Services Configuration Manager. Be sure to consult the online documentation
    about settings you may need to configure in the `rsreportserver.config` file found
    in the SQL Server section of Program Files.


    ## Development


    Several chapters of this book were devoted to developing reports. You learned
    about grouping, visualizations, expressions, and more. I once saw a demo where
    a map visualization was used to grow a virtual flower based on a value from a
    database. Obviously, the sky is the limit when it comes to designing reports,
    especially for the more creative among us.


    Almost every property of every object can be controlled dynamically with expressions.
    This book demonstrated how to create a handful of expressions. I encourage you
    to learn about all the functions that were not used in the book. Some developers
    add custom functions or even custom assemblies written in C# to their reports.


    If you are not that comfortable with writing code, another interesting exercise
    is creating a template with your company’s logo, colors, and footer. You create
    the report and then save the rdl file in this folder with a descriptive name:


    ```

    C:\Program Files (x86)\Microsoft Visual Studio 4.0\Common7\IDE\PrivateAssemblies\ProjectItems\ReportProject

    ```


    Then, when you add a new report to a project, the template will be one of the
    choices and will have all the properties defined in the template by default.'
