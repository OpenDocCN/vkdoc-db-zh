  trans: "\n# 6. 使报表动态化\n\n如果你一直跟着之前的演示操作，你应该已经知道如何创建具有多个分组级别的格式美观的报表了。想象一下，在第 5 章中提出报表需求的部门经理，现在希望为每个订单年份单独生成一份报表。或者，他/她可能想改变排序顺序，或者点击某一行来下钻查看详细信息。\n\
    \n在我担任数据库管理员的职业生涯中，我经常为公司的一些部门创建报表，像这样的场景实在太常见了。我很快就学会了提出问题并预想需求者下一步可能会问什么。我很少在不提供选项（例如参数）的情况下创建报表。\n\
    \n在本章中，你将学习如何使报表动态化。这将为你节省时间，并让你看起来像一位 SQL Server Reporting Services (SSRS) 的超级明星！\n\
    \n## 向报表添加参数\n\n报表开发人员最常使用参数来控制报表上显示的数据。你在第 3 章看到过，向数据集中的查询添加参数会自动在报表中创建一个参数。你也可以手动创建参数。无论哪种方式，报表中的许多元素都可以随着用户运行报表而动态变化。\n\
    \n在本节中，你将从一个已完成的报表开始，并添加一个参数来控制显示的数据。请按照以下步骤开始：\n\n1.  启动 SQL Server Data Tools\
    \ (`SSDT`)。\n2.  在名为 `Beginning SSRS Chapter 6` 的解决方案中，创建一个新的名为 `Dynamic Reports`\
    \ 的 SSRS 报表项目。\n3.  创建一个名为 `AdventureWorks2016` 的共享数据源，指向 `AdventureWorks2016`\
    \ 数据库。\n4.  在解决方案资源管理器中右键单击 `Reports` 文件夹，选择 `添加` ➤ `现有项`，如图 6-1 所示。\n    ![A395630_1_En_6_Fig1_HTML.jpg](img/A395630_1_En_6_Fig1_HTML.jpg)\n\
    \    图 6-1. 添加现有报表\n5.  导航到在第 5 章创建的项目中找到的 `Sales by Territory Matrix.rdl` 文件。如果你没有创建该报表，可以使用\
    \ Apress 网站 (`Apress.com`) 的代码/下载区域中的报表文件。\n6.  点击 `添加` 导入报表，如图 6-2 所示。\n    ![A395630_1_En_6_Fig2_HTML.jpg](img/A395630_1_En_6_Fig2_HTML.jpg)\n\
    \    图 6-2. 导入现有报表\n7.  双击报表以在设计视图中打开。\n8.  如果报表上有两个 `Tablix` 控件，请删除表格控件并保留矩阵控件。参考图\
    \ 6-3。\n    ![A395630_1_En_6_Fig3_HTML.jpg](img/A395630_1_En_6_Fig3_HTML.jpg)\n\
    \    图 6-3. 删除表格控件\n9.  预览报表以确保它能运行。\n10. 切换回设计视图。\n11. 在 `报表数据` 窗口中，打开 `SalesByTerritory`\
    \ 数据集的属性。\n12. 将查询更改为\n    ```\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\
    \ SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
    \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) = @Year\n    GROUP BY C.CustomerID, T.TerritoryID,\
    \ T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n13. 点击 `确定` 保存更改。\n\n此查询与原始查询的区别在于\
    \ `WHERE` 子句。该查询现在由 `@Year` 参数进行筛选。向查询添加参数会自动向报表添加一个参数。展开 `报表数据` 窗口中的 `参数` 文件夹。应该可以看到该参数，如图\
    \ 6-4 所示。\n![A395630_1_En_6_Fig4_HTML.jpg](img/A395630_1_En_6_Fig4_HTML.jpg)\n\
    图 6-4. 新参数\n\n现在当你预览报表时，系统会提示你填写年份。尝试输入几个值进行测试。只要你输入一个介于 2011 和 2014 之间的整数，运行报表时就会看到数据。\n\
    \n为了确保运行报表的人提供一个有效的值，你可以提供一个下拉列表供用户选择。\n\n### 硬编码的参数列表\n\n参数列表可以是硬编码的列表，也可以来自数据集的查询结果。按照以下步骤创建年份列表：\n\
    \n1.  右键单击 `Year` 参数并选择 `参数属性`。\n2.  选择 `可用值` 页。\n3.  选择 `指定值`。\n4.  点击 `添加`。\n\
    5.  在 `标签` 和 `值` 中都输入 `2011`。\n6.  为 `2012`、`2013` 和 `2014` 年重复此操作。对话框应如图 6-5\
    \ 所示。\n    ![A395630_1_En_6_Fig5_HTML.jpg](img/A395630_1_En_6_Fig5_HTML.jpg)\n\
    \    图 6-5. 向参数添加值\n7.  点击 `确定`。现在当你预览报表时，将有一个列表可供选择，如图 6-6 所示。\n    ![A395630_1_En_6_Fig6_HTML.jpg](img/A395630_1_En_6_Fig6_HTML.jpg)\n\
    \    图 6-6. 参数列表\n\n参数的 `标签` 属性是最终用户看到的内容；`值` 属性是传递给查询的内容。在本例中，它们是相同的。\n"
- fmt: "# Adding a Parameter List Based on a Query\n\nMost of the time, it makes sense\
    \ to base the parameter list on a query. This will save time since the list will\
    \ not need to be manually maintained as the data changes. A parameter list will\
    \ often be reused, so it makes sense to create a shared dataset instead of an\
    \ embedded dataset. To create a parameter list based on a query, follow these\
    \ steps:\n\n1.  Switch back to design view.\n2.  In the `Solution Explorer`, right-click\
    \ on the `Shared Datasets` folder and select `Add New Dataset`.\n3.  Name the\
    \ dataset `Territory`.\n4.  The `Data Source` property should point to `AdventureWorks2016`.\n\
    5.  Make sure the `Query` type is set to `Text`.\n6.  Set the `Query` to\n\n \
    \   ```sql\n    SELECT TerritoryID, Name AS Territory\n    FROM Sales.SalesTerritory;\n\
    \    ```\n\n7.  The `Shared Dataset Properties` should look like Figure [6-7](#A395630_1_En_6_Chapter.html#Fig7).\
    \ Click `OK`.\n\n    ![A395630_1_En_6_Fig7_HTML.jpg](A395630_1_En_6_Fig7_HTML.jpg)\n\
    \n    Figure 6-7. The `Territory` dataset\n\n8.  Add a new dataset to the report\
    \ named `Territory` by using the `Report Data` window.\n9.  Choose `Use a shared\
    \ dataset`.\n10. Select the `Territory` dataset from the dialog as shown in Figure\
    \ [6-8](#A395630_1_En_6_Chapter.html#Fig8).\n\n    ![A395630_1_En_6_Fig8_HTML.jpg](A395630_1_En_6_Fig8_HTML.jpg)\n\
    \n    Figure 6-8. The `Territory` dataset in the report\n\n11. Click `Ok`.\n12.\
    \ Bring up the properties of the `SalesByTerritory` dataset and change the query\
    \ to\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue)\
    \ AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n    FROM\
    \ sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
    \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
    \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
    \ = @Year AND T.TerritoryID = @Territory\n    GROUP BY C.CustomerID, T.TerritoryID,\
    \ T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\n13. This will filter the dataset\
    \ by both `Year` and `Territory`. Bring up the properties of the `Territory` parameter.\n\
    14. Select the `Available Values` page.\n15. Choose `Get values from a query`.\n\
    16. In the `Dataset` property, select `Territory`.\n17. In the `Value Field` property,\
    \ select `TerritoryID`. This is what is needed in the query.\n18. Select `Territory`\
    \ for the `Label Field` property. This is what the end user will see. The dialog\
    \ box will look like Figure [6-9](#A395630_1_En_6_Chapter.html#Fig9).\n\n    ![A395630_1_En_6_Fig9_HTML.jpg](A395630_1_En_6_Fig9_HTML.jpg)\n\
    \n    Figure 6-9. The `Territory` list properties\n\nNote: `SSDT` was released\
    \ with a bug affecting shared datasets. Microsoft has promised to fix this in\
    \ a later release. To correct the issue until then, close the project and navigate\
    \ to the `Territory.rsd` file. Change `<Dataset>` to `<Dataset Name=\"Territory\"\
    >`. Save the file and relaunch the project.\n\nAfter you click `OK` to accept\
    \ the parameter, preview the report. The new parameter should look like Figure\
    \ [6-10](#A395630_1_En_6_Chapter.html#Fig10).\n\n![A395630_1_En_6_Fig10_HTML.jpg](A395630_1_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. The `Territory` parameter list\n\nRun the report multiple times\
    \ selecting different sets of parameters. You will see how the data displayed\
    \ changes each time.\n\n# Default Parameters\n\nOften, there is a set of parameters\
    \ that are most likely to be chosen. To save the user time, you can add a default\
    \ for each parameter. When launching the report, it will run once with the default\
    \ parameters. The user may then select a different set of parameters and run it\
    \ again if needed. To demonstrate this, follow these steps:\n\n1.  Click `OK`\
    \ to accept the properties.\n2.  Add a default value to the `Territory` parameter\
    \ using the same method.\n3.  Supply the value `7`. The values must come from\
    \ the `TerritoryID` field since that is what is passed to the query.\n4.  Click\
    \ `OK` to accept the properties and preview the report. It should run without\
    \ supplying parameter values and look like Figure [6-12](#A395630_1_En_6_Chapter.html#Fig12).\n\
    \n    ![A395630_1_En_6_Fig12_HTML.jpg](A395630_1_En_6_Fig12_HTML.jpg)\n\n    Figure\
    \ 6-12. The report after running with default parameters\n\n5.  Switch to design\
    \ view.\n6.  Bring up the properties of the `Year` parameter and select the `Default\
    \ Values` page.\n7.  Select `Specify values`.\n8.  Click `Add`.\n9.  Fill in `2012`.\
    \ The dialog should look like Figure [6-11](#A395630_1_En_6_Chapter.html#Fig11).\n\
    \n    ![A395630_1_En_6_Fig11_HTML.jpg](A395630_1_En_6_Fig11_HTML.jpg)\n\n    Figure\
    \ 6-11. The `Default Value` properties\n\n# Multivalued Parameters\n\nSo far,\
    \ you have created parameters that allow the user to select one value from a list.\
    \ It is also possible to create parameters that allow multiple selections. To\
    \ do this, the query must be modified to select a list of values. Instead of `ColumnName\
    \ = @Parameter`, you will use `ColumnName IN (@Parameter)`. Follow these steps\
    \ to create a multivalued parameter:\n\n1.  Switch back to design view.\n2.  Bring\
    \ up the properties of the `Year` parameter.\n3.  On the `General` tab, check\
    \ `Allow multiple values`.\n4.  On the `Default Values` page switch back to `No\
    \ default values`.\n5.  Click `OK` to save the changes.\n6.  Bring up the `SalesByTerritory`\
    \ dataset.\n7.  To enable the expression in the `WHERE` clause to accept a list\
    \ of values, the operator must change from equals (`=`) to `IN`. Change the `Query`\
    \ property to\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\
    \ SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
    \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) IN (@Year) AND T.TerritoryID = @Territory\n    GROUP\
    \ BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\
    \n8.  Run the report. The `Year` parameter should look like Figure [6-13](#A395630_1_En_6_Chapter.html#Fig13).\n\
    \n    ![A395630_1_En_6_Fig13_HTML.jpg](A395630_1_En_6_Fig13_HTML.jpg)\n\n    Figure\
    \ 6-13. The multivalued parameter\n\nYou can now select one or more years. Run\
    \ the report a few times to see how the data changes when you choose different\
    \ sets of parameters."
