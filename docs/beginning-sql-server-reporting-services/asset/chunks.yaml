    \n    ![A395630_1_En_6_Fig9_HTML.jpg](A395630_1_En_6_Fig9_HTML.jpg)\n\n    Figure\
    \ 6-9.\n\n    The Territory list properties  \n\nNote\n\nSSDT was released with\
