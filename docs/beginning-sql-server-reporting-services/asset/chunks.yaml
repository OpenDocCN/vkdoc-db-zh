  trans: "### 列表控件\n\n列表控件的工作方式与表格类似，但它不是使用单元格，而是为每一行数据重复一个自由格式的布局区域。在本节中，你将创建一个使用列表控件的新报告。请按照以下步骤创建报告。\n\
    \n1.  在项目中添加一个名为 `List Report` 的新报告。\n2.  向报告中添加一个名为 `AdventureWorks` 的新数据源，该数据源链接到\
    \ `AdventureWorks2016` 共享数据源。如果此步骤需要帮助，请回顾第 3 章。\n3.  创建一个名为 `ProductList` 的新数据集，指向\
    \ `AdventureWorks` 数据源，并使用以下嵌入式查询：\n\n    ```sql\n    SELECT P.ProductID, P.Name,\
    \ PH.LargePhoto\n    FROM Production.Product AS P\n    JOIN Production.ProductProductPhoto\
    \ AS PP ON P.ProductID = PP.ProductID\n    JOIN Production.ProductPhoto AS PH\
    \ ON PP.ProductPhotoID = PH.ProductPhotoID\n    JOIN Production.ProductSubcategory\
    \ AS SC ON SC.ProductSubcategoryID = P.ProductSubcategoryID\n    JOIN Production.ProductCategory\
    \ AS C ON C.ProductCategoryID = SC.ProductCategoryID\n    WHERE PP.[Primary] =\
    \ 1 AND C.ProductCategoryID IN (1,4);\n    ```\n\n4.  在报告画布上添加一个 `列表` 控件。\n5.\
    \  从 `ProductList` 数据集中，将 `ProductID` 和 `Name` 拖放到列表中。系统会自动创建文本框来容纳这些字段。\n6. \
    \ 将列表的宽度加倍。\n7.  将列表的 `BorderStyle Default` 属性更改为 `Solid`。\n8.  从工具箱中，将一个 `图像`\
    \ 控件拖放到列表中。\n9.  这将打开 `图像属性` 对话框。按照图 4-27 所示设置属性。\n\n    ![A395630_1_En_4_Fig27_HTML.jpg](img/A395630_1_En_4_Fig27_HTML.jpg)\n\
    \    *图 4-27. 图像属性框*\n\n10. 点击 `确定` 接受属性设置。\n11. 调整 `图像` 控件的大小以扩展。\n\n现在，当你预览报告时（如图\
    \ 4-28 所示），你将看到数据库中为每个产品存储的图像。有些产品的图像只显示“无可用图像”。这不是 SSRS 在图像缺失时的功能；它是一张真实的图片。\n\
    \n![A395630_1_En_4_Fig28_HTML.jpg](img/A395630_1_En_4_Fig28_HTML.jpg)\n*图 4-28.\
    \ 列表报告*\n\n## 设置报告属性\n\n在第 2 章中，我向你介绍了打印报告时可能遇到的问题。在某些情况下，报告打印出来会每隔一页是空白页。在本节中，你将看到如何解决这个问题。请按照以下步骤创建一个因过宽而无法打印的报告：\n\
    \n1.  在任何报告的设计视图中，通过右键单击报告画布并选择 `视图` ➤ `标尺` 来启用标尺。\n2.  拖动报告的右侧，使报告宽度大约为 9 英寸（22.5\
    \ 厘米）。\n3.  预览报告。\n4.  切换到打印布局视图。\n5.  逐页滚动浏览报告。\n\n因为报告宽度超过了默认纸张尺寸，所以它会在每个已填充页面之后打印一个空白页。如果控件放置在画布右侧过远的位置，你还会看到报告被分割到多个页面上。要解决此问题，你需要确保报告宽度不超过打印所用的纸张尺寸。\n\
    \n通常，在开发人员处理报告时，添加和删除对象可能会导致画布在不被注意的情况下扩展。第一步是拖动报告右侧以移除任何空白区域。\n\n以下是你可以用来解决报告打印问题的几种方法：\n\
    \n*   将纸张方向从纵向更改为横向。\n*   修改页边距。\n*   更改纸张尺寸。确保这与你用于打印报告的纸张相匹配。\n*   调整列宽。\n\n\
    图 4-29 显示了 `报告属性` 对话框。它可以在 `报告` 菜单中找到。\n\n![A395630_1_En_4_Fig29_HTML.jpg](img/A395630_1_En_4_Fig29_HTML.jpg)\n\
    *图 4-29. 报告属性对话框*\n\n根据经验法则，报告宽度加上左右边距不应超过纸张宽度。\n\n## 总结\n\n在本章中，你学习了如何从空白画布创建报告。你可以向报告添加许多组件，包括页眉和页脚。几乎所有属性的值都可以通过表达式控制，并且你可以向数据集添加计算字段。始终确保报告能适应打印页面非常重要，本章介绍了如何调整报告属性来实现这一点。\n\
    \n在第 5 章中，你将学习如何向报告添加分组级别。\n\n# 5. 向报告添加分组级别\n\n我六岁生日时举办了一个生日派对。我记得我要求了一个巧克力蛋糕配巧克力糖霜、巧克力冰淇淋和巧克力牛奶。我还想要我的蛋糕是多层的婚礼蛋糕。直到多年后我真正的婚礼招待会上，我才得到婚礼蛋糕，而且我确信我妈妈为我六岁生日烤的蛋糕是一个单层的巧克力烤盘蛋糕。\n\
    \n你在第 3 和 4 章中创建的报告，每个表格只显示了一个层级，很像我生日派对上的那个简单蛋糕。在本章中，你将学习如何创建包含多个分组级别的报告，包括矩阵报告。\n\
    \n## 设计你的报告\n\n任何项目，无论大小，最重要的阶段都是设计。在开始构建解决方案之前，你必须知道要尝试完成什么。SQL Server Reporting\
    \ Services (SSRS) 报告本身是一个相对较小的项目，但在启动 SQL Server Data Tools (SSDT) 之前，理解需求并提出设计方案将为你节省时间和减少挫折感。\n\
    \n根据你公司或部门对文档的要求，你最终可能只使用白板或纸张来勾勒设计。对于需要多个分组级别、计算或任何高级功能的报告，花些时间弄清楚报告应该是什么样子。如果你幸运的话，提出报告需求的人会随需求一起提供一个设计布局。\n\
    \n你的公司可能有一个非常正式的新报告请求程序，需求明确。或者，也许一个报告请求可能只是通过一个电话提出。在本章中，你将经历基于一个简单请求构建报告的过程。\n\
    \n### 报告需求\n\n你收到了销售部门经理的报告请求：\n\n“我们需要一个显示按区域和年份的销售情况的报告。”\n\n此时，你可以开始构建报告，但也许你应该在启动\
    \ `SSDT` 之前问一些问题。\n\n我如何确定区域？报告上需要显示哪些字段？你需要看到小计或其他计算吗？报告应该先按区域分组再按年份分组，还是反过来？报告上需要显示的最低详细级别是什么？\n\
    \n在与经理会面时，你了解到以下信息：\n\n*   查询将会被提供。\n*   首先按年份分组，然后在年份内按区域分组。\n*   对于每一年，显示总销售额和跨区域的平均销售额。\n\
    *   对于每个区域，显示区域名称、ID 和总销售额。\n*   作为最低详细信息，显示商店名称、客户 ID 和总销售额。\n*   按总销售额降序对详细信息排序。\n\
    *   按降序对年份排序。\n*   按字母顺序对区域排序。\n\n你现在有了更具体的需求，这些需求可能完整也可能不完整。根据我的经验，提出报告需求的人通常在看到实际的报告后，会对报告上应该包含什么以及如何组织有更好的想法。"
- fmt: "### The Report Layout\n\nNow that you have more details, you can begin to\
    \ mock up the report layout on a white board or paper. You come up with the design\
    \ shown in Figure [5-1](#A395630_1_En_5_Chapter.html#Fig1).\n\n![A395630_1_En_5_Fig1_HTML.jpg](A395630_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. The report layout\n\nThe sales manager approves the layout, and\
    \ you are ready to build the actual report.\n\n## Building a Report with Grouping\
    \ Levels\n\nThis report will have three levels, but it will still be a relatively\
    \ simple report. The skills you learn in this chapter will be easily applied to\
    \ more complex reports.\n\n**Note**\n\nChapter [3](#A395630_1_En_3_Chapter.html)\
    \ covers working with data source and datasets. Chapter [4](#A395630_1_En_4_Chapter.html)\
    \ covers adding controls and how to modify the properties. Refer to those chapters\
    \ if you need step-by-step assistance with these topics.\n\nFollow these steps\
    \ to get started:\n\n1.  Using `SSDT`, create a new report project with the name\
    \ `Grouping Level Reports` in a solution called `Beginning SSRS Chapter` [5](#A395630_1_En_5_Chapter.html).\n\
    2.  Create a shared data source pointing to `AdventureWorks2016` and also named\
    \ `AdventureWorks2016`.\n3.  Add a new report to the project named `Sales by Territory`.\n\
    4.  Add a data source named `AdventureWorks` to the report. The data source should\
    \ point to the `AdventureWorks2016` shared data source.\n5.  Add an embedded dataset\
    \ to the report named `SalesByTerritory` that uses the `AdventureWorks` data source.\
    \ Use this query:\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\
    \ SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n\
    \    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n\
    \    ```\n\n6.  Add a table to the report design canvas.\n7.  Add the `CustomerID`,\
    \ `Store`, and `Sales` fields to the `Data` row.\n\nThe report design should look\
    \ like Figure [5-2](#A395630_1_En_5_Chapter.html#Fig2).\n\n![A395630_1_En_5_Fig2_HTML.jpg](A395630_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2. The report design\n\n### Add a Grouping Level to a Table Row\n\n\
    So far, the detail row is in place. The detail row will be nested inside a grouping\
    \ level which is based on `TerritoryID`. There are two ways to add grouping levels,\
    \ and you will learn both methods. Follow these steps to add a grouping level\
    \ to a table:\n\n1.  `Right-click` any cell in the data row.\n2.  Select `Add\
    \ Group` ➤ `Row Group` ➤ `Parent Group` as shown in Figure [5-3](#A395630_1_En_5_Chapter.html#Fig3).\n\
    \n    ![A395630_1_En_5_Fig3_HTML.jpg](A395630_1_En_5_Fig3_HTML.jpg)\n\n    Figure\
    \ 5-3. Add a parent group\n3.  This brings up the `Tablix group` dialog box. Select\
    \ `TerritoryID` in the `Group by` dropdown box.\n4.  Select `Add group header`.\n\
    5.  The dialog should look like Figure [5-4](#A395630_1_En_5_Chapter.html#Fig4).\n\
    \n    ![A395630_1_En_5_Fig4_HTML.jpg](A395630_1_En_5_Fig4_HTML.jpg)\n\n    Figure\
    \ 5-4. The Tablix group properties\n6.  `Click` `OK`. Figure [5-5](#A395630_1_En_5_Chapter.html#Fig5)\
    \ shows the table with the first grouping level.\n\n    ![A395630_1_En_5_Fig5_HTML.jpg](A395630_1_En_5_Fig5_HTML.jpg)\n\
    \n    Figure 5-5. The first group added to table\n\nIn this figure, the `Sales`\
    \ data cell is selected. Notice that an orange bracket on the left of the `CustomerID`\
    \ cell is visible. This indicates the grouping level of the selected cell. In\
    \ this case, it is the detail level. `Click` one of the empty cells. Now the bracket\
    \ can be found on the `TerritoryID` cell as shown in Figure [5-6](#A395630_1_En_5_Chapter.html#Fig6).\n\
    \n![A395630_1_En_5_Fig6_HTML.jpg](A395630_1_En_5_Fig6_HTML.jpg)\n\nFigure 5-6.\
    \ The bracket is located on TerritoryID\n\nThis means that the cells in the middle\
    \ row belong to the `TerritoryID` group. Add the `Sales` field to the empty cell\
    \ on the right. Because this is a grouping level outside the details, the field\
    \ is automatically summed as shown in Figure [5-7](#A395630_1_En_5_Chapter.html#Fig7).\n\
    \n![A395630_1_En_5_Fig7_HTML.jpg](A395630_1_En_5_Fig7_HTML.jpg)\n\nFigure 5-7.\
    \ Sales is automatically summed\n\nIn the `CustomerID` column, add the `Territory`\
    \ field to the empty cell. The placeholder doesn’t show it, but it is the first\
    \ value found in the group. Since there is one `Territory` for each `TerritoryID`,\
    \ this expression will work. `Preview` the report; it should look like Figure\
    \ [5-8](#A395630_1_En_5_Chapter.html#Fig8) at this point.\n\n![A395630_1_En_5_Fig8_HTML.jpg](A395630_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8. The report preview\n\n### Add a Grouping Level to the Grouping Window\n\
    \nThe grouping window at the bottom of the report provides another way to add\
    \ and configure grouping levels. `Column Groups`, on the right, are used for matrix\
    \ reports. You’ll learn about matrix reports in the section “Building a Matrix\
    \ Report” later in this chapter.\n\nAt this point, you should see the `TerritoryID`\
    \ row group in the window after switching back to design view. To add the next\
    \ grouping level, follow these steps:\n\n1.  If the `Grouping` window is not visible\
    \ below the report canvas, `Right-click` the report and select `View` ➤ `Grouping`.\n\
    2.  In the `Row Groups` window, `click` the down arrow next to `TerritoryID`.\n\
    3.  Select `Add Group` ➤ `Parent Group` as shown in Figure [5-9](#A395630_1_En_5_Chapter.html#Fig9).\n\
    \n    ![A395630_1_En_5_Fig9_HTML.jpg](A395630_1_En_5_Fig9_HTML.jpg)\n\n    Figure\
    \ 5-9. Add a Parent Group\n4.  Select `OrderYear` for the `Group by` property\
    \ in the `Tablix Group` dialog.\n5.  `Check` `Add group header`.\n6.  `Click`\
    \ `OK`. The `Row Groups` section will now look like Figure [5-10](#A395630_1_En_5_Chapter.html#Fig10).\n\
    \n    ![A395630_1_En_5_Fig10_HTML.jpg](A395630_1_En_5_Fig10_HTML.jpg)\n\n    Figure\
    \ 5-10. The row groups\n7.  In the empty cell in the `Sales` column, add `Sales`.\
    \ This will be the total for the year.\n8.  In the empty cell in the `Store` column\
    \ and second row, create an expression with the following formula: `=Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)`.\
    \ This will give the average sales over the territories, in other words, the average\
    \ of the sum.\n\nThe report design should look like Figure [5-11](#A395630_1_En_5_Chapter.html#Fig11).\n\
    \n![A395630_1_En_5_Fig11_HTML.jpg](A395630_1_En_5_Fig11_HTML.jpg)\n\nFigure 5-11.\
    \ The report design\n\nWhen you `preview` the report, you will see that there\
    \ is some cleanup to do. The report looks like Figure [5-12](#A395630_1_En_5_Chapter.html#Fig12)\
    \ at this point.\n\n![A395630_1_En_5_Fig12_HTML.jpg](A395630_1_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12. The report in preview mode"
