- fmt: "# 6. Making Reports Dynamic\n\nIf you have been following along with the demonstrations\
    \ so far, you know how to create a nice formatted report with multiple grouping\
    \ levels. Imagine that the department manager who requested reports in Chapter\
    \ 5 would now like a separate report for each Order Year. Or maybe he or she would\
    \ like to change the sort order or click a row to drill down to details.\n\nIn\
    \ my career as a database administrator, I often created reports for some of the\
    \ departments in the firm, and scenarios like this were all too common. I quickly\
    \ learned to ask questions and anticipate what the requester might ask for next.\
    \ I rarely created a report without providing options such as parameters.\n\n\
    In this chapter, you will learn how to make reports dynamic. It will save you\
    \ time and make you look like a SQL Server Reporting Services (SSRS) rock star!\n\
    \n## Adding Parameters to Report\n\nReport developers most commonly use parameters\
    \ to control the data that displays on the report. You saw in Chapter 3 that adding\
    \ a parameter to the query in the dataset will automatically create a parameter\
    \ in the report. You can also create parameters manually. In either case, there\
    \ are a number of elements of the report that can change dynamically as the user\
    \ runs the report.\n\nIn this section, you will start with a completed report\
    \ and add a parameter to control the data displayed. To get started, follow these\
    \ steps:\n\n1.  Launch SQL Server Data Tools (`SSDT`).\n2.  Create a new SSRS\
    \ report project named `Dynamic Reports` in a solution named `Beginning SSRS Chapter\
    \ 6`.\n3.  Create a shared data source named `AdventureWorks2016` pointing to\
    \ the `AdventureWorks2016` database.\n4.  Right-click the `Reports` folder in\
    \ the `Solution Explorer` and select `Add` ➤ `Existing Item` as shown in Figure\
    \ 6-1.\n    ![A395630_1_En_6_Fig1_HTML.jpg](A395630_1_En_6_Fig1_HTML.jpg)\n  \
    \  Figure 6-1. Adding an existing report\n5.  Navigate to the `Sales by Territory\
    \ Matrix.rdl` file found in the project created in Chapter 5. If you did not create\
    \ the report, you can use the report from the Code/Download area of the Apress\
    \ web site (`Apress.com`).\n6.  Click `Add` to import the report as shown in Figure\
    \ 6-2.\n    ![A395630_1_En_6_Fig2_HTML.jpg](A395630_1_En_6_Fig2_HTML.jpg)\n  \
    \  Figure 6-2. Importing the existing report\n7.  Double-click the report to open\
    \ it in design view.\n8.  If there are two `Tablix` controls on the report, remove\
    \ the table control and keep the matrix. Use Figure 6-3 as a guide.\n    ![A395630_1_En_6_Fig3_HTML.jpg](A395630_1_En_6_Fig3_HTML.jpg)\n\
    \    Figure 6-3. Remove the table control\n9.  Preview the report to make sure\
    \ it runs.\n10. Switch back to design view.\n11. In the `Report Data` window,\
    \ open the properties of the `SalesByTerritory` dataset.\n12. Change the query\
    \ to\n    ```\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue)\
    \ AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n    FROM\
    \ sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
    \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
    \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
    \ = @Year\n    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate),\
    \ S.Name;\n    ```\n13. Click `OK` to save the change.\n\nThe difference between\
    \ this query and the original is the `WHERE` clause. The query is now filtered\
    \ by a `@Year` parameter. Adding a parameter to the query automatically adds a\
    \ parameter to the report. Expand the `Parameters` folder in the `Report Data`\
    \ window. The parameter should be visible as shown in Figure 6-4.\n![A395630_1_En_6_Fig4_HTML.jpg](A395630_1_En_6_Fig4_HTML.jpg)\n\
    Figure 6-4. The new parameter\n\nNow when you preview the report, you will be\
    \ prompted to fill in a year. Try it out by entering several values. As long as\
    \ you enter a whole number between 2011 and 2014, you will see data when you run\
    \ the report.\n\nTo make sure that the person running the report supplies a valid\
    \ value, you can provide a dropdown list from which the user can choose.\n\n###\
    \ The Hard-Coded Parameter List\n\nThe parameter list can be a hard-coded list\
    \ or from the results of a dataset. Follow these steps to create a list of years:\n\
    \n1.  Right-click the `Year` parameter and select `Parameter Properties`.\n2.\
    \  Select the `Available Values` page.\n3.  Select `Specify values`.\n4.  Click\
    \ `Add`.\n5.  Type in `2011` for both the `Label` and the `Value`.\n6.  Repeat\
    \ for years `2012`, `2013`, and `2014`. The dialog box should look like Figure\
    \ 6-5.\n    ![A395630_1_En_6_Fig5_HTML.jpg](A395630_1_En_6_Fig5_HTML.jpg)\n  \
    \  Figure 6-5. Adding values to a parameter\n7.  Click `OK`. Now when you preview\
    \ the report, you will have a list to select from as shown in Figure 6-6.\n  \
    \  ![A395630_1_En_6_Fig6_HTML.jpg](A395630_1_En_6_Fig6_HTML.jpg)\n    Figure 6-6.\
    \ The parameter list\n\nThe `Label` property of the parameter is what the end\
    \ user sees; the `Value` property is what is passed to the query. In this case,\
    \ they are the same."
