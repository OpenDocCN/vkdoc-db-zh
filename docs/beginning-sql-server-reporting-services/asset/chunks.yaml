- fmt: "![A395630_1_En_8_Fig14_HTML.jpg](A395630_1_En_8_Fig14_HTML.jpg)\nFigure 8-14.\n\
    \nThe new folder Note\n\nAt the time of the SQL Server 2016 release, the web portal\
    \ would sometimes fail to run after a restart of the server. If you see a Service\
    \ Unavailable error, you should stop and start the service by using the `Reporting\
    \ Services Configuration Manager`.\n\nIf you click the `Visual Reports` folder,\
    \ you will see all the reports you created in Chapter [7](#A395630_1_En_7_Chapter.html).\
    \ You can click a report to view it. Any parameters will be shown across the top.\
    \ Figure [8-15](#A395630_1_En_8_Chapter.html#Fig15) shows the Charts report.\n\
    \n![A395630_1_En_8_Fig15_HTML.jpg](A395630_1_En_8_Fig15_HTML.jpg)\nFigure 8-15.\n\
    \nThe Charts report\n\nIf there is a reason to deploy an individual report, dataset,\
    \ or data source, you can just right-click the object from the Solution Browser\
    \ in `SSDT` and select `Deploy`.\n\nJust as from `SSDT`, you can print or export\
    \ the report. Older versions of `SSRS` used an ActiveX control for printing which\
    \ caused many compatibility problems with modern web browsers. Currently the printer\
    \ icon allows you to save the report as a PDF which can then be printed. The save\
    \ icon allows you to export the report in several formats including PowerPoint.\n\
    \n## Uploading Reports\n\nInstead of deploying from `SSDT`, you can also publish\
    \ a report by uploading to the web portal. Follow these steps to upload a report:\n\
    \n1.  Launch the web portal.\n2.  While in the Home folder, create a new folder\
    \ by clicking `New` ➤ `Folder` as shown in Figure [8-16](#A395630_1_En_8_Chapter.html#Fig16).\n\
    \    ![A395630_1_En_8_Fig16_HTML.jpg](A395630_1_En_8_Fig16_HTML.jpg)\n    Figure\
    \ 8-16.\n    Create a new folder.\n3.  Name the folder `Upload Example` and click\
    \ `Create`.\n4.  Once the folder is created, click it to open it.\n5.  Click `Upload`\
    \ and navigate to a report. The report files have the extension `rdl` and are\
    \ found in the project folders as shown in Figure [8-17](#A395630_1_En_8_Chapter.html#Fig17).\n\
    \    ![A395630_1_En_8_Fig17_HTML.jpg](A395630_1_En_8_Fig17_HTML.jpg)\n    Figure\
    \ 8-17.\n    Navigate to a report.\n6.  Once you select a report, click `Open`.\n\
    7.  You should now see the report in the folder. Click the report to view it.\n\
    \nInstead of opening the report, you will see an error message as shown in Figure\
    \ [8-18](#A395630_1_En_8_Chapter.html#Fig18).\n\n![A395630_1_En_8_Fig18_HTML.jpg](A395630_1_En_8_Fig18_HTML.jpg)\n\
    Figure 8-18.\nThe error message\n\nWhen you upload a report, it is not automatically\
    \ linked to the data source. You can easily correct this by following these steps:\n\
    \n1.  Click `Upload Example` in the path to navigate away from the error message.\n\
    2.  Click the ellipsis next to the report name and select `Manage`.\n3.  This\
    \ opens a page with many options. Select `Data Sources`. You will see a message\
    \ about the data source error.\n4.  Click the ellipsis under `Connect to` as shown\
    \ in Figure [8-19](#A395630_1_En_8_Chapter.html#Fig19).\n    ![A395630_1_En_8_Fig19_HTML.jpg](A395630_1_En_8_Fig19_HTML.jpg)\n\
    \    Figure 8-19.\n    The data sources properties.\n5.  This opens up a window\
    \ at the Home folder. Click `Data Sources`.\n6.  Select the `AdventureWorks2016`\
    \ data sources as shown in Figure [8-20](#A395630_1_En_8_Chapter.html#Fig20).\n\
    \    ![A395630_1_En_8_Fig20_HTML.jpg](A395630_1_En_8_Fig20_HTML.jpg)\n    Figure\
    \ 8-20.\n    The Data sources folder.\n7.  You should now see the correctly mapped\
    \ data source as shown in Figure [8-21](#A395630_1_En_8_Chapter.html#Fig21).\n\
    \    ![A395630_1_En_8_Fig21_HTML.jpg](A395630_1_En_8_Fig21_HTML.jpg)\n    Figure\
    \ 8-21.\n    The corrected data source.\n8.  Click `Save`.\n9.  Navigate back\
    \ to the `Upload Example` folder and try running the report. It should now run\
    \ as expected.\n\nObviously, it is easier to deploy from `SSDT`, but this information\
    \ will be helpful if you do ever need to upload an individual report.\n\n## Creating\
    \ Data Sources\n\nThe `AdventureWorks2016` data source was created automatically\
    \ when the project was deployed. You can also create data sources manually through\
    \ the web portal. Follow these steps to create a data source:\n\n1.  Launch the\
    \ web portal.\n2.  Click the `Data Sources` folder.\n3.  Click the ellipsis next\
    \ to `AdventureWorks2016` and then click `Manage` to open the properties.\n4.\
    \  Select the `Connection String` property and copy it to the clipboard as shown\
    \ in Figure [8-22](#A395630_1_En_8_Chapter.html#Fig22).\n    ![A395630_1_En_8_Fig22_HTML.jpg](A395630_1_En_8_Fig22_HTML.jpg)\n\
    \    Figure 8-22.\n    The Connection string property.\n5.  Scroll down and click\
    \ `Cancel` to close the properties.\n6.  Click `New` ➤ `Data Source` to open the\
    \ New Data Source page.\n7.  Fill in `TestDataSource` for the Name.\n8.  Paste\
    \ the previously copied connection string into the `Connection string` property.\n\
    9.  Scroll down and click `Test Connection`.\n10. Click `Create`.\n11. You should\
    \ now see both data sources in the folder.\n\nWhile you may not need to create\
    \ many data sources through this interface, you will need to use it to manage\
    \ data sources. Whenever a database is moving to a new server, you will make the\
    \ change here for the reports. In Chapter [9](#A395630_1_En_9_Chapter.html), you\
    \ will learn about the Credentials section of the data source properties.\n\n\
    ## Deploying Report Parts\n\nIn addition to data sources, datasets, and reports,\
    \ you can also deploy report parts. Report parts are the objects that make up\
    \ reports such as charts, tables, and gauges. The published report parts can then\
    \ be used with the `Report Builder` tool that will be covered in Chapter [10](#A395630_1_En_10_Chapter.html).\n\
    \nTo publish an object on a report, you must mark individual items for publishing.\
    \ Follow these steps to deploy the parts of a report:\n\n1.  If it’s not already\
    \ open, launch `SSDT` and the project from Chapter [7](#A395630_1_En_7_Chapter.html).\n\
    2.  From the Solution Explorer, double-click the Charts report to open it in design\
    \ view.\n3.  If the Report menu is not visible, click the design canvas of the\
    \ report.\n4.  Select `Report` ➤ `Publish Report Parts` which opens a dialog box\
    \ showing the objects that can be published as shown in Figure [8-23](#A395630_1_En_8_Chapter.html#Fig23).\n\
    \    ![A395630_1_En_8_Fig23_HTML.jpg](A395630_1_En_8_Fig23_HTML.jpg)\n    Figure\
    \ 8-23.\n    The Publish Report Parts dialog.\n5.  Check `Report Parts` to select\
    \ each item.\n6.  Click the arrow next to the first chart. This allows you to\
    \ see a picture of the chart and also fill in a description.\n7.  Each item has\
    \ the default name which will not be helpful in the web portal. Change the name\
    \ of each to match Figure [8-24](#A395630_1_En_8_Chapter.html#Fig24).\n    ![A395630_1_En_8_Fig24_HTML.jpg](A395630_1_En_8_Fig24_HTML.jpg)\n\
    \    Figure 8-24.\n    New names for each chart.\n8.  Click `OK`.\n9.  In Solution\
    \ Explorer, right-click the Charts report and deploy it.\n10. Open the web portal.\n\
    11. Navigate to the Home folder.\n12. You should see a new `Report Parts` folder.\n\
    13. Click the folder to see the published report parts as shown in Figure [8-25](#A395630_1_En_8_Chapter.html#Fig25).\
    \ You will use them in Chapter [10](#A395630_1_En_10_Chapter.html).\n    ![A395630_1_En_8_Fig25_HTML.jpg](A395630_1_En_8_Fig25_HTML.jpg)\n\
    \    Figure 8-25.\n    The Report Parts folder."
