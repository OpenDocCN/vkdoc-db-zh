- fmt: "## Creating KPIs\n\nIn previous versions of SSRS, you have been able to add\
    \ KPIs, or key performance indicators, to reports. Starting with 2008 R2, you\
    \ could add the `Indicator` control to a `Tablix` cell. Before that, you could\
    \ use expressions to dynamically control the color of a cell or to display an\
    \ image to accomplish the same thing with a bit more work. SSRS 2016 gives you\
    \ the ability to create and display independent KPIs within the `web portal`.\
    \ These KPIs can give immediate information about goals and important metrics\
    \ at a glance without running a report. They depend on having `shared datasets`\
    \ in place.\n\nKPIs can be very simple or quite complex depending on the properties\
    \ you define. You can display just a number, compare a value to a goal, display\
    \ a status, display a trend, or display some combination of these.\n\n### Creating\
    \ the KPI Dataset\n\nFollow these steps to create a dataset that will be used\
    \ in a KPI:\n\n1.  In the `web portal`, navigate to the `Datasets` folder.\n2.\
    \  Click `New` ➤ `Dataset` which will launch `Report Builder`. If you see a warning\
    \ about running the program, click `Allow`. `Report Builder` will open ready to\
    \ create the dataset.\n3.  On the `Choose a data source connection or model to\
    \ create a shared dataset` page, select the `AdventureWorks2016` data source if\
    \ it is visible in the dialog.\n4.  If you do not see the data source you are\
    \ looking for, click `Browse other data sources` and navigate to the `Data Sources`\
    \ folder to find it as shown in Figure 10-19.\n\n    ![A395630_1_En_10_Fig19_HTML.jpg](A395630_1_En_10_Fig19_HTML.jpg)\n\
    \n    *Figure 10-19. Choose or locate a data source*\n\n5.  Click `Create`.\n\
    6.  This opens the `Query Designer` where you can build a query by selecting tables\
    \ and columns as shown in Figure 10-20.\n\n    ![A395630_1_En_10_Fig20_HTML.jpg](A395630_1_En_10_Fig20_HTML.jpg)\n\
    \n    *Figure 10-20. The Query Designer*\n\n7.  In this case, you will paste in\
    \ a query. Click `Edit as Text` shown in Figure 10-21 to switch from a visual\
    \ query builder to a text-based query designer window.\n\n    ![A395630_1_En_10_Fig21_HTML.jpg](A395630_1_En_10_Fig21_HTML.jpg)\n\
    \n    *Figure 10-21. Click Edit as Text*\n\n8.  Paste in the following query:\n\
    \n    ```sql\n    WITH\n    Sales AS (\n    SELECT SUM(TotalDue) AS Sales, MONTH(OrderDate)\
    \ AS OrderMonth,\n    YEAR(OrderDate) AS OrderYear,\n    LAG(SUM(TotalDue),12)\
    \ OVER(ORDER BY YEAR(OrderDate),\n    MONTH(OrderDate)) * 1.10 AS Quota\n    FROM\
    \ Sales.SalesOrderHeader\n    GROUP BY MONTH(OrderDate), YEAR(OrderDate)\n   \
    \ ),\n    Comparison AS (\n    SELECT OrderYear, Sales, OrderMonth, Quota,SUM(Sales)\n\
    \    OVER(PARTITION BY OrderYear)/SUM(Quota)\n    OVER(PARTITION BY OrderYear)\
    \ AS PercentOfGoal\n    FROM Sales)\n    SELECT Sales, OrderMonth, Quota,\n  \
    \  CASE WHEN PercentOfGoal >= .98 THEN 1\n    WHEN PercentOfGoal > .9 THEN 0\n\
    \    ELSE -1 END AS Status\n    FROM Comparison\n    WHERE OrderYear = 2014;\n\
    \    ```\n\n9.  Run the query by clicking the exclamation point icon. The results\
    \ should look like Figure 10-22.\n\n    ![A395630_1_En_10_Fig22_HTML.jpg](A395630_1_En_10_Fig22_HTML.jpg)\n\
    \n    *Figure 10-22. The query results*\n\n10. From the `File` menu, click `Save`.\n\
    11. Once the `Save as Dataset` dialog opens, navigate to the `Datasets` folder.\n\
    12. Name the dataset `2014 Sales` and click `OK`.\n13. Close `Report Builder`.\n\
    \n### Creating the KPI\n\nNow that the dataset is published to the `web portal`,\
    \ you can create a KPI that uses it. One very interesting aspect of the KPI design\
    \ page is that you can design how the KPI will look before you connect the data.\
    \ In fact, when you initially create a KPI, it will be populated with a random\
    \ value and a visualization. Follow these steps to create the new KPI:\n\n1. \
    \ Navigate to the `Ad Hoc Reports` folder or create it if you did not follow along\
    \ with the section “Using Report Builder.”\n2.  Click `New` ➤ `KPI` from the menu.\n\
    3.  This opens a page shown in Figure 10-23 where you can see all the properties\
    \ of the KPI including random values already populating it.\n\n    ![A395630_1_En_10_Fig23_HTML.jpg](A395630_1_En_10_Fig23_HTML.jpg)\n\
    \n    *Figure 10-23. The KPI design page*\n\n4.  Change the `KPI Name` to `2014\
    \ Sales`.\n5.  Change the `Value format` to `Abbreviated currency`.\n6.  Change\
    \ the `Value` setting to `Dataset field`.\n7.  Click the ellipsis under `Pick\
    \ dataset field` as shown in Figure 10-24.\n\n    ![A395630_1_En_10_Fig24_HTML.jpg](A395630_1_En_10_Fig24_HTML.jpg)\n\
    \n    *Figure 10-24. Click the ellipsis*\n\n8.  This opens the `Pick a Dataset`\
    \ dialog. Navigate to the `Datasets` folder.\n9.  Select the `2014 Sales` dataset\
    \ as shown in Figure 10-25.\n\n    ![A395630_1_En_10_Fig25_HTML.jpg](A395630_1_En_10_Fig25_HTML.jpg)\n\
    \n    *Figure 10-25. Select the Sales dataset*\n\n10. This opens a dialog that\
    \ allows you to select the field and aggregation. Select `Sum` for the `Aggregation`.\n\
    11. Select `Sales` as the field as shown in Figure 10-26.\n\n    ![A395630_1_En_10_Fig26_HTML.jpg](A395630_1_En_10_Fig26_HTML.jpg)\n\
    \n    *Figure 10-26. The value properties*\n\n12. Click `OK`.\n13. Follow the\
    \ same procedure to populate the `Goal`. Select the `Quota` field and the `Sum`\
    \ aggregation.\n14. Use the same dataset for the `Status`. Select the `First`\
    \ aggregation and the `Status` field.\n15. Use the same dataset for the `Trend\
    \ Set`. In this case, there is no aggregation. Select the `Sales` field.\n16.\
    \ Select the `Bar` Visualization if it is not already selected. The properties\
    \ should look like Figure 10-27.\n\n    ![A395630_1_En_10_Fig27_HTML.jpg](A395630_1_En_10_Fig27_HTML.jpg)\n\
    \n    *Figure 10-27. The KPI properties*\n\n17. Click `Create` at the bottom of\
    \ the screen.\n\nNow when you navigate to the `Ad Hoc Reports` folder, you should\
    \ see the new KPI as shown in Figure 10-28. The sales for 2014 are $22.4 million,\
    \ and that is 3% under the quota. You can also see the trend over the months in\
    \ the small chart.\n\n![A395630_1_En_10_Fig28_HTML.jpg](A395630_1_En_10_Fig28_HTML.jpg)\n\
    \n*Figure 10-28. The new KPI*\n\n### Adding Related Content\n\nKPIs can be linked\
    \ to other reports or web pages. Go back to the editor by clicking the ellipsis\
    \ inside the rectangle and selecting `Manage`. To add a link to a paginated report,\
    \ select `Custom URL` for the `Related content` property found at the bottom of\
    \ the editor. Paste in the URL copied from one of your reports as shown in Figure\
    \ 10-29. You can also add a link to a mobile report by selecting `Mobile Report`.\
    \ In this case, you will browse to the report to fill in the URL.\n\n![A395630_1_En_10_Fig29_HTML.jpg](A395630_1_En_10_Fig29_HTML.jpg)\n\
    \n*Figure 10-29. The Related content properties*\n\nIf `Related content` is populated,\
    \ the link will be visible when clicking the KPI as shown in Figure 10-30.\n\n\
    ![A395630_1_En_10_Fig30_HTML.jpg](A395630_1_En_10_Fig30_HTML.jpg)\n\n*Figure 10-30.\
    \ The Related content link*"
