  trans: '# 管理


    在第 8 章和第 9 章中，你学习了如何部署报表和控制安全性。你还学习了如何设置订阅。已部署报表有一些属性你尚未了解，例如缓存和快照。


    ## 缓存


    缓存是一项用于保存和重复使用报表的功能，适用于数据不常变化的情况，以提升性能。例如，想象一下有多人将要运行基于上月销售数据的报表。数据不会变化，因此你可以利用缓存来保存该报表，以便在第二次及后续运行时能快速执行。


    我曾参与一个项目，该项目需要比较从旧系统迁移的数据与来自新系统的数据。业务分析师会从报表的多个参数中选择数值，然后在报表之间来回切换，进行数据钻取并以不同方式查看数据。有些必要的查询执行起来极其缓慢，我们对此无能为力。分析师们花在等待上的时间比实际查看数据的时间还要长。由于数据变化并不频繁，我设置了缓存，并设定了
    30 分钟的过期时间。分析师们只需要在给定参数集的第一次运行时忍受一次缓慢的查询。这使得解决方案变得可行，分析师们也能够完成他们的工作。图 11-4 展示了缓存功能。


    ![A395630_1_En_11_Fig4_HTML.jpg](img/A395630_1_En_11_Fig4_HTML.jpg)


    图 11-4. 缓存功能


    ## 历史快照


    另一个有趣的功能是历史快照。历史快照与订阅类似，必须定义默认参数值，并且数据源必须存储凭据。你可以手动创建快照，也可以设置计划。无论哪种方式，你都可以稍后返回查看快照，报表将显示快照拍摄时的数据状态。


    # 集成


    自从引入`SSRS`以来，就一直存在一个报表管理器，现在则有一个用于托管报表的 Web 门户。最终，还增加了与 SharePoint 的集成。开发人员已通过报表查看器控件将报表嵌入到应用程序中。你也可以使用特殊
    URL（`统一资源定位符`）在 Web 门户之外显示报表。如果你在 Web 门户中报表的 URL 末尾添加`rs:Embed=true`，它将在浏览器中显示，而不带
    Web 门户的标题和菜单。


    你可能没有注意到的一个图标（如图 11-5 所示，位于报表菜单中）允许你导出数据提要。该数据提要可用作`Power Pivot`（`Excel`的高级功能）的数据源。`Power
    Pivot`可用于合并来自一个或多个来源的大量数据。生成的工作簿可用作`Power View`报表的基础。`SSRS`不仅是查看数据的一种方式，它还可以作为另一个报表工具的数据来源。


    ![A395630_1_En_11_Fig5_HTML.jpg](img/A395630_1_En_11_Fig5_HTML.jpg)


    图 11-5. 导出到数据提要图标


    `SSRS`是微软的几种报表工具之一，其中包括历史悠久的`Excel`和新的云端解决方案`Power BI`。`SSRS`被视为本地报表解决方案，尤其适用于分页报表。然而，随着
    2016 版`SSRS`的发布，`SSRS`已无边界。`SSRS`与云解决方案`Power BI`和 SharePoint Web 集成，并且你已经看到了可以传输到移动设备的新型移动报表。过去几年，有些人曾预测`SSRS`将消亡。随着
    2016 年的改版，`SSRS`依然充满活力，并为未来做好了准备。


    # 总结


    `SQL Server Reporting Services`是一个非常值得学习的主题。许多人以报表开发人员的身份开启其信息技术（`IT`）生涯。对于许多职业（无论是`IT`还是其他领域），报表开发被视为一项理想的技能。我经常与从事非`IT`角色（如人力资源）的人交流，他们为了工作需要学习`T-SQL`和`SSRS`。在我曾经工作的`IT`部门，我曾被要求为我们的服务台工单系统和网络管理工具创建报表。即使在`IT`内部，我们也需要查看来自自身系统的数据。


    本书是对流行的报表工具`SQL Server Reporting Services`的入门介绍。本章回顾了一些高级主题，你可以将其视为下一步学习的内容。我希望你喜欢学习`SSRS`。我当然也很享受撰写它的过程！'
