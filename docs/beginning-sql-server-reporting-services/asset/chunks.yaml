    ## Acknowledgments


    Once again, I have placed my words inside a book. For me, writing really is a
    labor of love. The best thing in the world is to be approached at a conference
    by someone who has read one of my books and learned a new skill because of it.
    This book is for all of you out there who have thanked me for writing, letting
    me know that I have made a difference in your career if not your life.


    Of course, I must thank my husband and family for putting up with me saying so
    often, “I can’t—I need to work on my book.” I hope I have managed to be there
    for you when you really needed me.


    Thanks to Rodney, Jonathan, and Jill for helping me to get the book to completion
    in great shape. Thanks to Microsoft for giving SQL Server Reporting Services the
    love it deserves in the 2016 release.


    And, thank you to everyone who reads this book. I hope you enjoy working with
    `SSRS` as much as I have over the years.'
