  trans: "\n## 配置站点安全\n\nSSRS 安全性基于角色。角色具有某些预定义的权限。将帐户或组添加到角色即可让该帐户或组拥有该角色所定义的权限。安全性的某些方面可以在站点级别配置，而其他方面则基于位置或对象。在本节中，你将了解站点安全性。\n\
    \n注意\n\n对于这些示例，我将使用在独立 Windows Server 2012 R2 上创建的几个 Windows 帐户。在你的环境中，你可能在域内运行，或者在运行多种最终用户版本\
    \ Windows 的独立笔记本电脑上运行。由于存在多种可能的变化，我不会逐步指导你创建这些帐户。\n\n我已经创建了一个信息技术（IT）组，并将以下本地\
    \ Windows 帐户添加到我的服务器上的该组中：\n- `CIO`\n- `Director`\n- `Manager`\n- `TeamLeader`\n\
    - `TeamMember`\n\n在 Web 门户的站点级别，有两个可能的角色：`System Administrator`（系统管理员）和 `System\
    \ User`（系统用户）。任何属于 `System Administrator` 角色的帐户或组成员都拥有对站点的完全控制权，包括控制安全性。对于将要使用\
    \ `Report Builder`（报表生成器）的任何人，`System User` 属性都很重要，你将在第 10 章中了解相关内容。要将帐户添加到站点级别的角色，请按照以下步骤操作：\n\
    1.  启动 Web 门户。\n2.  单击齿轮图标并选择 `Site Settings`（站点设置），如图 9-10 所示。\n    ![A395630_1_En_9_Fig10_HTML.jpg](img/A395630_1_En_9_Fig10_HTML.jpg)\n\
    \    图 9-10. 选择 `Site settings`（站点设置）\n3.  这将打开站点属性。单击 `Security`（安全性）。\n4.  单击\
    \ `Add group or user`（添加组或用户），如图 9-11 所示。\n    ![A395630_1_En_9_Fig11_HTML.jpg](img/A395630_1_En_9_Fig11_HTML.jpg)\n\
    \    图 9-11. 单击 `Add group or user`（添加组或用户）\n5.  对于 `Group or user`（组或用户），输入 `CIO`。\n\
    6.  选择 `System Administrator`（系统管理员），如图 9-12 所示。\n    ![A395630_1_En_9_Fig12_HTML.jpg](img/A395630_1_En_9_Fig12_HTML.jpg)\n\
    \    图 9-12. 添加帐户\n7.  单击 `OK`（确定）以创建角色成员身份。\n8.  重复该过程，将 `Manager` 帐户添加到 `System\
    \ User`（系统用户）角色。\n\n你还可以在此页面上从站点级别的角色中移除帐户。\n\n## 配置文件夹和报表安全性\n\n在公司中发布第一份报表之前，你应该规划\
    \ Web 门户内的文件夹结构，以简化安全管理。最终用户只能查看他们有权查看的那些文件夹和报表。作为最佳实践，仅在文件夹级别配置安全性。安全性可以在单个报表上配置，但这会使长期管理变得非常困难。\n\
    \n要访问特定文件夹，最终用户应拥有其上层文件夹的权限。默认情况下，文件夹从父文件夹继承权限，报表从其所在文件夹继承权限。随着路径向下延伸，权限应设置为限制性更强。例如，你可能希望在\
    \ `Home`（主文件夹）级别授予域中每个人的权限。然后在 `Home` 下为每个部门创建文件夹。在每个部门文件夹内，为经理创建文件夹。\n\n在文件夹和对象级别定义了几种角色。表\
    \ 9-1 列出了 `Security`（安全性）页面上显示的角色和定义。\n\n表 9-1. 文件夹和对象级别的角色\n| 角色 | 用途 |\n| ---\
    \ | --- |\n| `Browser`（浏览器用户） | 可以查看文件夹和报表，并订阅报表。 |\n| `Content Manager`（内容经理）\
    \ | 可以管理报表服务器中的内容。包括文件夹、报表和资源。 |\n| `My Reports`（我的报表） | 可以发布报表和链接报表；管理用户 `My\
    \ Reports`（我的报表）文件夹中的文件夹、报表和资源。 |\n| `Publisher`（发布者） | 可以向报表服务器发布报表和链接报表。 |\n\
    | `Report Builder`（报表生成器） | 可以查看报表定义。 |\n\n按照以下步骤为 IT 部门创建和配置文件夹：\n1.  在 Web 门户中，导航到\
    \ `Home`（主文件夹）。如果你在 `Site Settings`（站点设置）中，请单击页面顶部的 `SQL Server Reporting Services`。\n\
    2.  单击 `Manage Folder`（管理文件夹），如图 9-13 所示。\n    ![A395630_1_En_9_Fig13_HTML.jpg](img/A395630_1_En_9_Fig13_HTML.jpg)\n\
    \    图 9-13. `Manage Folder`（管理文件夹）图标\n3.  这将打开 `Home`（主文件夹）的 `Security`（安全性）页面。单击\
    \ `New Role Assignment`（新建角色分配）。\n4.  输入 `Users`（用户）。对于域环境，这将是 `Everyone`（所有人）组。\n\
    5.  勾选 `Browser`（浏览器用户），如图 9-14 所示。这将授予所有用户在站点中运行任何报表的权限，除非文件夹中的安全性已被覆盖。\n   \
    \ ![A395630_1_En_9_Fig14_HTML.jpg](img/A395630_1_En_9_Fig14_HTML.jpg)\n    图 9-14.\
    \ 将 `Users`（用户）添加到 `Browser`（浏览器用户）角色\n6.  单击 `OK`（确定）保存更改。\n7.  单击 `Home`（主页）链接导航回文件夹视图。\n\
    8.  单击 `New Folder`（新建文件夹）。\n9.  在名称中填写 `IT`，然后单击 `Create`（创建）。\n10. 单击新 `IT`\
    \ 文件夹旁边的省略号，然后选择 `Manage`（管理）。\n11. 这将打开文件夹属性。单击 `Security`（安全性）。\n12. 单击 `Customize\
    \ security`（自定义安全性），如图 9-15 所示。\n    ![A395630_1_En_9_Fig15_HTML.jpg](img/A395630_1_En_9_Fig15_HTML.jpg)\n\
    \    图 9-15. 文件夹的安全性页面\n13. 这会显示一个关于中断从父项继承权限的警告，如图 9-16 所示。单击 `OK`（确定）。\n   \
    \ ![A395630_1_En_9_Fig16_HTML.jpg](img/A395630_1_En_9_Fig16_HTML.jpg)\n    图 9-16.\
    \ 确认安全性将不同\n14. 单击 `Add group or user`（添加组或用户）。\n15. 将 `IT` 组以 `Browser`（浏览器用户）角色添加到该文件夹，然后单击\
    \ `OK`（确定）。\n16. 勾选 `Builtin\\Users`（内置\\用户）旁边的框。如果你在域环境中工作，请移除 `Everyone`（所有人）组。\n\
    17. 单击 `Delete`（删除），然后单击 `OK`（确定）进行确认。\n18. 导航回 `Home`（主文件夹）。\n\n现在你有了一个只能由 `IT`\
    \ 组成员查看的文件夹。根据表 9-2，继续使用前面步骤中学到的技能添加文件夹并修改权限，以设置站点的安全性。\n\n表 9-2. 站点的安全性配置\n|\
    \ 文件夹 | 帐户或组 | 角色成员身份 |\n| --- | --- | --- |\n| `Home/IT` | `IT` | `Browser`（浏览器用户）\
    \ |\n| `Home/IT` | `Manager` | `Content Manager`（内容经理） |\n| `Home/IT` | `Manager`\
    \ | `Report Builder`（报表生成器） |\n| `Home/IT/Management` | `CIO`, `Director` | `Browser`（浏览器用户）\
    \ |\n| `Home/IT/Management` | `Manager` | `Content Manager`（内容经理） |\n| `Home/IT/Management`\
    \ | `Manager` | `Report Builder`（报表生成器） |\n| `Home/IT/Management/Confidential`\
    \ | `CIO` | `Content Manager`（内容经理） |\n\n显然，这是一个简化的例子，但它应该说明了应如何配置安全性。图 9-17 演示了随着路径向下延伸，帐户数量如何减少。\n\
    ![A395630_1_En_9_Fig17_HTML.jpg](img/A395630_1_En_9_Fig17_HTML.jpg)\n图 9-17. 文件夹权限\n\
    \n要进行测试，以任何帐户运行浏览器，确保该帐户只能看到预期的文件夹。图 9-18 显示了 `Director` 和 `TeamLeader` 在查看 `IT`\
    \ 文件夹时所看到的差异。\n![A395630_1_En_9_Fig18_HTML.jpg](img/A395630_1_En_9_Fig18_HTML.jpg)\n\
    图 9-18. `Manager` 和 `TeamLeader` 的文件夹视图\n\n此时，`Manager` 帐户已控制大多数文件夹的内容，并拥有使用 `Report\
    \ Builder`（报表生成器）的权限。你将在第 10 章中看到 `Report Builder`（报表生成器）的实际应用。\n"
- fmt: '## 使用订阅自动发送报表


    SQL Server Reporting Services (SSRS) 最实用的功能之一就是可以调度报表自动运行并通过订阅发送。报表可以通过电子邮件发送，也可以传送到网络共享文件夹。通过电子邮件发送时，报表可以直接嵌入邮件正文，也可以发送一个链接。


    > **注意**

    >

    > 订阅功能需要 SQL Server Standard Edition 或更高版本支持。


    由于订阅传递不涉及人工操作，因此为特定报表创建订阅必须满足两个条件：报表使用的所有数据源必须包含硬编码的凭据；必须在订阅中确定并配置默认参数。


    在早期版本的 SSRS 中，需要通过域内的 SMTP（简单邮件传输协议）服务器来发送邮件报表。从 SSRS 2016 开始，现在可以使用域外的电子邮件服务器（如
    Gmail）来发送报表。要将报表发送到网络共享，必须先创建该共享文件夹。需要有 Windows 账户拥有在该共享中创建报表的权限，并且最终用户必须有打开文件的权限。对于两种类型的订阅，托管
    ReportServer 数据库的服务器上还必须运行 `SQL Server Agent`。


    要通过电子邮件发送报表，必须先配置 SMTP 账户设置。选择“电子邮件设置”页面来填写 SMTP 属性。有关如何配置多种服务设置的信息，请参阅 Reporting
    Services 团队博客，网址为：[`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/)。


    将报表传送到网络共享的设置比通过电子邮件配置要简单得多。本节示例将涵盖如何将报表传送到共享文件夹。当你配置订阅将报表传送到共享时，你需要指定一个拥有创建文件权限的“文件共享账户”。你可以为整个
    SSRS 实例设置一个账户，也可以为单个订阅指定一个账户。图 9-19 显示了可用于传递到网络共享订阅的“文件共享账户”的属性。


    ![A395630_1_En_9_Fig19_HTML.jpg](A395630_1_En_9_Fig19_HTML.jpg)


    图 9-19. 文件共享账户属性


    你还需要创建将用来存放报表的共享文件夹。要配置网络共享，请按照以下步骤操作：


    1.  导航到你计算机上的 `C:\` 驱动器或其他驱动器。

    2.  创建一个名为 `Reports` 的新文件夹。

    3.  右键单击该文件夹并选择“属性”。

    4.  选择“共享”选项卡。

    5.  单击“共享”，这将打开“文件共享”对话框。

    6.  添加共享所需的账户和权限，如图 9-20 所示。


    ![A395630_1_En_9_Fig20_HTML.jpg](A395630_1_En_9_Fig20_HTML.jpg)


    图 9-20. “文件共享”对话框

    7.  单击“共享”、“完成”和“关闭”以创建共享并关闭对话框。


    一旦网络共享创建完毕，启动 `SSMS` 并确保 `SQL Server Agent` 正在运行。`SQL Server Agent` 是为 `SQL Server`
    运行计划作业的服务。就 `SQL Server` 而言，`SSRS` 订阅只不过是一种作业类型。


    现在基础设施已经就绪，你可以创建订阅了。请按照以下步骤配置订阅：


    1.  在 Web 门户中，导航到 `Dynamic Reports` 文件夹。

    2.  `Sales by Territory Matrix` 报表应该连接到使用存储凭据的 `AdventureWorks2016SQL` 数据源。如果不是，请重新配置数据源。

    3.  测试 `Sales by Territory Matrix` 报表。

    4.  导航回 `Dynamic Reports` 文件夹。

    5.  单击 `Sales by Territory Matrix` 旁边的省略号（...），然后选择“管理”。

    6.  单击“订阅”。

    7.  单击“新建订阅”。

    8.  在“订阅”属性页上，在“描述”属性中输入 `Sales by Territory`。

    9.  “所有者”属性应自动默认为你的账户。

    10. 对于此示例，接受默认计划。对于生产订阅，务必创建一个计划。图 9-21 显示了到目前为止的属性。


    ![A395630_1_En_9_Fig21_HTML.jpg](A395630_1_En_9_Fig21_HTML.jpg)


    图 9-21. 订阅属性

    11. 向下滚动到“目标”属性并选择“Windows 文件共享”。

    12. 键入网络共享的路径。

    13. 为“呈现格式”选择 `PDF`。

    14. 如果你想覆盖“文件共享账户”，请选择“使用以下 Windows 用户凭据”。填写特定账户的“用户名”和“密码”。

    15. 根据你的要求修改“覆盖选项”。这部分属性应类似于图 9-22。


    ![A395630_1_En_9_Fig22_HTML.jpg](A395630_1_En_9_Fig22_HTML.jpg)


    图 9-22. 订阅的传递选项

    16. 向下滚动到“报表参数”部分。

    17. 为 `Year` 参数选择一个值。

    18. 设置好 `Year` 值后，`Territory` 的值将会填充。选择一个区域。参数属性应类似于图 9-23。


    ![A395630_1_En_9_Fig23_HTML.jpg](A395630_1_En_9_Fig23_HTML.jpg)


    图 9-23. 订阅的报表参数

    19. 单击“创建订阅”。

    20. 订阅现在应该显示在列表中，如图 9-24 所示。


    ![A395630_1_En_9_Fig24_HTML.jpg](A395630_1_En_9_Fig24_HTML.jpg)


    图 9-24. 新订阅


    每个订阅都会创建一个 `SQL Server Agent` 作业。不幸的是，作业的名称是一个全局唯一标识符（GUID），你无法通过查看来分辨哪个作业对应哪个订阅。要弄清楚哪个订阅映射到哪个作业，你需要在你的
    `ReportServer` 数据库中运行类似下面的查询：


    ```sql

    SELECT Name AS ReportName, ScheduleID AS JobName, s.[Description]

    FROM [Catalog] c

    JOIN Subscriptions s ON c.ItemID = s.Report_OID

    JOIN ReportSchedule rs ON c.ItemID = rs.ReportID

    AND rs.SubscriptionID = s.SubscriptionID;

    ```


    图 9-25 显示了该查询的结果。


    ![A395630_1_En_9_Fig25_HTML.jpg](A395630_1_En_9_Fig25_HTML.jpg)


    图 9-25. 报表名称映射到作业名称


    要测试订阅，运行该作业。作业一旦启动订阅就会报告成功。即使报表没有传递成功，它也会报告成功。你可以通过检查共享文件夹中是否有报表，或者刷新“订阅”页面查看状态来确认结果。


    在早期版本的 SSRS 中，你必须导航到每个文件夹和报表才能找到和管理订阅。Web 门户有一个名为“我的订阅”的新功能。单击菜单中的齿轮图标，你会看到一个指向“我的订阅”的链接。在这里，你可以看到你所用账户拥有的订阅列表及其位置。你还可以启用、禁用或删除你的订阅。图
    9-26 显示了该链接和列表。


    ![A395630_1_En_9_Fig26_HTML.jpg](A395630_1_En_9_Fig26_HTML.jpg)


    图 9-26. 新的“我的订阅”功能'
  raw: '## Sending Reports Automatically with Subscriptions


    One of the nicest features of SSRS is the ability to schedule reports to run and
    be delivered automatically. The reports may be sent via e-mail or delivered to
    a network share. When delivering an e-mail report, either the report may be embedded
    in the e-mail message or a link can be sent.


    Note


    Subscriptions are supported with SQL Server Standard Edition and higher.


    Because subscription delivery does not involve human intervention, there are two
    requirements that must be met for a subscription to be created for a particular
    report. All data sources used by the report must contain hard-coded credentials
    . Default parameters must be determined and configured in the subscription.


    In previous versions of SSRS, an SMTP (Simple Mail Transfer Protocol) server within
    your domain was required to send reports through e-mail. Starting with SSRS 2016,
    it is now possible to use an e-mail server outside your domain such as gmail to
    send reports. To send reports to a network share, the share must be created. A
    Windows account must have permission to create the report in the share, and the
    appropriate end users must have permission to open the files. SQL Server Agent
    must also be running on the server that hosts the ReportServer database for both
    types of subscriptions.


    Before you can send reports through e-mail, the SMTP account settings must be
    configured. Select the E-mail settings page to fill in the SMTP properties. See
    the Reporting Services Team blog found at [`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/)
    for information about how to configure the settings for several types of services.


    It is much simpler to configure the settings for delivery of a report to a network
    share than via e-mail. The example in this section will cover delivering the report
    to the share. When you configure a subscription to deliver a report to a share,
    you will need to specify a File Share Account which has permission to create the
    file. You can set up one account for the entire SSRS instance, or you can specify
    an account for individual subscriptions. Figure [9-19](#A395630_1_En_9_Chapter.html#Fig19)
    shows the properties for the File Share Account that can be used for subscriptions
    delivered to network shares.


    ![A395630_1_En_9_Fig19_HTML.jpg](A395630_1_En_9_Fig19_HTML.jpg)


    Figure 9-19.


    File Share Account properties


    You will also need to create the share where the reports will be delivered. To
    configure a network share , follow these steps:


    1.  Navigate to the C:\ drive or another drive on your computer.  

    2.  Create a new folder named Reports.  

    3.  Right-click the folder and select Properties.  

    4.  Select the Sharing tab.  

    5.  Click Share which brings up the File Sharing dialog.  

    6.  Add any accounts and permissions required for the share as shown in Figure
    [9-20](#A395630_1_En_9_Chapter.html#Fig20).


    ![A395630_1_En_9_Fig20_HTML.jpg](A395630_1_En_9_Fig20_HTML.jpg)


    Figure 9-20.


    The File Sharing dialog box  

    7.  Click Share, Done, and Close to create the share and close the dialogs.


    Once the network share is created, launch SSMS and make sure that SQL Server Agent
    is running. SQL Server Agent is the service which runs scheduled jobs for SQL
    Server. SSRS subscriptions are just a type of job as far as SQL Server is concerned.


    Now that you have the infrastructure in place, you can create a subscription.
    Follow these steps to configure the subscription:


    1.  In the web portal, navigate to the Dynamic Reports folder.  

    2.  The Sales by Territory Matrix report should be connected to the AdventureWorks2016SQL
    data source with stored credentials. If not reconfigure the data source.  

    3.  Test the Sales by Territory Matrix report.  

    4.  Navigate back to the Dynamic Reports folder.  

    5.  Click the ellipsis next to Sales by Territory Matrix and select Manage.  

    6.  Click Subscriptions.  

    7.  Click New Subscription.  

    8.  On the Subscription property page, type Sales by Territory in the Description
    property.  

    9.  The Owner property should automatically default to your account.  

    10.  For this example, accept the default schedule. For a production subscription,
    be sure to create a schedule. Figure [9-21](#A395630_1_En_9_Chapter.html#Fig21)
    shows the properties so far.


    ![A395630_1_En_9_Fig21_HTML.jpg](A395630_1_En_9_Fig21_HTML.jpg)


    Figure 9-21.


    The subscription properties  

    11.  Scroll down to the Destination property and select Windows File Share.  

    12.  Type in the path to the network share.  

    13.  Select PDF for the Render Format.  

    14.  If you wish to override the File Share Account , select Use the following
    Windows user credentials. Fill in the User Name and Password for the specific
    account.  

    15.  Modify the Overwrite Options according to your requirements. This section
    of properties should look similar to Figure [9-22](#A395630_1_En_9_Chapter.html#Fig22).


    ![A395630_1_En_9_Fig22_HTML.jpg](A395630_1_En_9_Fig22_HTML.jpg)


    Figure 9-22.


    The delivery options of the subscription  

    16.  Scroll down to the Report Parameters section.  

    17.  Select a value for the Year parameter.  

    18.  Once the Year value is set, the values for Territory will populate. Select
    a territory. The parameter properties should resemble Figure [9-23](#A395630_1_En_9_Chapter.html#Fig23).


    ![A395630_1_En_9_Fig23_HTML.jpg](A395630_1_En_9_Fig23_HTML.jpg)


    Figure 9-23.


    The Report Parameters of the subscription  

    19.  Click Create Subscription.  

    20.  The subscription should now be visible in the list as shown in Figure [9-24](#A395630_1_En_9_Chapter.html#Fig24).


    ![A395630_1_En_9_Fig24_HTML.jpg](A395630_1_En_9_Fig24_HTML.jpg)


    Figure 9-24.


    The new subscription


    A SQL Server Agent job is created for each subscription. Unfortunately, the name
    of the job is a globally unique identifier (GUID), and you can’t tell by looking
    which job goes with each subscription. To figure out which subscription maps to
    each job, you will need to run a query like the following in your ReportServer
    database :


    ```

    SELECT Name AS ReportName, ScheduleID AS JobName, s.[Description]

    FROM [Catalog] c

    JOIN Subscriptions s ON c.ItemID = s.Report_OID

    JOIN ReportSchedule rs ON c.ItemID = rs.ReportID

    AND rs.SubscriptionID = s.SubscriptionID;

    ```


    Figure [9-25](#A395630_1_En_9_Chapter.html#Fig25) shows the results of the query.


    ![A395630_1_En_9_Fig25_HTML.jpg](A395630_1_En_9_Fig25_HTML.jpg)


    Figure 9-25.


    The report name mapped to the job name


    To test the subscription, run the job. The job will report success once it kicks
    off the subscription. It will report success even if the report is not delivered.
    You can see the results by checking the share for the report or refreshing the
    Subscriptions page to see the status.


    In previous versions of SSRS, you had to navigate to every folder and report to
    find and manage subscriptions. The web portal has a new feature called My Subscriptions
    . By clicking the gear in the menu, you will see a link to My Subscriptions. Here
    you can see the list of subscriptions owned by the account you are using and their
    locations. You can also enable, disable, or delete your subscriptions. Figure
    [9-26](#A395630_1_En_9_Chapter.html#Fig26) shows the link and the list.


    ![A395630_1_En_9_Fig26_HTML.jpg](A395630_1_En_9_Fig26_HTML.jpg)


    Figure 9-26.


    The new My Subscriptions feature'
  trans: '

    ## 使用订阅自动发送报表


    SQL Server Reporting Services (SSRS) 最实用的功能之一就是可以调度报表自动运行并通过订阅发送。报表可以通过电子邮件发送，也可以传送到网络共享文件夹。通过电子邮件发送时，报表可以直接嵌入邮件正文，也可以发送一个链接。


    > **注意**

    >

    > 订阅功能需要 SQL Server Standard Edition 或更高版本支持。


    由于订阅传递不涉及人工操作，因此为特定报表创建订阅必须满足两个条件：报表使用的所有数据源必须包含硬编码的凭据；必须在订阅中确定并配置默认参数。


    在早期版本的 SSRS 中，需要通过域内的 SMTP（简单邮件传输协议）服务器来发送邮件报表。从 SSRS 2016 开始，现在可以使用域外的电子邮件服务器（如
    Gmail）来发送报表。要将报表发送到网络共享，必须先创建该共享文件夹。需要有 Windows 账户拥有在该共享中创建报表的权限，并且最终用户必须有打开文件的权限。对于两种类型的订阅，托管
    ReportServer 数据库的服务器上还必须运行 `SQL Server Agent`。


    要通过电子邮件发送报表，必须先配置 SMTP 账户设置。选择“电子邮件设置”页面来填写 SMTP 属性。有关如何配置多种服务设置的信息，请参阅 Reporting
    Services 团队博客，网址为：[`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/07/15/deliver-reports-via-emailusing-an-email-server-outside-your-network/)。


    将报表传送到网络共享的设置比通过电子邮件配置要简单得多。本节示例将涵盖如何将报表传送到共享文件夹。当你配置订阅将报表传送到共享时，你需要指定一个拥有创建文件权限的“文件共享账户”。你可以为整个
    SSRS 实例设置一个账户，也可以为单个订阅指定一个账户。图 9-19 显示了可用于传递到网络共享订阅的“文件共享账户”的属性。


    ![A395630_1_En_9_Fig19_HTML.jpg](img/A395630_1_En_9_Fig19_HTML.jpg)


    图 9-19. 文件共享账户属性


    你还需要创建将用来存放报表的共享文件夹。要配置网络共享，请按照以下步骤操作：


    1.  导航到你计算机上的 `C:\` 驱动器或其他驱动器。

    2.  创建一个名为 `Reports` 的新文件夹。

    3.  右键单击该文件夹并选择“属性”。

    4.  选择“共享”选项卡。

    5.  单击“共享”，这将打开“文件共享”对话框。

    6.  添加共享所需的账户和权限，如图 9-20 所示。


    ![A395630_1_En_9_Fig20_HTML.jpg](img/A395630_1_En_9_Fig20_HTML.jpg)


    图 9-20. “文件共享”对话框

    7.  单击“共享”、“完成”和“关闭”以创建共享并关闭对话框。


    一旦网络共享创建完毕，启动 `SSMS` 并确保 `SQL Server Agent` 正在运行。`SQL Server Agent` 是为 `SQL Server`
    运行计划作业的服务。就 `SQL Server` 而言，`SSRS` 订阅只不过是一种作业类型。


    现在基础设施已经就绪，你可以创建订阅了。请按照以下步骤配置订阅：


    1.  在 Web 门户中，导航到 `Dynamic Reports` 文件夹。

    2.  `Sales by Territory Matrix` 报表应该连接到使用存储凭据的 `AdventureWorks2016SQL` 数据源。如果不是，请重新配置数据源。

    3.  测试 `Sales by Territory Matrix` 报表。

    4.  导航回 `Dynamic Reports` 文件夹。

    5.  单击 `Sales by Territory Matrix` 旁边的省略号（...），然后选择“管理”。

    6.  单击“订阅”。

    7.  单击“新建订阅”。

    8.  在“订阅”属性页上，在“描述”属性中输入 `Sales by Territory`。

    9.  “所有者”属性应自动默认为你的账户。

    10. 对于此示例，接受默认计划。对于生产订阅，务必创建一个计划。图 9-21 显示了到目前为止的属性。


    ![A395630_1_En_9_Fig21_HTML.jpg](img/A395630_1_En_9_Fig21_HTML.jpg)


    图 9-21. 订阅属性

    11. 向下滚动到“目标”属性并选择“Windows 文件共享”。

    12. 键入网络共享的路径。

    13. 为“呈现格式”选择 `PDF`。

    14. 如果你想覆盖“文件共享账户”，请选择“使用以下 Windows 用户凭据”。填写特定账户的“用户名”和“密码”。

    15. 根据你的要求修改“覆盖选项”。这部分属性应类似于图 9-22。


    ![A395630_1_En_9_Fig22_HTML.jpg](img/A395630_1_En_9_Fig22_HTML.jpg)


    图 9-22. 订阅的传递选项

    16. 向下滚动到“报表参数”部分。

    17. 为 `Year` 参数选择一个值。

    18. 设置好 `Year` 值后，`Territory` 的值将会填充。选择一个区域。参数属性应类似于图 9-23。


    ![A395630_1_En_9_Fig23_HTML.jpg](img/A395630_1_En_9_Fig23_HTML.jpg)


    图 9-23. 订阅的报表参数

    19. 单击“创建订阅”。

    20. 订阅现在应该显示在列表中，如图 9-24 所示。


    ![A395630_1_En_9_Fig24_HTML.jpg](img/A395630_1_En_9_Fig24_HTML.jpg)


    图 9-24. 新订阅


    每个订阅都会创建一个 `SQL Server Agent` 作业。不幸的是，作业的名称是一个全局唯一标识符（GUID），你无法通过查看来分辨哪个作业对应哪个订阅。要弄清楚哪个订阅映射到哪个作业，你需要在你的
    `ReportServer` 数据库中运行类似下面的查询：


    ```sql

    SELECT Name AS ReportName, ScheduleID AS JobName, s.[Description]

    FROM [Catalog] c

    JOIN Subscriptions s ON c.ItemID = s.Report_OID

    JOIN ReportSchedule rs ON c.ItemID = rs.ReportID

    AND rs.SubscriptionID = s.SubscriptionID;

    ```


    图 9-25 显示了该查询的结果。


    ![A395630_1_En_9_Fig25_HTML.jpg](img/A395630_1_En_9_Fig25_HTML.jpg)


    图 9-25. 报表名称映射到作业名称


    要测试订阅，运行该作业。作业一旦启动订阅就会报告成功。即使报表没有传递成功，它也会报告成功。你可以通过检查共享文件夹中是否有报表，或者刷新“订阅”页面查看状态来确认结果。


    在早期版本的 SSRS 中，你必须导航到每个文件夹和报表才能找到和管理订阅。Web 门户有一个名为“我的订阅”的新功能。单击菜单中的齿轮图标，你会看到一个指向“我的订阅”的链接。在这里，你可以看到你所用账户拥有的订阅列表及其位置。你还可以启用、禁用或删除你的订阅。图
    9-26 显示了该链接和列表。


    ![A395630_1_En_9_Fig26_HTML.jpg](img/A395630_1_En_9_Fig26_HTML.jpg)


    图 9-26. 新的“我的订阅”功能

