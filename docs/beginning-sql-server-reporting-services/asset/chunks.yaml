  trans: "\n# 基于查询添加参数列表\n\n大多数情况下，基于查询来构建参数列表是合理的。这将节省时间，因为随着数据变化，该列表无需手动维护。参数列表通常会被重用，因此创建共享数据集而非嵌入式数据集是明智之举。要基于查询创建参数列表，请按照以下步骤操作：\n\
    \n1.  切换回设计视图。\n2.  在 `解决方案资源管理器` 中，右键单击 `共享数据集` 文件夹，选择 `添加新数据集`。\n3.  将数据集命名为\
    \ `Territory`。\n4.  `数据源` 属性应指向 `AdventureWorks2016`。\n5.  确保 `查询` 类型设置为 `文本`。\n\
    6.  将 `查询` 设置为：\n\n    ```sql\n    SELECT TerritoryID, Name AS Territory\n   \
    \ FROM Sales.SalesTerritory;\n    ```\n\n7.  `共享数据集属性` 应如图 6-7 所示。单击 `确定`。\n\n\
    \    ![A395630_1_En_6_Fig7_HTML.jpg](img/A395630_1_En_6_Fig7_HTML.jpg)\n\n   \
    \ 图 6-7. `Territory` 数据集\n\n8.  使用 `报表数据` 窗口向报表添加一个名为 `Territory` 的新数据集。\n9. \
    \ 选择 `使用共享数据集`。\n10. 从对话框中选择 `Territory` 数据集，如图 6-8 所示。\n\n    ![A395630_1_En_6_Fig8_HTML.jpg](img/A395630_1_En_6_Fig8_HTML.jpg)\n\
    \n    图 6-8. 报表中的 `Territory` 数据集\n\n11. 单击 `确定`。\n12. 打开 `SalesByTerritory` 数据集的属性，并将查询更改为：\n\
    \n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue)\
    \ AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS Store\n    FROM\
    \ sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
    \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
    \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
    \ = @Year AND T.TerritoryID = @Territory\n    GROUP BY C.CustomerID, T.TerritoryID,\
    \ T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\n13. 这将通过 `Year` 和 `Territory`\
    \ 两个维度筛选数据集。打开 `Territory` 参数的属性。\n14. 选择 `可用值` 选项卡。\n15. 选择 `从查询中获取值`。\n16. 在\
    \ `数据集` 属性中，选择 `Territory`。\n17. 在 `值字段` 属性中，选择 `TerritoryID`。这是查询中所需要的。\n18.\
    \ 为 `标签字段` 属性选择 `Territory`。这是最终用户将看到的。对话框将如图 6-9 所示。\n\n    ![A395630_1_En_6_Fig9_HTML.jpg](img/A395630_1_En_6_Fig9_HTML.jpg)\n\
    \n    图 6-9. `Territory` 列表属性\n\n注意：`SSDT` 发布时存在一个影响共享数据集的错误。Microsoft 已承诺在后续版本中修复此问题。在此之前，要解决此问题，请关闭项目并找到\
    \ `Territory.rsd` 文件。将 `<Dataset>` 更改为 `<Dataset Name=\"Territory\">`。保存文件并重新启动项目。\n\
    \n单击 `确定` 接受参数后，预览报表。新参数应如图 6-10 所示。\n\n![A395630_1_En_6_Fig10_HTML.jpg](img/A395630_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10. `Territory` 参数列表\n\n多次运行报表并选择不同的参数集。您将看到每次显示的数据如何变化。\n\n# 默认参数\n\n通常，有一组参数是最可能被选中的。为了节省用户时间，您可以为每个参数添加一个默认值。启动报表时，它将使用默认参数运行一次。然后，用户如果需要，可以选择不同的参数集再次运行。要演示这一点，请按照以下步骤操作：\n\
    \n1.  单击 `确定` 接受属性设置。\n2.  使用相同方法为 `Territory` 参数添加默认值。\n3.  提供值 `7`。这些值必须来自 `TerritoryID`\
    \ 字段，因为这是传递给查询的值。\n4.  单击 `确定` 接受属性并预览报表。它应该在不提供参数值的情况下运行，并如图 6-12 所示。\n\n   \
    \ ![A395630_1_En_6_Fig12_HTML.jpg](img/A395630_1_En_6_Fig12_HTML.jpg)\n\n    图\
    \ 6-12. 使用默认参数运行后的报表\n\n5.  切换回设计视图。\n6.  打开 `Year` 参数的属性，选择 `默认值` 选项卡。\n7.  选择\
    \ `指定值`。\n8.  单击 `添加`。\n9.  填入 `2012`。对话框应如图 6-11 所示。\n\n    ![A395630_1_En_6_Fig11_HTML.jpg](img/A395630_1_En_6_Fig11_HTML.jpg)\n\
    \n    图 6-11. `默认值` 属性\n\n# 多值参数\n\n到目前为止，您创建的参数允许用户从列表中选择一个值。也可以创建允许多选的参数。为此，必须修改查询以选择一个值列表。不再使用\
    \ `ColumnName = @Parameter`，而是使用 `ColumnName IN (@Parameter)`。按照以下步骤创建多值参数：\n\n\
    1.  切换回设计视图。\n2.  打开 `Year` 参数的属性。\n3.  在 `常规` 选项卡上，勾选 `允许多个值`。\n4.  在 `默认值` 选项卡上，切换回\
    \ `无默认值`。\n5.  单击 `确定` 保存更改。\n6.  打开 `SalesByTerritory` 数据集。\n7.  为使 `WHERE` 子句中的表达式能够接受值列表，必须将运算符从等于\
    \ (`=`) 改为 `IN`。将 `查询` 属性更改为：\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear,\
    \ C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory,\
    \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) IN (@Year) AND T.TerritoryID = @Territory\n    GROUP\
    \ BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\
    \n8.  运行报表。`Year` 参数应如图 6-13 所示。\n\n    ![A395630_1_En_6_Fig13_HTML.jpg](img/A395630_1_En_6_Fig13_HTML.jpg)\n\
    \n    图 6-13. 多值参数\n\n您现在可以选择一个或多个年份。多次运行报表，看看选择不同参数集时数据如何变化。\n"
- fmt: "### 级联参数\n\n您可能已经注意到，某些区域在 2011 年没有销售数据。如果您选择了 2011 年，所有区域仍然会显示在参数列表中。您可以设计一个参数，使其基于另一个参数的值。请按照以下步骤，根据\
    \ `Year` 参数调整 `Territory` 参数列表。\n\n1.  切换到设计视图。\n2.  打开 `Territory` 数据集的属性。\n\
    3.  切换到“使用嵌入在报表中的数据集”。\n4.  将“数据源”属性设置为 `AdventureWorks`。\n5.  将“查询”属性设置为\n\n\
    \    ```sql\n    SELECT DISTINCT T.TerritoryID, T.Name AS Territory\n    FROM\
    \ sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
    \ = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n\
    \    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate)\
    \ IN (@Year);\n    ```\n\n6.  单击“确定”保存更改。\n7.  打开 `Territory` 参数属性。\n8.  在“默认值”页面上，更改为“无默认值”。\n\
    9.  单击“确定”保存更改。\n\n现在，当您预览报表时，在选定年份之前，`Territory` 参数将显示为灰色。选择 2011 年。`Territory`\
    \ 参数列表将如图 6-14 所示。\n\n![A395630_1_En_6_Fig14_HTML.jpg](A395630_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14. 基于 2011 年销售数据的区域参数列表\n\n您可能已经注意到，`Territory` 参数的查询与 `SalesByTerritory`\
    \ 查询类似。它没有查询报表所需的值，而是生成了一个区域的唯一列表。查询中使用的表是相同的。`WHERE` 子句中的表达式 `YEAR(OrderDate)\
    \ IN (@Year)` 用于根据所选的 `Year` 参数值进行筛选。\n\n您可以级联更多参数，每个参数都基于前一个参数的值。但是，请注意不要对性能产生负面影响。例如，从\
    \ `Sales.SalesTerritory` 表显示区域列表比用于仅显示特定年份有销售数据的区域的查询效率高得多。顺便说一句，您也可以选择所有年份，级联仍然有效。\n\
    \n### 参数位置\n\n在设计视图中，您可能注意到报表上方有一个参数区域。如果看不到，请右键单击设计画布并选择“视图” ➤ “参数”。参数区域应如图 6-15\
    \ 所示。\n\n![A395630_1_En_6_Fig15_HTML.jpg](A395630_1_En_6_Fig15_HTML.jpg)\n\n图\
    \ 6-15. 参数区域\n\n此功能是 SQL Server 2016 的新增功能，提供了更灵活的参数布局。在 SQL Server 的早期版本中，您可以通过从\
    \ `Parameters` 文件夹中选择一个参数并单击向上或向下箭头来更改参数的顺序，如图 6-16 所示。\n\n![A395630_1_En_6_Fig16_HTML.jpg](A395630_1_En_6_Fig16_HTML.jpg)\n\
    \n图 6-16. 用于移动参数的箭头\n\n使用 SSRS 早期版本中的方法更改位置并不总能产生最佳的放置效果。无法控制哪些参数最终位于同一行。如果您有一个包含开始和结束日期的报表，您可能希望将日期保持在同一行，但这并非总是可行。\n\
    \n从 SQL Server 2016 开始，最多可以显示六个参数。您现在可以通过将参数拖动到不同的单元格来控制参数的放置。例如，将 `Territory`\
    \ 参数拖到 `Year` 参数下方。参数窗格应如图 6-17 所示。\n\n![A395630_1_En_6_Fig17_HTML.jpg](A395630_1_En_6_Fig17_HTML.jpg)\n\
    \n图 6-17. 重新排列后的参数\n\n当您预览报表时，参数显示如图 6-18 所示。\n\n![A395630_1_En_6_Fig18_HTML.jpg](A395630_1_En_6_Fig18_HTML.jpg)\n\
    \n图 6-18. 预览模式下的参数\n\n默认情况下，有两行参数。要增加行数，请在设计视图中右键单击参数区域，然后选择“在上方插入行”或“在下方插入行”。但是，如果您正在使用级联功能，在移动参数时要小心。确保需要首先使用的参数也首先显示，以避免依赖错误。\n\
    \n### 参数数据类型\n\n到目前为止，您一直在使用数值参数，尽管默认类型是文本。您也可以使用其他数据类型的参数，控件将根据类型发生变化。请按照以下说明查看其他数据类型：\n\
    \n1.  确保已保存对“按区域矩阵销售”报表的最新更改。您可以单击“保存”图标或运行报表。\n2.  右键单击“按区域矩阵销售”报表，然后选择“复制”。\n\
    3.  右键单击项目名称 `Dynamic Reports`，然后选择“粘贴”。\n4.  将新报表的名称更改为 `Data Types`。\n5.  在设计视图中，右键单击\
    \ `Parameters` 文件夹，然后选择“添加参数”。\n6.  这将打开“报表参数属性”对话框。将参数命名为 `DateParameter`。\n\
    7.  在“提示”中填写 `Date Parameter`。提示是用户在运行报表时将看到的内容。\n8.  将“数据类型”更改为“日期/时间”。“常规”页面将如图\
    \ 6-19 所示。\n\n    ![A395630_1_En_6_Fig19_HTML.jpg](A395630_1_En_6_Fig19_HTML.jpg)\n\
    \n    图 6-19. 参数的常规属性\n9.  单击“默认值”页面。\n10. 选择“指定值”。\n11. 单击“添加”。\n12. 不要键入值，而是单击如图\
    \ 6-20 所示的 `fx` 符号以打开表达式对话框。\n\n    ![A395630_1_En_6_Fig20_HTML.jpg](A395630_1_En_6_Fig20_HTML.jpg)\n\
    \n    图 6-20. 表达式按钮\n13. 在表达式中填写 `=Today()` 并单击“确定”。\n14. 单击“确定”接受属性。\n15. 您现在应该在网格中看到带有日历图标的\
    \ `Date Parameter`，如图 6-21 所示。\n\n    ![A395630_1_En_6_Fig21_HTML.jpg](A395630_1_En_6_Fig21_HTML.jpg)\n\
    \n    图 6-21. 新的日期参数\n16. 预览报表。\n17. 如果 `Date Parameter` 显示为灰色，请为 `Year` 和 `Territory`\
    \ 选择值。当前日期应自动被选中。您可以键入或使用日历选取器控件选择其他日期。至少在我使用的版本中，`Date/Time` 参数必须位于第一个位置，才能在其他参数被选定之前可用。\n\
    18. 切换回设计视图并添加另一个参数。\n19. 将此参数命名为 `TrueFalse`，提示为 `True or False`。\n20. 将“数据类型”更改为“布尔值”并单击“确定”。\n\
    21. 这将添加一组单选按钮，如图 6-22 所示。\n\n    ![A395630_1_En_6_Fig22_HTML.jpg](A395630_1_En_6_Fig22_HTML.jpg)\n\
    \n    图 6-22. 新的“真或假”参数\n\n您还可以通过在“默认值”页面上添加 `True` 或 `False` 来为布尔数据类型设置默认值。\n\
    \n默认数据类型是“文本”，允许用户输入任何内容。如果您希望将输入限制为数字，可以选择 `Integer` 或 `Float` 数据类型。该控件看起来像一个常规文本框，但将分别只接受整数或小数。"
  raw: "### Cascading Parameters\n\nMaybe you have noticed that some of the territories\
    \ do not have sales in 2011\\. If you select 2011, all of the territories still\
    \ show up in the parameter list. You can design a parameter so that it is based\
    \ on the value of another parameter. Follow these steps to adjust the Territory\
    \ parameter list based on the Year parameter.\n\n1.  Switch to design view.  \n\
    2.  Open the properties of the Territory dataset.  \n3.  Switch to Use a dataset\
    \ embedded in my report.  \n4.  Set the Data source property to AdventureWorks.\
    \  \n5.  Set the Query property to\n\n    ```\n    SELECT DISTINCT T.TerritoryID,\
    \ T.Name AS Territory\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) IN (@Year);\n    ```\n\n6.  Click OK to save the changes.\
    \  \n7.  Open the Territory parameter properties.  \n8.  On the Default Values\
    \ page, change to No default value.  \n9.  Click OK to save the changes.  \n\n\
    Now when you preview the report, the Territory parameter will be grayed out until\
    \ the year is chosen. Select 2011\\. The Territory parameter list will look like\
    \ Figure [6-14](#A395630_1_En_6_Chapter.html#Fig14).\n\n![A395630_1_En_6_Fig14_HTML.jpg](A395630_1_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14.\n\nThe Territory parameter list based on 2011 sales\n\nYou may\
    \ have noticed that the query for the Territory parameter is similar to the SalesByTerritory\
    \ query. Instead of querying for the values needed in the report, it produces\
    \ a distinct list of territories. The tables used in the query are identical.\
    \ The expression in the WHERE clause, `YEAR(OrderDate) IN (@Year)`, is filtering\
    \ on the Year parameter values chosen.\n\nYou can cascade even more parameters,\
    \ each one based on the value of the previous parameter. Be cautious, however,\
    \ that you do not negatively impact performance. For example, displaying the list\
    \ of territories from the Sales.SalesTerritory table is much more efficient than\
    \ the query used to display only those with sales in specifically chosen years.\
    \ By the way, you can also select all years and the cascading will still work.\n\
    \n### Parameter Placement\n\nWhile in design view, you may have noticed a parameter\
    \ section above the report. If you don’t see it, right-click the design canvas\
    \ and select View ➤ Parameters. The parameter section should look like Figure\
    \ [6-15](#A395630_1_En_6_Chapter.html#Fig15).\n\n![A395630_1_En_6_Fig15_HTML.jpg](A395630_1_En_6_Fig15_HTML.jpg)\n\
    \nFigure 6-15.\n\nThe parameter section\n\nThis feature is new with SQL Server\
    \ 2016, and it provides improved flexibility with the parameter layout. In previous\
    \ versions of SQL Server, you could change the order of parameters by selecting\
    \ a parameter from the Parameters folder and clicking the up or down arrow as\
    \ shown in Figure [6-16](#A395630_1_En_6_Chapter.html#Fig16).\n\n![A395630_1_En_6_Fig16_HTML.jpg](A395630_1_En_6_Fig16_HTML.jpg)\n\
    \nFigure 6-16.\n\nThe arrows for moving parameters\n\nChanging the positions using\
    \ the method found in earlier versions of SSRS didn’t always produce optimum placement.\
    \ There was no control over which parameters end up on the same line. If you had\
    \ a report with starting and ending dates, you may have wanted to keep the dates\
    \ on the same line, but it wasn’t always possible.\n\nBeginning with SQL Server\
    \ 2016, up to six parameters can display across. You can now control the placement\
    \ of the parameters by dragging them to different cells. For example, drag the\
    \ Territory parameter below the Year parameter. The parameter pane should look\
    \ like Figure [6-17](#A395630_1_En_6_Chapter.html#Fig17).\n\n![A395630_1_En_6_Fig17_HTML.jpg](A395630_1_En_6_Fig17_HTML.jpg)\n\
    \nFigure 6-17.\n\nThe parameters rearranged\n\nWhen you preview the report, the\
    \ parameters look like Figure [6-18](#A395630_1_En_6_Chapter.html#Fig18).\n\n\
    ![A395630_1_En_6_Fig18_HTML.jpg](A395630_1_En_6_Fig18_HTML.jpg)\n\nFigure 6-18.\n\
    \nThe parameters in preview mode\n\nBy default, there are two rows for parameters.\
    \ To increase this, right-click within the parameters area while in design view\
    \ and select Insert Row Above or Insert Row Below. Be cautious, however, when\
    \ moving parameters around if you are using cascading. Make sure that the parameters\
    \ needed first are also displayed first to avoid a dependency error.\n\n### Parameter\
    \ Data Types\n\nSo far, you have worked with numeric parameters, although the\
    \ default type is text. You can also have parameters of other data types, and\
    \ the parameter control will change based on the type. Follow these instructions\
    \ to see the additional data types:\n\n1.  Make sure that the latest changes to\
    \ the Sales by Territory Matrix report have been saved. You can click the Save\
    \ icon or run the report.  \n2.  Right-click Sales by Territory Matrix report\
    \ and select Copy.  \n3.  Right-click the project name, Dynamic Reports, and select\
    \ Paste.  \n4.  Change the name of the new report to Data Types.  \n5.  While\
    \ in design view, right-click the Parameters folder and select Add Parameter.\
    \  \n6.  This brings up the Report Parameter Properties dialog box. Name the parameter\
    \ DateParameter.  \n7.  Fill in Date Parameter for the Prompt. The prompt is what\
    \ the user will see when running the report.  \n8.  Change the Data Type to Date/Time.\
    \ The General page will look like Figure [6-19](#A395630_1_En_6_Chapter.html#Fig19).\n\
    \n    ![A395630_1_En_6_Fig19_HTML.jpg](A395630_1_En_6_Fig19_HTML.jpg)\n\n    Figure\
    \ 6-19.\n\n    The General properties of the parameter  \n9.  Click the Default\
    \ Values page.  \n10.  Select Specify Values.  \n11.  Click Add.  \n12.  Instead\
    \ of typing in a value, click the fx symbol as shown in Figure [6-20](#A395630_1_En_6_Chapter.html#Fig20)\
    \ to open the expression dialog box.\n\n    ![A395630_1_En_6_Fig20_HTML.jpg](A395630_1_En_6_Fig20_HTML.jpg)\n\
    \n    Figure 6-20.\n\n    The expression button  \n13.  Fill in `=Today()` for\
    \ the expression and click OK.  \n14.  Click OK to accept the properties.  \n\
    15.  You should now see the Date Parameter in the grid with a calendar icon as\
    \ shown in Figure [6-21](#A395630_1_En_6_Chapter.html#Fig21).\n\n    ![A395630_1_En_6_Fig21_HTML.jpg](A395630_1_En_6_Fig21_HTML.jpg)\n\
    \n    Figure 6-21.\n\n    The new Date Parameter  \n16.  Preview the report.  \n\
    17.  If the Date Parameter is grayed out, select values for Year and Territory.\
    \ The current date should be automatically chosen. You can either type in or use\
    \ the calendar picker control to select another date. At least in the build I\
    \ am using, the Date/Time parameter must be in the first position in order to\
    \ be available before the other parameters are selected.  \n18.  Switch back to\
    \ design view and add another parameter.  \n19.  Name this parameter TrueFalse\
    \ with Prompt True or False.  \n20.  Change the Data Type to Boolean and click\
    \ OK.  \n21.  This will add a set of radio buttons as shown in Figure [6-22](#A395630_1_En_6_Chapter.html#Fig22).\n\
    \n    ![A395630_1_En_6_Fig22_HTML.jpg](A395630_1_En_6_Fig22_HTML.jpg)\n\n    Figure\
    \ 6-22.\n\n    The new True or False parameter  \n\nYou can also set a default\
    \ for the Boolean data type by adding True or False on the Default Values page.\n\
    \nThe default data type is Text which lets the user type in anything. If you would\
    \ like to restrict the input to a number, you can select the Integer or Float\
    \ data types. The control will look like a regular text box but will accept only\
    \ whole numbers or decimals, respectively."
