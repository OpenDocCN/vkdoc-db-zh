  trans: '### 额外的按钮


    对最终用户而言，导出报告与打印报告同等重要。系统提供了带有多种导出类型的`导出`按钮，例如导出为 XML、Excel、Word 和 PDF。导出报告的结果会因导出类型的功能而异。


    你可以使用`缩放`按钮将预览窗口放大到多种尺寸，并通过`查找`和`下一个`按钮在报告中搜索文本。


    ## 格式化向导报告


    通过向导创建的表格报告看起来很不错，但它仍有改进空间。在预览时，我列出了需要修复的事项清单：

    *   从`OrderDate`中移除时间

    *   将美元金额四舍五入到最近的分

    *   将金额格式设置为货币

    *   移除`SalesOrderID`的汇总值

    *   将`OrderMonth`从数字更改为月份名称

    *   调整列宽

    *   为每个`组`以及整个报告添加总计。


    点击`设计`以查看报告的设计视图。在网格底部找到`OrderDate`字段。右键单击该单元格并选择`文本框属性`。


    **注意**

    在表格网格中选择单元格可能需要一些练习。你可以选择单元格或其内容。选择单元格时，它将显示轮廓。如果遇到困难，请尝试点击单元格的边缘。


    在`文本框属性`对话框中，选择左侧的`数字`。在`类别`下，选择`日期`。对于类型，选择一种不包含时间的日期格式，如图 2-16 所示，然后点击`确定`。


    ![A395630_1_En_2_Fig16_HTML.jpg](img/A395630_1_En_2_Fig16_HTML.jpg)

    图 2-16. 更改日期格式


    右键单击网格右下角的`TotalDue`单元格并选择`文本框属性`。选择`数字`，但这次选择`货币`。勾选`使用千位分隔符 (,)`。如果你在美国，其属性将如图
    2-17 所示。


    ![A395630_1_En_2_Fig17_HTML.jpg](img/A395630_1_En_2_Fig17_HTML.jpg)

    图 2-17. 格式化 `TotalDue` 字段


    点击`确定`接受该格式。现在，为了避免对三个汇总字段重复此过程，请调出`属性`窗口。你可以通过按 `F4` 键或在`视图`菜单中找到它。定位到`格式`属性。图
    2-18 显示了你要找的内容。


    ![A395630_1_En_2_Fig18_HTML.jpg](img/A395630_1_En_2_Fig18_HTML.jpg)

    图 2-18. `格式` 属性


    将`格式`值复制到`剪贴板`。按住 Shift 键并选择`TotalDue`标题下的三个汇总框。现在属性窗口会同时针对这三个文本框进行选择。找到`格式`属性并粘贴该值。


    你可以随时预览报告以检查进度。每次预览时，报告定义都会被保存。此时，在展开各部分后，报告应类似于图 2-19。


    ![A395630_1_En_2_Fig19_HTML.jpg](img/A395630_1_En_2_Fig19_HTML.jpg)

    图 2-19. 应用了一些格式的报告


    向导自动为`SalesOrderID`列创建了汇总，因为它包含数字数据。对该值求和没有意义。返回设计视图，点击包含该公式的每个单元格并按删除键以移除`[Sum(SalesOrderID)]`。需要从第二、第三和第四行中移除它。


    清单上的下一项是将`Order Month`列更改为显示月份名称。要将其更改为显示名称，请按照以下步骤操作：

    1.  在设计视图中，右键单击`OrderMonth`单元格并选择`表达式`。

    2.  这将打开`表达式`对话框。你可以看到现有表达式`=Fields!OrderMonth.Value`。

    3.  展开`类别`框中的`常用函数`。

    4.  选择`日期和时间`。

    5.  将光标定位在等号和表达式中的字母 F 之间。

    6.  在`项`列表中双击`MonthName`。

    7.  在表达式末尾添加一个右括号。表达式现在应为`=MonthName(Fields!OrderMonth.Value)`。`表达式`对话框应如图 2-20
    所示。


    ![A395630_1_En_2_Fig20_HTML.jpg](img/A395630_1_En_2_Fig20_HTML.jpg)

    图 2-20. 月份名称的表达式


    8.  验证表达式后点击`确定`。由于表达式变得更复杂，单元格值将变为`<<Exp>>`。


    有些标题如果列更宽一些会更好看。当表格被选中时，顶部和左侧会出现控制柄。通过在顶部控制柄的列之间点击并拖动，你可以扩展或缩小列宽以容纳列标题。


    清单上还有一项任务，添加一个总计和一个每个`组`（`美国`、`欧洲`和`太平洋`）的总计。这比你想象的要容易。你将在第 2 章了解更多关于使用分组级别的内容，但目前要理解，添加在一个级别的总计会显示在上一个级别。例如，在`区域`级别添加的总计会显示在`组`级别。请按照以下步骤添加`组`总计：

    1.  在设计视图中，右键单击位于`区域`和`应纳税额`的单元格，如图 2-21 所示。


    ![A395630_1_En_2_Fig21_HTML.jpg](img/A395630_1_En_2_Fig21_HTML.jpg)

    图 2-21. 位于 `区域` 和 `应纳税额` 的单元格


    2.  选择`添加总计`。网格底部将出现一个新行，其中包含`[Sum(TotalDue)]`表达式。

    3.  在网格底部的`销售订单 ID`列对应的单元格中输入以下内容：`[组]的总计`。请注意，你能够在同一个单元格中包含文本和字段（称为占位符），而无需创建表达式。


    报告定义应如图 2-22 所示。


    ![A395630_1_En_2_Fig22_HTML.jpg](img/A395630_1_En_2_Fig22_HTML.jpg)

    图 2-22. 添加`组`总计后的报告定义


    在设计窗口的底部，你会看到`行组`和`列组`部分，你将在第 5 章了解更多关于它们的内容。分组级别可以在这些部分中添加和配置。选择报告顶部的`组`文本框，这会改变`行组`部分中显示的内容。右键单击`行组`下的`list1_Group`，然后选择`添加总计`
    ➤ `之后`，如图 2-23 所示。


    ![A395630_1_En_2_Fig23_HTML.jpg](img/A395630_1_En_2_Fig23_HTML.jpg)

    图 2-23. 添加总计


    这只是添加了一行，你还需要在其中添加表达式。右键单击报告底部的新文本框并选择`表达式`。输入此表达式并点击`确定`：


    ```

    ="总计 " & FormatCurrency(Sum(Fields!TotalDue.Value),2,0,True,True)

    ```


    在屏幕顶部，你会看到一个格式化菜单栏，如图 2-24 所示。此菜单栏类似于在其他程序（如 Microsoft Word）中的操作。


    ![A395630_1_En_2_Fig24_HTML.jpg](img/A395630_1_En_2_Fig24_HTML.jpg)

    图 2-24. 格式化菜单栏


    确保选中新文本框，然后单击右对齐图标。点击`B`图标以加粗文本。报告定义现在应类似于图 2-25。


    ![A395630_1_En_2_Fig25_HTML.jpg](img/A395630_1_En_2_Fig25_HTML.jpg)

    图 2-25. 添加总计后的报告定义


    现在预览报告。每一页都将包含该`组`的总计。最后一页将包含一个总计。图 2-26 显示了报告第 3 页及新增的总计。


    ![A395630_1_En_2_Fig26_HTML.jpg](img/A395630_1_En_2_Fig26_HTML.jpg)

    图 2-26. 带有新总计的格式化报告的第 3 页'
- fmt: "# Part II\n## Report Development\n\n## Creating a Matrix Report\n\nDuring\
    \ the previous exercise, you created the solution and project along with the report\
    \ while running the wizard. You can also add a new report to an existing project\
    \ with the wizard. In this section, you will add a matrix report to the project.\n\
    \nA matrix report is often a more compact report than a tabular report. In a matrix\
    \ report, one or more of the columns of the data will be pivoted to become a column\
    \ header. In this example, the data will be pivoted by year. To show how this\
    \ works, view the results of this query that returns the total sales by year for\
    \ North America.\n\n```sql\nSELECT T.[Group], T.Name As Region, YEAR(OrderDate)\
    \ AS OrderYear,\nSUM(TotalDue) AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\n\
    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group]\
    \ = 'North America'\nGROUP BY T.[Group], T.Name , YEAR(OrderDate)\nORDER BY Region,\
    \ OrderYear;\n```\n\nYou can see the partial results of the query in Figure [2-27](#A395630_1_En_2_Chapter.html#Fig27).\n\
    \n![A395630_1_En_2_Fig27_HTML.jpg](A395630_1_En_2_Fig27_HTML.jpg)\n\nFigure 2-27.\
    \ The partial results of the total sales by year\n\nIn order to compare by year—in\
    \ other words, to easily compare the 2011 Canadian sales to the 2011 Central sales—you\
    \ can pivot the data. Here is a query that pivots the values of `OrderYear` into\
    \ columns.\n\n```sql\nSELECT [Group], Region,\n[2011], [2012], [2013], [2014]\n\
    FROM\n(SELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\nSUM(TotalDue)\
    \ AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group] = 'North America'\n\
    GROUP BY T.[Group], T.Name , YEAR(OrderDate)\n) AS SourceTable\nPIVOT\n(SUM(TotalSales)\n\
    FOR OrderYear IN ([2011], [2012], [2013], [2014])\n)\nAS PivotTable\nORDER BY\
    \ Region;\n```\n\nFigure [2-28](#A395630_1_En_2_Chapter.html#Fig28) shows the\
    \ results.\n\n![A395630_1_En_2_Fig28_HTML.jpg](A395630_1_En_2_Fig28_HTML.jpg)\n\
    \nFigure 2-28. The pivoted results\n\nThe T-SQL pivot query syntax is complex,\
    \ and you must hard-code the column names in the query. Fortunately, creating\
    \ pivoted results in SSRS is really easy, and no hard-coding is involved.\n\n\
    Follow these steps to create the matrix report:\n\n1.  To kick off the wizard\
    \ within the project, right-click the `Reports` folder in the `Solution Explorer`\
    \ window and select `Add New Report` as shown in Figure [2-29](#A395630_1_En_2_Chapter.html#Fig29).\n\
    \n![A395630_1_En_2_Fig29_HTML.jpg](A395630_1_En_2_Fig29_HTML.jpg)\n\nFigure 2-29.\
    \ How to kick off the wizard\n\n2.  Once the wizard starts up, click `Next` to\
    \ go past the welcome page.\n3.  On the `Select the Data Source` page, click `Edit`\
    \ to bring up the `Connection Properties`. Fill in the connection information\
    \ as was done in the section “Creating Your First Report” earlier in this chapter.\n\
    4.  After configuring the data source, click `Next`. In the `Design the Query`\
    \ page, use the same query that was used in the earlier example:\n\n```sql\n \
    \   SELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\n    Month(OrderDate)\
    \ AS OrderMonth,\n    OrderDate, SalesOrderID, TotalDue\n    FROM Sales.SalesOrderHeader\
    \ AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID;\n\
    ```\n\n5.  Click `Next` to move to the `Select the Report Type` page. Select `Matrix`\
    \ and click `Next`.\n6.  Configure the `Design the Matrix` page as shown in Figure\
    \ [2-30](#A395630_1_En_2_Chapter.html#Fig30). When you select a field on the right,\
    \ the section of the report where it will show is highlighted. This can help you\
    \ figure out which fields go where.\n\n![A395630_1_En_2_Fig30_HTML.jpg](A395630_1_En_2_Fig30_HTML.jpg)\n\
    \nFigure 2-30. The matrix fields configuration\n\n7.  Click `Next` and fill in\
    \ a report name. Call this `Matrix Report`.\n8.  Click `Finish` to complete the\
    \ wizard.\n\nNow you will see two reports in the `Reports` folder of the `Solution\
    \ Explorer`. To open a report, double-click the name. You can also switch between\
    \ open reports in the design area. To see how the matrix report turned out, click\
    \ `Preview`. The report should look like Figure [2-31](#A395630_1_En_2_Chapter.html#Fig31).\n\
    \n![A395630_1_En_2_Fig31_HTML.jpg](A395630_1_En_2_Fig31_HTML.jpg)\n\nFigure 2-31.\
    \ View the matrix report\n\nThe big difference between tabular and matrix reports\
    \ is that matrix reports have grouping levels across the columns. You will learn\
    \ much more about matrix reports in Chapter [5](#A395630_1_En_5_Chapter.html).\
    \ In the meantime, go back to the design view of the report to view the properties.\
    \ Figure [2-32](#A395630_1_En_2_Chapter.html#Fig32) shows how simple the design\
    \ of the matrix report really is.\n\n![A395630_1_En_2_Fig32_HTML.jpg](A395630_1_En_2_Fig32_HTML.jpg)\n\
    \nFigure 2-32. The matrix report design\n\nUsing the skills you have learned earlier\
    \ in the chapter, format the summary textbox. To make this report more complete,\
    \ you will add three total fields. Follow these instructions to add the totals.\n\
    \n1.  Right click on the textbox containing the expression `[Sum(TotalDue)]`.\n\
    2.  Choose `Add Total` ➤ `Row`.\n3.  Now repeat the process but this time select\
    \ `Add Total` ➤ `Column`.\n4.  Right-click the cell at the intersection of `Region`\
    \ and `Total`. Select `Add total`.\n5.  Select the `Total` column and click `B`\
    \ in the design menu to bold the font.\n6.  Select the bottom row and click `B`\
    \ to bold the font.\n7.  Right align the first row.\n\nThe report design will\
    \ now look like Figure [2-33](#A395630_1_En_2_Chapter.html#Fig33).\n\n![A395630_1_En_2_Fig33_HTML.jpg](A395630_1_En_2_Fig33_HTML.jpg)\n\
    \nFigure 2-33. The report design after adding the totals\n\nPreview the report.\
    \ You now have totals for all the regions and totals across the years. Figure\
    \ [2-34](#A395630_1_En_2_Chapter.html#Fig34) shows the report.\n\n![A395630_1_En_2_Fig34_HTML.jpg](A395630_1_En_2_Fig34_HTML.jpg)\n\
    \nFigure 2-34. The matrix report with totals\n\n## Summary\n\nMost reports, especially\
    \ if they take advantage of some of the advanced features of SSRS, cannot be created\
    \ with the wizard. The wizard is, however, perfect for simple reports. It is also\
    \ a great tool to help you begin learning to develop SSRS reports. In this chapter,\
    \ you created two reports. You then modified the properties so that they looked\
    \ professional and were ready to be deployed.\n\nIn Chapter [3](#A395630_1_En_3_Chapter.html),\
    \ you will learn how to configure data sources and datasets, the most basic elements\
    \ of reports.\n\n## 3. Understanding Data Sources and Datasets\n\nI deployed my\
    \ first group of SSRS reports back in 2004 when SQL Server Reporting Services\
    \ (`SSRS`) was initially released. The reports were so successful that word got\
    \ around to the other departments at the company where I worked. Soon I had more\
    \ requests for reports than I could handle. I was a database administrator first,\
    \ and creating reports was just a small part of my job. It wasn’t long before\
    \ I put together a day-long `SSRS` workshop to teach a small group of people from\
    \ each department how to develop their own reports.\n\nSince then, I have taught\
    \ `SSRS` development to dozens of people with classes, articles, and my original\
    \ `SSRS` book. Knowledge of data sources and datasets, covered in this chapter,\
    \ is fundamental to building reports. When teaching `SSRS`, I learned that these\
    \ topics are challenging to understand as well. Make sure you fully comprehend\
    \ the material covered in this chapter before moving on, and be sure to refer\
    \ back whenever you need help.\n\nThis chapter covers both data sources and datasets.\
    \ You will learn what they are, how to create them, and when it makes sense to\
    \ share them among reports. In Chapter [2](#A395630_1_En_2_Chapter.html), you\
    \ created the project and two reports by running the wizard. In this chapter,\
    \ you will build the reports manually."
