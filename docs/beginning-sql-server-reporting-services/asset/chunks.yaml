    ## 概述


    借助企业版中新增的移动报表功能，Microsoft 发布了一款能够随时随地向多种设备交付数据的产品。构建报表非常简单，并且内置了交互性，无需特殊编码。报表生成器自
    2005 年起就已存在。从那时起，它作为一款帮助高级用户构建自有报表和仪表板的工具，已经取得了显著的改进。新的关键绩效指标（KPI）也能让高管们只需瞥一眼，经过少量的开发时间，就能获取信息。


    本书面向初学者，但仍有更多内容值得学习。第 11 章讨论了一些随着您经验积累可能希望探索的高级主题。


    # 11. 后续学习路径


    为任何技术领域的初学者撰写书籍都面临着独特的挑战。哪些主题是合适的？哪些超出了范围？如何包含足够的内容让读者打好基础，又不至于使书籍过于庞大和昂贵？在每一章中，我都从开发人员和管理员的角度，思考了
    SQL Server Reporting Services（SSRS）新手可能会提出的问题。我试图用简单的方式解释，并涵盖足够的内容帮助您入门。为了避免增加不必要的复杂性，我没有提及某些功能。我希望本书能激发您学习更多知识的兴趣，并且它仅仅标志着您旅程的开始。


    当我撰写第 10 章时，我已经在思考本章将涵盖哪些内容。我意识到可以将高级信息分为五个领域：安装、架构与配置、开发、管理，以及与其他报告工具的集成。在本章中，我将在不深入细节的情况下，向您介绍这些领域中的一些高级功能。


    ## SSRS 安装


    在第 1 章中，您学习了如何在本机模式下将 SSRS 安装到您自己的计算机上，以便学习如何部署和管理报表。该章没有涵盖在 SharePoint 集成模式下安装
    SSRS。在过去几个版本的 SQL Server 和 SharePoint 中，在 SharePoint 模式下安装和配置 SSRS 变得更容易了，但仍然需要几个步骤。您还需要有一个
    SharePoint 场，而许多初学者可能无法获得。


    在 SharePoint 集成模式下运行 SSRS 有几个优点。您可以将报表开发添加到 SharePoint 内置的工作流功能中。例如，您可以要求新报表获得批准，并在发生更改时发送电子邮件通知。
    SharePoint 还具有文档版本管理功能，这是 Web 门户所不具备的。


    SharePoint 模式提供两个本机模式所不具备的功能。其一是 Power View 报表。这些报表旨在通过拖放操作供最终用户进行即席报告。报表基于预定义的数据模型，创建报表的人可以在构建报表的同时探索数据。报表具有高度交互性。例如，通过单击图表中的某个条形，整个报表就会被筛选。只需单击即可快速将可视化效果更改为不同类型。图
    11-1 是我根据预定义的数据模型，通过大约 30 次鼠标点击创建的 Power View 报表设计视图图片。其中的可视化反映的是实际数据。


    ![A395630_1_En_11_Fig1_HTML.jpg](img/A395630_1_En_11_Fig1_HTML.jpg)


    图 11-1. Power View 报表


    另一个仅在部署到 SharePoint 的报表中可用的功能是数据警报。根据数据警报中定义的条件，当报表的数据发生变化时，将触发一封电子邮件。这样，只有当数据发生重要变化时，才查看报表。


    如果您喜欢新的 Web 门户，但希望能自定义其外观和感觉，那么您很幸运。从 SSRS 2016 开始，您可以利用自定义品牌功能来调整 Web 门户的外观。图
    11-2 是来自 SSRS 团队博客（网址为 [`https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/`](https://blogs.msdn.microsoft.com/sqlrsteamblog/2016/03/20/how-to-create-a-custom-brand-package-for-reporting-services-with-sql-server-2016/)
    ）的一个带有 Xbox 品牌的 Web 门户图片。


    ![A395630_1_En_11_Fig2_HTML.jpg](img/A395630_1_En_11_Fig2_HTML.jpg)


    图 11-2. 自定义 Web 门户


    ## 架构与配置


    在您学习 SSRS 的过程中，您可能将所有需要的东西都安装在一台计算机上：一个包含源数据库和 Reporting Services 数据库的 SQL Server
    实例、装有 SQL Server Data Tools（SSDT）的 Visual Studio，以及一个 SSRS 实例。这是最简单的配置。大多数时候，开发人员可能只在本地安装了带有
    SSDT 的 Visual Studio，而 SSRS 和 SQL Server 实例则托管在其他服务器上。比这更复杂的是横向扩展配置，其中 SSRS 实例部署在两个或更多服务器上。此配置允许在任何给定时间运行更大量的报表。图
    11-3 展示了横向扩展架构的样貌。


    ![A395630_1_En_11_Fig3_HTML.jpg](img/A395630_1_En_11_Fig3_HTML.jpg)


    图 11-3. 横向扩展架构


    即使是典型的 SSRS 部署，也可能需要根据您的具体情况更改一些无法通过 Reporting Services 配置管理器获得的设置。请务必查阅在线文档，了解您可能需要在
    Program Files 的 SQL Server 部分中找到的 `rsreportserver.config` 文件中配置的设置。


    ## 开发


    本书有几章专门介绍报表开发。您学习了分组、可视化、表达式等内容。我曾见过一个演示，其中使用地图可视化，根据数据库中的值“种植”一朵虚拟花朵。显然，在设计报表时，尤其是对于我们当中更有创造力的人来说，可能性是无限的。


    几乎每个对象的每个属性都可以通过表达式动态控制。本书演示了如何创建少量表达式。我鼓励您学习书中未使用的所有函数。一些开发人员会向其报表添加自定义函数，甚至是用
    C# 编写的自定义程序集。


    如果您对编写代码不太熟练，另一个有趣的练习是创建一个包含公司徽标、颜色和页脚的模板。创建报表后，使用描述性名称将 rdl 文件保存在此文件夹中：


    ```

    C:\Program Files (x86)\Microsoft Visual Studio 4.0\Common7\IDE\PrivateAssemblies\ProjectItems\ReportProject

    ```


    然后，当您向项目添加新报表时，该模板将成为选项之一，并且默认具有模板中定义的所有属性。

    '
- fmt: '# Administration


    In Chapters [8](#A395630_1_En_8_Chapter.html) and [9](#A395630_1_En_9_Chapter.html),
    you learned about deploying reports and controlling the security. You also learned
    how to set up a subscription. There are several properties of deployed reports
    that you did not learn about such as caching and snapshots.


    ## Caching


    Caching is a feature used to save and reuse reports where the data will not frequently
    change to improve performance. For example, imagine that several people will run
    a report based on the previous month’s sales. The data will not change, so you
    could take advantage of caching to save the report so that it runs quickly the
    second and subsequent times it is run.


    I once worked on a project that compared data migrated from an old system to data
    from a new system. A business analyst would select values from a number of parameters
    on the report and then go back and forth between reports drilling down and viewing
    the data in different ways. Some of the required queries were painstakingly slow,
    and there was nothing we could do to improve them. The analysts were spending
    more time waiting than actually viewing the data. Since the data was not changing
    that often, I set up caching with a 30-minute expiration. The analysts had to
    put up with a slow query just the first time it ran with a given set of parameters.
    This made the solution workable and the analysts were able to do their jobs. Figure
    [11-4](#A395630_1_En_11_Chapter.html#Fig4) shows the Caching feature.


    ![A395630_1_En_11_Fig4_HTML.jpg](A395630_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. The Caching feature


    ## History Snapshots


    The other interesting feature is History Snapshots. History Snapshots are similar
    to subscriptions in that default parameter values must be defined and the data
    source must store the credentials. You can create a snapshot manually or set up
    a schedule. Either way, you can go back to view the snapshot later and the report
    will show the data as it looked at the time the snapshot was taken.


    # Integration


    Since the introduction of `SSRS`, there has been a Report Manager and now a web
    portal for hosting the reports. Eventually, integration with SharePoint was added.
    Developers have embedded reports within applications with a report viewer control.
    You can also use a special URL (`uniform resource locator`) to display a report
    outside the web portal. If you add `rs:Embed=true` to the end of the report’s
    URL from the web portal, it will display in a browser without the web portal heading
    and menus.


    One icon that you may not have noticed, shown in Figure [11-5](#A395630_1_En_11_Chapter.html#Fig5),
    from the report menu allows you to export a data feed. The data feed can be used
    as a data source for `Power Pivot`, the advanced `Excel` feature. `Power Pivot`
    can be used to combine large amounts of data from one or more sources. The resulting
    workbook can be used as the basis of `Power View` reports. Not only is `SSRS`
    a way to view data, it can also be the source of data for another reporting tool.


    ![A395630_1_En_11_Fig5_HTML.jpg](A395630_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. The Export to Data Feed icon


    `SSRS` is one of several reporting tools from Microsoft including the time-honored
    `Excel` and the new cloud solution, `Power BI`. `SSRS` is considered the on-premises
    reporting solution, especially for paginated reports. With the 2016 release of
    `SSRS`, however, `SSRS` knows no boundaries. `SSRS` integrates with the cloud
    solutions `Power BI` and SharePoint Web, and you have seen the new mobile reports
    that can be delivered to mobile devices. Over the past few years, some people
    have predicted the demise of `SSRS`. With the 2016 revamp, `SSRS` is alive and
    well and ready for the future.


    # Summary


    `SQL Server Reporting Services` is a wonderful topic to learn about. Many people
    get their start in information technology (`IT`) as report developers. For many
    careers, both `IT` and otherwise, report development is seen as a desired skill.
    I often talk to people who work in non-`IT` roles such as human resources who
    need to learn `T-SQL` and `SSRS` for their jobs. In the `IT` department where
    I used to work, I was called on to create reports from our help desk ticketing
    system and our network management tools. Even within `IT`, we needed to see data
    from our own systems.


    This book is an introduction to the popular reporting tool, `SQL Server Reporting
    Services`. This chapter reviewed some of the advanced topics you may want to consider
    as next steps in your learning. I hope you enjoyed learning about `SSRS`. I certainly
    enjoyed writing about it!'
