  trans: '## 确保交付安全


    默认情况下，报表数据在网络上以未加密方式传输。在您的环境中，这可能构成安全风险。您可以配置 `SSRS` 使用安全套接层 (`SSL`) 协议。这是您在进行网上购物或访问银行网站时看到的、用于建立安全连接的网络协议。要正确配置
    `SSL`，您需要从受信任的证书颁发机构购买证书。


    获取证书并将其安装在服务器上后，可以通过启动 `Reporting Service Configuration Manager` 来进行配置。在 `Web
    Portal URL` 页面上，点击 `Advanced`。通过点击 `Advanced Multiple Web Site Configuration`
    对话框底部的 `Add`，可以将 `SSL` 证书绑定到 `SSRS`。图 9-27 显示了您将用于配置 `SSL` 的对话框。


    ![A395630_1_En_9_Fig27_HTML.jpg](img/A395630_1_En_9_Fig27_HTML.jpg)


    图 9-27. 用于配置 `SSL` 的对话框


    ## 总结


    保护您的报表安全非常重要，但如果您在开始发布报表之前没有制定策略，可能会变得非常复杂且难以管理。请务必规划好文件夹的布局，并且切勿直接在报表上配置安全设置，只应在文件夹上进行配置。


    安全配置在两个层面进行：数据源层面和 `SSRS` 层面。预定义的服务器和文件夹角色使安全管理更加简单。您还可以通过订阅配置报表自动交付。


    第 10 章将介绍如何直接使用 `Report Builder` 通过 `web portal` 创建报表。同时也会涵盖 2016 版新增的两种报表类型：`KPIs`
    和 `Mobile Reports`。


    # 10. 创建自助式和移动报表


    不久前，我和我四岁的孙女以及即将满两岁的孙子在桌边玩游戏。当我的智能手机在够不着的地方发出收到几条短信的提示音时，我的孙子抓起设备递给我，一边说：“你的电话！你的电话！”当我让他看手机上的照片时，他立刻开始滑动屏幕。我知道他是在模仿周围大人的行为，但今天的孩子们从出生起就接触科技了。


    过去几年世界变化如此之大。我们要求能够立即从任何所在位置访问我们的数据。当我们持续连接到社交媒体和工作岗位时，工作和娱乐常常交融在一起。无论好坏，这都是新的现实。


    在本书中，您一直使用 `Visual Studio` 内的 `SQL Server Data Tools (SSDT)` 来创建报表。`Visual Studio`
    是一款开发工具，但终端用户常常希望创建自己的报表和仪表板。他们也要求在公司内网之外使用平板电脑和手机时能跟上数据更新。在本章中，您将学习如何使用终端用户工具
    `Report Builder` 创建报表。您还将创建 `mobile reports` 和 `key performance indicators (KPIs)`，这是
    `SQL Server 2016` 的 `Enterprise` 和 `Developer Editions` 中提供的两个新功能。


    ## 使用 Report Builder


    自首次随 `SQL Server 2005` 发布以来，`Report Builder` 已经历了数次迭代。当前版本利用已发布的数据集和报表部件，使得构建报表比在
    `SSDT` 中容易得多。不过，也可以从头开始构建报表，其方式与使用 `SSDT` 非常相似。`Report Builder` 还包含 `SSDT` 中没有的附加向导。本书中您学到的功能仍然存在，例如属性页和表达式。表
    10-1 列出了 `SSDT` 和 `Report Builder` 之间的区别。


    表 10-1. `SSDT` 和 `Report Builder` 之间的区别


    | 功能 | SSDT | Report Builder |

    | --- | --- | --- |

    | 目标受众 | 报表开发人员 | 高级用户 |

    | 外观和感觉 | Visual Studio | Microsoft Office |

    | 组织方式 | 基于项目 | 单个报表 |

    | 部署方式 | 部署或上传 | 保存 |

    | 报表部件 | 部署报表部件 | 使用和部署报表部件 |


    组织中希望创建自己报表的高级用户和其他人将受益于可使用的预构建报表部件、参数列表和数据集。这仍然会给报表开发人员带来工作，但有助于确保高级用户无需成为专业的
    `T-SQL` 程序员或完全理解源数据库，就能高效使用 `Report Builder`。


    第 8 章描述了如何部署报表，包括报表部件。如果您没有跟随第 8 章的操作，请返回并完成“从 `SSDT` 部署报表”和“部署报表部件”小节中的步骤。要开始使用
    `Report Builder`，请按照以下步骤操作：


    1.  启动 `web portal`。

    2.  通过从菜单中选择 `New` ➤ `Folder` 创建一个新文件夹。

    3.  输入 `Ad Hoc Reports` 作为名称，然后单击 `Create`。

    4.  创建文件夹后，单击它以导航进入其中。

    5.  单击 `New` ➤ `Paginated Report`，如图 10-1 所示。


    ![A395630_1_En_10_Fig1_HTML.jpg](img/A395630_1_En_10_Fig1_HTML.jpg)


    图 10-1. 创建新的分页报表

    6.  您可能会看到一条消息，询问是否允许浏览器启动应用程序。单击 `Allow`。

    7.  如果这是您第一次启动 `Report Builder`，您将看到一条消息，提示您下载并安装它，如图 10-2 所示。


    ![A395630_1_En_10_Fig2_HTML.jpg](img/A395630_1_En_10_Fig2_HTML.jpg)


    图 10-2. 安装 `Report Builder` 的链接

    8.  `Get Report Builder` 链接将带您到 `Microsoft.com` 上的一个页面，您可以在那里下载该应用程序。请按照页面上的说明操作。即使在安装了
    `Report Builder` 后，我仍然会看到该消息，但我只是将其关闭。

    9.  运行安装向导时，系统将提示您输入目标服务器 `URL`（统一资源定位符）。输入您在第 8 章“从 `SSDT` 部署报表”小节中确定的 `web service
    URL`。图 10-3 显示了一个示例 `URL`。


    ![A395630_1_En_10_Fig3_HTML.jpg](img/A395630_1_En_10_Fig3_HTML.jpg)


    图 10-3. `Default Target Server` 属性

    10.  安装后，您可能需要再次从菜单中选择 `New` ➤ `Paginated Report` 才能实际启动 `Report Builder` 工具。

    11.  同意可能出现的任何警告。

    12.  `Report Builder` 启动后，您将看到 `New Report or Dataset` 对话框，如图 10-4 所示。


    ![A395630_1_En_10_Fig4_HTML.jpg](img/A395630_1_En_10_Fig4_HTML.jpg)


    图 10-4. `New Report or Dataset` 对话框

    13.  选择 `Blank Report`。

    14.  您将看到报表设计区域，如图 10-5 所示。


    ![A395630_1_En_10_Fig5_HTML.jpg](img/A395630_1_En_10_Fig5_HTML.jpg)


    图 10-5. 报表设计区域'
- fmt: '# Report Builder 使用指南


    ## 界面概览


    你会注意到设计区域与你在 SSDT 中开发报告时看到的设计区域非常相似。不过，其菜单风格更类似于 Microsoft Office 中的功能区菜单。这里没有工具箱；你需要从如图
    10-6 所示的“插入”功能区中添加控件。


    ![A395630_1_En_10_Fig6_HTML.jpg](A395630_1_En_10_Fig6_HTML.jpg)

    *图 10-6. 插入功能区*


    如图 10-7 所示的“视图”功能区用于切换应用程序中窗口的可见性。


    ![A395630_1_En_10_Fig7_HTML.jpg](A395630_1_En_10_Fig7_HTML.jpg)

    *图 10-7. 视图功能区*


    ## 构建报告与使用报表部件


    你可以运用本书中学到的技能来构建报告，也可以使用 Report Builder 附带的各种向导。在本节中，你将学习一项在 SSDT 中无法完成的操作：将现有的报表部件整合到报告中。要使用报表部件，你必须连接到正在运行的
    SQL Server Reporting Services (`SSRS`) 实例。请遵循以下步骤：


    1.  在“插入”功能区上，点击“报表部件”。

    2.  这将打开右侧的“报表部件库”窗口，如图 10-8 所示。


    ![A395630_1_En_10_Fig8_HTML.jpg](A395630_1_En_10_Fig8_HTML.jpg)

    *图 10-8. 报表部件库*


    3.  默认情况下，你根据名称搜索报表部件。你可以通过选择“添加条件”并选择一个项目来搜索更多条件，如图 10-9 所示。选择“类型”。


    ![A395630_1_En_10_Fig9_HTML.jpg](A395630_1_En_10_Fig9_HTML.jpg)

    *图 10-9. 添加条件菜单*


    4.  这将导致“类型”菜单显示，如图 10-10 所示。选择“图表”。


    ![A395630_1_En_10_Fig10_HTML.jpg](A395630_1_En_10_Fig10_HTML.jpg)

    *图 10-10. 类型菜单*


    5.  你可以在“搜索名称和描述”框中键入名称，但如果只点击放大镜图标，所有图表项目都会显示，如图 10-11 所示。只要发布的部件不多，这没问题。


    ![A395630_1_En_10_Fig11_HTML.jpg](A395630_1_En_10_Fig11_HTML.jpg)

    *图 10-11. 报表部件搜索结果*


    6.  要移除“类型”条件，点击“类型”标签并选择“移除”，如图 10-12 所示。


    ![A395630_1_En_10_Fig12_HTML.jpg](A395630_1_En_10_Fig12_HTML.jpg)

    *图 10-12. 移除一个条件*


    7.  将一个或多个图表拖放到报告上。你会看到报表数据对象被自动创建，如图 10-13 所示。


    ![A395630_1_En_10_Fig13_HTML.jpg](A395630_1_En_10_Fig13_HTML.jpg)

    *图 10-13. 报表数据窗口*


    8.  要在 Report Builder 内查看报告，点击“主页”功能区上的“运行”图标，如图 10-14 所示。


    ![A395630_1_En_10_Fig14_HTML.jpg](A395630_1_En_10_Fig14_HTML.jpg)

    *图 10-14. 运行图标*


    9.  要返回设计视图，点击“运行”功能区中的“设计”图标，如图 10-15 所示。


    ![A395630_1_En_10_Fig15_HTML.jpg](A395630_1_En_10_Fig15_HTML.jpg)

    *图 10-15. 设计图标*


    ## 保存与发布报告


    一旦报告完成，你可以将其保存到文件系统或发布。请按照以下步骤发布报告：


    1.  从“文件”菜单中，点击“保存”。这将打开一个类似于文件保存对话框的窗口，如图 10-16 所示。


    ![A395630_1_En_10_Fig16_HTML.jpg](A395630_1_En_10_Fig16_HTML.jpg)

    *图 10-16. 另存为报表对话框*


    2.  为你的报告键入一个名称，然后点击“保存”。默认情况下，它保存在你启动 Report Builder 的文件夹中。你也可以根据需要导航到其他文件夹。


    从图 10-16 所示的对话框中，你也可以将报表定义本地保存。如图 10-17 所示的“文件”菜单可以让你如预期般从各种位置保存和打开报告。你还可以发布你创建的报表部件。“检查更新”项会更新你的报告所使用的报表部件，以防原始发布的报表部件已被更改。


    ![A395630_1_En_10_Fig17_HTML.jpg](A395630_1_En_10_Fig17_HTML.jpg)

    *图 10-17. 文件菜单*


    ## 其他功能与注意事项


    在 Web 门户中，通过报告上的“管理”菜单，你可以启动 Report Builder 进行编辑，如图 10-18 所示。你也可以创建 Report Builder
    的快捷方式或将其固定到任务栏。


    ![A395630_1_En_10_Fig18_HTML.jpg](A395630_1_En_10_Fig18_HTML.jpg)

    *图 10-18. 在 Report Builder 中编辑图标*


    Report Builder 可用于创建数据集以及报告。在本章后续部分，你将使用 Report Builder 创建几个数据集。


    Report Builder 是一个极好的工具。事实上，一些公司完全使用它来进行报告开发。我看到的唯一缺点是它没有与源代码控制软件集成。你可以使用源代码控制，但这将是一个手动过程。


    要赋予高级用户使用 Report Builder 和发布报告的能力，请确保他们位于站点范围的“系统用户”组中，并且在任何允许他们创建报告的文件夹中具有“浏览器”、“发布者”和“Report
    Builder”角色。'
  raw: 'You’ll notice that the design area looks very similar to the design area you
    have seen while developing reports in SSDT. The menu style, however, is more like
    the ribbon menus found in Microsoft Office. There is no toolbox; you will add
    controls from the Insert ribbon shown in Figure [10-6](#A395630_1_En_10_Chapter.html#Fig6).


    ![A395630_1_En_10_Fig6_HTML.jpg](A395630_1_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    The Insert ribbon


    The View ribbon shown in Figure [10-7](#A395630_1_En_10_Chapter.html#Fig7) toggles
    the visibility of windows in the application.


    ![A395630_1_En_10_Fig7_HTML.jpg](A395630_1_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    The View ribbon


    You can use the skills you have learned throughout the book to build reports.
    You can also use the various wizards that come with Report Builder. In this section
    you will learn to do something that can’t be done in SSDT, incorporate existing
    Report Parts into a report. To use Report Parts, you must be connected to a running
    SQL Server Reporting Services (SSRS) instance. Follow these steps:


    1.  From the Insert ribbon, click Report Parts.  

    2.  This opens the Report Part Gallery window on the right side as shown in Figure
    [10-8](#A395630_1_En_10_Chapter.html#Fig8).


    ![A395630_1_En_10_Fig8_HTML.jpg](A395630_1_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    The Report Part Gallery  

    3.  By default, you search for report parts based on the name. You can search
    additional criteria by selecting Add Criteria and selecting an item as shown in
    Figure [10-9](#A395630_1_En_10_Chapter.html#Fig9). Select Type.


    ![A395630_1_En_10_Fig9_HTML.jpg](A395630_1_En_10_Fig9_HTML.jpg)


    Figure 10-9.


    Add Criteria menu  

    4.  This causes the Type menu to display as shown in Figure [10-10](#A395630_1_En_10_Chapter.html#Fig10).
    Select Chart.


    ![A395630_1_En_10_Fig10_HTML.jpg](A395630_1_En_10_Fig10_HTML.jpg)


    Figure 10-10.


    The Type menu  

    5.  You can type a name in the Search Name and Description box, but if you just
    click the magnifying glass icon, all the Chart items will display as shown in
    Figure [10-11](#A395630_1_En_10_Chapter.html#Fig11). As long as there are not
    many published parts, this is fine.


    ![A395630_1_En_10_Fig11_HTML.jpg](A395630_1_En_10_Fig11_HTML.jpg)


    Figure 10-11.


    The results of the report part search  

    6.  To remove the Type, click the Type label and select Remove as shown in Figure
    [10-12](#A395630_1_En_10_Chapter.html#Fig12).


    ![A395630_1_En_10_Fig12_HTML.jpg](A395630_1_En_10_Fig12_HTML.jpg)


    Figure 10-12.


    Remove a criteria  

    7.  Drag one or more of the charts to the report. You will see that the Report
    Data objects are created automatically as shown in Figure [10-13](#A395630_1_En_10_Chapter.html#Fig13).


    ![A395630_1_En_10_Fig13_HTML.jpg](A395630_1_En_10_Fig13_HTML.jpg)


    Figure 10-13.


    The Report Data window  

    8.  To view the report inside Report Builder, click the Run icon found on the
    Home ribbon as shown in Figure [10-14](#A395630_1_En_10_Chapter.html#Fig14).


    ![A395630_1_En_10_Fig14_HTML.jpg](A395630_1_En_10_Fig14_HTML.jpg)


    Figure 10-14.


    The Run icon  

    9.  To go back to Design view, click the Design icon in the Run ribbon as shown
    in Figure [10-15](#A395630_1_En_10_Chapter.html#Fig15).


    ![A395630_1_En_10_Fig15_HTML.jpg](A395630_1_En_10_Fig15_HTML.jpg)


    Figure 10-15.


    The Design icon


    Once the report is complete, you can either save it to your file system or publish
    it. Follow these steps to publish the report:


    1.  From the File menu, click Save. This brings up a dialog that looks like a
    file save dialog as shown in Figure [10-16](#A395630_1_En_10_Chapter.html#Fig16).


    ![A395630_1_En_10_Fig16_HTML.jpg](A395630_1_En_10_Fig16_HTML.jpg)


    Figure 10-16.


    The Save As Report dialog  

    2.  Type in a name for your report and click Save. By default, it is saved in
    the folder from where you launched Report Builder. You can also navigate to other
    folders as needed.


    From the dialog shown in Figure [10-16](#A395630_1_En_10_Chapter.html#Fig16),
    you can also save the report definition locally. The File menu shown in Figure
    [10-17](#A395630_1_En_10_Chapter.html#Fig17) will let you save and open reports
    from various locations as you might expect. You can also publish report parts
    that you have created. The Check For Updates item updates report parts that your
    report uses in case the originally published report part has been changed.


    ![A395630_1_En_10_Fig17_HTML.jpg](A395630_1_En_10_Fig17_HTML.jpg)


    Figure 10-17.


    The File menu


    From within the web portal, from the Manage menu on a report, you can launch Report
    Builder to perform edits as shown in Figure [10-18](#A395630_1_En_10_Chapter.html#Fig18).
    You can also create a shortcut to Report Builder or pin it to the taskbar.


    ![A395630_1_En_10_Fig18_HTML.jpg](A395630_1_En_10_Fig18_HTML.jpg)


    Figure 10-18.


    The Edit in Report Builder icon


    Report Builder can be used to create datasets as well as reports. You will create
    several datasets using Report Builder in subsequent sections of this chapter.


    Report Builder is a fantastic tool. In fact, some shops use it exclusively for
    report development. The only downside that I see is that it does not integrate
    with source control software. You can use source control, but it will be a manual
    process.


    To give a power user the ability to use Report Builder and to publish reports,
    make sure they are in the site-wide System Users group and are in the Browser,
    Publisher, and Report Builder roles in any folders where they should be allowed
    to create reports.'
