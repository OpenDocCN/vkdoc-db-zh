- fmt: "## Creating Drill Through Reports\n\nThis chapter is full of great ways to\
    \ make your reports dynamic, and the sky is the limit. There is one more feature\
    \ to show you that is frequently requested. This is the ability to click a cell\
    \ in a report and automatically navigate to another report containing the detail\
    \ rows.\n\nFollow these steps to create a detail report:\n1.  Add a new report\
    \ to the project named `Sales Details`.\n2.  Add a data source to the report named\
    \ `AdventureWorks` that points to the `AdventureWorks2016` shared data source.\n\
    3.  Add an embedded dataset to the report named `SalesDetails`. It should point\
    \ to the `AdventureWorks` data source.\n4.  The query should be\n    ```\n   \
    \ SELECT C.CustomerID, SalesOrderID, OrderDate, TotalDue,\n    T.TerritoryID,\
    \ T.Name AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN\
    \ Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS\
    \ S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate) = @Year AND T.TerritoryID\
    \ = @Territory;\n    ```\n5.  Add a table control to the report.\n6.  Populate\
    \ the table control with these fields: `CustomerID`, `Store`, `SalesOrderID`,\
    \ `OrderDate`, and `TotalDue`.\n7.  Bold the header row and format the `TotalDue`\
    \ cell as currency. The design should look like Figure [6-39](#A395630_1_En_6_Chapter.html#Fig39).\n\
    \    ![A395630_1_En_6_Fig39_HTML.jpg](A395630_1_En_6_Fig39_HTML.jpg)\n    Figure\
    \ 6-39. The detail layout\n8.  Drag the table to the upper left and tighten up\
    \ the report canvas.\n9.  Add a Report Page Header to the report.\n10. Drag the\
    \ Report Name into the header from the Built-In Fields folder.\n11. Change the\
    \ font size to 14 pt and expand the width of the text box.\n12. Drag the `Year`\
    \ parameter to the header.\n13. Drag the `Territory` field from the `SalesDetails`\
    \ dataset into the header. Since this is outside the table, it will pull the first\
    \ value from the dataset. This works because the report is filtered by `TerritoryID`\
    \ so there is only one `Territory` value available. The report layout should resemble\
    \ Figure [6-40](#A395630_1_En_6_Chapter.html#Fig40).\n    ![A395630_1_En_6_Fig40_HTML.jpg](A395630_1_En_6_Fig40_HTML.jpg)\n\
    \    Figure 6-40. The report layout\n\nAt this point, it makes sense to run the\
    \ report to make sure it works. When you do, just enter `2011` and `3` for the\
    \ parameters. Instead of displaying parameter lists, this report will receive\
    \ the values from another report. The end user will always run the report by clicking\
    \ the summary report and should never need to see the parameters. Follow these\
    \ steps to hide the parameters:\n1.  Switch back to design view of the detail\
    \ report.\n2.  Open the properties of the `Year` parameter.\n3.  Change the `Select\
    \ parameter visibility` property to `Hidden` and click OK to accept the change.\n\
    4.  Repeat the process for the `Territory` parameter.\n\nThe next step is to add\
    \ an action to a cell in a summary report. Follow these steps to add an action:\n\
    1.  Create a copy of the `Sales by Territory Matrix` report. Name it `Sales Summary`.\n\
    2.  Double-click the `Sales Summary` report to open it in design view.\n3.  Right-click\
    \ and bring up the Text Box Properties of the cell that is at the intersection\
    \ of the `TerritoryID` and `OrderYear`. Figure [6-41](#A395630_1_En_6_Chapter.html#Fig41)\
    \ shows the cell to select.\n    ![A395630_1_En_6_Fig41_HTML.jpg](A395630_1_En_6_Fig41_HTML.jpg)\n\
    \    Figure 6-41. The cell to select\n4.  Select the Action page.\n5.  Select\
    \ `Go to report`.\n6.  In `Specify a report`, select `Sales Details`.\n7.  Click\
    \ `Add`. This adds a parameter from the `Sales Details` report to map to the `Sales\
    \ Summary` report. The `Name` property is the parameter needed by the `Sales Details`\
    \ report. In the `Value` property, you will map something from the summary report\
    \ to pass through to the detail report.\n8.  Select the `Year` parameter in the\
    \ `Name` column.\n9.  Select `OrderYear` from the `Value` list.\n10. Click `Add`\
    \ once more. This time, map `Territory` to the `TerritoryID` field. The dialog\
    \ should look like Figure [6-42](#A395630_1_En_6_Chapter.html#Fig42).\n    ![A395630_1_En_6_Fig42_HTML.jpg](A395630_1_En_6_Fig42_HTML.jpg)\n\
    \    Figure 6-42. The Action properties\n11. Click OK to accept the properties.\n\
    \nNow when your run the report click any of the total sales values on the `Territory`\
    \ row. The `Sales Details` report will open already filtered based on the value\
    \ you selected. To navigate back to the `Sales Summary` report, click the `Back\
    \ to Parent Report` button.\n\n## Summary\n\nIn this chapter you saw many ways\
    \ that you can make your report dynamic based on user interactivity or the data\
    \ itself. You can give the user the ability to filter the data or modify properties\
    \ with parameters. Text boxes and other controls can be formatted by expressions\
    \ based on the data. There are no limits to what you can do.\n\nIn Chapter [7](#A395630_1_En_7_Chapter.html),\
    \ you will learn about the visual elements that can be added to reports. These\
    \ elements can be used to make a report more informative with just a glance or\
    \ to create a dashboard.\n\n# 7. Bringing Data to Life Visually\n\nA picture is\
    \ worth a thousand words. When it comes to reports, a picture is worth a thousand\
    \ numbers as well. By adding charts, gauges, and maps, a report will tell an entire\
    \ story. I often joke that the higher up the organizational chart you go, the\
    \ more pictures you need in the report. These pictures tell a busy executive about\
    \ trends and the health of the company with just a glance.\n\nIn Chapter [4](#A395630_1_En_4_Chapter.html),\
    \ you saw how images stored in a database can be added to a report. In Chapter\
    \ [10](#A395630_1_En_10_Chapter.html), you will learn about an exciting new feature\
    \ that also takes advantage of visual elements, Mobile Reports. In this chapter,\
    \ you will add data connected visual elements to the reports and create a dashboard.\
    \ The look of all the visual elements have been updated in 2016, so they will\
    \ appear much different from those in previous versions."
