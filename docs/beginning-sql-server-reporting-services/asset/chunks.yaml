    ![A395630_1_En_8_Fig9_HTML.jpg](A395630_1_En_8_Fig9_HTML.jpg)


    Figure 8-9.


    Configure the TargetServerURL  

    10.  Click OK to save the change. You may have noticed that the port number automatically
    disappears if it’s at the default of 80.


    Take a look at Figure [8-10](#A395630_1_En_8_Chapter.html#Fig10). The OverwriteDatasets
    and OverwriteDataSources properties are set to False by default. This prevents
    you from overwriting data sources and datasets that have been deployed. This will
    come in handy if your data sources are pointing to development or test database
    servers. When you deploy a project to production, you won’t overwrite existing
    data sources with development connection strings.


    ![A395630_1_En_8_Fig10_HTML.jpg](A395630_1_En_8_Fig10_HTML.jpg)


    Figure 8-10.


    The OverwriteDatasets and OverwriteDataSources properties


    Now that your project is configured, you can deploy the project. Follow these
    steps:


    1.  Right-click the project name and select Deploy as shown in Figure [8-11](#A395630_1_En_8_Chapter.html#Fig11).


    ![A395630_1_En_8_Fig11_HTML.jpg](A395630_1_En_8_Fig11_HTML.jpg)


    Figure 8-11.


    Deploy the project


    Note


    If your SSRS installation is local, you may experience permission problems deploying
    the project and viewing the web portal. See the section “Configuring Local SSRS
    Settings” in Chapter [1](#A395630_1_En_1_Chapter.html).


    1.  Review the Output window to see if the deployment was successful as shown
    in Figure [8-12](#A395630_1_En_8_Chapter.html#Fig12).


    ![A395630_1_En_8_Fig12_HTML.jpg](A395630_1_En_8_Fig12_HTML.jpg)


    Figure 8-12.


    The Output window  

    2.  Now that the project is deployed, you can view the reports in the web portal.
    To find the URL to use, go back to SSRS Configuration Manager. This time select
    Web Portal URL. To open the web portal, click the URL as shown in Figure [8-13](#A395630_1_En_8_Chapter.html#Fig13).


    ![A395630_1_En_8_Fig13_HTML.jpg](A395630_1_En_8_Fig13_HTML.jpg)


    Figure 8-13.


    The Report Manager URL


    The Visual Reports folder should now be found in the Home folder of the web portal
