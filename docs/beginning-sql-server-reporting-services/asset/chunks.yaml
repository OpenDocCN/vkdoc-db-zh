  trans: "\n# 4. 处理表格、控件和报表区域\n\n过去大约 15 年是真人秀电视节目的时代。但早在《改头换面：家庭版》和《美国偶像》之前，公共电视上就已经存在真人秀节目了。我记得小时候和青少年时期观看过关于烹饪、房屋改造和瑜伽的无剧本节目。我最喜欢的是关于艺术的节目。理论上，你可以通过观看艺术家将空白画布变成美丽的静物或风景画来学习如何创作杰作。\n\
    \n虽然报表可能不是艺术品，但它们有一些相似之处。你也将从一张空白的画布开始，虽然报表上的数据至关重要，但报表的外观也同样重要。\n\n在本章中，你将学习更多关于表格以及用于构建报表的其他几种常见控件的知识。你还将学习如何添加页眉和页脚，为报表增添功能，使其更专业并准备好发布。\n\
    \n## 处理表格\n\n一个报表由多个对象组成，其中一些对象与数据集链接。其他对象向查看者提供有关报表的信息，例如标题或页数。还有一些对象是为了赋予报表特定的外观和感觉，例如公司徽标。最常用的数据区域是表格控件。第\
    \ 2 章和第 3 章介绍了表格。你将表格与数据链接并修改了一些属性。在本节中，你将学习更多关于表格的知识。\n\n注意\n\n在第 3 章中，你学习了如何创建项目、数据源和数据集。你还学习了如何向项目添加报表。从本章开始，我将不再逐步告诉你如何创建这些对象，而只会告诉你需要创建什么。记住在向项目添加新报表时点击\
    \ `添加` ➤ `新建项`，以避免启动向导。如果遇到问题，请回顾第 3 章。\n\n请按照以下步骤开始：\n\n1.  启动 `SQL Server Data\
    \ Tools (SSDT)`。\n2.  创建一个新的报表服务器项目，名称为 `Building Reports`，解决方案名称为 `Beginning\
    \ SSRS Chapter 4`。\n3.  添加一个指向 `AdventureWorks2016` 数据库的新的共享数据源。将其命名为 `AdventureWorks2016`。\n\
    4.  创建一个名为 `Working with Tables` 的新报表。确保你添加的是空白报表；不要启动向导。如果需要帮助，请参阅第 3 章。解决方案资源管理器应如图\
    \ 4-1 所示。\n\n![A395630_1_En_4_Fig1_HTML.jpg](img/A395630_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1. 解决方案资源管理器\n\n注意\n\n`始终显示解决方案` 属性决定当解决方案中只有一个项目时，解决方案名称是否可见。要了解如何设置此选项，请参见第\
    \ 1 章中的“SSDT 导览”部分。\n\n5.  在“报表数据”窗口中，添加一个数据源 `AdventureWorks`，指向共享数据源 `AdventureWorks2016`。\n\
    6.  为报表创建一个新的嵌入数据集，名为 `SalesSummary`，指向 `AdventureWorks` 数据源。\n7.  为报表键入以下查询：\n\
    \n```sql\n    SELECT YEAR(OrderDate) AS OrderYear, SUM(TotalDue) AS TotalSales\n\
    \    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate);\n```\n\n8.  数据集属性应如图\
    \ 4-2 所示。点击确定以创建数据集。\n\n![A395630_1_En_4_Fig2_HTML.jpg](img/A395630_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2. 数据集属性\n\n9.  创建第二个嵌入数据集，名为 `SalesDetails`，指向 `AdventureWorks` 数据源。\n\
    10. 将此查询添加到数据集并点击确定。\n\n```sql\n    SELECT CustomerID, SalesOrderID, OrderDate,\
    \ TotalDue\n    FROM Sales.SalesOrderHeader;\n```\n\n“报表数据”窗口应如图 4-3 所示。\n\n![A395630_1_En_4_Fig3_HTML.jpg](img/A395630_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3. 报表数据窗口\n\n现在数据集已就位，你可以开始构建报表了。向设计图面添加一个新表格。你可以通过从工具箱拖入表格控件，或者右键单击图面并选择\
    \ `插入` ➤ `表格` 来实现。\n\n每个表格只能链接到一个数据集。在本例中，你有两个数据集。一旦添加了第一个字段，表格就会链接到该字段所属的数据集。将鼠标悬停在单元格上会显示一个小的字段列表图标。如果只有一个数据集，你将点击该图标以调出字段列表。在本例中，由于有两个数据集，请将鼠标悬停在数据源名称上以查看两个数据集，如图\
    \ 4-4 所示。点击数据集名称会显示字段列表。\n\n![A395630_1_En_4_Fig4_HTML.jpg](img/A395630_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4. 表格可用的两个数据集\n\n选择 `SalesSummary` 下的 `OrderYear`。现在，当你移动到下一个数据单元格时，只有 `SalesSummary`\
    \ 的字段可用。为中间的单元格选择 `TotalSales`。你在右侧有一列多余。右键单击最右侧列上方的控制柄，选择 `删除列` 将其移除。\n\n在第一个表格下方向报表添加第二个表格。当你在图面上拖动第二个表格时，会出现蓝色的对齐参考线，帮助你确保对象对齐。对于此表，从\
    \ `SalesDetails` 数据集将 `CustomerID`、`SalesOrderID` 和 `OrderDate` 字段添加到报表中。默认情况下，表格有三列，但你需要显示四个字段。你可以通过将字段拖到第三列的右侧来添加额外的列。当你看到出现一个蓝色括号时，放下该字段。图\
    \ 4-5 显示了其外观。\n\n![A395630_1_En_4_Fig5_HTML.jpg](img/A395630_1_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5. 将新字段拖到表格中\n\n你也可以右键单击第三列并在其右侧插入一列。\n\n每当字段被添加到数据单元格时，单元格的名称会更改为字段的名称。标题单元格也会填充一个值，并在大写字母前添加空格。如果需要，你始终可以编辑标题单元格。\n"
- fmt: '### Property Window Properties


    There are dozens of properties available for a table. You can set some of them
    in the Properties window. Select the intersection of the row and column handles
    of the first table to select the table. With the table selected, press `F4` to
    open the Properties window. You can also click `View ➤ Properties Window` from
    the menu. At the top of the window shown in Figure [4-6](#A395630_1_En_4_Chapter.html#Fig6),
    you will see that the table is not called a table at all. It is a `Tablix`.


    Figure 4-6.

    ![A395630_1_En_4_Fig6_HTML.jpg](A395630_1_En_4_Fig6_HTML.jpg)


    The table is a Tablix Note


    A data region, such as a table, matrix, or list, is actually called a `Tablix`.
    Each one has a particular layout for displaying data. You can start with a table
    and turn it into a matrix by grouping on a column.


    Properties in the Properties window can be displayed either by categories of properties
    or alphabetically. Click the icons shown in Figure [4-7](#A395630_1_En_4_Chapter.html#Fig7)
    at the top of the Property window to toggle back and forth. There is also an icon
    that resembles a wrench to open the Property Pages window. You’ll learn more about
    the Property Pages in the next section.


    Figure 4-7.

    ![A395630_1_En_4_Fig7_HTML.jpg](A395630_1_En_4_Fig7_HTML.jpg)


    The property window icons


    Since `Tablix1` will be referred to several times in this chapter, give it a meaningful
    name: `tblSalesSummary`. To do this, change the `Name` property in the `General`
    category of the Properties window.


    Look for the `DataSetName` property in the `General` category of properties. Notice
    that the property is set to `SalesSummary`.


    As you click on each property, you will see a description of what the property
    does at the bottom of the Properties window. Most of the properties in the Properties
    window will not need to be changed, but whatever you change will affect the entire
    table. Change the `BorderStyle Default` property to `Dotted` and the `BorderWidth
    Default` property to `3 pt`. The Properties window should look like Figure [4-8](#A395630_1_En_4_Chapter.html#Fig8).


    Figure 4-8.

    ![A395630_1_En_4_Fig8_HTML.jpg](A395630_1_En_4_Fig8_HTML.jpg)


    The modified properties


    Preview the report . It should look like Figure [4-9](#A395630_1_En_4_Chapter.html#Fig9).


    Figure 4-9.

    ![A395630_1_En_4_Fig9_HTML.jpg](A395630_1_En_4_Fig9_HTML.jpg)


    The report with a dotted border on `tblSalesSummary`


    ### Property Dialog Properties


    In addition to the Properties window, most report objects have a property dialog
    box as well. The properties available to change between the two methods overlap.
    Some of the more advanced properties, such as those involving interacting with
    other reports, are only available in the properties dialog. My opinion is that
    it is much easier to work in the dialog box when you can.


    Note


    Every object added to the report has a name. By default the name will be the type
    of object plus a number. You may be wondering if you should give a descriptive
    name to every object. My rule is to name any object that will be referred to in
    an expression or calculation.


    Switch back to design view and select the second `Tablix`. When the handles appear,
    right-click the intersection of the two handles. Select `Tablix Properties` as
    shown in Figure [4-10](#A395630_1_En_4_Chapter.html#Fig10).


    Figure 4-10.

    ![A395630_1_En_4_Fig10_HTML.jpg](A395630_1_En_4_Fig10_HTML.jpg)


    Select `Tablix Properties`


    The `Tablix Properties` dialog has several pages. On the `General` page shown
    in Figure [4-11](#A395630_1_En_4_Chapter.html#Fig11), change the `Name` to `tblSalesDetails`.
    Type `Sales Details` in the `ToolTip` property. Under `Page break` option, check
    `Add a page break before`.


    Figure 4-11.

    ![A395630_1_En_4_Fig11_HTML.jpg](A395630_1_En_4_Fig11_HTML.jpg)


    The `General` page of the `Tablix Properties`


    Click OK to accept the property changes. Preview the report. Now `tblSalesDetails`
    will show up on the second page. Hover over the report to see the tooltip.


    Take a look at Figure [4-11](#A395630_1_En_4_Chapter.html#Fig11) once again. The
    properties shown in the `Row Headers` section to control the headers look like
    great ideas. They don’t work, however. If you go back to design view, check these
    properties and view the report, you will see that they don’t make any difference.
    The table headings will not be repeated on each page, and the header row will
    not be visible when scrolling. In Chapter [5](#A395630_1_En_5_Chapter.html), you
    will learn how to control the Row and Column headers.


    Figure [4-12](#A395630_1_En_4_Chapter.html#Fig12) shows the `Visibility` property
    page. You can choose to show or hide the table and to set the visibility of the
    table based on an expression. The value of a parameter might be a good expression
    to use.


    Figure 4-12.

    ![A395630_1_En_4_Fig12_HTML.jpg](A395630_1_En_4_Fig12_HTML.jpg)


    The `Visibility` properties


    Theoretically, you can toggle the visibility by an item chosen from the dropdown
    list. If you check `Display can be toggled by this report item` and set the property
    to any of the items in the list, the report will display an error when run, so
    make sure to uncheck this before closing out of the dialog. The error occurs because
    all of the items in the list are part of the table and they can’t be clicked before
    the report runs.


    The `Filters` page allows you to add filters to the data returned by the dataset.
    Generally, this is a bad idea, because you should filter at the database. This
    capability is useful, however, if the source of data is not filterable, such as
    from an XML file. I did run across a use case a few years ago. I needed to use
    the same dataset, just with different filters, in several tables on the same report.
    Instead of pulling the data multiple times with different filters, I used one
    dataset and filtered at each table.


    The most common reason I have found to bring up the `Tablix Properties` box is
    to change the display order of the data. The `Sorting` page is shown in Figure
    [4-13](#A395630_1_En_4_Chapter.html#Fig13). Click Add and select `CustomerID`.
    Click Add again and select `SalesOrderID`. Save the properties and preview the
    report to see that the data is now sorted.


    Figure 4-13.

    ![A395630_1_En_4_Fig13_HTML.jpg](A395630_1_En_4_Fig13_HTML.jpg)


    The `Sorting` page


    ## Other Report Components


    There are many other elements that you can add to reports to enable additional
    functionality or to make the report look more attractive and professional. Chapter
    [7](#A395630_1_En_7_Chapter.html) covers the visual elements such as charts and
    indicators, but you will take a look in this section at some of the more basic
    objects that you can add.


    There are many reasons to add independent `text box`es to reports (e.g., the report
    title and page number). Most of these objects should show up on each page. If
    you just add a `text box` to the top of the report body, it will show up only
    once. To make it show up on each page, include the information in a report page
    header.'
