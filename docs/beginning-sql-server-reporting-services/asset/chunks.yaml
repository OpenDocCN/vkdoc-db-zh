    in My Documents under Visual Studio 2015\. I suggest that you create a destination
    specifically for working with this book in a location that you prefer but that
    will be easy for you to locate. For the Name, type in Wizard Reports. This is
    actually the name of the project. As you type in the project name, it will automatically
    fill in the Solution Name. Override that by typing in Beginning SSRS Chapter [2](#A395630_1_En_2_Chapter.html).
    Before clicking OK, make sure that the properties look similar to those in Figure
