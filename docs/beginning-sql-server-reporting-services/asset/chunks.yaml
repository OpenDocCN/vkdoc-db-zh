    \ Footer Properties.  \n4.  Uncheck the Print on first page property in the Print\
    \ options section.  \n5.  Click OK to accept the change.  \n6.  From the Built-in\
    \ Fields folder in the Report Data window, drag Execution Time into the footer.\
    \  \n7.  Increase the width of the field so that it is about double the original\
    \ width.  \n8.  Add a text box to the footer. Be sure it lines up horizontally\
    \ with the execution time text box.  \n9.  Type this expression into the text\
    \ box: `Page [&PageNumber] of [&TotalPages]`. You could also bring up the Expression\
    \ dialog to help you write it.  \n\nCaution\n\nBy adding the Total Pages property,\
    \ the report must be completely built before the first page is returned to the\
    \ user. If the report is extremely large, this could give the impression of a\
    \ performance problem.\n\n1.  Double the width of the text box.  \n2.  Add a line\
    \ to the top of the footer.  \n3.  Level the line and drag the edges to the width\
    \ of the report.  \n\nWhen you run the report , the report footer on the second\
    \ page should look like Figure [4-20](#A395630_1_En_4_Chapter.html#Fig20).\n\n\
    ![A395630_1_En_4_Fig20_HTML.jpg](A395630_1_En_4_Fig20_HTML.jpg)\n\nFigure 4-20.\n\
    \nThe report footer"
  trans: "### 页面页眉\n\n与文本框和表格类似，页面页眉也具有可修改的属性，用于更改其外观或行为。例如，您可以添加背景色或图片。请按照以下步骤将页面页眉添加到报表中。\n\
    \n1.  右键单击报表画布，选择“插入” ➤ “页面页眉”。您也可以从“报表”菜单插入页面页眉。\n2.  右键单击页眉并选择“插入”。如图 4-14 所示，您可以添加的控件列表非常短。它仅限于无需连接到数据的控件。选择\
    \ `文本框`。\n    ![A395630_1_En_4_Fig14_HTML.jpg](img/A395630_1_En_4_Fig14_HTML.jpg)\n\
    \    图 4-14.\n    页眉的控件列表\n3.  在 `报表数据` 窗格中，展开 `内置字段`，将 `报表名称` 拖动到文本框。您也可以直接将字段拖到页眉以自动添加文本框。\n\
    4.  单击文本框的边缘，使其控制柄显示，如图 4-15 所示。\n    ![A395630_1_En_4_Fig15_HTML.jpg](img/A395630_1_En_4_Fig15_HTML.jpg)\n\
    \    图 4-15.\n    文本框上的控制柄\n5.  通过拖动控制柄，重新定位文本框，使其位于报表的左侧。\n6.  展开文本框，使其宽度与画布相同。\n\
    7.  选中文本框后，将文本居中。您可以通过单击菜单中的 `居中` 图标，或在 `文本框属性` 对话框的 `对齐` 页面上更改 `水平` 属性来实现。\n\
    8.  将字体大小更改为 `16 pt`。同样，有多种方法可以做到这一点。选择您喜欢的方式：设计菜单、`属性` 窗格或属性对话框。文本框会自动垂直增长，但您也可以手动增加其高度。\n\
    9.  单击文本框，在占位符后添加此文本：`: 销售详情`\n10. 选中文字 `销售详情`。如果 `属性` 窗格已打开，您会看到当前所选对象的名称是 `Selected\
    \ Text`。\n11. 将文字 `销售详情` 设为斜体。文本框应如图 4-16 所示。\n    ![A395630_1_En_4_Fig16_HTML.jpg](img/A395630_1_En_4_Fig16_HTML.jpg)\n\
    \    图 4-16.\n    单个文本框中的多种格式\n12. 在报表页眉中、文本框下方添加一个线条控件。\n13. 通过上下拖动一端来调整线条，使其变为水平。\n\
    14. 通过拖动两端来增加线条的长度。\n15. 在 `属性` 窗格中将 `线条宽度` 更改为 `2pt`。`线条宽度` 属性表示线条的粗细。线条是最简单的对象。它们没有属性对话框。\n\
    16. 复制该线条并粘贴到页眉中。\n17. 移动第二条线，使其靠近第一条线并位于其下方。\n18. 右键单击报表页眉，选择 `页眉属性`。\n19. 在\
    \ `打印` 选项部分，取消选中 `在首页打印`。\n20. 单击 `确定`。\n\n现在预览报表时，您将看到页眉从第 2 页开始显示，如图 4-17 所示。查看后续页面时，您将继续看到页面页眉。\n\
    ![A395630_1_En_4_Fig17_HTML.jpg](img/A395630_1_En_4_Fig17_HTML.jpg)\n图 4-17.\n\
    报表的第 2 页\n\n### 表格单元格格式化\n\n显然，您还可以做很多事情来使此报表看起来更好。首先，按照以下步骤更改 `OrderDate` 和 `TotalDue`\
    \ 字段的格式：\n\n1.  切换到设计视图。\n2.  右键单击 `OrderDate` 单元格，选择 `文本框属性`。\n3.  选择 `数字` 选项卡，在\
    \ `类别` 下选择 `日期`。\n4.  选择 `2000-01-31` 格式，然后单击 `确定`。\n5.  打开 `TotalDue` 单元格的 `文本框属性`。\n\
    6.  选择 `数字` 选项卡，在 `类别` 下选择 `货币`。\n7.  确保 `小数位数` 设置为 `2`。\n8.  勾选 `使用千位分隔符 (,)`，然后单击\
    \ `确定`。\n\n预览报表时，表格应如图 4-18 所示。\n![A395630_1_En_4_Fig18_HTML.jpg](img/A395630_1_En_4_Fig18_HTML.jpg)\n\
    图 4-18.\n格式化后的表格\n\n下一步是格式化标题行。幸运的是，您无需单独格式化每个单元格。请按照以下步骤格式化该行：\n\n1.  在设计视图中，单击\
    \ `tblSalesDetails` 的一个单元格。\n2.  此时会出现行和列的控制柄。选择标题行旁边的控制柄。\n3.  在 `属性` 窗格中，将 `背景色`\
    \ 更改为 `矢车菊蓝`。\n4.  将 `字体颜色` 属性更改为 `白色`。\n5.  将 `字体粗细` 属性更改为 `加粗`。\n6.  现在，单击 `销售订单\
    \ ID` 列。\n7.  通过逐个选中各列，然后在设计菜单中单击 `右对齐` 图标，将每列右对齐。\n8.  表格可能无法很好地对齐在报表页眉下方。请按照以下步骤调整报表。\n\
    9.  右键单击报表画布，选择 `视图` ➤ `标尺`。\n10. 拖动报表标题的右边缘，使其宽度为 `5 英寸（12.5 厘米）`。\n11. 选中两条线。按住\
    \ `CTRL` 键并按向右箭头键，直到线条排列在标题下方。\n12. 将报表画布的右边缘尽可能向左拖动，直到它碰到某个控件为止。\n\n为了使长报表更易于阅读，您可能希望交替显示行的背景色。不幸的是，没有可以直接更改的属性来实现这一点。但是，您可以使用表达式来控制\
    \ `背景色` 属性。选择数据行。在 `属性` 窗格中，将 `背景色` 更改为 `= IIf(RowNumber(Nothing) Mod 2 = 0, \"\
    浅蓝\", \"白色\")`。\n\n现在预览报表。报表的第 2 页应如图 4-19 所示。\n![A395630_1_En_4_Fig19_HTML.jpg](img/A395630_1_En_4_Fig19_HTML.jpg)\n\
    图 4-19.\n格式化后的销售报表\n\n使用表达式控制几乎任何属性的值是 SQL Server Reporting Services (SSRS) 的一个强大功能。要确定某个属性是否可以用表达式控制，请在属性列表或页面中查找\
    \ `表达式` 一词或 `fx` 符号。\n\n### 页面页脚\n\n页面页脚对于显示页码和查看报表的日期等信息也相当有用。要添加页面页脚，请按照以下步骤操作：\n\
    \n1.  切换到设计视图。\n2.  右键单击报表正文，选择 `插入` ➤ `页面页脚`。\n3.  右键单击页脚，选择 `页脚属性`。\n4.  在 `打印`\
    \ 选项部分，取消选中 `在首页打印` 属性。\n5.  单击 `确定` 接受更改。\n6.  从 `报表数据` 窗格的 `内置字段` 文件夹中，将 `执行时间`\
    \ 拖动到页脚。\n7.  增加该字段的宽度，使其约为原始宽度的两倍。\n8.  在页脚中添加一个文本框。确保它在水平方向上与执行时间文本框对齐。\n9.\
    \  在文本框中输入此表达式：`第 [&PageNumber] 页/共 [&TotalPages] 页`。您也可以打开 `表达式` 对话框来帮助您编写。\n\
    \n    **注意**\n    通过添加 `总页数` 属性，报表必须在将第一页返回给用户之前完全构建完成。如果报表非常大，这可能会给人一种性能问题的印象。\n\
    \n10. 将文本框的宽度加倍。\n11. 在页脚顶部添加一条线。\n12. 将线条调平，并将其两端拖动至报表宽度。\n\n运行报表时，第二页的报表页脚应如图\
    \ 4-20 所示。\n![A395630_1_En_4_Fig20_HTML.jpg](img/A395630_1_En_4_Fig20_HTML.jpg)\n\
    图 4-20.\n报表页脚"
- fmt: "### Report Cover Page\n\n报告的第一页可以作为封面页。你无法向设计画布添加单独的页面，但可以在表格或其他一些对象之前或之后添加分页符。在此例中，你已为\
    \ `tblSalesDetails` 表开启了分页前分页，并为第一页关闭了页眉和页脚。在此例中，你将添加一个矩形控件作为其他控件的容器。你将设置该矩形的\
    \ `PageBreak` 属性以强制分页。\n\n要创建封面页，请按照以下步骤操作：\n\n1.  在设计视图中，向下拖动页脚顶部以将报表体的大小增加到\
    \ 7 英寸（18 厘米）。图 [4-21](#A395630_1_En_4_Chapter.html#Fig21) 显示了页脚顶部（虚线）。\n\n  \
    \  ![A395630_1_En_4_Fig21_HTML.jpg](A395630_1_En_4_Fig21_HTML.jpg)\n\n    图 4-21.\n\
    \    报表页脚\n2.  向下拖动 `tblSalesSummary` 表，使其刚好位于页脚上方。\n3.  删除 `tblSalesSummary`\
    \ 表。\n4.  向报表添加一个矩形控件。\n5.  展开矩形，使其顶部紧接页眉下方，底部紧接 `tblSalesDetail` 表上方，且边缘与报表画布同宽。\n\
    6.  右键单击矩形内部并选择“矩形属性”。将边框属性更改为如图 [4-22](#A395630_1_En_4_Chapter.html#Fig22) 所示。\n\
    \n    ![A395630_1_En_4_Fig22_HTML.jpg](A395630_1_En_4_Fig22_HTML.jpg)\n\n    图\
    \ 4-22.\n    矩形边框属性\n7.  在“常规”页面上，勾选“之后添加分页符”。确保“尽可能将内容保持在单个页面上”被勾选。单击“确定”保存属性。\n\
    8.  调出 `tblSalesDetails` 表的“Tablix 属性”，取消勾选“之前添加分页符”属性，然后单击“确定”。\n9.  向矩形添加一个文本框并输入\
    \ `Sales Report`。\n10. 将字体大小更改为 `20 pt`。\n11. 将文本框定位在顶部附近并居中，然后适当调整其大小。\n12. 向矩形添加一个表格。\n\
    13. 从 `SalesSummary` 数据集填充 `OrderYear` 和 `TotalSales`。\n14. 删除最右边的列。\n15. 选择标题行并将字体加粗。\n\
    16. 将 `TotalSales` 单元格格式设置为货币格式，无小数位，带千位分隔符。\n17. 将每列右对齐。\n18. 更改表格，使其按 `OrderYear`\
    \ 排序。\n19. 向矩形顶部添加一个图像控件。\n20. 将出现“图像属性”对话框。单击“导入”并导航到本章代码所在位置的 `AdventureWorks.jpg`\
    \ 文件。\n21. 单击“确定”保存属性。调整图像大小。\n\n这个封面页相当简单。它有一个蓝色边框、一个标题和数据摘要。对于你的报表任务，你可以添加背景颜色或图形以及更多信息。图\
    \ [4-23](#A395630_1_En_4_Chapter.html#Fig23) 显示了封面页的顶部。\n\n![A395630_1_En_4_Fig23_HTML.jpg](A395630_1_En_4_Fig23_HTML.jpg)\n\
    \n图 4-23.\n封面页\n\n页面页脚将详细信息的第一页显示为第 2 页。由于你有一个封面页，你可能希望该页显示为第 1 页。要解决此问题，请按照以下步骤操作：\n\
    \n1.  切换回设计视图。\n2.  删除 `pages` 文本框。\n3.  在页面页脚中添加一个新的文本框。\n4.  右键单击新的文本框并选择“表达式”。\n\
    5.  输入此表达式：\n\n    ```\n    =\"Page \" & Globals!PageNumber -1 & \" of \" & Globals!TotalPages\
    \ -1\n    ```\n\n6.  单击“确定”。\n\n### 包含数据的文本框\n\n你已经看到数据区域是由文本框构成的。你也看到了包含非连接信息的文本框，例如文本框中的报表名称。可以从一个数据集中填充独立的文本框。该文本框无法显示详细数据；它必须显示摘要值。要查看此操作，请将\
    \ `TotalSales` 字段从 `SalesSummary` 数据集拖到报表画布上。查看如图 [4-24](#A395630_1_En_4_Chapter.html#Fig24)\
    \ 所示的表达式属性。你可以通过右键单击文本框并选择“表达式”来找到它。\n\n![A395630_1_En_4_Fig24_HTML.jpg](A395630_1_En_4_Fig24_HTML.jpg)\n\
    \n图 4-24.\n文本框表达式属性\n\n该值已使用 `Sum` 函数自动汇总。第二个参数 `SalesSummary` 是数据集上下文。\n\n###\
    \ 计算字段\n\n报表通常需要计算字段，例如销售利润率。有许多方法可以实现这一点。如果数据源自数据库系统，通常可以将计算添加到查询本身。如果不可行（例如，数据源不支持或报表开发人员无法修改查询），则可以在单元格内创建计算。但是，如果该单元格的结果需要在另一个单元格的表达式中使用，则会出现问题。你无法将包含表达式的单元格嵌套在另一个表达式中。\n\
    \n如果计算需要在多个表达式中使用，你可以向数据集添加计算字段。要了解如何添加计算字段，请按照以下步骤操作：\n\n1.  在“解决方案资源管理器”中，添加一个名为\
    \ `Calculated Field` 的新报表。\n2.  向报表添加一个名为 `AdventureWorks` 的数据源，指向 `AdventureWorks2016`\
    \ 共享数据源。如果需要帮助，请回顾第 [3](#A395630_1_En_3_Chapter.html) 章。\n3.  添加一个名为 `Sales` 的新数据集，指向\
    \ `AdventureWorks` 数据源，并使用此嵌入查询：\n\n    ```\n    SELECT TOP(1000) SOD.SalesOrderID,\
    \ SOH.OrderDate,\n    SOD.OrderQty, SOD.UnitPrice,\n    P.StandardCost\n    FROM\
    \ Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesOrderDetail AS SOD\n    ON\
    \ SOH.SalesOrderID = SOD.SalesOrderID\n    JOIN Production.Product AS P ON P.ProductID\
    \ = SOD.ProductID;\n    ```\n\n4.  保存数据集后，右键单击并选择“添加计算字段”，这将打开“数据集属性”对话框的“字段”页面。\n\
    5.  图 [4-25](#A395630_1_En_4_Chapter.html#Fig25) 所示的对话框显示了现有字段，底部有一个空白行。\n\n \
    \   ![A395630_1_En_4_Fig25_HTML.jpg](A395630_1_En_4_Fig25_HTML.jpg)\n\n    图 4-25.\n\
    \    字段页面\n6.  在第一个新“字段名称”中输入 `ExtendedCost`。\n7.  单击 `fx` 图标以调出表达式窗口。\n8.  在“类别”列表中，选择“字段\
    \ (Sales)”。\n9.  在“值”列表中，双击 `OrderQty` 字段。\n10. 在字段名称后添加乘号 (`*`)。\n11. 双击 `StandardCost`\
    \ 字段。最终表达式为：\n\n    ```\n    =Fields!OrderQty.Value * Fields!StandardCost.Value\n\
    \    ```\n\n12. 单击“确定”接受表达式。\n13. 单击“添加 ➤ 计算字段”创建另一个名为 `ExtendedPrice` 的表达式。此表达式为：\n\
    \n    ```\n    =Fields!OrderQty.Value * Fields!UnitPrice.Value\n    ```\n\n14.\
    \ 单击“确定”保存表达式。\n15. 单击“确定”保存新字段。你将在 `Sales` 数据集字段列表中看到新字段，如图 [4-26](#A395630_1_En_4_Chapter.html#Fig26)\
    \ 所示。\n\n    ![A395630_1_En_4_Fig26_HTML.jpg](A395630_1_En_4_Fig26_HTML.jpg)\n\
    \n    图 4-26.\n    新计算字段\n16. 向报表画布添加一个表格控件。\n17. 将以下字段添加到表格：`SalesOrderID`, `OrderDate`,\
    \ `OrderQty`, `StandardCost`, `ExtendedCost`, `UnitPrice`, `ExtendedPrice`。\n\
    18. 向表格添加一个新列。\n19. 右键单击新的数据单元格并选择“表达式”。\n20. 输入此表达式：\n\n    ```\n    =Fields!ExtendedPrice.Value\
    \ - Fields!ExtendedCost.Value\n    ```\n\n21. 在标题单元格中输入 `Margin`。\n\n当你预览报表时，你会看到计算字段按预期工作。"
  raw: "### Report Cover Page\n\nThe first page of the report can serve as a cover\
    \ page. You cannot add separate pages to the design canvas, but you can add page\
    \ breaks before or after tables or some other objects. In this case, you have\
    \ already turned on a page break before the tblSalesDetails table and turned off\
    \ the page header and footer for the first page. In this example, you will add\
    \ a rectangle control that will be a container for other controls. You will set\
    \ the PageBreak property of the rectangle to force a page break.\n\nTo create\
    \ the cover page, follow these steps:\n\n1.  In design view, drag the top of the\
    \ footer down to increase the size of the report body to 7 inches (18 cm). Figure\
    \ [4-21](#A395630_1_En_4_Chapter.html#Fig21) shows the top of the footer, which\
    \ is the dotted line.\n\n    ![A395630_1_En_4_Fig21_HTML.jpg](A395630_1_En_4_Fig21_HTML.jpg)\n\
    \n    Figure 4-21.\n\n    The report footer  \n2.  Drag the tblSalesDetails table\
    \ down so that it is just above the footer.  \n3.  Delete the tblSalesSummary\
    \ table.  \n4.  Add a rectangle control to the report.  \n5.  Expand the rectangle\
    \ so that the top is right under the header, the bottom is right above the tblSalesDetail\
    \ table, and the edges are at the width of the report canvas.  \n6.  Right-click\
    \ inside the rectangle and select Rectangle Properties. Change the Border properties\
    \ to those shown in Figure [4-22](#A395630_1_En_4_Chapter.html#Fig22).\n\n   \
    \ ![A395630_1_En_4_Fig22_HTML.jpg](A395630_1_En_4_Fig22_HTML.jpg)\n\n    Figure\
    \ 4-22.\n\n    The rectangle border properties  \n7.  On the General page , check\
    \ Add a page break after. Make sure the Keep contents together on a single page,\
    \ if possible is checked. Click OK to save the properties.  \n8.  Bring up the\
    \ Tablix Properties of the tblSalesDetails table, uncheck the Add a page break\
    \ before property and click OK.  \n9.  Add a textbox to the rectangle and type\
    \ in Sales Report.  \n10.  Change the font size to 20 pt.  \n11.  Position the\
    \ text box near the top and centered and resize it appropriately.  \n12.  Add\
    \ a table to the rectangle.  \n13.  Fill in OrderYear and TotalSales from the\
    \ SalesSummary dataset.  \n14.  Remove the rightmost column.  \n15.  Select the\
    \ header row and bold the font.  \n16.  Format the TotalSales cell as currency\
    \ with no decimal places and with a 1000 separator.  \n17.  Align each column\
    \ on the right.  \n18.  Change the table so that it sorts by OrderYear.  \n19.\
    \  Add an image control to the top of the rectangle.  \n20.  The Image Properties\
    \ dialog will appear. Click Import and navigate to the AdventureWorks.jpg file\
    \ located with the code for this chapter.  \n21.  Click Ok to save the properties.\
    \ Resize the image  \n\nThis cover page is pretty simple. It has a blue outline,\
    \ a title, and a summary of the data. For your report assignments, you could add\
    \ a background color or graphic and more information. Figure [4-23](#A395630_1_En_4_Chapter.html#Fig23)\
    \ shows the top of the page cover.\n\n![A395630_1_En_4_Fig23_HTML.jpg](A395630_1_En_4_Fig23_HTML.jpg)\n\
    \nFigure 4-23.\n\nThe cover page\n\nThe page footer shows the first page of the\
    \ details as page 2\\. Since you have a cover page, you may wish for that page\
    \ to show as page 1\\. To fix this, follow these steps:\n\n1.  Switch back to\
    \ design view.  \n2.  Delete the pages text box.  \n3.  Add a new text box to\
    \ the page footer.  \n4.  Right-click the new text box and select Expression.\
    \  \n5.  Type in this expression:\n\n    ```\n    =\"Page \" & Globals!PageNumber\
    \ -1 & \" of \" & Globals!TotalPages -1\n    ```\n\n6.  Click OK.\n\n### Text\
    \ Boxes with Data\n\nYou have seen that data regions are made of text boxes. You\
    \ have also seen text boxes with disconnected information such as the report name\
    \ in a text box. It is possible to populate an independent text box with data\
    \ from one of the datasets. The text box cannot display detail data; it must display\
    \ a summary value. To see this, drag the TotalSales field from the SalesSummary\
    \ dataset to the report canvas. Take a look at the expression property as shown\
    \ in Figure [4-24](#A395630_1_En_4_Chapter.html#Fig24). You can find this by right-clicking\
    \ the text box and choosing Expression.\n\n![A395630_1_En_4_Fig24_HTML.jpg](A395630_1_En_4_Fig24_HTML.jpg)\n\
    \nFigure 4-24.\n\nThe text box expression property\n\nThe value has automatically\
    \ been summarized with the `Sum` function. A second argument, `SalesSummary`,\
    \ is the dataset context.\n\n### Calculated Fields\n\nReports often need calculated\
    \ fields such as the sales margin. There are many ways to accomplish this. If\
    \ the data originates in a database system, it is generally possible to add the\
    \ calculation to the query itself. If that is not possible (e.g., the data source\
    \ doesn’t support it or the report developer is not able to modify the query),\
    \ a calculation can be created within a cell. A problem arises, however, if the\
    \ results of that cell need to be used in an expression in another cell. You can’t\
    \ nest a cell with an expression within another expression.\n\nIf a calculation\
    \ is needed in multiple expressions, you can add a calculated field to the dataset.\
    \ To learn how to add calculated fields, follow these steps:\n\n1.  From the Solution\
    \ Explorer, add a new report named Calculated Field.  \n2.  Add a data source\
    \ to the report named AdventureWorks pointing to the AdventureWorks2016 shared\
    \ data source. Review Chapter [3](#A395630_1_En_3_Chapter.html) if you need help\
    \ with this step.  \n3.  Add a new dataset named Sales pointing to the AdventureWorks\
    \ data source with this embedded query:\n\n    ```\n    SELECT TOP(1000) SOD.SalesOrderID,\
    \ SOH.OrderDate,\n    SOD.OrderQty, SOD.UnitPrice,\n    P.StandardCost\n    FROM\
    \ Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesOrderDetail AS SOD\n    ON\
    \ SOH.SalesOrderID = SOD.SalesOrderID\n    JOIN Production.Product AS P ON P.ProductID\
    \ = SOD.ProductID;\n    ```\n\n4.  After saving the dataset, right-click and select\
    \ Add Calculated Field which brings up the Fields page of the Dataset Properties\
    \ dialog.  \n5.  The dialog shown in Figure [4-25](#A395630_1_En_4_Chapter.html#Fig25)\
    \ displays the existing fields with a blank row at the bottom.\n\n    ![A395630_1_En_4_Fig25_HTML.jpg](A395630_1_En_4_Fig25_HTML.jpg)\n\
    \n    Figure 4-25.\n\n    The Fields page  \n6.  Type in ExtendedCost as the first\
    \ new Field Name.  \n7.  Click the fx icon to bring up the expression window.\
    \  \n8.  In the Category list, select Fields (Sales).  \n9.  In the Values list,\
    \ double-click the OrderQty field.  \n10.  Add a multiplication symbol (*) after\
    \ the field name.  \n11.  Double-click the StandardCost field. The final expression\
    \ is\n\n    ```\n    =Fields!OrderQty.Value * Fields!StandardCost.Value\n    ```\n\
    \n12.  Click OK to accept the expression.  \n13.  Click Add ➤ Calculated Field\
    \ to create another expression called ExtendedPrice. This expression is\n\n  \
    \  ```\n    =Fields!OrderQty.Value * Fields!UnitPrice.Value\n    ```\n\n14.  Click\
    \ OK to save the expression.  \n15.  Click OK to save the new fields. You will\
    \ see the new fields in the Sales dataset fields list as shown in Figure [4-26](#A395630_1_En_4_Chapter.html#Fig26).\n\
    \n    ![A395630_1_En_4_Fig26_HTML.jpg](A395630_1_En_4_Fig26_HTML.jpg)\n\n    Figure\
    \ 4-26.\n\n    The new calculated fields  \n16.  Add a table control to the report\
    \ canvas.  \n17.  Add the following fields to the table: SalesOrderID, OrderDate,\
    \ OrderQty, StandardCost, ExtendedCost, UnitPrice, ExtendedPrice.  \n18.  Add\
    \ a new column to the table.  \n19.  Right-click the new data cell and choose\
    \ Expression.  \n20.  Enter this expression:\n\n    ```\n    =Fields!ExtendedPrice.Value\
    \ - Fields!ExtendedCost.Value\n    ```\n\n21.  Enter Margin in the header cell.\
    \  \n\nWhen you preview the report, you will see that the calculated fields work\
    \ as expected."
  trans: "\n### 报告封面页\n\n报告的第一页可以作为封面页。你无法向设计画布添加单独的页面，但可以在表格或其他一些对象之前或之后添加分页符。在此例中，你已为\
