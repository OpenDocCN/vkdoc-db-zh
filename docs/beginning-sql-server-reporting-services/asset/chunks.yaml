  trans: "\n### 设置 SQL 账户\n\n默认情况下，SQL Server 仅接受 Windows 身份验证。可以在安装期间启用 SQL Server\
    \ 身份验证，也可以在事后进行配置。要使用本章中的所有示例，必须启用 SQL Server 身份验证。如果你是在本地安装的 SQL Server 实例，你将能够修改身份验证属性。否则，你需要与数据库管理员合作，在你网络上的开发实例中配置安全性。要更改\
    \ SQL Server 的身份验证属性，请按照以下步骤操作：\n\n1.  启动 `SQL Server Management Studio (SSMS)`。\n\
    2.  输入如图 9-2 所示的 SQL Server 名称属性和身份验证方法。如果不确定这些属性，请参阅第 1 章中的“确定 SQL Server 名称”部分。\n\
    \    ![A395630_1_En_9_Fig2_HTML.jpg](img/A395630_1_En_9_Fig2_HTML.jpg)\n    图\
    \ 9-2. 连接到服务器对话框\n    **注意** 修改服务器身份验证属性需要重启 SQL Server。\n3.  单击“连接”。\n4.  在 SSMS\
    \ 的“对象资源管理器”中，右键单击服务器名称并选择 `属性`。\n5.  选择 `安全性` 页。\n6.  如果 `服务器身份验证` 设置为 `Windows\
    \ 身份验证模式`，请将其切换为 `SQL Server 和 Windows 身份验证模式`，如图 9-3 所示。\n    ![A395630_1_En_9_Fig3_HTML.jpg](img/A395630_1_En_9_Fig3_HTML.jpg)\n\
    \    图 9-3. SQL Server 和 Windows 身份验证模式\n7.  单击“确定”接受更改。\n8.  右键单击服务器名称并选择 `重启`\
    \ 来重启 SQL Server。\n\n现在 SQL Server 已配置为接受 SQL Server 身份验证，你需要创建一个登录名并授予其权限。按照以下步骤设置登录名：\n\
    \n1.  在“对象资源管理器”中，展开 `安全性`。\n2.  右键单击 `登录名` 并选择 `新建登录名`。\n3.  这将打开 `登录名 - 新建`\
    \ 对话框。\n4.  在 `登录名` 中填写 `SQLReportUser`。\n5.  选择 `SQL Server 身份验证`。\n6.  输入并确认一个你能记住的密码。\n\
    7.  由于这只是一个示例，请取消选中 `强制实施密码策略`，如图 9-4 所示。\n    ![A395630_1_En_9_Fig4_HTML.jpg](img/A395630_1_En_9_Fig4_HTML.jpg)\n\
    \    图 9-4. `SQLReportUser` 账户属性\n8.  单击“确定”创建账户。\n9.  右键单击该账户并选择 `属性`。\n10. 切换到\
    \ `用户映射` 页。\n11. 在 `AdventureWorks2016` 旁边打勾，如图 9-5 所示。\n    ![A395630_1_En_9_Fig5_HTML.jpg](img/A395630_1_En_9_Fig5_HTML.jpg)\n\
    \    图 9-5. 用户映射页面\n12. 勾选 `db_owner` 角色。在生产数据库中，只授予所需的权限。我注意到在 AdventureWorks\
    \ 中，有时新用户会自动选中 `db_owner`，但这不会持久生效。如果需要，请返回查看属性并重新设置。\n13. 单击“确定”保存权限。\n\n###\
    \ 连接到 SQL Server\n\n在第 3 章中，你学习了如何创建数据源，并且很可能使用了你的 Windows 凭据来连接 SQL Server。在本节中，你将创建一个使用\
    \ SQL Server 账户的新数据源。按照以下步骤在项目中创建一个接受 SQL Server 凭据的新数据源：\n\n1.  启动 `SQL Server\
    \ Data Tools (SSDT)` 并打开第 6 章的解决方案。\n2.  右键单击 `共享数据源` 并选择 `添加新数据源`。\n3.  在“常规”页上，将\
    \ `名称` 属性设置为 `AdventureWorks2016SQL`，如图 9-6 所示。\n    ![A395630_1_En_9_Fig6_HTML.jpg](img/A395630_1_En_9_Fig6_HTML.jpg)\n\
    \    图 9-6. 名称属性\n4.  如你在本书中一直所做的那样，单击 `编辑` 按钮来设置 `连接字符串` 属性。\n5.  在 `凭据` 页上，选择\
    \ `使用此用户名和密码`。\n6.  输入你先前创建的账户的 `用户名` 和 `密码`。“凭据”页应如图 9-7 所示。\n    ![A395630_1_En_9_Fig7_HTML.jpg](img/A395630_1_En_9_Fig7_HTML.jpg)\n\
    \    图 9-7. 新凭据\n7.  单击“确定”保存更改。\n8.  双击 `按区域销售矩阵` 报表以在设计视图中打开它。\n9.  在 `报表数据`\
    \ 窗口中，打开 `AdventureWorks` 数据源的属性。\n10. 在 `常规` 页上，为 `使用共享数据源引用` 属性选择 `AdventureWorks2016SQL`，如图\
    \ 9-8 所示。\n    ![A395630_1_En_9_Fig8_HTML.jpg](img/A395630_1_En_9_Fig8_HTML.jpg)\n\
    \    图 9-8. 新的共享数据源引用\n11. 单击“确定”保存更改。\n12. 预览报表以确保其正常工作。\n\n现在报表已配置为使用 SQL Server\
    \ 账户检索数据。当项目部署后，最终用户将使用其 Windows 账户连接到 Web 门户。然后，SSRS 将使用存储在数据源属性中的账户凭据连接到 SQL\
    \ Server。按照以下步骤部署项目并在 Web 门户中查看新数据源：\n\n1.  在“解决方案资源管理器”中，右键单击项目名称并选择 `属性`。\n\
    2.  将 `TargetServerURL` 设置为你的 Web 服务 URL（统一资源定位符），如果尚未设置的话。如果不确定如何操作，请参阅第 8 章中的“从\
    \ SSDT 部署报表”部分。\n3.  单击“确定”保存更改。\n4.  右键单击项目名称并选择 `部署`。\n5.  如果部署成功，请启动 Web 门户。如果需要帮助，请参阅第\
    \ 8 章中的“从 SSDT 部署报表”部分。\n6.  单击 `数据源` 文件夹。\n7.  单击 `AdventureWorks2016SQL` 数据源旁边的省略号，并选择\
    \ `管理`。\n8.  这将打开数据源的属性。向下滚动到 `凭据` 部分并查看属性。请注意，你也可以指定一个硬编码的 Windows 账户。图 9-9 显示了“凭据”部分。\n\
    \    ![A395630_1_En_9_Fig9_HTML.jpg](img/A395630_1_En_9_Fig9_HTML.jpg)\n    图\
    \ 9-9. 数据源凭据\n\n你可能想知道为什么不能总是指定 `作为查看报表的用户`。在某些情况下，这是不可能的。以下是在数据源中保存硬编码凭据的一些可能原因：\n\
    \n*   最终用户或设备可能不属于 Windows 域。\n*   最终用户可能未被允许在数据库中拥有直接权限。\n*   订阅功能需要硬编码的凭据。\n\
    *   数据库服务器可能与 SSRS 不在同一台服务器上。\n\n**注意** 必须配置 `Kerberos` 委派才能在服务器之间转发凭据。这是一个高级安全主题，超出了本书的范围。要了解有关\
    \ `Kerberos` 委派的更多信息，请参见 Pluralsight 课程“为 SSRS 配置 Kerberos”。\n"
- fmt: "## Configuring Site Security\n\nSSRS security is role based. The roles have\
    \ certain predefined permissions. Adding an account or group to a role allows\
    \ the account or group to have the permissions defined by the role. Some aspects\
    \ of security can be configured at the site, while others are based on location\
    \ or object. In this section, you will learn about site security.\n\nNote\n\n\
    For these examples, I will be using several Windows accounts created on a stand-alone\
    \ Windows Server 2012 R2. In your environment, you may be running within a domain\
    \ or on an isolated laptop running one of many end-user versions of Windows. Because\
    \ there are so many variations possible, I will not walk you through creating\
    \ the accounts.\n\nI have created an information technology (IT) group and added\
    \ the following local Windows accounts to the group on my server:\n- `CIO`\n-\
    \ `Director`\n- `Manager`\n- `TeamLeader`\n- `TeamMember`\n\nAt the Site level\
    \ of the web portal, there are two possible roles: `System Administrator` and\
    \ `System User`. Any accounts or group members in the `System Administrator` role\
    \ have full control of the site, including controlling security. The `System User`\
    \ property is important for anyone who will be using `Report Builder`, which you\
    \ will learn about in Chapter [10](#A395630_1_En_10_Chapter.html). To add an account\
    \ to a site-level role, follow these steps:\n1.  Launch the web portal.\n2.  Click\
    \ the gear icon and select `Site Settings` as shown in Figure [9-10](#A395630_1_En_9_Chapter.html#Fig10).\n\
    \    ![A395630_1_En_9_Fig10_HTML.jpg](A395630_1_En_9_Fig10_HTML.jpg)\n    Figure\
    \ 9-10. Select `Site settings`\n3.  This opens the site properties. Click `Security`.\n\
    4.  Click `Add group or user` as shown in Figure [9-11](#A395630_1_En_9_Chapter.html#Fig11).\n\
    \    ![A395630_1_En_9_Fig11_HTML.jpg](A395630_1_En_9_Fig11_HTML.jpg)\n    Figure\
    \ 9-11. Click `Add group or user`\n5.  For `Group or user`, type in `CIO`.\n6.\
    \  Select `System Administrator` as shown in Figure [9-12](#A395630_1_En_9_Chapter.html#Fig12).\n\
    \    ![A395630_1_En_9_Fig12_HTML.jpg](A395630_1_En_9_Fig12_HTML.jpg)\n    Figure\
    \ 9-12. Adding an account\n7.  Click `OK` to create the role membership.\n8. \
    \ Repeat the process to add the `Manager` account to the `System User` role.\n\
    \nYou can also remove accounts from the site-level roles on this page.\n\n## Configuring\
    \ Folder and Report Security\n\nBefore you publish the first report in your company,\
    \ you should plan the folder structure within the web portal to simplify security\
    \ management. End users can view those folders and reports that they have rights\
    \ to see. As a best practice, configure security at a folder level only. Security\
    \ can be configured on individual reports, but that makes long-term management\
    \ very difficult.\n\nTo reach a particular folder, an end user should have rights\
    \ to the folders above it. By default, folders inherit permissions from the parent\
    \ folder and reports inherit permissions from the folder in which they are located.\
    \ Permissions should be set to be more restrictive as you travel down the path.\
    \ For example, you may want to grant rights to everyone in the domain at the `Home`\
    \ folder. Then create folders for each department under `Home`. Within each department\
    \ folder, create folders for managers.\n\nThere are several roles defined at the\
    \ folder and object level. Table [9-1](#A395630_1_En_9_Chapter.html#Tab1) lists\
    \ the roles and definitions as displayed on the `Security` page.\n\nTable 9-1.\
    \ The Folder- and Object-Level Roles\n| Role | Purpose |\n| --- | --- |\n| `Browser`\
    \ | May view folders and reports and subscribe to reports. |\n| `Content Manager`\
    \ | May manage content in the Report Server. This includes folders, reports, and\
    \ resources. |\n| `My Reports` | May publish reports and linked reports; manage\
    \ folders, reports, and resources in a user’s `My Reports` folder. |\n| `Publisher`\
    \ | May publish reports and linked reports to the Report Server. |\n| `Report\
    \ Builder` | May view report definitions. |\n\nFollow these steps to create and\
    \ configure the folders for the IT department:\n1.  In the web portal, navigate\
    \ to the `Home` folder. If you are in `Site Settings`, click `SQL Server Reporting\
    \ Services` at the top of the page.\n2.  Click `Manage Folder` as shown in Figure\
    \ [9-13](#A395630_1_En_9_Chapter.html#Fig13).\n    ![A395630_1_En_9_Fig13_HTML.jpg](A395630_1_En_9_Fig13_HTML.jpg)\n\
    \    Figure 9-13. The `Manage Folder` icon\n3.  This opens the `Security` page\
    \ of the `Home` folder. Click `New Role Assignment`.\n4.  Type in `Users`. For\
    \ a domain, this will be the `Everyone` group.\n5.  Check `Browser` as shown in\
    \ Figure [9-14](#A395630_1_En_9_Chapter.html#Fig14). This will give all users\
    \ rights to run any report in the site unless the security in a folder has been\
    \ overridden.\n    ![A395630_1_En_9_Fig14_HTML.jpg](A395630_1_En_9_Fig14_HTML.jpg)\n\
    \    Figure 9-14. Add `Users` to the `Browser` role\n6.  Click `OK` to save the\
    \ change.\n7.  Click the `Home` link to navigate back to the folders.\n8.  Click\
    \ `New Folder`.\n9.  Fill in `IT` for the name and click `Create`.\n10. Click\
    \ the ellipses next to the new `IT` folder and select `Manage`.\n11. This opens\
    \ the folder properties. Click `Security`.\n12. Click `Customize security` as\
    \ shown in Figure [9-15](#A395630_1_En_9_Chapter.html#Fig15).\n    ![A395630_1_En_9_Fig15_HTML.jpg](A395630_1_En_9_Fig15_HTML.jpg)\n\
    \    Figure 9-15. The security page of the folder\n13. This brings up a warning\
    \ about breaking inheritance from the parent as shown in Figure [9-16](#A395630_1_En_9_Chapter.html#Fig16).\
    \ Click `OK`.\n    ![A395630_1_En_9_Fig16_HTML.jpg](A395630_1_En_9_Fig16_HTML.jpg)\n\
    \    Figure 9-16. Confirm that security will be different\n14. Click `Add group\
    \ or user`.\n15. Add the `IT` group to the folder in the `Browser` role and click\
    \ `OK`.\n16. Check the box next to `Builtin\\Users`. If you are working within\
    \ a domain, remove the `Everyone` group.\n17. Click `Delete` and `OK` to confirm.\n\
    18. Navigate back to the `Home` folder.\n\nYou now have a folder that can only\
    \ be viewed by members of the `IT` group. Continue adding folders and modifying\
    \ permissions using the skills learned in the previous steps according to Table\
    \ [9-2](#A395630_1_En_9_Chapter.html#Tab2) to set up security for the site.\n\n\
    Table 9-2. The Security for the Site\n| Folder | Account or Group | Role Membership\
    \ |\n| --- | --- | --- |\n| `Home/IT` | `IT` | `Browser` |\n| `Home/IT` | `Manager`\
    \ | `Content Manager` |\n| `Home/IT` | `Manager` | `Report Builder` |\n| `Home/IT/Management`\
    \ | `CIO`, `Director` | `Browser` |\n| `Home/IT/Management` | `Manager` | `Content\
    \ Manager` |\n| `Home/IT/Management` | `Manager` | `Report Builder` |\n| `Home/IT/Management/Confidential`\
    \ | `CIO` | `Content Manager` |\n\nObviously, this is a simplified example, but\
    \ it should illustrate how security should be configured. Figure [9-17](#A395630_1_En_9_Chapter.html#Fig17)\
    \ demonstrates how the number of accounts diminishes the further down you go in\
    \ the path.\n![A395630_1_En_9_Fig17_HTML.jpg](A395630_1_En_9_Fig17_HTML.jpg)\n\
    Figure 9-17. The folder permissions\n\nTo test, run the browser as any of the\
    \ accounts to make sure that the account can only see the expected folders. Figure\
    \ [9-18](#A395630_1_En_9_Chapter.html#Fig18) shows the difference between what\
    \ the `Director` and `TeamLeader` see when each is looking at the `IT` folder.\n\
    ![A395630_1_En_9_Fig18_HTML.jpg](A395630_1_En_9_Fig18_HTML.jpg)\nFigure 9-18.\
    \ The `Manager`’s and `TeamLeaders`’s views of the folder\n\nAt this point, the\
    \ `Manager` account has control of the content of most of the folders and permission\
    \ to use `Report Builder`. You will see `Report Builder` in action in Chapter\
    \ [10](#A395630_1_En_10_Chapter.html)."
