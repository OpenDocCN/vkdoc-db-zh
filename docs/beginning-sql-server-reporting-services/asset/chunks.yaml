    \ 参数列表将如图 6-14 所示。\n\n![A395630_1_En_6_Fig14_HTML.jpg](img/A395630_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14. 基于 2011 年销售数据的区域参数列表\n\n您可能已经注意到，`Territory` 参数的查询与 `SalesByTerritory`\
    \ 查询类似。它没有查询报表所需的值，而是生成了一个区域的唯一列表。查询中使用的表是相同的。`WHERE` 子句中的表达式 `YEAR(OrderDate)\
    \ IN (@Year)` 用于根据所选的 `Year` 参数值进行筛选。\n\n您可以级联更多参数，每个参数都基于前一个参数的值。但是，请注意不要对性能产生负面影响。例如，从\
    \ `Sales.SalesTerritory` 表显示区域列表比用于仅显示特定年份有销售数据的区域的查询效率高得多。顺便说一句，您也可以选择所有年份，级联仍然有效。\n\
    \n### 参数位置\n\n在设计视图中，您可能注意到报表上方有一个参数区域。如果看不到，请右键单击设计画布并选择“视图” ➤ “参数”。参数区域应如图 6-15\
    \ 所示。\n\n![A395630_1_En_6_Fig15_HTML.jpg](img/A395630_1_En_6_Fig15_HTML.jpg)\n\
    \n图 6-15. 参数区域\n\n此功能是 SQL Server 2016 的新增功能，提供了更灵活的参数布局。在 SQL Server 的早期版本中，您可以通过从\
    \ `Parameters` 文件夹中选择一个参数并单击向上或向下箭头来更改参数的顺序，如图 6-16 所示。\n\n![A395630_1_En_6_Fig16_HTML.jpg](img/A395630_1_En_6_Fig16_HTML.jpg)\n\
    \n图 6-16. 用于移动参数的箭头\n\n使用 SSRS 早期版本中的方法更改位置并不总能产生最佳的放置效果。无法控制哪些参数最终位于同一行。如果您有一个包含开始和结束日期的报表，您可能希望将日期保持在同一行，但这并非总是可行。\n\
    \n从 SQL Server 2016 开始，最多可以显示六个参数。您现在可以通过将参数拖动到不同的单元格来控制参数的放置。例如，将 `Territory`\
    \ 参数拖到 `Year` 参数下方。参数窗格应如图 6-17 所示。\n\n![A395630_1_En_6_Fig17_HTML.jpg](img/A395630_1_En_6_Fig17_HTML.jpg)\n\
    \n图 6-17. 重新排列后的参数\n\n当您预览报表时，参数显示如图 6-18 所示。\n\n![A395630_1_En_6_Fig18_HTML.jpg](img/A395630_1_En_6_Fig18_HTML.jpg)\n\
    \n图 6-18. 预览模式下的参数\n\n默认情况下，有两行参数。要增加行数，请在设计视图中右键单击参数区域，然后选择“在上方插入行”或“在下方插入行”。但是，如果您正在使用级联功能，在移动参数时要小心。确保需要首先使用的参数也首先显示，以避免依赖错误。\n\
    \n### 参数数据类型\n\n到目前为止，您一直在使用数值参数，尽管默认类型是文本。您也可以使用其他数据类型的参数，控件将根据类型发生变化。请按照以下说明查看其他数据类型：\n\
    \n1.  确保已保存对“按区域矩阵销售”报表的最新更改。您可以单击“保存”图标或运行报表。\n2.  右键单击“按区域矩阵销售”报表，然后选择“复制”。\n\
    3.  右键单击项目名称 `Dynamic Reports`，然后选择“粘贴”。\n4.  将新报表的名称更改为 `Data Types`。\n5.  在设计视图中，右键单击\
    \ `Parameters` 文件夹，然后选择“添加参数”。\n6.  这将打开“报表参数属性”对话框。将参数命名为 `DateParameter`。\n\
    7.  在“提示”中填写 `Date Parameter`。提示是用户在运行报表时将看到的内容。\n8.  将“数据类型”更改为“日期/时间”。“常规”页面将如图\
    \ 6-19 所示。\n\n    ![A395630_1_En_6_Fig19_HTML.jpg](img/A395630_1_En_6_Fig19_HTML.jpg)\n\
    \n    图 6-19. 参数的常规属性\n9.  单击“默认值”页面。\n10. 选择“指定值”。\n11. 单击“添加”。\n12. 不要键入值，而是单击如图\
    \ 6-20 所示的 `fx` 符号以打开表达式对话框。\n\n    ![A395630_1_En_6_Fig20_HTML.jpg](img/A395630_1_En_6_Fig20_HTML.jpg)\n\
    \n    图 6-20. 表达式按钮\n13. 在表达式中填写 `=Today()` 并单击“确定”。\n14. 单击“确定”接受属性。\n15. 您现在应该在网格中看到带有日历图标的\
    \ `Date Parameter`，如图 6-21 所示。\n\n    ![A395630_1_En_6_Fig21_HTML.jpg](img/A395630_1_En_6_Fig21_HTML.jpg)\n\
    \n    图 6-21. 新的日期参数\n16. 预览报表。\n17. 如果 `Date Parameter` 显示为灰色，请为 `Year` 和 `Territory`\
    \ 选择值。当前日期应自动被选中。您可以键入或使用日历选取器控件选择其他日期。至少在我使用的版本中，`Date/Time` 参数必须位于第一个位置，才能在其他参数被选定之前可用。\n\
    18. 切换回设计视图并添加另一个参数。\n19. 将此参数命名为 `TrueFalse`，提示为 `True or False`。\n20. 将“数据类型”更改为“布尔值”并单击“确定”。\n\
    21. 这将添加一组单选按钮，如图 6-22 所示。\n\n    ![A395630_1_En_6_Fig22_HTML.jpg](img/A395630_1_En_6_Fig22_HTML.jpg)\n\
    \n    图 6-22. 新的“真或假”参数\n\n您还可以通过在“默认值”页面上添加 `True` 或 `False` 来为布尔数据类型设置默认值。\n\
    \n默认数据类型是“文本”，允许用户输入任何内容。如果您希望将输入限制为数字，可以选择 `Integer` 或 `Float` 数据类型。该控件看起来像一个常规文本框，但将分别只接受整数或小数。\n"
- fmt: "## 使用存储过程\n\nSQL Server 存储过程（也称为 stored procs 或 sprocs）是包含 T-SQL 脚本的对象。这些存储过程可能包含循环等编程逻辑，可能更新数据，或者仅包含一个\
    \ `SELECT` 查询。存储过程常用于 SSRS 数据集中，并且根据定义可能需要参数。如果您使用的是网络 SQL Server，您可能需要联系数据库管理员以获取创建存储过程的权限。否则，要创建存储过程，请按照以下步骤操作。\n\
    \n1.  使用 SQL Server Management Studio（SSMS）连接到您的 SQL Server。\n2.  单击“新建查询”，这将打开一个查询窗口。\n\
    3.  在查询窗口中输入此代码，可以手动键入或从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制。该代码创建一个需要一个参数\
    \ `TerritoryID` 的存储过程，然后返回按该 `TerritoryID` 筛选的结果。\n\n```\nUSE AdventureWorks2016;\n\
    GO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT NULL\n    DROP PROC usp_SalesByTerritory;\n\
    GO\nCREATE PROC usp_SalesByTerritory @Year INT, @TerritoryID INT AS\nSELECT YEAR(OrderDate)\
    \ AS OrderYear, C.CustomerID,\n       SUM(TotalDue) AS Sales,\n       T.TerritoryID,\
    \ T.Name AS Territory, s.Name AS Store\nFROM sales.SalesOrderHeader AS SOH\n \
    \   JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN\
    \ Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS\
    \ S ON S.BusinessEntityID = C.StoreID\nWHERE YEAR(OrderDate) = @Year AND T.TerritoryID\
    \ = @TerritoryID\nGROUP BY C.CustomerID, T.TerritoryID, T.Name,\n         YEAR(OrderDate),\
    \ S.Name;\n```\n\n4.  单击菜单栏中的“执行”或按 F5 来创建该过程，如图 6-23 所示。\n\n![A395630_1_En_6_Fig23_HTML.jpg](A395630_1_En_6_Fig23_HTML.jpg)\n\
    \n图 6-23. “执行”图标。\n\n5.  单击“新建查询”。在新的查询窗口中，通过运行以下代码测试该过程：\n\n```\nusp_SalesByTerritory\
    \ @Year = 2011, @TerritoryID = 6;\n```\n\n在数据集中使用存储过程与使用查询没有太大区别。请按照以下步骤创建一个使用新存储过程的报表。\n\
    \n1.  向项目添加一个名为“Stored Proc”的新报表。\n2.  添加一个指向 `AdventureWorks2016` 的数据源，并将其命名为\
    \ `AdventureWorks`。\n3.  向报表添加一个名为 `SalesByTerritory` 的嵌入数据集。使用 `AdventureWorks`\
    \ 数据源。\n4.  将查询类型更改为“存储过程”。\n5.  执行此操作后，对话框会发生变化。您将看到一个下拉框，列出了数据库中的存储过程。选择 `usp_SalesByTerritory`。对话框应如图\
    \ 6-24 所示。\n\n![A395630_1_En_6_Fig24_HTML.jpg](A395630_1_En_6_Fig24_HTML.jpg)\n\
    \n图 6-24. 在数据集中使用存储过程。\n\n6.  单击“确定”以创建数据集。它也会自动将参数添加到报表中。\n7.  将一个矩阵控件拖到报表画布上。\n\
    8.  将 `OrderYear` 添加到“列”单元格。\n9.  将 `Sales` 添加到“数据”单元格。它将自动求和。\n10. 将 `TerritoryID`\
    \ 添加到“行”单元格。布局应如图 6-25 所示。\n\n![A395630_1_En_6_Fig25_HTML.jpg](A395630_1_En_6_Fig25_HTML.jpg)\n\
    \n图 6-25. 矩阵设计。\n\n当您预览报表时，系统将提示您输入 `OrderYear` 和 `TerritoryID`。填入 2012 和 7 以查看数据。\n\
    \n然而，使用存储过程存在一个问题。如果您将参数切换为接受多个值，报表将不再工作。这是因为存储过程期望每个参数接收一个整数值，而不是一个变量列表。要查看问题，请按照以下步骤操作。\n\
    \n1.  切换回设计视图。\n2.  修改 `Year` 参数，使其允许多个值。\n3.  在“可用值”页面上，选择“指定值”并添加 2011 到 2014。\n\
    4.  单击“确定”保存更改。\n5.  预览报表。\n6.  选择一个以上的年份。为 `TerritoryID` 输入 7。\n7.  当您单击“查看报表”时，您将看到一条错误消息，如图\
    \ 6-26 所示。\n\n![A395630_1_En_6_Fig26_HTML.jpg](A395630_1_En_6_Fig26_HTML.jpg)\n\
    \n图 6-26. 当为 `OrderYear` 选择多个值时出现的错误。\n\n作为解决方法，必须修改存储过程的参数以接受字符串值，而不仅仅是整数。然后，必须向过程中添加逻辑以处理逗号分隔的列表，而不是每个参数的一个值。通常使用一个函数来解析列表并将值保存到临时表中。请按照以下步骤修改存储过程，使其能够接受多个值。\n\
    \n1.  在 SSMS 中，运行此代码创建一个函数，用于将值列表转换为表。您可以从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制代码。\n\
    \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('udf_ListToTable') IS NOT NULL\n\
    \    DROP FUNCTION dbo.udf_ListToTable;\nGO\nCREATE FUNCTION dbo.udf_ListToTable(@List\
    \ NVARCHAR(4000),\n    @Delimiter NCHAR(1))\nRETURNS @ValueList TABLE (ListItem\
    \ NVARCHAR(50)) AS\nBEGIN\n    DECLARE @Pos INT;\n    DECLARE @Item NVARCHAR(50);\n\
    \    --Find the first delimiter\n    SET @Pos = CHARINDEX(@Delimiter,@List);\n\
    \    --loop until all items are processed\n    WHILE @Pos > 0 BEGIN\n        --insert\
    \ the current item\n        INSERT INTO @ValueList(ListItem)\n            SELECT\
    \ LEFT(@List,@Pos-1);\n        --remove current item from the string\n       \
    \ SET @List = SUBSTRING(@List,@Pos+1,4000);\n        --find the next delimiter\n\
    \        SET @Pos = CHARINDEX(@Delimiter,@List);\n    END;\n    --add the last\
    \ item\n    INSERT INTO @ValueList(ListItem)\n        SELECT @List;\n    RETURN;\n\
    END;\nGO\n```\n\n2.  单击“执行”来运行代码并创建该函数。\n3.  单击“新建查询”以打开另一个查询窗口。\n4.  在 SSMS 中运行此代码以修改存储过程。\n\
    \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT\
    \ NULL\n    DROP PROC usp_SalesByTerritory;\nGO\nCREATE PROC usp_SalesByTerritory\n\
    \    @YearList NVARCHAR(4000), @TerritoryIDList NVARCHAR(4000) AS\n    DECLARE\
    \ @Years TABLE (OrderYear INT);\n    DECLARE @Territories TABLE(TerritoryID INT);\n\
    \    --Save the lists into table variables\n    INSERT INTO @Years(OrderYear)\n\
    \        SELECT ListItem\n        FROM dbo.udf_ListToTable(@YearList,',');\n \
    \   INSERT INTO @Territories(TerritoryID)\n        SELECT ListItem\n        FROM\
    \ dbo.udf_ListToTable(@TerritoryIDList,',');\n    --Change the query to use IN\
    \ lists in the WHERE clause\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\n\
    \           SUM(TotalDue) AS Sales,\n           T.TerritoryID, T.Name AS Territory,\
    \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n        JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n        JOIN Sales.Customer AS C ON\
    \ SOH.CustomerID = C.CustomerID\n        JOIN Sales.Store AS S ON S.BusinessEntityID\
    \ = C.StoreID\n    WHERE YEAR(OrderDate) IN (SELECT OrderYear FROM @Years)\n \
    \     AND T.TerritoryID IN (SELECT TerritoryID FROM @Territories)\n    GROUP BY\
    \ C.CustomerID, T.TerritoryID, T.Name,\n             YEAR(OrderDate), S.Name;\n\
    GO\n```\n\n5.  单击“执行”来运行代码。\n\n现在，每当您遇到此问题时，都可以使用这个函数。该存储过程使用新函数将每个列表插入到一个表变量中。然后，在\
    \ `WHERE` 子句中，这些表变量被用作 `IN` 列表。如果您的数据源托管在 SQL Server 2016 上，您可以使用一个新的内置函数 `STRING_SPLIT()`\
    \ 来代替本示例中使用的自定义函数。"
  raw: "### Using Stored Procedures\n\nSQL Server stored procedures, also called stored\
    \ procs or sprocs , are objects that contain T-SQL scripts. These stored procs\
    \ may contain programming logic such as loops, may update data, or may just contain\
    \ a SELECT query. Stored procs are often used in SSRS datasets and they may require\
    \ parameters by definition. If you are using a network SQL Server , you may need\
    \ to contact your database administrator for rights to create a stored proc. Otherwise,\
    \ to create a stored procedure, follow these steps.\n\n1.  Using SQL Server Management\
    \ Studio (SSMS), connect to your SQL Server.  \n2.  Click New Query which opens\
    \ a query window.  \n3.  Enter this code into the query window by typing or copying\
    \ it from the Source Code/Download area for this book on the Apress web site (\
    \ [`www.Apress.com`](http://www.Apress.com) ). The code creates a stored proc\
    \ that requires one argument, TerritoryID. It then returns the results filtered\
    \ by that TerritoryID.\n\n```\n    USE AdventureWorks2016;\n    GO\n    IF OBJECT_ID('usp_SalesByTerritory')\
    \ IS NOT NULL\n    DROP PROC usp_SalesByTerritory;\n    GO\n    CREATE PROC usp_SalesByTerritory\
    \ @Year INT, @TerritoryID INT AS\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\n\
    \    SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory, s.Name AS\
    \ Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    WHERE YEAR(OrderDate) = @Year AND T.TerritoryID = @TerritoryID\n    GROUP\
    \ BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\
    \n4.  Click Execute in the menu bar or press F5 to create the proc as shown in\
    \ Figure [6-23](#A395630_1_En_6_Chapter.html#Fig23).\n\n![A395630_1_En_6_Fig23_HTML.jpg](A395630_1_En_6_Fig23_HTML.jpg)\n\
    \nFigure 6-23.\n\nThe Execute icon  \n5.  Click New Query. In the new query window,\
    \ test the proc by running the following code:\n\n```\n    usp_SalesByTerritory\
    \ @Year = 2011, @TerritoryID = 6;\n    ```\n\nUsing a stored proc in a dataset\
    \ is not very different from using a query. Follow these steps to create a report\
    \ that uses the new stored proc.\n\n1.  Add a new report to the project named\
    \ Stored Proc.  \n2.  Add a data source pointing to AdventureWorks2016 and name\
    \ it AdventureWorks.  \n3.  Add an embedded dataset to the report named SalesByTerritory.\
    \ Use the AdventureWorks data source.  \n4.  Change the Query type to Stored Procedure.\
    \  \n5.  When you do, the dialog changes. You will see a dropdown box listing\
    \ the stored procedures in the database . Select `usp_SalesByTerritory`. The dialog\
    \ should look like Figure [6-24](#A395630_1_En_6_Chapter.html#Fig24).\n\n![A395630_1_En_6_Fig24_HTML.jpg](A395630_1_En_6_Fig24_HTML.jpg)\n\
    \nFigure 6-24.\n\nUsing a stored procedure in the dataset  \n6.  Click OK to create\
    \ the dataset. It also adds the parameters to the report automatically.  \n7.\
    \  Drag a matrix control to the report canvas.  \n8.  Add OrderYear to the Columns\
    \ cell.  \n9.  Add Sales to the Data cell. It will automatically sum.  \n10. \
    \ Add TerritoryID to the Rows cell. The layout should look like Figure [6-25](#A395630_1_En_6_Chapter.html#Fig25).\n\
    \n![A395630_1_En_6_Fig25_HTML.jpg](A395630_1_En_6_Fig25_HTML.jpg)\n\nFigure 6-25.\n\
    \nThe matrix design\n\nWhen you preview the report, you will be prompted for an\
    \ OrderYear and TerritoryID. Fill in 2012 and 7 to see data.\n\nThere is an issue\
    \ with using stored procedures, however. If you switch the parameters to accept\
    \ multiple values, the report will no longer work. That’s because the stored proc\
    \ is expecting one integer value for each parameter, not a list of variables.\
    \ To see the problem, follow these steps.\n\n1.  Switch back to design view.  \n\
    2.  Modify the Year parameter so that it allows multiple values.  \n3.  On the\
    \ Available Values page, select Specify values and add 2011 through 2014.  \n\
    4.  Click OK to save the changes.  \n5.  Preview the report.  \n6.  Select more\
    \ than one year. Enter 7 for the TerritoryID.  \n7.  When you click View Report,\
    \ you will see an error message as shown in Figure [6-26](#A395630_1_En_6_Chapter.html#Fig26).\n\
    \n![A395630_1_En_6_Fig26_HTML.jpg](A395630_1_En_6_Fig26_HTML.jpg)\n\nFigure 6-26.\n\
    \nThe error when multiple values are chosen for OrderYear\n\nAs a workaround,\
    \ the parameters for the stored proc must be changed to accept string values instead\
    \ of just integers. Then, logic must be added to the proc to handle a comma delimited\
    \ list instead of one value for each parameter. A function is often used to parse\
    \ the list and save the values into a temporary table. Follow these steps to change\
    \ the stored proc so that it can accept multiple values.\n\n1.  In SSMS, run this\
    \ code to create a function to change a list of values into a table. You can copy\
    \ the code from the Source Code/Download area for this book on the Apress web\
    \ site ( [`www.Apress.com`](http://www.Apress.com) ).\n\n```\n    USE AdventureWorks2016;\n\
    \    GO\n    IF OBJECT_ID('udf_ListToTable') IS NOT NULL\n    DROP FUNCTION dbo.udf_ListToTable;\n\
    \    GO\n    CREATE FUNCTION dbo.udf_ListToTable(@List NVARCHAR(4000),\n    @Delimiter\
    \ NCHAR(1))\n    RETURNS @ValueList TABLE (ListItem NVARCHAR(50)) AS\n    BEGIN\n\
    \    DECLARE @Pos INT;\n    DECLARE @Item NVARCHAR(50);\n    --Find the first\
    \ delimiter\n    SET @Pos = CHARINDEX(@Delimiter,@List);\n    --loop until all\
    \ items are processed\n    WHILE @Pos > 0 BEGIN\n    --insert the current item\n\
    \    INSERT INTO @ValueList(ListItem)\n    SELECT LEFT(@List,@Pos-1);\n    --remove\
    \ current item from the string\n    SET @List = SUBSTRING(@List,@Pos+1,4000);\n\
    \    --find the next delimiter\n    SET @Pos = CHARINDEX(@Delimiter,@List);\n\
    \    END;\n    --add the last item\n    INSERT INTO @ValueList(ListItem)\n   \
    \ SELECT @List;\n    RETURN;\n    END;\n    GO\n    ```\n\n2.  Click Execute to\
    \ run the code and create the function.  \n3.  Click New Query to open another\
    \ query window.  \n4.  Run this code in SSMS to modify the stored procedure.\n\
    \n```\n    USE AdventureWorks2016;\n    GO\n    IF OBJECT_ID('usp_SalesByTerritory')\
    \ IS NOT NULL\n    DROP PROC usp_SalesByTerritory;\n    GO\n    CREATE PROC usp_SalesByTerritory\n\
    \    @YearList NVARCHAR(4000), @TerritoryIDList NVARCHAR(4000) AS\n    DECLARE\
    \ @Years TABLE (OrderYear INT);\n    DECLARE @Territories TABLE(TerritoryID INT);\n\
    \    --Save the lists into table variables\n    INSERT INTO @Years(OrderYear)\n\
    \    SELECT ListItem\n    FROM dbo.udf_ListToTable(@YearList,',');\n    INSERT\
    \ INTO @Territories(TerritoryID)\n    SELECT ListItem\n    FROM dbo.udf_ListToTable(@TerritoryIDList,',');\n\
    \    --Change the query to use IN lists in the WHERE clause\n    SELECT YEAR(OrderDate)\
    \ AS OrderYear, C.CustomerID,\n    SUM(TotalDue) AS Sales,\n    T.TerritoryID,\
    \ T.Name AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN\
    \ Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS\
    \ S ON S.BusinessEntityID = C.StoreID\n    WHERE YEAR(OrderDate) IN (SELECT OrderYear\
    \ FROM @Years)\n    AND T.TerritoryID IN (SELECT TerritoryID FROM @Territories)\n\
    \    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n\
    \    GO\n    ```\n\n5.  Click Execute to run the code.\n\nYou now have a function\
    \ that can be used whenever you run into this problem. The stored procedure uses\
    \ the new function to insert each list into a table variable. Then, in the WHERE\
    \ clause, the table variables are used as IN lists. If your source of data is\
    \ hosted on SQL Server 2016, you can use a new built-in function called `STRING_SPLIT()`\
    \ instead of the custom function used in this example."
  trans: "## 使用存储过程\n\nSQL Server 存储过程（也称为 stored procs 或 sprocs）是包含 T-SQL 脚本的对象。这些存储过程可能包含循环等编程逻辑，可能更新数据，或者仅包含一个\
    \ `SELECT` 查询。存储过程常用于 SSRS 数据集中，并且根据定义可能需要参数。如果您使用的是网络 SQL Server，您可能需要联系数据库管理员以获取创建存储过程的权限。否则，要创建存储过程，请按照以下步骤操作。\n\
    \n1.  使用 SQL Server Management Studio（SSMS）连接到您的 SQL Server。\n2.  单击“新建查询”，这将打开一个查询窗口。\n\
    3.  在查询窗口中输入此代码，可以手动键入或从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制。该代码创建一个需要一个参数\
    \ `TerritoryID` 的存储过程，然后返回按该 `TerritoryID` 筛选的结果。\n\n```\nUSE AdventureWorks2016;\n\
    GO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT NULL\n    DROP PROC usp_SalesByTerritory;\n\
    GO\nCREATE PROC usp_SalesByTerritory @Year INT, @TerritoryID INT AS\nSELECT YEAR(OrderDate)\
    \ AS OrderYear, C.CustomerID,\n       SUM(TotalDue) AS Sales,\n       T.TerritoryID,\
    \ T.Name AS Territory, s.Name AS Store\nFROM sales.SalesOrderHeader AS SOH\n \
    \   JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN\
    \ Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS\
    \ S ON S.BusinessEntityID = C.StoreID\nWHERE YEAR(OrderDate) = @Year AND T.TerritoryID\
    \ = @TerritoryID\nGROUP BY C.CustomerID, T.TerritoryID, T.Name,\n         YEAR(OrderDate),\
    \ S.Name;\n```\n\n4.  单击菜单栏中的“执行”或按 F5 来创建该过程，如图 6-23 所示。\n\n![A395630_1_En_6_Fig23_HTML.jpg](img/A395630_1_En_6_Fig23_HTML.jpg)\n\
    \n图 6-23. “执行”图标。\n\n5.  单击“新建查询”。在新的查询窗口中，通过运行以下代码测试该过程：\n\n```\nusp_SalesByTerritory\
    \ @Year = 2011, @TerritoryID = 6;\n```\n\n在数据集中使用存储过程与使用查询没有太大区别。请按照以下步骤创建一个使用新存储过程的报表。\n\
    \n1.  向项目添加一个名为“Stored Proc”的新报表。\n2.  添加一个指向 `AdventureWorks2016` 的数据源，并将其命名为\
    \ `AdventureWorks`。\n3.  向报表添加一个名为 `SalesByTerritory` 的嵌入数据集。使用 `AdventureWorks`\
    \ 数据源。\n4.  将查询类型更改为“存储过程”。\n5.  执行此操作后，对话框会发生变化。您将看到一个下拉框，列出了数据库中的存储过程。选择 `usp_SalesByTerritory`。对话框应如图\
    \ 6-24 所示。\n\n![A395630_1_En_6_Fig24_HTML.jpg](img/A395630_1_En_6_Fig24_HTML.jpg)\n\
    \n图 6-24. 在数据集中使用存储过程。\n\n6.  单击“确定”以创建数据集。它也会自动将参数添加到报表中。\n7.  将一个矩阵控件拖到报表画布上。\n\
    8.  将 `OrderYear` 添加到“列”单元格。\n9.  将 `Sales` 添加到“数据”单元格。它将自动求和。\n10. 将 `TerritoryID`\
    \ 添加到“行”单元格。布局应如图 6-25 所示。\n\n![A395630_1_En_6_Fig25_HTML.jpg](img/A395630_1_En_6_Fig25_HTML.jpg)\n\
    \n图 6-25. 矩阵设计。\n\n当您预览报表时，系统将提示您输入 `OrderYear` 和 `TerritoryID`。填入 2012 和 7 以查看数据。\n\
    \n然而，使用存储过程存在一个问题。如果您将参数切换为接受多个值，报表将不再工作。这是因为存储过程期望每个参数接收一个整数值，而不是一个变量列表。要查看问题，请按照以下步骤操作。\n\
    \n1.  切换回设计视图。\n2.  修改 `Year` 参数，使其允许多个值。\n3.  在“可用值”页面上，选择“指定值”并添加 2011 到 2014。\n\
    4.  单击“确定”保存更改。\n5.  预览报表。\n6.  选择一个以上的年份。为 `TerritoryID` 输入 7。\n7.  当您单击“查看报表”时，您将看到一条错误消息，如图\
    \ 6-26 所示。\n\n![A395630_1_En_6_Fig26_HTML.jpg](img/A395630_1_En_6_Fig26_HTML.jpg)\n\
    \n图 6-26. 当为 `OrderYear` 选择多个值时出现的错误。\n\n作为解决方法，必须修改存储过程的参数以接受字符串值，而不仅仅是整数。然后，必须向过程中添加逻辑以处理逗号分隔的列表，而不是每个参数的一个值。通常使用一个函数来解析列表并将值保存到临时表中。请按照以下步骤修改存储过程，使其能够接受多个值。\n\
    \n1.  在 SSMS 中，运行此代码创建一个函数，用于将值列表转换为表。您可以从本书在 Apress 网站（`www.Apress.com`）上的源代码/下载区域复制代码。\n\
    \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('udf_ListToTable') IS NOT NULL\n\
    \    DROP FUNCTION dbo.udf_ListToTable;\nGO\nCREATE FUNCTION dbo.udf_ListToTable(@List\
    \ NVARCHAR(4000),\n    @Delimiter NCHAR(1))\nRETURNS @ValueList TABLE (ListItem\
    \ NVARCHAR(50)) AS\nBEGIN\n    DECLARE @Pos INT;\n    DECLARE @Item NVARCHAR(50);\n\
    \    --Find the first delimiter\n    SET @Pos = CHARINDEX(@Delimiter,@List);\n\
    \    --loop until all items are processed\n    WHILE @Pos > 0 BEGIN\n        --insert\
    \ the current item\n        INSERT INTO @ValueList(ListItem)\n            SELECT\
    \ LEFT(@List,@Pos-1);\n        --remove current item from the string\n       \
    \ SET @List = SUBSTRING(@List,@Pos+1,4000);\n        --find the next delimiter\n\
    \        SET @Pos = CHARINDEX(@Delimiter,@List);\n    END;\n    --add the last\
    \ item\n    INSERT INTO @ValueList(ListItem)\n        SELECT @List;\n    RETURN;\n\
    END;\nGO\n```\n\n2.  单击“执行”来运行代码并创建该函数。\n3.  单击“新建查询”以打开另一个查询窗口。\n4.  在 SSMS 中运行此代码以修改存储过程。\n\
    \n```\nUSE AdventureWorks2016;\nGO\nIF OBJECT_ID('usp_SalesByTerritory') IS NOT\
    \ NULL\n    DROP PROC usp_SalesByTerritory;\nGO\nCREATE PROC usp_SalesByTerritory\n\
    \    @YearList NVARCHAR(4000), @TerritoryIDList NVARCHAR(4000) AS\n    DECLARE\
    \ @Years TABLE (OrderYear INT);\n    DECLARE @Territories TABLE(TerritoryID INT);\n\
    \    --Save the lists into table variables\n    INSERT INTO @Years(OrderYear)\n\
    \        SELECT ListItem\n        FROM dbo.udf_ListToTable(@YearList,',');\n \
    \   INSERT INTO @Territories(TerritoryID)\n        SELECT ListItem\n        FROM\
    \ dbo.udf_ListToTable(@TerritoryIDList,',');\n    --Change the query to use IN\
    \ lists in the WHERE clause\n    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID,\n\
    \           SUM(TotalDue) AS Sales,\n           T.TerritoryID, T.Name AS Territory,\
    \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n        JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n        JOIN Sales.Customer AS C ON\
    \ SOH.CustomerID = C.CustomerID\n        JOIN Sales.Store AS S ON S.BusinessEntityID\
    \ = C.StoreID\n    WHERE YEAR(OrderDate) IN (SELECT OrderYear FROM @Years)\n \
    \     AND T.TerritoryID IN (SELECT TerritoryID FROM @Territories)\n    GROUP BY\
    \ C.CustomerID, T.TerritoryID, T.Name,\n             YEAR(OrderDate), S.Name;\n\
    GO\n```\n\n5.  单击“执行”来运行代码。\n\n现在，每当您遇到此问题时，都可以使用这个函数。该存储过程使用新函数将每个列表插入到一个表变量中。然后，在\
    \ `WHERE` 子句中，这些表变量被用作 `IN` 列表。如果您的数据源托管在 SQL Server 2016 上，您可以使用一个新的内置函数 `STRING_SPLIT()`\
    \ 来代替本示例中使用的自定义函数。"
- fmt: "## 修改报告以配合存储过程的更改\n\n现在需要对报告进行一些更改，以适应存储过程的变更。请遵循以下步骤：\n\n1.  切换到“存储过程报告”的设计视图。\n\
    2.  打开 `SalesByTerritory` 数据集的属性。\n3.  在“查询”选项卡上，单击“刷新字段”。这将创建与更新后的存储过程匹配的新参数：`@YearList`\
    \ 和 `@TerritoryIDList`。\n4.  单击“确定”。\n5.  展开“参数”文件夹。\n6.  删除 `Year` 和 `TerritoryID`\
    \ 参数。对于修改后的存储过程，它们不再需要。\n7.  创建一个名为 `Territory` 的新数据集。它应指向共享的 `Territory` 数据集。\n\
    8.  打开 `TerritoryIDList` 参数的属性。\n9.  勾选“允许多个值”。\n10. 在“可用值”页面上，选择“从查询中获取值”。\n\
    11. 从“数据集”列表中选择 `Territory`。\n12. 从“值字段”列表中选择 `TerritoryID`。\n13. 从“标签字段”列表中选择\
    \ `Territory`。\n14. 单击“确定”接受更改。\n15. 打开 `YearList` 参数的属性。\n16. 勾选“允许多个值”。\n17.\
    \ 在“可用值”页面上，输入 2011 至 2014 作为硬编码值。\n18. 单击“确定”保存属性。\n19. 在参数窗格中将参数向左拖动。被删除的两个参数留下了空位。\n\
    20. 预览报告；当选择多个值时，它现在应按预期工作。\n\n在 SSRS 中工作时，存储过程通常是首选的命令类型。它们允许代码重用，并且可以创建得比仅允许用户对表运行查询更安全。主要缺点是报表开发人员可能没有在数据库中创建或修改存储过程的权限。\n\
    \n## 控制属性\n\n虽然筛选数据是使报表动态化的常见原因，但你也可以动态控制几乎任何属性。为此，你将利用基于数据或参数的表达式。你在第 [4] 章中看到了一个这样的例子，在那里设置了交替的背景颜色。\n\
    \n你可以控制任何属性为“表达式”作为属性选择，或属性旁边带有 `fx` 图标的属性。本节涵盖几个示例。\n\n### 可见性\n\n你可以使用表达式来显示或隐藏表格或行等对象，但表达式的值必须在报表实际显示之前已知。请遵循以下步骤，使用参数控制可见性。\n\
    \n1.  在项目中添加一个名为 `Visibility` 的新报表。\n2.  向报表添加两个矩形控件。\n3.  将两个矩形的“填充颜色”更改为深色，例如蓝色。\n\
    4.  调整大小，使一个为大矩形，一个为小正方形。报表布局应如图 [6-27] 所示。\n5.  向报表添加一个名为 `ShowRectangle` 的参数，其“提示”属性设置为\
    \ `Show Rectangle`。\n6.  将“数据类型”更改为“布尔值”。\n7.  单击“确定”创建参数。\n8.  添加第二个名为 `ShowSquare`\
    \ 的参数，其“提示”属性设置为 `Show Square`。\n9.  将“数据类型”更改为“布尔值”。\n10. 单击“确定”创建第二个参数。\n11.\
    \ 右键单击矩形形状，选择“矩形属性”。\n12. 切换到“可见性”页面。\n13. 将“报表最初运行时”属性更改为“基于表达式显示或隐藏”。\n14. 单击\
    \ `fx` 图标以打开“表达式”对话框。请注意，你将设置一个表达式来隐藏矩形，如图 [6-28] 所示。这可能看起来违反直觉，因此在为此属性创建表达式时请务必牢记。\n\
    15. 在“类别”列表中，选择“参数”。你将在“值”列表中看到列出的两个参数，如图 [6-29] 所示。\n16. 双击 `ShowRectangle`。\n\
    17. 如果表达式的计算结果为 `True`，矩形将被隐藏。将表达式更改为：\n    ```\n    =Not Parameters!ShowRectangle.Value\n\
    \    ```\n18. 单击“确定”关闭“表达式”对话框，然后单击“确定”关闭“矩形属性”对话框。\n19. 对小正方形形状重复此过程，选择 `ShowSquare`\
    \ 参数。\n20. 预览报表进行测试。图 [6-30] 显示了一个示例。\n\n另一种控制可见性的方法通常与组一起使用。这在 [2] 章的向导报告中已演示，你可以单击加号展开详细信息。\n\
    \n你将在组上设置一个属性，以根据在父组中找到的单元格切换可见性。要手动执行此操作，请按照以下步骤操作：\n\n1.  通过右键单击“报告”并选择“添加”➤“现有项”，从\
    \ [5] 章项目中导入 `Sales by Territory 2.rdl` 文件。\n2.  双击报表在设计视图中打开它。\n3.  右键单击 `TerritoryID`\
    \ 单元格，选择“文本框属性”。\n4.  如果尚未设置，则将“名称”属性更改为 `TerritoryID`。\n5.  单击“确定”接受更改。\n6. \
    \ 在“行组”窗口中，右键单击“详细信息”组。这是最内层的子组。\n7.  选择“组属性”。\n8.  选择“可见性”页面。\n9.  选择“隐藏”，并勾选“可以通过此报表项切换显示”。\n\
    10. 在下拉列表中，选择 `TerritoryID`。属性应如图 [6-31] 所示。"
  raw: "Now it is time to make a few changes to the report to work with the changes\
    \ to the stored proc. Follow these steps:\n\n1.  Switch to design view of the\
    \ Stored Proc report.  \n2.  Bring up the properties of the SalesByTerritory dataset.\
    \  \n3.  On the Query page, click Refresh Fields. This will create new parameters\
    \ that match the updated stored procedure, @YearList and @TerritoryIDList.  \n\
    4.  Click OK.  \n5.  Expand the Parameters folder.  \n6.  Delete the Year and\
    \ TerritoryID parameters. They are no longer needed with the modified stored proc.\
    \  \n7.  Create a new dataset named Territory. It should point to the shared Territory\
    \ dataset.  \n8.  Bring up the properties of the TerritoryIDList parameter.  \n\
    9.  Check Allow multiple values.  \n10.  On the Available Values page, select\
    \ Get values from a query.  \n11.  Select Territory from the Dataset list.  \n\
    12.  Select TerritoryID from the Value field list.  \n13.  Select Territory from\
    \ the Label field list.  \n14.  Click OK to accept the changes.  \n15.  Open the\
    \ properties of the YearList parameter.  \n16.  Check Allow multiple values.  \n\
    17.  On the Available Values page, enter 2011 through 2014 as hard-coded values.\
    \  \n18.  Click OK to save the properties.  \n19.  Drag the parameters to the\
    \ left in the parameter pane. The two deleted parameters left empty spaces.  \n\
    20.  Preview the report; it should now work as expected when multiple values are\
    \ chosen.\n\nStored procedures are often the preferred type of command when working\
    \ in SSRS. They allow reuse of code and also can be created to be more secure\
    \ than just allowing the user to run queries against the tables. The main downfall\
    \ is that the report developer may not have rights to create or modify stored\
    \ procs in the database.\n\n## Controlling Properties\n\nWhile filtering the data\
    \ is a very common reason to make a report dynamic, you can also control almost\
    \ any property dynamically. To do this, you will take advantage of expressions\
    \ based on the data or parameters. You saw an example of this in Chapter [4](#A395630_1_En_4_Chapter.html)\
    \ where you set up alternating background colors.\n\nYou can control any property\
    \ that shows Expression as a property choice or with the fx icon next to the property.\
    \ This section covers several examples.\n\n### Visibility\n\nYou can show or hide\
    \ objects such as tables or rows with an expression, but the value of the expression\
    \ must be known before the report actually displays. Follow these steps to use\
    \ a parameter to control visibility.\n\n1.  Add a new report to the project named\
    \ Visibility.  \n2.  Add two rectangle controls to the report.  \n3.  Change the\
    \ Fill Color of the two rectangles to a dark color such as Blue.  \n4.  Alter\
    \ the sizes so that one is a large rectangle and one is a small square. The report\
    \ layout should look like Figure [6-27](#A395630_1_En_6_Chapter.html#Fig27).\n\
    \n![A395630_1_En_6_Fig27_HTML.jpg](A395630_1_En_6_Fig27_HTML.jpg)\n\nFigure 6-27.\n\
    \nThe report with two rectangles  \n5.  Add a parameter to the report named ShowRectangle\
    \ with the Prompt property set to Show Rectangle.  \n6.  Change the Data type\
    \ to Boolean.  \n7.  Click OK to create the parameter.  \n8.  Add a second parameter\
    \ named ShowSquare with the Prompt property set to Show Square.  \n9.  Change\
    \ the Data type to Boolean.  \n10.  Click OK to create the second parameter.  \n\
    11.  Right-click the rectangle shape and select Rectangle Properties.  \n12. \
    \ Switch to the Visibility page.  \n13.  Change the When the report is initially\
    \ run property to Show or hide based on an expression.  \n14.  Click the fx icon\
    \ to open the Expression dialog. Notice that you will be setting an expression\
    \ to hide the rectangle as shown in Figure [6-28](#A395630_1_En_6_Chapter.html#Fig28).\
    \ This may seem counter-intuitive, so always keep it in mind when creating an\
    \ expression for this property.\n\n![A395630_1_En_6_Fig28_HTML.jpg](A395630_1_En_6_Fig28_HTML.jpg)\n\
    \nFigure 6-28.\n\nSet the expression for Hidden  \n15.  In the Category list,\
    \ select Parameters. You will see the two parameters listed in the Values list\
    \ as shown in Figure [6-29](#A395630_1_En_6_Chapter.html#Fig29).\n\n![A395630_1_En_6_Fig29_HTML.jpg](A395630_1_En_6_Fig29_HTML.jpg)\n\
    \nFigure 6-29.\n\nThe parameters of the report in the Expressions dialog box  \n\
    16.  Double-click ShowRectangle.  \n17.  If the expression evaluates to True,\
    \ the rectangle will be hidden. Change the expression to\n\n```\n    =Not Parameters!ShowRectangle.Value\n\
    \    ```\n\n18.  Click OK to dismiss the Expression dialog and then OK to dismiss\
    \ the Rectangle Properties dialog.  \n19.  Repeat the process for the small square\
    \ shape, selecting the ShowSquare parameter.  \n20.  Preview the report to test\
    \ it. Figure [6-30](#A395630_1_En_6_Chapter.html#Fig30) shows an example.\n\n\
    ![A395630_1_En_6_Fig30_HTML.jpg](A395630_1_En_6_Fig30_HTML.jpg)\n\nFigure 6-30.\n\
    \nThe report showing just the square\n\nAnother way to control visibility is often\
    \ used with groups. This was demonstrated in the wizard report in Chapter [2](#A395630_1_En_2_Chapter.html)\
    \ where you could click a plus sign to expand the details.\n\nYou will set a property\
    \ on a group to toggle the visibility based on a cell found in the parent group\
    \ . To learn how to do this manually, follow these steps:\n\n1.  Import the Sales\
    \ by Territory 2.rdl file from the Chapter [5](#A395630_1_En_5_Chapter.html) project\
    \ by right-clicking Reports and selecting Add ➤ Existing Item.  \n2.  Double-click\
    \ the report to open it in design view.  \n3.  Right-click the TerritoryID cell\
    \ and select Text Box Properties.  \n4.  Change the Name property to TerritoryID\
    \ if it is not set that way already.  \n5.  Click OK to accept the change.  \n\
    6.  In the Row Groups window, right-click the Details group. This is the innermost\
    \ child group.  \n7.  Select Group Properties.  \n8.  Select the Visibility page.\
    \  \n9.  Select Hide and check Display can be toggled by this report item.  \n\
    10.  In the dropdown list, select TerritoryID. The properties should look like\
    \ Figure [6-31](#A395630_1_En_6_Chapter.html#Fig31).\n\n![A395630_1_En_6_Fig31_HTML.jpg](A395630_1_En_6_Fig31_HTML.jpg)\n\
    \nFigure 6-31."
  trans: "## 修改报告以配合存储过程的更改\n\n现在需要对报告进行一些更改，以适应存储过程的变更。请遵循以下步骤：\n\n1.  切换到“存储过程报告”的设计视图。\n\
    2.  打开 `SalesByTerritory` 数据集的属性。\n3.  在“查询”选项卡上，单击“刷新字段”。这将创建与更新后的存储过程匹配的新参数：`@YearList`\
    \ 和 `@TerritoryIDList`。\n4.  单击“确定”。\n5.  展开“参数”文件夹。\n6.  删除 `Year` 和 `TerritoryID`\
    \ 参数。对于修改后的存储过程，它们不再需要。\n7.  创建一个名为 `Territory` 的新数据集。它应指向共享的 `Territory` 数据集。\n\
    8.  打开 `TerritoryIDList` 参数的属性。\n9.  勾选“允许多个值”。\n10. 在“可用值”页面上，选择“从查询中获取值”。\n\
    11. 从“数据集”列表中选择 `Territory`。\n12. 从“值字段”列表中选择 `TerritoryID`。\n13. 从“标签字段”列表中选择\
    \ `Territory`。\n14. 单击“确定”接受更改。\n15. 打开 `YearList` 参数的属性。\n16. 勾选“允许多个值”。\n17.\
    \ 在“可用值”页面上，输入 2011 至 2014 作为硬编码值。\n18. 单击“确定”保存属性。\n19. 在参数窗格中将参数向左拖动。被删除的两个参数留下了空位。\n\
    20. 预览报告；当选择多个值时，它现在应按预期工作。\n\n在 SSRS 中工作时，存储过程通常是首选的命令类型。它们允许代码重用，并且可以创建得比仅允许用户对表运行查询更安全。主要缺点是报表开发人员可能没有在数据库中创建或修改存储过程的权限。\n\
    \n## 控制属性\n\n虽然筛选数据是使报表动态化的常见原因，但你也可以动态控制几乎任何属性。为此，你将利用基于数据或参数的表达式。你在第 [4] 章中看到了一个这样的例子，在那里设置了交替的背景颜色。\n\
    \n你可以控制任何属性为“表达式”作为属性选择，或属性旁边带有 `fx` 图标的属性。本节涵盖几个示例。\n\n### 可见性\n\n你可以使用表达式来显示或隐藏表格或行等对象，但表达式的值必须在报表实际显示之前已知。请遵循以下步骤，使用参数控制可见性。\n\
    \n1.  在项目中添加一个名为 `Visibility` 的新报表。\n2.  向报表添加两个矩形控件。\n3.  将两个矩形的“填充颜色”更改为深色，例如蓝色。\n\
    4.  调整大小，使一个为大矩形，一个为小正方形。报表布局应如图 [6-27] 所示。\n5.  向报表添加一个名为 `ShowRectangle` 的参数，其“提示”属性设置为\
    \ `Show Rectangle`。\n6.  将“数据类型”更改为“布尔值”。\n7.  单击“确定”创建参数。\n8.  添加第二个名为 `ShowSquare`\
    \ 的参数，其“提示”属性设置为 `Show Square`。\n9.  将“数据类型”更改为“布尔值”。\n10. 单击“确定”创建第二个参数。\n11.\
    \ 右键单击矩形形状，选择“矩形属性”。\n12. 切换到“可见性”页面。\n13. 将“报表最初运行时”属性更改为“基于表达式显示或隐藏”。\n14. 单击\
    \ `fx` 图标以打开“表达式”对话框。请注意，你将设置一个表达式来隐藏矩形，如图 [6-28] 所示。这可能看起来违反直觉，因此在为此属性创建表达式时请务必牢记。\n\
    15. 在“类别”列表中，选择“参数”。你将在“值”列表中看到列出的两个参数，如图 [6-29] 所示。\n16. 双击 `ShowRectangle`。\n\
    17. 如果表达式的计算结果为 `True`，矩形将被隐藏。将表达式更改为：\n    ```\n    =Not Parameters!ShowRectangle.Value\n\
    \    ```\n18. 单击“确定”关闭“表达式”对话框，然后单击“确定”关闭“矩形属性”对话框。\n19. 对小正方形形状重复此过程，选择 `ShowSquare`\
    \ 参数。\n20. 预览报表进行测试。图 [6-30] 显示了一个示例。\n\n另一种控制可见性的方法通常与组一起使用。这在 [2] 章的向导报告中已演示，你可以单击加号展开详细信息。\n\
    \n你将在组上设置一个属性，以根据在父组中找到的单元格切换可见性。要手动执行此操作，请按照以下步骤操作：\n\n1.  通过右键单击“报告”并选择“添加”➤“现有项”，从\
    \ [5] 章项目中导入 `Sales by Territory 2.rdl` 文件。\n2.  双击报表在设计视图中打开它。\n3.  右键单击 `TerritoryID`\
    \ 单元格，选择“文本框属性”。\n4.  如果尚未设置，则将“名称”属性更改为 `TerritoryID`。\n5.  单击“确定”接受更改。\n6. \
    \ 在“行组”窗口中，右键单击“详细信息”组。这是最内层的子组。\n7.  选择“组属性”。\n8.  选择“可见性”页面。\n9.  选择“隐藏”，并勾选“可以通过此报表项切换显示”。\n\
    10. 在下拉列表中，选择 `TerritoryID`。属性应如图 [6-31] 所示。"
- fmt: '## 可见性设置


    11. 单击 **OK** 接受属性。

    12. 确保 `OrderYear` 单元格被命名为 `OrderYear`，就像处理 `TerritoryID` 时那样。

    13. 右键单击 `TerritoryID` 组，选择 **Group Properties**。

    14. 在 **Visibility** 页面上，选择 **Hide** 并使此组由 `OrderYear` 切换。

    15. 单击 **OK** 接受属性。您无需在 `OrderYear` 组上设置属性，因为它是最高级别的父级。

    16. 预览报表。它应如图 [6-32](#A395630_1_En_6_Chapter.html#Fig32) 所示。


    ![A395630_1_En_6_Fig32_HTML.jpg](A395630_1_En_6_Fig32_HTML.jpg)


    图 6-32. 带有折叠部分的报表


    当您单击年份旁边的加号时，您将看到该年份的地区。当您单击 `TerritoryID` 旁边的加号时，您将看到该地区的详细信息，如图 [6-33](#A395630_1_En_6_Chapter.html#Fig33)
    所示。


    ![A395630_1_En_6_Fig33_HTML.jpg](A395630_1_En_6_Fig33_HTML.jpg)


    图 6-33. 展开的报表


    此方法的主要缺点是您一次只能展开一个组。要显示所有详细信息需要点击很多次。更好的解决方案是向报表添加参数以控制组的可见性。为此，请遵循以下步骤：


    1. 在 **Solution Explorer** 中，创建 `Sales by Territory 2` 报表的副本。将新报表命名为 `Visibility
    by Parameters`。

    2. 添加一个名为 `DisplayTerritories` 的参数。提示应为 `Display Territories`，数据类型应为 **Boolean**。将默认值设置为
    **False**。

    3. 添加另一个名为 `DisplayDetailRows` 的参数。提示应为 `Display Detail Rows`。它也应是一个默认值为 **False**
    的 **Boolean**。

    4. 打开 **Details** 组的 **Group Properties**。

    5. 在 **Visibility** 页面上，取消选中 **Display can be toggled by this report item**。

    6. 选择 **Show or Hide based on an expression**。对话框应如图 [6-34](#A395630_1_En_6_Chapter.html#Fig34)
    所示。`TerritoryID` 字段可能仍作为报表项可见，但已禁用。


    ![A395630_1_En_6_Fig34_HTML.jpg](A395630_1_En_6_Fig34_HTML.jpg)


    图 6-34. Group Properties 对话框

    7. 单击 **fx** 图标以打开 **Expression** 对话框。

    8. 添加此表达式：


    ```

    =NOT Parameters!DisplayDetailRows.Value

    ```


    9. 单击 **OK** 接受表达式，然后再次单击 **OK** 关闭 **Group Properties** 对话框。

    10. 对 `TerritoryID` 组重复此过程。这次表达式为：


    ```

    =NOT Parameters!DisplayTerritories.Value

    ```


    11. 预览报表。在更改参数之前，它应如图 [6-35](#A395630_1_En_6_Chapter.html#Fig35) 所示。


    ![A395630_1_En_6_Fig35_HTML.jpg](A395630_1_En_6_Fig35_HTML.jpg)


    图 6-35. 仅显示摘要的报表


    请注意，年份旁边的加号消失了。如果将 `Display Territories` 更改为 **True** 并再次运行报表，这次所有地区都将显示。要查看详细信息，必须将两个参数都设置为
    **true**。


    ### 格式化


    几乎任何属性都可以由表达式控制。该表达式可以包含数据集中的字段。为了演示，您将把销售额超过 $2,000,000 的地区行的字体加粗。请遵循以下步骤：


    1. 切换到 `Sales by Territory 2` 报表的设计视图。

    2. 选择地区行。

    3. 在 **Properties** 窗口中，找到 `FontWeight` 属性。

    4. 从下拉列表中，选择 `<Expression>`，这将打开 **Expression** 对话框。

    5. 添加此表达式：


    ```

    =Iif(SUM(Fields!Sales.Value)>=2000000,"Bold","Default")

    ```


    6. 单击 **OK** 保存更改。

    7. 预览报表并展开以查看地区。报表将如图 [6-36](#A395630_1_En_6_Chapter.html#Fig36) 所示。


    ![A395630_1_En_6_Fig36_HTML.jpg](A395630_1_En_6_Fig36_HTML.jpg)


    图 6-36. 销售额达到或超过 $2,000,000 的地区以粗体显示


    `Iif` 函数，也称为内联 if，接受三个参数。第一个是要测试的表达式。如果表达式返回 true，则返回第二个参数。如果表达式返回 false，则返回第三个值。表达式返回的值用作属性值。在此示例中，当销售额至少为
    $2,000,000 时，返回单词 **Bold**。


    ### 交互排序


    可以使用标题行中单元格的属性来控制排序。根据我的经验，它与折叠部分配合得不太好。请遵循以下步骤启用交互排序：


    1. 创建 `Sales by Territory 2` 的副本。将其名称更改为 `Interactive Sort`。

    2. 在 **Solution Explorer** 中双击新报表以在设计视图中打开它。

    3. 清除 `TerritoryID` 和 `Details` 组的可见性设置。将两者都设置回 **Show** 并取消选中 **Display can be
    toggled by this report item**。

    4. 预览报表以确保组和详细信息均可见。

    5. 切换回设计视图。

    6. 右键单击 `Order Year` 标题单元格，选择 **Text Box Properties**。

    7. 选择 **Interactive Sorting** 页面。

    8. 选中 **Enable interactive sorting on this text box**。

    9. 在 **Choose what to sort** 下，选择 **Groups**。

    10. 从下拉框中，选择 `OrderYear`。这是要排序的部分。

    11. 从 **Sort by** 列表中，选择 `[OrderYear]`。对话框应如图 [6-37](#A395630_1_En_6_Chapter.html#Fig37)
    所示。


    ![A395630_1_En_6_Fig37_HTML.jpg](A395630_1_En_6_Fig37_HTML.jpg)


    图 6-37. Interactive Sorting 属性

    12. 单击 **OK** 接受属性。

    13. 为 `Territory ID` 标题单元格设置交互排序属性。排序应应用于 `TerritoryID` 组并按 `TerritoryID` 排序。

    14. 为 `Customer ID` 标题单元格设置交互排序属性。排序应应用于 **Detail** 行。按 `CustomerID` 排序。

    15. 为 `Store` 标题单元格设置交互排序属性。排序应应用于 **Detail** 行。按 `Store` 排序。

    16. 预览报表。您将在每个可排序列旁边看到箭头图标，如图 [6-38](#A395630_1_En_6_Chapter.html#Fig38) 所示。


    ![A395630_1_En_6_Fig38_HTML.jpg](A395630_1_En_6_Fig38_HTML.jpg)


    图 6-38. 排序图标


    单击图标可更改报表的排序顺序。第一次单击时，排序将变为升序。再次单击可更改为降序。您可以将 `Order Year` 列从降序更改为升序。您可以在 `Customer
    ID` 和 `Store` 之间切换详细信息的排序。'
