  trans: "## 创建移动报表\n\n新的移动报表功能无疑是 SSRS 2016 中最受期待的增强功能。在 2015 年 10 月西雅图 PASS 峰会上宣布此功能之前，我可能会猜测此功能仅在\
    \ SharePoint 集成模式下可用。我很高兴微软正在原生模式 SSRS 上进行此项投资。在我看来，原生模式配置和管理起来要容易得多。我很高兴这个强大的功能既可用又易于管理。\n\
    \n在创建 KPI 时，系统会创建示例数据，以便您可以在将其连接到实际数据之前查看 KPI 的外观。移动报表也是如此。要开始使用，您需要下载并安装新的 `Mobile\
    \ Report Publisher` 应用程序。您可以通过点击下拉箭头并选择 `Mobile Report Publisher` 来找到链接，如图 10-31\
    \ 所示。\n\n![A395630_1_En_10_Fig31_HTML.jpg](img/A395630_1_En_10_Fig31_HTML.jpg)\n\
    *图 10-31. `Mobile Report Publisher` 链接*\n\n请按照链接页面上的说明下载并安装该应用程序。安装后，您可以从 Web\
    \ 门户启动它，或创建快捷方式。\n\n> **注意**\n>\n> 在 SQL Server 2016 发布时，`Mobile Report Publisher`\
    \ 还需要一个 Visual C++ 组件的补丁。如果该更新未安装，您将在安装过程中收到提示。请务必下载 `x86` 版本。\n\n与 KPI 一样，您需要创建共享数据集来构建移动报表。移动报表也可以使用从\
    \ Excel 导入的数据。Excel 数据的缺点是它必须手动刷新。\n\n> **注意**\n>\n> 从 2016 版本开始，您可以将 Excel 电子表格存储在\
    \ SSRS 中。但至少在撰写本文时可用的版本中，存储在 SSRS 中的文件无法用于移动报表。\n\n要开始使用，您将按照以下步骤使用模拟数据构建移动报表：\n\
    \n1.  在 Web 门户中，点击 **新建** ➤ **移动报表**。\n2.  确认任何关于运行应用程序的警告。为了避免以后再看到此消息，请创建应用程序的快捷方式，而不是通过\
    \ Web 门户启动。\n3.  您现在应该看到 `SQL Server Mobile Report Publisher`，您将在此构建移动报表，如图 10-32\
    \ 所示。\n\n    ![A395630_1_En_10_Fig32_HTML.jpg](img/A395630_1_En_10_Fig32_HTML.jpg)\n\
    \    *图 10-32. 移动报表设计画布*\n\n4.  从左侧，将一个 `选择列表` 拖到网格的顶部和左侧部分。向右拖动右侧边框，使其扩展覆盖四个方格。`选择列表`\
    \ 将用于筛选报表。\n5.  在 `选择列表` 下方拖放一个 `半圆图`。扩展它使其覆盖两个乘两个方格的区域。\n6.  在 `半圆图` 旁边拖放一个 `渐变热图`。扩展它使其也覆盖一个两乘两方格的区域。\n\
    7.  在底部的方格中填充一个 `类别图`。布局应如图 10-33 所示。\n\n    ![A395630_1_En_10_Fig33_HTML.jpg](img/A395630_1_En_10_Fig33_HTML.jpg)\n\
    \    *图 10-33. 移动报表布局*\n\n8.  点击 **预览** 按钮。报表应如图 10-34 所示。\n\n    ![A395630_1_En_10_Fig34_HTML.jpg](img/A395630_1_En_10_Fig34_HTML.jpg)\n\
    \    *图 10-34. 移动报表预览*\n\n9.  从 `选择列表 1` 中，选择其中一个项目。您将看到数据自动更改。\n10. 点击 `类别图 1`\
    \ 的标题。图表将展开以填充屏幕。\n11. 如果您点击其中一个柱形并按住光标，该柱形的数据将显示出来，如图 10-35 所示。\n\n    ![A395630_1_En_10_Fig35_HTML.jpg](img/A395630_1_En_10_Fig35_HTML.jpg)\n\
    \    *图 10-35. 单个柱形的数据*\n\n12. 点击 `类别图` 标题可返回报表。\n13. 点击报表标题左侧的返回箭头可返回到设计视图。\n\
    \n希望您此刻能对制作报表原型的便捷性及其交互性留下深刻印象。下一步是为每个报表项指定一个标题。表 10-2 显示了每个项目的标题。\n\n*表 10-2.\
    \ 报表项标题*\n\n| 项目 | 标题 |\n| --- | --- |\n| `选择列表` | 年份 |\n| `半圆图` | 配额 |\n| `渐变热图`\
    \ | 按州划分的美国销售额 |\n| `类别图` | 按月份划分的销售额 |\n\n请按照以下步骤设置标题：\n\n1.  在 `移动报表发布工具` 的设计视图中，确保选中了\
    \ **布局** 视图。\n2.  从设计网格中选择一个项目。\n3.  在 **可视化** 属性部分中填写 `标题`，如图 10-36 所示。\n\n \
    \   ![A395630_1_En_10_Fig36_HTML.jpg](img/A395630_1_En_10_Fig36_HTML.jpg)\n  \
    \  *图 10-36. `标题` 属性*\n\n4.  为每个项目重复此过程。\n5.  为确保不会丢失工作，请将报表定义作为 `rsmobile` 文件保存在本地计算机上。\n\
    \n至此，您已经有了一个设计，但它连接的是模拟数据。下一步是将报表连接到 SSRS 服务器。请按照以下步骤操作。\n\n1.  点击图 10-37 所示的\
    \ **服务器连接** 图标。\n\n    ![A395630_1_En_10_Fig37_HTML.jpg](img/A395630_1_En_10_Fig37_HTML.jpg)\n\
    \    *图 10-37. **服务器连接** 图标*\n\n2.  填写 **服务器地址**，如图 10-38 所示。\n\n    ![A395630_1_En_10_Fig38_HTML.jpg](img/A395630_1_En_10_Fig38_HTML.jpg)\n\
    \    *图 10-38. **连接到服务器** 属性*\n\n3.  除非您正在使用安全套接字层 (`SSL`)，否则请取消选中 **使用安全连接**。如果\
    \ SSRS 安装在您的本地工作站上，您很可能没有使用 `SSL`。\n4.  点击 **连接**。`移动报表发布工具` 将记住此连接。\n\n下一步是向\
    \ Web 门户添加数据集，这些数据集将用于填充移动报表，而不是使用模拟数据。请按照以下步骤创建数据集：\n\n1.  最小化 `移动报表发布工具`。\n\
    2.  在 Web 门户中，选择 **新建** ➤ **数据集** 以启动 `报表生成器`。\n3.  使用此查询和 `AdventureWorks2016`\
    \ 数据源创建一个新的名为 `SalesByState` 的共享数据集。如果您需要帮助，\"使用报表生成器\" 部分提供了创建数据集的说明。\n\n   \
    \ ```sql\n    SELECT SUM(TotalDue) AS Sales, vS.CountryRegionName, vS.StateProvinceName,\n\
    \        YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader AS SOH\n\
    \        JOIN Person.BusinessEntityAddress AS BEA\n            ON BEA.BusinessEntityID\
    \ = SOH.CustomerID\n        JOIN Person.Address AS A ON BEA.AddressID = A.AddressID\n\
    \        JOIN Person.vStateProvinceCountryRegion AS vS\n            ON A.StateProvinceID\
    \ = vS.StateProvinceID\n    WHERE CountryRegionName = 'United States'\n    GROUP\
    \ BY A.City, vS.CountryRegionName, vS.StateProvinceName,\n        YEAR(OrderDate);\n\
    \    ```\n\n4.  将新数据集保存在 **数据集** 文件夹中。\n5.  创建一个名为 `Sales` 的数据集，使用以下查询，并将其保存到\
    \ **数据集** 文件夹中：\n\n    ```sql\n    WITH\n    Sales AS (\n        SELECT SUM(TotalDue)\
    \ AS Sales, MONTH(OrderDate) AS OrderMonth,\n            YEAR(OrderDate) AS OrderYear,\n\
    \            LAG(SUM(TotalDue),12,600000) OVER(ORDER BY YEAR(OrderDate),\n   \
    \         MONTH(OrderDate)) * 1.10 AS Quota\n        FROM Sales.SalesOrderHeader\n\
    \        GROUP BY MONTH(OrderDate), YEAR(OrderDate)\n    ),\n    Comparison AS\
    \ (\n        SELECT OrderYear, Sales, OrderMonth, Quota,\n            Sales/Quota\
    \ AS PercentOfGoal\n        FROM Sales)\n    SELECT OrderYear, Sales, 'M' + RIGHT('0'\
    \ + CAST(OrderMonth AS VARCHAR(2)),2) AS OrderMonth, Quota,\n        PercentOfGoal,\
    \ DATEFROMPARTS(OrderYear,OrderMonth, 1) AS OrderDate,\n        CASE WHEN PercentOfGoal\
    \ >= 0.98 THEN 1\n            WHEN PercentOfGoal >= 0.9 THEN 0\n            ELSE\
    \ -1 END AS Status\n    FROM Comparison;\n    ```\n\n6.  关闭 `报表生成器`。\n\n您现在应该有两个可用于新移动报表的数据集。您将通过以下步骤将数据集连接到报表对象："
- fmt: "1. 最大化 Mobile Report Publisher。如果尚未打开，请打开你刚创建的 rsmobile 文件。\n2. 切换到 `Data`\
    \ 视图。你将看到连接到每个对象的模拟表，如图 [10-39](#A395630_1_En_10_Chapter.html#Fig39) 所示。\n   \
    \ ![A395630_1_En_10_Fig39_HTML.jpg](A395630_1_En_10_Fig39_HTML.jpg)\n    图 10-39.\
    \ `Data` 视图\n3. 点击 `Add Data`，如图 [10-40](#A395630_1_En_10_Chapter.html#Fig40)\
    \ 所示。\n    ![A395630_1_En_10_Fig40_HTML.jpg](A395630_1_En_10_Fig40_HTML.jpg)\n\
    \    图 10-40. 点击 `Add Data`\n4. 你将可以选择从 `Excel` 或 `Report Server` 导入，如图 [10-41](#A395630_1_En_10_Chapter.html#Fig41)\
    \ 所示。选择 `Report Server`。\n    ![A395630_1_En_10_Fig41_HTML.jpg](A395630_1_En_10_Fig41_HTML.jpg)\n\
    \    图 10-41. 选择 `Report Server`\n5. 在如图 [10-42](#A395630_1_En_10_Chapter.html#Fig42)\
    \ 所示的 `Add Data from Server` 屏幕上，选择你的 `SSRS` 实例。\n    ![A395630_1_En_10_Fig42_HTML.jpg](A395630_1_En_10_Fig42_HTML.jpg)\n\
    \    图 10-42. 选择服务器\n6. 接着你将看到直接位于 Web 门户 `Home` 文件夹下的所有文件夹。点击 `Datasets`。\n7.\
    \ 你现在应该能看到所有已创建的数据集列表，如图 [10-43](#A395630_1_En_10_Chapter.html#Fig43) 所示。点击 `SalesByState`。\n\
    \    ![A395630_1_En_10_Fig43_HTML.jpg](A395630_1_En_10_Fig43_HTML.jpg)\n    图\
    \ 10-43. 数据集\n8. 现在，`SalesByState` 数据集将显示在 Mobile Report Publisher 数据页中，代替模拟数据。\n\
    9. 重复该过程以添加 `Sales` 数据集。\n10. 在 `Data` 视图中，选择 `Year` 控件。\n11. 在 `Year` 控件的 `Data\
    \ Properties` 中，为 `Keys` 属性选择 `Sales`，为旁边的字段选择 `OrderYear`。\n12. 为旁边的字段选择 `OrderYear`。`Data\
    \ Properties` 应如图 [10-44](#A395630_1_En_10_Chapter.html#Fig44) 所示。\n    ![A395630_1_En_10_Fig44_HTML.jpg](A395630_1_En_10_Fig44_HTML.jpg)\n\
    \    图 10-44. `Year` 控件的 `Data Properties`\n13. 在右侧，你将看到 `Filter these datasets\
    \ when a selection is made` 部分。勾选 `SalesByState` 和 `Sales`。\n14. 为每个数据集选择 `OrderYear`\
    \ 字段，如图 [10-45](#A395630_1_En_10_Chapter.html#Fig45) 所示。\n    ![A395630_1_En_10_Fig45_HTML.jpg](A395630_1_En_10_Fig45_HTML.jpg)\n\
    \    图 10-45. 按年份筛选的表\n15. 切换到 `Layout` 视图。确保 `Year` 列表仍处于选中状态，然后关闭 `Allow select\
    \ all`，如图 [10-46](#A395630_1_En_10_Chapter.html#Fig46) 所示。这将强制该控件一次只允许选择一个值，而不是全部。\n\
    \    ![A395630_1_En_10_Fig46_HTML.jpg](A395630_1_En_10_Fig46_HTML.jpg)\n    图\
    \ 10-46. 关闭 `Allow select all`\n16. 切换回 `Data` 视图。\n17. 选择 `Quota` 控件。对于 `Main\
    \ Value`，填写 `Sales` 数据集和 `Sales` 字段。\n18. 对于 `Comparison Value`，填写 `Sales` 数据集和\
    \ `Quota` 字段。\n19. 点击其中一个 `Options` 按钮，你应该会看到数据已按 `Year` 控件筛选，并且数据将被求和，如图 [10-47](#A395630_1_En_10_Chapter.html#Fig47)\
    \ 所示。\n    ![A395630_1_En_10_Fig47_HTML.jpg](A395630_1_En_10_Fig47_HTML.jpg)\n\
    \    图 10-47. `Quota` 的数据选项\n20. 点击 `Cancel`。\n21. 对于 `US Sales by State` 控件，为\
    \ `Keys` 属性选择 `SalesByState` 数据集和 `StateProvinceName` 字段。如果你检查 `Options`，`Keys`\
    \ 属性应该已按 `Year` 筛选。如果未筛选，请务必在此处选择它并点击 `Done`。\n22. 为 `Values` 属性选择 `Sales` 字段。`US\
    \ Sales by State` 控件数据属性应如图 [10-48](#A395630_1_En_10_Chapter.html#Fig48) 所示。\n\
    \    ![A395630_1_En_10_Fig48_HTML.jpg](A395630_1_En_10_Fig48_HTML.jpg)\n    图\
    \ 10-48. `US Sales by State` 数据属性\n23. 对于 `Sales by Month` 控件，为 `Series name`\
    \ 字段属性选择 `Sales` 数据集和 `Order Month`。\n24. `Main series` 字段是 `Sales`。此控件也按 `Year`\
    \ 筛选，因此请务必确认这一点。数据属性应如图 [10-49](#A395630_1_En_10_Chapter.html#Fig49) 所示。\n   \
    \ ![A395630_1_En_10_Fig49_HTML.jpg](A395630_1_En_10_Fig49_HTML.jpg)\n    图 10-49.\
    \ `Sales by Month` 数据属性\n25. 现在你已将控件连接到实际数据，可以移除模拟表了。点击模拟表名称上的齿轮图标，然后点击 `Remove`。报表名称仍设置为默认值；你可以点击设计视图中的名称，或点击\
    \ `Settings` 页面来更改 `Report Title` 属性。将标题设置为 `Sales by Month and State`。当你预览报表时，它应类似于图\
    \ [10-50](#A395630_1_En_10_Chapter.html#Fig50)。\n    ![A395630_1_En_10_Fig50_HTML.jpg](A395630_1_En_10_Fig50_HTML.jpg)\n\
    \    图 10-50. 已填充的报表\n26. 点击后退箭头切换回设计视图。\n\n移动报表有三种可能的视图：`Master`、`Tablet` 和 `Phone`。选择控件的初始工作必须在\
    \ `Master` 视图中完成。然后，你可以基于 `Master` 报表设计 `Tablet` 和 `Phone` 报表。在右上角，从 `Master`\
    \ 切换到 `Phone`，如图 [10-51](#A395630_1_En_10_Chapter.html#Fig51) 所示。\n    ![A395630_1_En_10_Fig51_HTML.jpg](A395630_1_En_10_Fig51_HTML.jpg)\n\
    \    图 10-51. 切换到 `Phone`\n\n切换到 `Phone` 视图会将设计网格显示为更小的尺寸且没有控件。在左侧，你将看到在 `Master`\
    \ 视图中配置的所有控件。你将拖入并调整希望在 `Phone` 视图中看到的控件的大小。图 [10-52](#A395630_1_En_10_Chapter.html#Fig52)\
    \ 显示了手机在预览模式下的一种可能布局。\n    ![A395630_1_En_10_Fig52_HTML.jpg](A395630_1_En_10_Fig52_HTML.jpg)\n\
    \    图 10-52. 手机预览\n\n在查看报表时，尝试一下动态功能。它仍然有效！要发布报表，你只需按照以下步骤保存到 `SSRS` 服务器：\n1.\
    \ 切换回设计视图。\n2. 点击 `Save` 按钮。\n3. 选择 `Save to Server`。\n4. 在 `Save mobile report\
    \ as` 屏幕上，将填写名称以及服务器名称。点击 `Browse`，如图 [10-53](#A395630_1_En_10_Chapter.html#Fig53)\
    \ 所示。\n    ![A395630_1_En_10_Fig53_HTML.jpg](A395630_1_En_10_Fig53_HTML.jpg)\n\
    \    图 10-53. `Save mobile report as` 屏幕\n5. 如果需要，点击如图 [10-54](#A395630_1_En_10_Chapter.html#Fig54)\
    \ 所示的向上箭头以导航到正确的文件夹位置。\n    ![A395630_1_En_10_Fig54_HTML.jpg](A395630_1_En_10_Fig54_HTML.jpg)\n\
    \    图 10-54. 点击向上箭头\n6. 导航到 `Ad Hoc Reports` 文件夹并点击 `Choose Folder`。\n7. 点击 `Save`\
    \ 以发布报表。\n\n现在，当你在 Web 门户中导航到 `Ad Hoc Reports` 文件夹时，就可以运行该报表了。如果你调整浏览器大小，报表也会相应调整，如图\
    \ [10-55](#A395630_1_En_10_Chapter.html#Fig55) 所示。\n    ![A395630_1_En_10_Fig55_HTML.jpg](A395630_1_En_10_Fig55_HTML.jpg)\n\
    \    图 10-55. 报表自动调整\n\n每个控件还有一个 `Drill-Through Target` 属性，你可以将其设置为导航到另一个移动报表或任何\
    \ URL。用于在移动设备上运行报表的新应用程序包括 `Power BI for iOS`、`Power BI for Android` 和 `Power\
    \ BI for Windows`。"
  raw: '1.  Maximize the Mobile Report Publisher. Open the rsmobile file you just
    created if it is not already open.  

    2.  Switch to the Data view. You will see a simulated table connected to each
    object as shown in Figure [10-39](#A395630_1_En_10_Chapter.html#Fig39).


    ![A395630_1_En_10_Fig39_HTML.jpg](A395630_1_En_10_Fig39_HTML.jpg)


    Figure 10-39.


    The Data view  

    3.  Click Add Data as shown in Figure [10-40](#A395630_1_En_10_Chapter.html#Fig40).


    ![A395630_1_En_10_Fig40_HTML.jpg](A395630_1_En_10_Fig40_HTML.jpg)


    Figure 10-40.


    Click Add Data  

    4.  You will have the choice to import from Excel or Report Server as shown in
    Figure [10-41](#A395630_1_En_10_Chapter.html#Fig41). Select Report Server.


    ![A395630_1_En_10_Fig41_HTML.jpg](A395630_1_En_10_Fig41_HTML.jpg)


    Figure 10-41.


    Select Report Server  

    5.  On the Add Data from Server screen shown in Figure [10-42](#A395630_1_En_10_Chapter.html#Fig42),
    select your SSRS instance.


    ![A395630_1_En_10_Fig42_HTML.jpg](A395630_1_En_10_Fig42_HTML.jpg)


    Figure 10-42.


    Select the server  

    6.  You will then see all the folders found directly under the web portal Home
    folder. Click Datasets.  

    7.  You should now see a list of all the datasets that have been created as shown
    in Figure [10-43](#A395630_1_En_10_Chapter.html#Fig43). Click SalesByState .


    ![A395630_1_En_10_Fig43_HTML.jpg](A395630_1_En_10_Fig43_HTML.jpg)


    Figure 10-43.


    The datasets  

    8.  Now the SalesByState dataset will be displayed in the Mobile Report Publisher
    data page instead of the simulated data.  

    9.  Repeat the process to add the Sales dataset.  

    10.  While in Data view, select the Year control.  

    11.  In the Data Properties of the Year control, select Sales for the Keys property
    and OrderYear for the field next to Keys.  

    12.  Select OrderYear for the field next to Labels. The Data Properties should
    look like Figure [10-44](#A395630_1_En_10_Chapter.html#Fig44).


    ![A395630_1_En_10_Fig44_HTML.jpg](A395630_1_En_10_Fig44_HTML.jpg)


    Figure 10-44.


    The Data Properties of the Year control  

    13.  On the right, you will see the section Filter these datasets when a selection
    is made. Check both SalesByState and Sales.  

    14.  Select the OrderYear field for each as shown in Figure [10-45](#A395630_1_En_10_Chapter.html#Fig45).


    ![A395630_1_En_10_Fig45_HTML.jpg](A395630_1_En_10_Fig45_HTML.jpg)


    Figure 10-45.


    The tables filtered by year  

    15.  Switch to the Layout view. Make sure that the Year list is still selected
    and turn off Allow select all as shown in Figure [10-46](#A395630_1_En_10_Chapter.html#Fig46).
    This will force the control to allow only one value at a time, not all of them.


    ![A395630_1_En_10_Fig46_HTML.jpg](A395630_1_En_10_Fig46_HTML.jpg)


    Figure 10-46.


    Turn off Allow select all  

    16.  Switch back to Data view.  

    17.  Select the Quota control. For the Main Value, fill in the Sales dataset and
    Sales Field .  

    18.  For the Comparison Value, fill in the Sales dataset and Quota field.  

    19.  Click one of the Options buttons, you should see that the data is filtered
    by the Year control and that the data will be summed as shown in Figure [10-47](#A395630_1_En_10_Chapter.html#Fig47).


    ![A395630_1_En_10_Fig47_HTML.jpg](A395630_1_En_10_Fig47_HTML.jpg)


    Figure 10-47.


    The data options for Quota  

    20.  Click Cancel.  

    21.  For the US Sales by State control, select the SalesByState dataset and StateProvinceName
    field for the Keys property. The Keys property should be filtered by Year if you
    check the Options. If it is not filtered, be sure to select it here and click
    Done.  

    22.  Select the Sales field for the Values property. The US Sales by State control
    data properties should look like Figure [10-48](#A395630_1_En_10_Chapter.html#Fig48).


    ![A395630_1_En_10_Fig48_HTML.jpg](A395630_1_En_10_Fig48_HTML.jpg)


    Figure 10-48.


    The US Sales by State data properties  

    23.  For the Sales by Month control, select the Sales dataset and Order Month
    for the Series name field properties.  

    24.  The Main series field is Sales. This control is also filtered by Year, so
    be sure to confirm that. The data properties should look like Figure [10-49](#A395630_1_En_10_Chapter.html#Fig49).


    ![A395630_1_En_10_Fig49_HTML.jpg](A395630_1_En_10_Fig49_HTML.jpg)


    Figure 10-49.


    The Sales by Month data properties  

    25.  Now that you have the controls connected to actual data, you can remove the
    simulated tables. Click the gear on the simulated table names and click Remove.
    The report name is still set as the default; you can click the name in the design
    view or click the Settings page to change the Report Title property . Set the
    title to Sales by Month and State. When you preview the report, it should look
    similar to Figure [10-50](#A395630_1_En_10_Chapter.html#Fig50).


    ![A395630_1_En_10_Fig50_HTML.jpg](A395630_1_En_10_Fig50_HTML.jpg)


    Figure 10-50.


    The populated report  

    26.  Switch back to design view by clicking the back arrow.


    There are three possible views for a mobile report: Master, Tablet, and Phone.
    The initial work to select the controls must be done in the Master view. You can
    then design Tablet and Phone reports based on the Master report. In the upper
    right-hand corner, switch from Master to Phone as shown in Figure [10-51](#A395630_1_En_10_Chapter.html#Fig51).


    ![A395630_1_En_10_Fig51_HTML.jpg](A395630_1_En_10_Fig51_HTML.jpg)


    Figure 10-51.


    Switch to Phone


    Changing to Phone view displays the design grid as a smaller size with no controls.
    On the left, you will see all of the controls that were configured in the Master
    view. You will drag in and resize the controls you wish to see in the Phone view.
    Figure [10-52](#A395630_1_En_10_Chapter.html#Fig52) shows a possible layout for
    the phone in Preview mode.


    ![A395630_1_En_10_Fig52_HTML.jpg](A395630_1_En_10_Fig52_HTML.jpg)


    Figure 10-52.


    Phone preview


    While you are viewing the report, try out the dynamic functionality. It still
    works! To publish the report, you will just save to the SSRS server by following
    these steps:


    1.  Switch back to design view.  

    2.  Click the Save button.  

    3.  Select Save to Server.  

    4.  On the Save mobile report as screen, the name will be filled in along with
    the server name. Click Browse as shown in Figure [10-53](#A395630_1_En_10_Chapter.html#Fig53).


    ![A395630_1_En_10_Fig53_HTML.jpg](A395630_1_En_10_Fig53_HTML.jpg)


    Figure 10-53.


    The Save mobile report as screen  

    5.  Click the up arrow as shown in Figure [10-54](#A395630_1_En_10_Chapter.html#Fig54)
    to navigate to the correct folder location if needed.


    ![A395630_1_En_10_Fig54_HTML.jpg](A395630_1_En_10_Fig54_HTML.jpg)


    Figure 10-54.


    Click the up arrow  

    6.  Navigate to the Ad Hoc Reports folder and click Choose Folder.  

    7.  Click Save to publish the report.


    Now when you navigate to the Ad Hoc Reports folder in the web portal, you can
    run the report. If you resize the browser, the report will resize as well as shown
    in Figure [10-55](#A395630_1_En_10_Chapter.html#Fig55).


    ![A395630_1_En_10_Fig55_HTML.jpg](A395630_1_En_10_Fig55_HTML.jpg)


    Figure 10-55.


    The report automatically adjusts


    Each control also has a Drill-Through Target property that you can set to navigate
    to another mobile report or to any URL. The new applications for running the reports
    on mobile devices are Power BI for iOS, Power BI for Android, and Power BI for
    Windows.'
