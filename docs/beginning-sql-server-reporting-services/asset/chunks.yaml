  trans: "\n### 报表布局\n\n现在你有了更多细节，可以在白板或纸上开始勾画报表布局了。你设计出了如图 5-1 所示的布局。\n\n![A395630_1_En_5_Fig1_HTML.jpg](img/A395630_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1. 报表布局\n\n销售经理批准了该布局，你就可以开始构建实际的报表了。\n\n## 构建具有分组级别的报表\n\n这个报表将有三个级别，但它仍然是一个相对简单的报表。你在本章学到的技能将很容易应用于更复杂的报表。\n\
    \n**注意**\n\n第 3 章涵盖了数据源和数据集的使用。第 4 章涵盖了添加控件以及如何修改属性。如果你需要这些主题的逐步指导，请参考这些章节。\n\n\
    请按照以下步骤开始：\n\n1.  使用 `SSDT`，在一个名为 `Beginning SSRS Chapter` 5 的解决方案中创建一个名为 `Grouping\
    \ Level Reports` 的新报表项目。\n2.  创建一个指向 `AdventureWorks2016` 的共享数据源，也命名为 `AdventureWorks2016`。\n\
    3.  向项目中添加一个名为 `Sales by Territory` 的新报表。\n4.  向报表中添加一个名为 `AdventureWorks` 的数据源。该数据源应指向\
    \ `AdventureWorks2016` 共享数据源。\n5.  向报表中添加一个名为 `SalesByTerritory` 的嵌入数据集，该数据集使用\
    \ `AdventureWorks` 数据源。使用此查询：\n\n    ```sql\n    SELECT YEAR(OrderDate) AS OrderYear,\
    \ C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name AS Territory,\
    \ s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer AS C ON SOH.CustomerID\
    \ = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID\n\
    \    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate), S.Name;\n\
    \    ```\n\n6.  向报表设计画布中添加一个表格。\n7.  将 `CustomerID`、`Store` 和 `Sales` 字段添加到 `Data`\
    \ 行。\n\n报表设计应如图 5-2 所示。\n\n![A395630_1_En_5_Fig2_HTML.jpg](img/A395630_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 报表设计\n\n### 向表行添加分组级别\n\n到目前为止，详细信息行已经就位。详细信息行将嵌套在基于 `TerritoryID` 的分组级别中。有两种方法可以添加分组级别，你将学习这两种方法。请按照以下步骤向表格添加分组级别：\n\
    \n1.  `右键单击` 数据行中的任意单元格。\n2.  选择 `添加组` ➤ `行组` ➤ `父组`，如图 5-3 所示。\n\n    ![A395630_1_En_5_Fig3_HTML.jpg](img/A395630_1_En_5_Fig3_HTML.jpg)\n\
    \n    图 5-3. 添加父组\n3.  这将打开 `Tablix 组` 对话框。在 `分组依据` 下拉框中选择 `TerritoryID`。\n4.\
    \  选择 `添加组头`。\n5.  对话框应如图 5-4 所示。\n\n    ![A395630_1_En_5_Fig4_HTML.jpg](img/A395630_1_En_5_Fig4_HTML.jpg)\n\
    \n    图 5-4. Tablix 组属性\n6.  `单击` `确定`。图 5-5 显示了添加了第一个分组级别的表格。\n\n    ![A395630_1_En_5_Fig5_HTML.jpg](img/A395630_1_En_5_Fig5_HTML.jpg)\n\
    \n    图 5-5. 添加到表格的第一个组\n\n在此图中，选中了 `Sales` 数据单元格。注意，`CustomerID` 单元格左侧可见一个橙色括号。这表示所选单元格的分组级别。在此情况下，它是详细信息级别。`单击`\
    \ 其中一个空白单元格。现在可以在 `TerritoryID` 单元格上找到括号，如图 5-6 所示。\n\n![A395630_1_En_5_Fig6_HTML.jpg](img/A395630_1_En_5_Fig6_HTML.jpg)\n\
    \n图 5-6. 括号位于 TerritoryID 上\n\n这意味着中间行的单元格属于 `TerritoryID` 组。将 `Sales` 字段添加到右侧的空白单元格。因为这是详细信息之外的一个分组级别，该字段会自动求和，如图\
    \ 5-7 所示。\n\n![A395630_1_En_5_Fig7_HTML.jpg](img/A395630_1_En_5_Fig7_HTML.jpg)\n\
    \n图 5-7. 销售额被自动求和\n\n在 `CustomerID` 列中，将 `Territory` 字段添加到空白单元格。占位符没有显示它，但它是该组中找到的第一个值。由于每个\
    \ `TerritoryID` 对应一个 `Territory`，此表达式将有效。`预览` 报表；此时它应如图 5-8 所示。\n\n![A395630_1_En_5_Fig8_HTML.jpg](img/A395630_1_En_5_Fig8_HTML.jpg)\n\
    \n图 5-8. 报表预览\n\n### 向分组窗口添加分组级别\n\n报表底部的分组窗口提供了另一种添加和配置分组级别的方法。右侧的 `列组` 用于矩阵报表。你将在本章后面的“构建矩阵报表”一节中学习矩阵报表。\n\
    \n此时，切换回设计视图后，你应该在窗口中看到 `TerritoryID` 行组。要添加下一个分组级别，请按照以下步骤操作：\n\n1.  如果报表画布下方没有显示\
    \ `分组` 窗口，`右键单击` 报表并选择 `视图` ➤ `分组`。\n2.  在 `行组` 窗口中，`单击` `TerritoryID` 旁边的向下箭头。\n\
    3.  选择 `添加组` ➤ `父组`，如图 5-9 所示。\n\n    ![A395630_1_En_5_Fig9_HTML.jpg](img/A395630_1_En_5_Fig9_HTML.jpg)\n\
    \n    图 5-9. 添加父组\n4.  在 `Tablix 组` 对话框中，为 `分组依据` 属性选择 `OrderYear`。\n5.  `勾选`\
    \ `添加组头`。\n6.  `单击` `确定`。`行组` 部分现在将如图 5-10 所示。\n\n    ![A395630_1_En_5_Fig10_HTML.jpg](img/A395630_1_En_5_Fig10_HTML.jpg)\n\
    \n    图 5-10. 行组\n7.  在 `Sales` 列的空白单元格中，添加 `Sales`。这将是年度总计。\n8.  在 `Store` 列第二行的空白单元格中，创建一个表达式，公式如下：`=Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)`。这将给出各区域的平均销售额，换句话说，是总和的平均值。\n\
    \n报表设计应如图 5-11 所示。\n\n![A395630_1_En_5_Fig11_HTML.jpg](img/A395630_1_En_5_Fig11_HTML.jpg)\n\
    \n图 5-11. 报表设计\n\n当你 `预览` 报表时，你会发现还需要做一些清理工作。此时报表如图 5-12 所示。\n\n![A395630_1_En_5_Fig12_HTML.jpg](img/A395630_1_En_5_Fig12_HTML.jpg)\n\
    \n图 5-12. 预览模式下的报表\n"
- fmt: "# Formatting the Report\n\nFollow these steps to begin formatting the report:\n\
    \n1.  Switch to design view.\n2.  Format the four cells referring to the `Sales`\
    \ field to currency with a thousands separator and no decimal points. Remember\
    \ that once you format one cell, you can select the other three and paste in the\
    \ format at one time.\n3.  Decrease the width of the `Order Year` and `Territory\
    \ ID` columns.\n4.  Increase the width of the `Store` column.\n\nThe report is\
    \ in the default group layout that you get when adding grouping levels to the\
    \ report, but you can always rearrange it. You will now add two new rows to modify\
    \ the layout. Follow these steps:\n\n1.  Right-click the `TerritoryID` cell and\
    \ select Insert Row ➤ Inside Group ➤ Above. This adds a new row to the `TerritoryID`\
    \ group.\n2.  Right-click the `TerritoryID` cell again and select Insert Row ➤\
    \ Outside Group ➤ Above. This adds a new row to the `OrderYear` group. The table\
    \ layout should look like Figure [5-13](#A395630_1_En_5_Chapter.html#Fig13).\n\
    \n![A395630_1_En_5_Fig13_HTML.jpg](A395630_1_En_5_Fig13_HTML.jpg)\n*Figure 5-13.\
    \ The report layout with two new rows*\n\n3.  In column 2, move the `Territory\
    \ ID` heading to the cell above `TerritoryID`.\n4.  In column 3, move the `Territory`\
    \ data field up one row.\n5.  Move the `Customer ID` heading above the `CustomerID`\
    \ data cell.\n6.  Type the word `Name` above the `Territory` data cell. The layout\
    \ should look like Figure [5-14](#A395630_1_En_5_Chapter.html#Fig14) at this point.\n\
    \n![A395630_1_En_5_Fig14_HTML.jpg](A395630_1_En_5_Fig14_HTML.jpg)\n*Figure 5-14.\
    \ The report preview after rearranging cells*\n\n7.  In column 4, move the `Store`\
    \ heading to the cell above the `Store` data cell.\n8.  In the top row, above\
    \ the average sales expression, type in `Average Sales`. The layout should look\
    \ like Figure [5-15](#A395630_1_En_5_Chapter.html#Fig15).\n\n![A395630_1_En_5_Fig15_HTML.jpg](A395630_1_En_5_Fig15_HTML.jpg)\n\
    *Figure 5-15. The layout after rearranging column 4*\n\n9.  In column 5, change\
    \ the heading in row 1 to `Total Sales`.\n10. In row 3, the territory header row,\
    \ type in `Total Sales`.\n11. In row 4, add the `Sales` field which will automatically\
    \ sum.\n12. Format the cell as currency with no decimals and with a thousands\
    \ separator.\n13. In row 5, the detail header row, change from the `Sales` field\
    \ to the words `Total Sales`. The layout should look like Figure [5-16](#A395630_1_En_5_Chapter.html#Fig16).\n\
    \n![A395630_1_En_5_Fig16_HTML.jpg](A395630_1_En_5_Fig16_HTML.jpg)\n*Figure 5-16.\
    \ The layout after rearranging column 5*\n\n14. Select the `Average Sales` column.\
    \ Set the alignment to `Align Right`.\n15. Select the `Total Sales` column. Set\
    \ the alignment to `Align Right`.\n16. Preview the report. It should look like\
    \ Figure [5-17](#A395630_1_En_5_Chapter.html#Fig17).\n\n![A395630_1_En_5_Fig17_HTML.jpg](A395630_1_En_5_Fig17_HTML.jpg)\n\
    *Figure 5-17. The formatted report in preview mode*\n\nYou can use color and other\
    \ formatting aspects to highlight the grouping levels. Follow these steps to format\
    \ the groups:\n\n1.  Switch back to design view.\n2.  Select the top row and view\
    \ the Properties window. Change the `FontSize` to `12 pt`, the `BackgroundColor`\
    \ to `CornflowerBlue`, and the `Color` property found in the Font section to `White`.\n\
    3.  Repeat the formatting to the second row.\n4.  Select the third row. Change\
    \ the `BackgroundColor` to `LightBlue` and `FontWeight` to `Bold`.\n5.  Repeat\
    \ the formatting to the fourth row.\n6.  Select the fifth row. Bold the font.\n\
    \nNow when you preview the report, it looks like Figure [5-18](#A395630_1_En_5_Chapter.html#Fig18).\n\
    \n![A395630_1_En_5_Fig18_HTML.jpg](A395630_1_En_5_Fig18_HTML.jpg)\n*Figure 5-18.\
    \ The report preview with formatting*\n\nAs you scroll through the report, you\
    \ will see that the headings are lost on subsequent pages. To enable the headings\
    \ to repeat on each page, follow these steps:\n\n1.  Switch back to design view.\n\
    2.  Click the down arrow located on the right of the Column Groups window and\
    \ select `Advanced Mode` as shown in Figure [5-19](#A395630_1_En_5_Chapter.html#Fig19).\n\
    \n![A395630_1_En_5_Fig19_HTML.jpg](A395630_1_En_5_Fig19_HTML.jpg)\n*Figure 5-19.\
    \ Select Advanced Mode*\n\n3.  When `Advanced Mode` is selected, the Row Groups\
    \ and Column Groups will expand. You will see Static sections as shown in Figure\
    \ [5-20](#A395630_1_En_5_Chapter.html#Fig20).\n\n![A395630_1_En_5_Fig20_HTML.jpg](A395630_1_En_5_Fig20_HTML.jpg)\n\
    *Figure 5-20. The expanded grouping window*\n\n4.  Using the Properties window,\
    \ change the `RepeatOnNewPage` value to `True` for each Static area found under\
    \ Row Groups.\n\nNow when you preview the reports, the headings will repeat on\
    \ each page.\n\n# Sorting the Groups\n\nThere is one requirement that hasn’t been\
    \ addressed, sorting. The details must be sorted by the total sales in descending\
    \ order. The report must also be sorted by year in descending order. Follow these\
    \ steps to modify the sort order according to the requirements.\n\n1.  In the\
    \ Row Groups window, right-click the Details group and select Group Properties.\n\
    2.  In the Group Properties dialog, select the Sorting page.\n3.  Click Add.\n\
    4.  Select `Sales` in the Sort by property.\n5.  Select `Z to A` in the Order\
    \ property. The Group Properties dialog box should look like Figure [5-21](#A395630_1_En_5_Chapter.html#Fig21).\n\
    \n    ![A395630_1_En_5_Fig21_HTML.jpg](A395630_1_En_5_Fig21_HTML.jpg)\n    *Figure\
    \ 5-21. The Sorting Properties dialog*\n\n6.  Click OK to accept the properties.\n\
    7.  Modify the `OrderYear` group properties so that the report sorts in `OrderYear`\
    \ descending order. The group automatically sorts by the grouping field.\n8. \
    \ Right-click the `TerritoryID` group and bring up the Group Properties.\n9. \
    \ Select the Sorting Page. Change the existing sort order from the `TerritoryID`\
    \ field to the `Territory` field. Click OK when done.\n\n# Finalizing the Report\n\
    \nThe report is almost ready to show the manager. Follow these steps to complete\
    \ the report:\n\n1.  Switch to design view.\n2.  Drag the table to the top and\
    \ left of the report.\n3.  Drag in the bottom and right edges of the report canvas.\n\
    4.  From the Report menu, click Add Page Header and Add Page Footer.\n5.  Add\
    \ a text box to the page header. Type in `Territory Sales`.\n6.  Expand the text\
    \ box to the width of the canvas.\n7.  Center the text.\n8.  Increase the font\
    \ size to `18 pt`.\n9.  From Built-in Fields in the Report Data window, drag the\
    \ `Execution Time` to the report footer.\n10. Double the width of the text box.\n\
    11. Add another text box to the footer.\n12. Add this expression to the text box:\n\
    \n    ```\n    =\"Page \" & Globals!PageNumber & \" of \" & Globals!TotalPages\n\
    \    ```\n\n13. Launch the Report Properties dialog from the Report menu.\n14.\
    \ Change the `Top` and `Bottom` margins to `0.25 in` or `0.635 cm`.\n15. View\
    \ the report. Adjust any settings that make sense.\n\nNow you are ready to show\
    \ the report to the manager for feedback."
