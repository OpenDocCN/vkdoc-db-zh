    图 8-14.\n\n新的文件夹\"笔记\"\n\n在 SQL Server 2016 发布时，Web 门户有时会在服务器重启后无法运行。如果您看到“服务不可用”错误，您应该使用\
    \ `Reporting Services 配置管理器` 来停止并启动服务。\n\n如果您点击 `可视化报表` 文件夹，您将看到在第 7 章中创建的所有报表。您可以点击一个报表来查看它。任何参数都会显示在顶部。图\
    \ 8-15 显示了图表报表。\n\n![A395630_1_En_8_Fig15_HTML.jpg](img/A395630_1_En_8_Fig15_HTML.jpg)\n\
    图 8-15.\n\n图表报表\n\n如果出于某种原因需要单独部署某个报表、数据集或数据源，您只需在 `SSDT` 的解决方案资源管理器中右键单击该对象，然后选择\
    \ `部署`。\n\n与从 `SSDT` 一样，您可以打印或导出报表。旧版本的 `SSRS` 使用 ActiveX 控件进行打印，这导致与现代 Web 浏览器存在许多兼容性问题。目前，打印机图标允许您将报表另存为\
    \ PDF，然后进行打印。保存图标允许您以包括 PowerPoint 在内的多种格式导出报表。\n\n## 上传报表\n\n除了从 `SSDT` 部署，您还可以通过上传到\
    \ Web 门户来发布报表。请按照以下步骤上传报表：\n\n1.  启动 Web 门户。\n2.  在主文件夹中，点击 `新建` ➤ `文件夹` 以创建一个新文件夹，如图\
    \ 8-16 所示。\n    ![A395630_1_En_8_Fig16_HTML.jpg](img/A395630_1_En_8_Fig16_HTML.jpg)\n\
    \    图 8-16.\n    创建新文件夹。\n3.  将文件夹命名为 `上传示例` 并点击 `创建`。\n4.  文件夹创建后，点击它将其打开。\n\
    5.  点击 `上传` 并导航到一个报表文件。报表文件的扩展名为 `rdl`，可以在项目文件夹中找到，如图 8-17 所示。\n    ![A395630_1_En_8_Fig17_HTML.jpg](img/A395630_1_En_8_Fig17_HTML.jpg)\n\
    \    图 8-17.\n    导航到报表文件。\n6.  选择报表文件后，点击 `打开`。\n7.  您现在应该能在文件夹中看到该报表。点击报表以查看它。\n\
    \n您将不会打开报表，而是会看到如图 8-18 所示的错误消息。\n\n![A395630_1_En_8_Fig18_HTML.jpg](img/A395630_1_En_8_Fig18_HTML.jpg)\n\
    图 8-18.\n错误消息\n\n当您上传报表时，它不会自动链接到数据源。您可以按照以下步骤轻松更正：\n\n1.  在路径中点击 `上传示例` 以离开错误消息页面。\n\
    2.  点击报表名称旁边的省略号，然后选择 `管理`。\n3.  这将打开一个包含许多选项的页面。选择 `数据源`。您将看到一条关于数据源错误的消息。\n\
    4.  点击 `连接到` 下方的省略号，如图 8-19 所示。\n    ![A395630_1_En_8_Fig19_HTML.jpg](img/A395630_1_En_8_Fig19_HTML.jpg)\n\
    \    图 8-19.\n    数据源属性。\n5.  这会在主文件夹中打开一个窗口。点击 `数据源`。\n6.  选择 `AdventureWorks2016`\
    \ 数据源，如图 8-20 所示。\n    ![A395630_1_En_8_Fig20_HTML.jpg](img/A395630_1_En_8_Fig20_HTML.jpg)\n\
    \    图 8-20.\n    数据源文件夹。\n7.  您现在应该能看到正确映射的数据源，如图 8-21 所示。\n    ![A395630_1_En_8_Fig21_HTML.jpg](img/A395630_1_En_8_Fig21_HTML.jpg)\n\
    \    图 8-21.\n    修正后的数据源。\n8.  点击 `保存`。\n9.  导航回 `上传示例` 文件夹并尝试运行报表。现在它应该能按预期运行了。\n\
    \n显然，从 `SSDT` 部署更容易，但如果您确实需要上传单个报表，这些信息将会很有帮助。\n\n## 创建数据源\n\n`AdventureWorks2016`\
    \ 数据源是在项目部署时自动创建的。您也可以通过 Web 门户手动创建数据源。请按照以下步骤创建数据源：\n\n1.  启动 Web 门户。\n2.  点击\
    \ `数据源` 文件夹。\n3.  点击 `AdventureWorks2016` 旁边的省略号，然后点击 `管理` 以打开属性。\n4.  选择 `连接字符串`\
    \ 属性并将其复制到剪贴板，如图 8-22 所示。\n    ![A395630_1_En_8_Fig22_HTML.jpg](img/A395630_1_En_8_Fig22_HTML.jpg)\n\
    \    图 8-22.\n    连接字符串属性。\n5.  向下滚动并点击 `取消` 以关闭属性。\n6.  点击 `新建` ➤ `数据源` 以打开“新建数据源”页面。\n\
    7.  在名称中填写 `TestDataSource`。\n8.  将之前复制的连接字符串粘贴到 `连接字符串` 属性中。\n9.  向下滚动并点击 `测试连接`。\n\
    10. 点击 `创建`。\n11. 您现在应该能在文件夹中看到这两个数据源。\n\n虽然您可能不需要通过此界面创建许多数据源，但您将需要使用它来管理数据源。每当数据库迁移到新服务器时，您都需要在此处为报表进行更改。在第\
    \ 9 章中，您将了解数据源属性的“凭据”部分。\n\n## 部署报表部件\n\n除了数据源、数据集和报表外，您还可以部署报表部件。报表部件是构成报表的对象，如图表、表格和仪表。已发布的报表部件随后可以与\
    \ `报表生成器` 工具一起使用，该工具将在第 10 章中介绍。\n\n要在报表上发布对象，您必须将各个项标记为可发布。请按照以下步骤部署报表的部件：\n\n\
    1.  如果尚未打开，请启动 `SSDT` 以及来自第 7 章的项目。\n2.  在解决方案资源管理器中，双击图表报表以在设计视图中打开它。\n3.  如果“报表”菜单不可见，请单击报表的设计画布。\n\
    4.  选择 `报表` ➤ `发布报表部件`，这将打开一个对话框，显示可以发布的对象，如图 8-23 所示。\n    ![A395630_1_En_8_Fig23_HTML.jpg](img/A395630_1_En_8_Fig23_HTML.jpg)\n\
    \    图 8-23.\n    “发布报表部件”对话框。\n5.  勾选 `报表部件` 以选择每个项。\n6.  点击第一个图表旁边的箭头。这允许您查看图表的图片并填写描述。\n\
    7.  每个项都有默认名称，这在 Web 门户中可能没有帮助。将每个名称更改为与图 8-24 匹配。\n    ![A395630_1_En_8_Fig24_HTML.jpg](img/A395630_1_En_8_Fig24_HTML.jpg)\n\
    \    图 8-24.\n    每个图表的新名称。\n8.  点击 `确定`。\n9.  在解决方案资源管理器中，右键单击图表报表并部署它。\n10.\
    \ 打开 Web 门户。\n11. 导航到主文件夹。\n12. 您应该会看到一个新的 `报表部件` 文件夹。\n13. 点击该文件夹以查看已发布的报表部件，如图\
    \ 8-25 所示。您将在第 10 章中使用它们。\n    ![A395630_1_En_8_Fig25_HTML.jpg](img/A395630_1_En_8_Fig25_HTML.jpg)\n\
    \    图 8-25.\n    报表部件文件夹。\n"
- fmt: '# Deploying Reports to SharePoint


    Installing and configuring SSRS in SharePoint mode is beyond the scope of this
    book. I do think, however, that if you ever need to deploy reports to an existing
    SharePoint farm, you can come back to this chapter to learn how to do it. Just
    like native mode SSRS, you can publish reports either by uploading or from SSDT.
    This section assumes you are using SharePoint 2013 or later and that the SSRS
    document library has been configured properly.


    Follow these steps to learn how to upload SSRS reports to a SharePoint report
    library:


    1. Launch SharePoint and navigate to the report library. Figure [8-26](#A395630_1_En_8_Chapter.html#Fig26)
    shows a typical report folder.

    ![A395630_1_En_8_Fig26_HTML.jpg](A395630_1_En_8_Fig26_HTML.jpg)

    Figure 8-26. The SharePoint report folder

    2. Click Files.

    3. Click Upload Document as shown in Figure [8-27](#A395630_1_En_8_Chapter.html#Fig27).

    ![A395630_1_En_8_Fig27_HTML.jpg](A395630_1_En_8_Fig27_HTML.jpg)

    Figure 8-27. The Upload Document icon

    4. From the Add a Document dialog, navigate to an SSRS report `rdl` file by clicking
    Browse.

    5. Click OK.

    6. On the Reports dialog, select Report Builder Report as the Content Type as
    shown in Figure [8-28](#A395630_1_En_8_Chapter.html#Fig28).

    ![A395630_1_En_8_Fig28_HTML.jpg](A395630_1_En_8_Fig28_HTML.jpg)

    Figure 8-28. The Reports dialog

    7. Click Save. The report should now show up in the folder.

    8. Because you uploaded the file, you will need to configure the data source.
    Click the ellipsis next to the report name.

    9. This opens up a menu dialog; click the ellipsis on this dialog.

    10. Select Manage Data Sources as shown in Figure [8-29](#A395630_1_En_8_Chapter.html#Fig29).

    ![A395630_1_En_8_Fig29_HTML.jpg](A395630_1_En_8_Fig29_HTML.jpg)

    Figure 8-29. The report properties menu

    11. On the Manage Data Sources page, click the data source name.

    12. On the data source’s property page, click the ellipsis as shown in Figure
    [8-30](#A395630_1_En_8_Chapter.html#Fig30).

    ![A395630_1_En_8_Fig30_HTML.jpg](A395630_1_En_8_Fig30_HTML.jpg)

    Figure 8-30. The data source properties

    13. On the Select an Item dialog, navigate to the correct data source as shown
    in Figure [8-31](#A395630_1_En_8_Chapter.html#Fig31). Click the Up button to navigate.

    ![A395630_1_En_8_Fig31_HTML.jpg](A395630_1_En_8_Fig31_HTML.jpg)

    Figure 8-31. The Select an Item dialog

    14. Click OK to save the data source name and dismiss the dialog box.

    15. Click OK on the data source properties for the report to save the change.

    16. Navigate to the report and test it.


    You can also upload data source files (`rds`) or create them. To create a new
    data source, follow these steps:


    1. Launch SharePoint and navigate to the Data Sources folder.

    2. Click Files ➤ New Document as shown Figure [8-32](#A395630_1_En_8_Chapter.html#Fig32).

    ![A395630_1_En_8_Fig32_HTML.jpg](A395630_1_En_8_Fig32_HTML.jpg)

    Figure 8-32. The New Document icon

    3. Select Report Data Source as shown in Figure [8-33](#A395630_1_En_8_Chapter.html#Fig33).

    ![A395630_1_En_8_Fig33_HTML.jpg](A395630_1_En_8_Fig33_HTML.jpg)

    Figure 8-33. The Report Data Source menu item

    4. Fill out the properties on the Data Source Properties page as shown in Figure
    [8-34](#A395630_1_En_8_Chapter.html#Fig34).

    ![A395630_1_En_8_Fig34_HTML.jpg](A395630_1_En_8_Fig34_HTML.jpg)

    Figure 8-34. The Data Source Properties

    5. Click OK to save the new data source.


    To deploy reports and other objects from SSDT, you will need to configure the
    exact paths to the SharePoint library folders for each type of item in the project
    properties. Otherwise, the process is identical to deploying to a native mode
    instance. Figure [8-35](#A395630_1_En_8_Chapter.html#Fig35) shows how to configure
    for my SharePoint site.

    ![A395630_1_En_8_Fig35_HTML.jpg](A395630_1_En_8_Fig35_HTML.jpg)

    Figure 8-35. The properties when deploying to SharePoint


    ## Summary


    SSRS reports are not much value unless they are published where the end users
    can get to them. In this chapter you were introduced to the new web portal. You
    deployed reports from SSDT and by uploading them. If you have an SSRS instance
    installed in SharePoint mode, you also saw how to deploy reports to SharePoint.


    Whenever data is concerned, security is of utmost importance. In Chapter [9](#A395630_1_En_9_Chapter.html),
    you will learn about the security aspects of SSRS.


    ## 9. Securing Your Reports


    A major data breach is reported on an almost weekly basis. One of the first that
    caught my attention was the 2012 theft of South Carolina’s state taxpayer database.
    In 2015, hackers stole the electronic records of millions of US federal government
    employees. A report developer may not need to configure security, but he or she
    should be able to understand how SQL Server Reporting Services (SSRS) security
    works to assist the administrator if requested.


    When deploying SSRS reports, there are two layers of security to consider: permissions
    at the data source and within SSRS. In this chapter, you will learn the security
    features of SSRS and how SSRS interacts with SQL Server security.


    ## Understanding SQL Server Security


    Even if an end user is allowed to run a report, the SQL Server instance my not
    return the requested data. The settings in the data source determine the credentials
    sent to SQL Server.


    Note


    A thorough review of SQL Server security is beyond the scope of this book. Data
    for reports can come from many other sources as well, such as Oracle databases
    and Analysis Services cubes . Consult vendor documentation to understand the security
    of any particular product.


    In the case of SQL Server, two types of accounts will be used to connect: Windows
    logins and logins defined within the SQL Server instance. Both types of logins
    are mapped to database users which have specific permissions within the database.
    Another feature of SQL Server called Contained Databases allows you to create
    users directly within the database. Figure [9-1](#A395630_1_En_9_Chapter.html#Fig1)
    illustrates these concepts.

    ![A395630_1_En_9_Fig1_HTML.jpg](A395630_1_En_9_Fig1_HTML.jpg)

    Figure 9-1. Authentication within SQL Server'
