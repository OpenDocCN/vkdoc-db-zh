  trans: "\n## 恢复 AdventureWorks 数据库\n\n要跟随本书中的示例进行操作，需要准备好若干要素。最后一项是 AdventureWorks\
    \ 数据库，它经常被用作 SQL Server 的示例数据库。由于下载地址会不时变化，请浏览 [`www.codeplex.com`](http://www.codeplex.com)\
    \ 并搜索 Microsoft SQL Server Product Samples: Databases。在该页面上，你可能会看到指向几个不同版本的链接。请务必找到\
    \ `AdventureWorks2016.bak` 的下载链接。\n\n> 注意\n>\n> 在发布 SQL Server 2016 时，CodePlex\
    \ 页面提供了 `AdventureWorks2016CTP3.bak` 文件，但没有提供 `AdventureWorks2016.bak` 文件。CTP3\
    \ 代表 Community Technology Preview 3（社区技术预览版 3），是 SQL Server 的 Beta 版本。如果正式发布版本不可用，CTP3\
    \ 版本也可以使用，但你将在还原过程中需要更改数据库名称。\n\n请按照以下步骤还原数据库：\n\n1.  下载 `AdventureWorks2016.bak`\
    \ 或 `AdventureWorks2016CTP3.bak` 文件。\n2.  下载的文件很可能保存在你的“下载”文件夹中。为了还原文件，你需要移动它。如果\
    \ `C:\\temp` 文件夹不存在，请创建它。将文件移动到这个新文件夹。\n3.  启动 SQL Server Management Studio。\n\
    4.  在提示连接时，使用你在上一节中确定的服务器名称。如果你在本地安装了 SQL Server，可以使用 `localhost`、`(local)` 或一个点号\
    \ `.`，如图 1-22 所示。\n\n    ![A395630_1_En_1_Fig22_HTML.jpg](img/A395630_1_En_1_Fig22_HTML.jpg)\n\
    \    图 1-22. 连接到服务器对话框\n\n5.  点击“连接”按钮。\n6.  在“对象资源管理器”中，右键单击“数据库”，然后选择“还原数据库”，如图\
    \ 1-23 所示。\n\n    ![A395630_1_En_1_Fig23_HTML.jpg](img/A395630_1_En_1_Fig23_HTML.jpg)\n\
    \    图 1-23. “还原数据库”选项\n\n7.  在“还原数据库”对话框中，选择“设备”。\n8.  点击省略号按钮（...），如图 1-24 所示。\n\
    \n    ![A395630_1_En_1_Fig24_HTML.jpg](img/A395630_1_En_1_Fig24_HTML.jpg)\n  \
    \  图 1-24. “还原数据库”对话框\n\n9.  在“选择备份设备”对话框中，点击“添加”，然后导航到文件所在位置，如图 1-25 所示。\n\n\
    \    ![A395630_1_En_1_Fig25_HTML.jpg](img/A395630_1_En_1_Fig25_HTML.jpg)\n   \
    \ 图 1-25. “选择备份设备”对话框\n\n10. 点击“确定”接受该文件。\n11. 如果唯一可下载的是 CTP3 文件，请将数据库属性从 `AdventureWorks2016CTP3`\
    \ 更改为 `AdventureWorks2016`。\n12. 点击“确定”开始还原。\n13. 还原完成后，点击“确定”关闭还原实用工具。\n14. 展开并刷新“数据库”文件夹。你应该能看到\
    \ `AdventureWorks2016` 数据库已就位，如图 1-26 所示。\n\n    ![A395630_1_En_1_Fig26_HTML.jpg](img/A395630_1_En_1_Fig26_HTML.jpg)\n\
    \    图 1-26. 新数据库\n\n15. 退出 SSMS。\n\n在此例中，数据源和 SSRS 数据库托管在同一 SQL Server 实例上。在大多数生产环境中，它们会托管在单独的服务器上。\n\
    \n## 探索 SSDT\n\n在本书的许多章节中，你将花相当多的时间使用 SSDT。现在花些时间，通过以下步骤熟悉它：\n\n1.  启动 Visual\
    \ Studio 2015。\n2.  由于这是首次启动，你必须配置几项设置。选择“商业智能设置”。\n3.  选择你喜欢的主题，如图 1-27 所示。\n\
    \n    ![A395630_1_En_1_Fig27_HTML.jpg](img/A395630_1_En_1_Fig27_HTML.jpg)\n  \
    \  图 1-27. 设置环境\n\n4.  点击“启动 Visual Studio”。\n5.  Visual Studio 运行后，选择 `文件 ➤ 新建\
    \ ➤ 项目`，如图 1-28 所示。\n\n    ![A395630_1_En_1_Fig28_HTML.jpg](img/A395630_1_En_1_Fig28_HTML.jpg)\n\
    \    图 1-28. 创建新项目\n\n6.  在“新建项目”对话框中，选择 `报表服务器项目`，如图 1-29 所示。\n\n    ![A395630_1_En_1_Fig29_HTML.jpg](img/A395630_1_En_1_Fig29_HTML.jpg)\n\
    \    图 1-29. 选择报表服务器项目\n\n7.  点击“确定”创建项目。\n\n开发报表时，你会用到几个窗口。从第 2 章开始，你将详细了解它们。现在，如果你不熟悉\
    \ Visual Studio，花些时间学习一下这些窗口的工作方式。每个窗口都可以重新定位、自动隐藏或关闭。图 1-30 显示了每个窗口顶部的图标。\n\n\
    ![A395630_1_En_1_Fig30_HTML.jpg](img/A395630_1_En_1_Fig30_HTML.jpg)\n图 1-30. 窗口图标\n\
    \n你也可以通过点击图钉图标来启用“自动隐藏”功能，这会隐藏窗口而不实际关闭它。你可以在程序边缘看到标题，点击标题，窗口就会在你需要时打开。这是一个很实用的功能，可以为你提供更多的工作空间。\n\
    \n通过点击并拖动窗口标题，你可以移动窗口。要查看窗口最终会放置在哪里，请在鼠标悬停时注意标记以及高亮显示的区域，如图 1-31 所示。当你放下窗口时，它将最终落在高亮显示的区域。\n\
    \n![A395630_1_En_1_Fig31_HTML.jpg](img/A395630_1_En_1_Fig31_HTML.jpg)\n图 1-31.\
    \ 移动窗口\n\n如果你关闭了一个窗口，总是可以通过查看“视图”菜单将其找回。如果你决定恢复到默认配置，请点击 `窗口 ➤ 重置窗口布局`。\n\n当你关闭\
    \ Visual Studio 后，下次打开时，你可以通过 `文件 ➤ 最近的文件和解决方案` 轻松打开上一个项目。你也可以选择 `文件 ➤ 打开 ➤ 项目/解决方案`\
    \ 并浏览到该项目。\n\n你可能想知道项目和解决方案之间的区别。解决方案只是一个容器，包含一个或多个项目。这些项目可以是相同类型，例如都是 SSRS 项目。在某些情况下，项目可能与一个主题领域相关，但可能都是不同的技术类型。例如，同一个解决方案中可能包含一个数据库项目、一个\
    \ SSRS 项目、一个 SQL Server Integration Services 项目和一个 SQL Server Analysis Services\
    \ 项目。例如，该解决方案可用于开发一个数据集市。\n\n根据设置的值，解决方案名称仅当其包含多个项目时才会显示。如果你愿意，可以通过选择 `工具 ➤ 选项`\
    \ 来修改该设置。在“选项”对话框中，展开“项目和解决方案”并选择“常规”页面。如果选中了 `始终显示解决方案`，即使解决方案只包含一个项目，其名称也会显示。图\
    \ 1-32 显示了如果你想进行设置更改时的对话框。\n\n![A395630_1_En_1_Fig32_HTML.jpg](img/A395630_1_En_1_Fig32_HTML.jpg)\n\
    图 1-32. “始终显示解决方案”选项\n\n## 总结\n\nSQL Server Reporting Services 是 SQL Server 的一项强大功能，允许你创建可供组织部署使用的报表。SSRS\
    \ 2016 拥有一个全新的、名为 Web 门户的用户界面，其中包含传统的分页报表、关键绩效指标（KPI）和移动报表。\n\n要设置你的开发环境，你需要下载并安装几个组件。幸运的是，它们都是微软提供的免费下载。遵循本章的指导，你将准备好学习如何开发和发布\
    \ SSRS 报表。\n\n在第 2 章中，你将学习如何使用向导创建你的第一份报表。\n"
- fmt: '# 2. Using the Wizard to Create Your First Reports


    Now that the environment is in place, you are ready to learn SQL Server Reporting
    Services (SSRS) report development. Before you begin to tackle the many details,
    you can take advantage of a built-in wizard that will enable you quickly create
    a report.


    Software wizards ask the user a series of questions to automate a complex process.
    I like to compare them to the auto assembly line used by Henry Ford. Mr. Ford
    said, “Any customer can have a car painted any colour that he wants so long as
    it is black.” You have many choices today when buying an automobile, but if you
    want something the manufacturer doesn’t offer, you must add it later.


    A wizard can do a lot of the work for you, but it is impossible to include everything
    that every report may require. Simple reports, with a bit of tweaking, may be
    good enough to deploy. At a minimum, it is a great way to start learning.


    ## Creating Your First Report


    Using the wizard, you can add new reports to existing projects. For this exercise,
    you will use it to create the project as well.


    Follow these instructions to start the project:


    1.  Launch `SQL Server Data Tools 2015`. If you don’t find it, and you have followed
    the instructions in Chapter [1](#A395630_1_En_1_Chapter.html), look for `Visual
    Studio 2015` instead.

    2.  Click `File` ➤ `New` ➤ `Project` to launch the New Project dialog.

    3.  On the left, expand `Installed`, `Templates`, and `Business Intelligence`.

    4.  Select `Reporting Services`.

    5.  Select `Report Server Project Wizard` as shown in Figure [2-1](#A395630_1_En_2_Chapter.html#Fig1).


    ![A395630_1_En_2_Fig1_HTML.jpg](A395630_1_En_2_Fig1_HTML.jpg)


    *Figure 2-1. Selecting the Report Server Project Wizard*


    At the bottom of the dialog, you will fill in project and solution names and the
    location for the project. By default, the project is saved in a `Projects` folder
    in `My Documents` under `Visual Studio 2015`. I suggest that you create a destination
    specifically for working with this book in a location that you prefer but that
    will be easy for you to locate. For the `Name`, type in `Wizard Reports`. This
    is actually the name of the project. As you type in the project name, it will
    automatically fill in the `Solution Name`. Override that by typing in `Beginning
    SSRS Chapter 2`. Before clicking `OK`, make sure that the properties look similar
    to those in Figure [2-2](#A395630_1_En_2_Chapter.html#Fig2). In this case, I have
    created a folder called `Learn SSRS` where all my projects and solutions related
    to this book will go.


    ![A395630_1_En_2_Fig2_HTML.jpg](A395630_1_En_2_Fig2_HTML.jpg)


    *Figure 2-2. The name and location of the project*


    After you click `OK` to create the project, the Report Wizard will launch. Follow
    these instructions to step through the wizard:


    1.  Click `Next` to move past the welcome screen.

    2.  The `Select the Data Source` screen allows you to set up connections to the
    data, called a data source. You will learn more about data sources in Chapter
    [3](#A395630_1_En_3_Chapter.html). For this exercise, click `Edit` shown in Figure
    [2-3](#A395630_1_En_2_Chapter.html#Fig3) to bring up the `Connection Properties`
    dialog.


    ![A395630_1_En_2_Fig3_HTML.jpg](A395630_1_En_2_Fig3_HTML.jpg)


    *Figure 2-3. The Select the Data Source dialog*


    3.  Make sure that the `Data source` property is set to `Microsoft SQL Server
    (SqlClient)`.

    4.  Next you must fill in your `Server name`. You can specify a locally installed
    SQL Server by using `(local)`, `localhost`, or a dot (`.`). If your instance has
    an instance name, such as `Inst1`, you will need to follow with a backslash and
    the instance name: `(local)\Inst1`. If you are not sure about the name of your
    instance, see the section “Determining the SQL Server Name” in Chapter [1](#A395630_1_En_1_Chapter.html).
    If your SQL Server instance is installed in your network, request help from your
    database administrator.

    5.  If your SQL Server is installed locally, accept the default of `Use Windows
    Authentication` in the `Log on to the server` property. Otherwise, check with
    your database administrator to see if you will use Windows authentication or if
    you will need to supply a user name and password.

    6.  In the `Connect to a database` section, choose `Select or enter a database
    name` and then find `AdventureWorks2016` in the list.


    **Note**


    At the time of the SQL Server 2016 release, Microsoft had not made an `AdventureWorks2016`
    database available. Instead, there was a beta version database called `AdventureWork2016ctp3`.
    If your database is named `AdventureWorks2016CTP3`, run this command in a new
    query window in SSMS to change the name:


    ```

    ALTER DATABASE AdventureWorks2016CTP3 MODIFY NAME = AdventureWorks2016;

    ```'
