  trans: "\n# “数据集属性”对话框\n\n2.  在 `Name` 属性中填写 `Sales`。\n3.  选择 `使用嵌入在我报表中的数据集`。操作后，对话框会发生变化。它不再显示共享数据集，而是显示嵌入数据集的属性。图\
    \ 3-18 显示了更改后对话框的外观。\n\n![A395630_1_En_3_Fig18_HTML.jpg](img/A395630_1_En_3_Fig18_HTML.jpg)\n\
    \n图 3-18. 嵌入数据集的数据集属性\n\n4.  在 `数据源` 下的下拉框中找到 `AdventureWorks`。此列表中只显示已作为报表一部分设置好的数据源。\n\
    5.  如果尚未选择，请将 `查询` 类型选择为 `文本`。\n6.  在 `查询` 属性中输入以下代码：\n\n```sql\nSELECT SUM(TotalDue)\
    \ AS TotalSales, MONTH(OrderDate) AS OrderMonth, YEAR(OrderDate) AS OrderYear\n\
    FROM Sales.SalesOrderHeader\nGROUP BY MONTH(OrderDate), YEAR(OrderDate);\n```\n\
    \n7.  点击 `确定` 以创建数据集。\n\n现在，`Sales` 数据集应该在“报表数据”窗口中可见，如图 3-19 所示。除了数据集名称外，您还将看到可用的字段。\n\
    \n![A395630_1_En_3_Fig19_HTML.jpg](img/A395630_1_En_3_Fig19_HTML.jpg)\n\n图 3-19.\
    \ Sales 数据集\n\n现在，您可以在报表上显示来自该数据集的数据。请按照以下步骤设置一个简单的报表：\n\n1.  显示 `工具箱` 窗口。如果不可见，请单击报表设计画布，然后从\
    \ `视图` 菜单中选择 `工具箱`。工具箱如图 3-20 所示。\n\n![A395630_1_En_3_Fig20_HTML.jpg](img/A395630_1_En_3_Fig20_HTML.jpg)\n\
    \n图 3-20. 工具箱\n\n2.  将一个 `表` 控件从 `工具箱` 拖到报表设计画布上。您也可以右键单击设计界面，然后选择 `插入` ➤ `表`\
    \ 来添加表。图 3-21 显示了报表上的表控件。\n\n![A395630_1_En_3_Fig21_HTML.jpg](img/A395630_1_En_3_Fig21_HTML.jpg)\n\
    \n图 3-21. 表控件\n\n3.  填充表格有几种方式。从“报表数据”窗口中，将 `OrderYear` 字段拖到 `数据` 行最左边的单元格。`标题`\
    \ 行会自动填充。\n4.  将鼠标悬停在 `数据` 行中间的单元格上，直到单元格中出现一个小图标。单击该图标以显示可用字段列表。选择 `OrderMonth`。\n\
    5.  单击 `数据` 行右侧的单元格。输入以下代码：\n\n```text\n[TotalSales]\n```\n\n6.  在上方的标题行中，输入 `Total\
    \ Sales`。表格网格应如图 3-22 所示。\n\n![A395630_1_En_3_Fig22_HTML.jpg](img/A395630_1_En_3_Fig22_HTML.jpg)\n\
    \n图 3-22. 已填充单元格的表格\n\n点击 `预览` 以查看报表。显然，此报表尚未准备好发布，但它确实演示了将报表连接到数据所需的步骤。\n\n##\
    \ 使用共享数据集\n\n共享数据集对于将在整个项目中重用的查询非常有用。SSRS 允许您创建报表，让运行报表的用户能够动态进行筛选。通常，相同的条件将用于多个报表，这是共享数据集的绝佳用途。请按照以下步骤添加共享数据集：\n\
    \n1.  切换回 `设计` 视图。\n2.  在“报表数据”窗口中，右键单击 `数据集` 并选择 `添加数据集`。\n3.  将数据集命名为 `Year`。\n\
    4.  确保选择了 `使用共享数据集`，并从窗口中选择 `Year`。数据集属性对话框应如图 3-23 所示。\n\n    ![A395630_1_En_3_Fig23_HTML.jpg](img/A395630_1_En_3_Fig23_HTML.jpg)\n\
    \    图 3-23. 使用共享数据集\n\n5.  点击 `确定` 以创建新数据集。\n\n下一步是修改 `Sales` 数据集，使其需要参数。双击 `Sales`\
    \ 数据集以打开其属性。您也可以右键单击并选择 `属性`。将 `查询` 更改为以下代码。现在，在运行报表时将需要提供年份：\n\n```sql\nSELECT\
    \ SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth, YEAR(OrderDate)\
    \ AS OrderYear\nFROM Sales.SalesOrderHeader\nWHERE YEAR(OrderDate) = @Year\nGROUP\
    \ BY MONTH(OrderDate), YEAR(OrderDate);\n```\n\n运行报表时，您现在需要先输入年份才能看到结果。预览报表。输入\
    \ `2011` 并点击 `查看报表`。显示的总计将仅针对 `2011` 年，如图 3-24 所示。\n\n![A395630_1_En_3_Fig24_HTML.jpg](img/A395630_1_En_3_Fig24_HTML.jpg)\n\
    \n图 3-24. 按年份筛选的结果\n\n报表已成功按年份筛选。用户必须已经知道哪些年份对报表有效。对于有效年份来说，这不是大问题，但对于部门或客户呢？为了提供有效的年份列表供用户选择，请按照以下步骤操作：\n\
    \n1.  切换回 `设计` 视图，并在“报表数据”窗口中展开 `参数` 文件夹。\n2.  当您更改查询以按 `@Year` 筛选时，`Year` 参数已自动添加。如图\
    \ 3-25 所示。\n\n    ![A395630_1_En_3_Fig25_HTML.jpg](img/A395630_1_En_3_Fig25_HTML.jpg)\n\
    \    图 3-25. Year 参数\n\n3.  右键单击 `Year` 并选择 `参数属性`，这将打开“报表参数属性”对话框。\n4.  在 `常规`\
    \ 页上，将 `数据类型` 更改为 `整数`。\n5.  切换到 `可用值` 页。\n6.  将 `从以下选项中选择` 更改为 `从查询中获取值`。\n7.\
    \  将 `数据集` 属性更改为 `Year`。\n8.  将 `值字段` 更改为 `OrderYear`。\n9.  将 `标签字段` 更改为 `OrderYear`。对话框应如图\
    \ 3-26 所示。\n\n    ![A395630_1_En_3_Fig26_HTML.jpg](img/A395630_1_En_3_Fig26_HTML.jpg)\n\
    \    图 3-26. 参数属性\n\n10. 点击 `确定` 以接受这些属性。\n\n您将在第 6 章中了解更多关于参数的信息。现在，请预览报表。您将看到一个有效年份的下拉列表，如图\
    \ 3-27 所示。\n\n![A395630_1_En_3_Fig27_HTML.jpg](img/A395630_1_En_3_Fig27_HTML.jpg)\n\
    \n图 3-27. 参数列表\n\n尝试为 `Year` 参数使用不同的值运行报表。报表数据应随所选年份的不同而改变。\n\n## 总结\n\n理解数据源和数据集对于报表开发至关重要。数据源是到数据库或其他数据源的连接字符串。数据集是查询。在一个项目中的报表之间共享数据源和数据集是可行的。作为最佳实践，请始终共享数据集。如果查询可以在多个报表中使用，例如用于常用参数，则应共享数据集。\n\
    \n当您向项目添加新报表时，请记住下一步是向报表添加数据源。然后是添加数据集。\n\n第 4 章将介绍如何使用表、文本框以及报表中常用的其他控件。\n"
- fmt: "# 4. Working with Tables, Controls, and Report Sections\n\nThe past 15 years\
    \ or so have been the age of the reality TV show. But long before “Extreme Makeover:\
    \ Home Edition” and “American Idol,” reality shows existed on public television.\
    \ I remember watching unscripted programs about cooking, remodeling houses, and\
    \ yoga as a child and young teen. My favorites were the shows about art. Theoretically,\
    \ you could learn how to paint a masterpiece by watching the artist turn a blank\
    \ canvas into a beautiful still life or landscape.\n\nWhile reports may not be\
    \ works of art, there are some similarities. You will start with a blank canvas,\
    \ but while the data on the report is crucial, the look of the report is important\
    \ as well.\n\nIn this chapter, you will learn more about tables and several other\
    \ common controls used to build reports. You’ll also learn how to add headers\
    \ and footers to add features to make the report more professional and ready to\
    \ publish.\n\n## Working with Tables\n\nA report is made of several objects, some\
    \ of which are linked to the dataset. Other objects give information to the viewer\
    \ about the report, such as a title or page count. And some objects are there\
    \ to give the report a certain look and feel such as a company logo. The most\
    \ commonly used data region is the table control. Chapters [2](#A395630_1_En_2_Chapter.html)\
    \ and [3](#A395630_1_En_3_Chapter.html) introduced tables. You linked tables to\
    \ data and modified a few properties. In this section, you will learn even more\
    \ about tables.\n\nNote\n\nIn Chapter [3](#A395630_1_En_3_Chapter.html), you learned\
    \ how to create a project, data sources, and datasets. You also learned how to\
    \ add a report to the project. Starting with this chapter, instead of telling\
    \ you how to create these objects step by step, I’ll just tell you what you need\
    \ to create. Remember to click `Add` ➤ `New Item` when adding a new report to\
    \ avoid starting the wizard. If you have trouble, refer back to Chapter [3](#A395630_1_En_3_Chapter.html).\n\
    \nTo get started, follow these steps:\n\n1.  Launch `SQL Server Data Tools (SSDT)`.\n\
    2.  Create a new Report Server Project with the name `Building Reports` and solution\
    \ name `Beginning SSRS Chapter [4](#A395630_1_En_4_Chapter.html)`.\n3.  Add a\
    \ new shared data source pointing to the `AdventureWorks2016` database. Name it\
    \ `AdventureWorks2016`.\n4.  Create a new report with the name `Working with Tables`.\
    \ Make sure that you add a blank report; do not start up the wizard. See Chapter\
    \ [3](#A395630_1_En_3_Chapter.html) if you need help. The Solution Explorer should\
    \ look like Figure [4-1](#A395630_1_En_4_Chapter.html#Fig1).\n\n![A395630_1_En_4_Fig1_HTML.jpg](A395630_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. The Solution Explorer\n\nNote\n\nThe `Always Show Solution` property\
    \ determines if the solution name is visible when there is only one project in\
    \ the solution. See the section “Taking a Tour of SSDT” in Chapter [1](#A395630_1_En_1_Chapter.html)\
    \ to learn how to set this option.\n\n5.  In the Report Data window, add a data\
    \ source, `AdventureWorks`, that points to the shared data source `AdventureWorks2016`.\n\
    6.  Create a new embedded dataset for the report named `SalesSummary` pointing\
    \ to the `AdventureWorks` data source.\n7.  Type in the following query for the\
    \ report:\n\n```sql\n    SELECT YEAR(OrderDate) AS OrderYear, SUM(TotalDue) AS\
    \ TotalSales\n    FROM Sales.SalesOrderHeader\n    GROUP BY YEAR(OrderDate);\n\
    ```\n\n8.  The dataset properties should look like Figure [4-2](#A395630_1_En_4_Chapter.html#Fig2).\
    \ Click OK to create the dataset.\n\n![A395630_1_En_4_Fig2_HTML.jpg](A395630_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. The dataset properties\n\n9.  Create a second embedded dataset called\
    \ `SalesDetails` pointing to the `AdventureWorks` data source.\n10. Add this query\
    \ to the dataset and click OK.\n\n```sql\n    SELECT CustomerID, SalesOrderID,\
    \ OrderDate, TotalDue\n    FROM Sales.SalesOrderHeader;\n```\n\nThe Report Data\
    \ window should look like Figure [4-3](#A395630_1_En_4_Chapter.html#Fig3).\n\n\
    ![A395630_1_En_4_Fig3_HTML.jpg](A395630_1_En_4_Fig3_HTML.jpg)\n\nFigure 4-3. The\
    \ Report Data window\n\nNow that the datasets are in place, you can begin building\
    \ your report. Add a new table to the design canvas. You can do this by dragging\
    \ in a table control from the Toolbox or by right-clicking the canvas and selecting\
    \ `Insert` ➤ `Table`.\n\nEach table can be linked to just one dataset. In this\
    \ case, you have two datasets. Once the first field is added, the table will be\
    \ linked to the field’s dataset. Hovering over a cell displays a small field list\
    \ icon. If there is just one dataset, you will click the icon to bring up the\
    \ field list. In this case, since there are two datasets, hover over the data\
    \ source name to see both datasets as shown in Figure [4-4](#A395630_1_En_4_Chapter.html#Fig4).\
    \ Clicking the dataset name displays the list of fields.\n\n![A395630_1_En_4_Fig4_HTML.jpg](A395630_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4. Both datasets are available to the table\n\nSelect `OrderYear` under\
    \ `SalesSummary`. Now when you move to the next data cell, the `SalesSummary`\
    \ fields are the only ones available. Choose `TotalSales` for the middle cell.\
    \ You have an extra column on the right. Right-click the handle above the rightmost\
    \ column and select `Delete Columns` to remove it.\n\nAdd a second table to the\
    \ report under the first table. As you drag the second table around on the canvas,\
    \ blue snap lines appear to help you make sure the objects are aligned. For this\
    \ table, add the `CustomerID`, `SalesOrderID`, and `OrderDate` fields from the\
    \ `SalesDetails` dataset to the report. By default, the table has three columns,\
    \ but you have four fields to display. You can add additional columns by dragging\
    \ the column to the right of the third column. When you see a blue bracket show\
    \ up, drop the field. Figure [4-5](#A395630_1_En_4_Chapter.html#Fig5) shows how\
    \ this looks.\n\n![A395630_1_En_4_Fig5_HTML.jpg](A395630_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5. Dragging a new field to the table\n\nYou can also right-click on\
    \ the third column and insert a column to the right.\n\nWhenever fields are added\
    \ to the data cells, the name of the cell is changed to the name of the field.\
    \ A value fills in for the header cell as well adding spaces before the upper\
    \ case letters. You can always edit the header cell if needed."
