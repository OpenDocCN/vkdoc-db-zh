  trans: "\n# 格式化报告\n\n请按以下步骤开始格式化报告：\n\n1.  切换到设计视图。\n2.  将引用了 `Sales` 字段的四个单元格格式化为带千位分隔符、不带小数点的货币格式。请记住，格式化一个单元格后，你可以选择其他三个单元格并一次性粘贴该格式。\n\
    3.  减小 `Order Year` 和 `Territory ID` 列的宽度。\n4.  增加 `Store` 列的宽度。\n\n该报告采用的是为报告添加分组级别时的默认分组布局，但你始终可以重新排列它。现在，你将添加两行新行来修改布局。请按以下步骤操作：\n\
    \n1.  右键单击 `TerritoryID` 单元格，选择 插入行 ➤ 组内 ➤ 上方。这会为 `TerritoryID` 组添加一个新行。\n2. \
    \ 再次右键单击 `TerritoryID` 单元格，选择 插入行 ➤ 组外 ➤ 上方。这会为 `OrderYear` 组添加一个新行。表格布局应如图 5-13\
    \ 所示。\n\n![A395630_1_En_5_Fig13_HTML.jpg](img/A395630_1_En_5_Fig13_HTML.jpg)\n\
    *图 5-13. 添加了两行新行的报告布局*\n\n3.  在第 2 列，将 `Territory ID` 标题移动到 `TerritoryID` 上方的单元格。\n\
    4.  在第 3 列，将 `Territory` 数据字段向上移动一行。\n5.  将 `Customer ID` 标题移动到 `CustomerID` 数据单元格上方。\n\
    6.  在 `Territory` 数据单元格上方键入 `Name`。此时，布局应如图 5-14 所示。\n\n![A395630_1_En_5_Fig14_HTML.jpg](img/A395630_1_En_5_Fig14_HTML.jpg)\n\
    *图 5-14. 重新排列单元格后的报告预览*\n\n7.  在第 4 列，将 `Store` 标题移动到 `Store` 数据单元格上方的单元格。\n8.\
    \  在顶部行，平均销售额表达式的上方，键入 `Average Sales`。此时，布局应如图 5-15 所示。\n\n![A395630_1_En_5_Fig15_HTML.jpg](img/A395630_1_En_5_Fig15_HTML.jpg)\n\
    *图 5-15. 重新排列第 4 列后的布局*\n\n9.  在第 5 列，将第 1 行的标题更改为 `Total Sales`。\n10. 在第 3 行（区域标题行），键入\
    \ `Total Sales`。\n11. 在第 4 行，添加将自动求和的 `Sales` 字段。\n12. 将单元格格式化为不带小数、带千位分隔符的货币格式。\n\
    13. 在第 5 行（明细标题行），将 `Sales` 字段更改为文本 `Total Sales`。布局应如图 5-16 所示。\n\n![A395630_1_En_5_Fig16_HTML.jpg](img/A395630_1_En_5_Fig16_HTML.jpg)\n\
    *图 5-16. 重新排列第 5 列后的布局*\n\n14. 选择 `Average Sales` 列。将对齐方式设置为 `右对齐`。\n15. 选择 `Total\
    \ Sales` 列。将对齐方式设置为 `右对齐`。\n16. 预览报告。它应如图 5-17 所示。\n\n![A395630_1_En_5_Fig17_HTML.jpg](img/A395630_1_En_5_Fig17_HTML.jpg)\n\
    *图 5-17. 预览模式下的格式化报告*\n\n你可以使用颜色和其他格式方面来突出显示分组级别。请按以下步骤格式化分组：\n\n1.  切换回设计视图。\n\
    2.  选择顶部行并查看属性窗口。将 `FontSize`（字体大小）更改为 `12 pt`，将 `BackgroundColor`（背景色）更改为 `CornflowerBlue`（矢车菊蓝），并将“字体”部分中的\
    \ `Color`（颜色）属性更改为 `White`（白色）。\n3.  对第二行重复此格式设置。\n4.  选择第三行。将 `BackgroundColor`\
    \ 更改为 `LightBlue`（浅蓝色），并将 `FontWeight`（字体粗细）更改为 `Bold`（加粗）。\n5.  对第四行重复此格式设置。\n\
    6.  选择第五行。将字体加粗。\n\n现在当你预览报告时，它看起来如图 5-18。\n\n![A395630_1_En_5_Fig18_HTML.jpg](img/A395630_1_En_5_Fig18_HTML.jpg)\n\
    *图 5-18. 带格式设置的报告预览*\n\n当你滚动浏览报告时，你会看到标题在后续页面上消失了。要使标题在每一页上重复，请按以下步骤操作：\n\n1.\
    \  切换回设计视图。\n2.  单击“列组”窗口右侧的下拉箭头，选择 `高级模式`，如图 5-19 所示。\n\n![A395630_1_En_5_Fig19_HTML.jpg](img/A395630_1_En_5_Fig19_HTML.jpg)\n\
    *图 5-19. 选择高级模式*\n\n3.  选择 `高级模式` 后，“行组”和“列组”将展开。你将看到静态节，如图 5-20 所示。\n\n![A395630_1_En_5_Fig20_HTML.jpg](img/A395630_1_En_5_Fig20_HTML.jpg)\n\
    *图 5-20. 展开的分组窗口*\n\n4.  使用属性窗口，为“行组”下找到的每个静态区域将 `RepeatOnNewPage`（在新页上重复）值更改为\
    \ `True`（真）。\n\n现在当你预览报告时，标题将在每一页上重复。\n\n# 对分组进行排序\n\n还有一个要求尚未解决，即排序。明细必须按销售总额降序排列。报告还必须按年份降序排列。请按以下步骤根据要求修改排序顺序。\n\
    \n1.  在“行组”窗口中，右键单击“明细”组并选择“组属性”。\n2.  在“组属性”对话框中，选择“排序”选项卡。\n3.  单击“添加”。\n4.\
    \  在“排序依据”属性中选择 `Sales`。\n5.  在“顺序”属性中选择 `Z 到 A`。“组属性”对话框应如图 5-21 所示。\n\n    ![A395630_1_En_5_Fig21_HTML.jpg](img/A395630_1_En_5_Fig21_HTML.jpg)\n\
    \    *图 5-21. 排序属性对话框*\n\n6.  单击“确定”接受属性设置。\n7.  修改 `OrderYear` 组属性，使报告按 `OrderYear`\
    \ 降序排序。组会自动按分组字段排序。\n8.  右键单击 `TerritoryID` 组并调出“组属性”。\n9.  选择“排序”选项卡。将现有的排序顺序从\
    \ `TerritoryID` 字段更改为 `Territory` 字段。完成后单击“确定”。\n\n# 完成报告\n\n报告已基本准备好向经理展示。请按以下步骤完成报告：\n\
    \n1.  切换到设计视图。\n2.  将表格拖动到报告的顶部和左侧。\n3.  拖动报告画布的底部和右侧边缘。\n4.  在“报告”菜单中，单击“添加页面页眉”和“添加页面页脚”。\n\
    5.  在页面页眉中添加一个文本框。键入 `Territory Sales`。\n6.  将文本框扩展到画布的宽度。\n7.  居中文本。\n8.  将字体大小增加到\
    \ `18 pt`。\n9.  从“报告数据”窗口的“内置字段”中，将 `Execution Time`（执行时间）拖到报告页脚。\n10. 将文本框的宽度加倍。\n\
    11. 在页脚添加另一个文本框。\n12. 将此表达式添加到文本框中：\n\n    ```\n    =\"第 \" & Globals!PageNumber\
    \ & \" 页，共 \" & Globals!TotalPages & \" 页\"\n    ```\n\n13. 从“报告”菜单启动“报告属性”对话框。\n\
    14. 将 `上` 和 `下` 页边距更改为 `0.25 in` 或 `0.635 cm`。\n15. 查看报告。调整任何合理的设置。\n\n现在，你已准备好将报告展示给经理以获取反馈。\n"
- fmt: "## 使用备用布局构建报表\n\n查看报表后，经理确认数字正确，但希望采用不同的布局。备用布局类似于您在第[2](#A395630_1_En_2_Chapter.html)章中使用向导创建的报表，如图[5-22](#A395630_1_En_5_Chapter.html#Fig22)所示。\n\
    \n![A395630_1_En_5_Fig22_HTML.jpg](A395630_1_En_5_Fig22_HTML.jpg)\n\n图 5-22.\n\
    备用报表布局\n\n要创建具有此布局的报表，请按照以下步骤操作：\n\n1.  向项目中添加一个新报表，命名为“按区域的销售额 2”。\n2.  向报表添加一个名为\
    \ AdventureWorks 的数据源，指向 AdventureWorks2016 共享数据源。\n3.  向报表添加一个名为 SalesByTerritory\
    \ 的嵌入数据集，指向 AdventureWorks 数据源，使用以下查询：\n    ```\n    SELECT YEAR(OrderDate) AS\
    \ OrderYear, C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name\
    \ AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN\
    \ Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer\
    \ AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID\
    \ = C.StoreID\n    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate),\
    \ S.Name;\n    ```\n4.  向报表画布添加一个表。\n5.  将 CustomerID、Store 和 Sales 添加到数据行。\n\
    6.  向 CustomerID 添加一个父行组。\n7.  在 Tablix 组对话框中，在“分组依据”属性中填写 TerritoryID。\n8.  选中“添加组标题”。单击“确定”接受属性。\n\
    9.  向 TerritoryID 添加一个父行组。\n10. 在“分组依据”属性中填写 OrderYear。\n11. 选中“添加组标题”。单击“确定”接受属性。报表应如图[5-23](#A395630_1_En_5_Chapter.html#Fig23)所示。\n\
    \n![A395630_1_En_5_Fig23_HTML.jpg](A395630_1_En_5_Fig23_HTML.jpg)\n\n图 5-23.\n\
    具有分组级别的报表设计\n\n12. 删除“订单年份”和“区域 ID”列。这不会删除分组。\n13. 右键单击“客户 ID”列，选择“插入列” ➤ “左侧”。\n\
    14. 重复三次，使总共有四列空列。\n15. 在标题行中键入以下值：订单年份、平均销售额、区域 ID、名称。报表设计应如图[5-24](#A395630_1_En_5_Chapter.html#Fig24)所示。\n\
    \n![A395630_1_En_5_Fig24_HTML.jpg](A395630_1_En_5_Fig24_HTML.jpg)\n\n图 5-24.\n\
    添加标题后的报表布局\n\n16. 第二行是 `OrderYear` 组的一部分，但如果您将 `OrderYear` 拖动到“订单年份”标题下方的单元格中，由于它是数字字段，它将自动求和。请改为键入\
    \ `[OrderYear]`。\n17. 在“区域 ID”列的第三行中，键入 `[TerritoryID]`。同样，请确保此字段不会对值进行求和。\n18.\
    \ 将 Territory 字段添加到第三行“名称”下方的单元格中。\n19. 使用“表达式”对话框，将以下表达式添加到第二行“平均销售额”下方的单元格：\n\
    \    ```\n    =Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)\n\
    \    ```\n20. 将 Sales 字段添加到“销售额”标题下的两个空单元格中。它们将自动求和，这是正确的。\n\n现在，您就有了一个具有备用布局的分组报表。当您预览报表时，它应如图[5-25](#A395630_1_En_5_Chapter.html#Fig25)所示。\n\
    \n![A395630_1_En_5_Fig25_HTML.jpg](A395630_1_En_5_Fig25_HTML.jpg)\n\n图 5-25.\n\
    格式化前的报表预览\n\n您现在已准备好格式化报表。请按照以下步骤操作：\n\n1.  将所有涉及 Sales 的单元格格式设置为货币，无小数点，并使用千位分隔符。\n\
    2.  选择标题行并查看“属性”窗口。将 `BackgroundColor` 更改为 CornflowerBlue。\n3.  将 `FontSize` 更改为\
    \ 12 pt，并将“字体”部分中的 `Color` 属性更改为 White。\n4.  减小“订单年份”、“平均销售额”、“区域 ID”和“名称”列的宽度。\n\
    5.  增加“店铺”列的宽度。\n6.  将第二行的 `BackgroundColor` 更改为 `#8fb3f3`。\n7.  将第三行的 `BackgroundColor`\
    \ 更改为 `#c7d9f9`。\n8.  将“销售额”列右对齐。报表设计应如图[5-26](#A395630_1_En_5_Chapter.html#Fig26)所示。\n\
    \n![A395630_1_En_5_Fig26_HTML.jpg](A395630_1_En_5_Fig26_HTML.jpg)\n\n图 5-26.\n\
    格式化后的报表布局\n\n报表对每个级别的排序有非常具体的说明。请按照以下步骤对数据进行排序：\n\n1.  通过“组属性”对话框，将 `OrderYear`\
    \ 组的排序顺序更改为降序。\n2.  将详细信息行的排序顺序更改为 `Sales` 降序。\n3.  将 `TerritoryID` 组的排序顺序更改为使用\
    \ `Territory` 而不是 `TerritoryID`。\n\n最后一套任务是添加页眉和页脚并修改页眉的行为。请按照以下步骤完成报表：\n\n1.\
    \  启用分组窗口的“高级模式”。\n2.  在“属性”窗口中，为“行组”侧找到的每个“静态”级别将 `RepeatOnNewPage` 设置为 True。\n\
    3.  将“行组”侧找到的每个“静态”级别的 `KeepWithGroup` 更改为 After。\n4.  为使标题行在向下滚动时保持原地不动，请选择顶部的“静态”项。\n\
    5.  将 `FixedData` 属性更改为 True。\n6.  将表重新定位在左上角。\n7.  通过向内拖动边缘来收紧画布。\n8.  添加报表页脚和报表页眉。\n\
    9.  向页眉添加一个文本框，文本为 Territory Sales。\n10. 将字体大小更改为 18 pt。将文本框居中。\n11. 通过从“报表数据”窗口的“内置字段”文件夹中拖动\
    \ Execution Time 字段，将其添加到页脚。\n12. 向页脚添加一个包含以下表达式的文本框：\n    ```\n    =\"Page \"\
    \ & Globals!PageNumber & \" of \" & Globals!TotalPages\n    ```\n13. 将报表的上边距和下边距更改为\
    \ 0.25 英寸或 0.635 厘米。\n\n预览报表并试用滚动功能。进行任何需要的额外调整。报表应如图[5-27](#A395630_1_En_5_Chapter.html#Fig27)所示。\n\
    \n![A395630_1_En_5_Fig27_HTML.jpg](A395630_1_En_5_Fig27_HTML.jpg)\n\n图 5-27.\n\
    具有备用布局的 Territory Sales 报表\n\n如果向下滚动，您应该会看到标题行保持在原位。"
  raw: "## Building a Report with an Alternate Layout\n\nAfter viewing the report,\
    \ the manager verifies that the numbers are correct but would like a different\
    \ layout. The alternate layout resembles the report you created with the wizard\
    \ in Chapter [2](#A395630_1_En_2_Chapter.html) as shown in Figure [5-22](#A395630_1_En_5_Chapter.html#Fig22).\n\
    \n![A395630_1_En_5_Fig22_HTML.jpg](A395630_1_En_5_Fig22_HTML.jpg)\n\nFigure 5-22.\n\
    \nAn alternate report layout\n\nTo create a report with this layout follow these\
    \ steps:\n\n1.  Add a new report to the project named Sales by Territory 2.  \n\
    2.  Add a data source to the report named AdventureWorks pointing to the AdventureWorks2016\
    \ shared data source.  \n3.  Add an embedded dataset to the report named SalesByTerritory\
    \ pointing to the AdventureWorks data source with this query:\n\n```\n    SELECT\
    \ YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID,\
    \ T.Name AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN\
    \ Sales.Customer AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS\
    \ S ON S.BusinessEntityID = C.StoreID\n    GROUP BY C.CustomerID, T.TerritoryID,\
    \ T.Name,\n    YEAR(OrderDate), S.Name;\n    ```\n\n4.  Add a table to the report\
    \ canvas.  \n5.  Add CustomerID, Store, and Sales to the Data row.  \n6.  Add\
    \ a parent row group to CustomerID.  \n7.  On the Tablix group dialog, fill in\
    \ TerritoryID as the Group by property.  \n8.  Check Add group header. Click OK\
    \ to accept the properties.  \n9.  Add a parent row group to TerritoryID.  \n\
    10.  Fill in OrderYear as the Group by property.  \n11.  Check Add group header.\
    \ Click OK to accept the properties. The report should look like Figure [5-23](#A395630_1_En_5_Chapter.html#Fig23).\n\
    \n![A395630_1_En_5_Fig23_HTML.jpg](A395630_1_En_5_Fig23_HTML.jpg)\n\nFigure 5-23.\n\
    \nThe report design with grouping levels  \n12.  Delete the Order Year and Territory\
    \ ID columns. This does not delete the groups.  \n13.  Right-click the Customer\
    \ ID column and select Insert Column ➤ Left.  \n14.  Repeat three more times so\
    \ that there are four empty columns.  \n15.  Type these values in the header row:\
    \ Order Year, Average Sales, Territory ID, Name. The report design should look\
    \ like Figure [5-24](#A395630_1_En_5_Chapter.html#Fig24).\n\n![A395630_1_En_5_Fig24_HTML.jpg](A395630_1_En_5_Fig24_HTML.jpg)\n\
    \nFigure 5-24.\n\nThe report layout after adding headings  \n16.  The second row\
    \ is part of the OrderYear group, but if you drag OrderYear to the cell underneath\
    \ the Order Year heading, it will automatically sum since it is a numeric field.\
    \ Type in `[OrderYear]` instead.  \n17.  In the third row of the Territory ID\
    \ column, type in `[TerritoryID]`. Again, make sure that this field doesn’t sum\
    \ the values.  \n18.  Add the Territory field to the cell under Name in the third\
    \ row.  \n19.  Using the Expression dialog, add this expression to the cell under\
    \ Average Sales in the second row:\n\n```\n    =Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)\n\
    \    ```\n\n20.  Add the Sales field to the two empty cells under the Sales header.\
    \ These will automatically sum which is correct.\n\nNow you have a grouping report\
    \ with an alternate layout. When you preview the report, it should look like Figure\
    \ [5-25](#A395630_1_En_5_Chapter.html#Fig25).\n\n![A395630_1_En_5_Fig25_HTML.jpg](A395630_1_En_5_Fig25_HTML.jpg)\n\
    \nFigure 5-25.\n\nThe report preview before formatting\n\nYou are now ready to\
    \ format the report. Follow these steps:\n\n1.  Format all cells involving Sales\
    \ to currency with no decimal points and use a thousands separator.  \n2.  Select\
    \ the header row and view the Properties window. Change the BackgroundColor to\
    \ CornflowerBlue.  \n3.  Change the FontSize to 12 pt and the Color property in\
    \ the Font section to White.  \n4.  Decrease the width of Order Year, Average\
    \ Sales, Territory ID, and Name columns.  \n5.  Increase the width of the Store\
    \ column.  \n6.  Change the BackgroundColor of the second row to #8fb3f3.  \n\
    7.  Change the BackgroundColor of the third row to #c7d9f9.  \n8.  Right-align\
    \ the Sales column. The report design should look like Figure [5-26](#A395630_1_En_5_Chapter.html#Fig26).\n\
    \n![A395630_1_En_5_Fig26_HTML.jpg](A395630_1_En_5_Fig26_HTML.jpg)\n\nFigure 5-26.\n\
    \nThe report layout with formatting\n\nThe report has very specific instructions\
    \ for sorting each level. Follow these steps to sort the data:\n\n1.  Through\
    \ the Group Properties dialog, change the sort order of the OrderYear group to\
    \ descending.  \n2.  Change the sort order of the detail row to Sales descending.\
    \  \n3.  Change the sort order of the TerritoryID group to use Territory instead\
    \ of TerritoryID.\n\nThe final set of tasks is to add the header and footer and\
    \ modify the behavior of the headers. Follow these steps to complete the report:\n\
    \n1.  Enable the Advanced Mode of the grouping window.  \n2.  Set the RepeatOnNewPage\
    \ to True in the Properties window for each Static level found in the Row Groups\
    \ side.  \n3.  Change the KeepWithGroup to After for each Static level found in\
    \ the Row Groups.  \n4.  To allow the header row to stay in place when scrolling\
    \ down, select the top Static item.  \n5.  Change the FixedData property to True.\
    \  \n6.  Reposition the table so that it is in the top left corner.  \n7.  Tighten\
    \ the canvas by dragging in the edges.  \n8.  Add a Report Page footer and Report\
    \ Page header.  \n9.  Add a text box to the header with the text Territory Sales.\
    \  \n10.  Change the font size to 18 pt. Center the text box.  \n11.  Add the\
    \ Execution Time to the footer by dragging the field from the Built-in Fields\
    \ folder in the Report Data window.  \n12.  Add a text box with this expression\
    \ to the footer:\n\n```\n    =\"Page \" & Globals!PageNumber & \" of \" & Globals!TotalPages\n\
    \    ```\n\n13.  Change the report’s top and bottom margins to 0.25in or 0.635cm.\n\
    \nPreview the report and try out the scrolling feature. Make any additional adjustments\
    \ that are needed. The report should look like Figure [5-27](#A395630_1_En_5_Chapter.html#Fig27).\n\
    \n![A395630_1_En_5_Fig27_HTML.jpg](A395630_1_En_5_Fig27_HTML.jpg)\n\nFigure 5-27.\n\
    \nThe Territory Sales report with an alternate layout\n\nIf you scroll down, you\
    \ should see that the header row stays in place."
  trans: "\n## 使用备用布局构建报表\n\n查看报表后，经理确认数字正确，但希望采用不同的布局。备用布局类似于您在第 2 章中使用向导创建的报表，如图\
    \ 5-22 所示。\n\n![A395630_1_En_5_Fig22_HTML.jpg](img/A395630_1_En_5_Fig22_HTML.jpg)\n\
    \n图 5-22.\n备用报表布局\n\n要创建具有此布局的报表，请按照以下步骤操作：\n\n1.  向项目中添加一个新报表，命名为“按区域的销售额 2”。\n\
    2.  向报表添加一个名为 AdventureWorks 的数据源，指向 AdventureWorks2016 共享数据源。\n3.  向报表添加一个名为\
    \ SalesByTerritory 的嵌入数据集，指向 AdventureWorks 数据源，使用以下查询：\n    ```\n    SELECT YEAR(OrderDate)\
    \ AS OrderYear, C.CustomerID, SUM(TotalDue) AS Sales,\n    T.TerritoryID, T.Name\
    \ AS Territory, s.Name AS Store\n    FROM sales.SalesOrderHeader AS SOH\n    JOIN\
    \ Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID\n    JOIN Sales.Customer\
    \ AS C ON SOH.CustomerID = C.CustomerID\n    JOIN Sales.Store AS S ON S.BusinessEntityID\
    \ = C.StoreID\n    GROUP BY C.CustomerID, T.TerritoryID, T.Name,\n    YEAR(OrderDate),\
    \ S.Name;\n    ```\n4.  向报表画布添加一个表。\n5.  将 CustomerID、Store 和 Sales 添加到数据行。\n\
    6.  向 CustomerID 添加一个父行组。\n7.  在 Tablix 组对话框中，在“分组依据”属性中填写 TerritoryID。\n8.  选中“添加组标题”。单击“确定”接受属性。\n\
    9.  向 TerritoryID 添加一个父行组。\n10. 在“分组依据”属性中填写 OrderYear。\n11. 选中“添加组标题”。单击“确定”接受属性。报表应如图\
    \ 5-23 所示。\n\n![A395630_1_En_5_Fig23_HTML.jpg](img/A395630_1_En_5_Fig23_HTML.jpg)\n\
    \n图 5-23.\n具有分组级别的报表设计\n\n12. 删除“订单年份”和“区域 ID”列。这不会删除分组。\n13. 右键单击“客户 ID”列，选择“插入列”\
    \ ➤ “左侧”。\n14. 重复三次，使总共有四列空列。\n15. 在标题行中键入以下值：订单年份、平均销售额、区域 ID、名称。报表设计应如图 5-24\
    \ 所示。\n\n![A395630_1_En_5_Fig24_HTML.jpg](img/A395630_1_En_5_Fig24_HTML.jpg)\n\
    \n图 5-24.\n添加标题后的报表布局\n\n16. 第二行是 `OrderYear` 组的一部分，但如果您将 `OrderYear` 拖动到“订单年份”标题下方的单元格中，由于它是数字字段，它将自动求和。请改为键入\
    \ `[OrderYear]`。\n17. 在“区域 ID”列的第三行中，键入 `[TerritoryID]`。同样，请确保此字段不会对值进行求和。\n18.\
    \ 将 Territory 字段添加到第三行“名称”下方的单元格中。\n19. 使用“表达式”对话框，将以下表达式添加到第二行“平均销售额”下方的单元格：\n\
    \    ```\n    =Sum(Fields!Sales.Value)/CountDistinct(Fields!TerritoryID.Value)\n\
    \    ```\n20. 将 Sales 字段添加到“销售额”标题下的两个空单元格中。它们将自动求和，这是正确的。\n\n现在，您就有了一个具有备用布局的分组报表。当您预览报表时，它应如图\
    \ 5-25 所示。\n\n![A395630_1_En_5_Fig25_HTML.jpg](img/A395630_1_En_5_Fig25_HTML.jpg)\n\
    \n图 5-25.\n格式化前的报表预览\n\n您现在已准备好格式化报表。请按照以下步骤操作：\n\n1.  将所有涉及 Sales 的单元格格式设置为货币，无小数点，并使用千位分隔符。\n\
    2.  选择标题行并查看“属性”窗口。将 `BackgroundColor` 更改为 CornflowerBlue。\n3.  将 `FontSize` 更改为\
    \ 12 pt，并将“字体”部分中的 `Color` 属性更改为 White。\n4.  减小“订单年份”、“平均销售额”、“区域 ID”和“名称”列的宽度。\n\
    5.  增加“店铺”列的宽度。\n6.  将第二行的 `BackgroundColor` 更改为 `#8fb3f3`。\n7.  将第三行的 `BackgroundColor`\
    \ 更改为 `#c7d9f9`。\n8.  将“销售额”列右对齐。报表设计应如图 5-26 所示。\n\n![A395630_1_En_5_Fig26_HTML.jpg](img/A395630_1_En_5_Fig26_HTML.jpg)\n\
    \n图 5-26.\n格式化后的报表布局\n\n报表对每个级别的排序有非常具体的说明。请按照以下步骤对数据进行排序：\n\n1.  通过“组属性”对话框，将\
    \ `OrderYear` 组的排序顺序更改为降序。\n2.  将详细信息行的排序顺序更改为 `Sales` 降序。\n3.  将 `TerritoryID`\
    \ 组的排序顺序更改为使用 `Territory` 而不是 `TerritoryID`。\n\n最后一套任务是添加页眉和页脚并修改页眉的行为。请按照以下步骤完成报表：\n\
    \n1.  启用分组窗口的“高级模式”。\n2.  在“属性”窗口中，为“行组”侧找到的每个“静态”级别将 `RepeatOnNewPage` 设置为 True。\n\
    3.  将“行组”侧找到的每个“静态”级别的 `KeepWithGroup` 更改为 After。\n4.  为使标题行在向下滚动时保持原地不动，请选择顶部的“静态”项。\n\
    5.  将 `FixedData` 属性更改为 True。\n6.  将表重新定位在左上角。\n7.  通过向内拖动边缘来收紧画布。\n8.  添加报表页脚和报表页眉。\n\
    9.  向页眉添加一个文本框，文本为 Territory Sales。\n10. 将字体大小更改为 18 pt。将文本框居中。\n11. 通过从“报表数据”窗口的“内置字段”文件夹中拖动\
    \ Execution Time 字段，将其添加到页脚。\n12. 向页脚添加一个包含以下表达式的文本框：\n    ```\n    =\"Page \"\
    \ & Globals!PageNumber & \" of \" & Globals!TotalPages\n    ```\n13. 将报表的上边距和下边距更改为\
    \ 0.25 英寸或 0.635 厘米。\n\n预览报表并试用滚动功能。进行任何需要的额外调整。报表应如图 5-27 所示。\n\n![A395630_1_En_5_Fig27_HTML.jpg](img/A395630_1_En_5_Fig27_HTML.jpg)\n\
    \n图 5-27.\n具有备用布局的 Territory Sales 报表\n\n如果向下滚动，您应该会看到标题行保持在原位。\n"
- fmt: '## Building a Report with a Space-Saving Layout


    The alternate layout shown in the previous section may be preferred, but it takes
    more space than the default layout. There is a way to save some space, however.
    Follow these steps to create a report with a space-saving layout:


    1.  Right-click the `Sales by Territory 2` report in `Solution Explorer` and select
    `Copy`.

    2.  Press `CTRL + V` to create a copy of the report.

    3.  Change the name to `Sales by Territory 3`.

    4.  Double-click the new report so that it is open in design view.

    5.  Right-click the second row and select `Insert Row` ➤ `Inside Group – Below`.

    6.  In the cell found in the third row under `Order Year`, type `Territory ID`.

    7.  Expand the `Order Year` column.

    8.  In the cell found in the third row under `Average Sales`, type `Name`.

    9.  In the cell found in the fourth row under `Order Year`, add `[TerritoryID]`.
    Type in the placeholder to avoid summing the values.

    10. In the cell found in the fourth row under `Average Sales`, add the `Territory`
    field.

    11. Delete the `Territory ID` and `Name` columns. The report layout should look
    like Figure [5-28](#A395630_1_En_5_Chapter.html#Fig28).

    ![A395630_1_En_5_Fig28_HTML.jpg](A395630_1_En_5_Fig28_HTML.jpg)

    Figure 5-28. The space-saving layout


    You can now decrease the width of the report canvas or add some additional fields
    to the report as needed. You may also want to modify the some of the formatting
    such as bolding the second row.


    You can take advantage of the `Padding` property of the text box to indent the
    contents of a cell to create a hierarchical effect. Follow these steps to see
    how to do this:


    1.  Align the first column to the left.

    2.  Select the four cells related to the territory as show in Figure [5-29](#A395630_1_En_5_Chapter.html#Fig29).

    ![A395630_1_En_5_Fig29_HTML.jpg](A395630_1_En_5_Fig29_HTML.jpg)

    Figure 5-29. Selecting the territory cells

    3.  Open the `Properties` window.

    4.  Locate the `Indent` property in the `Alignment` category.

    5.  Change the `Left Indent` property to `15 pt`.

    6.  Expand the width of the second column slightly. When you preview the report,
    it will look like Figure [5-30](#A395630_1_En_5_Chapter.html#Fig30).

    ![A395630_1_En_5_Fig30_HTML.jpg](A395630_1_En_5_Fig30_HTML.jpg)

    Figure 5-30. The report with territory cells indented


    ## Building a Matrix Report


    The manager is happy with the `Sales by Territory 2` report but has another request.
    He would like you to create a matrix report that summarizes the sales by territory
    pivoted by the order year. Pivoting means that the data in the field will become
    a column header.


    While a matrix report may seem daunting at first, it is really easy to create.
    Just like a regular report, spend some time figuring out the grouping levels.
    In this case, the row level group will be `TerritoryID` and the column level group
    will be `OrderYear`. You also need to determine the data field. This is the value
    that you wish to aggregate.


    Figure [5-31](#A395630_1_En_5_Chapter.html#Fig31) shows the matrix control before
    any cells are populated. Notice that the `Data` cell is the intersection of row
    and column groups.

    ![A395630_1_En_5_Fig31_HTML.jpg](A395630_1_En_5_Fig31_HTML.jpg)

    Figure 5-31. The matrix control


    To create a matrix report, follow these steps:


    1.  Add a new report to the project named `Sales by Territory Matrix`.

    2.  Add a data source named `AdventureWorks` pointing to the `AdventureWorks2016`
    shared data source.

    3.  Add an embedded dataset named `SalesByTerritory` pointing to the `AdventureWorks`
    data source with this query:

    ```sql

    SELECT YEAR(OrderDate) AS OrderYear, C.CustomerID, SUM(TotalDue) AS Sales,

    T.TerritoryID, T.Name AS Territory, s.Name AS Store

    FROM sales.SalesOrderHeader AS SOH

    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID

    JOIN Sales.Customer AS C ON SOH.CustomerID = C.CustomerID

    JOIN Sales.Store AS S ON S.BusinessEntityID = C.StoreID

    GROUP BY C.CustomerID, T.TerritoryID, T.Name,

    YEAR(OrderDate), S.Name;

    ```

    4.  Drag a matrix control to the report.

    5.  In the `Columns` cell, add `OrderYear`. This is the pivoted data.

    6.  In the `Rows` cell, add `TerritoryID`.

    7.  In the `Data` cell, add `Sales`. It will automatically sum, which is what
    you need.

    8.  Right-click the first column and select `Insert Columns` ➤ `Inside Group Right`.

    9.  Add the `Territory` field to the new cell in the second row.

    10. In the first row, change `Territory` heading to `Name`. The matrix layout
    should look like Figure [5-32](#A395630_1_En_5_Chapter.html#Fig32).

    ![A395630_1_En_5_Fig32_HTML.jpg](A395630_1_En_5_Fig32_HTML.jpg)

    Figure 5-32. The matrix report layout

    11. Format the `Data` cell as currency with no decimal places and use a thousands
    separator.

    12. Bold the first row.

    13. Preview the report. It should look like Figure [5-33](#A395630_1_En_5_Chapter.html#Fig33).

    ![A395630_1_En_5_Fig33_HTML.jpg](A395630_1_En_5_Fig33_HTML.jpg)

    Figure 5-33. The matrix report preview

    14. Switch back to design view.

    15. Right-click the `Sum(Sales)` cell and select `Add Total` ➤ `Row`.

    16. Right-click the cell again and select `Add Total` ➤ `Column`. The report layout
    should look like Figure [5-34](#A395630_1_En_5_Chapter.html#Fig34).

    ![A395630_1_En_5_Fig34_HTML.jpg](A395630_1_En_5_Fig34_HTML.jpg)

    Figure 5-34. The matrix after adding totals

    17. Add the `Sales` field to the empty cell under `Total`. It will automatically
    sum.

    18. That cell will not pick up the formatting, so format it like the other `Sales`
    cells.

    19. Bold the bottom row.

    20. Bold the rightmost column. When you preview the report, it should look like
    Figure [5-35](#A395630_1_En_5_Chapter.html#Fig35).

    ![A395630_1_En_5_Fig35_HTML.jpg](A395630_1_En_5_Fig35_HTML.jpg)

    Figure 5-35. The matrix after formatting the totals


    One of the interesting aspects of the table and matrix controls, is that you can
    start with one and, by modifying the groups, switch to the other. That is the
    reason that these controls are called `Tablix`. To change a matrix to a table,
    follow these steps:


    1.  Switch to design view.

    2.  Select the matrix and right-click the cross-section of the handle. Figure
    [5-36](#A395630_1_En_5_Chapter.html#Fig36) shows where to right-click.

    ![A395630_1_En_5_Fig36_HTML.jpg](A395630_1_En_5_Fig36_HTML.jpg)

    Figure 5-36. Right-click the handle intersection

    3.  Click `Copy` and then paste into the report canvas to create a copy of the
    matrix.

    4.  Select the new matrix and click right-click the `OrderYear2` grouping level
    in the column grouping window.

    5.  Delete the group.

    6.  On the `Delete Group` dialog, select `Delete Group and Related Rows and Columns`.
    Click `OK`.


    The matrix is now a table as shown in Figure [5-37](#A395630_1_En_5_Chapter.html#Fig37).
    You can also start with a table and turn it into a matrix by adding a column group.

    ![A395630_1_En_5_Fig37_HTML.jpg](A395630_1_En_5_Fig37_HTML.jpg)

    Figure 5-37. The matrix is now a table


    ## Summary


    Creating reports is an iterative process. You may start with a simple request
    and need to work with the requester to finalize the design. Or, you may start
    with an elaborate set of requirements including a detailed layout. Whenever you
    are creating a report with multiple grouping levels or complex features, be sure
    to sketch out the layout if a design is not given to you.


    Most reports require one or more grouping levels. This chapter walked you through
    adding grouping levels and formatting the report using several techniques. You
    also created a simple matrix report. Be sure you understand how to add and configure
    groups before moving on to the next chapter.


    In `Chapter [6]`, you will learn how to make your report dynamic by adding parameters,
    linking reports, allowing the user to control sorting, and more.'
