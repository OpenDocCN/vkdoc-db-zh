- fmt: '## Securing Delivery


    By default, report data travels through the network unencrypted. This may be a
    security risk in your environment. You can configure `SSRS` to use the secure
    socket layer (`SSL`) protocol. This is the network protocol used to connect securely
    that you see when buying something or visiting your banking web site. To properly
    configure `SSL`, you need to purchase a certificate from a trusted certificate
    authority.


    Once you have obtained a certificate and installed it on the server, it can be
    configured by launching the `Reporting Service Configuration Manager`. On the
    `Web Portal URL` page, click `Advanced`. The `SSL` certificate can be bound to
    `SSRS` by clicking `Add` at the bottom of the `Advanced Multiple Web Site Configuration`
    dialog box. Figure [9-27](#A395630_1_En_9_Chapter.html#Fig27) shows the dialogs
    you will use to configure `SSL`.


    ![A395630_1_En_9_Fig27_HTML.jpg](A395630_1_En_9_Fig27_HTML.jpg)


    Figure 9-27. The dialogs for configuring `SSL`


    ## Summary


    Securing your reports is very important, but it can become very complex and difficult
    to manage if you don’t have a strategy before you start publishing reports. Make
    sure you figure out the layout of the folders and never configure security on
    a report, only on a folder.


    Security is configured in two layers: at the data source and in `SSRS`. Predefined
    server and folder roles make security simpler to manage. You can also configure
    reports to be delivered automatically through subscriptions.


    Chapter [10](#A395630_1_En_10_Chapter.html) covers creating reports directly from
    the `web portal` with `Report Builder`. Two types of reports new with 2016, `KPIs`
    and `Mobile Reports`, will be covered as well.


    # 10. Creating Self-Service and Mobile Reports


    Not long ago, I was playing games at a table with my four-year-old granddaughter
    and my grandson who was approaching his second birthday. My smartphone was out
    of my reach when it audibly announced a couple of text messages. My grandson grabbed
    the device and handed it across to me while saying, “Your phone! Your phone!”
    When I let him look at photos on the phone, he immediately started swiping. I
    know he was imitating the behavior of the grownups around him, but today’s children
    are exposed to technology from birth.


    The world has changed so much over the past few years. We demand access to our
    data immediately and from wherever we happen to be. Our work and recreation often
    blend together as we stay connected constantly to social media and our jobs. Whether
    good or bad, that is the new reality.


    Throughout this book, you have created reports using `SQL Server Data Tools (SSDT)`
    within `Visual Studio`. `Visual Studio` is a developer tool, but end users often
    want to create their own reports and dashboards. They are also demanding to keep
    up with data when outside the company intranet on their tablets and phones. In
    this chapter, you will learn how to create reports using the end-user tool `Report
    Builder`. You will also create `mobile reports` and `key performance indicators
    (KPIs)`, two new features of `SQL Server 2016` available with `Enterprise` and
    `Developer Editions`.


    ## Using Report Builder


    `Report Builder` has undergone several iterations since it was first released
    with `SQL Server 2005`. The current version takes advantage of published datasets
    and report parts to make building a report much easier than within `SSDT`. It
    is, however, possible to start from scratch, building a report in a way that is
    very similar to using `SSDT`. `Report Builder` also contains additional wizards
    not seen in `SSDT`. There are still the features you learned to use throughout
    the book such as the property pages and expressions. Table [10-1](#A395630_1_En_10_Chapter.html#Tab1)
    lists the differences between `SSDT` and `Report Builder`.


    Table 10-1. Differences Between `SSDT` and `Report Builder`


    | Feature | SSDT | Report Builder |

    | --- | --- | --- |

    | Target audience | Report developers | Power users |

    | Look and feel | Visual Studio | Microsoft Office |

    | Organization | Project based | Individual reports |

    | Deployment | Deploy or upload | Save |

    | Report Parts | Deploy report parts | Consume and deploy report parts |


    Power users and others in the organization who wish to create their own reports
    will benefit from having prebuilt report parts, parameter lists, and datasets
    available to them. That will still create work for the report developers, but
    it will help ensure that the power users are able to use `Report Builder` efficiently
    without needing to be expert `T-SQL` programmers or to completely understand the
    source databases.


    Chapter [8](#A395630_1_En_8_Chapter.html) described how to deploy reports, including
    report parts. If you did not follow along during Chapter [8](#A395630_1_En_8_Chapter.html),
    go back and complete the steps in the sections “Deploying Reports from `SSDT`”
    and “Deploying Report Parts.” To get started with `Report Builder`, follow these
    steps:


    1.  Launch the `web portal`.

    2.  Create a new folder by selecting `New` ➤ `Folder` from the menu.

    3.  Type in `Ad Hoc Reports` as the name and click `Create`.

    4.  Once you have created the folder, click it to navigate inside.

    5.  Click `New` ➤ `Paginated Report` as shown in Figure [10-1](#A395630_1_En_10_Chapter.html#Fig1).


    ![A395630_1_En_10_Fig1_HTML.jpg](A395630_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Create a new paginated report

    6.  You may see a message asking if you wish to let the browser allow the application
    to launch. Click `Allow`.

    7.  If this is the first time you have launched `Report Builder`, you will see
    a message telling you to download and install it as shown in Figure [10-2](#A395630_1_En_10_Chapter.html#Fig2).


    ![A395630_1_En_10_Fig2_HTML.jpg](A395630_1_En_10_Fig2_HTML.jpg)


    Figure 10-2. Link to install `Report Builder`

    8.  The `Get Report Builder` link will take you to a page on `Microsoft.com` where
    you can download the app. Follow the instructions on the page. I continued to
    see the message even after I installed `Report Builder`, but I just dismissed
    it.

    9.  When running the installation wizard, you will be prompted to enter a target
    server `URL` (uniform resource locator). Enter the `web service URL` that you
    determined in Chapter [8](#A395630_1_En_8_Chapter.html) in the section “Deploying
    Reports from `SSDT`.” Figure [10-3](#A395630_1_En_10_Chapter.html#Fig3) shows
    an example `URL`.


    ![A395630_1_En_10_Fig3_HTML.jpg](A395630_1_En_10_Fig3_HTML.jpg)


    Figure 10-3. The `Default Target Server` property

    10.  After the installation, you may need to select `New` ➤ `Paginated Report`
    from the menu once again to actually launch the `Report Builder` tool.

    11.  Agree to any warnings that may appear.

    12.  Once `Report Builder` launches, you will see the `New Report or Dataset`
    dialog as shown in Figure [10-4](#A395630_1_En_10_Chapter.html#Fig4).


    ![A395630_1_En_10_Fig4_HTML.jpg](A395630_1_En_10_Fig4_HTML.jpg)


    Figure 10-4. The `New Report or Dataset` dialog

    13.  Select `Blank Report`.

    14.  You will see the report design area as shown in Figure [10-5](#A395630_1_En_10_Chapter.html#Fig5).


    ![A395630_1_En_10_Fig5_HTML.jpg](A395630_1_En_10_Fig5_HTML.jpg)


    Figure 10-5. The report design area'
