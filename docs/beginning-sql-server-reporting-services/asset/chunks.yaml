  trans: "\n## 配置 SSRS\n\n如果你严格按照“安装带有 SSRS 的 SQL Server”部分中的安装说明进行操作，`SSRS` 应该已经配置好了。反之，如果你是将\
    \ `SSRS` 添加到现有的 `SQL Server` 实例，或者在“Reporting Services 配置”页面上选择了“仅安装”，那么你现在就需要进行配置。要配置\
    \ `SSRS`，请按照以下步骤操作：\n\n1.  启动 `Reporting Services 配置管理器`。\n2.  当要求连接到你的 `SSRS`\
    \ 实例时，如果需要，请选择服务器和实例名称，然后如图 1-10 所示点击 `连接`。\n\n    ![A395630_1_En_1_Fig10_HTML.jpg](img/A395630_1_En_1_Fig10_HTML.jpg)\n\
    \n    图 1-10. 连接到 `SSRS` 实例。\n3.  选择 `数据库` 页面，然后点击 `更改数据库`，如图 1-11 所示。\n\n   \
    \ ![A395630_1_En_1_Fig11_HTML.jpg](img/A395630_1_En_1_Fig11_HTML.jpg)\n\n    图\
    \ 1-11. `数据库` 页面。\n4.  这将打开 `报表服务器数据库配置向导`。选择 `创建新的报表服务器数据库`，如图 1-12 所示。点击 `下一步`。\n\
    \n    ![A395630_1_En_1_Fig12_HTML.jpg](img/A395630_1_En_1_Fig12_HTML.jpg)\n\n\
    \    图 1-12. 创建新的报表服务器数据库。\n5.  在 `数据库服务器` 页面上，确保已填写你的服务器名称。如果你有命名实例，请务必包含实例名称。图\
    \ 1-13 显示了此页面。\n\n    ![A395630_1_En_1_Fig13_HTML.jpg](img/A395630_1_En_1_Fig13_HTML.jpg)\n\
    \n    图 1-13. 连接到数据库服务器。\n6.  点击 `下一步` 转到如图 1-14 所示的 `数据库` 页面。接受此页面上的默认设置。如果你的安装是命名实例，实例名称将成为数据库名称的一部分。\n\
    \n    ![A395630_1_En_1_Fig14_HTML.jpg](img/A395630_1_En_1_Fig14_HTML.jpg)\n\n\
    \    图 1-14. `数据库名称`。\n7.  点击 `下一步` 转到 `凭据` 页面。你可以在此页面上更改 `SSRS` 服务帐户。接受默认设置并点击\
    \ `下一步`。\n8.  点击向导中剩余页面的 `下一步` 以创建 `SSRS` 数据库。\n9.  过程完成后，点击 `完成`。\n10. 要创建 `Web\
    \ 服务 URL`，请选择 `Web 服务 URL` 页面，如图 1-15 所示。\n\n    ![A395630_1_En_1_Fig15_HTML.jpg](img/A395630_1_En_1_Fig15_HTML.jpg)\n\
    \n    图 1-15. `Web 服务 URL` 页面。\n11. 对于你自己的 `SSRS` 安装，只需接受默认设置并点击 `应用`。这将设置 Web\
    \ 服务。\n12. 任务完成后，选择 `Web 门户 URL` 页面。再次，你可以接受默认设置并点击 `应用`。这将创建 Web 门户。\n13. Web\
    \ 门户创建完成后，点击如图 1-16 所示的 `加密密钥` 页面。点击 `备份` 以保存加密密钥。\n\n    ![A395630_1_En_1_Fig16_HTML.jpg](img/A395630_1_En_1_Fig16_HTML.jpg)\n\
    \n    图 1-16. 备份加密密钥。\n14. 提供一个你不会忘记的位置和密码。此步骤在生产环境中尤其重要。加密密钥是还原或移动数据库所必需的。\n\
    15. 点击 `退出` 以关闭 `SSRS 配置管理器`。\n\n现在 `SSRS` 应该已经配置好了。在第 8 章中，你将学习如何发布报表。届时，你将返回此工具以确定\
    \ Web 服务 URL 和 Web 门户 URL。\n\n## 配置本地 SSRS 设置\n\n如果你在本地安装 `SSRS` 实例，会遇到一个与安全相关的非常令人沮丧的问题。为了启动\
    \ Web 门户或发布报表，你需要以管理员身份运行 Web 浏览器和 `SSDT`。此功能有助于防止应用程序在你不知情和未经许可的情况下对操作系统进行更改。\n\
    \n要解决此问题，请按照以下步骤操作：\n\n1.  通过启动 `Reporting Service 配置管理器` 来确定 Web 门户 URL。点击 `Web\
    \ 门户 URL` 页面并记下链接。不要点击它。\n2.  使用 `以管理员身份运行` 选项启动你的 Web 浏览器。\n3.  导航到在步骤 1 中确定的\
    \ URL。\n4.  打开 Web 浏览器的安全设置，并将当前站点添加到 `受信任的站点`。\n5.  点击 `确定` 并关闭浏览器。\n6.  再次使用\
    \ `以管理员身份运行` 选项启动浏览器。\n7.  再次导航到 Web 门户 URL。\n8.  点击如图 1-17 所示的 `管理文件夹`。\n\n \
    \   ![A395630_1_En_1_Fig17_HTML.jpg](img/A395630_1_En_1_Fig17_HTML.jpg)\n\n  \
    \  图 1-17. `管理文件夹` 链接。\n9.  点击 `添加组或用户`。\n10. 在 `组或用户` 中输入你的计算机名或域名加上帐户。\n11.\
    \ 选择 `内容管理器` 作为角色。对话框将类似于图 1-18。\n\n    ![A395630_1_En_1_Fig18_HTML.jpg](img/A395630_1_En_1_Fig18_HTML.jpg)\n\
    \n    图 1-18. `主页` 的安全性设置。\n12. 点击 `确定`。\n13. 点击页面右上角的齿轮图标，选择 `站点设置`，如图 1-19 所示。\n\
    \n    ![A395630_1_En_1_Fig19_HTML.jpg](img/A395630_1_En_1_Fig19_HTML.jpg)\n\n\
    \    图 1-19. `站点设置` 链接。\n14. 选择 `安全性` 页面。\n15. 点击 `添加组或用户`。\n16. 输入你的帐户名并点击 `系统管理员`。对话框将如图\
    \ 1-20 所示。\n\n    ![A395630_1_En_1_Fig20_HTML.jpg](img/A395630_1_En_1_Fig20_HTML.jpg)\n\
    \n    图 1-20. 站点设置。\n17. 点击 `确定`。\n\n你将在第 9 章中了解更多关于这些安全设置的信息。如果你已遵循这些说明，但在启动\
    \ Web 门户或发布报表时仍然遇到安全错误，请参阅以下网址的文章以获取更多信息：[`https://msdn.microsoft.com/en-us/library/bb630430.aspx`](https://msdn.microsoft.com/en-us/library/bb630430.aspx)。\n\
    \n## 确定 SQL Server 名称\n\n要遵循本书中的示例，在创建数据源时，你需要连接到你的 `SQL Server` 实例。`SQL Server`\
    \ 名称由两部分组成：计算机名和实例名。例如，位于名为 `MyServer` 的服务器上、实例名为 `Inst1` 的 `SQL Server` 可以通过\
    \ `MyServer\\Inst1` 访问。通常，`SQL Server` 会被安装为默认实例。在这种情况下，你不需要提供实际上是 `MSSQLSERVER`\
    \ 的实例名；你只需提供计算机名即可。\n\n在“安装带有 SSRS 的 SQL Server”部分中，你被指示将 `SQL Server` 安装为默认实例。如果你提供了实例名，那么你将需要该名称来连接数据库。要找出实例名，你需要启动\
    \ `SQL Server 配置管理器`。\n\n**注意：** 如果你使用的是网络 `SQL Server` 而不是本地安装的实例，请向负责该服务器的人员询问正确的计算机名和实例名。\n\
    \n`配置管理器` 运行后，点击 `SQL Server 服务`。如果你看到 `MSSQLSERVER`，则表示你有一个默认实例。如果你看到其他任何名称，那就是你的实例名。图\
    \ 1-21 显示了一个默认实例和一个名为 `SSRS` 的命名实例。\n\n![A395630_1_En_1_Fig21_HTML.jpg](img/A395630_1_En_1_Fig21_HTML.jpg)\n\
    \n图 1-21. `SQL Server 配置管理器`。\n\n`SQL Server 配置管理器` 实用程序还有许多其他用途，这些超出了本书的范围。\n"
- fmt: "## Restoring the AdventureWorks Database\n\nThere are quite a few pieces to\
    \ get into place in order to follow the examples in this book. The last is the\
    \ AdventureWorks database which is often used as a sample database for SQL Server.\
    \ Because the download locations change from time to time, browse to [`www.codeplex.com`](http://www.codeplex.com)\
    \ and then search for Microsoft SQL Server Product Samples: Databases. On that\
    \ page, you may see links for several different versions. Make sure you find the\
    \ download for `AdventureWorks2016.bak`.\n\n> Note\n>\n> At the release of SQL\
    \ Server 2016, the CodePlex page had an `AdventureWorks2016CTP3.bak` file available\
    \ but not an `AdventureWorks2016.bak` file. The CTP3 designation refers to Community\
    \ Technology Preview 3, a Beta version of SQL Server. If the release version is\
    \ not available, the CTP3 version will work, but you will need to change the database\
    \ name during the restore process.\n\nFollow these steps to restore the database:\n\
    \n1.  Download the `AdventureWorks2016.bak` or `AdventureWorks2016CTP3.bak` file.\n\
    2.  The downloaded file most likely ended up in your Download folder. In order\
    \ to restore the file, you will need to move it. If `C:\\temp` doesn’t exist,\
    \ create it. Move the file to the new folder.\n3.  Launch SQL Server Management\
    \ Studio.\n4.  Use the server name you determined in the previous section when\
    \ prompted to connect. If you installed SQL Server locally, you can use `localhost`,\
    \ `(local)`, or a period as shown in Figure 1-22.\n\n    ![A395630_1_En_1_Fig22_HTML.jpg](A395630_1_En_1_Fig22_HTML.jpg)\n\
    \    Figure 1-22. Connect to Server dialog\n\n5.  Click the Connect button.\n\
    6.  In the Object Explorer, right-click on Databases and select Restore Database\
    \ as shown in Figure 1-23.\n\n    ![A395630_1_En_1_Fig23_HTML.jpg](A395630_1_En_1_Fig23_HTML.jpg)\n\
    \    Figure 1-23. The Restore Database selection\n\n7.  On the Restore Databases\
    \ dialog, select Device.\n8.  Click the ellipsis as shown in Figure 1-24.\n\n\
    \    ![A395630_1_En_1_Fig24_HTML.jpg](A395630_1_En_1_Fig24_HTML.jpg)\n    Figure\
    \ 1-24. The Restore Database dialog\n\n9.  On the Select backup devices dialog,\
    \ click Add and then navigate to the file as shown in Figure 1-25.\n\n    ![A395630_1_En_1_Fig25_HTML.jpg](A395630_1_En_1_Fig25_HTML.jpg)\n\
    \    Figure 1-25. The Select backup devices dialog\n\n10. Click OK to accept the\
    \ file.\n11. If the CTP3 file is the only one available for download, change the\
    \ Database property from `AdventureWorks2016CTP3` to `AdventureWorks2016`.\n12.\
    \ Click OK to start the restore.\n13. Once the restore is complete click OK to\
    \ dismiss the restore utility.\n14. Expand and refresh the Databases folder. You\
    \ should be able to see the `AdventureWorks2016` database in place as shown in\
    \ Figure 1-26.\n\n    ![A395630_1_En_1_Fig26_HTML.jpg](A395630_1_En_1_Fig26_HTML.jpg)\n\
    \    Figure 1-26. The new database\n\n15. Exit SSMS.\n\nIn this case, the source\
    \ of data and the SSRS databases are hosted on the same SQL Server instance. In\
    \ most production environments, they would be hosted on separate servers.\n\n\
    ## Taking a Tour of SSDT\n\nYou will be spending quite a bit of time using SSDT\
    \ throughout many of the chapters of this book. Take some time now to become familiar\
    \ with it by following these steps:\n\n1.  Launch Visual Studio 2015.\n2.  Since\
    \ this is the first time that it is launched, you must configure a couple of settings.\
    \ Select Business Intelligence Settings.\n3.  Choose a theme that you prefer as\
    \ shown in Figure 1-27.\n\n    ![A395630_1_En_1_Fig27_HTML.jpg](A395630_1_En_1_Fig27_HTML.jpg)\n\
    \    Figure 1-27. Setting up the environment\n\n4.  Click Start Visual Studio\n\
    5.  Once Visual Studio is running select `File ➤ New ➤ Project` as shown in Figure\
    \ 1-28.\n\n    ![A395630_1_En_1_Fig28_HTML.jpg](A395630_1_En_1_Fig28_HTML.jpg)\n\
    \    Figure 1-28. Create a new project\n\n6.  On the New Project dialog, select\
    \ `Report Server Project` as shown in Figure 1-29.\n\n    ![A395630_1_En_1_Fig29_HTML.jpg](A395630_1_En_1_Fig29_HTML.jpg)\n\
    \    Figure 1-29. Select Report Server Project\n\n7.  Click OK to create the project.\n\
    \nThere are several windows that you will use while developing reports. You’ll\
    \ learn all about them starting in Chapter 2. For now, if you are not familiar\
    \ with Visual Studio, take some time to learn how the windows work. Each window\
    \ can be repositioned, auto-hidden, or closed. Figure 1-30 shows the icons found\
    \ at the top of each window.\n\n![A395630_1_En_1_Fig30_HTML.jpg](A395630_1_En_1_Fig30_HTML.jpg)\n\
    Figure 1-30. The window icons\n\nThe Auto Hide feature that you can also enable\
    \ by clicking the pin icon hides the window without actually closing it. You can\
    \ see the title on the edge of the program, and, by clicking the title, the window\
    \ opens just when you need it. That’s a nice feature to give you more room to\
    \ work.\n\nBy clicking and dragging the window titles, you can move windows around.\
    \ To see where they will end up, pay attention to the markers as you mouse over\
    \ them and the areas that are highlighted as shown in Figure 1-31. The window\
    \ will end up in the highlighted area when you drop the window.\n\n![A395630_1_En_1_Fig31_HTML.jpg](A395630_1_En_1_Fig31_HTML.jpg)\n\
    Figure 1-31. Moving the windows\n\nIf you close a window, you can always get it\
    \ back by looking in the View menu. If you decide to go back to the default configuration,\
    \ click `Window ➤ Reset Window Layout`.\n\nWhen you close out of Visual Studio,\
    \ the next time you open it, you can easily open that last project by looking\
    \ in `File ➤ Recent Files and Solutions`. You could also select `File ➤ Open ➤\
    \ Project/Solution` and browse to the project.\n\nYou may be wondering about the\
    \ difference between a project and a solution. A solution is just a container\
    \ that holds one or more projects. The projects can be of the same type, such\
    \ as all SSRS projects. In some cases, the projects may be related to a topic\
    \ area but may all be different technical types. For example, there could be a\
    \ database project, an SSRS project, a SQL Server Integration Services Project,\
    \ and a SQL Server Analysis Services project within the same solution. For example,\
    \ the solution could be used to develop a data mart.\n\nDepending on the value\
    \ of a setting, the solution name will show up only if it contains more than one\
    \ project. You can modify that setting if you choose by selecting `Tools ➤ Options`.\
    \ In the Options dialog, expand Projects and Solutions and select the General\
    \ page. If `Always show solution` is checked, the solution name will show up even\
    \ if it contains one project. Figure 1-32 shows the dialog if you wish to make\
    \ the settings change.\n\n![A395630_1_En_1_Fig32_HTML.jpg](A395630_1_En_1_Fig32_HTML.jpg)\n\
    Figure 1-32. The Always show solution option\n\n## Summary\n\nSQL Server Reporting\
    \ Services is a wonderful feature of SQL Server that allows you to create reports\
    \ that can be deployed for your organization’s use. SSRS 2016 boasts a brand-new\
    \ user interface called the web portal with the traditional paginated reports,\
    \ key performance indicators (KPIs), and mobile reports.\n\nTo get your development\
    \ environment set up, you will need to download and install several components.\
    \ Luckily, they are all free downloads from Microsoft. By following the instructions\
    \ in this chapter, you will be ready to learn how to develop and publish SSRS\
    \ reports.\n\nIn Chapter 2, you will learn how to create your first reports by\
    \ using a wizard."
