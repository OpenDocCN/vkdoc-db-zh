    reports is identical to the default which is called native mode. This book will
    focus on native mode, but it does have a section in Chapter [8](#A395630_1_En_8_Chapter.html)
    on deploying reports to SharePoint.


    Typically, in a production environment, a server is dedicated to running SSRS,
    and the source data is found on other servers throughout the network. Report developers
    will use SSDT on their local computers to develop the reports and then publish
    the reports to the production server or possibly to a server where the reports
    can be tested before going live.


    Before learning how to get everything set up on your computer, you will learn
    more about the components of SSRS. First there must be a SQL Server instance in
    place to host the SSRS databases. The instance is often installed on the server
    where the SSRS service is installed, but it can be a different server. There are
    two databases that will be created when you install or initially configure SSRS:
    ReportServer and ReportServerTempDB. ReportServer is used to store report definitions,
    security, history, and everything else that is needed for the published reports.
    You can probably tell by the name ReportServerTempDB that this database is used
    as a temporary workspace.


    When you install SSRS, it creates a web service that responds to report requests.
    In native mode, it provides a web portal where users can browse for and run reports.
    In previous versions of SSRS this was called Report Manager, but starting with
    2016 this interface has been completely redesigned. It is now just called the
    web portal and resembles Figure [1-2](#A395630_1_En_1_Chapter.html#Fig2).


    ![A395630_1_En_1_Fig2_HTML.jpg](A395630_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    The web portal


    The source of data can be from just about anywhere. This book will show examples
    from SQL Server databases, but you could report against Oracle, Analysis Services
    cubes, XML documents, SharePoint lists, cloud databases, and more.'
  trans: '

    # 第一部分

    开始使用


    ## 1. 开始使用


    电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1990-4_1](http://dx.doi.org/10.1007/978-1-4842-1990-4_1)）包含补充材料，可供授权用户使用。


    在我的第一份数据库管理员工作中，我被要求查看一些报表的问题。这些报表是在`MS Access`中创建的，并链接到一个`SQL Server`数据库。每位经理都有自己版本的报表，尽管这些报表最初是一样的，但多年来被各位经理修改过。经理们抱怨说数据不一致，问我能不能解决这个问题。


    我尽力去纠正这些差异，但报表的各个副本仍然存在。不久之后，我参加了 2003 年的 PASS 峰会，看到了关于`SQL Server Reporting Services
    (SSRS)`的发布公告。2004 年，微软发布了`SSRS`作为`SQL Server 2000`的加载项。我没有等待正式发布。我知道`SSRS`将解决我的`MS
    Access`报表问题，所以一有可用版本我就安装了`SSRS`。


    与`MS Access`报表相比，`SSRS`带来的优势是集中化的网站——`报表管理器`，报表发布于此。经理们不再各自拥有报表副本，而是从一个中心位置运行报表，从而消除了数据不一致的问题。


    `SQL Server Reporting Services`是微软商业智能堆栈的核心组件之一。`SSRS`是一个功能丰富的报表工具，现在包含了移动报表以及现代化的本地`Web
    门户`。


    `SSRS`具有许多交互功能、可视化元素（如图表和地图）、安全性等。报表可以包含以表格形式或可视化方式显示的数据。你还可以创建美观且信息丰富的仪表板。


    要运行报表，最终用户需浏览到`Web 门户`并点击报表名称。在后台，`SSRS`从源数据库请求数据并构建报表。然后，报表被传送给最终用户。图 1-1 展示了这一过程。


    ![A395630_1_En_1_Fig1_HTML.jpg](img/A395630_1_En_1_Fig1_HTML.jpg)


    图 1-1.

    报表步骤


    ## 理解 SSRS 架构


    一个`SSRS`实现由多个组件构成，可以通过多种不同方式进行配置。至少，所有组件可以放在一台计算机上，甚至是一台笔记本电脑上。这种配置可能仅适用于开发环境，也是我建议你跟随本书示例进行操作时采用的配置。该配置包括一个`SQL
    Server`实例（其中包含`Reporting Services`）、源数据库以及在`Visual Studio`中运行的`SQL Server Data
    Tools (SSDT)`。


    注意

    `SSRS`也可以在`SharePoint`集成模式下安装。开发报表的方式与默认的（称为原生模式）相同。本书将重点介绍原生模式，但在第 8 章中确实有一节介绍如何将报表部署到`SharePoint`。


    通常，在生产环境中，会有一台服务器专门用于运行`SSRS`，而源数据则来自网络中的其他服务器。报表开发人员会在他们的本地计算机上使用`SSDT`开发报表，然后将报表发布到生产服务器，或者可能发布到一个可以在上线前测试报表的服务器。


    在学习如何在计算机上设置所有内容之前，你将了解更多关于`SSRS`组件的知识。首先，必须有一个`SQL Server`实例来承载`SSRS`数据库。该实例通常安装在运行`SSRS`服务的服务器上，但也可以是不同的服务器。当你安装或初始配置`SSRS`时，将创建两个数据库：`ReportServer`和`ReportServerTempDB`。`ReportServer`用于存储报表定义、安全性、历史记录以及已发布报表所需的所有其他信息。从`ReportServerTempDB`这个名称你大概能猜出，这个数据库是用作临时工作区的。


    当你安装`SSRS`时，它会创建一个响应报表请求的 Web 服务。在原生模式下，它提供了一个`Web 门户`，用户可以在其中浏览和运行报表。在早期版本的`SSRS`中，这被称为`报表管理器`，但从
    2016 版本开始，这个界面被完全重新设计。现在它就被称为`Web 门户`，类似于图 1-2。


    ![A395630_1_En_1_Fig2_HTML.jpg](img/A395630_1_En_1_Fig2_HTML.jpg)


    图 1-2.

    `Web 门户`


    数据源几乎可以来自任何地方。本书将展示来自`SQL Server`数据库的示例，但你也可以针对`Oracle`、`Analysis Services`多维数据集、`XML`文档、`SharePoint`列表、云数据库等创建报表。

