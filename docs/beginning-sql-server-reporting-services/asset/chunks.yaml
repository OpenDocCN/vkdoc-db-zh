    \ the Expression dialog.  \n8.  Add this expression:\n\n```\n    =NOT Parameters!DisplayDetailRows.Value\n\
    \    ```\n\n9.  Click OK to accept the expression and OK again to close the Group\
    \ Properties dialog.  \n10.  Repeat the process for the TerritoryID group. This\
    \ time the expression is\n\n```\n    =NOT Parameters!DisplayTerritories.Value\n\
    \    ```\n\n11.  Preview the report. It should look like Figure [6-35](#A395630_1_En_6_Chapter.html#Fig35)\
    \ before you change the parameters.\n\n![A395630_1_En_6_Fig35_HTML.jpg](A395630_1_En_6_Fig35_HTML.jpg)\n\
    \nFigure 6-35.\n\nThe report with summary only\n\nNotice that the plus signs next\
    \ to the years are gone. If you change Display Territories to True and run the\
    \ report again, this time the Territories will all display. To view the details,\
    \ both parameters must be set to true.\n\n### Formatting\n\nAlmost any property\
    \ can be controlled by an expression. The expression may include a field from\
    \ the dataset. To demonstrate, you will bold the font of the territory rows where\
    \ the sales are over $2,000,000\\. Follow these steps:\n\n1.  Switch to design\
    \ view of the Sales by Territory 2 report.  \n2.  Select the territory row.  \n\
