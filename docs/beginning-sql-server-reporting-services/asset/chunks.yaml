- fmt: '# Part I

    Getting Started


    ## 1. Getting Started


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1990-4_1](http://dx.doi.org/10.1007/978-1-4842-1990-4_1))
    contains supplementary material, which is available to authorized users.


    At my first job as a database administrator, I was asked to look at a problem
    with some reports. The reports were created in `MS Access` and linked to a `SQL
    Server` database. Each manager had his or her own version of the reports and,
    even though the reports had started out the same at one time, they had been modified
    by the individual managers over the years. The managers were complaining that
    the numbers were not consistent, and could I fix the problem?


    I worked to correct the discrepancies as best I could, but the individual copies
    of reports still existed. Shortly after this, I attended the 2003 PASS Summit
    and saw the announcement about `SQL Server Reporting Services (SSRS)`. In 2004,
    Microsoft released `SSRS` as an add-in for `SQL Server 2000`. I didn’t wait for
    the release. I knew that `SSRS` was going to solve my `MS Access` report problem,
    and I installed `SSRS` as soon as it was available.


    The advantage that `SSRS` brought, compared to the `MS Access` reports, was the
    centralized web site, `Report Manager`, where the reports were published. Instead
    of each manager having his or her own copy of reports, the managers would run
    the reports from a central location eliminating the discrepancies.


    `SQL Server Reporting Services` is one of the core components of the Microsoft
    Business Intelligence stack. `SSRS` is a feature-rich reporting tool that now
    includes mobile reports as well as a modern on-premises web portal.


    `SSRS` has a number of interactive features, visual elements such as charts and
    maps, security, and more. Reports can contain data displayed in tabular format
    or visually. You can also create attractive and informative dashboards.


    To run reports, end users browse to the `web portal` and click the report name.
    In the background, `SSRS` requests the data from the source databases and builds
    the report. The report is then delivered to the end user. Figure [1-1](#A395630_1_En_1_Chapter.html#Fig1)
    shows how this works.


    ![A395630_1_En_1_Fig1_HTML.jpg](A395630_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.

    Reporting steps


    ## Understanding SSRS Architecture


    An `SSRS` implementation consists of multiple components that can be configured
    in many different ways. At a minimum, everything can go on one computer, even
    on a laptop. This configuration is probably useful only for development, and it
    is what I recommend for following along with the examples in this book. The configuration
    consists of a `SQL Server` instance that includes `Reporting Services` as well
    as the source databases and `SQL Server Data Tools (SSDT)` running in `Visual
    Studio`.


    Note

    `SSRS` can also be installed in `SharePoint` integrated mode. The way you develop
    reports is identical to the default which is called native mode. This book will
    focus on native mode, but it does have a section in Chapter [8](#A395630_1_En_8_Chapter.html)
    on deploying reports to `SharePoint`.


    Typically, in a production environment, a server is dedicated to running `SSRS`,
    and the source data is found on other servers throughout the network. Report developers
    will use `SSDT` on their local computers to develop the reports and then publish
    the reports to the production server or possibly to a server where the reports
    can be tested before going live.


    Before learning how to get everything set up on your computer, you will learn
    more about the components of `SSRS`. First there must be a `SQL Server` instance
    in place to host the `SSRS` databases. The instance is often installed on the
    server where the `SSRS` service is installed, but it can be a different server.
    There are two databases that will be created when you install or initially configure
    `SSRS`: `ReportServer` and `ReportServerTempDB`. `ReportServer` is used to store
    report definitions, security, history, and everything else that is needed for
    the published reports. You can probably tell by the name `ReportServerTempDB`
    that this database is used as a temporary workspace.


    When you install `SSRS`, it creates a web service that responds to report requests.
    In native mode, it provides a `web portal` where users can browse for and run
    reports. In previous versions of `SSRS` this was called `Report Manager`, but
    starting with 2016 this interface has been completely redesigned. It is now just
    called the `web portal` and resembles Figure [1-2](#A395630_1_En_1_Chapter.html#Fig2).


    ![A395630_1_En_1_Fig2_HTML.jpg](A395630_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.

    The `web portal`


    The source of data can be from just about anywhere. This book will show examples
    from `SQL Server` databases, but you could report against `Oracle`, `Analysis
    Services` cubes, `XML` documents, `SharePoint` lists, cloud databases, and more.'
