  trans: "# 第二部分\n## 报告开发\n\n## 创建矩阵报告\n\n在上一个练习中，您通过运行向导创建了解决方案、项目以及报告。您也可以使用向导向现有项目添加新报告。在本节中，您将向项目添加一个矩阵报告。\n\
    \n矩阵报告通常比表格报告更为紧凑。在矩阵报告中，数据的某一列或多列将被透视转换为列标题。在本示例中，数据将按年份进行透视。为说明其工作原理，请查看以下查询的结果，该查询返回北美地区按年份统计的总销售额。\n\
    \n```sql\nSELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\n\
    SUM(TotalDue) AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group] = 'North America'\n\
    GROUP BY T.[Group], T.Name , YEAR(OrderDate)\nORDER BY Region, OrderYear;\n```\n\
    \n您可以在图 2-27 中查看该查询的部分结果。\n\n![A395630_1_En_2_Fig27_HTML.jpg](img/A395630_1_En_2_Fig27_HTML.jpg)\n\
    \n图 2-27. 按年份统计的总销售额（部分结果）\n\n为了按年份进行比较——换句话说，为了轻松比较 2011 年加拿大地区与中部地区的销售额——您可以对数据进行透视。下面是一个将\
    \ `OrderYear` 的值透视为列的查询。\n\n```sql\nSELECT [Group], Region,\n[2011], [2012], [2013],\
    \ [2014]\nFROM\n(SELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\n\
    SUM(TotalDue) AS TotalSales\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesTerritory\
    \ AS T ON SOH.TerritoryID = T.TerritoryID\nWHERE T.[Group] = 'North America'\n\
    GROUP BY T.[Group], T.Name , YEAR(OrderDate)\n) AS SourceTable\nPIVOT\n(SUM(TotalSales)\n\
    FOR OrderYear IN ([2011], [2012], [2013], [2014])\n)\nAS PivotTable\nORDER BY\
    \ Region;\n```\n\n图 2-28 显示了结果。\n\n![A395630_1_En_2_Fig28_HTML.jpg](img/A395630_1_En_2_Fig28_HTML.jpg)\n\
    \n图 2-28. 透视后的结果\n\nT-SQL 的透视查询语法很复杂，而且您必须在查询中硬编码列名。幸运的是，在 SSRS 中创建透视结果非常简单，并且无需硬编码。\n\
    \n请按照以下步骤创建矩阵报告：\n\n1.  要在项目中启动向导，请在 `解决方案资源管理器` 窗口中右键单击 `报告` 文件夹，然后选择 `添加新报告`，如图\
    \ 2-29 所示。\n\n![A395630_1_En_2_Fig29_HTML.jpg](img/A395630_1_En_2_Fig29_HTML.jpg)\n\
    \n图 2-29. 如何启动向导\n\n2.  向导启动后，单击 `下一步` 跳过欢迎页面。\n3.  在 `选择数据源` 页面上，单击 `编辑` 以调出\
    \ `连接属性`。像本章前面“创建您的第一份报告”一节中那样填写连接信息。\n4.  配置好数据源后，单击 `下一步`。在 `设计查询` 页面中，使用与前面示例相同的查询：\n\
    \n```sql\n    SELECT T.[Group], T.Name As Region, YEAR(OrderDate) AS OrderYear,\n\
    \    Month(OrderDate) AS OrderMonth,\n    OrderDate, SalesOrderID, TotalDue\n\
    \    FROM Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON\
    \ SOH.TerritoryID = T.TerritoryID;\n```\n\n5.  单击 `下一步` 转到 `选择报告类型` 页面。选择 `矩阵`\
    \ 并单击 `下一步`。\n6.  按照图 2-30 所示配置 `设计矩阵` 页面。当您在右侧选择一个字段时，报告中该字段将显示的区域会高亮显示。这可以帮助您弄清楚哪些字段放在哪里。\n\
    \n![A395630_1_En_2_Fig30_HTML.jpg](img/A395630_1_En_2_Fig30_HTML.jpg)\n\n图 2-30.\
    \ 矩阵字段配置\n\n7.  单击 `下一步` 并填写报告名称。将其命名为 `矩阵报告`。\n8.  单击 `完成` 以结束向导。\n\n现在您将在 `解决方案资源管理器`\
    \ 的 `报告` 文件夹中看到两份报告。要打开报告，请双击其名称。您也可以在设计区域中切换已打开的报告。要查看矩阵报告的效果，请单击 `预览`。报告应如图\
    \ 2-31 所示。\n\n![A395630_1_En_2_Fig31_HTML.jpg](img/A395630_1_En_2_Fig31_HTML.jpg)\n\
    \n图 2-31. 查看矩阵报告\n\n表格报告与矩阵报告的一个显著区别在于，矩阵报告具有跨列的分组级别。您将在第 5 章中学习更多关于矩阵报告的知识。同时，回到报告的设计视图查看属性。图\
    \ 2-32 展示了矩阵报告的设计实际上是多么简单。\n\n![A395630_1_En_2_Fig32_HTML.jpg](img/A395630_1_En_2_Fig32_HTML.jpg)\n\
    \n图 2-32. 矩阵报告设计\n\n运用您在本章前面学到的技能，格式化摘要文本框。为了使这份报告更完整，您将添加三个总计字段。请按照以下说明添加总计。\n\
    \n1.  右键单击包含表达式 `[Sum(TotalDue)]` 的文本框。\n2.  选择 `添加总计` ➤ `行`。\n3.  现在重复此过程，但这次选择\
    \ `添加总计` ➤ `列`。\n4.  右键单击 `区域` 和 `总计` 交叉点处的单元格。选择 `添加总计`。\n5.  选择 `总计` 列，然后在设计菜单中单击\
    \ **B** 以将字体加粗。\n6.  选择最后一行，然后单击 **B** 以将字体加粗。\n7.  将第一行右对齐。\n\n报告设计现在将如图 2-33\
    \ 所示。\n\n![A395630_1_En_2_Fig33_HTML.jpg](img/A395630_1_En_2_Fig33_HTML.jpg)\n\
    \n图 2-33. 添加总计后的报告设计\n\n预览报告。您现在拥有所有区域的总计以及跨年份的总计。图 2-34 显示了该报告。\n\n![A395630_1_En_2_Fig34_HTML.jpg](img/A395630_1_En_2_Fig34_HTML.jpg)\n\
    \n图 2-34. 带有总计的矩阵报告\n\n## 小结\n\n大多数报告，特别是那些利用了 SSRS 一些高级功能的报告，无法使用向导创建。然而，对于简单报告来说，向导是完美的工具。它也是帮助您开始学习开发\
    \ SSRS 报告的绝佳辅助工具。在本章中，您创建了两份报告。然后您修改了属性，使它们看起来专业且已准备好部署。\n\n在第 3 章中，您将学习如何配置数据源和数据集，这是报告最基本的元素。\n\
    \n## 3. 理解数据源和数据集\n\n我第一次部署 SSRS 报告组是在 2004 年，当时 SQL Server Reporting Services\
    \ (`SSRS`) 刚刚发布。这些报告非常成功，消息传到了我工作公司的其他部门。很快，我就收到了多到无法处理的报告请求。我的首要职位是数据库管理员，创建报告只是我工作的一小部分。不久之后，我组织了一个为期一天的\
    \ `SSRS` 研讨会，教授来自每个部门的一小部分人员如何开发他们自己的报告。\n\n自那以后，我通过课程、文章和我的第一本 `SSRS` 书籍，向数十人教授了\
    \ `SSRS` 开发。本章涵盖的数据源和数据集知识是构建报告的基础。在教授 `SSRS` 的过程中，我认识到这些主题同样具有挑战性。在继续学习之前，请确保您完全理解了本章涵盖的材料，并且在需要帮助时务必回头查阅。\n\
    \n本章涵盖数据源和数据集。您将学习它们是什么、如何创建它们，以及何时在报告之间共享它们是合理的。在第 2 章中，您通过运行向导创建了项目和两份报告。在本章中，您将手动构建报告。"
- fmt: "# Creating Shared Data Sources\n\nIf you have worked with databases before,\
    \ you are probably familiar with the concept of a connection string. A connection\
    \ string is like an address telling you everything you need to communicate with\
    \ a database, such as the type of database, the location, and the account used\
    \ to connect. Here is a possible connection string:\n```\nProvider=SQLNCLI11;Server=localhost\\\
    INST1;Database=AdventureWorks2016;\nTrusted_Connection=yes;\n```\nThis connection\
    \ says that the type of connection is for SQL Server using the latest version\
    \ of the Native Client. The server is located on the local computer and it is\
    \ a named instance, `INST1`. The database to connect to is `AdventureWorks2016`.\
    \ Instead of providing a user name and password, Windows credentials will be used.\n\
    \nThe connection string may look intimidating, but you don’t have to figure it\
    \ out yourself. Most applications, `SSRS` included, have an intuitive tool for\
    \ building connection strings.\n\nIn Chapter [2](#A395630_1_En_2_Chapter.html),\
    \ you created a solution with one project. Inside the project, you created two\
    \ reports. To keep things simple and to focus on creating a report with the wizard,\
    \ I had you embed each data source within a report. This means that the data source\
    \ became part of the report definition. If you look in the XML source code of\
    \ those reports, you will find the connection string.\n\nMost of the time, data\
    \ sources should be shared among reports instead. Imagine that you have 100 or\
    \ more reports with the identical embedded connection string in each one. Then\
    \ you get word that the database is moving to a new server over the weekend. You\
    \ are looking at hours of work editing and testing each report. If the data source\
    \ was shared instead of embedded, you would need to make just one simple change,\
    \ and all of your reports would be pointing to the new database location.\n\n\
    As a best practice, data sources should be shared, and `SSRS` makes it easy to\
    \ do so. To learn how to create a shared data source for your project, take the\
    \ following steps:\n1.  Launch `SQL Server Data Tools 2015 (SSDT)`.\n2.  Create\
    \ a new project by clicking `File ➤ New Project`.\n3.  Once the New Project dialog\
    \ opens, find the Reporting Services templates under `Installed ➤ Templates ➤\
    \ Business Intelligence`.\n4.  Select `Report Server Project` as shown in Figure\
    \ [3-1](#A395630_1_En_3_Chapter.html#Fig1).\n\n    ![A395630_1_En_3_Fig1_HTML.jpg](A395630_1_En_3_Fig1_HTML.jpg)\n\
    \    *Figure 3-1. The Report Server Project*\n\n5.  Fill in `Data Sources and\
    \ Datasets` for the project name.\n6.  Fill in `Beginning SSRS Chapter 3` for\
    \ the solution name as shown in Figure [3-2](#A395630_1_En_3_Chapter.html#Fig2).\n\
    \n    ![A395630_1_En_3_Fig2_HTML.jpg](A395630_1_En_3_Fig2_HTML.jpg)\n    *Figure\
    \ 3-2. The project and solutions names*\n\n7.  Make sure that the solution will\
    \ be saved where you can find it. It will be created in the location of the previous\
    \ solution by default. Click `OK` to create the project.\n8.  Make sure that you\
    \ can see the Solution Explorer window. If it is not visible, enable it from the\
    \ View menu. You can also use the keyboard shortcut `CTRL + ALT + L`. Figure [3-3](#A395630_1_En_3_Chapter.html#Fig3)\
    \ shows how the Solution Explorer should look.\n\n    ![A395630_1_En_3_Fig3_HTML.jpg](A395630_1_En_3_Fig3_HTML.jpg)\n\
    \    *Figure 3-3. The Solution Explorer*\n\nThe project can contain three types\
    \ of objects: `Shared Data Sources`, `Shared Datasets`, and `Reports`. The only\
    \ real requirement is to have a report; the data sources and datasets may be embedded\
    \ in the reports. In that case, you will not see them in these folders. To add\
    \ a Shared Data Source, follow these steps:\n1.  Right-click `Shared Data Sources`\
    \ and select `Add New Data Source` as shown in Figure [3-4](#A395630_1_En_3_Chapter.html#Fig4).\n\
    \n    ![A395630_1_En_3_Fig4_HTML.jpg](A395630_1_En_3_Fig4_HTML.jpg)\n    *Figure\
    \ 3-4. Add a new data source*\n\n2.  This brings up the Shared Data Source Properties\
    \ dialog as shown in Figure [3-5](#A395630_1_En_3_Chapter.html#Fig5). Fill in\
    \ `Name:` for the data source, `AdventureWorks2016`. Naming each data source is\
    \ very important so that the data source can be identified later.\n\n    ![A395630_1_En_3_Fig5_HTML.jpg](A395630_1_En_3_Fig5_HTML.jpg)\n\
    \    *Figure 3-5. The Shared Data Source Properties*\n\n3.  The `Type` of data\
    \ source should be `Microsoft SQL Server`.\n4.  Click the `Edit` button to bring\
    \ up the Connection Properties dialog.\n5.  Fill in the server name and logon\
    \ properties for your `SQL Server` instance. If you have trouble figuring out\
    \ your server instance name, see the section “Determining the SQL Server Name,”\
    \ in Chapter [1](#A395630_1_En_1_Chapter.html) or ask your database administrator\
    \ for assistance.\n6.  Under `Select or enter a database name`, select the `AdventureWorks2016`\
    \ database. The properties should resemble Figure [3-6](#A395630_1_En_3_Chapter.html#Fig6).\n\
    \n    ![A395630_1_En_3_Fig6_HTML.jpg](A395630_1_En_3_Fig6_HTML.jpg)\n    *Figure\
    \ 3-6. The connection properties*\n\n    **Note** Going forward, the examples\
    \ in the book will assume that you know how to connect to your database.\n\n7.\
    \  Click `Test Connection` to make sure that the connection information is correct.\
    \ Click `OK` to dismiss the test box and `OK` again to accept the connection properties.\
    \ The `Connection string` property should now be filled in.\n\nClick `Ok` to accept\
    \ the data source’s properties. The data source will now be visible in the Solution\
    \ Explorer as shown in Figure [3-7](#A395630_1_En_3_Chapter.html#Fig7).\n\n![A395630_1_En_3_Fig7_HTML.jpg](A395630_1_En_3_Fig7_HTML.jpg)\n\
    *Figure 3-7. The new data source*\n\nNotice that the data source is actually an\
    \ `XML` file. You don’t have the option to view the file’s contents in `Visual\
    \ Studio`, but you can navigate to the `.rds` file and open it up in a text editor\
    \ if you wish. Figure [3-8](#A395630_1_En_3_Chapter.html#Fig8) shows the contents\
    \ of my data source file.\n\n![A395630_1_En_3_Fig8_HTML.jpg](A395630_1_En_3_Fig8_HTML.jpg)\n\
    *Figure 3-8. The data source file*\n\nIf you need to edit the data source properties,\
    \ click the data source or right-click it and select `Open`. It may be a bit counterintuitive,\
    \ but if you right-click and select `Properties`, you will see only the `File\
    \ Name` and `File Path` in the Properties window as shown in Figure [3-9](#A395630_1_En_3_Chapter.html#Fig9).\n\
    \n![A395630_1_En_3_Fig9_HTML.jpg](A395630_1_En_3_Fig9_HTML.jpg)\n*Figure 3-9.\
    \ The properties of the data source*\n\nSet up any connections that will be needed\
    \ by the reports in your project. As a best practice, name the shared data sources\
    \ so that they can be identified later. You should avoid naming the data sources\
    \ with the server name. Often you will be doing development against a local, development,\
    \ or testing server. The published reports will usually point to a production\
    \ server with a different name.\n\n**Note**\nIf you would like to use the projects\
    \ found in the code download, you may need to modify the data source properties\
    \ in order to connect to your own `SQL Server` instance."
  raw: '## Creating Shared Data Sources


    If you have worked with databases before, you are probably familiar with the concept
    of a connection string. A connection string is like an address telling you everything
    you need to communicate with a database, such as the type of database, the location,
    and the account used to connect. Here is a possible connection string:


    ```

    Provider=SQLNCLI11;Server=localhost\INST1;Database=AdventureWorks2016;

    Trusted_Connection=yes;

    ```


    This connection says that the type of connection is for SQL Server using the latest
    version of the Native Client. The server is located on the local computer and
    it is a named instance, INST1\. The database to connect to is AdventureWorks2016\.
    Instead of providing a user name and password, Windows credentials will be used.


    The connection string may look intimidating, but you don’t have to figure it out
    yourself. Most applications, SSRS included, have an intuitive tool for building
    connection strings.


    In Chapter [2](#A395630_1_En_2_Chapter.html), you created a solution with one
    project. Inside the project, you created two reports. To keep things simple and
    to focus on creating a report with the wizard, I had you embed each data source
    within a report. This means that the data source became part of the report definition.
    If you look in the XML source code of those reports, you will find the connection
    string.


    Most of the time, data sources should be shared among reports instead. Imagine
    that you have 100 or more reports with the identical embedded connection string
    in each one. Then you get word that the database is moving to a new server over
    the weekend. You are looking at hours of work editing and testing each report.
    If the data source was shared instead of embedded, you would need to make just
    one simple change, and all of your reports would be pointing to the new database
    location.


    As a best practice, data sources should be shared, and SSRS makes it easy to do
    so. To learn how to create a shared data source for your project, take the following
    steps:


    1.  Launch SQL Server Data Tools 2015 (SSDT).  

    2.  Create a new project by clicking File ➤ New Project.  

    3.  Once the New Project dialog opens, find the Reporting Services templates under
    Installed ➤ Templates ➤ Business Intelligence.  

    4.  Select Report Server Project as shown in Figure [3-1](#A395630_1_En_3_Chapter.html#Fig1).


    ![A395630_1_En_3_Fig1_HTML.jpg](A395630_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The Report Server Project  

    5.  Fill in Data Sources and Datasets for the project name.  

    6.  Fill in Beginning SSRS Chapter [3](#A395630_1_En_3_Chapter.html) for the solution
    name as shown in Figure [3-2](#A395630_1_En_3_Chapter.html#Fig2).


    ![A395630_1_En_3_Fig2_HTML.jpg](A395630_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    The project and solutions names  

    7.  Make sure that the solution will be saved where you can find it. It will be
    created in the location of the previous solution by default. Click OK to create
    the project.  

    8.  Make sure that you can see the Solution Explorer window. If it is not visible,
    enable it from the View menu. You can also use the keyboard shortcut `CTRL + ALT
    + L`. Figure [3-3](#A395630_1_En_3_Chapter.html#Fig3) shows how the Solution Explorer
    should look.


    ![A395630_1_En_3_Fig3_HTML.jpg](A395630_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    The Solution Explorer


    The project can contain three types of objects: Shared Data Sources, Shared Datasets,
    and Reports. The only real requirement is to have a report; the data sources and
    datasets may be embedded in the reports. In that case, you will not see them in
    these folders. To add a Shared Data Source , follow these steps:


    1.  Right-click Shared Data Sources and select Add New Data Source as shown in
    Figure [3-4](#A395630_1_En_3_Chapter.html#Fig4).


    ![A395630_1_En_3_Fig4_HTML.jpg](A395630_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Add a new data source  

    2.  This brings up the Shared Data Source Properties dialog as shown in Figure
    [3-5](#A395630_1_En_3_Chapter.html#Fig5). Fill in Name: for the data source, AdventureWorks2016\.
    Naming each data source is very important so that the data source can be identified
    later.


    ![A395630_1_En_3_Fig5_HTML.jpg](A395630_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    The Shared Data Source Properties  

    3.  The Type of data source should be Microsoft SQL Server.  

    4.  Click the Edit button to bring up the Connection Properties dialog.  

    5.  Fill in the server name and logon properties for your SQL Server instance.
    If you have trouble figuring out your server instance name, see the section “Determining
    the SQL Server Name,” in Chapter [1](#A395630_1_En_1_Chapter.html) or ask your
    database administrator for assistance.  

    6.  Under Select or enter a database name, select the AdventureWorks2016 database.
    The properties should resemble Figure [3-6](#A395630_1_En_3_Chapter.html#Fig6).


    ![A395630_1_En_3_Fig6_HTML.jpg](A395630_1_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    The connection properties Note Going forward, the examples in the book will assume
    that you know how to connect to your database.  

    7.  Click Test Connection to make sure that the connection information is correct.
    Click OK to dismiss the test box and OK again to accept the connection properties.
    The Connection string property should now be filled in.


    Click Ok to accept the data source’s properties. The data source will now be visible
    in the Solution Explorer as shown in Figure [3-7](#A395630_1_En_3_Chapter.html#Fig7).


    ![A395630_1_En_3_Fig7_HTML.jpg](A395630_1_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    The new data source


    Notice that the data source is actually an XML file. You don’t have the option
    to view the file’s contents in Visual Studio, but you can navigate to the rds
    file and open it up in a text editor if you wish. Figure [3-8](#A395630_1_En_3_Chapter.html#Fig8)
    shows the contents of my data source file.


    ![A395630_1_En_3_Fig8_HTML.jpg](A395630_1_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    The data source file


    If you need to edit the data source properties, click the data source or right-click
    it and select Open. It may be a bit counterintuitive, but if you right-click and
    select Properties, you will see only the File Name and File Path in the Properties
    window as shown in Figure [3-9](#A395630_1_En_3_Chapter.html#Fig9).


    ![A395630_1_En_3_Fig9_HTML.jpg](A395630_1_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    The properties of the data source


    Set up any connections that will be needed by the reports in your project. As
    a best practice, name the shared data sources so that they can be identified later.
    You should avoid naming the data sources with the server name. Often you will
    be doing development against a local, development, or testing server. The published
    reports will usually point to a production server with a different name.


    Note


    If you would like to use the projects found in the code download, you may need
    to modify the data source properties in order to connect to your own SQL Server
    instance.'
  trans: "\n# 创建共享数据源\n\n如果您以前使用过数据库，可能熟悉**连接字符串**的概念。连接字符串就像是一个地址，告诉您与数据库通信所需的所有信息，例如数据库类型、位置以及用于连接的账户。以下是一个可能的连接字符串：\n\
    ```\nProvider=SQLNCLI11;Server=localhost\\INST1;Database=AdventureWorks2016;\n\
    Trusted_Connection=yes;\n```\n此连接字符串表明连接类型是使用最新版本 Native Client 的 SQL Server。服务器位于本地计算机上，且是一个名为\
    \ `INST1` 的命名实例。要连接的数据库是 `AdventureWorks2016`。它没有提供用户名和密码，而是使用 Windows 凭据。\n\n\
    连接字符串看起来可能有些吓人，但您不必自己琢磨。大多数应用程序（`SSRS` 也包括在内）都有一个直观的工具来构建连接字符串。\n\n在第 2 章中，您创建了一个包含一个项目的解决方案。在项目内部，您创建了两个报表。为了保持简单并专注于使用向导创建报表，我让您将每个数据源嵌入到报表中。这意味着数据源成为了报表定义的一部分。如果您查看这些报表的\
    \ XML 源代码，就会找到连接字符串。\n\n在大多数情况下，数据源应该在报表之间共享。想象一下，您有 100 个或更多报表，每个报表中都嵌入了相同的连接字符串。然后您得知数据库将在周末迁移到新服务器。您将面临数小时的编辑和测试每个报表的工作。如果数据源是共享的而不是嵌入的，您只需要做一个简单的更改，您所有的报表就会指向新的数据库位置。\n\
    \n作为最佳实践，数据源应该是共享的，而 `SSRS` 使得这一点很容易做到。要了解如何为您的项目创建共享数据源，请执行以下步骤：\n1.  启动 `SQL\
    \ Server Data Tools 2015 (SSDT)`。\n2.  点击 `文件 ➤ 新建项目` 来创建一个新项目。\n3.  新建项目对话框打开后，在\
    \ `已安装 ➤ 模板 ➤ 商业智能` 下找到 Reporting Services 模板。\n4.  选择 `报表服务器项目`，如图 3-1 所示。\n\n\
    \    ![A395630_1_En_3_Fig1_HTML.jpg](img/A395630_1_En_3_Fig1_HTML.jpg)\n    *图\
    \ 3-1. 报表服务器项目*\n\n5.  在“项目名称”中填入 `Data Sources and Datasets`。\n6.  在“解决方案名称”中填入\
    \ `Beginning SSRS Chapter 3`，如图 3-2 所示。\n\n    ![A395630_1_En_3_Fig2_HTML.jpg](img/A395630_1_En_3_Fig2_HTML.jpg)\n\
    \    *图 3-2. 项目和解决方案名称*\n\n7.  确保解决方案将保存在您可以找到的位置。默认情况下，它将在上一个解决方案的位置创建。点击 `确定`\
    \ 创建项目。\n8.  确保您能看到“解决方案资源管理器”窗口。如果不可见，请从“视图”菜单启用它。您也可以使用键盘快捷键 `CTRL + ALT + L`。图\
    \ 3-3 显示了“解决方案资源管理器”应有的样子。\n\n    ![A395630_1_En_3_Fig3_HTML.jpg](img/A395630_1_En_3_Fig3_HTML.jpg)\n\
    \    *图 3-3. 解决方案资源管理器*\n\n项目可以包含三种类型的对象：`共享数据源`、`共享数据集` 和 `报表`。唯一真正的要求是有一个报表；数据源和数据集可以嵌入在报表中。在这种情况下，您将不会在这些文件夹中看到它们。要添加共享数据源，请按照以下步骤操作：\n\
    1.  右键单击 `共享数据源` 并选择 `添加新数据源`，如图 3-4 所示。\n\n    ![A395630_1_En_3_Fig4_HTML.jpg](img/A395630_1_En_3_Fig4_HTML.jpg)\n\
    \    *图 3-4. 添加新数据源*\n\n2.  这将打开“共享数据源属性”对话框，如图 3-5 所示。在“名称:”处填入数据源名称 `AdventureWorks2016`。为每个数据源命名非常重要，以便以后可以识别。\n\
    \n    ![A395630_1_En_3_Fig5_HTML.jpg](img/A395630_1_En_3_Fig5_HTML.jpg)\n    *图\
    \ 3-5. 共享数据源属性*\n\n3.  数据源的 `类型` 应为 `Microsoft SQL Server`。\n4.  点击 `编辑` 按钮以打开“连接属性”对话框。\n\
    5.  填入您的 `SQL Server` 实例的服务器名称和登录属性。如果您难以确定服务器实例名称，请参阅第 1 章中的“确定 SQL Server 名称”部分，或向您的数据库管理员寻求帮助。\n\
    6.  在 `选择或输入数据库名称` 下，选择 `AdventureWorks2016` 数据库。属性应类似于图 3-6 所示。\n\n    ![A395630_1_En_3_Fig6_HTML.jpg](img/A395630_1_En_3_Fig6_HTML.jpg)\n\
    \    *图 3-6. 连接属性*\n\n    **注意** 从现在开始，本书中的示例将假定您知道如何连接到自己的数据库。\n\n7.  点击 `测试连接`\
    \ 以确保连接信息正确。点击 `确定` 关闭测试框，再次点击 `确定` 接受连接属性。`连接字符串` 属性现在应该已被填入。\n\n点击 `确定` 接受数据源的属性。数据源现在将在解决方案资源管理器中可见，如图\
    \ 3-7 所示。\n\n![A395630_1_En_3_Fig7_HTML.jpg](img/A395630_1_En_3_Fig7_HTML.jpg)\n\
    *图 3-7. 新数据源*\n\n请注意，数据源实际上是一个 `XML` 文件。您无法在 `Visual Studio` 中查看文件内容，但如果您愿意，可以导航到\
    \ `.rds` 文件并在文本编辑器中打开它。图 3-8 显示了我的数据源文件内容。\n\n![A395630_1_En_3_Fig8_HTML.jpg](img/A395630_1_En_3_Fig8_HTML.jpg)\n\
    *图 3-8. 数据源文件*\n\n如果您需要编辑数据源属性，请单击数据源或右键单击它并选择 `打开`。这可能有点反直觉，但如果您右键单击并选择 `属性`，您只会在属性窗口中看到\
    \ `文件名` 和 `文件路径`，如图 3-9 所示。\n\n![A395630_1_En_3_Fig9_HTML.jpg](img/A395630_1_En_3_Fig9_HTML.jpg)\n\
    *图 3-9. 数据源的属性*\n\n设置项目中报表所需的任何连接。作为最佳实践，请为共享数据源命名，以便以后可以识别。您应避免使用服务器名称命名数据源。通常，您会在本地、开发或测试服务器上进行开发。已发布的报表通常会指向名称不同的生产服务器。\n\
    \n**注意**\n如果您想使用代码下载中的项目，可能需要修改数据源属性才能连接到您自己的 `SQL Server` 实例。\n"
- fmt: "## Creating Shared Datasets\n\nA dataset is a query, the question you are\
    \ asking the database. Unlike data sources, datasets are usually unique to the\
    \ reports and most should not be shared. There are a couple of exceptions, however.\
    \ For example, you may need to reuse a parameter list in multiple reports. There\
    \ are also some new features, such as mobile reports, that required shared datasets.\
    \ In this example, you will create a parameter list as a shared dataset.\n\nTo\
    \ create a shared dataset follow these steps:\n\n1.  Right-click the `Shared Datasets`\
    \ folder and select **Add New Dataset**.\n2.  This brings up the `Shared Dataset\
    \ Properties` dialog. Type `Year` in the `Name` property.\n3.  Make sure that\
    \ the data source you created in the last section, `AdventureWorks2016`, is selected\
    \ in the `Data source` property.\n4.  Make sure that `Text` is chosen as the `Query\
    \ type` property.\n5.  Type the following code in the `Query` text box:\n    ```sql\n\
    \    SELECT DISTINCT YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\n\
    \    ORDER BY OrderYear;\n    ```\n6.  The properties should look like Figure\
    \ [3-10](#A395630_1_En_3_Chapter.html#Fig10). Click **OK** to create the new shared\
    \ dataset.\n    ![A395630_1_En_3_Fig10_HTML.jpg](A395630_1_En_3_Fig10_HTML.jpg)\n\
    \    Figure 3-10. The `Shared Dataset Properties`\n\nYou should now see the `Year`\
    \ dataset in the `Shared Datasets` folder as shown in Figure [3-11](#A395630_1_En_3_Chapter.html#Fig11).\
    \ Just like the data sources, viewing the properties shows the file location.\
    \ To edit the properties, click the name or right-click and select **Open**.\n\
    \n![A395630_1_En_3_Fig11_HTML.jpg](A395630_1_En_3_Fig11_HTML.jpg)\nFigure 3-11.\
    \ The new shared dataset\n\nYou can create additional datasets as required. Remember\
    \ that it doesn’t make sense to share a dataset unless it will be used in multiple\
    \ reports. The typical use case is for a parameter list.\n\n### Note\n\nAt the\
    \ release of SQL Server 2016, there was a bug involving Shared Datasets. To fix\
    \ the problem, navigate to the project files and open the `Year.rsd` file. Change\
    \ this code `<Dataset>` to `<Dataset Name=\"Year\">` and then save the file. Microsoft\
    \ has promised to fix this issue soon, so it may not be a problem by the time\
    \ you are reading this book.\n\n## Using Data Sources and Datasets\n\nThe reason\
    \ for creating data sources and datasets is to use them in reports. Now you will\
    \ do just that. Follow these steps to create the report:\n\n1.  Right-click the\
    \ `Reports` folder and select **Add** ➤ **New Item** as shown in Figure [3-12](#A395630_1_En_3_Chapter.html#Fig12).\
    \ Make sure that you do not choose **Add New Report** which kicks off the wizard.\n\
    \    ![A395630_1_En_3_Fig12_HTML.jpg](A395630_1_En_3_Fig12_HTML.jpg)\n    Figure\
    \ 3-12. Add a new report\n2.  In the **Add New Item – Data Sources and Datasets**\
    \ dialog, select `Report`.\n3.  Fill in the report name property with `Sales by\
    \ Year`. The dialog should look like Figure [3-13](#A395630_1_En_3_Chapter.html#Fig13).\n\
    \    ![A395630_1_En_3_Fig13_HTML.jpg](A395630_1_En_3_Fig13_HTML.jpg)\n    Figure\
    \ 3-13. The new report properties\n4.  Click **Add** to create the new report.\n\
    \nThe report should now be visible in the Solution Explorer and open in design\
    \ view. If not, double-click the report name to open it. The next task is to set\
    \ up the data source within the report so that it points to the shared data source.\n\
    \nFind the `Report Data` window which will probably be located on the left. If\
    \ it is not visible, click the design canvas of the report, and then click **Report\
    \ Data** found at the bottom of the **View** menu. The `Report Data` window has\
    \ several folders as shown in Figure [3-14](#A395630_1_En_3_Chapter.html#Fig14).\n\
    \n![A395630_1_En_3_Fig14_HTML.jpg](A395630_1_En_3_Fig14_HTML.jpg)\nFigure 3-14.\
    \ The `Report Data` window\n\nFollow these steps to set up the report’s data source:\n\
    \n1.  Right-click the `Data Sources` folder and select **Add Data Source**.\n\
    2.  This brings up the `Data Source Properties` dialog box. Fill in the `Name`\
    \ property with `AdventureWorks`. As a best practice, always give each data source\
    \ a descriptive name. This data source will be linked to the `AdventureWorks2016`\
    \ shared data source. You can, if you wish, give it the exact same name. In this\
    \ case, you will change the name slightly so it is easy to see the difference\
    \ between the shared data source and the data source in the report.\n3.  The middle\
    \ of the dialog lets you create this report data source as an embedded data source\
    \ with connection properties visible to only this report. Instead, select **Use\
    \ data source reference**. Find `AdventureWorks2016` in the list. The dialog should\
    \ look like Figure [3-15](#A395630_1_En_3_Chapter.html#Fig15).\n    ![A395630_1_En_3_Fig15_HTML.jpg](A395630_1_En_3_Fig15_HTML.jpg)\n\
    \    Figure 3-15. The report data source properties\n4.  Click **OK** to create\
    \ the data source.\n\nThe **Edit** button on the dialog shown in Figure [3-15](#A395630_1_En_3_Chapter.html#Fig15)\
    \ allows you to modify the shared data source if you need to. Remember that changes\
    \ made this way will affect all reports using this data source. You can also create\
    \ a new shared data source. As a best practice, and to avoid confusion, always\
    \ create and edit shared data sources at the project level.\n\nYou should now\
    \ see the `AdventureWorks` data source in the `Data Sources` folder in the `Report\
    \ Data` window as shown in Figure [3-16](#A395630_1_En_3_Chapter.html#Fig16).\
    \ The tiny arrow on the icon signifies that it is pointing to a shared data source.\n\
    \n![A395630_1_En_3_Fig16_HTML.jpg](A395630_1_En_3_Fig16_HTML.jpg)\nFigure 3-16.\
    \ The new data source\n\nThe next step in creating a report is to add a dataset.\
    \ Datasets are queries, the question to the database or other source of data.\
    \ A dataset will usually be specific to a report, so it doesn’t make sense to\
    \ share most of them. To create the first dataset for this report, follow these\
    \ steps:\n\n1.  Right-click the `Datasets` folder and select **Add Dataset**.\
    \ This brings up the `Dataset Properties` dialog box. By default it is set to\
    \ **Use a Shared Dataset** as shown in Figure [3-17](#A395630_1_En_3_Chapter.html#Fig17).\n\
    \    ![A395630_1_En_3_Fig17_HTML.jpg](A395630_1_En_3_Fig17_HTML.jpg)\n    Figure\
    \ 3-17."
