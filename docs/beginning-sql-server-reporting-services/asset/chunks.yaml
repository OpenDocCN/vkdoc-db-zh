    \ -1\n    ```\n\n6.  单击“确定”。\n\n### 包含数据的文本框\n\n你已经看到数据区域是由文本框构成的。你也看到了包含非连接信息的文本框，例如文本框中的报表名称。可以从一个数据集中填充独立的文本框。该文本框无法显示详细数据；它必须显示摘要值。要查看此操作，请将\
    \ `TotalSales` 字段从 `SalesSummary` 数据集拖到报表画布上。查看如图 4-24 所示的表达式属性。你可以通过右键单击文本框并选择“表达式”来找到它。\n\
    \n![A395630_1_En_4_Fig24_HTML.jpg](img/A395630_1_En_4_Fig24_HTML.jpg)\n\n图 4-24.\n\
    文本框表达式属性\n\n该值已使用 `Sum` 函数自动汇总。第二个参数 `SalesSummary` 是数据集上下文。\n\n### 计算字段\n\n报表通常需要计算字段，例如销售利润率。有许多方法可以实现这一点。如果数据源自数据库系统，通常可以将计算添加到查询本身。如果不可行（例如，数据源不支持或报表开发人员无法修改查询），则可以在单元格内创建计算。但是，如果该单元格的结果需要在另一个单元格的表达式中使用，则会出现问题。你无法将包含表达式的单元格嵌套在另一个表达式中。\n\
    \n如果计算需要在多个表达式中使用，你可以向数据集添加计算字段。要了解如何添加计算字段，请按照以下步骤操作：\n\n1.  在“解决方案资源管理器”中，添加一个名为\
    \ `Calculated Field` 的新报表。\n2.  向报表添加一个名为 `AdventureWorks` 的数据源，指向 `AdventureWorks2016`\
    \ 共享数据源。如果需要帮助，请回顾第 3 章。\n3.  添加一个名为 `Sales` 的新数据集，指向 `AdventureWorks` 数据源，并使用此嵌入查询：\n\
    \n    ```\n    SELECT TOP(1000) SOD.SalesOrderID, SOH.OrderDate,\n    SOD.OrderQty,\
    \ SOD.UnitPrice,\n    P.StandardCost\n    FROM Sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesOrderDetail AS SOD\n    ON SOH.SalesOrderID = SOD.SalesOrderID\n\
    \    JOIN Production.Product AS P ON P.ProductID = SOD.ProductID;\n    ```\n\n\
    4.  保存数据集后，右键单击并选择“添加计算字段”，这将打开“数据集属性”对话框的“字段”页面。\n5.  图 4-25 所示的对话框显示了现有字段，底部有一个空白行。\n\
    \n    ![A395630_1_En_4_Fig25_HTML.jpg](img/A395630_1_En_4_Fig25_HTML.jpg)\n\n\
    \    图 4-25.\n    字段页面\n6.  在第一个新“字段名称”中输入 `ExtendedCost`。\n7.  单击 `fx` 图标以调出表达式窗口。\n\
    8.  在“类别”列表中，选择“字段 (Sales)”。\n9.  在“值”列表中，双击 `OrderQty` 字段。\n10. 在字段名称后添加乘号 (`*`)。\n\
    11. 双击 `StandardCost` 字段。最终表达式为：\n\n    ```\n    =Fields!OrderQty.Value * Fields!StandardCost.Value\n\
    \    ```\n\n12. 单击“确定”接受表达式。\n13. 单击“添加 ➤ 计算字段”创建另一个名为 `ExtendedPrice` 的表达式。此表达式为：\n\
    \n    ```\n    =Fields!OrderQty.Value * Fields!UnitPrice.Value\n    ```\n\n14.\
    \ 单击“确定”保存表达式。\n15. 单击“确定”保存新字段。你将在 `Sales` 数据集字段列表中看到新字段，如图 4-26 所示。\n\n    ![A395630_1_En_4_Fig26_HTML.jpg](img/A395630_1_En_4_Fig26_HTML.jpg)\n\
    \n    图 4-26.\n    新计算字段\n16. 向报表画布添加一个表格控件。\n17. 将以下字段添加到表格：`SalesOrderID`, `OrderDate`,\
    \ `OrderQty`, `StandardCost`, `ExtendedCost`, `UnitPrice`, `ExtendedPrice`。\n\
    18. 向表格添加一个新列。\n19. 右键单击新的数据单元格并选择“表达式”。\n20. 输入此表达式：\n\n    ```\n    =Fields!ExtendedPrice.Value\
    \ - Fields!ExtendedCost.Value\n    ```\n\n21. 在标题单元格中输入 `Margin`。\n\n当你预览报表时，你会看到计算字段按预期工作。\n"
- fmt: "### The List Control\n\nThe list control works similarly to a table, but instead\
    \ of cells, it has a freeform layout area that is repeated for each row of data.\
    \ In this section, you will create a new report that uses the list control. Follow\
    \ these steps to create the report.\n\n1.  Add a new report to the project named\
    \ `List Report`.\n2.  Add a new data source to the report called `AdventureWorks`\
    \ that is linked to the `AdventureWorks2016` shared data source. Review Chapter\
    \ [3](#A395630_1_En_3_Chapter.html) if you need help with this step.\n3.  Create\
    \ a new dataset called `ProductList` pointing to the `AdventureWorks` data source\
    \ with this embedded query:\n\n    ```sql\n    SELECT P.ProductID, P.Name, PH.LargePhoto\n\
    \    FROM Production.Product AS P\n    JOIN Production.ProductProductPhoto AS\
    \ PP ON P.ProductID = PP.ProductID\n    JOIN Production.ProductPhoto AS PH ON\
    \ PP.ProductPhotoID = PH.ProductPhotoID\n    JOIN Production.ProductSubcategory\
    \ AS SC ON SC.ProductSubcategoryID = P.ProductSubcategoryID\n    JOIN Production.ProductCategory\
    \ AS C ON C.ProductCategoryID = SC.ProductCategoryID\n    WHERE PP.[Primary] =\
    \ 1 AND C.ProductCategoryID IN (1,4);\n    ```\n\n4.  Add a `list` control to\
    \ the report canvas.\n5.  From the `ProductList` dataset, drag the `ProductID`\
    \ and `Name` to the list. Text boxes are automatically created to hold the fields.\n\
    6.  Double the width of the list.\n7.  Change the list’s `BorderStyle Default`\
    \ property to `Solid`.\n8.  From the Toolbox, drag an `image` control to the list.\n\
    9.  This brings up the `Image Properties` dialog. Set the properties as shown\
    \ in Figure [4-27](#A395630_1_En_4_Chapter.html#Fig27).\n\n    ![A395630_1_En_4_Fig27_HTML.jpg](A395630_1_En_4_Fig27_HTML.jpg)\n\
    \    *Figure 4-27. The Image Properties box*\n\n10. Click `OK` to accept the properties.\n\
    11. Expand the size of the `image` control.\n\nNow when you preview the report\
    \ as shown in Figure [4-28](#A395630_1_En_4_Chapter.html#Fig28), you will see\
    \ the images stored in the database for each product. Some of the products have\
    \ images that just say “No Image Available.” This is not a feature of SSRS when\
    \ the image is missing; it’s an actual image.\n\n![A395630_1_En_4_Fig28_HTML.jpg](A395630_1_En_4_Fig28_HTML.jpg)\n\
    *Figure 4-28. The list report*\n\n## Setting Report Properties\n\nIn Chapter [2](#A395630_1_En_2_Chapter.html),\
    \ I told you about problems with printing reports. In some cases, the reports\
    \ print with every other page blank. In this section, you will see how to solve\
    \ this problem. Follow these steps to produce a report that is too wide to print:\n\
    \n1.  In the design view of any report, enable the ruler by right-clicking the\
    \ report canvas and clicking `View` ➤ `Ruler`.\n2.  Drag the right side of the\
    \ report so that the report is about 9 inches (22.5 cm) wide.\n3.  Preview the\
    \ report.\n4.  Switch to print layout view.\n5.  Scroll through the report one\
    \ page at a time.\n\nBecause the report is wider than the default paper size,\
    \ it prints a blank page after each populated page. If you have controls in place\
    \ too far the right of the canvas, you will see the report split across pages\
    \ as well. To solve this problem, you need to make sure that the report width\
    \ does not exceed the paper where it will be printed.\n\nOften, as the developer\
    \ works on the report, adding and removing objects can cause the canvas to expand\
    \ without notice. The first step is dragging in the right side of the report to\
    \ remove any blank area.\n\nHere are several things you can do to fix report printing.\n\
    \n*   Change the paper orientation from portrait to landscape.\n*   Modify margins.\n\
    *   Change paper size. Make sure that this will match the paper you will use to\
    \ print the report.\n*   Adjust column widths.\n\nFigure [4-29](#A395630_1_En_4_Chapter.html#Fig29)\
    \ shows the `Report Properties` dialog. It can be found in the `Report` menu.\n\
    \n![A395630_1_En_4_Fig29_HTML.jpg](A395630_1_En_4_Fig29_HTML.jpg)\n*Figure 4-29.\
    \ The Report Properties dialog box*\n\nAs a rule of thumb , the width of the report\
    \ plus the left and right margins should not exceed the width of the paper.\n\n\
    ## Summary\n\nIn this chapter you learned how to create a report from a blank\
    \ canvas. There are many components that you can add to a report, including headers\
    \ and footers. The values of almost all properties can be controlled with expressions,\
    \ and you can add calculated fields to the dataset. It’s always important to make\
    \ sure that the report will fit on the printed page, and this chapter covered\
    \ how to adjust the report properties to do so.\n\nIn Chapter [5](#A395630_1_En_5_Chapter.html),\
    \ you will learn how to add grouping levels to reports.\n\n# 5. Adding Grouping\
    \ Levels to Reports\n\nI had a birthday party when I turned six. I remember requesting\
    \ chocolate cake with chocolate icing, chocolate ice cream, and chocolate milk.\
    \ I also wanted my cake to be a multilayer wedding cake. I didn’t get a wedding\
    \ cake until years later at my actual wedding reception, and I’m sure the cake\
    \ that my mom baked for my sixth birthday was a one-layer chocolate pan cake.\n\
    \nThe reports you created in Chapters [3](#A395630_1_En_3_Chapter.html) and [4](#A395630_1_En_4_Chapter.html)\
    \ displayed just one level in each table, much like that simple cake at my birthday\
    \ party. In this chapter you will learn how to create reports with multiple grouping\
    \ levels, including matrix reports.\n\n## Designing Your Report\n\nThe most important\
    \ phase of any project, big or small, is the design. You must know what you are\
    \ trying to accomplish before you start building the solution. A SQL Server Reporting\
    \ Services (SSRS) report by itself is a relatively small project, but you will\
    \ save time and frustration by understanding the requirements and coming up with\
    \ a design before launching SQL Server Data Tools (SSDT).\n\nDepending on the\
    \ requirements for documentation at your company or department, you may end up\
    \ just using a white board or paper to sketch out your design. For reports that\
    \ require multiple grouping levels, calculations, or any advanced features, spend\
    \ some time figuring out how the report should look. If you are lucky, the person\
    \ requesting the report will provide a design layout along with the requirements.\n\
    \nYour company may have a very formal procedure to follow for new report requests\
    \ with explicit requirements. Or, maybe a report request will made with just a\
    \ phone call. In this chapter, you’ll go through the process of building a report\
    \ based on a simple request.\n\n### The Report Requirements\n\nYou have been given\
    \ a report request from the sales department manager:\n\n“We would like a report\
    \ that shows sales by territory and year.”\n\nAt this point, you could start building\
    \ the report, but maybe you should ask some questions before you launch `SSDT`.\n\
    \nHow do I determine the territory? What fields need to show on the report? Do\
    \ you need to see subtotals or other calculations? Should the report be grouped\
    \ first by territory and then by year or the opposite? What is the lowest detail\
    \ that needs to be shown on the report?\n\nWhen meeting with the manager, you\
    \ find out the following:\n\n*   The query will be provided.\n*   Group first\
    \ by year, then within the year, group by territory.\n*   For each year, show\
    \ the total sales and the average sales over the territories.\n*   For each territory,\
    \ display the territory name, ID, and total sales.\n*   Display store name, customer\
    \ ID, and total sales as the lowest detail.\n*   Sort the detail by total sales\
    \ in descending order.\n*   Sort the years by descending order.\n*   Sort the\
    \ territories alphabetically.\n\nYou now have more specific requirements that\
    \ may or may not be complete. In my experience, the person requesting the report\
    \ will often have a better idea about what should be on the report and how it\
    \ should be organized once he or she sees an actual report."
