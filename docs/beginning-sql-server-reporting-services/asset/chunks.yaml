  trans: "## 安装带有 SSRS 的 SQL Server\n\n您可以不安装 SSRS，仅安装开发工具，即可跟随本书中的许多示例进行操作。您也可以使用公司网络中已有的\
    \ SSRS 实例。不过，如果可能的话，我建议您在开发计算机上安装 SSRS。这样既能学习报表开发，也能了解一些管理任务的操作。\n\nSQL Server\
    \ 有多个版本。每个版本都有其特定的功能集和价格。对于开发和学习，您可以下载免费的 **Developer Edition**。只需在网上搜索“SQL Server\
    \ Developer Edition download”即可找到下载文件。另外还有一个免费的 **Express Edition**，但其功能非常有限。\n\
    \n> 注意\n>\n> 在撰写本文时，安装介质是一个 iso 文件。我的 Windows 10 笔记本电脑可以轻松处理 iso 文件，但您的操作系统可能不行。如果需要，您可以搜索用于挂载或提取\
    \ iso 文件的实用程序。\n\n从安装介质中，您应该能看到如图 1-3 所示的 `setup` 图标。\n\n![A395630_1_En_1_Fig3_HTML.jpg](img/A395630_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3. 安装图标\n\n请按照以下说明安装带有 SSRS 的 SQL Server 实例：\n\n1.  双击 `setup` 以启动 `SQL\
    \ Server 安装中心`。\n2.  点击左侧的 `安装`。\n3.  点击顶部的 `新建 SQL Server 独立安装或向现有安装添加功能`，如图\
    \ 1-4 所示。\n\n    ![A395630_1_En_1_Fig4_HTML.jpg](img/A395630_1_En_1_Fig4_HTML.jpg)\n\
    \n    图 1-4. SQL Server 安装中心\n\n4.  安装向导将启动。在初始信息页面，点击 `下一步`。\n5.  在 `许可条款` 页面，点击\
    \ `我接受许可条款` 并点击 `下一步`。\n6.  在 `Microsoft 更新` 页面点击 `下一步`。\n7.  检查更新后，在 `产品更新` 页面点击\
    \ `下一步`。\n8.  在 `安装规则` 页面，等待完成后点击 `下一步`。如果有任何 `失败` 状态，您需要点击消息以查明问题并加以纠正。\n9. \
    \ 在 `功能选择` 页面，选择 `数据库引擎服务` 和 `Reporting Services – 本机`，如图 1-5 所示。\n\n    ![A395630_1_En_1_Fig5_HTML.jpg](img/A395630_1_En_1_Fig5_HTML.jpg)\n\
    \n    图 1-5. 功能选择\n\n10. 在 `实例配置` 页面，您必须决定是安装 `实例 ID` 为 `MSSQLSERVER` 的默认实例，还是安装命名实例。计算机上的每个\
    \ SQL Server 实例都必须是唯一的。如果已安装了其他 SQL Server 实例，您将看到它们被列出。如果没有其他默认实例，请选择 `默认实例`\
    \ 并点击 `下一步`。否则，选择 `命名实例` 并在点击 `下一步` 之前键入一个名称。图 1-6 显示了此页面。\n\n    ![A395630_1_En_1_Fig6_HTML.jpg](img/A395630_1_En_1_Fig6_HTML.jpg)\n\
    \n    图 1-6. 实例配置页面\n\n11. 在 `服务器配置` 页面，接受默认设置并点击 `下一步`。\n12. 在 `数据库引擎配置` 页面，点击\
    \ `添加当前用户`。这将使您的账户成为 SQL Server 的管理员。点击 `下一步`。\n13. 在 `Reporting Services 配置`\
    \ 页面，确保选择 `安装和配置`，如图 1-7 所示，然后点击 `下一步`。\n\n    ![A395630_1_En_1_Fig7_HTML.jpg](img/A395630_1_En_1_Fig7_HTML.jpg)\n\
    \n    图 1-7. Reporting Services 配置页面\n\n14. 在 `准备安装` 页面，点击 `安装`。\n15. 如果安装结束时要求您重启计算机，请按指示操作。\n\
    \n安装 SQL Server 实例和 SSRS 可能需要几分钟时间。可能导致安装失败的情况有几十种，我无法通过一本书来帮助您排查故障。我的建议是导航到 `C:\\\
    Program Files\\Microsoft SQL Server\\130\\Setup Bootstrap\\Log`。那里会有安装期间生成的消息的日志文件。如果安装失败，您可以使用找到的任何错误消息在互联网上搜索以寻求帮助和建议。也就是说，安装过程中您可能需要连接到互联网，并且可能需要以管理员身份运行\
    \ `setup` 才能成功安装。\n\n先前版本的 SQL Server 允许您在安装 SQL Server 实例时一起安装 `SQL Server Management\
    \ Studio` (`SSMS`)。从 SQL Server 2016 开始，Microsoft 计划频繁更新此工具，并且仅通过下载提供。要找到下载链接，如果您已关闭\
    \ `SQL Server 安装中心`，请重新启动它。在 `安装` 页面，点击 `安装 SQL Server 管理工具`。按照下载页面上的说明操作。\n\n\
    ## 安装 SQL Server Data Tools\n\nSSRS 的主要开发工具是前面提到的 `SSDT`，它运行在 `Visual Studio`\
    \ 内部。Microsoft 在几个版本的 SQL Server 中更改了开发工具的名称和来源。曾几何时，您可以直接从 SQL Server 安装介质安装\
    \ `Business Intelligence Development Studio`，也称为 `BIDS`。后来，Microsoft 将其名称更改为 `SQL\
    \ Server Data Tools – BI`，并且它是一个单独的下载。更令人困惑的是，还有另一个名为 `SSDT` 的产品用于数据库项目，而不是像报表这样的\
    \ BI 项目。幸运的是，在 2016 年，Microsoft 已将这两个产品合并为一个 `SSDT` 下载。\n\n您可以在 `SQL Server 安装中心`\
    \ 的 `安装` 页面上找到下载和安装 `SSDT` 的链接，如图 1-8 所示。\n\n![A395630_1_En_1_Fig8_HTML.jpg](img/A395630_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8. SQL Server Data Tools 的链接\n\n在撰写本文时，您可以下载 `SSDTSetup.exe` 文件并从该文件安装，或者可以向下滚动页面下载\
    \ iso 文件。如果您下载了 iso 文件，则从该介质运行 `SSDTSetup.exe` 以开始安装。请按照以下步骤安装 `SSDT`：\n\n1. \
    \ 运行 `SSDTSetup.exe` 会启动向导。在第一页，确保 `SQL Server Reporting Services` 已被勾选，如图 1-9\
    \ 所示。您也可以保留其他项的勾选状态。\n\n    ![A395630_1_En_1_Fig9_HTML.jpg](img/A395630_1_En_1_Fig9_HTML.jpg)\n\
    \n    图 1-9. SQL Server Reporting Services 已勾选\n\n2.  点击 `下一步`。\n3.  在 `许可条款`\
    \ 页面，勾选 `我同意许可条款和条件`。\n4.  点击 `安装`。"
- fmt: "## Configuring SSRS\n\nIf you followed the installation instructions exactly\
    \ in the section \"Installing SQL Server with SSRS\", `SSRS` should be configured.\
    \ If, instead, you added `SSRS` to an existing `SQL Server` instance or selected\
    \ `Install only` on the `Reporting Services Configuration` page, you will need\
    \ to configure it now. To configure `SSRS`, follow these steps:\n\n1.  Launch\
    \ `Reporting Services Configuration Manager`.\n2.  When asked to connect to your\
    \ `SSRS` instance, select the server and instance name if required and click `Connect`\
    \ as shown in Figure 1-10.\n\n    ![A395630_1_En_1_Fig10_HTML.jpg](A395630_1_En_1_Fig10_HTML.jpg)\n\
    \n    Figure 1-10. Connect to the `SSRS` instance.\n3.  Select the `Database`\
    \ page and click `Change Database` as shown in Figure 1-11.\n\n    ![A395630_1_En_1_Fig11_HTML.jpg](A395630_1_En_1_Fig11_HTML.jpg)\n\
    \n    Figure 1-11. The `Database` page.\n4.  This opens the `Report Server Database\
    \ Configuration Wizard`. Select `Create a new report server database` as shown\
    \ in Figure 1-12. Click `Next`.\n\n    ![A395630_1_En_1_Fig12_HTML.jpg](A395630_1_En_1_Fig12_HTML.jpg)\n\
    \n    Figure 1-12. Create a new report server database.\n5.  On the `Database\
    \ Server` page, make sure that your server name is filled in. If you have a named\
    \ instance, be sure to include the instance name. Figure 1-13 shows this page.\n\
    \n    ![A395630_1_En_1_Fig13_HTML.jpg](A395630_1_En_1_Fig13_HTML.jpg)\n\n    Figure\
    \ 1-13. Connect to the database server.\n6.  Click `Next` to move to the `Database`\
    \ page shown in Figure 1-14. Accept the defaults on this page. If your installation\
    \ is a named instance, the instance name will be part of the database name.\n\n\
    \    ![A395630_1_En_1_Fig14_HTML.jpg](A395630_1_En_1_Fig14_HTML.jpg)\n\n    Figure\
    \ 1-14. The `Database Name`.\n7.  Click `Next` to move to the `Credentials` page.\
    \ You can change the `SSRS` service account on this page. Accept the defaults\
    \ and click `Next`.\n8.  Click through the remaining pages in the wizard to create\
    \ the `SSRS` databases.\n9.  Click `Finish` once the process is complete.\n10.\
    \ To create the `Web Service URL`, select the `Web Service URL` page as shown\
    \ in Figure 1-15.\n\n    ![A395630_1_En_1_Fig15_HTML.jpg](A395630_1_En_1_Fig15_HTML.jpg)\n\
    \n    Figure 1-15. `Web Service URL` page.\n11. For your own `SSRS` installation,\
    \ just accept the defaults and click `Apply`. This sets up the web service.\n\
    12. When the task has completed, select the `Web Portal URL` page. Once again,\
    \ you can accept the defaults and click `Apply`. This will create the web portal.\n\
    13. When the web portal creation is done, click the `Encryption Keys` page as\
    \ shown in Figure 1-16. Click `Backup` to save the encryption keys.\n\n    ![A395630_1_En_1_Fig16_HTML.jpg](A395630_1_En_1_Fig16_HTML.jpg)\n\
    \n    Figure 1-16. Back up the encryption keys.\n14. Supply a location and password\
    \ that you will not forget. This step is especially important in a production\
    \ environment. The encryption key is required for restoring or moving the database.\n\
    15. Click `Exit` to close the `SSRS Configuration Manager`.\n\n`SSRS` should now\
    \ be configured. In Chapter 8, you will learn how to publish your reports. At\
    \ that time, you will return to this tool to determine the web service URL and\
    \ web portal URL.\n\n## Configuring Local SSRS Settings\n\nThere is one very frustrating\
    \ problem that you will encounter if you install the `SSRS` instance locally related\
    \ to security. In order to launch the web portal or publish reports, you will\
    \ need to run the web browser and `SSDT` as an administrator. This feature helps\
    \ prevent applications from making changes to the operating system without your\
    \ knowledge and permission.\n\nTo get around this issue, follow these steps:\n\
    \n1.  Determine the web portal URL by launching `Reporting Service Configuration\
    \ Manager`. Click the `Web Portal URL` page and note the link. Do not click it.\n\
    2.  Launch your web browser using the `Run as an Administrator` option.\n3.  Navigate\
    \ to the URL determined in step 1.\n4.  Open the security settings of the web\
    \ browser and add the current site to the `Trusted Sites`.\n5.  Click `OK` and\
    \ close the browser.\n6.  Launch the browser again using the `Run as an Administrator`\
    \ option.\n7.  Navigate to the web portal URL once again.\n8.  Click `Manage Folder`\
    \ as shown in Figure 1-17.\n\n    ![A395630_1_En_1_Fig17_HTML.jpg](A395630_1_En_1_Fig17_HTML.jpg)\n\
    \n    Figure 1-17. The `Manage Folder` link.\n9.  Click `Add group or user`.\n\
    10. Type in your computer or domain plus the account as the `Group or user`.\n\
    11. Select `Content Manager` as the role. The dialog will look similar to that\
    \ in Figure 1-18.\n\n    ![A395630_1_En_1_Fig18_HTML.jpg](A395630_1_En_1_Fig18_HTML.jpg)\n\
    \n    Figure 1-18. The security for `Home`.\n12. Click `OK`.\n13. Click the gear\
    \ icon found at the top right of the page and select `Site Settings` as shown\
    \ in Figure 1-19.\n\n    ![A395630_1_En_1_Fig19_HTML.jpg](A395630_1_En_1_Fig19_HTML.jpg)\n\
    \n    Figure 1-19. The `Site Settings` link.\n14. Select the `Security` page.\n\
    15. Click `Add group or user`.\n16. Enter your account name and click `System\
    \ Administrator`. The dialog will look like that in Figure 1-20.\n\n    ![A395630_1_En_1_Fig20_HTML.jpg](A395630_1_En_1_Fig20_HTML.jpg)\n\
    \n    Figure 1-20. The site settings.\n17. Click `OK`.\n\nYou will learn more\
    \ about these security settings in Chapter 9. If you have followed these instructions\
    \ but still encounter security errors when launching the web portal or publishing\
    \ reports, see the article found at the following site for more information: [`https://msdn.microsoft.com/en-us/library/bb630430.aspx`](https://msdn.microsoft.com/en-us/library/bb630430.aspx).\n\
    \n## Determining the SQL Server Name\n\nTo follow the examples in this book, you\
    \ will need to connect to your `SQL Server` instance when creating data sources.\
    \ A `SQL Server` name has two parts: a computer name and an instance name. For\
    \ example, a `SQL Server` located on a server named `MyServer` and an instance\
    \ name of `Inst1` can be reached with `MyServer\\Inst1`. Often, `SQL Server` will\
    \ be installed as the default instance. In that case, you do not need to supply\
    \ the instance name which is actually `MSSQLSERVER`; you can supply just the computer\
    \ name.\n\nIn the section \"Installing SQL Server with SSRS,\" you were instructed\
    \ to install `SQL Server` as the default instance. If you supplied an instance\
    \ name instead, you will need that name to connect to the database. To find out\
    \ the instance name, you will need to launch `SQL Server Configuration Manager`.\n\
    \n**Note:** If you are using a network `SQL Server` instead of a locally installed\
    \ instance, ask the person who is responsible for that server for the correct\
    \ computer and instance names.\n\nOnce `Configuration Manager` is running, click\
    \ `SQL Server Services`. If you see `MSSQLSERVER`, you have a default instance.\
    \ If you see anything else, that is your instance name. Figure 1-21 shows both\
    \ a default instance and a named instance called `SSRS`.\n\n![A395630_1_En_1_Fig21_HTML.jpg](A395630_1_En_1_Fig21_HTML.jpg)\n\
    \nFigure 1-21. The `SQL Server Configuration Manager`.\n\nThe `SQL Server Configuration\
    \ Manager` utility has many other uses that are beyond the scope of this book."
