  trans: "\n## 创建共享数据集\n\n一个数据集就是一个查询，是你向数据库提出的问题。与数据源不同，数据集通常对报告是唯一的，大多数不应共享。然而，也有几个例外。例如，你可能需要在多个报告中复用一个参数列表。还有一些新功能，例如移动报告，它们需要共享数据集。在本例中，你将创建一个参数列表作为共享数据集。\n\
    \n创建共享数据集请遵循以下步骤：\n\n1.  右键单击 `Shared Datasets` 文件夹并选择 **添加新数据集**。\n2.  这将打开 `共享数据集属性`\
    \ 对话框。在 `名称` 属性中键入 `Year`。\n3.  确保在上一节创建的数据源 `AdventureWorks2016` 已在 `数据源` 属性中被选中。\n\
    4.  确保 `查询类型` 属性选择的是 `文本`。\n5.  在 `查询` 文本框中键入以下代码：\n    ```sql\n    SELECT DISTINCT\
    \ YEAR(OrderDate) AS OrderYear\n    FROM Sales.SalesOrderHeader\n    ORDER BY\
    \ OrderYear;\n    ```\n6.  属性应如图 3-10 所示。点击 **确定** 创建新的共享数据集。\n    ![A395630_1_En_3_Fig10_HTML.jpg](img/A395630_1_En_3_Fig10_HTML.jpg)\n\
    \    图 3-10. `共享数据集属性`\n\n现在你应该能在 `Shared Datasets` 文件夹中看到 `Year` 数据集，如图 3-11\
    \ 所示。与数据源类似，查看其属性会显示文件位置。要编辑属性，可以单击名称或右键单击并选择 **打开**。\n\n![A395630_1_En_3_Fig11_HTML.jpg](img/A395630_1_En_3_Fig11_HTML.jpg)\n\
    图 3-11. 新的共享数据集\n\n你可以根据需要创建额外的数据集。请记住，除非数据集将在多个报告中使用，否则共享它没有意义。典型的用例是用于参数列表。\n\
    \n### 注意\n\n在 SQL Server 2016 发布时，存在一个涉及共享数据集的错误。要解决此问题，请导航到项目文件并打开 `Year.rsd`\
    \ 文件。将代码 `<Dataset>` 更改为 `<Dataset Name=\"Year\">`，然后保存文件。Microsoft 已承诺尽快修复此问题，因此在你阅读本书时，这可能已不是问题。\n\
    \n## 使用数据源和数据集\n\n创建数据源和数据集的目的就是在报告中使用它们。现在你将进行此操作。请按照以下步骤创建报告：\n\n1.  右键单击 `Reports`\
    \ 文件夹并选择 **添加** ➤ **新建项**，如图 3-12 所示。确保不要选择 **添加新报告**，因为这会启动向导。\n    ![A395630_1_En_3_Fig12_HTML.jpg](img/A395630_1_En_3_Fig12_HTML.jpg)\n\
    \    图 3-12. 添加新报告\n2.  在 **添加新项 – 数据源和数据集** 对话框中，选择 `报告`。\n3.  在报告名称属性中填入 `Sales\
    \ by Year`。对话框应如图 3-13 所示。\n    ![A395630_1_En_3_Fig13_HTML.jpg](img/A395630_1_En_3_Fig13_HTML.jpg)\n\
    \    图 3-13. 新报告属性\n4.  点击 **添加** 以创建新报告。\n\n报告现在应该在解决方案资源管理器中可见并在设计视图中打开。如果没有，请双击报告名称将其打开。下一个任务是设置报告内的数据源，使其指向共享数据源。\n\
    \n找到 `报表数据` 窗口，它可能位于左侧。如果不可见，请单击报告的设计画布，然后单击 **视图** 菜单底部的 **报表数据**。`报表数据` 窗口包含几个文件夹，如图\
    \ 3-14 所示。\n\n![A395630_1_En_3_Fig14_HTML.jpg](img/A395630_1_En_3_Fig14_HTML.jpg)\n\
    图 3-14. `报表数据` 窗口\n\n请按照以下步骤设置报告的数据源：\n\n1.  右键单击 `数据源` 文件夹并选择 **添加数据源**。\n2.\
    \  这将打开 `数据源属性` 对话框。在 `名称` 属性中填入 `AdventureWorks`。作为最佳实践，始终为每个数据源指定一个描述性名称。此数据源将链接到\
    \ `AdventureWorks2016` 共享数据源。如果你愿意，可以给它完全相同的名称。在本例中，你将稍微更改名称，以便轻松区分共享数据源和报告中的数据源。\n\
    3.  对话框中部允许你将此报告数据源创建为嵌入数据源，其连接属性仅对此报告可见。相反，请选择 **使用数据源引用**。在列表中找到 `AdventureWorks2016`。对话框应如图\
    \ 3-15 所示。\n    ![A395630_1_En_3_Fig15_HTML.jpg](img/A395630_1_En_3_Fig15_HTML.jpg)\n\
    \    图 3-15. 报告数据源属性\n4.  点击 **确定** 创建数据源。\n\n图 3-15 所示对话框上的 **编辑** 按钮允许你在需要时修改共享数据源。请记住，以此方式进行的更改将影响所有使用此数据源的报告。你也可以创建一个新的共享数据源。作为最佳实践，并避免混淆，始终在项目级别创建和编辑共享数据源。\n\
    \n现在你应该在 `报表数据` 窗口的 `数据源` 文件夹中看到 `AdventureWorks` 数据源，如图 3-16 所示。图标上的小箭头表示它指向一个共享数据源。\n\
    \n![A395630_1_En_3_Fig16_HTML.jpg](img/A395630_1_En_3_Fig16_HTML.jpg)\n图 3-16.\
    \ 新的数据源\n\n创建报告的下一步是添加一个数据集。数据集是查询，是向数据库或其他数据源提出的问题。数据集通常特定于某个报告，因此共享大多数数据集没有意义。要为此报告创建第一个数据集，请遵循以下步骤：\n\
    \n1.  右键单击 `数据集` 文件夹并选择 **添加数据集**。这将打开 `数据集属性` 对话框。默认情况下，它设置为 **使用共享数据集**，如图 3-17\
    \ 所示。\n    ![A395630_1_En_3_Fig17_HTML.jpg](img/A395630_1_En_3_Fig17_HTML.jpg)\n\
    \    图 3-17.\n"
- fmt: "# The Dataset Properties dialog\n\n2.  Fill in the `Name` property with `Sales`.\n\
    3.  Select `Use a Dataset embedded in my report`. When you do, the dialog changes.\
    \ Instead of showing the shared dataset, the dialog displays the properties for\
    \ the embedded dataset. Figure [3-18](#A395630_1_En_3_Chapter.html#Fig18) shows\
    \ how the dialog looks after the changes.\n\n![A395630_1_En_3_Fig18_HTML.jpg](A395630_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18. The Dataset Properties for an embedded dataset\n\n4.  Find `AdventureWorks`\
    \ in the dropdown box under `Data source`. Only data sources that have been set\
    \ up as part of the report are visible in this list.\n5.  Select `Text` as the\
    \ `Query` type if it is not selected.\n6.  Type this code in the `Query` property:\n\
    \n```sql\nSELECT SUM(TotalDue) AS TotalSales, MONTH(OrderDate) AS OrderMonth,\
    \ YEAR(OrderDate) AS OrderYear\nFROM Sales.SalesOrderHeader\nGROUP BY MONTH(OrderDate),\
    \ YEAR(OrderDate);\n```\n\n7.  Click `OK` to create the dataset.\n\nThe `Sales`\
    \ dataset should now be visible in the Report Data window as shown in Figure [3-19](#A395630_1_En_3_Chapter.html#Fig19).\
    \ In addition to the dataset name, you will also see the available fields.\n\n\
    ![A395630_1_En_3_Fig19_HTML.jpg](A395630_1_En_3_Fig19_HTML.jpg)\n\nFigure 3-19.\
    \ The Sales dataset\n\nNow you can display data from the dataset on the report.\
    \ Follow these steps to set up a simple report:\n\n1.  Display the `Toolbox` window.\
    \ It if is not visible, click the report design canvas and then click `Toolbox`\
    \ from the `View` menu. The Toolbox looks like Figure [3-20](#A395630_1_En_3_Chapter.html#Fig20).\n\
    \n![A395630_1_En_3_Fig20_HTML.jpg](A395630_1_En_3_Fig20_HTML.jpg)\n\nFigure 3-20.\
    \ The Toolbox\n\n2.  Drag a `Table` control from the `Toolbox` on to the report\
    \ design canvas. You can also right-click the design surface and add a table by\
    \ selecting `Insert` ➤ `Table`. Figure [3-21](#A395630_1_En_3_Chapter.html#Fig21)\
    \ shows the table control on the report.\n\n![A395630_1_En_3_Fig21_HTML.jpg](A395630_1_En_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21. The Table control\n\n3.  There are several ways to populate the\
    \ table. From the Report Data window, drag the `OrderYear` field to the leftmost\
    \ cell in the `Data` row. The `Header` row automatically populates.\n4.  Hover\
    \ over the middle cell in the `Data` row until a small icon appears in the cell.\
    \ Click the icon to display a list of the available fields. Select `OrderMonth`.\n\
    5.  Click in the cell on the right in the `Data` row. Type in this code:\n\n```text\n\
    [TotalSales]\n```\n\n6.  In the header row above, type `Total Sales`. The table\
    \ grid should look like Figure [3-22](#A395630_1_En_3_Chapter.html#Fig22).\n\n\
    ![A395630_1_En_3_Fig22_HTML.jpg](A395630_1_En_3_Fig22_HTML.jpg)\n\nFigure 3-22.\
    \ The table with cells populated\n\nClick `Preview` to view the report. Obviously,\
    \ this report is not ready to be published, but it does demonstrate the steps\
    \ required to hook a report to the data.\n\n## Using a Shared Dataset\n\nShared\
    \ datasets are useful for queries that will be reused throughout the project.\
    \ SSRS allows you to create reports that let the user running the report to filter\
    \ dynamically. Often, the same criteria will be used with multiple reports which\
    \ is a great use of shared datasets. Follow these steps to add the shared dataset:\n\
    \n1.  Switch back to `Design` view.\n2.  In the Report Data window, right-click\
    \ `Datasets` and select `Add Dataset`.\n3.  Name the dataset `Year`.\n4.  Make\
    \ sure that `Use a shared dataset` is chosen and select `Year` from the window.\
    \ The Dataset Properties dialog should look like Figure [3-23](#A395630_1_En_3_Chapter.html#Fig23).\n\
    \n    ![A395630_1_En_3_Fig23_HTML.jpg](A395630_1_En_3_Fig23_HTML.jpg)\n    Figure\
    \ 3-23. Using a shared dataset\n\n5.  Click `OK` to create the new dataset.\n\n\
    The next step is to alter the `Sales` dataset so that it requires a parameter.\
    \ Double-click the `Sales` dataset to bring up the properties. You can also right-click\
    \ and select `Properties`. Change the `Query` to the following code. It will now\
    \ require that a year be provided when running the report:\n\n```sql\nSELECT SUM(TotalDue)\
    \ AS TotalSales, MONTH(OrderDate) AS OrderMonth, YEAR(OrderDate) AS OrderYear\n\
    FROM Sales.SalesOrderHeader\nWHERE YEAR(OrderDate) = @Year\nGROUP BY MONTH(OrderDate),\
    \ YEAR(OrderDate);\n```\n\nWhen you run the report you are now required to type\
    \ in a year before you see the results. Preview the report. Type in `2011` and\
    \ click `View Report`. The totals displayed will be for only `2011` as shown in\
    \ Figure [3-24](#A395630_1_En_3_Chapter.html#Fig24).\n\n![A395630_1_En_3_Fig24_HTML.jpg](A395630_1_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24. The results filtered by year\n\nThe report is successfully filtered\
    \ by the year. The user must already know which years are valid for the report.\
    \ This is not too much of a problem for valid years, but what about departments\
    \ or customers? In order to supply a valid list of years from which the user can\
    \ choose, follow these steps:\n\n1.  Switch back to `Design` view and expand the\
    \ `Parameters` folder in the Report Data window.\n2.  When you changed the query\
    \ to filter by `@Year`, the `Year` parameter was automatically added. It is shown\
    \ in Figure [3-25](#A395630_1_En_3_Chapter.html#Fig25).\n\n    ![A395630_1_En_3_Fig25_HTML.jpg](A395630_1_En_3_Fig25_HTML.jpg)\n\
    \    Figure 3-25. The Year parameter\n\n3.  Right-click `Year` and select `Parameter\
    \ Properties` which brings up the Report Parameter Properties dialog box.\n4.\
    \  On the `General` page, change the `Data type` to `Integer`.\n5.  Switch to\
    \ the `Available Values` page.\n6.  Change the `Select from one of the following\
    \ options` to `Get values from a query`.\n7.  Change the `Dataset` property to\
    \ `Year`.\n8.  Change the `Value field` to `OrderYear`.\n9.  Change the `Label\
    \ field` to `OrderYear`. The dialog should look like Figure [3-26](#A395630_1_En_3_Chapter.html#Fig26).\n\
    \n    ![A395630_1_En_3_Fig26_HTML.jpg](A395630_1_En_3_Fig26_HTML.jpg)\n    Figure\
    \ 3-26. The parameter properties\n\n10. Click `OK` to accept the properties.\n\
    \nYou will learn much more about parameters in Chapter [6](#A395630_1_En_6_Chapter.html).\
    \ For now, preview the report. You will see a dropdown list of valid years as\
    \ shown in Figure [3-27](#A395630_1_En_3_Chapter.html#Fig27).\n\n![A395630_1_En_3_Fig27_HTML.jpg](A395630_1_En_3_Fig27_HTML.jpg)\n\
    \nFigure 3-27. The parameter list\n\nExperiment by running the report with different\
    \ values for the `Year` parameter. The report data should change for each year\
    \ chosen.\n\n## Summary\n\nUnderstanding data sources and datasets is crucial\
    \ to report development. Data sources are the connection strings to the database\
    \ or other source of data. Datasets are the queries. It’s possible to share both\
    \ data sources and datasets among reports within a project. As a best practice,\
    \ always share data sources. Share datasets if the query can be used across reports,\
    \ such as for a commonly used parameter.\n\nWhen you add a new report to a project\
    \ remember that the following step is to add a data source to the report. The\
    \ next step is to add a dataset.\n\nChapter [4](#A395630_1_En_4_Chapter.html)\
    \ covers working with tables, text boxes, and other controls commonly used in\
    \ reports."
