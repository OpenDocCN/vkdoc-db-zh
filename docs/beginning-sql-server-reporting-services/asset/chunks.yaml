    [2-3](#A395630_1_En_2_Chapter.html#Fig3) to bring up the Connection Properties
    dialog.


    ![A395630_1_En_2_Fig3_HTML.jpg](A395630_1_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    The Select the Data Source dialog  

    3.  Make sure that the Data source property is set to Microsoft SQL Server (SqlClient).
     

    4.  Next you must fill in your Server name. You can specify a locally installed
    SQL Server by using (local), localhost, or a dot (.). If your instance has an
    instance name, such as Inst1, you will need to follow with a backslash and the
    instance name: (local)\Inst1\. If you are not sure about the name of your instance,
    see the section “Determining the SQL Server Name” in Chapter [1](#A395630_1_En_1_Chapter.html).
    If your SQL Server instance is installed in your network, request help from your
    database administrator.  

    5.  If your SQL Server is installed locally, accept the default of Use Windows
    Authentication in the Log on to the server property. Otherwise, check with your
    database administrator to see if you will use Windows authentication or if you
    will need to supply a user name and password.  

    6.  In the Connect to a database section, choose Select or enter a database name
    and then find AdventureWorks2016 in the list.


    Note


    At the time of the SQL Server 2016 release, Microsoft had not made an AdventureWorks2016
    database available. Instead, there was a beta version database called AdventureWork2016ctp3
    . If your database is named AdventureWorks2016CTP3, run this command in a new
    query window in SSMS to change the name:


    ALTER DATABASE AdventureWorks2016CTP3 MODIFY NAME = AdventureWorks2016;'
  trans: '

    # 2. 使用向导创建你的第一份报表


    现在环境已经就绪，你可以开始学习 SQL Server Reporting Services (SSRS) 报表开发了。在深入研究众多细节之前，你可以先利用一个内置向导来快速创建报表。


    软件向导会通过询问用户一系列问题来自动化一个复杂的过程。我喜欢把它们比作亨利·福特使用的汽车装配线。福特先生曾说：“任何顾客都可以把车漆成他想要的任何颜色，只要它是黑色的。”如今你购买汽车时有许多选择，但如果你想要制造商没有提供的东西，就必须后期自行添加。


    向导可以为你完成大量工作，但不可能囊括每份报表可能需要的所有功能。简单的报表，经过一些调整，可能就足以用于部署了。至少，这是一个绝佳的学习起点。


    ## 创建你的第一份报表


    使用向导，你可以向现有项目中添加新报表。在本练习中，你也将使用它来创建项目。


    请按照以下说明启动项目：


    1.  启动 `SQL Server Data Tools 2015`。如果你找不到它，并且你已按照第 1 章的说明操作，请改为查找 `Visual Studio
    2015`。

    2.  点击 `文件` ➤ `新建` ➤ `项目`，以打开“新建项目”对话框。

    3.  在左侧，展开 `已安装`、`模板` 和 `商业智能`。

    4.  选择 `Reporting Services`。

    5.  选择 `报表服务器项目向导`，如图 2-1 所示。


    ![A395630_1_En_2_Fig1_HTML.jpg](img/A395630_1_En_2_Fig1_HTML.jpg)


    *图 2-1. 选择报表服务器项目向导*


    在对话框底部，你需要填写项目和解决方案的名称以及项目的位置。默认情况下，项目保存在 `Visual Studio 2015` 下 `我的文档` 中的 `Projects`
    文件夹里。我建议你在自己喜欢但易于找到的位置，专门为本书相关操作创建一个目标文件夹。对于 `名称`，输入 `Wizard Reports`。这实际上是项目的名称。当你输入项目名称时，它会自动填充
    `解决方案名称`。请覆盖它，输入 `Beginning SSRS Chapter 2`。在点击 `确定` 之前，请确保属性看起来与图 2-2 中的类似。在这个例子中，我创建了一个名为
    `Learn SSRS` 的文件夹，用于存放与本书相关的所有项目和解决方案。


    ![A395630_1_En_2_Fig2_HTML.jpg](img/A395630_1_En_2_Fig2_HTML.jpg)


    *图 2-2. 项目的名称和位置*


    点击 `确定` 创建项目后，报表向导将启动。请按照以下说明逐步操作向导：


    1.  点击 `下一步` 跳过欢迎界面。

    2.  `选择数据源` 屏幕允许你设置与数据的连接，称为数据源。你将在第 3 章了解更多关于数据源的知识。在本练习中，点击图 2-3 中所示的 `编辑`，以打开
    `连接属性` 对话框。


    ![A395630_1_En_2_Fig3_HTML.jpg](img/A395630_1_En_2_Fig3_HTML.jpg)


    *图 2-3. 选择数据源对话框*


    3.  确保 `数据源` 属性设置为 `Microsoft SQL Server (SqlClient)`。

    4.  接下来你必须填写你的 `服务器名称`。你可以使用 `(local)`、`localhost` 或一个点号 (`.`) 来指定本地安装的 SQL Server。如果你的实例有实例名称，例如
    `Inst1`，你需要在后面加上反斜杠和实例名称：`(local)\Inst1`。如果你不确定你的实例名称，请参阅第 1 章的“确定 SQL Server
    名称”部分。如果你的 SQL Server 实例安装在网络上，请向你的数据库管理员寻求帮助。

    5.  如果你的 SQL Server 是本地安装的，在 `登录到服务器` 属性中接受默认的 `使用 Windows 身份验证`。否则，请咨询你的数据库管理员，确认你将使用
    Windows 身份验证，还是需要提供用户名和密码。

    6.  在 `连接到数据库` 部分，选择 `选择或输入数据库名称`，然后在列表中找到 `AdventureWorks2016`。


    **注意**


    在 SQL Server 2016 发布时，微软尚未提供 `AdventureWorks2016` 数据库。取而代之的是一个名为 `AdventureWork2016ctp3`
    的测试版数据库。如果你的数据库名为 `AdventureWorks2016CTP3`，请在 SSMS 的新查询窗口中运行以下命令来更改其名称：


    ```

    ALTER DATABASE AdventureWorks2016CTP3 MODIFY NAME = AdventureWorks2016;

    ```

    '
- fmt: "1.  点击`Test Connection`，如果测试成功，点击`OK`关闭对话框。如果测试失败，可能需要向数据库管理员寻求帮助，或者确保您提供了正确的信息。\n\
    2.  属性将类似于图[2-4](#A395630_1_En_2_Chapter.html#Fig4)所示。检查无误后，点击`OK`创建数据源。\n\n \
    \   ![A395630_1_En_2_Fig4_HTML.jpg](A395630_1_En_2_Fig4_HTML.jpg)\n    *图 2-4.\
    \ 连接属性*\n3.  `Select the Data Source`对话框将类似于图[2-5](#A395630_1_En_2_Chapter.html#Fig5)。`ConnectionString`属性会根据您的`SQL\
    \ Server`实例而有所不同。\n\n    ![A395630_1_En_2_Fig5_HTML.jpg](A395630_1_En_2_Fig5_HTML.jpg)\n\
    \    *图 2-5. 数据源属性*\n4.  点击`Next`进入`Design the Query`页面。在此页面，您可以使用`Query Builder`可视化地创建查询，也可以直接输入查询而无需额外辅助。由于本书并非旨在教授您`T-SQL`，查询语句已提供。作者所著的《Beginning\
    \ T-SQL (Third Edition)》（Apress，2014）可用于学习更多关于`T-SQL`查询语言的知识。\n5.  输入或粘贴以下代码（该代码可在Apress网站Apress.com的源代码/下载区域找到），然后点击`Next`。\n\
    \n    ```sql\n    SELECT T.[Group], T.Name AS Region, YEAR(OrderDate) AS OrderYear,\n\
    \    Month(OrderDate) AS OrderMonth, OrderDate, SalesOrderID, TotalDue\n    FROM\
    \ Sales.SalesOrderHeader AS SOH\n    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID\
    \ = T.TerritoryID;\n    ```\n\n6.  在`Select the Report Type`页面，确保选择`Tabular`。本章稍后将创建`Matrix`报告。点击`Next`。\n\
    7.  在`Design the Table`页面，您将指定哪些信息构成报告的分组级别。关于分组级别的更多内容将在第[5](#A395630_1_En_5_Chapter.html)章学习。现在，请按照图[2-6](#A395630_1_En_2_Chapter.html#Fig6)配置页面。\n\
    \n    ![A395630_1_En_2_Fig6_HTML.jpg](A395630_1_En_2_Fig6_HTML.jpg)\n    *图 2-6.\
    \ 数据分组*\n8.  点击`Next`进入`Choose the Table Layout`页面。确保如图[2-7](#A395630_1_En_2_Chapter.html#Fig7)所示，选中`Stepped`、`Include\
    \ subtotals`和`Enable drilldown`。\n\n    ![A395630_1_En_2_Fig7_HTML.jpg](A395630_1_En_2_Fig7_HTML.jpg)\n\
    \    *图 2-7. 表格布局*\n9.  在向导的最后一页，在`Report Name`属性中输入`First Report`，然后点击`Finish`。\n\
    \n    > **注意**\n    >\n    > 在之前版本的`SQL Server`中，向导有一个额外的页面用于选择配色方案。在`SQL Server\
    \ 2016`发布时，此选项不可用。\n\n向导完成后，您将拥有一个全新的解决方案、项目和报告。报告将以设计视图显示，如图[2-8](#A395630_1_En_2_Chapter.html#Fig8)所示。\n\
    \n![A395630_1_En_2_Fig8_HTML.jpg](A395630_1_En_2_Fig8_HTML.jpg)\n*图 2-8. 设计视图中的报告*\n\
    \n在`Visual Studio`中，您可以通过三种方式查看报告：设计、预览和代码。要查看代码，请在展开`Solution Explorer`中的`Reports`文件夹后，右键单击报告名称并选择`View\
    \ Code`。图[2-9](#A395630_1_En_2_Chapter.html#Fig9)显示了部分代码文件，它是`XML`格式。\n\n![A395630_1_En_2_Fig9_HTML.jpg](A395630_1_En_2_Fig9_HTML.jpg)\n\
    *图 2-9. 报告代码*\n\n关闭代码窗口，点击`Preview`运行报告。图[2-10](#A395630_1_En_2_Chapter.html#Fig10)显示了报告的第一页。\n\
    \n![A395630_1_En_2_Fig10_HTML.jpg](A395630_1_En_2_Fig10_HTML.jpg)\n*图 2-10. 报告第1页*\n\
    \n请注意，您看到的是第1页，但总页数显示为“2？”。为了更快地将结果返回给最终用户，报告的开头部分可能在中间和结尾部分构建完成之前就已返回。点击右箭头查看更多页面。当您到达报告的最后一页时，问号会消失，因为此时已知总页数，如图[2-11](#A395630_1_En_2_Chapter.html#Fig11)所示。\n\
    \n![A395630_1_En_2_Fig11_HTML.jpg](A395630_1_En_2_Fig11_HTML.jpg)\n*图 2-11. 报告的最后一页*\n\
    \n在向导的`Choose the Table Layout`页面（参见图[2-7](#A395630_1_En_2_Chapter.html#Fig7)），您勾选了`Enable\
    \ drilldown`属性。这就是为什么您在`Australia`旁边看到加号的原因。点击加号展开该部分。`Order Year`数据现在可见。点击展开`2011`和`Order\
    \ Month 6`。现在该部分的详细信息就显示出来了。要查看`drilldown`属性的设置方式，请转到设计视图并选择`Region`行。在报告下方的`Row\
    \ Groups`部分，右键单击`table1_OrderYear`组并选择`Group Properties`。`Visibility`页面显示了`Region`如何控制`OrderYear`组的可见性，如图[2-12](#A395630_1_En_2_Chapter.html#Fig12)所示。根据我的实践经验，这个功能并不常用。\n\
    \n![A395630_1_En_2_Fig12_HTML.jpg](A395630_1_En_2_Fig12_HTML.jpg)\n*图 2-12. 可见性属性*\n\
    \n再次预览报告并展开各个部分。图[2-13](#A395630_1_En_2_Chapter.html#Fig13)显示了报告应有的样子。\n\n![A395630_1_En_2_Fig13_HTML.jpg](A395630_1_En_2_Fig13_HTML.jpg)\n\
    *图 2-13. 报告*\n\n### 使用预览按钮\n\n您可能会注意到此报告存在一些格式问题，但在学习如何纠正它们之前，请先看一下预览报告时位于报告上方、如图[2-14](#A395630_1_En_2_Chapter.html#Fig14)所示的按钮。\n\
    \n![A395630_1_En_2_Fig14_HTML.jpg](A395630_1_En_2_Fig14_HTML.jpg)\n*图 2-14. 报告预览图标*\n\
    \n在导航控件的右侧，您会看到一个指向左边的箭头，即`Back to parent`按钮。在第[6](#A395630_1_En_6_Chapter.html)章开发相互链接的报告时会用到它。您还会看到一个用于停止执行长时间运行的报告的按钮和一个刷新报告的按钮。中间是一个`Print`按钮。最有趣的按钮位于`Print`按钮的右侧。\n\
    \n#### 打印布局按钮\n\n在大约十几年前部署了一组报告后，我接到了项目经理的紧急电话。她问道，为什么报告在每一页打印内容后都会打印一页空白？当然，在从`Visual\
    \ Studio`或`Report Manager`预览报告时，报告看起来是完美的。只有在打印时，问题才会显现出来。\n\n为了查看报告在打印时的实际效果，您应该点击`Print\
    \ Layout`按钮。该按钮就在打印按钮的右侧，可在在线视图和打印视图之间切换。\n\n通过在打印布局视图中滚动浏览报告页面，您可以发现并纠正问题，然后再部署报告。在部署之前，请务必以打印布局视图查看您创建的每个报告。\n\
    \n#### 页面设置按钮\n\n`Page Setup`按钮允许您调整报告的边距，并选择纸张大小、来源和方向。默认情况下，报告的页边距为一英寸。这些边距可能过大。通过修改属性，您可以确保报告更好地适应打印页面。关于使报告适应页面的其他方法，将在第[4](#A395630_1_En_4_Chapter.html)章学习。图[2-15](#A395630_1_En_2_Chapter.html#Fig15)显示了`Page\
    \ Setup`对话框。\n\n![A395630_1_En_2_Fig15_HTML.jpg](A395630_1_En_2_Fig15_HTML.jpg)\n\
    *图 2-15. 页面设置对话框*"
  raw: "1.  Click Test Connection and click OK to dismiss the dialog if the test is\
    \ successful. If not, you may need to ask your database administrator for help\
    \ or make sure that you have the correct information supplied.  \n2.  The properties\
    \ will look something like those in Figure [2-4](#A395630_1_En_2_Chapter.html#Fig4)\
    \ . After reviewing, click OK to create the data source.\n\n![A395630_1_En_2_Fig4_HTML.jpg](A395630_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4.\n\nThe connection properties  \n3.  The Select the Data Source dialog\
    \ will resemble Figure [2-5](#A395630_1_En_2_Chapter.html#Fig5) . The Connection\
    \ String property will vary depending on your SQL Server instance.\n\n![A395630_1_En_2_Fig5_HTML.jpg](A395630_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5.\n\nThe Data Source property  \n4.  Click Next to move to the Design\
    \ the Query page. On this page, you can either use the Query Builder to visually\
    \ create the query or you can directly type in a query with no extra assistance.\
    \ Since this book is not meant to teach you T-SQL, the query has been provided.\
    \ The book Beginning T-SQL (Third Edition) , also written by the author (Apress,\
    \ 2014), may be used to learn more about the T-SQL query language.  \n5.  Type\
    \ or paste in this code which is available in the Source Code/Download area of\
    \ the Apress web site (Apress.com) and then click Next.\n\n```\n    SELECT T.[Group],\
    \ T.Name AS Region, YEAR(OrderDate) AS OrderYear,\n    Month(OrderDate) AS OrderMonth,\
    \ OrderDate, SalesOrderID, TotalDue\n    FROM Sales.SalesOrderHeader AS SOH\n\
    \    JOIN Sales.SalesTerritory AS T ON SOH.TerritoryID = T.TerritoryID;\n    ```\n\
    \n6.  On the Select the Report Type page, make sure that you select Tabular. You\
    \ will create a Matrix report later in the chapter. Click Next.  \n7.  On the\
    \ Design the Table page, you will specify which pieces of information will make\
    \ up the grouping levels of the report. You will learn more about grouping levels\
    \ in Chapter [5](#A395630_1_En_5_Chapter.html). For now, configure the page to\
    \ match Figure [2-6](#A395630_1_En_2_Chapter.html#Fig6).\n\n![A395630_1_En_2_Fig6_HTML.jpg](A395630_1_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6.\n\nGrouping the data  \n8.  Click Next to get to the Choose the\
    \ Table Layout page. Make sure that Stepped, Include subtotals, and Enable drilldown\
    \ are all selected as shown in Figure [2-7](#A395630_1_En_2_Chapter.html#Fig7).\n\
    \n![A395630_1_En_2_Fig7_HTML.jpg](A395630_1_En_2_Fig7_HTML.jpg)\n\nFigure 2-7.\n\
    \nThe table layout  \n9.  On the final page of the wizard, type First Report in\
    \ the Report Name property and click Finish.\n\nNote\n\nIn previous versions of\
    \ SQL Server, the wizard had an additional page to select a color scheme. At the\
    \ time of SQL Server 2016 release, this option was not available.\n\nOnce the\
    \ wizard is complete, you will have a new solution, project, and report. The report\
    \ will be visible in design view as shown in Figure [2-8](#A395630_1_En_2_Chapter.html#Fig8).\n\
    \n![A395630_1_En_2_Fig8_HTML.jpg](A395630_1_En_2_Fig8_HTML.jpg)\n\nFigure 2-8.\n\
    \nThe report in design view\n\nWithin Visual Studio, you can view the report in\
    \ three ways: design, preview, and code. To see the code, after expanding the\
    \ Reports folder in Solution Explorer, right-click the name of the report and\
    \ select View Code. Figure [2-9](#A395630_1_En_2_Chapter.html#Fig9) shows part\
    \ of the code file, which is XML.\n\n![A395630_1_En_2_Fig9_HTML.jpg](A395630_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9.\n\nThe report code\n\nClose the code window and click Preview to\
    \ run the report. Figure [2-10](#A395630_1_En_2_Chapter.html#Fig10) shows the\
    \ first page of the report .\n\n![A395630_1_En_2_Fig10_HTML.jpg](A395630_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10.\n\nPage 1 of the report\n\nNotice that you are looking at page\
    \ 1, but the number of pages is two with a question mark. In order to return results\
    \ more quickly to the end user, the beginning of the report may be returned before\
    \ the middle and end are constructed. Click the right arrow to view additional\
    \ pages. Once you reach the last page of the report, the question mark disappears,\
    \ since now the page count is known, as shown in Figure [2-11](#A395630_1_En_2_Chapter.html#Fig11).\n\
    \n![A395630_1_En_2_Fig11_HTML.jpg](A395630_1_En_2_Fig11_HTML.jpg)\n\nFigure 2-11.\n\
    \nThe last page of the report\n\nOn the Choose the Table Layout page of the wizard\
    \ (see Figure [2-7](#A395630_1_En_2_Chapter.html#Fig7)), you checked the Enable\
    \ drilldown property. This is why you see the plus sign next to Australia. Click\
    \ the plus sign to expand the section. The Order Year data is now in view. Click\
    \ to expand 2011 and Order Month 6\\. Now the details for that section are in\
    \ view. To see how the drilldown property is set up, go to design view and select\
    \ the Region row. In the Row Groups section beneath the report, right-click the\
    \ table1_OrderYear group and select Group Properties. The Visibility page shows\
    \ how the Region controls the visibility of the OrderYear group as shown in Figure\
    \ [2-12](#A395630_1_En_2_Chapter.html#Fig12). In practice, I have not found this\
    \ to be a popular feature.\n\n![A395630_1_En_2_Fig12_HTML.jpg](A395630_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12.\n\nThe Visibility property\n\nPreview the report again and expand\
    \ the sections. Figure [2-13](#A395630_1_En_2_Chapter.html#Fig13) shows how the\
    \ report should look.\n\n![A395630_1_En_2_Fig13_HTML.jpg](A395630_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13.\n\nThe report\n\n## Using the Preview Buttons\n\nYou may notice\
    \ that there are some formatting issues with this report, but before you learn\
    \ how to correct them, take a look at the buttons located above the report shown\
    \ in Figure [2-14](#A395630_1_En_2_Chapter.html#Fig14) that are available when\
    \ you are previewing the report.\n\n![A395630_1_En_2_Fig14_HTML.jpg](A395630_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14.\n\nThe report preview icons\n\nTo the right of the navigation controls,\
    \ you will see an arrow pointing left, the Back to parent button. You will use\
    \ this in Chapter [6](#A395630_1_En_6_Chapter.html) when you develop reports that\
    \ link to each other. You will also see a button to stop execution of a long-running\
    \ report and one to refresh the report. In the middle, there is a Print button.\
    \ The most interesting buttons are found to the right of the Print button.\n\n\
    ### The Print Layout Button\n\nAfter deploying a group of reports about a dozen\
    \ years ago, I received a frantic phone call from the project manager. Why, she\
    \ asked, was the report printing a blank page after every printed page? Of course,\
    \ while previewing the reports from Visual Studio or Report Manager, the report\
    \ looked perfect. It was only when printing did the problems surface.\n\nIn order\
    \ to see just how the reports will look when printed, you should click the Print\
    \ Layout button. This button, just to the right of the print button, toggles the\
    \ view between the online view and the print view.\n\nBy scrolling through the\
    \ report pages in print layout view, you will find problems that you can correct\
    \ before the report is deployed. Make sure that you view every report you create\
    \ in print layout before deploying it.\n\n### The Page Setup Button\n\nThe Page\
    \ Setup button allows you to adjust the margins of the report and choose the paper\
    \ size and source and the orientation. By default, the report will have one-inch\
    \ margins. These margins may be too large. By modifying the properties, you will\
    \ make sure that the report fits better on the printed page. You will learn about\
    \ additional ways to fit reports on the page in Chapter [4](#A395630_1_En_4_Chapter.html).\
    \ Figure [2-15](#A395630_1_En_2_Chapter.html#Fig15) shows the Page Setup dialog\
    \ box.\n\n![A395630_1_En_2_Fig15_HTML.jpg](A395630_1_En_2_Fig15_HTML.jpg)\n\n\
    Figure 2-15.\n\nThe Page Setup dialog"
