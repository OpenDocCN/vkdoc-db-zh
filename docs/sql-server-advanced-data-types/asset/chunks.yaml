    ## Summary


    The `FOR XML` clause can be used to construct XML data from a T-SQL query. The
    `FOR XML` clause can be used in four modes: `RAW`, `AUTO`, `PATH`, and `EXPLICIT`.


    When used in `RAW` mode, `FOR XML` will produce a flat XML instance, with no nesting.
    It is very simple to use and allows for the XML instance to be either attribute-centric
    or element-centric. It can also produce well-formed XML, by adding a root node.
    It provides very little control over formatting, however.


    `FOR XML AUTO` is very simple to use and allows the developer to create nested
    XML instances. Just as with `FOR XML RAW`, `FOR XML AUTO` can produce either element-centric
    or attribute-centric documents, which can be well-formatted with the addition
    of a root node. Data within the XML document will be nested automatically, based
    on table joins. Nodes will derive their names from table aliases.


    When used in `PATH` mode, `FOR XML` provides much more granular control over the
    layout of the XML document. Each column can be defined as either an element or
    an attribute, by including or omitting the `@` prefix.'
