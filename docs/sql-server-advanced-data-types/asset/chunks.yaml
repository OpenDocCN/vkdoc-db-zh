- fmt: "# Chapter 11 Working with Spatial Data\n\n## UnionAggregate\nReturns a union\
    \ of a set of spatial objects.\n\nNow that you are aware of the spatial methods\
    \ that SQL Server exposes, you can look at how they can be employed in practice,\
    \ by using the `WideWorldImporters` database. Imagine that we are responsible\
    \ for delivery routes, and we must plan a route in Alabama.\n\nThe first thing\
    \ that we want to do is validate our data. Are all our customers, with delivery\
    \ locations marked as being in Alabama, actually within the Alabama state border?\
    \ The `Sales.Customers` table contains a `GEOGRAPHY` column called `DeliveryLocation`,\
    \ with each row containing a `Point` object that maps their delivery address.\
    \ We can use the `STWithin` method against this column, passing in the `Border`\
    \ column from the `Application.StateProvinces` table, which maps the state border.\
    \ This is demonstrated in Listing 11-9.\n\n***Listing 11-9.*** Validating That\
    \ All Addresses Are Within the Alabama State Border\n\n```sql\nDECLARE @StateBorder\
    \ GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n    WHERE\
    \ StateProvinceName = 'Alabama') ;\n\nSELECT\n    Customer.CustomerName AS CustomerName\n\
    \    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString() AS DeliveryLocation\n\
    FROM SALES.Customers Customer\nINNER JOIN Application.Cities City\n    ON City.CityID\
    \ = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
    \ = 1 ;\n```\n\n![](index-336_1.jpg)\n\nThe results of this query (which are displayed\
    \ in Figure 11-6) validate that all 16 customers with Alabama delivery addresses\
    \ actually reside in Alabama.\n\n***Figure 11-6.*** Results of validating that\
    \ all addresses are within the Alabama state border.\n\nNext, we want to check\
    \ the distance of each delivery location from our depot and order the results\
    \ by that distance. This will help us plan the route. This technique is known\
    \ as finding nearest neighbors and is demonstrated in Listing 11-10, which calculates\
    \ the distance and orders the results, by using the `DeliveryLocation` from the\
    \ `Application.SystemParameters` table, which marks the location of `WideWorldImporters`.\n\
    \n**Note:** The `WideWorldImporters` depot is in California, but while the distances\
    \ to the Alabama locations are vast, they still allow us to plan the driver’s\
    \ most sensible route.\n\n***Listing 11-10.*** Finding Nearest Neighbors\n\n```sql\n\
    DECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n\
    \    WHERE StateProvinceName = 'Alabama') ;\n\nDECLARE @Office GEOGRAPHY = (\n\
    \    SELECT DeliveryLocation\n    FROM Application.SystemParameters) ;\n\nDECLARE\
    \ @MilesRatio INT = 0.000621371 ;\n\nSELECT\n    Customer.CustomerName AS CustomerName\n\
    \    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString() AS DeliveryLocation\n\
    \    , Customer.DeliveryLocation.STDistance(@Office) * @MilesRatio AS DeliveryDistanceMiles\n\
    FROM SALES.Customers Customer\nINNER JOIN Application.Cities City\n    ON City.CityID\
    \ = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
    \ = 1\nORDER BY DeliveryDistanceMiles ;\n```\n\n![](index-338_1.jpg)\n\nThe results\
    \ of this query can be seen in Figure 11-7.\n\n***Figure 11-7.*** Results of finding\
    \ nearest neighbors.\n\nYou will notice that in Listing 11-10, the distance is\
    \ multiplied by `0.000621371`. This is because the distance is natively in meters.\
    \ The unit of measurement of distance is associated with the `SRID`, so we can\
    \ double check this, by enhancing our query to expose the `SRID`, as shown in\
    \ Listing 11-11. This query exposes the `STRid` property of each spatial instance\
    \ and uses this value to join to the `sys.spatial_reference_systems` system table,\
    \ to expose the unit of measure column.\n\n***Listing 11-11.*** Exposing the SRID\n\
    \n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n\
    \    WHERE StateProvinceName = 'Alabama') ;\n```"
