    \n### Using ISJSON()\n\nBecause JSON data is stored in `NVARCHAR(MAX)` columns,\
    \ as opposed to using its own data type, it is very useful to ensure that a tuple\
    \ contains a valid JSON document, before calling a JSON function against it. The\
    \ `ISJSON()` function will evaluate a string to check if it is a valid JSON document.\
    \ The function will return a value of 1 if the string is valid JSON and 0 if it\
    \ is not. Therefore, a common usage of the function is within an `IF` statement.\
    \ For example, consider the query in Listing 9-1.\n\n© Peter A. Carter 2018\n\
    P. A. Carter, *SQL Server Advanced Data Types*, [https://doi.org/10.1007/978-1-4842-3901-8_9](https://doi.org/10.1007/978-1-4842-3901-8_9)\n\
    \n![](index-263_1.jpg)\n\n*Listing 9-1. Incorrectly Formatted JSON*\n\n```sql\n\
    DECLARE @JSON NVARCHAR(MAX) ;\nSET @JSON = '{\"I am not:\"Correctly formatted\"\
