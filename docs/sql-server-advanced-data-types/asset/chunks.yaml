- fmt: "# Chapter 3 Constructing XML with T-SQL\n\n## Using FOR XML EXPLICIT\n\n`FOR\
    \ XML EXPLICIT` is the most complex of the `FOR XML` modes, but it also provides\
    \ ultimate flexibility. It uses the concept of tags and parents to control nesting.\
    \ A tag designates a node’s position within the hierarchy, and parent indicates\
    \ the tag of the node that resides above it in the hierarchy. Therefore, the top-level\
    \ node will have a tag of 1 and a parent of `NULL`. Each node is specified in\
    \ a separate query, and the queries are joined using `UNION ALL`.\n\nFor example,\
    \ imagine that we want to expand the example in Listing 3-18 so that we return\
    \ an `OrderDetails` element that has two child elements. The first will contain\
    \ the name of the salesperson who took the order. The second will be a repeating\
    \ element, detailing the line items within the order. We could achieve this by\
    \ using the query in Listing 3-19.\n\n`Listing 3-19.` Order Details with XML Explicit\n\
    \n```sql\nSELECT\n    1 AS Tag\n    , 0 AS Parent\n    , SalesOrder.OrderID AS\n\
    \      [OrderDetails!1!SalesOrderID]\n    , SalesOrder.OrderDate AS\n      [OrderDetails!1!OrderDate]\n\
    \    , SalesOrder.CustomerID AS\n      [OrderDetails!1!CustomerID]\n    , NULL\
    \ AS [SalesPerson!2!SalesPersonName]\n    , NULL AS [LineItem!3!LineTotal!ELEMENT]\n\
    \    , NULL AS [LineItem!3!ProductName!ELEMENT]\n    , NULL AS [LineItem!3!OrderQty!ELEMENT]\n\
    FROM Sales.Orders SalesOrder\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\nWHERE customers.CustomerName = 'Agrita Abele'\n\nUNION\
    \ ALL\n\nSELECT\n    2 AS Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n \
    \   , NULL\n    , NULL\n    , People.FullName\n    , NULL\n    , NULL\n    , NULL\n\
    FROM Sales.Orders SalesOrder\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\nINNER JOIN Application.People People\n    ON People.PersonID\
    \ = SalesOrder.SalespersonPersonID\nWHERE customers.CustomerName = 'Agrita Abele'\n\
    \nUNION ALL\n\nSELECT\n    3 AS Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n\
    \    , NULL\n    , NULL\n    , People.FullName\n    , LineItem.UnitPrice\n   \
    \ , Product.StockItemName\n    , LineItem.Quantity\nFROM Sales.Orders SalesOrder\n\
    INNER JOIN Sales.OrderLines LineItem\n    ON SalesOrder.OrderID = LineItem.OrderID\n\
    INNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID = SalesOrder.CustomerID\n\
    INNER JOIN Warehouse.StockItems Product\n    ON Product.StockItemID = LineItem.StockItemID\n\
    INNER JOIN Application.People People\n    ON People.PersonID = SalesOrder.SalespersonPersonID\n\
    WHERE customers.CustomerName = 'Agrita Abele'\nORDER BY\n    [OrderDetails!1!SalesOrderID]\n\
    \    , [SalesPerson!2!SalesPersonName]\n    , [LineItem!3!LineTotal!ELEMENT]\n\
    FOR XML EXPLICIT, ROOT('SalesOrders');\n```\n\nThere are various things that we\
    \ should note about the query in Listing 3-19. First, each complex node is in\
    \ its own query, and these queries are connected by using `UNION ALL`. Just like\
    \ every use of `UNION ALL`, each query must have the same number of columns. Therefore,\
    \ `NULL` values are used when a node does not exist within the complex node being\
    \ defined by the query. Also, note that the `OrderID` column is used in all three\
    \ queries. This column is used to define which salespeople, and line details should\
    \ be ordered under each sales order.\n\n```sql\nCustomerName 'OrderHeader/CustomerName'\n\
    , OrderDate 'OrderHeader/OrderDate'\n, OrderID 'OrderHeader/OrderID'\n, (\n  \
    \  SELECT\n        LineItems2.StockItemID '@ProductID'\n        , StockItems.StockItemName\
    \ '@ProductName'\n        , LineItems2.UnitPrice '@Price'\n        , Quantity\
    \ '@Qty'\n    FROM Sales.OrderLines LineItems2\n    INNER JOIN Warehouse.StockItems\
    \ StockItems\n        ON LineItems2.StockItemID = StockItems.StockItemID\n   \
    \ WHERE LineItems2.OrderID = Base.OrderID\n    FOR XML PATH('Product'), TYPE\n\
    ) 'OrderDetails'\nFROM (\n    SELECT DISTINCT\n        Customers.CustomerName\n\
    \        , SalesOrder.OrderDate\n        , SalesOrder.OrderID\n    FROM Sales.Orders\
    \ SalesOrder\n    INNER JOIN Sales.OrderLines LineItem\n        ON SalesOrder.OrderID\
    \ = LineItem.OrderID\n    INNER JOIN Sales.Customers Customers\n        ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\n    WHERE customers.CustomerName = 'Agrita Abele'\n\
    ) Base\nFOR XML PATH('Order'), ROOT ('SalesOrders');\n```"
