    `GEOMETRYCOLLECTION(POINT(1 1),POINT(2 2))` | `0x00000000010402000000000000000000F03F000000000000F03F000000000000004000000003000000FFFFFFFF0000000007000000000-`\n\
    \n## 空间参考系统\n\n当使用 `GEOGRAPHY` 数据类型时，我们必须意识到，对于如何表示地球并没有一个统一的单一视图。相反，存在多种参考系统，称为空间参考系统。每个系统提供其自身的地图投影。每个系统由一个\
    \ `SRID` （空间参考标识符）来标识。可以通过查询 `sys.spatial_reference_systems` 系统表来查找 SQL Server\
    \ 支持的 `SRID`，如清单 10-1 所示。\n\n![](img/index-302_1.jpg)\n\n**提示** 地球无法在不产生变形的情况下被建模在平面上。地图投影定义了哪些变形是可接受的，哪些是不可接受的。每种投影允许不同的变形。\n\
    \n**清单 10-1.** 查找空间参考\n\n```sql\nSELECT *\nFROM sys.spatial_reference_systems\
    \ ;\n```\n\n此查询的部分结果可在图 10-5 中找到。\n\n**图 10-5.** 查找空间参考系统的结果\n\n您会注意到，该表提供了每个空间参考（SR）的各种详细信息，包括其\
    \ ID；开发和维护它的权威机构；测量单位，以及该单位相对于米这一基本度量单位的换算系数；并且最有趣的是，提供了由 OGC 定义的 SR 的 WKT。\n\n\
    让我们检查一下微软实现的 SR（`SRID` 104001）的 WKT，其详细信息在清单 10-2 中给出。\n\n**清单 10-2.** SRID 104001\
    \ 的 WKT\n\n```\nGEOGCS[\"Unit Sphere\",\n DATUM[\"Unit Sphere\",\n  SPHEROID[\"\
    Sphere\", 1.0, 0.0]\n ],\n PRIMEM[\"Greenwich\",0.0],\n UNIT[\"Degree\", 0.0174532925199433]\n\
    ]\n```\n\n请注意，该 WKT 使用 JSON 格式（有关 JSON 的详细讨论，请参见第 6-9 章），并指定了地图投影的详细信息，例如本初子午线和测量单位。\n\
    \n**注意** 重要的是要注意，虽然单个 `GEOGRAPHY` 列可以包含基于多个空间参考系统的值，但无法比较这些值。空间函数要求所有值具有相同的 `srid`，因为它们包含计算所需的背景信息。然而，可以在执行比较之前将一个值转换到不同的\
    \ `srid`。\n\n![](img/index-304_1.jpg)\n\n## SSMS 与空间数据\n\nSQL Server Management\
    \ Studio (SSMS) 提供了图形化结果，以帮助开发者处理空间数据。例如，想象一个简单的脚本，如清单 10-3，它声明了一个 `GEOMETRY`\
    \ 类型的变量，并将其设置为包含一个简单的 `CurvePolygon`。\n\n**清单 10-3.** 使用 GEOMETRY 声明 CurvePolygon\n\
    \n```sql\nDECLARE @CurvePolygon GEOMETRY =\n'CURVEPOLYGON(CIRCULARSTRING(1 3,\
    \ 3 5, 4 7, 7 3, 1 3))' ;\n\nSELECT @CurvePolygon ;\n```\n\n常规的结果选项卡将返回该曲面的 `WKB`，采用十六进制表示法，如图\
    \ 10-6 所示。\n\n**图 10-6.** WKB 格式的结果\n\n![](img/index-305_1.jpg)\n"
- fmt: '# Chapter 10 Understanding Spatial Data


    You will notice, however, that a new tab, `Spatial results`, is present between
    the `Results` and `Messages` tabs. This pane can be seen in Figure 10-7.


    **Figure 10-7.** `Spatial results` tab—`GEOMETRY`


    You will notice that we can see a graphical representation of our surface, along
    with some basic controls that allow us to zoom in and out and also flick between
    columns, if the result set contains multiple spatial columns. It is also possible
    to scroll around the object, by dragging the mouse.


    Consider Listing 10-4. You will notice that the script is very similar to Listing
    10-3, except that we are now declaring a variable of type `GEOGRAPHY`, instead
    of `GEOMETRY`.


    **Listing 10-4.** Declaring a `CurvePolygon` with `GEOGRAPHY`


    ```sql

    DECLARE @CurvePolygon GEOGRAPHY = ''CURVEPOLYGON(CIRCULARSTRING(1 3, 3 5, 4 7,
    7 3, 1 3))'' ;

    SELECT @CurvePolygon ;

    ```


    ![](index-306_1.jpg)


    Figure 10-8 shows the `Spatial results` tab for this script. You will notice that
    the grid has changed to degrees, as opposed to Euclidean style coordinates, to
    reflect that a round-earth model is now in use, and our coordinates are actually
    longitude and latitude.


    **Figure 10-8.** `Spatial results` tab—`GEOGRAPHY`


    ## Summary


    SQL Server provides two data types for working with spatial data: `GEOMETRY` and
    `GEOGRAPHY`. `GEOMETRY` allows you to work in a Euclidean (flat-earth) model,
    while `GEOGRAPHY` allows you to work in a round-earth model. SQL Server’s spatial
    implementation is based on standards set out by the Open Geospatial Consortium
    (`OGC`).


    Spatial shapes, known as surfaces, can be defined by using either well-known text
    (`WKT`) or well-known binary (`WKB`), which are standards set out by the `OGC`.
    When working with `WKT`, the surface type is defined by name, followed by its
    points specification. When working with `WKB`, you can control the order of bytes
    before specifying the surface type and, finally, the points specification. `WKB`
    is usually represented using hexadecimal notation.


    SQL Server supports the following primitive and multipart geographies, as well
    as support for a `FullGlobe` geometry, when using `GEOGRAPHY` in SQL Server 2017
    or later versions:


    - `Point`

    - `LineString`

    - `CircularString`

    - `CompoundCurve`

    - `Polygon`

    - `CurvePolygon`

    - `MultiPoint`

    - `MultiLineString`

    - `MultiPolygon`

    - `GeometryCollection`


    SQL Server supports many spatial reference systems. This is important when working
    with `GEOGRAPHY`, as each `SRID` implements its own map projections. Surfaces
    with conflicting `SRID`s can be stored in the same column but cannot be compared
    using spatial functions.


    SQL Server Management Studio provides graphical results for spatial queries. The
    `Spatial results` tab allows you to move around a surface, zooming in and out.
    The grid will change between Euclidean coordinates and latitude/longitude, depending
    on the data type of the results.


    # Chapter 11 Working with Spatial Data


    In Chapter 10, I discussed the concepts associated with spatial data, which SQL
    Server implements using the `GEOMETRY` and `GEOGRAPHY` data types.


    In this chapter, I will examine how to work with these data types. First, I will
    discuss the methods that can be used to construct surfaces, before reviewing how
    to query spatial data. Finally, you will see how to design and create spatial
    indexes.


    **Caution** A geospatial object can be referred to as a `geometry`, with simple
    objects referred to as primitive geometries and collections of objects referred
    to as `geometry` collections. Because `geometry` is also the name of the data
    type that implements spatial data as a flat-earth model, this can cause confusion.
    Therefore, please note that when this chapter refers to a geospatial object, the
    word `geometry` will be used in lowercase. When referring to the data type, the
    uppercase word `GEOMETRY` will be used.'
