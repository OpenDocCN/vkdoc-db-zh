  trans: "\n# 将 SqlHierarchyId 的二进制表示形式写入 BinaryWriter。仅适用于 SQL CLR。使用 T-SQL 时，请改用\
    \ `CAST` 或 `CONVERT`。\n\n**提示：** `HierarchyID` 方法区分大小写。例如，调用 `tostring()` 会引发错误；调用\
    \ `ToString()` 则会成功。\n\n## 使用 HierarchyID 方法\n\n以下各节介绍如何使用 `HierarchyID` 数据类型所公开的方法。\n\
    \n### 使用 ToString( )\n\n如果对具有 `HierarchyID` 数据类型的列运行 `SELECT` 语句，返回的值将是该节点的十六进制表示形式。若要查看节点的文本表示形式，必须使用\
    \ `ToString()` 方法。例如，考虑清单 12-9 中的查询。\n\n#### 清单 12-9. 使用 ToString()\n```sql\n\
    USE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\n    , SalesAreaHierarchy\n\
    \    , SalesAreaHierarchy.ToString() AS SalesAreaHierarchyString\nFROM Sales.SalesAreaHierarchyID\
    \ ;\n```\n\n此查询的结果显示在图 12-6 中。您会看到，一旦对其调用 `ToString()` 方法，该列就变得人类可读。\n\n![](img/index-369_1.jpg)\n\
    \n**图 12-6.** 使用 `ToString()` 的结果\n\n### 使用 Parse( )\n\n当节点的字符串表示形式被插入到 `HierarchyID`\
    \ 列时，会隐式调用 `Parse()` 方法。本质上，`Parse()` 方法执行的是与 `ToString()` 方法相反的功能。它尝试将格式化的字符串表示形式转换为\
    \ `HierarchyID` 表示形式。如果失败，则会引发错误。例如，考虑清单 12-10 中的脚本。\n\n#### 清单 12-10. 使用 Parse()\
    \ 方法\n```sql\n--返回节点的十六进制表示形式\nSELECT HierarchyID::Parse('/1/1/2/2/') ;\n\n--由于缺少尾部斜杠\
    \ / 而引发错误\nSELECT HierarchyID::Parse('/1/1/2/2') ;\n```\n\n运行此脚本显示的“结果”选项卡如图 12-7\
    \ 所示。第一个查询显示了预期结果，而第二个查询则不返回任何结果。\n\n![](img/index-370_1.jpg)\n\n**图 12-7.** 使用\
    \ `Parse()` 的结果选项卡\n\n查看图 12-8 所示的“消息”选项卡，会详细说明 .NET 框架引发的错误。\n\n![](img/index-371_1.jpg)\n\
    \n**图 12-8.** .NET 框架引发的错误\n\n### 使用 GetRoot( )\n\n`GetRoot()` 方法将返回层次结构的根节点，如清单\
    \ 12-11 所示。\n\n#### 清单 12-11. 使用 GetRoot()\n```sql\nUSE WideWorldImporters\nGO\n\
    \nSELECT\n    SalesAreaName\n    , SalesAreaHierarchy.ToString()\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy = HierarchyID::GetRoot() ;\n```\n\n此查询的结果可查看图 12-9。\n\
    \n![](img/index-372_1.jpg)\n\n**图 12-9.** 使用 `GetRoot()` 的结果\n\n### 使用 GetLevel(\
    \ )\n\n`GetLevel()` 方法允许您确定特定节点位于层次结构的哪一级别。例如，清单 12-12 中的查询将返回位于层次结构最低级别的所有节点。在我们的例子中，这仅是纽约。\n\
    \n子查询将确定层次结构中的最大级别，外部查询将返回位于该级别的所有销售区域。\n\n#### 清单 12-12. 使用 GetLevel()\n```sql\n\
    USE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.GetLevel() =\n(\n    SELECT\n        MAX(SalesAreaHierarchy.GetLevel())\n\
    \    FROM Sales.SalesAreaHierarchyID\n) ;\n```\n\n此查询的结果如图 12-10 所示。\n\n![](img/index-373_1.jpg)\n\
    \n**图 12-10.** 使用 `GetLevel()` 的结果\n\n### Read( ) 和 Write( )\n"
- fmt: "Because this chapter focuses on how to use `HierarchyID` within your T-SQL\
    \ code and the `Read()` and `Write()` methods are only applicable to using SQLCLR\
    \ (the technology that allows for managed objects to be created inside SQL Server),\
    \ a full description of the `Read()` and `Write()` methods is beyond the scope\
    \ of this book.\n\n## Using GetDescendant( )\n\nOf course, a developer could insert\
    \ a new node into the hierarchy, between existing nodes, but the `GetDescendant()`\
    \ method helps a developer do this pragmatically. The method accepts two parameters,\
    \ both of which can be `NULL` and represent existing children. The method will\
    \ then generate a node value, using the following rules:\n\n*   If the parent\
    \ is `NULL`, then a `NULL` value will be returned.\n*   If the parent is not `NULL`,\
    \ and both parameters are `NULL`, the first child of the parent will be returned.\n\
    *   If the parent and first parameter are not `NULL`, but the second parameter\
    \ is `NULL`, a child of parent greater than the first parameter will be returned.\n\
    *   If the parent and second parameter are not `NULL` but the first parameter\
    \ is `NULL`, a child of parent smaller than the second parameter will be returned.\n\
    *   If parent and both parameters are not `NULL`, a child of parent between the\
    \ two parameters will be returned.\n*   If the first parameter is not `NULL` and\
    \ not a child of the parent, an error is thrown.\n*   If the second parameter\
    \ is not `NULL` and not a child of the parent, an error is thrown.\n*   If the\
    \ first parameter is greater than or equal to the second parameter, an error is\
    \ thrown.\n\nFor example, imagine that we want to create with the parent of `America`\
    \ a new sales area called `Spain`. We want the node value to be between `Canada`\
    \ and `USA`. We could achieve this with the query in Listing 12-13.\n\n**Tip**:\
    \ Obviously, `Spain` should be included under `Western Europe`, not under `America`.\
    \ Don’t worry, this is a deliberate error, which we will resolve in the “Using\
    \ GetReparentedValue” section of this chapter.\n\n### Listing 12-13. Generating\
    \ a New Hierarchy Node\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT NewNode.ToString()\n\
    FROM\n(\n    SELECT\n        SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40) AS\
    \ NewNode\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'America'\n\
    ) NewNode ;\n```\n\nThe results produced by this query are illustrated in Figure\
    \ 12-11.\n\nYou will see that the lowest level contains a period (`1.1`). This\
    \ is because `Canada` has a value of `1` and `USA` has a value of `2`. Therefore,\
    \ to generate a node value between the two, an integer cannot be used. This guarantees\
    \ that a new node can always be inserted between two existing nodes.\n\n### Figure\
    \ 12-11. Results of using GetDescendant()\n\nTo programmatically add the `Spain`\
    \ sales area to the hierarchy, we could use the query in Listing 12-14.\n\n###\
    \ Listing 12-14. Insert a New Node into the Hierarchy\n\n```sql\nUSE WideWorldImporters\n\
    GO\nINSERT INTO Sales.SalesAreaHierarchyID\n(\n    SalesAreaID\n    , SalesAreaHierarchy\n\
    \    , SalesAreaName\n    , CountOfSalesPeople\n    , SalesYTD\n)\nSELECT\n  \
    \  (SELECT MAX(SalesAreaID) + 1 FROM Sales.SalesAreaHierarchyID)\n    , SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40)\n\
    \    , 'Spain'\n    , 2\n    , 200000\nFROM Sales.SalesAreaHierarchyID\nWHERE\
    \ SalesAreaName = 'America' ;\n```\n\n## Using GetReparentedValue( )\n\nAs you\
    \ probably noticed in the “Using GetDescendant()” section, the `Spain` sales area\
    \ was incorrectly created under the `America` aggregation area, as opposed to\
    \ the `Western Europe` aggregation area. We can resolve this issue by using the\
    \ `GetReparentedValue()` method.\n\nConsider the script in Listing 12-15. First,\
    \ we declare two variables, with the type `HierarchyID`. These will be passed\
    \ as parameters into the `GetReparentedValue()` method. The `@America` variable\
    \ is populated..."
