    \ OrderID=\"73356\">\n\n<Customers CustomerName=\"Agrita Abele\">\n\n<Product\
    \ StockItemName=\"Ride on vintage American toy coupe\n(Black) 1/12 scale\">\n\n\
    <LineItem Quantity=\"10\" UnitPrice=\"285.00\" />\n\n</Product>\n\n</Customers>\n\
    \n</SalesOrder>\n```\n\n# Chapter 3 ConstruCting XML with t-sQL\n\nYou can see\
    \ that when `AUTO` mode is used, the `FOR XML` clause has automatically nested\
    \ the data based on the `JOIN` clauses within the query. Each element has been\
    \ assigned a name, based on the table alias of the table from which it was retrieved.\
    \ Just as with `RAW` mode, we can use the `ROOT` keyword to add a root node and\
    \ make the document well-formed. We can also make the document element-centric\
    \ with the `ELEMENTS` keyword.\n\nIf you look closely at the document in Listing\
    \ [3-11](#index_split_000.html#p90) you will notice that the resulting hierarchy\
    \ is not ideal. `<Customers>` is nested under `<SalesOrders>`, and `<LineItem>`\
    \ is nested under `<Product>`. In this document, however, you would naturally\
    \ expect the hierarchy to be `<Customers>` `<SalesOrders>` `<LineItem>` `<Product>`.\
    \ To achieve this, we would have to rewrite the query, as per Listing [3-12](#index_split_001.html#p98).\n\
    \n## Listing 3-12\n\nRewriting the Query to Nest Data Correctly\n\n```sql\nSELECT\n\
    \    Customers.CustomerName\n    , SalesOrder.OrderDate\n    , SalesOrder.OrderID\n\
    \    , LineItem.Quantity\n    , LineItem.UnitPrice\n    , Product.StockItemName\n\
    FROM Sales.Orders SalesOrder\nINNER JOIN Sales.OrderLines LineItem\n    ON LineItem.OrderID\
    \ = SalesOrder.OrderID\nINNER JOIN Warehouse.StockItems Product\n    ON Product.StockItemID\
    \ = LineItem.StockItemID\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\nWHERE customers.CustomerName = 'Agrita Abele'\nFOR\
    \ XML AUTO ;\n```\n\nNote that the order of columns has changed, so that the `Customers`\
    \ table is referenced before the `SalesOrders` table, which, in turn, is referenced\
    \ before the `OrderLines` table. The `StockItems` table is the last to be referenced.\
    \ You will also notice that we did not have to change the order of the joins,\
    \ to produce the document shown in Listing [3-13](#index_split_001.html#p98).\n\
    \n## Listing 3-13\n\nResults of Rewritten Query"
