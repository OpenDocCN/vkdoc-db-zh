    new column in the result set, which contains an XML fragment. This fragment has
    an element called


    CustomerDetails. Within this element, you will notice an attribute called GoldCustomer.
    This is a flag that is configured from a T-SQL variable.


    Note that when used inside the query() method, we have enclosed the


    sql:variable statement inside double quotes and curly brackets.


    ***Listing 4-10.*** Constructing an XML Fragment and Passing a Value from a T-SQL
    Variable


