  raw: 'Because the SalesPerson and LineItem nodes are siblings, both the


    second and third queries have their parent configured as 1, which is


    the tag of the first query. This means that both will be nested under the OrderDetails
    node, at the same level of the hierarchy. The query defining the OrderDetails
    node has its parent configured as NULL. This denotes


    Chapter 3 ConstruCting XML with t-sQL


    that it is at the top of the hierarchy, with the exception of the root node, which
    is defined in the FOR XML clause.


    As with other UNION ALL queries, where column names are derived


    from the first query, the node names are taken from the first query. If you examine
    the column aliases in the first query, you will clearly see how


    the structure of the node names is defined. The name parts are separated


    with a !. The first name part defines the name of the complex node. The


    second part describes the ID of the tag that is being named. The third part of
    the name defines the name of the node that will store the data within


    the column. By default, FOR XML EXPLICIT is attribute-centric. Therefore, if you
    require a node to be an element, you must add a fourth part to the name, known
    as the ELEMENT directive.


    The query in Listing [3-19 pr](#index_split_001.html#p113)oduces the XML document
