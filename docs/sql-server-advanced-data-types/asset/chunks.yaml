    # 第 8 章 拆解 JSON 数据


    ## 图 8-5. 使用带显式架构的 OPENJSON()的结果


    当返回的某一列本身是 JSON 对象时，情况会稍显复杂。例如，考虑代码清单 8-7 中的查询，它在查询中增加了`OtherLanguages`列。由于没有特定的
    JSON 数据类型，我们将使用`NVARCHAR(MAX)`，因为它可以作为`NVARCHAR(MAX)`存储在表中。


    ### 代码清单 8-7. 添加一个 JSON 列


    ```sql

    DECLARE @CustomFields NVARCHAR(MAX) ;


    SET @CustomFields =


    (


    SELECT


    CustomFields


    FROM Application.People


    WHERE PersonID = 2


    ) ;


    SELECT *


    FROM OPENJSON(@CustomFields)


    WITH (


    OtherLanguages NVARCHAR(MAX)


    , HireDate DATETIME2


    , Title NVARCHAR(50)


    , PrimarySalesTerritory NVARCHAR(50)


    , CommissionRate DECIMAL(5,2)


    ) ;

    ```


    此查询返回的结果如图 8-6 所示。


    ### 图 8-6. 添加 JSON 列后的结果


    那么，为什么`OtherLanguages`列返回了`NULL`呢？我们知道该列存在，并且根据本章前面的示例，它包含`PersonID`为 2 的数据。当从`OPENJSON()`返回一个
    JSON 对象时，我们必须在`WITH`子句中使用额外的语法来指定该`NVARCHAR`实际代表一个 JSON 对象，如代码清单 8-8 所示。


    ### 代码清单 8-8. 正确返回 JSON 数组或对象


    ```sql

    DECLARE @CustomFields NVARCHAR(MAX) ;


    SET @CustomFields =


    (


    SELECT


    CustomFields


    FROM Application.People


    WHERE PersonID = 2


    ) ;


    SELECT *


    FROM OPENJSON(@CustomFields)


    WITH (


    OtherLanguages NVARCHAR(MAX) AS JSON


    , HireDate DATETIME2


    , Title NVARCHAR(50)


    , PrimarySalesTerritory NVARCHAR(50)


    , CommissionRate DECIMAL(5,2)


    ) ;

    ```


    现在脚本将返回我们期望的结果，如图 8-7 所示。


    ### 图 8-7. 正确返回 JSON 数据


    当需要拆解多行数据时，在使用`OUTER APPLY`运算符时也可以指定显式架构。请记住，`OUTER APPLY`运算符不会像`CROSS APPLY`那样删除返回`NULL`值的行。代码清单
    8-9 演示了这一点。


    ### 代码清单 8-9. 与 OUTER APPLY 一起使用显式架构


    ```sql

