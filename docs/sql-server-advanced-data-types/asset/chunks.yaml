    \ 12-5. Bringing It All Together\n\n```sql\nWITH AreaHierarchy (SalesAreaID, SalesYTD,\
    \ ParentSalesAreaID)\nAS\n(\n    SELECT\n        SalesAreaID\n        , SalesYTD\n\
    \        , ParentSalesAreaID\n    FROM Sales.SalesAreaTraditionalHierarchy RootLevel\n\
    \    WHERE SalesAreaName = 'America'\n    UNION ALL\n    SELECT\n        Area.SalesAreaID\n\
    \        , Area.SalesYTD\n        , Area.ParentSalesAreaID\n    FROM Sales.SalesAreaTraditionalHierarchy\
    \ Area\n    INNER JOIN AreaHierarchy\n        ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n\
    )\nSELECT SUM(SalesYTD)\nFROM AreaHierarchy ;\n```\n\nstatement, which rolls up\
    \ the `SalesYTD`, to return the total of `SalesYTD` for the whole of America.\
    \ The script in Listing 12-5 brings all these components together.\n\n## Modeling\
    \ Hierarchies with HierarchyID\n\nWhen modeling hierarchical data using `HierarchyID`,\
    \ there is no need to perform a self-join against a table. Therefore, instead\
    \ of having a column that references its parent area’s primary key, we will instead\
    \ have a `HierarchyID` column, which defines each area’s position within the hierarchy.\
    \ To explain this concept further, let’s consider the data in Table 12-2.\n\n\
