    You can see that the element-centric document still returns one element, called
    `<row>`, per row in the relational result set. Instead of the data being contained
    in attributes, however, it is stored in the form of child elements. Each child
    element has been given the name of the column, from which the data has been returned.
    The data is still flat, however. There is no hierarchy based on logic or physical
    table structure.


    It is possible to give the `<row>` element a more meaningful name. In our example,
    the most meaningful name would be `<LineItem>`. Listing 3-8 demonstrates how we
    can use an optional argument in our `FOR XML` clause, to generate this name for
    the element.


    ### Listing 3-8. Generating a Name for the `<row>` Element


    ```sql

    SELECT

    SalesOrder.OrderDate

    , Customers.CustomerName

    , SalesOrder.OrderID

    , Product.StockItemName

    , LineItem.Quantity

    , LineItem.UnitPrice

    FROM Sales.Orders SalesOrder

    INNER JOIN Sales.OrderLines LineItem

    ON LineItem.OrderID = SalesOrder.OrderID

    INNER JOIN Warehouse.StockItems Product

    ON Product.StockItemID = LineItem.StockItemID

    INNER JOIN Sales.Customers Customers

    ON Customers.CustomerID = SalesOrder.CustomerID

    WHERE customers.CustomerName = ''Agrita Abele''

    FOR XML RAW (''LineItem''), ELEMENTS, ROOT(''SalesOrders'') ;

