    well- known binary, or they can be constructed by using a Microsoft


    extended method from GML. SQL Server also supports passing


    well-known text directly into a variable of a table’s cell.


    A wealth of methods exist that allow developers to easily interact


    with spatial data. Commonly used methods include STDistance, which


    will return the distance between two geometries, and STWithin, which


    will check if an instance resides within the same space as another. There are
    also aggregate methods that allow multiple instances to have union,


    envelope, and convex hull applied to them as a group, as well as converting multiple
    instances to a single collection.


    SQL Server provides spatial indexes, which can improve the performance


    of certain types of queries. The index support for queries depends on the data
    type, the method in the WHERE or JOIN clause, and the arithmetic operator used.


    Spatial indexes use B-Tree structures, but before the B-Tree is created,


    a grid system of space is created, with four nested levels. The spatial


    instances from the column are then read one by one into the grid system,


    and their touched cells are numbered, using a Hilbert curve. This means


    that spatial instances can be indexes in a linear fashion, but detailing their
    proximity to each other.


    **CHAPTER 12**


    **Working with**


    **Hierarchical Data**


    **and HierarchyID**


    Modeling and working with data hierarchies have long been requirements


    for SQL Server developers. Traditionally, hierarchical data has been


    modeled using a self-join on a table, between two columns. One column


    contains the ID of the hierarchical member, and the other, the ID of its


    parent hierarchical member. Newer versions of SQL Server (2008 and


    later versions) offer HierarchyID, however. HierarchyID is a data type


    written in .NET and exposed in SQL Server. Using HierarchyID can offer


    performance benefits and simplified code, compared to using a table


    with a self-join. The data type exposes many methods that can be called


    against the data, to allow developers to easily determine the ancestors and descendants
    of a hierarchical member, as well as determine other useful


    information, such as the level of a specific hierarchical member within the hierarchy.


    In this chapter, we will examine first the use cases for hierarchical data.


    I will discuss how to model a traditional hierarchy, before explaining how we
    can remodel it using HierarchyID. Finally, we will look at the methods that are
    exposed against the HierarchyID data type.'
  trans: '# 第 11 章：处理空间数据


    空间页面如图 11-13 所示。在这里，我们可以配置索引的空间特定选项。在页面的“常规”部分，我们可以选择我们的细分系统——自动或手动。如果选择手动，页面的“网格”区域将被激活，我们可以选择想要使用的网格密度。如果选择了手动几何系统，页面的“边界框”区域也会被激活，我们可以指定边界框坐标。


    ![index-348_1.jpg](img/index-348_1.jpg)


    **图 11-13.** 新建索引对话框 - 空间页


    **提示：** 几何系统必须用于 `GEOMETRY` 列，地理系统必须用于 `GEOGRAPHY` 列。


    或者，我们可以使用 T-SQL 来创建索引。清单 11-13 中的脚本将创建与之前讨论的相同索引。


    **清单 11-13.** 创建空间索引


    ```sql

    USE WideWorldImporters

    GO


    CREATE SPATIAL INDEX [SI-Border]

    ON Application.StateProvinces (Border)

    USING GEOGRAPHY_GRID

    WITH (GRIDS =(LEVEL_1 = MEDIUM,LEVEL_2 = MEDIUM,LEVEL_3 =

    MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX = OFF,

    STATISTICS_NORECOMPUTE = OFF,

    SORT_IN_TEMPDB = OFF,

    DROP_EXISTING = OFF,

    ONLINE = OFF,

    ALLOW_ROW_LOCKS = ON,

    ALLOW_PAGE_LOCKS = ON, MAXDOP = 1)

    ON [PRIMARY] ;

    ```


    ## 总结


    空间对象可以通过多种方式构造。可以使用 OGC 标准方法创建，从熟知文本或熟知二进制创建，也可以使用从 GML 扩展的 Microsoft 方法构造。SQL
    Server 还支持将熟知文本直接传递到表的单元变量中。


    有大量方法可供开发人员轻松与空间数据交互。常用方法包括 `STDistance`（返回两个几何对象之间的距离）和 `STWithin`（检查一个实例是否位于另一个实例的同一空间内）。还有聚合方法，允许对多个实例进行并集、包络线和凸包操作，以及将多个实例转换为单个集合。


    SQL Server 提供空间索引，可以提高某些类型查询的性能。索引对查询的支持取决于数据类型、`WHERE` 或 `JOIN` 子句中的方法以及使用的算术运算符。


    空间索引使用 B 树结构，但在创建 B 树之前，会创建一个空间网格系统，具有四个嵌套级别。然后，从列中读取空间实例，一个一个地放入网格系统中，并使用希尔伯特曲线对它们接触的单元进行编号。这意味着空间实例可以以线性方式索引，同时详细描述它们彼此的接近程度。


    # 第 12 章：处理层次数据与 HierarchyID


    对 SQL Server 开发人员来说，对数据层次结构进行建模和处理一直是必需的。传统上，层次数据是通过表上的自连接在两个列之间建模的。一个列包含层次成员的
    ID，另一个包含其父层次成员的 ID。然而，较新版本的 SQL Server（2008 及更高版本）提供了 `HierarchyID`。`HierarchyID`
    是在.NET 中编写并在 SQL Server 中公开的数据类型。与使用带自连接的表相比，使用 `HierarchyID` 可以提供性能优势和简化的代码。该数据类型公开了许多可以对数据调用的方法，使开发人员能够轻松确定层次成员的祖先和后代，以及其他有用信息，例如特定成员在层次结构中的级别。


    在本章中，我们将首先探讨层次数据的用例。我将讨论如何对传统层次结构建模，然后再解释如何使用 `HierarchyID` 重新建模。最后，我们将了解针对 `HierarchyID`
    数据类型公开的方法。'
- fmt: "© Peter A. Carter 2018\n\nP. A. Carter, *SQL Server Advanced Data Types*,\n\
    \n[https://doi.org/10.1007/978-1-4842-3901-8_12](#index_split_003.html#p350)\n\
    \n![](index-351_1.png)\n\n# Chapter 12 Working With Hierarchical Data and HierarchyID\n\
    \n## Hierarchical Data Use Cases\n\nThere are many data requirements that need\
    \ a hierarchy to be maintained.\n\nFor example, consider an employee hierarchy,\
    \ modeled from an organizational chart (see Figure 12-1). A human resources department\
    \ may have reporting requirements, to determine how many staff directly or indirectly\
    \ report to a manager. It may also have to report on more complex requirements,\
    \ such as how much revenue has been generated by staff reporting to each group\
    \ head.\n\n***Figure 12-1.** Sales department organization chart*\n\nAnother classic\
    \ use case for hierarchical data is a bill of materials (BoM). A BoM defines a\
    \ hierarchy of parts that are required to produce a product. For example, Figure\
    \ 12-2 illustrates a simple BoM for a home computer. A computer manufacturer would\
    \ have to maintain a hierarchy of these parts for stock reporting.\n\n![](index-352_1.png)\n\
    \n***Figure 12-2.** Bill of materials*\n\n![](index-353_1.png)\n\nIn this chapter,\
    \ we will be working with the example of a sales area hierarchy. As illustrated\
    \ in Figure 12-3, we will be modeling global sales regions. The hierarchy is ragged,\
    \ meaning that there can be a varying number of levels in each branch of the hierarchy.\n\
    \n***Figure 12-3.** Sales area hierarchy*\n\nMaintaining a sales area hierarchy\
    \ is important to many companies, as it allows them to report on many factors,\
    \ from revenue taken in each region to the number of salespeople in each region\
    \ to average revenue per salesperson and region, etc. In this example, as well\
    \ as in standard sales regions, there are areas of the hierarchy that are aggregation\
    \ areas. This means that no salespeople exist, and sales are not directly taken\
    \ for these regions. Instead, they are reporting levels, to allow lower levels\
    \ of the hierarchy to be rolled up. These aggregation areas are highlighted in\
    \ blue.\n\n## Modeling Traditional Hierarchies\n\nLet’s look at how we might model\
    \ a sales area hierarchy, using a traditional approach. To do this, consider the\
    \ data in Table 12-1.\n\n***Table 12-1.** Sales Area Hierarchy*\n\n| SalesAreaID\
    \ | ParentSalesAreaID | SalesAreaName | CountOfSalesPeople | SalesYTD |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| nUll | global Sales | nUll | nUll | |\n| europe\
    \ | nUll | nUll | | |\n| america | nUll | nUll | | |\n| Uk | 300,000 | Western\
    \ europe | nUll | nUll |\n| eastern europe | nUll | nUll | | |\n| Canada | 350,000\
    \ | | | |\n| USa | nUll | nUll | | |\n| lataM | nUll | nUll | | |\n| germany |\
    \ 150,000 | | | |\n| France | 100,000 | | | |\n| hungary | 50,000 | | | |\n| Slovakia\
    \ | 80,000 | | | |\n| eastern | 140,000 | | | |\n| Western | 280,000 | | | |\n\
    | Brazil | 100,000 | | | |\n| argentina | 70,000 | | | |\n| new york | 120,000\
    \ | | | |\n\nIn the preceding table, the `SalesAreaID` column would be the primary\
    \ key of the table, and the `ParentSalesAreaID` column would be a foreign key,\
    \ which references the `SalesAreaID` column, creating what is known as a self-join.\n\
    \n**Note** the `ParentSalesAreaID` column is `NULL` for the `globalSales` area,\
    \ because it does not have a parent. this is known as the root of the hierarchy.\n\
    \nThe `SalesAreaName` column describes the sales area, while the `CountOfSalesPeople`\
    \ and `SalesYTD` columns detail how each sales area is performing. We will use\
    \ these columns to explore how to work with hierarchical data. You will notice\
    \ that the `CountOfSalesPeople` and `SalesYTD` columns are populated with `NULL`\
    \ values for aggregation areas. This is because they are “virtual” areas, where\
    \ no salespeople are based.\n\nThis table can be created by using the script in\
    \ Listing 12-1.\n\n***Listing 12-1.*** Creating a Traditional Hierarchical Table\n\
    \n```sql\nUSE WideWorldImporters\nGO\nCREATE TABLE Sales.SalesAreaTraditionalHierarchy\n\
    (\n    SalesAreaID INT NOT NULL PRIMARY KEY,\n    ParentSalesAreaID INT NULL\n\
    )\n```"
