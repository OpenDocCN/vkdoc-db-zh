    \ statement, as demonstrated in Listing 9-2.\n\n*Listing 9-2. Use ISJSON() in\
    \ an IF Statement*\n\n```sql\nDECLARE @JSON NVARCHAR(MAX) ;\nSET @JSON = '{\"\
    I am not:\"Correctly formatted\"}' ;\nIF ISJSON(@JSON) = 1\nBEGIN\n    SELECT\
    \ *\n    FROM OPENJSON(@JSON) ;\nEND\n```\n\nThis time, the script will complete\
