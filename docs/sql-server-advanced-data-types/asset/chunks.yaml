  trans: "# 第 7 章：从 T-SQL 构建 JSON\n\n## 处理 JSON 输出中的空值\n\n让我们考虑以下查询：\n\n```sql\nUSE\
    \ WideWorldImporters\nGO\n\nSELECT\n    OrderID\n    , CustomerID\n    , SalespersonPersonID\n\
    \    , OrderDate\n    , Comments\nFROM Sales.Orders\nWHERE CustomerID = 1060;\n\
    ```\n\n此查询的结果如图 7-2 所示。\n\n**图 7-2.** 添加注释后的查询结果\n\n你会注意到返回的订单都没有关联的注释。让我们通过列表\
    \ 7-9 中的查询来看看这对 JSON 有什么影响。\n\n**列表 7-9.** 添加了空值注释的 JSON 查询\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    ,\
    \ OrderDate\n    , Comments\nFROM Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON\
    \ AUTO, ROOT('SalesOrders');\n```\n\n此查询的结果可以在列表 7-10 中找到。\n\n**列表 7-10.** 包含空值注释的\
    \ JSON 结果\n\n```json\n{\n  \"SalesOrders\": [\n    {\n      \"OrderID\": 72646,\n\
    \      \"CustomerID\": 1060,\n      \"SalespersonPersonID\": 14,\n      \"OrderDate\"\
    : \"2016-05-18\"\n    },\n    {\n      \"OrderID\": 72738,\n      \"CustomerID\"\
    : 1060,\n      \"SalespersonPersonID\": 14,\n      \"OrderDate\": \"2016-05-19\"\
    \n    },\n    {\n      \"OrderID\": 72916,\n      \"CustomerID\": 1060,\n    \
    \  \"SalespersonPersonID\": 6,\n      \"OrderDate\": \"2016-05-20\"\n    },\n\
    \    {\n      \"OrderID\": 73081,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 8,\n      \"OrderDate\": \"2016-05-24\"\n    }\n  ]\n}\n```\n\n你可以看到，默认行为是从结果集中忽略任何值为\
    \ `NULL` 的名称/值对。然而，我们可以通过使用 `INCLUDE_NULL_VALUES` 选项来改变这一行为，如列表 7-11 所示。\n\n**列表\
    \ 7-11.** 在结果中包含 `NULL` 值\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n  \
    \  OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n   \
    \ , Comments\nFROM Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO, ROOT('SalesOrders'),\
    \ INCLUDE_NULL_VALUES;\n```\n\n此查询的结果可以在列表 7-12 中找到。你会注意到，这一次，值为 `NULL` 的名称/值对已被包含在结果中。\n\
    \n**列表 7-12.** 包含 `NULL` 值的结果\n\n```json\n{\n  \"SalesOrders\": [\n    {\n   \
    \   \"OrderID\": 72646,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-18\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 72738,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-19\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 72916,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 6,\n      \"OrderDate\": \"2016-05-20\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 73081,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 8,\n      \"OrderDate\": \"2016-05-24\",\n      \"Comments\": null\n    }\n\
    \  ]\n}\n```\n\n## 使用列别名\n\n在考虑 JSON 输出格式时，也可以使用列别名，如列表 7-13 所示。\n\n**列表 7-13.**\
    \ 使用列别名\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    OrderID\n    , CustomerID\n\
    \    , SalespersonPersonID\n    , OrderDate\n    , Comments AS 'Orders Comments'\n\
    FROM Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO, ROOT('SalesOrders'),\
    \ INCLUDE_NULL_VALUES;\n```\n\n此查询返回的结果如列表 7-14 所示。\n\n**列表 7-14.** 使用列别名的结果\n\
    \n```json\n{\n  \"SalesOrders\": [\n    {\n      \"OrderID\": 72646,\n      \"\
    CustomerID\": 1060,\n      \"SalespersonPersonID\": 14,\n      \"OrderDate\":\
    \ \"2016-05-18\",\n      \"Orders Comments\": null\n    },\n    {\n      \"OrderID\"\
    : 72738,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\": 14,\n  \
    \    \"OrderDate\": \"2016-05-19\",\n      \"Orders Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 72916,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 6,\n      \"OrderDate\": \"2016-05-20\",\n      \"Orders Comments\": null\n\
    \    },\n    {\n      \"OrderID\": 73081,\n      \"CustomerID\": 1060,\n     \
