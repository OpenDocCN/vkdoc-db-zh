- fmt: 'The SQL Server database offers robust capabilities for working with XML data.
    An application that pulls sales orders from a website can push them into SQL Server.
    The database''s native tooling allows developers to shred XML sales orders into
    a relational table structure using the `XQuery Nodes` method or the `OPENXML()`
    function. Conversely, to pass sales orders to a middleware system requiring an
    XML document, you can run a query to retrieve relational data and append the `FOR
    XML` clause to convert the data to XML.


    SQL Server’s support for schema validation also means that an application can
    validate its data against a schema supplied by an SQL Server developer before
    sending it across the network. SQL Server can also validate a document against
    an XML schema before passing it to an application. Essentially, you can create
    a data contract between the different layers of an application, saving time and
    allowing for better error-handling.


    In another use case for storing data as XML, imagine you have an XML document
    containing detailed product definitions and descriptions. While you could maintain
    this as a file in the file system, storing it in SQL Server allows you to query
    the XML document and join the results to relational information. XML documents
    can be queried in SQL Server using `XQuery`.


    ## Chapter 2 Understanding XML


    Many SQL Server data structures are stored in XML format, including:

    *   Extended events

    *   Event information within DDL triggers

    *   Event notifications

    *   Data collectors


    Native support for XML allows developers and administrators to interact with this
    data. While you might think that JSON is the preferred modern format, XML still
    has functionality not supported by JSON, such as:

    *   Schema validation

    *   `XPath`

    *   Namespaces

    *   `XLST`


    ### Summary


    XML is a markup language like HTML, but with tags defined by the document author.
    An `XML document` consists of elements and attributes, storing data in a semi-structured
    tree format.


    SQL Server supports `XML` fragments, well-formed `XML` documents, and valid (schema-bound)
    `XML` documents. To be well-formed, an `XML` document must contain a single root
    node, and an `XML` document cannot be schema-bound unless it is well-formed. The
    phrases `XML document` and `XML instance` are often used interchangeably, though
    strictly speaking, `XML document` refers to well-formed XML.


    `XML` documents can be bound to a DTD (`document type definition`) or an XSD (`XML
    schema definition`) schema. SQL Server only supports storing XSD schemas through
    an `XML schema collection`.


    ## Chapter 3 Constructing XML with T-SQL


    `T-SQL` allows you to convert relational result sets into `XML` by using the `FOR
    XML` clause in a `SELECT` statement. There are four modes available with the `FOR
    XML` clause:

    *   `FOR XML RAW`

    *   `FOR XML AUTO`

    *   `FOR XML PATH`

    *   `FOR XML EXPLICIT`'
