    "properties":{"rego":"WWI-321- A",

    "sensor":"1,"when":"2016-05- 30T08:14:17",

    "temp":5.00}} ]"

    }

    ]

    ```


    **提示** 嵌套的 JSON 对象在每个双引号前都包含一个反斜杠，作为转义字符。


    你会注意到，在此示例中，每个 `FullSensorData` 节点的值都是一个嵌套在 JSON 对象内的 JSON 对象，它代表表格结果集中的一行。


