  trans: "# 第 11 章 处理空间数据\n\n## UnionAggregate\n返回一组空间对象的联合结果。\n\n既然你已经了解了 SQL Server\
    \ 所提供的空间方法，现在可以通过 `WideWorldImporters` 数据库来看看如何在实践中应用它们。假设我们负责送货路线，并且需要在阿拉巴马州规划一条路线。\n\
    \n我们首先要做的是验证我们的数据。所有送货地点标记为阿拉巴马州的客户，是否真的位于阿拉巴马州边界内？`Sales.Customers` 表包含一个名为 `DeliveryLocation`\
    \ 的 `GEOGRAPHY` 类型列，每行都包含一个 `Point` 对象，映射其送货地址。我们可以对此列使用 `STWithin` 方法，并传入 `Application.StateProvinces`\
    \ 表中的 `Border` 列（该列映射了州边界）。如代码清单 11-9 所示。\n\n***代码清单 11-9.*** 验证所有地址是否在阿拉巴马州边界内\n\
    \n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n\
    \    WHERE StateProvinceName = 'Alabama') ;\n\nSELECT\n    Customer.CustomerName\
    \ AS CustomerName\n    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString()\
    \ AS DeliveryLocation\nFROM SALES.Customers Customer\nINNER JOIN Application.Cities\
    \ City\n    ON City.CityID = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
    \ = 1 ;\n```\n\n![](img/index-336_1.jpg)\n\n此查询的结果（如图 11-6 所示）验证了所有 16 个送货地址在阿拉巴马州的客户确实都居住在该州内。\n\
    \n***图 11-6.*** 验证所有地址在阿拉巴马州边界内的结果。\n\n接下来，我们想要检查每个送货地点距离我们仓库的距离，并按此距离对结果排序。这将有助于我们规划路线。这种技术被称为查找最近邻，如代码清单\
    \ 11-10 所示，该查询计算距离并使用 `Application.SystemParameters` 表中的 `DeliveryLocation`（标记了\
    \ `WideWorldImporters` 的位置）对结果进行排序。\n\n**注意：** `WideWorldImporters` 的仓库在加利福尼亚州，虽然到阿拉巴马州各地的距离很远，但它们仍然允许我们规划出司机最合理的路线。\n\
    \n***代码清单 11-10.*** 查找最近邻\n\n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT\
    \ Border\n    FROM Application.StateProvinces\n    WHERE StateProvinceName = 'Alabama')\
    \ ;\n\nDECLARE @Office GEOGRAPHY = (\n    SELECT DeliveryLocation\n    FROM Application.SystemParameters)\
    \ ;\n\nDECLARE @MilesRatio INT = 0.000621371 ;\n\nSELECT\n    Customer.CustomerName\
    \ AS CustomerName\n    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString()\
    \ AS DeliveryLocation\n    , Customer.DeliveryLocation.STDistance(@Office) * @MilesRatio\
    \ AS DeliveryDistanceMiles\nFROM SALES.Customers Customer\nINNER JOIN Application.Cities\
    \ City\n    ON City.CityID = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
    \ = 1\nORDER BY DeliveryDistanceMiles ;\n```\n\n![](img/index-338_1.jpg)\n\n此查询的结果如图\
    \ 11-7 所示。\n\n***图 11-7.*** 查找最近邻的结果。\n\n你会注意到在代码清单 11-10 中，距离乘以了 `0.000621371`。这是因为距离默认以米为单位。距离的计量单位与\
    \ `SRID` 相关联，因此我们可以通过增强查询来显示 `SRID` 进行双重确认，如代码清单 11-11 所示。该查询公开了每个空间实例的 `SRID`\
    \ 属性，并使用此值连接到 `sys.spatial_reference_systems` 系统表，以公开计量单位列。\n\n***代码清单 11-11.***\
    \ 公开 SRID\n\n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n \
    \   FROM Application.StateProvinces\n    WHERE StateProvinceName = 'Alabama')\
    \ ;\n```"
- fmt: '# Chapter 11: Working with Spatial Data


    ```sql

    DECLARE @Office GEOGRAPHY = (


    SELECT DeliveryLocation


    FROM Application.SystemParameters) ;


    DECLARE @MilesRatio INT = 0.000621371 ;


    SELECT


    Customer.CustomerName AS CustomerName


    , City.CityName AS City


    , Customer.DeliveryLocation.ToString() AS


    DeliveryLocation


    , Customer.DeliveryLocation.STDistance(@Office) *


    @MilesRatio AS DeliveryDistanceMiles


    , Customer.DeliveryLocation.STSrid AS SRID


    , srid.unit_of_measure


    FROM SALES.Customers Customer


    INNER JOIN Application.Cities City


    ON City.CityID = Customer.DeliveryCityID


    INNER JOIN sys.spatial_reference_systems srid


    ON srid.spatial_reference_id = Customer.


    DeliveryLocation.STSrid


    WHERE Customer.DeliveryLocation.STWithin(@StateBorder) = 1


    ORDER BY DeliveryDistanceMiles ;

    ```


    ![](index-340_1.jpg)


    While we know that all deliveries are in the state of Alabama, we may wish to
    discover how big our actual delivery area is. We can achieve this by creating
    an envelope and then calculating its area. This approach uses the `EnvelopeAggregate`
    extended method and the `STArea` method, as demonstrated in Listing [11-12.](#index_split_003.html#p340)


    **Listing 11-12.** Calculating the Area of an Aggregate Envelope


    ```sql

    DECLARE @StateBorder GEOGRAPHY = (


    SELECT Border


    FROM Application.StateProvinces


    WHERE StateProvinceName = ''Alabama'') ;


    SELECT


    GEOGRAPHY::EnvelopeAggregate(DeliveryLocation).


    STArea() AS AreaInSquareMetres


    , GEOGRAPHY::EnvelopeAggregate(DeliveryLocation)


    AS EnvelopeObject


    FROM Sales.Customers


    WHERE DeliveryLocation.STWithin(@StateBorder) = 1 ;

    ```


    The results of this query can be seen in Figure [11-8](#index_split_003.html#p340).


    **Figure 11-8.** Results of calculating the area of an aggregate envelope


    ![](index-341_1.jpg)


    The graphical results of the query in Listing [11-12](#index_split_003.html#p340)
    are illustrated in Figure [11-9.](#index_split_003.html#p341)


    **Figure 11-9.** Graphical results of calculating the area of an aggregate envelope


    ## Indexing Spatial Data


    The following sections provide an overview of spatial indexes, before demonstrating
    how to create them.


    ### Understanding Spatial Indexes


    Spatial indexes are a special type of index, implemented in SQL Server, that can
    improve the performance of certain queries against spatial data types. Table [11-5
    describes](#index_split_003.html#p342) the predicate patterns that can benefit
    from spatial indexes, when used in a `WHERE` or `JOIN` clause.


    **Table 11-5.** Queries That Can Benefit from Spatial Indexes


    | **Data Type** | **Method** | **Operator** |

    | :--- | :--- | :--- |

    | GEOMETRY & GEOGRAPHY | STDistance | <, <= |

    | GEOMETRY & GEOGRAPHY | STEquals | = |

    | GEOMETRY & GEOGRAPHY | STIntersects | = |

    | GEOMETRY only | STContains | = |

    | GEOMETRY only | STOverlaps | = |

    | GEOMETRY only | STTouches | = |

    | GEOMETRY only | STWithin | = |


    Just as with traditional indexes, spatial indexes use a `B-Tree` structure (see
    Chapter [5](#index_split_001.html#p169) for further information on `B-Tree` indexes),
    meaning that the spatial data must be represented in a linear order. To achieve
    this, SQL Server decomposes space into a nested grid system, before building an
    index.


    The grid will have four layers. Each cell in the first (`Level 1`) grid will contain
    another (`Level 2`) grid, and so on. Each of the four grid layers can be given
    a separate density, with low density being defined as `4 × 4` cells, medium density
    as `8 × 8` cells, and high density as `16 × 16` cells. Each cell within the grid
    is numbered using a `Hilbert space-filling curve` algorithm.


    **Tip:** A full discussion of the `Hilbert space-filling curve` is beyond the
    scope of this book, but further details can be found in many locations online,
    including [mathworld.wolfram.com/HilbertCurve.html](http://mathworld.wolfram.com/HilbertCurve.html).


    Once the grid system has been created, SQL Server reads the data from the column
    row by row. For each row, it will associate the spatial object with each `Level
    1` cell that it touches. For each touched cell, it will then drop down to `Level
    2` and repeat the process. This then happens again for the remaining levels.'
