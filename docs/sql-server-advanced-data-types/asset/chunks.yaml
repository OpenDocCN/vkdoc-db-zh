    # CHAPTER 1 SQL Server Data Types


    SQL Server 2017 provides a wide range of basic data types that can store data,
    such as character strings, numeric data, binary data, and dates. In this chapter,
    I will review each of the basic data types available in SQL Server, looking at
    the differences between similar data types. I will also discuss the importance
    of using the correct data type for each use case.


    **Tip:** The following sections discuss the acceptable ranges for each data type.
    It is worth noting, however, that all data types can also be set to `NULL`, indicating
    that the value is unknown.


    ## Numeric Data Types


    Some numeric data types in SQL Server are exact, while others are approximate.
    If a data type is exact, it stores a number to a fixed precision. If a data type
    is approximate, in many cases, it will store a very close approximation of a number,
    instead of the number itself.


    The numeric data types supported by SQL Server are listed in Table 1-1.


    © Peter A. Carter 2018

    P. A. Carter, *SQL Server Advanced Data Types*, [https://doi.org/10.1007/978-1-4842-3901-8_1](#index_split_000.html#p13)


    ### Table 1-1. Numeric Data Types


    | Data Type | Exact/Approximate | Range | Storage Size | Description |

    | :--- | :--- | :--- | :--- | :--- |

    | `BIT` | Exact | 0 to 1 | 1 bit | A flag value. `True` and `False` can be set
    to 0 or 1, respectively, and are converted to 1 or 0 when inserted into a column
    of this data type. |

    | `TINYINT` | Exact | 0 to 255 | 1 byte | Stores a whole number with no decimal
    points. |

    | `SMALLINT` | Exact | -2^15 to 2^15 - 1 | 2 bytes | Stores a whole number with
    no decimal points. |

    | `INT` | Exact | -2^31 to 2^31 - 1 | 4 bytes | Stores a whole number with no
    decimal points. |

    | `BIGINT` | Exact | -2^63 to 2^63 - 1 | 8 bytes | Stores a whole number with
    no decimal points. |

    | `DECIMAL`/`NUMERIC` | Exact | -10^38+1 to 10^38-1 | Varies | The storage space
    varies as follows:... |


