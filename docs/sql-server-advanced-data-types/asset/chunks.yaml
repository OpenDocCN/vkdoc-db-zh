- fmt: "# Chapter 9 Working With the JSon Data type\n\n## Listing 9-3. Filter Results\
    \ That Are Not JSON\n\n```sql\n--Create a temp table\nCREATE TABLE #JsonTemp\n\
    (\n    JSONData NVARCHAR(MAX)\n) ;\n\n--Populate temp table with one JSON value\
    \ and one non-JSON value\nINSERT INTO #JsonTemp\nVALUES ('{\"I am JSON\":\"True\"\
    }'),\n       ('I am JSON - False') ;\n\n--Call OPENJSON() against only rows where\
    \ data is JSON\nSELECT JSON.*\nFROM #JsonTemp Base\nOUTER APPLY OPENJSON(Base.JSONData)\
    \ JSON\nWHERE ISJSON(Base.JSONData) = 1 ;\n\n--Drop temp table\nDROP TABLE #JsonTemp\
    \ ;\n```\n\nBecause the `WHERE` clause removes any rows that do not contain valid\
    \ JSON data, before the `OPENJSON()` function is applied, the script completes\
    \ successfully and returns the results shown in Figure 9-2.\n\n***Figure 9-2.**\
    \ Results of filtering non-JSON data*\n\n## Using JSON_VALUE( )\n\nThe `JSON_VALUE()`\
    \ function can be used to return a single scalar value from a JSON document. The\
    \ function accepts two parameters. The first parameter is the JSON document, from\
    \ which to retrieve the data. The second is a path expression to the value you\
    \ wish to return. As described in Chapter 8, when using path expressions with\
    \ `OPENJSON()`, path expressions can be used in either `lax` mode or `strict`\
    \ mode. When `lax` mode is used, if there is an error in the path expression,\
    \ `NULL` results will be returned, and no error will be raised. When used in `strict`\
    \ mode, if there is an error in the path expression, an error will be thrown.\n\
    \nThe value returned is always of data type `NVARCHAR(4000)`. This means that\
    \ if the value exceeds 4000 characters, `JSON_VALUE()` will either return `NULL`\
    \ or throw an error, depending on whether `lax` mode or `strict` mode has been\
