- fmt: "# Chapter 9 Working With the JSON Data Type\n\nThe data back in. This amount\
    \ of code would distract from how to add a computed column, which is the point\
    \ of this exercise. This is demonstrated in Listing 9-20.\n\n**Tip** We use `DBCC\
    \ FREEPROCCACHE` to drop any existing plans from the plan cache. We then use `DBCC\
    \ DROPCLEANBUFFERS` to remove pages from the buffer cache that have not been modified.\
    \ This helps make it a fair test.\n\n## Creating a Performance Baseline\n\n```sql\n\
    USE WideWorldImporters\nGO\n\n--Copy data to a new table\nSELECT *\nINTO Warehouse.NewStockItems\n\
    FROM Warehouse.StockItems\n\n--Clear plan cache\nDBCC FREEPROCCACHE\n\n--Clear\
    \ buffer cache\nDBCC DROPCLEANBUFFERS\n\n--Turn on statistics\nSET STATISTICS\
    \ TIME ON\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax $.Tags[0]')\
    \ AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n    , JSON_VALUE(CustomFields,'lax\
    \ $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax $.Tags') AS TagsArray\n\
    FROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax $.Tags[0]') =\
    \ 'Radio Control' ;\n```\n\nThe results in Figure 9-15 show that the query took\
    \ `6ms` to execute.\n\n*Figure 9-15. Time statistics*\n\nLet’s now create a computed\
    \ column on the `Warehouse.StockItems` table, using the same logic as in our `WHERE`\
    \ clause. This can be achieved by using the script in Listing 9-21.\n\n## Creating\
    \ a Computed Column\n\n```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE Warehouse.NewStockItems\n\
    ADD CustomFieldsTag0 AS JSON_VALUE(CustomFields,\n    'lax $.Tags[0]') ;\n```\n\
    \nWe can now index the computed column (which will also cause the column to be\
    \ persisted, as opposed to calculated on the fly, when queried), by using the\
    \ script in Listing 9-22.\n\n## Indexing the Computed Column\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nCREATE NONCLUSTERED INDEX NCI_CustomFieldsTag0\nON Warehouse.NewStockItems(CustomFieldsTag0)\
    \ ;\n```\n\nLet’s now check the performance of our query, once again, by using\
    \ the simplified script in Listing 9-23.\n\n## Checking Index Performance\n\n\
    ```sql\nUSE WideWorldImporters\nGO\n\n--Clear plan cache\nDBCC FREEPROCCACHE\n\
    \n--Clear buffer cache\nDBCC DROPCLEANBUFFERS\n\n--Turn on statistics\nSET STATISTICS\
    \ TIME ON\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax $.Tags[0]')\
    \ AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n    , JSON_VALUE(CustomFields,'lax\
    \ $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax $.Tags') AS TagsArray\n\
    FROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax $.Tags[0]') =\
    \ 'Radio Control' ;\n```\n\nYou can see from the time statistics shown in Figure\
    \ 9-16 that the query executed in `3ms`. That’s a 50% performance improvement!\n\
    \n*Figure 9-16. Results of checking index performance*\n\n**Tip** Because the\
    \ `NewStockItems` table is so small, there is a chance that the query optimizer\
    \ will choose not to use your index. If this happens, you can force it to use\
    \ the index, by adding the `WITH (INDEX(NCI_CustomFieldsTag0))` query hint. It\
    \ is very important to note, however, that on a general basis, the optimizer is\
    \ smart and rarely should be given hints. If you do need to use hints, then you\
    \ should always work with the optimizer, rather than against it.\n\nFor example,\
    \ if the optimizer is incorrectly choosing a `LOOP JOIN` physical operator, force\
    \ it to use either `MERGE JOIN` or `HASH JOIN`. Do not choose for it which is\
    \ better!\n\n# Summary\n\nSQL Server provides the ability to interrogate and modify\
    \ JSON data with the `ISJSON()`, `JSON_VALUE()`, `JSON_QUERY()`, and `JSON_MODIFY()`\
    \ functions.\n\nThe `ISJSON()` function provides a simple validation that the\
    \ document has a valid JSON format. It returns `1` if the document is JSON and\
    \ `0` if not.\n\nThe `JSON_VALUE()` function can be included in the `SELECT` list,\
    \ `WHERE` clause, `ORDER BY` clause, or `GROUP BY` clause of your query. It returns\
    \ a"
