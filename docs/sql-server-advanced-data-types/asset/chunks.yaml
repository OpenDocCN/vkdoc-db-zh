    \ context, as the path expression, to an additional column in the result set.\n\
    \n**Tip** you must be running SQL Server 2017 or later versions to run the query\
    \ in Listing 9-12.\n\n![](index-276_1.jpg)\n\n## Chapter 9 Working With the JSon\
    \ Data type\n\n### Listing 9-12. Using Path Variables and Document Context\n\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Path NVARCHAR(MAX) = '$' ;\n\n\
    SELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax $.Tags[0]') AS Tag0\n\
    \    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n    , JSON_VALUE(CustomFields,'lax\
    \ $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax $.Tags') AS TagsArray\n\
    \    , JSON_QUERY(CustomFields, @Path) AS EntireDocument\nFROM Warehouse.StockItems\n\
    WHERE JSON_QUERY(CustomFields,'strict $.Tags') <> '[]'\n    AND ISJSON(CustomFields)\
    \ = 1 ;\n```\n\nThe partial results of this query can be seen in Figure 9-10.\n\
    \n### Figure 9-10. Results of using path variables and document context\n\n##\
    \ Chapter 9 Working With the JSon Data type\n\n### Using JSON_MODIFY()\n\nSo far,\
    \ all the JSON functions that we have examined have allowed us to interrogate\
    \ JSON documents. The `JSON_MODIFY()` function, however, as its name suggests,\
    \ allows us to modify the contents of the JSON document. To explain this further,\
    \ let’s once again use the `CustomFields` JSON document for Stock Item ID 61,\
    \ as used in Listing 9-4 and Listing 9-9.\n\nThe script in Listing 9-13 will modify\
    \ the second element of the `Tags` array, so that the second element is updated\
    \ to read 'Very Realistic Sound'. The output of the function is the complete,\
    \ modified document.\n\n### Listing 9-13. Updating a Value\n\n```sql\nDECLARE\
    \ @JSON NVARCHAR(MAX) ;\n\n--The CustomFields column for StockItem ID 61 contains\
    \ the\nfollowing JSON document:\n--'{ \"CountryOfManufacture\": \"China\", \"\
    Tags\": [\"Radio Control\",\"Realistic Sound\"], \"MinimumAge\": \"10\" }'\n\n\
    SET @JSON = (SELECT CustomFields FROM Warehouse.StockItems\n    WHERE StockItemID\
    \ = 61) ;\n\nIF ISJSON(@JSON) = 1\nBEGIN\n    SELECT JSON_MODIFY(@Json,'lax $.Tags[1]',\
    \ 'Very Realistic Sound') ;\nEND\n```\n\nThis script returns the results in Figure\
    \ 9-11.\n\n![](index-278_1.jpg)\n\n## Chapter 9 Working With the JSon Data type\n\
    \n### Figure 9-11. Results of updating a value\n\nYou can see how the output from\
    \ this function could be used subsequently to update a row in a table containing\
    \ a JSON document, as demonstrated in Listing 9-14. Here, instead of passing in\
    \ a variable as the JSON document, we pass in the `CustomFields` column from the\
    \ table.\n\n### Listing 9-14. Using JSON_MODIFY() to Update a Row in a Table\n\
    \n```sql\nUSE WideWorldImporters\nGO\n\nUPDATE StockItems\nSET CustomFields =\
    \ JSON_MODIFY(CustomFields,'lax $.Tags[1]', 'Very Realistic Sound')\nFROM Warehouse.StockItems\n\
    WHERE StockItemID = 61 ;\n```\n\nThe `JSON_MODIFY()` function can also be used\
    \ to add an element to an array. Consider the query in Listing 9-15, which marks\
    \ Stock Item ID 61 as being vintage, by adding an additional element to the `Tags`\
    \ array. You will notice that because we are adding an additional value to an\
    \ array, as opposed to updating an existing value, we have used the `append` keyword\
    \ at the beginning of the path expression. Note, too, that because we are updating\
    \ the array, rather than a single element, the array element in square brackets\
    \ is not included.\n\n### Listing 9-15. Adding an Additional Array Element\n\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nUPDATE StockItems\nSET CustomFields = JSON_MODIFY(CustomFields,'append\
    \ lax $.Tags', 'Vintage')\nFROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n\
    ```\n\nLet’s now use the query in Listing 9-16, to examine the updated record.\n\
    \n### Listing 9-16. Examining the Updated Record\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax $.Tags[0]')\
    \ AS Tag0\n```"
