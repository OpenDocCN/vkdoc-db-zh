  trans: "# 查询与解析 XML\n\n在指定希望检索的节点路径之前，我们需要先为结果值定义关系数据类型。这是查询中最有趣的部分。您会注意到，我们使用了\
    \ `OPENXML()` 函数的 `rowpattern` 参数来映射到最低层级的 `Product` 元素。这意味着 `Product` 元素是我们路径的起点。`ProductID`、`ProductName`\
    \ 和 `Quantity` 属性都是 `Product` 元素的属性。因此，我们为这些属性添加 `@` 前缀，以表明它们是属性，但不需要其他路径映射。`OrderID`\
    \ 属性是 `OrderDetails` 元素的属性。由于 `OrderDetails` 元素比 `Product` 元素高一级，我们使用 `../` 语法来指定必须向上导航一级。`OrderDate`\
    \ 元素比 `Product` 元素高两级；因此，我们使用两次 `../` 来指示应向上移动两级层次结构。另外请注意，由于 `OrderDate` 是一个元素而非属性，我们没有在该节点前添加\
    \ `@` 符号。\n\n最后，为了映射到 `CustomerName` 元素，我们首先必须使用 `../` 语法向上导航两级层次结构。然后，我们必须下降到一个兄弟节点（`OrderHeader`）中，以检索\
    \ `CustomerName` 元素。\n\n查询结果如图 4-10 所示。请注意，针对两个产品，`OrderID` 返回了 `NULL` 值。这是因为第二个销售订单没有指定\
    \ `OrderID` 元素。\n\n![](img/index-158_1.jpg)\n\n*图 4-10. 使用 `OPENXML()` 的结果*\n\n\
    ## 使用 Nodes 解析 XML\n\n如果您想从列中解析数据，而不是使用变量，可以通过 XQuery 解析数据来避免迭代逻辑的需求。具体来说，`nodes()`\
    \ 方法可用于识别应映射到关系列的节点。这可以与 `value()` 方法结合使用，以从节点中提取数据。例如，考虑代码清单 4-29 中的查询。该查询在功能上等同于代码清单\
    \ 4-28 中的查询，但使用了 `nodes()` 方法而非 `OPENXML()`。\n\n### 代码清单 4-29. 使用 `nodes()` 解析\
    \ XML\n\n```sql\nDECLARE @SalesOrder XML ;\n\nSET @SalesOrder = '\n<SalesOrders>\n\
    <Order>\n<OrderDate>2013-01-02</OrderDate>\n<OrderHeader>\n<CustomerName>Camille\
    \ Authier</CustomerName>\n</OrderHeader>\n<OrderDetails>\n<Product ProductID=\"\
    45\" ProductName=\"Developer joke\nmug - there are 10 types of people in the world\
    \ (Black)\"\nPrice=\"13\" Qty=\"7\" />\n<Product ProductID=\"58\" ProductName=\"\
    RC toy sedan car with remote control (Black) 1/50 scale\" Price=\"25\" Qty=\"\
    4\" />\n</OrderDetails>\n</Order>\n<Order>\n<OrderDate>2013-01-02</OrderDate>\n\
    <OrderHeader>\n<CustomerName>Camille Authier</CustomerName>\n</OrderHeader>\n\
    <OrderDetails OrderID = \"122\">\n<Product ProductID=\"22\" ProductName=\"DBA\
    \ joke mug - it\ndepends (White)\" Price=\"13\" Qty=\"6\" />\n<Product ProductID=\"\
    2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n<Product\
    \ ProductID=\"111\" ProductName=\"Superhero action\njacket (Blue) M\" Price=\"\
    30\" Qty=\"10\" />\n<Product ProductID=\"116\" ProductName=\"Superhero action\n\
    jacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n</OrderDetails>\n</Order>\n</SalesOrders>'\
    \ ;\n\nSELECT\n    TempCol.value('@ProductID', 'INT') AS ProductID\n    , TempCol.value('@ProductName',\
    \ 'NVARCHAR(70)') AS ProductName\n    , TempCol.value('@Qty', 'INT') AS Quantity\n\
    \    , TempCol.value('../@OrderID', 'INT') AS OrderID\n    , TempCol.value('../../OrderDate[1]',\
    \ 'NVARCHAR(10)') AS OorderDate\n    , TempCol.value('../../OrderHeader[1]/CustomerName[1]',\
    \ 'NVARCHAR(15)') AS CustomerName\nFROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product')\
    \ TempTable(TempCol) ;\n```\n\n在检查此脚本时，您应特别注意 `FROM` 子句。这里，我们将一个 XQuery 表达式传递到\
    \ `nodes()` 方法中，"
- fmt: "# CHAPTER 4 QUERYING AND SHREDDING XML\n\nto define the grain. We then define\
    \ arbitrary names for a table and column, which will contain the intermediate\
    \ results set.\n\nThe `nodes()` method can also be used in conjunction with the\
    \ `query()` method, to shred an XML document into smaller XML documents. For example,\
    \ consider the query in **Listing 4-30**. This query extracts the `Product` elements\
    \ from the XML document, in XML format.\n\n***Listing 4-30.*** Using the `nodes()`\
    \ Method with the `query()` Method\n```sql\nDECLARE @SalesOrder XML ;\n\nSET @SalesOrder\
    \ = '\n<SalesOrders>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderHeader>\n\
    \      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n    <OrderDetails>\n\
    \      <Product ProductID=\"45\" ProductName=\"Developer joke mug - there are\
    \ 10 types of people in the world (Black)\" Price=\"13\" Qty=\"7\" />\n      <Product\
    \ ProductID=\"58\" ProductName=\"RC toy sedan car with remote control (Black)\
    \ 1/50 scale\" Price=\"25\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n  <Order>\n\
    \    <OrderDate>2013-01-02</OrderDate>\n    <OrderHeader>\n      <CustomerName>Camille\
    \ Authier</CustomerName>\n    </OrderHeader>\n    <OrderDetails OrderID = \"122\"\
    >\n      <Product ProductID=\"22\" ProductName=\"DBA joke mug - it depends (White)\"\
    \ Price=\"13\" Qty=\"6\" />\n      <Product ProductID=\"2\" ProductName=\"USB\
    \ rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n      <Product ProductID=\"\
    111\" ProductName=\"Superhero action jacket (Blue) M\" Price=\"30\" Qty=\"10\"\
    \ />\n      <Product ProductID=\"116\" ProductName=\"Superhero action jacket (Blue)\
    \ 4XL\" Price=\"34\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n</SalesOrders>'\
    \ ;\n\nSELECT\n    TempCol.query('.') AS Product\nFROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product')\
    \ TempTable(TempCol) ;\n```\n\nThe results of this query can be seen in **Figure\
    \ 4-11**.\n\n***Figure 4-11.*** Results of using the `nodes()` method with the\
    \ `query()` method\n\nThe biggest benefit of the `nodes()` method over `OPENXML()`\
    \ is its ease of use against a table. The `CROSS APPLY` operator can be used to\
    \ apply the `nodes()` method to multiple rows within a table. The query in **Listing\
    \ 4-31** illustrates this, by calling the `nodes()` method against the `OrderSummary`\
    \ column in the `Sales.CustomerOrderSummary` table. The query will return one\
    \ row for every product on every sales order placed by a customer with the `CustomerID`\
    \ of 814. The results are then ordered by the quantity of each product.\n\n***Listing\
    \ 4-31.*** Using the `nodes()` Method Against a Table\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    CustomerID\n    , TempCol.value('@Qty', 'INT') AS Quantity\n\
    \    , TempCol.value('@ProductName', 'NVARCHAR(70)') AS ProductName\n    , TempCol.query('.')\
    \ AS Product\nFROM Sales.CustomerOrderSummary\nCROSS APPLY OrderSummary.nodes('SalesOrders/Order/OrderDetails/Product')\
    \ TempTable(TempCol)\nWHERE CustomerID = 841\nORDER BY TempCol.value('@Qty', 'INT')\
    \ DESC ;\n```\n\nPartial results of this query can be seen in **Figure 4-12**.\n\
    \n***Figure 4-12.*** Results of using the `nodes()` method against a table\n\n\
    ## Using Schemas\n\nAs discussed in **Chapter 3**, an XML document can be bound\
    \ to a schema, to ensure that its structure meets the client contract. In SQL\
    \ Server, we can define an XSD schema by creating an `XML SCHEMA COLLECTION`.\
    \ To demonstrate this, imagine that we wanted to bind our `OrderSummary` column,\
    \ in the `Sales.CustomerOrderSummary` table, to a schema. The first step would\
    \ be to create the `XSD SCHEMA COLLECTION`. We could achieve this using the code\
    \ in **Listing 4-32**.\n\n***Listing 4-32.*** Creating an `XML SCHEMA COLLECTION`\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nCREATE XML SCHEMA COLLECTION OrderSummary\
    \ AS\nN'<?xml version=\"1.0\" encoding=\"utf-16\"?>\n<xs:schema attributeFormDefault=\"\
    unqualified\"\nelementFormDefault=\"qualified\" xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
    >\n  <xs:element name=\"SalesOrders\">\n    <xs:complexType>\n      <xs:sequence>\n\
    \        <xs:element maxOccurs=\"unbounded\" name=\"Order\">\n          <xs:complexType>\n\
    ```"
