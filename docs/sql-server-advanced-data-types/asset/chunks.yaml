  trans: "\n由于本章重点介绍如何在 T-SQL 代码中使用 `HierarchyID`，而 `Read()` 和 `Write()` 方法仅适用于 SQLCLR（一种允许在\
    \ SQL Server 内部创建托管对象的技术），因此对 `Read()` 和 `Write()` 方法的完整描述超出了本书的范围。\n\n## 使用 GetDescendant(\
    \ )\n\n当然，开发者可以在现有节点之间向层次结构中插入一个新节点，但 `GetDescendant()` 方法能帮助开发者以实用的方式完成此操作。该方法接受两个参数，这两个参数都可以是\
    \ `NULL`，并代表现有的子节点。然后，该方法将使用以下规则生成一个节点值：\n\n*   如果父节点为 `NULL`，则返回 `NULL` 值。\n\
    *   如果父节点不为 `NULL`，且两个参数均为 `NULL`，则返回父节点的第一个子节点。\n*   如果父节点和第一个参数不为 `NULL`，但第二个参数为\
    \ `NULL`，则返回父节点下大于第一个参数的子节点。\n*   如果父节点和第二个参数不为 `NULL`，但第一个参数为 `NULL`，则返回父节点下小于第二个参数的子节点。\n\
    *   如果父节点和两个参数均不为 `NULL`，则返回父节点下介于两个参数之间的子节点。\n*   如果第一个参数不为 `NULL` 且不是父节点的子节点，则抛出错误。\n\
    *   如果第二个参数不为 `NULL` 且不是父节点的子节点，则抛出错误。\n*   如果第一个参数大于或等于第二个参数，则抛出错误。\n\n例如，假设我们想在父节点\
    \ `America` 下创建一个名为 `Spain` 的新销售区域。我们希望该节点值介于 `Canada` 和 `USA` 之间。我们可以通过清单 12-13\
    \ 中的查询实现这一点。\n\n**提示**：显然，`Spain` 应包含在 `Western Europe` 下，而不是 `America` 下。别担心，这是一个故意设置的错误，我们将在本章的“使用\
    \ GetReparentedValue”一节中解决这个问题。\n\n### 清单 12-13. 生成一个新的层次结构节点\n\n```sql\nUSE WideWorldImporters\n\
    GO\nSELECT NewNode.ToString()\nFROM\n(\n    SELECT\n        SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40)\
    \ AS NewNode\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'America'\n\
    ) NewNode ;\n```\n\n此查询产生的结果如图 12-11 所示。\n\n你会看到最低级别包含一个句点（`.`）(`1.1`)。这是因为 `Canada`\
    \ 的值为 `1`，而 `USA` 的值为 `2`。因此，为了生成介于两者之间的节点值，不能使用整数。这保证了新节点总是可以插入到两个现有节点之间。\n\n\
    ### 图 12-11. 使用 GetDescendant() 的结果\n\n要以编程方式将 `Spain` 销售区域添加到层次结构中，我们可以使用清单 12-14\
    \ 中的查询。\n\n### 清单 12-14. 向层次结构中插入新节点\n\n```sql\nUSE WideWorldImporters\nGO\nINSERT\
    \ INTO Sales.SalesAreaHierarchyID\n(\n    SalesAreaID\n    , SalesAreaHierarchy\n\
    \    , SalesAreaName\n    , CountOfSalesPeople\n    , SalesYTD\n)\nSELECT\n  \
    \  (SELECT MAX(SalesAreaID) + 1 FROM Sales.SalesAreaHierarchyID)\n    , SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40)\n\
    \    , 'Spain'\n    , 2\n    , 200000\nFROM Sales.SalesAreaHierarchyID\nWHERE\
    \ SalesAreaName = 'America' ;\n```\n\n## 使用 GetReparentedValue( )\n\n正如你可能在“使用\
    \ GetDescendant()”一节中注意到的，`Spain` 销售区域被错误地创建在了 `America` 聚合区域下，而不是 `Western Europe`\
    \ 聚合区域下。我们可以通过使用 `GetReparentedValue()` 方法来解决这个问题。\n\n考虑清单 12-15 中的脚本。首先，我们声明两个类型为\
    \ `HierarchyID` 的变量。这些将作为参数传递给 `GetReparentedValue()` 方法。`@America` 变量被赋值...\n"
- fmt: "# Chapter 12 Working With Hierarchical Data and HierarchyID\n\n## Using GetReparentedValue()\n\
    \nwith the sales area hierarchy node pertaining to the original parent sales area,\
    \ and the `@WesternEurope` variable is populated with the sales area hierarchy\
    \ node pertaining to the target parent sales area.\n\n### Listing 12-15. Use GetReparentedValue()\n\
    \n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @America HIERARCHYID =\n(\n  \
    \  SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName\
    \ = 'America'\n) ;\n\nDECLARE @WesternEurope HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
    \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'Western Europe'\n\
    ) ;\n\nSELECT Area.ToString()\nFROM\n(\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n\
    \    @WesternEurope) AS Area\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy\
    \ = 0x6B16\n) NewNodePath ;\n```\n\n`![](index-378_1.jpg)`\n\nThe results of this\
    \ script can be seen in Figure 12-12. You will notice that the leaf node value\
    \ has remained the same, while the path (parent nodes) have been changed, so that\
    \ the node sits under the Western Europe aggregation area.\n\n### Figure 12-12.\
    \ Results of using GetReparentedValue()\n\nWe could update the ancestry of the\
    \ Spain sales area, in the `Sales.SalesAreaHierarchyID` table, by using the script\
    \ in Listing 12-16.\n\n### Listing 12-16. Updating the Ancestry of the Spain Sales\
    \ Area\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @America HIERARCHYID =\n\
    (\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE\
    \ SalesAreaName = 'America'\n) ;\n\nDECLARE @WesternEurope HIERARCHYID =\n(\n\
    \    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE\
    \ SalesAreaName = 'Western Europe'\n) ;\n\nUPDATE Sales.SalesAreaHierarchyID\n\
    SET SalesAreaHierarchy =\n(\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n\
    \    @WesternEurope)\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy\
    \ = 0x6B16\n)\nWHERE SalesAreaHierarchy = 0x6B16 ;\n```\n\n## Using GetAncestor()\n\
    \nThe `GetAncestor()` method can be used to return the ancestor node of a given\
    \ hierarchical node at the number of levels based on an input parameter to the\
    \ method. For example, consider the query in Listing 12-17. This query will return\
    \ the grandparent of Spain, the parent of Spain, and Spain itself, by passing\
    \ different parameters into the `GetAncestor()` method.\n\n**Caution** For this\
    \ query to work as expected, you first must have run the previous examples in\
