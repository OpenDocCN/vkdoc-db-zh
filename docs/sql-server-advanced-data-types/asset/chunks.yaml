    OrderID\": 73081,\n            \"CustomerID\": 1060,\n            \"SalespersonPersonID\"\
    : 8,\n            \"OrderDate\": \"2016-05-24\",\n            \"Orders.Comments\"\
    : null\n        }\n    ]\n}\n```\n\n你会注意到，键只是被赋予了一个点分隔的名称。\n\n这是一个需要注意的重要行为，因为在使用\
    \ `FOR JSON PATH` 时，点分隔的别名会产生嵌套的 JSON 对象。随着本章内容的深入，你会对此了解更多。\n\n### 自动嵌套\n\n到目前为止，我们的所有示例都集中在\
    \ `FOR JSON AUTO` 针对单个表时的行为。现在，让我们把注意力转向 `FOR JSON AUTO` 如何基于表连接和子查询自动嵌套数据。\n\n\
    考虑代码清单 7-17. T 中的查询。此查询通过增强来更详细地检查订单 72646，以检索单个订单中每个订购库存项的详细信息。\n\n**代码清单 7-17.**\
    \ 添加订单行详情\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    Orders.OrderID\n\
    \    , Orders.CustomerID\n    , Orders.SalespersonPersonID\n    , Orders.OrderDate\n\
    \    , Orders.Comments\n    , OrderLines.StockItemID\n    , OrderLines.UnitPrice\n\
    \    , OrderLines.Quantity\nFROM Sales.Orders Orders\nINNER JOIN Sales.OrderLines\
    \ OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\nWHERE CustomerID = 1060\n\
    \    AND Orders.OrderID = 72646\nFOR JSON AUTO, ROOT('SalesOrders'), INCLUDE_NULL_VALUES\
    \ ;\n```\n\n此查询的结果如代码清单 7-18 所示。\n\n**代码清单 7-18.** 添加订单行详情的结果\n\n```json\n{\n\
    \    \"SalesOrders\": [\n        {\n            \"OrderID\": 72646,\n        \
    \    \"CustomerID\": 1060,\n            \"SalespersonPersonID\": 14,\n       \
    \     \"OrderDate\": \"2016-05-18\",\n            \"Comments\": null,\n      \
    \      \"OrderLines\": [\n                {\n                    \"StockItemID\"\
    : 45,\n                    \"UnitPrice\": 13,\n                    \"Quantity\"\
    : 6\n                },\n                {\n                    \"StockItemID\"\
    : 146,\n                    \"UnitPrice\": 18,\n                    \"Quantity\"\
    : 108\n                },\n                {\n                    \"StockItemID\"\
    : 8,\n                    \"UnitPrice\": 240,\n                    \"Quantity\"\
    : 2\n                },\n                {\n                    \"StockItemID\"\
    : 212,\n                    \"UnitPrice\": 4.3,\n                    \"Quantity\"\
    : 20\n                }\n            ]\n        }\n    ]\n}\n```\n\n你会注意到，在每个订单的表示中，添加了一个新的键，其名称与第二个表的别名匹配。其值是一个嵌套的\
    \ JSON 对象数组，这些对象包含名值对，代表从第二个表（基于 `SELECT` 列表中列的顺序）返回的列。\n\n那么，如果我们添加一个嵌套连接，以便从\
    \ `Warehouse.StockItems` 表中检索产品名称，如代码清单 7-19 所示，会怎样呢？\n\n**代码清单 7-19.** 使用嵌套连接\n\
    \n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    Orders.OrderID\n    , Orders.CustomerID\n\
