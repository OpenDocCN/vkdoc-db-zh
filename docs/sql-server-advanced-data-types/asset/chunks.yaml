- fmt: "## 使用 JSON_QUERY( )\n\n与返回标量值的 `JSON_VALUE()` 不同，`JSON_QUERY()` 可用于从 JSON\
    \ 文档中提取 JSON 对象或数组。\n\n例如，考虑清单 [9-9](#index_split_002.html#p273) 中的脚本。该脚本使用了我们在清单\
    \ [9-4](#index_split_002.html#p267) 中使用过的同一个 JSON 文档，该清单从库存物料 ID 为 61 的 Tags 数组中提取了单个数组元素。然而，这次我们将提取整个\
    \ Tags 数组，而不是提取单个数组元素。因为我们提取的是整个数组，所以不需要像使用 `JSON_VALUE()` 处理该文档时那样，在方括号中指定数组元素编号。\n\
    \n![图 9-8](index-273_1.jpg)\n\n**清单 9-9.** 针对 JSON 文档使用 `JSON_QUERY()`\n\n```sql\n\
    DECLARE @JSON NVARCHAR(MAX) ;\n\n--StockItem ID 61 的 CustomFields 列包含以下 JSON 文档：\n\
    --'{ \"CountryOfManufacture\": \"China\", \"Tags\": [\"Radio Control\",\"Realistic\
    \ Sound\"], \"MinimumAge\": \"10\" }'\n\nSET @JSON = (SELECT CustomFields FROM\
    \ Warehouse.StockItems\n             WHERE StockItemID = 61) ;\n\nIF ISJSON(@JSON)\
