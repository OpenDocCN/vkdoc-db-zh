  trans: "\n清单 11-5. 中的脚本\n\n***清单 11-5.*** 将已知文本传递给变量\n\n```\nDECLARE @Polygon GEOMETRY\
    \ ;\n\nSET @Polygon = 'POLYGON((0 0, 10 0, 10 10, 0 10, 0 0))' ;\n\nSELECT @Polygon\
    \ ;\n```\n\n![](img/index-313_1.jpg)\n\n该脚本的图形化结果显示在图 11-2 中。\n\n***图 11-2.**\
    \ 将已知文本传递给变量的结果*\n\n可以通过直接传递 `NULL` 值或使用实例的只读 `Null` 属性将空间实例设置为 `NULL`。清单 11-6.\
    \ 展示了这一点。\n\n***清单 11-6.*** 将实例设置为 `NULL`\n\n```\n--通过直接传递 NULL 将变量设为 NULL\nDECLARE\
    \ @Polygon GEOMETRY ;\nSET @Polygon = NULL ;\nSELECT @Polygon ;\n```\n\n![](img/index-314_1.jpg)\n\
    \n```\n--通过使用只读 Null 属性将变量设为 NULL\nSET @Polygon = GEOMETRY::[Null] ;\nSELECT @Polygon\
    \ ;\n```\n\n可以使用 `STIsValid` 方法检查已知文本或已知二进制的有效性。如果实例无效，可以使用 `MakeValid` 方法使其有效。例如，考虑清单\
    \ 11-7 中的脚本，该脚本实例化了一个自相交的 `Polygon`。\n\n***清单 11-7.*** 验证和更正实例\n\n```\nDECLARE\
    \ @Polygon GEOMETRY ;\nSET @Polygon = GEOMETRY::STGeomFromText('POLYGON((0 0,\
    \ 10 10, 10 0, 0 10, 0 0))', 0) ;\n\nSELECT\n    @Polygon.STIsValid() AS IsValid\n\
    \    , @Polygon.MakeValid().ToString() AS Fixed\n    , @Polygon AS WKB ;\n```\n\
    \n如图 11-3 所示 的结果显示，原始值返回 `0`，因为它无效，而修复后的版本已将其转换为 `MultiPolygon`。\n\n***图 11-3.**\
    \ 验证和更正实例的结果*\n\n![](img/index-315_1.jpg)\n\n查询的图形化结果显示在图 11-4. 中。\n\n***图 11-4.**\
    \ 验证和更正实例的图形化结果*\n\n值得注意的是，由于空间数据的解析方式，`STIsValid` 和 `MakeValid` 的使用受到一些限制。例如，考虑清单\
    \ 11-8 中 的脚本，该脚本尝试实例化一个未封闭的 `Polygon`。\n\n***清单 11-8.*** 尝试实例化未封闭的 `Polygon`\n\
    \n```\nDECLARE @LineString GEOMETRY ;\nSET @LineString = GEOMETRY::STGeomFromText('POLYGON((0\
    \ 0, 10 10, 10 0, 0 10))', 0) ;\n\nSELECT\n    @LineString.STIsValid() AS IsValid\n\
