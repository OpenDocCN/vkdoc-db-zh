  trans: "# 第 4 章 XML 的查询与分解\n\n## 模式定义\n\n```xml\n<xs:sequence>\n  <xs:element name=\"\
    OrderHeader\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ name=\"CustomerName\" type=\"xs:string\" />\n        <xs:element name=\"OrderDate\"\
    \ type=\"xs:date\" />\n        <xs:element name=\"OrderID\" type=\"xs:unsignedInt\"\
    \ />\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n  <xs:element\
    \ name=\"OrderDetails\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ maxOccurs=\"unbounded\" name=\"Product\">\n          <xs:complexType>\n    \
    \        <xs:attribute name=\"ProductID\" type=\"xs:unsignedByte\" use=\"required\"\
    \ />\n            <xs:attribute name=\"ProductName\" type=\"xs:string\" use=\"\
    required\" />\n            <xs:attribute name=\"Price\" type=\"xs:decimal\" use=\"\
    required\" />\n            <xs:attribute name=\"Qty\" type=\"xs:unsignedShort\"\
    \ use=\"required\" />\n          </xs:complexType>\n        </xs:element>\n  \
    \    </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n</xs:sequence>\n\
    </xs:complexType>\n</xs:element>\n</xs:sequence>\n</xs:complexType>\n</xs:element>\n\
    </xs:schema>\n```\n\n## 命名空间提示\n\n**提示** 因为该模式未指定命名空间，它将与默认的空字符串命名空间关联。可以使用 `<xs:schema>`\
    \ 属性 `xmlns:ns=http://your-namespace` 向模式添加命名空间。\n\n## 将模式绑定到列\n\n我们可以通过使用清单 4-33\
    \ 中的查询，将我们的模式绑定到 `OrderSummary` 列。\n\n***清单 4-33.*** 将模式绑定到列\n\n```sql\nALTER\
    \ TABLE Sales.CustomerOrderSummary\nALTER COLUMN OrderSummary XML(OrderSummary);\n\
    ```\n\n## 在查询中引用模式\n\n我们在构造或查询 XML 数据时也可以引用模式。`FOR XML` 子句包含一个 `WITH XMLNAMESPACES`\
    \ 选项，可用于指定结果 XML 文档的目标命名空间，并且 XQuery 方法（如 `query`）可以以 `declare namespace` 语句开头。\n\
    \n**提示** 关于命名空间使用的完整讨论超出了本书的范围。但是，可以在 [`docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017)\
    \ 找到使用 `WITH XMLNAMESPACES` 的示例，在 [`docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017)\
    \ 可以找到使用命名空间与 `query` 方法的示例。\n\n## 总结\n\nXQuery 是一种可用于查询存储在 SQL Server 列和变量中的\
    \ XML 数据的语言。`exist()` 方法可用于检查节点或包含特定值的节点是否存在。`value()` 方法可用于从 XML 文档中提取标量值，而 `query()`\
    \ 方法可用于返回仍为 XML 格式的 XML 文档子集。\n\nFLWOR 语句可用于帮助导航和迭代 XML 文档。`for` 语句将变量绑定到输入序列。`let`\
    \ 语句用于将 XQuery 表达式赋值给变量。`where` 语句可用于筛选返回的结果。`order by` 语句可选择性地用于对 FLWOR 语句的结果进行排序。`return`\
    \ 语句指定将返回什么数据。\n\nT-SQL 变量和列可以传递到 XQuery 语句中。当采用这种技术时，它被称为**跨域查询**。它允许轻松地将值绑定到\
    \ XQuery 语句，有助于简化逻辑并减少重复代码。\n\nXML 数据可以使用 `modify()` 方法进行修改。此方法允许开发人员使用以下三个选项之一：`insert`、`replace\
    \ value of` 或 `delete`。插入数据时，开发人员还可以利用更多选项，以便对插入发生的位置进行精细控制。例如，你可以选择在第一个、最后一个、某个节点之后或某个节点之前插入。\n\
    \nXML 数据可以转换为关系数据（即，分解）。"
- fmt: "by using either the `OPENXML()` function or the `nodes()` XQuery method.\n\
    \nWhen the `OPENXML()` function is used, the XML document to be shredded must\
    \ first be parsed. This can be achieved with the `sys.sp_xml:preparedocument`\
    \ system-stored procedure. Once the document has been shredded, the parse tree\
    \ should be removed from memory, by using the `sys.sp_xml:removedocument` system-stored\
    \ procedure.\n\n# CHAPTER 4 Querying And Shredding XML\n\nWhen the `nodes()` XQuery\
    \ method is used to shred data, it can be used in conjunction with either the\
    \ `value()` method, which will shred the data into relational results, or the\
    \ `query()` method, which will shred the data into smaller XML documents. You\
    \ can also use `nodes()` with a combination of both `value()` and `query()`. The\
    \ biggest advantage of the `nodes()` method is the ease with which it can be applied\
    \ to a column, using the `CROSS APPLY` operator.\n\n# CHAPTER 5 XML Indexes\n\n\
    As discussed in Chapters [3](#index_split_000.html#p61) [and 4](#index_split_001.html#p125),\
    \ SQL Server allows you to store data in tables, in a native XML format, using\
    \ the `XML` data type. Like other large object types, it can store up to a maximum\
    \ of 2GB per tuple. Although standard operators such as `=` and `LIKE` can be\
    \ used against XML columns, you also have the option of using XQuery expressions\
    \ (discussed in this chapter). They can be rather inefficient, however, unless\
    \ you create XML indexes.\n\nXML indexes will outperform full-text indexes for\
    \ most queries against XML columns. SQL Server offers support for primary XML\
    \ indexes and three types of secondary XML indexes: `PATH`, `VALUE`, and `PROPERTY`.\
    \ Each of these indexes will be discussed in the following sections. First, however,\
    \ I will briefly discuss clustered indexes, as a clustered index must exist on\
    \ the table before you can create an XML index.\n\n## Preparing the Environment\n\
    \nBecause the `WideWorldImporters` database has no tables that contain native\
    \ XML columns, we will create an `OrderSummary` table, for demonstrations within\
    \ this chapter. The table will contain three columns: an `IDENTITY` column (named\
    \ `ID`), a `CustomerID` column, and an `XML` column (called `OrderSummary`), which\
    \ will contain a summary of all orders that a customer has placed. The table can\
    \ be created and populated using the script in Listing [5-1](#index_split_001.html#p170).\n\
    \n© Peter A. Carter 2018\n\nP. A. Carter, *SQL Server Advanced Data Types*, [https://doi.org/10.1007/978-1-4842-3901-8_5](#index_split_001.html#p169)\n\
    \nChapter 5 XML Indexes\n\n***Listing 5-1.*** Creating an `OrderSummary` Table\n\
    \n```sql\nUSE WideWorldImporters\n\nGO\n\nCREATE TABLE Sales.OrderSummary\n(\n\
    \    ID INT NOT NULL IDENTITY,\n    CustomerID INT NOT NULL,\n    OrderSummary\
    \ XML\n) ;\n\nINSERT INTO Sales.OrderSummary (CustomerID, OrderSummary)\nSELECT\n\
    \    CustomerID,\n    (\n        SELECT\n            CustomerName 'OrderHeader/CustomerName'\n\
    \            , OrderDate 'OrderHeader/OrderDate'\n            , OrderID 'OrderHeader/OrderID'\n\
    \            , (\n                SELECT\n                    LineItems2.StockItemID\
    \ '@ProductID'\n                    , StockItems.StockItemName '@ProductName'\n\
    \                    , LineItems2.UnitPrice '@Price'\n                    , Quantity\
    \ '@Qty'\n                FROM Sales.OrderLines LineItems2\n                INNER\
    \ JOIN Warehouse.StockItems StockItems\n                    ON LineItems2.StockItemID\
    \ = StockItems.StockItemID\n                WHERE LineItems2.OrderID = Base.OrderID\n\
    \                FOR XML PATH('Product'), TYPE\n            ) 'OrderDetails'\n\
    \        FROM\n            (\n                SELECT DISTINCT\n              \
    \      Customers.CustomerName\n                    , SalesOrder.OrderDate\n  \
    \                  , SalesOrder.OrderID\n                FROM Sales.Orders SalesOrder\n\
    \                INNER JOIN Sales.OrderLines LineItem\n                    ON\
    \ SalesOrder.OrderID = LineItem.OrderID\n                INNER JOIN Sales.Customers\
    \ Customers\n                    ON Customers.CustomerID = SalesOrder.CustomerID\n\
    \                WHERE customers.CustomerID = OuterCust.CustomerID\n         \
    \   ) Base\n        FOR XML PATH('Order'), ROOT ('SalesOrders'), TYPE\n    ) AS\
    \ OrderSummary\nFROM Sales.Customers OuterCust ;\n```\n\n## Clustered Indexes\n\
    \nA clustered index causes the data pages of a table to be logically stored in\
    \ the order of the clustered index key. The clustered index key can be a single\
    \ column or a set of columns. This is often the table’s primary key, but this\
    \ is not enforced, and there are some circumstances in which you would want to\
    \ use a different column. This will be discussed in more detail later in this\
    \ chapter.\n\n### Tables Without a Clustered Index\n\nWhen a table exists without\
    \ a clustered index, it is known as a heap. A heap consists of an `IAM` (index\
    \ allocation map) page (or pages) and a series of data pages that are not linked\
    \ together or stored in order. The only way SQL Server can determine the pages\
    \ of the table is by reading the `IAM` page(or pages). When a table is stored\
    \ as a heap, every time the table is accessed, SQL Server must read every single\
    \ page in the table, even if you only want to return one row. The diagram in Figure\
    \ [5-1](#index_split_001.html#p172) illustrates how a heap is structured.\n\n\
