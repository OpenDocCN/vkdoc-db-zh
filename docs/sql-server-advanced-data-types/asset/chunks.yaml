    然而，您会注意到，在 `结果` 和 `消息` 选项卡之间，出现了一个名为 `空间结果` 的新选项卡。此窗格如图 10-7 所示。


    **图 10-7.** `空间结果` 选项卡 — `GEOMETRY`


    您会发现，我们可以看到表面的图形表示，以及一些基本控件，允许我们放大和缩小，并且如果结果集中包含多个空间列，还可以在列之间切换。通过拖动鼠标，还可以围绕对象滚动查看。


    考虑清单 10-4。您会注意到该脚本与清单 10-3 非常相似，除了我们现在声明的是一个 `GEOGRAPHY` 类型的变量，而不是 `GEOMETRY`。


    **清单 10-4.** 使用 `GEOGRAPHY` 声明一个 `CurvePolygon`


    ```sql

    DECLARE @CurvePolygon GEOGRAPHY = ''CURVEPOLYGON(CIRCULARSTRING(1 3, 3 5, 4 7,
    7 3, 1 3))'' ;

    SELECT @CurvePolygon ;

    ```


    ![](img/index-306_1.jpg)


    图 10-8 显示了该脚本的 `空间结果` 选项卡。您会注意到网格的单位已从欧几里得式坐标变为度数，这反映了现在使用的是地球模型，我们的坐标实际上是经度和纬度。


    **图 10-8.** `空间结果` 选项卡 — `GEOGRAPHY`


    ## 小结


    SQL Server 提供了两种用于处理空间数据的数据类型：`GEOMETRY` 和 `GEOGRAPHY`。`GEOMETRY` 允许您在欧几里得（平面）模型中工作，而
    `GEOGRAPHY` 允许您在地球（球体）模型中工作。SQL Server 的空间实现基于开放地理空间联盟 (`OGC`) 制定的标准。


    空间形状，称为面，可以使用熟知文本 (`WKT`) 或熟知二进制 (`WKB`) 来定义，这些都是由 `OGC` 制定的标准。使用 `WKT` 时，面类型由名称及其点规格定义。使用
    `WKB` 时，您可以控制字节顺序，然后指定面类型，最后指定点规格。`WKB` 通常使用十六进制表示法来表示。


    SQL Server 支持以下基本和多部件地理类型，并且当在 SQL Server 2017 或更高版本中使用 `GEOGRAPHY` 时，还支持 `FullGlobe`
    几何类型：


    - `Point`

    - `LineString`

    - `CircularString`

    - `CompoundCurve`

    - `Polygon`

    - `CurvePolygon`

    - `MultiPoint`

    - `MultiLineString`

    - `MultiPolygon`

    - `GeometryCollection`


    SQL Server 支持多种空间参考系统。这在使用 `GEOGRAPHY` 时非常重要，因为每个 `SRID` 都实现了自己的地图投影。具有冲突 `SRID`
    的面可以存储在同一列中，但不能使用空间函数进行比较。


    SQL Server Management Studio 为空间查询提供图形结果。`空间结果` 选项卡允许您移动面、进行缩放。网格会根据结果的数据类型，在欧几里得坐标和纬度/经度之间切换。


    # 第 11 章 处理空间数据


    在第 10 章中，我讨论了与空间数据相关的概念，SQL Server 使用 `GEOMETRY` 和 `GEOGRAPHY` 数据类型来实现。


    在本章中，我将探讨如何使用这些数据类型。首先，我将讨论可用于构建面的方法，然后回顾如何查询空间数据。最后，您将看到如何设计和创建空间索引。


    **注意** 一个地理空间对象可以被称为 `geometry`（几何对象），简单的对象被称为基本几何对象，对象的集合被称为 `geometry` 集合（几何集合）。由于
    `geometry` 也是指代以平面模型实现空间数据的数据类型的名称，这可能会引起混淆。因此，请注意，当本章提到地理空间对象时，将使用小写的 `geometry`
    一词。当指代数据类型时，将使用大写的 `GEOMETRY`。'
