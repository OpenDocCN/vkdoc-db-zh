    >\n    <posList>0 0 4.5 5 4.5 0 0 0</posList>\n</LineString>', 0) ;\nSELECT @LineString\
    \ ;\n```\n\nSQL Server also provides an extended method for creating a spatial\
    \ instance, by defining the x and y coordinates of a point. Listing 11-4 demonstrates\
