    ## Using FOR XML AUTO


    Unlike `FOR XML RAW`, for `XML AUTO` can return nested results. It is also refreshingly
    simple to use, because it will automatically nest the data, based on the joins
    within your query. The modified query in `Listing 3-10` uses `AUTO` mode to return
    a hierarchical XML document.


    # Chapter 3 ConstruCting XML with t-sQL


    ### Listing 3-10.


    Using `FOR XML AUTO`


    ```sql

    SELECT

    SalesOrder.OrderDate

    , Customers.CustomerName

    , SalesOrder.OrderID

    , Product.StockItemName

    , LineItem.Quantity

    , LineItem.UnitPrice

    FROM Sales.Orders SalesOrder

    INNER JOIN Sales.OrderLines LineItem

    ON LineItem.OrderID = SalesOrder.OrderID

    INNER JOIN Warehouse.StockItems Product

    ON Product.StockItemID = LineItem.StockItemID

    INNER JOIN Sales.Customers Customers

    ON Customers.CustomerID = SalesOrder.CustomerID

    WHERE customers.CustomerName = ''Agrita Abele''

    FOR XML AUTO ;

    ```


    The XML fragment that is returned by this query can be partially seen in `Listing
    3-11`.


    ### Listing 3-11.


    Using `FOR XML AUTO` Results


    ```xml

    <SalesOrder OrderDate="2016-05-19" OrderID="72787">

    <Customers CustomerName="Agrita Abele">

    <Product StockItemName="Developer joke mug - when your hammer is C++ (Black)">

    <LineItem Quantity="2" UnitPrice="13.00" />

    </Product>

    ```


