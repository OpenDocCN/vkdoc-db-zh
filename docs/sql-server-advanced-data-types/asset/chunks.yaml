  trans: '

    # 第 5 章 XML 索引


    ## XML 索引的性能考量


    为了讨论 XML 索引的性能，让我们编写一个查询，该查询非常适合我们已在`OrderSummary`表上创建的 PATH 辅助 XML 索引。清单 5-6
    中的查询针对`OrderSummary`表运行，并返回所有订购了`StockItemID`为 223 的“巧克力针鼹 250 克”产品的客户行。脚本的第一部分从缓冲区缓存中移除未更改的页并清除计划缓存，以确保测试的公平性。脚本的中间部分启用了时间统计，以便我们能准确记录查询执行所需的时间。


    **提示** 性能会因服务器规格以及并发进程消耗的资源量而异。你应该始终在自己的环境中检查性能。


    ### 清单 5-5. 创建辅助 XML 索引


    ```sql

    USE WideWorldImporters


    GO


    CREATE XML INDEX [SecondaryXmlIndex-OrderSummary-Path]

    ON Sales.OrderSummary (OrderSummary)

    USING XML INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary] FOR PATH ;


    GO

    ```


    ### 清单 5-6. 返回订购了 StockItemID 223 的客户的行


    ```sql

    --清除缓冲区缓存和计划缓存

    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    --启用时间统计以便随结果显示

    SET STATISTICS TIME ON

    GO


    --运行查询

    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    图 5-10 所示的统计信息显示，查询耗时 1.95 秒完成。


    ### 图 5-10. 使用 PATH 索引的查询结果


    现在，让我们使用清单 5-7 中的脚本来删除 PATH 索引并再次运行查询。这次，只有主 XML 索引可用。


    ### 清单 5-7. 在没有 PATH 索引的情况下运行查询


    ```sql

    DROP INDEX [SecondaryXmlIndex-OrderSummary-Path] ON Sales.OrderSummary ;

    GO


    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    SET STATISTICS TIME ON

    GO


    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    这一次，从图 5-11 的统计信息中我们可以看到，查询耗时超过 2.7 秒才完成。


    ### 图 5-11. 没有 PATH 索引的查询结果


    最后，让我们使用清单 5-8 中的脚本来删除主 XML 索引，并在没有任何 XML 索引支持的情况下再次运行查询。


    ### 清单 5-8. 删除主 XML 索引并重新运行查询


    ```sql

    DROP INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary] ON Sales.OrderSummary ;

    GO


    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    SET STATISTICS TIME ON

    GO


    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    从图 5-12 的统计信息中你会注意到，查询执行时间现在已上升到超过 4 秒。虽然我们的表只有不到 700 行，并且你看到的结果会因机器性能而异，但这个例子说明了为何创建
    XML 索引如此重要。


    ### 图 5-12. 没有 XML 索引的查询结果


    ## 小结


    可以在 XML 列上创建专门的 XML 索引，以提升依赖于查询 XML 数据的查询性能。XML 索引有四种类型：主索引、辅助 PATH 索引、辅助 VALUE
    索引和辅助 PROPERTY 索引。


    除非表具有聚集主键（基于主键列构建的聚集索引），否则无法在 XML 列上创建主 XML 索引。除非 XML 列上已存在主 XML 索引，否则无法创建辅助 XML
    索引。但是，可以在表填充数据之前创建 XML 索引。

    '
- fmt: "# CHAPTER 6 Understanding JSON\n\nAs SQL Server evolves, more and more nonrelational\
    \ features are being added to the product, blurring the lines between relational\
    \ and NoSQL technologies. JSON is an example of this. JSON (JavaScript object\
    \ notation) is a document format, designed as a method of lightweight data interchange.\n\
    \nIt is similar to XML, in the respect that it is a self-describing, hierarchical\
    \ data-interchange format. Unlike XML, however, JSON tags are minimal, making\
    \ JSON documents shorter and both easier to read and quicker to parse.\n\nIn this\
    \ chapter, I will introduce the JSON format. I will discuss the structure of a\
    \ JSON document and compare it to an XML document. Finally, I will discuss usage\
    \ scenarios for JSON data within SQL Server.\n\nQueries that interrogate XML columns\
    \ can be quite inefficient and perform poorly, unless the correct XML indexes\
    \ are created to support them. XML indexes will always be more efficient on XML\
    \ columns than full-text indexes will be. As demonstrated in this chapter, XML\
    \ query performance is significantly impaired if XML indexes are not created appropriately.\n\
    \n## Understanding the JSON Format\n\nThe basic JSON syntax uses name/value pairs,\
    \ separated by a colon. The JSON object is then enclosed by braces. The name must\
    \ be a string, enclosed with double quotes, and the value must be:\n\n*   A string\
    \ (enclosed by double quotes)\n*   A number\n*   A nested JSON object\n*   A Boolean\
    \ value\n*   An array (enclosed by square brackets)\n*   `NULL`\n\n© Peter A.\
    \ Carter 2018\n\nP. A. Carter, *SQL Server Advanced Data Types*,\n[https://doi.org/10.1007/978-1-4842-3901-8_6](#index_split_001.html#p192)\n\
    \nChapter 6 Understanding JSON\n\nFor instance, consider the simple example in\
    \ Listing 6-1.\n\n***Listing 6-1.*** Simple JSON Document\n\n```\n{ \"FirstName\"\
    \ : \"Pete\" }\n```\n\nIf multiple name/value pairs occur within a JSON document,\
    \ they are separated by a comma. For example, consider the JSON document in Listing\
    \ 6-2. You will notice that the value for `age` is not enclosed in double quotes,\
    \ because it is a number, as opposed to a string.\n\n***Listing 6-2.*** Simple\
    \ JSON Document with Multiple Name/Value Pairs\n\n```\n{ \"FirstName\" : \"Pete\"\
    \ , \"LastName\" : \"Carter\" , \"Age\" : 38 }\n```\n\nIf you were to represent\
    \ as a JSON flat document a row set in a table, the result would be an array of\
    \ JSON objects. For example, consider the query in Listing 6-3.\n\n***Listing\
    \ 6-3.*** Top Vehicle Temperatures\n\n```\nUSE WideWorldImporters\nGO\n\nSELECT\
    \ TOP 3\n    VehicleRegistration\n    , ChillerSensorNumber\n    , Temperature\n\
    FROM Warehouse.VehicleTemperatures\nORDER BY Temperature DESC ;\n```\n\n![](index-194_1.jpg)\n\
    \nChapter 6 Understanding JSON\n\nThis query will produce the results displayed\
    \ in Figure 6-1.\n\n***Figure 6-1.** Top vehicle temperatures*\n\nIf this result\
    \ set were to be expressed as a JSON document, it would look like the document\
    \ in Listing 6-4.\n\n***Listing 6-4.*** Top Vehicle Temperatures Expressed As\
    \ JSON\n\n```\n[\n  {\n    \"VehicleRegistration\": \"WWI-321-A\",\n    \"ChillerSensorNumber\"\
    : 1,\n    \"Temperature\": 5\n  },\n  {\n    \"VehicleRegistration\": \"WWI-321-A\"\
    ,\n    \"ChillerSensorNumber\": 2,\n    \"Temperature\": 5\n  },\n  {\n    \"\
    VehicleRegistration\": \"WWI-321-A\",\n    \"ChillerSensorNumber\": 1,\n    \"\
    Temperature\": 5\n  }\n]\n```\n\nYou can see that the results are an array of\
    \ JSON objects; therefore, the document is enclosed in square brackets. Each JSON\
    \ object (representing a single row in the table) is enclosed in braces and separated\
    \ by commas. Within each JSON object, comma separated name/value pairs represent\
    \ each column in the tabular representation of the results.\n\nThe `Warehouse.VehicleTemperatures`\
    \ table, in the `WideWorldImporters` database also includes a column with the\
    \ JSON data type, which records the full sensor data. Consider the query in Listing\
    \ 6-5.\n\n***Listing 6-5.*** Vehicle Temperatures with Full Sensor Data\n\n```\n\
    USE WideWorldImporters\nGO\n\nSELECT TOP 3\n    VehicleRegistration\n    , ChillerSensorNumber\n\
    \    , Temperature\n    , FullSensorData\nFROM Warehouse.VehicleTemperatures\n\
    ```"
  raw: 'Queries that interrogate XML columns can be quite inefficient and


    perform poorly, unless the correct XML indexes are created to support


    them. XML indexes will always be more efficient on XML columns than


    full-text indexes will be. As demonstrated in this chapter, XML query


    performance is significantly impaired if XML indexes are not created


    appropriately.


    **CHAPTER 6**


    **Understanding JSON**


    As SQL Server evolves, more and more nonrelational features are being


    added to the product, blurring the lines between relational and NoSQL


    technologies. JSON is an example of this. JSON (JavaScript object notation) is
    a document format, designed as a method of lightweight data interchange.


    It is similar to XML, in the respect that it is a self-describing, hierarchical
    data-interchange format. Unlike XML, however, JSON tags are minimal,


    making JSON documents shorter and both easier to read and quicker to parse.


    In this chapter, I will introduce the JSON format. I will discuss the


    structure of a JSON document and compare it to an XML document.


    Finally, I will discuss usage scenarios for JSON data within SQL Server.


    **Understanding the JSON Format**


    The basic JSON syntax uses name/value pairs, separated by a colon.


    The JSON object is then enclosed by braces. The name must be a string,


    enclosed with double quotes, and the value must be


    • A string (enclosed by double quotes)


    • A number


    • A nested JSON object


    • A Boolean value


    • An array (enclosed by square brackets)


    • NULL


    © Peter A. Carter 2018


    P. A. Carter, *SQL Server Advanced Data Types*,


    [https://doi.org/10.1007/978-1-4842-3901-8_6](#index_split_001.html#p192)


    Chapter 6 Understanding JsOn


    For instance, consider the simple example in Listing [6-1](#index_split_001.html#p193).


    ***Listing 6-1.*** Simple JSON Document


    { "FirstName" : "Pete" }


    If multiple name/value pairs occur within a JSON document, they


    are separated by a comma. For example, consider the JSON document in


    Listin[g 6-2\. Y](#index_split_001.html#p193)ou will notice that the value for
    age is not enclosed in double quotes, because it is a number, as opposed to a
    string.


    ***Listing 6-2.*** Simple JSON Document with Multiple Name/Value Pairs


    { "FirstName" : "Pete" , "LastName" : "Carter" , "Age" : 38 }


    If you were to represent as a JSON flat document a row set in a table,


    the result would be an array of JSON objects. For example, consider the


    query in Listin[g 6-3.](#index_split_001.html#p193)


    ***Listing 6-3.*** Top Vehicle Temperatures


    USE WideWorldImporters


    GO


    SELECT TOP 3


    VehicleRegistration


    , ChillerSensorNumber


    , Temperature


    FROM Warehouse.VehicleTemperatures


    ORDER BY Temperature DESC ;


    ![](index-194_1.jpg)


    Chapter 6 Understanding JsOn


    This query will produce the results displayed in Figur[e 6-1.](#index_split_001.html#p194)


    ***Figure 6-1.** Top vehicle temperatures*


    If this result set were to be expressed as a JSON document, it would


    look like the document in Listin[g 6-4.](#index_split_001.html#p194)


    ***Listing 6-4.*** Top Vehicle Temperatures Expressed As JSON


    [


    {


    "VehicleRegistration": "WWI-321-A",


    "ChillerSensorNumber": 1,


    "Temperature": 5


    },


    {


    "VehicleRegistration": "WWI-321-A",


    "ChillerSensorNumber": 2,


    "Temperature": 5


    },


    {


    Chapter 6 Understanding JsOn


    "VehicleRegistration": "WWI-321-A",


    "ChillerSensorNumber": 1,


    "Temperature": 5


    }


    ]


    You can see that the results are an array of JSON objects; therefore, the document
    is enclosed in square brackets. Each JSON object (representing


    a single row in the table) is enclosed in braces and separated by commas.


    Within each JSON object, comma separated name/value pairs represent


    each column in the tabular representation of the results.


    The Warehouse.VehicleTemperatures table, in the WideWorldImporters


    database also includes a column with the JSON data type, which records


    the full sensor data. Consider the query in Listin[g 6-5.](#index_split_001.html#p195)


    ***Listing 6-5.*** Vehicle Temperatures with Full Sensor Data


    USE WideWorldImporters


    GO


    SELECT TOP 3


    VehicleRegistration


    , ChillerSensorNumber


    , Temperature


    , FullSensorData


    FROM Warehouse.VehicleTemperatures'
  trans: "\n# 第 6 章 理解 JSON\n\n随着 SQL Server 的演进，产品中加入了越来越多的非关系型特性，模糊了关系型与 NoSQL 技术之间的界限。JSON\
    \ 便是其中一例。JSON（JavaScript 对象符号）是一种文档格式，被设计为一种轻量级的数据交换方法。\n\n就其是自描述的、分层的数据交换格式而言，JSON\
    \ 与 XML 相似。然而，与 XML 不同的是，JSON 的标签极简，这使得 JSON 文档更简短、更易于阅读且解析速度更快。\n\n本章中，我将介绍 JSON\
    \ 格式。我将讨论 JSON 文档的结构，并将其与 XML 文档进行比较。最后，我将讨论在 SQL Server 中使用 JSON 数据的场景。\n\n查询\
    \ XML 列可能效率相当低下且性能不佳，除非创建了正确的 XML 索引来支持它们。对于 XML 列，XML 索引总是比全文索引更高效。正如本章所演示的，如果没有恰当地创建\
    \ XML 索引，XML 查询性能会受到显著损害。\n\n## 理解 JSON 格式\n\n基本的 JSON 语法使用名称/值对，并以冒号分隔。然后，JSON\
    \ 对象由花括号括起来。名称必须是一个用双引号括起来的字符串，而值必须是：\n\n*   一个字符串（由双引号括起）\n*   一个数字\n*   一个嵌套的\
    \ JSON 对象\n*   一个布尔值\n*   一个数组（由方括号括起）\n*   `NULL`\n\n© Peter A. Carter 2018\n\
    \nP. A. Carter, *SQL Server Advanced Data Types*,\n`doi.org/10.1007/978-1-4842-3901-8_6`\n\
    \n第 6 章 理解 JSON\n\n例如，考虑代码清单 6-1 中的简单示例。\n\n***代码清单 6-1.*** 简单 JSON 文档\n\n```\n\
    { \"FirstName\" : \"Pete\" }\n```\n\n如果一个 JSON 文档中出现多个名称/值对，它们会用逗号分隔。例如，考虑代码清单\
    \ 6-2 中的 JSON 文档。您会注意到 `age` 的值没有用双引号括起来，因为它是一个数字，而不是字符串。\n\n***代码清单 6-2.*** 具有多个名称/值对的简单\
    \ JSON 文档\n\n```\n{ \"FirstName\" : \"Pete\" , \"LastName\" : \"Carter\" , \"\
    Age\" : 38 }\n```\n\n如果您要将表中的一个行集表示为一个 JSON 平面文档，结果将是一个 JSON 对象数组。例如，考虑代码清单 6-3\
    \ 中的查询。\n\n***代码清单 6-3.*** 车辆最高温度查询\n\n```\nUSE WideWorldImporters\nGO\n\nSELECT\
    \ TOP 3\n    VehicleRegistration\n    , ChillerSensorNumber\n    , Temperature\n\
    FROM Warehouse.VehicleTemperatures\nORDER BY Temperature DESC ;\n```\n\n![](img/index-194_1.jpg)\n\
    \n第 6 章 理解 JSON\n\n此查询将产生如图 6-1 所示的结果。\n\n***图 6-1.*** *车辆最高温度*\n\n如果要将此结果集表示为\
    \ JSON 文档，它将如代码清单 6-4 中的文档所示。\n\n***代码清单 6-4.*** 以 JSON 表示的车辆最高温度\n\n```\n[\n\
    \  {\n    \"VehicleRegistration\": \"WWI-321-A\",\n    \"ChillerSensorNumber\"\
    : 1,\n    \"Temperature\": 5\n  },\n  {\n    \"VehicleRegistration\": \"WWI-321-A\"\
    ,\n    \"ChillerSensorNumber\": 2,\n    \"Temperature\": 5\n  },\n  {\n    \"\
    VehicleRegistration\": \"WWI-321-A\",\n    \"ChillerSensorNumber\": 1,\n    \"\
    Temperature\": 5\n  }\n]\n```\n\n您可以看到结果是一个 JSON 对象数组；因此，文档由方括号括起来。每个 JSON 对象（表示表中的一行）由花括号括起来并用逗号分隔。在每个\
    \ JSON 对象内，逗号分隔的名称/值对表示结果表格化表示中的每一列。\n\n`WideWorldImporters` 数据库中的 `Warehouse.VehicleTemperatures`\
    \ 表还包括一个 JSON 数据类型的列，用于记录完整的传感器数据。考虑代码清单 6-5 中的查询。\n\n***代码清单 6-5.*** 包含完整传感器数据的车辆温度查询\n\
    \n```\nUSE WideWorldImporters\nGO\n\nSELECT TOP 3\n    VehicleRegistration\n \
    \   , ChillerSensorNumber\n    , Temperature\n    , FullSensorData\nFROM Warehouse.VehicleTemperatures\n\
    ```\n"
