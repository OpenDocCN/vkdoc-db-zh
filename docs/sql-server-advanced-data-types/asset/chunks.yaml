    # 第 11 章：处理空间数据


    ## 表 11-2. 空间数据方法


    | 方法 | 适用对象 | OGC 标准/扩展 | 描述 |

    | :--- | :--- | :--- | :--- |

    | `AsBinaryZM()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 将空间实例转换为其 WKB 表示形式。 |

    | `AsGml()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回空间实例的 GML 表示形式。 |

    | `AsTextZM()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回空间实例的 WKT 表示形式。 |

    | `BufferWithCurves()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回围绕空间实例的缓冲区的多边形近似值。 |

    | `BufferWithTolerance()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回围绕空间实例的缓冲区的多边形近似值，其中容差指定了原始几何图形与近似值之间的最大距离。
    |

    | `CurveToLineWithTolerance()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 在指定容差范围内将曲线转换为线串。
    |

    | `EnvelopeAngle()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回实例边界圆的中心点与几何图形中某一点之间的最大角度（以度为单位）。
    |

    | `EnvelopeCenter()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回空间实例边界圆的中心。 |

    | `Filter()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 尝试判断一个空间实例是否可能与另一个空间实例相交。如果它们可能相交则返回
    1，不相交则返回 0。 |

    | `HasM()` | 仅 `GEOGRAPHY` | 扩展 | 如果存在 M 值则返回 1，不存在则返回 0。指示是否已为空间实例指定了 M 值。 |

    | `HasZ()` | 仅 `GEOGRAPHY` | 扩展 | 如果存在 Z 值则返回 1，不存在则返回 0。指示是否已为空间实例指定了 Z 值。 |

    | `InstanceOf()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 如果空间实例属于指定类型则返回 1，如果是其他类型则返回
    0。 |

    | `IsNull()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 如果空间实例为空则返回 1。 |

    | `IsValidDetailed()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 验证空间实例。如果对象有效，则返回 0。如果对象无效，则返回描述无效原因的错误代码。这些错误代码及其含义可在文档中找到。
    |

    | `Lat()` | 仅 `GEOGRAPHY` | OGC | 返回`POINT`的纬度。 |

    | `Long()` | 仅 `GEOGRAPHY` | OGC | 返回`POINT`的经度。 |

    | `M()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回空间实例的 M 值。 |

    | `MakeValid()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 将格式不良的空间实例转换为格式良好的实例。 |

    | `MinDbCompatibilityLevel()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 返回支持该空间实例类型所需的最低数据库兼容性级别。
    |

    | `NumRings()` | 仅 `GEOGRAPHY` | 扩展 | 返回`POLYGON`内的环总数。 |

    | `Reduce()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 对空间实例运行道格拉斯-普克算法，并返回由容差定义的近似结果。
    |

    | `ReorientObject()` | 仅 `GEOGRAPHY` | 扩展 | 更改`POLYGON`的环方向。 |

    | `RingN()` | 仅 `GEOGRAPHY` | 扩展 | 接受一个定义从 1 开始的索引的参数。返回给定索引号处的空间实例中的环。 |

    | `ShortestLineTo()` | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 接受一个空间对象作为参数，并返回一个`LINESTRING`，表示调用该方法的空间对象与作为参数传递的空间对象之间的最短距离。
    |

    | `STArea()` | `GEOGRAPHY`, `GEOMETRY` | OGC | 返回实例的表面积。 |

    | `STAsBinary()` | `GEOGRAPHY`, `GEOMETRY` | OGC | 返回实例的 WKB。 |

    | `STAsText()` | `GEOGRAPHY`, `GEOMETRY` | OGC | 返回实例的 WKT。 |

    '
- fmt: '# Chapter 11 Working with Spatial Data


    ## Table 11-2 Spatial Data Functions


    | Method | Description | Works With | OGC/Extended |

    | :--- | :--- | :--- | :--- |

    | `STBoundary()` | Returns the boundary of a geometry instance. | `GEOMETRY` only,
    `GEOGRAPHY` | OGC |

    | `STBuffer()` | Returns a geometry instance representing the buffer region of
    another geometry instance. Accepts a single parameter for distance. | `GEOMETRY`,
    `GEOGRAPHY` | OGC |

    | `STCentroid()` | Returns the geometric center of a geometry instance. | `GEOMETRY`,
    `GEOGRAPHY` | OGC |

    | `STContains()` | Evaluates if one geometry instance contains another. Returns
    1 if the contained instance is within the outer instance, and 0 if not. | `GEOMETRY`,
    `GEOGRAPHY` | OGC |

    | `STConvexHull()` | Returns the smallest possible convex `Polygon` that contains
    all points of a geometry instance. | `GEOMETRY` only, `GEOGRAPHY` | OGC |

    | `STCrosses()` | Returns 1 if a geometry instance crosses another, and 0 if it
    does not. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STCurveN()` | Returns a specific curve from a `CompoundCurve`, `CircularString`,
    or `Curve` instance. Accepts an index parameter. | `GEOMETRY` only, `GEOGRAPHY`
    | OGC |

    | `STCurveToLine()` | Returns an approximation of a circular curve instance as
    a `LineString` or `Polygon` instance. | `GEOMETRY` only, `GEOGRAPHY` | OGC |

    | `STDifference()` | Returns the portion of a geometry instance that does not
    intersect with another geometry instance. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STDimension()` | Returns the maximum dimension of a geometry instance. | `GEOMETRY`,
    `GEOGRAPHY` | OGC |

    | `STDisjoint()` | Returns 1 if two geometry instances do not intersect, and 0
    if they do. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STDistance()` | Returns the shortest distance between two geometry instances.
    | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STEndpoint()` | Returns the final point of a `LineString` or `CircularString`
    instance. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STEnvelope()` | Returns a rectangular `Polygon` that bounds a geometry instance.
    | `GEOMETRY` only, `GEOGRAPHY` | OGC |

    | `STEquals()` | Returns 1 if two geometry instances have the same point set,
    and 0 if they do not. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STExteriorRing()` | Returns the exterior ring of a `Polygon` instance. | `GEOMETRY`
    only, `GEOGRAPHY` | OGC |

    | `STGeometryN()` | Returns a specific object from a geometry collection. Accepts
    an index parameter. | `GEOMETRY`, `GEOGRAPHY` | OGC |

    | `STGeometryType()` | Returns the type of a geometry instance. | `GEOMETRY`,
    `GEOGRAPHY` | OGC |'
