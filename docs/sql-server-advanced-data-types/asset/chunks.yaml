- fmt: "# Chapter 8: Shredding JSON Data\n\nreturn the entire `SalesOrders` array,\
    \ as partially shown in [Figure 8-9](#index_split_002.html#p254).\n\n### Figure\
    \ 8-9. Results of basic OPENJSON()\n\n![](index-255_1.jpg)\n\nIf we were to use\
    \ a `PATH` statement, however, we could choose to only return the *n*th item in\
    \ this array. This would drastically alter the results set, as `OPENJSON()` would\
    \ be able to map each item within the array element to a relational column, meaning\
    \ that a row for each key within the element would be returned, instead of a single\
    \ row containing a JSON document, as shown in [Figure 8-10](#index_split_002.html#p255),\
    \ which contains the results of shredding the first array element (`OrderID` 72646).\n\
    \n### Figure 8-10. Results of shredding a single array element\n\nSo, let’s look\
    \ at how we can get to this result. First, we must understand that path expressions\
    \ can be run in one of two modes: `strict` or `lax`. If you run a path expression\
    \ in `lax` mode, and the path expression contains an error, `OPENJSON()` will\
    \ “eat the error” and return an empty result set. If you use `strict` mode, however,\
    \ if the path expression contains an error, `OPENJSON()` will throw an error message.\n\
    \nWe now must understand the elements of the path itself. First, we use a `$`\
    \ to specify the context, followed by dot-separated, nested key names. Finally,\
    \ we specify the array element number in square brackets. So, to produce the results\
    \ in [Figure 8-10](#index_split_002.html#p255), we would use the query in [Listing\
    \ 8-11](#index_split_002.html#p256).\n\n### Listing 8-11. Using Path Expressions\
    \ to Return a Single Array Element\n\n```sql\nDECLARE @JSON NVARCHAR(MAX) ;\n\n\
    SET @JSON = '{\n\"SalesOrders\": [\n    {\n        \"OrderID\": 72646,\n     \
    \   \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n        \"OrderDate\"\
    : \"2016-05-18\"\n    },\n    {\n        \"OrderID\": 72738,\n        \"CustomerID\"\
    : 1060,\n        \"SalespersonPersonID\": 14,\n        \"OrderDate\": \"2016-05-19\"\
    \n    },\n    {\n        \"OrderID\": 72916,\n        \"CustomerID\": 1060,\n\
    \        \"SalespersonPersonID\": 6,\n        \"OrderDate\": \"2016-05-20\"\n\
    \    },\n    {\n        \"OrderID\": 73081,\n        \"CustomerID\": 1060,\n \
    \       \"SalespersonPersonID\": 8,\n        \"OrderDate\": \"2016-05-24\"\n \
    \   }\n]\n}' ;\n\nSELECT *\nFROM OPENJSON(@JSON, 'lax $.SalesOrders[0]') ;\n```\n\
    \nYou will notice, in this script, that after passing in the JSON document, we\
    \ use the `lax` (or, alternatively, `strict`) keyword to specify the mode we will\
    \ use. After a space comes the path expression itself. Here, we start with `$`,\
    \ to set the context, and then point to the `SalesOrders` key. We then use square\
    \ brackets to specify the array element that we wish to use.\n\n**Tip** JSON path\
    \ expressions always use zero-base arrays.\n\n## Shredding Data into Tables\n\n\
    You can now imagine how simple looping techniques could be used to shred each\
    \ element within an array. For example, consider the script in [Listing 8-12](#index_split_002.html#p257).\
    \ This script will shred each of the array elements into a temporary table called\
    \ `#Orders`.\n\n### Listing 8-12. Shredding Each Element into a Temporary Table\n\
    \n```sql\nDECLARE @JSON NVARCHAR(MAX) ;\n\nSET @JSON = '{\n\"SalesOrders\": [\n\
    \    {\n        \"OrderID\": 72646,\n        \"CustomerID\": 1060,\n        \"\
    SalespersonPersonID\": 14,\n        \"OrderDate\": \"2016-05-18\"\n    },\n  \
    \  {\n        \"OrderID\": 72738,\n        \"CustomerID\": 1060,\n        \"SalespersonPersonID\"\
    : 14,\n        \"OrderDate\": \"2016-05-19\"\n    },\n    {\n        \"OrderID\"\
    : 72916,\n        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 6,\n\
    \        \"OrderDate\": \"2016-05-20\"\n    },\n    {\n        \"OrderID\": 73081,\n\
    \        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 8,\n        \"\
    OrderDate\": \"2016-05-24\"\n    }\n]\n}' ;\n\nCREATE TABLE #Orders\n(\n    OrderID\
    \ INT,\n    CustomerID INT,\n    SalespersonPersonID INT,\n    OrderDate DATE\n\
    ) ;\n\nDECLARE @ArrayElement INT = 0 ;\nDECLARE @path NVARCHAR(MAX) = 'lax $.SalesOrders['\
    \ + CAST(@ArrayElement AS NVARCHAR) + ']' ;\n\nWHILE @ArrayElement <=3\nBEGIN\n\
    \    INSERT INTO #Orders (OrderID, CustomerID, SalespersonPersonID, OrderDate)\n\
    \    SELECT\n        OrderID\n        , CustomerID\n        , SalespersonPersonID\n\
    \        , OrderDate\n    FROM OPENJSON(@JSON, @Path)\n    WITH( OrderID INT,\
    \ CustomerID INT, SalespersonPersonID INT, OrderDate DATE) ;\n\n    SET @ArrayElement\
