  trans: "\n# 第 2 章 理解 XML\n\n## 格式正确的 XML\n\nSQL Server 同时支持 XML 片段和格式正确的 XML。使用格式正确的\
    \ XML 更为有利，因为它具有一定程度的验证性。因此，在可能的情况下，您应始终尝试使用格式正确的 XML。一个 XML 文档要成为格式正确的，必须满足某些要求，这些要求如下所列：\n\
    \n• XML 文档必须有一个唯一的、不重复的根元素。\n• XML 元素必须有闭合标签。\n• XML 元素必须正确嵌套，闭合标签的顺序与开启标签的顺序相反。\n\
    • XML 属性值必须用双引号括起来。\n• 每个属性名在元素内必须是唯一的。\n\n### 提示\nXML 标签是区分大小写的。\n\n虽然 SQL Server\
    \ 支持 XML 片段（即非格式正确的 XML 文档），但其语法仍然必须是正确的。例如，请看清单 2-5 中的脚本。该 XML 文档在语法上是不正确的，因为根节点缺少一个右尖括号。\n\
    \n***清单 2-5.*** 语法不正确的 XML\n\n```sql\nDECLARE @Example XML ;\n\nSET @Example =\n\
    '<SalesOrder OrderDate=\"2013-03-07\" CustomerID=\"57\"\nOrderID=\"3168\">\n \
    \ <LineItem StockItemID=\"176\" Quantity=\"5\" UnitPrice=\"240.00\" />\n  <LineItem\
    \ StockItemID=\"143\" Quantity=\"108\"\nUnitPrice=\"18.00\" />\n  <LineItem StockItemID=\"\
    136\" Quantity=\"3\" UnitPrice=\"32.00\" />\n  <LineItem StockItemID=\"92\" Quantity=\"\
    48\" UnitPrice=\"18.00\" />\n</SalesOrder>\n<SalesOrder OrderDate=\"2013-03-22\"\
    \ CustomerID=\"57\"\nOrderID=\"4107\">\n  <LineItem StockItemID=\"153\" Quantity=\"\
    40\" UnitPrice=\"4.50\" />\n  <LineItem StockItemID=\"36\" Quantity=\"9\" UnitPrice=\"\
    13.00\" />\n  <LineItem StockItemID=\"208\" Quantity=\"108\" UnitPrice=\"2.70\"\
    \ />\n</SalesOrder>' ;\n\nSELECT @Example ;\n```\n\n![](img/index-52_1.png)\n\n\
    运行清单 2-5 中的脚本将产生如图 2-2 所示的错误。\n\n***图 2-2.** XML 语法错误*\n\n如果我们更正语法错误并重新运行脚本（清单\
