    \    (16, 9, 'Brazil', 1, 100000),\n    (17, 9, 'Agentina', 2, 70000),\n    (18,\
    \ 14, 'New York', 2, 120000);\n```\n\n假设我们必须使用这个传统层次结构来回答一个业务问题。例如，我们可能需要回答：“美洲地区的\
    \ `SalesYTD` 总额是多少？” 为了确定这一点，我们将必须编写一个查询，将该表与其自身进行联接，并对美洲地区下所有子区域的 `SalesYTD`\
    \ 列进行汇总。\n\n实现这一目标的最佳方法是使用递归 CTE（公用表表达式）。CTE 是一个临时结果集，在 `SELECT`、`UPDATE`、`INSERT`、`DELETE`\
    \ 或 `CREATE VIEW` 语句的上下文中定义，并且只能在该查询内被引用。它类似于使用子查询作为派生表，但其好处在于它可以被多次引用，也可以引用自身。当\
    \ CTE 引用自身时，它就变成了递归 CTE。\n\nCTE 使用 `WITH` 语句声明，该语句指定 CTE 的名称，后跟括号内的 CTE 将返回的列列表。然后使用\
    \ `AS` 关键字，后跟 CTE 的主体，同样包含在括号中。如 `清单 12-2` 所示。\n\n**提示**：`清单 12-2 到 12-14` 中的查询并非设计为单独运行。`清单\
    \ 12-15` 将它们全部组合成一个可用的脚本。\n\n***清单 12-2.*** CTE 结构\n```sql\nWITH AreaHierarchy\
    \ (SalesAreaID, SalesYTD, ParentSalesAreaID)\nAS\n(\n    [CTE 主体]\n)\n```\n\n\
    递归 CTE 的定义包含两个查询，通过 `UNION ALL` 子句联接。第一个查询称为锚点查询，用于定义初始结果集。第二个查询称为递归查询，并引用该 CTE。第一层递归将与锚点查询进行联接，随后的递归层级将与紧邻其上方的递归层级进行联接。\n\
    \n因此，在我们的示例中，锚点查询将必须返回美洲销售区域的 `SalesAreaID`。由于所有使用 `UNION ALL` 联接的查询必须包含相同数量的列，我们的锚点查询还必须返回\
    \ `ParentSalesAreaID` 和 `SalesYTD` 列，即使这些值将是 `NULL`。\n\n`清单 12-3` 中的查询展示了所需的锚点查询。\n\
    \n***清单 12-3.*** 锚点查询\n```sql\nSELECT\n    SalesAreaID,\n    SalesYTD,\n    ParentSalesAreaID\n\
    FROM Sales.SalesAreaTraditionalHierarchy RootLevel\nWHERE SalesAreaName = 'America'\n\
    ```\n\n递归查询将返回与锚点查询相同的列列表，但将包含一个 `JOIN` 子句，该子句将递归查询中的 `ParentSalesAreaID` 列与 CTE\
    \ 的 `SalesAreaID` 列进行联接，如 `清单 12-4` 所示。\n\n***清单 12-4.*** 递归查询\n```sql\nSELECT\n\
    \    Area.SalesAreaID,\n    Area.SalesYTD,\n    Area.ParentSalesAreaID\nFROM Sales.SalesAreaTraditionalHierarchy\
    \ Area\nINNER JOIN AreaHierarchy\n    ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n\
    ```\n\n声明此 CTE 后，我们将能够运行 `SELECT` 语句。"
