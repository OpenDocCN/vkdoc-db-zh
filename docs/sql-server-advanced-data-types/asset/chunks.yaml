  trans: "# 第四章 查询与分解 XML\n\n## 表 4-3. 标志值\n\n| 值 | 描述 |\n| :--- | :--- |\n| 0 (默认)\
    \ | 默认使用以属性为中心的映射。除非指定了 `XML_ELEMENTS`，否则使用以属性为中心的映射。如果指定了 `XML_ELEMENTS`，则属性将首先被映射，然后是元素。\
    \ |\n| 1 (`XML_ELEMENTS`) | 默认使用以元素为中心的映射，除非指定了 `XML_ATTRIBUTES`。如果指定了 `XML_ATTRIBUTES`，则元素将首先被映射，然后是属性。\
    \ |\n| 2 (`XML_ATTRIBUTES`) | 与逻辑或（OR）结合使用。 |\n\n除了函数的参数外，还可以指定一个 `WITH` 子句，该子句定义了要返回的结果集的模式。虽然\
    \ `WITH` 子句是可选的，但如果不指定模式，则将返回一个边缘表。该模式用于指定关系列名、关系数据类型以及相关节点的路径。\n\n### 注意\n`WITH`\
    \ 子句中的特定映射将覆盖标志设置。\n\n`OPENXML()` 函数的一个限制是它本身不解析 XML 文档。相反，你必须在调用该函数之前解析文档。这可以通过使用\
    \ `sp_xml_preparedocument` 系统存储过程来实现。该过程使用 MSXML 解析器解析 XML 文档，并创建一个指向已解析文档版本的句柄，该版本已准备好供使用。\n\
    \n在 `OPENXML()` 函数执行完毕后，你应该使用 `sp_xml_removedocument` 系统存储过程将已解析的文档从内存中移除。重要的是要记住拆除已解析的文档，否则如果频繁调用\
    \ `sp_xml_preparedocument` 过程，你可能会开始遇到内存问题。\n\n要查看 `OPENXML()` 函数的实际应用，请参阅清单 4-28\
    \ 中的脚本。该脚本将一个销售订单文档传递到一个变量中，然后使用 `OPENXML()` 来分解数据。\n\n### 提示\n为了更广泛地演示如何使用 `OPENXML()`\
    \ 导航 XML 文档，此 XML 文档的结构已从本章前面的示例中更改。\n\n## 清单 4-28. 使用 OPENXML()\n\n```sql\nDECLARE\
    \ @SalesOrder XML ;\nDECLARE @ParseDoc INT ;\n\nSET @SalesOrder = '\n<SalesOrders>\n\
    \  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderHeader>\n      <CustomerName>Camille\
    \ Authier</CustomerName>\n    </OrderHeader>\n    <OrderDetails>\n      <Product\
    \ ProductID=\"45\" ProductName=\"Developer joke mug - there are 10 types of people\
    \ in the world (Black)\" Price=\"13\" Qty=\"7\" />\n      <Product ProductID=\"\
    58\" ProductName=\"RC toy sedan car with remote control (Black) 1/50 scale\" Price=\"\
    25\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n\
    \    <OrderHeader>\n      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n\
    \    <OrderDetails OrderID = \"122\">\n      <Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n      <Product\
    \ ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"\
    9\" />\n      <Product ProductID=\"111\" ProductName=\"Superhero action jacket\
    \ (Blue) M\" Price=\"30\" Qty=\"10\" />\n      <Product ProductID=\"116\" ProductName=\"\
    Superhero action jacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n    </OrderDetails>\n\
    \  </Order>\n</SalesOrders>' ;\n\nEXEC sp_xml_preparedocument @ParseDoc OUTPUT,\
    \ @SalesOrder ;\n\nSELECT *\nFROM OPENXML(@ParseDoc, '/SalesOrders/Order/OrderDetails/Product')\n\
    WITH (\n    ProductID INT '@ProductID',\n    ProductName NVARCHAR(200) '@ProductName',\n\
    \    Quantity INT '@Qty',\n    OrderID INT '../@OrderID',\n    OrderDate DATE\
    \ '../../OrderDate',\n    CustomerName NVARCHAR(200) '../../OrderHeader/CustomerName'\n\
    ) ;\n\nEXEC sp_xml_removedocument @ParseDoc ;\n```\n\n当你检查此脚本中 `OPENXML()` 语句的\
    \ `WITH` 子句时，你会看到我们首先指定了关系列名。通过查看 `Quantity` 的映射，你会发现关系名不必与 XML 节点的名称匹配。然后我们指定一个"
- fmt: "# Querying and Shredding XML\n\nrelational data type for the resultant value,\
    \ before specifying a path to the node that we wish to retrieve. This is the most\
    \ interesting aspect of the query. You will notice that we have used the `rowpattern`\
    \ parameter of the `OPENXML()` function to map down to the `Product` element,\
    \ as the lowest level. This means that the `Product` element is the starting point\
    \ for our paths. The `ProductID`, `ProductName`, and `Quantity` attributes are\
    \ all attributes of the `Product` element. Therefore, we prefix these with the\
    \ `@` symbol, to designate that they are attributes, but no other path mapping\
    \ is required. The `OrderID` attribute is an attribute of the `OrderDetails` element.\
    \ Because the `OrderDetails` element is one level above the `Product` element,\
    \ we use the `../` syntax, to specify that we must navigate up one level. The\
    \ `OrderDate` element is two levels above the `Product` element; therefore, we\
    \ use `../` twice, to indicate we should move two levels up the hierarchy. Also,\
    \ note that because `OrderDate` is an element, not an attribute, we have not prefixed\
    \ the node with an `@` symbol.\n\nFinally, to map to the `CustomerName` element,\
    \ we first must navigate two levels up the hierarchy, using the `../` syntax.\
    \ We then must drop down into a sibling node (`OrderHeader`), to retrieve the\
    \ `CustomerName` element.\n\nThe results of the query can be found in Figure 4-10.\
    \ Note that `NULL` values have been returned for `OrderID` against two of the\
    \ products. This is because no `OrderID` element was specified against the second\
    \ sales order.\n\n![](index-158_1.jpg)\n\n*Figure 4-10. Results of using `OPENXML()`*\n\
    \n## Shredding XML with Nodes\n\nIf you want to shred the data from a column instead\
    \ of using a variable, you can avoid the need for iterative logic by shredding\
    \ the data with XQuery. Specifically, the `nodes()` method can be used to identify\
    \ the nodes that should be mapped to relational columns. This can be combined\
    \ with the `value()` method, to extract the data from the nodes. For example,\
    \ consider the query in Listing 4-29. This query is functionally equivalent to\
    \ the query in Listing 4-28 but uses the `nodes()` method instead of `OPENXML()`.\n\
    \n### Listing 4-29. Using `nodes()` to Shred XML\n\n```sql\nDECLARE @SalesOrder\
    \ XML ;\n\nSET @SalesOrder = '\n<SalesOrders>\n<Order>\n<OrderDate>2013-01-02</OrderDate>\n\
    <OrderHeader>\n<CustomerName>Camille Authier</CustomerName>\n</OrderHeader>\n\
    <OrderDetails>\n<Product ProductID=\"45\" ProductName=\"Developer joke\nmug -\
    \ there are 10 types of people in the world (Black)\"\nPrice=\"13\" Qty=\"7\"\
    \ />\n<Product ProductID=\"58\" ProductName=\"RC toy sedan car with remote control\
    \ (Black) 1/50 scale\" Price=\"25\" Qty=\"4\" />\n</OrderDetails>\n</Order>\n\
    <Order>\n<OrderDate>2013-01-02</OrderDate>\n<OrderHeader>\n<CustomerName>Camille\
    \ Authier</CustomerName>\n</OrderHeader>\n<OrderDetails OrderID = \"122\">\n<Product\
    \ ProductID=\"22\" ProductName=\"DBA joke mug - it\ndepends (White)\" Price=\"\
    13\" Qty=\"6\" />\n<Product ProductID=\"2\" ProductName=\"USB rocket launcher\
    \ (Gray)\" Price=\"25\" Qty=\"9\" />\n<Product ProductID=\"111\" ProductName=\"\
    Superhero action\njacket (Blue) M\" Price=\"30\" Qty=\"10\" />\n<Product ProductID=\"\
    116\" ProductName=\"Superhero action\njacket (Blue) 4XL\" Price=\"34\" Qty=\"\
    4\" />\n</OrderDetails>\n</Order>\n</SalesOrders>' ;\n\nSELECT\n    TempCol.value('@ProductID',\
    \ 'INT') AS ProductID\n    , TempCol.value('@ProductName', 'NVARCHAR(70)') AS\
    \ ProductName\n    , TempCol.value('@Qty', 'INT') AS Quantity\n    , TempCol.value('../@OrderID',\
    \ 'INT') AS OrderID\n    , TempCol.value('../../OrderDate[1]', 'NVARCHAR(10)')\
    \ AS OorderDate\n    , TempCol.value('../../OrderHeader[1]/CustomerName[1]', 'NVARCHAR(15)')\
    \ AS CustomerName\nFROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product')\
    \ TempTable(TempCol) ;\n```\n\nWhen reviewing this script, you should pay particular\
    \ attention to the `FROM` clause. Here, we pass an XQuery expression into the\
    \ `nodes()` method,"
