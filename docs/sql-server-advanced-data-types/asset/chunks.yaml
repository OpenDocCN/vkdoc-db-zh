- fmt: "difference between XML fragments and well-formed XML, XML schemas, and how\
    \ XML data is often used in SQL Server.\n\n## Understanding XML\n\nEach attribute\
    \ can contain data that describes the element. For example, imagine that you require\
    \ details of sales orders to be stored in XML format. It would be sensible to\
    \ assume that each sales order be stored in a separate element within the document.\
    \ But what about that sales order properties, such as order date, customer ID,\
    \ product IDs, quantities, and prices? These pieces of information could either\
    \ be stored as child elements of the sales order element, or they could be stored\
    \ as attributes of the sales order element. There are no set rules for when you\
    \ should use child elements or attributes to describe properties of an element.\
    \ This choice is at the discretion of the document author.\n\n© Peter A. Carter\
    \ 2018  \nP. A. Carter, *SQL Server Advanced Data Types*,  \n[https://doi.org/10.1007/978-1-4842-3901-8_2](#index_split_000.html#p41)\n\
    \n## Chapter 2 Understanding XML\n\nThe XML document in Listing [2-1](#index_split_000.html#p42)\
    \ provides a sample XML document that holds the details of sales orders for a\
    \ fictional organization. In this example, the document author has chosen to use\
    \ an element to store each sales order and a nested element to store each line\
    \ item of the order. The details of each sales order and line item are stored\
    \ in attributes of the elements.\n\n### Listing 2-1. Sales Orders Stored Using\
    \ Attribute-Centric Approach\n\n```xml\n<SalesOrders>\n  <SalesOrder OrderDate=\"\
    2013-03-07\" CustomerID=\"57\" OrderID=\"3168\">\n    <LineItem StockItemID=\"\
    176\" Quantity=\"5\" UnitPrice=\"240.00\" />\n    <LineItem StockItemID=\"143\"\
    \ Quantity=\"108\" UnitPrice=\"18.00\" />\n    <LineItem StockItemID=\"136\" Quantity=\"\
    3\" UnitPrice=\"32.00\" />\n    <LineItem StockItemID=\"92\" Quantity=\"48\" UnitPrice=\"\
    18.00\" />\n  </SalesOrder>\n  <SalesOrder OrderDate=\"2013-03-22\" CustomerID=\"\
    57\" OrderID=\"4107\">\n    <LineItem StockItemID=\"153\" Quantity=\"40\" UnitPrice=\"\
    4.50\" />\n    <LineItem StockItemID=\"36\" Quantity=\"9\" UnitPrice=\"13.00\"\
    \ />\n    <LineItem StockItemID=\"208\" Quantity=\"108\" UnitPrice=\"2.70\" />\n\
    \  </SalesOrder>\n  <SalesOrder OrderDate=\"2013-04-09\" CustomerID=\"57\" OrderID=\"\
    4980\">\n    <LineItem StockItemID=\"102\" Quantity=\"10\" UnitPrice=\"35.00\"\
    \ />\n    <LineItem StockItemID=\"144\" Quantity=\"24\" UnitPrice=\"18.00\" />\n\
    \    <LineItem StockItemID=\"79\" Quantity=\"36\" UnitPrice=\"18.00\" />\n   \
    \ <LineItem StockItemID=\"217\" Quantity=\"10\" UnitPrice=\"25.00\" />\n  </SalesOrder>\n\
    \  <SalesOrder OrderDate=\"2016-01-09\" CustomerID=\"57\" OrderID=\"64608\">\n\
    \    <LineItem StockItemID=\"156\" Quantity=\"40\" UnitPrice=\"15.00\" />\n  \
    \  <LineItem StockItemID=\"56\" Quantity=\"7\" UnitPrice=\"13.00\" />\n  </SalesOrder>\n\
    \  <SalesOrder OrderDate=\"2016-05-25\" CustomerID=\"57\" OrderID=\"73148\">\n\
    \    <LineItem StockItemID=\"31\" Quantity=\"7\" UnitPrice=\"13.00\" />\n    <LineItem\
    \ StockItemID=\"103\" Quantity=\"2\" UnitPrice=\"35.00\" />\n  </SalesOrder>\n\
    </SalesOrders>\n```\n\nThe XML in Listing [2-1](#index_split_000.html#p42) can\
    \ be generated by running the query in Listing [2-2](#index_split_000.html#p43)\
    \ against the `WideWorldImporters` database.\n\n### Listing 2-2. Generating Attribute-Centric\
    \ XML\n\n```sql\nSELECT\n    SalesOrder.OrderDate\n    , SalesOrder.CustomerID\n\
    \    , SalesOrder.OrderID\n    , LineItem.StockItemID\n    , LineItem.Quantity\n\
    \    , LineItem.UnitPrice\nFROM Sales.Orders SalesOrder\nINNER JOIN Sales.OrderLines\
    \ LineItem\n    ON LineItem.OrderID = SalesOrder.OrderID\nWHERE SalesOrder.OrderID\
    \ IN\n(\n    3168,\n    4107,\n    4980,\n    64608,\n)\nFOR XML AUTO, ROOT('SalesOrders')\
    \ ;\n```\n\n## Chapter 2 Understanding XML\n\n`Note` the `FOR XML` clause is used\
    \ to convert the results of a query into XML format. `FOR XML` is discussed in\
    \ [Chapter 3.](#index_split_000.html#p61)\n\nThe XML document in Listing [2-2](#index_split_000.html#p43)\
    \ stores the same information as the document in Listing [2-3](#index_split_000.html#p44).\
    \ This time, however, the document author has used an element-centric approach,\
    \ instead of an attribute-centric approach. Therefore, the data is stored in child\
    \ elements, as opposed to attributes.\n\n### Listing 2-3. Sales Orders Stored\
    \ Using Element-Centric Approach\n\n```xml\n<SalesOrders>\n<SalesOrder>\n```"
