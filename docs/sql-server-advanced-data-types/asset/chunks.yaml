- fmt: "# Chapter 7 Constructing JSON from T-SQL\n\n```json\n{\n    \"StockItemName\"\
    : \"Halloween skull mask (Gray) S\"\n}\n```\n\n```json\n{\n    \"StockItemID\"\
    : 212,\n    \"UnitPrice\": 4.3,\n    \"Quantity\": 20,\n    \"Products\": [\n\
    \        {\n            \"StockItemName\": \"Large replacement blades 18mm\"\n\
    \        }\n    ]\n}\n```\n\n```json\n{\n    \"StockItemID\": 8,\n    \"UnitPrice\"\
    : 240,\n    \"Quantity\": 2,\n    \"Products\": [\n        {\n            \"StockItemName\"\
    : \"USB food flash drive - dim sum 10 drive variety pack\"\n        }\n    ]\n\
    }\n```\n\nYou will notice that an additional layer of nesting has been added to\
    \ the document, with an array, `Products`, containing the `StockItemName` being\
    \ added to each `OrderLines` array.\n\nJust as nesting is automatic, based on\
    \ table joins, the same applies to subqueries. Consider the query in Listing [7-21](#index_split_002.html#p232),\
    \ which includes two correlated subqueries in the `SELECT` list that return the\
    \ name of the customer who placed the order and the name of the salesperson who\
    \ sold it.\n\n**Tip**: Nested structures can be processed more easily by programming\
    \ languages.\n\n## Listing 7-21. Using Subqueries to Nest Data\n\n```sql\nUSE\
