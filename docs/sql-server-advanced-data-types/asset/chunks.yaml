- fmt: "# Chapter 4 Querying and Shredding XML\n\n## Table 4-3. Flags Values\n\n|\
    \ Value | Description |\n| :--- | :--- |\n| 0 (Default) | Defaults to attribute-centric\
    \ mapping. Use attribute-centric mapping, unless `XML_ELEMENTS` is specified.\
    \ If `XML_ELEMENTS` is specified, attributes will be mapped first, followed by\
    \ elements. |\n| 1 (`XML_ELEMENTS`) | Element-centric mapping, unless `XML_ATTRIBUTES`\
    \ is specified. If `XML_ATTRIBUTES` is specified, elements will be mapped first,\
    \ followed by attributes. |\n| 2 (`XML_ATTRIBUTES`) | Combined with a logical\
    \ OR. |\n\nIn addition to the function’s parameters, a `WITH` clause can also\
    \ be specified, which defines the schema of the result set to be returned. While\
    \ the `WITH` clause is optional, not specifying the schema will cause an edge\
    \ table to be returned. The schema is used to specify a relation column name,\
    \ a relational data type, and the path to the relevant node.\n\n### Note\nThe\
    \ flags will be overridden by specific mapping in the `WITH` clause.\n\nA limitation\
    \ of the `OPENXML()` function is that it does not parse an XML document itself.\
    \ Instead, you must parse the document before calling the function. This can be\
    \ achieved using the `sp_xml_preparedocument` system stored procedure. This procedure\
    \ parses an XML document, using the MSXML parser, and creates a handle to the\
    \ parsed version of the document that is ready for consumption.\n\nAfter the `OPENXML()`\
    \ function has completed, you should use the `sp_xml_removedocument` system stored\
    \ procedure to remove the parsed document from memory. It is important to remember\
    \ to tear down the parsed document, or you could start running into memory issues,\
    \ if the `sp_xml_preparedocument` procedure is called frequently.\n\nTo see the\
    \ `OPENXML()` function in action, see the script in Listing 4-28. This script\
    \ passes a sales orders document into a variable, before using `OPENXML()` to\
