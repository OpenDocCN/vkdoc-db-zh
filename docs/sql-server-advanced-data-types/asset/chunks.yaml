    \ from previous examples in this chapter, to allow a broader demonstration of\
    \ the navigation of an XML document with `OPENXML()`.\n\n## Listing 4-28. Using\
    \ OPENXML()\n\n```sql\nDECLARE @SalesOrder XML ;\nDECLARE @ParseDoc INT ;\n\n\
    SET @SalesOrder = '\n<SalesOrders>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n\
