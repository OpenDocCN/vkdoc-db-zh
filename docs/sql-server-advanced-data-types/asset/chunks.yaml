- fmt: '# Chapter 5 XML Indexes


    built on the primary key. The first is size. A GUID is 16 bytes long. When a table
    has nonclustered indexes, the clustered index key is stored in every nonclustered
    index. For unique nonclustered indexes, it is stored for every row at the leaf
    level, and for non-unique nonclustered indexes, it is also stored at every row
    in the root and intermediate levels of the index as well.


    When you multiply 16 bytes by millions of rows, this will drastically increase
    the size of the indexes, making them less efficient.


    The second issue is that when a GUID is generated, it is a random value. Because
    the data in your table is stored in the order of the clustered index key, for
    good performance, you need the values of this key to be generated in sequential
    order. Generating random values for your clustered index key will result in the
    index becoming more and more fragmented every time you insert a new row. Fragmentation
    will be discussed later in this chapter.


    There is a workaround for the second issue, however. SQL Server has a function
    called `NEWSEQUENTIALID()` that will always generate a GUID value higher than
    previous values generated on the server. Therefore, if you use this function in
    the `Default` constraint of your primary key, you can enforce sequential inserts.


    **Caution**: After the server has been restarted, `NEWSEQUENTIALID()` can start
    with a lower value. This may lead to fragmentation.


    If the primary key must be a GUID, or another wide column, such as `National Insurance
    Number`, or a set of columns forming a natural key, such as `Customer ID`, `Order
    Date`, and `Product ID`, it is highly recommended that you create an additional
    column in your table. This column could be an `INT` or `BIGINT`, depending on
    the number of rows you expect the table to have, and could use either the `IDENTITY`
    property or a `SEQUENCE` to create a narrow, sequential key that can be used for
    your clustered index. I recommend ensuring a narrow key, as it will be included
    in all nonclustered indexes on the table. It will also use less memory when joining
    tables.


    **Caution**: If you intend to use XML indexes, the clustered index must be created
    on the primary key.


    ## Performance Considerations for Clustered Indexes


    Because an `IAM` page lists the extents of a `heap` table in the order in which
    they are stored in the data file, as opposed to the order of the index key, a
    table scan of a `heap` may prove to be slightly faster than a clustered index
    scan, unless the clustered index has 0% fragmentation, which is rare.


    Inserts into a clustered index may be faster than inserts into a `heap`, when
    the clustered index key is ever-increasing. This is especially true when there
    are multiple inserts happening in parallel, because a `heap` will experience more
    contention on system pages (`GAM`/`SGAM`/`PFS`) when the database engine is looking
    for spaces to place the new data. If the clustered index key is not ever-increasing,
    however, then inserts will lead to page splits and fragmentation. The knock-on
    effect is that inserts would be slower than they would be into a `heap`. A large
    insert into a `heap` may also be faster, if you take out a table lock and take
    advantage of minimally logged inserts. This is because of reduced IO to the transaction
    log.


    Updates that cause a row to relocate, due to a change in size, will be faster
    when performed against a clustered index, as opposed to a `heap`. This is, for
    the same reason as mentioned above for insert operations, where there will be
    more contention against the system pages. When updated, rows may change in size,
    for reasons such as updating a `VARCHAR` column with a longer string. If the update
    to the row can be made in place (without relocating the row), there is likely
    to be little difference in performance. Deletes may also be slightly faster into
    a clustered index than into a `heap`, but the difference will be less noticeable
    than for update operations.


