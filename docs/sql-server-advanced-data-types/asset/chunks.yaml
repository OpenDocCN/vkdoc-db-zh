  trans: "# 第 1 章 SQL Server 数据类型\n\n## 数值数据类型\n\n数值数据类型可用的样式选项可在 表 1-2 中找到。\n\n**表\
    \ 1-2.** 数值数据类型样式选项\n\n| 样式代码 | 数据类型 | 输出 |\n| :--- | :--- | :--- |\n| `FLOAT\
    \ & REAL` | `FLOAT` 和 `REAL` 的默认值。 | 最多六位数字。如果需要，则使用科学计数法。 |\n| `FLOAT & REAL`\
    \ | 八位数字。 | 总是使用科学计数法 |\n| `FLOAT & REAL` | 十六位数字。 | 总是使用科学计数法 |\n| `FLOAT & REAL`\
    \ | 十七位数字，无损转换 | |\n| `SMALLMONEY & MONEY` | `SMALLMONEY` 和 `MONEY` 的默认值。 | 无逗号分隔，小数点右侧两位数字\
    \ |\n| `SMALLMONEY & MONEY` | 小数点左侧每三位用逗号分隔。 | 小数点右侧四位数字 |\n| `SMALLMONEY & MONEY`\
    \ | 无逗号分隔。 | 小数点右侧四位数字 |\n| `SMALLMONEY & MONEY` | 在转换为字符数据类型时使用。 | 无逗号分隔，小数点右侧四位数字\
    \ |\n\n清单 1-3 中的脚本展示了如何使用 `CAST` 函数将数字 `2.5888712345678923456789` 转换为每种数值数据类型。\n\
    \n**注意** `BIT` 类型被排除在外，因为这种转换没有意义。但如果包含它，它将被 `CAST` 为 `1`。\n\n### 清单 1-3. 将数字转换为每种数据类型\n\
    \n```sql\nSELECT\n    CAST(2.5888712345678923456789 AS TINYINT) AS 'TINYINT'\n\
    \    , CAST(2.5888712345678923456789 AS SMALLINT) AS 'SMALLINT'\n    , CAST(2.5888712345678923456789\
    \ AS INT) AS 'INT'\n    , CAST(2.5888712345678923456789 AS BIGINT) AS 'BIGINT'\n\
    \    , CAST(2.5888712345678923456789 AS DECIMAL(23,22)) AS 'DECIMAL'\n    , CAST(2.5888712345678923456789\
    \ AS DECIMAL(18,17)) AS 'DECIMAL ROUNDED'\n    , CAST(2.5888712345678923456789\
    \ AS NUMERIC(23,22)) AS 'NUMERIC'\n    , CAST(2.5888712345678923456789 AS FLOAT(24))\
    \ AS 'SINGLE FLOAT'\n    , CAST(2.5888712345678923456789 AS FLOAT(53)) AS 'DOUBLE\
    \ FLOAT'\n    , CAST(2.5888712345678923456789 AS REAL) AS 'REAL'\n    , CAST(2.5888712345678923456789\
    \ AS SMALLMONEY) AS 'SMALLMONEY'\n    , CAST(2.5888712345678923456789 AS MONEY)\
    \ AS 'MONEY'\n```\n\n![](img/index-22_1.png)\n\n清单 1-3 中查询的结果可以在 图 1-1 中找到。\n\n\
    **图 1-1.** 转换为数值数据类型的结果\n\n## 字符串\n\nSQL Server 可以存储 Unicode 和非 Unicode 字符串。字符串也可以存储为固定长度或可变长度。SQL\
    \ Server 支持的字符数据类型列于 表 1-3。\n\n**表 1-3.** 字符数据类型\n\n| 数据类型 | 可变/固定 | 最大长度 | 存储大小\
    \ | 描述 |\n| :--- | :--- | :--- | :--- | :--- |\n| `CHAR` | 固定 | 8,000 个字符 | 最大字符串长度\
    \ × 1 字节 | 存储非 Unicode 字符串，固定长度。如果字符串短于最大长度，将用空格填充。 |\n| `VARCHAR` | 可变 | 8,000\
    \ 个字符或 `VARCHAR(MAX)` | 存储的字符串长度 × 1 字节 | 存储可变大小的非 Unicode 字符串。使用 `VARCHAR` 时，必须传入一个值来指定字符串的最大长度。使用\
    \ `VARCHAR(MAX)` 时，最多可存储 2GB。 |\n| `NCHAR` | 固定 | 4,000 个字符 | 最大字符串长度 × 2 字节 |\
    \ 存储固定长度的 Unicode 字符串。如果字符串短于最大长度，将用空格填充。 |\n| `NVARCHAR` | 可变 | 4,000 个字符或 `NVARCHAR(MAX)`\
    \ | 存储的字符串长度 × 2 字节 | 存储可变大小的 Unicode 字符串。使用 `NVARCHAR` 时，必须指定字符串的最大长度或使用 `MAX`。指定\
    \ `MAX` 时，根据存储的字符串，最多可存储 2GB。 |\n| `TEXT` | 可变 | 2GB | 存储的字符串长度 × 1 字节 | *已弃用的数据类型，不应再使用。*\
    \ |\n| `NTEXT` | 可变 | 2GB | 存储的字符串长度 × 2 字节 | *已弃用的数据类型，不应再使用。* |"
- fmt: "# Chapter 1 SQL Server Data Types\n\n对于字符串数据类型，可以指定最大长度或使用`MAX`，最多可存储2GB。`IMAGE`是一个已弃用的数据类型，用于存储非Unicode字符串或Unicode字符串，具有可变长度。相关数据类型包括`NVARCHAR`、`TEXT`和`NTEXT`（参见Table\
    \ 1-3）。\n\n![](index-25_1.png)\n\nListing 1-4 使用了`DATALENGTH`系统函数来演示将一个15个字符的字符串转换为每种字符数据类型时存储大小的差异。\n\
    \n```sql\nSELECT\nDATALENGTH(CAST('My String Value' AS NCHAR(20))) AS 'NCHAR',\n\
    DATALENGTH(CAST('My String Value' AS NVARCHAR(20))) AS 'NVARCHAR',\nDATALENGTH(CAST('My\
    \ String Value' AS CHAR(20))) AS 'CHAR',\nDATALENGTH(CAST('My String Value' AS\
    \ VARCHAR(20))) AS 'VARCHAR'\n```\n\nListing 1-4的结果可以在Figure 1-2中找到。\n\n**Figure\
    \ 1-2.** 比较字符串存储大小的结果\n\n## Binary Data Types\n\nSQL Server可以存储二进制数据，例如Word文档或照片，使用原生二进制数据类型。二进制数据类型也用于存储使用密钥或证书加密的数据。SQL\
    \ Server中可用的二进制数据类型详见Table 1-4。\n\n**Table 1-4.** Binary Data Types\n\n| Data\
    \ Type | Description | Storage Size | Maximum Variable/Fixed Length |\n|-----------|-------------|--------------|-------------------------------|\n\
    | `BINARY` | 存储固定长度的二进制数据。使用`BINARY`时，必须以字节为单位指定数据长度。如果存储的数据短于指定长度，将被填充。 | 等于允许的最大字节数\
    \ | 固定字节 |\n| `VARBINARY` | 存储可变长度的二进制数据。使用`VARBINARY`时，必须指定数据的最大字节长度或指定`MAX`。指定`MAX`时，最多可存储2GB数据。\
    \ | 等于实际存储的字节数加2字节 | 2GB |\n| `IMAGE` | 一个不应使用的已弃用数据类型。存储可变长度的二进制数据。 | 等于实际存储的字节数加2字节\
    \ | 2GB |\n\n**提示：** 有关加密数据的详细信息，请参考 *Securing SQL Server* (Apress, 2016)，可在 [www.apress.com/gp/book/9781484222645](http://www.apress.com/gp/book/9781484222645)\
    \ 找到。\n\n使用`CONVERT`函数时，`BINARY`数据可用的样式选项详见Table 1-5。\n\n**Table 1-5.** BINARY数据的样式选项\n\
    \n| Style Code | Output |\n|------------|--------|\n| 0（默认值） | 二进制数据的默认值。将ASCII字符转换为二进制字节，反之亦然。\
    \ |\n| 1 | 将字符串转换为二进制数据。验证十六进制字节数为偶数且第一个字符为0x。 |\n| 2 | 将二进制数据转换为字符串。每个字节将转换为两个十六进制字符。溢出数据类型的数据将被截断。如果数据短于固定长度数据类型，将被填充。\
    \ |\n\nListing 1-5 演示了如何读取已加密并存储在`VARBINARY`列中的密码，并将其转换回字符串。脚本首先创建所需对象并加密密码。\n\
    \n```sql\n--Create a certificate that will encrypt the symmetric key\nCREATE CERTIFICATE\
