  trans: "© Peter A. Carter 2018\n\nP. A. Carter, *SQL Server 高级数据类型*,\n\n`doi.org/10.1007/978-1-4842-3901-8_12`\n\
    \n![](img/index-351_1.png)\n\n# 第 12 章 处理层次数据与 HierarchyID\n\n## 层次数据用例\n\n许多数据需求需要维护层次结构。\n\
    \n例如，考虑一个从组织结构图建模而来的员工层次结构（见图 12-1）。人力资源部门可能有汇报需求，需要确定有多少员工直接或间接向一位经理汇报。它可能还需要汇报更复杂的需求，例如每位部门主管下属的员工产生了多少收入。\n\
    \n***图 12-1.** 销售部门组织结构图*\n\n层次数据的另一个经典用例是物料清单 (BoM)。BoM 定义了生产产品所需零件的层次结构。例如，图\
    \ 12-2 展示了一个家用计算机的简单 BoM。计算机制造商需要为库存报告维护这些零件的层次结构。\n\n![](img/index-352_1.png)\n\
    \n***图 12-2.** 物料清单*\n\n![](img/index-353_1.png)\n\n在本章中，我们将以销售区域层次结构为例进行讲解。如图\
    \ 12-3 所示，我们将为全球销售区域建模。该层次结构是参差不齐的，这意味着在每个分支中可以有不同数量的层级。\n\n***图 12-3.** 销售区域层次结构*\n\
    \n维护销售区域层次结构对许多公司都很重要，因为它允许公司就许多因素进行报告，从每个区域的收入、每个区域的销售人员数量到每个销售人员和区域的平均收入等。在此示例中，除了标准销售区域外，层次结构中还有聚合区域。这意味着这些区域没有销售人员，并且不直接产生销售。相反，它们是用于汇总下级层次结构的汇报层级。这些聚合区域以蓝色突出显示。\n\
    \n## 为传统层次结构建模\n\n让我们看看如何使用传统方法为销售区域层次结构建模。为此，请考虑表 12-1 中的数据。\n\n***表 12-1.**\
    \ 销售区域层次结构*\n\n| SalesAreaID | ParentSalesAreaID | SalesAreaName | CountOfSalesPeople\
    \ | SalesYTD |\n| :--- | :--- | :--- | :--- | :--- |\n| globalSales | nUll | 全球销售\
    \ | nUll | |\n| europe | globalSales | 欧洲 | nUll | |\n| america | globalSales\
    \ | 美洲 | nUll | |\n| Uk | europe | 英国 | 300,000 | nUll |\n| eastern europe | europe\
    \ | 东欧 | nUll | nUll |\n| Canada | america | 加拿大 | 350,000 | |\n| USa | america\
    \ | 美国 | nUll | nUll |\n| lataM | america | 拉丁美洲 | nUll | nUll |\n| germany |\
    \ europe | 德国 | 150,000 | |\n| France | europe | 法国 | 100,000 | |\n| hungary |\
    \ eastern europe | 匈牙利 | 50,000 | |\n| Slovakia | eastern europe | 斯洛伐克 | 80,000\
    \ | |\n| eastern | USa | 东部 | 140,000 | |\n| Western | USa | 西部 | 280,000 | |\n\
    | Brazil | lataM | 巴西 | 100,000 | |\n| argentina | lataM | 阿根廷 | 70,000 | |\n\
    | new york | eastern | 纽约 | 120,000 | |\n\n在上表中，`SalesAreaID` 列将是表的主键，而 `ParentSalesAreaID`\
    \ 列将是一个外键，引用 `SalesAreaID` 列，从而创建所谓的自连接。\n\n**注意** 对于 `globalSales` 区域，`ParentSalesAreaID`\
    \ 列为 `NULL`，因为它没有父级。这被称为层次结构的根。\n\n`SalesAreaName` 列描述了销售区域，而 `CountOfSalesPeople`\
    \ 和 `SalesYTD` 列详细说明了每个销售区域的业绩。我们将使用这些列来探索如何处理层次数据。您会注意到，对于聚合区域，`CountOfSalesPeople`\
    \ 和 `SalesYTD` 列填充的是 `NULL` 值。这是因为它们是“虚拟”区域，没有销售人员驻扎。\n\n可以使用清单 12-1 中的脚本创建此表。\n\
    \n***清单 12-1.*** 创建传统的层次结构表\n\n```sql\nUSE WideWorldImporters\nGO\nCREATE TABLE\
    \ Sales.SalesAreaTraditionalHierarchy\n(\n    SalesAreaID INT NOT NULL PRIMARY\
    \ KEY,\n    ParentSalesAreaID INT NULL\n)\n```"
- fmt: "# Chapter 12 Working With Hierarchical Data and HierarchyID\n\n```sql\nREFERENCES\
    \ Sales.SalesAreaTraditionalHierarchy(SalesAreaID),\nSalesAreaName NVARCHAR(20)\
    \ NOT NULL,\nCountOfSalesPeople INT NULL,\nSalesYTD MONEY NULL\n);\n\nINSERT INTO\
    \ Sales.SalesAreaTraditionalHierarchy (\n    SalesAreaID,\n    ParentSalesAreaID,\n\
    \    SalesAreaName,\n    CountOfSalesPeople,\n    SalesYTD\n)\nVALUES\n    (1,\
    \ NULL, 'GlobalSales', NULL, NULL),\n    (2, 1, 'Europe', NULL, NULL),\n    (3,\
    \ 1, 'America', NULL, NULL),\n    (4, 2, 'UK', 3, 300000),\n    (5, 2, 'Western\
    \ Europe', NULL, NULL),\n    (6, 2, 'Eastern Europe', NULL, NULL),\n    (7, 3,\
    \ 'Canada', 4, 350000),\n    (8, 3, 'USA', NULL, NULL),\n    (9, 3, 'LATAM', NULL,\
    \ NULL),\n    (10, 5, 'Germany', 3, 150000),\n    (11, 5, 'France', 2, 100000),\n\
    \    (12, 6, 'Hungary', 1, 50000),\n    (13, 6, 'Slovakia', 2, 80000),\n    (14,\
    \ 8, 'Eastern', 4, 140000),\n    (15, 8, 'Western', 3, 280000),\n    (16, 9, 'Brazil',\
    \ 1, 100000),\n    (17, 9, 'Agentina', 2, 70000),\n    (18, 14, 'New York', 2,\
    \ 120000);\n```\n\nLet’s imagine that we must answer a business question, using\
    \ this traditional hierarchy. For example, we may have to answer the question,\
    \ “What is the total of `SalesYTD` for the America region?” To determine this,\
    \ we would have to write a query that joins the table to itself and rolls up the\
    \ `SalesYTD` column for all subregions under the America region.\n\nThe best way\
    \ of achieving this is to use a recursive CTE (common table expression). A CTE\
    \ is a temporary result set that is defined within the context of a `SELECT`,\
    \ `UPDATE`, `INSERT`, `DELETE`, or `CREATE VIEW` statement and can only be referenced\
    \ within that query. It is similar to using a subquery as a derived table but\
    \ has the benefit that it can be referenced multiple times and also reference\
    \ itself. When a CTE references itself, it becomes recursive.\n\nA CTE is declared\
    \ using a `WITH` statement, which specifies the name of the CTE, followed by the\
    \ column list that will be returned by the CTE, in parentheses. The `AS` keyword\
    \ is then used, followed by the body of the CTE, again within parentheses. This\
    \ is shown, for our example, in `Listing 12-2`.\n\n**Tip**: The queries in `Listings\
    \ 12-2 to 12-14` are not meant to be run separately. `Listing 12-15` brings them\
    \ all together into a useable script.\n\n***Listing 12-2.*** CTE Structure\n```sql\n\
    WITH AreaHierarchy (SalesAreaID, SalesYTD, ParentSalesAreaID)\nAS\n(\n    [Body\
    \ of CTE]\n)\n```\n\nThe definition of a recursive CTE has two queries, joined\
    \ with a `UNION ALL` clause. The first query is known as the anchor query and\
    \ defines the initial result set. The second query is known as the recursive query\
    \ and references the CTE. The first level of recursion will join to the anchor\
    \ query, and subsequent levels of recursion will join to the level of recursion\
    \ immediately above them.\n\nTherefore, in our example, the anchor query will\
    \ have to return the `SalesAreaID` of the America sales area. Because all queries\
    \ joined with `UNION ALL` must contain the same number of columns, our anchor\
    \ query must also return the `ParentSalesAreaID` and `SalesYTD` columns, even\
    \ though these values will be `NULL`.\n\nThe query in `Listing 12-3` shows the\
    \ required anchor query.\n\n***Listing 12-3.*** Anchor Query\n```sql\nSELECT\n\
    \    SalesAreaID,\n    SalesYTD,\n    ParentSalesAreaID\nFROM Sales.SalesAreaTraditionalHierarchy\
    \ RootLevel\nWHERE SalesAreaName = 'America'\n```\n\nThe recursive query will\
    \ return the same column list as the anchor query but will include a `JOIN` clause,\
    \ which joins the `ParentSalesAreaID` column in the recursive query to the `SalesAreaID`\
    \ column of the CTE, as demonstrated in `Listing 12-4`.\n\n***Listing 12-4.***\
    \ Recursive Query\n```sql\nSELECT\n    Area.SalesAreaID,\n    Area.SalesYTD,\n\
    \    Area.ParentSalesAreaID\nFROM Sales.SalesAreaTraditionalHierarchy Area\nINNER\
    \ JOIN AreaHierarchy\n    ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n\
    ```\n\nFollowing the declaration of this CTE, we will be able to run a `SELECT`\
    \ statement."
