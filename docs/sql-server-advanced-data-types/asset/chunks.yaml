- fmt: "# Chapter 3 ConstruCting XML with t-sQL\n\n```xml\n<LineItem Quantity=\"35\"\
    \ UnitPrice=\"1.89\">\n    <Product StockItemName=\"Packing knife with metal insert\
    \ blade (Yellow) 9mm\" />\n</LineItem>\n\n<LineItem Quantity=\"150\" UnitPrice=\"\
    2.74\">\n    <Product StockItemName=\"Shipping carton (Brown) 480x270x320mm\"\
    \ />\n</LineItem>\n</SalesOrder>\n\n<SalesOrder OrderDate=\"2016-05-19\" OrderID=\"\
    72770\">\n    <LineItem Quantity=\"175\" UnitPrice=\"1.14\">\n        <Product\
    \ StockItemName=\"Shipping carton (Brown) 356x229x229mm\" />\n    </LineItem>\n\
    </SalesOrder>\n\n<SalesOrder OrderDate=\"2016-05-19\" OrderID=\"72787\">\n   \
    \ <LineItem Quantity=\"4\" UnitPrice=\"345.00\">\n        <Product StockItemName=\"\
    Ride on big wheel monster truck (Black) 1/12 scale\" />\n    </LineItem>\n</SalesOrder>\n\
    \n<SalesOrder OrderDate=\"2016-05-18\" OrderID=\"72669\">\n    <LineItem Quantity=\"\
    70\" UnitPrice=\"26.00\">\n        <Product StockItemName=\"10 mm Anti static\
    \ bubble wrap (Blue) 10m\" />\n    </LineItem>\n</SalesOrder>\n\n<SalesOrder OrderDate=\"\
    2016-05-27\" OrderID=\"73340\">\n    <LineItem Quantity=\"20\" UnitPrice=\"112.00\"\
    >\n        <Product StockItemName=\"32 mm Double sided bubble wrap 50m\" />\n\
    \    </LineItem>\n</SalesOrder>\n\n<SalesOrder OrderDate=\"2016-05-18\" OrderID=\"\
    72669\">\n    <LineItem Quantity=\"20\" UnitPrice=\"18.50\">\n        <Product\
    \ StockItemName=\"Office cube periscope (Black)\" />\n    </LineItem>\n</SalesOrder>\n\
    \n<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <LineItem Quantity=\"\
    10\" UnitPrice=\"285.00\">\n        <Product StockItemName=\"Ride on vintage American\
    \ toy coupe (Black) 1/12 scale\" />\n    </LineItem>\n</SalesOrder>\n</Customers>\n\
    ```\n\nNesting based on table joins is not always sufficient. In this example,\
    \ it would be possible for some `<LineItem>` elements to contain multiple `<Product>`\
    \ elements, which is obviously not correct. There cannot be more than one product\
    \ per line on a sales order. This is because the primary key of the `Sales.OrderLines`\
    \ table has not been included in the query, meaning that not every set of tuples\
    \ returned from the `Sales.OrderLines` table must be unique. The values for `UnitPrice`\
    \ and `OrderQty` happened to be repeated. If this occurred, `FOR XML AUTO` would\
    \ group them. If the primary key had been included, the issue could not occur.\n\
    \n## `Using FOR XML PATH`\n\nSometimes, you need more control over the shape of\
    \ the resultant XML document than can be provided by either `RAW` mode or `AUTO`\
    \ mode. When you have a requirement to define custom output, `PATH` mode can be\
    \ used.\n\n`PATH` mode offers great flexibility, as it allows you to define the\
    \ location of each node within the resultant XML. This is achieved by specifying\
    \ how each column in the query maps to the XML, with the use of column names or\
    \ aliases.\n\nIf a column alias begins with the `@` symbol, an attribute will\
    \ be created. If no `@` symbol is used, the column will map to an element. Columns\
    \ that will become attributes must be specified before columns that will be sibling\
    \ nodes but defined as elements.\n\nIf you wish to define a node’s location in\
    \ the hierarchy, you can use the `/` symbol. For example, if you required the\
    \ order date to appear nested under an element called `<OrderHeader>`, you could\
    \ specify its column alias as `'/OrderHeader/OrderDate'` for the `OrderDate` column.\n\
    \n`PATH` mode allows you to create highly customized and complex structures. For\
    \ example, imagine that you are required to create an XML document in the format\
    \ displayed in `Listin[g 3-14. H](#index_split_001.html#p105)ere`, you will note\
    \ that there is a root node called `<SalesOrders>`. The next node in the hierarchy\
    \ is `<Orders>`. This is a repeating element, with a new occurrence for every\
    \ order raised by the customer, which is the same as when we explored `AUTO` mode.\
    \ The difference is that each sales order has its own hierarchy. First, there\
    \ is a section for generic order information, stored within a node called `<OrderHeader>`.\
    \ This element is the parent element for `<CustomerName>`, `<OrderDate>`, and\
    \ `<OrderID>`. These values are to be stored as simple elements."
