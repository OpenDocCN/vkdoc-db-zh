    Orders Comments\": null\n    }\n  ]\n}\n```\n\n你会注意到，`comments` 键现在使用的是名称 `Orders\
    \ Comments`，而不是 `Comments`。如果你使用点分隔的别名，这种行为同样适用，如列表 7-15 中的示例。\n\n**列表 7-15.**\
    \ 使用点分隔的别名\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    OrderID\n    ,\
