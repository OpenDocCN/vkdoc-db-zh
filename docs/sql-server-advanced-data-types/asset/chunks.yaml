    `SET SalesAreaLevel = SalesAreaHierarchy.GetLevel() ;`


    Using the script in Listing [12-26, w](#index_split_003.html#p390) we can now
    create a `clustered index`, which is first order by the hierarchical level of
    the `node` and then by the `HierarchyID` column. This will cause siblings to be
    stored close to one another.


    `Note` the script first drops the existing `clustered index`, because a table
    can only support a single `clustered index`.


    ## Listing 12-26. Creating a Breadth-First Index


    ```sql

    USE WideWorldImporters


    GO


    DROP INDEX SalesAreaHierarchyDepthFirst ON Sales.SalesAreaHierarchyID ;


    GO


    CREATE CLUSTERED INDEX SalesAreaHierarchyBredthFirst


    ON Sales.SalesAreaHierarchyID(SalesAreaLevel, SalesAreaHierarchy) ;

    ```


    Listing [12-27](#index_split_003.html#p390) demonstrates how we can use the same
    technique as in Listing [12-24](#index_split_003.html#p387), to view the actual
    location of each `node` within the hierarchy.


    This time, as well as returning the `sales area name`, we will also return the
    `SalesAreaLevel` for easy analysis.


    ## Listing 12-27. View Rows Location with a Breadth-First Strategy


    ```sql

    USE WideWorldImporters


    GO


    SELECT


    SalesAreaName


    , SalesAreaLevel


    , sys.fn_PhysLocFormatter(%%physloc%%) AS PhysicalLocation


    FROM Sales.SalesAreaHierarchyID ;

    ```


    The results of this query can be found in Figure [12-16](#index_split_003.html#p391).
    You will notice that the order of rows has changed and that `UK`, `Western Europe`,
    `Eastern Europe`, `Canada`, `USA`, and `LATAM` are now next to one another, as
    they are all at Level 2 of the hierarchy.


    ![](index-391_1.jpg)


    ## Figure 12-16. Results of viewing row locations in a breadth-first hierarchy


    ## Summary


    `HierarchyID` is created as a `.NET` class and implemented as a data type in `SQL
    Server`. Using `HierarchyID` over a traditional approach to modeling hierarchies
    in `SQL Server` has the benefits both of reducing code complexity and improving
    performance. The `HierarchyID` data type exposes several methods that can be used
    by developers to easily navigate a hierarchy, insert new hierarchical nodes, or
    update existing nodes so that they sit under a new parent.


    The two most commonly used methods, in my experience, are the `ToString()` method,
    which allows a developer to format a hierarchical node as a human-readable string
    representation, and `IsDescendantOf()`, which performs an evaluation of hierarchical
    node lineage and returns `1` when a node is a descendant of an input parameter
    and `0` if it is not.


    The `Read()` and `Write()` methods offer data type conversion functionality to
    `SQLCLR`, but these are not implemented in `T-SQL`, as the `CAST` and `CONVERT`
    functions can easily be used instead.


    When indexing `HierarchyID` columns, either a depth-first strategy or a breadth-first
    strategy can be applied. Depth-first is the default option and stores child nodes
    close to their parents. A breadth-first strategy requires an additional column
    in the table, which stores the node’s level with the hierarchy. This allows a
    multicolumn index to store sibling nodes close to one another. The indexing option
    that you choose should reflect the nature of the queries run against the `HierarchyID`
    column.


