  trans: "# 第 12 章 处理层次数据和 HierarchyID\n\n## 使用 GetReparentedValue()\n\n该方法涉及原始父级销售区域的销售区域层次结构节点，而\
    \ `@WesternEurope` 变量则填充了目标父级销售区域的销售区域层次结构节点。\n\n### 清单 12-15. 使用 GetReparentedValue()\n\
    \n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @America HIERARCHYID =\n(\n  \
    \  SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName\
    \ = 'America'\n) ;\n\nDECLARE @WesternEurope HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
    \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'Western Europe'\n\
    ) ;\n\nSELECT Area.ToString()\nFROM\n(\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n\
    \    @WesternEurope) AS Area\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy\
    \ = 0x6B16\n) NewNodePath ;\n```\n\n`![](img/index-378_1.jpg)`\n\n此脚本的结果如图 12-12\
    \ 所示。你会注意到叶节点值保持不变，而路径（父节点）已被更改，使得该节点现在位于西欧聚合区域下。\n\n### 图 12-12. 使用 GetReparentedValue()\
    \ 的结果\n\n我们可以通过清单 12-16 中的脚本来更新 `Sales.SalesAreaHierarchyID` 表中西班牙销售区域的祖先关系。\n\
    \n### 清单 12-16. 更新西班牙销售区域的祖先关系\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE\
    \ @America HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n\
    \    WHERE SalesAreaName = 'America'\n) ;\n\nDECLARE @WesternEurope HIERARCHYID\
    \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n \
    \   WHERE SalesAreaName = 'Western Europe'\n) ;\n\nUPDATE Sales.SalesAreaHierarchyID\n\
    SET SalesAreaHierarchy =\n(\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n\
    \    @WesternEurope)\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy\
    \ = 0x6B16\n)\nWHERE SalesAreaHierarchy = 0x6B16 ;\n```\n\n## 使用 GetAncestor()\n\
    \n`GetAncestor()` 方法可用于根据输入参数指定的级别数，返回给定层次节点的祖先节点。例如，考虑清单 12-17 中的查询。该查询将通过向 `GetAncestor()`\
    \ 方法传递不同的参数，返回西班牙的祖父节点、父节点和西班牙本身。\n\n**注意** 要使此查询按预期工作，你必须首先运行本章前面的示例。具体来说，是“使用\
    \ GetDescendant()”和“使用 GetReparentedValue()”部分中的插入和更新查询，以及创建和填充表的清单 12-2。\n\n\
    ### 清单 12-17. 使用 GetAncestor()\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n\
    \    CurrentNode.SalesAreaName AS SalesArea\n    , ParentNode.SalesAreaName AS\
    \ ParentSalesArea\n    , GrandParentNode.SalesAreaName AS GrandParentSalesArea\n\
    FROM Sales.SalesAreaHierarchyID Base\nINNER JOIN Sales.SalesAreaHierarchyID CurrentNode\n\
    \    ON CurrentNode.SalesAreaHierarchy = Base.SalesAreaHierarchy.GetAncestor(0)\n\
    INNER JOIN Sales.SalesAreaHierarchyID ParentNode\n    ON ParentNode.SalesAreaHierarchy\
    \ = Base.SalesAreaHierarchy.GetAncestor(1)\nINNER JOIN Sales.SalesAreaHierarchyID\
    \ GrandParentNode\n    ON GrandParentNode.SalesAreaHierarchy = Base.SalesAreaHierarchy.GetAncestor(2)\n\
    WHERE Base.SalesAreaName = 'Spain' ;\n```\n\n## 使用 IsDescendantOf()\n\n`IsDescendantOf()`\
    \ 方法用于评估层次结构中的某个节点是否是作为参数传入的节点的后代（在任何层级上）。我们可以使用这个方法来重写清单 12-5 中的查询，该查询使用传统层次结构汇总了美国聚合区域下所有销售区域的\
    \ `SalesYTD`。\n\n你会记得，当使用传统层次结构时，我们必须实现一个递归 CTE，来为所有属于美国后代的层级汇总 `SalesYTD` 列。而当使用"
- fmt: "# Chapter 12 Working with Hierarchical Data and HierarchyID\n\na HierarchyID\
    \ column to maintain the hierarchy, however, our code is greatly simplified, as\
    \ demonstrated in [Listing 12-18](#index_split_003.html#p381).\n\n### Listing\
    \ 12-18. Using IsDescendantOf()\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n\
    \    SUM(SalesYTD) AS TotalSalesYTD\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(0x68)\
    \ = 1 ;\n```\n\nInstead of a recursive CTE, the functionally equivalent code is\
    \ a simple query with a `WHERE` clause that filters hierarchical nodes, based\
    \ on whether they are descendants of the America aggregation area. [Listing 12-19](#index_split_003.html#p381)\
    \ shows a more complex example. Here, we are parameterizing the sales area and\
    \ calculating not only the total `SalesYTD` but also the `TotalSalesPeople` and\
    \ the regions `AverageSalesPerSalesPerson`.\n\n### Listing 12-19. Parameterizing\
    \ IsDescendantOf() Queries\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region\
    \ NVARCHAR(20) = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT\
    \ SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName\
    \ = @Region\n) ;\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople)\
    \ AS TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n    \
    \  AverageSalesPerSalesPerson\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
    \ = 1 ;\n```\n\nYou can clearly see how the `Region` parameter could be passed\
    \ into a stored procedure, so that this code could be accessed by an application.\n\
    \nLet us now add a `SalesAreaName` to the `SELECT` list, and group by this column,\
    \ as demonstrated in [Listing 12-20](#index_split_003.html#p382).\n\n### Listing\
    \ 12-20. Adding a GROUP BY\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region\
    \ NVARCHAR(20) = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT\
    \ SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName\
    \ = @Region\n) ;\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople)\
    \ AS TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n    \
    \  AverageSalesPerSalesPerson\n    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy) = 1\nGROUP BY SalesAreaName\
    \ ;\n```\n\n![](index-383_1.jpg)\n\nThe results of this query are illustrated\
    \ in [Figure 12-13](#index_split_003.html#p383).\n\n### Figure 12-13. Results\
    \ of using IsDescendantOf() with GROUP BY\n\nThe interesting behavior exposed\
    \ by the results of this query is that `America` is included. This is because\
    \ `HierarchyID` regards `America` as a descendant of itself. This does not create\
    \ an issue for us, because the aggregations are not pre-calculated. However, in\
    \ some instances, you may have to exclude `America` from the result set. This\
    \ can easily be achieved by adding an additional filter to the `WHERE` clause,\
    \ as demonstrated in [Listing 12-21](#index_split_003.html#p383).\n\n### Listing\
    \ 12-21. Filtering the Current Node from Descendants\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nDECLARE @Region NVARCHAR(20) = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID\
    \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n \
    \   WHERE SalesAreaName = @Region\n) ;\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n\
    \    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople)\
    \ AS\n      AverageSalesPerSalesPerson\n    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy) = 1\n    AND SalesAreaHierarchy\
    \ <> @RegionHierarchy\nGROUP BY SalesAreaName ;\n```\n\nThis query filters the\
    \ result set to exclude the sales area, the hierarchical node of which is equal\
    \ to the hierarchical node that is being passed to the `IsDescendantOf()` method.\
    \ This technique allows us to use the `WITH ROLLUP` clause on the `GROUP BY`,\
    \ in conjunction with wrapping `SalesAreaName` in an `ISNULL()` function, to produce\
    \ a subtotal row for the whole of America. This is demonstrated in [Listing 12-22.](#index_split_003.html#p384)"
