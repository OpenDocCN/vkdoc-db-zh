    \ NULL),\n    (7, 3, 'Canada', 4, 350000),\n    (8, 3, 'USA', NULL, NULL),\n \
    \   (9, 3, 'LATAM', NULL, NULL),\n    (10, 5, 'Germany', 3, 150000),\n    (11,\
