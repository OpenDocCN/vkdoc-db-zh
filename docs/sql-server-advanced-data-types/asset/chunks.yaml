    \ and “Using GetReparentedValue()” sections, as well as listing 12-2, which creates\
    \ and populates the table.\n\n### Listing 12-17. Using GetAncestor()\n\n```sql\n\
    USE WideWorldImporters\nGO\n\nSELECT\n    CurrentNode.SalesAreaName AS SalesArea\n\
    \    , ParentNode.SalesAreaName AS ParentSalesArea\n    , GrandParentNode.SalesAreaName\
    \ AS GrandParentSalesArea\nFROM Sales.SalesAreaHierarchyID Base\nINNER JOIN Sales.SalesAreaHierarchyID\
    \ CurrentNode\n    ON CurrentNode.SalesAreaHierarchy = Base.SalesAreaHierarchy.GetAncestor(0)\n\
    INNER JOIN Sales.SalesAreaHierarchyID ParentNode\n    ON ParentNode.SalesAreaHierarchy\
    \ = Base.SalesAreaHierarchy.GetAncestor(1)\nINNER JOIN Sales.SalesAreaHierarchyID\
    \ GrandParentNode\n    ON GrandParentNode.SalesAreaHierarchy = Base.SalesAreaHierarchy.GetAncestor(2)\n\
    WHERE Base.SalesAreaName = 'Spain' ;\n```\n\n## Using IsDescendantOf()\n\nThe\
    \ `IsDescendantOf()` method evaluates if a node within the hierarchy is a descendant\
    \ (at any level) of a node that is passed to it as a parameter. It is this method\
