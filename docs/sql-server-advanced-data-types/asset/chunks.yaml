- fmt: "# Writes out a binary representation of SqlHierarchyId to the BinaryWriter.\
    \ For use with SQL CLR only. When using T-SQL, use `CAST` or `CONVERT` instead.\n\
    \n**Tip:** `HierarchyID` methods are case-sensitive. For example, calling `tostring()`\
    \ will throw an error; calling `ToString()` will succeed.\n\n## Working with HierarchyID\
    \ Methods\n\nThe following sections describe how to use the methods exposed against\
    \ the `HierarchyID` data type.\n\n### Using ToString( )\n\nIf you run a `SELECT`\
    \ statement against a column with the `HierarchyID` data type, the value returned\
    \ will be a hexadecimal representation of the node. To see a textual representation\
    \ of the node, you must use the `ToString()` method. For example, consider the\
    \ query in Listing 12-9.\n\n#### Listing 12-9. Using ToString()\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    SalesAreaName\n    , SalesAreaHierarchy\n    , SalesAreaHierarchy.ToString()\
    \ AS SalesAreaHierarchyString\nFROM Sales.SalesAreaHierarchyID ;\n```\n\nThe results\
    \ of this query are displayed in Figure 12-6. You will see that the column becomes\
    \ human-readable, once the `ToString()` method is called against it.\n\n![](index-369_1.jpg)\n\
    \n**Figure 12-6.** Results of using `ToString()`\n\n### Using Parse( )\n\nThe\
    \ `Parse()` method is called implicitly when a string representation of a node\
    \ is inserted into a `HierarchyID` column. Essentially, the `Parse()` method performs\
    \ the reverse function of the `ToString()` method. It attempts to convert a string\
    \ formatted representation to the `HierarchyID` representation. If it fails, an\
    \ error is thrown. For example, consider the script in Listing 12-10.\n\n####\
    \ Listing 12-10. Using the Parse() Method\n```sql\n--Returns Hexidecimal Representation\
    \ Of Node\nSELECT HierarchyID::Parse('/1/1/2/2/') ;\n\n--Throws An Error Because\
    \ Trailing / Is Missing\nSELECT HierarchyID::Parse('/1/1/2/2') ;\n```\n\nThe Results\
    \ tab displayed by running this script can be seen in Figure 12-7. While the first\
    \ query displays the expected result, the second query returns no results.\n\n\
    ![](index-370_1.jpg)\n\n**Figure 12-7.** Using `Parse()` Results tab\n\nChecking\
    \ the Messages tab, displayed in Figure 12-8, will detail the error thrown by\
    \ the .NET framework.\n\n![](index-371_1.jpg)\n\n**Figure 12-8.** Error thrown\
    \ by .NET framework\n\n### Using GetRoot( )\n\nThe `GetRoot()` method will return\
    \ the root node of a hierarchy, as demonstrated in Listing 12-11.\n\n#### Listing\
    \ 12-11. Using GetRoot()\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\n\
    \    , SalesAreaHierarchy.ToString()\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy\
    \ = HierarchyID::GetRoot() ;\n```\n\nThe results of this query can be viewed in\
    \ Figure 12-9.\n\n![](index-372_1.jpg)\n\n**Figure 12-9.** Results of using `GetRoot()`\n\
    \n### Using GetLevel( )\n\nThe `GetLevel()` method allows you to determine at\
    \ what level of the hierarchy a particular node resides. For example, the query\
    \ in Listing 12-12 will return all nodes that reside on the bottom level of the\
    \ hierarchy. In our case, this is just New York.\n\nThe subquery will determine\
    \ the maximum level within the hierarchy, and the outer query will return all\
    \ sales areas that are at that level.\n\n#### Listing 12-12. Using GetLevel()\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.GetLevel() =\n(\n    SELECT\n        MAX(SalesAreaHierarchy.GetLevel())\n\
    \    FROM Sales.SalesAreaHierarchyID\n) ;\n```\n\nThe results of this query can\
    \ be found in Figure 12-10.\n\n![](index-373_1.jpg)\n\n**Figure 12-10.** Results\
    \ of using `GetLevel()`\n\n### Read( ) and Write( )"
