    : null\n        },\n        {\n            \"OrderID\": 72916,\n            \"\
    CustomerID\": 1060,\n            \"SalespersonPersonID\": 6,\n            \"OrderDate\"\
    : \"2016-05-20\",\n            \"Orders.Comments\": null\n        },\n       \
    \ {\n            \"OrderID\": 73081,\n            \"CustomerID\": 1060,\n    \
    \        \"SalespersonPersonID\": 8,\n            \"OrderDate\": \"2016-05-24\"\
    ,\n            \"Orders.Comments\": null\n        }\n    ]\n}\n```\n\nYou will\
    \ notice that the key is simply given a dot-separated name.\n\nThis is important\
    \ behavior to note, as when using `FOR JSON PATH`, dot-separated aliases result\
    \ in nested JSON objects. You will learn more about this as you progress through\
    \ the chapter.\n\n### Automatic Nesting\n\nSo far, all our examples have focused\
    \ on the behavior of `FOR JSON AUTO`, when used against a single table. So now,\
    \ let’s turn our attention to how `FOR JSON AUTO` automatically nests data, based\
    \ on table joins and subqueries.\n\nConsider the query in Listing [7-17. T](#index_split_002.html#p227)his\
    \ query inspects order 72646 in more detail, by enhancing it to retrieve the details\
    \ of the stock items ordered on each of the three orders placed.\n\n**Listing\
    \ 7-17.** Added Order Line Details\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n\
    \    Orders.OrderID\n    , Orders.CustomerID\n    , Orders.SalespersonPersonID\n\
    \    , Orders.OrderDate\n    , Orders.Comments\n    , OrderLines.StockItemID\n\
    \    , OrderLines.UnitPrice\n    , OrderLines.Quantity\nFROM Sales.Orders Orders\n\
    INNER JOIN Sales.OrderLines OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\n\
    WHERE CustomerID = 1060\n    AND Orders.OrderID = 72646\nFOR JSON AUTO, ROOT('SalesOrders'),\
    \ INCLUDE_NULL_VALUES ;\n```\n\nThe results of this query are illustrated in Listin[g\
    \ 7-18](#index_split_002.html#p227).\n\n**Listing 7-18.** Results of Adding Order\
    \ Line Details\n\n```json\n{\n    \"SalesOrders\": [\n        {\n            \"\
    OrderID\": 72646,\n            \"CustomerID\": 1060,\n            \"SalespersonPersonID\"\
    : 14,\n            \"OrderDate\": \"2016-05-18\",\n            \"Comments\": null,\n\
    \            \"OrderLines\": [\n                {\n                    \"StockItemID\"\
    : 45,\n                    \"UnitPrice\": 13,\n                    \"Quantity\"\
    : 6\n                },\n                {\n                    \"StockItemID\"\
    : 146,\n                    \"UnitPrice\": 18,\n                    \"Quantity\"\
    : 108\n                },\n                {\n                    \"StockItemID\"\
    : 8,\n                    \"UnitPrice\": 240,\n                    \"Quantity\"\
    : 2\n                },\n                {\n                    \"StockItemID\"\
    : 212,\n                    \"UnitPrice\": 4.3,\n                    \"Quantity\"\
    : 20\n                }\n            ]\n        }\n    ]\n}\n```\n\nYou will notice\
    \ that a new key, the name of which matches the alias of the second table, has\
    \ been added to the representation of each order. The value is a nested array\
    \ of JSON objects containing the name/value pairs, which represent the columns\
    \ returned from the second (based on the order of columns within the `SELECT`\
    \ list) table.\n\nSo, what if we added a nested join, so that we can retrieve\
    \ the product name from the `Warehouse.StockItems` table, as demonstrated in Listing\
    \ [7-19](#index_split_002.html#p229)?\n\n**Listing 7-19.** Using Nested Joins\n\
    \n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    Orders.OrderID\n    , Orders.CustomerID\n\
    \    , Orders.SalespersonPersonID\n    , Orders.OrderDate\n    , Orders.Comments\n\
    \    , OrderLines.StockItemID\n    , OrderLines.UnitPrice\n    , OrderLines.Quantity\n\
    \    , Products.StockItemName\nFROM Sales.Orders Orders\nINNER JOIN Sales.OrderLines\
    \ OrderLines\n    ON OrderLines.OrderID = Orders.OrderID\nINNER JOIN Warehouse.StockItems\
    \ Products\n    ON Products.StockItemID = OrderLines.StockItemID\nWHERE CustomerID\
    \ = 1060\n    AND Orders.OrderID = 72646\nFOR JSON AUTO, ROOT('SalesOrders'),\
    \ INCLUDE_NULL_VALUES ;\n```\n\nThe results of this query can be found in Listin[g\
    \ 7-20.](#index_split_002.html#p230)\n\n**Listing 7-20.** Results of Using Nested\
    \ Joins\n\n```json\n{\n    \"SalesOrders\": [\n        {\n            \"OrderID\"\
    : 72646,\n            \"CustomerID\": 1060,\n            \"SalespersonPersonID\"\
    : 14,\n            \"OrderDate\": \"2016-05-18\",\n            \"Comments\": null,\n\
    \            \"OrderLines\": [\n                {\n                    \"StockItemID\"\
    : 45,\n                    \"UnitPrice\": 13,\n                    \"Quantity\"\
    : 6,\n                    \"Products\": [\n                        {\n       \
    \                     \"StockItemName\": \"Developer joke mug - there are 10 types\
    \ of people in the world (Black)\"\n                        }\n              \
    \      ]\n                },\n                {\n                    \"StockItemID\"\
    : 146,\n                    \"UnitPrice\": 18,\n                    \"Quantity\"\
    : 108,\n                    \"Products\": [\n                        {\n```"
