    **Using exist()**


    The exist() method is used to check for the existence of a node with a


    specified value. For example, please consider the script in Listin[g 4-2\. T](#index_split_001.html#p129)he
    query will programmatically check to see if the XML document containing


    sales order details contains the Chocolate sharks 250g product. The first 116


    ![](index-129_1.jpg)


