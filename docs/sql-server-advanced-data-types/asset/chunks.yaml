  trans: '# 第十章 理解空间数据


    **提示** 关于创建和操作原始几何体及几何体集合的实际示例，可参见章节 11。


    ## 空间数据标准


    SQL Server 中的空间数据是围绕开放地理空间联盟 (OGC) 制定的标准实现的。这些标准可在 [www.opengeospatial.org/standards/gml](http://www.opengeospatial.org/standards/gml)
    找到。


    接下来的章节将概述 SQL Server 中可用的空间曲面类型，以及如何使用众所周知文本和众所周知二进制来表示它们。我还将讨论空间参考系统。


    ## 众所周知文本


    OGC 制定了两种引用空间数据的方法：众所周知文本 (WKT) 和众所周知二进制 (WKB)。我将首先讨论 WKT，以及如何使用这种方法指定每个几何体。表
    10-3 详细列出了每种原始几何体的 WKT。


    ### 表 10-3. 原始几何体 WKT


    | **几何体** | **WKT** | **描述** |

    | :--- | :--- | :--- |

    | 点 | `POINT(x y z m)` | x 表示 x 轴或经度；y 表示 y 轴或纬度；z 可选，表示高程；m 可选，表示测量值。 |

    | 线串 | `LINESTRING(POINT 1, POINT 2, POINT n)` |  |

    | 圆弧串 | `CIRCULARSTRING(start POINT, Anchor POINT 1, Anchor POINT n, end POINT)`
    |  |

    | 复合曲线 | `COMPOUNDCURVE((POINT 1, POINT n), CIRCULARSTRING(start POINT, Anchor
    POINT, end POINT))` | 当弧线段是圆弧串时，点集必须以几何体类型为前缀。当弧线段是线串时，无需指定几何体类型。 |

    | 多边形 | `POLYGON((POINT 1, POINT 2, POINT n))` | 多边形也可以通过在括号内定义第二组点（用逗号分隔）来包含一个内部多边形（洞）。
    |

    | 曲线多边形 | `CURVEPOLYGON((CIRCULARSTRING(POINT 1, POINT 2, POINT n)))` | 曲线多边形也可以通过在括号内定义第二组点（用逗号分隔）来包含一个内部曲线多边形（洞）。
    |


    *(续表)*


    | **几何体** | **WKT** | **描述** |

    | :--- | :--- | :--- |

    | ... | ... | ... |


    表 10-4 详细列出了多部件几何体的 WKT。


    ### 表 10-4. 多部件几何体 WKT


    | **几何体** | **WKT** |

    | :--- | :--- |

    | 多点 | `MULTIPOINT((POINT 1),(POINT n))` |

    | 多线串 | `MULTILINESTRING((POINT 1, POINT n), (POINT 1, POINT n))` |

    | 多多边形 | `MULTIPOLYGON((POINT 1, POINT 2, POINT n),(POINT 1, POINT 2, POINT n))`
    |

    | 几何体集合 | `GEOMETRYCOLLECTION(GEOMETRYTYPENAME(POINT n),GEOMETRYTYPENAME(POINT
    n))` |


    ## 众所周知二进制


    WKB 也可用于表示几何体。这种二进制数据通常表示为十六进制值。使用 WKB 时，你可以控制字节顺序，然后指定曲面类型，最后指定点集。本节将讨论 WKB 中每个字节的用途。


    第一个字节表示字节顺序，其中 `00` 是大端序，`01` 是小端序。


    **提示** 大端序是指序列中最不重要的字节最后存储，小端序是指最不重要的字节最先存储。


    接下来的四个字节表示所定义曲面的类型。表 10-5 描述了这些字节的整型代码。


    ### 表 10-5. WKB 曲面类型整型代码


    | **类型** | **2D** | **Z** | **M** | **ZM** |

    | :--- | :--- | :--- | :--- | :--- |

    | 点 | | | | |

    | 线串 | | | | |

    | 圆弧串 | | | | |

    | 复合曲线 | | | | |

    | 多边形 | | | | |

    | 曲线多边形 | | | | |

    | 多点 | | | | |

    | 多线串 | | | | |

    | 多多边形 | | | | |

    | 几何体集合 | | | | |


    剩余的字节由描述点的八字节浮点数组成。例如，想象一个坐标为 `4, 2` 的 `POINT`。使用大端序，其十六进制表示将是 `0x0101000000000000000000104000000000000000040`。如果我们将其分解为组成部分：

    - `01`—表示字节方向

    - `01000000`—表示曲面类型

    - `0000000000001040`—表示 x 轴

    - `0000000000000040`—表示 y 轴


    **提示** 每个字节由两个字符的十六进制表示。


    ```

    0x0101000000000000000000104000000000000000040

    ```'
- fmt: "reference.\n\nTable 10-6 provides some examples of this.\n\n# Chapter 10 Understanding\
    \ Spatial Data\n\n**Table 10-6.** WKB Examples\n\n**WKT** | **WKB (Hexadecimal\
    \ Representation—Big Endian)**\n---|---\n`POINT(1 1)` | `0x0101000000000000000000F03F00000000000F03F`\n\
    `POINT(1 1 1 1)` | `0x00000000010F000000000000F03F000000000000F03F000000000000F03F000000000000F03F`\n\
    `LINESTRING(1 1, 2 2)` | `0x000000000114000000000000F03F000000000000F03F00000000000000400000000000000040`\n\
    `POLYGON((1 1, 2 2, 2 1, 1 1))` | `0x00000000010404000000000000000000F03F000000000000F03F000000000000004000000000000000400000000000000040000000000000F03F000000000000F03F000000000000F03F010000000200000000001000000FFFFFFFF0000000003`\n\
    `GEOMETRYCOLLECTION(POINT(1 1),POINT(2 2))` | `0x00000000010402000000000000000000F03F000000000000F03F000000000000004000000003000000FFFFFFFF0000000007000000000-`\n\
    \n## Spatial Reference Systems\n\nWhen working with the `GEOGRAPHY` data type,\
    \ we must be aware that there is not one single unified view of how to represent\
    \ the earth. Instead, there are multiple reference systems, known as spatial reference\
    \ systems. Each system provides its own map projections. Each system is identified\
    \ by an `SRID` (spatial reference identifier). The `SRID`s supported by SQL Server\
    \ can be found by interrogating the `sys.spatial_reference_systems` system table,\
    \ as demonstrated in Listing 10-1.\n\n![](index-302_1.jpg)\n\n**Tip** The earth\
    \ cannot be modeled on a plane without being distorted. A map projection defines\
    \ the distortions that are acceptable and unacceptable. each projection allows\
    \ for different distortions.\n\n**Listing 10-1.** Discovering Spatial References\n\
    \n```sql\nSELECT *\nFROM sys.spatial_reference_systems ;\n```\n\nPartial results\
    \ of this query can be found in Figure 10-5.\n\n**Figure 10-5.** Results of discovering\
    \ spatial reference systems\n\nYou will notice that the table provides various\
    \ details about each SR, including its ID; the authority that develops and maintains\
    \ it; the unit of measurement, along with the unit’s conversion factor, against\
    \ the base measure of meters; and, most interestingly, the WKT of the SR, as defined\
    \ by the OGC.\n\nLet’s examine the WKT for Microsoft’s implementation of SR (`SRID`\
    \ 104001) , which is detailed in Listing 10-2.\n\n**Listing 10-2.** WKT for SRID\
    \ 104001\n\n```\nGEOGCS[\"Unit Sphere\",\n DATUM[\"Unit Sphere\",\n  SPHEROID[\"\
    Sphere\", 1.0, 0.0]\n ],\n PRIMEM[\"Greenwich\",0.0],\n UNIT[\"Degree\", 0.0174532925199433]\n\
    ]\n```\n\nNote that the WKT uses a JSON format (see Chapters 6–9 for a detailed\
    \ discussion of JSON) and specifies map projection details, such as the prime\
    \ meridian and unit of measurement.\n\n**Caution** it is important to note that\
    \ while a single `GEOGRAPHY` column can contain values based on multiple spatial\
    \ reference systems, it is not possible to compare these values. spatial functions\
    \ require that all values have the same `srid`, as they contain the background\
    \ information required for calculations. That said, however, it is possible for\
    \ a value to be converted to a different `srid` before a comparison is performed.\n\
    \n![](index-304_1.jpg)\n\n## SSMS and Spatial Data\n\nSQL Server Management Studio\
    \ (SSMS) provides graphical results, to assist developers when working with spatial\
    \ data. For example, imagine a simple script, such as Listing 10-3, which declares\
    \ a variable of type `GEOMETRY` and sets it to contain a simple `CurvePolygon`.\n\
    \n**Listing 10-3.** Declaring a CurvePolygon with GEOMETRY\n\n```sql\nDECLARE\
    \ @CurvePolygon GEOMETRY =\n'CURVEPOLYGON(CIRCULARSTRING(1 3, 3 5, 4 7, 7 3, 1\
    \ 3))' ;\n\nSELECT @CurvePolygon ;\n```\n\nThe normal results tab will return\
    \ the `WKB` of the surface, in hexadecimal notation, as shown in Figure 10-6.\n\
    \n**Figure 10-6.** Results in WKB\n\n![](index-305_1.jpg)"
