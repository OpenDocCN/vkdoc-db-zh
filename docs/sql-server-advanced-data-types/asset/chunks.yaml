    ## 使用 `FOR XML AUTO`


    与 `FOR XML RAW` 不同，`FOR XML AUTO` 可以返回嵌套结果。它使用起来也异常简单，因为它会根据查询中的连接自动嵌套数据。`清单 3-10`
