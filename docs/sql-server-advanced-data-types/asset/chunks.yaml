    # Chapter 6 Understanding JsOn


    ## Analyzing the Log Data


    Devices such as sensors or RFID (radio frequency identification) can generate
    very large amounts of data. This means that data architects will often choose
    to store this data in NoSQL solutions. Often, JSON is used as the file format
    for such logging.


    When large logs are stored in JSON format, the SQL Server’s native JSON support
    means that these logs can easily be read into SQL Server and analyzed using T-SQL,
    without any complex parsing requirements. This can reduce the time to market for
    reports against log data.


    ## Summary


    JSON is a lightweight data-interchange format that is supported by many REST APIs
    and web service end points. It is similar to XML, in that it is an extensible,
    self-describing, hierarchical document format, but it differs in the following
    ways:


    • It cannot be validated against a schema.

    • It does not have closing tags.

    • It is shorter.

    • It is easier to parse.

    • It supports arrays.


    JSON’s basic format is a series of name/value pairs, which are separated by commas.
    JSON objects are always enclosed in braces, and arrays are always enclosed in
    brackets. JSON objects can be nested inside other JSON objects. When this is the
    case, a backslash should be used to escape characters, such as double quotes and
    braces.


    JSON has many use cases in SQL Server, including the simplification of REST APIs
    interacting with back-end databases. JSON is also a good choice when NoSQL solutions
    must be integrated with SQL Server, such as when device logs must be analyzed
    or NoSQL semi-structured data must be stored alongside structured data. JSON is
    also very useful when DBAs or platform engineers implement config as code solutions.


    # CHAPTER 7 Constructing JSON from T-SQL


    Just as the `FOR XML` clause (see Chapt[er 3](#index_split_000.html#p61)) can
    be used to construct XML documents from relational results sets, the `FOR JSON`
    clause can be used to construct JSON data from relational results sets. This is
    useful for exchanging data between SQL Server and traditional programming languages.
    Unlike `FOR XML`, however, `FOR JSON` only offers two modes: `AUTO` and `PATH`.
    This chapter discusses the use of the `FOR JSON` clause in both `AUTO` mode and
    `PATH` mode.


