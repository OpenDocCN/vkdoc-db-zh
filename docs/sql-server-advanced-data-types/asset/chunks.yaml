    10 mm Anti static bubble wrap (Blue) 10m\" Quantity=\"70\" UnitPrice=\"26.00\"\
    \ />`\n\n`<row OrderDate=\"2016-05-27\" CustomerName=\"Agrita Abele\" OrderID=\"\
    73340\" StockItemName=\"32 mm Double sided bubble wrap 50m\" Quantity=\"20\" UnitPrice=\"\
    112.00\" />`\n\n`<row OrderDate=\"2016-05-18\" CustomerName=\"Agrita Abele\" OrderID=\"\
    72669\" StockItemName=\"Office cube periscope (Black)\" Quantity=\"20\" UnitPrice=\"\
    18.50\" />`\n\n`<row OrderDate=\"2016-05-27\" CustomerName=\"Agrita Abele\" OrderID=\"\
    73356\" StockItemName=\"Ride on vintage American toy coupe (Black) 1/12 scale\"\
    \ Quantity=\"10\" UnitPrice=\"285.00\" />`\n\n`</SalesOrders>`\n\nThe other important\
    \ thing to note about the document is that it is completely flat. There is no\
    \ nesting. This means that the document’s granularity is at the level of line\
    \ item, which does not make a lot of sense.\n\nIt is also worthy of note that\
    \ all data is contained in attributes, as opposed to elements. We can alter this\
    \ behavior by using the `ELEMENTS` keyword in the `FOR XML` clause. The `ELEMENTS`\
    \ keyword will cause all data to be contained within child elements, as opposed\
    \ to attributes. This is demonstrated in the modified query that can be found\
    \ in Listing 3-6.\n\n### Listing 3-6. Using the `ELEMENTS` Keyword\n\n```sql\n\
    SELECT\n    SalesOrder.OrderDate\n    , Customers.CustomerName\n    , SalesOrder.OrderID\n\
    \    , Product.StockItemName\n    , LineItem.Quantity\n    , LineItem.UnitPrice\n\
    FROM Sales.Orders SalesOrder\nINNER JOIN Sales.OrderLines LineItem\n    ON LineItem.OrderID\
    \ = SalesOrder.OrderID\nINNER JOIN Warehouse.StockItems Product\n    ON Product.StockItemID\
    \ = LineItem.StockItemID\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\nWHERE customers.CustomerName = 'Agrita Abele'\nFOR\
    \ XML RAW, ELEMENTS, ROOT('SalesOrders') ;\n```\n\nThe well-formed XML document\
    \ that is returned can be seen in Listing 3-7.\n\n### Listing 3-7. Using the `ELEMENTS`\
    \ Keyword\n\n```xml\n<SalesOrders>\n    <row>\n        <OrderDate>2016-05-19</OrderDate>\n\
