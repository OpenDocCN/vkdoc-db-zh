    \ $.Tags') AS TagsArray\nFROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax\
    \ $.Tags[0]') = 'Radio Control' ;\n```\n\n图 9-15 中的执行结果显示，该查询执行耗时 `6ms`。\n\n*图\
    \ 9-15. 时间统计*\n\n现在，让我们使用与 `WHERE` 子句相同的逻辑，在 `Warehouse.StockItems` 表上创建一个计算列。这可以通过代码清单\
    \ 9-21 中的脚本来实现。\n\n## 创建计算列\n\n```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE\
    \ Warehouse.NewStockItems\nADD CustomFieldsTag0 AS JSON_VALUE(CustomFields,\n\
    \    'lax $.Tags[0]') ;\n```\n\n现在，我们可以为计算列创建索引（这也会导致该列被持久化，而不是在查询时即时计算），如代码清单\
    \ 9-22 所示。\n\n## 为计算列创建索引\n\n```sql\nUSE WideWorldImporters\nGO\n\nCREATE NONCLUSTERED\
    \ INDEX NCI_CustomFieldsTag0\nON Warehouse.NewStockItems(CustomFieldsTag0) ;\n\
    ```\n\n现在，让我们再次使用代码清单 9-23 中的简化脚本来检查查询性能。\n\n## 检查索引性能\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\n--清除计划缓存\nDBCC FREEPROCCACHE\n\n--清除缓冲区缓存\nDBCC DROPCLEANBUFFERS\n\n--打开统计信息\n\
    SET STATISTICS TIME ON\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
    \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
    \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
    \ $.Tags') AS TagsArray\nFROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax\
    \ $.Tags[0]') = 'Radio Control' ;\n```\n\n从图 9-16 所示的时间统计中可以看到，查询在 `3ms` 内执行完成。性能提升了\
    \ 50%！\n\n*图 9-16. 检查索引性能的结果*\n\n**提示** 由于 `NewStockItems` 表非常小，查询优化器有可能选择不使用你的索引。如果发生这种情况，你可以通过添加\
    \ `WITH (INDEX(NCI_CustomFieldsTag0))` 查询提示来强制它使用索引。但至关重要的一点是，一般来说，优化器是智能的，很少应该给它提示。如果你确实需要使用提示，那么你应该始终与优化器协作，而不是对抗它。\n\
    \n例如，如果优化器错误地选择了 `LOOP JOIN` 物理运算符，则强制它使用 `MERGE JOIN` 或 `HASH JOIN`。不要替它选择哪个更好！\n\
    \n# 总结\n\nSQL Server 提供了使用 `ISJSON()`、`JSON_VALUE()`、`JSON_QUERY()` 和 `JSON_MODIFY()`\
    \ 函数来查询和修改 JSON 数据的能力。\n\n`ISJSON()` 函数提供了一种简单的验证，用于检查文档是否具有有效的 JSON 格式。如果文档是\
    \ JSON，它返回 `1`；如果不是，则返回 `0`。\n\n`JSON_VALUE()` 函数可以包含在查询的 `SELECT` 列表、`WHERE`\
    \ 子句、`ORDER BY` 子句或 `GROUP BY` 子句中。它返回一个\n"
- fmt: 'Chapter 9 Working With the JSON Data Type


    `JSON_QUERY()` function can also be included in the `SELECT` list, `WHERE` clause,
    `ORDER BY`, or `GROUP BY`, but instead of returning a single scalar value, it
    returns a JSON object or array. As with `JSON_VALUE()`, the object returned is
    based on a path expression that is passed to the function.


    `MODIFY_JSON()` function can be used to update, insert, or delete key values.
    A JSON document and a path expression are passed to the function, and the complete
    modified document is returned, making it easy to use in a standard `UPDATE` statement.
    The optional `append` keyword in the path expression is used to denote that the
    intention is to add an additional value to an array, as opposed to modifying an
    existing value. Updating a key value with `NULL` deletes the key.


    Query performance can be improved by indexing the properties of a JSON document.
    This is achieved by creating a computed column, based on the path expression that
    you wish to optimize. You can then create an index on the computed column. This
    allows the query optimizer to use the index when the column containing the JSON
    data is queried.


    Chapter 10 Understanding Spatial Data


    Spatial data is data that describes a location. It is said that 80% of the world’s
    data has a spatial element to it, so you can see how, for many data-tier applications,
    the ability to construct or interrogate spatial data may be critical. In this
    chapter, I will give an overview of spatial data and its implementation in SQL
    Server, before looking at the spatial standards that are used in the SQL Server
    implementation.


    **Note** This chapter is intended to provide a theoretical overview of spatial
    data. Practical examples of usage can be found in Chapter 11.


    Understanding Spatial Data


    SQL Server provides two data types that are able to store spatial data: `GEOMETRY`
    and `GEOGRAPHY`. These data types are implemented through CLR (Common Language
    Runtime) and, behind the scenes, are .NET classes, which provide a series of methods
    and properties that allow you to interact with the data.


    © Peter A. Carter 2018


    P. A. Carter, *SQL Server Advanced Data Types*,

    <https://doi.org/10.1007/978-1-4842-3901-8_10>


    **Caution** A geospatial object can be referred to as a geometry, with simple
    objects referred to as primitive geometries and collections of objects referred
    to as geometry collections. Because `geometry` is also the name of the data type
    that implements spatial data as a flat-earth model, this can cause confusion.
    Therefore, please note that when this chapter refers to a geospatial object, the
    word `geometry` will be used in lowercase. When referring to the data type, the
    word will be in uppercase letters (`GEOMETRY`).


    The `GEOMETRY` data type uses the Euclidean coordinates system, which provides
    a flat-earth model. `GEOMETRY` is the correct data type to use when you are dealing
    with 2D objects or small objects that are not required to consider the curvature
    of the earth.


    When using the `GEOMETRY` data type, objects are plotted using x and y axes. For
    example, the point in Figure 10-1 is located (or plotted) at 5, 3.


    ![](index-291_1.png)


    *Figure 10-1. Plotting a point in a Euclidean system*


    **Tip** A shape is referred to as a surface.


    Similarly, the polygon (closed surface) in Figure 10-2 is drawn using the coordinates
    (-1 -1, -1 2, 2 2, 2 -1, -1 -1).


    ![](index-292_1.jpg)


    *Figure 10-2. Plotting a polygon in a Euclidean system*


    The `GEOGRAPHY` data type, on the other hand, uses a round-earth model (or, actually,
    multiple round-earth models) and is ideal for representing 3D objects or large
    areas that must consider the curvature of the earth.'
