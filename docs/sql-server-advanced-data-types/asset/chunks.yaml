    We could easily achieve these results by using `FOR JSON PATH`, which provides
    granular control over how the resultant document is formatted. This control is
    provided through the use of column aliases, which allow you to specify desired
    nesting, through dot separation. Consider the query in Listing [7-24](#index_split_002.html#p238).
    The query is similar to that in Listing [7-21](#index_split_002.html#p232), but
    there are two key differences to note. The first is that `FOR XML AUTO` has changed
    to `FOR XML PATH`. The second is that each column has been given column aliases,
    which designate not just the name of the node but its position within the document.
    The customer’s full name, for example, will be placed into a node called `Customer`,
    which is nested directly under `OrderDetails`. The `ProductName` node, in contrast,
    will be nested alongside the unit price and quantity, under a node called `LineItems`.
    This causes a `LineItems` key to be created with a value that consists of an array
    of JSON objects, including all nodes that are specified in the preceding text.
    The result is the document found in Listing [7-23.](#index_split_002.html#p235)


    ## Listing 7-24. Using `FOR JSON PATH`


    ```sql

    USE WideWorldImporters

    GO

    SELECT

    Orders.OrderID AS ''OrderDetails.OrderID''

    , Customers.FullName AS ''OrderDetails.Customer''

    , SalesPeople.FullName AS ''OrderDetails.SalesPerson''

    , Orders.OrderDate AS ''OrderDetails.OrderDate''

    , Orders.Comments AS ''OrderDetails.Comments''

    , OrderLines.UnitPrice AS ''OrderDetails.LineItems.UnitPrice''

    , OrderLines.Quantity AS ''OrderDetails.LineItems.Quantity''

    , Products.StockItemName AS ''OrderDetails.LineItems.ProductName''

    FROM Sales.Orders Orders

    INNER JOIN Sales.OrderLines OrderLines

    ON OrderLines.OrderID = Orders.OrderID

    INNER JOIN Warehouse.StockItems Products

    ON Products.StockItemID = OrderLines.StockItemID

    INNER JOIN Application.People Customers

    ON Customers.PersonID = Orders.CustomerID

    INNER JOIN Application.People SalesPeople

    ON SalesPeople.PersonID = Orders.SalespersonPersonID

    WHERE CustomerID = 1060

    AND orders.OrderID = 72646

    FOR JSON PATH, ROOT(''SalesOrders''), INCLUDE_NULL_VALUES ;

    ```


    ## Summary


    The `FOR JSON` clause of a `SELECT` statement can be used to convert a result
    set into JSON format. It can be used in two modes: either `AUTO` or `PATH`. When
    used in `AUTO` mode, `FOR JSON` will automatically nest data, based on the joins
    within your query. When used in `PATH` mode, `FOR JSON` gives the developer more
    control, by allowing the location of each relational column to be defined within
    the JSON result set, by using dot-separated column aliases, which control nesting.


    The `FOR JSON` clause has multiple options for controlling the document format.
    For example, a root node can be added to the document, by using the `ROOT` option,
    or if no root node is present, the outer array wrapper can be removed by using
    the `WITHOUT_ARRAY_WRAPPER` option. You can also specify if `NULL` values should
    be included in the resultant document, by using the `INCLUDE_NULL_VALUES` option.


