    ## 总结


    `FOR XML` 子句可用于从 T-SQL 查询构建 XML 数据。`FOR XML` 子句可以在四种模式下使用：`RAW`、`AUTO`、`PATH`
    和 `EXPLICIT`。


    当在 `RAW` 模式下使用时，`FOR XML` 将生成一个扁平的 XML 实例，没有嵌套。它使用非常简单，并允许 XML 实例是以属性为中心或以元素为中心的。通过添加根节点，它也可以生成格式良好的
    XML。然而，它对格式的控制非常有限。


    `FOR XML AUTO` 使用起来非常简单，允许开发者创建嵌套的 XML 实例。与 `FOR XML RAW` 一样，`FOR XML AUTO` 可以生成以元素为中心或以属性为中心的文档，通过添加根节点可以使其格式规范。XML
    文档中的数据将根据表连接自动嵌套。节点的名称将源自表别名。


    当在 `PATH` 模式下使用时，`FOR XML` 提供了对 XML 文档布局更细粒度的控制。通过包含或省略 `@` 前缀，可以将每列定义为元素或属性。

