    FOR XML EXPLICIT. This chapter will demonstrate how the FOR XML clause'
  trans: '

    SQL Server 数据库提供了强大的 XML 数据处理能力。从网站提取销售订单的应用程序可将其推送到 SQL Server 中。数据库的原生工具允许开发人员使用
    `XQuery Nodes` 方法或 `OPENXML()` 函数将 XML 销售订单解析为关系表结构。反之，若要将销售订单传递给需要 XML 文档的中间件系统，你可以运行查询以检索关系数据，并附加
    `FOR XML` 子句将数据转换为 XML。


    SQL Server 对架构验证的支持也意味着，应用程序可以在通过网络发送数据之前，根据 SQL Server 开发人员提供的架构验证其数据。SQL Server
    也可以在将文档传递给应用程序之前，根据 XML 架构验证文档。本质上，你可以在应用程序的不同层级之间创建一个数据契约，节省时间并实现更好的错误处理。


    在另一个将数据存储为 XML 的用例中，假设你有一个包含详细产品定义和描述的 XML 文档。虽然你可以将其作为文件维护在文件系统中，但将其存储在 SQL Server
    中允许你查询 XML 文档并将结果与关系信息连接起来。在 SQL Server 中可以使用 `XQuery` 查询 XML 文档。


    ## 第 2 章 理解 XML


    许多 SQL Server 数据结构以 XML 格式存储，包括：

    *   扩展事件

    *   DDL 触发器中的事件信息

    *   事件通知

    *   数据收集器


    对 XML 的原生支持使开发人员和管理员能够与此数据交互。虽然你可能认为 JSON 是现代首选的格式，但 XML 仍具有 JSON 不支持的功能，例如：

    *   架构验证

    *   `XPath`

    *   命名空间

    *   `XLST`


    ### 小结


    XML 是一种类似 HTML 的标记语言，但其标签由文档作者定义。一个 `XML 文档` 由元素和属性组成，以半结构化的树格式存储数据。


    SQL Server 支持 `XML` 片段、格式正确的 `XML` 文档以及有效（绑定架构的）`XML` 文档。要格式正确，一个 `XML` 文档必须包含单个根节点，并且除非格式正确，否则
    `XML` 文档不能绑定架构。短语 `XML 文档` 和 `XML 实例` 常被互换使用，尽管严格来说，`XML 文档` 指的是格式正确的 XML。


    `XML` 文档可以绑定到 DTD（`文档类型定义`）或 XSD（`XML 架构定义`）架构。SQL Server 仅通过 `XML 架构集合` 支持存储
    XSD 架构。


    ## 第 3 章 使用 T-SQL 构造 XML


    `T-SQL` 允许你通过在 `SELECT` 语句中使用 `FOR XML` 子句将关系结果集转换为 `XML`。`FOR XML` 子句有四种可用模式：

    *   `FOR XML RAW`

    *   `FOR XML AUTO`

    *   `FOR XML PATH`

    *   `FOR XML EXPLICIT`

    '
- fmt: '# 3.4 FOR XML 模式


    FOR XML 子句在 RAW 模式、AUTO 模式、PATH 模式和 EXPLICIT 模式下工作。随着本章的进展，我们将从简单示例过渡到更复杂的示例。


    ## 使用 FOR XML RAW


    在 FOR XML 模式中，最简单且易于理解的是 FOR XML RAW。此模式将关系结果集中的每一行转换为扁平 XML 文档中的一个元素。考虑清单 [3-1]
    中的查询，该查询从 WideWorldImporters 数据库中提取销售订单的详细信息。


    ***Listing 3-1.*** WideWorldImporters 销售订单查询


    ```sql

    SELECT

    SalesOrder.OrderDate

    , Customers.CustomerName

    , SalesOrder.OrderID

    , LineItem.StockItemID

    , LineItem.Quantity

    , LineItem.UnitPrice

    FROM Sales.Orders SalesOrder

    INNER JOIN Sales.OrderLines LineItem

    ON LineItem.OrderID = SalesOrder.OrderID

    INNER JOIN Warehouse.StockItems Product

    ON Product.StockItemID = LineItem.StockItemID

    INNER JOIN Sales.Customers Customers

    ON Customers.CustomerID = SalesOrder.CustomerID

    WHERE customers.CustomerName = ''Agrita Abele'';

    ```


    此查询提取名为 Agrita Abele 的客户下的订单详情。该查询的部分输出可以在图 [3-1] 中找到。


    ***Figure 3-1.** WideWorldImporters 销售订单输出*


    ![WideWorldImporters 销售订单输出](index-62_1.png)


    如果我们在查询中添加一个使用 RAW 模式的 FOR XML 子句，结果将以 XML 片段的形式返回。清单 [3-2] 中修改后的查询将返回 XML 文档，而不是关系结果集。


    ***Listing 3-2.*** 使用 FOR XML RAW 的 WideWorldImporters 销售订单


    ```sql

    SELECT

    SalesOrder.OrderDate

    , Customers.CustomerName

    , SalesOrder.OrderID

    , Product.StockItemName

    , LineItem.Quantity

    , LineItem.UnitPrice

    FROM Sales.Orders SalesOrder

    INNER JOIN Sales.OrderLines LineItem

    ON LineItem.OrderID = SalesOrder.OrderID

    INNER JOIN Warehouse.StockItems Product

    ON Product.StockItemID = LineItem.StockItemID

    INNER JOIN Sales.Customers Customers

    ON Customers.CustomerID = SalesOrder.CustomerID

    WHERE customers.CustomerName = ''Agrita Abele''

    FOR XML RAW;

    ```


    清单 [3-3] 展示了返回的 XML 片段。


    ***Listing 3-3.*** 使用 FOR XML RAW 的 WideWorldImporters 销售订单


    ```xml

    <row OrderDate="2016-05-19" CustomerName="Agrita Abele"

    OrderID="72787" StockItemName="Developer joke mug - when your hammer is C++ (Black)"
    Quantity="2" UnitPrice="13.00" />


    <row OrderDate="2016-05-19" CustomerName="Agrita Abele"

    OrderID="72787" StockItemName="Developer joke mug - when your hammer is C++ (White)"
    Quantity="9" UnitPrice="13.00" />


    <row OrderDate="2016-05-27" CustomerName="Agrita Abele"

