    \ 1，父节点为 `NULL`。每个节点在单独的查询中指定，这些查询使用 `UNION ALL` 进行连接。\n\n例如，假设我们希望扩展清单 3-18 中的示例，使得我们返回一个包含两个子元素的\
    \ `OrderDetails` 元素。第一个将包含接单销售人员的姓名。第二个将是一个重复元素，详细列出订单中的行项目。我们可以通过使用清单 3-19 中的查询来实现这一点。\n\
    \n`清单 3-19.` 使用 XML Explicit 的订单详情\n\n```sql\nSELECT\n    1 AS Tag\n    , 0 AS\
    \ Parent\n    , SalesOrder.OrderID AS\n      [OrderDetails!1!SalesOrderID]\n \
    \   , SalesOrder.OrderDate AS\n      [OrderDetails!1!OrderDate]\n    , SalesOrder.CustomerID\
    \ AS\n      [OrderDetails!1!CustomerID]\n    , NULL AS [SalesPerson!2!SalesPersonName]\n\
    \    , NULL AS [LineItem!3!LineTotal!ELEMENT]\n    , NULL AS [LineItem!3!ProductName!ELEMENT]\n\
    \    , NULL AS [LineItem!3!OrderQty!ELEMENT]\nFROM Sales.Orders SalesOrder\nINNER\
    \ JOIN Sales.Customers Customers\n    ON Customers.CustomerID = SalesOrder.CustomerID\n\
    WHERE customers.CustomerName = 'Agrita Abele'\n\nUNION ALL\n\nSELECT\n    2 AS\
    \ Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n    , NULL\n    , NULL\n \
    \   , People.FullName\n    , NULL\n    , NULL\n    , NULL\nFROM Sales.Orders SalesOrder\n\
    INNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID = SalesOrder.CustomerID\n\
    INNER JOIN Application.People People\n    ON People.PersonID = SalesOrder.SalespersonPersonID\n\
    WHERE customers.CustomerName = 'Agrita Abele'\n\nUNION ALL\n\nSELECT\n    3 AS\
    \ Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n    , NULL\n    , NULL\n \
    \   , People.FullName\n    , LineItem.UnitPrice\n    , Product.StockItemName\n\
    \    , LineItem.Quantity\nFROM Sales.Orders SalesOrder\nINNER JOIN Sales.OrderLines\
    \ LineItem\n    ON SalesOrder.OrderID = LineItem.OrderID\nINNER JOIN Sales.Customers\
    \ Customers\n    ON Customers.CustomerID = SalesOrder.CustomerID\nINNER JOIN Warehouse.StockItems\
    \ Product\n    ON Product.StockItemID = LineItem.StockItemID\nINNER JOIN Application.People\
    \ People\n    ON People.PersonID = SalesOrder.SalespersonPersonID\nWHERE customers.CustomerName\
    \ = 'Agrita Abele'\nORDER BY\n    [OrderDetails!1!SalesOrderID]\n    , [SalesPerson!2!SalesPersonName]\n\
    \    , [LineItem!3!LineTotal!ELEMENT]\nFOR XML EXPLICIT, ROOT('SalesOrders');\n\
    ```\n\n关于清单 3-19 中的查询，我们需要注意几点。首先，每个复杂的节点都在其自己的查询中，这些查询通过 `UNION ALL` 连接。就像每次使用\
    \ `UNION ALL` 一样，每个查询必须具有相同数量的列。因此，当查询所定义的复杂节点中某个节点不存在时，会使用 `NULL` 值。另外，请注意 `OrderID`\
    \ 列在所有三个查询中都使用了。该列用于定义哪些销售人员和行项目明细应归属于每个销售订单之下。\n\n```sql\nCustomerName 'OrderHeader/CustomerName'\n\
    , OrderDate 'OrderHeader/OrderDate'\n, OrderID 'OrderHeader/OrderID'\n, (\n  \
    \  SELECT\n        LineItems2.StockItemID '@ProductID'\n        , StockItems.StockItemName\
    \ '@ProductName'\n        , LineItems2.UnitPrice '@Price'\n        , Quantity\
    \ '@Qty'\n    FROM Sales.OrderLines LineItems2\n    INNER JOIN Warehouse.StockItems\
    \ StockItems\n        ON LineItems2.StockItemID = StockItems.StockItemID\n   \
    \ WHERE LineItems2.OrderID = Base.OrderID\n    FOR XML PATH('Product'), TYPE\n\
    ) 'OrderDetails'\nFROM (\n    SELECT DISTINCT\n        Customers.CustomerName\n\
    \        , SalesOrder.OrderDate\n        , SalesOrder.OrderID\n    FROM Sales.Orders\
    \ SalesOrder\n    INNER JOIN Sales.OrderLines LineItem\n        ON SalesOrder.OrderID\
    \ = LineItem.OrderID\n    INNER JOIN Sales.Customers Customers\n        ON Customers.CustomerID\
    \ = SalesOrder.CustomerID\n    WHERE customers.CustomerName = 'Agrita Abele'\n\
    ) Base\nFOR XML PATH('Order'), ROOT ('SalesOrders');\n```"
