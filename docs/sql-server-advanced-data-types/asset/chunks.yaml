    output of the process is a set of touched cells, which can be stored in the index
    and subsequently used to calculate their spatial position, relative to other objects.


    The tessellation process requires a bounding box, and this can behave differently,
    depending on the tessellation system used. The tessellation systems are data-type
    dependent and you will have the option of using automatic coordinates for the
    bounding box or defining your own.


    You may further configure the tessellation process, by defining how many tessellation
    cells should be used. What this means is that you can cap the maximum number of
    touched cells recorded for a single object. It is worth noting, however, that
    this only affects Levels 2 through 4. Level 1 will record as many cells as the
    object touches, regardless of your configuration.


