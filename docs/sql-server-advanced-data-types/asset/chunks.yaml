- fmt: "## Chapter 3 Constructing XML with T-SQL\n\n`FOR XML EXPLICIT` is the most\
    \ complex of the `FOR XML` modes but also the most powerful. It is implemented\
    \ by defining each complex node in a separate query, with the queries joined by\
    \ using the `UNION ALL` clause.\n\nHierarchical position can be defined through\
    \ column aliases, and complex nesting requirements can be achieved through subqueries.\n\
    \nHierarchical positioning is defined through `tag` and `parent` columns, which\
    \ are always the first and second columns, respectively, in the `SELECT` list.\
    \ Column aliases allow for the declaration of node names and define if each node\
    \ should be element-centric or attribute-centric.\n\n## Chapter 4 Querying and\
    \ Shredding XML\n\nTo allow developers to query and navigate XML documents from\
    \ within `SQL Server`, the `XQuery` language can be combined with `T-SQL` queries.\
    \ In this chapter, I will discuss how to use `XQuery` to filter, extract, and\
    \ modify XML. I will also discuss shredding XML, which is the process of converting\
    \ XML data into relational results sets. Finally, an overview of how to bind an\
    \ `XSD` schema to a column of data type `XML` is provided.\n\n### Querying XML\n\
    \n`XQuery` is a language for querying XML, in the same way that `SQL` is a language\
    \ for querying relational data. The language is built on `XPath` but has been\
    \ enhanced for better iteration and sorting. It also allows for the construction\
    \ of XML. The `XQuery` standard is developed by the `W3C` (World Wide Web Consortium),\
    \ in conjunction with Microsoft and other major relational database management\
    \ system (`RDBMS`) vendors.\n\n`XQuery` in `SQL Server` supports five methods\
    \ against the `XML` data type. An overview of these methods can be found in Table\
    \ 4-1, and each of the methods will be demonstrated throughout this chapter. `XQuery`\
    \ also supports the use of `XSD` schemas, to help interact with complex documents\
    \ and `FLWOR` (pronounced flower) statements. `FLWOR` is an acronym of `for`,\
    \ `let`, `where`, `order by`, and `return`.\n\n`for` statements allow you to iterate\
    \ through a sequence of nodes. `let` statements bind a sequence to a variable.\
    \ `where` statements filter nodes based on a Boolean expression. `order by` statements\
    \ order nodes before they are returned. `return` statements specify what should\
    \ be returned.\n\n**Tip** The structure and benefits of `XSD` schemas are explained\
    \ in Chapter 2.\n\nTo demonstrate the use of the `XQuery` methods in this chapter,\
    \ we will create a table in the `WideWorldImporters` database, called `Sales.CustomerOrderSummary`.\
    \ This table can be created using the script in Listing 4-1.\n\n### Table 4-1.\
    \ XQuery Methods\n\n| `exist()` | Checks for the existence of a node with a specified\
    \ value within an XML document. It returns 1 if the node exists with the specified\
    \ value and 0 if it does not. |\n| :--- | :--- |\n| `modify()` | Performs data\
    \ modification statements against an XML document. Acceptable `DML` actions are\
    \ `insert`, `delete`, and `replace value of`. |\n| `nodes()` | Returns a row set\
    \ that contains copies of original XML instances. It is used for shredding XML\
    \ into a relational result set. |\n| `query()` | This returns a subset of an XML\
    \ document, in XML format. |\n| `value()` | This returns a single scalar value\
    \ from an XML document, mapped to a `SQL Server` data type. |\n\n### Listing 4-1.\
    \ Creating the Sales.CustomerOrderSummary Table\n\n```sql\nUSE WideWorldImporters\n\
    GO\nCREATE TABLE Sales.CustomerOrderSummary\n(\n    ID INT NOT NULL IDENTITY,\n\
    \    CustomerID INT NOT NULL,\n    OrderSummary XML\n) ;\n\nINSERT INTO Sales.CustomerOrderSummary\
    \ (CustomerID, OrderSummary)\nSELECT\n    CustomerID,\n    (\n        SELECT\n\
    \            CustomerName 'OrderHeader/CustomerName'\n            , OrderDate\
    \ 'OrderHeader/OrderDate'\n            , OrderID 'OrderHeader/OrderID'\n     \
    \       , (\n                SELECT\n                    LineItems2.StockItemID\
    \ '@ProductID'\n                    , StockItems.StockItemName '@ProductName'\n\
    \                    , LineItems2.UnitPrice '@Price'\n                    , Quantity\
    \ '@Qty'\n                FROM Sales.OrderLines LineItems2\n```\n\n© Peter A.\
    \ Carter 2018\nP. A. Carter, *SQL Server Advanced Data Types*, [https://doi.org/10.1007/978-1-4842-3901-8_4](https://doi.org/10.1007/978-1-4842-3901-8_4)"
