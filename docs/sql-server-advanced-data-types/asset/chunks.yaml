    \ ;\nSET @Point = GEOMETRY::Point(10, 10, 0) ;\nSELECT @Point ;\n```\n\nSpatial\
    \ instances can also be instantiated by simply passing the well-known text or\
    \ well-known binary as a value. For example, consider the"
