- fmt: "script in Listing [11-5.](#index_split_002.html#p312)\n\n***Listing 11-5.***\
    \ Passing Well-Known Text to a Variable\n\n```\nDECLARE @Polygon GEOMETRY ;\n\n\
    SET @Polygon = 'POLYGON((0 0, 10 0, 10 10, 0 10, 0 0))' ;\n\nSELECT @Polygon ;\n\
    ```\n\n![](index-313_1.jpg)\n\nThe graphical results of this script are displayed\
    \ in Figure [11-2](#index_split_002.html#p313).\n\n***Figure 11-2.** Results of\
    \ passing well-known text to a variable*\n\nA spatial instance can be set to `NULL`,\
    \ either by passing a `NULL` value directly or by using the read-only `Null` property\
    \ of the instance. This is demonstrated in Listing [11-6.](#index_split_002.html#p313)\n\
    \n***Listing 11-6.*** Setting an Instance As `NULL`\n\n```\n--SET Variable As\
    \ NULL by passing A NULL Directly\nDECLARE @Polygon GEOMETRY ;\nSET @Polygon =\
    \ NULL ;\nSELECT @Polygon ;\n```\n\n![](index-314_1.jpg)\n\n```\n--Set A Variable\
    \ As NULL by using the read-only Null Property\nSET @Polygon = GEOMETRY::[Null]\
    \ ;\nSELECT @Polygon ;\n```\n\nIt is possible to check the validity of your well-known\
    \ text or well-known binary by using the `STIsValid` method. If the instance is\
    \ not valid, it can be made valid, by using the `MakeValid` method. For example,\
    \ consider the script in Listing [11-7](#index_split_002.html#p314), which instantiates\
    \ a `Polygon` that overlaps itself.\n\n***Listing 11-7.*** Validating and Correcting\
    \ an Instance\n\n```\nDECLARE @Polygon GEOMETRY ;\nSET @Polygon = GEOMETRY::STGeomFromText('POLYGON((0\
    \ 0, 10 10, 10 0, 0 10, 0 0))', 0) ;\n\nSELECT\n    @Polygon.STIsValid() AS IsValid\n\
    \    , @Polygon.MakeValid().ToString() AS Fixed\n    , @Polygon AS WKB ;\n```\n\
    \nThe results, shown in Figure [11-3, show](#index_split_002.html#p314) that the\
    \ original value has returned `0`, because it is not valid, and the fixed version\
    \ has converted it to a `MultiPolygon`.\n\n***Figure 11-3.** Results of validating\
    \ and correcting an instance*\n\n![](index-315_1.jpg)\n\nThe graphical results\
    \ of the query are shown in Figure [11-4.](#index_split_002.html#p315)\n\n***Figure\
    \ 11-4.** Graphical results of validating and correcting an instance*\n\nIt is\
    \ worth noting that because of the way in which spatial data is parsed, the use\
    \ of `STIsValid` and `MakeValid` are somewhat limited. For example, consider the\
    \ script in Listing [11-8, which](#index_split_002.html#p315) attempts to instantiate\
    \ a `Polygon` that is not enclosed.\n\n***Listing 11-8.*** Attempt to Instantiate\
    \ a Non-enclosed `Polygon`\n\n```\nDECLARE @LineString GEOMETRY ;\nSET @LineString\
    \ = GEOMETRY::STGeomFromText('POLYGON((0 0, 10 10, 10 0, 0 10))', 0) ;\n\nSELECT\n\
    \    @LineString.STIsValid() AS IsValid\n    , @LineString.MakeValid().ToString()\
    \ AS Fixed\n    , @LineString AS WKB ;\n```\n\nBecause the `Polygon` is not enclosed,\
    \ it fails to parse, and the error, illustrated in Figure [11-5](#index_split_002.html#p316),\
    \ is thrown.\n\n***Figure 11-5.** Error thrown from instantiating a non-enclosed\
    \ Polygon*\n\n**Querying Spatial Data**\n\nSQL Server provides numerous methods\
    \ for interacting with spatial data. An overview of these methods can be found\
    \ in Table [11-2](#index_split_002.html#p317). The table details the name of each\
    \ method, whether it is an `OGC` standard or a `Microsoft` extension, and the\
    \ data types the method works with. The final column provides a brief description\
    \ of the method’s ability.\n\nreturns the well-known binary augmented with `Z`\
    \ and `M` values, returns the `GML` of a spatial instance, returns the well-known\
    \ text augmented with `Z` and `M` values, accepts a single parameter distance,\
    \ returns an object representing all points within the distance supplied, against\
    \ which the method was called, accepts three parameters, the tolerance, denotes\
    \ if the tolerance is relative, returns an object representing all points, a spatial\
    \ object, a spatial object representing the union of all points, whose distance\
    \ from a geography instance is less than and a bit flag, which designates of the\
    \ spatial instance denoting a distance from the tolerance, if present, if present,\
    \ the geometry of a spatial instance, if present, returns a following for relative."
