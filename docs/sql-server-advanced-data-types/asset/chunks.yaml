  trans: "## 第 3 章 使用 T-SQL 构建 XML\n\n`FOR XML EXPLICIT` 模式是 `FOR XML` 模式中最复杂但也最强大的一种。它的实现方式是将每个复杂节点定义在独立的查询中，并通过\
    \ `UNION ALL` 子句连接这些查询。\n\n层次结构位置可以通过列别名来定义，复杂的嵌套需求可以通过子查询来实现。\n\n层次结构定位通过 `tag`\
    \ 和 `parent` 列来定义，它们始终分别是 `SELECT` 列表中的第一列和第二列。列别名允许声明节点名称，并定义每个节点应以元素为中心还是以属性为中心。\n\
    \n## 第 4 章 查询与分解 XML\n\n为了让开发者能够从 `SQL Server` 内部查询和导航 XML 文档，可以将 `XQuery` 语言与\
    \ `T-SQL` 查询结合使用。在本章中，我将讨论如何使用 `XQuery` 来过滤、提取和修改 XML。我还将讨论分解 XML 的过程，即将 XML 数据转换为关系结果集的过程。最后，提供了如何将\
    \ `XSD` 架构绑定到数据类型为 `XML` 的列的概述。\n\n### 查询 XML\n\n`XQuery` 是一种用于查询 XML 的语言，就像 `SQL`\
    \ 是用于查询关系数据的语言一样。该语言构建在 `XPath` 之上，但进行了增强以实现更好的迭代和排序。它还允许构建 XML。`XQuery` 标准由 `W3C`（万维网联盟）与\
    \ Microsoft 和其他主要关系数据库管理系统（`RDBMS`）供应商共同开发。\n\n`SQL Server` 中的 `XQuery` 支持针对 `XML`\
    \ 数据类型的五种方法。这些方法的概述见表 4-1，本章将逐一演示这些方法。`XQuery` 还支持使用 `XSD` 架构，以帮助处理复杂文档和 `FLWOR`（发音同“flower”）语句。`FLWOR`\
    \ 是 `for`、`let`、`where`、`order by` 和 `return` 的首字母缩写。\n\n`for` 语句允许您遍历节点序列。`let`\
    \ 语句将序列绑定到变量。`where` 语句基于布尔表达式过滤节点。`order by` 语句在返回节点前对其进行排序。`return` 语句指定应返回的内容。\n\
    \n**提示** `XSD` 架构的结构和优势在第 2 章中有解释。\n\n为了演示本章中 `XQuery` 方法的使用，我们将在 `WideWorldImporters`\
    \ 数据库中创建一个名为 `Sales.CustomerOrderSummary` 的表。可以使用清单 4-1 中的脚本来创建此表。\n\n### 表 4-1.\
    \ XQuery 方法\n\n| `exist()` | 检查 XML 文档中是否存在具有指定值的节点。如果存在具有指定值的节点，则返回 1，否则返回 0。\
    \ |\n| :--- | :--- |\n| `modify()` | 对 XML 文档执行数据修改语句。可接受的 `DML` 操作是 `insert`、`delete`\
    \ 和 `replace value of`。 |\n| `nodes()` | 返回一个包含原始 XML 实例副本的行集。用于将 XML 分解为关系结果集。\
    \ |\n| `query()` | 以 XML 格式返回 XML 文档的子集。 |\n| `value()` | 从 XML 文档返回单个标量值，映射到\
    \ `SQL Server` 数据类型。 |\n\n### 清单 4-1. 创建 Sales.CustomerOrderSummary 表\n\n```sql\n\
    USE WideWorldImporters\nGO\nCREATE TABLE Sales.CustomerOrderSummary\n(\n    ID\
    \ INT NOT NULL IDENTITY,\n    CustomerID INT NOT NULL,\n    OrderSummary XML\n\
    ) ;\n\nINSERT INTO Sales.CustomerOrderSummary (CustomerID, OrderSummary)\nSELECT\n\
    \    CustomerID,\n    (\n        SELECT\n            CustomerName 'OrderHeader/CustomerName'\n\
    \            , OrderDate 'OrderHeader/OrderDate'\n            , OrderID 'OrderHeader/OrderID'\n\
    \            , (\n                SELECT\n                    LineItems2.StockItemID\
    \ '@ProductID'\n                    , StockItems.StockItemName '@ProductName'\n\
    \                    , LineItems2.UnitPrice '@Price'\n                    , Quantity\
    \ '@Qty'\n                FROM Sales.OrderLines LineItems2\n```\n\n© Peter A.\
    \ Carter 2018\nP. A. Carter, *SQL Server 高级数据类型*, [`doi.org/10.1007/978-1-4842-3901-8_4`](https://doi.org/10.1007/978-1-4842-3901-8_4)"
- fmt: "# Using exist()\n\nThe `exist()` method is used to check for the existence\
    \ of a node with a specified value. For example, please consider the script in\
    \ Listing 4-2. The query will programmatically check to see if the XML document\
    \ containing sales order details contains the Chocolate sharks 250g product.\n\
    \nThe first portion of the XQuery defines the path to the node to be evaluated,\
    \ in this case, the `StockItemName` attribute. We have defined that the node is\
    \ an attribute, by prefixing the node name with the `@` symbol. We then specify\
    \ `eq` as the comparison operator, before supplying the value that we want to\
    \ validate the node against. If the criteria are met, `exist()` will return `1`.\
    \ If the criteria are not met, it will return `0`.\n\n***Listing 4-2.*** Checking\
    \ for the Existence of a Value\n\n```sql\nDECLARE @SalesOrders XML;\nSET @SalesOrders\
    \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers\
    \ CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks\
    \ 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n    \
    \    </Product>\n    </Customers>\n</SalesOrder>';\n\nSELECT @SalesOrders.exist('SalesOrder/Customers/Product[(@StockItemName)\
    \ eq \"Chocolate sharks 250g\"]');\n```\n\nYou can see how the `exist()` method\
    \ could easily be used in a `WHERE` clause, against a column of data type `XML`.\
    \ For example, consider the script in Listing 4-3, which uses the `exist()` method\
    \ in a `WHERE` clause against the `Sales.CustomerOrderSummary` table in the `WideWorldImporters`\
    \ database, to return just the order summary for Tailspin Toys (Absecon, NJ).\n\
    \nYou will notice that because we are evaluating the value of an element, as opposed\
    \ to an attribute, we have used the `text()` method to extract the value. The\
    \ `[1]` denotes that a singleton value will be returned.\n\n***Listing 4-3.***\
    \ Filtering a Table Using the `exist()` Method\n\n```sql\nSELECT\n    CustomerID,\n\
    \    OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/CustomerName[(text()[1])\
    \ eq \"Tailspin Toys (Absecon, NJ)\"]') = 1;\n```\n\n# Using value()\n\nThe `value()`\
    \ method is used to extract a single, scalar value from an XML document and map\
    \ it to an SQL Server data type. For example, consider the script in Listing 4-4.\
    \ The script uses the same XML document as Listing 4-1 but this time extracts\
    \ the customer name from the document.\n\nIn the same way as when we used the\
    \ `exist()` method, we will have to use the `@` symbol to prefix an attribute.\
    \ We also must denote that a singleton value will be returned.\n\n***Listing 4-4.***\
    \ Using the `value()` Method\n\n```sql\nDECLARE @SalesOrders XML;\nSET @SalesOrders\
    \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers\
    \ CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks\
    \ 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n    \
