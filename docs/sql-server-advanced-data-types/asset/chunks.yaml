    Just as with traditional indexes, spatial indexes use a B-Tree structure


    (see Chapter [5](#index_split_001.html#p169) for further information on B-Tree
    indexes), meaning that the spatial data must be represented in a linear order.
    To achieve this,


    SQL Server decomposes space into a nested grid system, before building


    an index.


    The grid will have four layers. Each cell in the first (Level 1) grid will contain
    another (Level 2) grid, and so on. Each of the four grid layers can be given a
    separate density, with low density being defined as 4 × 4 cells, medium density
    as 8 × 8 cells, and high density as 16 × 16 cells. Each cell within the grid is
    numbered using a Hilbert space-filling curve algorithm.


    **Tip** A full discussion of the hilbert space-filling curve is beyond the scope
    of this book, but further details can be found in many locations


    online, including mathworld. [wolfram.com/HilbertCurve.html](http://wolfram.com/HilbertCurve.html).


    ChAPTer 11 WorKInG WITh SPATIAL DATA


    Once the grid system has been created, SQL Server reads the data from


    the column row by row. For each row, it will associate the spatial object with
    each Level 1 cell that it touches. For each touched cell, it will then drop down
    to Level 2 and repeat the process. This then happens again for'
