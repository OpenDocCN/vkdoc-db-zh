    **Using JSON_VALUE( )**


    The JSON_VALUE() function can be used to return a single scalar value


    from a JSON document. The function accepts two parameters. The first


    parameter is the JSON document, from which to retrieve the data. The


    second is a path expression to the value you wish to return. As described in Chapt[er
    8, when us](#index_split_002.html#p240)ing path expressions with OPENJSON(), path
    expressions can be used in either lax mode or strict mode. When lax mode is used,
    if


    Chapter 9 Working With the JSon Data type


    there is an error in the path expression, NULL results will be returned, and no
    error will be raised. When used in strict mode, if there is an error in the path
    expression, an error will be thrown.


    The value returned is always of data type NVARCHAR(4000). This means


    that if the value exceeds 4000 characters, JSON_VALUE() will either return NULL
    or throw an error, depending on whether lax mode or strict mode has


    been used.


