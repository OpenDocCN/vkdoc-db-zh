  trans: "# 第 12 章 处理层次数据与 HierarchyID\n\n## 清单 12-5. 综合运用\n\n```sql\nWITH AreaHierarchy\
    \ (SalesAreaID, SalesYTD, ParentSalesAreaID)\nAS\n(\n    SELECT\n        SalesAreaID\n\
    \        , SalesYTD\n        , ParentSalesAreaID\n    FROM Sales.SalesAreaTraditionalHierarchy\
    \ RootLevel\n    WHERE SalesAreaName = 'America'\n    UNION ALL\n    SELECT\n\
    \        Area.SalesAreaID\n        , Area.SalesYTD\n        , Area.ParentSalesAreaID\n\
    \    FROM Sales.SalesAreaTraditionalHierarchy Area\n    INNER JOIN AreaHierarchy\n\
    \        ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n)\nSELECT SUM(SalesYTD)\n\
    FROM AreaHierarchy ;\n```\n\n该语句会向上汇总 `SalesYTD`，以返回整个美国的 `SalesYTD` 总额。清单 12-5\
    \ 中的脚本将所有这些组件组合在了一起。\n\n## 使用 HierarchyID 对层次结构建模\n\n当使用 `HierarchyID` 对层次数据建模时，无需对表进行自连接。因此，我们将不再使用引用其父区域主键的列，而是使用一个\
    \ `HierarchyID` 列，该列定义每个区域在层次结构中的位置。为了进一步解释这个概念，让我们考虑表 12-2 中的数据。\n\n### 表 12-2.\
    \ 使用 HierarchyID 的销售区域层次结构\n\n| 销售区域 ID | 销售区域层次结构 | 销售区域名称 | 销售人员数量 | 年初至今销售额\
    \ |\n| :--- | :--- | :--- | :--- | :--- |\n| 1 | / | 全球销售 | nUll | nUll |\n| 2\
    \ | /1/ | 欧洲 | nUll | nUll |\n| 3 | /2/ | 美洲 | nUll | nUll |\n| 4 | /1/1/ | 英国\
    \ | 3 | 300,000 |\n| 5 | /1/2/ | 西欧 | nUll | nUll |\n| 6 | /1/3/ | 东欧 | nUll |\
    \ nUll |\n| 7 | /2/1/ | 加拿大 | 4 | 350,000 |\n| 8 | /2/2/ | 美国 | nUll | nUll |\n\
    | 9 | /2/3/ | 拉丁美洲 | nUll | nUll |\n| 10 | /1/2/1/ | 德国 | 3 | 150,000 |\n| 11\
    \ | /1/2/2/ | 法国 | 2 | 100,000 |\n| 12 | /1/3/1/ | 匈牙利 | 1 | 50,000 |\n| 13 |\
    \ /1/3/2/ | 斯洛伐克 | 2 | 80,000 |\n| 14 | /2/2/1/ | 东部 | 4 | 140,000 |\n| 15 | /2/2/2/\
    \ | 西部 | 3 | 280,000 |\n| 16 | /2/3/1/ | 巴西 | 1 | 100,000 |\n| 17 | /2/3/2/ |\
    \ 阿根廷 | 2 | 70,000 |\n| 18 | /2/2/1/1/ | 纽约 | 2 | 120,000 |\n\n在表 12-2 中，您会注意到层次结构以\
    \ `/[节点]/[子节点]/[孙节点]/` 的格式表示，其中只包含 `/` 的行是层次结构的根节点。例如，我们看到德国的值 `/1/2/1/` 告诉我们德国是\
    \ `/1/2/`（西欧）的子节点，而 `/1/2/` 又是 `/1/`（欧洲）的子节点。`/1/` 是 `/`（全球销售）的子节点，后者是层次结构的根。\n\
    \n我们可以使用清单 12-6 中的脚本来创建和填充此表。\n\n## 清单 12-6. 使用 HierarchyID 创建表\n\n```sql\nUSE\
    \ WideWorldImporters\nGO\n\nCREATE TABLE Sales.SalesAreaHierarchyID\n(\n    SalesAreaID\
    \ INT NOT NULL PRIMARY KEY,\n    SalesAreaHierarchy HIERARCHYID NOT NULL,\n  \
    \  SalesAreaName NVARCHAR(20) NOT NULL,\n    CountOfSalesPeople INT NULL,\n  \
    \  SalesYTD MONEY NULL\n) ;\n\nINSERT INTO Sales.SalesAreaHierarchyID (\n    SalesAreaID\n\
    \    , SalesAreaHierarchy\n    , SalesAreaName\n    , CountOfSalesPeople\n   \
    \ , SalesYTD\n)\nVALUES\n    (1, '/', 'GlobalSales', NULL, NULL),\n    (2, '/1/',\
    \ 'Europe', NULL, NULL),\n    (3, '/2/', 'America', NULL, NULL),\n    (4, '/1/1/',\
    \ 'UK', 3, 300000),\n    (5, '/1/2/', 'Western Europe', NULL, NULL),\n    (6,\
    \ '/1/3/', 'Eastern Europe', NULL, NULL),\n    (7, '/2/1/', 'Canada', 4, 350000),\n\
    \    (8, '/2/2/', 'USA', NULL, NULL),\n    (9, '/2/3/', 'LATAM', NULL, NULL),\n\
    \    (10, '/1/2/1/', 'Germany', 3, 150000),\n    (11, '/1/2/2/', 'France', 2,\
    \ 100000),\n    (12, '/1/3/1/', 'Hungary', 1, 50000),\n    (13, '/1/3/2/', 'Slovakia',\
    \ 2, 80000),\n    (14, '/2/2/1/', 'Eastern', 4, 140000),\n    (15, '/2/2/2/',\
    \ 'Western', 3, 280000),\n    (16, '/2/3/1/', 'Brazil', 1, 100000),\n    (17,\
    \ '/2/3/2/', 'Agentina', 2, 70000),\n    (18, '/2/2/1/1/', 'New York', 2, 120000)\
    \ ;\n```\n\n尽管我们向 `SalesAreaHierarchy` 列插入了人类可读的字符串，但 SQL Server 会将这些字符串转换并存储为十六进制值。这使得该列极其紧凑和高效。可以使用清单\
    \ 12-7 中的查询来比较 `HierarchyID` 列的大小与传统层次结构中用于 `ParentSalesAreaID` 列的 `INT` 列的大小。\n\
    \n## 清单 12-7. 比较传统层次结构与 HierarchyID 的大小\n\n```sql\nUSE WideWorldImporters\nGO\n\
    \nSELECT\n    SUM(DATALENGTH(salesareahierarchy)) AS SizeOf\n```"
- fmt: "# 第12章 处理分层数据与HierarchyID\n\n## 大小比较查询\n\n查询示例：\n\n```sql\nHierarchyID, SUM(DATALENGTH(parentsalesareaid))\
    \ AS SizeOfTraditional\nFROM Sales.SalesAreaHierarchyID SalesAreaHierarchy\nINNER\
    \ JOIN sales.SalesAreaTraditionalHierarchy SalesAreaTraditional\nON SalesAreaHierarchy.SalesAreaID\
    \ = SalesAreaTraditional.SalesAreaID;\n```\n\n![](index-363_1.jpg)\n\n如图[12-4](#index_split_003.html#p363)所示，`HierarchyID`列的大小不到用于`ParentSalesAreaID`的`INT`列的一半。\n\
    \n**图 12-4.** 大小比较结果\n\n> **注意** 在第1章中，你了解到使用正确的数据类型很重要。如果我选择对`parentSalesareaiD`列使用`SMALLINT`，这两列的大小将大致相同。然而，这是一个为了解释`HierarchyID`而提供的次要示例。如果你正在大规模地实现层次结构，这个示例是一个公平的体现。\n\
    \n## 对HierarchyID列执行SELECT语句\n\n如果我们对`SalesAreaHierarchyID`表运行一个普通的`SELECT`语句，我们可以看到原始的十六进制值。例如，考虑清单[12-8](#index_split_003.html#p364)中的查询。\n\
    \n**清单 12-8.** 对HierarchyID列的SELECT语句\n\n```sql\nUSE WideWorldImporters\nGO\n\
    SELECT\n    SalesAreaName,\n    SalesAreaHierarchy\nFROM Sales.SalesAreaHierarchyID;\n\
    ```\n\n此查询的结果如图[12-5](#index_split_003.html#p365)所示。你会注意到，`SalesAreaHierarchy`列的内容以十六进制值返回，而不是人类可读的字符串。为了查看我们输入的人类可读的字符串，我们必须使用本章“使用HierarchyID方法”一节中讨论的`ToString()`方法。\n\
    \n![](index-365_1.jpg)\n\n**图 12-5.** 对HierarchyID列执行SELECT语句的结果\n\n## HierarchyID方法\n\
    \n`HierarchyID`数据类型提供了许多方法，允许开发人员在使用层次结构时快速编写高效的代码。表[12-3](#index_split_003.html#p366)详细说明了这些方法。\n\
    \n**表 12-3.** HierarchyID数据类型暴露的方法\n\n| 方法 | 描述 |\n| :--- | :--- |\n| `GetAncestor`\
    \ | 返回层次结构节点的祖先。接受一个参数，定义应从层次结构的多少层向上返回祖先。例如，`GetAncestor(1)`将返回节点的父节点，而`GetAncestor(2)`将返回节点的祖父节点。\
    \ |\n| `GetDescendant` | 返回给定节点在层次结构中的子节点ID。`GetDescendant()`方法通常用于创建两个节点。因此，该方法接受两个参数，类型均为`HierarchyID`。生成的节点将位于指定的两个节点之间。\
    \ |\n| `GetLevel` | 返回节点的层次级别。 |\n| `GetRoot` | 一个静态方法，返回层次结构的根级别。 |\n| `IsDescendantOf`\
    \ | `IsDescendantOf()`方法接受一个类型为`HierarchyID`的参数，如果给定节点是作为参数传递的节点的后代，则返回1。 |\n\
    | `Parse` | 解析作为参数传递的节点的字符串表示形式，以确保其有效。如果有效，则返回其十六进制表示。如果无效，将引发错误。 |\n| `Read`\
    \ | 从`Binaryreader`读取`SqlHierarchyId`的二进制表示，并将`SqlHierarchyId`对象设置为该值。`Read()`方法只能从`SQlClr`调用，不能从`t-SQl`调用。使用`t-SQl`时，应改用`CAST`或`CONVERT`。\
    \ |\n| `GetReparentedValue` | 用于将节点移动到新父节点。接受两个参数，第一个是原始父节点，第二个是新父节点。 |\n| `ToString`\
    \ | 返回层次结构中节点的字符串格式化表示。 |\n| `Write` | 将`SqlHierarchyId`对象的二进制表示形式写入`BinaryWriter`。\
    \ |"
