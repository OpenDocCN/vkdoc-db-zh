    \ there is always a way to achieve the same results, using a set-based approach.\n\
    \n## Summary\n\nJSON data can be shredded into tabular results sets by using the\
    \ `OPENJSON()` function. `OPENJSON()` can be used either with or without an explicit\
    \ schema. When a schema is not explicitly defined, `OPENJSON()`, using a `WITH`\
    \ clause, returns a standard row set, detailing the key (`name`), `value`, and\
    \ JSON data type `ID` of each node in the document.\n\nWhen an explicit schema\
    \ is supplied, `OPENJSON()` will return a formatted result set, which contains\
    \ a column for each specified in the `WITH` clause. Using an explicit schema avoids\
    \ the need to pivot the data when you know every node in the document at development\
    \ time. If the list of columns is not discrete, however, dynamic SQL will be required,\
    \ to build a list of possible results before processing.\n\n`OPENJSON()` also\
    \ supports JSON path expressions. Passing path expressions to the function allows\
    \ you to navigate to a specific item within an array, meaning that you can shred\
    \ data to a more granular level. For example, instead of shredding an array of\
    \ JSON objects into a table, you can use looping methodologies to shred the contents\
    \ of each array element into relational data.\n\n# CHAPTER 9 Working with the\
    \ JSON Data Type\n\nIn this chapter, I will discuss the T-SQL functions that allow\
    \ developers to query JSON data. I will then discuss how JSON data can be indexed.\n\
    \n## Querying JSON Data\n\nSQL Server has introduced the `JSON_VALUE()`, `JSON_QUERY()`,\
