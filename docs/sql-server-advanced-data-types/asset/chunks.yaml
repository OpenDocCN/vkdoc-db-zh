- fmt: "# Chapter 2 Understanding XML\n\n## Well-Formed XML\n\nSQL Server supports\
    \ both XML fragments and well-formed XML. Using well-formed XML is favorable,\
    \ as there is a degree of validation. Therefore, you should always try to use\
    \ well-formed XML, where possible. For an XML document to be well-formed, certain\
    \ requirements must be met, and these requirements are listed following:\n\n•\
    \ XML documents must have a single, non-repeating root element.\n• XML elements\
    \ must have a closing tag.\n• XML elements must be properly nested, with closing\
    \ tags in the reverse order of opening tags.\n• XML attribute values must be quoted\
    \ with double-quotation marks.\n• Each attribute name must be unique within an\
    \ element.\n\n### Tip\nXML tags are case-sensitive.\n\nAlthough SQL Server supports\
    \ XML fragments (XML documents that are not well-formed), the syntax must still\
    \ be syntactically correct. For example, consider the script in Listing 2-5. The\
    \ XML document is syntactically incorrect, because the root node is missing a\
    \ closing angle bracket.\n\n***Listing 2-5.*** Syntactically Incorrect XML\n\n\
    ```sql\nDECLARE @Example XML ;\n\nSET @Example =\n'<SalesOrder OrderDate=\"2013-03-07\"\
    \ CustomerID=\"57\"\nOrderID=\"3168\">\n  <LineItem StockItemID=\"176\" Quantity=\"\
    5\" UnitPrice=\"240.00\" />\n  <LineItem StockItemID=\"143\" Quantity=\"108\"\n\
    UnitPrice=\"18.00\" />\n  <LineItem StockItemID=\"136\" Quantity=\"3\" UnitPrice=\"\
    32.00\" />\n  <LineItem StockItemID=\"92\" Quantity=\"48\" UnitPrice=\"18.00\"\
    \ />\n</SalesOrder>\n<SalesOrder OrderDate=\"2013-03-22\" CustomerID=\"57\"\n\
    OrderID=\"4107\">\n  <LineItem StockItemID=\"153\" Quantity=\"40\" UnitPrice=\"\
    4.50\" />\n  <LineItem StockItemID=\"36\" Quantity=\"9\" UnitPrice=\"13.00\" />\n\
    \  <LineItem StockItemID=\"208\" Quantity=\"108\" UnitPrice=\"2.70\" />\n</SalesOrder'\
    \ ;\n\nSELECT @Example ;\n```\n\n![](index-52_1.png)\n\nRunning the script in\
    \ Listing 2-5 will produce the error shown in Figure 2-2.\n\n***Figure 2-2.**\
    \ XML syntax error*\n\nIf we were to correct the syntax error and rerun the script\
    \ (Listing 2-6), the script would run and return an XML document as the result\
    \ set, even though the document is not well-formed. It is not well-formed, because\
    \ there is not a root node.\n\n***Listing 2-6.*** XML Fragment\n\n```sql\nDECLARE\
    \ @Example XML ;\n\nSET @Example =\n'<SalesOrder OrderDate=\"2013-03-07\" CustomerID=\"\
    57\"\nOrderID=\"3168\">\n  <LineItem StockItemID=\"176\" Quantity=\"5\" UnitPrice=\"\
    240.00\" />\n  <LineItem StockItemID=\"143\" Quantity=\"108\" UnitPrice=\"18.00\"\
    \ />\n  <LineItem StockItemID=\"136\" Quantity=\"3\" UnitPrice=\"32.00\" />\n\
    \  <LineItem StockItemID=\"92\" Quantity=\"48\" UnitPrice=\"18.00\" />\n</SalesOrder>\n\
    <SalesOrder OrderDate=\"2013-03-22\" CustomerID=\"57\"\nOrderID=\"4107\">\n  <LineItem\
    \ StockItemID=\"153\" Quantity=\"40\" UnitPrice=\"4.50\" />\n  <LineItem StockItemID=\"\
    36\" Quantity=\"9\" UnitPrice=\"13.00\" />\n  <LineItem StockItemID=\"208\" Quantity=\"\
    108\" UnitPrice=\"2.70\" />\n</SalesOrder>' ;\n\nSELECT @Example ;\n```\n\nThe\
    \ results of running the script in Listing 2-6 are shown in Figure 2-3.\n\n***Figure\
    \ 2-3.** XML fragment*\n\nTo make the XML document returned well-formed XML, we\
    \ would have to add the root node, as demonstrated in Listing 2-7.\n\n***Listing\
    \ 2-7.*** Well-Formed XML\n\n```sql\nDECLARE @Example XML ;\n\nSET @Example =\n\
    '<SalesOrders>\n  <SalesOrder OrderDate=\"2013-03-07\" CustomerID=\"57\"\nOrderID=\"\
    3168\">\n    <LineItem StockItemID=\"176\" Quantity=\"5\" UnitPrice=\"240.00\"\
    \ />\n    <LineItem StockItemID=\"143\" Quantity=\"108\" UnitPrice=\"18.00\" />\n\
    \    <LineItem StockItemID=\"136\" Quantity=\"3\" UnitPrice=\"32.00\" />\n   \
    \ <LineItem StockItemID=\"92\" Quantity=\"48\" UnitPrice=\"18.00\" />\n  </SalesOrder>\n\
    \  <SalesOrder OrderDate=\"2013-03-22\" CustomerID=\"57\"\nOrderID=\"4107\">\n\
    \    <LineItem StockItemID=\"153\" Quantity=\"40\" UnitPrice=\"4.50\" />\n   \
    \ <LineItem StockItemID=\"36\" Quantity=\"9\" UnitPrice=\"13.00\" />\n    <LineItem\
    \ StockItemID=\"208\" Quantity=\"108\" UnitPrice=\"2.70\" />\n  </SalesOrder>\n\
    </SalesOrders>' ;\n\nSELECT @Example ;\n```"
