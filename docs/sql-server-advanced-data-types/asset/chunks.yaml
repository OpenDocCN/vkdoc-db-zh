  trans: "\n# 通过证书解密\n\n`PasswordCert`\nWITH PASSWORD = 'MySecurePa$$word' ;\n\n--加密密码并将其插入表中\n\
    \n```sql\nINSERT INTO dbo.Passwords\nSELECT ENCRYPTBYKEY(KEY_GUID('PasswordKey'),\
    \ 'Pa$$w0rd') ;\n```\n\n--解密并读取密码\n\n--结果集中的第一列显示了解密后的密码值，但仍为二进制格式\n\n--结果集中的第二列显示了解密后并转换回字符串的密码\n\
    \n```sql\nSELECT\n    DECRYPTBYKEY(Password) AS 'Decrypted Password In Binary'\n\
    \    , CAST(DECRYPTBYKEY(Password) AS CHAR(8)) AS 'Decrypted Password As Character\
    \ String'\nFROM dbo.Passwords\n--关闭对称密钥\nCLOSE SYMMETRIC KEY PasswordKey ;\n```\n\
    \n![](img/index-29_1.jpg)\n\n# 第 1 章 SQL Server 数据类型\n\n针对清单 1-5 中创建的表执行 SELECT\
    \ 语句的结果如图 1-3 所示。\n\n**图 1-3.** 将二进制数据转换为字符串的结果\n\n## 日期和时间\n\nSQL Server 可以存储准确的日期和时间信息，包括\
    \ UTC 偏移量。每种支持的日期和时间数据类型的详细信息见表 1-6。\n\n**表 1-6.** 日期和时间数据类型\n\n| 数据类型 | 描述 |\
    \ 存储大小 | 精度 |\n| :--- | :--- | :--- | :--- |\n| `DATE` | 存储一个日期 | 3 字节 | 1 天 |\n\
    | `TIME` | 存储一天中的时间 | 取决于小数秒精度：<br>• 0-2 – 3 字节<br>• 3-4 – 4 字节<br>• 5-7 – 5 字节\
    \ | 100 纳秒 |\n| `DATETIME` | 存储日期和时间 | 8 字节 | 四舍五入到 .000, .003 或 .007 秒 |\n| `SMALLDATETIME`\
    \ | 存储日期和时间，精确到分钟 | 4 字节 | 1 分钟 |\n| `DATETIME2` | 存储带小数秒的日期和时间。使用时可以指定小数秒精度，最大为\
    \ 7。如果省略，默认为 7。 | 取决于小数秒精度：<br>• 0-2 – 6 字节<br>• 3-4 – 7 字节<br>• 5-7 – 8 字节 |\
    \ 100 纳秒 |\n| `DATETIMEOFFSET` | 存储带时区感知的日期和时间。存储日期和时间时，可以指定小数秒精度，最大为 7。如果省略，默认为\
    \ 7。可以传递 -14 到 +14 的 UTC 偏移量。 | 10 字节 | 100 纳秒 |\n\n表 1-7 详细列出了使用 `CONVERT` 函数时，日期和时间数据类型允许的样式选项。\n\
    \n**表 1-7.** 日期和时间样式\n\n| 样式代码 | 标准 | 输入/输出 |\n| :--- | :--- | :--- |\n| 0 或 100\
