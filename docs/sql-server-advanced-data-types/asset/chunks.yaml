    ## Figure 8-5. Results of using OPENJSON() with an explicit schema


    A slight complexity arises when one of the columns returned is a JSON object.
    For example, consider the query in Listing 8-7 which adds the `OtherLanguages`
    column to the query. As there is no specific JSON data type, we will use `NVARCHAR(MAX)`,
    as it can be stored as `NVARCHAR(MAX)` in a table.


    ### Listing 8-7. Adding a JSON Column


    ```sql

    DECLARE @CustomFields NVARCHAR(MAX) ;


    SET @CustomFields =


    (


    SELECT


    CustomFields


    FROM Application.People


    WHERE PersonID = 2


    ) ;


    SELECT *


    FROM OPENJSON(@CustomFields)


    WITH (


    OtherLanguages NVARCHAR(MAX)


    , HireDate DATETIME2


    , Title NVARCHAR(50)


    , PrimarySalesTerritory NVARCHAR(50)


    , CommissionRate DECIMAL(5,2)


    ) ;

    ```


    This query returns the results shown in Figure 8-6.


    ### Figure 8-6. Results of adding a JSON column


    So why has the `OtherLanguages` column returned `NULL`? We know that the column
    exists, and that it contains data for `PersonID` 2, owing to the previous examples
    in this chapter. When returning a JSON object from `OPENJSON()`, we must use additional
    syntax in the `WITH` clause, to specify that the `NVARCHAR` actually represents
    a JSON object, as demonstrated in Listing 8-8.


    ### Listing 8-8. Correctly Returning a JSON Array or Object


    ```sql

    DECLARE @CustomFields NVARCHAR(MAX) ;


    SET @CustomFields =


    (


    SELECT


    CustomFields


    FROM Application.People


    WHERE PersonID = 2


    ) ;


    SELECT *


    FROM OPENJSON(@CustomFields)


    WITH (


    OtherLanguages NVARCHAR(MAX) AS JSON


    , HireDate DATETIME2


    , Title NVARCHAR(50)


    , PrimarySalesTerritory NVARCHAR(50)


    , CommissionRate DECIMAL(5,2)


    ) ;

    ```


    The script will now return the results that we expect, as shown in Figure 8-7.


    ### Figure 8-7. Correctly returning JSON data


    When you must shred multiple rows, an explicit schema can also be specified, when
    using the `OUTER APPLY` operator. Remember that the `OUTER APPLY` operator will
    not remove rows that return `NULL` values, in the way that `CROSS APPLY` does.
    This is demonstrated in Listing 8-9.


    ### Listing 8-9. Using an Explicit Schema with OUTER APPLY


    ```sql

    SELECT


    PersonID


    , FullName


    , JSON.*


    FROM Application.People


    OUTER APPLY OPENJSON(CustomFields)


    WITH (


    OtherLanguages


    NVARCHAR(MAX) AS JSON


    , HireDate DATETIME2


    , Title NVARCHAR(50)


    , PrimarySalesTerritory


    NVARCHAR(50)


    , CommissionRate


    DECIMAL(5,2)


    ) JSON ;

    ```


    As you can see from the partial results in Figure 8-8, some of the need-to-pivot
    data has been eliminated. The issue remains, however, that you must know every
    possible key in the JSON document before the query is written. Therefore, if there
    is not a discrete set of possible values, you may still be required to use dynamic
    SQL.


