  trans: "\n# 第四章 查询与分解 XML\n\n**图 4-2.** 使用`value()`方法的结果\n\n`value()`方法也可用于对表进行操作，从每一行中提取值。例如，清单\
    \ 4-5 中的脚本可用于从`Sales.CustomerOrderSummary`表的每一行中提取客户名称。\n\n![](img/index-132_1.jpg)\n\
    \n**清单 4-5.** 对表使用`value()`方法\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n\
    \    CustomerID\n    , OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\nFROM Sales.CustomerOrderSummary\
    \ ;\n```\n\n该查询的部分结果可在图 4-3 中找到。\n\n**图 4-3.** 对表使用`value()`方法的结果\n\n`value()`方法也可用于查询的`WHERE`子句中。\n\
    \n例如，清单 4-6 中的查询在功能上等同于清单 4-5 中的查询。它只是使用`value()`方法重写了，而不是使用`exist()`方法。\n\n**清单\
    \ 4-6.** 使用`value()`方法筛选表\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    CustomerID\n\
    \    , OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\nWHERE\
    \ OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]',\
    \ 'nvarchar(100)') = 'Tailspin Toys (Absecon, NJ)' ;\n```\n\n## 使用 `query()`\n\
    \n`query()`方法用于从 XML 文档返回一个未类型化的 XML 文档。例如，考虑清单 4-7 中的脚本。该查询将以 XML 格式从 XML 文档中提取产品详细信息。\n\
    \n**清单 4-7.** 提取产品详细信息\n\n```sql\nDECLARE @SalesOrders XML ;\nSET @SalesOrders\
    \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers\
    \ CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks\
    \ 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n    \
    \    </Product>\n    </Customers>\n</SalesOrder>' ;\nSELECT @SalesOrders.query('/SalesOrder/Customers/Product')\
    \ AS\nProductDetails ;\n```\n\n![](img/index-134_1.jpg)\n\n此查询的结果如图 4-4 所示。\n\n\
    **图 4-4.** 提取产品详细信息的结果\n\n要了解在查询表时如何使用`query()`方法，请考虑清单 4-8 中的脚本。此查询使用了迄今为止讨论的所有\
    \ XQuery 方法。`value()`方法用于提取客户名称和订单 ID，而`query()`方法用于提取所订购产品的详细信息。该表使用`exist()`方法进行筛选。\n\
    \n**清单 4-8.** 对表使用`query()`、`value()`和`exist()`\n\n```sql\nUSE WideWorldImporters\n\
    GO\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq \"Tailspin Toys (Absecon, NJ)\"]') = 1 ;\n```\n\
    \n![](img/index-135_1.jpg)\n\n此查询返回的结果如图 4-5 所示。\n\n**图 4-5.** 对表使用`query()`、`value()`和`exist()`的结果\n\
    \n## 在 XQuery 中使用关系值\n\n来自 T-SQL 变量和列的关系值也可以传递到 XQuery 表达式中。它们可以用于筛选甚至构造数据，但它们是只读的。因此，不能使用\
    \ XQuery 表达式来修改关系变量或列值。\n\n要查看此功能的实际操作，请考虑清单 4-9 中的查询。\n\n该查询在功能上等同于清单 4-7 中的查询。然而，这次我们没有使用硬编码的客户名称筛选器，而是从\
    \ T-SQL 变量传入。使用 T-SQL 变量或表中列的查询被称为跨域查询。\n\n**清单 4-9.** 参数化`exist()`方法\n\n```sql\n\
    USE WideWorldImporters\nGO\nDECLARE @CustomerName NVARCHAR(100) ;\nSET @CustomerName\
    \ = 'Tailspin Toys (Absecon, NJ)' ;\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
    \nT-SQL 变量也可用于构造 XML。\n\n例如，清单 4-10 中的脚本在结果集中生成一个新列，其中包含一个 XML 片段。此片段有一个名为`CustomerDetails`的元素。在此元素中，您会注意到一个名为`GoldCustomer`的属性。这是一个从\
    \ T-SQL 变量配置的标志。\n\n请注意，当在`query()`方法中使用时，我们将`sql:variable`语句放在双引号和大括号内。\n\n**清单\
    \ 4-10.** 构造 XML 片段并从 T-SQL 变量传递值\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE\
    \ @Gold NVARCHAR(3)\nDECLARE @CustomerName NVARCHAR(100)\nSET @Gold = 'Yes'\n\
    SET @CustomerName = 'Tailspin Toys (Absecon, NJ)'\n\nSELECT\n    OrderSummary\n\
    \    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]',\
    \ 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails>GoldCustomer\
    \ =\n    \"{ sql:variable(\"@Gold\") }\" </CustomerDetails>') AS\n    CustomerDetails\n\
    FROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
    \n此查询的结果可在图 4-6 中找到。生成的 XML 片段可在`CustomerDetails`列中找到。\n\n![](img/index-137_1.jpg)\n\
    \n**图 4-6.** 构造 XML 片段并从 T-SQL 变量传递值的结果\n\n当 XQuery 表达式针对表中的 XML 列运行时，存储在其他列中的关系数据也可以传递到\
    \ XQuery 表达式。例如，清单 4-11 中的脚本扩展了生成的`CustomerDetails` XML 片段，以包含来自`Sales.CustomerOrderSummary`表的`CustomerID`列的客户\
    \ ID。\n\n**清单 4-11.** 使用关系列构造 XML 片段\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE\
    \ @Gold NVARCHAR(3)\nDECLARE @CustomerName NVARCHAR(100)\nSET @Gold = 'Yes'\n\
    SET @CustomerName = 'Tailspin Toys (Absecon, NJ)'\nSELECT\n    OrderSummary\n\
    \    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]',\
    \ 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails>\
    \ CustomerID =\n    \"{ sql:column(\"CustomerID\") }\" GoldCustomer =\n    \"\
    { sql:variable(\"@Gold\") }\" </CustomerDetails>') As CustomerDetails\nFROM Sales.CustomerOrderSummary\n\
    WHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n    CustomerName[(text()[1])\
    \ eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\n![](img/index-139_1.jpg)\n"
- fmt: '# ChAPTeR 4 QueRyIng AnD ShReDDIng XML


    ## FLWOR


    The results of this query can be seen in Figure [4-7](#index_split_001.html#p139).
    Once again, pay attention to the `CustomerDetails` column, to see the resultant
    XML fragment.


    ### Figure 4-7. Results of constructing an XML fragment using a relational column


    As previously mentioned, `FLWOR` stands for `for`, `let`, `where`, `order by`,
    and `return`. These statements provide granular control, allowing a developer
    to navigate to, iterate over, filter, and present XML nodes exactly as required.


    The `for` statement binds a variable to an input sequence. The `let` statement
    is used to assign an XQuery expression to a variable, for use within an iteration
    of `FOR`. The expression can return either atomic values or a sequence of nodes.
    The `let` statement is optional. The `where` statement is also optional but can
    be used to filter the results that are returned. The `order by` statement can
    be used optionally to order the results of the `FLWOR` statement. The mandatory
    `return` statement specifies what data will be returned.


    For example, consider the XML document in Listing [4-12](#index_split_001.html#p140).
    This XML document contains the first two orders from the XML document returned
    by the `OrderSummary` column in Listing [4-11](#index_split_001.html#p138).


    ### Listing 4-12. XML Document for FLWOR Examples


    ```xml

    DECLARE @XML XML = N''<SalesOrders>

    <Order>

    <OrderHeader>

    <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>

    <OrderDate>2013-01-17</OrderDate>

    <OrderID>950</OrderID>

    </OrderHeader>

    <OrderDetails>

    <Product ProductID="119" ProductName="Dinosaur battery-powered slippers (Green)
    M" Price="32.00" Qty="2" />

    <Product ProductID="61" ProductName="RC toy sedan car with remote control (Green)
    1/50 scale" Price="25.00" Qty="2" />

    <Product ProductID="194" ProductName="Black and orange glass with care despatch
    tape 48mmx100m" Price="4.10" Qty="216" />

    <Product ProductID="104" ProductName="Alien officer hoodie (Black) 3XL" Price="35.00"
    Qty="2" />

    </OrderDetails>

    </Order>

    <Order>

    <OrderHeader>

    <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>

    <OrderDate>2013-01-29</OrderDate>

    <OrderID>1452</OrderID>

    </OrderHeader>

    <OrderDetails>

    <Product ProductID="33" ProductName="Developer joke mug - that''s a hardware problem
    (Black)" Price="13.00" Qty="9" />

    <Product ProductID="121" ProductName="Dinosaur battery-powered slippers (Green)
    XL" Price="32.00" Qty="1" />

    </OrderDetails>

    </Order>

    </SalesOrders>''

    ```


    If we wanted to iterate over each `Product` element within the second order, we
    could use the `FOR` statement as follows in Listing [4-13](#index_split_001.html#p141).
    Note that we use an internal variable, which we name `$product`, and the `in`
    keyword to designate the path to the `ProductName` attribute. This approach and
    syntax will be familiar to those of you who have worked with `foreach` loops in
    languages such as PowerShell.


    The `return` statement is then used to append the `ProductName` attribute’s value
    to the end of the `$product` string. Note that we use `[2]` in square brackets,
    to denote that we are interested in the second order, which will be a singleton
    element (albeit a complex element containing multiple other elements).


    **Caution** The following code examples in this section expect a variable called
    `XML` to be declared that contains the XML document in Listing [4-12.](#index_split_001.html#p140)
    For space reasons, this variable is not explicitly declared or set within each
    code example.


    ### Listing 4-13. Using for to Iterate over Product Elements


    ```sql

    SELECT @XML.query(''

    for $product in /SalesOrders/Order[2]/OrderDetails/Product/@ProductName

    return string($product)

    '') ;

    ```


    ![](index-142_1.jpg)

    ![](index-142_2.jpg)


    The results of this query are illustrated in Figure [4-8.](#index_split_001.html#p142)'
