  trans: "© Peter A. Carter 2018\n\nP. A. Carter，《SQL Server 高级数据类型》，\n\n`doi.org/10.1007/978-1-4842-3901-8_7`\n\
    \n![](img/index-213_1.jpg)\n\n# 第 7 章 从 T-SQL 构建 JSON\n\n```sql\nSELECT\n    OrderID\n\
    \    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\nFROM Sales.Orders\n\
    WHERE CustomerID = 1060 ;\n```\n\n此查询返回的结果如图 7-1 所示。\n\n图 7-1. 销售订单的键和日期结果\n\n\
    如果我们希望以 JSON 格式返回这些结果，可以附加`FOR JSON`子句，如代码清单 7-2 所示。\n\n## 代码清单 7-2. 以 JSON 格式返回结果\n\
    \n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    OrderID\n    , CustomerID\n\
    \    , SalespersonPersonID\n    , OrderDate\nFROM Sales.Orders\nWHERE CustomerID\
    \ = 1060\nFOR JSON AUTO ;\n```\n\n此查询将产生如代码清单 7-3 所示的结果。\n\n## 代码清单 7-3. 以 JSON\
    \ 格式返回数据的结果\n\n```json\n[\n    {\n        \"OrderID\": 72646,\n        \"CustomerID\"\
    : 1060,\n        \"SalespersonPersonID\": 14,\n        \"OrderDate\": \"2016-05-18\"\
    \n    },\n    {\n        \"OrderID\": 72738,\n        \"CustomerID\": 1060,\n\
    \        \"SalespersonPersonID\": 14,\n        \"OrderDate\": \"2016-05-19\"\n\
    \    },\n    {\n        \"OrderID\": 72916,\n        \"CustomerID\": 1060,\n \
    \       \"SalespersonPersonID\": 6,\n        \"OrderDate\": \"2016-05-20\"\n \
    \   },\n    {\n        \"OrderID\": 73081,\n        \"CustomerID\": 1060,\n  \
    \      \"SalespersonPersonID\": 8,\n        \"OrderDate\": \"2016-05-24\"\n  \
    \  }\n]\n```\n\n## 使用根节点\n\n由于我们的结果没有根节点，文档周围必须有一个数组包装器（以方括号的形式）。如果我们不希望结果被方括号包围，可以通过修改查询来移除它们，如代码清单\
    \ 7-4 所示。\n\n### 代码清单 7-4. 移除数组包装器\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n\
    \    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\nFROM\
    \ Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO, WITHOUT_ARRAY_WRAPPER\
    \ ;\n```\n\n这个修改后的查询将返回如代码清单 7-5 所示的结果。\n\n### 代码清单 7-5. 没有数组包装器的结果\n\n```json\n\
    {\n    \"OrderID\": 72646,\n    \"CustomerID\": 1060,\n    \"SalespersonPersonID\"\
    : 14,\n    \"OrderDate\": \"2016-05-18\"\n},\n{\n    \"OrderID\": 72738,\n   \
    \ \"CustomerID\": 1060,\n    \"SalespersonPersonID\": 14,\n    \"OrderDate\":\
    \ \"2016-05-19\"\n},\n{\n    \"OrderID\": 72916,\n    \"CustomerID\": 1060,\n\
    \    \"SalespersonPersonID\": 6,\n    \"OrderDate\": \"2016-05-20\"\n},\n{\n \
    \   \"OrderID\": 73081,\n    \"CustomerID\": 1060,\n    \"SalespersonPersonID\"\
    : 8,\n    \"OrderDate\": \"2016-05-24\"\n}\n```\n\n或者，我们可以通过为文档添加一个根节点来解决这个问题。这可以通过使用代码清单\
    \ 7-6 所示的修改后的查询来实现，这将导致一个名为`SalesOrders`的根节点被添加到结果文档中。\n\n**注意** `ROOT`和`WITHOUT_ARRAY_WRAPPER`彼此不兼容。尝试同时使用两者将导致查询生成错误。\n\
    \n### 代码清单 7-6. 添加根节点\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    OrderID\n\
    \    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\nFROM Sales.Orders\n\
    WHERE CustomerID = 1060\nFOR JSON AUTO, ROOT('SalesOrders') ;\n```\n\n此查询产生了如代码清单\
    \ 7-7 所示的结果。\n\n### 代码清单 7-7. 添加根节点后的结果\n\n```json\n{\n    \"SalesOrders\": [\n\
    \        {\n            \"OrderID\": 72646,\n            \"CustomerID\": 1060,\n\
    \            \"SalespersonPersonID\": 14,\n            \"OrderDate\": \"2016-05-18\"\
    \n        },\n        {\n            \"OrderID\": 72738,\n            \"CustomerID\"\
    : 1060,\n            \"SalespersonPersonID\": 14,\n            \"OrderDate\":\
    \ \"2016-05-19\"\n        },\n        {\n            \"OrderID\": 72916,\n   \
    \         \"CustomerID\": 1060,\n            \"SalespersonPersonID\": 6,\n   \
    \         \"OrderDate\": \"2016-05-20\"\n        },\n        {\n            \"\
    OrderID\": 73081,\n            \"CustomerID\": 1060,\n            \"SalespersonPersonID\"\
    : 8,\n            \"OrderDate\": \"2016-05-24\"\n        }\n    ]\n}\n```\n\n\
    ## 处理 NULL 值\n\n如果我们的数据集返回了`NULL`值会怎样？考虑代码清单 7-8 中的示例，其中`Comments`列已被添加到`SELECT`列表中。\n\
    \n### 代码清单 7-8. 向 SELECT 列表中添加 Comments\n\n```sql\nUSE WideWorldImporters\nGO\n\
    SELECT\n    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n\
    \    , Comments\n```"
- fmt: "# Chapter 7: Constructing JSON from T-SQL\n\n## Handling NULL Values in JSON\
    \ Output\n\n让我们考虑以下查询：\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    OrderID\n\
    \    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n    , Comments\n\
    FROM Sales.Orders\nWHERE CustomerID = 1060;\n```\n\n此查询的结果如图 [7-2](#index_split_002.html#p219)\
    \ 所示。\n\n**图 7-2.** 添加注释后的查询结果\n\n你会注意到返回的订单都没有关联的注释。让我们通过列表 [7-9](#index_split_002.html#p219)\
    \ 中的查询来看看这对 JSON 有什么影响。\n\n**列表 7-9.** 添加了 NULL 注释的 JSON 查询\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    ,\
    \ OrderDate\n    , Comments\nFROM Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON\
    \ AUTO, ROOT('SalesOrders');\n```\n\n此查询的结果可以在列表 [7-10](#index_split_002.html#p220)\
    \ 中找到。\n\n**列表 7-10.** 包含 NULL 注释的 JSON 结果\n\n```json\n{\n  \"SalesOrders\": [\n\
    \    {\n      \"OrderID\": 72646,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-18\"\n    },\n    {\n      \"OrderID\":\
    \ 72738,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\": 14,\n  \
    \    \"OrderDate\": \"2016-05-19\"\n    },\n    {\n      \"OrderID\": 72916,\n\
    \      \"CustomerID\": 1060,\n      \"SalespersonPersonID\": 6,\n      \"OrderDate\"\
    : \"2016-05-20\"\n    },\n    {\n      \"OrderID\": 73081,\n      \"CustomerID\"\
    : 1060,\n      \"SalespersonPersonID\": 8,\n      \"OrderDate\": \"2016-05-24\"\
    \n    }\n  ]\n}\n```\n\n你可以看到，默认行为是从结果集中忽略任何值为 `NULL` 的名称/值对。然而，我们可以通过使用 `INCLUDE_NULL_VALUES`\
    \ 选项来改变这一行为，如列表 [7-11](#index_split_002.html#p221) 所示。\n\n**列表 7-11.** 在结果中包含\
    \ `NULL` 值\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    OrderID\n    ,\
    \ CustomerID\n    , SalespersonPersonID\n    , OrderDate\n    , Comments\nFROM\
    \ Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO, ROOT('SalesOrders'), INCLUDE_NULL_VALUES;\n\
    ```\n\n此查询的结果可以在列表 [7-12](#index_split_002.html#p221) 中找到。你会注意到，这一次，值为 `NULL`\
    \ 的名称/值对已被包含在结果中。\n\n**列表 7-12.** 包含 `NULL` 值的结果\n\n```json\n{\n  \"SalesOrders\"\
    : [\n    {\n      \"OrderID\": 72646,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-18\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 72738,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-19\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 72916,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 6,\n      \"OrderDate\": \"2016-05-20\",\n      \"Comments\": null\n    },\n\
    \    {\n      \"OrderID\": 73081,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 8,\n      \"OrderDate\": \"2016-05-24\",\n      \"Comments\": null\n    }\n\
    \  ]\n}\n```\n\n## Using Column Aliases\n\n在考虑 JSON 输出格式时，也可以使用列别名，如列表 [7-13](#index_split_002.html#p223)\
    \ 所示。\n\n**列表 7-13.** 使用列别名\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n\
    \    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n \
    \   , Comments AS 'Orders Comments'\nFROM Sales.Orders\nWHERE CustomerID = 1060\n\
    FOR JSON AUTO, ROOT('SalesOrders'), INCLUDE_NULL_VALUES;\n```\n\n此查询返回的结果如列表 [7-14](#index_split_002.html#p223)\
    \ 所示。\n\n**列表 7-14.** 使用列别名的结果\n\n```json\n{\n  \"SalesOrders\": [\n    {\n  \
    \    \"OrderID\": 72646,\n      \"CustomerID\": 1060,\n      \"SalespersonPersonID\"\
    : 14,\n      \"OrderDate\": \"2016-05-18\",\n      \"Orders Comments\": null\n\
    \    },\n    {\n      \"OrderID\": 72738,\n      \"CustomerID\": 1060,\n     \
    \ \"SalespersonPersonID\": 14,\n      \"OrderDate\": \"2016-05-19\",\n      \"\
    Orders Comments\": null\n    },\n    {\n      \"OrderID\": 72916,\n      \"CustomerID\"\
    : 1060,\n      \"SalespersonPersonID\": 6,\n      \"OrderDate\": \"2016-05-20\"\
    ,\n      \"Orders Comments\": null\n    },\n    {\n      \"OrderID\": 73081,\n\
    \      \"CustomerID\": 1060,\n      \"SalespersonPersonID\": 8,\n      \"OrderDate\"\
    : \"2016-05-24\",\n      \"Orders Comments\": null\n    }\n  ]\n}\n```\n\n你会注意到，`comments`\
    \ 键现在使用的是名称 `Orders Comments`，而不是 `Comments`。如果你使用点分隔的别名，这种行为同样适用，如列表 [7-15](#index_split_002.html#p225)\
    \ 中的示例。\n\n**列表 7-15.** 使用点分隔的别名\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n\
    \    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n \
    \   , Comments AS 'Orders.Comments'\nFROM Sales.Orders\nWHERE CustomerID = 1060\n\
    FOR JSON AUTO, ROOT('SalesOrders'), INCLUDE_NULL_VALUES;\n```"
