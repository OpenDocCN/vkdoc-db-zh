  trans: "\n## 第 4 章 查询与解析 XML\n\ninsert `<Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />`\n\ninto `(/Order/OrderDetails)[1]')`\
    \ ;\n\n`SELECT @SalesOrder` ;\n\n执行此查询的结果可以在清单 4-19 中查看。\n\n### 清单 4-19. 使用 modify\
    \ Insert 的结果\n\n```xml\n<Order>\n    <OrderHeader>\n        <CustomerName>Camille\
    \ Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n\
    \    </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n\
    </Order>\n```\n\n但是，如果`OrderDetails`元素中已经存在`Product`元素，您可以通过使用`as first`、`as last`、`before`或`after`选项来精细控制元素的插入位置。例如，清单\
    \ 4-20 中的查询将把新的`Product`元素作为`OrderDetails`元素中的第一个元素插入。\n\n### 清单 4-20. 将元素作为第一个插入\n\
    \n```sql\nDECLARE @SalesOrder xml;\nSET @SalesOrder = '\n<Order>\n    <OrderHeader>\n\
    \        <CustomerName>Camille Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n\
    \        <OrderID>121</OrderID>\n    </OrderHeader>\n    <OrderDetails>\n    \
    \    <Product ProductID=\"22\" ProductName=\"DBA joke mug - it depends (White)\"\
    \ Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n</Order>' ;\n\nSET @SalesOrder.modify('\n\
    insert <Product ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"\
    25\" Qty=\"9\" /> as first\ninto (/Order/OrderDetails)[1]') ;\n\nSELECT @SalesOrder\
    \ ;\n```\n\n此查询的结果可以在清单 4-21 中查看。\n\n### 清单 4-21. 将元素作为第一个插入的结果\n\n```xml\n<Order>\n\
    \    <OrderHeader>\n        <CustomerName>Camille Authier</CustomerName>\n   \
    \     <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n    </OrderHeader>\n\
    \    <OrderDetails>\n        <Product ProductID=\"2\" ProductName=\"USB rocket\
    \ launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n        <Product ProductID=\"22\"\
    \ ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n\
    \    </OrderDetails>\n</Order>\n```\n\n或者，清单 4-22 中的查询演示了如何在另一个特定元素之后插入元素。在本例中，我们将在\
    \ USB 火箭发射器之后插入超级英雄行动夹克。\n\n### 清单 4-22. 在另一个元素之后插入元素\n\n```sql\nDECLARE @SalesOrder\
    \ xml;\nSET @SalesOrder = '\n<Order>\n    <OrderHeader>\n        <CustomerName>Camille\
    \ Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n\
    \    </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n        <Product ProductID=\"\
    22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\"\
    \ />\n    </OrderDetails>\n</Order>' ;\n\nDECLARE @ProductName NVARCHAR(200) ;\n\
    SET @ProductName = 'USB rocket launcher (Gray)' ;\n\nSET @SalesOrder.modify('\n\
    insert <Product ProductID=\"111\" ProductName=\"Superhero action jacket (Blue)\
