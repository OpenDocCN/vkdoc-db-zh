    \n# Chapter 11 Working with Spatial Data\n\n## Constructing Spatial Data\n\nThe\
    \ `GEOMETRY` and `GEOGRAPHY` data types expose a number of methods that can be\
    \ used to interact with spatial data. Many of these methods form part of Open\
    \ Geospatial Consortium (OGC) standards, while others are an extension of that\
    \ standard. Table 11-1 details the methods that can be used for constructing geometries,\
    \ all of which are from OGC specifications and are exposed through both `GEOMETRY`\
    \ and `GEOGRAPHY`.\n\n***Table 11-1.** Methods for Constructing Geometries*\n\n\
    **Spatial Type** | **From WKT** | **From WKB**\n--- | --- | ---\nPoint | `STPointFromText`\
    \ | `STPointFromWKB`\nLineString | `STLineFromText` | `STLineFromWKB`\nPolygon\
    \ | `STPolyFromText` | `STPolyFromWKB`\nAny Primitive Spatial Instance | `STGeomFromText`\
    \ | `STGeomFromWKB`\nMultiPoint | `STMPointFromText` | `STMPointFromWKB`\nMultiLineString\
    \ | `STMLineFromText` | `STMLineFromWKB`\nMultiPolygon | `STMPolyFromText` | `STMPolyFromWKB`\n\
    Any Multi Spatial Instance | `STMGeomCollFromText` | `STMGeomCollFromWKB`\n\n\
    Each of these methods accepts two parameters. The first parameter is the well-known\
    \ text (WKT) or well-known binary (WKB) of the spatial instance. The second parameter\
    \ is the SRID (please refer to Chapter 10 for further details on SRIDs) that the\
    \ spatial instance should use. When called against a column or variable of type\
    \ `GEOMETRY`, `0` can be passed as the SRID, as map projections are not required\
    \ in a Euclidean model (see Chapter 10).\n\nWhen called against a column or variable\
    \ of type `GEOGRAPHY`, however, a valid SRID must be used, and passing `0` will\
    \ result in an error being thrown by the .NET framework.\n\n![](index-310_1.jpg)\n\
    \n# Chapter 11 Working with Spatial Data\n\nThe script in Listing 11-1 will create\
    \ a `LineString` in a variable of type `GEOMETRY`, by using well-known-text.\n\
    \n***Listing 11-1.*** Creating a LineString with Well-Known Text\n```sql\nDECLARE\
    \ @LineString GEOMETRY ;\nSET @LineString = GEOMETRY::STLineFromText('LINESTRING(0\
    \ 0, 4.5 5, 4.5 0, 0 0)', 0)\nSELECT @LineString ;\n```\nThe graphical results\
    \ of this script can be found in Figure 11-1.\n\n***Figure 11-1.** Results of\
    \ creating a LineString from WKT*\n\nAlternatively, the same spatial instance\
    \ could be created with WKB, by using the script in Listing 11-2.\n\n# Chapter\
    \ 11 Working with Spatial Data\n\n***Listing 11-2.*** Creating a LineString from\
    \ a Well-Known Binary\n```sql\nDECLARE @LineString GEOMETRY ;\nSET @LineString\
    \ = GEOMETRY::STLineFromWKB(0x010200000004000000000000, 0);\nSELECT @LineString\
    \ ;\n```\n\n**Tip** An additional extended method exists for constructing geometries.\
    \ `GeomFromGML` allows you to instantiate an object, based on the Geography Markup\
    \ Language (GML). For example, the script in Listing 11-3 will create a `LineString`\
    \ from GML. A full discussion of GML is beyond the scope of this book, but the\
    \ OGC specification can be found at [www.opengeospatial.org/standards/gml](http://www.opengeospatial.org/standards/gml).\n\
    \n***Listing 11-3.*** Creating a LineString from GML\n```sql\nDECLARE @LineString\
