    ## Figure 2-1. Aspects of an XML document\n\nThere are several things to note\
    \ when looking at this XML document.\n\nFirst, elements begin with the element\
    \ name, encapsulated within angle brackets. They end with the element name, preceded\
    \ by a backslash and enclosed in angle brackets. Any elements that fall between\
    \ these two tags are child elements of the tag.\n\nAttributes are enclosed in\
    \ double quotation marks and reside within the beginning tag of an element. For\
    \ example, `OrderID` is an attribute of the `<SalesOrder>` element.\n\nIt is acceptable\
    \ to have repeating elements. You can see that `<SalesOrder>` is a repeating element,\
    \ as two separate sales orders are stored in this XML document. The `<SalesOrders>`\
    \ element is the document’s root element and is the only element that is not allowed\
    \ to be complex. This means that it cannot have attributes and cannot be repeating.\
    \ Attributes can never repeat within an element. Therefore, if you require a node\
    \ to repeat, you should use a nested element as opposed to an attribute.\n\n```xml\n\
