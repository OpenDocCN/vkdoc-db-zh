    \ (Black) 1/12 scale\"\n     Quantity=\"4\" UnitPrice=\"345.00\" />\n\n<row OrderDate=\"\
    2016-05-18\" CustomerName=\"Agrita Abele\"\n     OrderID=\"72669\" StockItemName=\"\
    10 mm Anti static bubble wrap (Blue) 10m\"\n     Quantity=\"70\" UnitPrice=\"\
    26.00\" />\n\n<row OrderDate=\"2016-05-27\" CustomerName=\"Agrita Abele\"\n  \
    \   OrderID=\"73340\" StockItemName=\"32 mm Double sided bubble wrap 50m\"\n \
    \    Quantity=\"20\" UnitPrice=\"112.00\" />\n\n<row OrderDate=\"2016-05-18\"\
    \ CustomerName=\"Agrita Abele\"\n     OrderID=\"72669\" StockItemName=\"Office\
    \ cube periscope (Black)\"\n     Quantity=\"20\" UnitPrice=\"18.50\" />\n\n<row\
    \ OrderDate=\"2016-05-27\" CustomerName=\"Agrita Abele\"\n     OrderID=\"73356\"\
    \ StockItemName=\"Ride on vintage American toy coupe (Black) 1/12 scale\"\n  \
    \   Quantity=\"10\" UnitPrice=\"285.00\" />\n```\n\n我们应该注意到关于此 XML 实例的第一点是，它是一个\
    \ XML 片段，而不是一个格式良好的 XML 文档，因为它没有根节点。`<row>` 元素不能成为根节点，因为它会重复。这意味着我们无法根据模式来验证 XML。\n\
    \n因此，在使用 `FOR XML` 子句时，你应考虑使用 `ROOT` 关键字。这将强制在文档中创建一个根元素，其名称由你指定。清单 3-4 展示了这一点。\n\
    \n## 清单 3-4：添加根节点\n\n```sql\nSELECT\n    SalesOrder.OrderDate\n    , Customers.CustomerName\n\
    \    , SalesOrder.OrderID\n    , Product.StockItemName\n    , LineItem.Quantity\n\
    \    , LineItem.UnitPrice\nFROM Sales.Orders SalesOrder\nINNER JOIN Sales.OrderLines\
    \ LineItem\n```"
