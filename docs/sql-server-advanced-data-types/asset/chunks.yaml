  trans: "# 第 4 章 查询与分解 XML\n\n## 图 4-8. 使用 for 循环遍历产品元素的结果\n\n清单 4-14 中的查询使用了`let`语句，而非`for`循环迭代，来检索\
    \ XML 文档中第一个订单内的第一个产品的名称。`return`语句要求一个单值，而`let`只是赋值（与迭代多个值相对），因此我们无法返回多个产品。\n\
    \n### 清单 4-14. 使用 let 查找产品名称\n\n```xquery\nSELECT @XML.query('\nlet $product :=\
    \ /SalesOrders/Order[1]/OrderDetails/Product/@ProductName\nreturn string($product[1])\n\
    ') ;\n```\n\n此查询的结果见图 4-9。\n\n## 图 4-9. 使用 let 查找产品名称的结果\n\n清单 4-15 中的查询结合了`for`语句和`let`语句，为每个售出的产品构建一个新的\
    \ XML 文档，其中包含客户名称和产品名称。\n\n### 清单 4-15. 结合使用 for 和 let\n\n```xquery\nSELECT @XML.query('\n\
    for $product in /SalesOrders/Order/OrderDetails/Product/@ProductName\nlet $customer\
    \ := /SalesOrders/Order/OrderHeader/CustomerName\nreturn\n<Customer>\n  {$customer[1]}\n\
    \  <OrderDetails>\n    {$product}\n  </OrderDetails>\n</Customer>\n') ;\n```\n\
    \n生成的 XML 文档见清单 4-16。\n\n### 清单 4-16. 结合使用 for 和 let 的结果\n\n```xml\n<Customer>\n\
    \  <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"\
    恐龙电池动力拖鞋（绿色）M 码\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin Toys (Absecon,\
    \ NJ)</CustomerName>\n  <OrderDetails ProductName=\"遥控玩具轿车（绿色）1/50 比例\" />\n</Customer>\n\
    <Customer>\n  <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails\
    \ ProductName=\"黑色与橙色玻璃注意运送胶带 48mmx100m\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin\
    \ Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"外星军官连帽衫（黑色）3XL\
    \ 码\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>\n\
    \  <OrderDetails ProductName=\"开发者玩笑马克杯 - 那是硬件问题（黑色）\" />\n</Customer>\n<Customer>\n\
    \  <CustomerName>Tailspin Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"\
    恐龙电池动力拖鞋（绿色）XL 码\" />\n</Customer>\n```\n\n清单 4-17 中的查询增强了清单 4-15 中的查询，添加了一个`where`语句来筛选产品，使得只返回恐龙拖鞋。该查询还使用了`order\
    \ by`语句，以确保结果按产品名称排序。\n\n### 清单 4-17. 使用 where 和 order by\n\n```xquery\nSELECT\
    \ @XML.query('\nfor $product in /SalesOrders/Order/OrderDetails/Product/@ProductName\n\
    let $customer := /SalesOrders/Order/OrderHeader/CustomerName\nwhere $product =\
    \ \"恐龙电池动力拖鞋（绿色）M 码\"\n   or $product = \"恐龙电池动力拖鞋（绿色）XL 码\"\norder by $product\n\
    return\n<Customer>\n  {$customer[1]}\n  <OrderDetails>\n    {$product}\n  </OrderDetails>\n\
    </Customer>\n') ;\n```\n\n## 修改 XML 数据\n\n可以使用 XQuery 的`modify`方法修改 XML 数据。使用`modify`时，开发者有三种选项：`insert`选项、`delete`选项或`replace\
    \ value of`选项。`replace value of`选项用于替换 XML 文档中的现有值。\n\n要理解`insert`选项的工作原理，请看清单\
    \ 4-18 中的脚本。该脚本用一个空订单填充变量。然后使用`modify`方法向该销售订单中添加一个订单行。\n\n### 清单 4-18. 使用 modify\
    \ Insert\n\n```xml\nDECLARE @SalesOrder xml;\nSET @SalesOrder = '\n<Order>\n \
    \ <OrderHeader>\n    <CustomerName>Camille Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n\
    \    <OrderID>121</OrderID>\n  </OrderHeader>\n  <OrderDetails>\n  </OrderDetails>\n\
    </Order>' ;\n\nSET @SalesOrder.modify('\n```"
- fmt: "## Chapter 4 Querying and Shredding XML\n\ninsert `<Product ProductID=\"22\"\
    \ ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />`\n\
    \ninto `(/Order/OrderDetails)[1]')` ;\n\n`SELECT @SalesOrder` ;\n\nThe results\
    \ of running this query can be seen in Listing 4-19.\n\n### Listing 4-19. Results\
    \ of Using the modify Insert\n\n```xml\n<Order>\n    <OrderHeader>\n        <CustomerName>Camille\
    \ Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n\
    \    </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n\
    </Order>\n```\n\nIf `Product` elements already existed within the `OrderDetails`\
    \ element, however, you could gain granular control over where you would like\
    \ the element to be inserted by using the `as first`, `as last`, `before`, or\
    \ `after` options. For example, the query in Listing 4-20 will insert the new\
    \ `Product` element as the first element in the `OrderDetails` element.\n\n###\
    \ Listing 4-20. Inserting an Element As First\n\n```sql\nDECLARE @SalesOrder xml;\n\
    SET @SalesOrder = '\n<Order>\n    <OrderHeader>\n        <CustomerName>Camille\
    \ Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n\
    \    </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n\
    </Order>' ;\n\nSET @SalesOrder.modify('\ninsert <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" /> as first\ninto (/Order/OrderDetails)[1]')\
    \ ;\n\nSELECT @SalesOrder ;\n```\n\nThe results of this query can be seen in Listing\
    \ 4-21.\n\n### Listing 4-21. Results of Inserting an Element As First\n\n```xml\n\
    <Order>\n    <OrderHeader>\n        <CustomerName>Camille Authier</CustomerName>\n\
    \        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n \
    \   </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n        <Product ProductID=\"\
    22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\"\
    \ />\n    </OrderDetails>\n</Order>\n```\n\nAlternatively, the query in Listing\
    \ 4-22 demonstrates how you can insert an element after another, specific element.\
    \ In this case, we will insert the Superhero Action Jacket after the USB Rocket\
    \ Launcher.\n\n### Listing 4-22. Inserting an Element After Another Element\n\n\
    ```sql\nDECLARE @SalesOrder xml;\nSET @SalesOrder = '\n<Order>\n    <OrderHeader>\n\
    \        <CustomerName>Camille Authier</CustomerName>\n        <OrderDate>2013-01-02</OrderDate>\n\
    \        <OrderID>121</OrderID>\n    </OrderHeader>\n    <OrderDetails>\n    \
    \    <Product ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"\
    25\" Qty=\"9\" />\n        <Product ProductID=\"22\" ProductName=\"DBA joke mug\
    \ - it depends (White)\" Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n</Order>'\
    \ ;\n\nDECLARE @ProductName NVARCHAR(200) ;\nSET @ProductName = 'USB rocket launcher\
    \ (Gray)' ;\n\nSET @SalesOrder.modify('\ninsert <Product ProductID=\"111\" ProductName=\"\
    Superhero action jacket (Blue) M\" Price=\"30\" Qty=\"10\" />\nafter (/Order/OrderDetails/Product[@ProductName\
    \ = sql:variable(\"@ProductName\")])[1]') ;\n\nSELECT @SalesOrder ;\n```\n\nThis\
    \ query uses `sql:variable` to pass the product’s name from a T-SQL variable,\
    \ using the techniques you learned in the “Using Relational Values in XQuery”\
    \ section of this chapter. The results of the query can be seen in Listing 4-23.\n\
    \n### Listing 4-23. Results of Inserting an Element After Another Element\n\n\
    ```xml\n<Order>\n    <OrderHeader>\n        <CustomerName>Camille Authier</CustomerName>\n\
    \        <OrderDate>2013-01-02</OrderDate>\n        <OrderID>121</OrderID>\n \
    \   </OrderHeader>\n    <OrderDetails>\n        <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n        <Product ProductID=\"\
    111\" ProductName=\"Superhero action jacket (Blue) M\" Price=\"30\" Qty=\"10\"\
    \ />\n        <Product ProductID=\"22\" ProductName=\"DBA joke mug - it depends\
    \ (White)\" Price=\"13\" Qty=\"6\" />\n    </OrderDetails>\n</Order>\n```\n\n\
    The `delete` option can be used to remove nodes from an XML variable or column."
