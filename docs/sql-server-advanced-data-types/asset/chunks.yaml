- fmt: '# Chapter 11: Working with Spatial Data


    ## Table 11-2. Spatial Data Methods


    | Method | Works With | OGC/Extended | Description |

    | :--- | :--- | :--- | :--- |

    | `AsBinaryZM()` | `GEOGRAPHY`, `GEOMETRY` | extended | Converts a spatial instance
    to its WKB representation. |

    | `AsGml()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the GML representation
    of a spatial instance. |

    | `AsTextZM()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the WKT representation
    of a spatial instance. |

    | `BufferWithCurves()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns a polygonal
    approximation of a buffer around a spatial instance. |

    | `BufferWithTolerance()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns a polygonal
    approximation of a buffer around a spatial instance, where the tolerance specifies
    the maximum distance between the original geometry and the approximation. |

    | `CurveToLineWithTolerance()` | `GEOGRAPHY`, `GEOMETRY` | extended | Converts
    a curve to a linestring within a specified tolerance. |

    | `EnvelopeAngle()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the maximum
    angle (in degrees) between the center point of an instance’s bounding circle and
    a point in the geometry. |

    | `EnvelopeCenter()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the center
    of a spatial instance’s bounding circle. |

    | `Filter()` | `GEOGRAPHY`, `GEOMETRY` | extended | Attempts to determine if a
    spatial instance potentially intersects against another spatial instance. Returns
    1 if they may intersect and 0 if they don’t. |

    | `HasM()` | `GEOGRAPHY` only | extended | Returns 1 if an M value exists and
    0 if it does not. Indicates if an M value has been specified for a spatial instance.
    |

    | `HasZ()` | `GEOGRAPHY` only | extended | Returns 1 if a Z value exists and 0
    if it does not. Indicates if a Z value has been specified for a spatial instance.
    |

    | `InstanceOf()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns 1 if the spatial
    instance is of the specified type or 0 if the instance is a different type. |

    | `IsNull()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns 1 if the spatial instance
    is Null. |

    | `IsValidDetailed()` | `GEOGRAPHY`, `GEOMETRY` | extended | Validates a spatial
    instance. If the object is valid, it returns 0. If the object is not valid, it
    returns an error code describing why it is not valid. These error codes and their
    meanings can be found in the documentation. |

    | `Lat()` | `GEOGRAPHY` only | OGC | Returns the latitude of a `POINT`. |

    | `Long()` | `GEOGRAPHY` only | OGC | Returns the longitude of a `POINT`. |

    | `M()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the M value of the spatial
    instance. |

    | `MakeValid()` | `GEOGRAPHY`, `GEOMETRY` | extended | Converts a spatial instance
    that is not well-formed to a well-formed instance. |

    | `MinDbCompatibilityLevel()` | `GEOGRAPHY`, `GEOMETRY` | extended | Returns the
    minimum database compatibility level which provides support for the type of spatial
    instance. |

    | `NumRings()` | `GEOGRAPHY` only | extended | Returns the total number of rings
    within the `POLYGON`. |

    | `Reduce()` | `GEOGRAPHY`, `GEOMETRY` | extended | Runs a Douglas-Peucker algorithm
    against a spatial instance and returns the approximate result that is defined
    by a tolerance. |

    | `ReorientObject()` | `GEOGRAPHY` only | extended | Changes the ring orientation
    of a `POLYGON`. |

    | `RingN()` | `GEOGRAPHY` only | extended | Accepts a single parameter that defines
    a 1-based index. Returns a ring from the spatial instance at the given index number.
    |

    | `ShortestLineTo()` | `GEOGRAPHY`, `GEOMETRY` | extended | Accepts a spatial
    object as a parameter and returns a `LINESTRING` that represents the shortest
    distance between the spatial object that the method is called against and the
    spatial object that is passed as a parameter. |

    | `STArea()` | `GEOGRAPHY`, `GEOMETRY` | OGC | Returns the surface area of an
    instance. |

    | `STAsBinary()` | `GEOGRAPHY`, `GEOMETRY` | OGC | Returns the WKB of an instance.
    |

    | `STAsText()` | `GEOGRAPHY`, `GEOMETRY` | OGC | Returns the WKT of an instance.
    |'
