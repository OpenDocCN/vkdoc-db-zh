    \ nUll |\n| 3 | /2/ | america | nUll | nUll |\n| 4 | /1/1/ | Uk | 3 | 300,000\
    \ |\n| 5 | /1/2/ | Western europe | nUll | nUll |\n| 6 | /1/3/ | eastern europe\
    \ | nUll | nUll |\n| 7 | /2/1/ | Canada | 4 | 350,000 |\n| 8 | /2/2/ | USa | nUll\
    \ | nUll |\n| 9 | /2/3/ | lataM | nUll | nUll |\n| 10 | /1/2/1/ | germany | 3\
    \ | 150,000 |\n| 11 | /1/2/2/ | France | 2 | 100,000 |\n| 12 | /1/3/1/ | hungary\
    \ | 1 | 50,000 |\n| 13 | /1/3/2/ | Slovakia | 2 | 80,000 |\n| 14 | /2/2/1/ | eastern\
    \ | 4 | 140,000 |\n| 15 | /2/2/2/ | Western | 3 | 280,000 |\n| 16 | /2/3/1/ |\
    \ Brazil | 1 | 100,000 |\n| 17 | /2/3/2/ | argentina | 2 | 70,000 |\n| 18 | /2/2/1/1/\
    \ | new york | 2 | 120,000 |\n\nIn Table 12-2, you will notice that the hierarchy\
