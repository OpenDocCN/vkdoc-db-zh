- fmt: '# Chapter 1 SQL Server Data Types


    The script in Listing 1-6 shows how a date and time value will be displayed when
    cast to each of the date and time data types. The script uses the `SYSUTCDATETIME()`
    function to retrieve the current system date and time.


    **Listing 1-6.** Casting a Value to Each of the Date and Time Data Types


    ```sql

    SELECT

    CAST(SYSUTCDATETIME() AS time(7)) AS ''TIME''

    ,CAST(SYSUTCDATETIME() AS date) AS ''DATE''

    ,CAST(SYSUTCDATETIME() AS smalldatetime) AS ''SMALLDATETIME''

    ,CAST(SYSUTCDATETIME() AS datetime) AS ''DATETIME''

    ,CAST(SYSUTCDATETIME() AS datetime2(7)) AS ''DATETIME2''

    ,CAST(SYSUTCDATETIME() AS datetimeoffset(7)) AS ''DATETIMEOFFSET''

    ;

    ```


    The results of running the query in Listing 1-6 can be found in Figure 1-4.


    **Figure 1-4.** Results of casting a value to each date and time data type


    ## Miscellaneous Standard Data Types


    SQL Server offers many other standard data types that can be used for specialized
    purposes. A description of these data types can be found in Table 1-8.


    **Table 1-8.** Miscellaneous Data Types


    | Data Type | Description | Size | Allowable Usage |

    | :--- | :--- | :--- | :--- |

    | `CURSOR` | Stores a cursor with a variable or stored procedure output parameter
    | variable | variable or stored procedure OUTPUT parameter |

    | `TIMESTAMP` | Exposes a system-generated, unique binary value. Used for versioning
    a row within a table | 8 bytes | Table, variable, stored procedure parameter |

    | `UNIQUEIDENTIFIER` | Stored a GUID (Globally Unique Identifier) | 16 bytes |
    Table, variable, stored procedure parameter |

    | `SQL_VARIANT` | Can store data of multiple data types. Can be used when you
    do not know the data type of the data that will be input, but this is a very bad
    practice | variable | Table, variable, stored procedure parameter |

    | `TABLE` | Stores a result set within a variable, to be used at a later time
    | variable | variable |


    The script in Listing 1-7 creates a value of the data type `UNIQUEIDENTIFIER`,
    which has been created using the `NEWID()` system function.


    **Listing 1-7.** Creating a `UNIQUEIDENTIFIER`


    ```sql

    SELECT NEWID();

    ```


    The results of running the query in Listing 1-7 can be found in Figure 1-5.


    **Figure 1-5.** Viewing a `UNIQUEIDENTIFIER` created with `NEWID()`


    ## Summary of Advanced Data Types


    SQL Server provides several advanced data types. These data types will be discussed
    throughout this book, but a summary can be found in Table 1-9.


    **Table 1-9.** Advanced Data Types


    | Data Type | Description |

    | :--- | :--- |

    | `HIERARCHYID` | `HierarchyID` can be used to store hierarchical data, such as
    a BoM (bill of materials) of department structure, in a hexadecimal form. The
    data type exposes numerous methods that allow developers to easily navigate the
    hierarchy. |

    | `XML` | Used to store data in native XML format. FLWOR (discussed in Chapter
    4) statements can then be used against the data. |

    | `JSON` | Stores data in a native JSON format. SQL Server provides functions
    to convert data to and from JSON, extract values from JSON, and modify JSON data.
    |

    | `GEOGRAPHY` | Stores location data, using the round earth model. The data type
    exposes a number of methods that can be used to interact with the geospatial data.
    |

    | `GEOMETRY` | Stores location data, using the flat earth model. The data type
    exposes a number of methods that can be used to interact with the geospatial data.
    |


    The available style options when using the `CONVERT()` function with `XML` data
    are detailed in Table 1-10.


    **Table 1-10.** Style Options for `XML` Data


    | Style Code | Output |

    | :--- | :--- |

    | 0 | The default value. Discards unneeded whitespace and does not allow an internal
    DTD to be created |

    | 1 | preserves all whitespace |

    | 2 | Discards unneeded whitespace but allows limited DTD processing |

    | 3 | preserves whitespace and allows limited DTD processing |


    ## Why Is Using the Correct Data Type Important?'
