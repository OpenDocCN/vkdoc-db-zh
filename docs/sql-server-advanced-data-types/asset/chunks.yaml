    \ XML 文档中是否包含“巧克力鲨鱼 250 克”产品。\n\nXQuery 的第一部分定义了要评估节点的路径，在本例中是 `StockItemName`\
    \ 属性。我们通过在节点名前添加 `@` 符号来定义该节点是一个属性。然后，我们指定 `eq` 作为比较运算符，再提供我们要用来验证节点的值。如果满足条件，`exist()`\
    \ 将返回 `1`。如果不满足条件，则返回 `0`。\n\n***清单 4-2.*** 检查值的存在性\n\n```sql\nDECLARE @SalesOrders\
    \ XML;\nSET @SalesOrders =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\"\
    >\n    <Customers CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"\
    Chocolate sharks 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"\
    8.55\" />\n        </Product>\n    </Customers>\n</SalesOrder>';\n\nSELECT @SalesOrders.exist('SalesOrder/Customers/Product[(@StockItemName)\
    \ eq \"Chocolate sharks 250g\"]');\n```\n\n你可以看到 `exist()` 方法如何轻松地用于 `WHERE` 子句中，针对数据类型为\
    \ `XML` 的列。例如，考虑清单 4-3 中的脚本，它在 `WideWorldImporters` 数据库的 `Sales.CustomerOrderSummary`\
    \ 表的 `WHERE` 子句中使用了 `exist()` 方法，仅返回 Tailspin Toys (Absecon, NJ) 的订单摘要。\n\n你会注意到，因为我们评估的是元素的值，而不是属性，所以我们使用了\
    \ `text()` 方法来提取值。`[1]` 表示将返回一个单例值。\n\n***清单 4-3.*** 使用 `exist()` 方法过滤表\n\n```sql\n\
    SELECT\n    CustomerID,\n    OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\n\
    WHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/CustomerName[(text()[1])\
    \ eq \"Tailspin Toys (Absecon, NJ)\"]') = 1;\n```\n\n# 使用 value()\n\n`value()`\
    \ 方法用于从 XML 文档中提取单个标量值，并将其映射到 SQL Server 数据类型。例如，考虑清单 4-4 中的脚本。该脚本使用了与清单 4-1 相同的\
    \ XML 文档，但这次是从文档中提取客户名称。\n\n与使用 `exist()` 方法时一样，我们必须使用 `@` 符号作为属性的前缀。我们还必须指明将返回一个单例值。\n\
    \n***清单 4-4.*** 使用 `value()` 方法\n\n```sql\nDECLARE @SalesOrders XML;\nSET @SalesOrders\
    \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers\
    \ CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks\
    \ 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n    \
    \    </Product>\n    </Customers>\n</SalesOrder>';\n\nSELECT @SalesOrders.value('(/SalesOrder/Customers/@CustomerName)[1]',\
    \ 'nvarchar(100)') AS CustomerName;\n```\n"
- fmt: "# CHAPTER 4. Querying and Shredding XML\n\n**图 4-2.** 使用`value()`方法的结果\n\n\
    `value()`方法也可以用于对表进行操作，以从每一行中提取值。例如，[清单 4-5](#index_split_001.html#p132)中的脚本可用于从`Sales.CustomerOrderSummary`表的每一行中提取客户名称。\n\
    \n![](index-132_1.jpg)\n\n**清单 4-5.** 对表使用`value()`方法\n\n```sql\nUSE WideWorldImporters\n\
    GO\nSELECT\n    CustomerID\n    , OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\nFROM Sales.CustomerOrderSummary\
    \ ;\n```\n\n此查询的部分结果可在图[4-3](#index_split_001.html#p132)中找到。\n\n**图 4-3.** 对表使用`value()`方法的结果\n\
    \n`value()`方法也可以用在查询的`WHERE`子句中。\n\n例如，[清单 4-6](#index_split_001.html#p133)中的查询在功能上等同于[清单\
    \ 4-5](#index_split_001.html#p132)中的查询。它只是使用`value()`方法重写了，而不是使用`exist()`方法。\n\
    \n**清单 4-6.** 使用`value()`方法筛选表\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n\
    \    CustomerID\n    , OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\n\
    WHERE OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]',\
    \ 'nvarchar(100)') = 'Tailspin Toys (Absecon, NJ)' ;\n```\n\n## Using `query()`\n\
    \n`query()`方法用于从XML文档返回一个未类型化的XML文档。例如，考虑[清单 4-7](#index_split_001.html#p133)中的脚本。该查询将以XML格式从XML文档中提取产品详细信息。\n\
    \n**清单 4-7.** 提取产品详细信息\n\n```sql\nDECLARE @SalesOrders XML ;\nSET @SalesOrders\
    \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers\
    \ CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks\
    \ 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n    \
    \    </Product>\n    </Customers>\n</SalesOrder>' ;\nSELECT @SalesOrders.query('/SalesOrder/Customers/Product')\
    \ AS\nProductDetails ;\n```\n\n![](index-134_1.jpg)\n\n此查询的结果如图[4-4](#index_split_001.html#p134)所示。\n\
    \n**图 4-4.** 提取产品详细信息的结果\n\n要了解在查询表时如何使用`query()`方法，请考虑[清单 4-8](#index_split_001.html#p134)中的脚本。此查询使用了迄今为止讨论的所有XQuery方法。`value()`方法用于提取客户名称和订单ID，而`query()`方法用于提取所订购产品的详细信息。该表使用`exist()`方法进行筛选。\n\
    \n**清单 4-8.** 对表使用`query()`、`value()`和`exist()`\n\n```sql\nUSE WideWorldImporters\n\
    GO\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq \"Tailspin Toys (Absecon, NJ)\"]') = 1 ;\n```\n\
    \n![](index-135_1.jpg)\n\n此查询返回的结果如图[4-5](#index_split_001.html#p135)所示。\n\n**图\
    \ 4-5.** 对表使用`query()`、`value()`和`exist()`的结果\n\n## Using Relational Values in\
    \ XQuery\n\n来自T-SQL变量和列的关系值也可以传递到XQuery表达式中。它们可以用于筛选甚至构造数据，但它们是只读的。因此，不能使用XQuery表达式来修改关系变量或列值。\n\
    \n要查看此功能的实际操作，请考虑[清单 4-9](#index_split_001.html#p135)中的查询。\n\n该查询在功能上等同于[清单 4-7](#index_split_001.html#p133)中的查询。然而，这次我们没有使用硬编码的客户名称筛选器，而是从T-SQL变量传入。使用T-SQL变量或表中列的查询被称为跨域查询。\n\
    \n**清单 4-9.** 参数化`exist()`方法\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE @CustomerName\
    \ NVARCHAR(100) ;\nSET @CustomerName = 'Tailspin Toys (Absecon, NJ)' ;\nSELECT\n\
    \    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
    \nT-SQL变量也可以用于构造XML。\n\n例如，[清单 4-10](#index_split_001.html#p136)中的脚本在结果集中生成一个新列，其中包含一个XML片段。此片段有一个名为`CustomerDetails`的元素。在此元素中，您会注意到一个名为`GoldCustomer`的属性。这是一个从T-SQL变量配置的标志。\n\
    \n请注意，当在`query()`方法中使用时，我们将`sql:variable`语句放在双引号和大括号内。\n\n**清单 4-10.** 构造XML片段并从T-SQL变量传递值\n\
    \n```sql\nUSE WideWorldImporters\nGO\nDECLARE @Gold NVARCHAR(3)\nDECLARE @CustomerName\
    \ NVARCHAR(100)\nSET @Gold = 'Yes'\nSET @CustomerName = 'Tailspin Toys (Absecon,\
    \ NJ)'\n\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails>GoldCustomer\
    \ =\n    \"{ sql:variable(\"@Gold\") }\" </CustomerDetails>') AS\n    CustomerDetails\n\
    FROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
    \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
    \n此查询的结果可在图[4-6](#index_split_001.html#p137)中找到。生成的XML片段可在`CustomerDetails`列中找到。\n\
    \n![](index-137_1.jpg)\n\n**图 4-6.** 构造XML片段并从T-SQL变量传递值的结果\n\n当XQuery表达式针对表中的XML列运行时，存储在其他列中的关系数据也可以传递到XQuery表达式。例如，[清单\
    \ 4-11](#index_split_001.html#p138)中的脚本扩展了生成的`CustomerDetails` XML片段，以包含来自`Sales.CustomerOrderSummary`表的`CustomerID`列的客户ID。\n\
    \n**清单 4-11.** 使用关系列构造XML片段\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE @Gold\
    \ NVARCHAR(3)\nDECLARE @CustomerName NVARCHAR(100)\nSET @Gold = 'Yes'\nSET @CustomerName\
    \ = 'Tailspin Toys (Absecon, NJ)'\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
    \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
    \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails>\
    \ CustomerID =\n    \"{ sql:column(\"CustomerID\") }\" GoldCustomer =\n    \"\
    { sql:variable(\"@Gold\") }\" </CustomerDetails>') As CustomerDetails\nFROM Sales.CustomerOrderSummary\n\
    WHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n    CustomerName[(text()[1])\
    \ eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\n![](index-139_1.jpg)"
