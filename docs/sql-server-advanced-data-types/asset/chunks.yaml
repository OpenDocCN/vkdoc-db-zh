  trans: "\n# 第 1 章 SQL Server 数据类型\n\n对于字符串数据类型，可以指定最大长度或使用`MAX`，最多可存储 2GB。`IMAGE`是一个已弃用的数据类型，用于存储非\
    \ Unicode 字符串或 Unicode 字符串，具有可变长度。相关数据类型包括`NVARCHAR`、`TEXT`和`NTEXT`（参见表 1-3）。\n\
    \n![](img/index-25_1.png)\n\n代码清单 1-4 使用了`DATALENGTH`系统函数来演示将一个 15 个字符的字符串转换为每种字符数据类型时存储大小的差异。\n\
    \n```sql\nSELECT\nDATALENGTH(CAST('My String Value' AS NCHAR(20))) AS 'NCHAR',\n\
    DATALENGTH(CAST('My String Value' AS NVARCHAR(20))) AS 'NVARCHAR',\nDATALENGTH(CAST('My\
    \ String Value' AS CHAR(20))) AS 'CHAR',\nDATALENGTH(CAST('My String Value' AS\
    \ VARCHAR(20))) AS 'VARCHAR'\n```\n\n代码清单 1-4 的结果可以在图 1-2 中找到。\n\n**图 1-2.** 比较字符串存储大小的结果\n\
    \n## 二进制数据类型\n\nSQL Server 可以存储二进制数据，例如 Word 文档或照片，使用原生二进制数据类型。二进制数据类型也用于存储使用密钥或证书加密的数据。SQL\
    \ Server 中可用的二进制数据类型详见表 1-4。\n\n**表 1-4.** 二进制数据类型\n\n| 数据类型 | 描述 | 存储大小 | 最大可变/固定长度\
    \ |\n|-----------|-------------|--------------|-------------------------------|\n\
    | `BINARY` | 存储固定长度的二进制数据。使用`BINARY`时，必须以字节为单位指定数据长度。如果存储的数据短于指定长度，将被填充。 | 等于允许的最大字节数\
    \ | 固定字节 |\n| `VARBINARY` | 存储可变长度的二进制数据。使用`VARBINARY`时，必须指定数据的最大字节长度或指定`MAX`。指定`MAX`时，最多可存储\
    \ 2GB 数据。 | 等于实际存储的字节数加 2 字节 | 2GB |\n| `IMAGE` | 一个不应使用的已弃用数据类型。存储可变长度的二进制数据。\
    \ | 等于实际存储的字节数加 2 字节 | 2GB |\n\n**提示：** 有关加密数据的详细信息，请参考 *Securing SQL Server*\
    \ (Apress, 2016)，可在 [www.apress.com/gp/book/9781484222645](http://www.apress.com/gp/book/9781484222645)\
    \ 找到。\n\n使用`CONVERT`函数时，`BINARY`数据可用的样式选项详见表 1-5。\n\n**表 1-5.** BINARY 数据的样式选项\n\
    \n| 样式代码 | 输出 |\n|------------|--------|\n| 0（默认值） | 二进制数据的默认值。将 ASCII 字符转换为二进制字节，反之亦然。\
    \ |\n| 1 | 将字符串转换为二进制数据。验证十六进制字节数为偶数且第一个字符为 0x。 |\n| 2 | 将二进制数据转换为字符串。每个字节将转换为两个十六进制字符。溢出数据类型的数据将被截断。如果数据短于固定长度数据类型，将被填充。\
    \ |\n\n代码清单 1-5 演示了如何读取已加密并存储在`VARBINARY`列中的密码，并将其转换回字符串。脚本首先创建所需对象并加密密码。\n\n\
    ```sql\n--Create a certificate that will encrypt the symmetric key\nCREATE CERTIFICATE\
    \ PasswordCert\nENCRYPTION BY PASSWORD = 'MySecurePa$$word'\nWITH SUBJECT = 'Cert\
    \ for securing passwords table';\n\n--Create a symmetric key that will encrypt\
    \ the password\nCREATE SYMMETRIC KEY PasswordKey\nWITH ALGORITHM = AES_128\nENCRYPTION\
    \ BY CERTIFICATE PasswordCert;\n\n--Create a table to store the password\nCREATE\
    \ TABLE dbo.Passwords\n(\n    Password VARBINARY(256)\n);\n\n--Open the symmetric\
    \ key, so that it can be used\nOPEN SYMMETRIC KEY PasswordKey\n```\n"
- fmt: "# DECRYPTION BY CERTIFICATE\n\n`PasswordCert`\nWITH PASSWORD = 'MySecurePa$$word'\
    \ ;\n\n--Encrypt a password and insert it into the table\n\n```sql\nINSERT INTO\
    \ dbo.Passwords\nSELECT ENCRYPTBYKEY(KEY_GUID('PasswordKey'), 'Pa$$w0rd') ;\n\
    ```\n\n--Decrypt and read the password\n\n--The first column in the result set\
    \ shows the password as the decrypted value but still binary format\n\n--The second\
    \ column in the result set shows the password decrypted and converted back to\
    \ a character string\n\n```sql\nSELECT\n    DECRYPTBYKEY(Password) AS 'Decrypted\
    \ Password In Binary'\n    , CAST(DECRYPTBYKEY(Password) AS CHAR(8)) AS 'Decrypted\
    \ Password As Character String'\nFROM dbo.Passwords\n--Close the symmetric key\n\
    CLOSE SYMMETRIC KEY PasswordKey ;\n```\n\n![](index-29_1.jpg)\n\n# Chapter 1 SQL\
    \ Server Data Types\n\nThe results of the select statement against the table created\
    \ in Listing 1-5 can be found in Figure 1-3.\n\n**Figure 1-3.** Results of converting\
    \ binary data to a character string\n\n## Dates and Times\n\nSQL Server can store\
    \ accurate date and time information, including UTC offsets. The details of each\
    \ supported date and time data type can be found in Table 1-6.\n\n**Table 1-6.**\
    \ Date and Time Data Types\n\n| Data Type | Description | Storage Size | Accuracy\
    \ |\n| :--- | :--- | :--- | :--- |\n| `DATE` | Stores a date | 3 bytes | 1 day\
    \ |\n| `TIME` | Stores a time of day | Depending on the fractional second precision:<br>•\
    \ 0-2 – 3 bytes<br>• 3-4 – 4 bytes<br>• 5-7 – 5 bytes | 100 nanoseconds |\n| `DATETIME`\
    \ | Stores a date and time | 8 bytes | Rounded to .000, .003, or .007 seconds\
    \ |\n| `SMALLDATETIME` | Stores a date and time to the grain of 1 minute | 4 bytes\
    \ | 1 minute |\n| `DATETIME2` | Stores a date and time with fractional seconds.\
    \ When using, you can specify a fractional second precision, to a maximum of 7.\
    \ If omitted, the default is 7. | Depending on the fractional second precision:<br>•\
    \ 0-2 – 6 bytes<br>• 3-4 – 7 bytes<br>• 5-7 – 8 bytes | 100 nanoseconds |\n| `DATETIMEOFFSET`\
    \ | Stores a date and time with time zone awareness. When storing a date and time,\
    \ you can specify a fractional second precision, to a maximum of 7. If omitted,\
    \ the default is 7. You can pass a UTC offset of -14 to +14 | 10 bytes | 100 nanoseconds\
    \ |\n\nTable 1-7 details allowable style options for date and time data types\
    \ when using the `CONVERT` function.\n\n**Table 1-7.** Date and Time Styles\n\n\
    | Style Code | Standard | Input/Output |\n| :--- | :--- | :--- |\n| 0 or 100 |\
