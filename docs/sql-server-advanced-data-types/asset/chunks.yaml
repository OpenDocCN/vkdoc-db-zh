- fmt: "## Chapter 8 Shredding JSON data\n\n### Listing 8-4. Using `PIVOT` with `OPENJSON()`\n\
    \n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    PersonID\n    , FullName\n\
    \    , [OtherLanguages]\n    , [HireDate]\n    , [Title]\n    , [PrimarySalesTerritory]\n\
    \    , [CommissionRate]\nFROM (\n    SELECT\n        PersonID\n        , FullName\n\
    \        , JSON.[Key] AS JSONName\n        , JSON.value AS JSONValue\n    FROM\
    \ Application.People\n        OUTER APPLY OPENJSON(CustomFields) JSON\n) Src\n\
    PIVOT\n(\n    MAX(JSONValue)\n    FOR JSONName IN ([OtherLanguages], [HireDate],\
    \ [Title],\n                     [PrimarySalesTerritory], [CommissionRate])\n\
    ) pvt ;\n```\n\n![](index-246_1.jpg)\n\nThe partial results of this query can\
    \ be seen in [Figure 8-4.](#index_split_002.html#p246)\n\n**Figure 8-4.** Results\
    \ of using `PIVOT` with `OPENJSON()`\n\nThe limitation of using this approach\
    \ is that you must know the name of each key in the JSON document before writing\
    \ the query. If any key names are missed, or added later, the data will not appear\
    \ in the result set. This can be particularly challenging, as JSON documents cannot\
    \ be bound to a schema.\n\n**Tip** If we had used `CROSS APPLY` instead of `OUTER\
    \ APPLY`, the results for `PersonID` 1 would have been omitted.\n\nTo turn this\
    \ data into columns, to avoid rows being duplicated, you could use the `PIVOT`\
    \ operator. The `PIVOT` operator works by rotating unique values from a column\
    \ into separate columns. This could also be described as changing rows to columns.\
    \ It will then perform aggregations on remaining columns, as required. The same\
    \ could be achieved by using multiple `CASE` statements, but the `PIVOT` operator\
    \ is far more efficient.\n\nThe syntax of the `PIVOT` operator has an outer query,\
    \ followed by two subqueries. The first subquery contains the base query, while\
    \ the second contains the pivot specification. Because our values are often textual,\
    \ and aggregation isn’t appropriate, we will use the `MAX()` aggregate function.\
    \ This is demonstrated with the query in Listing [8-4](#index_split_002.html#p245).\n\
    \n### Dynamic Shredding Based on Document Content\n\nThe way to resolve the issue\
    \ of not knowing the document contents at development time is to use a dynamic\
    \ `PIVOT`. This involves using dynamic SQL to define the current list of JSON\
    \ keys to pivot before the query is run. This technique is demonstrated in Listing\
    \ [8-5.](#index_split_002.html#p247)\n\n**Tip** `QUOTENAME()` is a system function\
    \ that delimits a value by wrapping it in square brackets.\n\n### Listing 8-5.\
    \ Using Dynamic `PIVOT` with `OPENJSON()`\n\n```sql\nDECLARE @Columns NVARCHAR(MAX)\
    \ ;\nDECLARE @SQL NVARCHAR(MAX) ;\n\nSET @Columns = '' ;\n\nSELECT @Columns +=\
    \ ', p.' + QUOTENAME(JSONName)\nFROM (\n    SELECT DISTINCT\n        JSON.[Key]\
    \ AS JSONName\n    FROM Application.People p\n        CROSS APPLY OPENJSON(CustomFields)\
    \ JSON\n) AS cols ;\n\nSET @SQL =\n'SELECT\n    PersonID\n    , FullName\n   \
    \ , ' + STUFF(@Columns, 1, 2, '') + '\nFROM\n    (\n        SELECT\n         \
    \   PersonID\n            , FullName\n            , JSON.[Key] AS JSONName\n \
    \           , JSON.value AS JSONValue\n        FROM Application.People\n     \
    \       OUTER APPLY OPENJSON(CustomFields) JSON\n    ) AS src\n    PIVOT\n   \
    \ (\n        MAX(JSONValue) FOR JSONName IN ('\n        + STUFF(REPLACE(@Columns,\
    \ ', p.[', ',['), 1, 1, '')\n        + ')\n    ) AS p ;' ;\n\nEXEC (@SQL) ;\n\
    ```\n\n### `OPENJSON()` with Explicit Schema\n\nWhen using `OPENJSON()` with an\
    \ explicit schema, you are able to provide control over the format of the result\
    \ set that is returned. Instead of a three-column result set, a column will be\
    \ returned for every column that you have specified in the `WITH` clause. You\
    \ can also specify the data type of each column. These data types are T-SQL data\
    \ types, not JSON data types, so types such as `DATE` or `DECIMAL` can be specified.\
    \ For example, consider the script in Listing [8-6](#index_split_002.html#p248).\n\
    \n### Listing 8-6. Using `OPENJSON()` with an Explicit Schema\n\n```sql\nDECLARE\
    \ @CustomFields NVARCHAR(MAX) ;\n\nSET @CustomFields =\n    (\n        SELECT\n\
    \            CustomFields\n        FROM Application.People\n        WHERE PersonID\
    \ = 2\n    ) ;\n\nSELECT *\nFROM OPENJSON(@CustomFields)\nWITH (\n    HireDate\
    \ DATETIME2\n    , Title NVARCHAR(50)\n    , PrimarySalesTerritory NVARCHAR(50)\n\
    \    , CommissionRate DECIMAL(5,2)\n) ;\n```\n\nThis query returns the results\
    \ shown in [Figure 8-5.](#index_split_002.html#p249)\n\n![](index-249_1.jpg)"
