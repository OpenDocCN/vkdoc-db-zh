    ## 为空间数据创建索引


    以下各节概述了空间索引，然后演示如何创建它们。


    ### 理解空间索引


    空间索引是一种特殊类型的索引，在 SQL Server 中实现，可以提高对空间数据类型的某些查询的性能。**表 11-5**描述了当在 `WHERE` 或
    `JOIN` 子句中使用时，可以从空间索引中受益的谓词模式。


    **表 11-5.** 可从空间索引中受益的查询


    | **数据类型** | **方法** | **运算符** |

    | :--- | :--- | :--- |

    | GEOMETRY & GEOGRAPHY | STDistance | <, <= |

    | GEOMETRY & GEOGRAPHY | STEquals | = |

    | GEOMETRY & GEOGRAPHY | STIntersects | = |

    | 仅 GEOMETRY | STContains | = |

    | 仅 GEOMETRY | STOverlaps | = |

    | 仅 GEOMETRY | STTouches | = |

    | 仅 GEOMETRY | STWithin | = |


    与传统索引一样，空间索引使用 `B-Tree` 结构（有关 `B-Tree` 索引的更多信息，请参见第 5 章），这意味着空间数据必须以线性顺序表示。为了实现这一点，SQL
    Server 在构建索引之前，将空间分解为一个嵌套的网格系统。


    网格将有四层。第一层（`级别 1`）网格中的每个单元格将包含另一个（`级别 2`）网格，依此类推。四个网格层中的每一层都可以赋予不同的密度，低密度定义为 `4
    × 4` 个单元格，中密度为 `8 × 8` 个单元格，高密度为 `16 × 16` 个单元格。网格内的每个单元格都使用 `希尔伯特填充曲线` 算法进行编号。


    **提示：** 对 `希尔伯特填充曲线` 的完整讨论超出了本书的范围，但可以在网上许多地方找到更多详细信息，包括 [mathworld.wolfram.com/HilbertCurve.html](http://mathworld.wolfram.com/HilbertCurve.html)。


    创建好网格系统后，SQL Server 逐行读取列中的数据。对于每一行，它将空间对象与它所接触的每个 `级别 1` 单元格关联起来。对于每个被接触的单元格，它将下降到
    `级别 2` 并重复该过程。对于剩余的级别也重复此过程。

