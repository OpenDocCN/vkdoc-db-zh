    <xs:sequence>


    <xs:element maxOccurs="unbounded" name="Order">


    <xs:complexType>'
  trans: "# 第 4 章 查询与分解 XML\n\n来定义粒度。接着，我们为包含中间结果集的表和列定义任意名称。\n\n`nodes()`方法也可与`query()`方法结合使用，从而将一个\
    \ XML 文档分解为更小的 XML 文档。例如，请看**代码清单 4-30**中的查询。此查询以 XML 格式从 XML 文档中提取`Product`元素。\n\
    \n***代码清单 4-30.*** 结合使用`nodes()`方法与`query()`方法\n```sql\nDECLARE @SalesOrder XML\
    \ ;\n\nSET @SalesOrder = '\n<SalesOrders>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n\
    \    <OrderHeader>\n      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n\
    \    <OrderDetails>\n      <Product ProductID=\"45\" ProductName=\"Developer joke\
    \ mug - there are 10 types of people in the world (Black)\" Price=\"13\" Qty=\"\
    7\" />\n      <Product ProductID=\"58\" ProductName=\"RC toy sedan car with remote\
    \ control (Black) 1/50 scale\" Price=\"25\" Qty=\"4\" />\n    </OrderDetails>\n\
    \  </Order>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderHeader>\n\
    \      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n    <OrderDetails\
    \ OrderID = \"122\">\n      <Product ProductID=\"22\" ProductName=\"DBA joke mug\
    \ - it depends (White)\" Price=\"13\" Qty=\"6\" />\n      <Product ProductID=\"\
    2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n   \
    \   <Product ProductID=\"111\" ProductName=\"Superhero action jacket (Blue) M\"\
    \ Price=\"30\" Qty=\"10\" />\n      <Product ProductID=\"116\" ProductName=\"\
    Superhero action jacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n    </OrderDetails>\n\
    \  </Order>\n</SalesOrders>' ;\n\nSELECT\n    TempCol.query('.') AS Product\n\
    FROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product') TempTable(TempCol)\
    \ ;\n```\n\n此查询的结果可见于**图 4-11**。\n\n***图 4-11.*** 结合使用`nodes()`方法与`query()`方法的结果\n\
    \n`nodes()`方法相对于`OPENXML()`的最大优势在于其针对表的易用性。`CROSS APPLY`操作符可用于将`nodes()`方法应用于表内的多行。**代码清单\
    \ 4-31**中的查询阐释了这一点，它对`Sales.CustomerOrderSummary`表中的`OrderSummary`列调用了`nodes()`方法。该查询将为`CustomerID`为\
    \ 814 的客户所下每个销售订单上的每个产品返回一行。结果随后按每个产品的数量进行排序。\n\n***代码清单 4-31.*** 对表使用`nodes()`方法\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    CustomerID\n    , TempCol.value('@Qty',\
    \ 'INT') AS Quantity\n    , TempCol.value('@ProductName', 'NVARCHAR(70)') AS ProductName\n\
    \    , TempCol.query('.') AS Product\nFROM Sales.CustomerOrderSummary\nCROSS APPLY\
    \ OrderSummary.nodes('SalesOrders/Order/OrderDetails/Product') TempTable(TempCol)\n\
    WHERE CustomerID = 841\nORDER BY TempCol.value('@Qty', 'INT') DESC ;\n```\n\n\
    此查询的部分结果可见于**图 4-12**。\n\n***图 4-12.*** 对表使用`nodes()`方法的结果\n\n## 使用架构\n\n如**第\
    \ 3 章**所讨论的，XML 文档可以绑定到一个架构，以确保其结构符合客户端约定。在 SQL Server 中，我们可以通过创建`XML SCHEMA COLLECTION`来定义\
    \ XSD 架构。为了演示这一点，假设我们希望将`Sales.CustomerOrderSummary`表中的`OrderSummary`列绑定到一个架构。第一步是创建`XML\
    \ SCHEMA COLLECTION`。我们可以使用**代码清单 4-32**中的代码来实现这一点。\n\n***代码清单 4-32.*** 创建`XML\
    \ SCHEMA COLLECTION`\n```sql\nUSE WideWorldImporters\nGO\n\nCREATE XML SCHEMA\
    \ COLLECTION OrderSummary AS\nN'<?xml version=\"1.0\" encoding=\"utf-16\"?>\n\
    <xs:schema attributeFormDefault=\"unqualified\"\nelementFormDefault=\"qualified\"\
    \ xmlns:xs=\"http://www.w3.org/2001/XMLSchema\">\n  <xs:element name=\"SalesOrders\"\
    >\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element maxOccurs=\"\
    unbounded\" name=\"Order\">\n          <xs:complexType>\n```"
- fmt: "# Chapter 4 Querying and Shredding XML\n\n## Schema Definition\n\n```xml\n\
    <xs:sequence>\n  <xs:element name=\"OrderHeader\">\n    <xs:complexType>\n   \
    \   <xs:sequence>\n        <xs:element name=\"CustomerName\" type=\"xs:string\"\
    \ />\n        <xs:element name=\"OrderDate\" type=\"xs:date\" />\n        <xs:element\
    \ name=\"OrderID\" type=\"xs:unsignedInt\" />\n      </xs:sequence>\n    </xs:complexType>\n\
    \  </xs:element>\n  <xs:element name=\"OrderDetails\">\n    <xs:complexType>\n\
    \      <xs:sequence>\n        <xs:element maxOccurs=\"unbounded\" name=\"Product\"\
    >\n          <xs:complexType>\n            <xs:attribute name=\"ProductID\" type=\"\
    xs:unsignedByte\" use=\"required\" />\n            <xs:attribute name=\"ProductName\"\
    \ type=\"xs:string\" use=\"required\" />\n            <xs:attribute name=\"Price\"\
    \ type=\"xs:decimal\" use=\"required\" />\n            <xs:attribute name=\"Qty\"\
    \ type=\"xs:unsignedShort\" use=\"required\" />\n          </xs:complexType>\n\
    \        </xs:element>\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:sequence>\n</xs:complexType>\n</xs:element>\n</xs:sequence>\n</xs:complexType>\n\
    </xs:element>\n</xs:schema>\n```\n\n## Namespace Tip\n\n**Tip** Because the schema\
    \ does not specify a namespace, it will be associated with the default empty string\
    \ namespace. A namespace can be added to the schema, using the `<xs:schema>` attribute\
    \ `xmlns:ns=http://your-namespace`.\n\n## Binding a Schema to a Column\n\nWe could\
    \ bind our schema to the `OrderSummary` column by using the query in Listing 4-33.\n\
    \n***Listing 4-33.*** Binding a Schema to a Column\n\n```sql\nALTER TABLE Sales.CustomerOrderSummary\n\
    ALTER COLUMN OrderSummary XML(OrderSummary);\n```\n\n## Referencing a Schema in\
    \ Queries\n\nWe can also reference a schema when constructing or querying XML\
    \ data. The `FOR XML` clause includes a `WITH XMLNAMESPACES` option that can be\
    \ used to specify the target namespace of the resultant XML document, and XQuery\
    \ methods, such as `query`, can begin with a `declare namespace` statement.\n\n\
    **Tip** A full discussion of the use of namespaces is beyond the scope of this\
    \ book. However, examples of using `WITH XMLNAMESPACES` can be found at [https://docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017](https://docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017),\
    \ and examples of using a namespace with the `query` method can be found at [https://docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017](https://docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017).\n\
    \n## Summary\n\nXQuery is a language that can be used to query XML data when it\
    \ is stored in SQL Server columns and variables. The `exist()` method can be used\
    \ to check for the existence of a node or a node containing a specific value.\
    \ The `value()` method can be used to extract a scalar value from an XML document,\
    \ and the `query()` method can be used to return a subset of an XML document still\
    \ in XML format.\n\nFLWOR statements can be used to help navigate and iterate\
    \ an XML document. The `for` statement binds a variable to an input sequence.\
    \ The `let` statement is used to assign an XQuery expression to a variable. The\
    \ `where` statement can be used to filter the results that are returned. The `order\
    \ by` statement can optionally be used to order the results of the FLWOR statement.\
    \ The `return` statement specifies what data will be returned.\n\nT-SQL variables\
    \ and columns can be passed into XQuery statements. When this technique is adopted,\
    \ it is known as a cross-domain query. It allows for values to easily be bound\
    \ to XQuery statements, helping to simplify logic and reduce duplicate code.\n\
    \nXML data can be modified by using the `modify()` method. This method allows\
    \ developers to use one of three options: `insert`, `replace value of`, or `delete`.\
    \ When inserting data, there are further options that developers can take advantage\
    \ of, to give them granular control over where the insert occurs. For example,\
    \ you can choose to insert first, last, after a node, or before a node.\n\nXML\
    \ data can be converted into relational data (that is, shredded)."
