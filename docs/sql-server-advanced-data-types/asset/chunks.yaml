  trans: '

    第 9 章 处理 JSON 数据类型


    `JSON_QUERY()`函数也可包含在`SELECT`列表、`WHERE`子句、`ORDER BY`或`GROUP BY`中，但它返回的是 JSON 对象或数组，而非单个标量值。与`JSON_VALUE()`类似，返回的对象基于传递给函数的路径表达式。


    `MODIFY_JSON()`函数可用于更新、插入或删除键值。该函数接收一个 JSON 文档和路径表达式作为参数，并返回修改后的完整文档，这使其易于在标准`UPDATE`语句中使用。路径表达式中可选的`append`关键字用于表示意图是向数组添加一个新值，而非修改现有值。使用`NULL`更新键值会删除该键。


    可以通过为 JSON 文档的属性创建索引来提升查询性能。具体方法是根据你希望优化的路径表达式创建一个计算列，然后在该计算列上创建索引。这样，当查询包含 JSON
    数据的列时，查询优化器就能使用该索引。


    第 10 章 理解空间数据


    空间数据是描述位置的数据。据说世界上 80%的数据都包含空间元素，因此对于许多数据层应用而言，构建或查询空间数据的能力可能至关重要。本章将概述空间数据及其在
    SQL Server 中的实现，然后再探讨 SQL Server 实现中所采用的空间标准。


    **注意** 本章旨在提供空间数据的理论概述。实际使用示例请参见第 11 章。


    理解空间数据


    SQL Server 提供了两种能够存储空间数据的数据类型：`GEOMETRY`和`GEOGRAPHY`。这些数据类型通过 CLR（公共语言运行时）实现，其底层是.NET
    类，这些类提供了一系列允许你与数据交互的方法和属性。


    © Peter A. Carter 2018


    P. A. Carter, *SQL Server 高级数据类型*,

    <https://doi.org/10.1007/978-1-4842-3901-8_10>


    **注意** 一个地理空间对象可被称为一个几何体（geometry），简单对象称为原始几何体，对象的集合称为几何体集合。由于`geometry`也是以平面地球模型实现空间数据的数据类型名称，这可能会引起混淆。因此请注意，当本章指代一个地理空间对象时，将使用小写的`geometry`一词。当指代数据类型时，该词将使用大写字母（`GEOMETRY`）。


    `GEOMETRY`数据类型使用笛卡尔坐标系，提供了一个平面地球模型。当你处理二维对象或无需考虑地球曲率的较小对象时，`GEOMETRY`是应使用的正确数据类型。


    使用`GEOMETRY`数据类型时，对象使用 x 轴和 y 轴进行标绘。例如，图 10-1 中的点位于（或标绘在）坐标（5, 3）。


    ![](img/index-291_1.png)


    *图 10-1 在笛卡尔系统中标绘一个点*


    **提示** 一个形状被称为一个面（surface）。


    类似地，图 10-2 中的多边形（封闭的面）使用坐标（-1 -1, -1 2, 2 2, 2 -1, -1 -1）绘制而成。


    ![](img/index-292_1.jpg)


    *图 10-2 在笛卡尔系统中标绘一个多边形*


    另一方面，`GEOGRAPHY`数据类型使用一个球体地球模型（实际上是多个球体地球模型），非常适合表示必须考虑地球曲率的三维对象或大面积区域。

    '
- fmt: '### 理解空间数据


    当处理球面地球模型的数据时，一个点可以通过提供**经度**和**纬度**来标识，而不是`x`和`y`坐标。


    经线，也称为子午线，表示某点距一条称为本初子午线的基准经线向东或向西的度数。本初子午线穿过伦敦的格林威治区，被认为是东西半球的交汇点。有时，经度坐标以正负值表示，本初子午线以东的子午线为正值，以西的为负值。另一些时候，子午线总是以正数表示，并使用`E`（东）或`W`（西）来指示相对于本初子午线的方向。


    ![](index-293_1.jpg)


    **图 10-3. 绘制经度**


    赤道是南北极之间的中心点。纬度表示某点距赤道向北或向南的度数。因此，赤道的纬度为0度。一条纬线代表地球上具有相同纬度的所有点。如图10-4所示，有时纬度值以正负值表示，北半球为正值，南半球为负值。另一些时候，纬度总是以正值表示，并通过后缀`north
    latitude`或`south latitude`来区分。


    ![](index-294_1.jpg)


    **图 10-4. 绘制纬度**


    `GEOMETRY`和`GEOGRAPHY`数据类型都允许你实例化多种对象。这些对象可分为两类：第一类是单几何实例，也称为**基本几何体**；第二类是几何集合，也称为**多部件几何体**。表10-1详细列出了SQL
    Server支持的基本几何体。


    **表 10-1. 基本几何体**


    | 几何体 | 描述 |

    | :--- | :--- |

    | `Point` | 由一组坐标指定的单个点。 |

    | `LineString` | 连接多个点的路径，由多组坐标定义。线串可以是闭合的或非闭合的*。 |

    | `CircularString` | 多个点之间的弧形路径。必须定义奇数个点，最少三个。这些点不能全部在同一条轴上（否则将被视为`LineString`）。
    |

    | `CompoundCurve` | 连接多组点的路径。它可以通过使用多个`LineString`和/或`CircularString`来定义，以创建圆形或半圆形等曲面。
    |

    | `Polygon` | 通过指定映射多边形每个角的点的坐标来定义的封闭曲面。多边形的每条边本质上都是一个`LineString`。 |

    | `CurvePolygon` | 一个封闭曲面。这与`Polygon`类似，不同之处在于它可能使用`LineString`、`CircularString`或`CompoundCurve`来定义，而不仅仅是`LineString`。
    |


    *\*一个封闭曲面是指用于定义它的点是首尾相连的。因此，最先定义的坐标也将是最后定义的坐标。*


    表10-2定义了SQL Server支持的多部件几何体。


    **表 10-2. 多部件几何体**


    | 几何体 | 描述 |

    | :--- | :--- |

    | `MultiPoint` | 0个或多个`Point`的集合。 |

    | `MultiLineString` | 0个或多个`LineString`的集合。 |

    | `MultiPolygon` | 0个或多个`Polygon`的集合。 |

    | `GeometryCollection` | 0个或多个几何体的集合。可以包含任何基本几何体或多部件几何体。 |


    在SQL Server 2017中，增加了一种新的曲面类型，它仅适用于`GEOGRAPHY`数据类型。`FullGlobe`代表整个地球表面。因此，它具有面积，但没有边界。'
  raw: 'When working with data for a round-earth model, instead of x and y


    coordinates, a point can be identified by providing longitude and latitude.


    Lines of longitude, also called meridians, indicate the number of degrees east
    or west of a baseline of longitude, known as the prime meridian.


    The prime meridian runs through the borough of Greenwich in London


    and is regarded as the point where Eastern and Western Hemispheres


    meet. Sometimes, longitude coordinates are referenced as positive and


    negative values, with meridians east of the prime meridian being positive 282


    ![](index-293_1.jpg)


    ChAPTer 10 UndersTAnding sPATiAl dATA


    and meridians west of the prime meridian being negative. Other times,


    meridians will always be referred to as positive numbers, with either


    E (East) or W (West) being used to denote direction from the prime


    meridian. This is illustrated in Figur[e 10-3](#index_split_002.html#p293).


    ***Figure 10-3.** Plotting longitude*


    The equator is the central point between the North and South Poles.


    Latitude indicates the number of degrees north or south of the equator.


    Therefore, the equator has a latitude of 0 degrees. A line of latitude


    represents all points on Earth that have the same degree of latitude. As


    indicated in Figur[e 10-4](#index_split_002.html#p294), sometimes degrees of latitude
    are referred to as positive and negative values, with the Northern Hemisphere
    being positive values and the Southern Hemisphere being negative values. Other
    times,


    latitude is always referenced with positive values, differentiated by a suffix
    of either north latitude or south latitude.


    ![](index-294_1.jpg)


    ChAPTer 10 UndersTAnding sPATiAl dATA


    ***Figure 10-4.** Plotting latitude*


    Both the GEOMETRY and GEOGRAPHY data types allow you to instantiate a


    number of objects. These objects can be broken down into two categories.


    The first category is single geometry instances, also known as primitive


    geometries. The second category is geometry collections, also known as


    multipart geometries. Ta[ble 10-1](#index_split_002.html#p295) details the primitive
    geometries that are supported by SQL Server.


    ChAPTer 10 UndersTAnding sPATiAl dATA


    ***Table 10-1.** Primitive Geometries*


    **Geometry**


    **Description**


    Point


    A single point specified with a single set of coordinates


    linestring


    A path that joins multiple points, defined with multiple


    sets of coordinates. A line string can either be enclosed or


    unenclosed.*


    Circularstring


    A path, in the form of an arc, between multiple points. There


    must be an odd number of points defined, with a minimum of


    three. The points cannot all be on the same axis (or it will be


    treated as a linestring).


    CompoundCurve


    A path that joins multiple sets of points. it can be defined by


    using multiple linestrings and/or Circularstrings, to create


    surfaces such as circles or semicircles.


    Polygon


    An enclosed surface defined by specifying the points that


    map each corner of the polygon. each side of the polygon is


    essentially a linestring.


    CurvePolygon


    An enclosed surface. This is similar to Polygon, except that it may


    be defined using linestrings, Circularstring, or CompoundCurves,


    instead of just linestrings, as is the case of Polygon.


    **An enclosed surface is one in which the points used to define it join. Therefore,
    the* *first coordinates defined will also be the last coordinates defined.*


    ChAPTer 10 UndersTAnding sPATiAl dATA


    Table [10-2](#index_split_002.html#p296) defines the multipart geometries that
    are supported by SQL


    Server.


    ***Table 10-2.** Multipart Geometries*


    **Geometry**


    **Description**


    MultiPoint


    A collection of 0 or more points


    Multilinestring


    A collection of 0 or more linestrings


    MultiPolygon


    A collection of 0 or more Polygons


    geometryCollection


    A collection of 0 or more geometries. Can include any


    primitive or multipart geometries


    In SQL Server 2017, a new surface type has been added, which is


    applicable only to the GEOGRAPHY data type. FullGlobe represents the entire surface
    of the planet. Therefore, it has an area, but no borders.'
