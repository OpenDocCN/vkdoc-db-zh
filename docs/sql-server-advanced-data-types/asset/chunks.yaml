    # 第 11 章 处理空间数据


    ## 表 11-2 空间数据函数


    | 方法 | 描述 | 适用类型 | OGC/扩展 |

    | :--- | :--- | :--- | :--- |

    | `STBoundary()` | 返回几何实例的边界。 | 仅 `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STBuffer()` | 返回表示另一几何实例缓冲区区域的几何实例。接受一个表示距离的参数。 | `GEOMETRY`，`GEOGRAPHY` |
    OGC |

    | `STCentroid()` | 返回几何实例的几何中心。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STContains()` | 判断一个几何实例是否包含另一个。如果被包含的实例位于外部实例内，则返回 1，否则返回 0。 | `GEOMETRY`，`GEOGRAPHY`
    | OGC |

    | `STConvexHull()` | 返回包含几何实例所有点的最小可能凸多边形 (`Polygon`)。 | 仅 `GEOMETRY`，`GEOGRAPHY`
    | OGC |

    | `STCrosses()` | 如果几何实例与另一实例相交，则返回 1，否则返回 0。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STCurveN()` | 从复合曲线 (`CompoundCurve`)、圆弧字符串 (`CircularString`) 或曲线 (`Curve`)
    实例中返回特定的曲线。接受一个索引参数。 | 仅 `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STCurveToLine()` | 将圆弧曲线实例近似表示为线字符串 (`LineString`) 或多边形 (`Polygon`) 实例。 | 仅
    `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STDifference()` | 返回几何实例中不与另一几何实例相交的部分。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STDimension()` | 返回几何实例的最大维度。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STDisjoint()` | 如果两个几何实例不相交，则返回 1，否则返回 0。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STDistance()` | 返回两个几何实例之间的最短距离。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STEndpoint()` | 返回线字符串 (`LineString`) 或圆弧字符串 (`CircularString`) 实例的终点。 | `GEOMETRY`，`GEOGRAPHY`
    | OGC |

    | `STEnvelope()` | 返回界定几何实例的矩形多边形 (`Polygon`)。 | 仅 `GEOMETRY`，`GEOGRAPHY` | OGC
    |

    | `STEquals()` | 如果两个几何实例具有相同的点集，则返回 1，否则返回 0。 | `GEOMETRY`，`GEOGRAPHY` | OGC
    |

    | `STExteriorRing()` | 返回多边形 (`Polygon`) 实例的外环。 | 仅 `GEOMETRY`，`GEOGRAPHY` | OGC
    |

    | `STGeometryN()` | 从几何集合中返回特定的对象。接受一个索引参数。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    | `STGeometryType()` | 返回几何实例的类型。 | `GEOMETRY`，`GEOGRAPHY` | OGC |

    '
- fmt: '# Chapter 11 Working With Spatial Data


    ## Table 11-2. Spatial Methods (Continued)


    ### Method


    `STInteriorRingN`


    ### Description


    Returns the `n`th interior ring of a `Polygon`.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIntersection`


    ### Description


    Returns the geometric intersection of two spatial instances. Returns 1 if the
    instances intersect and 0 if they do not.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIntersects`


    ### Description


    Returns 1 if the spatial instances intersect and 0 if they do not.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIsClosed`


    ### Description


    Checks if the start point and end point of a spatial instance are the same. Returns
    1 if the instance is closed and 0 if it is not.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIsEmpty`


    ### Description


    Returns 1 if the instance is empty and 0 if it is not.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIsRing`


    ### Description


    Validates if the spatial instance is a `LineString` and is closed and simple.

    Criteria:

    - Is a `LineString`

    - Does not intersect itself (except at the start and end point)

    - Multiple objects do not intersect each other (except where the point of intersection
    is on both objects’ boundaries)

    - Is closed (start point and end point are the same)


    Returns 1 if the conditions are all true, 0 if 1 or more of the conditions are
    false.


    ### Works With


    - `GEOMETRY` only


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIsSimple`


    ### Description


    Validates if the spatial instance does not intersect itself.

    Conditions:

    - Does not intersect itself (except at the start and end point)

    - Multiple objects do not intersect each other (except where the point of intersection
    is on both objects’ boundaries)


    Returns 1 if both conditions are true, 0 if either condition is false.


    ### Works With


    - `GEOMETRY` only


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STIsValid`


    ### Description


    Validates if the spatial instance is well-formed. Returns 1 if the instance is
    well-formed and 0 if it is not well-formed.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STLength`


    ### Description


    Returns the total length of a spatial instance. For a `Polygon`, this is the length
    of the perimeter.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STNumCurves`


    ### Description


    Returns the number of curves in a spatial instance. Always 0 for a simple geometry.


    ### Works With


    - `GEOMETRY` only


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STNumGeometries`


    ### Description


    Returns the number of spatial objects in a multi-part geometry.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STNumInteriorRing`


    ### Description


    Returns the number of interior rings that a `Polygon` contains.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STNumPoints`


    ### Description


    Returns the number of points that are used to describe a spatial primitive.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STOverlaps`


    ### Description


    Validates if the spatial instance overlaps against a simple, multi-part geometry.
    Returns 1 if the objects overlap and 0 if they do not. The matrix used is the
    second one passed to the method as a parameter, which describes relationships
    defined by the extended 9 Intersection Model (D-9IM).


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STPointN`


    ### Description


    Accepts a single parameter `n`, a 1-based index location. Returns an arbitrary
    point within the interior of a spatial instance. The parameter passed to the method
    is passed in as a parameter.


    ### Works With


    - `GEOMETRY` only


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STPointOnSurface`


    ### Description


    Returns an arbitrary point that is guaranteed to be on the surface of a spatial
    instance.


    ### Works With


    - `GEOMETRY` only


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STRelate`


    ### Description


    Validates if the spatial instance the method was called against relates to the
    spatial instance passed as a parameter. The relationship is defined by the pattern
    matrix passed to the method.


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`


    ---


    ### Method


    `STTouches`


    ### Description


    Returns 1 if the instances touch and 0 if they do not. The instances touch if
    they:

    - Spatially touch a spatial instance

    - The spatial instance used to define a spatial point

    - The spatial instance the method was called against

    - Not within both spatial instances


    ### Works With


    - `GEOMETRY`

    - `GEOGRAPHY`


    ### OGC/Extended


    `OGC`'
