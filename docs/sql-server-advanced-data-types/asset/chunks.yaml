- fmt: "# Chapter 4: Querying and Shredding XML\n\n## Using the delete Option\n\n\
    For example, consider the script in Listing 4-24. Here, we take the XML document\
    \ produced by the query in Listing 4-22 and remove the last order line that we\
    \ added to the document.\n\n**Listing 4-24.** Using the delete Option\n\n```sql\n\
    DECLARE @SalesOrder xml;\n\nSET @SalesOrder = '\n<Order>\n  <OrderHeader>\n  \
    \  <CustomerName>Camille Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n\
    \    <OrderID>121</OrderID>\n  </OrderHeader>\n  <OrderDetails>\n    <Product\
    \ ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"\
    9\" />\n    <Product ProductID=\"111\" ProductName=\"Superhero action jacket (Blue)\
    \ M\" Price=\"30\" Qty=\"10\" />\n    <Product ProductID=\"22\" ProductName=\"\
    DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n  </OrderDetails>\n\
    </Order>' ;\n\nDECLARE @ProductName NVARCHAR(200) ;\nSET @ProductName = 'Superhero\
    \ action jacket (Blue) M' ;\n\nSET @SalesOrder.modify('\n  delete (/Order/OrderDetails/Product[@ProductName\
    \ = sql:variable(\"@ProductName\")])[1]') ;\n\nSELECT @SalesOrder ;\n```\n\nYou\
    \ can see the resultant XML document in Listing 4-25.\n\n**Listing 4-25.** Results\
    \ of Using the delete Option\n\n```xml\n<Order>\n  <OrderHeader>\n    <CustomerName>Camille\
    \ Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n\
    \  </OrderHeader>\n  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"\
    22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\"\
    \ />\n  </OrderDetails>\n</Order>\n```\n\n## Using the replace value of Option\n\
    \nThe `replace value of` option performs an update on an existing node.\n\nFor\
    \ example, the script in Listing 4-26 updates the quantity of DBA Joke Mugs ordered\
    \ from six to ten. Once again, we bind SQL variables to allow us to pass in the\
    \ `ProductName` that we wish to update and the new quantity.\n\nNote that we use\
    \ `replace value of` to define the node that should be updated and `with` to define\
    \ the new value.\n\n**Listing 4-26.** Using replace value of\n\n```sql\nDECLARE\
    \ @SalesOrder xml;\n\nSET @SalesOrder = '\n<Order>\n  <OrderHeader>\n    <CustomerName>Camille\
    \ Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n\
    \  </OrderHeader>\n  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"\
    USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"\
    22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\"\
    \ />\n  </OrderDetails>\n</Order>' ;\n\nDECLARE @ProductName NVARCHAR(200) ;\n\
    SET @ProductName = 'DBA joke mug - it depends (White)' ;\n\nDECLARE @Quantity\
    \ INT ;\nSET @Quantity = 10\n\nSET @SalesOrder.modify('\n  replace value of (/Order/OrderDetails/Product[@ProductName\
    \ = sql:variable(\"@ProductName\")]/@Qty)[1]\n  with \"10\"\n') ;\n\nSELECT @SalesOrder\
    \ ;\n```\n\nThe results of this query can be seen in Listing 4-27.\n\n**Listing\
    \ 4-27.** Results of Using replace value of\n\n```xml\n<Order>\n  <OrderHeader>\n\
    \    <CustomerName>Camille Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n\
    \    <OrderID>121</OrderID>\n  </OrderHeader>\n  <OrderDetails>\n    <Product\
    \ ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"\
    9\" />\n    <Product ProductID=\"22\" ProductName=\"DBA joke mug - it depends\
    \ (White)\" Price=\"13\" Qty=\"10\" />\n  </OrderDetails>\n</Order>\n```\n\n##\
