    | idoc        | A pointer to an internal representation of the XML document  \
    \                                                                            \
    \                                                                            \
    \                 |\n| rowpattern  | The path to the lowest level of the XML document\
    \ that should be converted to rows                                           \
    \                                                                            \
    \                              |\n| flags       | An optional parameter that specifies\
    \ the mapping between ...                                                    \
    \                                                                            \
    \                                          |"
