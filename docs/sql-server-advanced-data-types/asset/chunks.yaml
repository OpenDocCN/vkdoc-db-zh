    # 第 1 章 SQL Server 数据类型


    清单 1-6 中的脚本展示了当日期和时间值被转换为每种日期和时间数据类型时，将如何显示。该脚本使用`SYSUTCDATETIME()`函数来获取当前系统日期和时间。


    **清单 1-6.** 将值转换为每种日期和时间数据类型


    ```sql

    SELECT

    CAST(SYSUTCDATETIME() AS time(7)) AS ''TIME''

    ,CAST(SYSUTCDATETIME() AS date) AS ''DATE''

    ,CAST(SYSUTCDATETIME() AS smalldatetime) AS ''SMALLDATETIME''

    ,CAST(SYSUTCDATETIME() AS datetime) AS ''DATETIME''

    ,CAST(SYSUTCDATETIME() AS datetime2(7)) AS ''DATETIME2''

    ,CAST(SYSUTCDATETIME() AS datetimeoffset(7)) AS ''DATETIMEOFFSET''

    ;

    ```


    运行清单 1-6 中的查询结果可在图 1-4 中找到。


    **图 1-4.** 将值转换为每种日期和时间数据类型的结果


    ## 其他标准数据类型


    SQL Server 提供了许多其他可用于特殊目的的标准数据类型。这些数据类型的描述可在表 1-8 中找到。


    **表 1-8.** 杂项数据类型


    | 数据类型 | 描述 | 大小 | 允许的用途 |

    | :--- | :--- | :--- | :--- |

    | `CURSOR` | 存储游标，用于变量或存储过程输出参数 | 可变 | 变量或存储过程 OUTPUT 参数 |

    | `TIMESTAMP` | 暴露系统生成的唯一二进制值。用于表中行的版本控制 | 8 字节 | 表、变量、存储过程参数 |

    | `UNIQUEIDENTIFIER` | 存储 GUID（全局唯一标识符） | 16 字节 | 表、变量、存储过程参数 |

    | `SQL_VARIANT` | 可存储多种数据类型的数据。当您不知道将要输入的数据的数据类型时可以使用，但这是一种非常糟糕的做法 | 可变 | 表、变量、存储过程参数
    |

    | `TABLE` | 在变量中存储结果集，供以后使用 | 可变 | 变量 |


    清单 1-7 中的脚本创建了一个`UNIQUEIDENTIFIER`数据类型的值，该值是使用`NEWID()`系统函数创建的。


    **清单 1-7.** 创建 `UNIQUEIDENTIFIER`


    ```sql

    SELECT NEWID();

    ```


    运行清单 1-7 中的查询结果可在图 1-5 中找到。


    **图 1-5.** 查看使用`NEWID()`创建的`UNIQUEIDENTIFIER`


    ## 高级数据类型概述


    SQL Server 提供了多种高级数据类型。这些数据类型将在本书中讨论，但其概述可在表 1-9 中找到。


    **表 1-9.** 高级数据类型


    | 数据类型 | 描述 |

    | :--- | :--- |

    | `HIERARCHYID` | `HierarchyID` 可用于以十六进制形式存储层次结构数据，例如部门结构的 BoM（物料清单）。该数据类型公开了许多方法，使开发人员能够轻松地导航层次结构。
    |

    | `XML` | 用于以本机 XML 格式存储数据。然后可以使用 FLWOR（在第 4 章讨论）语句对数据进行操作。 |

    | `JSON` | 以本机 JSON 格式存储数据。SQL Server 提供了函数来转换 JSON 数据、从 JSON 中提取值以及修改 JSON 数据。
    |

    | `GEOGRAPHY` | 使用圆形地球模型存储位置数据。该数据类型公开了许多可用于与地理空间数据交互的方法。 |

    | `GEOMETRY` | 使用平面地球模型存储位置数据。该数据类型公开了许多可用于与地理空间数据交互的方法。 |


    使用`CONVERT()`函数处理`XML`数据时可用的样式选项详见表 1-10。


    **表 1-10.** `XML` 数据的样式选项


    | 样式代码 | 输出 |

    | :--- | :--- |

    | 0 | 默认值。丢弃不需要的空白，不允许创建内部 DTD |

    | 1 | 保留所有空白 |

    | 2 | 丢弃不需要的空白，但允许有限的 DTD 处理 |

    | 3 | 保留空白并允许有限的 DTD 处理 |


