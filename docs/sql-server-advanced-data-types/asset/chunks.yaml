  trans: "\n# 第 12 章 处理层次数据和 HierarchyID\n\n一个 `HierarchyID` 列来维护层次结构，然而，我们的代码被大大简化了，如代码清单\
    \ 12-18 所示。\n\n### 代码清单 12-18. 使用 IsDescendantOf()\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.IsDescendantOf(0x68) = 1 ;\n```\n\n与递归 CTE 不同，功能等价的代码是一个简单的查询，带有一个\
    \ `WHERE` 子句，该子句基于节点是否为美洲聚合区域的后代来过滤层次节点。代码清单 12-19 展示了一个更复杂的例子。在这里，我们对销售区域进行参数化，并计算不仅包括总的\
    \ `SalesYTD`，还包括 `TotalSalesPeople` 和该区域的 `AverageSalesPerSalesPerson`。\n\n###\
    \ 代码清单 12-19. 对 IsDescendantOf() 查询进行参数化\n\n```sql\nUSE WideWorldImporters\nGO\n\
    \nDECLARE @Region NVARCHAR(20) = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID\
    \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n \
    \   WHERE SalesAreaName = @Region\n) ;\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n\
    \    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople)\
    \ AS\n      AverageSalesPerSalesPerson\nFROM Sales.SalesAreaHierarchyID\nWHERE\
    \ SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy) = 1 ;\n```\n\n你可以清楚地看到 `Region`\
    \ 参数如何能被传递到存储过程中，这样应用程序就可以访问这段代码。\n\n现在，让我们在 `SELECT` 列表中添加一个 `SalesAreaName`，并按此列进行分组，如代码清单\
    \ 12-20 所示。\n\n### 代码清单 12-20. 添加 GROUP BY\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nDECLARE @Region NVARCHAR(20) = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID\
    \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n \
    \   WHERE SalesAreaName = @Region\n) ;\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n\
    \    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople)\
    \ AS\n      AverageSalesPerSalesPerson\n    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy) = 1\nGROUP BY SalesAreaName\
    \ ;\n```\n\n![](img/index-383_1.jpg)\n\n此查询的结果如图 12-13 所示。\n\n### 图 12-13. 结合使用\
    \ IsDescendantOf() 与 GROUP BY 的结果\n\n此查询结果揭示的一个有趣行为是 `America` 被包含在内。这是因为 `HierarchyID`\
    \ 将 `America` 视为其自身的后代。这对我们来说不会造成问题，因为聚合不是预先计算好的。然而，在某些情况下，你可能需要将 `America` 从结果集中排除。这可以通过在\
    \ `WHERE` 子句中添加一个额外的过滤器轻松实现，如代码清单 12-21 所示。\n\n### 代码清单 12-21. 从后代中过滤掉当前节点\n\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region NVARCHAR(20) = 'America'\
    \ ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
    \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = @Region\n) ;\n\
    \nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople) AS\
    \ TotalSalesPeople\n    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n      AverageSalesPerSalesPerson\n\
    \    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
    \ = 1\n    AND SalesAreaHierarchy <> @RegionHierarchy\nGROUP BY SalesAreaName\
    \ ;\n```\n\n此查询过滤结果集，排除了其层次节点等于传递给 `IsDescendantOf()` 方法的层次节点的销售区域。这种技术允许我们在 `GROUP\
    \ BY` 上使用 `WITH ROLLUP` 子句，并结合用 `ISNULL()` 函数包装 `SalesAreaName`，以为整个美洲区域生成一个小计行。这在代码清单\
    \ 12-22 中进行了演示。\n"
- fmt: "# Chapter 12 Working With Hierarchical Data and HierarchyID\n\n## Listing\
    \ 12-22. Producing a Total Row for America\n\n```sql\nUSE WideWorldImporters\n\
    GO\n\nDECLARE @Region NVARCHAR(20) = 'America';\n\nDECLARE @RegionHierarchy HIERARCHYID\
    \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n \
    \   WHERE SalesAreaName = @Region\n);\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD,\n\
    \    SUM(CountOfSalesPeople) AS TotalSalesPeople,\n    SUM(SalesYTD) / SUM(CountOfSalesPeople)\
    \ AS AverageSalesPerSalesPerson,\n    ISNULL(SalesAreaName, @Region)\nFROM Sales.SalesAreaHierarchyID\n\
    WHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy) = 1\n    AND SalesAreaHierarchy\
    \ <> @RegionHierarchy\nGROUP BY SalesAreaName WITH ROLLUP;\n```\n\nThe results\
    \ of this query can be seen in Figure [12-14](#index_split_003.html#p385).\n\n\
    ## Figure 12-14. Results of adding a total row\n\n![](index-385_1.jpg)\n\n## Indexing\
    \ HierarchyID Columns\n\nThere are no “special” index types that support `HierarchyID`,\
    \ as there are for `XML` or geospatial data types. Instead, the performance of\
    \ `HierarchyID` columns can be improved by using traditional clustered and nonclustered\
    \ indexes. When creating indexes to support `HierarchyID`, there are two strategies\
    \ that can be employed, depending on the nature of the queries that will use the\
    \ indexes.\n\nBy default, creating an index on a `HierarchyID` column will create\
    \ a depth-first index. This means that descendants will be stored close to their\
    \ parents. In our example, New York would be stored close to Eastern, which in\
    \ turn would be stored close to USA, and so on. The script in [Listing 12-23](#index_split_003.html#p386)\
    \ demonstrates how to create a clustered index on the `SalesAreaHierarchy` column,\
    \ which uses a depth-first approach.\n\n**Caution**: The script first drops the\
    \ primary key on the `SalesAreaID` column, which implicitly drops the clustered\
    \ index on this column. The primary key name, in this case, is system-generated.\
    \ Therefore, to run this script, you must change the name of the constraint to\
    \ reflect your own system.\n\n## Listing 12-23. Creating a Depth-First Clustered\
    \ Index\n\n```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE Sales.SalesAreaHierarchyID\n\
    DROP CONSTRAINT PK__SalesAre__DB0A1ED5D7B258FB;\nGO\n\nCREATE CLUSTERED INDEX\
    \ SalesAreaHierarchyDepthFirst\nON Sales.SalesAreaHierarchyID(SalesAreaHierarchy);\n\
    GO\n```\n\nWe can see how SQL Server has organized this data by running the query\
    \ in [Listing 12-24](#index_split_003.html#p387). This query uses the undocumented\
    \ `sys.fn_PhysLocFormatter()` function to return the exact location of each record,\
    \ in the format `FileID:PageID:SlotID`.\n\n## Listing 12-24. View Location of\
    \ Rows\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName,\n \
    \   sys.fn_PhysLocFormatter(%%physloc%%) AS PhysicalLocation\nFROM Sales.SalesAreaHierarchyID;\n\
    ```\n\nThis query returns the results shown in [Figure 12-15](#index_split_003.html#p388).\
    \ You can see that each node is stored under its parent. This is even true for\
    \ Spain, despite us adding it after the other regions, which means its original\
    \ location would have been the final used slot in the page.\n\n![](index-388_1.jpg)\n\
    \n## Figure 12-15. Results of viewing row locations\n\n**Tip**: The row’s physical\
    \ location is likely to be different when you run the query yourself.\n\nThe other\
    \ possible indexing strategy is a breadth-first technique. Here, sibling nodes\
    \ will be stored close to each other, instead of storing descendants close to\
    \ each other. To implement a breadth-first indexing strategy, we must add to our\
    \ table an additional column that stores the hierarchical level of each node.\
    \ This column can be created and populated by using the script in [Listing 12-25](#index_split_003.html#p389).\n\
    \n## Listing 12-25. Adding a Level Column to Support Breadth-First Indexing\n\n\
    ```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE Sales.SalesAreaHierarchyID ADD\n\
    \    SalesAreaLevel INT NULL;\nGO\n\nUPDATE Sales.SalesAreaHierarchyID\n```"
