    \ 11-1 详细列出了可用于构造几何对象的方法，这些方法均来自 OGC 规范，并通过 `GEOMETRY` 和 `GEOGRAPHY` 两种类型提供。\n\
    \n***表 11-1.** 构造几何对象的方法*\n\n**空间类型** | **来自 WKT** | **来自 WKB**\n--- | --- | ---\n\
