    Instead of using elements, as in the XML document, the JSON document consists
    simply of name/value pairs in an array of JSON objects. A root node, called `SalesPeople`,
    has also been added.


    The most obvious observation about the JSON document is that the character count
    is much shorter, largely due to the lack of closing tags. The main consequence
    of this is that the document is easier to parse, and there is less information
    to be transferred between application tiers. Arguably, the document is also more
    human-readable. These advantages have made JSON a very popular choice with application
    developers.


    The main disadvantage of the JSON document is that it cannot be bound to a schema
    in the way that XML can. The impact of this is that although the document can
    be parsed, to ensure that it has valid syntax, it isn’t possible (without custom
    code) to ensure that it meets the contract expected by the recipient before sending.


    Other than the differences mentioned, despite their different appearance, the
    documents are actually quite similar. They are both self-describing, extensible
    documents that can be used for data-interchange. Both formats are widely used
    and work with many `REST` APIs and web service end points.


    **Tip**: `REST` is short for representational state transfer. It is an architectural
    style of providing a uniform interface, often between layers of an application.
    It provides a stateless approach, with client/server separation.


    ## JSON Usage Scenarios


    There are many use cases for JSON data within `SQL Server`. The following sections
    will introduce some of these potential uses.


    ### n-Tier Applications with Rest APIs


    Modern apps often have a lot of logic at the client side. The application tier
    of the application often has to have complex code, or even multiple sublayers,
    to broker a conversation between the client and the back-end `RDBMS`. This is
    because you will have to use an object relational mapper to execute the query
    against the database, write these results into data transfer object, and then
    serialize the results in JSON format before they can be sent to the client.


    With JSON support in `SQL Server`, however, you can simply expose the data from
    `SQL Server` to a `REST` API and return the data in JSON format, meaning that
    the application tier can simply send the data as is to the client. While there
    may be resistance to this approach from middle-tier purists, it certainly allows
    architects to simplify the application design.


    ### De-Normalizing Data


    Using a normalized data model is perfect when high-frequency updates are made
    to data. In a normalized model, data is separated into multiple tables, which
    are joined together using primary and foreign key constraints, with the intention
    of storing data only once. For example, if customers have multiple addresses,
    then core details about a customer, such as name and phone number, may be stored
    in a table called `Customers`. Their addresses may then be stored in a separate
    table called `CustomerAddresses`, which contains a foreign key (`CustomerID`),
    which joins to the primary key of the `Customers` table. This means that the core
    details about the customer are only stored once, as opposed to having to repeat
    the details for every address.


    **Tip**: While a detailed discussion of normalization is beyond the scope of this
    book, a full discussion can be found in *Expert Scripting and Automation for SQL
    Server DBAs* (Apress, 2016).


    A traditional normalized model can cause issues in some instances, however. For
    example, performance can decrease when data is split across multiple tables and
    joined together in a `SELECT` statement, owing to the matching of primary and
    foreign key values that is required. Also, when data is updated across multiple
    tables, a transaction must be used, to ensure a consistent update. This can lead
    to locking issues, in which pessimistic isolation levels are in use, or `IO` performance
    issues, in which optimistic isolation levels are used.


    **Tip**: A full discussion of transaction isolation levels can be found in *Pro
    SQL Server Administration* (Apress, 2015).


    To work around this issue, data architects will sometimes use `NoSQL` structures
    to store details of entities such as customers, so that logical entities can be
    stored as a single record. Coincidently, JSON is often the format used for these
    records. This approach creates its own issues, however, when the `NoSQL` data
    must be combined with data that is still stored in a relational format.


    JSON can help resolve these kinds of modeling challenges, by allowing the JSON
    record to be stored in a table in `SQL Server`, meaning that updates can be made
    to a single table, while the table can still easily be joined back to relational
    data.


    ### Config As Code


    In DevOps environments, there is a requirement to have infrastructure as code,
    platforms as code, and config as code. Essentially, an entire virtual estate will
    be written in code, so that it is highly portable between data centers or, more
    commonly, between data centers and the cloud. It is also highly recoverable, in
    the event of a disaster, such as the loss of a data center.


    `SQL Server` management has been slow to be incorporated into the DevOps space,
    because there is a lack of crossover skills between `SQL Server` and desired state
    configuration tooling, such as `Chef` and `Puppet`. The `DBA` world is slowly
    starting to get on board, however, and as part of an `SQL Server`-platform-as-code
    approach, a configuration management database (`CMDB`) will often be used on a
    central management server, to store the details of member servers (`SQL Server`
    VMs) within the estate.


    A central management server (in this context) refers to an instance of `SQL Server`
    that is used to help `DBA`s manage the rest of the `SQL Server` estate. It will
    often be the master server in `SQL Server Agent` master/target job configurations
    and may have other management features installed, such as Management Data Warehouse,
    which is used as a central hub for `SQL Server` monitoring.


    When a platform-as-code approach is being used, however, a config-as-code approach
    should be applied alongside. In the `SQL Server` world, this involves being able
    to rebuild the `CMDB` from code, which is stored in a source control provider,
    such as `GitHub` of `TFS`.


    Config as code for the `SQL Server` `CMDB` can easily be managed with a circular
    process. The first step in this process is a `Server Agent` job, which will periodically
    run and export the data from the tables into JSON files in the operating system.
    These files will then be pushed to a source-control repository and checked in.


    When a desired state configuration management tool such as `Chef` or `Puppet`
    builds a new central management server, it will look, in the source control repository,
    to find the JSON files containing the configuration'
