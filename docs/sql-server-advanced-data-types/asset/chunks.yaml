- fmt: '# Chapter 10 Understanding Spatial Data


    **Tip** Practical examples of creating and working with primitive geometries and
    geometry collections can be found in Chapter [11](#index_split_002.html#p308).


    ## Spatial Data Standards


    Spatial data in SQL Server has been implemented around the standards set out by
    the Open Geospatial Consortium (OGC). These standards can be found at [www.opengeospatial.org/standards/gml](http://www.opengeospatial.org/standards/gml).


    The following sections will provide an overview of the spatial surfaces available
    within SQL Server and how they can be represented, using well-known text and well-known
    binary. I will also discuss spatial reference systems.


    ## Well-Known Text


    The OGC lays out two methods of referencing spatial data: well-known text (WKT)
    and well-known binary (WKB). I’ll first discuss WKT, and how each geometry can
    be specified using this approach. Table [10-3 details the WKT](#index_split_002.html#p297)
    for each primitive geometry.


    ### Table 10-3. Primitive Geometry WKT


    | **Geometry** | **WKT** | **Description** |

    | :--- | :--- | :--- |

    | Point | `POINT(x y z m)` | x indicates the x axis or longitude; y indicates
    the y axis or latitude; z is optional and indicates the elevation; m is optional
    and indicates the measure. |

    | linestring | `LINESTRING(POINT 1, POINT 2, POINT n)` |  |

    | Circularstring | `CIRCULARSTRING(start POINT, Anchor POINT 1, Anchor POINT n,
    end POINT)` |  |

    | CompoundCurve | `COMPOUNDCURVE((POINT 1, POINT n), CIRCULARSTRING(start POINT,
    Anchor POINT, end POINT))` | When an arc segment is a Circularstring, the set
    of points must be prefixed with the geometry type. When the arc segment is a linestring,
    there is no need to specify the geometry type. |

    | Polygon | `POLYGON((POINT 1, POINT 2, POINT n))` | Polygon can also contain
    an inner Polygon, by defining a second set of points within parentheses, separated
    by a comma. |

    | CurvePolygon | `CURVEPOLYGON((CIRCULARSTRING(POINT 1, POINT 2, POINT n)))` |
    A CurvePolygon can also contain an inner CurvePolygon, by defining a second set
    of points within parentheses, separated by a comma. |


    *(continued)*


    | **Geometry** | **WKT** | **Description** |

    | :--- | :--- | :--- |

    | ... | ... | ... |


    Table [10-4 details the WKT](#index_split_002.html#p298) for multipart geometries.


    ### Table 10-4. Multipart Geometry WKT


    | **Geometry** | **WKT** |

    | :--- | :--- |

    | MultiPoint | `MULTIPOINT((POINT 1),(POINT n))` |

    | Multilinestring | `MULTILINESTRING((POINT 1, POINT n), (POINT 1, POINT n))`
    |

    | MultiPolygon | `MULTIPOLYGON((POINT 1, POINT 2, POINT n),(POINT 1, POINT 2,
    POINT n))` |

    | geometryCollection | `GEOMETRYCOLLECTION(GEOMETRYTYPENAME(POINT n),GEOMETRYTYPENAME(POINT
    n))` |


    ## Well-Known Binary


    WKB can also be used to represent a geometry. This binary data is usually represented
    as a hexadecimal value. When working with WKB, you can control the order of bytes
    before specifying the surface type and, finally, the points specification. This
    section will discuss how each of the bytes in WKB are used.


    The first byte indicates the byte order, in which `00` is big endian and `01`
    is little endian.


    **Tip** Big endian means that the least significant byte in the sequence is stored
    last, and little endian means that the least significant byte is stored first.


    The following four bytes represent the type of surface being defined. Table [10-5](#index_split_002.html#p299)
    describes the integer codes for each of these bytes.


    ### Table 10-5. WKB Surface Type Integer Codes


    | **Type** | **2D** | **Z** | **M** | **ZM** |

    | :--- | :--- | :--- | :--- | :--- |

    | Point | | | | |

    | linestring | | | | |

    | Circularstring | | | | |

    | CompoundCurve | | | | |

    | Polygon | | | | |

    | CurvePolygon | | | | |

    | MultiPoint | | | | |

    | Multilinestring | | | | |

    | MultiPolygon | | | | |

    | geometryCollection | | | | |


    The remaining bytes consist of eight-byte floats, which describe the points. For
    example, imagine a `POINT`, with coordinates `4, 2`. Using big endian, the hexadecimal
    representation would be `0x0101000000000000000000104000000000000000040`. If we
    break this down into its constituent parts:

    - `01`—Indicates the byte direction

    - `01000000`—Indicates the surface type

    - `0000000000001040`—Indicates the x axis

    - `0000000000000040`—Indicates the y axis


    **Tip** each byte is represented by a two-character hexadecimal.


    ```

    0x0101000000000000000000104000000000000000040

    ```'
