    \ |\n| 106 | | `dd mon yy` |\n| 107 | | `Mon dd, yy` |\n| 8 or 108 | | `hh:mi:ss`\
    \ |\n| 9 or 109 | Default style (100) + time | `mon dd yyyy hh:mi:ss:mmmAM (or\
