- fmt: "# Chapter 2 Understanding XML\n\nNewcomers to XML are often confused by the\
    \ difference between a well-formed XML document and a valid XML document. Even\
    \ if an XML document is well-formed, it is not considered valid, unless its components\
    \ conform to the details provided in an associated schema. The original form of\
    \ the XML schema was known as a `DTD` (document type definition), but now it is\
    \ known as an `XSD` (XML schema definition). `DTD` schemas are not supported by\
    \ `SQL Server`, so the focus of this chapter will be on understanding `XSD` schemas.\n\
    \n## Understanding XSD Schemas\n\nThe format of an XML document can be defined\
    \ by an `XSD` schema. An `XSD` schema will define the document’s structure, including\
    \ data types, if complex types (complex elements) are allowed, and how many times\
    \ an element must occur (or is limited to occurring) within a document. It also\
    \ defines the sequence of elements and if an element is mandatory. The main components\
    \ of an `XSD` schema are as follows:\n\n- Element declarations, defining the properties\
    \ of an elements:\n  - Element name\n  - Element default value\n  - Element type\n\
