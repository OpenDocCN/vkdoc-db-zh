    \ := /SalesOrders/Order/OrderHeader/CustomerName\nwhere $product = \"Dinosaur\
    \ battery-powered slippers (Green) M\"\n   or $product = \"Dinosaur battery-powered\
    \ slippers (Green) XL\"\norder by $product\nreturn\n<Customer>\n  {$customer[1]}\n\
    \  <OrderDetails>\n    {$product}\n  </OrderDetails>\n</Customer>\n') ;\n```\n\
    \n## Modifying XML Data\n\nXML data can be modified using XQuery’s `modify` method.\
    \ When using `modify`, a developer has three options. You can use the `insert`\
