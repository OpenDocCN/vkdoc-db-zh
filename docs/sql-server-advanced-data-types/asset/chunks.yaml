    **描述**


    `allow row Locks`

    指定在访问索引时是否可以获取行锁。


    `allow page Locks`

    指定在访问索引时是否可以获取页锁。


    `Maxdop`

    对构建主 XML 索引没有影响，因为此操作始终是单线程的。


    `sort in tempdB`

    如果指定，`sort in tempdB` 将导致中间结果集存储在 `tempdB` 中，而不是用户数据库。这可能意味着索引构建得更快。


    ( *续表* )


    ***表 5-1.*** ( *续表* )


    **选项**

    **描述**


    `Fill Factor`

    指定在索引最低级别的每个索引页上将保留的空闲空间百分比。默认值为 0（100% 满），意思将只留下足以容纳单行的空间。指定低于 100 的百分比（例如，指定
    70）将留下 30% 的空闲空间，如果可能频繁进行行插入，则可以减少页拆分。


    `pad Index`

    将填充因子（见上文）应用于 B 树的中间级别。


    或者，可以通过 T-SQL 创建索引，你可以使用清单 5-4 中的脚本。


    ***清单 5-4.*** 创建主 XML 索引


    ```sql

    USE WideWorldImporters

    GO

    CREATE PRIMARY XML INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary]

    ON Sales.OrderSummary ([OrderSummary]) ;

    GO

    ```


    ## 辅助 XML 索引


    辅助 XML 索引只能创建在已经具有主 XML 索引的 XML 列上。在后台，辅助 XML 索引实际上是内部节点表上的非聚集索引。辅助 XML 索引可以提升使用特定类型
    XQuery 处理的查询性能。


    `PATH` 辅助 XML 索引构建在节点表的 `Node ID` 和 `VALUE` 列上。此类索引可提升使用路径表达式的查询的性能，例如 `exists()`
    XQuery 方法。`VALUE` 辅助 XML 索引与此相反，构建在 `VALUE` 和 `Node ID` 列上。此类索引将提升搜索值的查询的性能，而无需知道包含所搜索值的
    XML 元素或属性的名称。


    最后，`PROPERTY` 辅助 XML 索引构建在基表的聚集索引键、节点表的 `Node ID` 和 `VALUE` 列上。如果查询试图从列的多个元组中检索节点，此类索引的性能非常好。


    ## 创建辅助 XML 索引


    要在 SSMS 中创建辅助 XML 索引，请在对象资源管理器中依次展开 `数据库` ➤ `WideWorldImporters` ➤ `表` ➤ `OrderSummary`。接下来，从
    `索引` 节点的上下文菜单中选择 `新建索引` ➤ `辅助 XML 索引`。这将显示新建索引对话框，如图 5-8 所示。


    ![](img/index-185_1.jpg)


    ***图 5-8.** 新建索引对话框（辅助 XML）*


    在新建索引对话框的“常规”选项卡上，我们首先为索引赋予一个描述性名称。接下来，我们从 `主 XML 索引` 下拉列表中选择适当的主 XML 索引。最后，我们从
    `辅助 XML 索引类型` 下拉框中选择希望创建的辅助 XML 索引类型。在此例中，我们选择创建 `PATH` 索引。


    图 5-9 展示了新建索引对话框的“选项”选项卡。每个选项的详细信息，请参阅表 5-1。


    ![](img/index-186_1.jpg)


    ***图 5-9.** 新建索引对话框 — 选项选项卡（辅助 XML 索引）*


    或者，要使用 T-SQL 创建此索引，你可以使用以下脚本：

    '
- fmt: '# Chapter 5 XML Indexes


    ## Performance Considerations for XML Indexes


    In order to discuss the performance of XML indexes, let’s write a query that is
    well-suited to the PATH secondary XML index that we have created on the `OrderSummary`
    table. The query in Listing 5-6 runs a query against the `OrderSummary` table
    and returns all rows indicating customers who have ordered the Chocolate echidnas
    250g product, which has a `StockItemID` of 223. The first part of the script removes
    unchanged pages from the buffer cache and drops the plan cache, making it a fair
    test. The middle part of the script turns on time statistics, so we can accurately
    tell how long the query took to run.


    **Tip** performance will vary, based on the specification of your server and how
    many resources are being consumed by concurrent processes. You should always check
    performance within your own environment.


    ### Listing 5-5. Creating a Secondary XML Index


    ```sql

    USE WideWorldImporters


    GO


    CREATE XML INDEX [SecondaryXmlIndex-OrderSummary-Path]

    ON Sales.OrderSummary (OrderSummary)

    USING XML INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary] FOR PATH ;


    GO

    ```


    ### Listing 5-6. Return Rows Where Customers Have Ordered StockItemID 223


    ```sql

    --Clear buffer cache and plan cache

    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    --Turn on IO statistics to appear with results

    SET STATISTICS TIME ON

    GO


    --Run query

    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    The statistics shown in Figure 5-10 show that the query took 1.95 seconds to complete.


    ### Figure 5-10. Query results with PATH index


    Now let’s use the script in Listing 5-7 to drop the PATH index and run the query
    again. This time, only the primary XML index is available for use.


    ### Listing 5-7. Run Query Without PATH Index


    ```sql

    DROP INDEX [SecondaryXmlIndex-OrderSummary-Path] ON Sales.OrderSummary ;

    GO


    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    SET STATISTICS TIME ON

    GO


    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    This time, as we can see from the statistics in Figure 5-11, the query took more
    than 2.7 seconds to complete.


    ### Figure 5-11. Query results without PATH index


    Finally, let’s use the script in Listing 5-8 to drop the primary XML index, and
    run the query again, with no XML index support.


    ### Listing 5-8. Drop Primary XML Index and Rerun Query


    ```sql

    DROP INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary] ON Sales.OrderSummary ;

    GO


    DBCC DROPCLEANBUFFERS

    DBCC FREEPROCCACHE

    GO


    SET STATISTICS TIME ON

    GO


    SELECT *

    FROM Sales.OrderSummary

    WHERE OrderSummary.exist(''/SalesOrders/Order/OrderDetails/Product/.[@ProductID
    = 223]'') = 1 ;

    ```


    You will notice from the statistics in Figure 5-12 that the query execution time
    has now risen to more than 4 seconds. While our table only has fewer than 700
    rows and results you see will vary, depending on the performance of your machine,
    this example shows why creating XML indexes is so important.


    ### Figure 5-12. Results of query with no XML indexes


    ## Summary


    Specialized XML indexes can be created on XML columns, to improve the performance
    of queries that rely on interrogating XML data. There are four types of XML Index:
    Primary, Secondary PATH, Secondary VALUE, and Secondary PROPERTY.


    A primary XML index cannot be created on an XML column, unless the table has a
    clustered primary key (a clustered index built on a primary key column). A secondary
    XML cannot be created unless a primary XML index already exists on the XML column.
    XML indexes can be created before a table is populated with data, however.'
