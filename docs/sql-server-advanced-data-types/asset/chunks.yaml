- fmt: "# Chapter 4 Querying and Shredding XML\n\n## Figure 4-8. Results of using\
    \ for to iterate over product elements\n\nThe query in Listing 4-14 uses a `let`\
    \ statement, instead of a `for` iteration, to retrieve the name of the first product,\
    \ within the first order, within the XML document. The `return` statement requires\
    \ a singleton value, and as `let` simply assigns a value, as opposed to iterating\
    \ over multiple values, we cannot return multiple products.\n\n### Listing 4-14.\
    \ Using let to Find a Product Name\n\n```xquery\nSELECT @XML.query('\nlet $product\
    \ := /SalesOrders/Order[1]/OrderDetails/Product/@ProductName\nreturn string($product[1])\n\
    ') ;\n```\n\nThe results of this query can be found in Figure 4-9.\n\n## Figure\
    \ 4-9. Results of using let to find a product name\n\nThe query in Listing 4-15\
    \ combines both a `for` statement and a `let` statement to construct a new XML\
    \ document containing the customer name and product name for each product sold.\n\
    \n### Listing 4-15. Combining for and let\n\n```xquery\nSELECT @XML.query('\n\
    for $product in /SalesOrders/Order/OrderDetails/Product/@ProductName\nlet $customer\
    \ := /SalesOrders/Order/OrderHeader/CustomerName\nreturn\n<Customer>\n  {$customer[1]}\n\
    \  <OrderDetails>\n    {$product}\n  </OrderDetails>\n</Customer>\n') ;\n```\n\
    \nThe resultant XML document can be found in Listing 4-16.\n\n### Listing 4-16.\
    \ Results of Combining for and let\n\n```xml\n<Customer>\n  <CustomerName>Tailspin\
    \ Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"Dinosaur battery-powered\
    \ slippers (Green) M\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin Toys\
    \ (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"RC toy sedan car\
    \ with remote control (Green) 1/50 scale\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin\
    \ Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"Black and orange\
    \ glass with care despatch tape 48mmx100m\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin\
    \ Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"Alien officer\
    \ hoodie (Black) 3XL\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin Toys\
    \ (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"Developer joke mug\
    \ - that's a hardware problem (Black)\" />\n</Customer>\n<Customer>\n  <CustomerName>Tailspin\
    \ Toys (Absecon, NJ)</CustomerName>\n  <OrderDetails ProductName=\"Dinosaur battery-powered\
    \ slippers (Green) XL\" />\n</Customer>\n```\n\nThe query in Listing 4-17 enhances\
    \ the query in Listing 4-15, to add a `where` statement, which will filter the\
    \ products, so that only the dinosaur slippers are returned. The query also uses\
    \ an `order by` statement, to guarantee that the order of the results is by product\
    \ name.\n\n### Listing 4-17. Using where and order by\n\n```xquery\nSELECT @XML.query('\n\
