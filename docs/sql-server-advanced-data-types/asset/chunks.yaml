    **Data T**


    SMALLMONEY


    MONEY


    ChApTEr 1 SQL SErvEr DATA TypES


    **Tip** The caret (^) operator means to the power. For example,


    2^15-1 means 2 to the power of 15 minus 1, which equates to


    32,767.


    To see how a number behaves, using each of the numeric formats, we


    will use the number 2.5888712345678923456789 and convert it to each of


    the numeric data types, to examine its behavior. In SQL Server, there are two
    functions that we can use to change the data type of a value: CAST and CONVERT.


    The CAST function uses the syntax in Listing [1-1](#index_split_000.html#p19).


    ***Listing 1-1.*** CAST Syntax


    CAST( expression AS datatype[(length)] )


    The expression can be either a value that you wish to convert, a


    column in a table, or any other valid expression. The datatype should be


    the target data type for the expression. length is optional and based on


    the target data type. For example, if you were using CAST to change the


    data type of an INT to a DECIMAL, length would consist of the required


    precision and scale. If you were casting a value to a string, the length would
    be the maximum length of the string.


    The CONVERT function uses the syntax in Listing [1-2](#index_split_000.html#p19).


    ***Listing 1-2.*** CONVERT Syntax


    CONVERT( datatype[(length)], expression [, style] )


    The style option of the CONVERT function allows the developer to


    supply additional information about how to translate the expression.'
  trans: '

    # SQL Server 数据类型


    ## 精确数值类型


    ### NUMERIC 和 DECIMAL


    `NUMERIC` 和 `DECIMAL` 在功能上是等价的。它们用于存储具有固定精度和小数位数的数字。


    使用这些数据类型时，必须指定精度（`precision`）和小数位数（`scale`）。

    *   **精度** 是可以存储的总位数。

    *   **小数位数** 是小数点后的位数。


    例如，数字 `123.456` 可以用精度 `6` 和小数位数 `3` 来存储。


    #### 存储空间


    所需存储空间取决于精度，如下所示：

    *   1-9 – 5 字节

    *   10-19 – 9 字节

    *   20-28 – 13 字节

    *   29-38 – 17 字节


    ## 近似数值类型


    ### FLOAT、REAL


    `REAL` 是 `FLOAT(24)` 的同义词。`FLOAT` 用于存储具有近似精度的数字。

    *   如果未指定精度，`FLOAT` 使用双精度（8 字节）。

    *   如果精度在 1 到 24 之间，则使用单精度（4 字节），也称为 `real`。

    *   如果精度在 25 到 54 之间，则使用双精度（8 字节）。


    单精度近似于 7 位数字，存储空间为 4 字节。双精度近似于 15 位数字，存储空间为 8 字节。


    **近似数值类型范围：**

    *   单精度：`-1.79E+308` 到 `-2.23E-308` 以及 `2.23E-308` 到 `1.79E+308`

    *   双精度：`-1.79E+308` 到 `-2.23E-308` 以及 `2.23E-308` 到 `1.79E+308`


    ## 精确数值类型（货币）


    ### SMALLMONEY


    存储小的货币值，精度为四位小数。范围从 `-214,748.3648` 到 `214,748.3647`，存储空间为 4 字节。


    ### MONEY


    存储大的货币值，精度为四位小数。范围从 `-922,337,203,685,477.5808` 到 `922,337,203,685,477.5807`，存储空间为
    8 字节。


    **提示**：`^`（脱字符）运算符表示幂运算。例如，`2¹⁵-1` 表示 2 的 15 次方减 1，等于 `32,767`。


    ## 数据类型转换函数


    为了了解一个数字在不同数值格式下的表现，我们将使用数字 `2.5888712345678923456789` 并将其转换为每种数值数据类型，以检查其行为。在
    SQL Server 中，有两个函数可用于更改值的数据类型：`CAST` 和 `CONVERT`。


    ### CAST 函数


    `CAST` 函数的语法如下：

    ```

    CAST( expression AS datatype[(length)] )

    ```

    其中 `expression` 可以是要转换的值、表中的列或任何其他有效表达式。`datatype` 应是表达式的目标数据类型。`length` 是可选参数，具体取决于目标数据类型。例如，如果使用
    `CAST` 将 `INT` 的数据类型更改为 `DECIMAL`，则 `length` 应包含所需的精度和小数位数。如果将值转换为字符串，则 `length`
    将是字符串的最大长度。


    ### CONVERT 函数


    `CONVERT` 函数的语法如下：

    ```

    CONVERT( datatype[(length)], expression [, style] )

    ```

    `CONVERT` 函数的 `style` 选项允许开发人员提供有关如何转换表达式的附加信息。

    '
- fmt: "# Chapter 1 SQL Server Data Types\n\n## Numeric Data Types\n\nThe style options\
    \ that are available for numeric data types can be found in [Table 1-2.](#index_split_000.html#p20)\n\
    \n**Table 1-2.** Numeric Data Type Style Options\n\n| Style Code | Data Types\
    \ | Output |\n| :--- | :--- | :--- |\n| `FLOAT & REAL` | The default value for\
    \ `FLOAT` and `REAL`. | A maximum of six digits. Uses scientific notation, if\
    \ required |\n| `FLOAT & REAL` | Eight digits. | Always uses scientific notation\
    \ |\n| `FLOAT & REAL` | Sixteen digits. | Always uses scientific notation |\n\
    | `FLOAT & REAL` | Seventeen digits, with lossless conversion | |\n| `SMALLMONEY\
    \ & MONEY` | The default value for `SMALLMONEY` and `MONEY`. | No comma separation,\
    \ and two digits to the right of the decimal point |\n| `SMALLMONEY & MONEY` |\
    \ Comma separation every three digits on the left of the decimal point. | Two\
    \ digits to the right of the decimal point |\n| `SMALLMONEY & MONEY` | No comma\
    \ separation. | Four digits to the right of the decimal point |\n| `SMALLMONEY\
    \ & MONEY` | Used when converting to character data types. | No comma separation.\
    \ Four digits to the right of the decimal point |\n\nThe script in [Listing 1-3](#index_split_000.html#p21)\
    \ shows how to use the `CAST` function to translate the number `2.5888712345678923456789`\
    \ to each numeric data type.\n\n**Note** `BIT` is excluded, as the conversion\
    \ does not make sense. If it were included, however, it would `CAST` to `1`.\n\
    \n### Listing 1-3. Casting a Number to Each Data Type\n\n```sql\nSELECT\n    CAST(2.5888712345678923456789\
    \ AS TINYINT) AS 'TINYINT'\n    , CAST(2.5888712345678923456789 AS SMALLINT) AS\
    \ 'SMALLINT'\n    , CAST(2.5888712345678923456789 AS INT) AS 'INT'\n    , CAST(2.5888712345678923456789\
    \ AS BIGINT) AS 'BIGINT'\n    , CAST(2.5888712345678923456789 AS DECIMAL(23,22))\
    \ AS 'DECIMAL'\n    , CAST(2.5888712345678923456789 AS DECIMAL(18,17)) AS 'DECIMAL\
    \ ROUNDED'\n    , CAST(2.5888712345678923456789 AS NUMERIC(23,22)) AS 'NUMERIC'\n\
    \    , CAST(2.5888712345678923456789 AS FLOAT(24)) AS 'SINGLE FLOAT'\n    , CAST(2.5888712345678923456789\
    \ AS FLOAT(53)) AS 'DOUBLE FLOAT'\n    , CAST(2.5888712345678923456789 AS REAL)\
    \ AS 'REAL'\n    , CAST(2.5888712345678923456789 AS SMALLMONEY) AS 'SMALLMONEY'\n\
    \    , CAST(2.5888712345678923456789 AS MONEY) AS 'MONEY'\n```\n\n![](index-22_1.png)\n\
    \nThe results of the query in [Listing 1-3](#index_split_000.html#p21) can be\
    \ found in [Figure 1-1.](#index_split_000.html#p22)\n\n**Figure 1-1.** Results\
    \ of casting to numeric data types\n\n## Character Strings\n\nSQL Server can store\
    \ both Unicode and non-Unicode strings. Strings can also be stored either as a\
    \ fixed length or a variable length. The character data types supported by SQL\
    \ Server are listed in [Table 1-3.](#index_split_000.html#p23)\n\n**Table 1-3.**\
    \ Character Data Types\n\n| Data Type | Variable/Fixed | Maximum Length | Storage\
    \ Size | Description |\n| :--- | :--- | :--- | :--- | :--- |\n| `CHAR` | Fixed\
    \ | 8,000 characters | Maximum string length × 1 byte | Stores a string of non-Unicode\
    \ characters, fixed length. If the string is shorter than the maximum length,\
    \ the string will be padded with whitespace. |\n| `VARCHAR` | Variable | 8,000\
    \ characters or `VARCHAR(MAX)` | The length of the string stored × 1 byte | Stores\
    \ a string of non-Unicode characters with a variable size. When using `VARCHAR`,\
    \ you must pass in a value, specifying the maximum length of the string. When\
    \ using `VARCHAR(MAX)`, you can store up to 2GB. |\n| `NCHAR` | Fixed | 4,000\
    \ characters | Maximum string length × 2 bytes | Stores a string of Unicode characters\
    \ with a fixed length. If the string is shorter than the maximum length, the string\
    \ will be padded with whitespace. |\n| `NVARCHAR` | Variable | 4,000 characters\
    \ or `NVARCHAR(MAX)` | The length of the string stored × 2 bytes | Stores a string\
    \ of Unicode characters with a variable size. When using `NVARCHAR`, you must\
    \ either specify a maximum length for the string or use `MAX`. When `MAX` is specified,\
    \ depending on the string that is stored, it can store up to 2GB. |\n| `TEXT`\
    \ | Variable | 2GB | The length of the string stored × 1 byte | *Deprecated data\
    \ type that should not be used.* |\n| `NTEXT` | Variable | 2GB | The length of\
    \ the string stored × 2 bytes | *Deprecated data type that should not be used.*\
    \ |"
