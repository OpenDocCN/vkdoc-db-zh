    GO


    CREATE SPATIAL INDEX [SI-Border]

    ON Application.StateProvinces (Border)

    USING GEOGRAPHY_GRID

    WITH (GRIDS =(LEVEL_1 = MEDIUM,LEVEL_2 = MEDIUM,LEVEL_3 =

    MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX = OFF,

    STATISTICS_NORECOMPUTE = OFF,

    SORT_IN_TEMPDB = OFF,

    DROP_EXISTING = OFF,

    ONLINE = OFF,

    ALLOW_ROW_LOCKS = ON,

    ALLOW_PAGE_LOCKS = ON, MAXDOP = 1)

    ON [PRIMARY] ;

    ```


    ## Summary


    Spatial objects can be constructed by using various means. They can be created
    using OGC standard methods, from either well-known text or well-known binary,
    or they can be constructed by using a Microsoft extended method from GML. SQL
    Server also supports passing well-known text directly into a variable of a table’s
    cell.


    A wealth of methods exist that allow developers to easily interact with spatial
    data. Commonly used methods include `STDistance`, which will return the distance
    between two geometries, and `STWithin`, which will check if an instance resides
    within the same space as another. There are also aggregate methods that allow
    multiple instances to have union, envelope, and convex hull applied to them as
    a group, as well as converting multiple instances to a single collection.


    SQL Server provides spatial indexes, which can improve the performance of certain
    types of queries. The index support for queries depends on the data type, the
    method in the `WHERE` or `JOIN` clause, and the arithmetic operator used.


    Spatial indexes use B-Tree structures, but before the B-Tree is created, a grid
    system of space is created, with four nested levels. The spatial instances from
    the column are then read one by one into the grid system, and their touched cells
    are numbered, using a Hilbert curve. This means that spatial instances can be
    indexed in a linear fashion, but detailing their proximity to each other.


    # CHAPTER 12: Working with Hierarchical Data and HierarchyID


    Modeling and working with data hierarchies have long been requirements for SQL
    Server developers. Traditionally, hierarchical data has been modeled using a self-join
    on a table, between two columns. One column contains the ID of the hierarchical
    member, and the other, the ID of its parent hierarchical member. Newer versions
    of SQL Server (2008 and later versions) offer `HierarchyID`, however. `HierarchyID`
    is a data type written in .NET and exposed in SQL Server. Using `HierarchyID`
    can offer performance benefits and simplified code, compared to using a table
    with a self-join. The data type exposes many methods that can be called against
    the data, to allow developers to easily determine the ancestors and descendants
    of a hierarchical member, as well as determine other useful information, such
    as the level of a specific hierarchical member within the hierarchy.


    In this chapter, we will examine first the use cases for hierarchical data. I
    will discuss how to model a traditional hierarchy, before explaining how we can
    remodel it using `HierarchyID`. Finally, we will look at the methods that are
    exposed against the `HierarchyID` data type.'
