    ## 主要 XML 索引选项


    ***Table 5-1.** Primary XML Index Options*


    **Option**

    **Description**


    `allow row Locks`

    specifies if row locks can be acquired when accessing the index


    `allow page Locks`

    specifies if page locks can be acquired when accessing the index


    `Maxdop`

    has no effect for building primary XML indexes, as this operation is always single
    threaded


    `sort in tempdB`

    If specified, `sort in tempdB` will cause the intermediate result set to be stored
    in `tempdB`, as opposed to the user database. this could mean that the index is
    built faster.


    ( *continued*)


    ***Table 5-1.*** ( *continued*)


    **Option**

    **Description**


    `Fill Factor`

    specifies a percentage of free space that will be left on each index page at the
    lowest level of the index. the default is 0 (100% full), meaning that only enough
    space for a single row will be left. specifying a percentage lower than 100, for
    example, specifying 70, will leave 30% free space and can reduce page splits,
    if there are likely to be frequent row inserts.


    `pad Index`

    applies a fill factor (see preceding) to the intermediate levels of a B-tree


    Alternatively, to create the index via T-SQL, you could use the script in Listin[g
    5-4.](#index_split_001.html#p183)


    ***Listing 5-4.*** Creating a Primary XML Index


    ```sql

    USE WideWorldImporters

    GO

    CREATE PRIMARY XML INDEX [PrimaryXmlIndex-OrderSummary-OrderSummary]

    ON Sales.OrderSummary ([OrderSummary]) ;

    GO

    ```


    ## Secondary XML Indexes


    Secondary XML indexes can only be created on XML columns that already have a primary
    XML index. Behind the scenes, secondary XML indexes are actually nonclustered
    indexes on the internal Node table. Secondary XML indexes can improve query performance
    for queries that use specific types of XQuery processing.


    A `PATH` secondary XML index is built on the `Node ID` and `VALUE` columns of
    the Node table. This type of index offers performance improvements to queries
    that use path expressions, such as the `exists()` XQuery method. A `VALUE` secondary
    XML index is the reverse of this and is built on the `VALUE` and `Node ID` columns.
    This type of index will offer performance improvements to queries that search
    for values, without knowing the name of the XML element or attribute that contains
    the value being searched for.


    Finally, a `PROPERTY` secondary XML index is built on the clustered index key
    of the base table, the `Node ID`, and the `VALUE` columns of the Node table. This
    type of index performs very well if the query is trying to retrieve nodes from
    multiple tuples of the column.


    ## Creating Secondary XML Indexes


    To create a secondary XML index in SSMS, drill through `Databases ➤ WideWorldImporters
    ➤ Tables ➤ OrderSummary` in Object Explorer. Next, select `New Index ➤ Secondary
    XML Index` from the context menu of the `Indexes` node. This will cause the New
    Index dialog box to be displayed, as illustrated in Figur[e 5-8.](#index_split_001.html#p185)


    ![](index-185_1.jpg)


    ***Figure 5-8.** New Index dialog box (Secondary XML)*


    On the General tab of the New Index dialog box, we have first given the index
    a descriptive name. Next, we select the appropriate primary XML index from the
    `Primary XML Index` drop-down list. Finally, we select the type of secondary XML
    index that we wish to create, from the `Secondary XML Index Type` drop-down box.
    In this case, we have chosen to create a `PATH` index.


    Figur[e 5-9 illus](#index_split_001.html#p186)trates the Options tab of the New
