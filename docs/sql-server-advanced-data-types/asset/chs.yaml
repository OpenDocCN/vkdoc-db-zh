  \ XML 变量或列中删除节点。\n\n\n\n"
- "# 第 4 章：查询与分解 XML\n\n## 使用 delete 选项\n\n例如，考虑清单 4-24 中的脚本。这里，我们使用清单 4-22 中的查询所生成的\
  \ XML 文档，并移除我们添加到该文档中的最后一个订单行。\n\n**清单 4-24.** 使用 delete 选项\n\n```sql\nDECLARE @SalesOrder\
  \ xml;\n\nSET @SalesOrder = '\n<Order>\n  <OrderHeader>\n    <CustomerName>Camille\
  \ Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n\
  \  </OrderHeader>\n  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"\
  USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"\
  111\" ProductName=\"Superhero action jacket (Blue) M\" Price=\"30\" Qty=\"10\" />\n\
  \    <Product ProductID=\"22\" ProductName=\"DBA joke mug - it depends (White)\"\
  \ Price=\"13\" Qty=\"6\" />\n  </OrderDetails>\n</Order>' ;\n\nDECLARE @ProductName\
  \ NVARCHAR(200) ;\nSET @ProductName = 'Superhero action jacket (Blue) M' ;\n\nSET\
  \ @SalesOrder.modify('\n  delete (/Order/OrderDetails/Product[@ProductName = sql:variable(\"\
  @ProductName\")])[1]') ;\n\nSELECT @SalesOrder ;\n```\n\n你可以在清单 4-25 中看到生成的 XML\
  \ 文档。\n\n**清单 4-25.** 使用 delete 选项的结果\n\n```xml\n<Order>\n  <OrderHeader>\n    <CustomerName>Camille\
  \ Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n\
  \  </OrderHeader>\n  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"\
  USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"\
  22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n\
  \  </OrderDetails>\n</Order>\n```\n\n## 使用 replace value of 选项\n\n`replace value\
  \ of` 选项用于对现有节点执行更新操作。\n\n例如，清单 4-26 中的脚本将 DBA Joke Mugs 的订购数量从 6 更新为 10。我们再次绑定\
  \ SQL 变量，以便传入我们希望更新的 `ProductName` 和新的数量。\n\n请注意，我们使用 `replace value of` 来定义应更新的节点，并使用\
  \ `with` 来定义新值。\n\n**清单 4-26.** 使用 replace value of\n\n```sql\nDECLARE @SalesOrder\
  \ xml;\n\nSET @SalesOrder = '\n<Order>\n  <OrderHeader>\n    <CustomerName>Camille\
  \ Authier</CustomerName>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n\
  \  </OrderHeader>\n  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"\
  USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"\
  22\" ProductName=\"DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n\
  \  </OrderDetails>\n</Order>' ;\n\nDECLARE @ProductName NVARCHAR(200) ;\nSET @ProductName\
  \ = 'DBA joke mug - it depends (White)' ;\n\nDECLARE @Quantity INT ;\nSET @Quantity\
  \ = 10\n\nSET @SalesOrder.modify('\n  replace value of (/Order/OrderDetails/Product[@ProductName\
  \ = sql:variable(\"@ProductName\")]/@Qty)[1]\n  with \"10\"\n') ;\n\nSELECT @SalesOrder\
  \ ;\n```\n\n该查询的结果见清单 4-27。\n\n**清单 4-27.** 使用 replace value of 的结果\n\n```xml\n\
  <Order>\n  <OrderHeader>\n    <CustomerName>Camille Authier</CustomerName>\n   \
  \ <OrderDate>2013-01-02</OrderDate>\n    <OrderID>121</OrderID>\n  </OrderHeader>\n\
  \  <OrderDetails>\n    <Product ProductID=\"2\" ProductName=\"USB rocket launcher\
  \ (Gray)\" Price=\"25\" Qty=\"9\" />\n    <Product ProductID=\"22\" ProductName=\"\
  DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"10\" />\n  </OrderDetails>\n\
  </Order>\n```\n\n## 分解 XML\n\n分解 XML 是指获取 XML 结果集并将其转换为关系结果集的过程。在 SQL Server 中，有两种方法可以实现这一点：`OPENXML()`\
  \ 函数和 `nodes()` XQuery 方法。\n\n### 使用 OPENXML() 分解 XML\n\n`OPENXML()` 是一个函数，它接受一个\
  \ XML 文档并将其转换为关系结果集。它接受的参数详见表 4-2。\n\n**表 4-2.** `OPENXML()` 参数\n\n| 参数 | 描述 |\n\
  |-------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
  | idoc | 指向 XML 文档内部表示的指针 |\n| rowpattern | 应转换为行的 XML 文档最低级别的路径 |\n| flags | 一个可选参数，用于指定\
  \ ... 之间的映射 |\n\n\n"
- "# 第四章 查询与分解 XML\n\n### 表 4-3. 标志值\n\n| 值 | 描述 |\n| :--- | :--- |\n| 0 (默认) | 默认使用以属性为中心的映射。除非指定了\
