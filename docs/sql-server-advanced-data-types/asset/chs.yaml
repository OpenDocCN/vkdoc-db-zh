  \ by $product\nreturn\n<Customer>\n  {$customer[1]}\n  <OrderDetails>\n    {$product}\n\
  \  </OrderDetails>\n</Customer>\n') ;\n```\n\n## 修改 XML 数据\n\n可以使用 XQuery 的`modify`方法修改\
