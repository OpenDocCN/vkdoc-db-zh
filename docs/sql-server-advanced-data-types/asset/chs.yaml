  \n\n# 第 11 章 处理空间数据\n\n## 表 11-2. 空间方法（续）\n\n### 方法\n\n`STInteriorRingN`\n\n###\
  \ 描述\n\n返回 `多边形` 的第 `n` 个内环。\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\
  \n`OGC`\n\n---\n\n### 方法\n\n`STIntersection`\n\n### 描述\n\n返回两个空间实例的几何交集。如果实例相交则返回\
  \ 1，不相交则返回 0。\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\
  \n---\n\n### 方法\n\n`STIntersects`\n\n### 描述\n\n如果空间实例相交则返回 1，否则返回 0。\n\n### 适用于\n\
  \n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STIsClosed`\n\
  \n### 描述\n\n检查空间实例的起点和终点是否相同。如果实例是闭合的则返回 1，否则返回 0。\n\n### 适用于\n\n- `GEOMETRY`\n\
  - `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STIsEmpty`\n\n### 描述\n\
  \n如果实例为空则返回 1，否则返回 0。\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n\
  `OGC`\n\n---\n\n### 方法\n\n`STIsRing`\n\n### 描述\n\n验证空间实例是否为一个 `线串` 并且是闭合且简单的。\n\
  条件：\n- 是一个 `线串`\n- 不自相交（起点和终点除外）\n- 多个对象彼此不相交（交点在两个对象边界上的情况除外）\n- 是闭合的（起点和终点相同）\n\
  \n如果所有条件都为真则返回 1，如果有一个或多个条件为假则返回 0。\n\n### 适用于\n\n- 仅 `GEOMETRY`\n\n### OGC/扩展\n\
  \n`OGC`\n\n---\n\n### 方法\n\n`STIsSimple`\n\n### 描述\n\n验证空间实例是否不自相交。\n条件：\n- 不自相交（起点和终点除外）\n\
  - 多个对象彼此不相交（交点在两个对象边界上的情况除外）\n\n如果两个条件都为真则返回 1，如果任一条件为假则返回 0。\n\n### 适用于\n\n- 仅\
  \ `GEOMETRY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STIsValid`\n\n### 描述\n\n\
  验证空间实例的格式是否正确。如果实例格式正确则返回 1，否则返回 0。\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n\
  ### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STLength`\n\n### 描述\n\n返回空间实例的总长度。对于 `多边形`，这是其周长长度。\n\
  \n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\
  \n`STNumCurves`\n\n### 描述\n\n返回空间实例中曲线的数量。对于简单几何体，始终为 0。\n\n### 适用于\n\n- 仅 `GEOMETRY`\n\
  \n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STNumGeometries`\n\n### 描述\n\n返回多部分几何体中空间对象的数量。\n\
  \n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\
  \n`STNumInteriorRing`\n\n### 描述\n\n返回 `多边形` 所包含的内环数量。\n\n### 适用于\n\n- `GEOMETRY`\n\
  - `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STNumPoints`\n\n### 描述\n\
  \n返回用于描述空间基元的点的数量。\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\
  \n---\n\n### 方法\n\n`STOverlaps`\n\n### 描述\n\n验证空间实例是否与一个简单的、多部分的几何体重叠。如果对象重叠则返回\
  \ 1，否则返回 0。使用的矩阵是作为参数传递给该方法的第二个矩阵，它描述了扩展 9 相交模型（D-9IM）定义的关系。\n\n### 适用于\n\n- `GEOMETRY`\n\
  - `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STPointN`\n\n### 描述\n\n\
  接受一个参数 `n`，这是一个从 1 开始的索引位置。返回空间实例内部的一个任意点。传递给该方法的参数是作为参数传入的。\n\n### 适用于\n\n- 仅 `GEOMETRY`\n\
  \n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STPointOnSurface`\n\n### 描述\n\n返回一个保证位于空间实例表面上的任意点。\n\
  \n### 适用于\n\n- 仅 `GEOMETRY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STRelate`\n\
  \n### 描述\n\n验证调用该方法的空间实例是否与作为参数传递的空间实例相关。关系由传递给该方法的模式矩阵定义。\n\n### 适用于\n\n- `GEOMETRY`\n\
  - `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\n---\n\n### 方法\n\n`STTouches`\n\n### 描述\n\
  \n如果实例接触则返回 1，否则返回 0。如果实例满足以下条件，则它们接触：\n- 在空间上接触一个空间实例\n- 用于定义空间点的空间实例\n- 调用该方法的空间实例\n\
  - 不同时位于两个空间实例内部\n\n### 适用于\n\n- `GEOMETRY`\n- `GEOGRAPHY`\n\n### OGC/扩展\n\n`OGC`\n\
  \n\n\n# 第 11 章 处理空间数据\n\n## 方法列表\n\n以下方法描述了对空间数据的操作。许多方法同时适用于 `GEOMETRY` 和 `GEOGRAPHY`\
  \ 数据类型，而有些则仅限于特定类型。\n\n- **`STUnion`**：返回调用此方法的空间实例与作为参数传递给该方法的空间实例的联合体。结果是一个空间实例，它定义了两个输入参数所覆盖的区域。\n\
  - **`STWithin`**：如果作为参数传递的空间实例完全位于调用该方法的空间实例内部，则返回 1，否则返回 0。\n- **`STX`**：返回调用此方法的点的空间实例的\
  \ X 坐标。\n- **`STY`**：返回调用此方法的点的空间实例的 Y 坐标。\n- **`ToString`**：返回调用此方法的空间实例的已知文本 (WKT)\
  \ 表示形式。\n- **`Z`**：返回调用此方法的点的空间实例的 Z 值。\n\n### 其他方法\n\n- **`IsValidDetailed`**：此方法由\
  \ Microsoft 作为扩展方法实现。当空间实例无效时，它会返回详细的错误代码。表 11-3 列出了可能返回的错误代码。\n- **`STSymDifference`**：返回调用此方法的空间实例与作为参数传递的空间实例之间的对称差集。\n\
  - **`STTouches`**：检查两个空间实例的边界是否接触。\n- **`STStartPoint`**：返回曲线或类似几何对象的起始点。\n- **`STSrid`**：返回空间实例的\
  \ `SRID`（空间引用标识符）。\n\n关于 `DE-9IM`（九交模型）矩阵的详细信息可以在 [此处找到](https://link.springer.com/referenceworkentry/10.1007/978-3-319-17885-1_298)。\n\
  \n## 表 11-3. `IsValidDetailed` 错误代码\n\n| 错误代码 | 描述 |\n| :--- | :--- |\n| `0` | 实例有效。\
  \ |\n| `1` | 实例无效，但原因未知。 |\n| `2` | 实例无效，因为一个点被孤立，这对该对象的类型无效。 |\n| `3` | 实例无效，因为某些多边形边重叠。\
  \ |\n| `4` | 实例无效，因为一个多边形环与自身或其他环相交。 |\n| `5` | 实例无效，因为一个多边形环与自身或其他环相交，并且无法返回环号。\
  \ |\n| `6` | 实例无效，因为一条曲线退化为一个点。 |\n| `7` | 实例无效，因为一个多边形环塌陷为一条线。 |\n| `8` | 实例无效，因为一个多边形环未闭合。\
  \ |\n| `9` | 实例无效，因为多边形环的某部分位于多边形内部。 |\n| `10` | 实例无效，因为一个环是多边形中的第一个环，但不是外环。 |\n\
  | `11` | 实例无效，因为一个环位于其多边形的外环之外。 |\n| `12` | 实例无效，因为多边形的内部不连通。 |\n| `13` | 实例无效，因为曲线中有两条重叠的边。\
  \ |\n| `14` | 实例无效，因为一条曲线的边与另一条曲线的边重叠。 |\n| `15` | 实例无效，因为多边形具有无效的环结构。 |\n| `16`\
  \ | 实例无效，因为在曲线中，边是一条线段或一条具有对跖端点的退化弧线。 |\n\n## 表 11-4. 聚合方法\n\n在使用 `GEOMETRY` 和 `GEOGRAPHY`\
  \ 数据类型时，还可以使用一些聚合方法。\n\n| 方法 | 描述 |\n| :--- | :--- |\n| `CollectionAggregate` |\
  \ 从一组空间对象创建几何集合 (`GeometryCollection`)。 |\n| `ConvexHullAggregate` | 返回一组空间对象的凸包。\
  \ |\n| `EnvelopeAggregate` | 返回一组空间对象的边界空间对象。 |\n\n\n# 第 11 章 处理空间数据\n\n## UnionAggregate\n\
  返回一组空间对象的联合结果。\n\n既然你已经了解了 SQL Server 所提供的空间方法，现在可以通过 `WideWorldImporters` 数据库来看看如何在实践中应用它们。假设我们负责送货路线，并且需要在阿拉巴马州规划一条路线。\n\
  \n我们首先要做的是验证我们的数据。所有送货地点标记为阿拉巴马州的客户，是否真的位于阿拉巴马州边界内？`Sales.Customers` 表包含一个名为 `DeliveryLocation`\
  \ 的 `GEOGRAPHY` 类型列，每行都包含一个 `Point` 对象，映射其送货地址。我们可以对此列使用 `STWithin` 方法，并传入 `Application.StateProvinces`\
  \ 表中的 `Border` 列（该列映射了州边界）。如代码清单 11-9 所示。\n\n***代码清单 11-9.*** 验证所有地址是否在阿拉巴马州边界内\n\
  \n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n\
  \    WHERE StateProvinceName = 'Alabama') ;\n\nSELECT\n    Customer.CustomerName\
  \ AS CustomerName\n    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString()\
  \ AS DeliveryLocation\nFROM SALES.Customers Customer\nINNER JOIN Application.Cities\
  \ City\n    ON City.CityID = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
  \ = 1 ;\n```\n\n![](img/index-336_1.jpg)\n\n此查询的结果（如图 11-6 所示）验证了所有 16 个送货地址在阿拉巴马州的客户确实都居住在该州内。\n\
  \n***图 11-6.*** 验证所有地址在阿拉巴马州边界内的结果。\n\n接下来，我们想要检查每个送货地点距离我们仓库的距离，并按此距离对结果排序。这将有助于我们规划路线。这种技术被称为查找最近邻，如代码清单\
  \ 11-10 所示，该查询计算距离并使用 `Application.SystemParameters` 表中的 `DeliveryLocation`（标记了\
  \ `WideWorldImporters` 的位置）对结果进行排序。\n\n**注意：** `WideWorldImporters` 的仓库在加利福尼亚州，虽然到阿拉巴马州各地的距离很远，但它们仍然允许我们规划出司机最合理的路线。\n\
  \n***代码清单 11-10.*** 查找最近邻\n\n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT\
  \ Border\n    FROM Application.StateProvinces\n    WHERE StateProvinceName = 'Alabama')\
  \ ;\n\nDECLARE @Office GEOGRAPHY = (\n    SELECT DeliveryLocation\n    FROM Application.SystemParameters)\
  \ ;\n\nDECLARE @MilesRatio INT = 0.000621371 ;\n\nSELECT\n    Customer.CustomerName\
  \ AS CustomerName\n    , City.CityName AS City\n    , Customer.DeliveryLocation.ToString()\
  \ AS DeliveryLocation\n    , Customer.DeliveryLocation.STDistance(@Office) * @MilesRatio\
  \ AS DeliveryDistanceMiles\nFROM SALES.Customers Customer\nINNER JOIN Application.Cities\
  \ City\n    ON City.CityID = Customer.DeliveryCityID\nWHERE Customer.DeliveryLocation.STWithin(@StateBorder)\
  \ = 1\nORDER BY DeliveryDistanceMiles ;\n```\n\n![](img/index-338_1.jpg)\n\n此查询的结果如图\
  \ 11-7 所示。\n\n***图 11-7.*** 查找最近邻的结果。\n\n你会注意到在代码清单 11-10 中，距离乘以了 `0.000621371`。这是因为距离默认以米为单位。距离的计量单位与\
  \ `SRID` 相关联，因此我们可以通过增强查询来显示 `SRID` 进行双重确认，如代码清单 11-11 所示。该查询公开了每个空间实例的 `SRID` 属性，并使用此值连接到\
  \ `sys.spatial_reference_systems` 系统表，以公开计量单位列。\n\n***代码清单 11-11.*** 公开 SRID\n\n\
  ```sql\nDECLARE @StateBorder GEOGRAPHY = (\n    SELECT Border\n    FROM Application.StateProvinces\n\
  \    WHERE StateProvinceName = 'Alabama') ;\n```\n\n\n# 第 11 章：处理空间数据\n\n```sql\n\
  DECLARE @Office GEOGRAPHY = (\n\nSELECT DeliveryLocation\n\nFROM Application.SystemParameters)\
  \ ;\n\nDECLARE @MilesRatio INT = 0.000621371 ;\n\nSELECT\n\nCustomer.CustomerName\
  \ AS CustomerName\n\n, City.CityName AS City\n\n, Customer.DeliveryLocation.ToString()\
  \ AS\n\nDeliveryLocation\n\n, Customer.DeliveryLocation.STDistance(@Office) *\n\n\
  @MilesRatio AS DeliveryDistanceMiles\n\n, Customer.DeliveryLocation.STSrid AS SRID\n\
  \n, srid.unit_of_measure\n\nFROM SALES.Customers Customer\n\nINNER JOIN Application.Cities\
  \ City\n\nON City.CityID = Customer.DeliveryCityID\n\nINNER JOIN sys.spatial_reference_systems\
  \ srid\n\nON srid.spatial_reference_id = Customer.\n\nDeliveryLocation.STSrid\n\n\
  WHERE Customer.DeliveryLocation.STWithin(@StateBorder) = 1\n\nORDER BY DeliveryDistanceMiles\
  \ ;\n```\n\n![](img/index-340_1.jpg)\n\n虽然我们知道所有的配送都在阿拉巴马州内，但我们可能希望了解实际的配送区域有多大。我们可以通过创建一个包络线然后计算其面积来实现这一点。此方法使用了\
  \ `EnvelopeAggregate` 扩展方法和 `STArea` 方法，如**代码清单 11-12**所示。\n\n**代码清单 11-12.** 计算聚合包络线的面积\n\
  \n```sql\nDECLARE @StateBorder GEOGRAPHY = (\n\nSELECT Border\n\nFROM Application.StateProvinces\n\
  \nWHERE StateProvinceName = 'Alabama') ;\n\nSELECT\n\nGEOGRAPHY::EnvelopeAggregate(DeliveryLocation).\n\
  \nSTArea() AS AreaInSquareMetres\n\n, GEOGRAPHY::EnvelopeAggregate(DeliveryLocation)\n\
  \nAS EnvelopeObject\n\nFROM Sales.Customers\n\nWHERE DeliveryLocation.STWithin(@StateBorder)\
  \ = 1 ;\n```\n\n此查询的结果可见于**图 11-8**。\n\n**图 11-8.** 计算聚合包络线面积的结果\n\n![](img/index-341_1.jpg)\n\
  \n**代码清单 11-12**中查询的图形化结果如**图 11-9**所示。\n\n**图 11-9.** 计算聚合包络线面积的图形化结果\n\n## 为空间数据创建索引\n\
  \n以下各节概述了空间索引，然后演示如何创建它们。\n\n### 理解空间索引\n\n空间索引是一种特殊类型的索引，在 SQL Server 中实现，可以提高对空间数据类型的某些查询的性能。**表\
  \ 11-5**描述了当在 `WHERE` 或 `JOIN` 子句中使用时，可以从空间索引中受益的谓词模式。\n\n**表 11-5.** 可从空间索引中受益的查询\n\
  \n| **数据类型** | **方法** | **运算符** |\n| :--- | :--- | :--- |\n| GEOMETRY & GEOGRAPHY\
  \ | STDistance | <, <= |\n| GEOMETRY & GEOGRAPHY | STEquals | = |\n| GEOMETRY &\
  \ GEOGRAPHY | STIntersects | = |\n| 仅 GEOMETRY | STContains | = |\n| 仅 GEOMETRY\
  \ | STOverlaps | = |\n| 仅 GEOMETRY | STTouches | = |\n| 仅 GEOMETRY | STWithin |\
  \ = |\n\n与传统索引一样，空间索引使用 `B-Tree` 结构（有关 `B-Tree` 索引的更多信息，请参见第 5 章），这意味着空间数据必须以线性顺序表示。为了实现这一点，SQL\
  \ Server 在构建索引之前，将空间分解为一个嵌套的网格系统。\n\n网格将有四层。第一层（`级别 1`）网格中的每个单元格将包含另一个（`级别 2`）网格，依此类推。四个网格层中的每一层都可以赋予不同的密度，低密度定义为\
  \ `4 × 4` 个单元格，中密度为 `8 × 8` 个单元格，高密度为 `16 × 16` 个单元格。网格内的每个单元格都使用 `希尔伯特填充曲线` 算法进行编号。\n\
  \n**提示：** 对 `希尔伯特填充曲线` 的完整讨论超出了本书的范围，但可以在网上许多地方找到更多详细信息，包括 [mathworld.wolfram.com/HilbertCurve.html](http://mathworld.wolfram.com/HilbertCurve.html)。\n\
  \n创建好网格系统后，SQL Server 逐行读取列中的数据。对于每一行，它将空间对象与它所接触的每个 `级别 1` 单元格关联起来。对于每个被接触的单元格，它将下降到\
  \ `级别 2` 并重复该过程。对于剩余的级别也重复此过程。\n\n\n\n第 3 级和第 4 级是必需的。此过程称为细分（tessellation）。该过程的输出是一组被触及的单元格，这些单元格可以存储在索引中，随后用于计算它们相对于其他对象的空间位置。\n\
  \n细分过程需要一个边界框，根据所使用的细分系统，其行为可能有所不同。细分系统依赖于数据类型，你可以选择为边界框使用自动坐标或自行定义。\n\n你可以通过定义应使用多少细分单元格来进一步配置细分过程。这意味着你可以限制单个对象记录的被触及单元格的最大数量。但值得注意的是，这仅影响第\
  \ 2 级到第 4 级。无论你如何配置，第 1 级都会记录对象所触及的所有单元格。\n\n### 创建空间索引\n\n为了演示如何创建空间索引，我们将在`WideWorldImporters`数据库的`Application.StateProvinces`表的`Border`列上创建一个索引。我们将使用自动网格系统，并为第\
  \ 1 到第 3 级配置中等密度，第 4 级配置高密度。\n\n要通过`SQL Server Management Studio`创建索引，请在`对象资源管理器`中依次展开`数据库`\
  \ ➤ `WideWorldImporters` ➤ `表` ➤ `Application.StateProvinces`。然后，在`索引`文件夹的右键上下文菜单中选择`新建索引`\
  \ ➤ `空间索引`。这将调出`新建索引`对话框的`常规`页面，如图 11-10 所示。\n\n![](img/index-344_1.jpg)\n\n**图\
  \ 11-10.** `新建索引`对话框—`常规`页面\n\n在此对话框页面上，我们为索引指定了一个有意义的名称，并使用`添加`按钮添加了我们想要索引的列。现在，我们将进入`选项`页面，该页面如图\
  \ 11-11 所示。\n\n![](img/index-345_1.jpg)\n\n**图 11-11.** `新建索引`对话框—`选项`页面\n\n`选项`页面对于任何创建过传统索引的人来说都会很熟悉。表\
  \ 11-6 详细列出了每个可用选项。\n\n**表 11-6.** 空间索引选项\n\n| **选项** | **描述** |\n| :--- | :---\
  \ |\n| `自动重新计算统计信息` | 指定当统计信息被视为过时时是否应自动更新 |\n| `允许行锁` | 指定访问索引时是否可以获取行锁 |\n| `允许页锁`\
  \ | 指定访问索引时是否可以获取页锁 |\n| `最大并行度` | 对于构建主空间索引无效，因为此操作始终是单线程的 |\n| `在 TempDB 中排序`\
  \ | 如果指定，`在 TempDB 中排序`将导致中间结果集存储在`TempDB`中，而不是用户数据库中。这可能意味着索引构建速度更快。 |\n| `填充因子`\
  \ | 指定在索引最低级别的每个索引页上将保留的可用空间百分比。默认值为 0（100%满），表示只保留足以容纳单行的空间。指定低于 100 的百分比——例如指定\
  \ 70——将保留 30%的可用空间，如果可能频繁进行行插入，这可以减少页拆分。 |\n| `填充索引` | 将填充因子（见上文）应用于 B 树的中间级别 |\n\
  \n在`存储`页面（如图 11-12 所示）中，你可以指定索引将创建在其上的文件组。通常，为了获得最佳性能，索引最好与其表对齐在相同的文件组（或分区方案）上。从维护的角度来看，当表已分区时，将索引存储在不同的文件组上可能会有所帮助。如果不这样做，在表重新分区之前必须先删除索引。\n\
  \n![](img/index-347_1.jpg)\n\n**图 11-12.** `新建索引`对话框—`存储`页面\n\n\n# 第 11 章：处理空间数据\n\
  \n空间页面如图 11-13 所示。在这里，我们可以配置索引的空间特定选项。在页面的“常规”部分，我们可以选择我们的细分系统——自动或手动。如果选择手动，页面的“网格”区域将被激活，我们可以选择想要使用的网格密度。如果选择了手动几何系统，页面的“边界框”区域也会被激活，我们可以指定边界框坐标。\n\
  \n![index-348_1.jpg](img/index-348_1.jpg)\n\n**图 11-13.** 新建索引对话框 - 空间页\n\n**提示：**\
  \ 几何系统必须用于 `GEOMETRY` 列，地理系统必须用于 `GEOGRAPHY` 列。\n\n或者，我们可以使用 T-SQL 来创建索引。清单 11-13\
  \ 中的脚本将创建与之前讨论的相同索引。\n\n**清单 11-13.** 创建空间索引\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nCREATE SPATIAL INDEX [SI-Border]\nON Application.StateProvinces (Border)\n\
  USING GEOGRAPHY_GRID\nWITH (GRIDS =(LEVEL_1 = MEDIUM,LEVEL_2 = MEDIUM,LEVEL_3 =\n\
  MEDIUM,LEVEL_4 = HIGH),\nCELLS_PER_OBJECT = 16,\nPAD_INDEX = OFF,\nSTATISTICS_NORECOMPUTE\
  \ = OFF,\nSORT_IN_TEMPDB = OFF,\nDROP_EXISTING = OFF,\nONLINE = OFF,\nALLOW_ROW_LOCKS\
  \ = ON,\nALLOW_PAGE_LOCKS = ON, MAXDOP = 1)\nON [PRIMARY] ;\n```\n\n## 总结\n\n空间对象可以通过多种方式构造。可以使用\
  \ OGC 标准方法创建，从熟知文本或熟知二进制创建，也可以使用从 GML 扩展的 Microsoft 方法构造。SQL Server 还支持将熟知文本直接传递到表的单元变量中。\n\
  \n有大量方法可供开发人员轻松与空间数据交互。常用方法包括 `STDistance`（返回两个几何对象之间的距离）和 `STWithin`（检查一个实例是否位于另一个实例的同一空间内）。还有聚合方法，允许对多个实例进行并集、包络线和凸包操作，以及将多个实例转换为单个集合。\n\
  \nSQL Server 提供空间索引，可以提高某些类型查询的性能。索引对查询的支持取决于数据类型、`WHERE` 或 `JOIN` 子句中的方法以及使用的算术运算符。\n\
  \n空间索引使用 B 树结构，但在创建 B 树之前，会创建一个空间网格系统，具有四个嵌套级别。然后，从列中读取空间实例，一个一个地放入网格系统中，并使用希尔伯特曲线对它们接触的单元进行编号。这意味着空间实例可以以线性方式索引，同时详细描述它们彼此的接近程度。\n\
  \n# 第 12 章：处理层次数据与 HierarchyID\n\n对 SQL Server 开发人员来说，对数据层次结构进行建模和处理一直是必需的。传统上，层次数据是通过表上的自连接在两个列之间建模的。一个列包含层次成员的\
  \ ID，另一个包含其父层次成员的 ID。然而，较新版本的 SQL Server（2008 及更高版本）提供了 `HierarchyID`。`HierarchyID`\
  \ 是在.NET 中编写并在 SQL Server 中公开的数据类型。与使用带自连接的表相比，使用 `HierarchyID` 可以提供性能优势和简化的代码。该数据类型公开了许多可以对数据调用的方法，使开发人员能够轻松确定层次成员的祖先和后代，以及其他有用信息，例如特定成员在层次结构中的级别。\n\
  \n在本章中，我们将首先探讨层次数据的用例。我将讨论如何对传统层次结构建模，然后再解释如何使用 `HierarchyID` 重新建模。最后，我们将了解针对 `HierarchyID`\
  \ 数据类型公开的方法。\n\n© Peter A. Carter 2018\n\nP. A. Carter, *SQL Server 高级数据类型*,\n\n\
  `doi.org/10.1007/978-1-4842-3901-8_12`\n\n![](img/index-351_1.png)\n\n# 第 12 章 处理层次数据与\
  \ HierarchyID\n\n## 层次数据用例\n\n许多数据需求需要维护层次结构。\n\n例如，考虑一个从组织结构图建模而来的员工层次结构（见图 12-1）。人力资源部门可能有汇报需求，需要确定有多少员工直接或间接向一位经理汇报。它可能还需要汇报更复杂的需求，例如每位部门主管下属的员工产生了多少收入。\n\
  \n***图 12-1.** 销售部门组织结构图*\n\n层次数据的另一个经典用例是物料清单 (BoM)。BoM 定义了生产产品所需零件的层次结构。例如，图 12-2\
  \ 展示了一个家用计算机的简单 BoM。计算机制造商需要为库存报告维护这些零件的层次结构。\n\n![](img/index-352_1.png)\n\n***图\
  \ 12-2.** 物料清单*\n\n![](img/index-353_1.png)\n\n在本章中，我们将以销售区域层次结构为例进行讲解。如图 12-3 所示，我们将为全球销售区域建模。该层次结构是参差不齐的，这意味着在每个分支中可以有不同数量的层级。\n\
  \n***图 12-3.** 销售区域层次结构*\n\n维护销售区域层次结构对许多公司都很重要，因为它允许公司就许多因素进行报告，从每个区域的收入、每个区域的销售人员数量到每个销售人员和区域的平均收入等。在此示例中，除了标准销售区域外，层次结构中还有聚合区域。这意味着这些区域没有销售人员，并且不直接产生销售。相反，它们是用于汇总下级层次结构的汇报层级。这些聚合区域以蓝色突出显示。\n\
  \n## 为传统层次结构建模\n\n让我们看看如何使用传统方法为销售区域层次结构建模。为此，请考虑表 12-1 中的数据。\n\n***表 12-1.** 销售区域层次结构*\n\
  \n| SalesAreaID | ParentSalesAreaID | SalesAreaName | CountOfSalesPeople | SalesYTD\
  \ |\n| :--- | :--- | :--- | :--- | :--- |\n| globalSales | nUll | 全球销售 | nUll |\
  \ |\n| europe | globalSales | 欧洲 | nUll | |\n| america | globalSales | 美洲 | nUll\
  \ | |\n| Uk | europe | 英国 | 300,000 | nUll |\n| eastern europe | europe | 东欧 | nUll\
  \ | nUll |\n| Canada | america | 加拿大 | 350,000 | |\n| USa | america | 美国 | nUll\
  \ | nUll |\n| lataM | america | 拉丁美洲 | nUll | nUll |\n| germany | europe | 德国 |\
  \ 150,000 | |\n| France | europe | 法国 | 100,000 | |\n| hungary | eastern europe\
  \ | 匈牙利 | 50,000 | |\n| Slovakia | eastern europe | 斯洛伐克 | 80,000 | |\n| eastern\
  \ | USa | 东部 | 140,000 | |\n| Western | USa | 西部 | 280,000 | |\n| Brazil | lataM\
  \ | 巴西 | 100,000 | |\n| argentina | lataM | 阿根廷 | 70,000 | |\n| new york | eastern\
  \ | 纽约 | 120,000 | |\n\n在上表中，`SalesAreaID` 列将是表的主键，而 `ParentSalesAreaID` 列将是一个外键，引用\
  \ `SalesAreaID` 列，从而创建所谓的自连接。\n\n**注意** 对于 `globalSales` 区域，`ParentSalesAreaID`\
  \ 列为 `NULL`，因为它没有父级。这被称为层次结构的根。\n\n`SalesAreaName` 列描述了销售区域，而 `CountOfSalesPeople`\
  \ 和 `SalesYTD` 列详细说明了每个销售区域的业绩。我们将使用这些列来探索如何处理层次数据。您会注意到，对于聚合区域，`CountOfSalesPeople`\
  \ 和 `SalesYTD` 列填充的是 `NULL` 值。这是因为它们是“虚拟”区域，没有销售人员驻扎。\n\n可以使用清单 12-1 中的脚本创建此表。\n\
  \n***清单 12-1.*** 创建传统的层次结构表\n\n```sql\nUSE WideWorldImporters\nGO\nCREATE TABLE\
  \ Sales.SalesAreaTraditionalHierarchy\n(\n    SalesAreaID INT NOT NULL PRIMARY KEY,\n\
  \    ParentSalesAreaID INT NULL\n)\n```\n\n# 第 12 章 处理层次数据与 HierarchyID\n\n```sql\n\
  REFERENCES Sales.SalesAreaTraditionalHierarchy(SalesAreaID),\nSalesAreaName NVARCHAR(20)\
  \ NOT NULL,\nCountOfSalesPeople INT NULL,\nSalesYTD MONEY NULL\n);\n\nINSERT INTO\
  \ Sales.SalesAreaTraditionalHierarchy (\n    SalesAreaID,\n    ParentSalesAreaID,\n\
  \    SalesAreaName,\n    CountOfSalesPeople,\n    SalesYTD\n)\nVALUES\n    (1, NULL,\
  \ 'GlobalSales', NULL, NULL),\n    (2, 1, 'Europe', NULL, NULL),\n    (3, 1, 'America',\
  \ NULL, NULL),\n    (4, 2, 'UK', 3, 300000),\n    (5, 2, 'Western Europe', NULL,\
  \ NULL),\n    (6, 2, 'Eastern Europe', NULL, NULL),\n    (7, 3, 'Canada', 4, 350000),\n\
  \    (8, 3, 'USA', NULL, NULL),\n    (9, 3, 'LATAM', NULL, NULL),\n    (10, 5, 'Germany',\
  \ 3, 150000),\n    (11, 5, 'France', 2, 100000),\n    (12, 6, 'Hungary', 1, 50000),\n\
  \    (13, 6, 'Slovakia', 2, 80000),\n    (14, 8, 'Eastern', 4, 140000),\n    (15,\
  \ 8, 'Western', 3, 280000),\n    (16, 9, 'Brazil', 1, 100000),\n    (17, 9, 'Agentina',\
  \ 2, 70000),\n    (18, 14, 'New York', 2, 120000);\n```\n\n假设我们必须使用这个传统层次结构来回答一个业务问题。例如，我们可能需要回答：“美洲地区的\
  \ `SalesYTD` 总额是多少？” 为了确定这一点，我们将必须编写一个查询，将该表与其自身进行联接，并对美洲地区下所有子区域的 `SalesYTD` 列进行汇总。\n\
  \n实现这一目标的最佳方法是使用递归 CTE（公用表表达式）。CTE 是一个临时结果集，在 `SELECT`、`UPDATE`、`INSERT`、`DELETE`\
  \ 或 `CREATE VIEW` 语句的上下文中定义，并且只能在该查询内被引用。它类似于使用子查询作为派生表，但其好处在于它可以被多次引用，也可以引用自身。当\
  \ CTE 引用自身时，它就变成了递归 CTE。\n\nCTE 使用 `WITH` 语句声明，该语句指定 CTE 的名称，后跟括号内的 CTE 将返回的列列表。然后使用\
  \ `AS` 关键字，后跟 CTE 的主体，同样包含在括号中。如 `清单 12-2` 所示。\n\n**提示**：`清单 12-2 到 12-14` 中的查询并非设计为单独运行。`清单\
  \ 12-15` 将它们全部组合成一个可用的脚本。\n\n***清单 12-2.*** CTE 结构\n```sql\nWITH AreaHierarchy (SalesAreaID,\
  \ SalesYTD, ParentSalesAreaID)\nAS\n(\n    [CTE 主体]\n)\n```\n\n递归 CTE 的定义包含两个查询，通过\
  \ `UNION ALL` 子句联接。第一个查询称为锚点查询，用于定义初始结果集。第二个查询称为递归查询，并引用该 CTE。第一层递归将与锚点查询进行联接，随后的递归层级将与紧邻其上方的递归层级进行联接。\n\
  \n因此，在我们的示例中，锚点查询将必须返回美洲销售区域的 `SalesAreaID`。由于所有使用 `UNION ALL` 联接的查询必须包含相同数量的列，我们的锚点查询还必须返回\
  \ `ParentSalesAreaID` 和 `SalesYTD` 列，即使这些值将是 `NULL`。\n\n`清单 12-3` 中的查询展示了所需的锚点查询。\n\
  \n***清单 12-3.*** 锚点查询\n```sql\nSELECT\n    SalesAreaID,\n    SalesYTD,\n    ParentSalesAreaID\n\
  FROM Sales.SalesAreaTraditionalHierarchy RootLevel\nWHERE SalesAreaName = 'America'\n\
  ```\n\n递归查询将返回与锚点查询相同的列列表，但将包含一个 `JOIN` 子句，该子句将递归查询中的 `ParentSalesAreaID` 列与 CTE\
  \ 的 `SalesAreaID` 列进行联接，如 `清单 12-4` 所示。\n\n***清单 12-4.*** 递归查询\n```sql\nSELECT\n\
  \    Area.SalesAreaID,\n    Area.SalesYTD,\n    Area.ParentSalesAreaID\nFROM Sales.SalesAreaTraditionalHierarchy\
  \ Area\nINNER JOIN AreaHierarchy\n    ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n\
  ```\n\n声明此 CTE 后，我们将能够运行 `SELECT` 语句。\n\n# 第 12 章 处理层次数据与 HierarchyID\n\n## 清单 12-5.\
  \ 综合运用\n\n```sql\nWITH AreaHierarchy (SalesAreaID, SalesYTD, ParentSalesAreaID)\n\
  AS\n(\n    SELECT\n        SalesAreaID\n        , SalesYTD\n        , ParentSalesAreaID\n\
  \    FROM Sales.SalesAreaTraditionalHierarchy RootLevel\n    WHERE SalesAreaName\
  \ = 'America'\n    UNION ALL\n    SELECT\n        Area.SalesAreaID\n        , Area.SalesYTD\n\
  \        , Area.ParentSalesAreaID\n    FROM Sales.SalesAreaTraditionalHierarchy\
  \ Area\n    INNER JOIN AreaHierarchy\n        ON Area.ParentSalesAreaID = AreaHierarchy.SalesAreaID\n\
  )\nSELECT SUM(SalesYTD)\nFROM AreaHierarchy ;\n```\n\n该语句会向上汇总 `SalesYTD`，以返回整个美国的\
  \ `SalesYTD` 总额。清单 12-5 中的脚本将所有这些组件组合在了一起。\n\n## 使用 HierarchyID 对层次结构建模\n\n当使用 `HierarchyID`\
  \ 对层次数据建模时，无需对表进行自连接。因此，我们将不再使用引用其父区域主键的列，而是使用一个 `HierarchyID` 列，该列定义每个区域在层次结构中的位置。为了进一步解释这个概念，让我们考虑表\
  \ 12-2 中的数据。\n\n### 表 12-2. 使用 HierarchyID 的销售区域层次结构\n\n| 销售区域 ID | 销售区域层次结构 | 销售区域名称\
  \ | 销售人员数量 | 年初至今销售额 |\n| :--- | :--- | :--- | :--- | :--- |\n| 1 | / | 全球销售 | nUll\
  \ | nUll |\n| 2 | /1/ | 欧洲 | nUll | nUll |\n| 3 | /2/ | 美洲 | nUll | nUll |\n| 4\
  \ | /1/1/ | 英国 | 3 | 300,000 |\n| 5 | /1/2/ | 西欧 | nUll | nUll |\n| 6 | /1/3/ |\
  \ 东欧 | nUll | nUll |\n| 7 | /2/1/ | 加拿大 | 4 | 350,000 |\n| 8 | /2/2/ | 美国 | nUll\
  \ | nUll |\n| 9 | /2/3/ | 拉丁美洲 | nUll | nUll |\n| 10 | /1/2/1/ | 德国 | 3 | 150,000\
  \ |\n| 11 | /1/2/2/ | 法国 | 2 | 100,000 |\n| 12 | /1/3/1/ | 匈牙利 | 1 | 50,000 |\n\
  | 13 | /1/3/2/ | 斯洛伐克 | 2 | 80,000 |\n| 14 | /2/2/1/ | 东部 | 4 | 140,000 |\n| 15\
  \ | /2/2/2/ | 西部 | 3 | 280,000 |\n| 16 | /2/3/1/ | 巴西 | 1 | 100,000 |\n| 17 | /2/3/2/\
  \ | 阿根廷 | 2 | 70,000 |\n| 18 | /2/2/1/1/ | 纽约 | 2 | 120,000 |\n\n在表 12-2 中，您会注意到层次结构以\
  \ `/[节点]/[子节点]/[孙节点]/` 的格式表示，其中只包含 `/` 的行是层次结构的根节点。例如，我们看到德国的值 `/1/2/1/` 告诉我们德国是\
  \ `/1/2/`（西欧）的子节点，而 `/1/2/` 又是 `/1/`（欧洲）的子节点。`/1/` 是 `/`（全球销售）的子节点，后者是层次结构的根。\n\n\
  我们可以使用清单 12-6 中的脚本来创建和填充此表。\n\n## 清单 12-6. 使用 HierarchyID 创建表\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nCREATE TABLE Sales.SalesAreaHierarchyID\n(\n    SalesAreaID INT NOT NULL PRIMARY\
  \ KEY,\n    SalesAreaHierarchy HIERARCHYID NOT NULL,\n    SalesAreaName NVARCHAR(20)\
  \ NOT NULL,\n    CountOfSalesPeople INT NULL,\n    SalesYTD MONEY NULL\n) ;\n\n\
  INSERT INTO Sales.SalesAreaHierarchyID (\n    SalesAreaID\n    , SalesAreaHierarchy\n\
  \    , SalesAreaName\n    , CountOfSalesPeople\n    , SalesYTD\n)\nVALUES\n    (1,\
  \ '/', 'GlobalSales', NULL, NULL),\n    (2, '/1/', 'Europe', NULL, NULL),\n    (3,\
  \ '/2/', 'America', NULL, NULL),\n    (4, '/1/1/', 'UK', 3, 300000),\n    (5, '/1/2/',\
  \ 'Western Europe', NULL, NULL),\n    (6, '/1/3/', 'Eastern Europe', NULL, NULL),\n\
  \    (7, '/2/1/', 'Canada', 4, 350000),\n    (8, '/2/2/', 'USA', NULL, NULL),\n\
  \    (9, '/2/3/', 'LATAM', NULL, NULL),\n    (10, '/1/2/1/', 'Germany', 3, 150000),\n\
  \    (11, '/1/2/2/', 'France', 2, 100000),\n    (12, '/1/3/1/', 'Hungary', 1, 50000),\n\
  \    (13, '/1/3/2/', 'Slovakia', 2, 80000),\n    (14, '/2/2/1/', 'Eastern', 4, 140000),\n\
  \    (15, '/2/2/2/', 'Western', 3, 280000),\n    (16, '/2/3/1/', 'Brazil', 1, 100000),\n\
  \    (17, '/2/3/2/', 'Agentina', 2, 70000),\n    (18, '/2/2/1/1/', 'New York', 2,\
  \ 120000) ;\n```\n\n尽管我们向 `SalesAreaHierarchy` 列插入了人类可读的字符串，但 SQL Server 会将这些字符串转换并存储为十六进制值。这使得该列极其紧凑和高效。可以使用清单\
  \ 12-7 中的查询来比较 `HierarchyID` 列的大小与传统层次结构中用于 `ParentSalesAreaID` 列的 `INT` 列的大小。\n\
  \n## 清单 12-7. 比较传统层次结构与 HierarchyID 的大小\n\n```sql\nUSE WideWorldImporters\nGO\n\n\
  SELECT\n    SUM(DATALENGTH(salesareahierarchy)) AS SizeOf\n```\n\n\n# 第 12 章 处理分层数据与\
  \ HierarchyID\n\n## 大小比较查询\n\n查询示例：\n\n```sql\nHierarchyID, SUM(DATALENGTH(parentsalesareaid))\
  \ AS SizeOfTraditional\nFROM Sales.SalesAreaHierarchyID SalesAreaHierarchy\nINNER\
  \ JOIN sales.SalesAreaTraditionalHierarchy SalesAreaTraditional\nON SalesAreaHierarchy.SalesAreaID\
  \ = SalesAreaTraditional.SalesAreaID;\n```\n\n![](img/index-363_1.jpg)\n\n如图 12-4\
  \ 所示，`HierarchyID`列的大小不到用于`ParentSalesAreaID`的`INT`列的一半。\n\n**图 12-4.** 大小比较结果\n\
  \n> **注意** 在第 1 章中，你了解到使用正确的数据类型很重要。如果我选择对`parentSalesareaiD`列使用`SMALLINT`，这两列的大小将大致相同。然而，这是一个为了解释`HierarchyID`而提供的次要示例。如果你正在大规模地实现层次结构，这个示例是一个公平的体现。\n\
  \n## 对 HierarchyID 列执行 SELECT 语句\n\n如果我们对`SalesAreaHierarchyID`表运行一个普通的`SELECT`语句，我们可以看到原始的十六进制值。例如，考虑清单\
  \ 12-8 中的查询。\n\n**清单 12-8.** 对 HierarchyID 列的 SELECT 语句\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT\n    SalesAreaName,\n    SalesAreaHierarchy\nFROM Sales.SalesAreaHierarchyID;\n\
  ```\n\n此查询的结果如图 12-5 所示。你会注意到，`SalesAreaHierarchy`列的内容以十六进制值返回，而不是人类可读的字符串。为了查看我们输入的人类可读的字符串，我们必须使用本章“使用\
  \ HierarchyID 方法”一节中讨论的`ToString()`方法。\n\n![](img/index-365_1.jpg)\n\n**图 12-5.**\
  \ 对 HierarchyID 列执行 SELECT 语句的结果\n\n## HierarchyID 方法\n\n`HierarchyID`数据类型提供了许多方法，允许开发人员在使用层次结构时快速编写高效的代码。表\
  \ 12-3 详细说明了这些方法。\n\n**表 12-3.** HierarchyID 数据类型暴露的方法\n\n| 方法 | 描述 |\n| :--- |\
  \ :--- |\n| `GetAncestor` | 返回层次结构节点的祖先。接受一个参数，定义应从层次结构的多少层向上返回祖先。例如，`GetAncestor(1)`将返回节点的父节点，而`GetAncestor(2)`将返回节点的祖父节点。\
  \ |\n| `GetDescendant` | 返回给定节点在层次结构中的子节点 ID。`GetDescendant()`方法通常用于创建两个节点。因此，该方法接受两个参数，类型均为`HierarchyID`。生成的节点将位于指定的两个节点之间。\
  \ |\n| `GetLevel` | 返回节点的层次级别。 |\n| `GetRoot` | 一个静态方法，返回层次结构的根级别。 |\n| `IsDescendantOf`\
  \ | `IsDescendantOf()`方法接受一个类型为`HierarchyID`的参数，如果给定节点是作为参数传递的节点的后代，则返回 1。 |\n|\
  \ `Parse` | 解析作为参数传递的节点的字符串表示形式，以确保其有效。如果有效，则返回其十六进制表示。如果无效，将引发错误。 |\n| `Read` |\
  \ 从`Binaryreader`读取`SqlHierarchyId`的二进制表示，并将`SqlHierarchyId`对象设置为该值。`Read()`方法只能从`SQlClr`调用，不能从`t-SQl`调用。使用`t-SQl`时，应改用`CAST`或`CONVERT`。\
  \ |\n| `GetReparentedValue` | 用于将节点移动到新父节点。接受两个参数，第一个是原始父节点，第二个是新父节点。 |\n| `ToString`\
  \ | 返回层次结构中节点的字符串格式化表示。 |\n| `Write` | 将`SqlHierarchyId`对象的二进制表示形式写入`BinaryWriter`。\
  \ |\n\n\n\n# 将 SqlHierarchyId 的二进制表示形式写入 BinaryWriter。仅适用于 SQL CLR。使用 T-SQL 时，请改用\
  \ `CAST` 或 `CONVERT`。\n\n**提示：** `HierarchyID` 方法区分大小写。例如，调用 `tostring()` 会引发错误；调用\
  \ `ToString()` 则会成功。\n\n## 使用 HierarchyID 方法\n\n以下各节介绍如何使用 `HierarchyID` 数据类型所公开的方法。\n\
  \n### 使用 ToString( )\n\n如果对具有 `HierarchyID` 数据类型的列运行 `SELECT` 语句，返回的值将是该节点的十六进制表示形式。若要查看节点的文本表示形式，必须使用\
  \ `ToString()` 方法。例如，考虑清单 12-9 中的查询。\n\n#### 清单 12-9. 使用 ToString()\n```sql\nUSE\
  \ WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\n    , SalesAreaHierarchy\n\
  \    , SalesAreaHierarchy.ToString() AS SalesAreaHierarchyString\nFROM Sales.SalesAreaHierarchyID\
  \ ;\n```\n\n此查询的结果显示在图 12-6 中。您会看到，一旦对其调用 `ToString()` 方法，该列就变得人类可读。\n\n![](img/index-369_1.jpg)\n\
  \n**图 12-6.** 使用 `ToString()` 的结果\n\n### 使用 Parse( )\n\n当节点的字符串表示形式被插入到 `HierarchyID`\
  \ 列时，会隐式调用 `Parse()` 方法。本质上，`Parse()` 方法执行的是与 `ToString()` 方法相反的功能。它尝试将格式化的字符串表示形式转换为\
  \ `HierarchyID` 表示形式。如果失败，则会引发错误。例如，考虑清单 12-10 中的脚本。\n\n#### 清单 12-10. 使用 Parse()\
  \ 方法\n```sql\n--返回节点的十六进制表示形式\nSELECT HierarchyID::Parse('/1/1/2/2/') ;\n\n--由于缺少尾部斜杠\
  \ / 而引发错误\nSELECT HierarchyID::Parse('/1/1/2/2') ;\n```\n\n运行此脚本显示的“结果”选项卡如图 12-7\
  \ 所示。第一个查询显示了预期结果，而第二个查询则不返回任何结果。\n\n![](img/index-370_1.jpg)\n\n**图 12-7.** 使用\
  \ `Parse()` 的结果选项卡\n\n查看图 12-8 所示的“消息”选项卡，会详细说明 .NET 框架引发的错误。\n\n![](img/index-371_1.jpg)\n\
  \n**图 12-8.** .NET 框架引发的错误\n\n### 使用 GetRoot( )\n\n`GetRoot()` 方法将返回层次结构的根节点，如清单\
  \ 12-11 所示。\n\n#### 清单 12-11. 使用 GetRoot()\n```sql\nUSE WideWorldImporters\nGO\n\
  \nSELECT\n    SalesAreaName\n    , SalesAreaHierarchy.ToString()\nFROM Sales.SalesAreaHierarchyID\n\
  WHERE SalesAreaHierarchy = HierarchyID::GetRoot() ;\n```\n\n此查询的结果可查看图 12-9。\n\n\
  ![](img/index-372_1.jpg)\n\n**图 12-9.** 使用 `GetRoot()` 的结果\n\n### 使用 GetLevel( )\n\
  \n`GetLevel()` 方法允许您确定特定节点位于层次结构的哪一级别。例如，清单 12-12 中的查询将返回位于层次结构最低级别的所有节点。在我们的例子中，这仅是纽约。\n\
  \n子查询将确定层次结构中的最大级别，外部查询将返回位于该级别的所有销售区域。\n\n#### 清单 12-12. 使用 GetLevel()\n```sql\n\
  USE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName\nFROM Sales.SalesAreaHierarchyID\n\
  WHERE SalesAreaHierarchy.GetLevel() =\n(\n    SELECT\n        MAX(SalesAreaHierarchy.GetLevel())\n\
  \    FROM Sales.SalesAreaHierarchyID\n) ;\n```\n\n此查询的结果如图 12-10 所示。\n\n![](img/index-373_1.jpg)\n\
  \n**图 12-10.** 使用 `GetLevel()` 的结果\n\n### Read( ) 和 Write( )\n\n\n\n由于本章重点介绍如何在\
  \ T-SQL 代码中使用 `HierarchyID`，而 `Read()` 和 `Write()` 方法仅适用于 SQLCLR（一种允许在 SQL Server\
  \ 内部创建托管对象的技术），因此对 `Read()` 和 `Write()` 方法的完整描述超出了本书的范围。\n\n## 使用 GetDescendant(\
  \ )\n\n当然，开发者可以在现有节点之间向层次结构中插入一个新节点，但 `GetDescendant()` 方法能帮助开发者以实用的方式完成此操作。该方法接受两个参数，这两个参数都可以是\
  \ `NULL`，并代表现有的子节点。然后，该方法将使用以下规则生成一个节点值：\n\n*   如果父节点为 `NULL`，则返回 `NULL` 值。\n* \
  \  如果父节点不为 `NULL`，且两个参数均为 `NULL`，则返回父节点的第一个子节点。\n*   如果父节点和第一个参数不为 `NULL`，但第二个参数为\
  \ `NULL`，则返回父节点下大于第一个参数的子节点。\n*   如果父节点和第二个参数不为 `NULL`，但第一个参数为 `NULL`，则返回父节点下小于第二个参数的子节点。\n\
  *   如果父节点和两个参数均不为 `NULL`，则返回父节点下介于两个参数之间的子节点。\n*   如果第一个参数不为 `NULL` 且不是父节点的子节点，则抛出错误。\n\
  *   如果第二个参数不为 `NULL` 且不是父节点的子节点，则抛出错误。\n*   如果第一个参数大于或等于第二个参数，则抛出错误。\n\n例如，假设我们想在父节点\
  \ `America` 下创建一个名为 `Spain` 的新销售区域。我们希望该节点值介于 `Canada` 和 `USA` 之间。我们可以通过清单 12-13\
  \ 中的查询实现这一点。\n\n**提示**：显然，`Spain` 应包含在 `Western Europe` 下，而不是 `America` 下。别担心，这是一个故意设置的错误，我们将在本章的“使用\
  \ GetReparentedValue”一节中解决这个问题。\n\n### 清单 12-13. 生成一个新的层次结构节点\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT NewNode.ToString()\nFROM\n(\n    SELECT\n        SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40)\
  \ AS NewNode\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'America'\n\
  ) NewNode ;\n```\n\n此查询产生的结果如图 12-11 所示。\n\n你会看到最低级别包含一个句点（`.`）(`1.1`)。这是因为 `Canada`\
  \ 的值为 `1`，而 `USA` 的值为 `2`。因此，为了生成介于两者之间的节点值，不能使用整数。这保证了新节点总是可以插入到两个现有节点之间。\n\n###\
  \ 图 12-11. 使用 GetDescendant() 的结果\n\n要以编程方式将 `Spain` 销售区域添加到层次结构中，我们可以使用清单 12-14\
  \ 中的查询。\n\n### 清单 12-14. 向层次结构中插入新节点\n\n```sql\nUSE WideWorldImporters\nGO\nINSERT\
  \ INTO Sales.SalesAreaHierarchyID\n(\n    SalesAreaID\n    , SalesAreaHierarchy\n\
  \    , SalesAreaName\n    , CountOfSalesPeople\n    , SalesYTD\n)\nSELECT\n    (SELECT\
  \ MAX(SalesAreaID) + 1 FROM Sales.SalesAreaHierarchyID)\n    , SalesAreaHierarchy.GetDescendant(0x6AC0,0x6B40)\n\
  \    , 'Spain'\n    , 2\n    , 200000\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaName\
  \ = 'America' ;\n```\n\n## 使用 GetReparentedValue( )\n\n正如你可能在“使用 GetDescendant()”一节中注意到的，`Spain`\
  \ 销售区域被错误地创建在了 `America` 聚合区域下，而不是 `Western Europe` 聚合区域下。我们可以通过使用 `GetReparentedValue()`\
  \ 方法来解决这个问题。\n\n考虑清单 12-15 中的脚本。首先，我们声明两个类型为 `HierarchyID` 的变量。这些将作为参数传递给 `GetReparentedValue()`\
  \ 方法。`@America` 变量被赋值...\n\n\n# 第 12 章 处理层次数据和 HierarchyID\n\n## 使用 GetReparentedValue()\n\
  \n该方法涉及原始父级销售区域的销售区域层次结构节点，而 `@WesternEurope` 变量则填充了目标父级销售区域的销售区域层次结构节点。\n\n###\
  \ 清单 12-15. 使用 GetReparentedValue()\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE\
  \ @America HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n\
  \    WHERE SalesAreaName = 'America'\n) ;\n\nDECLARE @WesternEurope HIERARCHYID\
  \ =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n   \
  \ WHERE SalesAreaName = 'Western Europe'\n) ;\n\nSELECT Area.ToString()\nFROM\n\
  (\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n    @WesternEurope)\
  \ AS Area\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy = 0x6B16\n\
  ) NewNodePath ;\n```\n\n`![](img/index-378_1.jpg)`\n\n此脚本的结果如图 12-12 所示。你会注意到叶节点值保持不变，而路径（父节点）已被更改，使得该节点现在位于西欧聚合区域下。\n\
  \n### 图 12-12. 使用 GetReparentedValue() 的结果\n\n我们可以通过清单 12-16 中的脚本来更新 `Sales.SalesAreaHierarchyID`\
  \ 表中西班牙销售区域的祖先关系。\n\n### 清单 12-16. 更新西班牙销售区域的祖先关系\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nDECLARE @America HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n    FROM\
  \ Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = 'America'\n) ;\n\nDECLARE\
  \ @WesternEurope HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n    FROM Sales.SalesAreaHierarchyID\n\
  \    WHERE SalesAreaName = 'Western Europe'\n) ;\n\nUPDATE Sales.SalesAreaHierarchyID\n\
  SET SalesAreaHierarchy =\n(\n    SELECT SalesAreaHierarchy.GetReparentedValue(@America,\n\
  \    @WesternEurope)\n    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaHierarchy\
  \ = 0x6B16\n)\nWHERE SalesAreaHierarchy = 0x6B16 ;\n```\n\n## 使用 GetAncestor()\n\
  \n`GetAncestor()` 方法可用于根据输入参数指定的级别数，返回给定层次节点的祖先节点。例如，考虑清单 12-17 中的查询。该查询将通过向 `GetAncestor()`\
  \ 方法传递不同的参数，返回西班牙的祖父节点、父节点和西班牙本身。\n\n**注意** 要使此查询按预期工作，你必须首先运行本章前面的示例。具体来说，是“使用\
  \ GetDescendant()”和“使用 GetReparentedValue()”部分中的插入和更新查询，以及创建和填充表的清单 12-2。\n\n###\
  \ 清单 12-17. 使用 GetAncestor()\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n \
  \   CurrentNode.SalesAreaName AS SalesArea\n    , ParentNode.SalesAreaName AS ParentSalesArea\n\
  \    , GrandParentNode.SalesAreaName AS GrandParentSalesArea\nFROM Sales.SalesAreaHierarchyID\
  \ Base\nINNER JOIN Sales.SalesAreaHierarchyID CurrentNode\n    ON CurrentNode.SalesAreaHierarchy\
  \ = Base.SalesAreaHierarchy.GetAncestor(0)\nINNER JOIN Sales.SalesAreaHierarchyID\
  \ ParentNode\n    ON ParentNode.SalesAreaHierarchy = Base.SalesAreaHierarchy.GetAncestor(1)\n\
  INNER JOIN Sales.SalesAreaHierarchyID GrandParentNode\n    ON GrandParentNode.SalesAreaHierarchy\
  \ = Base.SalesAreaHierarchy.GetAncestor(2)\nWHERE Base.SalesAreaName = 'Spain' ;\n\
  ```\n\n## 使用 IsDescendantOf()\n\n`IsDescendantOf()` 方法用于评估层次结构中的某个节点是否是作为参数传入的节点的后代（在任何层级上）。我们可以使用这个方法来重写清单\
  \ 12-5 中的查询，该查询使用传统层次结构汇总了美国聚合区域下所有销售区域的 `SalesYTD`。\n\n你会记得，当使用传统层次结构时，我们必须实现一个递归\
  \ CTE，来为所有属于美国后代的层级汇总 `SalesYTD` 列。而当使用\n\n\n# 第 12 章 处理层次数据和 HierarchyID\n\n一个\
  \ `HierarchyID` 列来维护层次结构，然而，我们的代码被大大简化了，如代码清单 12-18 所示。\n\n### 代码清单 12-18. 使用 IsDescendantOf()\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n\
  FROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(0x68) =\
  \ 1 ;\n```\n\n与递归 CTE 不同，功能等价的代码是一个简单的查询，带有一个 `WHERE` 子句，该子句基于节点是否为美洲聚合区域的后代来过滤层次节点。代码清单\
  \ 12-19 展示了一个更复杂的例子。在这里，我们对销售区域进行参数化，并计算不仅包括总的 `SalesYTD`，还包括 `TotalSalesPeople`\
  \ 和该区域的 `AverageSalesPerSalesPerson`。\n\n### 代码清单 12-19. 对 IsDescendantOf() 查询进行参数化\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region NVARCHAR(20) = 'America'\
  \ ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
  \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = @Region\n) ;\n\n\
  SELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n\
  \    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n      AverageSalesPerSalesPerson\n\
  FROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
  \ = 1 ;\n```\n\n你可以清楚地看到 `Region` 参数如何能被传递到存储过程中，这样应用程序就可以访问这段代码。\n\n现在，让我们在 `SELECT`\
  \ 列表中添加一个 `SalesAreaName`，并按此列进行分组，如代码清单 12-20 所示。\n\n### 代码清单 12-20. 添加 GROUP BY\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region NVARCHAR(20) = 'America'\
  \ ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
  \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = @Region\n) ;\n\n\
  SELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n\
  \    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n      AverageSalesPerSalesPerson\n\
  \    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
  \ = 1\nGROUP BY SalesAreaName ;\n```\n\n![](img/index-383_1.jpg)\n\n此查询的结果如图 12-13\
  \ 所示。\n\n### 图 12-13. 结合使用 IsDescendantOf() 与 GROUP BY 的结果\n\n此查询结果揭示的一个有趣行为是 `America`\
  \ 被包含在内。这是因为 `HierarchyID` 将 `America` 视为其自身的后代。这对我们来说不会造成问题，因为聚合不是预先计算好的。然而，在某些情况下，你可能需要将\
  \ `America` 从结果集中排除。这可以通过在 `WHERE` 子句中添加一个额外的过滤器轻松实现，如代码清单 12-21 所示。\n\n### 代码清单\
  \ 12-21. 从后代中过滤掉当前节点\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region NVARCHAR(20)\
  \ = 'America' ;\nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n\
  \    FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = @Region\n) ;\n\n\
  SELECT\n    SUM(SalesYTD) AS TotalSalesYTD\n    , SUM(CountOfSalesPeople) AS TotalSalesPeople\n\
  \    , SUM(SalesYTD) / SUM(CountOfSalesPeople) AS\n      AverageSalesPerSalesPerson\n\
  \    , SalesAreaName\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
  \ = 1\n    AND SalesAreaHierarchy <> @RegionHierarchy\nGROUP BY SalesAreaName ;\n\
  ```\n\n此查询过滤结果集，排除了其层次节点等于传递给 `IsDescendantOf()` 方法的层次节点的销售区域。这种技术允许我们在 `GROUP BY`\
  \ 上使用 `WITH ROLLUP` 子句，并结合用 `ISNULL()` 函数包装 `SalesAreaName`，以为整个美洲区域生成一个小计行。这在代码清单\
  \ 12-22 中进行了演示。\n\n\n\n# 第 12 章 处理层级数据与 HierarchyID\n\n## 代码清单 12-22. 为美洲区域生成汇总行\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Region NVARCHAR(20) = 'America';\n\
  \nDECLARE @RegionHierarchy HIERARCHYID =\n(\n    SELECT SalesAreaHierarchy\n   \
  \ FROM Sales.SalesAreaHierarchyID\n    WHERE SalesAreaName = @Region\n);\n\nSELECT\n\
  \    SUM(SalesYTD) AS TotalSalesYTD,\n    SUM(CountOfSalesPeople) AS TotalSalesPeople,\n\
  \    SUM(SalesYTD) / SUM(CountOfSalesPeople) AS AverageSalesPerSalesPerson,\n  \
  \  ISNULL(SalesAreaName, @Region)\nFROM Sales.SalesAreaHierarchyID\nWHERE SalesAreaHierarchy.IsDescendantOf(@RegionHierarchy)\
  \ = 1\n    AND SalesAreaHierarchy <> @RegionHierarchy\nGROUP BY SalesAreaName WITH\
  \ ROLLUP;\n```\n\n此查询的结果可在图 12-14 中查看。\n\n## 图 12-14. 添加汇总行后的结果\n\n![](img/index-385_1.jpg)\n\
  \n## 为 HierarchyID 列建立索引\n\n没有像`XML`或地理空间数据类型那样支持`HierarchyID`的“特殊”索引类型。不过，可以通过使用传统的聚集索引和非聚集索引来提升`HierarchyID`列的性能。在为`HierarchyID`创建索引时，根据将使用这些索引的查询的性质，可以采用两种策略。\n\
  \n默认情况下，在`HierarchyID`列上创建索引将生成一个深度优先索引。这意味着后代节点将存储在靠近其父节点的位置。在我们的例子中，纽约将存储在靠近东部的位置，而东部又将存储在靠近美国的位置，依此类推。代码清单\
  \ 12-23 中的脚本演示了如何在`SalesAreaHierarchy`列上创建一个采用深度优先方法的聚集索引。\n\n**注意**：此脚本首先删除`SalesAreaID`列上的主键，这会隐式删除该列上的聚集索引。本例中主键名称是系统生成的。因此，要运行此脚本，您必须将约束名称更改为反映您自己系统的名称。\n\
  \n## 代码清单 12-23. 创建深度优先聚集索引\n\n```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE\
  \ Sales.SalesAreaHierarchyID\nDROP CONSTRAINT PK__SalesAre__DB0A1ED5D7B258FB;\n\
  GO\n\nCREATE CLUSTERED INDEX SalesAreaHierarchyDepthFirst\nON Sales.SalesAreaHierarchyID(SalesAreaHierarchy);\n\
  GO\n```\n\n我们可以通过运行代码清单 12-24 中的查询来查看 SQL Server 如何组织这些数据。此查询使用未公开的`sys.fn_PhysLocFormatter()`函数，以`FileID:PageID:SlotID`格式返回每条记录的精确位置。\n\
  \n## 代码清单 12-24. 查看行位置\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    SalesAreaName,\n\
  \    sys.fn_PhysLocFormatter(%%physloc%%) AS PhysicalLocation\nFROM Sales.SalesAreaHierarchyID;\n\
  ```\n\n此查询返回如图 12-15 所示的结果。您可以看到每个节点都存储在其父节点之下。即使是西班牙也是如此，尽管我们在其他区域之后添加了它，这意味着它的原始位置本应是页面中最后使用的槽位。\n\
  \n![](img/index-388_1.jpg)\n\n## 图 12-15. 查看行位置的结果\n\n**提示**：当您自己运行查询时，行的物理位置很可能不同。\n\
  \n另一种可能的索引策略是广度优先技术。在这种方法中，同级节点将彼此靠近存储，而不是将后代节点彼此靠近存储。要实现广度优先索引策略，我们必须向表中添加一个额外的列，用于存储每个节点的层级。可以通过代码清单\
  \ 12-25 中的脚本来创建和填充此列。\n\n## 代码清单 12-25. 添加层级列以支持广度优先索引\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nALTER TABLE Sales.SalesAreaHierarchyID ADD\n    SalesAreaLevel INT NULL;\n\
  GO\n\nUPDATE Sales.SalesAreaHierarchyID\n```\n\n\n# 第 12 章 处理层次数据与 HierarchyID\n\
  \n`SET SalesAreaLevel = SalesAreaHierarchy.GetLevel() ;`\n\n使用清单 12-26, w 中的脚本，我们现在可以创建一个`聚集索引`，该索引首先按`节点`的层次级别排序，然后按`HierarchyID`列排序。这将使得同级节点在存储时彼此靠近。\n\
  \n`注意`：该脚本会先删除已有的`聚集索引`，因为一张表只能支持一个`聚集索引`。\n\n## 清单 12-26. 创建广度优先索引\n\n```sql\n\
  USE WideWorldImporters\n\nGO\n\nDROP INDEX SalesAreaHierarchyDepthFirst ON Sales.SalesAreaHierarchyID\
  \ ;\n\nGO\n\nCREATE CLUSTERED INDEX SalesAreaHierarchyBredthFirst\n\nON Sales.SalesAreaHierarchyID(SalesAreaLevel,\
  \ SalesAreaHierarchy) ;\n```\n\n清单 12-27 演示了如何使用与清单 12-24 相同的技术，来查看每个`节点`在层次结构中的实际位置。\n\
  \n这一次，除了返回`销售区域名称`外，我们还将返回`SalesAreaLevel`以便于分析。\n\n## 清单 12-27. 使用广度优先策略查看行位置\n\
  \n```sql\nUSE WideWorldImporters\n\nGO\n\nSELECT\n\nSalesAreaName\n\n, SalesAreaLevel\n\
  \n, sys.fn_PhysLocFormatter(%%physloc%%) AS PhysicalLocation\n\nFROM Sales.SalesAreaHierarchyID\
  \ ;\n```\n\n此查询的结果可在图 12-16 中找到。您会注意到行的顺序已经改变，并且`UK`、`Western Europe`、`Eastern Europe`、`Canada`、`USA`和`LATAM`现在彼此相邻，因为它们都处于层次结构的第\
  \ 2 级。\n\n![](img/index-391_1.jpg)\n\n## 图 12-16. 在广度优先层次结构中查看行位置的结果\n\n## 总结\n\n\
  `HierarchyID`是作为一个`.NET`类创建的，并在`SQL Server`中实现为一种数据类型。与在`SQL Server`中建模层次结构的传统方法相比，使用`HierarchyID`具有降低代码复杂性和提高性能的双重优势。`HierarchyID`数据类型公开了几种方法，开发者可以使用它们轻松地导航层次结构、插入新的层次节点或更新现有节点使其位于新的父节点之下。\n\
  \n根据我的经验，最常用的两种方法是`ToString()`方法（它允许开发者将层次节点格式化为人类可读的字符串表示形式）和`IsDescendantOf()`方法（它执行层次节点血缘评估，当节点是输入参数的后代时返回`1`，否则返回`0`）。\n\
  \n`Read()`和`Write()`方法提供了到`SQLCLR`的数据类型转换功能，但这些未在`T-SQL`中实现，因为可以轻松使用`CAST`和`CONVERT`函数来代替。\n\
  \n在为`HierarchyID`列建立索引时，可以采用深度优先策略或广度优先策略。深度优先是默认选项，它将子节点存储在其父节点附近。广度优先策略需要在表中增加一个额外的列来存储节点在层次结构中的级别。这允许一个多列索引将同级节点存储在一起。您选择的索引选项应反映针对`HierarchyID`列运行的查询的性质。\n\
