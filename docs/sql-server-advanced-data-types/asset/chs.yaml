  \ = Orders.OrderID\nINNER JOIN Warehouse.StockItems Products\n    ON Products.StockItemID\
  \ = OrderLines.StockItemID\nWHERE CustomerID = 1060\n    AND Orders.OrderID = 72646\n\
  FOR JSON AUTO, ROOT('SalesOrders'), INCLUDE_NULL_VALUES ;\n```\n\n此查询的结果可在代码清单 7-20.\
