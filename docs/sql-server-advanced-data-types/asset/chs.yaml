- "# 第 1 章 SQL Server 数据类型\n\n清单 1-6 中的脚本展示了当日期和时间值被转换为每种日期和时间数据类型时，将如何显示。该脚本使用`SYSUTCDATETIME()`函数来获取当前系统日期和时间。\n\
  \n**清单 1-6.** 将值转换为每种日期和时间数据类型\n\n```sql\nSELECT\nCAST(SYSUTCDATETIME() AS time(7))\
  \ AS 'TIME'\n,CAST(SYSUTCDATETIME() AS date) AS 'DATE'\n,CAST(SYSUTCDATETIME() AS\
  \ smalldatetime) AS 'SMALLDATETIME'\n,CAST(SYSUTCDATETIME() AS datetime) AS 'DATETIME'\n\
  ,CAST(SYSUTCDATETIME() AS datetime2(7)) AS 'DATETIME2'\n,CAST(SYSUTCDATETIME() AS\
  \ datetimeoffset(7)) AS 'DATETIMEOFFSET'\n;\n```\n\n运行清单 1-6 中的查询结果可在图 1-4 中找到。\n\
  \n**图 1-4.** 将值转换为每种日期和时间数据类型的结果\n\n## 其他标准数据类型\n\nSQL Server 提供了许多其他可用于特殊目的的标准数据类型。这些数据类型的描述可在表\
  \ 1-8 中找到。\n\n**表 1-8.** 杂项数据类型\n\n| 数据类型 | 描述 | 大小 | 允许的用途 |\n| :--- | :--- | :---\
  \ | :--- |\n| `CURSOR` | 存储游标，用于变量或存储过程输出参数 | 可变 | 变量或存储过程 OUTPUT 参数 |\n| `TIMESTAMP`\
  \ | 暴露系统生成的唯一二进制值。用于表中行的版本控制 | 8 字节 | 表、变量、存储过程参数 |\n| `UNIQUEIDENTIFIER` | 存储 GUID（全局唯一标识符）\
  \ | 16 字节 | 表、变量、存储过程参数 |\n| `SQL_VARIANT` | 可存储多种数据类型的数据。当您不知道将要输入的数据的数据类型时可以使用，但这是一种非常糟糕的做法\
  \ | 可变 | 表、变量、存储过程参数 |\n| `TABLE` | 在变量中存储结果集，供以后使用 | 可变 | 变量 |\n\n清单 1-7 中的脚本创建了一个`UNIQUEIDENTIFIER`数据类型的值，该值是使用`NEWID()`系统函数创建的。\n\
  \n**清单 1-7.** 创建 `UNIQUEIDENTIFIER`\n\n```sql\nSELECT NEWID();\n```\n\n运行清单 1-7\
  \ 中的查询结果可在图 1-5 中找到。\n\n**图 1-5.** 查看使用`NEWID()`创建的`UNIQUEIDENTIFIER`\n\n## 高级数据类型概述\n\
  \nSQL Server 提供了多种高级数据类型。这些数据类型将在本书中讨论，但其概述可在表 1-9 中找到。\n\n**表 1-9.** 高级数据类型\n\n\
  | 数据类型 | 描述 |\n| :--- | :--- |\n| `HIERARCHYID` | `HierarchyID` 可用于以十六进制形式存储层次结构数据，例如部门结构的\
  \ BoM（物料清单）。该数据类型公开了许多方法，使开发人员能够轻松地导航层次结构。 |\n| `XML` | 用于以本机 XML 格式存储数据。然后可以使用\
  \ FLWOR（在第 4 章讨论）语句对数据进行操作。 |\n| `JSON` | 以本机 JSON 格式存储数据。SQL Server 提供了函数来转换 JSON\
  \ 数据、从 JSON 中提取值以及修改 JSON 数据。 |\n| `GEOGRAPHY` | 使用圆形地球模型存储位置数据。该数据类型公开了许多可用于与地理空间数据交互的方法。\
  \ |\n| `GEOMETRY` | 使用平面地球模型存储位置数据。该数据类型公开了许多可用于与地理空间数据交互的方法。 |\n\n使用`CONVERT()`函数处理`XML`数据时可用的样式选项详见表\
  \ 1-10。\n\n**表 1-10.** `XML` 数据的样式选项\n\n| 样式代码 | 输出 |\n| :--- | :--- |\n| 0 | 默认值。丢弃不需要的空白，不允许创建内部\
  \ DTD |\n| 1 | 保留所有空白 |\n| 2 | 丢弃不需要的空白，但允许有限的 DTD 处理 |\n| 3 | 保留空白并允许有限的 DTD 处理\
  \ |\n\n## 为什么使用正确的数据类型很重要？\n\n\n\n## SQL Server 数据类型与 XML 基础\n\n### INT 数据类型与存储优化\n\
  \nSQL Server 中最常用但也最常被误用的数据类型是 `INT`。当开发者需要存储整数时，`INT` 通常是默认选择。然而，开发者往往只需要存储较小的值。`INT`\
  \ 使用 4 字节数据，而如果 `SMALLINT` 足够，则只需 2 字节存储空间。对于小型查找表（少于 255 行），可以使用 `TINYINT` 作为主键，每行仅使用\
  \ 1 字节存储空间。\n\n你可能会想，如今存储相对便宜，这里差 2 或 3 字节真的有影响吗？要回答这个问题，不应仅从存储角度考虑，还应从内存使用和应用性能角度思考。\n\
  \n假设你有一个包含 10 亿行的事实表，需要与五个维度表进行连接，每个维度表包含 30,000 行。如果在这些维度表中使用 `INT` 数据类型作为主键，该列在每个维度表中将是\
  \ 117KB，但事实表中对应的外键列将达到 3.72GB！现在将其乘以 5（覆盖每个维度表），总计达到 18.6GB。这就是 SQL Server 在执行查询连接表之前，可能需要从磁盘读取到内存，然后再溢出到\
  \ `TempDB` 的数据量。如果我们改用 `SMALLINT` 数据类型，SQL Server 只需处理 9.3GB 的数据。\n\n### 数据类型一致性的重要性\n\
  \n选择数据类型时的另一个考虑是，当相同数据存储在多个列中时，确保使用相同的数据类型。例如，假设你有一个 ETL 过程，从 OLTP 数据库抽取数据到数据仓库。你可能会通过运行查询（基于日期等列进行连接或过滤）来填充数据仓库。如果列之间的数据类型不一致——例如，一个表中日期存储为\
  \ `DATE` 类型，而另一个列中存储为 `DATETIME2`——那么就会发生隐式转换操作。这些操作会对性能产生负面影响，甚至会阻止使用最优的索引。\n\n\
  **提示**：如果需要进行数据类型转换，我通常建议手动使用 `CAST` 或 `CONVERT` 函数来执行，而不是允许隐式转换。这可以在调试时使代码更易于理解。\n\
  \n## 总结\n\nSQL Server 开箱即用地提供了大量数据类型，可以满足大多数开发场景的需求。数值可以存储为整数，或具有精确或近似的小数精度。字符数据可以使用\
  \ Unicode 或非 Unicode 字符集存储。SQL Server 还可以存储日期、时间或两者。你还可以选择记录时区信息。\n\n可以使用 `CAST`\
  \ 或 `CONVERT` 函数在不同的数据类型之间转换值。使用 `CONVERT` 函数时，可以通过样式参数提供额外的翻译信息。\n\n在使用 SQL Server\
  \ 开发时，使用正确的数据类型至关重要。选择数据类型时，开发者应使用能够存储所有必需值的、限制最严格的数据类型。如果错误地使用了范围更广的数据类型，那么随着数据库规模的扩大，可能会对内存利用率和性能产生严重影响。\n\
  \n## 理解 XML\n\nXML（可扩展标记语言）是一种类似于 HTML 的标记语言，设计目的是用于存储和传输数据。与 HTML 类似，XML 由标签组成。然而，与\
  \ HTML 不同，这些标签不是预定义的，而是由文档作者定义。XML 文档具有树状结构，以根节点开始，并包含子节点（也称为子元素）。每个元素可以包含数据，也可以包含\
  \ 1 到 n 个属性。\n\n本章将通过解释 XML 文档的结构来帮助你理解 XML，然后再深入探讨……\n\n\n\nXML 片段与格式良好的 XML 之间的区别、XML\
  \ 模式，以及 XML 数据在 SQL Server 中通常如何被使用。\n\n## 理解 XML\n\n每个属性都可以包含描述该元素的数据。例如，假设你需要将销售订单的详细信息以\
  \ XML 格式存储。很自然地，可以认为每个销售订单应存储在文档中一个独立的元素里。但是，销售订单的属性，如订单日期、客户 ID、产品 ID、数量和价格，该如何处理呢？这些信息既可以作为销售订单元素的子元素来存储，也可以作为该元素的属性来存储。对于何时应使用子元素或属性来描述元素的属性，并没有固定的规则。这个选择权在文档作者手中。\n\
  \n© Peter A. Carter 2018  \nP. A. Carter, *SQL Server 高级数据类型*,  \n`doi.org/10.1007/978-1-4842-3901-8_2`\n\
  \n"
- "# 第 2 章 理解 XML\n\n清单 2-1 中的 XML 文档提供了一个示例，其中包含了一个虚构组织的销售订单详情。在此示例中，文档作者选择使用一个元素来存储每个销售订单，并使用嵌套元素来存储订单的每个行项目。每个销售订单和行项目的详细信息则存储在元素的属性中。\n\
