  \n正如嵌套基于表连接自动发生一样，这同样适用于子查询。请考虑清单 7-21 中的查询，它在`SELECT`列表中包含两个关联子查询，用于返回下单客户的名称和销售该订单的销售人员的名称。\n\
  \n**提示**：嵌套结构更容易被编程语言处理。\n\n## 清单 7-21. 使用子查询来嵌套数据\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nSELECT\n    Orders.OrderID\n    , (SELECT FullName FROM Application.People\
  \ WHERE PersonID = Orders.CustomerID FOR JSON AUTO) AS 'Customer'\n    , (SELECT\
