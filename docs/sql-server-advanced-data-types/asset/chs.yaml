  \ | `GEOGRAPHY`, `GEOMETRY` | OGC | 返回实例的表面积。 |\n| `STAsBinary()` | `GEOGRAPHY`,\
  \ `GEOMETRY` | OGC | 返回实例的 WKB。 |\n| `STAsText()` | `GEOGRAPHY`, `GEOMETRY` | OGC\
  \ | 返回实例的 WKT。 |\n\n\n\n# 第 11 章 处理空间数据\n\n## 表 11-2 空间数据函数\n\n| 方法 | 描述 | 适用类型\
  \ | OGC/扩展 |\n| :--- | :--- | :--- | :--- |\n| `STBoundary()` | 返回几何实例的边界。 | 仅 `GEOMETRY`，`GEOGRAPHY`\
