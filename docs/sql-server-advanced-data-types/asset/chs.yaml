- "# 第 4 章 查询与分解 XML\n\n为了让开发者能够从 `SQL Server` 内部查询和导航 XML 文档，可以将 `XQuery` 语言与 `T-SQL`\
  \ 查询结合使用。在本章中，我将讨论如何使用 `XQuery` 来过滤、提取和修改 XML。我还将讨论分解 XML 的过程，即将 XML 数据转换为关系结果集的过程。最后，提供了如何将\
  \ `XSD` 架构绑定到数据类型为 `XML` 的列的概述。\n\n## 查询 XML\n\n`XQuery` 是一种用于查询 XML 的语言，就像 `SQL`\
  \ 是用于查询关系数据的语言一样。该语言构建在 `XPath` 之上，但进行了增强以实现更好的迭代和排序。它还允许构建 XML。`XQuery` 标准由 `W3C`（万维网联盟）与\
  \ Microsoft 和其他主要关系数据库管理系统（`RDBMS`）供应商共同开发。\n\n`SQL Server` 中的 `XQuery` 支持针对 `XML`\
  \ 数据类型的五种方法。这些方法的概述见表 4-1，本章将逐一演示这些方法。`XQuery` 还支持使用 `XSD` 架构，以帮助处理复杂文档和 `FLWOR`（发音同“flower”）语句。`FLWOR`\
  \ 是 `for`、`let`、`where`、`order by` 和 `return` 的首字母缩写。\n\n`for` 语句允许您遍历节点序列。`let`\
  \ 语句将序列绑定到变量。`where` 语句基于布尔表达式过滤节点。`order by` 语句在返回节点前对其进行排序。`return` 语句指定应返回的内容。\n\
  \n**提示** `XSD` 架构的结构和优势在第 2 章中有解释。\n\n为了演示本章中 `XQuery` 方法的使用，我们将在 `WideWorldImporters`\
  \ 数据库中创建一个名为 `Sales.CustomerOrderSummary` 的表。可以使用清单 4-1 中的脚本来创建此表。\n\n### 表 4-1.\
  \ XQuery 方法\n\n| `exist()` | 检查 XML 文档中是否存在具有指定值的节点。如果存在具有指定值的节点，则返回 1，否则返回 0。 |\n\
  | :--- | :--- |\n| `modify()` | 对 XML 文档执行数据修改语句。可接受的 `DML` 操作是 `insert`、`delete`\
  \ 和 `replace value of`。 |\n| `nodes()` | 返回一个包含原始 XML 实例副本的行集。用于将 XML 分解为关系结果集。\
  \ |\n| `query()` | 以 XML 格式返回 XML 文档的子集。 |\n| `value()` | 从 XML 文档返回单个标量值，映射到 `SQL\
  \ Server` 数据类型。 |\n\n### 清单 4-1. 创建 Sales.CustomerOrderSummary 表\n\n```sql\nUSE\
  \ WideWorldImporters\nGO\nCREATE TABLE Sales.CustomerOrderSummary\n(\n    ID INT\
  \ NOT NULL IDENTITY,\n    CustomerID INT NOT NULL,\n    OrderSummary XML\n) ;\n\n\
  INSERT INTO Sales.CustomerOrderSummary (CustomerID, OrderSummary)\nSELECT\n    CustomerID,\n\
  \    (\n        SELECT\n            CustomerName 'OrderHeader/CustomerName'\n  \
  \          , OrderDate 'OrderHeader/OrderDate'\n            , OrderID 'OrderHeader/OrderID'\n\
  \            , (\n                SELECT\n                    LineItems2.StockItemID\
  \ '@ProductID'\n                    , StockItems.StockItemName '@ProductName'\n\
  \                    , LineItems2.UnitPrice '@Price'\n                    , Quantity\
  \ '@Qty'\n                FROM Sales.OrderLines LineItems2\n```\n\n© Peter A. Carter\
  \ 2018\nP. A. Carter, *SQL Server 高级数据类型*, [`doi.org/10.1007/978-1-4842-3901-8_4`](https://doi.org/10.1007/978-1-4842-3901-8_4)\n\
  \n\n## 使用 exist()\n\n`exist()` 方法用于检查具有指定值的节点是否存在。例如，请考虑清单 4-2 中的脚本。该查询将以编程方式检查包含销售订单详细信息的\
  \ XML 文档中是否包含“巧克力鲨鱼 250 克”产品。\n\nXQuery 的第一部分定义了要评估节点的路径，在本例中是 `StockItemName` 属性。我们通过在节点名前添加\
  \ `@` 符号来定义该节点是一个属性。然后，我们指定 `eq` 作为比较运算符，再提供我们要用来验证节点的值。如果满足条件，`exist()` 将返回 `1`。如果不满足条件，则返回\
  \ `0`。\n\n***清单 4-2.*** 检查值的存在性\n\n```sql\nDECLARE @SalesOrders XML;\nSET @SalesOrders\
  \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers CustomerName=\"\
  Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks 250g\">\n   \
  \         <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n        </Product>\n\
  \    </Customers>\n</SalesOrder>';\n\nSELECT @SalesOrders.exist('SalesOrder/Customers/Product[(@StockItemName)\
  \ eq \"Chocolate sharks 250g\"]');\n```\n\n你可以看到 `exist()` 方法如何轻松地用于 `WHERE` 子句中，针对数据类型为\
  \ `XML` 的列。例如，考虑清单 4-3 中的脚本，它在 `WideWorldImporters` 数据库的 `Sales.CustomerOrderSummary`\
  \ 表的 `WHERE` 子句中使用了 `exist()` 方法，仅返回 Tailspin Toys (Absecon, NJ) 的订单摘要。\n\n你会注意到，因为我们评估的是元素的值，而不是属性，所以我们使用了\
  \ `text()` 方法来提取值。`[1]` 表示将返回一个单例值。\n\n***清单 4-3.*** 使用 `exist()` 方法过滤表\n\n```sql\n\
  SELECT\n    CustomerID,\n    OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\n\
  WHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/CustomerName[(text()[1])\
  \ eq \"Tailspin Toys (Absecon, NJ)\"]') = 1;\n```\n\n## 使用 value()\n\n`value()`\
  \ 方法用于从 XML 文档中提取单个标量值，并将其映射到 SQL Server 数据类型。例如，考虑清单 4-4 中的脚本。该脚本使用了与清单 4-1 相同的\
  \ XML 文档，但这次是从文档中提取客户名称。\n\n与使用 `exist()` 方法时一样，我们必须使用 `@` 符号作为属性的前缀。我们还必须指明将返回一个单例值。\n\
  \n***清单 4-4.*** 使用 `value()` 方法\n\n```sql\nDECLARE @SalesOrders XML;\nSET @SalesOrders\
  \ =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\">\n    <Customers CustomerName=\"\
  Agrita Abele\">\n        <Product StockItemName=\"Chocolate sharks 250g\">\n   \
  \         <LineItem Quantity=\"192\" UnitPrice=\"8.55\" />\n        </Product>\n\
  \    </Customers>\n</SalesOrder>';\n\nSELECT @SalesOrders.value('(/SalesOrder/Customers/@CustomerName)[1]',\
  \ 'nvarchar(100)') AS CustomerName;\n```\n\n\n\n"
- "# 第四章 查询与分解 XML\n\n**图 4-2.** 使用`value()`方法的结果\n\n`value()`方法也可用于对表进行操作，从每一行中提取值。例如，清单\
  \ 4-5 中的脚本可用于从`Sales.CustomerOrderSummary`表的每一行中提取客户名称。\n\n![](img/index-132_1.jpg)\n\
  \n**清单 4-5.** 对表使用`value()`方法\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n  \
  \  CustomerID\n    , OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\nFROM Sales.CustomerOrderSummary\
  \ ;\n```\n\n该查询的部分结果可在图 4-3 中找到。\n\n**图 4-3.** 对表使用`value()`方法的结果\n\n`value()`方法也可用于查询的`WHERE`子句中。\n\
  \n例如，清单 4-6 中的查询在功能上等同于清单 4-5 中的查询。它只是使用`value()`方法重写了，而不是使用`exist()`方法。\n\n**清单\
  \ 4-6.** 使用`value()`方法筛选表\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n    CustomerID\n\
  \    , OrderSummary\nFROM WideWorldImporters.Sales.CustomerOrderSummary\nWHERE OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    CustomerName)[1]', 'nvarchar(100)') = 'Tailspin Toys (Absecon, NJ)' ;\n```\n\
  \n## 使用 `query()`\n\n`query()`方法用于从 XML 文档返回一个未类型化的 XML 文档。例如，考虑清单 4-7 中的脚本。该查询将以\
  \ XML 格式从 XML 文档中提取产品详细信息。\n\n**清单 4-7.** 提取产品详细信息\n\n```sql\nDECLARE @SalesOrders\
  \ XML ;\nSET @SalesOrders =\n'<SalesOrder OrderDate=\"2016-05-27\" OrderID=\"73356\"\
  >\n    <Customers CustomerName=\"Agrita Abele\">\n        <Product StockItemName=\"\
  Chocolate sharks 250g\">\n            <LineItem Quantity=\"192\" UnitPrice=\"8.55\"\
  \ />\n        </Product>\n    </Customers>\n</SalesOrder>' ;\nSELECT @SalesOrders.query('/SalesOrder/Customers/Product')\
  \ AS\nProductDetails ;\n```\n\n![](img/index-134_1.jpg)\n\n此查询的结果如图 4-4 所示。\n\n\
  **图 4-4.** 提取产品详细信息的结果\n\n要了解在查询表时如何使用`query()`方法，请考虑清单 4-8 中的脚本。此查询使用了迄今为止讨论的所有\
  \ XQuery 方法。`value()`方法用于提取客户名称和订单 ID，而`query()`方法用于提取所订购产品的详细信息。该表使用`exist()`方法进行筛选。\n\
  \n**清单 4-8.** 对表使用`query()`、`value()`和`exist()`\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
  \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
  \    CustomerName[(text()[1]) eq \"Tailspin Toys (Absecon, NJ)\"]') = 1 ;\n```\n\
  \n![](img/index-135_1.jpg)\n\n此查询返回的结果如图 4-5 所示。\n\n**图 4-5.** 对表使用`query()`、`value()`和`exist()`的结果\n\
  \n## 在 XQuery 中使用关系值\n\n来自 T-SQL 变量和列的关系值也可以传递到 XQuery 表达式中。它们可以用于筛选甚至构造数据，但它们是只读的。因此，不能使用\
  \ XQuery 表达式来修改关系变量或列值。\n\n要查看此功能的实际操作，请考虑清单 4-9 中的查询。\n\n该查询在功能上等同于清单 4-7 中的查询。然而，这次我们没有使用硬编码的客户名称筛选器，而是从\
  \ T-SQL 变量传入。使用 T-SQL 变量或表中列的查询被称为跨域查询。\n\n**清单 4-9.** 参数化`exist()`方法\n\n```sql\n\
  USE WideWorldImporters\nGO\nDECLARE @CustomerName NVARCHAR(100) ;\nSET @CustomerName\
  \ = 'Tailspin Toys (Absecon, NJ)' ;\nSELECT\n    OrderSummary\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    CustomerName)[1]', 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
  \    Product') AS ProductsOrdered\nFROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
  \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
  \nT-SQL 变量也可用于构造 XML。\n\n例如，清单 4-10 中的脚本在结果集中生成一个新列，其中包含一个 XML 片段。此片段有一个名为`CustomerDetails`的元素。在此元素中，您会注意到一个名为`GoldCustomer`的属性。这是一个从\
  \ T-SQL 变量配置的标志。\n\n请注意，当在`query()`方法中使用时，我们将`sql:variable`语句放在双引号和大括号内。\n\n**清单\
  \ 4-10.** 构造 XML 片段并从 T-SQL 变量传递值\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE\
  \ @Gold NVARCHAR(3)\nDECLARE @CustomerName NVARCHAR(100)\nSET @Gold = 'Yes'\nSET\
  \ @CustomerName = 'Tailspin Toys (Absecon, NJ)'\n\nSELECT\n    OrderSummary\n  \
  \  , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]',\
  \ 'nvarchar(100)') AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
  \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails>GoldCustomer\
  \ =\n    \"{ sql:variable(\"@Gold\") }\" </CustomerDetails>') AS\n    CustomerDetails\n\
  FROM Sales.CustomerOrderSummary\nWHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n\
  \    CustomerName[(text()[1]) eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\
  \n此查询的结果可在图 4-6 中找到。生成的 XML 片段可在`CustomerDetails`列中找到。\n\n![](img/index-137_1.jpg)\n\
  \n**图 4-6.** 构造 XML 片段并从 T-SQL 变量传递值的结果\n\n当 XQuery 表达式针对表中的 XML 列运行时，存储在其他列中的关系数据也可以传递到\
  \ XQuery 表达式。例如，清单 4-11 中的脚本扩展了生成的`CustomerDetails` XML 片段，以包含来自`Sales.CustomerOrderSummary`表的`CustomerID`列的客户\
  \ ID。\n\n**清单 4-11.** 使用关系列构造 XML 片段\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE\
  \ @Gold NVARCHAR(3)\nDECLARE @CustomerName NVARCHAR(100)\nSET @Gold = 'Yes'\nSET\
  \ @CustomerName = 'Tailspin Toys (Absecon, NJ)'\nSELECT\n    OrderSummary\n    ,\
  \ OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n    CustomerName)[1]', 'nvarchar(100)')\
  \ AS CustomerName\n    , OrderSummary.value('(/SalesOrders/Order/OrderHeader/\n\
  \    OrderID)[1]', 'int') AS OrderID\n    , OrderSummary.query('/SalesOrders/Order/OrderDetails/\n\
  \    Product') AS ProductsOrdered\n    , OrderSummary.query('<CustomerDetails> CustomerID\
  \ =\n    \"{ sql:column(\"CustomerID\") }\" GoldCustomer =\n    \"{ sql:variable(\"\
  @Gold\") }\" </CustomerDetails>') As CustomerDetails\nFROM Sales.CustomerOrderSummary\n\
  WHERE OrderSummary.exist('SalesOrders/Order/OrderHeader/\n    CustomerName[(text()[1])\
  \ eq sql:variable(\"@CustomerName\") ]') = 1 ;\n```\n\n![](img/index-139_1.jpg)\n\
  \n\n\n"
