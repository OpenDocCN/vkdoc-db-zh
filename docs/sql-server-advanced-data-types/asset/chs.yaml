  \ XML 文档中第一个订单内的第一个产品的名称。`return`语句要求一个单值，而`let`只是赋值（与迭代多个值相对），因此我们无法返回多个产品。\n\n\
  ### 清单 4-14. 使用 let 查找产品名称\n\n```xquery\nSELECT @XML.query('\nlet $product := /SalesOrders/Order[1]/OrderDetails/Product/@ProductName\n\
