  ## 引言


  *SQL Server 高级数据类型*旨在揭开现代版本 SQL Server 中可供开发人员使用的复杂数据类型的神秘面纱。


  在过去的几年里，我注意到许多 SQL 开发人员虽然听说过 SQL Server 中每种复杂数据类型，但常常避免使用它们，因为他们不确定如何最好地利用这些数据类型。这导致开发出了一些次优的解决方案，例如我最近遇到的一个事件：一位非常优秀且经验丰富的
  SQL 开发人员使用自连接实现了复杂的层次逻辑，因为他对自己实现 `HierarchyID` 数据类型没有信心。


  这激励我撰写本书——帮助 SQL 以及其他负责在应用程序中编写 `T-SQL` 的开发人员，更好地理解 SQL Server 中可用的复杂数据类型，并让他们有信心恰当地使用这些复杂结构。


  本书首先探讨 SQL Server 中可用的简单、传统数据类型，并提醒读者为什么为数据类型做出正确的选择如此重要。接着，本书深入讨论了 SQL Server 中的复杂数据类型，即
  `XML`、`JSON`、`HierarchyID`、`GEOGRAPHY` 和 `GEOMETRY`。书中的许多代码示例基于我在伦敦担任 SQL Server
  顾问期间遇到的实际问题和解决方案。


  本书中的许多代码示例使用了 `WideWorldImporters` 示例数据库。该数据库的 GitHub 仓库可在 `github.com/Microsoft/sql-server-samples/tree/master/samples/databases/wide-world-importers`
  找到，`.bak` 文件可从 `github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`
  下载。


  xv


