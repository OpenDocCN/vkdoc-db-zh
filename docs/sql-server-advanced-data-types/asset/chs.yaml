  \ ProductID=\"45\" ProductName=\"Developer joke mug - there are 10 types of people\
  \ in the world (Black)\" Price=\"13\" Qty=\"7\" />\n      <Product ProductID=\"\
  58\" ProductName=\"RC toy sedan car with remote control (Black) 1/50 scale\" Price=\"\
  25\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n\
  \    <OrderHeader>\n      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n\
  \    <OrderDetails OrderID = \"122\">\n      <Product ProductID=\"22\" ProductName=\"\
  DBA joke mug - it depends (White)\" Price=\"13\" Qty=\"6\" />\n      <Product ProductID=\"\
  2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n     \
  \ <Product ProductID=\"111\" ProductName=\"Superhero action jacket (Blue) M\" Price=\"\
  30\" Qty=\"10\" />\n      <Product ProductID=\"116\" ProductName=\"Superhero action\
  \ jacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n\
  </SalesOrders>' ;\n\nEXEC sp_xml_preparedocument @ParseDoc OUTPUT, @SalesOrder ;\n\
  \nSELECT *\nFROM OPENXML(@ParseDoc, '/SalesOrders/Order/OrderDetails/Product')\n\
