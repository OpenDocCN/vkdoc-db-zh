  \ @ParseDoc ;\n```\n\n当你检查此脚本中 `OPENXML()` 语句的 `WITH` 子句时，你会看到我们首先指定了关系列名。通过查看 `Quantity`\
  \ 的映射，你会发现关系名不必与 XML 节点的名称匹配。然后我们指定一个\n\n"
- "# 查询与解析 XML\n\n在指定希望检索的节点路径之前，我们需要先为结果值定义关系数据类型。这是查询中最有趣的部分。您会注意到，我们使用了 `OPENXML()`\
  \ 函数的 `rowpattern` 参数来映射到最低层级的 `Product` 元素。这意味着 `Product` 元素是我们路径的起点。`ProductID`、`ProductName`\
  \ 和 `Quantity` 属性都是 `Product` 元素的属性。因此，我们为这些属性添加 `@` 前缀，以表明它们是属性，但不需要其他路径映射。`OrderID`\
  \ 属性是 `OrderDetails` 元素的属性。由于 `OrderDetails` 元素比 `Product` 元素高一级，我们使用 `../` 语法来指定必须向上导航一级。`OrderDate`\
  \ 元素比 `Product` 元素高两级；因此，我们使用两次 `../` 来指示应向上移动两级层次结构。另外请注意，由于 `OrderDate` 是一个元素而非属性，我们没有在该节点前添加\
  \ `@` 符号。\n\n最后，为了映射到 `CustomerName` 元素，我们首先必须使用 `../` 语法向上导航两级层次结构。然后，我们必须下降到一个兄弟节点（`OrderHeader`）中，以检索\
  \ `CustomerName` 元素。\n\n查询结果如图 4-10 所示。请注意，针对两个产品，`OrderID` 返回了 `NULL` 值。这是因为第二个销售订单没有指定\
  \ `OrderID` 元素。\n\n![](img/index-158_1.jpg)\n\n*图 4-10. 使用 `OPENXML()` 的结果*\n\n\
  ## 使用 Nodes 解析 XML\n\n如果您想从列中解析数据，而不是使用变量，可以通过 XQuery 解析数据来避免迭代逻辑的需求。具体来说，`nodes()`\
  \ 方法可用于识别应映射到关系列的节点。这可以与 `value()` 方法结合使用，以从节点中提取数据。例如，考虑代码清单 4-29 中的查询。该查询在功能上等同于代码清单\
  \ 4-28 中的查询，但使用了 `nodes()` 方法而非 `OPENXML()`。\n\n### 代码清单 4-29. 使用 `nodes()` 解析 XML\n\
  \n```sql\nDECLARE @SalesOrder XML ;\n\nSET @SalesOrder = '\n<SalesOrders>\n<Order>\n\
  <OrderDate>2013-01-02</OrderDate>\n<OrderHeader>\n<CustomerName>Camille Authier</CustomerName>\n\
  </OrderHeader>\n<OrderDetails>\n<Product ProductID=\"45\" ProductName=\"Developer\
  \ joke\nmug - there are 10 types of people in the world (Black)\"\nPrice=\"13\"\
  \ Qty=\"7\" />\n<Product ProductID=\"58\" ProductName=\"RC toy sedan car with remote\
  \ control (Black) 1/50 scale\" Price=\"25\" Qty=\"4\" />\n</OrderDetails>\n</Order>\n\
  <Order>\n<OrderDate>2013-01-02</OrderDate>\n<OrderHeader>\n<CustomerName>Camille\
  \ Authier</CustomerName>\n</OrderHeader>\n<OrderDetails OrderID = \"122\">\n<Product\
  \ ProductID=\"22\" ProductName=\"DBA joke mug - it\ndepends (White)\" Price=\"13\"\
  \ Qty=\"6\" />\n<Product ProductID=\"2\" ProductName=\"USB rocket launcher (Gray)\"\
  \ Price=\"25\" Qty=\"9\" />\n<Product ProductID=\"111\" ProductName=\"Superhero\
  \ action\njacket (Blue) M\" Price=\"30\" Qty=\"10\" />\n<Product ProductID=\"116\"\
  \ ProductName=\"Superhero action\njacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n\
  </OrderDetails>\n</Order>\n</SalesOrders>' ;\n\nSELECT\n    TempCol.value('@ProductID',\
  \ 'INT') AS ProductID\n    , TempCol.value('@ProductName', 'NVARCHAR(70)') AS ProductName\n\
  \    , TempCol.value('@Qty', 'INT') AS Quantity\n    , TempCol.value('../@OrderID',\
  \ 'INT') AS OrderID\n    , TempCol.value('../../OrderDate[1]', 'NVARCHAR(10)') AS\
  \ OorderDate\n    , TempCol.value('../../OrderHeader[1]/CustomerName[1]', 'NVARCHAR(15)')\
  \ AS CustomerName\nFROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product')\
  \ TempTable(TempCol) ;\n```\n\n在检查此脚本时，您应特别注意 `FROM` 子句。这里，我们将一个 XQuery 表达式传递到 `nodes()`\
  \ 方法中，\n\n"
- "# 第 4 章 查询与分解 XML\n\n来定义粒度。接着，我们为包含中间结果集的表和列定义任意名称。\n\n`nodes()`方法也可与`query()`方法结合使用，从而将一个\
  \ XML 文档分解为更小的 XML 文档。例如，请看**代码清单 4-30**中的查询。此查询以 XML 格式从 XML 文档中提取`Product`元素。\n\
  \n***代码清单 4-30.*** 结合使用`nodes()`方法与`query()`方法\n```sql\nDECLARE @SalesOrder XML\
  \ ;\n\nSET @SalesOrder = '\n<SalesOrders>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n\
  \    <OrderHeader>\n      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n\
  \    <OrderDetails>\n      <Product ProductID=\"45\" ProductName=\"Developer joke\
  \ mug - there are 10 types of people in the world (Black)\" Price=\"13\" Qty=\"\
  7\" />\n      <Product ProductID=\"58\" ProductName=\"RC toy sedan car with remote\
  \ control (Black) 1/50 scale\" Price=\"25\" Qty=\"4\" />\n    </OrderDetails>\n\
  \  </Order>\n  <Order>\n    <OrderDate>2013-01-02</OrderDate>\n    <OrderHeader>\n\
  \      <CustomerName>Camille Authier</CustomerName>\n    </OrderHeader>\n    <OrderDetails\
  \ OrderID = \"122\">\n      <Product ProductID=\"22\" ProductName=\"DBA joke mug\
  \ - it depends (White)\" Price=\"13\" Qty=\"6\" />\n      <Product ProductID=\"\
  2\" ProductName=\"USB rocket launcher (Gray)\" Price=\"25\" Qty=\"9\" />\n     \
  \ <Product ProductID=\"111\" ProductName=\"Superhero action jacket (Blue) M\" Price=\"\
  30\" Qty=\"10\" />\n      <Product ProductID=\"116\" ProductName=\"Superhero action\
  \ jacket (Blue) 4XL\" Price=\"34\" Qty=\"4\" />\n    </OrderDetails>\n  </Order>\n\
  </SalesOrders>' ;\n\nSELECT\n    TempCol.query('.') AS Product\nFROM @SalesOrder.nodes('SalesOrders/Order/OrderDetails/Product')\
  \ TempTable(TempCol) ;\n```\n\n此查询的结果可见于**图 4-11**。\n\n***图 4-11.*** 结合使用`nodes()`方法与`query()`方法的结果\n\
  \n`nodes()`方法相对于`OPENXML()`的最大优势在于其针对表的易用性。`CROSS APPLY`操作符可用于将`nodes()`方法应用于表内的多行。**代码清单\
  \ 4-31**中的查询阐释了这一点，它对`Sales.CustomerOrderSummary`表中的`OrderSummary`列调用了`nodes()`方法。该查询将为`CustomerID`为\
  \ 814 的客户所下每个销售订单上的每个产品返回一行。结果随后按每个产品的数量进行排序。\n\n***代码清单 4-31.*** 对表使用`nodes()`方法\n\
  ```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    CustomerID\n    , TempCol.value('@Qty',\
  \ 'INT') AS Quantity\n    , TempCol.value('@ProductName', 'NVARCHAR(70)') AS ProductName\n\
  \    , TempCol.query('.') AS Product\nFROM Sales.CustomerOrderSummary\nCROSS APPLY\
  \ OrderSummary.nodes('SalesOrders/Order/OrderDetails/Product') TempTable(TempCol)\n\
  WHERE CustomerID = 841\nORDER BY TempCol.value('@Qty', 'INT') DESC ;\n```\n\n此查询的部分结果可见于**图\
  \ 4-12**。\n\n***图 4-12.*** 对表使用`nodes()`方法的结果\n\n## 使用架构\n\n如**第 3 章**所讨论的，XML 文档可以绑定到一个架构，以确保其结构符合客户端约定。在\
  \ SQL Server 中，我们可以通过创建`XML SCHEMA COLLECTION`来定义 XSD 架构。为了演示这一点，假设我们希望将`Sales.CustomerOrderSummary`表中的`OrderSummary`列绑定到一个架构。第一步是创建`XML\
  \ SCHEMA COLLECTION`。我们可以使用**代码清单 4-32**中的代码来实现这一点。\n\n***代码清单 4-32.*** 创建`XML SCHEMA\
  \ COLLECTION`\n```sql\nUSE WideWorldImporters\nGO\n\nCREATE XML SCHEMA COLLECTION\
  \ OrderSummary AS\nN'<?xml version=\"1.0\" encoding=\"utf-16\"?>\n<xs:schema attributeFormDefault=\"\
  unqualified\"\nelementFormDefault=\"qualified\" xmlns:xs=\"http://www.w3.org/2001/XMLSchema\"\
  >\n  <xs:element name=\"SalesOrders\">\n    <xs:complexType>\n      <xs:sequence>\n\
  \        <xs:element maxOccurs=\"unbounded\" name=\"Order\">\n          <xs:complexType>\n\
  ```\n\n"
- "# 第 4 章 XML 的查询与分解\n\n### 模式定义\n\n```xml\n<xs:sequence>\n  <xs:element name=\"\
  OrderHeader\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element name=\"\
  CustomerName\" type=\"xs:string\" />\n        <xs:element name=\"OrderDate\" type=\"\
  xs:date\" />\n        <xs:element name=\"OrderID\" type=\"xs:unsignedInt\" />\n\
  \      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n  <xs:element name=\"\
  OrderDetails\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
  \ maxOccurs=\"unbounded\" name=\"Product\">\n          <xs:complexType>\n      \
  \      <xs:attribute name=\"ProductID\" type=\"xs:unsignedByte\" use=\"required\"\
  \ />\n            <xs:attribute name=\"ProductName\" type=\"xs:string\" use=\"required\"\
  \ />\n            <xs:attribute name=\"Price\" type=\"xs:decimal\" use=\"required\"\
  \ />\n            <xs:attribute name=\"Qty\" type=\"xs:unsignedShort\" use=\"required\"\
  \ />\n          </xs:complexType>\n        </xs:element>\n      </xs:sequence>\n\
  \    </xs:complexType>\n  </xs:element>\n</xs:sequence>\n</xs:complexType>\n</xs:element>\n\
  </xs:sequence>\n</xs:complexType>\n</xs:element>\n</xs:schema>\n```\n\n### 命名空间提示\n\
  \n**提示** 因为该模式未指定命名空间，它将与默认的空字符串命名空间关联。可以使用 `<xs:schema>` 属性 `xmlns:ns=http://your-namespace`\
  \ 向模式添加命名空间。\n\n### 将模式绑定到列\n\n我们可以通过使用清单 4-33 中的查询，将我们的模式绑定到 `OrderSummary` 列。\n\
  \n***清单 4-33.*** 将模式绑定到列\n\n```sql\nALTER TABLE Sales.CustomerOrderSummary\nALTER\
  \ COLUMN OrderSummary XML(OrderSummary);\n```\n\n### 在查询中引用模式\n\n我们在构造或查询 XML 数据时也可以引用模式。`FOR\
  \ XML` 子句包含一个 `WITH XMLNAMESPACES` 选项，可用于指定结果 XML 文档的目标命名空间，并且 XQuery 方法（如 `query`）可以以\
  \ `declare namespace` 语句开头。\n\n**提示** 关于命名空间使用的完整讨论超出了本书的范围。但是，可以在 [`docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/xml/with-xmlnamespaces?view=sql-server-2017)\
  \ 找到使用 `WITH XMLNAMESPACES` 的示例，在 [`docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/xml/value-method-xml-data-type?view=sql-server-2017)\
  \ 可以找到使用命名空间与 `query` 方法的示例。\n\n## 总结\n\nXQuery 是一种可用于查询存储在 SQL Server 列和变量中的 XML\
  \ 数据的语言。`exist()` 方法可用于检查节点或包含特定值的节点是否存在。`value()` 方法可用于从 XML 文档中提取标量值，而 `query()`\
  \ 方法可用于返回仍为 XML 格式的 XML 文档子集。\n\nFLWOR 语句可用于帮助导航和迭代 XML 文档。`for` 语句将变量绑定到输入序列。`let`\
  \ 语句用于将 XQuery 表达式赋值给变量。`where` 语句可用于筛选返回的结果。`order by` 语句可选择性地用于对 FLWOR 语句的结果进行排序。`return`\
  \ 语句指定将返回什么数据。\n\nT-SQL 变量和列可以传递到 XQuery 语句中。当采用这种技术时，它被称为**跨域查询**。它允许轻松地将值绑定到 XQuery\
  \ 语句，有助于简化逻辑并减少重复代码。\n\nXML 数据可以使用 `modify()` 方法进行修改。此方法允许开发人员使用以下三个选项之一：`insert`、`replace\
  \ value of` 或 `delete`。插入数据时，开发人员还可以利用更多选项，以便对插入发生的位置进行精细控制。例如，你可以选择在第一个、最后一个、某个节点之后或某个节点之前插入。\n\
  \nXML 数据可以转换为关系数据（即，分解）。\n\n\n可以通过 `OPENXML()` 函数或 `nodes()` XQuery 方法来实现。\n\n当使用\
  \ `OPENXML()` 函数时，必须先解析要分解的 XML 文档。这可以通过 `sys.sp_xml:preparedocument` 系统存储过程实现。一旦文档被分解，应使用\
  \ `sys.sp_xml:removedocument` 系统存储过程将解析树从内存中移除。\n\n"
- '# 第 4 章 查询与分解 XML


  当使用 `nodes()` XQuery 方法分解数据时，它可以与 `value()` 方法（将数据分解为关系型结果）或 `query()` 方法（将数据分解为更小的
  XML 文档）结合使用。您也可以将 `nodes()` 与 `value()` 和 `query()` 的组合一起使用。`nodes()` 方法最大的优点是它通过
  `CROSS APPLY` 操作符可以轻松地应用于列。


  '
- "# 第 5 章 XML 索引\n\n如第 3 章和第 4 章所述，SQL Server 允许您使用 `XML` 数据类型以原生 XML 格式将数据存储在表中。与其他大型对象类型一样，它最多可以存储\
  \ 2GB 每元组。虽然可以使用标准操作符（如 `=` 和 `LIKE`）来处理 XML 列，但您也可以选择使用 XQuery 表达式（本章将讨论）。然而，除非您创建\
  \ XML 索引，否则它们的效率可能相当低。\n\n对于大多数针对 XML 列的查询，XML 索引的性能将优于全文索引。SQL Server 支持主 XML 索引和三种类型的辅助\
  \ XML 索引：`PATH`、`VALUE` 和 `PROPERTY`。这些索引将在后续各节中讨论。不过，首先我将简要讨论聚集索引，因为在创建 XML 索引之前，表上必须存在聚集索引。\n\
  \n## 准备环境\n\n由于 `WideWorldImporters` 数据库中没有包含原生 XML 列的表，我们将创建一个 `OrderSummary` 表，用于本章的演示。该表将包含三列：一个\
  \ `IDENTITY` 列（名为 `ID`）、一个 `CustomerID` 列和一个 `XML` 列（名为 `OrderSummary`），其中将包含客户所有订单的摘要。可以使用清单\
  \ 5-1 中的脚本来创建并填充该表。\n\n© Peter A. Carter 2018\n\nP. A. Carter, *SQL Server Advanced\
  \ Data Types*, `doi.org/10.1007/978-1-4842-3901-8_5`\n\n第 5 章 XML 索引\n\n***清单 5-1.***\
  \ 创建 `OrderSummary` 表\n\n```sql\nUSE WideWorldImporters\n\nGO\n\nCREATE TABLE Sales.OrderSummary\n\
  (\n    ID INT NOT NULL IDENTITY,\n    CustomerID INT NOT NULL,\n    OrderSummary\
  \ XML\n) ;\n\nINSERT INTO Sales.OrderSummary (CustomerID, OrderSummary)\nSELECT\n\
  \    CustomerID,\n    (\n        SELECT\n            CustomerName 'OrderHeader/CustomerName'\n\
  \            , OrderDate 'OrderHeader/OrderDate'\n            , OrderID 'OrderHeader/OrderID'\n\
  \            , (\n                SELECT\n                    LineItems2.StockItemID\
  \ '@ProductID'\n                    , StockItems.StockItemName '@ProductName'\n\
  \                    , LineItems2.UnitPrice '@Price'\n                    , Quantity\
  \ '@Qty'\n                FROM Sales.OrderLines LineItems2\n                INNER\
  \ JOIN Warehouse.StockItems StockItems\n                    ON LineItems2.StockItemID\
  \ = StockItems.StockItemID\n                WHERE LineItems2.OrderID = Base.OrderID\n\
  \                FOR XML PATH('Product'), TYPE\n            ) 'OrderDetails'\n \
  \       FROM\n            (\n                SELECT DISTINCT\n                 \
  \   Customers.CustomerName\n                    , SalesOrder.OrderDate\n       \
  \             , SalesOrder.OrderID\n                FROM Sales.Orders SalesOrder\n\
  \                INNER JOIN Sales.OrderLines LineItem\n                    ON SalesOrder.OrderID\
  \ = LineItem.OrderID\n                INNER JOIN Sales.Customers Customers\n   \
  \                 ON Customers.CustomerID = SalesOrder.CustomerID\n            \
  \    WHERE customers.CustomerID = OuterCust.CustomerID\n            ) Base\n   \
  \     FOR XML PATH('Order'), ROOT ('SalesOrders'), TYPE\n    ) AS OrderSummary\n\
  FROM Sales.Customers OuterCust ;\n```\n\n## 聚集索引\n\n聚集索引会使表的数据页按照聚集索引键的顺序进行逻辑存储。聚集索引键可以是单列，也可以是列的集合。这通常是表的主键，但这并非强制要求，在某些情况下，您可能希望使用不同的列。本章后面将更详细地讨论这一点。\n\
  \n### 没有聚集索引的表\n\n当一个表没有聚集索引时，它被称为堆。堆由一个 `IAM`（索引分配映射）页（或多个页）以及一系列不链接在一起或按顺序存储的数据页组成。SQL\
  \ Server 确定表的页面的唯一方法是读取 `IAM` 页。当表作为堆存储时，每次访问表时，SQL Server 都必须读取表中的每一个页，即使您只想返回一行。图\
  \ 5-1 中的示意图说明了堆的结构。\n\n***图 5-1.** 堆结构*\n\n![](img/index-173_1.jpg)\n\n当数据存储在堆上时，SQL\
  \ Server 必须为每一行维护一个唯一标识符。它通过创建一个 `RID`（行标识符）来实现这一点。即使表上有非聚集索引，除非存在聚集索引，否则它仍然作为堆存储。在堆上创建非聚集索引时，使用\
  \ `RID` 作为指针，以便非聚集索引可以链接回基表中的正确行。非聚集索引以 `FileID: Page ID: Slot Number` 的格式存储 `RID`。\n\
  \n### 有聚集索引的表\n\n当您在表上创建聚集索引时，会创建一个 `B-Tree`（平衡树）结构。这通过创建指向数据的分层指针集来执行更高效的搜索操作，如图\
  \ 5-2 所示。此层次结构顶部的页面称为根节点。结构的底部级别称为叶级，对于聚集索引，叶级由表的实际数据页组成。根据表的大小，`B-Tree` 结构可以有一个或多个中间级别。\n\
  \n***图 5-2.** 聚集索引结构*\n\n第 5 章 XML 索引\n\n图 5-2 中的示意图显示，虽然叶级是数据本身，但上面的级别包含指向树中下方页面的指针。这使得\
  \ SQL Server 可以执行 Seek 操作。这是一种返回少量行的高效方法。它通过沿着 `B-Tree` 向下导航，使用指针找到所需的行。我们可以看到，如果需要，SQL\
  \ Server 仍然可以扫描表的所有页面以检索所需的行。这称为聚集索引扫描。或者，SQL Server 可能决定结合这两种方法来执行范围扫描。在这里，SQL\
  \ Server 将查找所需范围的第一个值，然后扫描叶级，直到遇到第一个不需要的值。SQL Server 可以这样做，因为表是按索引键排序的，这意味着它可以保证表后面不会有其他匹配值。\n\
  \n### 将主键聚集\n\n表的主键通常是聚集索引的自然选择。事实上，默认情况下，除非您另有指定，或者表上已存在聚集索引，否则创建主键将自动在该键上生成聚集索引。但在某些情况下，主键并不是聚集索引的正确选择。我亲身经历过的一个例子是，一个第三方应用程序要求表的主键是\
  \ `GUID`。\n\n`GUID`（全局唯一标识符）用于保证在整个网络中的唯一性。\n\n如果聚集索引是 `GUID`，这会带来两个主要问题，\n\n\n\n"
- '# 第 5 章 XML 索引


  建立在主键之上。第一个问题是大小。GUID 长达 16 字节。当表包含非聚集索引时，聚集索引键会存储在每一个非聚集索引中。对于唯一的非聚集索引，它在叶级为每一行存储；对于非唯一的非聚集索引，它同样在索引的根级和中间级为每一行存储。


  当你将 16 字节乘以数百万行时，这将极大地增加索引的大小，使其效率降低。


  第二个问题是，当生成 GUID 时，它是一个随机值。因为表中的数据是按照聚集索引键的顺序存储的，为了获得良好性能，你需要该键的值按顺序生成。为聚集索引键生成随机值将导致每次插入新行时，索引变得越来越碎片化。本章稍后将讨论碎片化问题。


  然而，对于第二个问题有一个变通方法。SQL Server 有一个名为 `NEWSEQUENTIALID()` 的函数，它生成的 GUID 值总是高于服务器上先前生成的值。因此，如果你在主键的
  `Default` 约束中使用此函数，就可以强制实现顺序插入。


  **注意**：服务器重启后，`NEWSEQUENTIALID()` 可能会以一个较低的值开始。这可能导致碎片化。


  如果主键必须是 GUID，或者是另一个宽列，例如 `National Insurance Number`，或者是由一组列构成的自然键，例如 `Customer
  ID`、`Order Date` 和 `Product ID`，强烈建议你在表中创建一个额外的列。该列可以是 `INT` 或 `BIGINT`，具体取决于你预期表中的行数，并且可以使用
  `IDENTITY` 属性或 `SEQUENCE` 来创建一个窄的、顺序的键，用于你的聚集索引。我建议确保使用窄键，因为它将包含在表上的所有非聚集索引中，并且在连接表时也会使用更少的内存。


  **注意**：如果你打算使用 XML 索引，则必须在主键上创建聚集索引。


  ## 聚集索引的性能考虑


  由于 `IAM` 页面按照存储在数据文件中的顺序（而非索引键的顺序）列出 `heap` 表的区，因此对 `heap` 进行表扫描可能比聚集索引扫描稍快一些，除非聚集索引具有
  0% 的碎片（这很少见）。


  当聚集索引键是递增的时，插入到聚集索引可能比插入到 `heap` 更快。当发生多个并行插入时尤其如此，因为当数据库引擎为放置新数据寻找空间时，`heap` 在系统页面（`GAM`/`SGAM`/`PFS`）上会遇到更多的争用。然而，如果聚集索引键不是递增的，那么插入将导致页拆分和碎片化。连锁反应是，插入速度会比插入到
  `heap` 更慢。如果你获取表锁并利用最小日志记录插入，向 `heap` 的大批量插入也可能更快。这是因为减少了对事务日志的 IO。


  由于大小改变导致行发生重定位的更新，在聚集索引上执行会比在 `heap` 上更快。这与上面提到的插入操作原因相同，即系统页面上的争用会更多。更新时，行的大小可能会因更新
  `VARCHAR` 列为更长的字符串等原因而改变。如果更新可以原地进行（无需重定位行），性能可能差异不大。删除操作在聚集索引上也可能比在 `heap` 上稍快，但差异不如更新操作那么明显。


  ![](img/index-177_1.jpg)


  ## 创建聚集索引



