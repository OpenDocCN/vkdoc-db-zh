  ## 总结


  `FOR XML` 子句可用于从 T-SQL 查询构建 XML 数据。`FOR XML` 子句可以在四种模式下使用：`RAW`、`AUTO`、`PATH` 和
  `EXPLICIT`。


  当在 `RAW` 模式下使用时，`FOR XML` 将生成一个扁平的 XML 实例，没有嵌套。它使用非常简单，并允许 XML 实例是以属性为中心或以元素为中心的。通过添加根节点，它也可以生成格式良好的
  XML。然而，它对格式的控制非常有限。


  `FOR XML AUTO` 使用起来非常简单，允许开发者创建嵌套的 XML 实例。与 `FOR XML RAW` 一样，`FOR XML AUTO` 可以生成以元素为中心或以属性为中心的文档，通过添加根节点可以使其格式规范。XML
  文档中的数据将根据表连接自动嵌套。节点的名称将源自表别名。


  当在 `PATH` 模式下使用时，`FOR XML` 提供了对 XML 文档布局更细粒度的控制。通过包含或省略 `@` 前缀，可以将每列定义为元素或属性。



  ## 第 3 章 使用 T-SQL 构建 XML


  `FOR XML EXPLICIT` 模式是 `FOR XML` 模式中最复杂但也最强大的一种。它的实现方式是将每个复杂节点定义在独立的查询中，并通过 `UNION
  ALL` 子句连接这些查询。


  层次结构位置可以通过列别名来定义，复杂的嵌套需求可以通过子查询来实现。


  层次结构定位通过 `tag` 和 `parent` 列来定义，它们始终分别是 `SELECT` 列表中的第一列和第二列。列别名允许声明节点名称，并定义每个节点应以元素为中心还是以属性为中心。


