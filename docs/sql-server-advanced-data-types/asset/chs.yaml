  \ | `GEOGRAPHY`, `GEOMETRY` | 扩展 | 验证空间实例。如果对象有效，则返回 0。如果对象无效，则返回描述无效原因的错误代码。这些错误代码及其含义可在文档中找到。\
  \ |\n| `Lat()` | 仅 `GEOGRAPHY` | OGC | 返回`POINT`的纬度。 |\n| `Long()` | 仅 `GEOGRAPHY`\
