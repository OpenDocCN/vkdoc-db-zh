  \ 列可能效率相当低下且性能不佳，除非创建了正确的 XML 索引来支持它们。对于 XML 列，XML 索引总是比全文索引更高效。正如本章所演示的，如果没有恰当地创建\
  \ XML 索引，XML 查询性能会受到显著损害。\n\n## 理解 JSON 格式\n\n基本的 JSON 语法使用名称/值对，并以冒号分隔。然后，JSON\
