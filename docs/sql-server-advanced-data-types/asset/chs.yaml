  ## 辅助 XML 索引


  辅助 XML 索引只能创建在已经具有主 XML 索引的 XML 列上。在后台，辅助 XML 索引实际上是内部节点表上的非聚集索引。辅助 XML 索引可以提升使用特定类型
  XQuery 处理的查询性能。


  `PATH` 辅助 XML 索引构建在节点表的 `Node ID` 和 `VALUE` 列上。此类索引可提升使用路径表达式的查询的性能，例如 `exists()`
  XQuery 方法。`VALUE` 辅助 XML 索引与此相反，构建在 `VALUE` 和 `Node ID` 列上。此类索引将提升搜索值的查询的性能，而无需知道包含所搜索值的
  XML 元素或属性的名称。


  最后，`PROPERTY` 辅助 XML 索引构建在基表的聚集索引键、节点表的 `Node ID` 和 `VALUE` 列上。如果查询试图从列的多个元组中检索节点，此类索引的性能非常好。


