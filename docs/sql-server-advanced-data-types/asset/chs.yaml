  57\" OrderID=\"73148\">\n    <LineItem StockItemID=\"31\" Quantity=\"7\" UnitPrice=\"\
  13.00\" />\n    <LineItem StockItemID=\"103\" Quantity=\"2\" UnitPrice=\"35.00\"\
  \ />\n  </SalesOrder>\n</SalesOrders>\n```\n\n清单 2-1 中的 XML 可以通过针对 `WideWorldImporters`\
  \ 数据库运行清单 2-2 中的查询来生成。\n\n### 清单 2-2. 生成以属性为中心的 XML\n\n```sql\nSELECT\n    SalesOrder.OrderDate\n\
