  \ AS BIGINT) AS 'BIGINT'\n    , CAST(2.5888712345678923456789 AS DECIMAL(23,22))\
  \ AS 'DECIMAL'\n    , CAST(2.5888712345678923456789 AS DECIMAL(18,17)) AS 'DECIMAL\
  \ ROUNDED'\n    , CAST(2.5888712345678923456789 AS NUMERIC(23,22)) AS 'NUMERIC'\n\
  \    , CAST(2.5888712345678923456789 AS FLOAT(24)) AS 'SINGLE FLOAT'\n    , CAST(2.5888712345678923456789\
  \ AS FLOAT(53)) AS 'DOUBLE FLOAT'\n    , CAST(2.5888712345678923456789 AS REAL)\
  \ AS 'REAL'\n    , CAST(2.5888712345678923456789 AS SMALLMONEY) AS 'SMALLMONEY'\n\
  \    , CAST(2.5888712345678923456789 AS MONEY) AS 'MONEY'\n```\n\n![](img/index-22_1.png)\n\
  \n清单 1-3 中查询的结果可以在 图 1-1 中找到。\n\n**图 1-1.** 转换为数值数据类型的结果\n\n## 字符串\n\nSQL Server\
  \ 可以存储 Unicode 和非 Unicode 字符串。字符串也可以存储为固定长度或可变长度。SQL Server 支持的字符数据类型列于 表 1-3。\n\
  \n**表 1-3.** 字符数据类型\n\n| 数据类型 | 可变/固定 | 最大长度 | 存储大小 | 描述 |\n| :--- | :--- | :---\
  \ | :--- | :--- |\n| `CHAR` | 固定 | 8,000 个字符 | 最大字符串长度 × 1 字节 | 存储非 Unicode 字符串，固定长度。如果字符串短于最大长度，将用空格填充。\
  \ |\n| `VARCHAR` | 可变 | 8,000 个字符或 `VARCHAR(MAX)` | 存储的字符串长度 × 1 字节 | 存储可变大小的非 Unicode\
  \ 字符串。使用 `VARCHAR` 时，必须传入一个值来指定字符串的最大长度。使用 `VARCHAR(MAX)` 时，最多可存储 2GB。 |\n| `NCHAR`\
  \ | 固定 | 4,000 个字符 | 最大字符串长度 × 2 字节 | 存储固定长度的 Unicode 字符串。如果字符串短于最大长度，将用空格填充。 |\n\
  | `NVARCHAR` | 可变 | 4,000 个字符或 `NVARCHAR(MAX)` | 存储的字符串长度 × 2 字节 | 存储可变大小的 Unicode\
