  \ ;\n```\n\n此查询返回的结果如图 7-1 所示。\n\n图 7-1. 销售订单的键和日期结果\n\n如果我们希望以 JSON 格式返回这些结果，可以附加`FOR\
  \ JSON`子句，如代码清单 7-2 所示。\n\n## 代码清单 7-2. 以 JSON 格式返回结果\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT\n    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\n\
  FROM Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO ;\n```\n\n此查询将产生如代码清单\
  \ 7-3 所示的结果。\n\n## 代码清单 7-3. 以 JSON 格式返回数据的结果\n\n```json\n[\n    {\n        \"OrderID\"\
  : 72646,\n        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n\
  \        \"OrderDate\": \"2016-05-18\"\n    },\n    {\n        \"OrderID\": 72738,\n\
  \        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n        \"\
  OrderDate\": \"2016-05-19\"\n    },\n    {\n        \"OrderID\": 72916,\n      \
  \  \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 6,\n        \"OrderDate\"\
  : \"2016-05-20\"\n    },\n    {\n        \"OrderID\": 73081,\n        \"CustomerID\"\
  : 1060,\n        \"SalespersonPersonID\": 8,\n        \"OrderDate\": \"2016-05-24\"\
  \n    }\n]\n```\n\n## 使用根节点\n\n由于我们的结果没有根节点，文档周围必须有一个数组包装器（以方括号的形式）。如果我们不希望结果被方括号包围，可以通过修改查询来移除它们，如代码清单\
  \ 7-4 所示。\n\n### 代码清单 7-4. 移除数组包装器\n\n```sql\nUSE WideWorldImporters\nGO\nSELECT\n\
  \    OrderID\n    , CustomerID\n    , SalespersonPersonID\n    , OrderDate\nFROM\
  \ Sales.Orders\nWHERE CustomerID = 1060\nFOR JSON AUTO, WITHOUT_ARRAY_WRAPPER ;\n\
  ```\n\n这个修改后的查询将返回如代码清单 7-5 所示的结果。\n\n### 代码清单 7-5. 没有数组包装器的结果\n\n```json\n{\n \
  \   \"OrderID\": 72646,\n    \"CustomerID\": 1060,\n    \"SalespersonPersonID\"\
  : 14,\n    \"OrderDate\": \"2016-05-18\"\n},\n{\n    \"OrderID\": 72738,\n    \"\
