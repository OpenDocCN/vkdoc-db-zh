  ```\n\n## `FOR JSON PATH`\n\n虽然本章 `FOR JSON AUTO` 部分的最后一个示例返回了销售订单摘要所需的所有数据，但文档的格式还有改进空间。由于不必要的嵌套，文档比必要的要长得多。例如，每个行项目只能有一个产品名称，因此理想情况下，`Products`\
  \ 数组在 `OrderLines` 数组中应该是一个简单的名称/值对。同样的原则也适用于客户和销售人员姓名。\n\n因此，让我们设想一下，我们希望生成一个如清单\
  \ 7-23 所示格式的 JSON 文档，它具有更简洁、更易于阅读的布局。\n\n## 清单 7-23. 期望的 JSON 格式\n\n```json\n{\n\
  \    \"SalesOrders\": [\n        {\n            \"OrderDetails\": {\n          \
  \      \"OrderID\": 72646,\n                \"Customer\": \"Konrads Sprogis\",\n\
  \                \"SalesPerson\": \"Lily Code\",\n                \"OrderDate\"\
  : \"2016-05-18\",\n                \"Comments\": null,\n                \"LineItems\"\
  : {\n                    \"UnitPrice\": 13,\n                    \"Quantity\": 6,\n\
  \                    \"ProductName\": \"开发者玩笑马克杯 - 世界上有 10 种人（黑色）\"\n          \
  \      }\n            }\n        },\n        {\n            \"OrderDetails\": {\n\
  \                \"OrderID\": 72646,\n                \"Customer\": \"Konrads Sprogis\"\
  ,\n                \"SalesPerson\": \"Lily Code\",\n                \"OrderDate\"\
  : \"2016-05-18\",\n                \"Comments\": null,\n                \"LineItems\"\
  : {\n                    \"UnitPrice\": 18,\n                    \"Quantity\": 108,\n\
  \                    \"ProductName\": \"万圣节骷髅面具（灰色）S\"\n                }\n    \
  \        }\n        },\n        {\n            \"OrderDetails\": {\n           \
  \     \"OrderID\": 72646,\n                \"Customer\": \"Konrads Sprogis\",\n\
  \                \"SalesPerson\": \"Lily Code\",\n                \"OrderDate\"\
  : \"2016-05-18\",\n                \"Comments\": null,\n                \"LineItems\"\
  : {\n                    \"UnitPrice\": 4.3,\n```\n\n# 第 7 章 从 T-SQL 构建 Json\n\n\
  ```json\n\"Quantity\": 20,\n\n\"ProductName\": \"Large replacement blades 18mm\"\
  \n\n}\n\n}\n\n},\n\n{\n\n\"OrderDetails\": {\n\n\"OrderID\": 72646,\n\n\"Customer\"\
  : \"Konrads Sprogis\",\n\n\"SalesPerson\": \"Lily Code\",\n\n\"OrderDate\": \"2016-05-18\"\
  ,\n\n\"Comments\": null,\n\n\"LineItems\": {\n\n\"UnitPrice\": 240,\n\n\"Quantity\"\
  : 2,\n\n\"ProductName\": \"USB food flash drive - dim sum 10 drive variety pack\"\
  \n\n}\n\n}\n\n}\n\n]\n\n}\n```\n\n我们可以轻松地通过使用 `FOR JSON PATH` 来实现这些结果，它提供了对结果文档格式的精细控制。这种控制是通过使用列别名来实现的，列别名允许你通过点分隔来指定所需的嵌套结构。请参阅清单\
  \ 7-24 中的查询。该查询与清单 7-21 中的类似，但有两个关键区别需要注意。第一个区别是 `FOR XML AUTO` 已更改为 `FOR JSON PATH`。第二个区别是每个列都被赋予了列别名，这些别名不仅指定了节点的名称，还指定了其在文档中的位置。例如，客户的全名将被放入一个名为\
  \ `Customer` 的节点中，该节点直接嵌套在 `OrderDetails` 下。相比之下，`ProductName` 节点将与单价和数量一起嵌套在一个名为\
  \ `LineItems` 的节点下。这会导致创建一个 `LineItems` 键，其值是由 JSON 对象组成的数组，包括前文指定的所有节点。结果就是清单 7-23.\
  \ 中的文档。\n\n## 清单 7-24. 使用 `FOR JSON PATH`\n\n```sql\nUSE WideWorldImporters\nGO\n\
  SELECT\nOrders.OrderID AS 'OrderDetails.OrderID'\n, Customers.FullName AS 'OrderDetails.Customer'\n\
  , SalesPeople.FullName AS 'OrderDetails.SalesPerson'\n, Orders.OrderDate AS 'OrderDetails.OrderDate'\n\
  , Orders.Comments AS 'OrderDetails.Comments'\n, OrderLines.UnitPrice AS 'OrderDetails.LineItems.UnitPrice'\n\
  , OrderLines.Quantity AS 'OrderDetails.LineItems.Quantity'\n, Products.StockItemName\
  \ AS 'OrderDetails.LineItems.ProductName'\nFROM Sales.Orders Orders\nINNER JOIN\
  \ Sales.OrderLines OrderLines\nON OrderLines.OrderID = Orders.OrderID\nINNER JOIN\
  \ Warehouse.StockItems Products\nON Products.StockItemID = OrderLines.StockItemID\n\
  INNER JOIN Application.People Customers\nON Customers.PersonID = Orders.CustomerID\n\
  INNER JOIN Application.People SalesPeople\nON SalesPeople.PersonID = Orders.SalespersonPersonID\n\
  WHERE CustomerID = 1060\nAND orders.OrderID = 72646\nFOR JSON PATH, ROOT('SalesOrders'),\
  \ INCLUDE_NULL_VALUES ;\n```\n\n## 小结\n\n`SELECT` 语句的 `FOR JSON` 子句可用于将结果集转换为 JSON\
  \ 格式。它可以在两种模式下使用：`AUTO` 或 `PATH`。当在 `AUTO` 模式下使用时，`FOR JSON` 会根据查询中的联接自动嵌套数据。当在\
  \ `PATH` 模式下使用时，`FOR JSON` 通过允许使用点分隔的列别名来定义每个关系列在 JSON 结果集中的位置，从而给予开发人员更多的控制权，这些别名用于控制嵌套。\n\
  \n`FOR JSON` 子句有多个选项可用于控制文档格式。例如，可以使用 `ROOT` 选项向文档添加根节点，或者如果不存在根节点，可以使用 `WITHOUT_ARRAY_WRAPPER`\
  \ 选项移除外部数组包装器。您还可以通过使用 `INCLUDE_NULL_VALUES` 选项来指定是否应在结果文档中包含 `NULL` 值。\n\n# 第 8\
  \ 章 展平 JSON 数据\n\n在第 7 章中，我讨论了如何将关系数据转换为 JSON 文档，但是如果我们需要像在第 4 章中学到的展平 XML 文档那样，将\
  \ JSON 文档展平到关系数据集中，该怎么办？我们可以使用 `OPENJSON()` 函数来实现这一点。`OPENJSON()` 函数接受一个 JSON 文档作为输入参数，并\n\
  \n\n输出一个表格形式的结果集。`OPENJSON()` 函数可以在指定或不指定结果集显式架构的情况下调用。`OPENJSON()` 还支持使用 JSON 路径表达式。本章将逐一考察这些选项。\n\
  \n## 使用默认架构的 OPENJSON()\n\n为了理解 `OPENJSON()` 函数如何与默认架构配合工作，让我们来检查 `WideWorldImporters`\
  \ 数据库中 `Application.People` 表的 `CustomFields` 列。清单 8-1 中的查询返回了 `PersonID`（表的主键）、`FullName`\
  \ 列以及包含 JSON 文档的 `CustomFields` 列。\n\n**提示** 与本书讨论的其他数据类型不同，SQL Server 2017 中并未实际创建\
  \ JSON 数据类型。相反，JSON 文档存储在 `NVARCHAR` 列中，并调用支持 JSON 的函数对数据进行解析和交互操作。\n\n© Peter A.\
  \ Carter 2018\nP. A. Carter, *SQL Server Advanced Data Types*,\n[`doi.org/10.1007/978-1-4842-3901-8_8`](https://doi.org/10.1007/978-1-4842-3901-8_8)\n\
  \n![](img/index-241_1.jpg)\n\n### 清单 8-1. 检查 Application.Person 表\n\n```sql\nUSE\
  \ WideWorldImporters\nGO\nSELECT\n    PersonID\n    , FullName\n    , CustomFields\n\
  FROM Application.People ;\n```\n\n从图 8-1 所示的部分结果集中，您会注意到 `CustomFields` 列包含一个 JSON\
  \ 文档，其中指定了每个人员的属性，例如他们的雇佣日期（对于员工）、使用的语言以及头衔。\n\n***图 8-1.** 检查 Application.Person\
  \ 表的结果*\n\n如果我们想使用 `OPENJSON()` 来分解特定用户的详细信息，我们必须首先将 JSON 文档传递到一个变量中，然后再将该变量传递给\
  \ `OPENJSON()` 函数。清单 8-2 演示了这一技术，它返回了 Anthony Grosse 的自定义字段。\n\n### 清单 8-2. 分解单个\
  \ JSON 文档\n\n```sql\nUSE WideWorldImporters\nGO\nDECLARE @CustomFields NVARCHAR(MAX)\
  \ ;\nSET @CustomFields = (\n    SELECT CustomFields\n    FROM Application.People\n\
  \    WHERE FullName = 'Anthony Grosse'\n) ;\nSELECT *\nFROM OPENJSON(@CustomFields)\
  \ ;\n```\n\n此脚本的结果如图 8-2 所示。\n\n***图 8-2.** 分解单个 JSON 文档的结果*\n\n`key` 列包含名称/值对的名称；`value`\
  \ 列包含名称/值对的值；`type` 列指示数据类型。表 8-1 详细列出了可返回的数据类型。\n\n### 表 8-1. 数据类型\n\n| 数据类型 ID\
  \ | 数据类型 |\n| :--- | :--- |\n| String | 0 |\n| Number | 1 |\n| Boolean | 2 |\n|\
  \ Array | 4 |\n| Object | 5 |\n\n## 分解整列数据\n\n但如果我们想分解整个列呢？`OPENJSON()` 函数只接受单个\
  \ JSON 对象，因此我们不能传入多行的值。相反，我们必须对表使用 `OUTER APPLY` 运算符。\n\n`OUTER APPLY` 运算符将函数应用于结果集中的每一行。如果函数返回\
  \ `NULL` 值，该行仍将包含在结果集中。这与 `CROSS APPLY` 运算符形成对比，后者也将函数应用于结果集中的每一行，但如果应用的函数返回 `NULL`，则会省略该行。\n\
  \n清单 8-3 中的查询演示了如何在 `Application.People` 表上使用 `OUTER APPLY` 运算符来分解 `CustomFields`\
  \ 文档。\n\n### 清单 8-3. 将 OUTER APPLY 与 OPENJSON() 一起使用\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT PersonID, FullName, CustomFields, JSON.*\nFROM Application.People\nOUTER\
  \ APPLY OPENJSON(CustomFields) JSON ;\n```\n\n此查询的部分结果如图 8-3 所示。\n\n***图 8-3.**\
  \ 使用 OUTER APPLY 与 OPENJSON() 的结果*\n\n您会注意到，`Application.Person` 表的结果会为 `OPENJSON()`\
  \ 函数返回的每一行进行重复。\n\n\n\n## 第 8 章 拆分 JSON 数据\n\n### 清单 8-4. 结合使用 `PIVOT` 与 `OPENJSON()`\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    PersonID\n    , FullName\n \
  \   , [OtherLanguages]\n    , [HireDate]\n    , [Title]\n    , [PrimarySalesTerritory]\n\
  \    , [CommissionRate]\nFROM (\n    SELECT\n        PersonID\n        , FullName\n\
  \        , JSON.[Key] AS JSONName\n        , JSON.value AS JSONValue\n    FROM Application.People\n\
  \        OUTER APPLY OPENJSON(CustomFields) JSON\n) Src\nPIVOT\n(\n    MAX(JSONValue)\n\
  \    FOR JSONName IN ([OtherLanguages], [HireDate], [Title],\n                 \
  \    [PrimarySalesTerritory], [CommissionRate])\n) pvt ;\n```\n\n![](img/index-246_1.jpg)\n\
  \n此查询的部分结果可见于图 8-4.\n\n**图 8-4.** 结合使用 `PIVOT` 与 `OPENJSON()` 的结果\n\n使用此方法的局限性在于，在编写查询之前必须知道\
  \ JSON 文档中每个键的名称。如果遗漏了任何键名，或者在之后添加了键，数据将不会出现在结果集中。这可能尤其具有挑战性，因为 JSON 文档无法绑定到架构。\n\
  \n**提示** 如果我们使用了 `CROSS APPLY` 而不是 `OUTER APPLY`，则 `PersonID` 为 1 的结果将被省略。\n\n为了将这些数据转换为列并避免行重复，你可以使用\
  \ `PIVOT` 运算符。`PIVOT` 运算符通过将某列中的唯一值旋转为单独的列来工作。这也可以描述为将行转换为列。然后，它将根据需要对剩余列执行聚合。使用多个\
  \ `CASE` 语句也可以实现相同的效果，但 `PIVOT` 运算符的效率要高得多。\n\n`PIVOT` 运算符的语法包含一个外部查询，后跟两个子查询。第一个子查询包含基础查询，而第二个包含透视规范。由于我们的值通常是文本，并且聚合并不适用，我们将使用\
  \ `MAX()` 聚合函数。这在清单 8-4 的查询中进行了演示。\n\n### 基于文档内容的动态拆分\n\n解决在开发时不知道文档内容问题的方法是使用动态\
  \ `PIVOT`。这涉及使用动态 SQL 在运行查询之前定义当前要透视的 JSON 键列表。此技术在清单 8-5. 中进行了演示。\n\n**提示** `QUOTENAME()`\
  \ 是一个系统函数，它通过将值括在方括号中来对其进行分隔。\n\n### 清单 8-5. 结合使用动态 `PIVOT` 与 `OPENJSON()`\n\n```sql\n\
  DECLARE @Columns NVARCHAR(MAX) ;\nDECLARE @SQL NVARCHAR(MAX) ;\n\nSET @Columns =\
  \ '' ;\n\nSELECT @Columns += ', p.' + QUOTENAME(JSONName)\nFROM (\n    SELECT DISTINCT\n\
  \        JSON.[Key] AS JSONName\n    FROM Application.People p\n        CROSS APPLY\
  \ OPENJSON(CustomFields) JSON\n) AS cols ;\n\nSET @SQL =\n'SELECT\n    PersonID\n\
  \    , FullName\n    , ' + STUFF(@Columns, 1, 2, '') + '\nFROM\n    (\n        SELECT\n\
  \            PersonID\n            , FullName\n            , JSON.[Key] AS JSONName\n\
  \            , JSON.value AS JSONValue\n        FROM Application.People\n      \
  \      OUTER APPLY OPENJSON(CustomFields) JSON\n    ) AS src\n    PIVOT\n    (\n\
  \        MAX(JSONValue) FOR JSONName IN ('\n        + STUFF(REPLACE(@Columns, ',\
  \ p.', ',['), 1, 1, '')\n        + ')\n    ) AS p ;' ;\n\nEXEC (@SQL) ;\n```\n\n\
  ### 带显式模式的 `OPENJSON()`\n\n当使用带显式模式的 `OPENJSON()` 时，你可以控制返回的结果集的格式。它将返回一个列，对应于你在\
  \ `WITH` 子句中指定的每个列，而不是三列的结果集。你还可以指定每列的数据类型。这些数据类型是 T-SQL 数据类型，而不是 JSON 数据类型，因此可以指定诸如\
  \ `DATE` 或 `DECIMAL` 之类的类型。例如，考虑清单 [8-6 中的脚本。\n\n### 清单 8-6. 使用带显式模式的 `OPENJSON()`\n\
  \n```sql\nDECLARE @CustomFields NVARCHAR(MAX) ;\n\nSET @CustomFields =\n    (\n\
  \        SELECT\n            CustomFields\n        FROM Application.People\n   \
  \     WHERE PersonID = 2\n    ) ;\n\nSELECT *\nFROM OPENJSON(@CustomFields)\nWITH\
  \ (\n    HireDate DATETIME2\n    , Title NVARCHAR(50)\n    , PrimarySalesTerritory\
  \ NVARCHAR(50)\n    , CommissionRate DECIMAL(5,2)\n) ;\n```\n\n此查询返回的结果如 图 8-5.\
  \ 所示。\n\n![](img/index-249_1.jpg)\n\n\n\n# 第 8 章 拆解 JSON 数据\n\n## 图 8-5. 使用带显式架构的\
  \ OPENJSON()的结果\n\n当返回的某一列本身是 JSON 对象时，情况会稍显复杂。例如，考虑代码清单 8-7 中的查询，它在查询中增加了`OtherLanguages`列。由于没有特定的\
  \ JSON 数据类型，我们将使用`NVARCHAR(MAX)`，因为它可以作为`NVARCHAR(MAX)`存储在表中。\n\n### 代码清单 8-7. 添加一个\
  \ JSON 列\n\n```sql\nDECLARE @CustomFields NVARCHAR(MAX) ;\n\nSET @CustomFields =\n\
  \n(\n\nSELECT\n\nCustomFields\n\nFROM Application.People\n\nWHERE PersonID = 2\n\
  \n) ;\n\nSELECT *\n\nFROM OPENJSON(@CustomFields)\n\nWITH (\n\nOtherLanguages NVARCHAR(MAX)\n\
  \n, HireDate DATETIME2\n\n, Title NVARCHAR(50)\n\n, PrimarySalesTerritory NVARCHAR(50)\n\
  \n, CommissionRate DECIMAL(5,2)\n\n) ;\n```\n\n此查询返回的结果如图 8-6 所示。\n\n### 图 8-6.\
  \ 添加 JSON 列后的结果\n\n那么，为什么`OtherLanguages`列返回了`NULL`呢？我们知道该列存在，并且根据本章前面的示例，它包含`PersonID`为\
  \ 2 的数据。当从`OPENJSON()`返回一个 JSON 对象时，我们必须在`WITH`子句中使用额外的语法来指定该`NVARCHAR`实际代表一个 JSON\
  \ 对象，如代码清单 8-8 所示。\n\n### 代码清单 8-8. 正确返回 JSON 数组或对象\n\n```sql\nDECLARE @CustomFields\
  \ NVARCHAR(MAX) ;\n\nSET @CustomFields =\n\n(\n\nSELECT\n\nCustomFields\n\nFROM\
  \ Application.People\n\nWHERE PersonID = 2\n\n) ;\n\nSELECT *\n\nFROM OPENJSON(@CustomFields)\n\
  \nWITH (\n\nOtherLanguages NVARCHAR(MAX) AS JSON\n\n, HireDate DATETIME2\n\n, Title\
  \ NVARCHAR(50)\n\n, PrimarySalesTerritory NVARCHAR(50)\n\n, CommissionRate DECIMAL(5,2)\n\
  \n) ;\n```\n\n现在脚本将返回我们期望的结果，如图 8-7 所示。\n\n### 图 8-7. 正确返回 JSON 数据\n\n当需要拆解多行数据时，在使用`OUTER\
  \ APPLY`运算符时也可以指定显式架构。请记住，`OUTER APPLY`运算符不会像`CROSS APPLY`那样删除返回`NULL`值的行。代码清单 8-9\
  \ 演示了这一点。\n\n### 代码清单 8-9. 与 OUTER APPLY 一起使用显式架构\n\n```sql\nSELECT\n\nPersonID\n\
  \n, FullName\n\n, JSON.*\n\nFROM Application.People\n\nOUTER APPLY OPENJSON(CustomFields)\n\
  \nWITH (\n\nOtherLanguages\n\nNVARCHAR(MAX) AS JSON\n\n, HireDate DATETIME2\n\n\
  , Title NVARCHAR(50)\n\n, PrimarySalesTerritory\n\nNVARCHAR(50)\n\n, CommissionRate\n\
  \nDECIMAL(5,2)\n\n) JSON ;\n```\n\n从图 8-8 中的部分结果可以看出，一些需要进行数据透视处理的数据已经被消除了。然而，问题依然存在：在编写查询之前，你必须知道\
  \ JSON 文档中所有可能的键。因此，如果不存在一组离散的可能值，你可能仍然需要使用动态 SQL。\n\n### 图 8-8. 与 OUTER APPLY 一起使用显式架构的结果\n\
  \n## 使用路径表达式的 OPENJSON( )\n\n除了使用显式架构外，`OPENJSON()`还支持 JSON 路径表达式。路径表达式允许你引用 JSON\
  \ 文档内的特定属性。例如，考虑代码清单 10 中的 JSON 文档。\n\n**提示** 你可能认得这个文档，因为我们在第 7 章创建了它。\n\n### 代码清单\
  \ 8-10. 带根节点的销售订单\n\n```json\n{\n\n\"SalesOrders\": [\n\n{\n\n\"OrderID\": 72646,\n\
  \n\"CustomerID\": 1060,\n\n\"SalespersonPersonID\": 14,\n\n\"OrderDate\": \"2016-05-18\"\
  \n\n},\n\n{\n\n\"OrderID\": 72738,\n\n\"CustomerID\": 1060,\n\n\"SalespersonPersonID\"\
  : 14,\n\n\"OrderDate\": \"2016-05-19\"\n\n},\n\n{\n\n\"OrderID\": 72916,\n\n\"CustomerID\"\
  : 1060,\n\n\"SalespersonPersonID\": 6,\n\n\"OrderDate\": \"2016-05-20\"\n\n},\n\n\
  {\n\n\"OrderID\": 73081,\n\n\"CustomerID\": 1060,\n\n\"SalespersonPersonID\": 8,\n\
  \n\"OrderDate\": \"2016-05-24\"\n\n}\n\n]\n\n}\n```\n\n如果我们对这个文档使用一个基本的`OPENJSON()`语句，它将\n\
  \n\n\n# 第 8 章：解析 JSON 数据\n\n返回整个`SalesOrders`数组，部分展示如图 8-9 所示。\n\n### 图 8-9. 基本\
  \ OPENJSON()函数的结果\n\n![](img/index-255_1.jpg)\n\n然而，如果我们使用`PATH`语句，就可以选择只返回此数组中的第*n*个项。这将极大地改变结果集，因为`OPENJSON()`能够将数组元素内的每个项映射到关系列，这意味着将为元素内的每个键返回一行，而不是返回包含\
  \ JSON 文档的单行，如图 8-10 所示，该图展示了解析第一个数组元素（`OrderID`为 72646）的结果。\n\n### 图 8-10. 解析单个数组元素的结果\n\
  \n那么，让我们看看如何得到这个结果。首先，我们必须理解路径表达式可以在两种模式下运行：`strict`（严格）或`lax`（宽松）。如果你在`lax`模式下运行路径表达式，并且该表达式包含错误，`OPENJSON()`会“忽略错误”并返回空结果集。而如果你使用`strict`模式，一旦路径表达式包含错误，`OPENJSON()`就会抛出错误消息。\n\
  \n我们现在必须理解路径本身的元素。首先，我们使用`$`来指定上下文，后跟点号分隔的嵌套键名。最后，我们在方括号中指定数组元素编号。因此，要生成图 8-10 中的结果，我们会使用代码清单\
  \ 8-11 中的查询。\n\n### 代码清单 8-11. 使用路径表达式返回单个数组元素\n\n```sql\nDECLARE @JSON NVARCHAR(MAX)\
  \ ;\n\nSET @JSON = '{\n\"SalesOrders\": [\n    {\n        \"OrderID\": 72646,\n\
  \        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n        \"\
  OrderDate\": \"2016-05-18\"\n    },\n    {\n        \"OrderID\": 72738,\n      \
  \  \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n        \"OrderDate\"\
  : \"2016-05-19\"\n    },\n    {\n        \"OrderID\": 72916,\n        \"CustomerID\"\
  : 1060,\n        \"SalespersonPersonID\": 6,\n        \"OrderDate\": \"2016-05-20\"\
  \n    },\n    {\n        \"OrderID\": 73081,\n        \"CustomerID\": 1060,\n  \
  \      \"SalespersonPersonID\": 8,\n        \"OrderDate\": \"2016-05-24\"\n    }\n\
  ]\n}' ;\n\nSELECT *\nFROM OPENJSON(@JSON, 'lax $.SalesOrders[0]') ;\n```\n\n你会注意到，在此脚本中，传入\
  \ JSON 文档后，我们使用`lax`（或者，也可以使用`strict`）关键字来指定我们将使用的模式。空格之后是路径表达式本身。在这里，我们从`$`开始以设置上下文，然后指向`SalesOrders`键。接着，我们使用方括号来指定我们希望使用的数组元素。\n\
  \n**提示** JSON 路径表达式总是使用以零为基础的数组。\n\n## 将数据解析到表中\n\n现在你可以想象，简单的循环技术可以用来解析数组内的每个元素。例如，考虑代码清单\
  \ 8-12 中的脚本。此脚本会将每个数组元素解析到一个名为`#Orders`的临时表中。\n\n### 代码清单 8-12. 将每个元素解析到临时表\n\n\
  ```sql\nDECLARE @JSON NVARCHAR(MAX) ;\n\nSET @JSON = '{\n\"SalesOrders\": [\n  \
  \  {\n        \"OrderID\": 72646,\n        \"CustomerID\": 1060,\n        \"SalespersonPersonID\"\
  : 14,\n        \"OrderDate\": \"2016-05-18\"\n    },\n    {\n        \"OrderID\"\
  : 72738,\n        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 14,\n\
  \        \"OrderDate\": \"2016-05-19\"\n    },\n    {\n        \"OrderID\": 72916,\n\
  \        \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 6,\n        \"\
  OrderDate\": \"2016-05-20\"\n    },\n    {\n        \"OrderID\": 73081,\n      \
  \  \"CustomerID\": 1060,\n        \"SalespersonPersonID\": 8,\n        \"OrderDate\"\
  : \"2016-05-24\"\n    }\n]\n}' ;\n\nCREATE TABLE #Orders\n(\n    OrderID INT,\n\
  \    CustomerID INT,\n    SalespersonPersonID INT,\n    OrderDate DATE\n) ;\n\n\
  DECLARE @ArrayElement INT = 0 ;\nDECLARE @path NVARCHAR(MAX) = 'lax $.SalesOrders['\
  \ + CAST(@ArrayElement AS NVARCHAR) + ']' ;\n\nWHILE @ArrayElement <=3\nBEGIN\n\
  \    INSERT INTO #Orders (OrderID, CustomerID, SalespersonPersonID, OrderDate)\n\
  \    SELECT\n        OrderID\n        , CustomerID\n        , SalespersonPersonID\n\
  \        , OrderDate\n    FROM OPENJSON(@JSON, @Path)\n    WITH( OrderID INT, CustomerID\
  \ INT, SalespersonPersonID INT, OrderDate DATE) ;\n\n    SET @ArrayElement = @ArrayElement\
  \ + 1 ;\n    SET @path = 'lax $.SalesOrders[' + CAST(@ArrayElement AS NVARCHAR)\
  \ + ']' ;\nEND\n\nSELECT * FROM #Orders ;\n```\n\n\n\n# DROP TABLE #Orders;\n\n\
  ![](img/index-260_1.jpg)\n\n## 第八章 分解 JSON 数据\n\n*图 8-11. 分解多个数组元素的结果*\n\n此脚本中的最终\
  \ `SELECT` 语句生成了如图 8-11 所示的结果。\n\n**注意**\n虽然我在本例中使用了 `WHILE` 循环，但这仅仅是为了提供一个清晰且简单的示例，来说明如何使用路径表达式。在生产代码中，我绝不会使用\
  \ `WHILE` 循环或 `CURSOR`。总是有办法使用基于集合的方法来达到相同的结果。\n\n## 总结\n\nJSON 数据可以通过使用 `OPENJSON()`\
  \ 函数分解为表格形式的结果集。`OPENJSON()` 可以在有或没有显式架构的情况下使用。当未显式定义架构时，使用 `WITH` 子句的 `OPENJSON()`\
  \ 会返回一个标准行集，详细说明文档中每个节点的键（`name`）、`value` 和 JSON 数据类型 `ID`。\n\n当提供了显式架构时，`OPENJSON()`\
  \ 将返回一个格式化的结果集，其中包含 `WITH` 子句中指定的每一列。如果你在开发时就知道文档中的每个节点，使用显式架构可以避免在开发时进行数据透视。但是，如果列列表不是离散的，则需要动态\
  \ SQL，在处理之前构建可能的结果列表。\n\n`OPENJSON()` 也支持 JSON 路径表达式。向该函数传递路径表达式，可以让您导航到数组中的特定项，这意味着您可以将数据分解到更精细的级别。例如，您可以使用循环方法，将每个数组元素的内容分解为关系数据，而不是将一个\
  \ JSON 对象数组分解为一个表。\n\n# 第九章 处理 JSON 数据类型\n\n在本章中，我将讨论允许开发人员查询 JSON 数据的 T-SQL 函数。然后，我将讨论如何为\
  \ JSON 数据创建索引。\n\n## 查询 JSON 数据\n\nSQL Server 引入了 `JSON_VALUE()`、`JSON_QUERY()`、`JSON_MODIFY()`\
  \ 和 `ISJSON()` 函数，以帮助开发人员检查和操作 JSON 数据。以下各节将讨论这些函数。\n\n### 使用 ISJSON()\n\n由于 JSON\
  \ 数据存储在 `NVARCHAR(MAX)` 列中，而不是使用其自己的数据类型，因此在针对元组调用 JSON 函数之前，确保它包含有效的 JSON 文档非常有用。`ISJSON()`\
  \ 函数将评估一个字符串，检查它是否是有效的 JSON 文档。如果字符串是有效的 JSON，该函数将返回值 1；如果不是，则返回 0。因此，该函数的一个常见用法是在\
  \ `IF` 语句中。例如，考虑清单 9-1 中的查询。\n\n© Peter A. Carter 2018\nP. A. Carter, *SQL Server\
  \ Advanced Data Types*, [`doi.org/10.1007/978-1-4842-3901-8_9`](https://doi.org/10.1007/978-1-4842-3901-8_9)\n\
  \n![](img/index-263_1.jpg)\n\n*清单 9-1. 格式不正确的 JSON*\n\n```sql\nDECLARE @JSON NVARCHAR(MAX)\
  \ ;\nSET @JSON = '{\"I am not:\"Correctly formatted\"}' ;\nSELECT *\nFROM OPENJSON(@JSON)\
  \ ;\n```\n\n由于键名缺少一个闭合的双引号，查询将失败，并显示如图 9-1 所示的错误。\n\n*图 9-1. 无效 JSON 引发的错误*\n\n\
  为了避免脚本失败，我们可以在 `IF` 语句中使用 `ISJSON()` 函数，如清单 9-2 所示。\n\n*清单 9-2. 在 IF 语句中使用 ISJSON()*\n\
  \n```sql\nDECLARE @JSON NVARCHAR(MAX) ;\nSET @JSON = '{\"I am not:\"Correctly formatted\"\
  }' ;\nIF ISJSON(@JSON) = 1\nBEGIN\n    SELECT *\n    FROM OPENJSON(@JSON) ;\nEND\n\
  ```\n\n这一次，脚本将无错误地完成，因为针对 `OPENJSON()` 函数的查询永远不会运行。\n\n**提示**\n有关 `OPENJSON()` 用法的完整说明，请参见第\
  \ 8 章。\n\n`ISJSON()` 函数也可以用在查询的 `WHERE` 子句中...\n\n\n# 第 9 章 处理 JSON 数据类型\n\n## 清单\
  \ 9-3. 过滤非 JSON 的结果\n\n```sql\n--创建临时表\nCREATE TABLE #JsonTemp\n(\n    JSONData\
  \ NVARCHAR(MAX)\n) ;\n\n--向临时表中插入一个 JSON 值和一个非 JSON 值\nINSERT INTO #JsonTemp\nVALUES\
  \ ('{\"I am JSON\":\"True\"}'),\n       ('I am JSON - False') ;\n\n--仅对数据为 JSON\
  \ 的行调用 OPENJSON()\nSELECT JSON.*\nFROM #JsonTemp Base\nOUTER APPLY OPENJSON(Base.JSONData)\
  \ JSON\nWHERE ISJSON(Base.JSONData) = 1 ;\n\n--删除临时表\nDROP TABLE #JsonTemp ;\n```\n\
  \n因为 `WHERE` 子句在应用 `OPENJSON()` 函数之前移除了所有不包含有效 JSON 数据的行，所以脚本成功完成并返回如图 9-2 所示的结果。\n\
  \n***图 9-2.** 过滤非 JSON 数据的结果*\n\n## 使用 JSON_VALUE( )\n\n`JSON_VALUE()` 函数可用于从 JSON\
  \ 文档中返回单个标量值。该函数接受两个参数。第一个参数是 JSON 文档，从中检索数据。第二个参数是指向您希望返回的值的路径表达式。如第 8 章所述，当与 `OPENJSON()`\
  \ 一起使用路径表达式时，路径表达式可以在 `lax` 模式或 `strict` 模式下使用。使用 `lax` 模式时，如果路径表达式出错，将返回 `NULL`\
  \ 结果，且不会引发错误。在 `strict` 模式下使用时，如果路径表达式出错，则会抛出错误。\n\n返回值的数据类型始终为 `NVARCHAR(4000)`。这意味着如果值超过\
  \ 4000 个字符，`JSON_VALUE()` 将根据使用的是 `lax` 模式还是 `strict` 模式，返回 `NULL` 或引发错误。\n\n为了更仔细地了解\
  \ `JSON_VALUE()` 函数，让我们考虑 `WideWorldImporters` 数据库中的 `Warehouse.StockItems` 表。该表的\
  \ `CustomFields` 列包含一个 JSON 文档，其中有一个名为 `Tags` 的键，其值是一个包含产品标签的数组。\n\n清单 9-4 中的脚本将首先用单个产品的\
  \ `CustomFields` 内容填充一个变量。随后，在将文档传递给 `JSON_VALUE()` 函数之前，它会使用 `ISJSON()` 函数检查该变量是否包含有效的\
  \ JSON 文档。\n\n`JSON_VALUE()` 函数的路径表达式首先指定我们要在 `lax` 模式下使用路径表达式。然后使用 `$` 表示上下文，再使用点分隔的路径指向我们要提取的节点。因为\
  \ `Tags` 节点是一个数组，而 `JSON_VALUE()` 函数只能返回标量值，我们将使用方括号来表示我们希望提取的数组中的元素。这是强制性的语法，即使数组中只有一个元素也是如此。\n\
  \n**提示** 数组总是从零开始索引。\n\n## 清单 9-4. 对 JSON 文档使用 JSON_VALUE()\n\n```sql\nDECLARE @JSON\
  \ NVARCHAR(MAX) ;\n\n--StockItem ID 61 的 CustomFields 列包含以下 JSON 文档：\n--'{ \"CountryOfManufacture\"\
  : \"China\", \"Tags\": [\"Radio Control\",\"Realistic Sound\"], \"MinimumAge\":\
  \ \"10\" }'\nSET @JSON = (SELECT CustomFields FROM Warehouse.StockItems WHERE StockItemID\
  \ = 61) ;\n\nIF ISJSON(@JSON) = 1\nBEGIN\n    SELECT JSON_VALUE(@JSON,'lax $.Tags[0]')\
  \ ;\nEND\n```\n\n此脚本产生如图 9-3 所示的结果。\n\n***图 9-3.** 对 JSON 文档使用 JSON_VALUE() 的结果*\n\
  \n那么，如果我们想对表中的列使用 `JSON_VALUE()` 函数呢？由于它是一个标量函数，我们不能使用 `OUTER APPLY` 或\n\n\n# 第\
  \ 9 章 处理 JSON 数据类型\n\nCROSS APPLY。相反，我们必须在查询的 SELECT 列表中包含它。\n\n如代码清单 9-5 所示。\n\n\
  ![](img/index-268_1.jpg)\n\n## 代码清单 9-5。在 SELECT 列表中使用 JSON_VALUE()\n\n```sql\n\
  USE WideWorldImporters\nGO\n\nSELECT\n    StockItemName\n    , JSON_VALUE(customfields,'lax\
  \ $.Tags[0]')\nFROM Warehouse.StockItems ;\n```\n\n你会注意到，我们没有传入变量，而是直接传入了包含 JSON\
  \ 文档的列名。此查询的部分结果如图 9-4 所示。\n\n## 图 9-4。对表使用 JSON_VALUE()的结果\n\n![](img/index-269_1.jpg)\n\
  \n我们原始的 JSON 文档引用了库存物品 ID 61，这是一个遥控车。我们还可以在查询的`WHERE`子句中使用`JSON_VALUE`来过滤结果集，以便只返回第一个标签包含\"\
  Radio Control\"值的行。如代码清单 9-6 所示，在该清单中，我们还通过使用`ISJSON()`函数来增强查询，以确保只返回有效的 JSON 文档。\n\
  \n## 代码清单 9-6。在 WHERE 子句中使用 JSON_VALUE()\n\n```sql\nUSE WideWorldImporters\nGO\n\
  \nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax $.Tags[0]') AS Tag0\n\
  FROM Warehouse.StockItems\nWHERE JSON_VALUE(CustomFields,'lax $.Tags[0]') = 'Radio\
  \ Control'\n    AND ISJSON(CustomFields) = 1 ;\n```\n\n此查询的结果如图 9-5.所示。\n\n## 图\
  \ 9-5。在 WHERE 子句中使用 JSON_VALUE()的结果\n\n遥控车产品的第三个标签表示该物品是否为复古款。产品表中有两款复古车。因此，在代码清单\
  \ 9-7,中，我们将进一步过滤结果集，仅包含第三个标签值为\"Vintage\"的产品。我们还将增强`SELECT`列表，使其包含数组中的前三个标签。最后，我们将更改`WHERE`子句中的`JSON_VALUE()`函数，使用严格路径表达式，这样出错将导致查询失败。\n\
  \n## 代码清单 9-7。增强查询\n\n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    StockItemName\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[1]') AS Tag1\n    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n\
  FROM Warehouse.StockItems\nWHERE JSON_VALUE(CustomFields,'strict $.Tags[0]') = 'Radio\
  \ Control'\n    AND JSON_VALUE(CustomFields,'strict $.Tags[2]') = 'Vintage'\n  \
  \  AND ISJSON(CustomFields) = 1 ;\n```\n\n不幸的是，这一次，即使`ISJSON()`函数确保结果集中不包含任何无效的\
  \ JSON 文档，查询仍然返回了如图 9-6.所示的错误。这是因为`CustomFields`列中的并非所有 JSON 文档都具有`Tags`键。而在那些有`Tags`键的文档中，也并非所有文档都有三个标签。因此，`WHERE`子句中两个`JSON_VALUE()`调用的路径表达式无效。因为我们从`lax`模式更改为`strict`模式，所以查询失败。\n\
  \n![](img/index-271_1.jpg)\n\n![](img/index-271_2.jpg)\n\n## 图 9-6。查询引发的错误\n\n如果我们改回使用`lax`模式路径表达式，查询将返回如图\
  \ 9-7 所示的结果。\n\n## 图 9-7。使用 lax 模式路径表达式的查询结果\n\n在 SQL Server 2017 及更高版本中，还可以将路径表达式作为变量传入。因此，代码清单\
  \ 9-8 中的查询将返回与图 9-7.所示相同的结果。\n\n**提示** 您必须使用 SQL Server 2017 或更高版本，才能运行代码清单 9-8.中的查询。\n\
  \n## 代码清单 9-8。使用变量作为路径\n\n```sql\nUSE WideWorldImporters\nGO\n\nDECLARE @Path NVARCHAR(MAX)\
  \ = 'lax $.Tags[2]' ;\n\nSELECT\n    StockItemName\n```\n\n\n## 使用 JSON_QUERY()\n\
  \n与返回*标量值*的 `JSON_VALUE()` 不同，`JSON_QUERY()` 可用于从 JSON 文档中提取 JSON 对象或数组。\n\n例如，考虑清单\
  \ 9-9 中的脚本。该脚本使用了我们在清单 9-4 中使用过的同一个 JSON 文档，该清单从库存物料 ID 为 61 的 Tags 数组中提取了单个数组元素。然而，这次我们将提取整个\
  \ Tags 数组，而不是提取单个数组元素。因为我们提取的是整个数组，所以不需要像使用 `JSON_VALUE()` 处理该文档时那样，在方括号中指定数组元素编号。\n\
  \n![图 9-8](img/index-273_1.jpg)\n\n**清单 9-9.** 针对 JSON 文档使用 `JSON_QUERY()`\n\n```sql\n\
  DECLARE @JSON NVARCHAR(MAX) ;\n\n--StockItem ID 61 的 CustomFields 列包含以下 JSON 文档：\n\
  --'{ \"CountryOfManufacture\": \"China\", \"Tags\": [\"Radio Control\",\"Realistic\
  \ Sound\"], \"MinimumAge\": \"10\" }'\n\nSET @JSON = (SELECT CustomFields FROM Warehouse.StockItems\n\
  \             WHERE StockItemID = 61) ;\n\nIF ISJSON(@JSON) = 1\nBEGIN\n    SELECT\
  \ JSON_QUERY(@Json,'lax $.Tags') ;\nEND\n```\n\n该脚本的结果如图 9-8 所示。\n\n**图 9-8.** 针对\
  \ JSON 文档使用 `JSON_QUERY()` 的结果\n![图 9-8 结果](img/index-274_1.jpg)\n\n与 `JSON_VALUE()`\
  \ 一样，如果我们想对表中的列使用 `JSON_QUERY()`，我们应该在 `SELECT` 列表中使用它，而不是使用 `CROSS APPLY` 或 `OUTER\
  \ APPLY` 运算符。清单 9-10 演示了 `JSON_VALUE()` 和 `JSON_QUERY()` 之间的区别。这里，我们使用了与清单 9-7 中相同的查询，但对其进行了增强，在结果集中包含一列，该列使用\
  \ `JSON_QUERY()` 包含整个 Tags 数组。\n\n**清单 9-10.** 在 `SELECT` 列表中使用 `JSON_QUERY()`\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\nFROM Warehouse.StockItems\nWHERE JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') = 'Radio Control'\nAND JSON_VALUE(CustomFields,'lax $.Tags[2]') =\
  \ 'Vintage'\nAND ISJSON(CustomFields) = 1 ;\n```\n\n此查询返回的结果如图 9-9 所示。\n\n**图 9-9.**\
  \ 在 `SELECT` 列表中使用 `JSON_QUERY()` 的结果\n\n`JSON_QUERY()` 函数也可以在 `WHERE` 子句中使用。考虑清单\
  \ 9-11 中的查询，该查询已被重写，以便使用 `JSON_QUERY()` 函数筛选出 JSON 文档中确实包含空 Tags 数组的任何行。你会注意到该查询混合使用了\
  \ lax 模式和 strict 模式。\n\n**清单 9-11.** 在 `WHERE` 子句中使用 `JSON_QUERY()`\n\n```sql\n\
  USE WideWorldImporters\nGO\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\nFROM Warehouse.StockItems\nWHERE JSON_QUERY(CustomFields,'strict\
  \ $.Tags') <> '[]'\nAND ISJSON(CustomFields) = 1 ;\n```\n\n如果只向路径表达式传递文档上下文 (`$`)，则将返回整个\
  \ JSON 文档。同样值得注意的是，从 SQL Server 2017 开始，可以像对 `OPENJSON()` 和 `JSON_VALUE()` 那样，使用变量来传递路径。这两个概念同样适用于\
  \ `JSON_VALUE()`。\n\n\n如代码清单 9-12 所示，该清单使用一个变量将仅文档上下文的路径表达式传递到结果集中的一个附加列。\n\n**提示**\
  \ 你必须运行 SQL Server 2017 或更高版本才能执行代码清单 9-12 中的查询。\n\n![](img/index-276_1.jpg)\n\n\
  # 第 9 章 处理 JSON 数据类型\n\n### 代码清单 9-12. 使用路径变量和文档上下文\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\nDECLARE @Path NVARCHAR(MAX) = '$' ;\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\n    , JSON_QUERY(CustomFields, @Path) AS EntireDocument\n\
  FROM Warehouse.StockItems\nWHERE JSON_QUERY(CustomFields,'strict $.Tags') <> '[]'\n\
  \    AND ISJSON(CustomFields) = 1 ;\n```\n\n此查询的部分结果可以在图 9-10 中看到。\n\n### 图 9-10.\
  \ 使用路径变量和文档上下文的结果\n\n# 第 9 章 处理 JSON 数据类型\n\n## 使用 JSON_MODIFY()\n\n到目前为止，我们检查的所有\
  \ JSON 函数都允许我们查询 JSON 文档。然而，`JSON_MODIFY()` 函数，顾名思义，允许我们修改 JSON 文档的内容。为了进一步解释这一点，让我们再次使用代码清单\
  \ 9-4 和代码清单 9-9 中用过的、针对库存物品 ID 61 的 `CustomFields` JSON 文档。\n\n代码清单 9-13 中的脚本将修改\
  \ `Tags` 数组的第二个元素，将其更新为 'Very Realistic Sound'。该函数的输出是修改后的完整文档。\n\n### 代码清单 9-13.\
  \ 更新一个值\n\n```sql\nDECLARE @JSON NVARCHAR(MAX) ;\n\n--库存物品 ID 61 的 CustomFields\
  \ 列包含以下 JSON 文档：\n--'{ \"CountryOfManufacture\": \"China\", \"Tags\": [\"Radio Control\"\
  ,\"Realistic Sound\"], \"MinimumAge\": \"10\" }'\n\nSET @JSON = (SELECT CustomFields\
  \ FROM Warehouse.StockItems\n    WHERE StockItemID = 61) ;\n\nIF ISJSON(@JSON) =\
  \ 1\nBEGIN\n    SELECT JSON_MODIFY(@Json,'lax $.Tags[1]', 'Very Realistic Sound')\
  \ ;\nEND\n```\n\n此脚本返回图 9-11 中的结果。\n\n![](img/index-278_1.jpg)\n\n# 第 9 章 处理 JSON\
  \ 数据类型\n\n### 图 9-11. 更新一个值的结果\n\n你可以看到该函数的输出随后如何用于更新包含 JSON 文档的表中的一行，如代码清单 9-14\
  \ 所示。这里，我们不是传入一个变量作为 JSON 文档，而是传入表中的 `CustomFields` 列。\n\n### 代码清单 9-14. 使用 JSON_MODIFY()\
  \ 更新表中的一行\n\n```sql\nUSE WideWorldImporters\nGO\n\nUPDATE StockItems\nSET CustomFields\
  \ = JSON_MODIFY(CustomFields,'lax $.Tags[1]', 'Very Realistic Sound')\nFROM Warehouse.StockItems\n\
  WHERE StockItemID = 61 ;\n```\n\n`JSON_MODIFY()` 函数也可用于向数组添加一个元素。考虑代码清单 9-15 中的查询，它通过向\
  \ `Tags` 数组添加一个额外的元素，将库存物品 ID 61 标记为复古的。你会注意到，因为我们是在向数组添加一个值，而不是更新现有值，所以在路径表达式的开头使用了\
  \ `append` 关键字。另请注意，因为我们更新的是整个数组，而不是单个元素，所以方括号中的数组元素不包含在路径中。\n\n### 代码清单 9-15. 添加一个额外的数组元素\n\
  \n```sql\nUSE WideWorldImporters\nGO\n\nUPDATE StockItems\nSET CustomFields = JSON_MODIFY(CustomFields,'append\
  \ lax $.Tags', 'Vintage')\nFROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n\
  ```\n\n现在让我们使用代码清单 9-16 中的查询来检查更新后的记录。\n\n### 代码清单 9-16. 检查更新后的记录\n\n```sql\nUSE\
  \ WideWorldImporters\nGO\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n```\n\n\n\n# 第九章 处理 JSON 数据类型\n\n## 查询示例\n\n```sql\n, JSON_VALUE(CustomFields,'lax\
  \ $.Tags[1]') AS Tag1\n, JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n, JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\nFROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n```\n\
  \n此查询返回图 9-12 所示的结果。你会注意到第二个数组元素现在显示为“Very Realistic Sound”，并且数组现在包含了第三个元素，将该产品标记为复古。\n\
  \n![](img/index-280_1.jpg)\n\n![](img/index-280_2.jpg)\n\n***图 9-12.** 检查修改后行的结果*\n\
  \n正如你所料，`MODIFY_JSON()` 函数也可以用于删除数据。这是通过将值更新为 `NULL` 来实现的。例如，假设将库存物品 ID 61 标记为复古是一个错误。我们可以使用清单\
  \ 9-17 中的查询来纠正这个错误。\n\n***清单 9-17.*** 使用 `MODIFY_JSON()` 删除数据\n\n```sql\nUSE WideWorldImporters\n\
  GO\nUPDATE StockItems\nSET CustomFields = JSON_MODIFY(CustomFields,\n    'lax $.Tags[2]',\
  \ NULL)\nFROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n```\n\n重新运行清单 9-16\
  \ 中的查询，现在会返回图 9-13 所示的结果。\n\n***图 9-13.** 重新检查修改后行的结果*\n\n或者，我们可以使用清单 9-18 中的查询删除整个\
  \ `Tags` 数组。\n\n***清单 9-18.*** 删除 `Tags` 数组\n\n```sql\nUSE WideWorldImporters\n\
  GO\nUPDATE StockItems\nSET CustomFields = JSON_MODIFY(CustomFields,'lax\n    $.Tags',NULL)\n\
  FROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n```\n\n清单 9-19 中的查询允许我们检查修改后的\
  \ JSON 文档。你会注意到 `Tags` 数组已不存在。\n\n***清单 9-19.*** 检查修改后的文档\n\n```sql\nUSE WideWorldImporters\n\
  GO\nSELECT\n    StockItemName\n    , JSON_QUERY(CustomFields,'lax $') AS EntireDocument\n\
  FROM Warehouse.StockItems\nWHERE StockItemID = 61 ;\n```\n\n![](img/index-282_1.jpg)\n\
  \n此查询的结果如图 9-14 所示。\n\n***图 9-14.** 检查修改后的 JSON 文档*\n\n## 为 JSON 数据创建索引\n\n当查询一个表，并根据\
  \ JSON 文档内的属性进行筛选、分组或排序时，你可以通过为数据创建索引来提高查询性能。由于 JSON 不像 `XML` 那样有自己的数据类型，因此没有像 `XML`\
  \ 索引那样的 JSON 索引。相反，要为 JSON 属性创建索引，你必须创建一个包含 `JSON_VALUE()` 调用的计算列，该调用反映了你正在优化的查询的逻辑。然后，你可以在此计算列上创建索引，`SQL\
  \ Server` 在优化查询时将使用此索引。\n\n**注意** 实际查询性能取决于许多因素，包括系统硬件和其他资源限制，例如可能同时运行的其他查询。本节中的性能分析旨在说明潜在影响，但性能应始终在你自己的服务器上、在真实的工作负载下进行测试。\n\
  \n在演示此技术之前，我们首先记录对 `Warehouse.StockItems` 表进行查询的性能基线。我们将在尝试优化的查询运行前，在会话中打开 `TIME\
  \ STATISTICS` 来实现这一点。在此之前，我们将首先将数据从 `StockItems` 表复制到一个新表。这样做的原因有两个。首先，`StockItems`\
  \ 表已经有多个索引，这可能会影响我们的结果。第二个原因是 `StockItems` 表是带有索引的系统版本控制表。这意味着当我们修改表以添加计算列时，不能简单地使用\
  \ `ALTER TABLE` 脚本，而是需要将数据编写到临时表中，删除并重新创建主表和归档表，然后编写脚本。\n\n\n\n# 第九章 处理 JSON 数据类型\n\
  \n数据回写。这段代码量会分散对如何添加计算列的注意力，而计算列正是本练习的重点。如代码清单 9-20 所示。\n\n**提示** 我们使用 `DBCC FREEPROCCACHE`\
  \ 从计划缓存中删除任何现有计划。然后，我们使用 `DBCC DROPCLEANBUFFERS` 从缓冲区缓存中移除未被修改的页。这有助于使测试公平。\n\n\
  ## 创建性能基线\n\n```sql\nUSE WideWorldImporters\nGO\n\n--将数据复制到新表\nSELECT *\nINTO Warehouse.NewStockItems\n\
  FROM Warehouse.StockItems\n\n--清除计划缓存\nDBCC FREEPROCCACHE\n\n--清除缓冲区缓存\nDBCC DROPCLEANBUFFERS\n\
  \n--打开统计信息\nSET STATISTICS TIME ON\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\nFROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') = 'Radio Control' ;\n```\n\n图 9-15 中的执行结果显示，该查询执行耗时 `6ms`。\n\n*图 9-15.\
  \ 时间统计*\n\n现在，让我们使用与 `WHERE` 子句相同的逻辑，在 `Warehouse.StockItems` 表上创建一个计算列。这可以通过代码清单\
  \ 9-21 中的脚本来实现。\n\n## 创建计算列\n\n```sql\nUSE WideWorldImporters\nGO\n\nALTER TABLE\
  \ Warehouse.NewStockItems\nADD CustomFieldsTag0 AS JSON_VALUE(CustomFields,\n  \
  \  'lax $.Tags[0]') ;\n```\n\n现在，我们可以为计算列创建索引（这也会导致该列被持久化，而不是在查询时即时计算），如代码清单 9-22\
  \ 所示。\n\n## 为计算列创建索引\n\n```sql\nUSE WideWorldImporters\nGO\n\nCREATE NONCLUSTERED\
  \ INDEX NCI_CustomFieldsTag0\nON Warehouse.NewStockItems(CustomFieldsTag0) ;\n```\n\
  \n现在，让我们再次使用代码清单 9-23 中的简化脚本来检查查询性能。\n\n## 检查索引性能\n\n```sql\nUSE WideWorldImporters\n\
  GO\n\n--清除计划缓存\nDBCC FREEPROCCACHE\n\n--清除缓冲区缓存\nDBCC DROPCLEANBUFFERS\n\n--打开统计信息\n\
  SET STATISTICS TIME ON\n\nSELECT\n    StockItemName\n    , JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') AS Tag0\n    , JSON_VALUE(CustomFields,'lax $.Tags[1]') AS Tag1\n\
  \    , JSON_VALUE(CustomFields,'lax $.Tags[2]') AS Tag2\n    , JSON_QUERY(CustomFields,'lax\
  \ $.Tags') AS TagsArray\nFROM Warehouse.NewStockItems\nWHERE JSON_VALUE(CustomFields,'lax\
  \ $.Tags[0]') = 'Radio Control' ;\n```\n\n从图 9-16 所示的时间统计中可以看到，查询在 `3ms` 内执行完成。性能提升了\
  \ 50%！\n\n*图 9-16. 检查索引性能的结果*\n\n**提示** 由于 `NewStockItems` 表非常小，查询优化器有可能选择不使用你的索引。如果发生这种情况，你可以通过添加\
  \ `WITH (INDEX(NCI_CustomFieldsTag0))` 查询提示来强制它使用索引。但至关重要的一点是，一般来说，优化器是智能的，很少应该给它提示。如果你确实需要使用提示，那么你应该始终与优化器协作，而不是对抗它。\n\
  \n例如，如果优化器错误地选择了 `LOOP JOIN` 物理运算符，则强制它使用 `MERGE JOIN` 或 `HASH JOIN`。不要替它选择哪个更好！\n\
  \n## 总结\n\nSQL Server 提供了使用 `ISJSON()`、`JSON_VALUE()`、`JSON_QUERY()` 和 `JSON_MODIFY()`\
  \ 函数来查询和修改 JSON 数据的能力。\n\n`ISJSON()` 函数提供了一种简单的验证，用于检查文档是否具有有效的 JSON 格式。如果文档是 JSON，它返回\
  \ `1`；如果不是，则返回 `0`。\n\n`JSON_VALUE()` 函数可以包含在查询的 `SELECT` 列表、`WHERE` 子句、`ORDER BY`\
  \ 子句或 `GROUP BY` 子句中。它返回一个\n\n\n\n第 9 章 处理 JSON 数据类型\n\n`JSON_QUERY()`函数也可包含在`SELECT`列表、`WHERE`子句、`ORDER\
  \ BY`或`GROUP BY`中，但它返回的是 JSON 对象或数组，而非单个标量值。与`JSON_VALUE()`类似，返回的对象基于传递给函数的路径表达式。\n\
  \n`MODIFY_JSON()`函数可用于更新、插入或删除键值。该函数接收一个 JSON 文档和路径表达式作为参数，并返回修改后的完整文档，这使其易于在标准`UPDATE`语句中使用。路径表达式中可选的`append`关键字用于表示意图是向数组添加一个新值，而非修改现有值。使用`NULL`更新键值会删除该键。\n\
  \n可以通过为 JSON 文档的属性创建索引来提升查询性能。具体方法是根据你希望优化的路径表达式创建一个计算列，然后在该计算列上创建索引。这样，当查询包含 JSON\
  \ 数据的列时，查询优化器就能使用该索引。\n\n第 10 章 理解空间数据\n\n空间数据是描述位置的数据。据说世界上 80%的数据都包含空间元素，因此对于许多数据层应用而言，构建或查询空间数据的能力可能至关重要。本章将概述空间数据及其在\
  \ SQL Server 中的实现，然后再探讨 SQL Server 实现中所采用的空间标准。\n\n**注意** 本章旨在提供空间数据的理论概述。实际使用示例请参见第\
  \ 11 章。\n\n理解空间数据\n\nSQL Server 提供了两种能够存储空间数据的数据类型：`GEOMETRY`和`GEOGRAPHY`。这些数据类型通过\
  \ CLR（公共语言运行时）实现，其底层是.NET 类，这些类提供了一系列允许你与数据交互的方法和属性。\n\n© Peter A. Carter 2018\n\
  \nP. A. Carter, *SQL Server 高级数据类型*,\n<https://doi.org/10.1007/978-1-4842-3901-8_10>\n\
  \n**注意** 一个地理空间对象可被称为一个几何体（geometry），简单对象称为原始几何体，对象的集合称为几何体集合。由于`geometry`也是以平面地球模型实现空间数据的数据类型名称，这可能会引起混淆。因此请注意，当本章指代一个地理空间对象时，将使用小写的`geometry`一词。当指代数据类型时，该词将使用大写字母（`GEOMETRY`）。\n\
  \n`GEOMETRY`数据类型使用笛卡尔坐标系，提供了一个平面地球模型。当你处理二维对象或无需考虑地球曲率的较小对象时，`GEOMETRY`是应使用的正确数据类型。\n\
  \n使用`GEOMETRY`数据类型时，对象使用 x 轴和 y 轴进行标绘。例如，图 10-1 中的点位于（或标绘在）坐标（5, 3）。\n\n![](img/index-291_1.png)\n\
  \n*图 10-1 在笛卡尔系统中标绘一个点*\n\n**提示** 一个形状被称为一个面（surface）。\n\n类似地，图 10-2 中的多边形（封闭的面）使用坐标（-1\
  \ -1, -1 2, 2 2, 2 -1, -1 -1）绘制而成。\n\n![](img/index-292_1.jpg)\n\n*图 10-2 在笛卡尔系统中标绘一个多边形*\n\
  \n另一方面，`GEOGRAPHY`数据类型使用一个球体地球模型（实际上是多个球体地球模型），非常适合表示必须考虑地球曲率的三维对象或大面积区域。\n\n\n\n\
  ## 理解空间数据\n\n当处理球面地球模型的数据时，一个点可以通过提供**经度**和**纬度**来标识，而不是`x`和`y`坐标。\n\n经线，也称为子午线，表示某点距一条称为本初子午线的基准经线向东或向西的度数。本初子午线穿过伦敦的格林威治区，被认为是东西半球的交汇点。有时，经度坐标以正负值表示，本初子午线以东的子午线为正值，以西的为负值。另一些时候，子午线总是以正数表示，并使用`E`（东）或`W`（西）来指示相对于本初子午线的方向。\n\
  \n![](img/index-293_1.jpg)\n\n**图 10-3. 绘制经度**\n\n赤道是南北极之间的中心点。纬度表示某点距赤道向北或向南的度数。因此，赤道的纬度为\
  \ 0 度。一条纬线代表地球上具有相同纬度的所有点。如图 10-4 所示，有时纬度值以正负值表示，北半球为正值，南半球为负值。另一些时候，纬度总是以正值表示，并通过后缀`north\
  \ latitude`或`south latitude`来区分。\n\n![](img/index-294_1.jpg)\n\n**图 10-4. 绘制纬度**\n\
  \n`GEOMETRY`和`GEOGRAPHY`数据类型都允许你实例化多种对象。这些对象可分为两类：第一类是单几何实例，也称为**基本几何体**；第二类是几何集合，也称为**多部件几何体**。表\
  \ 10-1 详细列出了 SQL Server 支持的基本几何体。\n\n**表 10-1. 基本几何体**\n\n| 几何体 | 描述 |\n| :--- |\
  \ :--- |\n| `Point` | 由一组坐标指定的单个点。 |\n| `LineString` | 连接多个点的路径，由多组坐标定义。线串可以是闭合的或非闭合的*。\
  \ |\n| `CircularString` | 多个点之间的弧形路径。必须定义奇数个点，最少三个。这些点不能全部在同一条轴上（否则将被视为`LineString`）。\
  \ |\n| `CompoundCurve` | 连接多组点的路径。它可以通过使用多个`LineString`和/或`CircularString`来定义，以创建圆形或半圆形等曲面。\
  \ |\n| `Polygon` | 通过指定映射多边形每个角的点的坐标来定义的封闭曲面。多边形的每条边本质上都是一个`LineString`。 |\n| `CurvePolygon`\
  \ | 一个封闭曲面。这与`Polygon`类似，不同之处在于它可能使用`LineString`、`CircularString`或`CompoundCurve`来定义，而不仅仅是`LineString`。\
  \ |\n\n*\\*一个封闭曲面是指用于定义它的点是首尾相连的。因此，最先定义的坐标也将是最后定义的坐标。*\n\n表 10-2 定义了 SQL Server\
  \ 支持的多部件几何体。\n\n**表 10-2. 多部件几何体**\n\n| 几何体 | 描述 |\n| :--- | :--- |\n| `MultiPoint`\
  \ | 0 个或多个`Point`的集合。 |\n| `MultiLineString` | 0 个或多个`LineString`的集合。 |\n| `MultiPolygon`\
  \ | 0 个或多个`Polygon`的集合。 |\n| `GeometryCollection` | 0 个或多个几何体的集合。可以包含任何基本几何体或多部件几何体。\
  \ |\n\n在 SQL Server 2017 中，增加了一种新的曲面类型，它仅适用于`GEOGRAPHY`数据类型。`FullGlobe`代表整个地球表面。因此，它具有面积，但没有边界。\n\
  \n\n# 第十章 理解空间数据\n\n**提示** 关于创建和操作原始几何体及几何体集合的实际示例，可参见章节 11。\n\n## 空间数据标准\n\nSQL\
  \ Server 中的空间数据是围绕开放地理空间联盟 (OGC) 制定的标准实现的。这些标准可在 [www.opengeospatial.org/standards/gml](http://www.opengeospatial.org/standards/gml)\
  \ 找到。\n\n接下来的章节将概述 SQL Server 中可用的空间曲面类型，以及如何使用众所周知文本和众所周知二进制来表示它们。我还将讨论空间参考系统。\n\
  \n## 众所周知文本\n\nOGC 制定了两种引用空间数据的方法：众所周知文本 (WKT) 和众所周知二进制 (WKB)。我将首先讨论 WKT，以及如何使用这种方法指定每个几何体。表\
  \ 10-3 详细列出了每种原始几何体的 WKT。\n\n### 表 10-3. 原始几何体 WKT\n\n| **几何体** | **WKT** | **描述**\
  \ |\n| :--- | :--- | :--- |\n| 点 | `POINT(x y z m)` | x 表示 x 轴或经度；y 表示 y 轴或纬度；z\
  \ 可选，表示高程；m 可选，表示测量值。 |\n| 线串 | `LINESTRING(POINT 1, POINT 2, POINT n)` |  |\n|\
  \ 圆弧串 | `CIRCULARSTRING(start POINT, Anchor POINT 1, Anchor POINT n, end POINT)`\
  \ |  |\n| 复合曲线 | `COMPOUNDCURVE((POINT 1, POINT n), CIRCULARSTRING(start POINT,\
  \ Anchor POINT, end POINT))` | 当弧线段是圆弧串时，点集必须以几何体类型为前缀。当弧线段是线串时，无需指定几何体类型。 |\n|\
  \ 多边形 | `POLYGON((POINT 1, POINT 2, POINT n))` | 多边形也可以通过在括号内定义第二组点（用逗号分隔）来包含一个内部多边形（洞）。\
  \ |\n| 曲线多边形 | `CURVEPOLYGON((CIRCULARSTRING(POINT 1, POINT 2, POINT n)))` | 曲线多边形也可以通过在括号内定义第二组点（用逗号分隔）来包含一个内部曲线多边形（洞）。\
  \ |\n\n*(续表)*\n\n| **几何体** | **WKT** | **描述** |\n| :--- | :--- | :--- |\n| ... |\
  \ ... | ... |\n\n表 10-4 详细列出了多部件几何体的 WKT。\n\n### 表 10-4. 多部件几何体 WKT\n\n| **几何体**\
  \ | **WKT** |\n| :--- | :--- |\n| 多点 | `MULTIPOINT((POINT 1),(POINT n))` |\n| 多线串\
  \ | `MULTILINESTRING((POINT 1, POINT n), (POINT 1, POINT n))` |\n| 多多边形 | `MULTIPOLYGON((POINT\
  \ 1, POINT 2, POINT n),(POINT 1, POINT 2, POINT n))` |\n| 几何体集合 | `GEOMETRYCOLLECTION(GEOMETRYTYPENAME(POINT\
  \ n),GEOMETRYTYPENAME(POINT n))` |\n\n## 众所周知二进制\n\nWKB 也可用于表示几何体。这种二进制数据通常表示为十六进制值。使用\
  \ WKB 时，你可以控制字节顺序，然后指定曲面类型，最后指定点集。本节将讨论 WKB 中每个字节的用途。\n\n第一个字节表示字节顺序，其中 `00` 是大端序，`01`\
  \ 是小端序。\n\n**提示** 大端序是指序列中最不重要的字节最后存储，小端序是指最不重要的字节最先存储。\n\n接下来的四个字节表示所定义曲面的类型。表\
  \ 10-5 描述了这些字节的整型代码。\n\n### 表 10-5. WKB 曲面类型整型代码\n\n| **类型** | **2D** | **Z** |\
  \ **M** | **ZM** |\n| :--- | :--- | :--- | :--- | :--- |\n| 点 | | | | |\n| 线串 |\
  \ | | | |\n| 圆弧串 | | | | |\n| 复合曲线 | | | | |\n| 多边形 | | | | |\n| 曲线多边形 | | | | |\n\
  | 多点 | | | | |\n| 多线串 | | | | |\n| 多多边形 | | | | |\n| 几何体集合 | | | | |\n\n剩余的字节由描述点的八字节浮点数组成。例如，想象一个坐标为\
  \ `4, 2` 的 `POINT`。使用大端序，其十六进制表示将是 `0x0101000000000000000000104000000000000000040`。如果我们将其分解为组成部分：\n\
  - `01`—表示字节方向\n- `01000000`—表示曲面类型\n- `0000000000001040`—表示 x 轴\n- `0000000000000040`—表示\
  \ y 轴\n\n**提示** 每个字节由两个字符的十六进制表示。\n\n```\n0x0101000000000000000000104000000000000000040\n\
  ```\n\n\n参考。\n\n表 10-6 提供了此方面的若干示例。\n\n# 第 10 章 理解空间数据\n\n**表 10-6.** WKB 示例\n\n\
  **WKT** | **WKB（十六进制表示—大端序）**\n---|---\n`POINT(1 1)` | `0x0101000000000000000000F03F00000000000F03F`\n\
  `POINT(1 1 1 1)` | `0x00000000010F000000000000F03F000000000000F03F000000000000F03F000000000000F03F`\n\
  `LINESTRING(1 1, 2 2)` | `0x000000000114000000000000F03F000000000000F03F00000000000000400000000000000040`\n\
  `POLYGON((1 1, 2 2, 2 1, 1 1))` | `0x00000000010404000000000000000000F03F000000000000F03F000000000000004000000000000000400000000000000040000000000000F03F000000000000F03F000000000000F03F010000000200000000001000000FFFFFFFF0000000003`\n\
  `GEOMETRYCOLLECTION(POINT(1 1),POINT(2 2))` | `0x00000000010402000000000000000000F03F000000000000F03F000000000000004000000003000000FFFFFFFF0000000007000000000-`\n\
  \n## 空间参考系统\n\n当使用 `GEOGRAPHY` 数据类型时，我们必须意识到，对于如何表示地球并没有一个统一的单一视图。相反，存在多种参考系统，称为空间参考系统。每个系统提供其自身的地图投影。每个系统由一个\
  \ `SRID` （空间参考标识符）来标识。可以通过查询 `sys.spatial_reference_systems` 系统表来查找 SQL Server 支持的\
  \ `SRID`，如清单 10-1 所示。\n\n![](img/index-302_1.jpg)\n\n**提示** 地球无法在不产生变形的情况下被建模在平面上。地图投影定义了哪些变形是可接受的，哪些是不可接受的。每种投影允许不同的变形。\n\
  \n**清单 10-1.** 查找空间参考\n\n```sql\nSELECT *\nFROM sys.spatial_reference_systems ;\n\
  ```\n\n此查询的部分结果可在图 10-5 中找到。\n\n**图 10-5.** 查找空间参考系统的结果\n\n您会注意到，该表提供了每个空间参考（SR）的各种详细信息，包括其\
  \ ID；开发和维护它的权威机构；测量单位，以及该单位相对于米这一基本度量单位的换算系数；并且最有趣的是，提供了由 OGC 定义的 SR 的 WKT。\n\n\
  让我们检查一下微软实现的 SR（`SRID` 104001）的 WKT，其详细信息在清单 10-2 中给出。\n\n**清单 10-2.** SRID 104001\
  \ 的 WKT\n\n```\nGEOGCS[\"Unit Sphere\",\n DATUM[\"Unit Sphere\",\n  SPHEROID[\"\
  Sphere\", 1.0, 0.0]\n ],\n PRIMEM[\"Greenwich\",0.0],\n UNIT[\"Degree\", 0.0174532925199433]\n\
  ]\n```\n\n请注意，该 WKT 使用 JSON 格式（有关 JSON 的详细讨论，请参见第 6-9 章），并指定了地图投影的详细信息，例如本初子午线和测量单位。\n\
  \n**注意** 重要的是要注意，虽然单个 `GEOGRAPHY` 列可以包含基于多个空间参考系统的值，但无法比较这些值。空间函数要求所有值具有相同的 `srid`，因为它们包含计算所需的背景信息。然而，可以在执行比较之前将一个值转换到不同的\
  \ `srid`。\n\n![](img/index-304_1.jpg)\n\n## SSMS 与空间数据\n\nSQL Server Management\
  \ Studio (SSMS) 提供了图形化结果，以帮助开发者处理空间数据。例如，想象一个简单的脚本，如清单 10-3，它声明了一个 `GEOMETRY` 类型的变量，并将其设置为包含一个简单的\
  \ `CurvePolygon`。\n\n**清单 10-3.** 使用 GEOMETRY 声明 CurvePolygon\n\n```sql\nDECLARE\
  \ @CurvePolygon GEOMETRY =\n'CURVEPOLYGON(CIRCULARSTRING(1 3, 3 5, 4 7, 7 3, 1 3))'\
  \ ;\n\nSELECT @CurvePolygon ;\n```\n\n常规的结果选项卡将返回该曲面的 `WKB`，采用十六进制表示法，如图 10-6 所示。\n\
  \n**图 10-6.** WKB 格式的结果\n\n![](img/index-305_1.jpg)\n\n\n# 第 10 章 理解空间数据\n\n然而，您会注意到，在\
  \ `结果` 和 `消息` 选项卡之间，出现了一个名为 `空间结果` 的新选项卡。此窗格如图 10-7 所示。\n\n**图 10-7.** `空间结果` 选项卡\
  \ — `GEOMETRY`\n\n您会发现，我们可以看到表面的图形表示，以及一些基本控件，允许我们放大和缩小，并且如果结果集中包含多个空间列，还可以在列之间切换。通过拖动鼠标，还可以围绕对象滚动查看。\n\
  \n考虑清单 10-4。您会注意到该脚本与清单 10-3 非常相似，除了我们现在声明的是一个 `GEOGRAPHY` 类型的变量，而不是 `GEOMETRY`。\n\
  \n**清单 10-4.** 使用 `GEOGRAPHY` 声明一个 `CurvePolygon`\n\n```sql\nDECLARE @CurvePolygon\
  \ GEOGRAPHY = 'CURVEPOLYGON(CIRCULARSTRING(1 3, 3 5, 4 7, 7 3, 1 3))' ;\nSELECT\
  \ @CurvePolygon ;\n```\n\n![](img/index-306_1.jpg)\n\n图 10-8 显示了该脚本的 `空间结果` 选项卡。您会注意到网格的单位已从欧几里得式坐标变为度数，这反映了现在使用的是地球模型，我们的坐标实际上是经度和纬度。\n\
  \n**图 10-8.** `空间结果` 选项卡 — `GEOGRAPHY`\n\n## 小结\n\nSQL Server 提供了两种用于处理空间数据的数据类型：`GEOMETRY`\
  \ 和 `GEOGRAPHY`。`GEOMETRY` 允许您在欧几里得（平面）模型中工作，而 `GEOGRAPHY` 允许您在地球（球体）模型中工作。SQL Server\
  \ 的空间实现基于开放地理空间联盟 (`OGC`) 制定的标准。\n\n空间形状，称为面，可以使用熟知文本 (`WKT`) 或熟知二进制 (`WKB`) 来定义，这些都是由\
  \ `OGC` 制定的标准。使用 `WKT` 时，面类型由名称及其点规格定义。使用 `WKB` 时，您可以控制字节顺序，然后指定面类型，最后指定点规格。`WKB`\
  \ 通常使用十六进制表示法来表示。\n\nSQL Server 支持以下基本和多部件地理类型，并且当在 SQL Server 2017 或更高版本中使用 `GEOGRAPHY`\
  \ 时，还支持 `FullGlobe` 几何类型：\n\n- `Point`\n- `LineString`\n- `CircularString`\n- `CompoundCurve`\n\
  - `Polygon`\n- `CurvePolygon`\n- `MultiPoint`\n- `MultiLineString`\n- `MultiPolygon`\n\
  - `GeometryCollection`\n\nSQL Server 支持多种空间参考系统。这在使用 `GEOGRAPHY` 时非常重要，因为每个 `SRID`\
  \ 都实现了自己的地图投影。具有冲突 `SRID` 的面可以存储在同一列中，但不能使用空间函数进行比较。\n\nSQL Server Management Studio\
  \ 为空间查询提供图形结果。`空间结果` 选项卡允许您移动面、进行缩放。网格会根据结果的数据类型，在欧几里得坐标和纬度/经度之间切换。\n\n# 第 11 章\
  \ 处理空间数据\n\n在第 10 章中，我讨论了与空间数据相关的概念，SQL Server 使用 `GEOMETRY` 和 `GEOGRAPHY` 数据类型来实现。\n\
  \n在本章中，我将探讨如何使用这些数据类型。首先，我将讨论可用于构建面的方法，然后回顾如何查询空间数据。最后，您将看到如何设计和创建空间索引。\n\n**注意**\
  \ 一个地理空间对象可以被称为 `geometry`（几何对象），简单的对象被称为基本几何对象，对象的集合被称为 `geometry` 集合（几何集合）。由于\
  \ `geometry` 也是指代以平面模型实现空间数据的数据类型的名称，这可能会引起混淆。因此，请注意，当本章提到地理空间对象时，将使用小写的 `geometry`\
  \ 一词。当指代数据类型时，将使用大写的 `GEOMETRY`。\n\n\n`doi.org/10.1007/978-1-4842-3901-8_11`\n\n\
  # 第 11 章 处理空间数据\n\n## 构造空间数据\n\n`GEOMETRY` 和 `GEOGRAPHY` 数据类型提供了许多可用于与空间数据交互的方法。其中许多方法是开放地理空间联盟\
  \ (OGC) 标准的一部分，而另一些则是对该标准的扩展。表 11-1 详细列出了可用于构造几何对象的方法，这些方法均来自 OGC 规范，并通过 `GEOMETRY`\
  \ 和 `GEOGRAPHY` 两种类型提供。\n\n***表 11-1.** 构造几何对象的方法*\n\n**空间类型** | **来自 WKT** | **来自\
  \ WKB**\n--- | --- | ---\nPoint | `STPointFromText` | `STPointFromWKB`\nLineString\
  \ | `STLineFromText` | `STLineFromWKB`\nPolygon | `STPolyFromText` | `STPolyFromWKB`\n\
  Any Primitive Spatial Instance | `STGeomFromText` | `STGeomFromWKB`\nMultiPoint\
  \ | `STMPointFromText` | `STMPointFromWKB`\nMultiLineString | `STMLineFromText`\
  \ | `STMLineFromWKB`\nMultiPolygon | `STMPolyFromText` | `STMPolyFromWKB`\nAny Multi\
  \ Spatial Instance | `STMGeomCollFromText` | `STMGeomCollFromWKB`\n\n这些方法中的每一个都接受两个参数。第一个参数是空间实例的已知文本\
  \ (WKT) 或已知二进制 (WKB)。第二个参数是空间实例应使用的 SRID（有关 SRID 的更多详细信息，请参阅第 10 章）。当对 `GEOMETRY`\
  \ 类型的列或变量调用时，可以将 `0` 作为 SRID 传递，因为在欧几里得模型中不需要地图投影（参见第 10 章）。\n\n然而，当对 `GEOGRAPHY`\
  \ 类型的列或变量调用时，必须使用有效的 SRID，传递 `0` 将导致 .NET 框架抛出错误。\n\n![](img/index-310_1.jpg)\n\n\
  # 第 11 章 处理空间数据\n\n清单 11-1 中的脚本将使用已知文本在 `GEOMETRY` 类型的变量中创建一个 `LineString`。\n\n\
  ***清单 11-1.*** 使用已知文本创建 LineString\n```sql\nDECLARE @LineString GEOMETRY ;\nSET\
  \ @LineString = GEOMETRY::STLineFromText('LINESTRING(0 0, 4.5 5, 4.5 0, 0 0)', 0)\n\
  SELECT @LineString ;\n```\n此脚本的图形结果如图 11-1 所示。\n\n***图 11-1.** 从 WKT 创建 LineString\
  \ 的结果*\n\n或者，可以使用清单 11-2 中的脚本，通过 WKB 创建相同的空间实例。\n\n# 第 11 章 处理空间数据\n\n***清单 11-2.***\
  \ 从已知二进制创建 LineString\n```sql\nDECLARE @LineString GEOMETRY ;\nSET @LineString =\
  \ GEOMETRY::STLineFromWKB(0x010200000004000000000000, 0);\nSELECT @LineString ;\n\
  ```\n\n**提示** 存在一个用于构造几何对象的额外扩展方法。`GeomFromGML` 允许您基于地理标记语言 (GML) 实例化对象。例如，清单 11-3\
  \ 中的脚本将从 GML 创建一个 `LineString`。GML 的完整讨论超出了本书的范围，但 OGC 规范可以在 [www.opengeospatial.org/standards/gml](http://www.opengeospatial.org/standards/gml)\
  \ 找到。\n\n***清单 11-3.*** 从 GML 创建 LineString\n```sql\nDECLARE @LineString GEOMETRY\
  \ ;\nSET @LineString = GEOMETRY::GeomFromGml('<LineString xmlns=\"http://www.opengis.net/gml\"\
  >\n    <posList>0 0 4.5 5 4.5 0 0 0</posList>\n</LineString>', 0) ;\nSELECT @LineString\
  \ ;\n```\n\nSQL Server 还提供了一个扩展方法，用于通过定义点的 x 和 y 坐标来创建空间实例。清单 11-4 展示了针对 `GEOMETRY`\
  \ 变量使用 `Point` 方法。该方法接受三个参数。第一个是 x 轴坐标，第二个是 y 轴坐标，第三个是 SRID。\n\n# 第 11 章 处理空间数据\n\
  \n***清单 11-4.*** 使用 Point 方法\n```sql\nDECLARE @Point GEOMETRY ;\nSET @Point = GEOMETRY::Point(10,\
  \ 10, 0) ;\nSELECT @Point ;\n```\n\n也可以通过简单地将已知文本或已知二进制作为值传递来实例化空间实例。例如，考虑\n\n\n\
  \n清单 11-5. 中的脚本\n\n***清单 11-5.*** 将已知文本传递给变量\n\n```\nDECLARE @Polygon GEOMETRY ;\n\
  \nSET @Polygon = 'POLYGON((0 0, 10 0, 10 10, 0 10, 0 0))' ;\n\nSELECT @Polygon ;\n\
  ```\n\n![](img/index-313_1.jpg)\n\n该脚本的图形化结果显示在图 11-2 中。\n\n***图 11-2.** 将已知文本传递给变量的结果*\n\
  \n可以通过直接传递 `NULL` 值或使用实例的只读 `Null` 属性将空间实例设置为 `NULL`。清单 11-6. 展示了这一点。\n\n***清单 11-6.***\
  \ 将实例设置为 `NULL`\n\n```\n--通过直接传递 NULL 将变量设为 NULL\nDECLARE @Polygon GEOMETRY ;\n\
  SET @Polygon = NULL ;\nSELECT @Polygon ;\n```\n\n![](img/index-314_1.jpg)\n\n```\n\
  --通过使用只读 Null 属性将变量设为 NULL\nSET @Polygon = GEOMETRY::[Null] ;\nSELECT @Polygon ;\n\
  ```\n\n可以使用 `STIsValid` 方法检查已知文本或已知二进制的有效性。如果实例无效，可以使用 `MakeValid` 方法使其有效。例如，考虑清单\
  \ 11-7 中的脚本，该脚本实例化了一个自相交的 `Polygon`。\n\n***清单 11-7.*** 验证和更正实例\n\n```\nDECLARE @Polygon\
  \ GEOMETRY ;\nSET @Polygon = GEOMETRY::STGeomFromText('POLYGON((0 0, 10 10, 10 0,\
  \ 0 10, 0 0))', 0) ;\n\nSELECT\n    @Polygon.STIsValid() AS IsValid\n    , @Polygon.MakeValid().ToString()\
  \ AS Fixed\n    , @Polygon AS WKB ;\n```\n\n如图 11-3 所示 的结果显示，原始值返回 `0`，因为它无效，而修复后的版本已将其转换为\
  \ `MultiPolygon`。\n\n***图 11-3.** 验证和更正实例的结果*\n\n![](img/index-315_1.jpg)\n\n查询的图形化结果显示在图\
  \ 11-4. 中。\n\n***图 11-4.** 验证和更正实例的图形化结果*\n\n值得注意的是，由于空间数据的解析方式，`STIsValid` 和 `MakeValid`\
  \ 的使用受到一些限制。例如，考虑清单 11-8 中 的脚本，该脚本尝试实例化一个未封闭的 `Polygon`。\n\n***清单 11-8.*** 尝试实例化未封闭的\
  \ `Polygon`\n\n```\nDECLARE @LineString GEOMETRY ;\nSET @LineString = GEOMETRY::STGeomFromText('POLYGON((0\
  \ 0, 10 10, 10 0, 0 10))', 0) ;\n\nSELECT\n    @LineString.STIsValid() AS IsValid\n\
  \    , @LineString.MakeValid().ToString() AS Fixed\n    , @LineString AS WKB ;\n\
  ```\n\n由于 `Polygon` 未封闭，它解析失败，并抛出如图 11-5 所示的错误。\n\n***图 11-5.** 实例化未封闭多边形时抛出的错误*\n\
  \n**查询空间数据**\n\nSQL Server 提供了多种与空间数据交互的方法。这些方法的概述可在表 11-2 中找到。该表详细列出了每个方法的名称、它是\
  \ `OGC` 标准还是 `Microsoft` 扩展，以及该方法所适用的数据类型。最后一列简要描述了该方法的功能。\n\nreturns the well-known\
  \ binary augmented with `Z` and `M` values, returns the `GML` of a spatial instance,\
  \ returns the well-known text augmented with `Z` and `M` values, accepts a single\
  \ parameter distance, returns an object representing all points within the distance\
  \ supplied, against which the method was called, accepts three parameters, the tolerance,\
  \ denotes if the tolerance is relative, returns an object representing all points,\
  \ a spatial object, a spatial object representing the union of all points, whose\
  \ distance from a geography instance is less than and a bit flag, which designates\
  \ of the spatial instance denoting a distance from the tolerance, if present, if\
  \ present, the geometry of a spatial instance, if present, returns a following for\
  \ relative.\n\n\n\n# 第 11 章：处理空间数据\n\n## 表 11-2. 空间数据方法\n\n| 方法 | 适用对象 | OGC 标准/扩展\
