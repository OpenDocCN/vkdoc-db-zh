- "# 第 3 章 使用 T-SQL 构建 XML\n\n## 示例 XML 结构\n\n```xml\n<Order>\n  <OrderHeader>\n \
  \   <CustomerName>Agrita Abele</CustomerName>\n    <OrderDate>2016-05-27</OrderDate>\n\
  \    <OrderID>73350</OrderID>\n  </OrderHeader>\n  <OrderDetails>\n    <Product\
  \ ProductID=\"21\" ProductName=\"DBA joke mug - you might be a DBA if (Black)\"\
  \ Price=\"13.00\" Qty=\"4\" />\n    <Product ProductID=\"33\" ProductName=\"Developer\
  \ joke mug - that's a hardware problem (Black)\" Price=\"13.00\" Qty=\"3\" />\n\
  \    <Product ProductID=\"142\" ProductName=\"Halloween zombie mask (Light Brown)\
  \ S\" Price=\"18.00\" Qty=\"24\" />\n    <Product ProductID=\"205\" ProductName=\"\
  Tape dispenser (Blue)\" Price=\"32.00\" Qty=\"90\" />\n    <Product ProductID=\"\
  59\" ProductName=\"RC toy sedan car with remote control (Red) 1/50 scale\" Price=\"\
  25.00\" Qty=\"2\" />\n  </OrderDetails>\n</Order>\n<Order>\n  <OrderHeader>\n  \
  \  <CustomerName>Agrita Abele</CustomerName>\n    <OrderDate>2016-05-27</OrderDate>\n\
  \    <OrderID>73356</OrderID>\n  </OrderHeader>\n  <OrderDetails>\n    <Product\
  \ ProductID=\"225\" ProductName=\"Chocolate sharks 250g\" Price=\"8.55\" Qty=\"\
  192\" />\n    <Product ProductID=\"74\" ProductName=\"Ride on vintage American toy\
  \ coupe (Black) 1/12 scale\" Price=\"285.00\" Qty=\"10\" />\n  </OrderDetails>\n\
  </Order>\n```\n\n使用 `FOR XML PATH` 来构建 XML 文档的查询一开始可能看起来有点复杂，但一旦你理解了原理，它们就变得相当简单。让我们检查每个需求以及如何实现所需的形状。\n\
  \n首先，我们需要一个名为 `<SalesOrders>` 的根节点，并且还需要将 `<row>` 元素重命名为 `<Order>`。这可以通过与我们探索 `RAW`\
  \ 模式时相同的方式实现，使用 `<row>` 元素的可选参数以及 `FOR XML` 子句中的 `ROOT` 关键字和根节点，如清单 3-15 所示。\n\n\
  ### 清单 3-15. 使用 `FOR XML PATH` 创建根节点并命名 `<row>` 元素\n\n```sql\nFOR XML PATH('Order'),\
  \ ROOT ('SalesOrders') ;\n```\n\n下一个需求是创建一个名为 `<OrderHeader>` 的复杂元素，它将包含 `<CustomerName>`、`<OrderDate>`\
  \ 和 `<OrderID>` 元素。这可以通过指定元素的路径以及元素名称来实现。如清单 3-16 所示，使用此技术时，`/` 字符表示层级结构中向下一步。\n\
  \n### 清单 3-16. 创建层级结构\n\n```sql\nSELECT\n    CustomerName 'OrderHeader/CustomerName'\n\
  \    , OrderDate 'OrderHeader/OrderDate'\n    , OrderID 'OrderHeader/OrderID'\n\
  ```\n\n要创建嵌套的行项目，我们必须使用返回 `XML` 数据类型的子查询。为了使该过程正常工作，我们必须在子查询的 `FOR XML` 子句中使用 `TYPE`\
  \ 关键字。这将导致结果以原生 `XML` 形式返回到外部查询，以便可以在服务器端进行处理。不使用此关键字将导致某些字符被控制字符序列替换。\n\n因为我们希望将值存储为名为\
  \ `<Product>` 元素的属性，所以我们必须将 `<row>` 元素重命名，并在列别名前添加 `@` 符号。最后，为了确保 `<Product>` 元素嵌套在名为\
  \ `<OrderDetails>` 的元素下，我们将使用 `OrderDetails` 作为子查询返回的列的别名，如清单 3-17 所示。\n\n### 清单\
  \ 3-17. `OrderDetails` 子查询\n\n```sql\n(\n    SELECT\n        LineItems2.StockItemID\
  \ '@ProductID'\n        , StockItems.StockItemName '@ProductName'\n        , LineItems2.UnitPrice\
  \ '@Price'\n        , Quantity '@Qty'\n    FROM Sales.OrderLines LineItems2\n  \
  \  INNER JOIN Warehouse.StockItems StockItems\n        ON LineItems2.StockItemID\
  \ = StockItems.StockItemID\n    WHERE LineItems2.OrderID = Base.OrderID\n    FOR\
  \ XML PATH('Product'), TYPE\n) 'OrderDetails'\n```\n\n清单 3-18 综合了我们讨论的各个方面，并以所需格式返回一个\
  \ XML 文档。\n\n### 清单 3-18. 综合示例\n\n```sql\nSELECT\n```\n\n\n"
- "# 第 3 章 使用 T-SQL 构建 XML\n\n## 使用 FOR XML EXPLICIT\n\n`FOR XML EXPLICIT` 是 `FOR\
  \ XML` 模式中最复杂的，但也提供了极致的灵活性。它使用标签和父节点的概念来控制嵌套。标签指定节点在层次结构中的位置，而父节点指示其上方节点的标签。因此，顶层节点的标签为\
  \ 1，父节点为 `NULL`。每个节点在单独的查询中指定，这些查询使用 `UNION ALL` 进行连接。\n\n例如，假设我们希望扩展清单 3-18 中的示例，使得我们返回一个包含两个子元素的\
  \ `OrderDetails` 元素。第一个将包含接单销售人员的姓名。第二个将是一个重复元素，详细列出订单中的行项目。我们可以通过使用清单 3-19 中的查询来实现这一点。\n\
  \n`清单 3-19.` 使用 XML Explicit 的订单详情\n\n```sql\nSELECT\n    1 AS Tag\n    , 0 AS Parent\n\
  \    , SalesOrder.OrderID AS\n      [OrderDetails!1!SalesOrderID]\n    , SalesOrder.OrderDate\
  \ AS\n      [OrderDetails!1!OrderDate]\n    , SalesOrder.CustomerID AS\n      [OrderDetails!1!CustomerID]\n\
  \    , NULL AS [SalesPerson!2!SalesPersonName]\n    , NULL AS [LineItem!3!LineTotal!ELEMENT]\n\
  \    , NULL AS [LineItem!3!ProductName!ELEMENT]\n    , NULL AS [LineItem!3!OrderQty!ELEMENT]\n\
  FROM Sales.Orders SalesOrder\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
  \ = SalesOrder.CustomerID\nWHERE customers.CustomerName = 'Agrita Abele'\n\nUNION\
  \ ALL\n\nSELECT\n    2 AS Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n   \
  \ , NULL\n    , NULL\n    , People.FullName\n    , NULL\n    , NULL\n    , NULL\n\
  FROM Sales.Orders SalesOrder\nINNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID\
  \ = SalesOrder.CustomerID\nINNER JOIN Application.People People\n    ON People.PersonID\
  \ = SalesOrder.SalespersonPersonID\nWHERE customers.CustomerName = 'Agrita Abele'\n\
  \nUNION ALL\n\nSELECT\n    3 AS Tag\n    , 1 AS Parent\n    , SalesOrder.OrderID\n\
  \    , NULL\n    , NULL\n    , People.FullName\n    , LineItem.UnitPrice\n    ,\
  \ Product.StockItemName\n    , LineItem.Quantity\nFROM Sales.Orders SalesOrder\n\
  INNER JOIN Sales.OrderLines LineItem\n    ON SalesOrder.OrderID = LineItem.OrderID\n\
  INNER JOIN Sales.Customers Customers\n    ON Customers.CustomerID = SalesOrder.CustomerID\n\
  INNER JOIN Warehouse.StockItems Product\n    ON Product.StockItemID = LineItem.StockItemID\n\
  INNER JOIN Application.People People\n    ON People.PersonID = SalesOrder.SalespersonPersonID\n\
  WHERE customers.CustomerName = 'Agrita Abele'\nORDER BY\n    [OrderDetails!1!SalesOrderID]\n\
  \    , [SalesPerson!2!SalesPersonName]\n    , [LineItem!3!LineTotal!ELEMENT]\nFOR\
  \ XML EXPLICIT, ROOT('SalesOrders');\n```\n\n关于清单 3-19 中的查询，我们需要注意几点。首先，每个复杂的节点都在其自己的查询中，这些查询通过\
  \ `UNION ALL` 连接。就像每次使用 `UNION ALL` 一样，每个查询必须具有相同数量的列。因此，当查询所定义的复杂节点中某个节点不存在时，会使用\
  \ `NULL` 值。另外，请注意 `OrderID` 列在所有三个查询中都使用了。该列用于定义哪些销售人员和行项目明细应归属于每个销售订单之下。\n\n```sql\n\
  CustomerName 'OrderHeader/CustomerName'\n, OrderDate 'OrderHeader/OrderDate'\n,\
  \ OrderID 'OrderHeader/OrderID'\n, (\n    SELECT\n        LineItems2.StockItemID\
  \ '@ProductID'\n        , StockItems.StockItemName '@ProductName'\n        , LineItems2.UnitPrice\
  \ '@Price'\n        , Quantity '@Qty'\n    FROM Sales.OrderLines LineItems2\n  \
  \  INNER JOIN Warehouse.StockItems StockItems\n        ON LineItems2.StockItemID\
  \ = StockItems.StockItemID\n    WHERE LineItems2.OrderID = Base.OrderID\n    FOR\
  \ XML PATH('Product'), TYPE\n) 'OrderDetails'\nFROM (\n    SELECT DISTINCT\n   \
  \     Customers.CustomerName\n        , SalesOrder.OrderDate\n        , SalesOrder.OrderID\n\
  \    FROM Sales.Orders SalesOrder\n    INNER JOIN Sales.OrderLines LineItem\n  \
  \      ON SalesOrder.OrderID = LineItem.OrderID\n    INNER JOIN Sales.Customers\
  \ Customers\n        ON Customers.CustomerID = SalesOrder.CustomerID\n    WHERE\
  \ customers.CustomerName = 'Agrita Abele'\n) Base\nFOR XML PATH('Order'), ROOT ('SalesOrders');\n\
  ```\n\n\n因为 `SalesPerson` 和 `LineItem` 节点是同级节点，所以第二和第三个查询的父节点都配置为 `1`，即第一个查询的标签。这意味着两者都将嵌套在\
  \ `OrderDetails` 节点下，处于层级的同一级别。定义 `OrderDetails` 节点的查询将其父节点配置为 `NULL`。这表示它位于层级的顶部，根节点除外，根节点是在\
  \ `FOR XML` 子句中定义的。\n\n与其他 `UNION ALL` 查询一样，列名源自第一个查询，节点名也取自第一个查询。如果你检查第一个查询中的列别名，你将清楚地看到节点名的结构是如何定义的。名称部分用\
