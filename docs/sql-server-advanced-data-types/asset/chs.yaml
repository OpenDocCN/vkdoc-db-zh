  INNER JOIN Sales.OrderLines LineItem\n    ON LineItem.OrderID = SalesOrder.OrderID\n\
  WHERE SalesOrder.OrderID IN\n(\n    3168,\n    4107,\n    4980,\n    64608,\n)\n\
  FOR XML AUTO, ROOT('SalesOrders') ;\n```\n\n"
