- "# 第 6 章 理解 JSON\n\n随着 SQL Server 的演进，产品中加入了越来越多的非关系型特性，模糊了关系型与 NoSQL 技术之间的界限。JSON\
  \ 便是其中一例。JSON（JavaScript 对象符号）是一种文档格式，被设计为一种轻量级的数据交换方法。\n\n就其是自描述的、分层的数据交换格式而言，JSON\
  \ 与 XML 相似。然而，与 XML 不同的是，JSON 的标签极简，这使得 JSON 文档更简短、更易于阅读且解析速度更快。\n\n本章中，我将介绍 JSON\
