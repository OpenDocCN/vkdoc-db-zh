  \n同样值得注意的是，所有数据都包含在属性中，而不是元素内。我们可以通过在`FOR XML`子句中使用`ELEMENTS`关键字来改变这种行为。`ELEMENTS`关键字将使所有数据都包含在子元素内，而不是属性中。这一点在清单\
  \ 3-6 所示的修改后的查询中得到了演示。\n\n### 清单 3-6. 使用 `ELEMENTS` 关键字\n\n```sql\nSELECT\n    SalesOrder.OrderDate\n\
  \    , Customers.CustomerName\n    , SalesOrder.OrderID\n    , Product.StockItemName\n\
  \    , LineItem.Quantity\n    , LineItem.UnitPrice\nFROM Sales.Orders SalesOrder\n\
