    \ int, cyclist_name FROZEN,\nPRIMARY KEY (race_name, race_position));\n```\n\n\
    After inserting data into the table , you can run the following query:\n\n```\n\
    cqlsh:cycling> SELECT * FROM cycling.race_winners\nWHERE race_name = 'National\
    \ Championships South Africa WJ-ITT (CN)';\nrace_name                        \
    \               | race_position | cyclist_name\n-------------------------------------------------+---------------+--------------------------------------------------\n\
    National Championships South Africa WJ-ITT (CN) |             1 |      {firstname:\
    \ 'Frances', lastname: 'DU TOUT'}\nNational Championships South Africa WJ-ITT\
    \ (CN) |             2 |       {firstname: 'Lynette', lastname: 'BENSON'}\n...\n\
    (5 rows)\ncqlsh:cycling>\n```\n\nNotice how the query makes use of the type full_name\
    \ that you defined to show the values of the firstname and the lastname columns\
    \ for a cyclist .\n\n### User-Defined Functions and User-Defined Aggregates\n\n\
    When dealing with large data sets and clusters with hundreds of nodes, there’s\
    \ a dramatic difference between applying aggregations on the client side and pushing\
    \ huge computations to the server side. By letting the server handle the computations,\
    \ you’ll save network bandwidth, simplify the code on the client side, and reap\
    \ additional benefits.\n\nIn the following sections, I explain the essentials\
    \ of user-defined functions (UDFs) and user-defined aggregates (UDAs).\n\n####\
    \ User-Defined Functions\n\nThe first thing you need to know about an UDF is that\
    \ its scope isn’t database-wide, as is the case with functions and procedures\
    \ in a database such as Oracle or MySQL. A user-defined function has only a keyspace-wide\
    \ scope.\n\n#### Things to Remember About UDFs\n\nThe following are the key things\
    \ you need to know about UDFs.\n\n*   You can use a language such as Java, JavaScript,\
    \ Groovy, and Scala to code your UDF.\n*   You can treat null input in two ways:\n\
    \    *   You can specify the `CALLED ON NULL INPUT` clause, which means that Cassandra\
    \ will always call the UDF.\n    *   If you specify the `RETURNS NULL ON NULL\
    \ INPUT` clause, Cassandra skips execution of the UDF and returns a null instead\
    \ if any of the arguments are null.\n*   As with the input parameters, you must\
    \ specify a valid type for the return type, such as a primitive, collection, tuples,\
    \ or CDT.\n\n#### Syntax of an UDF\n\nThe syntax for creating an UDF is as follows:\n\
    \n```\nCREATE [OR REPLACE] FUNCTION [IF NOT EXISTS]\n[keyspace.]functionName (param1\
    \ type1, param2 type2, ...)\nCALLED ON NULL INPUT | RETURNS NULL ON NULL INPUT\n\
    RETURN returnType\nLANGUAGE language\nAS '\n// your source code\n';\n```\n\nThe\
    \ `OR REPLACE clause` and the `IF NOT EXISTS` clause are mutually exclusive.\n\
    \n#### An Example UDF\n\nThe following is an example that shows how to create\
    \ and use an UDF. The UDF is named `maxof (currentvalue int, testvalue int).`\
    \ This function allows you to get the maximum of two integers that you pass to\
    \ it.\n\nBy default, UDFs are disabled. You must therefore first set `enable_user_defined_functions:\
    \ true` to enable in the `cassandra.yaml` file before trying the following:\n\n\
    ```\ncqlsh> CREATE FUNCTION maxof(currentvalue int, testvalue int)\nRETURNS NULL\
    \ ON NULL INPUT\nRETURNS int\nLANGUAGE java\nAS 'return Math.max(currentvalue,testvalue);';\n\
    ```\n\nYou can then create a test table and insert some data into it, following\
    \ which you can execute a query with your new UDF `maxOf` to get the maximum value\
    \ between two values, `val1` and `val2`. Some input values are purposely specified\
    \ as null. Here is the example:\n\n```\ncqlsh> SELECT id,val1,val2,maxOf(val1,val2)\
    \ FROM test WHERE id IN(1,2,3);\nid | val1 | val2 | udf.maxof(val1, val2)\n-----+------+------+-----------------------\n\
    1  |  100 |  200 |                   200\n2  |  100 | null |                 \
    \ null\n3  | null |  200 |                  null\n```\n\nSince the UDF specifies\
    \ the `RETURNS NULL ON NULL INPUT` clause, Cassandra returns a null whenever the\
    \ input argument is null.\n\n### User-Defined Aggregate Functions\n\nCassandra\
    \ enables you to create user-defined aggregate functions that you can apply to\
    \ data as part of a query result.\n\nYou create the aggregate function first and\
    \ your query can include only the aggregate function by itself, without any columns.\n\
    \n### Built-in Functions and Aggregates\n\nCassandra offers several handy built-in\
    \ functions and aggregates you can use. Here’s a listing:\n\n*   `COUNT`: The\
    \ `COUNT` function gets you a count of the number of rows.\n*   `SUM`: The `SUM`\
    \ function enables you to add all values for a specific column.\n*   `MIN`/`MAX`:\
    \ The `MIN`/`MAX` functions help you compute the minimum/maximum values for a\
    \ column.\n*   `AVG`: The `AVG` function computes the average of all values in\
    \ a given column.\n\n## Summary\n\nUnderstanding the proper uses of indexing in\
    \ a Cassandra is tricky since it’s so different from the way you use indexing\
    \ in traditional relational databases.\n\nCassandra collections such as sets,\
    \ maps, lists, and UDFs are highly useful and it’s good to know how they work."
  trans: "# Cassandra 集合与用户定义函数\n\n## 集合\n\n### 创建列表类型\n\n当处理与另一列存在多对多关系的列时，请使用 `list`\
    \ 数据类型。在以下示例中，`events` 列是一个列表，用于存储每个月内的所有赛事：\n\n```sql\ncqlsh> CREATE TABLE cycling.upcoming_calendar\
    \ ( year int,\nmonth int, events list,\nPRIMARY KEY ( year, month ));\n```\n\n\
    您可以查询该表以获取某年某月的赛事列表。\n\n```sql\ncqlsh:cycling> SELECT * FROM cycling.upcoming_calendar\
    \ WHERE year=2015 AND month=06;\nyear | month | events\n------+-------+---------------------------------------------\n\
    2015 |     6 | ['Criterium du Dauphine', 'Tour de Suisse']\n(1 rows)\ncqlsh:cycling>\n\
    ```\n\n`list` 集合类型中单个项目的最大大小为 2GB。\n\n### 创建映射类型\n\n以下示例展示了如何创建一个包含 `map` 类型的表。`teams`\
    \ 列具有 `map` 类型，每个团队显示骑手在该年份所属的团队年份和名称。\n\n```sql\ncqlsh> CREATE TABLE cycling.cyclist_teams\
    \ ( id UUID PRIMARY KEY, lastname text,\nfirstname text, teams map );\n```\n\n\
    您可以这样查询该表：\n\n```sql\ncqlsh> SELECT lastname, firstname, teams\nFROM cycling.cyclist_teams;\n\
    ```\n\n此查询显示与特定骑手相关的所有团队及其所属年份。\n\n### 在集合中指定冻结值\n\n您可以将类型标记为 `frozen`，以将多个组件序列化为单个值。您无法更新冻结类型中的单个字段（Cassandra\
    \ 将这些值视为一个 `blob`）。\n\n示例如下：\n\n```sql\ncqlsh> CREATE TABLE mykeyspace.users (\n\
    id uuid PRIMARY KEY,\nname frozen ,\ndirect_reports set>,    // 一个集合 set\naddresses\
    \ map>     // 一个集合 map\nscore set>>              // 一个包含嵌套冻结集合的集合\n);\n```\n\n\
    ## 元组\n\n您可以使用 `tuple` 数据类型将多个值一起存储在一列中。以下示例展示了如何为其中一列创建包含 `tuple` 数据类型的表：\n\n\
    ```sql\ncqlsh> CREATE TABLE cycling.nation_rank (nation text PRIMARY KEY, info\n\
    tuple);\n```\n\n以下查询从 `nation_rank` 表中检索数据：\n\n```sql\ncqlsh> SELECT * FROM cycling.nation_rank;\n\
    ```\n\n## 用户定义类型\n\n通过定义您自己的数据类型（称为用户定义类型），您可以将多个命名和类型化的数据字段附加到同一列。您可以指定任何有效的数据类型，包括集合甚至其他\
    \ UDT，作为 UDT 的字段。\n\n以下示例展示了如何创建一个名为 `cyclist.fullname` 的简单 UDT：\n\n```sql\ncqlsh>\
    \ CREATE TYPE cycling.fullname (firstname text, lastname text);\n```\n\n然后，您可以创建一个使用新类型\
    \ `cyclist.fullname` 的表：\n\n```sql\ncqlsh> CREATE TABLE cycling.race_winners\n\
    (race_name text, race_position int, cyclist_name FROZEN,\nPRIMARY KEY (race_name,\
    \ race_position));\n```\n\n向表中插入数据后，您可以运行以下查询：\n\n```sql\ncqlsh:cycling> SELECT\
    \ * FROM cycling.race_winners\nWHERE race_name = 'National Championships South\
    \ Africa WJ-ITT (CN)';\nrace_name                                       | race_position\
    \ | cyclist_name\n-------------------------------------------------+---------------+--------------------------------------------------\n\
    National Championships South Africa WJ-ITT (CN) |             1 |      {firstname:\
    \ 'Frances', lastname: 'DU TOUT'}\nNational Championships South Africa WJ-ITT\
    \ (CN) |             2 |       {firstname: 'Lynette', lastname: 'BENSON'}\n...\n\
    (5 rows)\ncqlsh:cycling>\n```\n\n请注意查询如何利用您定义的 `full_name` 类型来显示骑手的 `firstname`\
    \ 和 `lastname` 列的值。\n\n## 用户定义函数与用户定义聚合\n\n当处理包含数百个节点的大型数据集和集群时，在客户端应用聚合与将大量计算推送到服务器端之间存在显著差异。通过让服务器处理计算，您将节省网络带宽，简化客户端代码，并获得额外好处。\n\
    \n在以下部分中，我将解释用户定义函数（UDF）和用户定义聚合（UDA）的要点。\n\n### 用户定义函数\n\n关于 UDF，您首先需要知道的是它的作用域并非像\
    \ Oracle 或 MySQL 等数据库中的函数和存储过程那样是数据库级别的。用户定义函数的作用域仅限于键空间。\n\n### 关于 UDF 的注意事项\n\
    \n以下是您需要了解的关于 UDF 的关键点。\n\n*   您可以使用 Java、JavaScript、Groovy 和 Scala 等语言来编写 UDF。\n\
    *   您可以通过两种方式处理 `null` 输入：\n    *   您可以指定 `CALLED ON NULL INPUT` 子句，这意味着 Cassandra\
    \ 将始终调用 UDF。\n    *   如果您指定 `RETURNS NULL ON NULL INPUT` 子句，那么当任何参数为 `null` 时，Cassandra\
    \ 会跳过 UDF 的执行，并返回一个 `null`。\n*   与输入参数一样，您必须为返回类型指定有效类型，例如原始类型、集合、元组或 CDT。\n\n\
    ### UDF 的语法\n\n创建 UDF 的语法如下：\n\n```sql\nCREATE [OR REPLACE] FUNCTION [IF NOT EXISTS]\n\
    [keyspace.]functionName (param1 type1, param2 type2, ...)\nCALLED ON NULL INPUT\
    \ | RETURNS NULL ON NULL INPUT\nRETURN returnType\nLANGUAGE language\nAS '\n//\
    \ 您的源代码\n';\n```\n\n`OR REPLACE` 子句和 `IF NOT EXISTS` 子句是互斥的。\n\n### UDF 示例\n\n\
    以下是一个展示如何创建和使用 UDF 的示例。该 UDF 名为 `maxof (currentvalue int, testvalue int)`。此函数允许您获取传递给它的两个整数的最大值。\n\
    \n默认情况下，UDF 是禁用的。因此，在尝试以下操作之前，您必须首先在 `cassandra.yaml` 文件中设置 `enable_user_defined_functions:\
    \ true` 以启用它：\n\n```sql\ncqlsh> CREATE FUNCTION maxof(currentvalue int, testvalue\
    \ int)\nRETURNS NULL ON NULL INPUT\nRETURNS int\nLANGUAGE java\nAS 'return Math.max(currentvalue,testvalue);';\n\
    ```\n\n然后，您可以创建一个测试表并向其中插入一些数据，之后可以使用新的 UDF `maxOf` 执行查询，以获取两个值 `val1` 和 `val2`\
    \ 之间的最大值。一些输入值被特意指定为 `null`。示例如下：\n\n```sql\ncqlsh> SELECT id,val1,val2,maxOf(val1,val2)\
    \ FROM test WHERE id IN(1,2,3);\nid | val1 | val2 | udf.maxof(val1, val2)\n-----+------+------+\n\
    1  |  100 |  200 |                   200\n2  |  100 | null |                 \
    \ null\n3  | null |  200 |                  null\n```\n\n由于 UDF 指定了 `RETURNS NULL\
    \ ON NULL INPUT` 子句，因此当输入参数为 `null` 时，Cassandra 会返回一个 `null`。\n\n### 用户定义聚合函数\n\
    \nCassandra 允许您创建用户定义聚合函数，您可以在查询结果中将它们应用于数据。\n\n您首先创建聚合函数，您的查询可以仅包含聚合函数本身，而不包含任何列。\n\
    \n## 内置函数和聚合\n\nCassandra 提供了一些方便的内置函数和聚合供您使用。列表如下：\n\n*   `COUNT`：`COUNT` 函数获取行数的计数。\n\
    *   `SUM`：`SUM` 函数使您能够对特定列的所有值求和。\n*   `MIN`/`MAX`：`MIN`/`MAX` 函数帮助您计算列的最小值/最大值。\n\
    *   `AVG`：`AVG` 函数计算给定列中所有值的平均值。\n\n## 总结\n\n理解 Cassandra 中索引的正确用法是复杂的，因为它与您在传统关系数据库中使用索引的方式非常不同。\n\
    \nCassandra 集合，如 `set`、`map`、`list` 和 UDF 非常有用，了解它们的工作原理是很有益的。"
- fmt: "# 7. Cassandra on Docker, Apache Spark, and the Cassandra Cluster Manager\n\
    \nChapters [2](#A436674_1_En_2_Chapter.html) and [3](#A436674_1_En_3_Chapter.html)\
    \ showed how to create a generic Cassandra cluster on multiple nodes. Now that\
    \ you know quite a bit about the architecture of Cassandra, as well as how to\
    \ configure a cluster, it’s time to learn about orchestrating a Cassandra cluster\
    \ in various environments.\n\nContainers are all the rage now. This chapter first\
    \ shows you how to create a Cassandra cluster using Docker containers. I quickly\
    \ explain what Docker containers are and how to work with them. I then show you\
    \ how to install and configure Cassandra on Docker.\n\nFollowing the Cassandra\
    \ on Docker discussion, I show how to create a Cassandra database using Docker-Compose\
    \ and BDD (behavior-driven development).\n\nThe Cassandra Cluster Manager, contrary\
    \ to what its name might indicate, is not an internal Cassandra tool to manage\
    \ a cluster. Rather, it’s a handy tool for setting up a multi-node Cassandra cluster\
    \ on a single server. While CCM is for development and testing, it’s nice to know\
    \ how to set up clusters with this tool.\n\nFinally, I wrap up this chapter with\
    \ a very brief introduction to the emerging technology stack named SMACK (Apache\
    \ Spark, Apache Mesos, Akka, Cassandra, and Apache Kafka), a set of popular open\
    \ source tools that is increasingly being used to create distributed enterprise\
    \ applications.\n\n## Cassandra and Docker\n\nIn this section, I show how to run\
    \ a Cassandra cluster on Docker containers. A container is a lightweight, stand-alone,\
    \ executable package of software that includes everything necessary to run the\
    \ software, such as the code, runtime, system tools, system libraries, and configurations\
    \ settings.\n\n### Docker: A Quick Introduction\n\nDocker is an application that\
    \ makes it easy for you run applications within a container. A container is like\
    \ a virtual machine (VM) but is much more portable. Unlike a VM, which runs in\
    \ a hypervisor, it runs directly on the host operating system.\n\n### Installing\
    \ Docker\n\nIn this section, I show how to install Docker on an Ubuntu 16.04 server\
    \ .\n\n1.  Docker is available as part of the Ubuntu 16.04 installation. However,\
    \ since this may not be the latest version, download it from the source, shown\
    \ here:\n\n    ```\n    $ curl -fsSL https://download.docker.com/linux/ubuntu/gpg\
    \ | sudo apt-key add -\n    OK\n    $\n    ```\n\n2.  Add the Docker repository\
    \ to the APT source by doing the following:\n\n    ```\n    $ sudo add-apt-repository\
    \ \"deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs)\
    \ stable\"\n    $\n    ```\n\n3.  Update the package database with the new Docker\
    \ packages you just added.\n\n    ```\n    $ sudo apt-get update\n    ```\n\n\
    4.  Do the following to make sure that you’re installing Docker CE (Community\
    \ Edition) from the Docker repo, instead of the default Ubuntu Repo:\n\n    ```\n\
    \    $ apt-cache policy docker-ce\n    docker-ce:\n    Installed: (none)\n   \
    \ Candidate: 17.06.0~ce-0~ubuntu\n    Version table:\n    17.06.0~ce-0~ubuntu\
    \ 500\n    500 https://download.docker.com/linux/ubuntu xenial/stable amd64 Packages\n\
    \    ...\n    $\n    ```\n\n    The output verifies that the available Docker\
    \ install files are for Ubuntu-Xenial (16.04), so you’re good to go. Your version\
    \ number for `docker-ce` may be different from mine.\n5.  At this point, you’re\
    \ ready to install Docker .\n\n    ```\n    $ sudo apt-get install -y docker-ce\n\
    \    Reading package lists... Done\n    Building dependency tree\n    Reading\
    \ state information... Done\n    ...\n    Processing triggers for ureadahead (0.100.0-19)\
    \ ...\n    $\n    ```\n\n### Managing Docker\n\nYou can next check that Docker\
    \ is running via the `systemctl status docker` command .\n\n```\n$ sudo systemctl\
    \ status docker\n● docker.service - Docker Application Container Engine\n   Loaded:\
    \ loaded (/lib/systemd/system/docker.service; enabled; vendor preset: e\n   Active:\
    \ active (running) since Thu 2017-06-29 10:50:24 EDT; 5s ago\n     Docs: https://docs.docker.com\n\
    \ Main PID: 6598 (dockerd)\n   CGroup: /system.slice/docker.service\n        \
    \   ├─6598 /usr/bin/dockerd -H fd://\n           └─6603 docker-containerd -l unix:///var/run/docker/libcontainerd/dock\n\
    ...\n$\n```\n\nThe output indicates that the Docker service is running.\n\n###\
    \ Using the Docker Command Line Utility\n\nYou manager a Docker instance with\
    \ the `docker` command line utility . Just type `docker` at the command line to\
    \ view all the available options, which are quite a few.\n\nFor example, you can\
    \ view system-wide information about Docker by doing this:\n\n```\n$ sudo docker\
    \ info\nContainers: 6\nRunning: 0\nPaused: 0\nStopped: 6\n...\nOperating System:\
    \ Ubuntu 16.04.2 LTS\nOSType: linux\nArchitecture: x86_64\nCPUs: 1\nTotal Memory:\
    \ 7.796GiB\nName: ubuntu1\n...\n$\n```\n\n### Understanding Docker Images\n\n\
    All Dockers containers run from a docker image. By default, Docker pulls its images\
    \ from Docker Hub, a public Docker Registry maintained by the Docker company.\
    \ Others, including Linux distributions, also host their images on the Docker\
    \ Hub.\n\nYou can check if your Docker installation can access and download images\
    \ from Docker Hub by running the following command:\n\n```\n$ sudo docker run\
    \ hello-world\nHello from Docker!\nThis message shows that your installation appears\
    \ to be working correctly.\n$\n```\n\nYou can search for images on the Docker\
    \ Hub with the `docker search` command. If you want to look for all available\
    \ Ubuntu images, type this:\n\n```\n$ sudo docker search ubuntu\n```\n\nYou can\
    \ then download the image you want by specifying the name of the image with the\
    \ `docker pull` command.\n\n```\n$ sudo docker pull ubuntu\n```\n\nYou can view\
    \ all the images you’ve downloaded to your server by doing this:\n\n```\n$ sudo\
    \ docker images\nREPOSITORY        TAG           IMAGE ID          CREATED   \
    \      SIZE\nhello-world       latest        1815c82652c0       2 weeks ago  \
    \  1.84kB\nubuntu            latest        d355ed3537e9      12 days ago     119MB\n\
    ...\n$\n```\n\nAnd finally, you can run a container using the images you’ve downloaded\
    \ with the `docker run` command.\n\n```\n$ sudo docker run -it ubuntu\nsamalapati@bd78ccf18941:/#\n\
    ```\n\nThis will start a container running the Ubuntu OS. The `i` option stands\
    \ for interactive and the `t` option offers shell access into the container. Note\
    \ that the command prompt changes since you’re now inside the new Ubuntu container.\
    \ The container id is `bd78ccf18941`.\n\nNow that you have the basics of Docker\
    \ under your belt, it’s time to learn about how you can run Cassandra containers\
    \ on Docker."
