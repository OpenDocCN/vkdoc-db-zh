    \ here, which is to learn how to connect to a Cassandra cluster from a Spark cluster,\
    \ is very straightforward. Follow these steps to install Spark .\n\n1.  `$ wget`\
    \ [`http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz`](http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz)\
    \  \n2.  `$ tar zxf spark-2.0.2-bin-hadoop2.7.tgz`  \n3.  `$ sudo mv spark-2.0.2-bin-hadoop2.7/usr/local/spark/`\
    \  \n4.  Once you’ve installed the Spark binaries, set a home directory for Spark.\n\
    \n    ```\n    export $SPARK_HOME= /usr/local/spark\n    ```\n\n5.  Export the\
    \ PATH variable.\n\n    ```\n    export PATH=\"/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:$SPARK_HOME/bin\"\
    \n    ```"
  trans: "\n### 安装 CCM\n\n安装 CCM 很简单：只需确保你在开始安装 CCM 之前已安装 Python（至少是 2.7 版本）和 `ant`。\n\
    \n1.  要安装 CCM，你需要通过运行以下命令从 GitHub 获取所需文件：\n\n    ```\n    root@ubuntu2:/home/samalapati#\
    \ git clone https://github.com/pcmanus/ccm.git\n    Cloning into 'ccm'...\n  \
    \  remote: Counting objects: 4372, done.\n    remote: Compressing objects: 100%\
    \ (15/15), done.\n    remote: Total 4372 (delta 8), reused 14 (delta 6), pack-reused\
    \ 4351\n    Receiving objects: 100% (4372/4372), 1.80 MiB | 0 bytes/s, done.\n\
    \    Resolving deltas: 100% (3040/3040), done.\n    Checking connectivity... done.\n\
    \    root@ubuntu2:/home/samalapati# ls\n    ```\n\n2.  一旦你从 GitHub 下载了脚本和其他文件，运行\
    \ CCM 安装脚本。\n\n    ```\n    $ sudo ./setup.py install\n    ```\n\n安装文件位于 `ccm`\
    \ 目录下。\n\n```\n$ ls\nccm      Documents  examples.desktop  Pictures  Templates\n\
    Desktop  Downloads  Music             Public    Videos\n$ cd ccm\n$ ls\nccm  ccmlib\
    \  license.txt  MANIFEST.in  misc  README.md  setup.py  ssl  tests\n$ sudo ./setup.py\
    \ install\nrunning install\nrunning build\nrunning build_py\ncreating build\n\
    ...\ncreating build/scripts-2.7\n...\nrunning install_egg_info\n$\n```\n\n你可以通过输入\
    \ `ccm`、`ccm -help` 或 `ccm <command> -h.` 来查看 CCM 提供的各种功能。当然，你能做的第一件也是最重要的事情是创建一个集群，接下来我将介绍这个任务。\n\
    \n### 使用 CCM 创建 Cassandra 集群\n\n按照上一节所示安装好 CCM 后，就该创建一个 Cassandra 集群了。让我们创建一个包含三个节点、运行\
    \ Cassandra 3.1 版本的集群。默认情况下，CCM 创建的是单令牌节点，因此需要告诉它使用虚拟节点。\n\nCCM 会下载其所需的所有源文件并为你编译它们。\n\
    \n```\n$ sudo ccm create -n 3 -v 3.1 testcluster --vnodes\n18:55:53,875 ccm INFO\
    \ Downloading http://archive.apache.org/dist/cassandra/3.1/apache-cassandra-3.1-bin.tar.gz\
    \ to /tmp/ccm-tlSojg.tar.gz (29.376MB)\n306318:55:59,731 ccm INFO Extracting /tmp/ccm-tlSojg.tar.gz\
    \ as version 3.1 ...\n30802666  [100.00%]Current cluster is now: testclusster\n\
    $\n```\n\n命令 `ccm list` 会显示此节点上由 CCM 管理的所有 Cassandra 集群。\n\n```\n$ sudo ccm list\n\
    *testcluster\n$\n```\n\n#### 检查集群状态\n\n你可以通过以下方式检查新三节点集群的状态（注意在 CCM 环境中不能使用 `nodetool`\
    \ 命令！）：\n\n```\n$ sudo ccm status\nCluster: 'testcluster'\n\nnode1: DOWN (Not\
    \ initialized)\nnode3: DOWN (Not initialized)\nnode2: DOWN (Not initialized)\n\
    $\n```\n\n新集群中的所有三个节点都处于 `DOWN` 状态，因为你刚刚创建了集群，但尚未启动它。\n\n#### 启动集群\n\n执行 `ccm\
    \ start` 命令来启动 CCM 集群。在此示例中，我启动集群并使用 `ccm status` 命令检查其状态。\n\n```\n$ sudo ccm\
    \ start\n$ sudo ccm status\nCluster: 'testcluster'\n\nnode1: UP\nnode3: UP\nnode2:\
    \ UP\n$\n```\n\n命令 `ccm node1 status` 提供了关于集群状态的更详细信息。\n\n```\n$ sudo ccm node1\
    \ status\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n|/\
    \ State=Normal/Leaving/Joining/Moving\n--  Address    Load       Tokens      \
    \ Owns    Host ID              Rack\nUN  127.0.0.1  86.51 KB   256          ?\
    \       659b06e0-a4d9-49f5-b923-0bab9833daa3  rack1\nUN  127.0.0.2  86.47 KB \
    \  256          ?       4035e764-a152-40e6-ac9e-f9ddf1e603b4  rack1\nUN  127.0.0.3\
    \  92.34 KB   256          ?       40182f69-a81f-4a23-90ae-e9e1f0929c5e  rack1\n\
    Note: Non-system keyspaces don't have the same replication settings, effective\
    \ ownership information is meaningless\n$\n```\n\n你可以通过运行命令 `ccm stop` 来停止集群节点。\n\
    \n### 使用 CCM\n\n在本节中，我将通过展示如何运行一些重要命令来简要介绍 CCM，其中第一条命令允许你访问 CQL shell。\n\n####\
    \ 在 CCM 中使用 cqlsh\n\n要使用 CQL，运行带有 `cqlsh` 选项的 `ccm` 命令，并确保指定一个节点。\n\n```\n$ sudo\
    \  ccm node1 cqlsh\nConnected to testcluster2 at 127.0.0.1:9042.\n[cqlsh 5.0.1\
    \ | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\n\
    cqlsh>\n```\n\n#### 获取 SSTable 信息\n\n`ccm node1 getsstables` 命令显示此节点上的所有 SSTable。\n\
    \n```\n$ sudo ccm node1 getsstables\n/samalapati/.ccm/testcluster/node1/data0/system_schema/triggers-4df70b666b05325195a132b54005fd48/ma-1-big-Data.db\n\
    /samalapati/.ccm/testcluster/node1/data0/system_schema/types-5a8b1ca866023f77a0459273d308917a/ma-1-big-Data.db\n\
    ...\n$\n```\n\n### 运行 Apache Spark 与 Cassandra\n\nApache Spark 是一个非常流行、快速的通用大规模数据处理引擎。Spark\
    \ 可以运行在 Apache Hadoop、Apache Mesos、云端或独立模式下。Spark 可以访问多种数据源，例如 Hadoop 的 HDFS、Hbase、AWS\
    \ 的 S3，当然还有 Apache Cassandra。\n\n在本节中，我将展示如何安装 Apache Spark，并通过 DataStax 的 Spark-Cassandra\
    \ 连接器从 Spark 集群操作 Cassandra 数据库。\n\n### 安装先决条件\n\n要安装 Apache Spark，有几个先决条件，我将在本节中进行回顾。确保在你将要运行\
    \ Spark 集群的服务器上已经安装了以下软件，如果缺失，请安装它们。\n\n1.  确保至少安装了 Java 1.8.x。\n\n    ```\n \
    \   # java -version\n    java version \"1.8.0_131\"\n    Java(TM) SE Runtime Environment\
    \ (build 1.8.0_131-b11)\n    Java HotSpot(TM) 64-Bit Server VM (build 25.131-b11,\
    \ mixed mode)\n    #\n    ```\n\n2.  你还需要 Scala。\n\n    ```\n    # scala -version\n\
    \    Scala code runner version 2.11.7 -- Copyright 2002-2013, LAMP/EPFL\n    #\n\
    \    ```\n\n    你可以通过以下方式安装 Scala：\n\n    ```\n    # wget www.scala-lang.org/files/archive/scala-2.11.8.deb\n\
    \    # sudo dpkg -i scala-2.11.8.deb\n    ```\n\n3.  最后，你需要 SBT（Simple Build Tool）来编译\
    \ Scala 程序。\n\n    ```\n    # echo \"deb https://dl.bintray.com/sbt/debian /\"\
    \ | sudo tee -a /etc/apt/sources.list.d/sbt.list\n    # sudo apt-key adv --keyserver\
    \ hkp://keyserver.ubuntu.com:80 --recv 2EE0EA64E40A89B84B2DF73499E82A75642AC823\n\
    \    # sudo apt-get update\n    # sudo apt-get install sbt\n    ```\n\n    检查\
    \ SBT 版本：\n\n    ```\n    # sbt sbt-version\n    ...\n    [info] 0.13.15\n   \
    \ #\n    ```\n\n拥有正确的 SBT 版本非常重要；不兼容的版本是使用 Spark 和 Cassandra 时许多问题的根源。\n\n现在你已准备好安装\
    \ Apache Spark。\n\n### 安装 Apache Spark\n\n为你当前的目的（学习如何从 Spark 集群连接到 Cassandra\
    \ 集群）安装并开始使用 Apache Spark 非常直接。请按照以下步骤安装 Spark。\n\n1.  `$ wget` [`http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz`](http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz)\n\
    2.  `$ tar zxf spark-2.0.2-bin-hadoop2.7.tgz`\n3.  `$ sudo mv spark-2.0.2-bin-hadoop2.7\
    \ /usr/local/spark/`\n4.  安装 Spark 二进制文件后，为 Spark 设置一个主目录。\n\n    ```\n    export\
    \ SPARK_HOME=/usr/local/spark\n    ```\n\n5.  导出 PATH 变量。\n\n    ```\n    export\
    \ PATH=\"/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:$SPARK_HOME/bin\"\
    \n    ```\n"
- fmt: "## 配置 Spark 集群\n\n你可以通过 YARN 集群管理器 (Hadoop)、Apache Mesos 或 Spark 独立集群来运行 Spark\
    \ 集群。让我们尝试最后一种方案，这样你可以同时运行 Spark 和 Cassandra 集群。\n\nSpark 由一个主节点和多个工作节点组成。为了简单起见，让我们将主服务和工作服务运行在同一个节点上，但也可以轻松配置将工作节点运行在不同的节点上。\n\
    \n主要的配置文件是 `spark-env` 文件，位于 `/etc/spark/conf` 目录中。在此文件中，你可以指定 Spark 独立部署模式下使用的守护进程选项。也就是说，你为主节点和工作节点指定选项。\n\
    \n你可以将 `SPARK_WORKER_CORES` 和 `SPARK_WORKER_MEMORY` 等所有配置属性保留为其默认值。只需确保为你指定 Spark\
    \ 主实例将运行的节点的详细信息。\n\n```bash\nexport SPARK_MASTER_HOST=192.168.159.129\n```\n\n\
    这样，主节点将运行在 IP 为 192.168.159.129 的服务器上。你必须将此属性添加到集群中每个节点的 `/etc/spark/conf/spark-env`\
    \ 文件中。由于你将主实例和工作实例运行在同一节点上，所以这没问题。\n\n在生产集群中，你可以将 Spark 配置为服务运行，但这里我只关注演示如何从 Spark\
    \ 连接到 Cassandra，因此我们不会费心创建 Spark 服务。相反，让我们手动启动和停止 Spark 集群。\n\n## 启动 Spark 集群\n\
    \n由于 Spark 集群只有一个工作实例与主实例运行在同一节点上，你需要执行以下步骤来启动 Spark 集群。\n\n1.  移动到 Spark 的 `sbin`\
    \ 目录，该目录包含集群的启动/停止脚本。\n\n    ```bash\n    # cd /usr/local/spark/spark-2.0.2-bin-hadoop2.7/sbin\n\
    \    ```\n\n2.  启动 Spark 主实例。\n\n    ```bash\n    # ./start-master.sh\n    starting\
    \ org.apache.spark.deploy.master.Master, logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.master.Master-1-ubuntu.out\n\
    \    #\n    ```\n\n3.  启动单个工作实例。\n\n    ```bash\n    # ./start-slave.sh spark://ubuntu:7077\n\
    \    starting org.apache.spark.deploy.worker.Worker, logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.worker.Worker-1-ubuntu.out\n\
    \    #\n    ```\n\n4.  确保主实例和工作实例正在运行。\n\n    ```bash\n    # ps -ef|grep spark\n\
    \    root      14941   2008  0 10:37 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java\
    \ -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
    \ -Xmx1g org.apache.spark.deploy.master.Master --host ubuntu --port 7077 --webui-port\
    \ 8080\n    root      15073   2008  1 10:39 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java\
    \ -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
    \ -Xmx1g org.apache.spark.deploy.worker.Worker --webui-port 8081 spark://ubuntu:7077\n\
    \    #\n    ```\n\n到目前为止一切正常，Spark 集群已启动并运行。在下一节中，我将展示如何从 Spark 集群连接到 Cassandra\
    \ 数据库。\n\n## 从 Spark 集群连接到 Cassandra\n\n在 Spark 中访问 Cassandra 表的一种方法是将它们转换为 Spark\
    \ RDD（弹性分布式数据集）。你可以将 Cassandra 的表数据视为 Spark RDD，也可以将 Spark RDD 写入 Cassandra 表。\n\
    \n你可以通过多种方式从 Spark 访问 Cassandra。以下项目提供了库，使你能够从 Spark 程序读取和写入 Cassandra 表：\n\n\
    *   [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\n\
    *   [`http://tuplejump.github.io/calliope/pyspark.html`](http://tuplejump.github.io/calliope/pyspark.html)\n\
    *   [`https://github.com/TargetHolding/pyspark-cassandra`](https://github.com/TargetHolding/pyspark-cassandra)\n\
    \n让我们使用这些项目中的第一个，即 spark-cassandra-connector。\n\nspark-cassandra-connector（DataStax\
    \ Cassandra 连接器）是由 DataStax 提供的一个 Scala 库，它使得可以同时使用 Spark 和 Cassandra。你可以从 [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\
    \ 获取此连接器的最新版本。\n\n当你编写代码从 Spark 访问 Cassandra 时，你的代码，连同 spark-cassandra-connector\
    \ 及其所有必要的依赖项，会被打包并发送到 Spark 集群的节点。\n\n你通过 `spark-submit` 接口向 Spark 集群提交作业。当你这样做时，你可以在命令行包含一个\
    \ fat jar 以包含 spark-cassandra 连接器。\n\n这里的示例将展示如何从 Spark 集群执行临时工作。因此，请使用 `spark-shell`\
    \ 而不是 `spark-submit` 来与 Spark（和 Cassandra）交互。\n\n在以下示例中，你启动 `spark-shell` 并调用\
    \ spark-cassandra-connector，以便可以从 Spark 集群与 Cassandra 通信。`–packages` 选项使你能够指定\
    \ `spark-cassandra-connector`。此选项从 Spark 包下载连接器及其依赖项。\n\n请注意，你需要从 `$SPARK_HOME/bin`\
    \ 目录运行 `spark-shell` 命令，而不是从启动 Spark 实例的 `$SPARK_HOME/sbin` 目录运行。\n\n```bash\n\
    bin# ./spark-shell --conf spark.cassandra.connection.host=192.168.159.129 --packages\
    \ datastax:spark-cassandra-connector:2.0.0-M2-s_2.11\n...\norg.scala-lang#scala-reflect;2.11.8\
    \ from central in [default]\n\n|                  |            modules       \
    \     ||   artifacts   |\n|       conf       | number| search|dwnlded|evicted||\
    \ number|dwnlded|\n\n|      default     |   7   |   1   |   1   |   0   ||   7\
    \   |   0   |\n\nUsing Spark's default log4j profile: org/apache/spark/log4j-defaults.properties\n\
    Setting default log level to \"WARN\".Spark context Web UI available at http://192.168.159.129:4040\n\
    Spark context available as 'sc' (master = local[*], app id = local-1499634822206).\n\
    Spark session available as 'spark'.\nWelcome to\n____              __\n/ __/__\
    \  ___ _____/ /__\n_\\ \\/ _ \\/ _ '/ __/  '_/\n/___/ .__/\\_,_/_/ /_/\\_\\  \
    \ version 2.0.2\n/_/\nUsing Scala version 2.11.8 (Java HotSpot(TM) 64-Bit Server\
    \ VM, Java 1.8.0_131)\nType in expressions to have them evaluated.\nType :help\
    \ for more information.\nscala>\n```\n\n你可以使用 Scala、Python（或 Java）编写 Spark 代码。在这种情况下，你通过执行\
    \ `spark-shell` 命令选择了 Scala。要用 Python 编写代码，请运行 `pyspark` 命令，如下所示：\n\n```bash\n\
    root@ubuntu:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/bin# ./pyspark \\\n> --master\
    \ spark://ubuntu:7077 \\\n> --packages datastax:spark-cassandra-connector:2.0.0-M2-s_2.11\
    \ \\\n> --conf spark.cassandra.connection.host=ubuntu\nPython 2.7.12 (default,\
    \ Nov 19 2016, 06:48:10)\n...\nWelcome to\n/ __/__  ___ _____/ /__\n_\\ \\/ _\
    \ \\/ _ '/ __/  '_/\n/__ / .__/\\_,_/_/ /_/\\_\\   version 2.0.2\n/_/\nUsing Python\
    \ version 2.7.12 (default, Nov 19 2016 06:48:10)\nSparkSession available as 'spark'.\n\
    >>> posts = spark.read.format(\"org.apache.spark.sql.cassandra\").options(table=\"\
    posts\", keyspace=\"posts_db\").load()\n```"
  raw: "### Configuring the Spark Cluster\n\nYou can run a Spark cluster by managing\
    \ it with the YARN cluster manager (Hadoop), Apache Mesos, or a Spark standalone\
    \ cluster. Let’s try the last alternative so you can run Spark alongside the Cassandra\
    \ cluster.\n\nSpark consists of a single master node and multiple worker nodes.\
    \ For simplicity, let’s run both the master and worker services on the same node,\
    \ but it’s easy to configure the workers to run on different nodes.\n\nThe main\
    \ configuration file is the `spark-env` file, located in the `/etc/spark/conf`\
    \ directory. In this file, you specify the options for the daemons used in the\
    \ standalone deployment mode for Spark. That is, you specify the options for the\
    \ master and the worker nodes.\n\nYou can leave all the configuration attributes\
    \ such as `SPARK_WORKER_CORES` and `SPARK_WORKER_MEMORY` at their default values.\
    \ Just make sure that you specify the details for the node where the Spark master\
    \ instance will run.\n\n```\nexport SPARK_MASTER_HOST=192.168.159.129\n```\n\n\
    This way, the master will run on the server with the IP 192.168.159.129. You must\
    \ add this property to the `/etc/spark/conf/spark-env` file on each of the nodes\
    \ in the cluster. Since you’re running both the master and the worker instances\
    \ on the same node, you’re good.\n\nIn a production cluster, you can configure\
    \ Spark to run as a service, but here I’m concerned only with demonstrating how\
    \ to connect to Cassandra from Spark, so we won’t bother with creating a Spark\
    \ service. Instead, let’s manually start and stop the Spark cluster.\n\n### Starting\
    \ Up the Spark Cluster\n\nSince the Spark cluster has just one worker instance\
    \ running along with the master instance on the same node, here’s what you need\
    \ to do to start up the Spark cluster .\n\n1.  Move to the `sbin` directory of\
    \ Spark, which has the start/stop scripts for the cluster.\n\n    ```\n    # cd\
    \ /usr/local/spark/spark-2.0.2-bin-hadoop2.7/sbin\n    ```\n\n2.  Start the Spark\
    \ master instance.\n\n    ```\n    # ./start-master.sh\n    starting org.apache.spark.deploy.master.Master,\
    \ logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.master.Master-1-ubuntu.out\n\
    \    #\n    ```\n\n3.  Start the single worker instance.\n\n    ```\n    # ./start-slave.sh\
    \ spark://ubuntu:7077\n    starting org.apache.spark.deploy.worker.Worker, logging\
    \ to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.worker.Worker-1-ubuntu.out\n\
    \    #\n    ```\n\n4.  Make sure that the master and worker instances are up and\
    \ running.\n\n    ```\n    # ps -ef|grep spark\n    root      14941   2008  0\
    \ 10:37 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
    \ -Xmx1g org.apache.spark.deploy.master.Master --host ubuntu --port 7077 --webui-port\
    \ 8080\n    root      15073   2008  1 10:39 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java\
    \ -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
    \ -Xmx1g org.apache.spark.deploy.worker.Worker --webui-port 8081 spark://ubuntu:7077\n\
    \    #\n    ```\n\nEverything looks right thus far, and the Spark cluster is up\
    \ and running. In the next section, I show how to connect to a Cassandra database\
    \ from the Spark cluster.\n\n### Connecting to Cassandra from a Spark Cluster\n\
    \nOne way to access your Cassandra tables in Spark is to transform them into Spark\
    \ RDDs (Resilient Distributed Dataset ). You can view a Cassandra’s table data\
    \ as a Spark RDD, and you can write a Spark RDD to a Cassandra table.\n\nYou can\
    \ access Cassandra from Spark in several ways. The following projects provide\
    \ the libraries to enable you to read and write to Cassandra tables from a Spark\
    \ program:\n\n*   [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\n\
    *   [`http://tuplejump.github.io/calliope/pyspark.html`](http://tuplejump.github.io/calliope/pyspark.html)\n\
    *   [`https://github.com/TargetHolding/pyspark-cassandra`](https://github.com/TargetHolding/pyspark-cassandra)\n\
    \nLet’s use the first of these projects, which is the spark-cassandra-connector.\n\
    \nThe spark-cassandra-connector (DataStax Cassandra connector), a Scala library\
    \ offered by DataStax, makes it possible to work with Spark and Cassandra together.\
    \ You can get the latest version of this connector from [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\
    \ .\n\nWhen you write code to access Cassandra from Spark, your code, along with\
    \ the spark-Cassandra-connector and all the necessary dependencies, are packaged\
    \ and sent to the Spark cluster’s nodes.\n\nYou submit jobs to a Spark cluster\
    \ through the `spark-submit` interface. When you do this, you can include a fat\
    \ jar at the command line to include the spark-cassandra connector.\n\nThe example\
    \ here will show how to perform ad hoc work from a Spark cluster. So use `spark-shell`\
    \ instead of `spark-submit` to interact with Spark (and Cassandra).\n\nIn the\
    \ following example, you start `spark-shell` and invoke the spark-cassandra-connector\
    \ so you can communicate with Cassandra from the Spark cluster. The `–packages`\
    \ option enables you to specify the `spark-cassandra-connector`. This option downloads\
    \ the connector and its dependencies from the Spark packages.\n\nNote that you\
    \ need to run the `spark-shell` command from the `$SPARK_HOME/bin` directory and\
    \ not from the `$SPARK_HOME/sbin` directory, from where you start the Spark instances.\n\
    \n```\nbin# ./spark-shell --conf spark.cassandra.connection.host=192.168.159.129\
    \ --packages datastax:spark-cassandra-connector:2.0.0-M2-s_2.11\n...\norg.scala-lang#scala-reflect;2.11.8\
    \ from central in [default]\n\n|                  |            modules       \
    \     ||   artifacts   |\n|       conf       | number| search|dwnlded|evicted||\
    \ number|dwnlded|\n\n|      default     |   7   |   1   |   1   |   0   ||   7\
    \   |   0   |\n\nUsing Spark's default log4j profile: org/apache/spark/log4j-defaults.properties\n\
    Setting default log level to \"WARN\".Spark context Web UI available at http://192.168.159.129:4040\n\
    Spark context available as 'sc' (master = local[*], app id = local-1499634822206).\n\
    Spark session available as 'spark'.\nWelcome to\n____              __\n/ __/__\
    \  ___ _____/ /__\n_\\ \\/ _ \\/ _ '/ __/  '_/\n/___/ .__/\\_,_/_/ /_/\\_\\  \
    \ version 2.0.2\n/_/\nUsing Scala version 2.11.8 (Java HotSpot(TM) 64-Bit Server\
    \ VM, Java 1.8.0_131)\nType in expressions to have them evaluated.\nType :help\
    \ for more information.\nscala>\n```\n\nYou can use either Scala or Python (or\
