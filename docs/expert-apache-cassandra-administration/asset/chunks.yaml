    latency is higher than normal. That is, extra reads are triggered after a percent
    of the normal read latency of a table elapses. For example, the coordinator sends
    out extra read requests after waiting for 48ms (80 percent of 60ms) if a table’s
    latency is 60 seconds on average.

    *   `Nms`: The coordinator node sends out extra read requests if it doesn’t receive
    any results from the target node in `N` milliseconds.


    The default value of the `speculative_retry` property is `99percentile`. You can
    set the `speculative_retry` property when creating a table as shown here where
    you use `3ms` as the criterion for triggering additional read requests:


    ```

    speculative_retry = ''3ms''

    ```


    You can also configure rapid read protection after creating a table:


    ```

    cqlsh> ALTER TABLE users WITH speculative_retry = ''10ms'';

    cqlsh> ALTER TABLE users WITH speculative_retry = ''90percentile'';

    ```


    Since a consistency level of `ALL` requires responses from all replicas, you can’t
    use rapid read protection.


    In general, the more nodes in your cluster, the smaller the impact of rapid read
    protection on the nodes. This is a good benefit of spreading replication throughout
    the cluster with the use of virtual nodes.


    ### Anti-Entropy Repair


    Data can become inconsistent over time due to frequent data deletions and node
    crashes. In these situations, you need to maintain the nodes by performing anti-entropy
    repair . You perform this repair manually with the `nodetool repair` command.
    Anti-entropy repair is a regular maintenance task for administrators.


    #### How Anti-Entropy Repair Works


    During anti-entropy repair, Cassandra compares all replicas and updates those
    replicas to the latest version of the data. Cassandra uses Merkle trees (binary
    hash trees) so it can check data independently without the coordinator node having
    to download the entire data set.


    When the initiating node detects differences in the Merkel trees from participating
    peer nodes, it exchanges data for the configuring ranges and Cassandra writes
    the new data to the SSTables.


    You can run the `nodetool repair` command on a single node or on all the nodes
    of a cluster. The node that initiates the anti-entropy repair serves as the coordinator
    node for the repair operation.


    Although you can have Cassandra perform a full repair of a node’s data by comparing
    all SSTables of a node and make the repairs, by default the database performs
    incremental repair. Incremental repair relies on metadata that shows the SSTable’s
    rows as repaired or unrepaired. It persists already repaired data and builds Merkle
    trees only for those SSTables that it hasn’t repaired yet.


    ### Performing a Manual (Anti-Entropy) Repair


    You must perform an anti_entropy node repair regularly, especially when there
    are frequent deletes in the database. The purpose of the anti-entropy repair command
    is twofold:


    *   Ensure data consistency on all of the cluster’s nodes.

    *   Repair data inconsistency on a node that was down.


    Use the `nodetool repair` command to repair one or more tables. When you run a
    full repair, Cassandra marks the SSTables as repaired. Run the `nodetool repair`
    command to perform routine maintenance and not to repair a node that was down.


    Caution


    You shouldn’t run the `nodetool repair` command after making any topography changes
    in your cluster.


    The `nodetool repair` command has several parameters, as you can see here:


    ```

    $ nodetool [(-h  | --host )] [(-p  | --port )]

    [(-pw password | --password password)]

    [(-pwf passwordFilePath | --password-file passwordFilePath)]

    [(-u username | --username username)] repair

    [(-dc specific_dc | --in-dc specific_dc)...] [(-pl | --pull)]

    [(-dcpar | --dc-parallel)] [(-et end_token | --end-token end_token)]

    [(-full | --full)]

    [(-hosts specific_host | --in-hosts specific_host)...]

    [(-j job_threads | --job-threads job_threads)]

    [(-local | --in-local-dc)] [(-pr | --partitioner-range)]

    [(-seq | --sequential)]

    [(-st start_token | --start-token start_token)] [(-tr | --trace)]

    [--] [keyspace tables...]

    ```


    In the following sections, I show how to configure the most important parameters
    when running the `nodetool repair` command.


    #### Full vs. Incremental Repair


    You can configure `nodetool repair` with options that let you perform the repair
    in a full or an incremental fashion.


    The default mode for repair is incremental and it performs better than a full
    repair, since the database needs to worry about calculating the Merkle tree only
    for those SSTables that it didn’t repair earlier. That is, the database skips
    the SSTables marked as repaired. By performing frequent incremental repairs you
    can keep the repair process short and efficient.


    You can perform a full repair by specifying the `-full` option. The `-hosts` option
    lets you specify the good nodes to use for repairing any bad nodes, which you
    specify with the `-h` option.


    A full repair prevents anti-compaction, which is the process of splitting an SSTable
    into two tables, with one table containing the repaired data and the other the
    original data .


    #### Sequential vs. Parallel Repair


    If you want to complete a repair quickly and you’ve sufficient resources for the
    work, you can choose to perform a parallel repair, which means that the database
    repairs all data centers in parallel.


    Specify the `-dcpar` option if you want to do a parallel repair ; you may not
    actually have to do this because parallel repair is the default. The following
    command performs a parallel repair:


    ```

    $ nodetool repair

    ```


    The alternative to a parallel repair is sequential repair. The following `nodetool
    repair` command performs a sequential repair of all keyspaces on this node:


    ```

    $ nodetool repair -seq

    ```


    #### Partitioner Range Repair


    Since Cassandra replicates data, you may end up making the database repair the
    same data range more than once by performing the repair one node at a time. You
    can conserve resources by having the `nodetool repair` command repair a specific
    range of data just once.


    You can perform a partitioner range repair by specifying the `-pr` option. While
    this option is a good one, you can’t combine it with an incremental repair, which
    is the default mode. The following example shows how to perform a partitioner
    range repair of a bad partition on this node by using the good partitions on either
    node 10.2.2.30 or node 10.2.2.31:


    ```

    $ nodetool repair -pr hosts 10.2.2.30 10.2.2.31

    ```


    Tip


    DataStax recommends that you use the parallel and partitioner range options during
    a repair wherever it’s possible to do so.'
