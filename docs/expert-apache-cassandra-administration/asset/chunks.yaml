- fmt: '### When Batch Operations Are Good


    Consider batching only if you must ensure atomicity for a set of operations that
    perform `insert`/`update`/`deletes`. Write operations that use only a single partition
    are fine performance-wise.


    Even in cases with multiple partitions, if the operations involve only small inserts
    or updates, you’ll be fine with batching those operations to ensure consistency.


    ## Lightweight Transactions


    Sometimes you may want to read and write data in a sequential order, such as when
    you are handling banking transactions, where one should carefully handle the credits
    and debits. Cassandra offers lightweight transactions to manage concurrent operations
    in a transaction. It uses the Paxos consensus protocol to implement lightweight
    transactions. The Paxos protocol is an algorithm that allows the nodes in a cluster
    to agree on proposals without requiring a master node to coordinate the transactions.
    Paxos is an alternative to the traditional two-phase commit used to coordinate
    distributed transactions.


    Relational databases use several types of isolation, including the serializable
    level of isolation. Cassandra implements the Paxos protocol with linearizable
    consistency. Linearizable consistency yields results similar to those offered
    by the traditional serializable level offered by relational databases.


    Cassandra uses a transaction operation called compare and set (`CAS`) to implement
    linearizable consistency. Cassandra compares replica data and sets any out-of-date
    data to the most consistent value in the database.


    ## Performing Lightweight Transactions


    An appropriate use case for using a lightweight transaction is when you must insert
    unique data such as a user’s identification number.


    Cassandra enables you to issue `INSERT` and `UPDATE` statement using the `IF`
    clause to support lightweight transactions. For example, you can insert a new
    cyclist with an ID number , as shown here:


    ```

    cqlsh> INSERT INTO cycling.cyclist_name (id, lastname, firstname)

    VALUES (4647f6d3-7bd2-4085-8d6c-1229351b5498, ''KNETEMANN'', ''Roxxane'')

    IF NOT EXISTS;

    ```


    The following statement shows how to perform a lightweight `CAS` operation against
    data that exists in the database by adding the `IF` clause at the end of the operation:


    ```

    cqlsh> UPDATE cycling.cyclist_name

    SET firstname = ''Roxane''

    WHERE id = 4647f6d3-7bd2-4085-8d6c-1229351b5498

    IF firstname = ''Roxxane'';

    ```


    ### How Lightweight Transactions Work


    Cassandra intermingles the Paxos protocol and the normal read and write operations.
    A lightweight transaction doesn’t block normal read and operations but it‘ll block
    other lightweight transactions.


    Since mixing lightweight transactions and normal read and write operations can
    result in an error, you must use lightweight transactions for both read and write
    operations. For example, the following set of operations will fail:


    ```

    DELETE ...

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    On the other hand, the following set of operations will work fine:


    ```

    DELETE ... IF EXISTS

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    ### Caution When Using Lightweight Transactions


    Since implementing the Paxos protocol involves a series of actions that occur
    between proposers and acceptors, there will be multiple round trips between the
    node that proposes a lightweight transaction and other replicas that are part
    of the transaction. This obviously has an adverse impact on performance, so you
    should be careful to use lightweight transactions only when consistency among
    the operations of a transaction is critical.


    ## Summary


    The key takeaway regarding Cassandra data modeling is how queries are the heart
    of everything. You design your database structures such as tables and indexes
    based on the queries you expect the database to service.


    Understanding the principle of eventual consistency and the various read and write
    levels and their implications helps you make the best choices to satisfy the requirements
    of your applications.


    # 5. Cassandra Architecture


    Cassandra has several interesting architectural features that set it apart from
    a relational database. This chapter introduces the Cassandra architecture. You’ll
    also learn about the Cassandra storage engine and how the database stores its
    data.


    The chapter explains the gossip protocol, which the nodes use to communicate among
    themselves. Read and write repairs are part of how Cassandra provides consistency.
    You’ll learn about failure detection and recovery. You’ll learn about hinted handoff,
    a feature that ensures that a failed node receives all the modifications that
    occurred while it was down. You’ll also learn about read repair and manual anti-entropy
    repair.


    The chapter explains virtual nodes, which are a significant improvement over traditional
    ways of distributing data across the nodes of a cluster. You’ll learn about various
    partitioning and replication strategies, such as `SimpleStrategy` and `NetworkTopologyStrategy`,
    and how to change the replication strategies. You’ll learn how to choose among
    the available data partitioning strategies to help Cassandra distribute data across
    a cluster’s nodes.


    Cassandras uses the cluster’s topology to decide where it should store the data,
    as well as how best to respond to queries. To this end, it attempts to store replicas
    in multiple datacenters to ensure availability. It also sends queries to the local
    datacenter to minimize latency.


    Snitches determine the datacenter and racks that Cassandra writes to and reads
    from, and are critical for read activity. You’ll learn about the several types
    of snitches offered by Cassandra, such as the `GossipingPropertySnitch` and the
    `Ec2Snitch`.


    ## Basic Cluster Terminology


    Cassandra uses a peer-to-peer system where data is distributed over multiple nodes
    in a cluster. Nodes in a cluster periodically exchange information among themselves
    using a gossip protocol . One of the cluster’s nodes acts as a coordinator or
    proxy for every client operation and determines which nodes should process the
    client requests.


    Cassandra partitions and replicates data. It uses commit logs to ensure data durability
    and writes the data from the commit log structures called `memtables` and from
    there to disk in `SSTable` data files.


    Periodically, the database compacts data by discarding obsolete data. To ensure
    consistency of data, Cassandra employs several types of repair mechanisms.


    It’s a good idea to refresh your understanding of some of the key terms you’ll
    come across often in this and the rest of the chapters when dealing with the architecture
    of Cassandra.


    *   A `datacenter` is a group of related nodes that you configure together within
    a cluster for replication purposes. You can have virtual or physical datacenters.
    A datacenter can’t span physical locations. The purpose in having multiple datacenters
    is to prevent other data nodes from adversely impacting transactions in a data
    node and to lower latency. You can create datacenters to contain specific node
    types, such as transactional, analytics, search, and graph.

    *   A `rack` is a logical set of nodes located close to each other, usually in
    the same physical rack of physical machines. A datacenter is a logical grouping
    of racks, connected by a network.


    Note


    Cassandra comes with a default rack named `RAC1` and a default single data center
    named `DC1`.'
  raw: '### When Batch Operations Are Good


    Consider batching only if you must ensure atomicity for a set of operations that
    perform insert/update/deletes. Write operations that use only a single partition
    are fine performance-wise.


    Even in cases with multiple partitions, if the operations involve only small inserts
    or updates, you’ll be fine with batching those operations to ensure consistency.


    ## Lightweight Transactions


    Sometimes you may want to read and write data in a sequential order, such as when
    you are handling banking transactions, where one should carefully handle the credits
    and debits. Cassandra offers lightweight transactions to manage concurrent operations
    in a transaction. It uses the Paxos consensus protocol to implement lightweight
    transactions. The Paxos protocol is an algorithm that allows the nodes in a cluster
    to agree on proposals without requiring a master node to coordinate the transactions.
    Paxos is an alternative to the traditional two-phase commit used to coordinate
    distributed transactions.


    Relational databases use several types of isolation, including the serializable
    level of isolation. Cassandra implements the Paxos protocol with linearizable
    consistency. Linearizable consistency yields results similar to those offered
    by the traditional serializable level offered by relational databases.


    Cassandra uses a transaction operation called compare and set (CAS) to implement
    linearizable consistency. Cassandra compares replica data and sets any out-of-date
    data to the most consistent value in the database.


    ## Performing Lightweight Transactions


    An appropriate use case for using a lightweight transaction is when you must insert
    unique data such as a user’s identification number.


    Cassandra enables you to issue `INSERT` and `UPDATE` statement using the `IF`
    clause to support lightweight transactions. For example, you can insert a new
    cyclist with an ID number , as shown here:


    ```

    cqlsh> INSERT INTO cycling.cyclist_name (id, lastname, firstname)

    VALUES (4647f6d3-7bd2-4085-8d6c-1229351b5498, ''KNETEMANN'', ''Roxxane'')

    IF NOT EXISTS;

    ```


    The following statement shows how to perform a lightweight CAS operation against
    data that exists in the database by adding the `IF` clause at the end of the operation:


    ```

    cqlsh> UPDATE cycling.cyclist_name

    SET firstname = ''Roxane''

    WHERE id = 4647f6d3-7bd2-4085-8d6c-1229351b5498

    IF firstname = ''Roxxane'';

    ```


    ### How Lightweight Transactions Work


    Cassandra intermingles the Paxos protocol and the normal read and write operations.
    A lightweight transaction doesn’t block normal read and operations but it‘ll block
    other lightweight transactions.


    Since mixing lightweight transactions and normal read and write operations can
    result in an error, you must use lightweight transactions for both read and write
    operations. For example, the following set of operations will fail:


    ```

    DELETE ...

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    On the other hand, the following set of operations will work fine:


    ```

    DELETE ... IF EXISTS

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    ### Caution When Using Lightweight Transactions


    Since implementing the Paxos protocol involves a series of actions that occur
    between proposers and acceptors, there will be multiple round trips between the
    node that proposes a lightweight transaction and other replicas that are part
    of the transaction. This obviously has an adverse impact on performance, so you
    should be careful to use lightweight transactions only when consistency among
    the operations of a transaction is critical.


    ## Summary


    The key takeaway regarding Cassandra data modeling is how queries are the heart
    of everything. You design your database structures such as tables and indexes
    based on the queries you expect the database to service.


    Understanding the principle of eventual consistency and the various read and write
    levels and their implications helps you make the best choices to satisfy the requirements
    of your applications.


    # 5. Cassandra Architecture


    Cassandra has several interesting architectural features that set it apart from
    a relational database. This chapter introduces the Cassandra architecture. You’ll
    also learn about the Cassandra storage engine and how the database stores its
    data.


    The chapter explains the gossip protocol, which the nodes use to communicate among
    themselves. Read and write repairs are part of how Cassandra provides consistency.
    You’ll learn about failure detection and recovery. You’ll learn about hinted handoff,
    a feature that ensures that a failed node receives all the modifications that
    occurred while it was down. You’ll also learn about read repair and manual anti-entropy
    repair.


    The chapter explains virtual nodes, which are a significant improvement over traditional
    ways of distributing data across the nodes of a cluster. You’ll learn about various
    partitioning and replication strategies, such as `SimpleStrategy` and `NetworkTopologyStrategy`,
    and how to change the replication strategies. You’ll learn how to choose among
    the available data partitioning strategies to help Cassandra distribute data across
    a cluster’s nodes.


    Cassandras uses the cluster’s topology to decide where it should store the data,
    as well as how best to respond to queries. To this end, it attempts to store replicas
    in multiple datacenters to ensure availability. It also sends queries to the local
    datacenter to minimize latency.


    Snitches determine the datacenter and racks that Cassandra writes to and reads
    from, and are critical for read activity. You’ll learn about the several types
    of snitches offered by Cassandra, such as the `GossipingPropertySnitch` and the
    `Ec2Snitch`.


    ## Basic Cluster Terminology


    Cassandra uses a peer-to-peer system where data is distributed over multiple nodes
    in a cluster. Nodes in a cluster periodically exchange information among themselves
    using a gossip protocol . One of the cluster’s nodes acts as a coordinator or
    proxy for every client operation and determines which nodes should process the
    client requests.


    Cassandra partitions and replicates data. It uses commit logs to ensure data durability
    and writes the data from the commit log structures called memtables and from there
    to disk in SSTable data files.


    Periodically, the database compacts data by discarding obsolete data. To ensure
    consistency of data, Cassandra employs several types of repair mechanisms.


    It’s a good idea to refresh your understanding of some of the key terms you’ll
    come across often in this and the rest of the chapters when dealing with the architecture
    of Cassandra.


    *   A datacenter is a group of related nodes that you configure together within
    a cluster for replication purposes. You can have virtual or physical datacenters.
    A datacenter can’t span physical locations. The purpose in having multiple datacenters
    is to prevent other data nodes from adversely impacting transactions in a data
    node and to lower latency. You can create datacenters to contain specific node
    types, such as transactional, analytics, search, and graph.

    *   A rack is a logical set of nodes located close to each other, usually in the
    same physical rack of physical machines. A datacenter is a logical grouping of
    racks, connected by a network.


    Note


    Cassandra comes with a default rack named RAC1 and a default single data center
    named DC1.'
  trans: '

    ### 何时适用批处理操作


    仅在必须确保一组执行`插入`/`更新`/`删除`操作的原子性时，才考虑使用批处理。仅涉及单个分区的写操作在性能方面没有问题。


    即使在涉及多个分区的情况下，如果操作只包含少量的插入或更新，你也可以通过批处理这些操作来确保一致性。


    ## 轻量级事务


    有时，你可能希望按顺序读写数据，例如在处理银行交易时，需要谨慎处理借记和贷记。Cassandra 提供了轻量级事务来管理事务中的并发操作。它使用 Paxos
    共识协议来实现轻量级事务。Paxos 协议是一种算法，允许集群中的节点就提议达成一致，而无需主节点来协调事务。Paxos 是传统两阶段提交（用于协调分布式事务）的一种替代方案。


    关系型数据库使用多种隔离级别，包括可串行化隔离级别。Cassandra 使用线性一致性来实现 Paxos 协议。线性一致性产生的结果与关系型数据库提供的传统可串行化级别相似。


    Cassandra 使用一种称为比较并设置 (`CAS`) 的事务操作来实现线性一致性。Cassandra 比较副本数据，并将任何过时的数据设置为数据库中最一致的值。


    ## 执行轻量级事务


    使用轻量级事务的一个合适场景是，当你必须插入唯一数据（例如用户标识号）时。


    Cassandra 允许你使用 `IF` 子句来发出 `INSERT` 和 `UPDATE` 语句，以支持轻量级事务。例如，你可以插入一个新的自行车手及其
    ID 号，如下所示：


    ```

    cqlsh> INSERT INTO cycling.cyclist_name (id, lastname, firstname)

    VALUES (4647f6d3-7bd2-4085-8d6c-1229351b5498, ''KNETEMANN'', ''Roxxane'')

    IF NOT EXISTS;

    ```


    以下语句展示了如何通过在对数据库中已存在数据的操作末尾添加 `IF` 子句，来执行一次轻量级 `CAS` 操作：


    ```

    cqlsh> UPDATE cycling.cyclist_name

    SET firstname = ''Roxane''

    WHERE id = 4647f6d3-7bd2-4085-8d6c-1229351b5498

    IF firstname = ''Roxxane'';

    ```


    ### 轻量级事务的工作原理


    Cassandra 将 Paxos 协议与正常的读写操作交织在一起。轻量级事务不会阻塞正常的读操作和写操作，但它会阻塞其他轻量级事务。


    由于混合使用轻量级事务和正常的读写操作可能导致错误，因此你必须对读操作和写操作都使用轻量级事务。例如，以下操作集将失败：


    ```

    DELETE ...

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    另一方面，以下操作集将正常工作：


    ```

    DELETE ... IF EXISTS

    INSERT ... IF NOT EXISTS

    SELECT ...

    ```


    ### 使用轻量级事务时的注意事项


    由于实现 Paxos 协议涉及提议者和接受者之间发生的一系列动作，因此提议轻量级事务的节点与参与事务的其他副本之间会进行多次往返通信。这显然会对性能产生不利影响，因此应谨慎使用轻量级事务，仅在事务操作间的一致性至关重要时才使用。


    ## 总结


    关于 Cassandra 数据建模的关键点在于：查询是一切的核心。你根据预期数据库需要处理的查询来设计表、索引等数据库结构。


    理解最终一致性原理、各种读写级别及其含义，有助于你做出最佳选择，以满足应用程序的需求。


    # 5. Cassandra 架构


    Cassandra 具有几个有趣的架构特性，使其有别于关系型数据库。本章介绍 Cassandra 架构。你还将了解 Cassandra 存储引擎以及数据库如何存储其数据。


    本章解释了节点间用于通信的 gossip 协议。读修复和写修复是 Cassandra 提供一致性的方式的一部分。你将学习故障检测和恢复。你将了解提示移交，这是一个确保故障节点接收到其宕机期间发生的所有修改的功能。你还将了解读修复和手动反熵修复。


    本章解释了虚拟节点，这是对在集群节点间分配数据的传统方式的重大改进。你将了解各种分区和复制策略，如 `SimpleStrategy` 和 `NetworkTopologyStrategy`，以及如何更改复制策略。你将学习如何选择可用的数据分区策略，以帮助
    Cassandra 在集群节点间分配数据。


    Cassandra 使用集群的拓扑结构来决定存储数据的位置以及如何最佳地响应查询。为此，它尝试在多个数据中心存储副本以确保可用性。它还将查询发送到本地数据中心以最大限度地降低延迟。


    探测器确定 Cassandra 写入和读取的数据中心和机架，对读活动至关重要。你将了解 Cassandra 提供的几种类型的探测器，例如 `GossipingPropertySnitch`
    和 `Ec2Snitch`。


    ## 基本集群术语


    Cassandra 使用一个点对点系统，数据分布在集群中的多个节点上。集群中的节点使用 gossip 协议定期交换信息。对于每个客户端操作，集群中的一个节点充当协调者或代理，并确定哪些节点应处理客户端请求。


    Cassandra 对数据进行分区和复制。它使用提交日志确保数据持久性，并将数据从提交日志写入名为 `memtable` 的内存结构，然后再写入磁盘上的 `SSTable`
    数据文件。


    数据库会定期通过丢弃过时数据来压缩数据。为确保数据一致性，Cassandra 采用了多种类型的修复机制。


    当你在本章及后续章节中处理 Cassandra 架构时，最好刷新一下对一些关键术语的理解。


    *   `数据中心` 是集群中为复制目的而配置在一起的一组相关节点。你可以拥有虚拟或物理数据中心。一个数据中心不能跨越物理位置。拥有多个数据中心的目的是防止其他数据节点对数据节点中的事务产生不利影响，并降低延迟。你可以创建包含特定节点类型的数据中心，例如事务型、分析型、搜索型和图类型。

    *   `机架` 是一组逻辑上彼此靠近的节点，通常位于物理机器的同一物理机架内。数据中心是通过网络连接的机架的逻辑分组。


    注意


    Cassandra 自带一个名为 `RAC1` 的默认机架和一个名为 `DC1` 的默认单数据中心。

