    \    Reading package lists... Done\n    Building dependency tree\n    Reading\
    \ state information... Done\n    ...\n    Processing triggers for ureadahead (0.100.0-19)\
    \ ...\n    $\n    ```\n\n#### Managing Docker\n\nYou can next check that Docker\
    \ is running via the `systemctl status` `docker` command .\n\n```\n$ sudo systemctl\
    \ status docker\n● docker.service - Docker Application Container Engine\nLoaded:\
    \ loaded (/lib/systemd/system/docker.service; enabled; vendor preset: e\nActive:\
    \ active (running) since Thu 2017-06-29 10:50:24 EDT; 5s ago\nDocs: https://docs.docker.com\n\
    Main PID: 6598 (dockerd)\nCGroup: /system.slice/docker.service\n├─6598 /usr/bin/dockerd\
    \ -H fd://\n└─6603 docker-containerd -l unix:///var/run/docker/libcontainerd/dock\n\
    ...\n$\n```\n\nThe output indicates that the Docker service is running.\n\n####\
    \ Using the Docker Command Line Utility\n\nYou manager a Docker instance with\
    \ the docker command line utility . Just type `docker` at the command line to\
    \ view all the available options, which are quite a few.\n\nFor example, you can\
    \ view system-wide information about Docker by doing this:\n\n```\n$ sudo docker\
    \ info\nContainers: 6\nRunning: 0\nPaused: 0\nStopped: 6\n...\nOperating System:\
    \ Ubuntu 16.04.2 LTS\nOSType: linux\nArchitecture: x86_64\nCPUs: 1\nTotal Memory:\
    \ 7.796GiB\nName: ubuntu1\n...\n$\n```\n\n#### Understanding Docker Images\n\n\
    All Dockers containers run from a docker image. By default, Docker pulls its images\
    \ from Docker Hub, a public Docker Registry maintained by the Docker company.\
    \ Others, including Linux distributions, also host their images on the Docker\
    \ Hub.\n\nYou can check if your Docker installation can access and download images\
    \ from Docker Hub by running the following command:\n\n```\n$ sudo docker run\
    \ hello-world\nHello from Docker!\nThis message shows that your installation appears\
    \ to be working correctly.\n$\n```\n\nYou can search for images on the Docker\
    \ Hub with the `docker search` command. If you want to look for all available\
    \ Ubuntu images, type this:\n\n```\n$ sudo docker search ubuntu\n```\n\nYou can\
    \ then download the image you want by specifying the name of the image with the\
    \ `docker pull` command.\n\n```\n$ sudo docker pull ubuntu\n```\n\nYou can view\
    \ all the images you’ve downloaded to your server by doing this:\n\n```\n$ sudo\
    \ docker images\nREPOSITORY        TAG           IMAGE ID          CREATED   \
    \      SIZE\nhello-world       latest        1815c82652c0       2 weeks ago  \
    \  1.84kB\nubuntu            latest        d355ed3537e9      12 days ago     119MB\n\
    ...\n$\n```\n\nAnd finally, you can run a container using the images you’ve downloaded\
    \ with the `docker run` command.\n\n```\n$ sudo docker run -it ubuntu\nsamalapati@bd78ccf18941:/#\n\
    ```\n\nThis will start a container running the Ubuntu OS. The `i` option stands\
    \ for interactive and the `t` option offers shell access into the container. Note\
    \ that the command prompt changes since you’re now inside the new Ubuntu container.\
    \ The container id is bd78ccf18941.\n\nNow that you have the basics of Docker\
    \ under your belt, it’s time to learn about how you can run Cassandra containers\
    \ on Docker."
  trans: "\n# 7. 在 Docker、Apache Spark 和 Cassandra 集群管理器上运行 Cassandra\n\n第 2 章和第 3\
    \ 章展示了如何在多个节点上创建一个通用的 Cassandra 集群。现在你已经对 Cassandra 的架构以及如何配置集群有了相当的了解，是时候学习如何在各种环境中编排\
    \ Cassandra 集群了。\n\n容器技术如今正风靡一时。本章首先向你展示如何使用 Docker 容器创建一个 Cassandra 集群。我会快速解释什么是\
    \ Docker 容器以及如何使用它们。然后，我将向你展示如何在 Docker 上安装和配置 Cassandra。\n\n在讨论完 Docker 上的 Cassandra\
    \ 之后，我将展示如何使用 Docker-Compose 和 BDD（行为驱动开发）创建一个 Cassandra 数据库。\n\nCassandra 集群管理器（CCM），顾名思义，并非\
    \ Cassandra 内部用来管理集群的工具。相反，它是一个便捷的工具，用于在单台服务器上设置多节点 Cassandra 集群。虽然 CCM 是用于开发和测试的，但了解如何使用此工具设置集群是很有益的。\n\
    \n最后，本章以对名为 SMACK（Apache Spark、Apache Mesos、Akka、Cassandra 和 Apache Kafka）的新兴技术栈的简要介绍作为结束，这是一套日益流行用于创建分布式企业应用程序的开源工具集。\n\
    \n## Cassandra 与 Docker\n\n在本节中，我将展示如何在 Docker 容器上运行 Cassandra 集群。容器是一个轻量级的、独立的、可执行的软件包，包含了运行软件所必需的一切，例如代码、运行时、系统工具、系统库和配置文件。\n\
    \n### Docker：快速入门\n\nDocker 是一个应用程序，它使你能够轻松地在容器中运行应用。容器类似于虚拟机（VM），但便携性更好。与在虚拟机管理程序中运行的\
    \ VM 不同，它直接在主机操作系统上运行。\n\n### 安装 Docker\n\n在本节中，我将展示如何在 Ubuntu 16.04 服务器上安装 Docker。\n\
    \n1.  Docker 是 Ubuntu 16.04 安装的一部分。然而，由于这可能不是最新版本，请从源下载，如下所示：\n\n    ```\n   \
    \ $ curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add\
    \ -\n    OK\n    $\n    ```\n\n2.  通过以下方式将 Docker 仓库添加到 APT 源中：\n\n    ```\n \
    \   $ sudo add-apt-repository \"deb [arch=amd64] https://download.docker.com/linux/ubuntu\
    \ $(lsb_release -cs) stable\"\n    $\n    ```\n\n3.  用你刚刚添加的新 Docker 软件包更新软件包数据库。\n\
    \n    ```\n    $ sudo apt-get update\n    ```\n\n4.  执行以下操作，确保你安装的是来自 Docker 仓库的\
    \ Docker CE（社区版），而不是默认的 Ubuntu 仓库：\n\n    ```\n    $ apt-cache policy docker-ce\n\
    \    docker-ce:\n    Installed: (none)\n    Candidate: 17.06.0~ce-0~ubuntu\n \
    \   Version table:\n    17.06.0~ce-0~ubuntu 500\n    500 https://download.docker.com/linux/ubuntu\
    \ xenial/stable amd64 Packages\n    ...\n    $\n    ```\n\n    输出验证了可用的 Docker\
    \ 安装文件是用于 Ubuntu-Xenial (16.04)的，所以你可以继续进行。你的`docker-ce`版本号可能与我的不同。\n5.  此时，你已准备好安装\
    \ Docker。\n\n    ```\n    $ sudo apt-get install -y docker-ce\n    Reading package\
    \ lists... Done\n    Building dependency tree\n    Reading state information...\
    \ Done\n    ...\n    Processing triggers for ureadahead (0.100.0-19) ...\n   \
    \ $\n    ```\n\n### 管理 Docker\n\n接下来，你可以通过`systemctl status docker`命令检查 Docker\
    \ 是否正在运行。\n\n```\n$ sudo systemctl status docker\n● docker.service - Docker Application\
    \ Container Engine\n   Loaded: loaded (/lib/systemd/system/docker.service; enabled;\
    \ vendor preset: e\n   Active: active (running) since Thu 2017-06-29 10:50:24\
    \ EDT; 5s ago\n     Docs: https://docs.docker.com\n Main PID: 6598 (dockerd)\n\
    \   CGroup: /system.slice/docker.service\n           ├─6598 /usr/bin/dockerd -H\
    \ fd://\n           └─6603 docker-containerd -l unix:///var/run/docker/libcontainerd/dock\n\
    ...\n$\n```\n\n输出表明 Docker 服务正在运行。\n\n### 使用 Docker 命令行实用程序\n\n你使用`docker`命令行实用程序来管理\
    \ Docker 实例。只需在命令行输入`docker`即可查看所有可用选项，数量相当多。\n\n例如，你可以通过以下方式查看关于 Docker 的系统级信息：\n\
    \n```\n$ sudo docker info\nContainers: 6\nRunning: 0\nPaused: 0\nStopped: 6\n\
    ...\nOperating System: Ubuntu 16.04.2 LTS\nOSType: linux\nArchitecture: x86_64\n\
    CPUs: 1\nTotal Memory: 7.796GiB\nName: ubuntu1\n...\n$\n```\n\n### 理解 Docker 镜像\n\
    \n所有 Docker 容器都从一个 Docker 镜像运行。默认情况下，Docker 从 Docker Hub 拉取其镜像，这是一个由 Docker 公司维护的公共\
    \ Docker 注册表。其他组织，包括 Linux 发行版，也在 Docker Hub 上托管他们的镜像。\n\n你可以运行以下命令来检查你的 Docker\
    \ 安装是否能够访问并从 Docker Hub 下载镜像：\n\n```\n$ sudo docker run hello-world\nHello from\
    \ Docker!\nThis message shows that your installation appears to be working correctly.\n\
    $\n```\n\n你可以使用`docker search`命令在 Docker Hub 上搜索镜像。如果你想查找所有可用的 Ubuntu 镜像，请输入：\n\
    \n```\n$ sudo docker search ubuntu\n```\n\n然后，你可以通过`docker pull`命令指定镜像名称来下载你想要的镜像。\n\
    \n```\n$ sudo docker pull ubuntu\n```\n\n你可以通过以下方式查看已下载到你服务器的所有镜像：\n\n```\n$ sudo\
    \ docker images\nREPOSITORY        TAG           IMAGE ID          CREATED   \
    \      SIZE\nhello-world       latest        1815c82652c0       2 weeks ago  \
    \  1.84kB\nubuntu            latest        d355ed3537e9      12 days ago     119MB\n\
    ...\n$\n```\n\n最后，你可以使用`docker run`命令，用你已下载的镜像运行一个容器。\n\n```\n$ sudo docker run\
    \ -it ubuntu\nsamalapati@bd78ccf18941:/#\n```\n\n这将启动一个运行 Ubuntu 操作系统的容器。`i`选项代表交互式，`t`选项提供进入容器的\
    \ Shell 访问权限。请注意，命令提示符发生了变化，因为你现在位于新的 Ubuntu 容器内部。容器 ID 是`bd78ccf18941`。\n\n现在你已经掌握了\
    \ Docker 的基础知识，是时候学习如何在 Docker 上运行 Cassandra 容器了。\n"
- fmt: '# Running a Cassandra Cluster on Docker


    Let’s create a three-node Cassandra cluster on Docker. Start the first Cassandra
    instance by having Docker pull the Cassandra 3.04 image from Docker Hub.


    ```bash

    $ sudo docker run --name cassandra1 -m 4g -d cassandra:3.0.4

    34842881b8d4b42a9cc6627405f6dd63a21cace23276091e869e8b708fb6ce4b

    $

    ```


    In this command,

    *   The `--name` option enables you to specify the name for this instance.

    *   The `-m` option lets you specify the memory for this instance.

    *   The `cassandra:3.0.4` clause tells Docker the version it should download for
    the Cassandra image.


    You next run the `docker ps` command to check if the Cassandra container instance
    `cassandra1` is running.


    ```bash

    $ sudo docker ps

    CONTAINER ID       IMAGE          COMMAND                 CREATED             STATUS             PORTS                                  NAMES

    34842881b8d4        cassandra:3.0.4     "/docker-entrypoin..."   8 seconds ago       Up
    7 seconds        7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp   cassandra1

    #

    ```


    You run the familiar `nodetool status` command to check the status of the Cassandra
    node `cassandra1`.


    ```bash

    $ nodetool status

    nodetool: command not found

    samalapati@ubuntu1:/tmp# sudo docker exec -i -t cassandra1 sh -c ''nodetool status''

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address     Load       Tokens       Owns (effective)  Host ID      Rack

    UN  172.17.0.2  102.52 KB  256     100.0%     f217c613-3eb9-445a-884a-183e8d177927  rack1

    root@ubuntu1:/tmp#

    ```


    Now that the first Cassandra node is running, it’s time to create a cluster by
    creating a second node, using the first node as the seed node. The second node
    and any other nodes you create will gossip to this node and register themselves.
    To do this, you need the IP of your first Cassandra node, `cassandra1`. You can
    get it by doing this:


    ```bash

    $ sudo docker inspect -f''{{.NetworkSettings.IPAddress}}'' cassandra1

    172.17.0.3

    $

    ```


    The command reveals that the IP address of the first node is `172.17.0.3`. Now
    you have everything you need to create the second Cassandra node, which you name
    `cassandra2`.


    ```bash

    # docker run --name cassandra2 -m 2g -d -e CASSANDRA_SEEDS="172.17.0.3" cassandra:3.0.4

    30ed76a87b3c0f2f63075559817a2f125fc250731c75416639e446aa9f0b7774

    #

    ```


    You finally add the third node to the Cassandra cluster, named `cassandra3`.


    ```bash

    # docker run --name cassandra3 -m 2g -d -e CASSANDRA_SEEDS="172.17.0.3" cassandra:3.0.4

    7528dc5679b02a59bb13f30ce0dc8c7617f0c268fd52256d8e2d9ea5faf0586a

    #

    ```


    The `CASSANDRA_SEEDS` environment variable is a comma-separated list of IP addresses
    that the gossip protocol uses to bootstrap the new Cassandra nodes you create
    when they join the cluster.


    Check the Docker processes to ensure that all three Cassandra containers are running.


    ```bash

    # sudo docker ps

    CONTAINER ID  IMAGE      COMMAND    CREATED     STATUS    PORTS       NAMES

    7528dc5679b0        cassandra:3.0.4     "/docker-entrypoin..."   5 seconds ago   Up
    4 seconds     7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp   cass3

    30ed76a87b3c     cassandra:3.0.4     "/docker-entrypoin..."   5 minutes ago       Up
    5 minutes        7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp       cass2

    34842881b8d4     cassandra:3.0.4     "/docker-entrypoin..."   8 minutes ago       Up
    8 minutes      7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp    cassandra1

    #

    ```


    A final `nodetool status` command shows that all three nodes of the Cassandra
    cluster are running.


    ```bash

    # sudo docker exec -i -t cassandra1 sh -c ''nodetool status''

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address     Load       Tokens       Owns (effective)  Host ID      Rack

    UN  172.17.0.3  101.89 KB  256          67.3%             968690b8-8dc4-4242-943f-b62d37e44084  rack1

    UN  172.17.0.2  107.45 KB  256          68.7%             f217c613-3eb9-445a-884a-183e8d177927  rack1

    UN  172.17.0.4  15.42 KB   256          64.0%             820f24f7-d931-4a9f-87e3-8abd72d8a9bb  rack1

    #

    ```


    Note that you can’t run the Cassandra utilities `nodetool`, `cqlsh`, or any other
    such commands in the main Linux server. Since Cassandra is running inside the
    Docker container, you can run these commands only in Docker. You must use the
    `docker exec` command to run commands inside a Docker container.


    #### Running cqlsh in the Docker-Based Cluster


    To run `cqlsh` from one of the three nodes in the Docker-based cluster, you need
    to “bash” into one of the nodes, say the node `cassandra1`, as shown here:


    ```bash

    $ sudo docker exec -it cassandra1 /bin/bash

    samalapati@34842881b8d4:/# cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.0.4 | CQL spec 3.4.0 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    The `docker exec` command enables you to run commands inside a Docker container.
    The previous command provides you a bash shell within the container `cassandra1`.


    Once you log into the node through the bash shell, run the `cqlsh` command as
    usual to get to the `cqlsh` prompt.


    Alternatively, you can specify the Docker `--link` option to connect to a Docker
    instance and log into `cqlsh` with the help of the `exec cqlsh <IPAddress>` option.


    ```bash

    # docker run -it --link cassandra1 --rm cassandra:3.0.4 \

    > sh -c ''exec cqlsh 172.17.0.2''

    Connected to Test Cluster at 172.17.0.2:9042.

    [cqlsh 5.0.1 | Cassandra 3.0.4 | CQL spec 3.4.0 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    # Setting Cassandra Environment Variables for Docker


    You can pass one of several environment variables that are available to you when
    you start a Cassandra image on Docker. More specifically, you pass these environment
    variables on the command line when you issue the `docker run` command. Each of
    these environment variables that you pass at the command line sets the value of
    a related variable in the `cassandra.yaml` file of the node.


    You learned how to specify the `CASSANDRA_SEEDS` environment variable in the previous
    section. In addition to that variable, there are several others. Here are the
    most useful:


    *   `CASSANDRA_LISTEN_ADDRESS`: Determines the IP address to listen for from incoming
    connections. If you choose the default value of `auto`, it sets the `listen_address`
    option in the `cassandra.yaml` file to the IP address of the container.

    *   `CASSANDRA_BROADCAST_ADDRESS`: This variable specifies the IP address the
    node advertises to the rest of the nodes in the cluster. This will set the value
    of the `broadcast_address` and the `broadcast_rpc_address` properties in the `cassandra.yaml`
    file.

    *   `CASSANDRA_ENDPOINT_SNITCH`: This property enables you to set the snitch implementation
    via setting the `endpoint_snitch` property in the `cassandra.yaml` file.

    *   `CASSANDRA_NUM_TOKENS`: This variable sets the number of tokens for this node
    by setting the `num_tokens` property.

    *   `CASSANDRA_DC`: Sets the name of the datacenter for this node by setting the
    value of the `dc` property. If you omit this variable, the name of the data center
    defaults to `datacenter1`.

    *   `CASSANDRA_RACK`: This variable sets the name of the rack by setting the value
    of the `rack` property. If you omit it, as I did here, the variable defaults to
    `rack1`.'
