    \ 键空间运行 `nodetool repair` 命令。\n    ```\n    $ nodetool repair system_auth\n  \
    \  ```\n\n6.  重启数据库。\n\n至此，你已经为数据库配置了身份验证，现在可以以 `cassandra/cassandra` 登录来执行与角色和权限相关的管理任务。\n\
    \n一旦按照上述步骤配置了身份验证，你必须始终指定超级用户的凭据。如果尝试像之前那样不带凭据登录，将会收到错误。\n\n```\n$ cqlsh 192.168.159.129\n\
    Connection error: ('Unable to connect to any servers', {'192.168.159.129': AuthenticationFailed('Remote\
    \ end requires authentication.',)})\n$\n```\n\n## 加速凭据认证过程\n\n在繁忙的数据库中，你可以通过配置\
    \ `cassandra.yaml` 文件中的以下两个选项来加速凭据认证过程：\n\n*   `credentials_validity_in_ms`\n\
    *   `credentials_update_interval_in_ms`\n\n这两个参数的默认值均为 2000 毫秒。你可以提高其中一个或两个参数的值，以减少频繁认证凭据请求的开销。\n\
    \n## 创建角色\n\n配置好身份验证后，就可以使用超级用户帐户创建角色了。这里我们使用默认的超级用户帐户 `cassandra` 来创建用户。\n\n\
    通过运行 `CREATE ROLE` 命令来创建角色。`CREATE ROLE` 命令的通用语法如下：\n\n```\n(CREATE | ALTER |\
    \ DROP ) role_name\n[WITH (LOGIN = true | SUPERUSER = true | password = 'password')];\n\
    ```\n\n以下是对关键角色属性的简要说明。默认情况下，数据库将 `SUPERUSER` 和 `LOGIN` 属性设置为 `false`，而 `password`\
    \ 属性默认为 `null`。\n\n*   `SUPERUSER`：可以执行所有 CQL 命令。如果将此属性设置为 `true`，则该角色将被授予对所有角色的\
    \ `AUTHORIZE`、`CREATE` 和 `DROP` 权限。\n*   `LOGIN`：如果设置，数据库允许此角色使用密码登录以运行 CQL 语句。你需要设置此属性以为\
    \ `PasswordAuthenticator` 后端或内部身份验证创建登录帐户。\n*   `PASSWORD`：表示你设置的密码。Cassandra\
    \ 的内部身份验证需要密码。你必须用单引号将密码括起来。\n\n你可以创建角色来定义一组权限，然后将这些权限分配给其他角色并映射到外部用户。角色还使你能够为内部身份验证创建登录帐户。使用内部身份验证时的最佳实践是为分配权限和登录帐户创建单独的角色。\n\
    \n以下是创建角色的步骤。\n\n1.  以超级用户 `cassandra` 身份登录 `cqlsh`。\n    ```\n    $ cqlsh 192.168.159.129\
    \ -u cassandra -p cassandra\n    Connected to Test Cluster at 192.168.159.129:9042.\n\
    \    [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\n  \
    \  Use HELP for help.\n    ```\n\n2.  执行 `CREATE ROLE <rolename> WITH PASSWORD\
    \ <password>` 命令，如下所示：\n    ```\n    cassandra@cqlsh> create user 'test' with\
    \ password 'test123';\n    ```\n    `list roles` 命令显示数据库中的所有角色。它还显示哪些角色拥有超级用户权限。例如：\n\
    \    ```\n    cassandra@cqlsh> list roles;\n    name      | super\n    -----------+-------\n\
    \    cassandra |  True\n    test | False\n    (2 rows)\n    cassandra@cqlsh>\n\
    \    ```\n    在此情况下，默认角色 `cassandra` 的超级用户列值为 `True`，而新角色 `test` 的超级用户列设置为 `False`。因此，一切正常。\n\
    \n默认情况下，`CREATE ROLE` 语句中的 `LOGIN` 属性值为 `False`。当你创建登录角色时，必须将此属性设置为 `True`。\n\n\
    你可以通过查询 `system_auth.roles` 表来查看数据库中的角色，如下所示：\n"
- fmt: "# Cassandra 角色与权限管理\n\n```\ncassandra@cqlsh> select * from system_auth.roles;\n\
    role          | can_login | is_superuser | member_of         | salted_hash\n---------------+-----------+--------------+-------------------+\n\
    cassadnra1 |      True |         True |              null | $2a$10$.b52eNZqZdouserevzYgpuecaxpdmc/QRdIoUIeG73a6UDEsBIdae\n\
    manager |      True |        False | {'cycling_admin'} | $2a$10$vkujDzBblNqLUSGLdhW26OIW/ias9Vh6JA3sU4pq9uXES30cK735.\n\
    test |      True |        False |              null | $2a$10$ukMpmnzdHn8xy/7krucrdeYtblF8XHmVTvv1qKldVrGLxvLTWBxaC\n\
    test1 |      True |        False |              null | $2a$10$3CQTIi09zOOT5v2SaCxH9ekE8ZTaAGZSG6owkziZIT3ylzMDMCrhW\n\
    cassandra |      True |         True |              null | $2a$10$nRxFfMOAqxVQYkFQmEMIZ.B1.9.opcND/8.LtwyqZLgJY91eiS3Zm\n\
    cycling_admin |     False |        False |              null |   null\n(6 rows)\n\
    cassandra@cqlsh>\n```\n\n`system_auth.roles` 表存储与角色相关的信息，例如角色名称、该角色是否是超级用户，以及是否可以使用该角色登录数据库。除了此表，Cassandra\
    \ 还将角色相关信息存储在以下表中：\n\n*   `system_auth.role_members`：存储角色和角色成员。\n*   `system_auth.role_permissions`：存储角色、资源以及角色访问该资源的权限。\n\
    *   `system_auth.resource_role_permissons_index`：存储角色以及授予这些角色的权限。\n\n## 修改密码\n\
    \n您可以使用 `ALTER ROLE` 命令修改角色的密码：\n\n```\ncassandra@cqlsh> alter role 'newsuper'\
    \ with password 'newsuper2';\n```\n\n## 删除角色\n\n您可以使用 `DROP ROLE` 命令删除角色：\n\n\
    ```\ncassandra@cqlsh> drop role test;\n```\n\n## 处理超级用户账户\n\n除了默认的超级用户账户 `cassandra`，您还可以在创建用户时通过指定\
    \ `superuser` 选项来创建额外的超级用户账户，如下所示：\n\n```\ncassandra@cqlsh> create role 'newsuper'\
    \ with password 'newsuper1'\n... superuser;\ncassandra@cqlsh> list roles;\nname\
    \      | super\n-----------+-------\ncassandra |  True\nnewsuper |  True\ntest\
    \ | False\n(3 rows)\ncassandra@cqlsh>\n```\n\n处理默认超级用户账户 `cassandra` 的最佳实践是创建一个自定义管理员账户，之后不再使用默认的\
    \ `cassandra` 账户。创建一个具有 `superuser` 选项的用户。由于默认情况下超级用户只能管理角色，因此请使用以下命令授予该用户对所有密钥空间的访问权限：\n\
    \n```\ncqlsh> grant all permissions on all keyspaces to newsuper;\n```\n\n## 配置授权：授予资源权限\n\
    \n配置认证将限制对集群的访问。配置授权是您控制对各种数据库对象（如密钥空间和表）访问的方式。您可以执行 `GRANT` 命令，将角色在数据库资源（如密钥空间、表或函数）上的权限授予该角色。\n\
    \n让我们学习如何向登录角色授予权限，首先授予对象（如密钥空间和表）上的特定权限。之后，我将展示如何向角色授予权限，这使您能够实现基于角色的访问控制（RBAC）系统。\n\
    \n> 注意\n>\n> 默认情况下，Cassandra 不会强制执行任何限制用户执行数据库操作的能力。\n\n在以下示例中，您首先尝试将密钥空间上的 `SELECT`\
    \ 权限授予一个角色：\n\n```\ncassandra@cqlsh> grant select permission on keyspace \"cycling\"\
    \ to 'test';\nServerError: java.lang.UnsupportedOperationException: GRANT operation\
    \ is not supported by AllowAllAuthorizer\ncassandra@cqlsh>\n```\n\n这个 `GRANT`\
    \ 命令失败是因为默认的授权器（恰好是 `AllowAllAuthorizer`）不支持 `GRANT` 操作。在 `cassandra.yaml` 文件中，您会看到以下内容：\n\
    \n```\nauthorizer: AllowAllAuthorizer\n```\n\n`AllowAllAuthorizer` 是 Cassandra\
    \ 的默认授权后端，它控制访问并提供权限。使用此默认授权后端将禁用授权，这意味着 Cassandra 允许任何用户在数据库中执行任何操作。\n\n`CassandraAuthorizer`\
    \ 是替代的授权后端。它将所有权限存储在 `system_auth.permissions` 表中。要配置授权，请编辑 `cassandra.yaml` 文件并指定\
    \ `CassandraAuthorizer` 作为授权器，如下所示：\n\n```\nauthorizer: org.apache.cassandra.auth.CassandraAuthorizer\n\
    ```\n\n如上所示设置授权器将在数据库中强制执行授权。数据库现在将根据登录数据库的角色来限制访问。一旦您正确配置了 `authorizer` 属性，就可以成功发出\
    \ `GRANT` 命令。\n\n```\ncassandra@cqlsh> grant select permission on keyspace \"\
    cycling\" to 'test';\n```\n\n由于丢失对 `system_auth.permissions` 表的访问权限将拒绝所有对集群的访问，请确保您有系统密钥空间的多个副本。如果您有多个数据中心，请将复制类设置为\
    \ `NetworkTopologyStrategy`。\n\n您可以向角色授予以下广泛的权限类型：\n\n*   `SELECT`：允许角色使用 CQL\
    \ 命令 `SELECT` 读取数据。\n*   `MODIFY`：允许角色使用 CQL 命令 `INSERT`、`UPDATE`、`DELETE` 和 `TRUNCATE`\
    \ 添加、修改和删除数据。\n*   `CREATE`：授予使用命令 `CREATE KEYSPACE` 和 `CREATE TABLE` 创建密钥空间和表的能力。\n\
    *   `ALTER`：授予使用以下命令修改密钥空间和表的能力：\n    *   `ALTER KEYSPACE`\n    *   `ALTER TABLE`\n\
    *   `DESCRIBE`：提供有关对象的信息。\n*   `DROP`：使您能够从数据库中删除对象。\n*   `EXECUTE`：使用任何函数，以及在\
    \ `CREATE AGGREGATE` 语句中的任何函数中执行 `SELECT`、`INSERT` 和 `UPDATE` 权限。\n*   `AUTHORIZE`：启用对密钥空间、表、函数和角色的权限授予和撤销。\n\
    *   `ALL PERMISSIONS`：启用对表的所有类型的查询。\n\n以下是您可以发出 `GRANT` 命令将各种权限直接分配给角色的示例。\n\n\
    您可以授予角色 `sam` 在所有密钥空间的所有表上执行 `SELECT` 操作的权限，如下所示：\n\n```\ncqlsh> grant select\
    \ on all keyspaces to 'sam';\n```\n\n您可以授予角色 `sam` 在 `CYCLING` 密钥空间的所有表上执行修改（`INSERT`、`UPDATE`、`TRUNCATE`\
    \ 和 `DELETE`）的权限，如下所示：\n\n```\ncqlsh> grant modify on keyspace cycling to 'sam';\n\
    ```\n\n您可以授予角色 `sam` `ALTER KEYSPACE` 权限，如下所示：\n\n```\ncqlsh> grant alter keyspace\
    \ on cycling to 'sam';\n```\n\n`ALTER KEYSPACE` 权限使角色 `sam` 能够在 `CYCLING` 密钥空间及其表和索引上执行以下操作：\n\
    \n*   `ALTER KEYSPACE`\n*   `ALTER TABLE`\n*   `CREATE INDEX`\n*   `DROP INDEX`\n\
    \n`ALL PERMISSIONS` 权限使用户能够在表上运行所有类型的查询：\n\n```\ncqlsh> grant all permissions\
    \ on cycling.cyclists to sam;\n```\n\n## Cassandra 的访问控制矩阵\n\nCassandra 为访问控制采用分层继承系统，您授予层次结构中较高资源的权限会自动级联到层次结构中较低的资源。\n\
    \n例如，\n\n*   如果您在 `ALL KEYSPACES` 上授予权限，它会级联到这些密钥空间中的所有表。\n*   如果您在 `ALL FUNCTIONS`\
    \ 上授予权限，它会级联到所有用户定义函数和聚合。"
  raw: "```\ncassandra@cqlsh> select * from system_auth.roles;\nrole          | can_login\
    \ | is_superuser | member_of         | salted_hash\n---------------+-----------+--------------+-------------------+\n\
    cassadnra1 |      True |         True |              null | $2a$10$.b52eNZqZdouserevzYgpuecaxpdmc/QRdIoUIeG73a6UDEsBIdae\n\
    manager |      True |        False | {'cycling_admin'} | $2a$10$vkujDzBblNqLUSGLdhW26OIW/ias9Vh6JA3sU4pq9uXES30cK735.\n\
    test |      True |        False |              null | $2a$10$ukMpmnzdHn8xy/7krucrdeYtblF8XHmVTvv1qKldVrGLxvLTWBxaC\n\
    test1 |      True |        False |              null | $2a$10$3CQTIi09zOOT5v2SaCxH9ekE8ZTaAGZSG6owkziZIT3ylzMDMCrhW\n\
    cassandra |      True |         True |              null | $2a$10$nRxFfMOAqxVQYkFQmEMIZ.B1.9.opcND/8.LtwyqZLgJY91eiS3Zm\n\
    cycling_admin |     False |        False |              null |   null\n(6 rows)\n\
    cassandra@cqlsh>\n```\n\nThe `system_auth.`  `roles`  table\nstores role-related\
    \ information such as the role names, whether the role\nis a superuser, and whether\
    \ you can use the role for logging into the\ndatabase. In addition to this table,\
    \ Cassandra stores role-related\ninformation in the following tables:\n\n*   `system_auth.role_members`:\n\
    \    Stores roles and role members.\n\n*   `system_auth.role_permissions`:\n \
    \   Stores the role, the resource, and the permissions that the role has to\n\
    \    access the resource\n\n*   `system_auth.resource_role_permissons_index`\n\
    \    : Stores the roles and the\n    permissions granted to the roles\n\nChanging\
    \ a Password\n\nYou can modify the password for a role with the `ALTER ROLE` command:\n\
    \n```\ncassandra@cqlsh> alter role 'newsuper' with password 'newsuper2';\n```\n\
    \nDropping a Role\n\nYou can drop a role with the `DROP ROLE` command:\n\n```\n\
    cassandra@cqlsh> drop role test;\n```\n\nHandling the Superuser Account\n\nBesides\
    \ the default superuser account \ncassandra, you can create\nadditional superuser\
    \ accounts by specifying the `superuser` option when\nyou create the user, as\
    \ shown here:\n\n```\ncassandra@cqlsh> create role 'newsuper' with password 'newsuper1'\n\
    ... superuser;\ncassandra@cqlsh> list roles;\nname      | super\n-----------+-------\n\
    cassandra |  True\nnewsuper |  True\ntest | False\n(3 rows)\ncassandra@cqlsh>\n\
    ```\n\nThe best practice\n concerning handling of the default superuser account\
    \ cassandra is to create a custom\nadministrator account and not use the default\
    \ cassandra account after that. Create a\nuser with with the superuser option.\
    \ Since a superuser can only manage\nroles by default, grant access to all keyspaces\
    \ to that user with the\nfollowing command:\n\n```\ncqlsh> grant all permissions\
    \ on all keyspaces to newsuper;\n```\n\nConfiguring Authorization: Granting Privileges\
    \ on\nResources\n\nConfiguring\nauthentication  will limit access to the cluster.\
    \ Configuring\nauthorization is how you control access to various database objects\
    \ such\nas keyspaces and tables. You can execute the `GRANT` command to\ngrant\
    \ a role privileges on a database resource such as a keyspace,\ntable, or a function.\n\
    \nLet’s learn how to grant privileges to login roles, starting with the\ngranting\
    \ of specific privileges on objects such as keyspaces and tables.\nLater, I show\
    \ how to grant the privileges to roles, which enables you to\nimplement a role-backed\
    \ access control (RBAC) system.\n\nNote\n\nBy default, Cassandra doesn’t enforce\
    \ any restrictions on a user’s\nability to perform operations in the database.\n\
    \nIn the following example, you first try to grant the `SELECT` permission on\n\
    a keyspace to a role:\n\n```\ncassandra@cqlsh> grant select permission on keyspace\
    \ \"cycling\" to 'test';\nServerError: java.lang.UnsupportedOperationException:\
    \ GRANT operation is not supported by AllowAllAuthorizer\ncassandra@cqlsh>\n```\n\
    \nThis `GRANT`\ncommand fails because the default authorizer, which happens to\
    \ be `AllowAllAuthorizer,`\ndoesn’t support the `GRANT` operation. In\nthe `cassandra.yaml`\
    \ file,\nyou see the following:\n\n```\nauthorizer: AllowAllAuthorizer\n```\n\n\
    `AllowAuthorizer`\nis Cassandra’s default authorization backend and it controls\
    \ access and\nprovides permissions. Using this default authorization backend will\n\
    disable authorization, meaning Cassandra allows any user to perform any\naction\
    \ in the database.\n\n`CassandraAuthorizer`\n   is the\nalternative authorization\
    \ backend. This one stores all permissions in\nthe `system_auth.permissions`\n\
    table. To configure authorization, edit the `cassandra.yaml` file\nand specify\
    \ `CassandraAuthorizer`\nas the authorizer, as shown here:\n\n```\n-authorizer:\
    \ org.apache.cassandra.auth.CassandraAuthorizer\n```\n\nThe setting of the authorizer\
    \ as shown here enforces authorization in\nthe database. The database will now\
    \ restrict access based on which role\nlogs into the database. Once you configure\
    \ the authorizer property\ncorrectly, you can successfully issue the `GRANT` command.\n\
    \n```\ncassandra@cqlsh> grant select permission on keyspace \"cycling\" to 'test';\n\
    ```\n\nSince the loss of access to the `system_auth.permissions`\ntable will deny\
    \ all access to the cluster, ensure that you have several\nreplicas of the system\
    \ keyspace. If you have multiple datacenters, set\nthe replication class to NetworkTopologyStrategy.\n\
    \nYou can grant the following broad types of privileges to a role:\n\n*   `SELECT`:\
    \ Allows\n    a role to read data with the CQL command `SELECT`.\n\n*   `MODIFY`:\
    \ Allows\n    a role to add, modify, and remove data with the CQL commands `INSERT,\
    \ UPDATE, DELETE,` and `TRUNCATE.`\n\n*   `CREATE`: Grants\n    the ability to\
    \ create keyspaces and tables with the commands `CREATE KEYSPACE,` and\n    `CREATE\
    \ TABLE.`\n\n*   `ALTER`: Grants\n    the ability to modify keyspaces and tables\
    \ with the following commands:\n\n*   `ALTER KEYSPACE`\n\n*   `ALTER TABLE`\n\n\
    *   `DESCRIBE:`\n    Provides information about objects.\n\n*   `DROP:` Enables\n\
    \    you to remove objects from the database.\n\n*   `EXECUTE: SELECT, INSERT,`\
    \ and `UPDATE` privileges\n    using any function, and in any function in a `CREATE\
    \ AGGREGATE`\n    statement.\n\n*   `AUTHORIZE:`\n    Enables the granting and\
    \ revoking of permissions on keyspaces, tables,\n    functions, and roles.\n\n\
    *   `ALL PERMISSIONS:` Enables all types of queries on a table.\n\nThe following\
    \ are examples of how you can issue the `GRANT` command to\nassign various privileges\
    \  directly to\na role.\n\nYou can grant the role sam\nprivileges to perform `SELECT`\
    \ operation on\nall tables in all keyspaces as follows:\n\n```\ncqlsh> grant select\
    \ on all keyspaces to 'sam';\n```\n\nYou can grant the role sam\nprivileges to\
    \ perform modifications (`INSERT, UPDATE, TRUNCATE`, and `DELETE`) on all tables\n\
    in the CYCLING keyspace as follows:\n\n```\ncqlsh> grant modify on keyspace cycling\
    \ to 'sam';\n```\n\nYou can grant the role sam the\n`ALTER KEYSPACE`\nprivilege,\
    \ as shown here:\n\n```\ncqlsh> grant alter keyspace on cycling to 'sam';\n```\n\
    \nThe  `ALTER KEYSPACE`\nprivilege  enables the role sam to perform the following\n\
    operations on the CYCLING keyspace and its tables and indexes:\n\n*   `ALTER KEYSPACE`\n\
    \n*   `ALTER TABLE`\n\n*   `CREATE INDEX`\n\n*   `DROP INDEX`\n\nThe `ALL PERMISSIONS`\
    \ privilege enables a user to run all types of queries\non a table:\n\n```\nCqlsh>\
    \ grant all permissions on cycling.cyclists to sam;\n```\n\nCassandra’s Access\
    \ Control\nMatrix\n\nCassandra employs a hierarchical inheritance system for access\
    \ control,\nwhere the privileges you grant to a resource that’s higher in the\n\
    hierarchy automatically cascade to resources lower in the hierarchy.\n\nFor example,\n\
    \n*   If you grant a privilege on `ALL KEYSPACES`, it\n    cascades to all tables\
    \ in those keyspaces.\n\n*   If you grant a privilege on `ALL FUNCTIONS`, it\n\
    \    cascades to all user-defined functions and aggregates."
