  trans: '

    ## Gossip 协议及其对节点通信的帮助


    Cassandra 使用 **gossip** 协议，节点通过该协议交换自身及其所知其他节点的状态信息，以发现集群中所有节点的位置和状态信息。Gossip
    协议假设网络功能并非完美，这在分布式网络系统中很常见，并用于分布式数据库中的数据复制。


    与人类八卦类似，集群中的对等方（节点）会选择它们希望与之交换信息的节点。`Gossiper` 类维护着一个存活节点列表，从而使 gossip 有助于故障检测。


    Gossip 进程频繁运行（每秒一次），将一个节点的状态消息与最多三个其他节点的状态消息进行交换。当节点启动时，它会向 gossiper 注册，以接收来自集群中其他节点的端点状态信息，如下所示：


    ```

    INFO  [main] 2017-06-24 12:19:21,997 MessagingService.java:733 - Starting Messaging
    Service on ubuntu/192.168.159.130:7000 (ens33)

    INFO  [HANDSHAKE-/192.168.159.129] 2017-06-24 12:19:22,199 OutboundTcpConnection.java:510
    - Handshaking version with /192.168.159.129

    INFO  [GossipStage:1] 2017-06-24 12:19:22,326 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [RequestResponseStage-1] 2017-06-24 12:19:22,380 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    INFO  [main] 2017-06-24 12:19:23,202 StorageService.java:705 - Loading persisted
    ring state

    INFO  [main] 2017-06-24 12:19:23,218 StorageService.java:818 - Starting up server
    gossip

    INFO  [GossipStage:1] 2017-06-24 12:19:24,596 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [RequestResponseStage-1] 2017-06-24 12:19:24,601 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    INFO  [main] 2017-06-24 12:19:31,610 CassandraDaemon.java:725 - No gossip backlog;
    proceeding

    ```


    而当节点无法获取 gossip 信息时，它也会通过抛出异常让你知道：


    ```

    INFO  [main] 2017-06-24 12:06:00,302 MessagingService.java:733 - Starting Messaging
    Service on

    ERROR [main] 2017-06-24 12:06:31,476 CassandraDaemon.java:752 - Exception encountered
    during startup

    java.lang.RuntimeException: Unable to gossip with any seeds

    WARN  [StorageServiceShutdownHook] 2017-06-24 12:06:31,564 Gossiper.java:1514
    - No local state, state is in silent shutdown, or node hasn''t joined, not announcing
    shutdown

    ```


    Gossip 进程可以是直接的（其他节点向一个节点 gossip），也可以是间接的（节点从其他节点获取信息，而这些信息可能源自更多其他节点）。由于每个节点不仅交换自身状态信息，也交换与之通信的其他节点的状态信息，因此所有节点都将非常迅速地知晓集群中所有其他节点的状态。


    当节点相互交换 gossip 信息时，节点的最新状态会覆盖旧的状态信息。


    当 gossiper 发现某个端点没有响应时，它会将该端点在其列表中标记为死亡并记录该信息。


    Cassandra 使用一种称为 **Phi Accrual Failure Detection** 的复杂算法来检测节点故障。该算法不使用简单的节点心跳来表明其存活，而是使用一个**怀疑级别**来确定节点可用性。


    心跳提供一个简单的“是/否”标准来判断节点是否存活，而故障检测则使用一个连续的数据范围来做出判断。例如，如果一个节点偶尔因为网络波动而无法接受连接，该节点不会立即被列入死亡节点列表。因此，该算法与现实网络条件相符，并能真实反映节点的健康状况。使用此算法，数据库在节点故障发生后
    10 秒内即可检测到。


    ### 配置 Gossip 设置


    实际上，你不需要做任何特别设置来配置 gossip，因为在集群中启动 Cassandra 节点时，所有必要的属性都已设置好。启动节点时，你需要配置以下属性，它们都有助于节点了解应该联系哪些节点以获取其他节点的
    gossip 信息。这些属性还设置了端口和其他相关的 IP 地址或主机名，以使 Cassandra 能够将节点相互连接。


    *   `cluster_name`: 节点所属集群的名称。

    *   `listen_address`: Cassandra 必须绑定的 IP 地址/主机名，以便将此节点连接到集群中的其他节点。或者，你可以指定 `listen_interface`
    属性来替代 `listen_address`。


    **提示**


    每个数据中心指定多个种子节点，这样在引导节点时，gossip 就不必与不同数据中心的节点通信。


    *   `seed_provider`: 此属性允许你指定一个主机（IP 地址）列表，gossip 依靠它们来了解环的拓扑结构。你不需要将所有节点都指定为种子节点，因为这会降低
    gossip 性能。DataStax 建议使用少量种子，例如每个数据中心三个节点。你应该为集群中的所有节点指定相同的节点列表。如果你的集群有多个数据中心，请包含来自每个数据中心的至少一个节点作为种子提供者。

    *   `storage_port`: 这是节点间通信端口，它在集群中的所有节点上必须相同。


    ### 种子节点与 Gossip


    在第 3 章中，你了解了在 `cassandra.yaml` 文件中指定的种子节点。种子节点其实并不那么关键，因为它们的故障不会构成集群的单点故障。它们扮演的唯一角色是为新加入集群的节点引导
    gossip 进程。


    你必须确保为集群的所有节点指定一组相同的种子节点。这一点在首次启动节点时尤为重要。


    不建议将每个节点都设为种子节点；这只会对 gossip 性能产生不利影响。理想情况下，你的种子列表应该很小，每个数据中心大约三个节点。如果你有多个数据中心，请在种子列表中包含来自每个数据中心的至少一个节点。


    如果你每个数据中心包含两到三个 gossip 种子节点，而不是只指定一个种子节点，这可以保护你免受单个节点故障的影响。否则，当单个种子节点发生故障时，在引导节点过程中，gossip
    将需要与不同的数据中心进行通信。

    '
- fmt: '# Failure Detection and Recovery


    Cassandra determines the status of a node (up/down) from the gossip state and
    does its best to avoid sending client requests to nodes that are unreachable.


    Cassandra uses an accrual detection mechanism to determine the threshold for marking
    a node as failed. This threshold considers network performance, workload, and
    historical data to help calculate the critical threshold for node unavailability.


    All nodes use a failure detection mechanism to detect the failure of the rest
    of the nodes in the cluster. Nodes use the latency of the gossip messages by using
    a sliding window on the arrival times of gossip messages from other nodes.


    You can configure the failure detection mechanism by adjusting the `phi_convict_threshold`
    property in the `cassandra.yaml` file. The default value for this property is
    8. If you set this property’s value at a high number, it’s possible the cluster
    will miss transient failures. A lower value, on the other hand, increases the
    odds of marking an unresponsive node as a down node.


    Amazon EC2 experiences frequent network congestion issues. In this and other environments
    where you may experience unusable networks, you can raise the value of the `phi_convict_threshold`
    property to 10 or 12 to avoid misleading failure detection. In general, according
    to DataStax, a range of values between 5 and 12 is good enough in most cases.


    Intermittent node failures such as those caused by network outages are transient
    and don’t result in the removal of the node from the ring. The rest of the nodes
    will periodically try to contact the unreachable node.


    When an unreachable node comes back online, Cassandra uses repair mechanisms such
    as hinted handoffs and manual repair to ensure that the node catches up with the
    missed writes for the replica data it maintains.


    ## Repairing a Node


    Cassandra is a distributed database and over time the data in one of the replicas
    can diverge from that of the other replicas. Node repair is a process that corrects
    the inconsistencies among the replicas so eventually all nodes will have identical
    data. As an administrator, node repair is one of your key responsibilities and
    is something that you’ll perform on a regular basis.


    Cassandra offers three types of repairs, some of which involve your manual intervention:


    *   Hinted handoff

    *   Read repair

    *   Anti-entropy repair


    The following sections briefly explain the various types of repair.


    ### Hinted Handoff


    Hinted handoff is a process where a node that’s acting as the coordinator for
    a write that it was unable to perform on a different node saves the data as a
    set of hints . When the unreachable node becomes available later, the coordinator
    node hands off the stored hints to help the other node catch up with the missed
    writes.


    A hint contains data about the write request that was sent to the node that was
    unavailable at that time. A hint is like a wrapper around the change operation
    that tells the database that it needs to replay the data to the node that was
    unavailable at the time of the write.


    The database creates a separate hint for each partition to which it must write
    data. Once the coordinator node finds from gossip that the failed node is back
    up again, it hands off the hint to the revived node to write the missed data.
    Hints thus help the time it takes for a failed node to become consistent when
    it comes back up.


    The idea behind hinted tradeoff is to enable a cluster to operate normally by
    enabling it to perform its normal amount of writes even when one or more nodes
    are unavailable. Thus, this feature directly contributes to Cassandra’s vaunted
    high availability. Hints allow Cassandra to offer full write availability when
    consistency isn’t a requirement. They also enhance response consistency after
    temporary outages such as a network failure.


    You can disable hinted handoff to avoid a situation where a node may be down for
    long. This will keep the database from having to send a flood of hints to the
    failed node when it comes back online.


    A hint doesn’t count towards a write when satisfying the consistency level. However,
    the consistency level `ANY` accepts a hint as a something that satisfies the requirements
    for a read operation. Even if the database were to write just a hint, the write
    would be successful.


    #### What a Hint Is


    Cassandra stresses all hints on the local hints directory on each node. Besides
    the data itself, each hint consists of a few identifying attributes for the hint.
    Here’s what a hint consists of:


    *   The ID of the down or unavailable node

    *   A hint ID, which is a time UUID for the data

    *   A message ID with the Cassandra version

    *   The data in the form of a blob


    The database flushes all hints to disk every 10 seconds to keep the hints fresh.
    Once the down node comes back up, Cassandra writes all data to the node and deletes
    the hint file after that.


    When Cassandra attempts to write to a replica node that it knows is down or is
    not responding to a write request, the coordinator node stores a hint on the node
    where it’s running, in the `system.hints` table. When the gossip mechanism lets
    the coordinator node know that the failed node is back, the coordinator node sends
    the data rows corresponding to each of the hints to the revived node.


    For brief outages, the coordinator node checks every ten minutes for any writes
    that may have been missed due to an intermittent failure and that weren’t caught
    by failure detector via gossip.


    #### How Hinted Handoff Works


    For hinted handoff to work, first you must enable it. Since the default value
    for the `hinted_handoff_enabled` property in the `cassandra.yaml` file is `true`,
    you don’t need to do anything, unless you disabled this feature earlier for some
    reason.


    You can also enable hinted handoff on a per datacenter basis by passing the list
    of datacenters , as shown here:


    ```

    hinted_handoff_enabled: DC1, DC3

    ```


    You can specify a list of datacenters that won’t perform hinted handoff; that
    is, disable the feature in some of the datacenters in a cluster by passing the
    list of the blacked-out datacenters as values to the `hinted_handoff_disabled_datacenters`
    property, as shown here:


    ```

    hinted_handoff_disabled_datacenters: - DC1 - DC2

    ```


    #### Managing a Hinted Handoff


    By default, the database stores the hints in a directory named `hints` in the
    following location:


    ```

    $CASSANDRA_HOME/data/hints

    ```


    You can set a different location for the `hints` directory by setting the `hints_directory`
    property.


    You can configure the maximum size of a single hints file (in megabytes) by setting
    the `max_hints_file_size_in_mb` property (default is 128MB). You can have the
    database compress the hints file by setting the `hints_compression` parameter,
    which defaults to LZ4Compressor. Besides LZ, the database also supports the Snappy
    and Deflate compression algorithms as compressors for a hints file.


    #### Checking the Status of a Hinted Handoff


    You can find out the status of hinted handoff by issuing the `nodetool` `statushandoff`
    command :


    ```

    $ nodetool  statushandoff

    ```


    The options included the hostname, port number, and password. Here’s an example:


    ```

    $ nodetool statushandoff

    Hinted handoff is running

    $

    ```


    #### Removing All Hints


    You can remove all hints on the local node, or for one or more endpoints, by using
    the `nodetool` `truncatehints` command :


    ```

    $ nodetool  truncatehints --  ...

    ```


    The `endpoints` options enable you to specify one or more IP addresses or host
    names where you want to delete the hints.'
