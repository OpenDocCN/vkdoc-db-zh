- fmt: "# Cassandra Collections and User-Defined Functions\n\n## Collections\n\n###\
    \ Creating the List Type\n\nUse the `list` data type when handling columns that\
    \ have a many-to-many relationship with another column. In the following example,\
    \ the column `events` is a list that stores all races during each month:\n\n```sql\n\
    cqlsh> CREATE TABLE cycling.upcoming_calendar ( year int,\nmonth int, events list,\n\
    PRIMARY KEY ( year, month ));\n```\n\nYou can query the table for a list of events\
    \ in a month and year.\n\n```sql\ncqlsh:cycling> SELECT * FROM cycling.upcoming_calendar\
    \ WHERE year=2015 AND month=06;\nyear | month | events\n------+-------+---------------------------------------------\n\
    2015 |     6 | ['Criterium du Dauphine', 'Tour de Suisse']\n(1 rows)\ncqlsh:cycling>\n\
    ```\n\nThe maximum size of an item in a `list` collection type is 2GB.\n\n###\
    \ Creating the Map Type\n\nThe following example shows how to create a table with\
    \ a `map` type. The column `teams` has the `map` type, with each team showing\
    \ the year and the name of the team a cyclist belonged to during that year.\n\n\
    ```sql\ncqlsh> CREATE TABLE cycling.cyclist_teams ( id UUID PRIMARY KEY, lastname\
    \ text,\nfirstname text, teams map );\n```\n\nYou can query the table as shown\
    \ here:\n\n```sql\ncqlsh> SELECT lastname, firstname, teams\nFROM cycling.cyclist_teams;\n\
    ```\n\nThis query shows you all the teams associated with a cyclist for a specific\
    \ year.\n\n### Specifying Frozen Values in Collections\n\nYou can denote a type\
    \ as `frozen` to serialize multiple components into a single value. You can’t\
    \ update individual fields in a frozen type (Cassandra considers the values together\
    \ as a `blob`).\n\nHere’s an example:\n\n```sql\ncqlsh> CREATE TABLE mykeyspace.users\
    \ (\nid uuid PRIMARY KEY,\nname frozen ,\ndirect_reports set>,    // a collection\
    \ set\naddresses map>     // a collection map\nscore set>>              // a set\
    \ with a nested frozen set\n);\n```\n\n## Tuples\n\nYou can use the `tuple` data\
    \ type to store multiple values together in a column. Here’s an example that shows\
    \ how to create a table with the `tuple` data type for one of the columns:\n\n\
    ```sql\ncqlsh> CREATE TABLE cycling.nation_rank (nation text PRIMARY KEY, info\n\
    tuple);\n```\n\nThe following query retrieves data from the `nation_rank` table:\n\
    \n```sql\ncqlsh> SELECT * FROM cycling.nation_rank;\n```\n\n## User-Defined Types\n\
    \nYou can attach multiple named and typed data fields to the same column by defining\
    \ your own data types, called user-defined types. You can specify any valid data\
    \ type, including collections or even other UDTs, as fields for an UDT.\n\nThe\
    \ following example shows how to create a simple UDT named `cyclist.fullname`:\n\
    \n```sql\ncqlsh> CREATE TYPE cycling.fullname (firstname text, lastname text);\n\
    ```\n\nYou can then create the following table that uses the new type `cycling.fullname`:\n\
    \n```sql\ncqlsh> CREATE TABLE cycling.race_winners\n(race_name text, race_position\
    \ int, cyclist_name FROZEN,\nPRIMARY KEY (race_name, race_position));\n```\n\n\
    After inserting data into the table , you can run the following query:\n\n```sql\n\
    cqlsh:cycling> SELECT * FROM cycling.race_winners\nWHERE race_name = 'National\
    \ Championships South Africa WJ-ITT (CN)';\nrace_name                        \
    \               | race_position | cyclist_name\n-------------------------------------------------+---------------+--------------------------------------------------\n\
    National Championships South Africa WJ-ITT (CN) |             1 |      {firstname:\
    \ 'Frances', lastname: 'DU TOUT'}\nNational Championships South Africa WJ-ITT\
    \ (CN) |             2 |       {firstname: 'Lynette', lastname: 'BENSON'}\n...\n\
    (5 rows)\ncqlsh:cycling>\n```\n\nNotice how the query makes use of the type `full_name`\
    \ that you defined to show the values of the `firstname` and the `lastname` columns\
    \ for a cyclist .\n\n## User-Defined Functions and User-Defined Aggregates\n\n\
    When dealing with large data sets and clusters with hundreds of nodes, there’s\
    \ a dramatic difference between applying aggregations on the client side and pushing\
    \ huge computations to the server side. By letting the server handle the computations,\
    \ you’ll save network bandwidth, simplify the code on the client side, and reap\
    \ additional benefits.\n\nIn the following sections, I explain the essentials\
    \ of user-defined functions (UDFs) and user-defined aggregates (UDAs).\n\n###\
    \ User-Defined Functions\n\nThe first thing you need to know about an UDF is that\
    \ its scope isn’t database-wide, as is the case with functions and procedures\
    \ in a database such as Oracle or MySQL. A user-defined function has only a keyspace-wide\
    \ scope.\n\n### Things to Remember About UDFs\n\nThe following are the key things\
    \ you need to know about UDFs.\n\n*   You can use a language such as Java, JavaScript,\
    \ Groovy, and Scala to code your UDF.\n*   You can treat `null` input in two ways:\n\
    \    *   You can specify the `CALLED ON NULL INPUT` clause, which means that Cassandra\
    \ will always call the UDF.\n    *   If you specify the `RETURNS NULL ON NULL\
    \ INPUT` clause, Cassandra skips execution of the UDF and returns a `null` instead\
    \ if any of the arguments are `null`.\n*   As with the input parameters, you must\
    \ specify a valid type for the return type, such as a primitive, collection, tuples,\
    \ or CDT.\n\n### Syntax of an UDF\n\nThe syntax for creating an UDF is as follows:\n\
    \n```sql\nCREATE [OR REPLACE] FUNCTION [IF NOT EXISTS]\n[keyspace.]functionName\
    \ (param1 type1, param2 type2, ...)\nCALLED ON NULL INPUT | RETURNS NULL ON NULL\
    \ INPUT\nRETURN returnType\nLANGUAGE language\nAS '\n// your source code\n';\n\
    ```\n\nThe `OR REPLACE clause` and the `IF NOT EXISTS` clause are mutually exclusive.\n\
    \n### An Example UDF\n\nThe following is an example that shows how to create and\
    \ use an UDF. The UDF is named `maxof (currentvalue int, testvalue int).` This\
    \ function allows you to get the maximum of two integers that you pass to it.\n\
    \nBy default, UDFs are disabled. You must therefore first set `enable_user_defined_functions:\
    \ true` to enable in the `cassandra.yaml` file before trying the following:\n\n\
    ```sql\ncqlsh> CREATE FUNCTION maxof(currentvalue int, testvalue int)\nRETURNS\
    \ NULL ON NULL INPUT\nRETURNS int\nLANGUAGE java\nAS 'return Math.max(currentvalue,testvalue);';\n\
    ```\n\nYou can then create a test table and insert some data into it, following\
    \ which you can execute a query with your new UDF `maxOf` to get the maximum value\
    \ between two values, `val1` and `val2`. Some input values are purposely specified\
    \ as `null`. Here is the example:\n\n```sql\ncqlsh> SELECT id,val1,val2,maxOf(val1,val2)\
    \ FROM test WHERE id IN(1,2,3);\nid | val1 | val2 | udf.maxof(val1, val2)\n-----+------+------+-----------------------\n\
    1  |  100 |  200 |                   200\n2  |  100 | null |                 \
    \ null\n3  | null |  200 |                  null\n```\n\nSince the UDF specifies\
    \ the `RETURNS NULL ON NULL INPUT` clause, Cassandra returns a `null` whenever\
    \ the input argument is `null`.\n\n### User-Defined Aggregate Functions\n\nCassandra\
    \ enables you to create user-defined aggregate functions that you can apply to\
    \ data as part of a query result.\n\nYou create the aggregate function first and\
    \ your query can include only the aggregate function by itself, without any columns.\n\
    \n## Built-in Functions and Aggregates\n\nCassandra offers several handy built-in\
    \ functions and aggregates you can use. Here’s a listing:\n\n*   `COUNT`: The\
    \ `COUNT` function gets you a count of the number of rows.\n*   `SUM`: The `SUM`\
    \ function enables you to add all values for a specific column.\n*   `MIN`/`MAX`:\
    \ The `MIN`/`MAX` functions help you compute the minimum/maximum values for a\
    \ column.\n*   `AVG`: The `AVG` function computes the average of all values in\
    \ a given column.\n\n## Summary\n\nUnderstanding the proper uses of indexing in\
    \ a Cassandra is tricky since it’s so different from the way you use indexing\
    \ in traditional relational databases.\n\nCassandra collections such as `set`s,\
    \ `map`s, `list`s, and UDFs are highly useful and it’s good to know how they work."
