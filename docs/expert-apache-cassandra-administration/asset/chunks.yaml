    # 第一部分

    简介、安装与配置


    # 1. `Apache Cassandra` 简介


    `Apache Cassandra` 与典型的**关系型数据库管理系统**（`RDBMS`），如 `MySQL` 或 `Oracle` 数据库，有相当大的不同。本章将阐述为何总体上需要
    `NoSQL` 数据库，以及为何需要 `Cassandra`。


    此外，本章解释了 `Cassandra` 数据库的独特特性，并介绍了几个 `Cassandra` 特有的关键概念和术语。


    你将学习使 `Cassandra` 变得特别的关键概念。本章还介绍了 `Cassandra` 的数据建模，并解释了关键的 `Cassandra` 术语。


    本书是关于如何管理 `Cassandra` 的，因此我也解释了 `Cassandra` 管理的显著特性、用于管理 `Cassandra` 集群的工具，以及
    `Cassandra` 数据库管理的基础知识。


    ## 什么是 `Cassandra`？


    `Apache Cassandra` 是一个分布式的 `NoSQL` 数据库系统，基于 `Amazon` 的 `Dynamo` 和 `Google` 的 `Bigtable`。`Cassandra`
    是一个快速、分布式的数据库，具有高度的容错性和可扩展性。它提供高可用性和线性可扩展性，这是传统关系型数据库在处理非常庞大的数据集时无法同时满足的两个目标。


    云应用需要高度可扩展的后端数据库，能够跨服务器集群处理分布式的、大规模的工作负载。这些应用需要非常快的数据访问速度，以满足各种应用程序对数据存储的交互式使用以及临时查询。`Cassandra`
    正是为大容量、低延迟的云应用而设计的。


    `Facebook` 开发了 `Cassandra` 用于搜索收件箱，该项目于 2008 年 7 月开源。2009 年 3 月，该项目被接受加入 `Apache
    孵化器`，并于 2010 年 2 月成为 `Apache` 顶级项目。`Cassandra` 这个名字源自古希腊预言家 `Cassandra`。


    在以下各节中，我将简要描述 `Cassandra` 的主要特性：


    *   开源特性

    *   容错性

    *   高性能

    *   分布式数据库架构

    *   高可扩展性

    *   弹性特性

    *   处理多种类型数据的能力


    ### 开源数据库


    `Cassandra` 并非商业产品。它是一个纯粹的开源产品，这意味着你不仅无需付费，还可以根据自己的需求对其进行定制。然而，如果你正在使用生产环境的 `Cassandra`
    集群，了解 `DataStax`——这家“`Cassandra` 公司”很重要。`DataStax` 是一家由 `Cassandra` 数据库主要创建者运营的公司。`DataStax`
    提供诸如 `Cassandra DevCenter` 和 `Cassandra Enterprise` 之类的商业产品，以便你更轻松地设置和运行 `Cassandra`
    集群。`DataStax` 还提供多门关于 `Cassandra` 数据建模、开发和运维的免费课程，并通过其文档、课程和会议，成为 `Cassandra`
    的主要倡导者。


    ### 容错性


    `Cassandra` 会自动将数据复制到多个节点。这与传统关系型数据库形成鲜明对比，后者需要你设置复杂的复制架构才能将数据传播到多个节点以实现容错。对于每次更新，你都可以选择同步或异步复制。


    由于数据库运行在一组相似的节点上，因此 `Cassandra` 集群中不存在**单点故障**。正如你将在本书后面学到的，基于 `Cassandra` 的应用程序即使在整个
    `Cassandra` 数据中心（定义与传统的组织数据中心不同）丢失的情况下也能继续运行。


    ### 高性能


    `Cassandra` 是一个高性能的数据库，基准测试表明其性能超越了其他 `NoSQL` 数据库。在 2012 年进行的一项主要的综合性 `NoSQL`
    基准测试中，`Cassandra` 在多个实验中针对最大节点数量实现了最高吞吐量。


    `Cassandra` 提供非常高的吞吐量，尤其是在写入时。可预测的高性能意味着你可以满足要求低延迟的严格业务 `SLA`（服务水平协议）。


    尽管工作负载增加，或向集群中添加大量节点，`Cassandra` 仍能持续提供高性能，这得益于数据库的线性可扩展性。


    ### 分布式配置与高韧性


    `Cassandra` 安装使用多个节点，且不存在单点故障。节点之间不存在主从关系；`Cassandra` 集群中的所有节点都是相同的。


    `Cassandra` 会自动将数据复制到多个节点。你可以将节点放置在多个机架中，或者，如果你使用的是像 `Amazon Web Services` 这样的云设置，则可以放置在不同的可用区中。将数据分布在多个地理区域将确保数据始终可用。


    `Cassandra` 使用“数据中心”的概念，它是一组节点。数据中心可以是逻辑的或物理的，因此你可以拥有遍布全球的数据中心。这一特性，加上数据复制，提供了非常高的可用性，因为
    `Cassandra` 不仅能承受一个或多个节点的丢失，还能承受整个数据中心的丢失。


    ### 灵活性


    `Cassandra` 使用极其灵活的数据模型。一个表中的不同行可以拥有不同数量的列。用户还可以在运行时更改模式。`Cassandra` 的**可调一致性**特性允许你在读或写操作级别调整一致性。你可以根据你的主要目标是可靠性还是速度来调整复制和读/写一致性保证。


    ### 使用廉价服务器


    与关系型数据库不同（大多数关系型数据库需要高度稳健且昂贵的硬件），`Cassandra` 可以在商用硬件上运行。商用硬件比托管 `Oracle` 等数据库的高端服务器便宜得多。虽然更容易发生故障，但商用服务器工作得非常好，因为
    `Cassandra` 的架构不涉及单点故障。


    ### 易于管理


    由于其简单的架构和缺乏过多复杂的组件，`Cassandra` 易于管理。`Oracle` 和其他关系型数据库具有许多功能，这会导致数据库臃肿，进而可能导致数据库不稳定。


    与管理像 `Oracle` 数据库这样的复杂数据库相比，管理 `Cassandra` 数据库，尤其是通过像 `DataStax` 这样的框架，要简单得多。在
    `Oracle` 数据库中，备份和恢复数据库、优化 `SQL` 查询以及管理复制都是复杂的任务。`Cassandra` 通过保持简单性，使你能够快速上手。


    当你通过添加更多节点来扩展 `Cassandra` 集群时，需要记住的一个关键点是：你不需要为管理 `Cassandra` 的团队增加更多成员。管理 20
    个节点集群的团队同样可以处理 1000 个节点的集群。因此，随着 `Cassandra` 数据库的扩展，管理成本会下降。

    '
- fmt: '### Highly Scalable


    Cassandra is highly scalable. To analyze more data, you just add more nodes to
    your deployment. Cassandra offers linear scalability, which means that if you
    need to handle a threefold increase in writes, you increase your node count by
    three.


    You can scale Cassandra easily, without any downtime or interruption of ongoing
    work.


    Large Cassandra production deployments include Netflix, with over 2,500 nodes
    and 420TB of data, and Apple, with over 75,000 nodes and over 100PB of data.


    One of the keys to Cassandra’s high performance is that it is horizontally scalable.
    Unlike vertical scaling strategies that depend on hiking a server’s processing,
    storage, and memory capabilities, horizontal scaling adds more nodes to a cluster.


    As you add new machines to a Cassandra cluster, both read and write throughput
    increase linearly; that is, you can double your throughput, for example, by doubling
    the number of machines in the cluster. In addition, you don’t pay the cost of
    service interruptions because the database remains available and your applications
    continue to run unimpeded during the expansion of the cluster’s size.


    ### It’s Good Old SQL!


    Finally, the Cassandra Query Language (`CQL`) is similar to the SQL language constructs
    most of us are already familiar with, making it quite easy for developers and
    administrators to get up to par with `CQL`.


    The easiest way to interact with a Cassandra database is through the `CQL` shell,
    invoked by the utility `cqlsh`. `CQL` uses a syntax similar to regular SQL. You
    can perform data manipulation (DML) and data definition language (DDL) tasks through
    `cqlsh`.


    ### Problems Posed by Relational Databases


    You run into various problems with relational databases when you attempt to scale
    to very large data volumes. The notion of high availability that’s offered by
    relational databases is also questionable at times.


    When you are analyzing data using Linux utilities like `sed` and `awk` or simple
    Python scripts, most of the time you don’t even need a database. More often, you’ll
    be dealing with medium data where you use a database such as `MySQL`, `Oracle`,
    `PostgreSQL`, or `SQL Server`. These databases offer the well-known `ACID` guarantees.


    As your data sizes grow, you can vertically grow these relational databases by
    adding CPUs that are more powerful and more RAM, but there’s a finite limit to
    scalability with these relational databases, and the expense gets out of hand
    because the databases aren’t distributed.


    #### RDMSs and Big Data


    Relational databases often employ replication in a master-slave format to solve
    the problem of read-heavy workloads. When you add replication to a relational
    database such as `MySQL`, the `ACID` guarantees become hard to obtain. When you
    replicate data in `MYSQL`, for example, there is usually a replication lag between
    the master and the slave. If a client reads from the slave before the slave is
    replicated with the data, the guarantee of consistency (the C in `ACID`) is lost.


    ##### Performance Problems Due to the Third Normal Form


    In relational databases, it’s common to place data in the well-known third normal
    form. The third normal form has several consequences for query performance, making
    it hard for you to scale. Queries are increasingly complex, with numerous joins
    and resource-hungry grouping operations such as `ORDER BY` and `UNION`.


    The queries are adhoc and users want immediate results. If your datasets are larger
    than the memory you allocate to the database, results are going to be slow due
    to the heavy amount of disk seeks.


    One way out of this performance predicament is to create multiple denormalized
    tables at read time, so the reads don’t involve too many expensive joins. However,
    this means you’re going to end up with duplicate sets of data, which violates
    the third normal form.


    ##### Problems Due to Sharding


    Sharding is where, instead of having one database, you split up the data among
    multiple databases.


    Sharding means you denormalize everything and that you can’t do any more aggregations
    or joins. Your data is spread over numerous machines, and aggregations require
    you to touch every shard. Adding the shards requires you to move the data. Since
    sharding inhibits performance, you’re forced to denormalize, meaning you keep
    multiple copies of key data that you query often, such as one copy based on `Customer
    Id` and the other by `State`.


    Schema changes are hard when you have multiple shards, since you must propagate
    the changes to all the shards. In addition, if you want to double or triple the
    size of your database, you’ll need to re-shard all the data.


    ##### The Myth of High Availability


    High availability is a major benefit that users of replicated databases often
    seek. High availability isn’t simple, however. High availability involves numerous
    moving parts and imposes a heavy overhead. Despite all the costs, high availability
    is very hard to achieve because master-slave environments do suffer frequent downtimes
    caused by configuration changes, drive and power supply failures, and so on.


    In addition to the unplanned downtime, you should also deal with planned downtimes
    due to OS patches and upgrades. Failover processes, whether they’re automatic
    or manual, aren’t error free, and often involve a delay in bringing up the slave
    or standby database, resulting in downtime.


    Managing relational databases such as `MySQL` running over multiple data centers
    isn’t easy; it requires constant attention from a team of highly skilled database
    professionals and Linux engineers.


    Cassandra simplifies your database architecture by offering the following features:


    *   Peer-to-Peer Architecture : Cassandra uses a peer-to-peer architecture, with
    no concept of master and slave instances. Doing away with the master/slave concept
    means that there are fewer moving parts. This strategy leads to a simple architecture
    where all nodes are equal.

    *   No Failovers: The peer-to-peer architecture means that there’s no concept
    of a failover . The database doesn’t have to deal with complex state maintenance
    operations such as the election of a leader.

    *   Reliability : The database fully expects failure, and failure of individual
    components in the architecture is never going to be a showstopper. Your users
    are completely oblivious to the fact that one or more nodes, or even an entire
    data center, have crashed or are unavailable for other reasons.

    *   Data Locality : Instead of gathering data that’s scattered over a large number
    of nodes, Cassandra aims for data locality.

    *   Lower Cost : Cassandra reduces the cost of scaling (scaling with a traditional
    relational database can be expensive). Since Cassandra runs on commodity servers,
    your cost is much lower than scaling up a relational database with powerful servers.
    Instead of purchasing a few servers that cost hundreds of thousands of dollars,
    you acquire hundreds of servers that cost a few thousand bucks each.


    Cassandra is a leading member of the NoSQL database constellation, so it’s a good
    idea to review the need for NOSQL databases, the various types of NoSQL databases,
    and the types of problems they solve.'
