- fmt: '### Read Requests with Various Read Consistency Levels: Some Examples


    In this section, I present several examples of read requests with varying consistency
    levels in a single datacenter as well as in a cluster with two datacenters. The
    replication factor is 3 in all cases. I first show the scenarios for a single
    datacenter and then for a cluster with two datacenters.


    #### Single Datacenter


    With a `QUORUM` read consistency level, two of the three replicas must respond
    before the read request is successful. If there are multiple versions of a row,
    the replica with most recent version will satisfy the read request. In addition,
    the database will initiate a read repair on the third replica if necessary (if
    the third replica is stale).


    A read consistency level of `ONE` means that that database will reach out for
    the nearest replica for the rows it needs to satisfy the read request. Depending
    on whether the data diverges among the three replicas, the database may also start
    a read repair for the other two replicas. This depends on how you configured the
    `read_repair_chance` property for the table.


    #### A Cluster with Two Datacenters


    If you set read consistency to `QUORUM` and a replication factor of 3, four replicas
    of data must respond for a read request to succeed, with the replicas belonging
    to either datacenter . The database checks the other replicas for consistency,
    and if any replicas are out of date, starts a read repair to bring them up to
    date.


    If you’ve configured the `LOCAL_QUORUM` level of read consistency instead, two
    replicas from the same datacenter as the coordinator node must respond to the
    read request.


    For a read consistency of ONE, the database relies on the nearest replica, irrespective
    of the datacenter. It may also initiate a read repair based on the `read_repair_chance`
    setting you’ve configured for the table. For a read consistency level of `LOCAL_ONE`,
    the database contacts the closest replica in the same datacenter as the coordinator
    node.


    ### Testing the Performance of Consistency Levels


    As you just learned, there are many consistency levels for both read and write
    operations. Selecting a consistency level has a significant bearing on query and
    write latency, as well as on availability.


    DataStax recommends that you test the performance of various consistency levels
    by using CQL’s `TRACING` command . Since the `TRACING` command’s output shows
    the elapsed time for each read and write operation, you can compare the performance
    of various consistency levels before settling on one of them.


    To trace queries that use large data sets, it’s a good idea to configure probabilistic
    tracing. Use the `nodetool settraceprobability` command to configure probabilistic
    tracing. Once you do this, you can query the `system_traces` keyspace, as shown
    here:


    ```

    cqlsh> SELECT * FROM system_traces.events;

    ```


    Just a disclaimer here regarding the performance hit of probabilistic tracing.
    Experience shows that the tracing could significantly affect database performance.
    Therefore, use this feature with caution.


    When you turn tracing on, if you have a replication factor of 3, here’s what the
    three consistency levels would mean:


    *   `ONE`: Processes responses from one of the three replicas.

    *   `TWO`: Processes requests from a majority of the three replicas (that is,
    two replicas).

    *   `ALL`: Processes responses from all three of the replicas.


    To trace the queries, all you need to do is to run the query you want to use for
    testing the differences among the consistency levels, after turning tracing on:


    ```

    cqlsh> TRACING on;

    cqlsh> CONSISTENCY QUORUM;

    cqlsh> SELECT * FROM cycling_alt.tester where id = 0;

    ```


    Similarly, you can trace the impact of the `ONE` and `ALL` consistency levels
    .


    Performance with the `ALL` consistency setting is worse than that with the `QUORUM`
    setting when you’re dealing with large data sets or when one node is slower than
    the rest of the nodes in the cluster.


    ### Ensuring Atomicity with Batch Operations


    At times, you may want to process a set of operations (inserts/updates/deletes)
    as a single all-or-nothing operation. Performing a set of operations so that either
    all of them succeed, or no operation succeeds, is called an atomic operation .


    Cassandra allows you to perform batch operations in an atomic fashion. For a single
    partition, Cassandra performs the batch operations without you having to do anything.
    For batch operations spanning multiple partitions, Cassandra uses a batchlog ,
    which means you must configure some additional things.


    You can combine multiple INSERT, DELETE, and UDPATE statements into a single operation.
    Batch operations save on client-server communications, as well as the messaging
    between the coordinator and the replica nodes.


    A batch operation is atomic since if any statement in the batch succeeds, all
    the statements will succeed, and if one of them fails, all of them will fail.
    Other transactions in the database can read and write the data that was affected
    by a partially executed batch operation.


    ### Configuring Batch Operations


    You can have Cassandra process batch operations as an all-or-nothing deal. When
    you use batch operations, you can configure the number of operations in the batch
    with the `max_mutation_size_in_kb` property. This property determines the maximum
    size of a single batch mutation (batch operation).


    By default, the `max_mutation_size_in_kb` property is set to half of the value
    you’ve set for the `commitlog_segment_size_in_mb` property, which sets the size
    of an individual commit log file segment. The default value of the `commitlog_segment_size_in_mb`
    property is 32MB. If you decide to set a custom value for the `max_mutation_size_in_kb`
    property, you must ensure that the value of the `commitlog_segment_size_in_mb`
    property is at least twice the value of `max_mutation_size_in_kb/1024`.


    Note


    If the size of the batched operation is greater than the value you’ve configured
    for the `max_mutation_size_in_kb` property, the answer isn’t to just keep raising
    the commit log segment size. The problem may lie in an inefficient query access
    to the data or a wrong data model .


    ### Batch Operations in Single and Multiple Partitions


    DataStax points out that multiple partition batch operations suffer from performance
    issues. You must resort to batch operations for multiple operations only if you
    have a dire need to ensure atomicity. In a multiple partition batch operation,
    the coordinator node can turn out to be a bottleneck during a batch operation.
    The higher the number of partitions in a batch operation, the higher the latency
    due to batching.


    Batch operations that involve writing to multiple partitions also require Cassandra
    to visit all of those nodes, thus increasing latency of the write operation. As
    the number of partitions grows, so will the latency of the writes.


    The following is an example that shows a batch operation that performs three `INSERT`
    operations in one atomic operation. You want all three INSERT statements to work,
    or none. You start the batch operation with the `BEGIN BATCH` clause and end it
    with the `APPLY BATCH` clause.


    ```

    cqlsh:cycling> begin batch

    ... INSERT INTO cycling.cyclist_expenses (cyclist_name, balance) VALUES (''Vera
    ADRIAN'', 0) IF NOT EXISTS;

    ... INSERT INTO cycling.cyclist_expenses (cyclist_name, expense_id, amount, description,
    paid) VALUES (''Vera ADRIAN'', 1, 7.95, ''Breakfast'', false);

    ... iNSERT INTO cycling.cyclist_expenses (cyclist_name, balance) VALUES (''Vera
    ADRIAN'',7.95);

    ... apply batch;

    [applied]


    True

    cqlsh:cycling>

    ```


    If a batch operation is successful, you’ll see an acknowledgment saying True.
    If it fails, you’ll see an acknowledgment that says the following instead:


    ```

    [applied]


    False

    ```


    Since all the INSERT statements write to the same partition, this batched write
    operation is efficient .'
  raw: '#### Read Requests with Various Read Consistency Levels: Some Examples


    In this section, I present several examples of read requests with varying consistency
    levels in a single datacenter as well as in a cluster with two datacenters. The
    replication factor is 3 in all cases. I first show the scenarios for a single
    datacenter and then for a cluster with two datacenters.


    ##### Single Datacenter


    With a `QUORUM` read consistency level, two of the three replicas must respond
    before the read request is successful. If there are multiple versions of a row,
    the replica with most recent version will satisfy the read request. In addition,
    the database will initiate a read repair on the third replica if necessary (if
    the third replica is stale).


    A read consistency level of `ONE` means that that database will reach out for
    the nearest replica for the rows it needs to satisfy the read request. Depending
    on whether the data diverges among the three replicas, the database may also start
    a read repair for the other two replicas. This depends on how you configured the
    `read_repair_chance` property for the table.


    ##### A Cluster with Two Datacenters


    If you set read consistency to `QUORUM` and a replication factor of 3, four replicas
    of data must respond for a read request to succeed, with the replicas belonging
    to either datacenter . The database checks the other replicas for consistency,
    and if any replicas are out of date, starts a read repair to bring them up to
    date.


    If you’ve configured the `LOCAL_QUORUM` level of read consistency instead, two
    replicas from the same datacenter as the coordinator node must respond to the
    read request.


    For a read consistency of ONE, the database relies on the nearest replica, irrespective
    of the datacenter. It may also initiate a read repair based on the `read_repair_chance`
    setting you’ve configured for the table. For a read consistency level of `LOCAL_ONE`,
    the database contacts the closest replica in the same datacenter as the coordinator
    node.


    ### Testing the Performance of Consistency Levels


    As you just learned, there are many consistency levels for both read and write
    operations. Selecting a consistency level has a significant bearing on query and
    write latency, as well as on availability.


    DataStax recommends that you test the performance of various consistency levels
    by using CQL’s `TRACING` command . Since the `TRACING` command’s output shows
    the elapsed time for each read and write operation, you can compare the performance
    of various consistency levels before settling on one of them.


    To trace queries that use large data sets, it’s a good idea to configure probabilistic
    tracing. Use the `nodetool settraceprobability` command to configure probabilistic
    tracing. Once you do this, you can query the `system_traces` keyspace, as shown
    here:


    ```

    cqlsh> SELECT * FROM system_traces.events;

    ```


    Just a disclaimer here regarding the performance hit of probabilistic tracing.
    Experience shows that the tracing could significantly affect database performance.
    Therefore, use this feature with caution.


    When you turn tracing on, if you have a replication factor of 3, here’s what the
    three consistency levels would mean:


    *   `ONE`: Processes responses from one of the three replicas.

    *   `TWO`: Processes requests from a majority of the three replicas (that is,
    two replicas).

    *   `ALL`: Processes responses from all three of the replicas.


    To trace the queries, all you need to do is to run the query you want to use for
    testing the differences among the consistency levels, after turning tracing on:


    ```

    cqlsh> TRACING on;

    cqlsh> CONSISTENCY QUORUM;

    cqlsh> SELECT * FROM cycling_alt.tester where id = 0;

    ```


    Similarly, you can trace the impact of the `ONE` and `ALL` consistency levels
    .


    Performance with the `ALL` consistency setting is worse than that with the `QUORUM`
    setting when you’re dealing with large data sets or when one node is slower than
    the rest of the nodes in the cluster.


    ## Ensuring Atomicity with Batch Operations


    At times, you may want to process a set of operations (inserts/updates/deletes)
    as a single all-or-nothing operation. Performing a set of operations so that either
    all of them succeed, or no operation succeeds, is called an atomic operation .


    Cassandra allows you to perform batch operations in an atomic fashion. For a single
    partition, Cassandra performs the batch operations without you having to do anything.
    For batch operations spanning multiple partitions, Cassandra uses a batchlog ,
    which means you must configure some additional things.


    You can combine multiple INSERT, DELETE, and UDPATE statements into a single operation.
    Batch operations save on client-server communications, as well as the messaging
    between the coordinator and the replica nodes.


    A batch operation is atomic since if any statement in the batch succeeds, all
    the statements will succeed, and if one of them fails, all of them will fail.
    Other transactions in the database can read and write the data that was affected
    by a partially executed batch operation.


    ### Configuring Batch Operations


    You can have Cassandra process batch operations as an all-or-nothing deal. When
    you use batch operations, you can configure the number of operations in the batch
    with the `max_mutation_size_in_kb` property. This property determines the maximum
    size of a single batch mutation (batch operation).


    By default, the `max_mutation_size_in_kb` property is set to half of the value
    you’ve set for the `commitlog_segment_size_in_mb` property, which sets the size
    of an individual commit log file segment. The default value of the `commitlog_segment_size_in_mb`
    property is 32MB. If you decide to set a custom value for the `max_mutation_size_in_kb`
    property, you must ensure that the value of the `commitlog_segment_size_in_mb`
    property is at least twice the value of `max_mutation_size_in_kb/1024`.


    Note


    If the size of the batched operation is greater than the value you’ve configured
    for the `max_mutation_size_in_kb` property, the answer isn’t to just keep raising
    the commit log segment size. The problem may lie in an inefficient query access
    to the data or a wrong data model .


    ### Batch Operations in Single and Multiple Partitions


    DataStax points out that multiple partition batch operations suffer from performance
    issues. You must resort to batch operations for multiple operations only if you
    have a dire need to ensure atomicity. In a multiple partition batch operation,
    the coordinator node can turn out to be a bottleneck during a batch operation.
    The higher the number of partitions in a batch operation, the higher the latency
    due to batching.


    Batch operations that involve writing to multiple partitions also require Cassandra
    to visit all of those nodes, thus increasing latency of the write operation. As
    the number of partitions grows, so will the latency of the writes.


    The following is an example that shows a batch operation that performs three `INSERT`
    operations in one atomic operation. You want all three INSERT statements to work,
    or none. You start the batch operation with the `BEGIN BATCH` clause and end it
    with the `APPLY BATCH` clause.


    ```

    cqlsh:cycling> begin batch

    ... INSERT INTO cycling.cyclist_expenses (cyclist_name, balance) VALUES (''Vera
    ADRIAN'', 0) IF NOT EXISTS;

    ... INSERT INTO cycling.cyclist_expenses (cyclist_name, expense_id, amount, description,
    paid) VALUES (''Vera ADRIAN'', 1, 7.95, ''Breakfast'', false);

    ... iNSERT INTO cycling.cyclist_expenses (cyclist_name, balance) VALUES (''Vera
    ADRIAN'',7.95);

    ... apply batch;

    [applied]


    True

    cqlsh:cycling>

    ```


    If a batch operation is successful, you’ll see an acknowledgment saying True.
    If it fails, you’ll see an acknowledgment that says the following instead:


    ```

    [applied]


    False

    ```


    Since all the INSERT statements write to the same partition, this batched write
    operation is efficient .'
