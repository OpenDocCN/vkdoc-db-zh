- fmt: '## Backing Up Data


    Backing up a Cassandra database involves the backing up of all the SSTable files
    in the `data` directory of the database. You can take the backups while the database
    is running. You can back up the entire database, or just a keyspace, or even a
    single table.


    The backup you make (snapshots) may not be consistent, but that’s not a problem
    at all. The purpose in taking a backup is so you can restore the database if you
    happen to lose part or all of the data for any reason. When you restore a snapshot,
    Cassandra utilizes the consistency mechanisms you learned about in earlier chapters
    to make the data consistent across all nodes in the cluster.


    The `nodetool snapshot` command enables you to back up Cassandra’s data. The tool
    backs up both the schema information and the data in the SSTables. When you need
    to restore tables from the snapshot, you’ll need the data as well as the schema.
    This way, when you need to recreate some or all of a node’s SSTables, you’ll have
    both the data and metadata to create the table(s).


    Taking a snapshot means an increase in disk usage since you’re storing the same
    data in two places on the nodes. The `nodetool snapshot` command works only at
    a single-node level. You can use a parallel shell utility such as `pdsh` to run
    a cluster-wide snapshot by running the `nodetool snapshot` command.


    You can back up all the keyspaces on a node with the following command:


    ```

    $ nodetool snapshot

    Requested creating snapshot(s) for [all keyspaces] with snapshot name [1499019048455]
    and options {skipFlush=false}

    Snapshot directory: 1499019048455

    $

    ```


    Cassandra takes the snapshot, which contains the data and the schemas for all
    tables on this node, and stores the data for each table in a directory corresponding
    to that table.


    ```

    $ CASSANDRA_HOME/data/data/keyspace_name/table_UID/snapshot_name

    ```


    In this case, it’s the following directory:


    ```

    data/data/cycling/cyclist_name-351e8df05f4011e7b2672fabda59ff45/snapshots/1499019048455

    ```


    You’ll find all the files pertaining to the table `cyclist_name` in this directory:


    ```

    # ls -altr

    total 52

    -rw-r--r-- 4 root root   92 Jul  2 11:03 mc-3-big-Summary.db

    -rw-r--r-- 4 root root   60 Jul  2 11:03 mc-3-big-Index.db

    -rw-r--r-- 4 root root   16 Jul  2 11:03 mc-3-big-Filter.db

    -rw-r--r-- 4 root root    9 Jul  2 11:03 mc-3-big-Digest.crc32

    -rw-r--r-- 4 root root  144 Jul  2 11:03 mc-3-big-Data.db

    -rw-r--r-- 4 root root   43 Jul  2 11:03 mc-3-big-CompressionInfo.db

    -rw-r--r-- 4 root root   92 Jul  2 11:03 mc-3-big-TOC.txt

    -rw-r--r-- 4 root root 4668 Jul  2 11:03 mc-3-big-Statistics.db

    -rw-r--r-- 1 root root  856 Jul  2 11:03 schema.cql

    -rw-r--r-- 1 root root   31 Jul  2 11:03 manifest.json

    drwxr-xr-x 2 root root 4096 Jul  2 11:03 .

    drwxr-xr-x 7 root root 4096 Jul  2 11:10 ..

    $

    ```


    All files in this directory have a `.db` extension, denoting that they’re all
    part of the SSTable named `CYCLIST_NAME`. The `schema.cql` file contains the complete
    CQL code to create this table.


    You can also back up a single keyspace with the `nodetool snapshot` command by
    specifying the keyspace name.


    ```

    $ nodetool snapshot cycling

    Requested creating snapshot(s) for [cycling] with snapshot name [1499020818525]
    and options {skipFlush=false}

    Snapshot directory: 1499020818525

    $

    ```


    ### Managing Snapshots


    You can list all snapshots on a node, along with their name and size details,
    by executing the `nodetool listsnapshots` command.


    ```

    $ nodetool listsnapshots

    Snapshot Details:

    Snapshot name Keyspace name      Column family name             True size Size
    on disk

    1499021840269 system_distributed parent_repair_history          23.69 KiB 23.72
    KiB

    1499021840269 system_distributed repair_history                 5.69 KiB  5.72
    KiB

    1499021840269 system_distributed view_build_status              0 bytes   13 bytes

    1499021840269 cycling            cyclist_name                   5 KiB     5.87
    KiB

    1499021840269 test5              kv                             4.78 KiB  5.62
    KiB

    1499021840269 test               my_table                       0 bytes   842
    bytes

    1499021840269 cycling2           cyclist_name                   0 bytes   870
    bytes

    1499021840269 system_auth        roles                          4.95 KiB  4.98
    KiB

    1499021840269 system_auth        role_members                   0 bytes   13 bytes

    1499021840269 system_auth        resource_role_permissons_index 0 bytes   13 bytes

    1499021840269 system_auth        role_permissions               0 bytes   13 bytes

    1499021840269 system_traces      sessions                       0 bytes   13 bytes

    1499021840269 system_traces      events                         0 bytes   13 bytes

    Total TrueDiskSpaceUsed: 44.11 KiB

    $

    ```


    Snapshots occupy space. They also get dated. This means that you must often clear
    old snapshot files that you no longer need. You do this by removing the entire
    snapshot directory. You can script your backups such that you delete the old snapshots
    before taking a fresh snapshot.


    The `nodetool clearsnapshot` command lets you delete snapshots you’ve made for
    one or more keyspaces.


    You can delete a single snapshot by running the `nodetool clearsnapshot` command
    and specifying the snapshot directory name.


    ```

    $ ./nodetool clearsnapshot 1499020818525

    Requested clearing snapshot(s) for [1499020818525]

    $

    ```


    You can remove all the snapshot directories on a node by issuing the `nodetool
    clearsnapshot` command without a snapshot name.


    ```

    $ ./nodetool clearsnapshot

    Requested clearing snapshot(s) for [all keyspaces]

    $

    ```


    Here are some important options you can specify for the `nodetool clearsnapshot`
    command:


    *   `-t:` Enables you to specify a snapshot name.

    *   `keyspace`: Delete snapshots from the keyspace you specify. You can specify
    multiple keyspaces, each separated by a space.

    *   `snapshot`: The name of the snapshot you want to delete.


    In a production setting, to make a database backup, you take a snapshot, and zip
    up the files (`tar`) and store the zip files in network backup locations.


    #### Taking an Automatic Snapshot Before Compacting Data


    You can enable the database to take an automatic snapshot before performing a
    compaction of SSTables (I explain the compaction feature in detail in Chapter
    [11](#A436674_1_En_11_Chapter.html)). You do this by setting the `snapshot_before_compaction`
    property to `true` in the `cassandra.yaml` file. The default value is `false`.


    Remember that since the database doesn’t automatically remove older snapshots,
    you must be aware of the space consequences of the automatic snapshots.


    ### Performing Incremental Backups


    Once you create a system-wide snapshot, you can employ Cassandra’s incremental
    backups feature to back up data that has been updated since the full snapshot
    was made.


    Incremental backups are disabled by default, and you can enable them with the
    following command:


    ```

    $ nodetool enable backup

    ```


    Alternatively, you can enable incremental backups on a long-term basis by changing
    the value of the `incremental-backups` property to `true` in the `cassandra.yaml`
    file. You can disable incremental backups with the following command:


    ```

    $ nodetool disable backup

    ```


    Incremental backups are automatic. Cassandra creates a hard link to each SSTable
    that was flushed to disk in the `backups` subdirectory of the `data` folder of
    the keyspace to which the table belongs. Cassandra doesn’t remove the hard links,
    however, so the administrator must tend to these.


    Note: Run the `nodetool statusbackup` command to get the status of a backup.


    ## Restoring Data with Various Restore Methods


    To fully restore data, you must, of course, have a complete backup, which consists
    of the following:


    *   A snapshot at a point in time

    *   All incremental backups from the time you took the snapshot

    *   All commitlog segments since the time you took the last incremental backup'
