  trans: '

    ## 动态环参与


    您可以在不影响集群中其他节点的情况下启动和停止 Cassandra 集群中的节点。在下面的示例中，您关闭了测试集群中两个节点之一。然后您检查第二个节点的日志。


    ```

    INFO  [GossipTasks:1] 2017-06-25 08:35:01,697 Gossiper.java:1035 - InetAddress
    /192.168.159.129 is now DOWN

    ```


    接着，您启动之前关闭的节点。您再次检查正常运行节点的日志。


    ```

    INFO  [HANDSHAKE-/192.168.159.129] 2017-06-25 08:39:05,030 OutboundTcpConnection.java:510
    - Handshaking version with /192.168.159.129

    INFO  [GossipStage:1] 2017-06-25 08:39:06,134 Gossiper.java:1054 - Node /192.168.159.129
    has restarted, now UP

    INFO  [GossipStage:1] 2017-06-25 08:39:06,139 StorageService.java:2248 - Node
    /192.168.159.129 state jump to NORMAL

    INFO  [GossipStage:1] 2017-06-25 08:39:06,170 TokenMetadata.java:479 - Updating
    topology for /192.168.159.129

    INFO  [RequestResponseStage-1] 2017-06-25 08:39:06,352 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    ```


    如您所见，Cassandra 会自动检测节点的故障和重启。您无需进行任何操作。


    ## 更改复制策略


    您在键空间级别设置复制因子和复制策略。以下示例展示了如何将一个键空间从默认的`SimpleStrategy`切换为`NetworkTopologyStrategy`：


    ```

    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {''class'' : ''NetworkTopologyStrategy'',
    ''DC1'' : 3};

    ```


    在此示例中，您为名为 DC1 的单个数据中心切换了键空间复制策略。


    在下面的示例中，您将一个键空间的复制限制在选定的数据中心，并将排除的数据中心的复制因子设置为 0：


    ```

    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {''class'' : ''NetworkTopologyStrategy'',
    ''DC1''  : 0, ''DC2'' : 3, ''DC3'' : 0 };

    ```


    ### 分区器与分区策略


    Cassandra 使用分区器来帮助它在集群中的节点之间分配数据。分区器通过将数据均匀分布在集群中的所有节点上来实现负载均衡。分区器是一个函数，Cassandra
    通过对主键进行哈希运算来派生代表一行的令牌。然后，Cassandra 基于通过分区器派生的令牌值将数据分布在各个节点上。


    #### 分区器类型


    Cassandra 提供三种类型的分区器，但由于各种缺点，它建议您不要使用`ByteOrderedPartitioner`，包含它仅是为了向后兼容。


    您可以选择的另外两种分区器是`Murmur3Partitioner`（默认分区器）和`RandomPartitioner`。两者都使用令牌在所有节点上分配等量的数据，并将表数据均匀分布在环或键空间上。


    由于哈希范围的每个部分包含（平均）相等数量的行，读写请求得以均匀分布。


    这两种分区器都基于每个行键的哈希值在集群中分配数据。两者之间的区别在于它们如何生成令牌哈希值。`Murmur3Partitioner`使用`Murmurhash`函数提供更快的哈希运算，该函数为分区键创建一个
    64 位的哈希值。


    `RandomPartitioner`通过使用加密哈希生成令牌哈希值来在集群中分配数据。由于使用加密哈希，`RandomPartitioner`生成令牌哈希值需要更长时间。由于
    Cassandra 不需要加密哈希，使用替代方案`Murmur3Partitioner`将带来 3-5 倍的性能提升。


    提示


    `Murmur3Partitioner`在性能上比`RandomPartitioner`快 3-5 倍。


    `Murmur3Partitioner`是默认的分区策略，在大多数情况下都表现良好。但请注意，一旦您使用一种分区器对数据进行了分区，就很难再转换为另一种分区器。


    #### 生成令牌


    如果您使用的是虚拟节点（vnodes），则无需计算令牌。否则，您必须为集群计算令牌。您可以在配置集群（`cassandra.yaml`文件）时使用`initial_token`参数分配这些令牌。


    如果您只有一个数据中心，则通过将哈希范围除以节点数来计算令牌。如果您有多个数据中心，则必须通过将哈希范围除以每个数据中心中的节点数来为每个数据中心计算令牌。


    如何计算令牌取决于您的分区策略。假设您使用的是默认的`Murmur3Partitioner`，您可以通过以下方式生成令牌：


    ```

    python -c "print [str(((2**64 / number_of_tokens) * i) - 2**63) for i in range(number_of_tokens)]"

    ```


    如果您的集群中有六个节点，您需要运行的 Python 命令是：


    ```

    python -c "print [str(((2**64 / 6) * i) - 2**63) for i in range(6)]"

    ```


    该命令将显示集群中六个节点各自的令牌，然后您可以将它们指定为`cassandra.yaml`文件中`initial_token`参数的值。


    ```

    [ ''-9223372036854775808'', ''-6148914691236517206'', ''-3074457345618258604'',
    ''-2'', ''3074457345618258600'', ''6148914691236517202'' ]

    ```


    #### 设置 initial_tokens 和 num_tokens 属性


    默认情况下，对于单节点每令牌架构，`initial_token`属性是禁用的。如果节点在环空间中拥有一个连续的范围，则必须设置`initial_token`属性。设置此属性后，它将覆盖`num_token`属性。


    当首次启动生产集群或添加节点时，如果满足以下任一条件，请始终设置`initial_token`值：


    *   您未使用 vnodes。

    *   您已将节点的`num_tokens`属性设置为 1。


    您为虚拟节点架构设置`num_tokens`属性，以确定分配给 vnode 的令牌范围数量。此属性的默认值为 1（已禁用），这意味着 vnodes 处于禁用状态。您可以为该属性指定一个介于
    1 和 256 之间的数字。


    如果集群中的所有物理节点完全相同，您必须在所有节点上为`num_tokens`属性指定相同的值。

    '
- fmt: '### Snitches


    A snitch’s job is to determine where each node is, relative to the rest of the
    nodes in a cluster. Snitches help the database identify the fastest way to respond
    to queries. Snitches help Cassandra figure out which datacenters and racks it
    should use to read data from and write data to. Snitches determine how Cassandra
    distributes replicas. Snitches make Cassandra aware of the network topology so
    the database can route requests efficiently by grouping nodes into datacenters
    and racks.


    The snitch calculates the distance between the nodes and finds out which nodes
    lie close to each other. It uses this information to help the database route requests
    to the best nodes. The best node here is the replica that will return the data
    the fastest.


    A snitch is a critical component of Cassandra’s architecture and helps determine
    the datacenter and rack to which a node belongs. A snitch maps the IP addresses
    of nodes in a cluster to racks and datacenters. A rack is a physical entity and
    a data center is a virtual entity.


    Snitches are quite critical to read activity. When reading data, Cassandra asks
    only one node for the data and, subject to the consistency level and the read
    repair chance you’ve configured, requests only checksums from the other replicas.


    When there are multiple replicas from which the coordinator node can make a request
    for the actual data, Cassandra needs to make a choice as to which replica it should
    ask to send in the full data (not just checksums). The snitch monitors the read
    performance of the various replicas and chooses the best replica based on the
    historical performance data of the replicas.


    Note


    The choice of a snitch affects where Cassandra places replicas. The purpose of
    a snitch is to route requests efficiently and to distribute replicas evenly.


    A key goal of Cassandra is to avoid storing multiple replicas of data on the same
    rack. The replication strategy you adopt uses the information provided by the
    new snitch to place the replicas.


    All snitches are dynamic by default, which enables Cassandra to move requests
    away from nodes that are currently having performance issues. You can configure
    dynamic snitch thresholds for a node in the `cassandra.yaml` file. As the performance
    of a “bad” node improves, it can get back to a preferred status.


    ### Types of Snitches


    Cassandra offers several types of snitches, as explained in the following sections.


    *   `SimpleSnitch` : This is the default snitch, but it is good only for development
    environments. This snitch is unaware of datacenters or racks and thus is unusable
    for multi-datacenter environments.

    *   `GossipingPropertyFileSnitch` : This snitch relays the rack and datacenter
    information you configure in the `cassandra-rackdc.properties` file to the rest
    of the nodes using gossip.


    You can configure the `GossipingPropertyFileSnitch` for a node by editing its
    `cassandra-rackdc.properties` file as shown here:


    ```

    dc=DC1

    rack=RACK1

    prefer_local=true

    ```


    Tip


    DataStax recommends `GossipingPropertyFileSnitch` for production usage.


    Here, `dc` refers to datacenter and `rack` specifies the rack information. The
    `prefer_local` option specifies that Cassandra must use the local IP address when
    it’s not communicating across multiple datacenters in order to limit the network
    bandwidth usage.


    *   `Ec2Snitch` : This is a simple snitch for Amazon EC2 deployments where all
    nodes are in a single region. The region name is analogous to the datacenter name,
    and the availability zones are analogous to racks within the datacenter.

    *   `Ec2MultiRegionSnitch` : You use this snitch for Amazon EC2-based clusters
    where the clusters span multiple regions.

    *   `GoogleCloudSnitch` : This is the snitch for a Cassandra deployment on the
    Google Cloud Platform across a single or multiple regions.

    *   `RackInferringSnitch` : This snitch figures out the node location by rack
    and datacenter. In a node IP address, which has four octets (110.100.200.105,
    for example), the third and fourth octets correspond to the rack and datacenter.
    This snitch is useful for writing custom snitch classes.

    *   `PropertyFileSnitch` : Determines the closeness of the nodes based on the
    rack and datacenter they belong to by using the network definitions from the `cassandra-topology.properties`
    file. You must define all nodes in the `cassandra-topology.properties` file, and
    the file must be identical on all nodes of a cluster.

    *   `CloudstackSnitch` : This is a snitch for an Apache Cloudstack-based cluster.


    Note


    Snitches inform Cassandra about the network topology so the database can efficiently
    route the requests and evenly distribute replicas.


    ### Understanding the cassandra-topology.properties and the cassandra-rackdc.properties
    Files


    The `cassandra-topology.properties` and the `cassandra-rackdc.properties` files
    play an important role in configuring snitches, so I briefly explain these two
    files here.


    The `cassandra-topology.properties` file contains the cluster topology for the
    entire cluster. The following are the contents of an example `cassandra-topology.properties`
    file:


    ```

    # datacenter One

    175.56.12.105=DC1:RAC1

    175.50.13.200=DC1:RAC1

    175.54.35.197=DC1:RAC1

    120.53.24.101=DC1:RAC2

    120.55.16.200=DC1:RAC2

    120.57.102.103=DC1:RAC2

    # datacenter Two

    110.56.12.120=DC2:RAC1

    110.50.13.201=DC2:RAC1

    110.54.35.184=DC2:RAC1

    50.33.23.120=DC2:RAC2

    50.45.14.220=DC2:RAC2

    50.17.10.203=DC2:RAC2

    ```


    This example shows a file with two physical datacenters, each with two racks.
    The `PropertyFileSnitch` uses the `cassandra-topologies.properties` file. If you
    don’t identify any of a cluster’s nodes in the `cassandra-topologies.properties`
    file, the database assumes that they are in the default datacenter (`datacenter`)
    and rack (`rack1`).


    You must update this file as you add and delete nodes to your cluster in order
    to make Cassandra aware of the rack and datacenter the nodes belong to. While
    Cassandra can figure these things out on its own, from a performance viewpoint
    it’s better for you to feed that information to Cassandra.


    Here are the contents of a typical `cassandra-rackdc.properties` file:


    ```

    # indicates the rack and dc for this node

    dc=DC1

    rack=RAC1

    ```


    When you configure the `GossipingPropertyFileSnitch`, it always loads the `cassandra-rackdc.properties`
    file, should there be one.


    The following three snitches will look up the `cassandra-rackdc.properties` file
    to figure out to which datacenter and racks the nodes in the cluster belong:


    *   `GossipingPropertyFileSnitch`

    *   `Ec2Snitch`

    *   `Ec2MultiRegionSnitch`


    ## Summary


    Understanding how Cassandra stores data and how it performs read and write operations
    is critical to tuning database performance.


    Repairing Cassandra nodes to correct data inconsistency is an essential task,
    and it’s good to master the various types of manual repair that Cassandra offers.


    Understanding how to configure the `cassandra-topology.properties` and `cassandra-rackdc.properties`
    files helps configure data centers and clusters.'
  raw: '### Snitches


    A snitch’s job is to determine where each node is, relative to the rest of the
    nodes in a cluster. Snitches help the database identify the fastest way to respond
    to queries. Snitches help Cassandra figure out which datacenters and racks it
    should use to read data from and write data to. Snitches determine how Cassandra
    distributes replicas. Snitches make Cassandra aware of the network topology so
    the database can route requests efficiently by grouping nodes into datacenters
    and racks.


    The snitch calculates the distance between the nodes and finds out which nodes
    lie close to each other. It uses this information to help the database route requests
    to the best nodes. The best node here is the replica that will return the data
    the fastest.


    A snitch is a critical component of Cassandra’s architecture and helps determine
    the datacenter and rack to which a node belongs. A snitch maps the IP addresses
    of nodes in a cluster to racks and datacenters. A rack is a physical entity and
    a data center is a virtual entity.


    Snitches are quite critical to read activity. When reading data, Cassandra asks
    only one node for the data and, subject to the consistency level and the read
    repair chance you’ve configured, requests only checksums from the other replicas.


    When there are multiple replicas from which the coordinator node can make a request
    for the actual data, Cassandra needs to make a choice as to which replica it should
    ask to send in the full data (not just checksums). The snitch monitors the read
    performance of the various replicas and chooses the best replica based on the
    historical performance data of the replicas.


    Note


    The choice of a snitch affects where Cassandra places replicas. The purpose of
    a snitch is to route requests efficiently and to distribute replicas evenly.


    A key goal of Cassandra is to avoid storing multiple replicas of data on the same
    rack. The replication strategy you adopt uses the information provided by the
    new snitch to place the replicas.


    All snitches are dynamic by default , which enables Cassandra to move requests
    away from nodes that are currently having performance issues. You can configure
    dynamic snitch thresholds for a node in the `cassandra.yaml` file. As the performance
    of a “bad” node improves, it can get back to a preferred status.


    #### Types of Snitches


    Cassandra offers several types of snitches, as explained in the following sections.


    *   `SimpleSnitch` : This is the default snitch, but it is good only for development
    environments. This snitch is unaware of datacenters or racks and thus is unusable
    for multi-datacenter environments.

    *   `GossipingPropertyFileSnitch` `:` This snitch relays the rack and datacenter
    information you configure in `the cassandra-rackdc.properties` file to the rest
    of the nodes using gossip.


    You can configure the `GossipingPropertyFileSnitch` for a node by editing its
    `cassandra-rackdc.properties` file as shown here:


    ```

    dc=DC1

    rack=RACK1

    prefer_local=true

    ```


    Tip


    DataStax recommends `GossipingPropertyFileSnitch` for production usage.


    Here, `dc` refers to datacenter and `rack` specifies the rack information. The
    `prefer_local` option specifies that Cassandra must use the local IP address when
    it’s not communicating across multiple datacenters in order to limit the network
    bandwidth usage.


    *   `Ec2Snitch` : This is a simple snitch for Amazon EC2 deployments where all
    nodes are in a single region. The region name is analogous to the datacenter name,
    and the availability zones are analogous to racks within the datacenter.

    *   `Ec2MultiRegionSnitch` : You use this snitch for Amazon EC2-based clusters
    where the clusters span multiple regions.

    *   `GoogleCloudSnitch` : This is the snitch for a Cassandra deployment on the
    Google Cloud Platform across a single or multiple regions.

    *   `RackInferringSnitch` : This snitch figures out the node location by rack
    and datacenter. In a node IP address, which has four octets (110.100.200.105,
    for example), the third and fourth octets correspond to the rack and datacenter.
    This snitch is useful for writing custom snitch classes.

    *   `PropertyFileSnitch` : Determines the closeness of the nodes based on the
    rack and datacenter they belong to by using the network definitions from the `cassandra-topology.properties`
    file. You must define all nodes in the `cassandra-topology.properties` file, and
    the file must be identical on all nodes of a cluster.

    *   `CloudstackSnitch` : This is a snitch for an Apache Cloudstack-based cluster.


    Note


    Snitches inform Cassandra about the network topology so the database can efficiently
    route the requests and evenly distribute replicas.


    #### Understanding the cassandra-topology.properties and the cassandra-rackdc.properties
    Files


    The `cassandra-topology.properties` and the `cassandra-rackdc.properties` files
    play an important role in configuring snitches, so I briefly explain these two
    files here.


    The `cassandra-topology.properties` file contains the cluster topology for the
    entire cluster. The following are the contents of an example `cassandra-topology.properties`
    file:


    ```

    # datacenter One

    175.56.12.105=DC1:RAC1

    175.50.13.200=DC1:RAC1

    175.54.35.197=DC1:RAC1

    120.53.24.101=DC1:RAC2

    120.55.16.200=DC1:RAC2

    120.57.102.103=DC1:RAC2

    # datacenter Two

    110.56.12.120=DC2:RAC1

    110.50.13.201=DC2:RAC1

    110.54.35.184=DC2:RAC1

    50.33.23.120=DC2:RAC2

    50.45.14.220=DC2:RAC2

    50.17.10.203=DC2:RAC2

    ```


    This example shows a file with two physical datacenters, each with two racks.
    The `PropertyFileSnitch` uses the `cassandra-topologies.properties` file . If
    you don’t identify any of a cluster’s nodes in the `cassandra-topologies.properties`
    file, the database assumes that they are in the default datacenter (datacenter)
    and rack (rack1).


    You must update this file as you add and delete nodes to your cluster in order
    to make Cassandra aware of the rack and datacenter the nodes belong to. While
    Cassandra can figure these things out on its own, from a performance viewpoint
    it’s better for you to feed that information to Cassandra.


    Here are the contents of a typical `cassandra-rackdc.properties` file:


    ```

    # indicates the rack and dc for this node

    dc=DC1

    rack=RAC1

    ```


    When you configure the `GossipingPropertyFileSnitch`, it always loads the `cassandra-rackdc.properties`
    file, should there be one.


    The following three snitches will look up the `cassandra-rackdc.properties` file
    to figure out to which datacenter and racks the nodes in the cluster belong:


    *   `GossipingPropertyFileSnitch`

    *   `Ec2Snitch`

    *   `Ec2MultiRegionSnitch`


    ## Summary


    Understanding how Cassandra stores data and how it performs read and write operations
    is critical to tuning database performance.


    Repairing Cassandra nodes to correct data inconsistency is an essential task,
    and it’s good to master the various types of manual repair that Cassandra offers.


    Understanding how to configure the `cassandra-topology.properties` and `cassandra-rackdc.properties`
    files helps configure data centers and clusters.'
