    SSTables 是不可变的，这意味着 Cassandra 不会通过插入或更新来覆盖现有数据。相反，Cassandra 会将插入或更新的数据的时间戳版本写入一个新的
    SSTable。因此，随着时间的推移，Cassandra 会在不同的 SSTables 中留下一行的多个版本。


    Cassandra 也不会通过立即删除数据来执行删除操作。它只是用墓碑标记数据，表明该数据已被删除。


    Cassandra 会定期合并 SSTables 以丢弃旧数据，这个过程称为压缩。压缩的结果是，使用该行每个列的最新版本，组装出一个完整的行。


    有多种压缩策略可供选择，具体取决于你的工作负载是写入密集型还是读取密集型。


    ## Cassandra 适合你吗？


    Cassandra 并非通用数据库！以下是 Cassandra 理想的常见用例。


    *   **大型环境**：Cassandra 是面向高交易量的数据库。一个优秀的关系型数据库管理系统可以在仅一台或几台服务器上处理大量交易。你的用例必须涉及超高的吞吐需求、高流量以及对低延迟工作的要求，才值得考虑使用
    Cassandra。

    *   **写入密集型工作负载**：Cassandra 非常适合涉及大量写入的用例，因为它为写入操作提供了高吞吐量。如果你有大量客户端和高写入量，Cassandra
    是一个绝佳的选择。

    *   **分布式数据**：由于 Cassandra 在处理地理上分布的集群方面表现良好，一个受益于在用户附近存储数据的全球性应用可以潜在地使用 Cassandra。


    Cassandra 并非适合所有用例的最佳选择。然而，本章前面描述的原因，如快速性能和支持大量复杂数据类型，使其成为高度可扩展存储的杰出工具。


    对于大多数存储需求，你可以继续使用 MySQL 或 Oracle。如果业务部门看到需要存储非常大量的数据，那就是你想要使用 Cassandra 的地方。在这些情况下使用
    Cassandra 是有意义的，而不是试图扩展关系型数据库的能力来管理和分析海量数据。


    ## Cassandra 数据建模要点


    第 4 章重点介绍 Cassandra 数据建模，本书其他多个章节详细阐述了关键的 Cassandra 数据建模概念。在这个介绍性章节中，我想提及在 Cassandra
    数据库中成功数据建模的关键原则或规则。


    你需要一种新的思维方式来编写在分布式数据库上可扩展的应用程序。首先要记住的是，Cassandra 并不是关系型数据库的直接替代品。这意味着你不能期望将数据和查询从关系型数据库直接放入
    Cassandra 并期望一切正常工作。为了充分利用 Cassandra，你应该使用 Cassandra 的数据建模原则和规则来设计你的应用程序。


    Cassandra 使用的数据模型基于你将对数据库运行的预期查询，而不是基于对实体及其之间关系的建模。


    对于过渡到 Cassandra 等分布式数据库的用户来说，尝试使用物化视图、索引和用户定义函数来扩展他们的应用程序是很常见的。当你在基于 Cassandra
    的应用程序中使用这些传统策略时，你会感到相当惊讶。


    有了这个背景，让我们回顾一下 Cassandra 数据建模背后的关键原则。


    ### 按查询构建数据


    由于 Cassandra 在写入数据方面非常高效，数据反规范化和重复的开销很小。重复数据将使你的读取速度更快。理想情况下，一次读取应该能够从单个分区获取其所有数据。


    ### 避免更新和删除


    根据其设计，Cassandra 与仅追加、不可变的数据集配合良好。清理“环”中的变更和删除操作将带来高昂的开销。


    ### 均匀分布数据


    你必须确保将数据均匀分布在 Cassandra 环上，这样单个节点就不会被卡住去处理不成比例的大量数据。适当选择分区键对于确保均匀的数据分布至关重要。


    ### 避免跨分区查询


    从多个节点处理和聚合数据，读取需要更长的时间。分区策略和位置在这里至关重要，因为跨分区查询可能会导致巨大的开销。


    ## Cassandra 管理员应该知道什么


    这本书主要关于管理 Cassandra，尽管它对 Cassandra 架构师和开发人员也将非常有用。


    与任何数据库一样，Cassandra 需要调整各种配置参数、选择正确的数据模型以及其他策略以实现最佳性能。虽然你在管理关系型数据库方面获得的许多技能可以轻松应用于
    Cassandra 数据库，但你还需要学习额外的知识才能成为一名成功的 Cassandra 数据库管理员。


    诸如通过配置内核优化操作系统、通过各种工具监控操作系统以及 SQL 查询优化技术等传统技能，在管理 Cassandra 数据库时都将对你有所帮助。除了这些技能，你还需要关注我在以下部分描述的工具和技能。


    ### Cassandra 工具


    Cassandra 提供了几种有用的管理工具来监控和管理你的集群。以下是你会经常使用的关键工具的简要描述。


    *   `cassandra` 实用程序：`cassandra` 实用程序使你能够启动一个 Cassandra 实例。此外，该实用程序还使你能够执行其他任务，例如替换一个故障节点。

    *   SSTable 实用程序：Cassandra 提供了大约十几个实用程序，使你能够执行 SSTable 任务，例如转储表的内容、打印表的元数据、将一个表拆分为多个表，以及列出表的
    SSTable 文件。

    *   `nodetool` 实用程序：`nodetool` 实用程序是一个命令行工具，用于监控和管理集群。你将在第 2 章开始使用 `nodetool`，到本书结束时，你将学到每一个
    `nodetool` 命令选项。

    *   `cassandra-stress` 工具：这是一个压力测试实用程序，可用于对集群进行基准测试和负载测试。该工具对于理解数据库的可扩展性和优化数据模型特别有用。'
- fmt: '### Acquiring Parallel Remote Tools


    Cassandra is a distributed database, and a cluster can often use dozens and even
    thousands of nodes. For those of you coming from a single-node-database relational
    database world, this will probably come as a major surprise.


    It’s a good idea for you to learn to use a distributed shell tool. There are several
    distributed SSH tools, such as `parallel SSH` and `Cluster SSH`, that enable SSH
    access to multiple nodes.


    You will also benefit from using a tool such as `pdsh` (parallel distributed shell)
    to simultaneously move files and run commands on multiple nodes.


    If you’re dealing with more than a handful of nodes (say more than 8 or 10), it’s
    a good idea to use a tool such as `Chef` or `Ansible` to perform many operations.


    ### Understanding Failure Scenarios in a Cassandra Database


    Losing a disk is somewhat of a rare event when managing traditional databases,
    since most of them run on enterprise-grade hardware. Cassandra, as all big data,
    runs on commodity hardware. Experiencing a disk or even a node failure isn’t a
    rare event in the big data world.


    A Cassandra administrator needs to know how to handle node failures and how to
    expand the node capacity by adding nodes on demand.


    When operations fail due to updates and writes not being synchronized correctly
    across the cluster, administrators run a “repair” operation, an operation that’s
    unique to Cassandra.


    Everything in Cassandra is Java-based, so knowing how to read Java error stacks
    and trace files is critical. Learning about common Java exceptions, such as out-of-memory
    (`OOM`) errors and null pointer errors, helps.


    ### Monitoring and Alerting


    You can monitor and manage Cassandra, which is based on the Java language, through
    the Java Management Extensions (`JMX`).


    It’s more common to manage and monitor a Cassandra cluster through the `nodetool`
    utility offered by Cassandra. `Nodetool` is `JMX`-compliant, and you can use it
    to get various Cassandra metrics and to perform common tasks such as adding and
    decommissioning nodes. You can also use other `JMX` tools such as `JConsole` to
    perform various tasks.


    ### Tuning the Java Virtual Machine


    Cassandra is written in Java, and everything in Cassandra runs inside a Java Virtual
    Machine (`JVM`). Traditional database administration really doesn’t require a
    knowledge of a `JVM`. However, that knowledge is critical when dealing with Cassandra
    databases. Chapter [11](#A436674_1_En_11_Chapter.html) introduces the concepts
    underlying `JVM` tuning and how to manage garbage collection (the most important
    area of tuning a `JVM`).


    In the following section, I introduce the architecture of Cassandra plus several
    interesting concepts and key terms that you’ll encounter during the rest of the
    book.


    ## A Quick Introduction to the Architecture of Cassandra


    Cassandra is a distributed database system. It distributes data among multiple
    nodes organized as a cluster to ensure that data is accessible even when there
    are system and hardware failures.


    The nodes in a Cassandra cluster use a peer-to-peer communication protocol to
    exchange their state information.


    Cassandra table rows are stored in tables, each with a mandatory primary key.
    A keyspace is a logical entity to group a set of tables, usually belonging to
    a single application. You access the data stored in the tables via the `CQL` language
    constructs, which use a similar syntax to that of `SQL`. You can access `CQL`
    through `cqlsh` and via drivers for application languages.


    Cassandra writes all data first to a log to ensure that the data is durable in
    the event of failures. It then writes the data to in-memory structures that act
    as a cache, and when the cache gets full, flushes the data to disk into data files.


    Cassandra automatically partitions all data and replicates it however many times
    you need. It uses various repair processes to ensure that the data across the
    nodes becomes consistent over time.


    Periodically, Cassandra compacts the tables stored in the data files on disk,
    discarding any obsolete data it finds.


    Cassandra randomly assigns client read and write requests to the cluster’s nodes,
    with the initial node to which the client connects serving as the coordinator
    for that operation.


    ### Understanding Cassandra-Specific Concepts


    To master Cassandra administration, you should learn several Cassandra-specific
    structures and concepts, such as nodes and rings, commit logs, memtables, `SSTables`,
    keyspaces, index files, and bloom filters.


    It’s a good idea to start with a quick description of the essential high-level
    Cassandra structures.


    *   `Node`: A node is a server where a Cassandra instance runs. This is where
    Cassandra stores your data. You can run Cassandra on just a single node when starting
    out with the database, but all real-life Cassandra environments have a bunch of
    nodes, since Cassandra is designed for big data processing.

    *   `Datacenter`: The datacenter is a somewhat of a misleading term, as it has
    nothing to do with the term data center as you use it in everyday parlance, which
    refers to a physical or virtual data center of an organization. A Cassandra datacenter
    is a set of nodes that you configure as a group for replication proposes. Thus,
    you can view a datacenter as a synonym for a replication group. You use a datacenter
    to group a set of nodes that have the same replication level. A datacenter can
    be physical or logical. Typically, clients write to a local datacenter, which
    asynchronously replicates the data to other datacenters.

    *   `Cluster`: A Cassandra cluster is a set of one or more datacenters, and it
    can span physical locations.


    Inside a Cassandra database, you need to understand the following key structures.


    *   `Commit Log`: Cassandra writes the data in memory to a commit log for durability.
    Since the database writes every write first to the commit log, it serves as a
    secure recovery mechanism and ensures that no writes are lost due to server or
    other failures.

    *   `Memtables`: After writing new data to the commit log, Cassandra writes that
    data to the memtables, which are data structures that live only in memory.

    *   `SSTable`: A sorted string table (`SSTable`) is an immutable data file to
    which Cassandra writes a memtable. Cassandra flushes all the data in the memtables
    to the `SSTables` once the memtables reach a threshold value.

    *   `CQL` Table: A `CQL` table is a set of ordered columns fetched by table row.
    Each table consists of a set of columns and a primary key, and it’s the `CQL`
    tables that you query to retrieve data from a Cassandra database.


    **Tip**


    It is not a good idea to use too many keyspaces or tables. Both entities have
    a `JVM` memory overhead. Each table uses approximately 1MB of memory, and an useful
    rule of thumb is to use no more than 1,000 tables per cluster, ideally just 500.


    Cassandra uses several unique concepts and associated terminology. I think it’s
    a good idea to get an overview of the concepts and the terminology before you
    plunge into the internals of the database in the following chapters.


    Many of the terms and concepts I explain in the following sections are related
    to the management of a distributed database; there are various entities and strategies
    that Cassandra uses to manage and distribute data among multiple nodes, and how
    the nodes maintain awareness of the other nodes in the cluster.


    #### Peers and Coordinators


    All nodes in a Cassandra cluster are peers. A client’s request can go randomly
    to any of the nodes in a cluster. When a client connects to one of the nodes in
    a cluster and issues a read or write request, that node will act as the coordinator
    for that operation.


    The coordinator is a proxy between the client and the nodes (replicas) that own
    the data that the client’s application requests. The coordinator node for a read
    or write operation determines to which node it should assign the request. It considers
    the partitioner you’ve configured and the replica’s placement strategy.'
