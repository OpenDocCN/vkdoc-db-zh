- fmt: "# 6. Introduction to the Cassandra Query Language\n\nThis chapter provides\
    \ a quick summary of the Cassandra Query Language (CQL).\n\nUnderstanding how\
    \ to perform various types of DML (data manipulation language ) operations such\
    \ as selecting, inserting, and updating data is critical, and you’ll learn the\
    \ intricacies of Cassandra’s DML operations. Understanding DDL operations such\
    \ as creating and removing objects is important, and this chapter explains how\
    \ to perform various types of DDL operations.\n\nThe chapter shows you how to\
    \ create structures such as keyspaces and tables. You’ll learn how to create primary\
    \ keys and you’ll examine the role of secondary indexes in Cassandra. Materialized\
    \ views are a better alternative to secondary indexes and you’ll learn how to\
    \ work with them.\n\nI review the various CQL data types including advanced data\
    \ types such as collections, types, and user-defined types (UDTs) .\n\nThe chapter\
    \ also explains user-defined functions (UDFs) and user-defined aggregates (UDAs)\
    \ .\n\n## Working with Keyspaces\n\nCassandra uses keyspaces, which are logical\
    \ entities, to group tables. A keyspace is somewhat like a named database that\
    \ you use in a relational database system . However, the real purpose of a keyspace\
    \ is to act as a namespace that specifies how Cassandra replicates data. This\
    \ means that if you have different sets of data that differ in their replication\
    \ requirements, you can use different keyspaces to store the data.\n\nA keyspace\
    \ is a logical structure where Cassandra stores not only table data, but also\
    \ all other entities that you create for an application, such as materialized\
    \ views, functions, aggregates, and UDTs.\n\nNote\n\nYou control Cassandra’s data\
    \ replication on a per-keyspace basis.\n\nIn the following sections, I show how\
    \ to manage keyspaces.\n\n### Managing Keyspaces\n\nCassandra stores its data\
    \ in tables and it groups the tables into keyspaces. A keyspace is a logical container,\
    \ and it lets you define options that apply to all the tables in that keyspace.\n\
    \nNote\n\nCassandra recommends that you use a single keyspace for each application.\n\
    \nWhen you refer to a table, you must fully qualify it by providing the keyspace\
    \ in which that table lives. You don’t need to provide the keyspace name if the\
    \ table belongs to the current keyspace. As you’ll learn shortly, you specify\
    \ the current tablespace by executing the `USE` statement.\n\n### Creating a Keyspace\n\
    \nBefore creating a keyspace, you must log into `cqlsh`. Once you do so, run the\
    \ `describe cluster` command to view details about your cluster.\n\n```\n$ cqlsh\n\
    Connected to Test Cluster at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra 3.10 |\
    \ CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\ncqlsh> describe cluster;\n\
    Cluster: Test Cluster\nPartitioner: Murmur3Partitioner\ncqlsh>\n```\n\nYou create\
    \ a keyspace with the `CREATE KEYSPACE` SQL statement. Here’s the syntax of the\
    \ statement:\n\n```\nCREATE  KEYSPACE [IF NOT EXISTS] keyspace_name\nWITH REPLICATION\
    \ = {replication_map}\n[AND DURABLE_WRITES =  true|false] ;\n```\n\nYou can specify\
    \ two options when creating a keyspace : the first is `replication` and the second\
    \ is `durable_writes`. Here’s what the two options mean:\n\n*   `replication`:\
    \ This is a mandatory option that specifies the replica placement strategy and\
    \ the number of replicas. The `replication_map` attribute allows you to specify\
    \ then number of copies of the data in a datacenter. The `replication` option\
    \ must contain the sub-option `'class'`, which specifies the replication strategy.\
    \ A replication strategy tells Cassandra where it should store copies of the data\
    \ in this keyspace across the cluster’s datacenters and racks. There are two possible\
    \ replication strategies:\n    *   `SimpleStrategy`: As its name indicates, this\
    \ uses a simple replication strategy by setting the same replication factor cluster-wide\
    \ for all data centers within the cluster. Here’s an example:\n\n```\n       \
    \ {'class': 'SimpleStrategy', 'replication_factor' : 3};\n        ```\n\nIf you\
    \ are running a test cluster with just a single node, your replication factor\
    \ must be 1. `SimpleStrategy` is only good for development and proof-of-concept\
    \ uses . For production purposes, you must use `NetworkTopologyStrategy`. Tip Never\
    \ use a replication factor of 1 for storing data that you can’t afford to lose!\n\
    \    *   `NetworkTopologyStrategy`: Lets you specify a more complex replication\
    \ strategy by allowing you to set the replication factor separately for each data\
    \ center. Example:\n\n```\n        {'class': 'NetworkTopologyStrategy', 'DC1'\
    \ : 1, 'DC2' : 3}\n        ```\n\nYou must specify a datacenter name in the snitch\
    \ properties file or use a single datacenter named datacenter1 to use `NetworkTopologyStrategy`.\
    \ The second part of the `replication` option allows you to set the number of\
    \ copies of data in this keyspace by configuring a value for the `replication_factor`\
    \ attribute.\n*   `durable_writes`: Tells Cassandra whether it ought to use the\
    \ commit log for any updates in the current keyspace . The default value is `true`\
    \ and you should use this value in production databases. You can bypass the writing\
    \ of changes to the commit log first by specifying `false` as the value for `durable_writes`.\
    \ This will speed up the writes to the tables in this keyspace, but should the\
    \ node go down before the database flushes the memtables to the SSTables, you\
    \ risk losing the data.\n\nCaution\n\nDon’t disable `durable_writes` when you\
    \ configure `SimpleStrategy` for replication.\n\nHere’s an example that shows\
    \ how to create a keyspace named cycling:\n\n```\ncqlsh> CREATE KEYSPACE IF NOT\
    \ EXISTS cycling\nWITH REPLICATION = { 'class' : 'NetworkTopologyStrategy',\n\
    'datacenter1' : 3 };\ncqlsh>\n```\n\nIf there are no errors, you can be sure that\
    \ the database created the keyspace you want. You can run the `describe keyspaces`\
    \ command to ascertain that the database did indeed create the keyspace.\n\n```\n\
    cqlsh> describe keyspaces;\ncycling  system_schema  system_auth  system  system_distributed\
    \  system_traces\ncqlsh>\n```\n\nAs you can tell, the `IF NOT EXISTS` part of\
    \ the `CREATE KEYSPACE` statement is optional and helps avoid an error should\
    \ the keyspace `cycling` already exist.\n\nNote\n\nA keyspace is the defining\
    \ container for replication.\n\nYou can see the new keyspace `cycling` in the\
    \ list of keyspaces shown by the database.\n\nNext, you can execute the `describe\
    \ cycling` command to view details about this keyspace.\n\n```\ncqlsh> describe\
    \ cycling;\nCREATE KEYSPACE cycling WITH replication = {'class': 'NetworkTopologyStrategy',\
    \ 'datacenter1': '3'}  AND durable_writes = true;\ncqlsh>\n```\n\nCassandra stores\
    \ the history of all your `nodetool` and `cqlsh` commands in separate files in\
    \ the `$CASSANDRA_USER/.cassandra` directory, with the user being the one that\
    \ started the cluster.\n\n```\n$ ls -altr\ndrwx------ 6 root root 4096 May 26\
    \ 07:25 ..\n-rw-r--r-- 1 root root  127 Jun 23 10:13 nodetool.history\n-rw-------\
    \ 1 root root 1308 Jun 24 07:24 cqlsh_history\ndrwxr-xr-x 2 root 4096 Jun 24 07:24\
    \ .\n$\n```\n\n### Creating a Keyspace in a Cluster with Multiple Datacenters\n\
    \nYou can create a keyspace with a different replication factor for each of the\
    \ datacenters, as shown in the following example:\n\n```\ncqlsh> CREATE KEYSPACE\
    \ \"Cycling\"\nWITH REPLICATION = {\n'class' : 'NetworkTopologyStrategy',\n'datacenter1'\
    \  : 3 ,\n'datacenter2 ',  2 ,\n'datacenter3' :, 1 ,\n};\n```\n\nNote\n\nObjects\
    \ such as tables, functions, and UDTs are bound to a specific keyspace. To work\
    \ with the objects, you must either specify the keyspace name each time you access\
    \ an object or make that keyspace your current keyspace.\n\n#### Altering a Keyspace\n\
    \nOccasionally you may want to alter a keyspace, meaning you want to change one\
    \ of the two properties that you can set when creating a keyspace. These two properties,\
    \ which I described in the “Creating a Keyspace” section, are `replication` and\
    \ `durable_writes`."
  raw: "# 6. Introduction to the Cassandra Query Language\n\nThis chapter provides\
    \ a quick summary of the Cassandra Query Language (CQL).\n\nUnderstanding how\
    \ to perform various types of DML (data manipulation language ) operations such\
    \ as selecting, inserting, and updating data is critical, and you’ll learn the\
    \ intricacies of Cassandra’s DML operations. Understanding DDL operations such\
    \ as creating and removing objects is important, and this chapter explains how\
    \ to perform various types of DDL operations.\n\nThe chapter shows you how to\
    \ create structures such as keyspaces and tables. You’ll learn how to create primary\
    \ keys and you’ll examine the role of secondary indexes in Cassandra. Materialized\
    \ views are a better alternative to secondary indexes and you’ll learn how to\
    \ work with them.\n\nI review the various CQL data types including advanced data\
    \ types such as collections, types, and user-defined types (UDTs) .\n\nThe chapter\
    \ also explains user-defined functions (UDFs) and user-defined aggregates (UDAs)\
    \ .\n\n## Working with Keyspaces\n\nCassandra uses keyspaces, which are logical\
    \ entities, to group tables. A keyspace is somewhat like a named database that\
    \ you use in a relational database system . However, the real purpose of a keyspace\
    \ is to act as a namespace that specifies how Cassandra replicates data. This\
    \ means that if you have different sets of data that differ in their replication\
    \ requirements, you can use different keyspaces to store the data.\n\nA keyspace\
    \ is a logical structure where Cassandra stores not only table data, but also\
    \ all other entities that you create for an application, such as materialized\
    \ views, functions, aggregates, and UDTs.\n\nNote\n\nYou control Cassandra’s data\
    \ replication on a per-keyspace basis.\n\nIn the following sections, I show how\
    \ to manage keyspaces.\n\n### Managing Keyspaces\n\nCassandra stores its data\
    \ in tables and it groups the tables into keyspaces. A keyspace is a logical container,\
    \ and it lets you define options that apply to all the tables in that keyspace.\n\
    \nNote\n\nCassandra recommends that you use a single keyspace for each application.\n\
    \nWhen you refer to a table, you must fully qualify it by providing the keyspace\
    \ in which that table lives. You don’t need to provide the keyspace name if the\
    \ table belongs to the current keyspace. As you’ll learn shortly, you specify\
    \ the current tablespace by executing the `USE` statement.\n\n## Creating a Keyspace\n\
    \nBefore creating a keyspace, you must log into cqlsh. Once you do so, run the\
    \ `describe cluster` command to view details about your cluster.\n\n```\n$ cqlsh\n\
    Connected to Test Cluster at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra 3.10 |\
    \ CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\ncqlsh> describe cluster;\n\
    Cluster: Test Cluster\nPartitioner: Murmur3Partitioner\ncqlsh>\n```\n\nYou create\
    \ a keyspace with the `CREATE KEYSPACE` SQL statement. Here’s the syntax of the\
    \ statement:\n\n```\nCREATE  KEYSPACE [IF NOT EXISTS] keyspace_name\nWITH REPLICATION\
    \ = {replication_map}\n[AND DURABLE_WRITES =  true|false] ;\n```\n\nYou can specify\
    \ two options when creating a keyspace : the first is `replication` and the second\
    \ is `durable_writes`. Here’s what the two options mean:\n\n*   `replication`:\
    \ This is a mandatory option that specifies the replica placement strategy and\
    \ the number of replicas. The `replication_map` attribute allows you to specify\
    \ then number of copies of the data in a datacenter. The `replication` option\
    \ must contain the sub-option `'class'`, which specifies the replication strategy.\
    \ A replication strategy tells Cassandra where it should store copies of the data\
    \ in this keyspace across the cluster’s datacenters and racks. There are two possible\
    \ replication strategies:\n    *   `SimpleStrategy`: As its name indicates, this\
    \ uses a simple replication strategy by setting the same replication factor cluster-wide\
    \ for all data centers within the cluster. Here’s an example:\n\n```\n       \
    \ {'class': 'SimpleStrategy', 'replication_factor' : 3};\n        ```\n\nIf you\
    \ are running a test cluster with just a single node, your replication factor\
    \ must be 1\\. `SimpleStrategy` is only good for development and proof-of-concept\
    \ uses . For production purposes, you must use `NetworkTopologyStrategy`. Tip Never\
    \ use a replication factor of 1 for storing data that you can’t afford to lose!\n\
    \    *   `NetworkTopologyStrategy`: Lets you specify a more complex replication\
    \ strategy by allowing you to set the replication factor separately for each data\
    \ center. Example:\n\n```\n        {'class': 'NetworkTopologyStrategy', 'DC1'\
    \ : 1, 'DC2' : 3}\n        ```\n\nYou must specify a datacenter name in the snitch\
    \ properties file or use a single datacenter named datacenter1 to use `NetworkTopologyStrategy`.\
    \ The second part of the `replication` option allows you to set the number of\
    \ copies of data in this keyspace by configuring a value for the `replication_factor`\
    \ attribute.\n*   `durable_writes`: Tells Cassandra whether it ought to use the\
    \ commit log for any updates in the current keyspace . The default value is `true`\
    \ and you should use this value in production databases. You can bypass the writing\
    \ of changes to the commit log first by specifying `false` as the value for `durable_writes`.\
    \ This will speed up the writes to the tables in this keyspace, but should the\
    \ node go down before the database flushes the memtables to the SSTables, you\
    \ risk losing the data.\n\nCaution\n\nDon’t disable `durable-writes` when you\
    \ configure `SimpleStrategy` for replication.\n\nHere’s an example that shows\
    \ how to create a keyspace named cycling:\n\n```\ncqlsh> CREATE KEYSPACE IF NOT\
    \ EXISTS cycling\nWITH REPLICATION = { 'class' : 'NetworkTopologyStrategy',\n\
    'datacenter1' : 3 };\ncqlsh>\n```\n\nIf there are no errors, you can be sure that\
    \ the database created the keyspace you want. You can run the `describe` `keyspaces`\
    \ command to ascertain that the database did indeed create the keyspace.\n\n```\n\
    cqlsh> describe keyspaces;\ncycling  system_schema  system_auth  system  system_distributed\
    \  system_traces\ncqlsh>\n```\n\nAs you can tell, the `IF NOT EXISTS` part of\
    \ the `CREATE KEYSPACE` statement is optional and helps avoid an error should\
    \ the keyspace cycling already exist.\n\nNote\n\nA keyspace is the defining container\
    \ for replication.\n\nYou can see the new keyspace cycling in the list of keyspaces\
    \ shown by the database.\n\nNext, you can execute the `describe cycling` command\
    \ to view details about this keyspace.\n\n```\ncqlsh> describe cycling;\nCREATE\
    \ KEYSPACE cycling WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1':\
    \ '3'}  AND durable_writes = true;\ncqlsh>\n```\n\nCassandra stores the history\
    \ of all your nodetool and cqlsh commands in separate files in the `$CASSANDRA_USER/.cassandra`\
    \ directory, with the user being the one that started the cluster.\n\n```\n$ ls\
    \ -altr\ndrwx------ 6 root root 4096 May 26 07:25 ..\n-rw-r--r-- 1 root root \
    \ 127 Jun 23 10:13 nodetool.history\n-rw------- 1 root root 1308 Jun 24 07:24\
    \ cqlsh_history\ndrwxr-xr-x 2 root root 4096 Jun 24 07:24 .\n$\n```\n\n### Creating\
    \ a Keyspace in a Cluster with Multiple Datacenters\n\nYou can create a keyspace\
    \ with a different replication factor for each of the datacenters, as shown in\
    \ the following example:\n\n```\ncqlsh> CREATE KEYSPACE \"Cycling\"\nWITH REPLICATION\
    \ = {\n'class' : 'NetworkTopologyStrategy',\n'datacenter1'  : 3 ,\n'datacenter2\
    \ ',  2 ,\n'datacenter3' :, 1 ,\n};\n```\n\nNote\n\nObjects such as tables, functions,\
    \ and UDTs are bound to a specific keyspace. To work with the objects, you must\
    \ either specify the keyspace name each time you access an object or make that\
    \ keyspace your current keyspace.\n\n#### Altering a Keyspace\n\nOccasionally\
    \ you may want to alter a keyspace, meaning you want to change one of the two\
    \ properties that you can set when creating a keyspace. These two properties,\
    \ which I described in the “Creating a Keyspace” section, are `replication` and\
    \ `durable_writes`."
  trans: "# 6. Cassandra 查询语言简介\n\n本章对 Cassandra 查询语言（CQL）进行了快速总结。\n\n理解如何执行各种类型的\
    \ DML（数据操作语言）操作至关重要，例如选择、插入和更新数据，您将学习到 Cassandra DML 操作的复杂之处。理解 DDL 操作（如创建和删除对象）也很重要，本章将解释如何执行各种类型的\
    \ DDL 操作。\n\n本章将展示如何创建键空间和表等结构。您将学习如何创建主键，并研究二级索引在 Cassandra 中的作用。物化视图是二级索引的更佳替代方案，您将学习如何使用它们。\n\
    \n我回顾了各种 CQL 数据类型，包括高级数据类型，如集合、类型和用户定义类型（UDT）。\n\n本章还解释了用户定义函数（UDF）和用户定义聚合（UDA）。\n\
    \n## 使用键空间\n\nCassandra 使用键空间（keyspace）这种逻辑实体来分组表。键空间有点类似于关系数据库系统中使用的命名数据库。然而，键空间的真正目的是充当命名空间，用于指定\
    \ Cassandra 如何复制数据。这意味着，如果您的数据集在复制要求上有所不同，您可以使用不同的键空间来存储数据。\n\n键空间是一个逻辑结构，Cassandra\
    \ 不仅在其中存储表数据，还存储您为应用程序创建的所有其他实体，例如物化视图、函数、聚合和 UDT。\n\n注意\n您可以在每个键空间的基础上控制 Cassandra\
    \ 的数据复制。\n\n在以下部分中，我将展示如何管理键空间。\n\n### 管理键空间\n\nCassandra 将其数据存储在表中，并将表分组到键空间中。键空间是一个逻辑容器，您可以为其定义适用于该键空间中所有表的选项。\n\
    \n注意\nCassandra 建议您为每个应用程序使用单个键空间。\n\n当您引用一个表时，必须通过提供该表所在的键空间来完全限定它。如果表属于当前键空间，则无需提供键空间名称。您很快会学到，可以通过执行\
    \ `USE` 语句来指定当前键空间。\n\n### 创建键空间\n\n在创建键空间之前，您必须登录 `cqlsh`。登录后，运行 `describe cluster`\
    \ 命令以查看集群的详细信息。\n\n```\n$ cqlsh\nConnected to Test Cluster at 127.0.0.1:9042.\n\
    [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP\
    \ for help.\ncqlsh> describe cluster;\nCluster: Test Cluster\nPartitioner: Murmur3Partitioner\n\
    cqlsh>\n```\n\n您使用 `CREATE KEYSPACE` SQL 语句创建键空间。该语句的语法如下：\n\n```\nCREATE  KEYSPACE\
    \ [IF NOT EXISTS] keyspace_name\nWITH REPLICATION = {replication_map}\n[AND DURABLE_WRITES\
    \ =  true|false] ;\n```\n\n创建键空间时可以指定两个选项：第一个是 `replication`，第二个是 `durable_writes`。这两个选项的含义如下：\n\
    \n*   `replication`：这是一个强制选项，用于指定副本放置策略和副本数量。`replication_map` 属性允许您指定数据中心中数据的副本数量。`replication`\
    \ 选项必须包含子选项 `'class'`，用于指定复制策略。复制策略告诉 Cassandra 应在此键空间的数据中心和机架中存储数据副本的位置。有两种可能的复制策略：\n\
    \    *   `SimpleStrategy`：顾名思义，它通过为集群内所有数据中心设置相同的集群范围复制因子来使用简单的复制策略。示例如下：\n\n\
    ```\n        {'class': 'SimpleStrategy', 'replication_factor' : 3};\n        ```\n\
    \n如果您运行的是单节点测试集群，复制因子必须为 1。`SimpleStrategy` 仅适用于开发和概念验证用途。出于生产目的，必须使用 `NetworkTopologyStrategy`。提示 切勿使用复制因子\
    \ 1 来存储您无法承受丢失的数据！\n    *   `NetworkTopologyStrategy`：允许您通过为每个数据中心单独设置复制因子来指定更复杂的复制策略。示例：\n\
    \n```\n        {'class': 'NetworkTopologyStrategy', 'DC1' : 1, 'DC2' : 3}\n  \
    \      ```\n\n要使用 `NetworkTopologyStrategy`，您必须在 snitch 属性文件中指定数据中心名称，或使用名为 `datacenter1`\
    \ 的单一数据中心。`replication` 选项的第二部分允许您通过为 `replication_factor` 属性配置值来设置此键空间中数据的副本数量。\n\
    *   `durable_writes`：告诉 Cassandra 是否应对当前键空间中的任何更新使用提交日志。默认值为 `true`，在生产数据库中应使用此值。通过为\
    \ `durable_writes` 指定 `false` 作为值，可以绕过首先将更改写入提交日志。这将加快对此键空间中表的写入速度，但如果在数据库将内存表刷新到\
    \ SSTable 之前节点发生故障，您将面临数据丢失的风险。\n\n警告\n当您为复制配置 `SimpleStrategy` 时，请勿禁用 `durable_writes`。\n\
    \n以下示例展示了如何创建名为 `cycling` 的键空间：\n\n```\ncqlsh> CREATE KEYSPACE IF NOT EXISTS cycling\n\
    WITH REPLICATION = { 'class' : 'NetworkTopologyStrategy',\n'datacenter1' : 3 };\n\
    cqlsh>\n```\n\n如果没有错误，您可以确定数据库已创建所需的键空间。您可以运行 `describe keyspaces` 命令来确认数据库确实创建了该键空间。\n\
    \n```\ncqlsh> describe keyspaces;\ncycling  system_schema  system_auth  system\
    \  system_distributed  system_traces\ncqlsh>\n```\n\n如您所见，`CREATE KEYSPACE` 语句中的\
    \ `IF NOT EXISTS` 部分是可选的，有助于避免在键空间 `cycling` 已存在时发生错误。\n\n注意\n键空间是定义复制的容器。\n\n\
    您可以在数据库显示的键空间列表中看到新的键空间 `cycling`。\n\n接下来，您可以执行 `describe cycling` 命令来查看此键空间的详细信息。\n\
    \n```\ncqlsh> describe cycling;\nCREATE KEYSPACE cycling WITH replication = {'class':\
    \ 'NetworkTopologyStrategy', 'datacenter1': '3'}  AND durable_writes = true;\n\
    cqlsh>\n```\n\nCassandra 将所有 `nodetool` 和 `cqlsh` 命令的历史记录存储在 `$CASSANDRA_USER/.cassandra`\
    \ 目录中的单独文件中，用户是启动集群的用户。\n\n```\n$ ls -altr\ndrwx------ 6 root root 4096 May 26\
    \ 07:25 ..\n-rw-r--r-- 1 root root  127 Jun 23 10:13 nodetool.history\n-rw-------\
    \ 1 root root 1308 Jun 24 07:24 cqlsh_history\ndrwxr-xr-x 2 root 4096 Jun 24 07:24\
    \ .\n$\n```\n\n### 在具有多个数据中心的集群中创建键空间\n\n您可以创建一个键空间，为每个数据中心设置不同的复制因子，如下例所示：\n\n\
    ```\ncqlsh> CREATE KEYSPACE \"Cycling\"\nWITH REPLICATION = {\n'class' : 'NetworkTopologyStrategy',\n\
    'datacenter1'  : 3 ,\n'datacenter2 ',  2 ,\n'datacenter3' :, 1 ,\n};\n```\n\n\
    注意\n表、函数和 UDT 等对象绑定到特定的键空间。要使用这些对象，您必须在每次访问对象时指定键空间名称，或者将该键空间设为您的当前键空间。\n\n####\
    \ 修改键空间\n\n有时您可能希望修改键空间，这意味着您想更改创建键空间时可以设置的两个属性之一。这两个属性（我在“创建键空间”部分已描述）是 `replication`\
    \ 和 `durable_writes`。"
- fmt: "#### Changing the Replication Factor\n\nIf you want to change the replication\
    \ factor of a keyspace, you can do it by executing the `ALTER KEYSPACE` command,\
    \ which has the following syntax:\n\n```\nALTER KEYSPACE \"KeySpace Name\"\nWITH\
    \ replication = {'class': 'Strategy name', 'replication_factor' : 'No.Of replicas'};\n\
    ```\n\n**Note**\n\nYou set the replication strategy at the keyspace level when\
    \ creating the keyspace or later by modifying the keyspace.\n\nHere's an example\
    \ that shows how to change the replication from 1 to 3, by altering a keyspace\
    \ named `cycling`:\n\n```\ncqlsh> ALTER KEYSPACE cycling\nWITH replication = {'class':'SimpleStrategy',\n\
    'replication_factor': 3};\n```\n\n**Note**\n\nYou can't alter the name of a keyspace.\n\
    \nIf you've configured `NetworkTopologyStrategy`, you need to do more. Since the\
    \ change in the replication factor affects all the nodes that the keyspace will\
    \ replicate to, or not replicate to, you must also prepare the affected nodes\
    \ for the change in the replication factor. Here are the procedures for changing\
    \ the replication factor in this situation:\n\n1.  Change the replication level\
    \ in all datacenters.\n\n    ```\n    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION\
    \ =\n    {'class' : 'NetworkTopologyStrategy', 'dc1' : 3, 'dc2' :2};\n    ```\n\
    \n2.  Run the `nodetool repair` command as shown here to perform a full repair\
    \ of the keyspace:\n\n    ```\n    $ nodetool repair -full\n    ```\n\nOnce the\
    \ repair completes on a node, start the repair on the next node.\n\n### The Need\
    \ for Running the nodetool repair Command\n\nWhen you raise the replication factor,\
    \ the change doesn't automatically take effect on all nodes. After you raise the\
    \ replication factor for a cluster, you must run the `nodetool repair` command\
    \ on all the nodes in that cluster. Similarly, you must run the `nodetool repair`\
    \ command on all nodes in a data center when you raise the replication factor\
    \ for a data center.\n\nRunning the `nodetool repair` command tells Cassandra\
    \ to create the additional replicas it needs to satisfy the replication factor\
    \ you configure.\n\n**Tip**\n\nThe write throughput of the cluster is inversely\
    \ related to the replication factor.\n\nIf you lower the replication factor, you\
    \ must run the `nodetool cleanup` command afterwards, whether the change is in\
    \ a datacenter or in the cluster. This will enable Cassandra to free up space\
    \ occupied by the replicas it doesn't need any longer.\n\n### Preventing a Keyspace\
    \ from Sending Replicas to Some Data Centers\n\nSometimes you may want to prevent\
    \ a keyspace from writing replicas only in some datacenters, or allow a keyspace\
    \ to write to just one specific datacenter. By setting the replication factor\
    \ to zero (`0`), you can keep a keyspace from sending replicas to a specific datacenter.\
    \ The following is an example:\n\n```\ncqlsh> ALTER KEYSPACE cycling\nWITH REPLICATION\
    \ = {'class' : 'NetworkTopologyStrategy', 'dc1' :3,,\n'dc2': 0, 'dc3': 3 };\n\
    ```\n\nThis command excludes the datacenter `DC2` (by setting the replication\
    \ factor to `0`).\n\n#### Altering the Durable Writes Property\n\nThe `ALTER KEYSPACE`\
    \ command also lets you change the `durable_writes` property. The following is\
    \ an example that shows how to change the `durable_writes` property of a keyspace:\n\
    \n```\ncqlsh> ALTER KEYSPACE cycling\nWITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
    \ 'datacenter1'\n: 3}\nAND DURABLE_WRITES = true;\n```\n\nYou can confirm that\
    \ the changes you've made have stuck by running the following command.\n\n```\n\
    cqlsh> SELECT * FROM system.schema_keyspaces;\nkeyspace_name | durable_writes\
    \ | strategy_class | strategy_options\n----------------+----------------+-------------------------------------------\n\
    cycling | True | org.apache.cassandra.locator.NetworkTopologyStrategy | {\"datacenter1\"\
    :\"3\"}\nmykeyspace | True | org.apache.cassandra.locator.SimpleStrategy | \"\
    replication_factor\":\"4\"}\n...\n```\n\n### Repairing a Keyspace\n\nWhen you\
    \ add a datacenter, be sure to run the following `nodetool repair` command to\
    \ perform a full repair of the keyspace:\n\n```\n$ nodetool repair –full cycling;\n\
    ```\n\n#### Specifying the Keyspace You Want to Use\n\nOften, you're working within\
    \ a certain keyspace and you want to move to a different keyspace and make the\
    \ new keyspace your current or working keyspace. You must specify the keyword\
    \ `USE` (what else?) to make a keyspace your current default keyspace.\n\nIn the\
    \ following example, you want a keyspace named `myKeyspace` to be the default\
    \ keyspace:\n\n```\ncqlsh> USE myKeySpace;\ncqlsh:myKeySpace>\n```\n\n### Using\
    \ the Keyspace Qualifier\n\nWhen your code deals with multiple keyspaces, it becomes\
    \ cumbersome to issue the `USE <KEYSPACE>` command. In these situations, you can\
    \ simply specify the keyspace qualifier instead of having to execute the `USE\
    \ <KEYSPACE>` command. Cassandra allows you to specify the keyspace qualifier\
    \ when executing the following statements:\n\n*   `ALTER TABLE`\n*   `CREATE TABLE`\n\
    *   `DELETE`\n*   `INSERT`\n*   `SELECT`\n*   `TRUNCATE`\n*   `UPDATE`\n\nTo specify\
    \ a table in a keyspace, specify the name of the keyspace followed by a period\
    \ and then the table name. The following example shows how to insert data into\
    \ a table named `race_winners`, which is in the `cycling` tablespace.\n\n```\n\
    cqlsh> INSERT INTO cycling.race_winners (race_name, race_position, cyclist_name)\
    \ VALUES (...);\n```\n\n### Removing a Keyspace\n\nRemoving a keyspace is easy.\
    \ Execute the `DROP KEYSPACE` statement to remove a keyspace, as shown here:\n\
    \n```\ncqlsh> DROP KEYSPACE cycling;\ncqlsh>\n```\n\nAs you can see, when you\
    \ issue the `DROP KEYSPACE` statement, Cassandra doesn't say anything; it does\
    \ drop the keyspace, and you can verify that the keyspace is gone by running the\
    \ `DESCRIBE KEYSPACES` command.\n\n```\ncqlsh> DESCRIBE KEYSPACES;\nsystem_traces\
    \  system_schema  system_auth  system  system_distributed\ncqlsh>\n```\n\nWhen\
    \ you remove a keyspace, the database removes all its constituent entities such\
    \ as tables, aggregates, types, and UDFs. Cassandra can automatically back up\
    \ the keyspace if you've set the `auto_snapshot` property in the `cassandra.yaml`\
    \ file.\n\nBy default, the `auto_snapshot` property has the value `true`, which\
    \ means that when you drop a tablespace (or a table), the database automatically\
    \ takes a snapshot of the keyspace (or table). You also have the option of manually\
    \ backing up a keyspace before dropping it, as explained in Chapter [9](#A436674_1_En_9_Chapter.html).\n\
    \n**Note**\n\nDataStax strongly recommends that you leave the default value of\
    \ `true` intact for the `auto_snapshot` property.\n\n### System Keyspaces\n\n\
    Cassandra uses a set of system keyspaces to store details about the configuration\
    \ of the cluster and the objects that are stored in that keyspace.\n\nThe `DESCRIBE\
    \ KEYSPACES` command shows all the system keyspaces in a cluster.\n\n```\ncqlsh>\
    \ DESCRIBE KEYSPACES;\nsystem_traces system_schema  system_auth system  system_distributed\n\
    cqlsh>\n```\n\n**Tip**\n\nBy default, the replication factor for the `system-auth`\
    \ keyspace is set to `1`. DataStax recommends that you set the replication factor\
    \ for the `system-auth` tablespace to the number of nodes in each of the datacenters.\
    \ However, you can set the replication factor for this keyspace to `5` or `7`,\
    \ which offers plenty of redundancy.\n\nThe following is a selective description\
    \ of data stored in various system keyspaces:\n\n*   `system`: This keyspace contains\
    \ tables that contain information pertaining to materialized views, hints, indexes,\
    \ peers, information on partitions, and prepared statements used by drivers.\n\
    *   `system_schema`: This keyspace contains information about table columns and\
    \ indexes, UDFs, triggers, user-defined types, and materialized views.\n*   `system_distributed`:\
    \ This keyspace has a single table named `repair_history`, which stores information\
    \ about keyspace repair activity."
  raw: "#### Changing the Replication Factor\n\nIf you want to change the replication\
    \ factor of a keyspace, you can do it by executing the `ALTER KEYSPACE` command,\
    \ which has the following syntax:\n\n```\nALTER KEYSPACE \"KeySpace Name\"\nWITH\
    \ replication = {'class': 'Strategy name', 'replication_factor' : 'No.Of replicas'};\n\
    ```\n\nNote\n\nYou set the replication strategy at the keyspace level when creating\
    \ the keyspace or later by modifying the keyspace.\n\nHere’s an example that shows\
    \ how to change the replication from 1 to 3, by altering a keyspace named cycling:\n\
    \n```\ncqlsh> ALTER KEYSPACE cycling\nWITH replication = {'class':'SimpleStrategy',\n\
    'replication_factor': 3};\n```\n\nNote\n\nYou can’t alter the name of a keyspace.\n\
    \nIf you’ve configured `NetworkTopologyStrategy`, you need to do more. Since the\
    \ change in the replication factor affects all the nodes that the keyspace will\
    \ replicate to, or not replicate to, you must also prepare the affected nodes\
    \ for the change in the replication factor . Here are the procedures for changing\
    \ the replication factor in this situation:\n\n1.  Change the replication level\
    \ in all datacenters.\n\n    ```\n    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION\
    \ =\n    {'class' : 'NetworkTopologyStrategy', 'dc1' : 3, 'dc2' :2};\n    ```\n\
    \n2.  Run the `nodetool repair` command as shown here to perform a full repair\
    \ of the keyspace:\n\n    ```\n    $ nodetool repair -full\n    ```\n\nOnce the\
    \ repair completes on a node, start the repair on the next node.\n\n### The Need\
    \ for Running the nodetool repair Command\n\nWhen you raise the replication factor,\
    \ the change doesn’t automatically take effect on all nodes. After you raise the\
    \ replication factor for a cluster, you must run the `nodetool repair` command\
    \ on all the nodes in that cluster. Similarly, you must run the `nodetool repair`\
    \ command on all nodes in a data center when you raise the replication factor\
    \ for a data center.\n\nRunning the `nodetool repair` command tells Cassandra\
    \ to create the additional replicas it needs to satisfy the replication factor\
    \ you configure.\n\nTip\n\nThe write throughput of the cluster is inversely related\
    \ to the replication factor.\n\nIf you lower the replication factor, you must\
    \ run the `nodetool cleanup` command afterwards, whether the change is in a datacenter\
    \ or in the cluster. This will enable Cassandra to free up space occupied by the\
    \ replicas it doesn’t need any longer.\n\n### Preventing a Keyspace from Sending\
    \ Replicas to Some Data Centers\n\nSometimes you may want to prevent a keyspace\
    \ from writing replicas only in some datacenters, or allow a keyspace to write\
    \ to just one specific datacenter. By setting the replication factor to zero (0),\
    \ you can keep a keyspace from sending replicas to a specific datacenter. The\
    \ following is an example:\n\n```\ncqlsh> ALTER KEYSPACE cycling\nWITH REPLICATION\
    \ = {'class' : 'NetworkTopologyStrategy', 'dc1' :3,,\n'dc2': 0, 'dc3': 3 };\n\
    ```\n\nThis command excludes the datacenter DC2 (by setting the replication factor\
    \ to 0).\n\n#### Altering the Durable Writes Property\n\nThe `ALTER KEYSPACE`\
    \ command also lets you change the `durable_writes` property. The following is\
    \ an example that shows how to change the `durable_writes` property of a keyspace:\n\
    \n```\ncqlsh> ALTER KEYSPACE cycling\nWITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
    \ 'datacenter1'\n: 3}\nAND DURABLE_WRITES = true;\n```\n\nYou can confirm that\
    \ the changes you’ve made have stuck by running the following command.\n\n```\n\
    cqlsh> SELECT * FROM system.schema_keyspaces;\nkeyspace_name | durable_writes\
    \ | strategy_class | strategy_options\n----------------+----------------+-------------------------------------------\n\
    cycling | True | org.apache.cassandra.locator.NetworkTopologyStrategy | {\"datacenter1\"\
    :\"3\"}\nmykeyspace | True | org.apache.cassandra.locator.SimpleStrategy | \"\
    replication_factor\":\"4\"}\n...\n```\n\n### Repairing a Keyspace\n\nWhen you\
    \ add a datacenter, be sure to run the following `nodetool repair` command to\
    \ perform a full repair of the keyspace:\n\n```\n$ nodetool repair –full cycling;\n\
    ```\n\n#### Specifying the Keyspace You Want to Use\n\nOften, you’re working within\
    \ a certain keyspace and you want to move to a different keyspace and make the\
    \ new keyspace your current or working keyspace. You must specify the keyword\
    \ `USE` (what else?) to make a keyspace your current default keyspace.\n\nIn the\
    \ following example, you want a keyspace named myKeyspace to be the default keyspace:\n\
    \n```\ncqlsh> USE myKeySpace;\ncqlsh:myKeySpace>\n```\n\n### Using the Keyspace\
    \ Qualifier\n\nWhen your code deals with multiple keyspaces, it becomes cumbersome\
    \ to issue the `USE <KEYSPACE>` command. In these situations, you can simply specify\
    \ the keyspace qualifier instead of having to execute the `USE <KEYSPACE>` command.\
    \ Cassandra allows you to specify the keyspace qualifier when executing the following\
    \ statements:\n\n*   `ALTER TABLE`\n*   `CREATE TABLE`\n*   `DELETE`\n*   `INSERT`\n\
    *   `SELECT`\n*   `TRUNCATE`\n*   `UPDATE`\n\nTo specify a table in a keyspace,\
    \ specify the name of the keyspace followed by a period and then the table name.\
    \ The following example shows how to insert data into a table named race_winners,\
    \ which is in the cycling tablespace.\n\n```\ncqlsh> INSERT INTO cycling.race_winners\
    \ (race_name, race_position, cyclist_name) VALUES (...);\n```\n\n## Removing a\
    \ Keyspace\n\nRemoving a keyspace is easy. Execute the `DROP KEYSPACE` statement\
    \ to remove a keyspace, as shown here:\n\n```\ncqlsh> DROP KEYSPACE cycling;\n\
    cqlsh>\n```\n\nAs you can see, when you issue the `DROP KEYSPACE` statement, Cassandra\
    \ doesn’t say anything; it does drop the keyspace, and you can verify that the\
    \ keyspace is gone by running the `DESCRIBE KEYSPACES` command.\n\n```\ncqlsh>\
    \ DESCRIBE KEYSPACES;\nsystem_traces  system_schema  system_auth  system  system_distributed\n\
    cqlsh>\n```\n\nWhen you remove a keyspace, the database removes all its constituent\
    \ entities such as tables, aggregates, types , and UDFs. Cassandra can automatically\
    \ back up the keyspace if you‘ve set the `auto_snapshot` property in the `cassandra.yaml`\
    \ file.\n\nBy default, the `auto_snapshot` property has the value `true`, which\
    \ means that when you drop a tablespace (or a table), the database automatically\
    \ takes a snapshot of the keyspace (or table). You also have the option of manually\
    \ backing up a keyspace before dropping it, as explained in Chapter [9](#A436674_1_En_9_Chapter.html).\n\
    \nNote\n\nDataStax strongly recommends that you leave the default value of `true`\
    \ intact for the `auto_snapshot` property.\n\n### [System Keyspaces](https://www.safaribooksonline.com/library/view/cassandra-the-definitive/9781491933657/ch06.html#idm140182371033296)\n\
    \nCassandra uses a set of system keyspaces to store details about the configuration\
    \ of the cluster and the objects that are stored in that keyspace.\n\nThe `DESCRIBE\
    \ KEYSPACES` command shows all the system keyspaces in a cluster.\n\n```\ncqlsh>\
    \ DESCRIBE KEYSPACES;\nsystem_traces system_schema  system_auth system  system_distributed\n\
    cqlsh>\n```\n\nTip\n\nBy default, the replication factor for the system-auth keyspace\
    \ is set to 1. DataStax recommends that you set the replication factor for the\
    \ system-auth tablespace to the number of nodes in each of the datacenters. However,\
    \ you can set the replication factor for this keyspace to 5 or 7, which offers\
    \ plenty of redundancy.\n\nThe following is a selective description of data stored\
    \ in various system keyspaces :\n\n*   system: This keyspace contains tables that\
    \ contain information pertaining to materialized views, hints, indexes, peers,\
    \ information on partitions, and prepared statements used by drivers.\n*   system_schema:\
    \ This keyspace contains information about table columns and indexes, UDFs, triggers,\
    \ user-defined types, and materialized views.\n*   system_distributed: This keyspace\
    \ has a single table named `repair_history`, which stores information about keyspace\
    \ repair activity."
  trans: "#### 修改复制因子\n\n如果您想更改键空间的复制因子，可以通过执行 `ALTER KEYSPACE` 命令来实现，其语法如下：\n\n```\n\
    ALTER KEYSPACE \"KeySpace Name\"\nWITH replication = {'class': 'Strategy name',\
    \ 'replication_factor' : 'No.Of replicas'};\n```\n\n**注意**\n\n您在创建键空间时或在之后通过修改键空间来设置复制策略。\n\
    \n下面是一个示例，展示了如何通过修改名为 `cycling` 的键空间，将复制因子从 1 更改为 3：\n\n```\ncqlsh> ALTER KEYSPACE\
    \ cycling\nWITH replication = {'class':'SimpleStrategy',\n'replication_factor':\
    \ 3};\n```\n\n**注意**\n\n您不能更改键空间的名称。\n\n如果您配置了 `NetworkTopologyStrategy`，则需要做更多工作。由于复制因子的更改会影响键空间将要复制到或不再复制到的所有节点，您还必须让受影响的节点为复制因子的更改做好准备。以下是这种情况下的操作步骤：\n\
    \n1.  更改所有数据中心的复制级别。\n\n    ```\n    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION\
    \ =\n    {'class' : 'NetworkTopologyStrategy', 'dc1' : 3, 'dc2' :2};\n    ```\n\
    \n2.  如下运行 `nodetool repair` 命令，以对键空间执行完全修复：\n\n    ```\n    $ nodetool repair\
    \ -full\n    ```\n\n在一个节点上完成修复后，开始下一个节点的修复。\n\n### 需要运行 nodetool repair 命令的原因\n\
    \n当您提高复制因子时，更改不会自动在所有节点上生效。提高集群的复制因子后，您必须在该集群的所有节点上运行 `nodetool repair` 命令。同样，当您提高数据中心的复制因子时，也必须在该数据中心的所有节点上运行\
    \ `nodetool repair` 命令。\n\n运行 `nodetool repair` 命令会告知 Cassandra 创建所需的额外副本，以满足您配置的复制因子。\n\
    \n**提示**\n\n集群的写入吞吐量与复制因子成反比。\n\n如果您降低了复制因子，之后必须运行 `nodetool cleanup` 命令，无论更改是在数据中心内还是在集群中。这将使\
    \ Cassandra 能够释放不再需要的副本所占用的空间。\n\n### 防止键空间向某些数据中心发送副本\n\n有时您可能希望阻止键空间仅在某些数据中心写入副本，或者允许键空间仅写入一个特定的数据中心。通过将复制因子设置为零\
    \ (`0`)，您可以阻止键空间向特定数据中心发送副本。示例如下：\n\n```\ncqlsh> ALTER KEYSPACE cycling\nWITH\
    \ REPLICATION = {'class' : 'NetworkTopologyStrategy', 'dc1' :3,,\n'dc2': 0, 'dc3':\
    \ 3 };\n```\n\n此命令排除了数据中心 `DC2`（通过将其复制因子设置为 `0`）。\n\n#### 修改持久写入属性\n\n`ALTER KEYSPACE`\
    \ 命令还允许您更改 `durable_writes` 属性。以下示例展示了如何更改键空间的 `durable_writes` 属性：\n\n```\ncqlsh>\
    \ ALTER KEYSPACE cycling\nWITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
    \ 'datacenter1'\n: 3}\nAND DURABLE_WRITES = true;\n```\n\n您可以通过运行以下命令来确认所做的更改已生效。\n\
    \n```\ncqlsh> SELECT * FROM system.schema_keyspaces;\nkeyspace_name | durable_writes\
    \ | strategy_class | strategy_options\n----------------+----------------+-------------------------------------------\n\
    cycling | True | org.apache.cassandra.locator.NetworkTopologyStrategy | {\"datacenter1\"\
    :\"3\"}\nmykeyspace | True | org.apache.cassandra.locator.SimpleStrategy | \"\
    replication_factor\":\"4\"}\n...\n```\n\n### 修复键空间\n\n当您添加一个数据中心时，请务必运行以下 `nodetool\
    \ repair` 命令来对键空间执行完全修复：\n\n```\n$ nodetool repair –full cycling;\n```\n\n####\
    \ 指定要使用的键空间\n\n通常，您在某个键空间中工作，但希望切换到不同的键空间，并将该新键空间设为当前工作键空间。您必须使用关键字 `USE`（还能是什么？）来使一个键空间成为当前的默认键空间。\n\
    \n在以下示例中，您希望名为 `myKeyspace` 的键空间成为默认键空间：\n\n```\ncqlsh> USE myKeySpace;\ncqlsh:myKeySpace>\n\
    ```\n\n### 使用键空间限定符\n\n当您的代码处理多个键空间时，反复发出 `USE <KEYSPACE>` 命令会变得很麻烦。在这种情况下，您可以简单地指定键空间限定符，而不必执行\
    \ `USE <KEYSPACE>` 命令。Cassandra 允许您在执行以下语句时指定键空间限定符：\n\n*   `ALTER TABLE`\n* \
    \  `CREATE TABLE`\n*   `DELETE`\n*   `INSERT`\n*   `SELECT`\n*   `TRUNCATE`\n\
    *   `UPDATE`\n\n要指定键空间中的表，请先指定键空间的名称，后跟一个句点，然后是表名。以下示例展示了如何将数据插入名为 `race_winners`\
    \ 的表中，该表位于 `cycling` 键空间中。\n\n```\ncqlsh> INSERT INTO cycling.race_winners (race_name,\
    \ race_position, cyclist_name) VALUES (...);\n```\n\n### 移除键空间\n\n移除键空间很简单。执行\
    \ `DROP KEYSPACE` 语句来移除键空间，如下所示：\n\n```\ncqlsh> DROP KEYSPACE cycling;\ncqlsh>\n\
    ```\n\n如您所见，当您发出 `DROP KEYSPACE` 语句时，Cassandra 不会给出任何反馈；它确实删除了该键空间，您可以通过运行 `DESCRIBE\
    \ KEYSPACES` 命令来验证该键空间已不存在。\n\n```\ncqlsh> DESCRIBE KEYSPACES;\nsystem_traces\
    \  system_schema  system_auth  system  system_distributed\ncqlsh>\n```\n\n当您移除一个键空间时，数据库会删除其所有组成实体，如表、聚合、类型和\
    \ UDF。如果您已在 `cassandra.yaml` 文件中设置了 `auto_snapshot` 属性，Cassandra 可以自动备份该键空间。\n\
    \n默认情况下，`auto_snapshot` 属性值为 `true`，这意味着当您删除一个键空间（或表）时，数据库会自动为该键空间（或表）创建一个快照。您也可以选择在删除键空间之前手动备份它，如第\
    \ 9 章所述。\n\n**注意**\n\nDataStax 强烈建议您将 `auto_snapshot` 属性的默认值 `true` 保持不变。\n\n\
    ### 系统键空间\n\nCassandra 使用一组系统键空间来存储有关集群配置以及存储在该键空间中的对象的详细信息。\n\n`DESCRIBE KEYSPACES`\
    \ 命令显示集群中的所有系统键空间。\n\n```\ncqlsh> DESCRIBE KEYSPACES;\nsystem_traces system_schema\
    \  system_auth system  system_distributed\ncqlsh>\n```\n\n**提示**\n\n默认情况下，`system-auth`\
    \ 键空间的复制因子设置为 `1`。DataStax 建议您将 `system-auth` 键空间的复制因子设置为每个数据中心的节点数。不过，您也可以将此键空间的复制因子设置为\
    \ `5` 或 `7`，以提供充足的冗余度。\n\n以下是各种系统键空间中存储数据的简要描述：\n\n*   `system`：此键空间包含一些表，这些表包含有关物化视图、提示、索引、对等节点、分区信息以及驱动程序使用的预处理语句的信息。\n\
    *   `system_schema`：此键空间包含有关表列和索引、UDF、触发器、用户定义类型和物化视图的信息。\n*   `system_distributed`：此键空间只有一个名为\
    \ `repair_history` 的表，用于存储有关键空间修复活动的信息。"
- fmt: '### Getting Cluster Topology from the System Tables


    You can get the cluster topology information such as the IP address of peer nodes,
    the names of the datacenter and racks, and token values by querying the system
    table `PEERS`, as shown here:


    ```

    cqlsh> SELECT * FROM system.peers;

    peer            | data_center | host_id                    | preferred_ip | rack  |
    release_version | rpc_address     | schema_version                       | tokens

    192.168.159.129 |         dc1 | 632fe5cd-26fa-4b8b-9842-182be2f954e5 |         null
    | rack1 |            3.10 | 192.168.159.129 | 86afa796-d883

    ''-1470738432828591905'', ''-1533929660503050360'', ''-1588268933422992241'',
    ''-1790127126337716384'', ''-1795704774997895089'', ''-1933674708843479324'',
    ''-2001904010895819169'', ''-2137322678046758761'', ''-2315125955255423142'',
    ''-2349800311170714405'', ''-239001164349178402'', ''-2439785688421178687'', ''-

    ...

    ```


    ### Getting Information About Functions, Aggregates, and User Types


    Later on in this chapter, you’ll learn about Cassandra’s user-defined entities
    such as UDFs, aggregates, and types. Once you create the user-defined entities,
    you can use the system tables to retrieve information about these entities.


    To retrieve information about UDFs, query the system table `SCHEMA_FUNCTIONS`.


    ```

    cqlsh> SELECT * FROM system.schema_functions;

    ```


    You can get details about the user-defined aggregates by querying the `SCHEMA_AGGREGATES`
    table.


    ```

    cqlsh> SELECT * FROM system.schema_aggregates;

    ```


    Finally, you can query the `SCHEMA_USERTYPES` table to view all user-defined types
    in the database.


    ```

    cqlsh> SELECT * FROM system.schema_usertypes;

    ```


    Now that you know how to work with keyspaces, it’s time to go ahead and use them
    for what they’re meant for: to act as logical repositories for tables and other
    entities by creating a table.


    ### Creating a Table


    A Cassandra CQL table stores rows and it has a name. When you create a table,
    you define the columns for the rows, a mandatory primary key to identify each
    row, and any additional options you may choose.


    You must execute the `CREATE TABLE` statement to create a new table. The core
    syntax for the `CREATE TABLE` statement is as follows:


    ```

    create_table_statement ::=  CREATE TABLE [ IF NOT EXISTS ] table_name

    ''(''

    column_definition

    ( '','' column_definition )*

    [ '','' PRIMARY KEY ''('' primary_key '')'' ]

    '')'' [ WITH table_options ]

    ```


    The following is a typical table creation statement:


    ```

    cqlsh> use cycling;

    cqlsh:cycling> CREATE TABLE loads (

    ...     machine inet,

    ...     cpu int,

    ...     mtime timeuuid,

    ...     load float,

    ...     PRIMARY KEY ((machine, cpu), mtime)

    ...     ) WITH CLUSTERING ORDER BY (mtime DESC);

    cqlsh:cycling>

    ```


    Before you create the table `loads`, you run the command `use cycling` so the
    database will know to create the new table in this keyspace. Alternatively, you
    could have specified `CREATE TABLE cycling.loads`. This will also let the database
    know in which keyspace you want it to place your new table.


    In the table creation statement, the following are the main things you need to
    focus on:

    * Column definitions

    * Primary and partition keys

    * Clustering columns

    * Table options (compact storage and clustering order)


    In the following sections, I briefly review the key entities that are part of
    a table creation statement.


    > **Note**

    >

    > A primary key consists of two things: the first column or columns is the mandatory
    partition key, followed by one or more clustering columns.


    #### Column_definition


    A `column_definition` clause consists of the name of the column and its type,
    as well as two modifiers.

    * **Static**: Declares the column as a static column. A static column has the
    same value for all rows that share the same partition key (explained in a little
    bit). Of course, only non-primary keys can be static.

    * **Primary key**: A primary key uniquely identifies a row, and all tables must
    define a primary key. I explain primary keys and partition keys in the following
    section.


    #### Primary Keys, Partition Keys, and Clustering Columns


    Cassandra’s concept of a primary key is quite different from that of a normalized
    relational database. The primary key of a table specifies the location and the
    order of data stored in that table.


    When you define a primary key, it can have two parts: a partition key and a clustering
    key. At a minimum, it must have a partition key. Here’s what the two parts mean:

    * Cassandra uses the first part of the definition of a primary key, the partition
    key, to distribute the data in the table across the cluster’s nodes. The partition
    key determines which node will store a specific row of the table. A compound partition
    key can split the data to store related data on separate partitions.

    * The database uses the second part of the key definition, called the clustering
    key or clustering column (or columns), to order or sort the data within the partition.


    You can specify multiple columns when defining the partition key and clustering
    key of a primary key. The resulting key is a composite primary key. The idea behind
    this type of a design is to distribute table data easily throughout the nodes
    of a cluster. It also allows for higher performance and facilitates failover.


    > **Tip**

    >

    > Once you create a table, you can’t change its primary key. You must create a
    new table and insert data into the new table instead.


    Choosing the right primary keys, partition keys, and clustering columns is a key
    aspect of Cassandra data modeling, with the choice significantly affecting query
    performance.


    A primary key is mandatory for a table. You can specify a primary key with one
    or more columns of a table, and the order of the columns matters. A primary key
    on a Cassandra key is unique in the sense that it contains more elements than
    a typical primary key in a relational database.


    As mentioned, a primary key consists of two parts: the partition key and the clustering
    columns. You’ll learn more about these two components of a primary key in the
    following sections.


    > **Note**

    >

    > A partition key groups rows in the same replica set. The clustering columns
    dictate how rows are stored in the replica.


    #### The Partition Key


    The partition key is the first and mandatory component of a primary key. It can
    include one or more columns. Here’s an example:


    ```

    CREATE TABLE t (k text PRIMARY KEY)

    ```


    Here, column `k` is the partition key, and there are no clustering columns.


    A table partition is a set of rows that have the same value for their partition
    key. A partition key can have one or more columns, and if it’s a multi-column
    key, the values for all the partition key columns must be identical for the rows
    in a partition.


    Here’s an example that illustrates the concept of the partition key:


    ```

    CREATE TABLE t (

    a int,

    b int,

    c int,

    d int,

    PRIMARY KEY ((a, b), c, d)

    );

    ```


    Let’s say you execute the following simple query on this table:


    ```

    SELECT * FROM t;

    a | b | c | d

    ---+---+---+---

    0 | 0 | 0 | 0    // row 1

    0 | 0 | 1 | 1    // row 2

    0 | 1 | 2 | 2    // row 3

    0 | 1 | 3 | 3    // row 4

    1 | 1 | 4 | 4    // row 5

    ```


    In this case, note the following:

    * Row 1 and row 2 share the same partition.

    * Row 3 and row 4 share the same partition.

    * Row 5 is in a different partition.


    > **Note**

    >

    > A primary key is the same as the partition key when there are no clustering
    columns.


    Here are the key properties of a partition:

    * Cassandra guarantees that all rows from a partition are stored in the same set
    of replica nodes. You should therefore choose the partition key carefully, so
    you can place rows that you often query together in the same partition. This means
    that the database must do less work in searching for the data on multiple nodes.


    > **Tip**

    >

    > If a partition key contains too much data, it can lead to the creation of a
    “hot spot.”


    * Cassandra performs all updates in a single partition atomically and in isolation.'
  raw: '#### Getting Cluster Topology from the System Tables


    You can get the cluster topology information such as the IP address of peer nodes,
    the names of the datacenter and racks, and token values by querying the system
    table `PEERS`, as shown here:


    ```

    cqlsh> SELECT * FROM system.peers;

    peer            | data_center | host_id                    | preferred_ip | rack  |
    release_version | rpc_address     | schema_version                       | tokens

    192.168.159.129 |         dc1 | 632fe5cd-26fa-4b8b-9842-182be2f954e5 |         null
    | rack1 |            3.10 | 192.168.159.129 | 86afa796-d883

    ''-1470738432828591905'', ''-1533929660503050360'', ''-1588268933422992241'',
    ''-1790127126337716384'', ''-1795704774997895089'', ''-1933674708843479324'',
    ''-2001904010895819169'', ''-2137322678046758761'', ''-2315125955255423142'',
    ''-2349800311170714405'', ''-239001164349178402'', ''-2439785688421178687'', ''-

    ...

    ```


    #### Getting Information About Functions, Aggregates, and User Types


    Later on in this chapter, you’ll learn about Cassandra’s user-defined entities
    such as UDFs, aggregates, and types. Once you create the user-defined entities,
    you can use the system tables to retrieve information about these entities.


    To retrieve information about UDFs, query the system table `SCHEMA_FUNCTIONS`.


    ```

    cqlsh> SELECT * FROM system.schema_functions;

    ```


    You can get details about the user-defined aggregates by querying the `SCHEMA_AGGREGATES`
    table.


    ```

    cqlsh> SELECT * FROM system.schema_aggregates;

    ```


    Finally, you can query the `SCHEMA_USERTYPES` table to view all user-defined types
    in the database.


    ```

    cqlsh> SELECT * FROM system.schema_usertypes;

    ```


    Now that you know how to work with keyspaces, it’s time to go ahead and use them
    for what they’re meant for: to act as logical repositories for tables and other
    entities by creating a table.


    ## Creating a Table


    A Cassandra CQL table stores rows and it has a name. When you create a table,
    you define the columns for the rows, a mandatory primary key to identify each
    row, and any additional options you may choose.


    You must execute the `CREATE TABLE` statement to create a new table. The core
    syntax for the `CREATE TABLE` statement is as follows:


    ```

    create_table_statement ::=  CREATE TABLE [ IF NOT EXISTS ] table_name

    ''(''

    column_definition

    ( '','' column_definition )*

    [ '','' PRIMARY KEY ''('' primary_key '')'' ]

    '')'' [ WITH table_options ]

    ```


    The following is a typical table creation statement :


    ```

    cqlsh> use cycling;

    cqlsh:cycling> CREATE TABLE loads (

    ...     machine inet,

    ...     cpu int,

    ...     mtime timeuuid,

    ...     load float,

    ...     PRIMARY KEY ((machine, cpu), mtime)

    ...     ) WITH CLUSTERING ORDER BY (mtime DESC);

    cqlsh:cycling>

    ```


    Before you create the table `loads`, you run the command `use cycling` so the
    database will know to create the new table in this keyspace. Alternatively, you
    could have specified `CREATE TABLE cycling.loads.` This will also let the database
    know in which keyspace you want it to place your new table.


    In the table creation statement , the following are the main things you need to
    focus on:


    *   Column definitions

    *   Primary and partition keys

    *   Clustering columns

    *   Table options (compact storage and clustering order)


    In the following sections, I briefly review the key entities that are part of
    a table creation statement .


    Note


    A primary key consists of two things: the first column or columns is the mandatory
    partition key, followed by one or more clustering columns.


    ### Column_definition


    A `column_definition` clause consists of the name of the column and its type,
    as well as two modifiers.


    *   Static: Declares the column as a static column. A static column has the same
    value for all rows that share the same partition key (explained in a little bit).
    Of course, only non-primary keys can be static.

    *   Primary key: A primary key uniquely identifies a row, and all tables must
    define a primary key. I explain primary keys and partition keys in the following
    section.


    ### Primary Keys, Partition Keys, and Clustering Columns


    Cassandra’s concept of a primary key is quite different from that of a normalized
    relational database. The primary key of a table specifies the location and the
    order of data stored in that table.


    When you define a primary key , it can have two parts: a partition key and a clustering
    key. At a minimum, it must have a partition key. Here’s what the two parts mean:


    *   Cassandra uses the first part of the definition of a primary key, the partition
    key, to distribute the data in the table across the cluster’s nodes. The partition
    key determines which node will store a specific row of the table. A compound partition
    key can split the data to store related data on separate partitions.

    *   The database uses the second part of the key definition, called the clustering
    key or clustering column (or columns), to order or sort the data within the partition.


    You can specify multiple columns when defining the partition key and clustering
    key of a primary key. The resulting key is a composite primary key. The idea behind
    this type of a design is to distribute table data easily throughout the nodes
    of a cluster. It also allows for higher performance and facilitates failover.


    Tip


    Once you create a table, you can’t change its primary key. You must create a new
    table and insert data into the new table instead.


    Choosing the right primary keys, partition keys, and clustering columns is a key
    aspect of Cassandra data modeling, with the choice significantly affecting query
    performance.


    A primary key is mandatory for a table. You can specify a primary key with one
    or more columns of a table, and the order of the columns matters. A primary key
    on a Cassandra key is unique in the sense that it contains more elements than
    a typical primary key in a relational database.


    As mentioned, a primary key consists of two parts: the partition key and the clustering
    columns . You’ll learn more about these two components of a primary key in the
    following sections.


    Note


    A partition key groups rows in the same replica set. The clustering columns dictate
    how rows are stored in the replica.


    ### The Partition Key


    The partition key is the first and mandatory component of a primary key. It can
    include one or more columns. Here’s an example:


    ```

    CREATE TABLE t (k text PRIMARY KEY)

    ```


    Here, column `k` is the partition key, and there are no clustering columns.


    A table partition is a set of rows that have the same value for their partition
    key. A partition key can have one or more columns, and if it’s a multi-column
    key, the values for all the partition key columns must be identical for the rows
    in a partition.


    Here’s an example that illustrates the concept of the partition key :


    ```

    CREATE TABLE t (

    a int,

    b int,

    c int,

    d int,

    PRIMARY KEY ((a, b), c, d)

    );

    ```


    Let’s say you execute the following simple query on this table:


    ```

    SELECT * FROM t;

    a | b | c | d

    ---+---+---+---

    0 | 0 | 0 | 0    // row 1

    0 | 0 | 1 | 1    // row 2

    0 | 1 | 2 | 2    // row 3

    0 | 1 | 3 | 3    // row 4

    1 | 1 | 4 | 4    // row 5

    ```


    In this case, note the following:


    *   Row 1 and row 2 share the same partition.

    *   Row 3 and row 4 share the same partition .

    *   Row 5 is in a different partition.


    Note


    A primary key is the same as the partition key when there are no clustering columns.


    Here are the key properties of a partition:


    *   Cassandra guarantees that all rows from a partition are stored in the same
    set of replica nodes. You should therefore choose the partition key carefully,
    so you can place rows that you often query together in the same partition. This
    means that the database must do less work in searching for the data on multiple
    nodes.


    Tip


    If a partition key contains too much data, it can lead to the creation of a “hot
    spot.”


    *   Cassandra performs all updates in a single partition atomically and in isolation.'
  trans: '### 从系统表获取集群拓扑信息


    你可以通过查询系统表 `PEERS` 来获取集群拓扑信息，例如对等节点的 IP 地址、数据中心和机架的名称以及令牌值，如下所示：


    ```

    cqlsh> SELECT * FROM system.peers;

    peer            | data_center | host_id                    | preferred_ip | rack  |
    release_version | rpc_address     | schema_version                       | tokens

    192.168.159.129 |         dc1 | 632fe5cd-26fa-4b8b-9842-182be2f954e5 |         null
    | rack1 |            3.10 | 192.168.159.129 | 86afa796-d883

    ''-1470738432828591905'', ''-1533929660503050360'', ''-1588268933422992241'',
    ''-1790127126337716384'', ''-1795704774997895089'', ''-1933674708843479324'',
    ''-2001904010895819169'', ''-2137322678046758761'', ''-2315125955255423142'',
    ''-2349800311170714405'', ''-239001164349178402'', ''-2439785688421178687'', ''-

    ...

    ```


    ### 获取有关函数、聚合和用户类型的信息


    在本章后续部分，你将学习 Cassandra 的用户定义实体，如 UDF、聚合和类型。一旦创建了用户定义的实体，就可以使用系统表来检索有关这些实体的信息。


    要检索有关 UDF 的信息，请查询系统表 `SCHEMA_FUNCTIONS`。


    ```

    cqlsh> SELECT * FROM system.schema_functions;

    ```


    你可以通过查询 `SCHEMA_AGGREGATES` 表来获取用户定义聚合的详细信息。


    ```

    cqlsh> SELECT * FROM system.schema_aggregates;

    ```


    最后，你可以查询 `SCHEMA_USERTYPES` 表以查看数据库中所有用户定义的类型。


    ```

    cqlsh> SELECT * FROM system.schema_usertypes;

    ```


    现在你已经了解了如何使用键空间，是时候开始将它们用于其设计目的了：通过创建一个表，作为表和其他实体的逻辑存储库。


    ### 创建表


    Cassandra CQL 表存储行并具有名称。创建表时，你需要定义行的列、一个用于标识每行的强制性主键，以及任何你选择的附加选项。


    你必须执行 `CREATE TABLE` 语句来创建一个新表。`CREATE TABLE` 语句的核心语法如下：


    ```

    create_table_statement ::=  CREATE TABLE [ IF NOT EXISTS ] table_name

    ''(''

    column_definition

    ( '','' column_definition )*

    [ '','' PRIMARY KEY ''('' primary_key '')'' ]

    '')'' [ WITH table_options ]

    ```


    以下是一个典型的建表语句：


    ```

    cqlsh> use cycling;

    cqlsh:cycling> CREATE TABLE loads (

    ...     machine inet,

    ...     cpu int,

    ...     mtime timeuuid,

    ...     load float,

    ...     PRIMARY KEY ((machine, cpu), mtime)

    ...     ) WITH CLUSTERING ORDER BY (mtime DESC);

    cqlsh:cycling>

    ```


    在创建 `loads` 表之前，你运行了 `use cycling` 命令，以便数据库知道在这个键空间中创建新表。或者，你本可以指定 `CREATE TABLE
    cycling.loads`。这样也能让数据库知道你想将新表放置在哪个键空间中。


    在建表语句中，以下是你需要重点关注的主要内容：

    * 列定义

    * 主键和分区键

    * 聚集列

    * 表选项（紧凑存储和聚集顺序）


    在接下来的章节中，我将简要回顾构成建表语句的关键实体。


    > **注意**

    >

    > 主键由两部分组成：第一列或列组是强制性的分区键，后跟一个或多个聚集列。


    #### Column_definition


    `column_definition` 子句由列名及其类型以及两个修饰符组成。

    * **Static**：将列声明为静态列。静态列对于共享相同分区键的所有行具有相同的值（稍后解释）。当然，只有非主键列才能是静态的。

    * **Primary key**：主键唯一标识一行，所有表都必须定义主键。我将在下一节解释主键和分区键。


    #### 主键、分区键和聚集列


    Cassandra 的主键概念与规范化关系数据库的主键概念有很大不同。表的主键指定了存储在该表中数据的位置和顺序。


    定义主键时，它可以有两部分：一个分区键和一个聚集键。至少，它必须有一个分区键。这两部分含义如下：

    * Cassandra 使用主键定义的第一部分，即分区键，来将表中的数据分布到集群的各个节点上。分区键决定哪个节点将存储表中的特定行。复合分区键可以拆分数据，以便将相关数据存储在不同的分区上。

    * 数据库使用键定义的第二部分，称为聚集键或聚集列（或多个列），来对分区内数据进行排序。


    在定义主键的分区键和聚集键时，可以指定多个列。生成的键是一个复合主键。这种设计背后的思想是轻松地将表数据分布到集群的各个节点上。它还允许更高的性能并促进故障转移。


    > **提示**

    >

    > 一旦创建了表，就不能更改其主键。你必须创建一个新表并将数据插入到新表中。


    选择正确的主键、分区键和聚集列是 Cassandra 数据建模的一个关键方面，选择会显著影响查询性能。


    表必须有主键。你可以用表中的一个或多个列来指定主键，列的顺序很重要。Cassandra 主键的独特之处在于它比关系数据库中的典型主键包含更多元素。


    如前所述，主键由两部分组成：分区键和聚集列。你将在接下来的章节中了解更多关于主键这两个组成部分的信息。


    > **注意**

    >

    > 分区键将行分组到同一个副本集中。聚集列决定了行在副本中的存储方式。


    #### 分区键


    分区键是主键中第一个也是必需的组件。它可以包含一个或多个列。下面是一个例子：


    ```

    CREATE TABLE t (k text PRIMARY KEY)

    ```


    这里，列 `k` 是分区键，没有聚集列。


    表分区是一组分区键值相同的行。分区键可以有一个或多个列，如果是多列键，则一个分区内所有行的分区键列的值必须完全相同。


    下面是一个说明分区键概念的例子：


    ```

    CREATE TABLE t (

    a int,

    b int,

    c int,

    d int,

    PRIMARY KEY ((a, b), c, d)

    );

    ```


    假设你对这个表执行以下简单查询：


    ```

    SELECT * FROM t;

    a | b | c | d

    ---+---+---+---

    0 | 0 | 0 | 0    // 第 1 行

    0 | 0 | 1 | 1    // 第 2 行

    0 | 1 | 2 | 2    // 第 3 行

    0 | 1 | 3 | 3    // 第 4 行

    1 | 1 | 4 | 4    // 第 5 行

    ```


    在这种情况下，请注意以下几点：

    * 第 1 行和第 2 行共享同一个分区。

    * 第 3 行和第 4 行共享同一个分区。

    * 第 5 行位于不同的分区。


    > **注意**

    >

    > 当没有聚集列时，主键与分区键相同。


    以下是分区的关键属性：

    * Cassandra 保证来自一个分区的所有行都存储在同一组副本节点中。因此，你应该仔细选择分区键，以便将经常一起查询的行放在同一个分区中。这意味着数据库在多个节点上搜索数据的工作量更少。


    > **提示**

    >

    > 如果分区键包含太多数据，可能会导致创建“热点”。

    >

    * Cassandra 在单个分区内以原子性和隔离性执行所有更新操作。'
- fmt: '# Creating a Table with a Simple Primary Key


    You specify a single column name as the partition key when you define a table
    with a simple primary key. Thus, the primary key and the partition key are the
    same. If you have a column with numerous values, it is easy to insert and query
    the data since Cassandra distributes the partitions across multiple nodes.


    If your application requires a simple lookup table with a single identifier, then
    a simple primary key is the way to go. In the following example, you specify `id`
    as the primary key, which makes it easy to get the names of cyclists by providing
    their ID numbers;


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID PRIMARY KEY, lastname text, firstname
    text );

    ```


    The column `id` is in the `UUID` format. `UUID` (universally unique identifier
    ) is a 128-bit value and the bits conform to various types. In `CQL`, the `uuid`
    type is a Type 4 `UUID`, based on random numbers . An `UUID` is usually represented
    by a sequence of hex digits separated by dashes.


    It’s common to use the `uuid` type as a surrogate key, either by itself or by
    combining it with other values. You can generate a Type 4 `UUID` value and use
    that value in an `INSERT` or `UPDATE` statement, as shown here:


    ```

    cqlsh:cycling> insert into cyclist_name (id, firstname, lastname)

    ... values

    ... (uuid(), ''sam'', ''alapati'');

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    3c4acfde-dc65-4c9f-b2ec-9047d677641a |       sam |  alapati

    (1 rows)

    cqlsh:cycling>

    ```


    Tip


    Another way to generate a `UUID` is to use the built-in `CQL` function `NOW()`.
    For example, you can do the following to generate the `UUID` from the current
    time:


    ```

    cql> INSERT INTO "users" ("username, id, ''address" VALUES (''alapati'', NOW(),
    ''12345, Main St, Anytown'');

    ```


    Using the `NOW()` function lets you generate a unique `UUID` for each row you
    insert into the `USERS` table, without having to explicitly specify a `UUID` constant.


    You can also specify the primary key at the end of the table definition , as shown
    here:


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID, lastname text, firstname text, PRIMARY
    KEY (id) );

    ```


    In both cases shown here, you specify the keyspace first (`USE cycling`) to set
    the current keyspace. You can also use the following notation to identify the
    keyspace instead of executing the `USE` statement first :


    ```

    cqlsh> CREATE TABLE cycling.cyclist_name ( id UUID, lastname text, firstname text,
    PRIMARY KEY (id) );

    ```


    ## Defining a Composite Partition Key


    Cassandra stores entire rows of data on a node by the partition key. You can distribute
    data over multiple partitions (multiple nodes) by using a composite partition
    key. If a column has a lot of data, then the data is too large to store in a single
    partition.


    You can specify multiple columns for the partition key to segment the data into
    multiple buckets. A composite partition key consists of two or more columns. Instead
    of grouping all the data into a single partition, you group the data into a set
    of smaller partitions.


    Note


    You specify the entire primary key when searching for a specific row and just
    the partition key when selecting multiple rows from the same partition.


    A composite partition key is helpful when you encounter slowdowns in writing data
    to a node due to heavy writing to a partition. For example, if your app is writing
    lots of data, you can break up the data into chunks by year/month/day/hour using
    a four-column partition key.


    If you’re not using secondary indexes , you must provide all columns of a composite
    key when querying the table.


    The following example shows how to specify two columns of a table in the primary
    key as a composite partition key:


    ```

    cqlsh> CREATE TABLE cycling.rank_by_year_and_name (

    race_year int,

    race_name text,

    cyclist_name text,

    rank int,

    PRIMARY KEY ((race_year, race_name), rank)

    );

    ```


    The primary key here consists of both a partition key and a clustering column.
    The partition key is composite , as you use double parentheses around the two
    columns of the partition key `(race_year, race_name)`. The primary key also has
    a clustering column, `rank`.


    You must specify all columns of the partition key to retrieve data from this table
    because you haven’t created a secondary index on the table. To get the ranks of
    cyclists that completed in various races, you must supply values for both the
    year and race name , as shown here:


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    AND race_name=''Tour of Japan - Stage 4 - Minami > Shinshu'';

    race_year | race_name                                 |rank|    cyclist_name

    -----------+------------------------------------------+----+----------------

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 1  | Benjamin PRADES

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 2  |    Adam PHELAN

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 3  |   Thomas LEBAS

    (3 rows)

    cqlsh:cycling>

    ```


    If you specify only part of the partition key, as shown in the following example,
    `Cassandra` complains :


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2016;

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    The error is because you used only part of the partition key (`race_year` ) and
    have omitted the `race_name` column, which is the second column in the partition
    key.


    You can get pass this error by doing what `Cassandra` is asking you, by adding
    the clause `ALLOW FILTERING` to your query that is using only part of the partition
    key.


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    ALLOW FILTERING;

    race_year | race_name                                  | rank | cyclist_name

    -----------+-------------------------------------------+---+------------

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 1 | Ilnur ZAKARIN

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 2 | Carlos BETANCUR

    ...

    (5 rows)

    ```


    There may be a performance penalty when you add the `ALLOW FILTERING` clause to
    a query. The impact depends on how many rows are in a partition, and if the rows
    are spread over many `SSTable` files . However, `Cassandra` guarantees that the
    query will be limited to a single node.'
  raw: '### Creating a Table with a Simple Primary Key


    You specify a single column name as the partition key when you define a table
    with a simple primary key. Thus, the primary key and the partition key are the
    same. If you have a column with numerous values, it is easy to insert and query
    the data since Cassandra distributes the partitions across multiple nodes.


    If your application requires a simple lookup table with a single identifier, then
    a simple primary key is the way to go. In the following example, you specify `id`
    as the primary key, which makes it easy to get the names of cyclists by providing
    their ID numbers;


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID PRIMARY KEY, lastname text, firstname
    text );

    ```


    The column `id` is in the UUID format. UUID (universally unique identifier ) is
    a 128-bit value and the bits conform to various types. In CQL, the uuid type is
    a Type 4 UUID, based on random numbers . An UUID is usually represented by a sequence
    of hex digits separated by dashes.


    It’s common to use the uuid type as a surrogate key, either by itself or by combining
    it with other values. You can generate a Type 4 UUID value and use that value
    in an `INSERT` or `UPDATE` statement, as shown here:


    ```

    cqlsh:cycling> insert into cyclist_name (id, firstname, lastname)

    ... values

    ... (uuid(), ''sam'', ''alapati'');

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    3c4acfde-dc65-4c9f-b2ec-9047d677641a |       sam |  alapati

    (1 rows)

    cqlsh:cycling>

    ```


    Tip


    Another way to generate a UUID is to use the built-in CQL function `NOW`. For
    example, you can do the following to generate the UUID from the current time:


    ```

    cql> INSERT INTO "users" ("username, id, ''address" VALUES (''alapati'', NOW(),
    ''12345, Main St, Anytown'');

    ```


    Using the `NOW` function lets you generate a unique UUID for each row you insert
    into the USERS table, without having to explicitly specify a UUID constant.


    You can also specify the primary key at the end of the table definition , as shown
    here:


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID, lastname text, firstname text, PRIMARY
    KEY (id) );

    ```


    In both cases shown here, you specify the keyspace first (`USE cycling`) to set
    the current keyspace. You can also use the following notation to identify the
    keyspace instead of executing the `USE` statement first :


    ```

    cqlsh> CREATE TABLE cycling.cyclist_name ( id UUID, lastname text, firstname text,
    PRIMARY KEY (id) );

    ```


    #### Defining a Composite Partition Key


    Cassandra stores entire rows of data on a node by the partition key. You can distribute
    data over multiple partitions (multiple nodes) by using a composite partition
    key. If a column has a lot of data, then the data is too large to store in a single
    partition.


    You can specify multiple columns for the partition key to segment the data into
    multiple buckets. A composite partition key consists of two or more columns. Instead
    of grouping all the data into a single partition, you group the data into a set
    of smaller partitions.


    Note


    You specify the entire primary key when searching for a specific row and just
    the partition key when selecting multiple rows from the same partition.


    A composite partition key is helpful when you encounter slowdowns in writing data
    to a node due to heavy writing to a partition. For example, if your app is writing
    lots of data, you can break up the data into chunks by year/month/day/hour using
    a four-column partition key.


    If you’re not using secondary indexes , you must provide all columns of a composite
    key when querying the table.


    The following example shows how to specify two columns of a table in the primary
    key as a composite partition key:


    ```

    cqlsh> CREATE TABLE cycling.rank_by_year_and_name (

    race_year int,

    race_name text,

    cyclist_name text,

    rank int,

    PRIMARY KEY ((race_year, race_name), rank)

    );

    ```


    The primary key here consists of both a partition key and a clustering column.
    The partition key is composite , as you use double parentheses around the two
    columns of the partition key `(race_year, race_name)`. The primary key also has
    a clustering column, `rank`.


    You must specify all columns of the partition key to retrieve data from this table
    because you haven’t created a secondary index on the table. To get the ranks of
    cyclists that completed in various races, you must supply values for both the
    year and race name , as shown here:


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    AND race_name=''Tour of Japan - Stage 4 - Minami > Shinshu'';

    race_year | race_name                                 |rank|    cyclist_name

    -----------+------------------------------------------+----+----------------

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 1  | Benjamin PRADES

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 2  |    Adam PHELAN

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 3  |   Thomas LEBAS

    (3 rows)

    cqlsh:cycling>

    ```


    If you specify only part of the partition key, as shown in the following example,
    Cassandra complains :


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2016;

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    The error is because you used only part of the partition key (`race_year` ) and
    have omitted the `race_name` column, which is the second column in the partition
    key.


    You can get pass this error by doing what Cassandra is asking you, by adding the
    clause `ALLOW FILTERING` to your query that is using only part of the partition
    key.


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    ALLOW FILTERING;

    race_year | race_name                                  | rank | cyclist_name

    -----------+-------------------------------------------+---+------------

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 1 | Ilnur ZAKARIN

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 2 | Carlos BETANCUR

    ...

    (5 rows)

    ```


    There may be a performance penalty when you add the `ALLOW FILTERING` clause to
    a query. The impact depends on how many rows are in a partition, and if the rows
    are spread over many SSTable files . However, Cassandra guarantees that the query
    will be limited to a single node.'
  trans: '

    # 使用简单主键创建表


    当你使用简单主键定义表时，你需要指定单个列名作为分区键。因此，主键和分区键是同一个。如果你有一个包含大量值的列，由于 Cassandra 会将分区分布到多个节点上，因此插入和查询数据会变得很容易。


    如果你的应用需要一个具有单一标识符的简单查找表，那么简单主键就是合适的选择。在下面的例子中，你指定 `id` 作为主键，这样通过提供自行车手的 ID 号就能轻松获取他们的姓名：


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID PRIMARY KEY, lastname text, firstname
    text );

    ```


    `id` 列采用 `UUID` 格式。`UUID`（通用唯一标识符）是一个 128 位的值，其位模式符合各种类型。在 `CQL` 中，`uuid` 类型是基于随机数的
    4 型 `UUID`。一个 `UUID` 通常由以连字符分隔的十六进制数字序列表示。


    将 `uuid` 类型用作代理键很常见，可以单独使用，也可以与其他值结合使用。你可以生成一个 4 型 `UUID` 值，并在 `INSERT` 或 `UPDATE`
    语句中使用该值，如下所示：


    ```

    cqlsh:cycling> insert into cyclist_name (id, firstname, lastname)

    ... values

    ... (uuid(), ''sam'', ''alapati'');

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    3c4acfde-dc65-4c9f-b2ec-9047d677641a |       sam |  alapati

    (1 rows)

    cqlsh:cycling>

    ```


    提示


    生成 `UUID` 的另一种方法是使用内置的 `CQL` 函数 `NOW()`。例如，你可以按以下方式从当前时间生成 `UUID`：


    ```

    cql> INSERT INTO "users" ("username, id, ''address" VALUES (''alapati'', NOW(),
    ''12345, Main St, Anytown'');

    ```


    使用 `NOW()` 函数可以为插入到 `USERS` 表中的每一行生成一个唯一的 `UUID`，而无需显式指定 `UUID` 常量。


    你也可以在表定义的末尾指定主键，如下所示：


    ```

    cqlsh> USE cycling;

    cqlsh> CREATE TABLE cyclist_name ( id UUID, lastname text, firstname text, PRIMARY
    KEY (id) );

    ```


    这里展示的两种情况，你都先指定了键空间 (`USE cycling`) 来设置当前键空间。你也可以使用以下表示法来标识键空间，而无需先执行 `USE` 语句：


    ```

    cqlsh> CREATE TABLE cycling.cyclist_name ( id UUID, lastname text, firstname text,
    PRIMARY KEY (id) );

    ```


    ## 定义复合分区键


    Cassandra 通过分区键将完整的数据行存储在节点上。你可以使用复合分区键将数据分布到多个分区（多个节点）上。如果一列的数据量很大，那么数据量太大，无法存储在单个分区中。


    你可以为分区键指定多个列，以便将数据分段到多个存储桶中。复合分区键由两个或更多列组成。你不是将所有数据分组到单个分区中，而是将数据分组到一组更小的分区中。


    注意


    搜索特定行时，你需要指定整个主键；而从同一分区中选择多行时，只需指定分区键。


    当你遇到由于对一个分区进行大量写入而导致向节点写入数据速度变慢时，复合分区键很有帮助。例如，如果你的应用正在写入大量数据，你可以使用四列分区键按年/月/日/小时将数据分解成块。


    如果你没有使用二级索引，则在查询表时必须提供复合键的所有列。


    以下示例展示了如何将表中的两列指定为主键中的复合分区键：


    ```

    cqlsh> CREATE TABLE cycling.rank_by_year_and_name (

    race_year int,

    race_name text,

    cyclist_name text,

    rank int,

    PRIMARY KEY ((race_year, race_name), rank)

    );

    ```


    这里的主键包含一个分区键和一个聚簇列。分区键是复合的，因为你对分区键的两列使用了双括号 `(race_year, race_name)`。主键还有一个聚簇列
    `rank`。


    你必须指定分区键的所有列才能从此表中检索数据，因为你没有在表上创建二级索引。要获取完成不同比赛的自行车手的排名，你必须同时提供年份和比赛名称的值，如下所示：


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    AND race_name=''Tour of Japan - Stage 4 - Minami > Shinshu'';

    race_year | race_name                                 |rank|    cyclist_name

    -----------+------------------------------------------+----+----------------

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 1  | Benjamin PRADES

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 2  |    Adam PHELAN

    2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 3  |   Thomas LEBAS

    (3 rows)

    cqlsh:cycling>

    ```


    如果你只指定了部分分区键，如下例所示，`Cassandra` 会报错：


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2016;

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    该错误是因为你只使用了部分分区键 (`race_year`)，而省略了分区键中的第二列 `race_name` 列。


    你可以按照 `Cassandra` 的要求，在仅使用部分分区键的查询中添加 `ALLOW FILTERING` 子句来绕过此错误。


    ```

    cqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015
    ALLOW FILTERING;

    race_year | race_name                                  | rank | cyclist_name

    -----------+-------------------------------------------+---+------------

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 1 | Ilnur ZAKARIN

    2015 |   Giro d''Italia - Stage 11 - Forli > Imola | 2 | Carlos BETANCUR

    ...

    (5 rows)

    ```


    在查询中添加 `ALLOW FILTERING` 子句可能会带来性能损失。影响取决于一个分区中有多少行，以及这些行是否分布在多个 `SSTable` 文件中。但是，`Cassandra`
    保证查询将被限制在单个节点上。

    '
- fmt: "## 复合键与聚类列\n\n在创建主键时，聚类列是可选的，并跟在表的必需分区键之后。聚类列的顺序定义了表中分区的聚类顺序。对于每个分区，Cassandra\
    \ 根据你指定的聚类顺序对行进行物理排序。\n\n聚类是 Cassandra 根据你定义的聚类列对每个分区内的数据进行排序的方式。默认情况下，Cassandra\
    \ 按升序对列进行排序。\n\n同时包含分区键和聚类列的主键称为复合主键。分区键可以是简单的或复合的。\n\n下面是一个示例，展示了聚类列如何为分区定义聚类顺序：\n\
    \n```sql\nCREATE TABLE t (\na int,\nb int,\nc int,\nPRIMARY KEY (a, b)\n);\n```\n\
    \n插入一些行并运行以下 `SELECT` 语句：\n\n```sql\nSELECT * FROM t;\na | b | c\n---+---+---\n\
    0 | 0 | 4     // row 1\n0 | 1 | 9     // row 2\n0 | 2 | 2     // row 3\n0 | 3\
    \ | 3     // row 4\n```\n\n在这种情况下，主键定义指定了`(a, b)`，意味着列`a`是分区键，列`b`是聚类列。此外，你可以看到\
    \ Cassandra 内部将属于同一分区（列`a` =0）的行按照聚类列`b`的值顺序存储。\n\n以这种方式聚类列意味着查询一个分区中的一系列行可以非常快速地返回。例如像\
    \ `SELECT * FROM t WHERE a=0 AND b>1 AND b<=3` 这样的查询。\n\n注意\n\n当你指定一个复合主键时，Cassandra\
    \ 根据其分区键将整行存储在某个节点上，并使用聚类列对数据进行排序。\n\n如果你的应用程序从一个大分区中检索数据，它通常需要读取整个分区才能获取少量数据。如果你通过指定聚类列对分区键的数据进行排序，数据库可以更高效地检索数据，因为它不必读取整个分区。\n\
    \n通过指定聚类列来分组数据类似于在关系数据库中连接表的方式，只是更好。\n\n在下表中，列`category`充当分区键，列`points`充当聚类列。当你查询此表时，对于每个类别，数据库按降序对`points`列进行排序。\n\
    \n```sql\nCREATE TABLE cycling.cyclist_category (\ncategory text, points int,\
    \ id UUID, lastname text,\nPRIMARY KEY (category, points))\nWITH CLUSTERING\n\
    ORDER BY (points DESC);\n```\n\n## 静态列\n\n在创建表时，你可以将非聚类列声明为静态。静态列仅在特定分区内是静态的。\n\
    \n以下是展示如何声明静态列的示例：\n\n```sql\nCREATE TABLE t (\nk text,\ns text STATIC,\ni int,\n\
    PRIMARY KEY (k, i)\n);\nINSERT INTO t (k, s, i) VALUES ('k', 'I''m shared', 0);\n\
    INSERT INTO t (k, s, i) VALUES ('k', 'I''m still shared', 1);\nSELECT * FROM t;\n\
    Output is:\nk |                  s | i\n---+--------------------+---\nk  | \"\
    I'm still shared\" | 0\nk  | \"I'm still shared\" | 1\n```\n\n关于静态列需要记住的事项：\n\n\
    *   你不能将作为主键的列声明为静态。\n*   没有任何聚类列的表不能有静态列。\n\n## 表选项\n\n你可以使用`WITH`关键字设置两个关键的表选项：`COMPACT\
    \ STORAGE`和`CLUSTERING ORDER`。\n\n### 紧凑表\n\n你可以使用`COMPACT STORAGE`选项定义紧凑表。此选项仅用于向后兼容，以处理\
    \ CQL 版本 3 之前创建的表定义。对于新表，你不得指定此选项，因此我不详细讨论此选项。\n\n### 聚类顺序\n\n`CLUSTERING ORDER`选项允许你将聚类顺序更改为使用列的逆自然顺序。默认情况下，排序意味着`ASC`（升序）。你可以指定`ASC`（默认顺序）或`DESC`（降序）顺序。\n\
    \n### 其他选项\n\n除了我描述的这两个选项外，表还支持其他选项，例如允许你编写注释、指定读修复选项以及等待垃圾回收墓碑（删除标记）的时间。以下是表选项的简要描述：\n\
    \n*   `comment`：关于表的注释。\n*   `read_repair_chance`：查询超过一致性级别所需节点的概率，用于执行读修复。默认值为\
    \ 0.1。\n*   `dclocal_read_repair_chance`：查询同一数据中心内超过一致性级别所需节点的概率，用于执行读修复。默认值为\
    \ 0。\n*   `gc_grace_seconds`：垃圾回收墓碑前的等待时间。默认值为 864000 秒。\n*   `bloom_filter_fp_chance`：SSTable\
    \ 布隆过滤器假阳性的目标概率。\n*   `default_expiration_time`：表的生存时间（TTL），以秒为单位。\n\n还有三个非常重要的、影响性能的表选项，与压缩、压缩和缓存相关。我将在第\
    \ 11 章详细解释这三个选项，该章节讨论 Cassandra 性能调优。如果你愿意，可以提前阅读。\n\n## 使用计数器列跟踪值\n\n你可以使用一种特殊的列，称为计数器，来跟踪一个递增的值。例如，你可能希望创建一个计数器列来跟踪加入游戏的在线游戏玩家数量，或者页面浏览量或日志消息的数量。\n\
    \n你必须为计数器列指定`counter`数据类型。但是，你不能在任何表中将列指定为计数器列；你必须创建一个专门的表来保存计数器列。专门的表必须只包含一个主键（可以是复合的）和计数器列。你不能将计数器列用作主键；除主键列外的所有列都必须是计数器列。\n\
    \n注意\n\n你不能索引计数器列。你也不能删除它。\n\n你不能使用`INSERT`语句将数据加载到计数器列中；相反，你必须使用`UPDATE`语句来插入和修改计数器列的值。\n\
    \n以下示例展示了如何创建计数器列：\n\n```sql\nCREATE TABLE popular_count (\nid UUID PRIMARY KEY,\n\
    popularity counter\n);\n```\n\n## 修改表\n\n你可以通过执行`ALTER TABLE`语句来修改表结构或其选项。`ALTER\
    \ TABLE`语句允许你执行以下操作。\n\n*   你可以更改列的类型，如下所示：\n\n    ```sql\n    ALTER TABLE customers\
    \ ALTER lastKnownAddress TYPE UUID;\n    ```\n\n*   你可以向表中添加新列。\n\n    ```sql\n\
    \    ALTER TABLE customers ADD address varchar;\n    ```\n\n*   你还可以通过添加`WITH`指令来更改一些表选项。\n\
    \n    ```sql\n    ALTER TABLE customers\n    WITH comment = \"complete customer\
    \ records table\"\n    AND read_repair_chance = 0.4;\n    ```\n\n注意\n\n一旦创建表，你就不能更改`COMPACT\
    \ STORAGE`和`CLUSTERING ORDER`选项。\n\n你只能按照允许的方式转换某些 CQL 数据类型。有关 CQL 类型兼容性，请参阅 CQL\
    \ 文档。例如，你可以将现有的 ASCII 或 text 类型仅转换为 varchar 类型。"
  raw: "#### Compound Keys and Clustering Columns\n\nWhen creating a primary key,\
    \ the clustering column(s) is optional and follows the mandatory partition key\
    \ of a table. The order of the clustering columns defines the clustering order\
    \ for a partition in the table. For each partition, Cassandra physically orders\
    \ the rows based on the clustering order that you specify.\n\nClustering is how\
    \ Cassandra sorts data within each partition based on how you define the clustering\
    \ column(s). By default, Cassandra sorts a column in the ascending order.\n\n\
    A primary key with both a partition key and a clustering column(s) is called a\
    \ compound primary key . The partition key may be simple or composite.\n\nHere’s\
    \ an example that shows how the clustering columns define the clustering order\
    \ for a partition:\n\n```\nCREATE TABLE t (\na int,\nb int,\nc int,\nPRIMARY KEY\
    \ (a, b)\n);\n```\n\nInsert some rows and run the following `SELECT` statement\
    \ :\n\n```\nSELECT * FROM t;\na | b | c\n---+---+---\n0 | 0 | 4     // row 1\n\
    0 | 1 | 9     // row 2\n0 | 2 | 2     // row 3\n0 | 3 | 3     // row 4\n```\n\n\
    In this case, the primary key definition specifies (a, b), meaning that column\
    \ `a` is the partition key and the column `b` is the clustering column. In addition,\
    \ you can see that Cassandra internally stores the rows belonging to the same\
    \ partition (column `a` =0) in the order of the values of the clustering column,\
    \ `b` .\n\nClustering a column in the way shown here means that queries that seek\
    \ a range of rows from a partition can return very quickly. An example is a query\
    \ such as `SELECT * FROM t` where `a=0` and `b>1` and `b<=3`.\n\nNote\n\nWhen\
    \ you specify a compound primary key, Cassandra stores an entire row on a node\
    \ by its partition key and orders the data with the clustering column(s).\n\n\
    If your application is retrieving data from a large partition, it must normally\
    \ read the entire partition to get at a small amount of data. If you sort the\
    \ partition key’s data by specifying a clustering column, the database can retrieve\
    \ data far more efficiently since it won’t be reading the entire partition.\n\n\
    Grouping data by specifying a clustering column is similar to how you join tables\
    \ in a relational database, only better.\n\nIn the following table, the column\
    \ `category` acts as the partition key and the column `points` as the clustering\
    \ column. When you query this table, for each category the database orders the\
    \ `points` column in the descending order.\n\n```\nCREATE TABLE cycling.cyclist_category\
    \ (\ncategory text, points int, id UUID, lastname text,\nPRIMARY KEY (category,\
    \ points))\nWITH CLUSTERING\nORDER BY (points DESC);\n```\n\n#### Static Columns\n\
    \nYou can declare a non-clustering column as static when creating a table. A static\
    \ column is static within a specific partition only.\n\nThe following is an example\
    \ that shows how to declare a static column:\n\n```\nCREATE TABLE t (\nk text,\n\
    s text STATIC,\ni int,\nPRIMARY KEY (k, i)\n);\nINSERT INTO t (k, s, i) VALUES\
    \ ('k', 'I''m shared', 0);\nINSERT INTO t (k, s, i) VALUES ('k', 'I''m still shared',\
    \ 1);\nSELECT * FROM t;\nOutput is:\nk |                  s | i\n\nk  | \"I'm\
    \ still shared\" | 0\nk  | \"I'm still shared\" | 1\n```\n\nThings to remember\
    \ about a static column :\n\n*   You can’t declare a column acting as the primary\
    \ key as static.\n*   A table that doesn’t have any clustering columns can’t have\
    \ a static column.\n\n#### Table Options\n\nYou can set two key table options,\
    \ `COMPACT STORAGE` and `CLUSTERING ORDER`, by using the `WITH` keyword.\n\n#####\
    \ Compact Tables\n\nYou can define a compact table with the `COMPACT STORAGE`\
    \ option. This option exists only for backward compatibility purposes, for dealing\
    \ with table definitions created before CQL Version 3\\. You must not specify\
    \ this option for new tables, so I won’t discuss this option in detail.\n\n#####\
    \ Clustering Order\n\nThe `CLUSTERING ORDER` option lets you change the clustering\
    \ order to use the reverse natural order of the columns. By default, the ordering\
    \ implies `ASC` (ascendant order). You can specify either the ASC (the default\
    \ order) or the `DESC` (descendent order) order.\n\n##### Other Options\n\nIn\
    \ addition to the two options I described here, a table supports other options\
    \ such as those that allow you to write comments, specify read repair options,\
    \ and the time to wait for garbage collecting tombstones , which are deletion\
    \ markers. Here’s a brief description of the table options:\n\n*   `comment`:\
    \ A comment about the table.\n*   `read_repair_chance`: The probability with which\
    \ to query more nodes than those required by the consistency level for performing\
    \ read repairs. Default value is 0.1\n*   `dclocal_read_repair_chance`: The probability\
    \ with which to query more nodes than those required by the consistency level\
    \ belonging to the same data center for performing read repairs. Default value\
    \ is 0.\n*   `gc_grace_seconds`: Time to wait before the garbage collection of\
    \ the tombstones. Default value is 864000 seconds.\n*   `bloom_filter_fp_chance`\
    \ : The target probability of the false positives of the SSTable Bloom filters.\n\
    *   `default_expiration_time`: The time-to-live (TTL) for a table in seconds.\n\
    \nThere are three very important performance-influencing table options that relate\
    \ to compaction , compression, and caching. I’ll explain all three of them in\
    \ detail in Chapter [11](#A436674_1_En_11_Chapter.html), which discusses Cassandra\
    \ performance tuning. You can read ahead if you wish.\n\n#### Using a Counter\
    \ Column to Track Values\n\nYou can use a special column called a counter to keep\
    \ a tally of a value that’s incremented. For example, you may want to create a\
    \ counter column to trace the number of online game players who joined a game\
    \ or the number of page views or log messages.\n\nYou must specify the `counter\
    \ d`ata type for a counter column. However, you can’t denote a column in any table\
    \ as a counter column; you must create a dedicated table to hold a counter column.\
    \ The dedicated table must include only a primary key (could be composite) and\
    \ the counter column. You can’t use the counter column as a primary key; all columns\
    \ other than the primary key column must be counter columns.\n\nNote\n\nYou can’t\
    \ index a counter column. You also can’t delete it.\n\nYou can’t use the `INSERT`\
    \ statement to load data into a counter column; instead, you must use the `UPDATE`\
    \ statement to both insert and modify a counter column’s values.\n\nThe following\
    \ example shows how to create a counter column :\n\n```\nCREATE TABLE popular_count\
    \ (\nid UUID PRIMARY KEY,\npopularity counter\n);\n```\n\n#### Altering a Table\n\
    \nYou can modify a table structure or its options by executing an `ALTER TABLE`\
    \ statement. The `ALTER TABLE` statement allows you to do the following.\n\n*\
    \   You can change the type of a column, as shown here:\n\n    ```\n    ALTER\
    \ TABLE customers ALTER lastKnownAddress TYPE UUID;\n    ```\n\n*   You can add\
    \ a new column to the table.\n\n    ```\n    ALTER TABLE customers ADD address\
    \ varchar;\n    ```\n\n*   You can also change some of the table options, by adding\
    \ the `WITH` instruction.\n\n    ```\n    ALTER TABLE customers\n    WITH comment\
    \ = \"complete customer records table'\n    AND read_repair_chance = 0.4;\n  \
    \  ```\n\nNote\n\nYou can’t change the `COMPACT STORAGE` and `CLUSTERING ORDER`\
    \ options once you create a table.\n\nYou can convert some CQL data types only\
    \ as allowed. Please refer to the CQL documentation for the CQL type compatibility.\
    \ For example, you can convert an existing ASCII or text type to only the varchar\
    \ type."
  trans: "## 复合键与聚类列\n\n在创建主键时，聚类列是可选的，并跟在表的必需分区键之后。聚类列的顺序定义了表中分区的聚类顺序。对于每个分区，Cassandra\
    \ 会根据你指定的聚类顺序对行进行物理排序。\n\n聚类是 Cassandra 根据你定义的聚类列对每个分区内的数据进行排序的方式。默认情况下，Cassandra\
    \ 按升序对列进行排序。\n\n同时包含分区键和聚类列的主键称为复合主键。分区键可以是简单的或复合的。\n\n下面是一个示例，展示了聚类列如何为分区定义聚类顺序：\n\
    \n```sql\nCREATE TABLE t (\na int,\nb int,\nc int,\nPRIMARY KEY (a, b)\n);\n```\n\
    \n插入一些行并运行以下 `SELECT` 语句：\n\n```sql\nSELECT * FROM t;\na | b | c\n---+---+---\n\
    0 | 0 | 4     // row 1\n0 | 1 | 9     // row 2\n0 | 2 | 2     // row 3\n0 | 3\
    \ | 3     // row 4\n```\n\n在这种情况下，主键定义指定了`(a, b)`，意味着列`a`是分区键，列`b`是聚类列。此外，你可以看到\
    \ Cassandra 内部将属于同一分区（列`a` =0）的行按照聚类列`b`的值顺序存储。\n\n以这种方式聚类列意味着查询一个分区中的一系列行可以非常快速地返回。例如像\
    \ `SELECT * FROM t WHERE a=0 AND b>1 AND b<=3` 这样的查询。\n\n**注意**\n\n当你指定一个复合主键时，Cassandra\
    \ 根据其分区键将整行存储在某个节点上，并使用聚类列对数据进行排序。\n\n如果你的应用程序从一个大分区中检索数据，它通常需要读取整个分区才能获取少量数据。如果你通过指定聚类列对分区键的数据进行排序，数据库可以更高效地检索数据，因为它不必读取整个分区。\n\
    \n通过指定聚类列来分组数据类似于在关系数据库中连接表的方式，只是更好。\n\n在下表中，列`category`充当分区键，列`points`充当聚类列。当你查询此表时，对于每个类别，数据库按降序对`points`列进行排序。\n\
    \n```sql\nCREATE TABLE cycling.cyclist_category (\ncategory text, points int,\
    \ id UUID, lastname text,\nPRIMARY KEY (category, points))\nWITH CLUSTERING\n\
    ORDER BY (points DESC);\n```\n\n## 静态列\n\n在创建表时，你可以将非聚类列声明为静态。静态列仅在特定分区内是静态的。\n\
    \n以下是展示如何声明静态列的示例：\n\n```sql\nCREATE TABLE t (\nk text,\ns text STATIC,\ni int,\n\
    PRIMARY KEY (k, i)\n);\nINSERT INTO t (k, s, i) VALUES ('k', 'I''m shared', 0);\n\
    INSERT INTO t (k, s, i) VALUES ('k', 'I''m still shared', 1);\nSELECT * FROM t;\n\
    Output is:\nk |                  s | i\n---+--------------------+---\nk  | \"\
    I'm still shared\" | 0\nk  | \"I'm still shared\" | 1\n```\n\n关于静态列需要记住的事项：\n\n\
    *   你不能将作为主键的列声明为静态。\n*   没有任何聚类列的表不能有静态列。\n\n## 表选项\n\n你可以使用`WITH`关键字设置两个关键的表选项：`COMPACT\
    \ STORAGE`和`CLUSTERING ORDER`。\n\n### 紧凑表\n\n你可以使用`COMPACT STORAGE`选项定义紧凑表。此选项仅用于向后兼容，以处理\
    \ CQL 版本 3 之前创建的表定义。对于新表，你不得指定此选项，因此我不详细讨论此选项。\n\n### 聚类顺序\n\n`CLUSTERING ORDER`选项允许你将聚类顺序更改为使用列的逆自然顺序。默认情况下，排序意味着`ASC`（升序）。你可以指定`ASC`（默认顺序）或`DESC`（降序）顺序。\n\
    \n### 其他选项\n\n除了我描述的这两个选项外，表还支持其他选项，例如允许你编写注释、指定读修复选项以及等待垃圾回收墓碑（删除标记）的时间。以下是表选项的简要描述：\n\
    \n*   `comment`：关于表的注释。\n*   `read_repair_chance`：查询超过一致性级别所需节点的概率，用于执行读修复。默认值为\
    \ 0.1。\n*   `dclocal_read_repair_chance`：查询同一数据中心内超过一致性级别所需节点的概率，用于执行读修复。默认值为\
    \ 0。\n*   `gc_grace_seconds`：垃圾回收墓碑前的等待时间。默认值为 864000 秒。\n*   `bloom_filter_fp_chance`：SSTable\
    \ 布隆过滤器假阳性的目标概率。\n*   `default_expiration_time`：表的生存时间（TTL），以秒为单位。\n\n还有三个非常重要的、影响性能的表选项，与压缩、压缩和缓存相关。我将在第\
    \ 11 章详细解释这三个选项，该章节讨论 Cassandra 性能调优。如果你愿意，可以提前阅读。\n\n## 使用计数器列跟踪值\n\n你可以使用一种特殊的列，称为计数器，来跟踪一个递增的值。例如，你可能希望创建一个计数器列来跟踪加入游戏的在线游戏玩家数量，或者页面浏览量或日志消息的数量。\n\
    \n你必须为计数器列指定`counter`数据类型。但是，你不能在任何表中将列指定为计数器列；你必须创建一个专门的表来保存计数器列。专门的表必须只包含一个主键（可以是复合的）和计数器列。你不能将计数器列用作主键；除主键列外的所有列都必须是计数器列。\n\
    \n**注意**\n\n你不能索引计数器列。你也不能删除它。\n\n你不能使用`INSERT`语句将数据加载到计数器列中；相反，你必须使用`UPDATE`语句来插入和修改计数器列的值。\n\
    \n以下示例展示了如何创建计数器列：\n\n```sql\nCREATE TABLE popular_count (\nid UUID PRIMARY KEY,\n\
    popularity counter\n);\n```\n\n## 修改表\n\n你可以通过执行`ALTER TABLE`语句来修改表结构或其选项。`ALTER\
    \ TABLE`语句允许你执行以下操作。\n\n*   你可以更改列的类型，如下所示：\n\n    ```sql\n    ALTER TABLE customers\
    \ ALTER lastKnownAddress TYPE UUID;\n    ```\n\n*   你可以向表中添加新列。\n\n    ```sql\n\
    \    ALTER TABLE customers ADD address varchar;\n    ```\n\n*   你还可以通过添加`WITH`指令来更改一些表选项。\n\
    \n    ```sql\n    ALTER TABLE customers\n    WITH comment = \"complete customer\
    \ records table\"\n    AND read_repair_chance = 0.4;\n    ```\n\n**注意**\n\n一旦创建表，你就不能更改`COMPACT\
    \ STORAGE`和`CLUSTERING ORDER`选项。\n\n你只能按照允许的方式转换某些 CQL 数据类型。有关 CQL 类型兼容性，请参阅 CQL\
    \ 文档。例如，你可以将现有的 ASCII 或 text 类型仅转换为 varchar 类型。"
- fmt: "### Viewing a Table’s Configured Options\n\nAs I showed earlier, you can specify\
    \ many options when creating a table. You can also modify several options by altering\
    \ a table. How do you know which options a table has at any given time? Run the\
    \ `describe table` command to view all properties of a table.\n\nIn the following\
    \ example, you create the table `cyclist_name` and then run the command `describe\
    \ cyclist_name` to view the table’s properties :\n\n```cqlsh> use cycling;\ncqlsh:cycling>\
    \ CREATE TABLE cyclist_name ( id UUID, lastname text, firstname text, PRIMARY\
    \ KEY (id) );\ncqlsh:cycling> describe cyclist_name;\nCREATE TABLE cycling.cyclist_name\
    \ (\nid uuid PRIMARY KEY,\nfirstname text,\nlastname text\n) WITH bloom_filter_fp_chance\
    \ = 0.01\nAND caching = {'keys': 'ALL', 'rows_per_partition': 'NONE'}\nAND comment\
    \ = ''\nAND compaction = {'class': 'org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy',\
    \ 'max_threshold': '32', 'min_threshold': '4'}\nAND compression = {'chunk_length_in_kb':\
    \ '64', 'class': 'org.apache.cassandra.io.compress.LZ4Compressor'}\nAND crc_check_chance\
    \ = 1.0\nAND dclocal_read_repair_chance = 0.1\nAND default_time_to_live = 0\n\
    AND gc_grace_seconds = 864000\nAND max_index_interval = 2048\nAND memtable_flush_period_in_ms\
    \ = 0\nAND min_index_interval = 128\nAND read_repair_chance = 0.0\nAND speculative_retry\
    \ = '99PERCENTILE';\ncqlsh:cycling>\n```\n\nOf the many properties of this table,\
    \ you’ve set only a few. The listing is long, however, since the dataset uses\
    \ default values for all the table options that you didn’t specify.\n\n### Dropping\
    \ and Truncating Tables\n\nAs with any relational database, you can drop and truncate\
    \ Cassandra tables.\n\n#### Dropping a Table\n\nYou can drop a table with the\
    \ `DROP TABLE` statement.\n\n```cqlsh> DROP TABLE cycling.cyclist_name;\ncqlsh>\
    \ DROP TABLE cycling.cyclist_name IF EXISTS;\n```\n\nBefore you drop a table,\
    \ you must first drop any materialized views that are based on the table.\n\n\
    #### Truncating a Table\n\nTruncating a table with the `TRUNCATE` statement leaves\
    \ the table in place but removes all the data in the table, including the data\
    \ from any materialized view based on the table.\n\n```cqlsh> TRUNCATE TABLE customers;\n\
    cqlsh> TRUNCATE customers;\n```\n\nBoth of these commands work the same way. The\
    \ keyword `TABLE` is optional since a table is the only object you can truncate.\n\
    \nBefore you truncate a table, you need to do the following:\n\n1.  Set the consistency\
    \ level to `ALL` with the `CONSISTENCY` command.\n\n    ```cqlsh> CONSISTENCY\
    \ ALL;\n    Consistency level set to ALL.\n    cqlsh>\n    ```\n\n2.  Run the\
    \ `nodetool status` command to ensure that all nodes are up and available .\n\n\
    \    ```cqlsh> nodetool status\n    Datacenter: datacenter1\n    =======================\n\
    \    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n    --  Address\
    \    Load       Tokens    Owns (effective)  Host ID          Rack\n    UN  127.0.0.1\
    \  159.91 KiB  256      100.0%           c51011d6-06da-47b8-bd55-70ac2e51716d\
    \  rack1\n    $\n    ```\n\n### Deleting Rows and Columns from a Table\n\nYou\
    \ can remove rows from a table with the `DELETE` statement.\n\n```cqlsh:mydb>\
    \ DELETE FROM cyclists where pk = 'salapati';\n```\n\nYou can remove rows from\
    \ a table by issuing the `DELETE` statement in the following way:\n\n```cqlsh:mydb>\
    \ DELETE session-token FROM users where pk = 'salapati';\n```\n\nThis statement\
    \ will remove the column `session_token` from just one row where the value of\
    \ `pk` is `'salapati'`. The `WHERE` clause specifies which row/rows to delete\
    \ from a table.\n\n#### Deleting Multiple Rows\n\nYou can delete multiple rows\
    \ by specifying the keyword `IN` and supplying a comma separated list of values\
    \ in parentheses.\n\n```cqlsh> DELETE FROM cycling.cyclist_name WHERE firstname\
    \ IN ('Sam', 'James');\n```\n\nIf you wish to remove an entire column from a table,\
    \ you can do so by leaving out the `WHERE` clause.\n\n```cqlsh:mydb> DELETE session_token\
    \ FROM users;\n```\n\n#### Deleting from a Collection Set, List, or Map\n\nTo\
    \ remove an element from a map that you stored as a single column, you need to\
    \ specify the column’s name along with the element’s key in square brackets.\n\
    \n```cqlsh> DELETE sponsorship ['sponser_name'] FROM cycling.races WHERE race_name\
    \ = 'Criterium du Dauphine';\n```\n\nTo delete data from a list, specify the name\
    \ of the column along with the list index positon.\n\n```cqlsh> DELETE categories[3]\
    \ FROM cycling.cycling.history WHERE lastname ='TIRALONGO';\n```\n\nTo remove\
    \ all elements from a set, just specify the name of the column.\n\n```cqlsh> DELETE\
    \ sponsorship FROM cycling.races WHERE race_name = 'Criterium De Dauphine';\n\
    ```\n\n#### Deleting Old Data by Using a TIMESTAMP\n\nYou can specify columns\
    \ for deletion using a timestamp to identify the column.\n\n```cqlsh> DELETE firstname,\
    \ lastname\nFROM cycling.cyclist_name\nUSING TIMESTAMP 1318452291034\nWHERE lastname\
    \ = 'ALAPATI';\n```"
