  trans: '

    ### 配置 Cassandra 集群


    在全部三台 EC2 实例上，编辑 `cassandra.yaml` 文件并添加以下属性：


    ```

    cluster_name: ''My AWS Cluster''

    seeds: "192.168.177.132"

    broadcast_address: 192.168.177.132

    listen_address:

    ```


    这些属性与我之前创建六节点 Cassandra 集群时解释的相同。与那个集群的情况一样，我决定不为 `listen_address` 属性指定值，因此我必须为
    `broadcast_address` 属性指定一个值。


    **注意**


    用户常常看到 EC2 专用的 snitch 并使用它，因为它是为 AWS 集群设计的。然而，推荐使用的 snitch 是 `GossipingPropertyFileSnitch`。


    一旦你编辑了 `cassandra.yaml` 文件，就在所有三个节点上重启 Cassandra 服务，并确保清除所有系统数据：


    ```

    $ sudo service cassandra stop

    $ sudo rm –rf /var/lib/Casandra/data/system/*

    $ sudo service cassandra start

    ```


    运行 `nodetool status` 命令显示所有三个节点现在都在运行，新的三节点 AWS EC2 Cassandra 集群已准备就绪。


    ```

    INFO  22:20:27 Handshaking version with /192.168.177.135

    INFO  22:20:27 Node /192.168.177.135 has restarted, now UP

    INFO  22:20:27 InetAddress /192.168.177.135 is now UP

    INFO  22:20:27 Node /192.168.177.135 state jump to NORMAL

    INFO  22:20:27 Node /192.168.177.132 state jump to NORMAL

    INFO  22:20:27 Updating topology for /192.168.177.135

    INFO  22:20:27 Updating topology for /192.168.177.135

    INFO  22:20:27 Waiting for gossip to settle before accepting client requests...

    WARN  22:20:27 Not marking nodes down due to local pause of 11051514701 > 5000000000

    INFO  22:20:35 No gossip backlog; proceeding

    ```


    一旦集群启动并运行，所有功能都与非 AWS 的 Cassandra 集群相同。


    ## 总结


    成功的集群安装取决于先决条件的满足。无论你创建的是本地集群还是云端集群，你都可以使用一组最基础的配置属性启动集群。与上一章的单节点安装一样，一旦你学会了如何启动和停止集群，你就可以在后续章节中学习时配置额外的属性。Cassandra
    带有大量配置项，接下来的每一章都会介绍几个新的配置属性。


    # 第二部分


    数据模型、集群架构和 Cassandra 查询语言


    # 4. Cassandra 数据建模以及数据的读写


    Cassandra 中的数据建模在许多方面都不同于传统关系数据库的数据建模。本章将介绍 Cassandra 数据建模的关键方面，其中你预期在数据库中运行的查询与你如何在表内部构建数据结构密切相关。


    数据建模涉及识别你希望在 Cassandra 数据库中存储的数据类型（实体）以及这些数据实体之间的关系。


    在 Cassandra 数据库中建模数据的关键在于关注以下两点：


    *   识别数据访问模式

    *   你将使用的查询


    这两个概念将决定你如何组织数据，以及如何设计和创建数据库表。


    查询和模式这两者决定了数据的组织方式。查询是你从数据库中检索数据的方式，而模式是你在数据库表中安排数据的方式。Cassandra 的查询驱动方法意味着你计划使用的特定查询是数据组织的基础。通过按分区将数据分组存储在节点上，你可以提高读写效率。一个查询需要读取的分区越少，数据库对该查询的响应速度就越快。


    本章详细解释了 Cassandra 如何读取和写入数据。可配置的一致性是 Cassandra 的一个关键特性，你将深入了解读写一致性，以及如何配置不同的一致性级别。Cassandra
    是一个具有**可调一致性**的分区行存储数据库。可调一致性意味着客户端应用程序决定其从数据库请求数据的一致性。


    最后，本章解释了**线性一致性**和**轻量级事务**的概念，以及如何通过**批处理操作**确保关键操作的原子性。


    ## Cassandra 与关系数据库：主要差异


    第 1 章概述了关系数据库与 Cassandra 的主要区别。在这里，让我们详细回顾一下 Cassandra 和关系数据库在数据建模方法上的差异。


    ### 数据驱动 vs. 查询驱动的数据建模


    关系数据库中的数据建模完全由数据驱动。你也可以说关系数据建模是表驱动的。规范化理论占据主导地位，该理论要求你不得复制数据。


    一旦你根据表及其关系对数据进行了规范化，你就基于这些表和关系编写查询。通常，一个表可以为多个查询提供服务。


    Cassandra 组织数据的方式与关系数据库截然不同。Cassandra 的数据建模方法是由**查询**驱动，而非数据。这意味着你根据你期望数据要服务的查询来组织数据。你首先设计查询，然后创建表来满足这些查询。你认为数据重复是嵌套数据的正常副作用，完全可以接受。


    Cassandra 在写入时预计算查询，从而优化写入性能，这意味着优化读取是免费的副产品。关系数据库在读取数据时计算查询。它们使用诸如 `JOIN` 和 `ORDER
    BY` 等昂贵的操作。在 Cassandra 数据库中不存在此类操作。


    ### 表关联与引用完整性


    在关系数据库中，你通过组合来自多个关系的数据来回答一个查询。引用完整性很重要。在 Cassandra 中，你必须将回答查询所需的所有数据嵌套在同一张表内。引用完整性根本不是问题。


    ### 排序差异


    默认情况下，关系数据库按数据写入磁盘的顺序返回行。你可以使用 `ORDER BY` 子句来更改默认的排序顺序。


    在 Cassandra 中，你在创建表时通过选择聚类列来显式指定排序顺序。


    ### 数据重复


    正如你将很快了解到的，关系数据库中为避免重复而进行反规范化的传统策略不适用于 Cassandra。在 Cassandra 数据库中，你通过在需要的地方重复数据来实现更高效的读取。Cassandra
    利用了存储成本相对于计算堆栈其他组件（如 CPU、内存和网络）更便宜这一事实。


    你可以在 Cassandra 中多次存储相同的数据。与关系数据库不同，数据重复被视为一件好事，而不是祸害。关系数据库试图将大量信息放入表中，因为这些表被用于多种类型的搜索。然而，在
    Cassandra 中，拥有许多包含相似数据的表是件好事。


    请记住，Cassandra 针对写入进行了优化；它的写入速度非常快。因此，如果你需要将相同的数据写入磁盘六次，那就写吧；多次写入不会对你造成伤害。采用数据重复策略（涉及更多写入）以增强读取查询性能，在
    Cassandra 中本质上是合理的策略。

    '
- fmt: '## What Is Data Modeling?


    Data modeling is both a science and an art. Data modeling is a structured process
    that involves the following:


    *   Collecting and analyzing the data requirements of an information system

    *   Identifying the entities that are part of the system and the relationships
    among them

    *   Identifying the data access patterns

    *   Organizing and structuring data in a specific way

    *   Designing and specifying a database schema

    *   Optimizing the schema using techniques such as indexing the data


    When you’re performing a data modeling exercise, you normally follow a process
    that consists of the following five key steps or stages:


    *   Analyze your requirements.

    *   Identify entities and relationships–the conceptual data model.

    *   Identify common queries–the application workflow.

    *   Specify the schema–the logical data model (design the tables).

    *   Optimize the schema–the physical data model (use `CQL` to implement the design).
    Optimizations include keys, partition sizes, and ordering.


    In the following sections, I explain each of the five broad components of `Cassandra`
    data modeling.


    ### Analyzing Your Requirements


    The requirement part of `Cassandra` data modeling is simple. In most cases, you
    want to use `Cassandra` to solve the following problems:


    *   Scalability : Your data inflows are large and they’re constantly growing.

    *   Reliability : You want an always available, highly reliable data store.

    *   Ease of use: You want a database that’s easy to set up and manage.


    ### Conceptual Modeling: Identifying the Entities and the Relationships Among
    Them


    Ideally you must design your queries so they access a single table. You include
    all the attributes pertaining to an entity in a single table. This is different
    from a relational table design, where you store data about an entity in multiple
    tables and link the tables with foreign keys. `Cassandra`’s one-table per query
    approach leads to faster performance.


    As mentioned earlier, in a relational database, you start with a logical relationship
    model and then build out your physical tables based on those relationships. `Cassandra`
    follows a similar strategy, but places a heavy emphasis on considering the queries
    that you’re planning to run against the tables in the database. Unlike in a relational
    mode, there are no joins and no referential integrity constraints in a `Cassandra`
    database.


    Finally, there’s a heavy emphasis on denormalization, which is the opposite of
    what you do in a relational database, where the focus is all on normalizing the
    data. Conceptual modeling uses the well-known entity-relationship model (`ERM`)
    to establish the entities and the relationships among them.


    You denormalize data in `Cassandra` by designing and creating multiple tables.
    In recent releases, `Cassandra` has offered materialized views, which also enable
    you to create multiple views all based on the same underlying `SSTables`.


    ### Reviewing the Queries You Want to Use


    In this section, I use several examples to show you how to design your tables
    based on the queries that you anticipate.


    Let’s use `DataStax`’s well-known `Pro Cycling` statistics for the table designs.


    Note: `Cassandra` denormalizes data by repeating data among multiple tables. This
    is completely opposite to a relational database, which strives to minimize the
    duplication of data by normalizing it.


    #### Example 1


    Let’s say you want to run a query to list each cyclist by their first and last
    names. Your logical model will look like the following:


    ```

    cyclist_name

    id

    lastname

    firstname

    ```


    In this model,


    *   Partition key: `id`

    *   Clustering column: None


    This table has the mandatory primary key, which is the column `id`. In this case,
    the `id` consists of just the partition key.


    #### Example 2


    The previous example was quite rudimentary. You could query just by `id`, but
    you couldn’t tell the types of races the cyclists participate in. Let’s say you
    want to look for cyclists within specific race types. You’ll want to create a
    different table with some of the same columns from example 1, but also add some
    new columns.


    ```

    cyclist_race_type

    race_type

    id

    points

    lastname

    ```


    In this model,


    *   Partition key: `race_type`

    *   Clustering column: `id`


    This table helps you group all the cyclists by the type of race. The column `id`,
    which served as the partition key in the first example, now acts as the clustering
    column since you want to group the cyclists by `id` within each partition.


    ### Logical Modeling


    The previous section on conceptual modeling showed how to design your tables based
    on expected queries. The next step in data modeling is to create a logical model,
    which contains the tables for satisfying each of your key queries, making sure
    that the tables include the entities and the relationships you’ve identified in
    your conceptual model.


    It’s during the logical modeling phase that you determine the primary keys for
    the tables, as well as the clustering columns to support the sort ordering your
    queries may require. `Cassandra` organizes its rows into tables. There’s a mandatory
    primary key for each table. The primary key has multiple components, and the first
    component is the partition key. You can index other columns as well besides the
    primary key, and those other indexes are called secondary indexes.


    ### Physical Data Modeling


    During the physical modeling phase, you get down to the actual creation of the
    database objects such as tables and indexes. You nail down the data types, including
    any user-defined types you many need. You also determine the keyspaces you need
    and the partitioning and replication strategies.


    In addition to secondary indexes, you must also think about any materialized views
    that you may need during the physical data modeling phase.


    It’s during this stage that you perform sizing calculations to figure out the
    space requirements for storing the data.


    You perform several optimizations in the physical data modeling stage, including
    the specifying of partition sizes and ordering.


    Once you have reviewed and refined the physical model, you implement the database
    schema in `CQL` by executing `DDL` commands such as `CREATE KEYSPACE, CREATE TYPE,`
    and `CREATE TABLE`.


    ## Cassandra Data Modeling Rules


    It’s natural for developers and architects moving over to `Cassandra` from a relational
    database background to bring their traditional data modeling thinking with them.
    Big mistake! Many of the well-known relational database modeling principles or
    rules don’t apply to `Cassandra`, and there are several new rules you ought to
    learn to truly benefit from using a `Cassandra` database. While `CQL` is indeed
    similar to `SQL`, avoid the temptation to create traditional data models that
    you’re likely to be comfortable with.


    To get maximum performance from a `Cassandra` database, you’ll do well to follow
    certain well-established data modeling rules. Following these simple rules lets
    you start out with superior performance and enables you to maintain the high performance
    as you scale up by adding more and more nodes to your cluster.


    ### The Two Basic Rules


    There aren’t many rules to `Cassandra` data modeling. You need to keep in mind
    just two rules: spreading your data across the cluster, and minimizing the number
    of partitions that `Cassandra` needs to read.


    I’ll elaborate on these two key rules in the following sections.


    #### Spreading Data Evenly Across the Cluster


    At an intuitive level, it makes sense that you should seek to distribute data
    evenly across the nodes in a `Cassandra` cluster. However, this isn’t automatic,
    since `Cassandra` doesn’t automatically move data around to balance it.


    `Cassandra` distributes data across a cluster’s nodes based on a hash of the partition
    key. The partition key is the first component of the primary key of a table. Thus,
    you need to pick a good primary key to ensure that data is balanced evenly across
    all nodes.'
