    \    ```\n\n3.  You can view the keyspace’s contents by executing the `ls` command.\n\
    \n    ```\n    $ ls\n    Keyspace1-Standard1-jb-60-CRC.db\n    Keyspace1-Standard1-jb-60-Data.db\n\
    \    ...\n    Keyspace1-Standard1-jb-60-TOC.txt\n    ```\n\n4.  Bulk load the\
    \ files by specifying a path to `Keyspace1/Standard1/` in the cluster where you\
    \ wish to load the SSTables.\n\n    ```\n    $ sstableloader -d 192.168.159.129\
    \ /var/lib/Cassandra/data/Keyspace1/Standard1/\n    ```\n\n#### Loading SSTable\
    \ Data to a Different Cluster\n\nYou can run the sstableloader utility to import\
    \ existing SSTables from a different cluster. Before you perform the import, run\
    \ the `nodetool flush` command in each of the source cluster’s nodes to ensure\
    \ that the database flushes the memtables to the SSTables that you’re about to\
    \ import to your cluster.\n\nTo run the `sstableloader` command to import the\
    \ data to a target cluster, follow the steps I described in the previous section.\
    \ Everything works the same way, except that you don’t need to generate the SSTables\
    \ since the source table already has them. You are importing from an SSTable to\
    \ another SSTable in a different cluster, so no raw data is involved in this import.\n\
    \nNote\n\nYou can use Apache Sqoop to migrate external data to Cassandra if you’re\
    \ using DataStax Enterprise, which comes loaded with everything you need to run\
    \ Sqoop.\n\n## Summary\n\nSince you need snapshots when you need to perform a\
    \ recovery, it’s important to carefully manage snapshots. Cassandra doesn’t manage\
    \ snapshots for you and therefore you must develop an effective way to store snapshots\
    \ and remove older snapshots so they don’t occupy a lot of storage space.\n\n\
    Incremental backups are turned on by default, and you must ensure that they remain\
    \ in effect since they reduce the need to take full snapshots of SSTables.\n\n\
    You’ll need all snapshots, incremental backups, and backups of the commit log\
    \ segments during a recovery. Therefore, it’s important to know that you can access\
    \ all of these readily so you can minimize the recovery time. To be sure that\
    \ you can perform a recovery correctly, it’s important to perform dry runs of\
    \ a recovery session. You don’t want to learn database recovery when you’re actually\
    \ performing one!\n\n# Part III\nMaintaining, Monitoring, Tuning, and Securing\
    \ Apache Cassandra\n\n# 9. Maintaining Cassandra\n\nThis chapter is about common\
    \ Cassandra management tasks and node management.\n\nCommon cluster management\
    \ tasks include repairing and cleaning data, rebuilding indexes, handling data\
    \ corruption, and flushing and draining data.\n\nNode management includes adding\
    \ and removing nodes, replacing and moving nodes, removing dead nodes, and assassinating\
    \ nodes. Since nodetool commands are key to performing all node management tasks,\
    \ I first review the key nodetool node management-related commands.\n\nThe chapter\
    \ shows how to perform management tasks such as adding and decommissioning datacenters.\n\
    \nThe chapter also shows you how to switch snitches and how to monitor and manage\
    \ gossip.\n\n## Common Cluster Maintenance Tasks\n\nAs an administrator, you’ll\
    \ perform various tasks to help Cassandra perform well. In the following sections,\
    \ I describe some of the most common database maintenance tasks, such as repairing\
    \ data, rebuilding indexes, and cleaning up data.\n\n### Repairing Data (nodetool\
    \ repair)\n\nI explained Cassandra’s repair mechanisms at length in Chapter [5](#A436674_1_En_5_Chapter.html).\
    \ Over time, a node may become out of sync with other nodes due to Cassandra’s\
    \ tuneable consistency philosophy. If a node remains down for a while, it may\
    \ miss changes performed on the other nodes, especially if it stays down longer\
    \ than the time for which the other nodes store the hints.\n\nIn addition, specifying\
    \ a write consistency level below the `ALL` level means that the database declares\
    \ a write as successful even if one of more nodes don’t acknowledge the writes.\
    \ The principle of tunable consistency could result in nodes with different versions\
    \ of the same data. While the database automatically performs some types of repair\
    \ such as read repair, one of the key operations an administrator performs is\
    \ anti-entropy repair, which involves manually repairing data with the `nodetool\
    \ repair` command.\n\nTip\n\nRun the `nodetool stats` command while performing\
    \ a repair to monitor the progress of the repair.\n\n#### When to Perform a Repair\n\
    \nThe frequency of repairs has a lot to do with the read and write consistency\
    \ levels that you configure. If you chose a consistency level that’s slow to provide\
    \ consistency, then you should schedule repairs more frequently.\n\nFrequent repairs\
    \ have a cost in terms of overhead, so use a subrange repair wherever you can,\
    \ and schedule the repairs for different keyspaces (or tables) for separate times."
  trans: "\n### 将数据复制到 Cassandra 表中\n\n`COPY` 命令有助于将小型数据集（包含少于 200 万行的数据集）移入 Cassandra\
    \ 表。要移动更大型的数据集，必须使用 Cassandra 批量加载器。\n\n指定 `COPY FROM` 以将数据从 CSV 文件复制到 Cassandra\
    \ 表中。以下是 `COPY FROM` 命令的通用语法：\n\n```\nCOPY table_name [( column_list )]\nFROM\
    \ 'file_name'[, 'file2_name', ...] | STDIN\n[WITH option = 'value' [AND ...]]\n\
    ```\n\n`COPY FROM` 命令会更新现有记录并验证主键。运行 `COPY FROM` 命令时，需要记住以下关键点：\n\n*   CSV 文件中的每一行必须包含相同的字段。\n\
    *   CSV 文件的字段（列）数可以少于 Cassandra 表。\n*   CSV 文件的字段数不能多于 Cassandra 表。\n*   每行都必须有主键值。\n\
    *   数据库会将所有缺失或空字段设置为 null。\n\n有关 `COPY FROM` 命令的示例，请使用与 `COPY TO` 命令示例相同的表 `CYCLIST_NAME`。由于\
    \ `COPY FROM` 命令要求目标表已存在，请先清空表中的数据，以便从之前生成的 CSV 文件导入数据。\n\n```\ncqlsh> COPY cycling.cyclist_name\
    \ FROM 'cyclist.csv' WITH HEADER = TRUE;\nUsing 1 child processes\nStarting copy\
    \ of cycling.cyclist_name with columns [id, firstname, lastname].\nProcessed:\
    \ 6 rows; Rate:      11 rows/s; Avg. rate:      15 rows/s\n6 rows imported from\
    \ 1 files in 0.389 seconds (0 skipped).\ncqlsh>\n```\n\n### 运行 sstableloader 执行批量加载\n\
    \nCassandra 的批量加载工具名为 `sstableloader`，可让你将大量数据加载到 Cassandra 表中。你还可以使用此工具将数据从 SSTable\
    \ 加载到不同的集群。最后，你可以使用此工具恢复快照，我将在本章前面解释这一点。\n\n与 `COPY` 命令的情况不同，目标表可以包含数据。\n\n####\
    \ 使用 sstableloader 加载外部数据\n\n`sstableloader` 实用程序使你能够将外部数据加载到集群中。在使用 `sstableloader`\
    \ 实用程序加载外部数据之前，必须首先生成用于存放外部数据的 SSTable。\n\n要生成 SSTable，必须使用 `SSTableWriter` API。`SSTableWriter`\
    \ 会创建原始的 Cassandra 数据文件，这些文件可以批量加载到集群中。\n\n注意\n\n你可以运行多个 `sstableloader` 实用程序实例，以并行方式将外部数据加载到集群中。\n\
    \n由于 `sstableloader` 实用程序资源消耗较大，建议在未用作 Cassandra 节点的服务器上运行它。\n\n以下是使用 `sstableloader`\
    \ 实用程序加载数据必须遵循的步骤摘要。\n\n1.  创建将用于将数据批量加载到集群中的原始 Cassandra 数据文件。这涉及编写一些使用 `SSTableWriter`\
    \ API 的 Java 代码。\n2.  `SSTableWriter` 会在你指定的目录中生成 SSTable。转到代码存储 SSTable 的位置，如下所示：\n\
    \n    ```\n    $ cd /var/lib/cassanddra/data/Keyspace1/Standrad2\n    ```\n\n\
    3.  你可以通过执行 `ls` 命令查看 Keyspace 的内容。\n\n    ```\n    $ ls\n    Keyspace1-Standard1-jb-60-CRC.db\n\
    \    Keyspace1-Standard1-jb-60-Data.db\n    ...\n    Keyspace1-Standard1-jb-60-TOC.txt\n\
    \    ```\n\n4.  通过指定目标集群中 `Keyspace1/Standard1/` 的路径来批量加载文件。\n\n    ```\n    $\
    \ sstableloader -d 192.168.159.129 /var/lib/Cassandra/data/Keyspace1/Standard1/\n\
    \    ```\n\n#### 将 SSTable 数据加载到不同的集群\n\n你可以运行 `sstableloader` 实用程序，从不同的集群导入现有的\
    \ SSTable。在执行导入之前，请在源集群的每个节点上运行 `nodetool flush` 命令，以确保数据库将内存表刷新到即将导入到目标集群的 SSTable\
    \ 中。\n\n要运行 `sstableloader` 命令将数据导入目标集群，请遵循上一节描述的步骤。所有步骤的工作方式相同，只是你无需生成 SSTable，因为源表已包含它们。你是从一个集群的\
    \ SSTable 导入到另一个集群的 SSTable，因此此导入不涉及原始数据。\n\n注意\n\n如果你使用的是 DataStax Enterprise，可以使用\
    \ Apache Sqoop 将外部数据迁移到 Cassandra，因为它已包含运行 Sqoop 所需的一切。\n\n## 总结\n\n由于执行恢复时需要快照，因此仔细管理快照非常重要。Cassandra\
    \ 不会为你管理快照，因此你必须制定有效的方法来存储快照并移除旧的快照，以免它们占用大量存储空间。\n\n增量备份默认是开启的，你必须确保其保持有效状态，因为它们可以减少对\
    \ SSTable 进行完整快照的需求。\n\n在恢复期间，你将需要所有快照、增量备份和提交日志段的备份。因此，重要的是要知道你可以随时访问所有这些，以便最小化恢复时间。为了确保能够正确执行恢复，对恢复过程进行演练非常重要。你肯定不想在真正执行恢复时才学习数据库恢复！\n\
    \n## 第三部分\n\n维护、监控、调优和保护 Apache Cassandra\n\n## 9. 维护 Cassandra\n\n本章介绍常见的 Cassandra\
    \ 管理任务和节点管理。\n\n常见的集群管理任务包括修复和清理数据、重建索引、处理数据损坏以及刷新和排出数据。\n\n节点管理包括添加和移除节点、替换和移动节点、移除死亡节点以及淘汰节点。由于\
    \ `nodetool` 命令是执行所有节点管理任务的关键，因此我首先回顾与节点管理相关的关键 `nodetool` 命令。\n\n本章展示了如何执行管理任务，例如添加和停用数据中心。\n\
    \n本章还展示了如何切换 Snitch 以及如何监控和管理 Gossip。\n\n### 常见的集群维护任务\n\n作为管理员，你将执行各种任务以帮助 Cassandra\
    \ 良好运行。在以下部分中，我将介绍一些最常见的数据库维护任务，例如修复数据、重建索引和清理数据。\n\n#### 修复数据 (nodetool repair)\n\
    \n我在第 5 章详细解释了 Cassandra 的修复机制。随着时间的推移，由于 Cassandra 的可调一致性理念，节点可能与其他节点不同步。如果一个节点长时间宕机，它可能会错过在其他节点上执行的更改，特别是当它宕机的时间超过其他节点存储提示信息的时间时。\n\
    \n此外，指定低于 `ALL` 级别的写一致性级别意味着，即使一个或多个节点未确认写入，数据库也会将该写入声明为成功。可调一致性的原则可能导致同一数据在不同节点上存在不同版本。虽然数据库会自动执行某些类型的修复（如读修复），但管理员执行的关键操作之一是反熵修复，即使用\
    \ `nodetool repair` 命令手动修复数据。\n\n提示\n\n在执行修复时运行 `nodetool stats` 命令以监控修复进度。\n\n\
    ##### 何时执行修复\n\n修复的频率与配置的读写一致性级别有很大关系。如果你选择的是一致性级别提供较慢的级别，那么你应该更频繁地安排修复。\n\n频繁的修复会产生开销成本，因此尽可能使用子范围修复，并将不同\
    \ Keyspace（或表）的修复安排在不同时间。\n"
- fmt: '# Cassandra数据库维护：nodetool命令详解


    ## 当修复不可避免时


    尽管使用`nodetool repair`命令执行的修复是可选的，但有几种操作在完成后需要您执行一次完整的修复。这些操作包括更改集群的`snitch`和更改键空间的复制级别。


    ## 运行 nodetool repair 命令


    您可以为整个数据库或特定的键空间或表运行`nodetool repair`命令，如下列示例所示：


    ```

    $ nodetool repair

    $ nodetool repair cycling

    $ nodetool repair cycling cycle

    ```


    您也可以使用`-local`（或`–in-local-dc`）选项仅为本地数据中心运行`nodetool repair`命令。您还可以使用`-dc`（或`–in-dc`）选项指定一个数据中心。


    当您在运行`nodetool repair`命令时指定`-full`选项时，Cassandra会执行完整修复。由于完整修复可能耗时且占用资源，您可以要求它执行增量修复，即数据库仅修复之前未修复的数据。在Cassandra
    3.x中，默认是增量修复。以下是日志文件的摘录，展示了`repair`命令的工作方式：


    ```

    INFO  [Thread-8] 2017-07-16 09:22:23,564 RepairRunnable.java:136 - Starting repair
    command #1 (f30498c0-6a42-11e7-9731-6f6038c9cb1c), repairing keyspace system_traces
    with repair options (parallelism: parallel, primary range: false, incremental:
    true, job threads: 1, ColumnFamilies: [], dataCenters: [], hosts: [], # of ranges:
    512, pull repair: false)

    ...

    INFO  [Repair#1:1] 2017-07-16 09:22:27,833 RepairJob.java:172 - [repair #f35db540-6a42-11e7-9731-6f6038c9cb1c]
    Requesting merkle trees for sessions (to [/192.168.159.129, ubuntu/192.168.159.130])

    ...

    INFO  [CompactionExecutor:9] 2017-07-16 09:22:28,547 CompactionManager.java:694
    - [repair #f30498c0-6a42-11e7-9731-6f6038c9cb1c] Completed anticompaction successfully

    INFO  [CompactionExecutor:10] 2017-07-16 09:22:28,759 RepairRunnable.java:340
    - Repair command #1 finished in 5 seconds

    $

    ```


    ## 通过从其他节点获取数据来重建数据（nodetool rebuild）


    运行`nodetool rebuild`命令以重建令牌范围。该命令从单个源副本重建流，但同时操作多个节点。


    当您向集群添加数据中心时，`nodetool rebuild`命令非常有用。您可以一次重建单个键空间，也可以指定多个键空间，每个键空间用逗号分隔。示例如下：


    ```

    $ nodetool rebuild –keyspace cyclists, motorists

    ```


    请记住：


    *   默认情况下，此命令会选择集群中的任意数据中心。您可以通过`source-dc-name`选项指定数据库应从中选择其需要流式传输的数据源的数据中心。如果您不提供任何数据中心的名称，命令可能看似运行，但实际上不会执行任何操作。

    *   您可以指定参数`tokens`以提供单个令牌的列表或令牌范围（`start_token, end_token`）。


    ## 清理不必要的键空间和分区键（nodetool cleanup）


    当您向集群添加新节点时，一些节点可能会将其部分分区范围丢失给新节点。但是，Cassandra此时不会从当前节点中删除不必要的键空间和分区键。


    同样，如果您减少数据中心的复制因子，一些节点最终将存储数据库不再用作副本的数据。


    在这两种情况下，当您添加节点或减少复制因子时，Cassandra的合并进程最终将清除被丢弃和不必要的数据。您无需在每次此类集群更改后手动清理。但是，如果您希望更快地回收磁盘空间，可以运行`nodetool
    cleanup`命令。


    > 注意

    >

    > 如果节点在某些表中使用了计数器列，一旦您运行`nodetool cleanup`命令，数据库会为该节点分配新的计数器ID。


    以下是展示如何运行`nodetool cleanup`命令的示例：


    ```

    $ nodetool cleanup

    ```


    由于您未指定键空间，此命令将清理所有不再属于此节点的键空间。您也可以选择指定一个键空间以及要清理的表列表。运行如下`nodetool cleanup`命令以清理特定键空间：


    ```

    $ nodetool cleanup cycling

    ```


    ## 重建索引


    您可以通过为表运行`nodetool rebuild_index`命令来重建二级索引。在该命令中，您必须指定键空间、表的名称，以及一个或多个用空格分隔的索引名称。


    `nodetool rebuild_index`命令为表的索引执行完全重建。此命令需要三个参数：键空间、`cf`（列族，是表的同义词）和索引名称。示例如下：


    ```

    $ nodetool rebuild_index cycling cycle test_idx;

    ```


    ## 刷新表的大小估算


    当您向表中插入大量数据或截断表的数据时，表的大小估算会变得陈旧。运行`nodetool refreshsizeestimates`命令以刷新表大小估算。该命令会刷新`system.size_estimates`表。


    ## 关键 Nodetool 维护命令


    在本章中，除其他内容外，我将向您展示如何在集群中添加、移动和删除节点。在执行与在集群中添加、移动和删除节点及数据中心相关的大部分任务时，您将运行一组关键的`nodetool`命令。例如，在停用节点后，您需要运行`nodetool`命令。我将在本节中解释与节点维护相关的常见`nodetool`命令。'
  raw: '#### When Repairs Are Unavoidable


    Although the repairs you perform with the `nodetool repair` command are optional,
    there are several operations that require that you perform a full repair after
    completing the operations. These operations include changing a cluster’s snitch
    and changing the replication level of keyspaces.


    #### Running the nodetool repair Command


    You can run the `nodetool repair` command for the entire database or for a specific
    keyspace or table, as shown in the following examples:


    ```

    $ nodetool repair

    $ nodetool repair cycling

    $ nodetool repair cycling cycle

    ```


    You can also run the `nodetool repair` command just for the local datacenter with
    the `-local` (or `–in-local-dc`) option. You can also specify a datacenter with
    the `-dc` (or `–in-dc`) option.


    Cassandra performs a full repair when you specify the -`full` option when you
    run the `nodetool repair` command. Since a full repair can be time consuming and
    resource intensive, you can ask it to perform an incremental repair, wherein the
    database only repairs previously unrepaired data. The default is incremental repair
    in Cassandra 3.x. Here’s an excerpt from the log file that shows how the `repair`
    command works:


    ```

    INFO  [Thread-8] 2017-07-16 09:22:23,564 RepairRunnable.java:136 - Starting repair
    command #1 (f30498c0-6a42-11e7-9731-6f6038c9cb1c), repairing keyspace system_traces
    with repair options (parallelism: parallel, primary range: false, incremental:
    true, job threads: 1, ColumnFamilies: [], dataCenters: [], hosts: [], # of ranges:
    512, pull repair: false)

    ...

    INFO  [Repair#1:1] 2017-07-16 09:22:27,833 RepairJob.java:172 - [repair #f35db540-6a42-11e7-9731-6f6038c9cb1c]
    Requesting merkle trees for sessions (to [/192.168.159.129, ubuntu/192.168.159.130])

    ...

    INFO  [CompactionExecutor:9] 2017-07-16 09:22:28,547 CompactionManager.java:694
    - [repair #f30498c0-6a42-11e7-9731-6f6038c9cb1c] Completed anticompaction successfully

    INFO  [CompactionExecutor:10] 2017-07-16 09:22:28,759 RepairRunnable.java:340
    - Repair command #1 finished in 5 seconds

    $

    ```


    #### Rebuilding Data by Getting It from Other Nodes (nodetool rebuild)


    You run the `nodetool rebuild` command to rebuild a token range. The command rebuilds
    streams from a single source replica but operates simultaneously on multiple nodes.


    The `nodetool rebuild` command is useful when you’re adding a datacenter to your
    cluster. You can rebuild a single keyspace at a time or specify multiple keyspaces,
    each separated by a comma. Here’s an example:


    ```

    $ nodetool rebuild –keyspace cyclists, motorists

    ```


    Remember:


    *   By default, this command choses an arbitrary datacenter in your cluster. You
    can specify a datacenter from which the database should select the sources for
    the data it needs to stream through the `source-dc-name` option. If you don’t
    provide the name of any datacenter, the command may seem to work, but it won’t
    do anything.

    *   You can optionally specify the parameter `tokens` to provide a list of single
    tokens or a range of tokens (`start_token, end_token`).


    #### Cleaning Up Unnecessary Keyspaces and Partition Keys (nodetool cleanup)


    When you add a new node to a cluster, some nodes may lose part of their partition
    range to the new node. However, Cassandra doesn’t remove the unnecessary keyspaces
    and partition keys from the current nodes when this happens.


    Similarly, if you decrease the replication factor for a datacenter, some nodes
    will end up storing data that isn’t being used by the database as replicas.


    In both cases, when you add nodes or when you reduce the replication factor, Cassandra’s
    compaction processes will eventually get rid of the discarded and unnecessary
    data. You don’t have to manually clean up after every such change in a cluster.
    However, if for any reason you wish to reclaim disk space faster, you can run
    the `nodetool cleanup` command.


    Note


    If the node uses a counter column in some tables, once you run the `nodetool cleanup`
    command, the database assigns new counter IDs to that node.


    Here’s an example that shows how to run the `nodetool cleanup` command:


    ```

    $ nodetool cleanup

    ```


    Since you didn’t specify a keyspace, this command will clean up all keyspaces
    that are no longer part of this node. Optionally, you can specify a keyspace,
    as well as a list of tables for cleaning up. You run the `nodetool cleanup` command
    as follows to clean up a specific keyspace:


    ```

    $ nodetool cleanup cycling

    ```


    ### Rebuilding Indexes


    You can rebuild secondary indexes by running the `nodetool rebuild_index` command
    for a table. In the command, you must specify the names of the keyspace, table,
    and one or more index names separated by a space.


    The `nodetool rebuild_index` command performs a full rebuild of the index for
    a table. This command requires three arguments: keyspace, cf (column family, which
    is a synonym for a table), and the name of the index. Here’s an example:


    ```

    $ nodetool rebuild_index cycling cycle test_idx;

    ```


    ### Refreshing Size Estimates of Tables


    When you insert large amounts of data into a table or when you truncate a table’s
    data, the table’s size estimates become stale. Run the `nodetool refreshsizeestimates`
    command to freshen the table size estimates. The command refreshes the `system.size_estimates`
    table .


    ## Key Nodetool Maintenance Commands


    In this chapter, among other things, I show you how to add, move, and remove nodes
    in your cluster. When performing most of the tasks pertaining to the adding, moving,
    and removing of nodes and datacenters in your cluster, you’ll be running a set
    of key `nodetool` commands. For example, you’ll be running `nodetool` commands
    after decommissioning nodes. I explain the common node maintenance-related `nodetool`
    commands in this section.'
