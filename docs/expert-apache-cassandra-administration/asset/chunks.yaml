    # 最终一致性与 Cassandra


    在此上下文中，最终一致性指的是在分布式系统中，并非所有节点都能看到数据的同一版本；在任何给定时刻，节点之间的状态可能会出现分歧。也就是说，某些节点有可能提供过时的数据。然而，经过足够长的时间后，系统的状态最终会变得一致。


    另一方面，流行的 NoSQL 数据库 `MongoDB` 更倾向于一致性和分区容忍性，而非高可用性。


    关于 CAP 和 BASE 的讨论表明，尽管像 `Cassandra` 这样的 NoSQL 数据库有其优势，特别是在支持水平扩展和高效处理非关系型数据方面，但它们也确实存在独特的缺点，并且在同时支持数据一致性和可用性等传统原则方面做出了关键性的牺牲。


    一致性虽然是一个值得称赞的目标，但会对成本效益高的水平扩展产生负面影响。如果数据库需要持续检查每笔交易的一致性，那么一个拥有数十亿交易的数据库将产生巨大的开销来执行所有这些检查。在一个大型分布式数据库中，一致性的想法是不切实际的。


    正是最终一致性原则，使得谷歌、推特和亚马逊等公司能够与全球数百万客户互动，通过支持分区容忍性来保持其系统的可用性。如果没有最终一致性原则，就不会存在所有这些能够成功应对因云计算、社交网络及相关现代趋势而导致数据量呈指数级增长的系统。


    > **注意**

    > `Cassandra` 允许你设置一个客户端在所有操作中都必须指定的一致性级别。通过这种方式，你可以决定 `Cassandra` 集群中有多少节点必须确认一次写操作，数据库才认为写操作成功。

    >

    > 假设你为某些数据设置了复制因子为 3，意思是数据库必须将所有数据传播到三个不同的节点。通过将你的一致性级别设置为 2，例如，你告诉 `Cassandra`
    即使某些节点宕机，也将一次更新或写入视为成功。


    ## Cassandra 的缺点


    尽管 `Cassandra` 提供了诸多好处，但你应当认识到该数据库也存在一些明显的缺点，特别是当你来自关系型数据库背景时。


    在接下来的章节中，我将从查询数据和写入数据两个角度来审视 `Cassandra` 的缺点。


    ### 查询数据的问题


    `Cassandra` 在查询数据时的主要缺点在于它是一个最终一致性的数据库，并且它不支持标准的数据库连接操作。


    #### 最终一致性


    `Cassandra` 自动将数据复制到集群中的各个节点。这里没有主节点，数据传播确实涉及一些延迟，因此，你最终会得到一致性。


    如前所述，最终一致性意味着在分布式设置中，为了实现高可用性，有一个非正式的保证：如果数据项没有新的更新，最终所有对该数据项的访问都将返回一个相同的（最后更新的）值。你可以通过使用
    `quorum reads and writes`（法定人数读写）来减轻最终一致性的副作用。


    #### 无连接操作


    `Cassandra` 不使用表连接，而表连接是关系型数据库查询的一个关键特性。因此，你也没有任何外键。


    你可以通过反范式化你的数据，使用重复数据和面向查询的存储格式来绕过缺乏事务的问题。另一个策略是使用像 `Apache Spark` 这样强大的数据分析工具与
    `Cassandra` 一起使用。


    #### 无索引


    关系型数据库既采用唯一标识行的主键，也采用称为二级索引的多个其他索引来加速检索。`Cassandra` 表确实使用主键，但数据库对二级索引的支持有限。


    在 `Cassandra` 中，你会发现很少有情况需要创建二级索引。不加选择地使用二级索引会损害性能。


    ### 写入数据的问题


    由于缺乏对传统事务的支持，以及不可变表和变更操作带来的开销，`Cassandra` 在写入数据时也存在一些缺点。


    #### 缺乏对事务的支持


    事务是传统关系型数据库的重要组成部分，但 `Cassandra` 不支持事务相关概念，例如在处理关系型数据库时至关重要的回滚或锁定机制。


    `Cassandra` 确实支持轻量级事务，但它们代价高昂。`Cassandra` 使用 `Paxos 协议` 来实现轻量级事务，以按顺序处理并发读写数据项的操作。`Paxos
    协议` 通过具有实时约束的串行一致性来实现，最终得到的事务隔离类似于 `Oracle` 等数据库中提供的串行化隔离级别。第 7 章将详细讨论 `Paxos
    算法` 和可线性化一致性。


    #### 不可变表和变更操作带来的开销


    `Cassandra` 将其数据存储在称为 `SSTables` 的不可变结构中。当你更新数据时，`Cassandra` 会将数据分散到多个 `SSTables`
    中。当你删除数据时，它会创建称为 `tombstones`（墓碑）的标记，以确保数据库在集群的所有节点上正确删除数据。


    由于读取操作必须从多个表中收集数据，因此读取存在固有的开销。正如你将在第 11 章中学到的，通过压缩来清理 `SSTables` 可以减轻这种开销。


    ### 谁应该使用 Cassandra？


    我已经解释了 `Cassandra` 的关键缺点。这些缺点不应该阻止你使用 `Cassandra`；远非如此！这些缺点应该用于告诉你，你的用例是否应该使用
    `Cassandra`。


    当你处理不变化的数据（不可变数据），并且更新和删除很少发生时，`Cassandra` 是一个绝佳的选择。这意味着 `Cassandra` 非常适合处理来自个性化、欺诈检测、时间序列和传感器数据的海量不可变数据。


    如果你主要寻找一个能执行快速写入的数据库，`Cassandra` 也是一个合适的选择。


    ## Cassandra 优化


    虽然关系型数据库广泛使用诸如查询优化和压缩等策略，但 `Cassandra` 使用了各种优化，其中一些你通常不会在关系型数据库中找到。以下部分描述了关键的
    `Cassandra` 性能优化。


    ### 数据缓存


    `Cassandra` 提供集成的缓存机制，并将缓存数据分布在集群中。当一个节点不可用时，客户端可以从数据的另一个缓存副本中读取数据。这里没有单独的数据库缓存层。`Cassandra`
    提供两种类型的数据缓存：分区键缓存和行缓存。


    -   分区键缓存会缓存 `Cassandra` 表的分区索引，以减少查找时间。

    -   行缓存将缓存整行数据。当读取次数远大于（约 95%）写入次数时，`Cassandra` 建议你使用行缓存。

    '
- fmt: '### 压缩


    Cassandra 允许你压缩数据，以减少存储在磁盘上的数据量，并降低磁盘 I/O。在关系型数据库中，压缩通常开销较大，因为需要额外的 CPU 周期以及用于压缩和解压数据的磁盘
    I/O。由于 Cassandra 表是不可变的（一旦刷新到磁盘，就永远不会被修改），数据库无需进行重新压缩来处理写入。这意味着 Cassandra 只在最初将表从内存表写入磁盘时压缩一次
    SSTables。


    除了 SSTables，也可以压缩 Cassandra 的提交日志来提高写入性能。


    Cassandra 提供了多种压缩策略，我将在[第 11 章](#A436674_1_En_11_Chapter.html)中讨论它们。


    ### 布隆过滤器


    Cassandra 使用布隆过滤器来确定一个表（SSTable）是否包含特定分区的数据。其目的是在搜索特定数据时，避免读取整个 SSTable。Cassandra
    将布隆过滤器用于索引扫描，但不用于范围扫描。


    ### 压缩


    SSTables 是不可变的，这意味着 Cassandra 不会通过插入或更新来覆盖现有数据。相反，Cassandra 会将插入或更新的数据的时间戳版本写入一个新的
    SSTable。因此，随着时间的推移，Cassandra 会在不同的 SSTables 中留下一行的多个版本。


    Cassandra 也不会通过立即删除数据来执行删除操作。它只是用墓碑标记数据，表明该数据已被删除。


    Cassandra 会定期合并 SSTables 以丢弃旧数据，这个过程称为压缩。压缩的结果是，使用该行每个列的最新版本，组装出一个完整的行。


    有多种压缩策略可供选择，具体取决于你的工作负载是写入密集型还是读取密集型。


    ## Cassandra 适合你吗？


    Cassandra 并非通用数据库！以下是 Cassandra 理想的常见用例。


    *   **大型环境**：Cassandra 是面向高交易量的数据库。一个优秀的关系型数据库管理系统可以在仅一台或几台服务器上处理大量交易。你的用例必须涉及超高的吞吐需求、高流量以及对低延迟工作的要求，才值得考虑使用
    Cassandra。

    *   **写入密集型工作负载**：Cassandra 非常适合涉及大量写入的用例，因为它为写入操作提供了高吞吐量。如果你有大量客户端和高写入量，Cassandra
    是一个绝佳的选择。

    *   **分布式数据**：由于 Cassandra 在处理地理上分布的集群方面表现良好，一个受益于在用户附近存储数据的全球性应用可以潜在地使用 Cassandra。


    Cassandra 并非适合所有用例的最佳选择。然而，本章前面描述的原因，如快速性能和支持大量复杂数据类型，使其成为高度可扩展存储的杰出工具。


    对于大多数存储需求，你可以继续使用 MySQL 或 Oracle。如果业务部门看到需要存储非常大量的数据，那就是你想要使用 Cassandra 的地方。在这些情况下使用
    Cassandra 是有意义的，而不是试图扩展关系型数据库的能力来管理和分析海量数据。


    ## Cassandra 数据建模要点


    [第 4 章](#A436674_1_En_4_Chapter.html)重点介绍 Cassandra 数据建模，本书其他多个章节详细阐述了关键的 Cassandra
    数据建模概念。在这个介绍性章节中，我想提及在 Cassandra 数据库中成功数据建模的关键原则或规则。


    你需要一种新的思维方式来编写在分布式数据库上可扩展的应用程序。首先要记住的是，Cassandra 并不是关系型数据库的直接替代品。这意味着你不能期望将数据和查询从关系型数据库直接放入
    Cassandra 并期望一切正常工作。为了充分利用 Cassandra，你应该使用 Cassandra 的数据建模原则和规则来设计你的应用程序。


    Cassandra 使用的数据模型基于你将对数据库运行的预期查询，而不是基于对实体及其之间关系的建模。


    对于过渡到 Cassandra 等分布式数据库的用户来说，尝试使用物化视图、索引和用户定义函数来扩展他们的应用程序是很常见的。当你在基于 Cassandra
    的应用程序中使用这些传统策略时，你会感到相当惊讶。


    有了这个背景，让我们回顾一下 Cassandra 数据建模背后的关键原则。


    ### 按查询构建数据


    由于 Cassandra 在写入数据方面非常高效，数据反规范化和重复的开销很小。重复数据将使你的读取速度更快。理想情况下，一次读取应该能够从单个分区获取其所有数据。


    ### 避免更新和删除


    根据其设计，Cassandra 与仅追加、不可变的数据集配合良好。清理“环”中的变更和删除操作将带来高昂的开销。


    ### 均匀分布数据


    你必须确保将数据均匀分布在 Cassandra 环上，这样单个节点就不会被卡住去处理不成比例的大量数据。适当选择分区键对于确保均匀的数据分布至关重要。


    ### 避免跨分区查询


    从多个节点处理和聚合数据，读取需要更长的时间。分区策略和位置在这里至关重要，因为跨分区查询可能会导致巨大的开销。


    ## Cassandra 管理员应该知道什么


    这本书主要关于管理 Cassandra，尽管它对 Cassandra 架构师和开发人员也将非常有用。


    与任何数据库一样，Cassandra 需要调整各种配置参数、选择正确的数据模型以及其他策略以实现最佳性能。虽然你在管理关系型数据库方面获得的许多技能可以轻松应用于
    Cassandra 数据库，但你还需要学习额外的知识才能成为一名成功的 Cassandra 数据库管理员。


    诸如通过配置内核优化操作系统、通过各种工具监控操作系统以及 SQL 查询优化技术等传统技能，在管理 Cassandra 数据库时都将对你有所帮助。除了这些技能，你还需要关注我在以下部分描述的工具和技能。


    ### Cassandra 工具


    Cassandra 提供了几种有用的管理工具来监控和管理你的集群。以下是你会经常使用的关键工具的简要描述。


    *   `cassandra` 实用程序：`cassandra` 实用程序使你能够启动一个 Cassandra 实例。此外，该实用程序还使你能够执行其他任务，例如替换一个故障节点。

    *   SSTable 实用程序：Cassandra 提供了大约十几个实用程序，使你能够执行 SSTable 任务，例如转储表的内容、打印表的元数据、将一个表拆分为多个表，以及列出表的
    SSTable 文件。

    *   `nodetool` 实用程序：`nodetool` 实用程序是一个命令行工具，用于监控和管理集群。你将在[第 2 章](#A436674_1_En_2_Chapter.html)开始使用
    `nodetool`，到本书结束时，你将学到每一个 `nodetool` 命令选项。

    *   `cassandra-stress` 工具：这是一个压力测试实用程序，可用于对集群进行基准测试和负载测试。该工具对于理解数据库的可扩展性和优化数据模型特别有用。'
  raw: '### Compression


    Cassandra allows you to compress data to reduce the volume of data stored on disk,
    as well as lower the disk I/O. Compression is usually expensive in a relational
    database, due to the additional CPU cycles and disk I/O for compressing and decompressing
    data. Since Cassandra tables are immutable (once they are flushed to disk, they
    aren’t ever modified), the database doesn’t need a recompression cycle to process
    writes. This means that Cassandra compresses the SSTables just once, when it initially
    writes the tables to disk from the memtables.


    In addition to SSTables , it’s also possible to compress Cassandra’s commit log
    to improve write performance.


    Cassandra offers multiple compaction strategies, and I discuss them in Chapter
    [11](#A436674_1_En_11_Chapter.html).


    ### Bloom Filters


    Cassandra uses bloom filters to determine if a table (SSTable) has data for a
    specific partition. The idea is to eliminate the reading of whole SSTables when
    searching for specific bits of data. Cassandra uses bloom filters for index scans,
    but not for range scans.


    ### Compaction


    SSTables are immutable, meaning Cassandra doesn’t overwrite existing data with
    inserts or updates. Instead, Cassandra writes a time-stamped version of the inserted
    or updated data in a new SSTable. As a result, over time, Cassandra ends up with
    multiple versions of a row in different SSTables.


    Cassandra also doesn’t perform deletes by immediately removing the data you delete.
    It simply marks the data with a tombstone , indicating that the data is deleted
    data.


    Cassandra periodically merges the SSTables to discard old data, a process called
    compaction. Compactions results in the assembling of a single complete row using
    the latest version of each of that row’s columns.


    There are various compaction strategies you can use, the choice depending on whether
    your workload is write- or read-intensive.


    ## Is Cassandra Appropriate for You?


    Cassandra is not a general-purpose database! The following are the common use
    cases for which Cassandra will be ideal.


    *   Large Environments: Cassandra is a database for high-volume transactions.
    A good RDBMS can handle a large number of transactions and can do so while running
    on just a single server or a couple of them. Your use case must involve super-heavy
    throughout requirements and high traffic, and a requirement for low-latency work,
    for you to consider using Cassandra.

    *   Write-Heavy Workloads: Cassandra is well suited for use cases that involve
    heavy writes , since it offers high throughput for write operations. Cassandra
    is an excellent choice if you have numerous clients and high write volumes.

    *   Distributed Data: Since Cassandra works well with geographically distributed
    clusters , a global application that benefits by storing data near the user can
    potentially use Cassandra.


    Cassandra isn’t the best fit for all use cases. However, the reasons described
    earlier in this chapter, such as fast performance and support for a large number
    of complex data types, make it an outstanding excellent tool for highly scalable
    storage.


    You can continue to use MySQL or Oracle for most of your storage needs. If a business
    unit sees a need for storing very large volumes of data, that’s where you want
    to use Cassandra. It makes sense to use Cassandra in these cases rather than trying
    to stretch the capacities of the relational databases to manage and analyze huge
    troves of data.


    ## Cassandra Data Modeling Essentials


    Chapter [4](#A436674_1_En_4_Chapter.html) focuses on Cassandra data modeling and
    several other chapters throughout this book elaborate on the key Cassandra data
    modeling concepts. In this introductory chapter, I would like to mention the key
    principles or rules for successful data modeling in a Cassandra database.


    You need a new way of thinking to write applications that scale on a distributed
    database. The first thing to remember is that Cassandra isn’t a drop-in replacement
    for a relational database. This means that you can’t expect to drop your data
    and queries from a relational database into Cassandra and expect it all to work
    fine. To get the most out of Cassandra, you should design your application using
    Cassandra’s data modeling principles and rules.


    Cassandra uses a data model based on the expected queries that you’ll run against
    the database, and not on modeling the entities and the relationships among them.


    It’s common for users transitioning to a distributed database such as Cassandra
    to try to use materialized views, indexes, and user-defined functions to scale
    their applications. When you use these traditional strategies in a Cassandra-based
    application, you’ll be in for quite a surprise.


    With this background, let’s review the key principles behind Cassandra data modeling.


    ### Structure Your Data by the Queries


    Since Cassandra is very efficient in writing data, you incur minimal overhead
    for denormalizing data and duplicating it. Duplicating data is going to make your
    reads faster. Ideally, a read should be able to get all its data from a single
    partition.


    ### Avoid Updates and Deletes


    By its design, Cassandra works well with an append-only, immutable set of data.
    You’ll pay a stiff overhead for clearing mutations and deletes from the “ring.”


    ### Evenly Distribute Your Data


    You must ensure that you spread your data evenly across a Cassandra ring, so a
    single node isn’t stuck with processing a disproportionately large amount of data.
    Appropriate selection of the partition keys is critical to ensuring an even data
    distribution .


    ### Avoid Querying Across Partitions


    It takes longer for a read to process and aggregate data from multiple nodes.
    Partitioning strategy and location is critical here because querying across partitions
    may result in a heavy overhead.


    ## What a Cassandra Administrator Ought to Know


    This book is primarily about administering Cassandra, although it’ll be of significant
    use to Cassandra architects and developers as well.


    As with any database, Cassandra requires the tuning of various configuration parameters,
    selection of the right data model, and other strategies to produce peak performance.
    While several of the skills that you’ve acquired in managing a relational database
    are readily applicable to the Cassandra database, you’ll need to learn additional
    things to be a successful Cassandra database administrator.


    Traditional skills such as optimizing the operating system through configuring
    the kernel, monitoring the operating system through various tools, and SQL query
    optimization techniques are all going to be helpful to you when administering
    a Cassandra database. In addition to these skills, you’ll need to focus on the
    tools and skills I describe in the following sections.


    ### Cassandra Tools


    Cassandra offers several useful administration tools to monitor and manage your
    clusters. The following is a brief description of the key tools you’ll often use.


    *   The cassandra Utility: The cassandra utility enables you to start a Cassandra
    instance. In addition, the utility enables you to perform other tasks, such as
    replacing a dead node.

    *   The SSTable Utilities: Cassandra offers about a dozen useful utilities that
    enable you to perform SSTable tasks such as dumping the contents of a table, printing
    a table’s metadata, splitting a table into multiple tables, and listing the SSTable
    files for a table.

    *   The nodetool utility: The nodetool utility is a command line tool to monitor
    and manage a cluster. You’ll start using nodetool in Chapter [2](#A436674_1_En_2_Chapter.html),
    and by the time you reach the end of the book, you’ll have learned every single
    nodetool command option.

    *   The cassandra-stress tool: This is a stress testing utility you can use to
    benchmark and load test your clusters. The tool is especially useful in understanding
    the scalability of your database and optimizing your data models.'
