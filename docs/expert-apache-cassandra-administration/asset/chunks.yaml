  trans: '


    ## 从数据库中移除已删除的数据


    Cassandra 不会在你执行 `DELETE` 语句后立即从表中移除行和列。相反，它会在删除操作之后的第一次合并过程中完全移除这些值。这样做是为了提高性能。


    ### Cassandra 如何使用墓碑标记来标记已删除的数据


    Cassandra 会用墓碑标记来标记你删除的数据，并在一段宽限期后将其完全移除。Cassandra 将所有删除操作视为插入或更新插入（根据情况可能是更新或插入）。


    当你删除数据时，Cassandra 会向作为 `DELETE` 命令一部分的分区添加一个删除标记。这个删除标记被称为墓碑标记，数据库会将这些标记写入一个或多个节点上的
    SSTable。每个墓碑标记都有一个过期期限，之后数据库会在其常规的 SSTable 合并过程中删除该墓碑标记。


    ### 指定生存时间值


    或者，你可以为记录（行或列）或表指定一个 `TTL` 值，以设置列中数据的可选过期期限（`counter` 类型数据除外）。这样做将使 Cassandra
    在经过一定时间后删除列或表中的数据。在生存时间周期结束时，数据库会用墓碑标记标记该记录，并在合并过程中按照前面说明的方式处理它。


    通过设置 `TTL` 来使数据过期并非没有代价。它会带来额外的开销，即在内存和磁盘上额外使用 8 个字节来记录 `TTL` 和过期时间。


    **注意**


    指定 `TTL` 是一种隐式删除数据的方式。你可以通过在表的列上设置 `TTL` 或为表指定 `default_time_to_live` 属性来实现。


    你可以使用 `INSERT` 或 `UPDATE` 语句指定过期时间 (`TTL`)。以下示例展示了如何通过向 `INSERT` 命令添加 `USING TTL`
    选项，指定 `users` 表中的 `password` 列在 1 天（86,400 秒）后过期：


    ```cql

    cqlsh:mydb> INSERT INTO users

    (user_name, password)

    VALUES (''cbrown'', ''ch@ngem4a'') USING ttl 86400;

    ```


    此后，你可以通过执行以下 `UPDATE` 语句将该期限增加到 2 天：


    ```cql

    cqlsh:mydb> UPDATE users USING TTL 172800 SET password = ''ch@ngem4a''

    WHERE user_name = ''cbrown'';

    ```


    你可以使用 `default_time_to_live` 属性为整张表设置默认 `TTL`，这是在创建表时可以指定的 CQL 表属性之一。此属性的默认值为
    0，表示写入表中的数据永远不会过期。该值以秒为单位。一旦设置，Cassandra 会将 `TTL` 值应用于表中的每一列。当表的 `TTL` 超过时，Cassandra
    将为整张表添加墓碑标记。


    **注意**


    通过将 `default_time_to_live` 表属性设置为零，你实际上移除了在该表中指定的任何列 `TTL`。


    你可以在使用 `CREATE TABLE` 语句创建表时，或稍后使用 `ALTER TABLE` 语句修改表时，为表应用默认 `TTL`。


    一旦列自创建以来经过的秒数超过了你配置的 `TTL` 值，Cassandra 就会认为数据已过期，尽管它仍会在查询结果中报告该数据。Cassandra 会在下一次读取时用墓碑标记（一种删除标记）标记过期数据，但会将数据最多保留
    `gc_grace_seconds` 指定的时间。


    一旦 `gc_grace_seconds` 属性指定的时间过去，Cassandra 会在其常规合并过程中自动移除那些已被标记为墓碑的数据。


    ## 垃圾回收如何工作


    你在创建表时设置 `gc_grace_seconds` 属性。该属性指定了 Cassandra 用墓碑标记数据后，经过多少秒数据才有资格被垃圾回收。


    `gc_grace_seconds` 属性的默认值很长（864,000 秒，即 10 天），因此在创建表时你可以保留此属性不变。默认值如此之长的原因是为了让
    Cassandra 有充足的时间在永久删除数据之前，最大限度地保证数据的一致性。


    虽然 `gc_grace_seconds` 属性的默认值是 10 天，但你可以为那些用户不会显式删除数据的表减少此值，例如仅包含已配置 `TTL` 的数据的表，或你已配置了
    `default_time_to_live` 属性的表。


    **提示**


    你可以为每张表配置不同的墓碑标记宽限期。


    在将 `gc_grace_seconds` 属性值从其默认设置 10 天降低之前，请记住以下几点：


    *   Cassandra 不会重放比 `gc_grace_seconds` 设置更早的提示（这些提示是重放错过的写入操作的指令）。这意味着减少 `gc_grace_seconds`
    属性值可能导致最近恢复的节点丢失一些写入操作。

    *   Cassandra 还会执行批处理操作，这涉及按顺序重放数据库中的更改。Cassandra 会等待，直到批处理更改创建后 `gc_grace_seconds`
    时间过去，才会重放该批处理更改。如果你减少了 `gc_grace_seconds` 属性的值，你将面临批处理写入可能恢复一些已删除数据的风险。


    '
- fmt: '## Zombie Records and the Need for Node Repair


    When you delete data, the node that processes the delete request will create a
    tombstone for the record and pass the tombstone to the other nodes that are storing
    a replica of the deleted record. If one of the replicas happens to be down, it
    won’t be able to receive the tombstone and will continue to store the pre-deleted
    version of the data.


    The database considers the (deleted) record on the node that has recovered as
    fresh data, if the database deleted the tombstoned record while the node was down.
    The database will then send this “fresh” data around to the other nodes. This
    deleted row(s) that reappears in a table after deletion is called a zombie.


    The reason for the presence of zombie data is that a node came back up after being
    down for a long period, before the database could run a repair. If the node isn’t
    repaired before it is back online, the database will see the non-tombstoned data
    and copy it to the other nodes as new data. This is the reason you must run a
    repair on a node that you’ve restored (with the `nodetool repair` command) before
    allowing it to join the cluster.


    Note


    The database doesn’t replay a mutation (insert or update) for a tombstoned record
    that is within its grace period.


    The table property `gc_grace_seconds` sets the grace period for a tombstone. This
    grace period helps keep the zombie records from popping up, by letting a recovering
    node time to process tombstones in the normal fashion. When you recover the down
    node, the database replays all the mutations (inserts and updates) that this node
    missed while it was down, via its hinted handoffs feature. The database won’t
    replay the changes for a record marked for deletion with a tombstone until its
    grace period is over. If the node fails to come back up by the end of the grace
    period, it’ll miss the deletions.


    Once the grace period for a tombstone ends, the database deletes the tombstone
    during its normal compaction operations.


    You can prevent zombie records by


    *   Running the `nodetool repair` command on the node once it recovers

    *   Running the `nodetool repair` command on each table every `gc_grace_seconds`


    Note


    A `DROP KEYSPACE` or a `DROP TABLE` command will immediately delete data.


    Note the following:


    *   If you choose to specify a TTL for all records in a table, they’ll expire
    naturally and you don’t need to run the `nodetool repair` command for that table.

    *   You can immediately delete all tombstones by initiating a compaction process
    (when you use the `SizeTieredCompactionStrategy` to compact data).

    *   When you set the `default_time_to_live` property at the table level, when
    a record exceeds the table’s TTL, Cassandra removes the record without creating
    a tombstone or waiting for the compaction process to run.


    ## Indexing in a Cassandra Database


    A primary index is mandatory for a table, and you’ve already learned how to create
    and work with a primary index.


    A secondary index is not mandatory when creating a table. A secondary index enables
    you to query a table on a column that you won’t be able to query otherwise.


    A secondary index helps filter a table’s data in a non-primary key column. Cassandra
    doesn’t allow you to run a query that matches a non-primary key column because
    it may not result in retrieving a continuous chunk of data from the table.


    Cassandra spreads a table’s data across multiple partitions stored on various
    nodes since a non-primary key isn’t involved in ordering the data. This means
    that if you query a specific value of a non-primary key column, you many end up
    reading all partitions of table; therefore Cassandra doesn’t permit this type
    of access.


    You can build a secondary index on a column, but there are some limitations as
    to how you can make use of such an index. If your query includes a partition key
    in addition to a secondary index column, it’ll work since the database can satisfy
    this query by reading data from a single node partition. However, if you don’t
    restrict the secondary index in a query to a specific partition key, the query
    will need to read data from all the nodes and the database won’t allow it. You’ll
    see the following error when you try the query:


    ```

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    For this type of query to work, you must add the option `ALLOW FILTERING` to the
    query.


    ### When to Use an Index


    Use an index when a table has many rows with the indexed value. If a table has
    too many unique values for a column, you incur more of an overhead for querying
    and maintaining the index on that column.


    Let’s say you have a table named `races`, and there are hundreds of millions of
    entries for cyclists that participate in various bicycling races over several
    years. Your goal is to find the cyclists by rank. Since many of the cyclists have
    participated during the same years, their ranks will share the same column value
    for the race year. In this case, the `race_year` column in the table `races` is
    ideal as an index on that table.


    Note


    The SSTable Attached Secondary Indexes (SASO) index are a new implementation of
    secondary index that offer a performance improvement. However, SASI indexes are
    still experimental as of the writing of this book (October 2017).


    ### When Not to Use a Secondary Index


    An index isn’t always a boon. It can easily turn out to be a curse if you indiscriminately
    create indexes on all tables. You’re advised not to create indexes when dealing
    with


    *   High and low cardinality columns

    *   Columns that are frequently updated or deleted

    *   Tables that include a counter column

    *   When searching for a row in a large partition


    In the following sections, I elaborate the reasons for the inadvisability of indexes
    in the situations listed here.


    #### High and Low Cardinality Columns


    Neither a high cardinality column nor a very low cardinality column is a suitable
    candidate for an index. High cardinality means that the column has many distinct
    values, and low cardinality means there are few distinct values.


    It’s inefficient to create and use an index for a column with numerous distinct
    values. You’re better off maintaining the table as a form of an index rather than
    creating a built-in Cassandra index.


    If your table is large but the queries are rare on the table, you may opt to create
    an index on a high cardinality column. Just don’t do it on a highly used, large
    table.


    As for very low cardinality columns, take the extreme case of a column with Boolean
    values. In this case, each value of the index is a single row in the index, and
    the rows are extremely large since there are only two possible values for each
    indexed column.


    #### Frequently Updated or Deleted Columns


    As mentioned, Cassandra uses tombstones to mark deleted data. Cassandra stores
    the tombstone in the index until it hits a limit of 10,000 cells. Once Cassandra
    exceeds the tombstone limit, any query that refers to the indexed column will
    fail.


    #### Using an Index for Searching for Rows in Large Partitions


    If you query an indexed column in a large table, it usually requires gathering
    the responses from several partitions. As you add more nodes to your cluster,
    the query response gets slower and slower.


    The way to avoid the situation described here is to narrow the search when querying
    the indexed column.


    In addition to all the potential issues described here, since the database stores
    the index table on each node of the cluster, if a query accesses multiple nodes,
    a query can turn out to be a performance problem.'
  raw: '#### Zombie Records and the Need for Node Repair


    When you delete data, the node that processes the delete request will create a
    tombstone for the record and pass the tombstone to the other nodes that are storing
    a replica of the deleted record. If one of the replicas happens to be down, it
    won’t be able to receive the tombstone and will continue to store the pre-deleted
    version of the data.


    The database considers the (deleted) record on the node that has recovered as
    fresh data, if the database deleted the tombstoned record while the node was down.
    The database will then send this “fresh” data around to the other nodes. This
    deleted row(s) that reappears in a table after deletion is called a zombie .


    The reason for the presence of zombie data is that a node came back up after being
    down for a long period, before the database could run a repair. If the node isn’t
    repaired before it is back online, the database will see the non-tombstoned data
    and copy it to the other nodes as new data. This is the reason you must run a
    repair on a node that you’ve restored (with the `nodetool repair` command) before
    allowing it to join the cluster.


    Note


    The database doesn’t replay a mutation (insert or update) for a tombstoned record
    that is within its grace period.


    The table property `gc_grace_seconds` sets the grace period for a tombstone. This
    grace period helps keep the zombie records from popping up, by letting a recovering
    node time to process tombstones in the normal fashion. When you recover the down
    node, the database replays all the mutations (inserts and updates) that this node
    missed while it was down , via its hinted handoffs feature. The database won’t
    replay the changes for a record marked for deletion with a tombstone until its
    grace period is over. If the node fails to come back up by the end of the grace
    period, it’ll miss the deletions.


    Once the grace period for a tombstone ends, the database deletes the tombstone
    during its normal compaction operations.


    You can prevent zombie records by


    *   Running the `nodetool repair` command on the node once it recovers

    *   Running the `nodetool repair` command on each table every `gc_grace_seconds`


    Note


    A `DROP KEYSPACE` or a `DROP TABLE` command will immediately delete data.


    Note the following:


    *   If you choose to specify a TTL for all records in a table, they’ll expire
    naturally and you don’t need to run the `nodetool repair` command for that table.

    *   You can immediately delete all tombstones by initiating a compaction process
    (when you use the `SizeTieredCompactionStrategy` to compact data).

    *   When you set the `default_time_to_live` property at the table level, when
    a record exceeds the table’s TTL, Cassandra removes the record without creating
    a tombstone or waiting for the compaction process to run.


    ## Indexing in a Cassandra Database


    A primary index is mandatory for a table, and you’ve already learned how to create
    and work with a primary index.


    A secondary index is not mandatory when creating a table. A secondary index enables
    you to query a table on a column that you won’t be able to query otherwise.


    A secondary index helps filter a table’s data in a non-primary key column. Cassandra
    doesn’t allow you to run a query that matches a non-primary key column because
    it may not result in retrieving a continuous chunk of data from the table.


    Cassandra spreads a table’s data across multiple partitions stored on various
    nodes since a non-primary key isn’t involved in ordering the data. This means
    that if you query a specific value of a non-primary key column, you many end up
    reading all partitions of table; therefore Cassandra doesn’t permit this type
    of access.


    You can build a secondary index on a column, but there are some limitations as
    to how you can make use of such an index. If your query includes a partition key
    in addition to a secondary index column, it’ll work since the database can satisfy
    this query by reading data from a single node partition. However, if you don’t
    restrict the secondary index in a query to a specific partition key, the query
    will need to read data from all the nodes and the database won’t allow it. You’ll
    see the following error when you try the query:


    ```

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    For this type of query to work, you must add the option `ALLOW FILTERING` to the
    query.


    ### When to Use an Index


    Use an index when a table has many rows with the indexed value. If a table has
    too many unique values for a column, you incur more of an overhead for querying
    and maintaining the index on that column.


    Let’s say you have a table named `races`, and there are hundreds of millions of
    entries for cyclists that participate in various bicycling races over several
    years. Your goal is to find the cyclists by rank. Since many of the cyclists have
    participated during the same years, their ranks will share the same column value
    for the race year. In this case, the `race_year` column in the table `races` is
    ideal as an index on that table.


    Note


    The SSTable Attached Secondary Indexes (SASO) index are a new implementation of
    secondary index that offer a performance improvement. However, SASI indexes are
    still experimental as of the writing of this book (October 2017).


    ### When Not to Use a Secondary Index


    An index isn’t always a boon. It can easily turn out to be a curse if you indiscriminately
    create indexes on all tables. You’re advised not to create indexes when dealing
    with


    *   High and low cardinality columns

    *   Columns that are frequently updated or deleted

    *   Tables that include a counter column

    *   When searching for a row in a large partition


    In the following sections, I elaborate the reasons for the inadvisability of indexes
    in the situations listed here.


    #### High and Low Cardinality Columns


    Neither a high cardinality column nor a very low cardinality column is a suitable
    candidate for an index. High cardinality means that the column has many distinct
    values, and low cardinality means there are few distinct values.


    It’s inefficient to create and use an index for a column with numerous distinct
    values. You’re better off maintaining the table as a form of an index rather than
    creating a built-in Cassandra index.


    If your table is large but the queries are rare on the table, you may opt to create
    an index on a high cardinality column. Just don’t do it on a highly used, large
    table.


    As for very low cardinality columns, take the extreme case of a column with Boolean
    values. In this case, each value of the index is a single row in the index, and
    the rows are extremely large since there are only two possible values for each
    indexed column.


    #### Frequently Updated or Deleted Columns


    As mentioned, Cassandra uses tombstones to mark deleted data. Cassandra stores
    the tombstone in the index until it hits a limit of 10,000 cells. Once Cassandra
    exceeds the tombstone limit, any query that refers to the indexed column will
    fail.


    #### Using an Index for Searching for Rows in Large Partitions


    If you query an indexed column in a large table, it usually requires gathering
    the responses from several partitions. As you add more nodes to your cluster,
    the query response gets slower and slower.


    The way to avoid the situation described here is to narrow the search when querying
    the indexed column.


    In addition to all the potential issues described here, since the database stores
    the index table on each node of the cluster, if a query accesses multiple nodes,
    a query can turn out to be a performance problem.'
  trans: '## 僵尸记录与节点修复


    当你删除数据时，处理删除请求的节点会为该记录创建一个墓碑（tombstone），并将此墓碑传递给其他存储了该被删除记录副本的节点。如果其中一个副本节点恰好处于宕机状态，它将无法接收到墓碑，并继续存储数据被删除前的版本。


    如果数据库在宕机节点恢复之前，已经删除了带有墓碑标记的记录，那么数据库会将该节点上（已删除的）记录视为新数据。随后，数据库会将此“新”数据发送给其他节点。这种在删除后重新出现在表中的已删除行，就被称为**僵尸**。


    僵尸数据出现的原因是，一个节点在长时间宕机后，在数据库能够运行修复之前重新上线。如果该节点在重新上线前没有被修复，数据库会看到未被标记墓碑的数据，并将其作为新数据复制到其他节点。这就是为什么在恢复节点（使用
    `nodetool repair` 命令）并允许其加入集群之前，你必须运行修复的原因。


    注意


    数据库不会在其宽限期内重放（插入或更新）对已标记墓碑记录的变更。


    表属性 `gc_grace_seconds` 为墓碑设置了宽限期。这个宽限期有助于防止僵尸记录的出现，它让恢复中的节点有时间以正常方式处理墓碑。当你恢复宕机节点时，数据库会通过其**提示移交**（hinted
    handoff）功能，重放该节点在宕机期间错过的所有变更（插入和更新）。在记录的墓碑宽限期结束之前，数据库不会重放对该记录的删除变更。如果节点在宽限期结束时未能成功恢复上线，它将错过这些删除操作。


    一旦墓碑的宽限期结束，数据库会在其正常的压缩（compaction）操作期间删除该墓碑。


    你可以通过以下方式防止僵尸记录的出现：


    *   节点一旦恢复，立即在该节点上运行 `nodetool repair` 命令。

    *   每隔 `gc_grace_seconds` 时间，对每张表运行一次 `nodetool repair` 命令。


    注意


    `DROP KEYSPACE` 或 `DROP TABLE` 命令会立即删除数据。


    请注意以下几点：


    *   如果你选择为表中的所有记录指定生存时间（TTL），它们会自然过期，你不需要为该表运行 `nodetool repair` 命令。

    *   你可以通过启动压缩过程（例如使用 `SizeTieredCompactionStrategy` 进行数据压缩）来立即删除所有墓碑。

    *   当你在表级别设置了 `default_time_to_live` 属性时，一旦记录超过该表的 TTL，Cassandra 会直接移除该记录，而不会创建墓碑或等待压缩过程运行。


    ## Cassandra 数据库中的索引


    表必须有一个主索引，你已经学习了如何创建和使用主索引。


    在创建表时，二级索引不是必需的。二级索引使你能够对原本无法查询的列进行查询。


    二级索引有助于在非主键列上过滤表数据。Cassandra 不允许你运行直接匹配非主键列的查询，因为这可能无法从表中检索出连续的数据块。


    由于非主键不参与数据排序，Cassandra 将表的数据分散存储在位于不同节点上的多个分区中。这意味着，如果你查询某个非主键列的特定值，最终可能需要读取表的所有分区；因此，Cassandra
    不允许此类访问。


    你可以在某列上构建二级索引，但在使用此类索引时存在一些限制。如果你的查询除了包含二级索引列外，还指定了一个分区键，那么查询是可行的，因为数据库可以通过读取单个节点分区的数据来满足此查询。但是，如果你在查询中没有将二级索引限制在特定的分区键内，那么查询将需要从所有节点读取数据，而数据库将不允许此操作。当你尝试此查询时，会看到以下错误：


    ```

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    要使此类查询生效，你必须在查询中添加 `ALLOW FILTERING` 选项。


    ### 何时使用索引


    当表中许多行都包含被索引的值时，使用索引是合适的。如果表中某列的唯一值过多，你会因此产生更多的查询和索引维护开销。


    假设你有一个名为 `races` 的表，其中有数亿条关于多年来参加各种自行车比赛的自行车手的条目。你的目标是根据排名查找自行车手。由于许多自行车手在同一年参赛，他们的排名在比赛年份列上会共享相同的值。在这种情况下，`races`
    表中的 `race_year` 列非常适合作为该表的索引。


    注意


    SSTable 附加二级索引（SASI）是二级索引的一种新实现，提供了性能改进。然而，截至本书撰写时（2017 年 10 月），SASI 索引仍处于实验阶段。


    ### 何时不应使用二级索引


    索引并非总是福音。如果你不加区别地为所有表创建索引，它很容易变成诅咒。建议不要在以下情况下创建索引：


    *   高基数和低基数的列

    *   经常更新或删除的列

    *   包含计数器列的表

    *   在大型分区中搜索行时


    在接下来的章节中，我将详细阐述在此处列出的情况下不建议使用索引的原因。


    #### 高基数和低基数列


    高基数列和非常低基数的列都不适合作为索引候选。高基数意味着列中有许多不同的值，而低基数意味着不同的值很少。


    为具有大量不同值的列创建和使用索引是低效的。你最好将表本身维护为一种索引形式，而不是创建内置的 Cassandra 索引。


    如果你的表很大但查询很少，你可以选择在高基数列上创建索引。只是不要在使用频繁的大表上这样做。


    至于非常低基数的列，考虑布尔值列这种极端情况。在这种情况下，索引的每个值在索引中只对应一行，并且这些行非常大，因为每个被索引列只有两个可能的值。


    #### 经常更新或删除的列


    如前所述，Cassandra 使用墓碑来标记删除的数据。Cassandra 会在索引中存储墓碑，直到达到 10,000 个单元格的限制。一旦超过墓碑限制，任何涉及被索引列的查询都将失败。


    #### 使用索引在大型分区中搜索行


    如果你在大型表中查询被索引的列，通常需要从多个分区收集响应。随着你向集群中添加更多节点，查询响应会变得越来越慢。


    避免此处描述情况的方法是，在查询被索引列时缩小搜索范围。


    除了这里描述的所有潜在问题之外，由于数据库在集群的每个节点上都存储了索引表，如果查询访问多个节点，查询最终可能成为一个性能问题。'
- fmt: "# Cassandra Secondary Indexes and Materialized Views\n\n## Creating a Secondary\
    \ Index\n\nYou can create a secondary index on a table by executing the `CREATE\
    \ INDEX` statement. Let’s say you have the following table, with a primary key\
    \ that consists of a composite partition key `(race_year, race_name)` and a clustering\
    \ column (`rank`):\n\n```sql\ncqlsh> CREATE TABLE cycling.rank_by_year_and_name\
    \ (\n    race_year int,\n    race_name text,\n    cyclist_name text,\n    rank\
    \ int,\n    PRIMARY KEY ((race_year, race_name), rank)\n);\n```\n\nYou can’t query\
    \ this table on the column `race_year` since that column is only a part of the\
    \ composite partition key. You can create a secondary index on the `race_year`\
    \ column, which enables you to query the table on this column. Here’s how you\
    \ create the index:\n\n```sql\ncqlsh> CREATE INDEX ON cycling.rank_by_year_and_name\
    \ (race_year);\n```\n\nYou can now issue the following query that makes use of\
    \ your new secondary index:\n\n```sql\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name\
    \ WHERE race_year=2015;\n```\n\nIn the `CREATE INDEX` statement, you didn’t specify\
    \ a name for your new index. Naming an index is optional, and if you don’t specify\
    \ one, the database will assign a system generated name for the index. You can\
    \ alternatively specify your own index name thus:\n\n```sql\ncqlsh> CREATE INDEX\
    \ my_index1 ON cycling.rank_by_year_and_name (race_year);\n```\n\nYou can specify\
    \ any of the table’s columns for a secondary index, including a clustering column.\
    \ You can create multiple secondary indexes on a table.\n\nYou can create an index\
    \ on a table that already contains data, as well as a new table with no data.\n\
    \n### Dropping an Index\n\nUnlike in the case of a primary index, you can drop\
    \ a secondary index. Issue the `DROP INDEX` statement to drop an index:\n\n```sql\n\
    cqlsh> DROP INDEX myIndex1;\n```\n\nThis statement drops an existing secondary\
    \ index. If you wish to avoid errors since the index doesn’t exist, you can use\
    \ the following statement instead:\n\n```sql\ncqlsh> DROP INDEX myIndex1 IF EXISTS;\n\
    ```\n\n## Materialized Views in Cassandra\n\nAs mentioned, secondary indexes aren’t\
    \ good when dealing with high cardinality data since queries on these indexes\
    \ make the database access all the nodes in the cluster. Materialized views are\
    \ an appropriate alternative for handling high cardinality data.\n\nA materialized\
    \ view is a table that you build from an existing table using a new primary key.\
    \ You can include rows with null values in the primary key column.\n\n**Tip**\n\
    \nMaterialized views hinder performance when you use them for querying low cardinality\
    \ data. However, please proceed with caution because materialized views still\
    \ require work to be fully useful. It is not unheard of for MVs to cause cluster\
    \ downtime when dealing with heavy updates.\n\nMVs should be much more usable\
    \ by the time Cassandra 3.11 or 4.x rolls around.\n\n### Creating a Materialized\
    \ View\n\nThe following is an example that shows how you create a materialized\
    \ view using a regular table as its basis or source:\n\n```sql\ncqlsh> CREATE\
    \ MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age, name, country\nFROM\
    \ cycling.cyclist\nWHERE age IS NOT NULL AND cid IS NOT NULL\nPRIMARY KEY (age,\
    \ cid);\n```\n\nIn this example,\n\n*   The `AS SELECT` clause specifies the columns\
    \ that you want to copy from the base or target table to the new materialized\
    \ view. Here they are `age`, `name`, and `country`.\n*   The `FROM` clause points\
    \ to the original or source table from which the materialized view draws its data.\n\
    *   The `WHERE` clause ensures that the primary key columns are non-null since\
    \ that’s a requirement for creating a materialized view.\n*   The `PRIMARY KEY`\
    \ clause specifies the primary key columns, which are `age` and `cid` in this\
    \ example. The column `age` also happens to be the primary key column for the\
    \ source table, and you must include all such primary key columns from the source\
    \ table in the primary key of the materialized view as well.\n\n### Dropping a\
    \ Materialized View\n\nYou can drop a materialized view by issuing the `DROP MATERIALIZED\
    \ VIEW` command:\n\n```sql\ncqlsh> DROP MATERIALIZED VIEW cycling.cyclist_by_age;\n\
    ```\n\nYou can alternatively drop a materialized view or views by truncating the\
    \ source table, which removes all materialized views based on that table. When\
    \ you drop a table, you must first drop all materialized views that use that table\
    \ as their source table.\n\n### Denormalizing with Materialized Views\n\nIn the\
    \ example of a materialized view, you partitioned the materialized view by `age`\
    \ so you could run queries on it based on the age of the cyclists. Materialized\
    \ views help denormalize your data by creating multiple tables with the same data\
    \ but organized differently based on different primary keys.\n\nYou can create\
    \ multiple materialized views on the same table. Thus, you can create view with\
    \ different primary keys such as `birthday` or `country`. This helps you organize\
    \ the data by these primary keys and lets you query those materialized views by\
    \ `birthday` and `country`.\n\n### Updating Materialized Views\n\nWhen you update\
    \ the source table, the database automatically updates any materialized views\
    \ you’ve created based on that table, and the same goes with deletion of data\
    \ from the source table. However, the updates are asynchronous so the materialized\
    \ view is updated after a delay, after the update of the parent table.\n\nCassandra\
    \ needs to perform an additional read before it can update the materialized views.\
    \ This read involves a data consistency check of all the replicas, which means\
    \ that writes to a materialized view are slower than normal table writes.\n\n\
    Deletes pose a problem as well. Since the database may not store identical rows\
    \ from the parent table contiguously in the materialized views, deleting rows\
    \ from the source table may often require the database to create multiple tombstones\
    \ in the corresponding materialized views.\n\n## Querying Data with the SELECT\
    \ Statement\n\nData manipulation language (DML) is the set of CQL statements that\
    \ enable you to query, insert, update, and delete data. Querying data is the most\
    \ common DML operation that you’ll perform in a Cassandra database. Therefore,\
    \ it’s a good idea to thoroughly understand how to use the `SELECT` statement\
    \ in CQL.\n\nThe `SELECT` statement returns results that match a request. Each\
    \ of the rows contains the values for the selections that are part of the `SELECT`\
    \ statement.\n\nThe following is the basic syntax of a `SELECT` statement in CQL:\n\
    \n```sql\nSELECT selectors | DISTINCT partition\nFROM [keyspace_name.] table_name\n\
    [WHERE partition_conditions [ AND solr_query = 'search_expression' [LIMIT n] |\n\
    [solr_query = 'search_expression'  [LIMIT n]]\n[AND clustering_conditions\n[AND\
    \ regular_column_conditions]]]\n[GROUP BY column_name]\n[ORDER BY PK_column_name\
    \ ASC|DESC]\n[LIMIT N | PER PARTITION LIMIT N]\n[ALLOW FILTERING]\n```\n\nA `SELECT`\
    \ statement contains the following key clauses:\n\n*   The selection clause\n\
    *   The where clause\n*   The group by clause\n*   The ordering clause\n\nThe\
    \ following sections describe the key clauses of the `SELECT` statement.\n\n###\
    \ The Selection Clause\n\nThe `selection clause` determines which columns the\
    \ query returns, as well as any transformation the database must apply to the\
    \ result set before returning the results. The `SELECT` statement must use either\
    \ a wildcard selector (`*`) or one or more selectors to define the columns.\n\n\
    A selector can be\n\n*   A column name\n*   A term\n*   A function call\n*   The\
    \ special call `COUNT(*)` to the `COUNT` function\n\nHere are some typical `SELECT`\
    \ statements:\n\n```sql\ncql> SELECT COUNT(*) FROM users;\ncql> SELECT name, occupation\
    \ FROM users;\ncql> SELECT name, occupation FROM users WHERE userid IN (1111,1112,111130);\n\
    cql> SELECT JSON name, occupation FROM users WHERE userid = 999;\n```\n\nYou can\
    \ alias a top-level selector by specifying the `AS` clause in a `SELECT` statement,\
    \ as shown here:\n\n```sql\ncql> SELECT name AS customer_name FROM customers;\n\
    ```\n\nThe output would be:\n\n```\ncustomer_name\n------------\nAlapati\n...\n\
    ```"
  raw: '### Creating a Secondary Index


    You can create a secondary index on a table by executing the `CREATE INDEX` statement.
    Let’s say you have the following table, with a primary key that consists of a
    composite partition key `(race_year, race_name)` and a clustering column (`rank`):


    ```

    cqlsh> CREATE TABLE cycling.rank_by_year_and_name (

    race_year int,

    race_name text,

    cyclist_name text,

    rank int,

    PRIMARY KEY ((race_year, race_name), rank)

    );

    ```


    You can’t query this table on the column `race_year` since that column is only
    a part of the composite partition key. You can create a secondary index on the
    `race_year` column, which enables you to query the table on this column. Here’s
    how you create the index:


    ```

    cqlsh> CREATE INDEX ON cycling.rank_by_year_and_name (race_year);

    ```


    You can now issue the following query that makes use of your new secondary index:


    ```

    cqlsh SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015;

    ```


    In the `CREATE INDEX` statement, you didn’t specify a name for your new index.
    Naming an index is optional, and if you don’t specify one, the database will assign
    a system generated name for the index. You can alternatively specify your own
    index name thus:


    ```

    cqlsh> CREATE INDEX my_index1 ON cycling.rank_by_year_and_name (race_year);

    ```


    You can specify any of the table’s columns for a secondary index, including a
    clustering column. You can create multiple secondary indexes on a table.


    You can create an index on a table that already contains data, as well as a new
    table with no data.


    #### Dropping an Index


    Unlike in the case of a primary index, you can drop a secondary index. Issue the
    `DROP INDEX` statement to drop an index:


    ```

    cqlsh> DROP INDEX myIndex1;

    ```


    This statement drops an existing secondary index. If you wish to avoid errors
    since the index doesn’t exist, you can use the following statement instead:


    ```

    cqlsh> DROP INDEX myIndex1 IF EXISTS;

    ```


    ## Materialized Views in Cassandra


    As mentioned, secondary indexes aren’t good when dealing with high cardinality
    data since queries on these indexes make the database access all the nodes in
    the cluster. Materialized views are an appropriate alternative for handling high
    cardinality data.


    A materialized view is a table that you build from an existing table using a new
    primary key. You can include rows with null values in the primary key column.


    Tip


    Materialized views hinder performance when you use them for querying low cardinality
    data. However, please proceed with caution because materialized views still require
    work to be fully useful. It is not unheard of for MVs to cause cluster downtime
    when dealing with heavy updates.


    MVs should be much more usable by the time Cassandra 3.11 or 4.x rolls around.


    ### Creating a Materialized View


    The following is an example that shows how you create a materialized view using
    a regular table as its basis or source:


    ```

    cqlsh> CREATE MATERIALIZED VIEW cycling.cyclist_by_age

    AS SELECT age, name, country

    FROM cycling.cyclist

    WHERE age IS NOT NULL AND cid IS NOT NULL

    PRIMARY KEY (age, cid);

    ```


    In this example,


    *   The `AS SELECT` clause specifies the columns that you want to copy from the
    base or target table to the new materialized view. Here they are age, name, and
    country.

    *   The `FROM` clause points to the original or source table from which the materialized
    view draws its data.

    *   The `WHERE` clause ensures that the primary key columns are non-null since
    that’s a requirement for creating a materialized view.

    *   The `PRIMARY KEY` clause specifies the primary key columns, which are `age`
    and `cid` in this example. The column `age` also happens to be the primary key
    column for the source table, and you must include all such primary key columns
    from the source table in the primary key of the materialized view as well.


    ### Dropping a Materialized View


    You can drop a materialized view by issuing the `DROP MATERIALIZED VIEW` command:


    ```

    cql> DROP MATERIALIZED VIEW cycling.cyclist_by_age;

    ```


    You can alternatively drop a materialized view or views by truncating the source
    table, which removes all materialized views based on that table. When you drop
    a table, you must first drop all materialized views that use that table as their
    source table.


    ### Denormalizing with Materialized Views


    In the example of a materialized view, you partitioned the materialized view by
    age so you could run queries on it based on the age of the cyclists. Materialized
    views help denormalize your data by creating multiple tables with the same data
    but organized differently based on different primary keys.


    You can create multiple materialized views on the same table. Thus, you can create
    view with different primary keys such as birthday or country. This helps you organize
    the data by these primary keys and lets you query those materialized views by
    birthday and country.


    ### Updating Materialized Views


    When you update the source table, the database automatically updates any materialized
    views you’ve created based on that table, and the same goes with deletion of data
    from the source table. However, the updates are asynchronous so the materialized
    view is updated after a delay, after the update of the parent table.


    Cassandra needs to perform an additional read before it can update the materialized
    views. This read involves a data consistency check of all the replicas, which
    means that writes to a materialized view are slower than normal table writes.


    Deletes pose a problem as well. Since the database may not store identical rows
    from the parent table contiguously in the materialized views, deleting rows from
    the source table may often require the database to create multiple tombstones
    in the corresponding materialized views.


    Data manipulation language (DML) is the set of CQL statements that enable you
    to query, insert, update, and delete data . In the following sections, I’ll review
    the essentials of the Cassandra DML statements.


    ## Querying Data with the SELECT Statement


    Querying data is the most common DML operation that you’ll perform in a Cassandra
    database. Therefore, it’s a good idea to thoroughly understand how to use the
    `SELECT` statement in CQL .


    The `SELECT` statement returns results that match a request. Each of the rows
    contains the values for the selections that are part of the `SELECT` statement.


    The following is the basic syntax of a `SELECT` statement in CQL:


    ```

    SELECT selectors | DISTINCT partition

    FROM [keyspace_name.] table_name

    [WHERE partition_conditions [ AND solr_query = ''search_expression'' [LIMIT n]
    |

    [solr_query = ''search_expression''  [LIMIT n]]

    [AND clustering_conditions

    [AND regular_column_conditions]]]

    [GROUP BY column_name]

    [ORDER BY PK_column_name ASC|DESC]

    [LIMIT N | PER PARTITION LIMIT N]

    [ALLOW FILTERING

    ```


    A `SELECT` statement contains the following key clauses:


    *   The selection clause

    *   The where clause

    *   The group by clause

    *   The ordering clause


    The following sections describe the key clauses of the `SELECT` statement.


    ### The Selection Clause


    The `selection clause` determines which columns the query returns, as well as
    any transformation the database must apply to the result set before returning
    the results. The `SELECT` statement must use either a wildcard selector (*) or
    one or more selectors to define the columns.


    A selector can be


    *   A column name

    *   A term

    *   A function call

    *   The special call `COUNT(*)` to the `COUNT` function


    Here are some typical `SELECT` statements:


    ```

    cql> SELECT COUNT (*) FROM users;

    cql> SELECT name, occupation FROM users;

    cql> SELECT name, occupation FROM users where userid in (1111,1112,111130);

    cql> SELECT JSON name, occupation FROM users WHERE userid = 999;

    ```


    You can alias a top-level selector by specifying the `AS` clause in a `SELECT`
    statement, as shown here:


    ```

    cql> SELECT name AS customer_name FROM customers;

    Cutomer_name

    Alapati

    ....

    ```'
  trans: "# Cassandra 二级索引与物化视图\n\n## 创建二级索引\n\n您可以通过执行 `CREATE INDEX` 语句在表上创建二级索引。假设您有如下表格，其主键由复合分区键\
    \ `(race_year, race_name)` 和一个聚类列 (`rank`) 组成：\n\n```sql\ncqlsh> CREATE TABLE\
    \ cycling.rank_by_year_and_name (\n    race_year int,\n    race_name text,\n \
    \   cyclist_name text,\n    rank int,\n    PRIMARY KEY ((race_year, race_name),\
    \ rank)\n);\n```\n\n您无法在 `race_year` 列上查询此表，因为该列仅是复合分区键的一部分。您可以在 `race_year` 列上创建一个二级索引，从而能够基于此列进行查询。创建索引的方法如下：\n\
    \n```sql\ncqlsh> CREATE INDEX ON cycling.rank_by_year_and_name (race_year);\n\
    ```\n\n现在，您可以利用新建的二级索引发出以下查询：\n\n```sql\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name\
    \ WHERE race_year=2015;\n```\n\n在 `CREATE INDEX` 语句中，您没有为新索引指定名称。为索引命名是可选的；如果您不指定，数据库将为索引分配一个系统生成的名称。您也可以像下面这样指定自己的索引名称：\n\
    \n```sql\ncqlsh> CREATE INDEX my_index1 ON cycling.rank_by_year_and_name (race_year);\n\
    ```\n\n您可以为表的任意列（包括聚类列）创建二级索引。您可以在一个表上创建多个二级索引。\n\n您可以在已包含数据的表上创建索引，也可以在新建的空表上创建索引。\n\
    \n### 删除索引\n\n与主索引不同，您可以删除二级索引。发出 `DROP INDEX` 语句以删除索引：\n\n```sql\ncqlsh> DROP\
    \ INDEX myIndex1;\n```\n\n此语句会删除一个现有的二级索引。如果您希望避免因索引不存在而报错，可以使用以下语句代替：\n\n```sql\n\
    cqlsh> DROP INDEX myIndex1 IF EXISTS;\n```\n\n## Cassandra 中的物化视图\n\n如前所述，二级索引在处理高基数数据时表现不佳，因为对这些索引的查询会使数据库访问集群中的所有节点。物化视图是处理高基数数据的合适替代方案。\n\
    \n物化视图是从现有表使用新的主键构建而成的表。您可以在主键列中包含值为 null 的行。\n\n**提示**\n\n当您将物化视图用于查询低基数数据时，会阻碍性能。然而，请谨慎行事，因为物化视图仍需进一步完善才能完全发挥效用。在处理大量更新时，物化视图（MVs）导致集群停机的情况并非闻所未闻。\n\
    \n到 Cassandra 3.11 或 4.x 版本发布时，物化视图的可用性应该会大大提升。\n\n### 创建物化视图\n\n以下示例展示了如何以常规表为基础或源表来创建物化视图：\n\
    \n```sql\ncqlsh> CREATE MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age,\
    \ name, country\nFROM cycling.cyclist\nWHERE age IS NOT NULL AND cid IS NOT NULL\n\
    PRIMARY KEY (age, cid);\n```\n\n在这个例子中：\n\n*   `AS SELECT` 子句指定了您想从基表或目标表复制到新物化视图的列。这里是\
    \ `age`、`name` 和 `country`。\n*   `FROM` 子句指向原始表或源表，物化视图的数据来源于此。\n*   `WHERE` 子句确保主键列不为\
    \ null，因为这是创建物化视图的必要条件。\n*   `PRIMARY KEY` 子句指定了主键列，本例中是 `age` 和 `cid`。`age` 列恰好也是源表的主键列，您必须将源表中所有此类主键列也包含在物化视图的主键中。\n\
    \n### 删除物化视图\n\n您可以通过发出 `DROP MATERIALIZED VIEW` 命令来删除物化视图：\n\n```sql\ncqlsh>\
    \ DROP MATERIALIZED VIEW cycling.cyclist_by_age;\n```\n\n您也可以通过截断源表来删除一个或多个物化视图，这将移除基于该表的所有物化视图。当您删除一个表时，必须首先删除所有以该表为源表的物化视图。\n\
    \n### 使用物化视图进行反规范化\n\n在物化视图的示例中，您按 `age` 对物化视图进行了分区，因此您可以基于骑行者的年龄对其运行查询。物化视图通过创建多个数据相同但根据不同的主键以不同方式组织的表，来帮助对数据进行反规范化。\n\
    \n您可以在同一个表上创建多个物化视图。因此，您可以创建具有不同主键（如 `birthday` 或 `country`）的视图。这有助于您通过这些主键来组织数据，并让您能够按\
    \ `birthday` 和 `country` 查询这些物化视图。\n\n### 更新物化视图\n\n当您更新源表时，数据库会自动更新基于该表创建的任何物化视图，从源表删除数据时也是如此。然而，更新是异步进行的，因此物化视图会在父表更新之后延迟一段时间才得到更新。\n\
    \nCassandra 需要执行额外的读取操作才能更新物化视图。此读取涉及所有副本的数据一致性检查，这意味着对物化视图的写入比普通表的写入要慢。\n\n删除操作同样存在问题。由于数据库可能不会在物化视图中连续存储来自父表的相同行，因此从源表删除行通常可能需要数据库在相应的物化视图中创建多个墓碑。\n\
    \n## 使用 SELECT 语句查询数据\n\n数据操作语言（DML）是使您能够查询、插入、更新和删除数据的 CQL 语句集合。查询数据是您在 Cassandra\
    \ 数据库中最常执行的 DML 操作。因此，透彻理解如何在 CQL 中使用 `SELECT` 语句是一个好主意。\n\n`SELECT` 语句返回与请求匹配的结果。每一行都包含作为\
    \ `SELECT` 语句一部分的选择项的值。\n\n以下是 CQL 中 `SELECT` 语句的基本语法：\n\n```sql\nSELECT selectors\
    \ | DISTINCT partition\nFROM [keyspace_name.] table_name\n[WHERE partition_conditions\
    \ [ AND solr_query = 'search_expression' [LIMIT n] |\n[solr_query = 'search_expression'\
    \  [LIMIT n]]\n[AND clustering_conditions\n[AND regular_column_conditions]]]\n\
    [GROUP BY column_name]\n[ORDER BY PK_column_name ASC|DESC]\n[LIMIT N | PER PARTITION\
    \ LIMIT N]\n[ALLOW FILTERING]\n```\n\n`SELECT` 语句包含以下关键子句：\n\n*   选择子句\n*   WHERE\
    \ 子句\n*   GROUP BY 子句\n*   排序子句\n\n以下各节描述了 `SELECT` 语句的关键子句。\n\n### 选择子句\n\n`选择子句`\
    \ 决定了查询返回哪些列，以及数据库在返回结果之前必须对结果集应用的任何转换。`SELECT` 语句必须使用通配符选择器 (`*`) 或一个或多个选择器来定义列。\n\
    \n选择器可以是：\n\n*   列名\n*   一个术语\n*   函数调用\n*   对 `COUNT` 函数的特殊调用 `COUNT(*)`\n\n\
    以下是一些典型的 `SELECT` 语句：\n\n```sql\ncql> SELECT COUNT(*) FROM users;\ncql> SELECT\
    \ name, occupation FROM users;\ncql> SELECT name, occupation FROM users WHERE\
    \ userid IN (1111,1112,111130);\ncql> SELECT JSON name, occupation FROM users\
    \ WHERE userid = 999;\n```\n\n您可以通过在 `SELECT` 语句中指定 `AS` 子句来为顶级选择器起别名，如下所示：\n\n\
    ```sql\ncql> SELECT name AS customer_name FROM customers;\n```\n\n输出将是：\n\n```\n\
    customer_name\n------------\nAlapati\n...\n```"
- fmt: '## The WHERE Clause


    The `WHERE` clause in a CQL `SELECT` statement has some surprises for those of
    us that come from a relational database background. As is the case with the other
    databases, the `WHERE` clause specifies the rows that the database must query.
    However, the following rules apply:


    *   The `WHERE` cause can only consist of relations on columns that are part of
    a `PRIMARY` key or you must define a `SECONDARY INDEX` on the columns.

    *   For any partition key, the relations on the clustering columns are restricted
    to just those relations that seek a contiguous set of rows.


    Let’s say you’ve created the following table and then inserted some data into
    it:


    ```sql

    cqlsh> create table users ( id UUID PRIMARY KEY, lastname text, firstname text
    );

    cqlsh> insert into users (id, firstname, lastname)

    ... values

    ...  (uuid(), ''sam'', ''alapati'');

    ```


    The following query will work for sure since you specify the primary key, the
    `id` column:


    ```sql

    cqlsh> select * from users where id=5361a682-9aea-46df-91b0-40572cfa9c97;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    cqlsh>

    ```


    However, the following query won’t work:


    ```sql

    cqlsh > select * from users where lastname="alapati";

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    The reason this query won’t work is that there’s no secondary index on the `lastname`
    column, and the column doesn’t select a contiguous set of rows. You need a secondary
    index on the `lastname` column if you wish to query on that column.


    ## Creating a Secondary Index


    You can make this query work by creating a secondary index on the `lastname` column.
    A secondary index is an index on any column in a table other than the keys that
    are part of the primary key.


    Once you create the secondary index on the column `lastname`, the previous query
    works fine:


    ```sql

    cqlsh:cycling> create index on users(lastname);

    cqlsh:cycling> select * from users where lastname="alapati";

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    Cqlsh:cycling>

    ```


    In addition to creating secondary indexes on simple columns, such as shown here,
    you can also create indexes on collection-based columns such as the map-, set-,
    and list-based collections.


    ## Drawbacks of Secondary Indexes


    Secondary indexes are somewhat of a mixed blessing due to several reasons. For
    example, all nodes must maintain a local copy of the secondary index based on
    the data that’s in the partitions on that node. Since the query on a secondary
    index often needs to traverse multiple nodes, it’s not cheap to perform the query.


    Secondary indexes are not suitable for columns with too high or too low cardinality.
    Cardinality is the number of distinctive values for a column. The indexes are
    also not good for handling data that you frequently modify or delete, the reason
    being that the database must deal with all the tombstones generated by the updates
    and deletes before the compaction process can take care of all them.


    Ideally, you should create multiple tables to cater to the different queries that
    you want to execute on a chunk of data. Unlike in the case of relational databases
    where secondary indexes are an essential part of querying, Cassandra’s secondary
    indexes are at best a backup strategy, and you’re better off creating materialized
    views, which follow the recommended pattern of denormalization. I discuss materialized
    views in the “Working with Materialized Views” section.


    ## SASI: New Implementation of Secondary Indexes


    Cassandra 3.4 introduced a newer implementation for secondary indexes called the
    SSTable Attached Secondary Index. Unlike the traditional secondary indexes which
    are stored in “hidden” tables, the database stores the SSI indexes as part of
    an SSTable file.


    You can create an SASI index with the `CREATE CUSTOM INDEX` command:


    ```sql

    cqlsh> CREATE CUSTOM INDEX on users (lastname)

    USING ''org.apache.cassandra.index.sasi.SASIIndex'';

    cqlsh>

    ```


    You can use both traditional and SASI indexes together. The newer secondary indexes
    allow you perform inequality searches and use the `LIKE` keyword to perform text
    searches, both of which you can’t do with traditional indexes.


    You can group `CLUSTERING COLUMNS` together in a relation by employing the tuple
    notation, as I explain later in this chapter.


    ## Writing a Conditional Statement


    A query can scan a table’s partitions to retrieve a segment of data. For this
    type of query to work, you must store the segment sequentially so that you can
    use the clustering columns to define the segment of data you need.


    Let’s use a simple example to show how to write a conditional statement. The table
    `race_times` shows the race times of cyclists for various races:


    ```sql

    cqlsh> CREATE TABLE cycling.race_times (race_name test, cyclist_name text,

    race_time text,

    PRIMARY KEY (race_name, race_time);

    ```


    Here `race_name` is the primary key and `race_time` is the clustering column.
    You can now specify a conditional operator to find a segment of data. You can
    do this using the `race_time` column, as shown here:


    ```sql

    cqlsh> SELECT * FROM cycling.race_times

    WHERE RACE_NAME = ''17th Santos Tour Down Under''

    AND race_time >=''19:15:19"''

    AND race_time <= ''19;15:39'');

    ```


    ## How to Group a Query’s Results with the GROUP BY Clause


    Specify the `GROUP_BY` clause to gather into a single row all rows that share
    the same values for a column (or a set of columns).


    When you specify an aggregate function such as `AVG` along with a `GROUP_BY` clause,
    Cassandra generates a separate value for each group. Otherwise, specifying an
    aggregate function results in a single value for all rows.


    Here’s an example showing how to specify the `GROUP_BY` clause:


    ```sql

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date;

    ```


    In this example, the table‘s partition key includes two columns, `weatherstation_id`
    and `date`, and the clustering key is `event_time`. The `GROUP BY` uses the partition
    key (`weatherstation_id`, `date`).


    If I want to, I can use the `GROUP BY` with both the partition key and the clustering
    key, as shown here:


    ```sql

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date, event_time;

    ```


    ## Ordering a Query’s Results with the ORDER BY Clause


    You can fine-tune the order in which Cassandra displays the results of a `SELECT`
    statement. Specify the `ORDER BY` clause to order the results of a query. You
    can only choose the columns that you define on the table with the clustering order
    column.


    You must define the partition key in the `WHERE` clause and define the clustering
    column for ordering results by specifying the `ORDER BY` clause.


    The following is an example that shows how to use the `ORDER BY` clause.


    First, create the following table:


    ```sql

    cqlsh>  CREATE TABLE cycling.cyclist_cat_pts

    (CATEGORY text, points int, id UUID, lastname text,

    PRIMARY KEY (category, points) );

    ```


    Now run the `SELECT` statement with the `ORDER BY` clause.


    ```sql

    cqlsh> SELECT * FROM cycling.cyclist_cat_pts WHERE category = ''GC''

    ORDER BY points;

    ```


    Using the `ORDER_BY` clause in `cqlsh` requires you to turn off paging with the
    `PAGING OFF` command.


    ```sql

    cqlsh> PAGING OFF

    ```'
  raw: '### The WHERE Clause


    The `WHERE` clause in a CQL `SELECT` statement has some surprises for those of
    us that come from a relational database background. As is the case with the other
    databases, the `WHERE` clause specifies the rows that the database must query.
    However, the following rules apply:


    *   The `WHERE` cause can only consist of relations on columns that are part of
    a `PRIMARY` key or you must define a `SECONDARY INDEX` on the columns.

    *   For any partition key, the relations on the clustering columns are restricted
    to just those relations that seek a contiguous set of rows.


    Let’s say you’ve created the following table and then inserted some data into
    it:


    ```

    cqlsh> create table users ( id UUID PRIMARY KEY, lastname text, firstname text
    );

    cqlsh> insert into users (id, firstname, lastname)

    ... values

    ...  (uuid(), ''sam'', ''alapati'');

    ```


    The following query will work for sure since you specify the primary key , the
    `id` column:


    ```

    cqlsh> select * from users where id=5361a682-9aea-46df-91b0-40572cfa9c97;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    cqlsh>

    ```


    However, the following query won’t work:


    ```

    cqlsh > select * from users where lastname="alapati";

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    The reason this query won’t work is that there’s no secondary index on the `lastname`
    column, and the column doesn’t select a contiguous set of rows . You need a secondary
    index on the `lastname` column if you wish to query on that column.


    ### Creating a Secondary Index


    You can make this query work by creating a secondary index on the `lastname` column.
    A secondary index is an index on any column in a table other than the keys that
    are part of the primary key.


    Once you create the secondary index on the column `lastname`, the previous query
    works fine:


    ```

    cqlsh:cycling> create index on users(lastname);

    cqlsh:cycling> select * from users where lastname="alapati";

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    Cqlsh:cycling>

    ```


    In addition to creating secondary indexes on simple columns, such as shown here,
    you can also create indexes on collection-based columns such as the map-, set-,
    and list-based collections.


    ### Drawbacks of Secondary Indexes


    Secondary indexes are somewhat of a mixed blessing due to several reasons. For
    example, all nodes must maintain a local copy of the secondary index based on
    the data that’s in the partitions on that node. Since the query on a secondary
    index often needs to traverse multiple nodes, it’s not cheap to perform the query.


    Secondary indexes are not suitable for columns with too high or too low cardinality.
    Cardinality is the number of distinctive values for a column. The indexes are
    also not good for handling data that you frequently modify or delete, the reason
    being that the database must deal with all the tombstones generated by the updates
    and deletes before the compaction process can take care of all them.


    Ideally, you should create multiple tables to cater to the different queries that
    you want to execute on a chunk of data. Unlike in the case of relational databases
    where secondary indexes are an essential part of querying, Cassandra’s secondary
    indexes are at best a backup strategy, and you’re better off creating materialized
    views , which follow the recommended pattern of denormalization. I discuss materialized
    views in the “Working with Materialized Views” section.


    ### SASI: New Implementation of Secondary Indexes


    Cassandra 3.4 introduced a newer implementation for secondary indexes called the
    SSTable Attached Secondary Index . Unlike the traditional secondary indexes which
    are stored in “hidden” tables, the database stores the SSI indexes as part of
    an SSTable file.


    You can create an SASI index with the `CREATE CUSTOM INDEX` command:


    ```

    cqlsh> CREATE CUSTOM INDEX on users (lastname)

    USING ''org.apache.cassandra.index.sasi.SASIIndex'';

    cqlsh>

    ```


    You can use both traditional and SASI indexes together. The newer secondary indexes
    allow you perform inequality searches and use the `LIKE` keyword to perform text
    searches, both of which you can’t do with traditional indexes.


    You can group `CLUSTERING COLUMNS` together in a relation by employing the tuple
    notation, as I explain later in this chapter.


    ### Writing a Conditional Statement


    A query can scan a table’s partitions to retrieve a segment of data. For this
    type of query to work, you must store the segment sequentially so that you can
    use the clustering columns to define the segment of data you need.


    Let’s use a simple example to show how to write a conditional statement. The table
    `race_times` shows the race times of cyclists for various races:


    ```

    cqlsh> CREATE TABLE cycling.race_times (race_name test, cyclist_name text,

    race_time text,

    PRIMARY KEY (race_name, race_time);

    ```


    Here `race_name` is the primary key and `race_time` is the clustering column.
    You can now specify a conditional operator to find a segment of data. You can
    do this using the `race_time` column, as shown here:


    ```

    cqlsh> SELECT * FROM cycling.race_times

    WHERE RACE_NAME = ''17th Santos Tour Down Under''

    AND race_time >=''19:15:19"''

    AND race_time <= ''19;15:39'');

    ```


    #### How to Group a Query’s Results with the GROUP BY Clause


    Specify the `GROUP_BY` clause to gather into a single row all rows that share
    the same values for a column (or a set of columns).


    When you specify an aggregate function such as `AVG` along with a `GROUP_BY` clause,
    Cassandra generates a separate value for each group. Otherwise, specifying an
    aggregate function results in a single value for all rows.


    Here’s an example showing how to specify the `GROUP_BY` clause:


    ```

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date;

    ```


    In this example, the table‘s partition key includes two columns, `weatherstation_id`
    and `date`, and the clustering key is `event_time`. The `GROUP BY` uses the partition
    key (`weatherstation_id`, `date`).


    If I want to, I can use the `GROUP BY` with both the partition key and the clustering
    key , as shown here:


    ```

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date, event_time;

    ```


    #### Ordering a Query’s Results with the ORDER BY Clause


    You can fine-tune the order in which Cassandra displays the results of a `SELECT`
    statement. Specify the `ORDER BY` clause to order the results of a query. You
    can only choose the columns that you define on the table with the clustering order
    column.


    You must define the partition key in the `WHERE` clause and define the clustering
    column for ordering results by specifying the `ORDER BY` clause.


    The following is an example that shows how to use the `ORDER BY` clause .


    First, create the following table:


    ```

    cqlsh>  CREATE TABLE cycling.cyclist_cat_pts

    (CATEGORY text, points int, id UUID, lastname text,

    PRIMARY KEY (category, points) );

    ```


    Now run the `SELECT` statement with the `ORDER BY` clause.


    ```

    cqlsh> SELECT * FROM cycling.cyclist_cat_pts WHERE category = ''GC''

    ORDER BY points;

    ```


    Using the `ORDER_BY` clause in cqlsh requires you to turn off paging with the
    `PAGING OFF` command.


    ```

    cqlsh> PAGING OFF

    ```'
  trans: '

    ## WHERE 子句


    对于来自关系型数据库背景的我们来说，CQL `SELECT` 语句中的 `WHERE` 子句有一些令人意外之处。与其他数据库类似，`WHERE` 子句用于指定数据库必须查询的行。但是，适用以下规则：


    *   `WHERE` 子句只能由属于 `PRIMARY` 键一部分的列上的关系（条件）组成，或者你必须在这些列上定义一个 `SECONDARY INDEX`（二级索引）。

    *   对于任何分区键，对聚簇列的关系限制仅为那些寻求连续行集的关系。


    假设你创建了以下表，然后向其中插入了一些数据：


    ```sql

    cqlsh> create table users ( id UUID PRIMARY KEY, lastname text, firstname text
    );

    cqlsh> insert into users (id, firstname, lastname)

    ... values

    ...  (uuid(), ''sam'', ''alapati'');

    ```


    以下查询肯定可以工作，因为你指定了主键 `id` 列：


    ```sql

    cqlsh> select * from users where id=5361a682-9aea-46df-91b0-40572cfa9c97;

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    cqlsh>

    ```


    然而，以下查询将无法工作：


    ```sql

    cqlsh > select * from users where lastname="alapati";

    InvalidRequest: Error from server: code=2200 [Invalid query] message="Cannot execute
    this query as it might involve data filtering and thus may have unpredictable
    performance. If you want to execute this query despite the performance unpredictability,
    use ALLOW FILTERING"

    ```


    这个查询不起作用的原因在于，`lastname` 列上没有二级索引，并且该列的选择条件无法选出一个连续的行集。如果你希望按该列进行查询，你需要在 `lastname`
    列上创建一个二级索引。


    ## 创建二级索引


    你可以通过在 `lastname` 列上创建一个二级索引来使这个查询生效。二级索引是表中除主键包含的键之外的任何列上的索引。


    一旦你为 `lastname` 列创建了二级索引，之前的查询就能正常工作：


    ```sql

    cqlsh:cycling> create index on users(lastname);

    cqlsh:cycling> select * from users where lastname="alapati";

    id                                   | firstname | lastname

    --------------------------------------+-----------+----------

    5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati

    (1 rows)

    Cqlsh:cycling>

    ```


    除了像这里展示的在简单列上创建二级索引外，你还可以在基于集合的列（如基于 `map`、`set` 和 `list` 的集合）上创建索引。


    ## 二级索引的缺点


    二级索引由于几个原因可以说是喜忧参半。例如，所有节点都必须维护基于该节点上分区数据的二级索引的本地副本。由于对二级索引的查询通常需要遍历多个节点，执行查询的开销并不小。


    二级索引不适用于基数过高或过低的列。基数是指一个列中不同值的数量。索引也不适合处理你频繁修改或删除的数据，原因在于数据库必须处理更新和删除产生的所有墓碑（tombstones），然后压缩（compaction）过程才能处理它们。


    理想情况下，你应该创建多个表来满足你想对同一块数据执行的不同查询。与关系型数据库中二级索引是查询的基本组成部分不同，Cassandra 的二级索引充其量是一种备用策略，你最好创建物化视图（materialized
    views），它遵循了反规范化（denormalization）的推荐模式。我将在“使用物化视图”一节讨论物化视图。


    ## SASI：二级索引的新实现


    Cassandra 3.4 引入了一种更新的二级索引实现，称为 SSTable 附加二级索引（SASI）。与传统二级索引存储在“隐藏”表中不同，数据库将 SSI
    索引作为 SSTable 文件的一部分存储。


    你可以使用 `CREATE CUSTOM INDEX` 命令创建 SASI 索引：


    ```sql

    cqlsh> CREATE CUSTOM INDEX on users (lastname)

    USING ''org.apache.cassandra.index.sasi.SASIIndex'';

    cqlsh>

    ```


    你可以同时使用传统索引和 SASI 索引。较新的二级索引允许你执行不等式搜索，并使用 `LIKE` 关键字执行文本搜索，这两者都是传统索引无法做到的。


    你可以通过使用元组表示法将 `CLUSTERING COLUMNS`（聚簇列）在关系条件中组合在一起，我将在本章后面进行解释。


    ## 编写条件语句


    一个查询可以扫描表的分区以检索一段数据。为了让这类查询生效，你必须顺序存储这段数据，以便使用聚簇列来定义所需的数据段。


    让我们用一个简单的例子来展示如何编写条件语句。表 `race_times` 显示了自行车手参加各种比赛的比赛时间：


    ```sql

    cqlsh> CREATE TABLE cycling.race_times (race_name text, cyclist_name text,

    race_time text,

    PRIMARY KEY (race_name, race_time);

    ```


    这里 `race_name` 是主键，`race_time` 是聚簇列。你现在可以指定一个条件运算符来查找一段数据。你可以使用 `race_time` 列来实现，如下所示：


    ```sql

    cqlsh> SELECT * FROM cycling.race_times

    WHERE RACE_NAME = ''17th Santos Tour Down Under''

    AND race_time >=''19:15:19"''

    AND race_time <= ''19:15:39'');

    ```


    ## 如何使用 GROUP BY 子句对查询结果进行分组


    指定 `GROUP BY` 子句可以将所有共享某一列（或一组列）相同值的行收集到单个行中。


    当你指定一个聚合函数（如 `AVG`）以及一个 `GROUP BY` 子句时，Cassandra 会为每个组生成一个单独的值。否则，指定聚合函数将为所有行生成一个单一的值。


    以下是一个展示如何指定 `GROUP BY` 子句的示例：


    ```sql

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date;

    ```


    在这个例子中，表的分区键包含两列 `weatherstation_id` 和 `date`，聚簇键是 `event_time`。`GROUP BY` 使用了分区键
    (`weatherstation_id`, `date`)。


    如果我愿意，我也可以同时使用分区键和聚簇键进行 `GROUP BY`，如下所示：


    ```sql

    cqlsh> SELECT weatherstation_id, date, MAX(temperature)

    FROM temperature_by_day

    GROUP BY weatherstation_id, date, event_time;

    ```


    ## 使用 ORDER BY 子句对查询结果进行排序


    你可以微调 Cassandra 显示 `SELECT` 语句结果的顺序。指定 `ORDER BY` 子句来对查询结果进行排序。你只能选择表定义中带有聚簇顺序（clustering
    order）的列。


    你必须在 `WHERE` 子句中定义分区键，并通过指定 `ORDER BY` 子句来定义用于对结果排序的聚簇列。


    以下是一个展示如何使用 `ORDER BY` 子句的例子。


    首先，创建以下表：


    ```sql

    cqlsh>  CREATE TABLE cycling.cyclist_cat_pts

    (CATEGORY text, points int, id UUID, lastname text,

    PRIMARY KEY (category, points) );

    ```


    现在运行带有 `ORDER BY` 子句的 `SELECT` 语句。


    ```sql

    cqlsh> SELECT * FROM cycling.cyclist_cat_pts WHERE category = ''GC''

    ORDER BY points;

    ```


    在 `cqlsh` 中使用 `ORDER BY` 子句需要你用 `PAGING OFF` 命令关闭分页。


    ```sql

    cqlsh> PAGING OFF

    ```

