  trans: "\n### DataStax Enterprise\n\nDataStax Enterprise (DSE) 基于 Apache Cassandra\
    \ 构建，提供了一个全面且简洁的数据管理层，具有始终在线的架构。DSE 提供了构建复杂云应用程序所需的高级功能。\n\nDSE 将索引、搜索、分析和图功能等强大特性与开源的\
    \ Apache Cassandra 数据库集成在一起。以下是 DSE 在底层 Cassandra 数据库之上所提供功能的简要描述。\n\n*   高级索引与搜索：DSE\
    \ Search 包含一个高级索引引擎，具备强大的搜索能力（DSE 集成了著名的搜索工具 Apache Solr），以帮助通过运行复杂查询来查找数据。该索引引擎支持快速、实时的聚合、过滤、分面以及子字符串、模糊和全文搜索。\n\
    *   强大的集成分析：DSE Analytics 集成了强大的 Apache Spark 大规模数据处理引擎，使开发者能够构建处理流式和批量工作负载数据流的管道。\n\
    *   图数据库：DSE Graph 是一个可扩展的、实时的图数据库，支持深度分析查询。图数据库旨在分析具有许多复杂关系的大型数据集，帮助您发现并理解这些关系。\n\
    \n试图从数据中获取最大价值的组织有着不同的需求，每种需求都由不同的解决方案解决，例如高级分析、实时索引、搜索等。DSE 通过一个集成化的工具，提供了现代云应用程序所需的所有能力。搜索、分析和图数据库功能的集成意味着这些组件能够获得\
    \ Apache 数据库的所有优势，例如高可用性、线性可扩展性以及可预测的低延迟响应时间。\n\nDataStax Enterprise OpsCenter\
    \ 是 DSE 基于 Web 的管理和监控组件。OpsCenter 可以轻松地监控、调优、备份和恢复 Cassandra 数据库。您可以通过 `OpsCenter`\
    \ 执行大多数数据库管理任务，例如访问和授权。OpsCenter 提供了一个集中化的仪表板来监控 Cassandra 集群，并有助于在问题影响您的生产工作负载之前主动识别问题。您可以轻松地将\
    \ `OpsCenter` 集成到 Graphite 等管理工具中。\n\n### DataStax 开发工具\n\nDataStax 提供了多种工具来帮助您创建基于\
    \ Cassandra 的大规模分布式应用程序。以下是 DataStax 提供的三种关键开发工具的简要描述：DataStax DevCenter、DataStax\
    \ Studio 和数据库驱动程序。\n\n*   DataStax Enterprise OpsCenter：用于 DataStax Enterprise\
    \ (DSE) 的基于 Web 的可视化管理和监控解决方案。该工具帮助您管理数据库模式、开发查询和调优 Cassandra 性能。\n*   DataStax\
    \ Studio：DataStax Studio 是一个交互式工具，它使用 DSE Graph 来探索和可视化大型数据集。\n*   数据库驱动程序：DataStax\
    \ 提供支持多种语言的数据库驱动程序，例如 C#、Java、Node.js、ODBC、Python、PHP 和 Ruby。\n\n## 总结\n\nCassandra\
    \ 是一个强大的 NoSQL 数据库，与关系型数据库有显著不同。本章解释了 Cassandra 与关系型数据库的不同之处，以及它如何解决关系型数据库处理不佳的问题。\n\
    \nCassandra 是为特定用例设计的，如果您的需求不同，它可能不适合您。\n\n了解 ACID 需求和 CAP 定理有助于您认识到 Cassandra\
    \ 最终一致性原则的重要性。\n\n尽管 Cassandra 与关系型数据库共享一些优化策略，但它也采用了独特的策略，如布隆过滤器来优化数据库性能。\n\n\
    本章回顾了 Cassandra 数据库管理员应该了解的要点。\n\n理解 Cassandra 特有的概念，如探测器、Gossip 协议和复制策略，对于您成为成功的\
    \ Cassandra 管理员至关重要。\n\n# 2. 安装 Cassandra 并开始使用 CQL Shell\n\n在本章中，您将学习如何安装 Cassandra\
    \ 并创建一个单节点的 Cassandra “集群”。一旦您初步尝试，就能轻松过渡到创建和配置多节点 Cassandra 集群，这是我将在第 3 章讨论的主题。\n\
    \n创建 Cassandra 集群后，您将学习如何使用 `cqlsh`，即 CQL Shell 的命令行界面。完成本章后，您将知道如何启动和停止集群、创建键空间和表，以及如何插入和查询数据。\n\
    \n## 安装 Apache Cassandra\n\nCassandra 易于设置和上手。在本节中，我将展示如何在 Linux（具体是 Ubuntu 16.04\
    \ LTS 服务器）上安装 Cassandra。\n\n学会安装 Cassandra 后，我将展示如何在单台机器上创建一个简单的单节点 Cassandra\
    \ 集群。在第 3 章中，我将展示如何创建一个包含多个节点的 Cassandra 集群。\n\n### 安装规划\n\n我使用在 VMware 上运行的 Ubuntu\
    \ 16.04 LTS 服务器来展示安装过程。该服务器有 4GB RAM 和 20GB 存储空间。\n\n在开始安装 Cassandra 之前，您需要在服务器上创建一个用户和组来管理\
    \ Cassandra。将用户和组都命名为 `cassandra`。以下是创建用户和组的步骤：\n\n```\n$ sudo groupadd –r cassandra\n\
    $ sudo useradd –r –m cassandra –g cassandra –G users\n```\n\n### 安装 Cassandra\
    \ 的前提条件\n\n在安装 Cassandra 之前，有两个基本前提条件：您必须安装正确版本的 Java，并且需要最新版本的 Python。\n\n以下两个部分展示了如何安装\
    \ Java 和 Python（如果需要安装）。\n\n#### Java\n\n您需要最新 64 位版本的 Java 8，Oracle Java 标准版或\
    \ OpenJDK 8 均可（我使用 Oracle JRE）。您可以通过以下方式检查已安装的 Java 软件版本：\n\n```\n$ java -version\n\
    java version \"1.8.0_101\"\nJava(TM) SE Runtime Environment (build 1.8.0_101-b13)\n\
    Java HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed mode)\n$\n```\n\n如果输出中第一行没有显示类似\
    \ `java version \"1.8.0_101\"` 的内容（输出共三行），则需要安装 Java。请按照以下步骤安装 Oracle JDK。\n\n\
    1.  从 Oracle Java SE Downloads 下载 Oracle JDK 安装程序，需先接受许可协议。您可以在此处下载 JDK：[`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
    2.  为 JDK 创建一个目录。\n\n    ```\n    $ sudo mkdir –p /usr/lib/jvm\n    ```\n\n3.\
    \  解压 tar 包后安装 JDK。\n\n    ```\n    $ sudo tar zxf jdk-8u65-linux-x64.tr.gz –C\
    \ /usr/lib/jvm\n    ```\n\n    您可以在名为 `/usr/lbi/jvm/jdk-8u-version` 的目录中找到 JDK\
    \ 文件。\n4.  您需要使用 `alternatives` 命令让操作系统知道新的 Java 版本。\n\n    ```\n    $ sudo update-alternatives\
    \ –install \"/usr/bin/java\" \"java\" \"/usr/lib/jvm/jdk1.8.0_101/bin/java\"\n\
    \    ```\n\n5.  再次运行 `alternatives` 命令，这次是为了将新安装的 JDK 设为默认的 Java 版本。\n\n    ```\n\
    \    $ sudo update-alternatives –config java\n    ```\n\n    此命令确保如果您安装了多个 Java\
    \ 版本，默认版本将切换为您刚刚安装的版本。\n6.  确认安装是否正确。\n\n    ```\n    $ java -version\n    java\
    \ version \"1.8.0_101\"\n    Java(TM) SE Runtime Environment (build 1.8.0_101-b13)\n\
    \    Java HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed mode)\n    $\n\
    \    ```\n"
- fmt: "## Python\n\nWhile you need Java for running Cassandra itself, you need Python\
    \ for running `cqlsh`, the command line interface to the Cassandra database. To\
    \ be specific, you need the latest version of Python 2.7.\n\nYou can check the\
    \ current release of Python thus:\n\n```\n$ python\nPython 2.7.12 (default, Nov\
    \ 19 2016, 06:48:10)\n[GCC 5.4.0 20160609] on linux2\nType \"help\", \"copyright\"\
    , \"credits\" or \"license\" for more information.\n>>>\n```\n\nIn my case, the\
    \ Ubuntu server came with Python. If you need to install Python, you can do so\
    \ by following these steps.\n\n1.  Install the required packages.\n\n    ```\n\
    \    $ sudo apt-get install build-essential checkinstall\n    $ sudo apt-get install\
    \ libreadline-gplv2-dev libncursesw5-dev libssl-dev libsqlite3-dev tk-dev libgdbm-dev\
    \ libc6-dev libbz2-dev\n    ```\n\n2.  Download the Python binaries.\n\n    ```\n\
    \    $ cd /usr/src\n    $ wget https://www.python.org/ftp/python/2.7.12/Python-2.7.12.tgz\n\
    \    ```\n\n3.  Extract the packages.\n\n    ```\n    $ tar xzf Python-2.7.12.tgz\n\
    \    ```\n\n4.  Compile the Python source.\n\n    ```\n    $ cd Python-2.7.12\n\
    \    $ sudo ./configure\n    $ sudo make altinstall\n    ```\n\n5.  Check the\
    \ Python version.\n\n    ```\n    $ python2.7 -V\n    Python 2.7.13\n    $\n \
    \   ```\n\n## Installing Cassandra\n\nYou can install Cassandra from a source\
    \ binary tarball that you download, install, and run, or use `yum` or `apt-get`\
    \ to install the Cassandra package as a service (Linux only). In this section,\
    \ I show both ways of installing Cassandra. You can also install using a less\
    \ common third method, which is to download the source code and compile it.\n\n\
    ### Building from Source\n\nYou can build Cassandra from the source by using Apache\
    \ Ant. When you build from source, you need to use a Java 8 JDK instead of just\
    \ the JRE. Here are the steps to build from source.\n\n1.  Download Ant if you\
    \ don’t have it already, from [`http://ant.apache.org`](http://ant.apache.org).\n\
    2.  Get a read-only trunk version of the Cassandra source.\n\n    ```\n    $ git\
    \ clone git://git.apache.org/cassandra.git\n    ```\n\n3.  Move to the root directory\
    \ of the source download and run `ant`.\n\n    ```\n    $ ant\n    ```\n\nAnt\
    \ looks for a `build.xml` file in the current directory and executes the default\
    \ build target. Ant builds the source files and executes tests, and if everything\
    \ goes well, you’ll see a `BUILD SUCCESSFUL` message.\n\n### Installing from Debian\
    \ Packages\n\nInstalling from Debian packages is just as simple as installing\
    \ from a source binary tarball, as explained in the following steps.\n\n1.  Add\
    \ Cassandra’s Apache repository to `/etc/apt/sources.list.d/cassandra.sources.list`,\
    \ as shown here:\n\n    ```\n    $ echo \"deb http://www.apache.org/dist/cassandra/debian\
    \ 311x main\" | sudo tee -a /etc/apt/sources.list.d/cassandra.sources.list\n \
    \   ```\n\n2.  Add the Apache Cassandra repository keys.\n\n    ```\n    $ curl\
    \ https://www.apache.org/dist/cassandra/KEYS | sudo apt-key add -\n    $ sudo\
    \ apt-key adv --keyserver pool.sks-keyservers.net --recv-key A278B781FE4B2BDA\n\
    \    ```\n\n3.  Update the package index.\n\n    ```\n    $ sudo apt-get update\n\
    \    ```\n\n4.  Now you’re ready to install Cassandra.\n\n    ```\n    $ sudo\
    \ apt-get install cassandra\n    ```\n\n5.  You can start, stop, and check the\
    \ status of the Apache Cassandra service on this server by running the following\
    \ command:\n\n    ```\n    $ sudo systemctl start cassandra.service\n    $ sudo\
    \ systemctl stop cassandra.service\n    $ sudo systemctl status cassandra.service\n\
    \    [sudo] password for samalapati:\n    ● cassandra.service - LSB: distributed\
    \ storage system for structured data\n       Loaded: loaded (/etc/init.d/cassandra;\
    \ bad; vendor preset: enabled)\n       Active: active (running) since Fri 2017-09-29\
    \ 08:07:57 PDT; 42min ago\n        Docs: man:systemd-sysv-generator(8)\n     \
    \  Memory: 2.2G\n          CPU: 40.810s\n       CGroup: /system.slice/cassandra.service\n\
    \               └─5432 java -Xloggc:/var/log/cassandra/gc.log -ea -XX:+UseThreadPrior\n\
    \    Sep 29 08:07:57 ubuntu systemd[1]: Starting LSB: distributed storage system\
    \ for\n    Sep 29 08:07:57 ubuntu systemd[1]: Started LSB: distributed storage\
    \ system for s\n    Sep 29 08:08:11 ubuntu systemd[1]: Started LSB: distributed\
    \ storage system for s\n    ```\n\n6.  You can enable the Cassandra service on\
    \ system boot by doing the following:\n\n    ```\n    $ sudo systemctl enable\
    \ cassandra.service\n    ```\n\n7.  Since the Debian packages start up the Cassandra\
    \ service automatically after the installation, you must stop the service and\
    \ clear the data if you’re planning a real-life cluster rather than a test service.\
    \ By doing this, you remove the default cluster name (`Test Cluster`) from Cassandra’s\
    \ system table. Here’s how to clear the data:\n\n    ```\n    $ sudo systemctl\
    \ stop cassandra.service\n    $ sudo rm -rf /var/lib/cassandra/data/system/*\n\
    \    ```\n\n### Building from the Source Binary Tarball\n\nThe easiest way to\
    \ get going with installing Cassandra is to download and install the binary tarball\
    \ from Cassandra’s website: [`http://cassandra.apache.org/download/`](http://cassandra.apache.org/download/).\n\
    \nYou can also download the latest tarball by using a command such as `curl`:\n\
    \n```\n$ curl –OL http://www.apache.org/dist/cassandra/3.9.0/apache-cassandra-3.9.0-bin.tar.gz\n\
    ```\n\nFollow these steps to download and install Cassandra from binary tarball\
    \ files.\n\n1.  Download the latest Cassandra release, which is 3.9 (release 2016-09-29).\n\
    2.  Extract the installation files from the tarball.\n\n    ```\n    $ sudo tar\
    \ –xzvf apache-cassandra-3.9-bin.tar.gz\n    ```\n\n    The `tar` command will\
    \ extract the files into the `apache-cassandra-3.9` directory.\n3.  Move the extracted\
    \ directory to the `/usr/share` library.\n\n    ```\n    $ sudo mv apache-cassandra-3.9\
    \ /usr/share\n    ```\n\n4.  Create a symbolic link to the directory as shown\
    \ here:\n\n    ```\n    $ sudo ln –s /usr/share/apache-cassandra-3.9 /usr/share/cassandra\n\
    \    ```\n\nCreating the symbolic link is a good idea for down the road. The symbolic\
    \ link allows you to keep multiple versions of Cassandra in the same installation.\
    \ All you have to do to switch between the versions is to simply change the location\
    \ the link points to.\n\nThat’s it; you’re done! Unlike installing a relational\
    \ database and configuring it, it’s easy to install Cassandra and get going with\
    \ it. With no configuration at all, it’s possible to start working with Cassandra\
    \ out of the box. Of course, you’ll need to configure and tune Cassandra to get\
    \ the most out of it, but it’s quite easy for a novice to get started with the\
    \ database.\n\nIn the next section, I show how to configure Cassandra by entering\
    \ and modifying the configuration properties in `cassandra.yaml`, the main Cassandra\
    \ configuration file. Later, I show you how to start and stop Cassandra.\n\n###\
    \ Creating the Necessary Directories\n\nYou need to create a basic set of three\
    \ directories so Cassandra knows where to store the table and other data. Create\
    \ the following three data directories as the user `cassandra`:\n\n```\n$ mkdir\
    \ /usr/share/cassandra/commitlog\n$ mkdir /usr/share/cassandra/data\n$ mkdir /usr/share/cassandra/saved_caches\n\
    ```\n\nCassandra will create these three directories regardless of whether you\
    \ create them; the reason you want to do this yourself is so the directories are\
    \ located in a location of your choice, instead of in the default directories."
