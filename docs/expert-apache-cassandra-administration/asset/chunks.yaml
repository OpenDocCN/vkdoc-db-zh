    rid of the outdated rows. However, compaction is on a per-node basis, so although
    one node performs a compaction, outdated versions of rows may still exist on other
    nodes. To avoid returning the outdated rows, the database gets multiple versions
    of a row in response to a read request from a client. It then returns the version
    with the latest timestamp to the client, a process called “last-write-wins.”


    Cassandra offers multiple compaction algorithms, and different strategies are
    best for write heavy and read heavy tables. I discuss compaction strategies in
    detail in Chapter [11](#A436674_1_En_11_Chapter.html).


    ## Reading Data


    I want to explain the read request flow in a Cassandra database, but before I
    do that, let me explain the basic architecture of a Cassandra database.


    Since there’s no primary or master node in a Casandra cluster, any node that contains
    the rows that can satisfy queries about that row can do so. Remember that Cassandra
    replicates each row in a table across multiple nodes, with the number of replicas
    depending on the replication factor.


    The gossip protocol that Cassandra uses lets the nodes exchange information about
    the network topology. Using Gossip, each of the nodes learns about the cluster
    topology and determines where it should direct a request for a specific row.


    Cassandra deems a read operation successful if enough nodes acknowledge success.
    How many nodes are enough depends on the replication factor and the consistency
    level you choose.


    Figure [4-2](#A436674_1_En_4_Chapter.html#Fig2) shows a case where there are twelve
    nodes in the cluster and the replication factor is 3\. The `QUORUM` consistency
    level is employed during client reads. Using the `QUORUM` consistency level, a
    read operation is successful when two of the three nodes acknowledge success.


    ![A436674_1_En_4_Fig2_HTML.gif](A436674_1_En_4_Fig2_HTML.gif)


    Figure 4-2


    How the gossip protocol helps nodes exchange information among themselves Note


    Since Cassandra uses the gossip protocol and since it’s a distributed database
    that requires it to talk to multiple nodes during each read and write operation,
    the network performs a heavy amount of data transfers. You’re advised to set up
    at least a 1Gbps network bandwidth to accommodate gossip traffic as well as replication
    traffic.'
  trans: '


    #### Bloom 过滤器与索引文件


    一旦 Cassandra 将内存表刷新到磁盘，它会创建两个额外的数据结构：一个 Bloom 过滤器和一个索引文件。


    ##### Bloom 过滤器


    Bloom 过滤器是一种用于测试集合成员资格的概率数据结构，你可以调整其假阳性率。它永远不会产生假阴性。Bloom 过滤器是一种堆外结构。它使用一种快速算法来检测一个元素是否是集合的成员。


    数据库将 Bloom 过滤器存储在内存中，并在查找键时使用它们来减少磁盘访问。当你执行查询时，数据库在访问磁盘数据之前会先检查 Bloom 过滤器。如果 Bloom
    过滤器显示该元素在集合中，数据库才会访问磁盘以进行确认。由于内存访问比磁盘访问快得多，你可以将 Bloom 过滤器视为一种用于加速访问的缓存。


    当 Bloom 过滤器报告某个键不存在于 SSTable 中时，那么该键确实不存在。然而，如果过滤器推断该键存在，有时可能是错误的；该键可能实际并不存在。


    Bloom 过滤器通过指示键是否不在 SSTable 中，来避免数据库执行额外的磁盘读取以读取 SSTable，从而增强了读取请求的可扩展性。


    你可以通过增大 Bloom 过滤器的大小来减少假阳性的数量。这将使用更多内存，但会使过滤器更精确。你可以在表级别配置假阳性的概率，在创建表时或之后均可。你在表级别配置
    `bloom_filter_fp_chance` 属性，以指定 Bloom 过滤器报告的假阳性百分比。


    ##### 索引文件


    索引文件存储了键在主数据文件（即 SSTable）中的偏移量。默认情况下，数据库将索引文件的一部分存储在内存中。索引文件存储 SSTable 中每第 `128`
    个键的偏移量，此值可以配置。


    与 Bloom 过滤器类似，索引文件通过提供 SSTable 中的随机位置来增强读取可扩展性，你可以从此位置开始顺序扫描以获取数据。否则，你将被迫扫描整个
    SSTable 来检索数据。


    #### 压缩 SSTable 数据


    随着时间的推移，数据库最终可能在不同的 SSTable 中拥有同一行的多个版本，因为 SSTable 是不可变的，且数据库不会覆盖现有数据。相反，插入和更新操作会生成新的
    SSTable。


    为了防止 SSTable 的多个版本使系统不堪重负，数据库会定期合并 SSTable，以清除旧版本的数据。此过程称为压缩。默认情况下，数据库会自动执行次要压缩。


    在压缩操作期间，Cassandra 会合并 SSTable 中的数据，包括键和列。它还会清除所有过期的墓碑标记并创建一个新的索引。压缩的结果是一个新的 SSTable。压缩可能会导致
    I/O 使用率和磁盘上数据大小暂时增加，但由于它合并了多个存储 SSTable 数据的大型数据文件，最终会节省你的空间。


    你可以配置一种压缩策略，以告诉数据库在压缩期间合并多个 SSTable 时必须使用的算法。例如，默认的压缩策略是大小分层压缩，它会合并大小相似的 SSTable
    以创建一个大的 SSTable。


    一旦数据库通过合并多个 SSTable 创建了新的 SSTable，它就会将旧的表标记为待删除。这意味着在压缩操作期间，你会看到更高的空间使用率。数据库会在重启期间，或通过使用引用计数机制，清除其标记为待删除的表。


    压缩之后，数据库将删除原始的 SSTable，从而清除过时的行。但是，压缩是基于每个节点的，因此尽管一个节点执行了压缩，过时的行版本可能仍然存在于其他节点上。为了防止返回过时的行，数据库在响应客户端的读取请求时，会获取一个行的多个版本。然后，它将具有最新时间戳的版本返回给客户端，此过程称为“最后写入胜出”。


    Cassandra 提供了多种压缩算法，不同的策略最适合写入密集和读取密集的表。我将在第 11 章详细讨论压缩策略。


    #### 读取数据


    我想解释 Cassandra 数据库中的读取请求流程，但在此之前，让我先解释一下 Cassandra 数据库的基本架构。


    由于 Casandra 集群中没有主节点或主节点，任何包含可满足关于该行查询的行的节点都可以执行查询。请记住，Cassandra 会将表中的每一行复制到多个节点上，副本数量取决于复制因子。


    Cassandra 使用的 Gossip 协议使节点能够交换有关网络拓扑的信息。通过使用 `Gossip`，每个节点都能了解集群拓扑，并确定对于特定行的请求应导向何处。


    如果有足够多的节点确认成功，Cassandra 就认为读取操作成功。多少节点才算足够取决于复制因子和你选择的一致性级别。


    图 4-2 展示了一种情况：集群中有十二个节点，复制因子为 3。客户端读取时采用了 `QUORUM` 一致性级别。使用 `QUORUM` 一致性级别时，当三个节点中有两个确认成功，读取操作即视为成功。


    ![A436674_1_En_4_Fig2_HTML.gif](img/A436674_1_En_4_Fig2_HTML.gif)


    **图 4-2** Gossip 协议如何帮助节点相互交换信息


    **注意：** 由于 Cassandra 使用 Gossip 协议，并且它是一个分布式数据库，在每次读写操作期间都需要与多个节点通信，因此网络会执行大量的数据传输。建议你至少设置
    1Gbps 的网络带宽，以容纳 Gossip 流量以及复制流量。


