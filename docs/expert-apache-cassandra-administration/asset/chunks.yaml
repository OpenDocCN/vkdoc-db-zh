  trans: '

    集群是 Cassandra 数据库的最大部署单元，由位于一个或多个位置的一组节点构成。在 AWS 中，这些位置即多个可用区。一个集群可以仅包含单个节点、单个数据中心或多个数据中心。集群有时也被称为**环**，因为
    Cassandra 通过将数据排列在环中来存储数据。


    Cassandra 节点是 Cassandra 集群中位于某个具体位置（一台服务器）的一部分，用于存储数据。具体来说，它根据你指定的分区算法来存储经过分区的数据。


    提交日志是一种预写式事务日志，Cassandra 将其存储在集群的每个节点上。Cassandra 首先将数据写入仅可追加的提交日志，然后分批或定期将数据刷写到磁盘。提交日志在数据恢复过程中扮演着关键角色。一旦数据库将数据刷写到磁盘，就可以对提交日志进行归档、删除或重用。


    内存表是一种内存结构，它是可通过键查找的数据行的缓存。每个内存表存储特定表的数据，当提交日志变满或达到特定间隔（在表级别设置）时，数据库会将内存表的内容刷写到磁盘。


    SSTable（排序字符串表）是一个逻辑实体，由磁盘上的多个文件组成。SSTable 是不可变的，且是仅可追加的结构。当 Cassandra 将内存表刷写到磁盘时，就会创建一个
    SSTable。Cassandra 按键对内存表进行排序，并按顺序写入它们以创建 SSTable。这就是 Cassandra 写入速度非常快的原因；它只涉及提交日志的追加和用于刷写数据的顺序写操作。


    键空间是一个逻辑容器，包含一个或多个表，类似于关系数据库中的模式。你将数据存储在属于特定键空间的表中。所有数据对象（如表）都必须属于一个键空间。

    *   键空间定义了 Cassandra 如何在集群节点上复制数据。一个键空间具有若干存储属性。键空间还决定了你存储在其中的数据的 RF（副本因子）。你可以在创建键空间时或之后，在键空间级别定义数据复制策略。

    *   为每个应用程序使用单独的键空间是一个好主意。


    CQL 表（又称列族）是驻留在键空间中的逻辑实体。表由有序的列组成，数据库按行获取这些列。创建表时必须定义主键。


    ### 副本放置策略


    Cassandra 允许你通过在集群节点上存储多个数据副本来复制数据。你可以采用两种策略来让 Cassandra 知道应该如何复制数据：

    *   `SimpleStrategy`用于原型设计。

    *   `NetworkTopologyStrategy`用于生产环境。


    ## Cassandra 如何存储数据


    由于 Cassandra 是一种键值存储，它将其数据组织成由若干列（代表值）组成的行。一行属于单个节点，Cassandra 将该行复制到集群中的其他节点。


    Cassandra 对每行的键进行哈希运算，以确定应将该数据存储在环中的哪个节点。它将集群本身组织成一个节点环，每个节点存储相等数量的哈希值。


    假设你正在运行一个四节点 Cassandra 集群。你有一个键空间，并选择副本因子为 3。假设你在键空间中创建了一个表并向其中插入数据。每次 Cassandra
    插入数据时，都会对该行的键值进行哈希运算，以找出负责存储该行的节点。


    为简单起见，我们假设哈希值范围是 1-100，尽管实际上哈希值使用 128 位或更大的值。由于集群中有四个节点，节点间划分哈希值的方式如下：

    *   节点 1：哈希值 1-25

    *   节点 2：哈希值 26-50

    *   节点 3：哈希值 51-75

    *   节点 4：哈希值 76-100


    图 5-1 展示了 Cassandra 如何将哈希值分配给四个节点。


    ![A436674_1_En_5_Fig1_HTML.jpg](img/A436674_1_En_5_Fig1_HTML.jpg)


    *图 5-1：节点如何负责各种哈希值*


    假设你插入的第一行被 Cassandra 哈希后，哈希值为 65。如图所示，该行属于节点 3，Cassandra 还会将数据复制到节点 1 和节点 2。为什么是节点
    1 和 2？原因是复制总是以环上的顺时针方向进行。


    假设你插入的下一行哈希值为 48。它属于节点 2，Cassandra 会将该行复制到节点 3 和节点 4。


    这就是 Cassandra 在集群节点间存储数据的核心原理。


    理想情况下，集群中的所有节点都拥有相等的哈希值份额，从而也拥有相等的数据集份额。这就是为什么确保为表选择的`主键`具有高基数（许多值）非常重要。这样，行会分散在集群的所有节点中，而不是以倾斜的方式存储，避免某些节点承担比其他节点更多的数据集责任。这会导致存储驱动器上出现热点，因为在读取操作期间，较少的节点在承担大部分工作。

    '
- fmt: '## Gossip and How It Helps Nodes Communicate


    Cassandra uses gossip, a protocol in which nodes exchange state information about
    themselves and other nodes they’re aware of in order to discover location and
    state information about all nodes in a cluster. Gossip protocols that assume a
    less-than-perfectly-functioning network are common in distributed network systems
    and are used for data replication in distributed databases.


    As with human gossip, the peers (nodes) in a cluster choose which nodes they want
    to exchange information with. The `Gossiper` class maintains a list of nodes that
    are alive, thus enabling gossip to help with failure detection.


    The gossip process runs frequently (every second) and exchanges state messages
    of one node with those of up to three other nodes. When a node starts, it registers
    with the gossiper to receive endpoint state information from other nodes in the
    cluster, as shown here:


    ```

    INFO  [main] 2017-06-24 12:19:21,997 MessagingService.java:733 - Starting Messaging
    Service on ubuntu/192.168.159.130:7000 (ens33)

    INFO  [HANDSHAKE-/192.168.159.129] 2017-06-24 12:19:22,199 OutboundTcpConnection.java:510
    - Handshaking version with /192.168.159.129

    INFO  [GossipStage:1] 2017-06-24 12:19:22,326 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [RequestResponseStage-1] 2017-06-24 12:19:22,380 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    INFO  [main] 2017-06-24 12:19:23,202 StorageService.java:705 - Loading persisted
    ring state

    INFO  [main] 2017-06-24 12:19:23,218 StorageService.java:818 - Starting up server
    gossip

    INFO  [GossipStage:1] 2017-06-24 12:19:24,596 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [RequestResponseStage-1] 2017-06-24 12:19:24,601 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    INFO  [main] 2017-06-24 12:19:31,610 CassandraDaemon.java:725 - No gossip backlog;
    proceeding

    ```


    And when a node can’t get the gossip information, it lets you know about that
    too, by throwing an exception:


    ```

    INFO  [main] 2017-06-24 12:06:00,302 MessagingService.java:733 - Starting Messaging
    Service on

    ERROR [main] 2017-06-24 12:06:31,476 CassandraDaemon.java:752 - Exception encountered
    during startup

    java.lang.RuntimeException: Unable to gossip with any seeds

    WARN  [StorageServiceShutdownHook] 2017-06-24 12:06:31,564 Gossiper.java:1514
    - No local state, state is in silent shutdown, or node hasn''t joined, not announcing
    shutdown

    ```


    The gossip process can be both direct (other nodes gossip to a node) and indirect
    (nodes get information from other nodes, which might get it from still other nodes).
    Since each node not only exchanges information about its own state but also about
    the state of the other nodes they communicated with, all nodes will be aware of
    the state of all the other nodes in the cluster very fast.


    When nodes exchange gossip among themselves, the latest state of a node overwrites
    older state information.


    When the gossiper finds that an endpoint isn’t responding, it marks that endpoint
    as dead on its list and logs the information.


    Cassandra uses a sophisticated algorithm called Phi Accrual Failure Detection
    for detecting node failures. Instead of using simple heartbeats from the nodes
    to indicate that they are alive, the algorithm uses a suspicion level to determine
    node availability.


    Whereas a heartbeat offers a simple yes/no criterion to determine if a node is
    alive, the failure detection uses a continuum of data to make that determination.
    For example, if a node can’t accept a connection occasionally due to blips in
    the network, that node isn’t immediately put on the list of dead nodes. Thus,
    the algorithm matches real-life network conditions and realistically portrays
    the health of the nodes. Using this algorithm, the database detects node failures
    within 10 seconds after they occur.


    ### Configuring Gossip Settings


    You really don’t need to do anything to set up gossip because all the necessary
    properties are set when you start up the Cassandra nodes in a cluster. When you
    start up a node, you configure the following properties, all of which help the
    node know which nodes it should contact for gossip about other nodes. These properties
    also set the ports and other relevant IP addresses or hostnames to enable Cassandra
    to connect the nodes to one another.


    *   `cluster_name`: Name of the cluster the node is a part of.

    *   `listen_address`: The IP address/hostname that Cassandra must bind to so it
    can connect this node to the rest of the nodes in the cluster. Alternatively,
    you can specify the `listen_interface` property instead of `listen_address`.


    Tip


    Specify multiple seed nodes per datacenter so gossip doesn’t have to communicate
    with nodes from a different datacenter when bootstrapping nodes.


    *   `seed_provider`: This property enables you to specify a list of hosts (IP
    addresses) that gossip relies on to learn the ring’s topology. You don’t need
    to specify all nodes as seed nodes since it reduces gossip performance. DataStax
    recommends that you use a small number of seeds, such as three nodes per datacenter.
    You should specify the same list of nodes for all nodes in a cluster. If your
    cluster has multiple datacenters, include at least one node from each datacenter
    as seed providers.

    *   `storage_port`: This is the inter-node communication port and it must be identical
    across all nodes in the cluster.


    ### Seed Nodes and Gossip


    In Chapter [3](#A436674_1_En_3_Chapter.html), you learned about the seed nodes
    that you specify in the `cassandra.yaml` file. Seed nodes aren’t really a big
    deal, in the sense that their failure doesn’t constitute a single point of failure
    for the cluster. The only role they play is in bootstrapping the gossip process
    for a new node that’s joining the cluster.


    You must ensure that you specify an identical set of seed nodes for all of a cluster’s
    nodes. This point is quite important when you first start up a node.


    It’s not advisable to make every node a seed node; this will only adversely impact
    gossip performance. Ideally, your seed list should be small, with about three
    nodes per datacenter. If you have multiple datacenters, include at least one node
    from each datacenter in the seed list.


    If you include two or three nodes per datacenter gossip, as against specifying
    a single seed node, it protects you against the failure of the single node. Otherwise,
    when the single seed node fails, gossip will need to communicate with a different
    datacenter during the bootstrapping of the nodes.'
