- fmt: '## The Cassandra Read Path


    Cassandra follows a specific sequence of events before it can successfully complete
    a read request. The following sequence of events shows how the database serves
    a read request.


    The first event is when a client sends a read request to the cluster to get data
    for a specific key, named K. A node can act as a coordinator, a replica, or both.
    If the node has the replica, it can act as the replication node. If the key isn’t
    mapped to this node, it acts as a coordinator.


    If the node is acting as the coordinator, it forwards the request to the nodes
    that might contain the key K. The coordinator uses a snitch to find which of the
    replica nodes is closest to itself and sends a request for full data to that node.
    It also sends a request to the other nodes for the digest generated with the hash
    of the data.


    Cassandra forwards the request from the coordinator to the internal services of
    the target node(s).


    The coordinator requests data from memtables and SSTables. Although the database
    can return the data faster from the memtables since they live in memory, it also
    checks one or more SSTables for the data. When one of the Bloom filters confirms
    that it has the key, Cassandra will then check the sample index in memory.


    The database first performs a binary search on the sample index to find the starting
    offset into the index file. Using this offset, the database offsets into the index
    file and performs a sequential read to get the offset into the SSTable for the
    actual key.


    Using the offset for the actual key, the database offsets into the SSTable file
    and returns the actual data from the SSTable by performing a lookup of the SSTable.


    The `filter` command consolidates the multiple versions of the key data it received
    from the SSTable lookup and from the memtable. It consolidates the key data and
    returns the consolidated version to the internal services.


    The internal services repeat this process on other nodes and return the results
    to the coordinator node.


    The coordinator node compares all the digests it received from all the nodes,
    and if there’s a conflict, reconciles the data and returns the reconciled version
    to the client. If necessary, the database also initiates a read repair to make
    the data consistent.


    ## How Write Patterns Affect Reads


    The way in which Cassandra writes its data has a bearing on the read operations.
    You can affect read performance by how you configure Cassandra’s compaction processes.
    The data in the SSTables that Cassandra writes to disk is immutable. Cassandra
    doesn’t update data. It writes new data as well as updated data to new SSTables,
    each with a different timestamp. The number of the SSTables may grow to be quite
    large over time. When responding to a query, the database may have to access many
    SSTables to retrieve a single row since each of the versions of a row with a unique
    set of columns may be stored in a different SSTable.


    Cassandra periodically compacts a collection of SSTables by merging multiple SSTables
    and removing old data. It compacts multiple SSTables so it can make a single complete
    row from all the versions of each row, with the latest version of each of the
    columns in the row.


    ## The Cassandra Storage Engine


    Cassandra uses a log-structured storage engine that avoids overwrites and employs
    sequential I/O to update data.


    Most relational databases use a B-tree, a data structure that keeps data sorted
    and permits you to search, insert, delete, and sequentially access data in logarithmic
    time. The B-tree data structure is optimized for reading and writing large blocks
    of data. Cassandra uses a different data structure called the Log-Structured Merge-Tree
    (LSM tree) that works well for providing indexed access to files with high insert
    volumes. Data stores such as HBase, MongoDB, and InfluxDB also use the same LSM
    tree data structure.


    In a large distributed database, read-before-write can lead to latencies in reads.
    Cassandra avoids using read-before-write for most writes. Instead, Cassandra’s
    storage engine groups inserts and updates in memory and writes data periodically
    and sequentially to disk. Once Cassandra writes the data to disk, the data remains
    immutable; you can’t overwrite it.


    Write amplification (WA) is a phenomenon associated with flash memory and solid-state
    drives (SSDs) wherein the data physically written to the storage media is a multiple
    of the logical amount of data. By sequentially writing data to immutable files
    on disk, Cassandra avoids the write amplification phenomenon. Thus, write amplification,
    which is a problem on SSDs when using many other types of databases, ceases to
    be a problem with Cassandra.


    ## Cassandra Transactions and the ACID Properties


    Unlike traditional RDBMS transactions that support all the well-known ACID transactions,
    Cassandra supports the atomicity, isolation, and durability properties, but not
    the consistency property. Cassandra doesn’t use a typical database’s rollback
    and locking mechanisms. It offers eventual or tunable consistency wherein you
    determine the transaction consistency level, which involves an inherent tradeoff
    between the availability and the accuracy of data.


    In the following sections, let’s briefly review the support for the standard ACID
    properties in a Cassandra database.


    ### Atomicity


    Cassandra performs both writes (inserts and updates) and delete operations atomically
    at the partition level. Dealing with operations at the partition level means that
    Cassandra treats inserts, updates, and deletes of multiple rows from the same
    partition as a single operation.


    If more than one client updates the same column simultaneously, the latest timestamp
    determines which is the most up-to-date update to that column.


    Cassandra doesn’t automatically roll back writes that are successful only on some
    nodes. Let’s say you are using a write consistency level of `QUORUM`, with a replication
    factor of 3. This means that the coordinator nodes will need to wait for acknowledgement
    from two nodes. If the write succeeds on one node but fails on the other, Cassandra
    doesn’t roll back the successful write.


    ### Isolation


    Cassandra writes and updates are fully isolated at the row level, meaning that
    a client that writes to a row in a partition is the only one that can see the
    write, until it completes the write operation.


    Any updates that belong to the same partition in a batch operation are performed
    with full row-level isolation as well, unless that operation involves changes
    to multiple partitions.


    ### Durability


    Cassandra provides strong durability for writes. It provides local durability
    by recording all writes to both memory and to the commit log on disk before it
    acknowledges a successful write. If there’s a server failure before the database
    can flush the memtable to disk, it replays the commit log to retrieve the lost
    writes.


    The fact that Cassandra replicates data to multiple nodes bolsters the durability
    provided by writing to the commit log.


    Specify the `commitlog_sync` property (in the `cassandra.yaml` file) to set durability
    to fit your need for consistency. The `commitlog_sync` property determines the
    method that Cassandra uses to acknowledge writes. Here are the ways in which you
    can configure this property:


    *   Periodic (Default value is 10000 milliseconds, which is 10 seconds): If you
    choose periodic, set the `commit_sync_period_in_ms` property to control how often
    Cassandra synchronizes the commit log to disk. Cassandra acknowledges periodic
    syncs immediately.

    *   Batch (Default: disabled): When you enable the batch method, Cassandra waits
    to acknowledge writes until they’re synced to disk. The property `commitlog_sync_batch_window_in_ms`
    lets you specify the time for which Cassandra waits for other writes before performing
    a sync. The default value is 2 ms.'
