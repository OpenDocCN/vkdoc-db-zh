    ## 致谢


    I wish to thank my good friend and longtime editor for many of my books, Jonathan
    Gennick. Jonathan encouraged me to keep going and supported my work when the going
    got tough during the writing of this book. Thank you, Jonathan, for your trust
    in me!


    Carlos Rolo has been magnificent in many ways as the Technical Editor of this
    book. Carlos is well known for his mastery of the Cassandra database. I’ve benefited
    significantly from his painstaking technical reviews, as well as from his suggestions
    to clarify or improve several tricky technical concepts.


    Jill Balzano, the Coordinating Editor, has been instrumental in ensuring that
    I stayed on target, with her usual combination of grace and efficiency. Jill’s
    enormous patience and kindness helped make the writing and editing process a pleasurable
    one.


    Amrita Stanley, Senior Executive Project Manager at SPi Content Solutions – SPi
    Global, was extremely helpful in making sure that things stayed on track. Thank
    you, Amrita, for being so very attentive to everything and helping me out with
    my requests.


    Everything I do scholastically is due to my father’s encouragement and nurturing.
    I thank my dear dad, the late Dr. Appa Rao, for his love and affection. I wish
    to thank my mom, Swarna Kumari, and my brothers, Hari Hara Prasad and Siva Sankara
    Prasad. I owe a round of thanks to all of my in-laws and the children of my brothers:
    Aruna, Vanaja, Teja, Ashwin, Aparna, and Soumya. I appreciate and thank my wife’s
    indirect contribution to this book. I also am grateful for the support and encouragement
    of my twins, Nina and Nicholas, who brighten my life every single day!


    —Sam R. Alapati'
