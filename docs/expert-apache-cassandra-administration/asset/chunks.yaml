    \ Recovery\n\nCassandra enables you to configure commit log archiving and point-in-time\
    \ recovery. Cassandra archives the commit log under the following conditions:\n\
    \n*   When a node starts up\n*   When the database writes the commit log to disk\n\
    *   Any specified point in time\n\nYou can configure the archiving of the commit\
    \ log through the `commitlog_archiving.properties` configuration file. You can\
    \ set several properties pertaining to the archiving and restoring of commit log\
    \ segments in this file, as I explain in the following sections.\n\n#### Manually\
    \ Archiving the Commit Log\n\nYou can archive a commit log segment with the `archive_command`\
    \ command. Here’s the syntax of the `archive_command` command:\n\n```\narchive_command=/bin/ln\
    \ %path /backup/%name\n```\n\nIn this command, the two key parameters are\n\n\
    *   `path`: Fully qualified path to the commit log segment you wish to archive\n\
    *   `name`: The name of the commit log\n\n#### Restoring a Commit Log\n\nThe archives\
    \ you make of the commit log segments enable you to recover the database to a\
    \ point in time. You can restore an archived commit log with the command `restore_command`.\
    \ Here’s the syntax of the command:\n\n```\nrestore_command=cp -f %from %to\n\
    ```\n\nIn this command, the key parameters are\n\n*   `From`: The path to the\
    \ archived commitlog segment\n*   `To`: Name of the commit log directory\n\n####\
    \ Setting the Restore Directory Location\n\nYou can configure the `restore_directories`\
    \ parameter to set the location of the directory where you want to store the archived\
    \ commit log. When you run the `restore_command` command, the database looks here\
    \ for the archived commitlog segments it needs to restore.\n\n#### Setting the\
    \ Restore Timestamp\n\nYou can tell the database how far it should restore the\
    \ commit log segments, by specifying a timestamp with the `restore_point_in_time`\
    \ parameter. Here’s an example:\n\n```\nrestore_point_in_time=2013:12:11 17:00:00\n\
    ```\n\nCassandra will restore the commit log segments that it created prior to\
    \ and up to the timestamp you specify.\n\n## Loading Bulk Data into Cassandra\n\
    \nThere are two basic tools for moving bulk data to and from a Cassandra cluster:\
    \ the CQL `COPY` command and the sstableloader tool.\n\n*   The `COPY` command\
    \ can read CSV data to a Cassandra table and write CSV data from Cassandra to\
    \ a file system. The `COPY` command works very similarly to the tools used by\
    \ relational databases for exporting and importing data.\n*   The sstableloader\
    \ utility helps you bulk load external data into a Cassandra cluster.\n\n### Using\
    \ the COPY Command to Import and Export Data\n\nThe `COPY` command enables you\
    \ to copy data to and from a Cassandra database. The source and target files are\
    \ CSV (comma-separated values) or delimited text files. In the following sections,\
    \ I review how you can use the COPY command to import and export data.\n\n###\
    \ Copying Data from a Cassandra Table\n\nUse the `COPY TO` command to copy data\
    \ from a Cassandra table into a CSV file. The following is the syntax of the `COPY\
    \ TO` command:\n\n```\nCOPY table_name [( column_list )]\nTO 'file_name'[, 'file2_name',\
    \ ...] | STDOUT\n[WITH option = 'value' [AND ...]]\n```\n\nThe `COPY TO` command\
    \ separates the fields in the CSV file with a delimiter that you can specify.\
    \ By default, this command exports all fields, and you can specify a column list\
    \ to export only part of a table’s rows.\n\nHere’s an example that shows how to\
    \ export data from the table `CYCLNG.CYCLIST_NAME`:\n\n```\ncqlsh> COPY cycling.cyclist_name\
    \ TO 'cyclist.csv' WITH HEADER = TRUE;Using 1 child processes\nStarting copy of\
    \ cycling.cyclist_name with columns [id, firstname, lastname].\nProcessed: 6 rows;\
    \ Rate:       8 rows/s; Avg. rate:       7 rows/s\n6 rows exported to 1 files\
    \ in 0.849 seconds.\ncqlsh>\n```\n\nCassandra places the CSV file one directory\
    \ above the directory from where you executed the `COPY TO` command. If you open\
    \ the CSV file, you can see that it has a comma-delimited list of all the rows\
    \ in the source table.\n\n```\ncat cyclist_lastname.csv\nid,lastname\nfb372533-eb95-4bb4-8685-6ef61e994caa,MATTHEWS\n\
    220844bf-4860-49d6-9a4b-6b5d3a79cbfb,TIRALONGO\ne7cd5752-bc0d-4157-a80f-7523add8dbcd,VAN\
    \ DER BREGGEN\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47,KRUIKSWIJK\ne7ae5cf3-d358-4d99-b900-85902fda9bb0,FRAME\n\
    5b6962dd-3f90-4c93-8f61-eabfa4a803e2,VOS\n```"
  trans: "\n# Cassandra 快照恢复与维护\n\nCassandra 的修复机制确保集群中的所有节点都拥有最新的数据。如果你没有在同一时间为不同的节点创建快照，你可能会读取到陈旧的数据（如果使用`ONE`一致性级别）。\n\
    \n这就是为什么在从快照恢复后，你应该运行`nodetool repair`命令。修复操作确保集群中的所有副本都拥有最新的数据。修复过程可能持续数小时，因为它是一个资源消耗大的操作，需要\
    \ RAM 和 CPU 资源来完成工作。作为其工作的一部分，修复任务会为数据生成默克尔树，并将其与其他节点上的默克尔树进行比较。它还会传输缺失和/或过时的数据。在修复运行期间，如果并非所有快照都包含相同的数据，你有时可能会读到陈旧的数据。\n\
    \n## 使用 sstableloader 恢复快照\n\n假设你有一系列表需要从快照中恢复。你可以使用`sstableloader`工具来恢复快照。\n\n\
    ## 节点重启方法步骤\n\n通过节点重启从快照恢复数据的方法涉及关闭所有节点，然后在恢复快照数据后将它们重新启动。你可以一次性对集群中的所有节点使用此方法，或仅对单个节点使用。\n\
    \n以下是通过重启节点从快照恢复数据的步骤：\n\n1.  关闭集群中的所有节点。\n2.  运行`nodetool drain`命令，以确保没有数据丢失的风险。\n\
    3.  删除`commitlog`目录中的所有文件。\n\n    ```bash\n    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog#\
    \ ls\n    CommitLog-6-1499187293466.log  CommitLog-6-1499187293467.log\n    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog#\
    \ rm *\n    ```\n\n    删除每个表目录下的所有`.db`文件。你必须对正在恢复的所有键空间执行此操作。确保不要动`snapshots`和`backups`目录！完成后，此目录中不应有任何`.db`文件。\n\
    \n    ```bash\n    $ ls\n    backups  snapshots\n    $\n    ```\n\n4.  将最新`snapshot`目录中的所有文件复制到此目录：\n\
    \n    ```bash\n    $ cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/snapshots/1499196752095/*\
    \ .\n    $\n    ```\n\n5.  此时，Cassandra 已跨集群恢复了表数据。为确保数据一致，请运行`nodetool repair`命令。\n\
    \n    ```bash\n    $ sudo nodetool repair\n    [2017-07-04 13:19:20,492] Replication\
    \ factor is 1\\. No repair is needed for keyspace 'cycling'\n    [2017-07-04 13:19:26,018]\
    \ Repair completed successfully\n    [2017-07-04 13:19:26,064] Repair command\
    \ #1 finished in 5 seconds\n    ```\n\n## 提交日志归档与时间点恢复\n\nCassandra 允许你配置提交日志归档和时间点恢复。Cassandra\
    \ 在以下条件下归档提交日志：\n\n*   节点启动时\n*   数据库将提交日志写入磁盘时\n*   任何指定的时间点\n\n你可以通过`commitlog_archiving.properties`配置文件来配置提交日志的归档。你可以在此文件中设置与提交日志段归档和恢复相关的多个属性，如下文所述。\n\
    \n### 手动归档提交日志\n\n你可以使用`archive_command`命令归档一个提交日志段。`archive_command`命令的语法如下：\n\
    \n```\narchive_command=/bin/ln %path /backup/%name\n```\n\n在此命令中，两个关键参数是：\n\n\
    *   `path`：你要归档的提交日志段的完整限定路径\n*   `name`：提交日志的名称\n\n### 恢复提交日志\n\n你对提交日志段创建的归档使你能够将数据库恢复到某个时间点。你可以使用`restore_command`命令恢复已归档的提交日志。该命令的语法如下：\n\
    \n```\nrestore_command=cp -f %from %to\n```\n\n在此命令中，关键参数是：\n\n*   `From`：已归档的提交日志段的路径\n\
    *   `To`：提交日志目录的名称\n\n### 设置恢复目录位置\n\n你可以配置`restore_directories`参数来设置你希望存储已归档提交日志的目录位置。当你运行`restore_command`命令时，数据库会在此处查找它需要恢复的已归档提交日志段。\n\
    \n### 设置恢复时间点\n\n你可以通过`restore_point_in_time`参数指定一个时间戳，来告诉数据库应恢复提交日志段到何时。示例如下：\n\
    \n```\nrestore_point_in_time=2013:12:11 17:00:00\n```\n\nCassandra 将恢复在你指定的时间戳之前及至该时间点创建的提交日志段。\n\
    \n## 向 Cassandra 加载批量数据\n\n有两个基本工具可用于在 Cassandra 集群之间移动批量数据：CQL `COPY`命令和`sstableloader`工具。\n\
    \n*   `COPY`命令可以将 CSV 数据读取到 Cassandra 表中，并将 Cassandra 中的 CSV 数据写入文件系统。`COPY`命令的工作方式与关系数据库用于导出和导入数据的工具非常相似。\n\
    *   `sstableloader`工具可帮助你将外部数据批量加载到 Cassandra 集群中。\n\n### 使用 COPY 命令导入导出数据\n\n\
    `COPY`命令使你能够向 Cassandra 数据库复制数据或从中复制数据。源文件和目标文件是 CSV（逗号分隔值）或分隔文本文件。在以下部分中，我将介绍如何使用`COPY`命令来导入和导出数据。\n\
    \n### 从 Cassandra 表复制数据\n\n使用`COPY TO`命令将数据从 Cassandra 表复制到 CSV 文件。`COPY TO`命令的语法如下：\n\
    \n```sql\nCOPY table_name [( column_list )]\nTO 'file_name'[, 'file2_name', ...]\
    \ | STDOUT\n[WITH option = 'value' [AND ...]]\n```\n\n`COPY TO`命令使用你可以指定的分隔符来分隔\
    \ CSV 文件中的字段。默认情况下，此命令导出所有字段，你可以指定列列表以仅导出表的部分行。\n\n以下示例展示了如何从表`CYCLNG.CYCLIST_NAME`导出数据：\n\
    \n```bash\ncqlsh> COPY cycling.cyclist_name TO 'cyclist.csv' WITH HEADER = TRUE;\n\
    Using 1 child processes\nStarting copy of cycling.cyclist_name with columns [id,\
    \ firstname, lastname].\nProcessed: 6 rows; Rate:       8 rows/s; Avg. rate: \
    \      7 rows/s\n6 rows exported to 1 files in 0.849 seconds.\ncqlsh>\n```\n\n\
    Cassandra 将 CSV 文件放在你执行`COPY TO`命令所在目录的上一级目录中。如果你打开 CSV 文件，可以看到其中包含源表中所有行的逗号分隔列表。\n\
    \n```bash\ncat cyclist_lastname.csv\nid,lastname\nfb372533-eb95-4bb4-8685-6ef61e994caa,MATTHEWS\n\
    220844bf-4860-49d6-9a4b-6b5d3a79cbfb,TIRALONGO\ne7cd5752-bc0d-4157-a80f-7523add8dbcd,VAN\
    \ DER BREGGEN\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47,KRUIKSWIJK\ne7ae5cf3-d358-4d99-b900-85902fda9bb0,FRAME\n\
    5b6962dd-3f90-4c93-8f61-eabfa4a803e2,VOS\n```\n"
- fmt: "### Copying Data to a Cassandra Table\n\nThe `COPY` command helps move small\
    \ data sets (a data set that containing less than 2 million rows) into a Cassandra\
    \ table. You must use the Cassandra bulk loader to move larger data sets.\n\n\
    Specify `COPY FROM` to copy data from a CSV file into a Cassandra table. The following\
    \ is the general syntax for the `COPY FROM` command:\n\n```\nCOPY table_name [(\
    \ column_list )]\nFROM 'file_name'[, 'file2_name', ...] | STDIN\n[WITH option\
    \ = 'value' [AND ...]]\n```\n\nThe `COPY FROM` command updates existing records\
    \ and verifies the primary key. The following are the key things you need to remember\
    \ when running the `COPY FROM` command:\n\n*   Each row in the CSV file must contain\
    \ the same fields.\n*   The CSV file can have fewer fields (columns) than the\
    \ Cassandra table.\n*   The CSV file can’t have more fields than the Cassandra\
    \ table.\n*   Each row must have a value for the primary key value.\n*   The database\
    \ sets all missing or empty fields to null.\n\nFor an example of the `COPY FROM`\
    \ command, use the same table, `CYCLIST_NAME`, that you used for the `COPY TO`\
    \ command example. Since the `COPY FROM` command expects you to have the table\
    \ present, truncate the data from the table, thus making it ready to import the\
    \ data from the CSV file that you generated earlier.\n\n```\ncqlsh> COPY cycling.cyclist_name\
    \ FROM 'cyclist.csv' WITH HEADER = TRUE;\nUsing 1 child processes\nStarting copy\
    \ of cycling.cyclist_name with columns [id, firstname, lastname].\nProcessed:\
    \ 6 rows; Rate:      11 rows/s; Avg. rate:      15 rows/s\n6 rows imported from\
    \ 1 files in 0.389 seconds (0 skipped).\ncqlsh>\n```\n\n### Running sstableloader\
    \ to Perform Bulk Loading\n\nCassandra’s bulk loader tool, named `sstableloader`,\
    \ lets you load large amounts of data into Cassandra tables. You can also use\
    \ this tool to load data from an SSTable to a different cluster. Finally, you\
    \ can use this tool to restore snapshots, which I explained earlier in this chapter.\n\
    \nUnlike in the case of the `COPY` command, the target table can have data.\n\n\
    #### Loading External Data with sstableloader\n\nThe `sstableloader` utility enables\
    \ you to load external data into your cluster. Before you can load external data\
    \ with the `sstableloader` utility, you must first generate the SSTables, into\
    \ which you put the external data.\n\nTo generate the SSTables, you must use the\
    \ `SSTableWriter` API. `SSTableWriter` creates raw Cassandra data files that you\
    \ can bulk load into a cluster.\n\nNote\n\nYou can run more than one instance\
    \ of the `sstableloader` utility to parallelly load external data into your cluster.\n\
    \nSince the `sstableloader` utility is resource intensive, you should run it from\
    \ servers that aren’t acting as a Cassandra node.\n\nThe following is a summary\
    \ of the steps you must follow to load data through the `sstableloader` utility.\n\
    \n1.  Create the raw Cassandra data files that you’ll be using to bulk load the\
    \ data into the cluster. This involves writing some Java code that uses the `SSTableWriter`\
    \ API.\n2.  `SSTableWriter` generates SSTables in the directory you specify. Go\
    \ to the location where the code has stored the SSTables, as shown here:\n\n \
    \   ```\n    $ cd /var/lib/cassanddra/data/Keyspace1/Standrad2\n    ```\n\n3.\
    \  You can view the keyspace’s contents by executing the `ls` command.\n\n   \
    \ ```\n    $ ls\n    Keyspace1-Standard1-jb-60-CRC.db\n    Keyspace1-Standard1-jb-60-Data.db\n\
    \    ...\n    Keyspace1-Standard1-jb-60-TOC.txt\n    ```\n\n4.  Bulk load the\
    \ files by specifying a path to `Keyspace1/Standard1/` in the cluster where you\
    \ wish to load the SSTables.\n\n    ```\n    $ sstableloader -d 192.168.159.129\
    \ /var/lib/Cassandra/data/Keyspace1/Standard1/\n    ```\n\n#### Loading SSTable\
    \ Data to a Different Cluster\n\nYou can run the `sstableloader` utility to import\
    \ existing SSTables from a different cluster. Before you perform the import, run\
    \ the `nodetool flush` command in each of the source cluster’s nodes to ensure\
    \ that the database flushes the memtables to the SSTables that you’re about to\
    \ import to your cluster.\n\nTo run the `sstableloader` command to import the\
    \ data to a target cluster, follow the steps I described in the previous section.\
    \ Everything works the same way, except that you don’t need to generate the SSTables\
    \ since the source table already has them. You are importing from an SSTable to\
    \ another SSTable in a different cluster, so no raw data is involved in this import.\n\
    \nNote\n\nYou can use Apache Sqoop to migrate external data to Cassandra if you’re\
    \ using DataStax Enterprise, which comes loaded with everything you need to run\
    \ Sqoop.\n\n## Summary\n\nSince you need snapshots when you need to perform a\
    \ recovery, it’s important to carefully manage snapshots. Cassandra doesn’t manage\
    \ snapshots for you and therefore you must develop an effective way to store snapshots\
    \ and remove older snapshots so they don’t occupy a lot of storage space.\n\n\
    Incremental backups are turned on by default, and you must ensure that they remain\
    \ in effect since they reduce the need to take full snapshots of SSTables.\n\n\
    You’ll need all snapshots, incremental backups, and backups of the commit log\
    \ segments during a recovery. Therefore, it’s important to know that you can access\
    \ all of these readily so you can minimize the recovery time. To be sure that\
    \ you can perform a recovery correctly, it’s important to perform dry runs of\
    \ a recovery session. You don’t want to learn database recovery when you’re actually\
    \ performing one!\n\n## Part III\n\nMaintaining, Monitoring, Tuning, and Securing\
    \ Apache Cassandra\n\n## 9. Maintaining Cassandra\n\nThis chapter is about common\
    \ Cassandra management tasks and node management.\n\nCommon cluster management\
    \ tasks include repairing and cleaning data, rebuilding indexes, handling data\
    \ corruption, and flushing and draining data.\n\nNode management includes adding\
    \ and removing nodes, replacing and moving nodes, removing dead nodes, and assassinating\
    \ nodes. Since `nodetool` commands are key to performing all node management tasks,\
    \ I first review the key `nodetool` node management-related commands.\n\nThe chapter\
    \ shows how to perform management tasks such as adding and decommissioning datacenters.\n\
    \nThe chapter also shows you how to switch snitches and how to monitor and manage\
    \ gossip.\n\n### Common Cluster Maintenance Tasks\n\nAs an administrator, you’ll\
    \ perform various tasks to help Cassandra perform well. In the following sections,\
    \ I describe some of the most common database maintenance tasks, such as repairing\
    \ data, rebuilding indexes, and cleaning up data.\n\n#### Repairing Data (nodetool\
    \ repair)\n\nI explained Cassandra’s repair mechanisms at length in Chapter 5.\
    \ Over time, a node may become out of sync with other nodes due to Cassandra’s\
    \ tuneable consistency philosophy. If a node remains down for a while, it may\
    \ miss changes performed on the other nodes, especially if it stays down longer\
    \ than the time for which the other nodes store the hints.\n\nIn addition, specifying\
    \ a write consistency level below the `ALL` level means that the database declares\
    \ a write as successful even if one of more nodes don’t acknowledge the writes.\
    \ The principle of tunable consistency could result in nodes with different versions\
    \ of the same data. While the database automatically performs some types of repair\
    \ such as read repair, one of the key operations an administrator performs is\
    \ anti-entropy repair, which involves manually repairing data with the `nodetool\
    \ repair` command.\n\nTip\n\nRun the `nodetool stats` command while performing\
    \ a repair to monitor the progress of the repair.\n\n##### When to Perform a Repair\n\
    \nThe frequency of repairs has a lot to do with the read and write consistency\
    \ levels that you configure. If you chose a consistency level that’s slow to provide\
    \ consistency, then you should schedule repairs more frequently.\n\nFrequent repairs\
    \ have a cost in terms of overhead, so use a subrange repair wherever you can,\
    \ and schedule the repairs for different keyspaces (or tables) for separate times."
