  trans: '## Cassandra 读取路径


    Cassandra 在成功完成读取请求之前遵循一系列特定的事件流程。以下事件序列展示了数据库如何处理读取请求。


    第一个事件是客户端向集群发送读取请求以获取特定键（名为 K）的数据。一个节点可以充当协调节点、副本节点或两者兼是。如果该节点持有副本，它可以作为副本节点。如果该键未映射到此节点，则它充当协调节点。


    如果节点充当协调节点，它会将请求转发给可能包含键 K 的节点。协调节点使用一个`snitch`来查找哪个副本节点离它最近，并向该节点发送完整数据的请求。同时，它也会向其他节点发送请求，以获取由数据哈希生成的摘要。


    Cassandra 将请求从协调节点转发到目标节点的内部服务。


    协调节点从内存表和 SSTable 中请求数据。虽然数据库从内存表中返回数据更快（因为它们存在于内存中），但它也会检查一个或多个 SSTable 以获取数据。当其中一个布隆过滤器确认它拥有该键时，Cassandra
    随后会检查内存中的样本索引。


    数据库首先对样本索引执行二分查找，以找到索引文件中的起始偏移量。利用这个偏移量，数据库在索引文件中定位并执行顺序读取，以获取实际键在 SSTable 中的偏移量。


    使用实际键的偏移量，数据库在 SSTable 文件中定位，并通过对 SSTable 的查找操作返回其中的实际数据。


    `filter` 命令整合了它从 SSTable 查找和从内存表收到的多个版本的键数据。它整合键数据，并将整合后的版本返回给内部服务。


    内部服务在其他节点上重复此过程，并将结果返回给协调节点。


    协调节点比较它从所有节点收到的所有摘要，如果存在冲突，则会调和数据，并将调和后的版本返回给客户端。如有必要，数据库还会启动读取修复以确保数据一致性。


    ## 写入模式如何影响读取


    Cassandra 写入数据的方式会影响读取操作。你可以通过配置 Cassandra 的合并过程来影响读取性能。Cassandra 写入磁盘的 SSTable
    中的数据是不可变的。Cassandra 不更新数据。它会将新数据以及更新后的数据写入新的 SSTable，每个 SSTable 都带有不同的时间戳。SSTable
    的数量可能会随着时间的推移而变得相当庞大。在响应查询时，数据库可能必须访问许多 SSTable 才能检索到一行数据，因为具有唯一列集的一行数据的每个版本可能存储在不同的
    SSTable 中。


    Cassandra 通过合并多个 SSTable 并移除旧数据，定期合并一组 SSTable。它合并多个 SSTable，以便从每一行的各个版本中生成一个完整的行，其中包含该行每一列的最新版本。


    ## Cassandra 存储引擎


    Cassandra 使用一种日志结构化存储引擎，它避免覆盖并采用顺序 I/O 来更新数据。


    大多数关系型数据库使用 B 树，这是一种保持数据排序并允许你在对数时间内搜索、插入、删除和顺序访问数据的数据结构。B 树数据结构针对读写大数据块进行了优化。Cassandra
    使用一种不同的数据结构，称为日志结构合并树，简称 LSM 树，它能很好地为高插入量的文件提供索引访问。像 HBase、MongoDB 和 InfluxDB
    这样的数据存储也使用相同的 LSM 树数据结构。


    在大型分布式数据库中，写前读取可能导致读取延迟。Cassandra 在大多数写入操作中避免使用写前读取。相反，Cassandra 的存储引擎在内存中对插入和更新进行分组，并定期将数据顺序写入磁盘。一旦
    Cassandra 将数据写入磁盘，该数据就保持不可变；你无法覆盖它。


    写入放大是一种与闪存和固态硬盘相关的现象，其中物理写入存储介质的数据量是逻辑数据量的倍数。通过将数据顺序写入磁盘上的不可变文件，Cassandra 避免了写入放大现象。因此，在使用许多其他类型数据库时会在固态硬盘上成为问题的写入放大，在使用
    Cassandra 时就不再是问题。


    ## Cassandra 事务与 ACID 属性


    与支持所有知名 ACID 事务的传统 RDBMS 事务不同，Cassandra 支持原子性、隔离性和持久性属性，但不支持一致性属性。Cassandra 不使用典型的数据库回滚和锁定机制。它提供最终一致性或可调一致性，由你决定事务一致性级别，这涉及到数据可用性和准确性之间的固有权衡。


    在以下章节中，让我们简要回顾一下 Cassandra 数据库对标准 ACID 属性的支持。


    ### 原子性


    Cassandra 在分区级别原子地执行写入和删除操作。在分区级别处理操作意味着 Cassandra 将来自同一分区的多行插入、更新和删除视为单一操作。


    如果有多个客户端同时更新同一列，则由最新时间戳决定哪个是该列的最新更新。


    Cassandra 不会自动回滚仅在部分节点成功的写入。假设你使用写入一致性级别为 `QUORUM`，复制因子为 3。这意味着协调节点将需要等待来自两个节点的确认。如果写入在一个节点上成功但在另一个节点上失败，Cassandra
    不会回滚成功的写入。


    ### 隔离性


    Cassandra 的写入和更新在行级别完全隔离，这意味着在完成写入操作之前，向分区中某一行写入的客户端是唯一能看到该写入的客户端。


    属于同一分区的批量操作中的任何更新也以完全的行级隔离执行，除非该操作涉及对多个分区的更改。


    ### 持久性


    Cassandra 为写入提供强大的持久性。它在确认写入成功之前，通过将所有写入记录到内存和磁盘上的提交日志来提供本地持久性。如果在数据库将内存表刷新到磁盘之前发生服务器故障，它会重放提交日志以找回丢失的写入。


    Cassandra 将数据复制到多个节点这一事实，进一步强化了通过写入提交日志所提供的持久性。


    指定 `commitlog_sync` 属性以根据你的一致性需求设置持久性。`commitlog_sync` 属性决定了 Cassandra 用于确认写入的方法。以下是你配置此属性的方式：


    *   周期性（默认值为 10000 毫秒，即 10 秒）：如果你选择周期性方式，设置 `commit_sync_period_in_ms` 属性以控制 Cassandra
    将提交日志同步到磁盘的频率。Cassandra 会立即确认周期性同步。

    *   批次（默认：禁用）：当你启用手动方式时，Cassandra 会等待，直到写入被同步到磁盘后才确认写入。属性 `commitlog_sync_batch_window_in_ms`
    允许你指定 Cassandra 在执行同步前等待其他写入的时间。默认值为 2 毫秒。'
- fmt: '## Handling Consistency


    Cassandra enables you to configure consistency levels to balance the availability
    of data with the accuracy of that data. You configure consistency at a session
    level or for a single read or write operation. The level of consistency you choose
    determines the number of replicas that the database must acknowledge to the application
    to indicate that a read or write operation was successful.

    Consistency levels determine how many nodes must respond to the coordinator node
    to successfully process transactions. Cassandra uses the consistency levels for
    handling regular (non-lightweight) transactions.

    Consistency shows how synchronized all copies of a row of data are. While regular
    repair operations can keep the variability of data among the replicas low, the
    constant flow of traffic through the database can potentially lead to some replicas
    being out of order with the others. That is, some replicas may be inconsistent
    or stale.

    While Cassandra does satisfy the acid, isolation, and durability properties, it’s
    the way it satisfies the consistency property that sets it apart from a typical
    RDBMS.

    Of the three tenets of the CAP theorem (consistency, availability, and partition
    tolerance), Cassandra provides the availability and partition tolerance features,
    and you can also configure the database so it provides the consistency and partition
    tolerance capabilities.

    For both reads and writes, Cassandra offers tunable consistency, which is an extension
    of the principle of eventual consistency. You can configure the consistency for
    specific read and write operations so the data is consistent and satisfies the
    application requirements. This adjustability allows Cassandra to be either a consistency
    and partition tolerant system or a highly available and partition tolerant system.
    That is, it allows you to configure Cassandra to satisfy any two of the three
    CAP requirements.

    By adjusting consistency, you’re indirectly adjusting performance, since there’s
    an indirect relationship between consistency and latency; the higher the consistency
    you configure, the lower the latency, and vice versa.


    > Note

    >

    > Consistency levels determine the tradeoff between the availability of data (no
    latency) and the accuracy of data.


    Cassandra offers both read and write consistency levels that you can configure
    to suit your requirements, as I explain in the following sections.


    ### Write Consistency


    You can configure a write consistency level to specify how many replicas must
    acknowledge a write request before the database considers the write a success.
    Once the number of replicas you specify report a successful write, the coordinator
    node that sends out the write requests informs the application that the write
    is completed.

    How does a write operation handle a downed or unavailable node? This is where
    Cassandra utilizes its hinted handoff feature to make sure that it writes the
    missing data to an unavailable node once it comes back up. The database stores
    the missed writes as hints on the coordinator node (in the `system.hints` table)
    and writes the missed data to the nodes later on when they become responsive again.

    You can check the default consistency level by issuing the `CONSISTENCY` command:

    ```

    cqlsh> consistency;

    Current consistency level is ONE.

    cqlsh>

    ```

    Client code can override the default consistency level by specifying the required
    consistency level in an individual statement:

    ```

    statement = ...

    statement.setConsistencyLevel(ConsistencyLevel.LOCAL_ONE);

    ```

    You can configure various write consistency levels. In the following sections,
    I describe the write consistency levels from the strongest (`ALL`) to the weakest
    (`ANY`).


    #### ALL (Strong Consistency)


    The `ALL` consistency level provides the highest level of consistency, but the
    tradeoff is that it also offers the lowest availability compared to the other
    consistency levels. Under the `ALL` consistency level, for a write to a partition
    to be successful, the database must perform the write to the commit log and the
    memtable on all the replica nodes in the cluster. This means that the number of
    nodes that must reply should be the same as the replication factor you configure.
    The database marks the write operation a failure if even one of the replicas doesn’t
    respond.


    #### Quorum-Related Levels (Strong Consistency)


    Cassandra offers several levels that are quorum-based, all of which offer a strong
    level of consistency. The following are the different quorum-based consistency
    levels:

    -   `EACH_QUORUM`: Provides strong consistency by requiring a write to be written
    to the commit log and the memtable on a quorum of the replica nodes in each of
    a cluster’s datacenters. You specify the `EACH_QUORUM` level of consistency in
    a multiple datacenter cluster when you want to ensure there’s strict consistency
    at the same level in all datacenters. Setting this consistency level means that
    a read will fail if a datacenter is down, making it impossible to reach the quorum
    in that data center.

    -   `QUORUM`: Provides strong consistency. Under this consistency level, Cassandra
    deems a write successful if it’s written to both the commit log and the memtable
    on a quorum of nodes. Unlike in the `EACH_QUORUM` consistency level, the nodes
    can range across multiple datacenters in the cluster. You can specify this consistency
    level either in a single or a multiple datacenter cluster. This level helps you
    maintain strong consistency by considering the entire cluster as a unit instead
    of a datacenter.

    -   `LOCAL_QUORUM`: Provides strong consistency. This consistency level requires
    the database to complete the write to both the commit log/memtable on a quorum
    of local nodes, that is, nodes that belong to the same datacenter as the coordinator.
    You can use `LOCAL_QUORUM` consistency only in a multiple datacenter cluster with
    a replica placement strategy such as `NetworkTopologyStrategy` and an appropriately
    configured snitch.


    > Note

    >

    > When you perform a write operation with the `QUORUM` consistency level, you’ll
    always get the correct data, even when one of the replicas dies.


    #### One, Two, Three, and LOCAL_ONE Consistency Levels (Weak Consistency)


    The `ONE` consistency level isn’t strict. It requires that the database perform
    a write to the commit log and memtable of at least one replica node. The `TWO`
    and `THREE` consistency levels are similar but stricter since they require the
    write to be made to two and three replica nodes, respectively.

    When you have multiple datacenters in your cluster, a consistency level of `ONE`
    is fine and is desirable as well. However, when a datacenter is offline, connections
    are made automatically to other online nodes in other datacenters.

    The lowest level of consistency to achieve high performance and durability is
    consistency level `ONE`. Even if the single node goes down, since it already wrote
    the data to the commit log, it can replay the commit log when it comes back up
    again.

    The `LOCAL_ONE` consistency level prevents cross-datacenter traffic by requiring
    a write to be acknowledged by at least one node in the local datacenter.

    Note the following:

    -   If your consistency level is `ONE` and a replica crashes soon after a write,
    the data is lost.

    -   If your consistency level is `ONE` and the write operation times out, a subsequent
    read operation can return either the old or the new value. You just won’t know
    if the data is correct.

    -   If your consistency level is `ONE`, a down node will be showing you stale
    data when it’s revived, until the node gets the correct data or the database completes
    a read repair operation.'
