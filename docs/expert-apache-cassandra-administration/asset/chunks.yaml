    \    ```\n    $ git clone https://github.com/coshx/docker-bdd\n    $ git reset\
    \ --hard e9f807c\n    ```\n\n2.  移动到你从 GitHub 克隆的目录，该目录名为 `docker-bdd`。这个目录包含了所有生成用于运行\
    \ Cassandra 的 Docker 容器所需的配置文件。\n    ```\n    # cd docker-bdd\n    # ls\n    circle.yml\
    \  docker-compose.yml  example   Gemfile       README.md\n    deploy.sh   dockerfiles\
    \         features  Gemfile.lock\n    #\n    ```\n\n3.  进入 `features` 目录。\n  \
    \  ```\n    # cd features\n    # ls\n    android_app.feature  app.feature  db.feature\
    \  step_definitions    support  web.feature\n    ```\n\n4.  创建一个名为 `cassandra.feature`\
    \ 的文件，并添加上一节描述的与 Cassandra 相关的功能（feature）和场景（scenario）。保存文件。`cassandra.feature`\
    \ 文件的内容应如下所示：\n    ```\n    # cat cassandnra.feature\n    Feature: Cassandra Cluster\n\
    \    As a Big Data Administrator\n    I want to deploy a cassandra cluster\n \
    \   So I can store and query lots of data\n    Scenario: Launch a CQL Shell\n\
    \    Given the services are running\n    And I run \"cqlsh cassandra -e 'show\
    \ version'\" on \"cassandra-dev\"\n    Then I should see \"CQL spec\"\n    And\
    \ I should see \"Cassandra 3.7\"\n    ```\n\n5.  将工作目录切换到 `docker-bdd` 目录，并编辑\
    \ `docker-compose.yml` 文件，使其包含以下内容（`docker-compose.yml` 文件包含了 Docker 应该下载和安装的镜像名称）。\n\
    \    ```\n    cassandra:\n    image: cassandra\n    cassandra-dev:\n    image:\
    \ cassandra\n    links:\n    - cassandra\n    ```\n\n这段代码创建了两个独立的 Docker 容器，都使用相同的\
    \ Docker 镜像（“cassandra”）。你需要两个容器：一个在后台运行 Cassandra 实例，另一个用于运行 `cqlsh`。记住，你的场景中包含了以下内容：\n\
    \n```\n在 \"cassandra\" 上运行 \"cqlsh -e 'show version'\"\n```\n\n### 运行 BDD 测试\n\
    \n现在你已准备好使用 Cucumber 运行 BDD 测试。操作方法如下：\n\n```\n# cucumber features/cassandra.feature\n\
    Feature: Cassandra Cluster\nAs a Big Data Administrator\nI want to deploy a cassandra\
    \ cluster\nSo I can store and query lots of data\ncassandra uses an image, skipping\n\
    cassandra-dev uses an image, skipping\nPulling cassandra (cassandra:latest)...\n\
    latest: Pulling from library/cassandra\nockerbdd_cassandra_1 is up-to-date\ndockerbdd_cassandra-dev_1\
    \ is up-to-date\nScenario: Launch a CQL Shell                                \
    \       # features/cassandra.feature:6\nGiven the services are running       \
    \                            # features/step_definitions/docker_compose_steps.rb:3\n\
    Running: docker-compose build && (docker-compose up -d || true)\nProcess exited\
    \ successfully\n[cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol\
    \ v4]\nAnd I run \"cqlsh cassandra -e 'show version'\" on \"cassandra-dev\" #\
    \ features/step_definitions/docker_compose_steps.rb:14\nRunning: docker-compose\
    \ run cassandra-dev bash -i -c \"sleep 1; cqlsh cassandra -e 'show version'\"\n\
    Process exited successfully\nThen I should see \"CQL spec\"                  \
    \                   # features/cassandra.feature:9\nAnd I should see \"Cassandra\
    \ 3.7\"                                 # features/cassandra.feature:10\n1 scenario\
    \ (1 undefined)\n4 steps (2 undefined, 2 passed)\n0m8.169s\n#\n```\n\nDocker-Compose\
    \ 为你创建了单节点的 Cassandra 集群，而 BDD 则在此集群上运行你指定的测试。\n\n当你首次运行此处展示的 `cucumber` 命令时，基于你指定的场景（`\"\
    Given the services are running\"`），Docker-Compose 会构建你在 `docker-compose.yml` 文件中指定的所有\
    \ Docker 镜像。在后续的运行中，`docker-compose` 会识别出 `cassandra` 和 `cassandra-dev` 实例都使用了可用的镜像，因此不再构建镜像，而是直接启动这两个\
    \ Cassandra 实例。\n\n你可以使用 `docker ps` 命令来验证这两个 Docker 容器正在运行。\n\n```\n$ sudo docker\
    \ ps\nCONTAINER ID    IMAGE    COMMAND      CREATED  STATUS     PORTS      NAMES\n\
    b005b61706ca    cassandra   \"/docker-entrypoint.s\"   44 minutes ago   Up 40\
    \ minutes   7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra-dev_1\n\
    ed526bd724c7        cassandra           \"/docker-entrypoint.s\"   44 minutes\
    \ ago      Up 40 minutes       7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra_1\n\
    $\n```\n\n然后，你可以像这样通过 bash 进入一个容器（`dockerbdd_cassandra_dev1`）：\n\n```\n$ sudo\
    \ docker exec -it b005b61706ca bash\n/# hostname\nb005b61706ca\n/#\n```\n\n最后，你可以在新的\
    \ Docker 容器中使用 CQL shell，如下所示：\n\n```\n$ cqlsh\nConnected to Test Cluster at 127.0.0.1:9042.\n\
    [cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP\
    \ for help.\ncqlsh>\n```\n\n你可以从 Coshxlab 的 Ben Taitelbaum 撰写的一篇文章中获取更多关于 BDD\
    \ 驱动的 Cassandra 集群的详细信息，包括创建多节点 Cassandra 集群的细节，文章位于以下位置：\n\n[`www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/`](http://www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/)\n\
    \n## 使用 Cassandra 集群管理器快速启动集群\n\nCassandra 集群管理器 (CCM) 是一个脚本库，可帮助你在本地服务器上创建和运行\
    \ Cassandra 集群。CCM 不适用于生产环境或对集群进行压力测试；它是一种测试和学习如何运行 Cassandra 集群的方法。CCM 是 Docker\
    \ 和 Vagrant 之外另一种快速启动 Cassandra 集群的方式。\n\n你可以在以下情况下使用 CCM：\n\n*   当你想运行 Cassandra\
    \ 而不想费心安装它时\n*   用于测试故障场景\n*   当开发涉及多个版本而无需担心硬件时，因为你可以在本地节点上运行所有内容\n*   用于集成测试\n\
    *   用于测试升级\n\nCCM 的惊人之处在于它能让你多快地启动并运行一个新集群。你可以在不到一分钟的时间内启动一个多节点（本地）集群。\n"
- fmt: "### Installing CCM\n\nInstalling CCM is easy: just make sure you have Python\
    \ (at least the 2.7 version) and `ant` installed before you commence the installation\
    \ of CCM.\n\n1.  To install CCM, you need to get the goodies from GitHub by running\
    \ the following command:\n\n    ```\n    root@ubuntu2:/home/samalapati# git clone\
    \ https://github.com/pcmanus/ccm.git\n    Cloning into 'ccm'...\n    remote: Counting\
    \ objects: 4372, done.\n    remote: Compressing objects: 100% (15/15), done.\n\
    \    remote: Total 4372 (delta 8), reused 14 (delta 6), pack-reused 4351\n   \
    \ Receiving objects: 100% (4372/4372), 1.80 MiB | 0 bytes/s, done.\n    Resolving\
    \ deltas: 100% (3040/3040), done.\n    Checking connectivity... done.\n    root@ubuntu2:/home/samalapati#\
    \ ls\n    ```\n\n2.  Once you download the scripts and other files from GitHub,\
    \ run the CCM installation script.\n\n    ```\n    $ sudo ./setup.py install\n\
    \    ```\n\nThe installation files are under the `ccm` directory.\n\n```\n$ ls\n\
    ccm      Documents  examples.desktop  Pictures  Templates\nDesktop  Downloads\
    \  Music             Public    Videos\n$ cc ccm\n$ ls\nccm  ccmlib  license.txt\
    \  MANIFEST.in  misc  README.md  setup.py  ssl  tests\n$ sudo ./setup.py install\n\
    running install\nrunning build\nrunning build_py\ncreating build\n...\ncreating\
    \ build/scripts-2.7\n...\nrunning install_egg_info\n$\n```\n\nYou can check out\
    \ the various things you can do with CCM by typing `ccm`, `ccm -help`, or `ccm\
    \ <command> -h.` Of course, the first and most important thing you can do is to\
    \ create a cluster, so I turn to that task next.\n\n### Creating a Cassandra Cluster\
    \ with CCM\n\nAfter you install CCM as shown in the previous section, it’s time\
    \ to create a Cassandra cluster . Let’s create a three-node cluster with the Cassandra\
    \ 3.1 release. By default, CCM creates single-token nodes, so tell it to use vnodes.\n\
    \nCCM downloads all the source files it needs and compiles them for you.\n\n```\n\
    $ sudo ccm create -n 3 -v 3.1 testcluster --vnodes\n18:55:53,875 ccm INFO Downloading\
    \ http://archive.apache.org/dist/cassandra/3.1/apache-cassandra-3.1-bin.tar.gz\
    \ to /tmp/ccm-tlSojg.tar.gz (29.376MB)\n306318:55:59,731 ccm INFO Extracting /tmp/ccm-tlSojg.tar.gz\
    \ as version 3.1 ...\n30802666  [100.00%]Current cluster is now: testclusster\n\
    $\n```\n\nThe command `ccm list` shows all the Cassandra clusters on this node\
    \ that are managed by CCM.\n\n```\n$ sudo ccm list\n*testcluster\n$\n```\n\n####\
    \ Checking the Status of the Cluster\n\nYou can check the status of the new three-node\
    \ cluster thus (note that you can’t use the `nodetool` commands in a CCM environment!):\n\
    \n```\n$ sudo ccm status\nCluster: 'testcluster'\n\nnode1: DOWN (Not initialized)\n\
    node3: DOWN (Not initialized)\nnode2: DOWN (Not initialized)\n$\n```\n\nAll three\
    \ nodes in the new cluster are DOWN since you created the cluster but haven’t\
    \ started it up.\n\n#### Starting the Cluster\n\nYou execute the `ccm start` command\
    \ to start a CCM cluster. In this example, I start the cluster up and check its\
    \ status with the `ccm status` command.\n\n```\n$ sudo ccm start\n$ sudo ccm status\n\
    Cluster: 'testcluster'\n\nnode1: UP\nnode3: UP\nnode2: UP\n$\n```\n\nThe command\
    \ `ccm node1` `status` provides even more details about the status of the cluster.\n\
    \n```\n$ sudo node1 status\nDatacenter: datacenter1\n=======================\n\
    Status=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n--  Address    Load  \
    \     Tokens       Owns    Host ID              Rack\nUN  127.0.0.1  86.51 KB\
    \   256          ?       659b06e0-a4d9-49f5-b923-0bab9833daa3  rack1\nUN  127.0.0.2\
    \  86.47 KB   256          ?       4035e764-a152-40e6-ac9e-f9ddf1e603b4  rack1\n\
    UN  127.0.0.3  92.34 KB   256          ?       40182f69-a81f-4a23-90ae-e9e1f0929c5e\
    \  rack1\nNote: Non-system keyspaces don't have the same replication settings,\
    \ effective ownership information is meaningless\n$\n```\n\nYou can stop the cluster\
    \ nodes by running the command `ccm stop`.\n\n### Working with CCM\n\nIn this\
    \ section, I offer a glimpse into CCM by showing how to run a few important commands,\
    \ the first of which allows you access to the CQL shell.\n\n#### Using cqlsh with\
    \ CCM\n\nTo work with CQL, run the `ccm` command with the `cqlsh` option, making\
    \ sure you specify a node.\n\n```\n$ sudo  ccm node1 cqlsh\nConnected to testcluster2\
    \ at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native\
    \ protocol v4]\nUse HELP for help.\ncqlsh> cqlsh\n```\n\n#### Get SSTable Information\n\
    \nThe `ccm node1 getsstables` command shows all SSTables on this node.\n\n```\n\
    $ sudo ccm node1 getsstables\n/samalapati/.ccm/testcluster/node1/data0/system_schema/triggers-4df70b666b05325195a132b54005fd48/ma-1-big-Data.db\n\
    /samalapati/.ccm/testcluster/node1/data0/system_schema/types-5a8b1ca866023f77a0459273d308917a/ma-1-big-Data.db\n\
    ...\n$\n```\n\n### Running Apache Spark with Cassandra\n\nApache Spark is an immensely\
    \ popular, fast general engine for large-scale data processing. Spark runs on\
    \ Apache Hadoop, Apache Mesos, in the cloud, or standalone. Spark can access data\
    \ sources such as Hadoop’s HDFS, Hbase, AWS’s S3, and of course, Apache Cassandra.\n\
    \nIn this section, I show how to install Apache Spark and work with a Cassandra\
    \ database from a Spark cluster through DataStax’s Spark-Casandra connector.\n\
    \n### Installing the Prerequisites\n\nTo install Apache Spark, there are a couple\
    \ of prerequisites, which I review in this section. Make sure that you either\
    \ already have the following on the server where you’re going to run the Spark\
    \ cluster or install them if they’re missing.\n\n1.  Make sure you have at least\
    \ Java 1.8.x installed.\n\n    ```\n    # java -version\n    java version \"1.8.0_131\"\
    \n    Java(TM) SE Runtime Environment (build 1.8.0_131-b11)\n    Java HotSpot(TM)\
    \ 64-Bit Server VM (build 25.131-b11, mixed mode)\n    #\n    ```\n\n2.  You’ll\
    \ also need Scala.\n\n    ```\n    # scala -version\n    Scala code runner version\
    \ 2.11.7 -- Copyright 2002-2013, LAMP/EPFL\n    #\n    ```\n\n    You can install\
    \ Scala by doing the following:\n\n    ```\n    # wget www.scala-lang.org/files/archive/scala-2.11.8.deb\n\
    \    # sudo dpkg -i scala-2.11.8.deb\n    ```\n\n3.  Finally, you need SBT (Simple\
    \ Build Tool ) to compile the Scala programs .\n\n    ```\n    # echo \"deb https://dl.bintray.com/sbt/debian\
    \ /\" | sudo tee -a /etc/apt/sources.list.d/sbt.list\n    # sudo apt-key adv --keyserver\
    \ hkp://keyserver.ubuntu.com:80 --recv 2EE0EA64E40A89B84B2DF73499E82A75642AC823\n\
    \    # sudo apt-get update\n    # sudo apt-get install sbt\n    ```\n\n    Check\
    \ the version of SBT:\n\n    ```\n    # sbt sbt-version\n    ...\n    [info] 0.13.15\n\
    \    #\n    ```\n\nIt’s very important that you have the correct SBT version;\
    \ incompatible versions are the source of a lot of headaches when working with\
    \ Spark and Cassandra.\n\nNow you’re ready to install Apache Spark.\n\n### Installing\
    \ Apache Spark\n\nInstalling and getting going with Apache Spark for your purpose\
    \ here, which is to learn how to connect to a Cassandra cluster from a Spark cluster,\
    \ is very straightforward. Follow these steps to install Spark .\n\n1.  `$ wget`\
    \ [`http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz`](http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz)\n\
    2.  `$ tar zxf spark-2.0.2-bin-hadoop2.7.tgz`\n3.  `$ sudo mv spark-2.0.2-bin-hadoop2.7/usr/local/spark/`\n\
    4.  Once you’ve installed the Spark binaries, set a home directory for Spark.\n\
    \n    ```\n    export $SPARK_HOME= /usr/local/spark\n    ```\n\n5.  Export the\
    \ PATH variable.\n\n    ```\n    export PATH=\"/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:$SPARK_HOME/bin\"\
    \n    ```"
