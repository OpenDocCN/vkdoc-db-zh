- fmt: '# Part I

    Introduction, Installation, and Configuration


    # 1. `Apache Cassandra`: An Introduction


    `Apache Cassandra` is quite different from a typical relational database management
    system (`RDBMS`) such as `MySQL` or the `Oracle` database. This chapter sets the
    stage for the need for `NoSQL` databases in general, and for `Cassandra`.


    In addition, this chapter explains the distinctive features of a `Cassandra` database
    and introduces several key concepts and terms that are unique to `Cassandra`.


    You will learn about the key concepts that make `Cassandra` special. The chapter
    also introduces `Cassandra`’s data modeling and explains key `Cassandra` terminology.


    This book is about how to administer `Cassandra`, so I also explain the salient
    features of `Cassandra` administration, the tools that you’ll use to manage `Cassandra`
    clusters, and the essentials of `Cassandra` database administration.


    ## What Is `Cassandra`?


    `Apache Cassandra` is a distributed `NoSQL` database system based on `Amazon`’s
    `Dynamo` and `Google`’s `Bigtable`. `Cassandra` is a fast, distributed database
    that’s highly fault tolerant as well as scalable. It provides high availability
    and linear scalability, twin goals that traditional relational databases cannot
    satisfy when handling very large data sets.


    Cloud applications require highly scalable back-end databases that are capable
    of distributed, massive workloads across clusters of servers. These applications
    require very fast access to data to satisfy interactive usage of the data stores
    by various applications, as well as ad-hoc queries. `Cassandra` is expressly designed
    for high-volume, low-latency cloud applications.


    `Facebook` developed `Cassandra` for searching inboxes, and the project was open
    sourced in July 2008. The project was accepted into the `Apache Incubator` in
    March 2009, and it was made an `Apache` top-level project in February 2010. The
    name `Cassandra` derives from the ancient Greet prophet `Cassandra`.


    In the following sections, I briefly describe the key features of `Cassandra`,
    which are


    *   Open source nature

    *   Fault tolerance

    *   High performance

    *   Distributed database architecture

    *   High scalability

    *   Elastic nature

    *   Ability to handle multiple types of data


    ### Open Source Database


    `Cassandra` isn’t a commercial offering. It’s a purely open source product, which
    means you not only don’t pay for it, but you can also customize it for your needs.
    However, if you’re working with production `Cassandra` clusters, it’s important
    for you to be aware of `DataStax`, the “`Cassandra` company.” `DataStax` is a
    company run by the main creators of the `Cassandra` database. `DataStax` offers
    commercial products such as the `Cassandra DevCenter` and `Cassandra Enterprise`
    to make it easy for you to set up and run `Cassandra` clusters. `DataStax` also
    offers several free courses in `Cassandra` data modeling, development, and operations,
    and is the leading evangelist for `Cassandra` through its documentation, courses,
    and conferences.


    ### Fault Tolerance


    `Cassandra` automatically replicates data to multiple nodes. This is in stark
    contrast to traditional relational databases, which require you to set up complex
    replication architectures to propagate data to multiple nodes for fault tolerance.
    For each update, you can choose either synchronous or asynchronous replication.


    Since the database runs on a bunch of nodes that are similar, there’s no single
    point of failure in a `Cassandra` cluster. `Cassandra`-based applications will
    survive the loss of even an entire `Cassandra` datacenter (defined differently
    from the traditional data center of an organization), as you’ll learn later in
    this book.


    ### High Performance


    `Cassandra` is a high performing database, and benchmarks have shown that its
    performance outstrips that of other `NoSQL` databases. In a major comprehensive
    `NoSQL` benchmark performed in 2012, `Cassandra` achieved the highest throughput
    for the maximum number of nodes in multiple experiments.


    `Cassandra` provides a very high throughput, especially during writes. Predictable
    high performance means that you can meet strict business `SLA`s that require low
    latency.


    `Cassandra` continues to deliver high performance despite an increase in the workload,
    or the addition of a large number of nodes to a cluster, due to the linear scalability
    of the database.


    ### Distributed Configuration and High Resiliency


    `Cassandra` installations use multiple nodes and there’s no single point of failure.
    There is no master-slave relationship among the nodes; all nodes in a `Cassandra`
    cluster are identical.


    `Cassandra` automatically replicates data to multiple nodes. You can locate the
    nodes in multiple racks, or different availability zones if you’re using a cloud
    setup like `Amazon Web Services`. Spreading your data across multiple geographical
    regions will ensure that the data is always available.


    `Cassandra` uses the concept of a datacenter, which is a set of nodes. A datacenter
    can be logical or physical, so you could have datacenters spread across the world.
    This feature, along with the replication of data, provides a very high degree
    of availability, as `Cassandra` can survive the loss of not only one or more nodes,
    but also that of an entire data center.


    ### Flexibility


    `Cassandra` uses an extremely flexible data model. A table can have a varying
    number of columns among its rows. Users can also change the schema at runtime.
    `Cassandra`’s tunable consistency feature allows you to tune consistency at the
    read or write operation level. You can tune replication and read/write consistency
    guarantees based on whether your primary goal is reliability or speed.


    ### Use of Commodity Servers


    Unlike relational databases, most of which require highly robust and expensive
    hardware, `Cassandra` can run on commodity hardware. Commodity hardware is far
    cheaper than the high-grade servers that host databases such as `Oracle`. Although
    more prone to failures, the commodity servers work very well since `Cassandra`’s
    architecture doesn’t involve a single point of failure.


    ### Ease of Management


    `Cassandra` is easy to manage due to its simple architecture and the lack of too
    many moving parts. `Oracle` and other relational databases have many features,
    which leads to database bloat, which could contribute to the instability of the
    database.


    Administering a `Cassandra` database, especially through a framework such as `DataStax`,
    is simple compared to managing a complex database such as an `Oracle` database.
    Backing up and recovering the database, tuning `SQL` queries, and managing replication
    are all complex tasks in an `Oracle` database. `Cassandra`, by keeping things
    simple, makes it easy for you to get up to speed.


    A key thing to remember when you scale a `Cassandra` cluster by adding more nodes
    is that you don’t need to add more members to the team that manages `Cassandra`.
    The same team that manages a 20-node cluster can handle a 1,000-node cluster.
    Therefore, the cost of management goes down as you scale a `Cassandra` database.'
