    \n```\n$ sudo nodetool status\n```\n\nDatacenter: datacenter1\n\n```\n=======================\n\
    Status=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n--  Address     Load \
    \   Tokens       Owns    Host ID      Rack\nDN  192.168.177.128  114.06 MiB  256\
    \          ?       99c43633-c691-4dee-b7af-35bc6e74dd67  rack1\nUN  192.168.177.132\
    \  123.84 MiB  256          ?       b0ade950-937a-457c-95eb-d3032897eeb1  rack1\n\
    Note: Non-system keyspaces don't have the same replication settings, effective\
    \ ownership information is meaningless\n$\n```\n\n#### Node Is Down\n\nIf one\
    \ of the nodes is down, you will see the following:\n\n```\n$ sudo nodetool describecluster\n\
    Cluster Information:\nName: Test Cluster\nSnitch: org.apache.cassandra.locator.DynamicEndpointSnitch\n\
    Partitioner: org.apache.cassandra.dht.Murmur3Partitioner\nSchema versions:\n44ed2562-e330-3030-af87-89cde4aa8992:\
    \ [192.168.177.135]\nUNREACHABLE: [192.168.177.132]\n#\n```\n\nRun the `nodetool\
    \ status` command to check the status of the two nodes in your cluster :\n\n```\n\
    $ sudo nodetool status\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n\
    |/ State=Normal/Leaving/Joining/Moving\n--  Address     Load       Tokens    \
    \   Owns (effective)  Host ID      Rack\nUN  192.168.177.132  276 KiB    256 \
    \         52.2%             b0ade950-937a-457c-95eb-d3032897eeb1  rack1\nUN  192.168.177.135\
    \  296.85 KiB  256         47.8%             99c43633-c691-4dee-b7af-35bc6e74dd67\
    \  rack1\n#\n```\n\n## Running Cassandra on Amazon EC2\n\nMany organizations and\
    \ individuals run Cassandra clusters in the public cloud. You can run Cassandra\
    \ on Microsoft Azure, Google Cloud, and Amazon Web Services (AWS). In this section,\
    \ I walk you through the creation of a Cassandra cluster on AWS.\n\nWhen you install\
    \ Cassandra on Amazon EC2, you create the instances using an API for a supported\
    \ platform such as Ubuntu 16.04 LTS and ensure that you get the AMI (Amazon Machine\
    \ Image) from a trusted source. Once you download the AMI and get the server running,\
    \ the Cassandra installation process is similar to that in Chapter [2](#A436674_1_En_2_Chapter.html).\n\
    \n### Using Trusted AMIs\n\nAn AMI is a virtual appliance that you use to create\
    \ a virtual machine within the Amazon Elastic Compute Cloud (“EC2”). An AMI is\
    \ a machine template using which you can create new servers in an AWS cloud.\n\
    \nYou must use only AMIs from a trusted source, such as the following:\n\n*  \
    \ Ubuntu Amazon EC2 AMI locator\n*   Debian AmazonEC2image\n*   CentOS-6 images\
    \ on Amazon’s EC2 Cloud\n\nUsing untrusted sources for your AMIs will create a\
    \ security risk; they will also perform slower due to the way they configure the\
    \ EC2 installation.\n\n### Setting Up the AWS Instances for Cassandra\n\nBefore\
    \ you do anything on AWS, you must have an account. Therefore, if you don’t have\
    \ one, create one now.\n\nOnce you’ve got your AWS account squared away, follow\
    \ the steps shown in the next few sections to create the Cassandra cluster that\
    \ runs on AWS EC2 virtual machines, called EC2 instances.\n\n#### Starting the\
    \ EC2 Instance Creation\n\nIn the AWS dashboard, click the EC2 logo, under the\
    \ Compute section.\n\n#### Selecting the AWS Region\n\nSelect an appropriate region\
    \ for launching your instances. For example, if you’re in the US, you may want\
    \ to select the North Virginia region."
  trans: "### 节点 IP 地址变更\n\n在虚拟机上运行 Cassandra 时，节点的 IP 地址有时可能会发生变化。当这种情况发生时，集群中的其他节点自然无法连接到该节点，它会显示为宕机节点。\n\
    \n修复 IP 地址变更的方法很简单。你只需编辑该节点的 `cassandra.yaml` 文件，并将所有设置了节点 IP 地址的地方（例如 `listen_address`\
    \ 配置属性）从旧的 IP 地址更改为新的 IP 地址即可。\n\n### 模式版本不匹配\n\n有时在创建键空间或表时会遇到错误，例如下面这个，Cassandra\
    \ 因版本不匹配而报错：\n\n```\ncqlsh> create keyspace mykeyspace2\n... with replication\
    \ = {'class': 'NetworkTopologyStrategy', 'datacenter1' :2}\n... and durable_writes\
    \ = false;\nWarning: schema version mismatch detected, which might be caused by\
    \ DOWN nodes; if this is not the case, check the schema versions of your nodes\
    \ in system.local and system.peers.\nOperationTimedOut: errors={'192.168.177.135':\
    \ 'Request timed out while waiting for schema agreement. See Session.execute_async\
    \ and Cluster.max_schema_agreement_wait.'}, last_host=192.168.177.135\ncqlsh>\n\
    ```\n\n尽管出现此消息，Cassandra 仍会创建键空间或表。当发生模式不一致时，请遵循以下步骤：\n\n1.  运行 `nodetool describecluster`\
    \ 命令。\n\n    ```\n    $ sudo nodetool describecluster\n    Cluster Information:\n\
    \    Name: Test Cluster\n    Snitch: org.apache.cassandra.locator.DynamicEndpointSnitch\n\
    \    Partitioner: org.apache.cassandra.dht.Murmur3Partitioner\n    Schema versions:\n\
    \    UNREACHABLE:27a8739d-28ac-34b7-b738-1b84859866cf: [192.168.177.135]\n   \
    \ 282bdefc-9643-3fa5-b03a-4b9894cabb29: [192.168.177.132]\n    $\n    ```\n\n\
    2.  重启无法访问的节点。\n3.  再次运行 `nodetool describecluster` 命令，并确保所有节点具有相同的版本号。命令输出必须显示集群中所有节点共用一个模式版本。\n\
    \n注意\n\n如果你有多个不匹配的模式（三个或更多），你需要停止某个特定模式的节点，让其他节点稳定下来，然后逐一重启这些节点。这种情况在多数据中心集群中偶尔会发生。\n\
    \n### 具有不同设置的键空间\n\n如果节点的键空间设置不同，你会注意到以下情况：\n\n```\n$ sudo nodetool status\nDatacenter:\
    \ datacenter1\n=======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address     Load    Tokens       Owns    Host ID      Rack\nDN  192.168.177.128\
    \  114.06 MiB  256          ?       99c43633-c691-4dee-b7af-35bc6e74dd67  rack1\n\
    UN  192.168.177.132  123.84 MiB  256          ?       b0ade950-937a-457c-95eb-d3032897eeb1\
    \  rack1\nNote: Non-system keyspaces don't have the same replication settings,\
    \ effective ownership information is meaningless\n$\n```\n\n### 节点宕机\n\n如果其中一个节点宕机，你将看到如下输出：\n\
    \n```\n$ sudo nodetool describecluster\nCluster Information:\nName: Test Cluster\n\
    Snitch: org.apache.cassandra.locator.DynamicEndpointSnitch\nPartitioner: org.apache.cassandra.dht.Murmur3Partitioner\n\
    Schema versions:\n44ed2562-e330-3030-af87-89cde4aa8992: [192.168.177.135]\nUNREACHABLE:\
    \ [192.168.177.132]\n#\n```\n\n运行 `nodetool status` 命令来检查集群中两个节点的状态：\n\n```\n\
    $ sudo nodetool status\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n\
    |/ State=Normal/Leaving/Joining/Moving\n--  Address     Load       Tokens    \
    \   Owns (effective)  Host ID      Rack\nUN  192.168.177.132  276 KiB    256 \
    \         52.2%             b0ade950-937a-457c-95eb-d3032897eeb1  rack1\nUN  192.168.177.135\
    \  296.85 KiB  256         47.8%             99c43633-c691-4dee-b7af-35bc6e74dd67\
    \  rack1\n#\n```\n\n## 在 Amazon EC2 上运行 Cassandra\n\n许多组织和个人在公有云上运行 Cassandra\
    \ 集群。你可以在 Microsoft Azure、Google Cloud 和 Amazon Web Services (AWS) 上运行 Cassandra。在本节中，我将指导你在\
    \ AWS 上创建一个 Cassandra 集群。\n\n在 Amazon EC2 上安装 Cassandra 时，你需要使用受支持平台（如 Ubuntu\
    \ 16.04 LTS）的 API 来创建实例，并确保从可信来源获取 AMI（Amazon 系统映像）。一旦你下载了 AMI 并使服务器运行起来，Cassandra\
    \ 的安装过程就与第 2 章类似。\n\n### 使用可信的 AMI\n\nAMI 是一个虚拟设备，用于在 Amazon Elastic Compute Cloud（“EC2”）中创建虚拟机。AMI\
    \ 是一个机器模板，你可以使用它在 AWS 云中创建新服务器。\n\n你必须仅使用来自可信来源的 AMI，例如以下这些：\n\n*   `Ubuntu Amazon\
    \ EC2 AMI 定位器`\n*   `Debian Amazon EC2 映像`\n*   `Amazon EC2 云上的 CentOS-6 映像`\n\
    \n使用不可信来源的 AMI 会带来安全风险；由于它们配置 EC2 安装的方式，其性能也会较慢。\n\n### 为 Cassandra 设置 AWS 实例\n\
    \n在 AWS 上进行任何操作之前，你必须拥有一个账户。因此，如果你还没有账户，请现在创建一个。\n\n一旦你准备好了 AWS 账户，请按照后面几个部分中显示的步骤，在\
    \ AWS EC2 虚拟机（称为 EC2 实例）上创建运行 Cassandra 的集群。\n\n#### 启动 EC2 实例创建\n\n在 AWS 控制面板中，点击计算部分下的\
    \ EC2 徽标。\n\n#### 选择 AWS 区域\n\n为启动实例选择一个合适的区域。例如，如果你在美国，你可能希望选择北弗吉尼亚区域。"
- fmt: "#### Creating the EC2 Instances\n\nUnder the Create Instance section, you’ll\
    \ see a “Launch Instance” button. Click it to start the Launch Instance wizard.\n\
    \nThis is the crucial step where you create the EC2 virtual machines. You can\
    \ select an OS for the machines via different methods, such as downloading an\
    \ Amazon Machine Image (AMI). You can even provide your own “gold image” if you\
    \ have one. To keep things simple here, let’s run a cluster on Ubuntu servers,\
    \ so select the Quick Start menu.\n\nThe Quick Start menu has six steps that you\
    \ need to go through to create your EC2 instances.\n\n1.  Choose an Amazon Machine\
    \ Image (AMI): Select the Ubuntu server (Ubuntu 14.04 LTS).\n2.  Choose Instance\
    \ Type: Use local SSDs and not EBS storage. This is a test cluster, so choose\
    \ the `m3` size. The `m3` size is not from the free-tier, so it costs a little\
    \ bit. The free tier instances are too tiny for learning much about Cassandra.\
    \ Your instance type choice is `m3.large`, a machine with 2 cores, 7.5GB RAM,\
    \ and a 32GB SSD storage.\n3.  Configure Instance Details: This step is where\
    \ you specify the number of EC2 instances. Configure a three-node cluster, so\
    \ put down 3 as the value for the Number of instances property and leave the rest\
    \ of the properties (shutdown behavior, etc.) at the default settings.\n4.  Add\
    \ Storage: You don’t need any additional storage at this point so just move on\
    \ to the next step.\n5.  Tag Instance: Tagging instances with a key-value pair\
    \ helps you in sorting and finding instances easily, but you can skip this step\
    \ because you have just three EC2 nodes.\n6.  Configure Security Group: This step\
    \ lets you configure a security group, which is a set of firewall rules to control\
    \ traffic to the instances. In this step, do the following:\n    *   Select the\
    \ Create a new Security Group option.\n    *   Name the security group as `MySecurityGroup`\
    \ and add four inbound rules, as shown here:\n\n        ```\n        Type    \
    \         Protocol   Port Range     Source\n        SSH              TCP     \
    \   22             0.0.0.0/0 (allow from anywhere)\n        Custom TCP Rule  TCP\
    \        7000-7001      0.0.0.0/0\n        Custom TCP Rule  TCP        7199  \
    \         0.0.0.0/0\n        Custom TCP Rule  TCP        9042           0.0.0.0/0\n\
    \        Custom TCP Rule  TCP        9160           0.0.0.0/0\n        ```\n\n\
    \        These ports are the same ports described in the “Configuring Ports” section\
    \ earlier in this chapter.\n7.  In the last step of instance creation, Review\
    \ Instance Launch, review your instance selections and press the Launch button\
    \ so AWS can create the instances for you.\n8.  Once AWS starts the instances,\
    \ it asks you to select the key pair that you’ll be entering when logging into\
    \ the new instances:\n\n    ```\n    Select an existing key pair or create a new\
    \ key pair\n    ```\n\nThe key pair is a combination of a public key that AWS\
    \ stores and a private key file that you store. You use the key pair to securely\
    \ log into your instances. On the new Ubuntu servers, your private key file enables\
    \ you to securely SSH into your instances.\n\n**Tip**\n\nStore your private key\
    \ file (`.pem` file) securely, since losing it means that you need to terminate\
    \ all the instances and start again from the beginning.\n\nCreate a new key pair\
    \ by providing the key pair name `mykeypair` and click “Download key pair” to\
    \ download the private key file. At this point, all the EC2 instances are running,\
    \ and billing for all usage starts right now. It is a good idea to shut down your\
    \ instances when you’re done working with Cassandra so you don’t incur additional\
    \ charges when you aren’t utilizing your test cluster!\n\nYou can view the instances\
    \ now by clicking the Instances tab in the EC2 Dashboard. All three instances\
    \ will show the “running” status under the Instance State column. By selecting\
    \ any of the three instances, you can get the instance description, including\
    \ the public IP address for that instance. You can then launch a Putty session\
    \ using the IP address for the instance.\n\n### Installing Cassandra\n\nNow that\
    \ you have your AWS EC2 instances running, it’s time to install Cassandra. Follow\
    \ these steps to install, configure, and start Cassandra on the AWS EC2 instances.\n\
    \nYou learned in Chapter [2](#A436674_1_En_2_Chapter.html) that you can install\
    \ Cassandra as a service or install it from a binary tar ball. Since you have\
    \ already learned how to install from the tarball, it’s a good idea to learn how\
    \ to install Cassandra as a service. Here are the steps you must follow to install\
    \ Cassandra as a service.\n\n1.  You can get the Cassandra Debian package from\
    \ Apache itself or from DataStax. Use the DataStax repository here, by doing the\
    \ following:\n\n    ```\n    $ echo \"deb http://debian.datastax.com/community\
    \ stable main\"| sudo tee –a /etc/apt/sources.list.d/cassandra.sources.list\n\
    \    ```\n\n2.  Run the `apt-get update` command.\n\n    ```\n    $ sudo apt-get\
    \ update\n    ```\n\n3.  If you receive any errors about not having the public\
    \ key for the DataStax repository, you need to add the DataStax public repo key\
    \ as shown here, and rerun the `apt-get update` command.\n\n    ```\n    $ curl\
    \ –L http://debian.datastax.com/debian/repo_key | sudo apt-key add-\n    $ sudo\
    \ apt-get update\n    ```\n\n4.  Install the Cassandra binaries.\n\n    ```\n\
    \    $ sudo apt-get install cassandra\n    ```\n\n    Unlike in the binary tarball\
    \ installation method shown in Chapter [2](#A436674_1_En_2_Chapter.html) (for\
    \ a single instance), installing Cassandra as a service automatically starts the\
    \ Cassandra instance. If you now issue the command `sudo service cassandra status`,\
    \ it’ll show that cassandra is running on this node.\n5.  The next step is to\
    \ repeat the previous three steps on the rest of the EC2 instances. Once you do\
    \ this, you can run the `nodetool status` command to check the status of the Cassandra\
    \ instances.\n\n    ```\n    $ sudo nodetool status\n    Datacenter: datacenter1\n\
    \    =======================\n    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n\
    \    --  Address   Load   Tokens    Owns    Host ID     Rack\n    UN  192.168.177.132\
    \  123.84 MiB  256          ?b0ade950-937a-457c-95eb-d3032897eeb1  rack1\n   \
    \ Note: Non-system keyspaces don't have the same replication settings, effective\
    \ ownership information is meaningless\n    $\n    ```\n\nNone of the three Cassandra\
    \ nodes are communicating among themselves yet. Let’s enable the inter-node communications\
    \ next."
