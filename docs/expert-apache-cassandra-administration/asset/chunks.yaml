    \ cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/1499189424022/*\
    \ .\n    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#\
    \ ls\n    1499189424022  manifest.json                mc-1-big-Data.db       mc-1-big-Filter.db\
    \  mc-1-big-Statistics.db  mc-1-big-TOC.txt  snapshots\n    backups        mc-1-big-CompressionInfo.db\
    \  mc-1-big-Digest.crc32  mc-1-big-Index.db   mc-1-big-Summary.db     schema.cql\n\
    \    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#\n\
    \    ```\n\nRun the `nodetool refresh` command so Cassandra knows that the data\
    \ files are restored now.\n\n```\n    $ nodetool refresh cycling cyclist_name\n\
    \    $\n    ```\n\nThe Cassandra log file will show how many SSTables were refreshed,\
    \ thus offering a safe way to check the refresh process.  \n6.  Query the table\
    \ `cyclist_` `name` to verify that the restore was successful.\n\n```\n    cqlsh:cycling>\
    \ select * from cyclist_name;\n    id                                   | firstname\
    \ | lastname\n    --------------------------------------+-----------+-----------\n\
    \    fb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |   MATTHEWS\n    220844bf-4860-49d6-9a4b-6b5d3a79cbfb\
    \ |     Paolo |  TIRALONGO\n    6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven\
    \ | KRUIKSWIJK\n    (3 rows)\n    cqlsh:cycling>\n    ```\n\nNote\n\nYou can set\
    \ the `auto_snapshot` property to automatically back up (have a snapshot taken)\
    \ whenever you truncate or drop a table. By default, the `auto_snapshot` property\
    \ is enabled.\n\nHey, what happened? There were six rows originally in this table,\
    \ but after the restore, there are just three rows! Well, there are two nodes\
    \ in the cluster, and each node owns roughly half the data. The `nodetool snapshot`\
    \ command did create a separate snapshot directory in both nodes. The snapshot\
    \ on any one node won’t have all the data. If, for example, your replication factor\
    \ is 3 and you have four nodes in your cluster, each node will have approximately\
    \ 0.75 of each replica.\n\nIn this example, there are two nodes in the test cluster.\
    \ However, you performed a restore on only one node. You must therefore restore\
    \ the `.db` files on the second node, as you did earlier.\n\n```\n# cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/truncated-1499189595147-cyclist_name/*\
    \ .\n# ./nodetool refresh cycling cyclist_name\n```\n\nOnce you do this, query\
    \ the `cyclist_name` table again:\n\n```\ncqlsh:cycling> select * from cyclist_name;\n\
    id                                   | firstname | lastname\n--------------------------------------+-----------+-----------------\n\
    e7ae5cf3-d358-4d99-b900-85902fda9bb0 |      Alex |           FRAME\nfb372533-eb95-4bb4-8685-6ef61e994caa\
    \ |   Michael |        MATTHEWS\n5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne\
    \ |             VOS\n220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |      \
    \ TIRALONGO\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven |      KRUIKSWIJK\n\
    e7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna | VAN DER BREGGEN\n(6 rows)\n\
    cqlsh:cycling>\n```\n\nTip\n\nIf a table doesn’t exist before performing a restore,\
    \ create the table with the help of the `creatschema.cql` file in the `snapshot`\
    \ directory for the table."
  trans: '### 从快照恢复数据


    要从快照恢复表，请确保拥有该表的所有快照文件，包括你在创建初始快照后进行的任何增量备份。有两种方法可以使用快照进行恢复，我将在此说明。


    在两种恢复方法中，表模式都必须存在于数据库中；恢复过程不会自动重建模式。不过，如果需要，你可以运行快照目录中找到的 `createschema.sql` 脚本来创建模式。


    #### 从快照目录复制数据


    1.  **截断**你要恢复的表。大多数情况下，你需要移除现有数据，因为意外丢失的数据可能拥有比快照数据更旧的墓碑标记。在恰好丢失磁盘并在恢复前启动数据库的情况下，节点将拥有比快照更新的数据，因此你**不需要**截断表。在此示例中，键空间是
    `cycling`，表名是 `cyclist_name`。在截断表之前，转到 `cycling` 键空间的数据目录，你会看到表 `cyclist_name`
    的 `data` 文件夹包含所有正常的 `.db` 文件。


    ```

    $CASSANDRA_HOME/data/data/cycling# cd c*

    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    ls

    backups                      mc-1-big-Data.db       mc-1-big-Filter.db  mc-1-big-Statistics.db  mc-1-big-TOC.txt

    mc-1-big-CompressionInfo.db  mc-1-big-Digest.crc32  mc-1-big-Index.db   mc-1-big-Summary.db     snapshots

    $

    ```


    **注意：** SSTable 的 `snapshots` 目录默认是空的，直到你创建了快照。


    2.  接下来，你**截断**表 `cyclist_name`。


    ```

    cqlsh:cycling> truncate cyclist_name;

    cqlsh:cycling>

    ```


    **注意：** 在执行 `truncate` 命令之前，请确保所有节点都已启动。否则，你可能会看到如下错误：`TruncateError: Error during
    truncate: Cannot achieve consistency level ONE`。


    3.  你可以验证 `cyclist_name` 表中不再有任何数据。


    ```

    cqlsh:cycling> select * from cyclist_name;

    id | firstname | lastname

    ----+-----------+----------

    (0 rows)

    cqlsh:cycling>

    ```


    4.  现在检查 `cycling.cyclist_name` 表的 `data` 目录；当你截断表时，所有 `.db` 文件都从该目录消失了。只剩下表的空壳，但数据库已永久从磁盘上清除了其所有内容。你在截断
    `cyclist_name` 表之前拍摄了 `cycling` 键空间的快照。因此，你期望在相应的目录中找到 `cyclist_name` 表的快照，该目录通常是：


    ```

    data_directory/keyspace_name/table_name-UUID/snapshost/snapshot_name

    ```


    在我的情况下，是以下目录，并且在表 `cyclist_name` 的 `snapshot` 目录下有我需要的所有文件：


    ```

    data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/1499189424022#
    ls -altr

    total 52

    -rw-r--r-- 2 root root   16 Jul  4 10:30 mc-1-big-Filter.db

    -rw-r--r-- 2 root root   92 Jul  4 10:30 mc-1-big-TOC.txt

    -rw-r--r-- 2 root root   92 Jul  4 10:30 mc-1-big-Summary.db

    -rw-r--r-- 2 root root 4668 Jul  4 10:30 mc-1-big-Statistics.db

    -rw-r--r-- 2 root root   60 Jul  4 10:30 mc-1-big-Index.db

    -rw-r--r-- 2 root root   10 Jul  4 10:30 mc-1-big-Digest.crc32

    -rw-r--r-- 2 root root   155 Jul  4 10:30 mc-1-big-Data.db

    -rw-r--r-- 2 root root   43 Jul  4 10:30 mc-1-big-CompressionInfo.db

    -rw-r--r-- 1 root root   856 Jul  4 10:30 schema.cql

    -rw-r--r-- 1 root root   31 Jul  4 10:30 manifest.json

    drwxr-xr-x 3 root root 4096 Jul  4 10:30 ..

    drwxr-xr-x 2 root root 4096 Jul  4 10:30 .

    /data/data/cycling/cyc

    ```


    5.  将 `snapshot` 目录下的所有文件复制到表 `cyclist_name` 的 `data` 目录中。


    ```

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/1499189424022/*
    .

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    ls

    1499189424022  manifest.json                mc-1-big-Data.db       mc-1-big-Filter.db  mc-1-big-Statistics.db  mc-1-big-TOC.txt  snapshots

    backups        mc-1-big-CompressionInfo.db  mc-1-big-Digest.crc32  mc-1-big-Index.db   mc-1-big-Summary.db     schema.cql

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#

    ```


    运行 `nodetool refresh` 命令，以便 Cassandra 知道数据文件现已恢复。


    ```

    $ nodetool refresh cycling cyclist_name

    $

    ```


    Cassandra 的日志文件将显示刷新了多少个 SSTable，从而提供了一种检查刷新过程的安全方法。


    6.  查询表 `cyclist_name` 以验证恢复是否成功。


    ```

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+-----------

    fb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |   MATTHEWS

    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |  TIRALONGO

    6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven | KRUIKSWIJK

    (3 rows)

    cqlsh:cycling>

    ```


    **注意：** 你可以设置 `auto_snapshot` 属性，以便在每次截断或删除表时自动备份（创建快照）。默认情况下，`auto_snapshot`
    属性是启用的。


    嘿，发生了什么？这个表最初有六行，但恢复后，只剩下三行！嗯，集群中有两个节点，每个节点大致拥有一半的数据。`nodetool snapshot` 命令确实在两个节点上都创建了单独的快照目录。任何单个节点上的快照都不会包含所有数据。例如，如果你的复制因子是
    3，并且集群中有四个节点，那么每个节点将拥有大约每个副本的 0.75。


    在此示例中，测试集群有两个节点。但是，你只在一个节点上执行了恢复。因此，你必须像之前一样，在第二个节点上恢复 `.db` 文件。


    ```

    # cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/truncated-1499189595147-cyclist_name/*
    .

    # ./nodetool refresh cycling cyclist_name

    ```


    完成此操作后，再次查询 `cyclist_name` 表：


    ```

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+-----------------

    e7ae5cf3-d358-4d99-b900-85902fda9bb0 |      Alex |           FRAME

    fb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |        MATTHEWS

    5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS

    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |       TIRALONGO

    6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven |      KRUIKSWIJK

    e7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna | VAN DER BREGGEN

    (6 rows)

    cqlsh:cycling>

    ```


    **提示：** 如果在执行恢复之前表不存在，请借助表的快照目录中的 `creatschema.cql` 文件创建该表。'
- fmt: "# Cassandra Snapshot Recovery and Maintenance\n\nCassandra's repair mechanism\
    \ ensures that all nodes in a cluster have the most recent data. If you haven't\
    \ taken the snapshots for different nodes at the same time, you can read stale\
    \ data (if using the consistency level `ONE`).\n\nThis is the reason why you should\
    \ run the `nodetool repair` command after restoring from snapshots. The repair\
    \ makes sure that all replicas in the cluster have the latest data. The repair\
    \ could run for several hours, since it's a heavy resource user and requires both\
    \ RAM and CPU resources to do its job. As part of its work, the repair job generates\
    \ Merkel trees for the data and compares them with the Merkel trees from the other\
    \ nodes. It also streams missing and/or outdated data. While the repair is running,\
    \ you may sometimes read stale data if all the snapshots don't contain the same\
    \ data.\n\n## Using sstableloader to Restore Snapshots\n\nLet's say you have a\
    \ bunch of tables you want to restore from snapshots. You can use the `sstableloader`\
    \ utility to restore the snapshots.\n\n## The Node Restart Method Procedure\n\n\
    The node restart method of restoring data from snapshots involves shutting down\
    \ all the nodes and then starting them back up after you restore the snapshot\
    \ data. You can use this method for all nodes in a cluster at once or just for\
    \ a single node.\n\nThe following are the steps in restoring data from snapshots\
    \ that involves a restart of the nodes.\n\n1.  Shut down all the nodes of the\
    \ cluster.\n2.  Run the `nodetool drain` command to make sure you're not risking\
    \ a data loss.\n3.  Remove all files from the `commitlog` directory.\n\n    ```bash\n\
    \    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog# ls\n \
    \   CommitLog-6-1499187293466.log  CommitLog-6-1499187293467.log\n    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog#\
    \ rm *\n    ```\n\n    Remove all the `.db` files under each table's directory.\
    \ You must do this for all keyspaces you're restoring. Make sure you leave the\
    \ `snapshots` and `backups` directories alone! When you're done, there should\
    \ be no `.db` files in this directory.\n\n    ```bash\n    $ ls\n    backups \
    \ snapshots\n    $\n    ```\n\n4.  Copy all the files in the latest `snapshot`\
    \ directory into this directory:\n\n    ```bash\n    $ cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/snapshots/1499196752095/*\
    \ .\n    $\n    ```\n\n5.  At this point, Cassandra restores the table data across\
    \ the cluster. To be sure that the data is consistent, run the `nodetool repair`\
    \ command.\n\n    ```bash\n    $ sudo nodetool repair\n    [2017-07-04 13:19:20,492]\
    \ Replication factor is 1\\. No repair is needed for keyspace 'cycling'\n    [2017-07-04\
    \ 13:19:26,018] Repair completed successfully\n    [2017-07-04 13:19:26,064] Repair\
    \ command #1 finished in 5 seconds\n    ```\n\n## Commitlog Archiving and Point-in-Time\
    \ Recovery\n\nCassandra enables you to configure commit log archiving and point-in-time\
    \ recovery. Cassandra archives the commit log under the following conditions:\n\
    \n*   When a node starts up\n*   When the database writes the commit log to disk\n\
    *   Any specified point in time\n\nYou can configure the archiving of the commit\
    \ log through the `commitlog_archiving.properties` configuration file. You can\
    \ set several properties pertaining to the archiving and restoring of commit log\
    \ segments in this file, as I explain in the following sections.\n\n### Manually\
    \ Archiving the Commit Log\n\nYou can archive a commit log segment with the `archive_command`\
    \ command. Here's the syntax of the `archive_command` command:\n\n```\narchive_command=/bin/ln\
    \ %path /backup/%name\n```\n\nIn this command, the two key parameters are\n\n\
    *   `path`: Fully qualified path to the commit log segment you wish to archive\n\
    *   `name`: The name of the commit log\n\n### Restoring a Commit Log\n\nThe archives\
    \ you make of the commit log segments enable you to recover the database to a\
    \ point in time. You can restore an archived commit log with the command `restore_command`.\
    \ Here's the syntax of the command:\n\n```\nrestore_command=cp -f %from %to\n\
    ```\n\nIn this command, the key parameters are\n\n*   `From`: The path to the\
    \ archived commitlog segment\n*   `To`: Name of the commit log directory\n\n###\
    \ Setting the Restore Directory Location\n\nYou can configure the `restore_directories`\
    \ parameter to set the location of the directory where you want to store the archived\
    \ commit log. When you run the `restore_command` command, the database looks here\
    \ for the archived commitlog segments it needs to restore.\n\n### Setting the\
    \ Restore Timestamp\n\nYou can tell the database how far it should restore the\
    \ commit log segments, by specifying a timestamp with the `restore_point_in_time`\
    \ parameter. Here's an example:\n\n```\nrestore_point_in_time=2013:12:11 17:00:00\n\
    ```\n\nCassandra will restore the commit log segments that it created prior to\
    \ and up to the timestamp you specify.\n\n## Loading Bulk Data into Cassandra\n\
    \nThere are two basic tools for moving bulk data to and from a Cassandra cluster:\
    \ the CQL `COPY` command and the `sstableloader` tool.\n\n*   The `COPY` command\
    \ can read CSV data to a Cassandra table and write CSV data from Cassandra to\
    \ a file system. The `COPY` command works very similarly to the tools used by\
    \ relational databases for exporting and importing data.\n*   The `sstableloader`\
    \ utility helps you bulk load external data into a Cassandra cluster.\n\n### Using\
    \ the COPY Command to Import and Export Data\n\nThe `COPY` command enables you\
    \ to copy data to and from a Cassandra database. The source and target files are\
    \ CSV (comma-separated values) or delimited text files. In the following sections,\
    \ I review how you can use the `COPY` command to import and export data.\n\n###\
    \ Copying Data from a Cassandra Table\n\nUse the `COPY TO` command to copy data\
    \ from a Cassandra table into a CSV file. The following is the syntax of the `COPY\
    \ TO` command:\n\n```sql\nCOPY table_name [( column_list )]\nTO 'file_name'[,\
    \ 'file2_name', ...] | STDOUT\n[WITH option = 'value' [AND ...]]\n```\n\nThe `COPY\
    \ TO` command separates the fields in the CSV file with a delimiter that you can\
    \ specify. By default, this command exports all fields, and you can specify a\
    \ column list to export only part of a table's rows.\n\nHere's an example that\
    \ shows how to export data from the table `CYCLNG.CYCLIST_NAME`:\n\n```bash\n\
    cqlsh> COPY cycling.cyclist_name TO 'cyclist.csv' WITH HEADER = TRUE;\nUsing 1\
    \ child processes\nStarting copy of cycling.cyclist_name with columns [id, firstname,\
    \ lastname].\nProcessed: 6 rows; Rate:       8 rows/s; Avg. rate:       7 rows/s\n\
    6 rows exported to 1 files in 0.849 seconds.\ncqlsh>\n```\n\nCassandra places\
    \ the CSV file one directory above the directory from where you executed the `COPY\
    \ TO` command. If you open the CSV file, you can see that it has a comma-delimited\
    \ list of all the rows in the source table.\n\n```bash\ncat cyclist_lastname.csv\n\
    id,lastname\nfb372533-eb95-4bb4-8685-6ef61e994caa,MATTHEWS\n220844bf-4860-49d6-9a4b-6b5d3a79cbfb,TIRALONGO\n\
    e7cd5752-bc0d-4157-a80f-7523add8dbcd,VAN DER BREGGEN\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47,KRUIKSWIJK\n\
    e7ae5cf3-d358-4d99-b900-85902fda9bb0,FRAME\n5b6962dd-3f90-4c93-8f61-eabfa4a803e2,VOS\n\
    ```"
