    ```


    了解了 JMX 客户端的基础知识后，现在让我们转向如何管理 Cassandra 的日志记录功能。


    ### 日志记录


    Cassandra 有两个主要日志：`system.log` 和 `debug.log`。`system.log` 文件记录数据库中的所有活动，包括启动和关闭活动，以及所有与节点相关的任务活动。它还记录你对数据库模式所做的所有更改，例如对键空间和表的修改。


    Cassandra 中的日志记录使用 Java 简单日志门面（SLF4J）结合 logback 后端。你可以通过编程方式或手动配置日志记录。在本章中，我将重点介绍日志记录的手动配置，你可以通过以下方式之一进行。


    *   通过配置 `logback.xml` 文件。默认情况下，logback 会依次查找 `logback-test.xml` 和 `logback.xml`
    文件以获取日志记录配置详细信息。

    *   你可以通过运行 `nodetool setlogginglevel` 命令来配置日志级别。

    *   你还可以通过 JMX 客户端（例如 JConsole 工具）配置日志记录。


    以下各节说明了如何使用所有三种方法配置日志记录。但首先，让我解释如何设置 Cassandra 存储各种日志文件的日志记录位置。

    '
- fmt: '## Setting the Logging Locations


    The installation method for Cassandra determines the default logging location.
    You may have the default log location as `/var/log/cassandra` or as the `$CASSANDRA_HOME/logs`
    directory, depending on whether you used a package or tarball-based installation
    method. It’s in the subdirectory named `logs` that you’ll find the two important
    Cassandra log files: `system.log` and `debug.log`.


    You can change the default logging location by adding the following line to the
    `cassandra-env.sh` file:

    ```

    export CASSANDRA_LOG_DIR=/new/log/location

    ```


    Setting the `CASSANDRA_LOG_DIR` parameter in the `cassandra-env.sh` file will
    make Cassandra store all of its log files in this location. If you want to specify
    a different directory for the `system.log` and `debug.log` files, for example,
    you can do so by specifying the locations in the `logback.xml` file, through configuring
    the `${cassandra.logdir}` attribute for the two log files.


    > **Note**

    >

    > You can also configure logging through JMX with the `JConsole` tool.


    You can also modify the location of the log directory by editing the following
    entry in the `logback.xml` file and specifying a different filename:

    ```

    ${cassandra.logdir}/system.log

    ```


    ## Configuring Logging Through Logback


    Cassandra’s logging capabilities are supported by `SLF4J` with a `logback` backend.
    You can manually configure logging by configuring the `logback.xml` (or the `logback-test.xml`)
    file that’s automatically installed with Cassandra.


    Since `logback` is a critical part of Cassandra logging, I review the essentials
    of the `logback` framework in the following section.


    ## The Logback Logging Framework


    `Logback` is a successor to the well-known `log4j` logging framework. `Logback`
    was created by the same person who created `log4j` and it builds on the previous
    work on `log4j`, which has been highly successful as a logging framework. As the
    creator of `Logback` says: “If you like `log4j`, you’ll love `Logback`.”


    The `Logback` framework offers many benefits over `log4j`, such as


    *   An extensive battery of tests, leading to a highly dependable logging framework

    *   Automatic reloading of configuration files after you modify them

    *   Automatic compression of archived log files during rollover

    *   Automatic removal of old log archives

    *   Conditional processing of configuration files using if-then constructs, so
    a single configuration file can serve multiple environments

    *   The `SiftingAppender` is highly versatile, and you can use it to separate
    logging according to various runtime attributes, such as user sessions.


    In the following section, I briefly describe how the `Logback` logging framework
    works.


    ### Main Components of the Logback Framework: Logger, Appenders, and Layouts


    `Logback` uses three main components that work together to log messages according
    to message types and level, and control the formatting of the messages and where
    it reports the log messages. These three main classes are the following:


    *   `Logger`

    *   `Appender`

    *   `Layout`


    #### Logger


    The `Logger` class determines what `Logback` will log. It allows `Logback` to
    selectively enable or disable logging requests based on their logger. The root
    logger is at the top of the hierarchy and is part of every hierarchy. Loggers
    may be assigned levels such as `TRACE`, `DEBUG`, `ERROR`, etc. A logger will inherit
    its log level from its ancestor if you don’t assign it one. The root logger always
    has an assigned level, which is `DEBUG` by default. This ensures that all child
    loggers of the root logger will inherit a level.


    `Logback` orders its logging levels as follows:

    ```

    TRACE < DEBUG < INFO < WARN < ERROR

    ```


    If you set the log level of the root logger to `Level.OFF`, the highest log level,
    you’ll be completely turning off logging.


    #### Appender


    An `Appender` is responsible for writing a logging event to components, and it
    points to one or more output destinations where `Logback` allows logging requests
    to print. For example, a logging request can be printed to the console (`appender
    name=''CONSOLE''`), files (`<appender name="FILE" class="ch.qos.logback.core.FileAppender">`),
    and databases such as `MYSQL` and `Oracle`, as well as remote `Linux Syslog` daemons.


    You can configure more than one appender to a logger. Appenders inherit additively
    from the logger hierarchy, meaning that if you add a console appender to the root
    logger, then all logging requests will show up on the console.


    The special appender `RollingFileAppender` has the capability to roll over log
    files. This appender can, for example, log to file named `mylog.txt`, and after
    it satisfies some conditions that you set, change its logging target over to a
    different file.


    You can add filters to an appender to filter events by criteria such as the contents
    of the log message or the time of the day.


    #### Layout


    Whereas an appender helps you customize the output destination, the `Layout` class
    customizes the output format. You do this by associating a layout with an appender.


    A layout configures the formatting of the logging request, and the appender is
    responsible for sending the formatted output to the destinations you configure.'
  raw: '### Setting the Logging Locations


    The installation method for Cassandra determines the default logging location.
    You may have the default log location as `/var/log/cassandra` or as the `$CASSANDRA_HOME/logs`
    directory, depending on whether you used a package or tarball-based installation
    method. It’s in the subdirectory named `logs` that you’ll find the two important
    Cassandra log files: `system.log` and `debug.log`.


    You can change the default logging location by adding the following line to the
    `cassandra-env.sh` file:


    ```

    export CASSANDRA_LOG_DIR=/new/log/location

    ```


    Setting the `CASSANDRA_LOG_DIR` parameter in the `cassandra-env.sh` file will
    make Cassandra store all of its log files in this location. If you want to specify
    a different directory for the `system.log` and `debug.log` files, for example,
    you can do so by specifying the locations in the `logback.xml` file, through configuring
    the `${cassandra.logdir}` attribute for the two log files.


    Note


    You can also configure logging through JMX with the JConsole tool.


    You can also modify the location of the log directory by editing the following
    entry in the `logback.xml` file and specifying a different filename:


    ```

    ${cassandra.logdir}/system.log

    ```


    ### Configuring Logging Through Logback


    Cassandra’s logging capabilities are supported by SLF4J with a logback backend.
    You can manually configure logging by configuring the `logback.xml` (or the `logback-test.xml`)
    file that’s automatically installed with Cassandra.


    Since logback is a critical part of Cassandra logging, I review the essentials
    of the logback framework in the following section.


    ### The Logback Logging Framework


    Logback is a successor to the well-known log4j logging framework. Logback was
    created by the same person who created log4j and it builds on the previous work
    on log4j, which has been highly successful as a logging framework. As the creator
    of Logback says: “If you like log4j, you’ll love Logback.”


    The Logback framework offers many benefits over log4j, such as


    *   An extensive battery of tests, leading to a highly dependable logging framework

    *   Automatic reloading of configuration files after you modify them

    *   Automatic compression of archived log files during rollover

    *   Automatic removal of old log archives

    *   Conditional processing of configuration files using if-then constructs, so
    a single configuration file can serve multiple environments

    *   The SiftingAppender is highly versatile, and you can use it to separate logging
    according to various runtime attributes, such as user sessions.


    In the following section, I briefly describe how the Logback logging framework
    works .


    #### Main Components of the Logback Framework: Logger, Appenders, and Layouts


    Logback uses three main components that work together to log messages according
    to message types and level, and control the formatting of the messages and where
    it reports the log messages. These three main classes are the following:


    *   `Logger`

    *   `Appender`

    *   `Layout`


    ##### Logger


    The `logger` class determines what Logback will log. It allows Logback to selectively
    enable or disable logging requests based on their logger. The root logger is at
    the top of the hierarchy and is part of every hierarchy. Loggers may be assigned
    levels such as TRACE, DEBUG, ERROR, etc. A logger will inherit its log level from
    its ancestor if you don’t assign it one. The root logger always has an assigned
    level, which is DEBUG by default. This ensures that all child loggers of the root
    logger will inherit a level.


    Logback orders its logging levels as follows:


    ```

    TRACE < DEBUG < INFO <  WARN < ERROR

    ```


    If you set the log level of the root logger to `Level.OFF`, the highest log level,
    you’ll be completely turning off logging.


    ##### Appender


    An appender is responsible for writing a logging event to components, and it points
    to one or more output destinations where Logback allows logging requests to print.
    For example, a logging request can be printed to the console (appender name=‘CONSOLE”),
    files `(<appender name="FILE" class="ch.qos.logback.core.FileAppender">)`, and
    databases such as MYSQL and Oracle, as well as remote Linux Syslog daemons.


    You can configure more than one appender to a logger. Appenders inherit additively
    from the logger hierarchy, meaning that if you add a console appender to the root
    logger, then all logging requests will show up on the console.


    The special appender `RollingFile` `Appender` has the capability to roll over
    log files. This appender can, for example, log to file named `mylog.txt`, and
    after it satisfies some conditions that you set, change its logging target over
    to a different file.


    You can add filters to an appender to filter events by criteria such as the contents
    of the log message or the time of the day.


    ##### Layout


    Whereas an appender helps you customize the output destination, the `layout` class
    customizes the output format. You do this by associating a layout with an appender.


    A layout configures the formatting of the logging request, and the appender is
    responsible for sending the formatted output to the destinations you configure.'
  trans: '

    ## 设置日志位置


    Cassandra 的安装方式决定了默认的日志记录位置。根据你是使用软件包还是 tarball 安装方法，默认日志位置可能是 `/var/log/cassandra`
    或 `$CASSANDRA_HOME/logs` 目录。在名为 `logs` 的子目录中，你可以找到两个重要的 Cassandra 日志文件：`system.log`
    和 `debug.log`。


    你可以通过向 `cassandra-env.sh` 文件添加以下行来更改默认日志位置：

    ```

    export CASSANDRA_LOG_DIR=/new/log/location

    ```


    在 `cassandra-env.sh` 文件中设置 `CASSANDRA_LOG_DIR` 参数将使 Cassandra 将其所有日志文件存储在此位置。例如，如果你想为
    `system.log` 和 `debug.log` 文件指定不同的目录，可以通过在 `logback.xml` 文件中配置这两个日志文件的 `${cassandra.logdir}`
    属性来指定位置。


    > **注意**

    >

    > 你也可以通过 `JConsole` 工具使用 JMX 配置日志记录。


    你也可以通过编辑 `logback.xml` 文件中的以下条目并指定不同的文件名来修改日志目录的位置：

    ```

    ${cassandra.logdir}/system.log

    ```


    ## 通过 Logback 配置日志记录


    Cassandra 的日志记录功能由带有 `logback` 后端的 `SLF4J` 支持。你可以通过配置随 Cassandra 自动安装的 `logback.xml`（或
    `logback-test.xml`）文件来手动配置日志记录。


    由于 `logback` 是 Cassandra 日志记录的关键部分，我将在下一节回顾 `logback` 框架的要点。


    ## Logback 日志框架


    `Logback` 是著名的 `log4j` 日志框架的继承者。`Logback` 由创建 `log4j` 的同一人创建，它在 `log4j` 先前工作的基础上构建，而
    `log4j` 作为一个日志框架已取得了巨大成功。正如 `Logback` 的创建者所说：“如果你喜欢 `log4j`，你会爱上 `Logback`。”


    `Logback` 框架相比 `log4j` 提供了许多优势，例如：


    *   一套广泛的测试，造就了一个高度可靠的日志框架

    *   修改后自动重新加载配置文件

    *   在日志轮转期间自动压缩归档日志文件

    *   自动删除旧的日志归档文件

    *   使用 if-then 结构对配置文件进行条件处理，因此单个配置文件可以服务于多个环境

    *   `SiftingAppender` 非常通用，你可以使用它根据各种运行时属性（如用户会话）来分离日志记录。


    在下一节中，我将简要描述 `Logback` 日志框架的工作原理。


    ### Logback 框架的主要组件：Logger、Appenders 和 Layouts


    `Logback` 使用三个主要组件协同工作，根据消息类型和级别记录消息，并控制消息的格式以及报告日志消息的位置。这三个主要类如下：


    *   `Logger`

    *   `Appender`

    *   `Layout`


    #### Logger


    `Logger` 类决定 `Logback` 将记录什么。它允许 `Logback` 根据其记录器选择性地启用或禁用日志记录请求。根记录器位于层次结构的顶部，并且是每个层次结构的一部分。记录器可以被分配级别，如
    `TRACE`、`DEBUG`、`ERROR` 等。如果你没有为记录器分配级别，它将从其祖先继承日志级别。根记录器始终有一个分配的级别，默认为 `DEBUG`。这确保了根记录器的所有子记录器都将继承一个级别。


    `Logback` 对其日志级别的排序如下：

    ```

    TRACE < DEBUG < INFO < WARN < ERROR

    ```


    如果你将根记录器的日志级别设置为 `Level.OFF`（最高日志级别），你将完全关闭日志记录。


    #### Appender


    一个 `Appender` 负责将日志记录事件写入组件，它指向一个或多个输出目的地，`Logback` 允许日志记录请求在这些目的地打印。例如，日志记录请求可以打印到控制台（`appender
    name=''CONSOLE''`）、文件（`<appender name="FILE" class="ch.qos.logback.core.FileAppender">`）以及
    `MYSQL` 和 `Oracle` 等数据库，还有远程的 `Linux Syslog` 守护进程。


    你可以为一个记录器配置多个追加器。追加器从记录器层次结构中累加继承，这意味着如果你将控制台追加器添加到根记录器，那么所有日志记录请求都将显示在控制台上。


    特殊的追加器 `RollingFileAppender` 具有轮转日志文件的能力。例如，此追加器可以记录到名为 `mylog.txt` 的文件，并且在满足你设置的某些条件后，将其日志记录目标切换到不同的文件。


    你可以向追加器添加过滤器，以根据日志消息内容或一天中的时间等标准来过滤事件。


    #### Layout


    追加器帮助你自定义输出目的地，而 `Layout` 类则自定义输出格式。你通过将布局与追加器关联来实现这一点。


    布局配置日志记录请求的格式，而追加器负责将格式化的输出发送到你配置的目的地。

    '
- fmt: "# Cassandra 日志与性能调优\n\n## `logback.xml` 文件\n\n以下是一个展示各类 Appender 的 `logback.xml`\
    \ 示例文件：\n\n```\n<configuration>\n  <appender name=\"SYSTEMLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
    >\n    <file>${cassandra.logdir}/system.log</file>\n    <rollingPolicy class=\"\
    ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\">\n      <fileNamePattern>${cassandra.logdir}/system.log.%i.zip</fileNamePattern>\n\
    \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n\
    \      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n \
    \   </encoder>\n  </appender>\n\n  <appender name=\"DEBUGLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
    >\n    <file>${cassandra.logdir}/debug.log</file>\n    <rollingPolicy class=\"\
    ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\">\n      <fileNamePattern>${cassandra.logdir}/debug.log.%i.zip</fileNamePattern>\n\
    \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n\
    \      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n \
    \   </encoder>\n  </appender>\n\n  <appender name=\"STDOUT\" class=\"ch.qos.logback.core.ConsoleAppender\"\
    >\n    <encoder>\n      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n\
    \    </encoder>\n  </appender>\n\n  <root level=\"INFO\">\n    <appender-ref ref=\"\
    SYSTEMLOG\"/>\n    <appender-ref ref=\"DEBUGLOG\"/>\n    <appender-ref ref=\"\
    STDOUT\"/>\n  </root>\n</configuration>\n```\n\n**注意**\n可以使用 `.xml` 或 `.groovy`\
    \ 作为 Logback 配置文件的扩展名。在我们的示例中，使用的是 `.xml`。\n\n当需要深入研究 Cassandra 内部机制时，最佳做法之一是将日志记录级别修改为更“宽松”的级别，这意味着显示更多关于\
    \ Cassandra 正在执行（或未能执行）的操作的详细信息。\n\n默认的 `INFO` 级别不会生成太多操作细节，仅提供操作状态，如下所示：\n\n\
    ```\nWARN  [main] 2017-04-03 13:06:55,973 DatabaseDescriptor.java:493 - Small\
    \ cdc volume detected at ./../data/cdc_raw; setting cdc_total_space_in_mb to 2377\\\
    .  You can override this in cassandra.yaml\nINFO  [main] 2017-04-03 13:06:56,882\
    \ CassandraDaemon.java:472 - Hostname: ubuntu\nINFO  [main] 2017-04-03 13:06:56,887\
    \ CassandraDaemon.java:479 - JVM vendor/version: Java HotSpot(TM) 64-Bit Server\
    \ VM/1.8.0_121\nINFO  [main] 2017-04-03 13:06:56,897 CassandraDaemon.java:480\
    \ - Heap size: 476.000MiB/476.000MiB\nINFO  [main] 2017-04-03 13:06:56,911 CassandraDaemon.java:485\
    \ - Par Eden Space Heap memory: init = 83886080(81920K) used = 77260784(75449K)\
    \ committed = 83886080(81920K) max = 83886080(81920K)\n```\n\n通过修改 `logback.xml`\
    \ 文件，可以将默认日志记录级别更改为 `DEBUG`，如下所示：\n```\n<root level=\"DEBUG\">\n```\n\n修改 `logback.xml`\
    \ 文件后，无需重启 Cassandra，因为数据库每分钟会扫描一次 `logback.xml` 文件以查找更改，前提是您已在文件中添加了以下行：\n```\n\
    <configuration scan=\"true\">\n```\n\n**提示**\n在生产环境中，请确保将日志级别设置为 `WARN` 或 `ERROR`\
    \ 等较稀疏的级别，因为大量的日志输出会影响性能。\n\n## 自动加载配置文件\n\n配置 Logback 以扫描配置文件中的更改，并在您进行任何与日志记录相关的配置更改时自动重新配置自身。这是通过将\
    \ `<configuration>` 元素的 `scan` 属性设置为 `true` 来实现的：\n```\n<configuration scan=\"\
    true\">\n...\n</configuration>\n```\n\n## 配置 Appender\n\n使用 `<appender>` 元素配置\
    \ Appender。此元素有两个强制属性：`name` 和 `class`。`name` 属性为 Appender 命名，`class` 属性指向 Appender\
    \ 类的名称。\n\n`<appender>` 元素还可以包含 `<layout>`、`<encoder>` 和 `<filter>` 元素。\n\n##\
    \ 设置日志轮转\n\n默认情况下，当 `system.log` 文件达到 20MB 时，Cassandra 会轮转该文件。它还会将较早的归档日志文件压缩为\
    \ zip 格式，并将其命名为 `system.log.1.zip`、`system.log.2.zip` 等。\n\n可以在 Logback 中配置以下轮转策略：\n\
    \n*   日志文件的位置和名称\n*   归档文件的位置和名称\n*   触发轮转到新日志文件的最大日志文件大小\n*   日志级别\n\n默认日志级别是\
    \ `INFO`。您可以设置 `ALL`、`TRACE`、`DEBUG`、`WARN` 和 `ERROR` 作为日志级别。通过设置日志级别为 `OFF` 可以关闭所有日志记录。\n\
    \n## 使用 Nodetool 设置服务的日志级别\n\n除了编辑 `logback.xml` 文件，您还可以运行 `nodetool setlogginglevel`\
    \ 命令从命令行设置日志级别。\n\n### 设置日志级别\n\n使用 `nodetool setlogginglevel` 命令从命令行设置服务日志级别的语法如下：\n\
    \n```\n$ nodetool setlogginglevel <class_qualifier> <level>\n```\n\n在此命令中，\n\n\
    *   `class_qualifier` 是记录器类限定符，例如 `org.apache.cassandra.service.StorageProxy`。\n\
    *   `level` 是日志级别。\n\n可以为 `class_qualifier` 选项设置以下值：\n\n*   `org.apache.cassandra`\n\
    *   `org.apache.cassandra.db`\n*   `org.apache.cassandra.service.StorageProxy`\n\
    \n可以从 `ALL`、`TRACE`、`DEBUG`、`INFO`、`WARN` 和 `ERROR` 中选择日志级别。您可以将 `level` 属性设置为\
    \ `OFF` 以关闭所有日志记录。\n\n通过将日志级别设置为 `DEBUG`，您可以看到数据库正在执行的操作的更多详细信息。以下示例展示了如何将 `StorageProxy`\
    \ 服务设置为 `DEBUG` 级别：\n\n```\n$ nodetool setlogginglevel org.apache.cassandra.service.StorageProxy\
    \ DEBUG\n```\n\n### 检查当前日志级别\n\n可以使用 `nodetool getlogginglevels` 命令检查当前日志级别，如下所示：\n\
    \n```\n$ nodetool getlogginglevels\nLogger Name                              \
    \          Log Level\nROOT                                                   INFO\n\
    com.thinkaurelius.thrift                               ERROR\norg.apache.cassandra\
    \                                   DEBUG\norg.apache.cassandra.service.StorageProxy\
    \              INFO\n$\n```\n\n## 使用 Nagios 监控 Cassandra\n\n在生产环境中，使用强大的企业级监控工具来检查\
    \ Cassandra 集群是很好的做法。Nagios 是一个流行的开源监控系统，它提供了许多监控 Cassandra 集群的功能。\n\nNagios 使用\
    \ Nagios 远程插件执行器 (NRPE) 来监控运行 Cassandra 实例的远程主机。\n\n您需要在远程主机上安装和配置 NRPE 代理。NRPE\
    \ 需要 Nagios 插件，因此您需要将插件安装为代理来监控远程主机上的本地资源。\n\n在以下部分中，我将展示如何在 Ubuntu 服务器上安装 Nagios\
    \ 4。然后展示如何安装和配置 NRPE。我从使用 Nagios 所需的先决条件开始。\n\n### 安装 LAMP 堆栈并解决其他先决条件\n\nLAMP\
    \ 堆栈是一组开源软件，使服务器能够托管动态网站和 Web 应用程序。LAMP 首字母缩略词代表以下四个组件：\n\n*   Linux 操作系统\n* \
    \  Apache Web 服务器\n*   MySQL 数据库\n*   PHP\n\n在以下部分中，我解释了如何安装 LAMP。您可能已经拥有 Linux\
    \ 操作系统，因此需要安装 Apache Web 服务器、MySQL 数据库和 PHP。\n\n1.  安装并启动 Apache Web 服务器。\n\n\
    \    ```\n    $ sudo apt-get install apache2\n    $ sudo systemctl restart apache2\n\
    \    ```\n\n2.  安装 MySQL 数据库。\n\n    ```\n    $ sudo apt-get install mysql-server\n\
    \    ```\n\n    此时您可以运行 MySQL 安全脚本，以删除不安全的默认配置并锁定数据库访问。\n\n    ```\n    $ mysql-secure_installation\n\
    \    ```\n\n3.  安装 PHP。以下命令将安装 PHP 5：\n\n    ```\n    $ sudo apt-get install php\
    \ libapache2-mod-php php-mcrypt php-mysql\n    ```\n\n4.  默认情况下，当服务器请求一个目录时，Apache\
    \ 会首先查找名为 `index.html` 的文件。您需要让 Apache 首先查找 `index.php` 文件。为此，请编辑 `/etc/apache2/mods-enabled/dir.conf`\
    \ 文件，其内容如下：\n\n    ```\n    DirectoryIndex index.html index.cgi index.pl index.php\
    \ index.xhtml index.htm\n    ```\n\n    只需将 `index.php` 文件移动到该行开头，紧靠在 `DirectoryIndex`\
    \ 文件之前。关闭并保存文件。\n\n5.  重启 Apache 服务器，使您在步骤 4 中所做的更改生效。\n\n    ```\n    $ sudo\
    \ systemctl restart apache2\n    ```\n\n6.  检查 MySQL 和 PHP 是否正常运行。您可以通过运行以下命令来确认\
    \ Apache 服务器的状态：\n\n    ```\n    $ sudo systemctl status apache2\n    ```\n\n\
    7.  您可以通过运行一个名为 `info.php` 的基本 PHP 脚本（`/var/www/html/info.php`）来确认您已正确配置 PHP。\n\
    \n完成此操作后，在浏览器中访问以下地址：\n\n```\nhttp://<your-server-IP>/info.php\n```\n\n您应该会看到一个漂亮的网页，显示有关\
    \ PHP 安装的详细信息。就 LAMP 堆栈而言，您已经准备就绪。然而，在安装 Nagios 之前，您必须完成几个先决条件，我将在接下来解释。\n\n###\
    \ 创建 Nagios 用户和组\n\n您需要一个用户来运行 Nagios 服务器。创建一个名为 `nagios` 的用户，该用户属于一个名为 `nagcmd`\
    \ 的组。\n\n```\n$ sudo useradd nagios\n$ sudo groupadd nagcmd\n$ sudo usermod -a\
    \ -G nagcmd nagios\n```\n\n### 安装构建依赖项\n\n您正在从源代码安装 Nagios Core（免费版本），因此需要安装额外的二进制文件来完成构建。您还需要\
    \ `apache2-utils` 来设置 Nagios Web 界面。您可以安装所有必需的包：\n\n```\n$ sudo apt-get install\
    \ build-essential libgd2-xpm-dev openssl libssl-dev xinetd apache2-utils\n```\n\
    \n最后，完成所有先决条件后，您就可以安装 Nagios 本身了。\n\n### 安装 Nagios\n\n要安装 Nagios，您必须下载源代码、配置它并编译（构建）它。\n\
    \n#### 下载 Nagios\n\n下载最新稳定版本的 Nagios 源代码并提取存档，如下所示：\n\n```\n$ cd ~\n$ curl -L\
    \ -O https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.1.1.tar.gz\n\
    $ tar xvzf nagios-*.tar.gz\n$ cd nagios-*\n```\n\n#### 配置 Nagios\n\n在构建 Nagios\
    \ Core 之前，必须安装软件包。\n\n```\n$ ./configure --with-nagios-group=nagios --with-command-group=nagcmd\n\
    ```\n\n#### 编译和安装 Nagios\n\n编译 Nagios 并运行其他命令来安装 Nagios。\n\n```\n$ sudo make\n\
    $ sudo make install\n$ sudo make install-commandmode\n$ sudo make install-init\n\
    $ sudo make install-config\n$ sudo /usr/bin/install -c -m 644 sample-config/httpd.conf\
    \ /etc/apache2/sites-available/nagios.conf\n```\n\n最后，将 Web 服务器用户 `www-data` 添加到\
    \ `nagcmd` 组，以便您可以通过 Web 界面向 Nagios 发出外部命令。\n\n```\n$ sudo usermod -G nagcmd www-data\n\
    ```\n\n### 安装 Nagios 插件\n\n下一个重要步骤是安装 Nagios 插件。您遵循的步骤与上一节中 Nagios 服务器安装的步骤类似。我在此总结这些步骤。\n\
    \n```\n$ cd ~\n$ curl -L -O http://nagios-plugins.org/download/nagios-plugins-2.1.1.tar.gz\n\
    $ tar xvf nagios-plugins-*.tar.gz\n$ cd nagios-plugins-*\n$ ./configure --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-openssl\n$ make\n$ sudo make install\n```\n\
    \n您可以这样验证配置：\n\n```\n$ sudo /usr/local/nagios/bin/nagios -v /usr/local/nagios/etc/nagios.cfg\n\
    ...\nRunning pre-flight check on configuration data...\n...\n$\n```\n\n**注意**\n\
    您可以轻松地为 Nagios 创建自定义插件。唯一的要求是插件可以通过命令行提示符执行，并且它返回以下退出值之一：`OK`、`Warning`、`Critical`\
    \ 或 `Unknown` 状态。\n\n### 安装 NRPE\n\nNRPE 的下载、配置和构建遵循与 Nagios 和 Nagios 插件相同的步骤。步骤如下：\n\
    \n```\n$ cd ~\n$ curl -L -O http://downloads.sourceforge.net/project/nagios/nrpe-2.x/nrpe-2.15/nrpe-2.15.tar.gz\n\
    $ tar xvf nrpe-*.tar.gz\n$ cd nrpe-*\n$ ./configure --enable-command-args --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-ssl=/usr/bin/openssl --with-ssl-lib=/usr/lib/x86_64-linux-gnu\n\
    $ make all\n$ sudo make install\n$ sudo make install-xinetd\n$ sudo make install-daemon-config\n\
    ```\n\n在 xinetd 启动脚本 `/etc/xinetd.d/nrpe` 的末尾添加 Nagios 服务器的私有 IP 地址。\n\n```\n\
    only_from = 127.0.0.1 192.168.159.129\n```\n\n重启 `xinetd` 服务以启动 NRPE。\n\n```\n\
    $ sudo service xinetd restart\n```\n\n### 配置 Nagios 和 Apache\n\n尽管您之前已经安装并构建了\
    \ Nagios，但您仍然需要为 Nagios 服务器和 Apache Web 服务器进行一些配置。\n\n#### 配置 Nagios\n\n编辑 Nagios\
    \ 主配置文件（`/usr/local/nagios/etc/nagios.cfg`），如下所示：\n\n```\ncfg_dir=/usr/local/nagios/etc/servers\n\
    ```\n\n您的 Cassandra 集群中的每个主机都将有一个存储在此目录中的配置文件。您必须创建该目录。\n\n```\n$ sudo mkdir /usr/local/nagios/etc/servers\n\
    ```\n\n编辑联系人配置文件（`/usr/local/nagios/etc/objects/contacts.cfg`），并将 `email` 的值替换为您自己的电子邮件地址，这也是一个好主意。\n\
    \n您还需要在 Nagios 配置文件 `/usr/local/nagios/etc/objects/commands.cfg` 的末尾添加一个新命令。\n\
    \n```\ndefine command{\ncommand_name check_nrpe\ncommand_line $USER1$/check_nrpe\
    \ -H $HOSTADDRESS$ -c $ARG1$\n}\n```\n\n#### 配置 Apache\n\n接下来，您必须配置 Apache Web\
    \ 服务器，步骤如下。\n\n1.  启用 Apache 的 `rewrite` 和 `cgi` 模块，如下所示：\n\n    ```\n    $ sudo\
    \ a2enmod rewrite\n    $ sudo a2enmod cgi\n    ```\n\n2.  使用 `htpasswd` 实用程序创建一个名为\
    \ `nagiosadmin` 的管理员用户，这将帮助您访问 Nagios Web 界面。\n\n    ```\n    $ sudo htpasswd\
    \ -c /usr/local/nagios/etc/htpasswd.users nagiosadmin\n    New password:\n   \
    \ Re-type new password:\n    Adding password for user nagiosadmin\n    ```\n\n\
    3.  启动 Nagios 和 Apache 服务器。\n\n    ```\n    $ sudo service nagios start\n    $\
    \ sudo service apache2 restart\n    ```\n\n### 添加要监控的 Cassandra 集群主机\n\n要通过 Nagios\
    \ 启用对 Cassandra 主机的监控，您需要做三件事：\n\n*   在集群的主机（节点）上安装和配置 NRPE。\n*   将主机添加到 Nagios\
    \ 服务器配置中。\n*   添加您想要在主机上监控的服务。\n\n#### 在主机上安装和配置 NRPE\n\n在您希望监控的每台主机上，执行以下操作。\n\
    \n1.  更新 `apt-get`。\n\n    ```\n    $ sudo apt-get update\n    ```\n\n2.  安装 Nagios\
    \ 插件和 Nagios 远程插件执行器 (NRPE)。\n\n    ```\n    $ sudo apt-get install nagios-plugins\
    \ nagios-nrpe-server\n    ```\n\n3.  更新 NRPE 配置文件 (`/etc/nagios/nrpe.cfg`)，并将\
    \ Nagios 服务器的 IP 地址作为 `allowed_hosts` 属性的值添加。\n\n    ```\n    allowed_hosts=127.0.0.1,172.31.22.133\n\
    \    ```\n\n4.  重启 NRPE。\n\n    ```\n    $ sudo service nagios-nrpe-server restart\n\
    \    ```\n\n#### 将主机添加到 Nagios 服务器配置\n\n在 Nagios 服务器上为您想要监控的每个 Cassandra 主机创建一个单独的配置文件。例如，对于名为\
    \ `host1` 的服务器，您必须创建文件 `host1.cfg` (`/usr/local/nagios/etc/servers/host1.cfg`)。\n\
    \n在 `host1.cfg` 文件中，添加主机定义，如下所示：\n\n```\ndefine host {\nuse                  \
    \           linux-server\nhost_name                       host1\nalias       \
    \                    Nagios Agent 1\naddress                         192.168.159.130\n\
    max_check_attempts              5\ncheck_period                    24x7\nnotification_interval\
    \           30\nnotification_period             24x7\n}\n```\n\n#### 添加特定于 Cassandra\
    \ 的插件\n\n下一步是向您展示如何下载和测试特定于 Cassandra 的插件。此插件名为 `Check Cassandra Status and Heap\
    \ Memory`，它可以报告节点的状态（`UP`/`DOWN`）以及堆内存利用率（`WARNING`/`CRITICAL`）通知。\n\n按照以下步骤使用该插件。\n\
    \n1.  将工作目录更改为 `/usr/local/nagios/libexec` 目录。\n\n    ```\n    $ cd /usr/local/nagios/libexec\n\
    \    ```\n\n2.  下载插件 (`cassandra.pl`) 并更改其权限。\n\n    ```\n    $ wget \"https://exchange.nagios.org/components/com_mtree/attachment.php?link_id=3819&cf_id=24\"\
    \ -O cassandra.pl\n    $ chmod +x cassandra.pl\n    $ chown nagios:nagios cassandra.pl\n\
    \    ```\n\n3.  测试以确保插件正常工作。\n\n    ```\n    $ ./cassandra.pl\n    CASSANDRA OK\
    \ -  | heap_mem=5.59\n    $\n    ```\n\n    测试输出表明插件工作正常。如果您看到错误消息，请编辑 `cassandra.pl`\
    \ 文件并确保 `$nodetool_path` 变量指向 `nodetool` 二进制文件的正确位置。\n\n4.  配置 NREP，以便 Nagios\
    \ 可以执行该插件。编辑 Cassandra 服务器上的 `/usr/local/nagios/etc/nrpe.cfg` 文件，并在文件末尾添加以下行：\n\
    \n    ```\n    command[cassandra]=/usr/local/nagios/libexec/cassandra.pl $ARG1$\n\
    \    ```\n\n5.  在 Cassandra 服务器上重启 `xinetd` 服务。\n\n    ```\n    $ sudo service\
    \ xinetd restart\n    ```\n\n6.  打开与运行 Nagios 的服务器的会话，并执行以下命令：\n\n    ```\n  \
    \  $ sudo /usr/local/nagios/libexec/check_nrpe -H 192.168.159.130 -c cassandra\n\
    \    CASSANDRA OK -  | heap_mem=10.32\n    $\n    ```\n\n输出表明您已在 Cassandra 服务器上正确配置了\
    \ NRPE。然后，您可以将此配置添加到 Nagios 服务器。\n\n## 总结\n\n诸如 `nodetool tablestats` 和 `nodetool\
    \ tablehistograms` 之类的命令可帮助您了解有关 SSTable 的关键事实。其他 `nodetool` 命令（如 `nodetool status`\
    \ 和 `nodetool info`）有助于监控集群状态。\n\n我详细讨论了日志记录。日志记录不仅仅是数据库中活动的附带产物。日志记录是集群中正确和错误操作的宝贵信息来源。Cassandra\
    \ 允许您以多种方式配置日志记录，定制日志记录以满足您的需求是一个很好的策略，可帮助您有效地对数据库进行故障排除和监控。\n\nJConsole 设置简单，有助于调整数据库性能。我详细讨论了\
    \ Nagios，但它的功能远不止于此，因此我在这里只是浅尝辄止。我在示例中使用了 Nagios 的免费版本；付费版本提供更多的功能以及支持！无论是 Nagios\
    \ 还是其他工具，强大的图形化工具对于集群管理都是必不可少的。\n\n# 11. Cassandra 性能调优\n\nCassandra 有许多配置参数，在性能调优领域尤其如此，数据库管理员可以控制性能的多个方面。开箱即用，Cassandra\
    \ 许多与性能相关的配置属性都使用默认设置。作为管理员，您应该了解这些默认值并根据您的环境进行修改。\n\n本章重点介绍 Cassandra 性能的以下领域：\n\
    \n*   追踪查询以分析数据库性能\n*   缓存数据\n*   压实策略\n*   压缩\n*   调优布隆过滤器\n*   调优 JVM 和垃圾收集策略\n\
    *   使用 `cassandra-stress` 工具进行压力测试\n\n## 使用追踪分析性能\n\n在调整数据库性能时，您可以在数据库中开启追踪，以获取有关\
    \ Cassandra 内部操作的详细事务信息。追踪在跟踪 Cassandra 在查询处理各个阶段（例如查询的解析和执行）所花费的时间方面非常有价值。追踪提供与以下操作相关的详细计时信息：\n\
    \n*   准备 SQL 语句\n*   读修复相关活动\n*   Memtable 和 SSTable 数据查找\n*   键缓存搜索\n*   集群节点之间的交互\n\
    \n追踪数据对于评估查询有效性非常有用。例如，当您追踪涉及这些索引的查询时，不适当或多余的二级索引会在节点之间显示较高的活动。\n\n**注意**\n开启追踪将帮助追踪集群中两种广泛的活动：查询和修复操作。\n\
    \n默认情况下，Cassandra 禁用追踪。一旦启用追踪，Cassandra 会将事务详细信息捕获到 `system_traces` 键空间中。此键空间中的两个表保存追踪数据：\n\
    \n*   `system_traces.sessions`：存储事务的高级详细信息，例如事务长度和会话 ID。\n*   `system_traces.events`：存储有关数据库执行的所有操作的详细信息。\n\
    \n**注意**\nCassandra 只能存储有限时间段的追踪数据。因此，如果您希望将追踪数据保留更长时间，则必须配置以下属性：\n*   `tracetype_query_ttl`：为日志记录查询过程期间使用的不同追踪类型设置\
    \ TTL。默认值为 86,400 秒（1 天）。\n*   `tracetype_repair_ttl`：为日志记录修复过程期间使用的不同追踪类型设置 TTL。默认值为\
    \ 604,800 秒（大约一周）。\n\n`system_traces.events` 表捕获的数据库活动类型揭示了您发出查询时 Cassandra 执行的操作。\n\
    \n```\ncqlsh> select activity from system_traces.events;\nactivity\n-----------\n\
    Parsing select id from cycling.cyclist_name;\nPreparing statement\nComputing ranges\
    \ to query\nSubmitting range requests on 513 ranges with a concurrency of 112\
    \ (0.9 rows per range expected)\nExecuting seq scan across 0 sstables for (min(-9223372036854775808),\
    \ max(-9196210656004250337)]\nRead 0 live and 0 tombstone cells\nEnqueuing request\
    \ to /192.168.159.129\nSending RANGE_SLICE message to /192.168.159.129\nRANGE_SLICE\
    \ message received from /192.168.159.130\nEnueuing request to /192.168.159.129\n\
    Enqueuing response to /192.168.159.130\nSending RANGE_SLICE message to /192.168.159.129\n\
    Processing response from /192.168.159.129\nRANGE_SLICE message received from /192.168.159.130\n\
    Executing seq scan across 0 sstables for (max(-8175039996930460291), max(-8066091505323311933)]\n\
    Read 0 live and 0 tombstone cells\n...\ncqlsh>\n```\n\n### 管理追踪\n\n您可以这样检查追踪的状态：\n\
    \n```\ncqlsh> tracing\nTracing is currently disabled. Use TRACING ON to enable.\n\
    cqlsh>\n```\n\n在数据库中开启追踪很简单；只需运行 `tracing on` 命令。\n\n```\ncqlsh> tracing on;\n\
    Now Tracing is enabled\ncqlsh> tracing;\nTracing is currently enabled. Use TRACING\
    \ OFF to disable\ncqlsh>\n```\n\n要关闭所有追踪，请运行 `tracing off` 命令。\n\n```\ncqlsh>\
    \ tracing off;\nDisabled Tracing.\ncqlsh>\n```\n\n### 管理概率追踪\n\nCassandra 使用概率追踪策略，您可以配置数据库将追踪的语句百分比的概率。该概率是基于每个节点的。概率为\
    \ 1.0 意味着数据库将追踪所有 SQL 语句，设置为 0.5 意味着它可能追踪大约 50% 的请求。\n\n默认概率为 0.0，这意味着追踪被禁用。更高的概率设置涉及更多的写入，有时这会不利地影响集群性能，因此在设置追踪概率时必须谨慎。\n\
    \nCassandra 建议您从较小的概率设置（例如 0.001）开始，并根据数据库中的情况逐渐提高。即使像这样低的设置也可能对数据库性能产生显著影响，因此请注意性能下降。\n\
    \n`nodetool gettraceprobability` 命令显示当前的追踪概率。\n\n```\n$ nodetool gettraceprobability\n\
    Current trace probability: 0.0\n$\n```\n\n您可以通过运行 `nodetool settraceprobability`\
    \ 命令来设置追踪概率，以追踪读或写请求，如下所示：\n\n```\n$ nodetool settraceprobability 0.1\n$ nodetool\
    \ gettraceprobability\nCurrent trace probability: 0.1\n$\n```\n\n`system_traces.sessions`\
    \ 表显示了有关追踪的有价值信息。\n\n```\ncqlsh> select * from system_traces.sessions;\nsession_id\
    \      | client   | command | coordinator   | duration | parameters      | request\
    \       | started_at\n----------------+ ---------+---------+--------------+-----------+\
    \ ----------------d7103660-81e4-11e7-a4ad-89801d899afb | 127.0.0.1 |   QUERY |\
    \ 192.168.159.130 |   506051 |                                               \
    \              {'consistency_level': 'ONE', 'page_size': '100', 'query': 'select\
    \ * from cycling.cyclist_name;', 'serial_consistency_level': 'SERIAL'} | Execute\
    \ CQL3 query | 2017-08-15 18:09:11.878000+0000\n189ff700-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |     6848 | {'consistency_level': 'ONE',\
    \ 'page_size': '5000', 'query': 'SELECT * FROM system_traces.sessions WHERE session_id\
    \ = 185a6280-81e5-11e7-a4ad-89801d899afb', 'serial_consistency_level': 'SERIAL'}\
    \ | Execute CQL3 query | 2017-08-15 18:11:01.872000+0000\n185a6280-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |   177343 |              {'consistency_level':\
    \ 'ONE', 'page_size': '100', 'query': 'select * from cycling.cycle;', 'serial_consistency_level':\
    \ 'SERIAL'} | Execute CQL3 query | 2017-08-15 18:11:01.416000+0000\n...\n(11 rows)\n\
    cqlsh>\n```\n\n### 如何追踪写和读请求\n\n追踪是资源密集型的，并且会消耗大量存储空间。选择性地追踪是正确的策略，而不是为整个数据库启用追踪。在本节中，我将展示如何追踪特定的读和写请求。\n\
    \n#### 追踪写请求\n\n以下是一个简单示例，展示了如何获取写请求（插入语句）的追踪信息。您首先开启追踪，然后在 `cyclist_name` 表中插入一行（输出显示部分数据）。\n\
    \n```\ncqlsh> tracing on;\nNow Tracing is enabled\ncqlsh> insert into cycling.cyclist_name\
    \ ( id, lastname, firstname ) values (uuid(), 'FRAME', 'Nina' );\nTracing session:\
    \ bdfdf410-8116-11e7-81bd-63c57c069fd1\nactivity                             \
    \                               | timestamp                  | source        \
    \  | source_elapsed | client        Execute CQL3 query | 2017-08-14 10:33:53.489000\
    \ | 192.168.159.130 |              0 | 127.0.0.1\nDetermining replicas for mutation\
    \ [Native-Transport-Requests-1] | 2017-08-14 10:33:53.522000 | 192.168.159.130\
    \ |          32844 | 127.0.0.1\nMUTATION message received from /192.168.159.130\
    \ [MessagingService-Incoming-/192.168.159.130] | 2017-08-14 10:33:53.530000 |\
    \ 192.168.159.129 |            843 | 127.0.0.1\nSending MUTATION message to /192.168.159.129\
    \ [MessagingService-Outgoing-/192.168.159.129-Small] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.130 |          42754 | 127.0.0.1\nAppending to commitlog [MutationStage-1]\
    \ | 2017-08-14 10:33:53.532000 | 192.168.159.129 |           2668 | 127.0.0.1\n\
    Adding to cyclist_name memtable [MutationStage-1] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.129 |           3181 | 127.0.0.1\nProcessing response from /192.168.159.129\
    \ [RequestResponseStage-3] | 2017-08-14 10:33:53.545000 | 192.168.159.130 |  \
    \        56321 | 127.0.0.1\nRequest complete | 2017-08-14 10:33:53.546583 | 192.168.159.130\
    \ |          57583 | 127.0.0.1\n```\n\n追踪数据显示了以下信息：\n\n*   Cassandra 复制您插入的行的目标节点\n\
    *   Cassandra 如何将新数据附加到提交日志\n*   数据库如何将新数据添加到 memtable\n*   数据库如何确认（“Request complete”）插入数据的请求已成功完成\n\
    \n#### 追踪读请求\n\n追踪读请求产生的数据比追踪写请求多得多，因此在追踪这些请求时要小心。产生密集追踪数据的部分原因是 Cassandra 将行分布在多个\
    \ SSTable 中，因此它必须读取多个 SSTable 来检索数据。追踪显示了数据库为满足读请求而发出的所有请求。\n\n以下是一个简单 `select`\
    \ 语句的部分输出：\n\n```\ncqlsh> select * from cycling.cyclist_name;\nid            \
    \                       | firstname | lastname\n--------------------------------------+-----------+-----------------\n\
    69f1cb04-687d-4be7-a91f-72ef037c5514 |     Sammy |           FRAME\ne7ae5cf3-d358-4d99-b900-85902fda9bb0\
