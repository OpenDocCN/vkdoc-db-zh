- fmt: '# 8. Backup, Recovery, and Moving Data


    ### Working with Cassandra from Spark


    Before you can run commands to access a Cassandra database , you must first import
    the Spark connector namespace, as shown here:


    ```scala

    scala> import com.datastax.spark.connector._

    import com.datastax.spark.connector._

    scala>

    ```


    Let’s work with the `cyclist_name` table from the cyclist keyspace. The first
    thing to do is to create a Spark RDD for this table’s data.


    ```scala

    scala> val rdd1 = sc.cassandraTable("cycling", "cyclist_name")

    rdd: com.datastax.spark.connector.rdd.CassandraTableScanRDD[com.datastax.spark.connector.CassandraRow]
    = CassandraTableScanRDD[2] at RDD at CassandraRDD.scala:18

    scala>

    ```


    In the command, `sc` stands for Spark Context. Spark automatically creates a Spark
    Context named `sc` when you invoke `spark-shell`. Spark Context is the main entry
    point for all of Spark’s functionality, and you must use it in the way I showed
    you here.


    Spark Context enables you to connect to a spark cluster, and you can use it create
    Spark RDDs and dataframes, datasets, etc. in a Spark cluster. In a way, Spark
    Context is the Spark cluster’s coordinator (the driver program). The `SparkContext`
    object coordinates the independent sets of processes in a cluster that constitute
    a Spark application. Spark Context connects to the cluster manager, which could
    be Mesos, YARN, or a standalone cluster manager (as mentioned earlier, I’m using
    the Spark standalone cluster).


    Next, let’s test the Spark-cluster-to-Cassandra-database connection by running
    the following code, which uses the function `first` to get the first row in the
    table `CYCLIST_NAME`:


    ```scala

    scala> println(rdd.first)

    CassandraRow{id: e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname:
    FRAME}

    scala>

    ```


    The following command uses the `foreach` construct to print all rows in the table
    `CYCLIST_NAME`:


    ```scala

    scala> rdd.foreach(println)

    CassandraRow{id: e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname:
    FRAME}

    CassandraRow{id: 5b6962dd-3f90-4c93-8f61-eabfa4a803e2, firstname: Marianne, lastname:
    VOS}

    CassandraRow{id: e7cd5752-bc0d-4157-a80f-7523add8dbcd, firstname: Anna, lastname:
    VAN DER BREGGEN}

    scala>

    ```


    Now that you’ve successfully tested that you can retrieve data from a Cassandra
    table, let’s insert some data into a Cassandra table from Spark. You first create
    an RDD named `collection`.


    ```scala

    scala> val collection = sc.parallelize(Seq(("cat", 30), ("fox", 40)))

    collection: org.apache.spark.rdd.RDD[(String, Int)] = ParallelCollectionRDD[4]
    at parallelize at :27

    scala>

    ```


    Following this, you execute Spark’s `saveToCassandra` function to insert two new
    rows into the table `kv` in the keyspace `test`.


    ```scala

    scala> collection.saveToCassandra("test", "kv", SomeColumns("key", "value"))

    scala>

    ```


    You confirm that the two rows have been inserted into the table `test.kv` by querying
    that table.


    ```cql

    cqlsh> select * from test.kv;

    key    | value

    --------+-------

    cat |    30

    fox |    40

    ...

    cqlsh>

    ```


    Voila! Thanks to the spark-cassandra-connector, you can now work with Cassandra
    table data from within a Spark cluster.


    You can do a lot with the Cassandra Spark integration. You can combine the computing
    power of Spark with the storage processing capabilities of Cassandra to do cool
    things. However, all that is the domain of a different book, so we move on.


    ## Cassandra and the SMACK Stack: A Growing Trend


    While big data projects initially started off with a heavy orientation towards
    batch processing, current trends are towards agile systems that process streaming
    data to support analytic systems. Organizations are increasingly focusing on real-time
    or near real-time use cases such as recommendation engines and fraud detection.


    SMACK (a system that uses the open source technologies Apache Spark, Apache Mesos,
    Akka, Apache Cassandra, and Apache Kafka), or variations of such open source technologies,
    are increasingly becoming crucial players in the analysis and mining of streaming
    data. Technologies such as SMACK are becoming the platform for constructing applications
    that make use of “live”, streaming data so an organization can effectively extract
    meaningful information from streaming data sets.


    This book is dedicated to an exposition of the concepts and techniques for a Cassandra
    administrator, and as such, I can’t go into the details of all the components
    of the SMACK stack . However, I’d like to introduce you to this crucial set of
    technologies since you’ll likely to make its acquaintance eventually if you’re
    working with Cassandra.


    Here’s what the five components of a SMACK stack do:


    *   Apache Spark (the processing component): Spark is a processing engine for
    distributed, large-scale data sets and is especially suitable for machine learning
    algorithms. You use the same interface for SQL queries, machine learning, and
    stream data processing.

    *   Apache Mesos (the container component): Mesos is a cluster resource management
    system that offers resource isolation and sharing to distributed applications.
    Mesos uses a twin-level scheduling mechanism wherein it offers resources to frameworks,
    which are applications that run on top of Mesos. While Mesos determines the resources
    that each framework gets, the frameworks determine the resources they accept and
    which applications they execute on the resources allocated to them.

    *   Akka (provides the model): Akka is a toolkit and runtime for building highly
    concurrent and resilient message-driven applications. An “actor” is a universal
    primitive of concurrent computation that responds to messages it receives. In
    response to messages, actors can make local decisions, create other actors, send
    more messages, and so on.

    *   Apache Cassandra: By now, you should know what Cassandra is and what it’s
    good for!

    *   Apache Kafka (the broker): Kafka is a popular high-volume, low-latency messaging
    system for handling real-time data feeds. Kafka partitions the data streams and
    spreads them over a cluster, which also allows for multiple coordinated “consumers”
    to consume the data, which is generated by “producers.”


    ## Summary


    This chapter is about showing some interesting ways in which you can set up either
    test or production environments using different techniques. Docker containers
    are popular and you can run production Cassandra clusters on Docker. When running
    a production cluster on Docker, you need to deal with storage and networking strategies,
    which I haven’t discussed here. Docker’s documentation is quite good, and you
    may want to use it to learn more about these and other Docker container topics.


    Apache Spark is becoming increasingly popular as a fast processing framework,
    and I showed how to connect to a Cassandra database from Spark and perform DML
    operations. Of course, this is only a beginning, and if you wish to delve deeper
    into Apache Spark, the source documentation is pretty good.


    CCM is a cool tool because it helps you spin up clusters in just a few short minutes,
    without having to learn anything about Cassandra installation procedures and without
    spending time setting up any prerequisites for running a simple test cluster for
    exploratory purposes.


    # 8. Backup, Recovery, and Moving Data


    Backing up and restoring data are key functions of a Cassandra administrator.
    This chapter shows you how to back up your data by taking periodic snapshots of
    data. Cassandra also enables you to take incremental backups and back up the commit
    log segments. All these backups come in handy when you need to perform a full
    restore of the database.


    Bulk loading and copying of data is also a common task, and I explain how to load
    data with the `COPY` command, as well as with the sstableloader utility.'
