    >>> posts = spark.read.format(\"org.apache.spark.sql.cassandra\").options(table=\"\
    posts\", keyspace=\"posts_db\").load()\n```"
  trans: "## 配置 Spark 集群\n\n你可以通过 YARN 集群管理器 (Hadoop)、Apache Mesos 或 Spark 独立集群来运行\
    \ Spark 集群。让我们尝试最后一种方案，这样你可以同时运行 Spark 和 Cassandra 集群。\n\nSpark 由一个主节点和多个工作节点组成。为了简单起见，让我们将主服务和工作服务运行在同一个节点上，但也可以轻松配置将工作节点运行在不同的节点上。\n\
    \n主要的配置文件是 `spark-env` 文件，位于 `/etc/spark/conf` 目录中。在此文件中，你可以指定 Spark 独立部署模式下使用的守护进程选项。也就是说，你为主节点和工作节点指定选项。\n\
    \n你可以将 `SPARK_WORKER_CORES` 和 `SPARK_WORKER_MEMORY` 等所有配置属性保留为其默认值。只需确保为你指定 Spark\
    \ 主实例将运行的节点的详细信息。\n\n```bash\nexport SPARK_MASTER_HOST=192.168.159.129\n```\n\n\
    这样，主节点将运行在 IP 为 192.168.159.129 的服务器上。你必须将此属性添加到集群中每个节点的 `/etc/spark/conf/spark-env`\
    \ 文件中。由于你将主实例和工作实例运行在同一节点上，所以这没问题。\n\n在生产集群中，你可以将 Spark 配置为服务运行，但这里我只关注演示如何从 Spark\
    \ 连接到 Cassandra，因此我们不会费心创建 Spark 服务。相反，让我们手动启动和停止 Spark 集群。\n\n## 启动 Spark 集群\n\
    \n由于 Spark 集群只有一个工作实例与主实例运行在同一节点上，你需要执行以下步骤来启动 Spark 集群。\n\n1.  移动到 Spark 的 `sbin`\
    \ 目录，该目录包含集群的启动/停止脚本。\n\n    ```bash\n    # cd /usr/local/spark/spark-2.0.2-bin-hadoop2.7/sbin\n\
    \    ```\n\n2.  启动 Spark 主实例。\n\n    ```bash\n    # ./start-master.sh\n    starting\
    \ org.apache.spark.deploy.master.Master, logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.master.Master-1-ubuntu.out\n\
    \    #\n    ```\n\n3.  启动单个工作实例。\n\n    ```bash\n    # ./start-slave.sh spark://ubuntu:7077\n\
