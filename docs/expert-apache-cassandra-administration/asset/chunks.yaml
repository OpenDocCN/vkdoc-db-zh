    \ De Dauphine';\n```\n\n#### Deleting Old Data by Using a TIMESTAMP\n\nYou can\
    \ specify columns for deletion using a timestamp to identify the column.\n\n```\n\
    cqlsh> DELETE  firstname, lastname\nFROM cycling.cyclist_name\nUSING TIMESTAMP\
    \ 1318452291034\nWHERE lastname = 'ALAPATI';\n```"
  trans: "### 查看表的配置选项\n\n如前所述，您在创建表时可以指定许多选项。您也可以通过修改表来调整若干选项。如何知道表在任意时刻具有哪些选项？运行\
    \ `describe table` 命令以查看表的所有属性。\n\n在以下示例中，您创建表 `cyclist_name`，然后运行命令 `describe\
    \ cyclist_name` 来查看表的属性：\n\n```cqlsh> use cycling;\ncqlsh:cycling> CREATE TABLE\
    \ cyclist_name ( id UUID, lastname text, firstname text, PRIMARY KEY (id) );\n\
    cqlsh:cycling> describe cyclist_name;\nCREATE TABLE cycling.cyclist_name (\nid\
    \ uuid PRIMARY KEY,\nfirstname text,\nlastname text\n) WITH bloom_filter_fp_chance\
    \ = 0.01\nAND caching = {'keys': 'ALL', 'rows_per_partition': 'NONE'}\nAND comment\
    \ = ''\nAND compaction = {'class': 'org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy',\
    \ 'max_threshold': '32', 'min_threshold': '4'}\nAND compression = {'chunk_length_in_kb':\
    \ '64', 'class': 'org.apache.cassandra.io.compress.LZ4Compressor'}\nAND crc_check_chance\
    \ = 1.0\nAND dclocal_read_repair_chance = 0.1\nAND default_time_to_live = 0\n\
    AND gc_grace_seconds = 864000\nAND max_index_interval = 2048\nAND memtable_flush_period_in_ms\
    \ = 0\nAND min_index_interval = 128\nAND read_repair_chance = 0.0\nAND speculative_retry\
    \ = '99PERCENTILE';\ncqlsh:cycling>\n```\n\n在这个表的众多属性中，您只设置了少数几个。然而，列表很长，因为对于所有您未指定的表选项，数据集使用了默认值。\n\
    \n### 删除和截断表\n\n与任何关系型数据库一样，您可以删除和截断 Cassandra 表。\n\n#### 删除表\n\n您可以使用 `DROP TABLE`\
    \ 语句来删除表。\n\n```cqlsh> DROP TABLE cycling.cyclist_name;\ncqlsh> DROP TABLE cycling.cyclist_name\
    \ IF EXISTS;\n```\n\n在删除表之前，必须首先删除任何基于该表创建的物化视图。\n\n#### 截断表\n\n使用 `TRUNCATE`\
    \ 语句截断表会保留表结构，但会删除表中的所有数据，包括任何基于该表的物化视图中的数据。\n\n```cqlsh> TRUNCATE TABLE customers;\n\
    cqlsh> TRUNCATE customers;\n```\n\n这两种命令的工作方式相同。关键字 `TABLE` 是可选的，因为表是您可以截断的唯一对象。\n\
    \n在截断表之前，您需要执行以下操作：\n\n1.  使用 `CONSISTENCY` 命令将一致性级别设置为 `ALL`。\n\n    ```cqlsh>\
    \ CONSISTENCY ALL;\n    Consistency level set to ALL.\n    cqlsh>\n    ```\n\n\
    2.  运行 `nodetool status` 命令以确保所有节点均已启动并可用。\n\n    ```cqlsh> nodetool status\n\
    \    Datacenter: datacenter1\n    =======================\n    Status=Up/Down\n\
    \    |/ State=Normal/Leaving/Joining/Moving\n    --  Address    Load       Tokens\
    \    Owns (effective)  Host ID          Rack\n    UN  127.0.0.1  159.91 KiB  256\
    \      100.0%           c51011d6-06da-47b8-bd55-70ac2e51716d  rack1\n    $\n \
    \   ```\n\n### 从表中删除行和列\n\n您可以使用 `DELETE` 语句从表中删除行。\n\n```cqlsh:mydb> DELETE FROM\
    \ cyclists where pk = 'salapati';\n```\n\n您可以通过以下方式发出 `DELETE` 语句来从表中删除行：\n\n\
    ```cqlsh:mydb> DELETE session-token FROM users where pk = 'salapati';\n```\n\n\
    此语句将仅从 `pk` 值为 `'salapati'` 的一行中删除 `session_token` 列。`WHERE` 子句指定了要从表中删除的行。\n\n\
    #### 删除多行\n\n您可以通过指定关键字 `IN` 并在括号中提供逗号分隔的值列表来删除多行。\n\n```cqlsh> DELETE FROM cycling.cyclist_name\
    \ WHERE firstname IN ('Sam', 'James');\n```\n\n如果您希望从表中删除整列，可以通过省略 `WHERE` 子句来实现。\n\
    \n```cqlsh:mydb> DELETE session_token FROM users;\n```\n\n#### 从集合（Set）、列表（List）或映射（Map）中删除\n\
    \n要从作为单个列存储的映射中删除元素，您需要指定列名以及方括号中的元素键。\n\n```cqlsh> DELETE sponsorship ['sponser_name']\
    \ FROM cycling.races WHERE race_name = 'Criterium du Dauphine';\n```\n\n要从列表中删除数据，请指定列名以及列表索引位置。\n\
    \n```cqlsh> DELETE categories[3] FROM cycling.cycling.history WHERE lastname ='TIRALONGO';\n\
    ```\n\n要从集合中删除所有元素，只需指定列名。\n\n```cqlsh> DELETE sponsorship FROM cycling.races\
    \ WHERE race_name = 'Criterium De Dauphine';\n```\n\n#### 使用时间戳（TIMESTAMP）删除旧数据\n\
    \n您可以使用时间戳来指定要删除的列。\n\n```cqlsh> DELETE firstname, lastname\nFROM cycling.cyclist_name\n\
    USING TIMESTAMP 1318452291034\nWHERE lastname = 'ALAPATI';\n```"
- fmt: '## Removing the Deleted Data from the Database


    Cassandra doesn’t immediately remove the rows and columns from the table once
    you issue your `DELETE` statements. Rather, it removes the values completely during
    the first compaction following your delete operation. This is to improve performance.


    ### How Cassandra Uses Tombstones to Mark Deleted Data


    Cassandra marks the data you delete with a tombstone and removes it completely
    after a grace period. Cassandra treats all deletes as either an insert or an upsert
    (update or insert, depending on the case).


    When you delete data, Cassandra adds a deletion marker to the partition that’s
    part of the `DELETE` command. This deletion marker is called a tombstone, and
    the database writes these markers to an SSTable on one or more nodes. Each tombstone
    has an expiration period, after which the database deletes the tombstone as part
    of its routine SSTable compaction process.


    ### Specifying a Time-to-Live Value


    Alternatively, you can specify a `TTL` value for a record (row or a column) or
    a table to set an optional expiration period for data in a column (other than
    `counter` data). Doing so will make Cassandra delete the data in the column or
    the table after a certain period has elapsed. At the end of the time-to-live period,
    the database marks the record with a tombstone and takes care of it as explained
    earlier, during a compaction process.


    Expiring data by setting a `TTL` doesn’t come free of cost. It involves an additional
    overhead of 8 bytes in memory and on disk to record the `TTL` and expiration time.


    Note


    Specifying a `TTL` is a way of implicitly deleting data. You can do this by either
    setting the `TTL` on columns in a table or by specifying the `default_time_to_live`
    property for a table.


    You can specify the expiration time (`TTL`) with an `INSERT` or an `UPDATE` statement.
    The following example shows how to specify the `password` column in the `users`
    table to expire after 1 day (86,400 seconds) by adding the `USING TTL` option
    to the `INSERT` command):


    ```cql

    cqlsh:mydb> INSERT INTO users

    (user_name, password)

    VALUES (''cbrown'', ''ch@ngem4a'') USING ttl 86400;

    ```


    Following this, you can increase the period to 2 days by running the following
    `UPDATE` statement:


    ```cql

    cqlsh:mydb> UPDATE users USING TTL 172800 SET password = ''ch@ngem4a''

    WHERE user_name = ''cbrown'';

    ```


    You can set a default `TTL` on an entire table with the `default_time_to_live`
    property, which is one of the CQL table properties you can specify when creating
    a table. The default value of this property is 0, meaning that data you write
    to a table will never expire. You set the value in number of seconds. Once you
    set it, Cassandra applies a `TTL` value to each column in a table. Cassandra will
    then tombstone the entire table once the table’s `TTL` is exceeded.


    Note


    By setting the `default_time_to_live` table property to zero, you are in effect
    removing any column `TTL`s that you’ve specified in that table.


    You can apply the default `TTL` to a table when creating a table with the `CREATE
    TABLE` statement or when modifying it later with an `ALTER TABLE` statement.


    Once the number of seconds since the creation of a column crosses the `TTL` value
    you’ve configured, Cassandra considers the data as expired, although it reports
    it in the query results. Cassandra marks the expired data with a tombstone, which
    is a deletion marker, on the next read but retains the data for a maximum of `gc_grace_seconds`.


    Once the time specified by the `gc_grace_seconds` property passes, Cassandra automatically
    removes the data that it has marked with a tombstone during its regular compaction
    processes.


    ## How Garbage Collection Works


    You set the `gc_grace_seconds` property when creating a table. This property specifies
    the number of seconds after Cassandra marks data with a tombstone before the data
    becomes eligible for garbage collection.


    The default value for the `gc_grace_seconds` property is long (864,000 seconds,
    which is 10 days), so you can leave this property alone when creating your tables.
    The reason the default value is so long is to enable Cassandra to have plenty
    of time to maximize consistency of data before permanently getting rid of it.


    Although the default value of the `gc_grace_seconds` property is 10 days, you
    can reduce it for tables whose data your users won’t be explicitly deleting, such
    as tables that contain just data with their `TTL` configured, or a table for which
    you’ve configured the `default_time_to_live` property.


    Tip


    You can configure each table with a different grace period for a tombstone.


    Before you lower the value of the `gc_grace_seconds` property from its default
    setting of 10 days, remember the following:


    *   Cassandra doesn’t replay hints, which are instructions to replay missed write
    operations, that are older than the `gc_grace_seconds` setting. This means that
    reducing the `gc_grace_seconds` property value may result in a recently revived
    node missing some writes.

    *   Cassandra also performs batch operations, which involve sequentially replaying
    changes in the database. Cassandra will wait to replay a batched change until
    `gc_grace_seconds` elapse after the batched change was created. If you decrease
    the value of the `gc_grace_seconds` property, you run the risk that a batched
    write will restore some deleted data.'
