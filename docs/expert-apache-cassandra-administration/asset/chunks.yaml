  trans: "\n### 写请求流程\n\nCassandra 在写入路径上通过多个阶段处理数据，该过程始于客户端初始化写请求，终于数据库将数据存储到磁盘。它会立即记录一次写入，并在此过程结束时将数据写入磁盘。以下是写入的各个阶段：\n\
    \n*   将数据记录到提交日志中。\n*   将数据写入内存表。\n*   将数据从内存表刷新。\n*   将数据存储到磁盘上的 SSTable 中。\n\
    \n图 4-1 展示了 Cassandra 的写请求流程。该图展示了一个拥有十二个节点的 Cassandra 集群。此处是三副本复制（即复制级别为 3），且客户端使用\
    \ `QUORUM` 一致性级别。\n\n![A436674_1_En_4_Fig1_HTML.gif](img/A436674_1_En_4_Fig1_HTML.gif)\n\
    \n图 4-1\n\nCassandra 写请求流程\n\n注意\n\nCassandra 进行顺序写入，并且由于所有写入都只是追加操作，因此它不需要任何读取或寻道来写入值。因此，Cassandra\
    \ 可以非常快速地写入数据。\n\n在 `QUORUM` 一致性级别下，如果三个节点中有两个确认写操作成功，Cassandra 就认为该写操作成功。副本节点将确认信息发送给协调节点，即客户端连接的那个节点。\n\
    \n以下是对图 4-1 所示的 Cassandra 写请求流程的逐步解释。\n\n1.  Cassandra 客户端发送一个写请求以存储特定的键。首先需要理解的是，一个节点可以扮演副本节点、协调节点或两者兼有的角色。如果该节点是存储该键的正确分区节点，并且该节点映射到数据，那么该节点充当副本。如果该节点恰好是客户端连接的节点，那么它充当协调节点。如果这两个条件都成立，该节点则同时扮演两个角色：协调节点和副本节点。\n\
    2.  协调节点确定应该存储该键的正确副本节点，并将客户端的请求转发给所有这些节点。副本的数量取决于复制因子。如果并非所有节点都在线，那么宕机节点在写入后将出现数据不一致。这些宕机节点一旦恢复，将使用\
    \ Cassandra 的一种数据修复机制，例如 `hinted handoff`、`read repair` 或 `anti-entropy repair`，来达到一致状态。\n\
    3.  接收到键的节点将数据连同用于创建数据的元数据一起顺序写入提交日志（本地）。\n    提示 只有在 `ANY` 一致性级别下，提示才被计为一次成功的写入。\n\
    4.  然后，节点将键及其数据本地写入驻留在内存中的内存表。至此，节点认为写入成功。\n5.  一旦写入成功（或失败），副本节点会将操作的成功/失败状态发送给协调节点。\n\
    6.  在此例中，我们假设一致性级别为 `QUORUM` 且复制因子为 3。因此，一旦三个节点中有两个回复成功消息，协调节点就会向客户端响应一条成功消息。\n\
    \n注意\n\n你经常会遇到术语“协调节点”。协调节点是你发起 `cqlsh` 会话的节点。如果你连接到远程主机，那么该主机就是协调节点。\n\n在此期间，会发生几个重要的\
    \ Cassandra 内部操作，例如：\n\n*   Cassandra 如何在写操作期间使用提示\n*   Cassandra 如何决定何时应将内存表刷新到磁盘\n\
    *   Cassandra 如何使用提交日志\n*   布隆过滤器扮演的角色\n*   索引文件的角色\n\n以下各节将解释这些幕后的内部操作或过程。\n\n\
    #### 写入过程中提示的作用\n\n如果一个或多个节点未能发送成功或失败的确认信息，协调节点会在本地存储一个提示，以便当这些节点恢复时可以重新发送写操作。\n\
    \n你可以通过以下两个配置属性（在 `cassandra.yaml` 文件中）来控制 Cassandra 管理提示的方式：\n\n*   `gc_grace_seconds`：配置提示的生存时间（TTL）周期，以便数据库在此持续时间后不再重放提示。将此参数设置为\
    \ 0 会禁用提示。\n*   `max_hint_window_in_ms`：此属性决定将记录提示的周期。默认值是三小时。\n\n#### 内存表及其刷新到磁盘的过程\n\
    \n在客户端写操作期间，一个后台线程监控数据库中的所有内存表。一旦满足以下任一条件，后台线程就会用新的内存表替换当前的内存表，并将较旧的内存表标记为需要刷新到磁盘（到一个\
    \ SSTable）：\n\n*   节点达到其全局内存阈值。\n*   提交日志已满。\n*   达到表级别的间隔。\n\n另一个后台线程（或一组线程）负责刷新第一个后台线程标记为需要刷新的内存表。\n\
    \n#### 提交日志\n\n一旦 Cassandra 将内存表刷新到磁盘，存储在提交日志中属于该内存表键的所有条目就变得无用了。Cassandra 会标记所有属于已刷新内存表的提交日志段，以便它可以将这些段重新用于存储来自其他内存表的数据。\n\
    \n数据库将提交日志作为二进制文件存储在文件系统的 `$CASSANDRA_HOME/data/commitlog` 目录中。示例如下：\n\n```\n\
    $ ls -altr\ntotal 9332\ndrwxr-xr-x 6 cassandra cassandra      4096 Apr  3 10:56\
    \ ..\n-rw-r--r-- 1 cassandra cassandra  33554432 Jun 24 12:35 CommitLog-6-1498331957174.log\n\
    drwxr-xr-x 2 cassandra cassandra      4096 Jun 24 12:35 .\n-rw-r--r-- 1 cassandra\
    \ cassandra  33554432 Jun 25 09:55 CommitLog-6-1498331957173.log\n$\n```\n\n提交日志名称中的数字\
    \ 6 表示提交日志格式的版本号。对于 Cassandra 3.0 版本，版本号是 6。\n"
- fmt: '#### Bloom Filters and Index Files


    Once Cassandra flushes a memtable to disk, it creates two additional data structures:
    a Bloom filter and an index file.


    ##### Bloom Filters


    A Bloom filter is a probabilistic data structure for testing set membership that
    you can tune for false positives. It never produces a false negative. A Bloom
    filter is an off-heap structure. It uses a fast algorithm to test whether an element
    is a member of a set.


    The database stores the Bloom filters in memory and uses them to reduce disk accesses
    when looking up keys. When you perform a query, the database first checks the
    Bloom filter before accessing data on disk. If the Bloom filter shows that the
    element is in the set, the database accesses the disk to ascertain it. Since memory
    access is much faster than disk access, you can view a Bloom filter as a type
    of cache to speed up access.


    When a Bloom filter reports that a key isn’t present in an SSTable, then the key
    isn’t present. However, if the filter reasons that the key is present, it may
    be wrong at times; the key might or might not be actually present.


    Bloom filters serve to enhance the scalability of read requests. They do this
    by keeping the database from performing the additional disk reads for reading
    the SSTable by indicating if a key isn’t present in a SSTable.


    You can reduce the number of false positives by increasing the size of the Bloom
    filters. You’ll use additional memory but you’ll be making the filters more accurate.
    You can configure the chance of a false positive at the table level, either when
    creating the table or later. You configure the `bloom_filter_fp_chance` property
    at the table level to specify the percentage of false positives a Bloom filter
    reports.


    ##### Index Files


    An index file stores the offset of keys into the main data file, which is the
    SSTable. By default, the database stores a part of the index file in memory. The
    index file stores the offset for every 128^(th) key in the SSTable, and you can
    configure this value.


    As with Bloom filters, index files enhance read scalability. They do this by providing
    the random position from an SSTable where you can sequentially scan to get the
    data. Otherwise, you’ll be forced to scan the entire SSTable to retrieve the data.


    #### Compacting SSTable Data


    Over time, the database can end up with multiple versions of a row in different
    SSTables, since SSTables are immutable and the database doesn’t overwrite existing
    data. Instead, inserts and updates result in new SSTables.


    To keep the multiple versions of the SSTables from overwhelming it, the database
    merges SSTables on a regular basis to get rid of the older versions of the data.
    This process is called compaction. By default, the database automatically performs
    minor compactions.


    During a compaction operation, Cassandra merges the data in SSTables, including
    the keys and columns. It also gets rid of all the expired tombstones and creates
    a new index. The outcome of the compaction is a single new SSTable. Compaction
    may result in a temporary rise in I/O usage and the size of data on disk, but
    it ends up saving you space since it merges several large datafiles that store
    the SSTable data.


    You can configure a compaction strategy to tell the database which algorithm it
    must use when it merges multiple SSTables during a compaction. For example, the
    default compaction strategy, size-tiered compaction, merges similar sized SSTables
    to create one large SSTable.


    Once the database creates the new SSTable by merging multiple SSTables, it marks
    the older tables for deletion. This means you’ll see a higher space usage during
    a compaction operation. The database gets rid of the tables it marks for deletion
    during a restart, or by using a reference counting mechanism.


    After a compaction, the database will remove the original SSTables and thus gets
    rid of the outdated rows. However, compaction is on a per-node basis, so although
    one node performs a compaction, outdated versions of rows may still exist on other
    nodes. To avoid returning the outdated rows, the database gets multiple versions
    of a row in response to a read request from a client. It then returns the version
    with the latest timestamp to the client, a process called “last-write-wins.”


    Cassandra offers multiple compaction algorithms, and different strategies are
    best for write heavy and read heavy tables. I discuss compaction strategies in
    detail in Chapter [11](#A436674_1_En_11_Chapter.html).


    #### Reading Data


    I want to explain the read request flow in a Cassandra database, but before I
    do that, let me explain the basic architecture of a Cassandra database.


    Since there’s no primary or master node in a Casandra cluster, any node that contains
    the rows that can satisfy queries about that row can do so. Remember that Cassandra
    replicates each row in a table across multiple nodes, with the number of replicas
    depending on the replication factor.


    The gossip protocol that Cassandra uses lets the nodes exchange information about
    the network topology. Using `Gossip`, each of the nodes learns about the cluster
    topology and determines where it should direct a request for a specific row.


    Cassandra deems a read operation successful if enough nodes acknowledge success.
    How many nodes are enough depends on the replication factor and the consistency
    level you choose.


    Figure [4-2](#A436674_1_En_4_Chapter.html#Fig2) shows a case where there are twelve
    nodes in the cluster and the replication factor is 3. The `QUORUM` consistency
    level is employed during client reads. Using the `QUORUM` consistency level, a
    read operation is successful when two of the three nodes acknowledge success.


    ![A436674_1_En_4_Fig2_HTML.gif](A436674_1_En_4_Fig2_HTML.gif)


    **Figure 4-2** How the gossip protocol helps nodes exchange information among
    themselves


    **Note:** Since Cassandra uses the gossip protocol and since it’s a distributed
    database that requires it to talk to multiple nodes during each read and write
    operation, the network performs a heavy amount of data transfers. You’re advised
    to set up at least a 1Gbps network bandwidth to accommodate gossip traffic as
    well as replication traffic.'
