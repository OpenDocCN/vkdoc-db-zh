    test |      True |        False |              null | $2a$10$ukMpmnzdHn8xy/7krucrdeYtblF8XHmVTvv1qKldVrGLxvLTWBxaC\n\
    test1 |      True |        False |              null | $2a$10$3CQTIi09zOOT5v2SaCxH9ekE8ZTaAGZSG6owkziZIT3ylzMDMCrhW\n\
    cassandra |      True |         True |              null | $2a$10$nRxFfMOAqxVQYkFQmEMIZ.B1.9.opcND/8.LtwyqZLgJY91eiS3Zm\n\
    cycling_admin |     False |        False |              null |   null\n(6 rows)\n\
    cassandra@cqlsh>\n```\n\n`system_auth.roles` 表存储与角色相关的信息，例如角色名称、该角色是否是超级用户，以及是否可以使用该角色登录数据库。除了此表，Cassandra\
    \ 还将角色相关信息存储在以下表中：\n\n*   `system_auth.role_members`：存储角色和角色成员。\n*   `system_auth.role_permissions`：存储角色、资源以及角色访问该资源的权限。\n\
    *   `system_auth.resource_role_permissons_index`：存储角色以及授予这些角色的权限。\n\n## 修改密码\n\
    \n您可以使用 `ALTER ROLE` 命令修改角色的密码：\n\n```\ncassandra@cqlsh> alter role 'newsuper'\
    \ with password 'newsuper2';\n```\n\n## 删除角色\n\n您可以使用 `DROP ROLE` 命令删除角色：\n\n\
    ```\ncassandra@cqlsh> drop role test;\n```\n\n## 处理超级用户账户\n\n除了默认的超级用户账户 `cassandra`，您还可以在创建用户时通过指定\
    \ `superuser` 选项来创建额外的超级用户账户，如下所示：\n\n```\ncassandra@cqlsh> create role 'newsuper'\
    \ with password 'newsuper1'\n... superuser;\ncassandra@cqlsh> list roles;\nname\
    \      | super\n-----------+-------\ncassandra |  True\nnewsuper |  True\ntest\
    \ | False\n(3 rows)\ncassandra@cqlsh>\n```\n\n处理默认超级用户账户 `cassandra` 的最佳实践是创建一个自定义管理员账户，之后不再使用默认的\
    \ `cassandra` 账户。创建一个具有 `superuser` 选项的用户。由于默认情况下超级用户只能管理角色，因此请使用以下命令授予该用户对所有密钥空间的访问权限：\n\
    \n```\ncqlsh> grant all permissions on all keyspaces to newsuper;\n```\n\n## 配置授权：授予资源权限\n\
    \n配置认证将限制对集群的访问。配置授权是您控制对各种数据库对象（如密钥空间和表）访问的方式。您可以执行 `GRANT` 命令，将角色在数据库资源（如密钥空间、表或函数）上的权限授予该角色。\n\
    \n让我们学习如何向登录角色授予权限，首先授予对象（如密钥空间和表）上的特定权限。之后，我将展示如何向角色授予权限，这使您能够实现基于角色的访问控制（RBAC）系统。\n\
    \n> 注意\n>\n> 默认情况下，Cassandra 不会强制执行任何限制用户执行数据库操作的能力。\n\n在以下示例中，您首先尝试将密钥空间上的 `SELECT`\
    \ 权限授予一个角色：\n\n```\ncassandra@cqlsh> grant select permission on keyspace \"cycling\"\
    \ to 'test';\nServerError: java.lang.UnsupportedOperationException: GRANT operation\
    \ is not supported by AllowAllAuthorizer\ncassandra@cqlsh>\n```\n\n这个 `GRANT`\
    \ 命令失败是因为默认的授权器（恰好是 `AllowAllAuthorizer`）不支持 `GRANT` 操作。在 `cassandra.yaml` 文件中，您会看到以下内容：\n\
    \n```\nauthorizer: AllowAllAuthorizer\n```\n\n`AllowAllAuthorizer` 是 Cassandra\
    \ 的默认授权后端，它控制访问并提供权限。使用此默认授权后端将禁用授权，这意味着 Cassandra 允许任何用户在数据库中执行任何操作。\n\n`CassandraAuthorizer`\
    \ 是替代的授权后端。它将所有权限存储在 `system_auth.permissions` 表中。要配置授权，请编辑 `cassandra.yaml` 文件并指定\
    \ `CassandraAuthorizer` 作为授权器，如下所示：\n\n```\nauthorizer: org.apache.cassandra.auth.CassandraAuthorizer\n\
    ```\n\n如上所示设置授权器将在数据库中强制执行授权。数据库现在将根据登录数据库的角色来限制访问。一旦您正确配置了 `authorizer` 属性，就可以成功发出\
    \ `GRANT` 命令。\n\n```\ncassandra@cqlsh> grant select permission on keyspace \"\
    cycling\" to 'test';\n```\n\n由于丢失对 `system_auth.permissions` 表的访问权限将拒绝所有对集群的访问，请确保您有系统密钥空间的多个副本。如果您有多个数据中心，请将复制类设置为\
    \ `NetworkTopologyStrategy`。\n\n您可以向角色授予以下广泛的权限类型：\n\n*   `SELECT`：允许角色使用 CQL\
    \ 命令 `SELECT` 读取数据。\n*   `MODIFY`：允许角色使用 CQL 命令 `INSERT`、`UPDATE`、`DELETE` 和 `TRUNCATE`\
    \ 添加、修改和删除数据。\n*   `CREATE`：授予使用命令 `CREATE KEYSPACE` 和 `CREATE TABLE` 创建密钥空间和表的能力。\n\
    *   `ALTER`：授予使用以下命令修改密钥空间和表的能力：\n    *   `ALTER KEYSPACE`\n    *   `ALTER TABLE`\n\
    *   `DESCRIBE`：提供有关对象的信息。\n*   `DROP`：使您能够从数据库中删除对象。\n*   `EXECUTE`：使用任何函数，以及在\
    \ `CREATE AGGREGATE` 语句中的任何函数中执行 `SELECT`、`INSERT` 和 `UPDATE` 权限。\n*   `AUTHORIZE`：启用对密钥空间、表、函数和角色的权限授予和撤销。\n\
    *   `ALL PERMISSIONS`：启用对表的所有类型的查询。\n\n以下是您可以发出 `GRANT` 命令将各种权限直接分配给角色的示例。\n\n\
    您可以授予角色 `sam` 在所有密钥空间的所有表上执行 `SELECT` 操作的权限，如下所示：\n\n```\ncqlsh> grant select\
    \ on all keyspaces to 'sam';\n```\n\n您可以授予角色 `sam` 在 `CYCLING` 密钥空间的所有表上执行修改（`INSERT`、`UPDATE`、`TRUNCATE`\
    \ 和 `DELETE`）的权限，如下所示：\n\n```\ncqlsh> grant modify on keyspace cycling to 'sam';\n\
    ```\n\n您可以授予角色 `sam` `ALTER KEYSPACE` 权限，如下所示：\n\n```\ncqlsh> grant alter keyspace\
    \ on cycling to 'sam';\n```\n\n`ALTER KEYSPACE` 权限使角色 `sam` 能够在 `CYCLING` 密钥空间及其表和索引上执行以下操作：\n\
    \n*   `ALTER KEYSPACE`\n*   `ALTER TABLE`\n*   `CREATE INDEX`\n*   `DROP INDEX`\n\
    \n`ALL PERMISSIONS` 权限使用户能够在表上运行所有类型的查询：\n\n```\ncqlsh> grant all permissions\
    \ on cycling.cyclists to sam;\n```\n\n## Cassandra 的访问控制矩阵\n\nCassandra 为访问控制采用分层继承系统，您授予层次结构中较高资源的权限会自动级联到层次结构中较低的资源。\n\
    \n例如，\n\n*   如果您在 `ALL KEYSPACES` 上授予权限，它会级联到这些密钥空间中的所有表。\n*   如果您在 `ALL FUNCTIONS`\
    \ 上授予权限，它会级联到所有用户定义函数和聚合。"
- fmt: "# Configuring Role-Backed Access Control\n\nA database role is a resource\
    \ to which you grant privileges to access other database resources. Role-based\
    \ access control is where you assign roles to users, rather than directly assigning\
    \ privileges to access various database resources.\n\nTypically, in other databases,\
    \ to use roles to manage access to the database objects, you must do the following,\
    \ in this order:\n\n*   Create a user.\n*   Create a role.\n*   Grant privileges\
    \ on various database resources to the new role.\n*   Grant the role to the new\
    \ user.\n\nYou follow the same strategy to implement RBAC in a Cassandra database,\
    \ with the difference that instead of granting roles to users, you grant them\
    \ to (login) roles (which, as I explained earlier, stand in for users in Cassandra).\n\
    \nIn the following sections, I show how to configure RBAC.\n\n## Creating Roles\
    \ for Login Accounts\n\nWhen you want to grant access to a user or application,\
    \ you create a role. The following example shows how to create the login role\
    \ named `manager`:\n\n```\ncqlsh> create role manager\n... with password = 'Password123'\n\
    ... and LOGIN = true;\n```\n\nBy default, the `LOGIN` property’s value is `false`,\
    \ meaning that the role won’t be able to log into the database. In this case,\
    \ you want the `manager` role to be able to log into the database and serve as\
    \ a login role. You therefore set the `LOGIN` property to `true`.\n\nThe `list\
    \ roles` command shows that the new role was created successfully.\n\n```\ncqlsh>\
    \ list roles;\nrole      | super | login | options\n-----------+-------+-------+---------\n\
    cassandra |  True |  True |        {}\n    manager | False |  True |        {}\n\
    \      test | False |  True |        {}\n     test1 | False |  True |        {}\n\
    (4 rows)\ncqlsh>\n```\n\nYou can test the ability of the new account to log in.\n\
    \n```\n$ cqlsh 192.168.159.129 -u cassandra -p cassandra\nConnected to Test Cluster\
    \ at 192.168.159.129:9042.\n[cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native\
    \ protocol v4]\nUse HELP for help.\ncassandra@cqlsh> login manager\nPassword:\n\
    manager@cqlsh>\n```\n\nThe `cqlsh` prompt (`manager@cqlsh`) shows the name of\
    \ the role, which is `manager` in this example.\n\nYou can change the password\
    \ for a login-enabled role by running the `ALTER ROLE` command, as shown here:\n\
    \n```\ncqlsh>ALTER ROLE manager WITH PASSWORD = 'manager';\ncqlsh>\n```\n\n##\
    \ Granting Permissions to Roles\n\nYou can also create a role and grant various\
    \ permissions on one or more database objects to that role. You can then assign\
    \ this role to a login role.\n\n### Object Permissions in Cassandra\n\nYou can\
    \ authorize object permissions to authenticated roles on the following database\
    \ objects:\n\n*   Keyspace\n*   Table\n*   Function\n*   Aggregate\n*   Roles\n\
    *   MBeans\n\nThe following are the types of permissions you can configure on\
    \ database objects:\n\n*   `CREATE`\n*   `ALTER`\n*   `DROP`\n*   `SELECT`\n*\
    \   `MODIFY`\n*   `DESCRIBE`\n\n### Granting Permissions on Objects to Roles\n\
    \nThe following example shows how to create a role that you aren’t going to use\
    \ for a login; instead, you’ll use the role for granting permissions on database\
    \ objects. You first create the role `cycling_admin`, and you grant privileges\
    \ on the keyspace `cycling` to that role. Following this, you grant the role `cycling_admin`\
    \ to the login role `manager`.\n\n1.  Create the role with the `CREATE ROLE` command.\n\
    \n    ```\n    cqlsh> create role cycling_admin;\n    ```\n\n    Since this role\
    \ is for assigning object privileges and not for a login account, you didn’t set\
    \ the `SUPERUSER` or the `LOGIN` properties, both of which are `False` by default.\n\
    \n    ```\n    cassandra@cqlsh> list roles;\n    role         | super | login\
    \ | options\n    --------------+-------+-------+---------\n    cassandra |  True\
    \ |  True |        {}\n    cycling_admin | False | False |        {}\n    manager\
    \ | False |  True |        {}\n      test | False |  True |        {}\n     test1\
    \ | False |  True |        {}\n    (5 rows)\n    cassandra@cqlsh>\n    ```\n\n\
    2.  Once you create the new role, grant privileges on a tablespace (`cycling`)\
    \ to that role.\n\n    ```\n    cqlsh> grant all permissions on keyspace cycling\
    \ to cycling_admin;\n    ```\n\n3.  Grant the new role `cycling_admin` to the\
    \ login role `manager`, which you created in the previous section.\n\n    ```\n\
    \    cqlsh> grant cycling_admin to manager;\n    ```\n\n## Listing Permissions\n\
    \nYou can list all permissions granted to roles with the `list all permissions`\
    \ command.\n\n```\ncassandra@cqlsh> list all permissions;\nrole          | username\
    \      | resource             | permission\n---------------+---------------+----------------------+------------\n\
    \    cassandra |     cassandra |                |      ALTER\n    cassandra |\
    \     cassandra |                |       DROP\n    cassandra |     cassandra |\
    \                |  AUTHORIZE\n    cassandra |     cassandra |               \
    \     |      ALTER\n    cassandra |     cassandra |                    |     \
    \  DROP\n    cassandra |     cassandra |                    |  AUTHORIZE\n   \
    \ cassandra |     cassandra |                       |      ALTER\n    cassandra\
    \ |     cassandra |                       |       DROP\n    cassandra |     cassandra\
    \ |                       |  AUTHORIZE\n    cassandra |     cassandra |      \
    \                |      ALTER\n    cassandra |     cassandra |               \
    \       |       DROP\n    cassandra |     cassandra |                      | \
    \ AUTHORIZE\n cycling_admin | cycling_admin |                  |     CREATE\n\
    \ cycling_admin | cycling_admin |                  |      ALTER\n cycling_admin\
    \ | cycling_admin |                  |       DROP\n cycling_admin | cycling_admin\
    \ |                  |     SELECT\n cycling_admin | cycling_admin |          \
    \        |     MODIFY\n cycling_admin | cycling_admin |                  |  AUTHORIZE\n\
    \         test |          test |               |     SELECT\n         test | \
    \         test |            |      ALTER\n         test |          test |    \
    \        |     SELECT\n         test |          test |            |     MODIFY\n\
    (22 rows)\ncassandra@cqlsh>\n```\n\nCheck out the `Resource` column in the query\
    \ output to see how Cassandra assigns different permissions to the three roles\
    \ in the database: the default superuser role `cassandra`, the login role `test`,\
    \ and the new role you created, `cycling_admin`.\n\n### Viewing Permissions Granted\
    \ to Roles\n\nTo view the permissions granted to a specific role, run the `list\
    \ all permissions of <role_name>` command:\n\n```\ncassandra@cqlsh> list all permissions\
    \ of manager;\nrole          | username      | resource           | permission\n\
    ---------------+---------------+--------------------+------------\n cycling_admin\
    \ | cycling_admin |                |     CREATE\n cycling_admin | cycling_admin\
    \ |                |      ALTER\n cycling_admin | cycling_admin |            \
    \    |       DROP\n cycling_admin | cycling_admin |                |     SELECT\n\
    \ cycling_admin | cycling_admin |                |     MODIFY\n cycling_admin\
    \ | cycling_admin |                |  AUTHORIZE\n(6 rows)\ncassandra@cqlsh>\n\
    ```\n\n## Configuring Firewall Ports for Access\n\nCassandra nodes require several\
    \ firewall ports to be open so they can communicate. Some of the nodes that should\
    \ be open are public and others are inter-node or Cassandra-specific ports.\n\n\
    Ensure that the following ports are open:\n\n| Type of Port         | Port Number\
    \ | Port Function                                                            \
    \ |\n| -------------------- | ----------- | -------------------------------------------------------------------------\
    \ |\n| Public               |             | SSH Port                         \
    \                                         |\n| Cassandra (inter-node) |      \
    \       | For inter-node cluster communications                              \
    \       |\n| Cassandra (inter-node) |             | For SSL inter-node communications\
    \                                         |\n| Cassandra (inter-node) |      \
    \       | JMX monitoring port                                                \
    \       |\n| Cassandra (client)   |             | Client port                \
    \                                               |\n| Cassandra (client)   |  \
    \           | Default for native transport protocol (when you need encrypted and\
    \ nonencrypted communications) |\n\n## Encrypting Cassandra with SSL"
