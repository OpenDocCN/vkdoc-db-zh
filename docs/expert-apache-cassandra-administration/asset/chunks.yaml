  trans: '### 获取并行远程工具


    Cassandra 是一个分布式数据库，一个集群通常可能包含数十甚至数千个节点。对于那些从单节点关系型数据库世界过来的用户来说，这可能会是一个巨大的意外。


    学会使用分布式 Shell 工具是个好主意。有几种分布式 SSH 工具，例如 `parallel SSH` 和 `Cluster SSH`，它们可以让你同时通过
    SSH 访问多个节点。


    使用像 `pdsh`（并行分布式 Shell）这样的工具同时传输文件和在多个节点上运行命令，也会让你受益匪浅。


    如果你要处理的节点数量较多（比如超过 8 或 10 个），那么使用 `Chef` 或 `Ansible` 这样的工具来执行许多操作是明智之举。


    ### 理解 Cassandra 数据库中的故障场景


    在管理传统数据库时，磁盘丢失是相对罕见的事件，因为它们大多运行在企业级硬件上。Cassandra，如同所有大数据技术一样，运行在商用硬件上。在处理大数据时，经历磁盘甚至节点故障并非罕见事件。


    Cassandra 管理员需要知道如何处理节点故障，以及如何按需通过添加节点来扩展节点容量。


    当操作因更新和写入未能在集群中正确同步而失败时，管理员会运行一个“修复”操作，这是 Cassandra 特有的操作。


    Cassandra 中的一切都基于 Java，因此知道如何读取 Java 错误堆栈和跟踪文件至关重要。了解常见的 Java 异常，例如内存不足 (`OOM`)
    错误和空指针错误，会很有帮助。


    ### 监控与告警


    你可以通过 Java 管理扩展 (`JMX`) 来监控和管理基于 Java 语言的 Cassandra。


    更常见的是通过 Cassandra 提供的 `nodetool` 实用程序来管理和监控 Cassandra 集群。`Nodetool` 是 `JMX` 兼容的，你可以用它来获取各种
    Cassandra 指标，并执行常见任务，例如添加和退役节点。你也可以使用其他 `JMX` 工具，例如 `JConsole` 来执行各种任务。


    ### 调优 Java 虚拟机


    Cassandra 使用 Java 编写，其中的一切都运行在 Java 虚拟机 (`JVM`) 内。传统的数据库管理确实不需要 `JVM` 知识。然而，在处理
    Cassandra 数据库时，这方面的知识至关重要。章节 11 介绍了 `JVM` 调优的基本概念以及如何管理垃圾回收（调优 `JVM` 最重要的部分）。


    在下一节中，我将介绍 Cassandra 的架构以及几个你在本书后续部分会遇到的有趣概念和关键术语。


    ## Cassandra 架构快速介绍


    Cassandra 是一个分布式数据库系统。它将数据分布在组织为集群的多个节点之间，以确保即使在系统和硬件发生故障时数据仍可访问。


    Cassandra 集群中的节点使用点对点通信协议来交换它们的状态信息。


    Cassandra 表行存储在表中，每张表都有一个必需的主键。键空间是一个逻辑实体，用于将一组表分组，这些表通常属于单个应用程序。你可以通过 `CQL` 语言结构访问存储在表中的数据，其语法与
    `SQL` 类似。你可以通过 `cqlsh` 和应用程序语言的驱动程序访问 `CQL`。


    Cassandra 首先将所有数据写入日志，以确保数据在发生故障时具有持久性。然后，它将数据写入充当缓存的内存结构中，当缓存满时，会将数据刷新到磁盘上的数据文件中。


    Cassandra 自动对所有数据进行分区，并根据你的需要复制相应次数。它使用各种修复过程来确保节点间的数据随时间推移变得一致。


    Cassandra 会定期压缩磁盘上数据文件中的表，丢弃它发现的任何过时数据。


    Cassandra 将客户端的读写请求随机分配给集群中的节点，客户端最初连接到的那个节点充当该操作的协调者。


    ### 理解 Cassandra 特有概念


    要掌握 Cassandra 管理，你需要学习几个 Cassandra 特有的结构和概念，例如节点和环、提交日志、内存表、`SSTables`、键空间、索引文件和布隆过滤器。


    从对基本的高层 Cassandra 结构进行快速描述开始是个好主意。


    *   `节点`：节点是运行 Cassandra 实例的服务器。这是 Cassandra 存储你数据的地方。刚开始使用该数据库时，你可以在单个节点上运行 Cassandra，但所有真实的
    Cassandra 环境都包含一堆节点，因为 Cassandra 是为大数据处理而设计的。

    *   `数据中心`：“数据中心”这个术语有点误导性，因为它与你日常使用的“数据中心”（指一个组织的物理或虚拟数据中心）这个术语毫无关系。Cassandra
    的数据中心是一组节点，你将它们配置为一个用于复制目的的组。因此，你可以将数据中心视为复制组的同义词。你使用数据中心来将具有相同复制级别的一组节点分组。数据中心可以是物理的，也可以是逻辑的。通常，客户端将数据写入本地数据中心，然后该数据中心将数据异步复制到其他数据中心。

    *   `集群`：Cassandra 集群是一个或多个数据中心的集合，它可以跨越物理位置。


    在 Cassandra 数据库内部，你需要理解以下关键结构。


    *   `提交日志`：Cassandra 将内存中的数据写入提交日志以实现持久性。由于数据库将每次写入都首先写入提交日志，因此它作为一个安全的恢复机制，确保不会因服务器或其他故障而丢失任何写入。

    *   `内存表`：在将新数据写入提交日志后，Cassandra 会将该数据写入内存表，这些是仅存在于内存中的数据结构。

    *   `SSTable`：有序字符串表 (`SSTable`) 是一个不可变的数据文件，Cassandra 将内存表写入其中。一旦内存表达到阈值，Cassandra
    就会将内存表中的所有数据刷新到 `SSTables`。

    *   `CQL` 表：`CQL` 表是一组通过表行获取的有序列。每个表由一组列和一个主键组成，正是这些 `CQL` 表让你能够查询以从 Cassandra
    数据库中检索数据。


    **提示**


    使用过多的键空间或表都不是好主意。这两种实体都有 `JVM` 内存开销。每张表大约使用 1MB 内存，一个实用的经验法则是每个集群使用的表不要超过 1000
    个，理想情况下只使用 500 个。


    Cassandra 使用几个独特的概念和相关术语。我认为在深入接下来几章的数据库内部机制之前，先对这些概念和术语有一个概览是很好的。


    我在接下来章节中解释的许多术语和概念都与分布式数据库的管理有关；Cassandra 使用各种实体和策略来管理和分发数据到多个节点，以及节点如何保持对集群中其他节点的感知。


    #### 对等节点与协调者


    Cassandra 集群中的所有节点都是对等节点。客户端的请求可以随机发送到集群中的任何一个节点。当客户端连接到集群中的某个节点并发出读或写请求时，该节点将充当该操作的协调者。


    协调者是客户端与拥有客户端应用程序所请求数据的节点（副本）之间的代理。对于读或写操作，协调者节点决定应将请求分配给哪个节点。它会考虑你配置的分区器以及副本的放置策略。'
- fmt: '## Keyspaces


    A keyspace is a collection of related tables and is analogous to the logical concept
    of a schema in an Oracle database, or a database when you''re using MySQL, or
    the SQL Server database. The recommended practice is to use a single keyspace
    for each application.


    ## Replication and the Replica Placement Strategy


    Cassandra stores data on multiple nodes for reliability and fault tolerance. A
    replica is a copy of a chunk of data, and you set the replica placement strategy
    per keyspace when you create the keyspace.


    Cassandra offers several replica placement strategies, such as the `NetworkTopologyStrategy`,
    which is ideal when you deploy your cluster across multiple data centers.


    The number of replicas in each datacenter depends on the need to reduce cross-datacenter
    latency by promoting local reads and the need to provide protection against node
    failures.


    If a node is down, the data that Cassandra failed to write to that node is replayed
    later, via the use of what are called `hinted handoffs`, which are hints that
    enable the writing of the missed data to the failed node when it comes back.


    ## Tunable Consistency


    As explained earlier in this chapter, Cassandra chooses availability over consistency.
    However, the degree of consistency is tunable by you. You can select the degree
    of consistency on a per-query basis when you''re reading or writing data.


    Tunable consistency means you pick how many replicas a read or write query should
    hear back from before Cassandra deems that read/write request as successful. When
    a client issues a read request, the consistency level determines how many replicas
    Cassandra must hear from before it returns the data to the client. As for a write
    request, it is the number of replicas that must confirm that they have successfully
    written the data to disk before Cassandra informs the client that the write was
    successful.


    Obviously, a higher consistency level means slower reads and writes since Cassandra
    needs to wait for acknowledgement from more nodes. A higher level of consistency
    could also mean lower availability because you need more nodes to be available
    to satisfy the higher degree of consistency.


    ## Gossip


    Gossip refers to a communication protocol that a cluster''s nodes use to discover
    other nodes and inform them of their own location and state, as well as that of
    other nodes in the cluster. The purpose of gossip is to let all nodes quickly
    get up-to-date information about the state of the rest of the nodes in the cluster.


    It is from gossip data (state and history) that a node learns about other nodes
    that are down or have come back up after a failure.


    ## Partitioner


    Cassandra uses a function called a partitioner to determine which nodes receive
    the first copy of a chunk of data and how it should distribute the rest of the
    replicas across the other nodes.


    The partitioner uses token values that it derives from the primary key of a row
    to make its determination of which nodes get the replicas of a specific row. Cassandra
    offers various partitioners, with the default partitioner being the `Murmur3Partitioner`.


    ## Snitch


    To place the replicas of data on the nodes, Cassandra uses a topology. A snitch
    defines the topology; that is, it groups machines into datacenters and racks.


    Cassandra offers multiple snitches. The default `SimpleSnitch` is for simple installations
    that don''t use a complex topology that uses datacenters and racks. For production
    deployments, Cassandra recommends that you use the `GossipingPropertyFileSnitch`.
    This snitch defines datacenters and racks.


    ## Compaction


    Compaction is how Cassandra periodically consolidates data stored in tables in
    data files on disk. During the compaction process, Cassandra collects all the
    versions of a row, and from them assembles the most up-to-date versions of that
    row. It then writes the new row versions to a new `SSTable` and leaves the old
    versions along with other rows that are ready for deletion in the old `SSTables`.
    As soon as all pending reads are completed, the database deletes the old versions,
    using markers called tombstones, which indicate that the data is deleted data.


    ## Bloom Filters


    `Bloom filters` are algorithms for testing whether an element is a member of a
    set. Cassandra employs bloom filters to quickly determine whether a table (`SSTable`)
    has the data for a row. It uses the clusters for index scans but not for range
    scans.


    ## Node Repairs


    Since Cassandra is a distributed database, over time data in a replica can become
    inconsistent with other replicas stored in other nodes.


    Node repair is a regular maintenance task that corrects the inconsistencies among
    the replicas and works towards establishing eventual consistency; that is, it
    ensures that over time all nodes have the same, most recently updated data.


    There are several types of repair processes, such as a `hinted handoff`, where
    Cassandra preserves the data to be written to a node as a set of hints, when that
    node can''t receive any writes. When the node comes back up, the database uses
    the stored set of hints to perform a repair so that the node can add the writes
    that it missed while it was unavailable.


    ### How Cassandra Stores Its Data


    At a high level, Cassandra stores its data in the form of a hash ring, with each
    node in the cluster owning a range of hashes. Cassandra partitions the data around
    the ring, and the location of data on the hash ring is based on the partition
    key.


    All nodes are equal (no master) and continuously communicate with each other,
    exchanging their state. All nodes participate in all reads and writes.


    Data is replicated to multiple nodes, and you can configure the number of copies,
    with the default being three replicas.


    ### An Overview of Cassandra''s Data Model


    Cassandra''s data model sharply differs from that of a traditional relational
    database. Table 1-1 shows the key differences between the two data models.


    Table 1-1


    How Cassandra''s Data Model Differs From That of an RDBMS


    | RDBMS | Cassandra |

    | --- | --- |

    | Structured data | Unstructured data |

    | Fixed schema | Flexible schema |

    | A row is a single record. | A row is a unit of replication. |

    | Columns represent a relation''s attributes. | Columns are a unit of storage.
    |

    | Uses foreign keys and joins | Uses collections to represent relationships |

    | A table is an array of arrays. | A table is a list of nested (rows by columns)
    key-value pairs. |

    | The database is the outermost data container. | The keyspace is the outermost
    container for data. |


    ## DataStax and Cassandra


    DataStax, Inc. is a company that offers a commercial version of the Apache Cassandra
    database called DataStax Enterprise (`DSE`). DataStax 1.0 was released in late
    2011. DataStax is the leading evangelizer for the Cassandra database, with several
    employees contributing to the open-source Cassandra project.


    Besides the commercial `DSE`, DataStax also offers a free distribution of Apache
    Cassandra called the Community Edition.


    In the following sections, I briefly review `DSE` and the DataStax OpsCenter,
    a management tool for configuring and managing Cassandra.'
