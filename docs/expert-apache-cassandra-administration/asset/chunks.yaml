    The `nodetool proxyhistograms` command shows the network statistics in a cluster.


    ```

    $ nodetool proxyhistograms

    proxy histograms

    Percentile       Read Latency      Write Latency      Range Latency   CAS Read
    Latency  CAS Write Latency View Write Latency

    (micros)           (micros)           (micros)           (micros)           (micros)           (micros)

    50%                    943.13               0.00            4866.32               0.00               0.00               0.00

    75%                   4055.27               0.00           14530.76               0.00               0.00               0.00

    95%                   4055.27               0.00           20924.30               0.00               0.00               0.00

    98%                   4055.27               0.00           20924.30               0.00               0.00               0.00

    99%                   4055.27               0.00           20924.30               0.00               0.00               0.00

    Min                    785.94               0.00            1358.10               0.00               0.00               0.00

    Max                   4055.27               0.00           20924.30               0.00               0.00               0.00

    $

    ```


    ## Getting Table-Level Statistics


    Run the `nodetool tablestats` (formerly `nodetool cfstats`) command to get statistics
    about one or more tables. Be sure to specify the keyspace and the table name,
    as I show in the following example. By default, Cassandra will spit out statistics
    about all tables!


    Cassandra updates the table statistics when you flush data or when the database
    changes the SSTables by compacting them.


    You can have Cassandra ignore some tables by specifying the table names with the
    `-I` flag. The following example shows how to get stats for a table:


    ```

    $ nodetool tablestats test.kv2

    Total number of tables: 40


    Keyspace : test

    Read Count: 0

    Read Latency: NaN ms.

    Write Count: 0

    Write Latency: NaN ms.

    Pending Flushes: 0

    Table: kv2

    SSTable count: 1

    Space used (live): 5012

    Space used (total): 5012

    Space used by snapshots (total): 0

    Off heap memory used (total): 194

    SSTable Compression Ratio: 1.2

    Number of keys (estimate): 1

    Memtable cell count: 0

    Memtable data size: 0

    Memtable off heap memory used: 0

    Memtable switch count: 0

    Local read count: 0

    Local read latency: NaN ms

    Local write count: 0

    Local write latency: NaN ms

    Pending flushes: 0

    Percent repaired: 0.0

    Bloom filter false positives: 0

    Bloom filter false ratio: 0.00000

    Bloom filter space used: 176

    Bloom filter off heap memory used: 168

    Index summary off heap memory used: 18

    Compression metadata off heap memory used: 8

    Compacted partition minimum bytes: 30

    Compacted partition maximum bytes: 35

    Compacted partition mean bytes: 35

    Average live cells per slice (last five minutes): NaN

    Maximum live cells per slice (last five minutes): 0

    Average tombstones per slice (last five minutes): NaN

    Maximum tombstones per slice (last five minutes): 0

    Dropped Mutations: 0

    $

    ```


    As you can see, the `nodetool tablestats` command produces exhaustive statistics
    about a table. Besides space usage statistics, the command also reveals read and
    write latency statistics and Bloom filter-related statistics.


    # Getting Network Information from the Host


    You can get network information about a node by running the `nodetool netstats`
    command. The output of this command shows information such as the operational
    mode of the node (NORMAL, DECOMMISSIONED, LEAVING, etc.), read repair statistics,
    and the number of inactive, pending, and completed commands plus their responses.


    Here’s an example:


    ```

    $ nodetool netstats -H

    Mode: NORMAL

    Not sending any streams.

    Read Repair Statistics:

    Attempted: 0

    Mismatch (Blocking): 0

    Mismatch (Background): 0

    Pool Name                    Active   Pending      Completed   Dropped

    Large messages                  n/a         1              0         0

    Small messages                  n/a         0           1058         0

    Gossip messages                 n/a         0          18589         0

    $

    ```


    By default, Cassandra will show the results for the node from which you issue
    this command, but it allows you to specify a remote node with the `-h` option.


    ## The nodetool tablehistograms Command


    The `nodetool tablehistograms` (formerly `nodetool cfhistograms`) command provides
    statistics about tables that you can use to plot a frequency function.


    This command is not cumulative; it monitors only the operations since you last
    ran the command in the current session.


    The following is an example showing how to run the `nodetool tablehistograms`
    command. In this command, `cycling` refers to the keyspace and `cycle` to the
    table.


    ```

    $ nodetool tablehistograms cycling cycle

    cycling/cycle histograms

    Percentile  SSTables     Write Latency      Read Latency    Partition Size        Cell
    Count

    (micros)          (micros)           (bytes)

    50%             0.00              0.00          0.00         35         1

    75%             0.00              0.00          0.00         35         1

    95%             0.00              0.00          0.00         35         1

    98%             0.00              0.00          0.00         35         1

    99%             0.00              0.00          0.00         35         1

    Min             0.00              0.00          0.00         30         0

    Max             0.00              0.00          0.00         35         1

    $

    ```


    Here’s a description of the key columns in the output of the command:


    *   `Percentile`: The percentile rank

    *   `SSTables`: The number of SSTables accessed per read during a recent read

    *   `Write Latency`: The write latency in microseconds for recent writes

    *   `Read Latency`: The read latency in microseconds for recent reads

    *   `Partition Size`: The partition size in bytes


    # Checking the Cluster Health


    The `nodetool` utility is your best friend when it comes to monitoring a cluster
    and performing routine maintenance tasks.


    Key `nodetool` commands that you’ll often use for checking a cluster’s health
    are the following:


    *   `nodetool status`

    *   `nodetool info`

    *   `nodetool tpstats`


    In the following sections, I review these key nodetool cluster health monitoring
    tools.


    ## The nodetool status Command


    You’ve seen the `nodetool status` command in action numerous times in this book.
    This command enables you to check the health of a cluster’s nodes. In addition,
    it also lets you know about the distribution of data among the nodes. Monitor
    the cluster with this command, and if it shows an unbalanced cluster due to too
    many nodes in a rack, move some of the nodes around using the techniques explained
    in the previous chapter.'
