  trans: '

    ## 键空间


    一个键空间是一组相关表的集合，类似于 Oracle 数据库中的逻辑模式概念，或使用 MySQL 时的数据库概念，或 SQL Server 的数据库概念。最佳实践是为每个应用程序使用单个键空间。


    ## 复制与副本放置策略


    Cassandra 为了可靠性和容错性，将数据存储在多个节点上。副本是数据块的一个拷贝，您在创建键空间时，需要为每个键空间设置副本放置策略。


    Cassandra 提供了多种副本放置策略，例如 `NetworkTopologyStrategy`，当您的集群部署在多个数据中心时，此策略是理想选择。


    每个数据中心的副本数量取决于两方面的需求：一是通过促进本地读取来减少跨数据中心延迟的需要，二是提供针对节点故障的防护需要。


    如果一个节点宕机，Cassandra 未能写入该节点的数据将稍后重放，这是通过所谓的 `提示性移交` 机制实现的，该机制提供了一些提示，使得故障节点恢复后，可以将错过的数据写入其中。


    ## 可调一致性


    正如本章前面所述，Cassandra 选择可用性优先于一致性。然而，一致性的程度是可以由您调节的。在读取或写入数据时，您可以针对每个查询选择一致性的等级。


    可调一致性意味着您选择在 Cassandra 将读或写请求视为成功之前，应该收到多少个副本的响应。当客户端发出读请求时，一致性级别决定了 Cassandra
    必须收到多少个副本的响应后才能将数据返回给客户端。对于写请求，它是指在 Cassandra 通知客户端写入成功之前，必须有多少个副本确认已成功将数据写入磁盘。


    显然，更高的一致性级别意味着更慢的读写速度，因为 Cassandra 需要等待更多节点的确认。更高的一致性级别也可能意味着更低的可用性，因为您需要更多节点可用以满足更高程度的一致性。


    ## Gossip 协议


    Gossip 指的是一种通信协议，集群中的节点使用它来发现其他节点，并告知它们自己及其他节点的位置和状态。Gossip 的目的是让所有节点快速获取集群中其他节点状态的最新信息。


    正是通过 Gossip 数据（状态和历史记录），节点才能了解到哪些节点宕机了，或者哪些节点在故障后重新上线。


    ## 分区器


    Cassandra 使用一个称为分区器的函数来决定哪些节点接收数据块的第一份拷贝，以及如何将剩余的副本分布到其他节点。


    分区器使用从行的主键派生的令牌值，来确定哪些节点获得特定行的副本。Cassandra 提供了多种分区器，默认的分区器是 `Murmur3Partitioner`。


    ## 探查器


    为了将数据的副本放置在节点上，Cassandra 使用了一个拓扑结构。探查器定义了这个拓扑结构；也就是说，它将机器分组到数据中心和机架中。


    Cassandra 提供了多种探查器。默认的 `SimpleSnitch` 适用于不使用复杂拓扑（即不涉及数据中心和机架）的简单安装。对于生产部署，Cassandra
    建议您使用 `GossipingPropertyFileSnitch`。该探查器定义了数据中心和机架。


    ## 压实


    压实是 Cassandra 周期性地将磁盘上数据文件中存储的表数据进行合并的过程。在压实过程中，Cassandra 收集一行的所有版本，并从中组装出该行的最新版本。然后，它将新的行版本写入一个新的
    `SSTable`，并将旧版本以及标记为待删除的其他行保留在旧的 `SSTable` 中。一旦所有待处理的读取完成，数据库就会使用称为墓碑的标记删除旧版本，这些标记表明数据是已删除的数据。


    ## 布隆过滤器


    `布隆过滤器` 是一种用于测试某个元素是否属于某个集合的算法。Cassandra 采用布隆过滤器来快速确定一个表（`SSTable`）是否包含某行的数据。它用于索引扫描，但不用于范围扫描。


    ## 节点修复


    由于 Cassandra 是一个分布式数据库，随着时间的推移，一个副本中的数据可能与其他节点上存储的副本不一致。


    节点修复是一项常规维护任务，用于纠正副本之间的不一致，并致力于建立最终一致性；也就是说，它确保随着时间的推移，所有节点都拥有相同、最近更新的数据。


    有几种类型的修复过程，例如 `提示性移交`，当一个节点无法接收任何写入时，Cassandra 将要写入该节点的数据保存为一组提示。当该节点重新上线时，数据库使用存储的提示集执行修复，以便节点可以添加它在不可用期间错过的写入。


    ### Cassandra 如何存储其数据


    从高层次来看，Cassandra 以哈希环的形式存储数据，集群中的每个节点拥有一段哈希范围。Cassandra 将数据分区在环上，数据在哈希环上的位置基于分区键。


    所有节点都是平等的（无主节点），并持续相互通信，交换状态。所有节点都参与所有的读写操作。


    数据被复制到多个节点，您可以配置副本数量，默认是三个副本。


    ### Cassandra 数据模型概览


    Cassandra 的数据模型与传统的有关系数据库模型有显著不同。表 1-1 显示了两种数据模型之间的关键区别。


    表 1-1


    Cassandra 数据模型与关系数据库管理系统的区别


    | 关系数据库管理系统 | Cassandra |

    | --- | --- |

    | 结构化数据 | 非结构化数据 |

    | 固定模式 | 灵活模式 |

    | 一行代表一条记录。 | 一行是一个复制单元。 |

    | 列代表关系的属性。 | 列是一个存储单元。 |

    | 使用外键和连接 | 使用集合来表示关系 |

    | 表是数组的数组。 | 表是一个嵌套的（按列组织的行）键值对列表。 |

    | 数据库是最外层的数据容器。 | 键空间是数据的最外层容器。 |


    ## DataStax 与 Cassandra


    DataStax, Inc. 是一家提供 Apache Cassandra 数据库商业版本的公司，该版本称为 DataStax Enterprise (`DSE`)。DataStax
    1.0 于 2011 年底发布。DataStax 是 Cassandra 数据库的主要推广者，其多名员工为开源的 Cassandra 项目做出了贡献。


    除了商业版 `DSE`，DataStax 还提供 Apache Cassandra 的免费发行版，称为社区版。


    在以下各节中，我将简要回顾 `DSE` 以及 DataStax OpsCenter，这是一个用于配置和管理 Cassandra 的管理工具。

    '
- fmt: "### DataStax Enterprise\n\nDataStax Enterprise provides a comprehensive and\
    \ simple data management layer with an always-on architecture built on top of\
    \ Apache Cassandra. DSE offers advanced functionality to create sophisticated\
    \ cloud applications.\n\nDSE integrates several powerful features such as indexing,\
    \ search, analytics, and graph functionality with the open source Apache Cassandra\
    \ database. Here is a brief description of the features that DSE offers on top\
    \ of the underlying Cassandra database.\n\n*   Advanced Indexing and Search: DSE\
    \ Search contains an advanced indexing engine that contains powerful search capabilities\
    \ (DSE integrates Apache Solr, a well–known search tool) to help find data by\
    \ running complex queries. The indexing engine supports fast, real-time aggregations,\
    \ filtering, faceting, as well as sub-string, and fuzzy and full text search.\n\
    *   Powerful Integrated Analytics: DSE Analytic integrates the powerful Apache\
    \ Spark large-scale data processing engine to enable developers to build pipelines\
    \ that interact with data flowing through both streaming and batch workloads.\n\
    *   Graph Database: DSE Graph is a scalable, real-time graph database that supports\
    \ deep analytical queries. Graph databases are designed for analyzing large data\
    \ sets with many complex relationships by helping you discover and make sense\
    \ of those relationships.\n\nOrganizations trying to derive the most value from\
    \ their data have different requirements, each solved by a different solution,\
    \ such as advanced analytics, real-time indexing, search, etc. DSE offers all\
    \ the capabilities required by modern cloud applications in an integrated fashion,\
    \ through one tool. Integration of search, analytics, and graph database capabilities\
    \ means that these components derive all the benefits of the Apache Cassandra\
    \ database, such as high availability, linear scalability, and predictable, low-latency\
    \ response times.\n\nThe DataStax Enterprise OpsCenter is a web-based management\
    \ and monitoring component of DSE. OpsCenter makes it easy to monitor, tune, backup,\
    \ and recover the Cassandra database. You can perform most of your database management\
    \ tasks, such as access and authorization, through `OpsCenter`. OpsCenter provides\
    \ a centralized dashboard to monitor Cassandra clusters and helps proactively\
    \ identify issues before they affect your production workloads. You can easily\
    \ integrate `OpsCenter` into management tools such as Graphite.\n\n### DataStax\
    \ Development Tools\n\nDataStax offers several tools to help you create Cassandra-based,\
    \ large-scale distributed applications. The following is a brief description of\
    \ the three key development tools offered by DataStax: the DataStax DevCenter,\
    \ the DataStax Studio, and database drivers.\n\n*   DataStax Enterprise OpsCenter:\
    \ Web-based visual management and monitoring solution for DataStax Enterprise\
    \ (DSE). This tool helps you manage database schemas, develop queries, and tune\
    \ Cassandra performance.\n*   DataStax Studio: The DataStax Studio is an interactive\
    \ tool that uses DSE Graph to explore and visualize large data sets.\n*   Database\
    \ Drivers: DataStax offers database drivers that support languages such as C#,\
    \ Java, Node.js, ODBC, Python, PHP, and Ruby.\n\n## Summary\n\nCassandra is a\
    \ powerful NoSQL database that significantly differs from a relational database.\
    \ This chapter explained the ways in which Cassandra differs from a relational\
    \ database, and how it solves problems that relational databases don’t handle\
    \ well.\n\nCassandra is designed for specific use cases, and if your needs are\
    \ different, it may be an inappropriate solution for you.\n\nUnderstanding the\
    \ ACID requirements and the CAP theorem helps you realize the significance of\
    \ Cassandra’s eventual consistency principle.\n\nAlthough Cassandra shares some\
    \ optimization strategies with relational databases, it also makes use of unique\
    \ strategies such as bloom filters to optimize database performance.\n\nThe chapter\
    \ reviewed the essentials of what a Cassandra database administrator ought to\
    \ know.\n\nUnderstanding Cassandra specific concepts, such a snitches, gossip,\
    \ and replication strategies, is critical to your success as a Cassandra administrator.\n\
    \n# 2. Installing Cassandra and Getting Started with CQL Shell\n\nIn this chapter,\
    \ you’ll learn how to install Cassandra and create a single-node Cassandra “cluster.”\
    \ Once you get your feet wet, it’s an easy transition to creating and configuring\
    \ a multi-node Cassandra cluster, which is the topic I discuss in Chapter [3](#A436674_1_En_3_Chapter.html).\n\
    \nOnce you create a Cassandra cluster, you learn how to work with `cqlsh`, the\
    \ command line interface to the CQL shell. By the time you complete this chapter,\
    \ you’ll know how to start and stop your cluster, how to create keyspaces and\
    \ tables, and how to insert and query data.\n\n## Installing Apache Cassandra\n\
    \nCassandra is easy to set up and get going with. In this section, I show how\
    \ to install Cassandra on Linux, specifically on an Ubuntu 16.04 LTS server.\n\
    \nOnce you learn how to install Cassandra, I show how to create a simple one-node\
    \ Cassandra cluster on a single machine. In Chapter [3](#A436674_1_En_3_Chapter.html),\
    \ I show how to create a Cassandra cluster with multiple nodes.\n\n### Planning\
    \ the Installation\n\nI use an Ubuntu 16.04 LTS server running on VMware to show\
    \ the installations. The server has 4GB of RAM and 20GB of storage.\n\nBefore\
    \ you start with the installation of Cassandra, you need to create a user and\
    \ group that will manage Cassandra on your server. Name the user `cassandra` and\
    \ the group `cassandra` as well. Here are the steps to create the user and the\
    \ group:\n\n```\n$ sudo groupadd –r cassandra\n$ sudo useradd –r –m cassandra\
    \ –g cassandra –G users\n```\n\n### Prerequisites for Installing Cassandra\n\n\
    There are two basic prerequisites that you need before you can install Cassandra:\
    \ you must install the correct version of Java, and you need the latest version\
    \ of Python.\n\nThe following two sections show how to install Java and Python,\
    \ should it be necessary to do so.\n\n#### Java\n\nYou need the latest 64-bit\
    \ version of Java 8, and either the Oracle Java Standard Edition or OpenJDK 8\
    \ will do (I use the Oracle JRE). You can check the version of the installed Java\
    \ software thus:\n\n```\n$ java -version\njava version \"1.8.0_101\"\nJava(TM)\
    \ SE Runtime Environment (build 1.8.0_101-b13)\nJava HotSpot(TM) 64-Bit Server\
    \ VM (build 25.101-b13, mixed mode)\n$\n```\n\nIf the output doesn’t show something\
    \ similar to `java version \"1.8.0_101\"` on the first line (there are three lines\
    \ in the output), you need to install Java. Follow these steps to install the\
    \ Oracle JDK.\n\n1.  Download the Oracle JDK installer from Oracle Java SE Downloads,\
    \ after accepting a license agreement. You can download the JDK by going here:\
    \ [`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
    2.  Make a directory for the JDK.\n\n    ```\n    $ sudo mkdir –p /usr/lib/jvm\n\
    \    ```\n\n3.  Install the JDK after unpacking the tarball.\n\n    ```\n    $\
    \ sudo tar zxf jdk-8u65-linux-x64.tr.gz –C /usr/lib/jvm\n    ```\n\n    You can\
    \ find the JDK files in the directory named `/usr/lbi/jvm/jdk-8u-version`.\n4.\
    \  You need to let the OS know about the new Java versions with the `alternatives`\
    \ command.\n\n    ```\n    $ sudo update-alternatives –install \"/usr/bin/java\"\
    \ \"java\" \"/usr/lib/jvm/jdk1.8.0_101/bin/java\"\n    ```\n\n5.  Run the `alternatives`\
    \ command again, this time to make the new JDK the default Java release.\n\n \
    \   ```\n    $ sudo update-alternatives –config java\n    ```\n\n    This command\
    \ makes sure that if you have multiple Java installations, the default version\
    \ is switched to the release you just installed.\n6.  Confirm that the install\
    \ was correct.\n\n    ```\n    $ java -version\n    java version \"1.8.0_101\"\
    \n    Java(TM) SE Runtime Environment (build 1.8.0_101-b13)\n    Java HotSpot(TM)\
    \ 64-Bit Server VM (build 25.101-b13, mixed mode)\n    $\n    ```"
