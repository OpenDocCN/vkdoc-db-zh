  trans: '

    ### 使用 JMX 客户端


    Cassandra 通过 Java 管理扩展（JMX）公开了大量的度量指标和管理操作命令。JMX 提供了用于监控和管理 Java 应用程序及服务的工具。它可以监控任何统计信息，并管理
    Java 应用程序以 MBean（管理 Bean）形式暴露的任何操作。


    JMX 还使你能够远程连接到集群的实例，从而监控 Cassandra 性能（内存、线程、CPU 使用率等）并通过帮助你修改某些运行时属性来管理 Cassandra。MBean
    是特殊的 JavaBean，使你能够从外部访问 JVM 内的资源。通过 JMX，你可以以编程方式检查各种条目的设置，例如内存、线程、CPU、Gossip 以及其他在
    JMX 中被检测的与 Cassandra 相关的组件。


    在底层，你执行的 `nodetool` 命令会访问 JMX 度量指标来完成其工作。Nodetool 支持关键的 JMX 度量指标和操作，以及额外的与 Cassandra
    管理相关的命令（例如 `proxyhistograms` 命令）。然而，nodetool 无法访问某些度量指标，在这些情况下，你可以使用通用的 JMX 客户端，例如
    JConsole 或 jmxsh，我将在以下章节中进行解释。


    ### JConsole


    JConsole 是一个 JMX 客户端，它捕获 Cassandra 公开的 JMX 度量指标和操作，并以图形化方式显示它们。JConsole 是管理 MBean
    的标准工具。JConsole 有时在连接远程服务器时难以使用，因为你必须在防火墙中开放其连接所需的端口。因此，此工具并非生产环境的理想选择，尽管它对开发和测试服务器非常棒。


    提示


    由于 JConsole 消耗大量资源，DataStax 建议你在未托管 Cassandra 实例的节点上运行该工具。


    JConsole 提供有关内存和线程使用情况、Java 类加载以及 Java 虚拟机（JVM）和 MBean 的其他信息。你可以使用“内存”选项卡执行 Java
    垃圾回收。


    JConsole 提供的一个关键度量指标是压缩度量指标。通过监控压缩度量指标，你可以判断何时需要为集群增加容量。


    你可以通过 JConsole 连接到 Cassandra 实例。为此，首先启动 JConsole。


    ```

    # /usr/lib/jvm/java-8-oracle/bin/jconsole

    ```


    你将看到 `jconsole:New Connection` 页面出现，如图 10-1 所示。选择“远程进程”按钮并输入 Cassandra 节点的地址和端口（在我的情况下是
    102.168.19.129:7199）。


    ![A436674_1_En_10_Fig1_HTML.jpg](img/A436674_1_En_10_Fig1_HTML.jpg)


    图 10-1：JConsole 新建连接登录页面


    登录后，你将看到以下选项卡：概览、内存、线程、类、VM 摘要和 MBeans。图 10-2 显示了“概览”选项卡。每个表格都提供一组图表，展示了 Cassandra
    节点中各种资源的快照。


    ![A436674_1_En_10_Fig2_HTML.jpg](img/A436674_1_En_10_Fig2_HTML.jpg)


    图 10-2：JConsole 概览选项卡


    以下是各 JConsole 选项卡的描述：


    *   **概览**：提供一组四个图表，用于跟踪 CPU、内存、线程和类。

    *   **内存**：显示 Java 堆使用的当前状态。你还可以从该选项卡查看垃圾回收度量指标，并在此手动启动垃圾回收。

    *   **线程**：显示各个线程阶段（例如压缩和垃圾回收）的当前和峰值使用模式。

    *   **类**：提供一个图表，显示 JVM 当前或在特定时间范围内加载了多少类。

    *   **VM 摘要**：提供垃圾回收、类和内存相关统计信息的非常有用的摘要。

    *   **MBeans**：使你能够访问监控 Cassandra 节点的 MBean。


    Jmxsh 是一个用于支持 JMX 的 Java 进程的命令行界面。该工具允许你从外部调用正在运行的 Java 进程中的方法。你可以运行命令；还有一个菜单驱动的界面来浏览
    MBean、操作和属性。你可以从 [`http://code.google.com/p/jmxsh/downloads/list`](http://code.google.com/p/jmxsh/downloads/list)
    下载 jmxsh。你可以在 [`http://code.google.com/p/jmxsh/wiki/Summary`](http://code.google.com/p/jmxsh/wiki/Summary)
    阅读文档。


    下载 jmxsh 后（在我的情况下是 `jmxsh-R5.jar`），通过运行以下命令将 jmxsh 连接到 Cassandra，使用默认的 JMX 端口：


    ```

    $ java -jar jmxsh-R5.jar -h ubuntu -p 7199

    jmxsh v1.0, Tue Jan 22 08:23:12 PST 2008

    Type ''help'' for help.  Give the option ''-?'' to any command

    for usage help.

    Starting up in shell mode.

    %

    ```


    你现在已连接到 Cassandra。你可以通过运行以下 jmxsh 命令来获取堆转储：


    ```

    % jmx_invoke -m com.sun.management:type=HotSpotDiagnostic dumpHeap /tmp/heapdump.hprof
    false

    ```


    你可以通过运行以下命令批量加载 Cassandra 表：


    ```

    % jmx_invoke -m org.apache.cassandra.db:type=StorageService bulkLoad /path/to/SSTables

    ```


    jmxsh 还提供浏览器模式。在 jmxsh 提示符处按 Enter 键进入浏览器模式：


    ```

    Entering browse mode.

    ====================================================

    Available Domains:

    1. java.util.logging

    2. org.apache.cassandra.service

    3. org.apache.cassandra.db

    4. org.apache.cassandra.metrics

    5. java.nio

