    ```


    ## 使用线程池统计信息 (nodetool tpstats)


    `nodetool tpstats` 命令显示线程池的使用统计信息。Cassandra 将任务分为不同的阶段，每个阶段使用单独的队列和线程池。消息服务连接各个阶段。


    `nodetool tpstats` 命令通过线程池提供有关操作每个阶段的信息。它显示以下内容：


    *   活动线程数

    *   等待线程池执行的请求数

    *   线程池已完成的任务数

    *   由于下一步的线程池已满而被阻塞的请求数

    *   截至当前时间，此线程池中被阻塞的请求总数


    当您刷新内存表或数据库压缩任何 SSTable 时，数据库会刷新 `nodetool tpstats` 命令提供的信息。


    以下示例展示了如何运行 `nodetool tpstats` 命令：


    ```

    $ nodetool tpstats

    Pool Name              Active   Pending      Completed   Blocked  All time blocked

    ReadStage                   0         0              0         0       0

    MiscStage                   0         0              0         0       0

    CompactionExecutor          0         0           5532         0       0

    MutationStage               0         0           1028         0       0

    MemtableReclaimMemory       0         0             29         0       0

    PendingRangeCalculator      0         0              2         0       0

    GossipStage                 0         0          26038         0       0

    SecondaryIndexManagement    0         0              0         0       0

    HintsDispatcher             0         0              0         0       0

    RequestResponseStage        0         0           1031         0       0

    Native-Transport-Requests   0         0              0         0       0

    ReadRepairStage             0         0              0         0       0

    CounterMutationStage        0         0              0         0       0

    MigrationStage              0         0              0         0       0

    MemtablePostFlush           0         0             73         0       0

    PerDiskMemtableFlushWriter_ 0         0              0        29       0

    ValidationExecutor          0         0              2         0       0

    Sampler                     0         0              0         0       0

    MemtableFlushWriter         0         0             29         0       0

    InternalResponseStage       0         0              2         0       0

    ViewMutationStage           0         0              0         0       0

    AntiEntropyStage            0         0              8         0       0

    CacheCleanupExecutor        0         0              0         0       0

    Message type Dropped

    READ                        0

    RANGE_SLICE                 0

    _TRACE                       0

    HINT                         0

    MUTATION                     0

    COUNTER_MUTATION             0

    BATCH_STORE                  0

    BATCH_REMOVE                 0

    REQUEST_RESPONSE             0

    PAGED_RANGE                  0

    READ_REPAIR                  0

    $

    ```


    `nodetool tpstats` 命令的输出显示了与数据库任务相关的特定线程池的统计信息。所有这些详细信息在您排查问题或调整数据库时非常有用。您可以根据池中的活动确定解决性能问题的策略。池中的高数值指向数据库中问题的症状。


    以下是线程池、与这些池相关的任务以及您可以采取的改进措施的简要列表。


    *   `AntiEntropyStage`: 此池处理修复消息。您可以使用 `nodetool repair` 命令执行修复。

    *   `GossipStage`: 分发节点信息。由于某些模式彼此不同步，您可能会在此池中看到问题。使用 `nodetool resetlocalschema`
    命令同步模式。

    *   `HintedHandoff`: 将错过的更改（如更新和删除）发送到其他节点。有时由于各种原因，您会看到移交过程出现问题。您可以使用 `nodetool
    disablehandoff` 和 `nodetool repair` 命令来修复与移交相关的问题。

    *   `MutationStage`: 此阶段在本地节点上执行插入和更新，并重放提交日志。进行中的提示也是此阶段的一部分。如果您看到待处理写入请求数量很高，可能表明节点过载。您可以添加节点或重写代码以减少变更。

    *   `ReadRepairStage` : 此阶段显示执行读修复的等待。如果 `Pending` 数字很高，您可以为经常读取的表降低 `read_repair_chance`
    值，例如设置为 0.11。表的 `read_repair_chance` 属性是成功的读操作将触发读修复的概率（默认值为 0.0）。


    您可以密切监视线程池统计信息，如果您看到 `Pending` 任务列的值持续增加，那么就该为集群增加额外容量了。


    `nodetool tpstats` 命令输出的底部是关于此节点丢弃消息的部分，意思是该节点收到的消息超出了其处理能力。如果您看到大量的被阻塞任务和/或丢弃的消息，则意味着数据库难以跟上当前的工作负载。

    '
- fmt: '### Using JMX Clients


    Cassandra exposes numerous metrics and management operation commands over Java
    Management Extensions (JMX). JMX provides tools for monitoring and managing Java
    applications and services. It can monitor any statistics and manage any operations
    that Java applications expose as MBeans (management beans).


    JMX also enables you to remotely connect to a cluster’s instances so you can monitor
    Cassandra performance (memory, threads, CPU usage, etc.) and manage Cassandra
    by helping you modify certain runtime properties. MBeans are special JavaBeans
    that enable you to access resources inside the JVM externally. Through JMX, you
    can programmatically review settings for various entries such as memory, threads,
    CPU, Gossip, and other Cassandra-related components that are instrumented in JMX.


    Under the covers, `nodetool` commands that you execute access JMX metrics to do
    their work. Nodetool supports key JMX metrics and operations, as well as additional
    Cassandra administration-related commands (such as the `proxyhistograms` command).
    However, nodetool can’t access some metrics, and in those cases, you can use a
    general purpose JMX client such as JConsole or jmxsh, as I explain in the following
    sections.


    ### JConsole


    JConsole is a JMX client that captures JMX metrics and operations exposed by Cassandra
    and displays them in a graphical format. JConsole is a standard tool for managing
    MBeans. JConsole is at times hard to use with remote servers because you must
    have ports open in the firewall for its connections. This tool is thus not ideal
    for a production environment, although it’s great for development and test servers.


    Tip


    Since JConsole consumes a lot of resources, DataStax recommends that you run the
    tool on a node that doesn’t host a Cassandra instance.


    JConsole provides information about memory and thread usage, Java class loading,
    and other information about the Java Virtual machine (JVM), and MBeans. You can
    use the Memory tab to perform a Java garbage collection.


    A key metric offered by the JConsole is compaction metrics. By monitoring compaction
    metrics, you can figure out when to add capacity to a cluster.


    You can connect to a Cassandra instance through JConsole. To do this, first start
    up JConsole.


    ```

    # /usr/lib/jvm/java-8-oracle/bin/jconsole

    ```


    You’ll see the `jconsole:New Connection` page appear, as shown in Figure 10-1.
    Select the Remote process button and enter the address of the Cassandra node and
    the port (in my case, 102.168.19.129:7199).


    ![A436674_1_En_10_Fig1_HTML.jpg](A436674_1_En_10_Fig1_HTML.jpg)


    Figure 10-1: The JConsole New Connection login page


    Once you log in, you’ll see the following tabs: Overview, Memory, Threads, Classes,
    VM Summary, and MBeans. Figure 10-2 shows the Overview tab. Each of the tables
    presents a set of graphs that offer a snapshot of various resources in the Cassandra
    node.


    ![A436674_1_En_10_Fig2_HTML.jpg](A436674_1_En_10_Fig2_HTML.jpg)


    Figure 10-2: The JConsole Overview tab


    The following is a description of the various JConsole tabs:


    *   **Overview**: Presents a set of four graphs for tracking CPU, memory, threads,
    and classes.

    *   **Memory**: Shows the current state of the Java heap usage. You can also view
    garbage collection metrics from this tab and manually start garbage collection
    from here.

    *   **Threads**: Shows the current and peak usage pattern of various thread stages,
    such as compaction and garbage collection.

    *   **Classes**: Presents a graph showing how many classes are loaded in the JVM
    currently or during a specific time range.

    *   **VM Summary**: Presents a very useful summary of garbage collection, classes,
    and memory-related statistics.

    *   **MBeans**: Enables access to MBeans that monitor the Cassandra node.


    Jmxsh is a command-line interface to JMX-enabled Java processes. The tool allows
    you to invoke methods in running Java processes from outside the process. You
    can run commands; there’s also a menu-driven interface to browse MBeans, operations,
    and attributes. You can download jmxsh from [`http://code.google.com/p/jmxsh/downloads/list`](http://code.google.com/p/jmxsh/downloads/list).
    You can read the documentation at [`http://code.google.com/p/jmxsh/wiki/Summary`](http://code.google.com/p/jmxsh/wiki/Summary).


    Once you download jmxsh (`jmxsh-R5.jar` in my case), connect jmxsh to Cassandra
    by running the following command, using the default JMX port:


    ```

    $ java -jar jmxsh-R5.jar -h ubuntu -p 7199

    jmxsh v1.0, Tue Jan 22 08:23:12 PST 2008

    Type ''help'' for help.  Give the option ''-?'' to any command

    for usage help.

    Starting up in shell mode.

    %

    ```


    You’re now connected to Cassandra. You can take a heap dump by running the following
    jmxsh command:


    ```

    % jmx_invoke -m com.sun.management:type=HotSpotDiagnostic dumpHeap /tmp/heapdump.hprof
    false

    ```


    You can bulk load Cassandra tables by running the following command:


    ```

    % jmx_invoke -m org.apache.cassandra.db:type=StorageService bulkLoad /path/to/SSTables

    ```


    jmxsh also offers a browser mode. You enter the browser mode by pressing enter
    at the jmxsh prompt:


    ```

    Entering browse mode.

    ====================================================

    Available Domains:

    1. java.util.logging

    2. org.apache.cassandra.service

    3. org.apache.cassandra.db

    4. org.apache.cassandra.metrics

    5. java.nio

    6. org.apache.cassandra.hints

    7. JMImplementation

    8. java.lang

    9. com.sun.management

    10. ch.qos.logback.classic

    11. org.apache.cassandra.internal

    12. org.apache.cassandra.request

    13. org.apache.cassandra.net

    SERVER: service:jmx:rmi:///jndi/rmi://ubuntu:7199/jmxrmi

    ====================================================

    Select a domain:

    ```


    With this introduction to JMX clients under your belt, let’s turn to how you can
    manage Cassandra’s logging capabilities.


    ### Logging


    There are two main Cassandra logs: `system.log` and `debug.log`. The `system.log`
    file logs all activity in the database, including the startup and shutdown activity,
    as well as all node-related tasks activity. It also logs all changes you make
    to the database schemas such as modifications to keyspaces and tables.


    Logging in Cassandra uses the Simple Logging façade for Java (SLF4J) with a logback
    backend. You can configure logging programmatically or manually. In this chapter,
    I focus on the manual configuration of logging, which you can do through one of
    the following ways.


    *   By configuring the `logback.xml` file. By default, logback looks for the `logback-test.xml`
    and the `logback.xml` files, in that order, for logging configuration details.

    *   You can configure the logging levels by running the `nodetool setlogginglevel`
    command.

    *   You can also configure logging through a JMX client such as the JConsole tool.


    The following sections explain how to configure logging using all three methods.
    But first, let me explain how to set the logging locations where Cassandra stores
    the various logging files.'
