    Token                  : (invoke with -T/--tokens to see all 256 tokens)

    $

    ```


    ### Using Thread Pools Statistics (nodetool tpstats)


    The `nodetool tpstats` command shows the usage statistics of thread pools. Cassandra
    breaks tasks into stages, with each stage using a separate queue and a thread
    pool. A messaging service connects the various stages.


    The `nodetool tpstats` command provides information about each stage of an operation
    by thread pool. It shows the following things:


    *   Number of active threads

    *   Number of requests waiting to be executed by a thread pool

    *   Number of tasks a thread pool has completed

    *   Number of blocked requests due to the thread pool in the next step being full

    *   Number of total blocked requests in this thread pool up until this point in
    time


    The database refreshes the information that the `nodetool tpstats` command provides
    when you flush memtables or when the database compacts any SSTables.


    Here’s an example showing how to run the `nodetool` `tpstats` command:


    ```

    $ nodetool tpstats

    Pool Name              Active   Pending      Completed   Blocked  All time blocked

    ReadStage                   0         0              0         0       0

    MiscStage                   0         0              0         0       0

    CompactionExecutor          0         0           5532         0       0

    MutationStage               0         0           1028         0       0

    MemtableReclaimMemory       0         0             29         0       0

    endingRangeCalculator       0         0              2         0       0

    GossipStage                 0         0          26038         0       0

    SecondaryIndexManagement    0         0              0         0       0

    HintsDispatcher             0         0              0         0       0

    RequestResponseStage        0         0           1031         0       0

    Native-Transport-Requests   0         0              0         0       0

    ReadRepairStage             0         0              0         0       0

    CounterMutationStage        0         0              0         0       0

    MigrationStage              0         0              0         0       0

    MemtablePostFlush           0         0             73         0       0

    PerDiskMemtableFlushWriter_ 0         0              0        29       0

    ValidationExecutor          0         0              2         0       0

    Sampler                     0         0              0         0       0

    MemtableFlushWriter         0         0             29         0       0

    InternalResponseStage       0         0              2         0       0

    ViewMutationStage           0         0              0         0       0

    AntiEntropyStage            0         0              8         0       0

    CacheCleanupExecutor        0         0              0         0       0

    Message type Dropped

    READ                        0

    RANGE_SLICE                 0

    _TRACE                       0

    HINT                         0

    MUTATION                     0

    COUNTER_MUTATION             0

    BATCH_STORE                  0

    BATCH_REMOVE                 0

    REQUEST_RESPONSE             0

    PAGED_RANGE                  0

    READ_REPAIR                  0

    $

    ```


    The output of the `nodetool tpstats` command shows statistics pertaining to specific
    thread pools associated with tasks in the database. All this detailed information
    is quite useful to you when you’re troubleshooting issues or tuning the database.
    You can determine strategies to fix performance issues based on the activity in
    the pools. High numbers in a pool point to symptoms of problems in the database.


    The following is a brief list of the thread pools, the tasks associated with those
    pools, and the actions you can perform to improve things.


    *   AntiEntropyStage: This pool processes repair messages. You can use the `nodetool
    repair` command to perform repairs.

    *   GossipStage: Distributes the node information. You may see issues in this
    pool due to some schemas being out of sync with each other. Use the `nodetool
    resetlocalschema` command to sync the schemas.

    *   HintedHandoff: Sends missed changes such as updates and deletes to other nodes.
    Sometimes you’ll see issues with the handoff process due to various reasons. You
    can use the `nodetool disablehandoff` and the `nodetool repair` commands to fix
    handoff related issues.

    *   MutationStage: This stage performs inserts and updates on the local node and
    replays the commitlog. Hints in progress are also part of this stage. If you see
    a high number of pending write requests, it may indicate that the node is overloaded.
    You can add nodes or rewrite code to reduce the mutations.

    *   `ReadRepairStage` : This stage shows the waits for performing read repairs.
    If the `Pending` numbers are high, you can lower the `read_repair _chance` value
    for tables that are read often, to value such as 0.11\. The `read_repair_chance`
    attribute for a table is the probability that a successful read operation will
    trigger a read repair (the default value is 0.0).


    You can monitor the thread pool statistics closely, and if you see a consistent
    increase in the Pending tasks column values, you know it’s time to add additional
    capacity to the cluster.


    At the bottom of the output for the `nodetool tpstats` command is a section for
    dropped messages for this node, meaning that the node received more messages than
    it could handle. If you see a significant number of blocked tasks and/or dropped
    messages, it means the database is having trouble keeping up with the current
    workloads.'
