    writer wins” strategy, user-specified conflict handlers, and so on. The database
    normally uses timestamps to detect the concurrency among the updates.


    ### Repairing Data


    Reconciliation of disparate concurrent writes must happen sometime before the
    next read occurs, and the database can schedule it at different points, such as
    the following:


    *   Read repair: The reconciliation or correction happens when a read finds an
    inconsistency. Obviously, this will affect the speed of the read operations.

    *   Write repair: The reconciliation or correction occurs during write operations.
    Any inconsistencies found during writes will slow down the write operations.

    *   Asynchronous repair: The corrections aren’t part of a read or write operation.


    When data is read, a read repair can resolve any data inconsistencies. When data
    isn’t read, you need to use either the hinted handoff or anti-entropy mechanism
    to resolve any data inconsistences. Chapter [5](#A436674_1_En_5_Chapter.html)
    explains the various types of repairs .


    ## How Cassandra Writes Data


    Cassandra uses a multi-stage write path, which has the following stages:


    *   First, it logs the writes in the commit log.

    *   Next, it writes the data to the memtable in memory.

    *   Finally, it flushes the data from the memtable to permanent storage on disk
    in SSTables.


    In the following sections, I elaborate on the three main stages of the write path.'
  trans: '

    ## 最终一致性的概念


    一致性是指读取操作必须始终返回最新写入的数据。即使数据库正在同时更新数据，所有客户端对于数据的某个元素也将读取到相同的值。


    像 `Cassandra` 这样的数据库必须在数据一致性、可用性和分区容错性之间做出权衡，这三者是布鲁尔阐述的 `CAP` 定理的三个支柱。可用性是指所有客户端都能够访问数据，从而可以读取和写入数据。分区容错性是指数据库可以被拆分到多台机器上，并且即使在网络分区中断期间也能持续运作。由于网络问题使得临时分区不可避免，在现实生活中，你确实需要在可用性和一致性之间做出选择。


    在现实世界中，并非只有单一的一致性概念，而是存在多个一致性等级。最严格的一致性模型是 `严格一致性`，它要求每次读取都必须返回最后一次写入的值。在分布式系统中，强制实施
    `严格一致性` 很困难。例如，数据库需要以同步方式执行所有更新（`insert`/`delete`/`update`）操作，使用锁来防止访问尚未修改的副本。这当然会阻塞用户，而且如果在更新操作完成之前出现任何类型的故障，如网络或服务器故障，数据将变得不可用。


    `严格一致性` 在数据库确定你正在查看的是最近更新的值之前，根本不会允许你窥探数据。数据库宁愿变得不可用，也不会向你展示不一致的值。


    `最终一致性` 要求分布式数据库中数据所有副本（`replicas`）上的所有更新最终必须存在，但允许这个过程花费一点时间。也就是说，尽管在变更之后副本的值可能暂时不同，但在一段时间之后（最终），所有副本都将变得一致。


    `Cassandra` 实现了 `可调一致性`，你可以在一致性级别和复制因子之间进行权衡。复制因子越高，性能越差，但你会获得更高的一致性。你选择的一致性级别告诉数据库，对于一次写入或读取查询，必须有多少个副本确认成功写入或做出响应，该操作才会被视为成功。


    你可以为读取和写入指定一致性级别。更高的一致性级别要求更多节点响应读取或写入操作，这意味着数据更可靠，因为多个副本显示的值是相同的。


    快速写入是这里的目标：虽然你可以将一致性级别设置为与复制因子相同，但所获得的更强一致性是以性能为代价的。一致性级别通常设置为低于复制因子的值，这样即使某些节点不可用，更新也被认为是成功的。即使在部分故障期间，`Cassandra`
    也会持续更新数据。


    ### 一致性冲突解决


    由于 `最终一致性` 只保证读取最终会返回相同的值，但不提供任何安全性保证，因此它可以在数据收敛之前返回一个值。


    为确保副本最终一致，一个最终一致性系统必须通过以下两个步骤来协调同一数据项的多个版本之间的差异：


    *   `反熵`：涉及在节点之间交换数据的版本。

    *   `调和`：当并发更新更改数据时，涉及为数据选择合适的最终状态。


    有几种方法来调和并发写入，例如“最后写入者胜”策略、用户指定的冲突处理器等。数据库通常使用时间戳来检测更新之间的并发性。


    ### 修复数据


    不同的并发写入的调和必须在下次读取发生之前的某个时间进行，数据库可以在不同的时间点调度它，例如：


    *   `读修复`：当读取发现不一致时进行调和或纠正。显然，这会影响读取操作的速度。

    *   `写修复`：在写入操作期间进行调和或纠正。写入期间发现的任何不一致都会减慢写入操作的速度。

    *   `异步修复`：纠正操作不属于读取或写入操作的一部分。


    当读取数据时，`读修复` 可以解决任何数据不一致问题。当数据未被读取时，你需要使用 `暗示移交` 或 `反熵` 机制来解决任何数据不一致问题。第 5 章解释了各种类型的修复。


    ## Cassandra 如何写入数据


    `Cassandra` 使用多阶段写入路径，包含以下阶段：


    *   首先，它将写入记录在 `提交日志` 中。

    *   接下来，它将数据写入内存中的 `memtable`。

    *   最后，它将数据从 `memtable` 刷新到磁盘上的永久存储中，以 `SSTables` 格式保存。


    在接下来的章节中，我将详细阐述写入路径的三个主要阶段。

    '
- fmt: '### Writing to the Commit Log to Protect the Changes


    The first thing Cassandra does when writing data is to append the writes to the
    commit log on disk. The idea here is to protect the writes from things such as
    a power failure on the nodes. Thus, the commit log is a crucial component of Cassandra’s
    durability guarantee.


    The database considers a write to be successful only after it writes the data
    to the commit log. If a database crashes right after the database writes to the
    commit log, no problem. Once the database comes up, the first thing it does is
    replay the commit log to recover all transactions that are in there but weren’t
    written to the SSTables. A commit log serves just one purpose: to hold committed
    data until it’s permanently written to disk in the SSTables.


    By default, the database stores the commit log in the `/var/lib/cassandra/commitlog`
    directory, but you can specify a custom location by setting the `commitlog_directory`
    property. Ideally, you must store the commit log on a physical device that’s separate
    from the devices where you store the data file directories.


    The database flushes memtables to disk when the space configured for the commit
    log reaches its limit. The database flushes the oldest commit log segments first
    and removes the log segments from the commit log.


    When you start up the database, it replays the commit log. You can reduce the
    replay time by making sure the commit log isn’t too big. Of course, if you configure
    too small a commit log, the database will be flushing data to disk quite often
    for active tables.


    You manage the commit log by setting the following properties in the `cassandra.yaml`
    file:


    *   `commitlog_total_space_in_mb`: Configures the total space for the commit log.
    The default value is 8192MB for 64-bit JVMs.

    *   `commitlog_compression`: By default, the database doesn’t compress the commit
    log, but you can make it compress the commit log by setting either LZ4, Snappy,
    or Deflate as the value for this parameter.


    The database archives the commit log at the following times:


    *   When the node starts up

    *   When it writes a commit log to disk

    *   At a point in time that you specify


    You configure commit log archiving in the `commitlog_archiving.properties` file,
    which is located in


    *   `/etc/cassandra/commitlog_archiving.properties` (package installations)

    *   `install_location/conf/commitlog_archiving.properties` (tarball installations)


    You can archive a commit log segment with the `archive_command` command:


    ```

    $ archive_command=/bin/ln %path /backup/%name

    ```


    In this example, `path` refers to the path of the commit log you want to archive
    and `name` refers to the name of the commit log.


    To restore an archived commit log, execute the `restore_command` command:


    ```

    $ restore_command -cp -f %from %to

    ```


    The `from` parameter specifies the path of the archived commit log segment in
    the restore directories. The parameter `to` refers to the name of the current
    commit log directory.


    You can set the location of the restore directory by specifying the path as follows
    in the `cassandra.yaml` file:


    ```

    restore_directories=

    ```


    ### Writing to the Memtable for Durability


    Cassandra is designed to consume a large amount of data as fast as it can. To
    achieve this goal, Cassandra writes all new data first to a commit log on disk
    to ensure its safety, as explained earlier. Writes to the commit log are durable
    and survive incidents such as a power failure.


    Once the database writes the change to the commit log, it writes that data also
    to the memtable, which lives only in memory. To provide durability, Cassandra
    considers the write successful once it completes writing the new data to both
    the commit log and a memtable.


    It’s important to understand that a commit log serves only to support the durability
    of data in case of an unexpected incident that may otherwise cause you to lose
    data. The memtables, on the other hand, are the mechanism that the database employs
    to permanently write data to the SSTables on disk.


    #### Configuring the Flushing of Data from the Memtable


    Each memtable is dedicated to storing data for a specific table, and there may
    be multiple memtables per table. One of these is the memtable the database currently
    writes data to, and the rest, memtables that are full and are waiting for the
    database to flush them to disk. Once a memtable reaches its memory limit (that
    is, once the memtable is full), Cassandra writes all the memtable’s data to disk
    in an SSTable, which is a file. Following this, it creates a new memtable.


    Cassandra flushes the memtables to disk when either the commit log space threshold
    or the memtable cleanup threshold is reached.


    #### Configuring the Commit Log Space Threshold


    You configure the total space used for commit logs with the `commitlog_total_space_in_mb`
    property. You configure the commit log on a per node basis. When the total space
    occupied by all commit logs in the database crosses the value you set for this
    property, the database flushes memtables to disk for the oldest commitlog segments.


    The default value of the `commitlog_total_space_in_mb` property is 8192MB. Setting
    a limit for the total space that the commit log can occupy will prevent tables
    that you rarely update from holding onto the commit log segments forever.


    If you set too low a value for the `commitlog_total_space_in_mb` property, all
    tables will experience more frequent flushing activity.


    Note


    You configure a commit log on a per-node basis, and all the tables in the database
    share this log. The database maintains the memtables and SSTables on a per-table
    basis.


    #### Configuring the Memtable Cleanup Threshold


    You can also configure the `memtable_cleanup_threshold` property to set the total
    amount of memory that all memtables together can use before the database flushes
    the largest memtable.


    The `memtable_cleanup_threshold` property is now deprecated, so I won’t discuss
    this property further.


    Both the size of the data in your database and the nature of the write load will
    determine how you set the memtable thresholds. If there are many writes, or if
    the writes include a high volume of updates of small chunks of data, increasing
    the memtable thresholds is in order.'
