    cycling_admin | cycling_admin |  |     CREATE\ncycling_admin | cycling_admin |\
    \  |      ALTER\ncycling_admin | cycling_admin |  |       DROP\ncycling_admin\
    \ | cycling_admin |  |     SELECT\ncycling_admin | cycling_admin |  |     MODIFY\n\
    cycling_admin | cycling_admin |  |  AUTHORIZE\n(6 rows)\ncassandra@cqlsh>\n```\n\
    \nConfiguring Firewall Ports    for Access\n\nCassandra nodes require several\
    \ firewall ports to be open so they can\ncommunicate. Some of the nodes that should\
    \ be open are public and others\nare inter-node or Cassandra-specific ports.\n\
    \nEnsure that the following ports are open:\n\nType of Port\n |\n  Port Number\n\
    \ |\n  Port Function\n |\n\nPublic\n |\n\n|\n  SSH Port\n |\n\nCassandra (inter-node)\n\
    \ |\n\n|\n  For inter-node cluster communications\n |\n\nCassandra (inter-node)\n\
    \ |\n\n|\n  For SSL inter-node communications\n |\n\nCassandra (inter-node)\n\
    \ |\n\n|\n  JMX monitoring port\n |\n\nCassandra (client)\n |\n\n|\n  Client port\n\
    \ |\n\nCassandra (client)\n\n|\n\n|\n  Default for native transport protocol (when\
    \ you need encrypted and\nnonencrypted communications)\n |\n\nEncrypting Cassandra\
    \ with SSL"
  trans: "\n# 配置基于角色的访问控制\n\n数据库角色是你授予访问其他数据库资源权限的载体。基于角色的访问控制是指将角色分配给用户，而不是直接分配访问各种数据库资源的权限。\n\
    \n通常，在其他数据库中，要使用角色来管理对数据库对象的访问，你必须按以下顺序操作：\n\n*   创建用户。\n*   创建角色。\n*   向新角色授予对各种数据库资源的权限。\n\
    *   将该角色授予新用户。\n\n你在 Cassandra 数据库中实现 RBAC 也遵循相同的策略，不同之处在于，你不是将角色授予用户，而是将它们授予（登录）角色（正如我之前解释的，这些角色在\
    \ Cassandra 中代表用户）。\n\n在接下来的部分中，我将展示如何配置 RBAC。\n\n## 为登录账户创建角色\n\n当你想授予用户或应用程序访问权限时，你需要创建一个角色。以下示例展示了如何创建名为\
    \ `manager` 的登录角色：\n\n```\ncqlsh> create role manager\n... with password = 'Password123'\n\
    ... and LOGIN = true;\n```\n\n默认情况下，`LOGIN` 属性的值为 `false`，意味着该角色无法登录数据库。在此场景中，你希望\
    \ `manager` 角色能够登录数据库并作为登录角色使用。因此，你将 `LOGIN` 属性设置为 `true`。\n\n`list roles` 命令显示新角色已成功创建。\n\
    \n```\ncqlsh> list roles;\nrole      | super | login | options\n-----------+-------+-------+---------\n\
    cassandra |  True |  True |        {}\n    manager | False |  True |        {}\n\
    \      test | False |  True |        {}\n     test1 | False |  True |        {}\n\
    (4 rows)\ncqlsh>\n```\n\n你可以测试新账户的登录能力。\n\n```\n$ cqlsh 192.168.159.129 -u cassandra\
    \ -p cassandra\nConnected to Test Cluster at 192.168.159.129:9042.\n[cqlsh 5.0.1\
    \ | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\n\
    cassandra@cqlsh> login manager\nPassword:\nmanager@cqlsh>\n```\n\n`cqlsh` 提示符（`manager@cqlsh`）显示了角色的名称，本例中为\
    \ `manager`。\n\n你可以通过运行 `ALTER ROLE` 命令来更改已启用登录的角色的密码，如下所示：\n\n```\ncqlsh>ALTER\
    \ ROLE manager WITH PASSWORD = 'manager';\ncqlsh>\n```\n\n## 向角色授予权限\n\n你也可以创建一个角色，并向该角色授予对一个或多个数据库对象的各种权限。然后，你可以将此角色分配给一个登录角色。\n\
    \n### Cassandra 中的对象权限\n\n你可以向经过身份验证的角色授予以下数据库对象的对象权限：\n\n*   键空间\n*   表\n*  \
    \ 函数\n*   聚合\n*   角色\n*   MBeans\n\n以下是你可以在数据库对象上配置的权限类型：\n\n*   `CREATE`\n* \
    \  `ALTER`\n*   `DROP`\n*   `SELECT`\n*   `MODIFY`\n*   `DESCRIBE`\n\n### 向角色授予对象权限\n\
    \n以下示例展示了如何创建一个不用于登录的角色；而是使用该角色来授予对数据库对象的权限。你首先创建角色 `cycling_admin`，然后向该角色授予对键空间\
    \ `cycling` 的权限。接着，你将角色 `cycling_admin` 授予登录角色 `manager`。\n\n1.  使用 `CREATE ROLE`\
    \ 命令创建角色。\n\n    ```\n    cqlsh> create role cycling_admin;\n    ```\n\n    由于此角色用于分配对象权限而非登录账户，你没有设置\
    \ `SUPERUSER` 或 `LOGIN` 属性，这两者默认均为 `False`。\n\n    ```\n    cassandra@cqlsh> list\
    \ roles;\n    role         | super | login | options\n    --------------+-------+-------+---------\n\
    \    cassandra |  True |  True |        {}\n    cycling_admin | False | False\
    \ |        {}\n    manager | False |  True |        {}\n      test | False | \
    \ True |        {}\n     test1 | False |  True |        {}\n    (5 rows)\n   \
    \ cassandra@cqlsh>\n    ```\n\n2.  创建新角色后，向该角色授予对表空间（`cycling`）的权限。\n\n    ```\n\
    \    cqlsh> grant all permissions on keyspace cycling to cycling_admin;\n    ```\n\
    \n3.  将新角色 `cycling_admin` 授予你在上一节中创建的登录角色 `manager`。\n\n    ```\n    cqlsh> grant\
    \ cycling_admin to manager;\n    ```\n\n## 列出权限\n\n你可以使用 `list all permissions`\
    \ 命令列出授予角色的所有权限。\n\n```\ncassandra@cqlsh> list all permissions;\nrole        \
    \  | username      | resource             | permission\n---------------+---------------+----------------------+------------\n\
    \    cassandra |     cassandra |                |      ALTER\n    cassandra |\
    \     cassandra |                |       DROP\n    cassandra |     cassandra |\
    \                |  AUTHORIZE\n    cassandra |     cassandra |               \
    \     |      ALTER\n    cassandra |     cassandra |                    |     \
    \  DROP\n    cassandra |     cassandra |                    |  AUTHORIZE\n   \
    \ cassandra |     cassandra |                       |      ALTER\n    cassandra\
    \ |     cassandra |                       |       DROP\n    cassandra |     cassandra\
    \ |                       |  AUTHORIZE\n    cassandra |     cassandra |      \
    \                |      ALTER\n    cassandra |     cassandra |               \
    \       |       DROP\n    cassandra |     cassandra |                      | \
    \ AUTHORIZE\n cycling_admin | cycling_admin |                  |     CREATE\n\
    \ cycling_admin | cycling_admin |                  |      ALTER\n cycling_admin\
    \ | cycling_admin |                  |       DROP\n cycling_admin | cycling_admin\
    \ |                  |     SELECT\n cycling_admin | cycling_admin |          \
    \        |     MODIFY\n cycling_admin | cycling_admin |                  |  AUTHORIZE\n\
    \         test |          test |               |     SELECT\n         test | \
    \         test |            |      ALTER\n         test |          test |    \
    \        |     SELECT\n         test |          test |            |     MODIFY\n\
    (22 rows)\ncassandra@cqlsh>\n```\n\n查看查询输出中的 `Resource` 列，了解 Cassandra 如何为数据库中的三个角色分配不同的权限：默认的超级用户角色\
    \ `cassandra`、登录角色 `test` 和你创建的新角色 `cycling_admin`。\n\n### 查看授予角色的权限\n\n要查看授予特定角色的权限，请运行\
    \ `list all permissions of <role_name>` 命令：\n\n```\ncassandra@cqlsh> list all\
    \ permissions of manager;\nrole          | username      | resource          \
    \ | permission\n---------------+---------------+--------------------+------------\n\
    \ cycling_admin | cycling_admin |                |     CREATE\n cycling_admin\
    \ | cycling_admin |                |      ALTER\n cycling_admin | cycling_admin\
    \ |                |       DROP\n cycling_admin | cycling_admin |            \
    \    |     SELECT\n cycling_admin | cycling_admin |                |     MODIFY\n\
    \ cycling_admin | cycling_admin |                |  AUTHORIZE\n(6 rows)\ncassandra@cqlsh>\n\
    ```\n\n## 配置访问的防火墙端口\n\nCassandra 节点需要开放多个防火墙端口才能进行通信。其中一些需要开放的端口是公共的，另一些则是节点间或\
    \ Cassandra 特定的端口。\n\n确保以下端口开放：\n\n| 端口类型             | 端口号 | 端口功能           \
    \                                                  |\n| -------------------- |\
    \ ------ | --------------------------------------------------------------------\
    \ |\n| 公共                 |        | SSH 端口                                  \
    \                           |\n| Cassandra（节点间）  |        | 用于节点间集群通信        \
    \                                           |\n| Cassandra（节点间）  |        | 用于\
    \ SSL 节点间通信                                                  |\n| Cassandra（节点间）\
    \  |        | JMX 监控端口                                                       \
    \  |\n| Cassandra（客户端）  |        | 客户端端口                                     \
    \                      |\n| Cassandra（客户端）  |        | 原生传输协议的默认端口（当你需要加密和非加密通信时）\
    \                 |\n\n## 使用 SSL 加密 Cassandra\n"
- fmt: "# SSL加密配置指南\n\nSSL是一种安全协议，可在Cassandra客户端与节点之间以及节点之间的通信过程中对数据进行加密。每个参与通信的实体都必须拥有一个由该实体保管的私钥，以及一个与其他实体交换的公钥。服务器会向希望建立安全连接到Cassandra集群的客户端发送一个包含服务器公钥的证书。\n\
    \n> **注意**\n>\n> 除了连接数极高的情况，数据加密对性能的影响微乎其微。\n\nSSL加密可以通过加密节点间流动的数据来保护节点内部通信。您也可以设置客户端-节点SSL加密，以保护`cqlsh`或`nodetool`等客户端程序与集群节点之间传递的数据。\n\
    \n客户端通过让服务器使用其私钥验证安全证书来验证该证书。密钥库存储私钥和证书，而信任库存储公钥。系统可以使用证书颁发机构（CA），在这种情况下，信任库也会存储CA签名的证书。密钥库的密码称为`keypass`，信任库的密码称为`storepass`。\n\
    \n## 安装Java加密扩展文件\n\n默认的`cassandra.yaml`文件引用了多个加密套件，其中一些仅在您使用Oracle Java并通过SSL连接时，安装了Java加密扩展（JCE）无限制权限策略文件后才可用。安装JCE文件可确保在使用Oracle\
    \ Java时支持所有加密算法。您必须在集群的所有节点上安装这些文件。\n\n> **注意**\n>\n> 当通过SSL使用Oracle Java时，安装JCE文件是一项最佳实践。\n\
    \n请按照以下步骤安装JCE文件。此处的步骤展示了如何在Red Hat Linux系统上安装JCE。\n\n1.  安装EPEL目录。\n    ```\n\
    \    $ sudo yum install epel-release\n    ```\n2.  从Oracle Java SE下载页面（[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)）下载JCE文件。\n\
    3.  解压下载的JCE文件，并将`local_policy.jar`和`US_export_policy.jar`文件复制到`$JAVA_HOME/jre/lib/security`目录。\n\
    \n在基于Debian的系统上安装JCE更为简单。\n```\n$ sudo apt-get install oracle-java8-unlimited-jce-policy\n\
    Reading package lists... Done\nBuilding dependency tree\n...\nUnlimited JCE Policy\
    \ for Oracle Java 8 installed\n$\n```\n\n在学习如何通过SSL处理节点间和客户端-节点加密之前，您必须先通过准备SSL服务器证书来设置SSL加密。\n\
    \n## 准备服务器证书\n\n对于节点间和客户端-节点加密，您都必须先生成SSL证书并验证这些证书。以下是开始使用SSL证书需要做的事项。\n\n*  \
    \ 使用`openssl`和`keytool`实用工具生成SSL证书。\n*   生成一个自签名的CA来验证SSL证书，如下文所示。您也可以让证书由受信任的公共证书颁发机构（如Verisign）签名。\n\
    \n> **注意**\n>\n> Nate McCall展示了如何使用基于ccm的Cassandra集群设置SSL节点间加密。文章位于[`http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html`](http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html)。\n\
    \n在本节中，我将展示如何为生产环境准备SSL证书。\n\n### 创建证书颁发机构\n\n使用SSL加密数据库的第一步是创建自己的CA，用于签署所有特定于服务器的证书。这将有助于创建一个信任链，从而简化证书管理。请按照以下步骤创建CA。\n\
    \n1.  第一步是创建根CA证书和密钥。执行`openssl req`命令并向其传递证书配置文件。这要求您首先创建一个证书配置文件，您将其命名为`my_rootCa_cert.conf`文件。打开vi或nano编辑器，并在`my_rootCa_cert.conf`文件中输入以下信息：\n\
    \    ```\n    $ vi my_rootCa_cert.conf\n    # my_rootCa_cert.conf\n    [ req ]\n\
    \    distinguished_name    = req_distinguished_name\n    prompt              \
    \  = no\n    output_password       = myPass\n    default_bits          = 2048\n\
    \    [ req_distinguished_name ]\n    C                     = US\n    O       \
    \              = MyCompany\n    OU                    = TestCluster\n    CN  \
    \                  = rootCa\n    $\n    ```\n2.  创建证书配置文件（`my_rootCa_cert.conf`）后，运行`openssl\
    \ req`命令，如下所示，确保通过`config`属性传递配置文件名。\n    ```\n    $ sudo openssl req -config\
    \ my_rootCa_cert.conf  -new -x509 -nodes -subj /CN=rootCa/OU=TestCluster/O=YourCompany/C=US/\
    \ -keyout rootCa.key -out rootCa.crt -days 365\n    Generating a 2048 bit RSA\
    \ private key\n    ...................................+++\n    ..............................................................+++\n\
    \    writing new private key to 'rootCa.key'\n    $\n    ```\n    此命令将创建`rootCa.key`和`rootCa.crt`文件，您将在后续步骤中使用它们。`rootCa.key`文件是您将写入密钥的文件，而`rootCa.cert`文件是您将写入证书的文件。\n\
    3.  使用`openssl x509`命令验证rootCa证书（`rootCa.crt`文件）。\n    ```\n    $ sudo openssl\
    \ x509 -in rootCa.crt -text -noout\n    Certificate:\n    Data:\n    Version:\
    \ 1 (0x0)\n    Serial Number: 12633404970202873071 (0xaf52dee2c098bcef)\n    Signature\
    \ Algorithm: sha256WithRSAEncryption\n    Issuer: C=US, O=YourCompany, OU=TestCluster,\
    \ CN=rootCa\n    Validity\n    Not Before: Aug 25 19:00:47 2017 GMT\n    Not After\
    \ : Aug 25 19:00:47 2018 GMT\n    ...\n    $\n    ```\n\n### 为所有节点创建证书\n\n下一步是使用`keytool`实用工具生成公钥和私钥对。您必须在所有节点上执行此操作。您可以先在一个节点上生成证书，然后将它们复制到所有节点。\n\
    ```\n$ sudo keytool -genkeypair\n-keyalg RSA -alias 192.168.159.129\n-keystore\
    \ 192.168.159.129.jks\n-storepass myKeyPass\n-keypass myKeyPass\n-validity 365\n\
    -keysize 2048\n-dname \"CN=192.168.1159.129, OU=TestCluster, O=YourCompany, C=US\"\
    \n$\n```\n在此示例中，测试集群中有两个节点，因此您需要在两个节点上都运行此命令。此处显示的`keytool`命令适用于IP地址为`192.168.159.129`的节点。对于集群中的第二个节点（IP地址为`192.168.159.130`），您运行相同的命令，但将IP地址`192.168.159.129`替换为`192.168.159.130`。\n\
    \n在此命令中，\n*   `-genkeypair`生成一个公钥/私钥对。\n*   `-keystore`指定密钥库文件名（您使用IP地址以便将文件映射到Cassandra节点）。\n\
    *   `-storepass`指定密钥库密码。\n*   `-keypass`指定私钥密码（必须与`-storepass`属性的值相同）。\n*   `-dname`指定与别名值关联的可分辨名称（DN）。CN值设置为节点的IP地址或FQDN。\n\
    \n检查您生成的证书，以确保密钥库可访问且包含正确的密钥对。\n```\n$sudo keytool -list -keystore 192.168.159.129.jks\
    \ -storepass myKeyPass\nKeystore type: JKS\nKeystore provider: SUN\nYour keystore\
    \ contains 1 entry\n192.168.159.129, Aug 25, 2017, PrivateKeyEntry,\nCertificate\
    \ fingerprint (SHA1): C2:C1:6C:F5:DF:F7:EC:D6:09:66:BB:67:17:38:58:87:38:E1:AE:DD\n\
    $\n```\n\n## 导出证书签名请求"
  raw: "SSL is a security protocol that encrypts data during communications\nbetween\
    \ Cassandra clients and the nodes, as well as among the nodes.\nEach entity that\
    \ participates in communications must have a private key\nthat the entity stores\
    \ and a public key that it exchanges with other\nentities. The server sends clients\
    \ that want to connect securely to a\nCassandra cluster a certificate with the\
    \ public key of the server.\n\nNote\n\nEncrypting data has minimal performance\
    \ impact, except in the case of a\nhigh number of connections.\n\nSSL encryption\
    \ can secure intra-node communications by encrypting the\ndata flowing between\
    \ nodes. You can also set up client-node SSL\nencryption to protect data passed\
    \ between client programs such as cqlsh\nor nodetool and a cluster’s nodes.\n\n\
    The client validates the security certificate by having the server\nvalidate it\
    \ with its private key. A keystore stores private keys and\ncertificates, and\
    \ a truststore stores the public keys. A system can use\na Certificate Authority\
    \ (CA), in which case the truststore also stores\nthe CA’s signed certificates.\
    \ The password for a keystore is called the\nkeypass, and the password for\nthe\
    \ truststore is called a storepass.\n\nInstalling the Java Cryptography Extension\
    \ Files\n\nThe default `cassandra.yaml` file\nrefers to several cipher suites,\
    \ some of which are available only if you\ninstall the Java Cryptography Extension\n\
    (JCE) Unlimited Strength Jurisdiction Policy Files when using\nOracle Java with\
    \ SSL. Installing the JCE files ensures support for all\nencryption algorithms\
    \ when you’re using Oracle Java. You must install\nthe files on all nodes of the\
    \ cluster.\n\nNote\n\nInstalling the JCE files is a best practice when using Oracle\
    \ Java with\nSSL.\n\nFollow these steps to install the JCE files . The steps here\n\
    show how to install JCE on a Red Hat Linux system.\n\n1.  Install the EPEL directory.\n\
    \n```\n    $ sudo yum install epel-release\n    ```\n\n2.  Download the JCE files\
    \ from the Oracle Java SE Download page ( [`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\
    \ ).\n\n3.  Unzip the JCE files you’ve downloaded, and copy the `local_policy.jar`\
    \ and\n    the `US_export_policy.jar`\n    files to the `$JAVA_HOME/jre/lib/security`\n\
    \    directory.\n\nInstalling the JCE is even simpler on a Debian based system.\n\
    \n```\n$ sudo apt-get install oracle-java8-unlimited-jce-policy\nReading package\
    \ lists... Done\nBuilding dependency tree\n...\nUnlimited JCE Policy for Oracle\
    \ Java 8 installed\n$\n```\n\nBefore you can learn how to work with inter-node\
    \ and client-node\nencryption through SSL, you must first set up SSL encryption\
    \ by\npreparing SSL server certificates.\n\nPreparing the Server Certificates\n\
    \nFor both inter-node and client-node encryption, you must first generate\nSSL\
    \ certificates and validate the certificates. Here’s what you need to\ndo to get\
    \ going with SSL certificates.\n\n*   Use the `openssl`\n    and `keytool`\n \
    \   utilities to generate SSL certificates.\n\n*   Generate a self-signed CA to\
    \ validate the SSL certificates, as I show\n    shortly. You can also have the\
    \ certificates signed by a trusted public\n    certificate authority such as Verisign.\n\
    \nNote\n\nNate McCall shows how to set up SSL inter-node encryption using a\n\
    ccm-based Cassandra cluster. The article is at [`http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html`](http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html)\
    \ .\n\nIn this section, I show you how to prepare SSL certificates for a\nproduction\
    \ environment.\n\nCreate a Certificate Authority\n\nThe first step in encrypting\
    \ the database with SSL is to create your own\nCA that you can use to sign all\
    \ the server-specific certificates. This\nwill help create a trust chain that\
    \ makes it easy to manage the\ncertificates. Follow these steps to create the\
    \ CA.\n\n1.  The first step is to create the root CA certificate and key. Execute\
    \ the\n    `openssl req`\n    command and pass this command the certificate configuration\
    \ file. This\n    requires that you first create a certificate configuration file,\
    \ which\n    you’ll name `my_rootCa_cert.conf`\n    file. Open a vi or nano editor\
    \ and enter the following information in\n    the `my_rootCa_cert.conf`\n    file:\n\
    \n```\n    $ vi my_rootCa_cert.conf\n    # my_rootCa_cert.conf\n    [ req ]\n\
    \    distinguished_name    = req_distinguished_name\n    prompt              \
    \  = no\n    output_password       = myPass\n    default_bits          = 2048\n\
    \    [ req_distinguished_name ]\n    C                     = US\n    O       \
    \              = MyCompany\n    OU                    = TestCluster\n    CN  \
    \                  = rootCa\n    $\n    ```\n\n2.  Once you create the certificate\
    \ \n    configuration file (`my_rootCa_cert.conf`),\n    run the `openssl req`\
    \ command as shown here, making sure that you pass the\n    configuration file\
    \ name via the `config` attribute.\n\n```\n    $ sudo openssl req -config my_rootCa_cert.conf\
    \  -new -x509 -nodes -subj /CN=rootCa/OU=TestCluster/O=YourCompany/C=US/ -keyout\
    \ rootCa.key -out rootCa.crt -days 365\n    Generating a 2048 bit RSA private\
    \ key\n    ...................................+++\n    ..............................................................+++\n\
    \    writing new private key to 'rootCa.key'\n    $\n    ```\n\nThis command will\
    \ create the files `rootCa.key` and `rootCa.crt`, which\n    you’ll use later.\
    \ The `rootCa.key` file is\n    the file to which you’ll write the key and the\
    \ `rootCa.cert` file is\n    the file to which you’ll write the certificate.\n\
    \n3.  Verify the rootCa certificate (the `rootCa.crt` file) with\n    the `openssl\
    \ x509` command.\n\n```\n    $ sudo openssl x509 -in rootCa.crt -text -noout\n\
    \    Certificate:\n    Data:\n    Version: 1 (0x0)\n    Serial Number: 12633404970202873071\
    \ (0xaf52dee2c098bcef)\n    Signature Algorithm: sha256WithRSAEncryption\n   \
    \ Issuer: C=US, O=YourCompany, OU=TestCluster, CN=rootCa\n    Validity\n    Not\
    \ Before: Aug 25 19:00:47 2017 GMT\n    Not After : Aug 25 19:00:47 2018 GMT\n\
    \    ...\n    $\n    ```\n\nCreating  Certificates\nfor All Nodes\n\nThe next\
    \ step is to generate the public and private key pairs using the\n`keytool`\n\
    utility. You must do this on all nodes. You can generate the\ncertificates on\
    \ one node and copy them over to all the nodes later.\n\n```\n$ sudo keytool -genkeypair\n\
    -keyalg RSA -alias 192.168.159.129\n-keystore 192.168.159.129.jks\n-storepass\
    \ myKeyPass\n-keypass myKeyPass\n-validity 365\n-keysize 2048\n-dname \"CN=192.168.1159.129,\
    \ OU=TestCluster, O=YourCompany, C=US\"\n$\n```\n\nIn this example, you have two\
    \ nodes in the test cluster, so you need to\nrun this command on both. The `keytool`\
    \ command shown\nhere is for the node with the IP address 192.169.159.129\\. For\
    \ the second\nnode in the cluster, which has an IP address of 192.168.159.130,\
    \ you run\nthe same command, but you replace the IP address 192.168.159.129 with\n\
    the IP address 192.168.159.130.\n\nIn this command,\n\n*   `-genkeypair`\n   \
    \ generates a public/private key pair.\n\n*   `-keystore`\n    species the keystore\
    \ filename (you use the IP address so as to map the\n    files to the Cassandra\
    \ nodes).\n\n*   `-storepass`\n    specifies the keystore password.\n\n*   `-keypass`\n\
    \    specifies the private key password (must be the same as the value for\n \
    \   the `-storepass`\n    attribute).\n\n*   `-dname`\n    specifies the Distinguished\
    \ Name (DN) to be associated with the value of\n    alias. The CN value is set\
    \ to the node’s IP address or FQDN.\n\nCheck the certificates you’ve generated\
    \ to ensure that the key store is\naccessible and that it contains the correct\
    \ key pair.\n\n```\n$sudo keytool -list -keystore 192.168.159.129.jks -storepass\
    \ myKeyPass\nKeystore type: JKS\nKeystore provider: SUN\nYour keystore contains\
    \ 1 entry\n192.168.159.129, Aug 25, 2017, PrivateKeyEntry,\nCertificate fingerprint\
    \ (SHA1): C2:C1:6C:F5:DF:F7:EC:D6:09:66:BB:67:17:38:58:87:38:E1:AE:DD\n$\n```\n\
    \nExporting the Certificate Signing Requests"
  trans: "\n# SSL 加密配置指南\n\nSSL 是一种安全协议，可在 Cassandra 客户端与节点之间以及节点之间的通信过程中对数据进行加密。每个参与通信的实体都必须拥有一个由该实体保管的私钥，以及一个与其他实体交换的公钥。服务器会向希望建立安全连接到\
    \ Cassandra 集群的客户端发送一个包含服务器公钥的证书。\n\n> **注意**\n>\n> 除了连接数极高的情况，数据加密对性能的影响微乎其微。\n\
    \nSSL 加密可以通过加密节点间流动的数据来保护节点内部通信。您也可以设置客户端-节点 SSL 加密，以保护`cqlsh`或`nodetool`等客户端程序与集群节点之间传递的数据。\n\
    \n客户端通过让服务器使用其私钥验证安全证书来验证该证书。密钥库存储私钥和证书，而信任库存储公钥。系统可以使用证书颁发机构（CA），在这种情况下，信任库也会存储\
    \ CA 签名的证书。密钥库的密码称为`keypass`，信任库的密码称为`storepass`。\n\n## 安装 Java 加密扩展文件\n\n默认的`cassandra.yaml`文件引用了多个加密套件，其中一些仅在您使用\
    \ Oracle Java 并通过 SSL 连接时，安装了 Java 加密扩展（JCE）无限制权限策略文件后才可用。安装 JCE 文件可确保在使用 Oracle\
    \ Java 时支持所有加密算法。您必须在集群的所有节点上安装这些文件。\n\n> **注意**\n>\n> 当通过 SSL 使用 Oracle Java\
    \ 时，安装 JCE 文件是一项最佳实践。\n\n请按照以下步骤安装 JCE 文件。此处的步骤展示了如何在 Red Hat Linux 系统上安装 JCE。\n\
    \n1.  安装 EPEL 目录。\n    ```\n    $ sudo yum install epel-release\n    ```\n2. \
    \ 从 Oracle Java SE 下载页面（[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)）下载\
    \ JCE 文件。\n3.  解压下载的 JCE 文件，并将`local_policy.jar`和`US_export_policy.jar`文件复制到`$JAVA_HOME/jre/lib/security`目录。\n\
    \n在基于 Debian 的系统上安装 JCE 更为简单。\n```\n$ sudo apt-get install oracle-java8-unlimited-jce-policy\n\
    Reading package lists... Done\nBuilding dependency tree\n...\nUnlimited JCE Policy\
    \ for Oracle Java 8 installed\n$\n```\n\n在学习如何通过 SSL 处理节点间和客户端-节点加密之前，您必须先通过准备\
    \ SSL 服务器证书来设置 SSL 加密。\n\n## 准备服务器证书\n\n对于节点间和客户端-节点加密，您都必须先生成 SSL 证书并验证这些证书。以下是开始使用\
    \ SSL 证书需要做的事项。\n\n*   使用`openssl`和`keytool`实用工具生成 SSL 证书。\n*   生成一个自签名的 CA 来验证\
    \ SSL 证书，如下文所示。您也可以让证书由受信任的公共证书颁发机构（如 Verisign）签名。\n\n> **注意**\n>\n> Nate McCall\
    \ 展示了如何使用基于 ccm 的 Cassandra 集群设置 SSL 节点间加密。文章位于[`http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html`](http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html)。\n\
    \n在本节中，我将展示如何为生产环境准备 SSL 证书。\n\n### 创建证书颁发机构\n\n使用 SSL 加密数据库的第一步是创建自己的 CA，用于签署所有特定于服务器的证书。这将有助于创建一个信任链，从而简化证书管理。请按照以下步骤创建\
    \ CA。\n\n1.  第一步是创建根 CA 证书和密钥。执行`openssl req`命令并向其传递证书配置文件。这要求您首先创建一个证书配置文件，您将其命名为`my_rootCa_cert.conf`文件。打开\
    \ vi 或 nano 编辑器，并在`my_rootCa_cert.conf`文件中输入以下信息：\n    ```\n    $ vi my_rootCa_cert.conf\n\
    \    # my_rootCa_cert.conf\n    [ req ]\n    distinguished_name    = req_distinguished_name\n\
    \    prompt                = no\n    output_password       = myPass\n    default_bits\
    \          = 2048\n    [ req_distinguished_name ]\n    C                     =\
    \ US\n    O                     = MyCompany\n    OU                    = TestCluster\n\
    \    CN                    = rootCa\n    $\n    ```\n2.  创建证书配置文件（`my_rootCa_cert.conf`）后，运行`openssl\
    \ req`命令，如下所示，确保通过`config`属性传递配置文件名。\n    ```\n    $ sudo openssl req -config\
    \ my_rootCa_cert.conf  -new -x509 -nodes -subj /CN=rootCa/OU=TestCluster/O=YourCompany/C=US/\
    \ -keyout rootCa.key -out rootCa.crt -days 365\n    Generating a 2048 bit RSA\
    \ private key\n    ...................................+++\n    ..............................................................+++\n\
    \    writing new private key to 'rootCa.key'\n    $\n    ```\n    此命令将创建`rootCa.key`和`rootCa.crt`文件，您将在后续步骤中使用它们。`rootCa.key`文件是您将写入密钥的文件，而`rootCa.cert`文件是您将写入证书的文件。\n\
    3.  使用`openssl x509`命令验证 rootCa 证书（`rootCa.crt`文件）。\n    ```\n    $ sudo openssl\
    \ x509 -in rootCa.crt -text -noout\n    Certificate:\n    Data:\n    Version:\
    \ 1 (0x0)\n    Serial Number: 12633404970202873071 (0xaf52dee2c098bcef)\n    Signature\
    \ Algorithm: sha256WithRSAEncryption\n    Issuer: C=US, O=YourCompany, OU=TestCluster,\
    \ CN=rootCa\n    Validity\n    Not Before: Aug 25 19:00:47 2017 GMT\n    Not After\
    \ : Aug 25 19:00:47 2018 GMT\n    ...\n    $\n    ```\n\n### 为所有节点创建证书\n\n下一步是使用`keytool`实用工具生成公钥和私钥对。您必须在所有节点上执行此操作。您可以先在一个节点上生成证书，然后将它们复制到所有节点。\n\
    ```\n$ sudo keytool -genkeypair\n-keyalg RSA -alias 192.168.159.129\n-keystore\
    \ 192.168.159.129.jks\n-storepass myKeyPass\n-keypass myKeyPass\n-validity 365\n\
    -keysize 2048\n-dname \"CN=192.168.1159.129, OU=TestCluster, O=YourCompany, C=US\"\
    \n$\n```\n在此示例中，测试集群中有两个节点，因此您需要在两个节点上都运行此命令。此处显示的`keytool`命令适用于 IP 地址为`192.168.159.129`的节点。对于集群中的第二个节点（IP\
    \ 地址为`192.168.159.130`），您运行相同的命令，但将 IP 地址`192.168.159.129`替换为`192.168.159.130`。\n\
    \n在此命令中，\n*   `-genkeypair`生成一个公钥/私钥对。\n*   `-keystore`指定密钥库文件名（您使用 IP 地址以便将文件映射到\
    \ Cassandra 节点）。\n*   `-storepass`指定密钥库密码。\n*   `-keypass`指定私钥密码（必须与`-storepass`属性的值相同）。\n\
    *   `-dname`指定与别名值关联的可分辨名称（DN）。CN 值设置为节点的 IP 地址或 FQDN。\n\n检查您生成的证书，以确保密钥库可访问且包含正确的密钥对。\n\
    ```\n$sudo keytool -list -keystore 192.168.159.129.jks -storepass myKeyPass\n\
    Keystore type: JKS\nKeystore provider: SUN\nYour keystore contains 1 entry\n192.168.159.129,\
    \ Aug 25, 2017, PrivateKeyEntry,\nCertificate fingerprint (SHA1): C2:C1:6C:F5:DF:F7:EC:D6:09:66:BB:67:17:38:58:87:38:E1:AE:DD\n\
    $\n```\n\n## 导出证书签名请求\n"
- fmt: '# 生成节点证书和密钥


    一旦生成了节点证书和密钥，就必须为每个节点导出一个证书签名请求（CSR）。该CSR使用`rootCa`证书进行签名，以验证其是否受信任。


    ```bash

    $ sudo  keytool -certreq \

    -keystore 192.168.159.129.jks \

    -alias 192.168.159.129 \

    -file 192.168.159.129.csr \

    -keypass myKeyPass -storepass myKeyPass \

    -dname "CN=192.168.1159.129, OU=TestCluster, O=YourCompany, C=US"

    $

    ```


    `keytool -certreq`命令会导出一个用于CA签名的证书。


    必须为集群中的每个节点重复此命令，将此处显示的IP地址（`192.168.159.129`）替换为其他节点的IP地址。


    ## 使用CA的公钥签署证书


    接下来，为Cassandra集群中的每个节点，使用`rootCa`签署节点证书，通过OpenSSL完成。


    ```bash

    $ sudo openssl x509 \

    -req \

    -CA rootCa.crt \

    -CAkey rootCa.key \

    -in 192.168.159.129.csr \

    -out 192.168.159.129.crt_signed \

    -days 365 \

    -CAcreateserial -passin pass:myPass

    Signature ok

    subject=/C=US/O=YourCompany/OU=TestCluster/CN=192.168.1159.129

    Getting CA Private Key

    $

    ```


    同样，必须为您的每个集群节点运行此处显示的`openssl`命令。


    在此命令中：


    *   `-CA`标识`rootCa`证书。

    *   `-Cakey`标识`rootCa`密钥。

    *   `-in`指定要读取证书的文件名。

    *   `-out`指定签名证书的输出文件名。


    使用`rootCa`证书和已签名的证书来验证签名证书。


    ```bash

    $ openssl verify -CAfile rootCa.crt 192.168.159.129.crt_signed

    192.168.159.129.crt_signed: OK

    $

    ```


    ## 将CA添加到密钥库


    将`rootCa`证书导入每个节点的密钥库。


    ```bash

    $ sudo keytool -importcert \

    -keystore 192.168.159.129.jks \

    -alias rootCa \

    -file rootCa.crt \

    -noprompt \

    -keypass myKeyPass \

    -storepass myKeyPass

    Certificate was added to keystore

    $

    ```


    此时密钥库文件将包含`rootCa`证书和节点证书的条目。


    ## 将签名的证书导入密钥库


    节点上的每个密钥库现在都包含了CA。下一步是执行与上一步相同的操作，但这次是为每个节点将节点的签名证书导入节点密钥库。


    ```bash

    $ sudo keytool -importcert \

    -keystore 192.168.159.129.jks \

    -alias 192.168.159.129 \

    -file 192.168.159.129.crt_signed \

    -noprompt \

    -keypass myKeyPass \

    -storepass myKeyPass

    Certificate reply was installed in keystore

    $

    ```


    之前创建的节点证书将被签名的节点证书替换。


    ## 构建信任库


    接下来必须创建一个服务器信任库，通过验证来自其他节点的连接请求，在集群节点之间建立信任链。运行`keytool -importcert`命令来构建密钥库。


    ```bash

    $ keytool -importcert \

    -keystore generic-server-truststore.jks \

    -alias rootCa \

    -file rootCa.crt \

    -noprompt \

    -keypass myPass \

    -storepass truststorePass

    Certificate was added to keystore

    $

    ```


    创建信任库后，就可以在集群中共享它。该信任库表示，它将信任所有客户端证书由该CA签名的节点的连接。


    您可以这样验证信任库文件：


    ```bash

    $ sudo keytool -list -keystore generic-server-truststore.jks -storepass truststorePass

    Keystore type: JKS

    Keystore provider: SUN


    Your keystore contains 1 entry


    rootca, Aug 28, 2017, trustedCertEntry,

    Certificate fingerprint (SHA1): BB:BF:D7:8F:15:4E:41:91:37:70:EB:4C:67:AB:2C:25:37:A4:18:B0

    $

    ```


    ## 使用密钥库配置集群


    之前，我展示了如何创建特定于节点的密钥库和一个通用信任库。现在必须将它们移动到Cassandra可以找到的位置。默认情况下，Cassandra会在`$CASSANDRA_HOME/conf`目录中查找密钥库和信任库。


    首先，为集群中的两个节点分别复制特定于节点的密钥库。


    ```bash

    cp 192.168.192.159.129.jks  $CASSANDRA_HOME/conf/server-keystore.jks

    cp 192.168.192.159.130.jks  $CASSANDRA_HOME/conf/server-keystore.jks

    ```


    接下来，将通用信任库复制到两个节点。


    ```bash

    cp generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks

    cp generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks

    ```


    至此，SSL证书的配置完成。现在必须启用加密。


    ## 启用节点间加密


    加密节点间通信的最后一步是通过修改`cassandra.yaml`文件来启用加密。在`cassandra.yaml`文件中，按如下方式修改`server_encryption_options`部分：


    ```yaml

    server_encryption_options:

    internode_encryption: all                /default value: none

    keystore: /cassandra/conf/server-keystore.jks

    keystore_password: cassandra

    truststore: /cassandra/conf/server-truststore.jks

    truststore_password: cassandra

    protocol: TLS

    algorithm: SunX509

    store_type: JKS


    # cipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]

    require_client_auth: true

    require_endpoint_verification: false

    ```


    之前，我介绍了如何在JDK中安装强加密策略文件（JCE策略文件）。这支持使用强密码，例如256位AES，正如`cassandra.yaml`文件中的`cipher_suites`属性所示。


    现在所有加密设置都已完成。重启集群。


    ```bash

    $ kill -9 cassandra-pid

    $ $CASSANDRA_HOME/bin/cassandra

    INFO  [main] 2017-08-28 12:33:50,572 MessagingService.java:687 - Starting Encrypted
    Messaging Service on SSL port 7001

    ```


    消息“`Starting Encrypted Messaging Service on SSL port 7001`”表明节点间通信的SSL加密已生效。


    ## 启用客户端加密


    在上一节中，我展示了如何配置节点到节点加密。然而，诸如`cqlsh`之类的客户端与集群之间的通信仍然是未加密的。在本节中，我将展示如何配置客户端到节点的加密。您使用为节点间通信创建的相同SSL证书。只需要启用客户端加密并将CA证书添加到`cqlshrc`文件中。


    要启用客户端加密，请按如下方式修改`cassandra.yaml`文件：


    ```yaml

    # enable or disable client/server encryption.

    client_encryption_options:

    enabled: true


    # If enabled and optional is set to true encrypted and unencrypted connections
    are handled.

    optional: false

    keystore: /cassandra/apache-cassandra-3.10/conf/server-keystore.jks

    keystore_password: myKeyPass

    require_client_auth: true


    # Set trustore and truststore_password if require_client_auth is true

    truststore: /cassandra/apache-cassandra-3.10/conf/server-truststore.jks

    truststore_password: truststorePass

    ```'
  raw: "Once you generate the node certificate and the key, you must export a\ncertificate\
    \ signing request (CSR) for each node. The CSR is signed with\nthe rootCa certificate\
    \ to verify that the certificate is trusted.\n\n```\n$ sudo  keytool -certreq\n\
    -keystore 192.168.159.129.jks\n-alias 192.168.159.129\n-file 192.168.159.129.csr\n\
    -keypass myKeyPass -storepass myKeyPass\n-dname \"CN=192.168.1159.129, OU=TestCluster,\
    \ O=YourCompany, C=US\"\n$\n```\n\nThe `keytool -certreq` command exports a certificate\
    \ for signing by a CA.\n\nYou must repeat this command for each node in the cluster\
    \ by replacing\nthe IP address shown here (192.168.159.129) with the IP address\
    \ of the\nother nodes.\n\nSigning  the\nCertificates with the CA’s Public Key\n\
    \nNext, sign the node certificate with the rootCa for each node in the\nCassandra\
    \ cluster, through OpenSSL.\n\n```\n$ sudo openssl x509\n-req\n-CA rootCa.crt\n\
    -CAkey rootCa.key\n-in 192.168.159.129.csr\n-out 192.168.159.129.crt_signed\n\
    -days 365\n-CAcreateserial -passin pass:myPass\nSignature ok\nsubject=/C=US/O=YourCompany/OU=TestCluster/CN=192.168.1159.129\n\
    Getting CA Private Key\n$\n```\n\nOnce again, you must run the `openssl` command\
    \  shown here for\neach of your cluster’s nodes.\n\nIn this command,\n\n*   `-CA`\
    \ identifies\n    the rootCa certificate.\n\n*   `-Cakey`\n    identifies the\
    \ rootCa key.\n\n*   `-in` specifies\n    the filename from which to read the\
    \ certificate.\n\n*   `-out` specifies\n    the output filename for the signed\
    \ certificate.\n\nUse the rootCa certificate and the signed certificate to verify\
    \ the\nsigned certificate.\n\n```\n$ openssl verify -CAfile rootCa.crt 192.168.159.129.crt_signed\n\
    192.168.159.129.crt_signed: OK\n$\n```\n\nAdding the CA to the Keystore\n\nImport\
    \ the rootCa certificate to each node’s keystore.\n\n```\n$ sudo keytool -importcert\n\
    -keystore 192.168.159.129.jks\n-alias rootCa\n-file rootCa.crt\n-noprompt\n-keypass\
    \ myKeyPass\n-storepass myKeyPass\nCertificate was added to keystore\n$\n```\n\
    \nThe keystore file will now have entries for both the rootCa certificate\nand\
    \ the node certificate.\n\nImporting the Signed Certificates into the Keystore\n\
    \nEach of the key stores on the nodes now contains the CA. The next step\nis to\
    \ do the same thing as the previous step, but this time import the\nnode’s signed\
    \ certificate into the node keystore for each node.\n\n```\n$ sudo keytool -importcert\n\
    -keystore 192.168.159.129.jks\n-alias 192.168.159.129\n-file 192.168.159.129.crt_signed\n\
    -noprompt\n-keypass myKeyPass\n-storepass myKeyPass\nCertificate reply was installed\
    \ in keystore\n$\n```\n\nThe node certificate you created earlier is replaced\
    \ with the signed\nnode certificate.\n\nBuilding the Trust Store\n\nYou must next\
    \ create a server truststore  that\nwill establish a chain of trust between the\
    \ cluster’s nodes by verifying\nconnection requests from other nodes. You run\
    \ the `keytool -importcert`\ncommand to build the key store.\n\n```\n$ keytool\
    \ -importcert\n-keystore generic-server-truststore.jks\n-alias rootCa\n-file rootCa.crt\n\
    -noprompt\n-keypass myPass\n-storepass truststorePass\nCertificate was added to\
    \ keystore\n$\n```\n\nOnce you create the trust store, you can share it across\
    \ your cluster.\nThe trust store says that it’ll trust connections from all nodes\
    \ whose\nclient certificates were signed by this CA.\n\nYou can verify the truststore\
    \ file thus:\n\n```\n$ sudo keytool -list -keystore generic-server-truststore.jks\
    \ -storepass truststorePass\nKeystore type: JKS\nKeystore provider: SUN\nYour\
    \ keystore contains 1 entry\nrootca, Aug 28, 2017, trustedCertEntry,\nCertificate\
    \ fingerprint (SHA1): BB:BF:D7:8F:15:4E:41:91:37:70:EB:4C:67:AB:2C:25:37:A4:18:B0\n\
    $\n```\n\nConfiguring the Cluster  with\nthe Keystores\n\nEarlier, I showed how\
    \ to create both the node-specific key stores and a\ngeneric trust store. Now\
    \ you must move them to where Cassandra can find\nthem. Cassandra looks for the\
    \ key stores and trust stores in the `$CASSANDRA_HOME/conf`\ndirectory by default.\n\
    \nFirst, you copy over the node-specific key stores for each of the two\nnodes\
    \ in the cluster.\n\n```\ncp 192.168.192.159.129.jks  $CASSANDRA_HOME/conf/server-keystore.jks\n\
    cp 192.168.192.159.130.jks  $CASSANDRA_HOME/conf/server-keystore.jks\n```\n\n\
    Next, you copy over the generic trust store to both nodes.\n\n```\ncp generic-server-truststore.jks\
    \  $CASSANDRA_HOME/conf/server-truststore.jks\ncp generic-server-truststore.jks\
    \  $CASSANDRA_HOME/conf/server-truststore.jks\n```\n\nAt this point, the configuration\
    \ of SSL certificates is complete. You\nmust now enable encryption.\n\nEnabling\
    \ Inter-Node Encryption\n\nThe last step to encrypt inter-node communications\
    \ is to enable\nencryption by modifying the `cassandra.yaml` file.\nIn the `cassandra.yaml`\
    \ file,\nmodify the `server_encryption_options`\nsection as follows:\n\n```\n\
    server_encryption_options:\ninternode_encryption: all                /default\
    \ value: none\nkeystore: /cassandra/conf/server-keystore.jks\nkeystore_password:\
    \ cassandra\ntruststore: /cassandra/conf/server-truststore.jks\ntruststore_password:\
    \ cassandra\nprotocol: TLS\nalgorithm: SunX509\nstore_type: JKS\n\n# cipher_suites:\
    \ [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]\n\
    require_client_auth: true\nrequire_endpoint_verification: false\n```\n\nEarlier,\
    \ I showed how to install  strong\nencryption policy files in in the JDK (JCE\
    \ Policy Files). This supports\nthe use of strong cyphers such as 256bit AES,\
    \ as shown by the `cipher_suites`\nproperty in the `cassandra.yaml` file.\n\n\
    You’re finally all set for encryption. Restart the cluster.\n\n```\n$ kill -9\
    \ cassandra-pid\n$ $CASSANDRA_HOME/bin/cassandra\nINFO  [main] 2017-08-28 12:33:50,572\
    \ MessagingService.java:687 - Starting Encrypted Messaging Service on SSL port\
    \ 7001\n```\n\nThe message “`Starting Encrypted Messaging Service on SSL port\
    \ 7001”` shows that SSL\nencryption is in place for inter-node communications.\n\
    \nEnabling Client Encryption \n\nIn the previous section, I showed how to configure\
    \ node-to-node\nencryption. However, communications between clients such as cqlsh\
    \ and\nthe cluster will still be unencrypted. In this section, I show how to\n\
    configure client-node encryption. You use the same SSL certificates that\nyou\
    \ created for inter-node communications. You just need to enable\nclient encryption\
    \ and add the CA certificates to the cqlshrc file.\n\nTo enable client encryption,\
    \ here’s how you modify the `cassandra.yaml` file:\n\n```\n\n# enable or disable\
    \ client/server encryption.\nclient_encryption_options:\nenabled: true\n\n# If\
    \ enabled and optional is set to true encrypted and unencrypted connections are\
    \ handled.\noptional: false\nkeystore: /cassandra/apache-cassandra-3.10/conf/server-keystore.jks\n\
    keystore_password: myKeyPass\nrequire_client_auth: true\n\n# Set trustore and\
    \ truststore_password if require_client_auth is true\ntruststore: /cassandra/apache-cassandra-3.10/conf/server-truststore.jks\n\
    truststore_password: truststorePass"
  trans: '

    # 生成节点证书和密钥


    生成节点证书和密钥后，必须为每个节点导出一个证书签名请求（CSR）。该 CSR 使用`rootCa`证书进行签名，以验证其是否受信任。


    ```bash

    $ sudo  keytool -certreq \

    -keystore 192.168.159.129.jks \

    -alias 192.168.159.129 \

    -file 192.168.159.129.csr \

    -keypass myKeyPass -storepass myKeyPass \

    -dname "CN=192.168.1159.129, OU=TestCluster, O=YourCompany, C=US"

    $

    ```


    `keytool -certreq`命令会导出一个用于 CA 签名的证书。


    必须为集群中的每个节点重复此命令，将此处显示的 IP 地址（`192.168.159.129`）替换为其他节点的 IP 地址。


    ## 使用 CA 的公钥签署证书


    接下来，为 Cassandra 集群中的每个节点，使用`rootCa`签署节点证书，通过 OpenSSL 完成。


    ```bash

    $ sudo openssl x509 \

    -req \

    -CA rootCa.crt \

    -CAkey rootCa.key \

    -in 192.168.159.129.csr \

    -out 192.168.159.129.crt_signed \

    -days 365 \

    -CAcreateserial -passin pass:myPass

    Signature ok

    subject=/C=US/O=YourCompany/OU=TestCluster/CN=192.168.1159.129

    Getting CA Private Key

    $

    ```


    同样，必须为您的每个集群节点运行此处显示的`openssl`命令。


    在此命令中：


    *   `-CA`标识`rootCa`证书。

    *   `-Cakey`标识`rootCa`密钥。

    *   `-in`指定要读取证书的文件名。

    *   `-out`指定签名证书的输出文件名。


    使用`rootCa`证书和已签名的证书来验证签名证书。


    ```bash

    $ openssl verify -CAfile rootCa.crt 192.168.159.129.crt_signed

    192.168.159.129.crt_signed: OK

    $

    ```


    ## 将 CA 添加到密钥库


    将`rootCa`证书导入每个节点的密钥库。


    ```bash

    $ sudo keytool -importcert \

    -keystore 192.168.159.129.jks \

    -alias rootCa \

    -file rootCa.crt \

    -noprompt \

    -keypass myKeyPass \

    -storepass myKeyPass

    Certificate was added to keystore

    $

    ```


    此时密钥库文件将包含`rootCa`证书和节点证书的条目。


    ## 将签名的证书导入密钥库


    节点上的每个密钥库现在都包含了 CA。下一步是执行与上一步相同的操作，但这次是为每个节点将节点的签名证书导入节点密钥库。


    ```bash

    $ sudo keytool -importcert \

    -keystore 192.168.159.129.jks \

    -alias 192.168.159.129 \

    -file 192.168.159.129.crt_signed \

    -noprompt \

    -keypass myKeyPass \

    -storepass myKeyPass

    Certificate reply was installed in keystore

    $

    ```


    之前创建的节点证书将被签名的节点证书替换。


    ## 构建信任库


    接下来必须创建一个服务器信任库，通过验证来自其他节点的连接请求，在集群节点之间建立信任链。运行`keytool -importcert`命令来构建密钥库。


    ```bash

    $ keytool -importcert \

    -keystore generic-server-truststore.jks \

    -alias rootCa \

    -file rootCa.crt \

    -noprompt \

    -keypass myPass \

    -storepass truststorePass

    Certificate was added to keystore

    $

    ```


    创建信任库后，就可以在集群中共享它。该信任库表示，它将信任所有客户端证书由该 CA 签名的节点的连接。


    您可以这样验证信任库文件：


    ```bash

    $ sudo keytool -list -keystore generic-server-truststore.jks -storepass truststorePass

    Keystore type: JKS

    Keystore provider: SUN


    Your keystore contains 1 entry


    rootca, Aug 28, 2017, trustedCertEntry,

    Certificate fingerprint (SHA1): BB:BF:D7:8F:15:4E:41:91:37:70:EB:4C:67:AB:2C:25:37:A4:18:B0

    $

    ```


    ## 使用密钥库配置集群


    之前，我展示了如何创建特定于节点的密钥库和一个通用信任库。现在必须将它们移动到 Cassandra 可以找到的位置。默认情况下，Cassandra 会在`$CASSANDRA_HOME/conf`目录中查找密钥库和信任库。


    首先，为集群中的两个节点分别复制特定于节点的密钥库。


    ```bash

    cp 192.168.192.159.129.jks  $CASSANDRA_HOME/conf/server-keystore.jks

    cp 192.168.192.159.130.jks  $CASSANDRA_HOME/conf/server-keystore.jks

    ```


    接下来，将通用信任库复制到两个节点。


    ```bash

    cp generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks

    cp generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks

    ```


    至此，SSL 证书的配置完成。现在必须启用加密。


    ## 启用节点间加密


    加密节点间通信的最后一步是通过修改`cassandra.yaml`文件来启用加密。在`cassandra.yaml`文件中，按如下方式修改`server_encryption_options`部分：


    ```yaml

    server_encryption_options:

    internode_encryption: all                /default value: none

    keystore: /cassandra/conf/server-keystore.jks

    keystore_password: cassandra

    truststore: /cassandra/conf/server-truststore.jks

    truststore_password: cassandra

    protocol: TLS

    algorithm: SunX509

    store_type: JKS


    # cipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]

    require_client_auth: true

    require_endpoint_verification: false

    ```


    之前，我介绍了如何在 JDK 中安装强加密策略文件（JCE 策略文件）。这支持使用强密码，例如 256 位 AES，正如`cassandra.yaml`文件中的`cipher_suites`属性所示。


    现在所有加密设置都已完成。重启集群。


    ```bash

    $ kill -9 cassandra-pid

    $ $CASSANDRA_HOME/bin/cassandra

    INFO  [main] 2017-08-28 12:33:50,572 MessagingService.java:687 - Starting Encrypted
    Messaging Service on SSL port 7001

    ```


    消息“`Starting Encrypted Messaging Service on SSL port 7001`”表明节点间通信的 SSL 加密已生效。


    ## 启用客户端加密


    在上一节中，我展示了如何配置节点到节点加密。然而，诸如`cqlsh`之类的客户端与集群之间的通信仍然是未加密的。在本节中，我将展示如何配置客户端到节点的加密。您使用为节点间通信创建的相同
    SSL 证书。只需要启用客户端加密并将 CA 证书添加到`cqlshrc`文件中。


    要启用客户端加密，请按如下方式修改`cassandra.yaml`文件：


    ```yaml

    # enable or disable client/server encryption.

    client_encryption_options:

    enabled: true


    # If enabled and optional is set to true encrypted and unencrypted connections
    are handled.

    optional: false

    keystore: /cassandra/apache-cassandra-3.10/conf/server-keystore.jks

    keystore_password: myKeyPass

    require_client_auth: true


    # Set trustore and truststore_password if require_client_auth is true

    truststore: /cassandra/apache-cassandra-3.10/conf/server-truststore.jks

    truststore_password: truststorePass

    ```

    '
- fmt: "# More Advanced Defaults Below\n\n```yaml\nprotocol: TLS\nalgorithm: SunX509\n\
    store_type: JKS\ncipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]\n\
    ```\n\nYou must restart the cluster at this point.\n\nIn the logs generated during\
    \ the node startup, you’ll see the following message, indicating that SSL encryption\
    \ is now enabled between clients and the database server:\n\n```\nINFO  [main]\
    \ 2017-09-05 14:17:10,681 Server.java:145 - Enabling encrypted CQL connections\
    \ between client and server\n```\n\nOnce the cluster comes back up, since SSL\
    \ validation is enabled now, you must specify the `--ssl` option to connect to\
    \ Cassandra:\n\n```\n$ cqlsh --ssl\nValidation is enabled; SSL transport factory\
    \ requires a valid certfile to be specified. Please provide path to the certfile\
    \ in [ssl] section as 'certfile' option in /home/cassandra/.cassandra/cqlshrc\
    \ (or use [certfiles] section) or set SSL_CERTFILE environment variable.\n$\n\
    ```\n\nThe reason you see this error is because you have enabled SSL for client\
    \ communications and hence `cqlsh`, which is a client, doesn’t trust the Cassandra\
    \ node now. For it to trust the node, it should see the CA certificate that you\
    \ generated earlier (`rootCa.crt`). This ensures that Cassandra is using a certificate\
    \ that was signed by the CA. You point to the CA certificate by listing it under\
    \ the `[ssl]` section of the `cqlshrc` file (`/home/cassandra/.cassandra/cqlshrc`),\
    \ as shown here:\n\n```ini\n[connection]\nhostname=192.168.159.130\nport=9042\n\
    factory = cqlshlib.ssl.ssl_transport_factory\n[ssl]\ncertfile = /cassandra/apache-cassandra-3.10/conf/rootCa.crt\n\
    validate = true\n```\n\nNow you’ll be able to connect to Cassandra through `cqlsh`\
    \ using SSL.\n\n```\n$ cqlsh –ssl\n```\n\nYou now have a secure connection to\
    \ the Cassandra node through the `cqlsh` client.\n\n## JMX Authentication and\
    \ Authorization\n\nJMX authentication and authorization allows you to control\
    \ user access to JMX-based tools such as `nodetool` and `JConsole`. You can configure\
    \ JMX connections to use Cassandra’s internal authentication and authorization\
    \ mechanisms, just as the CQL clients do.\n\nIf you’ve configured usernames and\
    \ passwords in the database through the authentication and authorization mechanism\
    \ described earlier in this chapter, you must execute JMX tools as well with the\
    \ authentication and authorization you’ve configured.\n\nBefore you can use `nodetool`\
    \ or `JConsole` with authentication, you must enable JMX authentication and authorization.\n\
    \n### Enabling JMX Authentication and Authorization\n\nBy default, JMX security\
    \ isn’t configured, meaning that you can access JMX tools such as `nodetool` and\
    \ `JConsole` only from the `localhost`. You can configure JMX authentication and\
    \ authorization using local password and access files for configuring the credentials\
    \ for users and access permission. However, in Cassandra 3.6 onwards, you can\
    \ also configure JMX security by piggybacking on Cassandra’s internal authentication\
    \ and authorization.\n\nIn this section, I show how to configure JMX authentication\
    \ and authorization using local files.\n\nHere are the steps to configure JMX\
    \ security using local files.\n\n1.  Edit the `cassandra-env.sh` file (in the\
    \ `$CASSANDRA_HOME/conf` directory), and change the two settings in the chunk\
    \ shown here:\n\n```bash\n    if [ \"$LOCAL_JMX\" = \"yes\" ]; then\n    JVM_OPTS=\"\
    $JVM_OPTS -Dcassandra.jmx.local.port=$JMX_PORT\"\n    JVM_OPTS=\"$JVM_OPTS -Dcom.sun.management.jmxremote.authenticate=false\"\
    \n    else\n```\n\nIn the first line, change the `\"yes\"` to `\"no\"`. In the\
    \ third line, change `\"false\"` to `\"true\"`.\n\n2.  Create the password file\
    \ `/etc/cassandra/jmxremote.password` (the default location) and add the following\
    \ line to the file:\n\n```\n    cassandra  cassandra\n```\n\nI’m using the default\
    \ superuser account here, but this isn’t safe in a production system, and you\
    \ must replace this set of credentials with one or more credentials for all users\
    \ that you’d like to be able to access JMX-compliant utilities such as `nodetool`.\n\
    \n3.  Create the access file (by default) `/etc/cassandra/jmxremote.access` and\
    \ add the following information to the access file:\n\n```\n    cassandra readwrite\n\
    \    create javax.management.monitor.*,javax.management.timer.*\n    \\unregister\n\
    ```\n\nThe `readwrite` privilege you gave to the role `cassandra` enables this\
    \ JMX client to work with MBeans. More specifically, it allows this client to\
    \ set attributes, invoke operations, receive notifications, and so on.\n\n4. \
    \ Restart the database.\n\n5.  Try running the `nodetool status` command. Since\
    \ you configured JMX authorization and authentication, you shouldn’t be able to\
    \ run this command as usual. If you’ve configured everything correctly, you should\
    \ instead see the following error:\n\n```\n    $ nodetool status\n    nodetool:\
    \ Failed to connect to '127.0.0.1:7199' - SecurityException: 'Authentication failed!\
    \ Credentials required'.\n```\n\n6.  Run the `nodetool status` command by providing\
    \ the credentials for the role `cassandra`.\n\n```\n    $ nodetool -u cassandra\
    \ -pw cassandra status\n    Datacenter: datacenter1\n    =======================\n\
    \    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n    --  Address\
    \          Load       Tokens       Owns (effective)  Host ID                 \
    \              Rack\n    UN  192.168.159.129  24.21 MiB  256          49.9% 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\
    \  rack1\n    UN  192.168.159.130  24.25 MiB  256          50.1% 001399d4-49fc-467c-b188-e93629a0f118\n\
    ```\n\nThe database is now configured for JMX authentication and authorization.\
    \ As with the `nodetool` utility, you’ll now be required to provide a username\
    \ and password when you use `JConsole` to remotely connect to a Cassandra cluster.\n\
    \n## Using `cqlsh` with Authentication\n\nYou can configure authentication so\
    \ that logging into `cqlsh` requires a password. You do this by creating or modifying\
    \ the `cqlshrc` file. The following are the steps to configure this authentication.\n\
    \n1.  Edit the `cqlshrc` file, or if you don’t have one, create one in the following\
    \ location:\n\n```\n    /etc/cassandra/cqlshrc.sample                 /* package\
    \ installation\n    install_location/conf/cqlshrc.sample          /* tarball installation\n\
    ```\n\n2.  Enter the following lines in the `cqlshrc` file:\n\n```ini\n    [authentication]\n\
    \    username = sam\n    password = !!bang!!$\n```\n\n3.  Secure the file by setting\
    \ the following permissions:\n\n```\n    $ sudo chmod 400 /home/.cassandra/cqlshrc\n\
    ```\n\n## Summary\n\nSecuring Cassandra is a multi-faceted affair. To secure your\
    \ data comprehensively, besides configuring authentication, authorization, and\
    \ SSL encryption of inter-cluster and client-cluster communications, you may also\
    \ want to encrypt data at rest.\n\nSeveral good third-party encrypting solutions\
    \ exist. By using one or more of them you can complete the circle and reduce the\
    \ chances of a security breach. I didn’t discuss these products in this chapter,\
    \ but a quick search on the internet for “encryption at rest” should show you\
    \ the available choices.\n\n# Index\n\n## A\n\n- Accrual detection mechanism\n\
    - Administration tools\n    - `cassandra-stress` tool\n    - `cassandra` utility\n\
    \    - `nodetool` utility\n    - SSTable utilities\n- Akka\n- Allocation algorithm\n\
    - `ALTER KEYSPACE` privilege\n- Amazon EC2\n    - AMIs\n    - AWS\n        - configuring\
    \ Cassandra cluster\n            - create instance\n            - add storage\n\
    \            - AMI\n            - choose type\n            - configure details\n\
    \            - configure security group\n            - key pair\n            -\
    \ review launch\n            - tag\n        - install Cassandra\n- Amazon Machine\
    \ Image (AMI)\n- Amazon’s DynamoDB\n- Amazon Web Services (AWS)\n- Anti-entropy\
    \ repair\n    - definition\n    - Merkel trees\n    - `nodetool repair` command\n\
    - `ANY` consistency level\n- Apache Cassandra\n    - bloom filters\n    - build\
    \ from source\n    - `cassandra.yaml` file\n    - check status\n    - clearing\
    \ cassandra data\n    - cluster\n    - compaction\n    - compression\n    - definition\n\
    \    - distributed data\n    - drawbacks\n        - immutable tables and mutation\n\
    \        - lack of support for transactions\n        - no indexes\n        - no\
    \ joins\n    - querying data"
  raw: "# More advanced defaults below:\nprotocol: TLS\nalgorithm: SunX509\nstore_type:\
    \ JKS\ncipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]\n\
    ```\n\nYou must restart the cluster at this point.\n\nIn the logs generated during\
    \ the node startup, you’ll see the following\nmessage, indicating that SSL encryption\
    \ is now enabled between clients\nand the database server:\n\n```\nINFO  [main]\
    \ 2017-09-05 14:17:10,681 Server.java:145 - Enabling encrypted CQL connections\
    \ between client and server\n```\n\nOnce the cluster comes back up, since SSL\
    \ validation is enabled now, you\nmust specify the `--ssl` option to\nconnect\
    \ to Cassandra:\n\n```\n$ cqlsh --ssl\nValidation is enabled; SSL transport factory\
    \ requires a valid certfile to be specified. Please provide path to the certfile\
    \ in [ssl] section as 'certfile' option in /home/cassandra/.cassandra/cqlshrc\
    \ (or use [certfiles] section) or set SSL_CERTFILE environment variable.\n$\n\
    ```\n\nThe reason you see this error is because you have enabled SSL for client\n\
    communications and hence cqlsh, which is a client, doesn’t trust the\ncassandra\
    \ node now. For it to trust the node, it should see the CA\ncertificate that you\
    \ generated earlier (`rootCa.crt`). This\nensures that Cassandra is using a certificate\
    \ that was signed by the CA.\nYou point to the CA certificate by listing it under\
    \ the `[ssl]` section of the\ncqlshrc file ( `/home/cassandra/.cassandra/cqlshrc`),\n\
    as shown here:\n\n```\n[connection]\nhostname=192.168.159.130\nport=9042\nfactory\
    \ = cqlshlib.ssl.ssl_transport_factory\n[ssl]\ncertfile = /cassandra/apache-cassandra-3.10/conf/rootCa.crt\n\
    validate = true\n```\n\nNow you’ll be able to connect to Cassandra through cqlsh\
    \ using SSL.\n\n```\n$ cqlsh –ssh\n```\n\nYou now have a secure connection to\
    \ the Cassandra node through the cqlsh\nclient.\n\nJMX\nAuthentication and Authorization\n\
    \nJMX authentication and authorization allows you to control user access\nto JMX-based\
    \ tools such as nodetool and JConsole. You can configure JMX\nconnections to use\
    \ Cassandra’s internal authentication and authorization\nmechanisms, just as the\
    \ CQL clients do.\n\nIf you’ve configured usernames and passwords in the database\
    \ through the\nauthentication and authorization mechanism described earlier in\
    \ this\nchapter, you must execute JMS tools as well with the authentication and\n\
    authorization you’ve configured.\n\nBefore you can use nodetool or JConsole with\
    \ authentication, you must\nenable JMX authentication and authorization.\n\nEnabling\
    \ JMX Authentication and\nAuthorization\n\nBy default, JMX security isn’t configured,\
    \ meaning that you can access\nJMS tools such as nodetool and JConsole only from\
    \ the localhost. You can\nconfigure JMX authentication and authorization using\
    \ local password and\naccess files for configuring the credentials for users and\
    \ access\npermission. However, in Cassandra 3.6 onwards, you can also configure\n\
    JMX security by piggybacking on Cassandra’s internal authentication and\nauthorization.\n\
    \nIn this section, I show how to configure JMX authentication and\nauthorization\
    \ using local files.\n\nHere are the steps to configure JMX security  using local\n\
    files.\n\n1.  Edit the `cassandra-env` file  (in the `$CASSANDRA_HOME/conf`\n\
    \    directory), and change the two settings in the chunk shown here:\n\n```\n\
    \    if [ \"$LOCAL_JMX\" = \"yes\" ]; then\n    JVM_OPTS=\"$JVM_OPTS -Dcassandra.jmx.local.port=$JMX_PORT\"\
    \n    JVM_OPTS=\"$JVM_OPTS -Dcom.sun.management.jmxremote.authenticate=false\"\
    \n    else\n    ```\n\nIn the first line, change the “yes” to “no”. In the third\
    \ line, change\n    “false” to “true”.\n\n2.  Create the password file `/etc/cassandra/jmxremote.password`\n\
    \    (the default location) and add the following line to the file:\n\n```\n \
    \   cassandra  cassandra\n    ```\n\nI’m using the default superuser account here,\
    \ but this isn’t safe in a\n    production system, and you must replace this set\
    \ of credentials with one\n    or more credentials for all users that you’d like\
    \ to be able to access\n    JMX-compliant utilities such as nodetool.\n\n3.  Create\
    \ the access file (by default) /`etc/cassandra/jmxxremote.access`\n    and add\
    \ the following information to the access file:\n\n```\n    cassandra readwrite\n\
    \    create javax.management.monitor.,javax.management.timer.\n    \\unregister\n\
    \    ```\n\nThe `readwrite`\n    privilege you gave to the role cassandra enables\
    \ this JMX client to\n    work with MBeans. More specifically, it allows this\
    \ client to set\n    attributes, invoke operations, receive notifications, and\
    \ so on.\n\n4.  Restart the database.\n\n5.  Try running the `nodetool`  `status`\
    \ \n    command. Since you configured JMX authorization and authentication, you\n\
    \    shouldn’t be able to run this command as usual. If you’ve configured\n  \
    \  everything correctly, you should instead see the following error:\n\n```\n\
    \    $  nodetool status\n    nodetool: Failed to connect to '127.0.0.1:7199' -\
    \ SecurityException: 'Authentication failed! Credentials required'.\n    ```\n\
    \n6.  Run the `nodetool status` command by providing the credentials for the role\
    \ cassandra.\n\n```\n    $ nodetool -u cassandra -pw cassandra status\n    Datacenter:\
    \ datacenter1\n    =======================\n    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n\
    \    --  Address          Load       Tokens       Owns (effective)  Host ID  \
    \                             Rack\n    UN  192.168.159.129  24.21 MiB  256  \
    \        49.9% 0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\n    UN  192.168.159.130\
    \  24.25 MiB  256          50.1% 001399d4-49fc-467c-b188-e93629a0f118\n    ```\n\
    \nThe database is now configured for JMX authentication and authorization.\nAs\
    \ with the nodetool utility, you’ll now be required to provide a\nusername and\
    \ password when you use JConsole to remotely connect to a\nCassandra cluster.\n\
    \nUsing cqlsh with Authentication\n\nYou can configure authentication so that\
    \ logging into cqlsh requires a\npassword. You do this by creating or modifying\
    \ the `cqlshrc` file. The\nfollowing are the steps to configure this authentication.\n\
    \n1.  Edit the cqlshrc file, or if you don’t have one, create one in the\n   \
    \ following location:\n\n```\n    /etc/cassandra/cqlshrc.sample              \
    \   /* package installation\n    install_location/conf/cqlshrc.sample        \
    \  /* tarball installation\n    ```\n\n2.  Enter the following lines in the `cqlshrc`\
    \ file:\n\n```\n    [authentication]\n    username = sam\n    password = !!bang!!$\n\
    \    ```\n\n3.  Secure the file by setting the following permissions   :\n\n```\n\
    \    $ sudo chmod 400 home/.cassandra/cqlshrc\n    ```\n\nSummary\n\nSecuring\
    \ Cassandra is a multi-faceted affair. To secure your data\ncomprehensively, besides\
    \ configuring authentication, authorization, and\nSSL encryption of inter-cluster\
    \ and client-cluster communications, you\nmay also want to encrypt data at rest.\n\
    \nSeveral good third-party encrypting solutions exist. By using one or\nmore them\
    \ you can complete the circle and reduce the chances of a\nsecurity breach. I\
    \ didn’t discuss these products in this chapter, but a\nquick search on the Internet\
    \ for “encryption at rest” should show you\nthe available choices.\n\nIndex\n\n\
    A\n\nAccrual detection mechanism\n\nAdministration tools\n\ncassandra-stress tool\n\
    \ncassandra utility\n\nnodetool utility\n\nSSTable utilities\n\nAkka\n\nAllocation\
    \ algorithm\n\nALTER KEYSPACE privilege\n\nAmazon EC2\n\nAMIs\n\nAWS\n\nconfiguring\
    \ Cassandra cluster\n\ncreate instance\n\nadd storage\n\nAMI\n\nchoose type\n\n\
    configure details\n\nconfigure security group\n\nkey pair\n\nreview launch\n\n\
    tag\n\ninstall Cassandra\n\nAmazon Machine Image (AMI)\n\nAmazon’s DynamoDB\n\n\
    Amazon Web Services (AWS)\n\nAnti-entropy repair\n\ndefinition\n\nMerkel trees\n\
    \nnodetool repair command\n\nANY consistency level\n\nApache Cassandra\n\nbloom\
    \ filters\n\nbuild from source\n\ncassandra.yaml file\n\ncheck status\n\nclearing\
    \ cassandra data\n\ncluster\n\ncompaction\n\ncompression\n\ndefinition\n\ndistributed\
    \ data\n\ndrawbacks\n\nimmutable tables and mutation\n\nlack of support for transactions\n\
    \nno indexes\n\nno joins\n\nquerying data"
  trans: "\n# 更高级的默认配置如下\n\n```yaml\nprotocol: TLS\nalgorithm: SunX509\nstore_type:\
    \ JKS\ncipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]\n\
    ```\n\n此时，您必须重启集群。\n\n在节点启动过程中生成的日志中，您将看到以下消息，表明客户端与数据库服务器之间现已启用 SSL 加密：\n\n```\n\
    INFO  [main] 2017-09-05 14:17:10,681 Server.java:145 - Enabling encrypted CQL\
    \ connections between client and server\n```\n\n集群恢复后，由于现已启用 SSL 验证，您必须指定 `--ssl`\
    \ 选项才能连接到 Cassandra：\n\n```\n$ cqlsh --ssl\nValidation is enabled; SSL transport\
    \ factory requires a valid certfile to be specified. Please provide path to the\
    \ certfile in [ssl] section as 'certfile' option in /home/cassandra/.cassandra/cqlshrc\
    \ (or use [certfiles] section) or set SSL_CERTFILE environment variable.\n$\n\
    ```\n\n您看到此错误的原因是因为您已为客户端通信启用了 SSL，因此 `cqlsh`（作为客户端）现在不信任 Cassandra 节点。为了让它信任该节点，它需要看到您之前生成的\
    \ CA 证书（`rootCa.crt`）。这确保了 Cassandra 使用的是由 CA 签名的证书。您可以通过在 `cqlshrc` 文件（`/home/cassandra/.cassandra/cqlshrc`）的\
    \ `[ssl]` 部分下列出 CA 证书来指向它，如下所示：\n\n```ini\n[connection]\nhostname=192.168.159.130\n\
    port=9042\nfactory = cqlshlib.ssl.ssl_transport_factory\n[ssl]\ncertfile = /cassandra/apache-cassandra-3.10/conf/rootCa.crt\n\
    validate = true\n```\n\n现在，您将能够通过 `cqlsh` 使用 SSL 连接到 Cassandra。\n\n```\n$ cqlsh\
    \ –ssl\n```\n\n您现在通过 `cqlsh` 客户端与 Cassandra 节点建立了安全连接。\n\n## JMX 认证与授权\n\nJMX\
    \ 认证和授权允许您控制用户对基于 JMX 的工具（如 `nodetool` 和 `JConsole`）的访问。您可以配置 JMX 连接使用 Cassandra\
    \ 的内部认证和授权机制，就像 CQL 客户端一样。\n\n如果您已通过本章前面描述的认证和授权机制在数据库中配置了用户名和密码，那么您也必须使用已配置的认证和授权信息来执行\
    \ JMX 工具。\n\n在您能够使用带有认证功能的 `nodetool` 或 `JConsole` 之前，必须先启用 JMX 认证和授权。\n\n###\
    \ 启用 JMX 认证与授权\n\n默认情况下，JMX 安全性未配置，这意味着您只能从 `localhost` 访问 JMX 工具（如 `nodetool`\
    \ 和 `JConsole`）。您可以使用本地密码文件和访问文件来配置 JMX 认证和授权，以设置用户的凭据和访问权限。然而，从 Cassandra 3.6\
    \ 开始，您也可以通过“搭乘” Cassandra 内部认证和授权的顺风车来配置 JMX 安全性。\n\n在本节中，我将展示如何使用本地文件配置 JMX 认证和授权。\n\
    \n以下是使用本地文件配置 JMX 安全性的步骤。\n\n1.  编辑 `cassandra-env.sh` 文件（位于 `$CASSANDRA_HOME/conf`\
    \ 目录中），并在此处显示的代码块中更改两个设置：\n\n```bash\n    if [ \"$LOCAL_JMX\" = \"yes\" ]; then\n\
    \    JVM_OPTS=\"$JVM_OPTS -Dcassandra.jmx.local.port=$JMX_PORT\"\n    JVM_OPTS=\"\
    $JVM_OPTS -Dcom.sun.management.jmxremote.authenticate=false\"\n    else\n```\n\
    \n在第一行，将 `\"yes\"` 改为 `\"no\"`。在第三行，将 `\"false\"` 改为 `\"true\"`。\n\n2.  创建密码文件\
    \ `/etc/cassandra/jmxremote.password`（默认位置），并在文件中添加以下一行：\n\n```\n    cassandra\
    \  cassandra\n```\n\n我这里使用的是默认的超级用户账户，但这在生产系统中并不安全，您必须用一个或多个您希望其能够访问 JMX 兼容实用程序（如\
    \ `nodetool`）的用户凭据来替换这组凭据。\n\n3.  创建访问文件（默认）`/etc/cassandra/jmxremote.access`，并在访问文件中添加以下信息：\n\
    \n```\n    cassandra readwrite\n    create javax.management.monitor.*,javax.management.timer.*\n\
    \    \\unregister\n```\n\n您授予角色 `cassandra` 的 `readwrite` 权限使此 JMX 客户端能够处理 MBeans。更具体地说，它允许此客户端设置属性、调用操作、接收通知等。\n\
    \n4.  重启数据库。\n\n5.  尝试运行 `nodetool status` 命令。由于您配置了 JMX 授权和认证，您应该无法像往常一样运行此命令。如果您已正确配置所有内容，您应该会看到以下错误：\n\
    \n```\n    $ nodetool status\n    nodetool: Failed to connect to '127.0.0.1:7199'\
    \ - SecurityException: 'Authentication failed! Credentials required'.\n```\n\n\
    6.  通过提供角色 `cassandra` 的凭据来运行 `nodetool status` 命令。\n\n```\n    $ nodetool -u\
    \ cassandra -pw cassandra status\n    Datacenter: datacenter1\n    =======================\n\
    \    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n    --  Address\
    \          Load       Tokens       Owns (effective)  Host ID                 \
    \              Rack\n    UN  192.168.159.129  24.21 MiB  256          49.9% 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\
    \  rack1\n    UN  192.168.159.130  24.25 MiB  256          50.1% 001399d4-49fc-467c-b188-e93629a0f118\n\
    ```\n\n数据库现已配置好 JMX 认证和授权。与 `nodetool` 实用程序类似，当您使用 `JConsole` 远程连接到 Cassandra\
    \ 集群时，现在也需要提供用户名和密码。\n\n## 使用带有认证功能的 `cqlsh`\n\n您可以配置认证，使得登录 `cqlsh` 需要密码。通过创建或修改\
    \ `cqlshrc` 文件来实现。以下是配置此认证的步骤。\n\n1.  编辑 `cqlshrc` 文件，或者如果您没有该文件，请在以下位置创建一个：\n\
    \n```\n    /etc/cassandra/cqlshrc.sample                 /* 包管理器安装\n    install_location/conf/cqlshrc.sample\
    \          /* tarball 安装\n```\n\n2.  在 `cqlshrc` 文件中输入以下行：\n\n```ini\n    [authentication]\n\
    \    username = sam\n    password = !!bang!!$\n```\n\n3.  通过设置以下权限来保护文件安全：\n\n\
    ```\n    $ sudo chmod 400 /home/.cassandra/cqlshrc\n```\n\n## 总结\n\n保护 Cassandra\
    \ 的安全是一项多方面的工作。要全面保护您的数据，除了配置集群间和客户端-集群通信的认证、授权和 SSL 加密外，您可能还希望加密静态数据。\n\n市面上有几种不错的第三方加密解决方案。通过使用其中一种或多种方案，您可以完成安全防护的闭环，降低安全漏洞发生的可能性。本章中我没有讨论这些产品，但通过互联网快速搜索“静态数据加密”应该就能看到可用的选择。\n\
    \n# 索引\n\n## A\n\n- 应计检测机制\n- 管理工具\n    - `cassandra-stress` 工具\n    - `cassandra`\
    \ 实用程序\n    - `nodetool` 实用程序\n    - SSTable 实用程序\n- Akka\n- 分配算法\n- `ALTER KEYSPACE`\
    \ 权限\n- Amazon EC2\n    - AMI\n    - AWS\n        - 配置 Cassandra 集群\n        \
    \    - 创建实例\n            - 添加存储\n            - AMI\n            - 选择类型\n     \
    \       - 配置详细信息\n            - 配置安全组\n            - 密钥对\n            - 检查启动\n\
    \            - 标签\n        - 安装 Cassandra\n- Amazon 机器映像 (AMI)\n- Amazon 的 DynamoDB\n\
    - Amazon Web Services (AWS)\n- 反熵修复\n    - 定义\n    - 默克尔树\n    - `nodetool repair`\
    \ 命令\n- `ANY` 一致性级别\n- Apache Cassandra\n    - 布隆过滤器\n    - 从源码构建\n    - `cassandra.yaml`\
    \ 文件\n    - 检查状态\n    - 清除 cassandra 数据\n    - 集群\n    - 压实\n    - 压缩\n    - 定义\n\
    \    - 分布式数据\n    - 缺点\n        - 不可变表与变更\n        - 缺乏对事务的支持\n        - 无索引\n\
    \        - 无连接\n    - 查询数据\n"
