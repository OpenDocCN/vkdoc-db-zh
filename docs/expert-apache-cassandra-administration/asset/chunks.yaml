  trans: '

    ### 写入提交日志以保护更改


    Cassandra 在写入数据时做的第一件事是将写操作追加到磁盘上的提交日志。这样做的目的是为了保护写操作免受节点电源故障等情况的影响。因此，提交日志是 C**assandra
    持久性保证**的关键组件。


    数据库只有在数据写入提交日志后才认为一次写入成功。如果数据库在写入提交日志后立即崩溃，也没问题。一旦数据库重新启动，它首先要做的是重放提交日志，以恢复所有存在于其中但尚未写入
    SSTables 的事务。提交日志只有一个用途：保存已提交的数据，直到它被永久写入 SSTables 中的磁盘。


    默认情况下，数据库将提交日志存储在 `/var/lib/cassandra/commitlog` 目录中，但你可以通过设置 `commitlog_directory`
    属性来指定自定义位置。理想情况下，你必须将提交日志存储在与存储数据文件目录的物理设备分开的物理设备上。


    当为提交日志配置的空间达到其限制时，数据库会将内存表刷新到磁盘。数据库首先刷新最旧的提交日志段，并从提交日志中移除这些日志段。


    启动数据库时，它会重放提交日志。你可以通过确保提交日志不会太大来减少重放时间。当然，如果你配置的提交日志太小，对于活动表来说，数据库将会相当频繁地将数据刷新到磁盘。


    通过在 `cassandra.yaml` 文件中设置以下属性来管理提交日志：


    *   `commitlog_total_space_in_mb`：配置提交日志的总空间。对于 64 位 JVM，默认值为 8192MB。

    *   `commitlog_compression`：默认情况下，数据库不压缩提交日志，但你可以通过将此参数的值设置为 LZ4、Snappy 或 Deflate
    来使其压缩提交日志。


    数据库在以下时间归档提交日志：


    *   节点启动时

    *   将提交日志写入磁盘时

    *   在你指定的时间点


    你在 `commitlog_archiving.properties` 文件中配置提交日志归档，该文件位于


    *   `/etc/cassandra/commitlog_archiving.properties`（包安装）

    *   `install_location/conf/commitlog_archiving.properties`（tarball 安装）


    你可以使用 `archive_command` 命令归档一个提交日志段：


    ```

    $ archive_command=/bin/ln %path /backup/%name

    ```


    在此示例中，`path` 指的是你要归档的提交日志的路径，`name` 指的是提交日志的名称。


    要恢复已归档的提交日志，请执行 `restore_command` 命令：


    ```

    $ restore_command -cp -f %from %to

    ```


    `from` 参数指定了恢复目录中已归档提交日志段的路径。参数 `to` 指的是当前提交日志目录的名称。


    你可以通过在 `cassandra.yaml` 文件中如下指定路径来设置恢复目录的位置：


    ```

    restore_directories=

    ```


    ### 写入内存表以实现持久性


    Cassandra 的设计目标是尽可能快地处理大量数据。为了实现这一目标，如前所述，Cassandra 首先将所有新数据写入磁盘上的提交日志以确保其安全。对提交日志的写入是持久的，能够经受住电源故障等事件。


    一旦数据库将更改写入提交日志，它也会将该数据写入仅存在于内存中的内存表。为了提供持久性，Cassandra 在将新数据同时写入提交日志和一个内存表后即认为写入成功。


    重要的是要理解，提交日志仅用于在可能发生意外事件时支持数据的持久性，否则这些事件可能导致数据丢失。另一方面，内存表是数据库用来将数据永久写入磁盘上 SSTables
    的机制。


    #### 配置从内存表刷新数据


    每个内存表专用于存储特定表的数据，并且一个表可能有多个内存表。其中一个是数据库当前写入数据的内存表，其余的是已满并等待数据库将其刷新到磁盘的内存表。一旦一个内存表达到其内存限制（即，内存表已满），Cassandra
    就将该内存表的所有数据以 SSTable（一种文件）的形式写入磁盘。之后，它会创建一个新的内存表。


    当达到提交日志空间阈值或内存表清理阈值时，Cassandra 会将内存表刷新到磁盘。


    #### 配置提交日志空间阈值


    你可以使用 `commitlog_total_space_in_mb` 属性配置用于提交日志的总空间。你按节点配置提交日志。当数据库中所有提交日志占用的总空间超过你为此属性设置的值时，数据库会为最旧的提交日志段将内存表刷新到磁盘。


    `commitlog_total_space_in_mb` 属性的默认值是 8192MB。为提交日志可占用的总空间设置限制，将防止那些你很少更新的表永远占用提交日志段。


    如果你为 `commitlog_total_space_in_mb` 属性设置的值过低，所有表都将经历更频繁的刷新活动。


    注意


    你按节点配置提交日志，数据库中的所有表共享此日志。数据库按表维护内存表和 SSTables。


    #### 配置内存表清理阈值


    你也可以配置 `memtable_cleanup_threshold` 属性，以设置在数据库刷新最大的内存表之前，所有内存表总共可以使用的内存量。


    `memtable_cleanup_threshold` 属性现已**弃用**，因此我将不再进一步讨论此属性。


    你数据库中的数据大小以及写入负载的性质将决定你如何设置内存表阈值。如果写入很多，或者写入包括大量对小数据块的更新，那么增加内存表阈值是合适的。

    '
- fmt: '## 手动刷新 Memtables


    你可以手动刷新 memtables。最近一次刷新 memtables 意味着，如果节点因任何原因重启，数据库需要重放的 commit log 会更少。


    > **提示**：DataStax 建议在停止节点并再次启动之前刷新 memtable。


    当节点重启时，memtable 中的所有数据都会消失。你可以重放 commit log 来恢复节点停止时 memtable 中的写入操作。这是因为当你重放日志时，commit
    log 会重建 memtables。


    你可以使用 `nodetool flush` 或 `nodetool drain` 命令来手动刷新 memtable。


    `nodetool flush` 命令使你能够将一个或多个表的 memtable 从内存刷新到磁盘上的 SSTable。该命令的语法如下：


    ```

    $ nodetool flush -- (...)

    ```


    你必须指定 keyspace 的名称和一个或多个表，表名之间用空格分隔。


    `nodetool drain` 命令会排空整个节点；也就是说，它会将此节点上的所有 memtable 刷新到 SSTable。


    ```

    $ nodetool drain

    ```


    运行此命令后，数据库将停止监听任何连接，包括来自其他节点的连接。运行此命令后，你必须重启节点。


    > **注意**：使用 `nodetool flush` 命令将 memtable 刷新到磁盘。仅在特殊情况下运行 `nodetool drain` 命令，例如将节点升级到更新版本的
    Cassandra 时。


    commit log 由多个段组成。当数据库将一个段中的所有数据刷新到磁盘时，它会清除该段。或者，当 commit log 达到你通过 `commitlog_totalspace_in_mb`
    属性配置的最大大小时，数据库会先将最旧的段刷新到磁盘，然后从 commit log 中清除它们。


    ### 写入 SSTable 以实现持久存储


    数据库将 memtable 刷新到磁盘，写入 SSTable。SSTable（排序字符串表）是不可变的，这意味着一旦写入，数据库就不能再对其进行写入。如果你修改了
    SSTable 中的数据，该数据将作为 UPSERT（更新 + 插入）写入，Cassandra 会自动删除之前的数据。


    因为 SSTable 是不可变的，并且 Cassandra 在相应的 memtable 满时才批量写入它们，所以数据库无需执行随机寻道。相反，它只执行大规模的顺序
    I/O，这确保了高写入吞吐量。


    在传统的基于 B 树的数据库中，数据库必须在写操作期间执行读取以检查索引来定位当前数据。Cassandra 无需执行这些读取，从而保持了非常高的插入性能。


    当 Cassandra 读取数据时，它会读取与该表相关的 SSTable 和 memtable，因为 memtable 可能尚未刷新到磁盘，因此可能包含 SSTable
    中不存在的数据。


    #### SSTable 数据文件的格式


    SSTable 由磁盘上的文件组成，一个分区通常占用多个 SSTable 文件。以下是属于 SSTable 的操作系统级数据文件的结构：


    ```

    /data/ks1/cf1-5be396077b811e3a3ab9dc4b9ac088d/la-1-big-Data.db

    ```


    在此示例中：


    *   `ks1` 代表此 SSTable 所属的 keyspace。

    *   十六进制字符串 `5be396077b811e3a3ab9dc4b9ac088d` 代表一个唯一的表 ID。

    *   `la-1-big-Data.db` 是数据文件的名称。


    #### SSTable 的内部结构


    当 Cassandra 通过刷新 memtable 中的数据将 SSTable 写入磁盘时，它会为 SSTable 中的数据创建一个文件。此外，它还会随数据文件一起创建几种数据结构。这些数据结构中的每一种都由一个单独的文件表示，这些文件与数据库存储数据文件的目录相同。


    与 SSTable 相关的文件位于 `$CASSANDRA_HOME/data/data` 目录中。在这个主目录下，会为每个 keyspace 创建一个目录，在
    keyspace 目录下，你会找到每个表的子目录。例如，对于 `cycling` keyspace 中的 `cyclist_name` 表，`cycling.cyclist_name`
    表的文件位置如下（表的目录由表名和一个 UUID 组成，这有助于区分多个 schema 版本，因为表的 schema 可能会随着时间进行修改）：


    ```

    $ ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#
    ls -altr

    total 48

    drwxr-xr-x 2 cassandra cassandra 4096 Jun 24 12:35 backups

    drwxr-xr-x 5 cassandra cassandra 4096 Jun 24 12:36 ..

    -rw-r--r-- 1 cassandra cassandra   16 Jun 25 08:39 mc-1-big-Filter.db

    -rw-r--r-- 1 cassandra cassandra   20 Jun 25 08:39 mc-1-big-Index.db

    -rw-r--r-- 1 cassandra cassandra   92 Jun 25 08:39 mc-1-big-Summary.db

    -rw-r--r-- 1 cassandra cassandra   57 Jun 25 08:39 mc-1-big-Data.db

    -rw-r--r-- 1 cassandra cassandra   10 Jun 25 08:39 mc-1-big-Digest.crc32

    -rw-r--r-- 1 cassandra cassandra   43 Jun 25 08:39 mc-1-big-CompressionInfo.db

    -rw-r--r-- 1 cassandra cassandra 4660 Jun 25 08:39 mc-1-big-Statistics.db

    -rw-r--r-- 1 cassandra cassandra   92 Jun 25 08:39 mc-1-big-TOC.txt

    drwxr-xr-x 3 cassandra cassandra 4096 Jun 25 08:39 .

    ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#

    ```


    我在此总结主要的数据结构：


    *   数据文件 (`Data.db`)：这是主要的 SSTable 数据文件，也是 Cassandra 备份中唯一存储的文件。

    *   主索引 (`Index.db`)：一个包含行键及其在数据文件中位置指针的索引。

    *   统计信息 (`Statistics.db`)：包含有关 SSTable 数据的统计元数据。

    *   压缩信息 (`Compressioninfo.db`)：包含有关 SSTable 压缩信息的文件。

    *   二级索引 (`SI_.*.db`)：内置的二级索引。每个 SSTable 可能有一个或多个这样的文件。

    *   SSTable 索引摘要 (`Summary.db`)：数据库在内存中存储的分区索引的样本。

    *   布隆过滤器 (`Filter.db`)：此文件包含此表的布隆过滤器。布隆过滤器是一种内存结构，可在访问 SSTable 之前帮助数据库快速检查行数据是否在
    memtable 中。SSTable 的布隆过滤器可提升读取性能。


    你可以压缩 SSTable 以节省存储空间。我将在第 [11](#A436674_1_En_11_Chapter.html) 章中解释 SSTable 压缩。


    #### 缓存 SSTable 数据


    Cassandra 为 SSTable 数据提供三种类型的缓存：


    *   键缓存存储分区键到行索引条目的映射，允许快速访问 SSTable。简而言之，键缓存存储表的分区索引。

    *   行缓存缓存频繁访问的行以加快对这些行的访问。

    *   计数器缓存为你需要频繁访问的计数器提升性能。


    键缓存和计数器缓存默认启用。Cassandra 将缓存的数据存储到磁盘，以便在重启数据库时可以快速将其拉入内存。我将在第 [11](#A436674_1_En_11_Chapter.html)
    章中详细解释缓存。'
  raw: '#### Manually Flushing the Memtables


    You can manually flush the memtables. A recent flush of the memtables means that
    the database will need to replay a lower amount of commit logs, should the node
    restart for any reason.


    Tip


    DataStax recommends that you flush the memtable before stopping a node and starting
    it up again.


    When a node restarts, all data in the memtable is gone. You can replay the commit
    log to restore the writes that were in the memtable when the node was stopped.
    This is so because the commit log rebuilds the memtables when you replay the log.


    You can perform a manual flush of a memtable with either the `nodetool flush`
    or the `nodetool drain` command.


    The `nodetool flush` command enables you to flush one or more tables from the
    memtables in memory to SSTables on disk. The command has the following syntax:


    ```

    $ nodetool  flush --  (  ... )

    ```


    You must specify the name of the keyspace and one or more tables, separated by
    a space.


    The `nodetool drain` command drains the entire node; that is, it flushes all memtables
    on this node to SSTables.


    ```

    $ nodetool  drain

    ```


    When you run this command, the database stops listening for any connections, including
    those from other nodes. You must restart the node after running this command.


    Note


    Use the `nodetool flush` command to flush memtables to disk. Run the `nodetool
    drain` command only for special occasions, such as when you’re upgrading a node
    to an updated version of Cassandra.


    The commit log is comprised of segments. When the database flushes all the data
    in a segment to disk, it purges the segment. Alternatively, when the commit log
    hits the max size that you’ve configured with the `commitlog_totalspace_in_mb`
    property, the database purges the oldest segments from the commit log, flushing
    the segments to disk first.


    ### Writing to the SSTables for Durable Storage


    The database flushes memtables to disk , to an SSTable. An SSTable (Sorted String
    Table) is immutable, meaning that once it’s written, the database can’t write
    to it ever again. If you modify the data in an SSTable, that data is written as
    an UPSERT (UPDATE + INSERT), and Cassandra automatically removes the previous
    data.


    Because SSTables are immutable, and Cassandra writes to them in batches when the
    corresponding memtables get full, so the database doesn’t have to perform random
    seeks. Instead, it performs only sequential I/O in large batches, which ensures
    a high write throughput.


    In a traditional B-tree based database , the database must perform a read during
    a write operation to check the indexes to see where the current data is. Cassandra
    doesn’t have to do these reads, thus keeping insert performance very high.


    When Cassandra reads data, it reads both the SSTables and the memtables associated
    with that table since the memtables may not be flushed to disk yet and thus may
    contain data that’s not present in the SSTables.


    #### Format of an SSTable Data File


    An SSTable consists of files on disk, and a partition usually occupies multiple
    SSTable files. Here’s the structure of an OS-level data file that belongs to an
    SSTable:


    ```

    /data/ks1/cf1-5be396077b811e3a3ab9dc4b9ac088d/la-1-big-Data.db

    ```


    In this example,


    *   `ks1` represents the keyspace that this SSTable belongs to.

    *   The hexadecimal string `5be396077b811e3a3ab9dc4b9ac088d` represents a unique
    table ID.

    *   `la-1-big-Data.db` is the name of the data file.


    #### Structures Inside an SSTable


    When Cassandra writes an SSTable to disk by flushing data from the memtables,
    it creates a file for the data in the SSTable. Additionally, it creates several
    data structures along with the datafiles. These data structures are each represented
    by a separate file in the same directory where the database stores the data files.


    The files relating to an SSTable are located in the `$CASSANDRA_HOME/data/data`
    directory. In this main directory, there’ll be a directory for each keyspace,
    under which you’ll find a subdirectory for each table. For example, for the `cyclist_name`
    table in the `cycling` keyspace, the following is where you’ll find the files
    for the `cycling.cyclist_name` table (the directory for the table consists of
    the table name along with an UUID, which helps distinguish between multiple schema
    versions since a table’s schema can go through modifications over time):


    ```

    $ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#
    ls -altr

    total 48

    drwxr-xr-x 2 cassandra cassandra  4096 Jun 24 12:35 backups

    drwxr-xr-x 5 cassandra cassandra  4096 Jun 24 12:36 ..

    -rw-r--r-- 1 cassandra cassandra    16 Jun 25 08:39 mc-1-big-Filter.db

    -rw-r--r-- 1 cassandra cassandra    20 Jun 25 08:39 mc-1-big-Index.db

    -rw-r--r-- 1 cassandra cassandra    92 Jun 25 08:39 mc-1-big-Summary.db

    -rw-r--r-- 1 cassandra cassandra    57 Jun 25 08:39 mc-1-big-Data.db

    -rw-r--r-- 1 cassandra cassandra    10 Jun 25 08:39 mc-1-big-Digest.crc32

    -rw-r--r-- 1 cassandra cassandra    43 Jun 25 08:39 mc-1-big-CompressionInfo.db

    -rw-r--r-- 1 cassandra cassandra  4660 Jun 25 08:39 mc-1-big-Statistics.db

    -rw-r--r-- 1 cassandra cassandra    92 Jun 25 08:39 mc-1-big-TOC.txt

    drwxr-xr-x 3 cassandra cassandra  4096 Jun 25 08:39 .

    ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#

    ```


    I summarize the main data structures here:


    *   Data (`Data.db`): This is the main SSTable data file, and the only file stored
    by Cassandra’s backups.

    *   Primary Index (`Index.db`): An index of the row keys with pointers to the
    key locations on the data file.

    *   Statistics (`Statistics.db`): Contains the statistical metadata about the
    SSTable’s data.

    *   Compression Information (`Compressioninfo.db`): A file that contains information
    regarding the compression of the SSTable.

    *   Secondary Index (`SI_.*.db`): The built-in secondary index. There may be more
    than one of these per SSTable.

    *   SSTable Index Summary (`Summary.db`): A sample of the partition index that
    the database stores in memory.

    *   Bloom Filter (`Filter.db`): This file contains the Bloom filter for this table.
    The Bloom filter is a memory structure that helps the database quickly check if
    row data is in the memtable, before accessing the SSTables. Bloom filters for
    an SSTable enhance read performance.


    You can compress SSTables to save storage. I explain SSTable compression in Chapter
    [11](#A436674_1_En_11_Chapter.html).


    #### Caching SSTable Data


    Cassandra provides three types of caching for SSTable data:


    *   A key cache stores a map of partition keys to row index entries, which allows
    fast access to SSTables. In simpler terms, the key cache stores partition indexes
    for tables.

    *   A row cache caches frequently accessed rows to speed up access to those rows.

    *   A counter cache improves performance for the counters that you’ll need to
    access frequently.


    Key and counter caches are enabled by default. Cassandra stores cached data to
    disk so it can quickly pull it into memory when you restart the database. I explain
    caching in detail in Chapter [11](#A436674_1_En_11_Chapter.html).'
