    ### 节点退役 (`nodetool decommission`)


    你可以运行 `nodetool decommission` 命令，让一个节点将其所有数据发送给环中的下一个节点。退役一个节点是引导节点的逆操作。以下是一个展示如何退役节点的示例。


    1.  首先，检查节点状态，确保所有（本例中为两个）节点都处于启动状态。


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                                 Rack

    UN  192.168.159.129  338.19 KiB  256          49.0%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UN  192.168.159.130  339.49 KiB  256          51.0%             a1085901-738c-4bbd-b050-007f62da893d  rack1

    $

    ```


    2.  然后在 IP 为 192.168.159.129 的节点上运行 `nodetool decommission` 命令。


    ```

    $ nodetool decommission

    ```


    3.  检查集群状态，注意被退役的节点现在显示状态为 UL (UP LEAVING)，表明它正在从集群中过渡退出。


    ```

    UN  192.168.159.129  338.19 KiB  256          49.0%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UL  192.168.159.130  339.49 KiB  256          51.0%             a1085901-738c-4bbd-b050-007f62da893d  rack1

    $

    ```


    在运行 `nodetool decommission` 命令后，`system.log 文件` 显示以下输出：


    ```

    CP Connection(4)-127.0.0.1] 2017-07-13 10:48:38,266 StorageService.java:1435 -
    LEAVING: sleeping 30000 ms for batch processing and pending range setup

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,776 StorageService.java:1435
    - LEAVING: replaying batch log and streaming data to other nodes

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,902 StreamResultFuture.java:90
    - [Stream #9254bbf0-67f3-11e7-9d74-6bc8e6fb7ba6] Executing streaming plan for
    Unbootstrap

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,904 StorageService.java:1435
    - LEAVING: streaming hints to other nodes

    INFO  [HintsDispatcher:2] 2017-07-13 10:49:08,963 HintsDispatchExecutor.java:152
    - Transferring all hints to 0dbb9e0e-867e-4179-b6b6-631d38dd68f9

    ...

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:09,413 StorageService.java:3938
    - Announcing that I have left the ring for 30000ms

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:39,428 Server.java:176
    - Stop listening for CQL clients

    WARN  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:39,429 Gossiper.java:1514
    - No local state, state is in silent shutdown, or node hasn''t joined, not announcing
    shutdown

    ...

    $

    ```


    4.  检查集群状态。果然，被退役的节点已经离开了集群。


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                                 Rack

    UN  192.168.159.129  328.53 KiB  256          100.0%            0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    $

    ```


    5.  接下来，如果你尝试通过重新启动该节点将其添加回集群，此尝试会失败，如下方 `cassandra` 命令的输出所示：


    ```

    $ cassandra ...

    , 9079045138376597795, 9105248878993821997, 9166471019946737685, 9167277031713212107,
    9167870256226113023]

    ...

    This node was decommissioned and will not rejoin the ring unless cassandra.override_decommission=true
    has been set, or all existing data is removed and the node is bootstrapped again

    Fatal configuration error; unable to start server.  See log for stacktrace.

    ERROR [main] 2017-07-13 10:58:29,816 CassandraDaemon.java:752 - Fatal configuration
    error

    ...

    $

    ```


    当你重启节点时，你尝试重新入群的节点无法加入环。如你所见，Cassandra 很贴心地提供了两种方式让该节点重新加入环：

    *   移除被退役节点上的所有数据并重新引导它。

    *   设置 `cassandra.override_decommission=true` 选项。


    在接下来的章节中，我将展示如何使用这两种方法将退役的节点重新加入集群。


    #### 移除所有数据并重启节点


    将退役节点重新添加回集群的直接方法是简单地移除该节点上的所有旧数据，这些数据存储在 `/data` 下的以下目录中：

    *   `commitlog`

    *   `data`

    *   `saved_caches`


    当你退役节点时，Cassandra 会重新分配令牌。一旦你从被退役节点上移除了所有数据，Cassandra 就允许该节点重新加入，并再次为其分配其份额的令牌。


    移除所有数据后，重启被退役的节点。


    ```

    $ cassandra

    ...

    INFO  [main] 2017-07-13 11:13:47,122 ColumnFamilyStore.java:406 - Initializing
    system.hints

    INFO  [main] 2017-07-13 11:13:47,156 ColumnFamilyStore.java:406 - Initializing
    system.batchlog

    INFO  [GossipStage:1] 2017-07-13 11:13:50,736 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [main] 2017-07-13 11:13:51,939 StorageService.java:1435 - JOINING: waiting
    for ring information

    INFO  [InternalResponseStage:1] 2017-07-13 11:13:52,829 ColumnFamilyStore.java:406
    - Initializing cycling.cycle

    INFO  [main] 2017-07-13 11:14:24,036 StorageService.java:1435 - JOINING: Starting
    to bootstrap...

    INFO  [main] 2017-07-13 11:14:25,128 StorageService.java:1435 - JOINING: Finish
    joining ring

    ...

    INFO  [main] 2017-07-13 11:14:25,193 SecondaryIndexManager.java:508 - Executing
    pre-join post-bootstrap tasks for: CFS(Keyspace=''cycling'', ColumnFamily="cycle")

    INFO  [main] 2017-07-13 11:14:33,359 CassandraDaemon.java:725 - No gossip backlog;
    proceeding

    ...

    ```


    被退役的节点现在重新加入了环。Cassandra 已经重新分配了集群中的数据。你可以通过运行 `nodetool status` 命令来确认节点已回到集群中。


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                               Rack

    UN  192.168.159.129  350.33 KiB  256          48.5%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UN  192.168.159.130  158.45 KiB  256          51.5%             9ee09b72-a6db-4de4-9aed-de32c5e7c344  rack1

    $

    ```


    #### 设置 `cassandra.override_decommission=true` 选项


    或者，你可以在你已退役节点的 `cassandra-env.sh` 文件中设置以下选项，然后重启该节点。节点重启后，它将加入集群。


    ```

    JVM_OPTS="$JVM_OPTS -D cassandra.override_decommission=true"

    ```

