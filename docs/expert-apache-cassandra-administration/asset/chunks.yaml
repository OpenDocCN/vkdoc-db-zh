    \ |           FRAME\nfb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |      \
    \  MATTHEWS\n5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS\n\
    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |       TIRALONGO\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47\
    \ |    Steven |      KRUIKSWIJK\ne7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna\
    \ | VAN DER BREGGEN\n(8 rows)\nTracing session: b2b0eda0-8117-11e7-81bd-63c57c069fd1\n\
    activity                                             | timestamp             \
    \     | source          | source_elapsed | client\nExecute CQL3 query | 2017-08-14\
    \ 10:40:44.026000 | 192.168.159.130 |              0 | 127.0.0.1\nParsing select\
    \ * from cycling.cyclist_name; [Native-Transport-Requests-1] | 2017-08-14 10:40:44.027000\
    \ | 192.168.159.130 |            364 | 127.0.0.1\nPreparing statement [Native-Transport-Requests-1]\
    \ | 2017-08-14 10:40:44.027000 | 192.168.159.130 |            503 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.073000 | 192.168.159.129 |             22 | 127.0.0.1\n\
    Sending REQUEST_RESPONSE message to /192.168.159.130 [MessagingService-Outgoing-/192.168.159.130-Small]\
    \ | 2017-08-14 10:40:44.086000 | 192.168.159.129 |          13202 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.095000 | 192.168.159.129 |             18 | 127.0.0.1\n\
    REQUEST_RESPONSE message received from /192.168.159.129 [MessagingService-Incoming\n\
    ...                               Processing response from /192.168.159.129 [RequestResponseStage-5]\
    \ | 2017-08-14 10:40:44.557001 | 192.168.159.130 |         531160 | 127.0.0.1\n\
    Request complete | 2017-08-14 10:40:44.562582 | 192.168.159.130 |         536582\
    \ | 127.0.0.1\ncqlsh>\n```\n\n输出显示了 Cassandra 如何解析 CQL 语句并在发送请求消息之前准备它，接收节点然后响应该请求消息。最后，“Request\
    \ Complete”注释显示请求已被节点成功处理。\n\n## 调优布隆过滤器\n\n正如我在第 5 章中解释的，布隆过滤器是 Cassandra 的一种性能辅助工具。它们在索引扫描期间帮助数据库，让其知道某个\
    \ SSTable 是否包含特定分区的数据。当客户端请求数据时，布隆过滤器会在数据库执行磁盘 I/O 之前检查该行是否存在。\n\n配置布隆过滤器涉及在内存使用和快速找到数据的概率之间进行权衡，使用比不配置更少的\
    \ I/O。\n\n### 配置布隆过滤器\n\n您可以将表的 `bloom_filter_fp_chance` 属性设置为 0 到 1 之间的值。当您从\
    \ 0 到 1 时，您使用的内存更少。值为 0 表示您为布隆过滤器设置了最大值，并使用了最高内存量。将其设置为 1 表示您已禁用布隆过滤器。\n\n`bloom_filter_fp_chance`\
    \ 属性的默认值取决于当前使用的压实策略。以下是 Cassandra 的三种主要压实策略下此属性的值：\n\n*   对于 `LeveledCompactionStrategy`：0.1\n\
    *   对于 `SizeTieredCompactionStrategy`、`DataTieredCompactionStrategy` 和 `TimeWindowCompactionStrategy`：0.01。\n\
    \n`bloom_filter_fp_chance` 属性的推荐值是 0.1。更高的值不一定有帮助，因为提高值会产生收益递减。这是因为更高的值消耗更多内存，但产生不成比例的较小性能收益。您可以在创建表时设置该属性，也可以稍后设置。\n\
    \n### 重新生成布隆过滤器\n\n每当您更改表的 `bloom_filter_fp_chance` 属性的值时，必须重新生成布隆过滤器。您可以通过两种方式重新生成布隆过滤器：运行表的手动压实或升级\
    \ SSTable。\n\n要手动压实表，请运行 `nodetool compact` 命令。`nodetool compact` 命令的语法如下：\n\n\
    ```\nnodetool [options] compact [(-et | --end-token <value>)] [(-s | --split-output)]\
    \ [(-st | --start-token <value>)] [--] [<keyspace> <table>...]\n[--user-defined]\
    \ <SSTable>...\n```\n\n您必须通过从 `STCS`、`TWCS` 和 `LCS` 压实策略中选择来指定压实策略。默认情况下，该命令对数据库中的所有键空间和表运行主要压实，但您可以将压实限制为一个或多个表。\n\
    \n手动压实 SSTable 以重新生成布隆过滤器几乎从来都不是一个好的策略。当您更改表的 `bloom_filter_fp_chance` 属性的值时，您可以改为升级\
    \ SSTable。这是通过运行 `nodetool upgradetsstables` 命令来完成的。该命令的语法如下：\n\n```\n$ nodetool\
    \ upgradesstables [(-a | --include-all-sstables)] [--] [<keyspace> [<table>...]]\n\
    ```\n\n## 缓存数据\n\n为了优化 Cassandra 对缓存内存的使用，您可以配置表的 `caching` 属性。缓存有助于 Cassandra\
    \ 对节点进行热重启，数据库会定期将缓存存储到磁盘，并在您重启节点时将其读回缓存。没有缓存意味着节点需要更长的时间来重启。\n\n缓存对于非常繁忙的集群很有用。不建议对需求不高的数据进行缓存。因此，将频繁读取的数据分离到单独的表中以便可以缓存这些表中的数据是一个好主意。在处理包含极长分区的表时，缓存数据也不是一个好主意。\n\
    \n### 数据缓存的类型\n\n有两种主要类型的数据缓存：键缓存和行缓存。（此外，您还可以要求 Cassandra 缓存计数器，我将在后面解释。）\n\n\
    *   键缓存：键缓存也称为分区键缓存，缓存 SSTable 的分区索引。数据库需要更少的磁盘读取来从键缓存中获取数据，而不是从磁盘或操作系统页面缓存中获取数据。由于键缓存以更少的内存量提供了更高的缓存读取可能性，Cassandra\
    \ 默认启用它。\n*   行缓存：您可以要求 Cassandra 缓存分区中特定数量的行。您使用 `rows_per_partition` 表选项设置要缓存的行数。由于行缓存存储整行而不仅仅是键，当处理大型数据集时，它可能导致性能下降，因为数据库可能必须从磁盘读取数据，而内存可能不足以存储所有数据。请仔细配置行缓存，因为它有时可能损害性能而不是帮助性能。\n\
    \n关于在 Cassandra 数据库中使用缓存，您需要记住以下关键原则：\n\n*   您不希望为表同时设置两种类型的缓存。为表选择分区键缓存或行缓存之一。\n\
    *   行缓存比键缓存占用更多空间，因为它存储整行。因此，有选择地使用行缓存是一个好主意，仅将其用于缓存用户和客户端频繁访问的行。\n*   至于必须缓存哪些表，读取密集型表是缓存的良好目标。当表的读取量远远超过写入量时，缓存是您需要考虑的事情。\n\
    \n**注意**\n您的用户不常读取归档表，因此您可以禁用这些表的缓存。\n\n### Cassandra 在哪里存储缓存数据\n\nCassandra 将行和键缓存存储在您可以通过配置属性\
    \ `saved_caches_directory` 指定的目录中。`saved_caches_directory` 属性的默认位置确定如下：\n\n* \
    \  `/var/lib/cassandra/saved_caches`（用于包安装）\n*   `install_location/data/saved_caches`（用于压缩包安装）\n\
    \n### 配置缓存\n\n您可以设置两个决定缓存行为的属性：\n\n*   `keys`：此属性可以取值 `ALL` 或 `NONE`。值 `ALL` 表示所有主键或行。值\
    \ `NONE` 表示没有主键或行。默认值是 `ALL`。\n*   `rows_per_partition`：此属性帮助您设置数据库必须在分区中缓存的行数。此属性有三个值：`ALL`、`NONE`\
    \ 和 `N`。值 `ALL` 和 `NONE` 的含义与 `keys` 属性相同。值 `N` 指定每个分区的行数。默认值是 `NONE`。\n\n您在创建表时或之后设置表缓存属性以配置分区键缓存和行缓存。以下是\
    \ `caching` 表属性的语法：\n\n```\ncaching = {\n'keys' = 'ALL | NONE',\n'rows_per_partition'\
    \ = 'ALL' | 'NONE' | N\n}\n```\n\n默认情况下，Cassandra 用于缓存数据的设置如下：\n\n```\n{ 'keys'\
    \ : 'ALL', 'rows_per_partition' : 'NONE' }\n```\n\n以下是一些展示如何配置缓存属性的示例。第一个示例展示了如何为表配置缓存。您为\
    \ `keys` 属性指定了值 `NONE`，因此不缓存任何主键或行。数据库将为每个分区缓存 120 行。\n\n```\nCREATE TABLE test\
    \ (\nuserid text PRIMARY KEY,\nfirst_name text,\nlast_name text,\n)\nWITH caching\
    \ = { 'keys' : 'NONE', 'rows_per_partition' : '120' };\n```\n\n除了 SSTable，您还可以缓存物化视图。以下示例展示了如何在创建物化视图时指定缓存：\n\
    \n```\nCREATE MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age, name, country\n\
    FROM cycling.cyclist_mv\nWHERE age IS NOT NULL AND cid IS NOT NULL\nPRIMARY KEY\
    \ (age, cid)\nWITH caching = { 'keys' : 'ALL', 'rows_per_partition' : '100' }\n\
    ;\n```\n\n以下示例展示了如何运行 `ALTER TABLE` 语句来缓存每个年龄分区中的所有自行车手：\n\n```\nALTER MATERIALIZED\
    \ VIEW cycling.cyclist_by_age\nWITH caching = {\n'keys' : 'ALL',\n'rows_per_partition'\
    \ : 'ALL' } ;\n```\n\n### 全局缓存参数\n\n在上一节中，我解释了如何通过为表设置缓存属性来配置缓存。Cassandra 还提供了几个全局缓存属性，您可以在\
    \ `cassandra.yaml` 文件中进行配置。我将在以下部分解释这些全局缓存参数。\n\n#### 配置行缓存的大小\n\n配置行缓存时，必须设置每个分区的行数。没有固定规则规定\
    \ X% 的行是正确的缓存行数。相反，您应根据数据库中的工作负载模式来调整行缓存的大小。\n\n**注意**\n默认情况下，行缓存被禁用，键缓存被启用。\n\
    \n您可以通过在 `cassandra.yaml` 文件中为 `row_cache_size_in_mb` 属性设置值来在数据库级别配置行缓存的大小。此参数确定\
    \ Cassandra 可以分配用于存储表中最频繁读取的表分区行的最大内存量。默认情况下，数据库不缓存行，因此该参数的默认值为 0。\n\n行缓存可能比键缓存节省更多时间，但它需要更多空间，因为它缓存整行。因此，您必须仅对需求量大的行或不更改的行使用行缓存。`row_cache_size_in_mb`\
    \ 属性的值过低可能导致数据库在启动时无法加载一些热键。\n\n#### 配置键缓存的大小\n\n`key_cache_size_in_mb` 参数允许您设置数据库中所有表的键缓存的最大大小。此参数的值默认未设置，Cassandra\
    \ 将键缓存设置为堆大小的 5% 或 100MB，以较小者为准。您可以通过将 `key_cache_size_in_mb` 参数设置为 0 来禁用键缓存。\n\
    \n#### 配置缓存频率\n\n您可以配置数据库将行缓存和分区键缓存保存到磁盘的频率。\n\n*   `row_cache_save_period` 属性确定数据库在将行保存到由\
    \ `saved_caches_directory` 属性指定的目录之前，将行保留在缓存中的时间（以秒为单位）。默认情况下行缓存被禁用，这意味着 `row_cache_save_period`\
    \ 参数的默认值为 0。\n*   `key_cache_save_period` 参数确定数据库在将键保存到由 `saved_caches_directory`\
    \ 属性指定的目录之前，将键保留在缓存中的时间。默认值为 4 小时（14,400 秒）。\n\n#### 指定要保存的键数\n\n默认情况下，数据库保存行缓存中的所有键。您可以配置\
    \ `row_cache_keys_to_save` 参数来指定要保存的键数。此参数的默认值是禁用的，这意味着保存所有键。\n\n由于默认情况下数据库不启用行缓存，因此\
    \ `row_cache_class_name` 参数的默认值是禁用的。您可以指定以下两个值之一作为要使用的行缓存提供程序的类名：\n\n*   `OHCProvider`：完全堆外\n\
    *   `SerializingCacheProvider`：部分堆外\n\n`OHCProvider` 是较新的，基准测试显示它比旧的部分堆外行缓存提供程序提供大约\
    \ 15% 的更好性能。\n\n### 使用计数器缓存\n\n除了行和键缓存之外，Cassandra 还允许您配置计数器缓存。计数器缓存存储需求量大的计数器，从而减少对计数器单元的争用。当数据库在缓存中找到计数器（缓存命中）时，它需要持有计数器锁的时间更短，从而加快热计数器单元的更新。\n\
    \nCassandra 默认启用计数器缓存。计数器缓存的大小取决于您为 `counter_cache_size_in_mb` 参数配置的值。默认情况下此参数未设置，Cassandra\
    \ 使用两个值中较小的一个：堆的 2.5% 或 50MB。\n\n与行和键缓存一样，Cassandra 将计数器缓存（仅键）保存到由 `saved_caches_directory`\
    \ 参数指定的目录中的磁盘。默认情况下，此参数的值为 2 小时（7,200 秒）。\n\n管理计数器缓存的另一个配置属性是 `counter_cache_keys_to_save`\
    \ 参数。您配置此属性以告诉数据库必须保存计数器缓存中的多少个键。默认情况下此属性是禁用的，这意味着 Cassandra 保存所有键。\n\n如果您执行计数器删除并使用较低的\
    \ `gc_grace_seconds` 设置，则应禁用计数器缓存，您可以通过将 `counter_cache_size_in_mb` 参数的值设置为零来实现。\n\
    \n### 监控缓存\n\n`nodetool info` 命令可帮助您监控缓存性能，从而帮助您根据当前缓存行为调整行缓存和键缓存配置。这是一个例子：\n\n\
    ```\n$ nodetool info\nID                     : 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\n\
    Gossip active          : true\nThrift active          : false\nNative Transport\
    \ active: true\nLoad                   : 12.46 MiB\nGeneration No          : 1503673044\n\
    Uptime (seconds)       : 91\nHeap Memory (MB)       : 117.82 / 1492.00\nOff Heap\
    \ Memory (MB)   : 0.07\nData Center            : datacenter1\nRack           \
    \        : rack1\nExceptions             : 0\nKey Cache              : entries\
    \ 47, size 3.94 KiB, capacity 74 MiB, 69 hits, 120 requests, 0.575 recent hit\
    \ rate, 14400 save period in seconds\nRow Cache              : entries 0, size\
    \ 0 bytes, capacity 0 bytes, 0 hits, 0 requests, NaN recent hit rate, 0 save period\
    \ in seconds\nCounter Cache          : entries 0, size 0 bytes, capacity 37 MiB,\
    \ 0 hits, 0 requests, NaN recent hit rate, 7200 save period in seconds\nChunk\
    \ Cache            : entries 30, size 1.88 MiB, capacity 341 MiB, 44 misses, 182\
    \ requests, 0.758 recent hit rate, 1072.447 microseconds miss latency\nPercent\
    \ Repaired       : 100.0%\nToken                  : (invoke with -T/--tokens to\
    \ see\n$\n```\n\n`nodetool info` 命令显示所有三种 Cassandra 缓存（行、键和计数器）的以下缓存相关信息：\n\n\
    *   缓存中的条目数\n*   缓存的大小（字节）\n*   缓存的容量\n*   对缓存数据的请求数\n*   缓存命中数\n*   缓存命中率（比率）\n\
    *   保存周期（秒）\n\n### 追踪数据库操作以优化缓存\n\n您可以追踪数据库读取，以检查读取操作是从缓存获取数据还是直接从存储在磁盘上的 SSTable\
    \ 获取数据。当您追踪引用缓存表的查询时，最初追踪显示发生了行缓存未命中。当您重新运行查询时，追踪会显示“`row cache hit`”行，如下所示：\n\
    \n```\nrow cache miss [ReadStage:23]\nrow cache hit [ReadStage:35]\n```\n\n行缓存未命中意味着数据库已从磁盘读取数据。另一方面，行缓存命中意味着数据库已在缓存中找到数据，省去了从磁盘读取数据的麻烦。请记住，缓存读取总是比从磁盘读取快很多倍。\n\
    \n您看到“`cache miss`”的原因是数据库缓存数据需要一些时间，尤其是当表很大时。一旦数据库将数据放入缓存，后续查询将使用缓存数据，而不是访问磁盘，这意味着查询将非常快地返回结果。因此，您将在追踪中看到“`cache\
    \ hit`”消息。\n\n一旦数据进入缓存，它就会保留在那里，数据库会将其用于所有引用该数据的查询。但是，如果您更新数据，它会使缓存失效。在以下条件下，Cassandra\
    \ 会忽略缓存数据：\n\n*   如果查询需要来自缓存和磁盘的数据（即，缓存+未缓存的数据）。\n*   当查询请求大量数据时，这会导致超过全局缓存大小限制。\n\
    *   查询请求的数据不在分区的开头。\n\n如果发生这些情况中的任何一种，您将在尝试使用缓存数据的查询的追踪中看到以下行：\n\n```\nIgnoring\
    \ row cache as cached value could not satisfy query [ReadStage:89]\n```\n\n在所有这些情况下，缓存不足以处理查询，迫使\
    \ Cassandra 执行昂贵的（高资源成本）磁盘读取，而不是使用更高效的缓存读取。当您注意到数据库正在忽略行缓存时，根据原因，您可以执行以下操作之一以使数据库使用缓存数据：\n\
    \n*   增加缓存大小。\n*   创建一个新表并将频繁访问的行放在分区的开头。\n*   限制查询的输出大小（使用 `SELECT` 语句中的 `LIMIT\
    \ N` 选项），以防止检索到的行超过配置的缓存大小。\n\n## 使用 `cassandra-stress` 进行压力测试\n\nCassandra 提供\
    \ `cassandra-stress` 实用程序来对集群进行基准测试和负载测试。该工具在测试数据库关键配置方面的更改（例如选择不同的压实策略）时也很有用。您可以测试读取、写入和混合工作负载。\n\
    \n`cassandra-stress` 可用于优化数据模型、测试数据库的扩展能力以及确定生产容量。\n\n### 运行 `cassandra-stress`\n\
    \n您可以在 `$CASSANDRA_HOME/tools/bin` 目录中找到 `cassandra-stress` 工具。\n\n发出命令 `cassandra-stress`\
    \ 以快速了解该工具的功能，如下所示：\n\n```\n$CASSANDRA_HOME/tools/bin$ cassandra-stress\nNo command\
    \ specified\nUsage:      cassandra-stress  [options]\nHelp usage: cassandra-stress\
    \ help <command>\n---Commands---\nread                 : Multiple concurrent reads\
    \ - the cluster must first be populated by a write test\nwrite               \
    \ : Multiple concurrent writes against the cluster\nmixed                : Interleaving\
    \ of any basic commands, with configurable ratio and distribution - the cluster\
    \ must first be populated by a write test\ncounter_write        : Multiple concurrent\
    \ updates of counters.\ncounter_read         : Multiple concurrent reads of counters.\
    \ The cluster must first be populated by a counterwrite test.\nuser          \
    \       : Interleaving of user provided queries, with configurable ratio and distribution\n\
    help                 : Print help for a command or option\nprint             \
    \   : Inspect the output of a distribution definition\nlegacy               :\
    \ Legacy support mode\nversion              : Print the version of cassandra stress\n\
    ---Options---\n-pop                  : Population distribution and intra-partition\
    \ visit order\n-insert              : Insert specific options relating to various\
    \ methods for batching and splitting partition updates\n-col                 \
    \ : Column details such as size and count distribution, data generator, names,\
    \ comparator and if super columns should be used\n-rate                 : Thread\
    \ count, rate limit or automatic mode (default is auto)\n-mode               \
    \  : Thrift or CQL with options\n-errors               : How to handle errors\
    \ when encountered during stress\n-schema               : Replication settings,\
    \ compression, compaction, etc.\n-node                 : Nodes to connect to\n\
    -log                  : Where to log progress to, and the interval at which to\
    \ do it\n-transport            : Custom transport factories\n-port           \
    \      : The port to connect to cassandra nodes on\n-sendto               : Specify\
    \ a stress server to send this command to\n-graph                : Graph recorded\
    \ metrics\n-tokenrange           : Token range settings\n$CASSANDRA_HOME/tools//bin$\n\
    ```\n\n从高层次来看，以下是您必须了解的关键选项：\n\n*   `read`：多次并发读取（您必须首先运行写入测试以用数据填充测试表）\n*   `write`：多次并发写入\n\
    *   `counter_write`：多次并发计数器更新\n*   `counter_read`：多次并发计数器读取（您必须首先使用 `counter_write`\
    \ 测试填充测试表）\n\n### `cassandra-stress` 示例\n\n当您第一次运行 `cassandra-stress` 工具时，它会创建一个名为\
    \ `keyspace1` 的键空间，并在该键空间中创建一个名为 `standard1` 或 `counter1` 的表，具体取决于您运行的测试类型。Cassandra\
    \ 会在所有后续运行中重用它创建的键空间和表。\n\n#### 运行写入测试\n\n以下示例展示了如何运行写入测试（请记住，在运行读取测试之前，必须先运行写入测试）：\n\
    \n```\n$ cassandra-stress write n=100000 cl=one\n******************** Stress Settings\
    \ ********************\nCommand:\nType: write\nCount: 100,000\nConsistency Level:\
    \ ONE\n...\nInsert:\nRevisits: Uniform:  min=1,max=1000000\nVisits: Fixed:  key=1\n\
    Columns:\nMax Columns Per Key: 5\nColumn Names: [C0, C1, C2, C3, C4]\nComparator:\
    \ AsciiType\nTimestamp: null\nVariable Column Count: false\nSlice: false\nSize\
    \ Distribution: Fixed:  key=34\nCount Distribution: Fixed:  key=5\nErrors:\nIgnore:\
    \ false\nTries: 10\n...\nSchema:\nKeyspace: keyspace1\nReplication Strategy: org.apache.cassandra.locator.SimpleStrategy\n\
    Replication Strategy Options: {replication_factor=1}\nTable Compression: null\n\
    Table Compaction Strategy: null\nTable Compaction Strategy Options: {}\n...\n\
    Connected to cluster: Test Cluster, max pending requests per connection 128, max\
    \ connections per host 8\nDatatacenter: datacenter1; Host: localhost/127.0.0.1;\
    \ Rack: rack1\nCreated keyspaces. Sleeping 1s for propagation.\nRunning WRITE\
    \ with 200 threads for 100000 iteration\ntype       total ops,    op/s,    pk/s,\
    \   row/s,    mean,     med,     .95,     .99,    .999,     max,   time,   stderr,\
    \ errors,  gc: #,  max ms,  sum ms,  sdv ms,      mb\n...\nResults:\nOp rate \
    \                  :    3,011 op/s  [WRITE: 3,011 op/s]\nPartition rate      \
    \      :    3,011 pk/s  [WRITE: 3,011 pk/s]\nRow rate                  :    3,011\
    \ row/s [WRITE: 3,011 row/s]\nLatency mean              :   64.9 ms [WRITE: 64.9\
    \ ms]\nLatency median            :   39.1 ms [WRITE: 39.1 ms]\nLatency 95th percentile\
    \   :  190.2 ms [WRITE: 190.2 ms]\nLatency 99th percentile   :  537.4 ms [WRITE:\
    \ 537.4 ms]\nLatency 99.9th percentile : 1155.5 ms [WRITE: 1,155.5 ms]\nLatency\
    \ max               : 1632.6 ms [WRITE: 1,632.6 ms]\nTotal partitions        \
    \  :    100,000 [WRITE: 100,000]\nTotal errors              :          0 [WRITE:\
    \ 0]\n...\nTotal operation time      : 00:00:33\nEND\n$\n```\n\n在此命令中，您指定 `write`\
    \ 选项表示您希望将行插入 `cassandra-stress` 为压力测试创建的表中。`cassandra-stress` 插入一百万行 (`n=10000000`)。选项\
    \ `cl` 将一致性级别设置为 `ONE`。默认一致性级别是 `LOCAL_ONE`，您可以设置任何其他标准 Cassandra 一致性级别。\n\n前面的示例未使用身份验证。要在运行\
    \ `cassandra-stress` 工具时使用身份验证，请指定 `-mode` 命令（使用 `native` 选项）以指定用户名和密码，如本例所示：\n\
    \n```\n$ cassandra-stress -mode native cql3 -user cassandra -password cassandra\
    \ cl=QUORUM\n```\n\n您使用 `cassandra-stress` 工具的 `write` 选项插入的数据默认永远不会被截断。您可以通过运行带有\
    \ `-truncate` 选项的 `cassandra-stress` 命令来截断 `cassandra-stress` 工具创建的表：\n\n```\n\
    $ cassandra-stress write n=100000000 cl=QUORUM -truncate always -schema keyspace=keyspace1\
    \ -rate threads=200 -log file=write_$NOW.log\n```\n\n如果您指定了 `mode` 命令，请确保在 `mode`\
    \ 选项之前指定 `truncate` 选项，否则 `cassandra-stress` 工具将忽略 `truncate` 选项。\n\n#### 运行读取测试\n\
    \n一旦您填充了 `cassandra-stress` 工具创建的数据库表（如写入测试示例所示），您就拥有了该工具可以读取的数据。现在您可以运行读取测试，如下所示：\n\
    \n```\n$ cassandra-stress read n=10000000 -rate threads=50 duration=5\n```\n\n\
    在此示例中，选项代表以下含义：\n\n*   `read`：对您之前填充的数据执行多次并发读取。子选项 `n=10000000` 指定要读取的行数。\n*\
    \   `rate`：帮助您指定线程数、速率限制或自动模式（默认）。在本例中，您通过指定 `threads=50` 为压力测试指定子选项线程数。\n*  \
    \ `duration`：指定测试必须读取行的特定分钟数（本例中为 5）。\n\n#### 运行混合工作负载\n\n`cassandra-stress` 命令选项\
    \ `mixed` 可帮助您运行具有配置比率和分布的命令。在运行此命令之前，您必须使用写入测试填充集群。\n\n以下示例展示了如何运行混合工作负载：\n\n\
    ```\n$ cassandra-stress mixed ratio\\(write=1,read=3\\) n=100000 cl=ONE -pop dist=UNIFORM\\\
    (1..1000000\\) -schema keyspace=\"keyspace1\" -mode native cql3 -rate threads\\\
    >=16 threads\\<=256 -log file=~/mixed_autorate_50r50w_1M.log\n```\n\n注意以下几点：\n\
    \n*   `ratio` 选项设置写入与读取的比率。\n*   `-pop` 命令选项设置种群分布和分区内访问顺序。在本例中，您指定 `pop dist=UNIFORM\\\
    (1..1000000\\)`，这意味着在 100,000 次操作 (`n=100000`) 中，测试必须在 1 到 1,000,000 之间均匀选择键。当您指定的每个节点的数据量超过该节点\
    \ RAM 可容纳的量时，请指定 `-pop` 选项。\n\n### 设置复制、压实和压缩选项\n\n运行 `-schema` 命令选项以查看您可以为复制、压实和压缩设置的选项。它还允许您指定用于压力测试的键空间。\n\
    \n```\n$ cassandra-stress help -schema\nUsage: -schema [replication(?)] [keyspace=?]\
    \ [compaction(?)] [compression=?]\nreplication([strategy=?][factor=?][=?]): Define\
    \ the replication strategy and any parameters\nstrategy=? (default=org.apache.cassandra.locator.SimpleStrategy)\
    \ The replication strategy to use\nfactor=? (default=1)                 The number\
    \ of replicas\nkeyspace=? (default=keyspace1)           The keyspace name to use\n\
    compaction([strategy=?][=?]): Define the compaction strategy and any parameters\n\
    strategy=?                            The compaction strategy to use\ncompression=?\
    \                            Specify the compression to use for sstable, default:no\
    \ compression\n$\n```\n\n以下示例展示了如何为名为 `cass1` 的节点将复制策略更改为 `NetworkTopologyStrategy`：\n\
    \n```\n$ cassandra-stress write n=500000 no-warmup -node cass1 -schema \"replication(strategy=NetworkTopologyStrategy,\
    \ cass1=2)\"\n```\n\n### 在多个节点上运行压力测试\n\n所有前面的示例都在单个节点上运行。有时单个节点无法处理压力测试的工作负载。您可以使用\
    \ `-node` 命令选项指定 `NODES` 变量。您使用逗号分隔的 IP 地址列表指定节点。\n\n以下示例展示了如何在两个名为 `cass1` 和\
    \ `cass2` 的节点上运行压力测试：\n\n```\n$ cassandra-stress write n=1000000 cl=one -mode\
    \ native cql3 -schema keyspace=\"keyspace1\" -pop seq=1..1000000 -log file=~/node1_load.log\
    \ -node $NODES\n```\n\n### 使用基于 YAML 的配置文件运行 `cassandra-stress`\n\n您可以在运行 `cassandra-stress`\
    \ 工具时使用基于 YAML 的配置文件。该配置文件帮助您定义数据库将在压力测试期间使用的各种压实策略和缓存设置。您可以在以下位置找到 Cassandra\
    \ 提供的示例 YAML 文件：\n\n*   `/usr/share/docs/cassandra/examples`（包安装）\n*   `$CASSANDRA_HOME/tools/`（压缩包安装）\n\
    \nCassandra 提供的 YAML 文件（例如 `cqlstress-example.yaml` 文件）包含在单独部分下进行的各种压力测试配置。这些配置属性包括键空间和表定义，以及查询定义。您可以在\
    \ `extra-definitions` 部分下添加二级索引和物化视图。您可以修改示例配置文件或创建自己的配置文件。\n\n您可以在运行 `cassandra-stress`\
    \ 命令时将 YAML 文件指定为 `profile` 选项的值。`profile` 选项指向您使用的 YAML 文件的位置。\n\n以下示例展示了如何借助\
    \ `cqlstress-example.yaml` 文件运行压力测试：\n\n```\n$ cassandra-stress user profile=$CASSANDRA_HOME/tools/cqlstress-example.yaml\
    \ n=1000000 ops\\(insert=3,read1=1\\) no-warmup cl=QUORUM\n```\n\n您可以指定 `-graph`\
    \ 选项为运行的压力测试创建图表。测试完成后，您可以通过 Web 浏览器查看图表。这是一个例子：\n\n```\n$ cassandra-stress user\
    \ profile=tools/cqlstress-example.yaml ops\\(insert=1\\) -graph file=test.html\
    \ title=test revision=test1\n```\n\n您可以通过在 Web 浏览器中查看文件 `test1.html` 来查看压力测试的图表。您必须为捕获压力测试输出的\
    \ HTML 文件提供名称，以便通过浏览器查看。`title` 和 `revision` 选项不是必需的，但如果您使用相同数据运行多个压力测试，则必须使用\
    \ `revision` 参数。\n\n图 11-2 显示了使用前面的 `cassandra-stress` 命令进行压力测试的图表。\n\n![压力测试图表](A436674_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-2\n\n使用 `-graph` 选项生成的 `cassandra-stress` 工具压力测试图表\n\n## 配置压实策略\n\n压实数据有助于合并\
    \ SSTable、合并键、组合列和清除墓碑。\n\n正如您在第 6 章中学到的，Cassandra 的 SSTable 是不可变的，这意味着数据库永远不会覆盖数据。相反，它将插入或更新的新数据版本写入新的\
    \ SSTable 中。从来没有数据的原地修订（这需要随机 I/O）。相反，数据库只是将数据的最新版本（更新或插入）写入新的 SSTable。这是 Cassandra\
    \ 高性能的一个关键因素。\n\n**注意**\n数据库将对数据的所有更新转换为顺序写入磁盘的新 SSTable。\n\n随着数据库随时间更新数据，它最终可能会有同一行的多个版本，每个版本位于不同的\
    \ SSTable 中。唯一的时间戳区分这些版本。\n\n随着时间的推移，Cassandra 需要访问众多 SSTable 才能检索完整的行，因为没有单个\
    \ SSTable 可能存储该行中所有列的最最新版本。为了提高性能，Cassandra 通过合并表并清除旧的、过时的数据版本来对 SSTable 执行定期压实。压实可以防止读取速度随着用户随时间更新数据而下降。\n\
    \n在压实过程中，Cassandra 执行以下操作：\n\n*   合并 SSTable\n*   清除所有墓碑\n*   合并键\n*   组合列\n*\
    \   在新 SSTable 中创建新索引（不是二级索引）\n\n压实过程创建一个包含该行所有列最新版本的完整行。数据库将每行的最新版本写入新的 SSTable，并在满足所有待处理请求后从旧的\
    \ SSTable 中删除旧版本。以下是压实过程的实际后果：\n\n*   由于新压实的 SSTable，读取性能得到改善\n*   由于数据库需要暂时维护新旧\
    \ SSTable，磁盘 I/O 和空间使用暂时上升\n\n您可以使用 `nodetool compact` 命令手动压实表。更好的做法是通过 `CREATE\
    \ TABLE` 或 `ALTER TABLE` 命令为表设置压实策略。\n\n### 压实策略\n\n压实策略决定了 Cassandra 如何选择 SSTable\
    \ 进行压实，以及它如何在压实期间创建的用于保存最新数据的新 SSTable 中存储压实的行。您可以从以下三种压实策略中选择：\n\n*   `SizeTieredCompactionStrategy`\
    \ (STCS)\n*   `LeveledCompactionStrategy` (LCS)\n*   `TimeWindowCompactionStrategy`\
    \ (TWCS)\n\n**注意**\n还有一种 `DataTieredCompactionStrategy` (DTCS)，它是时间序列数据的替代策略，但在\
    \ Cassandra 3.0 及更高版本中已弃用。\n\nTWCS 是压实时间序列数据的最佳策略。对于非时间序列数据，您需要选择 STCS 或 LCS。以下各节解释了您可以选择的三种压实策略。\n\
    \n#### SizeTieredCompactionStrategy\n\n在 STCS 下，SSTable 的大小是表压实的触发因素。SSTable 的大小充当表压实的触发因素。STCS\
    \ 将 SSTable 分组到唯一的桶中。当存在预定数量的相同大小的表时，数据库会压实 SSTable。Cassandra 将每个 SSTable 的大小与节点上\
    \ SSTable 大小的平均值进行比较。\n\n默认情况下，STCS 的压实配置属性 `enabled` 为 `true`，这意味着数据库执行后台压实。SSTable\
    \ 配置属性 `min_threshold` 设置将触发压实的 SSTable 的最小数量。一旦表达到 `min_threshold` 值，它就有资格进行压实。默认情况下，当存在四个相似大小的表时（默认为\
    \ 160MB），数据库执行压实操作。Cassandra 将相同大小的表合并为一个更大的 SSTable。随着数据库获得几个更大的 SSTable，它会将一组\
    \ SSTable 合并为更大的 SSTable。\n\n**注意**\nSTCS 是默认的压实策略。\n\n以下是一个示例，展示了如何将表的压实属性更改为\
    \ `SizeTieredCompactionStrategy`：\n\n```\ncqlsh> ALTER TABLE users\nWITH compaction\
    \ = { 'class' : 'SizeTieredCompactionStrategy', 'min_threshold' : 6 }\n```\n\n\
    `min_threshold` 表属性使您能够设置数据库执行次要压实之前所需的 SSTable 最小数量。在此示例中，`min_threshold` 属性指定数据库在触发压实之前应查找至少六个相同大小的\
    \ SSTable。\n\n**注意**\n次要压实涉及键空间中的特定表。\n\n##### 配置 STCS\n\n除了 `enabled` 和 `min_threshold`\
    \ 属性外，您还可以为 STCS 配置以下属性：\n\n*   `bucket_high` 和 `bucket_low`：这对属性提供了尺寸公式，帮助数据库确定要考虑压实的表的大小。数据库合并大小落在以下范围内的\
    \ SSTable：\n    ```\n    [average table size X bucket_low] and [average table\
    \ size X bucket_high]\n    ```\n    `bucket_high` 属性的默认值为 1.5，`bucket_low` 属性的默认值为\
    \ 0.5。\n*   `log_all`：使您能够为集群设置高级日志记录，其默认值为 `false`。\n*   `min_threshold` 和 `max_threshold`：这组属性确定次要压实中\
    \ SSTable 的最小（默认值为 4）和最大（默认值为 32）数量。\n*   `min_sstable_size`：默认情况下，数据库通过将大小相差不到\
    \ 50% 的 SSTable 分组到每个桶中。在 SSTable 较小的情况下，您可以设置 `min_sstable_size` 属性以定义分配给桶的 SSTable\
    \ 的大小阈值（以字节为单位）。此参数的默认值为 50MB。\n*   与墓碑相关的压实属性：有几个与墓碑相关的压实属性。\n    *   `only_purge_repaired_tombstones`：此参数的默认值为\
    \ `false`，这意味着数据库将允许从所有 SSTable（已修复和未修复）清除墓碑。通过将此属性设置为值 `true`，您要求数据库仅从已修复的 SSTable\
    \ 清除墓碑。\n    *   `tombstone_threshold`：设置数据库可以垃圾回收的墓碑与所有包含列相比的比率。此参数的默认值为 0.2。一旦\
    \ SSTable 超过此比率（20%），它就有资格进行墓碑压实。一旦数据库可以垃圾回收的墓碑数量超过 20%，Cassandra 将仅压实该表以清除墓碑。\n\
    \    *   `tombstone_compaction_interval`：在创建 SSTable 之后，数据库认为该表有资格进行墓碑压实的时间长度。默认值为\
    \ 86,400 秒（1 天）。\n    *   `unchecked_tombstone_compaction`：默认情况下，此属性设置为 `false`，这意味着\
    \ Cassandra 在运行压实操作之前会检查表是否有资格进行墓碑压实。通过将属性设置为 `true`，您允许 Cassandra 在不进行预先检查的情况下压实墓碑。\n\
    \n##### 何时使用（或不使用）STCS\n\nSTCS 是写入密集型工作负载的理想选择。由于合并过程不按行分组数据，因此行的版本可能分布在多个表中，这会减慢读取速度。\n\
    \n但是，STCS 不能快速清除过时和删除的数据，因为压实触发器是 SSTable 的大小，其增长可能太慢，从而将旧数据保留在原地。随着时间的推移，随着 SSTable\
    \ 变大，由于数据库在压实期间需要存储新旧 SSTable，因此数据库将需要更多存储空间。\n\n尽管 LCS 将相关数据保留在少量表中，如果您的数据没有太多修改或插入，STCS\
    \ 也可以为您提供相同类型的数据集，而不会产生使用 LCS 时产生的写入开销。\n\nSTCS 在处理批处理读写操作时比 LCS 更高效。然而，在负面方面，它比\
    \ LCS 需要更多的磁盘空间。\n\n#### LeveledCompactionStrategy\n\nLCS 将 SSTable 分组到各个级别，其中每个级别（L1、L2、L3…）比前一个级别大\
    \ 10 倍。数据库将每个级别的 SSTable 压实到更大的级别中。首先，数据库将 memtable 中的数据刷新到最低级别 (L0) 的 SSTable\
    \ 中。数据库不会压实 L0 级别的表；它将这些最小尺寸的 SSTable 与下一级别 (L1) 的更大 SSTable 合并。\n\n数据库将 L2、L3\
    \ 等级别的 SSTable 压实到至少与您为 LCS 属性 `sstable_size_in_mb` 设置的值（默认为 160MB）一样大的 SSTable。\n\
    \nLCS 提高了读取性能，因为 Cassandra 可以确定它应该检查每个级别的哪些 SSTable 以查找行键数据。\n\n##### 配置 LCS\n\
    \n您可以为 LCS 设置以下所有属性，所有这些属性的含义与我在上一节中为 STCS 描述的相同。\n\n*   `enabled`\n*   `log_all`\n\
    *   `tombstone_compaction_interval`\n*   `tombstone_threshold`\n*   `unchecked_tombstone_compaction`\n\
    \n除了这些属性之外，您还可以配置 `sstable_size_in_mb` 属性，该属性是 LCS 独有的。`sstable_size_in_mb` 属性指定使用\
    \ LCS 压实时表的目标大小。数据库将尝试使 SSTable 大小（压实后）与您为 `sstable_size_in_mb` 参数指定的值相同或更小。但是，如果分区非常大，压实将导致\
    \ SSTable 大于您使用 `sstable_size_in_mb` 参数指定的值。如前所述，`sstable_size_in_mb` 属性的默认值为\
    \ 160MB。\n\n以下是一个示例，展示了如何更新表以将数据库压实策略设置为 `LeveledCompactionStrategy`：\n\n```\n\
    cqlsh> ALTER TABLE users WITH compaction = { 'class' : 'LeveledCompactionStrategy'\
    \ };\n```\n\n##### 何时使用（或不使用）LCS\n\nLCS 涉及在读取和写入性能之间进行权衡。LCS 适用于读取密集型工作负载（尤其是涉及随机读取的工作负载），因为它使数据库能够在\
    \ 90% 的情况下仅从一个 SSTable 检索查询所需的数据。其他情况下，它只需要读取两个 SSTable。\n\nLCS 在数据碎片化严重时是理想的选择。LCS\
    \ 比 STCS 更频繁地清除过时数据，这意味着删除的数据占用 SSTable 的部分更小。然而，更频繁的压实操作意味着有更多的 I/O 压力。因此，由于较高\
    \ I/O 操作量导致的性能下降，LCS 通常不是写入密集型工作负载的有前途的想法。LCS 的写入惩罚意味着大量的写入可能会压倒压实操作。\n\nLCS 比\
    \ STCS 需要更少的空间。\n\n如果对您来说保持高读取率至关重要，您可以使用 LCS。为了克服由此产生的写入端性能下降，您可以向集群中添加更多节点。\n\
    \n#### TimeWindowCompactionStrategy\n\nTWCS 是时间序列数据和过期 TTL 工作负载的推荐压实策略。TWCS 根据一系列时间窗口压实\
    \ SSTable。数据库创建连续的时间窗口，并在每个活动（最新）时间窗口期间，使用 STCS 压实将所有未压实的 SSTable 压实为更大的 SSTable。\n\
    \n在时间窗口结束时，数据库将落在该时间窗口中的所有 SSTable 压实（主要压实，因为涉及多个键空间的 SSTable）为单个 SSTable，使用 SSTable\
    \ 最大时间戳作为标准。数据库对在后续时间窗口期间写入的所有 SSTable 重复相同的压实过程。\n\n##### 配置 TWCS\n\n您可以设置以下压实属性来配置\
    \ TWCS：\n\n*   `compaction_window_unit`：此属性使您能够定义用于定义桶大小的时间单位。默认时间单位是毫秒，如果您愿意，可以设置值为秒或小时。这是一个例子：\n\
    \    ```\n    compaction_window_unit = 'minutes', compaction_window_size = 120\n\
    \    ```\n*   `compaction_window_size`：每个时间窗口的单元数（1、2、3…）。\n*   `log_all`：通过设置值\
    \ `true`，使您能够为整个集群激活高级日志记录。默认值为 `false`。\n\n##### 何时使用 TWCS\n\nTWCS 是存储在具有默认 TTL（生存时间）的表中的时间序列数据的理想选择。如果您需要以非顺序方式查询时间序列数据，则此压实策略不合适。\n\
    \n### 启用和禁用压实\n\n默认情况下，Cassandra 启用后台压实。您可以通过 `ALTER TABLE` 语句将 `enabled` 属性设置为\
    \ `false` 来禁用后台压实，如下所示：\n\n```\ncqlsh> ALTER TABLE mytable WITH COMPACTION = {\
    \ 'class': 'SizeTieredCompactionStrategy', 'enabled': 'false' }\n```\n\n关于压实的最佳实践是使用默认设置\
    \ `enabled`（`true`）并让数据库压实数据。\n\n### 配置全局压实属性\n\n您可以配置以下三个全局压实参数：\n\n*   `snapshot_before_compaction`\n\
    *   `concurrent_compactors`\n*   `compaction_throughput_mb_per_sec`\n\n我将在以下部分解释这些属性。\n\
    \n#### `snapshot_before_compaction` 属性\n\n`snapshot_before_compaction` 属性决定数据库在执行压实操作之前是否对数据进行快照。与所有\
    \ Cassandra 快照一样，您负责删除较旧的快照，这样它们就不会占用太多空间。\n\n默认情况下，`snapshot_before_compaction`\
    \ 属性设置为 `false`。\n\n#### `concurrent_compactors` 属性\n\n在长时间运行的压实期间，可能会积累大量小 SSTable，这将不利地影响读取性能。为避免读取性能下降，您可以配置\
    \ `concurrent_compactors` 参数以设置任何时候可以运行的并发压实进程数。此数字不包括用于反熵修复的任何验证压实。\n\n默认情况下，`concurrent_compactors`\
    \ 属性设置为磁盘数或核心数中较小的一个，最小为 2，每个 CPU 核心最大为 8。\n\n由于同时执行压实会增加磁盘空间的使用，请确保在提高 `concurrent_compactors`\
    \ 参数值之前有足够的可用磁盘空间。\n\n**注意**\n在调整 `concurrent_compactors` 属性之前，请通过配置 `compaction_throughput_mb_per_sec`\
    \ 属性来限制压实速度。\n\n#### `sstable_preemptive_open_interval_in_mb` 属性\n\n数据库可以在完成对\
    \ SSTable 的写入之前抢先打开正在压实的 SSTable。目标是通过最小化数据进出缓存的移动，并将热行保留在原地，从而在压实前后的 SSTable\
    \ 版本之间平稳传输读取。默认值为 50MB。\n\n### 限制压实速度\n\n有时您可能意识到压实运行得太快（或太慢）。您可以配置 `compaction_throughput_mb_per_sec`\
    \ 属性以将压实限制为特定速率（以 MB 为单位）每秒。此压实属性控制数据库插入数据的速度。数据插入速率越快，数据库必须执行压实以保持 SSTable 计数较低的速度就越快。\n\
    \n`compaction_throughput_mb_per_sec` 参数的默认值为 16，意味着压实速率是写入吞吐量的 16 倍，以 MB/秒为单位。\n\
    \n您可以通过将 `compaction_throughput_mb_per_sec` 属性设置为 0 来禁用压实限制。推荐值为 16-32。压实速度在所有压实器之间分配。如果您有八个并发压实器，压实吞吐量为\
    \ 16，则每个压实器只能获得 2MB/s。在旋转磁盘上，建议将并发压实器数量设置得非常低（例如 2）；在 SSD 上，您可以将压实器数量提高到磁盘可以跟上的水平。\n\
    \n**注意**\n您可以通过配置 `compaction_large_partition_warning_threshold_mb` 属性，让数据库在压实大于您设置的值的分区时发出警告。此参数的默认值为\
    \ 100。\n\n### 设置压实策略\n\n您在表级别设置压实策略。您可以在创建表时或通过更改表来设置压实属性。您在 `CREATE TABLE` 或\
    \ `ALTER TABLE` 语句中使用 `compaction` 选项指定压实 `class`，如下所示：\n\n```\ncompaction = {\n\
    'class' : 'compaction_strategy_name'\n[, 'subproperty_name' : 'value',...]\n}\n\
    ```\n\n尽管您可以禁用压实，但这从来不是一个好主意，因为它可能导致僵尸的传播。僵尸，如果您从第 5 章回忆起，是已删除但仍然存在的记录。有时，墓碑记录可能已从集群的其他节点中删除，但一个无响应的节点除外，该节点由于宕机而不会立即接收墓碑。如果数据库在无响应节点恢复之前从集群的其余部分删除了墓碑记录，Cassandra\
    \ 会将该节点上的（本应被删除的）记录视为新数据并将其发送到其他节点。\n\n如前所述，为无响应节点提供恢复的宽限期有助于防止僵尸记录重新出现。表属性 `gc_grace_seconds`\
    \ 设置墓碑的宽限期，其默认值为十天（864,000 秒）。一旦墓碑的宽限期结束，数据库会在压实过程中删除墓碑。\n\n### 获取和设置压实阈值\n\n\
    运行 `nodetool getcompactionthreshold` 命令以查找表的最小和最大压实阈值。运行此命令时必须指定键空间和表名。\n\n```\n\
    $ sudo nodetool getcompactionthreshold cycling cyclist_name\nCurrent compaction\
    \ thresholds for cycling/cyclist_name:\nmin = 4,  max = 32\n$\n```\n\n**注意**\n\
    主要压实涉及键空间中的所有表。次要压实仅涉及键空间中的部分表。\n\n您可以使用 nodetool 的 `setcompactionthreshold` 命令设置压实阈值，该命令使您能够为表设置最小/最大压实阈值。术语“阈值”指的是数据库在调度次要压实之前应存在的相似大小的\
    \ SSTable 的数量。\n\n`setcompactionthreshold` 命令具有以下选项：\n\n*   `keyspace`：键空间名称\n\
    *   `table`：表名称\n*   `minthreshold`：触发次要压实的 SSTable 最小数量（使用 STCS 或 DTCS 时）\n*\
    \   `maxthreshold`：次要压实中的 SSTable 最大数量（使用 STCS 或 DTCS 时）\n\n以下示例展示了如何设置表的压实阈值：\n\
    \n```\n$ nodetool setcompactionthreshold cycling cyclists 4 16\n```\n\n在此示例中，`cycling`\
    \ 指的是键空间，`cyclists` 是表。\n\n如前所述，STCS 和 DTCS 都允许您配置次要压实期间应压实的 SSTable 的最小和最大数量，通过配置\
    \ `min_threshold` 和 `max_threshold` 属性。\n\n### 记录压实活动\n\n您可以通过在创建或更改表时将 `log_all`\
    \ 子属性设置为 `true` 来设置数据库的扩展压实活动日志记录。`log_all` 子属性位于 `compaction` 属性下。表的 `log_all`\
    \ 属性为整个集群激活高级日志记录。虽然您在表级别执行此操作，但一旦为单个表配置了扩展日志记录，数据库会自动收集有关集群中所有节点上所有表压实的详细信息。\n\
    \n设置扩展压实活动日志记录后，数据库会创建一个名为 `compaction-%d` 的额外压实相关文件，位于 `$CASSANDRA_HOME/logs`\
    \ 目录下，其中 `%d` 充当序列号。\n\n设置扩展压实日志记录后，数据库会收集有关以下压实事件的信息：\n\n*   `enable`：列出数据库已刷新的所有\
    \ SSTable。\n    ```\n    {\"type\":\"enable\",\"keyspace\":\"es\": ... }\n   \
    \ ```\n*   `flush`：记录从 memtable 到 SSTable 的刷新事件。\n    ```\n    {\"type\":\"flush\"\
    ,\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083335639,\"tables\": ...\
    \ }\n    ```\n*   `compaction`：记录压实事件。\n    ```\n    {\"type\":\"compaction\"\
    ,\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083660267,\"start\":\"1 ...\
    \ }\n    ```\n*   `pending`：列出待处理的压实任务数。\n    ```\n    {\"type\":\"pending\",\"\
    keyspace\":\"test\",\"table\":\"t\",\"time\":1470083447967,\"strategyId\":\"1\"\
    ,\"pending\":100}\n    ```\n\n### 测试压实策略的有效性\n\n当您计划更改压实策略时，可以首先在不正式属于集群的节点上测试新策略的影响。您以写入调查模式启动一个新节点，该模式将节点添加到集群但不正式使其成为环的一部分。\n\
    \n如果您愿意，可以从集群中取出一个节点，并以写入调查模式将其重新启动，以测试更改对读取性能的影响。一旦以写入调查模式启动节点，您就可以在该节点上对读取操作进行基准测试。\n\
    \n要以写入调查模式启动节点，请使用以下两种方法之一将 `write_survey` 选项设置为 `true`：\n\n```\nJVM_OPTS=\"$JVM_OPTS\
    \ -Dcassandra.write_survey=true\"       /* 用于包安装，将此行添加到 cassandra-env.sh 文件。\n\
    $ cassandra -Dcassandra.write_survey=true               /* 用于压缩包安装，以此模式启动新节点。\n\
    ```\n\n您还可以通过在 `$CASSANDRA_HOME/conf/jvm.options` 文件中设置属性来以写入调查模式启动节点，如下所示（默认情况下，`-Dcassandra.write_survey`\
    \ 属性被注释掉。您需要取消注释）。以下是 `jvm.options` 文件的相关部分：\n\n```\n-Dcassandra.write_survey=true\n\
    ```"
  raw: "#### The logback.xml File\n\nThe following is a sample `logback.xml` file\
    \ showing various types of appenders:\n\n```\n\nINFO\n\n${cassandra.logdir}/system.log\n\
    \n${cassandra.logdir}/system.log.%i.zip\n\n20MB\n\n%-5level [%thread] %date{ISO8601}\
    \ %F:%L - %msg%n\n\n${cassandra.logdir}/debug.log\n\n${cassandra.logdir}/debug.log.%i.zip\n\
    \n20MB\n\n%-5level [%thread] %date{ISO8601} %F:%L - %msg%n\n\ntrue\n\nINFO\n\n\
    %-5level [%thread] %date{ISO8601} %F:%L - %msg%n\n\n-->\n\n-->\n\n```\n\nNote\n\
    \nYou can use either .`xml` or `.groovy` as the file extension for the Logback\
    \ configuration file. In our case, I use `.xml`.\n\nWhen you need to dig deep\
    \ into the internals of Cassandra, one of the best things to do is to modify the\
    \ logging level to a more “liberal” level, meaning one that shows more details\
    \ about the operations Cassandra is performing (or failing to perform!).\n\nThe\
    \ default logging level of INFO doesn’t generate many details about operations,\
    \ simply providing the status of operations, as shown here:\n\n```\nWARN  [main]\
    \ 2017-04-03 13:06:55,973 DatabaseDescriptor.java:493 - Small cdc volume detected\
    \ at ./../data/cdc_raw; setting cdc_total_space_in_mb to 2377\\.  You can override\
    \ this in cassandra.yaml\nINFO  [main] 2017-04-03 13:06:56,882 CassandraDaemon.java:472\
    \ - Hostname: ubuntu\nINFO  [main] 2017-04-03 13:06:56,887 CassandraDaemon.java:479\
    \ - JVM vendor/version: Java HotSpot(TM) 64-Bit Server VM/1.8.0_121\nINFO  [main]\
    \ 2017-04-03 13:06:56,897 CassandraDaemon.java:480 - Heap size: 476.000MiB/476.000MiB\n\
    INFO  [main] 2017-04-03 13:06:56,911 CassandraDaemon.java:485 - Par Eden Space\
    \ Heap memory: init = 83886080(81920K) used = 77260784(75449K) committed = 83886080(81920K)\
    \ max = 83886080(81920K)\n```\n\nYou can change the default logging level to DEBUG\
    \ by modifying the `logback.xml` file as follows:\n\nYou don’t have to restart\
    \ Cassandra after modifying the `logback.xml` file because the database scans\
    \ the `logback.xml` file every minute looking for changes, provided you’ve added\
    \ the following line to the file:\n\n```\n\nTip\n\nIn production environments,\
    \ make sure you set the logging level to a\nsparser level such as WARN or ERROR\
    \ because voluminous logging output\nwill hurt performance.\n\nConfiguring Automatic\
    \ Loading of Configuration\nFiles\n\nYou configure Logback to scan for changes\
    \ in the configuration file and\nautomatically reconfigure itself when you make\
    \ any logging-related\nconfiguration changes. You do this by setting the `scan`\
    \ attribute of the\n`<configuration>`\nelement to `true`:\n\n```\n...\n\n```\n\
    \nConfiguring Appenders \n\nYou configure appenders with the `<appender>`\nelement.\
    \ This element takes two mandatory attributes: `name` and `class`. The `name`\
    \ attribute names\nthe appender, and the `class` attribute\npoints to the name\
    \ of the appender class.\n\nThe `<appender>`\nelement may additionally contain\
    \ `<layout>, <encoder>,` and `<filter>`\nelements.\n\nSetting Up Log Rotation\n\
    \nBy default, Cassandra rolls the `system.log` file once\nit reaches 20MB in size.\
    \ It also compresses the older archived log files\nin zip format and names them\
    \ as system.log.1.zip, system.log.2.zip, and\nso on.\n\nYou can configure the\
    \ following rolling policies in Logback:\n\n*   Location and name of the log file\n\
    \n*   Location and name of the archive file\n\n*   Maximum log file size to trigger\
    \ rolling to a new log file\n\n*   The log levels\n\nThe default logging level\
    \ is INFO. You can set ALL, TRACE, DEBUG, WARN,\nand ERROR as the logging level.\
    \ You can turn off all logging by setting\nthe OFF logging level.\n\nUsing Nodetool\
    \ to Set the Logging Level for\na Service\n\nInstead of editing the `logback.xml`\
    \ file, you\ncan run the  `nodetool setlogginglevel` command  to set the logging\
    \ level from the\ncommand line.\n\nSetting the Log Level\n\nThe following is the\
    \ syntax for setting the log level of a service from\nthe command line with the\
    \ `nodetool setlogginglevel` command:\n\n```\n$ nodetool  setlogginglevel -- \
    \ \n```\n\nIn this command,\n\n*   `class_qualifier`\n    is the logger class\
    \ qualifier, for example`, org.apache.cassandra.service.StorageProxy.`\n\n*  \
    \ `level` is the\n    logging level.\n\nYou can set the following values for the\
    \ `class_qualifier`\noption:\n\n*   `org.apache.cassandra`\n\n*   `org.apache.cassandra.db`\n\
    \n*   `org.apache.cassandra.service.StorageProxy`\n\nYou can choose the log level\
    \ from among ALL, TRACE, DEBUG, INFO, WARN,\nand ERROR. You can set the level\
    \ attribute to OFF to turn off all\nlogging.\n\nYou can see more details about\
    \ the operations the database is performing\nby setting the logging level to DEBUG.\
    \ The following example shows how\nto set the StorageProxy service to the DEBUG\
    \ level:\n\n```\n$ nodetool setlogginglevel org.apache.cassandra.service.StorageProxy\
    \ DEBUG\n```\n\nChecking the Current Log Level \n\nYou can check the current log\
    \ level with the `nodetool getlogginglevels` command, as shown here:\n\n```\n\
    $ nodetool getlogginglevels\nLogger Name                                     \
    \   Log Level\nROOT                                                   INFO\ncom.thinkaurelius.thrift\
    \                               ERROR\norg.apache.cassandra                  \
    \                 DEBUG\norg.apache.cassandra.service.StorageProxy           \
    \   INFO\n$\n```\n\nMonitoring Cassandra with Nagios\n\nIn a production environment,\
    \ it’s good to use a powerful enterprise-wide\nmonitoring tool to check on your\
    \ Casandra cluster. Nagios is a popular\nopen source monitoring system, and it\
    \ offers numerous capabilities to\nmonitor Cassandra clusters.\n\nNagios uses\
    \ the Nagios Remote Plugin Executor (NRPE )  to monitor remote\nhosts on which\
    \ Cassandra instances are running.\n\nYou need to install and configure the NRPE\
    \ agents on the remote hosts.\nNRPE requires Nagios plugins , so you need\nto\
    \ install the plugins as agents to monitor the local resources on the\nremote\
    \ hosts.\n\nIn the following sections, I show how to install Nagios 4 on an Ubuntu\n\
    server. I then show how to install NRPE and configure it. I start with\nthe prerequisites\
    \ you need to work with Nagios.\n\nInstalling the LAMP Stack and Addressing Other\n\
    Prerequisites\n\nA LAMP stack  is\na set of open source software that enables\
    \ servers to host dynamic\nwebsites and web applications. The LAMP acronym stands\
    \ for the following\nfour components:\n\n*   The Linux operating system\n\n* \
    \  The Apache web server\n\n*   The MySQL database\n\n*   PHP\n\nIn the following\
    \ sections I explain how to install LAMP. You likely\nalready have the Linux OS,\
    \ so you need to install the Apache web server,\nthe MySQL database, and PHP.\n\
    \n1.  Install and start the Apache web server.\n\n    ```\n    $ sudo apt-get\
    \ install apache2\n    $ sudo systemctl restart apache2\n    ```\n\n2.  Install\
    \ the MySQL database.\n\n    ```\n    $ sudo apt-get install mysql-server\n  \
    \  ```\n\n    You can run the MySQL security script at this point to remove insecure\n\
    \    default configurations and lock down database access.\n\n    ```\n    $ mysql-secure_installation\n\
    \    ```\n\n3.  Install PHP. The following command will install PHP 5:\n\n   \
    \ ```\n    $ sudo apt-get install php libapache2-mod-php php-mcrypt php-mysql\n\
    \    ```\n\n4.  By default, when a server requests a directory, Apache will first\
    \ look\n    for a file named `index.html`. You want\n    to make Apache look first\
    \ for an `index.php` file\n    instead. To do this, edit the `/etc/apache2/mode-enabled/dir.conf`\n\
    \    file, which looks as follows:\n\n    ```\n    DirectoryIndex index.html index.cgi\
    \ index.pl index.php index.xhtml index.htm\n\n    ```\n\n    Just move the `index.php`\
    \ file to the\n    head of the line, right before the `DirectoryIndex`\n    file.\
    \ Close and save the file.\n\n5.  Restart the Apache server so the changes you\
    \ made in Step 4 go into\n    effect.\n\n    ```\n    $ sudo systemctl restart\
    \ apache2\n    ```\n\n6.  Check that the MySQL\n     and PHP are running O.K.\
    \ You can confirm the status of the\n    Apache server by running the following\
    \ command:\n\n    ```\n    $ sudo systemctl status apache2\n    ```\n\n7.  And\
    \ you can confirm that you’ve properly configured PHP by running a\n    basic\
    \ PHP script named `info.php` ( `/var/www/html/info.php`).\n\nOnce you do this,\
    \ visit the following address in a browser:\n\n```\nhttp:///info.php\n```\n\n\
    You should see a nice web page showing details about the PHP\ninstallation. You’re\
    \ good to go as far as the LAMP stack is concerned.\nBefore you can install Nagios,\
    \ however, you must complete several\nprerequisites, which I explain next.\n\n\
    Creating the Nagios User and Group \n\nYou need a user to run the Nagios server.\
    \ Create a user named nagios that belongs to a group named\nnagcmd.\n\n```\n$\
    \ sudo useradd nagios\n$ sudo groupadd nagcmd\n$ sudo usermod -a -G nagcmd nagios\n\
    ```\n\nInstalling the Build Dependencies\n\nYou’re installing Nagios Core (the\
    \ free version) from source, so you’ll\nneed to install additional binaries to\
    \ complete the build. You’ll also\nneed `apache2-utils` to set\nup your Nagios\
    \ web interface. You can install all the requisite packages\nthus:\n\n```\n$ sudo\
    \ apt-get install build-essential libgd2-xpm-dev openssl libssl-dev xinetd apache2-utils\n\
    ```\n\nFinally, with all the prerequisites completed, you’re ready to install\n\
    Nagios itself.\n\nInstalling  Nagios\n\nTo install Nagios\n, you must download\
    \ the source, configure it, and compile (build)\nit.\n\nDownloading Nagios\n\n\
    Download the source for the latest stable Nagios version and extract the\narchive,\
    \ as shown here:\n\n```\n$ cd ~\n$ curl -L -O https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.1.1.tar.gz\n\
    $ tar xvzf nagios-*.tar.gz\n$ cd nagios-*\n```\n\nConfiguring Nagios\n\nBefore\
    \ you can build Nagios Core, you must install the packages.\n\n```\n$ ./configure\
    \ --with-nagios-group=nagios --with-command-group=nagcmd\n```\n\nCompiling and\
    \ Installing Nagios\n\nCompile Nagios and run additional commands to install Nagios.\n\
    \n```\n$ sudo make\n$ sudo make install\n$ sudo make install-commandmode\n$ sudo\
    \ make install-init\n$ sudo make install-config\n$ sudo /usr/bin/install -c -m\
    \ 644 sample-config/httpd.conf /etc/apache2/sites-available/nagios.conf\n```\n\
    \nFinally, add the web server user www-data to the nagcmd group, so you can issue\n\
    external commands to Nagios via the web interface .\n\n```\n$ sudo usermod -G\
    \ nagcmd www-data\n```\n\nInstalling the Nagios Plugins     \n\nThe next big step\
    \ is to install the Nagios plugins. You follow similar\nsteps as you did with\
    \ the Nagios server installation in the previous\nsection. I summarize the steps\
    \ here.\n\n```\n$ cd ~\n$ curl -L -O http://nagios-plugins.org/download/nagios-plugins-2.1.1.tar.gz\n\
    $ tar xvf nagios-plugins-*.tar.gz\n$ cd nagios-plugins-*\n$ ./configure --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-openssl\n$ make\n$ sudo make install\n```\n\
    \nYou can verify the configuration thus:\n\n```\n$ sudo /usr/local/nagios/bin/nagios\
    \ -v /usr/local/nagios/etc/nagios.cfg\n...\nRunning pre-flight check on configuration\
    \ data...\n...\n$\n```\n\nNote\n\nYou can easily create custom plugins for Nagios.\
    \ The only requirements\nare that the plugin be executable through the command\
    \ prompt, and that\nit return one of these exit values: O.K., Warning, Critical,\
    \ or Unknown\nstate.\n\nInstalling NRPE \n\nThe downloading, configuring, and\
    \ building of NRPE follows the same\nsteps as that of Nagios and the Nagios plugins.\
    \ The following are the\nsteps:\n\n```\n$ cd ~\n$ curl -L -O http://downloads.sourceforge.net/project/nagios/nrpe-2.x/nrpe-2.15/nrpe-2.15.tar.gz\n\
    $ tar xvf nrpe-*.tar.gz\n$ cd nrpe-*\n$ ./configure --enable-command-args --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-ssl=/usr/bin/openssl --with-ssl-lib=/usr/lib/x86_64-linux-gnu\n\
    $ make all\n$ sudo make install\n$ sudo make install-xinetd\n$ sudo make install-daemon-config\n\
    ```\n\nAdd the private IP address of the Nagios server at the end of the `only_from`\
    \ line in the\nxinetd startup script, `/etc/xinetd.d/nrpe`.\n\n```\nonly_from\
    \ = 127.0.0.1 192.168.159.129\n```\n\nRestart the `xinetd` service to\nstart NRPE.\n\
    \n```\n$ sudo service xinetd restart\n```\n\nConfiguring Nagios and Apache\n\n\
    Although you installed and built Nagios earlier, you still have some\nmore configuring\
    \ left to do for both the Nagios server and the Apache\nweb server.\n\nConfiguring\
    \  Nagios \n\nEdit the main Nagios configuration file \n( `/usr/local/Nagios/etc/nagios/cfg`)\n\
    as follows:\n\n```\ncfg_dir=/usr/local/nagios/etc/servers\n```\n\nEach of the\
    \ hosts in your Cassandra cluster will have a configuration\nfile that’s stored\
    \ in this directory. You must create the directory.\n\n```\n$ sudo mkdir /usr/local/nagios/etc/servers\n\
    ```\n\nIt’s also a good idea to edit the contacts configuration file ( `/usr/local/nagios/etc/objects/contacts.cfg`),\n\
    and replace the value for email\nwith your own email address.\n\nYou also need\
    \ a new command at the end of the Nagios configuration  file,\n`/usr/local/nagios/etc/objects/commands.cfg`\n\
    .\n\n```\ndefine command{\ncommand_name check_nrpe\ncommand_line $USER1$/check_nrpe\
    \ -H $HOSTADDRESS$ -c $ARG1$\n}\n```\n\nConfiguring Apache\n\nYou must next configure\
    \ the Apache web server, as explained in the\nfollowing steps.\n\n1.  Enable the\
    \ Apache `rewrite` and `cgi` modules, as shown\n    here:\n\n    ```\n    $ sudo\
    \ a2enmod rewrite\n    $ sudo a2enmod cgi\n    ```\n\n2.  Create an admin user\
    \ named nagiosadmin using the htpasswd utility, which will help you\n    access\
    \ the Nagios web interface.\n\n    ```\n    $ sudo htpasswd -c /usr/local/nagios/etc/htpasswd.users\
    \ nagiosadmin\n    New password:\n    Re-type new password:\n    Adding password\
    \ for user nagiosadmin\n    ```\n\n3.  Start the Nagios and Apache servers.\n\n\
    \    ```\n    $ sudo service nagios start\n    $ sudo service apache2 restart\n\
    \    ```\n\nAdding the Cassandra Cluster Hosts for Monitoring \n\nThere are three\
    \ things you need to do to enable the monitoring of your\nCassandra hosts via\
    \ Nagios:\n\n*   Install and configure NRPE on the cluster’s hosts (nodes).\n\n\
    *   Add the hosts to the Nagios server configuration.\n\n*   Add the services\
    \ you want to monitor on the hosts.\n\nInstalling and Configuring\nNRPE  on the Hosts\n\
    \nOn each of the hosts that you’d like to monitor, do the following.\n\n1.  Update\
    \ `apt-get.`\n\n    ```\n    $ sudo apt-get update\n    ```\n\n2.  Install the\
    \ Nagios plugins and the Nagios remote plugin executor (NRPE).\n\n    ```\n  \
    \  $ sudo apt-get install nagios-plugins nagios-nrpe-server\n    ```\n\n3.  Update\
    \ the NRPE configuration file (`/etc/nagios/nrpe.cf`)\n    and add the IP address\
    \ of the Nagios server as a value for the `allowed_hosts`\n    property.\n\n \
    \   ```\n    allowed_hosts=127.0.0.1,172.31.22.133\n    ```\n\n4.  Restart NRPE.\n\
    \n    ```\n    $ sudo service nagios-nrpe-server restart\n    ```\n\nAdding Hosts\
    \ to the Nagios Server Configuration\n\nCreate a separate configuration file on\
    \ the Nagios server for each of\nthe Cassandra hosts you want to monitor. For\
    \ example, for a server named\nhost1, you must create the file\n`host1.cfg`\n\
    (/`usr/local/nagios/etc/servers/host1.cfg`).\n\nIn the `host1.cfg` file, add\n\
    the host definition, as shown here:\n\n```\ndefine host {\nuse               \
    \              linux-server\nhost_name                       host1\nalias    \
    \                       Nagios Agent 1\naddress                         192.168.159.130\n\
    max_check_attempts              5\ncheck_period                    24x7\nnotification_interval\
    \           30\nnotification_period             24x7\n}\n$ sudo service nagios\
    \ start\n```\n\nAt this time ,\nNagios can monitor just two basic things: it can\
    \ tell you if the host is\nup or down. You need to configure the services you\
    \ want Nagios to\nmonitor by adding the services, as shown in the next section.\n\
    \nAdding Cassandra-Specific Plugins\n\nThe next step is to show you how to download\
    \ and test a\nCassandra-specific plugin. This plugin is named Check Cassandra\
    \ Status and Heap Memory\nand it can report on a node’s status (UP/DOWN) as well\
    \ as memory heap\nutilization WARNING/CRITICAL notifications.\n\nFollow these\
    \ steps to work with the plugin.\n\n1.  Change the working directory to the `/user/local/nagios/libexec`\n\
    \    directory.\n\n    ```\n    $ cd /usr/local/nagios/libexec\n    ```\n\n2.\
    \  Download the plugin (`cassandra.pl`) and\n    change permissions to it.\n\n\
    \    ```\n    $ wget \"https://exchange.nagios.org/components/com_mtree/attachment.php?link_id=3819&cf_id=24\"\
    \n    -O cassandra.pl\n    $ chmod +x cassandra.pl\n    $ chown nagios:nagios\
    \ cassandra.pl\n    ```\n\n3.  Test to make sure the plugin works.\n\n    ```\n\
    \    $./cassandra.pl\n    CASSANDRA OK -  | heap_mem=5.59\n    $\n    ```\n\n\
    \    The output of the test shows that the plugin works fine. If you see an\n\
    \    error message instead, edit the `cassandra.pl` file and\n    make sure that\
    \ the `$nodetool_path`\n    variable points to the correct location for the `nodetool`\
    \ binary.\n\n4.  Configure NREP so Nagios can execute the plugin. Edit the `/usr/local/nagios/etc/nrpe.cfg`\n\
    \    file in the Cassandra server and add the following line at the end of\n \
    \   the file:\n\n    ```\n    . command[cassandra]=/usr/local/nagios/libexec/cassandra.pl\
    \ $ARG1$\n    ```\n\n5.  Restart the `xinetd` service on the\n    Cassandra server.\n\
    \n    ```\n    $ sudo service xinetd restart\n    ```\n\n6.  Open a session with\
    \ the server  on which Nagios\n    is running, and execute the following command:\n\
    \n    ```\n    $ sudo /usr/local/nagios/libexec/check_nrpe -H 192.168.159.130\
    \ -c cassandra\n    CASSANDRA OK -  | heap_mem=10.32\n    $\n    ```\n\nThe output\
    \ shows you’ve correctly configured NRPE on the Cassandra\nserver. You can then\
    \ add this configuration to the Nagios server.\n\nSummary\n\nNodetool commands\
    \ such as `nodetool tablestats`\nand `nodetool tablehistograms` help you learn\
    \ key facts about the SSTables.\nOther nodetool commands such as `nodetool status`\
    \ and\n`nodetool info`\nhelp monitor the cluster status.\n\nI discussed logging\
    \ at some length. Logging isn’t a mere incidental\nbyproduct of activity in a\
    \ database. Logging is a valuable source of\ninformation for both what went right\
    \ and what went wrong in a cluster.\nCassandra allows you to configure logging\
    \ in multiple ways, and\ncustomizing logging to suit your needs is a good strategy\
    \ that helps you\nto effectively troubleshoot and monitor your databases.\n\n\
    JConsole is simple to set up and is helpful in tuning the performance of\na database.\
    \ I discussed Nagios at length, but there’s a lot more to it,\nso I barely scratched\
    \ the surface here. I used the free version of\nNagios in my examples; the paid\
    \ version offers more capabilities plus\nsupport! Whether it be Nagios or some\
    \ other tool, a powerful graphical\ntool is essential to cluster management.\n\
    \n11. Tuning Cassandra Performance\n\nCassandra has numerous configuration knobs,\
    \ and nowhere is this truer\nthan in the area of performance tuning, where the\
    \ database administrator\ncan control several aspects of performance. Out of the\
    \ box, Cassandra\nruns with default settings for many performance-related configuration\n\
    properties. As an administrator, you should know these defaults and\nmodify them\
    \ to suit your environment.\n\nThis chapter focuses on the following areas of\
    \ Cassandra performance:\n\n*   Tracing queries to analyze database performance\n\
    \n*   Caching data\n\n*   Compaction strategies\n\n*   Compression\n\n*   Tuning\
    \ Bloom filters\n\n*   Tuning the JVM and garbage collection strategies\n\n* \
    \  Stress testing with the `cassandra-stress` tool\n\nUsing Tracing to Analyze\
    \ Performance\n\nWhen you’re tuning database performance, you can turn on tracing\
    \ in a\ndatabase to get detailed transaction information about the internal\n\
    operations Cassandra performs. Tracing is valuable in tracking the time\nCassandra\
    \ spends during various stages of query processing, such as the\nparsing and executing\
    \ of a query. Tracing provides detailed timing\ninformation pertaining to actions\
    \ such as the following:\n\n*   Preparing a SQL statement\n\n*   Read repair related\
    \ activity\n\n*   Memtable and SSTable data lookups\n\n*   Key cache searches\n\
    \n*   Interactions among a cluster’s nodes\n\nTracing data  is\nhighly useful\
    \ in evaluating query efficacy. For example, inappropriate\nor superfluous secondary\
    \ indexes show up in a high inter-node activity\namong the nodes when you trace\
    \ a query that involves those indexes.\n\nNote\n\nTurning tracing on will help\
    \ trace two broad types of activity in a\ncluster: queries and repair operations.\n\
    \nBy default, Cassandra disables tracing. Once you enable tracing,\nCassandra\
    \ captures the transaction details in the `system_traces`\nkeyspace. Two tables\
    \ in this keyspace hold the trace data:\n\n*   `system_traces.session`:\n    Stores\
    \ high-level details of transactions, such the length of the\n    transaction\
    \ and the session ID.\n\n*   `system_traces.events`:\n    Stores detailed information\
    \ about all operations the database performs.\n\nNote\n\nCassandra can only store\
    \ the tracing data for a limited period. So, if\nyou wish to hold on to tracing\
    \ data for a longer period, you must\nconfigure the following properties:\n\n\
    `tracetype_query_ttl`:\nSets the TTL for different trace types used during logging\
    \ of the query\nprocess. Default value is 86,400 seconds (1 day).\n\n`tracetype_repair_ttl`:\n\
    Sets the TTL for different trace types used during logging of the repair\nprocess.\
    \ Default value is 604,800 seconds (about a week).\n\nThe types of database activity\
    \ that the `system_traces.events`\ntable captures reveal the operations that Cassandra\
    \ performs when you\nissue a query.\n\n```\ncqlsh> select  activity from system_traces.events;\n\
    activity\n-----------                    Parsing select id from cycling.cyclist_name;\n\
    Preparing statement\nComputing ranges to query\nSubmitting range requests on 513\
    \ ranges with a concurrency of 112 (0.9 rows per range expected)\nExecuting seq\
    \ scan across 0 sstables for (min(-9223372036854775808), max(-9196210656004250337)]\n\
    Read 0 live and 0 tombstone cells\nEnqueuing request to /192.168.159.129\nSending\
    \ RANGE_SLICE message to /192.168.159.129\nRANGE_SLICE message received from /192.168.159.130\n\
    Enueuing request to /192.168.159.129\nEnqueuing response to /192.168.159.130\n\
    Sending RANGE_SLICE message to /192.168.159.129\nProcessing response from /192.168.159.129\n\
    RANGE_SLICE message received from /192.168.159.130\nExecuting seq scan across\
    \ 0 sstables for (max(-8175039996930460291), max(-8066091505323311933)]\nRead\
    \ 0 live and 0 tombstone cells\n...\ncqlsh>\n```\n\nManaging Tracing \n\nYou can\
    \ check the status of tracing thus:\n\n```\ncqlsh> tracing\nTracing is currently\
    \ disabled. Use TRACING ON to enable.\ncqlsh>\n```\n\nIt’s simple to turn on tracing\
    \ in the database; just run the `tracing on` command.\n\n```\ncqlsh> tracing on;\n\
    Now Tracing is enabled\ncqlsh> tracing;\nTracing is currently enabled. Use TRACING\
    \ OFF to disable\ncqlsh>\n```\n\nTo turn off all tracing, run the `tracing off`\
    \ command.\n\n```\ncqlsh> tracing off;\nDisabled Tracing.\ncqlsh>\n```\n\nManaging\
    \ Probabilistic Tracing\n\nCassandra uses a probabilistic tracing strategy\n wherein\
    \ you can configure the probability of the percentage of\nstatements that the\
    \ database will trace. The probability is on a\nper-node basis. A probability\
    \ of 1.0 means that the database will trace\nall SQL statements, and a setting\
    \ of 0.5 means it’s likely to trace\nabout 50 percent of all requests.\n\nThe\
    \ default probability is 0.0, which means tracing is disabled. Higher\nprobability\
    \ settings involve a higher number of writes, and sometimes\nthis can adversely\
    \ affect cluster performance, so you must exercise\ncaution when setting the tracing\
    \ probability.\n\nCassandra recommends that you start with a small probability\
    \ setting\nsuch as 0.001 and raise it gradually based on what’s happening in the\n\
    database. Even a low setting such as this can have a significant impact\non database\
    \ performance, so be sure to look out for a performance hit.\n\nThe `nodetool\
    \ gettraceprobability` command shows the current trace probability.\n\n```\n$\
    \ nodetool gettraceprobability\nCurrent trace probability: 0.0\n$\n```\n\nYou\
    \ can set the trace probability by running the `nodetool settraceprobability`\
    \ command for tracing a read or write request,\nas shown here:\n\n```\n$ nodetool\
    \ settraceprobability 0.1\n$ nodetool gettraceprobability\nCurrent trace probability:\
    \ 0.1\n$\n```\n\nThe `system_traces.sessions`\ntable shows valuable information\
    \ about the traces.\n\n```\ncqlsh> select * from system_traces.sessions;\nsession_id\
    \      | client   | command | coordinator   | duration | parameters      | request\
    \       | started_at\n----------------+ ---------+---------+--------------+-----------+\
    \ ----------------d7103660-81e4-11e7-a4ad-89801d899afb | 127.0.0.1 |   QUERY |\
    \ 192.168.159.130 |   506051 |                                               \
    \              {'consistency_level': 'ONE', 'page_size': '100', 'query': 'select\
    \ * from cycling.cyclist_name;', 'serial_consistency_level': 'SERIAL'} | Execute\
    \ CQL3 query | 2017-08-15 18:09:11.878000+0000\n189ff700-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |     6848 | {'consistency_level': 'ONE',\
    \ 'page_size': '5000', 'query': 'SELECT * FROM system_traces.sessions WHERE session_id\
    \ = 185a6280-81e5-11e7-a4ad-89801d899afb', 'serial_consistency_level': 'SERIAL'}\
    \ | Execute CQL3 query | 2017-08-15 18:11:01.872000+0000\n185a6280-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |   177343 |              {'consistency_level':\
    \ 'ONE', 'page_size': '100', 'query': 'select * from cycling.cycle;', 'serial_consistency_level':\
    \ 'SERIAL'} | Execute CQL3 query | 2017-08-15 18:11:01.416000+0000\n...\n(11 rows)\n\
    cqlsh>\n```\n\nHow to Trace Write and Read Requests\n\nTracing is resource intensive\
    \ and it can consume vast amounts of\nstorage. Tracing selectively is the right\
    \ strategy, instead of enabling\ntracing for the entire database. In this section,\
    \ I show how to trace\nspecific read and write requests.\n\nTracing a Write Request\
    \ \n\nHere’s a simple example that shows how to get trace information for a\n\
    write request (insert statement). You first turn on tracing and then\ninsert a\
    \ row in the `cyclist_name` table\n(output shows partial data).\n\n```\ncqlsh>\
    \ tracing on;\nNow Tracing is enabled\ncqlsh> insert into cycling.cyclist_name\
    \ ( id, lastname, firstname ) values (uuid(), 'FRAME', 'Nina' );\nTracing session:\
    \ bdfdf410-8116-11e7-81bd-63c57c069fd1\nactivity                             \
    \                               | timestamp                  | source        \
    \  | source_elapsed | client        Execute CQL3 query | 2017-08-14 10:33:53.489000\
    \ | 192.168.159.130 |              0 | 127.0.0.1\nDetermining replicas for mutation\
    \ [Native-Transport-Requests-1] | 2017-08-14 10:33:53.522000 | 192.168.159.130\
    \ |          32844 | 127.0.0.1\nMUTATION message received from /192.168.159.130\
    \ [MessagingService-Incoming-/192.168.159.130] | 2017-08-14 10:33:53.530000 |\
    \ 192.168.159.129 |            843 | 127.0.0.1\nSending MUTATION message to /192.168.159.129\
    \ [MessagingService-Outgoing-/192.168.159.129-Small] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.130 |          42754 | 127.0.0.1\nAppending to commitlog [MutationStage-1]\
    \ | 2017-08-14 10:33:53.532000 | 192.168.159.129 |           2668 | 127.0.0.1\n\
    Adding to cyclist_name memtable [MutationStage-1] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.129 |           3181 | 127.0.0.1\nProcessing response from /192.168.159.129\
    \ [RequestResponseStage-3] | 2017-08-14 10:33:53.545000 | 192.168.159.130 |  \
    \        56321 | 127.0.0.1\nRequest complete | 2017-08-14 10:33:53.546583 | 192.168.159.130\
    \ |          57583 | 127.0.0.1\n```\n\nThe trace data shows the following bits\
    \ of information :\n\n*   The target nodes where Cassandra replicates the row\
    \ you’ve inserted\n\n*   How Cassandra appends the new data to the commitlog\n\
    \n*   How the database adds the new data to the memtable\n\n*   How the database\
    \ confirms (“Request complete”) that the request to\n    insert the data was successfully\
    \ completed\n\nTracing a Read Request \n\nTracing a read request produces a lot\
    \ more data than tracing a write\nrequest, so be careful when you trace these\
    \ requests. Part of the reason\nfor the dense trace data is because Cassandra\
    \ spreads rows across\nmultiple SSTables, and so it must read multiple SSTables\
    \ to retrieve\ndata. The trace shows all requests that the database makes to fulfill\n\
    the read request.\n\nHere’s a partial output for a simple `select` statement :\n\
    \n```\ncqlsh> select * from cycling.cyclist_name;\nid                        \
    \           | firstname | lastname\n--------------------------------------+-----------+-----------------\n\
    69f1cb04-687d-4be7-a91f-72ef037c5514 |     Sammy |           FRAME\ne7ae5cf3-d358-4d99-b900-85902fda9bb0\
    \ |      Alex |           FRAME\nd378af39-1a28-474c-836b-aa960fed6f2b |      Nina\
    \ |           FRAME\nfb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |      \
    \  MATTHEWS\n5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS\n\
    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |       TIRALONGO\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47\
    \ |    Steven |      KRUIKSWIJK\ne7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna\
    \ | VAN DER BREGGEN\n(8 rows)\nTracing session: b2b0eda0-8117-11e7-81bd-63c57c069fd1\n\
    activity                                             | timestamp             \
    \     | source          | source_elapsed | client\nExecute CQL3 query | 2017-08-14\
    \ 10:40:44.026000 | 192.168.159.130 |              0 | 127.0.0.1\nParsing select\
    \ * from cycling.cyclist_name; [Native-Transport-Requests-1] | 2017-08-14 10:40:44.027000\
    \ | 192.168.159.130 |            364 | 127.0.0.1\nPreparing statement [Native-Transport-Requests-1]\
    \ | 2017-08-14 10:40:44.027000 | 192.168.159.130 |            503 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.073000 | 192.168.159.129 |             22 | 127.0.0.1\n\
    Sending REQUEST_RESPONSE message to /192.168.159.130 [MessagingService-Outgoing-/192.168.159.130-Small]\
    \ | 2017-08-14 10:40:44.086000 | 192.168.159.129 |          13202 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.095000 | 192.168.159.129 |             18 | 127.0.0.1\n\
    REQUEST_RESPONSE message received from /192.168.159.129 [MessagingService-Incoming\n\
    ...                               Processing response from /192.168.159.129 [RequestResponseStage-5]\
    \ | 2017-08-14 10:40:44.557001 | 192.168.159.130 |         531160 | 127.0.0.1\n\
    Request complete | 2017-08-14 10:40:44.562582 | 192.168.159.130 |         536582\
    \ | 127.0.0.1\ncqlsh>\n```\n\nThe output shows how Cassandra parses  the CQL\n\
    statement and prepares it before sending a request message, to which the\nreceiving\
    \ node responds with a response message. Finally, the Request\nComplete comment\
    \ shows that the request was successfully processed by\nthe node(s).\n\nTuning\
    \ Bloom Filters \n\nAs I explained in Chapter [5](#A436674_1_En_5_Chapter.html),\
    \ Bloom filters are a performance\naid for Cassandra. They help the database during\
    \ an index scan by\nletting it know if an SSTable has data for a specific partition.\
    \ When\nclients request data, the Bloom filter checks if the row exists before\n\
    the database performs disk I/O.\n\nConfiguring Bloom filters involves a tradeoff\
    \ between memory usage and\nthe probability of finding the data quickly, using\
    \ less I/O than\notherwise.\n\nConfiguring Bloom Filters\n\nYou can set the `bloom_filter_fp_chance`\n\
    attribute for a table to a value between 0 and 1\\. As you go from 0 to 1,\nyou\
    \ use less memory. A value of 0 means you set the largest value for\nthe Bloom\
    \ filter and use the highest amount of memory. Setting it to 1\nmeans that you’ve\
    \ disabled Bloom filters.\n\nThe default value for the `bloom_filter_fp_chance`\n\
    attribute depends on the compaction strategy in place. The following are\nthe\
    \ values for this attribute under Cassandra’s three main compaction\nstrategies:\n\
    \n*   For the LeveledCompactionStrategy: 0.1\n\n*   For the SizeTieredCompactionStrategy,\
    \ DataTieredCompactionStrategy, and\n    TimeWindowCompactionStrategy: 0.01.\n\
    \nThe recommended value for the `bloom_filter_fp_chance`\nattribute is 0.1\\.\
    \ Higher values aren’t necessarily helpful since raising\nthe value produces diminishing\
    \ returns. This is because higher values\nconsume more memory but yield a disproportionately\
    \ smaller performance\nbenefit. You can set the property at the time you create\
    \ a table, or\nlater.\n\nRegenerating Bloom Filters   \n\nWhenever you change\
    \ the value of the `bloom_filter_fp_chance`\nattribute for a table, you must regenerate\
    \ the Bloom filters. You can\nregenerate the Bloom filters in two ways: you can\
    \ run a manual\ncompaction of the table or upgrade the SSTables.\n\nTo manually\
    \ compact a table, run the `nodetool compact`\ncommand. The `nodetool compact`\
    \ command has the following syntax:\n\n```\nnodetool [options] compact [(-et \
    \ | --end-token )]\n[(-s | --split-output)] [(-st  | --start-token )] [--] [ [...]]\n\
    [--user-defined] ...\n```\n\nYou must specify the compaction strategy by selecting\
    \ from the STCS,\nTWCS, and the LCS compaction strategies. By default, the command\
    \ runs\nmajor compaction on all keyspaces and tables in the database, but you\n\
    can limit the compaction to one or more tables.\n\nManually compacting SSTables\
    \ to regenerate Bloom filters is almost never\na good strategy. You can instead\
    \ upgrade an SSTable when you change the\nvalue of the `bloom_filter_fp_chance`\n\
    property for that table. You do this by running the `nodetool upgradetsstables`\
    \ command. The command has the following syntax:\n\n```\n$ nodetool  upgradesstables\n\
    ( -a | --include-all-sstables )\n--    ...\n```\n\nCaching Data\n\nTo optimize\
    \ Cassandra’s use of cache memory, you can configure the\ncaching property for\
    \ a table. Caching helps Cassandra perform a warm\nrestart of a node, wherein\
    \ the database periodically stores the cache to\ndisk and reads it back into cache\
    \ when you restart the node. Not having\nthe cache means the node will take longer\
    \ to restart.\n\nCaching is useful for very busy clusters. Caching data is not\
    \ advisable\nfor data that’s not in high demand. Therefore, it’s a good idea to\n\
    separate heavily read data into separate tables so you can cache the\ndata in\
    \ those tables. It also isn’t a good idea to cache data when\ndealing with tables\
    \ that contain extremely long partitions.\n\nTypes of Data Caches\n\nThere are\
    \ two main types\n of data caches: the key cache and the row cache. (In addition,\n\
    you can also require Cassandra to cache counters, as I explain later.)\n\n*  \
    \ Key cache : The key cache, also\n    called the partition key cache, caches\
    \ the partition index for an\n    SSTable. The database requires less disk reads\
    \ to fetch data from the\n    key cache instead of getting the data either from\
    \ disk or from the OS\n    page cache. Since the key cache offers more bang for\
    \ the buck in the\n    sense that it increases the possibility of cache reads\
    \ without requiring\n    too much memory, Cassandra enables it by default.\n\n\
    *   Row cache : You can ask\n    Cassandra to cache a specific number of rows\
    \ in a partition. You set the\n    number of rows to cache with the `rows_per_partition`\n\
    \    table option. Since a row cache stores entire rows instead of just the\n\
    \    keys, it could lead to performance deterioration when dealing with large\n\
    \    data sets, which the database may have to read from disk since memory\n \
    \   may not be sufficient to store all the data. Configure the row cache\n   \
    \ carefully since it may sometimes hurt performance rather than help it.\n\nHere\
    \ are the key principles you ought to remember regarding the use of\ncaching in\
    \ a Cassandra database:\n\n*   You don’t want to set both types of caching for\
    \ a table. Pick either\n    partition key caching or row caching for a table.\n\
    \n*   Row caching is more space intensive than key caching since it stores\n \
    \   entire rows. Therefore, it’s a good idea to use row caching selectively,\n\
    \    using it to cache only those rows that are frequently accessed by users\n\
    \    and clients.\n\n*   As to which tables you must cache, read-heavy tables\
    \ are a good target\n    for caching. When the reads overwhelmingly outweigh writes\
    \ for a table,\n    caching is something you want to consider.\n\nNote\n\nYour\
    \ users won’t be reading archived tables often so you can disable\ncaching for\
    \ those tables.\n\nWhere Cassandra Stores the Cached Data\n\nCassandra stores\
    \ \nthe row and key caches in a directory you can specify with the\nconfiguration\
    \ property `saved_caches_directory`.\nThe default location of the `saved_caches_directory`\n\
    property is determined as follows:\n\n*   `/var/lib/cassandra/saved_caches           /*\
    \ for package installations`\n\n*   `install_location/data/saved_caches      /*\
    \ for tarball installations`\n\nConfiguring \nCaching\n\nYou can set two attributes\
    \ that determine caching behavior:\n\n*   `keys`: This\n    property can take\
    \ the values `ALL` or `NONE`. The value `ALL` means all primary\n    keys or rows.\
    \ The value `NONE` means no primary\n    keys or rows. The default value is `ALL`.\n\
    \n*   `rows_per_partition`:\n    This property helps you set the number of rows\
    \ the database must cache\n    in a partition. This attribute has three values:\
    \ `ALL, NONE,` and `N`. The values `ALL` and `NONE` have the same\n    meaning\
    \ as for the `keys` attribute. The\n    value `N`\n    specifies the number of\
    \ rows per partition. The default value is `NONE`.\n\nYou set the table caching\
    \ property to configure the partition key cache\nand the row cache, either when\
    \ creating a table or later. The following\nis the syntax for the `caching` table\n\
    property:\n\n```\ncaching = {\n'keys' = 'ALL | NONE',\n'rows_per_partition' =\
    \ 'ALL' | 'NONE' |N}\n```\n\nBy default, this is what Cassandra uses for caching\
    \ data:\n\n```\n{ 'keys' : 'ALL', 'rows_per_partition' : 'NONE' }\n```\n\nThe\
    \ following are a few examples that show how to configure caching\nproperties\
    \ . The\nfirst example shows how to configure caching for a table. You specified\n\
    `NONE` as the\nvalue for the keys attribute so no primary keys or rows are cached.\
    \ The\ndatabase will cache 120 rows per partition.\n\n```\nCREATE TABLE test (\n\
    userid text PRIMARY KEY,\nfirst_name text,\nlast_name text,\n)\nWITH caching =\
    \ { 'keys' : 'NONE', 'rows_per_partition' : '120' };\n```\n\nYou can cache materialized\
    \ views in addition to SSTables. The following\nexample shows how to specify caching\
    \ when creating a materialized view:\n\n```\nCREATE MATERIALIZED VIEW cycling.cyclist_by_age\n\
    AS SELECT age, name, country\nFROM cycling.cyclist_mv\nWHERE age IS NOT NULL AND\
    \ cid IS NOT NULL\nPRIMARY KEY (age, cid)\nWITH caching = { 'keys' : 'ALL', 'rows_per_partition'\
    \ : '100' }\n;\n```\n\nThe following example shows how to run the `ALTER TABLE`\
    \ statement\nto cache all cyclists in every age partition:\n\n```\nALTER MATERIALIZED\
    \ VIEW cycling.cyclist_by_age\nWITH caching = {\n'keys' : 'ALL',\n'rows_per_partition'\
    \ : 'ALL' } ;\n```\n\nGlobal Caching Parameters\n\nIn the previous section, I\
    \ explained how you can configure caching by\nsetting caching properties for a\
    \ table. Cassandra also offers several\nglobal caching properties, which\nyou\
    \ can configure in the `cassandra.yaml` file.\nI explain the global caching parameters\
    \ in the following sections.\n\nConfiguring the Size of the Row Cache\n\nWhen\
    \ you configure row caching, you must set the number of rows per\npartition. There’s\
    \ no fixed rule stating that X percentage of rows is\nthe right amount of rows\
    \ to cache. Instead, you size the row cache based\non the workload patterns in\
    \ your database.\n\nNote\n\nBy default, row caching is disabled and key caching\
    \ is enabled.\n\nYou configure the size of the row cache at the database level\
    \ by setting\na value for the `row_cache_size_in_mb`\nproperty in the `cassandra.yaml`\
    \ file.\nThis parameter determines the maximum amount of memory Cassandra can\n\
    allocate to store rows from the most frequently read table partitions of\na table.\
    \ By default, the database doesn’t cache rows so the parameter’s\ndefault value\
    \ is 0.\n\nA row cache potentially saves more time than the key cache, but it\n\
    requires more space since it caches the entire row. Therefore, you must\nuse the\
    \ row cache just for rows in heavy demand or for rows that don’t\nchange. Too\
    \ low a value for the `row_cache_size_in_mb`\nproperty may result in Cassandra\
    \ not loading some of the hot keys when\nthe database starts up.\n\nConfiguring\
    \ the Size of the Key Cache \n\nThe `key_cache_size_in_mb`\nparameter allows you\
    \ to set the maximum size of the key cache for all\ntables in a database. The\
    \ value of this parameter isn’t set by default,\nand Cassandra sets the key cache\
    \ to 5% of the heap size or 100MB,\nwhichever is smaller. You can disable key\
    \ caching by setting the `key_cache_size_in_mb`\nparameter to 0.\n\nConfiguring\
    \ the Frequency of Caching\n\nYou can configure how frequently the database caches\
    \ rows caches and\npartition key caches to disk.\n\n*   The `row_cache_save_period`\n\
    \    property determines how long (in seconds) the database retains the rows\n\
    \    in the cache before saving them to the directory specified by the `saved_caches_directory`\n\
    \    property. Row caching is disabled by default, meaning the default value\n\
    \    of the `row_cache_save_period`\n    parameter is 0.\n\n*   The `key_cache_save_period`\n\
    \    parameter determines how long the database keeps keys in the cache\n    before\
    \ saving them to the directory specified by the `saved_caches_directory`\n   \
    \ property. The default value is 4 hours (14,400 seconds).\n\nSpecifying the Number\
    \ of Keys to Save \n\nBy default, the database saves all keys from the row cache.\
    \ You can\nconfigure the `row_cache_keys_to_save`\nparameter to specify the number\
    \ of keys to save. The default value for\nthis parameter is disabled, which means\
    \ that all keys are saved.\n\nSince by default the database doesn’t enable the\
    \ row cache, the default\nvalue for the `row_cache_class_name`\nparameter is disabled.\
    \ You can specify one of the following two values\nas the class name for the row\
    \ cache provider to use:\n\n*   `OHCProvider`:\n    Fully off-heap\n\n*   `SerializingCacheProvider`:\n\
    \    Partially off-heap\n\nThe `OHCProvider`\nis newer, and benchmarking tests\
    \ show that it offers roughly 15 percent\nbetter performance than the older, partially\
    \ off-heap row cache\nprovider.\n\nUsing the Counter Cache   \n\nBesides the row\
    \ and key caches, Cassandra also lets you configure a\ncounter cache. The counter\
    \ cache stores counters that are in high\ndemand, thus reducing the contention\
    \ for the counter cells. When the\ndatabase finds a counter in the cache (cache\
    \ hit), it needs to hold the\ncounter locks for a shorter period, speeding up\
    \ the updating of the hot\ncounter cells.\n\nCassandra enables the counter cache\
    \ by default. The size of the counter\ncache depends on the value you configure\
    \ for the `counter_cache_size_in_mb`\nparameter. By default this parameter isn’t\
    \ set, and Cassandra uses the\nsmaller of two values: 2.5% of the heap or 50MB.\n\
    \nAs with the row and key caches, Cassandra saves the counter cache (just\nthe\
    \ keys) to disk in the directory you specify with the `saved_caches_directory`\n\
    parameter. By default, this parameter has the value 2 hours (7,200\nseconds).\n\
    \nThe other configuration property for managing the counter cache is the\n`counter_cache_keys_to_save`\n\
    parameter. You configure this property to tell the database how many\nkeys from\
    \ the counter cache it must save. By default this property is\ndisabled, meaning\
    \ Cassandra saves all keys.\n\nIf you perform counter\n   deletes\nand use a low\
    \ `gc_grace_seconds`\nsetting, you should disable the counter cache, which you\
    \ can do by\nsetting the value of the `counter_cache_size_in_mb`\nparameter to\
    \ zero.\n\nMonitoring \nCaching\n\nThe `nodetool info` command helps you monitor\
    \ caching performance, thus helping\nyou adjust the row cache and key cache configuration\
    \ based on current\ncache behavior. Here’s an example:\n\n```\n$ nodetool info\n\
    ID                     : 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\nGossip active \
    \         : true\nThrift active          : false\nNative Transport active: true\n\
    Load                   : 12.46 MiB\nGeneration No          : 1503673044\nUptime\
    \ (seconds)       : 91\nHeap Memory (MB)       : 117.82 / 1492.00\nOff Heap Memory\
    \ (MB)   : 0.07\nData Center            : datacenter1\nRack                  \
    \ : rack1\nExceptions             : 0\nKey Cache              : entries 47, size\
    \ 3.94 KiB, capacity 74 MiB, 69 hits, 120 requests, 0.575 recent hit rate, 14400\
    \ save period in seconds\nRow Cache              : entries 0, size 0 bytes, capacity\
    \ 0 bytes, 0 hits, 0 requests, NaN recent hit rate, 0 save period in seconds\n\
    Counter Cache          : entries 0, size 0 bytes, capacity 37 MiB, 0 hits, 0 requests,\
    \ NaN recent hit rate, 7200 save period in seconds\nChunk Cache            : entries\
    \ 30, size 1.88 MiB, capacity 341 MiB, 44 misses, 182 requests, 0.758 recent hit\
    \ rate, 1072.447 microseconds miss latency\nPercent Repaired       : 100.0%\n\
    Token                  : (invoke with -T/--tokens to see\n$\n```\n\nThe `nodetool\
    \ info` command shows the following caching-related information for\nall three\
    \ of Cassandra’s caches (row, key, and counter):\n\n*   Number of entries in the\
    \ cache\n\n*   Size of the cache in bytes\n\n*   Capacity of the cache\n\n*  \
    \ Number of requests for cached data\n\n*   Number of cache hits\n\n*   The cache\
    \ hit ratio (rate)\n\n*   The save period in seconds \n\nTracing Database Operations\n\
    \ to Optimize Caching\n\nYou can trace database reads to check if the read operations\
    \ are getting\ndata from the cache or straight from the SSTables stored on disk.\
    \ When\nyou trace a query that refers to a cached table, initially the trace\n\
    shows that there was a row cache miss. When you rerun the query, the\ntrace reveals\
    \ the “row cache hit” line, as shown here:\n\n```\nrow cache miss [ReadStage:23]\n\
    row cache hit [ReadStage:35]\n```\n\nA row cache miss means that the database\
    \ has read the data from disk. A\nrow cache hit, on the other hand, means that\
    \ the database has found the\ndata in the cache, saving itself the trouble of\
    \ going to disk to read\nthe data. Remember that a cache read is always many times\
    \ faster than a\nread from disk.\n\nThe reason you see the “cache miss” early\
    \ on is because it takes some\ntime for the database to cache data, especially\
    \ if the table is large.\nOnce the database puts the data in the cache, subsequent\
    \ queries will\nuse the cached data instead of going to disk, meaning the query\
    \ is going\nto return the results quite fast. You’ll therefore see the “cache\
    \ hit”\nmessage in the traces.\n\nOnce data gets in the cache, it stays there\
    \ and the database uses it for\nall queries that refer to the data. However, if\
    \ you update the data, it\ninvalidates the cache. Cassandra ignores the cached\
    \ data under\nconditions such as the following:\n\n*   If the query requires data\
    \ from the cache as well as from disk (that is,\n    cached+uncached data).\n\n\
    *   When the query requests large amounts of data, which leads to the\n    exceeding\
    \ of the global cache size limit.\n\n*   The query requests data that’s not at\
    \ the beginning of the partition.\n\nIf any of these situations occur, you’ll\
    \ see the following line from the\ntrace of a query that tries to use the cached\
    \ data:\n\n```\nIgnoring row cache as cached value could not satisfy query [ReadStage:89]\n\
    ```\n\nIn all of these cases\n, the cache proves to be insufficient to handle\
    \ the query,\nforcing Cassandra to perform expensive (high resource cost) disk\
    \ reads\ninstead of using the more efficient cache reads. When you notice that\n\
    the database is ignoring the row cache, depending on the cause, you can\ndo one\
    \ of the following to make the database use the cached data:\n\n*   Increase the\
    \ cache size.\n\n*   Create a new table and place frequently accessed rows at\
    \ the beginning\n    of the partition.\n\n*   Limit the output size for a query\
    \ (with the `LIMIT` `N` option in a\n    `SELECT`\n    statement) to keep the\
    \ retrieved rows from exceeding the configured\n    cache size.\n\nStress Testing\
    \ Cassandra with cassandra-stress \n\nCassandra offers the `cassandra-stress`\n\
    utility for benchmarking and load testing your clusters. The tool is\nalso useful\
    \ in testing changes to key aspects of database configuration,\nsuch as selecting\
    \ a different compaction strategy. You can test read,\nwrite, and mixed workloads.\n\
    \nCassandra-stress is useful for optimizing your data model, testing how\nwell\
    \ the database scales, and determining production capacity.\n\nRunning cassandra-stress\n\
    \nYou can find the `cassandra-stress` tool\nin the `$CASSANDRA_HOME/tools/bin`\n\
    directory.\n\nIssue the command\n `cassandra-stress` to\nget a quick idea about\
    \ the tool’s capabilities, as shown here:\n\n```\n$CASSANDRA_HOME/tools/bin$ cassandra-stress\n\
    No command specified\nUsage:      cassandra-stress  [options]\nHelp usage: cassandra-stress\
    \ help \n---Commands---\nread                 : Multiple concurrent reads - the\
    \ cluster must first be populated by a write test\nwrite                : Multiple\
    \ concurrent writes against the cluster\nmixed                : Interleaving of\
    \ any basic commands, with configurable ratio and distribution - the cluster must\
    \ first be populated by a write test\ncounter_write        : Multiple concurrent\
    \ updates of counters.\ncounter_read         : Multiple concurrent reads of counters.\
    \ The cluster must first be populated by a counterwrite test.\nuser          \
    \       : Interleaving of user provided queries, with configurable ratio and distribution\n\
    help                 : Print help for a command or option\nprint             \
    \   : Inspect the output of a distribution definition\nlegacy               :\
    \ Legacy support mode\nversion              : Print the version of cassandra stress\n\
    ---Options---\n-pop                  : Population distribution and intra-partition\
    \ visit order\n-insert              : Insert specific options relating to various\
    \ methods for batching and splitting partition updates\n-col                 \
    \ : Column details such as size and count distribution, data generator, names,\
    \ comparator and if super columns should be used\n-rate                 : Thread\
    \ count, rate limit or automatic mode (default is auto)\n-mode               \
    \  : Thrift or CQL with options\n-errors               : How to handle errors\
    \ when encountered during stress\n-schema               : Replication settings,\
    \ compression, compaction, etc.\n-node                 : Nodes to connect to\n\
    -log                  : Where to log progress to, and the interval at which to\
    \ do it\n-transport            : Custom transport factories\n-port           \
    \      : The port to connect to cassandra nodes on\n-sendto               : Specify\
    \ a stress server to send this command to\n-graph                : Graph recorded\
    \ metrics\n-tokenrange           : Token range settings\n$CASSANDRA_HOME/tools//bin$\n\
    ```\n\nAt a high level ,\nhere are the key options you must be aware of:\n\n*\
    \   `read`: Multiple\n    concurrent reads (you must first run a write test to\
    \ populate the test\n    tables with data)\n\n*   `write`: Multiple\n    concurrent\
    \ writes\n\n*   `counter_write:`\n    Multiple concurrent counter updates\n\n\
    *   `counter_reads`:\n    Multiple concurrent counter reads (you must first populate\
    \ the test\n    tables with a `counter_write` test)\n\nA cassandra-stress Example\n\
    \nWhen you run the `cassandra-stress` tool\nfor the first time, it creates a keyspace\
    \ named keyspace1, and within that keyspace, a\ntable named either `standard1`\
    \ or `counter1`, depending\non the type of tests you run. Cassandra reuses the\
    \ keyspace and table it\ncreates for all subsequent runs.\n\nRunning a Write Test\
    \ \n\nHere’s an example that shows how to run a write test (remember that you\n\
    must run a write test first before you can run a read test):\n\n```\n$ cassandra-stress\
    \ write\nn=100000\ncl=one\n******************** Stress Settings ********************\n\
    Command:\nType: write\nCount: 100,000\nConsistency Level: ONE\n...\nInsert:\n\
    Revisits: Uniform:  min=1,max=1000000\nVisits: Fixed:  key=1\nColumns:\nMax Columns\
    \ Per Key: 5\nColumn Names: [C0, C1, C2, C3, C4]\nComparator: AsciiType\nTimestamp:\
    \ null\nVariable Column Count: false\nSlice: false\nSize Distribution: Fixed:\
    \  key=34\nCount Distribution: Fixed:  key=5\nErrors:\nIgnore: false\nTries: 10\n\
    ...\nSchema:\nKeyspace: keyspace1\nReplication Strategy: org.apache.cassandra.locator.SimpleStrategy\n\
    Replication Strategy Pptions: {replication_factor=1}\nTable Compression: null\n\
    Table Compaction Strategy: null\nTable Compaction Strategy Options: {}\n...\n\
    Connected to cluster: Test Cluster, max pending requests per connection 128, max\
    \ connections per host 8\nDatatacenter: datacenter1; Host: localhost/127.0.0.1;\
    \ Rack: rack1\nCreated keyspaces. Sleeping 1s for propagation.\nRunning WRITE\
    \ with 200 threads for 100000 iteration\ntype       total ops,    op/s,    pk/s,\
    \   row/s,    mean,     med,     .95,     .99,    .999,     max,   time,   stderr,\
    \ errors,  gc: #,  max ms,  sum ms,  sdv ms,      mb\n...\nResults:\nOp rate \
    \                  :    3,011 op/s  [WRITE: 3,011 op/s]\nPartition rate      \
    \      :    3,011 pk/s  [WRITE: 3,011 pk/s]\nRow rate                  :    3,011\
    \ row/s [WRITE: 3,011 row/s]\nLatency mean              :   64.9 ms [WRITE: 64.9\
    \ ms]\nLatency median            :   39.1 ms [WRITE: 39.1 ms]\nLatency 95th percentile\
    \   :  190.2 ms [WRITE: 190.2 ms]\nLatency 99th percentile   :  537.4 ms [WRITE:\
    \ 537.4 ms]\nLatency 99.9th percentile : 1155.5 ms [WRITE: 1,155.5 ms]\nLatency\
    \ max               : 1632.6 ms [WRITE: 1,632.6 ms]\nTotal partitions        \
    \  :    100,000 [WRITE: 100,000]\nTotal errors              :          0 [WRITE:\
    \ 0]\n...\nTotal operation time      : 00:00:33\nEND\n$\n```\n\nIn this command\
    \ ,\nyou specify the `write` option to\ndenote that you want to insert rows into\
    \ the table that `cassandra-stress`\ncreates for the stress test. `Cassandra-stress`\n\
    inserts one million rows (`n`=10000000). The\noption `c1` sets\nthe consistency\
    \ level to `ONE`. The default\nconsistency level is `LOCAL ONE`, and you\ncan\
    \ set any of the other standard Cassandra consistency levels.\n\nThe previous\
    \ example didn’t use authentication. To use authentication\nwhen running the `cassandra-stress`\n\
    tool, specify the `-mode` command (with\nthe option `native`) to specify a\nusername\
    \ and password, as shown in this example:\n\n```\n$ cassandra-stress\n-mode native\
    \ cql3\nuser=cassandra password=cassandra\ncl=QUORUM\n```\n\nThe data you insert\
    \ with the `write` option of the\n`cassandra-stress` tool\nis by default never\
    \ truncated. You can truncate the table that the `cassandra-stress` tool\ncreates\
    \ by running the `cassandra-stress`\ncommand with the `-truncate` option:\n\n\
    ```\n$ cassandra-stress write n=100000000 cl=QUORUM truncate=always -schema keyspace=keyspace-rate\
    \ threads=200 -log file=write_$NOW.log\n```\n\nIf you’re specifying the `mode`\
    \ command, make\nsure that you specify the `truncate` option\nbefore the `mode`\n\
    option, as otherwise the `cassandra-stress` tool\nignores the `truncate` option.\n\
    \nRunning a Read Test \n\nOnce you populate the database tables created by the\
    \ `cassandra-stress` tool\nas shown in the write test example, you have data that\
    \ the tool can\nread. Now you can run the read test, as shown here:\n\n```\n$\
    \ cassandra-stress read n=10000000 -rate threads=50 duration=5\n```\n\nIn this\
    \ example, the options stand for the following:\n\n*   `-read:` Performs\n   \
    \ multiple concurrent reads of the data that you populated earlier. The\n    suboption\
    \ `n=10000000` specifies\n    the number of rows to read.\n\n*   `-rate:` Helps\n\
    \    you specify the thread count, rate limit, or the automatic mode, which\n\
    \    is the default. In this case, you specify the suboption thread count for\n\
    \    the stress test by specifying `threads=50`.\n\n*   `duration` :\n    Specifies\
    \ that the test must read rows for a specific number of minutes\n    (5 in this\
    \ example).\n\nRunning a Mixed Workload \n\nThe `cassandra-stress`\ncommand option\
    \ `mixed` helps you run\ncommands with configuration ratio and distribution. Before\
    \ running this\ncommand, you must populate the cluster with a write test.\n\n\
    Here’s an example that shows how to run a mixed workload:\n\n```\n$ cassandra-stress\
    \ mixed\nratio\\(write=1,read=3\\)\nn=100000\ncl=ONE\n-pop dist=UNIFORM\\(1..1000000\\\
    )\n-schema keyspace=\"keyspace1\"\n-mode native cql3\n-rate threads\\>=16 threads\\\
    <=256\n-log file=~/mixed_autorate_50r50w_1M.log\n```\n\nNote the following:\n\n\
    *   The `ratio`\n    option sets the ratio of writes to reads.\n\n*   The `-pop`\n\
    \    command option sets the population distribution and intra-partition\n   \
    \ visit order. In this example, you specify `pop dist=UNIFORM\\(1..1000000\\)`,\
    \ which means that of the 100,000\n    operations (`n=100000`), the test\n   \
    \ must select the keys uniformly distributed between 1 and 1,000,000\\. You\n\
    \    specify the `-pop` option when you\n    specify more data per node than can\
    \ fit in the RAM of that node.\n\nSetting the Replication, Compaction, and\nCompression\
    \ Options \n\nRun the `-schema`\ncommand option to view the options you can set\
    \ for replication,\ncompaction, and compression. It also enables you to specify\
    \ the keyspace\nto use for the stress test.\n\n```\n$ cassandra-stress help  -schema\n\
    Usage: -schema [replication(?)] [keyspace=?] [compaction(?)] [compression=?]\n\
    replication([strategy=?][factor=?][=?]): Define the replication strategy and any\
    \ parameters\nstrategy=? (default=org.apache.cassandra.locator.SimpleStrategy)\
    \ The replication strategy to use\nfactor=? (default=1)                 The number\
    \ of replicas\nkeyspace=? (default=keyspace1)           The keyspace name to use\n\
    compaction([strategy=?][=?]): Define the compaction strategy and any parameters\n\
    strategy=?                            The compaction strategy to use\ncompression=?\
    \                            Specify the compression to use for sstable, default:no\
    \ compression\n$\n```\n\nThe following example shows how to change the replication\
    \ strategy to\nNetworkTopologyStrategy for a node named cass1:\n\n```\n$ cassandra-stress\
    \ write n=500000 no-warmup -node cass1 -schema \"replication(strategy=NetworkTopologyStrategy,\
    \ cass1=2)\"\n```\n\nRunning a Stress Test on Multiple Nodes \n\nAll of the earlier\
    \ examples ran on a single node. Sometimes a single\nnode can’t handle the workload\
    \ for a stress test. You can specify\nmultiple nodes with the `$NODES` variable\
    \ that\nyou specify with the `-node` command option.\nYou specify the nodes in\
    \ a comma-delimited list of IP addresses with the\n`$NODES`\nvariable.\n\nThe\
    \ following example shows how to run a stress test on two nodes named\ncass1 and\
    \ cass2:\n\n```\n$ cassandra-stress write n=1000000 cl=one -mode native cql3 -schema\
    \ keyspace=\"keyspace1\" -pop seq=1..1000000 -log file=~/node1_load.log\n–node\
    \ $NODES\n```\n\nRunning cassandra-stress with a YAML-Based Profile\n\nYou can\
    \ use a YAML-based\nprofile file  when\nrunning the `cassandra-stress`\ntool.\
    \ The profile helps you define various compaction strategies and the\ncache settings\
    \ that the database will use during the stress tests. You\ncan find the sample\
    \ YAML files provided by Cassandra in the following\nlocations:\n\n*   `/usr/share/docs/cassandra/examples   /*\
    \ Package installations`\n\n*   `$CASSANDRA_HOME/tools/               /* Tarball\
    \ installations`\n\nA Cassandra-provided YAML file, such as the `cqlstress-example.yaml`\n\
    file, contains various configurations for the stress tests under\nseparate sections.\
    \ These configuration properties include keyspace and\ntable definitions, as well\
    \ as the query definition. You can add\nsecondary indexes and materialized views\
    \ under the extra-definitions section. You can\nmodify the sample profile files\
    \ or create your own profile files.\n\nYou can specify the YAML file as the value\
    \ for the `profile` option when\nyou run the `cassandra-stress`\ncommand. The\
    \ `profile` option points\nto the location of the YAML file that you use.\n\n\
    The following example shows how to run a stress test with the help of\nthe `cqlstress-example.yaml`\n\
    file:\n\n```\n$ cassandra-stress user profile=$CASSANDRA_HOME/tools/cqlstress-example.yaml\
    \ n=1000000 ops\\(insert=3,read1=1\\) no-warmup cl=QUORUM\n```\n\nYou can specify\
    \ the `-graph` option to\ncreate a graph for the stress tests you run. You can\
    \ view the graphs\nwith a web browser after the test completes. Here’s an example:\n\
    \n```\n$ cassandra-stress\nuser profile=tools/cqlstress-example.yaml\nops\\(insert=1\\\
    )\n-graph file=test.html\ntitle=test\nrevision=test1\n```\n\nYou can view a graph\
    \ of the stress test by viewing the file `test1.html` in a web\nbrowser. You must\
    \ provide the name for the HTML file that captures the\noutput of the stress test\
    \ for viewing via a browser. The `title` and `revision` options\naren’t required,\
    \ but if you’re running multiple stress tests using the\nsame data, you must use\
    \ the `revision` parameter.\n\nFigure [11-2](#A436674_1_En_11_Chapter.html#Fig1)\
    \ shows the\ngraph of the stress test with the previous `cassandra-stress`\ncommand.\n\
    \n![A436674_1_En_11_Fig1_HTML.jpg](A436674_1_En_11_Fig1_HTML.jpg)\n\nFigure 11-2\n\
    \nA graph of a cassandra-stress tool stress test, generated with the\n-graph option\
    \ \n\nConfiguring Compaction Strategies\n\nCompacting data helps consolidate SSTables,\
    \ merge keys, combine columns,\nand evict tombstones.\n\nAs you learned in Chapter\
    \ [6](#A436674_1_En_6_Chapter.html), Cassandra’s SSTables are\nimmutable, meaning\
    \ that the database never overwrites data. Instead, it\nwrites new versions of\
    \ the data that it inserts or updates into new\nSSTables. There’s never an in-place\
    \ revision of data (which requires\nrandom I/O). Instead, the database simply\
    \ writes the latest version of\nthe data (updates or inserts) in new SSTables.\
    \ This is a key factor in\nCassandra’s high performance.\n\nNote\n\nThe database\
    \ turns all updates to data into new SSTables that it writes\nsequentially to\
    \ disk.\n\nAs the database updates data over time, it may end up with multiple\n\
    versions of the same row, each in a different SSTable. Unique timestamps\ndistinguish\
    \ the versions.\n\nOver time, Cassandra needs to access numerous SSTables to retrieve\
    \ a\ncomplete row, as no single SSTable is likely to be storing the most\nup-to-date\
    \ versions of all columns in that row. To improve performance,\nCasandra performs\
    \ periodic compactions of the SSTables by merging the\ntables and getting rid\
    \ of old, outdated versions of data. Compaction\nkeeps the read speed from deteriorating\
    \ as users update data over time.\n\nDuring the compaction process, Cassandra\
    \ does the following;\n\n*   Consolidates the SSTables\n\n*   Evicts all tombstones\n\
    \n*   Merges keys\n\n*   Combines columns\n\n*   Creates a new index in the new\
    \ SSTable (not a secondary index)\n\nThe compaction process creates a single complete\
    \ row with the latest\nversion of all columns in that row. The database writes\
    \ the latest\nversions of each row to a new SSTable and deletes the old versions\
    \ from\nthe old SSTables once it satisfies all pending requests. Here are the\n\
    practical consequences of the compaction process:\n\n*   An improvement in read\
    \ performance due to the newly compacted SSTables\n\n*   A temporary rise in disk\
    \ I/O and space usage since the database needs to\n    temporarily maintain both\
    \ the old and new SSTables\n\nYou can manually compact tables with the `nodetool\
    \ compact`\ncommand. Better still is to set the compaction strategy for a table,\n\
    either via a `CREATE TABLE` or an `ALTER TABLE` command.\n\nCompaction Strategies\n\
    \nA compaction strategy determines how Cassandra selects SSTables for\ncompaction\
    \ and how it stores compacted rows in the new SSTables that it\ncreates during\
    \ compaction for holding up-to-date data. You can choose\nfrom the following three\
    \ compaction strategies:\n\n*   SizeTieredCompactionStrategy (STCS)\n\n*   LeveledCompactionStrategy\
    \ (LCS)\n\n*   TimeWindowCompactionStrategy (TWCS)\n\nNote\n\nThere’s also a DataTieredCompactionStrategy\
    \ (DTCS), which is an\nalternative strategy for time series data, but it’s deprecated\
    \ in\nCassandra 3.0 and later.\n\nTWCS is the best strategy for compacting time\
    \ series data. For non-time\nseries data, you need to choose either STCS or LCS.\
    \ The following\nsections explain the three compaction strategies you can choose\
    \ from.\n\nSizeTieredCompactionStrategy\n\nUnder STCS, the size of the SSTables\
    \ acts as the trigger for a table\ncompaction. STCS groups SSTables into unique\
    \ buckets. The database\ncompacts the SSTables once there are a predetermined\
    \ number of\nsame-sized tables. Cassandra compares each SSTable’s size to the\
    \ average\nof the SSTable size on a node.\n\nBy default, the compaction configuration\
    \ property `enabled` for STCS is\n`true`, meaning\nthat the database performs\
    \ background compaction. The SSTable\nconfiguration property `min_threshold` sets\n\
    the minimum number of SSTables that’ll trigger a compaction. Once a\ntable meets\
    \ the `min_threshold` value,\nit’s eligible for compaction. By default, the database\
    \ performs a\ncompaction operation when there are four similar-sized tables (160MB\
    \ by\ndefault). Cassandra merges the same-sized tables into a single, large\n\
    SSTable. As the database acquires several of the larger SSTables, it\nmerges a\
    \ set number of them into an even larger SSTable.\n\nNote\n\nSTCS is the default\
    \ compaction strategy.\n\nThe following is an example showing how to change a\
    \ table’s compaction\nproperty to SizeTieredCompactionStrategy:\n\n```\ncqlsh>\
    \ ALTER TABLE users\nWITH compaction =\n'class' : 'SizeTieredCompactionStrategy',\
    \ 'min_threshold' : 6 }\n```\n\nThe `min_threshhold` table\nproperty enables you\
    \ to set the minimum number of SSTables before the\ndatabase performs a minor\
    \ compaction. In this example, the `min_threshold`\nproperty specifies that at\
    \ a minimum, the database should look for six\nSSTables of the same size before\
    \ it triggers a compaction.\n\nNote\n\nA minor compaction involves specific tables\
    \ in a keyspace.\n\nConfiguring STCS   \n\nIn addition to the `enabled` and the\
    \ `min_threshold`\nproperties, you can configure the following properties for\
    \ STCS:\n\n*   `bucket_high` and\n    `bucket_low`:\n    This pair of properties\
    \ provides the sizing formula that helps the\n    database determine the size\
    \ of a table for it to be considered for\n    compaction. The database merges\
    \ SSTables whose size falls within the\n    following range:\n\n    ```\n    [average\
    \ table size  X bucket_low] and [average table size X bucket_high]\n    ```\n\n\
    \    The default value of the `bucket_high` property\n    is 1.5, and the `bucket_low`\
    \ property\n    has a default value of 0.5.\n\n*   `log_all`:\n    Enables you\
    \ to set up advanced logging for the cluster, and its default\n    value is `false`.\n\
    \n*   `min_threshold`\n    and `max_threshold`: This\n    set of properties determines\
    \ the minimum (default value is 4) and the\n    maximum (default value is 32)\
    \ number of SSTables in a minor compaction.\n\n*   `min_sstable_size`: By\n  \
    \  default, the database groups SSTables into buckets by including in each\n \
    \   bucket SSTables that vary in size by less than 50%. In cases where you\n \
    \   have smallish SSTables, you can set the `min_sstable_size`\n    property to\
    \ define a size threshold (in bytes) for SSTables that are\n    assigned to a\
    \ bucket. The default value for this parameter is 50MB.\n\n*   Tombstone-Related\
    \ Compression\n    Properties: There are several tombstone-related compression\n\
    \    properties.\n\n    *   `only_purge_repaired_tombstones`:\n        The default\
    \ value of this parameter is `false`, meaning that\n        the database will\
    \ allow purging tombstones from all SSTables, repaired\n        as well as unrepaired.\
    \ By setting this property to the value `true`, you require the\n        database\
    \ to purge tombstones only from repaired SSTables.\n\n    *   `tombstone_threshold`:\n\
    \        Sets the ratio of the tombstones that the database can garbage collect,\n\
    \        compared to all contained columns. The default value for this parameter\n\
    \        is 0.2\\. Once an SSTable exceeds this ratio (20%), it’s eligible for\n\
    \        tombstone compaction. Once the number of tombstones that the database\n\
    \        can garbage collect exceeds 20%, Cassandra will compact just that table\n\
    \        to purge the tombstones.\n\n    *   `tombstone_compaction_interval`:\n\
    \        The length of time after you create an SSTable before the database\n\
    \        considers the table for tombstone compaction. The default value is\n\
    \        86,400 seconds (1 day).\n\n    *   `unchecked_tombstone_compaction`:\n\
    \        By default, this property is set to `false`, meaning that\n        Cassandra\
    \ will check for the eligibility of the table for tombstone\n        compaction\
    \ before running the compaction operation. By setting the\n        property to\
    \ `true`, you allow\n        Cassandra to compact the tombstones without the prechecks.\n\
    \nWhen to Use (or Not to Use) STCS   \n\nSTCS is ideal for write-intensive workloads.\
    \ Since the merge process\ndoesn’t group data by rows, it’s possible that versions\
    \ of rows are\nspread over multiple tables, which slows down read speeds.\n\n\
    However, STCS doesn’t evict stale and deleted data quickly since the\ncompaction\
    \ trigger is the size of the SSTables, which may grow too\nslowly over time, thus\
    \ keeping old data in place. Over time, as SSTables\nget larger, since the database\
    \ needs to store both the old and new\nSSTables during compaction, the database\
    \ will require more storage.\n\nAlthough LCS keeps related data in a small set\
    \ of tables, if your data\ndoesn’t undergo too many modifications or inserts,\
    \ STCS can also give\nyou the same type of data sets without paying the write\
    \ penalty that you\nincur with LCS.\n\nSTCS is more efficient than LCS when dealing\
    \ with batched read and write\noperations. On the negative side, however, it requires\
    \ a lot more disk\nspace than LCS.\n\nLeveledCompactionStrategy\n\nLCS groups\
    \ SSTables into levels where each level (L1, L2, L3 …) is 10\ntimes larger than\
    \ the preceding level. The database compacts SSTables in\neach level into progressively\
    \ larger levels. To begin with, the database\nflushes the data in memtables to\
    \ SSTables in the lowest level (L0). The\ndatabase doesn’t compact the tables\
    \ in the L0 level; it merges these\nsmallest sized SSTables with larger SSTables\
    \ at the next higher level\n(L1).\n\nThe database compacts the SSTables in levels\
    \ L2, L3, and so on into\nSSTables that are at least as large as the value you\
    \ set for the LCS\nproperty `sstable_size_in_mb`\n(default is 160MB).\n\nLCS improves\
    \ read performance since Cassandra can determine the SSTables\nin each level it\
    \ should check for the existence of row key data.\n\nConfiguring LCS\n\nYou can\
    \ set the following properties for LCS, and all these properties\nhave the same\
    \ meaning as they do for STCS, as I described in the\nprevious section.\n\n* \
    \  `enabled`\n\n*   `log_all`\n\n*   `tombstone_compaction_interval`\n\n*   `tombstone_threshold`\n\
    \n*   `unchecked_tombstone_compaction`\n\nIn addition to these properties, you\
    \ can also configure the\nsstable_size_in_mb property, which is unique to LCS.\
    \ The\nsstable_size_in_mb property specifies the target size for tables when\n\
    compacting with LCS. The database will try to keep the SSTable size\n(after compaction)\
    \ the same or less than the value you specify for the\nsstable_size_in_mb parameter.\
    \ However, if a partition is very large, the\ncompaction will result in a larger\
    \ SSTable than the value you specified\nwith the sstable_size_in_mb parameter.\
    \ As mentioned earlier, the default\nvalue for the sstable_size_in_mb property\
    \ is 160MB.\n\nHere’s an example showing how to update a table to set the database\n\
    compaction strategy to LeveledCompactionStrategy:\n\n```\ncqlsh> ALTER TABLE users\
    \ WITH\ncompaction = { 'class' :  'LeveledCompactionStrategy'};\n```\n\nWhen to\
    \ Use (or Not to Use) LCS\n\nLCS involves a tradeoff between read and write performance.\
    \ LCS works\nwell for read-intensive workloads (especially workloads that involve\n\
    random reads) since it enables the database to retrieve the required\ndata for\
    \ queries from just one SSTable 90 percent of the time. The other\ntimes, it’ll\
    \ need to read just two SSTables.\n\nLCS    is ideal when there’s\na lot of data\
    \ fragmentation. LCS evicts stale data more often than STCS,\nwhich means that\
    \ deleted data eats up a lesser part of the SSTables.\nHowever, more frequent\
    \ compaction operations mean there’s more I/O\npressure. Thus, LCS isn’t generally\
    \ a promising idea for write-intensive\nworkloads due to the performance hit stemming\
    \ from the higher amount of\nI/O operations. LCS’s write penalty means that a\
    \ high volume of writes\ncould overwhelm the compaction operations.\n\nLCS requires\
    \ less space than STCS.\n\nIf it’s critical for you to maintain a high read rate,\
    \ you can use LCS.\nTo overcome the resulting performance hit on the write side,\
    \ you can add\nmore nodes to your cluster.\n\nTimeWindowCompactionStrategy\n\n\
    TWCS is the recommended compaction strategy for time series data and\nexpiring\
    \ TTL workloads. TWCS compacts SSTables according to a series of\ntime windows.\
    \ The database creates continuous time windows and during\neach active (most recent)\
    \ time window, it compacts all uncompacted\nSSTables into larger SSTables using\
    \ STCS compaction.\n\nAt the end of the time window, the database compacts (major\
    \ compaction,\nsince SSTables from more than one keyspace are involved) all the\n\
    SSTables that fall in that time window into a single SSTable, using the\nSSTable\
    \ maximum timestamp as a criterion. The database repeats the same\ncompaction\
    \ procedures with all the SSTables that it writes during the\nsubsequent time\
    \ windows.\n\nConfiguring TWCS\n\nYou can set the following compaction properties\
    \ for configuring TWCS:\n\n*   `compaction_window_unit`:\n    This property enables\
    \ you to define the time unit for defining the\n    bucket size. The default time\
    \ unit is milliseconds, and you can set a\n    value such as seconds or hours\
    \ if you wish. Here’s an example:\n\n    ```\n    compaction_window_unit = 'minutes',compaction_window_size\
    \ = 120\n    ```\n\n*   `compaction_window_size`:\n    The number of units per\
    \ time window (1, 2, 3 …).\n\n*   `log_all`:\n    Enables you to activate advanced\
    \ logging for the entire cluster by\n    setting the value `true`. The default\n\
    \    value is `false`.\n\nWhen to Use TWCS   \n\nTWCS is ideal for time series\
    \ data stored in tables with a default TTL\n(time-to-live). This compaction strategy\
    \ isn’t good if you need to query\ntime series data out of sequence.\n\nEnabling\
    \ and Disabling \nCompaction\n\nBy default, Cassandra enables background compaction.\
    \ You can disable the\nbackground compaction by setting the `enabled` property\
    \ to\n`false` through\nan `ALTER TABLE`\nstatement, as shown here:\n\n```\ncqlsh>\
    \ ALTER TABLE mytable\nWITH COMPACTION = {\n'class': 'SizeTieredCompactionStrategy',\n\
    'enabled': 'false' }\n```\n\nThe best practice regarding compaction is to use\
    \ the default setting of\n`enabled` (`true`) and let the\ndatabase compact data.\n\
    \nConfiguring Global Compaction Properties\n\nYou can configure the following\
    \ three global compaction parameters:\n\n*   `snapshot_before_compaction`\n\n\
    *   `concurrent_compactors`\n\n*   `compaction_throughput_mb_per_sec`\n\nI explain\
    \ these properties in the following sections.\n\nThe snapshot_before_compaction\
    \ Property\n\nThe  `snapshot_before_compaction`\nproperty  determines whether\
    \ the database takes a snapshot of\ndata before performing a compaction operation.\
    \ As with all of\nCassandra’s snapshots, you’re responsible for deleting older\
    \ snapshots\nso they don’t consume too much space.\n\nBy default, the `snapshot_before_compaction`\n\
    property is set to `false`.\n\nThe concurrent_compactors Property\n\nDuring a\
    \ long-running compaction, a large number of small SSTables can\naccumulate, which\
    \ will adversely impact read performance. To avoid this\ndeterioration in the\
    \ read performance, you can configure the `concurrent_compactors`\nparameter to\
    \ set the number of concurrent compaction processes that can\nrun at any time.\
    \ This number doesn’t include any validation compactions\nfor anti-entropy repair.\n\
    \nBy default, the `concurrent_compactors`\nproperty is set to the lower of the\
    \ number of disks or the number of\ncores, with a minimum of two and maximum of\
    \ eight per CPU core.\n\nSince performing simultaneous compactions increases the\
    \ use of disk\nspace, make sure that you have sufficient free disk space before\
    \ raising\nthe value of the `concurrent_compactors`\nparameter.\n\nNote\n\nBefore\
    \ you adjust the `concurrent_compactors`\nproperty, throttle the speed of the\
    \ compaction by configuring the `compaction_throughput_mb_per_sec`\nproperty.\n\
    \nThe sstable_preemptive_open_interval_in_mb\nProperty \n\nThe database can preemptively\
    \ open the SSTables it is compacting before\nit completes its writes to the SSTables.\
    \ The goal is to smoothly\ntransfer reads between the before and after compaction\
    \ versions of the\nSSTables by minimizing the movement of data into and out of\
    \ the cache,\nas well as keep the hot rows in place. The default value is 50MB.\n\
    \nThrottling the Compaction Speed\n\nSometimes you may realize that a compaction\
    \ is running too fast (or too\nslow). You can configure the `compaction_throughput_mb_per_sec`\n\
    property to throttle compaction to a specific rate (measured in MB) per\nsecond.\
    \ This compaction property controls the speed with the database\ninserts data.\
    \ The faster the rate of data insertion, the higher the\nspeed with which the\
    \ database must perform the compaction so it can keep\nthe SSTable count low.\n\
    \nThe default value for the  `compaction_throughput__mb_per_sec`\nparameter  is\
    \ 16, meaning that the rate of compaction is 16 times\nthe write throughput, which\
    \ is measured in MB/second.\n\nYou can disable compaction throttling by setting\
    \ the `compaction_throughput__mb_per_`\n `sec`  property\nto 0\\. The recommended\
    \ value is 16-32\\. The compaction speed is divided\namong all compactors. If\
    \ you have eight concurrent compactors and 16 as\nthe value for compaction throughput,\
    \ you only get 2MB/s per compactor.\nOn spinning disks it is advisable to have\
    \ a really low number of\nconcurrent compactors (ex: 2); on SSD, you can raise\
    \ the number of\ncompactors to a level your disks can keep up with.\n\nNote\n\n\
    You can have the database issue a warning when compacting a partition\nthat’s\
    \ larger than the value you set by configuring the `compaction_large_partition_warning_threshold_mb`\n\
    property. The default value for this parameter is 100.\n\nSetting  the Compaction\n\
    Strategy\n\nYou set the compaction strategy at the table level. You can set the\n\
    compaction properties either when you create a table or by altering the\ntable.\
    \ You specify the compaction `class` with the `compaction` option\ninside a `CREATE\
    \ TABLE` or an `ALTER TABLE`\nstatement, as shown here:\n\n```\ncompaction = {\n\
    'class' : 'compaction_strategy_name'\n[, 'subproperty_name' : 'value',...]\n}\n\
    ```\n\nAlthough you can disable compaction, it’s never a good idea to do so\n\
    because it may lead to the propagation of zombies. A zombie, if you\nrecall from\
    \ Chapter [5](#A436674_1_En_5_Chapter.html), is a deleted but persistent\nrecord.\
    \ Sometimes a tombstoned record will have been deleted from other\nnodes of the\
    \ cluster except for an unresponsive node, which doesn’t\nimmediately receive\
    \ the tombstones since it’s down. If the database\ndeletes the tombstoned records\
    \ from the rest of the cluster before the\nunresponsive node comes back up, Casandra\
    \ treats the (supposed to be\ndeleted) record on this node as new data and sends\
    \ it to the other\nnodes.\n\nAs mentioned, a grace period for the unresponsive\
    \ nodes to recover helps\nprevent the reappearance of the zombie records. The\
    \ table property `gc_grace_seconds` sets\nthe grace period for a tombstone, and\
    \ its default value is ten days\n(864,000 seconds). Once the tombstone’s grace\
    \ period ends, the database\ndeletes the tombstones during the compaction process.\n\
    \nGetting and Setting  the Compaction\nThresholds\n\nRun the `nodetool getcompactionthreshold`\
    \ command to find the minimum and maximum\ncompaction thresholds for a table.\
    \ You must specify the keyspace and the\ntable name when you run this command.\n\
    \n```\n$ sudo nodetool getcompactionthreshold cycling cyclist_name\nCurrent compaction\
    \ thresholds for cycling/cyclist_name:\nmin = 4,  max = 32\n$\n```\n\nNote\n\n\
    A major compaction involves all tables in a keyspace. A minor compaction\ninvolves\
    \ only some of the tables in a keyspace.\n\nYou can set the compaction thresholds\
    \ with the nodetool’s `setcompactionthreshold`\ncommand, which enables you to\
    \ set the min/max compaction thresholds for\na table. The term “threshold” refers\
    \ to the number of similar-sized\nSSTables that should be in the database before\
    \ the database schedules a\nminor compaction.\n\nThe `setcompactionthreshold`\n\
    command has the following options:\n\n*   `keyspace`:\n    Keyspace name\n\n*\
    \   `table`: Table\n    name\n\n*   `minthreshold`:\n    Minimum number of SSTables\
    \ to trigger a minor compaction (when using\n    STCS or DTCS).\n\n*   `maxthreshold`:\n\
    \    The maximum number of SSTables in a minor compaction (when using STCS or\n\
    \    DTCS).\n\nHere’s an example showing how to set the compaction threshold for\
    \ a\ntable:\n\n```\n$ nodetool setcompactionthreshold cycling cyclists 4 16\n\
    ```\n\nIn this example, cycling refers\nto the keyspace and `cyclists`, the table.\n\
    \nAs explained earlier, both STCS and DTCS allow you to configure a\nminimum and\
    \ maximum number of SSTables that should be compacted during a\nminor compaction\
    \ through the configuration if the min_threshold and\nmax_threshold properties.\n\
    \nLogging  the Compaction\nActivity\n\nYou can set up extended logging of the\
    \ compaction activity in a database\nby setting the `log_all` subproperty\nto\
    \ `true`. The\n`log_all`\nsubproperty is under the `compaction` property\nwhen\
    \ you create or alter a table. The `log_all` property for\na table activates advanced\
    \ logging for the entire cluster. While you do\nthis at the table level, once\
    \ you configure extended logging for a\nsingle table, the database automatically\
    \ collects detailed information\nfor compacting all the tables on all nodes in\
    \ the cluster.\n\nOnce you set up extended logging of compaction activity, the\
    \ database\ncreates an additional compaction-related file named `compaction-%d`\
    \ under\nthe `$CASSANDRA_HOME/logs`\ndirectory, with `%d` acting as a\nsequential\
    \ number.\n\nFollowing the setting up of extended compaction logging, the database\n\
    collects information about the following compaction events:\n\nEnable: Lists all\
    \ the SSTables that the database has flushed.\n\n```\n{\"type\":\"enable\",\"\
    keyspace\":es\":\n...\n}\n```\n\nFlush: Logs flush events from memtables to SSTables.\n\
    \n```\n{\"type\":\"flush\",\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083335639,\"\
    tables\":\n...\n}\n```\n\nType: compaction: Logs compaction events\n\n```\n{\"\
    type\":\"compaction\",\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083660267,\"\
    start\":\"1\n...\n}\n```\n\nPending: Lists the number of pending tasks for compaction.\n\
    \n```\n{\"type\":\"pending\",\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083447967,\"\
    strategyId\":\"1\",\"pending\":100}\n```\n\nTesting  the Efficacy\nof a Compaction\
    \ Strategy\n\nWhen you’re planning to change your compaction strategy, you can\
    \ first\ntest the impact of the new strategy on a node that’s not officially part\n\
    of the cluster. You start up a new node in the write survey mode, which adds the\
    \ node\nto the cluster but doesn’t formally make it a part of the ring.\n\nYou\
    \ can, if you wish, take one of the nodes out of the cluster and bring\nit back\
    \ in the write survey mode to test the impact of the changes on\nthe read performance.\
    \ Once you start the node in the write survey mode,\nyou can benchmark the read\
    \ operations on that node.\n\nTo start a node in the write survey mode, set the\
    \ `write_survey` option\nto `true` by\nusing either of the following two methods:\n\
    \n```\nJVM_OPTS=\"$JVM_OPTS -Dcassandra.write_survey=true       /* for package\
    \ installations, add this line to the cassandra-env.sh file.\n$ cassandra -Dcassandra.write_survey=true\
    \               /* for tarball installations, start the new node in this mode.\n\
    ```\n\nYou can also start a node in the write survey mode by setting the\nproperty\
    \ in the `$CASSANDRA_HOME/conf/jvm.options`\nfile, as shown here (by default,\
    \ the `-Dcassandra.write_survey`\nproperty is commented. You need to remove the\
    \ comment). Here’s the\nrelevant portion of the `jvm.options` file:\n\n```"
  trans: "\n# Cassandra 日志与性能调优\n\n## `logback.xml` 文件\n\n以下是一个展示各类 Appender 的 `logback.xml`\
    \ 示例文件：\n\n```\n<configuration>\n  <appender name=\"SYSTEMLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
    >\n    <file>${cassandra.logdir}/system.log</file>\n    <rollingPolicy class=\"\
    ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\">\n      <fileNamePattern>${cassandra.logdir}/system.log.%i.zip</fileNamePattern>\n\
    \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n\
    \      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n \
    \   </encoder>\n  </appender>\n\n  <appender name=\"DEBUGLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
    >\n    <file>${cassandra.logdir}/debug.log</file>\n    <rollingPolicy class=\"\
    ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\">\n      <fileNamePattern>${cassandra.logdir}/debug.log.%i.zip</fileNamePattern>\n\
    \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n\
    \      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n \
    \   </encoder>\n  </appender>\n\n  <appender name=\"STDOUT\" class=\"ch.qos.logback.core.ConsoleAppender\"\
    >\n    <encoder>\n      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n\
    \    </encoder>\n  </appender>\n\n  <root level=\"INFO\">\n    <appender-ref ref=\"\
    SYSTEMLOG\"/>\n    <appender-ref ref=\"DEBUGLOG\"/>\n    <appender-ref ref=\"\
    STDOUT\"/>\n  </root>\n</configuration>\n```\n\n**注意**\n可以使用 `.xml` 或 `.groovy`\
    \ 作为 Logback 配置文件的扩展名。在我们的示例中，使用的是 `.xml`。\n\n当需要深入研究 Cassandra 内部机制时，最佳做法之一是将日志记录级别修改为更“宽松”的级别，这意味着显示更多关于\
    \ Cassandra 正在执行（或未能执行）的操作的详细信息。\n\n默认的 `INFO` 级别不会生成太多操作细节，仅提供操作状态，如下所示：\n\n\
    ```\nWARN  [main] 2017-04-03 13:06:55,973 DatabaseDescriptor.java:493 - Small\
    \ cdc volume detected at ./../data/cdc_raw; setting cdc_total_space_in_mb to 2377\\\
    .  You can override this in cassandra.yaml\nINFO  [main] 2017-04-03 13:06:56,882\
    \ CassandraDaemon.java:472 - Hostname: ubuntu\nINFO  [main] 2017-04-03 13:06:56,887\
    \ CassandraDaemon.java:479 - JVM vendor/version: Java HotSpot(TM) 64-Bit Server\
    \ VM/1.8.0_121\nINFO  [main] 2017-04-03 13:06:56,897 CassandraDaemon.java:480\
    \ - Heap size: 476.000MiB/476.000MiB\nINFO  [main] 2017-04-03 13:06:56,911 CassandraDaemon.java:485\
    \ - Par Eden Space Heap memory: init = 83886080(81920K) used = 77260784(75449K)\
    \ committed = 83886080(81920K) max = 83886080(81920K)\n```\n\n通过修改 `logback.xml`\
    \ 文件，可以将默认日志记录级别更改为 `DEBUG`，如下所示：\n```\n<root level=\"DEBUG\">\n```\n\n修改 `logback.xml`\
    \ 文件后，无需重启 Cassandra，因为数据库每分钟会扫描一次 `logback.xml` 文件以查找更改，前提是您已在文件中添加了以下行：\n```\n\
    <configuration scan=\"true\">\n```\n\n**提示**\n在生产环境中，请确保将日志级别设置为 `WARN` 或 `ERROR`\
    \ 等较稀疏的级别，因为大量的日志输出会影响性能。\n\n## 自动加载配置文件\n\n配置 Logback 以扫描配置文件中的更改，并在您进行任何与日志记录相关的配置更改时自动重新配置自身。这是通过将\
    \ `<configuration>` 元素的 `scan` 属性设置为 `true` 来实现的：\n```\n<configuration scan=\"\
    true\">\n...\n</configuration>\n```\n\n## 配置 Appender\n\n使用 `<appender>` 元素配置\
    \ Appender。此元素有两个强制属性：`name` 和 `class`。`name` 属性为 Appender 命名，`class` 属性指向 Appender\
    \ 类的名称。\n\n`<appender>` 元素还可以包含 `<layout>`、`<encoder>` 和 `<filter>` 元素。\n\n##\
    \ 设置日志轮转\n\n默认情况下，当 `system.log` 文件达到 20MB 时，Cassandra 会轮转该文件。它还会将较早的归档日志文件压缩为\
    \ zip 格式，并将其命名为 `system.log.1.zip`、`system.log.2.zip` 等。\n\n可以在 Logback 中配置以下轮转策略：\n\
    \n*   日志文件的位置和名称\n*   归档文件的位置和名称\n*   触发轮转到新日志文件的最大日志文件大小\n*   日志级别\n\n默认日志级别是\
    \ `INFO`。您可以设置 `ALL`、`TRACE`、`DEBUG`、`WARN` 和 `ERROR` 作为日志级别。通过设置日志级别为 `OFF` 可以关闭所有日志记录。\n\
    \n## 使用 Nodetool 设置服务的日志级别\n\n除了编辑 `logback.xml` 文件，您还可以运行 `nodetool setlogginglevel`\
    \ 命令从命令行设置日志级别。\n\n### 设置日志级别\n\n使用 `nodetool setlogginglevel` 命令从命令行设置服务日志级别的语法如下：\n\
    \n```\n$ nodetool setlogginglevel <class_qualifier> <level>\n```\n\n在此命令中，\n\n\
    *   `class_qualifier` 是记录器类限定符，例如 `org.apache.cassandra.service.StorageProxy`。\n\
    *   `level` 是日志级别。\n\n可以为 `class_qualifier` 选项设置以下值：\n\n*   `org.apache.cassandra`\n\
    *   `org.apache.cassandra.db`\n*   `org.apache.cassandra.service.StorageProxy`\n\
    \n可以从 `ALL`、`TRACE`、`DEBUG`、`INFO`、`WARN` 和 `ERROR` 中选择日志级别。您可以将 `level` 属性设置为\
    \ `OFF` 以关闭所有日志记录。\n\n通过将日志级别设置为 `DEBUG`，您可以看到数据库正在执行的操作的更多详细信息。以下示例展示了如何将 `StorageProxy`\
    \ 服务设置为 `DEBUG` 级别：\n\n```\n$ nodetool setlogginglevel org.apache.cassandra.service.StorageProxy\
    \ DEBUG\n```\n\n### 检查当前日志级别\n\n可以使用 `nodetool getlogginglevels` 命令检查当前日志级别，如下所示：\n\
    \n```\n$ nodetool getlogginglevels\nLogger Name                              \
    \          Log Level\nROOT                                                   INFO\n\
    com.thinkaurelius.thrift                               ERROR\norg.apache.cassandra\
    \                                   DEBUG\norg.apache.cassandra.service.StorageProxy\
    \              INFO\n$\n```\n\n## 使用 Nagios 监控 Cassandra\n\n在生产环境中，使用强大的企业级监控工具来检查\
    \ Cassandra 集群是很好的做法。Nagios 是一个流行的开源监控系统，它提供了许多监控 Cassandra 集群的功能。\n\nNagios 使用\
    \ Nagios 远程插件执行器 (NRPE) 来监控运行 Cassandra 实例的远程主机。\n\n您需要在远程主机上安装和配置 NRPE 代理。NRPE\
    \ 需要 Nagios 插件，因此您需要将插件安装为代理来监控远程主机上的本地资源。\n\n在以下部分中，我将展示如何在 Ubuntu 服务器上安装 Nagios\
    \ 4。然后展示如何安装和配置 NRPE。我从使用 Nagios 所需的先决条件开始。\n\n### 安装 LAMP 堆栈并解决其他先决条件\n\nLAMP\
    \ 堆栈是一组开源软件，使服务器能够托管动态网站和 Web 应用程序。LAMP 首字母缩略词代表以下四个组件：\n\n*   Linux 操作系统\n* \
    \  Apache Web 服务器\n*   MySQL 数据库\n*   PHP\n\n在以下部分中，我解释了如何安装 LAMP。您可能已经拥有 Linux\
    \ 操作系统，因此需要安装 Apache Web 服务器、MySQL 数据库和 PHP。\n\n1.  安装并启动 Apache Web 服务器。\n\n\
    \    ```\n    $ sudo apt-get install apache2\n    $ sudo systemctl restart apache2\n\
    \    ```\n\n2.  安装 MySQL 数据库。\n\n    ```\n    $ sudo apt-get install mysql-server\n\
    \    ```\n\n    此时您可以运行 MySQL 安全脚本，以删除不安全的默认配置并锁定数据库访问。\n\n    ```\n    $ mysql-secure_installation\n\
    \    ```\n\n3.  安装 PHP。以下命令将安装 PHP 5：\n\n    ```\n    $ sudo apt-get install php\
    \ libapache2-mod-php php-mcrypt php-mysql\n    ```\n\n4.  默认情况下，当服务器请求一个目录时，Apache\
    \ 会首先查找名为 `index.html` 的文件。您需要让 Apache 首先查找 `index.php` 文件。为此，请编辑 `/etc/apache2/mods-enabled/dir.conf`\
    \ 文件，其内容如下：\n\n    ```\n    DirectoryIndex index.html index.cgi index.pl index.php\
    \ index.xhtml index.htm\n    ```\n\n    只需将 `index.php` 文件移动到该行开头，紧靠在 `DirectoryIndex`\
    \ 文件之前。关闭并保存文件。\n\n5.  重启 Apache 服务器，使您在步骤 4 中所做的更改生效。\n\n    ```\n    $ sudo\
    \ systemctl restart apache2\n    ```\n\n6.  检查 MySQL 和 PHP 是否正常运行。您可以通过运行以下命令来确认\
    \ Apache 服务器的状态：\n\n    ```\n    $ sudo systemctl status apache2\n    ```\n\n\
    7.  您可以通过运行一个名为 `info.php` 的基本 PHP 脚本（`/var/www/html/info.php`）来确认您已正确配置 PHP。\n\
    \n完成此操作后，在浏览器中访问以下地址：\n\n```\nhttp://<your-server-IP>/info.php\n```\n\n您应该会看到一个漂亮的网页，显示有关\
    \ PHP 安装的详细信息。就 LAMP 堆栈而言，您已经准备就绪。然而，在安装 Nagios 之前，您必须完成几个先决条件，我将在接下来解释。\n\n###\
    \ 创建 Nagios 用户和组\n\n您需要一个用户来运行 Nagios 服务器。创建一个名为 `nagios` 的用户，该用户属于一个名为 `nagcmd`\
    \ 的组。\n\n```\n$ sudo useradd nagios\n$ sudo groupadd nagcmd\n$ sudo usermod -a\
    \ -G nagcmd nagios\n```\n\n### 安装构建依赖项\n\n您正在从源代码安装 Nagios Core（免费版本），因此需要安装额外的二进制文件来完成构建。您还需要\
    \ `apache2-utils` 来设置 Nagios Web 界面。您可以安装所有必需的包：\n\n```\n$ sudo apt-get install\
    \ build-essential libgd2-xpm-dev openssl libssl-dev xinetd apache2-utils\n```\n\
    \n最后，完成所有先决条件后，您就可以安装 Nagios 本身了。\n\n### 安装 Nagios\n\n要安装 Nagios，您必须下载源代码、配置它并编译（构建）它。\n\
    \n#### 下载 Nagios\n\n下载最新稳定版本的 Nagios 源代码并提取存档，如下所示：\n\n```\n$ cd ~\n$ curl -L\
    \ -O https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.1.1.tar.gz\n\
    $ tar xvzf nagios-*.tar.gz\n$ cd nagios-*\n```\n\n#### 配置 Nagios\n\n在构建 Nagios\
    \ Core 之前，必须安装软件包。\n\n```\n$ ./configure --with-nagios-group=nagios --with-command-group=nagcmd\n\
    ```\n\n#### 编译和安装 Nagios\n\n编译 Nagios 并运行其他命令来安装 Nagios。\n\n```\n$ sudo make\n\
    $ sudo make install\n$ sudo make install-commandmode\n$ sudo make install-init\n\
    $ sudo make install-config\n$ sudo /usr/bin/install -c -m 644 sample-config/httpd.conf\
    \ /etc/apache2/sites-available/nagios.conf\n```\n\n最后，将 Web 服务器用户 `www-data` 添加到\
    \ `nagcmd` 组，以便您可以通过 Web 界面向 Nagios 发出外部命令。\n\n```\n$ sudo usermod -G nagcmd www-data\n\
    ```\n\n### 安装 Nagios 插件\n\n下一个重要步骤是安装 Nagios 插件。您遵循的步骤与上一节中 Nagios 服务器安装的步骤类似。我在此总结这些步骤。\n\
    \n```\n$ cd ~\n$ curl -L -O http://nagios-plugins.org/download/nagios-plugins-2.1.1.tar.gz\n\
    $ tar xvf nagios-plugins-*.tar.gz\n$ cd nagios-plugins-*\n$ ./configure --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-openssl\n$ make\n$ sudo make install\n```\n\
    \n您可以这样验证配置：\n\n```\n$ sudo /usr/local/nagios/bin/nagios -v /usr/local/nagios/etc/nagios.cfg\n\
    ...\nRunning pre-flight check on configuration data...\n...\n$\n```\n\n**注意**\n\
    您可以轻松地为 Nagios 创建自定义插件。唯一的要求是插件可以通过命令行提示符执行，并且它返回以下退出值之一：`OK`、`Warning`、`Critical`\
    \ 或 `Unknown` 状态。\n\n### 安装 NRPE\n\nNRPE 的下载、配置和构建遵循与 Nagios 和 Nagios 插件相同的步骤。步骤如下：\n\
    \n```\n$ cd ~\n$ curl -L -O http://downloads.sourceforge.net/project/nagios/nrpe-2.x/nrpe-2.15/nrpe-2.15.tar.gz\n\
    $ tar xvf nrpe-*.tar.gz\n$ cd nrpe-*\n$ ./configure --enable-command-args --with-nagios-user=nagios\
    \ --with-nagios-group=nagios --with-ssl=/usr/bin/openssl --with-ssl-lib=/usr/lib/x86_64-linux-gnu\n\
    $ make all\n$ sudo make install\n$ sudo make install-xinetd\n$ sudo make install-daemon-config\n\
    ```\n\n在 xinetd 启动脚本 `/etc/xinetd.d/nrpe` 的末尾添加 Nagios 服务器的私有 IP 地址。\n\n```\n\
    only_from = 127.0.0.1 192.168.159.129\n```\n\n重启 `xinetd` 服务以启动 NRPE。\n\n```\n\
    $ sudo service xinetd restart\n```\n\n### 配置 Nagios 和 Apache\n\n尽管您之前已经安装并构建了\
    \ Nagios，但您仍然需要为 Nagios 服务器和 Apache Web 服务器进行一些配置。\n\n#### 配置 Nagios\n\n编辑 Nagios\
    \ 主配置文件（`/usr/local/nagios/etc/nagios.cfg`），如下所示：\n\n```\ncfg_dir=/usr/local/nagios/etc/servers\n\
    ```\n\n您的 Cassandra 集群中的每个主机都将有一个存储在此目录中的配置文件。您必须创建该目录。\n\n```\n$ sudo mkdir /usr/local/nagios/etc/servers\n\
    ```\n\n编辑联系人配置文件（`/usr/local/nagios/etc/objects/contacts.cfg`），并将 `email` 的值替换为您自己的电子邮件地址，这也是一个好主意。\n\
    \n您还需要在 Nagios 配置文件 `/usr/local/nagios/etc/objects/commands.cfg` 的末尾添加一个新命令。\n\
    \n```\ndefine command{\ncommand_name check_nrpe\ncommand_line $USER1$/check_nrpe\
    \ -H $HOSTADDRESS$ -c $ARG1$\n}\n```\n\n#### 配置 Apache\n\n接下来，您必须配置 Apache Web\
    \ 服务器，步骤如下。\n\n1.  启用 Apache 的 `rewrite` 和 `cgi` 模块，如下所示：\n\n    ```\n    $ sudo\
    \ a2enmod rewrite\n    $ sudo a2enmod cgi\n    ```\n\n2.  使用 `htpasswd` 实用程序创建一个名为\
    \ `nagiosadmin` 的管理员用户，这将帮助您访问 Nagios Web 界面。\n\n    ```\n    $ sudo htpasswd\
    \ -c /usr/local/nagios/etc/htpasswd.users nagiosadmin\n    New password:\n   \
    \ Re-type new password:\n    Adding password for user nagiosadmin\n    ```\n\n\
    3.  启动 Nagios 和 Apache 服务器。\n\n    ```\n    $ sudo service nagios start\n    $\
    \ sudo service apache2 restart\n    ```\n\n### 添加要监控的 Cassandra 集群主机\n\n要通过 Nagios\
    \ 启用对 Cassandra 主机的监控，您需要做三件事：\n\n*   在集群的主机（节点）上安装和配置 NRPE。\n*   将主机添加到 Nagios\
    \ 服务器配置中。\n*   添加您想要在主机上监控的服务。\n\n#### 在主机上安装和配置 NRPE\n\n在您希望监控的每台主机上，执行以下操作。\n\
    \n1.  更新 `apt-get`。\n\n    ```\n    $ sudo apt-get update\n    ```\n\n2.  安装 Nagios\
    \ 插件和 Nagios 远程插件执行器 (NRPE)。\n\n    ```\n    $ sudo apt-get install nagios-plugins\
    \ nagios-nrpe-server\n    ```\n\n3.  更新 NRPE 配置文件 (`/etc/nagios/nrpe.cfg`)，并将\
    \ Nagios 服务器的 IP 地址作为 `allowed_hosts` 属性的值添加。\n\n    ```\n    allowed_hosts=127.0.0.1,172.31.22.133\n\
    \    ```\n\n4.  重启 NRPE。\n\n    ```\n    $ sudo service nagios-nrpe-server restart\n\
    \    ```\n\n#### 将主机添加到 Nagios 服务器配置\n\n在 Nagios 服务器上为您想要监控的每个 Cassandra 主机创建一个单独的配置文件。例如，对于名为\
    \ `host1` 的服务器，您必须创建文件 `host1.cfg` (`/usr/local/nagios/etc/servers/host1.cfg`)。\n\
    \n在 `host1.cfg` 文件中，添加主机定义，如下所示：\n\n```\ndefine host {\nuse                  \
    \           linux-server\nhost_name                       host1\nalias       \
    \                    Nagios Agent 1\naddress                         192.168.159.130\n\
    max_check_attempts              5\ncheck_period                    24x7\nnotification_interval\
    \           30\nnotification_period             24x7\n}\n```\n\n#### 添加特定于 Cassandra\
    \ 的插件\n\n下一步是向您展示如何下载和测试特定于 Cassandra 的插件。此插件名为 `Check Cassandra Status and Heap\
    \ Memory`，它可以报告节点的状态（`UP`/`DOWN`）以及堆内存利用率（`WARNING`/`CRITICAL`）通知。\n\n按照以下步骤使用该插件。\n\
    \n1.  将工作目录更改为 `/usr/local/nagios/libexec` 目录。\n\n    ```\n    $ cd /usr/local/nagios/libexec\n\
    \    ```\n\n2.  下载插件 (`cassandra.pl`) 并更改其权限。\n\n    ```\n    $ wget \"https://exchange.nagios.org/components/com_mtree/attachment.php?link_id=3819&cf_id=24\"\
    \ -O cassandra.pl\n    $ chmod +x cassandra.pl\n    $ chown nagios:nagios cassandra.pl\n\
    \    ```\n\n3.  测试以确保插件正常工作。\n\n    ```\n    $ ./cassandra.pl\n    CASSANDRA OK\
    \ -  | heap_mem=5.59\n    $\n    ```\n\n    测试输出表明插件工作正常。如果您看到错误消息，请编辑 `cassandra.pl`\
    \ 文件并确保 `$nodetool_path` 变量指向 `nodetool` 二进制文件的正确位置。\n\n4.  配置 NREP，以便 Nagios\
    \ 可以执行该插件。编辑 Cassandra 服务器上的 `/usr/local/nagios/etc/nrpe.cfg` 文件，并在文件末尾添加以下行：\n\
    \n    ```\n    command[cassandra]=/usr/local/nagios/libexec/cassandra.pl $ARG1$\n\
    \    ```\n\n5.  在 Cassandra 服务器上重启 `xinetd` 服务。\n\n    ```\n    $ sudo service\
    \ xinetd restart\n    ```\n\n6.  打开与运行 Nagios 的服务器的会话，并执行以下命令：\n\n    ```\n  \
    \  $ sudo /usr/local/nagios/libexec/check_nrpe -H 192.168.159.130 -c cassandra\n\
    \    CASSANDRA OK -  | heap_mem=10.32\n    $\n    ```\n\n输出表明您已在 Cassandra 服务器上正确配置了\
    \ NRPE。然后，您可以将此配置添加到 Nagios 服务器。\n\n## 总结\n\n诸如 `nodetool tablestats` 和 `nodetool\
    \ tablehistograms` 之类的命令可帮助您了解有关 SSTable 的关键事实。其他 `nodetool` 命令（如 `nodetool status`\
    \ 和 `nodetool info`）有助于监控集群状态。\n\n我详细讨论了日志记录。日志记录不仅仅是数据库中活动的附带产物。日志记录是集群中正确和错误操作的宝贵信息来源。Cassandra\
    \ 允许您以多种方式配置日志记录，定制日志记录以满足您的需求是一个很好的策略，可帮助您有效地对数据库进行故障排除和监控。\n\nJConsole 设置简单，有助于调整数据库性能。我详细讨论了\
    \ Nagios，但它的功能远不止于此，因此我在这里只是浅尝辄止。我在示例中使用了 Nagios 的免费版本；付费版本提供更多的功能以及支持！无论是 Nagios\
    \ 还是其他工具，强大的图形化工具对于集群管理都是必不可少的。\n\n# 11. Cassandra 性能调优\n\nCassandra 有许多配置参数，在性能调优领域尤其如此，数据库管理员可以控制性能的多个方面。开箱即用，Cassandra\
    \ 许多与性能相关的配置属性都使用默认设置。作为管理员，您应该了解这些默认值并根据您的环境进行修改。\n\n本章重点介绍 Cassandra 性能的以下领域：\n\
    \n*   追踪查询以分析数据库性能\n*   缓存数据\n*   压实策略\n*   压缩\n*   调优布隆过滤器\n*   调优 JVM 和垃圾收集策略\n\
    *   使用 `cassandra-stress` 工具进行压力测试\n\n## 使用追踪分析性能\n\n在调整数据库性能时，您可以在数据库中开启追踪，以获取有关\
    \ Cassandra 内部操作的详细事务信息。追踪在跟踪 Cassandra 在查询处理各个阶段（例如查询的解析和执行）所花费的时间方面非常有价值。追踪提供与以下操作相关的详细计时信息：\n\
    \n*   准备 SQL 语句\n*   读修复相关活动\n*   Memtable 和 SSTable 数据查找\n*   键缓存搜索\n*   集群节点之间的交互\n\
    \n追踪数据对于评估查询有效性非常有用。例如，当您追踪涉及这些索引的查询时，不适当或多余的二级索引会在节点之间显示较高的活动。\n\n**注意**\n开启追踪将帮助追踪集群中两种广泛的活动：查询和修复操作。\n\
    \n默认情况下，Cassandra 禁用追踪。一旦启用追踪，Cassandra 会将事务详细信息捕获到 `system_traces` 键空间中。此键空间中的两个表保存追踪数据：\n\
    \n*   `system_traces.sessions`：存储事务的高级详细信息，例如事务长度和会话 ID。\n*   `system_traces.events`：存储有关数据库执行的所有操作的详细信息。\n\
    \n**注意**\nCassandra 只能存储有限时间段的追踪数据。因此，如果您希望将追踪数据保留更长时间，则必须配置以下属性：\n*   `tracetype_query_ttl`：为日志记录查询过程期间使用的不同追踪类型设置\
    \ TTL。默认值为 86,400 秒（1 天）。\n*   `tracetype_repair_ttl`：为日志记录修复过程期间使用的不同追踪类型设置 TTL。默认值为\
    \ 604,800 秒（大约一周）。\n\n`system_traces.events` 表捕获的数据库活动类型揭示了您发出查询时 Cassandra 执行的操作。\n\
    \n```\ncqlsh> select activity from system_traces.events;\nactivity\n-----------\n\
    Parsing select id from cycling.cyclist_name;\nPreparing statement\nComputing ranges\
    \ to query\nSubmitting range requests on 513 ranges with a concurrency of 112\
    \ (0.9 rows per range expected)\nExecuting seq scan across 0 sstables for (min(-9223372036854775808),\
    \ max(-9196210656004250337)]\nRead 0 live and 0 tombstone cells\nEnqueuing request\
    \ to /192.168.159.129\nSending RANGE_SLICE message to /192.168.159.129\nRANGE_SLICE\
    \ message received from /192.168.159.130\nEnueuing request to /192.168.159.129\n\
    Enqueuing response to /192.168.159.130\nSending RANGE_SLICE message to /192.168.159.129\n\
    Processing response from /192.168.159.129\nRANGE_SLICE message received from /192.168.159.130\n\
    Executing seq scan across 0 sstables for (max(-8175039996930460291), max(-8066091505323311933)]\n\
    Read 0 live and 0 tombstone cells\n...\ncqlsh>\n```\n\n### 管理追踪\n\n您可以这样检查追踪的状态：\n\
    \n```\ncqlsh> tracing\nTracing is currently disabled. Use TRACING ON to enable.\n\
    cqlsh>\n```\n\n在数据库中开启追踪很简单；只需运行 `tracing on` 命令。\n\n```\ncqlsh> tracing on;\n\
    Now Tracing is enabled\ncqlsh> tracing;\nTracing is currently enabled. Use TRACING\
    \ OFF to disable\ncqlsh>\n```\n\n要关闭所有追踪，请运行 `tracing off` 命令。\n\n```\ncqlsh>\
    \ tracing off;\nDisabled Tracing.\ncqlsh>\n```\n\n### 管理概率追踪\n\nCassandra 使用概率追踪策略，您可以配置数据库将追踪的语句百分比的概率。该概率是基于每个节点的。概率为\
    \ 1.0 意味着数据库将追踪所有 SQL 语句，设置为 0.5 意味着它可能追踪大约 50% 的请求。\n\n默认概率为 0.0，这意味着追踪被禁用。更高的概率设置涉及更多的写入，有时这会不利地影响集群性能，因此在设置追踪概率时必须谨慎。\n\
    \nCassandra 建议您从较小的概率设置（例如 0.001）开始，并根据数据库中的情况逐渐提高。即使像这样低的设置也可能对数据库性能产生显著影响，因此请注意性能下降。\n\
    \n`nodetool gettraceprobability` 命令显示当前的追踪概率。\n\n```\n$ nodetool gettraceprobability\n\
    Current trace probability: 0.0\n$\n```\n\n您可以通过运行 `nodetool settraceprobability`\
    \ 命令来设置追踪概率，以追踪读或写请求，如下所示：\n\n```\n$ nodetool settraceprobability 0.1\n$ nodetool\
    \ gettraceprobability\nCurrent trace probability: 0.1\n$\n```\n\n`system_traces.sessions`\
    \ 表显示了有关追踪的有价值信息。\n\n```\ncqlsh> select * from system_traces.sessions;\nsession_id\
    \      | client   | command | coordinator   | duration | parameters      | request\
    \       | started_at\n----------------+ ---------+---------+--------------+-----------+\
    \ ----------------d7103660-81e4-11e7-a4ad-89801d899afb | 127.0.0.1 |   QUERY |\
    \ 192.168.159.130 |   506051 |                                               \
    \              {'consistency_level': 'ONE', 'page_size': '100', 'query': 'select\
    \ * from cycling.cyclist_name;', 'serial_consistency_level': 'SERIAL'} | Execute\
    \ CQL3 query | 2017-08-15 18:09:11.878000+0000\n189ff700-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |     6848 | {'consistency_level': 'ONE',\
    \ 'page_size': '5000', 'query': 'SELECT * FROM system_traces.sessions WHERE session_id\
    \ = 185a6280-81e5-11e7-a4ad-89801d899afb', 'serial_consistency_level': 'SERIAL'}\
    \ | Execute CQL3 query | 2017-08-15 18:11:01.872000+0000\n185a6280-81e5-11e7-a4ad-89801d899afb\
    \ | 127.0.0.1 |   QUERY | 192.168.159.130 |   177343 |              {'consistency_level':\
    \ 'ONE', 'page_size': '100', 'query': 'select * from cycling.cycle;', 'serial_consistency_level':\
    \ 'SERIAL'} | Execute CQL3 query | 2017-08-15 18:11:01.416000+0000\n...\n(11 rows)\n\
    cqlsh>\n```\n\n### 如何追踪写和读请求\n\n追踪是资源密集型的，并且会消耗大量存储空间。选择性地追踪是正确的策略，而不是为整个数据库启用追踪。在本节中，我将展示如何追踪特定的读和写请求。\n\
    \n#### 追踪写请求\n\n以下是一个简单示例，展示了如何获取写请求（插入语句）的追踪信息。您首先开启追踪，然后在 `cyclist_name` 表中插入一行（输出显示部分数据）。\n\
    \n```\ncqlsh> tracing on;\nNow Tracing is enabled\ncqlsh> insert into cycling.cyclist_name\
    \ ( id, lastname, firstname ) values (uuid(), 'FRAME', 'Nina' );\nTracing session:\
    \ bdfdf410-8116-11e7-81bd-63c57c069fd1\nactivity                             \
    \                               | timestamp                  | source        \
    \  | source_elapsed | client        Execute CQL3 query | 2017-08-14 10:33:53.489000\
    \ | 192.168.159.130 |              0 | 127.0.0.1\nDetermining replicas for mutation\
    \ [Native-Transport-Requests-1] | 2017-08-14 10:33:53.522000 | 192.168.159.130\
    \ |          32844 | 127.0.0.1\nMUTATION message received from /192.168.159.130\
    \ [MessagingService-Incoming-/192.168.159.130] | 2017-08-14 10:33:53.530000 |\
    \ 192.168.159.129 |            843 | 127.0.0.1\nSending MUTATION message to /192.168.159.129\
    \ [MessagingService-Outgoing-/192.168.159.129-Small] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.130 |          42754 | 127.0.0.1\nAppending to commitlog [MutationStage-1]\
    \ | 2017-08-14 10:33:53.532000 | 192.168.159.129 |           2668 | 127.0.0.1\n\
    Adding to cyclist_name memtable [MutationStage-1] | 2017-08-14 10:33:53.532000\
    \ | 192.168.159.129 |           3181 | 127.0.0.1\nProcessing response from /192.168.159.129\
    \ [RequestResponseStage-3] | 2017-08-14 10:33:53.545000 | 192.168.159.130 |  \
    \        56321 | 127.0.0.1\nRequest complete | 2017-08-14 10:33:53.546583 | 192.168.159.130\
    \ |          57583 | 127.0.0.1\n```\n\n追踪数据显示了以下信息：\n\n*   Cassandra 复制您插入的行的目标节点\n\
    *   Cassandra 如何将新数据附加到提交日志\n*   数据库如何将新数据添加到 memtable\n*   数据库如何确认（“Request complete”）插入数据的请求已成功完成\n\
    \n#### 追踪读请求\n\n追踪读请求产生的数据比追踪写请求多得多，因此在追踪这些请求时要小心。产生密集追踪数据的部分原因是 Cassandra 将行分布在多个\
    \ SSTable 中，因此它必须读取多个 SSTable 来检索数据。追踪显示了数据库为满足读请求而发出的所有请求。\n\n以下是一个简单 `select`\
    \ 语句的部分输出：\n\n```\ncqlsh> select * from cycling.cyclist_name;\nid            \
    \                       | firstname | lastname\n--------------------------------------+-----------+-----------------\n\
    69f1cb04-687d-4be7-a91f-72ef037c5514 |     Sammy |           FRAME\ne7ae5cf3-d358-4d99-b900-85902fda9bb0\
    \ |      Alex |           FRAME\nd378af39-1a28-474c-836b-aa960fed6f2b |      Nina\
    \ |           FRAME\nfb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |      \
    \  MATTHEWS\n5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS\n\
    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |       TIRALONGO\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47\
    \ |    Steven |      KRUIKSWIJK\ne7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna\
    \ | VAN DER BREGGEN\n(8 rows)\nTracing session: b2b0eda0-8117-11e7-81bd-63c57c069fd1\n\
    activity                                             | timestamp             \
    \     | source          | source_elapsed | client\nExecute CQL3 query | 2017-08-14\
    \ 10:40:44.026000 | 192.168.159.130 |              0 | 127.0.0.1\nParsing select\
    \ * from cycling.cyclist_name; [Native-Transport-Requests-1] | 2017-08-14 10:40:44.027000\
    \ | 192.168.159.130 |            364 | 127.0.0.1\nPreparing statement [Native-Transport-Requests-1]\
    \ | 2017-08-14 10:40:44.027000 | 192.168.159.130 |            503 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.073000 | 192.168.159.129 |             22 | 127.0.0.1\n\
    Sending REQUEST_RESPONSE message to /192.168.159.130 [MessagingService-Outgoing-/192.168.159.130-Small]\
    \ | 2017-08-14 10:40:44.086000 | 192.168.159.129 |          13202 | 127.0.0.1\n\
    RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
    \ | 2017-08-14 10:40:44.095000 | 192.168.159.129 |             18 | 127.0.0.1\n\
    REQUEST_RESPONSE message received from /192.168.159.129 [MessagingService-Incoming\n\
    ...                               Processing response from /192.168.159.129 [RequestResponseStage-5]\
    \ | 2017-08-14 10:40:44.557001 | 192.168.159.130 |         531160 | 127.0.0.1\n\
    Request complete | 2017-08-14 10:40:44.562582 | 192.168.159.130 |         536582\
    \ | 127.0.0.1\ncqlsh>\n```\n\n输出显示了 Cassandra 如何解析 CQL 语句并在发送请求消息之前准备它，接收节点然后响应该请求消息。最后，“Request\
    \ Complete”注释显示请求已被节点成功处理。\n\n## 调优布隆过滤器\n\n正如我在第 5 章中解释的，布隆过滤器是 Cassandra 的一种性能辅助工具。它们在索引扫描期间帮助数据库，让其知道某个\
    \ SSTable 是否包含特定分区的数据。当客户端请求数据时，布隆过滤器会在数据库执行磁盘 I/O 之前检查该行是否存在。\n\n配置布隆过滤器涉及在内存使用和快速找到数据的概率之间进行权衡，使用比不配置更少的\
    \ I/O。\n\n### 配置布隆过滤器\n\n您可以将表的 `bloom_filter_fp_chance` 属性设置为 0 到 1 之间的值。当您从\
    \ 0 到 1 时，您使用的内存更少。值为 0 表示您为布隆过滤器设置了最大值，并使用了最高内存量。将其设置为 1 表示您已禁用布隆过滤器。\n\n`bloom_filter_fp_chance`\
    \ 属性的默认值取决于当前使用的压实策略。以下是 Cassandra 的三种主要压实策略下此属性的值：\n\n*   对于 `LeveledCompactionStrategy`：0.1\n\
    *   对于 `SizeTieredCompactionStrategy`、`DataTieredCompactionStrategy` 和 `TimeWindowCompactionStrategy`：0.01。\n\
    \n`bloom_filter_fp_chance` 属性的推荐值是 0.1。更高的值不一定有帮助，因为提高值会产生收益递减。这是因为更高的值消耗更多内存，但产生不成比例的较小性能收益。您可以在创建表时设置该属性，也可以稍后设置。\n\
    \n### 重新生成布隆过滤器\n\n每当您更改表的 `bloom_filter_fp_chance` 属性的值时，必须重新生成布隆过滤器。您可以通过两种方式重新生成布隆过滤器：运行表的手动压实或升级\
    \ SSTable。\n\n要手动压实表，请运行 `nodetool compact` 命令。`nodetool compact` 命令的语法如下：\n\n\
    ```\nnodetool [options] compact [(-et | --end-token <value>)] [(-s | --split-output)]\
    \ [(-st | --start-token <value>)] [--] [<keyspace> <table>...]\n[--user-defined]\
    \ <SSTable>...\n```\n\n您必须通过从 `STCS`、`TWCS` 和 `LCS` 压实策略中选择来指定压实策略。默认情况下，该命令对数据库中的所有键空间和表运行主要压实，但您可以将压实限制为一个或多个表。\n\
    \n手动压实 SSTable 以重新生成布隆过滤器几乎从来都不是一个好的策略。当您更改表的 `bloom_filter_fp_chance` 属性的值时，您可以改为升级\
    \ SSTable。这是通过运行 `nodetool upgradetsstables` 命令来完成的。该命令的语法如下：\n\n```\n$ nodetool\
    \ upgradesstables [(-a | --include-all-sstables)] [--] [<keyspace> [<table>...]]\n\
    ```\n\n## 缓存数据\n\n为了优化 Cassandra 对缓存内存的使用，您可以配置表的 `caching` 属性。缓存有助于 Cassandra\
    \ 对节点进行热重启，数据库会定期将缓存存储到磁盘，并在您重启节点时将其读回缓存。没有缓存意味着节点需要更长的时间来重启。\n\n缓存对于非常繁忙的集群很有用。不建议对需求不高的数据进行缓存。因此，将频繁读取的数据分离到单独的表中以便可以缓存这些表中的数据是一个好主意。在处理包含极长分区的表时，缓存数据也不是一个好主意。\n\
    \n### 数据缓存的类型\n\n有两种主要类型的数据缓存：键缓存和行缓存。（此外，您还可以要求 Cassandra 缓存计数器，我将在后面解释。）\n\n\
    *   键缓存：键缓存也称为分区键缓存，缓存 SSTable 的分区索引。数据库需要更少的磁盘读取来从键缓存中获取数据，而不是从磁盘或操作系统页面缓存中获取数据。由于键缓存以更少的内存量提供了更高的缓存读取可能性，Cassandra\
    \ 默认启用它。\n*   行缓存：您可以要求 Cassandra 缓存分区中特定数量的行。您使用 `rows_per_partition` 表选项设置要缓存的行数。由于行缓存存储整行而不仅仅是键，当处理大型数据集时，它可能导致性能下降，因为数据库可能必须从磁盘读取数据，而内存可能不足以存储所有数据。请仔细配置行缓存，因为它有时可能损害性能而不是帮助性能。\n\
    \n关于在 Cassandra 数据库中使用缓存，您需要记住以下关键原则：\n\n*   您不希望为表同时设置两种类型的缓存。为表选择分区键缓存或行缓存之一。\n\
    *   行缓存比键缓存占用更多空间，因为它存储整行。因此，有选择地使用行缓存是一个好主意，仅将其用于缓存用户和客户端频繁访问的行。\n*   至于必须缓存哪些表，读取密集型表是缓存的良好目标。当表的读取量远远超过写入量时，缓存是您需要考虑的事情。\n\
    \n**注意**\n您的用户不常读取归档表，因此您可以禁用这些表的缓存。\n\n### Cassandra 在哪里存储缓存数据\n\nCassandra 将行和键缓存存储在您可以通过配置属性\
    \ `saved_caches_directory` 指定的目录中。`saved_caches_directory` 属性的默认位置确定如下：\n\n* \
    \  `/var/lib/cassandra/saved_caches`（用于包安装）\n*   `install_location/data/saved_caches`（用于压缩包安装）\n\
    \n### 配置缓存\n\n您可以设置两个决定缓存行为的属性：\n\n*   `keys`：此属性可以取值 `ALL` 或 `NONE`。值 `ALL` 表示所有主键或行。值\
    \ `NONE` 表示没有主键或行。默认值是 `ALL`。\n*   `rows_per_partition`：此属性帮助您设置数据库必须在分区中缓存的行数。此属性有三个值：`ALL`、`NONE`\
    \ 和 `N`。值 `ALL` 和 `NONE` 的含义与 `keys` 属性相同。值 `N` 指定每个分区的行数。默认值是 `NONE`。\n\n您在创建表时或之后设置表缓存属性以配置分区键缓存和行缓存。以下是\
    \ `caching` 表属性的语法：\n\n```\ncaching = {\n'keys' = 'ALL | NONE',\n'rows_per_partition'\
    \ = 'ALL' | 'NONE' | N\n}\n```\n\n默认情况下，Cassandra 用于缓存数据的设置如下：\n\n```\n{ 'keys'\
    \ : 'ALL', 'rows_per_partition' : 'NONE' }\n```\n\n以下是一些展示如何配置缓存属性的示例。第一个示例展示了如何为表配置缓存。您为\
    \ `keys` 属性指定了值 `NONE`，因此不缓存任何主键或行。数据库将为每个分区缓存 120 行。\n\n```\nCREATE TABLE test\
    \ (\nuserid text PRIMARY KEY,\nfirst_name text,\nlast_name text,\n)\nWITH caching\
    \ = { 'keys' : 'NONE', 'rows_per_partition' : '120' };\n```\n\n除了 SSTable，您还可以缓存物化视图。以下示例展示了如何在创建物化视图时指定缓存：\n\
    \n```\nCREATE MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age, name, country\n\
    FROM cycling.cyclist_mv\nWHERE age IS NOT NULL AND cid IS NOT NULL\nPRIMARY KEY\
    \ (age, cid)\nWITH caching = { 'keys' : 'ALL', 'rows_per_partition' : '100' }\n\
    ;\n```\n\n以下示例展示了如何运行 `ALTER TABLE` 语句来缓存每个年龄分区中的所有自行车手：\n\n```\nALTER MATERIALIZED\
    \ VIEW cycling.cyclist_by_age\nWITH caching = {\n'keys' : 'ALL',\n'rows_per_partition'\
    \ : 'ALL' } ;\n```\n\n### 全局缓存参数\n\n在上一节中，我解释了如何通过为表设置缓存属性来配置缓存。Cassandra 还提供了几个全局缓存属性，您可以在\
    \ `cassandra.yaml` 文件中进行配置。我将在以下部分解释这些全局缓存参数。\n\n#### 配置行缓存的大小\n\n配置行缓存时，必须设置每个分区的行数。没有固定规则规定\
    \ X% 的行是正确的缓存行数。相反，您应根据数据库中的工作负载模式来调整行缓存的大小。\n\n**注意**\n默认情况下，行缓存被禁用，键缓存被启用。\n\
    \n您可以通过在 `cassandra.yaml` 文件中为 `row_cache_size_in_mb` 属性设置值来在数据库级别配置行缓存的大小。此参数确定\
    \ Cassandra 可以分配用于存储表中最频繁读取的表分区行的最大内存量。默认情况下，数据库不缓存行，因此该参数的默认值为 0。\n\n行缓存可能比键缓存节省更多时间，但它需要更多空间，因为它缓存整行。因此，您必须仅对需求量大的行或不更改的行使用行缓存。`row_cache_size_in_mb`\
    \ 属性的值过低可能导致数据库在启动时无法加载一些热键。\n\n#### 配置键缓存的大小\n\n`key_cache_size_in_mb` 参数允许您设置数据库中所有表的键缓存的最大大小。此参数的值默认未设置，Cassandra\
    \ 将键缓存设置为堆大小的 5% 或 100MB，以较小者为准。您可以通过将 `key_cache_size_in_mb` 参数设置为 0 来禁用键缓存。\n\
    \n#### 配置缓存频率\n\n您可以配置数据库将行缓存和分区键缓存保存到磁盘的频率。\n\n*   `row_cache_save_period` 属性确定数据库在将行保存到由\
    \ `saved_caches_directory` 属性指定的目录之前，将行保留在缓存中的时间（以秒为单位）。默认情况下行缓存被禁用，这意味着 `row_cache_save_period`\
    \ 参数的默认值为 0。\n*   `key_cache_save_period` 参数确定数据库在将键保存到由 `saved_caches_directory`\
    \ 属性指定的目录之前，将键保留在缓存中的时间。默认值为 4 小时（14,400 秒）。\n\n#### 指定要保存的键数\n\n默认情况下，数据库保存行缓存中的所有键。您可以配置\
    \ `row_cache_keys_to_save` 参数来指定要保存的键数。此参数的默认值是禁用的，这意味着保存所有键。\n\n由于默认情况下数据库不启用行缓存，因此\
    \ `row_cache_class_name` 参数的默认值是禁用的。您可以指定以下两个值之一作为要使用的行缓存提供程序的类名：\n\n*   `OHCProvider`：完全堆外\n\
    *   `SerializingCacheProvider`：部分堆外\n\n`OHCProvider` 是较新的，基准测试显示它比旧的部分堆外行缓存提供程序提供大约\
    \ 15% 的更好性能。\n\n### 使用计数器缓存\n\n除了行和键缓存之外，Cassandra 还允许您配置计数器缓存。计数器缓存存储需求量大的计数器，从而减少对计数器单元的争用。当数据库在缓存中找到计数器（缓存命中）时，它需要持有计数器锁的时间更短，从而加快热计数器单元的更新。\n\
    \nCassandra 默认启用计数器缓存。计数器缓存的大小取决于您为 `counter_cache_size_in_mb` 参数配置的值。默认情况下此参数未设置，Cassandra\
    \ 使用两个值中较小的一个：堆的 2.5% 或 50MB。\n\n与行和键缓存一样，Cassandra 将计数器缓存（仅键）保存到由 `saved_caches_directory`\
    \ 参数指定的目录中的磁盘。默认情况下，此参数的值为 2 小时（7,200 秒）。\n\n管理计数器缓存的另一个配置属性是 `counter_cache_keys_to_save`\
    \ 参数。您配置此属性以告诉数据库必须保存计数器缓存中的多少个键。默认情况下此属性是禁用的，这意味着 Cassandra 保存所有键。\n\n如果您执行计数器删除并使用较低的\
    \ `gc_grace_seconds` 设置，则应禁用计数器缓存，您可以通过将 `counter_cache_size_in_mb` 参数的值设置为零来实现。\n\
    \n### 监控缓存\n\n`nodetool info` 命令可帮助您监控缓存性能，从而帮助您根据当前缓存行为调整行缓存和键缓存配置。这是一个例子：\n\n\
    ```\n$ nodetool info\nID                     : 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\n\
    Gossip active          : true\nThrift active          : false\nNative Transport\
    \ active: true\nLoad                   : 12.46 MiB\nGeneration No          : 1503673044\n\
    Uptime (seconds)       : 91\nHeap Memory (MB)       : 117.82 / 1492.00\nOff Heap\
    \ Memory (MB)   : 0.07\nData Center            : datacenter1\nRack           \
    \        : rack1\nExceptions             : 0\nKey Cache              : entries\
    \ 47, size 3.94 KiB, capacity 74 MiB, 69 hits, 120 requests, 0.575 recent hit\
    \ rate, 14400 save period in seconds\nRow Cache              : entries 0, size\
    \ 0 bytes, capacity 0 bytes, 0 hits, 0 requests, NaN recent hit rate, 0 save period\
    \ in seconds\nCounter Cache          : entries 0, size 0 bytes, capacity 37 MiB,\
    \ 0 hits, 0 requests, NaN recent hit rate, 7200 save period in seconds\nChunk\
    \ Cache            : entries 30, size 1.88 MiB, capacity 341 MiB, 44 misses, 182\
    \ requests, 0.758 recent hit rate, 1072.447 microseconds miss latency\nPercent\
    \ Repaired       : 100.0%\nToken                  : (invoke with -T/--tokens to\
    \ see\n$\n```\n\n`nodetool info` 命令显示所有三种 Cassandra 缓存（行、键和计数器）的以下缓存相关信息：\n\n\
    *   缓存中的条目数\n*   缓存的大小（字节）\n*   缓存的容量\n*   对缓存数据的请求数\n*   缓存命中数\n*   缓存命中率（比率）\n\
    *   保存周期（秒）\n\n### 追踪数据库操作以优化缓存\n\n您可以追踪数据库读取，以检查读取操作是从缓存获取数据还是直接从存储在磁盘上的 SSTable\
    \ 获取数据。当您追踪引用缓存表的查询时，最初追踪显示发生了行缓存未命中。当您重新运行查询时，追踪会显示“`row cache hit`”行，如下所示：\n\
    \n```\nrow cache miss [ReadStage:23]\nrow cache hit [ReadStage:35]\n```\n\n行缓存未命中意味着数据库已从磁盘读取数据。另一方面，行缓存命中意味着数据库已在缓存中找到数据，省去了从磁盘读取数据的麻烦。请记住，缓存读取总是比从磁盘读取快很多倍。\n\
    \n您看到“`cache miss`”的原因是数据库缓存数据需要一些时间，尤其是当表很大时。一旦数据库将数据放入缓存，后续查询将使用缓存数据，而不是访问磁盘，这意味着查询将非常快地返回结果。因此，您将在追踪中看到“`cache\
    \ hit`”消息。\n\n一旦数据进入缓存，它就会保留在那里，数据库会将其用于所有引用该数据的查询。但是，如果您更新数据，它会使缓存失效。在以下条件下，Cassandra\
    \ 会忽略缓存数据：\n\n*   如果查询需要来自缓存和磁盘的数据（即，缓存+未缓存的数据）。\n*   当查询请求大量数据时，这会导致超过全局缓存大小限制。\n\
    *   查询请求的数据不在分区的开头。\n\n如果发生这些情况中的任何一种，您将在尝试使用缓存数据的查询的追踪中看到以下行：\n\n```\nIgnoring\
    \ row cache as cached value could not satisfy query [ReadStage:89]\n```\n\n在所有这些情况下，缓存不足以处理查询，迫使\
    \ Cassandra 执行昂贵的（高资源成本）磁盘读取，而不是使用更高效的缓存读取。当您注意到数据库正在忽略行缓存时，根据原因，您可以执行以下操作之一以使数据库使用缓存数据：\n\
    \n*   增加缓存大小。\n*   创建一个新表并将频繁访问的行放在分区的开头。\n*   限制查询的输出大小（使用 `SELECT` 语句中的 `LIMIT\
    \ N` 选项），以防止检索到的行超过配置的缓存大小。\n\n## 使用 `cassandra-stress` 进行压力测试\n\nCassandra 提供\
    \ `cassandra-stress` 实用程序来对集群进行基准测试和负载测试。该工具在测试数据库关键配置方面的更改（例如选择不同的压实策略）时也很有用。您可以测试读取、写入和混合工作负载。\n\
    \n`cassandra-stress` 可用于优化数据模型、测试数据库的扩展能力以及确定生产容量。\n\n### 运行 `cassandra-stress`\n\
    \n您可以在 `$CASSANDRA_HOME/tools/bin` 目录中找到 `cassandra-stress` 工具。\n\n发出命令 `cassandra-stress`\
    \ 以快速了解该工具的功能，如下所示：\n\n```\n$CASSANDRA_HOME/tools/bin$ cassandra-stress\nNo command\
    \ specified\nUsage:      cassandra-stress  [options]\nHelp usage: cassandra-stress\
    \ help <command>\n---Commands---\nread                 : Multiple concurrent reads\
    \ - the cluster must first be populated by a write test\nwrite               \
    \ : Multiple concurrent writes against the cluster\nmixed                : Interleaving\
    \ of any basic commands, with configurable ratio and distribution - the cluster\
    \ must first be populated by a write test\ncounter_write        : Multiple concurrent\
    \ updates of counters.\ncounter_read         : Multiple concurrent reads of counters.\
    \ The cluster must first be populated by a counterwrite test.\nuser          \
    \       : Interleaving of user provided queries, with configurable ratio and distribution\n\
    help                 : Print help for a command or option\nprint             \
    \   : Inspect the output of a distribution definition\nlegacy               :\
    \ Legacy support mode\nversion              : Print the version of cassandra stress\n\
    ---Options---\n-pop                  : Population distribution and intra-partition\
    \ visit order\n-insert              : Insert specific options relating to various\
    \ methods for batching and splitting partition updates\n-col                 \
    \ : Column details such as size and count distribution, data generator, names,\
    \ comparator and if super columns should be used\n-rate                 : Thread\
    \ count, rate limit or automatic mode (default is auto)\n-mode               \
    \  : Thrift or CQL with options\n-errors               : How to handle errors\
    \ when encountered during stress\n-schema               : Replication settings,\
    \ compression, compaction, etc.\n-node                 : Nodes to connect to\n\
    -log                  : Where to log progress to, and the interval at which to\
    \ do it\n-transport            : Custom transport factories\n-port           \
    \      : The port to connect to cassandra nodes on\n-sendto               : Specify\
    \ a stress server to send this command to\n-graph                : Graph recorded\
    \ metrics\n-tokenrange           : Token range settings\n$CASSANDRA_HOME/tools//bin$\n\
    ```\n\n从高层次来看，以下是您必须了解的关键选项：\n\n*   `read`：多次并发读取（您必须首先运行写入测试以用数据填充测试表）\n*   `write`：多次并发写入\n\
    *   `counter_write`：多次并发计数器更新\n*   `counter_read`：多次并发计数器读取（您必须首先使用 `counter_write`\
    \ 测试填充测试表）\n\n### `cassandra-stress` 示例\n\n当您第一次运行 `cassandra-stress` 工具时，它会创建一个名为\
    \ `keyspace1` 的键空间，并在该键空间中创建一个名为 `standard1` 或 `counter1` 的表，具体取决于您运行的测试类型。Cassandra\
    \ 会在所有后续运行中重用它创建的键空间和表。\n\n#### 运行写入测试\n\n以下示例展示了如何运行写入测试（请记住，在运行读取测试之前，必须先运行写入测试）：\n\
    \n```\n$ cassandra-stress write n=100000 cl=one\n******************** Stress Settings\
    \ ********************\nCommand:\nType: write\nCount: 100,000\nConsistency Level:\
    \ ONE\n...\nInsert:\nRevisits: Uniform:  min=1,max=1000000\nVisits: Fixed:  key=1\n\
    Columns:\nMax Columns Per Key: 5\nColumn Names: [C0, C1, C2, C3, C4]\nComparator:\
    \ AsciiType\nTimestamp: null\nVariable Column Count: false\nSlice: false\nSize\
    \ Distribution: Fixed:  key=34\nCount Distribution: Fixed:  key=5\nErrors:\nIgnore:\
    \ false\nTries: 10\n...\nSchema:\nKeyspace: keyspace1\nReplication Strategy: org.apache.cassandra.locator.SimpleStrategy\n\
    Replication Strategy Options: {replication_factor=1}\nTable Compression: null\n\
    Table Compaction Strategy: null\nTable Compaction Strategy Options: {}\n...\n\
    Connected to cluster: Test Cluster, max pending requests per connection 128, max\
    \ connections per host 8\nDatatacenter: datacenter1; Host: localhost/127.0.0.1;\
    \ Rack: rack1\nCreated keyspaces. Sleeping 1s for propagation.\nRunning WRITE\
    \ with 200 threads for 100000 iteration\ntype       total ops,    op/s,    pk/s,\
    \   row/s,    mean,     med,     .95,     .99,    .999,     max,   time,   stderr,\
    \ errors,  gc: #,  max ms,  sum ms,  sdv ms,      mb\n...\nResults:\nOp rate \
    \                  :    3,011 op/s  [WRITE: 3,011 op/s]\nPartition rate      \
    \      :    3,011 pk/s  [WRITE: 3,011 pk/s]\nRow rate                  :    3,011\
    \ row/s [WRITE: 3,011 row/s]\nLatency mean              :   64.9 ms [WRITE: 64.9\
    \ ms]\nLatency median            :   39.1 ms [WRITE: 39.1 ms]\nLatency 95th percentile\
    \   :  190.2 ms [WRITE: 190.2 ms]\nLatency 99th percentile   :  537.4 ms [WRITE:\
    \ 537.4 ms]\nLatency 99.9th percentile : 1155.5 ms [WRITE: 1,155.5 ms]\nLatency\
    \ max               : 1632.6 ms [WRITE: 1,632.6 ms]\nTotal partitions        \
    \  :    100,000 [WRITE: 100,000]\nTotal errors              :          0 [WRITE:\
    \ 0]\n...\nTotal operation time      : 00:00:33\nEND\n$\n```\n\n在此命令中，您指定 `write`\
    \ 选项表示您希望将行插入 `cassandra-stress` 为压力测试创建的表中。`cassandra-stress` 插入一百万行 (`n=10000000`)。选项\
    \ `cl` 将一致性级别设置为 `ONE`。默认一致性级别是 `LOCAL_ONE`，您可以设置任何其他标准 Cassandra 一致性级别。\n\n前面的示例未使用身份验证。要在运行\
    \ `cassandra-stress` 工具时使用身份验证，请指定 `-mode` 命令（使用 `native` 选项）以指定用户名和密码，如本例所示：\n\
    \n```\n$ cassandra-stress -mode native cql3 -user cassandra -password cassandra\
    \ cl=QUORUM\n```\n\n您使用 `cassandra-stress` 工具的 `write` 选项插入的数据默认永远不会被截断。您可以通过运行带有\
    \ `-truncate` 选项的 `cassandra-stress` 命令来截断 `cassandra-stress` 工具创建的表：\n\n```\n\
    $ cassandra-stress write n=100000000 cl=QUORUM -truncate always -schema keyspace=keyspace1\
    \ -rate threads=200 -log file=write_$NOW.log\n```\n\n如果您指定了 `mode` 命令，请确保在 `mode`\
    \ 选项之前指定 `truncate` 选项，否则 `cassandra-stress` 工具将忽略 `truncate` 选项。\n\n#### 运行读取测试\n\
    \n一旦您填充了 `cassandra-stress` 工具创建的数据库表（如写入测试示例所示），您就拥有了该工具可以读取的数据。现在您可以运行读取测试，如下所示：\n\
    \n```\n$ cassandra-stress read n=10000000 -rate threads=50 duration=5\n```\n\n\
    在此示例中，选项代表以下含义：\n\n*   `read`：对您之前填充的数据执行多次并发读取。子选项 `n=10000000` 指定要读取的行数。\n*\
    \   `rate`：帮助您指定线程数、速率限制或自动模式（默认）。在本例中，您通过指定 `threads=50` 为压力测试指定子选项线程数。\n*  \
    \ `duration`：指定测试必须读取行的特定分钟数（本例中为 5）。\n\n#### 运行混合工作负载\n\n`cassandra-stress` 命令选项\
    \ `mixed` 可帮助您运行具有配置比率和分布的命令。在运行此命令之前，您必须使用写入测试填充集群。\n\n以下示例展示了如何运行混合工作负载：\n\n\
    ```\n$ cassandra-stress mixed ratio\\(write=1,read=3\\) n=100000 cl=ONE -pop dist=UNIFORM\\\
    (1..1000000\\) -schema keyspace=\"keyspace1\" -mode native cql3 -rate threads\\\
    >=16 threads\\<=256 -log file=~/mixed_autorate_50r50w_1M.log\n```\n\n注意以下几点：\n\
    \n*   `ratio` 选项设置写入与读取的比率。\n*   `-pop` 命令选项设置种群分布和分区内访问顺序。在本例中，您指定 `pop dist=UNIFORM\\\
    (1..1000000\\)`，这意味着在 100,000 次操作 (`n=100000`) 中，测试必须在 1 到 1,000,000 之间均匀选择键。当您指定的每个节点的数据量超过该节点\
    \ RAM 可容纳的量时，请指定 `-pop` 选项。\n\n### 设置复制、压实和压缩选项\n\n运行 `-schema` 命令选项以查看您可以为复制、压实和压缩设置的选项。它还允许您指定用于压力测试的键空间。\n\
    \n```\n$ cassandra-stress help -schema\nUsage: -schema [replication(?)] [keyspace=?]\
    \ [compaction(?)] [compression=?]\nreplication([strategy=?][factor=?][=?]): Define\
    \ the replication strategy and any parameters\nstrategy=? (default=org.apache.cassandra.locator.SimpleStrategy)\
    \ The replication strategy to use\nfactor=? (default=1)                 The number\
    \ of replicas\nkeyspace=? (default=keyspace1)           The keyspace name to use\n\
    compaction([strategy=?][=?]): Define the compaction strategy and any parameters\n\
    strategy=?                            The compaction strategy to use\ncompression=?\
    \                            Specify the compression to use for sstable, default:no\
    \ compression\n$\n```\n\n以下示例展示了如何为名为 `cass1` 的节点将复制策略更改为 `NetworkTopologyStrategy`：\n\
    \n```\n$ cassandra-stress write n=500000 no-warmup -node cass1 -schema \"replication(strategy=NetworkTopologyStrategy,\
    \ cass1=2)\"\n```\n\n### 在多个节点上运行压力测试\n\n所有前面的示例都在单个节点上运行。有时单个节点无法处理压力测试的工作负载。您可以使用\
    \ `-node` 命令选项指定 `NODES` 变量。您使用逗号分隔的 IP 地址列表指定节点。\n\n以下示例展示了如何在两个名为 `cass1` 和\
    \ `cass2` 的节点上运行压力测试：\n\n```\n$ cassandra-stress write n=1000000 cl=one -mode\
    \ native cql3 -schema keyspace=\"keyspace1\" -pop seq=1..1000000 -log file=~/node1_load.log\
    \ -node $NODES\n```\n\n### 使用基于 YAML 的配置文件运行 `cassandra-stress`\n\n您可以在运行 `cassandra-stress`\
    \ 工具时使用基于 YAML 的配置文件。该配置文件帮助您定义数据库将在压力测试期间使用的各种压实策略和缓存设置。您可以在以下位置找到 Cassandra\
    \ 提供的示例 YAML 文件：\n\n*   `/usr/share/docs/cassandra/examples`（包安装）\n*   `$CASSANDRA_HOME/tools/`（压缩包安装）\n\
    \nCassandra 提供的 YAML 文件（例如 `cqlstress-example.yaml` 文件）包含在单独部分下进行的各种压力测试配置。这些配置属性包括键空间和表定义，以及查询定义。您可以在\
    \ `extra-definitions` 部分下添加二级索引和物化视图。您可以修改示例配置文件或创建自己的配置文件。\n\n您可以在运行 `cassandra-stress`\
    \ 命令时将 YAML 文件指定为 `profile` 选项的值。`profile` 选项指向您使用的 YAML 文件的位置。\n\n以下示例展示了如何借助\
    \ `cqlstress-example.yaml` 文件运行压力测试：\n\n```\n$ cassandra-stress user profile=$CASSANDRA_HOME/tools/cqlstress-example.yaml\
    \ n=1000000 ops\\(insert=3,read1=1\\) no-warmup cl=QUORUM\n```\n\n您可以指定 `-graph`\
    \ 选项为运行的压力测试创建图表。测试完成后，您可以通过 Web 浏览器查看图表。这是一个例子：\n\n```\n$ cassandra-stress user\
    \ profile=tools/cqlstress-example.yaml ops\\(insert=1\\) -graph file=test.html\
    \ title=test revision=test1\n```\n\n您可以通过在 Web 浏览器中查看文件 `test1.html` 来查看压力测试的图表。您必须为捕获压力测试输出的\
    \ HTML 文件提供名称，以便通过浏览器查看。`title` 和 `revision` 选项不是必需的，但如果您使用相同数据运行多个压力测试，则必须使用\
    \ `revision` 参数。\n\n图 11-2 显示了使用前面的 `cassandra-stress` 命令进行压力测试的图表。\n\n![压力测试图表](img/A436674_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-2\n\n使用 `-graph` 选项生成的 `cassandra-stress` 工具压力测试图表\n\n## 配置压实策略\n\n压实数据有助于合并\
    \ SSTable、合并键、组合列和清除墓碑。\n\n正如您在第 6 章中学到的，Cassandra 的 SSTable 是不可变的，这意味着数据库永远不会覆盖数据。相反，它将插入或更新的新数据版本写入新的\
    \ SSTable 中。从来没有数据的原地修订（这需要随机 I/O）。相反，数据库只是将数据的最新版本（更新或插入）写入新的 SSTable。这是 Cassandra\
    \ 高性能的一个关键因素。\n\n**注意**\n数据库将对数据的所有更新转换为顺序写入磁盘的新 SSTable。\n\n随着数据库随时间更新数据，它最终可能会有同一行的多个版本，每个版本位于不同的\
    \ SSTable 中。唯一的时间戳区分这些版本。\n\n随着时间的推移，Cassandra 需要访问众多 SSTable 才能检索完整的行，因为没有单个\
    \ SSTable 可能存储该行中所有列的最最新版本。为了提高性能，Cassandra 通过合并表并清除旧的、过时的数据版本来对 SSTable 执行定期压实。压实可以防止读取速度随着用户随时间更新数据而下降。\n\
    \n在压实过程中，Cassandra 执行以下操作：\n\n*   合并 SSTable\n*   清除所有墓碑\n*   合并键\n*   组合列\n*\
    \   在新 SSTable 中创建新索引（不是二级索引）\n\n压实过程创建一个包含该行所有列最新版本的完整行。数据库将每行的最新版本写入新的 SSTable，并在满足所有待处理请求后从旧的\
    \ SSTable 中删除旧版本。以下是压实过程的实际后果：\n\n*   由于新压实的 SSTable，读取性能得到改善\n*   由于数据库需要暂时维护新旧\
    \ SSTable，磁盘 I/O 和空间使用暂时上升\n\n您可以使用 `nodetool compact` 命令手动压实表。更好的做法是通过 `CREATE\
    \ TABLE` 或 `ALTER TABLE` 命令为表设置压实策略。\n\n### 压实策略\n\n压实策略决定了 Cassandra 如何选择 SSTable\
    \ 进行压实，以及它如何在压实期间创建的用于保存最新数据的新 SSTable 中存储压实的行。您可以从以下三种压实策略中选择：\n\n*   `SizeTieredCompactionStrategy`\
    \ (STCS)\n*   `LeveledCompactionStrategy` (LCS)\n*   `TimeWindowCompactionStrategy`\
    \ (TWCS)\n\n**注意**\n还有一种 `DataTieredCompactionStrategy` (DTCS)，它是时间序列数据的替代策略，但在\
    \ Cassandra 3.0 及更高版本中已弃用。\n\nTWCS 是压实时间序列数据的最佳策略。对于非时间序列数据，您需要选择 STCS 或 LCS。以下各节解释了您可以选择的三种压实策略。\n\
    \n#### SizeTieredCompactionStrategy\n\n在 STCS 下，SSTable 的大小是表压实的触发因素。SSTable 的大小充当表压实的触发因素。STCS\
    \ 将 SSTable 分组到唯一的桶中。当存在预定数量的相同大小的表时，数据库会压实 SSTable。Cassandra 将每个 SSTable 的大小与节点上\
    \ SSTable 大小的平均值进行比较。\n\n默认情况下，STCS 的压实配置属性 `enabled` 为 `true`，这意味着数据库执行后台压实。SSTable\
    \ 配置属性 `min_threshold` 设置将触发压实的 SSTable 的最小数量。一旦表达到 `min_threshold` 值，它就有资格进行压实。默认情况下，当存在四个相似大小的表时（默认为\
    \ 160MB），数据库执行压实操作。Cassandra 将相同大小的表合并为一个更大的 SSTable。随着数据库获得几个更大的 SSTable，它会将一组\
    \ SSTable 合并为更大的 SSTable。\n\n**注意**\nSTCS 是默认的压实策略。\n\n以下是一个示例，展示了如何将表的压实属性更改为\
    \ `SizeTieredCompactionStrategy`：\n\n```\ncqlsh> ALTER TABLE users\nWITH compaction\
    \ = { 'class' : 'SizeTieredCompactionStrategy', 'min_threshold' : 6 }\n```\n\n\
    `min_threshold` 表属性使您能够设置数据库执行次要压实之前所需的 SSTable 最小数量。在此示例中，`min_threshold` 属性指定数据库在触发压实之前应查找至少六个相同大小的\
    \ SSTable。\n\n**注意**\n次要压实涉及键空间中的特定表。\n\n##### 配置 STCS\n\n除了 `enabled` 和 `min_threshold`\
    \ 属性外，您还可以为 STCS 配置以下属性：\n\n*   `bucket_high` 和 `bucket_low`：这对属性提供了尺寸公式，帮助数据库确定要考虑压实的表的大小。数据库合并大小落在以下范围内的\
    \ SSTable：\n    ```\n    [average table size X bucket_low] and [average table\
    \ size X bucket_high]\n    ```\n    `bucket_high` 属性的默认值为 1.5，`bucket_low` 属性的默认值为\
    \ 0.5。\n*   `log_all`：使您能够为集群设置高级日志记录，其默认值为 `false`。\n*   `min_threshold` 和 `max_threshold`：这组属性确定次要压实中\
    \ SSTable 的最小（默认值为 4）和最大（默认值为 32）数量。\n*   `min_sstable_size`：默认情况下，数据库通过将大小相差不到\
    \ 50% 的 SSTable 分组到每个桶中。在 SSTable 较小的情况下，您可以设置 `min_sstable_size` 属性以定义分配给桶的 SSTable\
    \ 的大小阈值（以字节为单位）。此参数的默认值为 50MB。\n*   与墓碑相关的压实属性：有几个与墓碑相关的压实属性。\n    *   `only_purge_repaired_tombstones`：此参数的默认值为\
    \ `false`，这意味着数据库将允许从所有 SSTable（已修复和未修复）清除墓碑。通过将此属性设置为值 `true`，您要求数据库仅从已修复的 SSTable\
    \ 清除墓碑。\n    *   `tombstone_threshold`：设置数据库可以垃圾回收的墓碑与所有包含列相比的比率。此参数的默认值为 0.2。一旦\
    \ SSTable 超过此比率（20%），它就有资格进行墓碑压实。一旦数据库可以垃圾回收的墓碑数量超过 20%，Cassandra 将仅压实该表以清除墓碑。\n\
    \    *   `tombstone_compaction_interval`：在创建 SSTable 之后，数据库认为该表有资格进行墓碑压实的时间长度。默认值为\
    \ 86,400 秒（1 天）。\n    *   `unchecked_tombstone_compaction`：默认情况下，此属性设置为 `false`，这意味着\
    \ Cassandra 在运行压实操作之前会检查表是否有资格进行墓碑压实。通过将属性设置为 `true`，您允许 Cassandra 在不进行预先检查的情况下压实墓碑。\n\
    \n##### 何时使用（或不使用）STCS\n\nSTCS 是写入密集型工作负载的理想选择。由于合并过程不按行分组数据，因此行的版本可能分布在多个表中，这会减慢读取速度。\n\
    \n但是，STCS 不能快速清除过时和删除的数据，因为压实触发器是 SSTable 的大小，其增长可能太慢，从而将旧数据保留在原地。随着时间的推移，随着 SSTable\
    \ 变大，由于数据库在压实期间需要存储新旧 SSTable，因此数据库将需要更多存储空间。\n\n尽管 LCS 将相关数据保留在少量表中，如果您的数据没有太多修改或插入，STCS\
    \ 也可以为您提供相同类型的数据集，而不会产生使用 LCS 时产生的写入开销。\n\nSTCS 在处理批处理读写操作时比 LCS 更高效。然而，在负面方面，它比\
    \ LCS 需要更多的磁盘空间。\n\n#### LeveledCompactionStrategy\n\nLCS 将 SSTable 分组到各个级别，其中每个级别（L1、L2、L3…）比前一个级别大\
    \ 10 倍。数据库将每个级别的 SSTable 压实到更大的级别中。首先，数据库将 memtable 中的数据刷新到最低级别 (L0) 的 SSTable\
    \ 中。数据库不会压实 L0 级别的表；它将这些最小尺寸的 SSTable 与下一级别 (L1) 的更大 SSTable 合并。\n\n数据库将 L2、L3\
    \ 等级别的 SSTable 压实到至少与您为 LCS 属性 `sstable_size_in_mb` 设置的值（默认为 160MB）一样大的 SSTable。\n\
    \nLCS 提高了读取性能，因为 Cassandra 可以确定它应该检查每个级别的哪些 SSTable 以查找行键数据。\n\n##### 配置 LCS\n\
    \n您可以为 LCS 设置以下所有属性，所有这些属性的含义与我在上一节中为 STCS 描述的相同。\n\n*   `enabled`\n*   `log_all`\n\
    *   `tombstone_compaction_interval`\n*   `tombstone_threshold`\n*   `unchecked_tombstone_compaction`\n\
    \n除了这些属性之外，您还可以配置 `sstable_size_in_mb` 属性，该属性是 LCS 独有的。`sstable_size_in_mb` 属性指定使用\
    \ LCS 压实时表的目标大小。数据库将尝试使 SSTable 大小（压实后）与您为 `sstable_size_in_mb` 参数指定的值相同或更小。但是，如果分区非常大，压实将导致\
    \ SSTable 大于您使用 `sstable_size_in_mb` 参数指定的值。如前所述，`sstable_size_in_mb` 属性的默认值为\
    \ 160MB。\n\n以下是一个示例，展示了如何更新表以将数据库压实策略设置为 `LeveledCompactionStrategy`：\n\n```\n\
    cqlsh> ALTER TABLE users WITH compaction = { 'class' : 'LeveledCompactionStrategy'\
    \ };\n```\n\n##### 何时使用（或不使用）LCS\n\nLCS 涉及在读取和写入性能之间进行权衡。LCS 适用于读取密集型工作负载（尤其是涉及随机读取的工作负载），因为它使数据库能够在\
    \ 90% 的情况下仅从一个 SSTable 检索查询所需的数据。其他情况下，它只需要读取两个 SSTable。\n\nLCS 在数据碎片化严重时是理想的选择。LCS\
    \ 比 STCS 更频繁地清除过时数据，这意味着删除的数据占用 SSTable 的部分更小。然而，更频繁的压实操作意味着有更多的 I/O 压力。因此，由于较高\
    \ I/O 操作量导致的性能下降，LCS 通常不是写入密集型工作负载的有前途的想法。LCS 的写入惩罚意味着大量的写入可能会压倒压实操作。\n\nLCS 比\
    \ STCS 需要更少的空间。\n\n如果对您来说保持高读取率至关重要，您可以使用 LCS。为了克服由此产生的写入端性能下降，您可以向集群中添加更多节点。\n\
    \n#### TimeWindowCompactionStrategy\n\nTWCS 是时间序列数据和过期 TTL 工作负载的推荐压实策略。TWCS 根据一系列时间窗口压实\
    \ SSTable。数据库创建连续的时间窗口，并在每个活动（最新）时间窗口期间，使用 STCS 压实将所有未压实的 SSTable 压实为更大的 SSTable。\n\
    \n在时间窗口结束时，数据库将落在该时间窗口中的所有 SSTable 压实（主要压实，因为涉及多个键空间的 SSTable）为单个 SSTable，使用 SSTable\
    \ 最大时间戳作为标准。数据库对在后续时间窗口期间写入的所有 SSTable 重复相同的压实过程。\n\n##### 配置 TWCS\n\n您可以设置以下压实属性来配置\
    \ TWCS：\n\n*   `compaction_window_unit`：此属性使您能够定义用于定义桶大小的时间单位。默认时间单位是毫秒，如果您愿意，可以设置值为秒或小时。这是一个例子：\n\
    \    ```\n    compaction_window_unit = 'minutes', compaction_window_size = 120\n\
    \    ```\n*   `compaction_window_size`：每个时间窗口的单元数（1、2、3…）。\n*   `log_all`：通过设置值\
    \ `true`，使您能够为整个集群激活高级日志记录。默认值为 `false`。\n\n##### 何时使用 TWCS\n\nTWCS 是存储在具有默认 TTL（生存时间）的表中的时间序列数据的理想选择。如果您需要以非顺序方式查询时间序列数据，则此压实策略不合适。\n\
    \n### 启用和禁用压实\n\n默认情况下，Cassandra 启用后台压实。您可以通过 `ALTER TABLE` 语句将 `enabled` 属性设置为\
    \ `false` 来禁用后台压实，如下所示：\n\n```\ncqlsh> ALTER TABLE mytable WITH COMPACTION = {\
    \ 'class': 'SizeTieredCompactionStrategy', 'enabled': 'false' }\n```\n\n关于压实的最佳实践是使用默认设置\
    \ `enabled`（`true`）并让数据库压实数据。\n\n### 配置全局压实属性\n\n您可以配置以下三个全局压实参数：\n\n*   `snapshot_before_compaction`\n\
    *   `concurrent_compactors`\n*   `compaction_throughput_mb_per_sec`\n\n我将在以下部分解释这些属性。\n\
    \n#### `snapshot_before_compaction` 属性\n\n`snapshot_before_compaction` 属性决定数据库在执行压实操作之前是否对数据进行快照。与所有\
    \ Cassandra 快照一样，您负责删除较旧的快照，这样它们就不会占用太多空间。\n\n默认情况下，`snapshot_before_compaction`\
    \ 属性设置为 `false`。\n\n#### `concurrent_compactors` 属性\n\n在长时间运行的压实期间，可能会积累大量小 SSTable，这将不利地影响读取性能。为避免读取性能下降，您可以配置\
    \ `concurrent_compactors` 参数以设置任何时候可以运行的并发压实进程数。此数字不包括用于反熵修复的任何验证压实。\n\n默认情况下，`concurrent_compactors`\
    \ 属性设置为磁盘数或核心数中较小的一个，最小为 2，每个 CPU 核心最大为 8。\n\n由于同时执行压实会增加磁盘空间的使用，请确保在提高 `concurrent_compactors`\
    \ 参数值之前有足够的可用磁盘空间。\n\n**注意**\n在调整 `concurrent_compactors` 属性之前，请通过配置 `compaction_throughput_mb_per_sec`\
    \ 属性来限制压实速度。\n\n#### `sstable_preemptive_open_interval_in_mb` 属性\n\n数据库可以在完成对\
    \ SSTable 的写入之前抢先打开正在压实的 SSTable。目标是通过最小化数据进出缓存的移动，并将热行保留在原地，从而在压实前后的 SSTable\
    \ 版本之间平稳传输读取。默认值为 50MB。\n\n### 限制压实速度\n\n有时您可能意识到压实运行得太快（或太慢）。您可以配置 `compaction_throughput_mb_per_sec`\
    \ 属性以将压实限制为特定速率（以 MB 为单位）每秒。此压实属性控制数据库插入数据的速度。数据插入速率越快，数据库必须执行压实以保持 SSTable 计数较低的速度就越快。\n\
    \n`compaction_throughput_mb_per_sec` 参数的默认值为 16，意味着压实速率是写入吞吐量的 16 倍，以 MB/秒为单位。\n\
    \n您可以通过将 `compaction_throughput_mb_per_sec` 属性设置为 0 来禁用压实限制。推荐值为 16-32。压实速度在所有压实器之间分配。如果您有八个并发压实器，压实吞吐量为\
    \ 16，则每个压实器只能获得 2MB/s。在旋转磁盘上，建议将并发压实器数量设置得非常低（例如 2）；在 SSD 上，您可以将压实器数量提高到磁盘可以跟上的水平。\n\
    \n**注意**\n您可以通过配置 `compaction_large_partition_warning_threshold_mb` 属性，让数据库在压实大于您设置的值的分区时发出警告。此参数的默认值为\
    \ 100。\n\n### 设置压实策略\n\n您在表级别设置压实策略。您可以在创建表时或通过更改表来设置压实属性。您在 `CREATE TABLE` 或\
    \ `ALTER TABLE` 语句中使用 `compaction` 选项指定压实 `class`，如下所示：\n\n```\ncompaction = {\n\
    'class' : 'compaction_strategy_name'\n[, 'subproperty_name' : 'value',...]\n}\n\
    ```\n\n尽管您可以禁用压实，但这从来不是一个好主意，因为它可能导致僵尸的传播。僵尸，如果您从第 5 章回忆起，是已删除但仍然存在的记录。有时，墓碑记录可能已从集群的其他节点中删除，但一个无响应的节点除外，该节点由于宕机而不会立即接收墓碑。如果数据库在无响应节点恢复之前从集群的其余部分删除了墓碑记录，Cassandra\
    \ 会将该节点上的（本应被删除的）记录视为新数据并将其发送到其他节点。\n\n如前所述，为无响应节点提供恢复的宽限期有助于防止僵尸记录重新出现。表属性 `gc_grace_seconds`\
    \ 设置墓碑的宽限期，其默认值为十天（864,000 秒）。一旦墓碑的宽限期结束，数据库会在压实过程中删除墓碑。\n\n### 获取和设置压实阈值\n\n\
    运行 `nodetool getcompactionthreshold` 命令以查找表的最小和最大压实阈值。运行此命令时必须指定键空间和表名。\n\n```\n\
    $ sudo nodetool getcompactionthreshold cycling cyclist_name\nCurrent compaction\
    \ thresholds for cycling/cyclist_name:\nmin = 4,  max = 32\n$\n```\n\n**注意**\n\
    主要压实涉及键空间中的所有表。次要压实仅涉及键空间中的部分表。\n\n您可以使用 nodetool 的 `setcompactionthreshold` 命令设置压实阈值，该命令使您能够为表设置最小/最大压实阈值。术语“阈值”指的是数据库在调度次要压实之前应存在的相似大小的\
    \ SSTable 的数量。\n\n`setcompactionthreshold` 命令具有以下选项：\n\n*   `keyspace`：键空间名称\n\
    *   `table`：表名称\n*   `minthreshold`：触发次要压实的 SSTable 最小数量（使用 STCS 或 DTCS 时）\n*\
    \   `maxthreshold`：次要压实中的 SSTable 最大数量（使用 STCS 或 DTCS 时）\n\n以下示例展示了如何设置表的压实阈值：\n\
    \n```\n$ nodetool setcompactionthreshold cycling cyclists 4 16\n```\n\n在此示例中，`cycling`\
    \ 指的是键空间，`cyclists` 是表。\n\n如前所述，STCS 和 DTCS 都允许您配置次要压实期间应压实的 SSTable 的最小和最大数量，通过配置\
    \ `min_threshold` 和 `max_threshold` 属性。\n\n### 记录压实活动\n\n您可以通过在创建或更改表时将 `log_all`\
    \ 子属性设置为 `true` 来设置数据库的扩展压实活动日志记录。`log_all` 子属性位于 `compaction` 属性下。表的 `log_all`\
    \ 属性为整个集群激活高级日志记录。虽然您在表级别执行此操作，但一旦为单个表配置了扩展日志记录，数据库会自动收集有关集群中所有节点上所有表压实的详细信息。\n\
    \n设置扩展压实活动日志记录后，数据库会创建一个名为 `compaction-%d` 的额外压实相关文件，位于 `$CASSANDRA_HOME/logs`\
    \ 目录下，其中 `%d` 充当序列号。\n\n设置扩展压实日志记录后，数据库会收集有关以下压实事件的信息：\n\n*   `enable`：列出数据库已刷新的所有\
    \ SSTable。\n    ```\n    {\"type\":\"enable\",\"keyspace\":\"es\": ... }\n   \
    \ ```\n*   `flush`：记录从 memtable 到 SSTable 的刷新事件。\n    ```\n    {\"type\":\"flush\"\
    ,\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083335639,\"tables\": ...\
    \ }\n    ```\n*   `compaction`：记录压实事件。\n    ```\n    {\"type\":\"compaction\"\
    ,\"keyspace\":\"test\",\"table\":\"t\",\"time\":1470083660267,\"start\":\"1 ...\
    \ }\n    ```\n*   `pending`：列出待处理的压实任务数。\n    ```\n    {\"type\":\"pending\",\"\
    keyspace\":\"test\",\"table\":\"t\",\"time\":1470083447967,\"strategyId\":\"1\"\
    ,\"pending\":100}\n    ```\n\n### 测试压实策略的有效性\n\n当您计划更改压实策略时，可以首先在不正式属于集群的节点上测试新策略的影响。您以写入调查模式启动一个新节点，该模式将节点添加到集群但不正式使其成为环的一部分。\n\
    \n如果您愿意，可以从集群中取出一个节点，并以写入调查模式将其重新启动，以测试更改对读取性能的影响。一旦以写入调查模式启动节点，您就可以在该节点上对读取操作进行基准测试。\n\
    \n要以写入调查模式启动节点，请使用以下两种方法之一将 `write_survey` 选项设置为 `true`：\n\n```\nJVM_OPTS=\"$JVM_OPTS\
    \ -Dcassandra.write_survey=true\"       /* 用于包安装，将此行添加到 cassandra-env.sh 文件。\n\
    $ cassandra -Dcassandra.write_survey=true               /* 用于压缩包安装，以此模式启动新节点。\n\
    ```\n\n您还可以通过在 `$CASSANDRA_HOME/conf/jvm.options` 文件中设置属性来以写入调查模式启动节点，如下所示（默认情况下，`-Dcassandra.write_survey`\
    \ 属性被注释掉。您需要取消注释）。以下是 `jvm.options` 文件的相关部分：\n\n```\n-Dcassandra.write_survey=true\n\
    ```\n"
