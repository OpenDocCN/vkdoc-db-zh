- fmt: 'A cluster is the largest unit of deployment for a Cassandra database and consists
    of a set of nodes in one or more locations. In AWS, the locations are multiple
    availability zones. A cluster can consist of just a single node, a single datacenter,
    or multiple datacenters. A cluster is sometimes referred to as a ring since Cassandra
    stores data in the cluster by arranging the data in a ring.


    A Cassandra node is a part of an individual location (a server) on a Cassandra
    cluster that stores data. To be specific, it stores data partitioned according
    to a partitioning algorithm that you specify.


    A commit log is a write-ahead transaction log that Cassandra stores on every node
    of the cluster. Cassandra writes data first to the append-only commit log, which
    it then flushes to disk in batches or periodically. Commit logs perform a critical
    role during a data recovery. Once the database flushes its data to disk, the database
    can archive, delete, or reuse the commit log.


    A memtable is an in-memory structure that’s a cache of data rows that can be looked
    up by a key. Each memtable stores data for a specific table and the database flushes
    the memtable contents to disk when the commit log gets full or after a specific
    interval (set at the table level).


    An SSTable (sorted strings table) is a logical entity that is comprised of several
    files on disk. An SSTable is immutable and is an append-only structure. Cassandra
    creates an SSTable when it flushes a memtable to disk. Cassandra sorts the memtables
    by key and writes them out sequentially to create an SSTable. This is the reason
    Cassandra’s writes are very fast; they involve only the appending of a commit
    log and a sequential write operation for flushing the data.


    A keyspace is a logical container that contains one or more tables and is analogous
    to a schema in a relational database. You store data inside tables that are part
    of a specific keyspace. All data objects such as tables must belong to a keyspace.

    *   A keyspace defines how Cassandra replicates data on the nodes of a cluster.
    A keyspace has several storage attributes. The keyspace also determines the RF
    (replication factor) for data that you store in a keyspace. You define the data
    replication strategy at the keyspace level, either when you create it or later.

    *   It’s a good idea to have a separate keyspace per application.


    A CQL table (aka column family) is a logical entity that resides in a keyspace.
    A table consists of ordered columns that the database fetches by row. You must
    define a primary key when you create a table.


    ### Replica Placement Strategy


    Cassandra allows you to replicate data by storing multiple copies of data across
    the nodes of a cluster. There are two strategies you can adopt to let Cassandra
    know how it ought to replicate data:

    *   The `SimpleStrategy` is for prototyping.

    *   The `NetworkTopologyStrategy` is for production environments.


    ## How Cassandra Stores Data


    Since Cassandra is a key-value store, it organizes its data into rows that consist
    of several columns that represent the values. A row belongs to a single node,
    and Cassandra replicates that row to the other nodes in the cluster.


    Cassandra hashes each row’s key to determine in which node in the ring it should
    store that data. It organizes the cluster itself as a ring of nodes, with each
    node storing an equal number of hash values.


    Let’s say you are running a four-node Cassandra cluster. You have a single keyspace
    and you choose a replication factor of 3. Let’s say you create a table in the
    keyspace and insert data into it. Each time Cassandra inserts data, it hashes
    the value of that row’s key to find out which node is responsible for storing
    that row.


    For simplicity’s sake, let’s assume the hash values range over 1-100, although
    in reality the hashes use 128-bit or larger values. Since you have four nodes
    in the cluster, here’s how the nodes divide the hash values among themselves:

    *   Node 1: Hash values 1-25

    *   Node 2: Hash values 26-50

    *   Node 3: Hash values 51-75

    *   Node 4: Hash values 76-100


    Figure 5-1 shows how Cassandra distributes the hash values among the four nodes.


    ![A436674_1_En_5_Fig1_HTML.jpg](A436674_1_En_5_Fig1_HTML.jpg)


    *Figure 5-1: How nodes are responsible for various hash values*


    Let’s say that the first row you insert gets hashed by Cassandra and the hash
    has a value of 65. As the diagram shows, the row belongs to Node 3, and Cassandra
    will also replicate the data to Node 1 and Node 2. Why nodes 1 and 2? The reason
    is that replication is always done on a clockwise basis in a ring.


    Let’s say that the next row you insert has the value 48. It goes to Node 2, and
    Cassandra replicates the row to Node 3 and Node 4.


    This is the essence of how Cassandra stores data among the nodes in a cluster.


    Ideally, all nodes in a cluster have an equal share of the hash values and thus
    the data set. That’s why it’s very important to ensure that the `primary key`
    you select for a table has a high cardinality (many values). This way, the rows
    are spread among all the nodes in the cluster instead of being stored in a skewed
    fashion, with some of the nodes having the responsibility for a higher portion
    of the data set than others. This results in hot spots on the storage drives,
    as fewer nodes are doing most of the work during read operations.'
