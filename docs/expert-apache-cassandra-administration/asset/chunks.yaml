- fmt: '# Eventual Consistency and Cassandra


    Eventual consistency in this context means that in a distributed system, not all
    nodes see the same version of the data; at any given time the state may diverge
    between nodes. That is, it’s possible for some nodes to serve stale data. However,
    given sufficient time, the state will come to be the same across the system.


    `MongoDB`, a popular NoSQL database, on the other hand, favors consistency and
    partition tolerance over high availability.


    The discussion on CAP and BASE shows that while NoSQL databases such as `Cassandra`
    have their advantages, particularly in the way they support horizontal scaling
    and the efficient processing of non-relational data, they do come with unique
    drawbacks and involve crucial sacrifices in terms of simultaneous support for
    traditional principles such as data consistency and availability.


    Consistency, while it’s a laudable objective, has a negative impact on cost-effective
    horizontal scaling. If the database needs to check the consistency of every transaction
    continuously, a database with billions of transactions will incur a significant
    cost to perform all the checks. The idea of consistency is not practical in a
    large distributed database.


    It’s the principle of eventual consistency that has allowed Google, Twitter and
    Amazon, among others, to interact with millions of their global customers, keeping
    their systems available by supporting partition tolerance. Without the principle
    of eventual consistency, there wouldn’t exist all these systems today that deal
    successfully with the exponential rise of data volumes due to cloud computing,
    social networking, and related modern trends.


    > **Note**

    > `Cassandra` lets you set a consistency level that clients must specify on all
    operations. This way, you can determine how many nodes in the `Cassandra` cluster
    must acknowledge a write operation for the database to consider the write successful.

    >

    > Let’s say you set the replication factor is 3 for some data, meaning that the
    databases must propagate all data to three different nodes. By setting your consistency
    level to 2, for example, you tell `Cassandra` to deem an update or a write as
    successful even if some nodes are down.


    ## Cassandra’s Drawbacks


    Although `Cassandra` offers numerous benefits, you ought to recognize that there
    are some strong drawbacks as well to the database, especially when you’re coming
    from a relational database background.


    In the following sections, I review `Cassandra`’s drawbacks from two viewpoints:
    querying and writing data.


    ### Problems with Querying Data


    The chief drawbacks of `Cassandra` when querying data are the fact that it’s an
    eventually consistent database and that it doesn’t offer support for standard
    database joins.


    #### Eventual Consistency


    `Cassandra` automatically replicates data across the nodes of a cluster. There’s
    no master node, the data propagation does involve some latency, and therefore,
    you’ll have eventual consistency.


    As explained earlier, eventual consistency means that in a distributed setup,
    to achieve high availability there’s an informal guarantee that if no new updates
    are made to data items, eventually all accesses to that data item will return
    an identical (last updated) value. You can mitigate the side effects of eventual
    consistency by using `quorum reads and writes`.


    #### No Joins


    `Cassandra` doesn’t use table joins, which are a key feature of relational database
    queries. You therefore also don’t have any foreign keys.


    You get around the lack of transactions by denormalizing your data, and use duplicated
    data and a query-oriented storage format. Another strategy is to use powerful
    data analysis tools such as `Apache Spark` together with `Cassandra`.


    #### No Indexes


    Relational databases employ both a primary key that uniquely identifies rows,
    as well as multiple other indexes called secondary indexes to speed up retrieval.
    `Cassandra` tables do use a primary key, but the database has limited support
    for secondary indexes.


    In `Cassandra`, you’ll find few cases that call for the creation of a secondary
    index. Indiscriminate use of secondary indexes hurts performance.


    ### Problems with Writing Data


    `Cassandra` also suffers from some drawbacks when writing data due to its lack
    of support for traditional transactions and the overhead due to immutable tables
    and mutation.


    #### Lack of Support for Transactions


    Transactions are a huge part of traditional relational databases, but `Cassandra`,
    which doesn’t support transaction-related concepts such as rollbacks or locking
    mechanisms that are so critical when dealing with relational databases, doesn’t
    support them.


    `Cassandra` does support lightweight transactions, but they are expensive. `Cassandra`
    uses the `Paxos protocol` to implement lightweight transactions to handle concurrent
    operations that read and write data items in a sequential order. The `Paxos protocol`
    is implemented by a serial consistency with real-time constraints, ending up with
    a transaction isolation that’s similar to that offered by a serialized isolation
    level in a database such as `Oracle`. Chapter [7](#A436674_1_En_7_Chapter.html)
    discuss the `Paxos algorithm` and linearizable consistency in detail.


    #### Overhead Due to Immutable Tables and Mutation


    `Cassandra` stores its data in immutable structures called `SSTables`. When you
    update data, `Cassandra` spreads the data across multiple `SSTables`. When you
    delete data, it creates markers called `tombstones` to ensure that the database
    correctly deletes data across all nodes of the cluster.


    Since a read operation must gather data from multiple tables, there is inherent
    overhead for reads. As you will learn in Chapter [11](#A436674_1_En_11_Chapter.html),
    cleaning up `SSTables` by compacting them ameliorates this overhead.


    ### Who Should Use Cassandra?


    I have explained the key drawbacks of `Cassandra`. The drawbacks should not deter
    you from using `Cassandra`; far from it! The drawbacks should serve to tell you
    if you ought to use `Cassandra` for your use cases.


    `Cassandra` is an excellent choice when you’re dealing with data that doesn’t
    change (immutable data), and where updates and deletes are rare. This means that
    `Cassandra` is great for handling huge volumes of immutable data from personalization,
    fraud detection, time series, and sensor data.


    `Cassandra` is also an appropriate choice if you’re primarily looking for a database
    that performs fast writes.


    ## Cassandra Optimizations


    While relational databases widely use strategies such as query optimization and
    compression, `Cassandra` uses various optimizations, some of which you usually
    won’t find in relational databases. The following sections describe key `Cassandra`
    performance optimizations.


    ### Data Caches


    `Cassandra` offers integrated caching and distributes the cached data across the
    cluster. When a node becomes unavailable, the client reads the data from another
    cached copy (replica) of the data. There’s no separate database caching tier.
    `Cassandra` offers two types of data caching: a partition key cache and row caching.


    -   The partition key cache caches the partition index for a `Cassandra` table
    to reduce seek times.

    -   Row caching will cache an entire row. When the number of reads is much larger
    (about 95%) than the number of writes, `Cassandra` recommends that you use row
    caching.'
