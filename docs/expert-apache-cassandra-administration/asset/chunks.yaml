  trans: '## The tools 目录


    `tools` 目录包含用于压力测试和管理 SSTable 等任务的实用 Cassandra 工具，如下所示：

    *   `cassandra-stress`：Cassandra 的负载测试工具

    *   `sstabledump`：以 JSON 格式转储 SSTable 内容的实用程序

    *   `sstablesplit`：将 SSTable 拆分为多个表的工具

    *   `sstablemetadata`：打印关于 SSTable 的元数据。


    ## The lib 目录


    `lib` 目录包含了 Cassandra 在运行时可能需要的所有外部库，例如 JSON 序列化库和 Apache commons 库。


    ## The conf 目录


    `conf` 目录包含了配置 Cassandra 集群所需的一切。它包含了让你能够设置 Cassandra 节点以及集群机架运行时属性的配置文件。此目录还包含了你为数据库设置环境的文件。以下是此目录中关键文件的简要说明：

    *   `cassandra.yaml`：这是 Cassandra 的主配置文件。

    *   `cassandra-env.sh`：这是你配置 Java、JVM 和 JMX 的 Linux 设置的文件。

    *   `cassandra-rackdc.properties`：此文件定义了由 `GossipingPropertyFileSnitch`、`Ec2Snitch`、`Ec2MultiRegionSnitch`
    和 `GoogleCloudSnitch` 等各种 snitch 使用的默认数据中心和机架。

    *   `Cassandra-topology.properties`：此文件定义了 `PropertyFileSnitch` 的默认数据中心和机架。

    *   `jvm.options`：允许你设置 Cassandra 启动 JVM 时将使用的选项。

    *   `commitlog_archiving.properties`：用于配置提交日志。

    *   `metrics-reporter-config-sample.yaml`：一个示例文件，展示如何配置 Cassandra 指标。

    *   `logback.xml`：Logback 配置文件，帮助你配置 Cassandra 的日志设置。


    ## The Javadoc 目录


    `javadoc` 目录包含一个使用 JavaDoc 工具生成的文档网站。这不是一个完整的文档，而只是存储在 Java 代码中的注释。要阅读 JavaDoc，请在浏览器中打开
    `javadoc/index.html` 文件。


    ## 启动和停止 Cassandra


    你通过发出 `cassandra` 命令来启动和停止 Cassandra。`cassandra` 实用程序以及其他关键的 Cassandra 管理工具位于
    `$CASSANDRA_HOME/bin` 目录中。


    ### 启动 Cassandra


    你可以使用 `cassandra` 命令启动 Cassandra。你可以选择添加以下标志：

    *   `-f` 在前台启动 Cassandra（默认情况下，`cassandra` 命令在后台启动数据库）。在前台运行意味着服务器会将所有日志打印到标准输出，你可以在终端窗口中看到它们。

    *   无论你是以后台还是前台模式运行 Cassandra，服务器日志总是写入 `system.log` 文件。

    *   `-R` 以 root 用户身份启动 Cassandra。


    ```

    以下是如何启动 Cassandra 实例的示例（以 root 用户身份，在前台启动）：

    $ cassandra -f -R

    ...

    INFO  20:33:47 Configuration location: file:/cassandra/apache-cassandra-3.9/conf/cassandra.yaml

    data_file_directories=[Ljava.lang.String;@175c2241; disk_access_mode=auto; disk_failure_policy=stop;
    dynamic_snitch=true; dynamic_snitch_badness_threshold=0.1; dynamic_snitch_reset_interval_in_ms=600000;

    ...

    INFO  20:33:57 Initializing system_schema.keyspaces

    INFO  20:33:59 Cassandra version: 3.9

    INFO  20:34:00 Loading persisted ring state

    INFO  20:34:00 Starting up server gossip

    INFO  20:34:00 Updating topology for localhost/127.0.0.1

    INFO  20:34:01 Node localhost/127.0.0.1 state jump to NORMAL

    INFO  20:34:01 Starting listening for CQL clients on localhost/127.0.0.1:9042
    (unencrypted)...

    ```


    我运行了带 `–f` 选项的 `cassandra` 命令，因此选择在前台运行实例。所以，Cassandra 会持续在终端打印所有日志信息。如果你以后台默认模式启动
    Cassandra，在 Cassandra 实例启动后按 Enter 键即可返回 Linux 命令提示符。


    让我们回顾一下我在这里展示的简要输出，因为它教给了我们一些有价值的事情：

    *   Loading persisted ring state：加载环状态。

    *   Starting up server gossip：与 gossip 相关的语句表明服务器正在与集群中其他节点启动通信。

    *   Updating topology：通过添加你已添加到集群的任何新节点来更新集群拓扑。

    *   Node … state jump to NORMAL：这意味着 Cassandra 已正常启动，并等待你通过 `cqlsh` 或其他方式与其进行交互。


    服务器启动后，Cassandra 会持续写入 `system.log` 文件，更新其中与内部数据库活动相关的信息，例如 memtable 的刷新和 SSTable
    的压缩。


    ### 检查 Cassandra 的状态


    你可以使用 `nodetool status` 命令检查实例的状态。`nodetool` 实用程序仅在 Cassandra 实例在节点上运行时才有效。`nodetool`
    是一个非常有用的 Cassandra 工具，熟悉它是个好主意。


    输入 `nodetool –help` 查看所有你可以执行的 `nodetool` 命令：


    ```

    $ nodetool -help

    usage: nodetool [(-h  | --host )] [(-p  | --port )]

    [(-pwf  | --password-file )]

    [(-u  | --username )]

    [(-pw  | --password )]  []

    The most commonly used nodetool commands are:

    assassinate                  Forcefully remove a dead node without re-replicating
    any data.  Use as a last resort if you cannot removenode

    bootstrap                    Monitor/manage node''s bootstrap process

    cleanup                      Triggers the immediate cleanup of keys no longer
    belonging to a node. By default, clean all keyspaces

    clearsnapshot                Remove the snapshot with the given name from the
    given keyspaces. If no snapshotName is specified we will remove all snapshots

    compact                      Force a (major) compaction on one or more tables
    or user-defined compaction on given SSTables

    compactionhistory            Print history of compaction

    compactionstats              Print statistics on compactions

    decommission                 Decommission the *node I am connecting to*

    describecluster              Print the name, snitch, partitioner and schema version
    of a cluster

    ...

    ```


    如果没有 Cassandra 实例在运行时执行 `nodetool`，你会得到一个错误：


    ```

    $ nodetool status

    nodetool: Failed to connect to ''127.0.0.1:7199'' - ConnectException: ''Connection
    refused''.

    $

    ```'
- fmt: '## The `nodetool status` Command


    The `nodetool status` command lets you learn about the status of a Cassandra cluster.
    Since I have the Cassandra instance running now, I can use `nodetool` to check
    on it:


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                     Rack

    UN  192.168.177.132  203.5 KiB  256          100.0%            b0ade950-937a-457c-95eb-d3032897eeb1  rack1

    $

    ```


    Each node in the output is represented by its IP address. The very first column
    in `nodetool`''s status report shows the status and the state of the Cassandra
    instance.


    Status can take two values: `Up` or `Down`.


    State can take one of the following four values:


    *   `Normal`

    *   `Leaving`

    *   `Joining`

    *   `Moving`


    In my case, I see a `UN`, which means `Up/Normal`. The `Owns` column shows the
    percentage of data owned by the node per data center times the replication factor
    of the data. If for example, a node owns 33% of the data, the `Owns` column shows
    67%, if the replication factor is 2. Since right now there''s just a single node
    in my cluster, it owns all (100%) of the data in the cluster. A bad data model
    will affect the distribution of data among the nodes of a cluster, and checking
    the percentage of data owned by each node is a good way to get to check if the
    data model is good.


    ## Testing the Server with the `nodetool info` Command


    The `nodetool info` command, which shows information such as uptime and load,
    helps you verify that the Cassandra instance is running properly, as shown here:


    ```

    $ sudo nodetool info

    ID                     : 99c43633-c691-4dee-b7af-35bc6e74dd67

    Gossip active          : true

    Thrift active          : false

    Native Transport active: true

    Load                   : 296.85 KiB

    Generation No          : 1489357081

    Uptime (seconds)       : 1714

    Heap Memory (MB)       : 120.53 / 1014.00

    Off Heap Memory (MB)   : 0.00

    Data Center            : datacenter1

    Rack                   : rack1

    Exceptions             : 21

    Key Cache              : entries 32, size 2.56 KiB, capacity 50 MiB, 1344 hits,
    1395 requests, 0.963 recent hit rate, 14400 save period in seconds

    Row Cache              : entries 0, size 0 bytes, capacity 0 bytes, 0 hits, 0
    requests, NaN recent hit rate, 0 save period in seconds

    Counter Cache          : entries 0, size 0 bytes, capacity 25 MiB, 0 hits, 0 requests,
    NaN recent hit rate, 7200 save period in seconds

    Chunk Cache            : entries 30, size 1.88 MiB, capacity 221 MiB, 128 misses,
    2738 requests, 0.953 recent hit rate, 866.987 microseconds miss latency

    Token                  : (invoke with -T/--tokens to see all 256 tokens)

    ```


    If this command `nodetool` hangs for over a minute or so, it means there''s something
    wrong with your server''s network configuration.


    ## Stopping Cassandra


    There''s no Cassandra command to stop a running instance. If you started Cassandra
    in the foreground, press `Control-C` to stop Cassandra. If you started Cassandra
    in the background, you can stop the instance by using the Linux `kill` command.
    First, find the PID (Linux process ID) with the `pgrep –f CassandraDaemon` command
    and then kill it with the Linux `kill` command:


    ```

    $ sudo pgrep -f CassandraDaemon

    ```


    Alternatively, you can simply run the `ps` command to get Cassandra''s PID:


    ```

    $ sudo ps auwx | grep cassandra

    ```


    Once you get the PID for Cassandra using one of the two methods I showed, you
    can kill the instance thus:


    ```

    $ sudo kill 2284

    ```


    Alternatively, you can kill the instance in a single step by running the following
    command:


    ```

    $ sudo pkill –f CassandraDaemon

    ```


    You''ll notice that there''s a script named `stop-server` in the `$CASSANDRA_HOME/bin`
    directory. However, the script doesn''t stop anything! If you run it, it will
    suggest that you read the script before using it.


    ```

    echo "please read the stop-server script before use"

    # if you are using the cassandra start script with -p, this

    # is the best way to stop:

    # kill ''cat ''

    # otherwise, you can run something like this, but

    # this is a shotgun approach and will kill other processes

    # with cassandra in their name or arguments too:

    # user="whoami"

    # pgrep -u $user -f cassandra | xargs kill -9

    ```


    You can create a simple shell script such as the following to shutdown Cassandra:


    ```

    #!/bin/bash

    CASSPID=''ps –ef |grep CassandraDaemon |grep –v grep |awk ''{ print $2 }''

    if [[ "$CASSPID" == '''' ]]

    then

    echo Cassandra is NOT running

    else

    kill $CASSPID

    fi

    ```


    ## Starting and Stopping with the `service` Command


    You can also start Cassandra as a service (Java server process) for a packaged
    installation. You''ll find the startup scripts in the `/etc/init.d` directory.
    The service runs under the Cassandra user.


    On a Debian system, the Cassandra service will automatically start following the
    installation of the software. You can check the service''s status, stop, and restart
    it with following commands:


    ```

    $ sudo service cassandra status

    $ sudo service cassandra stop

    $ sudo service cassandra start

    ```


    When you run the `service cassandra start` command in a cluster with multiple
    nodes, on initial startup you must start each node one at a time, beginning with
    the seed nodes.


    If you try to run the `service cassandra` command in a tarball installation, you''ll
    receive an error:


    ```

    # service cassandra status

    ● cassandra.service

    Loaded: not-found (Reason: No such file or directory)

    Active: inactive (dead)

    #

    ```


    ## Clearing Cassandra Data


    Sometimes you may need to clear Cassandra data. You may need to remove just the
    data in the `data` directory, or from all default directories. I explain the procedures
    for removing the directories in this section.


    The procedure to clear Cassandra data is similar in both package installations
    and standalone installations, differing only in the location of the default directories.


    To clear the data from all default directories in a package installation, do the
    following:


    ```

    $ cd install_location

    $ rm –rf data/*

    ```


    This will remove data from the default directories, including the commit log and
    the `saved-caches` directories.


    To remove just the data directory, do the following:


    ```

    $ sudo rm -rf data/data/*

    ```


    You can remove all data in a package installation (from the default directories)
    by doing this:


    ```

    $ sudo service cassandra stop

    $ sudo rm –rf /var/lib/cassandra/*

    ```


    ## Verifying the Cassandra Version


    The output of the `cassandra` command tells you the Cassandra version. You can
    also find the version by running the `cassandra` command with the `–v` option:


    ```

    $ ./cassandra -v

    3.9

    $

    ```


    The `–v` option simply prints the Cassandra version and quits. You can also execute
    the `show version` command to get version info:


    ```

    cqlsh> show version;

    [cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    The `nodetool version` command also shows the Cassandra version:


    ```

    $ nodetool version

    ReleaseVersion: 3.11.0

    $

    ```


    ## Configuring `cqlsh`


    The `cqlsh` utility is highly configurable, and you can configure it via a dedicated
    configuration file or by choosing from several options at the command line. Let''s
    review both ways of configuring `cqlsh`.


    ### Configuring Through the `cqlshrc` Config File


    You can configure various properties in the `cqlshrc` file. Cassandra provides
    a `cqlshrc.sample` file for you, and you can rename it to `cqlshrc`. The `cqlshrc.sample`
    file is located in the `$CASSANDRA_HOME/conf` directory. Here''s a partial listing
    of the `cqlshrc.sample` file:


    ```

    [cql]

    ;; A version of CQL to use (this should almost never be set)

    ; version = 3.2.1

    [connection]

    ;; The host to connect to

    hostname = 127.0.0.1

    ;; The port to connect to (9042 is the native protocol default)

    port = 9042

    ;; Always connect using SSL - false by default

    ; ssl = true

    ;; A timeout in seconds for opening new connections

    ; timeout = 10

    ;; A timeout in seconds for executing queries

    ; request_timeout = 10

    ...

    ```'
  raw: '#### The nodetool status Command


    The `nodetool status` command lets you learn about the status of a Cassandra cluster.
    Since I have the Cassandra instance running now, I can use nodetool to check on
    it:


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                     Rack

    UN  192.168.177.132  203.5 KiB  256          100.0%            b0ade950-937a-457c-95eb-d3032897eeb1  rack1

    $

    ```


    Each node in the output is represented by its IP address. The very first column
    in nodetool’s status report shows the status and the state of the Cassandra instance.


    Status can take two values: Up or Down.


    State can take one of the following four values:


    *   Normal

    *   Leaving

    *   Joining

    *   Moving


    In my case, I see a UN, which means Up/Normal. The `Owns` columns shows the percentage
    of data owned by the node per data center times the replication factor of the
    data. If for example, a node owns 33% of the data, the `Owns` column shows 67%,
    if the replication factor is 2\. Since right now there’s just a single node in
    my cluster, it owns all (100%) of the data in the cluster. A bad data model will
    affect the distribution of data among the nodes of a cluster, and checking the
    percentage of data owned by each node is a good way to get to check if the data
    model is good.


    #### Testing the Server with the nodetool info Command


    The `nodetool info` command , which shows information such as uptime and load,
    helps you verify that the Cassandra instance is running properly, as shown here:


    ```

    $ sudo nodetool info

    ID                     : 99c43633-c691-4dee-b7af-35bc6e74dd67

    Gossip active          : true

    Thrift active          : false

    Native Transport active: true

    Load                   : 296.85 KiB

    Generation No          : 1489357081

    Uptime (seconds)       : 1714

    Heap Memory (MB)       : 120.53 / 1014.00

    Off Heap Memory (MB)   : 0.00

    Data Center            : datacenter1

    Rack                   : rack1

    Exceptions             : 21

    Key Cache              : entries 32, size 2.56 KiB, capacity 50 MiB, 1344 hits,
    1395 requests, 0.963 recent hit rate, 14400 save period in seconds

    Row Cache              : entries 0, size 0 bytes, capacity 0 bytes, 0 hits, 0
    requests, NaN recent hit rate, 0 save period in seconds

    Counter Cache          : entries 0, size 0 bytes, capacity 25 MiB, 0 hits, 0 requests,
    NaN recent hit rate, 7200 save period in seconds

    Chunk Cache            : entries 30, size 1.88 MiB, capacity 221 MiB, 128 misses,
    2738 requests, 0.953 recent hit rate, 866.987 microseconds miss latency

    Token                  : (invoke with -T/--tokens to see all 256 tokens)

    ```


    If this command nodetool hangs for over a minute or so, it means there’s something
    wrong with your server’s network configuration.


    #### Stopping Cassandra


    There’s no Cassandra command to stop a running instance. If you started Cassandra
    in the foreground, press Control-C to stop Cassandra. If you started Cassandra
    in the background, you can stop the instance by using the Linux `kill` command.
    First, find the PID (Linux process ID) with the `pgrep –f CassandraDaemon` command
    and then kill it with the Linux `kill` command:


    ```

    $ sudo pgrep -f CassandraDaemon


    ```


    Alternatively, you can simply run the `ps` command to get Cassandra’s PID:


    ```

    $ sudo ps auwx | grep cassandra


    ```


    Once you get the PID for Cassandra using one of the two methods I showed, you
    can kill the instance thus:


    ```

    $ sudo kill 2284

    ```


    Alternatively, you can kill the instance in a single step by running the following
    command:


    ```

    $ sudo pkill –f CassandraDaemon

    ```


    You’ll notice that there’s a script named `stop-server` in the `$CASSANDRA_HOME/bin`
    directory. However, the script doesn’t stop anything! If you run it, it will suggest
    that you read the script before using it.


    ```

    echo "please read the stop-server script before use"

    # if you are using the cassandra start script with -p, this

    # is the best way to stop:

    # kill ''cat ''

    # otherwise, you can run something like this, but

    # this is a shotgun approach and will kill other processes

    # with cassandra in their name or arguments too:

    # user="whoami"

    # pgrep -u $user -f cassandra | xargs kill -9

    ```


    You can create a simple shell script such as the following to shutdown Cassandra:


    ```

    #!/bin/bash

    CASS_PI

    FID=''ps –ef |grep CasandraDaemon |grep –v grep |awk ''{ print $2 }"

    if [[ "$CASSPID" == '''']]

    then

    echo Cassandra is NOT running

    else

    kill $CASS_PID

    fi

    ```


    ### Starting and Stopping with the service Command


    You can also start Cassandra as a service (Java server process) for a packaged
    installation. You’ll find the startup scripts in the `/etc/init.d` directory.
    The service runs under the Cassandra user.


    On a Debian system, the Cassandra service will automatically start following the
    installation of the software. You can check the service’s status, stop, and restart
    it with following commands:


    ```

    $ sudo service cassandra status

    $ sudo service cassandra stop

    $ sudo service cassandra start

    ```


    When you run the `start service` command in a cluster with multiple nodes, on
    initial startup you must start each node one at a time, beginning with the seed
    nodes.


    If you try to run the `service cassandra` command in a tarball installation, you’ll
    receive an error:


    ```

    # service cassandra status

    ● cassandra.service

    Loaded: not-found (Reason: No such file or directory)

    Active: inactive (dead)

    #

    ```


    ### Clearing Cassandra Data


    Sometimes you may need to clear Cassandra data . You may need to remove just the
    data in the `data` directory, or from all default directories. I explain the procedures
    for removing the directories in this section.


    The procedure to clear Cassandra data is similar in both package installations
    and standalone installations, differing only in the location of the default directories.


    To clear the data from all default directories in a package installation, do the
    following:


    ```

    $ cd install_location

    $ rm –rf data/*

    ```


    This will remove data from the default directories, including the commit log and
    the `saved-caches` directories.


    To remove just the data directory, do the following:


    ```

    $ sudo rm -rf data/data/*

    ```


    You can remove all data in a package installation (from the default directories)
    by doing this:


    ```

    $ sudo stop service cassandra

    $ sudo rm –rf /var/lib/cassandra/*

    ```


    ### Verifying the Cassandra Version


    The output of the `cassandra` command tells you the Cassandra version. You can
    also find the version by running the `cassandra` command with the `–v` option:


    ```

    $ ./cassandra  -v

    3.9

    $

    ```


    The `–v` option simply prints the Cassandra version and quits. You can also execute
    the `show version` command to get version info:


    ```

    cqlsh> show version;

    [cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    The nodetool version command also shows the Cassandra version:


    ```

    $ nodetool version

    ReleaseVersion: 3.11.0

    $

    ```


    ## Configuring cqlsh


    The cqlsh utility is highly configurable, and you can configure it via a dedicated
    configuration file or by choosing from several options at the command line. Let’s
    review both ways of configuring cqlsh.


    ### Configuring Through the cqlshrc Config File


    You can configure various properties in the cqlshrc file. Cassandra provides a
    `cqlshrc.sample` file for you, and you can rename it to cqlshrc. The `cqlshrc.sample`
    file is located in the `$CASSANDRA_HOME/conf` directory. Here’s a partial listing
    of the `cqlshrc.sample` file:


    ```

    cql]

    ;; A version of CQL to use (this should almost never be set)

    ; version = 3.2.1

    [connection]

    ;; The host to connect to

    hostname = 127.0.0.1

    ;; The port to connect to (9042 is the native protocol default)

    port = 9042

    ;; Always connect using SSL - false by default

    ; ssl = true

    ;; A timeout in seconds for opening new connections

    ; timeout = 10

    ;; A timeout in seconds for executing queries

    ; request_timeout = 10

    ...

    ```'
  trans: '

    ## `nodetool status` 命令


    `nodetool status` 命令用于了解 Cassandra 集群的状态。既然我现在有 Cassandra 实例在运行，我可以使用 `nodetool`
    来检查它：


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                     Rack

    UN  192.168.177.132  203.5 KiB  256          100.0%            b0ade950-937a-457c-95eb-d3032897eeb1  rack1

    $

    ```


    输出中的每个节点都由其 IP 地址表示。`nodetool` 状态报告的第一列显示了 Cassandra 实例的状态和状态。


    状态可以有两个值：`Up` 或 `Down`。


    状态可以是以下四个值之一：


    *   `Normal`

    *   `Leaving`

    *   `Joining`

    *   `Moving`


    在我这里，我看到的是 `UN`，意味着 `向上/正常`。`Owns` 列显示了该节点在每个数据中心拥有的数据百分比乘以数据的复制因子。例如，如果一个节点拥有
    33% 的数据，而复制因子是 2，那么 `Owns` 列会显示 67%。由于目前我的集群中只有一个节点，它拥有集群中全部（100%）的数据。糟糕的数据模型会影响数据在集群节点间的分布，检查每个节点拥有的数据百分比是验证数据模型是否良好的一个好方法。


    ## 使用 `nodetool info` 命令测试服务器


    `nodetool info` 命令显示诸如运行时间和负载等信息，有助于验证 Cassandra 实例是否正常运行，如下所示：


    ```

    $ sudo nodetool info

    ID                     : 99c43633-c691-4dee-b7af-35bc6e74dd67

    Gossip active          : true

    Thrift active          : false

    Native Transport active: true

    Load                   : 296.85 KiB

    Generation No          : 1489357081

    Uptime (seconds)       : 1714

    Heap Memory (MB)       : 120.53 / 1014.00

    Off Heap Memory (MB)   : 0.00

    Data Center            : datacenter1

    Rack                   : rack1

    Exceptions             : 21

    Key Cache              : entries 32, size 2.56 KiB, capacity 50 MiB, 1344 hits,
    1395 requests, 0.963 recent hit rate, 14400 save period in seconds

    Row Cache              : entries 0, size 0 bytes, capacity 0 bytes, 0 hits, 0
    requests, NaN recent hit rate, 0 save period in seconds

    Counter Cache          : entries 0, size 0 bytes, capacity 25 MiB, 0 hits, 0 requests,
    NaN recent hit rate, 7200 save period in seconds

    Chunk Cache            : entries 30, size 1.88 MiB, capacity 221 MiB, 128 misses,
    2738 requests, 0.953 recent hit rate, 866.987 microseconds miss latency

    Token                  : (invoke with -T/--tokens to see all 256 tokens)

    ```


    如果这个 `nodetool` 命令挂起超过一分钟左右，那就意味着你的服务器网络配置有问题。


    ## 停止 Cassandra


    没有专门的 Cassandra 命令来停止正在运行的实例。如果你在前台启动了 Cassandra，按下 `Control-C` 来停止它。如果你在后台启动了
    Cassandra，你可以使用 Linux 的 `kill` 命令来停止实例。首先，用 `pgrep –f CassandraDaemon` 命令找到 PID（Linux
    进程 ID），然后用 Linux 的 `kill` 命令将其终止：


    ```

    $ sudo pgrep -f CassandraDaemon

    ```


    或者，你可以简单地运行 `ps` 命令来获取 Cassandra 的 PID：


    ```

    $ sudo ps auwx | grep cassandra

    ```


    一旦你通过我展示的两种方法之一获得了 Cassandra 的 PID，你就可以像这样终止实例：


    ```

    $ sudo kill 2284

    ```


    或者，你可以通过运行以下命令一步到位地终止实例：


    ```

    $ sudo pkill –f CassandraDaemon

    ```


    你会注意到在 `$CASSANDRA_HOME/bin` 目录下有一个名为 `stop-server` 的脚本。然而，这个脚本实际上并不会停止任何东西！如果你运行它，它会建议你在使用前阅读该脚本。


    ```

    echo "please read the stop-server script before use"

    # if you are using the cassandra start script with -p, this

    # is the best way to stop:

    # kill ''cat ''

    # otherwise, you can run something like this, but

    # this is a shotgun approach and will kill other processes

    # with cassandra in their name or arguments too:

    # user="whoami"

    # pgrep -u $user -f cassandra | xargs kill -9

    ```


    你可以创建一个简单的 shell 脚本，比如下面这个，来关闭 Cassandra：


    ```

    #!/bin/bash

    CASSPID=''ps –ef |grep CassandraDaemon |grep –v grep |awk ''{ print $2 }''

    if [[ "$CASSPID" == '''' ]]

    then

    echo Cassandra is NOT running

    else

    kill $CASSPID

    fi

    ```


    ## 使用 `service` 命令启动和停止


    对于打包安装，你也可以将 Cassandra 作为服务（Java 服务器进程）启动。你会在 `/etc/init.d` 目录中找到启动脚本。该服务以 Cassandra
    用户身份运行。


    在 Debian 系统上，安装软件后 Cassandra 服务会自动启动。你可以使用以下命令检查服务状态、停止和重启它：


    ```

    $ sudo service cassandra status

    $ sudo service cassandra stop

    $ sudo service cassandra start

    ```


    在具有多个节点的集群中运行 `service cassandra start` 命令时，在初始启动时，你必须从种子节点开始，一次启动一个节点。


    如果你尝试在 tarball 安装中运行 `service cassandra` 命令，你会收到一个错误：


    ```

    # service cassandra status

    ● cassandra.service

    Loaded: not-found (Reason: No such file or directory)

    Active: inactive (dead)

    #

    ```


    ## 清除 Cassandra 数据


    有时你可能需要清除 Cassandra 数据。你可能只需要删除 `data` 目录中的数据，或者删除所有默认目录中的数据。我在本节中解释了删除目录的步骤。


    清除 Cassandra 数据的步骤在包安装和独立安装中是相似的，仅默认目录的位置不同。


    要清除包安装中所有默认目录的数据，请执行以下操作：


    ```

    $ cd install_location

    $ rm –rf data/*

    ```


    这将删除默认目录中的数据，包括提交日志和 `saved-caches` 目录。


    要仅删除数据目录，请执行以下操作：


    ```

    $ sudo rm -rf data/data/*

    ```


    你可以通过以下方式删除包安装中的所有数据（来自默认目录）：


    ```

    $ sudo service cassandra stop

    $ sudo rm –rf /var/lib/cassandra/*

    ```


    ## 验证 Cassandra 版本


    `cassandra` 命令的输出会告诉你 Cassandra 的版本。你也可以通过运行带有 `–v` 选项的 `cassandra` 命令来查找版本：


    ```

    $ ./cassandra -v

    3.9

    $

    ```


    `–v` 选项只是打印 Cassandra 版本然后退出。你也可以执行 `show version` 命令来获取版本信息：


    ```

    cqlsh> show version;

    [cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    `nodetool version` 命令也显示 Cassandra 版本：


    ```

    $ nodetool version

    ReleaseVersion: 3.11.0

    $

    ```


    ## 配置 `cqlsh`


    `cqlsh` 工具是高度可配置的，你可以通过专用配置文件或在命令行选择多个选项来配置它。让我们回顾一下配置 `cqlsh` 的两种方式。


    ### 通过 `cqlshrc` 配置文件配置


    你可以在 `cqlshrc` 文件中配置各种属性。Cassandra 为你提供了一个 `cqlshrc.sample` 文件，你可以将其重命名为 `cqlshrc`。`cqlshrc.sample`
    文件位于 `$CASSANDRA_HOME/conf` 目录中。以下是 `cqlshrc.sample` 文件的部分内容：


    ```

    [cql]

    ;; A version of CQL to use (this should almost never be set)

    ; version = 3.2.1

    [connection]

    ;; The host to connect to

    hostname = 127.0.0.1

    ;; The port to connect to (9042 is the native protocol default)

    port = 9042

    ;; Always connect using SSL - false by default

    ; ssl = true

    ;; A timeout in seconds for opening new connections

    ; timeout = 10

    ;; A timeout in seconds for executing queries

    ; request_timeout = 10

    ...

    ```

    '
- fmt: '### Configuring by Specifying Options at the Command Line


    You can specify several options for `cqlsh` at the command line. To take a simple
    example, you can specify a non-default location for the `cqlsh` config file, `cqlshrc`,
    with the `–cqlshrc` option:


    ```

    $ cqlsh –cqlshrc $CASSANDRA_HOME/newconf

    ```


    ### Finding the Versions


    You can find the versions of not only Cassandra, but also `cqlsh`, CQL, and the
    native protocol, with the same `VERSION` command:


    ```

    cqlsh> show version

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    ### Cqlsh Options


    `cqlsh` comes with numerous options to facilitate your work, and I describe the
    most useful options in the following sections.


    #### Clearing the Screen


    You can clear the screen by typing either `clear` or `CLS` at the `cqlsh` command
    line.


    #### Running Commands from a File


    Often, you’ll want to run a set of commands one after the other. At times like
    this, you can simply store all the commands in a text file using a text editor
    such as `vi` or `nano`. For example, the following two lines are in a file named
    `myfile`:


    ```

    use mykeyspace1

    select * from employees

    ```


    Once you create the text file with the `cqlsh` commands, you can invoke the commands
    with the `source` command, as shown here:


    ```

    cqlsh> source  ''/cassandra/test/myfile'';

    ```


    ## Putting Cassandra Through Its Paces


    Now that you’ve installed, configured, started, and stopped the Cassandra instance,
    you’ve gotten over a major hurdle. To see how Cassandra functions, it’s a good
    idea to create some test data at this point.


    In this section, I’ll connect to CQL shell and create a keyspace and a table and
    then I’ll query from that table. Just follow along for now, and I explain the
    syntax and other interesting stuff in Chapters [4](#A436674_1_En_4_Chapter.html)
    and [5](#A436674_1_En_5_Chapter.html).


    ### Connecting to the CQL Shell


    You can connect to the CQL shell by typing `cqlsh` at the command prompt, as shown
    here:


    ```

    $ ./cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    Note that the cluster to which `cqlsh` connects is the Cassandra cluster named
    `Test Cluster`, which happens to be the default name for a Cassandra cluster.


    In this case, I didn’t specify a Cassandra node that `cqlsh` ought to connect
    to, so it connects to the Cassandra instance running on `localhost`. If you’re
    running the `cqlsh` command in a multi-node cluster, you can connect to a specific
    node in a cluster. To do this, you specify the hostname and port on the command
    line:


    ```

    $ cqlsh 192.168.177.140 9160

    ```


    ### Creating a Keyspace


    As you’ll learn shortly, to store data in a Cassandra table, you must first create
    a keyspace. Once you create this keyspace, you can create tables inside it for
    storing data.


    Here’s how you create a keyspace named `testdata`:


    ```

    cqlsh> create keyspace testdata with replication = {''class'' : ''SimpleStrategy'',
    ''replication_factor'' : 2};

    cqlsh>

    ```


    This example creates a keyspace named `testdata` with a replication level of 2.
    Never mind the syntax of the command; you’ll learn all that in Chapter [4](#A436674_1_En_4_Chapter.html).


    ### Creating a Table


    Now that you have your keyspace ready, it’s time to create your first Cassandra
    table! Before you issue the `create table` command, run the `use testdata` command
    so Cassandra can create the table in the `testdata` keyspace.


    ```

    cqlsh> use testdata;

    cqlsh:testdata>

    cqlsh:testdata> create table quarters ( id int PRIMARY KEY, name text );

    ```


    You can verify that Cassandra created your new table by running the `describe
    tables` command:


    ```

    cqlsh:testdata> describe tables;

    quarters

    cqlsh:testdata>

    ```


    ### Inserting Test Data


    Let’s insert some test data into the `quarters` table.


    ```

    cqlsh:testdata> insert into quarters (id,name) VALUES(1, ''Spring'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(2, ''Summer'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(3, ''Fall'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(4, ''Winter'');

    cqlsh:testdata>

    ```


    ### Querying the Table


    Let’s query the `quarters` table.


    ```

    cqlsh:testdata> select * from quarters;

    id | name

    ----+--------

    1 | Spring

    2 | Summer

    4 | Winter

    3 |   Fall

    (4 rows)

    cqlsh:testdata>

    ```


    ### Getting the History of Your Commands


    You can get a history of all your `cqlsh` as well as `nodetool` commands by going
    to the directory named `.cassandra` under the `/home` directory of the user as
    which you run these commands.


    ```

    ubuntu2:/home/samalapati/.cassandra$  ls -altr

    total 16

    -rw-------  1 samalapati samalapati    5 Mar  5 17:22 cqlsh_history

    -rw-rw-r--  1 samalapati samalapati 3156 Mar 11 11:44 nodetool.history

    ...

    ```


    Inside the hidden directory `.cassandra` you’ll find two files: `cqlsh_history`
    and `nodetool.history`, which store the history of all the `cqlsh` and `nodetool`
    commands that you have run, respectively.


    You now have a spanking new Cassandra single-node cluster. It’s time to move on
    to a multi-node cluster in the next chapter.


    ## Summary


    You can install Cassandra in several ways: through the source, a binary package,
    or from a through a binary tar ball.


    When dealing with Casandra for the first time, you can start with just a handful
    of configuration parameters, and learn to configure the rest of the properties
    as you learn more about Cassandra.


    Learning how to run the CQL shell commands will help enhance your productivity.
    Go through the various Cassandra directories, such as `bin`, `conf`, `tools`,
    and `logs`, so you can familiarize yourself with the entire toolkit that Cassandra
    offers. This tour of the directories also helps you learn where Cassandra stores
    various things such as data, logs, snapshots, and various other artifacts.


    It’s a good idea to create start and stop scripts for your clusters.


    ### 3. Deploying a Cassandra Cluster


    In Chapter [2](#A436674_1_En_2_Chapter.html), you learned how to install and configure
    a single-node Cassandra cluster. The idea behind starting with a simple one-node
    cluster was to get novices comfortable with the Cassandra terminology and learn
    the basics of starting and stopping Cassandra nodes.


    The real strength of Cassandra, however, lies in its distributed architecture,
    so in this chapter, I show how to create and configure a multi-node cluster.


    You’ll learn how to create, start, and stop a multi-node cluster, both with a
    single data center and multiple data centers. The chapter also shows you how to
    create a multi-node Cassandra cluster in the cloud, in an Amazon Web Services
    environment.


    #### Planning a Cluster Deployment


    When you are planning the deployment of a Cassandra cluster, you must figure out
    both the number of nodes you want to start out with and the configuration of those
    nodes. For small development clusters, the configuration of the nodes isn’t critical.
    However, choosing the right configuration for memory, CPUs, disk, and network
    is critical for a production deployment.


    ##### Using cassandra-stress for Planning a Production Deployment


    Cassandra offers a great tool for stress testing a cluster before you start production
    operations on that cluster. The tool is named `cassandra-stress`, and I explain
    it in detail in Chapter [11](#A436674_1_En_11_Chapter.html), which deals with
    tuning Cassandra performance.'
  raw: '### Configuring by Specifying Options at the Command Line


    You can specify several options for cqlsh at the command line. To take a simple
    example, you can specify a non-default location for the cqlsh config file, `cqlshrc`,
    with the `–cqlshrc` option:


    ```

    $ cqlsh –cqlshrc $CASSANDRA_HOME/newconf

    ```


    ### Finding the Versions


    You can find the versions of not only Cassandra, but also cqlsh, CQL, and the
    native protocol, with the same `VERSION` command:


    ```

    cqlsh> show version

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    ### Cqlsh Options


    Cqlsh comes with numerous options to facilitate your work, and I describe the
    most useful options in the following sections.


    #### Clearing the Screen


    You can clear the screen by typing either `clear` or `CLS` at the cqlsh command
    line.


    #### Running Commands from a File


    Often, you’ll want to run a set of commands one after the other. At times like
    this, you can simply store all the commands in a text file using a text editor
    such as vi or nano. For example, the following two lines are in a file named `myfile`:


    ```

    use mykeyspace1

    select * from employees

    ```


    Once you create the text file with the cqlsh commands, you can invoke the commands
    with the `source` command, as shown here:


    ```

    cqlsh> source  ''/cassandra/test/myfile'';

    ```


    ## Putting Cassandra Through Its Paces


    Now that you’ve installed, configured, started, and stopped the Cassandra instance,
    you’ve gotten over a major hurdle. To see how Cassandra functions, it’s a good
    idea to create some test data at this point.


    In this section, I’ll connect to CQL shell and create a keyspace and a table and
    then I’ll query from that table. Just follow along for now, and I explain the
    syntax and other interesting stuff in Chapters [4](#A436674_1_En_4_Chapter.html)
    and [5](#A436674_1_En_5_Chapter.html).


    ### Connecting to the CQL Shell


    You can connect to the CQL shell by typing `cqlsh` at the command prompt, as shown
    here:


    ```

    $ ./cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    Note that the cluster to which cqlsh connects is the Cassandra cluster named Test
    Cluster, which happens to be the default name for a Cassandra cluster.


    In this case, I didn’t specify a Cassandra node that cqlsh ought to connect to,
    so it connects to the Cassandra instance running on `localhost`. If you’re running
    the `cqlsh` command in a multi-node cluster, you can connect to a specific node
    in a cluster. To do this, you specify the hostname and port on the command line:


    ```

    $ cqlsh 192.168.177.140 9160

    ```


    ### Creating a Keyspace


    As you’ll learn shortly, to store data in a Cassandra table, you must first create
    a keyspace. Once you create this keyspace, you can create tables inside it for
    storing data.


    Here’s how you create a keyspace named testdata:


    ```

    cqlsh> create keyspace testdata with replication = {''class'' : ''SimpleStrategy'',
    ''replication_factor'' : 2};

    cqlsh>

    ```


    This example creates a keyspace named testdata with a replication level of 2\.
    Never mind the syntax of the command; you’ll learn all that in Chapter [4](#A436674_1_En_4_Chapter.html).


    ### Creating a Table


    Now that you have your keyspace ready, it’s time to create your first Cassandra
    table! Before you issue the `create table` command, run the `use testdata` command
    so Cassandra can create the table in the testdata keyspace.


    ```

    cqlsh> use testdata;

    cqlsh:testdata>

    cqlsh:testdata> create table quarters ( id int PRIMARY KEY, name text );

    ```


    You can verify that Cassandra created your new table by running the `describe
    tables` command:


    ```

    cqlsh:testdata> describe tables;

    quarters

    cqlsh:testdata>

    ```


    ### Inserting Test Data


    Let’s insert some test data into the `quarters` table.


    ```

    cqlsh:testdata> insert into quarters (id,name) VALUES(1, ''Spring'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(2, ''Summer'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(3, ''Fall'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(4, ''Winter'');

    cqlsh:testdata>

    ```


    ### Querying the Table


    Let’s query the quarters table .


    ```

    cqlsh:testdata> select * from quarters;

    id | name

    ----+--------

    1 | Spring

    2 | Summer

    4 | Winter

    3 |   Fall

    (4 rows)

    cqlsh:testdata>

    ```


    ### Getting the History of Your Commands


    You can get a history of all your CQLSH as well as Nodetool commands by going
    to the directory named `.cassandra` under the `/home` directory of the user as
    which you run these commands.


    ```

    ubuntu2:/home/samalapati/.cassandra$  ls -altr

    total 16

    -rw-------  1 samalapati samalapati    5 Mar  5 17:22 cqlsh_history

    -rw-rw-r--  1 samalapati samalapati 3156 Mar 11 11:44 nodetool.history

    ...

    ```


    Inside the hidden directory `.cassandra` you’ll find two files: `cqlsh_history`
    and `nodetool.history`, which store the history of all the `cqlsh` and `nodetool`
    commands that you have run, respectively.


    You now have a spanking new Cassandra single-node cluster. It’s time to move on
    to a multi-node cluster in the next chapter.


    ## Summary


    You can install Cassandra in several ways: through the source, a binary package,
    or from a through a binary tar ball.


    When dealing with Casandra for the first time, you can start with just a handful
    of configuration parameters, and learn to configure the rest of the properties
    as you learn more about Cassandra.


    Learning how to run the CQL shell commands will help enhance your productivity.
    Go through the various Cassandra directories, such as `bin`, `conf`, `tools`,
    and `logs`, so you can familiarize yourself with the entire toolkit that Cassandra
    offers. This tour of the directories also helps you learn where Cassandra stores
    various things such as data, logs, snapshots, and various other artifacts.


    It’s a good idea to create start and stop scripts for your clusters.


    # 3. Deploying a Cassandra Cluster


    In Chapter [2](#A436674_1_En_2_Chapter.html), you learned how to install and configure
    a single-node Cassandra cluster. The idea behind starting with a simple one-node
    cluster was to get novices comfortable with the Cassandra terminology and learn
    the basics of starting and stopping Cassandra nodes.


    The real strength of Cassandra, however, lies in its distributed architecture,
    so in this chapter, I show how to create and configure a multi-node cluster.


    You’ll learn how to create, start, and stop a multi-node cluster, both with a
    single data center and multiple data centers. The chapter also shows you how to
    create a multi-node Cassandra cluster in the cloud, in an Amazon Web Services
    environment.


    ## Planning a Cluster Deployment


    When you are planning the deployment of a Cassandra cluster, you must figure out
    both the number of nodes you want to start out with and the configuration of those
    nodes. For small development clusters, the configuration of the nodes isn’t critical.
    However, choosing the right configuration for memory, CPUs, disk, and network
    is critical for a production deployment.


    ### Using cassandra-stress for Planning a Production Deployment


    Cassandra offers a great tool for stress testing a cluster before you start production
    operations on that cluster. The tool is named cassandra-stress, and I explain
    it in detail in Chapter [11](#A436674_1_En_11_Chapter.html), which deals with
    tuning Cassandra performance.'
  trans: '### 通过在命令行指定选项进行配置


    你可以在命令行为 `cqlsh` 指定多个选项。举个简单的例子，你可以使用 `–cqlshrc` 选项来指定 `cqlsh` 配置文件 `cqlshrc`
    的非默认位置：


    ```

    $ cqlsh –cqlshrc $CASSANDRA_HOME/newconf

    ```


    ### 查找版本


    你可以使用同一个 `VERSION` 命令来查找不仅 Cassandra 的版本，还有 `cqlsh`、CQL 以及原生协议的版本：


    ```

    cqlsh> show version

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    cqlsh>

    ```


    ### Cqlsh 选项


    `cqlsh` 带有众多选项以方便你的工作，我将在以下章节中描述最有用的选项。


    #### 清屏


    你可以在 `cqlsh` 命令行键入 `clear` 或 `CLS` 来清屏。


    #### 从文件运行命令


    通常，你可能希望按顺序运行一系列命令。这种情况下，你可以简单地使用 `vi` 或 `nano` 等文本编辑器将所有命令存储在一个文本文件中。例如，以下两行内容在一个名为
    `myfile` 的文件中：


    ```

    use mykeyspace1

    select * from employees

    ```


    一旦你用 `cqlsh` 命令创建了文本文件，就可以使用 `source` 命令来调用这些命令，如下所示：


    ```

    cqlsh> source  ''/cassandra/test/myfile'';

    ```


    ## 全面体验 Cassandra


    现在你已经安装、配置、启动和停止了 Cassandra 实例，你已经克服了一个主要障碍。为了了解 Cassandra 的功能，此时创建一些测试数据是个好主意。


    在本节中，我将连接到 CQL shell，创建一个键空间和一个表，然后从该表中进行查询。现在先跟着操作，语法和其他有趣的内容我将在第 4 章和第 5 章中解释。


    ### 连接到 CQL Shell


    你可以通过在命令提示符下键入 `cqlsh` 来连接到 CQL shell，如下所示：


    ```

    $ ./cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    请注意，`cqlsh` 连接到的集群是名为 `Test Cluster` 的 Cassandra 集群，这恰好是 Cassandra 集群的默认名称。


    在这个例子中，我没有指定 `cqlsh` 应该连接到哪个 Cassandra 节点，因此它连接到运行在 `localhost` 上的 Cassandra 实例。如果你在多节点集群中运行
    `cqlsh` 命令，你可以连接到集群中的特定节点。为此，你需要在命令行上指定主机名和端口：


    ```

    $ cqlsh 192.168.177.140 9160

    ```


    ### 创建键空间


    正如你将很快了解到的，要在 Cassandra 表中存储数据，必须首先创建一个键空间。创建此键空间后，你就可以在其中创建表来存储数据。


    以下是如何创建一个名为 `testdata` 的键空间：


    ```

    cqlsh> create keyspace testdata with replication = {''class'' : ''SimpleStrategy'',
    ''replication_factor'' : 2};

    cqlsh>

    ```


    此示例创建了一个名为 `testdata` 的键空间，复制因子为 2。不必担心命令的语法；你将在第 4 章学习所有这些内容。


    ### 创建表


    现在你的键空间已经准备好了，是时候创建你的第一个 Cassandra 表了！在发出 `create table` 命令之前，先运行 `use testdata`
    命令，以便 Cassandra 在 `testdata` 键空间中创建表。


    ```

    cqlsh> use testdata;

    cqlsh:testdata>

    cqlsh:testdata> create table quarters ( id int PRIMARY KEY, name text );

    ```


    你可以通过运行 `describe tables` 命令来验证 Cassandra 是否创建了你的新表：


    ```

    cqlsh:testdata> describe tables;

    quarters

    cqlsh:testdata>

    ```


    ### 插入测试数据


    让我们向 `quarters` 表中插入一些测试数据。


    ```

    cqlsh:testdata> insert into quarters (id,name) VALUES(1, ''Spring'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(2, ''Summer'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(3, ''Fall'');

    cqlsh:testdata> insert into quarters (id,name) VALUES(4, ''Winter'');

    cqlsh:testdata>

    ```


    ### 查询表


    让我们查询 `quarters` 表。


    ```

    cqlsh:testdata> select * from quarters;

    id | name

    ----+--------

    1 | Spring

    2 | Summer

    4 | Winter

    3 |   Fall

    (4 rows)

    cqlsh:testdata>

    ```


    ### 获取命令历史记录


    你可以通过进入运行这些命令的用户主目录下的名为 `.cassandra` 的目录，来获取所有 `cqlsh` 以及 `nodetool` 命令的历史记录。


    ```

    ubuntu2:/home/samalapati/.cassandra$  ls -altr

    total 16

    -rw-------  1 samalapati samalapati    5 Mar  5 17:22 cqlsh_history

    -rw-rw-r--  1 samalapati samalapati 3156 Mar 11 11:44 nodetool.history

    ...

    ```


    在隐藏目录 `.cassandra` 中，你会找到两个文件：`cqlsh_history` 和 `nodetool.history`，它们分别存储了你运行过的所有
    `cqlsh` 和 `nodetool` 命令的历史记录。


    现在你拥有了一个崭新的 Cassandra 单节点集群。是时候在下一章中转向多节点集群了。


    ## 总结


    你可以通过多种方式安装 Cassandra：通过源代码、二进制包或二进制 tar 包。


    初次接触 Cassandra 时，你可以从仅配置少数几个参数开始，并随着对 Cassandra 的了解加深，逐步学习配置其余属性。


    学习如何运行 CQL shell 命令将有助于提高你的工作效率。浏览各种 Cassandra 目录，如 `bin`、`conf`、`tools` 和 `logs`，以便熟悉
    Cassandra 提供的整个工具集。这种目录浏览也有助于你了解 Cassandra 存储各种内容（如数据、日志、快照和其他各种工件）的位置。


    为你的集群创建启动和停止脚本是个好主意。


    ### 3. 部署 Cassandra 集群


    在第 2 章中，你学习了如何安装和配置单节点 Cassandra 集群。从简单的单节点集群开始，是为了让新手熟悉 Cassandra 术语并学习启动和停止
    Cassandra 节点的基础知识。


    然而，Cassandra 的真正优势在于其分布式架构，因此在本章中，我将展示如何创建和配置多节点集群。


    你将学习如何创建、启动和停止多节点集群，包括单数据中心和多数据中心的情况。本章还向你展示如何在 Amazon Web Services 环境中的云端创建多节点
    Cassandra 集群。


    #### 规划集群部署


    在规划 Cassandra 集群部署时，你必须确定要启动的节点数量以及这些节点的配置。对于小型开发集群，节点的配置并不关键。然而，对于生产部署，为内存、CPU、磁盘和网络选择合适的配置至关重要。


    ##### 使用 cassandra-stress 规划生产部署


    Cassandra 提供了一个强大的工具，用于在开始生产操作之前对集群进行压力测试。该工具名为 `cassandra-stress`，我将在讨论 Cassandra
    性能调优的第 11 章中详细解释它。'
- fmt: "### Choosing Memory\n\nRegardless of whether you use virtual or dedicated\
    \ hardware, you need to ensure that you have enough memory for your production\
    \ Cassandra environments. Although Cassandra needs only a minimum of 8GB of RAM,\
    \ the server should have at least 64GB to 512GB of RAM.\n\nThere is no \"ideal\"\
    \ amount of RAM for a Cassandra node. The amount of memory depends on the amount\
    \ of data that the node will process. Remember that data writes first go to tables\
    \ in memory (`memtables`) and from there to the `SSTables` that live on disk.\n\
    \nIf a Cassandra node has too little memory, it'll end up with smaller `memtables`,\
    \ meaning that the database must flush a larger number of `SSTables` to disk.\
    \ This means that queries will need to perform the more expensive disk I/O to\
    \ read a large number of files on disk. The bottom line is that the more RAM you\
    \ can purchase, the better.\n\n### Choosing CPUs\n\nCassandra is optimized for\
    \ writing, so the CPU is the limiting factor for performance. Workloads that insert\
    \ data are CPU-bound before they become memory-bound.\n\nDataStax recommends that\
    \ you use dedicated hardware, with an ideal CPU count of 16 processors.\n\n###\
    \ Network Considerations\n\nCassandra is a distributed database, and therefore\
    \ the network needs to transmit vast chunks of data for both the read and write\
    \ activity and for data replication. The recommended bandwidth for the network\
    \ is 1GB or higher.\n\n### Choosing Storage\n\nOptimal storage choices include\
    \ the type of storage, such as `SAN` and other storage types, as well as the size\
    \ of the storage capacity. Understanding how Cassandra uses storage also helps\
    \ in making optimal storage choices.\n\nCassandra can make smart use of the high\
    \ IOPs offered by `SSD`. Let's say you have a set of tables whose data you only\
    \ read rarely. You can use `SSD`s for frequently used column families to increase\
    \ the I/O speed and use normal storage drives for the infrequently accessed data.\n\
    \n#### NFS, SAN, and NAS Not Advisable\n\nDataStax recommends that you not use\
    \ `SAN`, `NDFS`, or `NAS` storage for Cassandra environments. DataStax also recommends\
    \ that you not use `SAN` or `NAS` storage for an on-premise Cassandra cluster.\n\
    \n`SAN` isn't advisable due to the following reasons:\n\n*   `SAN`'s return on\
    \ investment isn't attractive in a Cassandra environment, as you keep scaling\
    \ the cluster.\n*   Since Cassandra's I/O is often higher than the ability of\
    \ the array controller, `SAN` becomes a bottleneck, or even worse, becomes a single\
    \ point of failure.\n*   Despite `SSD` and high-speed networks, `SAN` adds latency\
    \ to Cassandra's operations.\n*   `SAN` transport, occurring simultaneously with\
    \ Cassandra traffic, can saturate your network, causing problems to all network\
    \ users.\n\nIf you must use `SAN`, you need expertise in investigating issues\
    \ such as `SAN` fiber saturation.\n\nNetwork-attached storage (`NAS`) devices\
    \ are not recommended because they cause network bottlenecks due to high I/O wait\
    \ times for reads and writes. The bottlenecks may stem from router latency as\
    \ well as issues with the network interface cards (`NIC`s) .\n\nFinally, DataStax\
    \ does not recommend Network File System (`NFS`) storage due to its inconsistent\
    \ behavior during the deletion and moving of files.\n\n#### How Cassandra Uses\
    \ Disk Storage\n\nThe key to understanding Cassandra's storage requirements is\
    \ to understand how and when Cassandra writes data to disk. Cassandra writes data\
    \ to disk under the following scenarios:\n\n*   When it writes to the commit log\n\
    *   When it flushes `memtables` to `SSTable` data files\n*   When it periodically\
    \ compacts the `SSTables` (compaction temporarily increases disk usage)\n\n####\
    \ Compaction and Storage Requirements\n\nCompaction requires enough free space\
    \ on disk to complete the compaction work. The storage requirements for compaction\
    \ depend on the size of all your `SSTables`, as well as the compaction strategy\
    \ you adopt.\n\nIn the worst case, when you use the compaction strategy called\
    \ `SizeTieredCompactionStrategy`, you need free storage space that is 50 percent\
    \ of the sum of all the `SSTables` that the database is compacting.\n\nI'll explain\
    \ the storage requirements for compaction in Chapter [11](#A436674_1_En_11_Chapter.html).\n\
    \n#### Estimating Usable Disk Capacity\n\nCassandra uses disk storage mostly for\
    \ storing the commit log and the data directories, the latter of which stores\
    \ the `SSTable` data. In addition to this, it requires some free storage to perform\
    \ compaction work. Ideally, you should store the commit log on a different storage\
    \ drive from where you store the data directories.\n\nYou can use the following\
    \ method to calculate the total usable storage capacity of your cluster.\n\n1.\
    \  Calculate the total raw capacity of the physical disks.\n\n    ```\n    raw-capacity\
    \ – size of disk * number of disks per server\n    Example: 12 disks * 7.2 TB\
    \ = 86.4 TB\n    ```\n\n2.  Calculate the usable disk space by deducting 10% for\
    \ formatting overhead.\n\n    ```\n    formatted disk space – raw capacity * 0.9\n\
    \    Example: 86.4 * 0.9 = 76.76 TB\n    ```\n\n3.  Since Cassandra requires disk\
    \ storage for compaction and repair operations, you can't use all of a disk's\
    \ formatted disk space for the commit log and the data directories. DataStax recommends\
    \ that you allocate only 50-80 percent of a storage drive's capacity for storing\
    \ data and leave the rest for compaction activity. In this case, I have about\
    \ 77TB of formatted disk space, so I can use anywhere between 38.5TB to 62TB of\
    \ it for storing data (`SSTables` + commit log).\n\n### Choosing Production Settings\
    \ for a Linux Server\n\nAs mentioned earlier, this book uses Linux servers for\
    \ running a Cassandra cluster. You can run Cassandra on most Linux versions. I\
    \ use an Ubuntu 16.04 LTS server for all the work in this book.\n\n#### Java Version\n\
    \nYou must use the latest version of Java, and you can use either the Oracle Java\
    \ Platform or `OpenJDK`. I use the Oracle Java Platform, Standard Edition 8 `JDK`.\n\
    \n#### Linux Server and Kernel Settings\n\nTo optimize an Apache Cassandra installation,\
    \ follow DataStax's recommendations, which I explain in the following sections.\n\
    \n#### Synchronize the Clock and Enable NTP\n\nCassandra overwrites a column only\
    \ if there's a newer version with a more recent timestamp. Synchronizing the clocks\
    \ on all the nodes of a cluster is thus critical. You can use `NTP` (Network Time\
    \ Protocol ) or another method for synchronizing the clocks.\n\nYou must set up\
    \ one of the cluster's servers as an `NTP` server if your cluster doesn't have\
    \ access to the Internet. Synchronize the network time on all the cluster's nodes\
    \ by enabling the `NTP` daemon through editing the `/etc/sysconfig/ntpd` file.\n\
    \n#### Disable the zone_reclaim_mode on NUMA Systems\n\nTo avoid potential performance\
    \ problems, you must disable the `zone_reclaim_mode`. You can check if the mode\
    \ is enabled by doing this:\n\n```\n$ cat /proc/sys/vm/zone_reclaim_mode\n\n$\n\
    ```\n\nIf the output is not a zero , disable the mode with the following command:\n\
    \n```\n$ echo 0 > /proc/sys/vm/zone_reclaim_mode\n```\n\n#### TCP Settings\n\n\
    You need to bump up the default TCP settings, which are adequate only for a small\
    \ setup. For a busy production environment, with hundreds or thousands of concurrent\
    \ connections, you need to set the following values for the TCP parameters by\
    \ editing the `/etc/sysctl.conf` file:\n\n```\nnet.core.rmem_max = 16777216\n\
    net.core.wmem_max = 16777216\nnet.core.rmem_default = 16777216\nnet.core.wmem_default\
    \ = 16777216\nnet.core.optmem_max = 40960\nnet.ipv4.tcp_rmem = 4096 87380 16777216\n\
    net.ipv4.tcp_wmem = 4096 65536 16777216\n```\n\nYou must reboot the Linux server\
    \ for the new TCP settings to go into effect. If you want to change the settings\
    \ without restarting the server, you can issue the following command:\n\n```\n\
    $ sudo sysctl –p /etc/sysctl.conf\n```"
  raw: "### Choosing Memory\n\nRegardless of whether you use virtual or dedicated\
    \ hardware, you need to ensure that you have enough memory for your production\
    \ Cassandra environments. Although Cassandra needs only a minimum of 8GB of RAM,\
    \ the server should have at least 64GB to 512GB of RAM.\n\nThere is no “ideal”\
    \ amount of RAM for a Cassandra node. The amount of memory depends on the amount\
    \ of data that the node will process. Remember that data writes first go to tables\
    \ in memory (memtables) and from there to the SSTables that live on disk.\n\n\
    If a Cassandra node has too little memory, it’ll end up with smaller memtables,\
    \ meaning that the database must flush a larger number of SSTables to disk. This\
    \ means that queries will need to perform the more expensive disk I/O to read\
    \ a large number of files on disk. The bottom line is that the more RAM you can\
    \ purchase, the better.\n\n### Choosing CPUs\n\nCassandra is optimized for writing,\
    \ so the CPU is the limiting factor for performance. Workloads that insert data\
    \ are CPU-bound before they become memory-bound.\n\nDataStax recommends that you\
    \ use dedicated hardware, with an ideal CPU count of 16 processors.\n\n### Network\
    \ Considerations\n\nCassandra is a distributed database, and therefore the network\
    \ needs to transmit vast chunks of data for both the read and write activity and\
    \ for data replication. The recommended bandwidth for the network is 1GB or higher.\n\
    \n### Choosing Storage\n\nOptimal storage choices include the type of storage,\
    \ such as SAN and other storage types, as well as the size of the storage capacity.\
    \ Understanding how Cassandra uses storage also helps in making optimal storage\
    \ choices.\n\nCassandra can make smart use of the high IOPs offered by SSD . Let’s\
    \ say you have a set of tables whose data you only read rarely. You can use SSDs\
    \ for frequently used column families to increase the I/O speed and use normal\
    \ storage drives for the infrequently accessed data.\n\n#### NFS, SAN, and NAS\
    \ Not Advisable\n\nDataStax recommends that you not use SAN, NDFS, or NAS storage\
    \ for Cassandra environments. DataStax also recommends that you not use SAN or\
    \ NAS storage for an on-premise Cassandra cluster.\n\nSAN isn’t advisable due\
    \ to the following reasons:\n\n*   SAN’s return on investment isn’t attractive\
    \ in a Cassandra environment, as you keep scaling the cluster.\n*   Since Cassandra’s\
    \ I/O is often higher than the ability of the array controller, SAN becomes a\
    \ bottleneck, or even worse, becomes a single point of failure.\n*   Despite SSD\
    \ and high-speed networks, SAN adds latency to Cassandra’s operations.\n*   SAN\
    \ transport, occurring simultaneously with Cassandra traffic, can saturate your\
    \ network, causing problems to all network users.\n\nIf you must use SAN, you\
    \ need expertise in investigating issues such as SAN fiber saturation.\n\nNetwork-attached\
    \ storage (NAS) devices are not recommended because they cause network bottlenecks\
    \ due to high I/O wait times for reads and writes. The bottlenecks may stem from\
    \ router latency as well as issues with the network interface cards (NICs) .\n\
    \nFinally, DataStax does not recommend Network File System (NFS) storage due to\
    \ its inconsistent behavior during the deletion and moving of files.\n\n#### How\
    \ Cassandra Uses Disk Storage\n\nThe key to understanding Cassandra’s storage\
    \ requirements is to understand how and when Cassandra writes data to disk. Cassandra\
    \ writes data to disk under the following scenarios:\n\n*   When it writes to\
    \ the commit log\n*   When it flushes memtables to SSTable data files\n*   When\
    \ it periodically compacts the SSTables (compaction temporarily increases disk\
    \ usage)\n\n#### Compaction and Storage Requirements\n\nCompaction requires enough\
    \ free space on disk to complete the compaction work. The storage requirements\
    \ for compaction depend on the size of all your SSTables, as well as the compaction\
    \ strategy you adopt.\n\nIn the worst case, when you use the compaction strategy\
    \ called SizeTieredCompactionStrategy, you need free storage space that is 50\
    \ percent of the sum of all the SSTables that the database is compacting.\n\n\
    I’ll explain the storage requirements for compaction in Chapter [11](#A436674_1_En_11_Chapter.html).\n\
    \n#### Estimating Usable Disk Capacity\n\nCassandra uses disk storage mostly for\
    \ storing the commit log and the data directories, the latter of which stores\
    \ the SSTable data. In addition to this, it requires some free storage to perform\
    \ compaction work. Ideally, you should store the commit log on a different storage\
    \ drive from where you store the data directories.\n\nYou can use the following\
    \ method to calculate the total usable storage capacity of your cluster.\n\n1.\
    \  Calculate the total raw capacity of the physical disks.\n\n    ```\n    raw-capacity\
    \ – size of disk * number of disks per server\n    Example: 12 disks * 7.2 TB\
    \ = 86.4 TB\n    ```\n\n2.  Calculate the usable disk space by deducting 10% for\
    \ formatting overhead.\n\n    ```\n    formatted disk space – raw capacity * 0.9\n\
    \    Example: 86.4 * 0.9 = 76.76 TB\n    ```\n\n3.  Since Cassandra requires disk\
    \ storage for compaction and repair operations, you can’t use all of a disk’s\
    \ formatted disk space for the commit log and the data directories. DataStax recommends\
    \ that you allocate only 50-80 percent of a storage drive’s capacity for storing\
    \ data and leave the rest for compaction activity. In this case, I have about\
    \ 77TB of formatted disk space, so I can use anywhere between 38.5TB to 62TB of\
    \ it for storing data (SSTables + commit log).\n\n### Choosing Production Settings\
    \ for a Linux Server\n\nAs mentioned earlier, this book uses Linux servers for\
    \ running a Cassandra cluster. You can run Cassandra on most Linux versions. I\
    \ use an Ubuntu 16.04 LTS server for all the work in this book.\n\n#### Java Version\n\
    \nYou must use the latest version of Java, and you can use either the Oracle Java\
    \ Platform or OpenJDK. I use the Oracle Java Platform, Standard Edition 8 JDK.\n\
    \n#### Linux Server and Kernel Settings\n\nTo optimize an Apache Cassandra installation,\
    \ follow DataStax’s recommendations, which I explain in the following sections.\n\
    \n#### Synchronize the Clock and Enable NTP\n\nCassandra overwrites a column only\
    \ if there’s a newer version with a more recent timestamp. Synchronizing the clocks\
    \ on all the nodes of a cluster is thus critical. You can use NTP (Network Time\
    \ Protocol ) or another method for synchronizing the clocks.\n\nYou must set up\
    \ one of the cluster’s servers as an NTP server if your cluster doesn’t have access\
    \ to the Internet. Synchronize the network time on all the cluster’s nodes by\
    \ enabling the NTP daemon through editing the `/etc/sysconfig/ntpd` file.\n\n\
    #### Disable the zone_reclaim_mode on NUMA Systems\n\nTo avoid potential performance\
    \ problems, you must disable the zone_reclaim_mode. You can check if the mode\
    \ is enabled by doing this:\n\n```\n$ cat /proc/sys/vm/zone_reclaim_mode\n\n$\n\
    ```\n\nIf the output is not a zero , disable the mode with the following command:\n\
    \n```\n$ echo 0 > /proc/sys/vm/zone_reclaim_mode\n```\n\n#### TCP Settings\n\n\
    You need to bump up the default TCP settings, which are adequate only for a small\
    \ setup. For a busy production environment, with hundreds or thousands of concurrent\
    \ connections, you need to set the following values for the TCP parameters by\
    \ editing the `/etc/sysctl.conf` file:\n\n```\nnet.core.rmem_max = 16777216\n\
    net.core.wmem_max = 16777216\nnet.core.rmem_default = 16777216\nnet.core.wmem_default\
    \ = 16777216\nnet.core.optmem_max = 40960\nnet.ipv4.tcp_rmem = 4096 87380 16777216\n\
    net.ipv4.tcp_wmem = 4096 65536 16777216\n```\n\nYou must reboot the Linux server\
    \ for the new TCP settings to go into effect. If you want to change the settings\
    \ without restarting the server, you can issue the following command:\n\n```\n\
    $ sudo sysctl –p /etc/sysctl.conf\n```"
  trans: "\n### 选择内存\n\n无论您使用虚拟机还是专用硬件，都需要确保为您的生产 Cassandra 环境配备足够的内存。尽管 Cassandra\
    \ 只需要最低 8GB 的 RAM，但服务器应至少配备 64GB 至 512GB 的 RAM。\n\n对于 Cassandra 节点，没有“理想”的 RAM\
    \ 容量。内存大小取决于节点将要处理的数据量。请记住，数据写入首先会进入内存中的表（`memtables`），然后再从那里写入到磁盘上的 `SSTables`。\n\
    \n如果 Cassandra 节点内存太少，其 `memtables` 会相应变小，这意味着数据库必须将更多的 `SSTables` 刷写到磁盘。这将导致查询需要执行更昂贵的磁盘\
    \ I/O 操作来读取磁盘上的大量文件。底线是，您能购买的 RAM 越多越好。\n\n### 选择 CPU\n\nCassandra 针对写入进行了优化，因此\
    \ CPU 是性能的限制因素。插入数据的工作负载在达到内存限制之前，会先达到 CPU 限制。\n\nDataStax 建议您使用专用硬件，理想的 CPU 数量为\
    \ 16 个处理器。\n\n### 网络考量\n\nCassandra 是一个分布式数据库，因此网络需要为读写活动以及数据复制传输大量数据块。建议的网络带宽为\
    \ 1GB 或更高。\n\n### 选择存储\n\n最佳的存储选择包括存储类型（如 `SAN` 和其他存储类型）以及存储容量的大小。了解 Cassandra\
    \ 如何使用存储也有助于做出最佳的存储选择。\n\nCassandra 可以充分利用 `SSD` 提供的高 IOPS。假设您有一组很少读取其数据的表。您可以将\
    \ `SSD` 用于常用的列族以提高 I/O 速度，并使用普通存储驱动器来存储不常访问的数据。\n\n#### 不建议使用 NFS、SAN 和 NAS\n\n\
    DataStax 建议您不要在 Cassandra 环境中使用 `SAN`、`NDFS` 或 `NAS` 存储。DataStax 还建议您不要在本地部署的\
    \ Cassandra 集群中使用 `SAN` 或 `NAS` 存储。\n\n不建议使用 `SAN` 的原因如下：\n*   在持续扩展集群的 Cassandra\
    \ 环境中，`SAN` 的投资回报率不高。\n*   由于 Cassandra 的 I/O 通常高于阵列控制器的处理能力，`SAN` 会成为瓶颈，甚至更糟，成为单点故障。\n\
    *   尽管使用了 `SSD` 和高速网络，`SAN` 仍会增加 Cassandra 操作的延迟。\n*   `SAN` 的传输与 Cassandra 流量同时发生，会使网络带宽饱和，给所有网络用户带来问题。\n\
    \n如果您必须使用 `SAN`，则需要具备调查诸如 `SAN` 光纤饱和等问题的专业知识。\n\n不推荐使用网络附加存储（`NAS`）设备，因为其读写操作的\
    \ I/O 等待时间过长，会导致网络瓶颈。这些瓶颈可能源于路由器延迟以及网络接口卡（`NIC`s）的问题。\n\n最后，DataStax 不推荐使用网络文件系统（`NFS`）存储，因为它在删除和移动文件时行为不一致。\n\
    \n#### Cassandra 如何使用磁盘存储\n\n理解 Cassandra 存储要求的关键在于了解 Cassandra 何时以及如何将数据写入磁盘。Cassandra\
    \ 在以下场景中将数据写入磁盘：\n*   写入提交日志时\n*   将 `memtables` 刷写为 `SSTable` 数据文件时\n*   定期压缩\
    \ `SSTables` 时（压缩操作会暂时增加磁盘使用量）\n\n#### 压缩与存储要求\n\n压缩需要磁盘上有足够的空闲空间来完成工作。压缩的存储要求取决于所有\
    \ `SSTables` 的大小以及您采用的压缩策略。\n\n在最坏的情况下，当您使用名为 `SizeTieredCompactionStrategy` 的压缩策略时，您需要相当于数据库正在压缩的所有\
    \ `SSTables` 总和 50% 的空闲存储空间。\n\n我将在第 11 章中解释压缩的存储要求。\n\n#### 估算可用磁盘容量\n\nCassandra\
    \ 主要使用磁盘存储来存放提交日志和数据目录，后者存储 `SSTable` 数据。除此之外，它还需要一些空闲存储来执行压缩工作。理想情况下，您应将提交日志存储在与数据目录不同的存储驱动器上。\n\
    \n您可以使用以下方法计算集群的总可用存储容量。\n\n1.  计算物理磁盘的总原始容量。\n    ```\n    原始容量 = 磁盘大小 * 每台服务器的磁盘数量\n\
    \    示例：12 块磁盘 * 7.2 TB = 86.4 TB\n    ```\n\n2.  扣除 10% 的格式化开销，计算可用磁盘空间。\n  \
    \  ```\n    格式化后的磁盘空间 = 原始容量 * 0.9\n    示例：86.4 * 0.9 = 76.76 TB\n    ```\n\n\
    3.  由于 Cassandra 需要磁盘存储空间用于压缩和修复操作，您不能将磁盘的所有格式化空间都用于提交日志和数据目录。DataStax 建议您仅将存储驱动器容量的\
    \ 50-80% 用于存储数据，其余部分留给压缩活动。在这种情况下，我大约有 77TB 的格式化磁盘空间，因此我可以在其中使用 38.5TB 到 62TB\
    \ 之间的任何空间来存储数据（`SSTables` + 提交日志）。\n\n### 为 Linux 服务器选择生产设置\n\n如前所述，本书使用 Linux\
    \ 服务器来运行 Cassandra 集群。您可以在大多数 Linux 版本上运行 Cassandra。本书中的所有工作均使用 Ubuntu 16.04 LTS\
    \ 服务器。\n\n#### Java 版本\n\n您必须使用最新版本的 Java，并且可以使用 Oracle Java 平台或 `OpenJDK`。我使用的是\
    \ Oracle Java 平台，标准版 8 `JDK`。\n\n#### Linux 服务器和内核设置\n\n要优化 Apache Cassandra 安装，请遵循\
    \ DataStax 的建议，我将在以下部分进行解释。\n\n#### 同步时钟并启用 NTP\n\n仅当存在带有更近时间戳的新版本时，Cassandra\
    \ 才会覆盖列。因此，同步集群中所有节点的时钟至关重要。您可以使用 `NTP`（网络时间协议）或其他方法来同步时钟。\n\n如果您的集群无法访问互联网，则必须将集群中的一台服务器设置为\
    \ `NTP` 服务器。通过编辑 `/etc/sysconfig/ntpd` 文件来启用 `NTP` 守护进程，从而同步所有集群节点的网络时间。\n\n####\
    \ 在 NUMA 系统上禁用 zone_reclaim_mode\n\n为避免潜在的性能问题，您必须禁用 `zone_reclaim_mode`。您可以通过以下方式检查该模式是否已启用：\n\
    ```\n$ cat /proc/sys/vm/zone_reclaim_mode\n$\n```\n如果输出不为零，请使用以下命令禁用该模式：\n```\n\
    $ echo 0 > /proc/sys/vm/zone_reclaim_mode\n```\n\n#### TCP 设置\n\n您需要提高默认的 TCP\
    \ 设置，这些默认设置仅适用于小型配置。对于繁忙的生产环境（具有数百或数千个并发连接），您需要通过编辑 `/etc/sysctl.conf` 文件来为 TCP\
    \ 参数设置以下值：\n```\nnet.core.rmem_max = 16777216\nnet.core.wmem_max = 16777216\n\
    net.core.rmem_default = 16777216\nnet.core.wmem_default = 16777216\nnet.core.optmem_max\
    \ = 40960\nnet.ipv4.tcp_rmem = 4096 87380 16777216\nnet.ipv4.tcp_wmem = 4096 65536\
    \ 16777216\n```\n您必须重新启动 Linux 服务器，新的 TCP 设置才能生效。如果您想在不重启服务器的情况下更改设置，可以发出以下命令：\n\
    ```\n$ sudo sysctl –p /etc/sysctl.conf\n```\n"
- fmt: "# User Resource Limits\n\nYou must set the following limits on various user\
    \ resources, in the `/etc/security/limits.conf` file:\n```\n - memlock unlimited\n\
    \ - nofile 100000\n - nproc 32768\n - as unlimited\n```\n\nIn addition, you also\
    \ need to include the following setting:\n```\nvm.max_map_count = 1048575\n```\n\
    \nIf you are using a Red Hat-based Linux server, you must also set the following\
    \ `nproc` limit in the `/etc/security/limits.d/90-nproc.conf` file:\n```\ncassandra_user\
    \  - nproc 32768\n```\n\n# PAM Security Settings\n\nFor many Linux versions, you\
    \ must enable the `pam_limits.so` module. You do this by uncommenting the following\
    \ line in the `/etc/pam.d/su` file:\n```\nsession  required  pam_limits.so\n```\n\
    \n# Setting the Java Heap Size\n\nTuning Java garbage collection (GC) is the single\
    \ biggest thing you can do to tune a Java application. Cassandra runs in a JVM,\
    \ so setting the right heap size is critical for performance.\n\nThere are several\
    \ Java garbage collection algorithms. The most common is the Concurrent-Mark Sweep\
    \ (CMS) garbage collector. However, in newer releases of Java, the G1 (Garbage\
    \ First) garbage collector is frequently the recommended garbage collection algorithm.\n\
    \nHere’s what you need to know about choosing the Java garbage collector:\n\n\
    *   CMS involves more time and effort to tune it, whereas G1 is easy to configure\
    \ and mostly tunes itself.\n*   CMS is more appropriate for fixed workloads and\
    \ G1 for workloads that are frequently changing, with the cluster running different\
    \ processes.\n*   For smaller environments that use a heap size that’s less than\
    \ 14GB and where latency is a major concern, the recommended collector is CMS.\n\
    *   For environments that use a heap size of between 14GB-64GB, G1 is better than\
    \ CMS. Unlike CMS, which stops all application threads during garbage collection,\
    \ the G1 garbage collector’s threads scan the heap’s regions and the collector\
    \ performs the heap compaction while the application threads are running.\n* \
    \  You must set the heap size to something between 0.25 and 0.5 of the total RAM\
    \ on the server running the Cassandra instances.\n\nChapter [11](#A436674_1_En_11_Chapter.html)\
    \ explains Java garbage collection in detail and shows how to review GC logs to\
    \ configure the optimum heap size for Cassandra.\n\n# Disabling Swap\n\nTo avoid\
    \ a high latency due to swapping under low free-memory conditions, you should\
    \ disable swap entirely. Here is how you do it:\n```\n$ sudo swapoff –all\n```\n\
    \nFor this change to survive a reboot, you must also remove the swap file related\
    \ entries from the `/etc/fstab` file.\n\nBy default, most Linux operating systems\
    \ come with a default swappiness setting of 60\\. If you set swappiness to zero,\
    \ Linux will avoid using the disk unless it runs out of memory, whereas setting\
    \ it to 100 means that the OS will instantly swap programs to disk. As you can\
    \ tell, a setting of 60 means that the OS will use the swap file on disk often,\
    \ starting from the time when the memory usage reaches around half the OS RAM\
    \ allocation. If you turn swappiness down to 10, for example, the OS will use\
    \ the swap file on disk only when the RAM usage is around 90 percent.\n\nThe Linux\
    \ administrator can change the system swappiness value by adding the following\
    \ to the `/etc/sysctl.conf` file:\n```\nvm.swappiness=10\n```\n\nThe administrator\
    \ must reboot the server for the new swappiness setting to take effect. There\
    \ is no fixed rule on how low you must set the swappiness level; many experts\
    \ recommend setting it to 1.\n\n# Setting the Limits\n\nLimit the cluster resources\
    \ that users can utilize by setting shell limits. You can do this by editing the\
    \ `/etc/security/limits.conf` file, which dictates the limits on how users can\
    \ use resources. You use the `limits.conf` file to configure “soft” and “hard”\
    \ limits on important operating system properties such as file sizes, the stack\
    \ size, and the priority levels (niceness) of processes.\n\nAdd the following\
    \ lines to your `/etc/security/limits.conf` file:\n```\nsoft nofile    32768\n\
    hard nofile    32768\nhard nproc     32768\nsoft nproc     32768\n```\n\nThe `nofile`\
    \ attribute limits the number of open descriptors per user process and `nproc`\
    \ specifies the maximum number of processes. The soft limit settings connote warnings\
    \ and the hard limit settings are the actual resource limits.\n\n# The Java Hugepages\
    \ Setting\n\nBy default, in most new Linux distributions, the transparent hugepages\
    \ feature is enabled, meaning that when handling transparent hugepages, the kernel\
    \ allocates memory in chunks sized 2MB each, rather than 4K. Sometimes, when dealing\
    \ with applications that allocate memory in 4K-sized pages, the server performance\
    \ takes a hit when the kernel needs to defragment the large 2MB pages, which are\
    \ fragmented by many tiny 4K pages.\n\nYou can avoid the performance hit due to\
    \ the defragmentation by disabling defrag for hugepages, as shown here:\n```\n\
    $ echo never | sudo tee /sys/kernel/mm/transparent_hugepage/defrag\n```\n\n# Installing\
    \ PDSH\n\nSince you’ll be managing multi-node clusters, it’s a good idea to acquire\
    \ a tool that can help you simultaneously run commands or send files to multiple\
    \ nodes. You can make cluster administration easy by using a tool such as `pdsh`\
    \ to simultaneously run commands on your entire cluster. I show you how to download,\
    \ install, and use this tool.\n\nThe `pdsh` utility is a variant of the `rsh`\
    \ command and is a high-performance parallel shell utility. Whereas `rsh` lets\
    \ you run commands on a single remote host, `pdsh` lets you simultaneously run\
    \ commands on multiple remote servers.\n\nWhen you need to issue the same command\
    \ across all the node of a Cassandra nodes, simply issue the command from a single\
    \ server using `pdsh`, and that’ll executes the command across the cluster.\n\n\
    You can issue several types of Linux commands across the cluster using `pdsh`,\
    \ including commands that view the contents of a file.\n\nYou can use `pdsh` by\
    \ issuing commands at the command line, or by running the tool interactively.\
    \ When run interactively, `pdsh` prompts you for commands and executes them when\
    \ a carriage return occurs. You can also specify your commands in a file.\n\n\
    The `pdsh` distribution also includes a parallel remote copy utility named `pdcp`,\
    \ which copies files from a local host to a group of remote hosts in parallel.\n\
    \nYou can install `pdsh` in the following manner:\n```\n# rpm –Uvh http://download.fedoraproject.org/pub/epel/6/i386/epel-release-6-8.noarch.rpm\n\
    # yum install pdsh\n```\n\nUsing `pdsh` to perform remote operations is straightforward.\
    \ Here’s an example that shows how to check the date on all nodes in a cluster,\
    \ by running a single command from any node in the cluster:\n```\n# pdsh –w \"\
    all_nodes\" date\n```\n\nThe parameter `all_nodes` points to a file that lists\
    \ all the nodes in the cluster. You can also exclude some servers if you wish\
    \ by specifying the appropriate option when issuing a `pdsh` command."
  raw: "#### User Resource Limits\n\nYou must set the following limits on various\
    \ user resources, in the `/etc/security/limits.conf` file:\n\n```\n - memlock\
    \ unlimited\n - nofile 100000\n - nproc 32768\n - as unlimited\n```\n\nIn addition,\
    \ you also need to include the following setting:\n\n```\nvm.max_map_count = 1048575\n\
    ```\n\nIf you are using a Red Hat-based Linux server, you must also set the following\
    \ nproc limit in the `/etc/security/limits.d/90-nproc.conf` file:\n\n```\ncassandra_user\
    \  - nproc 32768\n```\n\n#### PAM Security Settings\n\nFor many Linux versions,\
    \ you must enable the `pam_limits.so` module. You do this by uncommenting the\
    \ following line in the `/etc/pam.d/su` file:\n\n```\nsession  required  pam_limits.so\n\
    ```\n\n#### Setting the Java Heap Size\n\nTuning Java garbage collection (GC)\
    \ is the single biggest thing you can do to tune a Java application. Cassandra\
    \ runs in a JVM, so setting the right heap size is critical for performance.\n\
    \nThere are several Java garbage collection algorithms. The most common is the\
    \ Concurrent-Mark Sweep (CMS) garbage collector. However, in newer releases of\
    \ Java, the G1 (Garbage First) garbage collector is frequently the recommended\
    \ garbage collection algorithm.\n\nHere’s what you need to know about choosing\
    \ the Java garbage collector:\n\n*   CMS involves more time and effort to tune\
    \ it, whereas G1 is easy to configure and mostly tunes itself.\n*   CMS is more\
    \ appropriate for fixed workloads and G1 for workloads that are frequently changing,\
    \ with the cluster running different processes.\n*   For smaller environments\
    \ that use a heap size that’s less than 14GB and where latency is a major concern,\
    \ the recommended collector is CMS.\n*   For environments that use a heap size\
    \ of between 14GB-64GB, G1 is better than CMS. Unlike CMS, which stops all application\
    \ threads during garbage collection, the G1 garbage collector’s threads scan the\
    \ heap’s regions and the collector performs the heap compaction while the application\
    \ threads are running.\n*   You must set the heap size to something between 0.25\
    \ and 0.5 of the total RAM on the server running the Cassandra instances.\n\n\
    Chapter [11](#A436674_1_En_11_Chapter.html) explains Java garbage collection in\
    \ detail and shows how to review GC logs to configure the optimum heap size for\
    \ Cassandra.\n\n#### Disabling Swap\n\nTo avoid a high latency due to swapping\
    \ under low free-memory conditions, you should disable swap entirely. Here is\
    \ how you do it:\n\n```\n$ sudo swapoff –all\n```\n\nFor this change to survive\
    \ a reboot, you must also remove the swap file related entries from the `/etc/fstab`\
    \ file.\n\nBy default, most Linux operating systems come with a default swappiness\
    \ setting of 60\\. If you set swappiness to zero, Linux will avoid using the disk\
    \ unless it runs out of memory, whereas setting it to 100 means that the OS will\
    \ instantly swap programs to disk. As you can tell, a setting of 60 means that\
    \ the OS will use the swap file on disk often, starting from the time when the\
    \ memory usage reaches around half the OS RAM allocation. If you turn swappiness\
    \ down to 10, for example, the OS will use the swap file on disk only when the\
    \ RAM usage is around 90 percent.\n\nThe Linux administrator can change the system\
    \ swappiness value by adding the following to the `/etc/sysctl.conf` file:\n\n\
    ```\nvm.swappiness=10\n```\n\nThe administrator must reboot the server for the\
    \ new swappiness setting to take effect. There is no fixed rule on how low you\
    \ must set the swappiness level; many experts recommend setting it to 1.\n\n####\
    \ Setting the Limits\n\nLimit the cluster resources that users can utilize by\
    \ setting shell limits. You can do this by editing the `/etc/security/limits.conf`\
    \ file, which dictates the limits on how users can use resources. You use the\
    \ `limits.conf` file to configure “soft” and “hard” limits on important operating\
    \ system properties such as file sizes, the stack size, and the priority levels\
    \ (niceness) of processes.\n\nAdd the following lines to your `/etc/security/limits.conf`\
    \ file:\n\n```\nsoft nofile    32768\nhard nofile    32768\nhard nproc     32768\n\
    soft nproc     32768\n```\n\nThe `nofile` attribute limits the number of open\
    \ descriptors per user process and `nproc` specifies the maximum number of processes.\
    \ The soft limit settings connote warnings and the hard limit settings are the\
    \ actual resource limits.\n\n#### The Java Hugepages Setting\n\nBy default, in\
    \ most new Linux distributions, the transparent hugepages feature is enabled,\
    \ meaning that when handling transparent hugepages, the kernel allocates memory\
    \ in chunks sized 2MB each, rather than 4K. Sometimes, when dealing with applications\
    \ that allocate memory in 4K-sized pages, the server performance takes a hit when\
    \ the kernel needs to defragment the large 2MB pages, which are fragmented by\
    \ many tiny 4K pages.\n\nYou can avoid the performance hit due to the defragmentation\
    \ by disabling defrag for hugepages, as shown here:\n\n```\n$ echo never | sudo\
    \ tee /sys/kernel/mm/transparent_hugepage/defrag\n```\n\n### Installing PDSH\n\
    \nSince you’ll be managing multi-node clusters, it’s a good idea to acquire a\
    \ tool that can help you simultaneously run commands or send files to multiple\
    \ nodes. You can make cluster administration easy by using a tool such as pdsh\
    \ to simultaneously run commands on your entire cluster. I show you how to download,\
    \ install, and use this tool.\n\nThe pdsh utility is a variant of the `rsh` command\
    \ and is a high-performance parallel shell utility. Whereas `rsh` lets you run\
    \ commands on a single remote host, pdsh lets you simultaneously run commands\
    \ on multiple remote servers.\n\nWhen you need to issue the same command across\
    \ all the node of a Cassandra nodes, simply issue the command from a single server\
    \ using pdsh, and that’ll executes the command across the cluster.\n\nYou can\
    \ issue several types of Linux commands across the cluster using pdsh, including\
    \ commands that view the contents of a file.\n\nYou can use pdsh by issuing commands\
    \ at the command line, or by running the tool interactively. When run interactively,\
    \ pdsh prompts you for commands and executes them when a carriage return occurs.\
    \ You can also specify your commands in a file.\n\nThe pdsh distribution also\
    \ includes a parallel remote copy utility named pdcp, which copies files from\
    \ a local host to a group of remote hosts in parallel.\n\nYou can install pdsh\
    \ in the following manner:\n\n```\n# rpm –Uvh http://download.fedoraproject.org/pub/epel/6/i386/epel-release-6-8.noarch.rpm\n\
    # yum install pdsh\n```\n\nUsing pdsh to perform remote operations is straightforward.\
    \ Here’s an example that shows how to check the date on all nodes in a cluster,\
    \ by running a single command from any node in the cluster:\n\n```\n# pdsh –w\
    \ \"all_nodes\" date\n```\n\nThe parameter `all_` `nodes` points to a file that\
    \ lists all the nodes in the cluster. You can also exclude some servers if you\
    \ wish by specifying the appropriate option when issuing a `pdsh` command."
  trans: "# 用户资源限制\n\n您必须在 `/etc/security/limits.conf` 文件中为各类用户资源设置以下限制：\n```\n -\
    \ memlock unlimited\n - nofile 100000\n - nproc 32768\n - as unlimited\n```\n\n\
    此外，您还需要包含以下设置：\n```\nvm.max_map_count = 1048575\n```\n\n如果您使用的是基于 Red Hat 的 Linux\
    \ 服务器，还必须在 `/etc/security/limits.d/90-nproc.conf` 文件中设置以下 `nproc` 限制：\n```\ncassandra_user\
    \  - nproc 32768\n```\n\n# PAM 安全设置\n\n对于许多 Linux 版本，您必须启用 `pam_limits.so` 模块。这通过取消\
    \ `/etc/pam.d/su` 文件中以下行的注释来实现：\n```\nsession  required  pam_limits.so\n```\n\n\
    # 设置 Java 堆大小\n\n调整 Java 垃圾回收（GC）是优化 Java 应用程序最重要的单一措施。Cassandra 运行在 JVM 中，因此设置合适的堆大小对性能至关重要。\n\
    \nJava 有多种垃圾回收算法。最常见的是并发标记扫描（CMS）垃圾收集器。然而，在较新版本的 Java 中，G1（垃圾优先）垃圾收集器通常是推荐的垃圾回收算法。\n\
    \n关于选择 Java 垃圾收集器，您需要了解以下几点：\n\n*   CMS 需要更多时间和精力来调优，而 G1 易于配置且大多能自我调优。\n*   CMS\
    \ 更适合固定的工作负载，而 G1 更适合频繁变化、集群运行不同进程的工作负载。\n*   对于使用小于 14GB 堆大小且延迟是主要关注点的较小环境，推荐的收集器是\
    \ CMS。\n*   对于使用 14GB-64GB 之间堆大小的环境，G1 优于 CMS。与 CMS 在垃圾回收期间停止所有应用线程不同，G1 垃圾收集器的线程扫描堆的各个区域，收集器在应用程序线程运行时执行堆压缩。\n\
    *   您必须将堆大小设置为运行 Cassandra 实例的服务器总 RAM 的 0.25 到 0.5 之间。\n\n第 11 章详细解释了 Java 垃圾回收，并展示了如何查看\
    \ GC 日志以配置 Cassandra 的最佳堆大小。\n\n# 禁用交换空间\n\n为避免在低可用内存条件下因交换导致的高延迟，您应完全禁用交换空间。操作方法如下：\n\
    ```\n$ sudo swapoff –all\n```\n\n为使此更改在重启后依然生效，您还必须从 `/etc/fstab` 文件中移除与交换文件相关的条目。\n\
    \n默认情况下，大多数 Linux 操作系统的默认 `swappiness` 设置为 60。如果将 `swappiness` 设置为零，Linux 将避免使用磁盘，除非内存用尽；而将其设置为\
    \ 100 则意味着操作系统会立即将程序交换到磁盘。可以看出，设置为 60 意味着当内存使用量达到操作系统 RAM 分配的大约一半时，操作系统就会开始频繁使用磁盘上的交换文件。如果您将\
    \ `swappiness` 调低至 10，那么操作系统只会在 RAM 使用率达到约 90% 时才使用磁盘上的交换文件。\n\nLinux 管理员可以通过在\
    \ `/etc/sysctl.conf` 文件中添加以下内容来更改系统的 `swappiness` 值：\n```\nvm.swappiness=10\n\
    ```\n\n管理员必须重启服务器才能使新的 `swappiness` 设置生效。关于应将 `swappiness` 级别设置多低，并无固定规则；许多专家建议将其设置为\
    \ 1。\n\n# 设置资源限制\n\n通过设置 shell 限制来限制用户可以利用的集群资源。这可以通过编辑 `/etc/security/limits.conf`\
    \ 文件来实现，该文件规定了用户如何使用资源的限制。您使用 `limits.conf` 文件来配置重要操作系统属性（如文件大小、堆栈大小和进程优先级（niceness））的“软”限制和“硬”限制。\n\
    \n在您的 `/etc/security/limits.conf` 文件中添加以下行：\n```\nsoft nofile    32768\nhard nofile\
    \    32768\nhard nproc     32768\nsoft nproc     32768\n```\n\n`nofile` 属性限制每个用户进程的打开描述符数量，`nproc`\
    \ 指定最大进程数。软限制设置意味着警告，而硬限制设置是实际的资源限制。\n\n# Java 大页面设置\n\n默认情况下，在大多数新的 Linux 发行版中，透明大页面功能是启用的，这意味着在处理透明大页面时，内核以\
    \ 2MB 大小的块分配内存，而不是 4K。有时，对于使用 4K 大小页面分配内存的应用程序，当内核需要对被许多微小 4K 页面碎片化的大型 2MB 页面进行碎片整理时，服务器性能会受到影响。\n\
    \n您可以通过禁用大页面的碎片整理来避免因碎片整理导致的性能影响，如下所示：\n```\n$ echo never | sudo tee /sys/kernel/mm/transparent_hugepage/defrag\n\
    ```\n\n# 安装 PDSH\n\n由于您将管理多节点集群，获得一个能同时运行命令或向多个节点发送文件的工具是个好主意。通过使用像 `pdsh` 这样的工具在您的整个集群上同时运行命令，可以使集群管理变得简单。我将向您展示如何下载、安装和使用此工具。\n\
    \n`pdsh` 实用程序是 `rsh` 命令的一个变体，是一个高性能的并行 shell 实用程序。`rsh` 允许您在单个远程主机上运行命令，而 `pdsh`\
    \ 允许您同时在多个远程服务器上运行命令。\n\n当您需要在 Cassandra 节点的所有节点上发出相同的命令时，只需使用 `pdsh` 从单个服务器发出该命令，它就会在集群上执行该命令。\n\
    \n您可以使用 `pdsh` 发布几种类型的 Linux 命令，包括查看文件内容的命令。\n\n您可以通过在命令行发出命令来使用 `pdsh`，或者以交互方式运行该工具。交互运行时，`pdsh`\
    \ 会提示您输入命令，并在出现回车时执行它们。您也可以在文件中指定命令。\n\n`pdsh` 发行版还包括一个名为 `pdcp` 的并行远程复制实用程序，它将文件从本地主机并行复制到一组远程主机。\n\
    \n您可以通过以下方式安装 `pdsh`：\n```\n# rpm –Uvh http://download.fedoraproject.org/pub/epel/6/i386/epel-release-6-8.noarch.rpm\n\
    # yum install pdsh\n```\n\n使用 `pdsh` 执行远程操作非常简单。以下示例展示了如何通过从集群中的任何节点运行单个命令来检查集群中所有节点的日期：\n\
    ```\n# pdsh –w \"all_nodes\" date\n```\n\n参数 `all_nodes` 指向一个列出集群中所有节点的文件。您也可以在发出\
    \ `pdsh` 命令时通过指定适当的选项来排除某些服务器。"
- fmt: '## Initializing a Cassandra Multi-Node Cluster (Single and Multiple Datacenters)


    In Chapter [2](#A436674_1_En_2_Chapter.html), you learned how to configure a single-node
    Cassandra cluster. In this chapter, you’ll learn how to configure a multi-node
    Cassandra cluster, first with a single datacenter and later with multiple datacenters.


    In a multiple-node cluster, Cassandra automatically discovers nodes, so to set
    up a Cassandra cluster, you simply install Cassandra on all the nodes, as I show
    in the following section. Once you install Cassandra, you start the Cassandra
    instances, and they automatically form a cluster. All you need to do is to let
    each node know the IP addresses of the rest of the nodes; that’s it!


    As you can recall from Chapter [1](#A436674_1_En_1_Chapter.html), a datacenter
    is nothing but a grouping of nodes and represents a set of nodes that have the
    same replication properties. A datacenter can be logical or physical.


    In the discussion that follows, I create a Cassandra cluster from scratch. If
    you are instead turning a single-node cluster into a multi-node cluster, you must
    first stop the Cassandra server and clear the data, as explained in Chapter [2](#A436674_1_En_2_Chapter.html).


    The steps I show here will enable to you to install, configure, and run a multi-node
    cluster using a single datacenter. In order to set up a multi-node cluster with
    multiple datacenters, you follow the same steps but configure multiple datacenters
    in the `cassandra-rackdc.properties` file, as I explain later in this section.


    ### Prerequisites


    Before you can get your multi-node cluster going, you must take care of some prerequisites,
    as explained in the following sections.


    #### Configuring Firewall Port Access


    When you have a single-node cluster, the firewall access ports aren’t a big deal.
    In a multi-node cluster, you must ensure that if a firewall is running on the
    nodes hosting the Cassandra cluster, you must open several ports, including some
    Cassandra ports, to enable the ports to communicate among themselves.


    If you forget to open the ports after starting Cassandra on one of these nodes,
    the node won’t join the cluster and will act as a standalone Cassandra instance.


    There are three sets of ports you must open: public ports, Cassandra inter-node
    ports, and Cassandra client ports.


    ##### Public Ports


    Port Number `22`, which serves as the SSH port


    ##### Cassandra Inter-Node Ports


    Port `7000`: For Cassandra inter-node cluster communication


    Port `7001`: For Cassandra SSL inter-node cluster communication


    Port `7199`: For Cassandra JMX monitoring


    ##### Cassandra Client Ports


    Port `9042`: Cassandra native client port


    Port `9160`: Cassandra client port (Thrift)


    #### Selecting a Name for the Datacenter


    Before you create the multi-node cluster, select a naming convention for each
    datacenter and rack in the cluster. The datacenter name is a required parameter
    and serves to ensure that nodes that don’t belong to this datacenter don’t attempt
    to join it.


    Tip


    Once you assign a name for a datacenter, you can’t change it later.


    In this case, I select `datacenter1` as the name of the datacenter.


    #### Gathering the IP Addresses for All of the Nodes


    You need to get the IP addresses for all the nodes in the cluster. In this case,
    I have six nodes and their IP addresses are


    ```

    node0 192.168.177.132

    node1 192.168.177.133

    node2 192.168.177.134

    node3 192.168.177.135

    node4 192.168.177.136

    node5 192.168.177.137

    ```


    The six-node cluster will span two racks and there’s one datacenter.


    #### Selecting the Nodes to Serve as Seed Nodes


    A seed provider is one of the nodes in the cluster that helps Cassandra nodes
    to find each other and learn the topology of the ring. This is a required parameter
    for a multi-node cluster.


    You specify the seed nodes(s) for a cluster by configuring the `seed_provider`
    parameter in the `cassandra.yaml` file.


    You configure the `seed_provider` parameter by setting the value for the `seeds`
    attribute of this parameter, as shown here:


    ```

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    ```


    You provide the list of seed nodes as a comma-delimited set of IP addresses (“<ip1>,
    <ip2>, <ip3>”).


    You can make do with a single seed node per datacenter, but the best practice
    is to have more than one seed node. In this case, I chose to have two seeds, so
    my `seeds` attribute has the value


    ```

    "192.168.177.132,192.168.177.135"

    ```


    ### Configuring the Cluster


    You configure the cluster properties in the all-important `cassandra.yaml` file,
    which you can find in the `$CASSANDRA_HOME/conf` directory.


    As I mentioned in Chapter [2](#A436674_1_En_2_Chapter.html), there are hundreds
    of parameters you can configure in this file, but listing a bunch of them here
    doesn’t do you a whole lot of good. I therefore list a minimal set of properties
    to start the new cluster, meaning that the rest of the parameters will be using
    their default values. As you move through the rest of the chapters, you’ll find
    explanations for all the configuration parameters you can specify in the `cassandra.yaml`
    file.


    Set the following properties in the `cassandra.yaml` file for each node of the
    cluster. Alternatively, you can set the properties in one node and copy the file
    over to the nodes using the `pdsh` tool described earlier.


    #### The num_tokens Property


    The `num_tokens` property defines the number of tokens Cassandra assigns to a
    specific node. The higher the number of tokens relative to the rest of the nodes,
    the greater the amount of data this node will store. Since ideally all nodes are
    of equal size, you want all nodes to have the same number of tokens.


    Note


    The `initial_token` property is a legacy parameter that you must leave alone.
    If you specify the `initial_token` property, it’ll override the `num_tokens` property.


    The `num_tokens` property helps create virtual nodes or vnodes, which help break
    up the token range into many small ranges. Each Cassandra node is then assigned
    a set of the vnodes. Cassandra calculates the token ranges for each cluster node
    based on that node’s `num_tokens` value.


    Vnodes are especially useful when dealing with clusters that have machines with
    different configuration and capacities. You can assign more vnodes to machines
    that have more computing resources available by specifying a higher value for
    the `num_tokens` property for these nodes when compared to the rest of the nodes.


    Since vnodes help break up the token ring into multiple smaller ranges, they help
    load cluster operations more evenly across the nodes, and thus speed up several
    operations such as bootstrapping new nodes.


    The default as well as the recommended value for the `num_tokens` property is
    `256`.


    #### The –seeds Property


    I’ve already explained the `–seeds` property, which requires you to specify the
    internal IP address for the node(s) you’ve selected as the seed node(s).


    #### The listen_address Parameter


    The `listen_address` parameter refers to the IP address of the node. This is the
    network address to bind to and tell other Cassandra nodes to connect to. You can
    set this or leave it alone. If you don’t set this property, Cassandra gets the
    local address from the host, but sometimes it’s unable to get the correct address,
    in which case you must provide the `listen_address` in the `cassandra.yaml` file.


    You must not set the value `0.0.0.0` for the `listen_address` property.'
