    \ seconds\n    $\n    ```\n\n2.  The next step is to delete all references to\
    \ the datacenter you want to remove. You do this by modifying all the keyspaces\
    \ in the cluster with the `ALTER KEYSPACE` command so they don’t point to the\
    \ removed datacenter. The `ALTER KEYSPACE` command enables you to modify a keyspace’s\
    \ replication strategy, as well as the number of replicas that the database must\
    \ create in each datacenter. As explained in Chapter [4](#A436674_1_En_4_Chapter.html),\
    \ the `SimpleStrategy` assigns the same replication factor to the entire cluster\
    \ and therefore is suitable only for development and testing environments. You\
    \ must use the `NetworkTopologyStrategy` option for a production environment.\
    \ This strategy enables you to specify the replication factor per datacenter.\
    \ For example, if you removed datacenter1, you must ensure that you’re configuring\
    \ a different datacenter for all keyspaces in the cluster, as shown here:\n\n\
    \    ```\n    ALTER KEYSPACE cycling\n    WITH REPLICATION = {\n    'class'  :\
    \  'NetworkTopologyStrategy',\n    'datacenter2'  :  3 }\n    AND DURABLE_WRITES\
    \ = true ;\n    ```\n\n3.  Finally, run the `nodetool decommission` command on\
    \ each of the nodes of the datacenter you wish to remove from the cluster.\n\n\
    ## Switching Snitches\n\nA key point concerning switching of snitches is whether\
    \ the topology of your cluster will change following a change in the snitch. The\
    \ replication strategy places replicas on the basis of the information provided\
    \ by the snitches, since the function of a snitch is to tell Cassandra how to\
    \ distribute the replicas. When the new snitch you are configuring places replicas\
    \ in different places, there are topology changes (that is, a change in either\
    \ the datacenter or rack, or both, where Cassandra places the nodes).\n\nSometimes\
    \ there’s a change in the network topology and sometimes, not. I address both\
    \ cases in the following sections."
  trans: "# 替换运行中的节点\n\n偶尔，你可能需要出于维护目的而替换一个状态良好的节点。有两种方法可以替换节点：\n\n*   添加新节点，然后停用你想替换的节点。\n\
    *   直接替换节点。\n\n我将在后续章节中解释这两种方法。\n\n## 先添加新节点，然后停用旧节点\n\n通过先添加新节点来替换节点的方法很直接。以下是执行此操作的高级步骤。\n\
    \n1.  按照“添加新节点”部分的说明添加一个节点。\n2.  添加新节点后，按照“停用节点”部分的说明，通过运行 `nodetool decommission`\
    \ 命令来停用旧节点。\n3.  在所有属于同一数据中心的节点上运行 `nodetool cleanup` 命令。\n\n## 直接替换节点\n\n上一节解释的方法涉及两次数据流传输或运行\
    \ `nodetool cleanup` 命令。你可以简单地通过 `-Dcassandra.replace_address` 选项启动新节点来完成相同的任务。\n\
    \n要使用此技术，你必须确保没有对任何键空间使用 `ONE` 一致性级别。这意味着该节点可能拥有某一行的唯一副本，因此你有丢失该数据的风险。\n\n以下是直接替换节点的步骤。\n\
    \n*   首先，在你打算替换的节点上停止 Cassandra。\n*   按照“替换故障节点”部分的步骤，用另一个节点替换该节点。\n\n如果你要替换的节点恰好是一个种子节点，你必须从\
    \ `cassandra.yaml` 文件的 `-seeds` 列表中删除故障节点的 IP 地址。当然，你必须为集群中的所有节点执行此操作。如果你需要新节点（或另一个现有节点）来替代故障的种子节点，请将该节点的\
    \ IP 地址添加到 `–seeds` 列表中。\n\n# 从集群中移除节点\n\n如果你要移除的节点状态良好且正在运行，只需运行 `nodetool decommission`\
    \ 命令即可将其从集群中移除。但是，如果节点已宕机，你当然无法停用它，这时你需要运行 `nodetool removenode` 命令来移除该节点。\n\n\
    你可以通过指定要移除节点的主机 ID 来使用 `nodetool removenode` 命令移除节点。\n\n```\n$ nodetool removenode\
    \ 192.168.159.130\n```\n\n你可以通过运行 `nodetool removenode status` 命令来确认节点已被移除。\n\n\
    ```\n$ nodetool removenode status\n```\n\n# 替换故障节点\n\n节点可能因多种原因而故障，例如硬件故障。你可以通过运行\
    \ `nodetool status` 命令检查节点状态来判断节点是否故障。如果你看到状态为 `DN`，并且在日志中没有看到任何与配置相关的错误，那么是硬件故障或其他问题导致节点崩溃或无法启动。在这些情况下，你必须替换故障节点。\n\
    \n请按照以下步骤替换故障节点。\n\n1.  向你的网络中添加一个替换节点。\n2.  如果故障节点恰好是一个种子节点，请在 `seed_provider`\
    \ 属性下的 `-seeds` 列表中，用新节点的 IP 地址替换故障节点的 IP 地址。\n3.  重新启动新节点。\n4.  在新节点上安装 Cassandra。\n\
    5.  使用 `cluster_name` 和 `-seeds` 列表属性配置 `cassandra.yaml` 文件。\n6.  在新节点上，添加机架和数据中心配置。假设你使用的是\
    \ `GossipPropertyFileSnitch` 或 `Ec2MultiRegionSnitch`，请将机架和数据中心信息添加到 `cassandra-rackdc.properties`\
    \ 文件中。此外，删除 `cassandra-topology.properties` 文件。\n7.  使用 `replace_address` 选项启动替换节点，如“向数据中心添加新节点”部分所述，可以通过将\
    \ `replace_address` 选项添加到 `cassandra-env.sh` 文件，或者通过使用 `replace_address` 选项启动\
    \ Cassandra 来实现。\n\n# 将节点移动到不同的机架\n\n如果你发现将节点放错了机架，可以通过将节点移动到正确的机架和数据中心来修复错误。在这种情况下，Cassandra\
    \ 需要先将数据移出该节点，在更改节点所属的机架后，再将新数据加载到该节点中。\n\nDataStax 推荐的移动节点方法是停用你想移动到不同机架的节点。一旦你按“停用节点”部分所述将其停用，就可以将该节点添加到你希望的目标机架和数据中心。\n\
    \n# 停用整个数据中心\n\n当你停用一个数据中心时，你首先要通过阻止客户端向该数据中心节点写入数据来确保不会丢失任何数据。接下来，执行以下步骤以停用该数据中心。\n\
    \n1.  为确保所有数据都已传播到其他数据中心，请运行 `nodetool repair` 命令。\n\n    ```\n    $ nodetool\
    \ repair -full\n    [2017-07-15 11:50:07,969] Replication factor is 1\\. No repair\
    \ is needed for keyspace 'cycling'\n    ...\n    [2017-07-15 11:50:08,104] Starting\
    \ repair command #1 (6c43e1b0-698e-11e7-849e-0920617bbdc2), repairing keyspace\
    \ system_traces with repair options (parallelism: parallel, primary range: false,\
    \ incremental: false, job threads: 1, ColumnFamilies: [], dataCenters: [], hosts:\
    \ [], # of ranges: 512, pull repair: false)\n    [2017-07-15 11:50:12,699] Repair\
    \ completed successfully\n    [2017-07-15 11:50:12,710] Repair command #1 finished\
    \ in 4 seconds\n    $\n    ```\n\n2.  下一步是删除所有对要移除数据中心的引用。你可以通过使用 `ALTER KEYSPACE`\
    \ 命令修改集群中的所有键空间来实现这一点，使它们不再指向被移除的数据中心。`ALTER KEYSPACE` 命令允许你修改键空间的复制策略，以及数据库必须在每个数据中心创建的副本数量。如第\
    \ 4 章所述，`SimpleStrategy` 为整个集群分配相同的复制因子，因此仅适用于开发和测试环境。生产环境必须使用 `NetworkTopologyStrategy`\
    \ 选项。此策略允许你为每个数据中心指定复制因子。例如，如果你移除了 `datacenter1`，你必须确保为集群中的所有键空间配置一个不同的数据中心，如下所示：\n\
    \n    ```\n    ALTER KEYSPACE cycling\n    WITH REPLICATION = {\n    'class' \
    \ :  'NetworkTopologyStrategy',\n    'datacenter2'  :  3 }\n    AND DURABLE_WRITES\
    \ = true ;\n    ```\n\n3.  最后，在你希望从集群中移除的数据中心的每个节点上运行 `nodetool decommission`\
    \ 命令。\n\n# 切换嗅探器\n\n关于切换嗅探器的一个关键点是，在更改嗅探器之后，你的集群拓扑是否会发生变化。复制策略基于嗅探器提供的信息放置副本，因为嗅探器的作用是告诉\
    \ Cassandra 如何分布副本。当你配置的新嗅探器将副本放置在不同位置时，就会发生拓扑变化（即，Cassandra 放置节点的机架或数据中心，或两者都发生变化）。\n\
    \n有时网络拓扑会发生变化，有时则不会。我将在以下章节中讨论这两种情况。"
- fmt: "### No Topology Change\n\nIf there’s no data yet in the cluster, there’s no\
    \ need to change the network topology. You just set the new snitch, and that’s\
    \ that.\n\nFor example, you could go from five nodes using a single datacenter\
    \ using the `SimpleSnitch` to the same number of nodes in the same single datacenter\
    \ using a network snitch (for example, `GossipingPropertyFileSnitch`).\n\nHere\
    \ are the steps for switching snitches when there’s no topology change.\n\n1.\
    \  Create the appropriate properties file for denoting the datacenter and rack\
    \ information depending on the snitch you select, and place the file in the Cassandra\
    \ configuration directory on all nodes of the cluster. Note that the new snitch\
    \ isn’t enabled yet since the database is running with the snitch previously configured\
    \ in the `cassandra.yaml` file. The properties file could be one of the following:\n\
    \    *   `cassandra-rackdc.properties` file for the `GossipingPropertyFileSnitch`,\
    \ `Ec2Snitch`, and `Ec2MultiRegionSnitch` snitch types.\n    *   `cassandra-topology.properties`\
    \ file for all the other types of network snitches.\n2.  Update the value of the\
    \ `endpoint_snitch` property in the `cassandra.yaml` file on each node of the\
    \ cluster. In this example, it’s\n    ```yaml\n    endpoint_snitch: GossipingPropertyFileSnitch\n\
    \    ```\n3.  Start the nodes one at a time, so the changes you’ve made in the\
    \ `cassandra.yaml` file regarding the new network snitch type can come into effect.\n\
    \n### With Topology Changes\n\nIf there’s data in the cluster already, a topology\
    \ change occurs. When the topology changes, new datacenters may be added to the\
    \ cluster.\n\nLet’s consider the case where there’s no splitting of datacenters\
    \ into multiple datacenters (by creating new datacenters). You originally have\
    \ five nodes in a single cluster, all using the `SimpleSnitch`. You now change\
    \ to a new setup with a topology change by going to five nodes in the same single\
    \ datacenter, but with two racks, using the `RackInferringSnitch`.\n\nIn this\
    \ case, the topology changes (from one rack to two racks) but you’re not adding\
    \ any new datacenters. To switch the snitches, first perform the three steps from\
    \ the previous section. Following this, on each node of the cluster, run the `nodetool\
    \ repair` (sequential) and the `nodetool cleanup` commands.\n\nIf the topology\
    \ has changes and a new datacenter needs to be added, follow these steps:\n\n\
    1.  Create a new datacenter with the new nodes and racks, using the steps in the\
    \ “Creating a New Datacenter” section.\n2.  Replicate data into the new datacenter.\n\
    3.  Remove the nodes from the old datacenters and racks.\n4.  Run the `nodetool\
    \ repair` (sequential) and the `nodetool cleanup` commands on each of the cluster’s\
    \ nodes.\n\n**Note**\nIf you merely alter the type of snitch and replication,\
    \ and move some nodes to a new datacenter, you will be replicating data incorrectly.\n\
    \n## Managing Gossip\n\nYou can monitor and manage gossip with various `nodetool\
    \ gossip-`related commands.\n\n### Getting Information About Gossip\n\nYou can\
    \ get gossip information from the cluster by running the `nodetool gossipinfo`\
    \ command, as shown here:\n```bash\n$ nodetool gossipinfo\nubuntu/192.168.159.129\n\
    generation:1500142702\nheartbeat:7498\nSTATUS:16:NORMAL,-1270071350005996462\n\
    LOAD:7455:342204.0\nSCHEMA:12:0c912807-68bb-3cf6-91c3-ee14aba78ca6\nDC:8:datacenter1\n\
    RACK:10:rack1\nRELEASE_VERSION:4:3.10\nINTERNAL_IP:6:192.168.159.129\nRPC_ADDRESS:3:192.168.159.129\n\
    NET_VERSION:1:10\nHOST_ID:2:0dbb9e0e-867e-4179-b6b6-631d38dd68f9\nRPC_READY:28:true\n\
    TOKENS:15:\n/192.168.159.130\n...\n$\n```\n\n#### Disabling and Enabling Gossip\n\
    \nYou can effectively take a running node out of the cluster, without stopping\
    \ the instance, by disabling the gossip protocol on that node.\n\nExecute the\
    \ `nodetool disablegossip` command to disable the gossip protocol on a node, as\
    \ shown here:\n```bash\n$ nodetool disablegossip\n```\n\nYou can review the `system.log`\
    \ file to see that Cassandra has marked the node as down, after honoring your\
    \ request to stop gossip on this node:\n```log\nWARN  [RMI TCP Connection(2)-127.0.0.1]\
    \ 2017-07-15 13:31:47,640 StorageService.java:318 - Stopping gossip by operator\
    \ request\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,648 Gossiper.java:1506\
    \ - Announcing shutdown\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,658\
    \ StorageService.java:2248 - Node ubuntu/192.168.159.130 state jump to shutdown\n\
    ```\n\nIf you run the `nodetool status` command, it shows `UN` (UP NORMAL) as\
    \ the node’s mode. However, since you turned off gossip, the node isn’t in touch\
    \ with the rest of the cluster.\n\nYou can reenable gossip by running the `nodetool\
    \ enablegossip` command:\n```bash\n$ nodetool enablegossip\n```\n\nThe log shows\
    \ that Cassandra has started the gossip process.\n```log\nWARN  [RMI TCP Connection(6)-127.0.0.1]\
    \ 2017-07-15 13:42:28,187 StorageService.java:331 - Starting gossip by operator\
    \ request\nINFO  [RMI TCP Connection(6)-127.0.0.1] 2017-07-15 13:42:28,197 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to NORMAL\nWARN  [GossipTasks:1] 2017-07-15\
    \ 13:42:29,272 FailureDetector.java:288 - Not marking nodes down due to local\
    \ pause of 640151266291 > 5000000000\n```\n\n#### Checking the State of Gossip\n\
    \nYou can check whether gossip is running by executing the `nodetool statusgossip`\
    \ command, as shown here:\n```bash\n$ nodetool statusgossip\nRunning\n$\n$ nodetool\
    \ disablegossip\n$\n$ nodetool statusgossip\nnot running\n$\n```\n\n## Flushing\
    \ and Draining Data: The Differences\n\nBoth the `nodetool flush` and the `nodetool\
    \ drain` commands enable you to move data from memtables to disk, into SSTables.\
    \ However, there are differences between the two tools.\n\n### Draining a Node\n\
    \nIn situations such as when you’re getting ready to upgrade Cassandra, you want\
    \ to ensure that you flush all memtables to disk, into the SSTables. You run the\
    \ `nodetool drain` command to flush memtables to SSTables on disk.\n\nYou execute\
    \ the `nodetool drain` command as shown here:\n```bash\n$ nodetool drain\n```\n\
    \nThe log file shows the following:\n```log\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:54:58,272 StorageService.java:1435 - DRAINING: starting drain\
    \ process\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,274 HintsService.java:221\
    \ - Paused hints dispatch\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15\
    \ 13:54:58,279 Server.java:176 - Stop listening for CQL clients\nINFO  [RMI TCP\
    \ Connection(30)-127.0.0.1] 2017-07-15 13:54:58,280 Gossiper.java:1506 - Announcing\
    \ shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,311 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:55:00,714 StorageService.java:1435 - DRAINED\n```\n\nThe `nodetool\
    \ drain` command is interesting. When you run this command, Cassandra does other\
    \ things beyond just flushing the memtables to disk. It also stops listening for\
    \ any client requests for connections or connection requests from other nodes.\
    \ You can see this from Cassandra’s output when you first drain the node and then\
    \ try to enable gossip on it.\n```bash\n$ nodetool enablegossip\nnodetool: Unable\
    \ to start gossip because the node was drained.\nSee 'nodetool help' or 'nodetool\
    \ help <command>'.\n$\n```"
