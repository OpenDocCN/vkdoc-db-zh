    \ request\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,648 Gossiper.java:1506\
    \ - Announcing shutdown\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,658\
    \ StorageService.java:2248 - Node ubuntu/192.168.159.130 state jump to shutdown\n\
    ```\n\nIf you run the `nodetool status` command, it shows UN (UP NORMAL) as the\
    \ node’s mode. However, since you turned off gossip, the node isn’t in touch with\
    \ the rest of the cluster.\n\nYou can reenable gossip by running the `nodetool\
    \ enablegossip` command:\n\n```\n$ nodetool enablegossip\n```\n\nThe log shows\
    \ that Cassandra has started the gossip process.\n\n```\nWARN  [RMI TCP Connection(6)-127.0.0.1]\
    \ 2017-07-15 13:42:28,187 StorageService.java:331 - Starting gossip by operator\
    \ request\nINFO  [RMI TCP Connection(6)-127.0.0.1] 2017-07-15 13:42:28,197 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to NORMAL\nWARN  [GossipTasks:1] 2017-07-15\
    \ 13:42:29,272 FailureDetector.java:288 - Not marking nodes down due to local\
    \ pause of 640151266291 > 5000000000\n```\n\n#### Checking the State of Gossip\n\
    \nYou can check whether gossip is running by executing the `nodetool statusgossip`\
    \ command, as shown here:\n\n```\n$ nodetool statusgossip\nRunning\n$\n$ nodetool\
    \ disablegossip\n$\n$ nodetool statusgossip\nnot running\n$\n```\n\n## Flushing\
    \ and Draining Data : The Differences\n\nBoth the `nodetool flush` and the `nodetool\
    \ drain` commands enable you to move data from memtables to disk, into SSTables.\
    \ However, there are differences between the two tools.\n\n### Draining a Node\n\
    \nIn situations such as when you’re getting ready to upgrade Cassandra, you want\
    \ to ensure that you flush all memtables to disk, into the SSTables. You run the\
    \ `nodetool drain` command to flush memtables to SSTables on disk.\n\nYou execute\
    \ the `nodetool drain` command as shown here:\n\n```\n$ nodetool drain\n```\n\n\
    The log file shows the following:\n\n```\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:54:58,272 StorageService.java:1435 - DRAINING: starting drain\
    \ process\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,274 HintsService.java:221\
    \ - Paused hints dispatch\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15\
    \ 13:54:58,279 Server.java:176 - Stop listening for CQL clients\nINFO  [RMI TCP\
    \ Connection(30)-127.0.0.1] 2017-07-15 13:54:58,280 Gossiper.java:1506 - Announcing\
    \ shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,311 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:55:00,714 StorageService.java:1435 - DRAINED\n```\n\nThe `nodetool\
    \ drain command` is interesting. When you run this command, Cassandra does other\
    \ things beyond just flushing the memtables to disk. It also stops listening for\
    \ any client requests for connections or connection requests from other nodes.\
    \ You can see this from Cassandra’s output when you first drain the node and then\
    \ try to enable gossip on it.\n\n```\n$ nodetool enablegossip\nnodetool: Unable\
    \ to start gossip because the node was drained.\nSee 'nodetool help' or 'nodetool\
    \ help '.\n$\n```"
  trans: "\n### 无拓扑变更\n\n如果集群中尚无数据，则无需更改网络拓扑。你只需设置新的`snitch`即可。\n\n例如，你可以从使用`SimpleSnitch`的单数据中心五个节点，转变为在同一单数据中心使用网络`snitch`（例如`GossipingPropertyFileSnitch`）的相同数量节点。\n\
    \n以下是无拓扑变更时切换`snitch`的步骤。\n\n1.  根据你选择的`snitch`类型，创建用于标识数据中心和机架信息的相应属性文件，并将该文件放置在集群所有节点的\
    \ Cassandra 配置目录中。请注意，由于数据库仍在使用`cassandra.yaml`文件中先前配置的`snitch`运行，新的`snitch`尚未启用。属性文件可能是以下之一：\n\
    \    *   用于`GossipingPropertyFileSnitch`、`Ec2Snitch`和`Ec2MultiRegionSnitch`类型的`cassandra-rackdc.properties`文件。\n\
    \    *   用于所有其他类型网络`snitch`的`cassandra-topology.properties`文件。\n2.  更新集群中每个节点上`cassandra.yaml`文件中的`endpoint_snitch`属性值。在此示例中，它是：\n\
    \    ```yaml\n    endpoint_snitch: GossipingPropertyFileSnitch\n    ```\n3.  逐个启动节点，以便你在`cassandra.yaml`文件中关于新网络`snitch`类型的更改能够生效。\n\
    \n### 存在拓扑变更\n\n如果集群中已有数据，则会发生拓扑变更。当拓扑发生变化时，可能会向集群添加新的数据中心。\n\n让我们考虑一种情况，即没有将数据中心拆分为多个数据中心（通过创建新数据中心）。你最初在一个集群中有五个节点，都使用`SimpleSnitch`。你现在通过更改为使用`RackInferringSnitch`的同一单数据中心中的五个节点但有两个机架的新配置，来进行一次存在拓扑变更的更改。\n\
    \n在这种情况下，拓扑发生了变化（从一个机架变为两个机架），但你没有添加任何新的数据中心。要切换`snitch`，首先执行上一节中的三个步骤。随后，在集群的每个节点上运行`nodetool\
    \ repair`（顺序执行）和`nodetool cleanup`命令。\n\n如果拓扑有变化并且需要添加新的数据中心，请遵循以下步骤：\n\n1.  使用“创建新数据中心”部分中的步骤，用新节点和机架创建一个新的数据中心。\n\
    2.  将数据复制到新数据中心。\n3.  从旧数据中心和机架中移除节点。\n4.  在集群的每个节点上运行`nodetool repair`（顺序执行）和`nodetool\
    \ cleanup`命令。\n\n**注意**\n如果你仅仅更改`snitch`类型和复制策略，并将一些节点移动到新的数据中心，你将会错误地复制数据。\n\n\
    ## 管理 Gossip\n\n你可以使用各种`nodetool gossip-`相关的命令来监控和管理 gossip。\n\n### 获取关于 Gossip\
    \ 的信息\n\n你可以通过运行`nodetool gossipinfo`命令从集群获取 gossip 信息，如下所示：\n```bash\n$ nodetool\
    \ gossipinfo\nubuntu/192.168.159.129\ngeneration:1500142702\nheartbeat:7498\n\
    STATUS:16:NORMAL,-1270071350005996462\nLOAD:7455:342204.0\nSCHEMA:12:0c912807-68bb-3cf6-91c3-ee14aba78ca6\n\
    DC:8:datacenter1\nRACK:10:rack1\nRELEASE_VERSION:4:3.10\nINTERNAL_IP:6:192.168.159.129\n\
    RPC_ADDRESS:3:192.168.159.129\nNET_VERSION:1:10\nHOST_ID:2:0dbb9e0e-867e-4179-b6b6-631d38dd68f9\n\
    RPC_READY:28:true\nTOKENS:15:\n/192.168.159.130\n...\n$\n```\n\n#### 禁用和启用 Gossip\n\
    \n你可以通过在正在运行的节点上禁用 gossip 协议，有效地将其移出集群，而无需停止实例。\n\n执行`nodetool disablegossip`命令以在节点上禁用\
    \ gossip 协议，如下所示：\n```bash\n$ nodetool disablegossip\n```\n\n你可以查看`system.log`文件，看到在\
    \ Cassandra 响应了你停止该节点 gossip 的请求后，已将该节点标记为宕机：\n```log\nWARN  [RMI TCP Connection(2)-127.0.0.1]\
    \ 2017-07-15 13:31:47,640 StorageService.java:318 - Stopping gossip by operator\
    \ request\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,648 Gossiper.java:1506\
    \ - Announcing shutdown\nINFO  [RMI TCP Connection(2)-127.0.0.1] 2017-07-15 13:31:47,658\
    \ StorageService.java:2248 - Node ubuntu/192.168.159.130 state jump to shutdown\n\
    ```\n\n如果你运行`nodetool status`命令，它会显示节点模式为`UN`（UP NORMAL）。但是，由于你关闭了 gossip，该节点与集群的其他部分没有联系。\n\
    \n你可以通过运行`nodetool enablegossip`命令重新启用 gossip：\n```bash\n$ nodetool enablegossip\n\
    ```\n\n日志显示 Cassandra 已启动 gossip 进程。\n```log\nWARN  [RMI TCP Connection(6)-127.0.0.1]\
    \ 2017-07-15 13:42:28,187 StorageService.java:331 - Starting gossip by operator\
    \ request\nINFO  [RMI TCP Connection(6)-127.0.0.1] 2017-07-15 13:42:28,197 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to NORMAL\nWARN  [GossipTasks:1] 2017-07-15\
    \ 13:42:29,272 FailureDetector.java:288 - Not marking nodes down due to local\
    \ pause of 640151266291 > 5000000000\n```\n\n#### 检查 Gossip 状态\n\n你可以通过执行`nodetool\
    \ statusgossip`命令来检查 gossip 是否正在运行，如下所示：\n```bash\n$ nodetool statusgossip\nRunning\n\
    $\n$ nodetool disablegossip\n$\n$ nodetool statusgossip\nnot running\n$\n```\n\
    \n## 刷新与排干数据的区别\n\n`nodetool flush`和`nodetool drain`命令都使你能够将数据从内存表（memtables）移动到磁盘上的\
    \ SSTables 中。然而，这两个工具之间存在区别。\n\n### 排干节点\n\n在准备升级 Cassandra 等情况下，你需要确保将所有内存表刷新到磁盘上的\
    \ SSTables 中。你可以运行`nodetool drain`命令将内存表刷新到磁盘上的 SSTables。\n\n你执行`nodetool drain`命令如下所示：\n\
    ```bash\n$ nodetool drain\n```\n\n日志文件显示如下：\n```log\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:54:58,272 StorageService.java:1435 - DRAINING: starting drain\
    \ process\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,274 HintsService.java:221\
    \ - Paused hints dispatch\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15\
    \ 13:54:58,279 Server.java:176 - Stop listening for CQL clients\nINFO  [RMI TCP\
    \ Connection(30)-127.0.0.1] 2017-07-15 13:54:58,280 Gossiper.java:1506 - Announcing\
    \ shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1] 2017-07-15 13:54:58,311 StorageService.java:2248\
    \ - Node ubuntu/192.168.159.130 state jump to shutdown\nINFO  [RMI TCP Connection(30)-127.0.0.1]\
    \ 2017-07-15 13:55:00,714 StorageService.java:1435 - DRAINED\n```\n\n`nodetool\
    \ drain`命令很有趣。当你运行此命令时，Cassandra 除了将内存表刷新到磁盘之外，还会执行其他操作。它还会停止监听来自客户端的任何请求或来自其他节点的连接请求。你可以从\
    \ Cassandra 在你排干节点后尝试启用 gossip 时的输出中看到这一点。\n```bash\n$ nodetool enablegossip\n\
    nodetool: Unable to start gossip because the node was drained.\nSee 'nodetool\
    \ help' or 'nodetool help <command>'.\n$\n```\n"
- fmt: "## Flushing Data from Memtables\n\nYou can also flush memtables to SSTables\
    \ on disk by running the `nodetool flush` command. You can flush an entire node,\
    \ or a keyspace, or specific tables. It’s a good strategy to flush the memtables\
    \ to disk prior to taking a snapshot of the database, or one or more keyspaces.\n\
    \nHere’s the syntax of the `nodetool flush` command:\n\n```\n$ nodetool  flush\
    \ --   (  ... )\n```\n\nYou can flush all memtables to disk with the following\
    \ command:\n\n```\n$ nodetool flush\n```\n\nYou can also flush just one or more\
    \ keyspaces or tables. Here’s how you flush the memtables that belong to the cycling\
    \ keyspace:\n\n```\n$ nodetool flush cycling\n```\n\nUnlike the `nodetool drain`\
    \ command, the `nodetool flush` command just flushes memtables to disk and nothing\
    \ else. Thus, you’re better off using this command instead of the `nodetool drain`\
    \ command if all you need to do is to flush data to the SSTables.\n\nSo, should\
    \ you flush or drain? The `drain` command, as I explained, stops Cassandra from\
    \ listening to client requests and requests from the other nodes. You drain the\
    \ memtables when you want to shut down a node during maintenance and you want\
    \ the node to start up quicker. Since you flushed the memtables before the restart\
    \ of the node, the node doesn’t need to replay the commitlog following a restart.\n\
    \n## Maintaining Datacenters\n\nCommon datacenter-related maintenance tasks include\
    \ adding a datacenter to a cluster, migrating and renaming a cluster without a\
    \ service interruption, and decommissioning a datacenter.\n\n### Adding a Datacenter\
    \ to a Cluster\n\nSometimes you may need to add a datacenter to an existing cluster.\
    \ I show you the steps to do this in this section. When you’re done with the process,\
    \ the old and new datacenters will be replicating to each other.\n\nAt the very\
    \ end, you run the `nodetool rebuild` command, which operates on multiple nodes\
    \ and streams data from a single source replica to rebuild the token range. This\
    \ command helps you add the new datacenter to an existing cluster.\n\nHere are\
    \ the steps for adding a datacenter to a cluster:\n\n1.  Ensure that all the current\
    \ datacenters use `NetworkTopologyStrategy` as their replication strategy. If\
    \ they aren’t, run the `ALTER KEYSPACE` command to fix things. Tip: When adding\
    \ a datacenter to a cluster, don’t forget to update the keyspace replication strategies\
    \ for all keyspaces so they include the new datacenter.\n2.  Install Cassandra\
    \ software on all nodes of the new datacenter, but don’t start the Cassandra service\
    \ yet.\n3.  You must next configure some properties in the `cassandra.yaml` file\
    \ on all the nodes that belong to the new datacenter you’re adding. Make sure\
    \ that important configuration properties such as `-seeds` and `endpoint_snitch`\
    \ are the same on the new and current nodes. In addition, you must also configure\
    \ the allocation of the `vnode` tokens to the new nodes. The configuration settings\
    \ depend on the `vnode` selection algorithm.\n    *   Random Selection Algorithm:\
    \ Set the `num_tokens` property (recommended value is 256).\n    *   Allocation\
    \ Algorithm: Set the `num_tokens` property (recommended value is 8), as well as\
    \ the `allocate_tokens_for_local_replication_factor` property on all the nodes.\
    \ The recommended value for the latter property is one of the following:\n   \
    \     *   Highest replication factor for a keyspace in this datacenter\n     \
    \   *   Replication factor of the keyspace with the heaviest operations\n4.  Make\
    \ the following changes on each of the nodes that belong to the new datacenter.\n\
    5.  Specify the type of snitch in the appropriate properties file. You can’t use\
    \ the `SimpleSnitch` because that’s meant only for a single datacenter, due to\
    \ its inability to recognize datacenter (or rack) information. Depending on which\
    \ snitch you choose, you must make changes in the appropriate properties file:\n\
    \    *   `PropertyFileSnitch`: `cassandra-topology.properties` file\n    *   `GossipingPropertyFileSnitch`:\
    \ `cassandra-rackdc.properties` file\n6.  In the old datacenters, make the following\
    \ configuration changes:\n    *   On some of the existing nodes, add a seed node\
    \ from the new datacenter. You must restart the nodes on which you make this change\
    \ since you’ve modified the `cassandra.yaml` file.\n    *   In the appropriate\
    \ properties file (depends on the type of snitch), specify the new datacenter\
    \ definition.\n7.  Start Cassandra on each of the racks, and keep going until\
    \ you bring up all the nodes.\n8.  Once all nodes are up, alter the keyspaces\
    \ as follows:\n\n    ```\n    ALTER KEYSPACE \"my_ks\" WITH REPLICATION =\n  \
    \  {'class': 'NetworkTopologyStrategy', 'ExistingDC':3, 'NewDC':3};\n    ```\n\
    \n9.  Finally, run the `nodetool rebuild` command on each node in the new datacenter\
    \ you just added. You can specify several optional parameters when rebuilding\
    \ nodes, such as `keyspace_name`, `token_spec`, and `source_dc_name`. The `nodetool\
    \ rebuild` command rebuilds one or a set of keyspaces at a time by streaming data\
    \ from other nodes. You must specify the name of the keyspace to rebuild via the\
    \ `keyspace_name` property, as well as `token_spec`, a property that enables you\
    \ to specify a single token, a list of single tokens, or a range of tokens (`start_token`,\
    \ `end_token`). You can specify the `source-dc-name` with the `nodetool rebuild`\
    \ command. This attribute refers to the name of the datacenter that Cassandra\
    \ uses as the source for streaming. Cassandra can build from any datacenter, and\
    \ if you omit the name of the source datacenter, it randomly chooses a datacenter.\
    \ If the rebuild fails for any reason, you can restart it, at which time the process\
    \ resumes from where it had stopped. You can also do a selective rebuild by specifying\
    \ the `-ts` or `–token` options to specify either a list of tokens or a token\
    \ range (or ranges). The simplest invocation of the `nodetool rebuild` command\
    \ is:\n\n    ```\n    $ nodetool rebuild\n    ```\n\n### Decommissioning a Datacenter\n\
    \nDecommissioning a datacenter is the same as removing a datacenter. You can decommission\
    \ a datacenter without losing any data by following these steps.\n\n1.  Before\
    \ you start decommissioning the datacenter, ensure that clients aren’t writing\
    \ to any nodes in the datacenter. You can confirm that there are no pending write\
    \ requests in any node by running the following command:\n\n    ```\n    $ nodetool\
    \ tpstats\n    ```\n\n2.  Propagate the data from the datacenter you’re planning\
    \ to decommission by running a full repair with the following command:\n\n   \
    \ ```\n    $ nodetool repair -full\n    ```\n\n3.  Alter all keyspaces in the\
    \ database to make sure that none of them references the datacenter you’re decommissioning.\
    \ Let’s say you’ve three datacenters: `DC1`, `DC2`, and `DC3`. You’re removing\
    \ datacenter `DC3` from your cluster. You must therefore remove datacenter `DC3`\
    \ from all keyspace configurations. If you’ve set a replication factor for `DC3`\
    \ for any keyspace, run the `ALTER KEYSPACE` command, as shown here, to remove\
    \ the datacenter `DC3` from that keyspace’s configuration:\n\n    ```\n    cqlsh>\
    \ alter keyspace cycling WITH replication = {'class':\n    'NetworkTopologyStrategy',\
    \ 'DC1':1,'DC2':2};\n    ```\n\n4.  Run the `nodetool decommission` command on\
    \ all nodes of the datacenter you’re decommissioning.\n\n    ```\n    $ nodetool\
    \ decommission\n    ```\n\n5.  Once the decommissioning is completed, shut the\
    \ node down. You can confirm that all nodes in the datacenter were removed by\
    \ running the `nodetool status` command.\n\n## Handling Data Corruption\n\nCassandra\
    \ offers tools to check for corrupted data and to fix the data corruption by rebuilding\
    \ the table with the corrupted data.\n\nThe following sections show you how to\
    \ detect data corruption and to rebuild corrupted tables."
