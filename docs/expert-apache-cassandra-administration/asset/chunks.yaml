- fmt: "## Restricting the Repair to the Local Datacenter (vs. a Cluster-Wide Repair)\n\
    \nBy default, the `nodetool repair` command runs the repair process cluster wide,\
    \ that is, on every node that contains replicas regardless of the datacenters.\
    \ If you have three datacenters and a replication factor of 3, you’re asking the\
    \ repair process to build nine Merkel tables, causing your network and other resource\
    \ usage to spike.\n\nYou can limit repairs to specific datacenters or just the\
    \ local node where you run the repair command. Specify the `-dc` or `–in—dc` options\
    \ to limit repairs to specific datacenters. The following example shows how to\
    \ restrict the node repair just to the local datacenter DC1 by specifying the\
    \ `-dc` option:\n\n```\n$ nodetool repair -dc DC1\n```\n\n## Endpoint Range vs.\
    \ Subrange Repair\n\nBy default, Cassandra repairs all partition ranges on a node\
    \ or endpoint range. You can alternatively run a subrange repair by specifying\
    \ the `-st` (or `-start-token`) and the `-et` (or `-end-token`) options.\n\nA\
    \ subrange repair enables you to target partition ranges precisely to fix errors\
    \ but it requires generated token ranges.\n\n## When and How Often to Perform\
    \ an Anti-Entropy Repair\n\nThere are several situations that call for a node\
    \ repair, as I summarize here.\n\n*   Run it as a regular maintenance operation,\
    \ especially when there are frequent deletes in the database.\n*   Repair the\
    \ nodes where you have data that’s rarely read, since they don’t undergo read\
    \ repair.\n*   Run repairs on a node that you’ve recovered after a failure.\n\
    *   You must also run repair to recover missing data or when an SSTable is corrupted.\n\
    \nIdeally, you should run incremental repairs every day and a full repair less\
    \ frequently, like every month, unless you believe you need to do it more often.\
    \ A full repair is useful even when you don’t have any deletions of data since\
    \ it helps maintain data integrity.\n\nThe table property `gc_grace_seconds` has\
    \ a lot to with how frequently you repair a node. The `gc_grace_seconds` table\
    \ option specifies the length of time after the database marks data with a deletion\
    \ marker (called a tombstone) before making it eligible for deletion. By default,\
    \ the interval is 24 hours (864,000 seconds), which allows the database time to\
    \ maximize consistency before it deletes the data for good.\n\nThe reason Cassandra\
    \ delays the garbage collection (through configuring the value for garbage collection\
    \ grace seconds by setting the `gc_grace_seconds` property) is to let an unavailable\
    \ node have sufficient time to recover. If the node doesn’t come up within this\
    \ period, the database will consider it a failed node.\n\nSince the default value\
    \ of the `gc_grace_seconds` property is 24 hours, it’s a good idea to run the\
    \ repair daily so as to properly handle all deleted data. You can set a longer\
    \ interval for the `gc_grace_seconds` property for data that’s rarely deleted\
    \ or modified. In this case, you can perform the repair less frequently for these\
    \ tables.\n\n## Migrating to Incremental Repair\n\nAlthough incremental repair\
    \ is much more efficient than a full repair, the process could take a long time\
    \ the very first time because Cassandra needs to recompact all the SSTables. DataStax\
    \ recommends that you migrate your cluster one node a time to incremental repair.\
    \ The following steps show how to do the migration.\n\n1.  Disable autocompaction.\n\
    \    ```\n    $ nodetool disableautocompaction\n    ```\n2.  List the node’s SSTables\
    \ in a text file, such as `SSTable-names.txt`. You’ll find the SSTables under\
    \ the `/var/lib/cassandra/data` directory. In the `data` directory, there’s a\
    \ directory for each keyspace and it contains a list of files for each SSTable\
    \ in that keyspace. You need to list all the files with the SSTable data. These\
    \ files have the following format:\n    ```\n    ---Data.db\n    ```\n    The\
    \ following command helps you list all the `Data.db` files in a keyspace:\n  \
    \  ```\n    $ find '/homeuser/Datastax-ddc-3.2.0/data/keyspace1' -iname \"*Data.db*\"\
    \n    ```\n    The SSTable file list ( `.db` files) you generate will look like\
    \ the following:\n    ```\n    /data/cycling/cyclist_by_country-82246fc065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
    \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
    \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-2-big-Data.db\n\
    \    ```\n    Gathering the SSTables list in a text file helps you perform a batch\
    \ process to mark all SSTables in Step 5 as repaired.\n3.  Run a full repair on\
    \ just this node.\n    ```\n    $ nodetool repair\n    ```\n    By default, the\
    \ repair is full and sequential (not parallel).\n4.  Shut down the node.\n5. \
    \ Set the `repairedAt` flag on all SSTables to `–is-repaired` using the `sstablerepairedset`\
    \ command. Before you can run incremental repair, it is mandatory that you set\
    \ the repaired status of the SSTable.\n    ```\n    $ sudo sstablerepairedset\
    \ –really-set –is-repaired -f SSTble-names.txt\n    ```\n    The `sstablerepairedset`\
    \ tool sets the `repairedAt` status of one or more SSTables by marking the tables\
    \ as repaired or unrepaired. In this case, you used a file with a list of SSTable\
    \ files, but you could also specify an individual SSTable to mark the repair status\
    \ of a single table.\n6.  Once the repair is complete, restart the node.\n\nOnce\
    \ you migrate all the nodes in your cluster, you can perform incremental repairs\
    \ (with the `nodetool repair –inc` command) on each of the nodes.\n\n## Data Distribution\
    \ and Replication\n\nA replica is a copy of a table row. When Cassandra first\
    \ writes data to a table, it refers to it as a replica as well.\n\nData distribution\
    \ and replication are key topics that affect Cassandra performance. To understand\
    \ how Cassandra distributes data and replicates copies of that data across the\
    \ cluster, you need to understand the following topics:\n\n*   Virtual nodes\n\
    *   Replication strategies\n*   Partitioners and partitioning strategies\n*  \
    \ Snitches\n\nIn the following sections, I explain each of these crucial elements\
    \ of Cassandra data distribution and replication."
