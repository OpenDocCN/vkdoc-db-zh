  trans: "#### 创建 EC2 实例\n\n在“创建实例”部分，你会看到一个“启动实例”按钮。点击它以启动“启动实例”向导。\n\n这是创建 EC2 虚拟机的关键步骤。你可以通过不同方法为机器选择操作系统，例如下载\
    \ Amazon Machine Image (AMI)。如果你有自己的“黄金镜像”，甚至可以提供它。为了简化，这里我们将在 Ubuntu 服务器上运行集群，因此请选择“快速启动”菜单。\n\
    \n快速启动菜单包含创建 EC2 实例需要完成的六个步骤。\n\n1.  选择 Amazon Machine Image (AMI)：选择 Ubuntu 服务器\
    \ (Ubuntu 14.04 LTS)。\n2.  选择实例类型：使用本地 SSD，而不是 EBS 存储。这是一个测试集群，因此选择 `m3` 大小。`m3`\
    \ 大小不属于免费套餐，所以会产生少量费用。免费套餐的实例对于深入学习 Cassandra 来说配置过低。你的实例类型选择是 `m3.large`，这是一台拥有\
    \ 2 个核心、7.5GB RAM 和 32GB SSD 存储的机器。\n3.  配置实例详细信息：此步骤用于指定 EC2 实例的数量。配置一个三节点集群，因此在“实例数量”属性的值中填入\
    \ 3，其余属性（关机行为等）保持默认设置。\n4.  添加存储：此时你不需要任何额外存储，因此直接进入下一步。\n5.  标记实例：用键值对标记实例有助于轻松排序和查找实例，但你可以跳过此步骤，因为你只有三个\
    \ EC2 节点。\n6.  配置安全组：此步骤允许你配置一个安全组，即一组用于控制进出实例流量的防火墙规则。在此步骤中，执行以下操作：\n    *  \
    \ 选择“创建新的安全组”选项。\n    *   将安全组命名为 `MySecurityGroup`，并添加四条入站规则，如下所示：\n\n      \
    \  ```\n        类型              协议     端口范围        来源\n        SSH           \
    \   TCP      22             0.0.0.0/0 (允许来自任何地方)\n        自定义 TCP 规则   TCP   \
    \   7000-7001      0.0.0.0/0\n        自定义 TCP 规则   TCP      7199           0.0.0.0/0\n\
    \        自定义 TCP 规则   TCP      9042           0.0.0.0/0\n        自定义 TCP 规则  \
    \ TCP      9160           0.0.0.0/0\n        ```\n\n        这些端口与本章前面“配置端口”部分描述的端口相同。\n\
    7.  在实例创建的最后一步“审核实例启动”中，检查你的实例选择，然后按“启动”按钮，以便 AWS 为你创建实例。\n8.  一旦 AWS 启动实例，它会要求你选择在登录新实例时要输入的密钥对：\n\
    \n    ```\n    选择现有密钥对或创建新密钥对\n    ```\n\n    密钥对是 AWS 存储的公钥和你存储的私钥文件的组合。你使用密钥对安全地登录到你的实例。在新的\
    \ Ubuntu 服务器上，你的私钥文件使你能够通过 SSH 安全地登录到实例。\n\n**提示**\n\n安全地存储你的私钥文件（`.pem` 文件），因为丢失它意味着你需要终止所有实例并从头开始。\n\
    \n通过提供密钥对名称 `mykeypair` 创建一个新的密钥对，然后单击“下载密钥对”以下载私钥文件。此时，所有 EC2 实例都在运行，并且所有使用量的计费立即开始。在你完成与\
    \ Cassandra 的工作后关闭实例是个好主意，这样在你没有使用测试集群时就不会产生额外费用！\n\n你现在可以通过点击 EC2 控制台中的“实例”选项卡来查看实例。所有三个实例的“实例状态”列都将显示“正在运行”。通过选择三个实例中的任何一个，你可以获取该实例的描述，包括其公有\
    \ IP 地址。然后，你可以使用该实例的 IP 地址启动一个 Putty 会话。\n\n### 安装 Cassandra\n\n现在你的 AWS EC2 实例已经运行，是时候安装\
    \ Cassandra 了。请按照以下步骤在 AWS EC2 实例上安装、配置和启动 Cassandra。\n\n你在第 2 章中学到，你可以将 Cassandra\
    \ 安装为服务，也可以从二进制 tar 包安装。既然你已经学习了如何从 tar 包安装，那么学习如何将 Cassandra 安装为服务是个好主意。以下是安装\
    \ Cassandra 为服务必须遵循的步骤。\n\n1.  你可以从 Apache 或 DataStax 获取 Cassandra Debian 软件包。这里使用\
    \ DataStax 软件仓库，操作如下：\n\n    ```\n    $ echo \"deb http://debian.datastax.com/community\
    \ stable main\"| sudo tee –a /etc/apt/sources.list.d/cassandra.sources.list\n\
    \    ```\n\n2.  运行 `apt-get update` 命令。\n\n    ```\n    $ sudo apt-get update\n\
    \    ```\n\n3.  如果你收到任何关于没有 DataStax 软件仓库公钥的错误，你需要添加 DataStax 公共仓库密钥，如下所示，然后重新运行\
    \ `apt-get update` 命令。\n\n    ```\n    $ curl –L http://debian.datastax.com/debian/repo_key\
    \ | sudo apt-key add-\n    $ sudo apt-get update\n    ```\n\n4.  安装 Cassandra\
    \ 二进制文件。\n\n    ```\n    $ sudo apt-get install cassandra\n    ```\n\n    与第 2\
    \ 章中展示的二进制 tar 包安装方法（针对单实例）不同，将 Cassandra 安装为服务会自动启动 Cassandra 实例。如果你现在执行命令 `sudo\
    \ service cassandra status`，它将显示 cassandra 正在此节点上运行。\n5.  下一步是在其余的 EC2 实例上重复之前的三个步骤。一旦完成，你就可以运行\
    \ `nodetool status` 命令来检查 Cassandra 实例的状态。\n\n    ```\n    $ sudo nodetool status\n\
    \    Datacenter: datacenter1\n    =======================\n    Status=Up/Down\n\
    \    |/ State=Normal/Leaving/Joining/Moving\n    --  Address   Load   Tokens \
    \   Owns    Host ID     Rack\n    UN  192.168.177.132  123.84 MiB  256       \
    \   ?b0ade950-937a-457c-95eb-d3032897eeb1  rack1\n    Note: Non-system keyspaces\
    \ don't have the same replication settings, effective ownership information is\
    \ meaningless\n    $\n    ```\n\n三个 Cassandra 节点之间尚未进行通信。接下来让我们启用节点间通信。"
- fmt: '### Configuring the Cassandra Cluster


    On all three EC2 instances, edit the `cassandra.yaml` file and add the following
    properties:


    ```

    cluster_name: ''My AWS Cluster''

    seeds: "192.168.177.132"

    broadcast_address: 192.168.177.132

    listen_address:

    ```


    These are the same properties that I explained earlier when creating the six-node
    Cassandra cluster. As in the case of that cluster, I decided not to specify a
    value for the `listen_address` property and therefore I must specify a value for
    the `broadcast_address` property.


    Note


    Users often see the EC2 snitch and use it, since it’s designed for use in an AWS
    cluster. However, the recommended snitch to use is `GossipingPropertyFileSnitch`.


    Once you edit the `cassandra.yaml` file, restart the Cassandra service on all
    three nodes, making sure to remove all the system data:


    ```

    $ sudo service cassandra stop

    $ sudo rm –rf /var/lib/Casandra/data/system/*

    $ sudo service cassandra start

    ```


    Running the `nodetool status` command shows that all three nodes are running now,
    and that the new three-node AWS EC2-based Cassandra cluster is ready for use.


    ```

    INFO  22:20:27 Handshaking version with /192.168.177.135

    INFO  22:20:27 Node /192.168.177.135 has restarted, now UP

    INFO  22:20:27 InetAddress /192.168.177.135 is now UP

    INFO  22:20:27 Node /192.168.177.135 state jump to NORMAL

    INFO  22:20:27 Node /192.168.177.132 state jump to NORMAL

    INFO  22:20:27 Updating topology for /192.168.177.135

    INFO  22:20:27 Updating topology for /192.168.177.135

    INFO  22:20:27 Waiting for gossip to settle before accepting client requests...

    WARN  22:20:27 Not marking nodes down due to local pause of 11051514701 > 5000000000

    INFO  22:20:35 No gossip backlog; proceeding

    ```


    Once the cluster is up and running, everything works the same as in a non-AWS
    Cassandra cluster .


    ## Summary


    A successful cluster installation depends on satisfying prerequisites. Regardless
    of whether you create a local cluster or one in the cloud, you can start a cluster
    with a minimal set of configuration properties. As with the single-node installation
    from the previous chapter, once you learn how to start and stop the cluster, you
    can configure additional configuration properties as you learn about them in the
    following chapters. Cassandra comes with a large number of configuration knobs
    and each of the following chapters will introduce a few more configuration properties.


    # Part II


    The Data Model, Cluster Architecture, and the Cassandra Query Language


    # 4. Cassandra Data Modeling, and the Reading and Writing of Data


    Data modeling in Cassandra is different from traditional data modeling in a relational
    database in many ways. This chapter introduces you to the key aspects of Cassandra
    data modeling, wherein the queries you anticipate running in the database have
    a lot to do with how you structure your data inside tables.


    Data modeling involves identifying the types of data (entities) you want to store
    in a Cassandra database and the relationships among those data entities.


    The key to modeling data in a Cassandra database is to focus on the following
    two things:


    *   Identifying the data access patterns

    *   The queries you’re going to use


    These two ideas will determine how you organize your data, as well as how you
    design and create your database tables.


    Two things, queries and schema, determine the data organization. Queries are how
    you retrieve data from a database, and schema is how you arrange the data in the
    database tables. Cassandra’s query-driven approach means that specific queries
    that you plan to use are the foundation of how you organize data. You gain efficiency
    for reads and writes when you group data together on the nodes by partition. The
    fewer the partitions a query must read, the faster the response of the database
    to the query.


    This chapter explains in detail how Cassandra reads and writes data. Configurable
    consistency is a key Cassandra feature, and you’ll learn all about read and write
    consistency, and how to configure various levels of consistency. Cassandra is
    a partitioned row store with tunable consistency . Tunable consistency means that
    the client applications determine the consistency of the data they request from
    the database.


    Finally, this chapter explains the concepts of linearizable consistency and lightweight
    transactions, as well as how to ensure the atomicity of key operations with batch
    operations.


    ## Cassandra and Relational Databases: Major Differences


    Chapter 1 outlined the major differences between relational databases and Cassandra.
    Here, let’s review in some detail the differences between how Cassandra and relational
    databases approach data modeling.


    ### Data-Driven vs. Query-Driven Data Modeling


    Data modeling in a relational database is driven entirely by data. You can also
    say that relational data modeling is table-driven. Normalization theory rules
    the roost, and this theory requires that you not duplicate data.


    Once you normalize the data based on the tables and relationships among those
    tables, you write queries based on those tables and relationships. Typically,
    one table can serve multiple queries.


    Cassandra organizes its data quite differently from how a relational database
    does it. Queries and not data drive Cassandra’s data modeling methodology. This
    means that you organize your data based on the queries you expect that data to
    serve. You design your queries first and create your tables to satisfy those queries.
    You consider data duplication as quite normal, as a side effect of nesting data.


    Cassandra precomputes queries at write time, thus optimizing writes, which means
    you get optimized reads as a free by-product. Relational databases compute queries
    when reading data. They use expensive operations such as JOIN and ORDER BY. There
    are no such operations in a Cassandra database.


    ### Table Linkages and Referential Integrity


    In a relational database, you combine data from multiple relations to answer a
    query. Referential integrity is important. In Cassandra, you must nest all the
    data required to answer a query within the same table. Referential integrity is
    not an issue at all.


    ### Sort Differences


    By default, a relational database returns rows of data in the order in which it
    wrote them to disk. You can use an ORDER BY clause to change the default sort
    order .


    In Cassandra, you explicitly specify the sort order when you choose the clustering
    columns during the creation of a table.


    ### Duplicating Data


    As you’ll learn shortly, the traditional relational database strategy of denormalizing
    data to avoid duplication isn’t applicable to Cassandra. In a Cassandra database,
    you duplicate data where necessary to achieve more efficient reads. Cassandra
    capitalizes on the fact that storage costs are cheaper when compared to the cost
    of other components of the computational stack, such as CPU, memory, and network.


    You can store the same data multiple times in Cassandra. Unlike in relational
    databases, data duplication is treated as a blessing and not a curse. Relational
    databases try to put a lot of information into their tables since the databases
    use the same tables for many types of searches. However, in Cassandra, having
    many tables with similar data is a good thing.


    Remember that Cassandra is optimized for writes; it writes very fast to the storage
    system. Therefore, if you need to write the same data six times to disk, let it
    be so; multiple writes aren’t going to hurt you. Following a strategy of duplicating
    data (which involves more writes) to enhance the performance of the read queries
    is an inherently sound strategy in Cassandra.'
