    \ Cassandra 仍然提供`CREATE USER`、`ALTER USER`、`DROP USER`和`LIST USERS`命令，但你不应使用它们，因为它们在当前版本中已弃用。请改用`CREATE\
    \ ROLE`、`ALTER ROLE`、`DROP ROLE`、`LIST ROLES`和`LIST_PERMISSIONS`命令。\n\nCassandra\
    \ 仍然提供`CREATE USER`命令来创建新的数据库用户账户，但此命令已弃用，仅用于向后兼容目的。\n\nCassandra 不再正式使用“用户”一词来指代登录账户。因此，一个（登录）角色是用户的同义词。\n"
- fmt: "# Cassandra 认证与角色管理\n\n默认情况下，Cassandra 并不要求用户进行身份验证即可登录集群。这意味着，你可以直接输入 `cqlsh`\
    \ 而无需任何凭据，即可访问集群。\n\n## 创建角色\n\nCassandra 内置了一个名为 `cassandra` 的角色，其密码同样是 `cassandra`。这个默认角色\
    \ `cassandra` 拥有管理员权限。你也可以创建额外的登录角色并授予它们管理员权限。最佳实践是创建替代的管理员角色，更改默认角色 `cassandra`\
    \ 的密码，并且之后不再使用这个默认角色进行任何操作。\n\n只有通过拥有管理权限的角色（可以是默认角色 `cassandra` 或你创建的任何其他角色）登录，才能创建新角色。\n\
    \n当你首次以默认角色 `cassandra` 登录并尝试创建角色时，可能会遇到以下错误：\n\n```\n$ cqlsh 192.168.159.129\
    \ -u cassandra -p cassandra\nConnected to Test Cluster at 192.168.159.129:9042.\n\
    [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP\
    \ for help.\ncassandra@cqlsh> create role newrole with password 'newrole123';\n\
    SyntaxException: line 1:20 mismatched input 'withpassword' expecting EOF (create\
    \ user newuser [withpassword]...)\ncassandra@cqlsh> create role newrole with password\
    \ 'newrole123';\nInvalidRequest: Error from server: code=2200 [Invalid query]\
    \ message=\"org.apache.cassandra.auth.CassandraRoleManager doesn't support PASSWORD\"\
    \ncassandra@cqlsh> list users;\nUnauthorized: Error from server: code=2100 [Unauthorized]\
    \ message=\"You have to be logged in and not anonymous to perform this request\"\
    \ncassandra@cqlsh>\n```\n\n出现此错误的原因是你尚未在此数据库中配置身份验证。默认情况下，`cassandra.yaml` 文件中的身份验证选项被设置为：\n\
    \n```\nauthenticator: AllowAllAuthenticator\n```\n\n`AllowAllAuthenticator` 是默认的身份验证后端。如果你将\
    \ `AllowAllAuthenticator` 设置为 `authenticator` 属性的值，就会在数据库中禁用身份验证。Cassandra 不会执行任何检查，并允许任何人无需验证即可登录。\n\
    \n`AllowAllAuthenticator` 的替代方案是 `PasswordAuthenticator`。此身份验证后端将使用存储在数据库 `system_auth.credentials`\
    \ 表中的凭据来验证用户。\n\n因此，即使你以默认角色 `cassandra`（拥有管理员权限）登录数据库，当你尝试创建角色时，数据库会提示“你必须已登录且不能是匿名用户才能执行此请求”。`authenticator:\
    \ AllowAllAuthenticator` 选项允许所有用户，并且不检查你是否已登录。解决方案是为数据库配置身份验证，如下一节所述。\n\n## 配置身份验证\n\
    \n为了能够以管理员身份登录并创建角色或执行其他与角色相关的任务，请按照以下步骤配置身份验证。\n\n1.  将 `cassandra.yaml` 文件中的身份验证选项更改为\
    \ `PasswordAuthenticator`，如下所示：\n    ```\n    authenticator: PasswordAuthenticator\n\
    \    ```\n    此更改会强制 Cassandra 在客户端连接到集群时要求提供角色名和密码。\n\n2.  重启数据库。\n\n3.  使用默认超级用户\
    \ `cassandra` 的凭据登录 `cqlsh`。\n    ```\n    $ cqlsh -u cassandra -p cassandra\n\
    \    ```\n\n4.  系统键空间 `system_auth` 存储角色凭据。如果此键空间只有默认的单个副本，一旦该副本变得不可用，你可能会失去对集群的访问权限。因此，为了增强可用性，将\
    \ `system_auth` 表空间的复制因子提高到一个更高的值，例如每个数据中心 3 或 5，如下所示：\n    ```\n    cqlsh> ALTER\
    \ KEYSPACE \"system_auth\"\n    WITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
    \ 'dc1' : 5,\n    'dc2' : 3};\n    ```\n\n5.  为确保复制因子的更改在整个集群中生效，请对 `system_auth`\
    \ 键空间运行 `nodetool repair` 命令。\n    ```\n    $ nodetool repair system_auth\n  \
    \  ```\n\n6.  重启数据库。\n\n至此，你已经为数据库配置了身份验证，现在可以以 `cassandra/cassandra` 登录来执行与角色和权限相关的管理任务。\n\
    \n一旦按照上述步骤配置了身份验证，你必须始终指定超级用户的凭据。如果尝试像之前那样不带凭据登录，将会收到错误。\n\n```\n$ cqlsh 192.168.159.129\n\
    Connection error: ('Unable to connect to any servers', {'192.168.159.129': AuthenticationFailed('Remote\
    \ end requires authentication.',)})\n$\n```\n\n## 加速凭据认证过程\n\n在繁忙的数据库中，你可以通过配置\
    \ `cassandra.yaml` 文件中的以下两个选项来加速凭据认证过程：\n\n*   `credentials_validity_in_ms`\n\
    *   `credentials_update_interval_in_ms`\n\n这两个参数的默认值均为 2000 毫秒。你可以提高其中一个或两个参数的值，以减少频繁认证凭据请求的开销。\n\
    \n## 创建角色\n\n配置好身份验证后，就可以使用超级用户帐户创建角色了。这里我们使用默认的超级用户帐户 `cassandra` 来创建用户。\n\n\
    通过运行 `CREATE ROLE` 命令来创建角色。`CREATE ROLE` 命令的通用语法如下：\n\n```\n(CREATE | ALTER |\
    \ DROP ) role_name\n[WITH (LOGIN = true | SUPERUSER = true | password = 'password')];\n\
    ```\n\n以下是对关键角色属性的简要说明。默认情况下，数据库将 `SUPERUSER` 和 `LOGIN` 属性设置为 `false`，而 `password`\
    \ 属性默认为 `null`。\n\n*   `SUPERUSER`：可以执行所有 CQL 命令。如果将此属性设置为 `true`，则该角色将被授予对所有角色的\
    \ `AUTHORIZE`、`CREATE` 和 `DROP` 权限。\n*   `LOGIN`：如果设置，数据库允许此角色使用密码登录以运行 CQL 语句。你需要设置此属性以为\
    \ `PasswordAuthenticator` 后端或内部身份验证创建登录帐户。\n*   `PASSWORD`：表示你设置的密码。Cassandra\
    \ 的内部身份验证需要密码。你必须用单引号将密码括起来。\n\n你可以创建角色来定义一组权限，然后将这些权限分配给其他角色并映射到外部用户。角色还使你能够为内部身份验证创建登录帐户。使用内部身份验证时的最佳实践是为分配权限和登录帐户创建单独的角色。\n\
    \n以下是创建角色的步骤。\n\n1.  以超级用户 `cassandra` 身份登录 `cqlsh`。\n    ```\n    $ cqlsh 192.168.159.129\
    \ -u cassandra -p cassandra\n    Connected to Test Cluster at 192.168.159.129:9042.\n\
    \    [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\n  \
    \  Use HELP for help.\n    ```\n\n2.  执行 `CREATE ROLE <rolename> WITH PASSWORD\
    \ <password>` 命令，如下所示：\n    ```\n    cassandra@cqlsh> create user 'test' with\
    \ password 'test123';\n    ```\n    `list roles` 命令显示数据库中的所有角色。它还显示哪些角色拥有超级用户权限。例如：\n\
    \    ```\n    cassandra@cqlsh> list roles;\n    name      | super\n    -----------+-------\n\
    \    cassandra |  True\n    test | False\n    (2 rows)\n    cassandra@cqlsh>\n\
    \    ```\n    在此情况下，默认角色 `cassandra` 的超级用户列值为 `True`，而新角色 `test` 的超级用户列设置为 `False`。因此，一切正常。\n\
    \n默认情况下，`CREATE ROLE` 语句中的 `LOGIN` 属性值为 `False`。当你创建登录角色时，必须将此属性设置为 `True`。\n\n\
    你可以通过查询 `system_auth.roles` 表来查看数据库中的角色，如下所示："
  raw: "By default, Cassandra doesn’t require authentication for someone to log\n\
    into a cluster. That is, you can simply type in cqlsh without any credentials\
    \ and gain\naccess to the cluster.\n\nCreating Roles\n\nCassandra comes with a\
    \ built-in role named cassandra and the password is cassandra as well. This default\
    \ role\ncassandra has administrator privileges\n. You can also create additional\
    \ login roles and grant them the\nadministrator privilege. The best practice is\
    \ to create alternative\nadministrator roles, change the default password of the\
    \ default role\ncassandra, and never use this\nrole for anything again.\n\nYou\
    \ can create roles only by logging  in as a role\n(could be the default role cassandra\
    \ or any other role you’ve\ncreated) with administrative privileges.\n\nWhen you\
    \ first log in as the default role cassandra and attempt to create a\nrole, you\
    \ may receive the following error;\n\n```\n$ cqlsh 192.168.159.129 -u cassandra\
    \ -p cassandra\nConnected to Test Cluster at 192.168.159.129:9042.\n[cqlsh 5.0.1\
    \ | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\n\
    cassandra@cqlsh> create role newrole with password 'newrole123';\nSyntaxException:\
    \ line 1:20 mismatched input 'withpassword' expecting EOF (create user newuser\
    \ [withpassword]...)\ncassandra@cqlsh> create role newrole with password 'newrole123';\n\
    InvalidRequest: Error from server: code=2200 [Invalid query] message=\"org.apache.cassandra.auth.CassandraRoleManager\
    \ doesn't support PASSWORD\"\ncassandra@cqlsh> list users;\nUnauthorized: Error\
    \ from server: code=2100 [Unauthorized] message=\"You have to be logged in and\
    \ not anonymous to perform this request\"\ncassandra@cqlsh>\n```\n\nThe reason\
    \ you see this error is that you haven’t yet configured\nauthentication in this\
    \ database. By default, the authentication option\nin the `cassandra.yaml` file\n\
    is set to\n\n```\nauthenticator: AllowAllAuthenticator\n```\n\n`AllowAuthenticator`\n\
    \ is the default authentication backend. If you set `AllowAuthenticator` as\n\
    the value for the authenticator property, you disable authentication in\nthe database.\
    \ Cassandra won’t perform any checks and will allow anyone\nto log in without\
    \ a challenge.\n\nThe alternative to `AllowAuthenticator` as\nthe authentication\
    \ backend is `PasswordAuthenticator`.\nThis backend will authenticate users with\
    \ credentials that the database\nstores in the `system_auth.credentials`\ntable.\n\
    \nTherefore, even when you log into the database as the default role cassandra\
    \ (which has the administrator\nrights), the database tells you that “you have\
    \ to be logged in and not\n(be) anonymous to perform this request” when you try\
    \ to create a role.\nThe `authenticator: AllowAllAuthenticator` option allows\
    \ all users and doesn’t check\nif you have logged in. The solution here is to\
    \ configure authentication\nfor the database, as I explain in the following section.\n\
    \nConfiguring Authentication\n\nTo enable you to log in as an administrator and\
    \ create roles or perform\nother role-related tasks, configure authentication\n\
    \ by executing the following steps.\n\n1.  Change the authentication option in\
    \ the `cassandra.yaml` file\n    to `PasswordAuthenticator`,\n    as shown here:\n\
    \n```\n    authenticator: PasswordAuthenticator\n    ```\n\nThe change you make\
    \ here forces Cassandra to require a role name and\n    password when a client\
    \ connects to the cluster.\n\n2.  Restart the database.\n\n3.  Login to cqlsh\
    \ using the credentials for the default superuser cassandra.\n\n```\n    $ cqlsh\
    \ -u cassandra -p cassandra\n    ```\n\n4.  The system keyspace system_auth\n\
    \    stores the role credentials. If you’ve only the default single replica\n\
    \    for this keyspace, you can lose access to the cluster if that replica\n \
    \   becomes unavailable. Therefore, to enhance availability, increase the\n  \
    \  replication factor for the system_auth tablespace to a higher\n    value such\
    \ as 3 or 5 per datacenter, as shown here:\n\n```\n    cqlsh> ALTER KEYSPACE \"\
    system_auth\"\n    WITH REPLICATION = {'class' : 'NetworkTopologyStrategy', 'dc1'\
    \ : 5,\n    'dc2' : 3};\n    ```\n\n5.  To ensure that the replication factor\
    \ changes are enforced throughout\n    the cluster, run the `nodetool`  `repair`\
    \ \n    command for the system_auth\n    keyspace.\n\n```\n    $ nodetool repair\
    \ system_auth\n    ```\n\n6.  Restart the database.\n\nAt this point, you’ve configured\
    \ authentication for the database and you\n    can now login as `cassandra/cassandra`\n\
    \    to perform role- and privilege-related administrative tasks.\n\nOnce you’ve\
    \ configured authentication as shown here, you must always\n    specify the credentials\
    \ for a superuser. If you try to log in as before\n    without the credentials,\
    \ you’ll receive an error.\n\n```\n    $ cqlsh 192.168.159.129\n    Connection\
    \ error: ('Unable to connect to any servers', {'192.168.159.129': AuthenticationFailed('Remote\
    \ end requires authentication.',)})\n    $\n    ```\n\nSpeeding Up the Credentials\
    \ Authentication Process\n\nYou can speed up the credentials authentication process\
    \ in a busy\ndatabase by configuring the following two options in the `cassandra.yaml`\
    \ file:\n\n*   `credentials_validity_in_ms`\n\n*   `credentials_update_interval_in_ms`\n\
    \nThe default value for both parameters is 2000 ms. You can raise the\nvalue of\
    \ one or both parameters to decrease the overhead of frequent\nrequests for authenticating\
    \ credentials.\n\nCreating Roles\n\nOnce you configure authentication, you’re\
    \ ready to create roles with the\nsuperuser account. Here you use the default\
    \ superuser account cassandra to create the users.\n\nYou run the `CREATE ROLE`\
    \ command to create a role. Here’s the general syntax of the\n`CREATE ROLE`\n\
    command:\n\n```\n(CREATE | ALTER | DROP ) role_name\n[WITH (LOGIN = true | SUPERUSER\
    \ = true | password = 'password')];\n```\n\nThe following is a brief explanation\
    \ of the key role properties . By default,\nthe database sets the `SUPERUSER`\
    \ and `LOGIN` properties to\n`false`, and the\n`password`\nproperty defaults to\
    \ `null`.\n\n*   `SUPERUSER`: Can\n    execute all CQL commands. If you set this\
    \ property to `true`, the rule is\n    granted the `AUTHORIZE, CREATE,` and `DROP`\
    \ privileges on\n    all roles.\n\n*   `LOGIN`: If set,\n    the database allows\
    \ this role to log in with a password to run CQL\n    statements. You set this\
    \ property to create login accounts for the `passwordAuthenticator`\n    backend\
    \ or for internal authentication.\n\n*   `PASSWORD`:\n    Represents the password\
    \ that you set. Cassandra’s internal\n    authentication requires a password.\
    \ You must enclose the password in\n    single quotes.\n\nYou can create roles\
    \ to define a set of permissions that you can then\nassign to other roles and\
    \ map to external users. Roles also enable you\nto create login accounts for internal\
    \ authentication. The best practice\nwhen using internal authentication is to\
    \ create separate roles for\nassigning permissions\n and for the login accounts.\n\
    \nHere are the steps to create a role.\n\n1.  Log in to cqlsh as the superuser\
    \ cassandra.\n\n```\n    $ cqlsh 192.168.159.129 -u cassandra -p cassandra\n \
    \   Connected to Test Cluster at 192.168.159.129:9042.\n    [cqlsh 5.0.1 | Cassandra\
    \ 3.10 | CQL spec 3.4.4 | Native protocol v4]\n    Use HELP for help.\n    ```\n\
    \n2.  Execute the `CREATE ROLE <rolename> WITH PASSWORD <password>` command, as\n\
    \    shown here:\n\n```\n    cassandra@cqlsh> create user 'test' with password\
    \ 'test123';\n    ```\n\nThe `list roles`\n    command shows all roles in the\
    \ database. It also shows which of the\n    roles have the super user privilege.\
    \ Here’s an example:\n\n```\n    cassandra@cqlsh> list roles;\n    name      |\
    \ super\n    -----------+-------\n    cassandra |  True\n    test | False\n  \
    \  (2 rows)\n    cassandra@cqlsh>\n    ```\n\nIn this case, the default role cassandra\
    \ has the superuser column\nvalue set to `True`, and the new\nrole test has its\
    \ the superuser\ncolumn set to `False`. Therefore,\neverything is as it should\
    \ be.\n\nBy default , the\n`LOGIN` property\nin the `CREATE ROLE` statement has\
    \ the value `False`. When you’re\ncreating a login role, you must set this property\
    \ to `True`.\n\nYou can view the roles in a database by querying the `system_auth.roles`\n\
    table, shown here:"
