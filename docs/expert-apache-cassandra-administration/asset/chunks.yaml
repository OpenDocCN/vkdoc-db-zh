    \ /usr/share/cassandra\n    ```\n\n创建符号链接对于后续操作是个好主意。符号链接允许你在同一安装中保留多个版本的 Cassandra。你只需要简单地更改链接指向的位置，即可在不同版本之间切换。\n\
    \n就这样，安装完成了！与安装关系型数据库并进行配置不同，安装 Cassandra 并开始使用它非常容易。完全无需任何配置，就可以开箱即用并开始使用 Cassandra。当然，你需要进行配置和调优以发挥其最大性能，但对于新手来说，开始使用这个数据库是相当容易的。\n\
    \n在下一节中，我将展示如何通过在 `cassandra.yaml`（Cassandra 的主配置文件）中输入和修改配置属性来配置 Cassandra。稍后，我会告诉你如何启动和停止\
    \ Cassandra。\n\n### 创建必要的目录\n\n你需要创建一组基本的三个目录，以便 Cassandra 知道将表和其他数据存储在何处。以用户\
    \ `cassandra` 的身份创建以下三个数据目录：\n\n```\n$ mkdir /usr/share/cassandra/commitlog\n\
    $ mkdir /usr/share/cassandra/data\n$ mkdir /usr/share/cassandra/saved_caches\n\
    ```\n\n无论你是否创建，Cassandra 都会创建这三个目录；你自己创建的原因是为了让这些目录位于你选择的位置，而不是默认目录中。\n\n"
- fmt: '# Configuring Cassandra


    The `cassandra.yaml` file is the key configuration file for setting the configuration
    properties for a Cassandra cluster, such as the following:


    *   Tuning and resource utilization parameters

    *   Caching parameters

    *   Client connections

    *   Backups

    *   Security


    Cassandra offers a `cassandra.yaml` template, located in the `$CASSANDRA_HOME/conf`
    directory. When starting out with Cassandra, you can just edit a handful of the
    configuration properties to get going. Later, once you understand Cassandra’s
    architecture and the key concepts well, it’ll be time to tinker with the configuration
    properties that affect performance and many other aspects of Cassandra, which
    I explain in the relevant chapters in this book.


    ## Location of the cassandra.yaml File


    By default, the `cassandra.yaml` file is located in the following locations:


    *   `/etc/cassandra` (for Cassandra package installations)

    *   `<install_location>/conf` (for Cassandra tarball installations)


    ## Minimal Configuration Properties You Must Set


    Although you can configure hundreds of initialization parameters in the `cassandra.yaml`
    file, to start with you need to configure just a handful of properties:


    *   `cluster_name`

    *   `listen_adresss`

    *   `listen_interface`


    I explain these minimal properties in the following sections. You can save the
    default `cassandra.yaml` with a different name and create a new `cassandra.yaml`
    file with just these properties to start your first single-node Cassandra cluster.
    You specify each configuration property by placing a colon after the property.


    ### The cluster_name Parameter


    The `cluster_name` parameter lets you name the Cassandra cluster. The default
    value is Test Cluster. Obviously, you must specify the same `cluster_name` value
    for all the nodes in a multi-node cluster.


    The main purpose of the `cluster_name` parameter is to prevent nodes belonging
    to one logical cluster from joining other clusters.


    ### The listen_adresss Property


    The `listen_address` property determines the IP address (or hostname) that Cassandra
    binds to when connecting to other nodes. The default value is `localhost`. If
    you are running a single-node cluster, you can just use the default setting for
    this parameter.


    Caution: Don’t set the value of 0.0.0.0 for the `listen_address` parameter.


    ### The listen_interface Parameter


    The `listen_interface` parameter specifies the interface that Cassandra binds
    to when connecting to other nodes and must correspond to a single address.


    If you set the `listen_address` property, you can omit the `listen_interface`
    parameter and vice versa.


    ### Setting the Data File Directory Locations


    You specify the directories for storing the Cassandra data files as well its cache
    directories in the `cassandra.yaml` file.


    There are two main directories you must configure to specify where Cassandra stores
    its data; the first location is for storing the SSTables, and the second location
    is for storing the commit log. In addition, there’s a third directory for storing
    cache data, called the `saved_caches` directory.


    Although Cassandra will create these directories for you in their default locations,
    you can also set a custom location for the following three Cassandra directories,
    as shown here:


    *   `data_file_directories: /usr/share/cassandra/data`

    *   `commitlog_directory: /usr/share/cassandra/commitlog`

    *   `saved_caches_directory: /usr/share/cassandra/saved_caches`


    By default, Cassandra stores its data in the following locations:


    *   `/var/lib/cassandra` (for Package installations)

    *   `<install_location>/data/data` (for Tarball installations)


    If you don’t set this parameter, the default directory is `$CASSANDRA_HOME/data/data`.


    ### Location for Storing the Cache Directory


    Cassandra needs a directory to store its key and row caches. The default location
    for this is


    *   `/var/lib/cassandra/saved_caches` (for Package installations)

    *   `<install_location>/data/saved_caches` (for Tarball installations)


    ### Setting the Location for Storing the Commit Log


    You should assign a different directory, ideally on a different spindle, for storing
    the commit log.


    By default, Cassandra stores the commit log in the `/var/lib/cassandra/commitlog`
    directory. If you don’t set it, the default directory will be the following:


    `$CASSANDRA_HOME/data/commitlog`


    ## Configuring the Firewall


    Before you start up the Cassandra instance, make sure you can access the Cassandra
    services from outside the server on which Cassandra is running, by opening these
    ports:


    *   `7000`

    *   `7199`

    *   `9042`

    *   `9160`


    # Exploring the CQL Shell


    The Cassandra Query Language (CQL) is the primary means of communication with
    the Cassandra database. The simplest way to interact with Cassandra is to use
    the CQL shell, `cqlsh`.


    You create keyspaces, tables, and read and write data via `cqlsh`. In the following
    sections, I show you how to get started with `cqlsh`.


    ## Starting the CQL Shell


    You start the CQL shell with the `cqlsh` command, as shown here:


    ```

    $ cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    You terminate the CQL shell by typing `exit` at the `cqlsh` prompt:


    ```

    cqlsh:mykeyspace1> exit;

    $

    ```


    ## Time Zones in cqlsh


    Cassandra displays timestamps with an UTC timezone by default. You must install
    the `pytz` library to display timestamps with a different timezone.


    ## Getting Help in the CQL Shell


    The HELP facility in the CQL shell is cool. When you type `HELP` at the `cqlsh`
    command line, you see all the options for HELP, as is the case with any other
    command line utility.


    ```

    cqlsh> help

    Documented shell commands:

    ===========================

    CAPTURE  CLS          COPY  DESCRIBE  EXPAND  LOGIN   SERIAL  SOURCE   UNICODE

    CLEAR    CONSISTENCY  DESC  EXIT      HELP    PAGING  SHOW    TRACING

    CQL help topics:

    ================

    AGGREGATES               CREATE_KEYSPACE           DROP_TRIGGER        TEXT

    ALTER_KEYSPACE           CREATE_MATERIALIZED_VIEW  DROP_TYPE           TIME

    ALTER_MATERIALIZED_VIEW  CREATE_ROLE                 DROP_USER       TIMESTAMP

    ALTER_TABLE              CREATE_TABLE                     FUNCTIONS       TRUNCATE

    ALTER_TYPE               CREATE_TRIGGER            GRANT              TYPES

    ALTER_USER               CREATE_TYPE               INSERT            UPDATE

    APPLY                    CREATE_USER               INSERT_JSON          USE

    ASCII                    DATE                      INT                 UUID

    BATCH                    DELETE                    JSON

    BEGIN                    DROP_AGGREGATE            KEYWORDS

    BLOB                     DROP_COLUMNFAMILY         LIST_PERMISSIONS

    BOOLEAN                  DROP_FUNCTION             LIST_ROLES

    COUNTER                  DROP_INDEX                LIST_USERS

    CREATE_AGGREGATE         DROP_KEYSPACE             PERMISSIONS

    CREATE_COLUMNFAMILY      DROP_MATERIALIZED_VIEW    REVOKE

    CREATE_FUNCTION          DROP_ROLE                 SELECT

    CREATE_INDEX             DROP_TABLE                SELECT_JSON

    cqlsh>

    ```


    In addition, when you pass an option with the `HELP` command, such as `HELP CREATE_TABLE`,
    Cassandra brings up a nice screen showing the syntax for the command, as shown
    in Figure 2-1.


    ![A436674_1_En_2_Fig1_HTML.jpg](A436674_1_En_2_Fig1_HTML.jpg)


    Figure 2-1: The HELP command for the CREATE TABLE statement


    Note: `cqlsh` is guaranteed to work well (that is, be fully compatible with) just
    the Cassandra release `cqlsh` belongs to. It might work well with both older and
    newer releases of Cassandra, but don’t count on it!'
