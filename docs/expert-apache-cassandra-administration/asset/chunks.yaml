- fmt: "# Cassandra数据库性能调优\n\n## 测试压缩策略\n在不影响生产工作负载的情况下，测试压缩策略和基准写入性能差异。\n```bash\n\
    -Dcassandra.write_survey=true\n```\n\n## 启用与禁用自动压缩\n您可以使用以下命令为一个或多个表启用和禁用自动压缩：\n\
    ```bash\n$ nodetool enableautocompaction cycling cyclist_name;\n$ nodetool disableautocompaction\
    \ cycling cyclist_name;\n```\n\n## 查看所有压缩历史\n您可以使用 `nodetool compactionhistory`\
    \ 命令查看数据库中所有压缩活动的历史记录：\n```bash\n$ nodetool compactionhistory\nCompaction History:\n\
    id                                   keyspace_name columnfamily_name   compacted_at\
    \            bytes_in bytes_out rows_merged\nf6227aa0-81e8-11e7-a4ad-89801d899afb\
    \ cycling       cycle               2017-08-15T11:38:41.994 111      55      \
    \  {1:1, 2:1}\nef3d57a0-81e8-11e7-a4ad-89801d899afb cycling       cyclist_name\
    \        2017-08-15T11:38:30.426 243      243       {1:5}\n...\n```\n\n该命令的输出包含七个列。`bytes_in`\
    \ 和 `bytes_out` 列通过比较压缩前后SSTable的大小，帮助您判断压缩效果。\n\n输出中的 `tables:rows` 表示法（例如 `{1:5}`）说明了Cassandra如何选择行进行压缩。例如，`{1,5}`\
    \ 表示数据库从五个SSTable中各取一行来创建一个新的压缩SSTable。类似地，`{1:3,3:1}` 表示数据库从一个SSTable中取三行，并与另外三个表中的单行合并，创建一个压缩SSTable。\n\
    \n`nodetool compactionstats` 命令显示所有待处理和正在进行的压缩操作的状态。您可以通过查看PROGRESS列来检查压缩操作的完成百分比。\n\
    \n## 压缩数据以节省存储空间\n通过让Cassandra压缩磁盘上的SSTable，可以节省存储空间。除了在存储方面带来收益外，压缩还能略微提升性能。DataStax估计，根据数据类型的不同，压缩可能会使存储空间减少25-33%，读取性能提升25-35%，写入性能略有提升（5-10%）。\n\
    \n当Cassandra需要读取压缩数据时，它会定位SSTable索引中的行并解压缩必要的行块。\n\n最适合压缩的表是那些具有相似列集、且行中列数相同的表。数据在不同行中越相似，压缩数据能节省的空间就越多，因为压缩因子会更高。\n\
    \n### 配置压缩\nCassandra默认启用压缩，您可以配置各种压缩选项，包括压缩期间数据库必须使用的压缩算法。您可以在创建表时进行配置，或者稍后通过修改表来配置。以下语法语句显示了您可以配置的四个压缩属性：\n\
    ```\ncompression = {\n['class' : 'compression_algorithm_name',\n'chunk_length_kb'\
    \ : 'value',\n'crc_check_chance' : 'value',]\n| 'sstable_compression' : '']\n\
    }\n```\n\n最重要的压缩属性是压缩类（`class`），它指定了压缩期间数据库必须使用的压缩算法。您可以从以下压缩类中选择：\n*   `LZ4Compressor`\n\
    *   `SnappyCompressor`\n*   `DeflateCompressor`\n\n> **注意**\n> 除了 `LZ4`、`Snappy`\
    \ 和 `Deflate` 压缩类之外，您还可以使用 `org.apache.cassandra.io.compress.ICompressor` 接口实现自己的压缩类。\n\
    \n选择压缩算法时，您需要在节省存储空间和数据库读取性能这两个相互冲突的目标之间进行权衡。通常，通过压缩数据获得的存储空间节省与数据库在读取时解压缩数据的速度成反比。\n\
    \n`Snappy` 和 `Deflate` 都提供更高的压缩比，意味着与使用LZ4算法相比，使用这些算法可以节省更多的存储空间。然而，LZ4提供最快的解压缩速度，这意味着查询压缩数据时具有更高的读取性能。\n\
    \n默认的压缩算法是 `LZ4Compressor`。要为表指定压缩算法，您需要为该压缩算法指定其类，如下所示：\n```sql\nCREATE TABLE\
    \ customers (\n...\nPRIMARY KEY (id)\n)\nWITH compression = { 'class' : 'SnappyCompressor'\
    \ };\n```\n\n除了指定压缩算法，您在创建或修改表时还可以配置以下与压缩相关的属性：\n*   `chunk_length_kb`：默认情况下，此属性的值设置为64KB。这是Cassandra压缩SSTable时压缩块的大小。通过为此参数指定更高的值，您可以增加压缩比，但数据库每次读取操作必须从磁盘读取更多数据。默认值对于大多数用例来说是合适的，但如果数据库一次需要从磁盘读取大量数据，您可以提高此参数的值。\n\
    *   `crc_check_chance`：此属性确定数据库在读取操作期间检查压缩数据块校验和的概率。校验和有助于检测损坏，并防止数据库将损坏的数据副本传播到其他节点。`crc_check_chance`\
    \ 属性的默认值为1，表示数据库在读取期间始终检查数据的校验和（概率为1意味着事件总是发生）。您可以通过将此参数设置为0来完全禁用校验和检查。参数值越低，Cassandra在读取期间执行数据校验和的可能性就越小。\n\
    \n### Cassandra何时压缩数据\n当您使用 `ALTER TABLE` 语句为现有表配置压缩时，Cassandra将开始压缩该表的所有新SSTable。但是，Cassandra不会立即压缩所有现有的SSTable。Cassandra将在下次对数据库中的数据执行压缩时压缩现有SSTable。\n\
    \n您可以通过强制重写现有SSTable（在此过程中压缩表）来修改Cassandra的默认压缩行为。您可以通过执行 `nodetool upgradesstables`\
    \ 或 `nodetool scrub` 命令来实现。\n\n`nodetool upgradesstables` 命令的语法如下：\n```bash\n\
    $ nodetool upgradesstables\n( -a | --include-all-sstables )\n--    ...\n```\n\n\
    `nodetool upgradetsstables` 命令会重写SSTable，并在此过程中压缩它们。如果您希望数据库在为SSTable配置压缩后立即开始压缩数据，可以运行此命令。当您希望修改表的压缩算法时，也可以运行此命令。\n\
    \n您可以通过运行 `nodetool scrub` 命令使Cassandra压缩已配置压缩的表。该命令还会像 `nodetool upgradesstables`\
    \ 命令一样重建节点中的SSTable，但它需要在表重建之前创建快照。`nodetool upgradesstables` 命令是比 `nodetool scrub`\
    \ 更好的选择，因为您不需要在数据库压缩SSTable之前创建快照。\n\n### 修改压缩算法\n默认的压缩算法是 `LZ4Compressor`。您可以在创建表时通过将压缩参数\
    \ `class` 配置为不同的压缩类（本例中为 `DeflateCompressor`）来更改压缩算法：\n```sql\nCREATE TABLE MyTable\
    \ (\n...\nPRIMARY KEY (user_id)\n)\nWITH compression = { 'class' : DeflateCompressor\
    \ };\n```\n\n您可以在创建表后修改任何压缩属性，包括 `compression class` 属性。以下示例展示了如何修改压缩算法的 `class`\
    \ 属性（改为 `DeflateCompressor`）：\n```sql\nALTER TABLE customers\nWITH compression\
    \ = { 'class' : 'DeflateCompressor', 'chunk_length_in_kb' : 6\n```\n\n### 测试压缩效果\n\
    在初次尝试压缩时，您可能希望了解不同压缩策略的影响，同时又不影响生产数据库性能。Cassandra允许您通过以写入调查模式启动数据库来测试压缩策略。\n\n\
    本章的“测试压缩策略效果”部分描述了如何使用Cassandra的写入调查模式来测试您的压缩计划。\n\n在写入调查模式下启动新节点有助于测试新的压缩策略并基准写入性能。要检查压缩策略对读取性能的影响，您可以将一个节点从集群中取出，并使用\
    \ `cassandra-stress` 工具（我在本章中会解释）基准测试其读取操作的性能，将该节点作为独立服务器使用。\n\n## 关闭压缩\n默认情况下，Cassandra会压缩数据。您可以在创建表时通过将压缩参数\
    \ `enabled` 指定为 `false` 来禁用压缩：\n```sql\nCREATE TABLE MyTable (\n...\nPRIMARY KEY\
    \ (user_id)\n)\nWITH compression = { 'enabled' : false };\n```\n\n您可以通过为现有表指定\
    \ `sstable_compression` 选项并为其赋予空值（' '）来禁用压缩，如下所示：\n```bash\ncqlsh> ALTER TABLE\
    \ cycling.cyclist_name\nWITH COMPRESSION = {'sstable_compression': ' ');\n```\n\
    \n## 通过Memtable阈值提升写入性能\n如您所知，当Cassandra超过提交日志阈值或Memtable清理阈值时，它会将Memtable刷新到磁盘（成为SSTable）。关于设置提交日志和Memtable阈值没有固定的规则。\n\
    \n如果您的写入负载包括对小部分数据的高更新或持续的写入流，您可以提高Memtable阈值。当存在大量写入时，如果保持Memtable阈值较低，将导致压缩效率低下。\n\
    \nCassandra使用 `memtable_cleanup_threshold` 参数（在 `cassandra.yaml` 中）的设置来确定何时应刷新Memtable。此参数的默认值为\
    \ 1/(`memtable_flush_writers` + 1)。然而，此参数仅表示Cassandra用于计算自动Memtable刷新空间量的比率。Cassandra通过以下方式确定何时将Memtable刷新到磁盘：\n\
    *   `memtable_heap_space_in_mb` 参数决定了为Memtable分配的堆内内存量。此参数的默认值为堆大小的0.25倍。`memtable_offheap_space_in_mb`\
    \ 参数决定了为Memtable分配的堆外内存量，其默认值也是堆大小的0.25倍。将 `memtable_heap_space_in_mb` 参数的值与 `memtable_offheap_space_in_mb`\
    \ 参数的值相加。\n*   将上一行的总和乘以 `memtable_cleanup_threshold` 参数的值。这将给出以MB为单位的阈值。\n* \
    \  当节点上所有Memtable使用的组合内存超过阈值时，数据库会将该节点上最大的Memtable刷新到磁盘。\n\n`memtable_flush_writers`\
    \ 参数表示Memtable刷新写入线程的数量。数据库使用此参数来计算 `memtable_cleanup_threshold` 参数的值，其默认值由以下方式确定：\n\
    节点上磁盘的数量或核心的数量，最小值为2，最大值为8。\n\n以下是一个示例，展示了数据库如何确定何时将Memtable刷新到磁盘：\n1.  假设您已将节点的\
    \ `memtable_flush_writers` 参数设置为8。\n2.  `memtable_cleanup_threshold` 参数的默认值为 `1/(memtable_flush_writers\
    \ +1)`，因此本例中为 1/(8+1) = 0.11。\n3.  假设您已将 `memtable_heap_space_in_mb` 和 `memtable_offheap_space_in_mb`\
    \ 参数都设置为2000。\n4.  步骤2得出 `memtable_cleanup_threshold` 参数的值为0.11。`memtable_heap_space_in_mb`\
    \ 和 `memtable_offheap_space_in_mb` 参数的总和为2000+2000=4000。因此，Memtable清理的空间阈值为 4000\
    \ - 4000*0.11=3636MB。\n5.  当此节点上Memtable使用的组合空间量超过3636MB时，Cassandra会将最大的Memtable刷新到磁盘。\n\
    \n`memtable_cleanup_threshold` 参数的值越大，数据库将Memtable刷新到磁盘的频率就越低。这也意味着更少的SSTable，从而意味着更小的压缩活动级别。\n\
    \n## 调整JVM\n在Cassandra中，所有操作都在JVM内部运行。Cassandra使用JVM堆来优化读取性能。为此，它将布隆过滤器、分区键缓存、SSTable索引摘要和分区摘要等组件保留在堆中。\n\
    \n除了Java堆内存，Cassandra还使用内存来支持页面缓存、布隆过滤器和缓存行。\n\n了解如何调整JVM非常重要。在这方面需要知道的关键是：\n\
    *   Java垃圾回收的工作原理\n*   理想的垃圾收集器\n*   分配Java堆大小\n\n配置垃圾回收和为JVM（堆）分配正确数量的内存对高性能至关重要。让我们在以下部分中了解这两点。\n\
    \n### Java垃圾回收\n垃圾回收是JVM从内存中移除旧对象的方式。您可以选择不同的垃圾收集器。Java内存堆内部有几种类型的区域，例如年轻代和老年代，在每个内存区域内还有更小的子区域。当JVM需要清理已满的内存区域时，它会暂停正在运行的操作。调整Java垃圾回收的目标是尽量减少暂停时间。您不仅应该寻求将垃圾回收引起的暂停时间最小化，还应该减少暂停次数。\n\
    \n### 选择正确的垃圾收集器\n可用的两种Java垃圾收集器是并发标记清除（CMS）和G1（垃圾优先）垃圾收集器。您可以这样在两者之间做出决定：\n*\
    \   如果您处理的堆大小小于14GB，并且始终处理相同类型的工作负载，CMS更佳。\n    > **注意** 在Java的下一个版本（Java 9）中，CMS将正式被废弃。\n\
    *   如果您处理的堆大小大于14GB，并且数据库正在处理不同类型的工作负载，请使用G1垃圾收集器。\n\n您可以通过编辑 `$CASSANDRA_HOME/conf/jvm.options`\
    \ 文件中的设置来配置Java垃圾收集器。`jvm.options` 文件（我在第2章中首先解释过）有助于设置多个属性，例如启动参数、通用JVM设置、堆设置以及垃圾回收相关设置。\n\
    \n默认的垃圾收集器是CMS，您可以在 `java.options` 文件的GC SETTINGS部分查看此收集器的设置，如下所示："
  raw: "# strategies and benchmark write performance differences without affecting\
    \ the production workload.\n-Dcassandra.write_survey=true\n```\n\nEnabling and\
    \ Disabling Autocompaction \n\nYou can enable and disable auto compaction for\
    \ one or more tables with\nthe following commands:\n\n```\n$ nodetool enableautocompaction\
    \ cycling cyclist_name;\n$ nodetool disableautocompaction cycling cyclist_name;\n\
    ```\n\nViewing the History of All Compactions\n\nYou can view the history of all\
    \ compaction activity in the database with\nthe `nodetool compactionhistory` command:\n\
    \n```\n$ nodetool compactionhistory\nCompaction History:\nid                 \
    \                  keyspace_name columnfamily_name   compacted_at            bytes_in\
    \ bytes_out rows_merged\nf6227aa0-81e8-11e7-a4ad-89801d899afb cycling       cycle\
    \               2017-08-15T11:38:41.994 111      55        {1:1, 2:1}\nef3d57a0-81e8-11e7-a4ad-89801d899afb\
    \ cycling       cyclist_name        2017-08-15T11:38:30.426 243      243     \
    \  {1:5}\n...\n```\n\nThere are seven columns in the output of this command. The\
    \ `bytes_in` and the\n`bytes_out`\ncolumns help you figure out the efficacy of\
    \ compaction by comparing the\nsize of the SSTables before and after compaction.\n\
    \nThe notations  in\nthe output such as {1:5} refer to how Cassandra chose the\
    \ rows for\ncompaction and stands for {tables:rows}. For example, {1,5} means\
    \ that\nthe database took one row from five SSTables to create a new compacted\n\
    SSTable. Similarly, {1:3,3:1} means that the database took three rows\nfrom an\
    \ SSTable and combined with a single row from three tables to\ncreate a compacted\
    \ SSTable.\n\nThe `nodetool compactionstats` command shows the status of all pending\
    \ and\nongoing compaction operations. You can check the percentage of\ncompaction\
    \ operations completed thus far by looking under the PROGRESS\ncolumn.\n\nCompressing\
    \ Data to Save Storage Space\n\nYou can save storage space by having Cassandra\
    \ compress SSTables on\ndisk. In addition to providing gains on the storage front,\
    \ compression\noffers a slight improvement in performance. DataStax estimates\
    \ that,\ndepending on the type of data, compressing could lead to a 25-33% drop\n\
    in storage, a 25-35% improvement in read performance, and a slight\n(5-10%) increase\
    \ in write performance.\n\nWhen Cassandra needs to read compressed data, it locates\
    \ the rows in the\nSSTable index and decompresses the necessary row chunks.\n\n\
    The best candidates for compression are tables with similar sets of\ncolumns,\
    \ where the rows contain the same number of columns. The more\nsimilar the data\
    \ is in various rows, the more space you can save from\ncompressing the data,\
    \ since the compression factor will be higher.\n\nConfiguring \nCompression\n\n\
    Cassandra enables compression by default, and you can configure various\ncompression\
    \ options, including the compression algorithm the database\nmust use during compression.\
    \ You can do this either when you create the\ntable, or later, by altering the\
    \ table. The following syntax statement\nshows the four compression properties\
    \ you can configure:\n\n```\ncompression = {\n['class' : 'compression_algorithm_name',\n\
    'chunk_length_kb' : 'value',\n'crc_check_chance' : 'value',]\n| 'sstable_compression'\
    \ : '']\n}\n```\n\nThe most important compression  property\nis the compression\
    \ class, which specifies the compression algorithm the\ndatabase must be use during\
    \ compression. You can choose from the\nfollowing compression classes:\n\n*  \
    \ `LZ4Compressor`\n\n*   `SnappyCompressor`\n\n*   `DeflateCompressor`\n\nNote\n\
    \nIn addition to the `LZ4`, `Snappy`, and `Deflate` compression\nclasses, you\
    \ can also implement your own compression class with the\n`org.apache.cassandra.io.compress.ICompressor`\n\
    interface.\n\nWhen you choose a compression algorithm, you’re choosing between\
    \ the\nconflicting goals of conserving storage space and the database’s read\n\
    performance. Commonly, the savings in storage space you gain by\ncompresssing\
    \ data is inversely related to the speed with which the\ndatabase can uncompress\
    \ the data while reading it.\n\nBoth `Snappy` and\n`Deflate` offer a\nhigher compression\
    \ ratio, meaning you save more in storage space when\nusing these algorithms,\
    \ compared to using the LZ4 algorithm. However,\nLZ4 offers the fastest decompression\
    \ speed, which means a higher read\nperformance when querying compressed data.\n\
    \nThe default compression algorithm is the `LZ4Compressor`. To\nspecify a compression\
    \ algorithm for compressing a table, you specify the\ncompression algorithm class\
    \ for\nthat compression algorithm, as shown here:\n\n```\nCREATE TABLE customers\
    \ (\n...\nPRIMARY KEY (id)\n)\nWITH compression = { 'class' : 'SnappyCompressor'\
    \ };\n```\n\nIn addition to specifying the compression algorithm, you can also\n\
    configure the following compression-related properties when creating or\naltering\
    \ a table:\n\n*   `chunk_length_kb`: By\n    default, the value of this property\
    \ is set to 64KB. This is the size of\n    the compressed blocks when Cassandra\
    \ compresses an SSTable. By\n    specifying a higher value for this parameter,\
    \ you can increase the\n    compression ratio, but the database must then read\
    \ more data from a disk\n    for every read operation. The default value is fine\
    \ for most use cases,\n    but if the database is reading a large amount of data\
    \ from disk at once,\n    you can raise the value of this parameter.\n\n*   `crc_check_`\n\
    \     `chance`  `:` This property\n    determines the probability that the database\
    \ will check the checksums of\n    compressed data blocks during a read operation.\
    \ Checksums help detect\n    corruption and prevent the database from propagating\
    \ corrupted replicas\n    of data to other nodes. The default value of the `crc_check_chance`\n\
    \    property is 1, meaning the database will always check the checksums of\n\
    \    data during reads (a probability of 1 means that an event will always\n \
    \   happen). You can disable checksum checking entirely by setting this\n    parameter\
    \ to 0\\. The lower the value of the parameter, the less likely it\n    is that\
    \ Cassandra will perform a checksum of the data during reads.\n\nWhen Cassandra\
    \ Compresses Data\n\nWhen you configure compression for an existing table with\
    \ the  `ALTER TABLE` statement\n, Cassandra will start compressing all new SSTables\
    \ for that\ntable. However, Cassandra doesn’t immediately compress all existing\n\
    SSTables. Cassandra will compress the existing SSTables when it performs\nthe\
    \ next compaction of data in the database.\n\nYou can modify this default behavior\
    \ of Cassandra for compacting data by\nforcing it to rewrite the existing SSTables,\
    \ compressing the tables in\nthe process. You can do this by executing either\
    \ the `nodetool upgradesstables` or the `nodetool scrub`\ncommands.\n\nThe `nodetool\
    \ upgradetsstables` command has the following syntax:\n\n```\n$ nodetool  upgradesstables\n\
    ( -a | --include-all-sstables )\n--    ...\n```\n\nThe  `nodetool upgradetsstables`\
    \ command  rewrites SSTables and during\nthat process also compresses them. You\
    \ can run this command if you want\nthe database to immediately start compressing\
    \ data following your\nconfiguring of compression for an SSTable. You can also\
    \ run this command\nwhen you wish to modify the compression algorithm for a table.\n\
    \nYou can make Cassandra compress a table for which you’ve configured\ncompression\
    \ by running the `nodetool scrub`\ncommand. This command will also rebuild the\
    \ SSTables in a node, just as\nthe `nodetool upgradesstables` command, but it\
    \ needs to create a snapshot before\nthe table rebuild. The `nodetool upgradesstables`\
    \ command is a better choice than `nodetool scrub` since\nyou don’t need to create\
    \ a snapshot before the database compresses the\nSSTables.\n\nModifying the Compression\
    \ Algorithm \n\nThe default compression algorithm is LZ4Compressor. You can change\
    \ the\ncompression algorithm when creating a table, as shown here, by\nconfiguring\
    \ the compression parameter `class` to a different\ncompression class (`DeflateCompressor`\
    \ in\nthis example):\n\n```\nCREATE TABLE MyTable (\n...\nPRIMARY KEY (user_id)\n\
    )\nWITH compression = { 'class' : DeflateCompressor };\n```\n\nYou can modify\
    \ any compression property after creating a table,\nincluding the `compression\
    \ class`\nproperty. The following example shows how to modify the compression\n\
    algorithm `class`\nattribute (to `DeflateCompressor`):\n\n```\nALTER TABLE customers\n\
    WITH compression = { 'class' : 'DeflateCompressor', 'chunk_length_in_kb' : 6\n\
    ```\n\nTesting the Efficacy of Compression\n\nDuring your initial forays into\
    \ compression, you may want to figure out\nthe impact of alternative compression\
    \ strategies without impacting the\nproduction database performance. Cassandra\
    \ allows you to test your\ncompression strategies by letting you start the database\
    \ in the write\nsurvey mode.\n\nThe “Testing the Efficacy  of a\nCompaction Strategy”\
    \ section in this chapter describes how to use\nCassandra’s write survey mode\
    \ to test out your compression plans.\n\nStarting a new node in the write survey\
    \ mode helps test new compression\nstrategies and benchmark the write performance.\
    \ To check the impact of\ncompression strategies on read performance, you can\
    \ take out a node from\nthe cluster and benchmark (using the `cassandra-stress`\n\
    tool, which I explain in this chapter) the performance of its read\noperations,\
    \ using that node as a standalone server.\n\nTurning Off \nCompression\n\nBy default,\
    \ Cassandra compresses data. You can disable compression when\ncreating a table\
    \ by specifying the compression parameter `enabled` to the value\n`false`, as\
    \ shown\nhere:\n\n```\nCREATE TABLE MyTable (\n...\nPRIMARY KEY (user_id)\n)\n\
    WITH compression = { 'enabled' : false };\n```\n\nYou can disable compression\
    \ for an existing table by specifying the\n`sstable_compression`\noption and giving\
    \ it the value (‘ ‘), as shown here:\n\n```\ncqlsh> ALTER TABLE cycling.cyclist_name\n\
    WITH COMPRESSION = {'sstable_compression': ' ');\n```\n\nImproving Write Performance\
    \ with Memtable\nThresholds\n\nAs you’re aware, Cassandra flushes memtables to\
    \ disk (to SSTables) when\nit exceeds either the commit log threshold or the memtable\
    \ cleanup\nthreshold. There’s no fixed rule regarding setting the commit log and\n\
    memtable thresholds.\n\nYou can raise the memtable threshold  if\nyour write loads\
    \ include high updates on a small set of data or if\nthere’s a continuous steam\
    \ of writes. If you keep the memtable threshold\nlow when there are numerous writes,\
    \ it will result in inefficient\ncompaction.\n\nCassandra uses the setting of\
    \ the  `memtable_cleanup_threshold`\nparameter  (in `cassandra.yaml`) to\ndetermine\
    \ when it should flush memtables. The default value for this\nparameter is 1/(`memtable_flush_writers`\n\
    + 1). However, this parameter only signifies the ratio Cassandra uses\nfor computing\
    \ the space amount for an automatic memtable flush.\nCassandra determines when\
    \ to flush a memtable to disk in the following\nway:\n\n*   The `memtable_heap_space_in_mb`\n\
    \    parameter determines the amount of on-heap memory allocated for\n    memtables.\
    \ The default value for this parameter is 0.25 times the heap\n    size. The `memtable_offheap_space_in_mb`\n\
    \    parameter determines the amount of off-heap memory allocated for\n    memtables\
    \ and its default value is also 0.25 times the heap size. Add\n    the value of\
    \ the `memtable_heap_space_in_mb`\n    parameter to the value of `memtable_offheap_space_in_mb`\n\
    \    parameter.\n\n*   Multiply the total from the preceding line by the value\
    \ of the  `memtable_cleanup_threshold`\n    parameter . This will give you the\
    \ threshold value in MB.\n\n*   When the combined memory used by all memtables\
    \ on a node exceeds the\n    threshold value, the database flushes the largest\
    \ memtable on this node\n    to disk.\n\nThe  `memtable_flush_writers`\nparameter\
    \  denotes the number of memtable flush writer threads.\nThe default value for\
    \ this parameter, which the database uses for\ncomputing the value of the `memtable_cleanup_threshold`\n\
    parameter, is determined in the following manner:\n\nThe number of disks or the\
    \ number of cores on a node, with the minimum\nvalue being 2 and the maximum being\
    \ 8.\n\nThe following is an example that shows how the database determines when\n\
    to flush a memtable to disk.\n\n1.  Assume that you have set the node’s `memtable_flush_writers`\n\
    \    parameter to 8.\n\n2.  The default value of the `memtable_cleanup_threshold`\n\
    \    parameter is `1/memtable_flush_writers +1`, so in this case, it works out\
    \ to 1/(8+1) = 0.11.\n\n3.  Assume that you’ve set both the `memtable_heap_space_in_mb`\n\
    \    and the `memtable_offheap_space_in_mb`\n    parameters to 2000.\n\n4.  The\
    \ `memtable_cleanup_threshold`\n    parameter’s value is 0.11, from Step 2\\.\
    \ The sum of the `memtable_heap_space_in_mb`\n    and the `memtable_offheap_space_in_mb`\n\
    \    parameters is 2000+2000=4000\\. The space threshold for memtable cleanup\n\
    \    then is 4000 - 4000*0.11=3636MB.\n\n5.  When the combined amount of space\
    \ used by the memtables on this node\n    exceeds 3636MB, Cassandra flushes the\
    \ largest memtable to disk.\n\nThe larger the value of the `memtable_cleanup_threshold`\n\
    parameter, the less frequently the database will flush the memtables to\ndisk.\
    \ This also means fewer SSTables, which in turn means a smaller\nlevel of compaction\
    \ activity.\n\nTuning the JVM\n\nEverything runs inside a JVM in Cassandra. Cassandra\
    \ uses the JVM heap\nto optimize read performance. To do this, it keeps components\
    \ such as\nBloom filters, the partition key cache, the SSTable index summary,\
    \ and\nthe partition summary inside the heap.\n\nIn addition to the Java heap\
    \ memory, Cassandra uses memory for\nsupporting the page cache, the Bloom filters,\
    \ and cached rows.\n\nIt’s important to learn how to tune the JVM. The key things\
    \ to know in\nthis regard are\n\n*   How Java garbage collection works\n\n*  \
    \ The ideal garbage collector to use\n\n*   Allocating the Java heap size\n\n\
    Configuring garbage collection and allocation of the correct amount of\nmemory\
    \ to the JVM (heap) are critical to high performance. Let’s learn\nabout both\
    \ in the following sections.\n\nJava\nGarbage Collection \n\nGarbage collection\
    \ is how the JVM removes older objects from memory. You\nhave a choice of different\
    \ garbage collectors. There are several types\nof regions inside a Java memory\
    \ heap, such as young and old regions, and\nwithin each memory region there are\
    \ smaller subregions as well. When the\nJVM needs to clear up a memory region\
    \ that’s full, it pauses the running\noperations. Your goal when tuning Java garbage\
    \ collection is to keep the\npauses to a minimum. You should not only seek to\
    \ minimize the garbage\ncollection-induced pauses to a minimum, but also to reduce\
    \ the number of\npauses.\n\nSelecting the Right Garbage Collector\n\nThe two available\
    \ Java garbage collectors are the Concurrent Mark Sweep\n(CMS) and the G1 (Garbage\
    \ First) garbage collector. Here’s how you\ndecide between the two garbage collectors:\n\
    \n*   If you’re working with heap sizes smaller than 14GB and you’re dealing\n\
    \    with the same workloads all the time, CMS is better.\n\n    Note With the\
    \ next release of Java\n    (Java 9), CMS will be officially obsolete.\n\n*  \
    \ If you’re dealing with heap sizes larger than 14GB and the database is\n   \
    \ processing diverse types of workloads, use the G1 garbage collector.\n\nYou\
    \ configure the Java garbage collector  by editing\nsettings in the `$CASSANDRA_HOME/conf/jvm.options`\n\
    file. The `jvm.options` file,\nwhich I first explained in Chapter [2](#A436674_1_En_2_Chapter.html),\
    \ helps set several properties such\nas the startup parameters, general JVM settings,\
    \ heap settings, and\ngarbage collection-related settings.\n\nThe default garbage\
    \ collector is CMS, and you can view the settings for\nthis collector in the `java.options`\
    \ file\nunder the GC SETTINGS section, as shown here:\n\n```"
  trans: "\n# Cassandra 数据库性能调优\n\n## 测试压缩策略\n在不影响生产工作负载的情况下，测试压缩策略并基准化写入性能差异。\n```bash\n\
    -Dcassandra.write_survey=true\n```\n\n## 启用与禁用自动压缩\n您可以使用以下命令为一个或多个表启用和禁用自动压缩：\n\
    ```bash\n$ nodetool enableautocompaction cycling cyclist_name;\n$ nodetool disableautocompaction\
    \ cycling cyclist_name;\n```\n\n## 查看所有压缩历史\n您可以使用 `nodetool compactionhistory`\
    \ 命令查看数据库中所有压缩活动的历史记录：\n```bash\n$ nodetool compactionhistory\nCompaction History:\n\
    id                                   keyspace_name columnfamily_name   compacted_at\
    \            bytes_in bytes_out rows_merged\nf6227aa0-81e8-11e7-a4ad-89801d899afb\
    \ cycling       cycle               2017-08-15T11:38:41.994 111      55      \
    \  {1:1, 2:1}\nef3d57a0-81e8-11e7-a4ad-89801d899afb cycling       cyclist_name\
    \        2017-08-15T11:38:30.426 243      243       {1:5}\n...\n```\n\n该命令的输出包含七个列。`bytes_in`\
    \ 和 `bytes_out` 列通过比较压缩前后 SSTable 的大小，帮助您判断压缩效果。\n\n输出中的 `tables:rows` 表示法（例如\
    \ `{1:5}`）说明了 Cassandra 如何选择行进行压缩。例如，`{1:5}` 表示数据库从五个 SSTable 中各取一行来创建一个新的压缩 SSTable。类似地，`{1:3,3:1}`\
    \ 表示数据库从一个 SSTable 中取三行，并与另外三个表中的单行合并，创建一个压缩 SSTable。\n\n`nodetool compactionstats`\
    \ 命令显示所有待处理和正在进行的压缩操作的状态。您可以通过查看 PROGRESS 列来检查压缩操作的完成百分比。\n\n## 压缩数据以节省存储空间\n\
    通过让 Cassandra 压缩磁盘上的 SSTable，可以节省存储空间。除了在存储方面带来收益外，压缩还能略微提升性能。DataStax 估计，根据数据类型的不同，压缩可能会使存储空间减少\
    \ 25-33%，读取性能提升 25-35%，写入性能略有提升（5-10%）。\n\n当 Cassandra 需要读取压缩数据时，它会定位 SSTable\
    \ 索引中的行并解压缩必要的行块。\n\n最适合压缩的表是那些具有相似列集、且行中列数相同的表。数据在不同行中越相似，压缩数据能节省的空间就越多，因为压缩因子会更高。\n\
    \n### 配置压缩\nCassandra 默认启用压缩，您可以配置各种压缩选项，包括压缩期间数据库必须使用的压缩算法。您可以在创建表时进行配置，或者稍后通过修改表来配置。以下语法语句显示了您可以配置的四个压缩属性：\n\
    ```\ncompression = {\n['class' : 'compression_algorithm_name',\n'chunk_length_kb'\
    \ : 'value',\n'crc_check_chance' : 'value',]\n| 'sstable_compression' : '']\n\
    }\n```\n\n最重要的压缩属性是压缩类（`class`），它指定了压缩期间数据库必须使用的压缩算法。您可以从以下压缩类中选择：\n*   `LZ4Compressor`\n\
    *   `SnappyCompressor`\n*   `DeflateCompressor`\n\n> **注意**\n> 除了 `LZ4`、`Snappy`\
    \ 和 `Deflate` 压缩类之外，您还可以使用 `org.apache.cassandra.io.compress.ICompressor` 接口实现自己的压缩类。\n\
    \n选择压缩算法时，您需要在节省存储空间和数据库读取性能这两个相互冲突的目标之间进行权衡。通常，通过压缩数据获得的存储空间节省与数据库在读取时解压缩数据的速度成反比。\n\
    \n`Snappy` 和 `Deflate` 都提供更高的压缩比，意味着与使用 LZ4 算法相比，使用这些算法可以节省更多的存储空间。然而，LZ4 提供最快的解压缩速度，这意味着查询压缩数据时具有更高的读取性能。\n\
    \n默认的压缩算法是 `LZ4Compressor`。要为表指定压缩算法，您需要为该压缩算法指定其类，如下所示：\n```sql\nCREATE TABLE\
    \ customers (\n...\nPRIMARY KEY (id)\n)\nWITH compression = { 'class' : 'SnappyCompressor'\
    \ };\n```\n\n除了指定压缩算法，您在创建或修改表时还可以配置以下与压缩相关的属性：\n*   `chunk_length_kb`：默认情况下，此属性的值设置为\
    \ 64KB。这是 Cassandra 压缩 SSTable 时压缩块的大小。通过为此参数指定更高的值，您可以增加压缩比，但数据库每次读取操作必须从磁盘读取更多数据。默认值对于大多数用例来说是合适的，但如果数据库一次需要从磁盘读取大量数据，您可以提高此参数的值。\n\
    *   `crc_check_chance`：此属性确定数据库在读取操作期间检查压缩数据块校验和的概率。校验和有助于检测损坏，并防止数据库将损坏的数据副本传播到其他节点。`crc_check_chance`\
    \ 属性的默认值为 1，表示数据库在读取期间始终检查数据的校验和（概率为 1 意味着事件总是发生）。您可以通过将此参数设置为 0 来完全禁用校验和检查。参数值越低，Cassandra\
    \ 在读取期间执行数据校验和的可能性就越小。\n\n### Cassandra 何时压缩数据\n当您使用 `ALTER TABLE` 语句为现有表配置压缩时，Cassandra\
    \ 将开始压缩该表的所有新 SSTable。但是，Cassandra 不会立即压缩所有现有的 SSTable。Cassandra 将在下次对数据库中的数据执行压缩时压缩现有\
    \ SSTable。\n\n您可以通过强制重写现有 SSTable（在此过程中压缩表）来修改 Cassandra 的默认压缩行为。您可以通过执行 `nodetool\
    \ upgradesstables` 或 `nodetool scrub` 命令来实现。\n\n`nodetool upgradesstables` 命令的语法如下：\n\
    ```bash\n$ nodetool upgradesstables\n( -a | --include-all-sstables )\n--    ...\n\
    ```\n\n`nodetool upgradetsstables` 命令会重写 SSTable，并在此过程中压缩它们。如果您希望数据库在为 SSTable\
    \ 配置压缩后立即开始压缩数据，可以运行此命令。当您希望修改表的压缩算法时，也可以运行此命令。\n\n您可以通过运行 `nodetool scrub` 命令使\
    \ Cassandra 压缩已配置压缩的表。该命令还会像 `nodetool upgradesstables` 命令一样重建节点中的 SSTable，但它需要在表重建之前创建快照。`nodetool\
    \ upgradesstables` 命令是比 `nodetool scrub` 更好的选择，因为您不需要在数据库压缩 SSTable 之前创建快照。\n\n\
    ### 修改压缩算法\n默认的压缩算法是 `LZ4Compressor`。您可以在创建表时通过将压缩参数 `class` 配置为不同的压缩类（本例中为 `DeflateCompressor`）来更改压缩算法：\n\
    ```sql\nCREATE TABLE MyTable (\n...\nPRIMARY KEY (user_id)\n)\nWITH compression\
    \ = { 'class' : DeflateCompressor };\n```\n\n您可以在创建表后修改任何压缩属性，包括 `compression\
    \ class` 属性。以下示例展示了如何修改压缩算法的 `class` 属性（改为 `DeflateCompressor`）：\n```sql\nALTER\
    \ TABLE customers\nWITH compression = { 'class' : 'DeflateCompressor', 'chunk_length_in_kb'\
    \ : 6\n```\n\n### 测试压缩效果\n在初次尝试压缩时，您可能希望了解不同压缩策略的影响，同时又不影响生产数据库性能。Cassandra 允许您通过以写入调查模式启动数据库来测试压缩策略。\n\
    \n本章的“测试压缩策略效果”部分描述了如何使用 Cassandra 的写入调查模式来测试您的压缩计划。\n\n在写入调查模式下启动新节点有助于测试新的压缩策略并基准写入性能。要检查压缩策略对读取性能的影响，您可以将一个节点从集群中取出，并使用\
    \ `cassandra-stress` 工具（我在本章中会解释）基准测试其读取操作的性能，将该节点作为独立服务器使用。\n\n## 关闭压缩\n默认情况下，Cassandra\
    \ 会压缩数据。您可以在创建表时通过将压缩参数 `enabled` 指定为 `false` 来禁用压缩：\n```sql\nCREATE TABLE MyTable\
    \ (\n...\nPRIMARY KEY (user_id)\n)\nWITH compression = { 'enabled' : false };\n\
    ```\n\n您可以通过为现有表指定 `sstable_compression` 选项并为其赋予空值（' '）来禁用压缩，如下所示：\n```bash\n\
    cqlsh> ALTER TABLE cycling.cyclist_name\nWITH COMPRESSION = {'sstable_compression':\
    \ ' ');\n```\n\n## 通过 Memtable 阈值提升写入性能\n如您所知，当 Cassandra 超过提交日志阈值或 Memtable 清理阈值时，它会将\
    \ Memtable 刷新到磁盘（成为 SSTable）。关于设置提交日志和 Memtable 阈值没有固定的规则。\n\n如果您的写入负载包括对小部分数据的高更新或持续的写入流，您可以提高\
    \ Memtable 阈值。当存在大量写入时，如果保持 Memtable 阈值较低，将导致压缩效率低下。\n\nCassandra 使用 `memtable_cleanup_threshold`\
    \ 参数（在 `cassandra.yaml` 中）的设置来确定何时应刷新 Memtable。此参数的默认值为 1/(`memtable_flush_writers`\
    \ + 1)。然而，此参数仅表示 Cassandra 用于计算自动 Memtable 刷新空间量的比率。Cassandra 通过以下方式确定何时将 Memtable\
    \ 刷新到磁盘：\n*   `memtable_heap_space_in_mb` 参数决定了为 Memtable 分配的堆内内存量。此参数的默认值为堆大小的\
    \ 0.25 倍。`memtable_offheap_space_in_mb` 参数决定了为 Memtable 分配的堆外内存量，其默认值也是堆大小的 0.25\
    \ 倍。将 `memtable_heap_space_in_mb` 参数的值与 `memtable_offheap_space_in_mb` 参数的值相加。\n\
    *   将上一行的总和乘以 `memtable_cleanup_threshold` 参数的值。这将给出以 MB 为单位的阈值。\n*   当节点上所有 Memtable\
    \ 使用的组合内存超过阈值时，数据库会将该节点上最大的 Memtable 刷新到磁盘。\n\n`memtable_flush_writers` 参数表示 Memtable\
    \ 刷新写入线程的数量。数据库使用此参数来计算 `memtable_cleanup_threshold` 参数的值，其默认值由以下方式确定：\n节点上磁盘的数量或核心的数量，最小值为\
    \ 2，最大值为 8。\n\n以下是一个示例，展示了数据库如何确定何时将 Memtable 刷新到磁盘：\n1.  假设您已将节点的 `memtable_flush_writers`\
    \ 参数设置为 8。\n2.  `memtable_cleanup_threshold` 参数的默认值为 `1/(memtable_flush_writers\
    \ +1)`，因此本例中为 1/(8+1) = 0.11。\n3.  假设您已将 `memtable_heap_space_in_mb` 和 `memtable_offheap_space_in_mb`\
    \ 参数都设置为 2000。\n4.  步骤 2 得出 `memtable_cleanup_threshold` 参数的值为 0.11。`memtable_heap_space_in_mb`\
    \ 和 `memtable_offheap_space_in_mb` 参数的总和为 2000+2000=4000。因此，Memtable 清理的空间阈值为\
    \ 4000 - 4000*0.11=3636MB。\n5.  当此节点上 Memtable 使用的组合空间量超过 3636MB 时，Cassandra 会将最大的\
    \ Memtable 刷新到磁盘。\n\n`memtable_cleanup_threshold` 参数的值越大，数据库将 Memtable 刷新到磁盘的频率就越低。这也意味着更少的\
    \ SSTable，从而意味着更小的压缩活动级别。\n\n## 调整 JVM\n在 Cassandra 中，所有操作都在 JVM 内部运行。Cassandra\
    \ 使用 JVM 堆来优化读取性能。为此，它将布隆过滤器、分区键缓存、SSTable 索引摘要和分区摘要等组件保留在堆中。\n\n除了 Java 堆内存，Cassandra\
    \ 还使用内存来支持页面缓存、布隆过滤器和缓存行。\n\n了解如何调整 JVM 非常重要。在这方面需要知道的关键是：\n*   Java 垃圾回收的工作原理\n\
    *   理想的垃圾收集器\n*   分配 Java 堆大小\n\n配置垃圾回收和为 JVM（堆）分配正确数量的内存对高性能至关重要。让我们在以下部分中了解这两点。\n\
    \n### Java 垃圾回收\n垃圾回收是 JVM 从内存中移除旧对象的方式。您可以选择不同的垃圾收集器。Java 内存堆内部有几种类型的区域，例如年轻代和老年代，在每个内存区域内还有更小的子区域。当\
    \ JVM 需要清理已满的内存区域时，它会暂停正在运行的操作。调整 Java 垃圾回收的目标是尽量减少暂停时间。您不仅应该寻求将垃圾回收引起的暂停时间最小化，还应该减少暂停次数。\n\
    \n### 选择正确的垃圾收集器\n可用的两种 Java 垃圾收集器是并发标记清除（CMS）和 G1（垃圾优先）垃圾收集器。您可以这样在两者之间做出决定：\n\
    *   如果您处理的堆大小小于 14GB，并且始终处理相同类型的工作负载，CMS 更佳。\n    > **注意** 在 Java 的下一个版本（Java\
    \ 9）中，CMS 将正式被废弃。\n*   如果您处理的堆大小大于 14GB，并且数据库正在处理不同类型的工作负载，请使用 G1 垃圾收集器。\n\n您可以通过编辑\
    \ `$CASSANDRA_HOME/conf/jvm.options` 文件中的设置来配置 Java 垃圾收集器。`jvm.options` 文件（我在第\
    \ 2 章中首先解释过）有助于设置多个属性，例如启动参数、通用 JVM 设置、堆设置以及垃圾回收相关设置。\n\n默认的垃圾收集器是 CMS，您可以在 `java.options`\
    \ 文件的 GC SETTINGS 部分查看此收集器的设置，如下所示：\n"
- fmt: "# Cassandra性能调优与安全配置\n\n## CMS垃圾收集器设置\n\n```\n-XX:+UseParNewGC\n-XX:+UseConcMarkSweepGC\n\
    -XX:+CMSParallelRemarkEnabled\n-XX:SurvivorRatio=8\n-XX:MaxTenuringThreshold=1\n\
    -XX:CMSInitiatingOccupancyFraction=75\n-XX:+UseCMSInitiatingOccupancyOnly\n-XX:CMSWaitDuration=10000\n\
    -XX:+CMSParallelInitialMarkEnabled\n-XX:+CMSEdenChunksRecordAlways\n\n# some JVMs\
    \ will fill up their heap when accessed via JMX, see CASSANDRA-6541\n-XX:+CMSClassUnloadingEnabled\n\
    ```\n\n如果你想将垃圾收集器从默认的CMS收集器切换到更新的G1收集器，首先必须注释掉`CMS Settings`部分下的所有内容。接着，编辑G1设置并取消注释`-XX:+UseG1GC`属性，如下所示：\n\
    \n## G1垃圾收集器设置（实验性功能，注释上一节并取消注释下节以启用）\n\n```\n## Use the Hotspot garbage-first\
    \ collector.\n-XX:+UseG1GC                        => By default, this property\
    \ is commented\n#\n```\n\n以下是可以配置的G1设置：\n\n*   `-XX:MaxGCPauseMillis`：\n    这是关键的G1垃圾收集器可调优属性。暂停目标越低，吞吐量就越低。`MaxGCPauseMillis`属性的最低设置是200毫秒，这也是该属性的默认值。通过将值从200毫秒提高到1000毫秒，可以增加吞吐量。你必须尝试将此参数的值保持小于`cassandra.yaml`文件中的超时时间。\n\
    \n    ```\n    ## Have the JVM do less remembered set work during STW, instead\n\
    \    ## preferring concurrent GC. Reduces p99.9 latency.\n    -XX:G1RSetUpdatingPauseTimePercent=5\n\
    \    #\n    ```\n\n*   `-XX:InitiatingHeapOccupancyPercent`：\n    设置此参数可以节省大型Java堆（大于16GB）中的CPU时间。JVM通过暂停扫描内存区域以检查它们是否已满，直到堆达到设定的百分比满为止。例如，如果你将堆占用百分比设置为70%，这意味着当堆达到70%满时，JVM开始扫描内存区域。此参数的默认值为40%。\n\
    \n我没有展示任何CMS收集器的配置属性，因为它即将被淘汰。\n\n## 设置堆大小\n\n你可以通过设置`jvm.options`文件中`HEAP SETTINGS`部分下列出的属性来配置Java堆大小。\n\
    当你使用G1垃圾收集器时，你需要用`-Xmx`属性配置`MAX_HEAP_SIZE`属性。\n你用`-Xms`属性设置最小堆大小，用`-Xmx`属性设置最大堆大小。\n\
    \n默认情况下，`-Xms`和`-Xmx`属性被注释，Cassandra使用以下简单的启发式方法自动计算`MAX_HEAP_SIZE`属性的值：\n\n```\n\
    max(min(1/2 ram, 1024MB), min(1/4 ram, 8GB))\n```\n\n也就是说，它估算一半的RAM并将其上限设为1024MB。它还计算RAM的四分之一值并将其上限设为8GB。然后它取两者中较高的值。\n\
    \n在生产数据库中，最佳实践是为`-Xmx`和`-Xms`属性设置自定义值。设置堆的最大值时，`MAX_HEAP_SIZE`属性的推荐值是尽可能设置得高，最高可达64GB。\n\
    \n另一个（可能是必要的）最佳实践是将最小和最大堆大小设置为相同的值，如下所示：\n\n```\n-Xms16G\n-Xmx16G\n```\n\n将最小和最大堆大小设置为相同的值有助于数据库避免在JVM通过移除陈旧对象清理堆区域空间时发生长时间的垃圾收集暂停（也称为“世界停止”暂停）。相反，JVM在服务器启动时锁定你为堆指定的内存，以防止部分内存被交换到磁盘。\n\
    \n## 配置垃圾收集日志记录\n\n最佳实践是启用GC日志记录，默认情况下它是启用的。你可以查看GC日志以了解节点堆使用情况的大小，这有助于你根据情况调整它。以下是`java.options`文件中的相关部分：\n\
    \n```\n### GC logging options -- uncomment to enable\n-XX:+PrintGCDetails\n-XX:+PrintGCDateStamps\n\
    -XX:+PrintHeapAtGC\n-XX:+PrintTenuringDistribution\n-XX:+PrintGCApplicationStoppedTime\n\
    -XX:+PrintPromotionFailure\n#-XX:PrintFLSStatistics=1\n#-Xloggc:/var/log/cassandra/gc.log\n\
    -XX:+UseGCLogFileRotation\n-XX:NumberOfGCLogFiles=10\n-XX:GCLogFileSize=10M\n\
    ```\n\n如你所见，这里显示的属性帮助你配置垃圾收集日志记录的各个方面，例如日志位置、日志文件轮换、日志文件大小以及要存储的日志文件数量。\n\n##\
    \ 使用nodetool proxyhistograms和tablehistograms命令\n\n有两个很好的`nodetool`命令可以帮助你识别集群中的性能问题：`nodetool\
    \ proxyhistograms`和`nodetool tablehistograms`。这两个命令都以直方图的形式呈现数据库捕获的性能统计信息，因此得名。\n\
    \n`nodetool proxyhistograms`命令有助于识别性能问题。此命令的输出显示集群中的读、写和范围请求延迟，其中节点充当协调者。此命令帮助你识别集群中的一般性能问题。\n\
    \n`nodetool tablehistograms`命令让你专注于特定表的性能。通过此命令，你可以查看表的写和读延迟以及分区大小。\n\n## 总结\n\
    \n本章介绍了几个关键的Cassandra性能调优策略，例如压缩和压紧。性能调优通常涉及权衡取舍；你可以通过压缩节省存储，但必须为此付出更高的I/O要求。同样，增加Java堆大小将减少查询延迟，但会减少系统中可用于其他用途的内存。\n\
    \n`cassandra-stress`工具简单易用，在测试潜在的配置更改（如压紧策略、压缩等）的影响时非常有用。压力测试有助于你评估集群处理不同类型工作负载的能力，并帮助你判断是否需要向集群添加更多节点。\n\
    \n# Cassandra安全\n\n保护Cassandra集群涉及一系列不同的任务，包括认证、授权和加密。本章描述如何管理以下与安全相关的任务：\n\n\
    *   **认证**：如何允许应用程序和用户登录集群。\n*   **授权**：处理授予访问数据库或数据库对象（如表和物化视图）的权限。\n*   **加密**：指使用安全套接字层（SSL）来保护客户端与Cassandra数据库之间以及集群节点之间的通信。\n\
    *   **防火墙**：管理防火墙端口访问涉及了解你必须保持打开的端口。\n\n## 配置认证\n\n在大多数数据库中，通常使用“用户”和“角色”这两个术语来指代不同的实体。用户是登录账户，角色封装了你分配给用户的各种对象的权限集合。\n\
    \nCassandra将所有认证和授权都基于角色。你执行`CREATE ROLE`命令来创建数据库角色。\n\n> **注意**\n>\n> 所有授权和认证都通过数据库角色进行。尽管Cassandra仍然提供`CREATE\
    \ USER`、`ALTER USER`、`DROP USER`和`LIST USERS`命令，但你不应使用它们，因为它们在当前版本中已弃用。请改用`CREATE\
    \ ROLE`、`ALTER ROLE`、`DROP ROLE`、`LIST ROLES`和`LIST_PERMISSIONS`命令。\n\nCassandra仍然提供`CREATE\
    \ USER`命令来创建新的数据库用户账户，但此命令已弃用，仅用于向后兼容目的。\n\nCassandra不再正式使用“用户”一词来指代登录账户。因此，一个（登录）角色是用户的同义词。"
  raw: "#  GC SETTINGS  #\n#################\n\n### CMS Settings\n-XX:+UseParNewGC\n\
    -XX:+UseConcMarkSweepGC\n-XX:+CMSParallelRemarkEnabled\n-XX:SurvivorRatio=8\n\
    -XX:MaxTenuringThreshold=1\n-XX:CMSInitiatingOccupancyFraction=75\n-XX:+UseCMSInitiatingOccupancyOnly\n\
    -XX:CMSWaitDuration=10000\n-XX:+CMSParallelInitialMarkEnabled\n-XX:+CMSEdenChunksRecordAlways\n\
    \n# some JVMs will fill up their heap when accessed via JMX, see CASSANDRA-6541\n\
    -XX:+CMSClassUnloadingEnabled\n```\n\nIf you want to switch the garbage collector\
    \ from the default CMS\ncollector to the newer G1 collection, first you must comment\
    \ everything\nunder the CMS Settings section. Following this, edit the G1 settings\
    \ and\nuncomment the `-XX:+UseG1GC`\nproperty, as shown here:\n\n```\n\n### G1\
    \ Settings (experimental, comment previous section and uncomment section below\
    \ to enable)\n\n## Use the Hotspot garbage-first collector.\n-XX:+UseG1GC    \
    \                    => By default, this property is commented\n#\n```\n\nHere\
    \ are the G1 settings you can configure :\n\n*   `XX:MaxGCPauseMillis`:\n    This\
    \ is the key GI garbage collector tunable property. The lower the\n    pause target,\
    \ the lower the throughput. The lowest setting for the\n    MaxGCPauseMillis property\
    \ is 200 ms, which also happens to be the\n    default value for this property.\
    \ By raising the value from 200 ms to\n    1000 ms, you can increase the throughput.\
    \ You must try to keep this\n    parameter’s value smaller than the timeouts in\
    \ the `cassandra.yaml` file.\n\n    ```\n    ## Have the JVM do less remembered\
    \ set work during STW, instead\n    ## preferring concurrent GC. Reduces p99.9\
    \ latency.\n    -XX:G1RSetUpdatingPauseTimePercent=5\n    #\n    ```\n\n*   `-XX:InitiatingHeapOccupancyPercent`:\n\
    \    Setting this parameter saves the CPU time in Java heaps that are large\n\
    \    (greater than 16GB). The JVM does this by holding off the scanning of\n \
    \   the memory regions to see if they’re full, until the heap gets to a set\n\
    \    percentage full. If, for example, you set the heap occupancy percent to\n\
    \    70%, it means that when the heap gets 70% full, the JVM starts scanning\n\
    \    the memory regions. The default value for this parameter is 40%.\n\nI don’t\
    \ show any configuration properties for the CMS collector since\nit’s on its way\
    \ out.\n\nSetting the Heap Size\n\nYou can configure the Java heap size by setting\
    \ the properties listed\nunder the HEAP SETTINGS section in the `jvm.options`\
    \ file.\nWhen you are using G1 garbage collector, you need to configure the `MAX_HEAP_SIZE`\n\
    property with the `-Xmx` property. You\nset the minimum heap size with the `-Xms`\
    \ property and the\nmaximum heap size with the `-Xmx` property.\n\nBy default,\
    \ the `-Xms` and `-Xmx` properties are\ncommented, and Cassandra automatically\
    \ figures the value of the `MAX_HEAP_SIZE`\nproperty with the following simple\
    \ heuristic:\n\n```\nmax(min(1/2 ram, 1024MB), min(1/4 ram, 8GB))\n```\n\nThat\
    \ is, it estimates half the RAM and caps it at 1024MB. It also\ncalculates the\
    \ quarter value of the RAM and caps it at 8MB. It then\npicks the higher (max)\
    \ of the two values.\n\nIn a production database, it’s a best practice to set\
    \ custom values for\nthe -Xmx and the -Xms properties. When setting the maximum\
    \ value of the\nheap, the recommended value for the MAX_HEAP_SIZE property is\
    \ to set it\nas high as possible, up to a value of 64GB.\n\nAnother (probably\
    \ essential) best practice is to set the min and max\nheap sizes to the same value,\
    \ as shown here:\n\n```\n-Xms16G\n-Xmx16G\n```\n\nSetting the minimum and maximum\
    \ heap  sizes to the same\nvalue helps the database avoid long garbage collection\
    \ pauses (also\ncalled stop-the-world pauses) when the JVM clears up space in\
    \ the heap\nregions by removing stale objects. Instead, the JVM locks the memory\
    \ you\nspecify for the heap when the server starts up to keep parts of it from\n\
    being swapped to disk.\n\nConfiguring Garbage Collection Logging\n\nIt’s a best\
    \ practice to enable GC logging and by default it is enabled.\nYou can check the\
    \ GC logs to see the size of the heap usage by a node,\nwhich helps you adjust\
    \ it as you go along. Here’s the relevant portion\nfrom the `java.options` file:\n\
    \n```\n\n### GC logging options -- uncomment to enable\n-XX:+PrintGCDetails\n\
    -XX:+PrintGCDateStamps\n-XX:+PrintHeapAtGC\n-XX:+PrintTenuringDistribution\n-XX:+PrintGCApplicationStoppedTime\n\
    -XX:+PrintPromotionFailure\n#-XX:PrintFLSStatistics=1\n#-Xloggc:/var/log/cassandra/gc.log\n\
    -XX:+UseGCLogFileRotation\n-XX:NumberOfGCLogFiles=10\n-XX:GCLogFileSize=10M\n\
    ```\n\nAs you can tell, the properties shown here help you configure various\n\
    aspects of garbage collection logging, such as the location of the log,\nlog file\
    \ rotation, the size of the log files, and the number of log\nfiles to store.\n\
    \nUsing the nodetool proxyhistograms and\nthe tablehistograms Commands\n\nThere\
    \ are two good nodetool commands that help you identify performance\nissues in\
    \ a cluster: `nodetool proxyhistograms` and `nodetool tablehistograms`. Both commands\
    \ present performance statistics\ncaptured by the database in the form of histograms,\
    \ hence the command\nnames.\n\nThe `nodetool proxyhistograms` command is helpful\
    \ in identifying performance\nissues. The output of this command shows read, write,\
    \ and range request\nlatencies in a cluster, for which a node acted as the coordinator.\
    \ This\ncommand helps you identify general performance issues in a cluster.\n\n\
    The `nodetool tablehistograms` command lets you focus on the performance of a\n\
    specific table. You can view the write and read latency and the\npartition size\
    \ of tables with this command.\n\nSummary\n\nThis chapter presented several key\
    \ Cassandra performance tuning\nstrategies such as compaction and compression.\
    \ Performance tuning often\ninvolves tradeoffs; you can conserve storage through\
    \ compression, but\nyou must pay for it with higher I/O requirements. Similarly,\
    \ increasing\nthe Java heap size will decrease query latencies, but reduces the\
    \ amount\nof memory available for other uses in the system.\n\nThe `cassandra-stress`\
    \ tool\nis simple to use and is highly useful in testing the impact of potential\n\
    configuration changes such as a compaction strategies, compression, etc.\nStress\
    \ testing helps you evaluate the ability of a cluster to handle\ndiverse types\
    \ of workloads and helps you figure out if you need to add\nmore nodes to your\
    \ cluster.\n\n12. Securing Cassandra\n\nSecuring a Cassandra cluster involves\
    \ a varied set of tasks including\nauthentication, authorization, and encryption.\
    \ This chapter describes\nhow you manage the following security-related tasks:\n\
    \n*   Authentication: How you allow\n    applications and users to log into the\
    \ cluster.\n\n*   Authorization: Deals with the\n    granting of permissions to\
    \ access a database or database objects such as\n    tables and materialized views.\n\
    \n*   Encryption: Refers to the use of\n    the Secure Socket Layer (SSL) to secure\
    \ communications between clients\n    and Cassandra databases, and among a cluster’s\
    \ nodes.\n\n*   Firewalls: Managing firewall\n    port access involves knowing\
    \ which ports you must keep open.\n\nConfiguring Authentication\n\nIn most databases,\
    \ it’s typical to use the terms users and roles to refer to different entities.\n\
    Users are login accounts and roles encapsulate sets of privileges on\nvarious\
    \ objects that you assign to users.\n\nCassandra bases all authentication  and\n\
    authorization on roles. You execute the `CREATE ROLE` command\nto create database\
    \ roles.\n\nNote\n\nAll authorization and authentication is through database roles.\
    \ Although\nCassandra continues to offer the `CREATE USER`, `ALTER USER, DROP\
    \ USER,` and `LIST USERS` commands, you mustn’t use them because they’re deprecated\n\
    in the current release. Use the `CREATE ROLE, ALTER ROLE, DROP ROLE, LIST ROLES,`\
    \ and `LIST_PERMISSIONS`\ncommands instead.\n\nCassandra still offers the `CREATE\
    \ USER` command\nto create new database user accounts, but this command is deprecated\
    \ and\nis there just for backwards compatibility purposes.\n\nCassandra  doesn’t\n\
    formally use the term users to\nrefer to login accounts any longer. Therefore,\
    \ a (login) role is a\nsynonym for a user."
