  trans: '## 什么是数据建模？


    数据建模既是一门科学，也是一门艺术。数据建模是一个结构化的过程，包括以下内容：


    *   收集和分析信息系统的数据需求

    *   识别系统中的实体及其间的关系

    *   识别数据访问模式

    *   以特定方式组织和构建数据

    *   设计和指定数据库模式

    *   使用诸如索引数据等技术来优化模式


    当你进行数据建模工作时，通常遵循一个包含以下五个关键步骤或阶段的过程：


    *   分析你的需求。

    *   识别实体和关系——概念数据模型。

    *   识别常见查询——应用工作流。

    *   指定模式——逻辑数据模型（设计表）。

    *   优化模式——物理数据模型（使用 `CQL` 实现设计）。优化包括键、分区大小和排序。


    在以下部分中，我将解释 `Cassandra` 数据建模的五个主要组成部分。


    ### 分析你的需求


    `Cassandra` 数据建模的需求部分很简单。在大多数情况下，你希望使用 `Cassandra` 来解决以下问题：


    *   可扩展性：你的数据流入量大且不断增长。

    *   可靠性：你需要一个始终可用、高度可靠的数据存储。

    *   易用性：你需要一个易于设置和管理的数据库。


    ### 概念建模：识别实体及其间的关系


    理想情况下，你必须设计查询，使它们访问单个表。你将与某个实体相关的所有属性都包含在单个表中。这与关系表设计不同，在关系表设计中，你将有关实体的数据存储在多个表中，并使用外键链接这些表。`Cassandra`
    的每个查询对应一个表的方法能带来更快的性能。


    如前所述，在关系数据库中，你从逻辑关系模型开始，然后基于这些关系构建物理表。`Cassandra` 遵循类似的策略，但非常强调考虑你计划对数据库表运行的查询。与关系模型不同，`Cassandra`
    数据库中没有连接和引用完整性约束。


    最后，它非常强调反规范化，这与你在关系数据库中所做的恰恰相反，关系数据库的重点完全在于规范化数据。概念建模使用著名的实体关系模型 (`ERM`) 来建立实体及其间的关系。


    你在 `Cassandra` 中通过设计和创建多个表来实现数据反规范化。在最近的版本中，`Cassandra` 提供了物化视图，这也使你能够基于相同的底层
    `SSTables` 创建多个视图。


    ### 审查你想要使用的查询


    在本节中，我将使用几个例子向你展示如何根据你预期的查询来设计表。


    让我们使用 `DataStax` 著名的 `Pro Cycling` 统计数据来进行表设计。


    注意：`Cassandra` 通过在多个表中重复数据来反规范化数据。这与关系数据库完全相反，关系数据库力求通过规范化来最小化数据重复。


    #### 示例 1


    假设你想运行一个查询，按名字和姓氏列出每位自行车手。你的逻辑模型将如下所示：


    ```

    cyclist_name

    id

    lastname

    firstname

    ```


    在此模型中，


    *   分区键：`id`

    *   聚类列：无


    此表具有强制性的主键，即列 `id`。在此情况下，`id` 仅由分区键组成。


    #### 示例 2


    前面的示例相当初级。你可以仅按 `id` 查询，但无法知道自行车手参加的比赛类型。假设你想在特定比赛类型中查找自行车手。你会想创建一个不同的表，其中包含来自示例
    1 的一些相同列，但也添加一些新列。


    ```

    cyclist_race_type

    race_type

    id

    points

    lastname

    ```


    在此模型中，


    *   分区键：`race_type`

    *   聚类列：`id`


    此表可帮助你按比赛类型对所有自行车手进行分组。在第一个示例中作为分区键的 `id` 列，现在充当聚类列，因为你希望在分区内按 `id` 对自行车手进行分组。


    ### 逻辑建模


    前面关于概念建模的部分展示了如何基于预期查询设计表。数据建模的下一步是创建逻辑模型，其中包含满足你每个关键查询的表，确保这些表包含你在概念模型中识别的实体和关系。


    正是在逻辑建模阶段，你确定表的主键，以及支持你的查询可能需要的排序的聚类列。`Cassandra` 将其行组织到表中。每个表都有一个强制性的主键。主键有多个组成部分，第一个组成部分是分区键。除了主键之外，你还可以索引其他列，这些其他索引称为二级索引。


    ### 物理数据建模


    在物理建模阶段，你着手实际创建数据库对象，如表和索引。你确定数据类型，包括你可能需要的任何用户定义类型。你还需要确定所需的键空间以及分区和复制策略。


    除了二级索引，在物理数据建模阶段，你还必须考虑你可能需要的任何物化视图。


    正是在这个阶段，你执行大小计算，以确定存储数据所需的空间。


    你在物理数据建模阶段执行若干优化，包括指定分区大小和排序。


    一旦你审查并完善了物理模型，就可以通过执行 `DDL` 命令（如 `CREATE KEYSPACE, CREATE TYPE,` 和 `CREATE TABLE`）在
    `CQL` 中实现数据库模式。


    ## Cassandra 数据建模规则


    对于从关系数据库背景转向 `Cassandra` 的开发人员和架构师来说，很自然会带上他们传统的数据建模思维。大错特错！许多著名的关系数据库建模原则或规则不适用于
    `Cassandra`，而且有几个新的规则你需要学习，才能真正从使用 `Cassandra` 数据库中受益。虽然 `CQL` 确实与 `SQL` 相似，但要避免诱惑去创建你可能习惯的传统数据模型。


    要从 `Cassandra` 数据库中获得最佳性能，最好遵循某些成熟的数据建模规则。遵循这些简单的规则，可以让你从一开始就拥有卓越的性能，并能在通过向集群添加越来越多节点进行扩展时保持高性能。


    ### 两个基本规则


    `Cassandra` 数据建模的规则并不多。你只需要记住两条规则：将数据分散到整个集群中，以及最小化 `Cassandra` 需要读取的分区数量。


    我将在以下部分详细阐述这两条关键规则。


    #### 将数据均匀分散到集群中


    在直观层面上，你应该寻求将数据均匀分布在 `Cassandra` 集群的节点上，这是有道理的。然而，这并非自动实现，因为 `Cassandra` 不会自动移动数据来平衡它。


    `Cassandra` 基于分区键的哈希值将数据分布到集群的各个节点上。分区键是表主键的第一个组成部分。因此，你需要选择一个好的主键来确保数据在所有节点上均衡分布。'
- fmt: '#### Minimizing the Number of Partitions to Be Read


    In a Cassandra table, a set of rows that share a partition key is called a `partition`.
    Ideally, you must store the data by grouping it together by partitions on the
    nodes. The fewer partitions a query needs to get its data, the faster you will
    get the results back.


    Each of a table’s partitions can live on a separate node. When you issue a query,
    the query coordinator may issue separate commands to multiple nodes, where each
    of the partitions may be located. This of course means more overhead and introduces
    additional latency to the execution of queries. You should seek to read a query’s
    data from as few partitions as possible.


    Even if multiple partitions are stored on the same node, because of the way Cassandra
    stores rows in a table, it’s cheaper to read the data from a single partition
    than from multiple partitions.


    ### Modeling Around Queries and Not Around Relations


    The way to satisfy the two basic rules, especially the minimizing of the number
    of partitions, is by modeling your database around your queries. Unlike in a relational
    database, where you model around the relations among entities, you model based
    on the queries you expect your database to support.


    When designing a data model, always start with the queries. You need to think
    in terms of how the users are going to want to view the data and how they’ll search
    through the data.


    What the users are going to search for should be the primary key of the table,
    and the information they want to view should be your columns. That’s all there’s
    to it. You don’t need to worry about all the normal forms and relationships among
    the data, etc.


    To model around your queries, you need to do two things:


    *   Find out the queries the database must support.

    *   Create appropriate tables.


    #### Determining the Queries


    There’s no single data model that serves all query cases. If you change the query
    requirements ever so slightly, you’ll need to modify your data model. When determining
    the queries you want a Cassandra database to support, think of the following types
    of requirements in a query:


    *   A query that requires unique values only in the result set

    *   A query that wants to filter the results based on specific criteria

    *   A query that wants to order the results

    *   A query that seeks to group the results


    #### Creating Appropriate Tables


    In relational databases, the tables in most cases are just a repository for specific
    data such as customer data or sales data. You create the tables based on relations
    among the entities. A table you create in this manner services several types of
    queries that seek the data stored in that table. Not so in Cassandra, where your
    goal when creating a table is to satisfy a query by reading a single partition.


    The strategy of satisfying a query by reading a single partition means that each
    of your queries uses a table for itself. If you have multiple queries that you
    need to support, you must create multiple tables, since it’s unlikely for a single
    table to efficiently service many distinct types of queries, as is the case in
    a relational database.


    The key to understanding the strategy here is to realize that your goal in creating
    a table isn’t merely so it can serve as a repository for data about specific attributes
    of an entity. Rather, the table is a prebuilt source of answers to a common query
    that you must support. To optimize reads, you must create custom tables that answer
    that query fast.


    ## Performance Limitations of Cassandra


    As good and powerful Cassandra is, it does suffer from some well-known limitations
    during writes as well as during reads. I summarize the main performance drawbacks
    in this section.


    ### Write Limitations


    Cassandra offers a very fast write throughput, but there are a couple of key compromises
    that enable it to do so, as explained in the following sections.


    #### No Support for Traditional Transactions


    Unlike in a relational database, there aren’t any rollback mechanisms in Cassandra.
    Nor do you have the traditional locking mechanisms that are the backbone of relational
    database transactions. Cassandra does support lightweight transactions as explained
    in Chapter 5, but these transactions are expensive.


    #### Overhead for Mutations and Deletes


    As you know by now, Cassandra stores its data in `SSTables` on disk. `SSTables`
    are immutable data structures. When you update data, Cassandra spreads the data
    across several `SSTables`. When you delete data, Cassandra creates `tombstones`
    (markers to denote data that’s to be deleted) to ensure that it deletes the data
    correctly across the cluster. A `tombstone` will suppress older data until the
    database can run a compaction, which will remove the data for good.


    Both the spreading of data across the `SSTables` during updates and the creation
    of `tombstones` during deletes means a higher overhead during read operations.
    This leads to pressure to compact the `SSTables` by cleaning them up.


    ### Read Limitations


    Cassandra suffers from a few known performance limitations during read operations,
    as I explain in the following sections.


    #### No Support for Joins


    As mentioned in Chapter 1, you can’t join data from multiple tables into a single
    query in Cassandra. There are no foreign keys to facilitate table joins, as is
    true of relational databases.


    Instead of joining tables, you de-normalize your data, thus duplicating it based
    on the expected queries. Alternatively, you can use another reporting technology
    such as Apache Spark to perform the joins.


    #### Indexes Work Differently


    Cassandra performs its searches via the primary key of a table, which is unique
    and helps identify a row very fast. `Secondary indexes`, employed by relational
    databases to speed up queries, however, are a different story altogether, and
    can negatively impact performance if you don’t use them for the limited use-cases
    where they are fine.


    #### Only Eventual Consistency


    The key principle behind Cassandra’s data model is `tunable consistency`, where
    the client applications determine the consistency of the data they require.


    Even though Cassandra automatically replicates data across the cluster, there’s
    an inherent latency in replicating the data, and you’re bound by the principle
    of `eventual consistency`. `Eventual consistency`, also called `optimistic replication`,
    achieves high availability in distributed computing architectures, and informally
    guarantees that in the absence of newer updates to a data item, eventually accessing
    that data item will return its last updated value.


    As explained in Chapter 1, eventually consistent services support the `BASE` (Basically
    Available, Soft, Eventual Consistency) semantics, as opposed to the `ACID` (Atomicity,
    Consistency, Isolation, and Durability) guarantees offered by relational databases.


    However, you can use quorum reads and writes if necessary to minimize any adverse
    effects of eventual consistency. I explain consistency and quorum read/writes
    in detail later in this chapter in the “Handling Consistency” section.'
