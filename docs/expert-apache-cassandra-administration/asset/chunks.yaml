    # 8. 备份、恢复与数据迁移


    ### 从 Spark 操作 Cassandra


    在运行命令访问 Cassandra 数据库之前，你必须首先导入 Spark 连接器命名空间，如下所示：


    ```scala

    scala> import com.datastax.spark.connector._

    import com.datastax.spark.connector._

    scala>

    ```


    让我们操作来自 `cyclist` 键空间的 `cyclist_name` 表。首先要做的是为该表数据创建一个 Spark RDD。


    ```scala

    scala> val rdd1 = sc.cassandraTable("cycling", "cyclist_name")

    rdd: com.datastax.spark.connector.rdd.CassandraTableScanRDD[com.datastax.spark.connector.CassandraRow]
    = CassandraTableScanRDD[2] at RDD at CassandraRDD.scala:18

    scala>

    ```


    在命令中，`sc` 代表 Spark Context。当你调用 `spark-shell` 时，Spark 会自动创建一个名为 `sc` 的 Spark Context。Spark
    Context 是所有 Spark 功能的主要入口点，你必须按照我此处展示的方式来使用它。


    Spark Context 使你能够连接到 Spark 集群，你可以用它在 Spark 集群中创建 Spark RDD、数据框、数据集等。在某种程度上，Spark
    Context 是 Spark 集群的协调者（驱动程序）。`SparkContext` 对象协调着构成 Spark 应用程序的集群中独立的进程集。Spark
    Context 连接到集群管理器，该管理器可以是 Mesos、YARN 或独立集群管理器（如前所述，我使用的是 Spark 独立集群）。


    接下来，让我们通过运行以下代码来测试 Spark 集群到 Cassandra 数据库的连接，该代码使用 `first` 函数获取表 `CYCLIST_NAME`
    中的第一行：


    ```scala

    scala> println(rdd.first)

    CassandraRow{id: e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname:
    FRAME}

    scala>

    ```


    以下命令使用 `foreach` 结构打印表 `CYCLIST_NAME` 中的所有行：


    ```scala

    scala> rdd.foreach(println)

    CassandraRow{id: e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname:
    FRAME}

    CassandraRow{id: 5b6962dd-3f90-4c93-8f61-eabfa4a803e2, firstname: Marianne, lastname:
    VOS}

    CassandraRow{id: e7cd5752-bc0d-4157-a80f-7523add8dbcd, firstname: Anna, lastname:
    VAN DER BREGGEN}

    scala>

    ```


    既然你已经成功测试了从 Cassandra 表检索数据，那么让我们从 Spark 向 Cassandra 表插入一些数据。你首先创建一个名为 `collection`
    的 RDD。


    ```scala

    scala> val collection = sc.parallelize(Seq(("cat", 30), ("fox", 40)))

    collection: org.apache.spark.rdd.RDD[(String, Int)] = ParallelCollectionRDD[4]
    at parallelize at :27

    scala>

    ```


    接着，你执行 Spark 的 `saveToCassandra` 函数，将两行新数据插入到键空间 `test` 的表 `kv` 中。


    ```scala

    scala> collection.saveToCassandra("test", "kv", SomeColumns("key", "value"))

    scala>

    ```


    你通过查询该表来确认这两行数据已插入表 `test.kv`。


    ```cql

    cqlsh> select * from test.kv;

    key    | value

    --------+-------

    cat |    30

    fox |    40

    ...

    cqlsh>

    ```


    好了！多亏了 spark-cassandra-connector，你现在可以在 Spark 集群内操作 Cassandra 表数据了。


    利用 Cassandra Spark 集成，你可以做很多事情。你可以将 Spark 的计算能力与 Cassandra 的存储处理能力相结合，做出很酷的事情。然而，所有这些都属于另一本书的领域，因此我们继续前进。


    ## Cassandra 与 SMACK 技术栈：一个日益增长的趋势


    虽然大数据项目最初主要面向批处理，但当前的趋势是转向敏捷系统，这些系统处理流数据以支持分析系统。组织越来越关注实时或近实时的用例，如推荐引擎和欺诈检测。


    SMACK（一个使用开源技术 Apache Spark、Apache Mesos、Akka、Apache Cassandra 和 Apache Kafka
    的系统）或其此类开源技术的变体，在流数据分析和挖掘中正日益成为关键参与者。像 SMACK 这样的技术正在成为构建利用“实时”流数据的应用程序的平台，使组织能够有效地从流数据集中提取有意义的信息。


    本书致力于阐述面向 Cassandra 管理员的概念和技术，因此，我无法深入探讨 SMACK 技术栈所有组件的细节。但是，我想向你介绍这组关键技术，因为如果你正在使用
    Cassandra，你最终很可能会接触到它。


    以下是 SMACK 技术栈五个组件的作用：


    *   Apache Spark（处理组件）：Spark 是一个用于分布式、大规模数据集的处理引擎，特别适用于机器学习算法。你可以使用相同的接口进行 SQL
    查询、机器学习和流数据处理。

    *   Apache Mesos（容器组件）：Mesos 是一个集群资源管理系统，为分布式应用程序提供资源隔离和共享。Mesos 使用两级调度机制，它向框架（即运行在
    Mesos 之上的应用程序）提供资源。Mesos 决定每个框架获得的资源，而框架决定它们接受哪些资源以及在分配给它们的资源上执行哪些应用程序。

    *   Akka（提供模型）：Akka 是一个用于构建高并发和弹性消息驱动应用程序的工具包和运行时。“Actor”是并发计算的通用原语，它响应收到的消息。作为对消息的响应，Actor
    可以做出本地决策、创建其他 Actor、发送更多消息等等。

    *   Apache Cassandra：到现在，你应该知道 Cassandra 是什么以及它擅长什么了！

    *   Apache Kafka（代理）：Kafka 是一个流行的高吞吐量、低延迟消息系统，用于处理实时数据流。Kafka 对数据流进行分区，并将其分布在集群中，这允许多个协调的“消费者”消费由“生产者”生成的数据。


    ## 总结


    本章旨在展示一些有趣的方法，让你可以使用不同的技术设置测试或生产环境。Docker 容器很流行，你可以在 Docker 上运行生产 Cassandra 集群。在
    Docker 上运行生产集群时，你需要处理存储和网络策略，我这里没有讨论这些。Docker 的文档相当好，你可能想利用它来了解更多关于这些以及其他 Docker
    容器主题的知识。


    Apache Spark 作为一种快速处理框架正变得越来越流行，我展示了如何从 Spark 连接到 Cassandra 数据库并执行 DML 操作。当然，这只是一个开始，如果你希望更深入地研究
    Apache Spark，其源文档非常不错。


    CCM 是一个很酷的工具，因为它能帮助你在短短几分钟内启动集群，而无需了解任何 Cassandra 安装程序，也无需花费时间设置任何先决条件来运行一个用于探索目的的简单测试集群。


    # 8. 备份、恢复与数据迁移


    备份和恢复数据是 Cassandra 管理员的关键职能。本章向你展示如何通过定期拍摄数据快照来备份数据。Cassandra 还允许你进行增量备份和备份提交日志段。所有这些备份在你需要执行数据库完整恢复时都派得上用场。


    批量加载和复制数据也是一项常见任务，我解释了如何使用 `COPY` 命令以及 sstableloader 实用程序来加载数据。

