    , and I dedicate an entire section to a discussion of database consistency since
    it’s critical that you understand this topic well.


    ## Consistency, ACID Requirements, the CAP Theorem, and BASE


    Consistency is a database property that ensures that a read always retrieves the
    most up-to-date value. All nodes that have the same data should have a consistent
    state of a write.


    Unlike relational databases, which offer strict consistency to ensure transactions
    are always correct, NoSQL databases offer something called eventual consistency
    .


    In NOSQL databases, there’s a tradeoff between consistency and availability. Cassandra
    trades some consistency to provide high availability. To be more accurate, one
    should say that Cassandra offers tunable consistency, which means you can choose
    the level of consistency that’s best for you and compromise accordingly on the
    availability front.


    To understand tunable consistency , a key feature of Cassandra, it’s useful to
    delve into the basics of the traditional ACID requirements for relational databases,
    Brewer’s CAP theorem, and the BASE properties.


    ### The ACID Requirements


    As with other document databases and other databases that fall under the broad
    umbrella of NoSQL databases, Cassandra doesn’t support the well-known ACID properties
    offered by relational databases. ACID properties are the hallmark of all modern
    transactional databases (such as MySQL and Oracle) and refer to the following
    set of principles:


    *   Atomicity: This is the all-or-none principle that requires that if even one
    element of a transaction fails, the entire transaction will fail. The transaction
    succeeds only if the database successfully performs all its tasks.

    *   Consistency: This property ensures that the database fully completes all transactions,
    by requiring that the database must be in a consistent state both at the beginning
    and at the end of a transaction.

    *   Isolation: Each transaction should be independent of the other transactions.
    No transaction must have has access to any other transaction that is in an unfinished
    state.

    *   Durability: Once a transaction completes, it’s “permanent.” That is, the database
    records the transaction in persistent storage, ensuring that the transaction survives
    a system breakdown such as a power or disk failure.


    While the ACID requirements served traditional relational databases just fine
    for many years, the popularity of non-relational data such as unstructured data,
    non-relational data, and the proliferation of distributed computing systems led
    to new views about the required transaction properties that databases must satisfy.


    ### The CAP Theorem


    The Consistency, Availability, and Partition Tolerance (CAP) theorem sought to
    refine the requirements that you need to meet for implementing applications in
    modern distributed computing systems. The CAP theorem stands for the following
    principles:


    *   Consistency: This is the same as the ACID consistency property . Satisfying
    this requirement means that all clients of a data store get responses that “make
    sense.” If Client A writes 1 followed by 2 to node X, a different client, Client
    B, can’t read 2 first and then 1.

    *   Availability: The system must be available when requested. All operations
    on the data store must eventually return successfully.

    *   Partition Tolerance: If the network fails to transmit messages between two
    sets of nodes , the system must continue to work correctly. The failure of a single
    node in a distributed system must not lead to the failure of the entire system.
    The system must be available even if there’s some data loss or a partial system
    failure.


    The problem is, at any given time, a distributed system can usually support only
    two out of the three requirements listed here. This means that tradeoffs are usually
    inevitable when using distributed data stores such as NoSQL databases. That is
    why we have the famous statement “Consistency, availability, partition tolerance.
    Pick two.”


    Most modern distributed data stores such as Cassandra offer availability and partition
    tolerance, sacrificing consistency. The idea here is that short periods of application
    misbehavior are preferable to short periods where the database is unavailable.


    If two nodes can’t communicate, and you require strict consistency, the system
    will appear to be down. A database such as Casandra chooses to be highly available
    during network partition (when the network drops messages between nodes), instead
    of satisfying the consistency principle.


    Strict consistency, especially when you have data centers that are distributed
    across the world, is something you may never be able to satisfy, due to the unavoidable
    latency among the data centers. Availability is a more practical principle that
    a distributed database can try to satisfy.


    For reliability purposes, meeting the availability and partition tolerance requirements
    is essential, of course. That means that the consistency requirement is often
    at risk. However, leading NoSQL databases such as Cassandra and Amazon’s DynamoDB
    deal with the loss of consistency just fine. How so? This is possible due the
    adoption by these databases of something called the BASE system , which is a modified
    set of ACID requirements to fit modern NoSQL and related non-relational databases.
    Here’s what BASE stands for:


    *   Basically Available: The system guarantees the availability of data in the
    sense that it’ll respond to any request. However, the response could be a “failure”
    to obtain the request data set, or the data set returned may be in an inconsistent
    or changing state.

    *   Soft: The state of the system is always “soft” in the sense that the “eventual
    consistency” (the final requirement) may be causing changes in the system state
    at any given time.

    *   Eventually Consistent: The system will eventually become consistent once it
    stops receiving new data inputs. As long as the system is receiving inputs, it
    doesn’t check for the consistency of each transaction before it moves to the next
    transaction.


    Amazon’s DynamoDB , which lies behind Amazon’s shopping cart technology, stresses
    high availability, meaning it can afford to go easy on the consistency angle.
    These types of databases eschew the complex queries necessary to support consistency
    in the traditional sense, settling instead for the eventual consistency goal.'
