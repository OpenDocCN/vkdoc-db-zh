  trans: '

    ### 高度可扩展


    Cassandra 具有高度可扩展性。要分析更多数据，您只需向部署中添加更多节点即可。Cassandra 提供**线性可扩展性**，这意味着，如果需要处理三倍增长的写入量，您只需将节点数量增加三倍。


    您可以轻松扩展 Cassandra，无需任何停机或中断正在进行的工作。


    大型 Cassandra 生产部署包括 Netflix（拥有超过 2,500 个节点和 420TB 数据）和 Apple（拥有超过 75,000 个节点和超过
    100PB 数据）。


    Cassandra 高性能的关键之一在于其**水平可扩展**性。与依赖于提升服务器处理、存储和内存能力的垂直扩展策略不同，水平扩展是向集群中添加更多节点。


    随着您向 Cassandra 集群中添加新机器，读取和写入吞吐量都会线性增长；也就是说，例如，通过将集群中的机器数量翻倍，您可以使吞吐量翻倍。此外，您无需付出服务中断的代价，因为在集群规模扩展期间，数据库保持可用，您的应用程序继续无障碍运行。


    ### 这还是熟悉的 SQL！


    最后，Cassandra 查询语言（`CQL`）的语法结构与我们大多数人已经熟悉的 SQL 语言相似，这使得开发人员和管理员可以相当容易地掌握 `CQL`。


    与 Cassandra 数据库交互最简单的方式是通过 `CQL` shell，通过 `cqlsh` 工具调用。`CQL` 使用与常规 SQL 相似的语法。您可以通过
    `cqlsh` 执行数据操作（DML）和数据定义语言（DDL）任务。


    ### 关系型数据库带来的问题


    当您尝试扩展到非常大的数据量时，会遇到关系型数据库的各种问题。关系型数据库所提供的高可用性概念有时也值得商榷。


    当您使用 Linux 实用程序如 `sed` 和 `awk` 或简单的 Python 脚本来分析数据时，大多数时候您甚至不需要数据库。更常见的情况是，您会处理中等规模的数据，这时可以使用诸如
    `MySQL`、`Oracle`、`PostgreSQL` 或 `SQL Server` 之类的数据库。这些数据库提供众所周知的 `ACID` 保证。


    随着数据量的增长，您可以通过添加更强大的 CPU 和更多 RAM 来垂直扩展这些关系型数据库，但这些关系型数据库的扩展性存在一个有限的上限，而且由于数据库不是分布式的，费用会变得失控。


    #### 关系数据库管理系统与大数据


    关系型数据库通常采用**主从格式的复制**来解决读取密集型工作负载的问题。当您为关系型数据库（如 `MySQL`）添加复制时，`ACID` 保证就变得难以实现。例如，当您在
    `MYSQL` 中复制数据时，主节点和从节点之间通常存在复制延迟。如果在从节点复制到数据之前客户端从从节点读取，则一致性保证（`ACID` 中的 C）就丧失了。


    ##### 由第三范式引起的性能问题


    在关系型数据库中，通常将数据置于众所周知的**第三范式**中。第三范式会对查询性能产生若干影响，使您难以扩展。查询变得越来越复杂，涉及大量的连接（join）以及资源消耗大的分组操作，如
    `ORDER BY` 和 `UNION`。


    查询是临时的（adhoc），用户希望立即得到结果。如果您的数据集大于分配给数据库的内存，由于大量的磁盘寻道，结果将会很慢。


    摆脱这种性能困境的一种方法是，在读取时创建多个反范式化（denormalized）的表，这样读取操作就不会涉及太多昂贵的连接。然而，这意味着您最终将拥有重复的数据集，这违反了第三范式。


    ##### 由分片（Sharding）引起的问题


    分片是指，您不再拥有一个数据库，而是将数据分散到多个数据库中。


    分片意味着您将所有东西都反范式化，并且不能再进行任何聚合或连接。您的数据分布在众多机器上，而聚合操作需要您访问每一个分片。添加分片需要您移动数据。由于分片会抑制性能，您被迫进行反范式化，这意味着您需要保留经常查询的关键数据的多个副本，例如一个副本基于
    `Customer Id`，另一个基于 `State`。


    当您有多个分片时，模式（Schema）更改是困难的，因为您必须将更改传播到所有分片。此外，如果您想将数据库的规模扩大一倍或两倍，您需要重新分片所有数据。


    ##### 高可用性的神话


    高可用性是使用复制数据库的用户经常追求的主要好处。然而，高可用性并不简单。高可用性涉及众多活动部件，并带来巨大的开销。尽管成本高昂，高可用性仍然很难实现，因为主从环境确实会因配置更改、驱动器和电源故障等原因而频繁停机。


    除了计划外停机，您还应该处理由于操作系统补丁和升级导致的计划内停机。故障转移过程，无论是自动还是手动的，都不是无误的，并且通常涉及启动从节点或备用数据库的延迟，从而导致停机。


    管理跨多个数据中心运行的 `MySQL` 等关系型数据库并非易事；它需要一个由高技能数据库专业人员和 Linux 工程师组成的团队持续关注。


    Cassandra 通过提供以下功能简化了您的数据库架构：


    *   **对等（Peer-to-Peer）架构**：Cassandra 使用对等架构，没有主实例和从实例的概念。摒弃主/从概念意味着活动部件更少。这种策略导致了一个简单的架构，其中所有节点都是平等的。

    *   **无故障转移**：对等架构意味着不存在**故障转移**的概念。数据库不必处理复杂的状态维护操作，例如领导者选举。

    *   **可靠性**：数据库完全预期到故障的发生，架构中单个组件的故障永远不会成为阻碍。您的用户完全不会察觉到有一个或多个节点、甚至整个数据中心崩溃或因其他原因不可用。

    *   **数据局部性**：Cassandra 旨在实现**数据局部性**，而不是收集分散在大量节点上的数据。

    *   **更低成本**：Cassandra 降低了扩展的成本（使用传统关系型数据库扩展可能很昂贵）。由于 Cassandra 运行在商用服务器上，您的成本远低于使用强大服务器扩展关系型数据库的成本。您无需购买几台价值数十万美元的服务器，而是购买数百台每台仅需几千块的服务器。


    Cassandra 是 NoSQL 数据库阵营中的领先成员，因此，回顾一下对 NoSQL 数据库的需求、各种类型的 NoSQL 数据库以及它们所解决的问题类型，是一个好主意。

    '
- fmt: '## NoSQL数据库的兴起


    正如关系型数据库的出现是为了解决数据异常和同一数据库难以适用于新应用的问题一样，NoSQL数据库的兴起也有其成为大数据领域重要参与者的原因。关系模型在扩展性上的失败，使其无法满足日益增长的海量读写操作需求，从而导致了NoSQL数据库的出现。


    NoSQL数据库可以运行在单台服务器或多台服务器上；当它们运行在多台服务器上时，被称为分布式数据库。大多数NoSQL数据库处理大型数据集，因此通常是分布式数据库。


    与关系型数据库设计不同，在关系型数据库中，模型是核心，实体的结构和它们之间的关系驱动着数据库的设计；而在NoSQL数据库中，性能才是关键。你仍然会有实体和关系，但维护关系并非神圣不可侵犯；目标是为了性能。


    有几种类型的NoSQL数据库，每种都旨在解决不同类型的问题。以下各节简要描述了NoSQL数据库的主要类型。


    ### 键值数据库


    键值数据库采用基于键集合和值集合的简单数据模型。键是用于查找数据的标识符，值是与键相关联的数据。


    键值数据库采用的简单模型意味着没有表以及相关的实体，如列和约束。这些数据库不支持使用SQL查询数据库。


    亚马逊的`DynamoDB`、`Riak`、`Oracle BerkeleyDB`，以及缓存数据库如`Redis`和`MemcacheD`都是键值数据库。


    ### 文档数据库


    文档数据库存储文档，即你以灵活结构存储的数据项集合。文档只是一个数据结构，数据库将其存储为字符串或其二进制表示。这里的文档是半结构化实体，采用标准格式，如`JavaScript
    Object Notation (JSON)`或`Extensible Markup Language (XML)`。


    文档数据库可以在单个文档中存储多个属性，而不是像键值数据库那样为每个实体属性使用单独的键。


    与键值数据库类似，文档数据库使用标识符，但其值（数据库存储为文档）通常比键值数据库中的简单键更复杂。


    你不需要在向文档数据库添加数据之前定义模式。添加文档将创建支持该文档所需的必要数据结构。由于没有固定模式，与关系型数据库相比，开发者在使用这些数据库时拥有更大的灵活性。


    流行的文档数据库包括`MongoDB`、`CouchDB`和`CouchBase`。


    ### 列族数据库


    列族数据库借鉴了关系型数据库的一些特性，将数据组织成列的集合。然而，为了提升性能，它们牺牲了关系型数据库的一些基本功能，例如连接表的能力。


    列族数据库中的行可以有不同的列。当你处理大量列时，可以将列分组为相关列的集合。这些相关列的集合称为列族。一个列族数据库包含数百万列并不罕见。


    与文档数据库一样，列族数据库不需要你预先定义固定的模式。


    通常，列族数据库是反范式化的，你可以在一个宽行中找到关于一个对象的所有信息。`Cassandra`中的一行可以拥有多达二十亿个列。用于处理列族数据库的查询语言类似于SQL，并使用类似SQL的语句，如`SELECT`、`UPDATE`和`INSERT`。


    `Apache Cassandra`和`Apache Hbase`（通常与`Hadoop`发行版捆绑）是两个著名的列族数据库。


    ### 图数据库


    图数据库是一种专门的NoSQL数据库，它使用称为节点和关系的结构（正式术语中称为顶点和边），而不是用列和行来建模数据。图数据库专为对对象及其间关系进行建模而设计。


    图数据库与你通常称为图表的可视化工具无关。它们的名字来源于图论，这是数学的一个分支，通过将对象表示为顶点并将它们之间的关系表示为边来研究对象。


    图数据库对对象间的邻接关系进行建模。图数据库中的一个节点包含指向与它相邻的对象的指针。这些指针使得需要遍历图中路径的操作能够快速执行。


    图数据库中的节点是一个具有标识符和一组属性的对象。两个节点之间的关系是一个包含该关系属性的链接。


    在涉及节点间多条路径的模型中，图数据库使你能够高效地查询数据。使用数据的表格表示来查询这类数据要困难得多，因为那些格式需要递归SQL结构，例如`Oracle`的`CONNECT
    BY`子句来查找路径。


    图数据库可以表示现实世界中的广泛实体。例如，一个城市可以是一个节点，关于城市间距离和旅行时间的信息可以存储在城市之间的关系中。


    `Neo4j`是一个流行的图数据库。


    ## Cassandra的特殊能力


    在接下来的章节中，我将重点介绍`Cassandra`的一些特殊能力，这些能力使其有别于其他NoSQL数据库。当然，这些能力并非`Cassandra`独有，因为一些替代方案也提供了其中某些功能，但没有其他数据库能在提供所有这些功能方面与之相提并论。


    ### 分布式与去中心化数据库


    `Cassandra`是完全分布式的。`Cassandra`集群中的每台机器在数据处理方面承担相等的负载。在诸如`Hadoop`的大数据框架中，情况则大不相同。有一个名为`NameNode`的主节点，负责管理所有数据的读写。同样，`MongoDB`有它的`mongos`，与常规节点相比需要特殊处理，因为它们可能成为瓶颈。


    与其他集群相比，在`Cassandra`集群中进行安装和故障排除要容易得多，因为所有节点在功能上都是相同的。`Cassandra`的对等策略意味着增加容量是一项简单的操作。


    你可以通过将一些节点设置为主节点，其他节点设置为从节点来扩展`MySQL`等数据库。`Cassandra`被设计为一个去中心化数据库，这意味着所有节点都是相同的；没有主/从节点的概念。这也意味着没有单点故障，因为没有特殊的主机，无论节点是否发生故障，集群都能继续运行。


    ### 日志结构存储引擎


    `Cassandra`使用一个高效的日志结构引擎，将更新操作转化为顺序I/O。


    `Cassandra`的存储引擎永远不需要或读取现有数据。它只追加更新后的数据，从而使更新操作非常快速。'
  raw: '## The Rise of NoSQL Databases


    Just as relational databases arose to overcome the problems of data anomalies
    and the difficulty of reusing the same database for new applications, NoSQL databases
    have reasons for their emergence as a major player in the big data world. The
    failure of the relational model to scale so they can meet the growing demands
    for huge volumes of read and write operations led to the emergence of the NoSQL
    databases.


    NoSQL databases can run on a single server or on multiple servers; they are referred
    to as distributed databases when they run on multiple servers. Most NoSQL databases
    handle large data sets and thus are distributed databases.


    Unlike in a relational database design, where the model is everything and the
    structure of the entities and the relationships among them drive the design of
    the database, performance is the mantra in a NoSQL database. You’ll still have
    entities and relationships, but preservation of the relationships isn’t sacrosanct;
    the goal is performance.


    There are several types of NoSQL databases, each geared to solving a different
    type of problem. The following sections briefly describe the main types of NoSQL
    databases.


    ### Key-Value Databases


    Key-value databases employ a simple data model based on sets of keys and values.
    The keys are the identifiers with which you look up data, and the values are the
    data that is associated with the keys.


    The simple model employed by key-value databases means that there are no tables
    and related entities such as columns and constraints. These databases don’t support
    the use of SQL to query the database.


    Amazon’s DynamoDB, Riak, Oracle BerkeleyDB, as well as well as caching databases
    such as Redis and MemcacheD are all key-value databases.


    ### Document Databases


    Document databases store documents, which are collections of data items that you
    store in a flexible structure. A document is simply a data structure that the
    database stores as strings or a binary representation of strings. Documents in
    this context are semi-structured entities in a standard format such as JavaScript
    Object Notation (JSON) or Extensible Markup Language (XML).


    Document databases can store multiple attributes in a single document instead
    of storing each attribute of an entity with a separate key, as in a key-value
    database.


    As with key-value databases, document databases use identifiers, but their values,
    which the database stores as documents, are normally more complex than the simple
    keys in a key-value database.


    You don’t need to define a schema before you add data to a document database.
    Adding a document will create the necessary data structures to support the document.
    Since there’s no fixed schema, developers have more flexibility with these databases
    as compared to relational databases.


    Popular document databases include MongoDB, CouchDB, and CouchBase.


    ### Column Family Databases


    Column family databases borrow some of the characteristics of relational databases
    by organizing data into collections of columns. However, they trade off some of
    the essential features of relational databases, such as the ability to join tables,
    for the sake of enhanced performance.


    The rows in a column family database can have different columns. When you’re dealing
    with a large number of columns, you can group columns into sets of related columns.
    These collections of related columns are called column families. It isn’t unusual
    for a column family database to contain millions of columns.


    As with a document database, a column family database doesn’t require you to have
    a predefined, fixed schema.


    Typically, a column family database is denormalized, and you find all information
    about an object in a single, wide row. A row in Cassandra can have as many as
    two billion columns. The query languages you use to work with column family databases
    are similar to SQL, and they use SQL-like statements such as SELECT, UPDATE, and
    INSERT.


    Apache Cassandra and Apache Hbase (usually bundled with Hadoop distributions)
    are two well-known column family databases.


    ### Graph Databases


    A graph database is a specialized NoSQL database that uses structures called nodes
    and relationships (called vertices and edges in formal terms) instead of modeling
    data with columns and rows. Graph databases are designed for modeling objects
    and the relationships among the objects.


    Graph databases have nothing to do with the visualization aids you normally refer
    to as a graph (or chart). They derive their name from graph theory, a branch of
    mathematics that studies objects by representing them as vertices and the relationships
    among them as edges.


    Graph databases model the adjacency between objects. A node in the graph database
    contains pointers to objects that are adjacent to it. The pointers enable fast
    operations that require passing through the paths in a graph.


    A node in a graph database is an object with an identifier and a set of attributes.
    A relationship between two nodes is a link that contains attributes about that
    relationship.


    In models that involve multiple paths between nodes, graph databases enable you
    to query data efficiently. Querying this type of data is much harder using a tabular
    representation of data since those formats require recursive SQL constructs such
    as Oracle’s CONNECT BY clause to find the paths.


    Graph databases can represent a wide range of entities in the real world. For
    example, a city can be a node, and the information about the distance between
    the cities and the travel times between the cities can be stored in the relationships
    between the cities .


    Neo4j is a popular graph database.


    ## Special Capabilities of Cassandra


    In the following sections, I highlight some of the special capabilities of Cassandra,
    which set it apart from other NoSQL databases. By no means are these capabilities
    exclusive to Cassandra, as some of the alternatives do offer some of these capabilities,
    but no other database comes close in terms of offering all of these features.


    ### Distributed and Decentralized Database


    Cassandra is fully distributed. Each machine in a Cassandra cluster takes care
    of an equal amount of activity in terms of data processing. In a big data framework
    such as Hadoop, things are quite different. There’s a master node called the NameNode,
    which manages the reading and writing of all data. Similarly, MongoDB has its
    mongos, which require special treatment when compared to regular nodes, since
    they could potentially be a bottleneck.


    Installation and troubleshooting are much easier in a Cassandra cluster when compared
    with other clusters, since all nodes are identical in terms of their functions.
    Cassandra’s peer-to-peer strategy means that adding capacity is a trivial exercise.


    You can scale a database such as MySQL by setting up some nodes as master nodes
    and the other nodes as slaves. Cassandra is designed as a decentralized database
    , meaning that all nodes are the same; there’s no concept of master/slave nodes.
    This also means that there is no single point of failure since there are no special
    hosts, and the cluster continues operations regardless of node failures.


    ### Log-Structured Storage Engine


    Cassandra uses an efficient log–structured engine that turns updates into sequential
    I/O.


    Cassandra’s storage engine doesn’t ever require or read existing data. It only
    appends updated data, thus making updates very fast.'
