- fmt: '### Restoring Data from a Snapshot


    To restore a table from a snapshot, make sure you have all the snapshot files
    for the table, including any incremental backups made after you took the initial
    snapshot. There are a couple of ways to restore with snapshots, and I explain
    them here.


    In both restore methods, the table schema must be present in the database; the
    recovery process doesn’t recreate the schemas automatically. You can, however,
    run the `createschema.sql` script found in the snapshot directory to create the
    schema, should you need it.


    #### Copying Data from the Snapshots Directory


    1.  Truncate the table you are going to restore. You need to remove the existing
    data in most cases, since it’s possible that accidentally lost data may have older
    tombstones than the snapshot’s data. In situations where you happen to lose a
    disk and start the database before a restore, the node will have more up-to-date
    data than the snapshot, and therefore you don’t truncate the table. In this example,
    the keyspace is `cycling`, and the table name is `cyclist_name`. Before you truncate
    the table, go to the data directory for the `cycling` keyspace, and you’ll see
    that the `data` folder for the table `cyclist_name` has all the normal `.db` files.


    ```

    $CASSANDRA_HOME/data/data/cycling# cd c*

    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    ls

    backups                      mc-1-big-Data.db       mc-1-big-Filter.db  mc-1-big-Statistics.db  mc-1-big-TOC.txt

    mc-1-big-CompressionInfo.db  mc-1-big-Digest.crc32  mc-1-big-Index.db   mc-1-big-Summary.db     snapshots

    $

    ```


    **Note:** The `snapshots` directory for an SSTable will be empty by default until
    you create a snapshot.


    2.  You next truncate the table `cyclist_name`.


    ```

    cqlsh:cycling> truncate cyclist_name;

    cqlsh:cycling>

    ```


    **Note:** Make sure all nodes are up before issuing the `truncate` command. Otherwise
    you may see an error such as the following: `TruncateError: Error during truncate:
    Cannot achieve consistency level ONE`.


    3.  You can verify that there’s no longer any data in the `cyclist_name` table.


    ```

    cqlsh:cycling> select * from cyclist_name;

    id | firstname | lastname

    ----+-----------+----------

    (0 rows)

    cqlsh:cycling>

    ```


    4.  Check the `data` directory for the `cycling.cyclist_name` table now; all the
    `.db` files disappeared from this directory when you truncated the table. Only
    the empty shell of the table remains, but the database has wiped out all its contents
    from disk for good. You took a snapshot of the `cycling` keyspace before you truncated
    the `cyclist_name` table. You therefore expect to have the snapshot for the `cycling_name`
    table in the appropriate directory, which in general is:


    ```

    data_directory/keyspace_name/table_name-UUID/snapshost/snapshot_name

    ```


    In my case, it’s the following directory, and it has all the files I need under
    the `snapshot` directory for the table `cyclist_name`:


    ```

    data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/1499189424022#
    ls -altr

    total 52

    -rw-r--r-- 2 root root   16 Jul  4 10:30 mc-1-big-Filter.db

    -rw-r--r-- 2 root root   92 Jul  4 10:30 mc-1-big-TOC.txt

    -rw-r--r-- 2 root root   92 Jul  4 10:30 mc-1-big-Summary.db

    -rw-r--r-- 2 root root 4668 Jul  4 10:30 mc-1-big-Statistics.db

    -rw-r--r-- 2 root root   60 Jul  4 10:30 mc-1-big-Index.db

    -rw-r--r-- 2 root root   10 Jul  4 10:30 mc-1-big-Digest.crc32

    -rw-r--r-- 2 root root  155 Jul  4 10:30 mc-1-big-Data.db

    -rw-r--r-- 2 root root   43 Jul  4 10:30 mc-1-big-CompressionInfo.db

    -rw-r--r-- 1 root root  856 Jul  4 10:30 schema.cql

    -rw-r--r-- 1 root root   31 Jul  4 10:30 manifest.json

    drwxr-xr-x 3 root root 4096 Jul  4 10:30 ..

    drwxr-xr-x 2 root root 4096 Jul  4 10:30 .

    /data/data/cycling/cyc

    ```


    5.  Copy all the files under the `snapshot` directory to the `data` directory
    of the table `cyclist_name`.


    ```

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/1499189424022/*
    .

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#
    ls

    1499189424022  manifest.json                mc-1-big-Data.db       mc-1-big-Filter.db  mc-1-big-Statistics.db  mc-1-big-TOC.txt  snapshots

    backups        mc-1-big-CompressionInfo.db  mc-1-big-Digest.crc32  mc-1-big-Index.db   mc-1-big-Summary.db     schema.cql

    root@ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda#

    ```


    Run the `nodetool refresh` command so Cassandra knows that the data files are
    restored now.


    ```

    $ nodetool refresh cycling cyclist_name

    $

    ```


    The Cassandra log file will show how many SSTables were refreshed, thus offering
    a safe way to check the refresh process.


    6.  Query the table `cyclist_name` to verify that the restore was successful.


    ```

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+-----------

    fb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |   MATTHEWS

    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |  TIRALONGO

    6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven | KRUIKSWIJK

    (3 rows)

    cqlsh:cycling>

    ```


    **Note:** You can set the `auto_snapshot` property to automatically back up (have
    a snapshot taken) whenever you truncate or drop a table. By default, the `auto_snapshot`
    property is enabled.


    Hey, what happened? There were six rows originally in this table, but after the
    restore, there are just three rows! Well, there are two nodes in the cluster,
    and each node owns roughly half the data. The `nodetool snapshot` command did
    create a separate snapshot directory in both nodes. The snapshot on any one node
    won’t have all the data. If, for example, your replication factor is 3 and you
    have four nodes in your cluster, each node will have approximately 0.75 of each
    replica.


    In this example, there are two nodes in the test cluster. However, you performed
    a restore on only one node. You must therefore restore the `.db` files on the
    second node, as you did earlier.


    ```

    # cp /cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-39cd6de060de11e7805be14006afbdda/snapshots/truncated-1499189595147-cyclist_name/*
    .

    # ./nodetool refresh cycling cyclist_name

    ```


    Once you do this, query the `cyclist_name` table again:


    ```

    cqlsh:cycling> select * from cyclist_name;

    id                                   | firstname | lastname

    --------------------------------------+-----------+-----------------

    e7ae5cf3-d358-4d99-b900-85902fda9bb0 |      Alex |           FRAME

    fb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |        MATTHEWS

    5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS

    220844bf-4860-49d6-9a4b-6b5d3a79cbfb |     Paolo |       TIRALONGO

    6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven |      KRUIKSWIJK

    e7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna | VAN DER BREGGEN

    (6 rows)

    cqlsh:cycling>

    ```


    **Tip:** If a table doesn’t exist before performing a restore, create the table
    with the help of the `creatschema.cql` file in the `snapshot` directory for the
    table.'
