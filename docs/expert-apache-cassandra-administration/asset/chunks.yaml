  trans: '

    #### 最小化需要读取的分区数量


    在 Cassandra 表中，共享一个分区键的一组行被称为一个 `分区`。理想情况下，你必须通过将数据按分区分组存储在节点上来存储数据。查询需要读取的分区越少，你获得结果的速度就越快。


    表的每个分区可以位于不同的节点上。当你发起一个查询时，查询协调器可能会向多个节点（各个分区可能所在的位置）发出单独的命令。这当然意味着更多的开销，并为查询的执行引入额外的延迟。你应该力求从尽可能少的分区读取查询的数据。


    即使多个分区存储在同一个节点上，由于 Cassandra 在表中存储行的方式，从单个分区读取数据也比从多个分区读取的成本更低。


    ### 围绕查询建模，而非围绕关系建模


    满足两条基本规则（尤其是最小化分区数量）的方法是根据你的查询来建模你的数据库。与关系型数据库中围绕实体间关系建模不同，你需要根据你期望数据库支持的查询来进行建模。


    设计数据模型时，始终从查询开始。你需要从用户将如何查看数据以及他们将如何搜索数据的角度来思考。


    用户要搜索的内容应该成为表的主键，他们想要查看的信息则应该成为你的列。道理就这么简单。你无需担心所有的范式以及数据之间的关系等等。


    要围绕查询进行建模，你需要做两件事：


    *   找出数据库必须支持的查询。

    *   创建合适的表。


    #### 确定查询


    不存在一个能服务于所有查询场景的单一数据模型。如果你的查询需求稍有变化，就需要修改数据模型。在确定你希望 Cassandra 数据库支持的查询时，考虑查询中的以下类型需求：


    *   要求结果集中只有唯一值的查询

    *   希望基于特定条件过滤结果的查询

    *   希望对结果进行排序的查询

    *   试图对结果进行分组的查询


    #### 创建合适的表


    在关系型数据库中，表在大多数情况下只是特定数据（如客户数据或销售数据）的存储库。你根据实体之间的关系创建表。以这种方式创建的表服务于多种查询，这些查询都寻求存储在该表中的数据。Cassandra
    则不然，你在创建表时的目标是通过读取单个分区来满足一个查询。


    通过读取单个分区来满足查询的策略意味着你的每个查询都为自己使用一张表。如果你有多个需要支持的查询，就必须创建多个表，因为单张表不太可能像关系型数据库那样高效地服务于多种不同的查询类型。


    理解这里策略的关键在于认识到，创建表的目标不仅仅是让它作为存储实体特定属性数据的存储库。相反，这张表是一个预先构建好的、用于回答你必须支持的常见查询的答案源。为了优化读取，你必须创建能够快速回答该查询的定制化表。


    ## Cassandra 的性能局限


    尽管 Cassandra 既好又强大，但它在写入和读取过程中确实存在一些众所周知的局限。我在本节总结了主要的性能缺陷。


    ### 写入局限


    Cassandra 提供了非常快的写入吞吐量，但正如以下部分所解释的，它为此做出了一些关键权衡。


    #### 不支持传统事务


    与关系型数据库不同，Cassandra 中没有任何回滚机制。也没有作为关系型事务支柱的传统锁定机制。正如第 5 章所述，Cassandra 确实支持轻量级事务，但这些事务的开销很大。


    #### 更新和删除的开销


    如你所知，Cassandra 将其数据以 `SSTable` 的形式存储在磁盘上。`SSTable` 是不可变的数据结构。当你更新数据时，Cassandra
    会将数据分散到多个 `SSTable` 中。当你删除数据时，Cassandra 会创建 `墓碑标记`（表示要删除的数据的标记），以确保在整个集群中正确删除数据。`墓碑标记`
    会抑制旧数据，直到数据库可以运行压缩操作，该操作才会永久删除数据。


    更新期间数据分散在多个 `SSTable` 中，以及删除期间创建 `墓碑标记`，都意味着在读取操作期间有更高的开销。这导致了通过清理来压缩 `SSTable`
    的压力。


    ### 读取局限


    Cassandra 在读取操作中存在一些众所周知的性能限制，我将在以下部分进行解释。


    #### 不支持连接


    如第 1 章所述，你不能在 Cassandra 中将来自多个表的数据连接到单个查询中。这里没有像关系型数据库那样用于促进表连接的外键。


    你不是连接表，而是对数据进行反规范化，从而根据预期的查询来复制数据。或者，你可以使用另一种报告技术（如 Apache Spark）来执行连接操作。


    #### 索引工作方式不同


    Cassandra 通过表的主键（唯一且有助于快速识别行）执行搜索。然而，关系型数据库用于加速查询的 `二级索引` 则完全是另一回事，如果你没有将它们用于其适用的有限场景，可能会对性能产生负面影响。


    #### 仅最终一致性


    Cassandra 数据模型背后的关键原则是 `可调一致性`，由客户端应用程序决定它们所需的数据一致性级别。


    尽管 Cassandra 会自动在整个集群中复制数据，但复制数据存在固有的延迟，并且你受限于 `最终一致性` 原则。`最终一致性`，也称为 `乐观复制`，在分布式计算架构中实现了高可用性，并非正式地保证：在没有对数据项进行新更新的情况下，最终访问该数据项将返回其最后更新的值。


    如第 1 章所述，最终一致性服务支持 `BASE`（基本可用、软状态、最终一致性）语义，这与关系型数据库提供的 `ACID`（原子性、一致性、隔离性和持久性）保证相反。


    但是，如果需要，你可以使用仲裁读取和写入来最小化最终一致性的任何不利影响。我将在本章后面的“处理一致性”部分详细解释一致性和仲裁读写。

    '
- fmt: '## The Concept of Eventual Consistency


    Consistency is the requirement that a read always return the latest written data.
    All clients will read the same value for an element of data even when the database
    is simultaneously updating data.


    A database such as `Cassandra` must make tradeoffs among data consistency, availability,
    and partition tolerance, which are three tenets of the `CAP` theorem enunciated
    by Brewer. Availability refers to the fact that all clients are able to access
    the data so they can read and write data. Partition tolerance is where a database
    can be split into multiple machines and be able keep functioning even during network
    segmentation breaks. Since network issues make temporary partitions unavoidable,
    you really need to choose between availability and consistency in real life.


    In the real world, instead of a single concept of consistency, there are several
    degrees of consistency. The most stringent consistency model is `strict consistency`,
    which requires that every read must return the last written value. In a distributed
    system, `strict consistency` is hard to enforce. For example, the database will
    need to perform all update (`insert`/`delete`/`update`) operations in a synchronous
    fashion, using locks to prevent access to the replicas that haven’t been modified
    yet. This of course blocks users, and if there’s a failure of any kind, such as
    network or server failures before the update operation completes, the data will
    become unavailable.


    `Strict consistency` simply won’t allow you to peek at the data until the database
    is sure that you’re looking at the most recently updated values. The database
    would rather become unavailable than show you inconsistent values.


    `Eventual consistency` requires that all updates must be present on all the copies
    (`replicas`) of data in a distributed database, but allows for the fact that the
    process can take a bit of time. That is, although replicas may differ in value
    immediately following a change, over a period of time (eventually) all replicas
    will become consistent.


    `Cassandra` implements `tuneable consistency`, where you balance the consistency
    level against the replication factor. The higher the replication factor, the worse
    the performance, but you’ll gain consistency. The consistency level you choose
    tells the database how many replicas must acknowledge a successful write or respond
    to a read query for that write or read to be deemed successful.


    You can specify consistency levels for both reads and writes. Higher consistency
    levels require more nodes to respond to a read or write operation, which means
    that the data is more reliable, since multiple replicas are showing identical
    values.


    Fast writes are the goal here: although you can set the consistency level the
    same as the replication factor, the stronger consistency you achieve is at the
    cost of performance. The consistency level is usually set to a value lower than
    the replica factor, so updates are deemed successful even if some of the nodes
    are unavailable. `Cassandra` will keep updating data even during these partial
    failures.


    ### Consistency Conflict Resolution


    Since `eventual consistency` only guarantees that reads will eventually return
    the same value and doesn’t make any safety guarantees, it can return a value before
    it converges.


    To ensure replica convergence, an eventually consistency system must reconcile
    the differences among multiple versions of the same data items, by following this
    two-step procedure:


    *   `Anti-entropy`, which involves exchanging versions of data between the nodes

    *   `Reconciliation`, which involves choosing an appropriate final state of the
    data when concurrent updates change that data


    There are several approaches to reconciling concurrent writes, such as the “last
    writer wins” strategy, user-specified conflict handlers, and so on. The database
    normally uses timestamps to detect the concurrency among the updates.


    ### Repairing Data


    Reconciliation of disparate concurrent writes must happen sometime before the
    next read occurs, and the database can schedule it at different points, such as
    the following:


    *   `Read repair`: The reconciliation or correction happens when a read finds
    an inconsistency. Obviously, this will affect the speed of the read operations.

    *   `Write repair`: The reconciliation or correction occurs during write operations.
    Any inconsistencies found during writes will slow down the write operations.

    *   `Asynchronous repair`: The corrections aren’t part of a read or write operation.


    When data is read, a `read repair` can resolve any data inconsistencies. When
    data isn’t read, you need to use either the `hinted handoff` or `anti-entropy`
    mechanism to resolve any data inconsistences. Chapter 5 explains the various types
    of repairs.


    ## How Cassandra Writes Data


    `Cassandra` uses a multi-stage write path, which has the following stages:


    *   First, it logs the writes in the `commit log`.

    *   Next, it writes the data to the `memtable` in memory.

    *   Finally, it flushes the data from the `memtable` to permanent storage on disk
    in `SSTables`.


    In the following sections, I elaborate on the three main stages of the write path.'
