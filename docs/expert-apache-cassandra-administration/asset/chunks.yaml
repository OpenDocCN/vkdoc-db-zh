  trans: '#### 分配算法


    分配算法仅支持两种分区器 `Murmur3Partitioner` 和 `RandomPartitioner`，它致力于使用较少的令牌来平衡工作负载。你可以使用大量令牌来分散工作负载，但这也意味着你必须管理所有这些令牌。


    分配算法使用 `num_tokens` 属性设置，按比例分配令牌范围。对于给定的复制因子，该算法会尝试选择令牌，以优化集群节点间的复制负载。它会为每个节点分配与节点数量成比例的负载。


    提示


    推荐做法是使用 8 个虚拟节点（令牌），以便在高效分布工作负载和性能之间取得理想平衡。分配算法通过利用数据中心密钥空间的复制因子，将令牌范围最优地分配到节点和机架上。如果你使用的是
    Cassandra 3.4 或更低版本，你需要使用 256 个节点，或者创建并销毁虚拟节点，直到获得令人满意的数据分布。


    要设置分配算法，请将 `allocate_tokens_for_local_replication_factor` 属性配置为数据中心内密钥空间的复制因子。


    #### 随机选择算法


    随机选择算法会将令牌范围随机分配到数据中心内的节点上。要使用此算法，你必须配置 `num_tokens` 属性。


    数据库根据分配给数据中心内节点的令牌数量，将令牌范围分配给节点。例如，你可以为事务密集型数据中心将虚拟节点（令牌）的数量设置为 128。


    #### 启用虚拟节点


    除非集群节点的硬件配置不同，否则应在每个节点上配置相同数量的虚拟节点。如果节点的硬件容量不同，你可以为节点分配不同数量的虚拟节点，例如为较小的机器分配 128
    个虚拟节点，为性能强得多的机器分配 256 个虚拟节点。虽然这在技术上是可行的，但这不是推荐的做法，因为这可能会导致数据集不平衡。


    Cassandra 默认启用虚拟节点。你可以使用 `num_tokens` 参数设置节点上的令牌数量。此参数的默认值为 256。如果你决定不使用虚拟节点，而是配置传统的令牌范围，必须通过将
    `num_tokens` 属性设置为 1 或注释掉该属性来禁用虚拟节点。然后，你必须在每个节点上设置 `initial_token` 属性，以指定该节点将拥有的令牌范围。


    当你使用 `num_tokens` 参数配置虚拟节点时，不要设置 `initial_token` 参数；`initial_token` 参数用于指定单个令牌，如前所述。


    提示


    `initial_token` 参数仅适用于旧版集群。所有新集群都应使用 `num_tokens` 参数来配置虚拟节点。`initial_token` 参数允许你手动指定令牌。


    #### 禁用虚拟节点


    如果你决定不使用虚拟节点，必须确保每个节点分配的数据量大致相同。你可以通过为每个节点分配一个初始令牌值，然后为每个数据中心计算令牌来实现这一点。


    要禁用虚拟节点，请按如下方式配置 `cassandra.yaml` 文件：


    ```

    1. 注释掉 `num_tokens` 和 `allocate_tokens_for_local_replication_factor` 属性。

    2. 将 `initial_token` 属性设置为 1。

    ```


    ### 选择复制策略


    复制是 Cassandra 如何在多个节点上存储数据副本，以实现高可用性和容错能力的方式。复制因子决定了 Cassandra 将为表中的每一行存储多少个副本。复制因子为
    1 意味着 Cassandra 将保留每行的单个副本，复制因子为 2 意味着数据库将存储每行的两个副本，且这两个副本存储在两个不同的节点上。


    Cassandra 将副本存储在多个节点上，以实现可靠和容错的操作。术语“复制策略”指的是 Cassandra 如何精确确定应在多少个节点上存储副本。如果你的集群有多个节点，可以将复制因子设置为大于
    1，以确保即使集群中有一个或多个节点不可用，表数据仍然可用。


    数据库会将数据的第一个副本存储在拥有令牌所在范围的节点上。它使用你配置的复制策略来确定应在哪些节点上放置其余副本。


    显然，指定复制因子为 1 意味着，如果持有副本的节点崩溃，你将无法访问该行。此外，复制因子越高，存储这些行所需的存储空间就越多。


    复制组决定了你在单个数据中心中存储多少个副本。你不需要在集群的所有数据中心中存储相同数量的副本。例如，你可以在一个数据中心存储三个副本以服务于实时应用程序，在另一个数据中心存储一个副本以服务于分析查询。


    有两种基本的复制策略：


    *   `SimpleStrategy`

    *   `NetworkTopologyStrategy`


    以下部分将解释这两种基本复制策略。


    #### SimpleStrategy


    在 `SimpleStrategy` 下，Cassandra 将第一个副本存储在分区器确定的节点上，并将其余副本按顺时针方向放置在环中剩余的节点上。此策略忽略了集群拓扑，即机架和数据中心的位置。


    提示


    对于大多数部署，强烈建议使用 `NetworkTopologyStrategy`，因为它更便于将来扩展到多个数据中心。


    `SimpleStrategy` 复制策略仅在你拥有单个数据中心和机架时适用。如果你计划使用多个数据中心，则必须使用 `NetworkTopologyStrategy`。


    #### NetworkTopologyStrategy


    在 `NetworkTopologyStrategy` 下，你可以指定希望在每个数据中心拥有多少个副本。显然，此策略是为多数据中心集群设计的。


    `NetworkTopologyStrategy` 会尝试将副本放置在多个机架上，因为同一机架中的所有节点往往同时发生故障。使用此策略时，你主要需要权衡的是减少延迟的本地读取与潜在故障可能性之间的关系。


    处理多数据中心时，最常见的配置如下：


    *   每个数据中心两个副本：此策略使你能够在每个复制组中承受单个节点故障，同时支持本地读取（一致性级别为 `ONE`）。

    *   每个数据中心三个副本：此策略使你能够在一致性级别为 `ONE` 时，承受每个数据中心多个节点的故障。它还能帮助你在使用 `LOCAL_QUORUM`
    一致性级别时，容忍每个复制组中单个节点的故障。'
- fmt: '## Dynamic Ring Participation


    You can start and stop nodes in a Cassandra cluster without any effect on the
    rest of the nodes. In the following example, you shut down one of the two nodes
    in the test cluster. You then check the log of the second node.


    ```

    INFO  [GossipTasks:1] 2017-06-25 08:35:01,697 Gossiper.java:1035 - InetAddress
    /192.168.159.129 is now DOWN

    ```


    You then start up the node you brought down earlier. You again check the logs
    of the good node .


    ```

    INFO  [HANDSHAKE-/192.168.159.129] 2017-06-25 08:39:05,030 OutboundTcpConnection.java:510
    - Handshaking version with /192.168.159.129

    INFO  [GossipStage:1] 2017-06-25 08:39:06,134 Gossiper.java:1054 - Node /192.168.159.129
    has restarted, now UP

    INFO  [GossipStage:1] 2017-06-25 08:39:06,139 StorageService.java:2248 - Node
    /192.168.159.129 state jump to NORMAL

    INFO  [GossipStage:1] 2017-06-25 08:39:06,170 TokenMetadata.java:479 - Updating
    topology for /192.168.159.129

    INFO  [RequestResponseStage-1] 2017-06-25 08:39:06,352 Gossiper.java:1020 - InetAddress
    /192.168.159.129 is now UP

    ```


    As you can see, Cassandra automatically detects the failure and the restart of
    nodes. You don’t need do a thing.


    ## Changing the Replication Strategy


    You set the replication factor and the replication strategy at the keyspace level.
    The following example shows how to switch a keyspace from the default `SimpleStrategy`
    to `NetworkTopologyStrategy`:


    ```

    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {''class'' : ''NetworkTopologyStrategy'',
    ''DC1'' : 3};

    ```


    In this example, you switch the keyspace replication strategy for a single datacenter
    named DC1.


    In the following example, you restrict the replication of a keyspace to selected
    datacenters and set the replication factor of the excluded datacenters to 0:


    ```

    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {''class'' : ''NetworkTopologyStrategy'',
    ''DC1''  : 0, ''DC2'' : 3, ''DC3'' : 0 };

    ```


    ### Partitioners and Partitioning Strategies


    Cassandra uses partitioners to help it distribute data across the nodes in a cluster.
    A partitioner load balances the data by distributing it evenly across all nodes
    in a cluster. A partitioner is a function that Cassandra uses for deriving tokens
    that represent a row by hashing the primary keys. Cassandra then distributes the
    data across the nodes based on the token values it derives through the partitioner.


    #### Types of Partitioners


    Cassandra offers three types of partitioners, although it recommends that you
    not use the `ByteOrderedPartitioner` due to various drawbacks and includes it
    only for backward compatibility purposes.


    The other two partitioners that you can choose from are the `Murmur3Partitioner`,
    which is the default partitioner, and the `RandomPartitioner`. Both use tokens
    to assign equal amounts of data on all nodes and evenly distribute table data
    across the ring or keyspace.


    Since each part of the hash range contains an equal number of rows (on average),
    read and write requests are evenly distributed.


    Both of the partitioners distribute data across the cluster based on the hash
    values for each of the row keys. The difference between the two partitioners is
    in how each of them generates the token hash values. The `Murmur3Partitioner`
    provides faster hashing using the `Murmurhash` function, which creates a 64-bit
    hash value of the partition key.


    The `RandomPartitioner` distributes data across the cluster by generating token
    hash values using a cryptographic hash. Generation of the token hash values takes
    longer with the `RandomPartitioner` due to its use of a cryptographic hash. Since
    Cassandra doesn''t need a cryptographic hash, using the alternative, `Murmur3Partitioner`,
    will yield a 3-5 times performance gain.


    Tip


    The `Murmur3Partitioner` is 3-5 times faster in performance than the `RandomPartitioner`.


    The `Murmur3Partitioner`, which is the default partitioning strategy, is good
    in most cases. Just be aware that once you partition data with one partitioner,
    it’s difficult to convert it to the other partitioner.


    #### Generating Tokens


    If you’re using virtual nodes (vnodes), there’s no need to calculate tokens. Otherwise,
    you must calculate tokens for the cluster. You assign these tokens with the `initial_token`
    parameter when configuring the cluster (`cassandra.yaml` file).


    If you have just one datacenter, you calculate the tokens by dividing the hash
    range by the number of nodes. If you have multiple datacenters, you must calculate
    tokens for each datacenter by dividing the hash range by the number of nodes in
    each datacenter.


    How you calculate tokens depends on your partitioning strategy. Assuming you’re
    using the default `Murmur3Partitioner`, you generate tokens in the following way:


    ```

    python -c "print [str(((2**64 / number_of_tokens) * i) - 2**63) for i in range(number_of_tokens)]"

    ```


    If you have six nodes in a cluster, this is the Python command you run:


    ```

    python -c "print [str(((2**64 / 6) * i) - 2**63) for i in range(6)]"

    ```


    The command will display tokens for each of the six nodes in the cluster, which
    you can then specify as the value of the `initial_token` parameter in the `cassandra.yaml`
    file.


    ```

    [ ''-9223372036854775808'', ''-6148914691236517206'', ''-3074457345618258604'',
    ''-2'', ''3074457345618258600'', ''6148914691236517202'' ]

    ```


    #### Setting the initial_tokens and num_tokens Properties


    By default, the `initial_token` property is disabled for a single-node-per-token
    architecture. Where a node owns one contiguous range in the ring space, you must
    set the `initial_token` property. When you set this, it’ll override the `num_token`
    property.


    Always set the `initial_token` value when initiating a production cluster for
    the first time or when adding nodes, if any of the following is true:


    *   You’re not using vnodes.

    *   You’ve set the node’s `num_tokens` property to 1.


    You set the `num_tokens` property for a virtual node architecture to determine
    the number of token ranges to assign to a vnode. The default value for this property
    is 1 disabled, which means vnodes are disabled. You can specify a number between
    1 and 256 for this property.


    If all nodes in the cluster are physically identical, you must specify the same
    value for the `num_values` property on all the nodes.'
