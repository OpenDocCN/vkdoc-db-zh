  trans: '

    # 故障检测与恢复


    Cassandra 从八卦状态确定节点的状态（在线/离线），并尽力避免将客户端请求发送到不可达的节点。


    Cassandra 使用一种**累积检测机制**来确定标记节点为故障的阈值。此阈值考虑网络性能、工作负载和历史数据，以帮助计算节点不可用性的关键阈值。


    所有节点都使用故障检测机制来检测集群中其余节点的故障。节点利用八卦消息的延迟，通过对来自其他节点的八卦消息到达时间使用滑动窗口来实现。


    您可以通过调整 `cassandra.yaml` 文件中的 `phi_convict_threshold` 属性来配置故障检测机制。此属性的默认值为 **8**。如果将此属性的值设置得较高，集群可能会错过短暂的故障。另一方面，较低的值会增加将无响应节点标记为下线节点的可能性。


    Amazon EC2 频繁遇到网络拥堵问题。在此类以及其他可能遇到不可用网络的环境中，您可以将 `phi_convict_threshold` 属性的值提高到
    **10** 或 **12**，以避免误导性的故障检测。一般来说，据 DataStax 称，**5** 到 **12** 之间的值在大多数情况下是足够好的。


    间歇性节点故障（如由网络中断引起的故障）是短暂的，不会导致节点从环中移除。其余节点将定期尝试联系不可达的节点。


    当一个不可达的节点重新上线时，Cassandra 使用诸如提示交接和手动修复之类的修复机制，确保该节点能追上其维护的副本数据所错过的写入。


    ## 修复节点


    Cassandra 是一个分布式数据库，随着时间的推移，其中一个副本中的数据可能与其他副本的数据产生分歧。节点修复是一个纠正副本之间不一致性的过程，最终所有节点将拥有相同的数据。作为管理员，节点修复是您的关键职责之一，也是您需要定期执行的操作。


    Cassandra 提供三种类型的修复，其中一些涉及您的手动干预：


    *   提示交接

    *   读取修复

    *   反熵修复


    以下部分简要解释了各种修复类型。


    ### 提示交接


    提示交接是一个过程：当一个节点作为协调器，无法在另一个节点上执行写入时，它会将数据保存为一组**提示**。当之前不可达的节点稍后变为可用时，协调器节点会移交存储的提示，以帮助另一个节点追上错过的写入。


    提示包含关于当时发送给不可用节点的写入请求的数据。提示就像是围绕更改操作的一个包装器，它告诉数据库需要将该数据重放到写入时不可用的节点上。


    数据库为每个需要写入数据的分区创建一个单独的提示。一旦协调器节点通过八卦发现故障节点已重新上线，它就会将提示移交给恢复的节点，以写入错过的数据。因此，提示有助于缩短故障节点重新上线后达到一致性所需的时间。


    提示交接背后的理念是通过使集群在即使一个或多个节点不可用时也能执行其正常的写入量，来确保集群正常运行。因此，此功能直接贡献了 Cassandra 备受赞誉的高可用性。在一致性不是必需的情况下，提示允许
    Cassandra 提供完整的写入可用性。它们还在诸如网络故障等临时中断后增强了响应一致性。


    您可以禁用提示交接，以避免节点可能长时间宕机的情况。这将防止数据库在故障节点重新上线时不得不向其发送大量提示。


    在满足一致性级别时，提示不计入一次写入。然而，一致性级别 **ANY** 接受提示作为满足读取操作要求的条件。即使数据库仅写入提示，该写入也会被视为成功。


    #### 提示是什么


    Cassandra 将所有提示存储在本地每个节点的提示目录中。除了数据本身，每个提示还包含一些用于标识提示的属性。一个提示包含以下内容：


    *   下线或不可用节点的 ID

    *   提示 ID，这是数据的**时间 UUID**

    *   带有 Cassandra 版本的消息 ID

    *   以 **blob** 形式存储的数据


    数据库每 **10** 秒将所有提示刷新到磁盘，以保持提示的时效性。一旦下线节点重新上线，Cassandra 将所有数据写入该节点，然后删除提示文件。


    当 Cassandra 尝试写入一个它知道已下线或没有响应写入请求的副本节点时，协调器节点会在其运行的节点上，将提示存储在 `system.hints` 表中。当八卦机制通知协调器节点故障节点已恢复时，协调器节点会将与每个提示对应的数据行发送给恢复的节点。


    对于短暂中断，协调器节点每十分钟检查一次是否有因间歇性故障而可能被错过、且未被故障检测器通过八卦捕获的写入。


    #### 提示交接如何工作


    要使提示交接工作，首先必须启用它。由于 `cassandra.yaml` 文件中 `hinted_handoff_enabled` 属性的默认值为 **true**，因此您无需执行任何操作，除非您之前因某些原因禁用了此功能。


    您还可以通过传递数据中心列表来按数据中心启用提示交接，如下所示：


    ```

    hinted_handoff_enabled: DC1, DC3

    ```


    您可以指定一个不执行提示交接的数据中心列表；也就是说，通过将列入黑名单的数据中心列表作为值传递给 `hinted_handoff_disabled_datacenters`
    属性，来禁用集群中某些数据中心的功能，如下所示：


    ```

    hinted_handoff_disabled_datacenters: - DC1 - DC2

    ```


    #### 管理提示交接


    默认情况下，数据库将提示存储在以下位置的名为 `hints` 的目录中：


    ```

    $CASSANDRA_HOME/data/hints

    ```


    您可以通过设置 `hints_directory` 属性为 `hints` 目录指定不同的位置。


    您可以通过设置 `max_hints_file_size_in_mb` 属性（默认为 **128MB**）来配置单个提示文件的最大大小（以兆字节为单位）。您可以通过设置
    `hints_compression` 参数让数据库压缩提示文件，该参数默认为 **LZ4Compressor**。除了 LZ，数据库还支持 **Snappy**
    和 **Deflate** 压缩算法作为提示文件的压缩器。


    #### 检查提示交接状态


    您可以通过执行 `nodetool` `statushandoff` 命令来查看提示交接的状态：


    ```

    $ nodetool  statushandoff

    ```


    该命令的选项包括主机名、端口号和密码。以下是一个示例：


    ```

    $ nodetool statushandoff

    Hinted handoff is running

    $

    ```


    #### 删除所有提示


    您可以使用 `nodetool` `truncatehints` 命令删除本地节点上或一个或多个端点的所有提示：


    ```

    $ nodetool  truncatehints --  ...

    ```


    `endpoints` 选项使您能够指定要删除提示的一个或多个 IP 地址或主机名。

    '
- fmt: '## Disable and Enable Hints for a Datacenter


    You can enable hints for a datacenter with the `nodetool enablehintsfordc` command,
    which has the following syntax:


    ```

    $ nodetool [options] enablehintsfordc [--] <datacenter>

    ```


    The `datacenter` option is how you specify the datacenter for which you want to
    enable hints. Here’s an example of how you invoke this command:


    ```

    $ nodetool -u username -pw password enablehintsfordc DC1

    ```


    Earlier, I explained how you can configure the `hinted_handoff_disabled_datacenters`
    property to blacklist one or more datacenters when you start up a cluster. You
    can run the `nodetool enablehintsfordc` command to enable hints for the datacenters
    you’ve backlisted at startup.


    As you might guess, you can disable hints for a datacenter by running the `nodetool
    disablehintsfordc` command, as shown in the following example:


    ```

    $ nodetool -u username -pw password disablehintsfordc DC1

    ```


    You usually disable hints for a specific datacenter when the datacenter is down
    but the rest of the cluster is working fine. You can also do this when failing
    a datacenter over.


    ## Tuning Hinted Handoff


    You can control the rate at which the surviving nodes send hints to a recovered
    node. You do this by setting the `sethintedhandoffthrottlekb` property (in KB/second).
    The property doesn’t set the rate of transmission of the hints from the good nodes
    to the recovering node. Rather, it sets the maximum sleep interval per delivery
    thread after it delivers a hint.


    You set the `sethintedhandoffthrottlekb` property in the following way:


    ```

    $ nodetool sethintedhandoffthrottlekb 4096

    ```


    This example shows how to set the hinted handoff throttle to 4096 KB/second per
    delivery thread.


    The more nodes you have in your cluster, the smaller the sleep interval between
    hints because all the delivery threads from the various nodes share the maximum
    interval. The more nodes there are, the more the simultaneous delivery of hints,
    hence the lower the real sleep interval between the transmissions of the hints.


    You can speed up hint handoffs in a multiple datacenter deployment by configuring
    the `max_hints_delivery_threads` property, whose default value is 2. By raising
    this value, you enable the database to use a higher number of threads to deliver
    hints during a cross-datacenter handoff of hints.


    ## Stopping the Writing of New Hints


    When a node is down for a long time, the coordinator node won’t write anymore
    new hints. You can configure this period with the `max_hint_window_in_ms` attribute
    in the `cassandra.yaml` file. By default, this period is set to 3 hours.


    The reason Cassandra imposes a time interval for the period for which the database
    generates hints is to ensure that a large volume of stored hints won’t cause a
    resource crunch when the database tries to write all the data to the node that
    was brought up after a prolonged period of time.


    The `write_request_timeout_in_ms` property specifies the time (in milliseconds)
    that the coordinator will wait for write operations to complete, before it times
    out the operation. The default is 2000 milliseconds.


    ## Read Repair


    Cassandra performs a read repair when it repairs nodes that are queried during
    a read operation. The extent of the read repair depends on the replication factor
    you’ve configured for a database. If you’ve configured a `CONSISTENCY` level of
    `ONE` or `ANY`, there’s only a single replica node that’s queried by the coordinator
    node. However, if you’ve set the `CONSISTENCY` level to greater than `ONE`, there
    are multiple replica nodes that the coordinator will get in touch with for every
    read request.


    During a read, the coordinator sends out requests to one of the nodes that has
    a replica (replica node). Simultaneously, it also sends digest requests to all
    the other replica nodes where you’ve configured a `CONSISTENCY` level greater
    than `ONE`.


    The coordinator node returns the requested data to the client if all of the nodes
    return the same (consistent) data. However, if some of the replica nodes don’t
    have the same data, the coordinator writes the latest version of the data to the
    replica nodes with the outdated replicas.


    ### Random Read Repairs


    Cassandra can choose to randomly perform a read repair on its own of all the replicas
    of a table. The replication factor has no bearing on this type of random read
    repair.


    The `read_repair_chance` property that you set for a table determines how frequently
    the database performs random read repairs. This property sets the probability
    that a successful read operation will trigger a read repair. The default value
    for this property is zero, and you must set it to a value between zero and one.


    Whereas the `read_repair_chance` property determines the probability of a read
    repair across the cluster, a related table level property, `dclocal_read_repair_chance`,
    determines the probability of a read repair of replicas in the same datacenter
    as the coordinator.


    The recommended value for the `read_repair_chance` property is a value of 0.2
    for all compaction strategies except the deprecated `DataTieredCompcationStrategy`,
    which you set to zero. However, your mileage may vary so proceed with caution
    when setting a value for this property.


    ## Rapid Read Protection


    Cassandra’s rapid read protection feature allows it to tolerate a node failure
    without losing even a single request. If a node is lost, the dead node can’t service
    any client requests until failure detection occurs. However, if you enable rapid
    read protection, there’s only a brief dip in the read traffic.


    ### Why Rapid Read Protection Helps


    Cassandra employs snitches to send requests to the replicas with the least load
    (replicas that are likely to respond the fastest to a read request). Cassandra
    sends normal read requests to just enough nodes to satisfy the consistency level.


    Cassandra performs a different number of read requests in each case, with the
    number of requests dependent on the consistency level you configure. For example,
    the following are the number of read requests Cassandra performs for various consistency
    levels:


    *   Consistency level `ONE`: One read request

    *   Consistency level `QUORUM`: Two read requests


    Figure [5-2](#A436674_1_En_5_Chapter.html#Fig2) shows how the coordinator sends
    read requests to the nodes.


    ![A436674_1_En_5_Fig2_HTML.jpg](A436674_1_En_5_Fig2_HTML.jpg)


    **Figure 5-2**

    How the coordinator sends read requests to the “best” node in a cluster


    The `speculative_retry` property enables you to configure a trigger for firing
    extra read requests when the requests aren’t being satisfied in the expected time.


    Rapid read protection enables the coordinator to send redundant requests to other
    replicas when the target replica is slower than expected, by monitoring the outstanding
    read requests. That is, the database sends out extra read requests to other replica
    nodes even after it meets the consistency level requirements. Rapid read protection
    helps during node failures, or other events that slow a node’s throughput, or
    a throughput that’s adversely affected by a cluster-wide, full, un-throttled compaction.'
