- fmt: '### The Write Request Flow


    Cassandra processes data in multiple stages on the write path, which starts with
    the initialization of the write request by a client and ends with the database
    storing the data on disk. It immediately logs a write, and at the end of the process,
    writes the data to disk. Here are the stages of a write:


    *   Log data in the commit log.

    *   Write the data to the memtable.

    *   Flush the data from the memtable.

    *   Store the data in SSTables on disk.


    Figure [4-1](#A436674_1_En_4_Chapter.html#Fig1) shows the Cassandra write request
    flow. The figure shows a Cassandra cluster with twelve nodes. There’s three-way
    replication (that is, the replication level is 3), and the clients use the `QUORUM`
    consistency level.


    ![A436674_1_En_4_Fig1_HTML.gif](A436674_1_En_4_Fig1_HTML.gif)


    Figure 4-1


    The Cassandra write request flow Note


    Cassandra writes sequentially and it doesn’t need any reads or seeks to write
    values since all writes are just appends. Therefore, Cassandra can write data
    very fast.


    Under the `QUORUM` consistency level, Cassandra deems a write operation a success
    if two of three nodes acknowledge success of the write operation. The replica
    nodes send the acknowledgements to the coordinator node, which is the node to
    which the clients connect.


    The following is a step-by-step explanation of the Cassandra write request flow
    shown in Figure [4-1](#A436674_1_En_4_Chapter.html#Fig1).


    1.  A Cassandra client sends a write request to store a specific key. The first
    thing to understand is that a node can play the role of a replica, a coordinator,
    or both. If the node is the right partition to store the key, and if the node
    maps to the data, the node acts as the replica. If the node happens to be the
    node the client connects to, then it acts as the coordinator. If both things are
    true, the node plays both roles: coordinator and replica.

    2.  The coordinator figures out the right replica nodes that should store the
    key and forwards the client’s request to all those nodes. The number of replicas
    depends on the replication factor. If all nodes are not up, the nodes that are
    down will have inconsistent data after the writes. The down nodes, once they come
    back, will use one of Cassandra’s data repair mechanisms, such as `hinted handoff`,
    `read repair`, or `anti-entropy repair`, to become consistent.

    3.  The nodes that receive the keys sequentially write the data, along with the
    metadata for creating the data, in the commit log (locally). Tip A hint counts
    as a successful write only under the consistency level `ANY`.

    4.  The nodes then write the keys and their data locally to the memtable, which
    lives in memory. At this point, the nodes consider the writes a success.

    5.  Once the write succeeds (or fails), the replica nodes send the operation’s
    success/failure status to the coordinator node.

    6.  In this case, we’re assuming a consistency level of `QUORUM` and a replication
    factor of 3. The coordinator will therefore respond with a success message to
    the client once two of the three nodes respond with a success message.


    Note


    You’ll often come across the term coordinator node. The coordinator node is the
    node where you initiate a `cqlsh` session. The coordinator node can be a remote
    host if you connect to one.


    There are several important Cassandra internal operations that occur around this
    time, such as the following:


    *   How Cassandra uses hints during the write operations

    *   How Cassandra determines when it should flush memtables to disk

    *   How Cassandra uses the commit log

    *   The role that Bloom filters play

    *   The role of index files


    The following sections explain these behind-the-scenes internal operations or
    processes.


    #### The Role of Hints During the Write Process


    If one or more of the nodes fails to send an acknowledgement of success or failure,
    the coordinator stores a hint locally, so it can resend the write operation to
    the node(s) when they come back up again.


    You can control how Cassandra manages hints with the help of the following two
    configuration properties (in the `cassandra.yaml` file):


    *   `gc_grace_seconds`: Configures the time-to-live (TTL) period for a hint so
    that the database won’t replay the hint after this duration. Setting this parameter
    to 0 disables hints.

    *   `max_hint_window_in_ms`: This property determines the period for which hints
    will be recorded. The default value is three hours.


    #### Memtables and How They’re Flushed to Disk


    During client write operations, a background thread monitors all the memtables
    in the database. Once any of the following conditions is satisfied, the background
    thread replaces the current memtable with a new memtable, and marks the older
    memtable for flushing to disk (to an SSTable):


    *   The node hits its global memory threshold.

    *   The commit log is full.

    *   The table level interval is reached.


    A different background thread (or a set of threads) flushes the memtables that
    the first background thread has marked for flushing.


    #### The Commit Log


    Once Cassandra flushes a memtable to disk, all the entries stored in the commit
    log for the keys in that memtable become useless. Cassandra marks all the commit
    log segments belonging to the flushed memtable so that it can use them again for
    storing data from other memtables.


    The database stores the commit logs in the file system as binary files in the
    `$CASSANDRA_HOME/data/commitlog` directory. Here’s an example:


    ```

    $ ls -altr

    total 9332

    drwxr-xr-x 6 cassandra cassandra      4096 Apr  3 10:56 ..

    -rw-r--r-- 1 cassandra cassandra  33554432 Jun 24 12:35 CommitLog-6-1498331957174.log

    drwxr-xr-x 2 cassandra cassandra      4096 Jun 24 12:35 .

    -rw-r--r-- 1 cassandra cassandra  33554432 Jun 25 09:55 CommitLog-6-1498331957173.log

    $

    ```


    The number 6 in the commit log name shows the number version of the commit log
    format. For the Cassandra 3.0 release, the version number is 6.'
  raw: '### The Write Request Flow


    Cassandra processes data in multiple stages on the write path, which starts with
    the initialization of the write request by a client and ends with the database
    storing the data on disk. It immediately logs a write, and at the end of the process,
    writes the data to disk. Here are the stages of a write:


    *   Log data in the commit log.

    *   Write the data to the memtable.

    *   Flush the data from the memtable.

    *   Store the data in SSTables on disk.


