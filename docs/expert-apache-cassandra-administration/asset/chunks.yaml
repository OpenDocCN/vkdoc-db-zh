  trans: '

    # 配置 Cassandra


    `cassandra.yaml`文件是为 Cassandra 集群设置配置属性的关键配置文件，例如以下各项：


    *   调优和资源利用参数

    *   缓存参数

    *   客户端连接

    *   备份

    *   安全


    Cassandra 提供了一个`cassandra.yaml`模板，位于`$CASSANDRA_HOME/conf`目录中。刚开始使用 Cassandra
    时，你只需编辑少量配置属性即可开始使用。之后，一旦你充分理解了 Cassandra 的架构和关键概念，就该着手调整那些影响性能以及 Cassandra 其他许多方面的配置属性了，本书相关章节会对这些进行讲解。


    ## cassandra.yaml 文件的位置


    默认情况下，`cassandra.yaml`文件位于以下位置：


    *   `/etc/cassandra` （用于 Cassandra 包安装）

    *   `<install_location>/conf` （用于 Cassandra 压缩包安装）


    ## 必须设置的最小配置属性


    虽然你可以在`cassandra.yaml`文件中配置数百个初始化参数，但开始时你只需要配置少数几个属性：


    *   `cluster_name`

    *   `listen_adresss`

    *   `listen_interface`


    我将在以下小节中解释这些基本属性。你可以用不同的名称保存默认的`cassandra.yaml`，然后创建一个只包含这些属性的新`cassandra.yaml`文件来启动你的第一个单节点
    Cassandra 集群。你通过在属性后加冒号来指定每个配置属性。


    ### cluster_name 参数


    `cluster_name`参数允许你为 Cassandra 集群命名。默认值是 Test Cluster。显然，在多节点集群中，你必须为所有节点指定相同的`cluster_name`值。


    `cluster_name`参数的主要目的是防止属于一个逻辑集群的节点加入其他集群。


    ### listen_adresss 属性


    `listen_address`属性决定了 Cassandra 在连接到其他节点时绑定的 IP 地址（或主机名）。默认值是`localhost`。如果你运行的是单节点集群，可以使用此参数的默认设置。


    注意：请勿将`listen_address`参数的值设置为 0.0.0.0。


    ### listen_interface 参数


    `listen_interface`参数指定了 Cassandra 在连接到其他节点时绑定的网络接口，并且必须对应于单个地址。


    如果你设置了`listen_address`属性，就可以省略`listen_interface`参数，反之亦然。


    ### 设置数据文件目录位置


    你可以在`cassandra.yaml`文件中指定用于存储 Cassandra 数据文件及其缓存目录的目录。


    你必须配置两个主要目录来指定 Cassandra 存储其数据的位置；第一个位置用于存储 SSTable，第二个位置用于存储提交日志。此外，还有第三个目录用于存储缓存数据，称为`saved_caches`目录。


    虽然 Cassandra 会在其默认位置为你创建这些目录，但你也可以为以下三个 Cassandra 目录设置自定义位置，如下所示：


    *   `data_file_directories: /usr/share/cassandra/data`

    *   `commitlog_directory: /usr/share/cassandra/commitlog`

    *   `saved_caches_directory: /usr/share/cassandra/saved_caches`


    默认情况下，Cassandra 将其数据存储在以下位置：


    *   `/var/lib/cassandra` （用于包安装）

    *   `<install_location>/data/data` （用于压缩包安装）


    如果你不设置此参数，默认目录将是`$CASSANDRA_HOME/data/data`。


    ### 存储缓存目录的位置


    Cassandra 需要一个目录来存储其键缓存和行缓存。其默认位置是


    *   `/var/lib/cassandra/saved_caches` （用于包安装）

    *   `<install_location>/data/saved_caches` （用于压缩包安装）


    ### 设置存储提交日志的位置


    你应该为存储提交日志分配一个不同的目录，理想情况下应位于不同的物理磁盘上。


    默认情况下，Cassandra 将提交日志存储在`/var/lib/cassandra/commitlog`目录中。如果你不设置它，默认目录将是：


    `$CASSANDRA_HOME/data/commitlog`


    ## 配置防火墙


    在启动 Cassandra 实例之前，请确保可以通过打开以下端口从 Cassandra 运行的服务器外部访问 Cassandra 服务：


    *   `7000`

    *   `7199`

    *   `9042`

    *   `9160`


    # 探索 CQL Shell


    Cassandra 查询语言（CQL）是与 Cassandra 数据库通信的主要方式。与 Cassandra 交互最简单的方法是使用 CQL shell，即`cqlsh`。


    你通过`cqlsh`创建键空间、表以及读写数据。在以下部分中，我将向你展示如何开始使用`cqlsh`。


    ## 启动 CQL Shell


    你使用`cqlsh`命令启动 CQL shell，如下所示：


    ```

    $ cqlsh

    Connected to Test Cluster at 127.0.0.1:9042.

    [cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native protocol v4]

    Use HELP for help.

    cqlsh>

    ```


    你在`cqlsh`提示符下输入`exit`来终止 CQL shell：


    ```

    cqlsh:mykeyspace1> exit;

    $

    ```


    ## cqlsh 中的时区


    Cassandra 默认使用 UTC 时区显示时间戳。你必须安装`pytz`库才能使用不同时区显示时间戳。


    ## 在 CQL Shell 中获取帮助


    CQL shell 中的 HELP 功能很强大。当你在`cqlsh`命令行输入`HELP`时，你会看到所有 HELP 选项，就像其他任何命令行工具一样。


    ```

    cqlsh> help

    Documented shell commands:

    ===========================

    CAPTURE  CLS          COPY  DESCRIBE  EXPAND  LOGIN   SERIAL  SOURCE   UNICODE

    CLEAR    CONSISTENCY  DESC  EXIT      HELP    PAGING  SHOW    TRACING

    CQL help topics:

    ================

    AGGREGATES               CREATE_KEYSPACE           DROP_TRIGGER        TEXT

    ALTER_KEYSPACE           CREATE_MATERIALIZED_VIEW  DROP_TYPE           TIME

    ALTER_MATERIALIZED_VIEW  CREATE_ROLE                 DROP_USER       TIMESTAMP

    ALTER_TABLE              CREATE_TABLE                     FUNCTIONS       TRUNCATE

    ALTER_TYPE               CREATE_TRIGGER            GRANT              TYPES

    ALTER_USER               CREATE_TYPE               INSERT            UPDATE

    APPLY                    CREATE_USER               INSERT_JSON          USE

    ASCII                    DATE                      INT                 UUID

    BATCH                    DELETE                    JSON

    BEGIN                    DROP_AGGREGATE            KEYWORDS

    BLOB                     DROP_COLUMNFAMILY         LIST_PERMISSIONS

    BOOLEAN                  DROP_FUNCTION             LIST_ROLES

    COUNTER                  DROP_INDEX                LIST_USERS

    CREATE_AGGREGATE         DROP_KEYSPACE             PERMISSIONS

    CREATE_COLUMNFAMILY      DROP_MATERIALIZED_VIEW    REVOKE

    CREATE_FUNCTION          DROP_ROLE                 SELECT

    CREATE_INDEX             DROP_TABLE                SELECT_JSON

    cqlsh>

    ```


    此外，当你向`HELP`命令传递一个选项时，例如`HELP CREATE_TABLE`，Cassandra 会显示一个漂亮的屏幕，展示该命令的语法，如图 2-1
    所示。


    ![A436674_1_En_2_Fig1_HTML.jpg](img/A436674_1_En_2_Fig1_HTML.jpg)


    图 2-1：CREATE TABLE 语句的 HELP 命令


    注意：`cqlsh`保证能良好运行（即完全兼容）的只是与其所属的 Cassandra 版本。它可能与更旧或更新的 Cassandra 版本也能良好运行，但不要指望这一点！

    '
- fmt: '# Command Line CQL Shell Options


    You’ll be using `cqlsh` to perform many tasks, so you should get a good grip on
    the basic CQL shell command line options. The `cqlsh` utility comes with several
    useful command line options, also called documented shell commands. I’ll show
    how to use the most useful CQL shell options here.


    ## The `capture` Command


    The `CAPTURE` command will capture the output of a command and add it to a text
    file, as shown in the following example:


    ```

    cqlsh> capture ''/home/test/Cassandra/output/testfile''

    ```


    Once you issue the `CAPTURE` command, the shell will capture the output of all
    subsequent CQL commands that you issue in that session, until you turn off the
    output capturing with the `capture off` command:


    ```

    cqlsh> capture off;

    ```


    ## The `copy` Command


    The `COPY` command is great for capturing the data from a Cassandra table to a
    text file. The following is an example that shows how to capture the contents
    of a table named `employees` to the file `myfile`:


    ```

    cqlsh> copy employee (emp_id, emp_cicty, emp_name, emp_sal) to ''myfile'';

    ```


    ## The `describe` Command


    The `DESCRIBE` command will describe various entities in a Cassandra cluster.
    In the following example, the `describe cluster` command describes the Cassandra
    cluster and its top-level objects:


    ```

    cqlsh> describe cluster;

    Cluster: Test Cluster

    Partitioner: Murmur3Partitioner

    cqlsh>

    ```


    You can get a description of several other entities with the `DESCRIBE` command:


    *   `Describe types`: Lists all user-defined data types

    *   `Describe type`: Describes a user-defined data type

    *   `Describe tables`: Lists all the tables in a keyspace

    *   `Describe table`: Describes a table

    *   `Describe keyspaces`: Lists all keyspaces in a cluster


    Note: The `DESC` command works the same as the `DESCRIBE` command.


    Here’s an example showing how to run the `DESCRIBE KEYSPACES` command:


    ```

    cqlsh> describe keyspaces;

    test1          system_auth  system_distributed  testdata

    system_schema  system       system_traces

    cqlsh>

    ```


    Let’s say I have a table named `quarters`. When I run the `describe table quarters`
    command, I get a bunch of output, although I only used a couple of lines to create
    the table.


    ```

    cqlsh> use testdata;

    cqlsh:testdata> describe table quarters;

    CREATE TABLE testdata.quarters (

    id int PRIMARY KEY,

    name text

    ) WITH bloom_filter_fp_chance = 0.01

    AND caching = {''keys'': ''ALL'', ''rows_per_partition'': ''NONE''}

    AND comment = ''''

    AND compaction = {''class'': ''org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy'',
    ''max_threshold'': ''32'', ''min_threshold'': ''4''}

    AND compression = {''chunk_length_in_kb'': ''64'', ''class'': ''org.apache.cassandra.io.compress.LZ4Compressor''}

    AND crc_check_chance = 1.0

    AND dclocal_read_repair_chance = 0.1

    AND default_time_to_live = 0

    AND gc_grace_seconds = 864000

    AND max_index_interval = 2048

    AND memtable_flush_period_in_ms = 0

    AND min_index_interval = 128

    AND read_repair_chance = 0.0

    AND speculative_retry = ''99PERCENTILE'';

    cqlsh:testdata>

    ```


    If you are coming from a relational database such as Oracle, you can recognize
    just one of these table options, `PRIMARY KEY`, which you must specify when you
    create a table. The rest are all default values. This is what makes Cassandra
    so much fun, since there is a lot of new and interesting stuff to learn and use.
    You’ll learn about all these table options in the appropriate chapters.


    ## The `expand` Command


    The `expand` command shows the contents of a table’s rows vertically, making it
    convenient to read long rows of data. Instead of scrolling to the right, as in
    the case of the default horizontal format, you scroll down to view more of a row.


    Let’s say your query results in the following output:


    ```

    cqlsh:mykeyspace1> select * from employee;

    emp_id | emp_city    | emp_name | emp_phone   | emp_sal

    --------+-------------+----------+-------------+---------

    1 | San Antonio |     juan | 39874622562 |   90000

    2 |     Houston |      jim | 87209887521 |  100000

    3 |      Austin |      sam | 87361598012 |   50000

    (3 rows)

    cqlsh:mykeyspace1>

    ```


    Now you would like to get a more detailed output. You can do this by first issuing
    the `expand on` command in the `cqlsh` session, and following it up with your
    original command.


    ```

    cqlsh:mykeyspace1>

    expand on;

    Now Expanded output is enabled

    cqlsh:mykeyspace1> select * from employee;

    @ Row 1

    -----------+-------------

    emp_id    | 1

    emp_city  | San Antonio

    emp_name  | juan

    emp_phone | 39874622562

    emp_sal   | 90000

    @ Row 2

    -----------+-------------

    emp_id    | 2

    emp_city  | Houston

    emp_name  | jim

    emp_phone | 87209887521

    emp_sal   | 100000

    @ Row 3

    -----------+-------------

    emp_id    | 3

    emp_city  | Austin

    emp_name  | sam

    emp_phone | 87361598012

    emp_sal   | 50000

    (3 rows)

    cqlsh:mykeyspace1>

    ```


    Be sure to turn expanded output off once you’re done with it:


    ```

    cqlsh:mykeyspace1> expand off;

    Disabled Expanded output.

    cqlsh:mykeyspace1>

    ```


    ## The `tracing` Command


    The `tracing` command lets you enable and disable tracing of transactions running
    in the database. You use tracing to diagnose performance issues. The `system_traces`
    keyspace captures the information about the Cassandra internal operations. The
    table named `session` in this keyspace captures the query results and high-level
    details. Cassandra captures the detailed information for all operations it performs
    in the `system_traces.events` table. I explain tracing in detail in Chapter 11.


    # Cassandra Installation Directories


    When you install Cassandra, the installer creates a bunch of directories and it’s
    a good idea to learn what those directories are and what’s in them.


    The location of the directories depends on whether you install Cassandra through
    a tarball or a package. In general, a tarball installation creates all the directories
    under the installation directory, and a package install will store its directories
    under the `/etc` and `/var` directories.


    In my case, I installed Cassandra using a tarball, so I’ll show the directory
    structure in my installation, which is as follows:


    ```

    $ cd $CASSANDRA_HOME

    $ ls

    bin          conf  interface  lib          NEWS.txt    pylib

    CHANGES.txt  doc   javadoc    LICENSE.txt  NOTICE.txt  tools

    $

    ```


    The following sections describe the key Cassandra directories and the important
    files under those directories.


    ## The `bin` Directory


    The `bin` directory contains various utilities and start scripts, as shown here:


    ```

    $ ls

    cassandra         cqlsh.py         sstableloader       sstableutil.bat

    cassandra.bat     debug-cql        sstableloader.bat   sstableverify

    cassandra.in.bat  debug-cql.bat    sstablescrub        sstableverify.bat

    cassandra.in.sh   nano.save        sstablescrub.bat    stop-server

    cassandra.ps1     nodetool         sstableupgrade      stop-server.bat

    cqlsh             nodetool.bat     sstableupgrade.bat  stop-server.ps1

    cqlsh.bat         source-conf.ps1  sstableutil

    $

    ```


    The `bin` directory is where you’ll find the following key utilities:


    *   `cassandra`: This utility helps you start a Cassandra instance, as I explain
    in the next section.

    *   `cqlsh`: The `cqlsh` utility starts up the CQL shell that enables you to write
    CQL queries to talk to Cassandra.

    *   `nodetool`: The `nodetool` utility is a Cassandra administrator’s best buddy.
    It lets you perform numerous administrative tasks such as checking the status
    of the cluster, decommissioning nodes, adding nodes, etc. Throughout this book,
    I use `nodetool` to perform numerous administrative tasks.

    *   `sstableloader`: This tool enables you to load data into SSTables, as I explain
    in Chapter 9.'
