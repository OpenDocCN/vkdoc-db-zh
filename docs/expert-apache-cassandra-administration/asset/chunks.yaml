    # Cassandra 数据库维护：nodetool 命令详解


    ## 当修复不可避免时


    尽管使用`nodetool repair`命令执行的修复是可选的，但有几种操作在完成后需要您执行一次完整的修复。这些操作包括更改集群的`snitch`和更改键空间的复制级别。


    ## 运行 nodetool repair 命令


    您可以为整个数据库或特定的键空间或表运行`nodetool repair`命令，如下列示例所示：


    ```

    $ nodetool repair

    $ nodetool repair cycling

    $ nodetool repair cycling cycle

    ```


    您也可以使用`-local`（或`–in-local-dc`）选项仅为本地数据中心运行`nodetool repair`命令。您还可以使用`-dc`（或`–in-dc`）选项指定一个数据中心。


    当您在运行`nodetool repair`命令时指定`-full`选项时，Cassandra 会执行完整修复。由于完整修复可能耗时且占用资源，您可以要求它执行增量修复，即数据库仅修复之前未修复的数据。在
    Cassandra 3.x 中，默认是增量修复。以下是日志文件的摘录，展示了`repair`命令的工作方式：


    ```

    INFO  [Thread-8] 2017-07-16 09:22:23,564 RepairRunnable.java:136 - Starting repair
    command #1 (f30498c0-6a42-11e7-9731-6f6038c9cb1c), repairing keyspace system_traces
    with repair options (parallelism: parallel, primary range: false, incremental:
    true, job threads: 1, ColumnFamilies: [], dataCenters: [], hosts: [], # of ranges:
    512, pull repair: false)

    ...

    INFO  [Repair#1:1] 2017-07-16 09:22:27,833 RepairJob.java:172 - [repair #f35db540-6a42-11e7-9731-6f6038c9cb1c]
    Requesting merkle trees for sessions (to [/192.168.159.129, ubuntu/192.168.159.130])

    ...

    INFO  [CompactionExecutor:9] 2017-07-16 09:22:28,547 CompactionManager.java:694
    - [repair #f30498c0-6a42-11e7-9731-6f6038c9cb1c] Completed anticompaction successfully

    INFO  [CompactionExecutor:10] 2017-07-16 09:22:28,759 RepairRunnable.java:340
    - Repair command #1 finished in 5 seconds

    $

    ```


    ## 通过从其他节点获取数据来重建数据（nodetool rebuild）


    运行`nodetool rebuild`命令以重建令牌范围。该命令从单个源副本重建流，但同时操作多个节点。


    当您向集群添加数据中心时，`nodetool rebuild`命令非常有用。您可以一次重建单个键空间，也可以指定多个键空间，每个键空间用逗号分隔。示例如下：


    ```

    $ nodetool rebuild –keyspace cyclists, motorists

    ```


    请记住：


    *   默认情况下，此命令会选择集群中的任意数据中心。您可以通过`source-dc-name`选项指定数据库应从中选择其需要流式传输的数据源的数据中心。如果您不提供任何数据中心的名称，命令可能看似运行，但实际上不会执行任何操作。

    *   您可以指定参数`tokens`以提供单个令牌的列表或令牌范围（`start_token, end_token`）。


    ## 清理不必要的键空间和分区键（nodetool cleanup）


    当您向集群添加新节点时，一些节点可能会将其部分分区范围丢失给新节点。但是，Cassandra 此时不会从当前节点中删除不必要的键空间和分区键。


    同样，如果您减少数据中心的复制因子，一些节点最终将存储数据库不再用作副本的数据。


    在这两种情况下，当您添加节点或减少复制因子时，Cassandra 的合并进程最终将清除被丢弃和不必要的数据。您无需在每次此类集群更改后手动清理。但是，如果您希望更快地回收磁盘空间，可以运行`nodetool
    cleanup`命令。


    > 注意

    >

    > 如果节点在某些表中使用了计数器列，一旦您运行`nodetool cleanup`命令，数据库会为该节点分配新的计数器 ID。


    以下是展示如何运行`nodetool cleanup`命令的示例：


    ```

    $ nodetool cleanup

    ```


    由于您未指定键空间，此命令将清理所有不再属于此节点的键空间。您也可以选择指定一个键空间以及要清理的表列表。运行如下`nodetool cleanup`命令以清理特定键空间：


    ```

    $ nodetool cleanup cycling

    ```


    ## 重建索引


    您可以通过为表运行`nodetool rebuild_index`命令来重建二级索引。在该命令中，您必须指定键空间、表的名称，以及一个或多个用空格分隔的索引名称。


    `nodetool rebuild_index`命令为表的索引执行完全重建。此命令需要三个参数：键空间、`cf`（列族，是表的同义词）和索引名称。示例如下：


    ```

    $ nodetool rebuild_index cycling cycle test_idx;

    ```


    ## 刷新表的大小估算


    当您向表中插入大量数据或截断表的数据时，表的大小估算会变得陈旧。运行`nodetool refreshsizeestimates`命令以刷新表大小估算。该命令会刷新`system.size_estimates`表。


    ## 关键 Nodetool 维护命令


    在本章中，除其他内容外，我将向您展示如何在集群中添加、移动和删除节点。在执行与在集群中添加、移动和删除节点及数据中心相关的大部分任务时，您将运行一组关键的`nodetool`命令。例如，在停用节点后，您需要运行`nodetool`命令。我将在本节中解释与节点维护相关的常见`nodetool`命令。

    '
- fmt: '### Decommissioning Nodes (nodetool decommission)


    You run the `nodetool decommission` command to make a node send all its data to
    the next node in the ring. Decommissioning a node is the opposite of bootstrapping
    a node. Here’s an example showing how to decommission a node.


    1.  First, check the status of the nodes to make sure that all (two in this case)
    the nodes are up.


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                                 Rack

    UN  192.168.159.129  338.19 KiB  256          49.0%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UN  192.168.159.130  339.49 KiB  256          51.0%             a1085901-738c-4bbd-b050-007f62da893d  rack1

    $

    ```


    2.  Then run the `nodetool decommission` command on the node with the IP 192.168.159.129.


    ```

    $ nodetool decommission

    ```


    3.  Check the status of the cluster and notice that the decommissioned node now
    shows its status as UL (UP LEAVING), indicating that it’s transitioning out of
    the cluster.


    ```

    UN  192.168.159.129  338.19 KiB  256          49.0%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UL  192.168.159.130  339.49 KiB  256          51.0%             a1085901-738c-4bbd-b050-007f62da893d  rack1

    $

    ```


    The `system.log file` shows the following output after the running of the `nodetool
    decommission` command:


    ```

    CP Connection(4)-127.0.0.1] 2017-07-13 10:48:38,266 StorageService.java:1435 -
    LEAVING: sleeping 30000 ms for batch processing and pending range setup

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,776 StorageService.java:1435
    - LEAVING: replaying batch log and streaming data to other nodes

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,902 StreamResultFuture.java:90
    - [Stream #9254bbf0-67f3-11e7-9d74-6bc8e6fb7ba6] Executing streaming plan for
    Unbootstrap

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:08,904 StorageService.java:1435
    - LEAVING: streaming hints to other nodes

    INFO  [HintsDispatcher:2] 2017-07-13 10:49:08,963 HintsDispatchExecutor.java:152
    - Transferring all hints to 0dbb9e0e-867e-4179-b6b6-631d38dd68f9

    ...

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:09,413 StorageService.java:3938
    - Announcing that I have left the ring for 30000ms

    INFO  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:39,428 Server.java:176
    - Stop listening for CQL clients

    WARN  [RMI TCP Connection(4)-127.0.0.1] 2017-07-13 10:49:39,429 Gossiper.java:1514
    - No local state, state is in silent shutdown, or node hasn''t joined, not announcing
    shutdown

    ...

    $

    ```


    4.  Check the status of the cluster. Sure enough, the decommissioned node has
    left the cluster.


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                                 Rack

    UN  192.168.159.129  328.53 KiB  256          100.0%            0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    $

    ```


    5.  Next, if you try to add the decommissioned node back to the cluster by starting
    it back up, the attempt fails, as the following output from the `cassandra` command
    shows:


    ```

    $ cassandra ...

    , 9079045138376597795, 9105248878993821997, 9166471019946737685, 9167277031713212107,
    9167870256226113023]

    ...

    This node was decommissioned and will not rejoin the ring unless cassandra.override_decommission=true
    has been set, or all existing data is removed and the node is bootstrapped again

    Fatal configuration error; unable to start server.  See log for stacktrace.

    ERROR [main] 2017-07-13 10:58:29,816 CassandraDaemon.java:752 - Fatal configuration
    error

    ...

    $

    ```


    The node that you recommissioned is unable to join the ring when you restart the
    node. As you can see, Cassandra helpfully offers two ways to enable this node
    to rejoin the ring:

    *   Remove all data from the decommissioned node and bootstrap it again.

    *   Set the `cassandra.override_decommission=true` option.


    In the following sections, I show how to use both methods to rejoin the decommissioned
    node to a cluster.


    #### Remove All Data and Restart the Node


    The straightforward way to add a decommissioned node back to a cluster is to simply
    remove all the old data from the node, which is stored under the following directories
    under `/data`:

    *   `commitlog`

    *   `data`

    *   `saved_caches`


    When you decommission the node, Cassandra redistributes the tokens. Once you remove
    all the data from the decommissioned node, Cassandra allows the node to rejoin
    the node and allocates the node its share of the tokens again.


    Once you remove all the data, restart the decommissioned node.


    ```

    $ cassandra

    ...

    INFO  [main] 2017-07-13 11:13:47,122 ColumnFamilyStore.java:406 - Initializing
    system.hints

    INFO  [main] 2017-07-13 11:13:47,156 ColumnFamilyStore.java:406 - Initializing
    system.batchlog

    INFO  [GossipStage:1] 2017-07-13 11:13:50,736 Gossiper.java:1056 - Node /192.168.159.129
    is now part of the cluster

    INFO  [main] 2017-07-13 11:13:51,939 StorageService.java:1435 - JOINING: waiting
    for ring information

    INFO  [InternalResponseStage:1] 2017-07-13 11:13:52,829 ColumnFamilyStore.java:406
    - Initializing cycling.cycle

    INFO  [main] 2017-07-13 11:14:24,036 StorageService.java:1435 - JOINING: Starting
    to bootstrap...

    INFO  [main] 2017-07-13 11:14:25,128 StorageService.java:1435 - JOINING: Finish
    joining ring

    ...

    INFO  [main] 2017-07-13 11:14:25,193 SecondaryIndexManager.java:508 - Executing
    pre-join post-bootstrap tasks for: CFS(Keyspace=''cycling'', ColumnFamily="cycle")

    INFO  [main] 2017-07-13 11:14:33,359 CassandraDaemon.java:725 - No gossip backlog;
    proceeding

    ...

    ```


    The decommissioned node joins the ring now. Cassandra has already distributed
    the data in the cluster. You confirm that the node is back in the cluster by running
    the `nodetool status` command.


    ```

    $ nodetool status

    Datacenter: datacenter1

    =======================

    Status=Up/Down

    |/ State=Normal/Leaving/Joining/Moving

    --  Address          Load       Tokens       Owns (effective)  Host ID                               Rack

    UN  192.168.159.129  350.33 KiB  256          48.5%             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1

    UN  192.168.159.130  158.45 KiB  256          51.5%             9ee09b72-a6db-4de4-9aed-de32c5e7c344  rack1

    $

    ```


    #### Setting the cassandra.override_decommission=true Option


    Alternatively, you can just set the following option in the `cassandra-env.sh`
    file of the node you’ve decommissioned and restart the node. Once the node restarts,
    it’ll join the cluster.


    ```

    JVM_OPTS="$JVM_OPTS -D cassandra.override_decommission=true"

    ```'
