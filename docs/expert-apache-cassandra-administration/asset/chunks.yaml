    ## Using Thread Pools Statistics (nodetool tpstats)


    `nodetool tpstats` 命令显示线程池的使用统计信息。Cassandra 将任务分为不同的阶段，每个阶段使用单独的队列和线程池。消息服务连接各个阶段。


    `nodetool tpstats` 命令通过线程池提供有关操作每个阶段的信息。它显示以下内容：


    *   活动线程数

    *   等待线程池执行的请求数

    *   线程池已完成的任务数

    *   由于下一步的线程池已满而被阻塞的请求数

    *   截至当前时间，此线程池中被阻塞的请求总数


    当您刷新内存表或数据库压缩任何 SSTable 时，数据库会刷新 `nodetool tpstats` 命令提供的信息。


    以下示例展示了如何运行 `nodetool tpstats` 命令：


    ```

    $ nodetool tpstats

    Pool Name              Active   Pending      Completed   Blocked  All time blocked

    ReadStage                   0         0              0         0       0

    MiscStage                   0         0              0         0       0

    CompactionExecutor          0         0           5532         0       0

    MutationStage               0         0           1028         0       0

    MemtableReclaimMemory       0         0             29         0       0

    endingRangeCalculator       0         0              2         0       0

    GossipStage                 0         0          26038         0       0

    SecondaryIndexManagement    0         0              0         0       0

    HintsDispatcher             0         0              0         0       0

    RequestResponseStage        0         0           1031         0       0

    Native-Transport-Requests   0         0              0         0       0

    ReadRepairStage             0         0              0         0       0

    CounterMutationStage        0         0              0         0       0

    MigrationStage              0         0              0         0       0

    MemtablePostFlush           0         0             73         0       0

    PerDiskMemtableFlushWriter_ 0         0              0        29       0

    ValidationExecutor          0         0              2         0       0

    Sampler                     0         0              0         0       0

    MemtableFlushWriter         0         0             29         0       0

    InternalResponseStage       0         0              2         0       0

    ViewMutationStage           0         0              0         0       0

    AntiEntropyStage            0         0              8         0       0

    CacheCleanupExecutor        0         0              0         0       0

    Message type Dropped

    READ                        0

    RANGE_SLICE                 0

    _TRACE                       0

    HINT                         0

    MUTATION                     0

    COUNTER_MUTATION             0

    BATCH_STORE                  0

    BATCH_REMOVE                 0

    REQUEST_RESPONSE             0

    PAGED_RANGE                  0

    READ_REPAIR                  0

    $

    ```


    `nodetool tpstats` 命令的输出显示了与数据库任务相关的特定线程池的统计信息。所有这些详细信息在您排查问题或调整数据库时非常有用。您可以根据池中的活动确定解决性能问题的策略。池中的高数值指向数据库中问题的症状。


    以下是线程池、与这些池相关的任务以及您可以采取的改进措施的简要列表。


    *   `AntiEntropyStage`: 此池处理修复消息。您可以使用 `nodetool repair` 命令执行修复。

    *   `GossipStage`: 分发节点信息。由于某些模式彼此不同步，您可能会在此池中看到问题。使用 `nodetool resetlocalschema`
    命令同步模式。

    *   `HintedHandoff`: 将错过的更改（如更新和删除）发送到其他节点。有时由于各种原因，您会看到移交过程出现问题。您可以使用 `nodetool
    disablehandoff` 和 `nodetool repair` 命令来修复与移交相关的问题。

    *   `MutationStage`: 此阶段在本地节点上执行插入和更新，并重放提交日志。进行中的提示也是此阶段的一部分。如果您看到待处理写入请求数量很高，可能表明节点过载。您可以添加节点或重写代码以减少变更。

    *   `ReadRepairStage` : 此阶段显示执行读修复的等待。如果 `Pending` 数字很高，您可以为经常读取的表降低 `read_repair
    _chance` 值，例如设置为 0.11。表的 `read_repair_chance` 属性是成功的读操作将触发读修复的概率（默认值为 0.0）。


    您可以密切监视线程池统计信息，如果您看到 `Pending` 任务列的值持续增加，那么就该为集群增加额外容量了。


    `nodetool tpstats` 命令输出的底部是关于此节点丢弃消息的部分，意思是该节点收到的消息超出了其处理能力。如果您看到大量的被阻塞任务和/或丢弃的消息，则意味着数据库难以跟上当前的工作负载。'
  raw: '### The nodetool info Command


    Run the `nodetool info` command to get node information, such as disk load, uptime,
    and heap memory usage. The command also provides valuable information about how
    the database is utilizing all three of its caches: the key cache, the row cache,
    and the counter cache.


    The `nodetool info` command provides valuable information pertaining to the nodes,
    such as the following:


    *   Disk storage (load) information

    *   Times started (generation)

    *   Uptime

    *   Heap memory usage

    *   Key, row, counter, and chunk cache information

    *   Status of gossip (active or not)

    *   Percent repaired

    *   Token information (optionally)


    Here’s an example:


    ```

    $ nodetool info

