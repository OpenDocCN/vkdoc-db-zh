  trans: '

    ### 虚拟节点与数据所有权


    你可以使用单令牌架构或虚拟节点来确定 Cassandra 如何在集群中的节点间分配数据。


    数据库将集群中的数据表示为一个环，每个节点负责环数据的一个片段。Cassandra 为每个节点分配一个或多个由令牌描述的数据范围。令牌是一个 64 位整数
    ID，用于标识环中的分区。令牌的取值范围从-2 的 63 次方到 2 的 63 次方减 1。令牌决定了节点在环中的位置。


    环中的每个节点拥有的值范围大于前一个节点的令牌，且小于或等于其自身的令牌。这样，令牌范围就分布在位于不同机架的节点上。


    虚拟节点（简称 vnodes）可以帮助你以比计算令牌更细的粒度来分配数据。Vnodes 会自动计算并为集群中的每个节点分配令牌。这消除了你通过计算和分配令牌来确定分区范围的需要。


    在非 vnode 环境中，每个节点只有一个令牌，大多数情况下节点在环空间中只拥有一个连续的范围，并且通常每个节点一个范围。Vnodes 允许多个随机选择的、非连续的令牌或范围，从而为每个节点提供许多属于它的小令牌范围。


    每个虚拟节点拥有令牌空间的一部分。Cassandra 将虚拟节点随机分配到物理节点上；一个物理节点不拥有连续的虚拟节点范围。Cassandra 建议在集群中使用
    256 个虚拟节点，因此如果你有 16 个节点，每个物理节点将随机分配到 16 个虚拟节点，每个虚拟节点负责一个不同的令牌范围。


    由于你总是在 Cassandra 数据库中复制数据，这意味着数据库将每个虚拟节点存储在多个节点上。


    当添加或删除节点时，Vnodes 可以轻松地在集群中重新平衡数据。新节点会自动从其他节点接管等量的数据。同样，当一个节点离开集群时，其他节点会自行分配它的数据。一个失效节点可以快速重建，因为集群中的所有节点都会帮助将其数据分布到自身之上。


    Vnodes 有助于你采用异构硬件，因为它们允许你根据节点的物理容量来改变分配给每个节点的 vnodes 比例。


    你可以在整个集群中使用不同的令牌架构，不同的数据中心采用不同的架构。也就是说，一些数据中心可能使用 vnodes，而其他数据中心则不使用 vnodes。但是，单个数据中心中的所有节点必须要么启用
    vnodes，要么使用单令牌架构。


    ### 数据如何在集群中分布


    当你创建一个数据中心时，数据库会在节点间均匀分配工作负载。随着时间的推移，当你添加和/或删除节点时，数据中心的拓扑结构会发生变化，工作负载可能会变得不均衡。


    令牌将数据范围分配给 Cassandra 集群中的特定节点。节点的令牌（或多个令牌）决定了该节点的数据范围。每个节点负责从其自身到其前驱节点之间的环区域。


    假设令牌范围是 0 到 100，并且你集群中有四个节点。那么节点的令牌将是 0、25、50 和 75，确保每个节点负责相等的数据范围。


    在早期版本（Cassandra 1.2 之前），你必须为每个节点计算并分配一个单一的令牌。图 5-3 展示了这种架构。


    ![A436674_1_En_5_Fig3_HTML.jpg](img/A436674_1_En_5_Fig3_HTML.jpg)


    图 5-3


    单令牌架构


    如图 5-3 所示，六个节点中的每一个（`Node1`–`Node6`）都被分配了一个单一的令牌，分别是`A`、`B`、`C`、`D`、`E`和`F`。单个令牌代表环中的一个位置。每个节点将拥有通过将分区键映射到分配给该节点的数据范围内的令牌值来确定的数据。


    > 提示

    >

    > 没有什么能阻止你将复制因子设置得大于集群中的节点数。通常这样做并不是一个明智的主意，因为它实际上并不能提供更高的可靠性。然而，在某些情况下，你可以这样做，以预期将来会添加更多节点。


    假设复制因子大于 1，除了分配给它的范围之外，每个节点还将存储来自其他节点的行副本。例如，假设复制因子为 4，图 5-4 显示了每个节点如何存储来自分配给它的单一范围之外的数据。此外，每个节点在环空间中占据一个连续的分区范围。


    虚拟节点允许每个节点拥有多个分布在集群中的较小分区范围，而不是单一的令牌。与单一令牌类似，Vnodes 使用一致性哈希来在集群中分布数据，而无需生成和分配令牌。图
    5-4 显示了一个带有虚拟节点的环。


    ![A436674_1_En_5_Fig4_HTML.jpg](img/A436674_1_En_5_Fig4_HTML.jpg)


    图 5-4


    带有虚拟节点的环


    如图 5-4 所示，虚拟节点是非连续的，并随机分配给节点。Cassandra 通过分区键的哈希值来确定必须将表行分配到哪个分区范围。


    #### 一致性哈希


    Cassandra 使用一致性哈希根据分区键对数据进行分区。这使得集群在添加或删除节点时能够以最小的数据重组在节点间分配数据。


    假设你有一个四节点集群，表中有以下数据：


    | 姓名 | 年龄 | 汽车 | 性别 |

    | --- | --- | --- | --- |

    | Jim | 36 | Camaro | M |

    | Carol | 37 | BMW | F |

    | Johnny | 12 | Ferrari | M |

    | Suzy | 10 | Ford | F |


    四个节点中的每一个都负责一个基于哈希值的数据范围。假设你使用默认的 `Murmur3 分区策略`，Cassandra 为每个分区键分配以下哈希值：


    | 分区键 | Murmur3 哈希值 |

    | --- | --- |

    | Jim | -2245462676723223822 |

    | Carol | 7723358927203680754 |

    | Johnny | -6723372854036780875 |

    | Suzy | 1168604627387940318 |


    Cassandra 根据分区键的值确定应该在哪些节点上存储这四个值。如你所见，分区键被哈希到一个特定的范围，每个节点被分配了一个范围。在此示例中，Cassandra
    将四行数据存储在四个节点中，如下所示：


    | 节点 | 起始范围 | 结束范围 | 分区键 | 哈希值 |

    | --- | --- | --- | --- | --- |

    | A | -9223372036854775808 | -4611686018427387904 | Johnny | -6723372854036780875
    |

    | B | -4611686018427387903 | -1 | Jim | -245462676723223822 |

    | C | 0 | 4611686018427387903 | Suzy | 1168604627387940318 |

    | D | 4611686018427387904 | 9223372036854775807 | Carol | 7723358927203680754
    |


    > 注意

    >

    > 你必须为数据中心中的所有节点使用相同的令牌架构，无论是基于单令牌的还是基于 vnode 的架构。


    ### 如何分配令牌范围


    当你启用 vnodes 时，在数据中心中有两种分配令牌范围的方法：分配算法和随机选择算法。我将在本节解释这些算法。

    '
- fmt: '#### The Allocation Algorithm


    The allocation algorithm, which is supported only for the two partitioners `Murmur3Partitioner`
    and `RandomPartitioner`, strives to balance workload using few tokens. You can
    use a large number of tokens to spread the workload around, but it means you must
    also manage all those tokens.


    The allocation algorithm uses the `num_tokens` property setting to distribute
    the token ranges proportionally. For a given replication factor, this algorithm
    tries to choose tokens so it optimizes the replicated load across the cluster’s
    nodes. It assigns each node a load proportional to the number of nodes.


    Tip


    The recommended practice is to use 8 vnodes (tokens) to provide an ideal balance
    between efficient distribution of the workload and performance. The allocation
    algorithm optimally distributes token ranges among the nodes and racks by using
    the keyspace replication factor of the datacenter. If you’re using Cassandra version
    3.4 or lower, you need to use either 256 nodes or create and destroy the vnodes
    until you arrive at a satisfactory distribution of data.


    To set the allocation algorithm, configure the `allocate_tokens_for_local_replication_factor`
    property to the replication factor of the keyspaces in a datacenter.


    #### The Random Selection Algorithm


    The random selection algorithm will randomly distribute token ranges across a
    datacenter’s nodes. To use this algorithm, you must configure the `num_tokens`
    property.


    The database distributes the token ranges to a node based on the number of tokens
    it assigned to the nodes in a datacenter. For example, you can set the number
    of vnodes (tokens) to 128 for a transaction-heavy datacenter.


    #### Enabling Vnodes


    Unless the hardware is different on the nodes of a cluster, you should configure
    the same number of vnodes on each node. If the hardware capacities differ among
    the nodes, you can assign a different number of vnodes to nodes, such as 128 vnodes
    for smaller machines and 256 vnodes for machines that are much more powerful.
    While this is technically possible, it’s not a recommended practice because you’re
    likely to end up with unbalanced datasets.


    Cassandra uses vnodes by default. You set the number of the tokens on a node with
    the `num_tokens` parameter. The default value for this parameter is 256. If you
    decide not to use vnodes and configure traditional token ranges instead, you must
    disable vnodes by setting the `num_tokens` property to 1 or by commuting the property.
    You must then set the `initial_token` property in each node to specify the token
    ranges that’ll be owned by that node.


    When you configure vnodes with the `num_tokens` parameter, don’t set the `initial_token`
    parameter; this parameter is if you want to specify a single token, as explained
    earlier.


    Tip


    The `initial_token` parameter is only for legacy clusters. All new clusters should
    use the `num_tokens` parameter to configure vnodes. The `initial_token` parameter
    allows you to specify tokens manually.


    #### Disabling Vnodes


    If you decide not to use vnodes, you must ensure that each node is assigned approximately
    the same amount of data. You can do this by assigning an initial token value for
    each node and then calculating the tokens for each datacenter.


    To disable vnodes, configure the `cassandra.yaml` file as follows:


    ```

    1. Comment both the `num_tokens` and the `allocate_tokens_for_local_replication_factor`
    properties.

    2. Set the `initial_token` property to 1.

    ```


    ### Choosing a Replication Strategy


    Replication is how Cassandra stores copies of data on multiple nodes for high
    availability and fault tolerance. The replication factor determines how many replicas
    Cassandra will store for each row in table. A replication factor of 1 means Cassandra
    will keep a single copy of each row, and a replication factor of 2 means that
    the database will store two copies of each row, with the two copies stored on
    two different nodes.


    Cassandra stores replicas on multiple nodes for reliable and fault tolerant operations.
    The term replication strategy refers to how Casandra determines precisely on how
    many nodes it ought to store the replicas. If your cluster has several nodes,
    you can set a replication factor higher than 1 to ensure that the table data is
    available even if one or more nodes in the cluster are unavailable.


    The database will store the first replica of data on the node that owns the range
    in which the token falls. It uses the replication strategy you configure to determine
    on which nodes it should place the rest of the replicas.


    Obviously, specifying a replication factor of 1 means that if the node with a
    replica crashes, you can’t access that row. Also, the higher the replication factor,
    the more storage you need to store the rows.


    A replication group determines how many replicas you store in a single datacenter.
    You don’t need to store the same number of replicas in all datacenters in a cluster.
    For example, you can store three replicas in a datacenter to service real-time
    applications and a single replica in a different datacenter to serve analytical
    queries.


    There are two basic replication strategies:


    *   `SimpleStrategy`

    *   `NetworkTopologyStrategy`


    The following sections explain the two basic replication strategies.


    #### SimpleStrategy


    Under `SimpleStrategy`, Cassandra stores the first replica on a node that the
    partitioner determines and places the rest of the replicas on the remaining nodes
    clockwise in the ring. This strategy ignores the cluster topology, which refers
    to the location of the racks and datacenters.


    Tip


    For most deployments, `NetworkTopologyStrategy` is highly recommended because
    it makes it easier to expand to multiple datacenters in the future.


    The `SimpleStrategy` replication strategy is good only if you have a single datacenter
    and rack. You must use the `NetworkTopologyStrategy` if you’re planning to use
    more than one datacenter.


    #### NetworkTopologyStrategy


    Under `NetworkTopologyStrategy`, you specify how many replicas you want to have
    in each datacenter. So obviously, this strategy is designed for multiple datacenter
    clusters.


    `NetworkTopologyStrategy` tries to place replicas on multiple racks since all
    nodes in a rack tend to fail at the same time. When using this strategy, your
    main concern should be the tradeoff between local reads to reduce latency and
    the possibility of potential failures.


    Most common configurations when dealing with multiple datacenters are the following:


    *   Two Replicas per Datacenter: This strategy will let you survive the failure
    of a single node in each replication group while enabling local reads (consistency
    level of `ONE`).

    *   Three Replicas per Datacenter: This strategy will let you survive the failure
    of multiple nodes in each datacenter with a consistency level of `ONE`. It also
    helps you tolerate the failure of a single node per replication group while using
    the `LOCAL_QUORUM` consistency level.'
