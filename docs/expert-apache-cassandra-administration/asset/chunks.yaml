    \ file.\n    *   In the appropriate properties file (depends on the type of snitch),\
    \ specify the new datacenter definition. \n7.  Start Cassandra on each of the\
    \ racks, and keep going until you bring up all the nodes.  \n8.  Once all nodes\
    \ are up, alter the keyspaces as follows:\n\n```\n    ALTER KEYSPACE \"my_ks\"\
    \ WITH REPLICATION =\n    {'class': 'NetworkTopologyStrategy', 'ExistingDC':3,\
    \ 'NewDC':3};\n    ```\n\n9.  Finally, run the `nodetool rebuild` command on each\
    \ node in the new datacenter you just added. You can specify several optional\
    \ parameters when rebuilding nodes, such as `keyspace_name, token_spec,` and `source_dc_name.`\
    \ The `nodetool rebuild` command rebuilds one or a set of keyspaces at a time\
    \ by streaming data from other nodes. You must specify the name of the keyspace\
    \ to rebuild via the `keyspace_name` property, as well as `token_spec`, a property\
    \ that enables you to specify a single token, a list of single tokens, or a range\
    \ of tokens (`start_token, end_token`). You can specify the `source-dc-name` with\
    \ the `nodetool rebuild` command. This attribute refers to the name of the datacenter\
    \ that Cassandra uses as the source for streaming. Cassandra can build from any\
    \ datacenter, and if you omit the name of the source datacenter, it randomly chooses\
    \ a datacenter. If the rebuild fails for any reason, you can restart it, at which\
    \ time the process resumes from where it had stopped. You can also do a selective\
    \ rebuild by specifying the `-ts` or `–token` options to specify either a list\
    \ of tokens or a token range (or ranges). The simplest invocation of the `nodetool\
    \ rebuild` command is\n\n```\n    $ nodetool rebuild\n    ```\n\n### Decommissioning\
    \ a Datacenter\n\nDecommissioning a datacenter is the same as removing a datacenter.\
    \ You can decommission a datacenter without losing any data by following these\
    \ steps.\n\n1.  Before you start decommissioning the datacenter, ensure that clients\
    \ aren’t writing to any nodes in the datacenter. You can confirm that there are\
    \ no pending write requests in any node by running the following command:\n\n\
    \    ```\n    $ nodetool tpstats\n    ```\n\n2.  Propagate the data from the datacenter\
    \ you’re planning to decommission by running a full repair with the following\
    \ command:\n\n    ```\n    $ nodetool repair -full\n    ```\n\n3.  Alter all keyspaces\
    \ in the database to make sure that none of them references the datacenter you’re\
    \ decommissioning. Let’s say you’ve three datacenters: DC1, DC2, and DC3\\. You’re\
    \ removing datacenter DC3 from your cluster. You must therefore remove datacenter\
    \ DC3 from all keyspace configurations. If you’ve set a replication factor for\
    \ DC3 for any keyspace, run the `ALTER KEYSPACE` command, as shown here, to remove\
    \ the datacenter DC3 from that keyspace’s configuration:\n\n    ```\n    cqlsh>\
    \ alter keyspace cycling WITH replication = {'class':\n    'NetworkTopologyStrategy',\
    \ 'DC1':1,'DC2':2};\n    ```\n\n4.  Run the `nodetool` `decommission` command\
    \ on all nodes of the datacenter you’re decommissioning.\n\n    ```\n    $ nodetool\
    \ decommission\n    ```\n\n5.  Once the decommissioning is completed, shut the\
    \ node down. You can confirm that all nodes in the datacenter were removed by\
    \ running the `nodetool status` command.\n\n## Handling Data Corruption\n\nCassandra\
    \ offers tools to check for corrupted data and to fix the data corruption by rebuilding\
    \ the table with the corrupted data.\n\nThe following sections show you how to\
    \ detect data corruption and to rebuild corrupted tables."
  trans: "## 将内存表数据刷新到磁盘\n\n您也可以通过运行 `nodetool flush` 命令，将内存表刷新到磁盘上的 SSTable 中。您可以刷新整个节点、一个键空间或特定的表。在对数据库或一个或多个键空间进行快照之前，先将内存表刷新到磁盘是一个很好的策略。\n\
    \n以下是 `nodetool flush` 命令的语法：\n\n```\n$ nodetool  flush --   (  ... )\n```\n\n\
    您可以使用以下命令将所有内存表刷新到磁盘：\n\n```\n$ nodetool flush\n```\n\n您也可以只刷新一个或多个键空间或表。以下是如何刷新属于\
    \ `cycling` 键空间的内存表：\n\n```\n$ nodetool flush cycling\n```\n\n与 `nodetool drain`\
    \ 命令不同，`nodetool flush` 命令仅将内存表刷新到磁盘，不做其他任何事情。因此，如果您只需要将数据刷新到 SSTable，使用此命令而不是\
    \ `nodetool drain` 命令是更好的选择。\n\n那么，您应该刷新还是排空？正如我所解释的，`drain` 命令会停止 Cassandra 响应客户端请求和其他节点的请求。当您想在维护期间关闭节点并希望节点更快启动时，您会排空内存表。由于您在节点重启前刷新了内存表，因此节点在重启后无需重放提交日志。\n\
    \n## 维护数据中心\n\n常见的与数据中心相关的维护任务包括：向集群添加数据中心、在不中断服务的情况下迁移和重命名集群，以及退役数据中心。\n\n###\
    \ 向集群添加数据中心\n\n有时您可能需要将一个数据中心添加到现有集群中。本节将向您展示执行此操作的步骤。完成该过程后，新旧数据中心将相互复制数据。\n\n\
    最后，您需要运行 `nodetool rebuild` 命令，该命令在多个节点上操作，并从单个源副本流式传输数据以重建令牌范围。此命令有助于将新数据中心添加到现有集群。\n\
    \n以下是向集群添加数据中心的步骤：\n\n1.  确保所有当前数据中心都使用 `NetworkTopologyStrategy` 作为其复制策略。如果未使用，请运行\
    \ `ALTER KEYSPACE` 命令进行修正。提示：向集群添加数据中心时，请不要忘记更新所有键空间的键空间复制策略，以包含新数据中心。\n2.  在新数据中心的所有节点上安装\
    \ Cassandra 软件，但暂时不要启动 Cassandra 服务。\n3.  接下来，您必须在属于您正在添加的新数据中心的所有节点上配置 `cassandra.yaml`\
    \ 文件中的某些属性。确保重要的配置属性（如 `-seeds` 和 `endpoint_snitch`）在新旧节点上相同。此外，您还必须为新节点配置 `vnode`\
    \ 令牌的分配。配置设置取决于 `vnode` 选择算法。\n    *   随机选择算法：设置 `num_tokens` 属性（推荐值为 256）。\n\
    \    *   分配算法：在所有节点上设置 `num_tokens` 属性（推荐值为 8）以及 `allocate_tokens_for_local_replication_factor`\
    \ 属性。后一个属性的推荐值是以下之一：\n        *   此数据中心中键空间的最高复制因子\n        *   操作最繁忙的键空间的复制因子\n\
    4.  在属于新数据中心的每个节点上进行以下更改。\n5.  在相应的属性文件中指定探测器类型。您不能使用 `SimpleSnitch`，因为它仅适用于单个数据中心，无法识别数据中心（或机架）信息。根据您选择的探测器，您必须在相应的属性文件中进行更改：\n\
    \    *   `PropertyFileSnitch`：`cassandra-topology.properties` 文件\n    *   `GossipingPropertyFileSnitch`：`cassandra-rackdc.properties`\
    \ 文件\n6.  在旧数据中心中，进行以下配置更改：\n    *   在部分现有节点上，添加来自新数据中心的种子节点。由于您修改了 `cassandra.yaml`\
    \ 文件，因此必须重启您进行此更改的节点。\n    *   在相应的属性文件中（取决于探测器类型），指定新数据中心定义。\n7.  在每个机架上启动 Cassandra，并继续操作直到启动所有节点。\n\
    8.  所有节点启动后，按如下方式更改键空间：\n\n    ```\n    ALTER KEYSPACE \"my_ks\" WITH REPLICATION\
    \ =\n    {'class': 'NetworkTopologyStrategy', 'ExistingDC':3, 'NewDC':3};\n  \
    \  ```\n\n9.  最后，在您刚刚添加的新数据中心中的每个节点上运行 `nodetool rebuild` 命令。重建节点时，您可以指定几个可选参数，例如\
    \ `keyspace_name`、`token_spec` 和 `source_dc_name`。`nodetool rebuild` 命令通过从其他节点流式传输数据，一次重建一个或一组键空间。您必须通过\
    \ `keyspace_name` 属性指定要重建的键空间的名称，以及 `token_spec` 属性，该属性使您能够指定单个令牌、单个令牌列表或令牌范围（`start_token`，`end_token`）。您可以使用\
    \ `nodetool rebuild` 命令指定 `source-dc-name`。此属性指 Cassandra 用作流式传输源的数据中心名称。Cassandra\
    \ 可以从任何数据中心构建，如果您省略源数据中心的名称，它会随机选择一个数据中心。如果重建因任何原因失败，您可以重新启动它，此时该过程将从停止的地方继续。您还可以通过指定\
    \ `-ts` 或 `–token` 选项来指定令牌列表或令牌范围（或多个范围）进行选择性重建。`nodetool rebuild` 命令最简单的调用方式是：\n\
    \n    ```\n    $ nodetool rebuild\n    ```\n\n### 退役数据中心\n\n退役数据中心等同于移除数据中心。您可以通过以下步骤退役一个数据中心而不会丢失任何数据。\n\
    \n1.  在开始退役数据中心之前，请确保客户端没有向该数据中心的任何节点写入数据。您可以通过运行以下命令确认任何节点中都没有待处理的写入请求：\n\n \
    \   ```\n    $ nodetool tpstats\n    ```\n\n2.  通过运行完全修复来传播您计划退役的数据中心中的数据：\n\n\
    \    ```\n    $ nodetool repair -full\n    ```\n\n3.  更改数据库中的所有键空间，确保没有任何键空间引用您正在退役的数据中心。假设您有三个数据中心：`DC1`、`DC2`\
    \ 和 `DC3`。您要从集群中移除数据中心 `DC3`。因此，您必须从所有键空间配置中移除数据中心 `DC3`。如果您为任何键空间设置了 `DC3` 的复制因子，请运行\
    \ `ALTER KEYSPACE` 命令，如下所示，以从该键空间的配置中移除数据中心 `DC3`：\n\n    ```\n    cqlsh> alter\
    \ keyspace cycling WITH replication = {'class':\n    'NetworkTopologyStrategy',\
    \ 'DC1':1,'DC2':2};\n    ```\n\n4.  在您要退役的数据中心的所有节点上运行 `nodetool decommission`\
    \ 命令。\n\n    ```\n    $ nodetool decommission\n    ```\n\n5.  退役完成后，关闭节点。您可以通过运行\
    \ `nodetool status` 命令来确认数据中心中的所有节点都已被移除。\n\n## 处理数据损坏\n\nCassandra 提供了工具来检查损坏的数据，并通过使用损坏的数据重建表来修复数据损坏。\n\
    \n以下部分将向您展示如何检测数据损坏以及如何重建损坏的表。"
- fmt: "### Checking for Data Corruption\n\n运行 `sstableverify` 命令来检查特定 SSTable 的错误或损坏数据。以下是一个示例，其中\
    \ `cycling` 是键空间的名称，`cycle` 是你想要检查的表名：\n\n```\n$ sstableverify --verbose cycling\
    \ cycle\nVerifying BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-2-big-Data.db')\
    \ (0.029KiB)\n...\nChecking computed hash of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-3-big-Data.db')\n\
    $\n```\n\n### Fixing Corrupted Data\n\n你可以通过重建 SSTable 来修复损坏的数据。重建 SSTable 将移除损坏的数据，同时保留完好的数据。有两种工具可以帮助你重建表：`nodetool\
    \ scrub` 命令和 `sstablescrub` 工具。这两个工具非常相似。你的首选是 `nodetool scrub` 命令。\n\n#### Removing\
    \ Corrupted Data by Rebuilding the Table\n\n你可以借助 `nodetool scrub` 命令移除损坏的数据。此命令为一个或多个表重建\
    \ SSTable。\n\n`nodetool scrub` 命令的语法如下：\n\n```\n$ nodetool  scrub \n--  -ns |\
    \ --no-snapshot\n-s | --skip-corrupted    ...\n```\n\n以下是一个示例，展示了如何清理 `cycling`\
    \ 表空间中的表：\n\n```\nINFO  [CompactionExecutor:50] 2017-07-16 11:47:14,560 OutputHandler.java:42\
    \ - Scrubbing BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ (0.206KiB)\nINFO  [CompactionExecutor:50] 2017-07-16 11:47:14,604 OutputHandler.java:42\
    \ - Scrub of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ complete; looks like all 0 rows were tombstoned\n...\n```\n\n`nodetool scrub`\
    \ 命令会重建 SSTable，并在此过程中丢弃可能已损坏的数据。为了保障数据安全，该命令在重建表之前还会对 SSTable 的数据文件创建快照。\n\n\
    以下是 `nodetool scrub` 命令的主要选项：\n\n*   `--no-snapshot`：此选项将禁用 Cassandra 为要重建的 SSTable\
    \ 创建默认快照。指定此选项可以节省存储空间，并且意味着你无需稍后手动移除这些快照。\n*   `--skip-corrupted`：此选项允许重建操作跳过那些无法根据列的数据类型验证其值的损坏分区。\n\
    \n#### Offline Rebuilding of a Table\n\n`sstablescrub` 工具帮助你在节点离线时重建表。其工作方式与 `nodetool\
    \ scrub` 命令相同。如果 `nodetool scrub` 命令因数据损坏而无法重建表，那么你的下一个选择应该是运行 `sstablescrub`\
    \ 工具。\n\n由于 `sstablescrub` 是一个离线工具，你必须首先关闭节点。之后，运行以下命令来清理表：\n\n```\n$ sstablescrub\
    \ cycling cycle\n```\n\n### Managing Handoff and Hints\n\n你可以使用 `nodetool` 工具来管理\
    \ Handoff 过程和 Hints 机制的多个方面。通过运行 `nodetool` 命令，你可以启用和禁用 Handoff、暂停和恢复 Handoff，以及为特定数据中心禁用和启用\
    \ Hints。以下是与 Handoff 和 Hints 相关的 `nodetool` 命令列表：\n\n*   `nodetool disablehandoff`：禁用在节点上存储\
    \ Hints\n*   `nodetool enablehandoff`：启用在节点上存储 Hints\n*   `nodetool pausehandoff`：暂停\
    \ Hints 的分发\n*   `nodetool resumehandoff`：恢复 Hints 的分发\n\n`nodetool enablehintsfordc`\
    \ 命令使你能够为特定数据中心开启 Hints。当你通过 `cassandra.yaml` 文件中的 `hinted_handoff_disabled_datacenters`\
    \ 属性将某个数据中心列入黑名单时，或者当你使用 `nodetool disablehintsfordc` 命令为某个数据中心禁用了 Hints 时，可以使用此命令。\n\
    \n以下是如何为一个数据中心切换 Hints 的开启与关闭状态：\n\n```\n$ nodetool enablehintsfordc DC2\n$ nodetool\
    \ disablehintsfordc DC2\n```\n\n如果某个数据中心宕机，或者你正在将其故障切换出去，你应该为其禁用 Hints。数据库将继续向其他数据中心发送\
    \ Hints。\n\n### Purging the Gossip State on a Node\n\nCassandra 在每个节点上存储 Gossip\
    \ 信息，以便节点在重启时使用。如果节点需要从集群中的其他地方检索 Gossip 数据，节点启动速度将会变慢。有时，当节点没有正确的 Gossip 状态时，你可能需要手动修复\
    \ Gossip 相关问题。\n\n请按照以下步骤修复不正确的 Gossip 状态问题。\n\n1.  关闭遇到 Gossip 问题的节点。\n    ```\n\
    \    $ nodetool assassinate\n    ```\n2.  停止客户端应用向 Cassandra 集群写入数据。\n3.  将所有节点离线，首先排空（drain）每个节点。\n\
    \    ```\n    $ nodetool drain\n    $ sudo service cassandra stop\n    ```\n4.\
    \  删除 `peers-UUID` 目录中的所有目录。\n    ```\n    $ sudo rm -r /var/lib/cassandra/data/system/peers-UUID/8\n\
    \    ```\n5.  从 `peers` 目录中移除数据后，在每个节点上运行以下 SQL 语句，以确保节点可以互相发现：\n    ```\n   \
    \ cqlsh> select * from system.peers;\n    ```\n6.  在每个节点上设置 `cassandra.load_ring_state=false`\
    \ 属性，以便在下一步重启节点时清除 Gossip 状态。你可以从命令行设置此属性，也可以通过将该属性添加到 `cassandra-env.sh` 文件中来实现（如本章“Decommissioning\
    \ Nodes”小节中针对另一个参数的说明）。\n7.  重启集群中的所有节点。确保撤销你在第 6 步中可能对 `cassandra-env.sh` 文件所做的任何更改。\n\
    \n## Summary\n\n在本章中，我解释了几项重要的集群管理任务。`nodetool` 工具在移除节点、替换死亡节点、移动节点、销毁节点以及从环中移除节点时提供了巨大帮助。你还学习了如何退出和添加数据中心。\n\
    \n在测试集群中练习这些任务是在进行集群管理任务时建立信心的最佳方式。在执行某些变更时，你很可能会遇到小问题，而练习诸如退出节点和数据中心等任务会教会你如何快速修复这些问题，从而在生产环境中的变更过程中节省时间。\n\
    \n# 10. Monitoring, Logging, and Metrics\n\n监控 Cassandra 在很多方面类似于管理传统关系型数据库。其复杂性在于\
    \ Cassandra 是一个分布式数据库，因此你还需要关注数据的分布以及集群中节点之间工作负载的平衡。\n\n`nodetool` 工具提供了许多命令来帮助你监控集群，你在前面的章节中已经学习了其中的许多命令。\n\
    \nJConsole 是一个强大的监控工具，你既可以从命令行使用，也可以作为 GUI 工具使用。\n\nCassandra 提供了大量指标，帮助你评估和监控集群的性能和健康状况。这些指标包括表和键空间指标，以及缓存和客户端请求指标等。本章回顾了重要的\
    \ Cassandra 指标。\n\n在本章的最后一节，我将展示如何设置和配置 Nagios，这是一个流行的监控 Cassandra 集群的工具。"
  raw: "### Checking for Data Corruption\n\nRun the `sstableverify` command to check\
    \ a specific SSTable for errors or corrupted data. The following is an example\
    \ where cycling is the name of the keyspace and `cycle` is the name of the table\
    \ you want to check out:\n\n```\n$ sstableverify --verbose cycling cycle\nVerifying\
    \ BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-2-big-Data.db')\
    \ (0.029KiB)\n...\nChecking computed hash of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-3-big-Data.db')\n\
    $\n```\n\n### Fixing Corrupted Data\n\nYou can fix corrupted data by rebuilding\
    \ the SSTables. Rebuilding the SSTable will remove the corrupted data, leaving\
    \ the useful data intact. There are two tools that help you rebuild tables: the\
    \ `nodetool scrub` command and the sstablescrub utility. These two tools are quite\
    \ similar. Your first option is the `nodetool scrub` command.\n\n#### Removing\
    \ Corrupt Data by Rebuilding the Table\n\nYou can remove corrupted data with the\
    \ help of the `nodetool scrub` command. This command rebuilds the SSTables for\
    \ one or more tables.\n\nThe following is the syntax for the `nodetool scrub`\
    \ command:\n\n```\n$ nodetool  scrub \n--  -ns | --no-snapshot\n-s | --skip-corrupted\
    \    ...\n```\n\nHere’s an example where you scrub the tables in the `cycling`\
    \ tablespace:\n\n```\nINFO  [CompactionExecutor:50] 2017-07-16 11:47:14,560 OutputHandler.java:42\
    \ - Scrubbing BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ (0.206KiB)\nINFO  [CompactionExecutor:50] 2017-07-16 11:47:14,604 OutputHandler.java:42\
    \ - Scrub of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ complete; looks like all 0 rows were tombstoned\n...\n```\n\nThe `nodetool scrub`\
    \ command rebuilds SSTables and when it does so, it discards data that may be\
    \ corrupt. To safeguard the data, the command also snapshots the data files of\
    \ the SSTable before rebuilding the table.\n\nThe following are the key options\
    \ for the `nodetool scrub` command:\n\n*   `--no-snapshot`: This option will disable\
    \ the default snapshot creation for the SSTables that Cassandra will rebuild.\
    \ Specifying this option saves storage space and means you don’t have to remove\
    \ the snapshots later.\n*   `--skip-corrupted`: This option will let the rebuild\
    \ operation skip corrupted partitions where the operation can’t validate a column’s\
    \ values against that column’s data type.\n\n#### Offline Rebuilding of a Table\n\
    \nThe sstablescrub utility helps you rebuild a table when the node is offline.\
    \ It works the same as the `nodetool scrub` command. If the `nodetool scrub` command\
    \ fails to rebuild the table with the corrupted data, then your next option should\
    \ be to run the sstablescrub utility.\n\nSince sstablescrub is an offline utility,\
    \ you must first shut down the node. Following this, run the following command\
    \ to scrub the table:\n\n```\n$ sstablescrub cycling cycle\n```\n\n## Managing\
    \ Handoff and Hints\n\nYou can use the nodetool utility to manage several aspects\
    \ of the handoff process and the hints mechanism. By running the `nodetool` commands,\
    \ you can enable and disable handoff, pause and resume handoff, and disable and\
    \ enable hints for a specific datacenter. Here’s a listing of the handoff- and\
    \ hints-related `nodetool` commands :\n\n*   `nodetool disablehandoff`: Disables\
    \ the storing of hints on a node\n*   `nodetool enablehandoff`: Enables the storing\
    \ of hints on a node\n*   `nodetool pausehandoff`: Pauses the dispatch of hints\n\
    *   `nodetool resumehandoff`: Resumes the dispatch of hints\n\nThe `nodetool enablehintsfordc`\
    \ command enables you to turn on hints for a datacenter. You do this when you’ve\
    \ blacklisted a datacenter with the `hnted_handoff_disabled_datacenters` property\
    \ in the `cassandra.yaml` file, or when you’ve disabled hints for a datacenter\
    \ with the `disablehintsfordc` command for a datacenter.\n\nHere’s how you toggle\
    \ hints on and off for a datacenter:\n\n```\n$ nodetool enablehintsfordc DC2\n\
    $ nodetool disablehintsfordc DC2\n```\n\nYou disable hints for a datacenter if\
    \ a datacenter is down, or when you’re failing a datacenter over. The database\
    \ will continue to send the hints to the other datacenters.\n\n### Purging the\
    \ Gossip State on a Node\n\nCassandra stores the gossip information on each node\
    \ so the nodes can use it when restarting. If the nodes need to retrieve the gossip\
    \ data from elsewhere in the cluster, node startups will be slower. Occasionally,\
    \ you may need to manually fix problems with gossip when a node doesn’t have the\
    \ correct state of gossip.\n\nFollow these steps to fix problems regarding an\
    \ incorrect gossip state.\n\n1.  Shut down the node experiencing the gossip problems.\n\
    \n    ```\n    $ nodetool assassinate\n    ```\n\n2.  Stop the client applications\
    \ from writing to the Cassandra cluster.  \n3.  Take all nodes offline, first\
    \ draining each of the nodes.\n\n    ```\n    $ nodetool drain\n    $ sudo service\
    \ cassandra stop\n    ```\n\n4.  Remove all directories in the `peers-UUID` directory.\n\
    \n    ```\n    $ sudo rm -r /var/lib/cassandra/data/system/peers-UUID/8\n    ```\n\
    \n5.  After removing the data from the `peers` directory, run the following SQL\
    \ statement on each of the nodes to ensure that the nodes can see each other:\n\
    \n    ```\n    cqlsh> select * from system.peers;\n    ```\n\n6.  Set the `cassandra.load_ring_state=false`\
    \ property on each node to clear the gossip state when you restart the nodes in\
    \ the next step. You can set this property from the command line, or by adding\
    \ the property in the `cassandra-env.sh` file, as explained (for a different parameter)\
    \ in the “Decommissioning Nodes” section in this chapter.  \n7.  Restart all nodes\
    \ in the cluster. Make sure you undo any changes to the `cassandra-env.sh` file\
    \ that you might have made in Step 6.\n\n## Summary\n\nI explained several important\
    \ cluster administration tasks in this chapter. The nodetool utility helps enormously\
    \ when removing nodes, replacing dead nodes, moving nodes, assassinating nodes,\
    \ and removing nodes from a ring. You also learned how to decommission and add\
    \ datacenters.\n\nThe best way to gain confidence in performing the cluster management\
    \ tasks is to practice those tasks in a test cluster. You’re likely to run into\
    \ minor issues when performing some of the changes, and practicing tasks such\
    \ as decommissioning nodes and datacenters teaches you how to fix those issues\
    \ quickly, thus saving time during changes in a production setting.\n\n# 10. Monitoring,\
    \ Logging, and Metrics\n\nMonitoring Cassandra is in many ways similar to how\
    \ you manage a traditional relational database. The complexity lies in the fact\
    \ that Cassandra is a distributed database, so you’ll be concerning yourself also\
    \ with the distribution of data and the balancing of the workload among the nodes\
    \ of a cluster.\n\nThe nodetool utility offers many commands that help you monitor\
    \ your cluster, and you learned many of these commands in the earlier chapters.\n\
    \nJConsole is a powerful monitoring tool that you can use both from the command\
    \ line and as a GUI tool.\n\nCassandra offers numerous metrics that help you evaluate\
    \ and monitor a cluster’s performance and health. These metrics include table\
    \ and keyspace metrics, as well as cache and client request metrics, for example.\
    \ This chapter reviews important Cassandra metrics.\n\nIn the final section of\
    \ this chapter, I show how to set up and configure Nagios, which is a popular\
    \ tool that helps monitor Cassandra clusters."
  trans: "\n### 检查数据损坏\n\n运行 `sstableverify` 命令来检查特定 SSTable 的错误或损坏数据。以下是一个示例，其中 `cycling`\
    \ 是键空间的名称，`cycle` 是你想要检查的表名：\n\n```\n$ sstableverify --verbose cycling cycle\n\
    Verifying BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-2-big-Data.db')\
    \ (0.029KiB)\n...\nChecking computed hash of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cycle-2276fb7064e911e7b186d794a4e00229/mc-3-big-Data.db')\n\
    $\n```\n\n### 修复损坏的数据\n\n你可以通过重建 SSTable 来修复损坏的数据。重建 SSTable 将移除损坏的数据，同时保留完好的数据。有两种工具可以帮助你重建表：`nodetool\
    \ scrub` 命令和 `sstablescrub` 工具。这两个工具非常相似。你的首选是 `nodetool scrub` 命令。\n\n#### 通过重建表来移除损坏的数据\n\
    \n你可以借助 `nodetool scrub` 命令移除损坏的数据。此命令为一个或多个表重建 SSTable。\n\n`nodetool scrub` 命令的语法如下：\n\
    \n```\n$ nodetool  scrub \n--  -ns | --no-snapshot\n-s | --skip-corrupted    ...\n\
    ```\n\n以下是一个示例，展示了如何清理 `cycling` 键空间中的表：\n\n```\nINFO  [CompactionExecutor:50]\
    \ 2017-07-16 11:47:14,560 OutputHandler.java:42 - Scrubbing BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ (0.206KiB)\nINFO  [CompactionExecutor:50] 2017-07-16 11:47:14,604 OutputHandler.java:42\
    \ - Scrub of BigTableReader(path='/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-4d1743b060ef11e7805be14006afbdda/mc-1-big-Data.db')\
    \ complete; looks like all 0 rows were tombstoned\n...\n```\n\n`nodetool scrub`\
    \ 命令会重建 SSTable，并在此过程中丢弃可能已损坏的数据。为了保障数据安全，该命令在重建表之前还会对 SSTable 的数据文件创建快照。\n\n\
    以下是 `nodetool scrub` 命令的主要选项：\n\n*   `--no-snapshot`：此选项将禁用 Cassandra 为要重建的 SSTable\
    \ 创建默认快照。指定此选项可以节省存储空间，并且意味着你无需稍后手动移除这些快照。\n*   `--skip-corrupted`：此选项允许重建操作跳过那些无法根据列的数据类型验证其值的损坏分区。\n\
    \n#### 离线重建表\n\n`sstablescrub` 工具帮助你在节点离线时重建表。其工作方式与 `nodetool scrub` 命令相同。如果\
    \ `nodetool scrub` 命令因数据损坏而无法重建表，那么你的下一个选择应该是运行 `sstablescrub` 工具。\n\n由于 `sstablescrub`\
    \ 是一个离线工具，你必须首先关闭节点。之后，运行以下命令来清理表：\n\n```\n$ sstablescrub cycling cycle\n```\n\
    \n### 管理移交与提示\n\n你可以使用 `nodetool` 工具来管理移交过程和提示机制的多个方面。通过运行 `nodetool` 命令，你可以启用和禁用移交、暂停和恢复移交，以及为特定数据中心禁用和启用提示。以下是与移交和提示相关的\
    \ `nodetool` 命令列表：\n\n*   `nodetool disablehandoff`：禁用在节点上存储提示\n*   `nodetool\
    \ enablehandoff`：启用在节点上存储提示\n*   `nodetool pausehandoff`：暂停提示的分发\n*   `nodetool\
    \ resumehandoff`：恢复提示的分发\n\n`nodetool enablehintsfordc` 命令使你能够为特定数据中心开启提示。当你通过\
    \ `cassandra.yaml` 文件中的 `hinted_handoff_disabled_datacenters` 属性将某个数据中心列入黑名单时，或者当你使用\
    \ `nodetool disablehintsfordc` 命令为某个数据中心禁用了提示时，可以使用此命令。\n\n以下是如何为一个数据中心切换提示的开启与关闭状态：\n\
    \n```\n$ nodetool enablehintsfordc DC2\n$ nodetool disablehintsfordc DC2\n```\n\
    \n如果某个数据中心宕机，或者你正在将其故障切换出去，你应该为其禁用提示。数据库将继续向其他数据中心发送提示。\n\n### 清除节点上的 Gossip 状态\n\
    \nCassandra 在每个节点上存储 Gossip 信息，以便节点在重启时使用。如果节点需要从集群中的其他地方检索 Gossip 数据，节点启动速度将会变慢。有时，当节点没有正确的\
    \ Gossip 状态时，你可能需要手动修复 Gossip 相关问题。\n\n请按照以下步骤修复不正确的 Gossip 状态问题。\n\n1.  关闭遇到\
    \ Gossip 问题的节点。\n    ```\n    $ nodetool assassinate\n    ```\n2.  停止客户端应用向 Cassandra\
    \ 集群写入数据。\n3.  将所有节点离线，首先排空每个节点。\n    ```\n    $ nodetool drain\n    $ sudo service\
    \ cassandra stop\n    ```\n4.  删除 `peers-UUID` 目录中的所有目录。\n    ```\n    $ sudo\
    \ rm -r /var/lib/cassandra/data/system/peers-UUID/8\n    ```\n5.  从 `peers` 目录中移除数据后，在每个节点上运行以下\
    \ SQL 语句，以确保节点可以互相发现：\n    ```\n    cqlsh> select * from system.peers;\n    ```\n\
    6.  在每个节点上设置 `cassandra.load_ring_state=false` 属性，以便在下一步重启节点时清除 Gossip 状态。你可以从命令行设置此属性，也可以通过将该属性添加到\
    \ `cassandra-env.sh` 文件中来实现（如本章“节点下线”小节中针对另一个参数的说明）。\n7.  重启集群中的所有节点。确保撤销你在第 6\
    \ 步中可能对 `cassandra-env.sh` 文件所做的任何更改。\n\n## 总结\n\n在本章中，我解释了几项重要的集群管理任务。`nodetool`\
    \ 工具在移除节点、替换死亡节点、移动节点、销毁节点以及从环中移除节点时提供了巨大帮助。你还学习了如何退出和添加数据中心。\n\n在测试集群中练习这些任务是在进行集群管理任务时建立信心的最佳方式。在执行某些变更时，你很可能会遇到小问题，而练习诸如退出节点和数据中心等任务会教会你如何快速修复这些问题，从而在生产环境中的变更过程中节省时间。\n\
    \n# 10. 监控、日志与指标\n\n监控 Cassandra 在很多方面类似于管理传统关系型数据库。其复杂性在于 Cassandra 是一个分布式数据库，因此你还需要关注数据的分布以及集群中节点之间工作负载的平衡。\n\
    \n`nodetool` 工具提供了许多命令来帮助你监控集群，你在前面的章节中已经学习了其中的许多命令。\n\nJConsole 是一个强大的监控工具，你既可以从命令行使用，也可以作为\
    \ GUI 工具使用。\n\nCassandra 提供了大量指标，帮助你评估和监控集群的性能和健康状况。这些指标包括表和键空间指标，以及缓存和客户端请求指标等。本章回顾了重要的\
    \ Cassandra 指标。\n\n在本章的最后一节，我将展示如何设置和配置 Nagios，这是一个流行的监控 Cassandra 集群的工具。\n"
