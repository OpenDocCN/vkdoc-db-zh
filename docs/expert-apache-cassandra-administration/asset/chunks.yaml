- fmt: "## 限制查询结果\n\n您可以通过在 `SELECT` 语句中指定 `LIMIT` `N` 选项来限制其输出的行数，如下所示：\n\n```\n\
    cqlsh> SELECT * FROM cycling.cyclist_name LIMIT 3;\n```\n\n您还可以指定一个 `PER PARTITION\
    \ LIMIT` `N` 选项，以限制特定分区返回的行数。首先，创建一个表，该表会将数据排序到多个分区中，并将数据插入到该表中。在此示例中，您使用 `race_year`\
    \ 和 `race_name` 列作为复合分区键，`rank` 作为聚簇列：\n\n```\ncqlsh> CREATE TABLE cycling.rank_by_year_and_name\
    \ (\n    race_year int,\n    race_name text,\n    cyclist_name text,\n    rank\
    \ int,\n    PRIMARY KEY ((race_year, race_name), rank)\n);\n```\n\n有了这个表，您就可以执行以下\
    \ `SELECT` 语句。`PER PARTITION LIMIT N` 子句为分区键 `race_year` 和 `race_name` 的每种组合检索前五场比赛。\n\
    \n```\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name PER PARTITION LIMIT\
    \ 5;\n```\n\n## 过滤查询结果\n\nCassandra 不允许需要过滤的查询。它只允许不需要过滤的查询，在这种情况下，它会返回结果集中读取的所有记录。这样做的原因是使查询具有可预测的性能。查询的执行时间将始终与查询返回的数据量成正比。\n\
    \n假设您有以下表：\n\n```\nCREATE TABLE emails (\n    emailId int,\n    time int,\n  \
    \  from text,\n    content text,\n    PRIMARY KEY(emailId, time)\n);\n```\n\n\
    您可以通过发出以下查询来检索表中的所有数据：\n\n```\nSELECT * from emails;\n```\n\n但是，如果您发出以下查询，Cassandra\
    \ 会报错：\n\n```\nSELECT * FROM emails WHERE time = 1418306451235;\nBad Request:\
    \ Cannot execute this query as it might involve data filtering and thus may have\
    \ unpredictable performance. If you want to execute this query despite the performance\
    \ unpredictability, use ALLOW FILTERING.\n```\n\n错误的原因是，当 Cassandra 无法保证即使只查询少量值也不会扫描大量数据时，它就不会运行查询。Cassandra\
    \ 是在为您着想，试图节省您的计算资源。\n\n要执行此查询，数据库需要从表 `emails` 中检索所有行，然后过滤掉那些 `time` 列不具有请求值的行。但是，如果您知道表中超过\
    \ 90% 的行都具有 `time` 列的请求值，那么您的查询将是高效的，并且您必须在查询中指定 `ALLOW FILTERING` 子句。\n\n如果表包含一百万行，而只有五行包含\
    \ `time` 列的请求值，您的查询将浪费资源，因为 Cassandra 将读取所有一百万行来检索五行。在这种情况下，您应该考虑添加一个二级索引。因此，您可以在\
    \ `from` 列上添加一个索引并运行以下查询：\n\n```\nSELECT * FROM emails WHERE from = 'Sam Alapati';\n\
    ```\n\nCassandra 将检索 Sam Alapati 发送的所有电子邮件，并且不会要求您使用 `ALLOW FILTERING` 子句，因为它使用\
    \ `from` 列上的二级索引来查找匹配的行，而无需过滤结果。\n\n您比 Cassandra 更了解您的数据。您可以通过指定 `ALLOW FILTERING`\
    \ 子句来覆盖默认行为，从而使相同的查询成功运行。\n\n## 使用内置函数聚合结果\n\nCassandra 3.1 提供了内置的标准聚合函数，例如 `min`、`max`、`avg`、`sum`\
    \ 和 `count`，用于聚合结果。我提供两个聚合函数的示例：`sum` 和 `count`。\n\n在表 `cycling.cyclist_points`\
    \ 中，主键是 (`id`, `race_points`)。您可以借助 `sum` 函数找到特定自行车手的比赛积分总和。\n\n```\ncqlsh> SELECT\
    \ sum(race_points)\nFROM cycling.cyclist_points\nWHERE id=e3b19ec4-774a-4d1c-9e5a-decec1e30aac;\n\
    ```\n\n在表 `cycling.country_flag` 中，主键是 (`country`, `cyclist_name`)。您可以使用 `count`\
    \ 函数来查找来自比利时的自行车手数量。\n\n```\ncqlsh> SELECT count(cyclist_name) FROM cycling.country_flag\
    \ WHERE country='Belgium';\n```\n\n您可以在查询中应用任何自定义的用户定义函数（UDF），如下所示，其中 `fLog` 是一个用于从此表检索数据的\
    \ UDF：\n\n```\ncqlsh> SELECT id, lastname, fLog(race_points) FROM cycling.cyclist_points;\n\
    ```\n\n## 将查询结果格式化为 JSON\n\n您可以以 JSON 格式检索表的数据。要以 JSON 格式获取查询的整个结果，只需在 `SELECT`\
    \ 语句后插入关键字 `json`。\n\n```\ncqlsh> SELECT json name, checkin_id, timestamp from\
    \ checkin;\n```\n\n如果您希望仅以 JSON 格式检索某些列，可以通过将列名包装在 `toJson()` 中来实现。\n\n```\ncqlsh>\
    \ SELECT name, checkin_id, toJson(timestamp) from checkin;\n```\n\n## 从集合列中选择数据\n\
    \n查询集合列的方式与查询任何其他列相同。以下示例显示如何为特定自行车手 ID 检索数据。这里，列 `teams` 是一个集合：\n\n```\ncqlsh>\
    \ SELECT lastname, teams\nFROM cycling.cyclist_career_teams\nWHERE id = 5b6962dd-3f90-4c93-8f61-eabfa4a803e2;\n\
    ```\n\n当您查询带有集合的表时，Cassandra 将返回完整的集合。结果将根据元素类型排序。例如，文本元素将按字母顺序排列。如果键是整数类型，则顺序将基于键值。如果您需要数据库按数据插入的顺序返回结果，请使用列表而不是集合。\n\
    \n## 使用 IN 关键字进行 CQL 行的多键获取\n\n您可以指定 `IN` 关键字来定义要一起检索的一组聚簇列，从而获取多行。\n\n与 `ORDER\
    \ BY` 子句一样，当您指定 `IN` 关键字时，必须使用 `PAGING OFF` 命令在 cqlsh 中关闭分页。以下是一些展示如何指定 `IN` 关键字的查询示例。\n\
    \n以下查询根据聚簇列 `category_id` 检索并对结果进行排序：\n\n```\ncqlsh> SELECT * FROM cycling.cyclist_cat_pts\n\
    WHERE category_id IN ('Time-trial', 'Sprint')\nORDER BY id DESC;\n```\n\n以下示例显示了如何指定多个聚簇列。这里\
    \ `race_id` 列是分区键，`race_start_date` 和 `race_end_date` 列是聚簇列：\n\n```\ncqlsh> SELECT\
    \ * FROM cycling.calendar WHERE race_id = 101\nAND (race_start_date, race_end_date)\n\
    IN (('2015-05-09', '2015-05-31'), ('2015-05-06', '2015-05-31'));\n```"
  raw: '#### Limiting Your Results


    You can limit the number of rows output by a `SELECT` statement by specifying
    the `LIMIT` `N` option with a `SELECT` statement, as shown here:


    ```

    cqlsh> SELECT * FROM cycling.cyclist_name LIMIT 3;

    ```


    You can also specify a `PER PARTITION LIMIT` `N` option to limit the number of
    rows returned for a specific partition. First, create a table that’ll sort the
    data into multiple partitions and insert data into that table. In the example
    here, you use the `race_year` and `race_name` columns as the composite partition
    key and `rank` as the clustering column:


    ```

    cqlsh> CREATE TABLE cycling.rank_by_year_and_name (

    race_year int

    race_name text.

    cyclist_name text,

    rank int,

    PRIMARY key ((race_year, race_name), rank);

    ```


    With this table in place, you can execute the following `SELECT` statement. The
    `PER PARTITION LIMIT N` clause retrieves the top five races for each combination
    of the two columns in the partition key, `race_year` and `race_name`.


    ```

    cqlsh> SELECT * FROM cycling.rank_by_year_and_name PER PARTITION LIMIT 5;

    ```


    #### Filtering the Results


    Cassandra doesn’t allow queries that require filtering. It only allows queries
    that don’t require filtering, where it returns all the records read in the result
    set. The reason for this is so queries have predictable performance. A query will
    always execute in a time that’s proportional to the amount of data the query returns.


    Let’s say you have the following table:


    ```

    CREATE TABLE emails (

    emailId int,

    time int,

    from text,

    content text,

    PRIMARY KEY(emailId, time));

    ```


    You can retrieve all data from the table by issuing the following query:


    ```

    SELECT * from emails;

    ```


    However, if you issue the following query, Cassandra complains:


    ```

    SELECT * FROM emails WHERE time1 = 1418306451235;

    Bad Request: Cannot execute this query as it might involve data filtering and
    thus may have unpredictable performance. If you want to execute this query despite
    the performance unpredictability, use ALLOW FILTERING.

    ```


    The reason for the error is that Cassandra doesn’t run a query when it’s unable
    to guarantee that it won’t be scanning a large amount of data even when there
    are only a handful of values for the querying. Cassandra is looking out for you,
    trying to conserve your computing resources.


    To execute the query, the database needs to retrieve all rows from the table `EMAILs`
    and then filter out the rows that don’t have the requested value for the `TIME`
    column. However, if you know that over 90% of the rows in the table have the requested
    value for the time column , your query is going to efficient, and you must specify
    the `ALLOW FILTERING` clause in your query.


    If the table contains a million rows and only five rows contain the requested
    value for the time column, your query will waste resources, since Cassandra will
    be reading all million rows to retrieve five rows. In this case, you should think
    of adding a secondary index. So, you can add an index on the `FROM` column and
    run the following query:


    ```

    SELECT * FROM emails WHERE from = ''Sam Alapati'';

    ```


    Cassandra will retrieve all emails sent by Sam Alapati and won’t ask you to use
    the `ALLOW FILTERING` clause, since it uses the secondary index on the `from`
    column to find the matching rows, without having to filter the results.


    You know your data better. You can override the default behavior by specifying
    the `ALLOW` `FILTERING` clause and make the same query run successfully.


    #### Specifying Built-In Functions for Aggregating Results


    Cassandra 3.1 provides built-in standard aggregate functions such as `min, max,
    avg, sum,` and `count` to aggregate results. I provide examples for specifying
    two aggregate functions: `sum and count`.


    In the table `cycling.cyclist_points`, the `PRIMARY KEY` is (`id` , `race_points`).
    You can find the sum of race points for a specific cyclist with the help of the
    `sum` function.


    ```

    cqlsh> SELECT sum(race_points)

    FROM cycling.cyclist_points

    WHERE id=e3b19ec4-774a-4d1c-9e5a-decec1e30aac;

    ```


    In the table `cycling.country_flag`, the `PRIMARY KEY` is (`country` , `cyclist_name`).
    You can employ the `count` function to find the number of cyclists from Belgium.


    ```

    cqlsh> SELECT count(cyclist_name) FROM cycling.country_flag WHERE country="Belgium";

    ```


    You can apply any custom user-defined function as part of a query, as shown here,
    where `fLog` is an UDF created to retrieve data from this table:


    ```

    cqlsh> SELECT id, lastname, fLog(race_points) FROM cycling.cyclist_points;

    ```


    #### Formatting the Query Results as JSON


    You can retrieve a table’s data in the JSON format. To get the entire result of
    a query in the JSON format, just insert the keyword `json` right after the `SELECT`
    statement.


    ```

    cqlsh> SELECT json name, checkin_id, timestamp from checkin;

    ```


    If you wish to retrieve only some column(s) in the JSON format, you can do so
    by enclosing the column’s name in `toJson().`


    ```

    cqlsh> select name, checkin_id, toJson(timestamp) from checkin;

    ```


    #### Selecting Data from a Collection Column


    You query a collection column the same as any other column. The following example
    shows how you retrieve data for a specific cyclist ID. Here, the column `teams`
    is a set:


    ```

    cqlsh> SELECT lastname, teams

    FROM cycling.cyclist_career_teams

    WHERE id = 5b6962dd-3f90-4c93-8f61-eabfa4a803e2;

    ```


    Cassandra will return the complete collection when you query a table with a collection.
    The results will be in the order based on the element types. For example, text
    elements will be in alphabetical order. If the key is an integer type, the order
    will be based on the key values. If you need the database to return the results
    in the order the data was inserted, use a list instead of a set.


    #### Doing a Multi-Get of CQL Rows with the IN Keyword


    You can specify the `IN` keyword to define a set of clustering columns you want
    to retrieve together, making it get multiple rows.


    As with the `ORDER_BY` clause, you must turn off paging in cqlsh with the `PAGING
    OFF` command when you specify the `IN` keyword. Here are some same queries that
    show how to specify the `IN` keyword.


    The following query retrieves and sorts the results based on the clustering column
    `category_id`:


    ```

    cqlsh> select * from cycling.cyclist_cat_pts

    WHERE cataegory_id IN (Time-tral'', ''Sprint'')

    ORDER BY id DESC;

    ```


    The following example shows how to specify multiple clustering columns. Here the
    `race_id` column is the partition key, and the `race_start_date` and `race_end_date`
    columns are the clustering columns :


    ```

    cqlsh> SELECT * FROM cycling.calendar WHERE race_id =101

    AND (race_start_date, race_end_date)

    IN ((''2015-05-09'', ''2015-05-31''), (''2015-05-06'', ''2015-05-31'');

    ```'
  trans: "\n## 限制查询结果\n\n您可以通过在 `SELECT` 语句中指定 `LIMIT` `N` 选项来限制其输出的行数，如下所示：\n\n```\n\
    cqlsh> SELECT * FROM cycling.cyclist_name LIMIT 3;\n```\n\n您还可以指定一个 `PER PARTITION\
    \ LIMIT` `N` 选项，以限制特定分区返回的行数。首先，创建一个表，该表会将数据排序到多个分区中，并将数据插入到该表中。在此示例中，您使用 `race_year`\
    \ 和 `race_name` 列作为复合分区键，`rank` 作为聚簇列：\n\n```\ncqlsh> CREATE TABLE cycling.rank_by_year_and_name\
    \ (\n    race_year int,\n    race_name text,\n    cyclist_name text,\n    rank\
    \ int,\n    PRIMARY KEY ((race_year, race_name), rank)\n);\n```\n\n有了这个表，您就可以执行以下\
    \ `SELECT` 语句。`PER PARTITION LIMIT N` 子句为分区键 `race_year` 和 `race_name` 的每种组合检索前五场比赛。\n\
    \n```\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name PER PARTITION LIMIT\
    \ 5;\n```\n\n## 过滤查询结果\n\nCassandra 不允许需要过滤的查询。它只允许不需要过滤的查询，在这种情况下，它会返回结果集中读取的所有记录。这样做的原因是使查询具有可预测的性能。查询的执行时间将始终与查询返回的数据量成正比。\n\
    \n假设您有以下表：\n\n```\nCREATE TABLE emails (\n    emailId int,\n    time int,\n  \
    \  from text,\n    content text,\n    PRIMARY KEY(emailId, time)\n);\n```\n\n\
    您可以通过发出以下查询来检索表中的所有数据：\n\n```\nSELECT * from emails;\n```\n\n但是，如果您发出以下查询，Cassandra\
    \ 会报错：\n\n```\nSELECT * FROM emails WHERE time = 1418306451235;\nBad Request:\
    \ Cannot execute this query as it might involve data filtering and thus may have\
    \ unpredictable performance. If you want to execute this query despite the performance\
    \ unpredictability, use ALLOW FILTERING.\n```\n\n错误的原因是，当 Cassandra 无法保证即使只查询少量值也不会扫描大量数据时，它就不会运行查询。Cassandra\
    \ 是在为您着想，试图节省您的计算资源。\n\n要执行此查询，数据库需要从表 `emails` 中检索所有行，然后过滤掉那些 `time` 列不具有请求值的行。但是，如果您知道表中超过\
    \ 90% 的行都具有 `time` 列的请求值，那么您的查询将是高效的，并且您必须在查询中指定 `ALLOW FILTERING` 子句。\n\n如果表包含一百万行，而只有五行包含\
    \ `time` 列的请求值，您的查询将浪费资源，因为 Cassandra 将读取所有一百万行来检索五行。在这种情况下，您应该考虑添加一个二级索引。因此，您可以在\
    \ `from` 列上添加一个索引并运行以下查询：\n\n```\nSELECT * FROM emails WHERE from = 'Sam Alapati';\n\
    ```\n\nCassandra 将检索 Sam Alapati 发送的所有电子邮件，并且不会要求您使用 `ALLOW FILTERING` 子句，因为它使用\
    \ `from` 列上的二级索引来查找匹配的行，而无需过滤结果。\n\n您比 Cassandra 更了解您的数据。您可以通过指定 `ALLOW FILTERING`\
    \ 子句来覆盖默认行为，从而使相同的查询成功运行。\n\n## 使用内置函数聚合结果\n\nCassandra 3.1 提供了内置的标准聚合函数，例如 `min`、`max`、`avg`、`sum`\
    \ 和 `count`，用于聚合结果。我提供两个聚合函数的示例：`sum` 和 `count`。\n\n在表 `cycling.cyclist_points`\
    \ 中，主键是 (`id`, `race_points`)。您可以借助 `sum` 函数找到特定自行车手的比赛积分总和。\n\n```\ncqlsh> SELECT\
    \ sum(race_points)\nFROM cycling.cyclist_points\nWHERE id=e3b19ec4-774a-4d1c-9e5a-decec1e30aac;\n\
    ```\n\n在表 `cycling.country_flag` 中，主键是 (`country`, `cyclist_name`)。您可以使用 `count`\
    \ 函数来查找来自比利时的自行车手数量。\n\n```\ncqlsh> SELECT count(cyclist_name) FROM cycling.country_flag\
    \ WHERE country='Belgium';\n```\n\n您可以在查询中应用任何自定义的用户定义函数（UDF），如下所示，其中 `fLog` 是一个用于从此表检索数据的\
    \ UDF：\n\n```\ncqlsh> SELECT id, lastname, fLog(race_points) FROM cycling.cyclist_points;\n\
    ```\n\n## 将查询结果格式化为 JSON\n\n您可以以 JSON 格式检索表的数据。要以 JSON 格式获取查询的整个结果，只需在 `SELECT`\
    \ 语句后插入关键字 `json`。\n\n```\ncqlsh> SELECT json name, checkin_id, timestamp from\
    \ checkin;\n```\n\n如果您希望仅以 JSON 格式检索某些列，可以通过将列名包装在 `toJson()` 中来实现。\n\n```\ncqlsh>\
    \ SELECT name, checkin_id, toJson(timestamp) from checkin;\n```\n\n## 从集合列中选择数据\n\
    \n查询集合列的方式与查询任何其他列相同。以下示例显示如何为特定自行车手 ID 检索数据。这里，列 `teams` 是一个集合：\n\n```\ncqlsh>\
    \ SELECT lastname, teams\nFROM cycling.cyclist_career_teams\nWHERE id = 5b6962dd-3f90-4c93-8f61-eabfa4a803e2;\n\
    ```\n\n当您查询带有集合的表时，Cassandra 将返回完整的集合。结果将根据元素类型排序。例如，文本元素将按字母顺序排列。如果键是整数类型，则顺序将基于键值。如果您需要数据库按数据插入的顺序返回结果，请使用列表而不是集合。\n\
    \n## 使用 IN 关键字进行 CQL 行的多键获取\n\n您可以指定 `IN` 关键字来定义要一起检索的一组聚簇列，从而获取多行。\n\n与 `ORDER\
    \ BY` 子句一样，当您指定 `IN` 关键字时，必须使用 `PAGING OFF` 命令在 cqlsh 中关闭分页。以下是一些展示如何指定 `IN` 关键字的查询示例。\n\
    \n以下查询根据聚簇列 `category_id` 检索并对结果进行排序：\n\n```\ncqlsh> SELECT * FROM cycling.cyclist_cat_pts\n\
    WHERE category_id IN ('Time-trial', 'Sprint')\nORDER BY id DESC;\n```\n\n以下示例显示了如何指定多个聚簇列。这里\
    \ `race_id` 列是分区键，`race_start_date` 和 `race_end_date` 列是聚簇列：\n\n```\ncqlsh> SELECT\
    \ * FROM cycling.calendar WHERE race_id = 101\nAND (race_start_date, race_end_date)\n\
    IN (('2015-05-09', '2015-05-31'), ('2015-05-06', '2015-05-31'));\n```\n"
- fmt: '## Inserting Data with the `INSERT` Statement


    You execute the `INSERT` statement to write one or more columns for a row in a
    table. You must specify at least the column on which you’ve defined the primary
    key, as otherwise you won’t be able to identify the row.


    Here’s the generic syntax of the `INSERT` statement:

    ```

    INSERT INTO [keyspace_name.] table_name (column_list)

    VALUES (column_values)

    [IF NOT EXISTS]

    [USING TTL seconds | TIMESTAMP epoch_in_microseconds]

    ```


    Here’s an example showing how to perform an insert with the help of the `VALUES`
    clause:

    ```

    cqlsh> INSERT INTO cycling.cyclist_name (id, lastname, firstname)

    VALUES (5b6962dd-3f90-4c93-8f61-eabfa4a803e2, ''VOS'',''Marianne'');

    ```


    When you use the JSON syntax, specifying the `VALUES` clause is optional, but
    make sure you specify the keyword `JSON` after the table name.

    ```

    cqlsh> INSERT INTO cycling.cyclist_category JSON ''{

    "category" : "GC",

    "points" : 780,

    "id" : "829aa84a-4bba-411f-a4fb-38167a987cda",

    "lastname" : "SUTHERLAND" }'';

    ```


    Tip: If a row doesn’t exist, Cassandra creates the row, and if the row exists
    already, it updates that row. You really can’t tell which one of the two operations–creation
    or update–took place. You can specify the `IF NOT EXISTS` condition to insert
    data only if it doesn’t exist, but this has a discernible performance penalty
    so you shouldn’t use it routinely.


    The clause `UPDATE_PARAMETER` in an `INSERT` statement also occurs in the `UPDATE`,
    and `DELETE` statements, so it’s worth understanding this parameter well. The
    `UPDATE_PARAMETER` clause supports the following parameters:

    *   `TIMESTAMP`: Sets the timestamp for the operation. By default, the coordinator
    uses the current time at the start of the statement execution as the timestamp.

    *   `TTL`: This parameter specifies a time-to-live (in seconds) for the values
    you insert. This is an optional parameter , and by default values don’t expire.
    Setting the `TTL` to the value 0 is the same as specifying no TTL.


    ## Modifying Data with the `UPDATE` Statement


    Cassandra’s `UPDATE` capability is really an `UPSERT`. When you update a row,
    Cassandra will create the row if didn’t exist before, and update it otherwise.
    The `UPDATE` statement will thus end up writing one or more column values of a
    row or rows.


    If you insert a row with the same primary key as a current row, the database replaces
    the row. If you update a row and the primary key doesn’t exist, Cassandra creates
    the row. Because Cassandra employs an append model, both insert and update operations
    work the same way; there’s no essential difference between the two operations.


    You can specify the TTL seconds or Timestamp microseconds as options on all columns
    except counter columns.


    You can update a column in multiple rows, as in the following example:

    ```

    cqlsh> UPDATE users

    SET state = ''TX''

    WHERE user_id IN (12345, 23456, 34567);

    ```


    You can update one or more columns at once. The following command shows how to
    update multiple columns in the same row:

    ```

    cqlsh> UPDATE users

    SET name = ''Sam Alapati'',

    email=''samalapati@gmail.com''

    WHERE user_id = 23456;

    ```


    You can update data in a collection set, map, or list.


    You can also perform conditional updates, as shown here:

    ```

    cqlsh> UPDATE users SET id = 12345

    WHERE lastname = ''ALAPATI'' and firstname = ''Sam''

    IF age =50;

    ```


    Conditional updates are lightweight transactions and impose a performance penalty
    and therefore you must use them judiciously.


    Change Data Capture (CDC) Logging: Cassandra offers change data capture (CDC)
    logging to track data that has changed. You configure CDC logging on a per-table
    basis. When you decide to use CDC logging, you must also specify a limit on the
    amount of disk space the CDC logs can use. When the database flushes the memtable
    data to disk, the database moves the commit log segments that contain data relating
    the tables for which you’ve enabled CDC logging to the CDC directory. You can
    configure CDC logging when creating a table or alter an existing table to add
    the relevant table property.


    The `cdc_raw_directory` property in the `cassandra.yaml` file enables you to specify
    the directory where the database stores the CDC logs. The default locations for
    this directory are as follows:

    *   Package installations: `/var/lib/Cassandra/cdc_raw`

    *   Tarball installations: `install_location/data/cdc_raw`


    ## Working with Advanced Data Types


    You can create several advanced types of data such as the following:

    *   Collections: Enable you to group and store data together in a column.

    *   Tuples: Enable you to store multiple values together in a column.

    *   User-Defined Types (UDTs): Enable you to attach multiple data fields to a
    column.


    Note: An UDT is only for a single keyspace. To use an UDT in a different keyspace,
    you must create the UDT again.


    I explain the three advanced data types in the following sections.


    ### Collections


    The collection data type allows you to group data together in a column. For example,
    if a user has multiple addresses or email addresses , you can store all the addresses
    together in a collection column.


    Remember that a collection is only for data with a limit on the number of values.
    That is, there’s a maximum size of an item in collection. A collection isn’t the
    way to go when storing data that grows without limit, such as events that the
    database captures and stores every second.


    CQL enables you to create three collection types:

    *   Set: A group of elements with unique values. The database doesn’t store the
    values in an ordered fashion, but cqlsh returns the elements in a sorted manner,
    such as in an alphabetical order for text values.

    *   List: A list groups multiple values, but the values need not be unique. In
    addition, a list stores elements in a specific order and you can use an index
    value to insert and query a list’s values.

    *   Map: A map establishes a relationship between two items with the help of a
    key-value pair. For each key, there’s a single value, and you can’t have duplicates.


    Tip: Cassandra reads a whole collection, thus adversely affecting performance.
    Keep the collections way smaller than the maximum limit for each collection type.


    You declare a collection column by specifying the collection type (set, list,
    or map), followed by a type such as `int` or `text`, in angle brackets. Here are
    a couple of examples:

    ```

    list

    list

    ```


    You can create an index on all three types of collection columns.


    In the following sections, I show how to create the three collection types.


    #### Creating the Set Type


    You use the set type when you have data in a column that has a many-to-one relationship
    with data in another column. The set type helps in cases like this since you don’t
    join tables in Cassandra.


    For example, in the following example, an individual cyclist, represented by the
    `id` column, can be a member of multiple teams over time:

    ```

    cqlsh> CREATE TABLE cycling.cyclist_career_teams

    ( id UUID PRIMARY KEY, lastname text, teams set<text>);

    ```


    You can query the teams that are part of the set in the following way:

    ```

    cqlsh:cycling> SELECT lastname,teams

    ...         FROM cycling.cyclist_career_teams;

    lastname        | teams

    -----------------+------------------------------------------------------------------------------------------------------

    ARMITSTEAD |                    {''AA Drink - Leontien.nl'', ''Boels-Dolmans Cycling
    Team'', ''Team Garmin - Cervelo''}

    VOS | {''Nederland bloeit'', ''Rabobank Women Team'', ''Rabobank-Liv Giant'',
    ''Rabobank-Liv Woman Cycling Team''}

    BRAND |   {''AA Drink - Leontien.nl'', ''Leontien.nl'', ''Rabobank-Liv Giant'',
    ''Rabobank-Liv Woman Cycling Team''}

    VAN DER BREGGEN |                 {''Rabobank-Liv Woman Cycling Team'', ''Sengers
    Ladies Cycling Team'', ''Team Flexpoint''}

    (4 rows)

    cqlsh:cycling>

    ```


    The maximum size of an item in the set collection type is 65,535 bytes.


    Note: You can expire each element of a collection by specifying individual TTL
    properties.'
