- fmt: "### Assassinating a Node (nodetool assassinate)\n\nLet’s say you have three\
    \ nodes in your cluster and you want to remove one of the nodes. You decommission\
    \ the node, but when you run the `nodetool describecluster` command, you see the\
    \ node in an `UNREACHABLE` state, as shown here:\n\n```\n$ nodetool describecluster\n\
    Cluster Information:\nName: Test Cluster\nSnitch: org.apache.cassandra.locator.DynamicEndpointSnitch\n\
    Partitioner: org.apache.cassandra.dht.Murmur3Partitioner\nSchema versions:\n57af9326-0783-3ea2-93ec-7706e8cad5e7:\
    \ [192.168.159.129]\nUNREACHABLE: [192.168.159.130]\n$\n```\n\nThe `nodetool status`\
    \ command shows the unreachable node with a `DN` status, indicating that the node\
    \ is down.\n\n```\n$ nodetool status\nDatacenter: DC1\n===============\nStatus=Up/Down\n\
    |/ State=Normal/Leaving/Joining/Moving\n--  Address          Load       Tokens\
    \       Owns (effective)  Host ID                               Rack\nDN  192.168.159.130\
    \  ?          256          49.7%             7d9e3ac3-ffdc-4cee-be82-4b0c6e614aa1\
    \  r1\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  383.92 KiB  256          50.3%\
    \             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\n$\n```\n\nIn cases\
    \ such as this, where you’re unable to take a node out of a cluster with the `nodetool\
    \ decommission` command, run the `nodetool assassinate` command to get rid of\
    \ the node.\n\n```\n$ nodetool assassinate\n```\n\nCheck the cluster status with\
    \ the `nodetool status` command to ensure that the node you’ve assassinated (`192.168.159.130`)\
    \ is gone from the cluster.\n\n```\n$ nodetool status\nDatacenter: datacenter1\n\
    =======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  359.04 KiB  256          100.0%\
    \            0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\n$\n```\n\nRun the `nodetool\
    \ assassinate` command whenever you fail to remove a node with the `nodetool removenode`\
    \ command. The `nodetool assassinate` command removes a dead node without replicating\
    \ the data.\n\nThe `nodetool assassinate` command removes the node where you run\
    \ the command. You can specify a remote node with the `-h` option.\n\n```\n$ nodetool\
    \ assassinate -h 192.168.159.129\n```\n\n## Node Management\n\nNode management\
    \ is an integral part of a Cassandra administrator’s task list. Managing nodes\
    \ involves adding, moving, and replacing nodes. It also involves managing slow\
    \ or failed nodes and cleaning up data after range movements.\n\nIn the following\
    \ sections, I explain how to perform key node management tasks.\n\n### Keeping\
    \ a Node from Joining the Cluster\n\nAt times, you don’t want a node to join the\
    \ cluster. That is, you want the node to be up and running, but without being\
    \ part of the ring. You can do this by utilizing the Cassandra command line utility’s\
    \ `-D` option. The `-D` option enables you to specify startup parameters in the\
    \ `cassandra-env.sh` file and at the command line. In this case, add the `-Dcassandra.join.ring=false`\
    \ option to the `cassandra-env.sh` file.\n\nThe following are the steps you must\
    \ follow to keep a node from joining a cluster.\n\n1.  Stop the node you wish\
    \ to take out of the ring.\n2.  Edit the `cassandra-env.sh` file and add the following\
    \ line:\n\n    ```\n    JVM_OPTS=\"$JVM_OPTS -Dcassandra.join_ring=false\"\n \
    \   ```\n\n3.  Start up the node.\n\n    ```\n    $ cassandra -R\n    ...\n  \
    \  INFO  [main] 2017-07-15 12:31:36,878 CassandraDaemon.java:489 - JVM Arguments:\
    \ [-...\n    Djava.library.path=./../lib/sigar-bin, -Dcassandra.join_ring=false,\
    \ -\n    ...\n    INFO  [GossipStage:1] 2017-07-15 12:31:44,587 Gossiper.java:1056\
    \ - Node /192.168.159.129 is now part of the cluster\n    INFO  [GossipStage:1]\
    \ 2017-07-15 12:31:44,589 Gossiper.java:1056 - Node /192.168.159.130 is now part\
    \ of the cluster\n    INFO  [main] 2017-07-15 12:31:45,757 StorageService.java:695\
    \ - Not joining ring as requested. Use JMX (StorageService->joinRing()) to initiate\
    \ ring joining\n    INFO  [main] 2017-07-15 12:31:45,758 CassandraDaemon.java:694\
    \ - Waiting for gossip to settle before accepting client requests...\n    INFO\
    \  [GossipStage:1] 2017-07-15 12:31:46,429 StorageService.java:2248 - Node /192.168.159.129\
    \ state jump to NORMAL\n    INFO  [main] 2017-07-15 12:31:53,763 CassandraDaemon.java:725\
    \ - No gossip backlog; proceeding\n    $\n    ```\n\nAs you can see from the Cassandra\
    \ utility’s output, the node (`192.168.159.130`) has started up fine and is part\
    \ of the cluster. However, since you asked Cassandra not to join this node to\
    \ the cluster, it remains up but out of the cluster. You can confirm this by running\
    \ the `nodetool status` command.\n\n```\n$ nodetool status\nDatacenter: datacenter1\n\
    =======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  296.03 KiB  256          50.3%\
    \             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\nDN  192.168.159.130\
    \  316.55 KiB  256          49.7%             7d9e3ac3-ffdc-4cee-be82-4b0c6e614aa1\
    \  rack1\n$\n```\n\nThe node `192.168.159.130` is showing a status of `DN` (`DOWN\
    \ NORMAL`). The node is up but is no longer a part of this cluster.\n\nSubsequently,\
    \ you can run the `nodetool join` command to add this node back to the ring, as\
    \ shown here:\n\n```\n$ nodetool join\n```\n\n### Adding a Node to a Data Center\n\
    \nAdding a new node involves installing and starting up the new node, and cleaning\
    \ up the existing nodes to remove keys that no longer belong to those nodes. Follow\
    \ these steps to add a node to a running cluster.\n\n1.  Install the Cassandra\
    \ binaries on the new node.\n2.  Configure the following properties in the `cassandra.yaml`\
    \ file:\n    *   `cluster_name`: The cluster name.\n    *   `endpoint_snitch`:\
    \ `GossipingPropertyFileSnitch` (or any other snitch you wish to use).\n    *\
    \   `num_tokens`: 256 (this sets the number of vnodes, and you can set it to the\
    \ same number as the tokens you configured for the rest of the nodes)\n    * \
    \  `allocate_tokens_for_local_replication_factor`: Enables you to specify the\
    \ replication factor of the keyspaces.\n    *   `seed_provider`: Specify one of\
    \ the existing seed nodes in the cluster.\n3.  Ensure that you add any non-default\
    \ settings you configured in the `cassandra.yaml` , `cassandra-rackdc.properties`\
    \ , and `cassandra-topology.properties` files. All these configuration files on\
    \ the new node should use the same non-default settings as the rest of the nodes.\n\
    4.  Start the new node.\n5.  Verify the status of the nodes with the `nodetool\
    \ status` command and ensure that all nodes show an `UN` (`Up Normal`) status.\n\
    6.  Run the `nodetool cleanup` command on all the existing nodes. You must wait\
    \ until the command completes on one node before proceeding to the other nodes.\n\
    \nThis scenario is for adding a new node to a cluster. If you’re replacing an\
    \ existing node that died for some reason, you need to let Cassandra know that\
    \ the new node you’re adding will be replacing the dead node. You do this by specifying\
    \ the `replace_address` option.\n\nStop the node you wish to replace, before performing\
    \ one of the following steps.\n\n*   For package installations, add the `replace_address`\
    \ option to the `cassandra-env.sh` file before starting the new node (see Step\
    \ 4).\n\n    ```\n    JVM_OPTS = \"$JVM_OPTS -Dcassandra.replace_address=192.168.159.130\"\
    \n    ```\n\n*   For a tarball installation, as in my case, start the database\
    \ with the `cassandra.replace_address` option.\n\nYou can specify the `listen_address`\
    \ or the `broadcast_address` of the dead node as the value for the `cassandra.replace_address`\
    \ option. You must ensure that the node you’re replacing the other node with is\
    \ either brand now or that you’ve removed all data under the `/data` directory\
    \ if it’s an existing node."
