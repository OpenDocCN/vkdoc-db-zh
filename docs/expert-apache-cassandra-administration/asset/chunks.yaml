    \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-2-big-Data.db\n\
    \    ```\n\n    Gathering the SSTables list in a text file helps you perform a\
    \ batch process to mark all SSTables in Step 5 as repaired.  \n3.  Run a full\
    \ repair on just this node.\n\n    ```\n    $ nodetool repair\n    ```\n\n   \
    \ By default, the repair is full and sequential (not parallel).  \n4.  Shut down\
    \ the node.  \n5.  Set the `repairedAt` flag on all SSTables to `–is-repaired`\
    \ using the `sstablerepairedset` command. Before you can run incremental repair,\
    \ it is mandatory that you set the repaired status of the SSTable.\n\n    ```\n\
    \    $ sudo sstablerepairedset –really-set –is-repaired -f SSTble-names.txt\n\
    \    ```\n\n    The `sstablerepairedset` tool sets the `repairedAt` status of\
    \ one or more SSTables by marking the tables as repaired or unrepaired. In this\
    \ case, you used a file with a list of SSTable files, but you could also specify\
    \ an individual SSTable to mark the repair status of a single table.  \n6.  Once\
    \ the repair is complete, restart the node.  \n\nOnce you migrate all the nodes\
    \ in your cluster, you can perform incremental repairs (with the `nodetool repair\
    \ –inc` command) on each of the nodes.\n\n## Data Distribution and Replication\n\
    \nA replica is a copy of a table row. When Cassandra first writes data to a table,\
    \ it refers to it as a replica as well.\n\nData distribution and replication are\
    \ key topics that affect Cassandra performance. To understand how Cassandra distributes\
    \ data and replicates copies of that data across the cluster, you need to understand\
    \ the following topics:\n\n*   Virtual nodes\n*   Replication strategies\n*  \
    \ Partitioners and partitioning strategies\n*   Snitches\n\nIn the following sections,\
    \ I explain each of these crucial elements of Cassandra data distribution and\
    \ replication."
  trans: "## 限制修复操作至本地数据中心（对比集群范围修复）\n\n默认情况下，`nodetool repair` 命令会在集群范围内运行修复过程，即在包含副本的每个节点上运行，而不论其数据中心位置。如果你有三个数据中心，副本因子为\
    \ 3，那么你就是在要求修复过程构建九个 Merkel 表，这会导致你的网络和其他资源使用量激增。\n\n你可以将修复限制在特定数据中心，或者仅限于运行修复命令的本地节点。指定\
    \ `-dc` 或 `--in-dc` 选项可以将修复限制在特定数据中心。以下示例展示了如何通过指定 `-dc` 选项将节点修复仅限制在本地数据中心 DC1：\n\
    \n```\n$ nodetool repair -dc DC1\n```\n\n## 节点范围对比子范围修复\n\n默认情况下，Cassandra 会修复一个节点或节点范围上的所有分区范围。或者，你也可以通过指定\
    \ `-st`（或 `-start-token`）和 `-et`（或 `-end-token`）选项来运行子范围修复。\n\n子范围修复使你能够精确定位分区范围以修复错误，但它需要生成的令牌范围。\n\
    \n## 何时以及多长时间执行一次反熵修复\n\n有几种情况需要进行节点修复，我在此总结如下。\n\n*   将其作为常规维护操作运行，尤其是在数据库中频繁发生删除操作时。\n\
    *   修复那些包含很少被读取的数据的节点，因为它们不会经历读取修复。\n*   在你从故障中恢复的节点上运行修复。\n*   你还必须运行修复以恢复丢失的数据，或者当\
    \ SSTable 损坏时。\n\n理想情况下，你应该每天运行增量修复，而较少频率地运行完整修复，例如每月一次，除非你认为需要更频繁地进行。即使你没有任何数据删除，完整修复也很有用，因为它有助于维护数据完整性。\n\
    \n表属性 `gc_grace_seconds` 与你修复节点的频率有很大关系。`gc_grace_seconds` 表选项指定了数据库将数据标记为删除标记（称为墓碑）后，经过多长时间该数据才有资格被删除。默认情况下，这个间隔是\
    \ 24 小时（864,000 秒），这为数据库提供了在永久删除数据之前最大化一致性的时间。\n\nCassandra 延迟垃圾回收（通过配置 `gc_grace_seconds`\
    \ 属性设置垃圾回收宽限期的值）的原因，是让不可用的节点有足够的时间恢复。如果节点在此期限内没有启动，数据库将视其为故障节点。\n\n由于 `gc_grace_seconds`\
    \ 属性的默认值是 24 小时，因此最好每天运行一次修复，以便正确处理所有已删除的数据。对于很少被删除或修改的数据，你可以为 `gc_grace_seconds`\
    \ 属性设置更长的间隔。在这种情况下，你可以减少对这些表执行修复的频率。\n\n## 迁移到增量修复\n\n尽管增量修复比完整修复高效得多，但第一次执行该过程可能需要很长时间，因为\
    \ Cassandra 需要重新压缩所有 SSTable。DataStax 建议你一次将集群中的一个节点迁移到增量修复。以下步骤展示了如何进行迁移。\n\n\
    1.  禁用自动压缩。\n    ```\n    $ nodetool disableautocompaction\n    ```\n2.  将节点的\
    \ SSTable 列表保存在一个文本文件中，例如 `SSTable-names.txt`。你会在 `/var/lib/cassandra/data` 目录下找到\
    \ SSTable。在 `data` 目录中，每个键空间都有一个目录，其中包含该键空间中每个 SSTable 的文件列表。你需要列出所有包含 SSTable\
    \ 数据的文件。这些文件具有以下格式：\n    ```\n    ---Data.db\n    ```\n    以下命令可帮助你列出键空间中的所有 `Data.db`\
    \ 文件：\n    ```\n    $ find '/homeuser/Datastax-ddc-3.2.0/data/keyspace1' -iname\
    \ \"*Data.db*\"\n    ```\n    你生成的 SSTable 文件列表（`.db` 文件）将如下所示：\n    ```\n   \
    \ /data/cycling/cyclist_by_country-82246fc065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
    \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
    \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-2-big-Data.db\n\
    \    ```\n    将 SSTable 列表收集到文本文件中有助于你在第 5 步执行批处理以将所有 SSTable 标记为已修复。\n3.  仅在此节点上运行完整修复。\n\
    \    ```\n    $ nodetool repair\n    ```\n    默认情况下，修复是完整且顺序执行的（而非并行）。\n4.  关闭节点。\n\
    5.  使用 `sstablerepairedset` 命令将所有 SSTable 上的 `repairedAt` 标志设置为 `--is-repaired`。在运行增量修复之前，必须设置\
    \ SSTable 的修复状态。\n    ```\n    $ sudo sstablerepairedset --really-set --is-repaired\
    \ -f SSTble-names.txt\n    ```\n    `sstablerepairedset` 工具通过将表标记为已修复或未修复来设置一个或多个\
    \ SSTable 的 `repairedAt` 状态。在这个例子中，你使用了一个包含 SSTable 文件列表的文件，但你也可以指定单个 SSTable\
    \ 来标记单个表的修复状态。\n6.  修复完成后，重新启动节点。\n\n一旦你迁移了集群中的所有节点，你就可以在每个节点上执行增量修复（使用 `nodetool\
    \ repair --inc` 命令）。\n\n## 数据分布与复制\n\n副本是表中一行的拷贝。当 Cassandra 首次将数据写入表时，也将其称为副本。\n\
    \n数据分布和复制是影响 Cassandra 性能的关键主题。要理解 Cassandra 如何在集群中分布数据并复制该数据的副本，你需要理解以下主题：\n\n\
    *   虚拟节点\n*   复制策略\n*   分区器与分区策略\n*   探测器\n\n在以下部分，我将解释 Cassandra 数据分布和复制的这些关键要素。"
- fmt: '### Virtual Nodes and Data Ownership


    You can use either a single-token architecture or virtual nodes to determine how
    Cassandra distributes data across the nodes in a cluster.


    The database represents the data in a cluster as a ring, with each node responsible
    for a chunk of the ring of data. Cassandra assigns each node one or more ranges
    of data, described by a token. A token is a 64-bit integer ID that helps identify
    the partitions in the ring. The tokens can range from -2 to the power of 63 to
    2 to the power of 63 -1. The tokens determine the position of the nodes in the
    ring.


    Each node in the ring owns a range of values that is greater than the token of
    the preceding node and less than or equal to its token. This way the token ranges
    are spread across the nodes that live in different racks.


    Virtual nodes, simply called vnodes, help you distribute data at a more granular
    level than by calculating tokens. Vnodes automatically calculate and assign tokens
    to each of the nodes in a cluster. This eliminates the need for you to determine
    the partition ranges by calculating and assigning tokens.


    In a non-vnode environment, there’s just one token per node, and most of the time
    a node owns just one contiguous range in the ringspace, and there’s often one
    range per node. Vnodes allow multiple tokens or ranges that are randomly selected
    and are non-contiguous, thus giving you many small token ranges that belong to
    each node.


    Each of the virtual nodes owns a portion of the token space. Cassandra randomly
    distributes the virtual nodes among the physical nodes; a physical node doesn’t
    own a contiguous range of virtual nodes. Cassandra recommends 256 virtual nodes
    in a cluster, so if you have 16 nodes in your cluster, each of the physical nodes
    will be assigned 16 virtual nodes on a random basis, with each virtual node responsible
    for a different token range.


    Since you always replicate data in a Cassandra database, it means that the database
    stores each of the virtual nodes on multiple nodes.


    Vnodes make it easy to rebalance data across the cluster when you add or remove
    nodes. New nodes automatically assume responsibility for an even amount of data
    from the rest of the nodes. Similarly, when a node goes out of the cluster, the
    rest of the nodes divide its data amongst themselves. A dead node is rebuilt quickly
    since all nodes in the cluster help distribute its data across themselves.


    Vnodes help you employ heterogeneous hardware because they allow you to vary the
    proportion of vnodes assigned to each node based on the physical capacity of the
    node.


    You can use different token architectures across a cluster, with different datacenters
    employing different architectures. That is, some data centers may use vnodes,
    and other data centers, no vnodes. However, all nodes in a single datacenter must
    either be either vnode-enabled or use a single-token architecture.


    ### How Data Is Distributed Across a Cluster


    When you create a datacenter, the database evenly distributes the workload among
    the nodes. Over time, as you add and/or remove nodes, the topology of the datacenter
    changes and the workload could become unbalanced.


    A token assigns a range of data to a specific node that’s a part of a Cassandra
    cluster. The token or tokens of a node determine the node’s range of data. Each
    of the nodes is responsible for the ring’s region between itself and its predecessor.


    Let’s say the range of tokens is 0 to 100, and you have four nodes in the cluster.
    The tokens for the nodes will be 0, 25, 50, and 75 in this case, assuring that
    each node is responsible for an equal range of the data.


    In earlier releases (prior to Cassandra 1.2), you had to calculate and assign
    a single token to each node. Figure [5-3](#A436674_1_En_5_Chapter.html#Fig3) shows
    this architecture.


    ![A436674_1_En_5_Fig3_HTML.jpg](A436674_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    A single-token architecture


    As Figure [5-3](#A436674_1_En_5_Chapter.html#Fig3) shows, each of the six nodes,
    `Node1`–`Node6`, is assigned a single token, `A`, `B`, `C`, `D`, `E`, and `F`.
    The single token represents a location within the ring. Each node will have the
    data that is determined by mapping the partition key to a token value within the
    range of data assigned to each node.


    > Tip

    >

    > Nothing prevents you from setting a replication factor greater than the number
    of nodes in a cluster. Normally it isn’t a smart idea to do this because it really
    doesn’t offer enhanced reliability. However, in some circumstances, you can do
    this in anticipation of adding more nodes later on.


    Assuming a replication factor greater than one, in addition to the range assigned
    to it, each node will also store copies of rows from the other nodes. For example,
    assuming a replication factor of four, Figure [5-4](#A436674_1_En_5_Chapter.html#Fig4)
    shows how each node stores data from ranges other than the single range assigned
    to it. In addition, each of the nodes occupies a contiguous partition range in
    the ring space.


    Virtual nodes allow each node to own multiple smaller partition ranges distributed
    in the cluster instead of a single token. As with single tokens, Vnodes use consistent
    hashing to distribute data across the cluster without generating and assigning
    tokens. Figure [5-4](#A436674_1_En_5_Chapter.html#Fig4) shows a ring with virtual
    nodes.


    ![A436674_1_En_5_Fig4_HTML.jpg](A436674_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    A ring with virtual nodes


    As Figure [5-4](#A436674_1_En_5_Chapter.html#Fig4) shows, virtual nodes are non-contiguous
    and are randomly assigned to the nodes. Cassandra determines to which partition
    range it must assign a table row by the hash of the partition key.


    #### Consistent Hashing


    Cassandra uses constant hashing to partition data according to the partition key.
    This enables the cluster to distribute data across the nodes with a minimal reorganization
    when you add or remove nodes.


    Let’s say you have a four-node cluster with the following data in a table:


    | Name | Age | Car | Gender |

    | --- | --- | --- | --- |

    | Jim | 36 | Camaro | M |

    | Carol | 37 | BMW | F |

    | Johnny | 12 | Ferrari | M |

    | Suzy | 10 | Ford | F |


    Each of the four nodes is responsible for a range of data based on the hash values.
    Assuming you’re using the default `Murmur3 partitioning strategy` , Cassandra
    assigns the following hash values to each partition key:


    | Partition Key | Murmur3 Hash Value |

    | --- | --- |

    | Jim | -2245462676723223822 |

    | Carol | 7723358927203680754 |

    | Johnny | -6723372854036780875 |

    | Suzy | 1168604627387940318 |


    Cassandra determines the nodes on which it ought to store the four values according
    to the value of the partition key. As you can see, the partition key is hashed
    to a specific range and each node is assigned a range. In this example, Cassandra
    stores the four rows in the four nodes as shown here:


    | Node | Start Range | End Range | Partition Key | Hash Value |

    | --- | --- | --- | --- | --- |

    | A | -9223372036854775808 | -4611686018427387904 | Johnny | -6723372854036780875
    |

    | B | -4611686018427387903 | -1 | Jim | -245462676723223822 |

    | C | 0 | 4611686018427387903 | Suzy | 1168604627387940318 |

    | D | 4611686018427387904 | 9223372036854775807 | Carol | 7723358927203680754
    |


    > Note

    >

    > You must use the same token architecture for all nodes in a datacenter, whether
    it be a single-token or a vnode-based architecture.


    ### How to Distribute Token Ranges


    When you enable vnodes, there are two ways to distribute token ranges in a datacenter:
    the allocation algorithm and the random selection algorithm. I explain these algorithms
    in this section.'
