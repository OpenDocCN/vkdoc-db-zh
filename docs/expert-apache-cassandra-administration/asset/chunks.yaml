- fmt: "# Storing Cassandra Data on Docker and Building a Cluster with BDD\n\n## Storing\
    \ Cassandra Data on Docker\n\nThere's more than one way to store data used by\
    \ Cassandra that runs in a Docker container. Two of the options are the following:\n\
    \n*   **Using Docker volumes**: By default, Docker manages the data storage by\
    \ writing the Cassandra data files to the host's file system using internal volume\
    \ management. While the containers can easily view and access this data, the same\
    \ isn't true for tools and applications that run on Docker, but directly on the\
    \ host server. They may not be able to easily locate Cassandra's data files. Also,\
    \ when you shut down the container, or it dies, or if the Docker host dies, the\
    \ data is lost.\n*   **Creating a data directory on the host server**: You can\
    \ also mount a host directory as a data volume. You mount the data directory on\
    \ the host to a directory visible from inside a container. This way, tools and\
    \ applications can easily access the files in the host system. You just need to\
    \ make sure to correctly set up the directory permissions and any ACLs (access\
    \ control lists, which control access to directories), etc. on the host system\
    \ so users can access those directories.\n\nHere's an example that shows how to\
    \ mount a volume with the Docker host's file system:\n\n```\n$ docker run –name\
    \ my_container -v /host/dir://container/dir cassandra\n```\n\nWhen you do this,\
    \ everything that the container process writes to the `/container/dir` directory\
    \ is written directly to the `/host/dir` directory on the host file system.\n\n\
    > **Note**: CassandraCloud is a tool from Cloudurable that simplifies the configuration\
    \ of Cassandra for various environments, including, EC2, Docker, and VirtualBox.\
    \ For details, please go to [`https://cloudurable.github.io/cassandra-cloud/`](https://cloudurable.github.io/cassandra-cloud/).\n\
    \n## Creating a Cassandra Cluster Using Docker-Compose and Behavior-Driven Development\n\
    \nYou can quickly set development and test environments for Cassandra by using\
    \ behavior-driven development. `BDD` is in many ways similar to test-driven development\
    \ (`TDD`), but whereas the latter focuses on unit testing and integration testing,\
    \ `TDD` focuses on the interaction between a system and its users.\n\nWhen you\
    \ use `BDD`, you describe what should happen in various scenarios. For example,\
    \ for a web site, you describe the workflow in the form of user clicks and user\
    \ entry of data into forms. For a system administrator, the workflow is comprised\
    \ of the commands entered by the system administrator when he or she interacts\
    \ with systems and programs.\n\nIn this section, I show how to use `BDD` and a\
    \ tool called `Cucumber` along with `Docker Compose` to develop new Docker containers\
    \ running Cassandra. Here's how `BDD` and `Docker Compose` help you:\n\n*   `BDD`\
    \ helps develop the new Docker containers in a test-driven fashion.\n*   `Docker\
    \ Compose` helps you orchestrate Docker containers.\n\nTogether, `BDD` (plus `Cucumber`)\
    \ and `Docker-Compose` make for an exciting way to spin up new clusters. Although\
    \ you can do similar things with `Vagrant`, a tool that makes it easy to spin\
    \ up virtual machines for development, the method I describe here is far easier\
    \ and more fun.\n\n### Getting the Prerequisites Out of the Way\n\nThe three things\
    \ you need to have to set up a Cassandra cluster using `BDD` are the following:\n\
    \n*   **Docker**: As explained, Docker is a container platform that helps you\
    \ create and manage containers.\n*   **Docker Compose**: This is a tool that helps\
    \ you define and run multi-container Docker applications. You use a Compose file\
    \ to configure the services your application requires. Following this you can\
    \ create and start all the services with a single command, as shown here:\n  \
    \  ```\n    $ docker-compose up -d\n    ```\n*   **Cucumber**: `Cucumber` is a\
    \ testing tool that helps test other software by running automated acceptance\
    \ tests written in a `BDD` style.\n\n#### Installing Docker\n\nYou need Docker,\
    \ and I assume you already have it, if you've followed my earlier discussion on\
    \ running Docker-based Cassandra clusters. If not, you can download and install\
    \ Docker.\n\n#### Installing Docker-Compose\n\nYou can install `Docker-Compose`\
    \ by doing the following (on an Ubuntu system):\n\n```\n# curl -L https://github.com/docker/compose/releases/download/1.14.0/docker-compose-'uname\
    \ -s'-'uname -m' > /usr/local/bin/docker-compose\n# chmod +x /usr/local/bin/docker-compose\n\
    ```\n\nTest the installation by invoking `docker-compose`.\n\n```\n# docker-compose\n\
    Define and run multi-container applications with Docker.\nUsage:\ndocker-compose\
    \ [-f ...] [options] [COMMAND] [ARGS...]\ndocker-compose -h|--help\n#\n```\n\n\
    #### Installing Cucumber\n\nI'm using an Ubuntu system, so I install `Cucumber`\
    \ by doing the following:\n\n```\n$ gem install cucumber\nFetching: gherkin-4.1.3.gem\
    \ (100%)\n...\nDone installing documentation for gherkin, cucumber-core, cucumber-wire,\
    \ cucumber after 4 seconds\n4 gems installed\n$\n```\n\nIt's a good idea to install\
    \ an additional tool called `bundler`. `Bundler` offers a consistent environment\
    \ for Ruby-based projects (such as `Cucumber`, which we're going to use). It does\
    \ this by tracing and installing all the gems that you need with the correct versions.\
    \ In other words, `bundler` offers a way out of dependency hell.\n\n```\n$ gem\
    \ install bundler\nSuccessfully installed bundler-1.15.1\n1 gem installed\n#\n\
    ```\n\nNow that you have Docker, `Docker-Compose`, and `Cucumber` installed, you're\
    \ ready to spin up a Cassandra cluster using the `BDD` approach. But first, a\
    \ bit about user stories and `BDD`.\n\n### User Stories\n\n`BDD` uses stories\
    \ to express what you want to accomplish. It uses plain language-based `Gherkin\
    \ syntax`, which is quite similar to the way we naturally speak to describe what\
    \ you want to do.\n\nYou describe your main goals as features, as shown here,\
    \ where you want to deploy a new Cassandra cluster:\n\n> Feature: Cassandra Cluster\n\
    >   As a Big Data Administrator\n>   I want to deploy a Cassandra cluster\n>   So\
    \ I can store and process massive quantities of data\n\nOnce you describe your\
    \ high-level goals, you describe specific scenarios that make the goal happen.\
    \ In this case, you want to spin up a Cassandra database and test its version.\n\
    \n> Scenario: Launch a CQL Shell\n>   Given the services are running\n>    And\
    \ I run `cqlsh -e 'show version'` on `cassandra`\n>    Then I should see \"CQL\
    \ spec 3.4.2\"\n>    And I should see \"Cassandra 3.7\""
