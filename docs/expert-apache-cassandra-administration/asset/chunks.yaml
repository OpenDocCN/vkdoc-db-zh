    \ data from snapshots that involves a restart of the nodes.\n\n1.  Shut down all\
    \ the nodes of the cluster.  \n2.  Run the `nodetool drain` command to make sure\
    \ you’re not risking a data loss.  \n3.  Remove all files from the `commitlog`\
    \ directory.\n\n    ```\n    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog#\
    \ ls\n    CommitLog-6-1499187293466.log  CommitLog-6-1499187293467.log\n    samalapati@ubuntu:/cassandra/apache-cassandra-3.10/data/commitlog#\
