  trans: '

    ## 处理一致性


    Cassandra 允许您配置一致性级别，以平衡数据的可用性与准确性。您可以在会话级别或单次读写操作中配置一致性。选择的一致性级别决定了数据库必须向应用程序确认的副本数量，以表明读写操作成功完成。

    一致性级别决定了必须有多少节点向协调节点响应才能成功处理事务。Cassandra 使用一致性级别来处理常规（非轻量级）事务。

    一致性显示了一行数据的所有副本之间的同步程度。虽然常规修复操作可以保持副本间数据的差异性较低，但数据库中持续的数据流可能会导致某些副本与其他副本不同步。也就是说，某些副本可能不一致或过时。

    虽然 Cassandra 确实满足 ACID 中的原子性、隔离性和持久性特性，但其满足一致性属性的方式使其区别于典型的关系型数据库管理系统。

    在 CAP 定理的三个要素（一致性、可用性和分区容错性）中，Cassandra 提供了可用性和分区容错性功能，并且您还可以配置数据库以提供一致性和分区容错性能力。

    对于读写操作，Cassandra 都提供了可调一致性，这是最终一致性原则的扩展。您可以为特定的读写操作配置一致性，以确保数据一致并满足应用程序要求。这种可调性使
    Cassandra 可以成为一个具有一致性和分区容错性的系统，或者一个高可用且分区容错的系统。也就是说，它允许您配置 Cassandra 来满足 CAP 三个要求中的任意两个。

    通过调整一致性，您间接地调整了性能，因为一致性与延迟之间存在间接关系；配置的一致性越高，延迟越低，反之亦然。


    > 注意

    >

    > 一致性级别决定了数据可用性（无延迟）与数据准确性之间的权衡。


    Cassandra 提供了可配置的读写一致性级别，以满足您的需求，我将在以下部分进行解释。


    ### 写一致性


    您可以配置写一致性级别，以指定在数据库认为写操作成功之前，必须有多少副本确认写请求。一旦您指定的副本数量报告写入成功，发送写请求的协调节点就会通知应用程序写入完成。

    写操作如何处理宕机或不可用的节点？这正是 Cassandra 利用其 **提示移交** 特性的地方，以确保在不可用节点恢复后，将缺失的数据写入该节点。数据库将未写入的数据作为提示存储在协调节点上（在
    `system.hints` 表中），并在节点再次响应时稍后写入这些数据。

    您可以通过发出 `CONSISTENCY` 命令检查默认的一致性级别：

    ```

    cqlsh> consistency;

    Current consistency level is ONE.

    cqlsh>

    ```

    客户端代码可以通过在单个语句中指定所需的一致性级别来覆盖默认的一致性级别：

    ```

    statement = ...

    statement.setConsistencyLevel(ConsistencyLevel.LOCAL_ONE);

    ```

    您可以配置各种写一致性级别。在以下部分中，我将从最强（`ALL`）到最弱（`ANY`）描述这些写一致性级别。


    #### ALL （强一致性）


    `ALL` 一致性级别提供最高级别的一致性，但权衡是，与其他一致性级别相比，它提供的可用性也最低。在 `ALL` 一致性级别下，为了使对一个分区的写入成功，数据库必须在集群中所有副本节点上执行对提交日志和内存表的写入。这意味着必须回复的节点数量应与您配置的副本因子相同。即使只有一个副本没有响应，数据库也会将该写操作标记为失败。


    #### 基于仲裁的级别 （强一致性）


    Cassandra 提供了几个基于仲裁的级别，它们都提供强一致性。以下是不同的基于仲裁的一致性级别：

    -   `EACH_QUORUM`：通过要求写入必须写到集群中每个数据中心的仲裁副本节点上的提交日志和内存表来提供强一致性。当您希望在多个数据中心集群中确保所有数据中心具有相同的严格一致性时，请指定
    `EACH_QUORUM` 一致性级别。设置此一致性级别意味着，如果一个数据中心宕机，无法在该数据中心达到仲裁，则读取将失败。

    -   `QUORUM`：提供强一致性。在此一致性级别下，如果写入已写入仲裁节点上的提交日志和内存表，Cassandra 就认为写入成功。与 `EACH_QUORUM`
    一致性级别不同，这些节点可以跨越集群中的多个数据中心。您可以在单个或多个数据中心集群中指定此级别。此级别通过将整个集群视为一个单元而非单个数据中心来帮助您维持强一致性。

    -   `LOCAL_QUORUM`：提供强一致性。此一致性级别要求数据库将写入完成到本地节点（即与协调节点属于同一数据中心的节点）的仲裁节点上的提交日志/内存表。您只能在具有副本放置策略（如
    `NetworkTopologyStrategy`）和适当配置的 Snitch 的多数据中心集群中使用 `LOCAL_QUORUM` 一致性。


    > 注意

    >

    > 当您使用 `QUORUM` 一致性级别执行写操作时，即使其中一个副本死亡，您也总能获得正确的数据。


    #### ONE、TWO、THREE 和 LOCAL_ONE 一致性级别 （弱一致性）


    `ONE` 一致性级别并不严格。它要求数据库至少对一个副本节点执行对提交日志和内存表的写入。`TWO` 和 `THREE` 一致性级别类似但更严格，因为它们分别要求写入两个和三个副本节点。

    当您的集群中有多个数据中心时，`ONE` 一致性级别是可行且可取的。但是，当一个数据中心离线时，连接会自动切换到其他数据中心的在线节点。

    实现高性能和持久性的最低一致性级别是 `ONE`。即使该单个节点宕机，由于它已经将数据写入提交日志，当它再次启动时可以重放提交日志。

    `LOCAL_ONE` 一致性级别通过要求至少一个本地数据中心节点确认写入来防止跨数据中心流量。

    请注意以下几点：

    -   如果您的一致性级别是 `ONE`，并且一个副本在写入后不久崩溃，则数据将丢失。

    -   如果您的一致性级别是 `ONE`，并且写操作超时，后续的读操作可能返回旧值或新值。您将无法知道数据是否正确。

    -   如果您的一致性级别是 `ONE`，一个宕机的节点在恢复时将向您显示过时的数据，直到该节点获得正确的数据或数据库完成读修复操作。

    '
- fmt: '### ANY


    `ANY` 一致性级别提供了最高的可用性，但以一致性为代价，因为此级别提供最低的一致性。此级别保证写入永远不会失败，但你需要为此保证付出写入速度变慢的代价。此一致性级别工作方式如下：


    *   数据库必须在集群中的至少一个节点上执行写入。

    *   如果某个分区键的所有节点都不可用，写入仅在其中一个节点重新启动后才会成功，并且，通过提示移交功能，该节点会追赶丢失的写入。因此，这种一致性级别允许一个提示计为一次成功的写入。


    一致性级别 `ANY` 适用于希望即使在所有副本节点都关闭的情况下（即即使数据库无法满足 `ONE` 一致性级别）也接受写入的应用程序。一致性级别 `ANY`
    保证写入是持久的，一旦目标副本变得可用并接收到重放的提示，该写入将可由数据库读取。


    ### Calculating the Quorum


    仲裁的概念在配置多种写入和读取一致性级别时起着重要作用。仲裁指的是需要响应的节点数量，以便 Cassandra 认为写入或读取操作成功。


    在单数据中心集群中计算仲裁时，你只需要考虑一个数据中心的复制因子。在多数据中心集群中，你需要考虑所有数据中心的复制因子，这些因子不必相同。集群中的数据中心越多，仲裁就越高，因为需要更多副本节点响应，Cassandra
    才会认为读/写操作成功。


    基于仲裁的一致性级别要求将数据写入至少构成仲裁的节点数量。


    你可以借助以下公式计算仲裁：


    ```

    quorum = (sum_of_replication_factors/2) + 1,

    ```


    其中 `sum_of_replication_factors` 的值是集群中所有数据中心的所有 `replication_factor` 设置的总和。


    例如，如果复制因子为 3，在单数据中心集群中，仲裁是 3/2 加 1，得到 2.5，但你向下舍入为整数，即 2。


    仲裁为 2 意味着单数据中心集群可以容忍一个副本宕机。如果仲裁为 4，集群在六个节点中可以容忍两个节点宕机。


    重要的是要理解 `LOCAL_QUORUM` 与 `QUORUM` 类似，它考虑的是包含协调节点的节点所在数据中心的复制因子。Cassandra 在计算仲裁时只考虑本地副本节点并忽略其他数据中心。


    #### How Consistency Works in Practice


    你配置的复制因子以及读写一致性级别将共同决定读写操作的可靠性。


    例如，如果满足以下条件，数据库可以保证最终一致性：


    R + W <=N


    其中


    *   R 是读操作的一致性级别。

    *   W 是写操作的一致性级别。

    *   N 是复制因子。


    假设你将复制级别设置为 3。一个使用 `QUORUM` 一致性级别的读操作和一个使用 `ONE` 一致性级别的写操作将确保最终一致性。这是因为 `QUORUM`
    一致性级别需要读取两个副本，而 `ONE` 写入一致性级别需要写入一个副本，总共三个副本，与复制因子数量相同。


    如果你需要更强的一致性，可以通过确保在复制级别为 3 时，读写操作的一致性级别总和至少为 4 来保证。这意味着读操作可以使用两个副本来验证数据，写操作也将使用两个副本来验证写入，从而产生强一致性。换句话说，你可以通过确保以下条件成立来保证强一致性：


    ```

    R + W > N

    ```


    如果速度至关重要，你可以在提供强一致性的同时通过将写入一致性级别降低到 1 但将读取一致性级别提高到 3 来实现。你将更快地写入数据，但读取操作因此会有额外的延迟。


    ### Read Consistency


    与写入一致性一样，你可以配置多个读取一致性级别。并且，在选择各种一致性级别时，与写入一致性情况一样，你面临着一致性和可用性之间的权衡。对于读取操作，你配置的一致性级别决定了在数据库返回结果之前，必须有多少个副本节点成功响应读取请求。最终一致性意味着当数据库等待来自节点的信息时，其他工作会在后台继续进行。


    由于 Cassandra 是一个分布式数据库，你查询的数据的最新值不一定在任何给定时间存在于集群的每个节点上。客户端应用程序为其请求配置一致性级别，以管理响应时间和数据准确性之间的权衡。


    更高的一致性级别要求更多节点响应查询，从而提供更多保证，确保每个副本中的数据是相同的。如果两个副本返回具有不同时间戳的数据，Cassandra 将具有更近时间戳的数据返回给客户端。然后它会启动一个读修复来更新具有过时值的副本上的值，以便该副本也具有最新值，从而确保其一致性。


    简而言之，你可以配置以下读取一致性级别，每个级别都有不同数量的副本参与满足读取请求：


    *   `ONE`：从最近的副本返回数据

    *   `QUORUM`：从大多数副本返回最新的数据

    *   `ALL`：从集群中的所有副本返回最新的数据


    以下各节总结了每个读取一致性级别的可用性和一致性权衡。


    注意


    务必理解复制因子和一致性级别之间的差异和关系。你在键空间级别设置复制因子，客户端则按查询指定一致性级别。一致性级别基于复制因子，因为复制因子决定了写入期间存储数据的副本数量。而一致性级别决定了应响应多少个节点以表明读取或写入操作成功。


    #### ALL (Strict Consistency)


    `ALL` 一致性级别以牺牲可用性为代价提供最高的一致性。当你设置此级别时，数据库仅在收到所有副本的响应后才返回你的查询结果。如果任何副本没有响应，查询将失败。与许多一致性级别一样，数据库会在必要时执行读取修复。


    当你指定 `ALL` 一致性级别时，如果集群中持有该数据的任何节点当时无响应或未在超时时间内响应，读取操作将失败。你使用 `rpc_timeout_in_ms`
    属性配置此超时。默认超时为 10 秒。'
  raw: '#### ANY


    The `ANY` consistency level offers the highest availability, but at the cost of
    consistency, since this level offers the lowest consistency. This level guarantees
    that a write will never fail, but you pay for this guarantee with slower writes.
    Here’s how this consistency level works:


    *   The database must perform the write on at least one node in the cluster.

    *   If none of the nodes for a partition key are available, the write succeeds
    only after one of the nodes comes back up, and, using the hinted handoff feature,
    catches up with the lost writes. This level of consistency therefore allows a
    hint to count towards a successful write.


    The consistency level `ANY` is meant for applications that want the database to
    accept writes even when all of the replica nodes are down, that is, even when
    the database can’t satisfy the consistency level `ONE`. The consistency level
    `ANY` guarantees that a write is durable and will be readable by a database once
    the target replica becomes available and it receives the replayed hints.


    ### Calculating the Quorum


    The concept of a quorum plays a significant role in configuring several write
    and read consistency levels. A quorum refers to the number of nodes that need
    to respond for Cassandra to consider a write or read operation successful.


    When computing the quorum in a single datacenter cluster , you need to consider
    the replication factor for just one datacenter. In a cluster with multiple datacenters,
    you consider the replication factor in all datacenters, which need not be the
    same. The more datacenters in a cluster, the higher the quorum, since more replica
    nodes need to respond for Cassandra to consider a read/write operation successful.


    Quorum-based consistency levels require the writing of data to at least the number
    of nodes that constitute a quorum.


    You can calculate the quorum with the help of the following formula:


    ```

    quorum = (sum_of_replication_factors/2) + 1,

    ```


    where the value of the `sum_of_replication_factors` is the sum of all the `replication_factor`
    settings for all datacenters within the cluster.


    For example, of the replication factor is 3, in a single datacenter cluster, the
    quorum is 3/2 plus 1 which gives you 2.5, but you round it down to a whole number,
    which makes it 2.


    A quorum of 2 means that the cluster with a single datacenter can tolerate one
    replica being down. If the quorum is 4, the cluster can tolerate two nodes down
    in a six-node cluster.


    It’s important to understand that `LOCAL_QUORUM`, which is similar to `QUORUM`,
    considers the replication factor of the datacenter that contains the coordinator
    node. Cassandra will consider only local replica nodes and ignores other datacenters
    while computing the quorum.


    #### How Consistency Works in Practice


    The replication factor and the read and write consistency levels that you configure
    will together determine how reliable your read and write operations are.


    For example, if you satisfy the following, the database can guarantee eventual
    consistency:


    R + W <=N


    where


    *   R is the consistency level of read operations.

    *   W is the consistency level of write operations.

    *   N is the replication factor.


    Let’s say you set the replication level to 3\. A read operation that uses the
    `QUORUM` consistency level and a write operation using the `ONE` consistency level
    will then ensure eventual consistency. This is so because the `QUORUM` consistency
    level needs to read two replicas and the `ONE` consistency level for writes needs
    to write to one replica, making the total three replicas, the same number as the
    replication factor.


    If you need a stronger consistency, you can guarantee it by making sure that the
    consistency levels for reads and writes together are at least four when your replication
    level is 3\. This means that a read operation can use two replicas to verify data
    and the write operations will use two replicas as well to verify the writes, yielding
    a strong consistency. In other words, you can guarantee strong consistency by
    making sure the following condition is true:


    ```

    R + W > N

    ```


    If speed is of the essence, you can achieve it while still providing strong consistency
    by lowering the write consistency level to 1 but raising the read consistency
    level to 3\. You’re going to write data faster but your read operations will have
    additional latency as a result.


    ### Read Consistency


    As with write consistency, there are multiple read consistency levels you can
    configure. And, as in the case of write consistency, you face a tradeoff between
    consistency and availability when choosing from various consistency levels. For
    a read operation, the consistency level you configure determines how many replica
    nodes must respond successfully to a read request before the database returns
    the results. Eventual consistency means other work keeps going on in the background
    while the database is waiting on the information from the nodes.


    Since Cassandra is a distributed database, the most recent value of data that
    you query isn’t necessarily present on every node of the cluster at any given
    time. Client applications configure consistency levels for their requests to manage
    the tradeoff between response time and data accuracy.


    A higher consistency level requires more nodes to respond to a query, thus providing
    more of an assurance that the data in each replica are identical. If two replicas
    return data with different timestamps, Cassandra returns the data with the more
    recent timestamp to the client. It then initiates a read repair to update the
    values on the replica with the outdated values so it has the latest value as well,
    thus ensuring that it’s consistent.


    Briefly, you can configure the following read consistency levels, each with a
    different number of replicas that participate in satisfying read requests :


    *   `ONE`: Returns data from the nearest replica

    *   `QUORUM`: Returns the most up-to-date data from a majority of the replicas

    *   `ALL`: Returns the most up-to-date data from all the replicas in a cluster


    The following sections summarize the availability and consistency tradeoffs for
    each of the read consistency levels .


    Note


    Be sure to understand the differences and the relationship between the replication
    factor and the consistency levels. You set the replication factor at the keyspace
    level and the clients specify the consistency levels per query. The consistency
    level is based on the replication factor, since the replication factor determines
    the number of replicas that store data during a write. And the consistency level
    determines the number of nodes that should respond to indicate the success of
    a read or write operation.


    #### ALL (Strict Consistency)


    The `ALL` consistency level provides the highest consistency at the expense of
    availability. When you set this level, the database returns your query results
    only after it has heard from all of the replicas. If any of the replicas don’t
    respond, the query fails. As with many of the consistency levels, the database
    performs a read repair if necessary.


    When you specify the `ALL` consistency level, the read operation fails if any
    node on the cluster with that data is unresponsive at that time or fails to respond
    within the timeout. You configure this timeout with the `rpc_timeout_in_ms` property.
    The default timeout is 10 seconds.'
