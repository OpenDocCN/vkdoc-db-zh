    Port 7199: For Cassandra JMX monitoring


    ##### Cassandra Client Ports


    Port 9042: Cassandra native client port


    Port 9160: Cassandra client port (Thrift)


    #### Selecting a Name for the Datacenter


    Before you create the multi-node cluster, select a naming convention for each
    datacenter and rack in the cluster. The datacenter name is a required parameter
    and serves to ensure that nodes that don’t belong to this datacenter don’t attempt
    to join it.


    Tip


    Once you assign a name for a datacenter, you can’t change it later.


    In this case, I select datacenter1 as the name of the datacenter .


    #### Gathering the IP Addresses for All of the Nodes


    You need to get the IP addresses for all the nodes in the cluster. In this case,
    I have six nodes and their IP addresses are


    ```

    node0 192.168.177.132

    node1 192.168.177.133

    node2 192.168.177.134

    node3 192.168.177.135

    node4 192.168.177.136

    node5 192.168.177.137

    ```


    The six-node cluster will span two racks and there’s one datacenter.


    #### Selecting the Nodes to Serve as Seed Nodes


    A seed provider is one of the nodes in the cluster that helps Cassandra nodes
    to find each other and learn the topology of the ring. This is a required parameter
    for a multi-node cluster.


    You specify the seed nodes(s) for a cluster by configuring the `seed_provider`
    parameter in the `cassandra.yaml` file.


    You configure the `seed_provider` parameter by setting the value for the `seeds`
    attribute of this parameter, as shown here:


    ```

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    ```


    You provide the list of seed nodes as a comma-delimited set of IP addresses (“<ip1>,
    <ip2>, <ip3>”).


    You can make do with a single seed node per datacenter, but the best practice
    is to have more than one seed node. In this case, I chose to have two seeds, so
    my `seeds` attribute has the value


    ```

    "192.168.177.132,192.168.177.135"

    ```


    ### Configuring the Cluster


    You configure the cluster properties in the all-important `cassandra.yaml` file,
    which you can find in the `$CASSANDRA_HOME/conf` directory.


    As I mentioned in Chapter [2](#A436674_1_En_2_Chapter.html), there are hundreds
    of parameters you can configure in this file, but listing a bunch of them here
    doesn’t do you a whole lot of good. I therefore list a minimal set of properties
    to start the new cluster, meaning that the rest of the parameters will be using
    their default values. As you move through the rest of the chapters, you’ll find
    explanations for all the configuration parameters you can specify in the `cassandra.yaml`
    file.


    Set the following properties in the `cassandra.yaml` file for each node of the
    cluster. Alternatively, you can set the properties in one node and copy the file
    over to the nodes using the pdsh tool described earlier.


    #### The num_tokens Property


    The `num_tokens` property defines the number of tokens Cassandra assigns to a
    specific node. The higher the number of tokens relative to the rest of the nodes,
    the greater the amount of data this node will store. Since ideally all nodes are
    of equal size, you want all nodes to have the same number of tokens.


    Note


    The `initial_token` property is a legacy parameter that you must leave alone.
    If you specify the `initial_token` property, it’ll override the `num_tokens` property.


    The `num_tokens` property helps create virtual nodes or vnodes, which help break
    up the token range into many small ranges. Each Cassandra node is then assigned
    a set of the vnodes. Cassandra calculates the token ranges for each cluster node
    based on that node’s `num_tokens` value.


    Vnodes are especially useful when dealing with clusters that have machines with
    different configuration and capacities. You can assign more vnodes to machines
    that have more computing resources available by specifying a higher value for
    the `num_tokens` property for these nodes when compared to the rest of the nodes.


    Since vnodes help break up the token ring into multiple smaller ranges, they help
    load cluster operations more evenly across the nodes, and thus speed up several
    operations such as bootstrapping new nodes.


    The default as well as the recommended value for the `num_tokens` property is
    256.


    #### The –seeds Property


    I’ve already explained the `–seeds` property, which requires you to specify the
    internal IP address for the node(s) you’ve selected as the seed node(s0).


    #### The listen_address Parameter


    The `listen_address` parameter refers to the IP address of the node. This is the
    network address to bind to and tell other Cassandra nodes to connect to. You can
    set this or leave it alone. If you don’t set this property, Cassandra gets the
    local address from the host, but sometimes it’s unable to get the correct address,
    in which case you must provide the `listen_address` in the `cassandra.yaml` file.


    You must not set the value 0.0.0.0 for the `listen_address` property.'
  trans: '

    ## 初始化 Cassandra 多节点集群（单数据中心与多数据中心）


    在第 2 章中，你已经学习了如何配置单节点的 Cassandra 集群。在本章中，你将学习如何配置多节点的 Cassandra 集群，首先是单数据中心，然后是多数据中心。


    在多节点集群中，Cassandra 会自动发现节点，因此要设置一个 Cassandra 集群，你只需在所有节点上安装 Cassandra，如下一小节所示。安装
    Cassandra 后，你启动 Cassandra 实例，它们会自动组成一个集群。你只需要让每个节点知道其余节点的 IP 地址；这就够了！


    正如你从第 1 章中可能回忆起的那样，**数据中心**只不过是一组节点的集合，代表了一组具有相同复制属性的节点。数据中心可以是逻辑的，也可以是物理的。


    在接下来的讨论中，我将从头开始创建一个 Cassandra 集群。如果你是想将一个单节点集群转变为多节点集群，则必须首先停止 Cassandra 服务器并清除数据，如第
    2 章所述。


    我在这里展示的步骤将使你能够使用单数据中心安装、配置和运行一个多节点集群。要设置具有多个数据中心的多节点集群，你需要遵循相同的步骤，但要在 `cassandra-rackdc.properties`
    文件中配置多个数据中心，正如我在本节后面解释的那样。


    ### 先决条件


    在启动你的多节点集群之前，你必须处理一些先决条件，如下文所述。


    #### 配置防火墙端口访问


    当你有一个单节点集群时，防火墙访问端口不是什么大问题。在多节点集群中，你必须确保，如果承载 Cassandra 集群的节点上运行着防火墙，你必须打开多个端口，包括一些
    Cassandra 端口，以使节点之间能够相互通信。


    如果你在其中某个节点上启动 Cassandra 后忘记打开端口，该节点将不会加入集群，并且会作为一个独立的 Cassandra 实例运行。


    你必须打开三组端口：公共端口、Cassandra 节点间端口和 Cassandra 客户端端口。


    ##### 公共端口


    端口号 `22`，用作 SSH 端口


    ##### Cassandra 节点间端口


    端口 `7000`：用于 Cassandra 节点间集群通信


    端口 `7001`：用于 Cassandra SSL 节点间集群通信


    端口 `7199`：用于 Cassandra JMX 监控


    ##### Cassandra 客户端端口


    端口 `9042`：Cassandra 原生客户端端口


    端口 `9160`：Cassandra 客户端端口 (Thrift)


    #### 为数据中心选择名称


    在创建多节点集群之前，为集群中的每个数据中心和机架选择一个命名约定。数据中心名称是一个必需参数，用于确保不属于此数据中心的节点不会尝试加入它。


    提示


    一旦你为数据中心分配了一个名称，以后就无法更改。


    在这里，我选择 `datacenter1` 作为数据中心的名称。


    #### 收集所有节点的 IP 地址


    你需要获取集群中所有节点的 IP 地址。在这个例子中，我有六个节点，它们的 IP 地址是：


    ```

    node0 192.168.177.132

    node1 192.168.177.133

    node2 192.168.177.134

    node3 192.168.177.135

    node4 192.168.177.136

    node5 192.168.177.137

    ```


    这个六节点集群将跨越两个机架，并且有一个数据中心。


    #### 选择作为种子节点的节点


    **种子提供者**是集群中的一个节点，它帮助 Cassandra 节点相互发现并了解环的拓扑结构。这是多节点集群的一个必需参数。


    你通过配置 `cassandra.yaml` 文件中的 `seed_provider` 参数来指定集群的种子节点。


    你通过设置此参数的 `seeds` 属性的值来配置 `seed_provider` 参数，如下所示：


    ```

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    ```


    你以逗号分隔的 IP 地址列表（“<ip1>, <ip2>, <ip3>”）形式提供种子节点列表。


    每个数据中心可以只用一个种子节点，但最佳实践是拥有多个种子节点。在这个例子中，我选择有两个种子，所以我的 `seeds` 属性值为：


    ```

    "192.168.177.132,192.168.177.135"

    ```


    ### 配置集群


    你在至关重要的 `cassandra.yaml` 文件中配置集群属性，该文件可以在 `$CASSANDRA_HOME/conf` 目录中找到。


    正如我在第 2 章中提到的，这个文件中有数百个可以配置的参数，但在这里列出一大堆参数对你并没有太大帮助。因此，我列出了启动新集群所需的最少属性集，这意味着其余参数将使用它们的默认值。当你学习后续章节时，你会找到关于可以在
    `cassandra.yaml` 文件中指定的所有配置参数的解释。


    为集群的每个节点在 `cassandra.yaml` 文件中设置以下属性。或者，你可以在一个节点上设置属性，然后使用前面描述的 `pdsh` 工具将文件复制到其他节点。


    #### num_tokens 属性


    `num_tokens` 属性定义了 Cassandra 分配给特定节点的令牌数量。相对于其他节点，令牌数量越高，该节点存储的数据量就越大。由于理想情况下所有节点规模相同，你希望所有节点具有相同数量的令牌。


    注意


    `initial_token` 属性是一个遗留参数，你必须忽略它。如果你指定了 `initial_token` 属性，它会覆盖 `num_tokens` 属性。


    `num_tokens` 属性有助于创建**虚拟节点**或 **vnodes**，这有助于将令牌范围划分为许多小范围。然后，每个 Cassandra 节点被分配一组
    vnodes。Cassandra 根据该节点的 `num_tokens` 值计算每个集群节点的令牌范围。


    Vnodes 在处理具有不同配置和容量的机器的集群时特别有用。你可以为拥有更多计算资源的机器分配更多的 vnodes，通过与其余节点相比，为这些节点的 `num_tokens`
    属性指定更高的值来实现。


    由于 vnodes 有助于将令牌环拆分为多个较小的范围，它们有助于将集群操作更均匀地负载到各个节点上，从而加快一些操作，例如引导新节点。


    `num_tokens` 属性的默认值以及推荐值是 `256`。


    #### –seeds 属性


    我已经解释了 `–seeds` 属性，它要求你指定你选作种子节点的节点的内部 IP 地址。


    #### listen_address 参数


    `listen_address` 参数指的是节点的 IP 地址。这是要绑定的网络地址，并告诉其他 Cassandra 节点连接到此地址。你可以设置它，也可以保持原样。如果你不设置此属性，Cassandra
    会从主机获取本地地址，但有时它无法获取正确的地址，在这种情况下，你必须在 `cassandra.yaml` 文件中提供 `listen_address`。


    你不能将 `listen_address` 属性的值设置为 `0.0.0.0`。

    '
- fmt: '#### `rpc_address` 和 `broadcast_rpc_address` 属性


    `rpc_address` 属性指定用于绑定 Thrift RPC 服务和原生传输服务器的地址。你可以将 `rpc_address` 属性留空，这种情况下，Cassandra
    会根据你为节点配置的主机名来获取它。


    与 `listen_address` 属性的情况不同，你可以为 `rpc_address` 属性指定值 `0.0.0.0`，这种情况下，你必须同时为 `broadcast_rpc_address`
    属性设置值：


    ```

    broadcast_rpc_address: 192.168.177.135

    ```


    #### `endpoint_snitch` 选项


    在 Cassandra 集群中，snitch 有两个作用：


    1.  它告知 Cassandra 网络拓扑信息，以便高效地路由请求。

    2.  它使 Cassandra 能够将数据副本分散在集群中，从而避免关联性故障。Cassandra 使用数据中心和机架来逻辑分组集群的节点。它尽力避免将同一数据的多个副本存储在单个机架上。Cassandra
    提供了半打（六种）snitch，但对于生产环境，首选选项是 `GossipingPropertyFileSnitch`。


    当你选择 `GossipingPropertyFileSnitch` 选项时，你需要在该节点的 `cassandra-rackdc.properties`
    文件中指定数据中心和机架。然后，Cassandra 会通过 gossip 协议将此信息传播到其他节点。


    #### `auto_bootstrap` 属性


    `auto_bootstrap` 属性的默认值是 `true`，并且该参数不会出现在 `cassandra.yaml` 文件中。这个参数使得新的非种子节点将数据迁移到自身。当你正在初始化一个没有数据的新集群时，请添加以下属性：


    ```

    auto_bootstrap=false

    ```


    使用我在这里列出的最小配置属性集，我的 `cassandra.yaml` 文件内容如下：


    ```

    cluster_name: "MyCluster''

    num_tokens: 256

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    listen_address:

    endpoint_snitch: GossipingPropertyFileSnitch

    ```


    #### 配置数据中心和机架名称


    在我的集群中，我有一个数据中心和一个机架。我必须在 `cassandra-rackdc.properties` 文件中指定数据中心和机架名称。


    ```

    # indicate the rack and dc for this node

    dc=DC1

    rack=RACK1

    ```


    我需要在集群的所有六个节点上都这样做。


    至此，Cassandra 的安装和配置就完成了。我将在“启动和停止多节点集群”一节中展示如何启动这个集群。


    ### 使用多个数据中心初始化集群


    前面的讨论展示了如何设置使用单个数据中心和单个机架的 Cassandra 集群。配置使用多个数据中心和机架的集群同样简单！你遵循相同的步骤，只是你需要在 `cassandra-rackdc.properties`
    文件中配置多个数据中心和机架。


    在单数据中心的情况下，我在 `cassandra-rackdc.properties` 文件中指定了以下属性：


    ```

    dc=DC1

    rack=RACK1

    ```


    我想设置两个数据中心，每个数据中心包含我六个 Cassandra 节点中的三个。为了做到这一点，我以如下方式配置 `cassandra-rackdc.properties`
    文件。


    在前三个节点（192.168.177.32, 192.168.177.33, 和 192.168.177.34）的 `cassandra-rackdc.properties`
    文件中，我指定以下数据中心和机架值：


    ```

    dc=dc1

    rack=rack1

    ```


    对于我六节点集群的其他三个节点，我指定以下值：


    ```

    dc=dc2

    rack=rack2

    ```


    这就是创建一个多数据中心集群所需做的全部工作（我把机架改成了 `rack2`，但这其实不是必须的）。


    ### 启动和停止多节点集群


    你的集群已经配置完毕，准备就绪，只是需要将其启动。要启动集群，首先依次启动两个种子节点。完成后，再依次启动其他四个节点。由于这是一个 tarball 安装，我使用以下命令启动节点：


    ```

    $ $CASSANDRA_HOME/bin/cassandra

    ```


    你现在可以通过执行以下命令来检查环是否正在运行：


    ```

    # CASSANDRA_HOME/bin/nodetool status

    ```


    为准备投入使用，所有六个节点的状态都应显示为 `UN`（Up Normal）。


    你可以使用以下脚本集来启动和停止你的多节点集群。


    #### 启动集群的脚本


    没有脚本就无法管理集群。你可以编写比我这里提供的更复杂的脚本，但下面这个脚本在帮助启动集群方面可以胜任工作。


    在这个例子中，我的 Cassandra 集群中有三个节点。


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    sleep 30

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssh $SERVERNAME "usr/share/cassandra/bin/cassandra"

    done

    ```


    `sleep` 命令用于在启动每个服务器前提供一个短暂的间隔。在生产集群中，不带 `sleep` 命令运行此脚本可能会导致问题。


    #### 停止集群的脚本


    你知道可以使用 `cassandra` 命令来启动集群，但不能用它来停止集群。你必须杀死正在运行的 Cassandra 实例的 PID 才能停止它。为了自动化停止一组节点的
    Cassandra 实例，你可以使用以下策略：


    *   使用第一个脚本来遍历服务器列表并调用你的停止脚本。

    *   使用第二个脚本，通过杀死 Cassandra 实例的 PID 来停止服务。


    以下是这两个脚本。


    **脚本 1**


    使用此脚本调用 `cassandra-kill.sh` 脚本。


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssj $SERVERNAME "/usr/share/cassandra/bin/cassandra"

    done

    ```


    **脚本 2 (`cassandra-kill.sh`)**


    你可以创建一个简单的 shell 脚本，如下所示，来关闭一个 Cassandra 节点：


    ```

    #!/bin/bash

    CASS_PID=''ps –ef |grep CasandraDaemon |grep –v grep |awk ''{ print $2 }"

    if [[ "$CASSPID" == '''']]

    then

    echo Cassandra is NOT running

    else

    kill $CASS_PID

    fi

    ```


    ### 集群中节点的启动过程


    在第 [2](#A436674_1_En_2_Chapter.html) 章中，我展示了单节点的启动过程。在本章中，我展示了如何创建一个包含多个节点的集群。请注意，当你启动第一个节点时，它显示已准备好工作，并显示其他节点加入集群。在这种情况下，我正在查看节点
    `192.168.177.132` 的启动消息。


    ```

    INFO  14:12:49 Node /192.168.177.132 state jump to NORMAL

    INFO  14:12:49 Waiting for gossip to settle before accepting client requests...

    INFO  14:12:57 No gossip backlog; proceeding

    INFO  14:12:58 Starting listening for CQL clients on /0.0.0.0:9042 (unencrypted)...

    INFO  14:12:58 Binding thrift service to /0.0.0.0:9160

    INFO  14:12:58 Listening for thrift clients...

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:12:59 Scheduling approximate time-check task with a precision of 10 milliseconds

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 has restarted, now UP

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 InetAddress /192.168.177.135 is now UP

    INFO  14:13:01 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 state jump to NORMAL

    ```


    类似地，当你关闭第二个节点（或它崩溃）时，第一个节点的日志消息会显示该信息：


    ```

    INFO  14:13:42 Handshaking version with /192.168.177.135

    INFO  14:19:14 InetAddress /192.168.177.135 is now DOWN

    ```


    ### 启动时的常见错误


    在运行像 Cassandra 这样的分布式数据库时，你可能会遇到无数错误。我想指出两个常见问题以及如何克服它们。'
  raw: '#### The rpc_address and broadcast_rpc_address Properties


    The `rpc_address` property specifies the address to bind the Thrift RPC service
    and native transport server. You can leave the `rpc_address` property blank, in
    which case Cassandra picks it up based on the hostname you’ve configured for the
    node.


    Unlike in the case of the `listen_address` property, you can specify the value
    0.0.0.0 for the `rpc_address` property, in which case you must also set the value
    for the property `broadcast_rpc_address`:


    ```

    broadcast_rpc_address: 192.168.177.135

    ```


    #### The endpoint_snitch Option


    In a Cassandra cluster, a snitch serves two functions:


    1.  It tells Cassandra about the network topology so it can efficiently route
    its requests.  

    2.  It enables Cassandra to spread the data copies (replicas) around the cluster,
    thus avoiding correlated failures. Cassandra uses datacenters and racks to logically
    group a cluster’s nodes. It tries its best not to store multiple replicas of the
    same piece of data on a single rack. Cassandra offers a half dozen snitches, but
    for production environments, the go-to option is the `GossipingPropertyFileSnitch`
    .  


    When you select the `GossipingPropertyFileSnitch` option, you specify the datacenter
    and the rack in the `cassandra-rackdc.properties` file on that node. Cassandra
    then propagates this information to the other nodes via gossip.


    #### The auto_bootstrap Property


    The default value for the `auto_bootstrap` property is true, and the parameter
    is not present in the `cassandra.yaml` file. This parameter makes new non-seed
    nodes migrate the data to themselves. When you’re initializing a new cluster with
    no data, add the following property:


    ```

    auto_bootstrap=false

    ```


    With the minimal set of configuration properties I’ve listed here, my `cassandra.yaml`
    file looks as follows:


    ```

    cluster_name: "MyCluster''

    num_tokens: 256

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    listen_address:

    endpoint_snitch: GossipingPropertyFileSnitch

    ```


    #### Configuring the Datacenter and Rack Names


    In my cluster, I have a single datacenter and a single rack. I must specify the
    datacenter and rack names in the `cassandra-rackdc.properties` file.


    ```

    # indicate the rack and dc for this node

    dc=DC1

    rack=RACK1

    ```


    I need to do this on all six nodes of the cluster.


    At this point, the installation and configuration of Cassandra is complete. I’ll
    show you how to start up this cluster in the section “Starting and Stopping the
    Multi-Node Cluster .”


    ### Initializing the Cluster with Multiple Datacenters


    The previous discussion shows how to set up a Cassandra cluster that uses a single
    datacenter and a single rack. Configuring a cluster that uses multiple datacenters
    and racks is just as easy! You follow the same steps, except that you configure
    multiple datacenters and racks in the `cassandra-rackdc.properties` file.


    In the single datacenter case, I specified the following properties in the `cassandra-rackdc.properties`
    file:


    ```

    dc=DC1

    rack=RACK1

    ```


    I want to set up two datacenters, each with three of my six Cassandra nodes. In
    order to do this, I configure the `cassandra-rackdc.properties` file in the following
    way.


    In the `cassandra-rackdc.properties` file for the first three nodes, 192.168.177.32,
    192, 168,177.33, and 192.168.177.34, I specify the following values for the datacenter
    and rack:


    ```

    dc=dc1

    rack=rack1

    ```


    For the other three nodes of my six-node cluster, I specify the following values:


    ```

    dc=dc2

    rack=rack2

    ```


    That’s all you need to do to create a cluster with multiple datacenters (I changed
    the rack to rack2, but I really didn’t need to do this).


    ### Starting and Stopping the Multi-Node Cluster


    You have your cluster all configured and ready to go, except that you need to
    start it up. To start the cluster, first start the two seed nodes, one after the
    other. Once you do this, start the other four nodes one after the other. Since
    this is a tarball installation, I start the nodes with the following command:


    ```

    $ $CASSANDRA_HOME/bin/cassandra

    ```


    You can now check that the ring is running by doing this:


    ```

    # CASSANDRA_HOME/bin/nodetool status

    ```


    To be ready for usage, all six nodes should be showing the status UN (Up Normal).


    You can use the following set of scripts to start and stop your multi-node cluster.


    #### Script for Starting the Cluster


    You can’t manage a cluster without scripts. You can write scripts that are more
    sophisticated than what I offer here, but this one does the job in helping start
    a cluster.


    In this example I have three nodes in the Cassandra cluster.


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    ```


    sleep 30


    ```

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssh $SERVERNAME "usr/share/cassandra/bin/cassandra"

    done

    ```


    The `sleep` command is there to provide a short gap before starting each server.
    In a production cluster, running this script without the `sleep` command may cause
    issues.


    #### Scripts for Stopping the Cluster


    You know that you can use the `cassandra` command to start a cluster but not to
    stop it. You must kill the PID of the running Cassandra instance to stop the instance.
    To automate the stopping of the Cassandra instance for a set of nodes, you can
    use the following strategy:


    *   Use the first script to iterate through the list of servers and run your stop
    script.

    *   Use a second script that stops the cassandra service by killing the PID of
    the Cassandra instance.


    Here are the two scripts.


    Script 1


    Use this script to call the `cassandra-kill.sh` script.


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssj $SERVERNAME "/usr/share/cassandra/bin/cassandra"

    done

    ```


    Script 2 (`cassandra-kill.sh`)


    You can create a simple shell script such as the following to shut down a Cassandra
    node:


    ```

    #!/bin/bash

    CASS_PID=''ps –ef |grep CasandraDaemon |grep –v grep |awk ''{ print $2 }"

    if [[ "$CASSPID" == '''']]

    then

    echo Cassandra is NOT running

    else

    kill $CASS_PID

    fi

    ```


    ### The Startup Process of the Nodes in a Cluster


    In Chapter [2](#A436674_1_En_2_Chapter.html), I showed the startup process for
    a single node. In this chapter, I show how to create a cluster with multiple nodes.
    Note how when you start the first node, it shows that it’s ready for work and
    shows the other nodes joining the cluster. In this case, I am reviewing the startup
    messages for the node 192.168.177.132.


    ```

    INFO  14:12:49 Node /192.168.177.132 state jump to NORMAL

    INFO  14:12:49 Waiting for gossip to settle before accepting client requests...

    INFO  14:12:57 No gossip backlog; proceeding

    INFO  14:12:58 Starting listening for CQL clients on /0.0.0.0:9042 (unencrypted)...

    INFO  14:12:58 Binding thrift service to /0.0.0.0:9160

    INFO  14:12:58 Listening for thrift clients...

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:12:59 Scheduling approximate time-check task with a precision of 10 milliseconds

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 has restarted, now UP

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 InetAddress /192.168.177.135 is now UP

    INFO  14:13:01 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 state jump to NORMAL

    ```


    Similarly, when you bring down the second node (or it crashes), the messages from
    the first node show that information:


    ```

    INFO  14:13:42 Handshaking version with /192.168.177.135

    INFO  14:19:14 InetAddress /192.168.177.135 is now DOWN

    ```


    ### Common Errors When Starting Out


    You could run into numerous errors when running a distributed database such a
    Cassandra. I want to note a pair of common issues and how to overcome them.'
  trans: '#### `rpc_address` 和 `broadcast_rpc_address` 属性


    `rpc_address` 属性指定了用于绑定 Thrift RPC 服务和原生传输服务器的地址。你可以将 `rpc_address` 属性留空；这种情况下，Cassandra
    会根据你为节点配置的主机名来获取它。


    与 `listen_address` 属性的情况不同，你可以为 `rpc_address` 属性指定值 `0.0.0.0`。这种情况下，你必须同时为 `broadcast_rpc_address`
    属性设置一个值：


    ```

    broadcast_rpc_address: 192.168.177.135

    ```


    #### `endpoint_snitch` 选项


    在 Cassandra 集群中，snitch（嗅探器）有两个作用：


    1.  它告知 Cassandra 网络拓扑信息，以便高效地路由请求。

    2.  它使 Cassandra 能够将数据副本分散在集群中，从而避免关联性故障。Cassandra 使用数据中心和机架来逻辑分组集群的节点。它尽力避免将同一数据的多个副本存储在单个机架上。Cassandra
    提供了半打（六种）snitch，但对于生产环境，首选选项是 `GossipingPropertyFileSnitch`。


    当你选择 `GossipingPropertyFileSnitch` 选项时，你需要在该节点的 `cassandra-rackdc.properties`
    文件中指定数据中心和机架。然后，Cassandra 会通过 gossip 协议将此信息传播到其他节点。


    #### `auto_bootstrap` 属性


    `auto_bootstrap` 属性的默认值是 `true`，并且该参数不会出现在 `cassandra.yaml` 文件中。这个参数使得新的非种子节点将数据迁移到自身。当你正在初始化一个没有数据的新集群时，请添加以下属性：


    ```

    auto_bootstrap=false

    ```


    使用我在这里列出的最小配置属性集，我的 `cassandra.yaml` 文件内容如下：


    ```

    cluster_name: "MyCluster''

    num_tokens: 256

    seed_provider:

    - class_name: org.apache.cassandra.locator.SimpleSeedProvider

    parameters:

    - seeds: "192.168.177.132,192.168.177.135"

    listen_address:

    endpoint_snitch: GossipingPropertyFileSnitch

    ```


    #### 配置数据中心和机架名称


    在我的集群中，我有一个数据中心和一个机架。我必须在 `cassandra-rackdc.properties` 文件中指定数据中心和机架名称。


    ```

    # indicate the rack and dc for this node

    dc=DC1

    rack=RACK1

    ```


    我需要在集群的所有六个节点上都这样做。


    至此，Cassandra 的安装和配置就完成了。我将在“启动和停止多节点集群”一节中展示如何启动这个集群。


    ### 使用多个数据中心初始化集群


    前面的讨论展示了如何设置使用单个数据中心和单个机架的 Cassandra 集群。配置使用多个数据中心和机架的集群同样简单！你遵循相同的步骤，只是你需要在 `cassandra-rackdc.properties`
    文件中配置多个数据中心和机架。


    在单数据中心的情况下，我在 `cassandra-rackdc.properties` 文件中指定了以下属性：


    ```

    dc=DC1

    rack=RACK1

    ```


    我想设置两个数据中心，每个数据中心包含我六个 Cassandra 节点中的三个。为了做到这一点，我以如下方式配置 `cassandra-rackdc.properties`
    文件。


    在前三个节点（192.168.177.32, 192.168.177.33, 和 192.168.177.34）的 `cassandra-rackdc.properties`
    文件中，我指定以下数据中心和机架值：


    ```

    dc=dc1

    rack=rack1

    ```


    对于我六节点集群的其他三个节点，我指定以下值：


    ```

    dc=dc2

    rack=rack2

    ```


    这就是创建一个多数据中心集群所需做的全部工作（我把机架改成了 `rack2`，但这其实不是必须的）。


    ### 启动和停止多节点集群


    你的集群已经配置完毕，准备就绪，只是需要将其启动。要启动集群，首先依次启动两个种子节点。完成后，再依次启动其他四个节点。由于这是一个 tarball 安装，我使用以下命令启动节点：


    ```

    $ $CASSANDRA_HOME/bin/cassandra

    ```


    你现在可以通过执行以下命令来检查环是否正在运行：


    ```

    # CASSANDRA_HOME/bin/nodetool status

    ```


    为准备投入使用，所有六个节点的状态都应显示为 `UN`（Up Normal，正常运行）。


    你可以使用以下脚本集来启动和停止你的多节点集群。


    #### 启动集群的脚本


    没有脚本就无法管理集群。你可以编写比我这里提供的更复杂的脚本，但下面这个脚本在帮助启动集群方面可以胜任工作。


    在这个例子中，我的 Cassandra 集群中有三个节点。


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    sleep 30

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssh $SERVERNAME "usr/share/cassandra/bin/cassandra"

    done

    ```


    `sleep` 命令用于在启动每个服务器前提供一个短暂的间隔。在生产集群中，不带 `sleep` 命令运行此脚本可能会导致问题。


    #### 停止集群的脚本


    你知道可以使用 `cassandra` 命令来启动集群，但不能用它来停止集群。你必须杀死正在运行的 Cassandra 实例的 PID 才能停止它。为了自动化停止一组节点的
    Cassandra 实例，你可以使用以下策略：


    *   使用第一个脚本来遍历服务器列表并调用你的停止脚本。

    *   使用第二个脚本，通过杀死 Cassandra 实例的 PID 来停止服务。


    以下是这两个脚本。


    **脚本 1**


    使用此脚本调用 `cassandra-kill.sh` 脚本。


    ```

    #!/bin/bash

    SERVERS="

    192.168.177.131

    192.168.177.132

    192.168.177.133"

    for SERVERNAME in $SERVERS; do

    echo Starting node $SERVERNAME...

    sudo –u cassandra ssj $SERVERNAME "/usr/share/cassandra/bin/cassandra"

    done

    ```


    **脚本 2 (`cassandra-kill.sh`)**


    你可以创建一个简单的 shell 脚本，如下所示，来关闭一个 Cassandra 节点：


    ```

    #!/bin/bash

    CASS_PID=''ps –ef |grep CasandraDaemon |grep –v grep |awk ''{ print $2 }"

    if [[ "$CASSPID" == '''']]

    then

    echo Cassandra is NOT running

    else

    kill $CASS_PID

    fi

    ```


    ### 集群中节点的启动过程


    在第 2 章中，我展示了单节点的启动过程。在本章中，我展示了如何创建一个包含多个节点的集群。请注意，当你启动第一个节点时，它显示已准备好工作，并显示其他节点加入集群。在这种情况下，我正在查看节点
    `192.168.177.132` 的启动消息。


    ```

    INFO  14:12:49 Node /192.168.177.132 state jump to NORMAL

    INFO  14:12:49 Waiting for gossip to settle before accepting client requests...

    INFO  14:12:57 No gossip backlog; proceeding

    INFO  14:12:58 Starting listening for CQL clients on /0.0.0.0:9042 (unencrypted)...

    INFO  14:12:58 Binding thrift service to /0.0.0.0:9160

    INFO  14:12:58 Listening for thrift clients...

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:12:59 Scheduling approximate time-check task with a precision of 10 milliseconds

    INFO  14:12:59 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 has restarted, now UP

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 Updating topology for /192.168.177.135

    INFO  14:13:01 InetAddress /192.168.177.135 is now UP

    INFO  14:13:01 Handshaking version with /192.168.177.135

    INFO  14:13:01 Node /192.168.177.135 state jump to NORMAL

    ```


    类似地，当你关闭第二个节点（或它崩溃）时，第一个节点的日志消息会显示该信息：


    ```

    INFO  14:13:42 Handshaking version with /192.168.177.135

    INFO  14:19:14 InetAddress /192.168.177.135 is now DOWN

    ```


    ### 启动时的常见错误


    在运行像 Cassandra 这样的分布式数据库时，你可能会遇到无数错误。我想指出两个常见问题以及如何克服它们。'
- fmt: "### Change in a Node’s IP Address\n\nWhen you’re running Cassandra on a virtual\
    \ machine, sometimes the node’s IP address can change. When this happens, the\
    \ rest of the nodes of course can’t connect to this node and it’ll show up as\
    \ a down node.\n\nThe fix for the change in an IP address is simple. You just\
    \ need to edit the `cassandra.yaml` file for this node and change the old IP address\
    \ to the new IP address everywhere you’ve set the IP address of the node, such\
    \ as the `listen_address` configuration property.\n\n### A Schema Version Mismatch\n\
    \nSometimes you’ll run into an error when creating a keyspace or a table, such\
    \ as the following, where Cassandra complains about a version mismatch:\n\n```\n\
    cqlsh> create keyspace mykeyspace2\n... with replication = {'class': 'NetworkTopologyStrategy',\
    \ 'datacenter1' :2}\n... and durable_writes = false;\nWarning: schema version\
    \ mismatch detected, which might be caused by DOWN nodes; if this is not the case,\
    \ check the schema versions of your nodes in system.local and system.peers.\n\
    OperationTimedOut: errors={'192.168.177.135': 'Request timed out while waiting\
    \ for schema agreement. See Session.execute[_async](timeout) and Cluster.max_schema_agreement_wait.'},\
    \ last_host=192.168.177.135\ncqlsh>\n```\n\nCassandra will create the keyspace\
    \ or table despite this message. When a schema disagreement occurs, follow these\
    \ steps.\n\n1.  Run the `nodetool describecluster` command.\n\n    ```\n    $\
    \ sudo nodetool describecluster\n    Cluster Information:\n    Name: Test Cluster\n\
    \    Snitch: org.apache.cassandra.locator.DynamicEndpointSnitch\n    Partitioner:\
    \ org.apache.cassandra.dht.Murmur3Partitioner\n    Schema versions:\n    UNREACHABLE:27a8739d-28ac-34b7-b738-1b84859866cf:\
    \ [192.168.177.135]\n    282bdefc-9643-3fa5-b03a-4b9894cabb29: [192.168.177.132]\n\
    \    $\n    ```\n\n2.  Restart the unreachable node(s).\n3.  Run the `nodetool\
    \ describecluster` command again, and ensure that all nodes have the same version\
    \ number. The output of the command must show a single schema version for all\
    \ nodes in the cluster.\n\nNote\n\nIf you have several mismatched schemas (three\
    \ or more), you need to stop the nodes of a given schema and let the other settle,\
    \ and then restart the nodes one by one. This type of a situation occurs occasionally\
    \ in multiple DC clusters.\n\n### Keyspaces with Different Settings\n\nIf the\
    \ keyspaces of the nodes have different settings, you’ll notice the following:\n\
    \n```\n$ sudo nodetool status\nDatacenter: datacenter1\n=======================\n\
    Status=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n--  Address     Load \
    \   Tokens       Owns    Host ID      Rack\nDN  192.168.177.128  114.06 MiB  256\
    \          ?       99c43633-c691-4dee-b7af-35bc6e74dd67  rack1\nUN  192.168.177.132\
    \  123.84 MiB  256          ?       b0ade950-937a-457c-95eb-d3032897eeb1  rack1\n\
    Note: Non-system keyspaces don't have the same replication settings, effective\
    \ ownership information is meaningless\n$\n```\n\n### Node Is Down\n\nIf one of\
    \ the nodes is down, you will see the following:\n\n```\n$ sudo nodetool describecluster\n\
    Cluster Information:\nName: Test Cluster\nSnitch: org.apache.cassandra.locator.DynamicEndpointSnitch\n\
    Partitioner: org.apache.cassandra.dht.Murmur3Partitioner\nSchema versions:\n44ed2562-e330-3030-af87-89cde4aa8992:\
    \ [192.168.177.135]\nUNREACHABLE: [192.168.177.132]\n#\n```\n\nRun the `nodetool\
    \ status` command to check the status of the two nodes in your cluster:\n\n```\n\
    $ sudo nodetool status\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n\
    |/ State=Normal/Leaving/Joining/Moving\n--  Address     Load       Tokens    \
    \   Owns (effective)  Host ID      Rack\nUN  192.168.177.132  276 KiB    256 \
    \         52.2%             b0ade950-937a-457c-95eb-d3032897eeb1  rack1\nUN  192.168.177.135\
    \  296.85 KiB  256         47.8%             99c43633-c691-4dee-b7af-35bc6e74dd67\
    \  rack1\n#\n```\n\n## Running Cassandra on Amazon EC2\n\nMany organizations and\
    \ individuals run Cassandra clusters in the public cloud. You can run Cassandra\
    \ on Microsoft Azure, Google Cloud, and Amazon Web Services (AWS). In this section,\
    \ I walk you through the creation of a Cassandra cluster on AWS.\n\nWhen you install\
    \ Cassandra on Amazon EC2, you create the instances using an API for a supported\
    \ platform such as Ubuntu 16.04 LTS and ensure that you get the AMI (Amazon Machine\
    \ Image) from a trusted source. Once you download the AMI and get the server running,\
    \ the Cassandra installation process is similar to that in Chapter [2](#A436674_1_En_2_Chapter.html).\n\
    \n### Using Trusted AMIs\n\nAn AMI is a virtual appliance that you use to create\
    \ a virtual machine within the Amazon Elastic Compute Cloud (“EC2”). An AMI is\
    \ a machine template using which you can create new servers in an AWS cloud.\n\
    \nYou must use only AMIs from a trusted source, such as the following:\n\n*  \
    \ `Ubuntu Amazon EC2 AMI locator`\n*   `Debian AmazonEC2image`\n*   `CentOS-6\
    \ images on Amazon’s EC2 Cloud`\n\nUsing untrusted sources for your AMIs will\
    \ create a security risk; they will also perform slower due to the way they configure\
    \ the EC2 installation.\n\n### Setting Up the AWS Instances for Cassandra\n\n\
    Before you do anything on AWS, you must have an account. Therefore, if you don’t\
    \ have one, create one now.\n\nOnce you’ve got your AWS account squared away,\
    \ follow the steps shown in the next few sections to create the Cassandra cluster\
    \ that runs on AWS EC2 virtual machines, called EC2 instances.\n\n#### Starting\
    \ the EC2 Instance Creation\n\nIn the AWS dashboard, click the EC2 logo, under\
    \ the Compute section.\n\n#### Selecting the AWS Region\n\nSelect an appropriate\
    \ region for launching your instances. For example, if you’re in the US, you may\
    \ want to select the North Virginia region."
