    \ until the command completes on one node before proceeding to the other nodes.\
    \  \n\nThis scenario is for adding a new node to a cluster. If you’re replacing\
    \ an existing node that died for some reason, you need to let Cassandra know that\
    \ the new node you’re adding will be replacing the dead node. You do this by specifying\
    \ the `replace_address` option.\n\nStop the node you wish to replace , before\
    \ performing one of the following steps.\n\n*   For package installations, add\
    \ the `replace_address` option to the `cassandra-env.sh` file before starting\
    \ the new node (see Step 4).\n\n    ```\n    JVM_OPTS = \"$JVM_OPTS -Dcassandra.replace_address=192.168.159.130\n\
    \    ```\n\n*   For a tarball installation, as in my case, start the database\
    \ with the `cassandra.replace_address` option.\n\nYou can specify the `listen_address`\
    \ or the `broadcast_address` of the dead node as the value for the `cassandra.replace_address`\
    \ option. You must ensure that the node you’re replacing the other node with is\
    \ either brand now or that you’ve removed all data under the `/data` directory\
    \ if it’s an existing node."
  trans: "\n### 强制移除节点 (`nodetool assassinate`)\n\n假设你的集群中有三个节点，现在需要移除其中一个节点。你已经对该节点执行了下线操作，但当你运行\
    \ `nodetool describecluster` 命令时，发现该节点处于 `UNREACHABLE`（不可达）状态，如下所示：\n\n```\n$\
    \ nodetool describecluster\nCluster Information:\nName: Test Cluster\nSnitch:\
    \ org.apache.cassandra.locator.DynamicEndpointSnitch\nPartitioner: org.apache.cassandra.dht.Murmur3Partitioner\n\
    Schema versions:\n57af9326-0783-3ea2-93ec-7706e8cad5e7: [192.168.159.129]\nUNREACHABLE:\
    \ [192.168.159.130]\n$\n```\n\n`nodetool status` 命令显示该不可达节点的状态为 `DN`，表示节点已宕机。\n\
    \n```\n$ nodetool status\nDatacenter: DC1\n===============\nStatus=Up/Down\n|/\
    \ State=Normal/Leaving/Joining/Moving\n--  Address          Load       Tokens\
    \       Owns (effective)  Host ID                               Rack\nDN  192.168.159.130\
    \  ?          256          49.7%             7d9e3ac3-ffdc-4cee-be82-4b0c6e614aa1\
    \  r1\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  383.92 KiB  256          50.3%\
    \             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\n$\n```\n\n遇到这种无法通过\
    \ `nodetool decommission` 命令将节点移出集群的情况时，可以运行 `nodetool assassinate` 命令来强制移除该节点。\n\
    \n```\n$ nodetool assassinate\n```\n\n运行 `nodetool status` 命令检查集群状态，确认被强制移除的节点\
    \ (`192.168.159.130`) 已从集群中消失。\n\n```\n$ nodetool status\nDatacenter: datacenter1\n\
    =======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  359.04 KiB  256          100.0%\
    \            0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\n$\n```\n\n每当使用 `nodetool\
    \ removenode` 命令移除节点失败时，就可以运行 `nodetool assassinate` 命令。该命令会移除一个已失效的节点，且不会复制其数据。\n\
    \n`nodetool assassinate` 命令移除的是你运行该命令所在的节点。你可以使用 `-h` 选项指定一个远程节点。\n\n```\n$ nodetool\
    \ assassinate -h 192.168.159.129\n```\n\n## 节点管理\n\n节点管理是 Cassandra 管理员任务清单中不可或缺的一部分。管理节点涉及添加、移动和替换节点，也包括管理缓慢或失效的节点，以及在范围移动后清理数据。\n\
    \n在以下章节中，我将解释如何执行关键的节点管理任务。\n\n### 阻止节点加入集群\n\n有时，你可能不希望某个节点加入集群。也就是说，你希望该节点保持启动和运行状态，但不作为环的一部分。你可以通过利用\
    \ Cassandra 命令行工具的 `-D` 选项来实现这一点。`-D` 选项允许你在 `cassandra-env.sh` 文件和命令行中指定启动参数。在此情况下，请在\
    \ `cassandra-env.sh` 文件中添加 `-Dcassandra.join.ring=false` 选项。\n\n以下是阻止节点加入集群必须遵循的步骤。\n\
    \n1.  停止你希望从环中移除的节点。\n2.  编辑 `cassandra-env.sh` 文件并添加以下行：\n\n    ```\n    JVM_OPTS=\"\
    $JVM_OPTS -Dcassandra.join_ring=false\"\n    ```\n\n3.  启动该节点。\n\n    ```\n  \
    \  $ cassandra -R\n    ...\n    INFO  [main] 2017-07-15 12:31:36,878 CassandraDaemon.java:489\
    \ - JVM Arguments: [-...\n    Djava.library.path=./../lib/sigar-bin, -Dcassandra.join_ring=false,\
    \ -\n    ...\n    INFO  [GossipStage:1] 2017-07-15 12:31:44,587 Gossiper.java:1056\
    \ - Node /192.168.159.129 is now part of the cluster\n    INFO  [GossipStage:1]\
    \ 2017-07-15 12:31:44,589 Gossiper.java:1056 - Node /192.168.159.130 is now part\
    \ of the cluster\n    INFO  [main] 2017-07-15 12:31:45,757 StorageService.java:695\
    \ - Not joining ring as requested. Use JMX (StorageService->joinRing()) to initiate\
    \ ring joining\n    INFO  [main] 2017-07-15 12:31:45,758 CassandraDaemon.java:694\
    \ - Waiting for gossip to settle before accepting client requests...\n    INFO\
    \  [GossipStage:1] 2017-07-15 12:31:46,429 StorageService.java:2248 - Node /192.168.159.129\
    \ state jump to NORMAL\n    INFO  [main] 2017-07-15 12:31:53,763 CassandraDaemon.java:725\
    \ - No gossip backlog; proceeding\n    $\n    ```\n\n从 Cassandra 工具的输出可以看出，节点\
    \ (`192.168.159.130`) 已正常启动，并且是集群的一部分。然而，由于你要求 Cassandra 不要将此节点加入集群，它保持启动状态但不在集群内。你可以通过运行\
    \ `nodetool status` 命令来确认这一点。\n\n```\n$ nodetool status\nDatacenter: datacenter1\n\
    =======================\nStatus=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n\
    --  Address          Load       Tokens       Owns (effective)  Host ID       \
    \                        Rack\nUN  192.168.159.129  296.03 KiB  256          50.3%\
    \             0dbb9e0e-867e-4179-b6b6-631d38dd68f9  rack1\nDN  192.168.159.130\
    \  316.55 KiB  256          49.7%             7d9e3ac3-ffdc-4cee-be82-4b0c6e614aa1\
    \  rack1\n$\n```\n\n节点 `192.168.159.130` 显示状态为 `DN` (`DOWN NORMAL`)。该节点已启动，但不再是此集群的一部分。\n\
    \n随后，你可以运行 `nodetool join` 命令将此节点重新添加回环中，如下所示：\n\n```\n$ nodetool join\n```\n\n\
    ### 向数据中心添加节点\n\n添加一个新节点涉及安装并启动新节点，以及清理现有节点以移除不再属于这些节点的密钥。请按照以下步骤向一个正在运行的集群中添加节点。\n\
    \n1.  在新节点上安装 Cassandra 二进制文件。\n2.  在 `cassandra.yaml` 文件中配置以下属性：\n    *   `cluster_name`:\
    \ 集群名称。\n    *   `endpoint_snitch`: `GossipingPropertyFileSnitch`（或任何你希望使用的 snitch）。\n\
    \    *   `num_tokens`: 256（此设置 vnodes 的数量，你可以将其设置为与其他节点配置的令牌相同的数字）。\n    *   `allocate_tokens_for_local_replication_factor`:\
    \ 允许你指定键空间的复制因子。\n    *   `seed_provider`: 指定集群中现有的一个种子节点。\n3.  确保你在 `cassandra.yaml`、`cassandra-rackdc.properties`\
    \ 和 `cassandra-topology.properties` 文件中配置的任何非默认设置都已添加。新节点上所有这些配置文件应使用与其他节点相同的非默认设置。\n\
    4.  启动新节点。\n5.  使用 `nodetool status` 命令验证节点状态，并确保所有节点都显示 `UN` (`Up Normal`) 状态。\n\
    6.  在所有现有节点上运行 `nodetool cleanup` 命令。你必须等待一个节点上的命令完成后再继续处理其他节点。\n\n此场景适用于向集群添加新节点。如果你要替换一个因故死亡的现有节点，你需要让\
    \ Cassandra 知道你添加的新节点将替换该失效节点。通过指定 `replace_address` 选项来实现这一点。\n\n在执行以下步骤之前，请停止你希望替换的节点。\n\
    \n*   对于包安装，在启动新节点之前（参见步骤 4），将 `replace_address` 选项添加到 `cassandra-env.sh` 文件中。\n\
    \n    ```\n    JVM_OPTS = \"$JVM_OPTS -Dcassandra.replace_address=192.168.159.130\"\
    \n    ```\n\n*   对于 tarball 安装（如我的情况），使用 `cassandra.replace_address` 选项启动数据库。\n\
    \n你可以将失效节点的 `listen_address` 或 `broadcast_address` 作为 `cassandra.replace_address`\
    \ 选项的值。你必须确保用来替换另一个节点的节点是全新的，或者如果它是一个现有节点，你已经移除了 `/data` 目录下的所有数据。\n"
- fmt: "# Replacing a Running Node\n\nOccasionally you may need to replace a good\
    \ node for maintenance purposes. You can replace a node in two ways:\n\n*   Add\
    \ the new node and decommission the node you want to replace.\n*   Directly replace\
    \ a node.\n\nI explain both methods in the following sections.\n\n## Adding the\
    \ New Node and Decommissioning the Old Node Afterwards\n\nReplacing a node by\
    \ adding a new node first is straightforward. Here are the high-level steps for\
    \ doing this.\n\n1.  You add a node as explained in the “Adding a New Node” section.\n\
    2.  Once you add the new node, decommission the old node as explained in the “Decommissioning\
    \ a Node” section by running the `nodetool decommission` command.\n3.  Run the\
    \ `nodetool cleanup` command on all nodes that are part of the same datacenter.\n\
    \n## Directly Replacing a Node\n\nThe method I explained in the previous section\
    \ involves streaming data twice or running the `nodetool cleanup` command. You\
    \ can simply start the new node with the `-Dcassandra.replace_address` option\
    \ to accomplish the same task.\n\nTo use this technique, you must ensure that\
    \ you’re not using the consistency level `ONE` for any keyspace. This means that\
    \ this node may have the only copy of a row, and thus you risk losing that data.\n\
    \nHere are the steps to directly replace a node.\n\n*   First, stop Cassandra\
    \ on the node you’re replacing.\n*   Follow the steps in the “Replacing a Dead\
    \ Node” section to replace the node with another node.\n\nIf the node you’re replacing\
    \ happens to be a seed node, you must remove the dead node’s IP address from the\
    \ `-seeds` list in the `cassandra.yaml` file. You must do this, of course, for\
    \ all nodes in the cluster. If you need the new node (or a different existing\
    \ node) to replace the dead seed node, add that node’s IP address to the `–seeds`\
    \ list.\n\n# Removing a Node from a Cluster\n\nIf the node you want to remove\
    \ is healthy and running, just run the `nodetool decommission` command to remove\
    \ the node from your cluster. However, if the node is down, you can’t decommission\
    \ it, of course, and that’s when you need to run the `nodetool removenode` command\
    \ to get rid of the node.\n\nYou remove a node with the `nodetool removenode`\
    \ command by specifying the host ID of the node you wish to remove.\n\n```\n$\
    \ nodetool removenode 192.168.159.130\n```\n\nYou can confirm the node removal\
    \ by running the `nodetool removenode status` command.\n\n```\n$ nodetool removenode\
    \ status\n```\n\n# Replacing a Dead Node\n\nNodes can die for many a reason, such\
    \ as hardware failure. You can tell when a node dies by checking the status of\
    \ the nodes by running the `nodetool status` command. If you see a status of `DN`\
    \ and you don’t see any configuration-related errors in the logs, hardware failure\
    \ or some other issue has crashed the node or is keeping it from starting. In\
    \ these situations, you must replace the dead node.\n\nFollow these steps to replace\
    \ a dead node.\n\n1.  Add a replacement node to your network.\n2.  If the dead\
    \ node happens to be a seed node, replace the IP address of the dead node with\
    \ that of the new node in the `-seeds` list under the `seed_provider` property.\n\
    3.  Restart the new node.\n4.  Install Cassandra on the new node.\n5.  Configure\
    \ the `cassandra.yaml` file with the `cluster_name` and the `-seeds` list properties.\n\
    6.  On the new node, add the rack and datacenter configuration. Assuming you’re\
    \ using the `GossipPropertyFileSnitch` or the `Ec2MultiRegionSnitch`, add the\
    \ rack and datacenter information to the `cassandra-rackdc.properties` file. In\
    \ addition, remove the `cassandra-topology.properties` file.\n7.  Start the replacement\
    \ node with the `replace_address` option, as explained in the “Adding a New Node\
    \ to a Datacenter” section by either adding the `replace_address` option to the\
    \ `cassandra-env.sh` file or by starting Cassandra with the `replace_address`\
    \ option.\n\n# Moving a Node to a Different Rack\n\nIf you find that you’ve placed\
    \ a node in the wrong rack, you can fix the error by moving the node to the correct\
    \ rack and datacenter. In this case, Cassandra needs to move the data out of the\
    \ node first, and, after changing the rack the node belongs to, load new data\
    \ into the node.\n\nThe method that DataStax recommends for moving a node is to\
    \ decommission the node you wish to move to a different rack. Once you decommission\
    \ it, as explained in the “Decommissioning a Node” section, you can add the node\
    \ to the rack and datacenter you wish.\n\n# Decommissioning an Entire Datacenter\n\
    \nWhen you decommission a datacenter, you want to first ensure that you don’t\
    \ lose any data by keeping clients from writing to the nodes in this datacenter.\
    \ Next, implement the following steps to decommission the datacenter .\n\n1. \
    \ To ensure that all data is propagated to the other datacenters, run the `nodetool\
    \ repair` command.\n\n    ```\n    $ nodetool repair -full\n    [2017-07-15 11:50:07,969]\
    \ Replication factor is 1\\. No repair is needed for keyspace 'cycling'\n    ...\n\
    \    [2017-07-15 11:50:08,104] Starting repair command #1 (6c43e1b0-698e-11e7-849e-0920617bbdc2),\
    \ repairing keyspace system_traces with repair options (parallelism: parallel,\
    \ primary range: false, incremental: false, job threads: 1, ColumnFamilies: [],\
    \ dataCenters: [], hosts: [], # of ranges: 512, pull repair: false)\n    [2017-07-15\
    \ 11:50:12,699] Repair completed successfully\n    [2017-07-15 11:50:12,710] Repair\
    \ command #1 finished in 4 seconds\n    $\n    ```\n\n2.  The next step is to\
    \ delete all references to the datacenter you want to remove. You do this by modifying\
    \ all the keyspaces in the cluster with the `ALTER KEYSPACE` command so they don’t\
    \ point to the removed datacenter. The `ALTER KEYSPACE` command enables you to\
    \ modify a keyspace’s replication strategy, as well as the number of replicas\
    \ that the database must create in each datacenter. As explained in Chapter 4,\
    \ the `SimpleStrategy` assigns the same replication factor to the entire cluster\
    \ and therefore is suitable only for development and testing environments. You\
    \ must use the `NetworkTopologyStrategy` option for a production environment.\
    \ This strategy enables you to specify the replication factor per datacenter.\
    \ For example, if you removed datacenter1, you must ensure that you’re configuring\
    \ a different datacenter for all keyspaces in the cluster, as shown here:\n\n\
    \    ```\n    ALTER KEYSPACE cycling\n    WITH REPLICATION = {\n    'class'  :\
    \  'NetworkTopologyStrategy',\n    'datacenter2'  :  3 }\n    AND DURABLE_WRITES\
    \ = true ;\n    ```\n\n3.  Finally, run the `nodetool decommission` command on\
    \ each of the nodes of the datacenter you wish to remove from the cluster.\n\n\
    # Switching Snitches\n\nA key point concerning switching of snitches is whether\
    \ the topology of your cluster will change following a change in the snitch. The\
    \ replication strategy places replicas on the basis of the information provided\
    \ by the snitches, since the function of a snitch is to tell Cassandra how to\
    \ distribute the replicas. When the new snitch you are configuring places replicas\
    \ in different places, there are topology changes (that is, a change in either\
    \ the datacenter or rack, or both, where Cassandra places the nodes).\n\nSometimes\
    \ there’s a change in the network topology and sometimes, not. I address both\
    \ cases in the following sections."
