  trans: '# 命令行 CQL Shell 选项


    你将使用 `cqlsh` 来执行许多任务，因此你应该熟练掌握基本的 CQL 命令行选项。`cqlsh` 实用程序附带了几个有用的命令行选项，也称为有文档记录的
    shell 命令。我将在此展示如何使用最有用的 CQL shell 选项。


    ## `capture` 命令


    `CAPTURE` 命令将捕获一个命令的输出并将其添加到文本文件中，如下例所示：


    ```

    cqlsh> capture ''/home/test/Cassandra/output/testfile''

    ```


    一旦你发出 `CAPTURE` 命令，shell 将捕获你在该会话中发出的所有后续 CQL 命令的输出，直到你使用 `capture off` 命令关闭输出捕获：


    ```

    cqlsh> capture off;

    ```


    ## `copy` 命令


    `COPY` 命令非常适合将数据从 Cassandra 表捕获到文本文件中。下面是一个示例，展示了如何将名为 `employees` 的表的内容捕获到文件
    `myfile` 中：


    ```

    cqlsh> copy employee (emp_id, emp_cicty, emp_name, emp_sal) to ''myfile'';

    ```


    ## `describe` 命令


    `DESCRIBE` 命令将描述 Cassandra 集群中的各种实体。在下面的示例中，`describe cluster` 命令描述了 Cassandra
    集群及其顶级对象：


    ```

    cqlsh> describe cluster;

    Cluster: Test Cluster

    Partitioner: Murmur3Partitioner

    cqlsh>

    ```


    你可以使用 `DESCRIBE` 命令获取其他几个实体的描述：


    *   `Describe types`: 列出所有用户定义的数据类型

    *   `Describe type`: 描述一个用户定义的数据类型

    *   `Describe tables`: 列出一个键空间中的所有表

    *   `Describe table`: 描述一个表

    *   `Describe keyspaces`: 列出集群中的所有键空间


    注意：`DESC` 命令与 `DESCRIBE` 命令功能相同。


    以下是一个展示如何运行 `DESCRIBE KEYSPACES` 命令的示例：


    ```

    cqlsh> describe keyspaces;

    test1          system_auth  system_distributed  testdata

    system_schema  system       system_traces

    cqlsh>

    ```


    假设我有一个名为 `quarters` 的表。当我运行 `describe table quarters` 命令时，我得到了一大堆输出，尽管我只用几行代码创建了表。


    ```

    cqlsh> use testdata;

    cqlsh:testdata> describe table quarters;

    CREATE TABLE testdata.quarters (

    id int PRIMARY KEY,

    name text

    ) WITH bloom_filter_fp_chance = 0.01

    AND caching = {''keys'': ''ALL'', ''rows_per_partition'': ''NONE''}

    AND comment = ''''

    AND compaction = {''class'': ''org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy'',
    ''max_threshold'': ''32'', ''min_threshold'': ''4''}

    AND compression = {''chunk_length_in_kb'': ''64'', ''class'': ''org.apache.cassandra.io.compress.LZ4Compressor''}

    AND crc_check_chance = 1.0

    AND dclocal_read_repair_chance = 0.1

    AND default_time_to_live = 0

    AND gc_grace_seconds = 864000

    AND max_index_interval = 2048

    AND memtable_flush_period_in_ms = 0

    AND min_index_interval = 128

    AND read_repair_chance = 0.0

    AND speculative_retry = ''99PERCENTILE'';

    cqlsh:testdata>

    ```


    如果你来自 Oracle 等关系型数据库，你可能只认识这些表选项中的一个，即 `PRIMARY KEY`，这是在创建表时必须指定的。其余的都是默认值。这正是
    Cassandra 如此有趣的原因，因为有很多新的、有趣的东西需要学习和使用。你将在相应的章节中学习所有这些表选项。


    ## `expand` 命令


    `expand` 命令以垂直方式显示表行的内容，便于阅读长行数据。无需像默认水平格式那样向右滚动，而是向下滚动以查看更多行内容。


    假设你的查询产生以下输出：


    ```

    cqlsh:mykeyspace1> select * from employee;

    emp_id | emp_city    | emp_name | emp_phone   | emp_sal

    --------+-------------+----------+-------------+---------

    1 | San Antonio |     juan | 39874622562 |   90000

    2 |     Houston |      jim | 87209887521 |  100000

    3 |      Austin |      sam | 87361598012 |   50000

    (3 rows)

    cqlsh:mykeyspace1>

    ```


    现在你希望获得更详细的输出。你可以先在 `cqlsh` 会话中发出 `expand on` 命令，然后再执行你原来的命令。


    ```

    cqlsh:mykeyspace1>

    expand on;

    Now Expanded output is enabled

    cqlsh:mykeyspace1> select * from employee;

    @ Row 1

    -----------+-------------

    emp_id    | 1

    emp_city  | San Antonio

    emp_name  | juan

    emp_phone | 39874622562

    emp_sal   | 90000

    @ Row 2

    -----------+-------------

    emp_id    | 2

    emp_city  | Houston

    emp_name  | jim

    emp_phone | 87209887521

    emp_sal   | 100000

    @ Row 3

    -----------+-------------

    emp_id    | 3

    emp_city  | Austin

    emp_name  | sam

    emp_phone | 87361598012

    emp_sal   | 50000

    (3 rows)

    cqlsh:mykeyspace1>

    ```


    完成后请务必关闭扩展输出：


    ```

    cqlsh:mykeyspace1> expand off;

    Disabled Expanded output.

    cqlsh:mykeyspace1>

    ```


    ## `tracing` 命令


    `tracing` 命令让你能够启用和禁用对数据库中运行事务的跟踪。你可以使用跟踪来诊断性能问题。`system_traces` 键空间捕获有关 Cassandra
    内部操作的信息。该键空间中名为 `session` 的表捕获查询结果和高层细节。Cassandra 将其执行的所有操作的详细信息捕获在 `system_traces.events`
    表中。我将在第 11 章详细解释跟踪。


    # Cassandra 安装目录


    当你安装 Cassandra 时，安装程序会创建一堆目录，了解这些目录是什么以及里面有什么是个好主意。


    目录的位置取决于你是通过 tarball 还是软件包安装的 Cassandra。通常，tarball 安装会在安装目录下创建所有目录，而软件包安装会将其目录存储在
    `/etc` 和 `/var` 目录下。


    在我的情况下，我使用 tarball 安装了 Cassandra，所以我将展示我安装中的目录结构，如下所示：


    ```

    $ cd $CASSANDRA_HOME

    $ ls

    bin          conf  interface  lib          NEWS.txt    pylib

    CHANGES.txt  doc   javadoc    LICENSE.txt  NOTICE.txt  tools

    $

    ```


    以下部分描述了关键的 Cassandra 目录以及这些目录下的重要文件。


    ## `bin` 目录


    `bin` 目录包含各种实用程序和启动脚本，如下所示：


    ```

    $ ls

    cassandra         cqlsh.py         sstableloader       sstableutil.bat

    cassandra.bat     debug-cql        sstableloader.bat   sstableverify

    cassandra.in.bat  debug-cql.bat    sstablescrub        sstableverify.bat

    cassandra.in.sh   nano.save        sstablescrub.bat    stop-server

    cassandra.ps1     nodetool         sstableupgrade      stop-server.bat

    cqlsh             nodetool.bat     sstableupgrade.bat  stop-server.ps1

    cqlsh.bat         source-conf.ps1  sstableutil

    $

    ```


    `bin` 目录是你找到以下关键实用程序的地方：


    *   `cassandra`: 此实用程序可帮助你启动一个 Cassandra 实例，我将在下一节中解释。

    *   `cqlsh`: `cqlsh` 实用程序启动 CQL shell，使你能够编写 CQL 查询以与 Cassandra 通信。

    *   `nodetool`: `nodetool` 实用程序是 Cassandra 管理员的得力助手。它让你能够执行众多管理任务，例如检查集群状态、停用节点、添加节点等。在本书中，我将使用
    `nodetool` 来执行许多管理任务。

    *   `sstableloader`: 此工具使你能够将数据加载到 SSTable 中，我将在第 9 章中解释。'
- fmt: '## The tools Directory


    The `tools` directory contains useful Cassandra tools for tasks such as stress
    testing and for managing SSTables, as shown here:

    *   `cassandra-stress`: Cassandra’s load testing tool

    *   `sstabledump`: Utility that dumps the contents of an SSTable in JSON format

    *   `sstablesplit`: Tool to split SSTables into multiple tables

    *   `sstablemetadata`: Prints metadata about an SSTable.


    ## The lib Directory


    The `lib` directory contains all the external libraries that Cassandra may need
    during its execution, such as JSON serialization libraries and the Apache commons
    libraries.


    ## The conf Directory


    The `conf` directory contains everything you need to configure a Cassandra cluster.
    It contains the configuration files that enable you to set the runtime properties
    for Cassandra nodes as well as for the cluster racks. This directory also contains
    the files where you set the environment for the database. Here’s a quick description
    of the key files in this directory:

    *   `cassandra.yaml`: This is the main Cassandra configuration file.

    *   `cassandra-env.sh`: This is the file where you configure the Linux settings
    for Java, the JVM, and the JMX.

    *   `cassandra-rackdc.properties`: This file defines the default datacenter and
    rack used by various snitches such as `GossipingPropertyFileSnitch`, `Ec2Snitch`,
    `Ec2MultiRegionSnitch`, and `GoogleCloudSnitch`.

    *   `Cassandra-topology.properties`: This file defines the default datacenter
    and rack for the `PropertyFileSnitch`.

    *   `jvm.options`: Allows you to set the options that Cassandra will use to start
    the JVM.

    *   `commitlog_archiving.properties`: Enables the configuration of the commit
    log.

    *   `metrics-reporter-config-sample.yaml`: An example file that shows how to configure
    Cassandra metrics.

    *   `logback.xml`: Logback configuration file that helps you configure Cassandra’s
    logging settings.


    ## The Javadoc Directory


    The `javadoc` directory contains a documentation website that was generated using
    the JavaDoc tool. This is not a complete documentation, but rather the comments
    that are stored in the Java code. To read the JavaDoc, open the `javadoc/index.html`
    file in your browser.


    ## Starting and Stopping Cassandra


    You start and stop Cassandra by issuing the `cassandra` command. The `cassandra`
    utility, along with other key Cassandra administrative tools, is located in the
    `$CASSANDRA_HOME/bin` directory.


    ### Starting Cassandra


    You can start up Cassandra with the `cassandra` command. You can optionally add
    the following flags:

    *   `-f` starts Cassandra in the foreground (by default, the `cassandra` command
    starts the database in the background). Running in the foreground means the server
    will print all logs to the standard output and you can see them in your terminal
    window.

    *   Cassandra always writes the server logs to the `system.log` file, regardless
    of whether you run Cassandra in the background or in the foreground.

    *   `-R` starts Cassandra as the root user.


    ```

    Here’s an example of how to start a Cassandra instance (in the foreground, as
    the user root):

    $ cassandra -f -R

    ...

    INFO  20:33:47 Configuration location: file:/cassandra/apache-cassandra-3.9/conf/cassandra.yaml

    data_file_directories=[Ljava.lang.String;@175c2241; disk_access_mode=auto; disk_failure_policy=stop;
    dynamic_snitch=true; dynamic_snitch_badness_threshold=0.1; dynamic_snitch_reset_interval_in_ms=600000;

    ...

    INFO  20:33:57 Initializing system_schema.keyspaces

    INFO  20:33:59 Cassandra version: 3.9

    INFO  20:34:00 Loading persisted ring state

    INFO  20:34:00 Starting up server gossip

    INFO  20:34:00 Updating topology for localhost/127.0.0.1

    INFO  20:34:01 Node localhost/127.0.0.1 state jump to NORMAL

    INFO  20:34:01 Starting listening for CQL clients on localhost/127.0.0.1:9042
    (unencrypted)...

    ```


    I ran the `cassandra` command with the `–f` option, thus choosing to run the instance
    in the foreground. Therefore, Cassandra will keep printing all logging information
    in the terminal. If you start Cassandra in the default background mode, you can
    get the Linux command prompt back after starting the Cassandra instance by pressing
    Enter.


    Let’s review the abbreviated output I’ve presented here, as it teaches us a few
    valuable things:

    *   Loading persisted ring state: Loads the ring state.

    *   Staring up server gossip: Statements pertaining to gossip indicate that the
    server is initiating communications with the rest of the cluster’s nodes.

    *   Updating topology: Updates the cluster topology by adding any new nodes that
    you’ve added to the cluster.

    *   Node … state jump to NORMAL: This means that Cassandra has started up fine
    and is waiting for you to work with it through `cqlsh` or by other means.


    Once the server starts, Cassandra continually keeps writing to the `system.log`
    file, updating it with information pertaining to internal database activities
    such as the flushing of memtables and the compaction of SSTables.


    ### Checking Cassandra’s Status


    You can check the status of an instance with the `nodetool status` command. The
    `nodetool` utility works only when the Cassandra instance is running on a node.
    `nodetool` is an immensely useful Cassandra tool, and it’s a good idea to familiarize
    yourself with it.


    Type `nodetool –help` to view all `nodetool`’s commands that you can execute:


    ```

    $ nodetool -help

    usage: nodetool [(-h  | --host )] [(-p  | --port )]

    [(-pwf  | --password-file )]

    [(-u  | --username )]

    [(-pw  | --password )]  []

    The most commonly used nodetool commands are:

    assassinate                  Forcefully remove a dead node without re-replicating
    any data.  Use as a last resort if you cannot removenode

    bootstrap                    Monitor/manage node''s bootstrap process

    cleanup                      Triggers the immediate cleanup of keys no longer
    belonging to a node. By default, clean all keyspaces

    clearsnapshot                Remove the snapshot with the given name from the
    given keyspaces. If no snapshotName is specified we will remove all snapshots

    compact                      Force a (major) compaction on one or more tables
    or user-defined compaction on given SSTables

    compactionhistory            Print history of compaction

    compactionstats              Print statistics on compactions

    decommission                 Decommission the *node I am connecting to*

    describecluster              Print the name, snitch, partitioner and schema version
    of a cluster

    ...

    ```


    If you run `nodetool` when there’s no Cassandra instance running, you’ll get an
    error:


    ```

    $ nodetool status

    nodetool: Failed to connect to ''127.0.0.1:7199'' - ConnectException: ''Connection
    refused''.

    $

    ```'
