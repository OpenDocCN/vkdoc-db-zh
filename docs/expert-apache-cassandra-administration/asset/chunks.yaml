- fmt: "# Cassandra 一致性级别与配置\n\n## 基于仲裁的读一致性级别（强一致性）\n\n存在两种基于仲裁的一致性级别：\n\n*   `QUORUM`\
    \ ：仅当来自所有数据中心的仲裁副本响应后，才返回查询结果，从而提供强一致性。在大多数副本响应后，数据库会将具有最新时间戳的值返回给客户端。如果数据库发现某些节点的数据过时，它会对持有过时数据的副本执行读修复。\n\
    *   `LOCAL_QUORUM` ：仅当本地（当前）数据中心的仲裁节点响应后，才返回查询结果，从而提供强一致性。你只能在配置了 `NetworkTopologyStrategy`\
    \ 副本放置策略和适当配置了 snitch 的多数据中心集群中使用此级别。\n\n> 注意\n>\n> `QUORUM` 读一致性级别意味着你总是能检索到正确的数据，即使其中一个副本宕机。\n\
    \n## ONE、TWO、THREE 和 LOCAL_ONE 一致性级别（弱一致性）\n\n`ONE` 一致性级别以牺牲一致性为代价提供了最高的可用性。Cassandra\
    \ 会立即从最近的副本返回查询结果。代价是读取过时数据的可能性很高。数据库也会根据其他副本中的数据检查此数据，如果任何副本过时，数据库会启动读修复以使其他副本保持一致。\n\
    \n> 注意\n>\n> 在 `ONE` 一致性级别下，提供读取服务的副本可能没有数据的最新版本。\n\n`TWO`、`THREE` 和 `LOCAL_ONE`\
    \ 一致性级别与 `ONE` 设置类似：\n\n*   `TWO` 级别从两个最近的副本返回最新数据。\n*   `THREE` 级别从三个最近的副本返回最新数据。\n\
    *   `LOCAL_ONE` 一致性级别与 `ONE` 级别类似，但返回本地数据中心中最近副本的数据。\n\n## 串行一致性设置\n\n你可以配置两种\
    \ `SERIAL` 一致性级别。第一种 `SERIAL` 允许你读取用户正在进行的轻量级事务所涉及列的最新值。`SERIAL` 一致性级别允许读取最新的数据，包括可能未提交的数据。\n\
    \n`LOCAL_SERIAL` 一致性级别与 `SERIAL` 级别类似，但仅限于数据中心内。你使用此级别来为轻量级事务获得线性一致性。\n\n> 注意\n\
    >\n> 你配置一致性级别是为了在可用性和数据准确性之间进行权衡。\n\n## 配置一致性级别\n\n你可以在会话级别或针对每个读写操作配置一致性级别。\n\
    \n如果你使用 cqlsh，可以使用关键字 `CONSISTENCY` 为当前会话中运行的所有查询设置一致性级别。客户端应用程序通过其驱动程序设置一致性级别。\n\
    \n读写操作的默认一致性级别是 `ONE`。下面的示例说明了这一点：\n\n```\ncqlsh> CONSISTENCY;\nCurrent consistency\
    \ level is ONE.\ncqlsh>\n```\n\n之前，你已经了解了可以设置的各种一致性级别。以下是一些展示如何设置各种一致性级别的例子：\n\
    \n*   设置 `QUORUM` 一致性级别，强制集群中大多数节点在数据库认为操作成功之前进行响应。\n\n    ```\n    cqlsh> CONSISTENCY\
    \ QUORUM;\n    ```\n\n*   对于轻量级事务，设置 `SERIAL` 一致性级别。\n\n    ```\n    cqlsh> CONSISTENCY\
    \ SERIAL;\n    ```\n\n## 三种读请求类型\n\n协调器节点可以向副本节点发送三种类型的读请求：\n\n*   直接读请求：协调器节点包含单个副本节点。\n\
    *   摘要请求：协调器首先联系一个副本节点，然后向你通过 `consistency level` 属性指定的节点数量发送请求。协调器发送的请求检查副本节点上的数据以确保其是最新的。如果协调器发现某些节点有陈旧数据，它会发送一个读修复请求。\n\
    *   后台读修复请求：Cassandra 在后台执行读修复，以确保协调器在摘要请求期间请求的所有行在所有参与该读请求的副本之间保持一致。\n\n### 通过推测重试实现快速读保护\n\
    \n通常，在读请求期间，Cassandra 会向足够的副本发送数据请求以满足一致性级别。你可以配置表的 `speculative_retry` 属性，以利用\
    \ Cassandra 的能力：当原始副本节点不可用或响应读取请求非常慢时，使用不同的副本节点重试读请求。当你配置此功能后，即使一致性级别已经满足，Cassandra\
    \ 也会向副本发送额外的读请求。\n\n> 注意\n>\n> 快速读保护确保如果一个副本节点失败或异常缓慢，协调器节点会在超时间隔后自动将读请求发送到其他节点。\n\
    \n当你配置推测重试时，协调器节点在设定的时间过去后自动用不同的节点重试请求。通过这种推测重试读取查询的方式从副本节点故障中恢复被称为快速读保护。\n\n\
    你可以通过设置 `speculative_retry` 属性来配置快速读保护。此属性精确决定协调器节点何时发送额外的读请求。以下是配置此属性的所有方式：\n\
    \n*   `NONE`：这是默认值，指定无论延迟如何，协调器除了原始读请求外不发送任何额外的读请求。\n*   `ALWAYS`：每次读取表后，协调器都会向集群中的所有其他副本节点发送额外的读请求。\n\
    *   `Xpercentile`：这告诉协调器，如果它在为 `Xpercentile` 属性设置值的特定百分比时间内没有收到副本节点的任何响应，就发送冗余读请求。例如，表的典型延迟是\
    \ 60 毫秒，假设你将 `Xpercentile` 属性设置为第 80 百分位。如果副本节点在 48 毫秒（60 毫秒的 80%）内没有响应，Cassandra\
    \ 会向其他副本发送冗余读请求。\n*   `Nms`：在此策略下，如果协调器在 N 毫秒内没有收到副本的响应，它会发送额外的读请求。\n\n以下是如何为表设置\
    \ `speculative_retry` 属性的一些示例：\n\n```\ncqlsh> ALTER TABLE users WITH speculative_retry\
    \ =  '5ms';\ncqlsh> ALTER TABLE users WITH speculative_retry = '95percentile';\n\
    ```"
  raw: "#### Quorum-Related Read Consistency Levels (Strong Consistency)\n\nThere\
    \ are two quorum-based consistency levels:\n\n*   `QUORUM` : Provides strong consistency\
    \ by returning query results only after a quorum of replicas from all datacenters\
    \ respond. After a majority of the replicas respond, the database returns the\
    \ value with the latest timestamp to the client. If the database finds that some\
    \ nodes have stale data, it performs a read repair on the replicas with the outdated\
    \ data.\n*   `LOCAL_QUORUM` : Provides strong consistency by returning query results\
    \ only after a quorum of nodes in the local (current) datacenter has replied.\
    \ You can use this level only in a multiple datacenter cluster with the `NetworkTopologyStrategy`\
    \ replica placement strategy in place and an appropriately configured snitch.\n\
    \nNote\n\nA `QUORUM` read consistency level means that you’ll always retrieve\
    \ the correct data, even when one of the replicas dies.\n\n#### The ONE, TWO,\
    \ THREE, and LOCAL_ONE Consistency Levels (Weak Consistency)\n\nThe `ONE` consistency\
    \ level offers the highest availability at the cost of consistency. Cassandra\
    \ returns the query results immediately from the nearest replica. The tradeoff\
    \ is that you have a high probability of reading stale data. The database checks\
    \ this data against data in the other replicas as well, and if any of the replicas\
    \ are out of date, the database initiates a read repair to make the other replicas\
    \ consistent.\n\nNote\n\nUnder the `ONE` consistency level, the replicas that\
    \ serve the reads may not have the latest version of the data.\n\nThe `TWO, THREE`,\
    \ and `LOCAL_ONE` levels of consistency are similar to the `ONE` setting:\n\n\
    *   Level `TWO` returns the latest data from two of the nearest replicas.\n* \
    \  Level `THREE` returns the latest data from three of the nearest replicas.\n\
    *   The `LOCAL_ONE` consistency level is similar to the consistency level `ONE`\
    \ and returns the data from the nearest replica in the local datacenter.\n\n####\
    \ The Serial Consistency Settings\n\nThere are two `SERIAL` consistency levels\
    \ you can configure. The first one, `SERIAL`, enables you to read the latest value\
    \ of a column involved in an in-flight lightweight transaction by a user. The\
    \ `SERIAL` consistency level allows the reading of the most up-to-date data, including\
    \ potentially uncommitted data.\n\nThe `LOCAL_SERIAL` consistency level is like\
    \ the `SERIAL` level of consistency but is limited to the datacenter. You use\
    \ this to gain linearizable consistency for lightweight transactions.\n\nNote\n\
    \nYou configure consistency levels to trade off availability vs. the accuracy\
    \ of data.\n\n### Configuring the Consistency Level\n\nYou can configure the consistency\
    \ levels at a session level or per each read or write operation.\n\nIf you’re\
    \ using cqlsh, specify the keyword `CONSISTENCY` to set the consistency level\
    \ for all queries you run within your current session. Client applications set\
    \ the consistency level via their drivers.\n\nThe default consistency level is\
    \ `ONE` for a read or write operation. The following example illustrates this:\n\
    \n```\ncqlsh> CONSISTENCY;\nCurrent consistency level is ONE.\ncqlsh>\n```\n\n\
    Earlier, you learned about the various consistency levels you can set. Here are\
    \ some examples that show how to set various consistency levels.\n\n*   Set the\
    \ `QUORUM` level of consistency to force a majority of the nodes in a cluster\
    \ to respond before the database considers the operation successful.\n\n    ```\n\
    \    cqlsh> CONSISTENCY QUORUM;\n    ```\n\n*   For lightweight transactions,\
    \ set the `SERIAL` consistency level.\n\n    ```\n    cqlsh> CONSISTENCY SERIAL;\n\
    \    ```\n\n### Three Types of Read Requests\n\nA coordinator node can send out\
    \ three types of read requests to a replica node:\n\n*   Direct Read Requests\
    \ : The coordinator node contains a single replica node.\n*   Digest Request:\
    \ The coordinator first contacts a replica node , following which it sends a request\
    \ to the number of nodes you specify with the `consistency level` property. The\
    \ request sent by the coordinator checks the data on the replica nodes to ensure\
    \ it’s up to date. If the coordinator discovers that some nodes have stale data,\
    \ it sends out a read repair request.\n*   A Background Read Repair Request :\
    \ Cassandra performs read repair in the background to ensure that all the rows\
    \ that a coordinator requests during a digest request are consistent across all\
    \ the replicas that are part of the read request.\n\n#### Rapid Read Protection\
    \ with Speculative Retrying\n\nNormally, during a read request, Cassandra sends\
    \ out data requests to enough replicas to satisfy the consistency level. You can\
    \ configure a table with the `speculative_retry` property to take advantage of\
    \ Cassandra’s ability to retry a read request with a different replica node when\
    \ the original replica node is unavailable or is very slow in responding to a\
    \ read request. When you configure this, Cassandra sends extra read requests to\
    \ replicas, although the consistency level has been already satisfied.\n\nNote\n\
    \nRapid read protection assures that if a replica node fails or is unduly slow,\
    \ the coordinator node automatically sends the read request to other nodes after\
    \ a timeout interval.\n\nWhen you configure speculative retrying , the coordinator\
    \ node automatically retries requests with a different node after a set time elapses.\
    \ Recovering from replica node failures in this manner using speculative retrying\
    \ of read queries is called rapid read protection .\n\nYou can configure rapid\
    \ read protection by setting the `speculative_retry` property. This property determines\
    \ exactly when the coordinator node fires the extra read requests. Here are all\
    \ the ways in which you can configure this property:\n\n*   `NONE`: This is the\
    \ default value and it specifies that the coordinator not send any extra read\
    \ requests except for the original read request, regardless of the latency.\n\
    *   `ALWAYS:` After every read of a table, the coordinator sends extra read requests\
    \ to all other replica nodes in the cluster.\n*   `Xpercentile` This tells the\
    \ coordinator node to send out redundant read requests if it doesn’t receive any\
    \ responses from the replica node within a certain percentage of the value you\
    \ set for the `Xpercentile` property. For example, the typical latency for a table\
    \ is 60 milliseconds, and say you set the `Xpercentile` property to 80 percentile.\
    \ If the replica node doesn’t respond within 48 ms (80% of 60ms), Cassandra sends\
    \ out redundant read requests to other replicas.\n*   `Nms`: Under this strategy,\
    \ the coordinator node sends extra read requests if it doesn’t receive any responses\
    \ from a replica within N milliseconds.\n\nHere are some examples of how to set\
    \ the `speculative_retry` property for a table:\n\n```\ncqlsh> ALTER TABLE users\
    \ WITH speculative_retry =  '5ms\";\ncqlsh> ALTER TABLE users WITH speculative_retry\
    \ = '95percentaile';\n```"
