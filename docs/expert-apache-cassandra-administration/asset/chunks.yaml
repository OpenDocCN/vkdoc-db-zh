    ```


    You can update data in a collection set, map, or list.


    You can also perform conditional updates, as shown here:


    ```

    cqlsh> UPDATE users SET id = 12345

    WHERE lastname = ''ALAPATI'' and firstname = ''Sam''

    IF age =50;

    ```


    Conditional updates are lightweight transactions and impose a performance penalty
    and therefore you must use them judiciously.


    Change Data Capture (CDC) Logging


    Cassandra offers change data capture (CDC) logging to track data that has changed.
    You configure CDC logging on a per-table basis.


    When you decide to use CDC logging, you must also specify a limit on the amount
    of disk space the CDC logs can use. When the database flushes the memtable data
    to disk, the database moves the commit log segments that contain data relating
    the tables for which you’ve enabled CDC logging to the CDC directory.


    You can configure CDC logging when creating a table or alter an existing table
    to add the relevant table property.


    The `cdc_raw_directory property` in the `cassandra.yaml` file enables you to specify
    the directory where the database stores the CDC logs. The default locations for
    this directory are as follows:


    *   Package installations: `/var/lib/Cassandra/cdc_raw`

    *   Tarball installations: `install_location/data/cdc_raw`


    ## Working with Advanced Data Types


    You can create several advanced types of data such as the following:


    *   Collections: Enable you to group and store data together in a column.

    *   Tuples: Enable you to store multiple values together in a column.

    *   User-Defined Types (UDTs): Enable you to attach multiple data fields to a
    column.


    Note


    An UDT is only for a single keyspace. To use an UDT in a different keyspace, you
    must create the UDT again.


    I explain the three advanced data types in the following sections.


    ### Collections


    The collection data type allows you to group data together in a column. For example,
    if a user has multiple addresses or email addresses , you can store all the addresses
    together in a collection column.


    Remember that a collection is only for data with a limit on the number of values.
    That is, there’s a maximum size of an item in collection. A collection isn’t the
    way to go when storing data that grows without limit, such as events that the
    database captures and stores every second.


    CQL enables you to create three collection types:


    *   Set: A group of elements with unique values. The database doesn’t store the
    values in an ordered fashion, but cqlsh returns the elements in a sorted manner,
    such as in an alphabetical order for text values.

    *   List: A list groups multiple values, but the values need not be unique. In
    addition, a list stores elements in a specific order and you can use an index
    value to insert and query a list’s values.

    *   Map: A map establishes a relationship between two items with the help of a
    key-value pair. For each key, there’s a single value, and you can’t have duplicates.


    Tip


    Cassandra reads a whole collection, thus adversely affecting performance. Keep
    the collections way smaller than the maximum limit for each collection type.


    You declare a collection column by specifying the collection type (set, list,
    or map), followed by a type such as `int` or `text`, in angle brackets. Here are
    a couple of examples:


    ```

    list

    list

    ```


    You can create an index on all three types of collection columns.


    In the following sections, I show how to create the three collection types.


    #### Creating the Set Type


    You use the set type when you have data in a column that has a many-to-one relationship
    with data in another column. The set type helps in cases like this since you don’t
    join tables in Cassandra.


    For example, in the following example, an individual cyclist, represented by the
    `id` column, can be a member of multiple teams over time:


    ```

    cqlsh> CREATE TABLE cycling.cyclist_career_teams

    ( id UUID PRIMARY KEY, lastname text, teams set<text);

    ```


    You can query the teams that are part of the set in the following way:


    ```

    cqlsh:cycling> SELECT lastname,teams

    ...         FROM cycling.cyclist_career_teams;

    lastname        | teams

    -----------------+------------------------------------------------------------------------------------------------------

    ARMITSTEAD |                    {''AA Drink - Leontien.nl'', ''Boels-Dolmans Cycling
    Team'', ''Team Garmin - Cervelo''}

    VOS | {''Nederland bloeit'', ''Rabobank Women Team'', ''Rabobank-Liv Giant'',
    ''Rabobank-Liv Woman Cycling Team''}

    BRAND |   {''AA Drink - Leontien.nl'', ''Leontien.nl'', ''Rabobank-Liv Giant'',
    ''Rabobank-Liv Woman Cycling Team''}

    VAN DER BREGGEN |                 {''Rabobank-Liv Woman Cycling Team'', ''Sengers
    Ladies Cycling Team'', ''Team Flexpoint''}

    (4 rows)

    cqlsh:cycling>

    ```


    The maximum size of an item in the set collection type is 65,535 bytes.


    Note


    You can expire each element of a collection by specifying individual TTL properties.'
