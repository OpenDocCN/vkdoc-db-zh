  trans: "\n# 在 Docker 上存储 Cassandra 数据并使用 BDD 构建集群\n\n## 在 Docker 上存储 Cassandra 数据\n\
    \n有不止一种方法来存储在 Docker 容器中运行的 Cassandra 所使用的数据。其中两种选项如下：\n\n*   **使用 Docker 卷**：默认情况下，Docker\
    \ 通过使用其内部卷管理机制将 Cassandra 数据文件写入主机的文件系统来管理数据存储。虽然容器可以轻松查看和访问此数据，但对于运行在 Docker\
    \ 主机服务器上（而非容器内）的工具和应用程序来说，情况则不尽相同。它们可能无法轻松定位 Cassandra 的数据文件。此外，当你关闭容器，或者容器停止运行，或者\
    \ Docker 主机宕机时，数据将会丢失。\n*   **在主机服务器上创建数据目录**：你也可以将主机目录挂载为数据卷。你将主机上的数据目录挂载到容器内可见的一个目录。这样，工具和应用程序就可以轻松访问主机系统中的文件。你只需确保在主机系统上正确设置目录权限和任何\
    \ ACL（访问控制列表，用于控制对目录的访问）等，以便用户可以访问这些目录。\n\n以下是一个示例，展示了如何挂载一个带有 Docker 主机文件系统的卷：\n\
    \n```\n$ docker run –name my_container -v /host/dir://container/dir cassandra\n\
    ```\n\n当你这样做时，容器进程写入 `/container/dir` 目录的所有内容都会直接写入主机文件系统上的 `/host/dir` 目录。\n\n\
    > **注意**：CassandraCloud 是 Cloudurable 提供的一个工具，它简化了 Cassandra 在各种环境（包括 EC2、Docker\
    \ 和 VirtualBox）中的配置。详情请访问 [`https://cloudurable.github.io/cassandra-cloud/`](https://cloudurable.github.io/cassandra-cloud/).\n\
    \n## 使用 Docker-Compose 和行为驱动开发创建 Cassandra 集群\n\n你可以通过使用行为驱动开发来快速搭建 Cassandra\
    \ 的开发和测试环境。`BDD` 在许多方面与测试驱动开发（`TDD`）相似，但后者侧重于单元测试和集成测试，而 `BDD` 则侧重于系统与其用户之间的交互。\n\
    \n当你使用 `BDD` 时，你描述在各种场景下应该发生什么。例如，对于一个网站，你以用户点击和在表单中输入数据的形式描述工作流程。对于系统管理员来说，工作流程则由系统管理员与系统及程序交互时输入的命令组成。\n\
    \n在本节中，我将展示如何使用 `BDD` 以及一个名为 `Cucumber` 的工具，配合 `Docker Compose` 来开发运行 Cassandra\
    \ 的新 Docker 容器。以下是 `BDD` 和 `Docker Compose` 如何帮助你：\n\n*   `BDD` 以测试驱动的方式帮助开发新的\
    \ Docker 容器。\n*   `Docker Compose` 帮助你编排 Docker 容器。\n\n`BDD`（加上 `Cucumber`）和 `Docker-Compose`\
    \ 共同构成了一种启动新集群的令人兴奋的方式。虽然你可以使用 `Vagrant`（一个便于为开发环境启动虚拟机的工具）做类似的事情，但我在这里描述的方法要简单得多，也更有趣。\n\
    \n### 准备前提条件\n\n使用 `BDD` 设置 Cassandra 集群需要满足三个条件：\n\n*   **Docker**：如前所述，Docker\
    \ 是一个容器平台，可帮助你创建和管理容器。\n*   **Docker Compose**：这是一个帮助你定义和运行多容器 Docker 应用程序的工具。你使用一个\
    \ Compose 文件来配置应用程序所需的服务。之后，你可以用一条命令创建并启动所有服务，如下所示：\n    ```\n    $ docker-compose\
    \ up -d\n    ```\n*   **Cucumber**：`Cucumber` 是一个测试工具，通过运行用 `BDD` 风格编写的自动化验收测试来帮助测试其他软件。\n\
    \n#### 安装 Docker\n\n你需要 Docker，如果你之前按照我的讨论运行过基于 Docker 的 Cassandra 集群，那么我假设你已经安装了。如果没有，你可以下载并安装\
    \ Docker。\n\n#### 安装 Docker-Compose\n\n你可以通过以下步骤安装 `Docker-Compose`（在 Ubuntu 系统上）：\n\
    \n```\n# curl -L https://github.com/docker/compose/releases/download/1.14.0/docker-compose-'uname\
    \ -s'-'uname -m' > /usr/local/bin/docker-compose\n# chmod +x /usr/local/bin/docker-compose\n\
    ```\n\n通过调用 `docker-compose` 来测试安装。\n\n```\n# docker-compose\nDefine and run multi-container\
    \ applications with Docker.\nUsage:\ndocker-compose [-f ...] [options] [COMMAND]\
    \ [ARGS...]\ndocker-compose -h|--help\n#\n```\n\n#### 安装 Cucumber\n\n我使用的是 Ubuntu\
    \ 系统，因此我通过以下方式安装 `Cucumber`：\n\n```\n$ gem install cucumber\nFetching: gherkin-4.1.3.gem\
    \ (100%)\n...\nDone installing documentation for gherkin, cucumber-core, cucumber-wire,\
    \ cucumber after 4 seconds\n4 gems installed\n$\n```\n\n建议安装一个名为 `bundler` 的额外工具。`Bundler`\
    \ 为基于 Ruby 的项目（例如我们将要使用的 `Cucumber`）提供了一致的环境。它通过跟踪并安装你需要的所有 gems 及其正确版本来实现这一点。换句话说，`bundler`\
    \ 提供了一种摆脱依赖地狱的方法。\n\n```\n$ gem install bundler\nSuccessfully installed bundler-1.15.1\n\
    1 gem installed\n#\n```\n\n现在你已经安装了 Docker、`Docker-Compose` 和 `Cucumber`，准备好使用\
    \ `BDD` 方法启动一个 Cassandra 集群了。但首先，简单介绍一下用户故事和 `BDD`。\n\n### 用户故事\n\n`BDD` 使用故事来表达你想要完成的目标。它使用基于自然语言的\
    \ `Gherkin 语法`，这种语法与我们自然说话的方式非常相似，用来描述你想要做的事情。\n\n你将你的主要目标描述为特性（features），如下所示，这里你想要部署一个新的\
    \ Cassandra 集群：\n\n> 特性：Cassandra 集群\n>   作为一名大数据管理员\n>   我想要部署一个 Cassandra 集群\n\
    >   这样我就能存储和处理海量数据\n\n一旦你描述了你的高层目标，你就描述使目标得以实现的具体场景。在这个例子中，你想要启动一个 Cassandra 数据库并测试其版本。\n\
    \n> 场景：启动 CQL Shell\n>   假设相关服务正在运行\n>    并且我在 `cassandra` 上执行 `cqlsh -e 'show\
    \ version'`\n>    那么我应该看到 \"CQL spec 3.4.2\"\n>    并且我应该看到 \"Cassandra 3.7\"\n"
- fmt: "### Getting Ready to Run the BDD Tests\n\nAt this point, instead of doing\
    \ everything from scratch, you can download the tests and the steps for your work\
    \ from GitHub. On GitHub, coshxlabs ([`www.coshx.com`](http://www.coshx.com))\
    \ has a repository ([`https://github.com/coshx/docker-bdd`](https://github.com/coshx/docker-bdd))\
    \ that demonstrates how to use BDD and Cucumber to orchestrate Docker containers\
    \ to help you quickly spin up development environments.\n\n1.  You can check out\
    \ Coshxlabs’s code from GitHub.\n    ```\n    $ git clone https://github.com/coshx/docker-bdd\n\
    \    $ git reset --hard e9f807c\n    ```\n\n2.  Move to the directory you cloned\
    \ from GitHub, which is named `docker-bdd`. This directory contains all the artifacts\
    \ that you need to generate the Docker containers that’ll run Cassandra.\n   \
    \ ```\n    # cd docker-bdd\n    # ls\n    circle.yml  docker-compose.yml  example\
    \   Gemfile       README.md\n    deploy.sh   dockerfiles         features  Gemfile.lock\n\
    \    #\n    ```\n\n3.  Go to the `features` directory.\n    ```\n    # cd features\n\
    \    # ls\n    android_app.feature  app.feature  db.feature  step_definitions\
    \    support  web.feature\n    ```\n\n4.  Create a file named `cassandra.feature`\
    \ and add the Cassandra-related feature and scenario described in the previous\
    \ section. Save the file. Here’s what the contents of `cassandra.feature` file\
    \ should look like:\n    ```\n    # cat cassandnra.feature\n    Feature: Cassandra\
    \ Cluster\n    As a Big Data Administrator\n    I want to deploy a cassandra cluster\n\
    \    So I can store and query lots of data\n    Scenario: Launch a CQL Shell\n\
    \    Given the services are running\n    And I run \"cqlsh cassandra -e 'show\
    \ version'\" on \"cassandra-dev\"\n    Then I should see \"CQL spec\"\n    And\
    \ I should see \"Cassandra 3.7\"\n    ```\n\n5.  Change the working directory\
    \ to the `docker-bdd` directory, and edit `the docker-compose.yml` file so it\
    \ contains the following lines (the `docker-compose.yml` file contains the names\
    \ of the images that Docker should download and install).\n    ```\n    cassandra:\n\
    \    image: cassandra\n    cassandra-dev:\n    image: cassandra\n    links:\n\
    \    - cassandra\n    ```\n\nThis snippet of code creates two separate Docker\
    \ containers, both using the same Docker image (“cassandra”). You need two containers:\
    \ one for running the Cassandra instance in the background and the other for running\
    \ `cqlsh`. Remember that your scenario includes the following:\n\n```\n\"cqlsh\
    \ -e 'show version'\" on \"cassandra\"\n```\n\n### Running the BDD Tests\n\nYou’re\
    \ all set now to run the BDD tests with Cucumber. Here’s how you do this:\n\n\
    ```\n# cucumber features/cassandra.feature\nFeature: Cassandra Cluster\nAs a Big\
    \ Data Administrator\nI want to deploy a cassandra cluster\nSo I can store and\
    \ query lots of data\ncassandra uses an image, skipping\ncassandra-dev uses an\
    \ image, skipping\nPulling cassandra (cassandra:latest)...\nlatest: Pulling from\
    \ library/cassandra\nockerbdd_cassandra_1 is up-to-date\ndockerbdd_cassandra-dev_1\
    \ is up-to-date\nScenario: Launch a CQL Shell                                \
    \       # features/cassandra.feature:6\nGiven the services are running       \
    \                            # features/step_definitions/docker_compose_steps.rb:3\n\
    Running: docker-compose build && (docker-compose up -d || true)\nProcess exited\
    \ successfully\n[cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol\
    \ v4]\nAnd I run \"cqlsh cassandra -e 'show version'\" on \"cassandra-dev\" #\
    \ features/step_definitions/docker_compose_steps.rb:14\nRunning: docker-compose\
    \ run cassandra-dev bash -i -c \"sleep 1; cqlsh cassandra -e 'show version'\"\n\
    Process exited successfully\nThen I should see \"CQL spec\"                  \
    \                   # features/cassandra.feature:9\nAnd I should see \"Cassandra\
    \ 3.7\"                                 # features/cassandra.feature:10\n1 scenario\
    \ (1 undefined)\n4 steps (2 undefined, 2 passed)\n0m8.169s\n#\n```\n\nDocker-Compose\
    \ creates the single-node Cassandra cluster for you and BDD runs the tests you\
    \ specified on this cluster.\n\nThe first time you run the `cucumber` command\
    \ shown here, based on the scenario that you specified (`\"Given the services\
    \ are running\")` Docker-Compose builds all the Docker images that you’ve specified\
    \ in the `docker-compose.yml` file. On subsequent runs, `docker-compose` is aware\
    \ that both the `cassandra` and the `cassandra-dev` instances use an available\
    \ image, so it doesn’t build the images. Instead, it just starts up the two Cassandra\
    \ instances.\n\nYou can verify that the two Docker containers are running with\
    \ the `docker ps` command.\n\n```\n$ sudo docker ps\nCONTAINER ID    IMAGE   \
    \ COMMAND      CREATED  STATUS     PORTS      NAMES\nb005b61706ca    cassandra\
    \   \"/docker-entrypoint.s\"   44 minutes ago   Up 40 minutes   7000-7001/tcp,\
    \ 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra-dev_1\ned526bd724c7        cassandra\
    \           \"/docker-entrypoint.s\"   44 minutes ago      Up 40 minutes     \
    \  7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra_1\n$\n```\n\n\
    And you can bash into a container (`dockerbdd_cassandra_dev1`) as shown here:\n\
    \n```\n$ sudo docker exec -it b005b61706ca bash\n/# hostname\nb005b61706ca\n/#\n\
    ```\n\nAnd finally, you can use the CQL shell in the new Docker container as shown\
    \ here:\n\n```\n$ cqlsh\nConnected to Test Cluster at 127.0.0.1:9042.\n[cqlsh\
    \ 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for\
    \ help.\ncqlsh>\n```\n\nYou can get more details about BDD-driven Cassandra clusters,\
    \ including details about creating a multi-node Cassandra cluster, from an article\
    \ written by Coshxlab’s Ben Taitelbaum, available at the following location:\n\
    \n[`www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/`](http://www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/)\n\
    \n## Using the Cassandra Cluster Manager to Spin Up Clusters\n\nThe Cassandra\
    \ Cluster Manager (CCM) is a script library that helps you create and run a Cassandra\
    \ cluster on a local server. CCM isn’t for production usage or for stress testing\
    \ a cluster; it’s a way to test and learn how to run a Cassandra cluster. CCM\
    \ is an alternative to both Docker and Vagrant as a way to quickly spin up a Cassandra\
    \ cluster.\n\nYou use CCM in the following situations:\n\n*   When you want to\
    \ run Cassandra without bothering to install it\n*   To test failure scenarios\n\
    *   When developing with multiple versions without worrying about the hardware,\
    \ since you can run everything on the local node\n*   For integration testing\n\
    *   For testing upgrades\n\nWhat’s amazing about CCM is how quickly it enables\
    \ you to get a new cluster up and running. You can spin up a multi-node (local)\
    \ cluster in under a minute."
