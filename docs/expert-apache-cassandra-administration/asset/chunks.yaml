    \ spark-cassandra-connector，以便可以从 Spark 集群与 Cassandra 通信。`–packages` 选项使你能够指定\
    \ `spark-cassandra-connector`。此选项从 Spark 包下载连接器及其依赖项。\n\n请注意，你需要从 `$SPARK_HOME/bin`\
    \ 目录运行 `spark-shell` 命令，而不是从启动 Spark 实例的 `$SPARK_HOME/sbin` 目录运行。\n\n```bash\n\
    bin# ./spark-shell --conf spark.cassandra.connection.host=192.168.159.129 --packages\
