- "# 2. 安装 Cassandra 并开始使用 CQL Shell\n\n在本章中，您将学习如何安装 Cassandra 并创建一个单节点的 Cassandra\
  \ “集群”。一旦您初步尝试，就能轻松过渡到创建和配置多节点 Cassandra 集群，这是我将在第 3 章讨论的主题。\n\n创建 Cassandra 集群后，您将学习如何使用\
  \ `cqlsh`，即 CQL Shell 的命令行界面。完成本章后，您将知道如何启动和停止集群、创建键空间和表，以及如何插入和查询数据。\n\n### 安装\
  \ Apache Cassandra\n\nCassandra 易于设置和上手。在本节中，我将展示如何在 Linux（具体是 Ubuntu 16.04 LTS\
  \ 服务器）上安装 Cassandra。\n\n学会安装 Cassandra 后，我将展示如何在单台机器上创建一个简单的单节点 Cassandra 集群。在第\
  \ 3 章中，我将展示如何创建一个包含多个节点的 Cassandra 集群。\n\n### 安装规划\n\n我使用在 VMware 上运行的 Ubuntu 16.04\
  \ LTS 服务器来展示安装过程。该服务器有 4GB RAM 和 20GB 存储空间。\n\n在开始安装 Cassandra 之前，您需要在服务器上创建一个用户和组来管理\
  \ Cassandra。将用户和组都命名为 `cassandra`。以下是创建用户和组的步骤：\n\n```\n$ sudo groupadd –r cassandra\n\
  $ sudo useradd –r –m cassandra –g cassandra –G users\n```\n\n### 安装 Cassandra 的前提条件\n\
  \n在安装 Cassandra 之前，有两个基本前提条件：您必须安装正确版本的 Java，并且需要最新版本的 Python。\n\n以下两个部分展示了如何安装\
  \ Java 和 Python（如果需要安装）。\n\n#### Java\n\n您需要最新 64 位版本的 Java 8，Oracle Java 标准版或 OpenJDK\
  \ 8 均可（我使用 Oracle JRE）。您可以通过以下方式检查已安装的 Java 软件版本：\n\n```\n$ java -version\njava\
  \ version \"1.8.0_101\"\nJava(TM) SE Runtime Environment (build 1.8.0_101-b13)\n\
  Java HotSpot(TM) 64-Bit Server VM (build 25.101-b13, mixed mode)\n$\n```\n\n如果输出中第一行没有显示类似\
  \ `java version \"1.8.0_101\"` 的内容（输出共三行），则需要安装 Java。请按照以下步骤安装 Oracle JDK。\n\n1.\
  \  从 Oracle Java SE Downloads 下载 Oracle JDK 安装程序，需先接受许可协议。您可以在此处下载 JDK：[`www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk8-downloads-2133151.html)\n\
  2.  为 JDK 创建一个目录。\n\n    ```\n    $ sudo mkdir –p /usr/lib/jvm\n    ```\n\n3.  解压\
  \ tar 包后安装 JDK。\n\n    ```\n    $ sudo tar zxf jdk-8u65-linux-x64.tr.gz –C /usr/lib/jvm\n\
  \    ```\n\n    您可以在名为 `/usr/lbi/jvm/jdk-8u-version` 的目录中找到 JDK 文件。\n4.  您需要使用 `alternatives`\
  \ 命令让操作系统知道新的 Java 版本。\n\n    ```\n    $ sudo update-alternatives –install \"/usr/bin/java\"\
  \ \"java\" \"/usr/lib/jvm/jdk1.8.0_101/bin/java\"\n    ```\n\n5.  再次运行 `alternatives`\
  \ 命令，这次是为了将新安装的 JDK 设为默认的 Java 版本。\n\n    ```\n    $ sudo update-alternatives –config\
  \ java\n    ```\n\n    此命令确保如果您安装了多个 Java 版本，默认版本将切换为您刚刚安装的版本。\n6.  确认安装是否正确。\n\n\
  \    ```\n    $ java -version\n    java version \"1.8.0_101\"\n    Java(TM) SE Runtime\
  \ Environment (build 1.8.0_101-b13)\n    Java HotSpot(TM) 64-Bit Server VM (build\
  \ 25.101-b13, mixed mode)\n    $\n    ```\n\n\n\n\n## Python\n\n虽然运行 Cassandra 本身需要\
  \ Java，但运行 `cqlsh`（Cassandra 数据库的命令行界面）则需要 Python。具体来说，你需要最新版的 Python 2.7。\n\n你可以用以下命令检查当前的\
  \ Python 版本：\n\n```\n$ python\nPython 2.7.12 (default, Nov 19 2016, 06:48:10)\n\
  [GCC 5.4.0 20160609] on linux2\nType \"help\", \"copyright\", \"credits\" or \"\
  license\" for more information.\n>>>\n```\n\n就我的情况而言，Ubuntu 服务器已预装了 Python。如果你需要安装\
  \ Python，可以按以下步骤操作。\n\n1.  安装所需的软件包。\n\n    ```\n    $ sudo apt-get install build-essential\
  \ checkinstall\n    $ sudo apt-get install libreadline-gplv2-dev libncursesw5-dev\
  \ libssl-dev libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev\n    ```\n\n\
  2.  下载 Python 二进制文件。\n\n    ```\n    $ cd /usr/src\n    $ wget https://www.python.org/ftp/python/2.7.12/Python-2.7.12.tgz\n\
  \    ```\n\n3.  解压软件包。\n\n    ```\n    $ tar xzf Python-2.7.12.tgz\n    ```\n\n\
  4.  编译 Python 源代码。\n\n    ```\n    $ cd Python-2.7.12\n    $ sudo ./configure\n\
  \    $ sudo make altinstall\n    ```\n\n5.  检查 Python 版本。\n\n    ```\n    $ python2.7\
  \ -V\n    Python 2.7.13\n    $\n    ```\n\n### 安装 Cassandra\n\n你可以从下载的源二进制归档文件安装、运行\
  \ Cassandra，或者使用 `yum` 或 `apt-get` 将 Cassandra 软件包作为服务来安装（仅限 Linux）。本节将展示这两种安装 Cassandra\
  \ 的方法。你也可以使用一种不太常见的第三种方法来安装，即下载源代码并进行编译。\n\n### 从源代码构建\n\n你可以使用 Apache Ant 从源代码构建\
  \ Cassandra。从源代码构建时，你需要使用 Java 8 JDK，而不仅仅是 JRE。以下是构建源代码的步骤。\n\n1.  如果你还没有 Ant，请从\
  \ [`http://ant.apache.org`](http://ant.apache.org) 下载。\n2.  获取 Cassandra 源代码的只读主干版本。\n\
  \n    ```\n    $ git clone git://git.apache.org/cassandra.git\n    ```\n\n3.  转到源代码下载的根目录并运行\
  \ `ant`。\n\n    ```\n    $ ant\n    ```\n\nAnt 会在当前目录中查找 `build.xml` 文件并执行默认的构建目标。Ant\
  \ 会构建源文件并执行测试，如果一切顺利，你将看到一条 `BUILD SUCCESSFUL` 的消息。\n\n### 从 Debian 软件包安装\n\n从 Debian\
  \ 软件包安装与从源二进制归档文件安装一样简单，具体步骤如下。\n\n1.  将 Cassandra 的 Apache 软件仓库添加到 `/etc/apt/sources.list.d/cassandra.sources.list`，如下所示：\n\
  \n    ```\n    $ echo \"deb http://www.apache.org/dist/cassandra/debian 311x main\"\
  \ | sudo tee -a /etc/apt/sources.list.d/cassandra.sources.list\n    ```\n\n2.  添加\
  \ Apache Cassandra 软件仓库密钥。\n\n    ```\n    $ curl https://www.apache.org/dist/cassandra/KEYS\
  \ | sudo apt-key add -\n    $ sudo apt-key adv --keyserver pool.sks-keyservers.net\
  \ --recv-key A278B781FE4B2BDA\n    ```\n\n3.  更新软件包索引。\n\n    ```\n    $ sudo apt-get\
  \ update\n    ```\n\n4.  现在，你已准备好安装 Cassandra。\n\n    ```\n    $ sudo apt-get install\
  \ cassandra\n    ```\n\n5.  你可以通过运行以下命令来启动、停止和检查此服务器上 Apache Cassandra 服务的状态：\n\n\
  \    ```\n    $ sudo systemctl start cassandra.service\n    $ sudo systemctl stop\
  \ cassandra.service\n    $ sudo systemctl status cassandra.service\n    [sudo] password\
  \ for samalapati:\n    ● cassandra.service - LSB: distributed storage system for\
  \ structured data\n       Loaded: loaded (/etc/init.d/cassandra; bad; vendor preset:\
  \ enabled)\n       Active: active (running) since Fri 2017-09-29 08:07:57 PDT; 42min\
  \ ago\n        Docs: man:systemd-sysv-generator(8)\n       Memory: 2.2G\n      \
  \    CPU: 40.810s\n       CGroup: /system.slice/cassandra.service\n            \
  \   └─5432 java -Xloggc:/var/log/cassandra/gc.log -ea -XX:+UseThreadPrior\n    Sep\
  \ 29 08:07:57 ubuntu systemd[1]: Starting LSB: distributed storage system for\n\
  \    Sep 29 08:07:57 ubuntu systemd[1]: Started LSB: distributed storage system\
  \ for s\n    Sep 29 08:08:11 ubuntu systemd[1]: Started LSB: distributed storage\
  \ system for s\n    ```\n\n6.  你可以通过以下操作让 Cassandra 服务在系统启动时自动启用：\n\n    ```\n \
  \   $ sudo systemctl enable cassandra.service\n    ```\n\n7.  由于 Debian 软件包在安装后会自动启动\
  \ Cassandra 服务，如果你计划部署一个真实的集群而非测试服务，则必须停止该服务并清除数据。这样做可以从 Cassandra 的系统表中删除默认的集群名称（`Test\
  \ Cluster`）。清除数据的方法如下：\n\n    ```\n    $ sudo systemctl stop cassandra.service\n\
  \    $ sudo rm -rf /var/lib/cassandra/data/system/*\n    ```\n\n### 从源二进制归档文件构建\n\
  \n开始安装 Cassandra 最简单的方法是从 Cassandra 网站 [`http://cassandra.apache.org/download/`](http://cassandra.apache.org/download/)\
  \ 下载并安装二进制归档文件。\n\n你也可以使用类似 `curl` 的命令下载最新的归档文件：\n\n```\n$ curl –OL http://www.apache.org/dist/cassandra/3.9.0/apache-cassandra-3.9.0-bin.tar.gz\n\
  ```\n\n请按照以下步骤从二进制归档文件下载并安装 Cassandra。\n\n1.  下载最新的 Cassandra 版本，即 3.9（发布于 2016-09-29）。\n\
  2.  从归档文件中解压安装文件。\n\n    ```\n    $ sudo tar –xzvf apache-cassandra-3.9-bin.tar.gz\n\
  \    ```\n\n    `tar` 命令会将文件解压到 `apache-cassandra-3.9` 目录中。\n3.  将解压后的目录移动到 `/usr/share`\
  \ 库。\n\n    ```\n    $ sudo mv apache-cassandra-3.9 /usr/share\n    ```\n\n4.  如下所示，为该目录创建一个符号链接：\n\
  \n    ```\n    $ sudo ln –s /usr/share/apache-cassandra-3.9 /usr/share/cassandra\n\
  \    ```\n\n创建符号链接对于后续操作是个好主意。符号链接允许你在同一安装中保留多个版本的 Cassandra。你只需要简单地更改链接指向的位置，即可在不同版本之间切换。\n\
  \n就这样，安装完成了！与安装关系型数据库并进行配置不同，安装 Cassandra 并开始使用它非常容易。完全无需任何配置，就可以开箱即用并开始使用 Cassandra。当然，你需要进行配置和调优以发挥其最大性能，但对于新手来说，开始使用这个数据库是相当容易的。\n\
  \n在下一节中，我将展示如何通过在 `cassandra.yaml`（Cassandra 的主配置文件）中输入和修改配置属性来配置 Cassandra。稍后，我会告诉你如何启动和停止\
  \ Cassandra。\n\n### 创建必要的目录\n\n你需要创建一组基本的三个目录，以便 Cassandra 知道将表和其他数据存储在何处。以用户 `cassandra`\
  \ 的身份创建以下三个数据目录：\n\n```\n$ mkdir /usr/share/cassandra/commitlog\n$ mkdir /usr/share/cassandra/data\n\
  $ mkdir /usr/share/cassandra/saved_caches\n```\n\n无论你是否创建，Cassandra 都会创建这三个目录；你自己创建的原因是为了让这些目录位于你选择的位置，而不是默认目录中。\n\
  \n\n\n\n### 配置 Cassandra\n\n`cassandra.yaml`文件是为 Cassandra 集群设置配置属性的关键配置文件，例如以下各项：\n\
  \n*   调优和资源利用参数\n*   缓存参数\n*   客户端连接\n*   备份\n*   安全\n\nCassandra 提供了一个`cassandra.yaml`模板，位于`$CASSANDRA_HOME/conf`目录中。刚开始使用\
  \ Cassandra 时，你只需编辑少量配置属性即可开始使用。之后，一旦你充分理解了 Cassandra 的架构和关键概念，就该着手调整那些影响性能以及 Cassandra\
  \ 其他许多方面的配置属性了，本书相关章节会对这些进行讲解。\n\n## cassandra.yaml 文件的位置\n\n默认情况下，`cassandra.yaml`文件位于以下位置：\n\
  \n*   `/etc/cassandra` （用于 Cassandra 包安装）\n*   `<install_location>/conf` （用于 Cassandra\
  \ 压缩包安装）\n\n### 必须设置的最小配置属性\n\n虽然你可以在`cassandra.yaml`文件中配置数百个初始化参数，但开始时你只需要配置少数几个属性：\n\
  \n*   `cluster_name`\n*   `listen_adresss`\n*   `listen_interface`\n\n我将在以下小节中解释这些基本属性。你可以用不同的名称保存默认的`cassandra.yaml`，然后创建一个只包含这些属性的新`cassandra.yaml`文件来启动你的第一个单节点\
  \ Cassandra 集群。你通过在属性后加冒号来指定每个配置属性。\n\n### cluster_name 参数\n\n`cluster_name`参数允许你为\
  \ Cassandra 集群命名。默认值是 Test Cluster。显然，在多节点集群中，你必须为所有节点指定相同的`cluster_name`值。\n\n\
  `cluster_name`参数的主要目的是防止属于一个逻辑集群的节点加入其他集群。\n\n### listen_adresss 属性\n\n`listen_address`属性决定了\
  \ Cassandra 在连接到其他节点时绑定的 IP 地址（或主机名）。默认值是`localhost`。如果你运行的是单节点集群，可以使用此参数的默认设置。\n\
  \n注意：请勿将`listen_address`参数的值设置为 0.0.0.0。\n\n### listen_interface 参数\n\n`listen_interface`参数指定了\
  \ Cassandra 在连接到其他节点时绑定的网络接口，并且必须对应于单个地址。\n\n如果你设置了`listen_address`属性，就可以省略`listen_interface`参数，反之亦然。\n\
  \n### 设置数据文件目录位置\n\n你可以在`cassandra.yaml`文件中指定用于存储 Cassandra 数据文件及其缓存目录的目录。\n\n你必须配置两个主要目录来指定\
  \ Cassandra 存储其数据的位置；第一个位置用于存储 SSTable，第二个位置用于存储提交日志。此外，还有第三个目录用于存储缓存数据，称为`saved_caches`目录。\n\
  \n虽然 Cassandra 会在其默认位置为你创建这些目录，但你也可以为以下三个 Cassandra 目录设置自定义位置，如下所示：\n\n*   `data_file_directories:\
  \ /usr/share/cassandra/data`\n*   `commitlog_directory: /usr/share/cassandra/commitlog`\n\
  *   `saved_caches_directory: /usr/share/cassandra/saved_caches`\n\n默认情况下，Cassandra\
  \ 将其数据存储在以下位置：\n\n*   `/var/lib/cassandra` （用于包安装）\n*   `<install_location>/data/data`\
  \ （用于压缩包安装）\n\n如果你不设置此参数，默认目录将是`$CASSANDRA_HOME/data/data`。\n\n### 存储缓存目录的位置\n\n\
  Cassandra 需要一个目录来存储其键缓存和行缓存。其默认位置是\n\n*   `/var/lib/cassandra/saved_caches` （用于包安装）\n\
  *   `<install_location>/data/saved_caches` （用于压缩包安装）\n\n### 设置存储提交日志的位置\n\n你应该为存储提交日志分配一个不同的目录，理想情况下应位于不同的物理磁盘上。\n\
  \n默认情况下，Cassandra 将提交日志存储在`/var/lib/cassandra/commitlog`目录中。如果你不设置它，默认目录将是：\n\n\
  `$CASSANDRA_HOME/data/commitlog`\n\n### 配置防火墙\n\n在启动 Cassandra 实例之前，请确保可以通过打开以下端口从\
  \ Cassandra 运行的服务器外部访问 Cassandra 服务：\n\n*   `7000`\n*   `7199`\n*   `9042`\n*  \
  \ `9160`\n\n### 探索 CQL Shell\n\nCassandra 查询语言（CQL）是与 Cassandra 数据库通信的主要方式。与 Cassandra\
  \ 交互最简单的方法是使用 CQL shell，即`cqlsh`。\n\n你通过`cqlsh`创建键空间、表以及读写数据。在以下部分中，我将向你展示如何开始使用`cqlsh`。\n\
  \n### 启动 CQL Shell\n\n你使用`cqlsh`命令启动 CQL shell，如下所示：\n\n```\n$ cqlsh\nConnected\
  \ to Test Cluster at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2\
  \ | Native protocol v4]\nUse HELP for help.\ncqlsh>\n```\n\n你在`cqlsh`提示符下输入`exit`来终止\
  \ CQL shell：\n\n```\ncqlsh:mykeyspace1> exit;\n$\n```\n\n## cqlsh 中的时区\n\nCassandra\
  \ 默认使用 UTC 时区显示时间戳。你必须安装`pytz`库才能使用不同时区显示时间戳。\n\n### 在 CQL Shell 中获取帮助\n\nCQL shell\
  \ 中的 HELP 功能很强大。当你在`cqlsh`命令行输入`HELP`时，你会看到所有 HELP 选项，就像其他任何命令行工具一样。\n\n```\ncqlsh>\
  \ help\nDocumented shell commands:\n===========================\nCAPTURE  CLS  \
  \        COPY  DESCRIBE  EXPAND  LOGIN   SERIAL  SOURCE   UNICODE\nCLEAR    CONSISTENCY\
  \  DESC  EXIT      HELP    PAGING  SHOW    TRACING\nCQL help topics:\n================\n\
  AGGREGATES               CREATE_KEYSPACE           DROP_TRIGGER        TEXT\nALTER_KEYSPACE\
  \           CREATE_MATERIALIZED_VIEW  DROP_TYPE           TIME\nALTER_MATERIALIZED_VIEW\
  \  CREATE_ROLE                 DROP_USER       TIMESTAMP\nALTER_TABLE          \
  \    CREATE_TABLE                     FUNCTIONS       TRUNCATE\nALTER_TYPE     \
  \          CREATE_TRIGGER            GRANT              TYPES\nALTER_USER      \
  \         CREATE_TYPE               INSERT            UPDATE\nAPPLY            \
  \        CREATE_USER               INSERT_JSON          USE\nASCII             \
  \       DATE                      INT                 UUID\nBATCH              \
  \      DELETE                    JSON\nBEGIN                    DROP_AGGREGATE \
  \           KEYWORDS\nBLOB                     DROP_COLUMNFAMILY         LIST_PERMISSIONS\n\
  BOOLEAN                  DROP_FUNCTION             LIST_ROLES\nCOUNTER         \
  \         DROP_INDEX                LIST_USERS\nCREATE_AGGREGATE         DROP_KEYSPACE\
  \             PERMISSIONS\nCREATE_COLUMNFAMILY      DROP_MATERIALIZED_VIEW    REVOKE\n\
  CREATE_FUNCTION          DROP_ROLE                 SELECT\nCREATE_INDEX        \
  \     DROP_TABLE                SELECT_JSON\ncqlsh>\n```\n\n此外，当你向`HELP`命令传递一个选项时，例如`HELP\
  \ CREATE_TABLE`，Cassandra 会显示一个漂亮的屏幕，展示该命令的语法，如图 2-1 所示。\n\n![A436674_1_En_2_Fig1_HTML.jpg](img/A436674_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1：CREATE TABLE 语句的 HELP 命令\n\n注意：`cqlsh`保证能良好运行（即完全兼容）的只是与其所属的 Cassandra 版本。它可能与更旧或更新的\
  \ Cassandra 版本也能良好运行，但不要指望这一点！\n\n\n### 命令行 CQL Shell 选项\n\n你将使用 `cqlsh` 来执行许多任务，因此你应该熟练掌握基本的\
  \ CQL 命令行选项。`cqlsh` 实用程序附带了几个有用的命令行选项，也称为有文档记录的 shell 命令。我将在此展示如何使用最有用的 CQL shell\
  \ 选项。\n\n## `capture` 命令\n\n`CAPTURE` 命令将捕获一个命令的输出并将其添加到文本文件中，如下例所示：\n\n```\ncqlsh>\
  \ capture '/home/test/Cassandra/output/testfile'\n```\n\n一旦你发出 `CAPTURE` 命令，shell\
  \ 将捕获你在该会话中发出的所有后续 CQL 命令的输出，直到你使用 `capture off` 命令关闭输出捕获：\n\n```\ncqlsh> capture\
  \ off;\n```\n\n## `copy` 命令\n\n`COPY` 命令非常适合将数据从 Cassandra 表捕获到文本文件中。下面是一个示例，展示了如何将名为\
  \ `employees` 的表的内容捕获到文件 `myfile` 中：\n\n```\ncqlsh> copy employee (emp_id, emp_cicty,\
  \ emp_name, emp_sal) to 'myfile';\n```\n\n## `describe` 命令\n\n`DESCRIBE` 命令将描述 Cassandra\
  \ 集群中的各种实体。在下面的示例中，`describe cluster` 命令描述了 Cassandra 集群及其顶级对象：\n\n```\ncqlsh> describe\
  \ cluster;\nCluster: Test Cluster\nPartitioner: Murmur3Partitioner\ncqlsh>\n```\n\
  \n你可以使用 `DESCRIBE` 命令获取其他几个实体的描述：\n\n*   `Describe types`: 列出所有用户定义的数据类型\n*   `Describe\
  \ type`: 描述一个用户定义的数据类型\n*   `Describe tables`: 列出一个键空间中的所有表\n*   `Describe table`:\
  \ 描述一个表\n*   `Describe keyspaces`: 列出集群中的所有键空间\n\n注意：`DESC` 命令与 `DESCRIBE` 命令功能相同。\n\
  \n以下是一个展示如何运行 `DESCRIBE KEYSPACES` 命令的示例：\n\n```\ncqlsh> describe keyspaces;\ntest1\
  \          system_auth  system_distributed  testdata\nsystem_schema  system    \
  \   system_traces\ncqlsh>\n```\n\n假设我有一个名为 `quarters` 的表。当我运行 `describe table quarters`\
  \ 命令时，我得到了一大堆输出，尽管我只用几行代码创建了表。\n\n```\ncqlsh> use testdata;\ncqlsh:testdata> describe\
  \ table quarters;\nCREATE TABLE testdata.quarters (\nid int PRIMARY KEY,\nname text\n\
  ) WITH bloom_filter_fp_chance = 0.01\nAND caching = {'keys': 'ALL', 'rows_per_partition':\
  \ 'NONE'}\nAND comment = ''\nAND compaction = {'class': 'org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy',\
  \ 'max_threshold': '32', 'min_threshold': '4'}\nAND compression = {'chunk_length_in_kb':\
  \ '64', 'class': 'org.apache.cassandra.io.compress.LZ4Compressor'}\nAND crc_check_chance\
  \ = 1.0\nAND dclocal_read_repair_chance = 0.1\nAND default_time_to_live = 0\nAND\
  \ gc_grace_seconds = 864000\nAND max_index_interval = 2048\nAND memtable_flush_period_in_ms\
  \ = 0\nAND min_index_interval = 128\nAND read_repair_chance = 0.0\nAND speculative_retry\
  \ = '99PERCENTILE';\ncqlsh:testdata>\n```\n\n如果你来自 Oracle 等关系型数据库，你可能只认识这些表选项中的一个，即\
  \ `PRIMARY KEY`，这是在创建表时必须指定的。其余的都是默认值。这正是 Cassandra 如此有趣的原因，因为有很多新的、有趣的东西需要学习和使用。你将在相应的章节中学习所有这些表选项。\n\
  \n## `expand` 命令\n\n`expand` 命令以垂直方式显示表行的内容，便于阅读长行数据。无需像默认水平格式那样向右滚动，而是向下滚动以查看更多行内容。\n\
  \n假设你的查询产生以下输出：\n\n```\ncqlsh:mykeyspace1> select * from employee;\nemp_id | emp_city\
  \    | emp_name | emp_phone   | emp_sal\n--------+-------------+----------+-------------+---------\n\
  1 | San Antonio |     juan | 39874622562 |   90000\n2 |     Houston |      jim |\
  \ 87209887521 |  100000\n3 |      Austin |      sam | 87361598012 |   50000\n(3\
  \ rows)\ncqlsh:mykeyspace1>\n```\n\n现在你希望获得更详细的输出。你可以先在 `cqlsh` 会话中发出 `expand on`\
  \ 命令，然后再执行你原来的命令。\n\n```\ncqlsh:mykeyspace1>\nexpand on;\nNow Expanded output is\
  \ enabled\ncqlsh:mykeyspace1> select * from employee;\n@ Row 1\n-----------+-------------\n\
  emp_id    | 1\nemp_city  | San Antonio\nemp_name  | juan\nemp_phone | 39874622562\n\
  emp_sal   | 90000\n@ Row 2\n-----------+-------------\nemp_id    | 2\nemp_city \
  \ | Houston\nemp_name  | jim\nemp_phone | 87209887521\nemp_sal   | 100000\n@ Row\
  \ 3\n-----------+-------------\nemp_id    | 3\nemp_city  | Austin\nemp_name  | sam\n\
  emp_phone | 87361598012\nemp_sal   | 50000\n(3 rows)\ncqlsh:mykeyspace1>\n```\n\n\
  完成后请务必关闭扩展输出：\n\n```\ncqlsh:mykeyspace1> expand off;\nDisabled Expanded output.\n\
  cqlsh:mykeyspace1>\n```\n\n## `tracing` 命令\n\n`tracing` 命令让你能够启用和禁用对数据库中运行事务的跟踪。你可以使用跟踪来诊断性能问题。`system_traces`\
  \ 键空间捕获有关 Cassandra 内部操作的信息。该键空间中名为 `session` 的表捕获查询结果和高层细节。Cassandra 将其执行的所有操作的详细信息捕获在\
  \ `system_traces.events` 表中。我将在第 11 章详细解释跟踪。\n\n### Cassandra 安装目录\n\n当你安装 Cassandra\
  \ 时，安装程序会创建一堆目录，了解这些目录是什么以及里面有什么是个好主意。\n\n目录的位置取决于你是通过 tarball 还是软件包安装的 Cassandra。通常，tarball\
  \ 安装会在安装目录下创建所有目录，而软件包安装会将其目录存储在 `/etc` 和 `/var` 目录下。\n\n在我的情况下，我使用 tarball 安装了\
  \ Cassandra，所以我将展示我安装中的目录结构，如下所示：\n\n```\n$ cd $CASSANDRA_HOME\n$ ls\nbin      \
  \    conf  interface  lib          NEWS.txt    pylib\nCHANGES.txt  doc   javadoc\
  \    LICENSE.txt  NOTICE.txt  tools\n$\n```\n\n以下部分描述了关键的 Cassandra 目录以及这些目录下的重要文件。\n\
  \n### `bin` 目录\n\n`bin` 目录包含各种实用程序和启动脚本，如下所示：\n\n```\n$ ls\ncassandra         cqlsh.py\
  \         sstableloader       sstableutil.bat\ncassandra.bat     debug-cql     \
  \   sstableloader.bat   sstableverify\ncassandra.in.bat  debug-cql.bat    sstablescrub\
  \        sstableverify.bat\ncassandra.in.sh   nano.save        sstablescrub.bat\
  \    stop-server\ncassandra.ps1     nodetool         sstableupgrade      stop-server.bat\n\
  cqlsh             nodetool.bat     sstableupgrade.bat  stop-server.ps1\ncqlsh.bat\
  \         source-conf.ps1  sstableutil\n$\n```\n\n`bin` 目录是你找到以下关键实用程序的地方：\n\n*\
  \   `cassandra`: 此实用程序可帮助你启动一个 Cassandra 实例，我将在下一节中解释。\n*   `cqlsh`: `cqlsh` 实用程序启动\
  \ CQL shell，使你能够编写 CQL 查询以与 Cassandra 通信。\n*   `nodetool`: `nodetool` 实用程序是 Cassandra\
  \ 管理员的得力助手。它让你能够执行众多管理任务，例如检查集群状态、停用节点、添加节点等。在本书中，我将使用 `nodetool` 来执行许多管理任务。\n*\
  \   `sstableloader`: 此工具使你能够将数据加载到 SSTable 中，我将在第 9 章中解释。\n\n## The tools 目录\n\n\
  `tools` 目录包含用于压力测试和管理 SSTable 等任务的实用 Cassandra 工具，如下所示：\n*   `cassandra-stress`：Cassandra\
  \ 的负载测试工具\n*   `sstabledump`：以 JSON 格式转储 SSTable 内容的实用程序\n*   `sstablesplit`：将 SSTable\
  \ 拆分为多个表的工具\n*   `sstablemetadata`：打印关于 SSTable 的元数据。\n\n## The lib 目录\n\n`lib`\
  \ 目录包含了 Cassandra 在运行时可能需要的所有外部库，例如 JSON 序列化库和 Apache commons 库。\n\n## The conf\
  \ 目录\n\n`conf` 目录包含了配置 Cassandra 集群所需的一切。它包含了让你能够设置 Cassandra 节点以及集群机架运行时属性的配置文件。此目录还包含了你为数据库设置环境的文件。以下是此目录中关键文件的简要说明：\n\
  *   `cassandra.yaml`：这是 Cassandra 的主配置文件。\n*   `cassandra-env.sh`：这是你配置 Java、JVM\
  \ 和 JMX 的 Linux 设置的文件。\n*   `cassandra-rackdc.properties`：此文件定义了由 `GossipingPropertyFileSnitch`、`Ec2Snitch`、`Ec2MultiRegionSnitch`\
  \ 和 `GoogleCloudSnitch` 等各种 snitch 使用的默认数据中心和机架。\n*   `Cassandra-topology.properties`：此文件定义了\
  \ `PropertyFileSnitch` 的默认数据中心和机架。\n*   `jvm.options`：允许你设置 Cassandra 启动 JVM 时将使用的选项。\n\
  *   `commitlog_archiving.properties`：用于配置提交日志。\n*   `metrics-reporter-config-sample.yaml`：一个示例文件，展示如何配置\
  \ Cassandra 指标。\n*   `logback.xml`：Logback 配置文件，帮助你配置 Cassandra 的日志设置。\n\n## The\
  \ Javadoc 目录\n\n`javadoc` 目录包含一个使用 JavaDoc 工具生成的文档网站。这不是一个完整的文档，而只是存储在 Java 代码中的注释。要阅读\
  \ JavaDoc，请在浏览器中打开 `javadoc/index.html` 文件。\n\n### 启动和停止 Cassandra\n\n你通过发出 `cassandra`\
  \ 命令来启动和停止 Cassandra。`cassandra` 实用程序以及其他关键的 Cassandra 管理工具位于 `$CASSANDRA_HOME/bin`\
  \ 目录中。\n\n### 启动 Cassandra\n\n你可以使用 `cassandra` 命令启动 Cassandra。你可以选择添加以下标志：\n* \
  \  `-f` 在前台启动 Cassandra（默认情况下，`cassandra` 命令在后台启动数据库）。在前台运行意味着服务器会将所有日志打印到标准输出，你可以在终端窗口中看到它们。\n\
  *   无论你是以后台还是前台模式运行 Cassandra，服务器日志总是写入 `system.log` 文件。\n*   `-R` 以 root 用户身份启动\
  \ Cassandra。\n\n```\n以下是如何启动 Cassandra 实例的示例（以 root 用户身份，在前台启动）：\n$ cassandra -f\
  \ -R\n...\nINFO  20:33:47 Configuration location: file:/cassandra/apache-cassandra-3.9/conf/cassandra.yaml\n\
  data_file_directories=[Ljava.lang.String;@175c2241; disk_access_mode=auto; disk_failure_policy=stop;\
  \ dynamic_snitch=true; dynamic_snitch_badness_threshold=0.1; dynamic_snitch_reset_interval_in_ms=600000;\n\
  ...\nINFO  20:33:57 Initializing system_schema.keyspaces\nINFO  20:33:59 Cassandra\
  \ version: 3.9\nINFO  20:34:00 Loading persisted ring state\nINFO  20:34:00 Starting\
  \ up server gossip\nINFO  20:34:00 Updating topology for localhost/127.0.0.1\nINFO\
  \  20:34:01 Node localhost/127.0.0.1 state jump to NORMAL\nINFO  20:34:01 Starting\
  \ listening for CQL clients on localhost/127.0.0.1:9042 (unencrypted)...\n```\n\n\
  我运行了带 `–f` 选项的 `cassandra` 命令，因此选择在前台运行实例。所以，Cassandra 会持续在终端打印所有日志信息。如果你以后台默认模式启动\
  \ Cassandra，在 Cassandra 实例启动后按 Enter 键即可返回 Linux 命令提示符。\n\n让我们回顾一下我在这里展示的简要输出，因为它教给了我们一些有价值的事情：\n\
  *   Loading persisted ring state：加载环状态。\n*   Starting up server gossip：与 gossip\
  \ 相关的语句表明服务器正在与集群中其他节点启动通信。\n*   Updating topology：通过添加你已添加到集群的任何新节点来更新集群拓扑。\n*\
  \   Node … state jump to NORMAL：这意味着 Cassandra 已正常启动，并等待你通过 `cqlsh` 或其他方式与其进行交互。\n\
  \n服务器启动后，Cassandra 会持续写入 `system.log` 文件，更新其中与内部数据库活动相关的信息，例如 memtable 的刷新和 SSTable\
  \ 的压缩。\n\n### 检查 Cassandra 的状态\n\n你可以使用 `nodetool status` 命令检查实例的状态。`nodetool` 实用程序仅在\
  \ Cassandra 实例在节点上运行时才有效。`nodetool` 是一个非常有用的 Cassandra 工具，熟悉它是个好主意。\n\n输入 `nodetool\
  \ –help` 查看所有你可以执行的 `nodetool` 命令：\n\n```\n$ nodetool -help\nusage: nodetool [(-h\
  \  | --host )] [(-p  | --port )]\n[(-pwf  | --password-file )]\n[(-u  | --username\
  \ )]\n[(-pw  | --password )]  []\nThe most commonly used nodetool commands are:\n\
  assassinate                  Forcefully remove a dead node without re-replicating\
  \ any data.  Use as a last resort if you cannot removenode\nbootstrap          \
  \          Monitor/manage node's bootstrap process\ncleanup                    \
  \  Triggers the immediate cleanup of keys no longer belonging to a node. By default,\
  \ clean all keyspaces\nclearsnapshot                Remove the snapshot with the\
  \ given name from the given keyspaces. If no snapshotName is specified we will remove\
  \ all snapshots\ncompact                      Force a (major) compaction on one\
  \ or more tables or user-defined compaction on given SSTables\ncompactionhistory\
  \            Print history of compaction\ncompactionstats              Print statistics\
  \ on compactions\ndecommission                 Decommission the *node I am connecting\
  \ to*\ndescribecluster              Print the name, snitch, partitioner and schema\
  \ version of a cluster\n...\n```\n\n如果没有 Cassandra 实例在运行时执行 `nodetool`，你会得到一个错误：\n\
  \n```\n$ nodetool status\nnodetool: Failed to connect to '127.0.0.1:7199' - ConnectException:\
  \ 'Connection refused'.\n$\n```\n\n\n### `nodetool status` 命令\n\n`nodetool status`\
  \ 命令用于了解 Cassandra 集群的状态。既然我现在有 Cassandra 实例在运行，我可以使用 `nodetool` 来检查它：\n\n```\n\
  $ nodetool status\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n\
  |/ State=Normal/Leaving/Joining/Moving\n--  Address          Load       Tokens \
  \      Owns (effective)  Host ID                     Rack\nUN  192.168.177.132 \
  \ 203.5 KiB  256          100.0%            b0ade950-937a-457c-95eb-d3032897eeb1\
  \  rack1\n$\n```\n\n输出中的每个节点都由其 IP 地址表示。`nodetool` 状态报告的第一列显示了 Cassandra 实例的状态和状态。\n\
  \n状态可以有两个值：`Up` 或 `Down`。\n\n状态可以是以下四个值之一：\n\n*   `Normal`\n*   `Leaving`\n*   `Joining`\n\
  *   `Moving`\n\n在我这里，我看到的是 `UN`，意味着 `向上/正常`。`Owns` 列显示了该节点在每个数据中心拥有的数据百分比乘以数据的复制因子。例如，如果一个节点拥有\
  \ 33% 的数据，而复制因子是 2，那么 `Owns` 列会显示 67%。由于目前我的集群中只有一个节点，它拥有集群中全部（100%）的数据。糟糕的数据模型会影响数据在集群节点间的分布，检查每个节点拥有的数据百分比是验证数据模型是否良好的一个好方法。\n\
  \n## 使用 `nodetool info` 命令测试服务器\n\n`nodetool info` 命令显示诸如运行时间和负载等信息，有助于验证 Cassandra\
  \ 实例是否正常运行，如下所示：\n\n```\n$ sudo nodetool info\nID                     : 99c43633-c691-4dee-b7af-35bc6e74dd67\n\
  Gossip active          : true\nThrift active          : false\nNative Transport\
  \ active: true\nLoad                   : 296.85 KiB\nGeneration No          : 1489357081\n\
  Uptime (seconds)       : 1714\nHeap Memory (MB)       : 120.53 / 1014.00\nOff Heap\
  \ Memory (MB)   : 0.00\nData Center            : datacenter1\nRack             \
  \      : rack1\nExceptions             : 21\nKey Cache              : entries 32,\
  \ size 2.56 KiB, capacity 50 MiB, 1344 hits, 1395 requests, 0.963 recent hit rate,\
  \ 14400 save period in seconds\nRow Cache              : entries 0, size 0 bytes,\
  \ capacity 0 bytes, 0 hits, 0 requests, NaN recent hit rate, 0 save period in seconds\n\
  Counter Cache          : entries 0, size 0 bytes, capacity 25 MiB, 0 hits, 0 requests,\
  \ NaN recent hit rate, 7200 save period in seconds\nChunk Cache            : entries\
  \ 30, size 1.88 MiB, capacity 221 MiB, 128 misses, 2738 requests, 0.953 recent hit\
  \ rate, 866.987 microseconds miss latency\nToken                  : (invoke with\
  \ -T/--tokens to see all 256 tokens)\n```\n\n如果这个 `nodetool` 命令挂起超过一分钟左右，那就意味着你的服务器网络配置有问题。\n\
  \n## 停止 Cassandra\n\n没有专门的 Cassandra 命令来停止正在运行的实例。如果你在前台启动了 Cassandra，按下 `Control-C`\
  \ 来停止它。如果你在后台启动了 Cassandra，你可以使用 Linux 的 `kill` 命令来停止实例。首先，用 `pgrep –f CassandraDaemon`\
  \ 命令找到 PID（Linux 进程 ID），然后用 Linux 的 `kill` 命令将其终止：\n\n```\n$ sudo pgrep -f CassandraDaemon\n\
  ```\n\n或者，你可以简单地运行 `ps` 命令来获取 Cassandra 的 PID：\n\n```\n$ sudo ps auwx | grep cassandra\n\
  ```\n\n一旦你通过我展示的两种方法之一获得了 Cassandra 的 PID，你就可以像这样终止实例：\n\n```\n$ sudo kill 2284\n\
  ```\n\n或者，你可以通过运行以下命令一步到位地终止实例：\n\n```\n$ sudo pkill –f CassandraDaemon\n```\n\n\
  你会注意到在 `$CASSANDRA_HOME/bin` 目录下有一个名为 `stop-server` 的脚本。然而，这个脚本实际上并不会停止任何东西！如果你运行它，它会建议你在使用前阅读该脚本。\n\
  \n```\necho \"please read the stop-server script before use\"\n# if you are using\
  \ the cassandra start script with -p, this\n# is the best way to stop:\n# kill 'cat\
  \ '\n# otherwise, you can run something like this, but\n# this is a shotgun approach\
  \ and will kill other processes\n# with cassandra in their name or arguments too:\n\
  # user=\"whoami\"\n# pgrep -u $user -f cassandra | xargs kill -9\n```\n\n你可以创建一个简单的\
  \ shell 脚本，比如下面这个，来关闭 Cassandra：\n\n```\n#!/bin/bash\nCASSPID='ps –ef |grep CassandraDaemon\
  \ |grep –v grep |awk '{ print $2 }'\nif [[ \"$CASSPID\" == '' ]]\nthen\necho Cassandra\
  \ is NOT running\nelse\nkill $CASSPID\nfi\n```\n\n### 使用 `service` 命令启动和停止\n\n对于打包安装，你也可以将\
  \ Cassandra 作为服务（Java 服务器进程）启动。你会在 `/etc/init.d` 目录中找到启动脚本。该服务以 Cassandra 用户身份运行。\n\
  \n在 Debian 系统上，安装软件后 Cassandra 服务会自动启动。你可以使用以下命令检查服务状态、停止和重启它：\n\n```\n$ sudo service\
  \ cassandra status\n$ sudo service cassandra stop\n$ sudo service cassandra start\n\
  ```\n\n在具有多个节点的集群中运行 `service cassandra start` 命令时，在初始启动时，你必须从种子节点开始，一次启动一个节点。\n\
  \n如果你尝试在 tarball 安装中运行 `service cassandra` 命令，你会收到一个错误：\n\n```\n# service cassandra\
  \ status\n● cassandra.service\nLoaded: not-found (Reason: No such file or directory)\n\
  Active: inactive (dead)\n#\n```\n\n### 清除 Cassandra 数据\n\n有时你可能需要清除 Cassandra 数据。你可能只需要删除\
  \ `data` 目录中的数据，或者删除所有默认目录中的数据。我在本节中解释了删除目录的步骤。\n\n清除 Cassandra 数据的步骤在包安装和独立安装中是相似的，仅默认目录的位置不同。\n\
  \n要清除包安装中所有默认目录的数据，请执行以下操作：\n\n```\n$ cd install_location\n$ rm –rf data/*\n```\n\
  \n这将删除默认目录中的数据，包括提交日志和 `saved-caches` 目录。\n\n要仅删除数据目录，请执行以下操作：\n\n```\n$ sudo rm\
  \ -rf data/data/*\n```\n\n你可以通过以下方式删除包安装中的所有数据（来自默认目录）：\n\n```\n$ sudo service cassandra\
  \ stop\n$ sudo rm –rf /var/lib/cassandra/*\n```\n\n### 验证 Cassandra 版本\n\n`cassandra`\
  \ 命令的输出会告诉你 Cassandra 的版本。你也可以通过运行带有 `–v` 选项的 `cassandra` 命令来查找版本：\n\n```\n$ ./cassandra\
  \ -v\n3.9\n$\n```\n\n`–v` 选项只是打印 Cassandra 版本然后退出。你也可以执行 `show version` 命令来获取版本信息：\n\
  \n```\ncqlsh> show version;\n[cqlsh 5.0.1 | Cassandra 3.7 | CQL spec 3.4.2 | Native\
  \ protocol v4]\ncqlsh>\n```\n\n`nodetool version` 命令也显示 Cassandra 版本：\n\n```\n$\
  \ nodetool version\nReleaseVersion: 3.11.0\n$\n```\n\n### 配置 `cqlsh`\n\n`cqlsh`\
  \ 工具是高度可配置的，你可以通过专用配置文件或在命令行选择多个选项来配置它。让我们回顾一下配置 `cqlsh` 的两种方式。\n\n### 通过 `cqlshrc`\
  \ 配置文件配置\n\n你可以在 `cqlshrc` 文件中配置各种属性。Cassandra 为你提供了一个 `cqlshrc.sample` 文件，你可以将其重命名为\
  \ `cqlshrc`。`cqlshrc.sample` 文件位于 `$CASSANDRA_HOME/conf` 目录中。以下是 `cqlshrc.sample`\
  \ 文件的部分内容：\n\n```\n[cql]\n;; A version of CQL to use (this should almost never be\
  \ set)\n; version = 3.2.1\n[connection]\n;; The host to connect to\nhostname = 127.0.0.1\n\
  ;; The port to connect to (9042 is the native protocol default)\nport = 9042\n;;\
  \ Always connect using SSL - false by default\n; ssl = true\n;; A timeout in seconds\
  \ for opening new connections\n; timeout = 10\n;; A timeout in seconds for executing\
  \ queries\n; request_timeout = 10\n...\n```\n\n\n### 通过在命令行指定选项进行配置\n\n你可以在命令行为\
  \ `cqlsh` 指定多个选项。举个简单的例子，你可以使用 `–cqlshrc` 选项来指定 `cqlsh` 配置文件 `cqlshrc` 的非默认位置：\n\
  \n```\n$ cqlsh –cqlshrc $CASSANDRA_HOME/newconf\n```\n\n### 查找版本\n\n你可以使用同一个 `VERSION`\
  \ 命令来查找不仅 Cassandra 的版本，还有 `cqlsh`、CQL 以及原生协议的版本：\n\n```\ncqlsh> show version\n\
  [cqlsh 5.0.1 | Cassandra 3.9 | CQL spec 3.4.2 | Native protocol v4]\ncqlsh>\n```\n\
  \n### Cqlsh 选项\n\n`cqlsh` 带有众多选项以方便你的工作，我将在以下章节中描述最有用的选项。\n\n#### 清屏\n\n你可以在 `cqlsh`\
  \ 命令行键入 `clear` 或 `CLS` 来清屏。\n\n#### 从文件运行命令\n\n通常，你可能希望按顺序运行一系列命令。这种情况下，你可以简单地使用\
  \ `vi` 或 `nano` 等文本编辑器将所有命令存储在一个文本文件中。例如，以下两行内容在一个名为 `myfile` 的文件中：\n\n```\nuse\
  \ mykeyspace1\nselect * from employees\n```\n\n一旦你用 `cqlsh` 命令创建了文本文件，就可以使用 `source`\
  \ 命令来调用这些命令，如下所示：\n\n```\ncqlsh> source  '/cassandra/test/myfile';\n```\n\n## 全面体验\
  \ Cassandra\n\n现在你已经安装、配置、启动和停止了 Cassandra 实例，你已经克服了一个主要障碍。为了了解 Cassandra 的功能，此时创建一些测试数据是个好主意。\n\
  \n在本节中，我将连接到 CQL shell，创建一个键空间和一个表，然后从该表中进行查询。现在先跟着操作，语法和其他有趣的内容我将在第 4 章和第 5 章中解释。\n\
  \n### 连接到 CQL Shell\n\n你可以通过在命令提示符下键入 `cqlsh` 来连接到 CQL shell，如下所示：\n\n```\n$ ./cqlsh\n\
  Connected to Test Cluster at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra 3.9 | CQL\
  \ spec 3.4.2 | Native protocol v4]\nUse HELP for help.\ncqlsh>\n```\n\n请注意，`cqlsh`\
  \ 连接到的集群是名为 `Test Cluster` 的 Cassandra 集群，这恰好是 Cassandra 集群的默认名称。\n\n在这个例子中，我没有指定\
  \ `cqlsh` 应该连接到哪个 Cassandra 节点，因此它连接到运行在 `localhost` 上的 Cassandra 实例。如果你在多节点集群中运行\
  \ `cqlsh` 命令，你可以连接到集群中的特定节点。为此，你需要在命令行上指定主机名和端口：\n\n```\n$ cqlsh 192.168.177.140\
  \ 9160\n```\n\n### 创建键空间\n\n正如你将很快了解到的，要在 Cassandra 表中存储数据，必须首先创建一个键空间。创建此键空间后，你就可以在其中创建表来存储数据。\n\
  \n以下是如何创建一个名为 `testdata` 的键空间：\n\n```\ncqlsh> create keyspace testdata with replication\
  \ = {'class' : 'SimpleStrategy', 'replication_factor' : 2};\ncqlsh>\n```\n\n此示例创建了一个名为\
  \ `testdata` 的键空间，复制因子为 2。不必担心命令的语法；你将在第 4 章学习所有这些内容。\n\n### 创建表\n\n现在你的键空间已经准备好了，是时候创建你的第一个\
  \ Cassandra 表了！在发出 `create table` 命令之前，先运行 `use testdata` 命令，以便 Cassandra 在 `testdata`\
  \ 键空间中创建表。\n\n```\ncqlsh> use testdata;\ncqlsh:testdata>\ncqlsh:testdata> create\
  \ table quarters ( id int PRIMARY KEY, name text );\n```\n\n你可以通过运行 `describe tables`\
  \ 命令来验证 Cassandra 是否创建了你的新表：\n\n```\ncqlsh:testdata> describe tables;\nquarters\n\
  cqlsh:testdata>\n```\n\n### 插入测试数据\n\n让我们向 `quarters` 表中插入一些测试数据。\n\n```\ncqlsh:testdata>\
  \ insert into quarters (id,name) VALUES(1, 'Spring');\ncqlsh:testdata> insert into\
  \ quarters (id,name) VALUES(2, 'Summer');\ncqlsh:testdata> insert into quarters\
  \ (id,name) VALUES(3, 'Fall');\ncqlsh:testdata> insert into quarters (id,name) VALUES(4,\
  \ 'Winter');\ncqlsh:testdata>\n```\n\n### 查询表\n\n让我们查询 `quarters` 表。\n\n```\ncqlsh:testdata>\
  \ select * from quarters;\nid | name\n----+--------\n1 | Spring\n2 | Summer\n4 |\
  \ Winter\n3 |   Fall\n(4 rows)\ncqlsh:testdata>\n```\n\n### 获取命令历史记录\n\n你可以通过进入运行这些命令的用户主目录下的名为\
  \ `.cassandra` 的目录，来获取所有 `cqlsh` 以及 `nodetool` 命令的历史记录。\n\n```\nubuntu2:/home/samalapati/.cassandra$\
  \  ls -altr\ntotal 16\n-rw-------  1 samalapati samalapati    5 Mar  5 17:22 cqlsh_history\n\
  -rw-rw-r--  1 samalapati samalapati 3156 Mar 11 11:44 nodetool.history\n...\n```\n\
  \n在隐藏目录 `.cassandra` 中，你会找到两个文件：`cqlsh_history` 和 `nodetool.history`，它们分别存储了你运行过的所有\
  \ `cqlsh` 和 `nodetool` 命令的历史记录。\n\n现在你拥有了一个崭新的 Cassandra 单节点集群。是时候在下一章中转向多节点集群了。\n\
  \n## 总结\n\n你可以通过多种方式安装 Cassandra：通过源代码、二进制包或二进制 tar 包。\n\n初次接触 Cassandra 时，你可以从仅配置少数几个参数开始，并随着对\
  \ Cassandra 的了解加深，逐步学习配置其余属性。\n\n学习如何运行 CQL shell 命令将有助于提高你的工作效率。浏览各种 Cassandra\
  \ 目录，如 `bin`、`conf`、`tools` 和 `logs`，以便熟悉 Cassandra 提供的整个工具集。这种目录浏览也有助于你了解 Cassandra\
  \ 存储各种内容（如数据、日志、快照和其他各种工件）的位置。\n\n为你的集群创建启动和停止脚本是个好主意。\n\n### 3. 部署 Cassandra 集群\n\
  \n在第 2 章中，你学习了如何安装和配置单节点 Cassandra 集群。从简单的单节点集群开始，是为了让新手熟悉 Cassandra 术语并学习启动和停止\
  \ Cassandra 节点的基础知识。\n\n然而，Cassandra 的真正优势在于其分布式架构，因此在本章中，我将展示如何创建和配置多节点集群。\n\n\
  你将学习如何创建、启动和停止多节点集群，包括单数据中心和多数据中心的情况。本章还向你展示如何在 Amazon Web Services 环境中的云端创建多节点\
  \ Cassandra 集群。\n\n### 规划集群部署\n\n在规划 Cassandra 集群部署时，你必须确定要启动的节点数量以及这些节点的配置。对于小型开发集群，节点的配置并不关键。然而，对于生产部署，为内存、CPU、磁盘和网络选择合适的配置至关重要。\n\
  \n##### 使用 cassandra-stress 规划生产部署\n\nCassandra 提供了一个强大的工具，用于在开始生产操作之前对集群进行压力测试。该工具名为\
  \ `cassandra-stress`，我将在讨论 Cassandra 性能调优的第 11 章中详细解释它。\n\n\n### 选择内存\n\n无论您使用虚拟机还是专用硬件，都需要确保为您的生产\
  \ Cassandra 环境配备足够的内存。尽管 Cassandra 只需要最低 8GB 的 RAM，但服务器应至少配备 64GB 至 512GB 的 RAM。\n\
  \n对于 Cassandra 节点，没有“理想”的 RAM 容量。内存大小取决于节点将要处理的数据量。请记住，数据写入首先会进入内存中的表（`memtables`），然后再从那里写入到磁盘上的\
  \ `SSTables`。\n\n如果 Cassandra 节点内存太少，其 `memtables` 会相应变小，这意味着数据库必须将更多的 `SSTables`\
  \ 刷写到磁盘。这将导致查询需要执行更昂贵的磁盘 I/O 操作来读取磁盘上的大量文件。底线是，您能购买的 RAM 越多越好。\n\n### 选择 CPU\n\n\
  Cassandra 针对写入进行了优化，因此 CPU 是性能的限制因素。插入数据的工作负载在达到内存限制之前，会先达到 CPU 限制。\n\nDataStax\
  \ 建议您使用专用硬件，理想的 CPU 数量为 16 个处理器。\n\n### 网络考量\n\nCassandra 是一个分布式数据库，因此网络需要为读写活动以及数据复制传输大量数据块。建议的网络带宽为\
  \ 1GB 或更高。\n\n### 选择存储\n\n最佳的存储选择包括存储类型（如 `SAN` 和其他存储类型）以及存储容量的大小。了解 Cassandra 如何使用存储也有助于做出最佳的存储选择。\n\
  \nCassandra 可以充分利用 `SSD` 提供的高 IOPS。假设您有一组很少读取其数据的表。您可以将 `SSD` 用于常用的列族以提高 I/O 速度，并使用普通存储驱动器来存储不常访问的数据。\n\
  \n#### 不建议使用 NFS、SAN 和 NAS\n\nDataStax 建议您不要在 Cassandra 环境中使用 `SAN`、`NDFS` 或 `NAS`\
  \ 存储。DataStax 还建议您不要在本地部署的 Cassandra 集群中使用 `SAN` 或 `NAS` 存储。\n\n不建议使用 `SAN` 的原因如下：\n\
  *   在持续扩展集群的 Cassandra 环境中，`SAN` 的投资回报率不高。\n*   由于 Cassandra 的 I/O 通常高于阵列控制器的处理能力，`SAN`\
  \ 会成为瓶颈，甚至更糟，成为单点故障。\n*   尽管使用了 `SSD` 和高速网络，`SAN` 仍会增加 Cassandra 操作的延迟。\n*   `SAN`\
  \ 的传输与 Cassandra 流量同时发生，会使网络带宽饱和，给所有网络用户带来问题。\n\n如果您必须使用 `SAN`，则需要具备调查诸如 `SAN` 光纤饱和等问题的专业知识。\n\
  \n不推荐使用网络附加存储（`NAS`）设备，因为其读写操作的 I/O 等待时间过长，会导致网络瓶颈。这些瓶颈可能源于路由器延迟以及网络接口卡（`NIC`s）的问题。\n\
  \n最后，DataStax 不推荐使用网络文件系统（`NFS`）存储，因为它在删除和移动文件时行为不一致。\n\n#### Cassandra 如何使用磁盘存储\n\
  \n理解 Cassandra 存储要求的关键在于了解 Cassandra 何时以及如何将数据写入磁盘。Cassandra 在以下场景中将数据写入磁盘：\n* \
  \  写入提交日志时\n*   将 `memtables` 刷写为 `SSTable` 数据文件时\n*   定期压缩 `SSTables` 时（压缩操作会暂时增加磁盘使用量）\n\
  \n#### 压缩与存储要求\n\n压缩需要磁盘上有足够的空闲空间来完成工作。压缩的存储要求取决于所有 `SSTables` 的大小以及您采用的压缩策略。\n\n\
  在最坏的情况下，当您使用名为 `SizeTieredCompactionStrategy` 的压缩策略时，您需要相当于数据库正在压缩的所有 `SSTables`\
  \ 总和 50% 的空闲存储空间。\n\n我将在第 11 章中解释压缩的存储要求。\n\n#### 估算可用磁盘容量\n\nCassandra 主要使用磁盘存储来存放提交日志和数据目录，后者存储\
  \ `SSTable` 数据。除此之外，它还需要一些空闲存储来执行压缩工作。理想情况下，您应将提交日志存储在与数据目录不同的存储驱动器上。\n\n您可以使用以下方法计算集群的总可用存储容量。\n\
  \n1.  计算物理磁盘的总原始容量。\n    ```\n    原始容量 = 磁盘大小 * 每台服务器的磁盘数量\n    示例：12 块磁盘 * 7.2\
  \ TB = 86.4 TB\n    ```\n\n2.  扣除 10% 的格式化开销，计算可用磁盘空间。\n    ```\n    格式化后的磁盘空间 =\
  \ 原始容量 * 0.9\n    示例：86.4 * 0.9 = 76.76 TB\n    ```\n\n3.  由于 Cassandra 需要磁盘存储空间用于压缩和修复操作，您不能将磁盘的所有格式化空间都用于提交日志和数据目录。DataStax\
  \ 建议您仅将存储驱动器容量的 50-80% 用于存储数据，其余部分留给压缩活动。在这种情况下，我大约有 77TB 的格式化磁盘空间，因此我可以在其中使用 38.5TB\
  \ 到 62TB 之间的任何空间来存储数据（`SSTables` + 提交日志）。\n\n### 为 Linux 服务器选择生产设置\n\n如前所述，本书使用\
  \ Linux 服务器来运行 Cassandra 集群。您可以在大多数 Linux 版本上运行 Cassandra。本书中的所有工作均使用 Ubuntu 16.04\
  \ LTS 服务器。\n\n#### Java 版本\n\n您必须使用最新版本的 Java，并且可以使用 Oracle Java 平台或 `OpenJDK`。我使用的是\
  \ Oracle Java 平台，标准版 8 `JDK`。\n\n#### Linux 服务器和内核设置\n\n要优化 Apache Cassandra 安装，请遵循\
  \ DataStax 的建议，我将在以下部分进行解释。\n\n#### 同步时钟并启用 NTP\n\n仅当存在带有更近时间戳的新版本时，Cassandra 才会覆盖列。因此，同步集群中所有节点的时钟至关重要。您可以使用\
  \ `NTP`（网络时间协议）或其他方法来同步时钟。\n\n如果您的集群无法访问互联网，则必须将集群中的一台服务器设置为 `NTP` 服务器。通过编辑 `/etc/sysconfig/ntpd`\
  \ 文件来启用 `NTP` 守护进程，从而同步所有集群节点的网络时间。\n\n#### 在 NUMA 系统上禁用 zone_reclaim_mode\n\n为避免潜在的性能问题，您必须禁用\
  \ `zone_reclaim_mode`。您可以通过以下方式检查该模式是否已启用：\n```\n$ cat /proc/sys/vm/zone_reclaim_mode\n\
  $\n```\n如果输出不为零，请使用以下命令禁用该模式：\n```\n$ echo 0 > /proc/sys/vm/zone_reclaim_mode\n\
  ```\n\n#### TCP 设置\n\n您需要提高默认的 TCP 设置，这些默认设置仅适用于小型配置。对于繁忙的生产环境（具有数百或数千个并发连接），您需要通过编辑\
  \ `/etc/sysctl.conf` 文件来为 TCP 参数设置以下值：\n```\nnet.core.rmem_max = 16777216\nnet.core.wmem_max\
  \ = 16777216\nnet.core.rmem_default = 16777216\nnet.core.wmem_default = 16777216\n\
  net.core.optmem_max = 40960\nnet.ipv4.tcp_rmem = 4096 87380 16777216\nnet.ipv4.tcp_wmem\
  \ = 4096 65536 16777216\n```\n您必须重新启动 Linux 服务器，新的 TCP 设置才能生效。如果您想在不重启服务器的情况下更改设置，可以发出以下命令：\n\
  ```\n$ sudo sysctl –p /etc/sysctl.conf\n```\n\n\n"
- "# 用户资源限制\n\n您必须在 `/etc/security/limits.conf` 文件中为各类用户资源设置以下限制：\n```\n - memlock\
  \ unlimited\n - nofile 100000\n - nproc 32768\n - as unlimited\n```\n\n此外，您还需要包含以下设置：\n\
  ```\nvm.max_map_count = 1048575\n```\n\n如果您使用的是基于 Red Hat 的 Linux 服务器，还必须在 `/etc/security/limits.d/90-nproc.conf`\
  \ 文件中设置以下 `nproc` 限制：\n```\ncassandra_user  - nproc 32768\n```\n\n"
- '# PAM 安全设置


  对于许多 Linux 版本，您必须启用 `pam_limits.so` 模块。这通过取消 `/etc/pam.d/su` 文件中以下行的注释来实现：

  ```

  session  required  pam_limits.so

  ```


  '
- '# 设置 Java 堆大小


  调整 Java 垃圾回收（GC）是优化 Java 应用程序最重要的单一措施。Cassandra 运行在 JVM 中，因此设置合适的堆大小对性能至关重要。


  Java 有多种垃圾回收算法。最常见的是并发标记扫描（CMS）垃圾收集器。然而，在较新版本的 Java 中，G1（垃圾优先）垃圾收集器通常是推荐的垃圾回收算法。


  关于选择 Java 垃圾收集器，您需要了解以下几点：


  *   CMS 需要更多时间和精力来调优，而 G1 易于配置且大多能自我调优。

  *   CMS 更适合固定的工作负载，而 G1 更适合频繁变化、集群运行不同进程的工作负载。

  *   对于使用小于 14GB 堆大小且延迟是主要关注点的较小环境，推荐的收集器是 CMS。

  *   对于使用 14GB-64GB 之间堆大小的环境，G1 优于 CMS。与 CMS 在垃圾回收期间停止所有应用线程不同，G1 垃圾收集器的线程扫描堆的各个区域，收集器在应用程序线程运行时执行堆压缩。

  *   您必须将堆大小设置为运行 Cassandra 实例的服务器总 RAM 的 0.25 到 0.5 之间。


  第 11 章详细解释了 Java 垃圾回收，并展示了如何查看 GC 日志以配置 Cassandra 的最佳堆大小。


  '
- '# 禁用交换空间


  为避免在低可用内存条件下因交换导致的高延迟，您应完全禁用交换空间。操作方法如下：

  ```

  $ sudo swapoff –all

  ```


  为使此更改在重启后依然生效，您还必须从 `/etc/fstab` 文件中移除与交换文件相关的条目。


  默认情况下，大多数 Linux 操作系统的默认 `swappiness` 设置为 60。如果将 `swappiness` 设置为零，Linux 将避免使用磁盘，除非内存用尽；而将其设置为
  100 则意味着操作系统会立即将程序交换到磁盘。可以看出，设置为 60 意味着当内存使用量达到操作系统 RAM 分配的大约一半时，操作系统就会开始频繁使用磁盘上的交换文件。如果您将
  `swappiness` 调低至 10，那么操作系统只会在 RAM 使用率达到约 90% 时才使用磁盘上的交换文件。


  Linux 管理员可以通过在 `/etc/sysctl.conf` 文件中添加以下内容来更改系统的 `swappiness` 值：

  ```

  vm.swappiness=10

  ```


  管理员必须重启服务器才能使新的 `swappiness` 设置生效。关于应将 `swappiness` 级别设置多低，并无固定规则；许多专家建议将其设置为 1。


