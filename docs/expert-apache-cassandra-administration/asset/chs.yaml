  12. org.apache.cassandra.request\n13. org.apache.cassandra.net\nSERVER: service:jmx:rmi:///jndi/rmi://ubuntu:7199/jmxrmi\n\
  ====================================================\nSelect a domain:\n```\n\n\
  了解了 JMX 客户端的基础知识后，现在让我们转向如何管理 Cassandra 的日志记录功能。\n\n### 日志记录\n\nCassandra 有两个主要日志：`system.log`\
  \ 和 `debug.log`。`system.log` 文件记录数据库中的所有活动，包括启动和关闭活动，以及所有与节点相关的任务活动。它还记录你对数据库模式所做的所有更改，例如对键空间和表的修改。\n\
  \nCassandra 中的日志记录使用 Java 简单日志门面（SLF4J）结合 logback 后端。你可以通过编程方式或手动配置日志记录。在本章中，我将重点介绍日志记录的手动配置，你可以通过以下方式之一进行。\n\
  \n*   通过配置 `logback.xml` 文件。默认情况下，logback 会依次查找 `logback-test.xml` 和 `logback.xml`\
  \ 文件以获取日志记录配置详细信息。\n*   你可以通过运行 `nodetool setlogginglevel` 命令来配置日志级别。\n*   你还可以通过\
  \ JMX 客户端（例如 JConsole 工具）配置日志记录。\n\n以下各节说明了如何使用所有三种方法配置日志记录。但首先，让我解释如何设置 Cassandra\
  \ 存储各种日志文件的日志记录位置。\n\n\n\n## 设置日志位置\n\nCassandra 的安装方式决定了默认的日志记录位置。根据你是使用软件包还是 tarball\
  \ 安装方法，默认日志位置可能是 `/var/log/cassandra` 或 `$CASSANDRA_HOME/logs` 目录。在名为 `logs` 的子目录中，你可以找到两个重要的\
  \ Cassandra 日志文件：`system.log` 和 `debug.log`。\n\n你可以通过向 `cassandra-env.sh` 文件添加以下行来更改默认日志位置：\n\
  ```\nexport CASSANDRA_LOG_DIR=/new/log/location\n```\n\n在 `cassandra-env.sh` 文件中设置\
  \ `CASSANDRA_LOG_DIR` 参数将使 Cassandra 将其所有日志文件存储在此位置。例如，如果你想为 `system.log` 和 `debug.log`\
  \ 文件指定不同的目录，可以通过在 `logback.xml` 文件中配置这两个日志文件的 `${cassandra.logdir}` 属性来指定位置。\n\n\
  > **注意**\n>\n> 你也可以通过 `JConsole` 工具使用 JMX 配置日志记录。\n\n你也可以通过编辑 `logback.xml` 文件中的以下条目并指定不同的文件名来修改日志目录的位置：\n\
  ```\n${cassandra.logdir}/system.log\n```\n\n### 通过 Logback 配置日志记录\n\nCassandra 的日志记录功能由带有\
  \ `logback` 后端的 `SLF4J` 支持。你可以通过配置随 Cassandra 自动安装的 `logback.xml`（或 `logback-test.xml`）文件来手动配置日志记录。\n\
  \n由于 `logback` 是 Cassandra 日志记录的关键部分，我将在下一节回顾 `logback` 框架的要点。\n\n### Logback 日志框架\n\
  \n`Logback` 是著名的 `log4j` 日志框架的继承者。`Logback` 由创建 `log4j` 的同一人创建，它在 `log4j` 先前工作的基础上构建，而\
  \ `log4j` 作为一个日志框架已取得了巨大成功。正如 `Logback` 的创建者所说：“如果你喜欢 `log4j`，你会爱上 `Logback`。”\n\
  \n`Logback` 框架相比 `log4j` 提供了许多优势，例如：\n\n*   一套广泛的测试，造就了一个高度可靠的日志框架\n*   修改后自动重新加载配置文件\n\
  *   在日志轮转期间自动压缩归档日志文件\n*   自动删除旧的日志归档文件\n*   使用 if-then 结构对配置文件进行条件处理，因此单个配置文件可以服务于多个环境\n\
  *   `SiftingAppender` 非常通用，你可以使用它根据各种运行时属性（如用户会话）来分离日志记录。\n\n在下一节中，我将简要描述 `Logback`\
  \ 日志框架的工作原理。\n\n### Logback 框架的主要组件：Logger、Appenders 和 Layouts\n\n`Logback` 使用三个主要组件协同工作，根据消息类型和级别记录消息，并控制消息的格式以及报告日志消息的位置。这三个主要类如下：\n\
  \n*   `Logger`\n*   `Appender`\n*   `Layout`\n\n#### Logger\n\n`Logger` 类决定 `Logback`\
  \ 将记录什么。它允许 `Logback` 根据其记录器选择性地启用或禁用日志记录请求。根记录器位于层次结构的顶部，并且是每个层次结构的一部分。记录器可以被分配级别，如\
  \ `TRACE`、`DEBUG`、`ERROR` 等。如果你没有为记录器分配级别，它将从其祖先继承日志级别。根记录器始终有一个分配的级别，默认为 `DEBUG`。这确保了根记录器的所有子记录器都将继承一个级别。\n\
  \n`Logback` 对其日志级别的排序如下：\n```\nTRACE < DEBUG < INFO < WARN < ERROR\n```\n\n如果你将根记录器的日志级别设置为\
  \ `Level.OFF`（最高日志级别），你将完全关闭日志记录。\n\n#### Appender\n\n一个 `Appender` 负责将日志记录事件写入组件，它指向一个或多个输出目的地，`Logback`\
  \ 允许日志记录请求在这些目的地打印。例如，日志记录请求可以打印到控制台（`appender name='CONSOLE'`）、文件（`<appender name=\"\
  FILE\" class=\"ch.qos.logback.core.FileAppender\">`）以及 `MYSQL` 和 `Oracle` 等数据库，还有远程的\
  \ `Linux Syslog` 守护进程。\n\n你可以为一个记录器配置多个追加器。追加器从记录器层次结构中累加继承，这意味着如果你将控制台追加器添加到根记录器，那么所有日志记录请求都将显示在控制台上。\n\
  \n特殊的追加器 `RollingFileAppender` 具有轮转日志文件的能力。例如，此追加器可以记录到名为 `mylog.txt` 的文件，并且在满足你设置的某些条件后，将其日志记录目标切换到不同的文件。\n\
  \n你可以向追加器添加过滤器，以根据日志消息内容或一天中的时间等标准来过滤事件。\n\n#### Layout\n\n追加器帮助你自定义输出目的地，而 `Layout`\
  \ 类则自定义输出格式。你通过将布局与追加器关联来实现这一点。\n\n布局配置日志记录请求的格式，而追加器负责将格式化的输出发送到你配置的目的地。\n\n\n\n\
  # Cassandra 日志与性能调优\n\n## `logback.xml` 文件\n\n以下是一个展示各类 Appender 的 `logback.xml`\
  \ 示例文件：\n\n```\n<configuration>\n  <appender name=\"SYSTEMLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
  >\n    <file>${cassandra.logdir}/system.log</file>\n    <rollingPolicy class=\"\
  ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\">\n      <fileNamePattern>${cassandra.logdir}/system.log.%i.zip</fileNamePattern>\n\
  \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n  \
  \    <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n    </encoder>\n\
  \  </appender>\n\n  <appender name=\"DEBUGLOG\" class=\"ch.qos.logback.core.rolling.RollingFileAppender\"\
  >\n    <file>${cassandra.logdir}/debug.log</file>\n    <rollingPolicy class=\"ch.qos.logback.core.rolling.SizeAndTimeBasedRollingPolicy\"\
  >\n      <fileNamePattern>${cassandra.logdir}/debug.log.%i.zip</fileNamePattern>\n\
  \      <maxFileSize>20MB</maxFileSize>\n    </rollingPolicy>\n    <encoder>\n  \
  \    <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n    </encoder>\n\
  \  </appender>\n\n  <appender name=\"STDOUT\" class=\"ch.qos.logback.core.ConsoleAppender\"\
  >\n    <encoder>\n      <pattern>%-5level [%thread] %date{ISO8601} %F:%L - %msg%n</pattern>\n\
  \    </encoder>\n  </appender>\n\n  <root level=\"INFO\">\n    <appender-ref ref=\"\
  SYSTEMLOG\"/>\n    <appender-ref ref=\"DEBUGLOG\"/>\n    <appender-ref ref=\"STDOUT\"\
  />\n  </root>\n</configuration>\n```\n\n**注意**\n可以使用 `.xml` 或 `.groovy` 作为 Logback\
  \ 配置文件的扩展名。在我们的示例中，使用的是 `.xml`。\n\n当需要深入研究 Cassandra 内部机制时，最佳做法之一是将日志记录级别修改为更“宽松”的级别，这意味着显示更多关于\
  \ Cassandra 正在执行（或未能执行）的操作的详细信息。\n\n默认的 `INFO` 级别不会生成太多操作细节，仅提供操作状态，如下所示：\n\n```\n\
  WARN  [main] 2017-04-03 13:06:55,973 DatabaseDescriptor.java:493 - Small cdc volume\
  \ detected at ./../data/cdc_raw; setting cdc_total_space_in_mb to 2377\\.  You can\
  \ override this in cassandra.yaml\nINFO  [main] 2017-04-03 13:06:56,882 CassandraDaemon.java:472\
  \ - Hostname: ubuntu\nINFO  [main] 2017-04-03 13:06:56,887 CassandraDaemon.java:479\
  \ - JVM vendor/version: Java HotSpot(TM) 64-Bit Server VM/1.8.0_121\nINFO  [main]\
  \ 2017-04-03 13:06:56,897 CassandraDaemon.java:480 - Heap size: 476.000MiB/476.000MiB\n\
  INFO  [main] 2017-04-03 13:06:56,911 CassandraDaemon.java:485 - Par Eden Space Heap\
  \ memory: init = 83886080(81920K) used = 77260784(75449K) committed = 83886080(81920K)\
  \ max = 83886080(81920K)\n```\n\n通过修改 `logback.xml` 文件，可以将默认日志记录级别更改为 `DEBUG`，如下所示：\n\
  ```\n<root level=\"DEBUG\">\n```\n\n修改 `logback.xml` 文件后，无需重启 Cassandra，因为数据库每分钟会扫描一次\
  \ `logback.xml` 文件以查找更改，前提是您已在文件中添加了以下行：\n```\n<configuration scan=\"true\">\n```\n\
  \n**提示**\n在生产环境中，请确保将日志级别设置为 `WARN` 或 `ERROR` 等较稀疏的级别，因为大量的日志输出会影响性能。\n\n## 自动加载配置文件\n\
  \n配置 Logback 以扫描配置文件中的更改，并在您进行任何与日志记录相关的配置更改时自动重新配置自身。这是通过将 `<configuration>` 元素的\
  \ `scan` 属性设置为 `true` 来实现的：\n```\n<configuration scan=\"true\">\n...\n</configuration>\n\
  ```\n\n## 配置 Appender\n\n使用 `<appender>` 元素配置 Appender。此元素有两个强制属性：`name` 和 `class`。`name`\
  \ 属性为 Appender 命名，`class` 属性指向 Appender 类的名称。\n\n`<appender>` 元素还可以包含 `<layout>`、`<encoder>`\
  \ 和 `<filter>` 元素。\n\n## 设置日志轮转\n\n默认情况下，当 `system.log` 文件达到 20MB 时，Cassandra 会轮转该文件。它还会将较早的归档日志文件压缩为\
  \ zip 格式，并将其命名为 `system.log.1.zip`、`system.log.2.zip` 等。\n\n可以在 Logback 中配置以下轮转策略：\n\
  \n*   日志文件的位置和名称\n*   归档文件的位置和名称\n*   触发轮转到新日志文件的最大日志文件大小\n*   日志级别\n\n默认日志级别是 `INFO`。您可以设置\
  \ `ALL`、`TRACE`、`DEBUG`、`WARN` 和 `ERROR` 作为日志级别。通过设置日志级别为 `OFF` 可以关闭所有日志记录。\n\n\
  ### 使用 Nodetool 设置服务的日志级别\n\n除了编辑 `logback.xml` 文件，您还可以运行 `nodetool setlogginglevel`\
  \ 命令从命令行设置日志级别。\n\n### 设置日志级别\n\n使用 `nodetool setlogginglevel` 命令从命令行设置服务日志级别的语法如下：\n\
  \n```\n$ nodetool setlogginglevel <class_qualifier> <level>\n```\n\n在此命令中，\n\n*\
  \   `class_qualifier` 是记录器类限定符，例如 `org.apache.cassandra.service.StorageProxy`。\n\
  *   `level` 是日志级别。\n\n可以为 `class_qualifier` 选项设置以下值：\n\n*   `org.apache.cassandra`\n\
  *   `org.apache.cassandra.db`\n*   `org.apache.cassandra.service.StorageProxy`\n\
  \n可以从 `ALL`、`TRACE`、`DEBUG`、`INFO`、`WARN` 和 `ERROR` 中选择日志级别。您可以将 `level` 属性设置为 `OFF`\
  \ 以关闭所有日志记录。\n\n通过将日志级别设置为 `DEBUG`，您可以看到数据库正在执行的操作的更多详细信息。以下示例展示了如何将 `StorageProxy`\
  \ 服务设置为 `DEBUG` 级别：\n\n```\n$ nodetool setlogginglevel org.apache.cassandra.service.StorageProxy\
  \ DEBUG\n```\n\n### 检查当前日志级别\n\n可以使用 `nodetool getlogginglevels` 命令检查当前日志级别，如下所示：\n\
  \n```\n$ nodetool getlogginglevels\nLogger Name                                \
  \        Log Level\nROOT                                                   INFO\n\
  com.thinkaurelius.thrift                               ERROR\norg.apache.cassandra\
  \                                   DEBUG\norg.apache.cassandra.service.StorageProxy\
  \              INFO\n$\n```\n\n### 使用 Nagios 监控 Cassandra\n\n在生产环境中，使用强大的企业级监控工具来检查\
  \ Cassandra 集群是很好的做法。Nagios 是一个流行的开源监控系统，它提供了许多监控 Cassandra 集群的功能。\n\nNagios 使用\
  \ Nagios 远程插件执行器 (NRPE) 来监控运行 Cassandra 实例的远程主机。\n\n您需要在远程主机上安装和配置 NRPE 代理。NRPE\
  \ 需要 Nagios 插件，因此您需要将插件安装为代理来监控远程主机上的本地资源。\n\n在以下部分中，我将展示如何在 Ubuntu 服务器上安装 Nagios\
  \ 4。然后展示如何安装和配置 NRPE。我从使用 Nagios 所需的先决条件开始。\n\n### 安装 LAMP 堆栈并解决其他先决条件\n\nLAMP 堆栈是一组开源软件，使服务器能够托管动态网站和\
  \ Web 应用程序。LAMP 首字母缩略词代表以下四个组件：\n\n*   Linux 操作系统\n*   Apache Web 服务器\n*   MySQL\
  \ 数据库\n*   PHP\n\n在以下部分中，我解释了如何安装 LAMP。您可能已经拥有 Linux 操作系统，因此需要安装 Apache Web 服务器、MySQL\
  \ 数据库和 PHP。\n\n1.  安装并启动 Apache Web 服务器。\n\n    ```\n    $ sudo apt-get install\
  \ apache2\n    $ sudo systemctl restart apache2\n    ```\n\n2.  安装 MySQL 数据库。\n\n\
  \    ```\n    $ sudo apt-get install mysql-server\n    ```\n\n    此时您可以运行 MySQL\
  \ 安全脚本，以删除不安全的默认配置并锁定数据库访问。\n\n    ```\n    $ mysql-secure_installation\n    ```\n\
  \n3.  安装 PHP。以下命令将安装 PHP 5：\n\n    ```\n    $ sudo apt-get install php libapache2-mod-php\
  \ php-mcrypt php-mysql\n    ```\n\n4.  默认情况下，当服务器请求一个目录时，Apache 会首先查找名为 `index.html`\
  \ 的文件。您需要让 Apache 首先查找 `index.php` 文件。为此，请编辑 `/etc/apache2/mods-enabled/dir.conf`\
  \ 文件，其内容如下：\n\n    ```\n    DirectoryIndex index.html index.cgi index.pl index.php\
  \ index.xhtml index.htm\n    ```\n\n    只需将 `index.php` 文件移动到该行开头，紧靠在 `DirectoryIndex`\
  \ 文件之前。关闭并保存文件。\n\n5.  重启 Apache 服务器，使您在步骤 4 中所做的更改生效。\n\n    ```\n    $ sudo systemctl\
  \ restart apache2\n    ```\n\n6.  检查 MySQL 和 PHP 是否正常运行。您可以通过运行以下命令来确认 Apache 服务器的状态：\n\
  \n    ```\n    $ sudo systemctl status apache2\n    ```\n\n7.  您可以通过运行一个名为 `info.php`\
  \ 的基本 PHP 脚本（`/var/www/html/info.php`）来确认您已正确配置 PHP。\n\n完成此操作后，在浏览器中访问以下地址：\n\n\
  ```\nhttp://<your-server-IP>/info.php\n```\n\n您应该会看到一个漂亮的网页，显示有关 PHP 安装的详细信息。就 LAMP\
  \ 堆栈而言，您已经准备就绪。然而，在安装 Nagios 之前，您必须完成几个先决条件，我将在接下来解释。\n\n### 创建 Nagios 用户和组\n\n\
  您需要一个用户来运行 Nagios 服务器。创建一个名为 `nagios` 的用户，该用户属于一个名为 `nagcmd` 的组。\n\n```\n$ sudo\
  \ useradd nagios\n$ sudo groupadd nagcmd\n$ sudo usermod -a -G nagcmd nagios\n```\n\
  \n### 安装构建依赖项\n\n您正在从源代码安装 Nagios Core（免费版本），因此需要安装额外的二进制文件来完成构建。您还需要 `apache2-utils`\
  \ 来设置 Nagios Web 界面。您可以安装所有必需的包：\n\n```\n$ sudo apt-get install build-essential\
  \ libgd2-xpm-dev openssl libssl-dev xinetd apache2-utils\n```\n\n最后，完成所有先决条件后，您就可以安装\
  \ Nagios 本身了。\n\n### 安装 Nagios\n\n要安装 Nagios，您必须下载源代码、配置它并编译（构建）它。\n\n#### 下载 Nagios\n\
  \n下载最新稳定版本的 Nagios 源代码并提取存档，如下所示：\n\n```\n$ cd ~\n$ curl -L -O https://assets.nagios.com/downloads/nagioscore/releases/nagios-4.1.1.tar.gz\n\
  $ tar xvzf nagios-*.tar.gz\n$ cd nagios-*\n```\n\n#### 配置 Nagios\n\n在构建 Nagios Core\
  \ 之前，必须安装软件包。\n\n```\n$ ./configure --with-nagios-group=nagios --with-command-group=nagcmd\n\
  ```\n\n#### 编译和安装 Nagios\n\n编译 Nagios 并运行其他命令来安装 Nagios。\n\n```\n$ sudo make\n$\
  \ sudo make install\n$ sudo make install-commandmode\n$ sudo make install-init\n\
  $ sudo make install-config\n$ sudo /usr/bin/install -c -m 644 sample-config/httpd.conf\
  \ /etc/apache2/sites-available/nagios.conf\n```\n\n最后，将 Web 服务器用户 `www-data` 添加到\
  \ `nagcmd` 组，以便您可以通过 Web 界面向 Nagios 发出外部命令。\n\n```\n$ sudo usermod -G nagcmd www-data\n\
  ```\n\n### 安装 Nagios 插件\n\n下一个重要步骤是安装 Nagios 插件。您遵循的步骤与上一节中 Nagios 服务器安装的步骤类似。我在此总结这些步骤。\n\
  \n```\n$ cd ~\n$ curl -L -O http://nagios-plugins.org/download/nagios-plugins-2.1.1.tar.gz\n\
  $ tar xvf nagios-plugins-*.tar.gz\n$ cd nagios-plugins-*\n$ ./configure --with-nagios-user=nagios\
  \ --with-nagios-group=nagios --with-openssl\n$ make\n$ sudo make install\n```\n\n\
  您可以这样验证配置：\n\n```\n$ sudo /usr/local/nagios/bin/nagios -v /usr/local/nagios/etc/nagios.cfg\n\
  ...\nRunning pre-flight check on configuration data...\n...\n$\n```\n\n**注意**\n\
  您可以轻松地为 Nagios 创建自定义插件。唯一的要求是插件可以通过命令行提示符执行，并且它返回以下退出值之一：`OK`、`Warning`、`Critical`\
  \ 或 `Unknown` 状态。\n\n### 安装 NRPE\n\nNRPE 的下载、配置和构建遵循与 Nagios 和 Nagios 插件相同的步骤。步骤如下：\n\
  \n```\n$ cd ~\n$ curl -L -O http://downloads.sourceforge.net/project/nagios/nrpe-2.x/nrpe-2.15/nrpe-2.15.tar.gz\n\
  $ tar xvf nrpe-*.tar.gz\n$ cd nrpe-*\n$ ./configure --enable-command-args --with-nagios-user=nagios\
  \ --with-nagios-group=nagios --with-ssl=/usr/bin/openssl --with-ssl-lib=/usr/lib/x86_64-linux-gnu\n\
  $ make all\n$ sudo make install\n$ sudo make install-xinetd\n$ sudo make install-daemon-config\n\
  ```\n\n在 xinetd 启动脚本 `/etc/xinetd.d/nrpe` 的末尾添加 Nagios 服务器的私有 IP 地址。\n\n```\nonly_from\
  \ = 127.0.0.1 192.168.159.129\n```\n\n重启 `xinetd` 服务以启动 NRPE。\n\n```\n$ sudo service\
  \ xinetd restart\n```\n\n### 配置 Nagios 和 Apache\n\n尽管您之前已经安装并构建了 Nagios，但您仍然需要为\
  \ Nagios 服务器和 Apache Web 服务器进行一些配置。\n\n#### 配置 Nagios\n\n编辑 Nagios 主配置文件（`/usr/local/nagios/etc/nagios.cfg`），如下所示：\n\
  \n```\ncfg_dir=/usr/local/nagios/etc/servers\n```\n\n您的 Cassandra 集群中的每个主机都将有一个存储在此目录中的配置文件。您必须创建该目录。\n\
  \n```\n$ sudo mkdir /usr/local/nagios/etc/servers\n```\n\n编辑联系人配置文件（`/usr/local/nagios/etc/objects/contacts.cfg`），并将\
  \ `email` 的值替换为您自己的电子邮件地址，这也是一个好主意。\n\n您还需要在 Nagios 配置文件 `/usr/local/nagios/etc/objects/commands.cfg`\
  \ 的末尾添加一个新命令。\n\n```\ndefine command{\ncommand_name check_nrpe\ncommand_line $USER1$/check_nrpe\
  \ -H $HOSTADDRESS$ -c $ARG1$\n}\n```\n\n### 配置 Apache\n\n接下来，您必须配置 Apache Web 服务器，步骤如下。\n\
  \n1.  启用 Apache 的 `rewrite` 和 `cgi` 模块，如下所示：\n\n    ```\n    $ sudo a2enmod rewrite\n\
  \    $ sudo a2enmod cgi\n    ```\n\n2.  使用 `htpasswd` 实用程序创建一个名为 `nagiosadmin` 的管理员用户，这将帮助您访问\
  \ Nagios Web 界面。\n\n    ```\n    $ sudo htpasswd -c /usr/local/nagios/etc/htpasswd.users\
  \ nagiosadmin\n    New password:\n    Re-type new password:\n    Adding password\
  \ for user nagiosadmin\n    ```\n\n3.  启动 Nagios 和 Apache 服务器。\n\n    ```\n    $\
  \ sudo service nagios start\n    $ sudo service apache2 restart\n    ```\n\n###\
  \ 添加要监控的 Cassandra 集群主机\n\n要通过 Nagios 启用对 Cassandra 主机的监控，您需要做三件事：\n\n*   在集群的主机（节点）上安装和配置\
  \ NRPE。\n*   将主机添加到 Nagios 服务器配置中。\n*   添加您想要在主机上监控的服务。\n\n#### 在主机上安装和配置 NRPE\n\
  \n在您希望监控的每台主机上，执行以下操作。\n\n1.  更新 `apt-get`。\n\n    ```\n    $ sudo apt-get update\n\
  \    ```\n\n2.  安装 Nagios 插件和 Nagios 远程插件执行器 (NRPE)。\n\n    ```\n    $ sudo apt-get\
  \ install nagios-plugins nagios-nrpe-server\n    ```\n\n3.  更新 NRPE 配置文件 (`/etc/nagios/nrpe.cfg`)，并将\
  \ Nagios 服务器的 IP 地址作为 `allowed_hosts` 属性的值添加。\n\n    ```\n    allowed_hosts=127.0.0.1,172.31.22.133\n\
  \    ```\n\n4.  重启 NRPE。\n\n    ```\n    $ sudo service nagios-nrpe-server restart\n\
  \    ```\n\n#### 将主机添加到 Nagios 服务器配置\n\n在 Nagios 服务器上为您想要监控的每个 Cassandra 主机创建一个单独的配置文件。例如，对于名为\
  \ `host1` 的服务器，您必须创建文件 `host1.cfg` (`/usr/local/nagios/etc/servers/host1.cfg`)。\n\
  \n在 `host1.cfg` 文件中，添加主机定义，如下所示：\n\n```\ndefine host {\nuse                    \
  \         linux-server\nhost_name                       host1\nalias           \
  \                Nagios Agent 1\naddress                         192.168.159.130\n\
  max_check_attempts              5\ncheck_period                    24x7\nnotification_interval\
  \           30\nnotification_period             24x7\n}\n```\n\n#### 添加特定于 Cassandra\
  \ 的插件\n\n下一步是向您展示如何下载和测试特定于 Cassandra 的插件。此插件名为 `Check Cassandra Status and Heap\
  \ Memory`，它可以报告节点的状态（`UP`/`DOWN`）以及堆内存利用率（`WARNING`/`CRITICAL`）通知。\n\n按照以下步骤使用该插件。\n\
  \n1.  将工作目录更改为 `/usr/local/nagios/libexec` 目录。\n\n    ```\n    $ cd /usr/local/nagios/libexec\n\
  \    ```\n\n2.  下载插件 (`cassandra.pl`) 并更改其权限。\n\n    ```\n    $ wget \"https://exchange.nagios.org/components/com_mtree/attachment.php?link_id=3819&cf_id=24\"\
  \ -O cassandra.pl\n    $ chmod +x cassandra.pl\n    $ chown nagios:nagios cassandra.pl\n\
  \    ```\n\n3.  测试以确保插件正常工作。\n\n    ```\n    $ ./cassandra.pl\n    CASSANDRA OK\
  \ -  | heap_mem=5.59\n    $\n    ```\n\n    测试输出表明插件工作正常。如果您看到错误消息，请编辑 `cassandra.pl`\
  \ 文件并确保 `$nodetool_path` 变量指向 `nodetool` 二进制文件的正确位置。\n\n4.  配置 NREP，以便 Nagios 可以执行该插件。编辑\
  \ Cassandra 服务器上的 `/usr/local/nagios/etc/nrpe.cfg` 文件，并在文件末尾添加以下行：\n\n    ```\n\
  \    command[cassandra]=/usr/local/nagios/libexec/cassandra.pl $ARG1$\n    ```\n\
  \n5.  在 Cassandra 服务器上重启 `xinetd` 服务。\n\n    ```\n    $ sudo service xinetd restart\n\
  \    ```\n\n6.  打开与运行 Nagios 的服务器的会话，并执行以下命令：\n\n    ```\n    $ sudo /usr/local/nagios/libexec/check_nrpe\
  \ -H 192.168.159.130 -c cassandra\n    CASSANDRA OK -  | heap_mem=10.32\n    $\n\
  \    ```\n\n输出表明您已在 Cassandra 服务器上正确配置了 NRPE。然后，您可以将此配置添加到 Nagios 服务器。\n\n## 总结\n\
  \n诸如 `nodetool tablestats` 和 `nodetool tablehistograms` 之类的命令可帮助您了解有关 SSTable 的关键事实。其他\
  \ `nodetool` 命令（如 `nodetool status` 和 `nodetool info`）有助于监控集群状态。\n\n我详细讨论了日志记录。日志记录不仅仅是数据库中活动的附带产物。日志记录是集群中正确和错误操作的宝贵信息来源。Cassandra\
  \ 允许您以多种方式配置日志记录，定制日志记录以满足您的需求是一个很好的策略，可帮助您有效地对数据库进行故障排除和监控。\n\nJConsole 设置简单，有助于调整数据库性能。我详细讨论了\
  \ Nagios，但它的功能远不止于此，因此我在这里只是浅尝辄止。我在示例中使用了 Nagios 的免费版本；付费版本提供更多的功能以及支持！无论是 Nagios\
  \ 还是其他工具，强大的图形化工具对于集群管理都是必不可少的。\n\n# 11. Cassandra 性能调优\n\nCassandra 有许多配置参数，在性能调优领域尤其如此，数据库管理员可以控制性能的多个方面。开箱即用，Cassandra\
  \ 许多与性能相关的配置属性都使用默认设置。作为管理员，您应该了解这些默认值并根据您的环境进行修改。\n\n本章重点介绍 Cassandra 性能的以下领域：\n\
  \n*   追踪查询以分析数据库性能\n*   缓存数据\n*   压实策略\n*   压缩\n*   调优布隆过滤器\n*   调优 JVM 和垃圾收集策略\n\
  *   使用 `cassandra-stress` 工具进行压力测试\n\n### 使用追踪分析性能\n\n在调整数据库性能时，您可以在数据库中开启追踪，以获取有关\
  \ Cassandra 内部操作的详细事务信息。追踪在跟踪 Cassandra 在查询处理各个阶段（例如查询的解析和执行）所花费的时间方面非常有价值。追踪提供与以下操作相关的详细计时信息：\n\
  \n*   准备 SQL 语句\n*   读修复相关活动\n*   Memtable 和 SSTable 数据查找\n*   键缓存搜索\n*   集群节点之间的交互\n\
  \n追踪数据对于评估查询有效性非常有用。例如，当您追踪涉及这些索引的查询时，不适当或多余的二级索引会在节点之间显示较高的活动。\n\n**注意**\n开启追踪将帮助追踪集群中两种广泛的活动：查询和修复操作。\n\
  \n默认情况下，Cassandra 禁用追踪。一旦启用追踪，Cassandra 会将事务详细信息捕获到 `system_traces` 键空间中。此键空间中的两个表保存追踪数据：\n\
  \n*   `system_traces.sessions`：存储事务的高级详细信息，例如事务长度和会话 ID。\n*   `system_traces.events`：存储有关数据库执行的所有操作的详细信息。\n\
  \n**注意**\nCassandra 只能存储有限时间段的追踪数据。因此，如果您希望将追踪数据保留更长时间，则必须配置以下属性：\n*   `tracetype_query_ttl`：为日志记录查询过程期间使用的不同追踪类型设置\
  \ TTL。默认值为 86,400 秒（1 天）。\n*   `tracetype_repair_ttl`：为日志记录修复过程期间使用的不同追踪类型设置 TTL。默认值为\
  \ 604,800 秒（大约一周）。\n\n`system_traces.events` 表捕获的数据库活动类型揭示了您发出查询时 Cassandra 执行的操作。\n\
  \n```\ncqlsh> select activity from system_traces.events;\nactivity\n-----------\n\
  Parsing select id from cycling.cyclist_name;\nPreparing statement\nComputing ranges\
  \ to query\nSubmitting range requests on 513 ranges with a concurrency of 112 (0.9\
  \ rows per range expected)\nExecuting seq scan across 0 sstables for (min(-9223372036854775808),\
  \ max(-9196210656004250337)]\nRead 0 live and 0 tombstone cells\nEnqueuing request\
  \ to /192.168.159.129\nSending RANGE_SLICE message to /192.168.159.129\nRANGE_SLICE\
  \ message received from /192.168.159.130\nEnueuing request to /192.168.159.129\n\
  Enqueuing response to /192.168.159.130\nSending RANGE_SLICE message to /192.168.159.129\n\
  Processing response from /192.168.159.129\nRANGE_SLICE message received from /192.168.159.130\n\
  Executing seq scan across 0 sstables for (max(-8175039996930460291), max(-8066091505323311933)]\n\
  Read 0 live and 0 tombstone cells\n...\ncqlsh>\n```\n\n### 管理追踪\n\n您可以这样检查追踪的状态：\n\
  \n```\ncqlsh> tracing\nTracing is currently disabled. Use TRACING ON to enable.\n\
  cqlsh>\n```\n\n在数据库中开启追踪很简单；只需运行 `tracing on` 命令。\n\n```\ncqlsh> tracing on;\nNow\
  \ Tracing is enabled\ncqlsh> tracing;\nTracing is currently enabled. Use TRACING\
  \ OFF to disable\ncqlsh>\n```\n\n要关闭所有追踪，请运行 `tracing off` 命令。\n\n```\ncqlsh> tracing\
  \ off;\nDisabled Tracing.\ncqlsh>\n```\n\n### 管理概率追踪\n\nCassandra 使用概率追踪策略，您可以配置数据库将追踪的语句百分比的概率。该概率是基于每个节点的。概率为\
  \ 1.0 意味着数据库将追踪所有 SQL 语句，设置为 0.5 意味着它可能追踪大约 50% 的请求。\n\n默认概率为 0.0，这意味着追踪被禁用。更高的概率设置涉及更多的写入，有时这会不利地影响集群性能，因此在设置追踪概率时必须谨慎。\n\
  \nCassandra 建议您从较小的概率设置（例如 0.001）开始，并根据数据库中的情况逐渐提高。即使像这样低的设置也可能对数据库性能产生显著影响，因此请注意性能下降。\n\
  \n`nodetool gettraceprobability` 命令显示当前的追踪概率。\n\n```\n$ nodetool gettraceprobability\n\
  Current trace probability: 0.0\n$\n```\n\n您可以通过运行 `nodetool settraceprobability`\
  \ 命令来设置追踪概率，以追踪读或写请求，如下所示：\n\n```\n$ nodetool settraceprobability 0.1\n$ nodetool\
  \ gettraceprobability\nCurrent trace probability: 0.1\n$\n```\n\n`system_traces.sessions`\
  \ 表显示了有关追踪的有价值信息。\n\n```\ncqlsh> select * from system_traces.sessions;\nsession_id\
  \      | client   | command | coordinator   | duration | parameters      | request\
  \       | started_at\n----------------+ ---------+---------+--------------+-----------+\
  \ ----------------d7103660-81e4-11e7-a4ad-89801d899afb | 127.0.0.1 |   QUERY | 192.168.159.130\
  \ |   506051 |                                                             {'consistency_level':\
  \ 'ONE', 'page_size': '100', 'query': 'select * from cycling.cyclist_name;', 'serial_consistency_level':\
  \ 'SERIAL'} | Execute CQL3 query | 2017-08-15 18:09:11.878000+0000\n189ff700-81e5-11e7-a4ad-89801d899afb\
  \ | 127.0.0.1 |   QUERY | 192.168.159.130 |     6848 | {'consistency_level': 'ONE',\
  \ 'page_size': '5000', 'query': 'SELECT * FROM system_traces.sessions WHERE session_id\
  \ = 185a6280-81e5-11e7-a4ad-89801d899afb', 'serial_consistency_level': 'SERIAL'}\
  \ | Execute CQL3 query | 2017-08-15 18:11:01.872000+0000\n185a6280-81e5-11e7-a4ad-89801d899afb\
  \ | 127.0.0.1 |   QUERY | 192.168.159.130 |   177343 |              {'consistency_level':\
  \ 'ONE', 'page_size': '100', 'query': 'select * from cycling.cycle;', 'serial_consistency_level':\
  \ 'SERIAL'} | Execute CQL3 query | 2017-08-15 18:11:01.416000+0000\n...\n(11 rows)\n\
  cqlsh>\n```\n\n### 如何追踪写和读请求\n\n追踪是资源密集型的，并且会消耗大量存储空间。选择性地追踪是正确的策略，而不是为整个数据库启用追踪。在本节中，我将展示如何追踪特定的读和写请求。\n\
  \n#### 追踪写请求\n\n以下是一个简单示例，展示了如何获取写请求（插入语句）的追踪信息。您首先开启追踪，然后在 `cyclist_name` 表中插入一行（输出显示部分数据）。\n\
  \n```\ncqlsh> tracing on;\nNow Tracing is enabled\ncqlsh> insert into cycling.cyclist_name\
  \ ( id, lastname, firstname ) values (uuid(), 'FRAME', 'Nina' );\nTracing session:\
  \ bdfdf410-8116-11e7-81bd-63c57c069fd1\nactivity                               \
  \                             | timestamp                  | source          | source_elapsed\
  \ | client        Execute CQL3 query | 2017-08-14 10:33:53.489000 | 192.168.159.130\
  \ |              0 | 127.0.0.1\nDetermining replicas for mutation [Native-Transport-Requests-1]\
  \ | 2017-08-14 10:33:53.522000 | 192.168.159.130 |          32844 | 127.0.0.1\n\
  MUTATION message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
  \ | 2017-08-14 10:33:53.530000 | 192.168.159.129 |            843 | 127.0.0.1\n\
  Sending MUTATION message to /192.168.159.129 [MessagingService-Outgoing-/192.168.159.129-Small]\
  \ | 2017-08-14 10:33:53.532000 | 192.168.159.130 |          42754 | 127.0.0.1\n\
  Appending to commitlog [MutationStage-1] | 2017-08-14 10:33:53.532000 | 192.168.159.129\
  \ |           2668 | 127.0.0.1\nAdding to cyclist_name memtable [MutationStage-1]\
  \ | 2017-08-14 10:33:53.532000 | 192.168.159.129 |           3181 | 127.0.0.1\n\
  Processing response from /192.168.159.129 [RequestResponseStage-3] | 2017-08-14\
  \ 10:33:53.545000 | 192.168.159.130 |          56321 | 127.0.0.1\nRequest complete\
  \ | 2017-08-14 10:33:53.546583 | 192.168.159.130 |          57583 | 127.0.0.1\n\
  ```\n\n追踪数据显示了以下信息：\n\n*   Cassandra 复制您插入的行的目标节点\n*   Cassandra 如何将新数据附加到提交日志\n\
  *   数据库如何将新数据添加到 memtable\n*   数据库如何确认（“Request complete”）插入数据的请求已成功完成\n\n#### 追踪读请求\n\
  \n追踪读请求产生的数据比追踪写请求多得多，因此在追踪这些请求时要小心。产生密集追踪数据的部分原因是 Cassandra 将行分布在多个 SSTable 中，因此它必须读取多个\
  \ SSTable 来检索数据。追踪显示了数据库为满足读请求而发出的所有请求。\n\n以下是一个简单 `select` 语句的部分输出：\n\n```\ncqlsh>\
  \ select * from cycling.cyclist_name;\nid                                   | firstname\
  \ | lastname\n--------------------------------------+-----------+-----------------\n\
  69f1cb04-687d-4be7-a91f-72ef037c5514 |     Sammy |           FRAME\ne7ae5cf3-d358-4d99-b900-85902fda9bb0\
  \ |      Alex |           FRAME\nd378af39-1a28-474c-836b-aa960fed6f2b |      Nina\
  \ |           FRAME\nfb372533-eb95-4bb4-8685-6ef61e994caa |   Michael |        MATTHEWS\n\
  5b6962dd-3f90-4c93-8f61-eabfa4a803e2 |  Marianne |             VOS\n220844bf-4860-49d6-9a4b-6b5d3a79cbfb\
  \ |     Paolo |       TIRALONGO\n6ab09bec-e68e-48d9-a5f8-97e6fb4c9b47 |    Steven\
  \ |      KRUIKSWIJK\ne7cd5752-bc0d-4157-a80f-7523add8dbcd |      Anna | VAN DER\
  \ BREGGEN\n(8 rows)\nTracing session: b2b0eda0-8117-11e7-81bd-63c57c069fd1\nactivity\
  \                                             | timestamp                  | source\
  \          | source_elapsed | client\nExecute CQL3 query | 2017-08-14 10:40:44.026000\
  \ | 192.168.159.130 |              0 | 127.0.0.1\nParsing select * from cycling.cyclist_name;\
  \ [Native-Transport-Requests-1] | 2017-08-14 10:40:44.027000 | 192.168.159.130 |\
  \            364 | 127.0.0.1\nPreparing statement [Native-Transport-Requests-1]\
  \ | 2017-08-14 10:40:44.027000 | 192.168.159.130 |            503 | 127.0.0.1\n\
  RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
  \ | 2017-08-14 10:40:44.073000 | 192.168.159.129 |             22 | 127.0.0.1\n\
  Sending REQUEST_RESPONSE message to /192.168.159.130 [MessagingService-Outgoing-/192.168.159.130-Small]\
  \ | 2017-08-14 10:40:44.086000 | 192.168.159.129 |          13202 | 127.0.0.1\n\
  RANGE_SLICE message received from /192.168.159.130 [MessagingService-Incoming-/192.168.159.130]\
  \ | 2017-08-14 10:40:44.095000 | 192.168.159.129 |             18 | 127.0.0.1\n\
  REQUEST_RESPONSE message received from /192.168.159.129 [MessagingService-Incoming\n\
  ...                               Processing response from /192.168.159.129 [RequestResponseStage-5]\
  \ | 2017-08-14 10:40:44.557001 | 192.168.159.130 |         531160 | 127.0.0.1\n\
  Request complete | 2017-08-14 10:40:44.562582 | 192.168.159.130 |         536582\
  \ | 127.0.0.1\ncqlsh>\n```\n\n输出显示了 Cassandra 如何解析 CQL 语句并在发送请求消息之前准备它，接收节点然后响应该请求消息。最后，“Request\
  \ Complete”注释显示请求已被节点成功处理。\n\n### 调优布隆过滤器\n\n正如我在第 5 章中解释的，布隆过滤器是 Cassandra 的一种性能辅助工具。它们在索引扫描期间帮助数据库，让其知道某个\
  \ SSTable 是否包含特定分区的数据。当客户端请求数据时，布隆过滤器会在数据库执行磁盘 I/O 之前检查该行是否存在。\n\n配置布隆过滤器涉及在内存使用和快速找到数据的概率之间进行权衡，使用比不配置更少的\
  \ I/O。\n\n### 配置布隆过滤器\n\n您可以将表的 `bloom_filter_fp_chance` 属性设置为 0 到 1 之间的值。当您从 0\
  \ 到 1 时，您使用的内存更少。值为 0 表示您为布隆过滤器设置了最大值，并使用了最高内存量。将其设置为 1 表示您已禁用布隆过滤器。\n\n`bloom_filter_fp_chance`\
  \ 属性的默认值取决于当前使用的压实策略。以下是 Cassandra 的三种主要压实策略下此属性的值：\n\n*   对于 `LeveledCompactionStrategy`：0.1\n\
  *   对于 `SizeTieredCompactionStrategy`、`DataTieredCompactionStrategy` 和 `TimeWindowCompactionStrategy`：0.01。\n\
  \n`bloom_filter_fp_chance` 属性的推荐值是 0.1。更高的值不一定有帮助，因为提高值会产生收益递减。这是因为更高的值消耗更多内存，但产生不成比例的较小性能收益。您可以在创建表时设置该属性，也可以稍后设置。\n\
  \n### 重新生成布隆过滤器\n\n每当您更改表的 `bloom_filter_fp_chance` 属性的值时，必须重新生成布隆过滤器。您可以通过两种方式重新生成布隆过滤器：运行表的手动压实或升级\
  \ SSTable。\n\n要手动压实表，请运行 `nodetool compact` 命令。`nodetool compact` 命令的语法如下：\n\n```\n\
  nodetool [options] compact [(-et | --end-token <value>)] [(-s | --split-output)]\
  \ [(-st | --start-token <value>)] [--] [<keyspace> <table>...]\n[--user-defined]\
  \ <SSTable>...\n```\n\n您必须通过从 `STCS`、`TWCS` 和 `LCS` 压实策略中选择来指定压实策略。默认情况下，该命令对数据库中的所有键空间和表运行主要压实，但您可以将压实限制为一个或多个表。\n\
  \n手动压实 SSTable 以重新生成布隆过滤器几乎从来都不是一个好的策略。当您更改表的 `bloom_filter_fp_chance` 属性的值时，您可以改为升级\
  \ SSTable。这是通过运行 `nodetool upgradetsstables` 命令来完成的。该命令的语法如下：\n\n```\n$ nodetool\
  \ upgradesstables [(-a | --include-all-sstables)] [--] [<keyspace> [<table>...]]\n\
  ```\n\n### 缓存数据\n\n为了优化 Cassandra 对缓存内存的使用，您可以配置表的 `caching` 属性。缓存有助于 Cassandra\
  \ 对节点进行热重启，数据库会定期将缓存存储到磁盘，并在您重启节点时将其读回缓存。没有缓存意味着节点需要更长的时间来重启。\n\n缓存对于非常繁忙的集群很有用。不建议对需求不高的数据进行缓存。因此，将频繁读取的数据分离到单独的表中以便可以缓存这些表中的数据是一个好主意。在处理包含极长分区的表时，缓存数据也不是一个好主意。\n\
  \n### 数据缓存的类型\n\n有两种主要类型的数据缓存：键缓存和行缓存。（此外，您还可以要求 Cassandra 缓存计数器，我将在后面解释。）\n\n*\
  \   键缓存：键缓存也称为分区键缓存，缓存 SSTable 的分区索引。数据库需要更少的磁盘读取来从键缓存中获取数据，而不是从磁盘或操作系统页面缓存中获取数据。由于键缓存以更少的内存量提供了更高的缓存读取可能性，Cassandra\
  \ 默认启用它。\n*   行缓存：您可以要求 Cassandra 缓存分区中特定数量的行。您使用 `rows_per_partition` 表选项设置要缓存的行数。由于行缓存存储整行而不仅仅是键，当处理大型数据集时，它可能导致性能下降，因为数据库可能必须从磁盘读取数据，而内存可能不足以存储所有数据。请仔细配置行缓存，因为它有时可能损害性能而不是帮助性能。\n\
  \n关于在 Cassandra 数据库中使用缓存，您需要记住以下关键原则：\n\n*   您不希望为表同时设置两种类型的缓存。为表选择分区键缓存或行缓存之一。\n\
  *   行缓存比键缓存占用更多空间，因为它存储整行。因此，有选择地使用行缓存是一个好主意，仅将其用于缓存用户和客户端频繁访问的行。\n*   至于必须缓存哪些表，读取密集型表是缓存的良好目标。当表的读取量远远超过写入量时，缓存是您需要考虑的事情。\n\
  \n**注意**\n您的用户不常读取归档表，因此您可以禁用这些表的缓存。\n\n### Cassandra 在哪里存储缓存数据\n\nCassandra 将行和键缓存存储在您可以通过配置属性\
  \ `saved_caches_directory` 指定的目录中。`saved_caches_directory` 属性的默认位置确定如下：\n\n*   `/var/lib/cassandra/saved_caches`（用于包安装）\n\
  *   `install_location/data/saved_caches`（用于压缩包安装）\n\n### 配置缓存\n\n您可以设置两个决定缓存行为的属性：\n\
  \n*   `keys`：此属性可以取值 `ALL` 或 `NONE`。值 `ALL` 表示所有主键或行。值 `NONE` 表示没有主键或行。默认值是 `ALL`。\n\
  *   `rows_per_partition`：此属性帮助您设置数据库必须在分区中缓存的行数。此属性有三个值：`ALL`、`NONE` 和 `N`。值 `ALL`\
  \ 和 `NONE` 的含义与 `keys` 属性相同。值 `N` 指定每个分区的行数。默认值是 `NONE`。\n\n您在创建表时或之后设置表缓存属性以配置分区键缓存和行缓存。以下是\
  \ `caching` 表属性的语法：\n\n```\ncaching = {\n'keys' = 'ALL | NONE',\n'rows_per_partition'\
  \ = 'ALL' | 'NONE' | N\n}\n```\n\n默认情况下，Cassandra 用于缓存数据的设置如下：\n\n```\n{ 'keys'\
  \ : 'ALL', 'rows_per_partition' : 'NONE' }\n```\n\n以下是一些展示如何配置缓存属性的示例。第一个示例展示了如何为表配置缓存。您为\
  \ `keys` 属性指定了值 `NONE`，因此不缓存任何主键或行。数据库将为每个分区缓存 120 行。\n\n```\nCREATE TABLE test\
  \ (\nuserid text PRIMARY KEY,\nfirst_name text,\nlast_name text,\n)\nWITH caching\
  \ = { 'keys' : 'NONE', 'rows_per_partition' : '120' };\n```\n\n除了 SSTable，您还可以缓存物化视图。以下示例展示了如何在创建物化视图时指定缓存：\n\
  \n```\nCREATE MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age, name, country\n\
  FROM cycling.cyclist_mv\nWHERE age IS NOT NULL AND cid IS NOT NULL\nPRIMARY KEY\
  \ (age, cid)\nWITH caching = { 'keys' : 'ALL', 'rows_per_partition' : '100' }\n\
  ;\n```\n\n以下示例展示了如何运行 `ALTER TABLE` 语句来缓存每个年龄分区中的所有自行车手：\n\n```\nALTER MATERIALIZED\
  \ VIEW cycling.cyclist_by_age\nWITH caching = {\n'keys' : 'ALL',\n'rows_per_partition'\
  \ : 'ALL' } ;\n```\n\n### 全局缓存参数\n\n在上一节中，我解释了如何通过为表设置缓存属性来配置缓存。Cassandra 还提供了几个全局缓存属性，您可以在\
  \ `cassandra.yaml` 文件中进行配置。我将在以下部分解释这些全局缓存参数。\n\n#### 配置行缓存的大小\n\n配置行缓存时，必须设置每个分区的行数。没有固定规则规定\
  \ X% 的行是正确的缓存行数。相反，您应根据数据库中的工作负载模式来调整行缓存的大小。\n\n**注意**\n默认情况下，行缓存被禁用，键缓存被启用。\n\n\
  您可以通过在 `cassandra.yaml` 文件中为 `row_cache_size_in_mb` 属性设置值来在数据库级别配置行缓存的大小。此参数确定 Cassandra\
  \ 可以分配用于存储表中最频繁读取的表分区行的最大内存量。默认情况下，数据库不缓存行，因此该参数的默认值为 0。\n\n行缓存可能比键缓存节省更多时间，但它需要更多空间，因为它缓存整行。因此，您必须仅对需求量大的行或不更改的行使用行缓存。`row_cache_size_in_mb`\
  \ 属性的值过低可能导致数据库在启动时无法加载一些热键。\n\n#### 配置键缓存的大小\n\n`key_cache_size_in_mb` 参数允许您设置数据库中所有表的键缓存的最大大小。此参数的值默认未设置，Cassandra\
  \ 将键缓存设置为堆大小的 5% 或 100MB，以较小者为准。您可以通过将 `key_cache_size_in_mb` 参数设置为 0 来禁用键缓存。\n\n\
  #### 配置缓存频率\n\n您可以配置数据库将行缓存和分区键缓存保存到磁盘的频率。\n\n*   `row_cache_save_period` 属性确定数据库在将行保存到由\
  \ `saved_caches_directory` 属性指定的目录之前，将行保留在缓存中的时间（以秒为单位）。默认情况下行缓存被禁用，这意味着 `row_cache_save_period`\
  \ 参数的默认值为 0。\n*   `key_cache_save_period` 参数确定数据库在将键保存到由 `saved_caches_directory`\
  \ 属性指定的目录之前，将键保留在缓存中的时间。默认值为 4 小时（14,400 秒）。\n\n#### 指定要保存的键数\n\n默认情况下，数据库保存行缓存中的所有键。您可以配置\
  \ `row_cache_keys_to_save` 参数来指定要保存的键数。此参数的默认值是禁用的，这意味着保存所有键。\n\n由于默认情况下数据库不启用行缓存，因此\
  \ `row_cache_class_name` 参数的默认值是禁用的。您可以指定以下两个值之一作为要使用的行缓存提供程序的类名：\n\n*   `OHCProvider`：完全堆外\n\
  *   `SerializingCacheProvider`：部分堆外\n\n`OHCProvider` 是较新的，基准测试显示它比旧的部分堆外行缓存提供程序提供大约\
  \ 15% 的更好性能。\n\n### 使用计数器缓存\n\n除了行和键缓存之外，Cassandra 还允许您配置计数器缓存。计数器缓存存储需求量大的计数器，从而减少对计数器单元的争用。当数据库在缓存中找到计数器（缓存命中）时，它需要持有计数器锁的时间更短，从而加快热计数器单元的更新。\n\
  \nCassandra 默认启用计数器缓存。计数器缓存的大小取决于您为 `counter_cache_size_in_mb` 参数配置的值。默认情况下此参数未设置，Cassandra\
  \ 使用两个值中较小的一个：堆的 2.5% 或 50MB。\n\n与行和键缓存一样，Cassandra 将计数器缓存（仅键）保存到由 `saved_caches_directory`\
  \ 参数指定的目录中的磁盘。默认情况下，此参数的值为 2 小时（7,200 秒）。\n\n管理计数器缓存的另一个配置属性是 `counter_cache_keys_to_save`\
  \ 参数。您配置此属性以告诉数据库必须保存计数器缓存中的多少个键。默认情况下此属性是禁用的，这意味着 Cassandra 保存所有键。\n\n如果您执行计数器删除并使用较低的\
  \ `gc_grace_seconds` 设置，则应禁用计数器缓存，您可以通过将 `counter_cache_size_in_mb` 参数的值设置为零来实现。\n\
  \n### 监控缓存\n\n`nodetool info` 命令可帮助您监控缓存性能，从而帮助您根据当前缓存行为调整行缓存和键缓存配置。这是一个例子：\n\n\
  ```\n$ nodetool info\nID                     : 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\n\
  Gossip active          : true\nThrift active          : false\nNative Transport\
  \ active: true\nLoad                   : 12.46 MiB\nGeneration No          : 1503673044\n\
  Uptime (seconds)       : 91\nHeap Memory (MB)       : 117.82 / 1492.00\nOff Heap\
  \ Memory (MB)   : 0.07\nData Center            : datacenter1\nRack             \
  \      : rack1\nExceptions             : 0\nKey Cache              : entries 47,\
  \ size 3.94 KiB, capacity 74 MiB, 69 hits, 120 requests, 0.575 recent hit rate,\
  \ 14400 save period in seconds\nRow Cache              : entries 0, size 0 bytes,\
  \ capacity 0 bytes, 0 hits, 0 requests, NaN recent hit rate, 0 save period in seconds\n\
  Counter Cache          : entries 0, size 0 bytes, capacity 37 MiB, 0 hits, 0 requests,\
  \ NaN recent hit rate, 7200 save period in seconds\nChunk Cache            : entries\
  \ 30, size 1.88 MiB, capacity 341 MiB, 44 misses, 182 requests, 0.758 recent hit\
  \ rate, 1072.447 microseconds miss latency\nPercent Repaired       : 100.0%\nToken\
  \                  : (invoke with -T/--tokens to see\n$\n```\n\n`nodetool info`\
  \ 命令显示所有三种 Cassandra 缓存（行、键和计数器）的以下缓存相关信息：\n\n*   缓存中的条目数\n*   缓存的大小（字节）\n*   缓存的容量\n\
  *   对缓存数据的请求数\n*   缓存命中数\n*   缓存命中率（比率）\n*   保存周期（秒）\n\n### 追踪数据库操作以优化缓存\n\n您可以追踪数据库读取，以检查读取操作是从缓存获取数据还是直接从存储在磁盘上的\
  \ SSTable 获取数据。当您追踪引用缓存表的查询时，最初追踪显示发生了行缓存未命中。当您重新运行查询时，追踪会显示“`row cache hit`”行，如下所示：\n\
  \n```\nrow cache miss [ReadStage:23]\nrow cache hit [ReadStage:35]\n```\n\n行缓存未命中意味着数据库已从磁盘读取数据。另一方面，行缓存命中意味着数据库已在缓存中找到数据，省去了从磁盘读取数据的麻烦。请记住，缓存读取总是比从磁盘读取快很多倍。\n\
  \n您看到“`cache miss`”的原因是数据库缓存数据需要一些时间，尤其是当表很大时。一旦数据库将数据放入缓存，后续查询将使用缓存数据，而不是访问磁盘，这意味着查询将非常快地返回结果。因此，您将在追踪中看到“`cache\
  \ hit`”消息。\n\n一旦数据进入缓存，它就会保留在那里，数据库会将其用于所有引用该数据的查询。但是，如果您更新数据，它会使缓存失效。在以下条件下，Cassandra\
  \ 会忽略缓存数据：\n\n*   如果查询需要来自缓存和磁盘的数据（即，缓存+未缓存的数据）。\n*   当查询请求大量数据时，这会导致超过全局缓存大小限制。\n\
  *   查询请求的数据不在分区的开头。\n\n如果发生这些情况中的任何一种，您将在尝试使用缓存数据的查询的追踪中看到以下行：\n\n```\nIgnoring\
  \ row cache as cached value could not satisfy query [ReadStage:89]\n```\n\n在所有这些情况下，缓存不足以处理查询，迫使\
  \ Cassandra 执行昂贵的（高资源成本）磁盘读取，而不是使用更高效的缓存读取。当您注意到数据库正在忽略行缓存时，根据原因，您可以执行以下操作之一以使数据库使用缓存数据：\n\
  \n*   增加缓存大小。\n*   创建一个新表并将频繁访问的行放在分区的开头。\n*   限制查询的输出大小（使用 `SELECT` 语句中的 `LIMIT\
  \ N` 选项），以防止检索到的行超过配置的缓存大小。\n\n## 使用 `cassandra-stress` 进行压力测试\n\nCassandra 提供 `cassandra-stress`\
  \ 实用程序来对集群进行基准测试和负载测试。该工具在测试数据库关键配置方面的更改（例如选择不同的压实策略）时也很有用。您可以测试读取、写入和混合工作负载。\n\n\
  `cassandra-stress` 可用于优化数据模型、测试数据库的扩展能力以及确定生产容量。\n\n### 运行 `cassandra-stress`\n\n\
  您可以在 `$CASSANDRA_HOME/tools/bin` 目录中找到 `cassandra-stress` 工具。\n\n发出命令 `cassandra-stress`\
  \ 以快速了解该工具的功能，如下所示：\n\n```\n$CASSANDRA_HOME/tools/bin$ cassandra-stress\nNo command\
  \ specified\nUsage:      cassandra-stress  [options]\nHelp usage: cassandra-stress\
  \ help <command>\n---Commands---\nread                 : Multiple concurrent reads\
  \ - the cluster must first be populated by a write test\nwrite                :\
  \ Multiple concurrent writes against the cluster\nmixed                : Interleaving\
  \ of any basic commands, with configurable ratio and distribution - the cluster\
  \ must first be populated by a write test\ncounter_write        : Multiple concurrent\
  \ updates of counters.\ncounter_read         : Multiple concurrent reads of counters.\
  \ The cluster must first be populated by a counterwrite test.\nuser            \
  \     : Interleaving of user provided queries, with configurable ratio and distribution\n\
  help                 : Print help for a command or option\nprint               \
  \ : Inspect the output of a distribution definition\nlegacy               : Legacy\
  \ support mode\nversion              : Print the version of cassandra stress\n---Options---\n\
  -pop                  : Population distribution and intra-partition visit order\n\
  -insert              : Insert specific options relating to various methods for batching\
  \ and splitting partition updates\n-col                  : Column details such as\
  \ size and count distribution, data generator, names, comparator and if super columns\
  \ should be used\n-rate                 : Thread count, rate limit or automatic\
  \ mode (default is auto)\n-mode                 : Thrift or CQL with options\n-errors\
  \               : How to handle errors when encountered during stress\n-schema \
  \              : Replication settings, compression, compaction, etc.\n-node    \
  \             : Nodes to connect to\n-log                  : Where to log progress\
  \ to, and the interval at which to do it\n-transport            : Custom transport\
  \ factories\n-port                 : The port to connect to cassandra nodes on\n\
  -sendto               : Specify a stress server to send this command to\n-graph\
  \                : Graph recorded metrics\n-tokenrange           : Token range settings\n\
  $CASSANDRA_HOME/tools//bin$\n```\n\n从高层次来看，以下是您必须了解的关键选项：\n\n*   `read`：多次并发读取（您必须首先运行写入测试以用数据填充测试表）\n\
  *   `write`：多次并发写入\n*   `counter_write`：多次并发计数器更新\n*   `counter_read`：多次并发计数器读取（您必须首先使用\
  \ `counter_write` 测试填充测试表）\n\n### `cassandra-stress` 示例\n\n当您第一次运行 `cassandra-stress`\
  \ 工具时，它会创建一个名为 `keyspace1` 的键空间，并在该键空间中创建一个名为 `standard1` 或 `counter1` 的表，具体取决于您运行的测试类型。Cassandra\
  \ 会在所有后续运行中重用它创建的键空间和表。\n\n#### 运行写入测试\n\n以下示例展示了如何运行写入测试（请记住，在运行读取测试之前，必须先运行写入测试）：\n\
  \n```\n$ cassandra-stress write n=100000 cl=one\n******************** Stress Settings\
  \ ********************\nCommand:\nType: write\nCount: 100,000\nConsistency Level:\
  \ ONE\n...\nInsert:\nRevisits: Uniform:  min=1,max=1000000\nVisits: Fixed:  key=1\n\
  Columns:\nMax Columns Per Key: 5\nColumn Names: [C0, C1, C2, C3, C4]\nComparator:\
  \ AsciiType\nTimestamp: null\nVariable Column Count: false\nSlice: false\nSize Distribution:\
  \ Fixed:  key=34\nCount Distribution: Fixed:  key=5\nErrors:\nIgnore: false\nTries:\
  \ 10\n...\nSchema:\nKeyspace: keyspace1\nReplication Strategy: org.apache.cassandra.locator.SimpleStrategy\n\
  Replication Strategy Options: {replication_factor=1}\nTable Compression: null\n\
  Table Compaction Strategy: null\nTable Compaction Strategy Options: {}\n...\nConnected\
  \ to cluster: Test Cluster, max pending requests per connection 128, max connections\
  \ per host 8\nDatatacenter: datacenter1; Host: localhost/127.0.0.1; Rack: rack1\n\
  Created keyspaces. Sleeping 1s for propagation.\nRunning WRITE with 200 threads\
  \ for 100000 iteration\ntype       total ops,    op/s,    pk/s,   row/s,    mean,\
  \     med,     .95,     .99,    .999,     max,   time,   stderr, errors,  gc: #,\
  \  max ms,  sum ms,  sdv ms,      mb\n...\nResults:\nOp rate                   :\
  \    3,011 op/s  [WRITE: 3,011 op/s]\nPartition rate            :    3,011 pk/s\
  \  [WRITE: 3,011 pk/s]\nRow rate                  :    3,011 row/s [WRITE: 3,011\
  \ row/s]\nLatency mean              :   64.9 ms [WRITE: 64.9 ms]\nLatency median\
  \            :   39.1 ms [WRITE: 39.1 ms]\nLatency 95th percentile   :  190.2 ms\
  \ [WRITE: 190.2 ms]\nLatency 99th percentile   :  537.4 ms [WRITE: 537.4 ms]\nLatency\
  \ 99.9th percentile : 1155.5 ms [WRITE: 1,155.5 ms]\nLatency max               :\
  \ 1632.6 ms [WRITE: 1,632.6 ms]\nTotal partitions          :    100,000 [WRITE:\
  \ 100,000]\nTotal errors              :          0 [WRITE: 0]\n...\nTotal operation\
  \ time      : 00:00:33\nEND\n$\n```\n\n在此命令中，您指定 `write` 选项表示您希望将行插入 `cassandra-stress`\
  \ 为压力测试创建的表中。`cassandra-stress` 插入一百万行 (`n=10000000`)。选项 `cl` 将一致性级别设置为 `ONE`。默认一致性级别是\
  \ `LOCAL_ONE`，您可以设置任何其他标准 Cassandra 一致性级别。\n\n前面的示例未使用身份验证。要在运行 `cassandra-stress`\
  \ 工具时使用身份验证，请指定 `-mode` 命令（使用 `native` 选项）以指定用户名和密码，如本例所示：\n\n```\n$ cassandra-stress\
  \ -mode native cql3 -user cassandra -password cassandra cl=QUORUM\n```\n\n您使用 `cassandra-stress`\
  \ 工具的 `write` 选项插入的数据默认永远不会被截断。您可以通过运行带有 `-truncate` 选项的 `cassandra-stress` 命令来截断\
  \ `cassandra-stress` 工具创建的表：\n\n```\n$ cassandra-stress write n=100000000 cl=QUORUM\
  \ -truncate always -schema keyspace=keyspace1 -rate threads=200 -log file=write_$NOW.log\n\
  ```\n\n如果您指定了 `mode` 命令，请确保在 `mode` 选项之前指定 `truncate` 选项，否则 `cassandra-stress` 工具将忽略\
  \ `truncate` 选项。\n\n#### 运行读取测试\n\n一旦您填充了 `cassandra-stress` 工具创建的数据库表（如写入测试示例所示），您就拥有了该工具可以读取的数据。现在您可以运行读取测试，如下所示：\n\
  \n```\n$ cassandra-stress read n=10000000 -rate threads=50 duration=5\n```\n\n在此示例中，选项代表以下含义：\n\
  \n*   `read`：对您之前填充的数据执行多次并发读取。子选项 `n=10000000` 指定要读取的行数。\n*   `rate`：帮助您指定线程数、速率限制或自动模式（默认）。在本例中，您通过指定\
  \ `threads=50` 为压力测试指定子选项线程数。\n*   `duration`：指定测试必须读取行的特定分钟数（本例中为 5）。\n\n#### 运行混合工作负载\n\
  \n`cassandra-stress` 命令选项 `mixed` 可帮助您运行具有配置比率和分布的命令。在运行此命令之前，您必须使用写入测试填充集群。\n\n\
  以下示例展示了如何运行混合工作负载：\n\n```\n$ cassandra-stress mixed ratio\\(write=1,read=3\\) n=100000\
  \ cl=ONE -pop dist=UNIFORM\\(1..1000000\\) -schema keyspace=\"keyspace1\" -mode\
  \ native cql3 -rate threads\\>=16 threads\\<=256 -log file=~/mixed_autorate_50r50w_1M.log\n\
  ```\n\n注意以下几点：\n\n*   `ratio` 选项设置写入与读取的比率。\n*   `-pop` 命令选项设置种群分布和分区内访问顺序。在本例中，您指定\
  \ `pop dist=UNIFORM\\(1..1000000\\)`，这意味着在 100,000 次操作 (`n=100000`) 中，测试必须在 1 到\
  \ 1,000,000 之间均匀选择键。当您指定的每个节点的数据量超过该节点 RAM 可容纳的量时，请指定 `-pop` 选项。\n\n### 设置复制、压实和压缩选项\n\
  \n运行 `-schema` 命令选项以查看您可以为复制、压实和压缩设置的选项。它还允许您指定用于压力测试的键空间。\n\n```\n$ cassandra-stress\
  \ help -schema\nUsage: -schema [replication(?)] [keyspace=?] [compaction(?)] [compression=?]\n\
  replication([strategy=?][factor=?][=?]): Define the replication strategy and any\
  \ parameters\nstrategy=? (default=org.apache.cassandra.locator.SimpleStrategy) The\
  \ replication strategy to use\nfactor=? (default=1)                 The number of\
  \ replicas\nkeyspace=? (default=keyspace1)           The keyspace name to use\n\
  compaction([strategy=?][=?]): Define the compaction strategy and any parameters\n\
  strategy=?                            The compaction strategy to use\ncompression=?\
  \                            Specify the compression to use for sstable, default:no\
  \ compression\n$\n```\n\n以下示例展示了如何为名为 `cass1` 的节点将复制策略更改为 `NetworkTopologyStrategy`：\n\
  \n```\n$ cassandra-stress write n=500000 no-warmup -node cass1 -schema \"replication(strategy=NetworkTopologyStrategy,\
  \ cass1=2)\"\n```\n\n### 在多个节点上运行压力测试\n\n所有前面的示例都在单个节点上运行。有时单个节点无法处理压力测试的工作负载。您可以使用\
  \ `-node` 命令选项指定 `NODES` 变量。您使用逗号分隔的 IP 地址列表指定节点。\n\n以下示例展示了如何在两个名为 `cass1` 和 `cass2`\
  \ 的节点上运行压力测试：\n\n```\n$ cassandra-stress write n=1000000 cl=one -mode native cql3\
  \ -schema keyspace=\"keyspace1\" -pop seq=1..1000000 -log file=~/node1_load.log\
  \ -node $NODES\n```\n\n### 使用基于 YAML 的配置文件运行 `cassandra-stress`\n\n您可以在运行 `cassandra-stress`\
  \ 工具时使用基于 YAML 的配置文件。该配置文件帮助您定义数据库将在压力测试期间使用的各种压实策略和缓存设置。您可以在以下位置找到 Cassandra 提供的示例\
  \ YAML 文件：\n\n*   `/usr/share/docs/cassandra/examples`（包安装）\n*   `$CASSANDRA_HOME/tools/`（压缩包安装）\n\
  \nCassandra 提供的 YAML 文件（例如 `cqlstress-example.yaml` 文件）包含在单独部分下进行的各种压力测试配置。这些配置属性包括键空间和表定义，以及查询定义。您可以在\
  \ `extra-definitions` 部分下添加二级索引和物化视图。您可以修改示例配置文件或创建自己的配置文件。\n\n您可以在运行 `cassandra-stress`\
  \ 命令时将 YAML 文件指定为 `profile` 选项的值。`profile` 选项指向您使用的 YAML 文件的位置。\n\n以下示例展示了如何借助 `cqlstress-example.yaml`\
  \ 文件运行压力测试：\n\n```\n$ cassandra-stress user profile=$CASSANDRA_HOME/tools/cqlstress-example.yaml\
  \ n=1000000 ops\\(insert=3,read1=1\\) no-warmup cl=QUORUM\n```\n\n您可以指定 `-graph`\
  \ 选项为运行的压力测试创建图表。测试完成后，您可以通过 Web 浏览器查看图表。这是一个例子：\n\n```\n$ cassandra-stress user\
  \ profile=tools/cqlstress-example.yaml ops\\(insert=1\\) -graph file=test.html title=test\
  \ revision=test1\n```\n\n您可以通过在 Web 浏览器中查看文件 `test1.html` 来查看压力测试的图表。您必须为捕获压力测试输出的\
  \ HTML 文件提供名称，以便通过浏览器查看。`title` 和 `revision` 选项不是必需的，但如果您使用相同数据运行多个压力测试，则必须使用 `revision`\
  \ 参数。\n\n图 11-2 显示了使用前面的 `cassandra-stress` 命令进行压力测试的图表。\n\n![压力测试图表](img/A436674_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-2\n\n使用 `-graph` 选项生成的 `cassandra-stress` 工具压力测试图表\n\n### 配置压实策略\n\n压实数据有助于合并\
  \ SSTable、合并键、组合列和清除墓碑。\n\n正如您在第 6 章中学到的，Cassandra 的 SSTable 是不可变的，这意味着数据库永远不会覆盖数据。相反，它将插入或更新的新数据版本写入新的\
  \ SSTable 中。从来没有数据的原地修订（这需要随机 I/O）。相反，数据库只是将数据的最新版本（更新或插入）写入新的 SSTable。这是 Cassandra\
  \ 高性能的一个关键因素。\n\n**注意**\n数据库将对数据的所有更新转换为顺序写入磁盘的新 SSTable。\n\n随着数据库随时间更新数据，它最终可能会有同一行的多个版本，每个版本位于不同的\
  \ SSTable 中。唯一的时间戳区分这些版本。\n\n随着时间的推移，Cassandra 需要访问众多 SSTable 才能检索完整的行，因为没有单个 SSTable\
  \ 可能存储该行中所有列的最最新版本。为了提高性能，Cassandra 通过合并表并清除旧的、过时的数据版本来对 SSTable 执行定期压实。压实可以防止读取速度随着用户随时间更新数据而下降。\n\
  \n在压实过程中，Cassandra 执行以下操作：\n\n*   合并 SSTable\n*   清除所有墓碑\n*   合并键\n*   组合列\n*  \
  \ 在新 SSTable 中创建新索引（不是二级索引）\n\n压实过程创建一个包含该行所有列最新版本的完整行。数据库将每行的最新版本写入新的 SSTable，并在满足所有待处理请求后从旧的\
  \ SSTable 中删除旧版本。以下是压实过程的实际后果：\n\n*   由于新压实的 SSTable，读取性能得到改善\n*   由于数据库需要暂时维护新旧\
  \ SSTable，磁盘 I/O 和空间使用暂时上升\n\n您可以使用 `nodetool compact` 命令手动压实表。更好的做法是通过 `CREATE\
  \ TABLE` 或 `ALTER TABLE` 命令为表设置压实策略。\n\n### 压实策略\n\n压实策略决定了 Cassandra 如何选择 SSTable\
  \ 进行压实，以及它如何在压实期间创建的用于保存最新数据的新 SSTable 中存储压实的行。您可以从以下三种压实策略中选择：\n\n*   `SizeTieredCompactionStrategy`\
  \ (STCS)\n*   `LeveledCompactionStrategy` (LCS)\n*   `TimeWindowCompactionStrategy`\
  \ (TWCS)\n\n**注意**\n还有一种 `DataTieredCompactionStrategy` (DTCS)，它是时间序列数据的替代策略，但在\
  \ Cassandra 3.0 及更高版本中已弃用。\n\nTWCS 是压实时间序列数据的最佳策略。对于非时间序列数据，您需要选择 STCS 或 LCS。以下各节解释了您可以选择的三种压实策略。\n\
  \n#### SizeTieredCompactionStrategy\n\n在 STCS 下，SSTable 的大小是表压实的触发因素。SSTable 的大小充当表压实的触发因素。STCS\
  \ 将 SSTable 分组到唯一的桶中。当存在预定数量的相同大小的表时，数据库会压实 SSTable。Cassandra 将每个 SSTable 的大小与节点上\
  \ SSTable 大小的平均值进行比较。\n\n默认情况下，STCS 的压实配置属性 `enabled` 为 `true`，这意味着数据库执行后台压实。SSTable\
  \ 配置属性 `min_threshold` 设置将触发压实的 SSTable 的最小数量。一旦表达到 `min_threshold` 值，它就有资格进行压实。默认情况下，当存在四个相似大小的表时（默认为\
  \ 160MB），数据库执行压实操作。Cassandra 将相同大小的表合并为一个更大的 SSTable。随着数据库获得几个更大的 SSTable，它会将一组\
  \ SSTable 合并为更大的 SSTable。\n\n**注意**\nSTCS 是默认的压实策略。\n\n以下是一个示例，展示了如何将表的压实属性更改为 `SizeTieredCompactionStrategy`：\n\
  \n```\ncqlsh> ALTER TABLE users\nWITH compaction = { 'class' : 'SizeTieredCompactionStrategy',\
  \ 'min_threshold' : 6 }\n```\n\n`min_threshold` 表属性使您能够设置数据库执行次要压实之前所需的 SSTable\
  \ 最小数量。在此示例中，`min_threshold` 属性指定数据库在触发压实之前应查找至少六个相同大小的 SSTable。\n\n**注意**\n次要压实涉及键空间中的特定表。\n\
  \n##### 配置 STCS\n\n除了 `enabled` 和 `min_threshold` 属性外，您还可以为 STCS 配置以下属性：\n\n*  \
  \ `bucket_high` 和 `bucket_low`：这对属性提供了尺寸公式，帮助数据库确定要考虑压实的表的大小。数据库合并大小落在以下范围内的 SSTable：\n\
  \    ```\n    [average table size X bucket_low] and [average table size X bucket_high]\n\
  \    ```\n    `bucket_high` 属性的默认值为 1.5，`bucket_low` 属性的默认值为 0.5。\n*   `log_all`：使您能够为集群设置高级日志记录，其默认值为\
  \ `false`。\n*   `min_threshold` 和 `max_threshold`：这组属性确定次要压实中 SSTable 的最小（默认值为 4）和最大（默认值为\
  \ 32）数量。\n*   `min_sstable_size`：默认情况下，数据库通过将大小相差不到 50% 的 SSTable 分组到每个桶中。在 SSTable\
  \ 较小的情况下，您可以设置 `min_sstable_size` 属性以定义分配给桶的 SSTable 的大小阈值（以字节为单位）。此参数的默认值为 50MB。\n\
  *   与墓碑相关的压实属性：有几个与墓碑相关的压实属性。\n    *   `only_purge_repaired_tombstones`：此参数的默认值为\
  \ `false`，这意味着数据库将允许从所有 SSTable（已修复和未修复）清除墓碑。通过将此属性设置为值 `true`，您要求数据库仅从已修复的 SSTable\
  \ 清除墓碑。\n    *   `tombstone_threshold`：设置数据库可以垃圾回收的墓碑与所有包含列相比的比率。此参数的默认值为 0.2。一旦\
  \ SSTable 超过此比率（20%），它就有资格进行墓碑压实。一旦数据库可以垃圾回收的墓碑数量超过 20%，Cassandra 将仅压实该表以清除墓碑。\n\
  \    *   `tombstone_compaction_interval`：在创建 SSTable 之后，数据库认为该表有资格进行墓碑压实的时间长度。默认值为\
  \ 86,400 秒（1 天）。\n    *   `unchecked_tombstone_compaction`：默认情况下，此属性设置为 `false`，这意味着\
  \ Cassandra 在运行压实操作之前会检查表是否有资格进行墓碑压实。通过将属性设置为 `true`，您允许 Cassandra 在不进行预先检查的情况下压实墓碑。\n\
  \n##### 何时使用（或不使用）STCS\n\nSTCS 是写入密集型工作负载的理想选择。由于合并过程不按行分组数据，因此行的版本可能分布在多个表中，这会减慢读取速度。\n\
  \n但是，STCS 不能快速清除过时和删除的数据，因为压实触发器是 SSTable 的大小，其增长可能太慢，从而将旧数据保留在原地。随着时间的推移，随着 SSTable\
  \ 变大，由于数据库在压实期间需要存储新旧 SSTable，因此数据库将需要更多存储空间。\n\n尽管 LCS 将相关数据保留在少量表中，如果您的数据没有太多修改或插入，STCS\
  \ 也可以为您提供相同类型的数据集，而不会产生使用 LCS 时产生的写入开销。\n\nSTCS 在处理批处理读写操作时比 LCS 更高效。然而，在负面方面，它比\
  \ LCS 需要更多的磁盘空间。\n\n#### LeveledCompactionStrategy\n\nLCS 将 SSTable 分组到各个级别，其中每个级别（L1、L2、L3…）比前一个级别大\
  \ 10 倍。数据库将每个级别的 SSTable 压实到更大的级别中。首先，数据库将 memtable 中的数据刷新到最低级别 (L0) 的 SSTable 中。数据库不会压实\
  \ L0 级别的表；它将这些最小尺寸的 SSTable 与下一级别 (L1) 的更大 SSTable 合并。\n\n数据库将 L2、L3 等级别的 SSTable\
  \ 压实到至少与您为 LCS 属性 `sstable_size_in_mb` 设置的值（默认为 160MB）一样大的 SSTable。\n\nLCS 提高了读取性能，因为\
  \ Cassandra 可以确定它应该检查每个级别的哪些 SSTable 以查找行键数据。\n\n##### 配置 LCS\n\n您可以为 LCS 设置以下所有属性，所有这些属性的含义与我在上一节中为\
  \ STCS 描述的相同。\n\n*   `enabled`\n*   `log_all`\n*   `tombstone_compaction_interval`\n\
  *   `tombstone_threshold`\n*   `unchecked_tombstone_compaction`\n\n除了这些属性之外，您还可以配置\
  \ `sstable_size_in_mb` 属性，该属性是 LCS 独有的。`sstable_size_in_mb` 属性指定使用 LCS 压实时表的目标大小。数据库将尝试使\
  \ SSTable 大小（压实后）与您为 `sstable_size_in_mb` 参数指定的值相同或更小。但是，如果分区非常大，压实将导致 SSTable 大于您使用\
  \ `sstable_size_in_mb` 参数指定的值。如前所述，`sstable_size_in_mb` 属性的默认值为 160MB。\n\n以下是一个示例，展示了如何更新表以将数据库压实策略设置为\
  \ `LeveledCompactionStrategy`：\n\n```\ncqlsh> ALTER TABLE users WITH compaction\
  \ = { 'class' : 'LeveledCompactionStrategy' };\n```\n\n##### 何时使用（或不使用）LCS\n\nLCS\
  \ 涉及在读取和写入性能之间进行权衡。LCS 适用于读取密集型工作负载（尤其是涉及随机读取的工作负载），因为它使数据库能够在 90% 的情况下仅从一个 SSTable\
  \ 检索查询所需的数据。其他情况下，它只需要读取两个 SSTable。\n\nLCS 在数据碎片化严重时是理想的选择。LCS 比 STCS 更频繁地清除过时数据，这意味着删除的数据占用\
  \ SSTable 的部分更小。然而，更频繁的压实操作意味着有更多的 I/O 压力。因此，由于较高 I/O 操作量导致的性能下降，LCS 通常不是写入密集型工作负载的有前途的想法。LCS\
  \ 的写入惩罚意味着大量的写入可能会压倒压实操作。\n\nLCS 比 STCS 需要更少的空间。\n\n如果对您来说保持高读取率至关重要，您可以使用 LCS。为了克服由此产生的写入端性能下降，您可以向集群中添加更多节点。\n\
  \n#### TimeWindowCompactionStrategy\n\nTWCS 是时间序列数据和过期 TTL 工作负载的推荐压实策略。TWCS 根据一系列时间窗口压实\
  \ SSTable。数据库创建连续的时间窗口，并在每个活动（最新）时间窗口期间，使用 STCS 压实将所有未压实的 SSTable 压实为更大的 SSTable。\n\
  \n在时间窗口结束时，数据库将落在该时间窗口中的所有 SSTable 压实（主要压实，因为涉及多个键空间的 SSTable）为单个 SSTable，使用 SSTable\
  \ 最大时间戳作为标准。数据库对在后续时间窗口期间写入的所有 SSTable 重复相同的压实过程。\n\n##### 配置 TWCS\n\n您可以设置以下压实属性来配置\
  \ TWCS：\n\n*   `compaction_window_unit`：此属性使您能够定义用于定义桶大小的时间单位。默认时间单位是毫秒，如果您愿意，可以设置值为秒或小时。这是一个例子：\n\
  \    ```\n    compaction_window_unit = 'minutes', compaction_window_size = 120\n\
  \    ```\n*   `compaction_window_size`：每个时间窗口的单元数（1、2、3…）。\n*   `log_all`：通过设置值\
  \ `true`，使您能够为整个集群激活高级日志记录。默认值为 `false`。\n\n##### 何时使用 TWCS\n\nTWCS 是存储在具有默认 TTL（生存时间）的表中的时间序列数据的理想选择。如果您需要以非顺序方式查询时间序列数据，则此压实策略不合适。\n\
  \n### 启用和禁用压实\n\n默认情况下，Cassandra 启用后台压实。您可以通过 `ALTER TABLE` 语句将 `enabled` 属性设置为\
  \ `false` 来禁用后台压实，如下所示：\n\n```\ncqlsh> ALTER TABLE mytable WITH COMPACTION = { 'class':\
  \ 'SizeTieredCompactionStrategy', 'enabled': 'false' }\n```\n\n关于压实的最佳实践是使用默认设置\
  \ `enabled`（`true`）并让数据库压实数据。\n\n### 配置全局压实属性\n\n您可以配置以下三个全局压实参数：\n\n*   `snapshot_before_compaction`\n\
  *   `concurrent_compactors`\n*   `compaction_throughput_mb_per_sec`\n\n我将在以下部分解释这些属性。\n\
  \n#### `snapshot_before_compaction` 属性\n\n`snapshot_before_compaction` 属性决定数据库在执行压实操作之前是否对数据进行快照。与所有\
  \ Cassandra 快照一样，您负责删除较旧的快照，这样它们就不会占用太多空间。\n\n默认情况下，`snapshot_before_compaction`\
  \ 属性设置为 `false`。\n\n#### `concurrent_compactors` 属性\n\n在长时间运行的压实期间，可能会积累大量小 SSTable，这将不利地影响读取性能。为避免读取性能下降，您可以配置\
  \ `concurrent_compactors` 参数以设置任何时候可以运行的并发压实进程数。此数字不包括用于反熵修复的任何验证压实。\n\n默认情况下，`concurrent_compactors`\
  \ 属性设置为磁盘数或核心数中较小的一个，最小为 2，每个 CPU 核心最大为 8。\n\n由于同时执行压实会增加磁盘空间的使用，请确保在提高 `concurrent_compactors`\
  \ 参数值之前有足够的可用磁盘空间。\n\n**注意**\n在调整 `concurrent_compactors` 属性之前，请通过配置 `compaction_throughput_mb_per_sec`\
  \ 属性来限制压实速度。\n\n#### `sstable_preemptive_open_interval_in_mb` 属性\n\n数据库可以在完成对 SSTable\
  \ 的写入之前抢先打开正在压实的 SSTable。目标是通过最小化数据进出缓存的移动，并将热行保留在原地，从而在压实前后的 SSTable 版本之间平稳传输读取。默认值为\
  \ 50MB。\n\n### 限制压实速度\n\n有时您可能意识到压实运行得太快（或太慢）。您可以配置 `compaction_throughput_mb_per_sec`\
  \ 属性以将压实限制为特定速率（以 MB 为单位）每秒。此压实属性控制数据库插入数据的速度。数据插入速率越快，数据库必须执行压实以保持 SSTable 计数较低的速度就越快。\n\
  \n`compaction_throughput_mb_per_sec` 参数的默认值为 16，意味着压实速率是写入吞吐量的 16 倍，以 MB/秒为单位。\n\
  \n您可以通过将 `compaction_throughput_mb_per_sec` 属性设置为 0 来禁用压实限制。推荐值为 16-32。压实速度在所有压实器之间分配。如果您有八个并发压实器，压实吞吐量为\
  \ 16，则每个压实器只能获得 2MB/s。在旋转磁盘上，建议将并发压实器数量设置得非常低（例如 2）；在 SSD 上，您可以将压实器数量提高到磁盘可以跟上的水平。\n\
  \n**注意**\n您可以通过配置 `compaction_large_partition_warning_threshold_mb` 属性，让数据库在压实大于您设置的值的分区时发出警告。此参数的默认值为\
  \ 100。\n\n### 设置压实策略\n\n您在表级别设置压实策略。您可以在创建表时或通过更改表来设置压实属性。您在 `CREATE TABLE` 或 `ALTER\
  \ TABLE` 语句中使用 `compaction` 选项指定压实 `class`，如下所示：\n\n```\ncompaction = {\n'class'\
  \ : 'compaction_strategy_name'\n[, 'subproperty_name' : 'value',...]\n}\n```\n\n\
  尽管您可以禁用压实，但这从来不是一个好主意，因为它可能导致僵尸的传播。僵尸，如果您从第 5 章回忆起，是已删除但仍然存在的记录。有时，墓碑记录可能已从集群的其他节点中删除，但一个无响应的节点除外，该节点由于宕机而不会立即接收墓碑。如果数据库在无响应节点恢复之前从集群的其余部分删除了墓碑记录，Cassandra\
  \ 会将该节点上的（本应被删除的）记录视为新数据并将其发送到其他节点。\n\n如前所述，为无响应节点提供恢复的宽限期有助于防止僵尸记录重新出现。表属性 `gc_grace_seconds`\
  \ 设置墓碑的宽限期，其默认值为十天（864,000 秒）。一旦墓碑的宽限期结束，数据库会在压实过程中删除墓碑。\n\n### 获取和设置压实阈值\n\n运行\
  \ `nodetool getcompactionthreshold` 命令以查找表的最小和最大压实阈值。运行此命令时必须指定键空间和表名。\n\n```\n\
  $ sudo nodetool getcompactionthreshold cycling cyclist_name\nCurrent compaction\
  \ thresholds for cycling/cyclist_name:\nmin = 4,  max = 32\n$\n```\n\n**注意**\n主要压实涉及键空间中的所有表。次要压实仅涉及键空间中的部分表。\n\
  \n您可以使用 nodetool 的 `setcompactionthreshold` 命令设置压实阈值，该命令使您能够为表设置最小/最大压实阈值。术语“阈值”指的是数据库在调度次要压实之前应存在的相似大小的\
  \ SSTable 的数量。\n\n`setcompactionthreshold` 命令具有以下选项：\n\n*   `keyspace`：键空间名称\n*\
  \   `table`：表名称\n*   `minthreshold`：触发次要压实的 SSTable 最小数量（使用 STCS 或 DTCS 时）\n*  \
  \ `maxthreshold`：次要压实中的 SSTable 最大数量（使用 STCS 或 DTCS 时）\n\n以下示例展示了如何设置表的压实阈值：\n\n\
  ```\n$ nodetool setcompactionthreshold cycling cyclists 4 16\n```\n\n在此示例中，`cycling`\
  \ 指的是键空间，`cyclists` 是表。\n\n如前所述，STCS 和 DTCS 都允许您配置次要压实期间应压实的 SSTable 的最小和最大数量，通过配置\
  \ `min_threshold` 和 `max_threshold` 属性。\n\n### 记录压实活动\n\n您可以通过在创建或更改表时将 `log_all`\
  \ 子属性设置为 `true` 来设置数据库的扩展压实活动日志记录。`log_all` 子属性位于 `compaction` 属性下。表的 `log_all`\
  \ 属性为整个集群激活高级日志记录。虽然您在表级别执行此操作，但一旦为单个表配置了扩展日志记录，数据库会自动收集有关集群中所有节点上所有表压实的详细信息。\n\n\
  设置扩展压实活动日志记录后，数据库会创建一个名为 `compaction-%d` 的额外压实相关文件，位于 `$CASSANDRA_HOME/logs` 目录下，其中\
  \ `%d` 充当序列号。\n\n设置扩展压实日志记录后，数据库会收集有关以下压实事件的信息：\n\n*   `enable`：列出数据库已刷新的所有 SSTable。\n\
  \    ```\n    {\"type\":\"enable\",\"keyspace\":\"es\": ... }\n    ```\n*   `flush`：记录从\
  \ memtable 到 SSTable 的刷新事件。\n    ```\n    {\"type\":\"flush\",\"keyspace\":\"test\"\
  ,\"table\":\"t\",\"time\":1470083335639,\"tables\": ... }\n    ```\n*   `compaction`：记录压实事件。\n\
  \    ```\n    {\"type\":\"compaction\",\"keyspace\":\"test\",\"table\":\"t\",\"\
  time\":1470083660267,\"start\":\"1 ... }\n    ```\n*   `pending`：列出待处理的压实任务数。\n\
  \    ```\n    {\"type\":\"pending\",\"keyspace\":\"test\",\"table\":\"t\",\"time\"\
  :1470083447967,\"strategyId\":\"1\",\"pending\":100}\n    ```\n\n### 测试压实策略的有效性\n\
  \n当您计划更改压实策略时，可以首先在不正式属于集群的节点上测试新策略的影响。您以写入调查模式启动一个新节点，该模式将节点添加到集群但不正式使其成为环的一部分。\n\
  \n如果您愿意，可以从集群中取出一个节点，并以写入调查模式将其重新启动，以测试更改对读取性能的影响。一旦以写入调查模式启动节点，您就可以在该节点上对读取操作进行基准测试。\n\
  \n要以写入调查模式启动节点，请使用以下两种方法之一将 `write_survey` 选项设置为 `true`：\n\n```\nJVM_OPTS=\"$JVM_OPTS\
  \ -Dcassandra.write_survey=true\"       /* 用于包安装，将此行添加到 cassandra-env.sh 文件。\n$\
  \ cassandra -Dcassandra.write_survey=true               /* 用于压缩包安装，以此模式启动新节点。\n\
  ```\n\n您还可以通过在 `$CASSANDRA_HOME/conf/jvm.options` 文件中设置属性来以写入调查模式启动节点，如下所示（默认情况下，`-Dcassandra.write_survey`\
  \ 属性被注释掉。您需要取消注释）。以下是 `jvm.options` 文件的相关部分：\n\n```\n-Dcassandra.write_survey=true\n\
  ```\n\n\n\n\n# 用于测试新的紧缩和压缩策略。它允许您尝试不同的\n\n\n\n\n# Cassandra 数据库性能调优\n\n## 测试压缩策略\n\
  在不影响生产工作负载的情况下，测试压缩策略并基准化写入性能差异。\n```bash\n-Dcassandra.write_survey=true\n```\n\n\
  ## 启用与禁用自动压缩\n您可以使用以下命令为一个或多个表启用和禁用自动压缩：\n```bash\n$ nodetool enableautocompaction\
  \ cycling cyclist_name;\n$ nodetool disableautocompaction cycling cyclist_name;\n\
  ```\n\n## 查看所有压缩历史\n您可以使用 `nodetool compactionhistory` 命令查看数据库中所有压缩活动的历史记录：\n```bash\n\
  $ nodetool compactionhistory\nCompaction History:\nid                          \
  \         keyspace_name columnfamily_name   compacted_at            bytes_in bytes_out\
  \ rows_merged\nf6227aa0-81e8-11e7-a4ad-89801d899afb cycling       cycle        \
  \       2017-08-15T11:38:41.994 111      55        {1:1, 2:1}\nef3d57a0-81e8-11e7-a4ad-89801d899afb\
  \ cycling       cyclist_name        2017-08-15T11:38:30.426 243      243       {1:5}\n\
  ...\n```\n\n该命令的输出包含七个列。`bytes_in` 和 `bytes_out` 列通过比较压缩前后 SSTable 的大小，帮助您判断压缩效果。\n\
  \n输出中的 `tables:rows` 表示法（例如 `{1:5}`）说明了 Cassandra 如何选择行进行压缩。例如，`{1:5}` 表示数据库从五个\
  \ SSTable 中各取一行来创建一个新的压缩 SSTable。类似地，`{1:3,3:1}` 表示数据库从一个 SSTable 中取三行，并与另外三个表中的单行合并，创建一个压缩\
  \ SSTable。\n\n`nodetool compactionstats` 命令显示所有待处理和正在进行的压缩操作的状态。您可以通过查看 PROGRESS\
  \ 列来检查压缩操作的完成百分比。\n\n### 压缩数据以节省存储空间\n通过让 Cassandra 压缩磁盘上的 SSTable，可以节省存储空间。除了在存储方面带来收益外，压缩还能略微提升性能。DataStax\
  \ 估计，根据数据类型的不同，压缩可能会使存储空间减少 25-33%，读取性能提升 25-35%，写入性能略有提升（5-10%）。\n\n当 Cassandra\
  \ 需要读取压缩数据时，它会定位 SSTable 索引中的行并解压缩必要的行块。\n\n最适合压缩的表是那些具有相似列集、且行中列数相同的表。数据在不同行中越相似，压缩数据能节省的空间就越多，因为压缩因子会更高。\n\
  \n### 配置压缩\nCassandra 默认启用压缩，您可以配置各种压缩选项，包括压缩期间数据库必须使用的压缩算法。您可以在创建表时进行配置，或者稍后通过修改表来配置。以下语法语句显示了您可以配置的四个压缩属性：\n\
  ```\ncompression = {\n['class' : 'compression_algorithm_name',\n'chunk_length_kb'\
  \ : 'value',\n'crc_check_chance' : 'value',]\n| 'sstable_compression' : '']\n}\n\
  ```\n\n最重要的压缩属性是压缩类（`class`），它指定了压缩期间数据库必须使用的压缩算法。您可以从以下压缩类中选择：\n*   `LZ4Compressor`\n\
  *   `SnappyCompressor`\n*   `DeflateCompressor`\n\n> **注意**\n> 除了 `LZ4`、`Snappy`\
  \ 和 `Deflate` 压缩类之外，您还可以使用 `org.apache.cassandra.io.compress.ICompressor` 接口实现自己的压缩类。\n\
  \n选择压缩算法时，您需要在节省存储空间和数据库读取性能这两个相互冲突的目标之间进行权衡。通常，通过压缩数据获得的存储空间节省与数据库在读取时解压缩数据的速度成反比。\n\
  \n`Snappy` 和 `Deflate` 都提供更高的压缩比，意味着与使用 LZ4 算法相比，使用这些算法可以节省更多的存储空间。然而，LZ4 提供最快的解压缩速度，这意味着查询压缩数据时具有更高的读取性能。\n\
  \n默认的压缩算法是 `LZ4Compressor`。要为表指定压缩算法，您需要为该压缩算法指定其类，如下所示：\n```sql\nCREATE TABLE customers\
  \ (\n...\nPRIMARY KEY (id)\n)\nWITH compression = { 'class' : 'SnappyCompressor'\
  \ };\n```\n\n除了指定压缩算法，您在创建或修改表时还可以配置以下与压缩相关的属性：\n*   `chunk_length_kb`：默认情况下，此属性的值设置为\
  \ 64KB。这是 Cassandra 压缩 SSTable 时压缩块的大小。通过为此参数指定更高的值，您可以增加压缩比，但数据库每次读取操作必须从磁盘读取更多数据。默认值对于大多数用例来说是合适的，但如果数据库一次需要从磁盘读取大量数据，您可以提高此参数的值。\n\
  *   `crc_check_chance`：此属性确定数据库在读取操作期间检查压缩数据块校验和的概率。校验和有助于检测损坏，并防止数据库将损坏的数据副本传播到其他节点。`crc_check_chance`\
  \ 属性的默认值为 1，表示数据库在读取期间始终检查数据的校验和（概率为 1 意味着事件总是发生）。您可以通过将此参数设置为 0 来完全禁用校验和检查。参数值越低，Cassandra\
  \ 在读取期间执行数据校验和的可能性就越小。\n\n### Cassandra 何时压缩数据\n当您使用 `ALTER TABLE` 语句为现有表配置压缩时，Cassandra\
  \ 将开始压缩该表的所有新 SSTable。但是，Cassandra 不会立即压缩所有现有的 SSTable。Cassandra 将在下次对数据库中的数据执行压缩时压缩现有\
  \ SSTable。\n\n您可以通过强制重写现有 SSTable（在此过程中压缩表）来修改 Cassandra 的默认压缩行为。您可以通过执行 `nodetool\
  \ upgradesstables` 或 `nodetool scrub` 命令来实现。\n\n`nodetool upgradesstables` 命令的语法如下：\n\
  ```bash\n$ nodetool upgradesstables\n( -a | --include-all-sstables )\n--    ...\n\
  ```\n\n`nodetool upgradetsstables` 命令会重写 SSTable，并在此过程中压缩它们。如果您希望数据库在为 SSTable 配置压缩后立即开始压缩数据，可以运行此命令。当您希望修改表的压缩算法时，也可以运行此命令。\n\
  \n您可以通过运行 `nodetool scrub` 命令使 Cassandra 压缩已配置压缩的表。该命令还会像 `nodetool upgradesstables`\
  \ 命令一样重建节点中的 SSTable，但它需要在表重建之前创建快照。`nodetool upgradesstables` 命令是比 `nodetool scrub`\
  \ 更好的选择，因为您不需要在数据库压缩 SSTable 之前创建快照。\n\n### 修改压缩算法\n默认的压缩算法是 `LZ4Compressor`。您可以在创建表时通过将压缩参数\
  \ `class` 配置为不同的压缩类（本例中为 `DeflateCompressor`）来更改压缩算法：\n```sql\nCREATE TABLE MyTable\
  \ (\n...\nPRIMARY KEY (user_id)\n)\nWITH compression = { 'class' : DeflateCompressor\
  \ };\n```\n\n您可以在创建表后修改任何压缩属性，包括 `compression class` 属性。以下示例展示了如何修改压缩算法的 `class`\
  \ 属性（改为 `DeflateCompressor`）：\n```sql\nALTER TABLE customers\nWITH compression =\
  \ { 'class' : 'DeflateCompressor', 'chunk_length_in_kb' : 6\n```\n\n### 测试压缩效果\n\
  在初次尝试压缩时，您可能希望了解不同压缩策略的影响，同时又不影响生产数据库性能。Cassandra 允许您通过以写入调查模式启动数据库来测试压缩策略。\n\n\
  本章的“测试压缩策略效果”部分描述了如何使用 Cassandra 的写入调查模式来测试您的压缩计划。\n\n在写入调查模式下启动新节点有助于测试新的压缩策略并基准写入性能。要检查压缩策略对读取性能的影响，您可以将一个节点从集群中取出，并使用\
  \ `cassandra-stress` 工具（我在本章中会解释）基准测试其读取操作的性能，将该节点作为独立服务器使用。\n\n### 关闭压缩\n默认情况下，Cassandra\
  \ 会压缩数据。您可以在创建表时通过将压缩参数 `enabled` 指定为 `false` 来禁用压缩：\n```sql\nCREATE TABLE MyTable\
  \ (\n...\nPRIMARY KEY (user_id)\n)\nWITH compression = { 'enabled' : false };\n\
  ```\n\n您可以通过为现有表指定 `sstable_compression` 选项并为其赋予空值（' '）来禁用压缩，如下所示：\n```bash\ncqlsh>\
  \ ALTER TABLE cycling.cyclist_name\nWITH COMPRESSION = {'sstable_compression': '\
  \ ');\n```\n\n## 通过 Memtable 阈值提升写入性能\n如您所知，当 Cassandra 超过提交日志阈值或 Memtable 清理阈值时，它会将\
  \ Memtable 刷新到磁盘（成为 SSTable）。关于设置提交日志和 Memtable 阈值没有固定的规则。\n\n如果您的写入负载包括对小部分数据的高更新或持续的写入流，您可以提高\
  \ Memtable 阈值。当存在大量写入时，如果保持 Memtable 阈值较低，将导致压缩效率低下。\n\nCassandra 使用 `memtable_cleanup_threshold`\
  \ 参数（在 `cassandra.yaml` 中）的设置来确定何时应刷新 Memtable。此参数的默认值为 1/(`memtable_flush_writers`\
  \ + 1)。然而，此参数仅表示 Cassandra 用于计算自动 Memtable 刷新空间量的比率。Cassandra 通过以下方式确定何时将 Memtable\
  \ 刷新到磁盘：\n*   `memtable_heap_space_in_mb` 参数决定了为 Memtable 分配的堆内内存量。此参数的默认值为堆大小的\
  \ 0.25 倍。`memtable_offheap_space_in_mb` 参数决定了为 Memtable 分配的堆外内存量，其默认值也是堆大小的 0.25\
  \ 倍。将 `memtable_heap_space_in_mb` 参数的值与 `memtable_offheap_space_in_mb` 参数的值相加。\n\
  *   将上一行的总和乘以 `memtable_cleanup_threshold` 参数的值。这将给出以 MB 为单位的阈值。\n*   当节点上所有 Memtable\
  \ 使用的组合内存超过阈值时，数据库会将该节点上最大的 Memtable 刷新到磁盘。\n\n`memtable_flush_writers` 参数表示 Memtable\
  \ 刷新写入线程的数量。数据库使用此参数来计算 `memtable_cleanup_threshold` 参数的值，其默认值由以下方式确定：\n节点上磁盘的数量或核心的数量，最小值为\
  \ 2，最大值为 8。\n\n以下是一个示例，展示了数据库如何确定何时将 Memtable 刷新到磁盘：\n1.  假设您已将节点的 `memtable_flush_writers`\
  \ 参数设置为 8。\n2.  `memtable_cleanup_threshold` 参数的默认值为 `1/(memtable_flush_writers\
  \ +1)`，因此本例中为 1/(8+1) = 0.11。\n3.  假设您已将 `memtable_heap_space_in_mb` 和 `memtable_offheap_space_in_mb`\
  \ 参数都设置为 2000。\n4.  步骤 2 得出 `memtable_cleanup_threshold` 参数的值为 0.11。`memtable_heap_space_in_mb`\
  \ 和 `memtable_offheap_space_in_mb` 参数的总和为 2000+2000=4000。因此，Memtable 清理的空间阈值为 4000\
  \ - 4000*0.11=3636MB。\n5.  当此节点上 Memtable 使用的组合空间量超过 3636MB 时，Cassandra 会将最大的 Memtable\
  \ 刷新到磁盘。\n\n`memtable_cleanup_threshold` 参数的值越大，数据库将 Memtable 刷新到磁盘的频率就越低。这也意味着更少的\
  \ SSTable，从而意味着更小的压缩活动级别。\n\n## 调整 JVM\n在 Cassandra 中，所有操作都在 JVM 内部运行。Cassandra\
  \ 使用 JVM 堆来优化读取性能。为此，它将布隆过滤器、分区键缓存、SSTable 索引摘要和分区摘要等组件保留在堆中。\n\n除了 Java 堆内存，Cassandra\
  \ 还使用内存来支持页面缓存、布隆过滤器和缓存行。\n\n了解如何调整 JVM 非常重要。在这方面需要知道的关键是：\n*   Java 垃圾回收的工作原理\n\
  *   理想的垃圾收集器\n*   分配 Java 堆大小\n\n配置垃圾回收和为 JVM（堆）分配正确数量的内存对高性能至关重要。让我们在以下部分中了解这两点。\n\
  \n### Java 垃圾回收\n垃圾回收是 JVM 从内存中移除旧对象的方式。您可以选择不同的垃圾收集器。Java 内存堆内部有几种类型的区域，例如年轻代和老年代，在每个内存区域内还有更小的子区域。当\
  \ JVM 需要清理已满的内存区域时，它会暂停正在运行的操作。调整 Java 垃圾回收的目标是尽量减少暂停时间。您不仅应该寻求将垃圾回收引起的暂停时间最小化，还应该减少暂停次数。\n\
  \n### 选择正确的垃圾收集器\n可用的两种 Java 垃圾收集器是并发标记清除（CMS）和 G1（垃圾优先）垃圾收集器。您可以这样在两者之间做出决定：\n\
  *   如果您处理的堆大小小于 14GB，并且始终处理相同类型的工作负载，CMS 更佳。\n    > **注意** 在 Java 的下一个版本（Java 9）中，CMS\
  \ 将正式被废弃。\n*   如果您处理的堆大小大于 14GB，并且数据库正在处理不同类型的工作负载，请使用 G1 垃圾收集器。\n\n您可以通过编辑 `$CASSANDRA_HOME/conf/jvm.options`\
  \ 文件中的设置来配置 Java 垃圾收集器。`jvm.options` 文件（我在第 2 章中首先解释过）有助于设置多个属性，例如启动参数、通用 JVM 设置、堆设置以及垃圾回收相关设置。\n\
  \n默认的垃圾收集器是 CMS，您可以在 `java.options` 文件的 GC SETTINGS 部分查看此收集器的设置，如下所示：\n\n\n\n# Cassandra\
  \ 性能调优与安全配置\n\n## CMS 垃圾收集器设置\n\n```\n-XX:+UseParNewGC\n-XX:+UseConcMarkSweepGC\n\
  -XX:+CMSParallelRemarkEnabled\n-XX:SurvivorRatio=8\n-XX:MaxTenuringThreshold=1\n\
  -XX:CMSInitiatingOccupancyFraction=75\n-XX:+UseCMSInitiatingOccupancyOnly\n-XX:CMSWaitDuration=10000\n\
  -XX:+CMSParallelInitialMarkEnabled\n-XX:+CMSEdenChunksRecordAlways\n\n"
- "# 一些 JVM 通过 JMX 访问时可能会填满其堆，参见 CASSANDRA-6541\n-XX:+CMSClassUnloadingEnabled\n```\n\
  \n如果你想将垃圾收集器从默认的 CMS 收集器切换到更新的 G1 收集器，首先必须注释掉`CMS Settings`部分下的所有内容。接着，编辑 G1 设置并取消注释`-XX:+UseG1GC`属性，如下所示：\n\
  \n## G1 垃圾收集器设置（实验性功能，注释上一节并取消注释下节以启用）\n\n```\n## 使用 Hotspot 的垃圾优先收集器。\n-XX:+UseG1GC\
  \                        => 默认情况下，此属性被注释掉\n#\n```\n\n以下是可以配置的 G1 设置：\n\n*   `-XX:MaxGCPauseMillis`：\n\
  \    这是关键的 G1 垃圾收集器可调优属性。暂停目标越低，吞吐量就越低。`MaxGCPauseMillis`属性的最低设置是 200 毫秒，这也是该属性的默认值。通过将值从\
  \ 200 毫秒提高到 1000 毫秒，可以增加吞吐量。你必须尝试将此参数的值保持小于`cassandra.yaml`文件中的超时时间。\n\n    ```\n\
  \    ## 让 JVM 在 STW（停止世界）暂停期间做更少的记忆集工作，\n    ## 而是倾向于并发 GC。降低了 p99.9 延迟。\n    -XX:G1RSetUpdatingPauseTimePercent=5\n\
  \    #\n    ```\n\n*   `-XX:InitiatingHeapOccupancyPercent`：\n    设置此参数可以节省大型 Java\
  \ 堆（大于 16GB）中的 CPU 时间。JVM 会暂停扫描内存区域以检查它们是否已满，直到堆达到设定的百分比满为止。例如，如果你将堆占用百分比设置为 70%，这意味着当堆达到\
  \ 70%满时，JVM 开始扫描内存区域。此参数的默认值为 40%。\n\n我没有展示任何 CMS 收集器的配置属性，因为它即将被淘汰。\n\n## 设置堆大小\n\
  \n你可以通过设置`jvm.options`文件中`HEAP SETTINGS`部分下列出的属性来配置 Java 堆大小。\n当你使用 G1 垃圾收集器时，你需要用`-Xmx`属性配置`MAX_HEAP_SIZE`属性。\n\
  你用`-Xms`属性设置最小堆大小，用`-Xmx`属性设置最大堆大小。\n\n默认情况下，`-Xms`和`-Xmx`属性被注释，Cassandra 使用以下简单的启发式方法自动计算`MAX_HEAP_SIZE`属性的值：\n\
  \n```\nmax(min(1/2 ram, 1024MB), min(1/4 ram, 8GB))\n```\n\n也就是说，它估算一半的 RAM 并将其上限设为\
  \ 1024MB。它还计算 RAM 的四分之一值并将其上限设为 8GB。然后它取两者中较高的值。\n\n在生产数据库中，最佳实践是为`-Xmx`和`-Xms`属性设置自定义值。设置堆的最大值时，`MAX_HEAP_SIZE`属性的推荐值是尽可能设置得高，最高可达\
  \ 64GB。\n\n另一个（可能是必要的）最佳实践是将最小和最大堆大小设置为相同的值，如下所示：\n\n```\n-Xms16G\n-Xmx16G\n```\n\
  \n将最小和最大堆大小设置为相同的值有助于数据库避免在 JVM 通过移除陈旧对象清理堆区域空间时发生长时间的垃圾收集暂停（也称为“世界停止”暂停）。相反，JVM\
  \ 在服务器启动时锁定你为堆指定的内存，以防止部分内存被交换到磁盘。\n\n## 配置垃圾收集日志记录\n\n最佳实践是启用 GC 日志记录，默认情况下它是启用的。你可以查看\
  \ GC 日志以了解节点堆使用情况的大小，这有助于你根据情况调整它。以下是`java.options`文件中的相关部分：\n\n```\n### GC 日志记录选项\
  \ -- 取消注释以启用\n-XX:+PrintGCDetails\n-XX:+PrintGCDateStamps\n-XX:+PrintHeapAtGC\n\
  -XX:+PrintTenuringDistribution\n-XX:+PrintGCApplicationStoppedTime\n-XX:+PrintPromotionFailure\n\
  #-XX:PrintFLSStatistics=1\n#-Xloggc:/var/log/cassandra/gc.log\n-XX:+UseGCLogFileRotation\n\
  -XX:NumberOfGCLogFiles=10\n-XX:GCLogFileSize=10M\n```\n\n如你所见，这里显示的属性帮助你配置垃圾收集日志记录的各个方面，例如日志位置、日志文件轮换、日志文件大小以及要存储的日志文件数量。\n\
  \n## 使用 nodetool proxyhistograms 和 tablehistograms 命令\n\n有两个很好的`nodetool`命令可以帮助你识别集群中的性能问题：`nodetool\
  \ proxyhistograms`和`nodetool tablehistograms`。这两个命令都以直方图的形式呈现数据库捕获的性能统计信息，因此得名。\n\
  \n`nodetool proxyhistograms`命令有助于识别性能问题。此命令的输出显示集群中的读、写和范围请求延迟，其中节点充当协调者。此命令帮助你识别集群中的一般性能问题。\n\
  \n`nodetool tablehistograms`命令让你专注于特定表的性能。通过此命令，你可以查看表的写和读延迟以及分区大小。\n\n## 总结\n\n\
  本章介绍了几个关键的 Cassandra 性能调优策略，例如压缩和压紧。性能调优通常涉及权衡取舍；你可以通过压缩节省存储，但必须为此付出更高的 I/O 要求。同样，增加\
  \ Java 堆大小将减少查询延迟，但会减少系统中可用于其他用途的内存。\n\n`cassandra-stress`工具简单易用，在测试潜在的配置更改（如压紧策略、压缩等）的影响时非常有用。压力测试有助于你评估集群处理不同类型工作负载的能力，并帮助你判断是否需要向集群添加更多节点。\n\
  \n# Cassandra 安全\n\n保护 Cassandra 集群涉及一系列不同的任务，包括认证、授权和加密。本章描述如何管理以下与安全相关的任务：\n\n\
  *   **认证**：如何允许应用程序和用户登录集群。\n*   **授权**：处理授予访问数据库或数据库对象（如表和物化视图）的权限。\n*   **加密**：指使用安全套接字层（SSL）来保护客户端与\
  \ Cassandra 数据库之间以及集群节点之间的通信。\n*   **防火墙**：管理防火墙端口访问涉及了解你必须保持打开的端口。\n\n### 配置认证\n\
  \n在大多数数据库中，通常使用“用户”和“角色”这两个术语来指代不同的实体。用户是登录账户，角色封装了你分配给用户的各种对象的权限集合。\n\nCassandra\
  \ 将所有认证和授权都基于角色。你执行`CREATE ROLE`命令来创建数据库角色。\n\n> **注意**\n>\n> 所有授权和认证都通过数据库角色进行。尽管\
  \ Cassandra 仍然提供`CREATE USER`、`ALTER USER`、`DROP USER`和`LIST USERS`命令，但你不应使用它们，因为它们在当前版本中已弃用。请改用`CREATE\
  \ ROLE`、`ALTER ROLE`、`DROP ROLE`、`LIST ROLES`和`LIST_PERMISSIONS`命令。\n\nCassandra\
  \ 仍然提供`CREATE USER`命令来创建新的数据库用户账户，但此命令已弃用，仅用于向后兼容目的。\n\nCassandra 不再正式使用“用户”一词来指代登录账户。因此，一个（登录）角色是用户的同义词。\n\
  \n\n\n# Cassandra 认证与角色管理\n\n默认情况下，Cassandra 并不要求用户进行身份验证即可登录集群。这意味着，你可以直接输入 `cqlsh`\
  \ 而无需任何凭据，即可访问集群。\n\n### 创建角色\n\nCassandra 内置了一个名为 `cassandra` 的角色，其密码同样是 `cassandra`。这个默认角色\
  \ `cassandra` 拥有管理员权限。你也可以创建额外的登录角色并授予它们管理员权限。最佳实践是创建替代的管理员角色，更改默认角色 `cassandra`\
  \ 的密码，并且之后不再使用这个默认角色进行任何操作。\n\n只有通过拥有管理权限的角色（可以是默认角色 `cassandra` 或你创建的任何其他角色）登录，才能创建新角色。\n\
  \n当你首次以默认角色 `cassandra` 登录并尝试创建角色时，可能会遇到以下错误：\n\n```\n$ cqlsh 192.168.159.129 -u\
  \ cassandra -p cassandra\nConnected to Test Cluster at 192.168.159.129:9042.\n[cqlsh\
  \ 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\n\
  cassandra@cqlsh> create role newrole with password 'newrole123';\nSyntaxException:\
  \ line 1:20 mismatched input 'withpassword' expecting EOF (create user newuser [withpassword]...)\n\
  cassandra@cqlsh> create role newrole with password 'newrole123';\nInvalidRequest:\
  \ Error from server: code=2200 [Invalid query] message=\"org.apache.cassandra.auth.CassandraRoleManager\
  \ doesn't support PASSWORD\"\ncassandra@cqlsh> list users;\nUnauthorized: Error\
  \ from server: code=2100 [Unauthorized] message=\"You have to be logged in and not\
  \ anonymous to perform this request\"\ncassandra@cqlsh>\n```\n\n出现此错误的原因是你尚未在此数据库中配置身份验证。默认情况下，`cassandra.yaml`\
  \ 文件中的身份验证选项被设置为：\n\n```\nauthenticator: AllowAllAuthenticator\n```\n\n`AllowAllAuthenticator`\
  \ 是默认的身份验证后端。如果你将 `AllowAllAuthenticator` 设置为 `authenticator` 属性的值，就会在数据库中禁用身份验证。Cassandra\
  \ 不会执行任何检查，并允许任何人无需验证即可登录。\n\n`AllowAllAuthenticator` 的替代方案是 `PasswordAuthenticator`。此身份验证后端将使用存储在数据库\
  \ `system_auth.credentials` 表中的凭据来验证用户。\n\n因此，即使你以默认角色 `cassandra`（拥有管理员权限）登录数据库，当你尝试创建角色时，数据库会提示“你必须已登录且不能是匿名用户才能执行此请求”。`authenticator:\
  \ AllowAllAuthenticator` 选项允许所有用户，并且不检查你是否已登录。解决方案是为数据库配置身份验证，如下一节所述。\n\n## 配置身份验证\n\
  \n为了能够以管理员身份登录并创建角色或执行其他与角色相关的任务，请按照以下步骤配置身份验证。\n\n1.  将 `cassandra.yaml` 文件中的身份验证选项更改为\
  \ `PasswordAuthenticator`，如下所示：\n    ```\n    authenticator: PasswordAuthenticator\n\
  \    ```\n    此更改会强制 Cassandra 在客户端连接到集群时要求提供角色名和密码。\n\n2.  重启数据库。\n\n3.  使用默认超级用户\
  \ `cassandra` 的凭据登录 `cqlsh`。\n    ```\n    $ cqlsh -u cassandra -p cassandra\n \
  \   ```\n\n4.  系统键空间 `system_auth` 存储角色凭据。如果此键空间只有默认的单个副本，一旦该副本变得不可用，你可能会失去对集群的访问权限。因此，为了增强可用性，将\
  \ `system_auth` 表空间的复制因子提高到一个更高的值，例如每个数据中心 3 或 5，如下所示：\n    ```\n    cqlsh> ALTER\
  \ KEYSPACE \"system_auth\"\n    WITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
  \ 'dc1' : 5,\n    'dc2' : 3};\n    ```\n\n5.  为确保复制因子的更改在整个集群中生效，请对 `system_auth`\
  \ 键空间运行 `nodetool repair` 命令。\n    ```\n    $ nodetool repair system_auth\n    ```\n\
  \n6.  重启数据库。\n\n至此，你已经为数据库配置了身份验证，现在可以以 `cassandra/cassandra` 登录来执行与角色和权限相关的管理任务。\n\
  \n一旦按照上述步骤配置了身份验证，你必须始终指定超级用户的凭据。如果尝试像之前那样不带凭据登录，将会收到错误。\n\n```\n$ cqlsh 192.168.159.129\n\
  Connection error: ('Unable to connect to any servers', {'192.168.159.129': AuthenticationFailed('Remote\
  \ end requires authentication.',)})\n$\n```\n\n## 加速凭据认证过程\n\n在繁忙的数据库中，你可以通过配置 `cassandra.yaml`\
  \ 文件中的以下两个选项来加速凭据认证过程：\n\n*   `credentials_validity_in_ms`\n*   `credentials_update_interval_in_ms`\n\
  \n这两个参数的默认值均为 2000 毫秒。你可以提高其中一个或两个参数的值，以减少频繁认证凭据请求的开销。\n\n### 创建角色\n\n配置好身份验证后，就可以使用超级用户帐户创建角色了。这里我们使用默认的超级用户帐户\
  \ `cassandra` 来创建用户。\n\n通过运行 `CREATE ROLE` 命令来创建角色。`CREATE ROLE` 命令的通用语法如下：\n\n\
  ```\n(CREATE | ALTER | DROP ) role_name\n[WITH (LOGIN = true | SUPERUSER = true\
  \ | password = 'password')];\n```\n\n以下是对关键角色属性的简要说明。默认情况下，数据库将 `SUPERUSER` 和 `LOGIN`\
  \ 属性设置为 `false`，而 `password` 属性默认为 `null`。\n\n*   `SUPERUSER`：可以执行所有 CQL 命令。如果将此属性设置为\
  \ `true`，则该角色将被授予对所有角色的 `AUTHORIZE`、`CREATE` 和 `DROP` 权限。\n*   `LOGIN`：如果设置，数据库允许此角色使用密码登录以运行\
  \ CQL 语句。你需要设置此属性以为 `PasswordAuthenticator` 后端或内部身份验证创建登录帐户。\n*   `PASSWORD`：表示你设置的密码。Cassandra\
  \ 的内部身份验证需要密码。你必须用单引号将密码括起来。\n\n你可以创建角色来定义一组权限，然后将这些权限分配给其他角色并映射到外部用户。角色还使你能够为内部身份验证创建登录帐户。使用内部身份验证时的最佳实践是为分配权限和登录帐户创建单独的角色。\n\
  \n以下是创建角色的步骤。\n\n1.  以超级用户 `cassandra` 身份登录 `cqlsh`。\n    ```\n    $ cqlsh 192.168.159.129\
  \ -u cassandra -p cassandra\n    Connected to Test Cluster at 192.168.159.129:9042.\n\
  \    [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\n    Use\
  \ HELP for help.\n    ```\n\n2.  执行 `CREATE ROLE <rolename> WITH PASSWORD <password>`\
  \ 命令，如下所示：\n    ```\n    cassandra@cqlsh> create user 'test' with password 'test123';\n\
  \    ```\n    `list roles` 命令显示数据库中的所有角色。它还显示哪些角色拥有超级用户权限。例如：\n    ```\n    cassandra@cqlsh>\
  \ list roles;\n    name      | super\n    -----------+-------\n    cassandra | \
  \ True\n    test | False\n    (2 rows)\n    cassandra@cqlsh>\n    ```\n    在此情况下，默认角色\
  \ `cassandra` 的超级用户列值为 `True`，而新角色 `test` 的超级用户列设置为 `False`。因此，一切正常。\n\n默认情况下，`CREATE\
  \ ROLE` 语句中的 `LOGIN` 属性值为 `False`。当你创建登录角色时，必须将此属性设置为 `True`。\n\n你可以通过查询 `system_auth.roles`\
  \ 表来查看数据库中的角色，如下所示：\n\n\n# Cassandra 角色与权限管理\n\n```\ncassandra@cqlsh> select * from\
  \ system_auth.roles;\nrole          | can_login | is_superuser | member_of     \
  \    | salted_hash\n---------------+-----------+--------------+-------------------+\n\
  cassadnra1 |      True |         True |              null | $2a$10$.b52eNZqZdouserevzYgpuecaxpdmc/QRdIoUIeG73a6UDEsBIdae\n\
  manager |      True |        False | {'cycling_admin'} | $2a$10$vkujDzBblNqLUSGLdhW26OIW/ias9Vh6JA3sU4pq9uXES30cK735.\n\
  test |      True |        False |              null | $2a$10$ukMpmnzdHn8xy/7krucrdeYtblF8XHmVTvv1qKldVrGLxvLTWBxaC\n\
  test1 |      True |        False |              null | $2a$10$3CQTIi09zOOT5v2SaCxH9ekE8ZTaAGZSG6owkziZIT3ylzMDMCrhW\n\
  cassandra |      True |         True |              null | $2a$10$nRxFfMOAqxVQYkFQmEMIZ.B1.9.opcND/8.LtwyqZLgJY91eiS3Zm\n\
  cycling_admin |     False |        False |              null |   null\n(6 rows)\n\
  cassandra@cqlsh>\n```\n\n`system_auth.roles` 表存储与角色相关的信息，例如角色名称、该角色是否是超级用户，以及是否可以使用该角色登录数据库。除了此表，Cassandra\
  \ 还将角色相关信息存储在以下表中：\n\n*   `system_auth.role_members`：存储角色和角色成员。\n*   `system_auth.role_permissions`：存储角色、资源以及角色访问该资源的权限。\n\
  *   `system_auth.resource_role_permissons_index`：存储角色以及授予这些角色的权限。\n\n## 修改密码\n\n\
  您可以使用 `ALTER ROLE` 命令修改角色的密码：\n\n```\ncassandra@cqlsh> alter role 'newsuper' with\
  \ password 'newsuper2';\n```\n\n## 删除角色\n\n您可以使用 `DROP ROLE` 命令删除角色：\n\n```\ncassandra@cqlsh>\
  \ drop role test;\n```\n\n### 处理超级用户账户\n\n除了默认的超级用户账户 `cassandra`，您还可以在创建用户时通过指定\
  \ `superuser` 选项来创建额外的超级用户账户，如下所示：\n\n```\ncassandra@cqlsh> create role 'newsuper'\
  \ with password 'newsuper1'\n... superuser;\ncassandra@cqlsh> list roles;\nname\
  \      | super\n-----------+-------\ncassandra |  True\nnewsuper |  True\ntest |\
  \ False\n(3 rows)\ncassandra@cqlsh>\n```\n\n处理默认超级用户账户 `cassandra` 的最佳实践是创建一个自定义管理员账户，之后不再使用默认的\
  \ `cassandra` 账户。创建一个具有 `superuser` 选项的用户。由于默认情况下超级用户只能管理角色，因此请使用以下命令授予该用户对所有密钥空间的访问权限：\n\
  \n```\ncqlsh> grant all permissions on all keyspaces to newsuper;\n```\n\n### 配置授权：授予资源权限\n\
  \n配置认证将限制对集群的访问。配置授权是您控制对各种数据库对象（如密钥空间和表）访问的方式。您可以执行 `GRANT` 命令，将角色在数据库资源（如密钥空间、表或函数）上的权限授予该角色。\n\
  \n让我们学习如何向登录角色授予权限，首先授予对象（如密钥空间和表）上的特定权限。之后，我将展示如何向角色授予权限，这使您能够实现基于角色的访问控制（RBAC）系统。\n\
  \n> 注意\n>\n> 默认情况下，Cassandra 不会强制执行任何限制用户执行数据库操作的能力。\n\n在以下示例中，您首先尝试将密钥空间上的 `SELECT`\
  \ 权限授予一个角色：\n\n```\ncassandra@cqlsh> grant select permission on keyspace \"cycling\"\
  \ to 'test';\nServerError: java.lang.UnsupportedOperationException: GRANT operation\
  \ is not supported by AllowAllAuthorizer\ncassandra@cqlsh>\n```\n\n这个 `GRANT` 命令失败是因为默认的授权器（恰好是\
  \ `AllowAllAuthorizer`）不支持 `GRANT` 操作。在 `cassandra.yaml` 文件中，您会看到以下内容：\n\n```\n\
  authorizer: AllowAllAuthorizer\n```\n\n`AllowAllAuthorizer` 是 Cassandra 的默认授权后端，它控制访问并提供权限。使用此默认授权后端将禁用授权，这意味着\
  \ Cassandra 允许任何用户在数据库中执行任何操作。\n\n`CassandraAuthorizer` 是替代的授权后端。它将所有权限存储在 `system_auth.permissions`\
  \ 表中。要配置授权，请编辑 `cassandra.yaml` 文件并指定 `CassandraAuthorizer` 作为授权器，如下所示：\n\n```\n\
  authorizer: org.apache.cassandra.auth.CassandraAuthorizer\n```\n\n如上所示设置授权器将在数据库中强制执行授权。数据库现在将根据登录数据库的角色来限制访问。一旦您正确配置了\
  \ `authorizer` 属性，就可以成功发出 `GRANT` 命令。\n\n```\ncassandra@cqlsh> grant select permission\
  \ on keyspace \"cycling\" to 'test';\n```\n\n由于丢失对 `system_auth.permissions` 表的访问权限将拒绝所有对集群的访问，请确保您有系统密钥空间的多个副本。如果您有多个数据中心，请将复制类设置为\
  \ `NetworkTopologyStrategy`。\n\n您可以向角色授予以下广泛的权限类型：\n\n*   `SELECT`：允许角色使用 CQL 命令\
  \ `SELECT` 读取数据。\n*   `MODIFY`：允许角色使用 CQL 命令 `INSERT`、`UPDATE`、`DELETE` 和 `TRUNCATE`\
  \ 添加、修改和删除数据。\n*   `CREATE`：授予使用命令 `CREATE KEYSPACE` 和 `CREATE TABLE` 创建密钥空间和表的能力。\n\
  *   `ALTER`：授予使用以下命令修改密钥空间和表的能力：\n    *   `ALTER KEYSPACE`\n    *   `ALTER TABLE`\n\
  *   `DESCRIBE`：提供有关对象的信息。\n*   `DROP`：使您能够从数据库中删除对象。\n*   `EXECUTE`：使用任何函数，以及在 `CREATE\
  \ AGGREGATE` 语句中的任何函数中执行 `SELECT`、`INSERT` 和 `UPDATE` 权限。\n*   `AUTHORIZE`：启用对密钥空间、表、函数和角色的权限授予和撤销。\n\
  *   `ALL PERMISSIONS`：启用对表的所有类型的查询。\n\n以下是您可以发出 `GRANT` 命令将各种权限直接分配给角色的示例。\n\n您可以授予角色\
  \ `sam` 在所有密钥空间的所有表上执行 `SELECT` 操作的权限，如下所示：\n\n```\ncqlsh> grant select on all keyspaces\
  \ to 'sam';\n```\n\n您可以授予角色 `sam` 在 `CYCLING` 密钥空间的所有表上执行修改（`INSERT`、`UPDATE`、`TRUNCATE`\
  \ 和 `DELETE`）的权限，如下所示：\n\n```\ncqlsh> grant modify on keyspace cycling to 'sam';\n\
  ```\n\n您可以授予角色 `sam` `ALTER KEYSPACE` 权限，如下所示：\n\n```\ncqlsh> grant alter keyspace\
  \ on cycling to 'sam';\n```\n\n`ALTER KEYSPACE` 权限使角色 `sam` 能够在 `CYCLING` 密钥空间及其表和索引上执行以下操作：\n\
  \n*   `ALTER KEYSPACE`\n*   `ALTER TABLE`\n*   `CREATE INDEX`\n*   `DROP INDEX`\n\
  \n`ALL PERMISSIONS` 权限使用户能够在表上运行所有类型的查询：\n\n```\ncqlsh> grant all permissions on\
  \ cycling.cyclists to sam;\n```\n\n### Cassandra 的访问控制矩阵\n\nCassandra 为访问控制采用分层继承系统，您授予层次结构中较高资源的权限会自动级联到层次结构中较低的资源。\n\
  \n例如，\n\n*   如果您在 `ALL KEYSPACES` 上授予权限，它会级联到这些密钥空间中的所有表。\n*   如果您在 `ALL FUNCTIONS`\
  \ 上授予权限，它会级联到所有用户定义函数和聚合。\n\n\n### 配置基于角色的访问控制\n\n数据库角色是你授予访问其他数据库资源权限的载体。基于角色的访问控制是指将角色分配给用户，而不是直接分配访问各种数据库资源的权限。\n\
  \n通常，在其他数据库中，要使用角色来管理对数据库对象的访问，你必须按以下顺序操作：\n\n*   创建用户。\n*   创建角色。\n*   向新角色授予对各种数据库资源的权限。\n\
  *   将该角色授予新用户。\n\n你在 Cassandra 数据库中实现 RBAC 也遵循相同的策略，不同之处在于，你不是将角色授予用户，而是将它们授予（登录）角色（正如我之前解释的，这些角色在\
  \ Cassandra 中代表用户）。\n\n在接下来的部分中，我将展示如何配置 RBAC。\n\n### 为登录账户创建角色\n\n当你想授予用户或应用程序访问权限时，你需要创建一个角色。以下示例展示了如何创建名为\
  \ `manager` 的登录角色：\n\n```\ncqlsh> create role manager\n... with password = 'Password123'\n\
  ... and LOGIN = true;\n```\n\n默认情况下，`LOGIN` 属性的值为 `false`，意味着该角色无法登录数据库。在此场景中，你希望\
  \ `manager` 角色能够登录数据库并作为登录角色使用。因此，你将 `LOGIN` 属性设置为 `true`。\n\n`list roles` 命令显示新角色已成功创建。\n\
  \n```\ncqlsh> list roles;\nrole      | super | login | options\n-----------+-------+-------+---------\n\
  cassandra |  True |  True |        {}\n    manager | False |  True |        {}\n\
  \      test | False |  True |        {}\n     test1 | False |  True |        {}\n\
  (4 rows)\ncqlsh>\n```\n\n你可以测试新账户的登录能力。\n\n```\n$ cqlsh 192.168.159.129 -u cassandra\
  \ -p cassandra\nConnected to Test Cluster at 192.168.159.129:9042.\n[cqlsh 5.0.1\
  \ | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\n\
  cassandra@cqlsh> login manager\nPassword:\nmanager@cqlsh>\n```\n\n`cqlsh` 提示符（`manager@cqlsh`）显示了角色的名称，本例中为\
  \ `manager`。\n\n你可以通过运行 `ALTER ROLE` 命令来更改已启用登录的角色的密码，如下所示：\n\n```\ncqlsh>ALTER\
  \ ROLE manager WITH PASSWORD = 'manager';\ncqlsh>\n```\n\n### 向角色授予权限\n\n你也可以创建一个角色，并向该角色授予对一个或多个数据库对象的各种权限。然后，你可以将此角色分配给一个登录角色。\n\
  \n### Cassandra 中的对象权限\n\n你可以向经过身份验证的角色授予以下数据库对象的对象权限：\n\n*   键空间\n*   表\n*   函数\n\
  *   聚合\n*   角色\n*   MBeans\n\n以下是你可以在数据库对象上配置的权限类型：\n\n*   `CREATE`\n*   `ALTER`\n\
  *   `DROP`\n*   `SELECT`\n*   `MODIFY`\n*   `DESCRIBE`\n\n### 向角色授予对象权限\n\n以下示例展示了如何创建一个不用于登录的角色；而是使用该角色来授予对数据库对象的权限。你首先创建角色\
  \ `cycling_admin`，然后向该角色授予对键空间 `cycling` 的权限。接着，你将角色 `cycling_admin` 授予登录角色 `manager`。\n\
  \n1.  使用 `CREATE ROLE` 命令创建角色。\n\n    ```\n    cqlsh> create role cycling_admin;\n\
  \    ```\n\n    由于此角色用于分配对象权限而非登录账户，你没有设置 `SUPERUSER` 或 `LOGIN` 属性，这两者默认均为 `False`。\n\
  \n    ```\n    cassandra@cqlsh> list roles;\n    role         | super | login |\
  \ options\n    --------------+-------+-------+---------\n    cassandra |  True |\
  \  True |        {}\n    cycling_admin | False | False |        {}\n    manager\
  \ | False |  True |        {}\n      test | False |  True |        {}\n     test1\
  \ | False |  True |        {}\n    (5 rows)\n    cassandra@cqlsh>\n    ```\n\n2.\
  \  创建新角色后，向该角色授予对表空间（`cycling`）的权限。\n\n    ```\n    cqlsh> grant all permissions\
  \ on keyspace cycling to cycling_admin;\n    ```\n\n3.  将新角色 `cycling_admin` 授予你在上一节中创建的登录角色\
  \ `manager`。\n\n    ```\n    cqlsh> grant cycling_admin to manager;\n    ```\n\n\
  ## 列出权限\n\n你可以使用 `list all permissions` 命令列出授予角色的所有权限。\n\n```\ncassandra@cqlsh>\
  \ list all permissions;\nrole          | username      | resource             |\
  \ permission\n---------------+---------------+----------------------+------------\n\
  \    cassandra |     cassandra |                |      ALTER\n    cassandra |  \
  \   cassandra |                |       DROP\n    cassandra |     cassandra |   \
  \             |  AUTHORIZE\n    cassandra |     cassandra |                    |\
  \      ALTER\n    cassandra |     cassandra |                    |       DROP\n\
  \    cassandra |     cassandra |                    |  AUTHORIZE\n    cassandra\
  \ |     cassandra |                       |      ALTER\n    cassandra |     cassandra\
  \ |                       |       DROP\n    cassandra |     cassandra |        \
  \               |  AUTHORIZE\n    cassandra |     cassandra |                  \
  \    |      ALTER\n    cassandra |     cassandra |                      |      \
  \ DROP\n    cassandra |     cassandra |                      |  AUTHORIZE\n cycling_admin\
  \ | cycling_admin |                  |     CREATE\n cycling_admin | cycling_admin\
  \ |                  |      ALTER\n cycling_admin | cycling_admin |            \
  \      |       DROP\n cycling_admin | cycling_admin |                  |     SELECT\n\
  \ cycling_admin | cycling_admin |                  |     MODIFY\n cycling_admin\
  \ | cycling_admin |                  |  AUTHORIZE\n         test |          test\
  \ |               |     SELECT\n         test |          test |            |   \
  \   ALTER\n         test |          test |            |     SELECT\n         test\
  \ |          test |            |     MODIFY\n(22 rows)\ncassandra@cqlsh>\n```\n\n\
  查看查询输出中的 `Resource` 列，了解 Cassandra 如何为数据库中的三个角色分配不同的权限：默认的超级用户角色 `cassandra`、登录角色\
  \ `test` 和你创建的新角色 `cycling_admin`。\n\n### 查看授予角色的权限\n\n要查看授予特定角色的权限，请运行 `list all\
  \ permissions of <role_name>` 命令：\n\n```\ncassandra@cqlsh> list all permissions\
  \ of manager;\nrole          | username      | resource           | permission\n\
  ---------------+---------------+--------------------+------------\n cycling_admin\
  \ | cycling_admin |                |     CREATE\n cycling_admin | cycling_admin\
  \ |                |      ALTER\n cycling_admin | cycling_admin |              \
  \  |       DROP\n cycling_admin | cycling_admin |                |     SELECT\n\
  \ cycling_admin | cycling_admin |                |     MODIFY\n cycling_admin |\
  \ cycling_admin |                |  AUTHORIZE\n(6 rows)\ncassandra@cqlsh>\n```\n\
  \n### 配置访问的防火墙端口\n\nCassandra 节点需要开放多个防火墙端口才能进行通信。其中一些需要开放的端口是公共的，另一些则是节点间或 Cassandra\
  \ 特定的端口。\n\n确保以下端口开放：\n\n| 端口类型             | 端口号 | 端口功能                       \
  \                                      |\n| -------------------- | ------ | --------------------------------------------------------------------\
  \ |\n| 公共                 |        | SSH 端口                                    \
  \                         |\n| Cassandra（节点间）  |        | 用于节点间集群通信            \
  \                                       |\n| Cassandra（节点间）  |        | 用于 SSL 节点间通信\
  \                                                  |\n| Cassandra（节点间）  |      \
  \  | JMX 监控端口                                                         |\n| Cassandra（客户端）\
  \  |        | 客户端端口                                                           |\n\
  | Cassandra（客户端）  |        | 原生传输协议的默认端口（当你需要加密和非加密通信时）                 |\n\n###\
  \ 使用 SSL 加密 Cassandra\n\n\n\n# SSL 加密配置指南\n\nSSL 是一种安全协议，可在 Cassandra 客户端与节点之间以及节点之间的通信过程中对数据进行加密。每个参与通信的实体都必须拥有一个由该实体保管的私钥，以及一个与其他实体交换的公钥。服务器会向希望建立安全连接到\
  \ Cassandra 集群的客户端发送一个包含服务器公钥的证书。\n\n> **注意**\n>\n> 除了连接数极高的情况，数据加密对性能的影响微乎其微。\n\
  \nSSL 加密可以通过加密节点间流动的数据来保护节点内部通信。您也可以设置客户端-节点 SSL 加密，以保护`cqlsh`或`nodetool`等客户端程序与集群节点之间传递的数据。\n\
  \n客户端通过让服务器使用其私钥验证安全证书来验证该证书。密钥库存储私钥和证书，而信任库存储公钥。系统可以使用证书颁发机构（CA），在这种情况下，信任库也会存储\
  \ CA 签名的证书。密钥库的密码称为`keypass`，信任库的密码称为`storepass`。\n\n### 安装 Java 加密扩展文件\n\n默认的`cassandra.yaml`文件引用了多个加密套件，其中一些仅在您使用\
  \ Oracle Java 并通过 SSL 连接时，安装了 Java 加密扩展（JCE）无限制权限策略文件后才可用。安装 JCE 文件可确保在使用 Oracle\
  \ Java 时支持所有加密算法。您必须在集群的所有节点上安装这些文件。\n\n> **注意**\n>\n> 当通过 SSL 使用 Oracle Java 时，安装\
  \ JCE 文件是一项最佳实践。\n\n请按照以下步骤安装 JCE 文件。此处的步骤展示了如何在 Red Hat Linux 系统上安装 JCE。\n\n1.\
  \  安装 EPEL 目录。\n    ```\n    $ sudo yum install epel-release\n    ```\n2.  从 Oracle\
  \ Java SE 下载页面（[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)）下载\
  \ JCE 文件。\n3.  解压下载的 JCE 文件，并将`local_policy.jar`和`US_export_policy.jar`文件复制到`$JAVA_HOME/jre/lib/security`目录。\n\
  \n在基于 Debian 的系统上安装 JCE 更为简单。\n```\n$ sudo apt-get install oracle-java8-unlimited-jce-policy\n\
  Reading package lists... Done\nBuilding dependency tree\n...\nUnlimited JCE Policy\
  \ for Oracle Java 8 installed\n$\n```\n\n在学习如何通过 SSL 处理节点间和客户端-节点加密之前，您必须先通过准备 SSL\
  \ 服务器证书来设置 SSL 加密。\n\n### 准备服务器证书\n\n对于节点间和客户端-节点加密，您都必须先生成 SSL 证书并验证这些证书。以下是开始使用\
  \ SSL 证书需要做的事项。\n\n*   使用`openssl`和`keytool`实用工具生成 SSL 证书。\n*   生成一个自签名的 CA 来验证\
  \ SSL 证书，如下文所示。您也可以让证书由受信任的公共证书颁发机构（如 Verisign）签名。\n\n> **注意**\n>\n> Nate McCall\
  \ 展示了如何使用基于 ccm 的 Cassandra 集群设置 SSL 节点间加密。文章位于[`http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html`](http://thelastpickle.com/blog/2015/09/30/hardening-cassandra-step-by-step-part-1-server-to-server.html)。\n\
  \n在本节中，我将展示如何为生产环境准备 SSL 证书。\n\n### 创建证书颁发机构\n\n使用 SSL 加密数据库的第一步是创建自己的 CA，用于签署所有特定于服务器的证书。这将有助于创建一个信任链，从而简化证书管理。请按照以下步骤创建\
  \ CA。\n\n1.  第一步是创建根 CA 证书和密钥。执行`openssl req`命令并向其传递证书配置文件。这要求您首先创建一个证书配置文件，您将其命名为`my_rootCa_cert.conf`文件。打开\
  \ vi 或 nano 编辑器，并在`my_rootCa_cert.conf`文件中输入以下信息：\n    ```\n    $ vi my_rootCa_cert.conf\n\
  \    # my_rootCa_cert.conf\n    [ req ]\n    distinguished_name    = req_distinguished_name\n\
  \    prompt                = no\n    output_password       = myPass\n    default_bits\
  \          = 2048\n    [ req_distinguished_name ]\n    C                     = US\n\
  \    O                     = MyCompany\n    OU                    = TestCluster\n\
  \    CN                    = rootCa\n    $\n    ```\n2.  创建证书配置文件（`my_rootCa_cert.conf`）后，运行`openssl\
  \ req`命令，如下所示，确保通过`config`属性传递配置文件名。\n    ```\n    $ sudo openssl req -config my_rootCa_cert.conf\
  \  -new -x509 -nodes -subj /CN=rootCa/OU=TestCluster/O=YourCompany/C=US/ -keyout\
  \ rootCa.key -out rootCa.crt -days 365\n    Generating a 2048 bit RSA private key\n\
  \    ...................................+++\n    ..............................................................+++\n\
  \    writing new private key to 'rootCa.key'\n    $\n    ```\n    此命令将创建`rootCa.key`和`rootCa.crt`文件，您将在后续步骤中使用它们。`rootCa.key`文件是您将写入密钥的文件，而`rootCa.cert`文件是您将写入证书的文件。\n\
  3.  使用`openssl x509`命令验证 rootCa 证书（`rootCa.crt`文件）。\n    ```\n    $ sudo openssl\
  \ x509 -in rootCa.crt -text -noout\n    Certificate:\n    Data:\n    Version: 1\
  \ (0x0)\n    Serial Number: 12633404970202873071 (0xaf52dee2c098bcef)\n    Signature\
  \ Algorithm: sha256WithRSAEncryption\n    Issuer: C=US, O=YourCompany, OU=TestCluster,\
  \ CN=rootCa\n    Validity\n    Not Before: Aug 25 19:00:47 2017 GMT\n    Not After\
  \ : Aug 25 19:00:47 2018 GMT\n    ...\n    $\n    ```\n\n### 为所有节点创建证书\n\n下一步是使用`keytool`实用工具生成公钥和私钥对。您必须在所有节点上执行此操作。您可以先在一个节点上生成证书，然后将它们复制到所有节点。\n\
  ```\n$ sudo keytool -genkeypair\n-keyalg RSA -alias 192.168.159.129\n-keystore 192.168.159.129.jks\n\
  -storepass myKeyPass\n-keypass myKeyPass\n-validity 365\n-keysize 2048\n-dname \"\
  CN=192.168.1159.129, OU=TestCluster, O=YourCompany, C=US\"\n$\n```\n在此示例中，测试集群中有两个节点，因此您需要在两个节点上都运行此命令。此处显示的`keytool`命令适用于\
  \ IP 地址为`192.168.159.129`的节点。对于集群中的第二个节点（IP 地址为`192.168.159.130`），您运行相同的命令，但将 IP\
  \ 地址`192.168.159.129`替换为`192.168.159.130`。\n\n在此命令中，\n*   `-genkeypair`生成一个公钥/私钥对。\n\
  *   `-keystore`指定密钥库文件名（您使用 IP 地址以便将文件映射到 Cassandra 节点）。\n*   `-storepass`指定密钥库密码。\n\
  *   `-keypass`指定私钥密码（必须与`-storepass`属性的值相同）。\n*   `-dname`指定与别名值关联的可分辨名称（DN）。CN\
  \ 值设置为节点的 IP 地址或 FQDN。\n\n检查您生成的证书，以确保密钥库可访问且包含正确的密钥对。\n```\n$sudo keytool -list\
  \ -keystore 192.168.159.129.jks -storepass myKeyPass\nKeystore type: JKS\nKeystore\
  \ provider: SUN\nYour keystore contains 1 entry\n192.168.159.129, Aug 25, 2017,\
  \ PrivateKeyEntry,\nCertificate fingerprint (SHA1): C2:C1:6C:F5:DF:F7:EC:D6:09:66:BB:67:17:38:58:87:38:E1:AE:DD\n\
  $\n```\n\n## 导出证书签名请求\n\n\n\n# 生成节点证书和密钥\n\n生成节点证书和密钥后，必须为每个节点导出一个证书签名请求（CSR）。该\
  \ CSR 使用`rootCa`证书进行签名，以验证其是否受信任。\n\n```bash\n$ sudo  keytool -certreq \\\n-keystore\
  \ 192.168.159.129.jks \\\n-alias 192.168.159.129 \\\n-file 192.168.159.129.csr \\\
  \n-keypass myKeyPass -storepass myKeyPass \\\n-dname \"CN=192.168.1159.129, OU=TestCluster,\
  \ O=YourCompany, C=US\"\n$\n```\n\n`keytool -certreq`命令会导出一个用于 CA 签名的证书。\n\n必须为集群中的每个节点重复此命令，将此处显示的\
  \ IP 地址（`192.168.159.129`）替换为其他节点的 IP 地址。\n\n## 使用 CA 的公钥签署证书\n\n接下来，为 Cassandra\
  \ 集群中的每个节点，使用`rootCa`签署节点证书，通过 OpenSSL 完成。\n\n```bash\n$ sudo openssl x509 \\\n\
  -req \\\n-CA rootCa.crt \\\n-CAkey rootCa.key \\\n-in 192.168.159.129.csr \\\n-out\
  \ 192.168.159.129.crt_signed \\\n-days 365 \\\n-CAcreateserial -passin pass:myPass\n\
  Signature ok\nsubject=/C=US/O=YourCompany/OU=TestCluster/CN=192.168.1159.129\nGetting\
  \ CA Private Key\n$\n```\n\n同样，必须为您的每个集群节点运行此处显示的`openssl`命令。\n\n在此命令中：\n\n*   `-CA`标识`rootCa`证书。\n\
  *   `-Cakey`标识`rootCa`密钥。\n*   `-in`指定要读取证书的文件名。\n*   `-out`指定签名证书的输出文件名。\n\n使用`rootCa`证书和已签名的证书来验证签名证书。\n\
  \n```bash\n$ openssl verify -CAfile rootCa.crt 192.168.159.129.crt_signed\n192.168.159.129.crt_signed:\
  \ OK\n$\n```\n\n## 将 CA 添加到密钥库\n\n将`rootCa`证书导入每个节点的密钥库。\n\n```bash\n$ sudo keytool\
  \ -importcert \\\n-keystore 192.168.159.129.jks \\\n-alias rootCa \\\n-file rootCa.crt\
  \ \\\n-noprompt \\\n-keypass myKeyPass \\\n-storepass myKeyPass\nCertificate was\
  \ added to keystore\n$\n```\n\n此时密钥库文件将包含`rootCa`证书和节点证书的条目。\n\n## 将签名的证书导入密钥库\n\
  \n节点上的每个密钥库现在都包含了 CA。下一步是执行与上一步相同的操作，但这次是为每个节点将节点的签名证书导入节点密钥库。\n\n```bash\n$ sudo\
  \ keytool -importcert \\\n-keystore 192.168.159.129.jks \\\n-alias 192.168.159.129\
  \ \\\n-file 192.168.159.129.crt_signed \\\n-noprompt \\\n-keypass myKeyPass \\\n\
  -storepass myKeyPass\nCertificate reply was installed in keystore\n$\n```\n\n之前创建的节点证书将被签名的节点证书替换。\n\
  \n## 构建信任库\n\n接下来必须创建一个服务器信任库，通过验证来自其他节点的连接请求，在集群节点之间建立信任链。运行`keytool -importcert`命令来构建密钥库。\n\
  \n```bash\n$ keytool -importcert \\\n-keystore generic-server-truststore.jks \\\n\
  -alias rootCa \\\n-file rootCa.crt \\\n-noprompt \\\n-keypass myPass \\\n-storepass\
  \ truststorePass\nCertificate was added to keystore\n$\n```\n\n创建信任库后，就可以在集群中共享它。该信任库表示，它将信任所有客户端证书由该\
  \ CA 签名的节点的连接。\n\n您可以这样验证信任库文件：\n\n```bash\n$ sudo keytool -list -keystore generic-server-truststore.jks\
  \ -storepass truststorePass\nKeystore type: JKS\nKeystore provider: SUN\n\nYour\
  \ keystore contains 1 entry\n\nrootca, Aug 28, 2017, trustedCertEntry,\nCertificate\
  \ fingerprint (SHA1): BB:BF:D7:8F:15:4E:41:91:37:70:EB:4C:67:AB:2C:25:37:A4:18:B0\n\
  $\n```\n\n## 使用密钥库配置集群\n\n之前，我展示了如何创建特定于节点的密钥库和一个通用信任库。现在必须将它们移动到 Cassandra 可以找到的位置。默认情况下，Cassandra\
  \ 会在`$CASSANDRA_HOME/conf`目录中查找密钥库和信任库。\n\n首先，为集群中的两个节点分别复制特定于节点的密钥库。\n\n```bash\n\
  cp 192.168.192.159.129.jks  $CASSANDRA_HOME/conf/server-keystore.jks\ncp 192.168.192.159.130.jks\
  \  $CASSANDRA_HOME/conf/server-keystore.jks\n```\n\n接下来，将通用信任库复制到两个节点。\n\n```bash\n\
  cp generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks\ncp\
  \ generic-server-truststore.jks  $CASSANDRA_HOME/conf/server-truststore.jks\n```\n\
  \n至此，SSL 证书的配置完成。现在必须启用加密。\n\n### 启用节点间加密\n\n加密节点间通信的最后一步是通过修改`cassandra.yaml`文件来启用加密。在`cassandra.yaml`文件中，按如下方式修改`server_encryption_options`部分：\n\
  \n```yaml\nserver_encryption_options:\ninternode_encryption: all               \
  \ /default value: none\nkeystore: /cassandra/conf/server-keystore.jks\nkeystore_password:\
  \ cassandra\ntruststore: /cassandra/conf/server-truststore.jks\ntruststore_password:\
  \ cassandra\nprotocol: TLS\nalgorithm: SunX509\nstore_type: JKS\n\n"
- '# cipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]

  require_client_auth: true

  require_endpoint_verification: false

  ```


  之前，我介绍了如何在 JDK 中安装强加密策略文件（JCE 策略文件）。这支持使用强密码，例如 256 位 AES，正如`cassandra.yaml`文件中的`cipher_suites`属性所示。


  现在所有加密设置都已完成。重启集群。


  ```bash

  $ kill -9 cassandra-pid

  $ $CASSANDRA_HOME/bin/cassandra

  INFO  [main] 2017-08-28 12:33:50,572 MessagingService.java:687 - Starting Encrypted
  Messaging Service on SSL port 7001

  ```


  消息“`Starting Encrypted Messaging Service on SSL port 7001`”表明节点间通信的 SSL 加密已生效。


  ### 启用客户端加密


  在上一节中，我展示了如何配置节点到节点加密。然而，诸如`cqlsh`之类的客户端与集群之间的通信仍然是未加密的。在本节中，我将展示如何配置客户端到节点的加密。您使用为节点间通信创建的相同
  SSL 证书。只需要启用客户端加密并将 CA 证书添加到`cqlshrc`文件中。


  要启用客户端加密，请按如下方式修改`cassandra.yaml`文件：


  ```yaml

  '
- '# enable or disable client/server encryption.

  client_encryption_options:

  enabled: true


  '
- '# If enabled and optional is set to true encrypted and unencrypted connections
  are handled.

  optional: false

  keystore: /cassandra/apache-cassandra-3.10/conf/server-keystore.jks

  keystore_password: myKeyPass

  require_client_auth: true


  '
- "# Set trustore and truststore_password if require_client_auth is true\ntruststore:\
  \ /cassandra/apache-cassandra-3.10/conf/server-truststore.jks\ntruststore_password:\
  \ truststorePass\n```\n\n\n\n# 更高级的默认配置如下\n\n```yaml\nprotocol: TLS\nalgorithm:\
  \ SunX509\nstore_type: JKS\ncipher_suites: [TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA]\n\
  ```\n\n此时，您必须重启集群。\n\n在节点启动过程中生成的日志中，您将看到以下消息，表明客户端与数据库服务器之间现已启用 SSL 加密：\n\n```\n\
  INFO  [main] 2017-09-05 14:17:10,681 Server.java:145 - Enabling encrypted CQL connections\
  \ between client and server\n```\n\n集群恢复后，由于现已启用 SSL 验证，您必须指定 `--ssl` 选项才能连接到 Cassandra：\n\
  \n```\n$ cqlsh --ssl\nValidation is enabled; SSL transport factory requires a valid\
  \ certfile to be specified. Please provide path to the certfile in [ssl] section\
  \ as 'certfile' option in /home/cassandra/.cassandra/cqlshrc (or use [certfiles]\
  \ section) or set SSL_CERTFILE environment variable.\n$\n```\n\n您看到此错误的原因是因为您已为客户端通信启用了\
  \ SSL，因此 `cqlsh`（作为客户端）现在不信任 Cassandra 节点。为了让它信任该节点，它需要看到您之前生成的 CA 证书（`rootCa.crt`）。这确保了\
  \ Cassandra 使用的是由 CA 签名的证书。您可以通过在 `cqlshrc` 文件（`/home/cassandra/.cassandra/cqlshrc`）的\
  \ `[ssl]` 部分下列出 CA 证书来指向它，如下所示：\n\n```ini\n[connection]\nhostname=192.168.159.130\n\
  port=9042\nfactory = cqlshlib.ssl.ssl_transport_factory\n[ssl]\ncertfile = /cassandra/apache-cassandra-3.10/conf/rootCa.crt\n\
  validate = true\n```\n\n现在，您将能够通过 `cqlsh` 使用 SSL 连接到 Cassandra。\n\n```\n$ cqlsh\
  \ –ssl\n```\n\n您现在通过 `cqlsh` 客户端与 Cassandra 节点建立了安全连接。\n\n### JMX 认证与授权\n\nJMX 认证和授权允许您控制用户对基于\
  \ JMX 的工具（如 `nodetool` 和 `JConsole`）的访问。您可以配置 JMX 连接使用 Cassandra 的内部认证和授权机制，就像 CQL\
  \ 客户端一样。\n\n如果您已通过本章前面描述的认证和授权机制在数据库中配置了用户名和密码，那么您也必须使用已配置的认证和授权信息来执行 JMX 工具。\n\n\
  在您能够使用带有认证功能的 `nodetool` 或 `JConsole` 之前，必须先启用 JMX 认证和授权。\n\n### 启用 JMX 认证与授权\n\n\
  默认情况下，JMX 安全性未配置，这意味着您只能从 `localhost` 访问 JMX 工具（如 `nodetool` 和 `JConsole`）。您可以使用本地密码文件和访问文件来配置\
  \ JMX 认证和授权，以设置用户的凭据和访问权限。然而，从 Cassandra 3.6 开始，您也可以通过“搭乘” Cassandra 内部认证和授权的顺风车来配置\
  \ JMX 安全性。\n\n在本节中，我将展示如何使用本地文件配置 JMX 认证和授权。\n\n以下是使用本地文件配置 JMX 安全性的步骤。\n\n1.  编辑\
  \ `cassandra-env.sh` 文件（位于 `$CASSANDRA_HOME/conf` 目录中），并在此处显示的代码块中更改两个设置：\n\n```bash\n\
  \    if [ \"$LOCAL_JMX\" = \"yes\" ]; then\n    JVM_OPTS=\"$JVM_OPTS -Dcassandra.jmx.local.port=$JMX_PORT\"\
  \n    JVM_OPTS=\"$JVM_OPTS -Dcom.sun.management.jmxremote.authenticate=false\"\n\
  \    else\n```\n\n在第一行，将 `\"yes\"` 改为 `\"no\"`。在第三行，将 `\"false\"` 改为 `\"true\"`。\n\
  \n2.  创建密码文件 `/etc/cassandra/jmxremote.password`（默认位置），并在文件中添加以下一行：\n\n```\n   \
  \ cassandra  cassandra\n```\n\n我这里使用的是默认的超级用户账户，但这在生产系统中并不安全，您必须用一个或多个您希望其能够访问 JMX\
  \ 兼容实用程序（如 `nodetool`）的用户凭据来替换这组凭据。\n\n3.  创建访问文件（默认）`/etc/cassandra/jmxremote.access`，并在访问文件中添加以下信息：\n\
  \n```\n    cassandra readwrite\n    create javax.management.monitor.*,javax.management.timer.*\n\
  \    \\unregister\n```\n\n您授予角色 `cassandra` 的 `readwrite` 权限使此 JMX 客户端能够处理 MBeans。更具体地说，它允许此客户端设置属性、调用操作、接收通知等。\n\
  \n4.  重启数据库。\n\n5.  尝试运行 `nodetool status` 命令。由于您配置了 JMX 授权和认证，您应该无法像往常一样运行此命令。如果您已正确配置所有内容，您应该会看到以下错误：\n\
  \n```\n    $ nodetool status\n    nodetool: Failed to connect to '127.0.0.1:7199'\
  \ - SecurityException: 'Authentication failed! Credentials required'.\n```\n\n6.\
  \  通过提供角色 `cassandra` 的凭据来运行 `nodetool status` 命令。\n\n```\n    $ nodetool -u cassandra\
  \ -pw cassandra status\n    Datacenter: datacenter1\n    =======================\n\
  \    Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n    --  Address\
  \          Load       Tokens       Owns (effective)  Host ID                   \
  \            Rack\n    UN  192.168.159.129  24.21 MiB  256          49.9% 0dbb9e0e-867e-4179-b6b6-631d38dd68f9\
  \  rack1\n    UN  192.168.159.130  24.25 MiB  256          50.1% 001399d4-49fc-467c-b188-e93629a0f118\n\
  ```\n\n数据库现已配置好 JMX 认证和授权。与 `nodetool` 实用程序类似，当您使用 `JConsole` 远程连接到 Cassandra 集群时，现在也需要提供用户名和密码。\n\
  \n## 使用带有认证功能的 `cqlsh`\n\n您可以配置认证，使得登录 `cqlsh` 需要密码。通过创建或修改 `cqlshrc` 文件来实现。以下是配置此认证的步骤。\n\
  \n1.  编辑 `cqlshrc` 文件，或者如果您没有该文件，请在以下位置创建一个：\n\n```\n    /etc/cassandra/cqlshrc.sample\
  \                 /* 包管理器安装\n    install_location/conf/cqlshrc.sample          /*\
  \ tarball 安装\n```\n\n2.  在 `cqlshrc` 文件中输入以下行：\n\n```ini\n    [authentication]\n\
  \    username = sam\n    password = !!bang!!$\n```\n\n3.  通过设置以下权限来保护文件安全：\n\n```\n\
  \    $ sudo chmod 400 /home/.cassandra/cqlshrc\n```\n\n## 总结\n\n保护 Cassandra 的安全是一项多方面的工作。要全面保护您的数据，除了配置集群间和客户端-集群通信的认证、授权和\
  \ SSL 加密外，您可能还希望加密静态数据。\n\n市面上有几种不错的第三方加密解决方案。通过使用其中一种或多种方案，您可以完成安全防护的闭环，降低安全漏洞发生的可能性。本章中我没有讨论这些产品，但通过互联网快速搜索“静态数据加密”应该就能看到可用的选择。\n\
