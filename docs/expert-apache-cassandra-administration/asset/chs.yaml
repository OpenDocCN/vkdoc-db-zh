  `cyclist_name` 表之前拍摄了 `cycling` 键空间的快照。因此，你期望在相应的目录中找到 `cyclist_name` 表的快照，该目录通常是：


  ```

  data_directory/keyspace_name/table_name-UUID/snapshost/snapshot_name

  ```


