- "# 4. Cassandra 数据建模以及数据的读写\n\nCassandra 中的数据建模在许多方面都不同于传统关系数据库的数据建模。本章将介绍 Cassandra\
  \ 数据建模的关键方面，其中你预期在数据库中运行的查询与你如何在表内部构建数据结构密切相关。\n\n数据建模涉及识别你希望在 Cassandra 数据库中存储的数据类型（实体）以及这些数据实体之间的关系。\n\
  \n在 Cassandra 数据库中建模数据的关键在于关注以下两点：\n\n*   识别数据访问模式\n*   你将使用的查询\n\n这两个概念将决定你如何组织数据，以及如何设计和创建数据库表。\n\
  \n查询和模式这两者决定了数据的组织方式。查询是你从数据库中检索数据的方式，而模式是你在数据库表中安排数据的方式。Cassandra 的查询驱动方法意味着你计划使用的特定查询是数据组织的基础。通过按分区将数据分组存储在节点上，你可以提高读写效率。一个查询需要读取的分区越少，数据库对该查询的响应速度就越快。\n\
  \n本章详细解释了 Cassandra 如何读取和写入数据。可配置的一致性是 Cassandra 的一个关键特性，你将深入了解读写一致性，以及如何配置不同的一致性级别。Cassandra\
  \ 是一个具有**可调一致性**的分区行存储数据库。可调一致性意味着客户端应用程序决定其从数据库请求数据的一致性。\n\n最后，本章解释了**线性一致性**和**轻量级事务**的概念，以及如何通过**批处理操作**确保关键操作的原子性。\n\
  \n## Cassandra 与关系数据库：主要差异\n\n第 1 章概述了关系数据库与 Cassandra 的主要区别。在这里，让我们详细回顾一下 Cassandra\
  \ 和关系数据库在数据建模方法上的差异。\n\n### 数据驱动 vs. 查询驱动的数据建模\n\n关系数据库中的数据建模完全由数据驱动。你也可以说关系数据建模是表驱动的。规范化理论占据主导地位，该理论要求你不得复制数据。\n\
  \n一旦你根据表及其关系对数据进行了规范化，你就基于这些表和关系编写查询。通常，一个表可以为多个查询提供服务。\n\nCassandra 组织数据的方式与关系数据库截然不同。Cassandra\
  \ 的数据建模方法是由**查询**驱动，而非数据。这意味着你根据你期望数据要服务的查询来组织数据。你首先设计查询，然后创建表来满足这些查询。你认为数据重复是嵌套数据的正常副作用，完全可以接受。\n\
  \nCassandra 在写入时预计算查询，从而优化写入性能，这意味着优化读取是免费的副产品。关系数据库在读取数据时计算查询。它们使用诸如 `JOIN` 和 `ORDER\
  \ BY` 等昂贵的操作。在 Cassandra 数据库中不存在此类操作。\n\n### 表关联与引用完整性\n\n在关系数据库中，你通过组合来自多个关系的数据来回答一个查询。引用完整性很重要。在\
  \ Cassandra 中，你必须将回答查询所需的所有数据嵌套在同一张表内。引用完整性根本不是问题。\n\n### 排序差异\n\n默认情况下，关系数据库按数据写入磁盘的顺序返回行。你可以使用\
  \ `ORDER BY` 子句来更改默认的排序顺序。\n\n在 Cassandra 中，你在创建表时通过选择聚类列来显式指定排序顺序。\n\n### 数据重复\n\
  \n正如你将很快了解到的，关系数据库中为避免重复而进行反规范化的传统策略不适用于 Cassandra。在 Cassandra 数据库中，你通过在需要的地方重复数据来实现更高效的读取。Cassandra\
  \ 利用了存储成本相对于计算堆栈其他组件（如 CPU、内存和网络）更便宜这一事实。\n\n你可以在 Cassandra 中多次存储相同的数据。与关系数据库不同，数据重复被视为一件好事，而不是祸害。关系数据库试图将大量信息放入表中，因为这些表被用于多种类型的搜索。然而，在\
  \ Cassandra 中，拥有许多包含相似数据的表是件好事。\n\n请记住，Cassandra 针对写入进行了优化；它的写入速度非常快。因此，如果你需要将相同的数据写入磁盘六次，那就写吧；多次写入不会对你造成伤害。采用数据重复策略（涉及更多写入）以增强读取查询性能，在\
  \ Cassandra 中本质上是合理的策略。\n\n\n### 什么是数据建模？\n\n数据建模既是一门科学，也是一门艺术。数据建模是一个结构化的过程，包括以下内容：\n\
  \n*   收集和分析信息系统的数据需求\n*   识别系统中的实体及其间的关系\n*   识别数据访问模式\n*   以特定方式组织和构建数据\n*   设计和指定数据库模式\n\
  *   使用诸如索引数据等技术来优化模式\n\n当你进行数据建模工作时，通常遵循一个包含以下五个关键步骤或阶段的过程：\n\n*   分析你的需求。\n*  \
  \ 识别实体和关系——概念数据模型。\n*   识别常见查询——应用工作流。\n*   指定模式——逻辑数据模型（设计表）。\n*   优化模式——物理数据模型（使用\
  \ `CQL` 实现设计）。优化包括键、分区大小和排序。\n\n在以下部分中，我将解释 `Cassandra` 数据建模的五个主要组成部分。\n\n### 分析你的需求\n\
  \n`Cassandra` 数据建模的需求部分很简单。在大多数情况下，你希望使用 `Cassandra` 来解决以下问题：\n\n*   可扩展性：你的数据流入量大且不断增长。\n\
  *   可靠性：你需要一个始终可用、高度可靠的数据存储。\n*   易用性：你需要一个易于设置和管理的数据库。\n\n### 概念建模：识别实体及其间的关系\n\
  \n理想情况下，你必须设计查询，使它们访问单个表。你将与某个实体相关的所有属性都包含在单个表中。这与关系表设计不同，在关系表设计中，你将有关实体的数据存储在多个表中，并使用外键链接这些表。`Cassandra`\
  \ 的每个查询对应一个表的方法能带来更快的性能。\n\n如前所述，在关系数据库中，你从逻辑关系模型开始，然后基于这些关系构建物理表。`Cassandra` 遵循类似的策略，但非常强调考虑你计划对数据库表运行的查询。与关系模型不同，`Cassandra`\
  \ 数据库中没有连接和引用完整性约束。\n\n最后，它非常强调反规范化，这与你在关系数据库中所做的恰恰相反，关系数据库的重点完全在于规范化数据。概念建模使用著名的实体关系模型\
  \ (`ERM`) 来建立实体及其间的关系。\n\n你在 `Cassandra` 中通过设计和创建多个表来实现数据反规范化。在最近的版本中，`Cassandra`\
  \ 提供了物化视图，这也使你能够基于相同的底层 `SSTables` 创建多个视图。\n\n### 审查你想要使用的查询\n\n在本节中，我将使用几个例子向你展示如何根据你预期的查询来设计表。\n\
  \n让我们使用 `DataStax` 著名的 `Pro Cycling` 统计数据来进行表设计。\n\n注意：`Cassandra` 通过在多个表中重复数据来反规范化数据。这与关系数据库完全相反，关系数据库力求通过规范化来最小化数据重复。\n\
  \n#### 示例 1\n\n假设你想运行一个查询，按名字和姓氏列出每位自行车手。你的逻辑模型将如下所示：\n\n```\ncyclist_name\nid\n\
  lastname\nfirstname\n```\n\n在此模型中，\n\n*   分区键：`id`\n*   聚类列：无\n\n此表具有强制性的主键，即列 `id`。在此情况下，`id`\
  \ 仅由分区键组成。\n\n#### 示例 2\n\n前面的示例相当初级。你可以仅按 `id` 查询，但无法知道自行车手参加的比赛类型。假设你想在特定比赛类型中查找自行车手。你会想创建一个不同的表，其中包含来自示例\
  \ 1 的一些相同列，但也添加一些新列。\n\n```\ncyclist_race_type\nrace_type\nid\npoints\nlastname\n\
  ```\n\n在此模型中，\n\n*   分区键：`race_type`\n*   聚类列：`id`\n\n此表可帮助你按比赛类型对所有自行车手进行分组。在第一个示例中作为分区键的\
  \ `id` 列，现在充当聚类列，因为你希望在分区内按 `id` 对自行车手进行分组。\n\n### 逻辑建模\n\n前面关于概念建模的部分展示了如何基于预期查询设计表。数据建模的下一步是创建逻辑模型，其中包含满足你每个关键查询的表，确保这些表包含你在概念模型中识别的实体和关系。\n\
  \n正是在逻辑建模阶段，你确定表的主键，以及支持你的查询可能需要的排序的聚类列。`Cassandra` 将其行组织到表中。每个表都有一个强制性的主键。主键有多个组成部分，第一个组成部分是分区键。除了主键之外，你还可以索引其他列，这些其他索引称为二级索引。\n\
  \n### 物理数据建模\n\n在物理建模阶段，你着手实际创建数据库对象，如表和索引。你确定数据类型，包括你可能需要的任何用户定义类型。你还需要确定所需的键空间以及分区和复制策略。\n\
  \n除了二级索引，在物理数据建模阶段，你还必须考虑你可能需要的任何物化视图。\n\n正是在这个阶段，你执行大小计算，以确定存储数据所需的空间。\n\n你在物理数据建模阶段执行若干优化，包括指定分区大小和排序。\n\
  \n一旦你审查并完善了物理模型，就可以通过执行 `DDL` 命令（如 `CREATE KEYSPACE, CREATE TYPE,` 和 `CREATE TABLE`）在\
  \ `CQL` 中实现数据库模式。\n\n### Cassandra 数据建模规则\n\n对于从关系数据库背景转向 `Cassandra` 的开发人员和架构师来说，很自然会带上他们传统的数据建模思维。大错特错！许多著名的关系数据库建模原则或规则不适用于\
  \ `Cassandra`，而且有几个新的规则你需要学习，才能真正从使用 `Cassandra` 数据库中受益。虽然 `CQL` 确实与 `SQL` 相似，但要避免诱惑去创建你可能习惯的传统数据模型。\n\
  \n要从 `Cassandra` 数据库中获得最佳性能，最好遵循某些成熟的数据建模规则。遵循这些简单的规则，可以让你从一开始就拥有卓越的性能，并能在通过向集群添加越来越多节点进行扩展时保持高性能。\n\
  \n### 两个基本规则\n\n`Cassandra` 数据建模的规则并不多。你只需要记住两条规则：将数据分散到整个集群中，以及最小化 `Cassandra`\
  \ 需要读取的分区数量。\n\n我将在以下部分详细阐述这两条关键规则。\n\n#### 将数据均匀分散到集群中\n\n在直观层面上，你应该寻求将数据均匀分布在\
  \ `Cassandra` 集群的节点上，这是有道理的。然而，这并非自动实现，因为 `Cassandra` 不会自动移动数据来平衡它。\n\n`Cassandra`\
  \ 基于分区键的哈希值将数据分布到集群的各个节点上。分区键是表主键的第一个组成部分。因此，你需要选择一个好的主键来确保数据在所有节点上均衡分布。\n\n\n####\
  \ 最小化需要读取的分区数量\n\n在 Cassandra 表中，共享一个分区键的一组行被称为一个 `分区`。理想情况下，你必须通过将数据按分区分组存储在节点上来存储数据。查询需要读取的分区越少，你获得结果的速度就越快。\n\
  \n表的每个分区可以位于不同的节点上。当你发起一个查询时，查询协调器可能会向多个节点（各个分区可能所在的位置）发出单独的命令。这当然意味着更多的开销，并为查询的执行引入额外的延迟。你应该力求从尽可能少的分区读取查询的数据。\n\
  \n即使多个分区存储在同一个节点上，由于 Cassandra 在表中存储行的方式，从单个分区读取数据也比从多个分区读取的成本更低。\n\n### 围绕查询建模，而非围绕关系建模\n\
  \n满足两条基本规则（尤其是最小化分区数量）的方法是根据你的查询来建模你的数据库。与关系型数据库中围绕实体间关系建模不同，你需要根据你期望数据库支持的查询来进行建模。\n\
  \n设计数据模型时，始终从查询开始。你需要从用户将如何查看数据以及他们将如何搜索数据的角度来思考。\n\n用户要搜索的内容应该成为表的主键，他们想要查看的信息则应该成为你的列。道理就这么简单。你无需担心所有的范式以及数据之间的关系等等。\n\
  \n要围绕查询进行建模，你需要做两件事：\n\n*   找出数据库必须支持的查询。\n*   创建合适的表。\n\n#### 确定查询\n\n不存在一个能服务于所有查询场景的单一数据模型。如果你的查询需求稍有变化，就需要修改数据模型。在确定你希望\
  \ Cassandra 数据库支持的查询时，考虑查询中的以下类型需求：\n\n*   要求结果集中只有唯一值的查询\n*   希望基于特定条件过滤结果的查询\n\
  *   希望对结果进行排序的查询\n*   试图对结果进行分组的查询\n\n#### 创建合适的表\n\n在关系型数据库中，表在大多数情况下只是特定数据（如客户数据或销售数据）的存储库。你根据实体之间的关系创建表。以这种方式创建的表服务于多种查询，这些查询都寻求存储在该表中的数据。Cassandra\
  \ 则不然，你在创建表时的目标是通过读取单个分区来满足一个查询。\n\n通过读取单个分区来满足查询的策略意味着你的每个查询都为自己使用一张表。如果你有多个需要支持的查询，就必须创建多个表，因为单张表不太可能像关系型数据库那样高效地服务于多种不同的查询类型。\n\
  \n理解这里策略的关键在于认识到，创建表的目标不仅仅是让它作为存储实体特定属性数据的存储库。相反，这张表是一个预先构建好的、用于回答你必须支持的常见查询的答案源。为了优化读取，你必须创建能够快速回答该查询的定制化表。\n\
  \n## Cassandra 的性能局限\n\n尽管 Cassandra 既好又强大，但它在写入和读取过程中确实存在一些众所周知的局限。我在本节总结了主要的性能缺陷。\n\
  \n### 写入局限\n\nCassandra 提供了非常快的写入吞吐量，但正如以下部分所解释的，它为此做出了一些关键权衡。\n\n#### 不支持传统事务\n\
  \n与关系型数据库不同，Cassandra 中没有任何回滚机制。也没有作为关系型事务支柱的传统锁定机制。正如第 5 章所述，Cassandra 确实支持轻量级事务，但这些事务的开销很大。\n\
  \n#### 更新和删除的开销\n\n如你所知，Cassandra 将其数据以 `SSTable` 的形式存储在磁盘上。`SSTable` 是不可变的数据结构。当你更新数据时，Cassandra\
  \ 会将数据分散到多个 `SSTable` 中。当你删除数据时，Cassandra 会创建 `墓碑标记`（表示要删除的数据的标记），以确保在整个集群中正确删除数据。`墓碑标记`\
  \ 会抑制旧数据，直到数据库可以运行压缩操作，该操作才会永久删除数据。\n\n更新期间数据分散在多个 `SSTable` 中，以及删除期间创建 `墓碑标记`，都意味着在读取操作期间有更高的开销。这导致了通过清理来压缩\
  \ `SSTable` 的压力。\n\n### 读取局限\n\nCassandra 在读取操作中存在一些众所周知的性能限制，我将在以下部分进行解释。\n\n####\
  \ 不支持连接\n\n如第 1 章所述，你不能在 Cassandra 中将来自多个表的数据连接到单个查询中。这里没有像关系型数据库那样用于促进表连接的外键。\n\
  \n你不是连接表，而是对数据进行反规范化，从而根据预期的查询来复制数据。或者，你可以使用另一种报告技术（如 Apache Spark）来执行连接操作。\n\n\
  #### 索引工作方式不同\n\nCassandra 通过表的主键（唯一且有助于快速识别行）执行搜索。然而，关系型数据库用于加速查询的 `二级索引` 则完全是另一回事，如果你没有将它们用于其适用的有限场景，可能会对性能产生负面影响。\n\
  \n#### 仅最终一致性\n\nCassandra 数据模型背后的关键原则是 `可调一致性`，由客户端应用程序决定它们所需的数据一致性级别。\n\n尽管 Cassandra\
  \ 会自动在整个集群中复制数据，但复制数据存在固有的延迟，并且你受限于 `最终一致性` 原则。`最终一致性`，也称为 `乐观复制`，在分布式计算架构中实现了高可用性，并非正式地保证：在没有对数据项进行新更新的情况下，最终访问该数据项将返回其最后更新的值。\n\
  \n如第 1 章所述，最终一致性服务支持 `BASE`（基本可用、软状态、最终一致性）语义，这与关系型数据库提供的 `ACID`（原子性、一致性、隔离性和持久性）保证相反。\n\
  \n但是，如果需要，你可以使用仲裁读取和写入来最小化最终一致性的任何不利影响。我将在本章后面的“处理一致性”部分详细解释一致性和仲裁读写。\n\n\n\n##\
  \ 最终一致性的概念\n\n一致性是指读取操作必须始终返回最新写入的数据。即使数据库正在同时更新数据，所有客户端对于数据的某个元素也将读取到相同的值。\n\n\
  像 `Cassandra` 这样的数据库必须在数据一致性、可用性和分区容错性之间做出权衡，这三者是布鲁尔阐述的 `CAP` 定理的三个支柱。可用性是指所有客户端都能够访问数据，从而可以读取和写入数据。分区容错性是指数据库可以被拆分到多台机器上，并且即使在网络分区中断期间也能持续运作。由于网络问题使得临时分区不可避免，在现实生活中，你确实需要在可用性和一致性之间做出选择。\n\
  \n在现实世界中，并非只有单一的一致性概念，而是存在多个一致性等级。最严格的一致性模型是 `严格一致性`，它要求每次读取都必须返回最后一次写入的值。在分布式系统中，强制实施\
  \ `严格一致性` 很困难。例如，数据库需要以同步方式执行所有更新（`insert`/`delete`/`update`）操作，使用锁来防止访问尚未修改的副本。这当然会阻塞用户，而且如果在更新操作完成之前出现任何类型的故障，如网络或服务器故障，数据将变得不可用。\n\
  \n`严格一致性` 在数据库确定你正在查看的是最近更新的值之前，根本不会允许你窥探数据。数据库宁愿变得不可用，也不会向你展示不一致的值。\n\n`最终一致性`\
  \ 要求分布式数据库中数据所有副本（`replicas`）上的所有更新最终必须存在，但允许这个过程花费一点时间。也就是说，尽管在变更之后副本的值可能暂时不同，但在一段时间之后（最终），所有副本都将变得一致。\n\
  \n`Cassandra` 实现了 `可调一致性`，你可以在一致性级别和复制因子之间进行权衡。复制因子越高，性能越差，但你会获得更高的一致性。你选择的一致性级别告诉数据库，对于一次写入或读取查询，必须有多少个副本确认成功写入或做出响应，该操作才会被视为成功。\n\
  \n你可以为读取和写入指定一致性级别。更高的一致性级别要求更多节点响应读取或写入操作，这意味着数据更可靠，因为多个副本显示的值是相同的。\n\n快速写入是这里的目标：虽然你可以将一致性级别设置为与复制因子相同，但所获得的更强一致性是以性能为代价的。一致性级别通常设置为低于复制因子的值，这样即使某些节点不可用，更新也被认为是成功的。即使在部分故障期间，`Cassandra`\
  \ 也会持续更新数据。\n\n### 一致性冲突解决\n\n由于 `最终一致性` 只保证读取最终会返回相同的值，但不提供任何安全性保证，因此它可以在数据收敛之前返回一个值。\n\
  \n为确保副本最终一致，一个最终一致性系统必须通过以下两个步骤来协调同一数据项的多个版本之间的差异：\n\n*   `反熵`：涉及在节点之间交换数据的版本。\n\
  *   `调和`：当并发更新更改数据时，涉及为数据选择合适的最终状态。\n\n有几种方法来调和并发写入，例如“最后写入者胜”策略、用户指定的冲突处理器等。数据库通常使用时间戳来检测更新之间的并发性。\n\
  \n### 修复数据\n\n不同的并发写入的调和必须在下次读取发生之前的某个时间进行，数据库可以在不同的时间点调度它，例如：\n\n*   `读修复`：当读取发现不一致时进行调和或纠正。显然，这会影响读取操作的速度。\n\
  *   `写修复`：在写入操作期间进行调和或纠正。写入期间发现的任何不一致都会减慢写入操作的速度。\n*   `异步修复`：纠正操作不属于读取或写入操作的一部分。\n\
  \n当读取数据时，`读修复` 可以解决任何数据不一致问题。当数据未被读取时，你需要使用 `暗示移交` 或 `反熵` 机制来解决任何数据不一致问题。第 5 章解释了各种类型的修复。\n\
  \n### Cassandra 如何写入数据\n\n`Cassandra` 使用多阶段写入路径，包含以下阶段：\n\n*   首先，它将写入记录在 `提交日志`\
  \ 中。\n*   接下来，它将数据写入内存中的 `memtable`。\n*   最后，它将数据从 `memtable` 刷新到磁盘上的永久存储中，以 `SSTables`\
  \ 格式保存。\n\n在接下来的章节中，我将详细阐述写入路径的三个主要阶段。\n\n\n\n### 写入提交日志以保护更改\n\nCassandra 在写入数据时做的第一件事是将写操作追加到磁盘上的提交日志。这样做的目的是为了保护写操作免受节点电源故障等情况的影响。因此，提交日志是\
  \ C**assandra 持久性保证**的关键组件。\n\n数据库只有在数据写入提交日志后才认为一次写入成功。如果数据库在写入提交日志后立即崩溃，也没问题。一旦数据库重新启动，它首先要做的是重放提交日志，以恢复所有存在于其中但尚未写入\
  \ SSTables 的事务。提交日志只有一个用途：保存已提交的数据，直到它被永久写入 SSTables 中的磁盘。\n\n默认情况下，数据库将提交日志存储在\
  \ `/var/lib/cassandra/commitlog` 目录中，但你可以通过设置 `commitlog_directory` 属性来指定自定义位置。理想情况下，你必须将提交日志存储在与存储数据文件目录的物理设备分开的物理设备上。\n\
  \n当为提交日志配置的空间达到其限制时，数据库会将内存表刷新到磁盘。数据库首先刷新最旧的提交日志段，并从提交日志中移除这些日志段。\n\n启动数据库时，它会重放提交日志。你可以通过确保提交日志不会太大来减少重放时间。当然，如果你配置的提交日志太小，对于活动表来说，数据库将会相当频繁地将数据刷新到磁盘。\n\
  \n通过在 `cassandra.yaml` 文件中设置以下属性来管理提交日志：\n\n*   `commitlog_total_space_in_mb`：配置提交日志的总空间。对于\
  \ 64 位 JVM，默认值为 8192MB。\n*   `commitlog_compression`：默认情况下，数据库不压缩提交日志，但你可以通过将此参数的值设置为\
  \ LZ4、Snappy 或 Deflate 来使其压缩提交日志。\n\n数据库在以下时间归档提交日志：\n\n*   节点启动时\n*   将提交日志写入磁盘时\n\
  *   在你指定的时间点\n\n你在 `commitlog_archiving.properties` 文件中配置提交日志归档，该文件位于\n\n*   `/etc/cassandra/commitlog_archiving.properties`（包安装）\n\
  *   `install_location/conf/commitlog_archiving.properties`（tarball 安装）\n\n你可以使用\
  \ `archive_command` 命令归档一个提交日志段：\n\n```\n$ archive_command=/bin/ln %path /backup/%name\n\
  ```\n\n在此示例中，`path` 指的是你要归档的提交日志的路径，`name` 指的是提交日志的名称。\n\n要恢复已归档的提交日志，请执行 `restore_command`\
  \ 命令：\n\n```\n$ restore_command -cp -f %from %to\n```\n\n`from` 参数指定了恢复目录中已归档提交日志段的路径。参数\
  \ `to` 指的是当前提交日志目录的名称。\n\n你可以通过在 `cassandra.yaml` 文件中如下指定路径来设置恢复目录的位置：\n\n```\n\
  restore_directories=\n```\n\n### 写入内存表以实现持久性\n\nCassandra 的设计目标是尽可能快地处理大量数据。为了实现这一目标，如前所述，Cassandra\
  \ 首先将所有新数据写入磁盘上的提交日志以确保其安全。对提交日志的写入是持久的，能够经受住电源故障等事件。\n\n一旦数据库将更改写入提交日志，它也会将该数据写入仅存在于内存中的内存表。为了提供持久性，Cassandra\
  \ 在将新数据同时写入提交日志和一个内存表后即认为写入成功。\n\n重要的是要理解，提交日志仅用于在可能发生意外事件时支持数据的持久性，否则这些事件可能导致数据丢失。另一方面，内存表是数据库用来将数据永久写入磁盘上\
  \ SSTables 的机制。\n\n#### 配置从内存表刷新数据\n\n每个内存表专用于存储特定表的数据，并且一个表可能有多个内存表。其中一个是数据库当前写入数据的内存表，其余的是已满并等待数据库将其刷新到磁盘的内存表。一旦一个内存表达到其内存限制（即，内存表已满），Cassandra\
  \ 就将该内存表的所有数据以 SSTable（一种文件）的形式写入磁盘。之后，它会创建一个新的内存表。\n\n当达到提交日志空间阈值或内存表清理阈值时，Cassandra\
  \ 会将内存表刷新到磁盘。\n\n#### 配置提交日志空间阈值\n\n你可以使用 `commitlog_total_space_in_mb` 属性配置用于提交日志的总空间。你按节点配置提交日志。当数据库中所有提交日志占用的总空间超过你为此属性设置的值时，数据库会为最旧的提交日志段将内存表刷新到磁盘。\n\
  \n`commitlog_total_space_in_mb` 属性的默认值是 8192MB。为提交日志可占用的总空间设置限制，将防止那些你很少更新的表永远占用提交日志段。\n\
  \n如果你为 `commitlog_total_space_in_mb` 属性设置的值过低，所有表都将经历更频繁的刷新活动。\n\n注意\n\n你按节点配置提交日志，数据库中的所有表共享此日志。数据库按表维护内存表和\
  \ SSTables。\n\n#### 配置内存表清理阈值\n\n你也可以配置 `memtable_cleanup_threshold` 属性，以设置在数据库刷新最大的内存表之前，所有内存表总共可以使用的内存量。\n\
  \n`memtable_cleanup_threshold` 属性现已**弃用**，因此我将不再进一步讨论此属性。\n\n你数据库中的数据大小以及写入负载的性质将决定你如何设置内存表阈值。如果写入很多，或者写入包括大量对小数据块的更新，那么增加内存表阈值是合适的。\n\
  \n\n## 手动刷新 Memtables\n\n你可以手动刷新 memtables。最近一次刷新 memtables 意味着，如果节点因任何原因重启，数据库需要重放的\
  \ commit log 会更少。\n\n> **提示**：DataStax 建议在停止节点并再次启动之前刷新 memtable。\n\n当节点重启时，memtable\
  \ 中的所有数据都会消失。你可以重放 commit log 来恢复节点停止时 memtable 中的写入操作。这是因为当你重放日志时，commit log 会重建\
  \ memtables。\n\n你可以使用 `nodetool flush` 或 `nodetool drain` 命令来手动刷新 memtable。\n\n\
  `nodetool flush` 命令使你能够将一个或多个表的 memtable 从内存刷新到磁盘上的 SSTable。该命令的语法如下：\n\n```\n$\
  \ nodetool flush -- (...)\n```\n\n你必须指定 keyspace 的名称和一个或多个表，表名之间用空格分隔。\n\n`nodetool\
  \ drain` 命令会排空整个节点；也就是说，它会将此节点上的所有 memtable 刷新到 SSTable。\n\n```\n$ nodetool drain\n\
  ```\n\n运行此命令后，数据库将停止监听任何连接，包括来自其他节点的连接。运行此命令后，你必须重启节点。\n\n> **注意**：使用 `nodetool\
  \ flush` 命令将 memtable 刷新到磁盘。仅在特殊情况下运行 `nodetool drain` 命令，例如将节点升级到更新版本的 Cassandra\
  \ 时。\n\ncommit log 由多个段组成。当数据库将一个段中的所有数据刷新到磁盘时，它会清除该段。或者，当 commit log 达到你通过 `commitlog_totalspace_in_mb`\
  \ 属性配置的最大大小时，数据库会先将最旧的段刷新到磁盘，然后从 commit log 中清除它们。\n\n### 写入 SSTable 以实现持久存储\n\n\
  数据库将 memtable 刷新到磁盘，写入 SSTable。SSTable（排序字符串表）是不可变的，这意味着一旦写入，数据库就不能再对其进行写入。如果你修改了\
  \ SSTable 中的数据，该数据将作为 UPSERT（更新 + 插入）写入，Cassandra 会自动删除之前的数据。\n\n因为 SSTable 是不可变的，并且\
  \ Cassandra 在相应的 memtable 满时才批量写入它们，所以数据库无需执行随机寻道。相反，它只执行大规模的顺序 I/O，这确保了高写入吞吐量。\n\
  \n在传统的基于 B 树的数据库中，数据库必须在写操作期间执行读取以检查索引来定位当前数据。Cassandra 无需执行这些读取，从而保持了非常高的插入性能。\n\
  \n当 Cassandra 读取数据时，它会读取与该表相关的 SSTable 和 memtable，因为 memtable 可能尚未刷新到磁盘，因此可能包含 SSTable\
  \ 中不存在的数据。\n\n#### SSTable 数据文件的格式\n\nSSTable 由磁盘上的文件组成，一个分区通常占用多个 SSTable 文件。以下是属于\
  \ SSTable 的操作系统级数据文件的结构：\n\n```\n/data/ks1/cf1-5be396077b811e3a3ab9dc4b9ac088d/la-1-big-Data.db\n\
  ```\n\n在此示例中：\n\n*   `ks1` 代表此 SSTable 所属的 keyspace。\n*   十六进制字符串 `5be396077b811e3a3ab9dc4b9ac088d`\
  \ 代表一个唯一的表 ID。\n*   `la-1-big-Data.db` 是数据文件的名称。\n\n#### SSTable 的内部结构\n\n当 Cassandra\
  \ 通过刷新 memtable 中的数据将 SSTable 写入磁盘时，它会为 SSTable 中的数据创建一个文件。此外，它还会随数据文件一起创建几种数据结构。这些数据结构中的每一种都由一个单独的文件表示，这些文件与数据库存储数据文件的目录相同。\n\
  \n与 SSTable 相关的文件位于 `$CASSANDRA_HOME/data/data` 目录中。在这个主目录下，会为每个 keyspace 创建一个目录，在\
  \ keyspace 目录下，你会找到每个表的子目录。例如，对于 `cycling` keyspace 中的 `cyclist_name` 表，`cycling.cyclist_name`\
  \ 表的文件位置如下（表的目录由表名和一个 UUID 组成，这有助于区分多个 schema 版本，因为表的 schema 可能会随着时间进行修改）：\n\n```\n\
  $ ubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#\
  \ ls -altr\ntotal 48\ndrwxr-xr-x 2 cassandra cassandra 4096 Jun 24 12:35 backups\n\
  drwxr-xr-x 5 cassandra cassandra 4096 Jun 24 12:36 ..\n-rw-r--r-- 1 cassandra cassandra\
  \   16 Jun 25 08:39 mc-1-big-Filter.db\n-rw-r--r-- 1 cassandra cassandra   20 Jun\
  \ 25 08:39 mc-1-big-Index.db\n-rw-r--r-- 1 cassandra cassandra   92 Jun 25 08:39\
  \ mc-1-big-Summary.db\n-rw-r--r-- 1 cassandra cassandra   57 Jun 25 08:39 mc-1-big-Data.db\n\
  -rw-r--r-- 1 cassandra cassandra   10 Jun 25 08:39 mc-1-big-Digest.crc32\n-rw-r--r--\
  \ 1 cassandra cassandra   43 Jun 25 08:39 mc-1-big-CompressionInfo.db\n-rw-r--r--\
  \ 1 cassandra cassandra 4660 Jun 25 08:39 mc-1-big-Statistics.db\n-rw-r--r-- 1 cassandra\
  \ cassandra   92 Jun 25 08:39 mc-1-big-TOC.txt\ndrwxr-xr-x 3 cassandra cassandra\
  \ 4096 Jun 25 08:39 .\nubuntu:/cassandra/apache-cassandra-3.10/data/data/cycling/cyclist_name-43138460591411e7b1387bff0507f153#\n\
  ```\n\n我在此总结主要的数据结构：\n\n*   数据文件 (`Data.db`)：这是主要的 SSTable 数据文件，也是 Cassandra 备份中唯一存储的文件。\n\
  *   主索引 (`Index.db`)：一个包含行键及其在数据文件中位置指针的索引。\n*   统计信息 (`Statistics.db`)：包含有关 SSTable\
  \ 数据的统计元数据。\n*   压缩信息 (`Compressioninfo.db`)：包含有关 SSTable 压缩信息的文件。\n*   二级索引 (`SI_.*.db`)：内置的二级索引。每个\
  \ SSTable 可能有一个或多个这样的文件。\n*   SSTable 索引摘要 (`Summary.db`)：数据库在内存中存储的分区索引的样本。\n*\
  \   布隆过滤器 (`Filter.db`)：此文件包含此表的布隆过滤器。布隆过滤器是一种内存结构，可在访问 SSTable 之前帮助数据库快速检查行数据是否在\
  \ memtable 中。SSTable 的布隆过滤器可提升读取性能。\n\n你可以压缩 SSTable 以节省存储空间。我将在第 11 章中解释 SSTable\
  \ 压缩。\n\n#### 缓存 SSTable 数据\n\nCassandra 为 SSTable 数据提供三种类型的缓存：\n\n*   键缓存存储分区键到行索引条目的映射，允许快速访问\
  \ SSTable。简而言之，键缓存存储表的分区索引。\n*   行缓存缓存频繁访问的行以加快对这些行的访问。\n*   计数器缓存为你需要频繁访问的计数器提升性能。\n\
  \n键缓存和计数器缓存默认启用。Cassandra 将缓存的数据存储到磁盘，以便在重启数据库时可以快速将其拉入内存。我将在第 11 章中详细解释缓存。\n\n\n\
  ### 写请求流程\n\nCassandra 在写入路径上通过多个阶段处理数据，该过程始于客户端初始化写请求，终于数据库将数据存储到磁盘。它会立即记录一次写入，并在此过程结束时将数据写入磁盘。以下是写入的各个阶段：\n\
  \n*   将数据记录到提交日志中。\n*   将数据写入内存表。\n*   将数据从内存表刷新。\n*   将数据存储到磁盘上的 SSTable 中。\n\n\
  图 4-1 展示了 Cassandra 的写请求流程。该图展示了一个拥有十二个节点的 Cassandra 集群。此处是三副本复制（即复制级别为 3），且客户端使用\
  \ `QUORUM` 一致性级别。\n\n![A436674_1_En_4_Fig1_HTML.gif](img/A436674_1_En_4_Fig1_HTML.gif)\n\
  \n图 4-1\n\nCassandra 写请求流程\n\n注意\n\nCassandra 进行顺序写入，并且由于所有写入都只是追加操作，因此它不需要任何读取或寻道来写入值。因此，Cassandra\
  \ 可以非常快速地写入数据。\n\n在 `QUORUM` 一致性级别下，如果三个节点中有两个确认写操作成功，Cassandra 就认为该写操作成功。副本节点将确认信息发送给协调节点，即客户端连接的那个节点。\n\
  \n以下是对图 4-1 所示的 Cassandra 写请求流程的逐步解释。\n\n1.  Cassandra 客户端发送一个写请求以存储特定的键。首先需要理解的是，一个节点可以扮演副本节点、协调节点或两者兼有的角色。如果该节点是存储该键的正确分区节点，并且该节点映射到数据，那么该节点充当副本。如果该节点恰好是客户端连接的节点，那么它充当协调节点。如果这两个条件都成立，该节点则同时扮演两个角色：协调节点和副本节点。\n\
  2.  协调节点确定应该存储该键的正确副本节点，并将客户端的请求转发给所有这些节点。副本的数量取决于复制因子。如果并非所有节点都在线，那么宕机节点在写入后将出现数据不一致。这些宕机节点一旦恢复，将使用\
  \ Cassandra 的一种数据修复机制，例如 `hinted handoff`、`read repair` 或 `anti-entropy repair`，来达到一致状态。\n\
  3.  接收到键的节点将数据连同用于创建数据的元数据一起顺序写入提交日志（本地）。\n    提示 只有在 `ANY` 一致性级别下，提示才被计为一次成功的写入。\n\
  4.  然后，节点将键及其数据本地写入驻留在内存中的内存表。至此，节点认为写入成功。\n5.  一旦写入成功（或失败），副本节点会将操作的成功/失败状态发送给协调节点。\n\
  6.  在此例中，我们假设一致性级别为 `QUORUM` 且复制因子为 3。因此，一旦三个节点中有两个回复成功消息，协调节点就会向客户端响应一条成功消息。\n\n\
  注意\n\n你经常会遇到术语“协调节点”。协调节点是你发起 `cqlsh` 会话的节点。如果你连接到远程主机，那么该主机就是协调节点。\n\n在此期间，会发生几个重要的\
  \ Cassandra 内部操作，例如：\n\n*   Cassandra 如何在写操作期间使用提示\n*   Cassandra 如何决定何时应将内存表刷新到磁盘\n\
  *   Cassandra 如何使用提交日志\n*   布隆过滤器扮演的角色\n*   索引文件的角色\n\n以下各节将解释这些幕后的内部操作或过程。\n\n\
  #### 写入过程中提示的作用\n\n如果一个或多个节点未能发送成功或失败的确认信息，协调节点会在本地存储一个提示，以便当这些节点恢复时可以重新发送写操作。\n\
  \n你可以通过以下两个配置属性（在 `cassandra.yaml` 文件中）来控制 Cassandra 管理提示的方式：\n\n*   `gc_grace_seconds`：配置提示的生存时间（TTL）周期，以便数据库在此持续时间后不再重放提示。将此参数设置为\
  \ 0 会禁用提示。\n*   `max_hint_window_in_ms`：此属性决定将记录提示的周期。默认值是三小时。\n\n#### 内存表及其刷新到磁盘的过程\n\
  \n在客户端写操作期间，一个后台线程监控数据库中的所有内存表。一旦满足以下任一条件，后台线程就会用新的内存表替换当前的内存表，并将较旧的内存表标记为需要刷新到磁盘（到一个\
  \ SSTable）：\n\n*   节点达到其全局内存阈值。\n*   提交日志已满。\n*   达到表级别的间隔。\n\n另一个后台线程（或一组线程）负责刷新第一个后台线程标记为需要刷新的内存表。\n\
  \n#### 提交日志\n\n一旦 Cassandra 将内存表刷新到磁盘，存储在提交日志中属于该内存表键的所有条目就变得无用了。Cassandra 会标记所有属于已刷新内存表的提交日志段，以便它可以将这些段重新用于存储来自其他内存表的数据。\n\
  \n数据库将提交日志作为二进制文件存储在文件系统的 `$CASSANDRA_HOME/data/commitlog` 目录中。示例如下：\n\n```\n$ ls\
  \ -altr\ntotal 9332\ndrwxr-xr-x 6 cassandra cassandra      4096 Apr  3 10:56 ..\n\
  -rw-r--r-- 1 cassandra cassandra  33554432 Jun 24 12:35 CommitLog-6-1498331957174.log\n\
  drwxr-xr-x 2 cassandra cassandra      4096 Jun 24 12:35 .\n-rw-r--r-- 1 cassandra\
  \ cassandra  33554432 Jun 25 09:55 CommitLog-6-1498331957173.log\n$\n```\n\n提交日志名称中的数字\
  \ 6 表示提交日志格式的版本号。对于 Cassandra 3.0 版本，版本号是 6。\n\n\n\n\n#### Bloom 过滤器与索引文件\n\n一旦\
  \ Cassandra 将内存表刷新到磁盘，它会创建两个额外的数据结构：一个 Bloom 过滤器和一个索引文件。\n\n##### Bloom 过滤器\n\n\
  Bloom 过滤器是一种用于测试集合成员资格的概率数据结构，你可以调整其假阳性率。它永远不会产生假阴性。Bloom 过滤器是一种堆外结构。它使用一种快速算法来检测一个元素是否是集合的成员。\n\
  \n数据库将 Bloom 过滤器存储在内存中，并在查找键时使用它们来减少磁盘访问。当你执行查询时，数据库在访问磁盘数据之前会先检查 Bloom 过滤器。如果 Bloom\
  \ 过滤器显示该元素在集合中，数据库才会访问磁盘以进行确认。由于内存访问比磁盘访问快得多，你可以将 Bloom 过滤器视为一种用于加速访问的缓存。\n\n当 Bloom\
  \ 过滤器报告某个键不存在于 SSTable 中时，那么该键确实不存在。然而，如果过滤器推断该键存在，有时可能是错误的；该键可能实际并不存在。\n\nBloom\
  \ 过滤器通过指示键是否不在 SSTable 中，来避免数据库执行额外的磁盘读取以读取 SSTable，从而增强了读取请求的可扩展性。\n\n你可以通过增大 Bloom\
  \ 过滤器的大小来减少假阳性的数量。这将使用更多内存，但会使过滤器更精确。你可以在表级别配置假阳性的概率，在创建表时或之后均可。你在表级别配置 `bloom_filter_fp_chance`\
  \ 属性，以指定 Bloom 过滤器报告的假阳性百分比。\n\n##### 索引文件\n\n索引文件存储了键在主数据文件（即 SSTable）中的偏移量。默认情况下，数据库将索引文件的一部分存储在内存中。索引文件存储\
  \ SSTable 中每第 `128` 个键的偏移量，此值可以配置。\n\n与 Bloom 过滤器类似，索引文件通过提供 SSTable 中的随机位置来增强读取可扩展性，你可以从此位置开始顺序扫描以获取数据。否则，你将被迫扫描整个\
  \ SSTable 来检索数据。\n\n#### 压缩 SSTable 数据\n\n随着时间的推移，数据库最终可能在不同的 SSTable 中拥有同一行的多个版本，因为\
  \ SSTable 是不可变的，且数据库不会覆盖现有数据。相反，插入和更新操作会生成新的 SSTable。\n\n为了防止 SSTable 的多个版本使系统不堪重负，数据库会定期合并\
  \ SSTable，以清除旧版本的数据。此过程称为压缩。默认情况下，数据库会自动执行次要压缩。\n\n在压缩操作期间，Cassandra 会合并 SSTable\
  \ 中的数据，包括键和列。它还会清除所有过期的墓碑标记并创建一个新的索引。压缩的结果是一个新的 SSTable。压缩可能会导致 I/O 使用率和磁盘上数据大小暂时增加，但由于它合并了多个存储\
  \ SSTable 数据的大型数据文件，最终会节省你的空间。\n\n你可以配置一种压缩策略，以告诉数据库在压缩期间合并多个 SSTable 时必须使用的算法。例如，默认的压缩策略是大小分层压缩，它会合并大小相似的\
  \ SSTable 以创建一个大的 SSTable。\n\n一旦数据库通过合并多个 SSTable 创建了新的 SSTable，它就会将旧的表标记为待删除。这意味着在压缩操作期间，你会看到更高的空间使用率。数据库会在重启期间，或通过使用引用计数机制，清除其标记为待删除的表。\n\
  \n压缩之后，数据库将删除原始的 SSTable，从而清除过时的行。但是，压缩是基于每个节点的，因此尽管一个节点执行了压缩，过时的行版本可能仍然存在于其他节点上。为了防止返回过时的行，数据库在响应客户端的读取请求时，会获取一个行的多个版本。然后，它将具有最新时间戳的版本返回给客户端，此过程称为“最后写入胜出”。\n\
  \nCassandra 提供了多种压缩算法，不同的策略最适合写入密集和读取密集的表。我将在第 11 章详细讨论压缩策略。\n\n### 读取数据\n\n我想解释\
  \ Cassandra 数据库中的读取请求流程，但在此之前，让我先解释一下 Cassandra 数据库的基本架构。\n\n由于 Casandra 集群中没有主节点或主节点，任何包含可满足关于该行查询的行的节点都可以执行查询。请记住，Cassandra\
  \ 会将表中的每一行复制到多个节点上，副本数量取决于复制因子。\n\nCassandra 使用的 Gossip 协议使节点能够交换有关网络拓扑的信息。通过使用\
  \ `Gossip`，每个节点都能了解集群拓扑，并确定对于特定行的请求应导向何处。\n\n如果有足够多的节点确认成功，Cassandra 就认为读取操作成功。多少节点才算足够取决于复制因子和你选择的一致性级别。\n\
  \n图 4-2 展示了一种情况：集群中有十二个节点，复制因子为 3。客户端读取时采用了 `QUORUM` 一致性级别。使用 `QUORUM` 一致性级别时，当三个节点中有两个确认成功，读取操作即视为成功。\n\
  \n![A436674_1_En_4_Fig2_HTML.gif](img/A436674_1_En_4_Fig2_HTML.gif)\n\n**图 4-2**\
  \ Gossip 协议如何帮助节点相互交换信息\n\n**注意：** 由于 Cassandra 使用 Gossip 协议，并且它是一个分布式数据库，在每次读写操作期间都需要与多个节点通信，因此网络会执行大量的数据传输。建议你至少设置\
  \ 1Gbps 的网络带宽，以容纳 Gossip 流量以及复制流量。\n\n\n\n### Cassandra 读取路径\n\nCassandra 在成功完成读取请求之前遵循一系列特定的事件流程。以下事件序列展示了数据库如何处理读取请求。\n\
  \n第一个事件是客户端向集群发送读取请求以获取特定键（名为 K）的数据。一个节点可以充当协调节点、副本节点或两者兼是。如果该节点持有副本，它可以作为副本节点。如果该键未映射到此节点，则它充当协调节点。\n\
  \n如果节点充当协调节点，它会将请求转发给可能包含键 K 的节点。协调节点使用一个`snitch`来查找哪个副本节点离它最近，并向该节点发送完整数据的请求。同时，它也会向其他节点发送请求，以获取由数据哈希生成的摘要。\n\
  \nCassandra 将请求从协调节点转发到目标节点的内部服务。\n\n协调节点从内存表和 SSTable 中请求数据。虽然数据库从内存表中返回数据更快（因为它们存在于内存中），但它也会检查一个或多个\
  \ SSTable 以获取数据。当其中一个布隆过滤器确认它拥有该键时，Cassandra 随后会检查内存中的样本索引。\n\n数据库首先对样本索引执行二分查找，以找到索引文件中的起始偏移量。利用这个偏移量，数据库在索引文件中定位并执行顺序读取，以获取实际键在\
  \ SSTable 中的偏移量。\n\n使用实际键的偏移量，数据库在 SSTable 文件中定位，并通过对 SSTable 的查找操作返回其中的实际数据。\n\n\
  `filter` 命令整合了它从 SSTable 查找和从内存表收到的多个版本的键数据。它整合键数据，并将整合后的版本返回给内部服务。\n\n内部服务在其他节点上重复此过程，并将结果返回给协调节点。\n\
  \n协调节点比较它从所有节点收到的所有摘要，如果存在冲突，则会调和数据，并将调和后的版本返回给客户端。如有必要，数据库还会启动读取修复以确保数据一致性。\n\n\
  ### 写入模式如何影响读取\n\nCassandra 写入数据的方式会影响读取操作。你可以通过配置 Cassandra 的合并过程来影响读取性能。Cassandra\
  \ 写入磁盘的 SSTable 中的数据是不可变的。Cassandra 不更新数据。它会将新数据以及更新后的数据写入新的 SSTable，每个 SSTable\
  \ 都带有不同的时间戳。SSTable 的数量可能会随着时间的推移而变得相当庞大。在响应查询时，数据库可能必须访问许多 SSTable 才能检索到一行数据，因为具有唯一列集的一行数据的每个版本可能存储在不同的\
  \ SSTable 中。\n\nCassandra 通过合并多个 SSTable 并移除旧数据，定期合并一组 SSTable。它合并多个 SSTable，以便从每一行的各个版本中生成一个完整的行，其中包含该行每一列的最新版本。\n\
  \n## Cassandra 存储引擎\n\nCassandra 使用一种日志结构化存储引擎，它避免覆盖并采用顺序 I/O 来更新数据。\n\n大多数关系型数据库使用\
  \ B 树，这是一种保持数据排序并允许你在对数时间内搜索、插入、删除和顺序访问数据的数据结构。B 树数据结构针对读写大数据块进行了优化。Cassandra 使用一种不同的数据结构，称为日志结构合并树，简称\
  \ LSM 树，它能很好地为高插入量的文件提供索引访问。像 HBase、MongoDB 和 InfluxDB 这样的数据存储也使用相同的 LSM 树数据结构。\n\
  \n在大型分布式数据库中，写前读取可能导致读取延迟。Cassandra 在大多数写入操作中避免使用写前读取。相反，Cassandra 的存储引擎在内存中对插入和更新进行分组，并定期将数据顺序写入磁盘。一旦\
  \ Cassandra 将数据写入磁盘，该数据就保持不可变；你无法覆盖它。\n\n写入放大是一种与闪存和固态硬盘相关的现象，其中物理写入存储介质的数据量是逻辑数据量的倍数。通过将数据顺序写入磁盘上的不可变文件，Cassandra\
  \ 避免了写入放大现象。因此，在使用许多其他类型数据库时会在固态硬盘上成为问题的写入放大，在使用 Cassandra 时就不再是问题。\n\n### Cassandra\
  \ 事务与 ACID 属性\n\n与支持所有知名 ACID 事务的传统 RDBMS 事务不同，Cassandra 支持原子性、隔离性和持久性属性，但不支持一致性属性。Cassandra\
  \ 不使用典型的数据库回滚和锁定机制。它提供最终一致性或可调一致性，由你决定事务一致性级别，这涉及到数据可用性和准确性之间的固有权衡。\n\n在以下章节中，让我们简要回顾一下\
  \ Cassandra 数据库对标准 ACID 属性的支持。\n\n### 原子性\n\nCassandra 在分区级别原子地执行写入和删除操作。在分区级别处理操作意味着\
  \ Cassandra 将来自同一分区的多行插入、更新和删除视为单一操作。\n\n如果有多个客户端同时更新同一列，则由最新时间戳决定哪个是该列的最新更新。\n\n\
  Cassandra 不会自动回滚仅在部分节点成功的写入。假设你使用写入一致性级别为 `QUORUM`，复制因子为 3。这意味着协调节点将需要等待来自两个节点的确认。如果写入在一个节点上成功但在另一个节点上失败，Cassandra\
  \ 不会回滚成功的写入。\n\n### 隔离性\n\nCassandra 的写入和更新在行级别完全隔离，这意味着在完成写入操作之前，向分区中某一行写入的客户端是唯一能看到该写入的客户端。\n\
  \n属于同一分区的批量操作中的任何更新也以完全的行级隔离执行，除非该操作涉及对多个分区的更改。\n\n### 持久性\n\nCassandra 为写入提供强大的持久性。它在确认写入成功之前，通过将所有写入记录到内存和磁盘上的提交日志来提供本地持久性。如果在数据库将内存表刷新到磁盘之前发生服务器故障，它会重放提交日志以找回丢失的写入。\n\
  \nCassandra 将数据复制到多个节点这一事实，进一步强化了通过写入提交日志所提供的持久性。\n\n指定 `commitlog_sync` 属性以根据你的一致性需求设置持久性。`commitlog_sync`\
  \ 属性决定了 Cassandra 用于确认写入的方法。以下是你配置此属性的方式：\n\n*   周期性（默认值为 10000 毫秒，即 10 秒）：如果你选择周期性方式，设置\
  \ `commit_sync_period_in_ms` 属性以控制 Cassandra 将提交日志同步到磁盘的频率。Cassandra 会立即确认周期性同步。\n\
  *   批次（默认：禁用）：当你启用手动方式时，Cassandra 会等待，直到写入被同步到磁盘后才确认写入。属性 `commitlog_sync_batch_window_in_ms`\
  \ 允许你指定 Cassandra 在执行同步前等待其他写入的时间。默认值为 2 毫秒。\n\n\n### 处理一致性\n\nCassandra 允许您配置一致性级别，以平衡数据的可用性与准确性。您可以在会话级别或单次读写操作中配置一致性。选择的一致性级别决定了数据库必须向应用程序确认的副本数量，以表明读写操作成功完成。\n\
  一致性级别决定了必须有多少节点向协调节点响应才能成功处理事务。Cassandra 使用一致性级别来处理常规（非轻量级）事务。\n一致性显示了一行数据的所有副本之间的同步程度。虽然常规修复操作可以保持副本间数据的差异性较低，但数据库中持续的数据流可能会导致某些副本与其他副本不同步。也就是说，某些副本可能不一致或过时。\n\
  虽然 Cassandra 确实满足 ACID 中的原子性、隔离性和持久性特性，但其满足一致性属性的方式使其区别于典型的关系型数据库管理系统。\n在 CAP 定理的三个要素（一致性、可用性和分区容错性）中，Cassandra\
  \ 提供了可用性和分区容错性功能，并且您还可以配置数据库以提供一致性和分区容错性能力。\n对于读写操作，Cassandra 都提供了可调一致性，这是最终一致性原则的扩展。您可以为特定的读写操作配置一致性，以确保数据一致并满足应用程序要求。这种可调性使\
  \ Cassandra 可以成为一个具有一致性和分区容错性的系统，或者一个高可用且分区容错的系统。也就是说，它允许您配置 Cassandra 来满足 CAP 三个要求中的任意两个。\n\
  通过调整一致性，您间接地调整了性能，因为一致性与延迟之间存在间接关系；配置的一致性越高，延迟越低，反之亦然。\n\n> 注意\n>\n> 一致性级别决定了数据可用性（无延迟）与数据准确性之间的权衡。\n\
  \nCassandra 提供了可配置的读写一致性级别，以满足您的需求，我将在以下部分进行解释。\n\n### 写一致性\n\n您可以配置写一致性级别，以指定在数据库认为写操作成功之前，必须有多少副本确认写请求。一旦您指定的副本数量报告写入成功，发送写请求的协调节点就会通知应用程序写入完成。\n\
  写操作如何处理宕机或不可用的节点？这正是 Cassandra 利用其 **提示移交** 特性的地方，以确保在不可用节点恢复后，将缺失的数据写入该节点。数据库将未写入的数据作为提示存储在协调节点上（在\
  \ `system.hints` 表中），并在节点再次响应时稍后写入这些数据。\n您可以通过发出 `CONSISTENCY` 命令检查默认的一致性级别：\n```\n\
  cqlsh> consistency;\nCurrent consistency level is ONE.\ncqlsh>\n```\n客户端代码可以通过在单个语句中指定所需的一致性级别来覆盖默认的一致性级别：\n\
  ```\nstatement = ...\nstatement.setConsistencyLevel(ConsistencyLevel.LOCAL_ONE);\n\
  ```\n您可以配置各种写一致性级别。在以下部分中，我将从最强（`ALL`）到最弱（`ANY`）描述这些写一致性级别。\n\n#### ALL （强一致性）\n\
  \n`ALL` 一致性级别提供最高级别的一致性，但权衡是，与其他一致性级别相比，它提供的可用性也最低。在 `ALL` 一致性级别下，为了使对一个分区的写入成功，数据库必须在集群中所有副本节点上执行对提交日志和内存表的写入。这意味着必须回复的节点数量应与您配置的副本因子相同。即使只有一个副本没有响应，数据库也会将该写操作标记为失败。\n\
  \n#### 基于仲裁的级别 （强一致性）\n\nCassandra 提供了几个基于仲裁的级别，它们都提供强一致性。以下是不同的基于仲裁的一致性级别：\n- \
  \  `EACH_QUORUM`：通过要求写入必须写到集群中每个数据中心的仲裁副本节点上的提交日志和内存表来提供强一致性。当您希望在多个数据中心集群中确保所有数据中心具有相同的严格一致性时，请指定\
  \ `EACH_QUORUM` 一致性级别。设置此一致性级别意味着，如果一个数据中心宕机，无法在该数据中心达到仲裁，则读取将失败。\n-   `QUORUM`：提供强一致性。在此一致性级别下，如果写入已写入仲裁节点上的提交日志和内存表，Cassandra\
  \ 就认为写入成功。与 `EACH_QUORUM` 一致性级别不同，这些节点可以跨越集群中的多个数据中心。您可以在单个或多个数据中心集群中指定此级别。此级别通过将整个集群视为一个单元而非单个数据中心来帮助您维持强一致性。\n\
  -   `LOCAL_QUORUM`：提供强一致性。此一致性级别要求数据库将写入完成到本地节点（即与协调节点属于同一数据中心的节点）的仲裁节点上的提交日志/内存表。您只能在具有副本放置策略（如\
  \ `NetworkTopologyStrategy`）和适当配置的 Snitch 的多数据中心集群中使用 `LOCAL_QUORUM` 一致性。\n\n> 注意\n\
  >\n> 当您使用 `QUORUM` 一致性级别执行写操作时，即使其中一个副本死亡，您也总能获得正确的数据。\n\n#### ONE、TWO、THREE 和 LOCAL_ONE\
  \ 一致性级别 （弱一致性）\n\n`ONE` 一致性级别并不严格。它要求数据库至少对一个副本节点执行对提交日志和内存表的写入。`TWO` 和 `THREE`\
  \ 一致性级别类似但更严格，因为它们分别要求写入两个和三个副本节点。\n当您的集群中有多个数据中心时，`ONE` 一致性级别是可行且可取的。但是，当一个数据中心离线时，连接会自动切换到其他数据中心的在线节点。\n\
  实现高性能和持久性的最低一致性级别是 `ONE`。即使该单个节点宕机，由于它已经将数据写入提交日志，当它再次启动时可以重放提交日志。\n`LOCAL_ONE`\
  \ 一致性级别通过要求至少一个本地数据中心节点确认写入来防止跨数据中心流量。\n请注意以下几点：\n-   如果您的一致性级别是 `ONE`，并且一个副本在写入后不久崩溃，则数据将丢失。\n\
  -   如果您的一致性级别是 `ONE`，并且写操作超时，后续的读操作可能返回旧值或新值。您将无法知道数据是否正确。\n-   如果您的一致性级别是 `ONE`，一个宕机的节点在恢复时将向您显示过时的数据，直到该节点获得正确的数据或数据库完成读修复操作。\n\
  \n\n\n### ANY\n\n`ANY` 一致性级别提供了最高的可用性，但以一致性为代价，因为此级别提供最低的一致性。此级别保证写入永远不会失败，但你需要为此保证付出写入速度变慢的代价。此一致性级别工作方式如下：\n\
  \n*   数据库必须在集群中的至少一个节点上执行写入。\n*   如果某个分区键的所有节点都不可用，写入仅在其中一个节点重新启动后才会成功，并且，通过提示移交功能，该节点会追赶丢失的写入。因此，这种一致性级别允许一个提示计为一次成功的写入。\n\
  \n一致性级别 `ANY` 适用于希望即使在所有副本节点都关闭的情况下（即即使数据库无法满足 `ONE` 一致性级别）也接受写入的应用程序。一致性级别 `ANY`\
  \ 保证写入是持久的，一旦目标副本变得可用并接收到重放的提示，该写入将可由数据库读取。\n\n### 仲裁的计算\n\n仲裁的概念在配置多种写入和读取一致性级别时起着重要作用。仲裁指的是需要响应的节点数量，以便\
  \ Cassandra 认为写入或读取操作成功。\n\n在单数据中心集群中计算仲裁时，你只需要考虑一个数据中心的复制因子。在多数据中心集群中，你需要考虑所有数据中心的复制因子，这些因子不必相同。集群中的数据中心越多，仲裁就越高，因为需要更多副本节点响应，Cassandra\
  \ 才会认为读/写操作成功。\n\n基于仲裁的一致性级别要求将数据写入至少构成仲裁的节点数量。\n\n你可以借助以下公式计算仲裁：\n\n```\nquorum\
  \ = (sum_of_replication_factors/2) + 1,\n```\n\n其中 `sum_of_replication_factors`\
  \ 的值是集群中所有数据中心的所有 `replication_factor` 设置的总和。\n\n例如，如果复制因子为 3，在单数据中心集群中，仲裁是 3/2\
  \ 加 1，得到 2.5，但你向下舍入为整数，即 2。\n\n仲裁为 2 意味着单数据中心集群可以容忍一个副本宕机。如果仲裁为 4，集群在六个节点中可以容忍两个节点宕机。\n\
  \n重要的是要理解 `LOCAL_QUORUM` 与 `QUORUM` 类似，它考虑的是包含协调节点的节点所在数据中心的复制因子。Cassandra 在计算仲裁时只考虑本地副本节点并忽略其他数据中心。\n\
  \n#### 一致性在实践中的工作原理\n\n你配置的复制因子以及读写一致性级别将共同决定读写操作的可靠性。\n\n例如，如果满足以下条件，数据库可以保证最终一致性：\n\
  \nR + W <=N\n\n其中\n\n*   R 是读操作的一致性级别。\n*   W 是写操作的一致性级别。\n*   N 是复制因子。\n\n假设你将复制级别设置为\
  \ 3。一个使用 `QUORUM` 一致性级别的读操作和一个使用 `ONE` 一致性级别的写操作将确保最终一致性。这是因为 `QUORUM` 一致性级别需要读取两个副本，而\
  \ `ONE` 写入一致性级别需要写入一个副本，总共三个副本，与复制因子数量相同。\n\n如果你需要更强的一致性，可以通过确保在复制级别为 3 时，读写操作的一致性级别总和至少为\
  \ 4 来保证。这意味着读操作可以使用两个副本来验证数据，写操作也将使用两个副本来验证写入，从而产生强一致性。换句话说，你可以通过确保以下条件成立来保证强一致性：\n\
  \n```\nR + W > N\n```\n\n如果速度至关重要，你可以在提供强一致性的同时通过将写入一致性级别降低到 1 但将读取一致性级别提高到 3 来实现。你将更快地写入数据，但读取操作因此会有额外的延迟。\n\
  \n### 读取一致性\n\n与写入一致性一样，你可以配置多个读取一致性级别。并且，在选择各种一致性级别时，与写入一致性情况一样，你面临着一致性和可用性之间的权衡。对于读取操作，你配置的一致性级别决定了在数据库返回结果之前，必须有多少个副本节点成功响应读取请求。最终一致性意味着当数据库等待来自节点的信息时，其他工作会在后台继续进行。\n\
  \n由于 Cassandra 是一个分布式数据库，你查询的数据的最新值不一定在任何给定时间存在于集群的每个节点上。客户端应用程序为其请求配置一致性级别，以管理响应时间和数据准确性之间的权衡。\n\
  \n更高的一致性级别要求更多节点响应查询，从而提供更多保证，确保每个副本中的数据是相同的。如果两个副本返回具有不同时间戳的数据，Cassandra 将具有更近时间戳的数据返回给客户端。然后它会启动一个读修复来更新具有过时值的副本上的值，以便该副本也具有最新值，从而确保其一致性。\n\
  \n简而言之，你可以配置以下读取一致性级别，每个级别都有不同数量的副本参与满足读取请求：\n\n*   `ONE`：从最近的副本返回数据\n*   `QUORUM`：从大多数副本返回最新的数据\n\
  *   `ALL`：从集群中的所有副本返回最新的数据\n\n以下各节总结了每个读取一致性级别的可用性和一致性权衡。\n\n注意\n\n务必理解复制因子和一致性级别之间的差异和关系。你在键空间级别设置复制因子，客户端则按查询指定一致性级别。一致性级别基于复制因子，因为复制因子决定了写入期间存储数据的副本数量。而一致性级别决定了应响应多少个节点以表明读取或写入操作成功。\n\
  \n#### ALL（强一致性）\n\n`ALL` 一致性级别以牺牲可用性为代价提供最高的一致性。当你设置此级别时，数据库仅在收到所有副本的响应后才返回你的查询结果。如果任何副本没有响应，查询将失败。与许多一致性级别一样，数据库会在必要时执行读取修复。\n\
  \n当你指定 `ALL` 一致性级别时，如果集群中持有该数据的任何节点当时无响应或未在超时时间内响应，读取操作将失败。你使用 `rpc_timeout_in_ms`\
  \ 属性配置此超时。默认超时为 10 秒。\n\n\n"
- "# Cassandra 一致性级别与配置\n\n## 基于仲裁的读一致性级别（强一致性）\n\n存在两种基于仲裁的一致性级别：\n\n*   `QUORUM`\
  \ ：仅当来自所有数据中心的仲裁副本响应后，才返回查询结果，从而提供强一致性。在大多数副本响应后，数据库会将具有最新时间戳的值返回给客户端。如果数据库发现某些节点的数据过时，它会对持有过时数据的副本执行读修复。\n\
  *   `LOCAL_QUORUM` ：仅当本地（当前）数据中心的仲裁节点响应后，才返回查询结果，从而提供强一致性。你只能在配置了 `NetworkTopologyStrategy`\
  \ 副本放置策略和适当配置了 snitch 的多数据中心集群中使用此级别。\n\n> 注意\n>\n> `QUORUM` 读一致性级别意味着你总是能检索到正确的数据，即使其中一个副本宕机。\n\
  \n## ONE、TWO、THREE 和 LOCAL_ONE 一致性级别（弱一致性）\n\n`ONE` 一致性级别以牺牲一致性为代价提供了最高的可用性。Cassandra\
  \ 会立即从最近的副本返回查询结果。代价是读取过时数据的可能性很高。数据库也会根据其他副本中的数据检查此数据，如果任何副本过时，数据库会启动读修复以使其他副本保持一致。\n\
  \n> 注意\n>\n> 在 `ONE` 一致性级别下，提供读取服务的副本可能没有数据的最新版本。\n\n`TWO`、`THREE` 和 `LOCAL_ONE`\
  \ 一致性级别与 `ONE` 设置类似：\n\n*   `TWO` 级别从两个最近的副本返回最新数据。\n*   `THREE` 级别从三个最近的副本返回最新数据。\n\
  *   `LOCAL_ONE` 一致性级别与 `ONE` 级别类似，但返回本地数据中心中最近副本的数据。\n\n## 串行一致性设置\n\n你可以配置两种 `SERIAL`\
  \ 一致性级别。第一种 `SERIAL` 允许你读取用户正在进行的轻量级事务所涉及列的最新值。`SERIAL` 一致性级别允许读取最新的数据，包括可能未提交的数据。\n\
  \n`LOCAL_SERIAL` 一致性级别与 `SERIAL` 级别类似，但仅限于数据中心内。你使用此级别来为轻量级事务获得线性一致性。\n\n> 注意\n\
  >\n> 你配置一致性级别是为了在可用性和数据准确性之间进行权衡。\n\n### 配置一致性级别\n\n你可以在会话级别或针对每个读写操作配置一致性级别。\n\n\
  如果你使用 cqlsh，可以使用关键字 `CONSISTENCY` 为当前会话中运行的所有查询设置一致性级别。客户端应用程序通过其驱动程序设置一致性级别。\n\n\
  读写操作的默认一致性级别是 `ONE`。下面的示例说明了这一点：\n\n```\ncqlsh> CONSISTENCY;\nCurrent consistency\
  \ level is ONE.\ncqlsh>\n```\n\n之前，你已经了解了可以设置的各种一致性级别。以下是一些展示如何设置各种一致性级别的例子：\n\n\
  *   设置 `QUORUM` 一致性级别，强制集群中大多数节点在数据库认为操作成功之前进行响应。\n\n    ```\n    cqlsh> CONSISTENCY\
  \ QUORUM;\n    ```\n\n*   对于轻量级事务，设置 `SERIAL` 一致性级别。\n\n    ```\n    cqlsh> CONSISTENCY\
  \ SERIAL;\n    ```\n\n## 三种读请求类型\n\n协调器节点可以向副本节点发送三种类型的读请求：\n\n*   直接读请求：协调器节点包含单个副本节点。\n\
  *   摘要请求：协调器首先联系一个副本节点，然后向你通过 `consistency level` 属性指定的节点数量发送请求。协调器发送的请求检查副本节点上的数据以确保其是最新的。如果协调器发现某些节点有陈旧数据，它会发送一个读修复请求。\n\
  *   后台读修复请求：Cassandra 在后台执行读修复，以确保协调器在摘要请求期间请求的所有行在所有参与该读请求的副本之间保持一致。\n\n### 通过推测重试实现快速读保护\n\
  \n通常，在读请求期间，Cassandra 会向足够的副本发送数据请求以满足一致性级别。你可以配置表的 `speculative_retry` 属性，以利用 Cassandra\
  \ 的能力：当原始副本节点不可用或响应读取请求非常慢时，使用不同的副本节点重试读请求。当你配置此功能后，即使一致性级别已经满足，Cassandra 也会向副本发送额外的读请求。\n\
  \n> 注意\n>\n> 快速读保护确保如果一个副本节点失败或异常缓慢，协调器节点会在超时间隔后自动将读请求发送到其他节点。\n\n当你配置推测重试时，协调器节点在设定的时间过去后自动用不同的节点重试请求。通过这种推测重试读取查询的方式从副本节点故障中恢复被称为快速读保护。\n\
  \n你可以通过设置 `speculative_retry` 属性来配置快速读保护。此属性精确决定协调器节点何时发送额外的读请求。以下是配置此属性的所有方式：\n\
  \n*   `NONE`：这是默认值，指定无论延迟如何，协调器除了原始读请求外不发送任何额外的读请求。\n*   `ALWAYS`：每次读取表后，协调器都会向集群中的所有其他副本节点发送额外的读请求。\n\
  *   `Xpercentile`：这告诉协调器，如果它在为 `Xpercentile` 属性设置值的特定百分比时间内没有收到副本节点的任何响应，就发送冗余读请求。例如，表的典型延迟是\
  \ 60 毫秒，假设你将 `Xpercentile` 属性设置为第 80 百分位。如果副本节点在 48 毫秒（60 毫秒的 80%）内没有响应，Cassandra\
  \ 会向其他副本发送冗余读请求。\n*   `Nms`：在此策略下，如果协调器在 N 毫秒内没有收到副本的响应，它会发送额外的读请求。\n\n以下是如何为表设置\
  \ `speculative_retry` 属性的一些示例：\n\n```\ncqlsh> ALTER TABLE users WITH speculative_retry\
  \ =  '5ms';\ncqlsh> ALTER TABLE users WITH speculative_retry = '95percentile';\n\
  ```\n\n\n### 不同读取一致性级别的读取请求：示例解析\n\n本节将展示若干读取请求的示例，涵盖单数据中心和拥有两个数据中心的集群中不同的读取一致性级别。在所有情况下，副本因子均为\
  \ 3。我将首先介绍单数据中心的场景，然后是拥有两个数据中心的集群场景。\n\n#### 单数据中心\n\n当读取一致性级别设置为 `QUORUM` 时，三个副本中的两个必须响应，读取请求才算成功。如果一行数据存在多个版本，拥有最新版本的副本将满足该读取请求。此外，必要时（如果第三个副本数据过时），数据库还会在第三个副本上启动一个读修复。\n\
  \n将读取一致性级别设置为 `ONE` 意味着数据库将从满足读取请求所需行的最近副本获取数据。根据三个副本之间数据是否存在差异，数据库也可能为另外两个副本启动读修复。这取决于你为表配置的\
  \ `read_repair_chance` 属性。\n\n#### 拥有两个数据中心的集群\n\n如果你将读取一致性设置为 `QUORUM` 且副本因子为 3，那么一个读取请求成功需要四个数据副本（这些副本可以属于任一数据中心）进行响应。数据库会检查其他副本以确保一致性，如果有任何副本数据过时，它将启动读修复以使其更新。\n\
  \n如果你配置的是 `LOCAL_QUORUM` 读取一致性级别，那么与协调节点位于同一数据中心的两个副本必须响应读取请求。\n\n对于读取一致性级别 `ONE`，数据库依赖于最近的副本，而不考虑其所属的数据中心。它也可能根据你为表配置的\
  \ `read_repair_chance` 设置来启动读修复。而对于读取一致性级别 `LOCAL_ONE`，数据库会联系与协调节点在同一数据中心的最近副本。\n\
  \n### 测试一致性级别的性能\n\n正如你刚才所了解的，读取和写入操作都有许多一致性级别可供选择。选择哪个一致性级别对查询和写入延迟以及系统可用性都有显著影响。\n\
  \nDataStax 建议你使用 CQL 的 `TRACING` 命令来测试不同一致性级别的性能。由于 `TRACING` 命令的输出会显示每个读取和写入操作的耗时，你可以在最终选定某个一致性级别之前，比较不同级别的性能表现。\n\
  \n要跟踪使用大数据集的查询，配置概率性跟踪是一个好方法。使用 `nodetool settraceprobability` 命令来配置概率性跟踪。完成此操作后，你可以查询\
  \ `system_traces` 键空间，如下所示：\n\n```\ncqlsh> SELECT * FROM system_traces.events;\n\
  ``\n\n在此，关于概率性跟踪对性能的影响，需要做个说明。经验表明，跟踪功能可能会显著影响数据库性能。因此，请谨慎使用此功能。\n\n当你开启跟踪时，如果副本因子为\
  \ 3，以下是你对三种一致性级别含义的理解：\n\n*   `ONE`：处理三个副本中某一个的响应。\n*   `TWO`：处理三个副本中大多数（即两个）的请求。\n\
  *   `ALL`：处理所有三个副本的响应。\n\n要跟踪查询，你只需在开启跟踪后，运行你想用来测试不同一致性级别差异的查询语句：\n\n```\ncqlsh>\
  \ TRACING on;\ncqlsh> CONSISTENCY QUORUM;\ncqlsh> SELECT * FROM cycling_alt.tester\
  \ where id = 0;\n```\n\n同样地，你也可以跟踪 `ONE` 和 `ALL` 一致性级别带来的影响。\n\n当你处理大数据集，或者当集群中某个节点的速度慢于其他节点时，使用\
  \ `ALL` 一致性设置的性能会比 `QUORUM` 设置更差。\n\n### 通过批处理操作确保原子性\n\n有时，你可能希望将一组操作（插入/更新/删除）作为一个“全有或全无”的单一操作来处理。执行一组操作，使得要么全部成功，要么全部不成功，这被称为原子操作。\n\
  \nCassandra 允许你以原子方式执行批处理操作。对于单个分区，Cassandra 会自动执行批处理操作，无需你进行任何额外操作。对于跨多个分区的批处理操作，Cassandra\
  \ 会使用批处理日志，这意味着你必须配置一些额外事项。\n\n你可以将多个 `INSERT`、`DELETE` 和 `UPDATE` 语句组合成一个单一操作。批处理操作节省了客户端与服务器之间的通信，以及协调节点与副本节点之间的消息传递。\n\
  \n批处理操作是原子的，因为如果批处理中的任何一条语句成功，所有语句都将成功；如果其中一条失败，所有语句都将失败。数据库中的其他事务可以读取和写入被部分执行的批处理操作所影响的数据。\n\
  \n### 配置批处理操作\n\n你可以让 Cassandra 将批处理操作作为“全有或全无”的事务来处理。使用批处理操作时，你可以通过 `max_mutation_size_in_kb`\
  \ 属性来配置批处理中的操作数量。该属性决定了单个批处理变更（即批处理操作）的最大大小。\n\n默认情况下，`max_mutation_size_in_kb`\
  \ 属性被设置为你为 `commitlog_segment_size_in_mb` 属性所设置值的一半，该属性用于设置单个提交日志文件段的大小。`commitlog_segment_size_in_mb`\
  \ 属性的默认值是 32MB。如果你决定为 `max_mutation_size_in_kb` 属性设置自定义值，你必须确保 `commitlog_segment_size_in_mb`\
  \ 属性的值至少是 `max_mutation_size_in_kb/1024` 的两倍。\n\n注意\n\n如果批处理操作的大小大于你为 `max_mutation_size_in_kb`\
  \ 属性配置的值，解决方法并非一味增大提交日志段的大小。问题可能出在低效的数据查询访问方式或错误的数据模型上。\n\n### 单分区和多分区的批处理操作\n\n\
  DataStax 指出，多分区批处理操作存在性能问题。你仅应在确实需要确保原子性时才诉诸多分区批处理操作。在多分区批处理操作中，协调节点可能成为操作期间的瓶颈。批处理操作涉及的分区数量越多，因批处理导致的延迟就越高。\n\
  \n涉及向多个分区写入的批处理操作还要求 Cassandra 访问所有这些节点，从而增加了写入操作的延迟。随着分区数量的增长，写入延迟也会增加。\n\n以下是一个示例，展示了在单个原子操作中执行三次\
  \ `INSERT` 操作的批处理。你希望这三条 `INSERT` 语句要么全部生效，要么全不生效。你以 `BEGIN BATCH` 子句开始批处理操作，并以\
  \ `APPLY BATCH` 子句结束。\n\n```\ncqlsh:cycling> begin batch\n... INSERT INTO cycling.cyclist_expenses\
  \ (cyclist_name, balance) VALUES ('Vera ADRIAN', 0) IF NOT EXISTS;\n... INSERT INTO\
  \ cycling.cyclist_expenses (cyclist_name, expense_id, amount, description, paid)\
  \ VALUES ('Vera ADRIAN', 1, 7.95, 'Breakfast', false);\n... INSERT INTO cycling.cyclist_expenses\
  \ (cyclist_name, balance) VALUES ('Vera ADRIAN',7.95);\n... apply batch;\n[applied]\n\
  \nTrue\ncqlsh:cycling>\n```\n\n如果批处理操作成功，你将看到一个显示 `True` 的确认信息。如果它失败了，你将看到如下所示的确认信息：\n\
  \n```\n[applied]\n\nFalse\n```\n\n由于所有 `INSERT` 语句都写入同一个分区，因此这个批处理写入操作是高效的。\n\n\n\
  \n### 何时适用批处理操作\n\n仅在必须确保一组执行`插入`/`更新`/`删除`操作的原子性时，才考虑使用批处理。仅涉及单个分区的写操作在性能方面没有问题。\n\
  \n即使在涉及多个分区的情况下，如果操作只包含少量的插入或更新，你也可以通过批处理这些操作来确保一致性。\n\n### 轻量级事务\n\n有时，你可能希望按顺序读写数据，例如在处理银行交易时，需要谨慎处理借记和贷记。Cassandra\
  \ 提供了轻量级事务来管理事务中的并发操作。它使用 Paxos 共识协议来实现轻量级事务。Paxos 协议是一种算法，允许集群中的节点就提议达成一致，而无需主节点来协调事务。Paxos\
  \ 是传统两阶段提交（用于协调分布式事务）的一种替代方案。\n\n关系型数据库使用多种隔离级别，包括可串行化隔离级别。Cassandra 使用线性一致性来实现\
  \ Paxos 协议。线性一致性产生的结果与关系型数据库提供的传统可串行化级别相似。\n\nCassandra 使用一种称为比较并设置 (`CAS`) 的事务操作来实现线性一致性。Cassandra\
  \ 比较副本数据，并将任何过时的数据设置为数据库中最一致的值。\n\n### 执行轻量级事务\n\n使用轻量级事务的一个合适场景是，当你必须插入唯一数据（例如用户标识号）时。\n\
  \nCassandra 允许你使用 `IF` 子句来发出 `INSERT` 和 `UPDATE` 语句，以支持轻量级事务。例如，你可以插入一个新的自行车手及其\
  \ ID 号，如下所示：\n\n```\ncqlsh> INSERT INTO cycling.cyclist_name (id, lastname, firstname)\n\
  VALUES (4647f6d3-7bd2-4085-8d6c-1229351b5498, 'KNETEMANN', 'Roxxane')\nIF NOT EXISTS;\n\
  ```\n\n以下语句展示了如何通过在对数据库中已存在数据的操作末尾添加 `IF` 子句，来执行一次轻量级 `CAS` 操作：\n\n```\ncqlsh> UPDATE\
  \ cycling.cyclist_name\nSET firstname = 'Roxane'\nWHERE id = 4647f6d3-7bd2-4085-8d6c-1229351b5498\n\
  IF firstname = 'Roxxane';\n```\n\n### 轻量级事务的工作原理\n\nCassandra 将 Paxos 协议与正常的读写操作交织在一起。轻量级事务不会阻塞正常的读操作和写操作，但它会阻塞其他轻量级事务。\n\
  \n由于混合使用轻量级事务和正常的读写操作可能导致错误，因此你必须对读操作和写操作都使用轻量级事务。例如，以下操作集将失败：\n\n```\nDELETE ...\n\
  INSERT ... IF NOT EXISTS\nSELECT ...\n```\n\n另一方面，以下操作集将正常工作：\n\n```\nDELETE ...\
  \ IF EXISTS\nINSERT ... IF NOT EXISTS\nSELECT ...\n```\n\n### 使用轻量级事务时的注意事项\n\n\
  由于实现 Paxos 协议涉及提议者和接受者之间发生的一系列动作，因此提议轻量级事务的节点与参与事务的其他副本之间会进行多次往返通信。这显然会对性能产生不利影响，因此应谨慎使用轻量级事务，仅在事务操作间的一致性至关重要时才使用。\n\
  \n## 总结\n\n关于 Cassandra 数据建模的关键点在于：查询是一切的核心。你根据预期数据库需要处理的查询来设计表、索引等数据库结构。\n\n理解最终一致性原理、各种读写级别及其含义，有助于你做出最佳选择，以满足应用程序的需求。\n\
  \n# 5. Cassandra 架构\n\nCassandra 具有几个有趣的架构特性，使其有别于关系型数据库。本章介绍 Cassandra 架构。你还将了解\
  \ Cassandra 存储引擎以及数据库如何存储其数据。\n\n本章解释了节点间用于通信的 gossip 协议。读修复和写修复是 Cassandra 提供一致性的方式的一部分。你将学习故障检测和恢复。你将了解提示移交，这是一个确保故障节点接收到其宕机期间发生的所有修改的功能。你还将了解读修复和手动反熵修复。\n\
  \n本章解释了虚拟节点，这是对在集群节点间分配数据的传统方式的重大改进。你将了解各种分区和复制策略，如 `SimpleStrategy` 和 `NetworkTopologyStrategy`，以及如何更改复制策略。你将学习如何选择可用的数据分区策略，以帮助\
  \ Cassandra 在集群节点间分配数据。\n\nCassandra 使用集群的拓扑结构来决定存储数据的位置以及如何最佳地响应查询。为此，它尝试在多个数据中心存储副本以确保可用性。它还将查询发送到本地数据中心以最大限度地降低延迟。\n\
  \n探测器确定 Cassandra 写入和读取的数据中心和机架，对读活动至关重要。你将了解 Cassandra 提供的几种类型的探测器，例如 `GossipingPropertySnitch`\
  \ 和 `Ec2Snitch`。\n\n### 基本集群术语\n\nCassandra 使用一个点对点系统，数据分布在集群中的多个节点上。集群中的节点使用 gossip\
  \ 协议定期交换信息。对于每个客户端操作，集群中的一个节点充当协调者或代理，并确定哪些节点应处理客户端请求。\n\nCassandra 对数据进行分区和复制。它使用提交日志确保数据持久性，并将数据从提交日志写入名为\
  \ `memtable` 的内存结构，然后再写入磁盘上的 `SSTable` 数据文件。\n\n数据库会定期通过丢弃过时数据来压缩数据。为确保数据一致性，Cassandra\
  \ 采用了多种类型的修复机制。\n\n当你在本章及后续章节中处理 Cassandra 架构时，最好刷新一下对一些关键术语的理解。\n\n*   `数据中心` 是集群中为复制目的而配置在一起的一组相关节点。你可以拥有虚拟或物理数据中心。一个数据中心不能跨越物理位置。拥有多个数据中心的目的是防止其他数据节点对数据节点中的事务产生不利影响，并降低延迟。你可以创建包含特定节点类型的数据中心，例如事务型、分析型、搜索型和图类型。\n\
  *   `机架` 是一组逻辑上彼此靠近的节点，通常位于物理机器的同一物理机架内。数据中心是通过网络连接的机架的逻辑分组。\n\n注意\n\nCassandra\
  \ 自带一个名为 `RAC1` 的默认机架和一个名为 `DC1` 的默认单数据中心。\n\n\n\n集群是 Cassandra 数据库的最大部署单元，由位于一个或多个位置的一组节点构成。在\
  \ AWS 中，这些位置即多个可用区。一个集群可以仅包含单个节点、单个数据中心或多个数据中心。集群有时也被称为**环**，因为 Cassandra 通过将数据排列在环中来存储数据。\n\
  \nCassandra 节点是 Cassandra 集群中位于某个具体位置（一台服务器）的一部分，用于存储数据。具体来说，它根据你指定的分区算法来存储经过分区的数据。\n\
  \n提交日志是一种预写式事务日志，Cassandra 将其存储在集群的每个节点上。Cassandra 首先将数据写入仅可追加的提交日志，然后分批或定期将数据刷写到磁盘。提交日志在数据恢复过程中扮演着关键角色。一旦数据库将数据刷写到磁盘，就可以对提交日志进行归档、删除或重用。\n\
  \n内存表是一种内存结构，它是可通过键查找的数据行的缓存。每个内存表存储特定表的数据，当提交日志变满或达到特定间隔（在表级别设置）时，数据库会将内存表的内容刷写到磁盘。\n\
  \nSSTable（排序字符串表）是一个逻辑实体，由磁盘上的多个文件组成。SSTable 是不可变的，且是仅可追加的结构。当 Cassandra 将内存表刷写到磁盘时，就会创建一个\
  \ SSTable。Cassandra 按键对内存表进行排序，并按顺序写入它们以创建 SSTable。这就是 Cassandra 写入速度非常快的原因；它只涉及提交日志的追加和用于刷写数据的顺序写操作。\n\
  \n键空间是一个逻辑容器，包含一个或多个表，类似于关系数据库中的模式。你将数据存储在属于特定键空间的表中。所有数据对象（如表）都必须属于一个键空间。\n*  \
  \ 键空间定义了 Cassandra 如何在集群节点上复制数据。一个键空间具有若干存储属性。键空间还决定了你存储在其中的数据的 RF（副本因子）。你可以在创建键空间时或之后，在键空间级别定义数据复制策略。\n\
  *   为每个应用程序使用单独的键空间是一个好主意。\n\nCQL 表（又称列族）是驻留在键空间中的逻辑实体。表由有序的列组成，数据库按行获取这些列。创建表时必须定义主键。\n\
  \n### 副本放置策略\n\nCassandra 允许你通过在集群节点上存储多个数据副本来复制数据。你可以采用两种策略来让 Cassandra 知道应该如何复制数据：\n\
  *   `SimpleStrategy`用于原型设计。\n*   `NetworkTopologyStrategy`用于生产环境。\n\n### Cassandra\
  \ 如何存储数据\n\n由于 Cassandra 是一种键值存储，它将其数据组织成由若干列（代表值）组成的行。一行属于单个节点，Cassandra 将该行复制到集群中的其他节点。\n\
  \nCassandra 对每行的键进行哈希运算，以确定应将该数据存储在环中的哪个节点。它将集群本身组织成一个节点环，每个节点存储相等数量的哈希值。\n\n假设你正在运行一个四节点\
  \ Cassandra 集群。你有一个键空间，并选择副本因子为 3。假设你在键空间中创建了一个表并向其中插入数据。每次 Cassandra 插入数据时，都会对该行的键值进行哈希运算，以找出负责存储该行的节点。\n\
  \n为简单起见，我们假设哈希值范围是 1-100，尽管实际上哈希值使用 128 位或更大的值。由于集群中有四个节点，节点间划分哈希值的方式如下：\n*   节点\
  \ 1：哈希值 1-25\n*   节点 2：哈希值 26-50\n*   节点 3：哈希值 51-75\n*   节点 4：哈希值 76-100\n\n图 5-1\
  \ 展示了 Cassandra 如何将哈希值分配给四个节点。\n\n![A436674_1_En_5_Fig1_HTML.jpg](img/A436674_1_En_5_Fig1_HTML.jpg)\n\
  \n*图 5-1：节点如何负责各种哈希值*\n\n假设你插入的第一行被 Cassandra 哈希后，哈希值为 65。如图所示，该行属于节点 3，Cassandra\
  \ 还会将数据复制到节点 1 和节点 2。为什么是节点 1 和 2？原因是复制总是以环上的顺时针方向进行。\n\n假设你插入的下一行哈希值为 48。它属于节点\
  \ 2，Cassandra 会将该行复制到节点 3 和节点 4。\n\n这就是 Cassandra 在集群节点间存储数据的核心原理。\n\n理想情况下，集群中的所有节点都拥有相等的哈希值份额，从而也拥有相等的数据集份额。这就是为什么确保为表选择的`主键`具有高基数（许多值）非常重要。这样，行会分散在集群的所有节点中，而不是以倾斜的方式存储，避免某些节点承担比其他节点更多的数据集责任。这会导致存储驱动器上出现热点，因为在读取操作期间，较少的节点在承担大部分工作。\n\
  \n\n\n## Gossip 协议及其对节点通信的帮助\n\nCassandra 使用 **gossip** 协议，节点通过该协议交换自身及其所知其他节点的状态信息，以发现集群中所有节点的位置和状态信息。Gossip\
  \ 协议假设网络功能并非完美，这在分布式网络系统中很常见，并用于分布式数据库中的数据复制。\n\n与人类八卦类似，集群中的对等方（节点）会选择它们希望与之交换信息的节点。`Gossiper`\
  \ 类维护着一个存活节点列表，从而使 gossip 有助于故障检测。\n\nGossip 进程频繁运行（每秒一次），将一个节点的状态消息与最多三个其他节点的状态消息进行交换。当节点启动时，它会向\
  \ gossiper 注册，以接收来自集群中其他节点的端点状态信息，如下所示：\n\n```\nINFO  [main] 2017-06-24 12:19:21,997\
  \ MessagingService.java:733 - Starting Messaging Service on ubuntu/192.168.159.130:7000\
  \ (ens33)\nINFO  [HANDSHAKE-/192.168.159.129] 2017-06-24 12:19:22,199 OutboundTcpConnection.java:510\
  \ - Handshaking version with /192.168.159.129\nINFO  [GossipStage:1] 2017-06-24\
  \ 12:19:22,326 Gossiper.java:1056 - Node /192.168.159.129 is now part of the cluster\n\
  INFO  [RequestResponseStage-1] 2017-06-24 12:19:22,380 Gossiper.java:1020 - InetAddress\
  \ /192.168.159.129 is now UP\nINFO  [main] 2017-06-24 12:19:23,202 StorageService.java:705\
  \ - Loading persisted ring state\nINFO  [main] 2017-06-24 12:19:23,218 StorageService.java:818\
  \ - Starting up server gossip\nINFO  [GossipStage:1] 2017-06-24 12:19:24,596 Gossiper.java:1056\
  \ - Node /192.168.159.129 is now part of the cluster\nINFO  [RequestResponseStage-1]\
  \ 2017-06-24 12:19:24,601 Gossiper.java:1020 - InetAddress /192.168.159.129 is now\
  \ UP\nINFO  [main] 2017-06-24 12:19:31,610 CassandraDaemon.java:725 - No gossip\
  \ backlog; proceeding\n```\n\n而当节点无法获取 gossip 信息时，它也会通过抛出异常让你知道：\n\n```\nINFO  [main]\
  \ 2017-06-24 12:06:00,302 MessagingService.java:733 - Starting Messaging Service\
  \ on\nERROR [main] 2017-06-24 12:06:31,476 CassandraDaemon.java:752 - Exception\
  \ encountered during startup\njava.lang.RuntimeException: Unable to gossip with\
  \ any seeds\nWARN  [StorageServiceShutdownHook] 2017-06-24 12:06:31,564 Gossiper.java:1514\
  \ - No local state, state is in silent shutdown, or node hasn't joined, not announcing\
  \ shutdown\n```\n\nGossip 进程可以是直接的（其他节点向一个节点 gossip），也可以是间接的（节点从其他节点获取信息，而这些信息可能源自更多其他节点）。由于每个节点不仅交换自身状态信息，也交换与之通信的其他节点的状态信息，因此所有节点都将非常迅速地知晓集群中所有其他节点的状态。\n\
  \n当节点相互交换 gossip 信息时，节点的最新状态会覆盖旧的状态信息。\n\n当 gossiper 发现某个端点没有响应时，它会将该端点在其列表中标记为死亡并记录该信息。\n\
  \nCassandra 使用一种称为 **Phi Accrual Failure Detection** 的复杂算法来检测节点故障。该算法不使用简单的节点心跳来表明其存活，而是使用一个**怀疑级别**来确定节点可用性。\n\
  \n心跳提供一个简单的“是/否”标准来判断节点是否存活，而故障检测则使用一个连续的数据范围来做出判断。例如，如果一个节点偶尔因为网络波动而无法接受连接，该节点不会立即被列入死亡节点列表。因此，该算法与现实网络条件相符，并能真实反映节点的健康状况。使用此算法，数据库在节点故障发生后\
  \ 10 秒内即可检测到。\n\n### 配置 Gossip 设置\n\n实际上，你不需要做任何特别设置来配置 gossip，因为在集群中启动 Cassandra\
  \ 节点时，所有必要的属性都已设置好。启动节点时，你需要配置以下属性，它们都有助于节点了解应该联系哪些节点以获取其他节点的 gossip 信息。这些属性还设置了端口和其他相关的\
  \ IP 地址或主机名，以使 Cassandra 能够将节点相互连接。\n\n*   `cluster_name`: 节点所属集群的名称。\n*   `listen_address`:\
  \ Cassandra 必须绑定的 IP 地址/主机名，以便将此节点连接到集群中的其他节点。或者，你可以指定 `listen_interface` 属性来替代\
  \ `listen_address`。\n\n**提示**\n\n每个数据中心指定多个种子节点，这样在引导节点时，gossip 就不必与不同数据中心的节点通信。\n\
  \n*   `seed_provider`: 此属性允许你指定一个主机（IP 地址）列表，gossip 依靠它们来了解环的拓扑结构。你不需要将所有节点都指定为种子节点，因为这会降低\
  \ gossip 性能。DataStax 建议使用少量种子，例如每个数据中心三个节点。你应该为集群中的所有节点指定相同的节点列表。如果你的集群有多个数据中心，请包含来自每个数据中心的至少一个节点作为种子提供者。\n\
  *   `storage_port`: 这是节点间通信端口，它在集群中的所有节点上必须相同。\n\n### 种子节点与 Gossip\n\n在第 3 章中，你了解了在\
  \ `cassandra.yaml` 文件中指定的种子节点。种子节点其实并不那么关键，因为它们的故障不会构成集群的单点故障。它们扮演的唯一角色是为新加入集群的节点引导\
  \ gossip 进程。\n\n你必须确保为集群的所有节点指定一组相同的种子节点。这一点在首次启动节点时尤为重要。\n\n不建议将每个节点都设为种子节点；这只会对\
  \ gossip 性能产生不利影响。理想情况下，你的种子列表应该很小，每个数据中心大约三个节点。如果你有多个数据中心，请在种子列表中包含来自每个数据中心的至少一个节点。\n\
  \n如果你每个数据中心包含两到三个 gossip 种子节点，而不是只指定一个种子节点，这可以保护你免受单个节点故障的影响。否则，当单个种子节点发生故障时，在引导节点过程中，gossip\
  \ 将需要与不同的数据中心进行通信。\n\n\n\n### 故障检测与恢复\n\nCassandra 从八卦状态确定节点的状态（在线/离线），并尽力避免将客户端请求发送到不可达的节点。\n\
  \nCassandra 使用一种**累积检测机制**来确定标记节点为故障的阈值。此阈值考虑网络性能、工作负载和历史数据，以帮助计算节点不可用性的关键阈值。\n\n\
  所有节点都使用故障检测机制来检测集群中其余节点的故障。节点利用八卦消息的延迟，通过对来自其他节点的八卦消息到达时间使用滑动窗口来实现。\n\n您可以通过调整 `cassandra.yaml`\
  \ 文件中的 `phi_convict_threshold` 属性来配置故障检测机制。此属性的默认值为 **8**。如果将此属性的值设置得较高，集群可能会错过短暂的故障。另一方面，较低的值会增加将无响应节点标记为下线节点的可能性。\n\
  \nAmazon EC2 频繁遇到网络拥堵问题。在此类以及其他可能遇到不可用网络的环境中，您可以将 `phi_convict_threshold` 属性的值提高到\
  \ **10** 或 **12**，以避免误导性的故障检测。一般来说，据 DataStax 称，**5** 到 **12** 之间的值在大多数情况下是足够好的。\n\
  \n间歇性节点故障（如由网络中断引起的故障）是短暂的，不会导致节点从环中移除。其余节点将定期尝试联系不可达的节点。\n\n当一个不可达的节点重新上线时，Cassandra\
  \ 使用诸如提示交接和手动修复之类的修复机制，确保该节点能追上其维护的副本数据所错过的写入。\n\n### 修复节点\n\nCassandra 是一个分布式数据库，随着时间的推移，其中一个副本中的数据可能与其他副本的数据产生分歧。节点修复是一个纠正副本之间不一致性的过程，最终所有节点将拥有相同的数据。作为管理员，节点修复是您的关键职责之一，也是您需要定期执行的操作。\n\
  \nCassandra 提供三种类型的修复，其中一些涉及您的手动干预：\n\n*   提示交接\n*   读取修复\n*   反熵修复\n\n以下部分简要解释了各种修复类型。\n\
  \n### 提示交接\n\n提示交接是一个过程：当一个节点作为协调器，无法在另一个节点上执行写入时，它会将数据保存为一组**提示**。当之前不可达的节点稍后变为可用时，协调器节点会移交存储的提示，以帮助另一个节点追上错过的写入。\n\
  \n提示包含关于当时发送给不可用节点的写入请求的数据。提示就像是围绕更改操作的一个包装器，它告诉数据库需要将该数据重放到写入时不可用的节点上。\n\n数据库为每个需要写入数据的分区创建一个单独的提示。一旦协调器节点通过八卦发现故障节点已重新上线，它就会将提示移交给恢复的节点，以写入错过的数据。因此，提示有助于缩短故障节点重新上线后达到一致性所需的时间。\n\
  \n提示交接背后的理念是通过使集群在即使一个或多个节点不可用时也能执行其正常的写入量，来确保集群正常运行。因此，此功能直接贡献了 Cassandra 备受赞誉的高可用性。在一致性不是必需的情况下，提示允许\
  \ Cassandra 提供完整的写入可用性。它们还在诸如网络故障等临时中断后增强了响应一致性。\n\n您可以禁用提示交接，以避免节点可能长时间宕机的情况。这将防止数据库在故障节点重新上线时不得不向其发送大量提示。\n\
  \n在满足一致性级别时，提示不计入一次写入。然而，一致性级别 **ANY** 接受提示作为满足读取操作要求的条件。即使数据库仅写入提示，该写入也会被视为成功。\n\
  \n#### 提示是什么\n\nCassandra 将所有提示存储在本地每个节点的提示目录中。除了数据本身，每个提示还包含一些用于标识提示的属性。一个提示包含以下内容：\n\
  \n*   下线或不可用节点的 ID\n*   提示 ID，这是数据的**时间 UUID**\n*   带有 Cassandra 版本的消息 ID\n*   以\
  \ **blob** 形式存储的数据\n\n数据库每 **10** 秒将所有提示刷新到磁盘，以保持提示的时效性。一旦下线节点重新上线，Cassandra 将所有数据写入该节点，然后删除提示文件。\n\
  \n当 Cassandra 尝试写入一个它知道已下线或没有响应写入请求的副本节点时，协调器节点会在其运行的节点上，将提示存储在 `system.hints` 表中。当八卦机制通知协调器节点故障节点已恢复时，协调器节点会将与每个提示对应的数据行发送给恢复的节点。\n\
  \n对于短暂中断，协调器节点每十分钟检查一次是否有因间歇性故障而可能被错过、且未被故障检测器通过八卦捕获的写入。\n\n#### 提示交接如何工作\n\n要使提示交接工作，首先必须启用它。由于\
  \ `cassandra.yaml` 文件中 `hinted_handoff_enabled` 属性的默认值为 **true**，因此您无需执行任何操作，除非您之前因某些原因禁用了此功能。\n\
  \n您还可以通过传递数据中心列表来按数据中心启用提示交接，如下所示：\n\n```\nhinted_handoff_enabled: DC1, DC3\n```\n\
  \n您可以指定一个不执行提示交接的数据中心列表；也就是说，通过将列入黑名单的数据中心列表作为值传递给 `hinted_handoff_disabled_datacenters`\
  \ 属性，来禁用集群中某些数据中心的功能，如下所示：\n\n```\nhinted_handoff_disabled_datacenters: - DC1 -\
  \ DC2\n```\n\n#### 管理提示交接\n\n默认情况下，数据库将提示存储在以下位置的名为 `hints` 的目录中：\n\n```\n$CASSANDRA_HOME/data/hints\n\
  ```\n\n您可以通过设置 `hints_directory` 属性为 `hints` 目录指定不同的位置。\n\n您可以通过设置 `max_hints_file_size_in_mb`\
  \ 属性（默认为 **128MB**）来配置单个提示文件的最大大小（以兆字节为单位）。您可以通过设置 `hints_compression` 参数让数据库压缩提示文件，该参数默认为\
  \ **LZ4Compressor**。除了 LZ，数据库还支持 **Snappy** 和 **Deflate** 压缩算法作为提示文件的压缩器。\n\n####\
  \ 检查提示交接状态\n\n您可以通过执行 `nodetool` `statushandoff` 命令来查看提示交接的状态：\n\n```\n$ nodetool\
  \  statushandoff\n```\n\n该命令的选项包括主机名、端口号和密码。以下是一个示例：\n\n```\n$ nodetool statushandoff\n\
  Hinted handoff is running\n$\n```\n\n#### 删除所有提示\n\n您可以使用 `nodetool` `truncatehints`\
  \ 命令删除本地节点上或一个或多个端点的所有提示：\n\n```\n$ nodetool  truncatehints --  ...\n```\n\n`endpoints`\
  \ 选项使您能够指定要删除提示的一个或多个 IP 地址或主机名。\n\n\n\n\n## 禁用和启用数据中心的提示\n\n您可以使用 `nodetool enablehintsfordc`\
  \ 命令为数据中心启用提示，该命令的语法如下：\n\n```\n$ nodetool [options] enablehintsfordc [--] <datacenter>\n\
  ```\n\n`datacenter` 选项用于指定您要为其启用提示的数据中心。以下是调用此命令的示例：\n\n```\n$ nodetool -u username\
  \ -pw password enablehintsfordc DC1\n```\n\n之前，我解释了如何在启动集群时配置 `hinted_handoff_disabled_datacenters`\
  \ 属性来将一个或多个数据中心列入黑名单。您可以运行 `nodetool enablehintsfordc` 命令，为在启动时列入黑名单的数据中心启用提示。\n\
  \n如您所料，您可以通过运行 `nodetool disablehintsfordc` 命令来禁用某个数据中心的提示，如下例所示：\n\n```\n$ nodetool\
  \ -u username -pw password disablehintsfordc DC1\n```\n\n通常，当某个特定数据中心宕机但集群其余部分运行正常时，您需要为其禁用提示。在将数据中心故障转移时，也可以这样做。\n\
  \n## 调优暗示交接\n\n您可以控制存活节点向已恢复节点发送提示的速率。这通过设置 `sethintedhandoffthrottlekb` 属性（单位为\
  \ KB/秒）来实现。该属性并非设置从正常节点向恢复节点传输提示的速率，而是设置每个传递线程在传递一个提示后的最大睡眠间隔。\n\n您可以通过以下方式设置 `sethintedhandoffthrottlekb`\
  \ 属性：\n\n```\n$ nodetool sethintedhandoffthrottlekb 4096\n```\n\n此示例展示了如何将暗示交接节流设置为每个传递线程\
  \ 4096 KB/秒。\n\n集群中的节点越多，提示之间的睡眠间隔就越小，因为来自不同节点的所有传递线程共享最大间隔。节点越多，同时传递的提示就越多，因此提示传输之间的实际睡眠间隔就越低。\n\
  \n在多数据中心部署中，您可以通过配置 `max_hints_delivery_threads` 属性（默认值为 2）来加速提示交接。通过提高此值，您可以让数据库在跨数据中心的提示交接过程中使用更多线程来传递提示。\n\
  \n## 停止写入新提示\n\n当节点长时间宕机时，协调器节点将不再写入新的提示。您可以通过 `cassandra.yaml` 文件中的 `max_hint_window_in_ms`\
  \ 属性来配置此时间段。默认情况下，此时间段设置为 3 小时。\n\nCassandra 对数据库生成提示的时间段施加限制的原因是，为了确保当数据库在节点长时间离线后尝试将所有数据写入该节点时，大量存储的提示不会导致资源紧张。\n\
  \n`write_request_timeout_in_ms` 属性指定了协调器在超时之前等待写操作完成的时间（以毫秒为单位）。默认值为 2000 毫秒。\n\n\
  ## 读修复\n\n当 Cassandra 在读取操作期间修复被查询的节点时，它会执行读修复。读修复的范围取决于您为数据库配置的副本因子。如果您将 `CONSISTENCY`\
  \ 级别配置为 `ONE` 或 `ANY`，则协调器节点仅查询单个副本节点。但是，如果您将 `CONSISTENCY` 级别设置为大于 `ONE`，则对于每个读取请求，协调器会联系多个副本节点。\n\
  \n在读取过程中，协调器向拥有副本的节点之一（副本节点）发送请求。同时，对于您配置了 `CONSISTENCY` 级别大于 `ONE` 的所有其他副本节点，它还会发送摘要请求。\n\
  \n如果所有节点都返回相同（一致）的数据，协调器节点会将请求的数据返回给客户端。但是，如果某些副本节点的数据不同，协调器会将数据的最新版本写入到那些持有过时副本的副本节点。\n\
  \n### 随机读修复\n\nCassandra 可以选择自行随机对表的所有副本执行读修复。副本因子与此类随机读修复无关。\n\n您为表设置的 `read_repair_chance`\
  \ 属性决定了数据库执行随机读修复的频率。此属性设置了成功的读取操作触发读修复的概率。此属性的默认值为零，您必须将其设置为零到一之间的值。\n\n`read_repair_chance`\
  \ 属性决定了整个集群中发生读修复的概率，而一个相关的表级属性 `dclocal_read_repair_chance`，则决定了对与协调器在同一数据中心的副本进行读修复的概率。\n\
  \n对于所有压缩策略（已弃用的 `DataTieredCompcationStrategy` 除外），建议将 `read_repair_chance` 属性的值设置为\
  \ 0.2，而对于后者则应设置为零。然而，实际效果可能因情况而异，因此在设置此属性的值时请谨慎行事。\n\n## 快速读保护\n\nCassandra 的快速读保护功能使其能够容忍节点故障而不丢失任何一个请求。如果一个节点丢失，在发生故障检测之前，该失效节点无法处理任何客户端请求。但是，如果您启用了快速读保护，读流量只会出现短暂的下降。\n\
  \n### 为何快速读保护有帮助\n\nCassandra 采用嗅探器将请求发送到负载最低的副本（即最有可能最快响应读取请求的副本）。Cassandra 将正常的读取请求发送到刚好满足一致性级别所需的节点数量。\n\
  \nCassandra 在每种情况下执行的读取请求数量不同，具体数量取决于您配置的一致性级别。例如，以下是 Cassandra 在各种一致性级别下执行的读取请求数量：\n\
  \n*   一致性级别 `ONE`：一个读取请求\n*   一致性级别 `QUORUM`：两个读取请求\n\n图 5-2 展示了协调器如何向节点发送读取请求。\n\
  \n![A436674_1_En_5_Fig2_HTML.jpg](img/A436674_1_En_5_Fig2_HTML.jpg)\n\n**图 5-2**\n\
  协调器如何向集群中的“最佳”节点发送读取请求\n\n`speculative_retry` 属性使您能够配置一个触发器，当请求未在预期时间内得到满足时，触发额外的读取请求。\n\
  \n通过监控未完成的读取请求，快速读保护功能使得协调器能够在目标副本比预期慢时，向其他副本发送冗余请求。也就是说，即使在满足一致性级别要求之后，数据库仍会向其他副本节点发送额外的读取请求。快速读保护在节点故障、或其他导致节点吞吐量减慢的事件、或因集群范围内的、完全的、未节流的压缩而对吞吐量产生不利影响时很有帮助。\n\
  \n\n\n\n#### 配置快速读取保护\n\n您可以通过在表级别设置 `speculative_retry` 属性来配置快速读取保护，可以在创建表时设置，也可以在之后设置。`speculative_retry`\
  \ 属性会覆盖正常的读取超时（当您将 `read_repair_chance` 属性设置为非 1.0 的值时），并发出另一个读取请求。\n\n`speculative_retry`\
  \ 属性可接受以下值：\n\n*   `ALWAYS`：协调节点在每次读取此表后，总是向所有副本发送额外的读取请求。\n*   `NONE`：协调节点在读取此表后，从不发送额外的读取请求。\n\
  *   `Xpercentile`：如果表的延迟高于正常水平，则协调节点发送额外的读取请求。也就是说，当表正常读取延迟的百分比耗尽后，会触发额外的读取。例如，如果表的平均延迟为\
  \ 60 毫秒，协调节点会在等待 48 毫秒（60 毫秒的 80%）后发出额外的读取请求。\n*   `Nms`：如果协调节点在 `N` 毫秒内未从目标节点收到任何结果，则发送额外的读取请求。\n\
  \n`speculative_retry` 属性的默认值是 `99percentile`。您可以在创建表时设置 `speculative_retry` 属性，如下所示，其中使用\
  \ `3ms` 作为触发额外读取请求的标准：\n\n```\nspeculative_retry = '3ms'\n```\n\n您也可以在创建表后配置快速读取保护：\n\
  \n```\ncqlsh> ALTER TABLE users WITH speculative_retry = '10ms';\ncqlsh> ALTER TABLE\
  \ users WITH speculative_retry = '90percentile';\n```\n\n由于 `ALL` 一致性级别要求来自所有副本的响应，因此您无法使用快速读取保护。\n\
  \n通常，集群中的节点越多，快速读取保护对节点的影响越小。这是通过使用虚拟节点在整个集群中分散复制的一个好处。\n\n### 反熵修复\n\n由于频繁的数据删除和节点崩溃，数据可能会随时间变得不一致。在这些情况下，您需要通过执行反熵修复来维护节点。您需要使用\
  \ `nodetool repair` 命令手动执行此修复。反熵修复是管理员的一项常规维护任务。\n\n#### 反熵修复的工作原理\n\n在反熵修复期间，Cassandra\
  \ 会比较所有副本，并将这些副本更新到数据的最新版本。Cassandra 使用 Merkle 树（二进制哈希树），以便可以独立检查数据，而无需协调节点下载整个数据集。\n\
  \n当发起节点检测到参与的对等节点上的 Merkle 树存在差异时，它会交换配置范围的数据，Cassandra 会将新数据写入 SSTable。\n\n您可以在单个节点或集群的所有节点上运行\
  \ `nodetool repair` 命令。发起反熵修复的节点将作为修复操作的协调节点。\n\n虽然您可以让 Cassandra 通过比较节点的所有 SSTable\
  \ 来执行节点的完全修复并进行修复，但默认情况下数据库执行增量修复。增量修复依赖于显示 SSTable 行已修复或未修复的元数据。它会持久化已修复的数据，并仅为那些尚未修复的\
  \ SSTable 构建 Merkle 树。\n\n### 执行手动（反熵）修复\n\n您必须定期执行反熵节点修复，尤其是在数据库中频繁删除时。反熵修复命令的目的有两个：\n\
  \n*   确保集群所有节点上的数据一致性。\n*   修复已关闭节点上的数据不一致。\n\n使用 `nodetool repair` 命令修复一个或多个表。当您执行完全修复时，Cassandra\
  \ 会将 SSTable 标记为已修复。运行 `nodetool repair` 命令是进行例行维护，而不是修复已关闭的节点。\n\n注意\n\n在集群中进行任何拓扑更改后，您不应运行\
  \ `nodetool repair` 命令。\n\n`nodetool repair` 命令有几个参数，如下所示：\n\n```\n$ nodetool [(-h\
  \  | --host )] [(-p  | --port )]\n[(-pw password | --password password)]\n[(-pwf\
  \ passwordFilePath | --password-file passwordFilePath)]\n[(-u username | --username\
  \ username)] repair\n[(-dc specific_dc | --in-dc specific_dc)...] [(-pl | --pull)]\n\
  [(-dcpar | --dc-parallel)] [(-et end_token | --end-token end_token)]\n[(-full |\
  \ --full)]\n[(-hosts specific_host | --in-hosts specific_host)...]\n[(-j job_threads\
  \ | --job-threads job_threads)]\n[(-local | --in-local-dc)] [(-pr | --partitioner-range)]\n\
  [(-seq | --sequential)]\n[(-st start_token | --start-token start_token)] [(-tr |\
  \ --trace)]\n[--] [keyspace tables...]\n```\n\n在以下部分中，我将展示在运行 `nodetool repair`\
  \ 命令时如何配置最重要的参数。\n\n#### 完全修复与增量修复\n\n您可以配置 `nodetool repair` 的选项，让您以完全或增量方式执行修复。\n\
  \n修复的默认模式是增量修复，它的性能优于完全修复，因为数据库只需要为那些之前未修复的 SSTable 计算 Merkle 树。也就是说，数据库会跳过标记为已修复的\
  \ SSTable。通过执行频繁的增量修复，您可以使修复过程保持简短和高效。\n\n您可以通过指定 `-full` 选项来执行完全修复。`-hosts` 选项让您指定用于修复任何不良节点的良好节点，这些节点通过\
  \ `-h` 选项指定。\n\n完全修复可防止反压缩，即将 SSTable 拆分为两个表的过程，其中一个表包含已修复的数据，另一个包含原始数据。\n\n####\
  \ 顺序修复与并行修复\n\n如果您想快速完成修复并且有足够的资源可用，您可以选择执行并行修复，这意味着数据库并行修复所有数据中心。\n\n如果您想执行并行修复，请指定\
  \ `-dcpar` 选项；您可能实际上不需要这样做，因为并行修复是默认设置。以下命令执行并行修复：\n\n```\n$ nodetool repair\n```\n\
  \n并行修复的替代方法是顺序修复。以下 `nodetool repair` 命令在此节点上顺序修复所有键空间：\n\n```\n$ nodetool repair\
  \ -seq\n```\n\n#### 分区范围修复\n\n由于 Cassandra 会复制数据，如果您一次修复一个节点，最终可能会导致数据库多次修复相同的数据范围。您可以通过让\
  \ `nodetool repair` 命令仅修复一次特定数据范围来节省资源。\n\n您可以通过指定 `-pr` 选项来执行分区范围修复。虽然此选项很好，但它不能与默认模式的增量修复结合使用。以下示例展示了如何通过使用节点\
  \ `10.2.2.30` 或节点 `10.2.2.31` 上的良好分区，来修复此节点上不良分区的分区范围修复：\n\n```\n$ nodetool repair\
  \ -pr hosts 10.2.2.30 10.2.2.31\n```\n\n提示\n\nDataStax 建议您在可能的情况下，在修复期间使用并行和分区范围选项。\n\
  \n\n## 限制修复操作至本地数据中心（对比集群范围修复）\n\n默认情况下，`nodetool repair` 命令会在集群范围内运行修复过程，即在包含副本的每个节点上运行，而不论其数据中心位置。如果你有三个数据中心，副本因子为\
  \ 3，那么你就是在要求修复过程构建九个 Merkel 表，这会导致你的网络和其他资源使用量激增。\n\n你可以将修复限制在特定数据中心，或者仅限于运行修复命令的本地节点。指定\
  \ `-dc` 或 `--in-dc` 选项可以将修复限制在特定数据中心。以下示例展示了如何通过指定 `-dc` 选项将节点修复仅限制在本地数据中心 DC1：\n\
  \n```\n$ nodetool repair -dc DC1\n```\n\n## 节点范围对比子范围修复\n\n默认情况下，Cassandra 会修复一个节点或节点范围上的所有分区范围。或者，你也可以通过指定\
  \ `-st`（或 `-start-token`）和 `-et`（或 `-end-token`）选项来运行子范围修复。\n\n子范围修复使你能够精确定位分区范围以修复错误，但它需要生成的令牌范围。\n\
  \n## 何时以及多长时间执行一次反熵修复\n\n有几种情况需要进行节点修复，我在此总结如下。\n\n*   将其作为常规维护操作运行，尤其是在数据库中频繁发生删除操作时。\n\
  *   修复那些包含很少被读取的数据的节点，因为它们不会经历读取修复。\n*   在你从故障中恢复的节点上运行修复。\n*   你还必须运行修复以恢复丢失的数据，或者当\
  \ SSTable 损坏时。\n\n理想情况下，你应该每天运行增量修复，而较少频率地运行完整修复，例如每月一次，除非你认为需要更频繁地进行。即使你没有任何数据删除，完整修复也很有用，因为它有助于维护数据完整性。\n\
  \n表属性 `gc_grace_seconds` 与你修复节点的频率有很大关系。`gc_grace_seconds` 表选项指定了数据库将数据标记为删除标记（称为墓碑）后，经过多长时间该数据才有资格被删除。默认情况下，这个间隔是\
  \ 24 小时（864,000 秒），这为数据库提供了在永久删除数据之前最大化一致性的时间。\n\nCassandra 延迟垃圾回收（通过配置 `gc_grace_seconds`\
  \ 属性设置垃圾回收宽限期的值）的原因，是让不可用的节点有足够的时间恢复。如果节点在此期限内没有启动，数据库将视其为故障节点。\n\n由于 `gc_grace_seconds`\
  \ 属性的默认值是 24 小时，因此最好每天运行一次修复，以便正确处理所有已删除的数据。对于很少被删除或修改的数据，你可以为 `gc_grace_seconds`\
  \ 属性设置更长的间隔。在这种情况下，你可以减少对这些表执行修复的频率。\n\n## 迁移到增量修复\n\n尽管增量修复比完整修复高效得多，但第一次执行该过程可能需要很长时间，因为\
  \ Cassandra 需要重新压缩所有 SSTable。DataStax 建议你一次将集群中的一个节点迁移到增量修复。以下步骤展示了如何进行迁移。\n\n1.\
  \  禁用自动压缩。\n    ```\n    $ nodetool disableautocompaction\n    ```\n2.  将节点的 SSTable\
  \ 列表保存在一个文本文件中，例如 `SSTable-names.txt`。你会在 `/var/lib/cassandra/data` 目录下找到 SSTable。在\
  \ `data` 目录中，每个键空间都有一个目录，其中包含该键空间中每个 SSTable 的文件列表。你需要列出所有包含 SSTable 数据的文件。这些文件具有以下格式：\n\
  \    ```\n    ---Data.db\n    ```\n    以下命令可帮助你列出键空间中的所有 `Data.db` 文件：\n    ```\n\
  \    $ find '/homeuser/Datastax-ddc-3.2.0/data/keyspace1' -iname \"*Data.db*\"\n\
  \    ```\n    你生成的 SSTable 文件列表（`.db` 文件）将如下所示：\n    ```\n    /data/cycling/cyclist_by_country-82246fc065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
  \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-1-big-Data.db\n\
  \    /data/cycling/cyclist_by_birthday-8248246065ff11e5a4c58b496c707234/ma-2-big-Data.db\n\
  \    ```\n    将 SSTable 列表收集到文本文件中有助于你在第 5 步执行批处理以将所有 SSTable 标记为已修复。\n3.  仅在此节点上运行完整修复。\n\
  \    ```\n    $ nodetool repair\n    ```\n    默认情况下，修复是完整且顺序执行的（而非并行）。\n4.  关闭节点。\n\
  5.  使用 `sstablerepairedset` 命令将所有 SSTable 上的 `repairedAt` 标志设置为 `--is-repaired`。在运行增量修复之前，必须设置\
  \ SSTable 的修复状态。\n    ```\n    $ sudo sstablerepairedset --really-set --is-repaired\
  \ -f SSTble-names.txt\n    ```\n    `sstablerepairedset` 工具通过将表标记为已修复或未修复来设置一个或多个\
  \ SSTable 的 `repairedAt` 状态。在这个例子中，你使用了一个包含 SSTable 文件列表的文件，但你也可以指定单个 SSTable 来标记单个表的修复状态。\n\
  6.  修复完成后，重新启动节点。\n\n一旦你迁移了集群中的所有节点，你就可以在每个节点上执行增量修复（使用 `nodetool repair --inc`\
  \ 命令）。\n\n### 数据分布与复制\n\n副本是表中一行的拷贝。当 Cassandra 首次将数据写入表时，也将其称为副本。\n\n数据分布和复制是影响\
  \ Cassandra 性能的关键主题。要理解 Cassandra 如何在集群中分布数据并复制该数据的副本，你需要理解以下主题：\n\n*   虚拟节点\n*\
  \   复制策略\n*   分区器与分区策略\n*   探测器\n\n在以下部分，我将解释 Cassandra 数据分布和复制的这些关键要素。\n\n\n###\
  \ 虚拟节点与数据所有权\n\n你可以使用单令牌架构或虚拟节点来确定 Cassandra 如何在集群中的节点间分配数据。\n\n数据库将集群中的数据表示为一个环，每个节点负责环数据的一个片段。Cassandra\
  \ 为每个节点分配一个或多个由令牌描述的数据范围。令牌是一个 64 位整数 ID，用于标识环中的分区。令牌的取值范围从-2 的 63 次方到 2 的 63 次方减\
  \ 1。令牌决定了节点在环中的位置。\n\n环中的每个节点拥有的值范围大于前一个节点的令牌，且小于或等于其自身的令牌。这样，令牌范围就分布在位于不同机架的节点上。\n\
  \n虚拟节点（简称 vnodes）可以帮助你以比计算令牌更细的粒度来分配数据。Vnodes 会自动计算并为集群中的每个节点分配令牌。这消除了你通过计算和分配令牌来确定分区范围的需要。\n\
  \n在非 vnode 环境中，每个节点只有一个令牌，大多数情况下节点在环空间中只拥有一个连续的范围，并且通常每个节点一个范围。Vnodes 允许多个随机选择的、非连续的令牌或范围，从而为每个节点提供许多属于它的小令牌范围。\n\
  \n每个虚拟节点拥有令牌空间的一部分。Cassandra 将虚拟节点随机分配到物理节点上；一个物理节点不拥有连续的虚拟节点范围。Cassandra 建议在集群中使用\
  \ 256 个虚拟节点，因此如果你有 16 个节点，每个物理节点将随机分配到 16 个虚拟节点，每个虚拟节点负责一个不同的令牌范围。\n\n由于你总是在 Cassandra\
  \ 数据库中复制数据，这意味着数据库将每个虚拟节点存储在多个节点上。\n\n当添加或删除节点时，Vnodes 可以轻松地在集群中重新平衡数据。新节点会自动从其他节点接管等量的数据。同样，当一个节点离开集群时，其他节点会自行分配它的数据。一个失效节点可以快速重建，因为集群中的所有节点都会帮助将其数据分布到自身之上。\n\
  \nVnodes 有助于你采用异构硬件，因为它们允许你根据节点的物理容量来改变分配给每个节点的 vnodes 比例。\n\n你可以在整个集群中使用不同的令牌架构，不同的数据中心采用不同的架构。也就是说，一些数据中心可能使用\
  \ vnodes，而其他数据中心则不使用 vnodes。但是，单个数据中心中的所有节点必须要么启用 vnodes，要么使用单令牌架构。\n\n### 数据如何在集群中分布\n\
  \n当你创建一个数据中心时，数据库会在节点间均匀分配工作负载。随着时间的推移，当你添加和/或删除节点时，数据中心的拓扑结构会发生变化，工作负载可能会变得不均衡。\n\
  \n令牌将数据范围分配给 Cassandra 集群中的特定节点。节点的令牌（或多个令牌）决定了该节点的数据范围。每个节点负责从其自身到其前驱节点之间的环区域。\n\
  \n假设令牌范围是 0 到 100，并且你集群中有四个节点。那么节点的令牌将是 0、25、50 和 75，确保每个节点负责相等的数据范围。\n\n在早期版本（Cassandra\
  \ 1.2 之前），你必须为每个节点计算并分配一个单一的令牌。图 5-3 展示了这种架构。\n\n![A436674_1_En_5_Fig3_HTML.jpg](img/A436674_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n单令牌架构\n\n如图 5-3 所示，六个节点中的每一个（`Node1`–`Node6`）都被分配了一个单一的令牌，分别是`A`、`B`、`C`、`D`、`E`和`F`。单个令牌代表环中的一个位置。每个节点将拥有通过将分区键映射到分配给该节点的数据范围内的令牌值来确定的数据。\n\
  \n> 提示\n>\n> 没有什么能阻止你将复制因子设置得大于集群中的节点数。通常这样做并不是一个明智的主意，因为它实际上并不能提供更高的可靠性。然而，在某些情况下，你可以这样做，以预期将来会添加更多节点。\n\
  \n假设复制因子大于 1，除了分配给它的范围之外，每个节点还将存储来自其他节点的行副本。例如，假设复制因子为 4，图 5-4 显示了每个节点如何存储来自分配给它的单一范围之外的数据。此外，每个节点在环空间中占据一个连续的分区范围。\n\
  \n虚拟节点允许每个节点拥有多个分布在集群中的较小分区范围，而不是单一的令牌。与单一令牌类似，Vnodes 使用一致性哈希来在集群中分布数据，而无需生成和分配令牌。图\
  \ 5-4 显示了一个带有虚拟节点的环。\n\n![A436674_1_En_5_Fig4_HTML.jpg](img/A436674_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n\n带有虚拟节点的环\n\n如图 5-4 所示，虚拟节点是非连续的，并随机分配给节点。Cassandra 通过分区键的哈希值来确定必须将表行分配到哪个分区范围。\n\
  \n#### 一致性哈希\n\nCassandra 使用一致性哈希根据分区键对数据进行分区。这使得集群在添加或删除节点时能够以最小的数据重组在节点间分配数据。\n\
  \n假设你有一个四节点集群，表中有以下数据：\n\n| 姓名 | 年龄 | 汽车 | 性别 |\n| --- | --- | --- | --- |\n| Jim\
  \ | 36 | Camaro | M |\n| Carol | 37 | BMW | F |\n| Johnny | 12 | Ferrari | M |\n\
  | Suzy | 10 | Ford | F |\n\n四个节点中的每一个都负责一个基于哈希值的数据范围。假设你使用默认的 `Murmur3 分区策略`，Cassandra\
  \ 为每个分区键分配以下哈希值：\n\n| 分区键 | Murmur3 哈希值 |\n| --- | --- |\n| Jim | -2245462676723223822\
  \ |\n| Carol | 7723358927203680754 |\n| Johnny | -6723372854036780875 |\n| Suzy\
  \ | 1168604627387940318 |\n\nCassandra 根据分区键的值确定应该在哪些节点上存储这四个值。如你所见，分区键被哈希到一个特定的范围，每个节点被分配了一个范围。在此示例中，Cassandra\
  \ 将四行数据存储在四个节点中，如下所示：\n\n| 节点 | 起始范围 | 结束范围 | 分区键 | 哈希值 |\n| --- | --- | --- | ---\
  \ | --- |\n| A | -9223372036854775808 | -4611686018427387904 | Johnny | -6723372854036780875\
  \ |\n| B | -4611686018427387903 | -1 | Jim | -245462676723223822 |\n| C | 0 | 4611686018427387903\
  \ | Suzy | 1168604627387940318 |\n| D | 4611686018427387904 | 9223372036854775807\
  \ | Carol | 7723358927203680754 |\n\n> 注意\n>\n> 你必须为数据中心中的所有节点使用相同的令牌架构，无论是基于单令牌的还是基于\
  \ vnode 的架构。\n\n### 如何分配令牌范围\n\n当你启用 vnodes 时，在数据中心中有两种分配令牌范围的方法：分配算法和随机选择算法。我将在本节解释这些算法。\n\
  \n\n#### 分配算法\n\n分配算法仅支持两种分区器 `Murmur3Partitioner` 和 `RandomPartitioner`，它致力于使用较少的令牌来平衡工作负载。你可以使用大量令牌来分散工作负载，但这也意味着你必须管理所有这些令牌。\n\
  \n分配算法使用 `num_tokens` 属性设置，按比例分配令牌范围。对于给定的复制因子，该算法会尝试选择令牌，以优化集群节点间的复制负载。它会为每个节点分配与节点数量成比例的负载。\n\
  \n提示\n\n推荐做法是使用 8 个虚拟节点（令牌），以便在高效分布工作负载和性能之间取得理想平衡。分配算法通过利用数据中心密钥空间的复制因子，将令牌范围最优地分配到节点和机架上。如果你使用的是\
  \ Cassandra 3.4 或更低版本，你需要使用 256 个节点，或者创建并销毁虚拟节点，直到获得令人满意的数据分布。\n\n要设置分配算法，请将 `allocate_tokens_for_local_replication_factor`\
  \ 属性配置为数据中心内密钥空间的复制因子。\n\n#### 随机选择算法\n\n随机选择算法会将令牌范围随机分配到数据中心内的节点上。要使用此算法，你必须配置\
  \ `num_tokens` 属性。\n\n数据库根据分配给数据中心内节点的令牌数量，将令牌范围分配给节点。例如，你可以为事务密集型数据中心将虚拟节点（令牌）的数量设置为\
  \ 128。\n\n#### 启用虚拟节点\n\n除非集群节点的硬件配置不同，否则应在每个节点上配置相同数量的虚拟节点。如果节点的硬件容量不同，你可以为节点分配不同数量的虚拟节点，例如为较小的机器分配\
  \ 128 个虚拟节点，为性能强得多的机器分配 256 个虚拟节点。虽然这在技术上是可行的，但这不是推荐的做法，因为这可能会导致数据集不平衡。\n\nCassandra\
  \ 默认启用虚拟节点。你可以使用 `num_tokens` 参数设置节点上的令牌数量。此参数的默认值为 256。如果你决定不使用虚拟节点，而是配置传统的令牌范围，必须通过将\
  \ `num_tokens` 属性设置为 1 或注释掉该属性来禁用虚拟节点。然后，你必须在每个节点上设置 `initial_token` 属性，以指定该节点将拥有的令牌范围。\n\
  \n当你使用 `num_tokens` 参数配置虚拟节点时，不要设置 `initial_token` 参数；`initial_token` 参数用于指定单个令牌，如前所述。\n\
  \n提示\n\n`initial_token` 参数仅适用于旧版集群。所有新集群都应使用 `num_tokens` 参数来配置虚拟节点。`initial_token`\
  \ 参数允许你手动指定令牌。\n\n#### 禁用虚拟节点\n\n如果你决定不使用虚拟节点，必须确保每个节点分配的数据量大致相同。你可以通过为每个节点分配一个初始令牌值，然后为每个数据中心计算令牌来实现这一点。\n\
  \n要禁用虚拟节点，请按如下方式配置 `cassandra.yaml` 文件：\n\n```\n1. 注释掉 `num_tokens` 和 `allocate_tokens_for_local_replication_factor`\
  \ 属性。\n2. 将 `initial_token` 属性设置为 1。\n```\n\n### 选择复制策略\n\n复制是 Cassandra 如何在多个节点上存储数据副本，以实现高可用性和容错能力的方式。复制因子决定了\
  \ Cassandra 将为表中的每一行存储多少个副本。复制因子为 1 意味着 Cassandra 将保留每行的单个副本，复制因子为 2 意味着数据库将存储每行的两个副本，且这两个副本存储在两个不同的节点上。\n\
  \nCassandra 将副本存储在多个节点上，以实现可靠和容错的操作。术语“复制策略”指的是 Cassandra 如何精确确定应在多少个节点上存储副本。如果你的集群有多个节点，可以将复制因子设置为大于\
  \ 1，以确保即使集群中有一个或多个节点不可用，表数据仍然可用。\n\n数据库会将数据的第一个副本存储在拥有令牌所在范围的节点上。它使用你配置的复制策略来确定应在哪些节点上放置其余副本。\n\
  \n显然，指定复制因子为 1 意味着，如果持有副本的节点崩溃，你将无法访问该行。此外，复制因子越高，存储这些行所需的存储空间就越多。\n\n复制组决定了你在单个数据中心中存储多少个副本。你不需要在集群的所有数据中心中存储相同数量的副本。例如，你可以在一个数据中心存储三个副本以服务于实时应用程序，在另一个数据中心存储一个副本以服务于分析查询。\n\
  \n有两种基本的复制策略：\n\n*   `SimpleStrategy`\n*   `NetworkTopologyStrategy`\n\n以下部分将解释这两种基本复制策略。\n\
  \n#### SimpleStrategy\n\n在 `SimpleStrategy` 下，Cassandra 将第一个副本存储在分区器确定的节点上，并将其余副本按顺时针方向放置在环中剩余的节点上。此策略忽略了集群拓扑，即机架和数据中心的位置。\n\
  \n提示\n\n对于大多数部署，强烈建议使用 `NetworkTopologyStrategy`，因为它更便于将来扩展到多个数据中心。\n\n`SimpleStrategy`\
  \ 复制策略仅在你拥有单个数据中心和机架时适用。如果你计划使用多个数据中心，则必须使用 `NetworkTopologyStrategy`。\n\n#### NetworkTopologyStrategy\n\
  \n在 `NetworkTopologyStrategy` 下，你可以指定希望在每个数据中心拥有多少个副本。显然，此策略是为多数据中心集群设计的。\n\n`NetworkTopologyStrategy`\
  \ 会尝试将副本放置在多个机架上，因为同一机架中的所有节点往往同时发生故障。使用此策略时，你主要需要权衡的是减少延迟的本地读取与潜在故障可能性之间的关系。\n\n\
  处理多数据中心时，最常见的配置如下：\n\n*   每个数据中心两个副本：此策略使你能够在每个复制组中承受单个节点故障，同时支持本地读取（一致性级别为 `ONE`）。\n\
  *   每个数据中心三个副本：此策略使你能够在一致性级别为 `ONE` 时，承受每个数据中心多个节点的故障。它还能帮助你在使用 `LOCAL_QUORUM` 一致性级别时，容忍每个复制组中单个节点的故障。\n\
  \n\n## 动态环参与\n\n您可以在不影响集群中其他节点的情况下启动和停止 Cassandra 集群中的节点。在下面的示例中，您关闭了测试集群中两个节点之一。然后您检查第二个节点的日志。\n\
  \n```\nINFO  [GossipTasks:1] 2017-06-25 08:35:01,697 Gossiper.java:1035 - InetAddress\
  \ /192.168.159.129 is now DOWN\n```\n\n接着，您启动之前关闭的节点。您再次检查正常运行节点的日志。\n\n```\nINFO\
  \  [HANDSHAKE-/192.168.159.129] 2017-06-25 08:39:05,030 OutboundTcpConnection.java:510\
  \ - Handshaking version with /192.168.159.129\nINFO  [GossipStage:1] 2017-06-25\
  \ 08:39:06,134 Gossiper.java:1054 - Node /192.168.159.129 has restarted, now UP\n\
  INFO  [GossipStage:1] 2017-06-25 08:39:06,139 StorageService.java:2248 - Node /192.168.159.129\
  \ state jump to NORMAL\nINFO  [GossipStage:1] 2017-06-25 08:39:06,170 TokenMetadata.java:479\
  \ - Updating topology for /192.168.159.129\nINFO  [RequestResponseStage-1] 2017-06-25\
  \ 08:39:06,352 Gossiper.java:1020 - InetAddress /192.168.159.129 is now UP\n```\n\
  \n如您所见，Cassandra 会自动检测节点的故障和重启。您无需进行任何操作。\n\n## 更改复制策略\n\n您在键空间级别设置复制因子和复制策略。以下示例展示了如何将一个键空间从默认的`SimpleStrategy`切换为`NetworkTopologyStrategy`：\n\
  \n```\ncqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
  \ 'DC1' : 3};\n```\n\n在此示例中，您为名为 DC1 的单个数据中心切换了键空间复制策略。\n\n在下面的示例中，您将一个键空间的复制限制在选定的数据中心，并将排除的数据中心的复制因子设置为\
  \ 0：\n\n```\ncqlsh> ALTER KEYSPACE cycling WITH REPLICATION = {'class' : 'NetworkTopologyStrategy',\
  \ 'DC1'  : 0, 'DC2' : 3, 'DC3' : 0 };\n```\n\n### 分区器与分区策略\n\nCassandra 使用分区器来帮助它在集群中的节点之间分配数据。分区器通过将数据均匀分布在集群中的所有节点上来实现负载均衡。分区器是一个函数，Cassandra\
  \ 通过对主键进行哈希运算来派生代表一行的令牌。然后，Cassandra 基于通过分区器派生的令牌值将数据分布在各个节点上。\n\n#### 分区器类型\n\n\
  Cassandra 提供三种类型的分区器，但由于各种缺点，它建议您不要使用`ByteOrderedPartitioner`，包含它仅是为了向后兼容。\n\n您可以选择的另外两种分区器是`Murmur3Partitioner`（默认分区器）和`RandomPartitioner`。两者都使用令牌在所有节点上分配等量的数据，并将表数据均匀分布在环或键空间上。\n\
  \n由于哈希范围的每个部分包含（平均）相等数量的行，读写请求得以均匀分布。\n\n这两种分区器都基于每个行键的哈希值在集群中分配数据。两者之间的区别在于它们如何生成令牌哈希值。`Murmur3Partitioner`使用`Murmurhash`函数提供更快的哈希运算，该函数为分区键创建一个\
  \ 64 位的哈希值。\n\n`RandomPartitioner`通过使用加密哈希生成令牌哈希值来在集群中分配数据。由于使用加密哈希，`RandomPartitioner`生成令牌哈希值需要更长时间。由于\
  \ Cassandra 不需要加密哈希，使用替代方案`Murmur3Partitioner`将带来 3-5 倍的性能提升。\n\n提示\n\n`Murmur3Partitioner`在性能上比`RandomPartitioner`快\
  \ 3-5 倍。\n\n`Murmur3Partitioner`是默认的分区策略，在大多数情况下都表现良好。但请注意，一旦您使用一种分区器对数据进行了分区，就很难再转换为另一种分区器。\n\
  \n#### 生成令牌\n\n如果您使用的是虚拟节点（vnodes），则无需计算令牌。否则，您必须为集群计算令牌。您可以在配置集群（`cassandra.yaml`文件）时使用`initial_token`参数分配这些令牌。\n\
  \n如果您只有一个数据中心，则通过将哈希范围除以节点数来计算令牌。如果您有多个数据中心，则必须通过将哈希范围除以每个数据中心中的节点数来为每个数据中心计算令牌。\n\
  \n如何计算令牌取决于您的分区策略。假设您使用的是默认的`Murmur3Partitioner`，您可以通过以下方式生成令牌：\n\n```\npython -c\
  \ \"print [str(((2**64 / number_of_tokens) * i) - 2**63) for i in range(number_of_tokens)]\"\
  \n```\n\n如果您的集群中有六个节点，您需要运行的 Python 命令是：\n\n```\npython -c \"print [str(((2**64\
  \ / 6) * i) - 2**63) for i in range(6)]\"\n```\n\n该命令将显示集群中六个节点各自的令牌，然后您可以将它们指定为`cassandra.yaml`文件中`initial_token`参数的值。\n\
  \n```\n[ '-9223372036854775808', '-6148914691236517206', '-3074457345618258604',\
  \ '-2', '3074457345618258600', '6148914691236517202' ]\n```\n\n#### 设置 initial_tokens\
  \ 和 num_tokens 属性\n\n默认情况下，对于单节点每令牌架构，`initial_token`属性是禁用的。如果节点在环空间中拥有一个连续的范围，则必须设置`initial_token`属性。设置此属性后，它将覆盖`num_token`属性。\n\
  \n当首次启动生产集群或添加节点时，如果满足以下任一条件，请始终设置`initial_token`值：\n\n*   您未使用 vnodes。\n*   您已将节点的`num_tokens`属性设置为\
  \ 1。\n\n您为虚拟节点架构设置`num_tokens`属性，以确定分配给 vnode 的令牌范围数量。此属性的默认值为 1（已禁用），这意味着 vnodes\
  \ 处于禁用状态。您可以为该属性指定一个介于 1 和 256 之间的数字。\n\n如果集群中的所有物理节点完全相同，您必须在所有节点上为`num_tokens`属性指定相同的值。\n\
  \n\n\n### 探嗅器\n\n探嗅器的工作是确定每个节点相对于集群中其他节点的位置。探嗅器帮助数据库确定响应查询的最快方式。探嗅器帮助 Cassandra\
  \ 判断应该使用哪些数据中心和机架来读取和写入数据。探嗅器决定了 Cassandra 如何分配副本。探嗅器让 Cassandra 感知网络拓扑，从而能够通过将节点分组到数据中心和机架中来高效地路由请求。\n\
  \n探嗅器计算节点之间的距离，并找出哪些节点彼此接近。它利用这些信息帮助数据库将请求路由到最佳节点。这里的最佳节点指的是能最快返回数据的副本。\n\n探嗅器是\
  \ Cassandra 架构中的一个关键组件，有助于确定节点所属的数据中心和机架。探嗅器将集群中节点的 IP 地址映射到机架和数据中心。机架是一个物理实体，而数据中心是一个虚拟实体。\n\
  \n探嗅器对读取活动至关重要。读取数据时，Cassandra 只向一个节点请求数据，并且根据你配置的一致性级别和读取修复概率，只从其他副本请求校验和。\n\n\
  当有多个副本可供协调节点请求实际数据时，Cassandra 需要选择应该让哪个副本发送完整数据（而不仅仅是校验和）。探嗅器监控各个副本的读取性能，并根据副本的历史性能数据选择最佳副本。\n\
  \n注意\n\n探嗅器的选择影响着 Cassandra 放置副本的位置。探嗅器的目的是高效路由请求并均匀分布副本。\n\nCassandra 的一个关键目标是避免将同一数据的多个副本存储在同一个机架上。你采用的复制策略会利用新探嗅器提供的信息来放置副本。\n\
  \n默认情况下，所有探嗅器都是动态的，这使得 Cassandra 能够将请求从当前有性能问题的节点移开。你可以在 `cassandra.yaml` 文件中为节点配置动态探嗅阈值。当一个“坏”节点的性能改善后，它可以恢复到优先状态。\n\
  \n### 探嗅器的类型\n\nCassandra 提供了多种类型的探嗅器，如下节所述。\n\n*   `SimpleSnitch`：这是默认的探嗅器，但它仅适用于开发环境。此探嗅器不了解数据中心或机架，因此无法用于多数据中心环境。\n\
  *   `GossipingPropertyFileSnitch`：此探嗅器使用 gossip 协议将你配置在 `cassandra-rackdc.properties`\
  \ 文件中的机架和数据中心信息传播给其他节点。\n\n你可以通过编辑节点的 `cassandra-rackdc.properties` 文件来配置 `GossipingPropertyFileSnitch`，如下所示：\n\
  \n```\ndc=DC1\nrack=RACK1\nprefer_local=true\n```\n\n提示\n\nDataStax 推荐在生产环境中使用 `GossipingPropertyFileSnitch`。\n\
  \n这里，`dc` 指数据中心，`rack` 指定机架信息。`prefer_local` 选项指定了当 Cassandra 不在多个数据中心之间进行通信时，必须使用本地\
  \ IP 地址，以限制网络带宽使用。\n\n*   `Ec2Snitch`：这是一个适用于 Amazon EC2 部署的简单探嗅器，其中所有节点都在单个区域中。区域名称类似于数据中心名称，可用区类似于数据中心内的机架。\n\
  *   `Ec2MultiRegionSnitch`：你可以在基于 Amazon EC2、集群跨越多个区域的集群中使用此探嗅器。\n*   `GoogleCloudSnitch`：这是一个用于在\
  \ Google Cloud Platform 上部署 Cassandra 的探嗅器，适用于单个或多个区域。\n*   `RackInferringSnitch`：此探嗅器通过机架和数据中心来确定节点位置。在一个节点\
  \ IP 地址中（例如，110.100.200.105），它有四个八位组，第三和第四个八位组对应于机架和数据中心。此探嗅器对于编写自定义探嗅器类很有用。\n*\
  \   `PropertyFileSnitch`：通过使用 `cassandra-topology.properties` 文件中的网络定义，根据节点所属的机架和数据中心来确定节点的接近程度。你必须在\
  \ `cassandra-topology.properties` 文件中定义所有节点，并且该文件在集群的所有节点上必须完全相同。\n*   `CloudstackSnitch`：这是一个用于基于\
  \ Apache Cloudstack 集群的探嗅器。\n\n注意\n\n探嗅器告知 Cassandra 网络拓扑信息，以便数据库能够高效路由请求并均匀分配副本。\n\
  \n### 理解 cassandra-topology.properties 和 cassandra-rackdc.properties 文件\n\n`cassandra-topology.properties`\
  \ 和 `cassandra-rackdc.properties` 文件在配置探嗅器方面起着重要作用，因此我在此简要解释一下这两个文件。\n\n`cassandra-topology.properties`\
  \ 文件包含整个集群的集群拓扑。以下是一个示例 `cassandra-topology.properties` 文件的内容：\n\n```\n"
- '# 数据中心一

  175.56.12.105=DC1:RAC1

  175.50.13.200=DC1:RAC1

  175.54.35.197=DC1:RAC1

  120.53.24.101=DC1:RAC2

  120.55.16.200=DC1:RAC2

  120.57.102.103=DC1:RAC2

  '
- '# 数据中心二

  110.56.12.120=DC2:RAC1

  110.50.13.201=DC2:RAC1

  110.54.35.184=DC2:RAC1

  50.33.23.120=DC2:RAC2

  50.45.14.220=DC2:RAC2

  50.17.10.203=DC2:RAC2

  ```


  此示例显示了一个包含两个物理数据中心、每个数据中心有两个机架的文件。`PropertyFileSnitch` 使用 `cassandra-topologies.properties`
  文件。如果你没有在 `cassandra-topologies.properties` 文件中标识集群的任何节点，数据库会假定它们位于默认数据中心 (`datacenter`)
  和默认机架 (`rack1`) 中。


  当你在集群中添加和删除节点时，必须更新此文件，以使 Cassandra 了解节点所属的机架和数据中心。虽然 Cassandra 可以自己弄清楚这些，但从性能角度来看，你主动提供这些信息给
  Cassandra 会更好。


  以下是一个典型的 `cassandra-rackdc.properties` 文件的内容：


  ```

  '
- "# 指示此节点的机架和数据中心\ndc=DC1\nrack=RAC1\n```\n\n当你配置 `GossipingPropertyFileSnitch` 时，如果存在\
  \ `cassandra-rackdc.properties` 文件，它总是会加载它。\n\n以下三种探嗅器将查找 `cassandra-rackdc.properties`\
  \ 文件来确定集群中节点所属的数据中心和机架：\n\n*   `GossipingPropertyFileSnitch`\n*   `Ec2Snitch`\n\
  *   `Ec2MultiRegionSnitch`\n\n## 总结\n\n理解 Cassandra 如何存储数据以及如何执行读写操作对于调整数据库性能至关重要。\n\
  \n修复 Cassandra 节点以纠正数据不一致是一项基本任务，掌握 Cassandra 提供的各种手动修复类型是很有好处的。\n\n理解如何配置 `cassandra-topology.properties`\
  \ 和 `cassandra-rackdc.properties` 文件有助于配置数据中心和集群。\n\n\n# 6. Cassandra 查询语言简介\n\n\
  本章对 Cassandra 查询语言（CQL）进行了快速总结。\n\n理解如何执行各种类型的 DML（数据操作语言）操作至关重要，例如选择、插入和更新数据，您将学习到\
  \ Cassandra DML 操作的复杂之处。理解 DDL 操作（如创建和删除对象）也很重要，本章将解释如何执行各种类型的 DDL 操作。\n\n本章将展示如何创建键空间和表等结构。您将学习如何创建主键，并研究二级索引在\
  \ Cassandra 中的作用。物化视图是二级索引的更佳替代方案，您将学习如何使用它们。\n\n我回顾了各种 CQL 数据类型，包括高级数据类型，如集合、类型和用户定义类型（UDT）。\n\
  \n本章还解释了用户定义函数（UDF）和用户定义聚合（UDA）。\n\n### 使用键空间\n\nCassandra 使用键空间（keyspace）这种逻辑实体来分组表。键空间有点类似于关系数据库系统中使用的命名数据库。然而，键空间的真正目的是充当命名空间，用于指定\
  \ Cassandra 如何复制数据。这意味着，如果您的数据集在复制要求上有所不同，您可以使用不同的键空间来存储数据。\n\n键空间是一个逻辑结构，Cassandra\
  \ 不仅在其中存储表数据，还存储您为应用程序创建的所有其他实体，例如物化视图、函数、聚合和 UDT。\n\n注意\n您可以在每个键空间的基础上控制 Cassandra\
  \ 的数据复制。\n\n在以下部分中，我将展示如何管理键空间。\n\n### 管理键空间\n\nCassandra 将其数据存储在表中，并将表分组到键空间中。键空间是一个逻辑容器，您可以为其定义适用于该键空间中所有表的选项。\n\
  \n注意\nCassandra 建议您为每个应用程序使用单个键空间。\n\n当您引用一个表时，必须通过提供该表所在的键空间来完全限定它。如果表属于当前键空间，则无需提供键空间名称。您很快会学到，可以通过执行\
  \ `USE` 语句来指定当前键空间。\n\n### 创建键空间\n\n在创建键空间之前，您必须登录 `cqlsh`。登录后，运行 `describe cluster`\
  \ 命令以查看集群的详细信息。\n\n```\n$ cqlsh\nConnected to Test Cluster at 127.0.0.1:9042.\n\
  [cqlsh 5.0.1 | Cassandra 3.10 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for\
  \ help.\ncqlsh> describe cluster;\nCluster: Test Cluster\nPartitioner: Murmur3Partitioner\n\
  cqlsh>\n```\n\n您使用 `CREATE KEYSPACE` SQL 语句创建键空间。该语句的语法如下：\n\n```\nCREATE  KEYSPACE\
  \ [IF NOT EXISTS] keyspace_name\nWITH REPLICATION = {replication_map}\n[AND DURABLE_WRITES\
  \ =  true|false] ;\n```\n\n创建键空间时可以指定两个选项：第一个是 `replication`，第二个是 `durable_writes`。这两个选项的含义如下：\n\
  \n*   `replication`：这是一个强制选项，用于指定副本放置策略和副本数量。`replication_map` 属性允许您指定数据中心中数据的副本数量。`replication`\
  \ 选项必须包含子选项 `'class'`，用于指定复制策略。复制策略告诉 Cassandra 应在此键空间的数据中心和机架中存储数据副本的位置。有两种可能的复制策略：\n\
  \    *   `SimpleStrategy`：顾名思义，它通过为集群内所有数据中心设置相同的集群范围复制因子来使用简单的复制策略。示例如下：\n\n```\n\
  \        {'class': 'SimpleStrategy', 'replication_factor' : 3};\n        ```\n\n\
  如果您运行的是单节点测试集群，复制因子必须为 1。`SimpleStrategy` 仅适用于开发和概念验证用途。出于生产目的，必须使用 `NetworkTopologyStrategy`。提示 切勿使用复制因子\
  \ 1 来存储您无法承受丢失的数据！\n    *   `NetworkTopologyStrategy`：允许您通过为每个数据中心单独设置复制因子来指定更复杂的复制策略。示例：\n\
  \n```\n        {'class': 'NetworkTopologyStrategy', 'DC1' : 1, 'DC2' : 3}\n    \
  \    ```\n\n要使用 `NetworkTopologyStrategy`，您必须在 snitch 属性文件中指定数据中心名称，或使用名为 `datacenter1`\
  \ 的单一数据中心。`replication` 选项的第二部分允许您通过为 `replication_factor` 属性配置值来设置此键空间中数据的副本数量。\n\
  *   `durable_writes`：告诉 Cassandra 是否应对当前键空间中的任何更新使用提交日志。默认值为 `true`，在生产数据库中应使用此值。通过为\
  \ `durable_writes` 指定 `false` 作为值，可以绕过首先将更改写入提交日志。这将加快对此键空间中表的写入速度，但如果在数据库将内存表刷新到\
  \ SSTable 之前节点发生故障，您将面临数据丢失的风险。\n\n警告\n当您为复制配置 `SimpleStrategy` 时，请勿禁用 `durable_writes`。\n\
  \n以下示例展示了如何创建名为 `cycling` 的键空间：\n\n```\ncqlsh> CREATE KEYSPACE IF NOT EXISTS cycling\n\
  WITH REPLICATION = { 'class' : 'NetworkTopologyStrategy',\n'datacenter1' : 3 };\n\
  cqlsh>\n```\n\n如果没有错误，您可以确定数据库已创建所需的键空间。您可以运行 `describe keyspaces` 命令来确认数据库确实创建了该键空间。\n\
  \n```\ncqlsh> describe keyspaces;\ncycling  system_schema  system_auth  system \
  \ system_distributed  system_traces\ncqlsh>\n```\n\n如您所见，`CREATE KEYSPACE` 语句中的\
  \ `IF NOT EXISTS` 部分是可选的，有助于避免在键空间 `cycling` 已存在时发生错误。\n\n注意\n键空间是定义复制的容器。\n\n您可以在数据库显示的键空间列表中看到新的键空间\
  \ `cycling`。\n\n接下来，您可以执行 `describe cycling` 命令来查看此键空间的详细信息。\n\n```\ncqlsh> describe\
  \ cycling;\nCREATE KEYSPACE cycling WITH replication = {'class': 'NetworkTopologyStrategy',\
  \ 'datacenter1': '3'}  AND durable_writes = true;\ncqlsh>\n```\n\nCassandra 将所有\
  \ `nodetool` 和 `cqlsh` 命令的历史记录存储在 `$CASSANDRA_USER/.cassandra` 目录中的单独文件中，用户是启动集群的用户。\n\
  \n```\n$ ls -altr\ndrwx------ 6 root root 4096 May 26 07:25 ..\n-rw-r--r-- 1 root\
  \ root  127 Jun 23 10:13 nodetool.history\n-rw------- 1 root root 1308 Jun 24 07:24\
  \ cqlsh_history\ndrwxr-xr-x 2 root 4096 Jun 24 07:24 .\n$\n```\n\n### 在具有多个数据中心的集群中创建键空间\n\
  \n您可以创建一个键空间，为每个数据中心设置不同的复制因子，如下例所示：\n\n```\ncqlsh> CREATE KEYSPACE \"Cycling\"\n\
  WITH REPLICATION = {\n'class' : 'NetworkTopologyStrategy',\n'datacenter1'  : 3 ,\n\
  'datacenter2 ',  2 ,\n'datacenter3' :, 1 ,\n};\n```\n\n注意\n表、函数和 UDT 等对象绑定到特定的键空间。要使用这些对象，您必须在每次访问对象时指定键空间名称，或者将该键空间设为您的当前键空间。\n\
  \n#### 修改键空间\n\n有时您可能希望修改键空间，这意味着您想更改创建键空间时可以设置的两个属性之一。这两个属性（我在“创建键空间”部分已描述）是 `replication`\
  \ 和 `durable_writes`。\n\n#### 修改复制因子\n\n如果您想更改键空间的复制因子，可以通过执行 `ALTER KEYSPACE` 命令来实现，其语法如下：\n\
  \n```\nALTER KEYSPACE \"KeySpace Name\"\nWITH replication = {'class': 'Strategy\
  \ name', 'replication_factor' : 'No.Of replicas'};\n```\n\n**注意**\n\n您在创建键空间时或在之后通过修改键空间来设置复制策略。\n\
  \n下面是一个示例，展示了如何通过修改名为 `cycling` 的键空间，将复制因子从 1 更改为 3：\n\n```\ncqlsh> ALTER KEYSPACE\
  \ cycling\nWITH replication = {'class':'SimpleStrategy',\n'replication_factor':\
  \ 3};\n```\n\n**注意**\n\n您不能更改键空间的名称。\n\n如果您配置了 `NetworkTopologyStrategy`，则需要做更多工作。由于复制因子的更改会影响键空间将要复制到或不再复制到的所有节点，您还必须让受影响的节点为复制因子的更改做好准备。以下是这种情况下的操作步骤：\n\
  \n1.  更改所有数据中心的复制级别。\n\n    ```\n    cqlsh> ALTER KEYSPACE cycling WITH REPLICATION\
  \ =\n    {'class' : 'NetworkTopologyStrategy', 'dc1' : 3, 'dc2' :2};\n    ```\n\n\
  2.  如下运行 `nodetool repair` 命令，以对键空间执行完全修复：\n\n    ```\n    $ nodetool repair -full\n\
  \    ```\n\n在一个节点上完成修复后，开始下一个节点的修复。\n\n### 需要运行 nodetool repair 命令的原因\n\n当您提高复制因子时，更改不会自动在所有节点上生效。提高集群的复制因子后，您必须在该集群的所有节点上运行\
  \ `nodetool repair` 命令。同样，当您提高数据中心的复制因子时，也必须在该数据中心的所有节点上运行 `nodetool repair` 命令。\n\
  \n运行 `nodetool repair` 命令会告知 Cassandra 创建所需的额外副本，以满足您配置的复制因子。\n\n**提示**\n\n集群的写入吞吐量与复制因子成反比。\n\
  \n如果您降低了复制因子，之后必须运行 `nodetool cleanup` 命令，无论更改是在数据中心内还是在集群中。这将使 Cassandra 能够释放不再需要的副本所占用的空间。\n\
  \n### 防止键空间向某些数据中心发送副本\n\n有时您可能希望阻止键空间仅在某些数据中心写入副本，或者允许键空间仅写入一个特定的数据中心。通过将复制因子设置为零\
  \ (`0`)，您可以阻止键空间向特定数据中心发送副本。示例如下：\n\n```\ncqlsh> ALTER KEYSPACE cycling\nWITH REPLICATION\
  \ = {'class' : 'NetworkTopologyStrategy', 'dc1' :3,,\n'dc2': 0, 'dc3': 3 };\n```\n\
  \n此命令排除了数据中心 `DC2`（通过将其复制因子设置为 `0`）。\n\n#### 修改持久写入属性\n\n`ALTER KEYSPACE` 命令还允许您更改\
  \ `durable_writes` 属性。以下示例展示了如何更改键空间的 `durable_writes` 属性：\n\n```\ncqlsh> ALTER\
  \ KEYSPACE cycling\nWITH REPLICATION = {'class' : 'NetworkTopologyStrategy', 'datacenter1'\n\
  : 3}\nAND DURABLE_WRITES = true;\n```\n\n您可以通过运行以下命令来确认所做的更改已生效。\n\n```\ncqlsh>\
  \ SELECT * FROM system.schema_keyspaces;\nkeyspace_name | durable_writes | strategy_class\
  \ | strategy_options\n----------------+----------------+-------------------------------------------\n\
  cycling | True | org.apache.cassandra.locator.NetworkTopologyStrategy | {\"datacenter1\"\
  :\"3\"}\nmykeyspace | True | org.apache.cassandra.locator.SimpleStrategy | \"replication_factor\"\
  :\"4\"}\n...\n```\n\n### 修复键空间\n\n当您添加一个数据中心时，请务必运行以下 `nodetool repair` 命令来对键空间执行完全修复：\n\
  \n```\n$ nodetool repair –full cycling;\n```\n\n#### 指定要使用的键空间\n\n通常，您在某个键空间中工作，但希望切换到不同的键空间，并将该新键空间设为当前工作键空间。您必须使用关键字\
  \ `USE`（还能是什么？）来使一个键空间成为当前的默认键空间。\n\n在以下示例中，您希望名为 `myKeyspace` 的键空间成为默认键空间：\n\n\
  ```\ncqlsh> USE myKeySpace;\ncqlsh:myKeySpace>\n```\n\n### 使用键空间限定符\n\n当您的代码处理多个键空间时，反复发出\
  \ `USE <KEYSPACE>` 命令会变得很麻烦。在这种情况下，您可以简单地指定键空间限定符，而不必执行 `USE <KEYSPACE>` 命令。Cassandra\
  \ 允许您在执行以下语句时指定键空间限定符：\n\n*   `ALTER TABLE`\n*   `CREATE TABLE`\n*   `DELETE`\n\
  *   `INSERT`\n*   `SELECT`\n*   `TRUNCATE`\n*   `UPDATE`\n\n要指定键空间中的表，请先指定键空间的名称，后跟一个句点，然后是表名。以下示例展示了如何将数据插入名为\
  \ `race_winners` 的表中，该表位于 `cycling` 键空间中。\n\n```\ncqlsh> INSERT INTO cycling.race_winners\
  \ (race_name, race_position, cyclist_name) VALUES (...);\n```\n\n### 移除键空间\n\n移除键空间很简单。执行\
  \ `DROP KEYSPACE` 语句来移除键空间，如下所示：\n\n```\ncqlsh> DROP KEYSPACE cycling;\ncqlsh>\n\
  ```\n\n如您所见，当您发出 `DROP KEYSPACE` 语句时，Cassandra 不会给出任何反馈；它确实删除了该键空间，您可以通过运行 `DESCRIBE\
  \ KEYSPACES` 命令来验证该键空间已不存在。\n\n```\ncqlsh> DESCRIBE KEYSPACES;\nsystem_traces  system_schema\
  \  system_auth  system  system_distributed\ncqlsh>\n```\n\n当您移除一个键空间时，数据库会删除其所有组成实体，如表、聚合、类型和\
  \ UDF。如果您已在 `cassandra.yaml` 文件中设置了 `auto_snapshot` 属性，Cassandra 可以自动备份该键空间。\n\n\
  默认情况下，`auto_snapshot` 属性值为 `true`，这意味着当您删除一个键空间（或表）时，数据库会自动为该键空间（或表）创建一个快照。您也可以选择在删除键空间之前手动备份它，如第\
  \ 9 章所述。\n\n**注意**\n\nDataStax 强烈建议您将 `auto_snapshot` 属性的默认值 `true` 保持不变。\n\n###\
  \ 系统键空间\n\nCassandra 使用一组系统键空间来存储有关集群配置以及存储在该键空间中的对象的详细信息。\n\n`DESCRIBE KEYSPACES`\
  \ 命令显示集群中的所有系统键空间。\n\n```\ncqlsh> DESCRIBE KEYSPACES;\nsystem_traces system_schema\
  \  system_auth system  system_distributed\ncqlsh>\n```\n\n**提示**\n\n默认情况下，`system-auth`\
  \ 键空间的复制因子设置为 `1`。DataStax 建议您将 `system-auth` 键空间的复制因子设置为每个数据中心的节点数。不过，您也可以将此键空间的复制因子设置为\
  \ `5` 或 `7`，以提供充足的冗余度。\n\n以下是各种系统键空间中存储数据的简要描述：\n\n*   `system`：此键空间包含一些表，这些表包含有关物化视图、提示、索引、对等节点、分区信息以及驱动程序使用的预处理语句的信息。\n\
  *   `system_schema`：此键空间包含有关表列和索引、UDF、触发器、用户定义类型和物化视图的信息。\n*   `system_distributed`：此键空间只有一个名为\
  \ `repair_history` 的表，用于存储有关键空间修复活动的信息。\n\n### 从系统表获取集群拓扑信息\n\n你可以通过查询系统表 `PEERS`\
  \ 来获取集群拓扑信息，例如对等节点的 IP 地址、数据中心和机架的名称以及令牌值，如下所示：\n\n```\ncqlsh> SELECT * FROM system.peers;\n\
  peer            | data_center | host_id                    | preferred_ip | rack\
  \  | release_version | rpc_address     | schema_version                       |\
  \ tokens\n192.168.159.129 |         dc1 | 632fe5cd-26fa-4b8b-9842-182be2f954e5 |\
  \         null | rack1 |            3.10 | 192.168.159.129 | 86afa796-d883\n'-1470738432828591905',\
  \ '-1533929660503050360', '-1588268933422992241', '-1790127126337716384', '-1795704774997895089',\
  \ '-1933674708843479324', '-2001904010895819169', '-2137322678046758761', '-2315125955255423142',\
  \ '-2349800311170714405', '-239001164349178402', '-2439785688421178687', '-\n...\n\
  ```\n\n### 获取有关函数、聚合和用户类型的信息\n\n在本章后续部分，你将学习 Cassandra 的用户定义实体，如 UDF、聚合和类型。一旦创建了用户定义的实体，就可以使用系统表来检索有关这些实体的信息。\n\
  \n要检索有关 UDF 的信息，请查询系统表 `SCHEMA_FUNCTIONS`。\n\n```\ncqlsh> SELECT * FROM system.schema_functions;\n\
  ```\n\n你可以通过查询 `SCHEMA_AGGREGATES` 表来获取用户定义聚合的详细信息。\n\n```\ncqlsh> SELECT * FROM\
  \ system.schema_aggregates;\n```\n\n最后，你可以查询 `SCHEMA_USERTYPES` 表以查看数据库中所有用户定义的类型。\n\
  \n```\ncqlsh> SELECT * FROM system.schema_usertypes;\n```\n\n现在你已经了解了如何使用键空间，是时候开始将它们用于其设计目的了：通过创建一个表，作为表和其他实体的逻辑存储库。\n\
  \n### 创建表\n\nCassandra CQL 表存储行并具有名称。创建表时，你需要定义行的列、一个用于标识每行的强制性主键，以及任何你选择的附加选项。\n\
  \n你必须执行 `CREATE TABLE` 语句来创建一个新表。`CREATE TABLE` 语句的核心语法如下：\n\n```\ncreate_table_statement\
  \ ::=  CREATE TABLE [ IF NOT EXISTS ] table_name\n'('\ncolumn_definition\n( ','\
  \ column_definition )*\n[ ',' PRIMARY KEY '(' primary_key ')' ]\n')' [ WITH table_options\
  \ ]\n```\n\n以下是一个典型的建表语句：\n\n```\ncqlsh> use cycling;\ncqlsh:cycling> CREATE TABLE\
  \ loads (\n...     machine inet,\n...     cpu int,\n...     mtime timeuuid,\n...\
  \     load float,\n...     PRIMARY KEY ((machine, cpu), mtime)\n...     ) WITH CLUSTERING\
  \ ORDER BY (mtime DESC);\ncqlsh:cycling>\n```\n\n在创建 `loads` 表之前，你运行了 `use cycling`\
  \ 命令，以便数据库知道在这个键空间中创建新表。或者，你本可以指定 `CREATE TABLE cycling.loads`。这样也能让数据库知道你想将新表放置在哪个键空间中。\n\
  \n在建表语句中，以下是你需要重点关注的主要内容：\n* 列定义\n* 主键和分区键\n* 聚集列\n* 表选项（紧凑存储和聚集顺序）\n\n在接下来的章节中，我将简要回顾构成建表语句的关键实体。\n\
  \n> **注意**\n>\n> 主键由两部分组成：第一列或列组是强制性的分区键，后跟一个或多个聚集列。\n\n#### Column_definition\n\
  \n`column_definition` 子句由列名及其类型以及两个修饰符组成。\n* **Static**：将列声明为静态列。静态列对于共享相同分区键的所有行具有相同的值（稍后解释）。当然，只有非主键列才能是静态的。\n\
  * **Primary key**：主键唯一标识一行，所有表都必须定义主键。我将在下一节解释主键和分区键。\n\n#### 主键、分区键和聚集列\n\nCassandra\
  \ 的主键概念与规范化关系数据库的主键概念有很大不同。表的主键指定了存储在该表中数据的位置和顺序。\n\n定义主键时，它可以有两部分：一个分区键和一个聚集键。至少，它必须有一个分区键。这两部分含义如下：\n\
  * Cassandra 使用主键定义的第一部分，即分区键，来将表中的数据分布到集群的各个节点上。分区键决定哪个节点将存储表中的特定行。复合分区键可以拆分数据，以便将相关数据存储在不同的分区上。\n\
  * 数据库使用键定义的第二部分，称为聚集键或聚集列（或多个列），来对分区内数据进行排序。\n\n在定义主键的分区键和聚集键时，可以指定多个列。生成的键是一个复合主键。这种设计背后的思想是轻松地将表数据分布到集群的各个节点上。它还允许更高的性能并促进故障转移。\n\
  \n> **提示**\n>\n> 一旦创建了表，就不能更改其主键。你必须创建一个新表并将数据插入到新表中。\n\n选择正确的主键、分区键和聚集列是 Cassandra\
  \ 数据建模的一个关键方面，选择会显著影响查询性能。\n\n表必须有主键。你可以用表中的一个或多个列来指定主键，列的顺序很重要。Cassandra 主键的独特之处在于它比关系数据库中的典型主键包含更多元素。\n\
  \n如前所述，主键由两部分组成：分区键和聚集列。你将在接下来的章节中了解更多关于主键这两个组成部分的信息。\n\n> **注意**\n>\n> 分区键将行分组到同一个副本集中。聚集列决定了行在副本中的存储方式。\n\
  \n### 分区键\n\n分区键是主键中第一个也是必需的组件。它可以包含一个或多个列。下面是一个例子：\n\n```\nCREATE TABLE t (k text\
  \ PRIMARY KEY)\n```\n\n这里，列 `k` 是分区键，没有聚集列。\n\n表分区是一组分区键值相同的行。分区键可以有一个或多个列，如果是多列键，则一个分区内所有行的分区键列的值必须完全相同。\n\
  \n下面是一个说明分区键概念的例子：\n\n```\nCREATE TABLE t (\na int,\nb int,\nc int,\nd int,\nPRIMARY\
  \ KEY ((a, b), c, d)\n);\n```\n\n假设你对这个表执行以下简单查询：\n\n```\nSELECT * FROM t;\na |\
  \ b | c | d\n---+---+---+---\n0 | 0 | 0 | 0    // 第 1 行\n0 | 0 | 1 | 1    // 第 2\
  \ 行\n0 | 1 | 2 | 2    // 第 3 行\n0 | 1 | 3 | 3    // 第 4 行\n1 | 1 | 4 | 4    // 第\
  \ 5 行\n```\n\n在这种情况下，请注意以下几点：\n* 第 1 行和第 2 行共享同一个分区。\n* 第 3 行和第 4 行共享同一个分区。\n* 第\
  \ 5 行位于不同的分区。\n\n> **注意**\n>\n> 当没有聚集列时，主键与分区键相同。\n\n以下是分区的关键属性：\n* Cassandra 保证来自一个分区的所有行都存储在同一组副本节点中。因此，你应该仔细选择分区键，以便将经常一起查询的行放在同一个分区中。这意味着数据库在多个节点上搜索数据的工作量更少。\n\
  \n> **提示**\n>\n> 如果分区键包含太多数据，可能会导致创建“热点”。\n>\n* Cassandra 在单个分区内以原子性和隔离性执行所有更新操作。\n\
  \n\n# 使用简单主键创建表\n\n当你使用简单主键定义表时，你需要指定单个列名作为分区键。因此，主键和分区键是同一个。如果你有一个包含大量值的列，由于 Cassandra\
  \ 会将分区分布到多个节点上，因此插入和查询数据会变得很容易。\n\n如果你的应用需要一个具有单一标识符的简单查找表，那么简单主键就是合适的选择。在下面的例子中，你指定\
  \ `id` 作为主键，这样通过提供自行车手的 ID 号就能轻松获取他们的姓名：\n\n```\ncqlsh> USE cycling;\ncqlsh> CREATE\
  \ TABLE cyclist_name ( id UUID PRIMARY KEY, lastname text, firstname text );\n```\n\
  \n`id` 列采用 `UUID` 格式。`UUID`（通用唯一标识符）是一个 128 位的值，其位模式符合各种类型。在 `CQL` 中，`uuid` 类型是基于随机数的\
  \ 4 型 `UUID`。一个 `UUID` 通常由以连字符分隔的十六进制数字序列表示。\n\n将 `uuid` 类型用作代理键很常见，可以单独使用，也可以与其他值结合使用。你可以生成一个\
  \ 4 型 `UUID` 值，并在 `INSERT` 或 `UPDATE` 语句中使用该值，如下所示：\n\n```\ncqlsh:cycling> insert\
  \ into cyclist_name (id, firstname, lastname)\n... values\n... (uuid(), 'sam', 'alapati');\n\
  cqlsh:cycling> select * from cyclist_name;\nid                                 \
  \  | firstname | lastname\n--------------------------------------+-----------+----------\n\
  3c4acfde-dc65-4c9f-b2ec-9047d677641a |       sam |  alapati\n(1 rows)\ncqlsh:cycling>\n\
  ```\n\n提示\n\n生成 `UUID` 的另一种方法是使用内置的 `CQL` 函数 `NOW()`。例如，你可以按以下方式从当前时间生成 `UUID`：\n\
  \n```\ncql> INSERT INTO \"users\" (\"username, id, 'address\" VALUES ('alapati',\
  \ NOW(), '12345, Main St, Anytown');\n```\n\n使用 `NOW()` 函数可以为插入到 `USERS` 表中的每一行生成一个唯一的\
  \ `UUID`，而无需显式指定 `UUID` 常量。\n\n你也可以在表定义的末尾指定主键，如下所示：\n\n```\ncqlsh> USE cycling;\n\
  cqlsh> CREATE TABLE cyclist_name ( id UUID, lastname text, firstname text, PRIMARY\
  \ KEY (id) );\n```\n\n这里展示的两种情况，你都先指定了键空间 (`USE cycling`) 来设置当前键空间。你也可以使用以下表示法来标识键空间，而无需先执行\
  \ `USE` 语句：\n\n```\ncqlsh> CREATE TABLE cycling.cyclist_name ( id UUID, lastname\
  \ text, firstname text, PRIMARY KEY (id) );\n```\n\n## 定义复合分区键\n\nCassandra 通过分区键将完整的数据行存储在节点上。你可以使用复合分区键将数据分布到多个分区（多个节点）上。如果一列的数据量很大，那么数据量太大，无法存储在单个分区中。\n\
  \n你可以为分区键指定多个列，以便将数据分段到多个存储桶中。复合分区键由两个或更多列组成。你不是将所有数据分组到单个分区中，而是将数据分组到一组更小的分区中。\n\
  \n注意\n\n搜索特定行时，你需要指定整个主键；而从同一分区中选择多行时，只需指定分区键。\n\n当你遇到由于对一个分区进行大量写入而导致向节点写入数据速度变慢时，复合分区键很有帮助。例如，如果你的应用正在写入大量数据，你可以使用四列分区键按年/月/日/小时将数据分解成块。\n\
  \n如果你没有使用二级索引，则在查询表时必须提供复合键的所有列。\n\n以下示例展示了如何将表中的两列指定为主键中的复合分区键：\n\n```\ncqlsh>\
  \ CREATE TABLE cycling.rank_by_year_and_name (\nrace_year int,\nrace_name text,\n\
  cyclist_name text,\nrank int,\nPRIMARY KEY ((race_year, race_name), rank)\n);\n\
  ```\n\n这里的主键包含一个分区键和一个聚簇列。分区键是复合的，因为你对分区键的两列使用了双括号 `(race_year, race_name)`。主键还有一个聚簇列\
  \ `rank`。\n\n你必须指定分区键的所有列才能从此表中检索数据，因为你没有在表上创建二级索引。要获取完成不同比赛的自行车手的排名，你必须同时提供年份和比赛名称的值，如下所示：\n\
  \n```\ncqlsh:cycling> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015\
  \ AND race_name='Tour of Japan - Stage 4 - Minami > Shinshu';\nrace_year | race_name\
  \                                 |rank|    cyclist_name\n-----------+------------------------------------------+----+----------------\n\
  2015 | Tour of Japan - Stage 4 - Minami > Shinshu | 1  | Benjamin PRADES\n2015 |\
  \ Tour of Japan - Stage 4 - Minami > Shinshu | 2  |    Adam PHELAN\n2015 | Tour\
  \ of Japan - Stage 4 - Minami > Shinshu | 3  |   Thomas LEBAS\n(3 rows)\ncqlsh:cycling>\n\
  ```\n\n如果你只指定了部分分区键，如下例所示，`Cassandra` 会报错：\n\n```\ncqlsh:cycling> SELECT * FROM\
  \ cycling.rank_by_year_and_name WHERE race_year=2016;\nInvalidRequest: Error from\
  \ server: code=2200 [Invalid query] message=\"Cannot execute this query as it might\
  \ involve data filtering and thus may have unpredictable performance. If you want\
  \ to execute this query despite the performance unpredictability, use ALLOW FILTERING\"\
  \n```\n\n该错误是因为你只使用了部分分区键 (`race_year`)，而省略了分区键中的第二列 `race_name` 列。\n\n你可以按照 `Cassandra`\
  \ 的要求，在仅使用部分分区键的查询中添加 `ALLOW FILTERING` 子句来绕过此错误。\n\n```\ncqlsh:cycling> SELECT\
  \ * FROM cycling.rank_by_year_and_name WHERE race_year=2015 ALLOW FILTERING;\nrace_year\
  \ | race_name                                  | rank | cyclist_name\n-----------+-------------------------------------------+---+------------\n\
  2015 |   Giro d'Italia - Stage 11 - Forli > Imola | 1 | Ilnur ZAKARIN\n2015 |  \
  \ Giro d'Italia - Stage 11 - Forli > Imola | 2 | Carlos BETANCUR\n...\n(5 rows)\n\
  ```\n\n在查询中添加 `ALLOW FILTERING` 子句可能会带来性能损失。影响取决于一个分区中有多少行，以及这些行是否分布在多个 `SSTable`\
  \ 文件中。但是，`Cassandra` 保证查询将被限制在单个节点上。\n\n\n## 复合键与聚类列\n\n在创建主键时，聚类列是可选的，并跟在表的必需分区键之后。聚类列的顺序定义了表中分区的聚类顺序。对于每个分区，Cassandra\
  \ 会根据你指定的聚类顺序对行进行物理排序。\n\n聚类是 Cassandra 根据你定义的聚类列对每个分区内的数据进行排序的方式。默认情况下，Cassandra\
  \ 按升序对列进行排序。\n\n同时包含分区键和聚类列的主键称为复合主键。分区键可以是简单的或复合的。\n\n下面是一个示例，展示了聚类列如何为分区定义聚类顺序：\n\
  \n```sql\nCREATE TABLE t (\na int,\nb int,\nc int,\nPRIMARY KEY (a, b)\n);\n```\n\
  \n插入一些行并运行以下 `SELECT` 语句：\n\n```sql\nSELECT * FROM t;\na | b | c\n---+---+---\n\
  0 | 0 | 4     // row 1\n0 | 1 | 9     // row 2\n0 | 2 | 2     // row 3\n0 | 3 |\
  \ 3     // row 4\n```\n\n在这种情况下，主键定义指定了`(a, b)`，意味着列`a`是分区键，列`b`是聚类列。此外，你可以看到 Cassandra\
  \ 内部将属于同一分区（列`a` =0）的行按照聚类列`b`的值顺序存储。\n\n以这种方式聚类列意味着查询一个分区中的一系列行可以非常快速地返回。例如像 `SELECT\
  \ * FROM t WHERE a=0 AND b>1 AND b<=3` 这样的查询。\n\n**注意**\n\n当你指定一个复合主键时，Cassandra\
  \ 根据其分区键将整行存储在某个节点上，并使用聚类列对数据进行排序。\n\n如果你的应用程序从一个大分区中检索数据，它通常需要读取整个分区才能获取少量数据。如果你通过指定聚类列对分区键的数据进行排序，数据库可以更高效地检索数据，因为它不必读取整个分区。\n\
  \n通过指定聚类列来分组数据类似于在关系数据库中连接表的方式，只是更好。\n\n在下表中，列`category`充当分区键，列`points`充当聚类列。当你查询此表时，对于每个类别，数据库按降序对`points`列进行排序。\n\
  \n```sql\nCREATE TABLE cycling.cyclist_category (\ncategory text, points int, id\
  \ UUID, lastname text,\nPRIMARY KEY (category, points))\nWITH CLUSTERING\nORDER\
  \ BY (points DESC);\n```\n\n## 静态列\n\n在创建表时，你可以将非聚类列声明为静态。静态列仅在特定分区内是静态的。\n\n以下是展示如何声明静态列的示例：\n\
  \n```sql\nCREATE TABLE t (\nk text,\ns text STATIC,\ni int,\nPRIMARY KEY (k, i)\n\
  );\nINSERT INTO t (k, s, i) VALUES ('k', 'I''m shared', 0);\nINSERT INTO t (k, s,\
  \ i) VALUES ('k', 'I''m still shared', 1);\nSELECT * FROM t;\nOutput is:\nk |  \
  \                s | i\n---+--------------------+---\nk  | \"I'm still shared\"\
  \ | 0\nk  | \"I'm still shared\" | 1\n```\n\n关于静态列需要记住的事项：\n\n*   你不能将作为主键的列声明为静态。\n\
  *   没有任何聚类列的表不能有静态列。\n\n## 表选项\n\n你可以使用`WITH`关键字设置两个关键的表选项：`COMPACT STORAGE`和`CLUSTERING\
  \ ORDER`。\n\n### 紧凑表\n\n你可以使用`COMPACT STORAGE`选项定义紧凑表。此选项仅用于向后兼容，以处理 CQL 版本 3 之前创建的表定义。对于新表，你不得指定此选项，因此我不详细讨论此选项。\n\
  \n### 聚类顺序\n\n`CLUSTERING ORDER`选项允许你将聚类顺序更改为使用列的逆自然顺序。默认情况下，排序意味着`ASC`（升序）。你可以指定`ASC`（默认顺序）或`DESC`（降序）顺序。\n\
  \n### 其他选项\n\n除了我描述的这两个选项外，表还支持其他选项，例如允许你编写注释、指定读修复选项以及等待垃圾回收墓碑（删除标记）的时间。以下是表选项的简要描述：\n\
  \n*   `comment`：关于表的注释。\n*   `read_repair_chance`：查询超过一致性级别所需节点的概率，用于执行读修复。默认值为\
  \ 0.1。\n*   `dclocal_read_repair_chance`：查询同一数据中心内超过一致性级别所需节点的概率，用于执行读修复。默认值为 0。\n\
  *   `gc_grace_seconds`：垃圾回收墓碑前的等待时间。默认值为 864000 秒。\n*   `bloom_filter_fp_chance`：SSTable\
  \ 布隆过滤器假阳性的目标概率。\n*   `default_expiration_time`：表的生存时间（TTL），以秒为单位。\n\n还有三个非常重要的、影响性能的表选项，与压缩、压缩和缓存相关。我将在第\
  \ 11 章详细解释这三个选项，该章节讨论 Cassandra 性能调优。如果你愿意，可以提前阅读。\n\n## 使用计数器列跟踪值\n\n你可以使用一种特殊的列，称为计数器，来跟踪一个递增的值。例如，你可能希望创建一个计数器列来跟踪加入游戏的在线游戏玩家数量，或者页面浏览量或日志消息的数量。\n\
  \n你必须为计数器列指定`counter`数据类型。但是，你不能在任何表中将列指定为计数器列；你必须创建一个专门的表来保存计数器列。专门的表必须只包含一个主键（可以是复合的）和计数器列。你不能将计数器列用作主键；除主键列外的所有列都必须是计数器列。\n\
  \n**注意**\n\n你不能索引计数器列。你也不能删除它。\n\n你不能使用`INSERT`语句将数据加载到计数器列中；相反，你必须使用`UPDATE`语句来插入和修改计数器列的值。\n\
  \n以下示例展示了如何创建计数器列：\n\n```sql\nCREATE TABLE popular_count (\nid UUID PRIMARY KEY,\n\
  popularity counter\n);\n```\n\n## 修改表\n\n你可以通过执行`ALTER TABLE`语句来修改表结构或其选项。`ALTER\
  \ TABLE`语句允许你执行以下操作。\n\n*   你可以更改列的类型，如下所示：\n\n    ```sql\n    ALTER TABLE customers\
  \ ALTER lastKnownAddress TYPE UUID;\n    ```\n\n*   你可以向表中添加新列。\n\n    ```sql\n\
  \    ALTER TABLE customers ADD address varchar;\n    ```\n\n*   你还可以通过添加`WITH`指令来更改一些表选项。\n\
  \n    ```sql\n    ALTER TABLE customers\n    WITH comment = \"complete customer\
  \ records table\"\n    AND read_repair_chance = 0.4;\n    ```\n\n**注意**\n\n一旦创建表，你就不能更改`COMPACT\
  \ STORAGE`和`CLUSTERING ORDER`选项。\n\n你只能按照允许的方式转换某些 CQL 数据类型。有关 CQL 类型兼容性，请参阅 CQL\
  \ 文档。例如，你可以将现有的 ASCII 或 text 类型仅转换为 varchar 类型。\n\n### 查看表的配置选项\n\n如前所述，您在创建表时可以指定许多选项。您也可以通过修改表来调整若干选项。如何知道表在任意时刻具有哪些选项？运行\
  \ `describe table` 命令以查看表的所有属性。\n\n在以下示例中，您创建表 `cyclist_name`，然后运行命令 `describe cyclist_name`\
  \ 来查看表的属性：\n\n```cqlsh> use cycling;\ncqlsh:cycling> CREATE TABLE cyclist_name (\
  \ id UUID, lastname text, firstname text, PRIMARY KEY (id) );\ncqlsh:cycling> describe\
  \ cyclist_name;\nCREATE TABLE cycling.cyclist_name (\nid uuid PRIMARY KEY,\nfirstname\
  \ text,\nlastname text\n) WITH bloom_filter_fp_chance = 0.01\nAND caching = {'keys':\
  \ 'ALL', 'rows_per_partition': 'NONE'}\nAND comment = ''\nAND compaction = {'class':\
  \ 'org.apache.cassandra.db.compaction.SizeTieredCompactionStrategy', 'max_threshold':\
  \ '32', 'min_threshold': '4'}\nAND compression = {'chunk_length_in_kb': '64', 'class':\
  \ 'org.apache.cassandra.io.compress.LZ4Compressor'}\nAND crc_check_chance = 1.0\n\
  AND dclocal_read_repair_chance = 0.1\nAND default_time_to_live = 0\nAND gc_grace_seconds\
  \ = 864000\nAND max_index_interval = 2048\nAND memtable_flush_period_in_ms = 0\n\
  AND min_index_interval = 128\nAND read_repair_chance = 0.0\nAND speculative_retry\
  \ = '99PERCENTILE';\ncqlsh:cycling>\n```\n\n在这个表的众多属性中，您只设置了少数几个。然而，列表很长，因为对于所有您未指定的表选项，数据集使用了默认值。\n\
  \n### 删除和截断表\n\n与任何关系型数据库一样，您可以删除和截断 Cassandra 表。\n\n#### 删除表\n\n您可以使用 `DROP TABLE`\
  \ 语句来删除表。\n\n```cqlsh> DROP TABLE cycling.cyclist_name;\ncqlsh> DROP TABLE cycling.cyclist_name\
  \ IF EXISTS;\n```\n\n在删除表之前，必须首先删除任何基于该表创建的物化视图。\n\n#### 截断表\n\n使用 `TRUNCATE` 语句截断表会保留表结构，但会删除表中的所有数据，包括任何基于该表的物化视图中的数据。\n\
  \n```cqlsh> TRUNCATE TABLE customers;\ncqlsh> TRUNCATE customers;\n```\n\n这两种命令的工作方式相同。关键字\
  \ `TABLE` 是可选的，因为表是您可以截断的唯一对象。\n\n在截断表之前，您需要执行以下操作：\n\n1.  使用 `CONSISTENCY` 命令将一致性级别设置为\
  \ `ALL`。\n\n    ```cqlsh> CONSISTENCY ALL;\n    Consistency level set to ALL.\n\
  \    cqlsh>\n    ```\n\n2.  运行 `nodetool status` 命令以确保所有节点均已启动并可用。\n\n    ```cqlsh>\
  \ nodetool status\n    Datacenter: datacenter1\n    =======================\n  \
  \  Status=Up/Down\n    |/ State=Normal/Leaving/Joining/Moving\n    --  Address \
  \   Load       Tokens    Owns (effective)  Host ID          Rack\n    UN  127.0.0.1\
  \  159.91 KiB  256      100.0%           c51011d6-06da-47b8-bd55-70ac2e51716d  rack1\n\
  \    $\n    ```\n\n### 从表中删除行和列\n\n您可以使用 `DELETE` 语句从表中删除行。\n\n```cqlsh:mydb> DELETE\
  \ FROM cyclists where pk = 'salapati';\n```\n\n您可以通过以下方式发出 `DELETE` 语句来从表中删除行：\n\
  \n```cqlsh:mydb> DELETE session-token FROM users where pk = 'salapati';\n```\n\n\
  此语句将仅从 `pk` 值为 `'salapati'` 的一行中删除 `session_token` 列。`WHERE` 子句指定了要从表中删除的行。\n\n\
  #### 删除多行\n\n您可以通过指定关键字 `IN` 并在括号中提供逗号分隔的值列表来删除多行。\n\n```cqlsh> DELETE FROM cycling.cyclist_name\
  \ WHERE firstname IN ('Sam', 'James');\n```\n\n如果您希望从表中删除整列，可以通过省略 `WHERE` 子句来实现。\n\
  \n```cqlsh:mydb> DELETE session_token FROM users;\n```\n\n#### 从集合（Set）、列表（List）或映射（Map）中删除\n\
  \n要从作为单个列存储的映射中删除元素，您需要指定列名以及方括号中的元素键。\n\n```cqlsh> DELETE sponsorship ['sponser_name']\
  \ FROM cycling.races WHERE race_name = 'Criterium du Dauphine';\n```\n\n要从列表中删除数据，请指定列名以及列表索引位置。\n\
  \n```cqlsh> DELETE categories[3] FROM cycling.cycling.history WHERE lastname ='TIRALONGO';\n\
  ```\n\n要从集合中删除所有元素，只需指定列名。\n\n```cqlsh> DELETE sponsorship FROM cycling.races WHERE\
  \ race_name = 'Criterium De Dauphine';\n```\n\n#### 使用时间戳（TIMESTAMP）删除旧数据\n\n您可以使用时间戳来指定要删除的列。\n\
  \n```cqlsh> DELETE firstname, lastname\nFROM cycling.cyclist_name\nUSING TIMESTAMP\
  \ 1318452291034\nWHERE lastname = 'ALAPATI';\n```\n\n\n\n## 从数据库中移除已删除的数据\n\nCassandra\
  \ 不会在你执行 `DELETE` 语句后立即从表中移除行和列。相反，它会在删除操作之后的第一次合并过程中完全移除这些值。这样做是为了提高性能。\n\n###\
  \ Cassandra 如何使用墓碑标记来标记已删除的数据\n\nCassandra 会用墓碑标记来标记你删除的数据，并在一段宽限期后将其完全移除。Cassandra\
  \ 将所有删除操作视为插入或更新插入（根据情况可能是更新或插入）。\n\n当你删除数据时，Cassandra 会向作为 `DELETE` 命令一部分的分区添加一个删除标记。这个删除标记被称为墓碑标记，数据库会将这些标记写入一个或多个节点上的\
  \ SSTable。每个墓碑标记都有一个过期期限，之后数据库会在其常规的 SSTable 合并过程中删除该墓碑标记。\n\n### 指定生存时间值\n\n或者，你可以为记录（行或列）或表指定一个\
  \ `TTL` 值，以设置列中数据的可选过期期限（`counter` 类型数据除外）。这样做将使 Cassandra 在经过一定时间后删除列或表中的数据。在生存时间周期结束时，数据库会用墓碑标记标记该记录，并在合并过程中按照前面说明的方式处理它。\n\
  \n通过设置 `TTL` 来使数据过期并非没有代价。它会带来额外的开销，即在内存和磁盘上额外使用 8 个字节来记录 `TTL` 和过期时间。\n\n**注意**\n\
  \n指定 `TTL` 是一种隐式删除数据的方式。你可以通过在表的列上设置 `TTL` 或为表指定 `default_time_to_live` 属性来实现。\n\
  \n你可以使用 `INSERT` 或 `UPDATE` 语句指定过期时间 (`TTL`)。以下示例展示了如何通过向 `INSERT` 命令添加 `USING TTL`\
  \ 选项，指定 `users` 表中的 `password` 列在 1 天（86,400 秒）后过期：\n\n```cql\ncqlsh:mydb> INSERT\
  \ INTO users\n(user_name, password)\nVALUES ('cbrown', 'ch@ngem4a') USING ttl 86400;\n\
  ```\n\n此后，你可以通过执行以下 `UPDATE` 语句将该期限增加到 2 天：\n\n```cql\ncqlsh:mydb> UPDATE users\
  \ USING TTL 172800 SET password = 'ch@ngem4a'\nWHERE user_name = 'cbrown';\n```\n\
  \n你可以使用 `default_time_to_live` 属性为整张表设置默认 `TTL`，这是在创建表时可以指定的 CQL 表属性之一。此属性的默认值为\
  \ 0，表示写入表中的数据永远不会过期。该值以秒为单位。一旦设置，Cassandra 会将 `TTL` 值应用于表中的每一列。当表的 `TTL` 超过时，Cassandra\
  \ 将为整张表添加墓碑标记。\n\n**注意**\n\n通过将 `default_time_to_live` 表属性设置为零，你实际上移除了在该表中指定的任何列\
  \ `TTL`。\n\n你可以在使用 `CREATE TABLE` 语句创建表时，或稍后使用 `ALTER TABLE` 语句修改表时，为表应用默认 `TTL`。\n\
  \n一旦列自创建以来经过的秒数超过了你配置的 `TTL` 值，Cassandra 就会认为数据已过期，尽管它仍会在查询结果中报告该数据。Cassandra 会在下一次读取时用墓碑标记（一种删除标记）标记过期数据，但会将数据最多保留\
  \ `gc_grace_seconds` 指定的时间。\n\n一旦 `gc_grace_seconds` 属性指定的时间过去，Cassandra 会在其常规合并过程中自动移除那些已被标记为墓碑的数据。\n\
  \n## 垃圾回收如何工作\n\n你在创建表时设置 `gc_grace_seconds` 属性。该属性指定了 Cassandra 用墓碑标记数据后，经过多少秒数据才有资格被垃圾回收。\n\
  \n`gc_grace_seconds` 属性的默认值很长（864,000 秒，即 10 天），因此在创建表时你可以保留此属性不变。默认值如此之长的原因是为了让\
  \ Cassandra 有充足的时间在永久删除数据之前，最大限度地保证数据的一致性。\n\n虽然 `gc_grace_seconds` 属性的默认值是 10 天，但你可以为那些用户不会显式删除数据的表减少此值，例如仅包含已配置\
  \ `TTL` 的数据的表，或你已配置了 `default_time_to_live` 属性的表。\n\n**提示**\n\n你可以为每张表配置不同的墓碑标记宽限期。\n\
  \n在将 `gc_grace_seconds` 属性值从其默认设置 10 天降低之前，请记住以下几点：\n\n*   Cassandra 不会重放比 `gc_grace_seconds`\
  \ 设置更早的提示（这些提示是重放错过的写入操作的指令）。这意味着减少 `gc_grace_seconds` 属性值可能导致最近恢复的节点丢失一些写入操作。\n\
  *   Cassandra 还会执行批处理操作，这涉及按顺序重放数据库中的更改。Cassandra 会等待，直到批处理更改创建后 `gc_grace_seconds`\
  \ 时间过去，才会重放该批处理更改。如果你减少了 `gc_grace_seconds` 属性的值，你将面临批处理写入可能恢复一些已删除数据的风险。\n\n\n\n\
  ## 僵尸记录与节点修复\n\n当你删除数据时，处理删除请求的节点会为该记录创建一个墓碑（tombstone），并将此墓碑传递给其他存储了该被删除记录副本的节点。如果其中一个副本节点恰好处于宕机状态，它将无法接收到墓碑，并继续存储数据被删除前的版本。\n\
  \n如果数据库在宕机节点恢复之前，已经删除了带有墓碑标记的记录，那么数据库会将该节点上（已删除的）记录视为新数据。随后，数据库会将此“新”数据发送给其他节点。这种在删除后重新出现在表中的已删除行，就被称为**僵尸**。\n\
  \n僵尸数据出现的原因是，一个节点在长时间宕机后，在数据库能够运行修复之前重新上线。如果该节点在重新上线前没有被修复，数据库会看到未被标记墓碑的数据，并将其作为新数据复制到其他节点。这就是为什么在恢复节点（使用\
  \ `nodetool repair` 命令）并允许其加入集群之前，你必须运行修复的原因。\n\n注意\n\n数据库不会在其宽限期内重放（插入或更新）对已标记墓碑记录的变更。\n\
  \n表属性 `gc_grace_seconds` 为墓碑设置了宽限期。这个宽限期有助于防止僵尸记录的出现，它让恢复中的节点有时间以正常方式处理墓碑。当你恢复宕机节点时，数据库会通过其**提示移交**（hinted\
  \ handoff）功能，重放该节点在宕机期间错过的所有变更（插入和更新）。在记录的墓碑宽限期结束之前，数据库不会重放对该记录的删除变更。如果节点在宽限期结束时未能成功恢复上线，它将错过这些删除操作。\n\
  \n一旦墓碑的宽限期结束，数据库会在其正常的压缩（compaction）操作期间删除该墓碑。\n\n你可以通过以下方式防止僵尸记录的出现：\n\n*   节点一旦恢复，立即在该节点上运行\
  \ `nodetool repair` 命令。\n*   每隔 `gc_grace_seconds` 时间，对每张表运行一次 `nodetool repair`\
  \ 命令。\n\n注意\n\n`DROP KEYSPACE` 或 `DROP TABLE` 命令会立即删除数据。\n\n请注意以下几点：\n\n*   如果你选择为表中的所有记录指定生存时间（TTL），它们会自然过期，你不需要为该表运行\
  \ `nodetool repair` 命令。\n*   你可以通过启动压缩过程（例如使用 `SizeTieredCompactionStrategy` 进行数据压缩）来立即删除所有墓碑。\n\
  *   当你在表级别设置了 `default_time_to_live` 属性时，一旦记录超过该表的 TTL，Cassandra 会直接移除该记录，而不会创建墓碑或等待压缩过程运行。\n\
  \n### Cassandra 数据库中的索引\n\n表必须有一个主索引，你已经学习了如何创建和使用主索引。\n\n在创建表时，二级索引不是必需的。二级索引使你能够对原本无法查询的列进行查询。\n\
  \n二级索引有助于在非主键列上过滤表数据。Cassandra 不允许你运行直接匹配非主键列的查询，因为这可能无法从表中检索出连续的数据块。\n\n由于非主键不参与数据排序，Cassandra\
  \ 将表的数据分散存储在位于不同节点上的多个分区中。这意味着，如果你查询某个非主键列的特定值，最终可能需要读取表的所有分区；因此，Cassandra 不允许此类访问。\n\
  \n你可以在某列上构建二级索引，但在使用此类索引时存在一些限制。如果你的查询除了包含二级索引列外，还指定了一个分区键，那么查询是可行的，因为数据库可以通过读取单个节点分区的数据来满足此查询。但是，如果你在查询中没有将二级索引限制在特定的分区键内，那么查询将需要从所有节点读取数据，而数据库将不允许此操作。当你尝试此查询时，会看到以下错误：\n\
  \n```\nInvalidRequest: Error from server: code=2200 [Invalid query] message=\"Cannot\
  \ execute this query as it might involve data filtering and thus may have unpredictable\
  \ performance. If you want to execute this query despite the performance unpredictability,\
  \ use ALLOW FILTERING\"\n```\n\n要使此类查询生效，你必须在查询中添加 `ALLOW FILTERING` 选项。\n\n###\
  \ 何时使用索引\n\n当表中许多行都包含被索引的值时，使用索引是合适的。如果表中某列的唯一值过多，你会因此产生更多的查询和索引维护开销。\n\n假设你有一个名为\
  \ `races` 的表，其中有数亿条关于多年来参加各种自行车比赛的自行车手的条目。你的目标是根据排名查找自行车手。由于许多自行车手在同一年参赛，他们的排名在比赛年份列上会共享相同的值。在这种情况下，`races`\
  \ 表中的 `race_year` 列非常适合作为该表的索引。\n\n注意\n\nSSTable 附加二级索引（SASI）是二级索引的一种新实现，提供了性能改进。然而，截至本书撰写时（2017\
  \ 年 10 月），SASI 索引仍处于实验阶段。\n\n### 何时不应使用二级索引\n\n索引并非总是福音。如果你不加区别地为所有表创建索引，它很容易变成诅咒。建议不要在以下情况下创建索引：\n\
  \n*   高基数和低基数的列\n*   经常更新或删除的列\n*   包含计数器列的表\n*   在大型分区中搜索行时\n\n在接下来的章节中，我将详细阐述在此处列出的情况下不建议使用索引的原因。\n\
  \n#### 高基数和低基数列\n\n高基数列和非常低基数的列都不适合作为索引候选。高基数意味着列中有许多不同的值，而低基数意味着不同的值很少。\n\n为具有大量不同值的列创建和使用索引是低效的。你最好将表本身维护为一种索引形式，而不是创建内置的\
  \ Cassandra 索引。\n\n如果你的表很大但查询很少，你可以选择在高基数列上创建索引。只是不要在使用频繁的大表上这样做。\n\n至于非常低基数的列，考虑布尔值列这种极端情况。在这种情况下，索引的每个值在索引中只对应一行，并且这些行非常大，因为每个被索引列只有两个可能的值。\n\
  \n#### 经常更新或删除的列\n\n如前所述，Cassandra 使用墓碑来标记删除的数据。Cassandra 会在索引中存储墓碑，直到达到 10,000\
  \ 个单元格的限制。一旦超过墓碑限制，任何涉及被索引列的查询都将失败。\n\n#### 使用索引在大型分区中搜索行\n\n如果你在大型表中查询被索引的列，通常需要从多个分区收集响应。随着你向集群中添加更多节点，查询响应会变得越来越慢。\n\
  \n避免此处描述情况的方法是，在查询被索引列时缩小搜索范围。\n\n除了这里描述的所有潜在问题之外，由于数据库在集群的每个节点上都存储了索引表，如果查询访问多个节点，查询最终可能成为一个性能问题。\n\
  \n# Cassandra 二级索引与物化视图\n\n### 创建二级索引\n\n您可以通过执行 `CREATE INDEX` 语句在表上创建二级索引。假设您有如下表格，其主键由复合分区键\
  \ `(race_year, race_name)` 和一个聚类列 (`rank`) 组成：\n\n```sql\ncqlsh> CREATE TABLE cycling.rank_by_year_and_name\
  \ (\n    race_year int,\n    race_name text,\n    cyclist_name text,\n    rank int,\n\
  \    PRIMARY KEY ((race_year, race_name), rank)\n);\n```\n\n您无法在 `race_year` 列上查询此表，因为该列仅是复合分区键的一部分。您可以在\
  \ `race_year` 列上创建一个二级索引，从而能够基于此列进行查询。创建索引的方法如下：\n\n```sql\ncqlsh> CREATE INDEX\
  \ ON cycling.rank_by_year_and_name (race_year);\n```\n\n现在，您可以利用新建的二级索引发出以下查询：\n\
  \n```sql\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name WHERE race_year=2015;\n\
  ```\n\n在 `CREATE INDEX` 语句中，您没有为新索引指定名称。为索引命名是可选的；如果您不指定，数据库将为索引分配一个系统生成的名称。您也可以像下面这样指定自己的索引名称：\n\
  \n```sql\ncqlsh> CREATE INDEX my_index1 ON cycling.rank_by_year_and_name (race_year);\n\
  ```\n\n您可以为表的任意列（包括聚类列）创建二级索引。您可以在一个表上创建多个二级索引。\n\n您可以在已包含数据的表上创建索引，也可以在新建的空表上创建索引。\n\
  \n### 删除索引\n\n与主索引不同，您可以删除二级索引。发出 `DROP INDEX` 语句以删除索引：\n\n```sql\ncqlsh> DROP INDEX\
  \ myIndex1;\n```\n\n此语句会删除一个现有的二级索引。如果您希望避免因索引不存在而报错，可以使用以下语句代替：\n\n```sql\ncqlsh>\
  \ DROP INDEX myIndex1 IF EXISTS;\n```\n\n### Cassandra 中的物化视图\n\n如前所述，二级索引在处理高基数数据时表现不佳，因为对这些索引的查询会使数据库访问集群中的所有节点。物化视图是处理高基数数据的合适替代方案。\n\
  \n物化视图是从现有表使用新的主键构建而成的表。您可以在主键列中包含值为 null 的行。\n\n**提示**\n\n当您将物化视图用于查询低基数数据时，会阻碍性能。然而，请谨慎行事，因为物化视图仍需进一步完善才能完全发挥效用。在处理大量更新时，物化视图（MVs）导致集群停机的情况并非闻所未闻。\n\
  \n到 Cassandra 3.11 或 4.x 版本发布时，物化视图的可用性应该会大大提升。\n\n### 创建物化视图\n\n以下示例展示了如何以常规表为基础或源表来创建物化视图：\n\
  \n```sql\ncqlsh> CREATE MATERIALIZED VIEW cycling.cyclist_by_age\nAS SELECT age,\
  \ name, country\nFROM cycling.cyclist\nWHERE age IS NOT NULL AND cid IS NOT NULL\n\
  PRIMARY KEY (age, cid);\n```\n\n在这个例子中：\n\n*   `AS SELECT` 子句指定了您想从基表或目标表复制到新物化视图的列。这里是\
  \ `age`、`name` 和 `country`。\n*   `FROM` 子句指向原始表或源表，物化视图的数据来源于此。\n*   `WHERE` 子句确保主键列不为\
  \ null，因为这是创建物化视图的必要条件。\n*   `PRIMARY KEY` 子句指定了主键列，本例中是 `age` 和 `cid`。`age` 列恰好也是源表的主键列，您必须将源表中所有此类主键列也包含在物化视图的主键中。\n\
  \n### 删除物化视图\n\n您可以通过发出 `DROP MATERIALIZED VIEW` 命令来删除物化视图：\n\n```sql\ncqlsh> DROP\
  \ MATERIALIZED VIEW cycling.cyclist_by_age;\n```\n\n您也可以通过截断源表来删除一个或多个物化视图，这将移除基于该表的所有物化视图。当您删除一个表时，必须首先删除所有以该表为源表的物化视图。\n\
  \n### 使用物化视图进行反规范化\n\n在物化视图的示例中，您按 `age` 对物化视图进行了分区，因此您可以基于骑行者的年龄对其运行查询。物化视图通过创建多个数据相同但根据不同的主键以不同方式组织的表，来帮助对数据进行反规范化。\n\
  \n您可以在同一个表上创建多个物化视图。因此，您可以创建具有不同主键（如 `birthday` 或 `country`）的视图。这有助于您通过这些主键来组织数据，并让您能够按\
  \ `birthday` 和 `country` 查询这些物化视图。\n\n### 更新物化视图\n\n当您更新源表时，数据库会自动更新基于该表创建的任何物化视图，从源表删除数据时也是如此。然而，更新是异步进行的，因此物化视图会在父表更新之后延迟一段时间才得到更新。\n\
  \nCassandra 需要执行额外的读取操作才能更新物化视图。此读取涉及所有副本的数据一致性检查，这意味着对物化视图的写入比普通表的写入要慢。\n\n删除操作同样存在问题。由于数据库可能不会在物化视图中连续存储来自父表的相同行，因此从源表删除行通常可能需要数据库在相应的物化视图中创建多个墓碑。\n\
  \n### 使用 SELECT 语句查询数据\n\n数据操作语言（DML）是使您能够查询、插入、更新和删除数据的 CQL 语句集合。查询数据是您在 Cassandra\
  \ 数据库中最常执行的 DML 操作。因此，透彻理解如何在 CQL 中使用 `SELECT` 语句是一个好主意。\n\n`SELECT` 语句返回与请求匹配的结果。每一行都包含作为\
  \ `SELECT` 语句一部分的选择项的值。\n\n以下是 CQL 中 `SELECT` 语句的基本语法：\n\n```sql\nSELECT selectors\
  \ | DISTINCT partition\nFROM [keyspace_name.] table_name\n[WHERE partition_conditions\
  \ [ AND solr_query = 'search_expression' [LIMIT n] |\n[solr_query = 'search_expression'\
  \  [LIMIT n]]\n[AND clustering_conditions\n[AND regular_column_conditions]]]\n[GROUP\
  \ BY column_name]\n[ORDER BY PK_column_name ASC|DESC]\n[LIMIT N | PER PARTITION\
  \ LIMIT N]\n[ALLOW FILTERING]\n```\n\n`SELECT` 语句包含以下关键子句：\n\n*   选择子句\n*   WHERE\
  \ 子句\n*   GROUP BY 子句\n*   排序子句\n\n以下各节描述了 `SELECT` 语句的关键子句。\n\n### 选择子句\n\n`选择子句`\
  \ 决定了查询返回哪些列，以及数据库在返回结果之前必须对结果集应用的任何转换。`SELECT` 语句必须使用通配符选择器 (`*`) 或一个或多个选择器来定义列。\n\
  \n选择器可以是：\n\n*   列名\n*   一个术语\n*   函数调用\n*   对 `COUNT` 函数的特殊调用 `COUNT(*)`\n\n以下是一些典型的\
  \ `SELECT` 语句：\n\n```sql\ncql> SELECT COUNT(*) FROM users;\ncql> SELECT name, occupation\
  \ FROM users;\ncql> SELECT name, occupation FROM users WHERE userid IN (1111,1112,111130);\n\
  cql> SELECT JSON name, occupation FROM users WHERE userid = 999;\n```\n\n您可以通过在\
  \ `SELECT` 语句中指定 `AS` 子句来为顶级选择器起别名，如下所示：\n\n```sql\ncql> SELECT name AS customer_name\
  \ FROM customers;\n```\n\n输出将是：\n\n```\ncustomer_name\n------------\nAlapati\n...\n\
  ```\n\n\n### WHERE 子句\n\n对于来自关系型数据库背景的我们来说，CQL `SELECT` 语句中的 `WHERE` 子句有一些令人意外之处。与其他数据库类似，`WHERE`\
  \ 子句用于指定数据库必须查询的行。但是，适用以下规则：\n\n*   `WHERE` 子句只能由属于 `PRIMARY` 键一部分的列上的关系（条件）组成，或者你必须在这些列上定义一个\
  \ `SECONDARY INDEX`（二级索引）。\n*   对于任何分区键，对聚簇列的关系限制仅为那些寻求连续行集的关系。\n\n假设你创建了以下表，然后向其中插入了一些数据：\n\
  \n```sql\ncqlsh> create table users ( id UUID PRIMARY KEY, lastname text, firstname\
  \ text );\ncqlsh> insert into users (id, firstname, lastname)\n... values\n... \
  \ (uuid(), 'sam', 'alapati');\n```\n\n以下查询肯定可以工作，因为你指定了主键 `id` 列：\n\n```sql\ncqlsh>\
  \ select * from users where id=5361a682-9aea-46df-91b0-40572cfa9c97;\nid       \
  \                            | firstname | lastname\n--------------------------------------+-----------+----------\n\
  5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati\n(1 rows)\ncqlsh>\n\
  ```\n\n然而，以下查询将无法工作：\n\n```sql\ncqlsh > select * from users where lastname=\"alapati\"\
  ;\nInvalidRequest: Error from server: code=2200 [Invalid query] message=\"Cannot\
  \ execute this query as it might involve data filtering and thus may have unpredictable\
  \ performance. If you want to execute this query despite the performance unpredictability,\
  \ use ALLOW FILTERING\"\n```\n\n这个查询不起作用的原因在于，`lastname` 列上没有二级索引，并且该列的选择条件无法选出一个连续的行集。如果你希望按该列进行查询，你需要在\
  \ `lastname` 列上创建一个二级索引。\n\n### 创建二级索引\n\n你可以通过在 `lastname` 列上创建一个二级索引来使这个查询生效。二级索引是表中除主键包含的键之外的任何列上的索引。\n\
  \n一旦你为 `lastname` 列创建了二级索引，之前的查询就能正常工作：\n\n```sql\ncqlsh:cycling> create index on\
  \ users(lastname);\ncqlsh:cycling> select * from users where lastname=\"alapati\"\
  ;\nid                                   | firstname | lastname\n--------------------------------------+-----------+----------\n\
  5361a682-9aea-46df-91b0-40572cfa9c97 |       sam |  alapati\n(1 rows)\nCqlsh:cycling>\n\
  ```\n\n除了像这里展示的在简单列上创建二级索引外，你还可以在基于集合的列（如基于 `map`、`set` 和 `list` 的集合）上创建索引。\n\n\
  ### 二级索引的缺点\n\n二级索引由于几个原因可以说是喜忧参半。例如，所有节点都必须维护基于该节点上分区数据的二级索引的本地副本。由于对二级索引的查询通常需要遍历多个节点，执行查询的开销并不小。\n\
  \n二级索引不适用于基数过高或过低的列。基数是指一个列中不同值的数量。索引也不适合处理你频繁修改或删除的数据，原因在于数据库必须处理更新和删除产生的所有墓碑（tombstones），然后压缩（compaction）过程才能处理它们。\n\
  \n理想情况下，你应该创建多个表来满足你想对同一块数据执行的不同查询。与关系型数据库中二级索引是查询的基本组成部分不同，Cassandra 的二级索引充其量是一种备用策略，你最好创建物化视图（materialized\
  \ views），它遵循了反规范化（denormalization）的推荐模式。我将在“使用物化视图”一节讨论物化视图。\n\n### SASI：二级索引的新实现\n\
  \nCassandra 3.4 引入了一种更新的二级索引实现，称为 SSTable 附加二级索引（SASI）。与传统二级索引存储在“隐藏”表中不同，数据库将 SSI\
  \ 索引作为 SSTable 文件的一部分存储。\n\n你可以使用 `CREATE CUSTOM INDEX` 命令创建 SASI 索引：\n\n```sql\n\
  cqlsh> CREATE CUSTOM INDEX on users (lastname)\nUSING 'org.apache.cassandra.index.sasi.SASIIndex';\n\
  cqlsh>\n```\n\n你可以同时使用传统索引和 SASI 索引。较新的二级索引允许你执行不等式搜索，并使用 `LIKE` 关键字执行文本搜索，这两者都是传统索引无法做到的。\n\
  \n你可以通过使用元组表示法将 `CLUSTERING COLUMNS`（聚簇列）在关系条件中组合在一起，我将在本章后面进行解释。\n\n### 编写条件语句\n\
  \n一个查询可以扫描表的分区以检索一段数据。为了让这类查询生效，你必须顺序存储这段数据，以便使用聚簇列来定义所需的数据段。\n\n让我们用一个简单的例子来展示如何编写条件语句。表\
  \ `race_times` 显示了自行车手参加各种比赛的比赛时间：\n\n```sql\ncqlsh> CREATE TABLE cycling.race_times\
  \ (race_name text, cyclist_name text,\nrace_time text,\nPRIMARY KEY (race_name,\
  \ race_time);\n```\n\n这里 `race_name` 是主键，`race_time` 是聚簇列。你现在可以指定一个条件运算符来查找一段数据。你可以使用\
  \ `race_time` 列来实现，如下所示：\n\n```sql\ncqlsh> SELECT * FROM cycling.race_times\nWHERE\
  \ RACE_NAME = '17th Santos Tour Down Under'\nAND race_time >='19:15:19\"'\nAND race_time\
  \ <= '19:15:39');\n```\n\n## 如何使用 GROUP BY 子句对查询结果进行分组\n\n指定 `GROUP BY` 子句可以将所有共享某一列（或一组列）相同值的行收集到单个行中。\n\
  \n当你指定一个聚合函数（如 `AVG`）以及一个 `GROUP BY` 子句时，Cassandra 会为每个组生成一个单独的值。否则，指定聚合函数将为所有行生成一个单一的值。\n\
  \n以下是一个展示如何指定 `GROUP BY` 子句的示例：\n\n```sql\ncqlsh> SELECT weatherstation_id, date,\
  \ MAX(temperature)\nFROM temperature_by_day\nGROUP BY weatherstation_id, date;\n\
  ```\n\n在这个例子中，表的分区键包含两列 `weatherstation_id` 和 `date`，聚簇键是 `event_time`。`GROUP BY`\
  \ 使用了分区键 (`weatherstation_id`, `date`)。\n\n如果我愿意，我也可以同时使用分区键和聚簇键进行 `GROUP BY`，如下所示：\n\
  \n```sql\ncqlsh> SELECT weatherstation_id, date, MAX(temperature)\nFROM temperature_by_day\n\
  GROUP BY weatherstation_id, date, event_time;\n```\n\n## 使用 ORDER BY 子句对查询结果进行排序\n\
  \n你可以微调 Cassandra 显示 `SELECT` 语句结果的顺序。指定 `ORDER BY` 子句来对查询结果进行排序。你只能选择表定义中带有聚簇顺序（clustering\
  \ order）的列。\n\n你必须在 `WHERE` 子句中定义分区键，并通过指定 `ORDER BY` 子句来定义用于对结果排序的聚簇列。\n\n以下是一个展示如何使用\
  \ `ORDER BY` 子句的例子。\n\n首先，创建以下表：\n\n```sql\ncqlsh>  CREATE TABLE cycling.cyclist_cat_pts\n\
  (CATEGORY text, points int, id UUID, lastname text,\nPRIMARY KEY (category, points)\
  \ );\n```\n\n现在运行带有 `ORDER BY` 子句的 `SELECT` 语句。\n\n```sql\ncqlsh> SELECT * FROM\
  \ cycling.cyclist_cat_pts WHERE category = 'GC'\nORDER BY points;\n```\n\n在 `cqlsh`\
  \ 中使用 `ORDER BY` 子句需要你用 `PAGING OFF` 命令关闭分页。\n\n```sql\ncqlsh> PAGING OFF\n```\n\
  \n\n\n## 限制查询结果\n\n您可以通过在 `SELECT` 语句中指定 `LIMIT` `N` 选项来限制其输出的行数，如下所示：\n\n```\n\
  cqlsh> SELECT * FROM cycling.cyclist_name LIMIT 3;\n```\n\n您还可以指定一个 `PER PARTITION\
  \ LIMIT` `N` 选项，以限制特定分区返回的行数。首先，创建一个表，该表会将数据排序到多个分区中，并将数据插入到该表中。在此示例中，您使用 `race_year`\
  \ 和 `race_name` 列作为复合分区键，`rank` 作为聚簇列：\n\n```\ncqlsh> CREATE TABLE cycling.rank_by_year_and_name\
  \ (\n    race_year int,\n    race_name text,\n    cyclist_name text,\n    rank int,\n\
  \    PRIMARY KEY ((race_year, race_name), rank)\n);\n```\n\n有了这个表，您就可以执行以下 `SELECT`\
  \ 语句。`PER PARTITION LIMIT N` 子句为分区键 `race_year` 和 `race_name` 的每种组合检索前五场比赛。\n\n\
  ```\ncqlsh> SELECT * FROM cycling.rank_by_year_and_name PER PARTITION LIMIT 5;\n\
  ```\n\n## 过滤查询结果\n\nCassandra 不允许需要过滤的查询。它只允许不需要过滤的查询，在这种情况下，它会返回结果集中读取的所有记录。这样做的原因是使查询具有可预测的性能。查询的执行时间将始终与查询返回的数据量成正比。\n\
  \n假设您有以下表：\n\n```\nCREATE TABLE emails (\n    emailId int,\n    time int,\n    from\
  \ text,\n    content text,\n    PRIMARY KEY(emailId, time)\n);\n```\n\n您可以通过发出以下查询来检索表中的所有数据：\n\
  \n```\nSELECT * from emails;\n```\n\n但是，如果您发出以下查询，Cassandra 会报错：\n\n```\nSELECT\
  \ * FROM emails WHERE time = 1418306451235;\nBad Request: Cannot execute this query\
  \ as it might involve data filtering and thus may have unpredictable performance.\
  \ If you want to execute this query despite the performance unpredictability, use\
  \ ALLOW FILTERING.\n```\n\n错误的原因是，当 Cassandra 无法保证即使只查询少量值也不会扫描大量数据时，它就不会运行查询。Cassandra\
  \ 是在为您着想，试图节省您的计算资源。\n\n要执行此查询，数据库需要从表 `emails` 中检索所有行，然后过滤掉那些 `time` 列不具有请求值的行。但是，如果您知道表中超过\
  \ 90% 的行都具有 `time` 列的请求值，那么您的查询将是高效的，并且您必须在查询中指定 `ALLOW FILTERING` 子句。\n\n如果表包含一百万行，而只有五行包含\
  \ `time` 列的请求值，您的查询将浪费资源，因为 Cassandra 将读取所有一百万行来检索五行。在这种情况下，您应该考虑添加一个二级索引。因此，您可以在\
  \ `from` 列上添加一个索引并运行以下查询：\n\n```\nSELECT * FROM emails WHERE from = 'Sam Alapati';\n\
  ```\n\nCassandra 将检索 Sam Alapati 发送的所有电子邮件，并且不会要求您使用 `ALLOW FILTERING` 子句，因为它使用\
  \ `from` 列上的二级索引来查找匹配的行，而无需过滤结果。\n\n您比 Cassandra 更了解您的数据。您可以通过指定 `ALLOW FILTERING`\
  \ 子句来覆盖默认行为，从而使相同的查询成功运行。\n\n## 使用内置函数聚合结果\n\nCassandra 3.1 提供了内置的标准聚合函数，例如 `min`、`max`、`avg`、`sum`\
  \ 和 `count`，用于聚合结果。我提供两个聚合函数的示例：`sum` 和 `count`。\n\n在表 `cycling.cyclist_points`\
  \ 中，主键是 (`id`, `race_points`)。您可以借助 `sum` 函数找到特定自行车手的比赛积分总和。\n\n```\ncqlsh> SELECT\
  \ sum(race_points)\nFROM cycling.cyclist_points\nWHERE id=e3b19ec4-774a-4d1c-9e5a-decec1e30aac;\n\
  ```\n\n在表 `cycling.country_flag` 中，主键是 (`country`, `cyclist_name`)。您可以使用 `count`\
  \ 函数来查找来自比利时的自行车手数量。\n\n```\ncqlsh> SELECT count(cyclist_name) FROM cycling.country_flag\
  \ WHERE country='Belgium';\n```\n\n您可以在查询中应用任何自定义的用户定义函数（UDF），如下所示，其中 `fLog` 是一个用于从此表检索数据的\
  \ UDF：\n\n```\ncqlsh> SELECT id, lastname, fLog(race_points) FROM cycling.cyclist_points;\n\
  ```\n\n## 将查询结果格式化为 JSON\n\n您可以以 JSON 格式检索表的数据。要以 JSON 格式获取查询的整个结果，只需在 `SELECT`\
  \ 语句后插入关键字 `json`。\n\n```\ncqlsh> SELECT json name, checkin_id, timestamp from checkin;\n\
  ```\n\n如果您希望仅以 JSON 格式检索某些列，可以通过将列名包装在 `toJson()` 中来实现。\n\n```\ncqlsh> SELECT name,\
  \ checkin_id, toJson(timestamp) from checkin;\n```\n\n## 从集合列中选择数据\n\n查询集合列的方式与查询任何其他列相同。以下示例显示如何为特定自行车手\
  \ ID 检索数据。这里，列 `teams` 是一个集合：\n\n```\ncqlsh> SELECT lastname, teams\nFROM cycling.cyclist_career_teams\n\
  WHERE id = 5b6962dd-3f90-4c93-8f61-eabfa4a803e2;\n```\n\n当您查询带有集合的表时，Cassandra 将返回完整的集合。结果将根据元素类型排序。例如，文本元素将按字母顺序排列。如果键是整数类型，则顺序将基于键值。如果您需要数据库按数据插入的顺序返回结果，请使用列表而不是集合。\n\
  \n## 使用 IN 关键字进行 CQL 行的多键获取\n\n您可以指定 `IN` 关键字来定义要一起检索的一组聚簇列，从而获取多行。\n\n与 `ORDER\
  \ BY` 子句一样，当您指定 `IN` 关键字时，必须使用 `PAGING OFF` 命令在 cqlsh 中关闭分页。以下是一些展示如何指定 `IN` 关键字的查询示例。\n\
  \n以下查询根据聚簇列 `category_id` 检索并对结果进行排序：\n\n```\ncqlsh> SELECT * FROM cycling.cyclist_cat_pts\n\
  WHERE category_id IN ('Time-trial', 'Sprint')\nORDER BY id DESC;\n```\n\n以下示例显示了如何指定多个聚簇列。这里\
  \ `race_id` 列是分区键，`race_start_date` 和 `race_end_date` 列是聚簇列：\n\n```\ncqlsh> SELECT\
  \ * FROM cycling.calendar WHERE race_id = 101\nAND (race_start_date, race_end_date)\n\
  IN (('2015-05-09', '2015-05-31'), ('2015-05-06', '2015-05-31'));\n```\n\n\n\n##\
  \ 使用 `INSERT` 语句插入数据\n\n你执行 `INSERT` 语句来向表中的一行写入一个或多个列。你必须至少指定已定义主键的列，否则你将无法标识该行。\n\
  \n以下是 `INSERT` 语句的通用语法：\n```\nINSERT INTO [keyspace_name.] table_name (column_list)\n\
  VALUES (column_values)\n[IF NOT EXISTS]\n[USING TTL seconds | TIMESTAMP epoch_in_microseconds]\n\
  ```\n\n以下是一个示例，展示如何借助 `VALUES` 子句执行插入操作：\n```\ncqlsh> INSERT INTO cycling.cyclist_name\
  \ (id, lastname, firstname)\nVALUES (5b6962dd-3f90-4c93-8f61-eabfa4a803e2, 'VOS','Marianne');\n\
  ```\n\n当你使用 JSON 语法时，指定 `VALUES` 子句是可选的，但请确保你在表名后指定了 `JSON` 关键字。\n```\ncqlsh> INSERT\
  \ INTO cycling.cyclist_category JSON '{\n\"category\" : \"GC\",\n\"points\" : 780,\n\
  \"id\" : \"829aa84a-4bba-411f-a4fb-38167a987cda\",\n\"lastname\" : \"SUTHERLAND\"\
  \ }';\n```\n\n提示：如果一行不存在，Cassandra 会创建该行；如果该行已存在，它会更新该行。你实际上无法分辨是创建还是更新这两种操作中的哪一个发生了。你可以指定\
  \ `IF NOT EXISTS` 条件，仅当数据不存在时才插入，但这会带来明显的性能损失，因此不应常规使用。\n\n`INSERT` 语句中的 `UPDATE_PARAMETER`\
  \ 子句也出现在 `UPDATE` 和 `DELETE` 语句中，因此值得深入了解这个参数。`UPDATE_PARAMETER` 子句支持以下参数：\n*  \
  \ `TIMESTAMP`: 为操作设置时间戳。默认情况下，协调器使用语句执行开始时的当前时间作为时间戳。\n*   `TTL`: 此参数为你插入的值指定生存时间（以秒为单位）。这是一个可选参数，默认情况下值不过期。将\
  \ `TTL` 设置为值 0 与未指定 TTL 相同。\n\n## 使用 `UPDATE` 语句修改数据\n\nCassandra 的 `UPDATE` 功能实际上是一种\
  \ `UPSERT`。当你更新一行时，如果该行之前不存在，Cassandra 会创建它，否则更新它。因此，`UPDATE` 语句最终会写入一行或多行的一个或多个列值。\n\
  \n如果你插入一行，其主键与当前行相同，数据库会替换该行。如果你更新一行且主键不存在，Cassandra 会创建该行。因为 Cassandra 采用追加模型，插入和更新操作的工作方式相同；这两种操作之间没有本质区别。\n\
  \n你可以在除计数器列之外的所有列上指定 TTL 秒或 Timestamp 微秒作为选项。\n\n你可以更新多行中的一个列，如下例所示：\n```\ncqlsh>\
  \ UPDATE users\nSET state = 'TX'\nWHERE user_id IN (12345, 23456, 34567);\n```\n\
  \n你可以一次更新一个或多个列。以下命令展示了如何在同一行中更新多个列：\n```\ncqlsh> UPDATE users\nSET name = 'Sam\
  \ Alapati',\nemail='samalapati@gmail.com'\nWHERE user_id = 23456;\n```\n\n你可以更新集合\
  \ set、映射 map 或列表 list 中的数据。\n\n你也可以执行条件更新，如下所示：\n```\ncqlsh> UPDATE users SET id\
  \ = 12345\nWHERE lastname = 'ALAPATI' and firstname = 'Sam'\nIF age =50;\n```\n\n\
  条件更新是轻量级事务，会带来性能损失，因此你必须谨慎使用它们。\n\n变更数据捕获 (CDC) 日志记录：Cassandra 提供变更数据捕获 (CDC) 日志记录来跟踪已更改的数据。你按表配置\
  \ CDC 日志记录。当你决定使用 CDC 日志记录时，还必须指定 CDC 日志可以使用的磁盘空间量的限制。当数据库将内存表数据刷新到磁盘时，数据库会将包含与你已启用\
  \ CDC 日志记录的表相关的数据的提交日志段移动到 CDC 目录。你可以在创建表时配置 CDC 日志记录，或者修改现有表以添加相关的表属性。\n\n`cassandra.yaml`\
  \ 文件中的 `cdc_raw_directory` 属性使你能够指定数据库存储 CDC 日志的目录。此目录的默认位置如下：\n*   软件包安装：`/var/lib/Cassandra/cdc_raw`\n\
  *   Tarball 安装：`install_location/data/cdc_raw`\n\n## 处理高级数据类型\n\n你可以创建几种高级数据类型，例如：\n\
  *   集合 (Collections)：使你能够将数据分组并存储在单个列中。\n*   元组 (Tuples)：使你能够将多个值一起存储在单个列中。\n* \
  \  用户定义类型 (UDTs)：使你能够将多个数据字段附加到单个列。\n\n注意：UDT 仅适用于单个键空间。要在不同的键空间中使用 UDT，你必须重新创建该\
  \ UDT。\n\n我将在以下部分解释这三种高级数据类型。\n\n### 集合\n\n集合数据类型允许你将数据分组存储在单个列中。例如，如果一个用户有多个地址或电子邮件地址，你可以将所有地址一起存储在一个集合列中。\n\
  \n请记住，集合仅适用于值数量有限的数据。也就是说，集合中每个项目的最大大小是有限的。当存储无限增长的数据时（例如数据库每秒捕获和存储的事件），集合不是合适的方式。\n\
  \nCQL 允许你创建三种集合类型：\n*   Set：一组具有唯一值的元素。数据库不以有序方式存储值，但 cqlsh 会以排序方式返回元素，例如对于文本值按字母顺序。\n\
  *   List：列表对多个值进行分组，但这些值不必唯一。此外，列表以特定顺序存储元素，你可以使用索引值来插入和查询列表的值。\n*   Map：映射借助键值对建立两个项目之间的关系。每个键对应一个值，且不能有重复键。\n\
  \n提示：Cassandra 会读取整个集合，从而对性能产生不利影响。请保持集合的大小远小于每种集合类型的最大限制。\n\n你通过在尖括号中指定集合类型（set、list\
  \ 或 map），后跟诸如 `int` 或 `text` 之类的类型来声明集合列。这里有几个例子：\n```\nlist\nlist\n```\n\n你可以在这三种类型的集合列上创建索引。\n\
  \n在以下部分中，我将展示如何创建这三种集合类型。\n\n#### 创建 Set 类型\n\n当你在列中有数据与另一列中的数据存在多对一关系时，可以使用 set\
  \ 类型。set 类型在这种情况下很有帮助，因为你在 Cassandra 中不进行表连接。\n\n例如，在以下示例中，由 `id` 列表示的单个骑手可能在不同时期是多个车队的成员：\n\
  ```\ncqlsh> CREATE TABLE cycling.cyclist_career_teams\n( id UUID PRIMARY KEY, lastname\
  \ text, teams set<text>);\n```\n\n你可以通过以下方式查询作为 set 一部分的车队：\n```\ncqlsh:cycling>\
  \ SELECT lastname,teams\n...         FROM cycling.cyclist_career_teams;\nlastname\
  \        | teams\n-----------------+------------------------------------------------------------------------------------------------------\n\
  ARMITSTEAD |                    {'AA Drink - Leontien.nl', 'Boels-Dolmans Cycling\
  \ Team', 'Team Garmin - Cervelo'}\nVOS | {'Nederland bloeit', 'Rabobank Women Team',\
  \ 'Rabobank-Liv Giant', 'Rabobank-Liv Woman Cycling Team'}\nBRAND |   {'AA Drink\
  \ - Leontien.nl', 'Leontien.nl', 'Rabobank-Liv Giant', 'Rabobank-Liv Woman Cycling\
  \ Team'}\nVAN DER BREGGEN |                 {'Rabobank-Liv Woman Cycling Team',\
  \ 'Sengers Ladies Cycling Team', 'Team Flexpoint'}\n(4 rows)\ncqlsh:cycling>\n```\n\
  \n集合类型中单个项目的最大大小为 65,535 字节。\n\n注意：你可以通过指定单独的 TTL 属性来使集合的每个元素过期。\n\n\n# Cassandra\
  \ 集合与用户定义函数\n\n### 集合\n\n### 创建列表类型\n\n当处理与另一列存在多对多关系的列时，请使用 `list` 数据类型。在以下示例中，`events`\
  \ 列是一个列表，用于存储每个月内的所有赛事：\n\n```sql\ncqlsh> CREATE TABLE cycling.upcoming_calendar\
  \ ( year int,\nmonth int, events list,\nPRIMARY KEY ( year, month ));\n```\n\n您可以查询该表以获取某年某月的赛事列表。\n\
  \n```sql\ncqlsh:cycling> SELECT * FROM cycling.upcoming_calendar WHERE year=2015\
  \ AND month=06;\nyear | month | events\n------+-------+---------------------------------------------\n\
  2015 |     6 | ['Criterium du Dauphine', 'Tour de Suisse']\n(1 rows)\ncqlsh:cycling>\n\
  ```\n\n`list` 集合类型中单个项目的最大大小为 2GB。\n\n### 创建映射类型\n\n以下示例展示了如何创建一个包含 `map` 类型的表。`teams`\
  \ 列具有 `map` 类型，每个团队显示骑手在该年份所属的团队年份和名称。\n\n```sql\ncqlsh> CREATE TABLE cycling.cyclist_teams\
  \ ( id UUID PRIMARY KEY, lastname text,\nfirstname text, teams map );\n```\n\n您可以这样查询该表：\n\
  \n```sql\ncqlsh> SELECT lastname, firstname, teams\nFROM cycling.cyclist_teams;\n\
  ```\n\n此查询显示与特定骑手相关的所有团队及其所属年份。\n\n### 在集合中指定冻结值\n\n您可以将类型标记为 `frozen`，以将多个组件序列化为单个值。您无法更新冻结类型中的单个字段（Cassandra\
  \ 将这些值视为一个 `blob`）。\n\n示例如下：\n\n```sql\ncqlsh> CREATE TABLE mykeyspace.users (\n\
  id uuid PRIMARY KEY,\nname frozen ,\ndirect_reports set>,    // 一个集合 set\naddresses\
  \ map>     // 一个集合 map\nscore set>>              // 一个包含嵌套冻结集合的集合\n);\n```\n\n###\
  \ 元组\n\n您可以使用 `tuple` 数据类型将多个值一起存储在一列中。以下示例展示了如何为其中一列创建包含 `tuple` 数据类型的表：\n\n```sql\n\
  cqlsh> CREATE TABLE cycling.nation_rank (nation text PRIMARY KEY, info\ntuple);\n\
  ```\n\n以下查询从 `nation_rank` 表中检索数据：\n\n```sql\ncqlsh> SELECT * FROM cycling.nation_rank;\n\
  ```\n\n### 用户定义类型\n\n通过定义您自己的数据类型（称为用户定义类型），您可以将多个命名和类型化的数据字段附加到同一列。您可以指定任何有效的数据类型，包括集合甚至其他\
  \ UDT，作为 UDT 的字段。\n\n以下示例展示了如何创建一个名为 `cyclist.fullname` 的简单 UDT：\n\n```sql\ncqlsh>\
  \ CREATE TYPE cycling.fullname (firstname text, lastname text);\n```\n\n然后，您可以创建一个使用新类型\
  \ `cyclist.fullname` 的表：\n\n```sql\ncqlsh> CREATE TABLE cycling.race_winners\n(race_name\
  \ text, race_position int, cyclist_name FROZEN,\nPRIMARY KEY (race_name, race_position));\n\
  ```\n\n向表中插入数据后，您可以运行以下查询：\n\n```sql\ncqlsh:cycling> SELECT * FROM cycling.race_winners\n\
  WHERE race_name = 'National Championships South Africa WJ-ITT (CN)';\nrace_name\
  \                                       | race_position | cyclist_name\n-------------------------------------------------+---------------+--------------------------------------------------\n\
  National Championships South Africa WJ-ITT (CN) |             1 |      {firstname:\
  \ 'Frances', lastname: 'DU TOUT'}\nNational Championships South Africa WJ-ITT (CN)\
  \ |             2 |       {firstname: 'Lynette', lastname: 'BENSON'}\n...\n(5 rows)\n\
  cqlsh:cycling>\n```\n\n请注意查询如何利用您定义的 `full_name` 类型来显示骑手的 `firstname` 和 `lastname`\
  \ 列的值。\n\n### 用户定义函数与用户定义聚合\n\n当处理包含数百个节点的大型数据集和集群时，在客户端应用聚合与将大量计算推送到服务器端之间存在显著差异。通过让服务器处理计算，您将节省网络带宽，简化客户端代码，并获得额外好处。\n\
  \n在以下部分中，我将解释用户定义函数（UDF）和用户定义聚合（UDA）的要点。\n\n### 用户定义函数\n\n关于 UDF，您首先需要知道的是它的作用域并非像\
  \ Oracle 或 MySQL 等数据库中的函数和存储过程那样是数据库级别的。用户定义函数的作用域仅限于键空间。\n\n### 关于 UDF 的注意事项\n\n\
  以下是您需要了解的关于 UDF 的关键点。\n\n*   您可以使用 Java、JavaScript、Groovy 和 Scala 等语言来编写 UDF。\n\
  *   您可以通过两种方式处理 `null` 输入：\n    *   您可以指定 `CALLED ON NULL INPUT` 子句，这意味着 Cassandra\
  \ 将始终调用 UDF。\n    *   如果您指定 `RETURNS NULL ON NULL INPUT` 子句，那么当任何参数为 `null` 时，Cassandra\
  \ 会跳过 UDF 的执行，并返回一个 `null`。\n*   与输入参数一样，您必须为返回类型指定有效类型，例如原始类型、集合、元组或 CDT。\n\n###\
  \ UDF 的语法\n\n创建 UDF 的语法如下：\n\n```sql\nCREATE [OR REPLACE] FUNCTION [IF NOT EXISTS]\n\
  [keyspace.]functionName (param1 type1, param2 type2, ...)\nCALLED ON NULL INPUT\
  \ | RETURNS NULL ON NULL INPUT\nRETURN returnType\nLANGUAGE language\nAS '\n// 您的源代码\n\
  ';\n```\n\n`OR REPLACE` 子句和 `IF NOT EXISTS` 子句是互斥的。\n\n### UDF 示例\n\n以下是一个展示如何创建和使用\
  \ UDF 的示例。该 UDF 名为 `maxof (currentvalue int, testvalue int)`。此函数允许您获取传递给它的两个整数的最大值。\n\
  \n默认情况下，UDF 是禁用的。因此，在尝试以下操作之前，您必须首先在 `cassandra.yaml` 文件中设置 `enable_user_defined_functions:\
  \ true` 以启用它：\n\n```sql\ncqlsh> CREATE FUNCTION maxof(currentvalue int, testvalue\
  \ int)\nRETURNS NULL ON NULL INPUT\nRETURNS int\nLANGUAGE java\nAS 'return Math.max(currentvalue,testvalue);';\n\
  ```\n\n然后，您可以创建一个测试表并向其中插入一些数据，之后可以使用新的 UDF `maxOf` 执行查询，以获取两个值 `val1` 和 `val2`\
  \ 之间的最大值。一些输入值被特意指定为 `null`。示例如下：\n\n```sql\ncqlsh> SELECT id,val1,val2,maxOf(val1,val2)\
  \ FROM test WHERE id IN(1,2,3);\nid | val1 | val2 | udf.maxof(val1, val2)\n-----+------+------+\n\
  1  |  100 |  200 |                   200\n2  |  100 | null |                  null\n\
  3  | null |  200 |                  null\n```\n\n由于 UDF 指定了 `RETURNS NULL ON NULL\
  \ INPUT` 子句，因此当输入参数为 `null` 时，Cassandra 会返回一个 `null`。\n\n### 用户定义聚合函数\n\nCassandra\
  \ 允许您创建用户定义聚合函数，您可以在查询结果中将它们应用于数据。\n\n您首先创建聚合函数，您的查询可以仅包含聚合函数本身，而不包含任何列。\n\n###\
  \ 内置函数和聚合\n\nCassandra 提供了一些方便的内置函数和聚合供您使用。列表如下：\n\n*   `COUNT`：`COUNT` 函数获取行数的计数。\n\
  *   `SUM`：`SUM` 函数使您能够对特定列的所有值求和。\n*   `MIN`/`MAX`：`MIN`/`MAX` 函数帮助您计算列的最小值/最大值。\n\
  *   `AVG`：`AVG` 函数计算给定列中所有值的平均值。\n\n## 总结\n\n理解 Cassandra 中索引的正确用法是复杂的，因为它与您在传统关系数据库中使用索引的方式非常不同。\n\
  \nCassandra 集合，如 `set`、`map`、`list` 和 UDF 非常有用，了解它们的工作原理是很有益的。\n\n\n# 7. 在 Docker、Apache\
  \ Spark 和 Cassandra 集群管理器上运行 Cassandra\n\n第 2 章和第 3 章展示了如何在多个节点上创建一个通用的 Cassandra\
  \ 集群。现在你已经对 Cassandra 的架构以及如何配置集群有了相当的了解，是时候学习如何在各种环境中编排 Cassandra 集群了。\n\n容器技术如今正风靡一时。本章首先向你展示如何使用\
  \ Docker 容器创建一个 Cassandra 集群。我会快速解释什么是 Docker 容器以及如何使用它们。然后，我将向你展示如何在 Docker 上安装和配置\
  \ Cassandra。\n\n在讨论完 Docker 上的 Cassandra 之后，我将展示如何使用 Docker-Compose 和 BDD（行为驱动开发）创建一个\
  \ Cassandra 数据库。\n\nCassandra 集群管理器（CCM），顾名思义，并非 Cassandra 内部用来管理集群的工具。相反，它是一个便捷的工具，用于在单台服务器上设置多节点\
  \ Cassandra 集群。虽然 CCM 是用于开发和测试的，但了解如何使用此工具设置集群是很有益的。\n\n最后，本章以对名为 SMACK（Apache Spark、Apache\
  \ Mesos、Akka、Cassandra 和 Apache Kafka）的新兴技术栈的简要介绍作为结束，这是一套日益流行用于创建分布式企业应用程序的开源工具集。\n\
  \n### Cassandra 与 Docker\n\n在本节中，我将展示如何在 Docker 容器上运行 Cassandra 集群。容器是一个轻量级的、独立的、可执行的软件包，包含了运行软件所必需的一切，例如代码、运行时、系统工具、系统库和配置文件。\n\
  \n### Docker：快速入门\n\nDocker 是一个应用程序，它使你能够轻松地在容器中运行应用。容器类似于虚拟机（VM），但便携性更好。与在虚拟机管理程序中运行的\
  \ VM 不同，它直接在主机操作系统上运行。\n\n### 安装 Docker\n\n在本节中，我将展示如何在 Ubuntu 16.04 服务器上安装 Docker。\n\
  \n1.  Docker 是 Ubuntu 16.04 安装的一部分。然而，由于这可能不是最新版本，请从源下载，如下所示：\n\n    ```\n    $\
  \ curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -\n\
  \    OK\n    $\n    ```\n\n2.  通过以下方式将 Docker 仓库添加到 APT 源中：\n\n    ```\n    $ sudo\
  \ add-apt-repository \"deb [arch=amd64] https://download.docker.com/linux/ubuntu\
  \ $(lsb_release -cs) stable\"\n    $\n    ```\n\n3.  用你刚刚添加的新 Docker 软件包更新软件包数据库。\n\
  \n    ```\n    $ sudo apt-get update\n    ```\n\n4.  执行以下操作，确保你安装的是来自 Docker 仓库的\
  \ Docker CE（社区版），而不是默认的 Ubuntu 仓库：\n\n    ```\n    $ apt-cache policy docker-ce\n\
  \    docker-ce:\n    Installed: (none)\n    Candidate: 17.06.0~ce-0~ubuntu\n   \
  \ Version table:\n    17.06.0~ce-0~ubuntu 500\n    500 https://download.docker.com/linux/ubuntu\
  \ xenial/stable amd64 Packages\n    ...\n    $\n    ```\n\n    输出验证了可用的 Docker 安装文件是用于\
  \ Ubuntu-Xenial (16.04)的，所以你可以继续进行。你的`docker-ce`版本号可能与我的不同。\n5.  此时，你已准备好安装 Docker。\n\
  \n    ```\n    $ sudo apt-get install -y docker-ce\n    Reading package lists...\
  \ Done\n    Building dependency tree\n    Reading state information... Done\n  \
  \  ...\n    Processing triggers for ureadahead (0.100.0-19) ...\n    $\n    ```\n\
  \n### 管理 Docker\n\n接下来，你可以通过`systemctl status docker`命令检查 Docker 是否正在运行。\n\n```\n\
  $ sudo systemctl status docker\n● docker.service - Docker Application Container\
  \ Engine\n   Loaded: loaded (/lib/systemd/system/docker.service; enabled; vendor\
  \ preset: e\n   Active: active (running) since Thu 2017-06-29 10:50:24 EDT; 5s ago\n\
  \     Docs: https://docs.docker.com\n Main PID: 6598 (dockerd)\n   CGroup: /system.slice/docker.service\n\
  \           ├─6598 /usr/bin/dockerd -H fd://\n           └─6603 docker-containerd\
  \ -l unix:///var/run/docker/libcontainerd/dock\n...\n$\n```\n\n输出表明 Docker 服务正在运行。\n\
  \n### 使用 Docker 命令行实用程序\n\n你使用`docker`命令行实用程序来管理 Docker 实例。只需在命令行输入`docker`即可查看所有可用选项，数量相当多。\n\
  \n例如，你可以通过以下方式查看关于 Docker 的系统级信息：\n\n```\n$ sudo docker info\nContainers: 6\nRunning:\
  \ 0\nPaused: 0\nStopped: 6\n...\nOperating System: Ubuntu 16.04.2 LTS\nOSType: linux\n\
  Architecture: x86_64\nCPUs: 1\nTotal Memory: 7.796GiB\nName: ubuntu1\n...\n$\n```\n\
  \n### 理解 Docker 镜像\n\n所有 Docker 容器都从一个 Docker 镜像运行。默认情况下，Docker 从 Docker Hub 拉取其镜像，这是一个由\
  \ Docker 公司维护的公共 Docker 注册表。其他组织，包括 Linux 发行版，也在 Docker Hub 上托管他们的镜像。\n\n你可以运行以下命令来检查你的\
  \ Docker 安装是否能够访问并从 Docker Hub 下载镜像：\n\n```\n$ sudo docker run hello-world\nHello\
  \ from Docker!\nThis message shows that your installation appears to be working\
  \ correctly.\n$\n```\n\n你可以使用`docker search`命令在 Docker Hub 上搜索镜像。如果你想查找所有可用的 Ubuntu\
  \ 镜像，请输入：\n\n```\n$ sudo docker search ubuntu\n```\n\n然后，你可以通过`docker pull`命令指定镜像名称来下载你想要的镜像。\n\
  \n```\n$ sudo docker pull ubuntu\n```\n\n你可以通过以下方式查看已下载到你服务器的所有镜像：\n\n```\n$ sudo\
  \ docker images\nREPOSITORY        TAG           IMAGE ID          CREATED     \
  \    SIZE\nhello-world       latest        1815c82652c0       2 weeks ago    1.84kB\n\
  ubuntu            latest        d355ed3537e9      12 days ago     119MB\n...\n$\n\
  ```\n\n最后，你可以使用`docker run`命令，用你已下载的镜像运行一个容器。\n\n```\n$ sudo docker run -it ubuntu\n\
  samalapati@bd78ccf18941:/#\n```\n\n这将启动一个运行 Ubuntu 操作系统的容器。`i`选项代表交互式，`t`选项提供进入容器的\
  \ Shell 访问权限。请注意，命令提示符发生了变化，因为你现在位于新的 Ubuntu 容器内部。容器 ID 是`bd78ccf18941`。\n\n现在你已经掌握了\
  \ Docker 的基础知识，是时候学习如何在 Docker 上运行 Cassandra 容器了。\n\n\n\n### 在 Docker 上运行 Cassandra\
  \ 集群\n\n让我们在 Docker 上创建一个三节点的 Cassandra 集群。首先，让 Docker 从 Docker Hub 拉取 Cassandra\
  \ 3.04 镜像来启动第一个 Cassandra 实例。\n\n```bash\n$ sudo docker run --name cassandra1 -m\
  \ 4g -d cassandra:3.0.4\n34842881b8d4b42a9cc6627405f6dd63a21cace23276091e869e8b708fb6ce4b\n\
  $\n```\n\n在此命令中，\n*   `--name` 选项使您能够指定此实例的名称。\n*   `-m` 选项让您为此实例指定内存。\n*   `cassandra:3.0.4`\
  \ 子句告诉 Docker 应下载哪个版本的 Cassandra 镜像。\n\n接下来，运行 `docker ps` 命令以检查 Cassandra 容器实例\
  \ `cassandra1` 是否正在运行。\n\n```bash\n$ sudo docker ps\nCONTAINER ID       IMAGE  \
  \        COMMAND                 CREATED             STATUS             PORTS  \
  \                                NAMES\n34842881b8d4        cassandra:3.0.4    \
  \ \"/docker-entrypoin...\"   8 seconds ago       Up 7 seconds        7000-7001/tcp,\
  \ 7199/tcp, 9042/tcp, 9160/tcp   cassandra1\n#\n```\n\n您运行熟悉的 `nodetool status`\
  \ 命令来检查 Cassandra 节点 `cassandra1` 的状态。\n\n```bash\n$ nodetool status\nnodetool:\
  \ command not found\nsamalapati@ubuntu1:/tmp# sudo docker exec -i -t cassandra1\
  \ sh -c 'nodetool status'\nDatacenter: datacenter1\n=======================\nStatus=Up/Down\n\
  |/ State=Normal/Leaving/Joining/Moving\n--  Address     Load       Tokens      \
  \ Owns (effective)  Host ID      Rack\nUN  172.17.0.2  102.52 KB  256     100.0%\
  \     f217c613-3eb9-445a-884a-183e8d177927  rack1\nroot@ubuntu1:/tmp#\n```\n\n现在第一个\
  \ Cassandra 节点已经运行，是时候通过创建第二个节点来组成集群了，使用第一个节点作为种子节点。您创建的第二个节点及任何其他节点将与这个节点进行 gossip\
  \ 通信并注册自己。为此，您需要第一个 Cassandra 节点 `cassandra1` 的 IP 地址。您可以通过以下方式获取：\n\n```bash\n\
  $ sudo docker inspect -f'{{.NetworkSettings.IPAddress}}' cassandra1\n172.17.0.3\n\
  $\n```\n\n该命令显示第一个节点的 IP 地址是 `172.17.0.3`。现在您已经掌握了创建第二个 Cassandra 节点所需的一切，您将其命名为\
  \ `cassandra2`。\n\n```bash\n"
- '# docker run --name cassandra2 -m 2g -d -e CASSANDRA_SEEDS="172.17.0.3" cassandra:3.0.4

  30ed76a87b3c0f2f63075559817a2f125fc250731c75416639e446aa9f0b7774

  #

  ```


  最后，将第三个节点添加到 Cassandra 集群，命名为 `cassandra3`。


  ```bash

  '
- '# docker run --name cassandra3 -m 2g -d -e CASSANDRA_SEEDS="172.17.0.3" cassandra:3.0.4

  7528dc5679b02a59bb13f30ce0dc8c7617f0c268fd52256d8e2d9ea5faf0586a

  #

  ```


  `CASSANDRA_SEEDS` 环境变量是一个以逗号分隔的 IP 地址列表，gossip 协议使用该列表在新创建的 Cassandra 节点加入集群时引导它们。


  检查 Docker 进程以确保所有三个 Cassandra 容器都在运行。


  ```bash

  '
- '# sudo docker ps

  CONTAINER ID  IMAGE      COMMAND    CREATED     STATUS    PORTS       NAMES

  7528dc5679b0        cassandra:3.0.4     "/docker-entrypoin..."   5 seconds ago   Up
  4 seconds     7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp   cass3

  30ed76a87b3c     cassandra:3.0.4     "/docker-entrypoin..."   5 minutes ago       Up
  5 minutes        7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp       cass2

  34842881b8d4     cassandra:3.0.4     "/docker-entrypoin..."   8 minutes ago       Up
  8 minutes      7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcp    cassandra1

  #

  ```


  最后的 `nodetool status` 命令显示 Cassandra 集群的所有三个节点都在运行。


  ```bash

  '
- '# sudo docker exec -i -t cassandra1 sh -c ''nodetool status''

  Datacenter: datacenter1

  =======================

  Status=Up/Down

  |/ State=Normal/Leaving/Joining/Moving

  --  Address     Load       Tokens       Owns (effective)  Host ID      Rack

  UN  172.17.0.3  101.89 KB  256          67.3%             968690b8-8dc4-4242-943f-b62d37e44084  rack1

  UN  172.17.0.2  107.45 KB  256          68.7%             f217c613-3eb9-445a-884a-183e8d177927  rack1

  UN  172.17.0.4  15.42 KB   256          64.0%             820f24f7-d931-4a9f-87e3-8abd72d8a9bb  rack1

  #

  ```


  请注意，您无法在主 Linux 服务器中运行 Cassandra 实用程序 `nodetool`、`cqlsh` 或任何其他此类命令。由于 Cassandra
  运行在 Docker 容器内部，您只能在 Docker 中运行这些命令。您必须使用 `docker exec` 命令在 Docker 容器内运行命令。


  #### 在基于 Docker 的集群中运行 cqlsh


  要从基于 Docker 的集群中的三个节点之一运行 `cqlsh`，您需要“bash 进入”其中一个节点，例如节点 `cassandra1`，如下所示：


  ```bash

  $ sudo docker exec -it cassandra1 /bin/bash

  samalapati@34842881b8d4:/# cqlsh

  Connected to Test Cluster at 127.0.0.1:9042.

  [cqlsh 5.0.1 | Cassandra 3.0.4 | CQL spec 3.4.0 | Native protocol v4]

  Use HELP for help.

  cqlsh>

  ```


  `docker exec` 命令使您能够在 Docker 容器内运行命令。前面的命令在容器 `cassandra1` 内为您提供了一个 bash shell。


  一旦您通过 bash shell 登录到节点，就可以照常运行 `cqlsh` 命令以进入 `cqlsh` 提示符。


  或者，您可以指定 Docker 的 `--link` 选项来连接到 Docker 实例，并在 `exec cqlsh <IPAddress>` 选项的帮助下登录
  `cqlsh`。


  ```bash

  '
- "# docker run -it --link cassandra1 --rm cassandra:3.0.4 \\\n> sh -c 'exec cqlsh\
  \ 172.17.0.2'\nConnected to Test Cluster at 172.17.0.2:9042.\n[cqlsh 5.0.1 | Cassandra\
  \ 3.0.4 | CQL spec 3.4.0 | Native protocol v4]\nUse HELP for help.\ncqlsh>\n```\n\
  \n### 为 Docker 设置 Cassandra 环境变量\n\n当您在 Docker 上启动 Cassandra 镜像时，可以传递几个可用的环境变量。更具体地说，您在发出\
  \ `docker run` 命令时在命令行上传递这些环境变量。您在命令行上传递的每个环境变量都会设置节点 `cassandra.yaml` 文件中相关变量的值。\n\
  \n您在上一节中学习了如何指定 `CASSANDRA_SEEDS` 环境变量。除了该变量之外，还有其他几个。以下是最有用的几个：\n\n*   `CASSANDRA_LISTEN_ADDRESS`：确定侦听传入连接的\
  \ IP 地址。如果您选择默认值 `auto`，它会将 `cassandra.yaml` 文件中的 `listen_address` 选项设置为容器的 IP 地址。\n\
  *   `CASSANDRA_BROADCAST_ADDRESS`：此变量指定节点向集群中其余节点通告的 IP 地址。这将设置 `cassandra.yaml`\
  \ 文件中 `broadcast_address` 和 `broadcast_rpc_address` 属性的值。\n*   `CASSANDRA_ENDPOINT_SNITCH`：此属性允许您通过设置\
  \ `cassandra.yaml` 文件中的 `endpoint_snitch` 属性来设置 snitch 实现。\n*   `CASSANDRA_NUM_TOKENS`：此变量通过设置\
  \ `num_tokens` 属性来设置此节点的令牌数量。\n*   `CASSANDRA_DC`：通过设置 `dc` 属性的值来设置此节点的数据中心的名称。如果省略此变量，数据中心的名称默认为\
  \ `datacenter1`。\n*   `CASSANDRA_RACK`：此变量通过设置 `rack` 属性的值来设置机架的名称。如果省略它（就像我这里所做的），该变量默认为\
  \ `rack1`。\n\n\n\n# 在 Docker 上存储 Cassandra 数据并使用 BDD 构建集群\n\n## 在 Docker 上存储 Cassandra\
  \ 数据\n\n有不止一种方法来存储在 Docker 容器中运行的 Cassandra 所使用的数据。其中两种选项如下：\n\n*   **使用 Docker\
  \ 卷**：默认情况下，Docker 通过使用其内部卷管理机制将 Cassandra 数据文件写入主机的文件系统来管理数据存储。虽然容器可以轻松查看和访问此数据，但对于运行在\
  \ Docker 主机服务器上（而非容器内）的工具和应用程序来说，情况则不尽相同。它们可能无法轻松定位 Cassandra 的数据文件。此外，当你关闭容器，或者容器停止运行，或者\
  \ Docker 主机宕机时，数据将会丢失。\n*   **在主机服务器上创建数据目录**：你也可以将主机目录挂载为数据卷。你将主机上的数据目录挂载到容器内可见的一个目录。这样，工具和应用程序就可以轻松访问主机系统中的文件。你只需确保在主机系统上正确设置目录权限和任何\
  \ ACL（访问控制列表，用于控制对目录的访问）等，以便用户可以访问这些目录。\n\n以下是一个示例，展示了如何挂载一个带有 Docker 主机文件系统的卷：\n\
  \n```\n$ docker run –name my_container -v /host/dir://container/dir cassandra\n\
  ```\n\n当你这样做时，容器进程写入 `/container/dir` 目录的所有内容都会直接写入主机文件系统上的 `/host/dir` 目录。\n\n\
  > **注意**：CassandraCloud 是 Cloudurable 提供的一个工具，它简化了 Cassandra 在各种环境（包括 EC2、Docker\
  \ 和 VirtualBox）中的配置。详情请访问 [`https://cloudurable.github.io/cassandra-cloud/`](https://cloudurable.github.io/cassandra-cloud/).\n\
  \n### 使用 Docker-Compose 和行为驱动开发创建 Cassandra 集群\n\n你可以通过使用行为驱动开发来快速搭建 Cassandra 的开发和测试环境。`BDD`\
  \ 在许多方面与测试驱动开发（`TDD`）相似，但后者侧重于单元测试和集成测试，而 `BDD` 则侧重于系统与其用户之间的交互。\n\n当你使用 `BDD` 时，你描述在各种场景下应该发生什么。例如，对于一个网站，你以用户点击和在表单中输入数据的形式描述工作流程。对于系统管理员来说，工作流程则由系统管理员与系统及程序交互时输入的命令组成。\n\
  \n在本节中，我将展示如何使用 `BDD` 以及一个名为 `Cucumber` 的工具，配合 `Docker Compose` 来开发运行 Cassandra\
  \ 的新 Docker 容器。以下是 `BDD` 和 `Docker Compose` 如何帮助你：\n\n*   `BDD` 以测试驱动的方式帮助开发新的 Docker\
  \ 容器。\n*   `Docker Compose` 帮助你编排 Docker 容器。\n\n`BDD`（加上 `Cucumber`）和 `Docker-Compose`\
  \ 共同构成了一种启动新集群的令人兴奋的方式。虽然你可以使用 `Vagrant`（一个便于为开发环境启动虚拟机的工具）做类似的事情，但我在这里描述的方法要简单得多，也更有趣。\n\
  \n### 准备前提条件\n\n使用 `BDD` 设置 Cassandra 集群需要满足三个条件：\n\n*   **Docker**：如前所述，Docker\
  \ 是一个容器平台，可帮助你创建和管理容器。\n*   **Docker Compose**：这是一个帮助你定义和运行多容器 Docker 应用程序的工具。你使用一个\
  \ Compose 文件来配置应用程序所需的服务。之后，你可以用一条命令创建并启动所有服务，如下所示：\n    ```\n    $ docker-compose\
  \ up -d\n    ```\n*   **Cucumber**：`Cucumber` 是一个测试工具，通过运行用 `BDD` 风格编写的自动化验收测试来帮助测试其他软件。\n\
  \n#### 安装 Docker\n\n你需要 Docker，如果你之前按照我的讨论运行过基于 Docker 的 Cassandra 集群，那么我假设你已经安装了。如果没有，你可以下载并安装\
  \ Docker。\n\n#### 安装 Docker-Compose\n\n你可以通过以下步骤安装 `Docker-Compose`（在 Ubuntu 系统上）：\n\
  \n```\n"
- '# curl -L https://github.com/docker/compose/releases/download/1.14.0/docker-compose-''uname
  -s''-''uname -m'' > /usr/local/bin/docker-compose

  '
- '# chmod +x /usr/local/bin/docker-compose

  ```


  通过调用 `docker-compose` 来测试安装。


  ```

  '
- "# docker-compose\nDefine and run multi-container applications with Docker.\nUsage:\n\
  docker-compose [-f ...] [options] [COMMAND] [ARGS...]\ndocker-compose -h|--help\n\
  #\n```\n\n#### 安装 Cucumber\n\n我使用的是 Ubuntu 系统，因此我通过以下方式安装 `Cucumber`：\n\n```\n$\
  \ gem install cucumber\nFetching: gherkin-4.1.3.gem (100%)\n...\nDone installing\
  \ documentation for gherkin, cucumber-core, cucumber-wire, cucumber after 4 seconds\n\
  4 gems installed\n$\n```\n\n建议安装一个名为 `bundler` 的额外工具。`Bundler` 为基于 Ruby 的项目（例如我们将要使用的\
  \ `Cucumber`）提供了一致的环境。它通过跟踪并安装你需要的所有 gems 及其正确版本来实现这一点。换句话说，`bundler` 提供了一种摆脱依赖地狱的方法。\n\
  \n```\n$ gem install bundler\nSuccessfully installed bundler-1.15.1\n1 gem installed\n\
  #\n```\n\n现在你已经安装了 Docker、`Docker-Compose` 和 `Cucumber`，准备好使用 `BDD` 方法启动一个 Cassandra\
  \ 集群了。但首先，简单介绍一下用户故事和 `BDD`。\n\n### 用户故事\n\n`BDD` 使用故事来表达你想要完成的目标。它使用基于自然语言的 `Gherkin\
  \ 语法`，这种语法与我们自然说话的方式非常相似，用来描述你想要做的事情。\n\n你将你的主要目标描述为特性（features），如下所示，这里你想要部署一个新的\
  \ Cassandra 集群：\n\n> 特性：Cassandra 集群\n>   作为一名大数据管理员\n>   我想要部署一个 Cassandra 集群\n\
  >   这样我就能存储和处理海量数据\n\n一旦你描述了你的高层目标，你就描述使目标得以实现的具体场景。在这个例子中，你想要启动一个 Cassandra 数据库并测试其版本。\n\
  \n> 场景：启动 CQL Shell\n>   假设相关服务正在运行\n>    并且我在 `cassandra` 上执行 `cqlsh -e 'show version'`\n\
  >    那么我应该看到 \"CQL spec 3.4.2\"\n>    并且我应该看到 \"Cassandra 3.7\"\n\n\n\n### 准备运行\
  \ BDD 测试\n\n此时，你无需从头开始，可以直接从 GitHub 下载测试和工作所需步骤。在 GitHub 上，coshxlabs（[`www.coshx.com`](http://www.coshx.com)）有一个仓库（[`https://github.com/coshx/docker-bdd`](https://github.com/coshx/docker-bdd)），演示了如何使用\
  \ BDD 和 Cucumber 来编排 Docker 容器，帮助你快速启动开发环境。\n\n1.  你可以从 GitHub 克隆 Coshxlabs 的代码。\n\
  \    ```\n    $ git clone https://github.com/coshx/docker-bdd\n    $ git reset --hard\
  \ e9f807c\n    ```\n\n2.  移动到你从 GitHub 克隆的目录，该目录名为 `docker-bdd`。这个目录包含了所有生成用于运行\
  \ Cassandra 的 Docker 容器所需的配置文件。\n    ```\n    # cd docker-bdd\n    # ls\n    circle.yml\
  \  docker-compose.yml  example   Gemfile       README.md\n    deploy.sh   dockerfiles\
  \         features  Gemfile.lock\n    #\n    ```\n\n3.  进入 `features` 目录。\n    ```\n\
  \    # cd features\n    # ls\n    android_app.feature  app.feature  db.feature \
  \ step_definitions    support  web.feature\n    ```\n\n4.  创建一个名为 `cassandra.feature`\
  \ 的文件，并添加上一节描述的与 Cassandra 相关的功能（feature）和场景（scenario）。保存文件。`cassandra.feature`\
  \ 文件的内容应如下所示：\n    ```\n    # cat cassandnra.feature\n    Feature: Cassandra Cluster\n\
  \    As a Big Data Administrator\n    I want to deploy a cassandra cluster\n   \
  \ So I can store and query lots of data\n    Scenario: Launch a CQL Shell\n    Given\
  \ the services are running\n    And I run \"cqlsh cassandra -e 'show version'\"\
  \ on \"cassandra-dev\"\n    Then I should see \"CQL spec\"\n    And I should see\
  \ \"Cassandra 3.7\"\n    ```\n\n5.  将工作目录切换到 `docker-bdd` 目录，并编辑 `docker-compose.yml`\
  \ 文件，使其包含以下内容（`docker-compose.yml` 文件包含了 Docker 应该下载和安装的镜像名称）。\n    ```\n    cassandra:\n\
  \    image: cassandra\n    cassandra-dev:\n    image: cassandra\n    links:\n  \
  \  - cassandra\n    ```\n\n这段代码创建了两个独立的 Docker 容器，都使用相同的 Docker 镜像（“cassandra”）。你需要两个容器：一个在后台运行\
  \ Cassandra 实例，另一个用于运行 `cqlsh`。记住，你的场景中包含了以下内容：\n\n```\n在 \"cassandra\" 上运行 \"cqlsh\
  \ -e 'show version'\"\n```\n\n### 运行 BDD 测试\n\n现在你已准备好使用 Cucumber 运行 BDD 测试。操作方法如下：\n\
  \n```\n"
- "# cucumber features/cassandra.feature\nFeature: Cassandra Cluster\nAs a Big Data\
  \ Administrator\nI want to deploy a cassandra cluster\nSo I can store and query\
  \ lots of data\ncassandra uses an image, skipping\ncassandra-dev uses an image,\
  \ skipping\nPulling cassandra (cassandra:latest)...\nlatest: Pulling from library/cassandra\n\
  ockerbdd_cassandra_1 is up-to-date\ndockerbdd_cassandra-dev_1 is up-to-date\nScenario:\
  \ Launch a CQL Shell                                       # features/cassandra.feature:6\n\
  Given the services are running                                   # features/step_definitions/docker_compose_steps.rb:3\n\
  Running: docker-compose build && (docker-compose up -d || true)\nProcess exited\
  \ successfully\n[cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol\
  \ v4]\nAnd I run \"cqlsh cassandra -e 'show version'\" on \"cassandra-dev\" # features/step_definitions/docker_compose_steps.rb:14\n\
  Running: docker-compose run cassandra-dev bash -i -c \"sleep 1; cqlsh cassandra\
  \ -e 'show version'\"\nProcess exited successfully\nThen I should see \"CQL spec\"\
  \                                     # features/cassandra.feature:9\nAnd I should\
  \ see \"Cassandra 3.7\"                                 # features/cassandra.feature:10\n\
  1 scenario (1 undefined)\n4 steps (2 undefined, 2 passed)\n0m8.169s\n#\n```\n\n\
  Docker-Compose 为你创建了单节点的 Cassandra 集群，而 BDD 则在此集群上运行你指定的测试。\n\n当你首次运行此处展示的 `cucumber`\
  \ 命令时，基于你指定的场景（`\"Given the services are running\"`），Docker-Compose 会构建你在 `docker-compose.yml`\
  \ 文件中指定的所有 Docker 镜像。在后续的运行中，`docker-compose` 会识别出 `cassandra` 和 `cassandra-dev`\
  \ 实例都使用了可用的镜像，因此不再构建镜像，而是直接启动这两个 Cassandra 实例。\n\n你可以使用 `docker ps` 命令来验证这两个 Docker\
  \ 容器正在运行。\n\n```\n$ sudo docker ps\nCONTAINER ID    IMAGE    COMMAND      CREATED\
  \  STATUS     PORTS      NAMES\nb005b61706ca    cassandra   \"/docker-entrypoint.s\"\
  \   44 minutes ago   Up 40 minutes   7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra-dev_1\n\
  ed526bd724c7        cassandra           \"/docker-entrypoint.s\"   44 minutes ago\
  \      Up 40 minutes       7000-7001/tcp, 7199/tcp, 9042/tcp, 9160/tcpdockerbdd_cassandra_1\n\
  $\n```\n\n然后，你可以像这样通过 bash 进入一个容器（`dockerbdd_cassandra_dev1`）：\n\n```\n$ sudo docker\
  \ exec -it b005b61706ca bash\n/# hostname\nb005b61706ca\n/#\n```\n\n最后，你可以在新的 Docker\
  \ 容器中使用 CQL shell，如下所示：\n\n```\n$ cqlsh\nConnected to Test Cluster at 127.0.0.1:9042.\n\
  [cqlsh 5.0.1 | Cassandra 3.11.0 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP\
  \ for help.\ncqlsh>\n```\n\n你可以从 Coshxlab 的 Ben Taitelbaum 撰写的一篇文章中获取更多关于 BDD 驱动的\
  \ Cassandra 集群的详细信息，包括创建多节点 Cassandra 集群的细节，文章位于以下位置：\n\n[`www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/`](http://www.coshx.com/blog/2016/08/01/cassandra-cluster-in-docker-using-bdd/)\n\
  \n## 使用 Cassandra 集群管理器快速启动集群\n\nCassandra 集群管理器 (CCM) 是一个脚本库，可帮助你在本地服务器上创建和运行 Cassandra\
  \ 集群。CCM 不适用于生产环境或对集群进行压力测试；它是一种测试和学习如何运行 Cassandra 集群的方法。CCM 是 Docker 和 Vagrant\
  \ 之外另一种快速启动 Cassandra 集群的方式。\n\n你可以在以下情况下使用 CCM：\n\n*   当你想运行 Cassandra 而不想费心安装它时\n\
  *   用于测试故障场景\n*   当开发涉及多个版本而无需担心硬件时，因为你可以在本地节点上运行所有内容\n*   用于集成测试\n*   用于测试升级\n\n\
  CCM 的惊人之处在于它能让你多快地启动并运行一个新集群。你可以在不到一分钟的时间内启动一个多节点（本地）集群。\n\n\n\n### 安装 CCM\n\n安装\
  \ CCM 很简单：只需确保你在开始安装 CCM 之前已安装 Python（至少是 2.7 版本）和 `ant`。\n\n1.  要安装 CCM，你需要通过运行以下命令从\
  \ GitHub 获取所需文件：\n\n    ```\n    root@ubuntu2:/home/samalapati# git clone https://github.com/pcmanus/ccm.git\n\
  \    Cloning into 'ccm'...\n    remote: Counting objects: 4372, done.\n    remote:\
  \ Compressing objects: 100% (15/15), done.\n    remote: Total 4372 (delta 8), reused\
  \ 14 (delta 6), pack-reused 4351\n    Receiving objects: 100% (4372/4372), 1.80\
  \ MiB | 0 bytes/s, done.\n    Resolving deltas: 100% (3040/3040), done.\n    Checking\
  \ connectivity... done.\n    root@ubuntu2:/home/samalapati# ls\n    ```\n\n2.  一旦你从\
  \ GitHub 下载了脚本和其他文件，运行 CCM 安装脚本。\n\n    ```\n    $ sudo ./setup.py install\n   \
  \ ```\n\n安装文件位于 `ccm` 目录下。\n\n```\n$ ls\nccm      Documents  examples.desktop  Pictures\
  \  Templates\nDesktop  Downloads  Music             Public    Videos\n$ cd ccm\n\
  $ ls\nccm  ccmlib  license.txt  MANIFEST.in  misc  README.md  setup.py  ssl  tests\n\
  $ sudo ./setup.py install\nrunning install\nrunning build\nrunning build_py\ncreating\
  \ build\n...\ncreating build/scripts-2.7\n...\nrunning install_egg_info\n$\n```\n\
  \n你可以通过输入 `ccm`、`ccm -help` 或 `ccm <command> -h.` 来查看 CCM 提供的各种功能。当然，你能做的第一件也是最重要的事情是创建一个集群，接下来我将介绍这个任务。\n\
  \n### 使用 CCM 创建 Cassandra 集群\n\n按照上一节所示安装好 CCM 后，就该创建一个 Cassandra 集群了。让我们创建一个包含三个节点、运行\
  \ Cassandra 3.1 版本的集群。默认情况下，CCM 创建的是单令牌节点，因此需要告诉它使用虚拟节点。\n\nCCM 会下载其所需的所有源文件并为你编译它们。\n\
  \n```\n$ sudo ccm create -n 3 -v 3.1 testcluster --vnodes\n18:55:53,875 ccm INFO\
  \ Downloading http://archive.apache.org/dist/cassandra/3.1/apache-cassandra-3.1-bin.tar.gz\
  \ to /tmp/ccm-tlSojg.tar.gz (29.376MB)\n306318:55:59,731 ccm INFO Extracting /tmp/ccm-tlSojg.tar.gz\
  \ as version 3.1 ...\n30802666  [100.00%]Current cluster is now: testclusster\n\
  $\n```\n\n命令 `ccm list` 会显示此节点上由 CCM 管理的所有 Cassandra 集群。\n\n```\n$ sudo ccm list\n\
  *testcluster\n$\n```\n\n#### 检查集群状态\n\n你可以通过以下方式检查新三节点集群的状态（注意在 CCM 环境中不能使用 `nodetool`\
  \ 命令！）：\n\n```\n$ sudo ccm status\nCluster: 'testcluster'\n\nnode1: DOWN (Not initialized)\n\
  node3: DOWN (Not initialized)\nnode2: DOWN (Not initialized)\n$\n```\n\n新集群中的所有三个节点都处于\
  \ `DOWN` 状态，因为你刚刚创建了集群，但尚未启动它。\n\n#### 启动集群\n\n执行 `ccm start` 命令来启动 CCM 集群。在此示例中，我启动集群并使用\
  \ `ccm status` 命令检查其状态。\n\n```\n$ sudo ccm start\n$ sudo ccm status\nCluster: 'testcluster'\n\
  \nnode1: UP\nnode3: UP\nnode2: UP\n$\n```\n\n命令 `ccm node1 status` 提供了关于集群状态的更详细信息。\n\
  \n```\n$ sudo ccm node1 status\nDatacenter: datacenter1\n=======================\n\
  Status=Up/Down\n|/ State=Normal/Leaving/Joining/Moving\n--  Address    Load    \
  \   Tokens       Owns    Host ID              Rack\nUN  127.0.0.1  86.51 KB   256\
  \          ?       659b06e0-a4d9-49f5-b923-0bab9833daa3  rack1\nUN  127.0.0.2  86.47\
  \ KB   256          ?       4035e764-a152-40e6-ac9e-f9ddf1e603b4  rack1\nUN  127.0.0.3\
  \  92.34 KB   256          ?       40182f69-a81f-4a23-90ae-e9e1f0929c5e  rack1\n\
  Note: Non-system keyspaces don't have the same replication settings, effective ownership\
  \ information is meaningless\n$\n```\n\n你可以通过运行命令 `ccm stop` 来停止集群节点。\n\n### 使用\
  \ CCM\n\n在本节中，我将通过展示如何运行一些重要命令来简要介绍 CCM，其中第一条命令允许你访问 CQL shell。\n\n#### 在 CCM 中使用\
  \ cqlsh\n\n要使用 CQL，运行带有 `cqlsh` 选项的 `ccm` 命令，并确保指定一个节点。\n\n```\n$ sudo  ccm node1\
  \ cqlsh\nConnected to testcluster2 at 127.0.0.1:9042.\n[cqlsh 5.0.1 | Cassandra\
  \ 3.11.0 | CQL spec 3.4.4 | Native protocol v4]\nUse HELP for help.\ncqlsh>\n```\n\
  \n#### 获取 SSTable 信息\n\n`ccm node1 getsstables` 命令显示此节点上的所有 SSTable。\n\n```\n$ sudo\
  \ ccm node1 getsstables\n/samalapati/.ccm/testcluster/node1/data0/system_schema/triggers-4df70b666b05325195a132b54005fd48/ma-1-big-Data.db\n\
  /samalapati/.ccm/testcluster/node1/data0/system_schema/types-5a8b1ca866023f77a0459273d308917a/ma-1-big-Data.db\n\
  ...\n$\n```\n\n### 运行 Apache Spark 与 Cassandra\n\nApache Spark 是一个非常流行、快速的通用大规模数据处理引擎。Spark\
  \ 可以运行在 Apache Hadoop、Apache Mesos、云端或独立模式下。Spark 可以访问多种数据源，例如 Hadoop 的 HDFS、Hbase、AWS\
  \ 的 S3，当然还有 Apache Cassandra。\n\n在本节中，我将展示如何安装 Apache Spark，并通过 DataStax 的 Spark-Cassandra\
  \ 连接器从 Spark 集群操作 Cassandra 数据库。\n\n### 安装先决条件\n\n要安装 Apache Spark，有几个先决条件，我将在本节中进行回顾。确保在你将要运行\
  \ Spark 集群的服务器上已经安装了以下软件，如果缺失，请安装它们。\n\n1.  确保至少安装了 Java 1.8.x。\n\n    ```\n   \
  \ # java -version\n    java version \"1.8.0_131\"\n    Java(TM) SE Runtime Environment\
  \ (build 1.8.0_131-b11)\n    Java HotSpot(TM) 64-Bit Server VM (build 25.131-b11,\
  \ mixed mode)\n    #\n    ```\n\n2.  你还需要 Scala。\n\n    ```\n    # scala -version\n\
  \    Scala code runner version 2.11.7 -- Copyright 2002-2013, LAMP/EPFL\n    #\n\
  \    ```\n\n    你可以通过以下方式安装 Scala：\n\n    ```\n    # wget www.scala-lang.org/files/archive/scala-2.11.8.deb\n\
  \    # sudo dpkg -i scala-2.11.8.deb\n    ```\n\n3.  最后，你需要 SBT（Simple Build Tool）来编译\
  \ Scala 程序。\n\n    ```\n    # echo \"deb https://dl.bintray.com/sbt/debian /\" |\
  \ sudo tee -a /etc/apt/sources.list.d/sbt.list\n    # sudo apt-key adv --keyserver\
  \ hkp://keyserver.ubuntu.com:80 --recv 2EE0EA64E40A89B84B2DF73499E82A75642AC823\n\
  \    # sudo apt-get update\n    # sudo apt-get install sbt\n    ```\n\n    检查 SBT\
  \ 版本：\n\n    ```\n    # sbt sbt-version\n    ...\n    [info] 0.13.15\n    #\n  \
  \  ```\n\n拥有正确的 SBT 版本非常重要；不兼容的版本是使用 Spark 和 Cassandra 时许多问题的根源。\n\n现在你已准备好安装 Apache\
  \ Spark。\n\n### 安装 Apache Spark\n\n为你当前的目的（学习如何从 Spark 集群连接到 Cassandra 集群）安装并开始使用\
  \ Apache Spark 非常直接。请按照以下步骤安装 Spark。\n\n1.  `$ wget` [`http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz`](http://d3kbcqa49mib13.cloudfront.net/spark-2.0.2-bin-hadoop2.7.tgz)\n\
  2.  `$ tar zxf spark-2.0.2-bin-hadoop2.7.tgz`\n3.  `$ sudo mv spark-2.0.2-bin-hadoop2.7\
  \ /usr/local/spark/`\n4.  安装 Spark 二进制文件后，为 Spark 设置一个主目录。\n\n    ```\n    export\
  \ SPARK_HOME=/usr/local/spark\n    ```\n\n5.  导出 PATH 变量。\n\n    ```\n    export\
  \ PATH=\"/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:$SPARK_HOME/bin\"\
  \n    ```\n\n\n### 配置 Spark 集群\n\n你可以通过 YARN 集群管理器 (Hadoop)、Apache Mesos 或 Spark\
  \ 独立集群来运行 Spark 集群。让我们尝试最后一种方案，这样你可以同时运行 Spark 和 Cassandra 集群。\n\nSpark 由一个主节点和多个工作节点组成。为了简单起见，让我们将主服务和工作服务运行在同一个节点上，但也可以轻松配置将工作节点运行在不同的节点上。\n\
  \n主要的配置文件是 `spark-env` 文件，位于 `/etc/spark/conf` 目录中。在此文件中，你可以指定 Spark 独立部署模式下使用的守护进程选项。也就是说，你为主节点和工作节点指定选项。\n\
  \n你可以将 `SPARK_WORKER_CORES` 和 `SPARK_WORKER_MEMORY` 等所有配置属性保留为其默认值。只需确保为你指定 Spark\
  \ 主实例将运行的节点的详细信息。\n\n```bash\nexport SPARK_MASTER_HOST=192.168.159.129\n```\n\n\
  这样，主节点将运行在 IP 为 192.168.159.129 的服务器上。你必须将此属性添加到集群中每个节点的 `/etc/spark/conf/spark-env`\
  \ 文件中。由于你将主实例和工作实例运行在同一节点上，所以这没问题。\n\n在生产集群中，你可以将 Spark 配置为服务运行，但这里我只关注演示如何从 Spark\
  \ 连接到 Cassandra，因此我们不会费心创建 Spark 服务。相反，让我们手动启动和停止 Spark 集群。\n\n### 启动 Spark 集群\n\
  \n由于 Spark 集群只有一个工作实例与主实例运行在同一节点上，你需要执行以下步骤来启动 Spark 集群。\n\n1.  移动到 Spark 的 `sbin`\
  \ 目录，该目录包含集群的启动/停止脚本。\n\n    ```bash\n    # cd /usr/local/spark/spark-2.0.2-bin-hadoop2.7/sbin\n\
  \    ```\n\n2.  启动 Spark 主实例。\n\n    ```bash\n    # ./start-master.sh\n    starting\
  \ org.apache.spark.deploy.master.Master, logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.master.Master-1-ubuntu.out\n\
  \    #\n    ```\n\n3.  启动单个工作实例。\n\n    ```bash\n    # ./start-slave.sh spark://ubuntu:7077\n\
  \    starting org.apache.spark.deploy.worker.Worker, logging to /usr/local/spark/spark-2.0.2-bin-hadoop2.7/logs/spark-root-org.apache.spark.deploy.worker.Worker-1-ubuntu.out\n\
  \    #\n    ```\n\n4.  确保主实例和工作实例正在运行。\n\n    ```bash\n    # ps -ef|grep spark\n\
  \    root      14941   2008  0 10:37 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java\
  \ -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
  \ -Xmx1g org.apache.spark.deploy.master.Master --host ubuntu --port 7077 --webui-port\
  \ 8080\n    root      15073   2008  1 10:39 pts/1    00:00:04 /usr/lib/jvm/java-8-oracle/jre/bin/java\
  \ -cp /usr/local/spark/spark-2.0.2-bin-hadoop2.7/conf/:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/jars/*\
  \ -Xmx1g org.apache.spark.deploy.worker.Worker --webui-port 8081 spark://ubuntu:7077\n\
  \    #\n    ```\n\n到目前为止一切正常，Spark 集群已启动并运行。在下一节中，我将展示如何从 Spark 集群连接到 Cassandra\
  \ 数据库。\n\n### 从 Spark 集群连接到 Cassandra\n\n在 Spark 中访问 Cassandra 表的一种方法是将它们转换为 Spark\
  \ RDD（弹性分布式数据集）。你可以将 Cassandra 的表数据视为 Spark RDD，也可以将 Spark RDD 写入 Cassandra 表。\n\
  \n你可以通过多种方式从 Spark 访问 Cassandra。以下项目提供了库，使你能够从 Spark 程序读取和写入 Cassandra 表：\n\n* \
  \  [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\n\
  *   [`http://tuplejump.github.io/calliope/pyspark.html`](http://tuplejump.github.io/calliope/pyspark.html)\n\
  *   [`https://github.com/TargetHolding/pyspark-cassandra`](https://github.com/TargetHolding/pyspark-cassandra)\n\
  \n让我们使用这些项目中的第一个，即 spark-cassandra-connector。\n\nspark-cassandra-connector（DataStax\
  \ Cassandra 连接器）是由 DataStax 提供的一个 Scala 库，它使得可以同时使用 Spark 和 Cassandra。你可以从 [`https://github.com/datastax/spark-cassandra-connector`](https://github.com/datastax/spark-cassandra-connector)\
  \ 获取此连接器的最新版本。\n\n当你编写代码从 Spark 访问 Cassandra 时，你的代码，连同 spark-cassandra-connector\
  \ 及其所有必要的依赖项，会被打包并发送到 Spark 集群的节点。\n\n你通过 `spark-submit` 接口向 Spark 集群提交作业。当你这样做时，你可以在命令行包含一个肥\
  \ jar 以包含 spark-cassandra 连接器。\n\n这里的示例将展示如何从 Spark 集群执行临时工作。因此，请使用 `spark-shell`\
  \ 而不是 `spark-submit` 来与 Spark（和 Cassandra）交互。\n\n在以下示例中，你启动 `spark-shell` 并调用 spark-cassandra-connector，以便可以从\
  \ Spark 集群与 Cassandra 通信。`–packages` 选项使你能够指定 `spark-cassandra-connector`。此选项从 Spark\
  \ 包下载连接器及其依赖项。\n\n请注意，你需要从 `$SPARK_HOME/bin` 目录运行 `spark-shell` 命令，而不是从启动 Spark\
  \ 实例的 `$SPARK_HOME/sbin` 目录运行。\n\n```bash\nbin# ./spark-shell --conf spark.cassandra.connection.host=192.168.159.129\
  \ --packages datastax:spark-cassandra-connector:2.0.0-M2-s_2.11\n...\norg.scala-lang#scala-reflect;2.11.8\
  \ from central in [default]\n\n|                  |            modules         \
  \   ||   artifacts   |\n|       conf       | number| search|dwnlded|evicted|| number|dwnlded|\n\
  \n|      default     |   7   |   1   |   1   |   0   ||   7   |   0   |\n\nUsing\
  \ Spark's default log4j profile: org/apache/spark/log4j-defaults.properties\nSetting\
  \ default log level to \"WARN\".Spark context Web UI available at http://192.168.159.129:4040\n\
  Spark context available as 'sc' (master = local[*], app id = local-1499634822206).\n\
  Spark session available as 'spark'.\nWelcome to\n____              __\n/ __/__ \
  \ ___ _____/ /__\n_\\ \\/ _ \\/ _ '/ __/  '_/\n/___/ .__/\\_,_/_/ /_/\\_\\   version\
  \ 2.0.2\n/_/\nUsing Scala version 2.11.8 (Java HotSpot(TM) 64-Bit Server VM, Java\
  \ 1.8.0_131)\nType in expressions to have them evaluated.\nType :help for more information.\n\
  scala>\n```\n\n你可以使用 Scala、Python（或 Java）编写 Spark 代码。在这种情况下，你通过执行 `spark-shell`\
  \ 命令选择了 Scala。要用 Python 编写代码，请运行 `pyspark` 命令，如下所示：\n\n```bash\nroot@ubuntu:/usr/local/spark/spark-2.0.2-bin-hadoop2.7/bin#\
  \ ./pyspark \\\n> --master spark://ubuntu:7077 \\\n> --packages datastax:spark-cassandra-connector:2.0.0-M2-s_2.11\
  \ \\\n> --conf spark.cassandra.connection.host=ubuntu\nPython 2.7.12 (default, Nov\
  \ 19 2016, 06:48:10)\n...\nWelcome to\n/ __/__  ___ _____/ /__\n_\\ \\/ _ \\/ _\
  \ '/ __/  '_/\n/__ / .__/\\_,_/_/ /_/\\_\\   version 2.0.2\n/_/\nUsing Python version\
  \ 2.7.12 (default, Nov 19 2016 06:48:10)\nSparkSession available as 'spark'.\n>>>\
  \ posts = spark.read.format(\"org.apache.spark.sql.cassandra\").options(table=\"\
  posts\", keyspace=\"posts_db\").load()\n```\n\n\n# 8. 备份、恢复与数据迁移\n\n### 从 Spark\
  \ 操作 Cassandra\n\n在运行命令访问 Cassandra 数据库之前，你必须首先导入 Spark 连接器命名空间，如下所示：\n\n```scala\n\
  scala> import com.datastax.spark.connector._\nimport com.datastax.spark.connector._\n\
  scala>\n```\n\n让我们操作来自 `cyclist` 键空间的 `cyclist_name` 表。首先要做的是为该表数据创建一个 Spark RDD。\n\
  \n```scala\nscala> val rdd1 = sc.cassandraTable(\"cycling\", \"cyclist_name\")\n\
  rdd: com.datastax.spark.connector.rdd.CassandraTableScanRDD[com.datastax.spark.connector.CassandraRow]\
  \ = CassandraTableScanRDD[2] at RDD at CassandraRDD.scala:18\nscala>\n```\n\n在命令中，`sc`\
  \ 代表 Spark Context。当你调用 `spark-shell` 时，Spark 会自动创建一个名为 `sc` 的 Spark Context。Spark\
  \ Context 是所有 Spark 功能的主要入口点，你必须按照我此处展示的方式来使用它。\n\nSpark Context 使你能够连接到 Spark 集群，你可以用它在\
  \ Spark 集群中创建 Spark RDD、数据框、数据集等。在某种程度上，Spark Context 是 Spark 集群的协调者（驱动程序）。`SparkContext`\
  \ 对象协调着构成 Spark 应用程序的集群中独立的进程集。Spark Context 连接到集群管理器，该管理器可以是 Mesos、YARN 或独立集群管理器（如前所述，我使用的是\
  \ Spark 独立集群）。\n\n接下来，让我们通过运行以下代码来测试 Spark 集群到 Cassandra 数据库的连接，该代码使用 `first` 函数获取表\
  \ `CYCLIST_NAME` 中的第一行：\n\n```scala\nscala> println(rdd.first)\nCassandraRow{id:\
  \ e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname: FRAME}\nscala>\n\
  ```\n\n以下命令使用 `foreach` 结构打印表 `CYCLIST_NAME` 中的所有行：\n\n```scala\nscala> rdd.foreach(println)\n\
  CassandraRow{id: e7ae5cf3-d358-4d99-b900-85902fda9bb0, firstname: Alex, lastname:\
  \ FRAME}\nCassandraRow{id: 5b6962dd-3f90-4c93-8f61-eabfa4a803e2, firstname: Marianne,\
  \ lastname: VOS}\nCassandraRow{id: e7cd5752-bc0d-4157-a80f-7523add8dbcd, firstname:\
  \ Anna, lastname: VAN DER BREGGEN}\nscala>\n```\n\n既然你已经成功测试了从 Cassandra 表检索数据，那么让我们从\
  \ Spark 向 Cassandra 表插入一些数据。你首先创建一个名为 `collection` 的 RDD。\n\n```scala\nscala> val\
  \ collection = sc.parallelize(Seq((\"cat\", 30), (\"fox\", 40)))\ncollection: org.apache.spark.rdd.RDD[(String,\
  \ Int)] = ParallelCollectionRDD[4] at parallelize at :27\nscala>\n```\n\n接着，你执行\
  \ Spark 的 `saveToCassandra` 函数，将两行新数据插入到键空间 `test` 的表 `kv` 中。\n\n```scala\nscala>\
  \ collection.saveToCassandra(\"test\", \"kv\", SomeColumns(\"key\", \"value\"))\n\
  scala>\n```\n\n你通过查询该表来确认这两行数据已插入表 `test.kv`。\n\n```cql\ncqlsh> select * from test.kv;\n\
  key    | value\n--------+-------\ncat |    30\nfox |    40\n...\ncqlsh>\n```\n\n\
  好了！多亏了 spark-cassandra-connector，你现在可以在 Spark 集群内操作 Cassandra 表数据了。\n\n利用 Cassandra\
  \ Spark 集成，你可以做很多事情。你可以将 Spark 的计算能力与 Cassandra 的存储处理能力相结合，做出很酷的事情。然而，所有这些都属于另一本书的领域，因此我们继续前进。\n\
  \n## Cassandra 与 SMACK 技术栈：一个日益增长的趋势\n\n虽然大数据项目最初主要面向批处理，但当前的趋势是转向敏捷系统，这些系统处理流数据以支持分析系统。组织越来越关注实时或近实时的用例，如推荐引擎和欺诈检测。\n\
  \nSMACK（一个使用开源技术 Apache Spark、Apache Mesos、Akka、Apache Cassandra 和 Apache Kafka\
  \ 的系统）或其此类开源技术的变体，在流数据分析和挖掘中正日益成为关键参与者。像 SMACK 这样的技术正在成为构建利用“实时”流数据的应用程序的平台，使组织能够有效地从流数据集中提取有意义的信息。\n\
  \n本书致力于阐述面向 Cassandra 管理员的概念和技术，因此，我无法深入探讨 SMACK 技术栈所有组件的细节。但是，我想向你介绍这组关键技术，因为如果你正在使用\
  \ Cassandra，你最终很可能会接触到它。\n\n以下是 SMACK 技术栈五个组件的作用：\n\n*   Apache Spark（处理组件）：Spark\
  \ 是一个用于分布式、大规模数据集的处理引擎，特别适用于机器学习算法。你可以使用相同的接口进行 SQL 查询、机器学习和流数据处理。\n*   Apache Mesos（容器组件）：Mesos\
  \ 是一个集群资源管理系统，为分布式应用程序提供资源隔离和共享。Mesos 使用两级调度机制，它向框架（即运行在 Mesos 之上的应用程序）提供资源。Mesos\
  \ 决定每个框架获得的资源，而框架决定它们接受哪些资源以及在分配给它们的资源上执行哪些应用程序。\n*   Akka（提供模型）：Akka 是一个用于构建高并发和弹性消息驱动应用程序的工具包和运行时。“Actor”是并发计算的通用原语，它响应收到的消息。作为对消息的响应，Actor\
  \ 可以做出本地决策、创建其他 Actor、发送更多消息等等。\n*   Apache Cassandra：到现在，你应该知道 Cassandra 是什么以及它擅长什么了！\n\
  *   Apache Kafka（代理）：Kafka 是一个流行的高吞吐量、低延迟消息系统，用于处理实时数据流。Kafka 对数据流进行分区，并将其分布在集群中，这允许多个协调的“消费者”消费由“生产者”生成的数据。\n\
  \n## 总结\n\n本章旨在展示一些有趣的方法，让你可以使用不同的技术设置测试或生产环境。Docker 容器很流行，你可以在 Docker 上运行生产 Cassandra\
  \ 集群。在 Docker 上运行生产集群时，你需要处理存储和网络策略，我这里没有讨论这些。Docker 的文档相当好，你可能想利用它来了解更多关于这些以及其他\
  \ Docker 容器主题的知识。\n\nApache Spark 作为一种快速处理框架正变得越来越流行，我展示了如何从 Spark 连接到 Cassandra\
  \ 数据库并执行 DML 操作。当然，这只是一个开始，如果你希望更深入地研究 Apache Spark，其源文档非常不错。\n\nCCM 是一个很酷的工具，因为它能帮助你在短短几分钟内启动集群，而无需了解任何\
  \ Cassandra 安装程序，也无需花费时间设置任何先决条件来运行一个用于探索目的的简单测试集群。\n\n# 8. 备份、恢复与数据迁移\n\n备份和恢复数据是\
  \ Cassandra 管理员的关键职能。本章向你展示如何通过定期拍摄数据快照来备份数据。Cassandra 还允许你进行增量备份和备份提交日志段。所有这些备份在你需要执行数据库完整恢复时都派得上用场。\n\
  \n批量加载和复制数据也是一项常见任务，我解释了如何使用 `COPY` 命令以及 sstableloader 实用程序来加载数据。\n\n\n\n### 备份数据\n\
  \n备份 Cassandra 数据库涉及备份数据库 `data` 目录下的所有 SSTable 文件。你可以在数据库运行时进行备份。你可以备份整个数据库，或仅备份一个键空间，甚至只备份一张表。\n\
  \n你创建的备份（快照）可能不一致，但这完全不是问题。进行备份的目的是，如果你因任何原因丢失了部分或全部数据，可以恢复数据库。当你恢复快照时，Cassandra\
  \ 会利用你在前面章节中学到的一致性机制，使集群中所有节点的数据保持一致。\n\n`nodetool snapshot` 命令使你能够备份 Cassandra\
  \ 的数据。该工具会同时备份模式信息和 SSTables 中的数据。当你需要从快照恢复表时，你将需要数据以及模式。这样，当你需要重新创建节点的部分或全部 SSTables\
  \ 时，你将同时拥有创建表所需的数据和元数据。\n\n创建快照意味着磁盘使用量会增加，因为你将相同的数据存储在节点上的两个位置。`nodetool snapshot`\
  \ 命令仅在单节点级别工作。你可以使用像 `pdsh` 这样的并行 Shell 工具来运行集群范围的快照，通过执行 `nodetool snapshot` 命令。\n\
  \n你可以使用以下命令备份节点上的所有键空间：\n\n```\n$ nodetool snapshot\nRequested creating snapshot(s)\
  \ for [all keyspaces] with snapshot name [1499019048455] and options {skipFlush=false}\n\
  Snapshot directory: 1499019048455\n$\n```\n\nCassandra 会创建快照，其中包含此节点上所有表的数据和模式，并将每张表的数据存储在该表对应的目录中。\n\
  \n```\n$ CASSANDRA_HOME/data/data/keyspace_name/table_UID/snapshot_name\n```\n\n\
  在这个例子中，是以下目录：\n\n```\ndata/data/cycling/cyclist_name-351e8df05f4011e7b2672fabda59ff45/snapshots/1499019048455\n\
  ```\n\n你将在此目录中找到与表 `cyclist_name` 相关的所有文件：\n\n```\n"
- '# ls -altr

  total 52

  -rw-r--r-- 4 root root   92 Jul  2 11:03 mc-3-big-Summary.db

  -rw-r--r-- 4 root root   60 Jul  2 11:03 mc-3-big-Index.db

  -rw-r--r-- 4 root root   16 Jul  2 11:03 mc-3-big-Filter.db

  -rw-r--r-- 4 root root    9 Jul  2 11:03 mc-3-big-Digest.crc32

  -rw-r--r-- 4 root root  144 Jul  2 11:03 mc-3-big-Data.db

  -rw-r--r-- 4 root root   43 Jul  2 11:03 mc-3-big-CompressionInfo.db

  -rw-r--r-- 4 root root   92 Jul  2 11:03 mc-3-big-TOC.txt

  -rw-r--r-- 4 root root 4668 Jul  2 11:03 mc-3-big-Statistics.db

  -rw-r--r-- 1 root root  856 Jul  2 11:03 schema.cql

  -rw-r--r-- 1 root root   31 Jul  2 11:03 manifest.json

  drwxr-xr-x 2 root root 4096 Jul  2 11:03 .

