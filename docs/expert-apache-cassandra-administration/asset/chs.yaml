- '# 1. `Apache Cassandra` 简介


  `Apache Cassandra` 与典型的**关系型数据库管理系统**（`RDBMS`），如 `MySQL` 或 `Oracle` 数据库，有相当大的不同。本章将阐述为何总体上需要
  `NoSQL` 数据库，以及为何需要 `Cassandra`。


  此外，本章解释了 `Cassandra` 数据库的独特特性，并介绍了几个 `Cassandra` 特有的关键概念和术语。


  你将学习使 `Cassandra` 变得特别的关键概念。本章还介绍了 `Cassandra` 的数据建模，并解释了关键的 `Cassandra` 术语。


  本书是关于如何管理 `Cassandra` 的，因此我也解释了 `Cassandra` 管理的显著特性、用于管理 `Cassandra` 集群的工具，以及 `Cassandra`
  数据库管理的基础知识。


  ## 什么是 `Cassandra`？


  `Apache Cassandra` 是一个分布式的 `NoSQL` 数据库系统，基于 `Amazon` 的 `Dynamo` 和 `Google` 的 `Bigtable`。`Cassandra`
  是一个快速、分布式的数据库，具有高度的容错性和可扩展性。它提供高可用性和线性可扩展性，这是传统关系型数据库在处理非常庞大的数据集时无法同时满足的两个目标。


  云应用需要高度可扩展的后端数据库，能够跨服务器集群处理分布式的、大规模的工作负载。这些应用需要非常快的数据访问速度，以满足各种应用程序对数据存储的交互式使用以及临时查询。`Cassandra`
  正是为大容量、低延迟的云应用而设计的。


  `Facebook` 开发了 `Cassandra` 用于搜索收件箱，该项目于 2008 年 7 月开源。2009 年 3 月，该项目被接受加入 `Apache
  孵化器`，并于 2010 年 2 月成为 `Apache` 顶级项目。`Cassandra` 这个名字源自古希腊预言家 `Cassandra`。


  在以下各节中，我将简要描述 `Cassandra` 的主要特性：


  *   开源特性

  *   容错性

  *   高性能

  *   分布式数据库架构

  *   高可扩展性

  *   弹性特性

  *   处理多种类型数据的能力


  ### 开源数据库


  `Cassandra` 并非商业产品。它是一个纯粹的开源产品，这意味着你不仅无需付费，还可以根据自己的需求对其进行定制。然而，如果你正在使用生产环境的 `Cassandra`
  集群，了解 `DataStax`——这家“`Cassandra` 公司”很重要。`DataStax` 是一家由 `Cassandra` 数据库主要创建者运营的公司。`DataStax`
  提供诸如 `Cassandra DevCenter` 和 `Cassandra Enterprise` 之类的商业产品，以便你更轻松地设置和运行 `Cassandra`
  集群。`DataStax` 还提供多门关于 `Cassandra` 数据建模、开发和运维的免费课程，并通过其文档、课程和会议，成为 `Cassandra` 的主要倡导者。


  ### 容错性


  `Cassandra` 会自动将数据复制到多个节点。这与传统关系型数据库形成鲜明对比，后者需要你设置复杂的复制架构才能将数据传播到多个节点以实现容错。对于每次更新，你都可以选择同步或异步复制。


  由于数据库运行在一组相似的节点上，因此 `Cassandra` 集群中不存在**单点故障**。正如你将在本书后面学到的，基于 `Cassandra` 的应用程序即使在整个
  `Cassandra` 数据中心（定义与传统的组织数据中心不同）丢失的情况下也能继续运行。


  ### 高性能


  `Cassandra` 是一个高性能的数据库，基准测试表明其性能超越了其他 `NoSQL` 数据库。在 2012 年进行的一项主要的综合性 `NoSQL` 基准测试中，`Cassandra`
  在多个实验中针对最大节点数量实现了最高吞吐量。


  `Cassandra` 提供非常高的吞吐量，尤其是在写入时。可预测的高性能意味着你可以满足要求低延迟的严格业务 `SLA`（服务水平协议）。


  尽管工作负载增加，或向集群中添加大量节点，`Cassandra` 仍能持续提供高性能，这得益于数据库的线性可扩展性。


  ### 分布式配置与高韧性


  `Cassandra` 安装使用多个节点，且不存在单点故障。节点之间不存在主从关系；`Cassandra` 集群中的所有节点都是相同的。


  `Cassandra` 会自动将数据复制到多个节点。你可以将节点放置在多个机架中，或者，如果你使用的是像 `Amazon Web Services` 这样的云设置，则可以放置在不同的可用区中。将数据分布在多个地理区域将确保数据始终可用。


  `Cassandra` 使用“数据中心”的概念，它是一组节点。数据中心可以是逻辑的或物理的，因此你可以拥有遍布全球的数据中心。这一特性，加上数据复制，提供了非常高的可用性，因为
  `Cassandra` 不仅能承受一个或多个节点的丢失，还能承受整个数据中心的丢失。


  ### 灵活性


  `Cassandra` 使用极其灵活的数据模型。一个表中的不同行可以拥有不同数量的列。用户还可以在运行时更改模式。`Cassandra` 的**可调一致性**特性允许你在读或写操作级别调整一致性。你可以根据你的主要目标是可靠性还是速度来调整复制和读/写一致性保证。


  ### 使用廉价服务器


  与关系型数据库不同（大多数关系型数据库需要高度稳健且昂贵的硬件），`Cassandra` 可以在商用硬件上运行。商用硬件比托管 `Oracle` 等数据库的高端服务器便宜得多。虽然更容易发生故障，但商用服务器工作得非常好，因为
  `Cassandra` 的架构不涉及单点故障。


  ### 易于管理


  由于其简单的架构和缺乏过多复杂的组件，`Cassandra` 易于管理。`Oracle` 和其他关系型数据库具有许多功能，这会导致数据库臃肿，进而可能导致数据库不稳定。


  与管理像 `Oracle` 数据库这样的复杂数据库相比，管理 `Cassandra` 数据库，尤其是通过像 `DataStax` 这样的框架，要简单得多。在 `Oracle`
  数据库中，备份和恢复数据库、优化 `SQL` 查询以及管理复制都是复杂的任务。`Cassandra` 通过保持简单性，使你能够快速上手。


  当你通过添加更多节点来扩展 `Cassandra` 集群时，需要记住的一个关键点是：你不需要为管理 `Cassandra` 的团队增加更多成员。管理 20 个节点集群的团队同样可以处理
  1000 个节点的集群。因此，随着 `Cassandra` 数据库的扩展，管理成本会下降。




  ### 高度可扩展


  Cassandra 具有高度可扩展性。要分析更多数据，您只需向部署中添加更多节点即可。Cassandra 提供**线性可扩展性**，这意味着，如果需要处理三倍增长的写入量，您只需将节点数量增加三倍。


  您可以轻松扩展 Cassandra，无需任何停机或中断正在进行的工作。


  大型 Cassandra 生产部署包括 Netflix（拥有超过 2,500 个节点和 420TB 数据）和 Apple（拥有超过 75,000 个节点和超过
  100PB 数据）。


  Cassandra 高性能的关键之一在于其**水平可扩展**性。与依赖于提升服务器处理、存储和内存能力的垂直扩展策略不同，水平扩展是向集群中添加更多节点。


  随着您向 Cassandra 集群中添加新机器，读取和写入吞吐量都会线性增长；也就是说，例如，通过将集群中的机器数量翻倍，您可以使吞吐量翻倍。此外，您无需付出服务中断的代价，因为在集群规模扩展期间，数据库保持可用，您的应用程序继续无障碍运行。


  ### 这还是熟悉的 SQL！


  最后，Cassandra 查询语言（`CQL`）的语法结构与我们大多数人已经熟悉的 SQL 语言相似，这使得开发人员和管理员可以相当容易地掌握 `CQL`。


  与 Cassandra 数据库交互最简单的方式是通过 `CQL` shell，通过 `cqlsh` 工具调用。`CQL` 使用与常规 SQL 相似的语法。您可以通过
  `cqlsh` 执行数据操作（DML）和数据定义语言（DDL）任务。


  ### 关系型数据库带来的问题


  当您尝试扩展到非常大的数据量时，会遇到关系型数据库的各种问题。关系型数据库所提供的高可用性概念有时也值得商榷。


  当您使用 Linux 实用程序如 `sed` 和 `awk` 或简单的 Python 脚本来分析数据时，大多数时候您甚至不需要数据库。更常见的情况是，您会处理中等规模的数据，这时可以使用诸如
  `MySQL`、`Oracle`、`PostgreSQL` 或 `SQL Server` 之类的数据库。这些数据库提供众所周知的 `ACID` 保证。


  随着数据量的增长，您可以通过添加更强大的 CPU 和更多 RAM 来垂直扩展这些关系型数据库，但这些关系型数据库的扩展性存在一个有限的上限，而且由于数据库不是分布式的，费用会变得失控。


  ### 关系数据库管理系统与大数据


  关系型数据库通常采用**主从格式的复制**来解决读取密集型工作负载的问题。当您为关系型数据库（如 `MySQL`）添加复制时，`ACID` 保证就变得难以实现。例如，当您在
  `MYSQL` 中复制数据时，主节点和从节点之间通常存在复制延迟。如果在从节点复制到数据之前客户端从从节点读取，则一致性保证（`ACID` 中的 C）就丧失了。


  ##### 由第三范式引起的性能问题


  在关系型数据库中，通常将数据置于众所周知的**第三范式**中。第三范式会对查询性能产生若干影响，使您难以扩展。查询变得越来越复杂，涉及大量的连接（join）以及资源消耗大的分组操作，如
  `ORDER BY` 和 `UNION`。


  查询是临时的（adhoc），用户希望立即得到结果。如果您的数据集大于分配给数据库的内存，由于大量的磁盘寻道，结果将会很慢。


  摆脱这种性能困境的一种方法是，在读取时创建多个反范式化（denormalized）的表，这样读取操作就不会涉及太多昂贵的连接。然而，这意味着您最终将拥有重复的数据集，这违反了第三范式。


  ##### 由分片（Sharding）引起的问题


  分片是指，您不再拥有一个数据库，而是将数据分散到多个数据库中。


  分片意味着您将所有东西都反范式化，并且不能再进行任何聚合或连接。您的数据分布在众多机器上，而聚合操作需要您访问每一个分片。添加分片需要您移动数据。由于分片会抑制性能，您被迫进行反范式化，这意味着您需要保留经常查询的关键数据的多个副本，例如一个副本基于
  `Customer Id`，另一个基于 `State`。


  当您有多个分片时，模式（Schema）更改是困难的，因为您必须将更改传播到所有分片。此外，如果您想将数据库的规模扩大一倍或两倍，您需要重新分片所有数据。


  ##### 高可用性的神话


  高可用性是使用复制数据库的用户经常追求的主要好处。然而，高可用性并不简单。高可用性涉及众多活动部件，并带来巨大的开销。尽管成本高昂，高可用性仍然很难实现，因为主从环境确实会因配置更改、驱动器和电源故障等原因而频繁停机。


  除了计划外停机，您还应该处理由于操作系统补丁和升级导致的计划内停机。故障转移过程，无论是自动还是手动的，都不是无误的，并且通常涉及启动从节点或备用数据库的延迟，从而导致停机。


  管理跨多个数据中心运行的 `MySQL` 等关系型数据库并非易事；它需要一个由高技能数据库专业人员和 Linux 工程师组成的团队持续关注。


  Cassandra 通过提供以下功能简化了您的数据库架构：


  *   **对等（Peer-to-Peer）架构**：Cassandra 使用对等架构，没有主实例和从实例的概念。摒弃主/从概念意味着活动部件更少。这种策略导致了一个简单的架构，其中所有节点都是平等的。

  *   **无故障转移**：对等架构意味着不存在**故障转移**的概念。数据库不必处理复杂的状态维护操作，例如领导者选举。

  *   **可靠性**：数据库完全预期到故障的发生，架构中单个组件的故障永远不会成为阻碍。您的用户完全不会察觉到有一个或多个节点、甚至整个数据中心崩溃或因其他原因不可用。

  *   **数据局部性**：Cassandra 旨在实现**数据局部性**，而不是收集分散在大量节点上的数据。

  *   **更低成本**：Cassandra 降低了扩展的成本（使用传统关系型数据库扩展可能很昂贵）。由于 Cassandra 运行在商用服务器上，您的成本远低于使用强大服务器扩展关系型数据库的成本。您无需购买几台价值数十万美元的服务器，而是购买数百台每台仅需几千块的服务器。


  Cassandra 是 NoSQL 数据库阵营中的领先成员，因此，回顾一下对 NoSQL 数据库的需求、各种类型的 NoSQL 数据库以及它们所解决的问题类型，是一个好主意。




  ### NoSQL 数据库的兴起


  正如关系型数据库的出现是为了解决数据异常和同一数据库难以适用于新应用的问题一样，NoSQL 数据库的兴起也有其成为大数据领域重要参与者的原因。关系模型在扩展性上的失败，使其无法满足日益增长的海量读写操作需求，从而导致了
  NoSQL 数据库的出现。


  NoSQL 数据库可以运行在单台服务器或多台服务器上；当它们运行在多台服务器上时，被称为分布式数据库。大多数 NoSQL 数据库处理大型数据集，因此通常是分布式数据库。


  与关系型数据库设计不同，在关系型数据库中，模型是核心，实体的结构和它们之间的关系驱动着数据库的设计；而在 NoSQL 数据库中，性能才是关键。你仍然会有实体和关系，但维护关系并非神圣不可侵犯；目标是为了性能。


  有几种类型的 NoSQL 数据库，每种都旨在解决不同类型的问题。以下各节简要描述了 NoSQL 数据库的主要类型。


  ### 键值数据库


  键值数据库采用基于键集合和值集合的简单数据模型。键是用于查找数据的标识符，值是与键相关联的数据。


  键值数据库采用的简单模型意味着没有表以及相关的实体，如列和约束。这些数据库不支持使用 SQL 查询数据库。


  亚马逊的`DynamoDB`、`Riak`、`Oracle BerkeleyDB`，以及缓存数据库如`Redis`和`MemcacheD`都是键值数据库。


  ### 文档数据库


  文档数据库存储文档，即你以灵活结构存储的数据项集合。文档只是一个数据结构，数据库将其存储为字符串或其二进制表示。这里的文档是半结构化实体，采用标准格式，如`JavaScript
  Object Notation (JSON)`或`Extensible Markup Language (XML)`。


  文档数据库可以在单个文档中存储多个属性，而不是像键值数据库那样为每个实体属性使用单独的键。


  与键值数据库类似，文档数据库使用标识符，但其值（数据库存储为文档）通常比键值数据库中的简单键更复杂。


  你不需要在向文档数据库添加数据之前定义模式。添加文档将创建支持该文档所需的必要数据结构。由于没有固定模式，与关系型数据库相比，开发者在使用这些数据库时拥有更大的灵活性。


  流行的文档数据库包括`MongoDB`、`CouchDB`和`CouchBase`。


  ### 列族数据库


  列族数据库借鉴了关系型数据库的一些特性，将数据组织成列的集合。然而，为了提升性能，它们牺牲了关系型数据库的一些基本功能，例如连接表的能力。


  列族数据库中的行可以有不同的列。当你处理大量列时，可以将列分组为相关列的集合。这些相关列的集合称为列族。一个列族数据库包含数百万列并不罕见。


  与文档数据库一样，列族数据库不需要你预先定义固定的模式。


  通常，列族数据库是反范式化的，你可以在一个宽行中找到关于一个对象的所有信息。`Cassandra`中的一行可以拥有多达二十亿个列。用于处理列族数据库的查询语言类似于
  SQL，并使用类似 SQL 的语句，如`SELECT`、`UPDATE`和`INSERT`。


  `Apache Cassandra`和`Apache Hbase`（通常与`Hadoop`发行版捆绑）是两个著名的列族数据库。


  ### 图数据库


  图数据库是一种专门的 NoSQL 数据库，它使用称为节点和关系的结构（正式术语中称为顶点和边），而不是用列和行来建模数据。图数据库专为对对象及其间关系进行建模而设计。


  图数据库与你通常称为图表的可视化工具无关。它们的名字来源于图论，这是数学的一个分支，通过将对象表示为顶点并将它们之间的关系表示为边来研究对象。


  图数据库对对象间的邻接关系进行建模。图数据库中的一个节点包含指向与它相邻的对象的指针。这些指针使得需要遍历图中路径的操作能够快速执行。


  图数据库中的节点是一个具有标识符和一组属性的对象。两个节点之间的关系是一个包含该关系属性的链接。


  在涉及节点间多条路径的模型中，图数据库使你能够高效地查询数据。使用数据的表格表示来查询这类数据要困难得多，因为那些格式需要递归 SQL 结构，例如`Oracle`的`CONNECT
  BY`子句来查找路径。


  图数据库可以表示现实世界中的广泛实体。例如，一个城市可以是一个节点，关于城市间距离和旅行时间的信息可以存储在城市之间的关系中。


  `Neo4j`是一个流行的图数据库。


  ### Cassandra 的特殊能力


  在接下来的章节中，我将重点介绍`Cassandra`的一些特殊能力，这些能力使其有别于其他 NoSQL 数据库。当然，这些能力并非`Cassandra`独有，因为一些替代方案也提供了其中某些功能，但没有其他数据库能在提供所有这些功能方面与之相提并论。


  ### 分布式与去中心化数据库


  `Cassandra`是完全分布式的。`Cassandra`集群中的每台机器在数据处理方面承担相等的负载。在诸如`Hadoop`的大数据框架中，情况则大不相同。有一个名为`NameNode`的主节点，负责管理所有数据的读写。同样，`MongoDB`有它的`mongos`，与常规节点相比需要特殊处理，因为它们可能成为瓶颈。


  与其他集群相比，在`Cassandra`集群中进行安装和故障排除要容易得多，因为所有节点在功能上都是相同的。`Cassandra`的对等策略意味着增加容量是一项简单的操作。


  你可以通过将一些节点设置为主节点，其他节点设置为从节点来扩展`MySQL`等数据库。`Cassandra`被设计为一个去中心化数据库，这意味着所有节点都是相同的；没有主/从节点的概念。这也意味着没有单点故障，因为没有特殊的主机，无论节点是否发生故障，集群都能继续运行。


  ### 日志结构存储引擎


  `Cassandra`使用一个高效的日志结构引擎，将更新操作转化为顺序 I/O。


  `Cassandra`的存储引擎永远不需要或读取现有数据。它只追加更新后的数据，从而使更新操作非常快速。




  ### 本地管理存储


  Cassandra 在本地管理所有存储。初看之下这似乎微不足道，但与 `Hbase` 等依赖底层存储系统（如 `HDFS` Hadoop 分布式文件系统）进行复制的
  NoSQL 数据库相比，Cassandra 提供了更多功能。


  你可以使用本地管理存储策略，将 Cassandra 的 `commitlog` 放置在独立的磁盘上。你还可以在同一个集群中混合使用 `SSD`（固态硬盘）和 `HDD`（机械硬盘）。


  你可以根据访问模式减少 I/O，以降低使用极快存储的成本。DataStax 提供了 `DSE` 分层存储，允许你将减少的 I/O 转化为存储端的成本节约。


  `DSE` 可以透明地将老化数据从快速的 `SSD` 层移动到较慢的存储层。时序数据和社交互动数据都是可以从 `DSE` 分层存储中受益的数据类型的良好示例。


  ### 处理多种类型数据的能力


  Cassandra 能处理各种类型的数据，例如结构化、半结构化和非结构化数据。


  ### 面向行


  尽管 Cassandra 属于列式数据库类型（其数据存储按列组织），但它实际上是一个分区数据存储，"分区"指的是数据库对每一行使用唯一键，将行分布到多个节点上。它以稀疏哈希表的形式存储数据，"稀疏"暗指并非所有行都拥有相同的列。


  Cassandra 最有趣和最显著的特性之一是 `tunable consistency`（可调一致性），我将专门用一整节来讨论数据库一致性，因为透彻理解这个主题至关重要。


  ### 一致性、ACID 要求、CAP 定理与 BASE


  一致性是数据库的一种属性，确保读取操作总是检索到最新的值。所有拥有相同数据的节点，在写入后应处于一致的状态。


  与提供严格一致性以确保事务总是正确的关系型数据库不同，NoSQL 数据库提供了一种称为 `eventual consistency`（最终一致性）的机制。


  在 `NOSQL` 数据库中，一致性和可用性之间存在权衡。Cassandra 牺牲了一些一致性以提供高可用性。更准确地说，应该说 Cassandra 提供了 `tunable
  consistency`（可调一致性），这意味着你可以选择最适合你的一致性级别，并在可用性方面做出相应妥协。


  要理解 Cassandra 的这一关键特性 `tunable consistency`，深入探究传统关系型数据库的 `ACID` 要求基础、Brewer 的 `CAP`
  定理以及 `BASE` 特性是很有帮助的。


  ### ACID 要求


  与其他文档数据库以及广泛归属于 NoSQL 数据库范畴的其他数据库一样，Cassandra 不支持关系型数据库所提供的著名 `ACID` 特性。`ACID` 特性是所有现代事务型数据库（如
  `MySQL` 和 `Oracle`）的标志，指以下一组原则：


  *   `Atomicity`（原子性）：这是"全有或全无"的原则，要求如果事务中哪怕有一个元素失败，整个事务也将失败。只有当数据库成功执行所有任务时，事务才算成功。

  *   `Consistency`（一致性）：此属性确保数据库完全完成所有事务，要求数据库在事务开始和结束时都必须处于一致的状态。

  *   `Isolation`（隔离性）：每个事务都应独立于其他事务。任何事务都不应访问其他处于未完成状态的事务。

  *   `Durability`（持久性）：一旦事务完成，它就是"永久的"。也就是说，数据库会将事务记录在持久化存储中，确保事务在系统故障（如断电或磁盘故障）后仍然存在。


  虽然 `ACID` 要求在许多年里很好地服务了传统关系型数据库，但诸如非结构化数据、非关系型数据等非关系型数据的流行，以及分布式计算系统的激增，引发了对数据库必须满足的事务特性的新看法。


  ### CAP 定理


  一致性、可用性和分区容错性（`CAP`）定理旨在完善你在现代分布式计算系统中实施应用程序所需满足的要求。`CAP` 定理代表以下原则：


  *   `Consistency`（一致性）：与 `ACID` 的一致性属性相同。满足此要求意味着数据存储的所有客户端都获得"合理"的响应。如果客户端 A 向节点
  X 写入 1 然后写入 2，另一个客户端 B 不能先读取到 2 然后读取到 1。

  *   `Availability`（可用性）：系统在被请求时必须可用。对数据存储的所有操作最终必须成功返回。

  *   `Partition Tolerance`（分区容错性）：如果网络无法在两组节点之间传输消息，系统必须继续正确工作。分布式系统中单个节点的故障不得导致整个系统故障。即使存在部分数据丢失或局部系统故障，系统也必须可用。


  问题是，在任何给定时间，分布式系统通常只能支持这里列出的三个要求中的两个。这意味着在使用 NoSQL 数据库等分布式数据存储时，权衡通常是不可避免的。这就是为什么我们有那句名言："一致性、可用性、分区容错性，三者选其二。"


  大多数现代分布式数据存储，如 Cassandra，提供 `availability`（可用性）和 `partition tolerance`（分区容错性），而牺牲了
  `consistency`（一致性）。这里的理念是，应用程序短时间的异常行为比数据库短时间不可用更可取。


  如果两个节点无法通信，而你要求严格一致性，系统将表现为宕机。像 `Cassandra` 这样的数据库选择在网络分区（当节点间网络丢弃消息时）期间保持高可用性，而不是满足一致性原则。


  严格一致性，特别是当你的数据中心分布在全球各地时，由于数据中心之间不可避免的延迟，你可能永远无法满足。可用性是分布式数据库可以尝试满足的一个更实际的原则。


  当然，出于可靠性考虑，满足 `availability`（可用性）和 `partition tolerance`（分区容错性）要求至关重要。这意味着 `consistency`（一致性）要求常常面临风险。然而，像
  Cassandra 和 Amazon 的 `DynamoDB` 这样的领先 NoSQL 数据库能很好地处理一致性损失。如何做到的呢？这是由于这些数据库采用了称为
  `BASE` 的系统，这是一套修改后的 `ACID` 要求，以适应现代 NoSQL 及相关的非关系型数据库。`BASE` 代表如下：


  *   `Basically Available`（基本可用）：系统保证数据的可用性，即它会响应任何请求。然而，响应可能是一个"失败"（未能获取请求的数据集），或者返回的数据集可能处于不一致或变化的状态。

  *   `Soft state`（软状态）：系统的状态始终是"软"的，意味着"最终一致性"（最后一个要求）可能在任何给定时间导致系统状态发生变化。

  *   `Eventually Consistent`（最终一致性）：一旦系统停止接收新的数据输入，它最终会变得一致。只要系统在接收输入，它在转向下一个事务之前不会检查每个事务的一致性。


  支撑 Amazon 购物车技术的 `DynamoDB` 强调高可用性，意味着它可以在一致性方面放宽要求。这类数据库摒弃了传统意义上支持一致性所需的复杂查询，转而追求最终一致性的目标。




  '
- '# 最终一致性与 Cassandra


  在此上下文中，最终一致性指的是在分布式系统中，并非所有节点都能看到数据的同一版本；在任何给定时刻，节点之间的状态可能会出现分歧。也就是说，某些节点有可能提供过时的数据。然而，经过足够长的时间后，系统的状态最终会变得一致。


  另一方面，流行的 NoSQL 数据库 `MongoDB` 更倾向于一致性和分区容忍性，而非高可用性。


  关于 CAP 和 BASE 的讨论表明，尽管像 `Cassandra` 这样的 NoSQL 数据库有其优势，特别是在支持水平扩展和高效处理非关系型数据方面，但它们也确实存在独特的缺点，并且在同时支持数据一致性和可用性等传统原则方面做出了关键性的牺牲。


  一致性虽然是一个值得称赞的目标，但会对成本效益高的水平扩展产生负面影响。如果数据库需要持续检查每笔交易的一致性，那么一个拥有数十亿交易的数据库将产生巨大的开销来执行所有这些检查。在一个大型分布式数据库中，一致性的想法是不切实际的。


  正是最终一致性原则，使得谷歌、推特和亚马逊等公司能够与全球数百万客户互动，通过支持分区容忍性来保持其系统的可用性。如果没有最终一致性原则，就不会存在所有这些能够成功应对因云计算、社交网络及相关现代趋势而导致数据量呈指数级增长的系统。


  > **注意**

  > `Cassandra` 允许你设置一个客户端在所有操作中都必须指定的一致性级别。通过这种方式，你可以决定 `Cassandra` 集群中有多少节点必须确认一次写操作，数据库才认为写操作成功。

  >

  > 假设你为某些数据设置了复制因子为 3，意思是数据库必须将所有数据传播到三个不同的节点。通过将你的一致性级别设置为 2，例如，你告诉 `Cassandra`
  即使某些节点宕机，也将一次更新或写入视为成功。


  ### Cassandra 的缺点


  尽管 `Cassandra` 提供了诸多好处，但你应当认识到该数据库也存在一些明显的缺点，特别是当你来自关系型数据库背景时。


  在接下来的章节中，我将从查询数据和写入数据两个角度来审视 `Cassandra` 的缺点。


  ### 查询数据的问题


  `Cassandra` 在查询数据时的主要缺点在于它是一个最终一致性的数据库，并且它不支持标准的数据库连接操作。


  #### 最终一致性


  `Cassandra` 自动将数据复制到集群中的各个节点。这里没有主节点，数据传播确实涉及一些延迟，因此，你最终会得到一致性。


  如前所述，最终一致性意味着在分布式设置中，为了实现高可用性，有一个非正式的保证：如果数据项没有新的更新，最终所有对该数据项的访问都将返回一个相同的（最后更新的）值。你可以通过使用
  `quorum reads and writes`（法定人数读写）来减轻最终一致性的副作用。


  #### 无连接操作


  `Cassandra` 不使用表连接，而表连接是关系型数据库查询的一个关键特性。因此，你也没有任何外键。


  你可以通过反范式化你的数据，使用重复数据和面向查询的存储格式来绕过缺乏事务的问题。另一个策略是使用像 `Apache Spark` 这样强大的数据分析工具与 `Cassandra`
  一起使用。


  #### 无索引


  关系型数据库既采用唯一标识行的主键，也采用称为二级索引的多个其他索引来加速检索。`Cassandra` 表确实使用主键，但数据库对二级索引的支持有限。


  在 `Cassandra` 中，你会发现很少有情况需要创建二级索引。不加选择地使用二级索引会损害性能。


  ### 写入数据的问题


  由于缺乏对传统事务的支持，以及不可变表和变更操作带来的开销，`Cassandra` 在写入数据时也存在一些缺点。


  #### 缺乏对事务的支持


  事务是传统关系型数据库的重要组成部分，但 `Cassandra` 不支持事务相关概念，例如在处理关系型数据库时至关重要的回滚或锁定机制。


  `Cassandra` 确实支持轻量级事务，但它们代价高昂。`Cassandra` 使用 `Paxos 协议` 来实现轻量级事务，以按顺序处理并发读写数据项的操作。`Paxos
  协议` 通过具有实时约束的串行一致性来实现，最终得到的事务隔离类似于 `Oracle` 等数据库中提供的串行化隔离级别。第 7 章将详细讨论 `Paxos 算法`
  和可线性化一致性。


  #### 不可变表和变更操作带来的开销


  `Cassandra` 将其数据存储在称为 `SSTables` 的不可变结构中。当你更新数据时，`Cassandra` 会将数据分散到多个 `SSTables`
  中。当你删除数据时，它会创建称为 `tombstones`（墓碑）的标记，以确保数据库在集群的所有节点上正确删除数据。


  由于读取操作必须从多个表中收集数据，因此读取存在固有的开销。正如你将在第 11 章中学到的，通过压缩来清理 `SSTables` 可以减轻这种开销。


  ### 谁应该使用 Cassandra？


  我已经解释了 `Cassandra` 的关键缺点。这些缺点不应该阻止你使用 `Cassandra`；远非如此！这些缺点应该用于告诉你，你的用例是否应该使用 `Cassandra`。


  当你处理不变化的数据（不可变数据），并且更新和删除很少发生时，`Cassandra` 是一个绝佳的选择。这意味着 `Cassandra` 非常适合处理来自个性化、欺诈检测、时间序列和传感器数据的海量不可变数据。


  如果你主要寻找一个能执行快速写入的数据库，`Cassandra` 也是一个合适的选择。


  ### Cassandra 优化


  虽然关系型数据库广泛使用诸如查询优化和压缩等策略，但 `Cassandra` 使用了各种优化，其中一些你通常不会在关系型数据库中找到。以下部分描述了关键的 `Cassandra`
  性能优化。


  ### 数据缓存


  `Cassandra` 提供集成的缓存机制，并将缓存数据分布在集群中。当一个节点不可用时，客户端可以从数据的另一个缓存副本中读取数据。这里没有单独的数据库缓存层。`Cassandra`
  提供两种类型的数据缓存：分区键缓存和行缓存。


  -   分区键缓存会缓存 `Cassandra` 表的分区索引，以减少查找时间。

  -   行缓存将缓存整行数据。当读取次数远大于（约 95%）写入次数时，`Cassandra` 建议你使用行缓存。



  ### 压缩


  Cassandra 允许你压缩数据，以减少存储在磁盘上的数据量，并降低磁盘 I/O。在关系型数据库中，压缩通常开销较大，因为需要额外的 CPU 周期以及用于压缩和解压数据的磁盘
  I/O。由于 Cassandra 表是不可变的（*一旦刷新到磁盘，就永远不会被修改*），数据库无需进行重新压缩来处理写入。这意味着 Cassandra 只在最初将表从内存表写入磁盘时压缩一次
  SSTables。


  除了 SSTables，也可以压缩 Cassandra 的提交日志来提高写入性能。


  Cassandra 提供了多种压缩策略，我将在第 11 章中讨论它们。


  ### 布隆过滤器


  Cassandra 使用布隆过滤器来确定一个表（SSTable）是否包含特定分区的数据。其目的是在搜索特定数据时，避免读取整个 SSTable。Cassandra
  将布隆过滤器用于索引扫描，但不用于范围扫描。


  ### 压缩


  SSTables 是不可变的，这意味着 Cassandra 不会通过插入或更新来覆盖现有数据。相反，Cassandra 会将插入或更新的数据的时间戳版本写入一个新的
  SSTable。因此，随着时间的推移，Cassandra 会在不同的 SSTables 中留下一行的多个版本。


  Cassandra 也不会通过立即删除数据来执行删除操作。它只是用墓碑标记数据，表明该数据已被删除。


  Cassandra 会定期合并 SSTables 以丢弃旧数据，这个过程称为压缩。压缩的结果是，使用该行每个列的最新版本，组装出一个完整的行。


  有多种压缩策略可供选择，具体取决于你的工作负载是写入密集型还是读取密集型。


  ## Cassandra 适合你吗？


  Cassandra 并非通用数据库！以下是 Cassandra 理想的常见用例。


  *   **大型环境**：Cassandra 是面向高交易量的数据库。一个优秀的关系型数据库管理系统可以在仅一台或几台服务器上处理大量交易。你的用例必须涉及超高的吞吐需求、高流量以及对低延迟工作的要求，才值得考虑使用
  Cassandra。

  *   **写入密集型工作负载**：Cassandra 非常适合涉及大量写入的用例，因为它为写入操作提供了高吞吐量。如果你有大量客户端和高写入量，Cassandra
  是一个绝佳的选择。

  *   **分布式数据**：由于 Cassandra 在处理地理上分布的集群方面表现良好，一个受益于在用户附近存储数据的全球性应用可以潜在地使用 Cassandra。


  Cassandra 并非适合所有用例的最佳选择。然而，本章前面描述的原因，如快速性能和支持大量复杂数据类型，使其成为高度可扩展存储的杰出工具。


  对于大多数存储需求，你可以继续使用 MySQL 或 Oracle。如果业务部门看到需要存储非常大量的数据，那就是你想要使用 Cassandra 的地方。在这些情况下使用
  Cassandra 是有意义的，而不是试图扩展关系型数据库的能力来管理和分析海量数据。


  ## Cassandra 数据建模要点


  第 4 章重点介绍 Cassandra 数据建模，本书其他多个章节详细阐述了关键的 Cassandra 数据建模概念。在这个介绍性章节中，我想提及在 Cassandra
  数据库中成功数据建模的关键原则或规则。


  你需要一种新的思维方式来编写在分布式数据库上可扩展的应用程序。首先要记住的是，Cassandra 并不是关系型数据库的直接替代品。这意味着你不能期望将数据和查询从关系型数据库直接放入
  Cassandra 并期望一切正常工作。为了充分利用 Cassandra，你应该使用 Cassandra 的数据建模原则和规则来设计你的应用程序。


  Cassandra 使用的数据模型基于你将对数据库运行的预期查询，而不是基于对实体及其之间关系的建模。


  对于过渡到 Cassandra 等分布式数据库的用户来说，尝试使用物化视图、索引和用户定义函数来扩展他们的应用程序是很常见的。当你在基于 Cassandra 的应用程序中使用这些传统策略时，你会感到相当惊讶。


  有了这个背景，让我们回顾一下 Cassandra 数据建模背后的关键原则。


  ### 按查询构建数据


  由于 Cassandra 在写入数据方面非常高效，数据反规范化和重复的开销很小。重复数据将使你的读取速度更快。理想情况下，一次读取应该能够从单个分区获取其所有数据。


  ### 避免更新和删除


  根据其设计，Cassandra 与仅追加、不可变的数据集配合良好。清理“环”中的变更和删除操作将带来高昂的开销。


  ### 均匀分布数据


  你必须确保将数据均匀分布在 Cassandra 环上，这样单个节点就不会被卡住去处理不成比例的大量数据。适当选择分区键对于确保均匀的数据分布至关重要。


  ### 避免跨分区查询


  从多个节点处理和聚合数据，读取需要更长的时间。分区策略和位置在这里至关重要，因为跨分区查询可能会导致巨大的开销。


  ## Cassandra 管理员应该知道什么


  这本书主要关于管理 Cassandra，尽管它对 Cassandra 架构师和开发人员也将非常有用。


  与任何数据库一样，Cassandra 需要调整各种配置参数、选择正确的数据模型以及其他策略以实现最佳性能。虽然你在管理关系型数据库方面获得的许多技能可以轻松应用于
  Cassandra 数据库，但你还需要学习额外的知识才能成为一名成功的 Cassandra 数据库管理员。


  诸如通过配置内核优化操作系统、通过各种工具监控操作系统以及 SQL 查询优化技术等传统技能，在管理 Cassandra 数据库时都将对你有所帮助。除了这些技能，你还需要关注我在以下部分描述的工具和技能。


  ### Cassandra 工具


  Cassandra 提供了几种有用的管理工具来监控和管理你的集群。以下是你会经常使用的关键工具的简要描述。


  *   `cassandra` 实用程序：`cassandra` 实用程序使你能够启动一个 Cassandra 实例。此外，该实用程序还使你能够执行其他任务，例如替换一个故障节点。

  *   SSTable 实用程序：Cassandra 提供了大约十几个实用程序，使你能够执行 SSTable 任务，例如转储表的内容、打印表的元数据、将一个表拆分为多个表，以及列出表的
  SSTable 文件。

  *   `nodetool` 实用程序：`nodetool` 实用程序是一个命令行工具，用于监控和管理集群。你将在第 2 章开始使用 `nodetool`，到本书结束时，你将学到每一个
  `nodetool` 命令选项。

  *   `cassandra-stress` 工具：这是一个压力测试实用程序，可用于对集群进行基准测试和负载测试。该工具对于理解数据库的可扩展性和优化数据模型特别有用。


  ### 获取并行远程工具


  Cassandra 是一个分布式数据库，一个集群通常可能包含数十甚至数千个节点。对于那些从单节点关系型数据库世界过来的用户来说，这可能会是一个巨大的意外。


  学会使用分布式 Shell 工具是个好主意。有几种分布式 SSH 工具，例如 `parallel SSH` 和 `Cluster SSH`，它们可以让你同时通过
  SSH 访问多个节点。


  使用像 `pdsh`（并行分布式 Shell）这样的工具同时传输文件和在多个节点上运行命令，也会让你受益匪浅。


  如果你要处理的节点数量较多（比如超过 8 或 10 个），那么使用 `Chef` 或 `Ansible` 这样的工具来执行许多操作是明智之举。


  ### 理解 Cassandra 数据库中的故障场景


  在管理传统数据库时，磁盘丢失是相对罕见的事件，因为它们大多运行在企业级硬件上。Cassandra，如同所有大数据技术一样，运行在商用硬件上。在处理大数据时，经历磁盘甚至节点故障并非罕见事件。


  Cassandra 管理员需要知道如何处理节点故障，以及如何按需通过添加节点来扩展节点容量。


  当操作因更新和写入未能在集群中正确同步而失败时，管理员会运行一个“修复”操作，这是 Cassandra 特有的操作。


  Cassandra 中的一切都基于 Java，因此知道如何读取 Java 错误堆栈和跟踪文件至关重要。了解常见的 Java 异常，例如内存不足 (`OOM`)
  错误和空指针错误，会很有帮助。


  ### 监控与告警


  你可以通过 Java 管理扩展 (`JMX`) 来监控和管理基于 Java 语言的 Cassandra。


  更常见的是通过 Cassandra 提供的 `nodetool` 实用程序来管理和监控 Cassandra 集群。`Nodetool` 是 `JMX` 兼容的，你可以用它来获取各种
  Cassandra 指标，并执行常见任务，例如添加和退役节点。你也可以使用其他 `JMX` 工具，例如 `JConsole` 来执行各种任务。


  ### 调优 Java 虚拟机


  Cassandra 使用 Java 编写，其中的一切都运行在 Java 虚拟机 (`JVM`) 内。传统的数据库管理确实不需要 `JVM` 知识。然而，在处理
  Cassandra 数据库时，这方面的知识至关重要。章节 11 介绍了 `JVM` 调优的基本概念以及如何管理垃圾回收（调优 `JVM` 最重要的部分）。


  在下一节中，我将介绍 Cassandra 的架构以及几个你在本书后续部分会遇到的有趣概念和关键术语。


  ## Cassandra 架构快速介绍


  Cassandra 是一个分布式数据库系统。它将数据分布在组织为集群的多个节点之间，以确保即使在系统和硬件发生故障时数据仍可访问。


  Cassandra 集群中的节点使用点对点通信协议来交换它们的状态信息。


  Cassandra 表行存储在表中，每张表都有一个必需的主键。键空间是一个逻辑实体，用于将一组表分组，这些表通常属于单个应用程序。你可以通过 `CQL` 语言结构访问存储在表中的数据，其语法与
  `SQL` 类似。你可以通过 `cqlsh` 和应用程序语言的驱动程序访问 `CQL`。


  Cassandra 首先将所有数据写入日志，以确保数据在发生故障时具有持久性。然后，它将数据写入充当缓存的内存结构中，当缓存满时，会将数据刷新到磁盘上的数据文件中。


  Cassandra 自动对所有数据进行分区，并根据你的需要复制相应次数。它使用各种修复过程来确保节点间的数据随时间推移变得一致。


  Cassandra 会定期压缩磁盘上数据文件中的表，丢弃它发现的任何过时数据。


  Cassandra 将客户端的读写请求随机分配给集群中的节点，客户端最初连接到的那个节点充当该操作的协调者。


  ### 理解 Cassandra 特有概念


  要掌握 Cassandra 管理，你需要学习几个 Cassandra 特有的结构和概念，例如节点和环、提交日志、内存表、`SSTables`、键空间、索引文件和布隆过滤器。


  从对基本的高层 Cassandra 结构进行快速描述开始是个好主意。


  *   `节点`：节点是运行 Cassandra 实例的服务器。这是 Cassandra 存储你数据的地方。刚开始使用该数据库时，你可以在单个节点上运行 Cassandra，但所有真实的
  Cassandra 环境都包含一堆节点，因为 Cassandra 是为大数据处理而设计的。

  *   `数据中心`：“数据中心”这个术语有点误导性，因为它与你日常使用的“数据中心”（指一个组织的物理或虚拟数据中心）这个术语毫无关系。Cassandra 的数据中心是一组节点，你将它们配置为一个用于复制目的的组。因此，你可以将数据中心视为复制组的同义词。你使用数据中心来将具有相同复制级别的一组节点分组。数据中心可以是物理的，也可以是逻辑的。通常，客户端将数据写入本地数据中心，然后该数据中心将数据异步复制到其他数据中心。

  *   `集群`：Cassandra 集群是一个或多个数据中心的集合，它可以跨越物理位置。


  在 Cassandra 数据库内部，你需要理解以下关键结构。


  *   `提交日志`：Cassandra 将内存中的数据写入提交日志以实现持久性。由于数据库将每次写入都首先写入提交日志，因此它作为一个安全的恢复机制，确保不会因服务器或其他故障而丢失任何写入。

  *   `内存表`：在将新数据写入提交日志后，Cassandra 会将该数据写入内存表，这些是仅存在于内存中的数据结构。

  *   `SSTable`：有序字符串表 (`SSTable`) 是一个不可变的数据文件，Cassandra 将内存表写入其中。一旦内存表达到阈值，Cassandra
  就会将内存表中的所有数据刷新到 `SSTables`。

  *   `CQL` 表：`CQL` 表是一组通过表行获取的有序列。每个表由一组列和一个主键组成，正是这些 `CQL` 表让你能够查询以从 Cassandra 数据库中检索数据。


  **提示**


  使用过多的键空间或表都不是好主意。这两种实体都有 `JVM` 内存开销。每张表大约使用 1MB 内存，一个实用的经验法则是每个集群使用的表不要超过 1000 个，理想情况下只使用
  500 个。


  Cassandra 使用几个独特的概念和相关术语。我认为在深入接下来几章的数据库内部机制之前，先对这些概念和术语有一个概览是很好的。


  我在接下来章节中解释的许多术语和概念都与分布式数据库的管理有关；Cassandra 使用各种实体和策略来管理和分发数据到多个节点，以及节点如何保持对集群中其他节点的感知。


  #### 对等节点与协调者


  Cassandra 集群中的所有节点都是对等节点。客户端的请求可以随机发送到集群中的任何一个节点。当客户端连接到集群中的某个节点并发出读或写请求时，该节点将充当该操作的协调者。


  协调者是客户端与拥有客户端应用程序所请求数据的节点（副本）之间的代理。对于读或写操作，协调者节点决定应将请求分配给哪个节点。它会考虑你配置的分区器以及副本的放置策略。



  ## 键空间


  一个键空间是一组相关表的集合，类似于 Oracle 数据库中的逻辑模式概念，或使用 MySQL 时的数据库概念，或 SQL Server 的数据库概念。最佳实践是为每个应用程序使用单个键空间。


  ## 复制与副本放置策略


  Cassandra 为了可靠性和容错性，将数据存储在多个节点上。副本是数据块的一个拷贝，您在创建键空间时，需要为每个键空间设置副本放置策略。


  Cassandra 提供了多种副本放置策略，例如 `NetworkTopologyStrategy`，当您的集群部署在多个数据中心时，此策略是理想选择。


  每个数据中心的副本数量取决于两方面的需求：一是通过促进本地读取来减少跨数据中心延迟的需要，二是提供针对节点故障的防护需要。


  如果一个节点宕机，Cassandra 未能写入该节点的数据将稍后重放，这是通过所谓的 `提示性移交` 机制实现的，该机制提供了一些提示，使得故障节点恢复后，可以将错过的数据写入其中。


  ## 可调一致性


  正如本章前面所述，Cassandra 选择可用性优先于一致性。然而，一致性的程度是可以由您调节的。在读取或写入数据时，您可以针对每个查询选择一致性的等级。


  可调一致性意味着您选择在 Cassandra 将读或写请求视为成功之前，应该收到多少个副本的响应。当客户端发出读请求时，一致性级别决定了 Cassandra 必须收到多少个副本的响应后才能将数据返回给客户端。对于写请求，它是指在
  Cassandra 通知客户端写入成功之前，必须有多少个副本确认已成功将数据写入磁盘。


  显然，更高的一致性级别意味着更慢的读写速度，因为 Cassandra 需要等待更多节点的确认。更高的一致性级别也可能意味着更低的可用性，因为您需要更多节点可用以满足更高程度的一致性。


  ## Gossip 协议


  Gossip 指的是一种通信协议，集群中的节点使用它来发现其他节点，并告知它们自己及其他节点的位置和状态。Gossip 的目的是让所有节点快速获取集群中其他节点状态的最新信息。


  正是通过 Gossip 数据（状态和历史记录），节点才能了解到哪些节点宕机了，或者哪些节点在故障后重新上线。


  ## 分区器


  Cassandra 使用一个称为分区器的函数来决定哪些节点接收数据块的第一份拷贝，以及如何将剩余的副本分布到其他节点。


  分区器使用从行的主键派生的令牌值，来确定哪些节点获得特定行的副本。Cassandra 提供了多种分区器，默认的分区器是 `Murmur3Partitioner`。


  ## 探查器


  为了将数据的副本放置在节点上，Cassandra 使用了一个拓扑结构。探查器定义了这个拓扑结构；也就是说，它将机器分组到数据中心和机架中。


  Cassandra 提供了多种探查器。默认的 `SimpleSnitch` 适用于不使用复杂拓扑（即不涉及数据中心和机架）的简单安装。对于生产部署，Cassandra
  建议您使用 `GossipingPropertyFileSnitch`。该探查器定义了数据中心和机架。


  ### 压实


  压实是 Cassandra 周期性地将磁盘上数据文件中存储的表数据进行合并的过程。在压实过程中，Cassandra 收集一行的所有版本，并从中组装出该行的最新版本。然后，它将新的行版本写入一个新的
  `SSTable`，并将旧版本以及标记为待删除的其他行保留在旧的 `SSTable` 中。一旦所有待处理的读取完成，数据库就会使用称为墓碑的标记删除旧版本，这些标记表明数据是已删除的数据。


  ### 布隆过滤器


  `布隆过滤器` 是一种用于测试某个元素是否属于某个集合的算法。Cassandra 采用布隆过滤器来快速确定一个表（`SSTable`）是否包含某行的数据。它用于索引扫描，但不用于范围扫描。


  ## 节点修复


  由于 Cassandra 是一个分布式数据库，随着时间的推移，一个副本中的数据可能与其他节点上存储的副本不一致。


  节点修复是一项常规维护任务，用于纠正副本之间的不一致，并致力于建立最终一致性；也就是说，它确保随着时间的推移，所有节点都拥有相同、最近更新的数据。


  有几种类型的修复过程，例如 `提示性移交`，当一个节点无法接收任何写入时，Cassandra 将要写入该节点的数据保存为一组提示。当该节点重新上线时，数据库使用存储的提示集执行修复，以便节点可以添加它在不可用期间错过的写入。


  ### Cassandra 如何存储其数据


  从高层次来看，Cassandra 以哈希环的形式存储数据，集群中的每个节点拥有一段哈希范围。Cassandra 将数据分区在环上，数据在哈希环上的位置基于分区键。


  所有节点都是平等的（无主节点），并持续相互通信，交换状态。所有节点都参与所有的读写操作。


  数据被复制到多个节点，您可以配置副本数量，默认是三个副本。


  ### Cassandra 数据模型概览


  Cassandra 的数据模型与传统的有关系数据库模型有显著不同。表 1-1 显示了两种数据模型之间的关键区别。


  表 1-1


  Cassandra 数据模型与关系数据库管理系统的区别


  | 关系数据库管理系统 | Cassandra |

  | --- | --- |

  | 结构化数据 | 非结构化数据 |

  | 固定模式 | 灵活模式 |

  | 一行代表一条记录。 | 一行是一个复制单元。 |

  | 列代表关系的属性。 | 列是一个存储单元。 |

  | 使用外键和连接 | 使用集合来表示关系 |

  | 表是数组的数组。 | 表是一个嵌套的（按列组织的行）键值对列表。 |

  | 数据库是最外层的数据容器。 | 键空间是数据的最外层容器。 |


  ### DataStax 与 Cassandra


  DataStax, Inc. 是一家提供 Apache Cassandra 数据库商业版本的公司，该版本称为 DataStax Enterprise (`DSE`)。DataStax
  1.0 于 2011 年底发布。DataStax 是 Cassandra 数据库的主要推广者，其多名员工为开源的 Cassandra 项目做出了贡献。


  除了商业版 `DSE`，DataStax 还提供 Apache Cassandra 的免费发行版，称为社区版。


  在以下各节中，我将简要回顾 `DSE` 以及 DataStax OpsCenter，这是一个用于配置和管理 Cassandra 的管理工具。




  ### DataStax Enterprise


  DataStax Enterprise (DSE) 基于 Apache Cassandra 构建，提供了一个全面且简洁的数据管理层，具有始终在线的架构。DSE
  提供了构建复杂云应用程序所需的高级功能。


  DSE 将索引、搜索、分析和图功能等强大特性与开源的 Apache Cassandra 数据库集成在一起。以下是 DSE 在底层 Cassandra 数据库之上所提供功能的简要描述。


  *   高级索引与搜索：DSE Search 包含一个高级索引引擎，具备强大的搜索能力（DSE 集成了著名的搜索工具 Apache Solr），以帮助通过运行复杂查询来查找数据。该索引引擎支持快速、实时的聚合、过滤、分面以及子字符串、模糊和全文搜索。

  *   强大的集成分析：DSE Analytics 集成了强大的 Apache Spark 大规模数据处理引擎，使开发者能够构建处理流式和批量工作负载数据流的管道。

  *   图数据库：DSE Graph 是一个可扩展的、实时的图数据库，支持深度分析查询。图数据库旨在分析具有许多复杂关系的大型数据集，帮助您发现并理解这些关系。


  试图从数据中获取最大价值的组织有着不同的需求，每种需求都由不同的解决方案解决，例如高级分析、实时索引、搜索等。DSE 通过一个集成化的工具，提供了现代云应用程序所需的所有能力。搜索、分析和图数据库功能的集成意味着这些组件能够获得
  Apache 数据库的所有优势，例如高可用性、线性可扩展性以及可预测的低延迟响应时间。


  DataStax Enterprise OpsCenter 是 DSE 基于 Web 的管理和监控组件。OpsCenter 可以轻松地监控、调优、备份和恢复 Cassandra
  数据库。您可以通过 `OpsCenter` 执行大多数数据库管理任务，例如访问和授权。OpsCenter 提供了一个集中化的仪表板来监控 Cassandra 集群，并有助于在问题影响您的生产工作负载之前主动识别问题。您可以轻松地将
  `OpsCenter` 集成到 Graphite 等管理工具中。


  ### DataStax 开发工具


  DataStax 提供了多种工具来帮助您创建基于 Cassandra 的大规模分布式应用程序。以下是 DataStax 提供的三种关键开发工具的简要描述：DataStax
  DevCenter、DataStax Studio 和数据库驱动程序。


  *   DataStax Enterprise OpsCenter：用于 DataStax Enterprise (DSE) 的基于 Web 的可视化管理和监控解决方案。该工具帮助您管理数据库模式、开发查询和调优
  Cassandra 性能。

  *   DataStax Studio：DataStax Studio 是一个交互式工具，它使用 DSE Graph 来探索和可视化大型数据集。

  *   数据库驱动程序：DataStax 提供支持多种语言的数据库驱动程序，例如 C#、Java、Node.js、ODBC、Python、PHP 和 Ruby。


  ## 总结


  Cassandra 是一个强大的 NoSQL 数据库，与关系型数据库有显著不同。本章解释了 Cassandra 与关系型数据库的不同之处，以及它如何解决关系型数据库处理不佳的问题。


  Cassandra 是为特定用例设计的，如果您的需求不同，它可能不适合您。


  了解 ACID 需求和 CAP 定理有助于您认识到 Cassandra 最终一致性原则的重要性。


  尽管 Cassandra 与关系型数据库共享一些优化策略，但它也采用了独特的策略，如布隆过滤器来优化数据库性能。


  本章回顾了 Cassandra 数据库管理员应该了解的要点。


  理解 Cassandra 特有的概念，如探测器、Gossip 协议和复制策略，对于您成为成功的 Cassandra 管理员至关重要。


