    (you can read more about extended properties at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)
    ).


    *   There is no built-in auditing for access to the columns that are marked for
    classification. Auditing is an important part of any classification system and
    is required to meet the needs of GDPR.


    So, our team worked on a new solution for SQL Server 2019 (which also works in
    the Azure SQL Database suite of services) for built-in *sensitivity classifications*.
    Built-in means a new set of T-SQL statements, catalog views, and auditing.


    The T-SQL statements now supported in SQL Server 2019 for classification are


    **ADD SENSITIVITY CLASSIFICATION (** [`https://docs.microsoft.com/en-us/sql/t-sql/statements/add-sensitivity-classification-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/add-sensitivity-classification-transact-sql)
    )


    **DROP SENSITIVITY CLASSIFICATION (** [`https://docs.microsoft.com/en-us/sql/t-sql/statements/drop-sensitivity-classification-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/drop-sensitivity-classification-transact-sql)
    )


    These T-SQL statements result in metadata stored directly into system tables (exposed
    by catalog views) that are specific to labels and information_types associated
    with columns in a table.


    A new catalog view is supported to view this metadata called **sys.sensitivity_classifications**
    ( [`https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-sensitivity-classifications-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-sensitivity-classifications-transact-sql)
    ).


    Furthermore, SQL Server Auditing now supports a new property called **data_sensitivity_information**
    which can be used to audit who, what, and when users are trying to view classified
    data.


    With these capabilities, the SSMS wizard was modified to use the new T-SQL statements
    if working with a database in SQL Server 2019\. This now provides you the capability
    of built-in classifications and auditing with a tool in SSMS and native T-SQL
    support.


    ### Note


    If you have used the wizard with SSMS 17.0 or even 18.0 against a version of SQL
    Server prior to SQL Server 2019 and restore that database to SQL Server 2019,
    the classified extended properties will be migrated to the new sensitivity classification
    metadata.


    Let’s walk through an example of using the SSMS tool, the new T-SQL syntax, catalog
    views, and auditing.


    ### Prerequisites for Using the Examples


    First, you need to do some setup to use examples in this section of the chapter.
    For examples in this chapter, you will use the **WideWorldImporters** example
    database (you can read more about this database and its schema at [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)
    ). If you have already restored the database from Chapter [2](#479130_1_En_2_Chapter.xhtml)
    examples, you can just keep using that database.


    These examples will work on SQL Server 2019 on Windows, Linux, and Containers.


    You will also need SQL Server Management Studio (SSMS) version **18.2** or higher
    to complete all the steps in the example. You can complete some of the steps using
    the T-SQL scripts provided, but some of the examples rely on the tools built into
    SSMS. You can download the latest version of SSMS from [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
    .


    All the scripts used for this chapter can be found on the GitHub repo for this
    book under the **ch3_new_security_capabilities\dataclassification** directory.


    In order to use the examples in this chapter, you need to go through the following
    steps (skip these steps if you have already restored the database from Chapter
    [2](#479130_1_En_2_Chapter.xhtml)):


    1.  Download the WideWorldImporters database backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)
    .


    2.  Restore this database to your SQL Server 2019 instance. You can use the provided
    **restorewwi.sql** script. You may need to change the directory paths for the
    location of your backup and where you will restore the database files.'
  trans: '## 提示


    GDPR 法规已于 2018 年 5 月生效。如果您需要关于如何使用 SQL Server 来满足组织中 GDPR 需求的完整指南，请访问 [`www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr`](https://www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr)。


    该工具的理念是分析数据库中的列名，并就如何通过一个`标签`和一个`信息类型`对列进行分类提出建议。`信息类型`可用于告知您列中存在何种数据（例如，联系信息、姓名、财务信息），而`标签`则可用于对存储在该列中的数据`敏感度`进行分类（机密、机密-GDPR、HIPAA
    等）。


    该工具会分析列名，查找与已知信息类型和敏感度相匹配的已知模式。一个简单的匹配示例是任何名称中包含“Email”一词的列。工具会提供`标签`和`信息类型`的建议，并允许您将这些信息持久化存储在数据库中。然后，您可以使用报告来查看此分类信息。


    该工具虽然不错，但存在两个局限：

    *   该工具使用了 SQL Server 中一个称为`扩展属性`的概念。虽然这种方法受支持且有效，但它并非存储列分类元数据的最有效方式，因为它是一种通用属性机制（您可以在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)
    阅读更多关于扩展属性的内容）。

    *   没有内置的对访问被标记分类列的审计功能。审计是任何分类系统的重要组成部分，也是满足 GDPR 需求所必需的。


    因此，我们的团队为 SQL Server 2019（也适用于 Azure SQL Database 服务套件）开发了一个用于内置`敏感度分类`的新解决方案。内置意味着一套新的
    T-SQL 语句、目录视图和审计功能。SQL Server 2019 中现在支持的分类 T-SQL 语句有：

    *   [`ADD SENSITIVITY CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/add-sensitivity-classification-transact-sql)

    *   [`DROP SENSITIVITY CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/drop-sensitivity-classification-transact-sql)


    这些 T-SQL 语句会将元数据直接存储到系统表中（通过目录视图公开），这些元数据专用于与表中列关联的`标签`和`信息类型`。


    现在支持一个新的目录视图来查看此元数据，称为 [`sys.sensitivity_classifications`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-sensitivity-classifications-transact-sql)。


    此外，SQL Server 审计现在支持一个名为`data_sensitivity_information`的新属性，可用于审计谁、在何时、试图查看分类数据。


    借助这些功能，SSMS 向导已被修改为：如果操作对象是 SQL Server 2019 中的数据库，则使用新的 T-SQL 语句。这为您提供了通过 SSMS
    中的工具和原生 T-SQL 支持实现内置分类和审计的能力。


    ## 注意


    如果您使用 SSMS 17.0 或 18.0 针对 SQL Server 2019 之前的版本使用过该向导，并将该数据库还原到 SQL Server 2019，那么已分类的`扩展属性`将被迁移到新的`敏感度分类`元数据中。


    让我们通过一个使用 SSMS 工具、新 T-SQL 语法、目录视图和审计功能的示例来逐步了解。


    ## 使用示例的先决条件


    首先，您需要进行一些设置才能使用本章节中的示例。对于本章的示例，您将使用`WideWorldImporters`示例数据库（您可以在 [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)
    阅读更多关于此数据库及其架构的信息）。如果您已经从第 2 章的示例中还原了该数据库，则可以继续使用该数据库。


    这些示例适用于 Windows、Linux 和容器上的 SQL Server 2019。


    您还需要 SQL Server Management Studio (SSMS) `18.2`或更高版本来完成示例中的所有步骤。您可以使用提供的 T-SQL
    脚本完成部分步骤，但有些示例依赖于 SSMS 中内置的工具。您可以从 [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
    下载最新版本的 SSMS。


    本章使用的所有脚本都可以在本书的 GitHub 仓库的 `ch3_new_security_capabilities\dataclassification`
    目录下找到。


    为了使用本章中的示例，您需要执行以下步骤（如果已经从第 2 章还原了数据库，请跳过这些步骤）：

    1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)
    下载 WideWorldImporters 数据库备份。

    2.  将此数据库还原到您的 SQL Server 2019 实例。您可以使用提供的 `restorew wi.sql` 脚本。您可能需要更改备份位置和数据库文件还原位置的目录路径。'
- fmt: '### Using Data Classification


    以下步骤将演示数据分类的实际操作。下一节中，你将学习如何设置审计，以跟踪试图查看设置了分类的列的用户。


    #### 运行设置脚本


    首先，你可能需要多次运行这些示例，因此请先运行以下脚本`setup_classification.sql`：


    ```sql

    -- Step 1: In case you have run these demos before drop existing classifications

    USE WideWorldImporters

    GO

    IF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE object_id(''[Application].[PaymentMethods]'')
    = sc.major_id)

    BEGIN

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[PaymentMethods].[PaymentMethodName]

    END

    GO

    IF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE object_id(''[Application].[People]'')
    = sc.major_id)

    BEGIN

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[FullName]

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[EmailAddress]

    END

    GO

    ```


    #### 使用 SSMS 数据分类工具


    现在，使用 SSMS 数据分类工具为 `WideWorldImporters` 数据库中的两个列添加分类。启动 SSMS，在对象资源管理器中找到 `WideWorldImporters`
    数据库。右键单击并选择 **任务** ➤ **数据发现和分类** ➤ **分类数据**，如图 [3-4](#479130_1_En_3_Chapter.xhtml#Fig4)
    所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg)


    **图 3-4**


    启动数据分类工具


    #### 查看分类建议


    该工具会分析 `WideWorldImporters` 数据库中对象的列名，并为应分类的列以及要使用的标签和信息类型创建建议。当你使用 `WideWorldImporters`
    启动该工具时，应该会得到 66 个带有建议的列。单击建议以查看结果，如图 [3-5](#479130_1_En_3_Chapter.xhtml#Fig5)
    所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg)


    **图 3-5**


    SSMS 的分类建议


    #### 接受建议


    你现在将看到一个列列表，其中包含建议的 `information_type` 和（敏感性）`label` 选项。这些建议的值是内置在工具中的，无法配置。不过，我会用
    T-SQL 展示如何“使用你自己的系统”。勾选 `PaymentMethodName` 和 `FullName` 列以保存这些建议，然后单击 **接受所选建议**。在单击“接受”之前，你的屏幕应如图
    [3-6](#479130_1_En_3_Chapter.xhtml#Fig6) 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg)


    **图 3-6**


    接受分类建议


    请注意，`PaymentMethodName` 的建议是 `Financial` 和 `Confidential`（如果你查询此表，会发现值是 `Cash`、`Check`、`Credit-Card`
    和 `EFT`）。对于 `FullName`，建议是 `Name` 和 `Confidential-GDPR`。


    #### 注意


    该工具不保证 GDPR 合规性，甚至不会特别查看 GDPR 的详细信息。这些只是基于我们对 GDPR 的了解的建议。如果你需要将此系统用于 GDPR 目的，请务必遵循你公司的政策和程序。


    #### 保存选择


    单击“接受”后，工具将显示哪些列被选中，并允许你保存选择。“垃圾桶”图标允许你删除你的选择并重新选择。请注意，建议列的数量已减少 2 个。现在，选择“保存”，如图
    [3-7](#479130_1_En_3_Chapter.xhtml#Fig7) 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg)


    **图 3-7**


    保存已接受的建议


    #### 查看报告


    保存后，你可以选择“查看报告”选项，以查看与你的数据库一起保存的分类的可视化报告。将在 SSMS 中为报告创建一个新选项卡。请务必单击 `Application`
    架构旁边的 `+` 号以查看所有已分类的列。报告应如图 [3-8](#479130_1_En_3_Chapter.xhtml#Fig8) 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg)


    **图 3-8**


    数据分类报告


    该报告将查询 `sys.sensitivity_classifications` 目录视图以及数据库中的其他元数据。报告显示了在所有可能的列和表中，有多少列和表被标记了标签。报告还显示了数据库中标签和信息类型值的分布情况。请注意，在报告底部的列列表中，出现了
    `People_Archive` 和 `PaymentMethods_Archive` 表。为什么？因为这些表是随系统版本临时表一起构建的。临时表（在 SQL
    Server 2016 中引入）提供了数据库中表随时间变化的信息（你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables)
    阅读有关临时表的更多信息）。


    由于你接受了包含临时表的表中列的建议，我们希望确保也对“隐藏”存档表中的列进行分类。你不会直接访问那些列，但 SQL Server 会持久保存存档表。因此，对临时数据的任何访问也可以被审计。'
  raw: "### Using Data Classification\n\nWalk through the following steps to see data\
    \ classification in action. In the next section, you will learn how to set up\
    \ auditing to track users who try to view columns set up with classification.\n\
    \n1.  First you may run these examples more than once so run the following script\
    \ **setup_classification.sql**:\n\n    ```\n    -- Step 1: In case you have run\
    \ these demos before drop existing classifications\n    USE WideWorldImporters\n\
    \    GO\n    IF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE\
    \ object_id('[Application].[PaymentMethods]') = sc.major_id)\n    BEGIN\n    DROP\
    \ SENSITIVITY CLASSIFICATION FROM [Application].[PaymentMethods].[PaymentMethodName]\n\
    \    END\n    GO\n    IF EXISTS (SELECT * FROM sys.sensitivity_classifications\
    \ sc WHERE object_id('[Application].[People]') = sc.major_id)\n    BEGIN\n   \
    \ DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[FullName]\n   \
    \ DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[EmailAddress]\n\
    \    END\n    GO\n    ```\n\n2.  Now use the SSMS Data Classification tool to\
    \ add classifications for two columns in the WideWorldImporters database. Launch\
    \ SSMS and find the WideWorldImporters database in Object Explorer. Right-click\
    \ and choose Tasks ➤ Data Discovery and Classification ➤ Classify Data as seen\
    \ in Figure [3-4](#479130_1_En_3_Chapter.xhtml#Fig4).\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg)\n\
    \n    Figure 3-4\n\n    Launching the Data Classification tool\n\n3.  The tool\
    \ analyzes column names in objects in the WideWorldImporters database and creates\
    \ recommendations for which columns to classify and what labels and information_type\
    \ to use. When you launch the tool with WideWorldImporters, you should get 66\
    \ columns with recommendations. Click the recommendations to see the result as\
    \ in Figure [3-5](#479130_1_En_3_Chapter.xhtml#Fig5).\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg)\n\
    \n    Figure 3-5\n\n    Classification recommendation from SSMS\n\n4.  What you\
    \ will see now is a list of columns with suggested information_type and (sensitivity)\
    \ label choices. The values for these recommendations are baked into the tool\
    \ and cannot be configured. However, I’ll show you with T-SQL how to “use your\
    \ own system.” Save some of these recommendations by checking the PaymentMethodName\
    \ and FullName columns, then click **Accept selected recommendations**. Before\
    \ you click Accept, your screen should look like Figure [3-6](#479130_1_En_3_Chapter.xhtml#Fig6).\n\
    \n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg)\n\
    \n    Figure 3-6\n\n    Accept classification recommendations\n\nNotice that PaymentMethodName\
    \ has a recommendation of Financial and Confidential (if you query this table,\
    \ you will see the values are Cash, Check, Credit-Card, and EFT). For FullName,\
    \ the recommendation is Name and Confidential-GDPR.\n\n### Note\n\nThe tool does\
    \ not guarantee GDPR compliance or even look specifically at the details of GDPR.\
    \ These are simply recommendations based on our knowledge of GDPR. If you need\
    \ to use this system for GDPR purposes, be sure to follow your company policies\
    \ and procedures.\n\n1.  After you click Accept, the tool will show you which\
    \ columns were selected and allow you to save the choices. The “garbage can” icons\
    \ allow you to delete your choices and choose again. Notice the number of columns\
    \ to recommend has been reduced by 2\\. For now, select Save, as seen in Figure\
    \ [3-7](#479130_1_En_3_Chapter.xhtml#Fig7).\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg)\n\
    \n    Figure 3-7\n\n    Saving accepted recommendations\n\n2.  After you have\
    \ saved, you can select the option called View Report to see a visual of classifications\
    \ saved with your database. A new tab in SSMS is created for the report. Be sure\
    \ to click the + next to the Application schema to see all the classified columns.\
    \ The report should look like Figure [3-8](#479130_1_En_3_Chapter.xhtml#Fig8).\n\
    \n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg)\n\
    \n    Figure 3-8\n\n    The Data Classification Report\n\nThe report will query\
    \ the sys.sensitivity_classifications catalog view along with other metadata in\
    \ the database. The report shows how many columns and tables are marked for labels\
    \ out of all possible columns and tables. The report also shows a distribution\
    \ of label and information_type values in the database. Notice at the bottom of\
    \ the report, in the list of columns, that the People_Archive and PaymentMethods_Archive\
    \ tables appear. Why? This is because these tables have system-versioned temporal\
    \ tables built with them. Temporal tables, introduced in SQL Server 2016, provide\
    \ point-in-time information about changes to a table in a database (you can read\
    \ more about temporal tables at [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables)\
    \ ).\n\nSince you accepted recommendations for columns in a table that has a temporal\
    \ table, we want to be sure to also classify columns in the “hidden” archive table.\
    \ You don’t access those columns directly, but SQL Server persists the archive\
    \ table. So, any access to temporal data can also be audited."
  trans: '### 数据分类操作指南


    以下步骤将演示数据分类的实际操作。下一节中，你将学习如何设置审计，以跟踪试图查看设置了分类的列的用户。


    #### 运行设置脚本


    首先，你可能需要多次运行这些示例，因此请先运行以下脚本 `setup_classification.sql`：


    ```sql

    -- Step 1: In case you have run these demos before drop existing classifications

    USE WideWorldImporters

    GO

    IF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE object_id(''[Application].[PaymentMethods]'')
    = sc.major_id)

    BEGIN

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[PaymentMethods].[PaymentMethodName]

    END

    GO

    IF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE object_id(''[Application].[People]'')
    = sc.major_id)

    BEGIN

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[FullName]

    DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[EmailAddress]

    END

    GO

    ```


    #### 使用 SSMS 数据分类工具


    现在，使用 SSMS 数据分类工具为 `WideWorldImporters` 数据库中的两个列添加分类。启动 SSMS，在对象资源管理器中找到 `WideWorldImporters`
    数据库。右键单击并选择 **任务** ➤ **数据发现与分类** ➤ **对数据进行分类**，如图 3-4 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg](img/479130_1_En_3_Fig4_HTML.jpg)


    **图 3-4**


    启动数据分类工具


    #### 查看分类建议


    该工具会分析 `WideWorldImporters` 数据库中对象的列名，并为应分类的列以及要使用的标签和信息类型创建建议。当你使用 `WideWorldImporters`
    启动该工具时，应该会得到 66 个带有建议的列。单击“建议”以查看结果，如图 3-5 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg](img/479130_1_En_3_Fig5_HTML.jpg)


    **图 3-5**


    SSMS 的分类建议


    #### 接受建议


    你现在将看到一个列列表，其中包含建议的 `information_type`（信息类型）和（敏感性）`label`（标签）选项。这些建议的值是内置在工具中的，无法配置。不过，我会用
    T-SQL 展示如何“使用你自己的系统”。勾选 `PaymentMethodName` 和 `FullName` 列以保存这些建议，然后单击 **接受所选建议**。在单击“接受”之前，你的屏幕应如图
    3-6 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg](img/479130_1_En_3_Fig6_HTML.jpg)


    **图 3-6**


    接受分类建议


    请注意，`PaymentMethodName` 的建议是 `Financial`（财务）和 `Confidential`（机密）（如果你查询此表，会发现值是
    `Cash`、`Check`、`Credit-Card` 和 `EFT`）。对于 `FullName`，建议是 `Name`（姓名）和 `Confidential-GDPR`（机密-GDPR）。


    #### 注意


    该工具不保证 GDPR 合规性，甚至不会特别查看 GDPR 的详细信息。这些只是基于我们对 GDPR 的了解的建议。如果你需要将此系统用于 GDPR 目的，请务必遵循你公司的政策和程序。


    #### 保存选择


    单击“接受”后，工具将显示哪些列被选中，并允许你保存选择。“垃圾桶”图标允许你删除你的选择并重新选择。请注意，建议列的数量已减少 2 个。现在，选择“保存”，如图
    3-7 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg](img/479130_1_En_3_Fig7_HTML.jpg)


    **图 3-7**


    保存已接受的建议


    #### 查看报告


    保存后，你可以选择“查看报告”选项，以查看与你的数据库一起保存的分类的可视化报告。将在 SSMS 中为报告创建一个新选项卡。请务必单击 `Application`
    架构旁边的 `+` 号以查看所有已分类的列。报告应如图 3-8 所示。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg](img/479130_1_En_3_Fig8_HTML.jpg)


    **图 3-8**


    数据分类报告


    该报告将查询 `sys.sensitivity_classifications` 目录视图以及数据库中的其他元数据。报告显示了在所有可能的列和表中，有多少列和表被标记了标签。报告还显示了数据库中标签和信息类型值的分布情况。请注意，在报告底部的列列表中，出现了
    `People_Archive` 和 `PaymentMethods_Archive` 表。为什么？因为这些表是随系统版本临时表一起构建的。临时表（在 SQL
    Server 2016 中引入）提供了数据库中表随时间变化的信息（你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables)
    阅读有关临时表的更多信息）。


    由于你接受了包含临时表的表中列的建议，我们希望确保也对“隐藏”存档表中的列进行分类。你不会直接访问那些列，但 SQL Server 会持久保存存档表。因此，对临时数据的任何访问也可以被审计。'
- fmt: "## Note\n\nYou are not allowed to add sensitivity classifications directly\
    \ to archive tables from temporal data. When you drop a sensitivity classification\
    \ for a column, the classification for the archive table is also dropped.\n\n\
    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig10_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10: Classifications from the tool and T-SQL\n\n1.  If you go back to\
    \ the tab with the saved recommendations, you will see an option for Add Classification.\
    \ This is a way for you to manually add sensitivity classifications through the\
    \ tool to either override the recommendations or choose a column that was not\
    \ recommended. You still get the choices provided by the tool for labels and information_type.\
    \ If you clicked Add Classification, it would look like Figure [3-9](#479130_1_En_3_Chapter.xhtml#Fig9).\n\
    \n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig9_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig9_HTML.jpg)\n\
    \n    Figure 3-9: Manually adding a classification through the tool\n\n2.  The\
    \ tool is great, but you may also want to use T-SQL directly to add your own classifications\
    \ and system. First, use the script `findclassifications.sql` to see how you can\
    \ use T-SQL to view all existing classifications.\n\n    ```sql\n    USE WideWorldImporters\n\
    \    GO\n    SELECT o.name as table_name, c.name as column_name, sc.information_type,\
    \ sc.label\n    FROM sys.sensitivity_classifications sc\n    JOIN sys.objects\
    \ o\n    ON o.object_id = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id\
    \ = sc.minor_id\n    AND c.object_id = sc.major_id\n    ORDER BY sc.information_type,\
    \ sc.label\n    GO\n    ```\n\n    Your results should look the same as from the\
    \ report.\n\n3.  To add your own classification from T-SQL, use the script `addclassification.sql`.\
    \ Run each step to add the classification and see the new results. You can put\
    \ in whatever `label` and `information_type` values you want for your purposes.\
    \ For this example, I chose different labels and types from the tool. Since this\
    \ is an e-mail address, I called the type `Email` and the label `PII` (which stands\
    \ for Personally Identifiable Information). In essence, these are just string\
    \ values we are storing associated with columns. But like any system that is being\
    \ built and designed, a good classification system will have some structure on\
    \ what `label` and `information_type` labels should be used for a company and\
    \ a database, and this metadata will show up that way in audits, as we’ll see\
    \ shortly.\n\n    ```sql\n    -- Step 1: Add the classification\n    ADD SENSITIVITY\
    \ CLASSIFICATION TO\n    [Application].[People].[EmailAddress]\n    WITH (LABEL='PII',\
    \ INFORMATION_TYPE=\"Email\")\n    GO\n    -- Step 2: View all classifications\n\
    \    USE WideWorldImporters\n    GO\n    SELECT o.name as table_name, c.name as\
    \ column_name, sc.information_type, sc.information_type_id, sc.label, sc.label_id\n\
    \    FROM sys.sensitivity_classifications sc\n    JOIN sys.objects o\n    ON o.object_id\
    \ = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id = sc.minor_id\n  \
    \  AND c.object_id = sc.major_id\n    ORDER BY sc.information_type, sc.label\n\
    \    GO\n    ```\n\n    Your result should look like Figure [3-10](#479130_1_En_3_Chapter.xhtml#Fig10).\n\
    \nIn these results, notice that the columns added by the tool have values for\
    \ `information_type_id` and `label_id`. The T-SQL statement `ADD SENSITIVITY CLASSIFICATION`\
    \ supports a GUID value to tag the strings for labels and types. This could be\
    \ particularly valuable if your company builds a classification system to store\
    \ all the accepted labels and types. You can now refer to any label or type through\
    \ a GUID value, though it is up to you to generate GUID values.\n\n## Tip\n\n\
    The T-SQL function `NEWID()` can be used to generate unique GUID values within\
    \ SQL Server. You can find more details at [https://docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql](https://docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql).\n\
    \nSo far so good. It seems like a fairly simple and straightforward system, which\
    \ it is. But it is only as good as the `label` and `information_type` values you\
    \ choose to use. The beauty of T-SQL support is that any application that supports\
    \ T-SQL can now build a classification system and query it since catalog view\
    \ support also exists through T-SQL.\n\nWhat about auditing? Proceed to the next\
    \ section to see how it works. Leave everything as is to use these previous steps\
    \ to show how auditing works."
