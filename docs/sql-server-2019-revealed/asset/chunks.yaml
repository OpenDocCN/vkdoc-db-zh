  trans: "### 注意\n\n之前有人问过我，为什么数据库兼容性级别（dbcompat levels）与 SQL Server 发布版本的名称或版本号不对应。这是因为\
    \ SQL Server 有一个内部版本号，而数据库兼容性级别正是与该内部版本号对齐。例如，SQL Server 2012 实际上是 11.x 版本（参见\
    \ `@@VERSION`），因此其数据库兼容性级别为 110。我知道这有点令人困惑，但我们对发布版本的命名方式与其版本编号方式略有不同。\n\n如果您将\
    \ SQL Server 2012 的数据库备份还原到 SQL Server 2019，SQL Server 会将数据库兼容性级别保持在 110。这样设计的目的是让您确信，您的应用程序、查询以及对数据库的操作行为，将与在\
    \ SQL Server 2012 上运行时完全一致。不同之处在于，您现在可以利用 SQL Server 新版本中的新功能（有一个例外，即我们有时会使用数据库兼容性来启用新功能）。\n\
    \n我在前面关于 `数据库迁移助手 (DMA)` 的部分提到过，`DMA` 工具会使用以下术语来查找迁移问题：`重大变更`、`行为变更` 和 `已弃用功能`。现在让我结合数据库兼容性用于向后兼容的用途，来定义这些术语。\n\
    \n`重大变更` 被定义为可能导致不同结果的 *行为变更*。在某些情况下，通过在新版 SQL Server 上使用数据库兼容性级别，可以保护系统免受重大变更的影响。在其他情况下，重大变更则不受数据库兼容性级别的保护。听起来很混乱？我理解您的感受。幸运的是，最新版本的\
    \ SQL Server 中，不受保护的重大变更非常少。好消息是，`DMA` 工具正是为了帮助检测这些问题而设计的。\n\n要了解每个 SQL Server\
    \ 版本中的重大变更列表，请从这个文档页面开始：[`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#using-compatibility-level-for-backward-compatibility`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523using-compatibility-level-for-backward-compatibility)，然后向下滚动到以“在特定\
    \ SQL Server 版本中引入的重大变更...”这句话开头的部分。该部分包含了指向从 SQL Server 2012 起所有版本重大变更的指引。\n\n\
    数据库兼容性级别所涉及的一些行为变更是为了纠正问题或启用新功能而设计的。其中一个例子是我将在第 2 章讨论的智能查询处理功能，该功能在数据库兼容性级别为 140\
    \ 或 150 时启用。\n\n`已弃用` 功能受数据库兼容性级别的保护。已弃用功能包括我们不打算在未来增强的特性或行为。微软可能在任何新版本中移除这些功能。`已停止`\
    \ 功能意味着我们已经从某个 SQL Server 版本中移除了某个特性或行为，因此数据库兼容性将无济于事。已停止功能通常首先会经历被弃用的阶段。幸运的是，我们在最近的版本中已经决定不再停止使用任何功能。然而，我个人建议不要依赖已弃用功能，尤其是对于新项目。在近期版本中，通过\
    \ SQL Server 文档查找已弃用功能变得更加容易。请使用以下文档链接查找近期版本中的已弃用和已停止功能：[`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility)。要追溯更早的版本，您需要切换到旧版本的文档。例如，这是\
    \ SQL Server 2014 的文档链接：[`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility?view=sql-server-2014`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility%253Fview%253Dsql-server-2014)。\n\
    \n考虑到这一点，在迁移到新版本 SQL Server 时，数据库兼容性级别在维护向后兼容性方面的效果如何？它足够好，以至于 Pedro Lopes 希望您能信赖它。他也希望说服许多独立软件供应商（ISV）这样做。Pedro\
    \ 的愿景是让应用程序开发人员基于数据库兼容性级别来 *认证* 他们的应用程序，而不是基于某个特定的 SQL Server 版本。如果您仔细聆听 Pedro\
    \ 在我“Pam 和 Pedro 秀”部分提供的视频链接中所说的话，他提到，“微软将支持以数据库兼容性级别作为认证模型”，具体体现在：\n\n*   如果\
    \ `DMA` 工具返回干净结果，没有错误，则提供完整的功能保护。\n    这意味着，如果您选择一个返回无错误的适当数据库兼容性级别，您的应用程序就不会遇到重大变更。\n\
    \n*   在类似硬件上提供查询计划形状保护\n    这意味着，在类似硬件上，当您在先前版本上使用相同数据库兼容性级别运行查询时，查询计划的结构（即操作符及其流程）在新版本的\
    \ SQL Server 上不应改变。\n\n迄今为止，我们的经验表明，这些大胆的声明在我们的客户那里得到了验证。\n\n以下是我对您在考虑迁移到 SQL\
    \ Server 2019 时，关于向后兼容性所能期望情况的总结：\n\n*   如果您一直在使用已停止的功能，迁移后您的应用程序可能会中断。\n*   如果您一直在使用已弃用的功能，应该没问题。但我建议您制定计划，逐步减少对此类已弃用功能的依赖。\n\
    *   从与您迁移来源 SQL Server 版本相匹配的数据库兼容性级别开始。如果您使用的是 SQL Server 2012，请将 dbcompat 保持在\
    \ 110 作为起点。"
- fmt: "### 数据库兼容级别注意事项\n\n影响查询性能最大的数据库兼容性级别（`dbcompat`）变化是120。这是因为我们引入了对查询优化器的一个重大更改，称为基数估计（CE）模型。如果你迁移到较新版本的SQL\
    \ Server并且需要使用120或更高的`dbcompat`级别，但遇到与CE模型相关的问题，可以使用 `ALTER DATABASE SCOPED CONFIGURATION`\
    \ 的 `LEGACY_CARDINALITY_ESTIMATION` 选项来禁用CE模型。\n\n*   在你的生产环境SQL Server 2019实例中保留此`dbcompat`级别，或者执行一次到SQL\
    \ Server 2019的测试迁移，并使用更新的`dbcompat`级别进行进一步测试，以查找你的应用程序可能存在的任何问题。在下一节中，我将讨论一个名为\
    \ **Query Tuning Assistant** 的工具，它可以在这些工作中帮助你。你可以使用DMA工具查看你的数据库在SQL Server 2019上各个`dbcompat`级别的配置评估。\n\
    \n关于数据库兼容性（`dbcompat`）和向后兼容性的其他几点说明：\n\n*   你可以从这个文档链接开始查看`dbcompat`级别之间行为差异的完整列表：[`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#differences-between-compatibility-level-140-and-level-150`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523differences-between-compatibility-level-140-and-level-150)。从这里开始向下滚动查看差异，一直到90（SQL\
    \ Server 2005）。\n*   数据库兼容性不影响SQL Server实例级别的破坏性更改。因此，尽管我们将`dbcompat`用作认证应用程序的机制，但如果应用程序使用了任何SQL\
    \ Server实例级别的功能，你需要确保对此进行充分测试。实例级别的功能可以是任何从使用系统目录视图、系统动态管理视图、SQL Server代理、链接服务器，到影响整个SQL\
    \ Server实例且不局限于数据库的T-SQL语句。\n\n### 查询调优助手和迁移后工作\n\n在2018年的不同时期，我不断看到Pedro Lopes发给我们的团队的电子邮件，内容是关于一个他正在从事的名为TUNA的项目。至少这是我记忆中一直记得的项目名称。后来我发现，这个项目的真正名称其实是\
    \ **TunA**。TunA代表 **Tun**ing **A**ssistant（调优助手）。\n\n如果你还记得前面关于数据库兼容性建议的部分，我提到了在迁移过程中针对新的数据库兼容级别测试你的应用程序的想法。\n\
    \n让我们回顾一下本章前面“Pam and Pedro Show”部分的视频。在视频大约40分40秒处，你会看到Pedro谈论 **Post Migration（迁移后）**\
    \ 。他这里的意思是，在你迁移到较新版本的SQL Server后，你可以采取一些步骤来优化你的工作负载，*假设*你从旧版本的SQL Server中保留了*源*数据库的兼容级别。\n\
    \nPedro提出了一种使用Query Store来比较更改数据库兼容级别前后工作负载性能的方法。该方法来自Query Store文档中的一个使用场景，称为\
    \ **Keep performance stability during the upgrade to newer SQL Server**，你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios?#CEUpgrade`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios%253F%2523CEUpgrade)\
    \ 阅读。\n\n现在轮到TunA项目登场了。Pedro和他的团队在SQL Server Management Studio (SSMS) 18.x版本中内置了一个名为\
    \ **Query Tuning Assistant (QTA)** 的功能。QTA允许你自动化使用Query Store来评估和修复在迁移到新的数据库兼容级别时可能出现的任何查询性能问题。\n\
    \n图11-5展示了QTA的工作流程。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig5_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig5_HTML.jpg)\n\
    \n图11-5 QTA工作流程\n\n在SSMS中使用QTA工具，可以在迁移到较新版本的SQL Server后，当查询性能在新的数据库兼容级别下可能变差时，为你提供专家建议。最终的建议可能涉及对查询的更改，例如使用查询选项。所有的建议都基于有据可查的建议。这就像拥有“盒子里的Pedro\
    \ Lopes”。\n\n我曾考虑在本章中放一个QTA的示例，但是，为什么不直接使用Pedro Lopes在GitHub上整理得极其完善的示例呢。你可以从\
    \ [`https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md`](https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md)\
    \ 下载和使用此示例。\n\n```json\n{\n    \"name\": \"sample\",\n    \"version\": \"1.0.0\"\
    ,\n    \"description\": \"示例配置\",\n    \"settings\": {\n        \"database\":\
    \ {\n            \"compatibilityLevel\": 150,\n            \"useLegacyCardinalityEstimation\"\
    : false\n        }\n    }\n}\n```"
  raw: '### Note


    The biggest change in database compatibility (dbcompat) level that could affect
    query performance was 120\. This is because we introduced a fairly large change
    to the query optimizer called the Cardinality Estimation (CE) model. If you migrated
    to a newer version of SQL Server and needed to use a dbcompat of 120 or higher,
    but experience issues related to the CE model, you can disable the CE mode using
    the LEGACY_CARDINALITY_ESTIMATION option of ALTER DATABASE SCOPED CONFIGURATION.


    *   Keep this dbcompat level in your production SQL Server 2019 instance, or perform
    a test migration to SQL Server 2019, and do further testing with newer dbcompat
    levels to look for any issues with your application. In the next section, I’ll
    discuss a tool called **Query Tuning Assistant** that can aid you in these efforts.
    You can use the DMA tool to see the configuration assessment of various dbcompat
    levels for SQL Server 2019 for your database.


    A few other comments about database compatibility (dbcompat) and backward compatibility:


    *   You can see a complete list of differences in behavior between dbcompat levels
    starting at this documentation link: [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#differences-between-compatibility-level-140-and-level-150`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523differences-between-compatibility-level-140-and-level-150)
    . You start here and scroll down to see differences, all the way back to 90 (SQL
    Server 2005).


    *   Database compatibility does not affect breaking changes at the SQL Server
    instance level. So as good as our commitment is to use dbcompat as a mechanism
    to certify an application, if the application uses any SQL Server instance level
    functionality, you need to ensure this is well tested. Instance level functionality
    could be anything from the use of system catalog views, system Dynamic Management
    Views, SQL Agent, Linked Servers, or T-SQL statements that affect the entire instance
    of SQL Server and are not scoped to a database.


    ### Query Tuning Assistant and Post Migration


    At various times in 2018, I kept seeing e-mails to our teams from Pedro Lopes
    about a project he was working on called TUNA. At least that is how I kept remembering
    the project name. What the name of the project really was, I came to find out,
    was **TunA.** TunA stands for **Tun**ing **A**ssistant .


    If you remember back to the previous section, where I talk about recommendations
    for database compatibility, I mention the idea of testing your application against
    a new database compatibility level as part of our migration.


    Let’s review back to the video from “The Pam and Pedro Show” section earlier in
    this chapter. About 40:40 into the video, you will see Pedro talk about **Post
    Migration** . What he means here is that there are steps you can take to optimize
    your workload after you migrate to a newer version of SQL Server, *assuming* you
    kept your *source* database compatibility level from the previous version of SQL
    Server.


    Pedro proposes a methodology using Query Store to compare workload performance
    before and after a change to database compatibility level. This method comes from
    the documentation with Query Store as a usage scenario, called **Keep performance
    stability during the upgrade to newer SQL Server**, which you can read at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios?#CEUpgrade`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios%253F%2523CEUpgrade)
    .


    Now comes in the TunA project. Pedro and team built functionality into the SQL
    Server Management Studio (SSMS) tool in version 18.x called the **Query Tuning
    Assistant (QTA)** **.** QTA allows you to automate the process of using the Query
    Store to assess and fix any query performance issues when moving to a new database
    compatibility level.


    Figure [11-5](#479130_1_En_11_Chapter.xhtml#Fig5) shows the QTA workflow.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig5_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    The QTA workflow


    Using the QTA tool with SSMS provides you expert advice when query performance
    may be worse under a new database compatibility level, after a migration to a
    newer version of SQL Server. The resulting recommendations may involve a change
    to the query, such as the use of query options. All of the recommendations are
    based on documented advice. It’s like having “Pedro Lopes in a box.”


    I thought about putting a sample of QTA in this chapter, but, instead, why not
    just use the extremely well put together sample Pedro Lopes has on GitHub. You
    can download and use this example from [`https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md`](https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md)
    .'
