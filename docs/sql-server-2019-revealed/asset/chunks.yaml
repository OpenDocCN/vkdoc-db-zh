- fmt: '#### Pick the Client and Download Tools


    Once you have decided on the k8s strategy, you need tools to deploy BDC. It is
    very important to ensure you have all the right tools installed on the client
    before you try to deploy BDC. The documentation provides a list of tools you will
    need at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools).
    For my client, I chose my “laptop in the cloud.” This means I installed Windows
    10 in an Azure Virtual Machine and drove all of my BDC use in that VM.


    This list of tools includes the following:


    `python` – `python` is a key component used by several different tools and is
    available on all OS platforms. The `azdata` tool, required to install BDC, is
    written in `python`. I needed `python` as I used a `python` script to deploy AKS
    and BDC all in one step. For `python` for Windows, I just pull down the latest
    `python` build from [`www.python.org/downloads/release/python-374/`](https://www.python.org/downloads/release/python-374/).


    `kubectl` – As you learned in Chapter [8](#479130_1_En_8_Chapter.xhtml), `kubectl`
    is a tool specifically designed to send requests to the k8s API server. This is
    your programming interface for Kubernetes.


    I had already installed `kubectl` on my Windows machine; I checked the version
    and it was 1.14. The docs notes say, “You must use `kubectl` version 1.10 or later.
    Also, the version of `kubectl` should be plus or minus one minor version of your
    Kubernetes cluster.” Since I’m using AKS, I checked the command to see what versions
    would be used in my AKS deployment and found that the highest version supported
    is 1.14.6 – so I should be good to go. You can find out more about checking if
    supported AKS versions are available on your cluster at [`https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions`](https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions).


    `azdata` – This tool, formerly called `mssqlctl` in early preview releases of
    SQL Server 2019, is *critical* to deploy and manage BDC. Written in `python`,
    you should think of `azdata` as the “`kubectl`” of BDC.


    To verify I had `azdata` properly installed, I just ran `azdata` from the command
    line to see what the interface looked like. The results are shown in Figure [10-3](#479130_1_En_10_Chapter.xhtml#Fig3).


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig3_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig3_HTML.jpg)

    *Figure 10-3: The `azdata` CLI*


    You can see the complete `azdata` reference at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata).


    Azure Data Studio (ADS) – This cross-platform, open source tool can be used to
    query, deploy, manage, and navigate data for BDC. While SQL Server Management
    Studio (SSMS) can be used to connect to the SQL Server Master Instance in BDC,
    ADS has features and extensions specifically designed for BDC, including Notebook
    support.


    I used the ADS Insiders build from [`https://github.com/microsoft/azuredatastudio#try-out-the-latest-insiders-build-from-master`](https://github.com/microsoft/azuredatastudio%2523try-out-the-latest-insiders-build-from-master),
    but, I expect that by the time SQL Server 2019 releases, you will have a public
    build of ADS with everything you need for BDC. You can get the latest ADS build
    at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download).


    I also grabbed the latest SQL Server 2019 preview extension at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension)
    and installed the vsix file. (You can ignore the warning about third-party extensions
    because the extension is from Microsoft.) It is hard to know if this is working
    or finished, but give it a few minutes and you will see in the lower right-hand
    corner a message like, “Completed installing the extension `microsoft.sql-vnext`.”


    `az` – If you are using AKS, you will need the Azure command-line interface to
    log in to Azure and to deploy and manage AKS.


    `curl` – `curl` stands for “Client URL” and is a popular tool to copy data from
    a specific URL, often files stored on web sites. For me, `curl` comes with Windows
    10. `curl` is a great tool, not only to copy remote scripts to use with BDC but
    also to copy data into the BDC HDFS cluster.


    #### Deployment Method


    Now that you know which type of k8s cluster you will deploy and have your required
    tools downloaded; you choose the method for deployment:


    *   A “single-step” method to deploy AKS and BDC using `python`, which you can
    find at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy).

    *   A “single-step” Bash shell script to deploy k8s and BDC on your k8s cluster
    using `kubeadm`, which you can find at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm).

    *   Create your own AKS or k8s cluster first, and then deploy BDC using the `azdata`
    tool, which you can read about at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance).

    *   Use Azure Data Studio (ADS) to deploy BDC along with a new AKS cluster, to
    an existing AKS cluster, or to an existing k8s cluster you have deployed with
    `kubeadm`.


    Figure [10-4](#479130_1_En_10_Chapter.xhtml#Fig4) shows how to access this deployment
    experience in ADS.

    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg)

    *Figure 10-4: Choosing to deploy BDC in Azure Data Studio*


    Figure [10-5](#479130_1_En_10_Chapter.xhtml#Fig5) shows the experience to pick
    your deployment method.

    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg)

    *Figure 10-5: Deployment options for BDC in Azure Data Studio*


    #### Offline Deployment


    I want to mention that if you need an offline deployment experience because your
    k8s cluster is not connected to the Internet (at least when you need to deploy
    BDC), we have documented how to pull our container images and deploy BDC on k8s.
    You will still need all the tools I’ve described in this chapter to deploy offline.
    You can read the details at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline).'
