  trans: '# 容器生命周期


    无论您在 Linux、Windows 还是 macOS 上安装 Docker，都会安装以下支持容器的组件：


    `Docker 引擎` – 这由 `docker 守护进程` 组成，它是一个用于控制构建和运行容器的所有操作的“服务”。`docker 引擎` 支持一个 API，供程序与之交互以构建和运行容器。您可以在
    [`https://docs.docker.com/engine/`](https://docs.docker.com/engine/) 阅读更多关于 `docker
    引擎` 的内容。您可以在 [`https://docs.docker.com/develop/sdk/`](https://docs.docker.com/develop/sdk/)
    阅读更多关于引擎 API 的内容。


    `docker 客户端` – 这是一个名为 `docker` 的程序，它使用引擎 API 来构建和运行容器。`docker 客户端` 是一个一致性程序，因为它在
    Windows、macOS 和 Linux 上支持相同的选项和行为。在本章的示例中，您将全程使用 `docker 客户端`。


    `docker compose` – 这是一个名为 `docker-compose` 的程序，它允许您构建和运行多容器应用程序。在本章稍后关于 SQL Server
    复制的示例中，您将使用 `docker-compose`。


    结合这些组件，以下是我称之为容器生命周期的工作流程，如图 7-2 所示。


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig2_HTML.jpg](img/479130_1_En_7_Fig2_HTML.jpg)


    图 7-2


    容器生命周期


    让我们更详细地看看其中的每一个环节：


    ## 构建


    `docker build` 命令用于构建新的容器镜像。尽管支持 SDK，但标准方法是使用名为 `Dockerfile` 的文件来定义要构建的镜像。您可以在
    [`https://docs.docker.com/engine/reference/commandline/build/`](https://docs.docker.com/engine/reference/commandline/build/)
    阅读更多关于 `docker build` 的内容。`Dockerfile` 语法的参考文档可以在 [`https://docs.docker.com/engine/reference/builder/`](https://docs.docker.com/engine/reference/builder/)
    找到。Microsoft 构建了包含 SQL Server 的镜像，因此在许多情况下您永远不需要构建自己的镜像。但是，在某些情况下，您可能需要构建一个 *基于
    SQL Server* 的自定义镜像。我将在本章后面展示一些例子。


    ## 推送


    构建镜像后，您可能希望其他人也能使用它，因此您可以使用 `docker push` 命令将容器镜像推送或发布到注册表。该注册表可以位于本地服务器上，也可以是公共领域的。最常见的公共领域注册表之一是
    Docker Hub 或 hub.docker.com。Microsoft（包括 SQL Server）在 mcr.microsoft.com（称为 Microsoft
    容器注册表）发布其容器镜像。我将在本章后面讨论如何在 Microsoft 容器注册表上找到各种 SQL Server 镜像。您可以在 [`https://docs.docker.com/engine/reference/commandline/push/`](https://docs.docker.com/engine/reference/commandline/push/)
    阅读更多关于 `docker push` 的内容。


    ## 拉取


    任何想要使用容器镜像的人都必须先拉取它，即使它存储在本地服务器上。容器镜像使用 `docker pull` 命令进行拉取。`docker 引擎` 会将镜像的一份副本本地存储在主机计算机上。您可以在
    [`https://docs.docker.com/engine/reference/commandline/pull/`](https://docs.docker.com/engine/reference/commandline/pull/)
    阅读更多关于 `docker pull` 命令的内容。


    ## 运行


    要基于镜像运行容器，请使用 `docker run` 命令。如果您运行容器的镜像尚未拉取，docker 会先拉取该镜像，然后运行容器。您将在本章中学习运行
    SQL Server 容器所需的所有参数和细节。


    ## 管理


    运行容器后，您将需要 `管理` 它。`docker 客户端` 将允许您停止、启动、重启和移除容器。此外，`docker 客户端` 还允许您管理镜像，包括删除它们。


    ## 监控


    `docker 客户端` 也可用于 `监控` 和管理容器生态系统，方法是列出正在运行和已停止的容器，并转储运行中和已停止容器的统计信息和日志。


    ## 交互


    最后，`docker 客户端` 允许您与正在运行的容器进行 `交互`，方法是从主机系统将文件复制到容器的可写层，并运行存在于容器文件系统中的程序（该程序将在与主容器程序相同的命名空间中运行）。这些命令对于
    SQL Server 容器将非常有用，正如您将在本章的示例中看到的那样。'
- fmt: "### The SQL Server Container\n\nThe SQL Server container images contain the\
    \ necessary files for the SQL Server engine, SQL Server Agent, all the features\
    \ included with the engine like Replication, and the SQL Server command-line tools\
    \ (`sqlcmd` and `bcp`). When you run a SQL Server container, `SQL Server` is pre-installed!\
    \ In other words, when you pull and run a SQL Server container, you are ready\
    \ to use it. This is one of the major benefits of using a SQL Server container.\
    \ There is no install of SQL Server required once you start a container.\n\nI\
    \ mentioned in the previous section that an image is built with `docker build`\
    \ using a file called a Dockerfile. To understand how the SQL Server container\
    \ is pre-installed, here is a rough outline of the commands in the Dockerfile\
    \ for SQL Server:\n\n```\nFROM \nLABEL \nEXPOSE 1433\nCOPY \nRUN ./install.sh\n\
    CMD [\"/opt/mssql/bin/sqlservr”]\n```\n\nThe `FROM` command specifies the base\
    \ OS image the SQL Server container image is built on. One of the great things\
    \ about containers is the ability to build new images based on others, creating\
    \ a layering effect of images. In fact, later in the chapter, I’ll show you how\
    \ to build your own image based on the SQL Server image (which is based on the\
    \ base OS image).\n\nThe `EXPOSE` command allows the SQL Server container to have\
    \ programs connect to port `1433` inside the container. This is important since\
    \ by default containers are isolated. You will see that often this port will be\
    \ mapped to another port in the host, allowing multiple SQL Server containers\
    \ to run on the same host (which normally would fail since two programs can’t\
    \ be listed on the same port).\n\nThe `COPY` and `RUN` commands are just part\
    \ of the build process to copy in all of the SQL Server binary files into the\
    \ container image file system and install any software dependencies.\n\nAll of\
    \ these commands in the SQL Server Dockerfile so far are part of building the\
    \ container image. When a `docker build` command is executed, each of these statements\
    \ is used to build the image. The `CMD` statement indicates to docker the name\
    \ of the program to run when the container starts up, which is `sqlservr`. This\
    \ means that a SQL Server container doesn’t run like a “service” (e.g., `systemd`\
    \ unit service in Linux). When I’ve described this to some people, they have asked\
    \ “How does SQL Server then stay running?” Turns out the SQL Server program (this\
    \ is the same on Windows) is built to be a daemon program, which means it runs\
    \ in the background until it gets a signal to be stopped.\n\nWith this in mind,\
    \ let’s see how you run a SQL Server container and then talk about internally\
    \ how we “pre-install” SQL Server.\n\n### Running a SQL Server Container\n\nThe\
    \ basic syntax to run a SQL Server container looks like this with the `docker\
    \ run` command (note: on Linux you typically need to preface the command with\
    \ `sudo`):\n\n```\ndocker run\n-e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n\
    -p 1401:1433\n-v sqlvolume:/var/opt/mssql\n--hostname sql2019latest\n--name sql2019latest\n\
    -d\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\nLet me explain each\
    \ of these arguments:\n\n#### Environment Variables (`-e`)\n\n```\n-e 'ACCEPT_EULA=Y'\
    \ -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n```\n\nThe `-e` parameters specify environment\
    \ variables that the container needs to execute. In the case of SQL Server, you\
    \ need at minimum to accept the EULA agreement and the `sa` password. Other environment\
    \ variables can be used as well to specify the SQL Server edition or enable SQL\
    \ Server Agent. Any environment variable supported by SQL Server can be used to\
    \ preconfigure the installation of SQL Server when starting the container. You\
    \ can get a complete set of environment variables at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables).\n\
    \n#### Port Mapping (`-p`)\n\n```\n-p 1401:1433\n```\n\nThis is not required if\
    \ you are only going to run one SQL Server container on the host (and assumes\
    \ you don’t have SQL Server installed on the host). If you do have more than one\
    \ SQL Server, you need to map port `1433` to a different port. Any application\
    \ wanting to connect to this SQL Server container will use port `1401` now instead\
    \ of just the default port.\n\n#### Volume Mapping (`-v`)\n\n```\n-v sqlvolume:/var/opt/mssql\n\
    ```\n\nThis specifies what volume to use to map to the SQL Server directory where\
    \ databases are stored. This is not required, but if you want your databases to\
    \ persist independent of the lifetime of the container, you will want to use a\
    \ volume. For any production SQL Server container, you will want to use a volume.\n\
    \n#### Hostname (`--hostname`)\n\n```\n--hostname sql2019latest\n```\n\nThis parameter\
    \ is also not required but very convenient. This is because the hostname you specify\
    \ will become `@@SERVERNAME` within SQL Server.\n\n#### Container Name (`--name`)\n\
    \n```\n--name sql2019latest\n```\n\nThis parameter is also not required but is\
    \ convenient for you to manage the container. By using a name, you can now easily\
    \ identify a container by name and manage it. For example, after starting this\
    \ container, you can stop it by running `docker stop sql2019latest`.\n\n#### Detached\
    \ Mode (`-d`)\n\n```\n-d\n```\n\nThis parameter says to run the container in the\
    \ background. You normally want to use this parameter for a SQL Server container.\
    \ However, a nice debugging technique is to remove this parameter if you cannot\
    \ start a SQL Server container. This is because when the `sqlservr` program is\
    \ run from the command line, the default behavior is to dump the contents of the\
    \ `ERRORLOG` to `stdout` which would then show up when you run the container.\
    \ You can also use the `docker logs` command to dump out the `ERRORLOG` of a SQL\
    \ Server container.\n\n#### Image Tag\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\nThis is the tag of the container image you want to run. I’ll show in the\
    \ next section how to figure out which tags to use for a particular SQL Server\
    \ container. If the tagged image doesn’t exist locally, `docker` will pull that\
    \ image first and then run the container.\n\n### SQL Server Container Startup\n\
    \nOne interesting aspect of how a SQL Server container works is the startup sequence.\
    \ When the `sqlservr` program runs in the container, the `/var/opt/mssql` directory\
    \ does not exist. However, the `sqlservr` program has the intelligence to create\
    \ this directory and extract the system databases from the installed files of\
    \ the container image at startup. In addition, `sqlservr` understands how to take\
    \ the environment variables and use them as startup parameters to bind in the\
    \ EULA agreement, `sa` password, and other environment variables. In other words,\
    \ the `sqlservr` program understands how to install itself!\n\nLet’s look at what\
    \ is new in SQL Server 2019 with containers before diving into some examples."
