    \ (approximately 113 seconds remain). Phase 3 of 3\\. This is an informational\
    \ message only. No user action is required.\nspid8s      Recovery of database\
    \ 'gocowboys' (6) is 50% complete (approximately 94 seconds remain). Phase 3 of\
    \ 3\\. This is an informational message only. No user action is required.\nspid8s\
    \      Recovery of database 'gocowboys' (6) is 59% complete (approximately 79\
    \ seconds remain). Phase 3 of 3\\. This is an informational message only. No user\
    \ action is required.\nspid8s      Recovery of database 'gocowboys' (6) is 68%\
    \ complete (approximately 65 seconds remain). Phase 3 of 3\\. This is an informational\
    \ message only. No user action is required.\nspid8s      Recovery of database\
    \ 'gocowboys' (6) is 76% complete (approximately 48 seconds remain). Phase 3 of\
    \ 3\\. This is an informational message only. No user action is required.\nspid8s\
    \      Recovery of database 'gocowboys' (6) is 84% complete (approximately 32\
    \ seconds remain). Phase 3 of 3\\. This is an informational message only. No user\
    \ action is required.\nspid8s      Recovery of database 'gocowboys' (6) is 93%\
    \ complete (approximately 15 seconds remain). Phase 3 of 3\\. This is an informational\
    \ message only. No user action is required.\nspid8s      1 transactions rolled\
    \ back in database 'gocowboys' (6:0). This is an informational message only. No\
    \ user action is required.\nspid8s      Recovery is writing a checkpoint in database\
    \ 'gocowboys' (6). This is an informational message only. No user action is required.\n\
    spid8s      Recovery completed for database gocowboys (database ID 6) in 211 second(s)\
    \ (analysis 15 ms, redo 56340 ms, undo 154549 ms.) This is an informational message\
    \ only. No user action is required.\n```\n\n### Note\n\nThe redo is needed here\
    \ for some system transactions involved with index statistics for this example.\n\
    \nHere is the ERRORLOG when ADR is enabled. Recovery when ADR is enabled happens\
    \ so fast; SQL Server doesn’t even bother writing how long recovery took!\n\n\
    ```\nspid25s     1 transactions rolled back in database 'gocowboys' (6:0). This\
    \ is an informational message only. No user action is required.\nspid25s     Recovery\
    \ is writing a checkpoint in database 'gocowboys' (6). This is an informational\
    \ message only. No user  required.\n```\n\n### Accelerate Database Recovery Nuts\
    \ and Bolts\n\nThis all sounds too good to be true, and I’m sure you are wondering\
    \ if there are any side effects to this. If ADR is so great, why don’t we just\
    \ make it the default?\n\n#### Performance and Size\n\nThere are two questions\
    \ that come up when I’ve talked to customers about ADR:\n\n**Does the database\
    \ get larger?**\n\nThe short answer to this question is yes. The more important\
    \ question is by how much. Since we are keeping versions of rows in the database\
    \ for a period of time, naturally the size required for PVS is bigger than without\
    \ it.\n\nThe problem, as with any feature like this, is the dreaded answer, “it\
    \ depends.” Depends on what? The factors are\n\n*   Is the application write-intensive\
    \ with a lot of modifications? The bigger the number of modifications, the more\
    \ size will be required to hold versions.\n\n*   How long are transactions that\
    \ need to read version data? Once versions are not needed by any query, they can\
    \ be removed.\n\nAccelerated Database Recovery has built-in optimizations to keep\
    \ the version store as small as possible, including the following:\n\n*   **“on-demand”**\n\
    \n    When updating a row, SQL Server can “reuse” a version of a row that was\
    \ aborted and write in a new version in its place. This happens during the process\
    \ of a data modification.\n\n*   **Background cleanup**\n\n    What about if versions\
    \ are still around that are no longer needed (e.g., aborted transactions) and\
    \ an update has not occurred yet? SQL Server uses the existing background worker\
    \ thread architecture to schedule cleanup (every “few” minutes) on any versions\
    \ that can be discarded both for in-row and off-row versions. SQL Server uses\
    \ a concept called *logical revert* to clean up these versions. Logical revert\
    \ is the process of ensuring the committed version of the row is the “main” row\
    \ for the page, thereby making the “list” of versions shorter to traverse. Section\
    \ 3.3 of the CTR paper [`(www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)\
    \ ) has an excellent detailed description of how logical revert works. In addition,\
    \ Section 3.7 of this same paper describes the entire cleanup process.\n\nSection\
    \ 4 of the paper has results from experimental testing on growth, using an example\
    \ of 50 million insert, update, and delete operations. The team found after 50M\
    \ updates, the PVS grew the database by about 1Gb. You should look through these\
    \ results as it also shows the significant size reduction of the transaction log\
    \ due to the use of ADR (and you observed this during the activity in this chapter\
    \ using the **alookatadr.sql** script).\n\n**Does using ADR cause any performance\
    \ impact?**\n\nThis is probably the most common question asked about ADR. And\
    \ like the growth factor, the answer is, “Maybe, and it depends.” Since ADR is\
    \ tracking every modification with versions, write-intensive workloads will see\
    \ the biggest impact. And read operations for write-intensive workloads may also\
    \ be affected some to find a version of a row.\n\nAs part of the CTR paper, the\
    \ engineering team performed some testing using benchmarks derived from the industry\
    \ standard TPC-C and TPC-E benchmarks (see [`www.tpc.org`](http://www.tpc.org)\
    \ for more information about these benchmarks). TPC-C is an older benchmark but\
    \ very write-intensive. TPC-E is a more balanced but still “OLTP” write workload\
    \ benchmark. You can see the results in the paper in **Section 4.2**, but, effectively,\
    \ the run of TPC-C encountered about a 14% (in-row version) impact, and TPC-E\
    \ encountered a 2.5% (in-row version) impact.\n\nI did my own “quick and dirty”\
    \ testing using the open source tool HammerDB (see [`www.hammerdb.com`](http://www.hammerdb.com)\
    \ for more details). This tool comes with a variation of the TPC-C benchmark.\
    \ Using a 10 warehouse/10 virtual user execution over a 5-minute period, I saw\
    \ about 15% impact from using ADR."
  trans: "### 提示\n\n如果需要强制重做该怎么办？这有点像相反的方法。你必须有一个已提交的事务，但该事务影响的页面不能被刷新到磁盘。运行一个类似本章示例的事务，但提交该事务。然后“崩溃”服务器，但你必须在不进行检查点的情况下执行此操作，因此请使用“结束任务”方法。\n\
    \n了解这些知识后，你可以查阅位于 `ch4_mission_critical_availability\\adr` 目录下的 T-SQL 脚本 `adr_recovery.sql`\
    \ 或 T-SQL 笔记本 `adr_recovery.ipynb`。我推荐使用笔记本，因为它有文档说明了每个步骤，并指导何时“崩溃” SQL Server。\n\
    \n在执行笔记本或脚本的步骤时，你需要检查 `ERRORLOG`。我这里提供了在启用和未启用 ADR 的情况下，恢复运行时你应该看到的日志示例。\n\n以下是未启用\
    \ ADR 时的 `ERRORLOG` 示例。\n\n```\nspid25s     数据库 'gocowboys' (6) 的恢复已完成 2%（大约剩余\
    \ 697 秒）。3 个阶段中的第 2 阶段。这只是信息性消息。不需要用户操作。\nspid25s     数据库 'gocowboys' (6) 的恢复已完成\
    \ 5%（大约剩余 682 秒）。3 个阶段中的第 2 阶段。这只是信息性消息。不需要用户操作。\nspid25s     数据库 'gocowboys'\
    \ (6) 的恢复已完成 7%（大约剩余 667 秒）。3 个阶段中的第 2 阶段。这只是信息性消息。不需要用户操作。\nspid25s     数据库 'gocowboys'\
    \ (6) 的恢复已完成 7%（大约剩余 667 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\nspid8s      数据库 'gocowboys'\
    \ (6) 的恢复已完成 40%（大约剩余 113 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\nspid8s      数据库\
    \ 'gocowboys' (6) 的恢复已完成 50%（大约剩余 94 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\nspid8s\
    \      数据库 'gocowboys' (6) 的恢复已完成 59%（大约剩余 79 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\n\
    spid8s      数据库 'gocowboys' (6) 的恢复已完成 68%（大约剩余 65 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\n\
    spid8s      数据库 'gocowboys' (6) 的恢复已完成 76%（大约剩余 48 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\n\
    spid8s      数据库 'gocowboys' (6) 的恢复已完成 84%（大约剩余 32 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\n\
    spid8s      数据库 'gocowboys' (6) 的恢复已完成 93%（大约剩余 15 秒）。3 个阶段中的第 3 阶段。这只是信息性消息。不需要用户操作。\n\
    spid8s      在数据库 'gocowboys' (6:0) 中回滚了 1 个事务。这只是信息性消息。不需要用户操作。\nspid8s      恢复正在数据库\
    \ 'gocowboys' (6) 中写入一个检查点。这只是信息性消息。不需要用户操作。\nspid8s      数据库 gocowboys（数据库 ID\
    \ 6）的恢复已在 211 秒内完成（分析 15 毫秒，重做 56340 毫秒，撤销 154549 毫秒）。这只是信息性消息。不需要用户操作。\n```\n\
    \n### 注意\n\n对于此示例，重做步骤是因涉及索引统计信息的一些系统事务所需。\n\n以下是启用 ADR 时的 `ERRORLOG`。启用 ADR 后，恢复发生得如此之快，以至于\
    \ SQL Server 甚至没有记录恢复花费了多长时间！\n\n```\nspid25s     在数据库 'gocowboys' (6:0) 中回滚了\
    \ 1 个事务。这只是信息性消息。不需要用户操作。\nspid25s     恢复正在数据库 'gocowboys' (6) 中写入一个检查点。这只是信息性消息。不需要用户操作。\n\
    ```\n\n### 加速数据库恢复的机制详解\n\n这一切听起来好得令人难以置信，我相信你一定在想这是否会有什么副作用。如果 ADR 如此出色，为什么我们不直接将其设为默认功能呢？\n\
    \n#### 性能和大小\n\n当我和客户讨论 ADR 时，经常会出现两个问题：\n\n**数据库会变大吗？**\n\n这个问题的简短答案是：是的。更重要的问题是变大多少。由于我们在一段时间内保留行的版本，因此\
    \ PVS 所需的空间自然比没有它时更大。\n\n和任何类似功能一样，问题在于那个令人头疼的答案：“视情况而定”。取决于什么？影响因素包括：\n\n*  \
    \ 应用程序是否是写入密集型的，有大量修改？修改的数量越大，存储版本所需的空间就越多。\n*   需要读取版本数据的事务有多长？一旦任何查询都不再需要某些版本，它们就可以被移除。\n\
    \n加速数据库恢复具有内置优化，以尽可能减小版本存储的大小，包括以下内容：\n\n*   **“按需”**\n    在更新一行时，SQL Server 可以“重用”已中止事务的行版本，并在原处写入一个新版本。这发生在数据修改的过程中。\n\
    *   **后台清理**\n    如果版本仍然存在但不再需要（例如，已中止的事务），并且尚未发生更新怎么办？SQL Server 使用现有的后台工作线程架构来调度清理（每隔“几分钟”）任何可以丢弃的版本，包括行内和行外版本。SQL\
    \ Server 使用一种称为*逻辑还原*的概念来清理这些版本。逻辑还原是确保行的已提交版本是页面的“主要”行的过程，从而缩短需要遍历的版本“列表”。CTR\
    \ 论文 [`(www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/))\
    \ 的第 3.3 节对逻辑还原的工作原理进行了出色的详细描述。此外，该论文的第 3.7 节描述了整个清理过程。\n\n该论文的第 4 节提供了关于增长的实验测试结果，使用了一个包含\
    \ 5000 万次插入、更新和删除操作的示例。团队发现，在 5000 万次更新后，PVS 使数据库增长了大约 1GB。你应该仔细阅读这些结果，因为它还显示了由于使用\
    \ ADR 而导致事务日志大小的显著减少（你在本章使用 `alookatadr.sql` 脚本的活动中也观察到了这一点）。\n\n**使用 ADR 会导致任何性能影响吗？**\n\
    \n这可能是关于 ADR 最常被问到的问题。和增长因素一样，答案是“可能，并且视情况而定”。由于 ADR 通过版本跟踪每一次修改，写入密集型工作负载将受到最大影响。对于写入密集型工作负载的读取操作，在查找行版本时也可能受到一些影响。\n\
    \n作为 CTR 论文的一部分，工程团队使用源自行业标准 `TPC-C` 和 `TPC-E` 基准的测试进行了性能测试（有关这些基准的更多信息，请参见 [`www.tpc.org`](http://www.tpc.org)）。`TPC-C`\
    \ 是一个较旧的基准测试，但写入非常密集。`TPC-E` 是一个更均衡但仍然是“OLTP”写入工作负载的基准测试。你可以在论文的 **第 4.2 节** 中看到结果，但简而言之，`TPC-C`\
    \ 的运行遇到了大约 14%（行内版本）的影响，而 `TPC-E` 遇到了 2.5%（行内版本）的影响。\n\n我自己使用开源工具 `HammerDB`（更多详细信息请参见\
    \ [`www.hammerdb.com`](http://www.hammerdb)）进行了“快速而简单”的测试。该工具附带一个 `TPC-C` 基准的变体。使用\
    \ 10 个仓库/10 个虚拟用户在 5 分钟内执行，我观察到使用 ADR 大约造成了 15% 的影响。"
- fmt: '### ADR 性能测试说明


    None of these test results means that you will see these exact numbers or any
    performance impact if you enable ADR for your database. This is because these
    tests use benchmarks of a certain type of workload that may or may not match your
    application. Find a standard way to test the performance of your application with
    and without ADR to know the true impact of performance.

    Look over the results in all of Section 4 of the paper, because it also shows
    some of the amazing recovery time results the team has seen in Azure (you have
    already seen the possible impact with a simple database).

    Another major benefit of Accelerated Database Recovery is that failover time for
    Always On Availability Groups can be faster and a better version story exists
    for read-only queries on replicas.


    #### 意外场景


    In some cases, the Persistent Version Store (`PVS`) cannot be stored in-row, because
    it does not fit on a page. In this case, the versions are stored in an internal
    system table. These are called “off-row” scenarios. As you can imagine, when `PVS`
    is stored off-row, it is not the ideal situation. Therefore, these scenarios should
    be avoided if possible.

    Off-row versions can occur mostly when the modification is a substantial change
    to the current version of the row. If an update is so significant, it is not possible
    or does not make sense to store a version in-row; the version will be stored in
    an internal system table as an off-row version. I did some poking around in a
    database with `ADR` on, and the `PVS` is kept in a table called `persistent_version_store`
    in each database. This table is marked as a type `INTERNAL_TABLE` which is similar
    to other tables like ones for Query Store. This system table has the version data
    and metadata to link it back to the actual row in the page of a table.

    If you are concerned whether your application is generating a lot of off-row versions,
    there are performance counters and extended events you can use which I describe
    in the next section called Tracking `ADR`.


    #### 文件组与优化说明


    At the time I wrote this chapter, the off-row `PVS` is stored in the `PRIMARY`
    filegroup of your database, and there is no choice on this. The engineering team
    was discussing whether they could add an option to move the off-row `PVS` to another
    filegroup chosen by the user through `ALTER DATABASE`. Consult the documentation
    for `ALTER DATABASE` to see if this enhancement made its way into the final SQL
    Server 2019 release.

    Another unexpected situation is called short-transaction optimization. This situation
    is a good thing. It doesn’t make sense to use `PVS` when transactions are very
    short in nature. Therefore, when testing `ADR`, don’t expect a transaction that
    deletes a few rows to use `ADR`. If you are examining the log with `fn_dblog()`,
    you can see transactions where `ADR` will not apply with the following Operation
    and Context, `LOP_FORGET_XACT` and `LCX_XACT_DOES_NOT_SUPPORT_CTR`.


    #### 追踪 ADR


    Like many new features of SQL Server, the `ADR` team has wait types, Extended
    Events, and performance monitor counters to track the execution of `ADR`, the
    use of the Persisted Version Store (`PVS`), and cleanup processing.

    Figure 4-5 shows some of the performance counters available to track the use of
    the Persisted Version Store (`PVS`), including tracking how many off-row versions
    are being generated.

    ![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg)

    图 4-5 `PVS` 性能计数器

    There are several Extended Events that can also be used to track specific generation
    of versions and for cleanup tasks. You can find all of these events by executing
    the following queries against the `XE` Dynamic Management Views:

    ```sql

    select * from sys.dm_xe_objects where name like ''%pvs%''

    select * from sys.dm_xe_objects where name like ''%ctr%''

    ```

    One of these that might be interesting is the `pvs_add_record` event. You could
    use this event along with an action `sql_text` to find out what queries are generating
    off-row versions.

    I have not done any testing using these Extended Events, so I cannot speak to
    the performance impact they may have on your application.

    Finally, for those who really want to go deep, there are several wait types listed
    in the `sys.dm_os_wait_stats` `DMV` which apply to `ADR`. You could monitor these
    to track execution of activities like cleanup. Use the following `T-SQL` statement
    to find these wait types:

    ```sql

    select * from sys.dm_os_wait_stats

    where wait_type like ''%pvs%'' or wait_type like ''%ctr%''

    ```


    #### 是否应该使用 ADR？


    If you don’t have long-running transactions, `ADR` will likely not help you and
    may negatively impact your application. If your application generates a lot of
    off-row versions, the impact may be too high to see the benefit of `ADR`. Keep
    in mind, though, that this could still be of big benefit for failover scenarios,
    such as with Always On Availability Groups.

    My recommendation is to find a way to test this with your application. We didn’t
    make this the default (yet) for SQL Server 2019, because there are too many types
    of workloads out there, and not all – as I’ve discussed in this chapter – will
    see a benefit. But keep these final thoughts in mind:

    *   This is one of those features you may not know you need now but when you need
    it… you need it. You may not be able to predict when a long-running recovery is
    going to bring your business down. Wouldn’t it be nice to have this enabled so
    that just doesn’t happen?

    *   Most workloads are not like `TPC-C` which are really, really write-intensive.
    Our testing results with a more balanced read/write workload like `TPC-E` did
    not show a huge impact.

    *   Consider this quote from the engineering team in the `CTR` paper as they used
    a “cloud-first” approach to roll out this capability first in Azure, “…`CTR` has
    already been enabled in five regions and approximately one million databases with
    very promising results.”


    ### 总结


    Ensuring your data and application are available is an important aspect of any
    respectable data platform product. SQL Server 2019 continues to enhance core availability
    functionality like resumable online indexing and Availability Groups. Furthermore,
    SQL Server 2019 brings to the industry a very innovative approach to solving downtime
    due to long-running active transactions with Accelerated Database Recovery.


    # 5. 现代开发平台


    Just about any developer needs data, and a product like SQL Server has the capabilities,
    languages, drivers, and platforms you need. A modern data developer needs a database
    platform to meet the challenges of today’s applications. SQL Server 2019 meets
    these challenges with the following capabilities:

    *   Support for a wide variety of languages and drivers across multiple operating
    system platforms such as Windows, macOS, and Linux with compatibility. Editions
    of SQL Server provide a common surface area to minimize application logic.

    *   Graph databases integrated with SQL Server allow developers to implement data
    models, such as social networks, without an additional product – and query against
    it using a familiar language like `T-SQL`.

    *   Developers need the ability to build applications to handle Unicode data using
    encoding systems widely used across the industry. SQL Server 2019 supports `UTF-8`
    encoding through new collations.

    *   Developers need a database platform to support new types of applications integrating
    Machine Learning that are scalable, secure, and integrated with the database.
    SQL Server Machine Learning Services includes new enhancements in SQL Server 2019.

    *   The `T-SQL` language provides many capabilities, but developers may need more.
    They want the ability to extend the `T-SQL` language integrated with the database.
    SQL Server Language Extensions in SQL Server 2019 allow developers to install
    and use new languages such as `Java` integrated with SQL Server data.'
