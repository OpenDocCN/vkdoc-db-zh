  trans: '

    # 资源控制


    默认情况下，SQL Server 容器（如同所有容器）可以访问主机服务器上的所有 CPU 和内存资源。Docker 提供了一种方法来控制和管理任何容器对这些资源的访问。例如，`docker
    run` 命令提供了以下选项：


    `-m` – 控制容器可访问的内存量。


    `-cpuset-cpus` – 控制容器内的线程可以在哪些 CPU 上运行。使用此选项时请务必小心。SQL Server 不会基于此选项限制调度器的数量。但是，Docker（使用
    cgroups）将强制规定所有 SQL Server 线程在哪些 CPU 上运行。如果您使用此选项，我建议结合使用 SQL Server 亲和性配置 `ALTER
    SERVER CONFIGURATION`。


    您可以在 [`https://docs.docker.com/config/containers/resource_constraints/`](https://docs.docker.com/config/containers/resource_constraints/)
    阅读更多关于 Docker 容器资源使用的内容。


    虽然这些选项确实有效，但对于 SQL Server，我建议您使用 SQL Server 配置的内置功能来控制内存和 CPU 资源。


    例如，考虑以下您可用的选项：


    `memorylimitmb` – 此选项控制在 Linux 上暴露给 SQL Server 使用的物理内存量。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit)
    阅读更多关于此选项的内容。


    `"max server memory"` – 此 `sp_configure` 选项对于 SQL Server 用户非常熟悉，用于控制 SQL Server
    引擎在 `memorylimitmb` 空间内使用的内存量。


    `ALTER SERVER CONFIGURATION` – 此 T-SQL 命令允许您设置 SQL Server 将运行于哪些 NUMA 节点和/或 CPU
    的亲和性。您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql)
    阅读更多关于此选项的内容。


    `Resource Governor` – 资源调控器有助于控制 CPU、内存和 I/O 资源，特别是在应用程序或工作负载级别。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor)
    阅读更多关于资源调控器的内容。


    公平地说，并非在 Linux 上运行于 `sqlservr` 中（使用 SQLPAL）的所有内容都受这些 T-SQL 选项控制。由 SQL Agent、DTC、Polybase
    或运行在 SQLPAL 内的、位于 SQL 引擎之外的其他代码进行的处理，在作为容器运行时可能需要一些资源控制，如果您有需要，本节列出的 Docker 选项可能会有用。然而，绝大多数的
    CPU 和内存消耗来自数据库引擎，而 SQL 提供了相应的选项让您能实现所需的控制。


    # 服务器或数据库配置


    在本节中，我列出了几个您可能需要考虑的 SQL Server 配置选项。此外，`mssql-conf` 脚本、T-SQL `sp_configure` 和
    `ALTER SERVER CONFIGURATION` 还提供了许多其他选项。此外，数据库在创建时或通过 `ALTER DATABASE` 还有许多其他配置选项。


    虽然可以使用 T-SQL 语句修改正在运行的 SQL Server 容器，但在使用容器时，您应仔细考虑这是否是正确的策略。例如，如果您对需要重启的容器应用了
    `sp_configure` 更改，您将必须重启容器才能使更改生效。此外，您需要确保为系统数据库使用持久化卷，这样您的更改才不会丢失。


    另一个选项是构建一个自定义镜像（就像本章中为复制示例展示的容器那样），在 SQL Server 启动后运行您所需的任何配置脚本。


    例如，假设您希望确保您的 SQL Server 对环境中的任何 SQL Server 容器强制执行特定的 `max degree of parallelism`
    值。一种方法是构建一个自定义容器镜像，其中包含一个设置所需 `maxdop` 值的脚本。您甚至可以为此打标签和命名，以便您知道为某个 SQL 容器使用的选项。现在，这些用于构建容器的脚本以及
    T-SQL 脚本可以成为您的变更控制和 CI/CD 生命周期的一部分。


    这种方法唯一的缺点是针对那些不需要重启 SQL Server 实例（或数据库实例）的配置更改。对于这些情况，您仍然可以构建一个包含新所需配置更改的特定容器镜像，但也可以直接将配置更改应用到正在运行的
    SQL Server。


    另一个有趣的问题是应用需要重启的配置更改（这种情况比您想象的要少）。然而，如果您确实遇到这种情况，您将必须在应用配置更改并启动容器后立即重启它。


    对于任何 `mssql-conf` 更改，您应使用与您想要设置匹配的环境变量，正如本章中 `docker run` 示例所示。一个使用此选项进行 DTC 配置的绝佳示例可以在
    [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)
    找到。如果由于某种原因，某个 `mssql-conf` 设置没有对应的等效环境变量设置，您可以创建一个包含预先创建的 `mssql.conf` 文件的自定义镜像。您可以使用如下的
    Dockerfile：


    ```

    FROM microsoft/mssql-server-linux:latest

    COPY ./mssql.conf /

    RUN mkdir /var/opt/mssql

    RUN mv ./mssql.conf /var/opt/mssql

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    其中您的 `mssql.conf` 文件包含了所有需要的配置值。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format)
    了解此文件的协议格式。


    # 使用其他包


    我已经告诉过您，SQL Server 容器镜像包含数据库引擎、SQL Server Agent，并包含复制和 DTC 等功能。Linux 上的 SQL Server
    是基于包的概念构建的。像 Polybase 这样的功能不包含在标准的 SQL Server 包中，也不在 SQL Server 容器镜像中。


    我们为您构建了一系列示例，指导您如何基于 SQL Server 镜像构建自己的自定义镜像，添加您希望在容器中包含的包。您可以在 [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples)
    找到这些示例。

    '
- fmt: '### Editions and Licensing


    By default, when you pull and run a SQL Server container image as I’ve shown you
    in this chapter, we automatically assume the Developer Edition of SQL Server.
    As you may know, the Developer Edition is not supported for production use.


    Therefore, when running a SQL Server container, you can use the `MSSQL_PID` environment
    variable to indicate the edition of SQL Server. You can read more about using
    this option at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker#production`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker%2523production).


    One of the most common questions I have received about containers is how containers
    are licensed.


    With the release of SQL Server 2017, we modified our licensing guide to include
    a discussion on containers. You can download the guide from [`www.microsoft.com/en-us/sql-server/sql-server-2017-pricing`](https://www.microsoft.com/en-us/sql-server/sql-server-2017-pricing).
    Look specifically in the section "`Licensing SQL Server 2017 in Containers`" (there
    will be a new guide for SQL Server 2019 when it is released). Licensing for containers
    works similar to virtual machines. For many users, the full core licensing model
    applies. One interesting exception you should read is that customers with Software
    Assurance (SA) along with Enterprise Edition get a benefit. According to the guide,
    “…With the addition of Software Assurance (SA) coverage on all Enterprise Edition
    core licenses (for a fully licensed server), customers’ use rights are expanded
    to allow any number of containers to run on the licensed server. This valuable
    SA benefit enables customers to deploy an unlimited number of containers to handle
    dynamic workloads and fully utilize hardware computing capacity.”


    ## SQL Server Windows Containers


    All the discussion around containers in the chapter to this point is a discussion
    of SQL Server containers based on Linux images. You have seen that these containers
    can run on any platform including Linux, Windows, and macOS.


    However, the Windows team has built the capability of running containers natively
    in Windows based on Windows images. We announced in the summer of 2019 a private
    preview program to support SQL Server containers based on Windows images.


    Many of the same concepts will apply to just about everything I’ve discussed in
    this chapter. A lot of that is due in part to the great compatibility story of
    SQL Server on Windows and Linux. The key differences will be in certain aspects
    that are different from Windows and Linux, such as configuration for Active Directory.
    Furthermore, when you want to interact directly with the container, you typically
    will use PowerShell or the command shell.


    Windows supports the same concepts as in Linux to make containers a compelling
    story including isolation through namespaces. You can read more about Windows
    containers’ work at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/).


    Windows offers an option with containers that is slightly different than Linux.
    Containers can run in two isolation modes:


    `Process isolation` – Containers run as isolated processes using namespaces.


    `Hyper-V isolation` – Containers run in a “special” virtual machine (that is the
    term the docs use, not mine).


    You can read more about these isolation models at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container).


    On Docker for Desktop for Windows, you can only run **either** Windows containers
    or Linux containers. (Note: this should change when Docker for WSL2 is available
    to use. You can read more about this at [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/).)


    By default, Docker for Desktop supports Linux containers. To switch to use Windows
    Containers, select the option from the docker icon in the Windows tray as seen
    in Figure [7-8](#479130_1_En_7_Chapter.xhtml#Fig8).


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig8_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Switching to Windows containers with Docker Desktop


    Hyper-V and process isolation are supported for Windows containers on latest builds
    of Windows 10 and Windows Server 2019. You can read more about Windows containers
    on Windows Server 2019 at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server).
    I also encourage you to read the FAQ on Windows containers at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq).


    In addition, Windows Server 2019 supports Linux Containers on Windows (LCOW) which
    supports Linux containers using Hyper-V isolation. You can read more about LCOW
    at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers).
    This makes Windows Server just about the only platform to run both Windows and
    Linux containers simultaneously (you could run Windows containers by installing
    a Windows VM on macOS, but Windows Server is the only one to “natively” support
    these scenarios).


    I tried Windows containers in its early form for private preview on a Windows
    Server 2019 system.


    Here is an example syntax for a `docker run` command for both Hyper-V and process
    isolation for a SQL Server Windows container:


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1401:1433
    --isolation=process -d -e ''MSSQL_PID=Developer'' --name sql1 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

    docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1402:1433
    --isolation=hyperv -d -e ''MSSQL_PID=Developer'' --name sql2 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

    ```


    You can see the syntax is almost exactly the same as with Linux containers. Notice
    the syntax for the `--isolation` parameter.


    I used the famous sysinternals tool Process Explorer ([`https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer`](https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer))
    to see what the `sqlservr` program looks like for process isolation. You can see
    in Figure [7-9](#479130_1_En_7_Chapter.xhtml#Fig9), similar to the docker daemon,
    a program called `CExecSvc` is responsible for forking the `sqlservr` container
    program.


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig9_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    A SQL Server Window container in process isolation


    There is not much documented about Hyper-V isolation except that the container
    programs are hosted in a Windows program called `vmwp.exe`.


    My hope is that by the time you read this book, we will have progressed our work
    with SQL Server Windows containers as many customers I believe want the promise
    of containers but for several different reasons do not or cannot use containers
    based on Linux. I personally believe if LCOW containers can perform well, then
    many customers may end up with a mixed environment of both Windows and Linux containers
    on their Windows Server.'
