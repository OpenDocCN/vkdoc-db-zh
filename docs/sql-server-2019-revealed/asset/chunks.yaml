    that was a secondary replica.


    You can read all the details of how to set up primary connection redirection for
    SQL Server and your application in the documentation at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups)
    .


    ## Accelerated Database Recovery


    One of the aspects of my job at Microsoft I still find very exciting is to learn
    about new innovations that start as projects and then see them make it into a
    new feature of a released product, sometimes years later.


    As an example, I remember seeing in 2016 when I joined engineering about a project
    called constant time recovery (CTR). I remember taking some time to see what this
    project was about, because I saw the name of my long-time colleague Peter Byrne
    involved in the project. CTR has become Accelerated Database Recovery (ADR) with
    SQL Server 2019 and Azure SQL Database.


    CTR actually started as a project in 2015 initiated by Hanuma Kodavalla, Distinguished
    Engineer at Microsoft. Hanuma recruited others to join a project including Peter
    Byrne, Panagiotis Antonopoulos, and Srikumar Rangarajan, among others. The project
    was trying to attack one very large problem with SQL Server: *long-running transactions*.
    When these engineers finished the work, they decided to write a paper on the concept.
    As you read through the rest of this chapter and use the examples, consider also
    reading all the details of the paper for the CTR project at [`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)
    . I call this the **CTR Paper** and will refer to it that way for the rest of
    this chapter. I recommend you do what I did when I wrote this chapter. Bring up
    this paper and refer to it back and forth as you read the chapter and use the
    examples.'
