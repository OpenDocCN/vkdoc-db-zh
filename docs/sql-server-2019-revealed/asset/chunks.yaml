    ## 轻量级查询分析


    2016 年我加入 SQL Server 工程团队时，已在技术支持部门工作多年，处理过 SQL Server 客户遇到的一些最具挑战性的问题。其中，没有任何一类问题比性能问题更让我和
    CSS 部门的同事们感到棘手。SQL Server 的性能问题非常棘手——它们模糊不清、时间紧迫，而且你几乎总是在需要时无法获得所需的信息。


    SQL Server 提供了强大的性能问题诊断工具，包括`动态管理视图（DMVs）`和`扩展事件`。我们构建`DMVs`是为了提供一种出色的机制，让你能随时查看`正在运行的内容`。这是了解活动会话及其正在执行查询的好方法。但通常，要解决复杂的性能问题，你需要查询计划的详细信息。


    因此，差距在于深入分析。你可以看到正在运行的内容，但无法深入查看活动查询的查询计划。此外，如果你需要查找已完成查询的查询计划详情，就必须使用`扩展事件`这种可能`影响较大`的诊断方式。或者，你需要找到确切的查询，并在单独的工具中`离线`（即远离应用程序）运行它，并开启查询计划诊断来获取所有细节。


    加入工程团队后，我发现著名的老虎团队正在开展工作以解决这类问题。Pedro Lopes、Alexey Eksarevskiy 和 Jay Choe 已经在研究一个名为`查询分析基础设施`的项目。如果你问任何开发人员如何追踪代码，他们会使用`分析`这个术语。那么，在
    SQL Server 中如何分析查询呢？这通常归结为获取查询执行计划的详细信息。关键在于在查询运行时获取这些洞见，并在查询完成后获取实际的查询执行计划。


    这个团队已经建立了`实时查询统计信息`的概念。（你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics)阅读更多关于这个主题的内容。）按逻辑，他们可以做得更多。正如
    Alexey 所说，“我早在 2009 年就希望产品中能有这个功能……那时花了那么多时间盯着计划看，我真希望它们能‘活’过来，以便更容易看清发生了什么。于是有了实时查询统计信息的想法。这两者完美互补，尽管当然，轻量级分析允许做更多的事情。”


    事实上，团队已经构建了一个查询执行统计信息分析基础设施，即`标准分析`。此功能为你提供操作符级别的行数、`CPU`和`I/O`的实际执行计划统计信息。这是分析查询的关键信息，但有个问题。你必须在运行查询前启用此功能，或者为所有查询启用`扩展事件`，这可能会影响生产工作负载。你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#the-standard-query-execution-statistics-profiling-infrastructure`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523the-standard-query-execution-statistics-profiling-infrastructure)阅读更多关于标准分析的内容。


    我喜欢与 Pedro、Alexey 和 Jay 这样的同事一起工作。他们总是问，“我们能让这个变得更好吗？”当然，他们都非常聪明。他们从经验中知道使用标准分析可能有多么痛苦。他们创建了轻量级查询执行统计信息分析基础设施，即`轻量级分析`。其理念是在不需要标准分析所需开销的情况下获取查询分析。然而，为了使其“轻量”，我们不得不移除收集`CPU`统计信息的功能，因此你仍然可以获得“每个操作符”的行数和`I/O`统计信息。你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523lwp)阅读更多关于轻量级分析的内容。


    这很好，但是……你仍然需要`开启它`才能使其工作。你怎么知道何时启用轻量级分析呢？嗯，通常你不知道。没人知道。真正的答案就是让轻量级分析`默认运行`。而这正是
    SQL Server 2019 所提供的。Pedro 称之为，“随时随地获取性能洞见。”有陷阱吗？有。你只能从正在运行的查询中获取行数信息，但这通常足以帮助查看性能问题。但还有个额外好处。我们增加了为大多数缓存查询获取上一次实际执行计划的能力。


    让我们看两个场景，以便你理解在 SQL Server 2019 中默认启用轻量级查询分析的好处。


    ### 使用轻量级查询分析示例的先决条件


    首先，你需要进行一些设置来使用两个场景的示例。对于本章的示例，你将使用`WideWorldImporters`示例数据库（你可以在[`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)阅读更多关于该数据库及其架构的内容）。


    这些示例适用于 Windows、Linux 和容器上的 SQL Server 2019。鉴于数据集较大，SQL Server 至少需要 12Gb `RAM`才能正确观察到性能差异。此外，部分查询示例使用了并行处理，因此更推荐在多处理器系统上安装
    SQL Server。


    本章使用的所有脚本都可以在 GitHub 仓库的`ch2_intelligent_performance\lwp`目录下找到。


    要使用本章中的示例，你需要完成以下步骤：


    1.  从[`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)下载`WideWorldImporters`数据库备份。


    2.  将此数据库还原到你的 SQL Server 2019 实例。你可以使用提供的`restorewwi.sql`脚本。你可能需要更改备份文件位置和数据库文件还原目录的路径。


    3.  为了运行部分示例，你需要比`WideWorldImporters`默认安装更大的表。因此，运行脚本`extendwwi.sql`以创建更大的表。扩展此数据库将使其大小（包括事务日志）增加到总共约
    5Gb。其中一张表名为`Sales.InvoiceLinesExtended`。基于`InvoiceLines`表，我们将使这张表变得更大，并且不使用列存储索引。

    '
- fmt: "### Should I Kill an Active Query?\n\nConsider this scenario. You are told\
    \ SQL Server is being consumed by a query that is taking up a large amount of\
    \ CPU on the server. You use a DMV like `sys.dm_exec_requests` to identify the\
    \ query and the user. The user is your Vice President running a report, and the\
    \ query is based on a cached plan. You use the common DMVs called `sys.dm_exec_requests`\
    \ and `sys.dm_exec_query_stats` to see which query is running. How do you find\
    \ out whether this query will finish anytime soon or should be killed and corrected?\n\
    \nLet’s use the following example to see this behavior and how built-in, on by\
    \ default, Lightweight Query Profiling can help give you the answer.\n\nYou can\
    \ run these T-SQL scripts in any tool that can connect to SQL Server, but the\
    \ best experience is seeing all the details in SQL Server Management Studio (SSMS).\n\
    \n1.  Open the T-SQL script `mysmartquery.sql` (maybe a sign it is not so smart)\
    \ and execute the batch.\n2.  In a new connection, open up the T-SQL script `show_active_queries.sql`.\n\
    3.  Run the batch from **Step 1** in the script as follows:\n\n    ```\n    --\
    \ Step 1: Only show requests with active queries except for this one\n    SELECT\
    \ er.session_id, er.command, er.status, er.wait_type, er.cpu_time, er.logical_reads,\
    \ eqsx.query_plan, t.text\n    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
    \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
    \ <> @@SPID\n    GO\n    ```\n\n    This code finds any active queries (other\
    \ than the current connection). If you run this query over and over, you will\
    \ see `cpu` and `logical_reads` values increasing and a `wait_type` = `ASYNC_NETWORK_IO`.\
    \ This pattern indicates two things:\n    *   The query is chewing up a bunch\
    \ of CPU and likely scanning a big table (`logical_reads` high and increasing).\n\
    \    *   There are a great deal of results being sent back to the client (e.g.,\
    \ `ASYNC_NETWORK_IO` wait).\n\nIn my experience, this is not a “good” query and\
    \ is one where an opportunity to “tune” exists. But the question is, should you\
    \ kill it now, or is it “almost done”?\n\n![Query plan profile for an active query](images/479130_1_En_2_Chapter/479130_1_En_2_Fig21_HTML.jpg)\n\
    \nFigure 2-21: Query plan profile for an active query\n\n1.  What would be nice\
    \ to know as the query is active is to see the progress of query plan operators\
    \ (like Live Query Statistics). Run **Step 2** from the script as follows:\n\n\
    \    ```\n    -- Step 2: What does the plan profile look like for the active query\n\
    \    SELECT session_id, physical_operator_name, node_id, thread_id, row_count,\
    \ estimate_row_count\n    FROM sys.dm_exec_query_profiles\n    WHERE session_id\
    \ <> @@SPID\n    ORDER BY session_id, node_id DESC\n    GO\n    ```\n\n    The\
    \ results should look something like Figure [2-21](#479130_1_En_2_Chapter.xhtml#Fig21).\n\
    \nNotice the huge `estimate_row_count` for the Nested Loops and Table Spool operators.\
    \ And notice the `row_count` (this is the number of rows currently processed)\
    \ is far short of the estimate. It could be the estimate is inaccurate, but, if\
    \ it is right, this query is far from completing. Run this query again to see\
    \ the progression of the `row_count` for these operators.\n\n### Note\n\nWhen\
    \ lightweight query profiling is on by default in SQL Server 2019, `row_count`\
    \ is the only statistics captured. It can be expensive to capture statistics like\
    \ CPU and I/O by default. You can capture these with standard profiling.\n\n![Query\
    \ plan of active query](images/479130_1_En_2_Chapter/479130_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22: Query plan of active query\n\n1.  Let’s look at the query plan\
    \ itself. This is the estimated plan, but it might give a clue on these really\
    \ large estimate row counts. Run **Step 3** in the script as follows:\n\n    ```\n\
    \    -- Step 3: Go back and look at the plan and query text for a clue\n    SELECT\
    \ er.session_id, er.command, er.status, er.wait_type, er.cpu_time, er.logical_reads,\
    \ eqsx.query_plan, t.text\n    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
    \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
    \ <> @@SPID\n    GO\n    ```\n\n    In SSMS, click the `query_plan` value, which\
    \ should open up a new window with a visual query plan.\n    The plan should look\
    \ similar to Figure [2-22](#479130_1_En_2_Chapter.xhtml#Fig22).\n\nNotice the\
    \ icon symbol with an **X** on the Nested Loops Join. If you move your mouse pointer\
    \ over the Nested Loops Join operator, it will look like Figure [2-23](#479130_1_En_2_Chapter.xhtml#Fig23).\n\
    \n![Nested Loops Join warning](images/479130_1_En_2_Chapter/479130_1_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23: Nested Loops Join warning\n\nWhat does “No Join Predicate” mean?\
    \ It means there is a major problem with the JOIN operator in the query. It means\
    \ there really is no “equi” join.\n\nIn the **Step 3** results, look at the value\
    \ of the `text` column of the diagnostics. It looks like this:\n\n```\nSELECT\
    \ si.CustomerID, sil.InvoiceID, sil.LineProfit\nFROM Sales.Invoices si\nINNER\
    \ JOIN Sales.InvoiceLines sil\nON si.InvoiceID = si.InvoiceID\nOPTION (MAXDOP\
    \ 1)\n```\n\nSince the JOIN operator has a problem, let’s focus on the INNER JOIN\
    \ clause:\n\n```\nINNER JOIN Sales.InvoiceLines sil\nON si.InvoiceID = si.InvoiceID\n\
    ```\n\nYou will see that this query simply joins a table to itself. A simple typo\
    \ of `si` vs. `sil` is the problem. This query will almost never finish. It can\
    \ be killed or fixed, and your Vice President will be much happier.\n\n1.  Cancel\
    \ the query from `mysmartquery.sql` if it is still running.\n\nLightweight query\
    \ profiling also includes extended events and query hint support to enable it.\
    \ You can read more about how to enable these, plus how to disable the feature\
    \ per database, at `https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`."
