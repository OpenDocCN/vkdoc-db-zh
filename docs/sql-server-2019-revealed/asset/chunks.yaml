    to other tables like ones for Query Store. This system table has the version data
    and metadata to link it back to the actual row in the page of a table.


    If you are concerned whether your application is generating a lot of off-row versions,
    there are performance counters and extended events you can use which I describe
    in the next section called Tracking ADR.


    ### Note


    At the time I wrote this chapter, the off-row PVS is stored in the PRIMARY filegroup
    of your database, and there is no choice on this. The engineering team was discussing
    whether they could add an option to move the off-row PVS to another filegroup
    chosen by the user through ALTER DATABASE. Consult the documentation for ALTER
    DATABASE to see if this enhancement made its way into the final SQL Server 2019
    release.


    Another unexpected situation is called *short-transaction optimization*. This
    situation is a good thing. It doesn’t make sense to use PVS when transactions
    are very short in nature. Therefore, when testing ADR, don’t expect a transaction
    that deletes a few rows to use ADR. If you are examining the log with fn_dblog(),
    you can see transactions where ADR will not apply with the following Operation
    and Context, LOP_FORGET_XACT and LCX_XACT_DOES_NOT_SUPPORT_CTR.


    #### Tracking ADR


    Like many new features of SQL Server, the ADR team has wait types, Extended Events,
    and performance monitor counters to track the execution of ADR, the use of the
    Persisted Version Store (PVS), and cleanup processing.


    Figure [4-5](#479130_1_En_4_Chapter.xhtml#Fig5) shows some of the performance
    counters available to track the use of the Persisted Version Store (PVS), including
    tracking how many off-row versions are being generated.


    ![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    PVS performance counters


    There are several Extended Events that can also be used to track specific generation
    of versions and for cleanup tasks. You can find all of these events by executing
    the following queries against the XE Dynamic Management Views:


    ```

    select * from sys.dm_xe_objects where name like ''%pvs%''

    select * from sys.dm_xe_objects where name like ''%ctr%''

    ```


    One of these that might be interesting is the **pvs_add_record** event. You could
    use this event along with an action sql_text to find out what queries are generating
    off-row versions.


    ### Note


    I have not done any testing using these Extended Events, so I cannot speak to
    the performance impact they may have on your application.


    Finally, for those who really want to go deep, there are several wait types listed
    in the sys.dm_os_wait_stats DMV which apply to ADR. You could monitor these to
    track execution of activities like cleanup. Use the following T-SQL statement
    to find these wait types:


    ```

    select * from sys.dm_os_wait_stats

    where wait_type like ''%pvs%'' or wait_type like ''%ctr%''

    ```


    #### Should I Use ADR?


    If you don’t have long-running transactions, ADR will likely not help you and
    may negatively impact your application. If your application generates a lot of
    off-row versions, the impact may be too high to see the benefit of ADR. Keep in
    mind, though, that this could still be of big benefit for failover scenarios,
    such as with Always On Availability Groups.


    My recommendation is to find a way to test this with your application. We didn’t
    make this the default (yet) for SQL Server 2019, because there are too many types
    of workloads out there, and not all – as I’ve discussed in this chapter – will
    see a benefit. But keep these final thoughts in mind:


    *   This is one of those features you may not know you need now but when you need
    it… you need it. You may not be able to predict when a long-running recovery is
    going to bring your business down. Wouldn’t it be nice to have this enabled so
    that just doesn’t happen?


    *   Most workloads are not like TPC-C which are really, really write-intensive.
    Our testing results with a more balanced read/write workload like TPC-E did not
    show a huge impact.


    *   Consider this quote from the engineering team in the CTR paper as they used
    a “cloud-first” approach to roll out this capability first in Azure, “…CTR has
    already been enabled in five regions and approximately one million databases with
    very promising results.”


    ## Summary


    Ensuring your data and application are available is an important aspect of any
    respectable data platform product. SQL Server 2019 continues to enhance core availability
    functionality like resumable online indexing and Availability Groups. Furthermore,
    SQL Server 2019 brings to the industry a very innovative approach to solving downtime
    due to long-running active transactions with Accelerated Database Recovery.


    # 5. Modern Development Platform


    Just about any developer needs data, and a product like SQL Server has the capabilities,
    languages, drivers, and platforms you need. A *modern* data developer needs a
    database platform to meet the challenges of today’s applications. SQL Server 2019
    meets these challenges with the following capabilities:


    *   Support for a **wide variety of languages and drivers** across **multiple
    operating system platforms** such as Windows, macOS, and Linux with compatibility.
    Editions of SQL Server provide a common surface area to minimize application logic.


    *   **Graph databases** integrated with SQL Server allow developers to implement
    data models, such as social networks, without an additional product – and query
    against it using a familiar language like T-SQL.


    *   Developers need the ability to build applications to handle Unicode data using
    encoding systems widely used across the industry. SQL Server 2019 supports **UTF-8**
    encoding through new collations.


    *   Developers need a database platform to support new types of applications integrating
    Machine Learning that are scalable, secure, and integrated with the database.
    **SQL Server Machine Learning Services** includes new enhancements in SQL Server
    2019.


    *   The T-SQL language provides many capabilities, but developers may need more.
    They want the ability to extend the T-SQL language integrated with the database.
    **SQL Server Language Extensions** in SQL Server 2019 allow developers to install
    and use new languages such as **Java** integrated with SQL Server data.'
  trans: '

    ### ADR 性能测试说明


    这些测试结果都不意味着，当你为自己的数据库启用 ADR 时，会看到这些完全相同的数字或任何性能影响。这是因为这些测试使用的是特定类型工作负载的基准测试，它们可能与你的应用程序匹配，也可能不匹配。你需要找到一种标准方法，在启用和不启用
    ADR 的情况下测试你的应用程序性能，才能了解真正的性能影响。

    请仔细查看论文第 4 节的所有结果，因为它还展示了团队在 Azure 中观察到的一些惊人的恢复时间结果（你已经看到了一个简单数据库的可能影响）。

    加速数据库恢复的另一个主要好处是，Always On 可用性组的故障转移时间可以更快，并且对于副本上的只读查询存在一个更好的版本方案。


    #### 意外场景


    在某些情况下，持久化版本存储 (`PVS`) 无法存储在行内，因为它不适合页面。在这种情况下，版本存储在一个内部系统表中。这些被称为“行外”场景。可以想象，当
    `PVS` 存储在行外时，这并非理想情况。因此，如果可能，应避免这些场景。

    行外版本主要发生在对当前行的版本进行重大修改时。如果一个更新非常显著，以至于在行内存储版本不可行或不合理；该版本将作为一个行外版本存储在内部系统表中。我在一个启用了
    `ADR` 的数据库中做了一些探查，发现 `PVS` 保存在每个数据库中一个名为 `persistent_version_store` 的表中。该表被标记为
    `INTERNAL_TABLE` 类型，类似于查询存储等其他表。这个系统表包含版本数据和元数据，用于将其链接回表中页面的实际行。

    如果你担心你的应用程序是否生成了大量行外版本，有一些性能计数器和扩展事件可以使用，我将在下一节“追踪 `ADR`”中描述。


    #### 文件组与优化说明


    在我撰写本章时，行外 `PVS` 存储在你数据库的 `PRIMARY` 文件组中，并且无法选择其他文件组。工程团队当时正在讨论是否可以通过 `ALTER DATABASE`
    添加一个选项，让用户选择将行外 `PVS` 移动到另一个文件组。请查阅 `ALTER DATABASE` 的文档，看看这项增强功能是否已包含在最终的 SQL
    Server 2019 版本中。

    另一个意外情况称为短事务优化。这种情况是件好事。当事务本质上非常短时，使用 `PVS` 没有意义。因此，在测试 `ADR` 时，不要期望一个只删除几行的事务会使用
    `ADR`。如果你使用 `fn_dblog()` 检查日志，你可以通过以下操作和上下文 `LOP_FORGET_XACT` 和 `LCX_XACT_DOES_NOT_SUPPORT_CTR`
    看到哪些事务不会应用 `ADR`。


    #### 追踪 ADR


    与 SQL Server 的许多新功能一样，`ADR` 团队提供了等待类型、扩展事件和性能监视计数器来跟踪 `ADR` 的执行、持久化版本存储 (`PVS`)
    的使用以及清理处理过程。

    图 4-5 显示了一些可用于跟踪持久化版本存储 (`PVS`) 使用情况的性能计数器，包括跟踪生成了多少行外版本。

    ![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg](img/479130_1_En_4_Fig5_HTML.jpg)

    图 4-5 `PVS` 性能计数器

    还有几个扩展事件也可用于跟踪特定版本的生成和清理任务。你可以通过针对 `XE` 动态管理视图执行以下查询来找到所有这些事件：

    ```sql

    select * from sys.dm_xe_objects where name like ''%pvs%''

    select * from sys.dm_xe_objects where name like ''%ctr%''

    ```

    其中一个可能有趣的事件是 `pvs_add_record` 事件。你可以将此事件与一个 `sql_text` 操作结合使用，以找出哪些查询正在生成行外版本。

    我尚未使用这些扩展事件进行任何测试，因此无法说明它们可能对你的应用程序产生的性能影响。

    最后，对于那些真正想深入了解的人，`sys.dm_os_wait_stats` `DMV` 中列出了几个适用于 `ADR` 的等待类型。你可以监控这些等待类型来跟踪清理等活动的执行情况。使用以下
    `T-SQL` 语句查找这些等待类型：

    ```sql

    select * from sys.dm_os_wait_stats

    where wait_type like ''%pvs%'' or wait_type like ''%ctr%''

    ```


    #### 是否应该使用 ADR？


    如果你没有长时间运行的事务，`ADR` 可能对你帮助不大，甚至可能对你的应用程序产生负面影响。如果你的应用程序生成大量行外版本，其影响可能过高，以至于看不到
    `ADR` 的好处。不过请记住，对于故障转移场景（例如 Always On 可用性组），这仍然可能带来巨大益处。

    我的建议是找到一种方法用你的应用程序进行测试。我们没有在 SQL Server 2019 中（暂时）将其设为默认，因为存在太多类型的工作负载，正如我在本章所讨论的，并非所有工作负载都能看到好处。但请牢记这些最终思考：

    *   这是那种你现在可能不知道自己需要，但当你需要它时……你确实需要它的功能之一。你可能无法预测何时一次长时间运行的恢复会导致你的业务中断。如果启用了这个功能，让这种情况根本不会发生，岂不是很好？

    *   大多数工作负载不像 `TPC-C` 那样是真正、极其写密集型的。我们使用像 `TPC-E` 这样更均衡的读/写工作负载进行的测试结果并未显示出巨大影响。

    *   考虑一下工程团队在 `CTR` 论文中引用的这句话，他们采用“云优先”方法首先在 Azure 中推出此功能：“……`CTR` 已经在五个区域启用，涉及大约一百万个数据库，结果非常有希望。”


    ### 总结


    确保你的数据和应用程序可用是任何值得信赖的数据平台产品的重要方面。SQL Server 2019 持续增强核心可用性功能，例如可恢复的联机索引创建和可用性组。此外，SQL
    Server 2019 为业界带来了一种非常创新的方法，通过加速数据库恢复来解决因长时间运行的活动事务导致的停机问题。


    # 5. 现代开发平台


    几乎任何开发者都需要数据，而像 SQL Server 这样的产品具备你所需的能力、语言、驱动程序和平台。现代数据开发者需要一个数据库平台来应对当今应用程序的挑战。SQL
    Server 2019 通过以下功能迎接这些挑战：

    *   支持跨多种操作系统平台（如 Windows、macOS 和 Linux）的多种语言和驱动程序，并具有兼容性。SQL Server 各版本提供公共的应用程序接口区域，以最小化应用程序逻辑。

    *   与 SQL Server 集成的图数据库允许开发人员实现诸如社交网络等数据模型，而无需额外产品——并使用熟悉的语言（如 `T-SQL`）进行查询。

    *   开发人员需要能够构建应用程序，使用业界广泛使用的编码系统处理 Unicode 数据。SQL Server 2019 通过新的排序规则支持 `UTF-8`
    编码。

    *   开发人员需要一个数据库平台来支持整合了机器学习的新型应用程序，这些应用程序应可扩展、安全且与数据库集成。SQL Server 机器学习服务在 SQL
    Server 2019 中包含了新的增强功能。

    *   `T-SQL` 语言提供了许多功能，但开发人员可能需要更多。他们希望能够扩展与数据库集成的 `T-SQL` 语言。SQL Server 2019 中的
    SQL Server 语言扩展允许开发人员安装和使用与 SQL Server 数据集成的新语言，例如 `Java`。

