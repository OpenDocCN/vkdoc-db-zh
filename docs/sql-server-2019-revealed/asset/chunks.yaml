  trans: '### 使用加速数据库恢复


    正如您从刚刚完成的示例中所见，使用加速数据库恢复无需进行任何应用程序更改。您只需使用以下 T-SQL 语句启用 ADR，即可开始运行：


    ```

    ALTER DATABASE  SET ACCELERATED_DATABASE_RECOVERY = ON

    ```


    让我们通过两个示例来了解：

    *   回滚现在执行的速度有多快，以及事务日志是如何被积极截断的

    *   恢复完成的速度有多快，让您可以快速访问数据库


    运行这些示例所需的一切都可以在每个示例的笔记本和脚本中找到。


    #### 快速回滚与积极的日志截断


    使用以下示例，您可以查看使用 ADR 执行回滚的速度有多快，以及事务日志现在被截断得多么积极，从而避免过度的日志增长场景。在此示例中，我们将比较启用和不启用
    ADR 时回滚的速度以及事务日志的增长情况。


    您可以使用 `ch4_mission_critical_availability\adr` 目录中的 T-SQL 脚本 `adr.sql` 来运行此示例。


    我建议在此情况下使用 `ch4_mission_critical_availability\adr` 目录中的 T-SQL 笔记本 `adr.ipynb`。该笔记本包含创建数据库、创建表和插入数据的所有说明。然后，在禁用
    ADR 的情况下，您将在一个事务中删除表中的所有行。接着，您将检查已使用但即使在检查点之后也无法截断的日志空间量。然后，您将观察回滚整个删除操作的速度（更准确地说，是缺乏速度）。


    之后，在笔记本中，您将重复这些步骤，但这次启用 ADR。T-SQL 脚本包含所有相同的步骤。完成此示例后，让我们做一些更高级的操作。让我们使用相同的 T-SQL
    示例，但增加更多行，以查看恢复操作的影响。


    #### 加速恢复


    为了展示恢复速度有多快，您必须创建一个示例，其中恢复的撤销阶段需要尝试回滚大量修改或事务。


    那么，如何创建一个 SQL Server 必须对某个事务运行撤销阶段的场景呢？为此，您需要构造一个场景，使得一个活动事务在 SQL Server 关闭前既未被回滚也未被提交。有三种方法可以实现这一点：

    *   执行 T-SQL 语句 `SHUTDOWN WITH NOWAIT`。

    *   关闭 SQL Server 服务（例如，`net stop mssqlserver`）。

    *   终止 `SQLSERVR.EXE` 进程（在 Windows 上，使用任务管理器的“结束任务”）。


    这些技术中的任何一种都会在不影响活动事务的情况下停止 SQL Server。还有一个额外的考虑因素。为了让 SQL Server 回滚活动事务，“必须有可回滚的内容”。如果受活动事务影响的数据库页从未被刷写到磁盘，那么当
    SQL Server 运行恢复时，它无法“撤销”从未存在的东西。因此，当使用这些方法之一时，您应该对数据库执行一次 `CHECKPOINT`（正常关闭 SQL
    Server 服务确实会对所有数据库运行检查点）。请注意，恢复编写器或延迟编写器可能已经刷写了这些页面，但这对于演示来说是不可靠的。'
- fmt: "### Tip\n\nWhat if you wanted to force redo? It is a bit of the opposite approach.\
    \ You have to have a committed transaction, but the pages affected by the transaction\
    \ cannot be flushed to disk. Run a transaction similar to the examples found in\
    \ this chapter but commit the transaction. Then “crash” the server, but you must\
    \ do this without a checkpoint, so use the “End Task” method.\n\nArmed with this\
    \ knowledge, you can go through the T-SQL script `adr_recovery.sql` or the T-SQL\
    \ notebook `adr_recovery.ipynb` as found in the `ch4_mission_critical_availability\\\
    adr` directory. I recommend using the notebook, as it has documentation explaining\
    \ each step with guidance on when to “crash” SQL server.\n\nYou will want to examine\
    \ the `ERRORLOG` when going through the steps of the notebook or script. I have\
    \ examples here for what you should see when recovery runs without and with ADR\
    \ enabled.\n\nHere is an example `ERRORLOG` when ADR is not enabled.\n\n```\n\
    spid25s     Recovery of database 'gocowboys' (6) is 2% complete (approximately\
    \ 697 seconds remain). Phase 2 of 3\\. This is an informational message only.\
    \ No user action is required.\nspid25s     Recovery of database 'gocowboys' (6)\
    \ is 5% complete (approximately 682 seconds remain). Phase 2 of 3\\. This is an\
    \ informational message only. No user action is required.\nspid25s     Recovery\
    \ of database 'gocowboys' (6) is 7% complete (approximately 667 seconds remain).\
    \ Phase 2 of 3\\. This is an informational message only. No user action is required.\n\
    spid25s     Recovery of database 'gocowboys' (6) is 7% complete (approximately\
    \ 667 seconds remain). Phase 3 of 3\\. This is an informational message only.\
    \ No user action is required.\nspid8s      Recovery of database 'gocowboys' (6)\
    \ is 40% complete (approximately 113 seconds remain). Phase 3 of 3\\. This is\
    \ an informational message only. No user action is required.\nspid8s      Recovery\
    \ of database 'gocowboys' (6) is 50% complete (approximately 94 seconds remain).\
    \ Phase 3 of 3\\. This is an informational message only. No user action is required.\n\
    spid8s      Recovery of database 'gocowboys' (6) is 59% complete (approximately\
    \ 79 seconds remain). Phase 3 of 3\\. This is an informational message only. No\
    \ user action is required.\nspid8s      Recovery of database 'gocowboys' (6) is\
    \ 68% complete (approximately 65 seconds remain). Phase 3 of 3\\. This is an informational\
    \ message only. No user action is required.\nspid8s      Recovery of database\
    \ 'gocowboys' (6) is 76% complete (approximately 48 seconds remain). Phase 3 of\
    \ 3\\. This is an informational message only. No user action is required.\nspid8s\
    \      Recovery of database 'gocowboys' (6) is 84% complete (approximately 32\
    \ seconds remain). Phase 3 of 3\\. This is an informational message only. No user\
    \ action is required.\nspid8s      Recovery of database 'gocowboys' (6) is 93%\
    \ complete (approximately 15 seconds remain). Phase 3 of 3\\. This is an informational\
    \ message only. No user action is required.\nspid8s      1 transactions rolled\
    \ back in database 'gocowboys' (6:0). This is an informational message only. No\
    \ user action is required.\nspid8s      Recovery is writing a checkpoint in database\
    \ 'gocowboys' (6). This is an informational message only. No user action is required.\n\
    spid8s      Recovery completed for database gocowboys (database ID 6) in 211 second(s)\
    \ (analysis 15 ms, redo 56340 ms, undo 154549 ms.) This is an informational message\
    \ only. No user action is required.\n```\n\n### Note\n\nThe redo is needed here\
    \ for some system transactions involved with index statistics for this example.\n\
    \nHere is the `ERRORLOG` when ADR is enabled. Recovery when ADR is enabled happens\
    \ so fast; SQL Server doesn’t even bother writing how long recovery took!\n\n\
    ```\nspid25s     1 transactions rolled back in database 'gocowboys' (6:0). This\
    \ is an informational message only. No user action is required.\nspid25s     Recovery\
    \ is writing a checkpoint in database 'gocowboys' (6). This is an informational\
    \ message only. No user  required.\n```\n\n### Accelerate Database Recovery Nuts\
    \ and Bolts\n\nThis all sounds too good to be true, and I’m sure you are wondering\
    \ if there are any side effects to this. If ADR is so great, why don’t we just\
    \ make it the default?\n\n#### Performance and Size\n\nThere are two questions\
    \ that come up when I’ve talked to customers about ADR:\n\n**Does the database\
    \ get larger?**\n\nThe short answer to this question is yes. The more important\
    \ question is by how much. Since we are keeping versions of rows in the database\
    \ for a period of time, naturally the size required for PVS is bigger than without\
    \ it.\n\nThe problem, as with any feature like this, is the dreaded answer, “it\
    \ depends.” Depends on what? The factors are\n\n*   Is the application write-intensive\
    \ with a lot of modifications? The bigger the number of modifications, the more\
    \ size will be required to hold versions.\n*   How long are transactions that\
    \ need to read version data? Once versions are not needed by any query, they can\
    \ be removed.\n\nAccelerated Database Recovery has built-in optimizations to keep\
    \ the version store as small as possible, including the following:\n\n*   **“on-demand”**\n\
    \    When updating a row, SQL Server can “reuse” a version of a row that was aborted\
    \ and write in a new version in its place. This happens during the process of\
    \ a data modification.\n*   **Background cleanup**\n    What about if versions\
    \ are still around that are no longer needed (e.g., aborted transactions) and\
    \ an update has not occurred yet? SQL Server uses the existing background worker\
    \ thread architecture to schedule cleanup (every “few” minutes) on any versions\
    \ that can be discarded both for in-row and off-row versions. SQL Server uses\
    \ a concept called *logical revert* to clean up these versions. Logical revert\
    \ is the process of ensuring the committed version of the row is the “main” row\
    \ for the page, thereby making the “list” of versions shorter to traverse. Section\
    \ 3.3 of the CTR paper [`(www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/))\
    \ has an excellent detailed description of how logical revert works. In addition,\
    \ Section 3.7 of this same paper describes the entire cleanup process.\n\nSection\
    \ 4 of the paper has results from experimental testing on growth, using an example\
    \ of 50 million insert, update, and delete operations. The team found after 50M\
    \ updates, the PVS grew the database by about 1Gb. You should look through these\
    \ results as it also shows the significant size reduction of the transaction log\
    \ due to the use of ADR (and you observed this during the activity in this chapter\
    \ using the `alookatadr.sql` script).\n\n**Does using ADR cause any performance\
    \ impact?**\n\nThis is probably the most common question asked about ADR. And\
    \ like the growth factor, the answer is, “Maybe, and it depends.” Since ADR is\
    \ tracking every modification with versions, write-intensive workloads will see\
    \ the biggest impact. And read operations for write-intensive workloads may also\
    \ be affected some to find a version of a row.\n\nAs part of the CTR paper, the\
    \ engineering team performed some testing using benchmarks derived from the industry\
    \ standard `TPC-C` and `TPC-E` benchmarks (see [`www.tpc.org`](http://www.tpc.org)\
    \ for more information about these benchmarks). `TPC-C` is an older benchmark\
    \ but very write-intensive. `TPC-E` is a more balanced but still “OLTP” write\
    \ workload benchmark. You can see the results in the paper in **Section 4.2**,\
    \ but, effectively, the run of `TPC-C` encountered about a 14% (in-row version)\
    \ impact, and `TPC-E` encountered a 2.5% (in-row version) impact.\n\nI did my\
    \ own “quick and dirty” testing using the open source tool `HammerDB` (see [`www.hammerdb.com`](http://www.hammerdb)\
    \ for more details). This tool comes with a variation of the `TPC-C` benchmark.\
    \ Using a 10 warehouse/10 virtual user execution over a 5-minute period, I saw\
    \ about 15% impact from using ADR."
