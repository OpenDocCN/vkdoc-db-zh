    \n*   Just as with SQL Server on Windows, SQL Server on Linux will now automatically\
    \ create **more than one data file for tempdb** (up to 8) based on the number\
    \ of cores discovered during installation. This option can help avoid page latch\
    \ contention on system allocation pages.\n\n*   **mssql-conf** options have been\
    \ added to support new features for SQL Server 2019\\. For example, mssql-conf\
    \ options for DTC support have been added, which you can read more about at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)\
    \ .\n\n### Supporting New Linux Releases\n\nIt is important for SQL Server to\
    \ be supported on the latest release of major Linux distributions. Therefore,\
    \ with SQL Server 2019, we want to ensure we support these major Linux versions:\n\
    \n*   Red Hat Linux Enterprise 8.0\n\n*   Ubuntu 18.04\n\n*   SUSE Linux Enterprise\
    \ Server 15\n\n### Note\n\nAt the time of the writing of this book, it was our\
    \ intention to officially support these Linux releases with SQL Server 2019\\\
    . SQL Server does work on all of them, but we had to make some changes to the\
    \ deployment packaging and ensure they were well tested. It is possible issues\
    \ could come up to prevent us from being 100% ready at the time SQL Server 2019\
    \ ships, but, if it isn’t announced then, I expect it to be formally announced\
    \ shortly thereafter.\n\nAlong with the support of the latest Linux releases comes\
    \ a benefit to I/O performance. My long-time colleague Bob Dorr noticed after\
    \ the release of SQL Server 2017 that I/O performance of SQL Server on Linux with\
    \ *complete durability* could be a problem. This led to the addition of some SQL\
    \ Server configuration options for a concept called “forced flush,” as documented\
    \ in the Microsoft article at [`https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux`](https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux)\
    \ . We decided to ensure SQL Server, by default, prioritized durability over performance.\
    \ But customers want both, of course. Any customer could change from the default\
    \ and achieve durability with performance, if they knew their disk system could\
    \ support proper flushed writes.\n\nDuring the calendar year of 2018, Bob Dorr\
    \ and others on the SQL Server engineering team worked with Linux open source\
    \ engineering, especially those at Red Hat. The result of this work was changes\
    \ to the Linux kernel for the XFS file system *upstream*. Red Hat Enterprise Linux\
    \ (RHEL) 8.0 includes these kernel changes. Other Linux releases are to follow\
    \ incorporating these changes. Now a user can “turn off” our enforced flush changes\
    \ for SQL Server on Linux, but still achieve maximum performance with durability.\n\
    \nAs with other experiences in our career, Bob Dorr wanted to tell the “story\
    \ behind the story.” And he did so in this detailed blog post at [`https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/`](https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/)\
    \ . I demonstrated these changes at the Red Hat Summit in May of 2019 and showed\
    \ the incredible 100%+ performance improvements using RHEL 7.6 vs. RHEL 8.0 configuring\
    \ SQL Server to use the FUA enhancements. It seems like a small story, but stop\
    \ and think about this: **Microsoft assisted in contributing to the open source\
    \ Linux kernel to improve I/O for all applications!**\n\n## Persistent Memory\
    \ Support\n\nOne of the things I love about the SQL Server engineering team is\
    \ that they are always looking to the future. Always looking at the latest advances\
    \ in technology to ensure SQL Server stays ahead of the curve.\n\nIt doesn’t surprise\
    \ me to see that SQL Server on Linux can take advantage of persistent memory devices.\
    \ Persistent memory (pmem) is a *byte-addressable* storage device. This means\
    \ persistent memory can be accessed like standard RAM but have the properties\
    \ of a storage device – so data stored on it can survive computer power outages\
    \ and restarts.\n\nPersistent memory devices can always be treated in both Windows\
    \ and Linux as *block* devices. In other words, they can be presented by the operating\
