  trans: '

    ### 使用示例


    考虑图 9-7 中 WideWorldImporters 公司的一个可能场景。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig7_HTML.jpg](img/479130_1_En_9_Fig7_HTML.jpg)


    图 9-7：SQL Server 数据枢纽


    在此示例中，WideWorldImporters (WWI) 公司使用 SQL Server 2019，但希望访问以下数据源中的数据：


    `SQL Server 2008R2` – 公司有一个较旧的 SQL Server 系统，用于存储供应商存档。他们不想动这个系统，但希望访问此供应商信息。


    `Azure SQL Database` – 公司内的一个团队正考虑迁移到云端，并使用 Azure 构建一个新的 StockItems 数据库。WWI 的团队希望查看此
    StockItem 数据，并将其与 SQL Server 2019 数据库中的现有数据进行连接，同时不干扰新团队的工作。


    `Azure CosmosDB` – 另一个团队正在为订单（Orders）试点一个移动应用程序，并试验使用 Azure CosmosDB。WWI 团队希望能够查看这些订单，并与本地数据库中与该订单相关的数据进行连接。


    `Oracle` – WWI 的会计软件运行在 Oracle 上。虽然 WWI 正在考虑将此数据库迁移到 SQL Server，但迁移项目尚需时日。与此同时，WWI
    知道 SQL Server 数据库中的某些数据引用了应收账款（Accounts Receivable）中的数据。如果他们能获得合理的 Oracle 访问权限，他们希望将本地
    SQL Server 数据与 Oracle 中的应收账款数据进行连接，直到迁移完成。


    `Hadoop` – WWI 的一个团队正在公司网站上构建一个评级系统，供客户评论订单体验。为了加速项目，开发团队使用 Azure Blob 存储以半结构化格式存储订单评论。WWI
    的团队希望对此数据运行分析，并与 SQL Server 中的本地数据进行连接。


    `SAP HANA` – WWI 最近收购了另一家公司 Vandelay Industries（我的灵感来源于*Seinfeld*中的虚构公司。参见[`seinfeld.fandom.com/wiki/Vandelay_Industries`](https://seinfeld.fandom.com/wiki/Vandelay_Industries)）。该公司在
    SAP HANA 中存储了其客户的数据。在 WWI 团队制定迁移策略期间，他们希望分析这些客户的数据，而无需移动数据。


    所有这些场景都可以通过 SQL Server 2019 中的 Polybase 和外部表实现。实际上，在你的`ch9_data_virtualization\sqldatahub`文件夹示例中，每种情况都有一个例子。


    ## 使用外部表


    在我详细介绍`sqldatahub`文件夹中的一些示例之前，让我先解释一下你在这些示例中会一致发现的基本模板。此模板遵循外部表的一般工作流程，我在名为“Polybase
    工作流程”的章节中已作描述。所有 Polybase 对象都在用户数据库范围内。


    1.  在数据库中创建`MASTER KEY`。


    2.  创建一个`DATABASE SCOPED CREDENTIAL`，用于对外部数据源进行身份验证。


    3.  创建一个`EXTERNAL DATA SOURCE`以指定数据源的位置。`CREDENTIAL`属性将是数据库范围凭据的名称。


    4.  为 HDFS 数据创建一个`EXTERNAL FILE FORMAT`。


    5.  创建一个`EXTERNAL TABLE`以映射到外部数据源的目标表。`DATA_SOURCE`属性将是外部数据源的名称。`FILE_FORMAT`属性（仅适用于
    HDFS）将是外部文件格式对象的名称。


    6.  在外部表的列上创建本地统计信息。


    7.  查询`EXTERNAL TABLE`，有时将该表与本地 SQL Server 表或其他外部表进行连接。


    关于创建 Polybase 对象所涉及的所有 T-SQL 语句，有一个很好的参考文档：[`docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects)。


    ### 工具与外部表


    在我详细介绍 sqldatahub 的示例脚本之前，你应该了解工具对外部数据源和外部表的支持情况。


    SQL Server Management Studio (SSMS) 通过 SSMS 模板支持创建外部数据源和外部表。图 9-8 展示了一个使用 SSMS
    创建外部数据源的示例。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig8_HTML.jpg](img/479130_1_En_9_Fig8_HTML.jpg)


    图 9-8：使用 SSMS 模板创建外部数据源


    同样的概念也适用于外部表。


    一旦你创建了外部数据源和表，就可以使用 SSMS 对象资源管理器浏览这些资源。图 9-9 展示了在 WideWorldImporters 数据库中创建的外部数据源和文件格式的一个示例。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig9_HTML.jpg](img/479130_1_En_9_Fig9_HTML.jpg)


    图 9-9：SSMS 对象资源管理器浏览外部数据源和文件格式


    Azure Data Studio (ADS) 也为 SQL Server 和 Oracle 数据源提供了一个“外部表向导”，指导你完成创建新外部表的过程。你可以在[`docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)阅读有关此功能的信息。


    我将引导你完成为 Azure SQL Database 设置外部表的步骤。对于其他 sqldatahub 示例，我将指引你查看脚本示例，并对每种情况解释几个要点。

    '
- fmt: '# Using an External Table with Azure SQL Database


    One of the built-in connectors for SQL Server provides access to data sources
    for SQL Server, Azure SQL Database, and Azure SQL Data Warehouse.


    I’ve provided example scripts based on the template steps I’ve described in the
    `ch9_data_virtualization\sqldatahub\azuredb` folder. I’ve provided both a T-SQL
    Notebook and T-SQL script to create and query external tables.


    In order to use these scripts, the first thing you need to do is provision and
    get access to an Azure SQL Database. Use the statements in the `createazuredbtable.sql`
    script against your Azure SQL Database.


    Once you have this set up, let’s walk through each step and the results you should
    expect using the `azuredbexternaltable.sql` T-SQL script:


    1. Run `Step 1` from the T-SQL script to change database context and create a
    master key to encrypt the database scoped credential:


    ```sql

    -- Step 1: Create a master key to encrypt the database credential

    USE [WideWorldImporters]

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''S0me!nfo''

    GO

    ```


    2. Run `Step 2` to create a database scoped credential protected by the master
    key. You need to supply the login and password of the server for the Azure SQL
    Database you created:


    ```sql

    -- Step 2: Create a database credential that stores the login and password to
    the Azure SQL Server Database

    -- IDENTITY = login

    -- SECRET = password

    CREATE DATABASE SCOPED CREDENTIAL AzureSQLDatabaseCredentials

    WITH IDENTITY = '''', SECRET = ''''

    GO

    ```


    3. Run `Step 3` to create an external data source using the database scoped credential
    for authentication as the `CREDENTIAL`:


    ```sql

    -- Step 3: Create an external data source

    -- sqlserver is a keyword meaning the data source is a SQL Server, Azure SQL Database,
    or Azure SQL Data Warehouse

    -- The name after :// is the Azure SQL Server Database server. Your SQL Server
    must be on the same vnet as the Azure SQL Server Database or must pass through
    its firewall rules

    CREATE EXTERNAL DATA SOURCE AzureSQLDatabase

    WITH (

    LOCATION = ''sqlserver://'',

    PUSHDOWN = ON,

    CREDENTIAL = AzureSQLDatabaseCredentials

    )

    GO

    ```


    There are a few things to notice about this script. The `LOCATION` syntax includes
    a `<type>:<connection information>`, where the type has these possible values:

    * sqlserver

    * oracle

    * teradata

    * mongodb

    * obdc


    The type will indicate to SQL Server which ODBC driver to use for the external
    data source. For SQL Server, the connection information for Azure SQL Database
    should be the URL for the server (e.g., `<server>..database.windows.net`).


    When you successfully create the external data source, you can see a list of created
    sources using the `external_data_sources` catalog view in the context of your
    user database.


    ## Tip


    Unfortunately, the external data source can be created without validating a connection
    to the data source. If you get the name of the connection information wrong, you
    won’t know until you try to create the external table. The same issue applies
    for the database scoped credential. If you don’t supply the correct login and
    password, you won’t know this until you try to create an external table.


    4. Run `Step 4` of the script to create a schema to hold external table objects.
    This is not required, but I like to use schemas to help organize objects, which
    also makes it very convenient for security purposes:


    ```sql

    -- Step 4: Create a schema in the WideWorldImporters for the external table

    CREATE SCHEMA azuresqldb

    GO

    ```


    5. Run `Step 5` to create the external table using the external data source as
    specified in the `DATA_SOURCE` property:


    ```sql

    -- Step 5: Create the EXTERNAL TABLE

    -- Each column must match the column in the remote table

    -- Notice the character columns use a collation that is compatible with the target
    table

    -- The WITH clause includes the name of the remote [database].[schema].[table]
    and the external database source

    CREATE EXTERNAL TABLE azuresqldb.ModernStockItems

    (

    [StockItemID] [int] NOT NULL,

    [StockItemName] [nvarchar](100) COLLATE Latin1_General_100_CI_AS NOT NULL,

    [SupplierID] [int] NOT NULL,

    [ColorID] [int] NULL,

    [UnitPackageID] [int] NOT NULL,

    [OuterPackageID] [int] NOT NULL,

    [Brand] [nvarchar](50) COLLATE Latin1_General_100_CI_AS NULL,

    [Size] [nvarchar](20) COLLATE Latin1_General_100_CI_AS NULL,

    [LeadTimeDays] [int] NOT NULL,

    [QuantityPerOuter] [int] NOT NULL,

    [IsChillerStock] [bit] NOT NULL,

    [Barcode] [nvarchar](50) COLLATE Latin1_General_100_CI_AS NULL,

    [TaxRate] [decimal](18, 3) NOT NULL,

    [UnitPrice] [decimal](18, 2) NOT NULL,

    [RecommendedRetailPrice] [decimal](18, 2) NULL,

    [TypicalWeightPerUnit] [decimal](18, 3) NOT NULL,

    [LastEditedBy] [int] NOT NULL

    )

    WITH (

    LOCATION=''wwiazure.dbo.ModernStockItems'',

    DATA_SOURCE=AzureSQLDatabase

    )

    GO

    ```


    This is an important piece of the Polybase scenario, so I’ll point out a few details:

    * The number, names, and data types must match exact with the external data source
    table, but you can use any name you want on the SQL side both for the column names
    and the name of the table itself.

    * Type mapping can be tricky. We have documentation to help you with defining
    SQL Server types to match up with corresponding external data source types at
    `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-type-mapping`.

    * The `LOCATION` syntax for the external table is how you map the external data
    source object. Each data source has a `LOCATION` that can be different to identify
    the data source object. In the case of SQL Server or Azure SQL Database, you should
    reference the table using the "three-part" convention of `<database>.<schema>.<tablename>`.

    * Verification is performed when trying to create the external table for proper
    column matching, type mapping, and the use of any restricted types (I’ll mention
    restrictions in the section later in the chapter called "Restrictions and Limitations").


    Once created, you can see a list of external tables using the catalog view `sys.external_tables`.
    The `sys.objects` catalog view lists an external table with a type of `USER_TABLE`.
    The `sys.tables` catalog view has a column you can use, `is_external`, to identify
    which tables are external tables.


    6. Run `Step 6` to create local statistics on key columns from the external table.
    This is not required, but recommended to help the query processor make smart decisions
    to support operations like pushdown computation:'
