  trans: '

    # 9. SQL Server 数据虚拟化


    ## 概要


    我坚信容器和 Kubernetes 将成为分布式与可扩展计算未来的重要组成部分，而 SQL Server 正是为此未来而构建。在本章中，你学习了足够的 Kubernetes
    (`k8s`) 基础知识，足以理解如何在 `k8s` 集群中部署 SQL Server。你也见证了内置于 `k8s` 的高可用性（HA）的强大功能，以及 SQL
    Server 如何利用它。就像你在第 7 章中看到的容器那样，你可以使用 `k8s` 的功能来更新 Pod 中的 SQL Server 容器（应用新的累积更新），并在必要时回滚。我还简要介绍了
    Helm Charts，它代表了一种使用包管理方式在 `k8s` 中部署 Pod 和容器的新方法。


    最后，我让你简要了解了 SQL Server 与 `k8s` 集成的未来，我们将可用性组与 `k8s` 集成，以提供一个健壮、集成的 HA 解决方案，其中包含了你今天所见到的可用性组的所有强大功能。第
    7 章和第 8 章是重要的学习基石，有助于你学习第 10 章关于 SQL Server 大数据集群的内容。


    数据虚拟化是我们通过 SQL Server 2019 提供的最令人兴奋的功能之一。在本章中，你将学习更多关于 SQL Server 2019 中如何通过一种名为
    PolyBase 的技术实现数据虚拟化。本章，连同第 6、7 和 8 章，为学习第 10 章的 `SQL Server 大数据集群`奠定了基础。


    ## 什么是 PolyBase？


    PolyBase 是一项在 SQL Server 2016 中引入并在 SQL Server 2019 中扩展的创新技术，旨在解决 *数据移动* 问题。数据移动通常涉及构建昂贵且复杂的提取、转换和加载（ETL）过程，将数据从其他数据源移入
    SQL Server。PolyBase 通过实现 *数据虚拟化* 解决方案来应对此挑战，我将在下文中讨论并定义这个术语。我将贯穿本章讨论并定义数据虚拟化。


    在本章中，我将带你了解 PolyBase 的历史以及它如何提供数据虚拟化。我将讲解 PolyBase 在幕后的工作原理，以及通过 *外部表* 概念的典型 PolyBase
    工作流程。并且，像本书大多数章节一样，我们将使用示例向你展示如何使用 PolyBase 满足数据虚拟化需求的细节。


    你也可以使用我们的文档作为指南，在 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide)
    了解更多关于 PolyBase 的信息。


    ### PolyBase 的历史


    大约在 2011 年，David DeWitt 博士及其团队创建了一个名为 *Polybase* 的新项目（你可以在 [`http://gsl.azurewebsites.net/Projects/Polybase.aspx`](http://gsl.azurewebsites.net/Projects/Polybase.aspx)
    看到项目网站）。他的团队成员包括 Rimma Nehme（现以 Azure CosmosDB 闻名）和来自微软研究院 Jim Gray 系统实验室的 Alan
    Halverson。该项目的目标是创建一种无需编写 MapReduce 作业即可访问 Hadoop 系统中数据的新方法（你可以在 [`https://en.wikipedia.org/wiki/MapReduce`](https://en.wikipedia.org/wiki/MapReduce)
    阅读更多关于 MapReduce 的信息，它在 Hadoop 用户中非常流行）。


    我采访了现在 MIT 工作的 David，了解了 PolyBase 的历史。我问他为什么尝试创建一种使用 MapReduce 的新方法。他向我指了一篇他与
    Michael Stonebraker 写的博客文章，你可以在 [`https://homes.cs.washington.edu/~billhowe/mapreduce_a_major_step_backwards.html`](https://homes.cs.washington.edu/%257Ebillhowe/mapreduce_a_major_step_backwards.html)
    找到。该文章描述了 MapReduce 作为一种访问数据的劣等方式的多种表现。


    David 和他的团队随后创建了 PolyBase 项目，利用微软的并行数据仓库（PDW）技术来访问 Hadoop 系统中的“大数据”。PDW，现在称为分析平台系统（APS），是云端
    Azure SQL 数据仓库的前身。正如 David 所说，“...我们可以将 PDW 连接到 HDFS，并使用 PDW 的并行查询，让客户能够使用标准的
    SQL 而不是 MapReduce。这将使客户能够在一个查询中同时访问他们的关系数据和存储在 HDFS 中的外部表。”


    该团队为这项技术撰写了一篇论文，你可以在 [`http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf`](http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf)
    阅读。该论文发表在 2013 年 ACM SIGMOD 会议的论文集中。PolyBase 首次作为一项功能出现在 PDW 中是在 2012 年中，并且至今仍在那里。


    图 9-1 展示了原始 PolyBase 概念的示意图。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig1_HTML.jpg](img/479130_1_En_9_Fig1_HTML.jpg)


    图 9-1：来自 Jim Gray 系统实验室的原始 PolyBase 概念


    快进到 SQL Server 2016 的开发。如果 PolyBase 可以通过 PDW 中的 SQL 使用，那为什么不能在 SQL Server 中使用呢？在
    SQL Server 2016 中，我们添加了 PolyBase 功能以使用 T-SQL 访问 Hadoop 系统中的数据。我常将此功能称为“经典 PolyBase”（这是我的说法；并非微软官方术语）。你可以使用
    T-SQL 创建所谓的 *外部表* 来映射 HDFS 文件，然后像查询任何其他表一样查询该外部表。该“查询”会被转换为 MapReduce Java 程序，在目标
    Hadoop 系统上运行。


    我大约在 SQL Server 2016 发布时加入了工程团队，但我从未真正看到 PolyBase 在我们的客户中流行起来。我不确定确切原因，但部分答案可能是客户必须在与
    SQL Server 同一台计算机上安装 Java——通常是来自 Oracle 的 Java 运行时环境（`JRE`）。也可能是在 2016 年，SQL Server
    客户还没有准备好与 Hadoop 集成，而 Hadoop 用户则希望与关系数据库保持距离。


    2016 年，微软收购了一家名为 Metanautix 的公司，我在本书开篇章节提到过。通过此次收购，我们获得了 `ODBC` 技术，用于访问 SQL Server、Oracle、Teradata
    和 MongoDB 等数据源。像 Travis Wright 和 Slava Oks 这样的人看到了这些技术的愿景，因此他们在 SQL Server 2019
    中扩展了 PolyBase，允许用户使用外部表访问的不仅仅是 Hadoop，还包括 SQL Server、Oracle、Teradata 和 MongoDB。并且，“锦上添花”的是，我们添加了使用你选择的
    `ODBC` 驱动程序访问 *任何数据源* 的支持。我称这种新能力为 `PolyBase++`（再次强调，这是我的说法，不是微软官方术语）。

    '
- fmt: '### What Is Data Virtualization?


    I had not spent much time on `Polybase` for `SQL Server 2016`, but I knew the
    concepts. When I started pouring my time into speaking and training on `SQL Server
    2019`, the term `Data Virtualization` (I think the first time I heard this term
    was from Travis Wright) was really the first time I dug more into `Polybase`.


    `Data Virtualization` is defined in many ways, but you can read the “official”
    definition on Wikipedia at [`https://en.wikipedia.org/wiki/Data_virtualization`](https://en.wikipedia.org/wiki/Data_virtualization)
    . I like this specific sentence, where it says, “Unlike the traditional extract,
    transform, load (`"ETL"`) process, the `data remains in place`, and real-time
    access is given to the source system for the data. This reduces the risk of data
    errors, of the workload moving data around that may never be used, and it does
    not attempt to impose a single data model on the data.”


    The key to `Data Virtualization` is the concept of `no data movement` . To be
    clear, “data” in this case is not to move from a source in their native format.
    Instead, retrieve data through a query or request it from the data source.


    As part of the overall strategy for `SQL Server 2019` to implement a solution
    for `Data Virtualization`, our hope and promise is that `SQL Server` is an excellent
    `center` for `Data Virtualization`. In other words, `SQL Server 2019` can become
    the `data hub` for your organization.


    Figure [9-2](#479130_1_En_9_Chapter.xhtml#Fig2) is a slide often present to talk
    about the overall concept of `Polybase`, `Data Virtualization`, and `SQL Server
    2019`.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig2_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    `Polybase` and `Data Virtualization` in `SQL Server 2019`


    Look at all of these icons in the figure. With `SQL Server 2019`, you can run
    `T-SQL` queries against external tables based on data sources ranging from `HDFS`
    to `Oracle`, to `CosmosDB`, to `SAP HANA`. And here is the radical part: You can
    query these resources using `T-SQL` and join them to local `SQL Server` tables
    or to any other external table representing any of these other data sources.


    On this slide, I attempt to simplify the definition of what `Polybase` is:


    *   **A distributed computing engine**


    `Polybase` contains software inherent to the original `PDW` design that integrated
    with `SQL Server` and provides its own distributed computing engine. I’ll describe
    more about this component in the next section called “How `Polybase` Works.”


    *   **Query data where it lives with `T-SQL`**


    This is the promise of `Data Virtualization`. Execute `T-SQL` queries to a local
    `SQL Server` and query data in other data sources without moving the data. Here
    is another point about `Polybase` for `SQL Server 2019`: The software required
    to query `SQL Server`, `Oracle`, `Teradata`, and `MongoDB` is built-in to the
    installation of `SQL Server`. **No additional client software is required!**


    *   **Distributed, scalable query performance**


    `Polybase` provides more than just a method to “connect” to other data sources;
    `linked servers` can provide that. Because `Polybase` is an integrated distributed
    computing engine, it can provide scalable query performance. And a concept called
    `scale-out groups` provides the ability to distribute queries to data sources
    like `Hadoop`, `SQL Server`, and `Oracle`.


    *   **Manual/deploy with `SQL Server`**


    This sounds incredibly cool so far, so, is there a catch? Well, setting up `Polybase`
    does require some work, especially if you want to set up `scale-out groups` on
    Windows. Once you get `Polybase` deployed, there is not much configuration required.
    Setting up data source connections does require some work, as `Polybase` is only
    as good as your ability to gain access and connect to the data sources you represent
    with external tables.


    *   **Auto deploy/optimize with `Big Data Clusters`**


    As you will discover in Chapter [10](#479130_1_En_10_Chapter.xhtml), `SQL Server
    Big Data Clusters` will provide `Data Virtualization`, with `Polybase` deployed,
    and a deployed `Hadoop` cluster with optimized access to data in `HDFS`.


    ## How `Polybase` Works


    I often believe that understanding at some level how `SQL Server` capability works
    allows you to use it most effectively. If you have seen my talks at various conferences
    like the `PASS Summit`, you also know I have a reputation for presenting the internal
    aspects of `SQL Server` functionality. Therefore, when I was asked to present
    a few sessions at the `SQL Bits 2019` conference in Manchester, UK, I picked `Polybase`
    as my topic. I wanted to study more about how `Polybase` works internally, especially
    how we built an architecture to access data sources like `Oracle`. I’ve had a
    long background in `SQL Server`, so was very familiar with the details of `linked
    servers`. How was `Polybase` different? I will talk more about a comparison of
    these technologies later in the chapter. A nice supplement to this chapter would
    be my talk at `SQL Bits` on this subject, which you can find at [`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase)
    .'
