- fmt: "## Prerequisites for the Examples\n\nAll the examples for this chapter rely\
    \ on the cross-platform CLI `kubectl` program. You should be able to use the examples\
    \ in this chapter with any k8s distribution using `kubectl`.\n\nI used Azure Kubernetes\
    \ Service (`AKS`) to deploy my k8s cluster for all of the examples. Therefore,\
    \ there will be two possible differences in your use of my examples for your k8s\
    \ distribution:\n\n*   `Storage class` – My examples use a storage class for Azure\
    \ disks. You will need to put in the storage class specific to your platform.\n\
    *   `Load Balancer` – My examples use a load balancer type for the service, but\
    \ that is implemented only in k8s cloud providers. If you are not using a cloud\
    \ provider for k8s, you will want to use a type of service called a `NodePort`.\
    \ You can read more about `NodePort` at [`https://kubernetes.io/docs/concepts/services-networking/#nodeport`](https://kubernetes.io/docs/concepts/services-networking/%2523nodeport).\n\
    \nOther than that, these examples in the chapter should run on just about any\
    \ k8s platform you have configured.\n\nIf you are using `AKS`, I used the following\
    \ steps to create my `AKS` cluster, per the documentation at [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough).\n\
    \n**`createaksrg.sh`**\n```\naz group create --name bwaks --location eastus2\n\
    ```\n\n**`createaks.sh`**\n```\naz aks create \\\n--resource-group bwaks \\\n\
    --name bwsqlaks \\\n--node-count 2 \\\n--enable-addons monitoring \\\n--generate-ssh-keys\n\
    ```\n\n**`connectoaks.sh`**\n```\naz aks get-credentials --resource-group bwaks\
    \ --name bwsqlaks\n```\n\nYou can see the scripts and commands I used to create\
    \ the resource group, create the cluster, and connect to the cluster in the `ch8_sql_on_k8s`\
    \ directory. Even though these are Bash shell scripts, you can run these following\
    \ commands where the Azure CLI is supported. I like to use the Azure Cloud Shell\
    \ which I’ll show you in these examples because the Azure CLI is built-in. If\
    \ you want to use a platform, you will need to install the Azure CLI at [`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli?view=azure-cli-latest`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli%253Fview%253Dazure-cli-latest).\n\
    \nI also recommend you install the Kubernetes Visual Studio Code extension to\
    \ assist in using k8s clusters and objects. I wanted to install this on Azure\
    \ Data Studio. To do this, you need to download these extensions:\n*   [`https://marketplace.visualstudio.com/items?itemName=redhat.vscode-yaml`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.vscode-yaml)\n\
    *   [`https://marketplace.visualstudio.com/items?itemName=ms-kubernetes-tools.vscode-kubernetes-tools`](https://marketplace.visualstudio.com/items%253FitemName%253Dms-kubernetes-tools.vscode-kubernetes-tools)\n\
    \nTo use this extension, you also need to install `kubectl` from [`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/).\n\
    \nTo learn more about how to install extensions with Azure Data Studio, refer\
    \ to the documentation at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions).\n\
    \nAs I said, for me, I like to use these examples with the Azure Cloud Shell.\
    \ The Azure Cloud Shell supports both PowerShell and bash and includes many built-in\
    \ tools like the Azure CLI, `kubectl`, and even `sqlcmd`. You can read more about\
    \ the Azure Cloud Shell at [`https://azure.microsoft.com/en-us/features/cloud-shell`](https://azure.microsoft.com/en-us/features/cloud-shell).\n\
    \nNo matter what client or k8s distribution you use, if you can run `kubectl`,\
    \ you can use these examples.\n\n## Deploying SQL Server on k8s\n\nFor examples\
    \ in this section, let me show you how to deploy a pod with a single SQL Server\
    \ container.\n\nYou will need a secret for the `sa` password, storage for databases,\
    \ and a load balancer to connect to SQL Server. All of this will be done with\
    \ a series of `kubectl` commands and declarative `YAML` files.\n\nIn addition,\
    \ I recommend you create your own pods using the concept of namespaces in k8s.\
    \ A namespace gives you a scope for the objects (e.g., pods) you create in the\
    \ k8s cluster to be separated from other objects. Namespaces provide a very nice\
    \ mechanism to organize and manage your k8s objects.\n\nLet’s go step by step\
    \ through the process of deploying and connecting to a SQL Server container in\
    \ a pod. These steps assume you have an existing k8s cluster. I created a two-node\
    \ cluster using `AKS` as I’ve described in the Prerequisites, but even a single\
    \ node cluster will work.\n\nWhen I went through these examples, I used the Azure\
    \ Cloud Shell, which can be run from any browser as seen in Figure 8-1.\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig1_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig1_HTML.jpg)\n\
    *Figure 8-1 Using Kubernetes with the Azure Cloud Shell*\n\nI love the Azure Cloud\
    \ Shell. One time I was on a plane trip back to Texas, and battery ran out on\
    \ my laptop. I needed to do some work with `AKS` for a demo I was building. My\
    \ iPhone still had power, and I had heard about the Azure app ([`https://apps.apple.com/us/app/microsoft-azure/id1219013620`](https://apps.apple.com/us/app/microsoft-azure/id1219013620)).\
    \ I installed the app, connected with my subscription, and browsed my Azure resources.\
    \ I then noticed the app had a cloud shell option. I selected this and now I was\
    \ back in business. Figure 8-2 shows an example of using the Azure Cloud Shell\
    \ from my phone.\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig2_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig2_HTML.jpg)\n\
    *Figure 8-2 The mobile k8s user*\n\nI remember sitting next to a passenger who\
    \ was playing Candy Crush on their phone. They saw what I was doing and said,\
    \ “what game are you playing?” My response was, “I’m deploying a Kubernetes cluster\
    \ using the Cloud Shell.” They went back to their game, no doubt wondering what\
    \ strange person was playing the “Kubernetes game.”\n\nThe example scripts for\
    \ deployment can be found at `ch8_sql_on_k8s\\deploy`. Make sure to set execution\
    \ permissions for the shell scripts with `chmod u+x <script>`. Also, if you would\
    \ like to run these in the Azure Cloud Shell, read the following documentation\
    \ on uploading these example scripts ([`https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage#transfer-local-files-to-cloud-shell`](https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage%2523transfer-local-files-to-cloud-shell)).\
    \ Remember, the big advantage of the Azure Cloud Shell is that it only requires\
    \ a browser, and all the tools like `kubectl`, `az`, and `sqlcmd` are already\
    \ installed.\n\nOn to the examples to deploy SQL Server in `AKS`:\n\n1.  Create\
    \ a namespace using the following command or script `step1_create_namespace.sh`:\n\
    \    ```\n    kubectl create namespace mssql\n    ```\n    You should get back\
    \ this message indicating that the namespace was created:\n    ```\n    namespace/mssql\
    \ created\n    ```\n    You can also verify the namespace was created by running\
    \ this command:\n    ```\n    kubectl get namespaces\n    ```\n    On my cluster,\
    \ I got back these results. The other namespaces come with a k8s cluster.\n  \
    \  ```\n    NAME          STATUS   AGE\n    default       Active   2d10h\n   \
    \ kube-public   Active   2d10h\n    kube-system   Active   2d10h\n    mssql  \
    \       Active   56s\n    ```"
