  trans: "**注意**\n\n不允许直接从时态数据中为归档表添加敏感度分类。当您删除某列的敏感度分类时，该列所在归档表的分类也会被一并删除。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig10_HTML.jpg](img/479130_1_En_3_Fig10_HTML.jpg)\n\
    **图 3-10：来自工具和 T-SQL 的分类**\n\n1.  如果您回到保存了建议的选项卡，会看到一个 **“添加分类”** 的选项。这是一种让您通过工具手动添加敏感度分类的方式，可用于覆盖建议，或为未被推荐的列进行分类。您仍然可以获得工具提供的标签和信息类型选项。如果您点击“添加分类”，界面将如图\
    \ 3-9 所示。\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig9_HTML.jpg](img/479130_1_En_3_Fig9_HTML.jpg)\n\
    \    **图 3-9：通过工具手动添加分类**\n\n2.  工具很好用，但您可能也想直接使用 T-SQL 来添加您自己的分类和体系。首先，使用脚本 `findclassifications.sql`\
    \ 来查看如何使用 T-SQL 查看所有现有分类。\n    ```sql\n    USE WideWorldImporters\n    GO\n  \
    \  SELECT o.name as table_name, c.name as column_name, sc.information_type, sc.label\n\
    \    FROM sys.sensitivity_classifications sc\n    JOIN sys.objects o\n    ON o.object_id\
    \ = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id = sc.minor_id\n  \
    \  AND c.object_id = sc.major_id\n    ORDER BY sc.information_type, sc.label\n\
    \    GO\n    ```\n    您的结果应该与报表中的结果相同。\n\n3.  要通过 T-SQL 添加您自己的分类，请使用脚本 `addclassification.sql`。运行每个步骤来添加分类并查看新结果。您可以根据需要输入任何\
    \ `label`（标签）和 `information_type`（信息类型）值。在这个例子中，我选择了与工具不同的标签和类型。由于这是一个电子邮件地址，我将类型设为\
    \ `Email`，标签设为 `PII`（代表个人身份信息）。本质上，这些只是我们存储的与列关联的字符串值。但就像任何正在构建和设计的系统一样，一个好的分类体系会对公司及数据库应使用哪些\
    \ `label` 和 `information_type` 标签规定一些结构，正如我们稍后将看到的，这些元数据将以这种方式出现在审计中。\n    ```sql\n\
    \    -- 步骤 1：添加分类\n    ADD SENSITIVITY CLASSIFICATION TO\n    [Application].[People].[EmailAddress]\n\
    \    WITH (LABEL='PII', INFORMATION_TYPE=\"Email\")\n    GO\n    -- 步骤 2：查看所有分类\n\
    \    USE WideWorldImporters\n    GO\n    SELECT o.name as table_name, c.name as\
    \ column_name, sc.information_type, sc.information_type_id, sc.label, sc.label_id\n\
    \    FROM sys.sensitivity_classifications sc\n    JOIN sys.objects o\n    ON o.object_id\
    \ = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id = sc.minor_id\n  \
    \  AND c.object_id = sc.major_id\n    ORDER BY sc.information_type, sc.label\n\
    \    GO\n    ```\n    您的结果应如图 3-10 所示。\n\n在这些结果中，请注意工具添加的列具有 `information_type_id`\
    \ 和 `label_id` 的值。T-SQL 语句 `ADD SENSITIVITY CLASSIFICATION` 支持使用 GUID 值来标记标签和类型的字符串。如果您的公司构建了一个分类系统来存储所有可接受的标签和类型，这一点可能特别有价值。您现在可以通过\
    \ GUID 值引用任何标签或类型，不过生成 GUID 值的工作需要您自己完成。\n\n**提示**\n\nT-SQL 函数 `NEWID()` 可用于在\
    \ SQL Server 中生成唯一的 GUID 值。您可以在 [`docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql)\
    \ 找到更多详细信息。\n\n到目前为止一切顺利。这看起来是一个相当简单直接的系统，事实也确实如此。但它的效果完全取决于您选择使用的 `label` 和 `information_type`\
    \ 值。T-SQL 支持的优点在于，任何支持 T-SQL 的应用程序现在都可以构建分类系统并进行查询，因为通过 T-SQL 也支持编目视图。\n\n那么审计呢？请继续下一节了解其工作原理。请保持所有设置不变，以便利用前面这些步骤来展示审计的工作方式。"
- fmt: "### Auditing and Data Classification\n\nHaving sensitivity classification\
    \ metadata about columns is valuable, but an even more valuable feature would\
    \ be for auditing to automatically pick up when users view columns marked with\
    \ those classifications.\n\nModern versions of SQL Server include a built-in feature\
    \ called `SQL Server Audit`. Based on Extended Events technology, `Audit` has\
    \ many options and provides a rich auditing system. You can read more about the\
    \ complete functionality of `SQL Server Audit` at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine).\n\
    \nAudits are produced in a record format with all types of properties for each\
    \ `audit event`. SQL Server 2019 adds a new audit event property called `data_sensitivity_information`.\
    \ So, for example, if you are auditing `SELECT` statements on certain tables where\
    \ you have added sensitivity classification to columns, if the columns are part\
    \ of the `SELECT` “list” to view data, the `data_sensitivity_information` column\
    \ will show this access.\n\nLet’s continue with the example from earlier to look\
    \ at how auditing works with sensitivity classifications.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** Audit of a single table scan of a table with classifications\n\
    \n1.  Because you may run these examples more than once and don’t want to have\
    \ to restore the database, first run the script `dropsqlaudit.sql`.\n\n    ```sql\n\
    \    -- Step 1: Disable the audits and drop them\n    USE WideWorldImporters\n\
    \    GO\n    IF EXISTS (SELECT * FROM sys.database_audit_specifications WHERE\
    \ name = 'People_Audit')\n    BEGIN\n    ALTER DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    WITH (STATE = OFF)\n    DROP DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    END\n    GO\n    USE master\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits\
    \ WHERE name = 'GDPR_Audit')\n    BEGIN\n    ALTER SERVER AUDIT GDPR_Audit\n \
    \   WITH (STATE = OFF);\n    DROP SERVER AUDIT GDPR_Audit\n    END\n    GO\n \
    \   -- Step 2: Remove the .audit files from default or your path\n    -- del C:\\\
    program files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\GDPR*.audit\n\
    \    ```\n\n    Notice that Step 2 is a comment in the script to delete files.\
    \ When you run an audit, it creates files in a path you specify. When you disable\
    \ and drop the audit, the files remain in that directory. To keep the example\
    \ clean, manually delete any leftover files from previous executions.\n\n2.  Open\
    \ up the script `setupsqlaudit.sql` to create and start the audit. I won’t go\
    \ into the details of how auditing and specifications work. You can see through\
    \ the syntax I’ve provided that an audit is set up to track `SELECT` statements\
    \ against the `[Application].[People]` table in the `WideWorldImporters` database.\
    \ Check out the documentation on auditing to learn more at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine).\n\
    \n    ```sql\n    USE master\n    GO\n    -- Create the server audit.\n    CREATE\
    \ SERVER AUDIT GDPR_Audit\n    TO FILE (FILEPATH = 'C:\\program files\\microsoft\
    \ sql server\\mssql15.mssqlserver\\mssql\\data')\n    GO\n    -- Enable the server\
    \ audit.\n    ALTER SERVER AUDIT GDPR_Audit\n    WITH (STATE = ON)\n    GO\n \
    \   USE WideWorldImporters\n    GO\n    -- Create the database audit specification.\n\
    \    CREATE DATABASE AUDIT SPECIFICATION People_Audit\n    FOR SERVER AUDIT GDPR_Audit\n\
    \    ADD (SELECT ON Application.People BY public )\n    WITH (STATE = ON)\n  \
    \  GO\n    ```\n\n3.  Now let’s run some queries and look at what is audited.\
    \ Open up the script `findpeople.sql` and run Steps 1 and 2 as guided by comments\
    \ in the script:\n\n    ```sql\n    -- Step 1: Scan the table and see if the sensitivity\
    \ columns were audited\n    USE WideWorldImporters\n    GO\n    SELECT * FROM\
    \ [Application].[People]\n    GO\n    -- Step 2: Check the audit\n    -- The audit\
    \ may not show up EXACTLY right after the query but within a few seconds.\n  \
    \  SELECT event_time, session_id, server_principal_name,\n    database_name, object_name,\n\
    \    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\n    Your results should look like Figure 3-11.\n\n    In this\
    \ example, you have run a query selecting all columns from the `People` table.\
    \ The `fn_get_audit_file` T-SQL function is used to retrieve audit results in\
    \ a row/column format. I’ve pulled only certain columns from the result set of\
    \ this function. You can see the entire list of arguments and output columns for\
    \ this function at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql).\n\
    \n    The first row is a record that an audit has been started. The second row\
    \ is an audit of the `SELECT` statement. Notice the `data_sensitivity_information`\
    \ column value is an XML data type. Click that value and SSMS will bring up a\
    \ new window with the complete XML data. Your results should look like Figure\
    \ 3-12.\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg)\n\
    \n    **Figure 3-12** Data sensitivity details\n\n    The details of the XML include\
    \ an attribute for any unique `label` and `information_type` accessed by the `SELECT`\
    \ statement. You can now take this information and look up what columns are associated\
    \ with these details with the `sys.sensitivity_classifications` catalog view.\n\
    \n4.  Now execute statements in `findpeople.sql` for Steps 3 and 4:\n\n    ```sql\n\
    \    -- Step 3: What if I access just one of the columns directly?\n    SELECT\
    \ FullName FROM [Application].[People]\n    GO\n    -- Step 4: Check the audit\n\
    \    -- The audit may not show up EXACTLY right after the query but within a few\
    \ seconds.\n    SELECT event_time, session_id, server_principal_name,\n    database_name,\
    \ object_name,\n    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\n    The results from Step 4 should look like Figure 3-13.\n\
    \n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg)\n\
    \n    **Figure 3-13** Audit including a `SELECT` for one column marked for classification\n\
    \n    A third row in the audit exists (you will get one row for each `SELECT`).\
    \ If you click the `data_sensitivity_information` column, you will see only one\
    \ label because only the `FullName` column was selected.\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg)\n\
    \n    **Figure 3-14** Audit results for classified column in `WHERE` clause\n\n\
    5.  The audit will only track access to classifications if a column from the classification\
    \ is part of the `SELECT` *list* or output of a query. Let’s prove it. Run Steps\
    \ 5 and 6 from `findpeople.sql`:"
  raw: "### Auditing and Data Classification\n\nHaving sensitivity classification\
    \ metadata about columns is valuable, but an even more valuable feature would\
    \ be for auditing to automatically pick up when users view columns marked with\
    \ those classifications.\n\nModern versions of SQL Server include a built-in feature\
    \ called **SQL Server Audit** . Based on Extended Events technology, Audit has\
    \ many options and provides a rich auditing system. You can read more about the\
    \ complete functionality of SQL Server Audit at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)\
    \ .\n\nAudits are produced in a record format with all types of properties for\
    \ each *audit event*. SQL Server 2019 adds a new audit event property called *data_sensitivity_information*\
    \ . So, for example, if you are auditing SELECT statements on certain tables where\
    \ you have added sensitivity classification to columns, if the columns are part\
    \ of the SELECT “list” to view data, the data_sensitivity_information column will\
    \ show this access.\n\nLet’s continue with the example from earlier to look at\
    \ how auditing works with sensitivity classifications.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nAudit of a single table scan of a table with classifications\n\
    \n1.  Because you may run these examples more than once and don’t want to have\
    \ to restore the database, first run the script **dropsqlaudit.sql**.\n\n```\n\
    \    -- Step 1: Disable the audits and drop them\n    USE WideWorldImporters\n\
    \    GO\n    IF EXISTS (SELECT * FROM sys.database_audit_specifications WHERE\
    \ name = 'People_Audit')\n    BEGIN\n    ALTER DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    WITH (STATE = OFF)\n    DROP DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    END\n    GO\n    USE master\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits\
    \ WHERE name = 'GDPR_Audit')\n    BEGIN\n    ALTER SERVER AUDIT GDPR_Audit\n \
    \   WITH (STATE = OFF);\n    DROP SERVER AUDIT GDPR_Audit\n    END\n    GO\n \
    \   -- Step 2: Remove the .audit files from default or your path\n    -- del C:\\\
    program files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\GDPR*.audit\n\
    \    ```\n\nNotice that Step 2 is a comment in the script to delete files. When\
    \ you run an audit, it creates files in a path you specify. When you disable and\
    \ drop the audit, the files remain in that directory. To keep the example clean,\
    \ manually delete any leftover files from previous executions.\n\n2.  Open up\
    \ the script **setupsqlaudit.sql** to create and start the audit. I won’t go into\
    \ the details of how auditing and specifications work. You can see through the\
    \ syntax I’ve provided that an audit is set up to track SELECT statements against\
    \ the [Application].[People] table in the WideWorldImporters database. Check out\
    \ the documentation on auditing to learn more at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)\
    \ .\n\n```\n    USE master\n    GO\n    -- Create the server audit.\n    CREATE\
    \ SERVER AUDIT GDPR_Audit\n    TO FILE (FILEPATH = 'C:\\program files\\microsoft\
    \ sql server\\mssql15.mssqlserver\\mssql\\data')\n    GO\n    -- Enable the server\
    \ audit.\n    ALTER SERVER AUDIT GDPR_Audit\n    WITH (STATE = ON)\n    GO\n \
    \   USE WideWorldImporters\n    GO\n    -- Create the database audit specification.\n\
    \    CREATE DATABASE AUDIT SPECIFICATION People_Audit\n    FOR SERVER AUDIT GDPR_Audit\n\
    \    ADD (SELECT ON Application.People BY public )\n    WITH (STATE = ON)\n  \
    \  GO\n    ```\n\n3.  Now let’s run some queries and look at what is audited.\
    \ Open up the script **findpeople.sql** and run Steps 1 and 2 as guided by comments\
    \ in the script:\n\n```\n    -- Step 1: Scan the table and see if the sensitivity\
    \ columns were audited\n    USE WideWorldImporters\n    GO\n    SELECT * FROM\
    \ [Application].[People]\n    GO\n    -- Step 2: Check the audit\n    -- The audit\
    \ may not show up EXACTLY right after the query but within a few seconds.\n  \
    \  SELECT event_time, session_id, server_principal_name,\n    database_name, object_name,\n\
    \    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\nYour results should look like Figure [3-11](#479130_1_En_3_Chapter.xhtml#Fig11).\n\
    \nIn this example, you have run a query selecting all columns from the People\
    \ table. The **fn_get_audit_file** T-SQL function is used to retrieve audit results\
    \ in a row/column format. I’ve pulled only certain columns from the result set\
    \ of this function. You can see the entire list of arguments and output columns\
    \ for this function at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql)\
    \ .\n\nThe first row is a record that an audit has been started. The second row\
    \ is an audit of the SELECT statement. Notice the data_sensitivity_information\
    \ column value is an XML data type. Click that value and SSMS will bring up a\
    \ new window with the complete XML data. Your results should look like Figure\
    \ [3-12](#479130_1_En_3_Chapter.xhtml#Fig12).\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nData sensitivity details\n\nThe details of the XML include an\
    \ attribute for any unique label and information_type accessed by the SELECT statement.\
    \ You can now take this information and look up what columns are associated with\
    \ these details with the **sys.sensitivity_classifications** catalog view.\n\n\
    1.  Now execute statements in **findpeople.sql** for Steps 3 and 4:\n\n```\n \
    \   -- Step 3: What if I access just one of the columns directly?\n    SELECT\
    \ FullName FROM [Application].[People]\n    GO\n    -- Step 4: Check the audit\n\
    \    -- The audit may not show up EXACTLY right after the query but within a few\
    \ seconds.\n    SELECT event_time, session_id, server_principal_name,\n    database_name,\
    \ object_name,\n    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\nThe results from Step 4 should look like Figure [3-13](#479130_1_En_3_Chapter.xhtml#Fig13).\n\
    \n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nAudit including a SELECT for one column marked for classification\n\
    \nA third row in the audit exists (you will get one row for each SELECT). If you\
    \ click the data_sensitivity_information column, you will see only one label because\
    \ only the FullName column was selected.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nAudit results for classified column in WHERE clause\n\n1.  The\
    \ audit will only track access to classifications if a column from the classification\
    \ is part of the SELECT *list* or output of a query. Let’s prove it. Run Steps\
    \ 5 and 6 from **findpeople.sql**:"
  trans: "### 审计与数据分类\n\n拥有列的敏感度分类元数据很有价值，但更有价值的功能是，审计应能自动拾取用户查看标有这些分类的列的操作。\n\n现代版本的\
    \ SQL Server 包含一个名为`SQL Server Audit`的内置功能。基于扩展事件技术，`审计`提供了众多选项和一个丰富的审计系统。你可以在\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)\
    \ 阅读关于`SQL Server Audit`完整功能的更多信息。\n\n审计以记录格式生成，每个`审计事件`都附带各种属性。SQL Server 2019\
    \ 新增了一个名为`data_sensitivity_information`的审计事件属性。例如，如果你正在对某些表（你已在这些表的列上添加了敏感度分类）上的`SELECT`语句进行审计，并且这些列是`SELECT`“列表”的一部分以查看数据，那么`data_sensitivity_information`列将显示此次访问。\n\
    \n让我们延续之前的例子，看看审计如何与敏感度分类协同工作。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg](img/479130_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** 对带有分类的表进行单次表扫描的审计\n\n1.  由于你可能多次运行这些示例，并且不想每次都必须还原数据库，首先运行脚本 `dropsqlaudit.sql`。\n\
    \n    ```sql\n    -- Step 1: Disable the audits and drop them\n    USE WideWorldImporters\n\
    \    GO\n    IF EXISTS (SELECT * FROM sys.database_audit_specifications WHERE\
    \ name = 'People_Audit')\n    BEGIN\n    ALTER DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    WITH (STATE = OFF)\n    DROP DATABASE AUDIT SPECIFICATION People_Audit\n\
    \    END\n    GO\n    USE master\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits\
    \ WHERE name = 'GDPR_Audit')\n    BEGIN\n    ALTER SERVER AUDIT GDPR_Audit\n \
    \   WITH (STATE = OFF);\n    DROP SERVER AUDIT GDPR_Audit\n    END\n    GO\n \
    \   -- Step 2: Remove the .audit files from default or your path\n    -- del C:\\\
    program files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\GDPR*.audit\n\
    \    ```\n\n    注意，步骤 2 是脚本中用于删除文件的注释。当你运行审计时，它会在你指定的路径中创建文件。当你禁用并删除审计后，这些文件仍会留在该目录中。为了保持示例干净，请手动删除之前执行留下的任何文件。\n\
    \n2.  打开脚本 `setupsqlaudit.sql` 以创建并启动审计。我不会深入探讨审计和规范如何工作的细节。通过我提供的语法，你可以看到审计被设置为跟踪\
    \ `WideWorldImporters` 数据库中 `[Application].[People]` 表上的 `SELECT` 语句。请查阅审计相关文档以了解更多：[`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)。\n\
    \n    ```sql\n    USE master\n    GO\n    -- Create the server audit.\n    CREATE\
    \ SERVER AUDIT GDPR_Audit\n    TO FILE (FILEPATH = 'C:\\program files\\microsoft\
    \ sql server\\mssql15.mssqlserver\\mssql\\data')\n    GO\n    -- Enable the server\
    \ audit.\n    ALTER SERVER AUDIT GDPR_Audit\n    WITH (STATE = ON)\n    GO\n \
    \   USE WideWorldImporters\n    GO\n    -- Create the database audit specification.\n\
    \    CREATE DATABASE AUDIT SPECIFICATION People_Audit\n    FOR SERVER AUDIT GDPR_Audit\n\
    \    ADD (SELECT ON Application.People BY public )\n    WITH (STATE = ON)\n  \
    \  GO\n    ```\n\n3.  现在让我们运行一些查询，看看审计了什么。打开脚本 `findpeople.sql`，并按照脚本中的注释指导运行步骤\
    \ 1 和步骤 2：\n\n    ```sql\n    -- Step 1: Scan the table and see if the sensitivity\
    \ columns were audited\n    USE WideWorldImporters\n    GO\n    SELECT * FROM\
    \ [Application].[People]\n    GO\n    -- Step 2: Check the audit\n    -- The audit\
    \ may not show up EXACTLY right after the query but within a few seconds.\n  \
    \  SELECT event_time, session_id, server_principal_name,\n    database_name, object_name,\n\
    \    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\n    你的结果应如图 3-11 所示。\n\n    在这个例子中，你运行了一个从 `People` 表中选择所有列的查询。`fn_get_audit_file`\
    \ T-SQL 函数用于以行/列格式检索审计结果。我仅从此函数的结果集中提取了部分列。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql)\
    \ 查看此函数的所有参数和输出列的完整列表。\n\n    第一行是审计已启动的记录。第二行是对 `SELECT` 语句的审计记录。注意 `data_sensitivity_information`\
    \ 列值是 XML 数据类型。点击该值，SSMS 将打开一个包含完整 XML 数据的新窗口。你的结果应如图 3-12 所示。\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg](img/479130_1_En_3_Fig12_HTML.jpg)\n\
    \n    **图 3-12** 数据敏感度详情\n\n    XML 的详细信息包含 `SELECT` 语句访问的任何唯一`标签`和`信息类型`的属性。你现在可以获取此信息，并通过\
    \ `sys.sensitivity_classifications` 目录视图查找哪些列与这些详细信息相关联。\n\n4.  现在执行 `findpeople.sql`\
    \ 中的步骤 3 和步骤 4：\n\n    ```sql\n    -- Step 3: What if I access just one of the\
    \ columns directly?\n    SELECT FullName FROM [Application].[People]\n    GO\n\
    \    -- Step 4: Check the audit\n    -- The audit may not show up EXACTLY right\
    \ after the query but within a few seconds.\n    SELECT event_time, session_id,\
    \ server_principal_name,\n    database_name, object_name,\n    cast(data_sensitivity_information\
    \ as XML) as data_sensitivity_information,\n    client_ip, application_name\n\
    \    FROM sys.fn_get_audit_file ('C:\\program files\\microsoft sql server\\mssql15.mssqlserver\\\
    mssql\\data\\*.sqlaudit',default,default)\n    GO\n    ```\n\n    步骤 4 的结果应如图\
    \ 3-13 所示。\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg](img/479130_1_En_3_Fig13_HTML.jpg)\n\
    \n    **图 3-13** 包含对一个标记为分类的列进行`SELECT`操作的审计\n\n    审计中存在第三行（每次`SELECT`操作会产生一行）。如果你点击\
    \ `data_sensitivity_information` 列，你将只看到一个标签，因为只选择了 `FullName` 列。\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg](img/479130_1_En_3_Fig14_HTML.jpg)\n\
    \n    **图 3-14** `WHERE`子句中对分类列的审计结果\n\n5.  审计只会在分类的某个列是`SELECT`*列表*或查询输出的一部分时，才会跟踪对该分类的访问。让我们来验证一下。运行\
    \ `findpeople.sql` 中的步骤 5 和步骤 6："
- fmt: '```

    -- Step 5: What if I reference a classified column in the WHERE clause only?

    SELECT PreferredName FROM [Application].[People]

    WHERE EmailAddress LIKE ''%microsoft%''

    GO

    -- Step 6: Check the audit

    -- The audit may not show up EXACTLY right after the query but within a few seconds.

    SELECT event_time, session_id, server_principal_name,

    database_name, object_name,

    cast(data_sensitivity_information as XML) as data_sensitivity_information,

    client_ip, application_name

    FROM sys.fn_get_audit_file (''C:\program files\microsoft sql server\mssql15.mssqlserver\mssql\data\*.sqlaudit'',default,default)

    GO

    ```


    Step 6 的结果应如图 [3-14](#479130_1_En_3_Chapter.xhtml#Fig14) 所示。


    在此示例中，查询使用 `EmailAddress` 列作为条件，为 `PreferredName` 列生成结果。`PreferredName` 未被分类，但
    `EmailAddress` 已被分类。然而，由于 `EmailAddress` 不是 `SELECT` 列表的一部分，`data_sensitivity_information`
    列不会被填充。


    数据分类是 SQL Server 2019 中一个简单但非常强大的新功能，您可以将其添加到保持数据安全和确保组织符合任何监管政策的工具集中。此功能在 SQL
    Server 2019 和 Azure SQL Database 中均有效。请查阅我们团队关于信息保护的完整指南：[`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification)。


    ## 其他新安全功能


    SQL Server 2019 中还有其他一些次要但重要的新安全功能，包括 TDE 的暂停和恢复，以及简化的 SQL Server 加密证书管理。


    ### TDE 暂停和恢复


    透明数据加密（TDE）专注于对*静止*数据进行加密。这允许您独立于 SQL Server 引擎加密 SQL Server 数据库和日志文件。这样，如果有人试图访问您的数据库和/或事务日志文件，文件中的数据将被加密。TDE
    已经是几个版本中都有的功能；您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)
    阅读更多关于如何使用它的信息。


    当您为现有数据库启用 TDE 时，SQL Server 必须将*每个*数据库页从磁盘读入缓冲池，并将其写回已加密的数据库文件。加密在后台工作线程中进行，因此不会直接影响用户工作负载，但读取和写入所有数据库页可能非常密集，并消耗
    CPU 和 I/O 资源。对于非常大的数据库，这可能会影响关键任务应用程序。


    SQL Server 2019 引入了 TDE 加密的*暂停*和*恢复*概念。现在，您可以为数据库启用 TDE，但随后在任何时候暂停加密，并从暂停的最后一个点恢复加密。这允许您根据应用程序需求有效地安排使用
    TDE 对数据库进行完整加密。


    暂停 TDE 很简单，只需运行以下 T-SQL 语句：

    ```

    ALTER DATABASE  SET ENCRYPTION SUSPEND

    ```

    从暂停点恢复加密过程可以通过以下 T-SQL 语句完成：

    ```

    ALTER DATABASE  SET ENCRYPTION RESUME

    ```

    为了帮助诊断此新功能，DMV `sys.dm_database_encryption_keys` 有三个新列来查看 TDE 扫描的状态：

    *   `encryption_scan_state` – 一个数字，指示 TDE 扫描是正在进行、已暂停还是已完成

    *   `encryption_scan_state_desc` – 扫描状态的字符串描述，例如 RUNNING、SUSPENDED、COMPLETE

    *   `encryption_scan_modify_date` – 扫描状态最后一次更改的日期/时间


    这是对在非常大的 SQL Server 数据库中使用 TDE 的一个重要但微小的增强。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)
    阅读更多关于 TDE 暂停和恢复的信息。


    ### 证书管理


    假设您想要加密到 SQL Server 的连接，这是确保客户端应用程序和 SQL Server 之间的表格数据流（TDS）协议被加密的常见做法。当您使用 TLS
    等协议设置加密时，需要证书。Windows 上的 SQL Server 提供了一种通过流行的程序 SQL Server 配置管理器使用证书的机制。但是，您必须首先完成所有工作，在服务器甚至多台服务器（用于故障转移群集实例（FCI）或
    Always On 可用性组）上安装证书。


    图 [3-15](#479130_1_En_3_Chapter.xhtml#Fig15) 显示了 SQL Server 配置管理器的对话框，用于选择要用于
    SQL Server 2017 的已安装证书。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg)


    图 3-15 SQL Server 2017 和证书管理


    SQL Server 2019 现在通过 SQL Server 配置管理器提供了导入证书的能力，甚至可以在故障转移群集实例或可用性组的节点之间导入证书——并且您可以从主实例执行所有这些操作。图
    [3-16](#479130_1_En_3_Chapter.xhtml#Fig16) 显示了 SQL Server 2019 上 SQL Server 配置管理器的对话框。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg)


    图 3-16 SQL Server 2019 和配置管理


    请注意此对话框上的新“导入”按钮。您可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates)
    阅读有关如何在单台服务器或群集上使用此功能的所有说明。


    ## 总结


    建立在 SQL Server 2016 的丰富功能（如 Always Encrypted、行级安全和动态数据屏蔽）之上，SQL Server 2019 引入了新的安全功能，如安全飞地、数据敏感度分类、TDE
    暂停/恢复以及更简单的证书管理。所有这些，加上 SQL Server 以前版本中内置的所有安全功能，提供了一个正确的平台，以保持您的数据安全、可信、合规且可管理。'
  raw: "```\n    -- Step 5: What if I reference a classified column in the WHERE clause\
    \ only?\n    SELECT PreferredName FROM [Application].[People]\n    WHERE EmailAddress\
    \ LIKE '%microsoft%'\n    GO\n    -- Step 6: Check the audit\n    -- The audit\
    \ may not show up EXACTLY right after the query but within a few seconds.\n  \
    \  SELECT event_time, session_id, server_principal_name,\n    database_name, object_name,\n\
    \    cast(data_sensitivity_information as XML) as data_sensitivity_information,\n\
    \    client_ip, application_name\n    FROM sys.fn_get_audit_file ('C:\\program\
    \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\*.sqlaudit',default,default)\n\
    \    GO\n    ```\n\nThe results of Step 6 should look like Figure [3-14](#479130_1_En_3_Chapter.xhtml#Fig14).\n\
    \nIn this example, the query produces results for the PreferredName column using\
    \ the EmailAddress column as criteria. PreferredName is not included in a classification\
    \ but EmailAddress is. But because EmailAddress is not part of the SELECT list,\
    \ the data_sensitivity_information column is not populated.\n\nData classification\
    \ is a simple but very powerful new capability in SQL Server 2019 you can add\
    \ to your toolkit for keeping data secure and your organization compliant to any\
    \ regulatory policies. The feature works both in SQL Server 2019 and Azure SQL\
    \ Database. Take a look at the complete guide from our team on Information Protection\
    \ at [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification)\
    \ .\n\n## Other New Security Features\n\nThere are a few other minor but important\
    \ new security features in SQL Server 2019, including pause and resume for TDE,\
    \ and simpler certificate management for encryption for SQL Server.\n\n### TDE\
    \ Pause and Resume\n\nTransparent Data Encryption (TDE) is all about data encryption\
    \ *at rest*. This allows you to encrypt the SQL Server database and log files\
    \ independent of the SQL Server engine. This way, if someone attempts to obtain\
    \ access to your database and/or transaction log files, the data in the files\
    \ will be encrypted. TDE has been a feature for several releases; you can read\
    \ more about how to use it at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)\
    \ .\n\nWhen you enable TDE for an existing database, SQL Server must read ***every***\
    \ database page from disk into the buffer pool and write it back out to the database\
    \ file encrypted. The encryption happens in a background worker thread so it doesn’t\
    \ directly impact user workloads, but reading and writing all database pages can\
    \ be intensive and consume CPU and I/O resources. For a very large database, this\
    \ can impact a mission-critical application.\n\nSQL Server 2019 introduces the\
    \ concept of *pause* and *resume* for TDE encryptions. Now you can enable TDE\
    \ for a database but then suspend the encryption at any point and resume the encryption\
    \ from the last point it was suspended. This allows you to effectively schedule\
    \ the full encryption of the database using TDE per your application needs.\n\n\
    Suspending TDE is as simple as running the following T-SQL statement:\n\n```\n\
    ALTER DATABASE  SET ENCRYPTION SUSPEND\n```\n\nResuming the encryption process\
    \ where it was suspended can be done with the following T-SQL statement:\n\n```\n\
    ALTER DATABASE  SET ENCRYPTION RESUME\n```\n\nTo help with diagnostics for this\
    \ new capability, the DMV **sys.dm_database_encryption_keys** has three new columns\
    \ to see the state of the TDE scan:\n\n*   **encryption_scan_state** – A number\
    \ indicating if the TDE scan is in progress, suspended, or completed\n\n*   **encryption_scan_state_desc** –\
    \ A string description of the scan state such as RUNNING, SUSPENDED, COMPLETE\n\
    \n*   **encryption_scan_modify_date** – A date/time for the last time the scan\
    \ state changed\n\nThis is a minor but important enhancement to using TDE with\
    \ very large SQL Server databases. You can read more about TDE pause and resume\
    \ at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)\
    \ .\n\n### Certificate Management\n\nLet’s say you want to encrypt connections\
    \ to SQL Server, a common practice to ensure the Tabular Data Stream (TDS) protocol\
    \ between client applications and SQL Server is encrypted. When you set encryption\
    \ with a protocol like TLS, you need certificates. SQL Server on Windows provides\
    \ a mechanism to use certificates through the popular program SQL Server Configuration\
    \ Manager. However, you must first do all the work to install the certificate\
    \ on the server or even on multiple servers for a Failover Cluster Instance (FCI)\
    \ or an Always On Availability Group.\n\nFigure [3-15](#479130_1_En_3_Chapter.xhtml#Fig15)\
    \ shows a SQL Server Configuration Manager dialog box to choose an installed certificate\
    \ to use with SQL Server 2017.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nSQL Server 2017 and certificate management\n\nSQL Server 2019\
    \ now includes the ability through SQL Server Configuration Manager to import\
    \ a certificate and even import certificates across nodes of a Failover Cluster\
    \ Instance or Availability Group – and you can perform it all from the primary\
    \ instance. Figure [3-16](#479130_1_En_3_Chapter.xhtml#Fig16) shows a dialog box\
    \ for SQL Server Configuration Manager on SQL Server 2019.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16\n\nSQL Server 2019 and configuration management\n\nNotice the new\
    \ Import button on this dialog box. You can read all the instructions for how\
    \ to use this on a single server or cluster at [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates)\
    \ .\n\n## Summary\n\nBuilt on the rich capabilities of SQL Server 2016 such as\
    \ Always Encrypted, row-level security, and dynamic data masking, SQL Server 2019\
    \ introduces new security features such as Secure Enclaves, data sensitivity classification,\
    \ TDE suspend/resume, and easier certificate management. All of this, combined\
    \ with all the security features built into SQL Server from previous releases,\
    \ provides the right platform to keep your data secure, trusted, compliant, and\
    \ manageable."
