    *   Azure announced the general availability of **Ultra Disk Storage** or **Ultra
    SSD**. Ultra SSD provides low-latency, extremely fast performance in the cloud,
    which matches very well to I/O-intensive SQL Server workloads. You can read about
    the announcement for Ultra SSD at [`https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/`](https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/)
    . If you want to see Ultra Disk Storage in action with SQL Server, check out the
    recording of this Microsoft Ignite session in 2018: [`https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/`](https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/)
    . If you look about 46 minutes into this recording, you might recognize this presenter
    as he shows SQL Server performance with Ultra Disk Storage.


    ### SQL Server Migration Assistant


    Some of you reading this book may not be using SQL Server or may have other assets
    in your organization for other database products such as Oracle, mySQL, and DB2\.
    I covered in Chapter [9](#479130_1_En_9_Chapter.xhtml) how to use Polybase to
    access these data sources. But what if you want to migrate your database and application
    from these products to SQL Server?


    We have a free tool to assist you with migrations to SQL Server (and Azure) from
    other “third-party” database solutions. This tool is called the **SQL Server Migration
    Assistant**. The right-hand side of Figure [11-3](#479130_1_En_11_Chapter.xhtml#Fig3)
    shows the possibilities with this tool. You can read more about this tool, how
    to deploy it, and how to use it successfully for a migration at [`https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant)
    .


    Figure [11-7](#479130_1_En_11_Chapter.xhtml#Fig7) shows a screenshot of using
    SSMS to migrate from Oracle.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Using SSMS to migrate from Oracle to SQL Server


    SSMA comes as a series of tools, one for each type of third-party product supported
    for migration. Like DMA and DEA, SSMS also has a command-line interface (CLI).
    You can read more about the syntax of SSMS for Oracle at [`https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`](https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql)
    .


    ## Summary


    In this chapter, I’ve shown numerous enhancements to SQL Server 2019 based on
    customer feedback and our experiences working directly with customers. Each of
    these may not seem like major enhancements, but, collectively, they represent
    key innovation to enhance the performance, user experience, and diagnostics of
    SQL Server.


    I’ve also discussed how to plan and execute a migration to SQL Server 2019 including
    tools, strategies, and the use of database compatibility for functional and performance
    protection.


    This chapter marks the end of our journey together in this book with SQL Server
    2019\. I hope you have enjoyed reading and learning about SQL Server 2019 as much
    as I enjoyed writing about it. For many of you, this will really be the beginning
    of your journey with SQL Server 2019\. For me, you will continue to hear me speak
    and talk about SQL Server 2019. But I’ll also be looking into the future for our
    next release, our rapid pace of work in the cloud, and the next set of innovation
    that makes SQL Server a truly unique product in the industry.


