  trans: "\n\n## 增强我们已构建的功能\n\n在阅读并使用了关于性能的非常长的章节示例后，你可能会看着本章的页数问自己：“嘿，安全性不重要吗？”答案绝对是肯定的！对于\
    \ `SQL Server`，安全性是整个数据平台非常重要的一部分。\n\n在 `SQL Server 2019` 中，新的安全功能及其旨在应对的*挑战*包括：\n\
    \n*   **`具有安全飞地的始终加密 (Always Encrypted with Secure Enclaves)`**\n\n    提供一种端到端的加密解决方案，但不限制应用程序的查询能力。\n\
    \n*   **数据分类与审计**\n\n    为 `SQL Server` 对象提供内置的分类系统，并对查看标记为分类数据的操作进行审计。\n\n* \
    \  **`透明数据加密 (TDE)` 挂起与恢复**\n\n    提供一种机制来调度针对数据库的高开销“静态”加密操作。\n\n*   **证书管理**\n\
    \n    使 `SQL Server` 中的证书管理更加简便，包括故障转移集群实例和 Always On 可用性组场景。\n\n这看起来可能不是一个很大的改进集合，但每个新功能都试图解决客户面临的重要安全问题，并且都源自他们的反馈。例如，将数据分类功能专门内置于\
    \ `SQL Server` 中是为了满足《通用数据保护条例》(`GDPR`)的合规要求，但它也可以用于许多分类和审计需求。\n\n同样重要的是要记住，`SQL\
    \ Server 2019` 附带了 `SQL Server 2016` 中引入的一套丰富的安全功能。这包括：\n\n*   始终加密\n*   动态数据屏蔽\n\
    *   行级安全性\n*   硬件加速的透明数据加密性能\n\n你可以在以下网址阅读所有这些安全功能： [`https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016?view=sql-server-2017#security-enhancements`](https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016%253Fview%253Dsql-server-2017%2523security-enhancements)。\n\
    \n必须记住，近十年来，根据美国国家标准与技术研究院 (`NIST`) 运行的国家漏洞数据库 (`NVD`) 的追踪，`SQL Server` 一直是漏洞最少的数据库和数据平台——并且领先幅度很大。你可以在以下网址查看所有这些详细信息：\
    \ [`https://nvd.nist.gov/`](https://nvd.nist.gov/)。\n\n让我们更详细地了解 `SQL Server 2019`\
    \ 的每个新安全功能，首先从 `具有安全飞地的始终加密` 开始。\n\n## 具有安全飞地的始终加密\n\n在 `SQL Server 2016` 之前，你有几种加密数据的方法，包括：\n\
    \n*   **加密连接** – 客户端应用程序与 `SQL Server` 之间交换的所有数据（`TDS` 协议数据）都经过加密。\n*   使用 **`T-SQL`**\
    \ 在 `SQL Server` 表中**加密数据**（有时称为列级或单元级加密）。\n*   **`透明数据加密 (TDE)`** – 加密*静态*数据，或为\
    \ `SQL Server` 数据库文件在文件级别加密数据。\n\n这些解决方案都不提供“端到端”加密机制。更重要的是，`SQL Server` 管理员控制着用于加密数据的密钥。因此，不存在*职责分离*的概念。在当今要求严苛的安全环境中，应用程序所有者（即业务所有者）希望完全控制其数据的安全性。他们希望数据库管理员等角色管理数据平台基础设施，但不能访问业务数据或用于控制对该数据访问的密钥。\n\
    \n在 `SQL Server 2016` 中，我们引入了一个名为 `始终加密` 的功能来解决这些问题。`始终加密` 源自微软研究院的项目。正如微软首席软件工程师\
    \ Raghav Kaushik 所述，“...有两个项目值得一提。一个是位于雷德蒙德微软研究院的 Cipherbase 项目，旨在构建对加密数据的查询处理；另一个是位于剑桥微软研究院的\
    \ Trusted Cloud 项目，更侧重于围绕安全硬件的构建模块。”\n\n图 3-1 展示了 `始终加密` 的架构和流程示例。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig1_HTML.jpg](img/479130_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1\n`SQL Server 2016` 中的 `始终加密`\n\n其概念是客户端应用程序及其所有者控制加密生命周期。所有数据在从客户端应用程序传递到\
    \ `SQL Server` 时都是加密的，在 `SQL Server` 中以加密形式存储（在列级），并以加密形式发回客户端应用程序。只有客户端应用程序可以在应用层解密数据。此外，用于加密和解密数据的密钥实际上并不存储在\
    \ `SQL Server` 中。这些密钥的位置（由应用程序所有者拥有）存储在 `SQL Server` 中，但对这些密钥的访问由应用程序控制。\n\n这听起来是个很棒的解决方案，但有一个缺点。因为所有的解密都发生在客户端应用程序中，所以某些查询模式不允许在数据上进行（例如，只允许相等的\
    \ `WHERE` 子句）。此外，不支持对使用 `始终加密` 加密的数据建立索引。鉴于客户端应用程序是唯一进行解密的地方，无法真正使用 `始终加密` 来构建索引。`SQL\
    \ Server` 必须将作为索引一部分的加密列的所有数据发送到客户端应用程序以构建索引，然后再将其发送回服务器。因此，尽管 `始终加密` 的承诺很好，但这些限制使其...嗯，在多种场景下受到限制。\n\
    \n有解决方案吗？有，它以一种称为*安全飞地*的概念形式出现。\n\n### 为什么需要飞地？\n\n韦氏词典将飞地（enclave）定义为“被外国领土包围或似乎包围的独特领土、文化或社会单元”([`www.merriam-webster.com/dictionary/enclave`](http://www.merriam-webster.com/dictionary/enclave))。在计算机术语中，它是一个安全且独立于敌对入侵者的受保护区域。那些入侵者可能是黑客，但不幸的是，也可能是管理员或\
    \ DBA。\n\n英特尔在其芯片组中发布了飞地的概念，称为软件防护扩展 (`SGX`)，你可以在以下网址阅读相关信息： [`https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave`](https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave)。`SGX`\
    \ 在 `CPU` 中提供指令，允许创建受保护的内存区域，用于安全加密并提供免受入侵的安全避风港。这很有趣，但如果你恰好没有 `SGX` 芯片怎么办？微软提出了一种*虚拟化*飞地解决方案，称为基于虚拟化的安全\
    \ (`VBS`) 内存飞地。你可以在以下网址阅读有关 `VBS` 的所有详细信息： [`www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/`](https://www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/)。\n\
    \n这对 `始终加密` 意味着什么，为什么这很重要？\n"
- fmt: '### Using Always Encrypted with Enclaves


    Enclaves provide a unique solution for Always Encrypted for the “index problem.”
    The data moving from the client application to SQL Server and back is still completely
    encrypted. And so is the data within SQL Server memory and on disk. However, when
    the data needs to be decrypted, for example, to build an index or support `rich
    computations`, the decryption can happen in the enclave on the server. The enclave
    is a secure region of memory in the SQL Server process space. This memory region
    is small and tightly integrated into the engine express services with enclave
    APIs. Rich computations are queries that require range queries or pattern matching
    (i.e., `LIKE`). Enclaves provide that capability now for Always Encrypted solutions.


    Consider Figure [3-2](#479130_1_En_3_Chapter.xhtml#Fig2) from the SQL Server documentation
    page ([`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves)),
    which shows how enclaves support decryption in a secure manner but also provide
    more flexibility for applications.


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig2_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Always Encrypted with Secure Enclaves


    Configuring Always Encrypted has never been for the mild SQL Server user. It is
    a complex solution for a complex problem. But it is powerful, especially now with
    enclaves.


    Always Encrypted with Secure Enclaves requires another important component called
    an `attestation` Service. An attestation service is used by a client application
    to verify that an enclave used for encryption can be trusted. For `VBS` enclaves,
    Windows provides the `Windows Defender System Guard` runtime attestation (which
    uses something called the Host Guardian Service (`HGS`)). You can read more about
    `Windows Defender System Guard` at [`www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/`](https://www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/).
    You can also read more details about how applications communicate with Secure
    Enclaves at [`https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave`](https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave).


    In addition to setting up a `VBS` and configuring the Host Guardian Service, your
    application has to use a provider that supports communicating with an enclave.
    You can read the details of provider support for enclaves at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#secure-enclave-providers`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23secure-enclave-providers).


    At time of authoring this book, SQL Server has not yet officially supported hardware
    enclaves as provided by chip manufacturers such as `Intel SGX`. I expect that
    support to come soon, and you can stay in touch with the Always Encrypted documentation
    on enclaves for updates at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#why-use-always-encrypted-with-secure-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23why-use-always-encrypted-with-secure-enclaves).
    Today `Linux` does not support a virtual enclave like `VBS`. However, once hardware
    enclave support is supported by SQL Server, I expect `Linux` support to come not
    long after.


    I did not build an example for you to go through to set up and use Always Encrypted
    with enclaves. As I said earlier in the chapter, this is not a feature for the
    mild SQL Server user. It is an enterprise feature and takes some time to set up.
    But once set up, it is very powerful. Jakub Szymaszek, Senior Program Manager
    and lead for Always Encrypted, has provided several valuable resources on the
    topic.


    Use the following GitHub repo to go through an example yourself with Always Encrypted
    using a `VBS` enclave, [`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves).
    Jakub also did an excellent presentation at Microsoft Ignite for you to get more
    details on Always Encrypted with enclaves at [`https://myignite.techcommunity.microsoft.com/sessions/65357#ignite-html-anchor`](https://myignite.techcommunity.microsoft.com/sessions/65357%23ignite-html-anchor).


    ## Data Classification


    With the launch of SQL Server 2017, our security group within the SQL Server engineering
    team built a tool in SQL Server Management Studio (`SSMS`) to help customers `classify`
    data within a SQL Server database. This tool encompassed a wizard, a set of `T-SQL`
    logic, and a report. Figure [3-3](#479130_1_En_3_Chapter.xhtml#Fig3) shows the
    Data Classification wizard in `SSMS`.


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Data Classification wizard in SSMS


    One of the drivers behind building a tool like this was the growing trend in companies
    and regulatory agencies for privacy. And especially important was the pending
    General Data Protection Regulation (`GDPR`) being established by the European
    Union ([`https://eugdpr.org/`](https://eugdpr.org/)).'
