  trans: "## 示例的先决条件\n\n本章中的所有示例都依赖于跨平台 CLI 工具 `kubectl`。您应该能够将任何使用 `kubectl` 的 k8s\
    \ 发行版与本章中的示例配合使用。\n\n我使用 Azure Kubernetes Service (`AKS`) 来部署我的 k8s 集群以运行所有示例。因此，当您将我的示例用于您的\
    \ k8s 发行版时，可能会存在两个差异：\n\n*   `存储类` – 我的示例使用了 Azure 磁盘的存储类。您需要将其替换为特定于您平台的存储类。\n\
    *   `负载均衡器` – 我的示例为服务使用了负载均衡器类型，但这仅在 k8s 云提供商中实现。如果您不是为 k8s 使用云提供商，您将需要使用一种名为\
    \ `NodePort` 的服务类型。您可以在 [`https://kubernetes.io/docs/concepts/services-networking/#nodeport`](https://kubernetes.io/docs/concepts/services-networking/%2523nodeport)\
    \ 阅读更多关于 `NodePort` 的信息。\n\n除此之外，本章中的这些示例应该能在您配置的任何 k8s 平台上运行。\n\n如果您使用 `AKS`，我根据文档\
    \ [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough)\
    \ 中的步骤创建了我的 `AKS` 集群。\n\n**`createaksrg.sh`**\n```\naz group create --name bwaks\
    \ --location eastus2\n```\n\n**`createaks.sh`**\n```\naz aks create \\\n--resource-group\
    \ bwaks \\\n--name bwsqlaks \\\n--node-count 2 \\\n--enable-addons monitoring\
    \ \\\n--generate-ssh-keys\n```\n\n**`connectoaks.sh`**\n```\naz aks get-credentials\
    \ --resource-group bwaks --name bwsqlaks\n```\n\n您可以在 `ch8_sql_on_k8s` 目录中看到我用于创建资源组、创建集群和连接到集群的脚本及命令。尽管这些是\
    \ Bash shell 脚本，但您可以在支持 Azure CLI 的地方运行这些命令。我喜欢使用 Azure Cloud Shell（我将在这些示例中展示），因为其中内置了\
    \ Azure CLI。如果您想使用某个平台，您需要在 [`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli?view=azure-cli-latest`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli%253Fview%253Dazure-cli-latest)\
    \ 安装 Azure CLI。\n\n我还建议您安装 Kubernetes Visual Studio Code 扩展，以协助使用 k8s 集群和对象。我本想将其安装在\
    \ Azure Data Studio 上。为此，您需要下载以下扩展：\n*   [`https://marketplace.visualstudio.com/items?itemName=redhat.vscode-yaml`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.vscode-yaml)\n\
    *   [`https://marketplace.visualstudio.com/items?itemName=ms-kubernetes-tools.vscode-kubernetes-tools`](https://marketplace.visualstudio.com/items%253FitemName%253Dms-kubernetes-tools.vscode-kubernetes-tools)\n\
    \n要使用此扩展，您还需要从 [`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/)\
    \ 安装 `kubectl`。\n\n要了解有关如何使用 Azure Data Studio 安装扩展的更多信息，请参阅文档 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions)。\n\
    \n正如我所说，对我来说，我喜欢在 Azure Cloud Shell 中使用这些示例。Azure Cloud Shell 同时支持 PowerShell\
    \ 和 bash，并包含许多内置工具，如 Azure CLI、`kubectl`，甚至 `sqlcmd`。您可以在 [`https://azure.microsoft.com/en-us/features/cloud-shell`](https://azure.microsoft.com/en-us/features/cloud-shell)\
    \ 阅读更多关于 Azure Cloud Shell 的信息。\n\n无论您使用什么客户端或 k8s 发行版，只要您能运行 `kubectl`，您就可以使用这些示例。\n\
    \n## 在 k8s 上部署 SQL Server\n\n对于本节中的示例，让我向您展示如何部署一个包含单个 SQL Server 容器的 pod。\n\n\
    您将需要一个用于 `sa` 密码的 secret，用于数据库的存储，以及一个用于连接到 SQL Server 的负载均衡器。所有这些都将通过一系列 `kubectl`\
    \ 命令和声明式的 `YAML` 文件来完成。\n\n此外，我建议您使用 k8s 中的命名空间概念来创建自己的 pod。命名空间为您在 k8s 集群中创建的对象（例如\
    \ pod）提供了一个作用域，使其与其他对象分离。命名空间提供了一个非常好的机制来组织和管理您的 k8s 对象。\n\n让我们一步一步地完成在 pod 中部署和连接到\
    \ SQL Server 容器的过程。这些步骤假设您有一个现有的 k8s 集群。我按照先决条件中描述的那样，使用 `AKS` 创建了一个双节点集群，但即使是单节点集群也可以工作。\n\
    \n当我进行这些示例时，我使用了 Azure Cloud Shell，它可以从任何浏览器运行，如图 8-1 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig1_HTML.jpg](img/479130_1_En_8_Fig1_HTML.jpg)\n\
    *图 8-1 使用 Azure Cloud Shell 运行 Kubernetes*\n\n我喜欢 Azure Cloud Shell。有一次，我在飞回德克萨斯州的航班上，笔记本电脑的电池没电了。我需要为正在构建的演示做一些与\
    \ `AKS` 相关的工作。我的 iPhone 还有电，而且我听说过 Azure 应用（[`https://apps.apple.com/us/app/microsoft-azure/id1219013620`](https://apps.apple.com/us/app/microsoft-azure/id1219013620)）。我安装了该应用，使用我的订阅登录，并浏览了我的\
    \ Azure 资源。然后我注意到该应用有一个云 Shell 选项。我选择了它，现在我又能继续工作了。图 8-2 展示了我从手机使用 Azure Cloud\
    \ Shell 的示例。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig2_HTML.jpg](img/479130_1_En_8_Fig2_HTML.jpg)\n\
    *图 8-2 移动的 k8s 用户*\n\n我记得当时坐在一位正在手机上玩 Candy Crush 的乘客旁边。他看到我做的事，问道：“你在玩什么游戏？”我的回答是：“我正在用\
    \ Cloud Shell 部署一个 Kubernetes 集群。”他回去玩他的游戏了，毫无疑问在想这个怪人玩的是什么“Kubernetes 游戏”。\n\n\
    部署的示例脚本可以在 `ch8_sql_on_k8s\\deploy` 目录中找到。确保使用 `chmod u+x <script>` 为 shell 脚本设置执行权限。另外，如果您想在\
    \ Azure Cloud Shell 中运行这些脚本，请阅读以下关于上传这些示例脚本的文档（[`https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage#transfer-local-files-to-cloud-shell`](https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage%2523transfer-local-files-to-cloud-shell)）。请记住，Azure\
    \ Cloud Shell 的最大优势在于它只需要一个浏览器，并且所有工具如 `kubectl`、`az` 和 `sqlcmd` 都已预先安装。\n\n开始在\
    \ `AKS` 中部署 SQL Server 的示例：\n\n1.  使用以下命令或脚本 `step1_create_namespace.sh` 创建一个命名空间：\n\
    \    ```\n    kubectl create namespace mssql\n    ```\n    您应该会收到这条指示命名空间已创建的消息：\n\
    \    ```\n    namespace/mssql created\n    ```\n    您也可以通过运行此命令来验证命名空间是否已创建：\n\
    \    ```\n    kubectl get namespaces\n    ```\n    在我的集群上，我得到了以下结果。其他命名空间是 k8s\
    \ 集群自带的。\n    ```\n    NAME          STATUS   AGE\n    default       Active  \
    \ 2d10h\n    kube-public   Active   2d10h\n    kube-system   Active   2d10h\n\
    \    mssql         Active   56s\n    ```"
- fmt: "2.  我希望我所有的对象都在新的 `mssql` 命名空间中创建。在创建对象时，我可以显式地使用命名空间，也可以使用以下命令（或使用脚本 **step2_setcontext.sh**）设置新命名空间的默认上下文。请替换你的集群和用户名。你可以使用命令\
    \ `kubectl config view` 来找到这些信息。\n\n```\nkubectl config set-context mssql --namespace=mssql\
    \ --cluster=bwsqlaks --user=clusterUser_bwaks_bwsqlaks\nkubectl config use-context\
    \ mssql\n```\n\n如果此命令成功，你应该会看到如下输出：\n\n```\nContext \"mssql\" created.\nSwitched\
    \ to context \"mssql\".\n```\n\n要验证你的上下文是否正确或随时查看它，请运行以下命令：\n\n```\nkubectl config\
    \ current-context\n```\n\n3.  现在，让我们创建用于 SQL Server Pod 的负载均衡器服务。关于负载均衡器和 Azure\
    \ 这样的云服务，我要提醒你注意。Azure 实际上是为你提供一个不会改变的公共 IP 端点，因此你可以将其绑定到 Pod 的私有 IP 地址，无论该地址如何变化。我遇到过负载均衡器服务需要一些时间才能创建的情况。因此，我建议一旦创建它们，就不要删除，除非你正在进行本章演示中的测试。\n\
    \n运行以下命令或脚本 **step3_create_service.sh** 来创建负载均衡器：\n\n```\nkubectl apply -f sqlloadbalancer.yaml\
    \ --record\n```\n\n这是一个使用 YAML 文件以声明方式访问 k8s API 服务器的示例。使用 `kubectl apply` 你实际是在向\
    \ API 服务器发送 API 命令，就像你直接使用 API 编写代码一样（是的，你现在是一名 k8s 程序员了）。\n\n让我们查看 **sqlloadbalancer.yaml**\
    \ 文件来理解这种格式的示例：\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: mssql-service\n\
    spec:\n  selector:\n    app: mssql\n  ports:\n    - protocol: TCP\n      port:\
    \ 31433\n      targetPort: 1433\n  type: LoadBalancer\n```\n\n协议使用标签和值语法。你可以使用的一个参考资源是\
    \ [`https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/`](https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/)\
    \ ，用于确定各种 k8s 对象的确切标签和值集。就我个人而言，我会查看示例，复制它们，然后根据我自己的场景进行修改。\n\n让我们使用这个 YAML 文件来解释一些值。\n\
    \n```\napiVersion: v1\n```\n\n每个 YAML 文件都需要这个 `apiVersion` 字段。这告诉 API 服务器你在使用哪个“版本”的\
    \ API 来进行各种 k8s 操作。你通常应该坚持使用 `v1`，但一些新的 k8s 概念可能需要“beta”或其他版本。在 [`https://kubernetes.io/docs/reference/using-api/api-overview/#api-versioning`](https://kubernetes.io/docs/reference/using-api/api-overview/%2523api-versioning)\
    \ 阅读更多关于 API 版本控制的信息。\n\n```\nkind: Service\n```\n\n这告诉 API 服务器你正在与哪种对象进行交互。在这种情况下，它是一个\
    \ `Service` 对象，它将帮助我们部署一个负载均衡器。你可以在 [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/)\
    \ 阅读更多关于 k8s `Service` 的信息。\n\n```\nmetadata:\n  name: mssql-service\n```\n\n\
    这是服务的名称。你将使用它来管理对象，并将其绑定到另一个对象（如 Pod）。\n\n```\nspec:\n  selector:\n    app: mssql\n\
    \  ports:\n    - protocol: TCP\n      port: 31433\n      targetPort: 1433\n  type:\
    \ LoadBalancer\n```\n\n`spec` 标签允许你定义有关 `Service` 对象的更多详细信息。`selector` 允许你使用“标签”来分组和标识对象。在这种情况下，使用\
    \ **app:mssql** 标签将允许你基于标签在 k8s 中管理和查看对象。我将在本练习中展示一个使用此标签的示例。`app: mssql` 标签对于\
    \ `LoadBalancer` 也很关键，因为它将 `LoadBalancer` 绑定到任何使用相同标签的 Pod（这将是我们的 SQL Server Pod）。\n\
    \n`ports` 部分允许你将外部查看的端口映射到 Pod 内部的端口。这对于 SQL Server 来说是合理的，因为就像你在第 [7](#479130_1_En_7_Chapter.xhtml)\
    \ 章关于容器中学到的，在主机级别不能有多个 SQL Server 监听端口 1433。在这个示例中，当应用程序想要连接到 SQL Server 时，它们将使用\
    \ `Service` 的 IP 地址和端口 31433。我稍后会在示例中向你展示一个连接到 SQL Server `Service` 的巧妙技巧。\n\n\
    `type` 是服务的类型，在这种情况下，是由云提供商实现的 `LoadBalancer` 服务。可以在 [`https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types`](https://kubernetes.io/docs/concepts/services-networking/service/%2523publishing-services-service-types)\
    \ 找到各种服务类型。\n\n当你使用 `apply` 选项和 YAML 文件执行 `kubectl` 时，执行通常是*异步*的。这意味着 `kubectl`\
    \ 命令将立即返回，但 YAML 文件中声明的操作由 API 服务器在后台调度。\n\n在这种情况下，当你为此服务执行 `kubectl apply` 命令时，你的结果应该如下所示：\n\
    \n```\nservice/mssql-service created\n```\n\n这个结果实际上意味着服务创建已被*调度*。如何知道服务是否已准备好使用？有几种方法。首先，你可以运行以下命令：\n\
    \n```\nkubectl get service\n```\n\n你的结果可能如下所示：\n\n```\nNAME            TYPE  \
    \         CLUSTER-IP      EXTERNAL-IP   PORT(S)           AGE\nmssql-service \
    \  LoadBalancer   10.0.150.233    <pending>     31433:32010/TCP   61s\n```\n\n\
    `CLUSTER-IP` 是 k8s 集群内的私有 IP 地址。`EXTERNAL-IP` 将是你可以用于连接 SQL Server 的静态公共 IP。注意\
    \ `PORT` 的值是 `31433:32010`。尽管 SQL Server 在容器中监听端口 1433，但端口 32010 映射到集群内的端口 1433。端口\
    \ 31433 映射到 32010，允许你通过连接 `<EXTERNAL-IP>,<31433>` 来连接 SQL Server，无论 SQL Server\
    \ 的 Pod 位于 k8s 集群内的哪个位置。\n\n注意，在你运行此 `kubectl apply` 命令后立即查看时，`EXTERNAL-IP` 的值是\
    \ `<pending>`。在该值变为有效的 IP 地址之前，你将无法使用 `LoadBalancer`；这可能需要几分钟才能完成。\n\n4.  既然 `LoadBalancer`\
    \ 已被调度创建，让我们创建一个 `secret` 来保存 SQL Server 的 `sa` 密码。使用以下命令或脚本 **step4_create_secret.sh**：\n\
    \n```\nkubectl create secret generic mssql-secret --from-literal=SA_PASSWORD=\"\
    Sql2019isfast\"\n```\n\n当此命令完成时，你应该会看到以下结果，并且 `secret` 应该立即创建：\n\n```\nsecret/mssql-secret\
    \ created\n```"
  raw: "2.  I’d like all of my objects to be created in the new mssql namespace. I\
    \ can explicitly use the namespace as I create objects, or I can set a default\
    \ context of the new namespace with the following commands (or use the script\
    \ **step2_setcontext.sh**). Substitute in your cluster and username. You can find\
    \ this information using the command `kubectl config view`.\n\n```\n    kubectl\
    \ config set-context mssql --namespace=mssql --cluster=bwsqlaks --user=clusterUser_bwaks_bwsqlaks\n\
    \    kubectl config use-context mssql\n    ```\n\nIf this command is successful,\
    \ you should see output like the following:\n\n```\n    Context \"mssql\" created.\n\
    \    Switched to context \"mssql\".\n    ```\n\nTo verify your context is correct\
    \ or to view it at any time, run the following command:\n\n```\n    kubectl config\
    \ current-context\n    ```\n\n3.  Now, let’s create the load balancer service\
    \ to be used for the SQL Server pod. I will caution you about load balancers and\
    \ cloud services like Azure. Azure is effectively providing you a public IP endpoint\
    \ that won’t change, so you can bind this into the private IP address of the pod\
    \ regardless if it changes. I’ve seen scenarios where the load balancer service\
    \ takes some time to create. Therefore, I recommend that, once you create them,\
    \ don’t remove them, unless you are doing tests like the demo from this chapter.\n\
    \nRun the following command or script **step3_create_service.sh** to create the\
    \ load balancer:\n\n```\n    kubectl apply -f sqlloadbalancer.yaml --record\n\
    \    ```\n\nHere is an example of using a YAML file to access the k8s API server\
    \ in a declarative fashion. What you are effectively doing with kubectl apply\
    \ is sending API commands to the API server, just like if you had written code\
    \ using the API directly (yes, you are now a k8s programmer).\n\nLet’s look at\
    \ the **sqlloadbalancer.yaml** file to understand an example of the format:\n\n\
    ```\n    apiVersion: v1\n    kind: Service\n    metadata:\n    name: mssql-service\n\
    \    spec:\n    selector:\n    app: mssql\n    ports:\n    - protocol: TCP\n \
    \   port: 31433\n    targetPort: 1433\n    type: LoadBalancer\n    ```\n\nThe\
    \ protocol uses a label and value syntax. One of the references you can use to\
    \ determine the exact set of labels and values for various k8s objects is at [`https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/`](https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/)\
    \ . Personally, I look at examples, copy them, and modify them for my own scenarios.\n\
    \nLet’s use this YAML file to explain a few of the values.\n\n```\n    apiVersion:\
    \ v1\n    ```\n\nEvery YAML file needs this apiVersion field. This tells the API\
    \ server which “version” of the API you are using for various uses of k8s. You\
    \ should typically stick with v1, but some new concepts of k8s may require a “beta”\
    \ or other versions. Read more about API versioning at [`https://kubernetes.io/docs/reference/using-api/api-overview/#api-versioning`](https://kubernetes.io/docs/reference/using-api/api-overview/%2523api-versioning)\
    \ .\n\n```\n    kind: Service\n    ```\n\nThis tells the API server what kind\
    \ of object you are interacting with. In this case, it is a Service object that\
    \ will help us deploy a load balancer. You can read more about a k8s Service at\
    \ [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/)\
    \ .\n\n```\n    metadata:\n    name: mssql-service\n    ```\n\nThis is the name\
    \ of the service. You will use this to manage the object and also bind this to\
    \ another object like a pod.\n\n```\n    spec:\n    selector:\n    app: mssql\n\
    \    ports:\n    - protocol: TCP\n    port: 31433\n    targetPort: 1433\n    type:\
    \ LoadBalancer\n    ```\n\nThe spec label allows you to define more details about\
    \ the Service object. A selector allows you to use a “label” to group and identify\
    \ an object. In this case, using the **app:mssql** label will allow you to manage\
    \ and view objects in k8s based on a label. I’ll show you an example of using\
    \ this label as part of this exercise. The label of app: mssql is also critical\
    \ for a LoadBalancer, since it binds the LoadBalancer to any pod that uses the\
    \ same label (which will be our SQL Server pod).\n\nThe port section allows you\
    \ to map a port that will be viewed externally with a port inside the pod. This\
    \ makes sense for SQL Server since, just like you learned in Chapter [7](#479130_1_En_7_Chapter.xhtml)\
    \ on containers, you can’t have more than one SQL Server listening on port 1433\
    \ at the host level. In this example, when applications want to connect to SQL\
    \ Server, they will use the IP address of the Service with a port of 31433\\.\
    \ I’ll show you a clever trick to connect to the Service for SQL Server later\
    \ in the example.\n\nThe type is the type of Service which, in this case, is a\
    \ LoadBalancer service implemented by a cloud provider. The various service types\
    \ can be found at [`https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types`](https://kubernetes.io/docs/concepts/services-networking/service/%2523publishing-services-service-types)\
    \ .\n\nWhen you execute a kubectl with the apply option and a YAML file, the execution\
    \ is often *asynchronous*. This means the kubectl command will return immediately,\
    \ but the operation declared in the YAML file is scheduled by the API server in\
    \ the background.\n\nIn this case, when you execute the kubectl apply command\
    \ for this service, your result should look like:\n\n```\n    service/mssql-service\
    \ created\n    ```\n\nThis result actually means the service creation has been\
    \ *scheduled* to be created. How can you know whether the service is ready to\
    \ use? There are a few ways. First, you can run the following command:\n\n```\n\
    \    kubectl get service\n    ```\n\nYour result may look like this:\n\n```\n\
    \    NAME            TYPE           CLUSTER-IP     EXTERNAL-IP   PORT(S)     \
    \      AGE\n    mssql-service   LoadBalancer   10.0.150.233        31433:32010/TCP\
    \   61s\n    ```\n\nThe CLUSTER-IP is the private IP address within the k8s cluster.\
    \ The EXTERNAL-IP will be the static public IP you can use to connect to SQL Server.\
    \ Notice the PORT has a value of 31433:32010\\. Even though SQL Server listens\
    \ on port 1433 in the container, port 32010 is mapped to port 1433 within the\
    \ cluster. Port 31433 is mapped to 32010, allowing you to connect to <EXTERNAL-IP>,<31433>\
    \ to connect to SQL Server, no matter where the pod with SQL Server lives within\
    \ the k8s cluster.\n\nNotice the value of EXTERNAL-IP is <pending> when you look\
    \ at it right after running this kubectl apply command. You will not be able to\
    \ use the LoadBalancer until that value is a valid IP address; this could take\
    \ several minutes to complete.\n\n4.  Now that the LoadBalancer has been scheduled\
    \ to create, let’s create a secret to hold the sa password for SQL Server. Use\
    \ the following command or script **step4_create_secret.sh**:\n\n```\n    kubectl\
    \ create secret generic mssql-secret --from-literal=SA_PASSWORD=\"Sql2019isfast\"\
    \n    ```\n\nWhen this command completes, you should see the following results,\
    \ and the secret should be immediately created:\n\n```\n    secret/mssql-secret\
    \ created\n    ```"
