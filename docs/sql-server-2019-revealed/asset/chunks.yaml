    # 关于 K8s 内部原理的评论


    你可以利用本章前面提供的参考资料来真正深入探究其内部机制，但我必须指出，你应该理解 K8s 的一个核心方面就是 `API`。我非常欣赏能够通过查看应用程序编程接口
    (API) 来理解事物运作方式的做法。K8s 的核心一切都基于一个 `API 服务器`。你可以阅读所有支撑 K8s 集群的组件，但 `API 服务器` 是一个接收请求并“执行操作”的软件。可以把
    `API 服务器` 想象成 `SQL Server`。`SQL Server` 的 API 是 `T-SQL`，应用程序可以向 `SQL Server` 提交
    `T-SQL` 命令，然后它就“执行操作”。K8s 的工作方式与此类似。你可以在 [`https://kubernetes.io/docs/concepts/overview/kubernetes-api/`](https://kubernetes.io/docs/concepts/overview/kubernetes-api/)
    阅读更多关于 K8s API 的内容。`API 服务器` 是 K8s `控制平面` 的一部分，你可以在 [`https://en.wikipedia.org/wiki/Kubernetes#Kubernetes_control_plane_`](https://en.wikipedia.org/wiki/Kubernetes%2523Kubernetes_control_plane_)
    (主要部分) 阅读更多相关信息。在你使用 K8s 并随后开始学习第 10 章中的 `SQL Server 大数据群集` 时，请牢记 `控制平面` 和 `API
    服务器` 的概念。


    这意味着，如果你喜欢编写代码，可以使用 API 在 K8s 中部署和管理容器；或者，你也可以使用一个非常方便的命令行界面 (CLI) —— 叫做 `kubectl`
    (Buck Woody 总是把它读作“kubecuttle”)，它会替你与 K8s API 交互。你使用 `kubectl` 对 K8s API 进行编程的方式是采用声明式协议，使用
    `YAML` 文件。你可以在 [`https://kubernetes.io/docs/reference/kubectl/overview/`](https://kubernetes.io/docs/reference/kubectl/overview/)
    阅读更多关于 `kubectl` 程序的信息。使用这个“速查表”作为快速参考：[`https://kubernetes.io/docs/reference/kubectl/cheatsheet/`](https://kubernetes.io/docs/reference/kubectl/cheatsheet/)。


    请在 [`https://kubernetes.io/docs/concepts/overview/components/`](https://kubernetes.io/docs/concepts/overview/components/)
    查看构成 K8s 集群的各个组件。如果你想知道容器是如何在 K8s 集群中部署和管理的，`Docker` 是 K8s 安装并运行在集群每个节点中的一个组件。我认为
    K8s 是一个用于部署、调度、管理、扩缩和支持容器应用程序的，既简单又复杂的系统，就像 `SQL Server` 一样。


    由于 K8s 是开源的，因此可以通过多种不同的方式、平台和系统来部署集群。让我们来看看满足你需求或要求的各种 K8s 部署选项。


    ## K8s 部署选项


    K8s 由 Google 在 2014 年左右创立（当时 Brendan 在那里工作），旨在为内部应用程序构建一个可扩展容器化应用程序的系统。2015 年，K8s
    1.0 成为开源项目，至今仍是。（K8s 维基百科上有一个有趣的起源故事：[`https://en.wikipedia.org/wiki/Kubernetes#History`](https://en.wikipedia.org/wiki/Kubernetes%2523History)。）Kubernetes
    源于希腊语，意为“飞行员”或“舵手”，对于引导容器世界之船的事物来说，这是一个贴切的名字。


    自从 K8s 开源以来，几家公司基于 K8s 项目构建了商业化的 K8s 系统供客户使用。你可以在 K8s 文档站点查看合作伙伴列表：[`https://kubernetes.io/partners/#kcsp`](https://kubernetes.io/partners/%2523kcsp)。


    在我撰写本书时，我所了解的 K8s 领域可以归结为以下几种部署选择：


    `开源 K8s` – 我与一些考虑在 k8s 上使用 `SQL Server` 的客户交流过，他们表示将使用最新的 K8s 开源版本，在自己的数据中心或在云中的虚拟机中部署自己的
    k8s。如果你选择这条路径，通常会使用一个名为 `kubeadm` ([`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/))
    的部署工具。另一个流行的选择是名为 `kubespray` ([`https://kubernetes.io/docs/setup/production-environment/tools/kubespray/`](https://kubernetes.io/docs/setup/production-environment/tools/kubespray/))
    的工具。如果你考虑在自己的数据中心部署 K8s，这确实能给你最大的控制权，但*你就得负全责*。换句话说，你必须承担维护和管理 K8s 集群以及运行其中的 `SQL
    Server` 的全部责任。


    `Minikube` – 想要在你的笔记本电脑或虚拟机中快速轻松地运行一个单节点的 K8s 吗？`Minikube` 就是你的朋友；它适用于小型测试和开发目的，你可以快速启动并运行。你可以在
    [`https://kubernetes.io/docs/setup/learning-environment/minikube/`](https://kubernetes.io/docs/setup/learning-environment/minikube/)
    阅读如何设置 `Minikube`。

    '
- fmt: '## Kubernetes 部署选项


    **Tip**


    Docker Desktop 可以自动为您部署 Minikube。请参阅示例：[`https://docs.docker.com/docker-for-windows/#kubernetes`](https://docs.docker.com/docker-for-windows/%2523kubernetes)。


    ### Azure Kubernetes Service (AKS)


    如果您想要一个*托管的 `k8s` 集群*体验，那么可以考虑像 Azure Kubernetes Services (AKS) 这样的云服务。Brendan
    领导着构建和运行此服务的团队，因此我非常确信在使用 AKS 时，我能获得 `k8s` 的最新创新以及云的强大功能。本章中的示例将使用 AKS，但它们与任何
    `k8s` 发行版都兼容。由于 AKS 是一项云服务，它们可以以云的速度进行创新（抱歉，我忍不住这么说）。例如，AKS 可以同时支持 Linux 和 Windows
    容器（请参阅 [`https://azure.microsoft.com/en-us/blog/announcing-the-preview-of-windows-server-containers-support-in-azure-kubernetes-service/`](https://azure.microsoft.com/en-us/blog/announcing-the-preview-of-windows-server-containers-support-in-azure-kubernetes-service/)）。并且
    AKS 支持虚拟节点的概念（ [`https://docs.microsoft.com/en-us/azure/aks/virtual-nodes-cli`](https://docs.microsoft.com/en-us/azure/aks/virtual-nodes-cli)）。请访问
    [`https://azure.microsoft.com/en-us/services/kubernetes-service`](https://azure.microsoft.com/en-us/services/kubernetes-service)
    深入了解 AKS。


    ### Azure Stack


    Azure Stack 是一个设备系统，在客户的自身数据中心中提供 Azure 服务。`k8s` 是 Azure Stack 的一个部署选项，您可以在 [`https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-solution-template-kubernetes-deploy`](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-solution-template-kubernetes-deploy)
    阅读相关信息。您可以将 Azure Stack 上的 `k8s` 视为等同于在您数据中心运行的 AKS。随着 AKS 的发展，Azure Stack 上的
    `k8s` 也会随之发展。


    ### Red Hat OpenShift


    OpenShift 在行业中已成为一个非常受欢迎的平台。OpenShift 是一个 `k8s` 平台，可以在您的数据中心或公共云中运行，您可以在 [`www.openshift.com/`](https://www.openshift.com/)
    阅读更多信息。虽然 OpenShift 与开源 `k8s` 兼容性很高，但在系统和平台的使用上存在差异。您可能不会相信，但我在 2019 年 5 月的 Red
    Hat 峰会上领导了一支微软工程师团队，负责指导一个关于在 OpenShift 上运行 SQL Server 2019 的实验。请自行查看：[`https://github.com/Microsoft/sqlworkshops/tree/master/SQLonOpenShift`](https://github.com/Microsoft/sqlworkshops/tree/master/SQLonOpenShift)。本章中的几个示例在那个
    GitHub 站点上都有对应的 OpenShift 版本，供您在 OpenShift 环境中使用。微软提供了一个托管的 OpenShift 平台（类似于 AKS），称为
    Azure Red Hat OpenShift。您可以在 [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/openshift-get-started#azure-red-hat-openshift`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/openshift-get-started%2523azure-red-hat-openshift)
    阅读有关此服务的更多信息。


    ### Windows Server


    这个平台是怎么进入本章的呢？到目前为止，我所描述的关于 `k8s` 的一切都基于 Linux。`k8s` 起源于 Linux，所以这很有道理。不过，为了给您更多灵活性，我们希望
    Windows Server 能成为 `k8s` 世界的一部分，因此现在可以使用 Windows Server 来托管 `k8s` 集群。集群中的所有内容不会是“纯”
    Windows，但支持基于 Windows 容器的节点。您可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows)
    阅读更多关于 Kubernetes 与 Windows 的信息。


    ### 其他 `k8s` 云提供商


    Azure 并不是唯一的云 `k8s` 提供商。亚马逊有 Elastic Kubernetes Service (EKS)，谷歌有 Google Kubernetes
    Engine (GKE)，还有其他一些。


    ### 其他 `k8s` 提供商


    市场上还有其他 `k8s` 提供商。SUSE 有几个 `k8s` 解决方案，您可以在 [`www.suse.com/solutions/kubernetes/`](https://www.suse.com/solutions/kubernetes/)
    阅读相关信息。我看到客户经常谈论的一个较受欢迎的方案是 Rancher ( [`https://rancher.com/`](https://rancher.com/)
    )。我相信您可能也听说过客户想使用的其他方案。我未来将特别关注的另一个 `k8s` 提供商是 VMWare PKS ( [`https://cloud.vmware.com/vmware-enterprise-pks`](https://cloud.vmware.com/vmware-enterprise-pks)
    )。


    最终，您对 `k8s` 的选择取决于您是想在数据中心还是在公共云中部署 `k8s`。您的其他决策应基于您将获得何种支持、`k8s` 集群是托管的还是需要您管理一切，以及该
    `k8s` 发行版是否能够持续存在并在未来保持相关性。SQL Server 几乎可以在所有 `k8s` 平台和提供商上运行。作为微软的员工，我很有兴趣观察
    AKS 和 Windows Server 上 `k8s` 的普及程度。根据我与 Linux 的经验，OpenShift 是一股主要力量，也是许多客户正在使用或评估的
    `k8s` 平台。


    是时候通过示例来学习了，让我们来看看使用 `k8s` 和 SQL Server 2019 进行部署、高可用性和更新的示例所需的先决条件。'
  raw: '### Tip


    Docker Desktop can automatically deploy Minikube for you. Look at the example
    at [`https://docs.docker.com/docker-for-windows/#kubernetes`](https://docs.docker.com/docker-for-windows/%2523kubernetes)
    .


    **Azure Kubernetes Service (AKS)** – If you want the feel of a *managed k8s cluster*,
    then consider a cloud service like Azure Kubernetes Services (AKS). Brendan owns
    the team that builds and runs this service, so I feel pretty confident when using
    AKS that I am getting the latest innovations of k8s along with the power of the
    cloud. The examples in this chapter will use AKS, but they are compatible with
    any k8s distribution. Since AKS is a cloud service, they can innovate at the speed
    of the cloud (sorry, I couldn’t resist). For example, AKS can support both Linux
    and Windows Containers (see [`https://azure.microsoft.com/en-us/blog/announcing-the-preview-of-windows-server-containers-support-in-azure-kubernetes-service/`](https://azure.microsoft.com/en-us/blog/announcing-the-preview-of-windows-server-containers-support-in-azure-kubernetes-service/)
    ). And AKS supports the concept of virtual nodes ( [`https://docs.microsoft.com/en-us/azure/aks/virtual-nodes-cli`](https://docs.microsoft.com/en-us/azure/aks/virtual-nodes-cli)
    ). Dive into AKS at [`https://azure.microsoft.com/en-us/services/kubernetes-service`](https://azure.microsoft.com/en-us/services/kubernetes-service)
    .


    **Azure Stack** – Azure Stack is an appliance system providing customers with
    Azure services in their own data centers. k8s is a deployment option with Azure
    Stack, which you can read about at [`https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-solution-template-kubernetes-deploy`](https://docs.microsoft.com/en-us/azure-stack/user/azure-stack-solution-template-kubernetes-deploy)
    . You should think of k8s on Azure Stack as equivalent to AKS running in your
    data center. As AKS evolves, so will k8s on Azure Stack.


    **Red Hat OpenShift** – OpenShift has become a very popular platform in the industry.
    OpenShift is a k8s platform that can be run in your data center or in public clouds,
    which you can read more about at [`www.openshift.com/`](https://www.openshift.com/)
    . While OpenShift is very compatible to open source k8s, there are differences
    in using the system and platform. You probably won’t believe this, but I led a
    team of Microsoft Engineers at the May 2019 Red Hat Summit to proctor a lab on
    SQL Server 2019 on OpenShift. Check it out for yourself at [`https://github.com/Microsoft/sqlworkshops/tree/master/SQLonOpenShift`](https://github.com/Microsoft/sqlworkshops/tree/master/SQLonOpenShift)
    . Several of the examples in this chapter have an OpenShift version on that GitHub
    site for you to use in your OpenShift environment. Microsoft offers a managed
    OpenShift platform (think AKS) called Azure Red Hat OpenShift. You can read more
    about this service at [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/openshift-get-started#azure-red-hat-openshift`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/openshift-get-started%2523azure-red-hat-openshift)
    .


    **Windows Server** – How did that platform get into this chapter? Everything I’ve
    described about k8s so far is all based on Linux. k8s got its start on Linux,
    so that all makes sense. To give you more flexibility, though, we wanted Windows
    Server to be a part of the k8s world, so it is possible now to use Windows Server
    to host a k8s cluster. Not everything in the cluster will be “pure” Windows, but
    Windows container–based nodes are supported. You can read more about Kubernetes
    with Windows at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows)
    .


    **Other k8s cloud providers** – Azure is not the only cloud k8s provider in town.
    Amazon has Elastic Kubernetes Service (EKS), Google has the Google Kubernetes
    Engine (GKE), and there are others as well.


    **Other k8s providers** – There are other k8s providers in the market. SUSE has
    several k8s solutions, which you can read about at [`www.suse.com/solutions/kubernetes/`](https://www.suse.com/solutions/kubernetes/)
    . One of the more popular ones I’ve seen my customers talk about is Rancher (
    [`https://rancher.com/`](https://rancher.com/) ). I’m sure you may have heard
    of others that customers want to use. Another k8s provider I’m going to pay particular
    attention to in the future is VMWare PKS ( [`https://cloud.vmware.com/vmware-enterprise-pks`](https://cloud.vmware.com/vmware-enterprise-pks)
    ).


    Ultimately, your choice for k8s is based on whether you want to deploy k8s in
    your data center or in a public cloud. Your other decisions should be based on
    what kind of support you will receive, is the k8s cluster managed or do you need
    to manage everything, and whether the k8s distribution will last and be relevant
    in the future. SQL Server will work on just about all of the k8s platforms and
    providers. Working for Microsoft, I will be interested to see the popularity of
    k8s on AKS and Windows Server. In my experience with Linux, OpenShift is a major
    force and a k8s platform that many customers are using or evaluating.


    It’s time to learn by example, so let’s go over the prerequisites to use the examples
    for deployment, HA, and updates with k8s and SQL Server 2019.'
