    \ .\n\nOne tool that is very helpful to build multiple container images and run\
    \ containers based on those images is **docker-compose**. Docker-compose allows\
    \ you to declare the definition of container images to build along with parameters\
    \ to run containers based on those images.\n\nA great example of an application\
    \ involving SQL Server that needs multiple containers is SQL Server Replication.\
    \ Since SQL Server Replication is now supported in SQL Server 2019, containers\
    \ provide an interesting deployment method. In 2018, Vin Yu and I had to present\
    \ at various conference new features coming for SQL Server on Linux. I asked Vin\
    \ to present the replication story. As we were preparing our demos, he asked me\
    \ to look over what he had built. He said he used containers to deploy snapshot\
    \ replication with a publisher, distributor, and subscriber with a single command.\
    \ My first reaction to Vin was “you can’t do that.” I loved that he proved me\
    \ wrong. Let’s use the example he built for that demo (which you can also find\
    \ on our samples on GitHub at [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication)\
    \ ).\n\nAll files for this example can be found at **ch7_inside_sql_containers\\\
    sqlrepl**. Because we will use docker-compose for this example, we don’t need\
    \ a PowerShell vs. bash version of the scripts. We will provide a set of Bash\
    \ shell and T-SQL scripts, but they *run in the context of each container*.\n\n\
    Since this example will only take a single command to deploy and run the containers\
    \ to deploy SQL Server replication, let’s take a look at all the files provided\
    \ for this example before you run it.\n\n### The docker-compose.yml File\n\ndocker-compose\
    \ relies on a declarative text file called **docker-compose.yml** (which is a\
    \ YAML file. YAML stands for Yet Another Markup Language). You can use a different\
    \ file name, but by default docker-compose looks for a file called docker-compose.yml.\n\
    \nLet’s look at the docker-compose.yml file for this example. The version tag\
    \ at the top of the file declares what version of docker-compose should be used\
    \ (3 is the latest but you can read about compose versioning at [`https://docs.docker.com/compose/compose-file/compose-versioning/`](https://docs.docker.com/compose/compose-file/compose-versioning/)\
    \ ).\n\n```\nservices:\ndb1:\nbuild: ./db1\nenvironment:\nSA_PASSWORD: \"MssqlPass123\"\
    \nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED: \"true\"\nports:\n- \"2500:1433\"\n\
    container_name: db1\nhostname: db1\ndb2:\nbuild: ./db2\nenvironment:\nSA_PASSWORD:\
    \ \"MssqlPass123\"\nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED: \"true\"\nports:\n\
    - \"2600:1433\"\ncontainer_name: db2\nhostname: db2\n```\n\nThere are two “services”\
    \ or containers that will be built and executed by docker-compose. One called\
    \ db1 and one called db2.\n\nThe method in which docker-compose works is to first\
    \ build a container image (if the build clause is provided) and then run a container\
    \ based on that image using the other parameters in the docker-compose.yml file.\n\
    \nThe clause\n\n```\nbuild: ./db1\n```\n\nindicates docker-compose should change\
    \ to the db1 directory from the current directory and execute a docker build in\
    \ that directory. The same concept applies for db2.\n\nThe rest of the definition\
    \ in the yml file defines how to run the built container in each directory.\n\n\
    ```\nenvironment:\nSA_PASSWORD: \"MssqlPass123\"\nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED:\
    \ \"true\"\nports:\n- \"2500:1433\"\ncontainer_name: db1\nhostname: db1\n```\n\
    \nEach of these values is passed to the docker run command used to run the container\
    \ after it is built. Note the use of MSQL_AGENT_ENABLED in this example because\
    \ SQL Server Replication relies on SQL Server Agent."
