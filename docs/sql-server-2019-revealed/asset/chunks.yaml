    SQL Server 2017。然而，这个概念足够新，我想在本书中特别指出。


    ## SQL Server 机器学习服务与 Linux 上的可扩展性


    正如我在第 5 章详细描述的，SQL Server 机器学习服务是**革命性的**——它允许您结合 R 和 Python 的强大功能，与 SQL Server
    集成，以构建可扩展且强大的机器学习模型和应用程序。


