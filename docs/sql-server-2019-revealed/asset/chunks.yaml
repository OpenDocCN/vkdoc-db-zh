    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n```"
  trans: "\n# 部署 SQL Server 容器\n\n你真的需要亲眼看到容器运行起来，才能真正体会到它们带来的强大功能以及其工作原理。如果你还记得本章前面讨论的**容器生命周期**，那么微软实际上已经完成了\
    \ SQL Server 容器的**构建**和**推送**步骤。本章后面我将讨论如何基于 SQL Server 构建你自己的镜像，但目前我会先向你展示**拉取\
    \ ➤ 运行**序列以及**停止 ➤ 启动 ➤ 移除**的管理序列。并且我会向你展示其他一些可用于探索容器的 docker 命令。\n\n**重要提示**：你必须将\
    \ WideWorldImporters 备份文件复制到运行这些脚本的本地目录中，才能完成此活动。你可以从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)\
    \ 下载此备份文件。\n\n本节中的所有示例都可以在 `ch7_inside_sql_containers\\deploy` 目录下找到。Windows 用户请使用\
    \ `dockerpowershell` 目录。Linux 和 macOS 用户请使用 `dockerbash` 目录（请确保使用 `chmod u+x <script>`\
    \ 命令使你的脚本可执行）。本章我将带你逐步了解 PowerShell 示例。\n\n## 运行 SQL Server 容器\n\n从 PowerShell\
    \ 运行以下命令以启动 SQL Server 容器。（我选择使用 Azure Data Studio (ADS)中的 Terminal 选项来运行脚本或执行\
    \ `step1_dockerrunsql.ps1` 脚本。）由于 SQL Server 2019 的镜像尚未在我的本地计算机上，docker 将先执行拉取操作，然后启动容器：\n\
    \n```\ndocker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1433:1433\
    \ --name sql2019latest --hostname sql2019latest -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\n图 7-3 展示了在 ADS 中运行此脚本以拉取 SQL Server 2019 RHEL 镜像的示例。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig3_HTML.jpg](img/479130_1_En_7_Fig3_HTML.jpg)\n\
    \n*图 7-3 部署 SQL Server RHEL 容器*\n\n你可能想了解更多关于 SQL Server 2019 镜像的信息。你可以使用如下命令来实现：\n\
    \n```\ndocker inspect mcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\n\
    输出将是一个非常长的 JSON 文件。请注意输出中的这个有趣部分：\n\n```\n\"Cmd\": [\n\"/bin/sh\",\n\"-c\",\n\"\
    #(nop) \",\n\"CMD [\\\"/opt/mssql/bin/sqlservr\\\"]\"\n],\n```\n\n这向你展示了 Dockerfile\
    \ 中的 `CMD` 指令，其作用就是运行 `sqlservr`。不幸的是，目前并没有一种可靠的方法来确认一个容器镜像的基础镜像是什么。我见过很多工具，对于我们使用的容器，`docker\
    \ history` 命令也不会给出基础镜像的名称。\n\n当容器运行时，不幸的是，你无法立即知道 SQL Server 是否正确启动。该命令会输出一长串“guid”值，然后返回到命令提示符。我们可以使用\
    \ docker 工具来查看容器是否启动，并尝试连接到 SQL Server。\n\n## 检查容器状态\n\n运行以下命令以查看为 SQL Server\
    \ 运行的容器的状态：\n\n```\ndocker ps\n```\n\n如果 SQL Server 启动成功，你的输出将类似于以下内容：\n\n```\n\
    CONTAINER ID        IMAGE                                             COMMAND\
    \                  CREATED\nSTATUS                  PORTS                    NAMES\n\
    95345f25b901        mcr.microsoft.com/mssql/rhel/server:2019-latest   \"/opt/mssql/bin/sqls...\"\
    \   About a minute ago   Up About a minute       0.0.0.0:1401->1433/tcp   sql2019latest\n\
    ```\n\n## 连接到 SQL Server\n\n验证 SQL Server 是否启动的唯一可靠方法是尝试连接到它。你可以使用容器外部或内部的程序进行连接。让我们先使用容器外的一种方式，执行以下命令或使用脚本\
    \ `step2_dockerconnecttosql.ps1`：\n\n```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401'\
    \ '-Q\"SELECT @@VERSION\"'\n```\n\n你的输出应类似于以下内容（版本可能不同，因为我是使用 SQL Server 2019\
    \ CTP 3.2 进行的操作）：\n\n```\nMicrosoft SQL Server 2019 (CTP3.2) - 15.0.1800.32 (X64)\n\
    Jul 17 2019 21:29:33\nCopyright (C) 2019 Microsoft Corporation\nDeveloper Edition\
    \ (64-bit) on Linux (Red Hat Enterprise Linux Server 7.6 (Maipo)) \n```\n\n请注意，SQL\
    \ Server 认为它运行在 RHEL 7.6 上。我也提到过，容器是一个以隔离方式运行的程序。如果你在 Linux 系统上，可以通过在主机上运行以下命令来证明这一点：\n\
    \n```\nps -axf\n```\n\n你的输出应类似于这样（PID 值可能会不同）：\n\n```\n/usr/bin/containerd\n22846\
    \ ?        Sl     0:02  \\_ containerd-shim -namespace moby -workdir /var/lib/containerd/io.containerd.runtime.v1.linux/moby/4f5c\n\
    22864 ?        Ssl    0:00      \\_ /opt/mssql/bin/sqlservr\n22909 ?        Sl\
    \    31:37          \\_ /opt/mssql/bin/sqlservr\n```\n\n### 面向 Windows 和 macOS\
    \ 用户\n\nWindows 和 macOS 用户：我有一个技巧可以让你们看到同样的信息。由于 SQL Server Linux 容器运行在一个 Linux\
    \ 虚拟机中，你如何访问这个虚拟机本身呢？\n\n试试这个。从 PowerShell 或你的 macOS 终端运行以下命令（完全归功于这篇博文 [`https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos`](https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos)）：\n\
    \n```\ndocker container run --rm -it -v /:/host alpine\n```\n\n你应该会得到一个 root 提示符。现在运行这个命令：\n\
    \n```\nchroot /host\n```\n\n你现在处于 Windows 上 Linux 虚拟机上下文中的 Bash shell 里。你能做的操作是有限的，前面的\
    \ `ps` 命令在这里不起作用。但你可以运行这个命令：\n\n```\nps -o ppid,pid,comm\n```\n\n这将输出一系列进程，由于\
    \ `sqlservr` 是刚刚启动的，它应该靠近列表的末尾。会有两个 `sqlservr` 进程，像这样（你的值很可能不同）：\n\n```\n2922\
    \  2946 sqlservr\n2946  2991 sqlservr\n```\n\n对于第一个 `sqlservr` 进程，左边的值是 `ppid`\
    \ 或父进程 ID。现在运行这个命令（将你的 `ppid` 值代入）：\n\n```\nps | grep 2922\n```\n\n你应该会看到类似这样的结果：\n\
    \n```\n2922 root      0:00 containerd-shim -namespace moby -workdir /var/lib/docker/containerd/daemon/io.containerd.runtime.v1.linux/moby/a0c005ccefe8c8a716e066b0a857e919bded6f50ac791cb82f6de2b0dbef220e\
    \ -address /var/run/docker/containerd/containerd.sock -containerd-binary /usr/local/bin/containerd\
    \ -runtime-root /var/run/docker/runtime-runc -debug\n```\n\n这是一个 docker 进程，用于\
    \ fork 容器程序，在这个例子中就是 `sqlservr`。\n\n## 复制备份文件\n\n要还原 WideWorldImporters 备份，你必须将此文件复制到容器的可写层中。运行以下命令或脚本\
    \ `step3_dockercopybackup.ps1`：\n\n```\ndocker cp c:\\sql_sample_databases\\WideWorldImporters-Full.bak\
    \ sql2019latest:/var/opt/mssql\n```\n\n通过将备份文件复制到 `/var/opt/mssql` 目录，该备份文件立即可被容器内的\
    \ SQL Server 访问。\n\n## 还原数据库\n\n备份文件位于可写层后，容器上下文中的 SQL Server 便可以访问此备份，从而进行还原。要还原数据库，你可以使用容器中存在的\
    \ `sqlcmd` 工具。为此，你可以使用 `docker exec` 命令，如下所示，或在脚本 `step4_dockerrestorebackup.ps1`\
    \ 中执行：\n\n```\ndocker exec -it sql2019latest /opt/mssql-tools/bin/sqlcmd -S localhost\
    \ -U SA -P \"Sql2019isfast\" -Q \"RESTORE DATABASE WideWorldImporters FROM DISK\
    \ = '/var/opt/mssql/WideWorldImporters-Full.bak' WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf',\
    \ MOVE 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf',\
    \ MOVE 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n```\n"
- fmt: "# 查看 SQL Server 容器日志与管理\n\nThe WideWorldImporters backup was built with SQL\
    \ Server 2016 so you would see an output that the database is being restored and\
    \ upgraded to 2019.\n\n## 1. 查看 ERRORLOG\n\nYou probably want to see the ERRORLOG\
    \ of the SQL Server running in the container. One way to do this is to use `docker\
    \ exec` and navigate the directory structure of the container using the following\
    \ command or the script `step5_dockerexec.ps1`:\n\n```\ndocker exec -it sql2019latest\
    \ bash\n```\n\nWhen this command is successful, your cursor will be at a Bash\
    \ shell prompt in the context of the container like the following:\n\n```\nroot@sql2019latest:/#\n\
    ```\n\nYou can now change to the `/var/opt/mssql/log` directory and display the\
    \ ERRORLOG with the command `cat ERRORLOG`.\n\nRemember that one of the benefits\
    \ of a container is a smaller footprint that is running in a VM with the entire\
    \ OS loaded. In addition, I’ve told you a container is really just a program running\
    \ in an isolated manner sharing the host operating system resources. You can see\
    \ this behavior by running the following command:\n\n```\nps -axf\n```\n\nYour\
    \ output should look something like\n\n```\n[root@sql2019latest /]# ps -axf\n\
    PID TTY      STAT   TIME COMMAND\n268 pts/0    Ss     0:00 bash\n561 pts/0   \
    \ R+     0:00  \\_ ps -axf\n1 ?        Ssl    0:00 /opt/mssql/bin/sqlservr\n7\
    \ ?        Sl     1:25 /opt/mssql/bin/sqlservr\n```\n\nYou can see that only `bash`\
    \ and `sqlservr` are running. You can compare this to running the following command\
    \ on a RHEL 7.6 server or VM in the host (not the container):\n\n```\nps -axf\
    \ | wc -l\n```\n\nwhich counts the number of processes. On a “fresh” RHEL 7.6\
    \ server I installed in Azure, I got a number of 122! The `bash` program is run\
    \ in the same namespace as the SQL Server container, so it is isolated to only\
    \ access files in the readable and writeable layer of this specific container.\n\
    \nExit the shell by typing in the command `exit`.\n\n### Note\nYou may be asking\
    \ how it is possible to be able to run these Linux commands if the container is\
    \ just the `sqlservr` program. That is because the `docker exec` is able to run\
    \ a program in the namespace of the container program (similar to how `sqlcmd`\
    \ works with a SQL Server container). A `docker exec` would fail if the program\
    \ itself did not exist in the directory structure of files for the container.\
    \ `bash` works because it is in the base image. `sqlcmd` works because we install\
    \ `sqlcmd` in the SQL Server image.\n\nLet me stop and call out how nice the Docker\
    \ extension is to use with Azure Data Studio (or Visual Studio Code). I mentioned\
    \ in the Prerequisites that you may want to install this extension. Figure 7-4\
    \ is an example of managing a running SQL Server container to “attach” a `bash`\
    \ shell.\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig4_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig4_HTML.jpg)\n\
    \n**Figure 7-4**\nUsing the Docker extension in Azure Data Studio\n\nAs you can\
    \ see from the “explorer” options from this extension, you can look at running\
    \ containers (or stopped ones) and images that have been pulled or even browse\
    \ registries like `mcr.microsoft.com` or your own Azure Container Registry or\
    \ Docker Hub.\n\n## 2. 停止容器\n\nIf you need to shut down SQL Server in the container,\
    \ technically you could issue a T-SQL `SHUTDOWN` command. This would stop the\
    \ `SQLSERVR` process and would shut down the container since it is the main program\
    \ from the container. Or you could run the following command to stop the container\
    \ or the script `step6_dockerstop.ps1`:\n\n```\ndocker stop sql2019latest\n```\n\
    \nWhen the command is successful, it will print the name of the container to std\
    \ output.\n\nWhen you stop a container, the program that started the container\
    \ is killed. For SQL Server, this will lead to a detection of the kill and a SQL\
    \ Server clean shutdown.\n\nYou can prove SQL Server was shut down by running\
    \ the following command after the container is stopped:\n\n```\ndocker logs sql2019latest\n\
    ```\n\nThe output of the ERRORLOG from the SQL Server container will be displayed\
    \ to the console with output showing a statement like the following:\n\n```\n\
    \ spids      SQL Server is terminating in response to a 'stop' request from Service\
    \ Control\n```\n\nAt this point, the writeable layer of the container is preserved\
    \ (in this case, the WideWorldImporters database is part of this since it was\
    \ restored) for the container, and the container is considered *idle* but available\
    \ to start again. You can see any containers that are stopped but not removed\
    \ by running the following command:\n\n```\ndocker ps -a\n```\n\nYour output should\
    \ look like the following:\n\n```\nCONTAINER ID        IMAGE                 \
    \                              COMMAND                  CREATED\nSTATUS      \
    \                PORTS               NAMES\n95345f25b901        mcr.microsoft.com/mssql/rhel/server:2019-latest\
    \      \"/opt/mssql/bin/sqls...\"   10 hours ago\nExited (0) 11 seconds ago  \
    \               sql2019latest\n```\n\n## 3. 启动容器\n\nYou can start the container\
    \ again with the following command or script `step7_dockerstart.ps1`:\n\n```\n\
    docker start sql2019latest\n```\n\nOnce again, the name of the container will\
    \ be displayed in the console, and you will be returned to the prompt.\n\n## 4.\
    \ 查询数据库\n\nYou can query the WideWorldImporters database using the following command\
    \ or script `step8_dockerquerywwi.ps1`:\n\n```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401'\
    \ '-Q\"SELECT COUNT(*) FROM [WideWorldImporters].[Application].[People]\"'\n```\n\
    \nYou should get back a number of 1111 for number of rows in the People table.\n\
    \n## 5. 停止并移除容器\n\nIf you stop the container and now remove it, the writeable\
    \ layer will be gone and so is your database (not good). You can stop and remove\
    \ a container with the following commands or the script `step9_dockerstopandremove.ps1`:\n\
    \n```\ndocker stop sql2019latest\ndocker rm sql2019latest\n```\n\nThink of stopping\
    \ and removing SQL Server as uninstalling SQL Server. But the good news is that\
    \ any other SQL Server containers (even based on the same image) are unaffected\
    \ by this.\n\n## 6. 使用数据卷持久化数据\n\nAs I described on how SQL Server container works,\
    \ use a volume to store your databases on persisted host storage that can survive\
    \ when the container is removed.\n\nRun the container with a volume using the\
    \ following command or script `step10_dockerrunvolume.ps1`:\n\n```\ndocker run\
    \ -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest\
    \ --hostname sql2019latest -v sqlvolume:/opt/mssql/data -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\n### Note\nBecause the image for SQL 2019 is still on your local computer,\
    \ `docker` will not try to pull it again.\n\nIn this example, the name `sqlvolume`\
    \ will be automatically mapped to a directory in the host server or VM that is\
    \ not part of the writeable layer. Any writes to the `/var/opt/mssql` directory\
    \ in the writeable layer are redirected to the host folder for `sqlvolume`.\n\n\
    You can find out the directory for `sqlvolume` by running the following command:\n\
    \n```\ndocker inspect sqlvolume\n```\n\nYour output should look like the following:\n\
    \n```\n[\n{\n\"CreatedAt\": \"2019-08-07T02:24:50Z\",\n\"Driver\": \"local\",\n\
    \"Labels\": null,\n\"Mountpoint\": \"/var/lib/docker/volumes/sqlvolume/_data\"\
    ,\n\"Name\": \"sqlvolume\",\n\"Options\": null,\n\"Scope\": \"local\"\n}\n]\n\
    ```\n\nOn Windows, `/var/lib/docker/volumes/sqlvolume/_data` is a directory inside\
    \ the Linux VM but still persisted."
