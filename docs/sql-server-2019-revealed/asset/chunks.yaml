    ```

    -- 步骤 5：如果在 WHERE 子句中只引用了已分类列，会怎样？

    SELECT PreferredName FROM [Application].[People]

    WHERE EmailAddress LIKE ''%microsoft%''

    GO

    -- 步骤 6：检查审核日志

    -- 审核结果可能不会在查询后立即准确显示，但会在几秒钟内出现。

    SELECT event_time, session_id, server_principal_name,

    database_name, object_name,

    cast(data_sensitivity_information as XML) as data_sensitivity_information,

    client_ip, application_name

    FROM sys.fn_get_audit_file (''C:\program files\microsoft sql server\mssql15.mssqlserver\mssql\data\*.sqlaudit'',default,default)

    GO

    ```


    步骤 6 的结果应如图 3-14 所示。


    在此示例中，查询使用 `EmailAddress` 列作为条件，为 `PreferredName` 列生成结果。`PreferredName` 未被分类，但
    `EmailAddress` 已被分类。然而，由于 `EmailAddress` 不是 `SELECT` 列表的一部分，`data_sensitivity_information`
    列不会被填充。


    数据分类是 SQL Server 2019 中一个简单但非常强大的新功能，您可以将其添加到保持数据安全和确保组织符合任何监管政策的工具集中。此功能在 SQL
    Server 2019 和 Azure SQL Database 中均有效。请查阅我们团队关于信息保护的完整指南：[`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification)。


    ## 其他新安全功能


    SQL Server 2019 中还有其他一些次要但重要的新安全功能，包括 TDE 的暂停和恢复，以及简化的 SQL Server 加密证书管理。


    ### TDE 暂停和恢复


    透明数据加密（TDE）专注于对*静止*数据进行加密。这允许您独立于 SQL Server 引擎加密 SQL Server 数据库和日志文件。这样，如果有人试图访问您的数据库和/或事务日志文件，文件中的数据将被加密。TDE
    已经是几个版本中都有的功能；您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)
    阅读更多关于如何使用它的信息。


    当您为现有数据库启用 TDE 时，SQL Server 必须将*每个*数据库页从磁盘读入缓冲池，并将其写回已加密的数据库文件。加密在后台工作线程中进行，因此不会直接影响用户工作负载，但读取和写入所有数据库页可能非常密集，并消耗
    CPU 和 I/O 资源。对于非常大的数据库，这可能会影响关键任务应用程序。


    SQL Server 2019 引入了 TDE 加密的*暂停*和*恢复*概念。现在，您可以为数据库启用 TDE，但随后在任何时候暂停加密，并从暂停的最后一个点恢复加密。这允许您根据应用程序需求有效地安排使用
    TDE 对数据库进行完整加密。


    暂停 TDE 很简单，只需运行以下 T-SQL 语句：

    ```

    ALTER DATABASE  SET ENCRYPTION SUSPEND

    ```

    从暂停点恢复加密过程可以通过以下 T-SQL 语句完成：

    ```

    ALTER DATABASE  SET ENCRYPTION RESUME

    ```

    为了帮助诊断此新功能，DMV `sys.dm_database_encryption_keys` 有三个新列来查看 TDE 扫描的状态：

    *   `encryption_scan_state` – 一个数字，指示 TDE 扫描是正在进行、已暂停还是已完成

    *   `encryption_scan_state_desc` – 扫描状态的字符串描述，例如 RUNNING、SUSPENDED、COMPLETE

    *   `encryption_scan_modify_date` – 扫描状态最后一次更改的日期/时间


    这是对在非常大的 SQL Server 数据库中使用 TDE 的一个重要但微小的增强。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)
    阅读更多关于 TDE 暂停和恢复的信息。


    ### 证书管理


    假设您想要加密到 SQL Server 的连接，这是确保客户端应用程序和 SQL Server 之间的表格数据流（TDS）协议被加密的常见做法。当您使用 TLS
    等协议设置加密时，需要证书。Windows 上的 SQL Server 提供了一种通过流行的程序 SQL Server 配置管理器使用证书的机制。但是，您必须首先完成所有工作，在服务器甚至多台服务器（用于故障转移群集实例（FCI）或
    Always On 可用性组）上安装证书。


    图 3-15 显示了 SQL Server 配置管理器的对话框，用于选择要用于 SQL Server 2017 的已安装证书。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg](img/479130_1_En_3_Fig15_HTML.jpg)


    图 3-15 SQL Server 2017 和证书管理


    SQL Server 2019 现在通过 SQL Server 配置管理器提供了导入证书的能力，甚至可以在故障转移群集实例或可用性组的节点之间导入证书——并且您可以从主实例执行所有这些操作。图
    3-16 显示了 SQL Server 2019 上 SQL Server 配置管理器的对话框。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg](img/479130_1_En_3_Fig16_HTML.jpg)


    图 3-16 SQL Server 2019 和配置管理


    请注意此对话框上的新“导入”按钮。您可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates)
    阅读有关如何在单台服务器或群集上使用此功能的所有说明。


    ## 总结


    建立在 SQL Server 2016 的丰富功能（如 Always Encrypted、行级安全和动态数据屏蔽）之上，SQL Server 2019 引入了新的安全功能，如安全飞地、数据敏感度分类、TDE
    暂停/恢复以及更简单的证书管理。所有这些，加上 SQL Server 以前版本中内置的所有安全功能，提供了一个正确的平台，以保持您的数据安全、可信、合规且可管理。

