- fmt: '# Introduction to Big Data Clusters


    Organizations want to invest more with Machine Learning (ML) and want to build
    and deploy ML applications that are scalable and secure and run close to the data
    sources that power the ML models. What I’ve heard customers say is that they want
    an *end-to-end Machine Learning platform*.


    Figure [10-2](#479130_1_En_10_Chapter.xhtml#Fig2) is a visual we have used to
    talk about the three major solution areas that Big Data Clusters attempt to solve.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig2_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    `Big Data Cluster` solutions


    In this chapter, I intend to answer the following questions:


    *   **Why** did we call it Big Data Clusters?

    *   **What** functionality do you get when you deploy a Big Data Cluster?

    *   How do you **deploy** a Big Data Cluster?

    *   What is the architecture of Big Data Clusters, and **how does it work?**

    *   How do you **use** a Big Data Cluster?

    *   How do you use **Machine Learning** with a Big Data Cluster?

    *   How do you **manage and monitor** a Big Data Cluster?


    This seems like enough for a book on its own, so I can’t deep dive on everything.
    However, I’ll explore some details that are not in the documentation but that
    I think you should know. I’ll also give examples and tips from my perspective
    on why `BDC` is an important solution for SQL Server 2019.


    ### Note


    In this chapter, I will sometimes refer to statements or samples in a workshop
    produced by my colleague Buck Woody called `Workshop: SQL Server Big Data Clusters
    – Architecture`, which you can find at [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)
    . It is an excellent resource to supplement this chapter.


    ## Why Big Data Clusters?


    I’m sure our team has many reasons why they would say we called this solution
    SQL Server Big Data Clusters. For me, it is a very simple answer. We are deploying
    and combining three major technologies with this solution:


    *   **SQL Server** – SQL Server will be the hub for accessing data in the cluster.
    This is the full SQL Server product, with everything I’ve described in the book,
    running in a container based on a Linux OS image.

    *   **Big Data** – We are deploying Big Data technologies for you, like `HDFS`
    and `Spark`.

    *   **Cluster** – We use a `Kubernetes` cluster to deploy and run different containers
    to provide a complete end-to-end system.


    As you read more over the next few sections of this chapter, the details will
    come together for you on how we are integrating these technologies.


    I think it is important to describe my perspective on the term *Big Data* and
    why we felt it was important to include this in the solution for Big Data Clusters.
    My colleague Buck Woody at Microsoft wrote an excellent blog post on the topic
    of Big Data at [`https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/`](https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/)
    .


    I love this description of the term Big Data, “Big Data is any data you can’t
    process in the time you want with the systems you have.” What this means for SQL
    Server is that you may have data in your organization that is perhaps not the
    right fit for storing in a relational database management system (`RDBMS`) like
    SQL Server. There could be all types of reasons for this, including size, structure,
    data origin, and complexity, to transform into relational tables.


    It was interesting to read the origins of the original Hadoop project. The founders
    of Hadoop originally wanted a file system to store massive amounts of data in
    a distributed fashion across a cluster of commodity hardware. They called this
    the Google File System (it is really a more complex story; you can read more about
    the history of Hadoop at [`https://en.wikipedia.org/wiki/Apache_Hadoop#History`](https://en.wikipedia.org/wiki/Apache_Hadoop%2523History)
    ). The goal of that original project was to solve the problem Buck defined for
    the term Big Data.


    With SQL Server Big Data Clusters, what we are really providing in my opinion
    is a *single system* that gives you *both worlds* of data storage and processing.
    We deploy SQL Server for you to store and access data stored in a relational format
    with tables. And we deploy a Hadoop distributed file system (`HDFS`) cluster,
    allowing you to store data in an unstructured or semistructured file format. The
    key ingredient that makes this system special is that they are *integrated*. With
    the help of `Polybase`, you can join tables from SQL Server (and other sources
    like Oracle, Teradata, and MongoDB) with `HDFS` files, in a seamless method and
    with scalable performance.


    There is more to this story; in the next section, I’ll describe exactly what value
    you get by deploying a SQL Server Big Data Cluster.


    ## What Comes with Big Data Clusters?


    I’ve described a SQL Server Big Data Cluster (`BDC`) as a product within a product.
    This is because when you deploy `BDC`, you get a wealth of valuable functionality
    including the following.


    ### SQL Server 2019


    `BDC` comes with a *complete* SQL Server 2019 instance running in a container
    using a Linux OS image. This means that all of the capabilities of SQL Server
    2019 for Linux also come with `BDC`. This will include Active Directory authentication
    and High Availability with Always On Availability Groups.


    ### Polybase


    The `Polybase` feature for SQL Server with `BDC` is automatically installed and
    enabled. This means you get built-in connectors for SQL Server, Oracle, Teradata,
    MongoDB, and Hadoop. In addition, `BDC` comes with *special connectors* to access
    `HDFS` files and data caches within the cluster in an optimized method. Furthermore,
    even though SQL Server 2019 on Linux doesn’t support `Polybase Scale-Out Groups`,
    `BDC` comes with an implementation of `Polybase Scale-Out Groups` using a concept
    called a *Compute Pool*, which I’ll talk about more in the section “Big Data Cluster
    Architecture.”


    ### Hadoop Distributed File System (HDFS)


    `BDC` will deploy a `HDFS` storage cluster using open source Apache Hadoop. You
    will have several different ways you can access files stored in the `HDFS` cluster
    in `BDC`, including `Polybase` through SQL Server. We also provide a method for
    you to mount your own external `HDFS` storage into the local `HDFS` storage in
    `BDC`, a concept we call *HDFS Tiering*.


    ### Spark


    `BDC` installs Apache `Spark` to provide another method to analyze and process
    data. I like Buck Woody’s definition of `Spark` as, “Apache Spark is an analytics
    engine for processing large-scale data. It can be used with data stored in `HDFS`
    and has connectors to work with data in SQL Server as well.” You will interact
    with `Spark` through Spark Jobs for data within the cluster. I’ll talk more about
    using `Spark` with `BDC` in the section titled “Using Spark.”


    ### Data Cache


    Our documentation says we provide a *data mart*, and I suppose that term is technically
    true. For me, what we are really providing is a *data cache* . I call it a data
    cache because we provide a special set of SQL Server instances optimized to store
    results from queries against `Polybase` external data sources. Think of the scenario
    where you want to *store a set of results*, refreshed weekly, for reporting purposes.
    Those results could come from `Polybase` queries using many different data sources,
    and our data cache in `BDC` is a perfect solution for that. We implement the data
    cache in a component called the *Data Pool*, which I’ll explain in more detail
    in the section “Big Data Cluster Architecture.”'
