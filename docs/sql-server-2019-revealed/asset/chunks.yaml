    ## 语言、驱动程序与平台


    1993 年我刚加入微软时，为 SQL Server 编写应用程序的开发人员主要使用 Visual C 或 Visual Basic 等语言，并通过一种名为
    DB-Library 的驱动程序进行连接。客户端全部运行在 DOS（是的，DOS）或 Windows 上，而 SQL Server 则是 Windows NT
    上的主流数据库服务器。C++ 和 ODBC 很快也出现了，但可供选择的语言、驱动程序和平台种类相当有限。时至今日，无论是客户端应用程序还是 SQL Server
    本身，在语言、驱动程序和平台方面的选择之多，已远超我当初的想象。


    ### 语言与驱动程序


    SQL Server 2019 是一个现代化的数据库平台，随之而来的是广泛的编程语言选择，包括那些传统上不使用 SQL Server 的开发人员所青睐的现代语言。


    与这些语言选择相匹配的，是满足每种语言需求的、用于访问 SQL Server 的驱动程序。此外，这些驱动程序可在多种客户端平台上运行，包括 macOS、Linux
    和 Windows。


    另外，像 ODBC、OLE-DB 和 .Net 这样的驱动程序选择也变得更加聚焦，而不像过去那样种类繁多、有时甚至令人困惑。


    那么，如何选择语言和/或驱动程序呢？首先，在某些情况下，语言的选择决定了你将使用的驱动程序。例如，如果你想用 PHP 编写代码来访问 SQL Server，就必须使用
    `PHP Driver for SQL Server`。


    幸运的是，微软建立了一个非常实用的网站来帮助你做出语言选择、选择合适的驱动程序、选定一个或多个客户端平台，并查看用该语言编写代码访问 SQL Server
    的示例。


    要查看实际效果，请访问网站 `http://aka.ms/sqldev`。主网页如图 5-1 所示。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig1_HTML.jpg](img/479130_1_En_5_Fig1_HTML.jpg)


    图 5-1


    SQL Server 开发中心


    将鼠标悬停在某个语言选项上，你可以选择一个客户端平台语言，以获取使用该语言和相应驱动程序的详细信息以及代码示例教程（图 5-2 展示了使用 Go 语言的示例）。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig2_HTML.jpg](img/479130_1_En_5_Fig2_HTML.jpg)


    图 5-2


    将 Go 语言与 SQL Server 结合使用


    选择 Windows 选项后，你会看到一个完整的教程，指导你使用 SQL Server Developer Edition 构建你的第一个适用于 Windows
    的 Go 应用程序（你的 SQL Server 可以运行在 Windows、Linux 甚至容器上）。每种语言和平台选择都有类似的模板，如图 5-3 所示的
    Go 语言模板。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig3_HTML.jpg](img/479130_1_En_5_Fig3_HTML.jpg)


    图 5-3


    为 SQL Server 创建 Go 应用程序


    许多使用 C++ 或 C# 等语言的开发人员，老实说，过去都曾面对过 SQL Server 令人困惑的驱动程序选择列表。


    在 SQL Server 2012 之后，我们整合了用于 ODBC、OLE-DB 或 ADO.Net 的驱动程序及版本列表。我发现这个文档页面 `https://docs.microsoft.com/en-us/sql/connect/connect-history`
    很好地展示了过往驱动程序的历史，并说明了如果你使用的是 SQL Server 2014 或更新版本，现在应该使用哪些驱动程序。


    此外，要获取构建 SQL Server 应用程序的完整语言及相应驱动程序选择列表，我认为这个文档页面是一个极好的资源：`https://docs.microsoft.com/en-us/sql/connect/sql-connection-libraries`。（这包括用于对象关系映射（ORM）框架应用程序的驱动程序。）


    我算是个“老派”开发人员，所以 ODBC 是我的首选驱动程序。我们为 SQL Server 构建了一个 ODBC 驱动程序，它能跟上 SQL Server
    的新特性，并且适用于 Linux、macOS 和 Windows。你可以在 `https://docs.microsoft.com/en-us/sql/connect/odbc/microsoft-odbc-driver-for-sql-server`
    阅读最新的 SQL Server ODBC 驱动程序的完整文档。


    ### 平台与版本


    从 SQL Server 2017 开始，SQL Server 现已支持在 Windows、Linux 以及 Docker 容器上运行。这为那些以前从未考虑过
    SQL Server 的开发人员打开了平台之门。无论生产环境 SQL Server 运行在何种操作系统上，开发人员现在都可以在 Windows、Linux
    或容器上使用 SQL Server Developer Edition 来测试他们的应用程序。并且，由于 SQL Server 引擎代码库在所有平台上都是一致的，开发人员可以针对其
    SQL Server 部署环境编写应用程序，并确信它与生产环境 SQL Server 兼容。这包括了 SQL Server on Linux 过去存在的功能差距，例如复制和分布式事务（DTC），这些功能现在已在
    SQL Server 2019 中提供。


    虽然对于 SQL Server 2019 来说并非新特性（此功能在 SQL Server 2016 SP1 中引入），但除企业版外的 SQL Server
    版本现在都包含类似的“功能范围”，使得构建一个能在不同版本间工作的单一应用程序变得更加容易。例如，内存中 OLTP 现在作为一项功能可用于 SQL Server
    企业版和标准版，甚至 SQL Server Express 版（尽管该功能的规模在不同版本中并不相同）。现在，你可以在 Developer Edition
    上使用内存中 OLTP 来构建应用程序，并确信它能在各种版本上运行，而无需在你的应用程序中加入检测版本的逻辑。


    ## 图形数据库


    关系数据库的概念可以处理所有类型的设计模型、数据模式和应用程序。然而，有一些根据现实世界问题设计的数据模型，不一定能很好地适应标准的关系系统和 SQL 语言。这些模型通常涉及层级的、“网络状”的或复杂的多对多数据关系。维基百科对这个问题及其解决方案有很好的描述：`https://en.m.wikipedia.org/wiki/Graph_database`。


    一些开发人员曾尝试仍然使用关系数据库来“适应”图模型，并使用复杂的 T-SQL 语句来“遍历”图。在某些情况下，还构建了专门用于图形数据的项目，例如流行的开源图数据库
    Neo4j (`https://github.com/neo4j/neo4j`)。其他数据库平台则在其关系数据库中包含了一个“附加组件”来提供图能力。


    2016 年，SQL 工程团队的成员，包括 Hanuma Kodavalla、Craig Freedman、Devin Rider 和 Shreya Verma，组成了一个项目组，研究将图数据库功能构建到
    SQL Server 和 Azure SQL Database 中。他们的目标是将图能力内置到 SQL Server 引擎中，并找到一种方法使用 T-SQL
    语言来创建图表，并用 T-SQL 操作和搜索它们。这是通过扩展来利用 T-SQL 功能的又一个绝佳范例。


    这项努力的结果是，SQL Server 2017 和 Azure SQL Database 发布了图数据库功能。在 SQL Server 中使用图数据库的一大好处是，它附带了
    SQL Server 的强大功能。这包括高可用性与灾难恢复（HADR）、安全性、性能以及引擎的所有功能。其他平台并未将这些功能融入引擎，而是将它们视为附加组件或完全独立的产品。

