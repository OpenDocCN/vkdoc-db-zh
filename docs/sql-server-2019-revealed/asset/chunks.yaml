- fmt: "## 注意事项\n\n本文档示例基于 Microsoft 的一篇博文中的一些内容，博文链接为[`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/)。该博文还详细介绍了标量\
    \ UDF 函数先前存在的限制以及智能查询处理如何实现显著的性能提升。\n\n对于本节内容，让我们结合 SQL Server Management Studio\
    \ (SSMS) 中的实际执行计划来检查 T-SQL 脚本。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg)\n\
    *图 2-17 未内联的标量 UDF 的执行计划*\n\n1.  打开 T-SQL 脚本 **get_customer_spend.sql**。\n该脚本代码如下：\n\
    ```\n    USE WideWorldImportersDW\n    GO\n    SELECT c.[Customer Key], SUM(oh.[Total\
    \ Including Tax]) as total_spend\n    FROM [Fact].[OrderHistory] oh\n    JOIN\
    \ [Dimension].[Customer] c\n    ON oh.[Customer Key] = c.[Customer Key]\n    GROUP\
    \ BY c.[Customer Key]\n    ORDER BY total_spend DESC\n    GO\n    ```\n此脚本将找出\
    \ `OrderHistory` 表中每个客户的总消费金额。检查输出，您可以看到客户的消费范围从 200 万到超过 700 万。根据应用程序需求，我们需要创建一个用户定义函数，该函数以客户“键”作为输入，并根据其总消费金额将客户分类到某个类别中。任何小于等于\
    \ 300 万的标记为 'REGULAR'。消费在 300 万到 450 万之间的客户标记为 'GOLD'。超过此金额的任何人将被视为 'PLATINUM'。使用函数的优势在于，我们可以更改判定\
    \ REGULAR、GOLD 或 PLATINUM 的规则，而不会影响所有其他使用此函数的代码。\n\n2.  打开 T-SQL 脚本 **iqp_scalarudfinlining.sql**，并按照脚本中的注释执行每个步骤。\n\
    \n3.  执行脚本中的 **Step 1** 部分，这将创建标量 UDF。\n```\n    -- Step 1: 创建一个新函数，根据订单消费获取客户类别\n\
    \    USE WideWorldImportersDW\n    GO\n    CREATE OR ALTER FUNCTION [Dimension].[customer_category](@CustomerKey\
    \ INT)\n    RETURNS CHAR(10) AS\n    BEGIN\n    DECLARE @total_amount DECIMAL(18,2)\n\
    \    DECLARE @category CHAR(10)\n    SELECT @total_amount = SUM([Total Including\
    \ Tax])\n    FROM [Fact].[OrderHistory]\n    WHERE [Customer Key] = @CustomerKey\n\
    \    IF @total_amount <= 3000000\n    SET @category = 'REGULAR'\n    ELSE IF @total_amount\
    \ < 4500000\n    SET @category = 'GOLD'\n    ELSE\n    SET @category = 'PLATINUM'\n\
    \    RETURN @category\n    END\n    GO\n    ```\n\n4.  设置数据库兼容性级别 (`dbcompat`)，清除过程缓存，并通过执行\
    \ **Step 2** 预热缓冲池缓存。\n```\n    -- Step 2: 将数据库设置为 db compat 150，清除之前执行的过程缓存，并通过预热缓存使比较公平\n\
    \    ALTER DATABASE WideWorldImportersDW\n    SET COMPATIBILITY_LEVEL = 150\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION\n    CLEAR PROCEDURE_CACHE;\n\
    \    GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n    ```\n\n5.\
    \  让我们运行一个使用 UDF 的查询，但使用查询提示临时禁用标量 UDF 内联。在 SSMS 中启用实际执行计划，并按脚本顺序运行 **Step 3**。\n\
    ```\n    -- Step 3: 运行查询，但使用查询提示禁用标量内联功能\n    SELECT [Customer Key], [Customer],\
    \ [Dimension].[customer_category]([Customer Key]) AS [Discount Price]\n    FROM\
    \ [Dimension].[Customer]\n    ORDER BY [Customer Key]\n    OPTION (USE HINT('DISABLE_TSQL_SCALAR_UDF_INLINING'))\n\
    \    GO\n    ```\n该查询至少需要 30 多秒。实际执行计划应类似于图 [2-17](#479130_1_En_2_Chapter.xhtml#Fig17)。\n\
    如果将鼠标指针悬停在每个运算符上，您会看到它影响了 403 行。这看起来行数并不多，那为什么需要这么长时间？这是因为您看不到的是，标量函数访问了具有 300\
    \ 万+行的 `OrderHistory` 表；对于 `Dimension.Customer` 表中的每一行，它都要访问 `OrderHistory` 表中的所有\
    \ 300 万行。效率很低。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg)\n\
    *图 2-18 启用内联的标量 UDF 的执行计划*\n\n1.  运行脚本中的 **Step 4**，它将运行相同的查询但不使用提示，从而启用标量 UDF\
    \ 内联。\n```\n    -- Step 4: 再次运行，但不使用提示\n    SELECT [Customer Key], [Customer],\
    \ [Dimension].[customer_category]([Customer Key]) AS [Discount Price]\n    FROM\
    \ [Dimension].[Customer]\n    ORDER BY [Customer Key]\n    GO\n    ```\n查询的执行速度应该显著加快。如果查看实际执行计划，您将看到运行函数所需的操作符如何在计划中展现出来，以及为了支持函数中的查询，如何使访问\
    \ `OrderHistory` 表更高效的新操作符。该计划将类似于图 [2-18](#479130_1_En_2_Chapter.xhtml#Fig18)。\n\
    \n您可以看到标量 UDF 内联的强大功能；现在您应该更有信心在应用程序中使用标量 UDF 了。\n\n您可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining)阅读更多关于标量\
    \ UDF 内联的信息，包括所有要求和限制。"
  raw: "### Note\n\nThis example is loosely based off of examples in the following\
    \ blog post by Microsoft, [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/)\
    \ , which also has some really nice details on the previous limits of scalar UDF\
    \ functions and how Intelligent Query Processing has enabled significant performance\
    \ improvements.\n\nFor this section, let’s use the T-SQL scripts along with examining\
    \ the Actual Execution Plan in SSMS.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17\n\nExecution plan for scalar UDF not inlined\n\n1.  Open up the\
    \ T-SQL script **get_customer_spend.sql**.\n\nThe code for this script looks like\
    \ the following:\n\n```\n    USE WideWorldImportersDW\n    GO\n    SELECT c.[Customer\
    \ Key], SUM(oh.[Total Including Tax]) as total_spend\n    FROM [Fact].[OrderHistory]\
    \ oh\n    JOIN [Dimension].[Customer] c\n    ON oh.[Customer Key] = c.[Customer\
    \ Key]\n    GROUP BY c.[Customer Key]\n    ORDER BY total_spend DESC\n    GO\n\
    \    ```\n\nThis script will find the total spend per customer from the OrderHistory\
    \ table. If you examine the output, you can see the range of spend for customers\
    \ ranging from 2M to over 7M. Based on application requirements, we need to create\
    \ a user-defined function that would take as input a customer “key” and categorize\
    \ the customer into a classification based on their total spend. Anything <= 3M\
    \ will be ‘REGULAR’. Any customer spending between 3M and 4.5M will be ‘GOLD’.\
    \ Anyone spending over this amount will be considered ‘PLATINUM’. Using a function\
    \ has the advantage that we can change the rules for what qualifies for REGULAR,\
    \ GOLD, or PLATINUM and not affect all other code using this function.\n\n2. \
    \ Open the T-SQL script **iqp_scalarudfinlining.sql** and follow each step per\
    \ the comments in the script.\n\n3.  Execute the section in the script **Step\
    \ 1** which will create the scalar UDF.\n\n```\n    -- Step 1: Create a new function\
    \ to get a customer category based on their order spend\n    USE WideWorldImportersDW\n\
    \    GO\n    CREATE OR ALTER FUNCTION [Dimension].[customer_category](@CustomerKey\
    \ INT)\n    RETURNS CHAR(10) AS\n    BEGIN\n    DECLARE @total_amount DECIMAL(18,2)\n\
    \    DECLARE @category CHAR(10)\n    SELECT @total_amount = SUM([Total Including\
    \ Tax])\n    FROM [Fact].[OrderHistory]\n    WHERE [Customer Key] = @CustomerKey\n\
    \    IF @total_amount <= 3000000\n    SET @category = 'REGULAR'\n    ELSE IF @total_amount\
    \ < 4500000\n    SET @category = 'GOLD'\n    ELSE\n    SET @category = 'PLATINUM'\n\
    \    RETURN @category\n    END\n    GO\n    ```\n\n4.  Set up the dbcompat, clear\
    \ the procedure, and warm the buffer pool cache by executing **Step 2**.\n\n```\n\
    \    -- Step 2: Set the database to db compat 150, clear the procedure cache from\
    \ previous executions, and make the comparison fair by warming the cache\n   \
    \ ALTER DATABASE WideWorldImportersDW\n    SET COMPATIBILITY_LEVEL = 150\n   \
    \ GO\n    ALTER DATABASE SCOPED CONFIGURATION\n    CLEAR PROCEDURE_CACHE;\n  \
    \  GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n    ```\n\n5. \
    \ Let’s run a query using the UDF but use a query hint to temporary disable scalar\
    \ UDF inlining. Enable Actual Execution Plan in SSMS and run **Step 3** in the\
    \ sequence of the script.\n\n```\n    -- Step 3: Run the query but disable the\
    \ use of scalar inlining using a query hint\n    SELECT [Customer Key], [Customer],\
    \ [Dimension].[customer_category]([Customer Key]) AS [Discount Price]\n    FROM\
    \ [Dimension].[Customer]\n    ORDER BY [Customer Key]\n    OPTION (USE HINT('DISABLE_TSQL_SCALAR_UDF_INLINING'))\n\
    \    GO\n    ```\n\nThe query takes at least 30+ seconds. The Actual Execution\
    \ Plan should look something like Figure [2-17](#479130_1_En_2_Chapter.xhtml#Fig17)\
    \ .\n\nIf you move your mouse pointer over each operator, you will see it affects\
    \ 403 rows. That doesn’t seem like a lot of rows, so why does it take so long?\
    \ It is because what you can’t see is that the scalar function accesses the OrderHistory\
    \ table, which has 3M+ rows; for each row in the Dimension.Customer table, it\
    \ accesses all 3M rows in the OrderHistory table. Not efficient.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18\n\nExecution plan for scalar UDF with inlining\n\n1.  Run **Step\
    \ 4** in the script which will run the same query without the hint, thus enabling\
    \ scalar UDF inlining.\n\n```\n    -- Step 4: Run it again but don't use the hint\n\
    \    SELECT [Customer Key], [Customer], [Dimension].[customer_category]([Customer\
    \ Key]) AS [Discount Price]\n    FROM [Dimension].[Customer]\n    ORDER BY [Customer\
    \ Key]\n    GO\n    ```\n\nThe query should have executed significantly faster.\
    \ If you look at the Actual Execution Plan, you will see how the operators required\
    \ to run the function are exposed in the plan, and new operators to make accessing\
    \ the OrderHistory table more efficient to support the query in the function.\
    \ The plan will look something like Figure [2-18](#479130_1_En_2_Chapter.xhtml#Fig18).\n\
    \nYou can see the power of scalar UDF inlining; now you should feel more empowered\
    \ to use scalar UDFs in your applications.\n\nYou can read more about scalar UDF\
    \ inlining, including all the requirements and restrictions, at [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining)\
    \ ."
  trans: "\n## 注意事项\n\n本文档示例基于微软的一篇博文，博文链接为[`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/)。该博文还详细介绍了标量\
    \ UDF 函数先前存在的限制，以及智能查询处理如何实现显著的性能提升。\n\n对于本节内容，让我们结合 SQL Server Management Studio\
    \ (SSMS) 中的实际执行计划来检查 T-SQL 脚本。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg](img/479130_1_En_2_Fig17_HTML.jpg)\n\
    *图 2-17 未内联的标量 UDF 的执行计划*\n\n1.  打开 T-SQL 脚本 **get_customer_spend.sql**。\n该脚本代码如下：\n\
    ```\n    USE WideWorldImportersDW\n    GO\n    SELECT c.[Customer Key], SUM(oh.[Total\
    \ Including Tax]) as total_spend\n    FROM [Fact].[OrderHistory] oh\n    JOIN\
    \ [Dimension].[Customer] c\n    ON oh.[Customer Key] = c.[Customer Key]\n    GROUP\
    \ BY c.[Customer Key]\n    ORDER BY total_spend DESC\n    GO\n    ```\n此脚本将找出\
    \ `OrderHistory` 表中每个客户的总消费金额。检查输出，您可以看到客户的消费范围从 200 万到超过 700 万。根据应用程序需求，我们需要创建一个用户定义函数，该函数以客户“键”作为输入，并根据其总消费金额将客户分类到某个类别中。任何小于等于\
    \ 300 万的标记为 'REGULAR'。消费在 300 万到 450 万之间的客户标记为 'GOLD'。超过此金额的任何人将被视为 'PLATINUM'。使用函数的优势在于，我们可以更改判定\
    \ REGULAR、GOLD 或 PLATINUM 的规则，而不会影响所有其他使用此函数的代码。\n\n2.  打开 T-SQL 脚本 **iqp_scalarudfinlining.sql**，并按照脚本中的注释执行每个步骤。\n\
    \n3.  执行脚本中的 **Step 1** 部分，这将创建标量 UDF。\n```\n    -- Step 1: 创建一个新函数，根据订单消费获取客户类别\n\
    \    USE WideWorldImportersDW\n    GO\n    CREATE OR ALTER FUNCTION [Dimension].customer_category\n\
    \    RETURNS CHAR(10) AS\n    BEGIN\n    DECLARE @total_amount DECIMAL(18,2)\n\
    \    DECLARE @category CHAR(10)\n    SELECT @total_amount = SUM([Total Including\
    \ Tax])\n    FROM [Fact].[OrderHistory]\n    WHERE [Customer Key] = @CustomerKey\n\
    \    IF @total_amount <= 3000000\n    SET @category = 'REGULAR'\n    ELSE IF @total_amount\
    \ < 4500000\n    SET @category = 'GOLD'\n    ELSE\n    SET @category = 'PLATINUM'\n\
    \    RETURN @category\n    END\n    GO\n    ```\n\n4.  设置数据库兼容性级别 (`dbcompat`)，清除过程缓存，并通过执行\
    \ **Step 2** 预热缓冲池缓存。\n```\n    -- Step 2: 将数据库设置为 db compat 150，清除之前执行的过程缓存，并通过预热缓存使比较公平\n\
    \    ALTER DATABASE WideWorldImportersDW\n    SET COMPATIBILITY_LEVEL = 150\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION\n    CLEAR PROCEDURE_CACHE;\n\
    \    GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n    ```\n\n5.\
    \  让我们运行一个使用 UDF 的查询，但使用查询提示临时禁用标量 UDF 内联。在 SSMS 中启用实际执行计划，并按脚本顺序运行 **Step 3**。\n\
    ```\n    -- Step 3: 运行查询，但使用查询提示禁用标量内联功能\n    SELECT [Customer Key], [Customer],\
    \ [Dimension].customer_category AS [Discount Price]\n    FROM [Dimension].[Customer]\n\
    \    ORDER BY [Customer Key]\n    OPTION (USE HINT('DISABLE_TSQL_SCALAR_UDF_INLINING'))\n\
    \    GO\n    ```\n该查询至少需要 30 多秒。实际执行计划应类似于图 2-17。\n如果将鼠标指针悬停在每个运算符上，您会看到它影响了 403\
    \ 行。这看起来行数并不多，那为什么需要这么长时间？这是因为您看不到的是，标量函数访问了具有 300 万+行的 `OrderHistory` 表；对于 `Dimension.Customer`\
    \ 表中的每一行，它都要访问 `OrderHistory` 表中的所有 300 万行。效率很低。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg](img/479130_1_En_2_Fig18_HTML.jpg)\n\
    *图 2-18 启用内联的标量 UDF 的执行计划*\n\n1.  运行脚本中的 **Step 4**，它将运行相同的查询但不使用提示，从而启用标量 UDF\
    \ 内联。\n```\n    -- Step 4: 再次运行，但不使用提示\n    SELECT [Customer Key], [Customer],\
    \ [Dimension].customer_category AS [Discount Price]\n    FROM [Dimension].[Customer]\n\
    \    ORDER BY [Customer Key]\n    GO\n    ```\n查询的执行速度应该显著加快。如果查看实际执行计划，您将看到运行函数所需的操作符如何在计划中展现出来，以及为了支持函数中的查询，如何使访问\
    \ `OrderHistory` 表更高效的新操作符。该计划将类似于图 2-18。\n\n您可以看到标量 UDF 内联的强大功能；现在您应该更有信心在应用程序中使用标量\
    \ UDF 了。\n\n您可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining)阅读更多关于标量\
    \ UDF 内联的信息，包括所有要求和限制。\n"
- fmt: "### Approximate Count Distinct\n\n存在需要统计任何表中行数的场景。这很简单，只需使用 `SELECT COUNT(∗)\
    \ FROM <table>` 即可得到答案。但也有些情况需要知道表中某一列在所有行中的不同值数量。此时，问题也不算太难，只需使用 `SELECT COUNT(DISTINCT\
    \ <col>) FROM <table>`。这看起来足够简单，唯一的问题在于查询处理器需要做大量工作来找出所有不同的值。\n\n对于 SQL Server，这通常需要使用\
    \ `Hash Match` 操作符。该操作符类似于 Hash Join，它使用一个“哈希表”来构建所有不同值的列表以进行计数。如果你还记得本章前面内容，Hash\
    \ Join 需要一个内存授权，因此所有与内存授权相关的问题都可能出现。此外，使用哈希表来统计所有不同值会消耗大量计算资源。\n\n有更好的方法吗？嗯，有一种不同的方法可能更快，代价是答案的精确度稍低。解决方案是一个名为\
    \ `APPROX_COUNT_DISTINCT()` 的新 T-SQL 函数。这是一个内置函数，它基于样本近似来统计列的不同值数量。这不是对 `COUNT()`\
    \ 函数的增强，而是一个全新的函数，这就是为什么它不需要 `dbcompat = 150`。该函数使用了一个称为 `HyperLogLog` 的概念（你可以在\
    \ [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)\
    \ 阅读更多关于此概念的内容）。使用近似值统计不同值会带来 2% 的误差率（在 97% 的概率下）。这意味着，如果你可以接受一个你认为很接近真实情况的答案，就可以使用此函数。\n\
    \n让我们看一个使用此函数与使用 `COUNT` 和 `DISTINCT` 的对比示例。\n\n所有脚本示例请使用目录 `ch2_intelligent_performance\\\
    iqp\\approxcount`。你可以使用 T-SQL 笔记本 `iqp_approxcountdistinct.ipynb` 来逐步查看示例。我还提供了一个名为\
    \ `iqp_approxcountdistinct.sql` 的 T-SQL 脚本。让我们使用这个 T-SQL 脚本，逐步检查查询和执行计划的差异。\n\n\
    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19\n\n`COUNT` 和 `DISTINCT` 的查询计划\n\n1.  在 SSMS 中打开 `iqp_approxcountdistinct.sql`\
    \ 脚本。\n2.  运行 **Step 1** 组的语句以清除过程缓存、将数据库兼容级别更改为 130，并预热缓冲池（以确保公平竞争）。\n\n    ```sql\n\
    \    -- Step 1: 清除缓存，将数据库兼容级别设置为 130 以证明其有效，并预热缓存\n    USE WideWorldImportersDW\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n\
    \    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130\n    GO\n\
    \    SELECT COUNT(*) FROM Fact.OrderHistoryExtended\n    GO\n    ```\n\n你可能会好奇为什么我强制将\
    \ `dbcompat` 设置为 130——这是为了向你证明，利用此功能不必使用最新的 `dbcompat` 150。这是因为新的 T-SQL 函数 `APPROX_COUNT_DISTINCT()`\
    \ *仅仅* 随 SQL Server 2019 引擎提供，不像其他智能查询处理功能那样需要新的数据库兼容级别。\n\n3.  在 SSMS 中启用实际执行计划，然后按如下方式运行\
    \ **Step 2**：\n\n    ```sql\n    -- Step 2: 首先使用 COUNT 和 DISTINCT\n    SELECT\
    \ COUNT(DISTINCT [WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n   \
    \ GO\n    ```\n\n根据计算机速度，此查询运行时间不会太长——大约 4 到 5 秒。你的结果应该是 29620736。用五秒钟统计不同值并不算太糟。然而，如果这个表有一亿行或更多呢？在大型数据库中，这并不罕见。\n\
    \n如果你查看执行计划，会看到类似图 [2-19](#479130_1_En_2_Chapter.xhtml#Fig19) 的内容。\n\n注意 `Hash\
    \ Match` 操作符。将鼠标悬停在该操作符上，你会看到它使用行模式，并且必须在哈希操作符中处理全部 2900 万行数据。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20\n\n`APPROX_COUNT_DISTINCT` 的查询计划\n\n1.  现在运行脚本中的 **Step 3**：\n\n    ```sql\n\
    \    -- Step 3: 使用新的 APPROX_COUNT_DISTINCT 函数来比较值和性能\n    -- 我们与实际不同值的偏差不应超过 2%（97%\
    \ 概率）\n    SELECT APPROX_COUNT_DISTINCT([WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n\
    \    GO\n    ```\n\n这次，查询应该只需要一两秒——比之前快了约 50%。同样，在非常大的数据集上，这可能意义重大。\n\n如果你查看执行计划，它看起来相似但操作符更少，如图\
    \ [2-20](#479130_1_En_2_Chapter.xhtml#Fig20) 所示。\n\n注意 `Hash Match` 操作符的输出没有“粗线”，因为近似操作随此操作符应用，只向计划的其余部分输出一行。\n\
    \n如你所见，使用近似值来统计不同值可以提供更好的性能，前提是你只需要一个“足够接近”的值。\n\n1.  通过执行脚本中的 **Step 4** 将数据库兼容级别恢复为\
    \ 150。\n\n    ```sql\n    -- Step 4: 恢复数据库兼容级别\n    ALTER DATABASE WideWorldImportersDW\
    \ SET COMPATIBILITY_LEVEL = 150\n    GO\n    ```\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql)\
    \ 阅读更多关于 `APPROX_COUNT_DISTINCT` 函数的内容。\n\n智能查询处理的核心在于，一个更智能的查询处理器无需对应用程序进行重大修改即可满足你的查询工作负载需求。大多数功能只需将数据库兼容级别更改为\
    \ 150 即可启用。随着查询处理器在未来基于你的反馈应对新场景，我期待看到更多的增强功能。"
  raw: "### Approximate Count Distinct\n\nThere are scenarios where you need to count\
    \ the number of rows in any table. That’s easy. Just use SELECT COUNT(∗) FROM\
    \ <table> and you have your answer. But there are also situations where you need\
    \ to know the number of distinct values of a column across all rows of a table.\
    \ In this case, that is not that much harder. Just use SELECT COUNT(DISTINCT <col>)\
    \ FROM <table>. That seems easy enough. The only problem is how the query processor\
    \ must do work to figure out what are all the distinct values.\n\nFor SQL Server,\
    \ this often requires the use of a *Hash Match* operator. This operator is similar\
    \ to a Hash Join, in that a “hash table” is used to build a list of all the distinct\
    \ values to count. If you remember, earlier in this chapter, a Hash Join requires\
    \ a memory grant, so all the issues with memory grants can come into play. Furthermore,\
    \ it can take a great deal of compute resources to use a hash table to count all\
    \ the distinct values.\n\nIs there a better way? Well, there is a *different*\
    \ way that could be faster, at the cost of a slightly less precise answer. The\
    \ solution is a **new T-SQL function** called **APPROX_COUNT_DISTINCT**() . This\
    \ is a built-in function that will count distinct values of a column based on\
    \ a sample approximation. This is not an enhancement for the COUNT() function.\
    \ This is an entirely new function, which is why it does not require dbcompat\
    \ = 150\\. This function uses a concept called *HyperLogLog* (you can read more\
    \ about this concept at [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)\
    \ ). Using an approximation of the count of distinct values comes with a 2% error\
    \ rate on a 97% probability. This means if you can get back an answer that you\
    \ are pretty confident will be close to the real truth, you can use this function.\n\
    \nLet’s see an example of using this function in comparison to using COUNT and\
    \ DISTINCT.\n\nUse the directory **ch2_intelligent_performance\\iqp\\approxcount**\
    \ for all script examples. You can walk through the examples using a T-SQL notebook\
    \ **iqp_approxcountdistinct.ipynb**. I’ve also provided a T-SQL script called\
    \ **iqp_approxcountdistinct.sql.** Let’s use the T-SQL script and walk through\
    \ step by step examining the queries and execution plan differences.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg)\n\
    \nFigure 2-19\n\nQuery plan for COUNT and DISTINCT\n\n1.  Open up the **iqp_approxcountdistinct.sql**\
    \ script in SSMS.\n\n2.  Run the **Step 1** set of statements to clear the procedure\
    \ cache, change the dbcompat level to 130, and warm the buffer pool (make it a\
    \ fair fight).\n\n```\n    -- Step 1: Clear the cache, set dbcompat to 130 just\
    \ to prove it works, and warm the cache\n    USE WideWorldImportersDW\n    GO\n\
    \    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ALTER\
    \ DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130\n    GO\n    SELECT\
    \ COUNT(*) FROM Fact.OrderHistoryExtended\n    GO\n    ```\n\nYou may wonder why\
    \ I forced the dbcompat to 130 – to prove to you that you don’t have to use the\
    \ latest dbcompat of 150 to take advantage of this capability. This is because\
    \ the new T-SQL function APPROX_COUNT_DISTINCT() *just comes* with the SQL Server\
    \ 2019 engine but doesn’t require a new dbcompat like other Intelligent Query\
    \ Processing features.\n\n3.  Enable Actual Execution Plan in SSMS and run **Step\
    \ 2** as follows:\n\n```\n    -- Step 2: Use COUNT and DISTINCT first\n    SELECT\
    \ COUNT(DISTINCT [WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n   \
    \ GO\n    ```\n\nThis won’t take that long to run, depending on how fast your\
    \ computer is – maybe 4 to 5 seconds. Your results should be 29620736\\. Five\
    \ seconds to count the distinct values is not too bad. However, what if this table\
    \ had 100 million rows or more? That is not that out of the ordinary in large\
    \ databases.\n\nIf you look at the execution plan, you will see something like\
    \ Figure [2-19](#479130_1_En_2_Chapter.xhtml#Fig19).\n\nNotice the Hash Match\
    \ operator. If you move your mouse over that operator, you will see it uses Row\
    \ Mode and has to process the entire 29M rows in the hash operator.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg)\n\
    \nFigure 2-20\n\nQuery plan for APPROX_COUNT_DISTINCT\n\n1.  Now run **Step 3**\
    \ from the script as follows:\n\n```\n    -- Step 3: Use the new APPROX_COUNT_DISTINCT\
    \ function to compare values and performance\n    -- We should be no more than\
    \ 2% off the actual distinct value (97% probability)\n    SELECT APPROX_COUNT_DISTINCT([WWI\
    \ Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n    GO\n    ```\n\nThis\
    \ time, the query should only take a second or two – about 50% faster than before.\
    \ Again, this could be significant on very large datasets.\n\nIf you look at the\
    \ execution plan, it looks similar but with less operators, as seen in Figure\
    \ [2-20](#479130_1_En_2_Chapter.xhtml#Fig20).\n\nNotice the Hash Match operator\
    \ doesn’t have a “thick line” as output because the approximation operation is\
    \ applied with this operator yielding only one row to the rest of the plan.\n\n\
    As you can see, the use of approximation for counting distinct values can provide\
    \ better performance provided you need only a “close enough” value.\n\n1.  Restore\
    \ dbcompat to 150 by executing **Step 4** in the script.\n\n```\n    -- Step 4:\
    \ Restore database compatibility level\n    ALTER DATABASE WideWorldImportersDW\
    \ SET COMPATIBILITY_LEVEL = 150\n    GO\n    ```\n\nYou can read more about the\
    \ APPROX_COUNT_DISTINCT function at [`https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql)\
    \ .\n\nIntelligent Query Processing is all about a smarter query processor meeting\
    \ the needs of your query workloads without making major application changes.\
    \ Most of the functionality is available by simply changing your database compatibility\
    \ level to 150\\. I look forward to more enhancements in the future as the query\
    \ processor takes on new scenarios powered by your feedback."
  trans: "### 近似计数不同值\n\n存在需要统计任何表中行数的场景。这很简单，只需使用 `SELECT COUNT(*) FROM <table>`\
    \ 即可得到答案。但也有些情况需要知道表中某一列在所有行中的不同值数量。此时，问题也不算太难，只需使用 `SELECT COUNT(DISTINCT <col>)\
    \ FROM <table>`。这看起来足够简单，唯一的问题在于查询处理器需要做大量工作来找出所有不同的值。\n\n对于 SQL Server，这通常需要使用\
    \ `Hash Match` 操作符。该操作符类似于 Hash Join，它使用一个“哈希表”来构建所有不同值的列表以进行计数。如果你还记得本章前面内容，Hash\
    \ Join 需要一个内存授权，因此所有与内存授权相关的问题都可能出现。此外，使用哈希表来统计所有不同值会消耗大量计算资源。\n\n有更好的方法吗？嗯，有一种不同的方法可能更快，代价是答案的精确度稍低。解决方案是一个名为\
    \ `APPROX_COUNT_DISTINCT()` 的新 T-SQL 函数。这是一个内置函数，它基于样本近似来统计列的不同值数量。这不是对 `COUNT()`\
    \ 函数的增强，而是一个全新的函数，这就是为什么它不需要 `dbcompat = 150`。该函数使用了一个称为 `HyperLogLog` 的概念（你可以在\
    \ [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)\
    \ 阅读更多关于此概念的内容）。使用近似值统计不同值会带来 2% 的误差率（在 97% 的概率下）。这意味着，如果你可以接受一个你认为很接近真实情况的答案，就可以使用此函数。\n\
    \n让我们看一个使用此函数与使用 `COUNT` 和 `DISTINCT` 的对比示例。\n\n所有脚本示例请使用目录 `ch2_intelligent_performance\\\
    iqp\\approxcount`。你可以使用 T-SQL 笔记本 `iqp_approxcountdistinct.ipynb` 来逐步查看示例。我还提供了一个名为\
    \ `iqp_approxcountdistinct.sql` 的 T-SQL 脚本。让我们使用这个 T-SQL 脚本，逐步检查查询和执行计划的差异。\n\n\
    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg](img/479130_1_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19\n\n`COUNT` 和 `DISTINCT` 的查询计划\n\n1.  在 SSMS 中打开 `iqp_approxcountdistinct.sql`\
    \ 脚本。\n2.  运行 **Step 1** 组的语句以清除过程缓存、将数据库兼容级别更改为 130，并预热缓冲池（以确保公平竞争）。\n\n    ```sql\n\
    \    -- Step 1: 清除缓存，将数据库兼容级别设置为 130 以证明其有效，并预热缓存\n    USE WideWorldImportersDW\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n\
    \    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130\n    GO\n\
    \    SELECT COUNT(*) FROM Fact.OrderHistoryExtended\n    GO\n    ```\n\n你可能会好奇为什么我强制将\
    \ `dbcompat` 设置为 130——这是为了向你证明，利用此功能不必使用最新的 `dbcompat` 150。这是因为新的 T-SQL 函数 `APPROX_COUNT_DISTINCT()`\
    \ *仅仅* 随 SQL Server 2019 引擎提供，不像其他智能查询处理功能那样需要新的数据库兼容级别。\n\n3.  在 SSMS 中启用实际执行计划，然后按如下方式运行\
    \ **Step 2**：\n\n    ```sql\n    -- Step 2: 首先使用 COUNT 和 DISTINCT\n    SELECT\
    \ COUNT(DISTINCT [WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n   \
    \ GO\n    ```\n\n根据计算机速度，此查询运行时间不会太长——大约 4 到 5 秒。你的结果应该是 29620736。用五秒钟统计不同值并不算太糟。然而，如果这个表有一亿行或更多呢？在大型数据库中，这并不罕见。\n\
    \n如果你查看执行计划，会看到类似图 2-19 的内容。\n\n注意 `Hash Match` 操作符。将鼠标悬停在该操作符上，你会看到它使用行模式，并且必须在哈希操作符中处理全部\
    \ 2900 万行数据。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg](img/479130_1_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20\n\n`APPROX_COUNT_DISTINCT` 的查询计划\n\n1.  现在运行脚本中的 **Step 3**：\n\n    ```sql\n\
    \    -- Step 3: 使用新的 APPROX_COUNT_DISTINCT 函数来比较值和性能\n    -- 我们与实际不同值的偏差不应超过 2%（97%\
    \ 概率）\n    SELECT APPROX_COUNT_DISTINCT([WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n\
    \    GO\n    ```\n\n这次，查询应该只需要一两秒——比之前快了约 50%。同样，在非常大的数据集上，这可能意义重大。\n\n如果你查看执行计划，它看起来相似但操作符更少，如图\
    \ 2-20 所示。\n\n注意 `Hash Match` 操作符的输出没有“粗线”，因为近似操作随此操作符应用，只向计划的其余部分输出一行。\n\n如你所见，使用近似值来统计不同值可以提供更好的性能，前提是你只需要一个“足够接近”的值。\n\
    \n1.  通过执行脚本中的 **Step 4** 将数据库兼容级别恢复为 150。\n\n    ```sql\n    -- Step 4: 恢复数据库兼容级别\n\
    \    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150\n    GO\n\
    \    ```\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql)\
    \ 阅读更多关于 `APPROX_COUNT_DISTINCT` 函数的内容。\n\n智能查询处理的核心在于，一个更智能的查询处理器无需对应用程序进行重大修改即可满足你的查询工作负载需求。大多数功能只需将数据库兼容级别更改为\
    \ 150 即可启用。随着查询处理器在未来基于你的反馈应对新场景，我期待看到更多的增强功能。"
- fmt: '## Lightweight Query Profiling


    When I joined the SQL Server engineering team in 2016, I had spent a lifetime
    in technical support working on some of the most challenging problems ever seen
    by SQL Server customers. And no set of problems challenged me and others in CSS
    more than performance problems. Performance problems in SQL Server are tough –
    they are vague and time critical, and rarely do you have the information you need,
    when you need it.


    SQL Server has amazing diagnostics for performance problems, including `Dynamic
    Management Views (DMVs)` and `Extended Events`. We had built `DMVs` to be a great
    mechanism to see `what is running` at any point in time. This is a great way to
    find out about active sessions and what queries they are running. But often, to
    solve a complex performance problem, you need details of the query plan.


    So, the gap was going deeper. You can see what is running, but you can’t dive
    deep into a query plan for an active query. Furthermore, if you need to find out
    the details of a query plan for a query that has completed, you need to use what
    can be `heavy` diagnostics in the form of `Extended Events`. Or you need to find
    the exact query and run it `offline` (that is away from the application) in a
    separate tool and turn on query plan diagnostics to get all the details.


    As I joined the engineering team, I discovered there was work in progress to solve
    these types of problems by the famous Tiger Team. Pedro Lopes, Alexey Eksarevskiy,
    and Jay Choe were already working on something called the `query profiling infrastructure`.
    If you ask any developer about how to trace their code, they will use the term
    `profiling`. So how do you profile a query with SQL Server? It usually comes down
    to getting details about the query execution plan. It is all about gaining these
    insights while a query is running and obtaining the actual query execution plan
    when a query has completed.


    This team had built the concept already of `live query stats`. (You can read more
    about this topic at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics).)
    It was logical they could do more. As Alexey tells it, “I wanted this feature
    in the product as early as in 2009… spending so much time staring at the plans
    then, I wished they would come alive to easier see what’s going on. So, the idea
    of live query stats. Those two perfectly complement each other, though of course,
    lightweight profiling allows to do much more.”


    In fact, what the team had built was a query execution statistics profile infrastructure,
    or `standard profiling`. This capability gives you actual execution plan statistics
    at the operator level for rows, `CPU`, and `I/O`. This is key information to profile
    a query, but there is a catch. You must enable this before running the query or
    enable `Extended Events` for all queries which can be impactful to production
    workloads. You can read more about standard profiling at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#the-standard-query-execution-statistics-profiling-infrastructure`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523the-standard-query-execution-statistics-profiling-infrastructure).


    I love working with colleagues like Pedro, Alexey, and Jay. They are always asking,
    “Can we make this better?” And of course, they are all super smart. They know
    from experience how painful it can be to use standard profiling. They created
    the lightweight query execution statistics profiling infrastructure, or `lightweight
    profiling`. The concept is to get profiling for queries without the overhead required
    from standard profiling. However, to make it “light,” we had to take out collecting
    `CPU` statistics so you still get “per operator” rowcount and `I/O` statistics.
    You can read more about lightweight profiling at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523lwp).


    This is great, but… you still need to `turn this on` to make it work. How do you
    know when to enable lightweight profiling? Well, often you don’t. No one does.
    The true answer is to just have lightweight profiling running `by default`. And
    that is what SQL Server 2019 provides. Pedro calls this, “Performance insights
    anytime and anywhere.” Is there a catch? Yes. You only get rowcount information
    from actively running queries, but often that is enough to help look at performance
    problems. But there is a bonus. We’ve added the ability to get the last actual
    execution plan for most cached queries.


    Let’s look at two scenarios so you can understand the benefit of having lightweight
    query profiling on by default in SQL Server 2019.


    ### Prerequisites for Using the Examples for Lightweight Query Profiling


    First, you need to perform some setup to use examples for the two scenarios. For
    examples in this chapter, you will use the `WideWorldImporters` example database
    (you can read more about this database and its schema at [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)).


    These examples will work on SQL Server 2019 on Windows, Linux, and Containers.
    Given the large dataset, SQL Server is going to need at least 12Gb `RAM` to properly
    see performance differences. In addition, some of the query examples use parallelism,
    so installing SQL Server on a multiprocessor system is preferred.


    All the scripts used for this chapter can be found on the GitHub repo under the
    `ch2_intelligent_performance\lwp` directory.


    In order to use the examples in this chapter, you need to go through the following
    steps:


    1.  Download the `WideWorldImporters` database backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak).


    2.  Restore this database to your SQL Server 2019 instance. You can use the provided
    `restorewwi.sql` script. You may need to change the directory paths for the location
    of your backup and where you will restore the database files.


    3.  In order to run some of the examples, you will need larger tables than what
    is installed by default in `WideWorldImporters`. Therefore, run the script `extendwwi.sql`
    to create a larger table. Extending this database will increase its size including
    the transaction log to about 5Gb overall. One of these tables is called `Sales.InvoiceLinesExtended`.
    Based on the `InvoiceLines` table, we will make this table much larger and not
    use a columnstore index.'
