    \ try to scan the remote table\n    SELECT * FROM azuresqldb.ModernStockItems\n\
    \    GO\n    ```\n\nRemote operators are built into the query processor to support\
    \ queries against external tables using the Polybase service. Figure [9-10](#479130_1_En_9_Chapter.xhtml#Fig10)\
    \ shows an Actual Execution Plan for the query in Step 7, including the details\
    \ of the remote operator.\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10\n\nThe remote operator for external tables\n\nPolybase also comes\
    \ with a series of Dynamic Management Views that can be used to look at the execution\
    \ of queries against external tables.\n\n**sys.dm_exec_distributed_requests** –\
    \ Much like sys.dm_exec_requests you can find out queries specific to Polybase.\
    \ What is nice about this DMV is that it holds the history of recent queries and\
    \ not just the active ones. The value in the **execution_id** column is the key\
    \ to use other DMVs to dig deeper into query execution.\n\n**sysdm_exec_distributed_request_steps** –\
    \ This DMV will take the execution_id from sys.dm_exec_distributed_requests and\
    \ let you look at specific steps in the execution of Polybase to process the query\
    \ against the external table. For an execution_id, each step has a **step_index**\
    \ value.\n\n**sys.dm_exec_distributed_sql_requests** – This DMV shows more details\
    \ for each step_index in sys.dm_exec_distributed_steps, including what compute\
    \ node is executing the query (it could be the head and/or compute nodes for a\
    \ scale-out query).\n\n**dm_exec_dms_workers** – This DMV provides more details\
    \ about execution with the Polybase Data Movement Service (DMS) for a specific\
    \ execution_id and step_index. This DMV is important to see details of the connection\
    \ to an external data source via the ODBC drivers, including possible error information.\n\
    \n5.  Run **Step 8** to use a WHERE clause to filter results (and possibly use\
    \ pushdown to the external data source):\n\n```\n    -- Step 8: Try to find just\
    \ a specific StockItemID\n    SELECT * FROM azuresqldb.ModernStockItems WHERE\
    \ StockItemID = 100000\n    GO\n    ```\n\n6.  Run **Step 9** to find all stockitems\
    \ both on SQL Server 2019 and Azure SQL Database using a UNION:\n\n```\n    --\
    \ Step 9: Use a UNION to find all stockitems for a specific supplier both locally\
    \ and in the Azure table\n    SELECT msi.StockItemName, msi.Brand, c.ColorName\n\
    \    FROM azuresqldb.ModernStockItems msi\n    JOIN [Purchasing].[Suppliers] s\n\
    \    ON msi.SupplierID = s.SupplierID\n    and s.SupplierName = 'Graphic Design\
    \ Institute'\n    JOIN [Warehouse].[Colors] c\n    ON msi.ColorID = c.ColorID\n\
    \    UNION\n    SELECT si.StockItemName, si.Brand, c.ColorName\n    FROM [Warehouse].[StockItems]\
    \ si\n    JOIN [Purchasing].[Suppliers] s\n    ON si.SupplierID = s.SupplierID\n\
    \    and s.SupplierName = 'Graphic Design Institute'\n    JOIN [Warehouse].[Colors]\
    \ c\n    ON si.ColorID = c.ColorID\n    GO\n    ```\n\nThe first part of the UNION\
    \ involves a join between the external table and a local SQL Server table.\n\n\
    You have seen an example of using an external table for Data Virtualization with\
    \ Azure SQL Database using the built-in connector for SQL Server. Read on for\
    \ some information about the other examples in the sqldatahub folder.\n\n### Using\
    \ Built-in Connectors for External Tables\n\nThese are the other examples which\
    \ use the built-in connectors for external tables. Each example has a readme.md\
    \ file with tips on setting up the external data source and scripts to build the\
    \ data source object and populate data. They all follow the same template as the\
    \ example for Azure SQL Database.\n\n*   **ch9_data_virtualization\\sqldatahub\\\
    cosmosdb** – Use this for an example of using the MongoDB connector with Azure\
    \ CosmosDB.\n\n*   **ch9_data_virtualization\\sqldatahub\\oracle** – Use this\
    \ for an example of using the Oracle connector.\n\n### Tip\n\nOne issue that I\
    \ ran into is that the value for the LOCATION property for the EXTERNAL TABLE\
    \ for Oracle is case sensitive.\n\n*   **ch9_data_virtualization\\sqldatahub\\\
    sql2008r2** – Use this for an example of using the SQL Server connector to an\
    \ older version of SQL Server.\n\n### Note\n\nThis example requires a workaround\
    \ for SQL Server 2008R2 which was not addressed at the time I wrote this chapter.\
    \ As we were getting close to release, it was not clear how far back we would\
    \ support SQL Server versions, since 2008R2 is out of support.\n\n### Using an\
    \ External Table with HDFS\n\nAn example of using Polybase with HDFS and Azure\
    \ Blob Storage can be found in the **ch9_data_virtualization\\sqldatahub\\hdfs**\
    \ directory. The readme.md file included provides more information on how to set\
    \ this up and how to use the example.\n\nOne big difference with external data\
    \ sources with HDFS is the use of the LOCATION property with the external data\
    \ source and the use of the TYPE property.\n\nHere is an example of the T-SQL\
    \ statement to create the external data source from the example:\n\n```\nCREATE\
    \ EXTERNAL DATA SOURCE bwdatalake with (\nTYPE = HADOOP,\nLOCATION ='wasbs://@',\n\
    CREDENTIAL = AzureStorageCredential\n)\nGO\n```\n\nUnlike the other examples,\
    \ a TYPE field is needed for HADOOP. In addition, the LOCATION property doesn’t\
    \ have a <type> like sqlserver. This is because the TYPE = HADOOP tells SQL Server\
    \ the type of connector to use for HDFS.\n\n### Using External Tables with ODBC\
    \ Connectors\n\nThe final example is for an external table for SAP HANA using\
