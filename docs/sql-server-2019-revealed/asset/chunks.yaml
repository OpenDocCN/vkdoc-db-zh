    \ forever. Why didn’t SQL Server just bring the database back up immediately?\
    \ You explain because recovery has to roll back the transaction you killed, or\
    \ the database won’t be consistent. Imagine none of that has to happen anymore.\
    \ Welcome to Accelerated Database Recovery (ADR), one of the most innovative technologies\
    \ I’ve seen come to the core SQL Server engine in some time. ADR is designed to\
    \ make rollback instant, allow the transaction log to be aggressively truncated,\
    \ and provide for “constant time recovery” for a user database. I wanted to start\
    \ off with this topic, but I’ll hold your curiosity until the end of the chapter.\n\
    \n## Online Index Maintenance\n\nIndexes can be such an important aspect to database\
    \ performance. Therefore, maintaining indexes is a common task to keep your database\
    \ healthy. One issue with creating indexes is the availability to access your\
    \ data given the locks that are required on the table. The creation or rebuild\
    \ of a clustered index effectively locks the table for the duration of the index\
    \ operation. A nonclustered index create or rebuild can still be intrusive because\
    \ it requires a shared (SH) table lock.\n\nSQL Server 2005 (yes it has been around\
    \ that long) introduced the concept of an *online* index create or rebuild. An\
    \ online index build provides better availability to the application because a\
    \ table lock is not required during the index build process.\n\n### Note\n\nThere\
    \ is some locking against the table, but these are shorter in length and performed\
    \ in phases during the online index build. To read more about how an online index\
    \ is built, read the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/how-online-index-operations-work`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/how-online-index-operations-work)\
    \ . A useful resource for understanding the original online index implementation\
    \ is at [`https://docs.microsoft.com/en-us/previous-versions/sql/sql-server-2005/administrator/cc966402(v=technet.10)`](https://docs.microsoft.com/en-us/previous-versions/sql/sql-server-2005/administrator/cc966402%2528v%253Dtechnet.10%2529)\
    \ .\n\nWhile an online index build can help with availability, building an index\
    \ can be resource intensive, which could still affect overall application availability\
    \ depending on the nature of the queries of the application. Furthermore, there\
    \ could be situations where building an index on a large table in one operation\
    \ could be problematic, such as if the index failed before completing. A failure\
    \ during an index build (e.g., you run out of space in the database) requires\
    \ you to fix the problem and restart the index build from the beginning. Wouldn’t\
    \ it be nice to be able to take any index build operation and “start where it\
    \ left off” should it fail? It would also be nice to schedule an index build into\
    \ multiple segments, say, to spread across maintenance windows.\n\n### Resumable\
    \ Index Operations\n\nIn SQL Server 2017, we introduced the concept of a *resumable*\
    \ index *rebuild* operation. The idea is that you start rebuilding an index with\
    \ the T-SQL statement **ALTER INDEX REBUILD**, and then you can use ALTER INDEX\
    \ with the **PAUSE** option to suspend the index rebuild. All the progress to\
    \ rebuild the new online index is saved so you can resume the index rebuild with\
    \ ALTER INDEX using the **RESUME** option. You also have the option to abort an\
    \ online index rebuild in progress with an ALTER INDEX command using the **ABORT**\
    \ option. You can read the full syntax of how to use ALTER INDEX for a resumable\
    \ index in the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql)\
    \ . You can also read more specific details of how resumable rebuild index works\
    \ and any restrictions at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql#online-index-operations`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql%2523online-index-operations)\
    \ .\n\nSQL Server 2019 introduces the concept of resumable indexes when *creating*\
    \ the index with **CREATE INDEX**. You can read the syntax for how to create a\
    \ resumable index in the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql)\
    \ . You can also read more details about resumable index creation at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql#online-option`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql%2523online-option)\
    \ .\n\nIn addition, SQL Server 2019 introduces the concept of a **default database\
    \ scoped setting** for online and resumable index operations. These new options\
    \ are called ELEVATE_ONLINE and ELEVATE_RESUMABLE. You can read the details of\
    \ using these options in the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations?#online-default-options`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations%253F%2523online-default-options)\
    \ .\n\nInstead of just reading about resumable index creation, let’s try an example\
    \ using the new database scoped options.\n\n### Prerequisites to Using the Example\n\
    \nTo execute the example presented in this chapter, you must install SQL Server\
    \ 2019\\. In SQL Server 2017, resumable index rebuild requires Enterprise Edition.\
    \ Therefore, you will need to install either Enterprise, Evaluation, or Developer\
    \ Edition for these examples.\n\nAll of the scripts and files for this example\
    \ can be found in the GitHub repo for the book under the **ch4_mission_critical_availability\\\
    resumableindex** directory.\n\nThere are three options to use the example:\n\n\
    *   A T-SQL notebook called **resumableindex.ipynb** which requires Azure Data\
    \ Studio (you need the June 2019 or later version). The T-SQL notebook has all\
    \ the instructions for the complete example.\n\n*   Load the T-SQL script **resumableindex.sql**\
    \ in SQL Server Management Studio (SSMS) or Azure Data Studio and go through each\
    \ step as commented in the script.\n\n*   Run each set of T-SQL statements separately\
    \ as seen in the T-SQL script **resumableindex.sql** and as I’ll walk you through\
    \ in the next section."
  trans: "# 4. 任务关键型可用性\n\n在前面两章中，你了解了 SQL Server 2019 中应对性能和安全性方面现代挑战的新功能。对于许多企业客户而言，确保数据库平台能够满足当今应用程序和业务挑战还有一个关键要素：*可用性*。\n\
    \nSQL Server 默认就提供了可用性，因为几乎所有对 SQL 的操作都可以 **联机** 完成。SQL Server 2019 通过以下旨在解决新挑战的新功能，增强了数据的联机可用性：\n\
    \n*   **联机索引增强**\n\n    用户总是“鱼与熊掌兼得”。他们希望管理员保持索引健康且最新，同时又希望随时能完全访问自己的数据。SQL Server\
    \ 2019 通过 `可恢复的联机索引创建` 和 `联机聚集列存储索引` 维护，增强了之前的联机索引功能。\n\n*   **可用性组增强**\n\n  \
    \  SQL Server 的旗舰高可用性灾难恢复功能——Always On 可用性组，在 SQL Server 的每个版本中持续增强，包括支持更多副本和更好的应用程序连接重定向。\n\
    \n*   **加速数据库恢复**\n\n    阅读本书的任何人可能都遇到过这种情况。有人试图终止一个长时间运行的事务，最终沮丧地不得不重启 SQL Server。然后他们来找你，却发现数据库的恢复过程长得令人抓狂，这让他们更加沮丧。为什么\
    \ SQL Server 不能立即将数据库恢复上线？你解释道，因为恢复过程必须回滚你终止的事务，否则数据库将处于不一致状态。想象一下，如果这一切都不再需要发生。欢迎了解加速数据库恢复（ADR），这是我近来见过的最具创新性的技术之一，它被引入到了核心\
    \ SQL Server 引擎中。ADR 旨在实现即时回滚、允许事务日志被积极截断，并为用户数据库提供“恒定时间恢复”。我本想从这个主题开始介绍，但为了满足你的好奇心，我会把它留到本章末尾。\n\
    \n## 联机索引维护\n\n索引对于数据库性能至关重要。因此，维护索引是保持数据库健康的常见任务。创建索引的一个问题在于，由于需要在表上加锁，可能会影响数据的可用性。创建或重建聚集索引实质上会在索引操作期间锁定整个表。非聚集索引的创建或重建同样可能具有侵入性，因为它需要共享（SH）表锁。\n\
    \nSQL Server 2005（是的，它已经存在这么久了）引入了 *联机* 索引创建或重建的概念。联机索引构建为应用程序提供了更好的可用性，因为在索引构建过程中不需要表锁。\n\
    \n### 注意\n\n在联机索引构建过程中，确实会对表进行一些锁定，但这些锁的持续时间较短，并且是在构建过程中分阶段执行的。要了解更多关于联机索引如何构建的信息，请阅读文档\
    \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/how-online-index-operations-work`](https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/how-online-index-operations-work)。理解原始联机索引实现的有用资源位于\
    \ [`https://docs.microsoft.com/zh-cn/previous-versions/sql/sql-server-2005/administrator/cc966402(v=technet.10)`](https://docs.microsoft.com/zh-cn/previous-versions/sql/sql-server-2005/administrator/cc966402%28v%3Dtechnet.10%29)。\n\
    \n虽然联机索引构建有助于提高可用性，但构建索引可能非常消耗资源，根据应用程序查询的性质，这仍然可能影响应用程序的整体可用性。此外，在某些情况下，一次性在大型表上构建索引可能会出现问题，例如索引在完成前失败。在索引构建期间失败（例如，数据库空间不足）需要你修复问题并从头开始重新构建索引。如果能够对任何索引构建操作进行“从上次中断处继续”，在失败时恢复，那不是很好吗？将索引构建计划为多个段，例如分散在不同的维护窗口中进行，也会很方便。\n\
    \n### 可恢复索引操作\n\n在 SQL Server 2017 中，我们引入了 *可恢复* 索引 *重建* 操作的概念。其思路是，你使用 T-SQL\
    \ 语句 `ALTER INDEX REBUILD` 开始重建索引，然后可以使用带有 `PAUSE` 选项的 `ALTER INDEX` 来暂停索引重建。重建新联机索引的所有进度都会被保存，这样你就可以使用带有\
    \ `RESUME` 选项的 `ALTER INDEX` 来恢复索引重建。你还可以选择使用带有 `ABORT` 选项的 `ALTER INDEX` 命令中止正在进行的联机索引重建。你可以在文档\
    \ [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql)\
    \ 中阅读有关如何使用 `ALTER INDEX` 进行可恢复索引操作的完整语法。你还可以在 [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql#online-index-operations`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql%23online-index-operations)\
    \ 阅读有关可恢复索引重建如何工作以及任何限制的更多具体细节。\n\nSQL Server 2019 在使用 `CREATE INDEX` *创建* 索引时引入了可恢复索引的概念。你可以在文档\
    \ [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql)\
    \ 中阅读如何创建可恢复索引的语法。你还可以在 [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql#online-option`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql%23online-option)\
    \ 阅读有关可恢复索引创建的更多详细信息。\n\n此外，SQL Server 2019 为联机和可恢复索引操作引入了 `默认数据库范围设置` 的概念。这些新选项称为\
    \ `ELEVATE_ONLINE` 和 `ELEVATE_RESUMABLE`。你可以在文档 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/guidelines-for-online-index-operations?#online-default-options`](https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/guidelines-for-online-index-operations%3F%23online-default-options)\
    \ 中阅读使用这些选项的详细信息。\n\n与其只是阅读关于可恢复索引创建的内容，不如让我们尝试一个使用新的数据库范围选项的示例。\n\n### 使用示例的先决条件\n\
    \n要执行本章介绍的示例，你必须安装 SQL Server 2019。在 SQL Server 2017 中，可恢复索引重建需要企业版。因此，对于这些示例，你需要安装企业版、评估版或开发者版。\n\
    \n此示例的所有脚本和文件都可以在本书的 GitHub 仓库中找到，位于 `ch4_mission_critical_availability\\resumableindex`\
    \ 目录下。\n\n使用该示例有三种方式：\n\n*   一个名为 `resumableindex.ipynb` 的 T-SQL 笔记本，需要 Azure\
    \ Data Studio（你需要 2019 年 6 月或之后的版本）。该 T-SQL 笔记本包含了完整示例的所有说明。\n*   在 SQL Server\
    \ Management Studio (SSMS) 或 Azure Data Studio 中加载 T-SQL 脚本 `resumableindex.sql`，并按照脚本中的注释逐步操作。\n\
    *   单独运行 T-SQL 脚本 `resumableindex.sql` 中的每组 T-SQL 语句，正如我将在下一节中引导你做的那样。"
- fmt: "### 尝试可恢复索引创建\n\n让我们逐步了解如何使用可恢复的在线索引。\n\n#### 步骤 1：运行脚本创建数据库\n在`resumableindex.sql`脚本中运行第\
    \ 1 步，为此示例创建数据库：\n```sql\n    -- Step 1: Create the database\n    USE master\n\
    \    GO\n    DROP DATABASE IF EXISTS gotexasrangers\n    GO\n    CREATE DATABASE\
    \ gotexasrangers\n    GO\n    ```\n\n#### 步骤 2：创建表并填充数据\n运行第 2 步以创建一个表并填充一些数据。我选择这个行数是为了让索引构建花费一分钟以上。这是因为当我向你展示如何使用`MAX_DURATION`选项时，该选项的最小值为\
    \ 1 分钟。请耐心等待此步骤，因为它可能需要长达 10-15 分钟才能运行完成。你可以去喝杯咖啡，回来看到它完成后再继续第 3 步。\n```sql\n\
    \    -- Step 2: Create a table as a heap with no clustered index\n    -- Make\
    \ the table fairly big so an index build takes at least\n    -- a few minutes.\
    \ The resumable index option for MAX_DURATION has\n    -- a minimum value of 1\
    \ minute.\n    USE gotexasrangers\n    GO\n    DROP TABLE IF EXISTS letsgorangers\n\
    \    GO\n    CREATE TABLE letsgorangers (col1 int, col2 char(7000) not null)\n\
    \    GO\n    SET NOCOUNT ON\n    GO\n    BEGIN TRANSACTION\n    GO\n    INSERT\
    \ INTO letsgorangers values (1, 'I would love to win the World Series')\n    GO\
    \ 750000\n    COMMIT TRANSACTION\n    GO\n    SET NOCOUNT OFF\n    GO\n    ```\n\
    \n#### 步骤 3：创建在线、可恢复的聚集索引\n运行第 3 步以创建一个在线的、可恢复的聚集索引。注意名为`MAX_DURATION`选项的用法。这意味着如果索引构建在\
    \ 1 分钟后未完成，它将被暂停。\n```sql\n    -- Step 3: Try to create the index as online, resumable,\
    \ and a max_duration of one minute\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers\
    \ (col1) WITH (ONLINE = ON, RESUMABLE = ON, MAX_DURATION = 1)\n    GO\n    ```\n\
    \n当持续时间到期时，`CREATE INDEX`将遇到失败。通常，这会要求你“重新开始”，因为整个索引构建将被回滚。但由于你创建索引时指定了可恢复，索引构建只是被暂停了。\n\
    \n当失败发生时，你的输出应类似于以下内容：\n```text\n    Msg 3643, Level 16, State 1, Line 31\n  \
    \  The operation elapsed time exceeded the maximum time specified for this operation.\
    \ The execution has been stopped.\n    The statement has been terminated.\n  \
    \  Msg 596, Level 21, State 1, Line 29\n    Cannot continue the execution because\
    \ the session is in the kill state.\n    Msg 0, Level 20, State 0, Line 29\n \
    \   A severe error occurred on the current command.  The results, if any, should\
    \ be discarded.\n    ```\n此消息意味着语句已失败并终止了连接。这看起来是个问题，但同样，创建索引的进度只是被暂停了。\n\n注意 暂停可恢复索引构建的另一种方法是在创建索引运行时，在另一个连接上使用带有`PAUSE`选项的`ALTER\
    \ INDEX`命令。\n\n#### 步骤 4：检查索引构建进度\n运行第 4 步，使用动态管理视图`sys.index_resumable_operations`来检查索引构建的进度。\n\
    ```sql\n    -- Step 4: Check the progress of the index build\n    USE gotexasrangers\n\
    \    GO\n    SELECT * FROM sys.index_resumable_operations\n    GO\n    ```\n在你的结果集中，`state_desc`应该为`PAUSED`，`percent_complete`应该在\
    \ 30% 左右。这意味着当你恢复索引构建时，它应该只剩下大约 70% 的工作需要完成。\n\n#### 步骤 5：恢复并完成索引构建\n要恢复索引构建操作并完成它，你可以像第\
    \ 5 步那样使用`ALTER INDEX`语句。\n```sql\n    -- Step 6: Resume the index build\n   \
    \ ALTER INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n在此运行期间，你可以使用带有`PAUSE`选项的`ALTER\
    \ INDEX`来再次暂停索引构建（然后再次恢复它）。\n\n#### 步骤 6：使用默认选项创建可恢复索引\n让我们尝试用另一种方式创建可恢复索引。首先，使用第\
    \ 6 步删除现有索引，并设置两个数据库范围选项，使创建在线和可恢复的索引成为默认设置（在支持的情况下）。\n\n注意 并非所有索引都可以在线且可恢复地构建。例如，XML\
    \ 索引不支持。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations)\
    \ 查看不支持在线操作的索引列表。\n\n1.  现在使用第 7 步创建索引，不使用任何特殊选项。**让`CREATE INDEX`运行大约 30 秒，然后取消它。**\
    \ 使用你工具中取消查询的任何技术（对于 SSMS，点击红色停止按钮）：\n```sql\n    -- Step 7: Create the index\
    \ again. Notice there are no options used.\n    -- CANCEL this after about 30\
    \ seconds\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers (col1)\n    GO\n\
    \    ```\n你的输出将类似于：\n```text\n    The statement has been terminated.\n    Query\
    \ was canceled by user.\n    ```\n通常，取消`CREATE INDEX`会导致它回滚。但由于受支持索引的默认选项是`ONLINE`和`RESUMABLE`，即使你没有显式指定这些选项，索引构建也只是被暂停了。\n\
    \n2.  使用第 8 步检查暂停的索引构建状态。\n```sql\n    -- Step 8: Check the index progress\n \
    \   USE gotexasrangers\n    GO\n    SELECT * FROM sys.index_resumable_operations\n\
    \    GO\n    ```\n如本示例前面所见，`state_desc`应为`PAUSED`，`percent_complete`应在 20-30%\
    \ 左右。\n\n3.  使用第 9 步恢复并完成索引构建。\n```sql\n    -- Step 9: Resume the index build\n\
    \    ALTER INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n```sql\n\
    \    -- Step 6: Drop the first index . Use the default scoped option for resumable\
    \ and online\n    USE gotexasrangers\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET ELEVATE_RESUMABLE = WHEN_SUPPORTED\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET ELEVATE_ONLINE = WHEN_SUPPORTED\n    GO\n    DROP INDEX IF EXISTS letsgorangers.rangeridx\n\
    \    GO\n    ```\n当你想到可恢复索引时，请记住这种可能的场景。假设创建或重建一个索引需要 4 小时，在此期间，构建索引会消耗一定数量的内存、CPU\
    \ 和 I/O 资源，这可能对你的应用程序产生一定影响。你现在可以使用一种技术，即分多个片段进行`CREATE`，然后`PAUSE`/`RESUME`。选择在应用程序使用率最低的时间段创建或恢复索引构建；你实际上是将索引构建安排到多个阶段。你甚至可以使用\
    \ SQL Server Agent 作业来调度这些阶段，以最适合你应用程序需求的时间进行。"
  raw: "### Try Out Resumable Index Creation\n\nLet’s walk through step by step on\
    \ how to use a resumable online index.\n\n1.  Run Step 1 in the **resumableindex.sql**\
    \ script to create the database for this example:\n\n```\n    -- Step 1: Create\
    \ the database\n    USE master\n    GO\n    DROP DATABASE IF EXISTS gotexasrangers\n\
    \    GO\n    CREATE DATABASE gotexasrangers\n    GO\n    ```\n\n2.  Run Step 2\
    \ to create a table and populate it with some data. I chose this number of rows\
    \ so that the index build will take over a minute. This is because when I show\
    \ you how to use the MAX_DURATION option, the minimum value for that option is\
    \ 1 minute. Be patient with this step as it could take as long as 10–15 minutes\
    \ to run. Go get a cup of coffee and come back to see this finish and proceed\
    \ to Step 3.\n\n```\n    -- Step 2: Create a table as a heap with no clustered\
    \ index\n    -- Make the table fairly big so an index build takes at least\n \
    \   -- a few minutes. The resumable index option for MAX_DURATION has\n    --\
    \ a minimum value of 1 minute.\n    USE gotexasrangers\n    GO\n    DROP TABLE\
    \ IF EXISTS letsgorangers\n    GO\n    CREATE TABLE letsgorangers (col1 int, col2\
    \ char(7000) not null)\n    GO\n    SET NOCOUNT ON\n    GO\n    BEGIN TRANSACTION\n\
    \    GO\n    INSERT INTO letsgorangers values (1, 'I would love to win the World\
    \ Series')\n    GO 750000\n    COMMIT TRANSACTION\n    GO\n    SET NOCOUNT OFF\n\
    \    GO\n    ```\n\n3.  Run Step 3 to create an online, resumable clustered index.\
    \ Notice the use of the option called MAX_DURATION. This means that the index\
    \ build will be paused if it has not completed after 1 minute.\n\n```\n    --\
    \ Step 3: Try to create the index as online, resumable, and a max_duration of\
    \ one minute\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers (col1) WITH\
    \ (ONLINE = ON, RESUMABLE = ON, MAX_DURATION = 1)\n    GO\n    ```\n\nWhen the\
    \ duration has expired, the CREATE INDEX will experience a failure. Normally,\
    \ this would require you to “start over” since the entire index build would be\
    \ rolled back. But since you created the index as resumable, the index build is\
    \ merely paused.\n\nWhen the failure occurs, your output should look something\
    \ like the following:\n\n```\n    Msg 3643, Level 16, State 1, Line 31\n    The\
    \ operation elapsed time exceeded the maximum time specified for this operation.\
    \ The execution has been stopped.\n    The statement has been terminated.\n  \
    \  Msg 596, Level 21, State 1, Line 29\n    Cannot continue the execution because\
    \ the session is in the kill state.\n    Msg 0, Level 20, State 0, Line 29\n \
    \   A severe error occurred on the current command.  The results, if any, should\
    \ be discarded.\n    ```\n\nThis message means the statement has failed and terminated\
    \ the connection. This seems like a problem but, again, the progress of the create\
    \ index is simply paused.\n\nNote Another way to pause a resumable index build\
    \ is to use the ALTER INDEX command with the PAUSE option on another connection\
    \ while the create index is running.\n\n4.  Run Step 4 to check on the progress\
    \ of the index build using the Dynamic Management View (DMV) **sys.index_resumable_operations**.\n\
    \n```\n    -- Step 4: Check the progress of the index build\n    USE gotexasrangers\n\
    \    GO\n    SELECT * FROM sys.index_resumable_operations\n    GO\n    ```\n\n\
    In your result set, the **state_desc** should be **PAUSED**, and the **percent_complete**\
    \ should be around 30%. This means that when you resume the index build, it should\
    \ only have about 70% left to finish.\n\n5.  To resume the index build operation\
    \ and complete it, you can use the ALTER INDEX statement like in Step 5.\n\n```\n\
    \    -- Step 6: Resume the index build\n    ALTER INDEX rangeridx on letsgorangers\
    \ RESUME\n    GO\n    ```\n\nWhile this is running, you could use ALTER INDEX\
    \ with the PAUSE option to pause the index build again (and then resume it again).\n\
    \n6.  Let’s try creating a resumable index a different way. First, use Step 6\
    \ to drop the existing index and set two database scoped options to make creating\
    \ indexes online and resumable the default, where supported.\n\nNote Not all indexes\
    \ can be built online and resumable. For example, XML indexes are not supported.\
    \ You can see a list of indexes that are not supported for online operations at\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations)\
    \ .\n\n1.  Now create the index using Step 7 with no special options. **Let the\
    \ CREATE INDEX run for about 30 seconds and then cancel it.** Use whatever technique\
    \ to cancel a query from your tool (for SSMS hit the red stop button):\n\n```\n\
    \    -- Step 7: Create the index again. Notice there are no options used.\n  \
    \  -- CANCEL this after about 30 seconds\n    CREATE CLUSTERED INDEX rangeridx\
    \ ON letsgorangers (col1)\n    GO\n    ```\n\nYour output will be something like\
    \ this:\n\n```\n    The statement has been terminated.\n    Query was canceled\
    \ by user.\n    ```\n\nNormally, cancelling a CREATE INDEX would cause it to roll\
    \ back. But since the default options for indexes that are supported are ONLINE\
    \ and RESUMABLE, the index build is only paused, even though you didn’t have to\
    \ explicitly specify those options.\n\n2.  Check the status of the paused index\
    \ build using Step 8.\n\n```\n    -- Step 8: Check the index progress\n    USE\
    \ gotexasrangers\n    GO\n    SELECT * FROM sys.index_resumable_operations\n \
    \   GO\n    ```\n\nAs seen earlier in this example, the state_desc should be PAUSED,\
    \ and the percent_complete should be around 20–30%.\n\n3.  Use Step 9 to resume\
    \ and complete the index build.\n\n```\n    -- Step 9: Resume the index build\n\
    \    ALTER INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n\n```\n--\
    \ Step 6: Drop the first index . Use the default scoped option for resumable and\
    \ online\nUSE gotexasrangers\nGO\nALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_RESUMABLE\
    \ = WHEN_SUPPORTED\nGO\nALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_ONLINE\
    \ = WHEN_SUPPORTED\nGO\nDROP INDEX IF EXISTS letsgorangers.rangeridx\nGO\n```\n\
    \nKeep this possible scenario in mind when you think of resumable indexes. Let’s\
    \ say creating or rebuilding an index takes 4 hours, and, during that time, building\
    \ the index takes a certain amount of memory, CPU, and I/O resources that can\
    \ be somewhat impactful to your application. You could now use a technique of\
    \ CREATE and then PAUSE/RESUME in multiple segments. Choose the segments to create\
    \ or resume the index build when application usage is at its lowest; you are now\
    \ scheduling an index build into multiple phases. You could even use a SQL Server\
    \ Agent job to schedule these phases for whatever time best meets your application\
    \ requirements."
  trans: "\n### 尝试可恢复索引创建\n\n让我们逐步了解如何使用可恢复的在线索引。\n\n#### 步骤 1：运行脚本创建数据库\n在`resumableindex.sql`脚本中运行第\
    \ 1 步，为此示例创建数据库：\n```sql\n    -- Step 1: Create the database\n    USE master\n\
    \    GO\n    DROP DATABASE IF EXISTS gotexasrangers\n    GO\n    CREATE DATABASE\
    \ gotexasrangers\n    GO\n    ```\n\n#### 步骤 2：创建表并填充数据\n运行第 2 步以创建一个表并填充一些数据。我选择这个行数是为了让索引构建花费一分钟以上。这是因为当我向你展示如何使用`MAX_DURATION`选项时，该选项的最小值为\
    \ 1 分钟。请耐心等待此步骤，因为它可能需要长达 10-15 分钟才能运行完成。你可以去喝杯咖啡，回来看到它完成后再继续第 3 步。\n```sql\n\
    \    -- Step 2: Create a table as a heap with no clustered index\n    -- Make\
    \ the table fairly big so an index build takes at least\n    -- a few minutes.\
    \ The resumable index option for MAX_DURATION has\n    -- a minimum value of 1\
    \ minute.\n    USE gotexasrangers\n    GO\n    DROP TABLE IF EXISTS letsgorangers\n\
    \    GO\n    CREATE TABLE letsgorangers (col1 int, col2 char(7000) not null)\n\
    \    GO\n    SET NOCOUNT ON\n    GO\n    BEGIN TRANSACTION\n    GO\n    INSERT\
    \ INTO letsgorangers values (1, 'I would love to win the World Series')\n    GO\
    \ 750000\n    COMMIT TRANSACTION\n    GO\n    SET NOCOUNT OFF\n    GO\n    ```\n\
    \n#### 步骤 3：创建在线、可恢复的聚集索引\n运行第 3 步以创建一个在线的、可恢复的聚集索引。注意名为`MAX_DURATION`选项的用法。这意味着如果索引构建在\
    \ 1 分钟后未完成，它将被暂停。\n```sql\n    -- Step 3: Try to create the index as online, resumable,\
    \ and a max_duration of one minute\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers\
    \ (col1) WITH (ONLINE = ON, RESUMABLE = ON, MAX_DURATION = 1)\n    GO\n    ```\n\
    \n当持续时间到期时，`CREATE INDEX`将遇到失败。通常，这会要求你“重新开始”，因为整个索引构建将被回滚。但由于你创建索引时指定了可恢复，索引构建只是被暂停了。\n\
    \n当失败发生时，你的输出应类似于以下内容：\n```text\n    Msg 3643, Level 16, State 1, Line 31\n  \
    \  The operation elapsed time exceeded the maximum time specified for this operation.\
    \ The execution has been stopped.\n    The statement has been terminated.\n  \
    \  Msg 596, Level 21, State 1, Line 29\n    Cannot continue the execution because\
    \ the session is in the kill state.\n    Msg 0, Level 20, State 0, Line 29\n \
    \   A severe error occurred on the current command.  The results, if any, should\
    \ be discarded.\n    ```\n此消息意味着语句已失败并终止了连接。这看起来是个问题，但同样，创建索引的进度只是被暂停了。\n\n注意 暂停可恢复索引构建的另一种方法是在创建索引运行时，在另一个连接上使用带有`PAUSE`选项的`ALTER\
    \ INDEX`命令。\n\n#### 步骤 4：检查索引构建进度\n运行第 4 步，使用动态管理视图`sys.index_resumable_operations`来检查索引构建的进度。\n\
    ```sql\n    -- Step 4: Check the progress of the index build\n    USE gotexasrangers\n\
    \    GO\n    SELECT * FROM sys.index_resumable_operations\n    GO\n    ```\n在你的结果集中，`state_desc`应该为`PAUSED`，`percent_complete`应该在\
    \ 30% 左右。这意味着当你恢复索引构建时，它应该只剩下大约 70% 的工作需要完成。\n\n#### 步骤 5：恢复并完成索引构建\n要恢复索引构建操作并完成它，你可以像第\
    \ 5 步那样使用`ALTER INDEX`语句。\n```sql\n    -- Step 6: Resume the index build\n   \
    \ ALTER INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n在此运行期间，你可以使用带有`PAUSE`选项的`ALTER\
    \ INDEX`来再次暂停索引构建（然后再次恢复它）。\n\n#### 步骤 6：使用默认选项创建可恢复索引\n让我们尝试用另一种方式创建可恢复索引。首先，使用第\
    \ 6 步删除现有索引，并设置两个数据库范围选项，使创建在线和可恢复的索引成为默认设置（在支持的情况下）。\n\n注意 并非所有索引都可以在线且可恢复地构建。例如，XML\
    \ 索引不支持。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations)\
    \ 查看不支持在线操作的索引列表。\n\n1.  现在使用第 7 步创建索引，不使用任何特殊选项。**让`CREATE INDEX`运行大约 30 秒，然后取消它。**\
    \ 使用你工具中取消查询的任何技术（对于 SSMS，点击红色停止按钮）：\n```sql\n    -- Step 7: Create the index\
    \ again. Notice there are no options used.\n    -- CANCEL this after about 30\
    \ seconds\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers (col1)\n    GO\n\
    \    ```\n你的输出将类似于：\n```text\n    The statement has been terminated.\n    Query\
    \ was canceled by user.\n    ```\n通常，取消`CREATE INDEX`会导致它回滚。但由于受支持索引的默认选项是`ONLINE`和`RESUMABLE`，即使你没有显式指定这些选项，索引构建也只是被暂停了。\n\
    \n2.  使用第 8 步检查暂停的索引构建状态。\n```sql\n    -- Step 8: Check the index progress\n \
    \   USE gotexasrangers\n    GO\n    SELECT * FROM sys.index_resumable_operations\n\
    \    GO\n    ```\n如本示例前面所见，`state_desc`应为`PAUSED`，`percent_complete`应在 20-30%\
    \ 左右。\n\n3.  使用第 9 步恢复并完成索引构建。\n```sql\n    -- Step 9: Resume the index build\n\
    \    ALTER INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n```sql\n\
    \    -- Step 6: Drop the first index . Use the default scoped option for resumable\
    \ and online\n    USE gotexasrangers\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET ELEVATE_RESUMABLE = WHEN_SUPPORTED\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET ELEVATE_ONLINE = WHEN_SUPPORTED\n    GO\n    DROP INDEX IF EXISTS letsgorangers.rangeridx\n\
    \    GO\n    ```\n当你想到可恢复索引时，请记住这种可能的场景。假设创建或重建一个索引需要 4 小时，在此期间，构建索引会消耗一定数量的内存、CPU\
    \ 和 I/O 资源，这可能对你的应用程序产生一定影响。你现在可以使用一种技术，即分多个片段进行`CREATE`，然后`PAUSE`/`RESUME`。选择在应用程序使用率最低的时间段创建或恢复索引构建；你实际上是将索引构建安排到多个阶段。你甚至可以使用\
    \ SQL Server Agent 作业来调度这些阶段，以最适合你应用程序需求的时间进行。\n"
- fmt: '### Online Index Maintenance for Columnstore


    Clustered columnstore indexes are critical for high-performance analytic queries,
    especially in data warehouse scenarios. Building (or rebuilding) a clustered columnstore
    index may be a lengthy operation given the size of tables where a clustered columnstore
    index is typically built. Since the build or rebuild of a clustered columnstore
    index is `offline`, the entire table must be locked from other transactions, which
    is not the availability you likely need.


    SQL Server 2017 introduced the ability to build and rebuild nonclustered columnstore
    indexes online. In SQL Server 2019, clustered columnstore indexes can now be built
    and rebuilt online. You can read the details of the syntax for online clustered
    columnstore build at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql).
    The syntax to rebuild a clustered columnstore index online will be the same as
    with a standard index using the `ALTER INDEX` syntax at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql).
    Resumable indexes are not yet supported for online clustered or nonclustered columnstore
    indexes.


    ## Enhancing Always On Availability Groups


    Always On Availability Groups (I will refer to this as Availability Groups for
    the rest of the chapter) are the flagship High Availability Disaster Recovery
    (HADR) feature in SQL Server. First shipped in SQL Server 2012, each release has
    come with new enhancements to expand the capabilities of Availability Groups.


    For example, in SQL Server 2016, we introduced the concept of database health
    for failover with Availability Groups (you can read more about this concept at
    [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)).
    We also boosted the internal performance of Availability Groups, which you can
    read about at [`https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/`](https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/).


    In SQL Server 2017, one key new capability for Availability Groups is the concept
    of `clusterless` Availability Groups. This allows you to set up an Availability
    Group with no clustering software. Any failover is manual, but this capability
    could allow you to set up a read scale–out replica platform or even set up Availability
    Groups across Windows and Linux. You can read more about this capability at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups).


    For SQL Server 2019, we have introduced two new capabilities for Availability
    Groups, based on customer feedback and technology trends:


    *   Support for more replicas

    *   A new method to ensure your application is connected to the primary replica


    ### Support for More Synchronous Replicas


    We now support up to `five synchronous replicas` in an Availability Group, and
    a total of nine overall replicas. See the documentation at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server)
    for more information.


    ### Secondary to Primary Replica Read/Write Connection Redirection


    `Secondary to primary replica read/write connection redirection` is a new capability
    to solve the challenge for your application to always be directed to the primary
    replica no matter what SQL instance is hosting the primary replica for the Availability
    Group.


    In previous versions of SQL Server, the only way as a developer to ensure you
    were connected to the primary replica of an Availability Group was to use the
    concept of a `listener`. However, a listener may not always be available when
    you configure SQL Server Availability Groups such as a `clusterless` Availability
    Group as I described earlier in this section.


    SQL Server 2019 now provides T-SQL settings for Availability Groups and connection
    string options for client applications to ensure the application will always be
    connected to the primary replica no matter what server in the Availability Group
    the application is connected to. SQL Server provides the built-in logic for this
    concept and uses a concept of redirection if an application connected to a server
    that was a secondary replica.


    You can read all the details of how to set up primary connection redirection for
    SQL Server and your application in the documentation at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups).


    ## Accelerated Database Recovery


    One of the aspects of my job at Microsoft I still find very exciting is to learn
    about new innovations that start as projects and then see them make it into a
    new feature of a released product, sometimes years later.


    As an example, I remember seeing in 2016 when I joined engineering about a project
    called constant time recovery (`CTR`). I remember taking some time to see what
    this project was about, because I saw the name of my long-time colleague Peter
    Byrne involved in the project. `CTR` has become Accelerated Database Recovery
    (`ADR`) with SQL Server 2019 and Azure SQL Database.


    `CTR` actually started as a project in 2015 initiated by Hanuma Kodavalla, Distinguished
    Engineer at Microsoft. Hanuma recruited others to join a project including Peter
    Byrne, Panagiotis Antonopoulos, and Srikumar Rangarajan, among others. The project
    was trying to attack one very large problem with SQL Server: `long-running transactions`.
    When these engineers finished the work, they decided to write a paper on the concept.
    As you read through the rest of this chapter and use the examples, consider also
    reading all the details of the paper for the `CTR` project at [`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/).
    I call this the `CTR Paper` and will refer to it that way for the rest of this
    chapter. I recommend you do what I did when I wrote this chapter. Bring up this
    paper and refer to it back and forth as you read the chapter and use the examples.'
