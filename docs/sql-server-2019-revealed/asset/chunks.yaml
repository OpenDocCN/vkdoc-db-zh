  trans: '

    ### 版本与许可


    默认情况下，如本章所示，当你拉取并运行 SQL Server 容器镜像时，我们自动使用的是 SQL Server **开发人员版**。如你所知，开发人员版不支持用于生产环境。


    因此，在运行 SQL Server 容器时，你可以使用 `MSSQL_PID` 环境变量来指明 SQL Server 的版本。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker#production`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker%2523production)
    阅读更多关于使用此选项的信息。


    关于容器，我收到的最常见问题之一是容器如何获得许可。


    随着 SQL Server 2017 的发布，我们更新了许可指南，其中包含了关于容器的讨论。你可以从 [`www.microsoft.com/en-us/sql-server/sql-server-2017-pricing`](https://www.microsoft.com/en-us/sql-server/sql-server-2017-pricing)
    下载该指南。请特别查看 "`Licensing SQL Server 2017 in Containers`"（`在容器中许可 SQL Server 2017`）这一节（SQL
    Server 2019 发布时会有新的指南）。容器的许可方式与虚拟机类似。对于许多用户，完整的基于核心的许可模型适用。你应该阅读的一个有趣的例外情况是，拥有软件保障（SA）的企业版客户可获得一项福利。根据指南，“……在所有企业版核心许可证上增加软件保障（SA）覆盖（针对一个完全获得许可的服务器）后，客户的使用权限得以扩展，允许在许可的服务器上运行任意数量的容器。这项宝贵的
    SA 福利使客户能够部署无限数量的容器来处理动态工作负载，并充分利用硬件计算能力。”


    ## SQL Server Windows 容器


    到目前为止，本章中关于容器的所有讨论都是基于 Linux 镜像的 SQL Server 容器。你已经看到这些容器可以在任何平台上运行，包括 Linux、Windows
    和 macOS。


    然而，Windows 团队已经基于 Windows 镜像构建了在 Windows 中原生运行容器的能力。我们在 2019 年夏天宣布了一项私人预览计划，以支持基于
    Windows 镜像的 SQL Server 容器。


    本章中我讨论的许多相同概念几乎都适用于此。这部分归功于 SQL Server 在 Windows 和 Linux 上出色的兼容性。关键差异将体现在 Windows
    和 Linux 有所不同的某些方面，例如 Active Directory 的配置。此外，当你想要直接与容器交互时，通常会使用 PowerShell 或命令行
    shell。


    Windows 支持与 Linux 相同的概念来使容器成为一个引人注目的方案，包括通过命名空间实现的隔离。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/)
    阅读更多关于 Windows 容器工作原理的信息。


    Windows 在容器方面提供了一个与 Linux 略有不同的选项。容器可以以两种隔离模式运行：


    `进程隔离` – 容器作为使用命名空间的隔离进程运行。


    `Hyper-V 隔离` – 容器在一个“特殊”的虚拟机中运行（这是文档使用的术语，不是我的）。


    你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container)
    阅读更多关于这些隔离模型的信息。


    在 Windows 版 Docker Desktop 上，你**只能**运行 Windows 容器或 Linux 容器中的一种。（注：当 Docker for
    WSL2 可用时，这应该会改变。你可以在 [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/)
    阅读更多相关信息。）


    默认情况下，Docker Desktop 支持 Linux 容器。要切换到使用 Windows 容器，请从 Windows 系统托盘中的 Docker 图标选择该选项，如图
    7-8 所示。


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig8_HTML.jpg](img/479130_1_En_7_Fig8_HTML.jpg)


    图 7-8


    使用 Docker Desktop 切换到 Windows 容器


    在最新版本的 Windows 10 和 Windows Server 2019 上，Windows 容器支持 Hyper-V 隔离和进程隔离。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server)
    阅读更多关于 Windows Server 2019 上 Windows 容器的信息。我也鼓励你阅读 Windows 容器的常见问题解答（FAQ）[`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq)。


    此外，Windows Server 2019 支持 Windows 上的 Linux 容器（LCOW），它使用 Hyper-V 隔离来支持 Linux 容器。你可以在
    [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers)
    阅读更多关于 LCOW 的信息。这使得 Windows Server 几乎成为唯一一个能同时运行 Windows 和 Linux 容器的平台（你可以在 macOS
    上安装一个 Windows 虚拟机来运行 Windows 容器，但 Windows Server 是唯一“原生”支持这些场景的平台）。


    我在 Windows Server 2019 系统上尝试了早期私人预览形式的 Windows 容器。


    以下是用于 SQL Server Windows 容器的 Hyper-V 隔离和进程隔离的 `docker run` 命令示例语法：


    ```

    docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1401:1433
    --isolation=process -d -e ''MSSQL_PID=Developer'' --name sql1 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

    docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1402:1433
    --isolation=hyperv -d -e ''MSSQL_PID=Developer'' --name sql2 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

    ```


    你可以看到语法与 Linux 容器几乎完全相同。注意 `--isolation` 参数的语法。


    我使用著名的 Sysinternals 工具 Process Explorer（[`https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer`](https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer)）来查看进程隔离下
    `sqlservr` 程序的样子。如图 7-9 所示，类似于 docker 守护进程，一个名为 `CExecSvc` 的程序负责派生（forking） `sqlservr`
    容器程序。


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig9_HTML.jpg](img/479130_1_En_7_Fig9_HTML.jpg)


    图 7-9


    进程隔离模式下的 SQL Server Windows 容器


    关于 Hyper-V 隔离的文档不多，只知道容器程序托管在一个名为 `vmwp.exe` 的 Windows 程序中。


    我希望当你读到这本书时，我们在 SQL Server Windows 容器方面的工作已经取得进展，因为我相信许多客户希望实现容器的承诺，但由于各种原因无法或不能使用基于
    Linux 的容器。我个人认为，如果 LCOW 容器性能良好，那么许多客户最终可能会在他们的 Windows Server 上拥有 Windows 和 Linux
    容器混合的环境。

    '
- fmt: '## Summary


    It has been a very long chapter to read and go through. I have covered what a
    container is and why it can solve modern challenges to host products like SQL
    Server and develop applications. Containers are portable, lightweight, consistent,
    and efficient.


    I described and showed you that containers are really just programs running in
    an isolated and unique way. You learned the new enhancements for SQL Server containers
    in SQL Server 2019 including RHEL images and the new Microsoft Container Registry.


    If you went through the rest of the chapter, you were able to try out yourself
    several examples including deploying containers, seeing the new amazing way to
    update (and rollback) SQL Server, and deploying a multi-container application
    like SQL Server replication.


    You learned how containers are ready for production despite what you might have
    been told including SQL Server container performance, security, and availability.


    And you finished up the chapter getting a sneak peak on what SQL Server Windows
    containers will look like.


    I hope you have a strong grasp of SQL Server containers and are ready to learn
    about a platform built to deploy and scale containers called Kubernetes.


    ## 8. SQL Server on Kubernetes


    If containers are the new virtual machines, then Kubernetes are the new servers.
    You will see in this chapter that Kubernetes is an important technology to the
    future of containerized applications, especially running enterprise workloads
    like SQL Server.


    ### What Is k8s?


    If you have not read Chapter [7](#479130_1_En_7_Chapter.xhtml), you might go back
    and at least browse it before you read this chapter. Why? Because Kubernetes or
    k8s is all about *hosting containers*. k8s is actually much more than just hosting.
    I''ll use k8s for Kubernetes for the rest of the chapter because that is the popular
    acronym for it (and it is sure faster to type). k8s stands for k<8 letters>s in
    the word Kubernetes (I had to research it myself when I first saw the term).


    Unlike Chapter [7](#479130_1_En_7_Chapter.xhtml), I will not go into exhaustive
    detail on the internals of k8s because that would really take an entire book.
    What I will do is introduce you to some of the terms, add in some comments about
    how the internals work, and point you to some excellent references.


    After going through the basics of k8s in this chapter, I''ll talk about how k8s
    solves important challenges for the deployment of containers in a scalable platform
    that provides built-in high availability (HA). I''ll also show how to update all
    the SQL Server containers in a k8s environment, similar to the process of updating
    a single container, which I described in Chapter [7](#479130_1_En_7_Chapter.xhtml).
    I''ll introduce you to an intriguing concept to deploy SQL Server in k8s, called
    `Helm Charts`. Finally, I''ll talk about the future of availability with SQL Server
    2019 and k8s and how we are looking to integrate Always On Availability Groups
    with k8s.


    #### k8s Objects


    Whether you read over these resources or not, let me describe in this chapter
    some of the terminology of k8s from my point of view, and a few comments about
    internals I found interesting as I''ve learned the topic. The fundamental terms
    and objects you need to know about k8s as you read this chapter are


    **Cluster** – Think of the k8s `Cluster` as a server or computer. This is the
    *main host* for all software running on k8s. It is common to refer to the host
    of all objects as a k8s cluster.


    **Node** – Think of a `Node` as a virtual machine running on the cluster. A node
    will be a host for running *Pods* (which have containers) within the cluster.
    It is very common to have more than one node on a k8s cluster. You can read more
    about a node at [`https://kubernetes.io/docs/concepts/architecture/nodes/`](https://kubernetes.io/docs/concepts/architecture/nodes/).


    **Pod** – A `Pod` is a logical collection of containers running on a node in the
    cluster. A pod will be a unit of deploying, managing, and failing over containers
    running in the cluster. You can read more about a pod at [`https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/`](https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/).


    **Service** – The Kubernetes documentation describes a `Service` as "abstraction
    which defines a logical set of Pods and a policy by which to access them." For
    the purposes of SQL Server, a service will serve as a *load balancer* and an abstraction
    of the private IP address of the pod hosting SQL Server. It is very much like
    a listener for clustering for SQL Server. k8s provides the concept of a service
    built into the k8s software, and applications like SQL Server can bind to them
    so that no matter where the SQL Server pod is hosted in the cluster, applications
    can always connect to the service using the same IP address and port. You can
    read more about a k8s service at [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/).


    **Secret** – A `Secret` is a k8s object that allows you to store sensitive information,
    like a password. This is very convenient for SQL Server to store the `sa` password.
    You can read more about k8s secrets at [`https://kubernetes.io/docs/concepts/configuration/secret/`](https://kubernetes.io/docs/concepts/configuration/secret/).


    **Storage Class** – A `Storage Class` is a k8s object to expose storage like a
    disk system. You can read more about k8s storage classes at [`https://kubernetes.io/docs/concepts/storage/storage-classes/`](https://kubernetes.io/docs/concepts/storage/storage-classes/).


    **Persistent Volume Claim** – A `Persistent Volume Claim` (PVC) is a request for
    storage backed up by a `Persistent Volume` which is mapped to a storage class.
    For me, this is like asking for a volume on a disk drive for storage. In the case
    of SQL Server, this will work quite well for database files.


    There are other terms I will introduce and talk about as you go about using examples
    in the rest of the chapter.'
  raw: '## Summary


    It has been a very long chapter to read and go through. I have covered what a
    container is and why it can solve modern challenges to host products like SQL
    Server and develop applications. Containers are portable, lightweight, consistent,
    and efficient.


    I described and showed you that containers are really just programs running in
    an isolated and unique way. You learned the new enhancements for SQL Server containers
    in SQL Server 2019 including RHEL images and the new Microsoft Container Registry.


    If you went through the rest of the chapter, you were able to try out yourself
    several examples including deploying containers, seeing the new amazing way to
    update (and rollback) SQL Server, and deploying a multi-container application
    like SQL Server replication.


    You learned how containers are ready for production despite what you might have
    been told including SQL Server container performance, security, and availability.


    And you finished up the chapter getting a sneak peak on what SQL Server Windows
    containers will look like.


    I hope you have a strong grasp of SQL Server containers and are ready to learn
    about a platform built to deploy and scale containers called Kubernetes.


    # 8. SQL Server on Kubernetes


    If containers are the new virtual machines, then Kubernetes are the new servers.
    You will see in this chapter that Kubernetes is an important technology to the
    future of containerized applications, especially running enterprise workloads
    like SQL Server.


    ## What Is k8s?


    If you have not read Chapter [7](#479130_1_En_7_Chapter.xhtml), you might go back
    and at least browse it before you read this chapter. Why? Because Kubernetes or
    k8s is all about *hosting containers*. k8s is actually much more than just hosting.
    I’ll use k8s for Kubernetes for the rest of the chapter because that is the popular
    acronym for it (and it is sure faster to type). k8s stands for k<8 letters>s in
    the word Kubernetes (I had to research it myself when I first saw the term).


    Unlike Chapter [7](#479130_1_En_7_Chapter.xhtml), I will not go into exhaustive
    detail on the internals of k8s because that would really take an entire book.
    What I will do is introduce you to some of the terms, add in some comments about
    how the internals work, and point you to some excellent references.


    After going through the basics of k8s in this chapter, I’ll talk about how k8s
    solves important challenges for the deployment of containers in a scalable platform
    that provides built-in high availability (HA). I’ll also show how to update all
    the SQL Server containers in a k8s environment, similar to the process of updating
    a single container, which I described in Chapter [7](#479130_1_En_7_Chapter.xhtml).
    I’ll introduce you to an intriguing concept to deploy SQL Server in k8s, called
    Helm Charts . Finally, I’ll talk about the future of availability with SQL Server
    2019 and k8s and how we are looking to integrate Always On Availability Groups
    with k8s.


    ### k8s Objects


    Whether you read over these resources or not, let me describe in this chapter
    some of the terminology of k8s from my point of view, and a few comments about
    internals I found interesting as I’ve learned the topic. The fundamental terms
    and objects you need to know about k8s as you read this chapter are


    **Cluster** – Think of the k8s cluster as a server or computer. This is the *main
    host* for all software running on k8s. It is common to refer to the host of all
    objects as a k8s cluster.


    **Node** – Think of a node as a virtual machine running on the cluster. A node
    will be a host for running *pods* (which have containers) within the cluster.
    It is very common to have more than one node on a k8s cluster. You can read more
    about a node at [`https://kubernetes.io/docs/concepts/architecture/nodes/`](https://kubernetes.io/docs/concepts/architecture/nodes/)
    .


    **Pod** – A pod is a logical collection of containers running on a node in the
    cluster. A pod will be a unit of deploying, managing, and failing over containers
    running in the cluster. You can read more about a pod at [`https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/`](https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/)
    .


    **Service** – The Kubernetes documentation describes a service as “abstraction
    which defines a logical set of Pods and a policy by which to access them.” For
    the purposes of SQL Server, a service will serve as a *load balancer* and an abstraction
    of the private IP address of the pod hosting SQL Server. It is very much like
    a listener for clustering for SQL Server. k8s provides the concept of a service
    built into the k8s software, and applications like SQL Server can bind to them
    so that no matter where the SQL Server pod is hosted in the cluster, applications
    can always connect to the service using the same IP address and port. You can
    read more about a k8s service at [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/)
    .


    **secret** – A secret is a k8s object that allows you to store sensitive information,
    like a password. This is very convenient for SQL Server to store the sa password.
    You can read more about k8s secrets at [`https://kubernetes.io/docs/concepts/configuration/secret/`](https://kubernetes.io/docs/concepts/configuration/secret/)
    .


    **storage class** – A storage class is a k8s object to expose storage like a disk
    system. You can read more about k8s storage classes at [`https://kubernetes.io/docs/concepts/storage/storage-classes/`](https://kubernetes.io/docs/concepts/storage/storage-classes/)
    .


    **Persistent Volume Claim** – A Persistent Volume Claim (PVC) is a request for
    storage backed up by a Persistent Volume which is mapped to a storage class. For
    me, this is like asking for a volume on a disk drive for storage. In the case
    of SQL Server, this will work quite well for database files.


    There are other terms I will introduce and talk about as you go about using examples
    in the rest of the chapter.'
  trans: '

    ## 总结


    这是一个非常长的章节，需要耐心阅读和消化。我介绍了什么是容器，以及它为何能解决托管 SQL Server 等产品和开发应用程序所面临的现代挑战。容器具有可移植、轻量、一致和高效的特点。


    我向你描述并展示了，容器本质上就是以隔离且独特方式运行的程序。你了解了 SQL Server 2019 为容器带来的新增强功能，包括 RHEL 镜像和新的
    Microsoft 容器注册表。


    如果你学习了本章的其他内容，你就有机会亲自尝试几个示例，包括部署容器、体验更新（及回滚）SQL Server 的全新高效方式，以及部署像 SQL Server
    复制这样的多容器应用程序。


    你了解了容器已经为生产环境做好了准备，无论你之前可能听到过什么说法，包括 SQL Server 容器的性能、安全性和可用性。


    最后，你还对 SQL Server Windows 容器的未来面貌进行了一番预览。


    希望你现在已经对 SQL Server 容器有了扎实的理解，并准备好学习一个专为部署和扩展容器而构建的平台——Kubernetes。


    ## 8. Kubernetes 上的 SQL Server


    如果说容器是新的虚拟机，那么 Kubernetes 就是新的服务器。在本章中，你将看到 Kubernetes 对于容器化应用程序的未来是一项重要技术，尤其是运行像
    SQL Server 这样的企业级工作负载。


    ### 什么是 k8s？


    如果你没有阅读第 7 章，那么至少请在阅读本章前回去浏览一下。为什么？因为 Kubernetes 或 k8s 的核心就是*托管容器*。实际上，k8s 远不止是托管。在本章的剩余部分，我将使用
    k8s 作为 Kubernetes 的简称，因为这是流行的缩写（而且打字肯定更快）。k8s 代表 Kubernetes 这个词中 k 后的 8 个字母（我第一次看到这个术语时也自己研究过）。


    与第 7 章不同，我不会深入探讨 k8s 的内部细节，因为那真的需要一整本书来描述。我将做的是向你介绍一些术语，穿插一些关于其内部工作原理的评论，并为你指出一些优秀的参考资料。


    在本章介绍了 k8s 的基础知识后，我将讨论 k8s 如何解决容器部署中的重要挑战，它提供了一个具有内置高可用性（HA）的可扩展平台。我还将展示如何在 k8s
    环境中更新所有 SQL Server 容器，其过程类似于我在第 7 章描述的更新单个容器的过程。我将向你介绍一个在 k8s 中部署 SQL Server 的有趣概念，称为
    `Helm Charts`。最后，我将讨论 SQL Server 2019 与 k8s 在可用性方面的未来展望，以及我们如何计划将 Always On 可用性组与
    k8s 集成。


    #### k8s 对象


    无论你是否阅读了这些资源，让我在本章中从我的角度描述一些 k8s 的术语，并分享一些我在学习这个主题时发现的关于内部原理的有趣评论。阅读本章时，你需要了解的基本术语和对象包括：


    **集群** – 将 k8s `Cluster` 视为一台服务器或计算机。这是运行在 k8s 上的所有软件的*主要宿主*。通常将托管所有对象的主机称为 k8s
    集群。


    **节点** – 将 `Node` 视为在集群上运行的虚拟机。节点将在集群内托管运行 *Pod*（其中包含容器）的主机。一个 k8s 集群上拥有多个节点是非常常见的。你可以在
    [`https://kubernetes.io/docs/concepts/architecture/nodes/`](https://kubernetes.io/docs/concepts/architecture/nodes/)
    阅读更多关于节点的信息。


    **Pod** – `Pod` 是集群中节点上运行的容器的逻辑集合。Pod 将是部署、管理和故障转移集群中运行容器的单位。你可以在 [`https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/`](https://kubernetes.io/docs/concepts/workloads/pods/pod-overview/)
    阅读更多关于 Pod 的信息。


    **服务** – Kubernetes 文档将 `Service` 描述为“定义一组逻辑 Pod 以及访问它们的策略的抽象”。对于 SQL Server 而言，服务将充当*负载均衡器*，并且是托管
    SQL Server 的 Pod 的私有 IP 地址的抽象。它非常类似于 SQL Server 故障转移集群中的侦听器。k8s 提供了内置于 k8s 软件中的服务概念，像
    SQL Server 这样的应用程序可以绑定到它们，这样无论 SQL Server Pod 在集群中的哪个位置托管，应用程序始终可以使用相同的 IP 地址和端口连接到该服务。你可以在
    [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/)
    阅读更多关于 k8s 服务的信息。


    **Secret** – `Secret` 是一种 k8s 对象，允许你存储敏感信息，例如密码。这对于 SQL Server 存储 `sa` 密码非常方便。你可以在
    [`https://kubernetes.io/docs/concepts/configuration/secret/`](https://kubernetes.io/docs/concepts/configuration/secret/)
    阅读更多关于 k8s Secrets 的信息。


    **存储类** – `Storage Class` 是一种 k8s 对象，用于暴露存储，如磁盘系统。你可以在 [`https://kubernetes.io/docs/concepts/storage/storage-classes/`](https://kubernetes.io/docs/concepts/storage/storage-classes/)
    阅读更多关于 k8s 存储类的信息。


    **持久卷声明** – `Persistent Volume Claim` (PVC) 是对存储的请求，由映射到存储类的 `Persistent Volume`
    提供支持。对我来说，这就像在磁盘驱动器上请求一个卷用于存储。对于 SQL Server 的情况，这将非常适用于数据库文件。


    在本章剩余部分的使用示例中，我还会介绍并讨论其他术语。

    '
- fmt: '# Comment on Internals of k8s


    You can use the references I provided earlier in the chapter to truly dive into
    the internals, but I will say that one aspect of k8s you should understand is
    `API`. I love it when I can look at how something works by reviewing the Application
    Programing Interface (API). Everything at the core of k8s is based on an `API
    server`. You can read about all the components that power a k8s cluster, but the
    `API server` is a piece of software that accepts requests and “does stuff.” Think
    of the `API server` like `SQL Server`. The API of `SQL Server` is `T-SQL`, and
    applications can submit `T-SQL` commands to `SQL Server`, and it “does stuff.”
    k8s works in a similar way. You can read more about the k8s API at [`https://kubernetes.io/docs/concepts/overview/kubernetes-api/`](https://kubernetes.io/docs/concepts/overview/kubernetes-api/).
    The `API server` is part of the k8s `control plane`, which you can read more about
    at [`https://en.wikipedia.org/wiki/Kubernetes#Kubernetes_control_plane_`](https://en.wikipedia.org/wiki/Kubernetes%2523Kubernetes_control_plane_)
    (primary). Keep in mind the concept of a `control plane` and `API server` as you
    use k8s and then start to learn about `SQL Server Big Data Clusters` in Chapter
    [10](#479130_1_En_10_Chapter.xhtml).


    This means that, if you like to write code, you can deploy and manage containers
    in k8s using the API; or, you can use a very convenient command-line interface
    (CLI) called `kubectl` (Buck Woody always pronounces this “kubecuttle”) which
    interacts with the k8s API for you. The way you will program to the k8s API with
    `kubectl` is with a declarative protocol using `YAML` files. You can read more
    about the `kubectl` program at [`https://kubernetes.io/docs/reference/kubectl/overview/`](https://kubernetes.io/docs/reference/kubectl/overview/).
    Use this “cheatsheet” for a quick reference at [`https://kubernetes.io/docs/reference/kubectl/cheatsheet/`](https://kubernetes.io/docs/reference/kubectl/cheatsheet/).


    Take a look at the components that make up a k8s cluster at [`https://kubernetes.io/docs/concepts/overview/components/`](https://kubernetes.io/docs/concepts/overview/components/).
    And if you are wondering how containers are deployed and managed in the k8s cluster,
    `Docker` is a component that is installed by k8s and runs within each node of
    the cluster. I consider k8s a simple yet complex system to deploy, schedule, manage,
    scale, and power container applications, like `SQL Server`.


    Since k8s is open source, it is possible to deploy a cluster in many different
    ways, platforms, and systems. Let’s look at the various k8s deployment options
    that meet your needs or requirements.


    ## k8s Deployment Options


    k8s was founded by Google back around 2014, when Brendan worked there, to build
    a system to scale containerized applications for internal applications. In 2015,
    k8s 1.0 became open source, and is still an open source project today. (The k8s
    Wikipedia has an interesting origin story at [`https://en.wikipedia.org/wiki/Kubernetes#History`](https://en.wikipedia.org/wiki/Kubernetes%2523History).)
    Kubernetes is from a Greek word for “pilot” or “helmsman” and is a fitting name
    for something to steer the ship of a world of containers.


    Since k8s became open source, several companies have taken the k8s project and
    built a commercial k8s system for customers to use. You can read the k8s documentation
    site for a list of partners at [`https://kubernetes.io/partners/#kcsp`](https://kubernetes.io/partners/%2523kcsp).


    At the time I wrote this book, my experiences with the k8s landscape break down
    to these deployment choices:


    `Open source k8s` – I’ve talked to some customers thinking about `SQL Server`
    with k8s, and they have said that they are going to deploy their own k8s in their
    data center, or in virtual machines in the cloud, using the latest open source
    build of k8s. If you go down this path, you typically use a deployment tool called
    `kubeadm` ([`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/)).
    Another popular option is a tool called `kubespray` ([`https://kubernetes.io/docs/setup/production-environment/tools/kubespray/`](https://kubernetes.io/docs/setup/production-environment/tools/kubespray/)).
    If you are thinking of deploying your own k8s in your data center, it does give
    you maximum control, but *you own it*. In other words, you will have to own both
    maintaining and managing the k8s cluster, along with `SQL Server` running in it.


    `Minikube` – Want to get a quick and easy single node k8s running on your laptop
    or in a virtual machine? `Minikube` is your friend; it is meant for small testing
    and development purposes, and you can get up and running in no time. You can read
    about how to set up `Minikube` at [`https://kubernetes.io/docs/setup/learning-environment/minikube/`](https://kubernetes.io/docs/setup/learning-environment/minikube/).'
