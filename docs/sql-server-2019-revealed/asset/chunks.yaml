    \ `www.springeronline.com`。Apress Media, LLC 是一家加利福尼亚州有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是特拉华州的一家公司。\n\
    \n# 献词\n\n`本书献给 SQL Server 社区，亦称作 #sqlfamily。若没有这个社区，这款出色的产品就不会有今天的成就。`\n\n# 前言\n\
    \n我们确实正处于技术史上一个独特的转折点，对于从事数据、分析和 AI 领域工作的人来说，从未有过比现在更好的时机。数据的增长速度比以往任何时候都快，而通过\
    \ AI 和 ML 实现的数字颠覆为公司们将数据作为其业务竞争优势创造了无限可能。随着数字化的显著加速，我们现在面临的主要问题是如何利用这海量的数据来帮助我们的公司和社区实现转型。\n\
    \n我们看到了一个由智能云和智能边缘驱动的巨大机遇。SQL Server 在为开发人员、数据工程师和管理员在边缘、本地、私有云和公有云层面提供一致性方面，是业界无与伦比的。我们的\
    \ SQL Server 社区在这一演进过程中发挥了非常重要的作用，我无法充分感谢他们在过去 25 多年里给予的支持和反馈。\n\nSQL Server 2019\
    \ 是一个非凡的版本，我为团队所交付的成果感到自豪。SQL Server 2019 建立在 SQL Server 2016 和 SQL Server 2017\
    \ 所交付的创新基础之上。虽然作为 SQL Server 的每个主要版本所预期的那样，有几项新功能将很好地服务我们的客户，但我最感到兴奋的是那些卓越的创新，它们扩展了客户在数十年间建立起来的管理和从大数据系统中获取洞察的技能。这些创新将在推动客户数字化转型方面发挥关键作用。\n\
    \nBob Ward 自 SQL Server 团队早期就已加入，并对产品产生了显著影响。很少有人能像他那样拥有如此广泛和深入的理解，这体现在他设法在本书中以简单、易于理解的方式解释复杂的概念。希望您喜欢阅读本书。\n\
    \n> Rohan Kumar\n> \n> 微软 Azure 数据事业部 corporate vice president\n\n# 引言\n\n和我第一本书\
    \ `Pro SQL Server on Linux` 一样，您即将阅读的这些书页也经历了一些里程。我在 2019 年的出行比我一生中任何一年都多。这意味着我需要做好随时随地写作的准备。这包括在西雅图、伦敦、曼彻斯特（英国）、纳什维尔、拉斯维加斯（多次）、圣安东尼奥、奥斯汀、休斯顿、奥兰多、圣卢西亚（那是度假）、科罗拉多州的吉尼西、查尔斯顿、波士顿、迪拜、约翰内斯堡（南非）、南卡罗来纳州的格林维尔和印第安纳波利斯等城市的航班、酒店、火车和汽车旅程中，以及在我位于德克萨斯州北里奇兰山的家中的办公室里熬夜写作。\n\
    \n我以为在完成第一本书后，我不会再准备写另一本，但我无法抗拒讲述 SQL Server 2019 故事的机会。这本书确实代表了那句名言“爱的劳动”。我全身心地投入到学习、教学、抱怨、破坏、记录、测试和使用\
    \ SQL Server 2019 中。这本书代表了所有这些，甚至更多。\n\n我写这本书是为那些对 SQL Server 有基本了解，但希望在一本书中全面了解\
    \ SQL Server 2019 的数据专业人员和开发人员。本书有大量的例子、图表和参考资料来指导您。我写这本书不仅是为了让您完整理解 SQL Server\
    \ 2019，也是为了使其成为您可以随时查阅的参考书。\n\n虽然每一章都是独立的，但我强烈建议您从第 1 章开始，因为它介绍了该版本的历史和背景。我还为\
    \ SQL Server 2019 的所有关键功能奠定了基础，并解释了为什么我认为它是一款引人注目的产品。从那里开始，您可以按章节顺序阅读本书，也可以跳跃式阅读。有一点是肯定的，为了从第\
    \ 10 章关于大数据集群的内容中获得最大收益，您必须先阅读第 6、7、8 和 9 章。\n\n本书主要分为以下几个部分：\n\n*   第 1 章介绍历史和整个\
    \ SQL Server 2019 版本的概述。\n*   第 2、3 和 4 章涵盖性能、安全性和可用性。仅这几章的内容就足以让您对 SQL Server\
    \ 2019 感到兴奋。\n*   第 5 章独立面向开发人员。\n*   第 6、7 和 8 章全是关于 Linux、容器和 Kubernetes 的。\n\
    *   第 9 章通过 Polybase 向您介绍数据虚拟化。\n*   第 10 章是一个大章节，讨论一个重要主题：大数据集群。\n*   第 11 章通过讨论其他新功能和迁移来结束本书。\n\
    \n我喜欢“通过示例学习”，因此我在书中几乎为每一章都包含了许多示例（在某些情况下，我会解释如何使用已创建的示例）。您可以在本书的参考链接 [`www.apress.com/9781484254189`](http://www.apress.com/9781484254189)\
    \ 或我的 GitHub 仓库 [`https://aka.ms/bobsqldemos`](https://aka.ms/bobsqldemos) ([`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql))\
    \ 上找到本书的所有示例。\n\n我还建议您看看我们的团队构建的免费培训资源 [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops)。这包括使用\
    \ SQL Server 2019 的免费动手实验培训！\n\n对于这本书，我花了很多时间思考每一章“读者会想要什么”关于特定主题或示例的内容。我希望您在阅读本书时能够看到并感受到这一点。如果您对本书有任何问题或意见，我真的很想听听。请直接给我发送电子邮件至\
    \ `bobward@microsoft.com`。\n\n> Bob Ward\n> \n> 德克萨斯州北里奇兰山\n> \n> 2019 年 9 月\n\
    \n# 致谢\n\n我生命中有太多值得感恩的事情，能够撰写本书是其中之一。我相信我所有的祝福都来自上帝，正是通过祂的恩典，我认识到了耶稣基督的强大信息。我首先要感谢我美丽而才华横溢的妻子\
    \ Ginger。她是我的伴侣和灵魂伴侣。她不厌其烦地听我所有的抱怨，看着我为这本书熬到深夜，有时不得不让她开车，这样我就可以在副驾驶座上处理这本书。我不知道有谁的信仰比我妻子\
    \ Ginger 更坚定，我非常幸运能与她分享美好的生活。今年我们庆祝了结婚 30 周年，我仍然像以往一样，尽可能每一天都与她在一起。我还要感谢我的儿子 Troy\
    \ 和 Ryan。Troy 如今住在南卡罗来纳州的查尔斯顿，当飓风多里安逼近时，我在那里完成了本书的最后部分。Troy 是我钦佩的人，不仅因为他的品格，还因为他努力让这个世界变得更美好。Ryan\
    \ 在贝勒法学院读第二年（加油熊队！）。他继续以他的智慧、正直、自信地掌控一切的能力，同时还能抽出时间提高高尔夫球技，这让我感到惊叹。我还要感谢我的母亲 Annette\
    \ Gibaud，她继续为我树立榜样，教导我每天都要找到方法对他人友善。\n\n有许多人帮助完成了这本书。我首先要感谢 Apress Media 给我另一个写书的机会。Jonathan\
    \ Gennick 和 Jill Balzano 在每一步都帮助我推动这本书完成。如果没有我的技术审阅 Aaron Bertrand，这本书不可能按时完成。当我考虑写这本书时，Aaron\
    \ 是我首先想到的审阅者之一，因为他对 SQL Server 的惊人知识和在社区中的专家声誉。Aaron 审阅每一章的速度简直是超人。\n\n在微软方面，首先要感谢\
    \ Rohan Kumar、Gayle Sheppard 和 Asad Khan 给我机会传播 SQL Server 2019 的信息，这对本书的详细学习至关重要。我还要亲自感谢我最亲密的两位同事\
    \ Buck Woody 和 Anna Hoffman (Thomas)。我在 2018 年和 2019 年与 Buck 和 Anna 一起环游世界，讲述\
    \ SQL Server、大数据集群和 Azure 的故事。他们都让我成为更好的讲故事者和教师，并且在旅途中很有趣。微软 SQL Server 工程团队非常出色。能与如此聪明和专业的人一起工作，我感到敬畏，他们中的许多人帮助我提供了您在本书中找到的细节。这一切都要从\
    \ Slava Oks 和 Travis Wright 开始，他们帮助讲述了西雅图和 Aris 的故事，并且两人在推动这个版本的许多方面（包括大数据集群）发挥了重要作用。Conor\
    \ Cunningham 继续以其对产品的深刻理解让我惊叹，同时在交付高质量版本方面发挥了关键作用。\n\n本书的真正英雄是构建这个版本并帮助我完成本书各个部分的工程团队成员。谨按字母顺序，我要感谢\
    \ Pedro Lopes、Pam Lahoud、Amit Banerjee、Brian Carrig、Tejas Shah、Vin Yu、Sourabh\
    \ Agarwal、Mihaela Blendea、Nellie Gustafsson、Abiola Oke、James Rowland-Jones、Scott\
    \ Konersmann、Stuart Padley、David Kryze、Robert Dorr、Mitchell Sternke、Ross Monster、Madeline\
    \ MacDonald、Dylan Gray、Joe Sack、Shreya Verma、Jakub Szymaszek、Joachim Hammer、Raghav\
    \ Kaushik、Parag Paul、Panagiotis Antonopoulos、Michael Nelson、Pranjal Gupta、Jarupat\
    \ Jisarojito、Weiyun Huang、George Reynya、Umachandar Jayachandran (UC)、Sahaj Saini、Mike\
    \ Habben、Vaqar Pirzada、Rony Chatterjee、Vicky Harp、Alan Yu、Jack Li、Alexey Eksarevskiy、Jay\
    \ Choe、Argenis Fernandez、Kevin Farlee、Arieh Bibliowicz、Alex Umansky、Matteo Taveggia、Kapil\
    \ Thacker、Li Zhang 和 Dong Cao。\n\n我还要感谢微软市场和 CSS 团队的成员，包括 Anshul Rampal、Matthew\
    \ Burrows、Marko Hotti、Debbi Lyons、Suresh Kandoth 和 Pradeep M M 的帮助。\n\n如果没有像 HPE、DELL\
    \ 和 Red Hat 这样的合作伙伴，允许我向他们的客户讲述 SQL Server 2019 的故事，这本书和我的工作是不可能完成的。感谢 Wendy Harms、Bill\
    \ Dunmire、Urs Renggli、Robert Sonders、Louis Imershein 和 Stephane Bureau（我的视频制作人）。特别感谢\
    \ David DeWitt 对 Polybase 历史的见解，Brendan Burns 对 Kubernetes 知识的见解和基础，以及 Anthony\
    \ Nocentino 对 Linux 和容器的丰富知识。\n\n最后，感谢全球的 SQL Server 社区。我们现在向您推送 SQL Server 版本的速度比以往任何时候都快，但每次我介绍\
    \ SQL Server 时，您仍然表现出巨大的热情和赞赏。\n"
- fmt: '## About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Why SQL Server 2019?


    In July of 2017, I made one of my regular visits to Redmond, Washington, as a
    member of the SQL Server engineering team. I live in North Richland Hills, Texas,
    and modern technology allows me to do much of my job remote from most of the SQL
    Engineering team. But I’m still a bit of an “old-school” person, and, in some
    cases, nothing beats working with people face to face. By July of 2017, I had
    been in the SQL Engineering team for over a year, focused mostly on SQL Server
    2016 (see an example of my work on SQL Server 2016 on the Web at [`https://channel9.msdn.com/Events/Ignite/2016/BRK3043-TS`](https://channel9.msdn.com/Events/Ignite/2016/BRK3043-TS)).


    Up until this time, I was a member of the famous Tiger Team, but, as part of my
    visit in 2017, I was asked to take on new tasks to focus specifically on the upcoming
    SQL Server 2017 release. This included SQL Server on Linux, which ultimately led
    to me authoring my first book, `Pro SQL Server on Linux` ([`www.apress.com/us/book/9781484241271`](https://www.apress.com/us/book/9781484241271)).
    So on my visit, I started meeting and talking to various members of the team about
    SQL Server 2017 – performance enhancements, the overall set of new features, and
    the details behind SQL Server on Linux and Containers. One of the people I spoke
    with that week was Slava Oks. Slava is the lead development manager for SQL Server
    and one of the inventors of SQL Server on Linux. He wrote the foreword of `Pro
    SQL Server on Linux`, and Chapter 1 of that book talks about the history of his
    involvement in the project. At that time, Slava liked to come in early to the
    office; when I’m in Redmond I, too, try to work “Texas time” – which means I also
    come in very early. So we would often meet for coffee before most others were
    in the office, in Building 16, though now our team works in Building 43. One morning,
    as Slava and I talked about SQL Server 2017, he said to me, “Hey have I told you
    about our plans for the next version of SQL Server, the one after SQL Server 2017?”
    I of course pretended to know – “Sure, Slava, I’ve heard of it, but don’t know
    the details.” He then invited me to come to a meeting the next day where he would
    explain to many of our engineering team the plan for the project. I had just spent
    a year focusing on SQL Server 2016, was now assigned to dive into SQL Server 2017
    and Linux, and here Slava wanted me to learn about the release after the release
    that had not been shipped yet? Of course, I was not going to turn him down, because,
    well, it’s Slava Oks. This may make it sound like Slava is some type of intimidating
    person, but he is one of the nicest people I’ve ever known at Microsoft. So while
    I was starting to pack my brain on the details of SQL Server 2017, I started down
    the path to learn about what we were doing for the future version of SQL Server,
    code named Project SQL Server `Seattle`.


    ## Project Seattle


    In the meeting the next day with Slava, I quickly learned in the span of a few
    hours we were embarking on one of the most ambitious enhancements to SQL Server
    I had ever seen in my career. I’m saying this with the knowledge already that
    we were bringing to market SQL Server on Linux, which nobody had previously thought
    was possible.


    Slava and the team chose the code name “Seattle” because the team had used Helsinki
    for the code name for SQL Server 2017 and were looking for a new “city” name.
    Ironically, no one at Microsoft had used the name Seattle before, so it quickly
    stuck. I asked Slava when he first started planning Project Seattle. I was amazed
    to hear all the way back in January of 2017. The fact that folks like Slava, Conor
    Cunningham, and Travis Wright were planning Project Seattle while working on building
    the final pieces of SQL Server 2017 and Linux was a testament to both their dedication
    to the team and also their desire to keep SQL Server leading innovation in the
    database industry.


    It was hard to believe we could so quickly plan something bigger after having
    delivered so many compelling and innovative features in SQL Server 2016 and SQL
    Server 2017.


    In SQL Server 2016, we brought new performance diagnostic capabilities with `Query
    Store`. We included new features for developers such as temporal tables and JSON
    integration. We upped our game on security with `Always Encrypted`, `dynamic data
    masking`, and `row-level security`. And we introduced two new innovations outside
    the “normal” type of features for a relational database system. One of these was
    integration of the R language for Machine Learning models. The second was integration
    with Hadoop systems with a feature called `Polybase` (which will lead to something
    bigger in 2019, but I’m getting ahead of myself). Building features to enable
    new scenarios like Machine Learning and Big Data led myself and others at Microsoft
    to start pitching the idea that SQL Server was no longer just a relational database
    engine but a `data platform`.


    However, to be modern and a complete data platform, we needed to be able to empower
    applications on systems other than just Windows Server. This led to our release
    of SQL Server 2017 with support for Linux and Docker Containers. Running on Linux
    and Containers was a very big move for Microsoft, but SQL Server 2017 also included
    other capabilities such as `Adaptive Query Processing`, `automatic tuning`, `graph
    database`, `clusterless` Availability Groups, and Python integration to complement
    R language support for `Machine Learning Services`.


    With all of this innovation in mind, how could we in a short period of time plan
    and build something new, different, and exciting than SQL Server 2016 and 2017?
    I asked myself this question as I intently listened in my first Project Seattle
    meeting. In the first few minutes, I would be introduced to an idea that, when
    later announced to the public, would be considered quite radical. And that innovation
    started as the “big rock” of the Seattle project, which has a project name of
    its own: `Aris`.'
