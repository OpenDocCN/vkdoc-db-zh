    Server`和`Big Data`系统的架构和概念已经可以用来构建更大的东西（包括一个名为`EXTERNAL TABLE`的`T-SQL`扩展）。如果我们能够简化`Polybase`的部署和配置方案，并增加更多的数据源支持，它可能会在业界得到更广泛的应用。此外，Travis
    很快了解到，如果你想在数据处理的`Big Data`世界中被认真对待，你需要考虑另一个名为`Spark`的技术。


    掌握了这些知识后，Slava、Travis 和构建`SQL Server on Linux`的核心团队成员们立志构建一个`SQL Server`与包括`Spark`在内的`Big
    Data`集成的原型。他们在一个大会议室里进行了为期数天的头脑风暴，并将其称为“Aris 黑客松”。团队成员包括 Slava Oks, Travis Wright,
    Scott Konersmann, Stuart Padley, Michael Nelson, Pranjal Gupta, Jarupat Jisarojito,
    Weiyun Huang, George Reynya, David Kryze, Umachandar Jayachandran (UC), 和 Sahaj
    Saini。到结束时，他们构建了一个可工作的`cluster`，它将`SQL Server`现有的`Polybase`功能与`Spark`结合了起来。图 1-1
    展示了团队构建的集群的粗略示意图。


    ![../images/479130_1_En_1_Chapter/479130_1_En_1_Fig1_HTML.jpg](img/479130_1_En_1_Fig1_HTML.jpg)


    图 1-1


    第一个 Aris 集群


    在原型中，他们构建了一个`Hadoop`集群，包括`Apache Spark`和`HDFS`组件，同时还结合了`SQL Server Polybase`。他们使用`Spark`将数据流式传输到`Data`节点，然后使用`Polybase`在`Head`节点中的`SQL
    Server`里，将数据与通过`Spark`摄取到`HDFS`中的数据进行连接。这个原型背后的想法是证明他们可以将`Spark`、`Hadoop`和`SQL
    Server`集成在一起。


    大约在同一时间，Travis 一直在与从微软收购的一家名为`Metanautix`的公司加入团队的工程师们交流。作为此次收购的一部分，我们的团队获得了一项技术，可以通过`ODBC`连接到一系列数据源，包括`ORACLE`、`SQL
    Server`、`Teradata`和`MongoDB`。团队认为，如果能将这项技术与`Aris`项目集成，我们就能为`Data Virtualization`构建一个相当引人注目的方案。`SQL
    Server`现在可以作为一个中心枢纽，用于访问不同数据平台和系统中的数据，而无需将数据移动到`SQL Server`（使用像抽取、转换和加载（`ETL`）这样的技术）。


    在交付可供客户使用和试用的软件之前，我们需要决定一个运行所有这些组件的平台。我们需要一个平台，能够轻松部署所有软件，包括`Polybase`、`Hadoop`和`Spark`；提供可管理性和安全性；并支持弹性扩展和高可用性。考虑到容器易于部署的特性，以及我们在`SQL
    Server 2017`中已经实现了对容器的支持，容器似乎是一个合乎逻辑的选择。团队下一个自然的选择是选择`Kubernetes`作为构建运行这些容器的集群的平台。`Kubernetes`作为一个分布式计算和可扩展性能的平台正迅速获得发展势头。我们的经验告诉我们，`Linux`是运行`Kubernetes`和`Hadoop`系统的首选操作系统，而且由于`SQL
    Server`已经支持在`Linux`上运行，这是一个很好的契合点。


    于是，在 2017 年末，我们的团队踏上了构建`Aris`集群的旅程，该集群将实现`Data Virtualization`的愿景，但同时集成`Spark`和`HDFS`等`Big
    Data`技术。从一开始，我们的团队就决定所有这些都需要“开箱即用”。也就是说，如果你购买了`SQL Server`，我们将作为许可的一部分安装所有这些组件（虽然当时还不知道这是否会是一个新版本，但所有这些都将包含在`SQL
    Server`中）。正如你现在看到的`SQL Server 2019`以及我们称之为`Big Data Clusters`的最终产品，它远比早期的`Aris`原型丰富得多，但其愿景和概念是相同的：提供一个易于部署的`Data
    Virtualization`平台，内置可扩展的性能、安全性和可管理性。'
- fmt: "## Seattle Becomes SQL Server 2019\n\nWhile the concept of Aris and Big Data\
    \ clusters was huge, innovative, and, quite frankly, a bit scary, every major\
    \ release of `SQL Server` includes enhancements across several areas of the platform.\
    \ This includes performance, security, and availability, the three areas Conor\
    \ Cunningham often refers to as “the meat and potatoes of `SQL Server`.” Our team\
    \ had also launched `SQL Server` on Linux with `SQL Server 2017`. As amazing as\
    \ that product has been, there were a few features that ship with `SQL Server`\
    \ on Windows that needed to also be added to Linux. We also knew that containers\
    \ are big, and I mean big in the sense that they are a future direction to deploy\
    \ and run applications, including `SQL Server`. So there was some work there we\
    \ know we needed to do, including exploring new scenarios with `Kubernetes` clusters\
    \ (not just the Big Data Cluster solution).\n\nSo many teams contribute to the\
    \ amazing product that is `SQL Server`. Our Enterprise team (aka the Tiger Team)\
    \ had a pile of new features they wanted in the new release with true customer\
    \ value (because that is what they do!). Our friends who build new features for\
    \ performance, availability, and security for `Azure SQL Database` wanted to see\
    \ their work in Project Seattle, since the engines that run the Azure service\
    \ and `SQL Server` are the same. As I saw this play out in 2017, I could see the\
    \ momentum for a historic release.\n\nAs the calendar year of 2017 ended, we were\
    \ all set up for the next release of `SQL Server`, `SQL Server 2018`. This all\
    \ made sense to me. We shipped two major versions of `SQL Server` in back to back\
    \ years, `SQL Server 2016` and `SQL Server 2017`, so why not `SQL Server 2018`?\n\
    \nConor Cunningham, our product and release architect, has told me that, with\
    \ our agile engineering capabilities, we could ship `SQL Server` every month if\
    \ we wanted to. And we can do it with quality. Of course, we don’t do this, because\
    \ we want to ship `SQL Server` releases that have both quality and major value\
    \ for our customers. As we started moving forward into the early months of calendar\
    \ year 2018, we had to decide if we wanted to ship a major new version in that\
    \ year. When we looked at the landscape of capabilities that we could put into\
    \ this release, including Big Data Clusters, we made the decision in the spring\
    \ of 2018 that we would ship our first preview of `SQL Server` vNext in calendar\
    \ year 2018. (When we don’t know an official name to call the next release, even\
    \ if we have a project name like Seattle, we call it “vNext.”) And you may have\
    \ noticed we often try to make announcements for major new releases at big events.\
    \ Looking at the calendar, one of the biggest global customer events for Microsoft\
    \ has become Microsoft Ignite (it is now in Orlando, with ~30,000 people). So\
    \ in the summer of 2018, our leadership decided to launch the preview of `SQL\
    \ Server` vNext at Microsoft Ignite and call it `SQL Server 2019`, meaning that\
    \ we would make this release GA (which means General Availability) sometime in\
    \ calendar year 2019.\n\nThis made sense to everyone on the team. It gave us more\
    \ runway to land Big Data Clusters, plus more capabilities with the “core” of\
    \ `SQL Server` all based on customer feedback and experience. My task? Take the\
    \ work I had done to evangelize and showcase `SQL Server 2016` and `2017` and\
    \ show our customers, the industry, and community that we have truly built a Modern\
    \ Data Platform with `SQL Server 2019`.\n\n## Modernizing Your Database with SQL\
    \ Server 2019\n\nFigure [1-2](#479130_1_En_1_Chapter.xhtml#Fig2) is my main “pitch”\
    \ diagram when I talk about `SQL Server 2019`. Built by one of my colleagues in\
    \ Microsoft marketing, Debbi Lyons (you may have seen myself and Debbi sometimes\
    \ appearing together talking `SQL Server`), it represents a full picture of the\
    \ new Modern Data Platform of `SQL Server 2019`.\n\n![../images/479130_1_En_1_Chapter/479130_1_En_1_Fig2_HTML.jpg](images/479130_1_En_1_Chapter/479130_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2\n\nModernize with `SQL Server 2019`\n\nIf you have ever seen me talk\
    \ about `SQL Server 2016` or `2017`, you will notice the slide looks a bit similar,\
    \ but with key differences:\n\n*   An integrated Data Virtualization solution\
    \ integrating `Spark`, `HDFS`, and `SQL Server` in a new and innovative way (basically\
    \ `SQL Server` “meets Big Data”)\n*   New capabilities to continue the platform\
    \ of choice value to our customers across Windows, Linux, Containers, and `Kubernetes`\n\
    \n`SQL Server` continues to lead the database industry in performance and is the\
    \ least vulnerable data platform over the last decade. With a `SQL Server` license,\
    \ customers have access to Business Intelligence services, such as `Power BI Report\
    \ Server`. In addition, with the new `Azure SQL Database` Managed Instance service,\
    \ functionality is virtually the same from `SQL Server` in your private cloud\
    \ and Azure in the public cloud. The consistency message doesn’t stop there. Your\
    \ skills in `T-SQL` apply across `SQL Server` and Azure, and our tools continue\
    \ to work seamlessly across `SQL Server` and Azure Data services.\n\nAnother set\
    \ of capabilities that seems to get lost in the conversation of new features is\
    \ that `SQL Server` (and Azure) provides in-memory features that allow you to\
    \ maximize your computing resources, including In-Memory OLTP and Columnstore\
    \ Indexes. All of this comes with the `SQL Server 2019`. Figure [1-3](#479130_1_En_1_Chapter.xhtml#Fig3)\
    \ is a more detailed picture of major new key functionality unique to `SQL Server\
    \ 2019`.\n\n![../images/479130_1_En_1_Chapter/479130_1_En_1_Fig3_HTML.jpg](images/479130_1_En_1_Chapter/479130_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3\n\n`SQL Server 2019` key functionality\n\nI’m going to use this diagram\
    \ (going left to right, starting in the upper left-hand corner) to sketch out\
    \ for you the major new features of `SQL Server 2019`, which will be like a blueprint\
    \ for your reading for the remainder of the book. As you read through these new\
    \ capabilities, keep in mind that `SQL Server` powers `Azure SQL Database`, which\
    \ means many of the capabilities you see in this book work the same in `Azure\
    \ SQL Database`. Furthermore, everything you see in this book can be done in Azure\
    \ whether it is `SQL Server` in Azure Virtual Machine or containers and `Kubernetes`\
    \ in the cloud.\n\n### Data Virtualization\n\nPreviously in this chapter, I’ve\
    \ discussed the origins of Data Virtualization with Project Aris. `SQL Server\
    \ 2019` is the realization of that vision with two specific capabilities:\n\n\
    *   **Polybase in SQL Server 2019**\n\n    I call this Polybase++ because we have\
    \ extended the functionality of Polybase that shipped with `SQL Server 2016` (for\
    \ more info on Polybase, see [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide%253Fview%253Dsql-server-2017))\
    \ to provide different data source connectors including Oracle, `SQL Server`,\
    \ MongoDB (`CosmosDB`), and Teradata. And you can connect to these data sources\
    \ without installing any client software; `SQL Server` has what you need built-in.\
    \ In addition, you can connect to other sources such as SAP HANA by installing\
    \ your own ODBC driver. I’ll cover the new Polybase in `SQL Server 2019` in Chapter\
    \ [9](#479130_1_En_9_Chapter.xhtml).\n\n*   **Big Data Clusters**\n\n    As I\
    \ described our vision for Project Aris earlier in the chapter, we decided to\
    \ build a complete solution that deploys `SQL Server` with the new Polybase functionality,\
    \ `HDFS`, `Spark`, and other components for management, security, and availability.\
    \ There is so much more to this than I can describe here, so read more on Big\
    \ Data Clusters in Chapter [10](#479130_1_En_10_Chapter.xhtml)."
