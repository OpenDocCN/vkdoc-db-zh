- fmt: '## How It Works


    I described in Chapter [5](#479130_1_En_5_Chapter.xhtml) the architecture of SQL
    Server ML Services including the Launchpad service and satellite processes.


    SQL Server ML Services on Linux has the same concept. On Linux, the Launchpad
    process is a systemd unit service called `mssql-launchpadd`. You can view or control
    this service using `systemctl`. Figure [6-4](#479130_1_En_6_Chapter.xhtml#Fig4)
    shows an example of the status of this service on Linux.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg)


    Figure 6-4 The Launchpad on Linux


    The Launchpad service is represented by a daemon process on Linux called `launchpadd`.
    The same concept of forking processes on Windows for satellite processes works
    on Linux, including the R program and `bxlserver`. Figure [6-5](#479130_1_En_6_Chapter.xhtml#Fig5)
    shows the processes forked off the `launchpadd` service to run an R script.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg)


    Figure 6-5 Satellite processes for an R script on SQL Server on Linux


    You may be asking how I was able to capture these processes in-flight? Use these
    steps:


    From another `ssh` session, run the following T-SQL script:


    ```sql

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet

    Sys.sleep(10)'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    Note the `Sys.sleep()` call to make the R script pause during execution.


    From your other `ssh` session, run the following commands from the Linux shell:


    ```bash

    ps -axf

    ```


    SQL Server ML Services (and the extensibility framework) uses namespaces for process
    isolation for satellite processes. You can use the same example earlier to cause
    the R script to pause and run the command on Linux:


    ```bash

    sudo lsns

    ```


    You will see a separate namespace created for the launchpad process (which forks
    the satellite processes). Figure [6-6](#479130_1_En_6_Chapter.xhtml#Fig6) shows
    an example of this separate namespace.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg)


    Figure 6-6 Namespace for satellite processes on Linux


    Figure [6-6](#479130_1_En_6_Chapter.xhtml#Fig6) shows something else important
    about SQL Server ML Services (and the extensibility framework). The user account
    that satellite processes runs under is called the `mssql_satellite` login. This
    is important for any permissions required by R or Python scripts (and extensibility
    languages).


    ### Note


    Don’t forget that the native scoring feature of SQL Server is built into the SQL
    Server engine, so can be used on SQL Server on Linux (even on SQL Server 2017).
    Read more at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring).


    ## The Extensibility Framework and Language Extensions


    Based on the same framework as SQL Server ML Services, we introduced the concept
    of language extensions, which I described in detail in Chapter [5](#479130_1_En_5_Chapter.xhtml).
    As part of this capability, we shipped Java as an example of a language extension
    in the box.


    To deploy SQL Server language extensions on Linux, you can install one of these
    packages:


    `mssql-server-extensibility` – This is the core software to use the extensibility
    framework for any language. It is a dependent package, as you saw earlier in this
    chapter, installed when you install SQL Server ML Services.


    `mssql-server-extensibility-java` – This will install the extensibility framework
    and the java language extension and SDK so you can run your Java code.


    Just like SQL Server ML Services, you also have the option to perform a combo
    install of SQL Server with language extensions, which you can read about at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions).
    In addition, SQL Server will install the Java Runtime Engine (JRE) Version 8 if
    it is not already installed on Linux (as with Windows, we will install the Zulu
    JRE).


    The process to deploy your Java class is almost identical to SQL Server on Windows
    and how I described how to use the regex tutorial in Chapter [5](#479130_1_En_5_Chapter.xhtml).
    In fact, Java is very compatible, so you can take the same java class you built
    in Chapter [5](#479130_1_En_5_Chapter.xhtml) and compile/build a `jar` file on
    Linux. You use the same steps to create an external language, external library
    for the SDK, and external library for your Java class (in the form of a `jar`
    file).


    When you run your code, the same Launchpad architecture is used to fork a process
    for satellite processing. Like SQL Server on Windows, this process is called Extension
    Host and looks like Figure [6-7](#479130_1_En_6_Chapter.xhtml#Fig7) from a process
    output on Linux.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg)


    Figure 6-7 The `exthost` satellite process to run Java for SQL Server on Linux


    ## Polybase on Linux


    It is difficult to arrange everything in a book in the exact right order. Chapter
    [9](#479130_1_En_9_Chapter.xhtml) is dedicated to the concept of Data Virtualization
    and Polybase in SQL Server 2019. I wanted to briefly mention it here because it
    is new to SQL Server on Linux.


    Polybase was introduced in SQL Server 2016 for Hadoop connectors and enhanced
    in SQL Server 2019 with connectors for SQL Server, Oracle, Teradata, and MongoDB.


    As you will read in Chapter [9](#479130_1_En_9_Chapter.xhtml), Polybase uses some
    of the components of our Analytics Platform System (APS, formerly known as Parallel
    Data Warehouse) to perform scale-out query processing. These exist as services
    in Windows and use the SQLPAL for SQL Server 2019 on Linux.


    We have introduced the `mssql-server-polybase` package to enable Polybase for
    SQL Server on Linux. You can read the complete deployment steps at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup).


    The same T-SQL statements and concepts apply for Polybase for SQL Server on Linux
    as with Windows, with these exceptions for SQL Server 2019:


    *   Polybase for SQL Server on Linux does not support scale-out groups.


    *   The generic ODBC connector is not supported.


    Our plans for the future are to get complete feature parity for Polybase for SQL
    Server on Linux past SQL Server 2019. You will learn more about how to use Polybase
    in Chapter [9](#479130_1_En_9_Chapter.xhtml).'
  raw: '### How It Works


    I described in Chapter [5](#479130_1_En_5_Chapter.xhtml) the architecture of SQL
    Server ML Services including the Launchpad service and satellite processes.


    SQL Server ML Services on Linux has the same concept. On Linux, the Launchpad
    process is a systemd unit service called **mssql-launchpadd** . You can view or
    control this service using systemctl. Figure [6-4](#479130_1_En_6_Chapter.xhtml#Fig4)
    shows an example of the status of this service on Linux.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The Launchpad on Linux


    The Launchpad service is represented by a daemon process on Linux called **launchpadd**
    . The same concept of forking processes on Windows for satellite processes works
    on Linux, including the R program and bxlserver. Figure [6-5](#479130_1_En_6_Chapter.xhtml#Fig5)
    shows the processes forked off the launchpadd service to run an R script.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Satellite processes for an R script on SQL Server on Linux


    You may be asking how I was able to capture these processes in-flight? Use these
    steps:


    From another ssh session, run the following T-SQL script:


    ```

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet

    Sys.sleep(10)'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    Note the Sys.sleep() call to make the R script pause during execution.


    From your other ssh session, run the following commands from the Linux shell:


    ```

    ps -axf

    ```


    SQL Server ML Services (and the extensibility framework) uses namespaces for process
    isolation for satellite processes. You can use the same example earlier to cause
    the R script to pause and run the command on Linux:


    ```

    sudo lsns

    ```


    You will see a separate namespace created for the launchpad process (which forks
    the satellite processes). Figure [6-6](#479130_1_En_6_Chapter.xhtml#Fig6) shows
    an example of this separate namespace.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Namespace for satellite processes on Linux


    Figure [6-6](#479130_1_En_6_Chapter.xhtml#Fig6) shows something else important
    about SQL Server ML Services (and the extensibility framework). The user account
    that satellite processes runs under is called the **mssql_satellite** login. This
    is important for any permissions required by R or Python scripts (and extensibility
    languages).


    ### Note


    Don’t forget that the native scoring feature of SQL Server is built into the SQL
    Server engine, so can be used on SQL Server on Linux (even on SQL Server 2017).
    Read more at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)
    .


    ### The Extensibility Framework and Language Extensions


    Based on the same framework as SQL Server ML Services, we introduced the concept
    of language extensions, which I described in detail in Chapter [5](#479130_1_En_5_Chapter.xhtml).
    As part of this capability, we shipped Java as an example of a language extension
    in the box.


    To deploy SQL Server language extensions on Linux, you can install one of these
    packages:


    **mssql-server-extensibility** – This is the core software to use the extensibility
    framework for any language. It is a dependent package, as you saw earlier in this
    chapter, installed when you install SQL Server ML Services.


    **mssql-server-extensibility-java** – This will install the extensibility framework
    and the java language extension and SDK so you can run your Java code.


    Just like SQL Server ML Services, you also have the option to perform a combo
    install of SQL Server with language extensions, which you can read about at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions)
    . In addition, SQL Server will install the Java Runtime Engine (JRE) Version 8
    if it is not already installed on Linux (as with Windows, we will install the
    Zulu JRE).


    The process to deploy your Java class is almost identical to SQL Server on Windows
    and how I described how to use the regex tutorial in Chapter [5](#479130_1_En_5_Chapter.xhtml).
    In fact, Java is very compatible, so you can take the same java class you built
    in Chapter [5](#479130_1_En_5_Chapter.xhtml) and compile/build a jar file on Linux.
    You use the same steps to create an external language, external library for the
    SDK, and external library for your Java class (in the form of a jar file).


    When you run your code, the same Launchpad architecture is used to fork a process
    for satellite processing. Like SQL Server on Windows, this process is called Extension
    Host and looks like Figure [6-7](#479130_1_En_6_Chapter.xhtml#Fig7) from a process
    output on Linux.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    The exthost satellite process to run Java for SQL Server on Linux


    ## Polybase on Linux


    It is difficult to arrange everything in a book in the exact right order. Chapter
    [9](#479130_1_En_9_Chapter.xhtml) is dedicated to the concept of Data Virtualization
    and Polybase in SQL Server 2019\. I wanted to briefly mention it here because
    it is new to SQL Server on Linux.


    Polybase was introduced in SQL Server 2016 for Hadoop connectors and enhanced
    in SQL Server 2019 with connectors for SQL Server, Oracle, Teradata, and MongoDB.


    As you will read in Chapter [9](#479130_1_En_9_Chapter.xhtml), Polybase uses some
    of the components of our Analytics Platform System (APS, formerly known as Parallel
    Data Warehouse) to perform scale-out query processing. These exist as services
    in Windows and use the SQLPAL for SQL Server 2019 on Linux.


    We have introduced the **mssql-server-polybase** package to enable Polybase for
    SQL Server on Linux. You can read the complete deployment steps at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)
    .


    The same T-SQL statements and concepts apply for Polybase for SQL Server on Linux
    as with Windows, with these exceptions for SQL Server 2019:


    *   Polybase for SQL Server on Linux does not support scale-out groups.


    *   The generic ODBC connector is not supported.


    Our plans for the future are to get complete feature parity for Polybase for SQL
    Server on Linux past SQL Server 2019\. You will learn more about how to use Polybase
    in Chapter [9](#479130_1_En_9_Chapter.xhtml).'
  trans: '

    ## 工作原理


    我在第 5 章描述了 SQL Server ML Services 的架构，包括启动板服务和卫星进程。


    SQL Server ML Services 在 Linux 上的概念相同。在 Linux 上，启动板进程是一个名为 `mssql-launchpadd`
    的 systemd 单元服务。你可以使用 `systemctl` 查看或控制此服务。图 6-4 显示了该服务在 Linux 上状态的示例。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg](img/479130_1_En_6_Fig4_HTML.jpg)


    图 6-4 Linux 上的启动板


    在 Linux 上，启动板服务由一个名为 `launchpadd` 的守护进程表示。与在 Windows 上为卫星进程派生进程的概念相同，这在 Linux
    上也适用，包括 R 程序和 `bxlserver`。图 6-5 显示了从 `launchpadd` 服务派生出来运行 R 脚本的进程。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg](img/479130_1_En_6_Fig5_HTML.jpg)


    图 6-5 SQL Server on Linux 上用于 R 脚本的卫星进程


    你可能会问，我是如何捕获这些正在运行的进程的？请按以下步骤操作：


    从另一个 `ssh` 会话，运行以下 T-SQL 脚本：


    ```sql

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet

    Sys.sleep(10)'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    注意 `Sys.sleep()` 调用会使 R 脚本在执行期间暂停。


    从你的另一个 `ssh` 会话，从 Linux shell 运行以下命令：


    ```bash

    ps -axf

    ```


    SQL Server ML Services（以及可扩展性框架）使用命名空间来实现卫星进程的进程隔离。你可以使用与前面相同的示例使 R 脚本暂停，并在 Linux
    上运行命令：


    ```bash

    sudo lsns

    ```


    你将看到为启动板进程（它会派生卫星进程）创建的独立命名空间。图 6-6 显示了这个独立命名空间的示例。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg](img/479130_1_En_6_Fig6_HTML.jpg)


    图 6-6 Linux 上用于卫星进程的命名空间


    图 6-6 揭示了关于 SQL Server ML Services（以及可扩展性框架）的另一个重要方面。卫星进程运行所使用的用户账户称为 `mssql_satellite`
    登录名。这对于 R 或 Python 脚本（以及可扩展语言）所需的任何权限都很重要。


    ### 注意


    别忘了，SQL Server 的本机评分功能内置于 SQL Server 引擎中，因此可以在 SQL Server on Linux（甚至 SQL Server
    2017）上使用。请在 [`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)
    阅读更多信息。


    ## 可扩展性框架与语言扩展


    基于与 SQL Server ML Services 相同的框架，我们引入了语言扩展的概念，我在第 5 章对此有详细描述。作为此功能的一部分，我们将 Java
    作为一个开箱即用的语言扩展示例进行了发布。


    要在 Linux 上部署 SQL Server 语言扩展，你可以安装以下软件包之一：


    `mssql-server-extensibility` – 这是用于任何语言的可扩展性框架的核心软件。如你在本章前面所见，这是一个依赖包，在安装 SQL
    Server ML Services 时会一同安装。


    `mssql-server-extensibility-java` – 这将安装可扩展性框架、Java 语言扩展以及 SDK，以便你可以运行 Java 代码。


    与 SQL Server ML Services 一样，你还可以选择执行 SQL Server 与语言扩展的组合安装，你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions)
    阅读相关信息。此外，如果 Linux 上尚未安装 Java 运行时环境（JRE）版本 8（与 Windows 类似，我们将安装 Zulu JRE），SQL
    Server 将会安装它。


    部署 Java 类的过程与 Windows 上的 SQL Server 以及我在第 5 章描述的如何使用正则表达式教程几乎相同。事实上，Java 的兼容性非常好，因此你可以获取在第
    5 章构建的相同 Java 类，并在 Linux 上编译/构建一个 `jar` 文件。你使用相同的步骤来创建外部语言、用于 SDK 的外部库以及用于你的 Java
    类（以 `jar` 文件形式）的外部库。


    当你运行代码时，会使用相同的启动板架构来派生一个进程进行卫星处理。与 Windows 上的 SQL Server 类似，此进程称为扩展主机，在 Linux
    上的进程输出如图 6-7 所示。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg](img/479130_1_En_6_Fig7_HTML.jpg)


    图 6-7 用于在 SQL Server on Linux 上运行 Java 的 `exthost` 卫星进程


    ## Linux 上的 PolyBase


    很难在书中将所有内容都以完全正确的顺序安排妥当。第 9 章专门介绍 SQL Server 2019 中的数据虚拟化和 PolyBase 概念。我在这里想简要提一下，因为这对
    SQL Server on Linux 来说是新的功能。


    PolyBase 在 SQL Server 2016 中作为 Hadoop 连接器引入，并在 SQL Server 2019 中通过用于 SQL Server、Oracle、Teradata
    和 MongoDB 的连接器得到了增强。


    正如你将在第 9 章读到的，PolyBase 使用了我们 Analytics Platform System（APS，以前称为并行数据仓库）的一些组件来执行横向扩展查询处理。这些在
    Windows 上作为服务存在，并在 SQL Server 2019 for Linux 上使用 SQLPAL。


    我们引入了 `mssql-server-polybase` 软件包来为 SQL Server on Linux 启用 PolyBase。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)
    阅读完整的部署步骤。


    用于 SQL Server on Linux 的 PolyBase 与用于 Windows 的 PolyBase 使用相同的 T-SQL 语句和概念，但 SQL
    Server 2019 有以下例外：


    *   SQL Server on Linux 的 PolyBase 不支持横向扩展组。


    *   不支持通用 ODBC 连接器。


    我们未来的计划是使 SQL Server on Linux 的 PolyBase 在 SQL Server 2019 之后实现功能完全对等。你将在第 9 章了解更多关于如何使用
    PolyBase 的信息。

    '
- fmt: '# 7. Inside SQL Server Containers


    ## Summary


    SQL Server on Linux is all about choice with compatibility. In SQL Server 2017,
    the core database engine for Linux was compatible with SQL Server on Windows.
    With SQL Server 2019, we have included enhancements for capabilities on the edge
    of the engine including `Replication`, `Change Data Capture`, `Distributed Transactions`,
    `Machine Learning Service` and `Language Extensions`, and `Polybase`.


    In addition, we have made enhancements to platform integration with Linux, supported
    the latest Linux releases, included enhanced I/O performance with durability,
    added persisted memory support, and clarified how `OpenLDAP` providers can be
    used to configure `Active Directory` authentication.


    The story for SQL Server on Linux is a strong one. I was invited by Red Hat in
    May of 2019 to not just attend the Red Hat Summit, but to present the story of
    SQL Server on Linux with several of my colleagues (and in one case copresent with
    Red Hat). I had also attended the Red Hat Summit in 2018, and, as the event ended
    in 2019, I no longer felt like Microsoft SQL Server “was the new kid on the block.”
    I felt we were now a mainstream part of the Linux ecosystem and community.


    ## Why SQL Server Containers?


    When I thought about how I would approach this chapter, I thought about only talking
    about what is new for containers for SQL Server 2019. While that alone would be
    worth a chapter, I decided to go bigger and be more inclusive to talk about the
    concept of containers, why it is important as a new way of deploying SQL server,
    and of course what are new capabilities for containers with SQL Server 2019. I
    could write an entire book on containers so you will not walk away from this chapter
    with an exhaustive knowledge on the subject. There are many great resources on
    containers (one I still find value is still [`www.docker.com`](http://www.docker.com)!)
    to supplement this chapter. My goal for this chapter is to give you enough information
    about containers to see how SQL Server containers work and why you should consider
    using them. I do promise you will leave this chapter understanding how to deploy,
    manage, and use SQL Server containers.


    If you feel like you know the concept of containers fairly well, you are more
    than welcome to skip down to the section called “What Is New for SQL Server 2019.”
    After that section is a series of examples you will find valuable to dive more
    into containers. I should say even if you know the basics of containers, you might
    consider starting at the section “How SQL Server Containers Work,” specifically
    at the subsection “The SQL Server Container” as I’ll disclose some internals of
    the unique aspects of SQL Server using containers.


    Containers solve a challenge that virtual machines cannot provide today. Virtual
    machines have been such an amazing technology to *abstract applications from underlying
    hardware*, but they require an entire operating system to be loaded and run for
    your application. Virtual machines do allow applications to run isolated from
    each other on the host and for SQL Server that has been a great solution for consolidation
    scenarios (even though SQL Server does allow for multiple instances to be hosted
    on the same computer). Containers provide the same concept of isolation, but they
    are far more lightweight than using a virtual machine. Containers are often considered
    an abstraction from the operating system.


    Here is an important concept to remember as I describe containers. Containers
    don’t replace virtual machines. Containers *complement* them. In fact, one of
    the most common environments to run containers is inside a virtual machine. Let
    me provide the definition of a container by first defining a *container* *image*.
    A container image is a binary file that describes a set of files organized in
    a file system and a `program` to run from those files. A *container* is an instance
    of running the container image program along with the file system from the image
    in an **isolated manner**.


    Consider the following diagram in Figure 7-1 I often use to talk about what are
    containers and why they can solve certain challenges for modern applications.


    ![Figure 7-1: The promise of SQL Server containers](images/479130_1_En_7_Chapter/479130_1_En_7_Fig1_HTML.jpg)


    Let me unpack this figure starting on the left side of the diagram:


    **Portable**


    Containers are portable because a container image can be run anywhere `docker`
    can be run which is almost everywhere including Windows, Linux, and macOS computers
    or in cloud systems supporting these operating systems or `Kubernetes` (you will
    learn more about `Kubernetes` in Chapter 8). You can take a SQL Server container
    image as a binary file and “pull it” into any of the systems, and it will operate
    the same.


    ### Note


    Calling all macOS users. Please take a look at the following blog post I wrote
    showing how you can now run SQL Server and tools with no Windows software required!
    [`https://bobsql.com/take-the-sql-server-mac-challenge/`](https://bobsql.com/take-the-sql-server-mac-challenge/)


    **Lightweight**


    A container is a running instance of a container image, and it in the end is just
    a process based on a program running in an isolated manner. That makes it far
    more lightweight than an entire virtual machine to host a program. The footprints
    of containers are also optimized because if you run more than one container from
    an image, a portion of the image files (called the `readable` layer which I’ll
    explain later in the chapter) is shared across the containers. This will reduce
    the footprint and resources required to run multiple SQL Server instances on a
    host or virtual machine.'
