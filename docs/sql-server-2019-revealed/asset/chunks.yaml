  trans: '

    ### 性能


    在我谈论容器的过程中，我听到的一个传言是，SQL Server 容器的性能可能不如未运行在容器中的 SQL Server 实例。我已经阐明，SQL Server
    容器本质上就是一个以隔离方式运行的程序，并且可以直接访问操作系统资源。因此，对于 SQL Server Linux 容器，你可以预期获得与未运行在容器中的
    SQL Server on Linux **完全相同**的性能。


    不过，如果你像我一样，你可能需要一些证据证明。因此，我使用了名为 `HammerDB` (`www.hammerdb.com`) 的开源基准测试工具，并采用基于
    TPC-H 衍生的分析性能测试运行了一项测试。我在同一台主机 Linux 虚拟机上，比较了运行在容器中的 SQL Server on Linux 与容器外的
    SQL Server on Linux 使用 `HammerDB` 测试的性能。通过这些部署方式，我发现性能**完全一致**。


    我鼓励你自己尝试一下。以下是我如何使用 `HammerDB` 进行此测试的详细信息：


    *   我在 Azure 中的一个 Windows 10 虚拟机上安装了 `HammerDB` 工具。

    *   我创建了一个使用 RHEL 7.4 的 Azure VM，大小为 DS13 v2（8 个 vCPU，56GB RAM）。

    *   我创建了一个 2TB 的高级 SSD 来托管 `HammerDB` 的数据库。我将此驱动器挂载到 Linux 上的一个目录中，并将其命名为 `/data`。这是我用来向
    Azure VM 中的 Linux 添加数据磁盘的指南 (`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/attach-disk-portal`)。

    *   在主机 Linux 虚拟机中安装了 SQL Server 2019 CTP 3.2。

    *   我预先创建了大小为 35GB、日志为 5GB 的 `tpch` 数据库。我使用了比例因子 10 和 16 个虚拟用户（Windows VM 客户端是一个
    8 核 VM）。


    #### 提示


    当使用最新版本的 `HammerDB` 时，请将驱动程序更改为“ODBC Driver 17 for SQL Server”，并使用聚集列存储索引。


    *   然后，我使用 16 个虚拟用户运行了 TPC-H 测试。在针对 SQL Server 容器和同一 VM 上安装的容器外的 SQL Server（我一次只运行其中之一）运行
    `HammerDB` 时，我都能够实现约 160,000 qph 的性能。


    我鼓励你自己运行这样的测试，或者对 SQL Server 容器进行任何其他性能测试。只要确保你在容器和容器外的 SQL Server 之间进行的是公平的比较。


    ### 安全性


    由于 SQL Server 容器只是以隔离程序形式运行的 SQL Server on Linux，因此 SQL Server on Linux 的所有安全能力和功能都适用于容器。这包括
    SQL Server 引擎的所有登录、安全对象和主体的安全功能。像动态数据屏蔽、行级安全性、透明数据加密（TDE）等功能都适用于容器。


    #### Active Directory 身份验证


    唯一例外是完整的安全功能集是 Active Directory（AD）身份验证。在构建 SQL Server 2019 的生命周期内，我们的意图是记录并支持容器的
    Active Directory 身份验证。它仍然可能出现在我们的最终版本中。但在我撰写本章时，我与我们 Linux 和容器的首席开发人员之一 Dylan
    Gray 讨论了这项支持。如果在我们发布 SQL Server 2019 时，AD 支持尚未被记录和可用，我预计它将在 SQL Server 2019 发布后不久推出。


    Dylan 和我讨论了记录在案的过程会是什么样子，它与为不使用容器的 SQL Server on Linux 设置 AD 身份验证非常相似，你可以在 (`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-authentication`)
    阅读。关键区别将是，需要通过一个 SQL Server 容器可以使用的卷中的 keytab 文件，将有关 Kerberos SPN 的信息传递给容器。我有几个客户告诉我，拥有
    AD 身份验证是在生产环境中使用 SQL Server 容器的关键要素，我们打算满足这一请求和要求。


    #### 非 root 容器


    自从我们发布 SQL Server 容器以来，容器程序都是在容器命名空间中的 root 用户上下文下运行的。即使一个 root 容器程序并不拥有对宿主机的完全
    root 权限，最佳实践仍然是不要以 root 身份运行容器程序。


    SQL Server 2019 将支持非 root 容器。事实上，当我与我们的容器首席开发人员之一 Madeline McDonald 谈论对非 root
    容器的支持时，她告诉我，我们的意图是在发布 SQL Server 2019 时，默认将所有 SQL Server 2019 容器作为非 root 容器发布，但
    SQL Server 2017 容器则“保持原样”。


    我询问 Madeline 将 SQL Server 2017 或 SQL Server 2019 CTP 容器作为非 root 运行的过程是什么，她给了我一个示例来尝试。


    尝试一下我在 `ch7_inside_sql_containers\nonroot` 文件夹中提供的脚本和文件。你将使用 `Dockerfile` 来构建一个自定义容器。`Dockerfile`
    如下所示：


    ```

    FROM mcr.microsoft.com/mssql/rhel/server:2019-latest

    RUN useradd -u 10001 -g root mssql

    RUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql

    USER mssql

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    注意 `RUN` 命令，它将为 `mssql` 添加一个用户和组，并为 `mssql` 组预先创建 SQL Server 目录以设置权限。`Dockerfile`
    的 `USER` 命令指示在哪个用户上下文下运行容器程序。其余部分与当今运行 SQL Server 容器相同。使用 `docker build` 构建 Docker
    镜像，然后使用我提供的脚本来运行容器。


    ### 高可用性


    SQL Server 容器支持基本的备份和还原，甚至日志传送也可以工作。我已经向你展示了使用 SQL Server 复制的一个例子，这对某些客户来说可以是一种高可用解决方案。


    尽管在容器之间建立 Always On 可用性组是可行的，但容器首选的高可用方法是使用 `Kubernetes`。我将在第 8 章讨论如何使用 `Kubernetes`
    实现 SQL Server 的高可用性。

    '
- fmt: '# Resource Control


    By default, SQL Server containers (as do all containers) have access to all CPU
    and memory resources on the host server. Docker provides a way to control and
    govern access to those resources for any container. For example, the `docker run`
    command provides these options:


    `-m` – Controls the amount of memory the container can access.


    `-cpuset-cpus` – Controls which CPU the threads within the container can run on.
    Be careful with this option. SQL Server will not restrict the number of schedulers
    based on this option. However, docker (using cgroups) will enforce which CPUs
    all SQL Server threads run on. If you do this option, I recommend you combine
    with this SQL Server affinity using `ALTER SERVER CONFIGURATION`.


    You can read more about resource usage for docker containers at [`https://docs.docker.com/config/containers/resource_constraints/`](https://docs.docker.com/config/containers/resource_constraints/).


    While these options do work, for SQL Server I recommend you use the built-in capabilities
    of SQL Server configuration to control memory and CPU resources.


    For example, consider these options at your disposal:


    `memorylimitmb` – This controls the amount of physical memory exposed to SQL Server
    on Linux to use. You can read more about this option at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit).


    `"max server memory"` – This `sp_configure` option is very familiar to SQL Server
    users and controls the amount of memory used by the SQL Server engine within the
    `memorylimitmb` space.


    `ALTER SERVER CONFIGURATION` – This T-SQL command allows you to affinitize which
    NUMA nodes and/or CPUs SQL Server will run on. You can read more about this option
    at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql).


    `Resource Governor` – Resource governor can help control CPU, memory, and I/O
    resources especially at the application or workload level. You can read more about
    resource governor at [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor).


    In fairness, not everything that runs in `sqlservr` on Linux (using the SQLPAL)
    is controlled by these T-SQL options. Processing by SQL Agent, DTC, Polybase,
    or other code outside the SQL Engine runs in the SQLPAL may need some resource
    control when running as a container, and the docker options listed in this section
    could be useful should you need them. However, the majority of CPU and memory
    consumption comes from the database engine, and SQL provides the options for you
    to have the desired control.


    # Server or Database Configuration


    I’ve listed in this section several SQL Server configuration options that you
    may want to consider. There are many others provided by the `mssql-conf` script,
    T-SQL `sp_configure`, and `ALTER SERVER CONFIGURATION`. In addition, databases
    have many other configuration options when you create the database or through
    `ALTER DATABASE`.


    While a running SQL Server container can be modified using T-SQL statements, you
    should think carefully when using containers whether that is the right strategy.
    For example, if you applied an `sp_configure` change to a container that requires
    a restart, you will have to restart the container for the change to take effect.
    Furthermore, you will need to make sure you use a persisted volume for system
    databases, so your changes are not lost.


    Another option is to build a customized image (much like I showed you with the
    container example in this chapter for replication) running any configuration scripts
    you need after SQL Server starts.


    For example, let’s say you want to ensure your SQL Server enforces a specific
    `max degree of parallelism` value for any SQL Server container in your environment.
    One way to do this is to build a custom container image with a script that sets
    the desired `maxdop` value. You can even tag and name this, so you know what the
    options you used for a certain SQL container. Now these scripts to build the container
    along with the T-SQL scripts can become part of your change control and CI/CD
    lifecycle.


    The only downside to this approach is for any configuration change that does not
    require a restart of SQL Server for the instance of your database. For these scenarios,
    you may still build a specific container image with the new desired configuration
    changes but also directly apply your configuration changes to a running SQL Server.


    Another interesting problem is applying configuration changes that do require
    a restart (there are less of these than you may think). However, if you do have
    this scenario, you will have to restart the container immediately after starting
    it up with your applied configuration changes.


    For any `mssql-conf` changes, you should use environment variables that match
    the setting you want as seen with `docker run` examples in this chapter. A great
    example of using this option for DTC can be found at [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc).
    If, for some reason, there is an `mssql-conf` setting where an equivalent environment
    variable setting does not exist, you could create a customized image with a precreated
    `mssql.conf` file. You would use a Dockerfile like the following:


    ```

    FROM microsoft/mssql-server-linux:latest

    COPY ./mssql.conf /

    RUN mkdir /var/opt/mssql

    RUN mv ./mssql.conf /var/opt/mssql

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    where your `mssql.conf` had all the needed config values. You can learn about
    the protocol format of this file at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format).


    # Using Other Packages


    I’ve told you the SQL Server container image comes with the database engine, SQL
    Server Agent, and includes capabilities such as Replication and DTC. SQL Server
    on Linux was built on the concept of packages. Features like Polybase don’t come
    with the standard SQL Server package and are not in the SQL Server container image.


    We have built a series of examples for you to learn how to build your own customized
    image based on the SQL Server image adding in the packages you would like in your
    container. You can find these examples at [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples).'
