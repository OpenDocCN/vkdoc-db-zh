    客户端使用哪个端口与 MSDTC Linux 服务通信，该服务随后与 SQL Server 集成。MSDTC 服务的端口可以是随机生成的，但您需要对此端口的防火墙访问权限，因此您应该使用
    `mssql-conf` 选项 `distributedtransaction.servertcpport` 来配置它。


    完整的配置体验可在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)
    获取。完成这些配置后，您现在就可以跨 SQL Server 链接服务器启动 `BEGIN DISTRIBUTED TRANSACTION` 了。事实上，我有一个使用容器进行尝试的示例，位于
    [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)。

    '
- fmt: '## Active Directory with OpenLDAP


    为了确保 Linux 上的 SQL Server 具备企业级可信度，我们必须确保支持 Active Directory (AD) 认证。与 Linux 上的
    SQL Server 其他方面类似，其配置体验与 Windows 不同，但功能体验和兼容性是相同的。


    我们在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview)
    文档中概述了在 Linux 上设置此功能的过程，而我在我著作 *Pro SQL Server on Linux* 的[第 7 章](#479130_1_En_7_Chapter.xhtml)中讨论了其架构。


    为 SQL Server on Linux 配置 AD 支持的步骤之一，是让托管 SQL Server 的 Linux 服务器加入 Active Directory
    域。当我们发布 SQL Server 2017 on Linux 时，我们记录了如何使用名为 `SSSD` 的 Linux 包和名为 `realmd` 的程序来完成此操作。我们收到了客户的反馈，他们希望有替代方法加入域——具体来说，是更简单的体验，使用像
    PBIS、VAS 或 Centrify 这样的第三方包。事实证明，SQL Server 并不阻止使用这些包；我们只需要进行一些微小的配置更改就能使它们工作。我们在
    [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain)
    文档中概述并记录了这些方法。Tejas Shah 和团队花了一些时间清理了所有这些选项的文档。需要了解的是，这并非 SQL Server 2019 的新增强功能，因为它同样适用于
    SQL Server 2017。然而，这个概念足够新，我想在本书中特别指出。


    ## SQL Server Machine Learning Services and Extensibility on Linux


    正如我在[第 5 章](#479130_1_En_5_Chapter.xhtml)详细描述的，SQL Server Machine Learning Services
    是**革命性的**——它允许您结合 R 和 Python 的强大功能，与 SQL Server 集成，以构建可扩展且强大的机器学习模型和应用程序。


    虽然这对于 Windows 上的 SQL Server 来说一直是个很棒的功能，但我们需要通过将此技术引入 Linux 来完善兼容性故事。此外，当我们引入新的可扩展性框架和语言扩展（包括
    Java）时，我们也需要确保其同样适用于 Linux。


    ### Deployment of SQL Server ML Services on Linux


    与 Windows 上的 SQL Server 类似，对于 Linux 上的 SQL Server Machine Learning，我们会帮助您安装必要的包来部署
    R 和 Python 脚本。


    我们为您提供了部署 SQL Server ML Services 的选择——`minimal`、`full` 或 `combo`。它们的功能如下：


    `full` – 包含 R 或 Python 的所有包，并包括可用于机器学习的预训练模型。此包名为 `mssql-mlservices-mlm-r` 或 `mssql-mlservices-mlm-py`。当您使用此选项时，所有依赖包（如
    R Open）也会被安装。


    `minimal` – 包含 R 或 Python 的所有包，但不包含预训练模型。此包名为 `mssql-mlservices-packages-r` 或
    `mssql-mlservices-packages-py`。所有依赖包（如 R Open）也会被安装。


    `combo` – 一步安装 SQL Server 2019（数据库引擎）和 SQL Server ML Services。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#install-all`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523install-all)
    阅读如何操作。


    当我为 R 安装完整版 SQL Server ML Services 时，安装的包如图[6-3](#479130_1_En_6_Chapter.xhtml#Fig3)所示。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg)


    图 6-3


    为 R 安装完整的 SQL Server ML Services


    ### Tip


    如果您正在寻找一种通过 SSH 连接到 Linux 上 SQL Server 的好方法，可以使用 Azure Data Studio 中的 Terminal
    选项，正如您将在本章示例中看到的。


    请注意，安装的包之一是 `mssql-server-extensibility`，我将在本章后面描述，它是语言扩展的可扩展性框架所必需的（同一个框架既用于
    SQL Server ML Services，也用于语言扩展）。


    部署完成后，您需要执行一些安装后步骤，例如接受 R 或 Python 的 EULA。请按照 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#post-install-config-required`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523post-install-config-required)
    文档中的步骤操作。


    我还建议，就像在 Windows 上一样，使用 “hello world” 示例来验证安装是否成功。R 的示例如下 T-SQL 语句：


    ```

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    也有可能您、数据科学家或数据工程师需要额外的 R 或 Python 库用于您的应用程序。请使用 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#add-more-rpython-packages`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523add-more-rpython-packages)
    文档中的以下指南了解如何添加此代码。


    ### Note


    如果您曾在 SQL Server 2019 CTP 版本中使用此功能，请务必在尝试使用 SQL Server 2019 RTM 功能之前删除所有那些包。'
  raw: '## Active Directory with OpenLDAP


    In order to have enterprise credibility for SQL Server on Linux, we had to make
    sure we supported Active Directory (AD) authentication. Like other aspects of
    SQL Server on Linux, the *configuration experience is different* than on Windows,
    but the *experience and compatibility are the same*.


    We document an overview of the process to set this up on Linux at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview)
    , and I talk about the architecture of this in Chapter [7](#479130_1_En_7_Chapter.xhtml)
    of my book *Pro SQL Server on Linux*.


    One of the steps to configure AD support for SQL Server on Linux is to have the
    Linux server hosting SQL Server join an Active Directory domain. And when we released
    SQL Server 2017 on Linux, we document how to do this using a Linux package called
    **SSSD** and a program called **realmd**. We heard feedback from customers that
    they wanted alternate methods to join the domain – specifically, a simpler experience,
    with third-party packages like PBIS, VAS, or Centrify. Turns out SQL Server doesn’t
    do anything to prevent using these packages; we just needed to make a few minor
    configuration changes to make them work. We outline and document these at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain)
    . Tejas Shah and the team spent some time cleaning up all the documentation for
    these options. It is important to know this is not a new enhancement for SQL Server
    2019, as this will also work for SQL Server 2017. However, the concept is new
    enough I wanted to call it out in this book.


    ## SQL Server Machine Learning Services and Extensibility on Linux


    As I described in detail in Chapter [5](#479130_1_En_5_Chapter.xhtml), SQL Server
    Machine Learning Services is *radical* – it allows you to combine the power of
    R and Python, integrated with SQL Server, to build scalable and powerful Machine
    Learning models and applications.


    While this has been a great story for SQL Server on Windows, we needed to complete
    the compatibility story by bringing this technology to Linux. In addition, as
    we introduced the new extensibility framework and language extensions, including
    Java, we needed to ensure this also works with Linux.


    ### Deployment of SQL Server ML Services on Linux


    Like SQL Server on Windows, for SQL Server Machine Learning on Linux, we help
    you install the necessary packages to deploy R and Python scripts with SQL Server.


    We give you choices on how to deploy SQL Server ML Services – minimal, full, or
    combo. These function as follows:


    **full** – All the packages for R or Python and includes pretrained models to
    use for Machine Learning. This package is called **mssql-mlservices-mlm-r** or
    **mssql-mlservices-mlm-py**. All dependent packages are also installed (such as
    R Open) when you use this option.


    **minimal** – All the packages for R or Python, but no pretrained models. This
    package is called **mssql-mlservices-packages-r** or **mssql-mlservices-packages-py**
    . All dependent packages are also installed (such as R Open).


    **combo** – Install SQL Server 2019 (the database engine) with SQL Server ML Services
    in one step. You can read about how to do this at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#install-all`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523install-all)
    .


    When I installed the full version for SQL Server ML Services for R, these packages
    were installed as seen in Figure [6-3](#479130_1_En_6_Chapter.xhtml#Fig3).


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Installation of full SQL Server ML Services for R


    ### Tip


    If you are looking for a great way to use ssh against your SQL Server on Linux,
    you can use the Terminal option in Azure Data Studio, as you will see in examples
    in this chapter.


    Note that one of the packages installed is **mssql-server-extensibility**, which
    I’ll describe later in this chapter, and is required for the extensibility framework
    for language extensions (the same framework is used for both SQL Server ML Services
    and language extensions).


    Once you have deployed, you have some post-install steps to perform, such as accepting
    the EULAs for R or Python. Follow these steps in the documentation at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#post-install-config-required`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523post-install-config-required)
    .


    I also recommend, just like on Windows, you use the “hello world” example to verify
    the installation was successful. The example for R looks like this T-SQL statement:


    ```

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    It is also possible you, data scientists, or data engineers need additional R
    or Python libraries to use for your applications. Use the following guidance in
    the documentation on how to add this code at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#add-more-rpython-packages`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523add-more-rpython-packages)
    .


    ### Note


    If you have used this feature with SQL Server 2019 CTP builds, be sure to remove
    all of those packages before trying to use the SQL Server 2019 RTM feature.'
