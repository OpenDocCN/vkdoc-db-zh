- fmt: 'But you should try this yourself to see it in action. Let’s look at an example
    of how memory-optimized tempdb metadata can improve the concurrency of applications
    using temporary tables. All the scripts for this example can be found in the `ch2_intelligent_performance\inmem\tempdb`
    directory. This example is a little more complicated to run and requires coordination
    or simulation of concurrent users. Therefore, you will need the free stress tool
    called `ostress`, which can be downloaded at [`www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511).
    This tool currently requires a Windows client computer. This example will still
    work with a SQL Server on Linux installation; you will just need a Windows client
    to drive a concurrent user workload with `ostress`.


    In addition, I set up my SQL Server on a virtual machine with eight logical CPUs.
    When I ran setup for SQL Server, it automatically created eight tempdb data files.
    I recommend on your system you make sure you have at least eight tempdb data files
    if you have eight or more logical CPUs. Learn more about how to do this with this
    technical support article: [`https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d`](https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d).


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig27_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig27_HTML.jpg)

    Figure 2-27: Page latch waits for system tables in tempdb


    ## 1. 禁用内存优化的 tempdb 元数据


    Run the script `disableopttempdb.cmd` to disable memory-optimized tempdb metadata.
    It is off by default, but run this script in case you had this enabled at one
    point. You need to run this script *on the server where SQL Server is installed*
    (or use another technique to restart SQL Server remotely). This script assumes
    a `sysadmin` login and a server name. You can modify this to use integrated authentication
    by changing `-Usa` to `-E` and don’t forget to replace the name of your server
    for the `-S` parameter:


    ```

    sqlcmd -Usa -idisableopttempdb.sql -Sbwsql2019

    net stop mssqlserver

    net start mssqlserver

    ```


    As you can see, this script instructs Windows Server to restart the SQL Service.
    You can modify your own script on Linux to use a command like `sudo systemctl
    restart mssql-server` to restart SQL Server.


    `disableopttempdb.sql` contains the following T-SQL statement:


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF

    GO

    ```


    ## 2. 创建测试数据库和存储过程


    Run the T-SQL script `tempstress_ddl.sql` to create a database and stored procedure
    that does a simple create of a temporary table:


    ```

    DROP DATABASE IF EXISTS DallasMavericks

    GO

    CREATE DATABASE DallasMavericks

    GO

    USE DallasMavericks

    GO

    CREATE OR ALTER PROCEDURE letsgomavs

    AS

    CREATE TABLE #gomavs (col1 INT)

    GO

    ```


    You can see that the stored procedure doesn’t really do anything with the temporary
    table. This is to show the minimal amount of workload that can pressure concurrency
    of temporary table metadata (since any exit of the stored procedure automatically
    drops the temporary table).


    ## 3. 运行并发工作负载


    You are now ready to run a concurrent tempdb workload using `ostress`. Use the
    script `tempstress.cmd` to execute this `ostress` workload:


    ```

    ostress -Usa -Q"exec letsgomavs" -n50 -r10000 -dDallasMavericks -Sbwsql2019

    ```


    You may need to adjust a few of these parameters in the script including using
    `-E` instead of `-Usa` for integrated authentication on Windows. You may also
    want to change the name of the server with `-S`. The `-n50` parameter is the number
    of users to run the workload, and `-r10000` is the number of iterations for each
    user. Notice the use of `-Q` to run the stored procedure directly, a tip I learned
    while working on early versions of this demo. Using the `-Q` option for `ostress`
    to directly run a query is faster than specifying a script with `-i`.


    You will get prompted for the password if you use `-Usa`, and then it is off to
    the races. Depending on how fast your computer is, this workload will take a few
    minutes.


    ## 4. 监控页闩锁等待


    While this is running, in a new connection, open up the T-SQL script `pageinfo.sql`:


    ```

    USE tempdb

    GO

    SELECT object_name(page_info.object_id), page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info

    GO

    ```


    This script uses new functionality in SQL Server 2019 to *crack* page information
    from a *resource* as found in `sys.dm_exec_requests` and to dump out in columnar
    format the fields of a page header.


    Why would you want to run this? This is because when you experience latch waits
    for tempdb, you are provided a resource in the form of a `<dbid>:<fileid>:<pageid>`.
    Prior to this function being exposed, you would need to manually use `DBCC PAGE`
    to find out what object the page belongs to for the latch wait, a command that
    is not officially supported. This technique now gives you that official support
    to figure out the page in a page latch wait scenario.


    Your results while the query is running in the previous step should look similar
    to Figure [2-27](#479130_1_En_2_Chapter.xhtml#Fig27).


    As described earlier, `sysschobjs` is a system table and a common contention point
    as temporary tables are being created and dropped.


    ## 5. 启用内存优化的 tempdb 元数据


    Now let’s enable memory-optimized tempdb metadata. Run the script `optimizetempdb.cmd`
    on the server where SQL Server is installed. This script runs the following so
    you can use alternative methods to enable the feature and restart SQL Server:


    ```

    sqlcmd -Usa -ioptimizetempdb.sql -Sbwsql2019

    net stop mssqlserver

    net start mssqlserver

    ```


    `optimizetempdb.sql` contains the following T-SQL statement:


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON

    GO

    ```


    ## 6. 验证功能已启用


    Confirm that memory-optimized tempdb metadata is enabled by examining the SQL
    Server `ERRORLOG` file. You should see a statement in the `ERRORLOG` like this:


    `Tempdb started with memory-optimized metadata`.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig28_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig28_HTML.jpg)

    Figure 2-28: Tempdb system tables as memory optimized


    ## 7. 再次运行工作负载并对比结果


    Now run the workload again using `tempstress.cmd.` This time it will only take
    around 30+ seconds to run the same workload, with no changes to the application.


    Run the script `pageinfo.sql` again to see if any page latch waits are occurring.
    Your results should be 0 rows!


    While this is running, in another session, run the T-SQL script `find_memoptimized_tables.sql.`
    Your results should look something like Figure [2-28](#479130_1_En_2_Chapter.xhtml#Fig28).


    You can see all the system tables that are memory optimized (your result could
    even include more as this feature is being enhanced). Notice the heavy changes
    to `sysschobjs`, but that is not the only system table involved.


    ## 8. 检查内存消耗


    You may wonder how much extra memory is consumed by using this feature. While
    you still have this environment running, run a query against the DMV `sys.dm_os_memory_clerks`.
    You will see a row where `type = MEMORYCLERK_XTP` and `name = DB_ID_2`. The `pages_kb`
    column is roughly the amount of memory memory-optimized tempdb metadata consumes
    which, based on this example, is around 200Mb.'
