  trans: "### SQL Server 容器\n\nSQL Server 容器镜像包含了 SQL Server 引擎、SQL Server Agent、引擎附带的所有功能（如复制）以及\
    \ SQL Server 命令行工具（`sqlcmd` 和 `bcp`）所需的必要文件。当你运行一个 SQL Server 容器时，`SQL Server`\
    \ 已经预先安装好了！换句话说，当你拉取并运行一个 SQL Server 容器后，就可以直接使用它了。这是使用 SQL Server 容器的主要优势之一。一旦启动容器，就无需再安装\
    \ SQL Server。\n\n我在前一节提到过，镜像是使用一个名为 Dockerfile 的文件通过 `docker build` 命令构建的。为了理解\
    \ SQL Server 容器是如何预先安装的，这里大致列出了 SQL Server Dockerfile 中的命令：\n\n```\nFROM \nLABEL\
    \ \nEXPOSE 1433\nCOPY \nRUN ./install.sh\nCMD [\"/opt/mssql/bin/sqlservr”]\n```\n\
    \n`FROM` 命令指定了 SQL Server 容器镜像所基于的基础操作系统镜像。容器的一大优点就是能够基于其他镜像构建新镜像，从而形成镜像的分层效果。实际上，本章稍后我会展示如何基于\
    \ SQL Server 镜像（该镜像又基于基础操作系统镜像）构建你自己的镜像。\n\n`EXPOSE` 命令允许 SQL Server 容器使程序能够连接到容器内部的\
    \ `1433` 端口。这一点很重要，因为默认情况下容器是隔离的。你会看到，这个端口通常会被映射到主机上的另一个端口，从而允许多个 SQL Server 容器在同一主机上运行（否则通常会失败，因为两个程序不能监听同一个端口）。\n\
    \n`COPY` 和 `RUN` 命令只是构建过程的一部分，用于将所有 SQL Server 二进制文件复制到容器镜像的文件系统中，并安装任何软件依赖项。\n\
    \n到目前为止，SQL Server Dockerfile 中的这些命令都是构建容器镜像的一部分。当执行 `docker build` 命令时，这些语句中的每一个都会被用来构建镜像。`CMD`\
    \ 语句向 docker 指明容器启动时要运行的程序名称，即 `sqlservr`。这意味着 SQL Server 容器的运行方式不像一个“服务”（例如 Linux\
    \ 中的 `systemd` 单元服务）。当我向一些人描述这一点时，他们曾问：“那 SQL Server 是如何保持运行的？”原来，SQL Server 程序（这与在\
    \ Windows 上相同）被设计为一个守护程序，这意味着它会在后台运行，直到收到停止信号。\n\n考虑到这一点，让我们看看如何运行一个 SQL Server\
    \ 容器，然后讨论一下我们是如何在内部“预先安装” SQL Server 的。\n\n### 运行 SQL Server 容器\n\n使用 `docker\
    \ run` 命令运行 SQL Server 容器的基本语法如下（注意：在 Linux 上，通常需要在命令前加 `sudo`）：\n\n```\ndocker\
    \ run\n-e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n-p 1401:1433\n\
    -v sqlvolume:/var/opt/mssql\n--hostname sql2019latest\n--name sql2019latest\n\
    -d\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\n让我解释一下每个参数的含义：\n\n\
    #### 环境变量 (`-e`)\n\n```\n-e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n\
    ```\n\n`-e` 参数指定了容器执行所需的环境变量。对于 SQL Server，你至少需要接受 EULA 协议和设置 `sa` 密码。还可以使用其他环境变量来指定\
    \ SQL Server 版本或启用 SQL Server Agent。任何 SQL Server 支持的环境变量都可以用来在启动容器时预配置 SQL Server\
    \ 的安装。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables)\
    \ 获取完整的环境变量列表。\n\n#### 端口映射 (`-p`)\n\n```\n-p 1401:1433\n```\n\n如果你只打算在主机上运行一个\
    \ SQL Server 容器（并且假设主机上没有安装 SQL Server），则不需要此参数。如果你有多个 SQL Server 实例，则需要将 `1433`\
    \ 端口映射到不同的端口。现在，任何想要连接此 SQL Server 容器的应用程序都需要使用端口 `1401`，而不是默认端口。\n\n#### 卷映射\
    \ (`-v`)\n\n```\n-v sqlvolume:/var/opt/mssql\n```\n\n此参数指定用于映射到存储数据库的 SQL Server\
    \ 目录的卷。这不是必需的，但如果你希望你的数据库独立于容器的生命周期而持久存在，就需要使用一个卷。对于任何生产环境的 SQL Server 容器，你都应该使用一个卷。\n\
    \n#### 主机名 (`--hostname`)\n\n```\n--hostname sql2019latest\n```\n\n此参数也不是必需的，但非常方便。因为你指定的主机名将成为\
    \ SQL Server 内部的 `@@SERVERNAME`。\n\n#### 容器名称 (`--name`)\n\n```\n--name sql2019latest\n\
    ```\n\n此参数也不是必需的，但便于你管理容器。通过使用一个名称，你现在可以轻松地通过名称来识别和管理容器。例如，启动此容器后，你可以通过运行 `docker\
    \ stop sql2019latest` 来停止它。\n\n#### 分离模式 (`-d`)\n\n```\n-d\n```\n\n此参数表示在后台运行容器。你通常希望对\
    \ SQL Server 容器使用此参数。然而，如果你无法启动 SQL Server 容器，一个很好的调试技巧是移除此参数。这是因为当 `sqlservr`\
    \ 程序从命令行运行时，默认行为是将 `ERRORLOG` 的内容转储到 `stdout`，这会在你运行容器时显示出来。你也可以使用 `docker logs`\
    \ 命令来转储 SQL Server 容器的 `ERRORLOG`。\n\n#### 镜像标签\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\n这是你想要运行的容器镜像的标签。我将在下一节展示如何确定特定 SQL Server 容器应使用的标签。如果标记的镜像在本地不存在，`docker`\
    \ 会先拉取该镜像，然后运行容器。\n\n### SQL Server 容器启动\n\nSQL Server 容器工作原理的一个有趣方面是它的启动序列。当\
    \ `sqlservr` 程序在容器中运行时，`/var/opt/mssql` 目录并不存在。然而，`sqlservr` 程序具备智能，能够在启动时创建此目录，并从容器镜像的已安装文件中提取系统数据库。此外，`sqlservr`\
    \ 知道如何将环境变量用作启动参数，以绑定 EULA 协议、`sa` 密码和其他环境变量。换句话说，`sqlservr` 程序懂得如何安装它自己！\n\n\
    在深入探讨一些示例之前，让我们先看看 SQL Server 2019 中与容器相关的新特性。"
- fmt: "## What Is New for SQL Server 2019\n\nNow that you have a perspective on how\
    \ containers work and how they work with SQL Server, let’s review the new capabilities\
    \ with containers for SQL Server 2019:\n\n*   We now provide SQL container images\
    \ with a base OS image of Red Hat Enterprise Linux (RHEL) for SQL Server 2019.\
    \ See the next point here on how to find out what these images look like. I’ll\
    \ use mostly RHEL images in this chapter for the examples.\n\n*   SQL Server 2019\
    \ containers by default run as non-root allowing SQL Server to be officially supported\
    \ on Red Hat OpenShift.\n\n*   All SQL Server container images are now stored\
    \ in the Microsoft Container Registry at `mcr.microsoft.com`.\n\n    When we released\
    \ SQL Server 2017 and container images, we published our images in the Docker\
    \ Hub repository at [`https://hub.docker.com/_/microsoft-mssql-server`](https://hub.docker.com/_/microsoft-mssql-server).\
    \ Since that time within Microsoft, we established a standard that official Microsoft\
    \ container images would now be published in the Microsoft Container Registry\
    \ at `mcr.microsoft.com`. We continue to “syndicate” or list our images on the\
    \ Docker Hub, but the images themselves are found only on `mcr.microsoft.com`.\n\
    \n    Let me stop here and explain about the naming convention for container images:\n\
    \n    The SQL container images will follow this naming convention:\n\n    `mcr.microsoft.com/mssql/server:<tag>`\
    \ – Ubuntu images\n\n    `mcr.microsoft.com/mssql/rhel/server:<tag>` – Red Hat\
    \ Enterprise Linux images\n\n    ### Note\n\n    While we don’t currently package\
    \ container images for SUSE, you can build one yourself using this example provided\
    \ by Vin Yu from Microsoft at [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES).\n\
    \nThe `<tag>` syntax is based on the specific build you are looking for or the\
    \ “latest” build.\n\nFor example, to get the latest build container image for\
    \ SQL Server 2017 for Ubuntu, you would use this container image name:\n\n```\n\
    mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n```\n\nor for SQL 2017 CU10\
    \ for Ubuntu, you would use\n\n```\nmcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
    ```\n\n### Note\n\nYou can also use a tag of `2017-latest` for the latest Ubuntu\
    \ image, but that is not recommended. That was the original tags we used when\
    \ we first shipped SQL 2017. It is best to explicitly state the base image by\
    \ name.\n\nWe did not ship any RHEL container images for SQL Server 2017. They\
    \ are all listed for SQL Server 2019. For example, to get the latest SQL Server\
    \ 2019 RHEL container image, you would use:\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\nIf you pull a SQL container image and are not sure what version of SQL\
    \ Server the image was built for, use the `docker inspect` command. Run the following\
    \ command first:\n\n```\ndocker images\n```\n\nThis will list out the images that\
    \ are stored locally on your server. The `TAG` column may give you a clue on the\
    \ version of SQL Server. But if the `TAG` has a value of something like `2017-latest-ubuntu`,\
    \ you wouldn’t know what CU build of SQL Server 2017 this is without running a\
    \ container based on this image. But if you run a command like\n\n```\ndocker\
    \ inspect\n```\n\nwhere `IMAGE ID` is the `GUID` from the `docker images` command.\n\
    \nthe result is a `JSON` file that describes the image. This can be very useful\
    \ for any container image. If you search the `JSON` text for a section called\
    \ `Labels`, you will get a result that looks like the following:\n\n```\n\"Labels\"\
    : {\n\"com.microsoft.product\": \"Microsoft SQL Server\",\n\"com.microsoft.version\"\
    : \"14.0.3223.3\",\n\"vendor\": \"Microsoft\"\n```\n\nThe version number is the\
    \ build of SQL Server. You can do a simple search on the Internet and find the\
    \ version number matched to a SQL Server build. In this example, `14.0.3223.3`\
    \ matches SQL Server 2017 CU16.\n\nThis is nice of course, but how can you know\
    \ the entire possible list of container images from `mcr.microsoft.com`? This\
    \ tip which I’ve seen provided by my colleague Umachandar Jayachandran (he goes\
    \ by UC) will save you a great deal of time.\n\nUse this URL to find a list of\
    \ all Ubuntu images:\n\n[`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list)\n\
    \nFor RHEL images, you can use\n\n[`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)\n\
    \n### Tip\n\nIf you install the Docker extension with Azure Data Studio or Visual\
    \ Studio Code, you can use the extension to browse `mcr.microsoft.com` including\
    \ the `mssql/server` images. This blog post talks about the extension at [`https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/`](https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/).\n\
    \n### Non-root Containers\n\n*   We now support non-root containers with SQL Server\
    \ 2019. Up to this time, all containers for SQL Server are run in the context\
    \ of the root user in Linux. While Containers run in isolation, some in the industry\
    \ don’t think running as root is a secure model and prevents SQL Server from being\
    \ officially supported in environment such as RedHat OpenShift.\n\n### Active\
    \ Directory Authentication\n\n*   Up to this point, SQL Server containers only\
    \ support SQL Server authentication. It is our intention to support Active Directory\
    \ authentication with containers in SQL Server 2019. At the time I wrote this\
    \ chapter, it was somewhat up in the air on whether this would be officially supported\
    \ for the SQL Server 2019 release. I’ll talk more about this concept later in\
    \ the chapter in the section “Deploying SQL Containers in Production.”\n\n###\
    \ Windows Container Images\n\n*   As we marched close to releasing SQL Server\
    \ 2019, we announced preview support for SQL Server containers based on a base\
    \ image of Windows. I call this SQL Server container Windows images. I have a\
    \ separate section at the end of this chapter discussing this topic.\n\nAs with\
    \ many topics related to computer technology, you can only read so much about\
    \ how something works. Only by using something can you truly put together all\
    \ the pieces of the puzzle. Let’s go through a series of topics about SQL Server\
    \ containers by using examples."
  raw: "## What Is New for SQL Server 2019\n\nNow that you have a perspective on how\
    \ containers work and how they work with SQL Server, let’s review the new capabilities\
    \ with containers for SQL Server 2019:\n\n*   We now provide SQL container images\
    \ with a **base OS image of Red Hat Enterprise Linux** **(RHEL)** for SQL Server\
    \ 2019\\. See the next point here on how to find out what these images look like.\
    \ I’ll use mostly RHEL images in this chapter for the examples.\n\n*   SQL Server\
    \ 2019 containers by default run as non-root allowing SQL Server to be officially\
    \ supported on Red Hat OpenShift.\n\n*   All SQL Server container images are now\
    \ stored in the Microsoft Container Registry at **mcr.microsoft.com**.\n\n   \
    \ When we released SQL Server 2017 and container images, we published our images\
    \ in the Docker Hub repository at [`https://hub.docker.com/_/microsoft-mssql-server`](https://hub.docker.com/_/microsoft-mssql-server)\
    \ . Since that time within Microsoft, we established a standard that official\
    \ Microsoft container images would now be published in the Microsoft Container\
    \ Registry at mcr.microsoft.com. We continue to “syndicate” or list our images\
    \ on the Docker Hub, but the images themselves are found only on mcr.microsoft.com.\n\
    \n    Let me stop here and explain about the naming convention for container images:\n\
    \n    The SQL container images will follow this naming convention:\n\n    **mcr.microsoft.com/mssql/server:<tag>** –\
    \ Ubuntu images\n\n    **mcr.microsoft.com/mssql/rhel/server:<tag>** – Red Hat\
    \ Enterprise Linux images\n\n    ### Note\n\n    While we don’t currently package\
    \ container images for SUSE, you can build one yourself using this example provided\
    \ by Vin Yu from Microsoft at [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES)\
    \ .\n\nThe <tag> syntax is based on the specific build you are looking for or\
    \ the “latest” build.\n\nFor example, to get the latest build container image\
    \ for SQL Server 2017 for Ubuntu, you would use this container image name:\n\n\
    ```\nmcr.microsoft.com/mssql/server:2017-latest-ubuntu\n```\n\nor for SQL 2017\
    \ CU10 for Ubuntu, you would use\n\n```\nmcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
    ```\n\n### Note\n\nYou can also use a tag of 2017-latest for the latest Ubuntu\
    \ image, but that is not recommended. That was the original tags we used when\
    \ we first shipped SQL 2017\\. It is best to explicitly state the base image by\
    \ name.\n\nWe did not ship any RHEL container images for SQL Server 2017\\. They\
    \ are all listed for SQL Server 2019\\. For example, to get the latest SQL Server\
    \ 2019 RHEL container image, you would use:\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\nIf you pull a SQL container image and are not sure what version of SQL\
    \ Server the image was built for, use the **docker inspect** command. Run the\
    \ following command first:\n\n```\ndocker images\n```\n\nThis will list out the\
    \ images that are stored locally on your server. The TAG column may give you a\
    \ clue on the version of SQL Server. But if the TAG has a value of something like\
    \ **2017-latest-ubuntu**, you wouldn’t know what CU build of SQL Server 2017 this\
    \ is without running a container based on this image. But if you run a command\
    \ like\n\n```\ndocker inspect \n```\n\nwhere IMAGE ID is the GUID from the docker\
    \ images command.\n\nthe result is a JSON file that describes the image. This\
    \ can be very useful for any container image. If you search the JSON text for\
    \ a section called Labels, you will get a result that looks like the following:\n\
    \n```\n\"Labels\": {\n\"com.microsoft.product\": \"Microsoft SQL Server\",\n\"\
    com.microsoft.version\": \"14.0.3223.3\",\n\"vendor\": \"Microsoft\"\n```\n\n\
    The version number is the build of SQL Server. You can do a simple search on the\
    \ Internet and find the version number matched to a SQL Server build. In this\
    \ example, 14.0.3223.3 matches SQL Server 2017 CU16.\n\nThis is nice of course,\
    \ but how can you know the entire possible list of container images from mcr.microsoft.com?\
    \ This tip which I’ve seen provided by my colleague Umachandar Jayachandran (he\
    \ goes by UC) will save you a great deal of time.\n\nUse this URL to find a list\
    \ of all Ubuntu images:\n\n[`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list)\n\
    \nFor RHEL images, you can use\n\n[`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)\n\
    \n### Tip\n\nIf you install the Docker extension with Azure Data Studio or Visual\
    \ Studio Code, you can use the extension to browse mcr.microsoft.com including\
    \ the mssql/server images. This blog post talks about the extension at [`https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/`](https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/)\
    \ .\n\n*   We now support **non-root containers** with SQL Server 2019\\. Up to\
    \ this time, all containers for SQL Server are run in the context of the root\
    \ user in Linux. While Containers run in isolation, some in the industry don’t\
    \ think running as root is a secure model and prevents SQL Server from being officially\
    \ supported in environment such as RedHat OpenShift.\n\n*   Up to this point,\
    \ SQL Server containers only support SQL Server authentication. It is our intention\
    \ to support **Active Directory authentication with containers** in SQL Server\
    \ 2019\\. At the time I wrote this chapter, it was somewhat up in the air on whether\
    \ this would be officially supported for the SQL Server 2019 release. I’ll talk\
    \ more about this concept later in the chapter in the section “Deploying SQL Containers\
    \ in Production.”\n\n*   As we marched close to releasing SQL Server 2019, we\
    \ announced preview support for SQL Server containers based on a **base image\
    \ of Windows**. I call this **SQL Server container Windows images**. I have a\
    \ separate section at the end of this chapter discussing this topic.\n\nAs with\
    \ many topics related to computer technology, you can only read so much about\
    \ how something works. Only by using something can you truly put together all\
    \ the pieces of the puzzle. Let’s go through a series of topics about SQL Server\
    \ containers by using examples."
  trans: "## SQL Server 2019 有哪些新特性\n\n现在你已经了解了容器的工作原理以及它们如何与 SQL Server 协同工作，让我们来回顾一下\
    \ SQL Server 2019 中与容器相关的新功能：\n\n*   我们现在提供基于 **红帽企业级 Linux (RHEL)** 基础 OS 镜像的\
    \ SQL Server 2019 容器镜像。请参阅下一点了解如何查看这些镜像的样子。在本章的示例中，我将主要使用 RHEL 镜像。\n\n*   SQL\
    \ Server 2019 容器默认以非 root 用户身份运行，这使得 SQL Server 获得了在红帽 OpenShift 上运行的官方支持。\n\n\
    *   所有 SQL Server 容器镜像现在都存储在 Microsoft 容器注册表 (`mcr.microsoft.com`) 中。\n\n    当我们发布\
    \ SQL Server 2017 和容器镜像时，我们将镜像发布在 Docker Hub 仓库 [`https://hub.docker.com/_/microsoft-mssql-server`](https://hub.docker.com/_/microsoft-mssql-server)\
    \ 中。自那时起，微软内部确立了一个标准，即官方的微软容器镜像现在将发布在 Microsoft 容器注册表 (`mcr.microsoft.com`) 中。我们继续在\
    \ Docker Hub 上“分发”或列出我们的镜像，但镜像本身只能在 `mcr.microsoft.com` 找到。\n\n    让我在这里停下来解释一下容器镜像的命名约定：\n\
    \n    SQL 容器镜像将遵循以下命名约定：\n\n    `mcr.microsoft.com/mssql/server:<标签>` – Ubuntu\
    \ 镜像\n\n    `mcr.microsoft.com/mssql/rhel/server:<标签>` – 红帽企业级 Linux 镜像\n\n  \
    \  ### 注意\n\n    虽然我们目前没有为 SUSE 打包容器镜像，但你可以使用微软的 Vin Yu 提供的这个示例自行构建一个：[`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES)。\n\
    \n`<标签>` 语法基于你正在寻找的特定构建或“最新”构建。\n\n例如，要获取适用于 Ubuntu 的 SQL Server 2017 最新构建容器镜像，你会使用以下容器镜像名称：\n\
    \n```\nmcr.microsoft.com/mssql/server:2017-latest-ubuntu\n```\n\n或者，对于适用于 Ubuntu\
    \ 的 SQL 2017 CU10，你会使用\n\n```\nmcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
    ```\n\n### 注意\n\n你也可以使用 `2017-latest` 作为标签来获取最新的 Ubuntu 镜像，但这并不推荐。那是我们最初发布 SQL\
    \ 2017 时使用的原始标签。最好通过名称明确指定基础镜像。\n\n我们没有为 SQL Server 2017 发布任何 RHEL 容器镜像。它们都是为\
    \ SQL Server 2019 列出的。例如，要获取最新的 SQL Server 2019 RHEL 容器镜像，你会使用：\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\n如果你拉取了一个 SQL 容器镜像，但不确定该镜像是为哪个版本的 SQL Server 构建的，请使用 `docker inspect` 命令。首先运行以下命令：\n\
    \n```\ndocker images\n```\n\n这将列出本地服务器上存储的镜像。`TAG`（标签）列可能会给你关于 SQL Server 版本的线索。但是，如果\
    \ `TAG` 的值类似于 `2017-latest-ubuntu`，在不运行基于此镜像的容器的情况下，你无法知道这是 SQL Server 2017 的哪个\
    \ CU 构建。但如果你运行类似以下的命令：\n\n```\ndocker inspect <IMAGE ID>\n```\n\n其中 `<IMAGE ID>`\
    \ 是来自 `docker images` 命令的 `GUID`。\n\n结果是一个描述该镜像的 `JSON` 文件。这对于任何容器镜像都非常有用。如果你在\
    \ `JSON` 文本中搜索名为 `Labels`（标签）的部分，你会得到类似下面的结果：\n\n```\n\"Labels\": {\n\"com.microsoft.product\"\
    : \"Microsoft SQL Server\",\n\"com.microsoft.version\": \"14.0.3223.3\",\n\"vendor\"\
    : \"Microsoft\"\n```\n\n版本号就是 SQL Server 的构建版本。你可以在互联网上进行简单搜索，找到与 SQL Server 构建版本匹配的版本号。在此示例中，`14.0.3223.3`\
    \ 对应 SQL Server 2017 CU16。\n\n这当然很好，但你如何知道 `mcr.microsoft.com` 上所有可能的容器镜像列表呢？我的同事\
    \ Umachandar Jayachandran（他叫 UC）提供的这个技巧将为你节省大量时间。\n\n使用此 URL 查找所有 Ubuntu 镜像的列表：\n\
    \n[`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list)\n\
    \n对于 RHEL 镜像，你可以使用\n\n[`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)\n\
    \n### 提示\n\n如果你在 Azure Data Studio 或 Visual Studio Code 中安装了 Docker 扩展，你可以使用该扩展浏览\
    \ `mcr.microsoft.com`，包括 `mssql/server` 镜像。这篇博客文章介绍了该扩展：[`https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/`](https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/)。\n\
    \n### 非 root 容器\n\n*   我们现在在 SQL Server 2019 中支持非 root 容器。在此之前，所有 SQL Server 容器都是在\
    \ Linux 中以 root 用户身份运行的。虽然容器在隔离环境中运行，但业内一些人士认为以 root 身份运行并非安全模型，并且阻碍了 SQL Server\
    \ 在诸如红帽 OpenShift 等环境中获得官方支持。\n\n### Active Directory 身份验证\n\n*   到目前为止，SQL Server\
    \ 容器仅支持 SQL Server 身份验证。我们的目标是在 SQL Server 2019 中支持容器的 Active Directory 身份验证。在我撰写本章时，这功能是否会在\
    \ SQL Server 2019 版本中获得官方支持尚不确定。我将在本章后面的“在生产环境中部署 SQL 容器”一节中进一步讨论这个概念。\n\n###\
    \ Windows 容器镜像\n\n*   随着 SQL Server 2019 发布临近，我们宣布了对基于 Windows 基础镜像的 SQL Server\
    \ 容器的预览支持。我称之为 SQL Server 容器 Windows 镜像。在本章末尾有一个单独的章节讨论此主题。\n\n与许多计算机技术相关的话题一样，你只能阅读到关于某物如何工作的部分内容。只有通过使用某物，你才能真正将所有拼图碎片组合起来。让我们通过一系列关于\
    \ SQL Server 容器的示例来探讨相关主题。"
- fmt: '## Prerequisites for the Examples


    After perhaps disappointing you in the previous chapter with no examples, in this
    chapter I have more than enough. This was one of the chapters I enjoyed writing
    the most because I love the topic of containers.


    I am going to show you several different ways to run containers in this chapter
    on Windows and Linux. I have provided you scripts where you can run all the examples
    on either platform (or macOS), but in the examples I may talk more in detail about
    how to use an example on a specific platform.


    My goal when I wrote this chapter is that all examples would be based on Bash
    shell scripts and use the new Windows Subsystem for Linux (`WSL2`) for Windows
    users. However, at the time of this writing, this would have required an `insider`
    build of Windows 10, and I didn’t want to put that risk on you as the reader.
    For Windows users, I have examples to use in PowerShell (but remember as I just
    discussed in the previous section, this will still use the Docker Desktop VM).
    `WSL2` will change this game, but the next major production build of Windows 10
    will be required to use `WSL2` (unless you are game for the insider builds).


    For all examples on all platforms, you will need


    *   An Internet connection as these examples will pull docker images from the
    Microsoft Container Registry.

    *   The WideWorldImporters sample database backup which can be found at [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak).

    *   The SQL Server command-line tools need to be installed on your computer if
    not already. Windows users can find the download from [`https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility`](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility).
    Linux users can use the following documentation: [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools).
    macOS users refer to the following documentation: [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos).

    *   Azure Data Studio or `ADS` (minimum June 2019 edition) from [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download).
    `ADS` is perfect for these examples since it is a cross-platform tool. For `ADS`
    users, I recommend you install this extension: [`https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker`](https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker).
    For `ADS` you need to choose the Download Extension option on the install page.
    Download the `VSIX` file to your local computer and then follow the docs for `ADS`
    to install it. Here is how you add an extension for `ADS`: [`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions).


    Here is a list for each platform of what you will need to install:


    ### Windows users


    Install Docker Desktop for Windows at [`https://hub.docker.com/editions/community/docker-ce-desktop-windows`](https://hub.docker.com/editions/community/docker-ce-desktop-windows).
    Windows Server users can also install Docker by reading [`https://docs.docker.com/install/windows/docker-ee/`](https://docs.docker.com/install/windows/docker-ee/).


    Here is another important point for Windows users. You will likely use `git` to
    clone the repo for the book for all the samples. To do this, you will have likely
    installed Git for Windows. Be sure when you install Git for Windows to turn off
    the `autocrlf` option. Otherwise, Linux shell scripts that are needed for this
    chapter will fail. If you don’t know what option, you should use a syntax like
    the following when cloning the repo:


    ```

    git clone --config core.autocrlf=false

    ```


    ### Linux users


    Docker comes in the free or Community Edition (`CE`) or paid Enterprise Edition
    (`EE`). For the `CE`, there are various install options depending on your Linux
    distribution. For example, Ubuntu users can install docker from [`https://docs.docker.com/install/linux/docker-ce/ubuntu/`](https://docs.docker.com/install/linux/docker-ce/ubuntu/)
    or [`https://hub.docker.com/search/?type=edition&offering=community`](https://hub.docker.com/search/?type=edition&offering=community).


    If you have Docker `EE`, there are specific install instructions for Ubuntu, `RHEL`,
    and `SUSE` at [`www.docker.com/products/docker-enterprise`](http://www.docker.com/products/docker-enterprise).


    ### macOS users


    Install Docker Desktop for Mac from [`https://hub.docker.com/editions/community/docker-ce-desktop-mac`](https://hub.docker.com/editions/community/docker-ce-desktop-mac).
    The scripts I’ve built for Linux and macOS users preface all docker commands with
    `sudo`. Although not required on macOS, using `sudo` works just fine and allows
    for a single set of scripts for either platform.'
