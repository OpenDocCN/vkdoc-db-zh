    ### 列存储的在线索引维护


    聚集列存储索引对于高性能分析查询至关重要，尤其是在数据仓库场景中。鉴于通常需要为其构建聚集列存储索引的表的大小，构建（或重建）聚集列存储索引可能是一项耗时的操作。由于聚集列存储索引的构建或重建是
    `离线` 操作，整个表必须被锁定，阻止其他事务访问，这很可能不是你所需的可用性。


    SQL Server 2017 引入了在线构建和重建非聚集列存储索引的功能。在 SQL Server 2019 中，聚集列存储索引现在也可以在线构建和重建。你可以在
    [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql)
    阅读在线构建聚集列存储索引的语法详情。在线重建聚集列存储索引的语法将与使用 `ALTER INDEX` 语法的标准索引相同，具体可参考 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql)。对于在线聚集或非聚集列存储索引，目前尚不支持可恢复索引功能。


    ## 增强 Always On 可用性组


    Always On 可用性组（在本章剩余部分我将简称其为可用性组）是 SQL Server 中的旗舰级高可用性灾难恢复（HADR）功能。该功能首次发布于 SQL
    Server 2012，其后的每个版本都带来了新的增强，以扩展可用性组的能力。


    例如，在 SQL Server 2016 中，我们引入了基于数据库健康状态进行可用性组故障转移的概念（你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)
    阅读更多关于此概念的信息）。我们还提升了可用性组的内部性能，相关内容可在 [`https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/`](https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)
    阅读。


    在 SQL Server 2017 中，可用性组的一项关键新功能是 `无集群` 可用性组的概念。这允许你在没有集群软件的情况下设置可用性组。任何故障转移都是手动的，但此功能使你能够建立一个读取横向扩展的副本平台，甚至可以在
    Windows 和 Linux 之间设置可用性组。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups)
    阅读更多关于此功能的信息。


    对于 SQL Server 2019，基于客户反馈和技术趋势，我们为可用性组引入了两项新功能：


    *   支持更多副本

    *   一种确保你的应用程序连接到主副本的新方法


    ### 支持更多同步副本


    我们现在支持在单个可用性组中最多 `五个同步副本`，总共最多九个副本。更多信息请参阅文档：[`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server)。


    ### 辅助副本到主副本的读写连接重定向


    `辅助副本到主副本的读写连接重定向` 是一项新功能，旨在解决无论承载可用性组主副本的是哪个 SQL 实例，你的应用程序都必须被定向到主副本的挑战。


    在早期版本的 SQL Server 中，作为开发人员，确保你连接到可用性组的主副本的唯一方法是使用 `侦听器` 的概念。然而，如我之前在本节描述的，当你配置类似
    `无集群` 可用性组这样的 SQL Server 可用性组时，侦听器可能并非总是可用。


    SQL Server 2019 现在为可用性组提供了 T-SQL 设置，并为客户端应用程序提供了连接字符串选项，以确保无论应用程序连接到可用性组中的哪个服务器，它都将始终连接到主副本。SQL
    Server 为此概念提供了内置逻辑，并使用重定向的概念：如果应用程序连接到一个作为辅助副本的服务器，则会被重定向。


    你可以在文档 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups)
    中阅读所有关于如何为 SQL Server 和你的应用程序设置主连接重定向的细节。


    ## 加速数据库恢复


    我在微软工作中仍然感到非常兴奋的一个方面，是了解到那些最初作为项目开始的创新，然后看到它们成为已发布产品的新功能，有时是几年之后。


    举个例子，我记得在 2016 年我刚加入工程团队时，看到了一个名为常数时间恢复（`CTR`）的项目。我记得我花了一些时间去了解这个项目，因为我看到了我的长期同事
    Peter Byrne 的名字参与其中。`CTR` 在 SQL Server 2019 和 Azure SQL Database 中已演变为加速数据库恢复（`ADR`）。


    `CTR` 实际上始于 2015 年由微软杰出工程师 Hanuma Kodavalla 发起的一个项目。Hanuma 招募了其他人加入该项目，包括 Peter
    Byrne、Panagiotis Antonopoulos 和 Srikumar Rangarajan 等。该项目试图解决 SQL Server 中一个非常棘手的问题：`长时间运行的事务`。当这些工程师完成工作后，他们决定就这个概念撰写一篇论文。在你阅读本章剩余部分并使用示例时，也请考虑阅读
    `CTR` 项目论文的全部细节：[`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)。我称其为
    `CTR 论文`，并在本章剩余部分如此称呼。我建议你采取我在撰写本章时的做法：打开这篇论文，边阅读章节边使用示例时，来回参考它。

