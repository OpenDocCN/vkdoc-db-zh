    # 注


    我过去曾就这个主题发表过演讲，并有一份非常详细的架构图和说明。你可以在图 5-7 中查看，或者在以下链接中查看细节：[`www.youtube.com/watch?v=y52oBaI32Jo`](https://www.youtube.com/watch%253Fv%253Dy52oBaI32Jo)
    和 [`www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know`](https://www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know)。这些资源展示了
    SQL 2016 R Services 的架构，但它同样适用于包含 Python 的架构。包含 Python 的更新幻灯片可以在 [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms)
    找到。请在 SQL2017 文件夹中搜索名为 `Inside SQL Server Machine Learning Services` 的演示文稿。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig7_HTML.jpg](img/479130_1_En_5_Fig7_HTML.jpg)


    图 5-7


    ## 深入探究 SQL Server ML Services


    以下是我更深入探究的架构版本（图 5-7）。


    1.  用户执行 `sp_execute_external_script`，指定一种语言（R 或 Python）、一个脚本以及其他参数（例如要执行的 T-SQL
    查询）。SQL Server 通过命名管道与一个名为 Launchpad（Windows 中的服务或 Linux 中的守护进程）的独立程序通信，传入所有相关细节（如
    R 或 Python 脚本）。


    2.  Launchpad 拥有执行与 R 或 Python 语言对应的 DLL 的代码。Launchpad 使用与 SQL Server 引擎类似的工作线程模型。实际上，它加载了
    SQL Server 用于操作系统服务的 SQLOS 系统。


    3.  Launchpad DLL 将为对应的语言（R 为 `rterm.exe`，Python 为 `python.exe`）派生或创建一个新进程。


    4.  另一个名为 `bxlserver.exe`（通常被称为*卫星*进程）的进程被派生出来。这个程序将与 `rterm.exe` 或 `python.exe`
    交互以交换数据。


    5.  `bxlserver.exe` 通过一个私有 TCP 通道（与作为客户端连接到 SQL Server 的连接不同）与 SQL Server 引擎通信，接收来自已执行
    T-SQL 查询的数据，以提供给 R 或 Python 程序。此执行以*交织*的方式进行。这意味着引擎可以获取 T-SQL 查询的行来提供给机器学习程序，同时也可以获取返回的结果。支持此交换的
    DLL 称为 `sqlsatellite.dll`。


    6.  `sqlsatellite.dll` 与 `bxlserver.exe` 中的一个模块协作，与 `rterm.exe` 或 `python.exe`
    交换数据。


    7.  来自 `rterm.exe` 或 `python.exe` 程序的所有结果（包括标准输出消息）都通过 TCP 通道流回 SQL Server。


    这样做的结果是，用户执行 `sp_execute_external_script` 并会收到以表形式（类似于 SELECT 结果集）以及标准输出消息返回的结果。还有一些用于输出参数等的选项。


    更好解决方案的关键概念是，R 或 Python 代码在与 SQL Server 相同的计算机上运行（靠近数据），并且 SQL Server 可以以高效的方式与代码交换数据（没有网络流量用于交换数据）。


    理解 T-SQL 查询（即“输入查询”）与 R 或 Python 程序如何交互的最好方法是尝试一个示例。与其在这里介绍一个例子，我强烈建议你使用 [`https://aka.ms/sqldev`](https://aka.ms/sqldev)
    处的示例，或者直接使用 Python 的示例：[`https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/`](https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/)。我推荐你使用此示例的一个原因是，它还包括了如何通过
    T-SQL 使用**原生评分**的示例（[`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)）。


    我的同事 Buck Woody 还有一个很好的研讨会，可以尝试所有这些并查看实际效果：[`https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices`](https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices)。这个研讨会的好处是，你将在此过程中学到一些数据科学知识（对于我们这些不像
    Buck 那样，只是数据科学领域普通凡人的人来说）。

    '
- fmt: '### Security, Isolation, and Governance


    One of the first assignments Joseph Sirosh had for me was to boost confidence
    with the SQL community at large on SQL Server R Services. He had discussed this
    capability with several big companies using SQL Server, and the data professionals
    at these companies were leery of running R scripts with SQL Server.


    One of the first things I did was explain the architecture as I’ve described in
    the previous section and described in the deck at [`www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know`](https://www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know).
    This architecture helped explain the *isolation* model of SQL Server ML Services.
    All R and Python scripts run in separate processes from `SQLSERVR.EXE`, so any
    issues with these scripts would not cause any issues with the database engine.
    This is in contrast with other “extension” models of SQL Server, such as extended
    procedures and SQLCLR, which all run “in-process” of `SQLSERVR.EXE`. Furthermore,
    the satellite processes run isolated from each other so can’t interfere with R
    or Python processing for each user. In addition to these running as separate processes,
    any process created from `Launchpad` runs in an isolation model using the concept
    of an `AppContainer` in Windows ([`https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation`](https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation))
    and a `namespace` in Linux ([`https://en.wikipedia.org/wiki/Linux_namespaces`](https://en.wikipedia.org/wiki/Linux_namespaces)).


    #### Security


    The second concept I needed to explain was security. Consider the security model
    of executing R or Python for SQL Server ML Services:


    *   This feature is only enabled if it is first installed and then configured
    with `sp_configure`. You can read about how to install SQL Server ML Services
    on Windows at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install)
    and for Linux at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning).
    You can read about the `sp_configure` option at [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option).

    *   The T-SQL system procedure, `sp_execute_external_script`, requires the `EXECUTE
    ANY EXTERNAL SCRIPT` database permission. This permission is only given by default
    to those users or roles with `CONTROL` permissions or logins or roles with `CONTROL
    SERVER` permissions. Any other user or login trying to execute an R or Python
    script must be granted explicit permissions.

    *   Users will also need permission to access objects referenced in the “input
    query” of the `sp_execute_external_script`.

    *   The processes forked for execution of R and Python (`rterm.exe` and `python.exe`)
    all run in a specific low privilege account. For Windows, you can read more about
    this at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup`](https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup).
    For Linux, these programs run under the `mssql_satellite` account.

    *   By default, satellite processes do not have access to connect to a network
    outside of the computer running SQL Server.


    #### Governance


    The third concept to give more confidence to control the execution of R and Python
    is *governance*. SQL Server has had the concept of governance since SQL Server
    2008, with a capability called `Resource Governor`. Resource governor provides
    a mechanism to control resources for SQL Server execution for CPU, memory, and
    I/O resources. Therefore, resource governor is a natural interface to control
    resource usage for ML Services programs.


    The concept of an external resource pool has been added to SQL Server to explicitly
    control resource usage for processes that are created through `sp_execute_external_script`,
    including `rterm.exe`, `python.exe`, `bxlserver.exe`, and others. In Windows,
    external resource groups are implemented by a concept called Windows *Jobs* or
    Job Objects. You can read more about Windows Job Objects at [`https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects`](https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects).
    For Linux, the concept of control groups (`cgroups`) is used to control resource
    usage. You can read more about `cgroups` at [`https://en.wikipedia.org/wiki/Cgroups`](https://en.wikipedia.org/wiki/Cgroups).


    Not only can external resource groups help you control CPU and memory for external
    processes, but you can also specify CPU affinity. This way you can affinitize
    satellite processes to a specific node or set of CPUs and keep SQL Server processing
    affinitized to other CPUs or nodes. This is the exact architecture used to achieve
    the now famous 1 million predictions per second proof point, which you can read
    about at [`https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/`](https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/).


    ### What’s New in SQL Server 2019?


    SQL Server Machine Learning Services is *radical*, and helps take SQL Server from
    a database engine to a true data platform. SQL Server 2019 enhances SQL Server
    ML Services with these new features:


    *   External libraries can now be installed for new R or Python packages using
    the T-SQL statement `CREATE EXTERNAL LIBRARY`. You can read more about this at
    [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql)
    (SQL Server 2017 allowed this for R).

    *   The `Launchpad` service (or daemon on Linux) is critical to the SQL Server
    ML Services architecture. Now in SQL Server 2019, SQL Server ML Services can be
    part of an Always On Failover Cluster Instance including the `Launchpad` service.

    *   SQL Server Machine Learning Services is now supported on Linux. I’ll discuss
    this further in Chapter [6](#479130_1_En_6_Chapter.xhtml).

    *   SQL Server ML Services now supports creating and training models over partitioned
    data using new parameters for `sp_execute_external_script`. Read more to learn
    an example of this new feature at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition`](https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition).


    I think SQL Server Machine Learning Services is a “gamechanger.” I asked my colleague
    Buck Woody, Applied Data Scientist at Microsoft, his thoughts on the significance
    of SQL Server integration with Machine Learning. According to Buck, “Running predictive
    and categorical Machine Learning workloads on SQL Server allows not only performance
    gains by placing the compute directly over the data, but also has advantages for
    security. SQL Server maintains one of the highest levels of security in the industry,
    and with the addition of traditional Machine Learning languages such as R and
    Python along with various libraries, leverages that security transparently. There’s
    another advantage for using SQL Server as a Machine Learning platform – it provides
    the Data Scientist a place to experiment and operationalize workloads, and the
    Database Developer the control of implementing the R and Python Machine Learning
    code in Transact-SQL, allowing an effective separation of duties.”'
