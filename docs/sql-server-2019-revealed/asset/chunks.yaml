    SQL Server Master Instance Front-End                    ,31433                              sql-server-master  tds

    HDFS File System Proxy                                  https://:30443/gateway/default/webhdfs/v1    webhdfs            https

    Proxy for running Spark statements, jobs, applications  https://:30443/gateway/default/livy/v1       livy               https

    ```


    I substituted in some names to represent the actual IP address on my cluster:


    *   **<knox-ip>** – This is the IP address of the Knox Gateway which, as you can
    see in this list, is used for multiple purposes. The Knox Gateway is used to access
    HDFS files (**webhdfs**), run Spark Jobs (**livy**), view Spark Job History (**spark-history**),
    and monitor Spark Jobs **(yarn-ui**).


    *   **<appproxy-ip>** – This is the IP address used to connect to applications
    deployed in BDC.


    *   **<sql-ip>** – This is the IP address to connect to the SQL Server Master
    Instance.


    *   **<cluster-ip>** – This is the IP address for the controller service.


    You can also get all the endpoint IP address and ports using kubectl, but only
    azdata gives you specific details like how to access **webhdfs** and **livy**.


    Azure Data Studio (ADS) now offers a BDC management experience including the ability
    to see a list of endpoints.


    Figure [10-11](#479130_1_En_10_Chapter.xhtml#Fig11) shows an example of BDC endpoints
    using ADS.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    BDC endpoints in Azure Data Studio


    The documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security)
    , which is also shown in Figure [10-12](#479130_1_En_10_Chapter.xhtml#Fig12),
    shows the common BDC endpoints.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Common BDC endpoints


    ### Using Data Virtualization


    One important usage of BDC is to access data from external data sources using
    Polybase, as I’ve described in Chapter [9](#479130_1_En_9_Chapter.xhtml).


    Polybase with BDC provides the same functionality as Polybase for Linux, including
    built-in connectors for SQL Server, Oracle, Teradata, MongoDB, and HDFS.


    BDC provides a *twist* to this functionality through two additional built-in connectors
    unique to BDC:


    *   **sqlhdfs** – This connector allows you to access HDFS data within the Storage
    Pool.


    *   **sqldatapool** – This connector allows you to access data specifically stored
    in the Data Pool.


    Here are example T-SQL scripts to create external data sources within your database
    to access these built-in connectors:


    ```

    IF NOT EXISTS(SELECT ∗ FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    IF NOT EXISTS(SELECT ∗ FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    ```


    Notice the URI for the LOCATION is a specific location for the controller service.
    The controller service directs requests for external tables based on these sources
    to the respective pool through the Compute Pool if it is deployed.


    Our documentation has an example on how to use an external table with BDC to access
    Oracle data at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)
    . You will need an Oracle instance to use this example. You can also use examples
    I’ve provided in Chapter [9](#479130_1_En_9_Chapter.xhtml) from the **ch9_data_virtualization\sqldatahub**
    folder.'
  trans: '## 使用大数据集群


    在本节中，我将回顾大数据集群的各种用例。你需要做的第一件事就是使用 `azdata` `登录到 BDC`。从技术上讲，你无需登录即可访问 BDC 中的某些资源，但使用
    `azdata` 登录可以让你以简单的方式访问所有服务端点，并获得相应的上下文。


    要登录 BDC，你需要控制器服务端点，即控制器服务 Pod 的负载均衡器 IP 地址和端口。在我的 AKS 部署上，我能够通过以下命令获取控制器服务端点：


    ```bash

    kubectl get svc controller-svc-external -n mssql-cluster

    ```


    我现在可以通过以下命令为 `azdata` 工具提供正确的上下文，以便在各种场景中使用：


    ```bash

    azdata login --controller-endpoint https://:30080 --controller-username admin

    ```


    系统提示我输入密码（这是在名为“BDC 部署体验”的章节中，当 python 脚本提示时我提供的密码）。当登录成功时，我看到了以下消息：


    ```

    Logged in successfully to `https://:30080`

    ```


    有了这个上下文，我可以将 `azdata` 用于多种目的。我想做的第一件事是获取其他服务端点的列表以使用 BDC。我将使用以下命令来检索这些端点：


    ```bash

    azdata bdc endpoint list -o table

    ```


    我的列表如下所示：


    ```

    Protocol

    ------------------------------------------------------  ----------------------------------------------------  -----------------  -------

    用于访问 HDFS 文件、Spark 的网关                     https://:30443                              gateway            https

    Spark 作业管理及监控仪表板                              https://:30443/gateway/default/sparkhistory  spark-history      https

    Spark 诊断和监控仪表板                                 https://:30443/gateway/default/yarn          yarn-ui            https

    应用程序代理                                           https://:30778                         app-proxy          https

    管理代理                                               https://:30777                              mgmtproxy          https

    日志搜索仪表板                                        https://:30777/grafana                       metricsui          https

    集群管理服务                                          https://:30080                         controller         https

    SQL Server 主实例前端                                  ,31433                              sql-server-master  tds

    HDFS 文件系统代理                                      https://:30443/gateway/default/webhdfs/v1    webhdfs            https

    用于运行 Spark 语句、作业、应用程序的代理             https://:30443/gateway/default/livy/v1       livy               https

    ```


    我使用了一些名称来代表集群上的实际 IP 地址：


    *   `<knox-ip>` – 这是 Knox 网关的 IP 地址，如你在此列表中所见，它用于多种用途。Knox 网关用于访问 HDFS 文件 (`webhdfs`)、运行
    Spark 作业 (`livy`)、查看 Spark 作业历史 (`spark-history`) 以及监控 Spark 作业 (`yarn-ui`)。

    *   `<appproxy-ip>` – 这是用于连接到部署在 BDC 中的应用程序的 IP 地址。

    *   `<sql-ip>` – 这是连接到 SQL Server 主实例的 IP 地址。

    *   `<cluster-ip>` – 这是控制器服务的 IP 地址。


    你也可以使用 `kubectl` 获取所有端点的 IP 地址和端口，但只有 `azdata` 能为你提供诸如如何访问 `webhdfs` 和 `livy`
    等具体细节。


    Azure Data Studio (ADS) 现在提供了 BDC 管理体验，包括查看端点列表的功能。


    图 10-11 展示了使用 ADS 查看 BDC 端点的示例。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg](img/479130_1_En_10_Fig11_HTML.jpg)


    图 10-11


    Azure Data Studio 中的 BDC 端点


    位于 [`docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security)
    的文档（也在图 10-12 中显示）展示了常见的 BDC 端点。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg](img/479130_1_En_10_Fig12_HTML.jpg)


    图 10-12


    常见的 BDC 端点


    ### 使用数据虚拟化


    BDC 的一个重要用途是使用 Polybase 从外部数据源访问数据，正如我在第 9 章中所描述的。


    BDC 中的 Polybase 提供了与 Linux 版 Polybase 相同的功能，包括用于 SQL Server、Oracle、Teradata、MongoDB
    和 HDFS 的内置连接器。


    BDC 通过两个 BDC 独有的额外内置连接器为这一功能提供了独特的扩展：


    *   `sqlhdfs` – 此连接器允许你访问存储池内的 HDFS 数据。

    *   `sqldatapool` – 此连接器允许你访问专门存储在数据池中的数据。


    以下是在数据库中创建外部数据源以访问这些内置连接器的 T-SQL 脚本示例：


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    ```


    请注意，`LOCATION` 的 URI 是控制器服务的特定位置。如果已部署，控制器服务会通过计算池将对外部表的请求（基于这些源）定向到相应的池。


    我们的文档有一个关于如何在 BDC 中使用外部表访问 Oracle 数据的示例，链接为 [`docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)。你需要一个
    Oracle 实例来使用此示例。你也可以使用我在第 9 章 `ch9_data_virtualization\sqldatahub` 文件夹中提供的示例。'
- fmt: '# Note


    The only two examples you cannot use from this folder are `hdfs` and `saphana`.
    HDFS data is accessed in BDC through the `sqlhdfs` connector. ODBC connectors
    are not currently supported for BDC which is required for SAP HANA.


    What I think you might find more interesting is to use the samples to access data
    through the `sqlhdfs` and `sqldatapool` connectors.


    I recommend you first load sample data for using BDC through the instructions
    in the following documentation page at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data).
    I went through these instructions and had no issues loading this data. In this
    example, you will load csv files directory into HDFS using curl. This example
    uses the `WebHDFS` ([`https://hadoop.apache.org/docs/r1.0.4/webhdfs.html`](https://hadoop.apache.org/docs/r1.0.4/webhdfs.html))
    endpoint from the Knox Gateway, which is called `HDFS File System Proxy`.


    Once you have loaded your data, you can now go through the tutorial to access
    HDFS data at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool).
    You might also find it interesting to try the External Table Wizard that comes
    with Azure Data Studio as another way to create the external table mapped to HDFS
    data in BDC at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv).


    It is possible you will need to ingest data directly into HDFS in BDC from sources
    such as IOT devices. Our documentation has examples on how to interact directly
    with HDFS in BDC at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl`](https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl).


    In addition, Azure Data Studio includes the capability to browse and work with
    files in HDFS directly, as you can see in Figure [10-13](#479130_1_En_10_Chapter.xhtml#Fig13).


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig13_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig13_HTML.jpg)


    Figure 10-13

    Working with HDFS in BDC with Azure Data Studio


    Buck Woody built a workshop called SQL Server `Big Data Clusters – Architecture`
    and has a set of Notebooks you can use with ADS to see how Data Virtualization
    works with BDC. You can try out these Notebooks at [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks),
    using tutorial 00, 01, and 02 for fundamental Data Virtualization notebooks.


    # Using the Data Pool


    I’ve described the Data Pool in this book as a data cache. The process to use
    the Data Pool is to ingest or insert data based on queries from other data sources,
    which could be SQL Server Master Instance tables, external data sources from HDFS,
    or any other Polybase connector.


    Data is automatically sharded across pods in the Data Pool and optimized for read
    access with clustered columnstore indexes.


    I recommend you go through the example in our documentation to see the basics
    of using Data Pool at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql).


    Buck Woody’s workshop in tutorial 03 shows how to use the Data Pool in BDC at
    [`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb).


    # Using Spark


    Spark ([`https://spark.apache.org/`](https://spark.apache.org/)) is a computing
    engine that is often used in Hadoop systems. BDC automatically provides capabilities
    to run Spark Jobs for various application needs. There are several ways to run
    Spark Jobs with BDC which I’ll discuss in this section. You can run through some
    of these examples to see how Spark works with BDC. If you are new to Spark, you
    need to first consider why you would want to use Spark before embarking submitting
    Spark Jobs to BDC. There are some very good scenarios where Spark can be an effective
    method for processing data in HDFS, which is why we included Spark as part of
    the overall BDC solution. You will also find Spark to be a common solution to
    use in Machine Learning scenarios, which I’ll talk more about in the section later
    in this chapter titled “Machine Learning and Big Data Clusters.”


    ## Run Spark Jobs from Azure Data Studio


    One scenario where Spark can be useful is ingestion of data from HDFS in the Storage
    Pool into tables and in the Data Pool in BDC.


    One method to run a Spark Job is to use Azure Data Studio connected directly to
    the SQL Server Master Instance. Figure [10-14](#479130_1_En_10_Chapter.xhtml#Fig14)
    shows an example of how to run a Spark Job using Azure Data Studio (ADS).


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig14_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig14_HTML.jpg)


    Figure 10-14

    Submitting a Spark Job in Azure Data Studio


    There is more information about submitting Spark Jobs directly with ADS at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job).


    ## Running Spark Jobs from Other Tools


    We also support submitting Spark Jobs against BDC with a tool called `IntelliJ`
    which you can read at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin).
    You can also submit Spark Jobs with BDC using `Visual Studio Code` which you can
    read about at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode).
    In both of these scenarios, you will use the `Gateway to access HDFS files, Spark`
    endpoint to connect to BDC to run Spark Jobs.


    BDC also provides a REST endpoint for submitting Spark Jobs called `Livy` ([`https://livy.apache.org/`](https://livy.apache.org/)).
    The Livy endpoint is provided through a proxy as part of the `<knox-ip>` called
    `Proxy for running Spark statements, jobs, applications`.


    Perhaps the most common method for you to use Spark within the context of BDC
    is through Notebooks with Azure Data Studio (ADS). Up until this chapter of the
    book, I’ve shown you many examples using Notebooks with ADS using a `kernel` for
    SQL. ADS supports kernels for other language environments, including


    *   PySpark3

    *   PySpark

    *   Spark | Scala

    *   Spark | R

    *   Python


    In any of these scenarios, you will connect to the SQL Server Master Instance
    with a notebook. ADS will handle submitting the Spark Jobs from the Notebook through
    the Knox Gateway to properly run the Spark Job in BDC. Any Python or R code in
    these notebooks will run on your local computer.


    ## MSSQL Spark Connector


    We provide another method to run Spark Jobs through the `MSSQL Spark Connector`.
    This connector talks to the SQL Server Master Instance, uses SQL Bulk Copy APIs
    for writes, and has a familiar JDBC interface. You can read more about the `MSSQL
    Spark Connector` and how to use it with BDC at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector).'
