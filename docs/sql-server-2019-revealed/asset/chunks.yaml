    Some query operations are intensive and require some type of temporary area to
    store data. Two such operations are *hash joins* (or even just hash operators)
    and *sorts*. To perform a hash join, SQL Server effectively has to build a mini-table
    in memory in order to perform the operation. Any type of data sort can require
    some type of array or structure to sort data. SQL Server has to have some place
    to perform these operations so it allocates memory outside the buffer pool. The
    process for allocating this memory by the query execution engine is called a memory
    grant.


    Sounds simple enough. Here is the problem: Memory grants are based on what the
    optimizer knows about the query plan as it is first being executed. And the “what”
    for these decisions usually comes down to cardinality estimation or unique number
    of rows for an operation. If SQL Server thinks a sort operation as part of a query
    plan will be on data columns that are 100 bytes in total but with an estimated
    1 billion rows, it must acquire a memory grant enough to allocate memory to sort
    that many rows of data of that size. The same type of concept applies for a hash
    operator.'
  trans: '

    ### 使用智能查询处理示例的先决条件


    虽然许多工作负载都能从智能查询处理中受益，但使用较大数据集和为分析查询设计的数据库能更轻松地展示其性能优势。因此，本章示例将使用 `WideWorldImportersDW`
    示例数据库（您可以在 [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog)
    了解更多关于此数据库及其架构的信息）。


    这些示例适用于 Windows、Linux 和容器上运行的 SQL Server 2019。鉴于数据集较大，SQL Server 需要至少 12GB 内存才能正常观察到性能差异。此外，部分查询示例使用了并行处理，因此更推荐在多处理器系统上安装
    SQL Server。


    本章使用的所有脚本都可以在 GitHub 仓库的 `ch2_intelligent_performance\iqp` 目录下找到。


    这些示例（包括如何扩展 `WideWorldImportersDW` 数据库的方法）完全归功于我在微软的同事 Joe Sack。这些示例是基于 Joe 的
    GitHub 仓库 [`https://github.com/joesackmsft/Conferences/tree/master/IQPDemos`](https://github.com/joesackmsft/Conferences/tree/master/IQPDemos)
    修改而来。


    要使用本章中的示例，您需要完成以下步骤：


    1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)
    下载 `WideWorldImportersDW` 数据库备份文件。

    2.  将此数据库还原到您的 SQL Server 2019 实例。您可以使用提供的 `restorewwidw.sql` 脚本。您可能需要更改备份文件位置以及数据库文件还原目录的路径。

    3.  为了运行部分示例，您需要比 `WideWorldImportersDW` 默认安装更大的表，并且这些表不使用列存储索引。因此，请运行脚本 `extendwwidw.sql`
    来创建两个大表。扩展此数据库将使其大小（包括事务日志）增加到总共约 8GB。其中一个表名为 `Fact.OrderHistory`。基于 `Orders`
    表，我们将大幅扩展此表且不使用列存储索引。我们将创建另一个名为 `Fact.OrderHistoryExtended` 的表，它将基于 `Fact.OrderHistory`，但包含更多行。


    几乎所有示例都提供两种方法：


    *   一套 T-SQL 脚本，您可以配合任何工具使用，例如 `SQL Server Management Studio`、`Azure Data Studio`
    或 `sqlcmd`。

    *   一个需要使用 `Azure Data Studio` 的 T-SQL 笔记本。请仔细查阅如何在 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks)
    使用 `Azure Data Studio` 运行笔记本。


    有一个示例需要在 Windows 客户端运行，因为它使用了著名的 `ostress.exe` 工具。有关如何安装和使用 `ostress.exe` 的详细信息，请参见“内存授权反馈（行模式）”部分。我编写所有脚本时假设您将以系统管理员身份运行（我使用了
    `sa` 登录）。在实际操作中，您会创建其他登录名来使用 SQL Server，但为了简化示例——请仅使用具有系统管理员权限的登录名。


    ### 内存授权反馈（行模式）


    在加入 SQL Server 工程团队之前，我在微软技术支持部门有很长的职业生涯。在性能方面，我见过客户面临的最棘手问题之一就是与 `内存授权` 相关的问题。什么是
    `内存授权`？


    SQL Server 会因各种原因分配内存。当 SQL Server 执行查询时，可能会使用内存来缓存与查询中索引或表的页面相关联的缓冲区。在大多数已运行一段时间的
    SQL Server 实例中，缓冲池可能已经在分配的内存中，因此引入页面不需要额外内存。


    某些查询操作是密集型的，需要某种临时区域来存储数据。其中两种操作是 `哈希联接`（或仅仅是哈希运算符）和 `排序`。要执行 `哈希联接`，SQL Server
    实际上必须在内存中构建一个迷你表来执行该操作。任何类型的数据 `排序` 都可能需要某种数组或结构来对数据进行排序。SQL Server 必须有某个地方来执行这些操作，因此它会在缓冲池之外分配内存。查询执行引擎分配此内存的过程称为
    `内存授权`。


    听起来很简单。问题在于：`内存授权` 是基于优化器在首次执行查询计划时对查询的了解。而这些决策的“依据”通常归结为基数估计或操作的唯一行数。如果 SQL Server
    认为查询计划中的 `排序` 操作将作用于总大小为 100 字节的数据列，并且估计有 10 亿行数据，它必须获取足够的 `内存授权` 来分配内存以对如此多行、该大小的数据进行排序。同样的概念也适用于
    `哈希` 运算符。

    '
- fmt: "### Tip\n\n有一个SQL Server工程团队撰写的关于内存授权（memory grants）的非常古老的博客。我建议您停下来阅读这篇文章，以了解更多概念和细节。您可以阅读这篇博客：[`https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/)\
    \ 。\n\n在许多场景中，这个系统运行良好，不会出现明显问题。但是，如果内存授权基于不准确的基数估计会怎样？\n\n可能会出现两类问题：\n\n*   内存授权可能*小于实际所需*，导致臭名昭著且令人头疼的“tempdb溢出”。SQL\
    \ Server 不会允许哈希连接运算符或排序操作获得其所需的所有内存。如果内存请求过大（我们没有记录什么算“过大”，因为我们可能会更改它，并且不希望您依赖于此），当前分配的内存必须被保存。保存到哪里？您猜对了…\
    \ tempdb。可以将此视为类似于物理RAM耗尽时操作系统对内存进行分页的分页系统。\n\n*   内存授权可能*大于实际所需*。这可能会挤压SQL Server引擎其他部分的内存压力，但更可能的情况是多个用户运行的查询都具有*过多*的内存授权，从而导致SQL\
    \ Server对查询进行节流。结果是一些用户在名为 `RESOURCE_SEMAPHORE` 的等待类型上遇到瓶颈。\n\n这两个问题都可能导致性能问题。在SQL\
    \ Server 2017中，我们为批处理模式引入了一个称为*内存授权反馈*的概念。此功能是*自适应*的完美示例。当查询执行完成后，SQL Server 知道实际使用的内存与原始请求的内存相比如何。如果实际使用的内存远少于授权的内存，为什么下次执行相同的缓存计划时还要请求过多的内存？同样，如果实际使用的内存远多于原始授权请求的内存，为什么还要一遍又一遍地向\
    \ tempdb 溢出？\n\n内存授权反馈通过将未来执行的正确内存授权信息存储在缓存查询计划中来解决此问题。对用户而言，感觉就像 SQL Server *自我修复*了。此功能在\
    \ SQL Server 2017 中很好用，但仅适用于批处理模式操作，这意味着它仅适用于列存储索引操作。正如您将在本章后面题为“行存储上的批处理模式”的部分中了解到的，SQL\
    \ Server 支持的批处理模式操作不仅仅针对列存储。那么，为什么在未使用批处理模式时不支持内存授权反馈呢？\n\n其结果是，无论使用何种类型的表或索引，SQL\
    \ Server 引擎在内存授权场景下都具备了自适应能力。\n\n启用行模式内存授权反馈只需将数据库兼容性级别 (`dbcompat`) 更改为 150 即可。\n\
    \n即使 `dbcompat` 为 150，您也可以使用 `ALTER DATABASE SCOPED CONFIGURATION` 的 `ROW_MODE_MEMORY_GRANT_FEEDBACK`\
    \ 选项来禁用或启用行模式内存授权反馈。您还可以使用 `DISABLE_ROW_MODE_MEMORY_GRANT_FEEDBACK` 查询选项在查询级别禁用此功能。您可以阅读如何设置这些选项的示例：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)\
    \ 。\n\n#### 低估的内存授权\n\n让我们看一些例子。首先看一个内存授权小于实际内存使用量，导致溢出到 tempdb 的场景。这些示例中使用的所有脚本都可以在\
    \ **ch2_intelligent_performance\\iqp\\rowmodemgf** 目录中找到。有两种方法可以运行此场景的示例：\n\n\
    *   使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。\n\n*   使用 Azure Data Studio 中名为 **iqp_rowmodemfg.ipynb**\
    \ 的 T-SQL notebook。\n\n让我们逐步使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。我将使用 SQL Server\
    \ Management Studio 来解释查询计划差异，但您可以使用任何可以显示查询计划的工具。T-SQL 脚本中注释了示例的每个步骤。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\n低估内存授权的查询计划\n\n1.  **步骤 1** 说明将数据库兼容性级别更改为 150，清除过程缓存，并*预热* `WideWorldImportersDW`\
    \ 数据库中名为 `Fact.OrderHistory` 的表所在的缓冲池。需要 `Dbcompat` 150 以为行存储启用内存授权反馈。清除过程缓存只是确保我们“从干净状态开始”的一步。（注意使用\
    \ `ALTER DATABASE` 选项仅为此数据库清除过程缓存。这个选项非常有用！）从磁盘加载 `Fact.OrderHistory` 表的页面只是为了确保有无内存授权反馈的查询性能比较是“公平的”。\n\
    \n    ```\n    -- 步骤 1：确保此数据库处于兼容级别 150，并清除此数据库的过程缓存。同时将表加载到缓存中以比较预热缓存的查询\n  \
    \  USE [WideWorldImportersDW]\n    GO\n    ALTER DATABASE [WideWorldImportersDW]\
    \ SET COMPATIBILITY_LEVEL = 150\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE\n    GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n\
    \    GO\n    ```\n\n2.  **步骤 2** 完全是为内存授权的*低估*设置条件。我将向您展示如何模拟此情况的技巧。T-SQL `UPDATE\
    \ STATISTICS` 命令有一个特殊选项，可强制存储特定的行数或页数统计信息。通常您绝不会想使用此选项。事实上，在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql)\
    \ 的 `UPDATE STATISTICS` 命令文档中，关于此选项写道：“仅出于信息目的而标识。不支持。将来不保证兼容性。”因此，此选项仅用于此演示目的。在这种情况下，让我们强制将此表的统计信息的基数设置为\
    \ 1000 行：\n\n    ```\n    -- 步骤 2：模拟统计信息过期\n    UPDATE STATISTICS Fact.OrderHistory\n\
    \    WITH ROWCOUNT = 1000\n    GO\n    ```\n\n    此表实际有 3702592 行；强制统计信息认为其只有\
    \ 1000 行，可以模拟统计信息与表中实际数据不同步的场景。\n\n3.  进入 **步骤 3**。现在是运行使用 `Fact.OrderHistory`\
    \ 表的查询的时候了。\n\n    ```\n    -- 步骤 3：运行查询以获取订单和库存项目数据\n    -- 不要选中此处的注释来运行查询！\n\
    \    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\n    FROM  Fact.OrderHistory\
    \ AS fo\n    INNER HASH JOIN Dimension.[Stock Item] AS si\n    ON fo.[Stock Item\
    \ Key] = si.[Stock Item Key]\n    WHERE fo.[Lineage Key] = 9\n    AND si.[Lead\
    \ Time Days] > 19\n    GO\n    ```"
  raw: "### Tip\n\nThere is a very old blog by the SQL Server engineering team explaining\
    \ memory grants. I recommend you stop and read through this to understand more\
    \ of the concepts and details. You can read the blog at [`https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/)\
    \ .\n\nIn many scenarios, this system works just fine, and no noticeable issues\
    \ can occur. However, what if the memory grants are based on cardinality estimates\
    \ that are not accurate?\n\nTwo types of problems can occur:\n\n*   The memory\
    \ grant can be *too small for what is really needed*, resulting in the infamous\
    \ and painful “tempdb spill.” SQL Server will not allow a hash join operator or\
    \ sort to get all the memory it wants. If the memory request is too large (we\
    \ don’t document what is too large, because we might change it, and wouldn’t want\
    \ you to rely on it), the current allocated memory must be saved. Saved where?\
    \ You guessed it… tempdb. Think of this like a paging system much like the how\
    \ operating system pages memory when physical RAM is exhausted.\n\n*   The memory\
    \ grant is *too large for what is really needed*. This could squeeze memory pressure\
    \ for other parts of the SQL Server engine, but what is more likely is multiple\
    \ users run queries that have *excessive* memory grants, and SQL Server will throttle\
    \ queries. The result is some users experience bottlenecks on a wait_type called\
    \ RESOURCE_SEMAPHORE.\n\nBoth of these problems can lead to performance problems.\
    \ In SQL Server 2017, we introduced a concept called *memory grant feedback* for\
    \ batch mode. This feature is a perfect example of *adapting*. When a query has\
    \ completed execution, SQL Server knows how much memory was used for a grant vs.\
    \ what was originally requested. If the memory used was far less than what was\
    \ granted, why keep asking for too much memory the next time the same cached plan\
    \ is executed? Same goes for if the memory used was far greater than the requested\
    \ original grant. Why keep spilling to tempdb for a cached query plan over and\
    \ over?\n\nMemory grant feedback solves this problem by storing information in\
    \ the cached query plan for what the correct memory grant should be for future\
    \ executions. To the user, it feels like SQL Server *healed itself*. This feature\
    \ was great for SQL Server 2017, but only for batch mode operations, which meant\
    \ it only worked for columnstore index operations. As you will learn in a later\
    \ section of this chapter titled “Batch Mode on Rowstore,” SQL Server supports\
    \ batch mode operations on more than just columnstore. However, why not support\
    \ memory grant feedback even when batch mode is not used?\n\nThe result is an\
    \ adaptive SQL Server engine for memory grant scenarios no matter what type of\
    \ table or index is being used.\n\nEnabling memory grant feedback row mode is\
    \ as simple as changing the database compatibility level (dbcompat) to 150.\n\n\
    You can disable or enable memory grant feedback row mode even with dbcompat at\
    \ 150 using the ROW_MODE_MEMORY_GRANT_FEEDBACK option for ALTER DATABASE SCOPED\
    \ CONFIGURATION. You can also disable this feature at the query level using the\
    \ DISABLE_ROW_MODE_MEMORY_GRANT_FEEDBACK query option. You can read examples of\
    \ how to set these options at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)\
    \ .\n\n#### Underestimated Memory Grant\n\nLet’s look at some examples. Let’s\
    \ first look at a scenario where a memory grant is too small for the actual memory\
    \ used, resulting in a spill to tempdb. All the scripts used in these examples\
    \ can be found in the **ch2_intelligent_performance\\iqp\\rowmodemgf** directory.\
    \ There are two ways to run the examples for this scenario:\n\n*   Use the T-SQL\
    \ script **iqp_rowmodemfg.sql**.\n\n*   Use the T-SQL notebook in Azure Data Studio\
    \ called **iqp_rowmodemfg.ipynb**.\n\nLet’s use the T-SQL script **iqp_rowmodemfg.sql**\
    \ in a step-by-step fashion. I’ll use SQL Server Management Studio to explain\
    \ query plan differences, but you can use any tool that can show the query plan.\
    \ There are comments in the T-SQL script for each step of the example.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\n\nQuery plan for underestimated memory grant\n\n1.  **Step 1** says\
    \ to change the database compatibility level to 150, clear the procedure cache,\
    \ and *warm* the buffer pool with pages from a table called Fact.OrderHistory\
    \ in the WideWorldImportersDW database. Dbcompat of 150 is needed to enable memory\
    \ grant feedback for rowstore. Clearing the procedure cache is just a step to\
    \ ensure we are “starting clean.” (Note the use of the ALTER DATABASE option to\
    \ clear the procedure cache just for this database. This option is very nice!)\
    \ Pulling in the pages from disk for the Fact.OrderHistory table is done just\
    \ to ensure the comparison of query performance with and without memory grant\
    \ feedback is a “fair fight.”\n\n```\n    -- Step 1: Make sure this database is\
    \ in compatibility level 150 and clear procedure cache for this database. Also\
    \ bring the table into cache to compare warm cache queries\n    USE [WideWorldImportersDW]\n\
    \    GO\n    ALTER DATABASE [WideWorldImportersDW] SET COMPATIBILITY_LEVEL = 150\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n\
    \    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n    ```\n\n2.  **Step\
    \ 2** is all about setting up conditions for an *underestimation* of a memory\
    \ grant. I’ll show you a trick on how to simulate this. The T-SQL UPDATE STATISTICS\
    \ command has a special option to force a specific row or page count that is stored\
    \ in the statistics information. You would never want to use this option normally.\
    \ In fact, in the documentation of the UPDATE STATISTICS command at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql)\
    \ , it says about this option, “Identified for informational purposes only. Not\
    \ supported. Future compatibility is not guaranteed.” So this option is only for\
    \ the purposes of this demonstration. In this case, let’s force the cardinality\
    \ of the statistics of this table to 1000 rows:\n\n```\n    -- Step 2: Simulate\
    \ statistics out of date\n    UPDATE STATISTICS Fact.OrderHistory\n    WITH ROWCOUNT\
    \ = 1000\n    GO\n    ```\n\nThis table actually has 3702592 rows; forcing the\
    \ statistics to believe it has 1000 rows simulates a scenario where the statistics\
    \ are not in sync with the actual data in the table.\n\n3.  On to **Step 3**.\
    \ Now it is time to run a query using the Fact.OrderHistory table.\n\n```\n  \
    \  -- Step 3: Run a query to get order and stock item data\n    -- DO NOT select\
    \ the comments here to run the query!\n    SELECT fo.[Order Key], fo.Description,\
    \ si.[Lead Time Days]\n    FROM  Fact.OrderHistory AS fo\n    INNER HASH JOIN\
    \ Dimension.[Stock Item] AS si\n    ON fo.[Stock Item Key] = si.[Stock Item Key]\n\
    \    WHERE fo.[Lineage Key] = 9\n    AND si.[Lead Time Days] > 19\n    GO\n  \
    \  ```"
  trans: "\n### 提示\n\nSQL Server 工程团队撰写了一篇关于内存授权（memory grants）的非常古老的博客。我建议您暂停阅读本文，以了解更多概念和细节。您可以阅读这篇博客：[`https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/)。\n\
    \n在许多场景中，这个系统运行良好，不会出现明显问题。但是，如果内存授权基于不准确的基数估计会怎样？\n\n可能会出现两类问题：\n\n*   内存授权可能*小于实际所需*，导致臭名昭著且令人头疼的“tempdb\
    \ 溢出”。SQL Server 不会允许哈希连接运算符或排序操作获得其所需的所有内存。如果内存请求过大（我们没有记录什么算“过大”，因为我们可能会更改它，并且不希望您依赖于此），当前分配的内存必须被保存。保存到哪里？您猜对了…\
    \ tempdb。可以将此视为类似于物理 RAM 耗尽时操作系统对内存进行分页的分页系统。\n\n*   内存授权可能*大于实际所需*。这可能会挤压 SQL\
    \ Server 引擎其他部分的内存压力，但更可能的情况是多个用户运行的查询都具有*过多*的内存授权，从而导致 SQL Server 对查询进行节流。结果是一些用户在名为\
    \ `RESOURCE_SEMAPHORE` 的等待类型上遇到瓶颈。\n\n这两个问题都可能导致性能问题。在 SQL Server 2017 中，我们为批处理模式引入了一个称为*内存授权反馈*的概念。此功能是*自适应*的完美示例。当查询执行完成后，SQL\
    \ Server 知道实际使用的内存与原始请求的内存相比如何。如果实际使用的内存远少于授权的内存，为什么下次执行相同的缓存计划时还要请求过多的内存？同样，如果实际使用的内存远多于原始授权请求的内存，为什么还要一遍又一遍地向\
    \ tempdb 溢出？\n\n内存授权反馈通过将未来执行的正确内存授权信息存储在缓存查询计划中来解决此问题。对用户而言，感觉就像 SQL Server *自我修复*了。此功能在\
    \ SQL Server 2017 中很好用，但仅适用于批处理模式操作，这意味着它仅适用于列存储索引操作。正如您将在本章后面题为“行存储上的批处理模式”的部分中了解到的，SQL\
    \ Server 支持的批处理模式操作不仅仅针对列存储。那么，为什么在未使用批处理模式时不支持内存授权反馈呢？\n\n其结果是，无论使用何种类型的表或索引，SQL\
    \ Server 引擎在内存授权场景下都具备了自适应能力。\n\n启用行模式内存授权反馈只需将数据库兼容性级别 (`dbcompat`) 更改为 150 即可。\n\
    \n即使 `dbcompat` 为 150，您也可以使用 `ALTER DATABASE SCOPED CONFIGURATION` 的 `ROW_MODE_MEMORY_GRANT_FEEDBACK`\
    \ 选项来禁用或启用行模式内存授权反馈。您还可以使用 `DISABLE_ROW_MODE_MEMORY_GRANT_FEEDBACK` 查询选项在查询级别禁用此功能。您可以阅读如何设置这些选项的示例：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)。\n\
    \n#### 低估的内存授权\n\n让我们看一些例子。首先看一个内存授权小于实际内存使用量，导致溢出到 tempdb 的场景。这些示例中使用的所有脚本都可以在\
    \ **ch2_intelligent_performance\\iqp\\rowmodemgf** 目录中找到。有两种方法可以运行此场景的示例：\n\n\
    *   使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。\n*   使用 Azure Data Studio 中名为 **iqp_rowmodemfg.ipynb**\
    \ 的 T-SQL notebook。\n\n让我们逐步使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。我将使用 SQL Server\
    \ Management Studio 来解释查询计划差异，但您可以使用任何可以显示查询计划的工具。T-SQL 脚本中注释了示例的每个步骤。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg](img/479130_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\n低估内存授权的查询计划\n\n1.  **步骤 1** 说明将数据库兼容性级别更改为 150，清除过程缓存，并*预热* `WideWorldImportersDW`\
    \ 数据库中名为 `Fact.OrderHistory` 的表所在的缓冲池。需要 `Dbcompat` 150 以为行存储启用内存授权反馈。清除过程缓存只是确保我们“从干净状态开始”的一步。（注意使用\
    \ `ALTER DATABASE` 选项仅为此数据库清除过程缓存。这个选项非常有用！）从磁盘加载 `Fact.OrderHistory` 表的页面只是为了确保有无内存授权反馈的查询性能比较是“公平的”。\n\
    \n    ```\n    -- 步骤 1：确保此数据库处于兼容级别 150，并清除此数据库的过程缓存。同时将表加载到缓存中以比较预热缓存的查询\n  \
    \  USE [WideWorldImportersDW]\n    GO\n    ALTER DATABASE [WideWorldImportersDW]\
    \ SET COMPATIBILITY_LEVEL = 150\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE\n    GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n\
    \    GO\n    ```\n\n2.  **步骤 2** 完全是为内存授权的*低估*设置条件。我将向您展示如何模拟此情况的技巧。T-SQL `UPDATE\
    \ STATISTICS` 命令有一个特殊选项，可强制存储特定的行数或页数统计信息。通常您绝不会想使用此选项。事实上，在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql)\
    \ 的 `UPDATE STATISTICS` 命令文档中，关于此选项写道：“仅出于信息目的而标识。不支持。将来不保证兼容性。”因此，此选项仅用于此演示目的。在这种情况下，让我们强制将此表的统计信息的基数设置为\
    \ 1000 行：\n\n    ```\n    -- 步骤 2：模拟统计信息过期\n    UPDATE STATISTICS Fact.OrderHistory\n\
    \    WITH ROWCOUNT = 1000\n    GO\n    ```\n\n    此表实际有 3702592 行；强制统计信息认为其只有\
    \ 1000 行，可以模拟统计信息与表中实际数据不同步的场景。\n\n3.  进入 **步骤 3**。现在是运行使用 `Fact.OrderHistory`\
    \ 表的查询的时候了。\n\n    ```\n    -- 步骤 3：运行查询以获取订单和库存项目数据\n    -- 不要选中此处的注释来运行查询！\n\
    \    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\n    FROM  Fact.OrderHistory\
    \ AS fo\n    INNER HASH JOIN Dimension.[Stock Item] AS si\n    ON fo.[Stock Item\
    \ Key] = si.[Stock Item Key]\n    WHERE fo.[Lineage Key] = 9\n    AND si.[Lead\
    \ Time Days] > 19\n    GO\n    ```\n"
- fmt: 'The query attempts to get Order and Stock Item data. Notice the use of `HASH
    JOIN` in the T-SQL syntax to force the optimizer to use a hash join. This is a
    simple way for demonstration purposes to induce a hash join into the query with
    an underestimated number of rows. I included the comments here, but it is critical
    you do not execute this T-SQL fragment with the comments. This burned me when
    I first started building these demos. Comments “count” when it comes to uniquely
    identifying a query to match a cached plan. If the next execution of the query
    doesn’t have the same comments, the queries will not be reused. In SSMS, select
    the option for **Include Actual Execution Plan** (you can use `Ctrl+M` to enable)
    before executing the query. This documentation page describes how to enable this,
    [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan).


    ## Step 3: Run a query to get order and stock item data


    ```sql

    -- DO NOT select the comments here to run the query!

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]

    FROM  Fact.OrderHistory AS fo

    INNER HASH JOIN Dimension.[Stock Item] AS si

    ON fo.[Stock Item Key] = si.[Stock Item Key]

    WHERE fo.[Lineage Key] = 9

    AND si.[Lead Time Days] > 19

    GO

    ```


    This query should take at least 30 seconds to run and returns about 66K rows (your
    mileage may vary). Using the SSMS option to view the execution plan, it should
    look something like Figure [2-2](#479130_1_En_2_Chapter.xhtml#Fig2).


    ### Analyzing the Execution Plan


    Using this plan, there are several details to observe. In SSMS, if you move your
    cursor over the `Table Scan` operator, it should look something like Figure [2-3](#479130_1_En_2_Chapter.xhtml#Fig3).
    Notice the `Estimated Number of Rows` is way off the actual rows read for the
    scan.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig3_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig3_HTML.jpg)

    *Figure 2-3: Estimates vs. actuals for the `Fact.OrderHistory` table scan*


    In this case, the `Fact.OrderHistory` table is the *build input* into a hash join.
    SQL Server will request a memory grant for the hash join based on this build input.
    This is a problem since the memory grant is based on the estimate which is only
    1000 rows. Use the cursor to move over the `Hash Join`, which has a small warning
    icon with it, and notice the warning about a spill as seen in Figure [2-4](#479130_1_En_2_Chapter.xhtml#Fig4).


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig4_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig4_HTML.jpg)

    *Figure 2-4: Hash join tempdb spill*


    Notice the numbers from the warning. `52008` pages (8K per page) is ~426Mb of
    data I/O to `tempdb` files. Spills are really ugly because this is not data placed
    into a buffer pool page associated to `tempdb`. `Tempdb` data files become the
    *paging file* for memory grants for hash joins (these are not `tempdb` pages for
    temporary tables. This is yet another reason why I often call `tempdb` the garbage
    dump of SQL Server).


    ### Tip: How a Hash Join Works


    Want to know how a hash join works? Read this older yet classic blog post from
    one of our top Query Processor team engineers, the one and only Craig Freedman:
    [`https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/`](https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/).


    ### Checking the Memory Grant


    Moving to the left in the query plan, move the cursor over the `SELECT` operator.
    In this operator are the details of the amount of memory grant for the query plan.
    Figure [2-5](#479130_1_En_2_Chapter.xhtml#Fig5) shows ~1.4Mb of memory was requested
    for the grant for this query.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig5_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig5_HTML.jpg)

    *Figure 2-5: The `SELECT` operator showing memory grant requested*


    1.4Mb memory grant requested is not near enough to hold what is needed which,
    based on the spill, is ~400Mb.


    Another piece of interesting information provided in the XML execution plan is
    in the Properties of the plan. To see this, right-click the `SELECT` operator
    and select `Properties`. Expand the option called `MemoryGrantInfo`, which will
    look like Figure [2-6](#479130_1_En_2_Chapter.xhtml#Fig6).


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig6_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig6_HTML.jpg)

    *Figure 2-6: Memory grant details in the query plan properties*


    The most important property with respect to memory grant feedback is the field
    called **IsMemoryGrantFeedbackAdjusted**. The value of **NoFirstExecution** means
    that this is just the first execution of the query, so no feedback has been collected.
    You can view the list of possible values in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback).


    Since memory grant feedback is enabled, if the same query that is cached is executed,
    SQL Server will adapt and change the memory grant to accommodate the underestimation.


    ## Step 4: Let''s try this again


    1.  Go to **Step 4** in the script and run the same query again. **IMPORTANT**:
    Do not use the comments when running the query. Comments count when matching the
    exact query in plan cache. Be sure to keep the option in SSMS to `Include Actual
    Execution Plan`.


    ```sql

    -- Step 4: Let''s try this again

    -- DO NOT select the comments here to run the query!

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]

    FROM  Fact.OrderHistory AS fo

    INNER HASH JOIN Dimension.[Stock Item] AS si

    ON fo.[Stock Item Key] = si.[Stock Item Key]

    WHERE fo.[Lineage Key] = 9

    AND si.[Lead Time Days] > 19

    GO

    ```


    Instead of 30 seconds or more, this time the query should run in 3 seconds or
    less. Remember, the concept is that the plan doesn’t change, so when you look
    at the `Actual Execution Plan`, it should look the same except there is no warning
    icon with the `Hash Match Join` and no spill warning. Using the cursor to move
    over the `SELECT` operator, you will see a significant difference in the memory
    grant as seen in Figure [2-7](#479130_1_En_2_Chapter.xhtml#Fig7).


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig7_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig7_HTML.jpg)

    *Figure 2-7: `SELECT` operator showing improved memory grant.*


    You can see that it actually takes ~625Mb to get the correct memory grant to accommodate
    the `Hash Join`.


    Right-click the `SELECT` operator and select `Properties`. The `Memory Grant Feedback`
    section now looks like Figure [2-8](#479130_1_En_2_Chapter.xhtml#Fig8).


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig8_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig8_HTML.jpg)

    *Figure 2-8: Memory grant feedback properties after the grant is corrected*


    ## Step 5: Restore table and clustered index back to its original state


    We need to make sure to restore the statistics back to their original state by
    running the T-SQL for **Step 5** in the T-SQL script:


    ```sql

    -- Step 5: Restore table and clustered index back to its original state

    UPDATE STATISTICS Fact.OrderHistory

    WITH ROWCOUNT = 3702592;

    GO

    ALTER TABLE [Fact].[OrderHistory] DROP CONSTRAINT [PK_Fact_OrderHistory]

    GO

    ALTER TABLE [Fact].[OrderHistory] ADD  CONSTRAINT [PK_Fact_OrderHistory] PRIMARY
    KEY NONCLUSTERED

    (

    [Order Key] ASC,

    [Order Date Key] ASC

    )

    GO

    ```'
