- fmt: '### Running in Azure Virtual Machine


    When you make the decision to deploy or migrate to `SQL Server 2019`, you may
    want to consider using `SQL Server 2019` in the cloud. One option to run `SQL
    Server 2019` in the cloud is with `Azure Virtual Machine` (which is known as an
    Infrastructure as a Service or `IAAS` environment).


    `Azure Virtual Machine (VM)` allows you to focus on the deployment of the operating
    system (`Windows` or `Linux`) and `SQL Server` and not worry about the hardware
    platform and infrastructure.


    `Azure VM` is known as one of the most frictionless methods to move to the cloud
    for `SQL Server`, because your interaction with `SQL Server` is just like a virtual
    machine in your data center or your environment.


    In reality, that is not 100% true, because there are choices you have to make
    that are specific to `Azure`, including machine sizes, storage, networking, and
    security. We have guidance in our documentation about all of these choices at
    [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview).


    We also provide automation with `Azure Virtual Machine` that you may not be aware
    of. This includes automated backups for `SQL Server` and automated patching for
    both the operating system and `SQL Server`. You can read about automated backups
    at [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2)
    and automated patching at [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching).


    In the summer of 2019, we announced three important updates in `Azure` that are
    helpful for managing `SQL Server` in `Azure Virtual Machine`:


    *   A new `Azure` portal experience, called `Azure SQL`, which simplifies creating
    and managing assets related to `SQL Server` in the cloud.


    Figure [11-6](#479130_1_En_11_Chapter.xhtml#Fig6) shows the new `Azure SQL` portal
    experience.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig6_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig6_HTML.jpg)


    Figure 11-6

    The `Azure SQL` portal experience


    *   A method to `register your Azure Virtual Machine (VM) with SQL Server` with
    our resource provider. This registration applies to scenarios where you install
    `SQL Server` in an `Azure Virtual Machine` instead of using the gallery images.
    It unlocks your `SQL Server` in `Azure VM` to take advantage of `Azure Hybrid
    Benefits`, compliance, automated backup, and automated patching. You can read
    more about this capability at [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider).


    *   `Azure` announced the general availability of `Ultra Disk Storage` or `Ultra
    SSD`. `Ultra SSD` provides low-latency, extremely fast performance in the cloud,
    which matches very well to `I/O`-intensive `SQL Server` workloads. You can read
    about the announcement for `Ultra SSD` at [`https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/`](https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/).
    If you want to see `Ultra Disk Storage` in action with `SQL Server`, check out
    the recording of this `Microsoft Ignite` session in 2018: [`https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/`](https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/).
    If you look about 46 minutes into this recording, you might recognize this presenter
    as he shows `SQL Server` performance with `Ultra Disk Storage`.


    ### SQL Server Migration Assistant


    Some of you reading this book may not be using `SQL Server` or may have other
    assets in your organization for other database products such as `Oracle`, `mySQL`,
    and `DB2`. I covered in Chapter [9](#479130_1_En_9_Chapter.xhtml) how to use `Polybase`
    to access these data sources. But what if you want to migrate your database and
    application from these products to `SQL Server`?


    We have a free tool to assist you with migrations to `SQL Server` (and `Azure`)
    from other “third-party” database solutions. This tool is called the `SQL Server
    Migration Assistant`. The right-hand side of Figure [11-3](#479130_1_En_11_Chapter.xhtml#Fig3)
    shows the possibilities with this tool. You can read more about this tool, how
    to deploy it, and how to use it successfully for a migration at [`https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant).


    Figure [11-7](#479130_1_En_11_Chapter.xhtml#Fig7) shows a screenshot of using
    `SSMS` to migrate from `Oracle`.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg)


    Figure 11-7

    Using `SSMS` to migrate from `Oracle` to `SQL Server`


    `SSMA` comes as a series of tools, one for each type of third-party product supported
    for migration. Like `DMA` and `DEA`, `SSMS` also has a command-line interface
    (`CLI`). You can read more about the syntax of `SSMS` for `Oracle` at [`https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`](https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql).


    ## Summary


    In this chapter, I’ve shown numerous enhancements to `SQL Server 2019` based on
    customer feedback and our experiences working directly with customers. Each of
    these may not seem like major enhancements, but, collectively, they represent
    key innovation to enhance the performance, user experience, and diagnostics of
    `SQL Server`.


    I’ve also discussed how to plan and execute a migration to `SQL Server 2019` including
    tools, strategies, and the use of database compatibility for functional and performance
    protection.


    This chapter marks the end of our journey together in this book with `SQL Server
    2019`. I hope you have enjoyed reading and learning about `SQL Server 2019` as
    much as I enjoyed writing about it. For many of you, this will really be the beginning
    of your journey with `SQL Server 2019`. For me, you will continue to hear me speak
    and talk about `SQL Server 2019`. But I’ll also be looking into the future for
    our next release, our rapid pace of work in the cloud, and the next set of innovation
    that makes `SQL Server` a truly unique product in the industry.


