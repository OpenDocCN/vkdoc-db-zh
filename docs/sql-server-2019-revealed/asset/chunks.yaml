  trans: '

    ## 用户体验


    我们致力于一系列旨在提升用户体验的改进，涵盖错误信息、SQL Server 的安装与配置。


    ### 详细的截断警告


    你知道 SQL Server 史上获得最多投票的客户反馈请求之一是什么吗？那就是改进下面这条错误信息：


    ```

    String or binary data would be truncated

    ```


    这条错误信息（错误号 `8152`）会在您尝试向列中插入或更新数据，而待插入或更新的值超出目标列的大小时发生。这条信息的问题在于*没有提供上下文*——它没有提供表名、列名或即将被截断的具体数据片段。


    在 SQL Server 2019 中，应用程序接收到的默认错误信息是错误号 `2628`，如下所示：


    ```

    String or binary data would be truncated

    in table ''%.*ls'', column ''%.*ls’.

    Truncated value: ''%.*ls''

    ```


    著名的 SQL Tiger Team 成员 Pam Lahoud 在其博客 [`https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/`](https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/)
    中介绍了这一改进，并包含示例。


    在该博客中，她指出您可以在 SQL Server 2017 中使用跟踪标志 `460` 来利用这条更好的错误信息。


    SQL Server 2019 还提供了一个数据库选项，用于更改此错误信息的默认行为，您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql?#verbose-truncation`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql%253F%2523verbose-truncation)
    阅读相关内容。


    ### 安装期间的内存与并行选项


    安装 SQL Server 后最常更改的两个实例配置选项是 "`max server memory`" 和 "`max degree of parallelism`"。


    考虑到这些选项更改的频率，我们现在在 Windows 上安装 SQL Server 时加入了选择这些配置选项的设置项。


    图 11-1 显示了配置并行度的安装选项。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig1_HTML.jpg](img/479130_1_En_11_Fig1_HTML.jpg)


    图 11-1


    在安装期间配置 MaxDOP


    图 11-2 显示了安装期间的内存配置选项。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig2_HTML.jpg](img/479130_1_En_11_Fig2_HTML.jpg)


    图 11-2


    安装期间的内存配置


    请注意，在此图中，SQL Server 安装程序推荐了一个 **`最大服务器内存 (MB)` 值**。我们没有记录如何得出特定值的过程，您可以根据您的环境使用合理的值。我们发现大多数客户使用的值都小于计算机或虚拟机的最大物理内存。我个人认为，这些推荐值所使用的算法，您也可以在
    Tiger Team 工具 `BPCheck` 中找到，该工具位于 [`https://github.com/microsoft/tigertoolbox/tree/master/BPCheck`](https://github.com/microsoft/tigertoolbox/tree/master/BPCheck)。


    ### 资源调控器中的内存授予百分比


    我在第 2 章描述了一个可能因大型内存授予而发生的性能问题。一个有助于控制大型内存授予的解决方案是使用带有 `REQUEST_MAX_MEMORY_GRANT_PERCENT`
    选项的资源调控器。此选项的一个问题是可能的值是 `1` 到 `100` 的整数，代表 SQL Server 最大内存值的一个百分比。即使 `1TB` 的 `1%`
    也是 `10Gb`，这对于内存授予来说可能仍然过多。SQL Server 2019 现在允许 `REQUEST_MAX_MEMORY_GRANT_PERCENT`
    是一个浮点值，这意味着它可以接受小于 `1.0` 的值。


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings)
    阅读更多关于 `REQUEST_MAX_MEMORY_GRANT_PERCENT` 的用法。


    ### 列存储索引压缩估算


    SQL Server 包含一个系统存储过程，用于帮助估算页压缩和行压缩的节省量，名为 `sp_estimate_data_compression_savings`。SQL
    Server 2019 现在增强了此过程，以显示使用列存储索引和列存储存档选项的估计压缩率。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql)
    阅读更多关于使用此过程及其选项的信息。

    '
- fmt: '### Diagnostics


    Diagnostics and troubleshooting used to be my world at Microsoft for 20+ years
    while I worked in Microsoft Support. I still love to see new diagnostic capabilities
    added to the product, even if they seem minor. What may seem minor to some can
    provide huge benefits to others.


    ### You too can be Paul Randal


    Paul Randal has been a long-time friend of mine, both when he worked in Microsoft
    SQL Server engineering and in his long career as the CEO of SQLskills along with
    his wife, Kimberly Tripp. Paul and I both have reputations for internals knowledge,
    and examining the internals of database pages (sometimes called “page cracking”)
    is an important skill to have. Both of us have for years used the undocumented
    and unsupported `DBCC PAGE` command to “hack” a database page. With SQL Server
    2019 comes a pair of system objects to help examine the header of a database page:


    `dm_db_page_info` – This is a system function to return a page header as a one-row
    result of columns for each field in the page header. You can read about this system
    function at [https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql).


    The required input for this function is information to identify a page, which
    is the `database id`, `file id`, and `page number`. There are some scenarios where
    the identifier for a page shows up in the result of column like from a DMV. One
    example is the `wait_resource` of `dm_exec_requests`. A page identifier from `wait_resource`
    is in the form of a page resource string which is `<dbid>:<fileid>:<pageid>`.
    The system function `fn_PageResCracker` takes a page resource string as input
    and returns a `db_id`, `file_id`, and `page_id` result.


    Therefore, you can run a T-SQL statement like this:


    ```

    SELECT page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info;

    ```


    This will extract page header details from a page resource. For a concurrency
    scenario like a page latch wait, this technique can be useful to find out what
    object belongs to the page for the latch wait.


    If you go back to Chapter [2](#479130_1_En_2_Chapter.xhtml), you will find I provided
    you an example to use this technique to see which table was involved in tempdb
    page latch waits:


    ```

    USE tempdb

    GO

    SELECT object_name(page_info.object_id), page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info

    GO

    ```


    Pam Lahoud also wrote a very nice blog post on this small but important engine
    enhancement, which you can read at [https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/).


    ### Diagnostics on statistics


    Statistics are a very important part of query performance. Statistics can be updated
    using a synchronous or asynchronous method, where synchronous means that the query
    must wait for the stats to be updated, and asynchronous means the query can continue,
    but the statistics will be updated in the background. Synchronous statistics updates
    can, in some cases, cause a `SELECT` statement to take longer than normal. SQL
    Server 2019 provides some diagnostics to give you granular information on waiting
    for synchronous statistics updates:


    `WAIT_ON_SYNC_STATISTICS_REFRESH` – This is a new `wait_type` found in `dm_os_wait_stats`.
    It shows the accumulated instance-level time spent on synchronous statistics refresh
    operations.


    `dm_exec_requests` – The `command` column of `sys.dm_exec_requests` will show
    the value of `SELECT (STATMAN)` if a query is waiting for a synchronous statistics
    update operation to complete prior to continuing query execution.


    ### Query Store enhancements


    Query Store is an important capability for performance tuning, benchmarking, and
    troubleshooting. In Chapter [2](#479130_1_En_2_Chapter.xhtml), I showed some examples
    of using the Query Store to compare differences in query performance with Intelligent
    Query Processing.


    The capabilities of Query Store have been enhanced to include the following:


    **Forcing fast-forward and static cursors** – Query Store now supports forcing
    plans that include fast-forward and static cursors.


    **Custom capture policy for the Query Store** – Some customers have had issues
    using Query Store with certain types of workloads. In SQL Server 2019, we have
    added more parameters to help with granular control over what is captured by the
    Query Store. You can find these new options explained using the `QUERY_CAPTURE_POLICY`
    in the documentation at [https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options).
    What better way to interpret how to use the options than from the SQL Server community.
    There may be no one I know who is more passionate about Query Store than Erin
    Stellato, and she has an excellent blog talking about these new options at [www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/](https://www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/).


    ### Plan cache granular control


    There are some cases where you want to manually clear a query or procedure from
    plan cache. One scenario might be to force a query to be recompiled. You can use
    the `ALTER DATABASE SCOPED CONFIGURATION` option `CLEAR PROCEDURE_CACHE` to clear
    plan cache for all queries and objects related to a database. Starting in SQL
    Server 2019, you can clear a plan cache using this statement based on a `plan_handle`.
    You can find a `plan_handle` using a DMV like `dm_exec_query_stats`.


    ### DBCC CLONEDATABASE enhancements


    `DBCC CLONEDATABASE` can be used for troubleshooting purposes to collect the schema
    and statistics from a database, but without user data, into a new database. This
    can allow you to investigate the estimated query plan for a database without having
    to copy all of the actual data.


    SQL Server 2019 enhances `DBCC CLONEDATABASE` by collecting statistics for columnstore
    indexes, which you can read more about at [https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql).


    ### Tip


    Since `DBCC CLONEDATABASE` captures all data in system tables (i.e., the metadata),
    this includes data for the Query Store. This means you can examine Query Store
    performance data offline from the main user database.'
