    \ that are needed for this chapter will fail. If you don’t know what option, you\
    \ should use a syntax like the following when cloning the repo:\n\n```\ngit clone\
    \ --config core.autocrlf=false \n```\n\n**Linux users**\n\nDocker comes in the\
    \ free or Community Edition (CE) or paid Enterprise Edition (EE). For the CE,\
    \ there are various install options depending on your Linux distribution. For\
    \ example, Ubuntu users can install docker from [`https://docs.docker.com/install/linux/docker-ce/ubuntu/`](https://docs.docker.com/install/linux/docker-ce/ubuntu/)\
    \ or [`https://hub.docker.com/search/?type=edition&offering=community`](https://hub.docker.com/search/%253Ftype%253Dedition%2526offering%253Dcommunity)\
    \ .\n\nIf you have Docker EE, there are specific install instructions for Ubuntu,\
    \ RHEL, and SUSE at [`www.docker.com/products/docker-enterprise`](http://www.docker.com/products/docker-enterprise)\
    \ .\n\n**macOS users**\n\nInstall Docker Desktop for Mac from [`https://hub.docker.com/editions/community/docker-ce-desktop-mac`](https://hub.docker.com/editions/community/docker-ce-desktop-mac)\
    \ . The scripts I’ve built for Linux and macOS users preface all docker commands\
    \ with sudo. Although not required on macOS, using sudo works just fine and allows\
    \ for a single set of scripts for either platform."
