    \    Resourcename  State  Healthstatus  Details\n    controldb     ready  healthy\
    \       -\n    control       ready  healthy       -\n    metricsdc     ready \
    \ healthy       DaemonSet metricsdc is healthy\n    metricsui     ready  healthy\
    \       ReplicaSet metricsui is healthy\n    metricsdb     ready  healthy    \
    \   StatefulSet metricsdb is healthy\n    logsui        ready  healthy       ReplicaSet\
    \ logsui is healthy\n    logsdb        ready  healthy       StatefulSet logsdb\
