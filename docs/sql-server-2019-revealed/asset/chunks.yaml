    migration issues with SSIS packages when migrating to Azure SQL Database.


    *   DMA will also support performing the migration of your database to various
    target types like SQL Server 2019\. I only recommend you use this for very small
    migrations or to test a migration of your database.


    Even though DMA is a tool built to run on Windows, you can use this tool for many
    different sources and targets, including SQL Server on Windows and Linux, Azure
    SQL Database, Azure SQL Database Managed Instance, and SQL Server in Azure Virtual
    Machine.


    Figure [11-4](#479130_1_En_11_Chapter.xhtml#Fig4) shows the possible targets for
    an assessment and migration using DMA 4.4.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Targets supported for DMA


    There are a few other nice aspects of DMA you should be aware of:


    *   DMA is a graphical tool on Windows, but also offers a command-line interface
    (CLI) so you can use it in automation scenarios. You can read more about the DMA
    CLI at [`https://docs.microsoft.com/en-us/sql/dma/dma-commandline`](https://docs.microsoft.com/en-us/sql/dma/dma-commandline)
    .


    *   If you want to run an assessment for a large number of SQL Server instances,
    our migration team has provided a method to store the information in a database
    for the purpose of reporting, which you can read about at [`https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports`](https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports)
    .


    *   With this data warehouse of assessment data, you can now build Power BI reports
    on this data. The migration team has also provided a GitHub repo for Power BI
    reports at [`https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport`](https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport)
    .


    Pedro Lopes has a nice walkthrough demo of using DMA in the YouTube video link
    I pointed you to previously in this chapter in the section “The Pam and Pedro
    Show.”


    We have a great database migration team, and you will find some of their blog
    posts on the topic very valuable at [`https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration`](https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration)
    .'
  trans: '

    ## 商业智能方面如何？


    SQL Server 产品自带商业智能 (BI) 功能，包括 SQL Server Analysis Services (`SSAS`) 和 SQL Server
    Reporting Services (`SSRS`)。


    `SSRS` 和 `SSAS` 都是 SQL Server 各个版本许可的一部分（`SSAS` 仅包含在企业版和标准版中）。


    在 SQL Server 2019 中，`SSRS` 没有新的增强功能。需要重点注意的是，Power BI 报表服务器（其更新节奏与 SQL Server
    版本发布不同）是 SQL Server 企业版许可的一部分。您可以在此处阅读更多关于 Power BI 报表服务器的信息：[`https://docs.microsoft.com/en-us/power-bi/report-server/get-started#licensing-power-bi-report-server`](https://docs.microsoft.com/en-us/power-bi/report-server/get-started%2523licensing-power-bi-report-server)。


    在 SQL Server 2019 中，`SSAS` 确实提供了新功能；您可以在此处阅读关于这些增强功能的信息：[`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?#analysis-services`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253F%2523analysis-services)。


    ## 迁移到 SQL Server 2019


    当您决定将一个、多个或所有实例迁移到 SQL Server 2019 时，制定一个迁移计划总是明智的。在本节中，我将讨论一些工具和资源，它们在您做出决策和制定迁移到
    SQL Server 2019 的计划时会有所帮助。


    ### Pam 和 Pedro 的展示


    这不是一个新的电视剧，但它听起来确实有点像。它代表了我的同事 Pam Lahoud 和 Pedro Lopes 一直在向客户和社区宣讲和培训的关于如何规划成功迁移到更新版本
    SQL Server 的方法。Pam 和 Pedro 将此过程称为 `现代化正确之路`。与其尝试重复 Pam 和 Pedro 在其培训中使用的所有信息，不如您自己观看视频？我强烈建议您坐下来，按照自己的节奏观看
    YouTube 上由 Pam 和 Pedro 关于此主题进行的 1 小时演讲视频：[`www.youtube.com/watch?v=5RPkuQHcxxs`](https://www.youtube.com/watch%253Fv%253D5RPkuQHcxxs)。


    在我的演示文稿中，我也使用了一张关于迁移流程以及您可能考虑使用的工具的幻灯片，如图 11-3 所示。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig3_HTML.jpg](img/479130_1_En_11_Fig3_HTML.jpg)


    图 11-3

    SQL Server 的迁移流程和工具


    Pam 和 Pedro 在他们的培训中讨论了这些工具。本章的剩余部分，我将回顾这个流程以及图 11-3 中的工具。


    ### 数据库迁移助手


    `数据库迁移助手 (DMA)` 是一个可免费下载并在 Windows 计算机上运行的工具，用于评估现有 SQL Server 实例的配置和代码，并查看迁移到新版本时可能遇到的任何问题。Pedro
    在我之前提到的视频中向您展示了该工具的演练，但请允许我再为您提供一些关于该工具的详细信息，以及为什么我认为您应该强烈考虑使用它。


    `DMA` 比其前身工具 `数据库升级顾问` 强大得多。`DMA` 具备这些主要功能：


    *   评估您的 SQL Server 迁移可能遇到的阻碍（`DMA` 也支持将 `Amazon Relational Database Service (RDS)`
    作为源）。这包括查看使用各种数据库兼容级别选项在迁移过程中能为您提供什么。这些阻碍可能包括中断性变更、行为变更和已弃用功能。我将在“数据库兼容性”一节中更详细地讨论这些术语。

    *   基于对您当前部署的评估，发现 SQL Server 新版本中的新功能；`DMA` 足够智能，可以识别可能为您带来益处的功能。一些新功能推荐的例子包括
    `列存储索引`、`Always Encrypted`、`透明数据加密 (TDE)` 和 `动态数据屏蔽`。

    *   虽然与 SQL Server 2019 没有直接关系，但在迁移到 `Azure SQL Database` 时，`DMA` 也会评估 `SSIS`
    包的迁移问题。

    *   `DMA` 还支持将您的数据库执行迁移到各种目标类型，如 SQL Server 2019。我只建议您将此用于非常小的迁移或测试数据库迁移。


    尽管 `DMA` 是一个构建在 Windows 上运行的工具，但您可以将此工具用于许多不同的源和目标，包括 Windows 和 Linux 上的 SQL Server、`Azure
    SQL Database`、`Azure SQL Database 托管实例` 以及 `Azure 虚拟机` 中的 SQL Server。


    图 11-4 显示了使用 `DMA 4.4` 进行评估和迁移可能的目标。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg](img/479130_1_En_11_Fig4_HTML.jpg)


    图 11-4

    `DMA` 支持的目标


    您还应该了解 `DMA` 的一些其他优点：


    *   `DMA` 在 Windows 上是一个图形化工具，但也提供命令行界面 (`CLI`)，以便您可以在自动化场景中使用它。您可以在此处阅读更多关于 `DMA`
    `CLI` 的信息：[`https://docs.microsoft.com/en-us/sql/dma/dma-commandline`](https://docs.microsoft.com/en-us/sql/dma/dma-commandline)。

    *   如果您想对大量 SQL Server 实例运行评估，我们的迁移团队提供了一种方法，可以将信息存储在数据库中以便生成报告，您可以在此处阅读相关信息：[`https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports`](https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports)。

    *   凭借这个评估数据仓库，您现在可以基于这些数据构建 `Power BI` 报告。迁移团队还为 `Power BI` 报告提供了一个 `GitHub`
    仓库：[`https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport`](https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport)。


    Pedro Lopes 在本章前面“Pam 和 Pedro 的展示”一节中指向您的 YouTube 视频链接中，有一个很好的使用 `DMA` 的演示演练。


    我们有一个出色的数据库迁移团队，您可以在 [`https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration`](https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration)
    找到他们关于此主题的一些非常有价值的博客文章。

    '
- fmt: "### Database Experimentation Assistant\n\n评估数据库迁移和 SQL Server 部署是基于你的 SQL\
    \ Server 和数据库（包括存储过程等 T-SQL 代码）的配置。然而，这种评估对于迁移 SQL Server 可能出现的问题来说是相当静态的。\n\n\
    因此，迁移的一个重要环节是性能。对你的 SQL Server 应用程序执行尽可能多的性能测试，是成功迁移最关键的环节之一。`Database Experimentation\
    \ Assistant (DEA)` 可以成为一个非常强大的工具，帮助你实现这一目标。其目的是使用 `DEA` 告知你，应用程序中的哪些查询在新的目标 `SQL\
    \ Server` 版本上会运行得更好、更差或保持不变。此外，`DEA` 还可以告诉你是否有任何查询可能会失败，例如，由于兼容性问题。\n\n`DEA` 的文档可以在\
    \ [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview)\
    \ 找到，其中包含指向下载该工具的链接。该工具是免费的，运行在 `Windows` 上，但可用于评估向 `Linux` 上的 `SQL Server` 的迁移。\n\
    \n要正确使用 `DEA`，你可能最多需要四个 `SQL Server` 实例：\n\n*   源 `SQL Server`，用于捕获工作负载\n*   两个目标\
    \ `SQL Server`，用于重放捕获的工作负载跟踪\n*   一个 `SQL Server` 用于存储分析结果和运行报告（你需要一个数据库来存储结果，因此它实际上可以存在于其中一个目标\
    \ `SQL Server` 实例上）\n\n使用 `DEA` 的基本流程如下：\n\n1.  备份源 `SQL Server` 上的数据库。\n2.  使用\
    \ `DEA` 工具捕获工作负载的跟踪，该工具可以使用 `SQL Server Trace` 或 `Extended Events`。如果你在早于 `SQL\
    \ Server 2012` 的版本上捕获工作负载，则必须使用 `SQL Server Trace`，因为 `Extended Events` 在 `SQL\
    \ Server 2008` 中没有所需的事件。`DEA` 确实支持 `SQL Server 2005`，但你必须使用 `SQLTrace`（对于任何 `2012`\
    \ 之前的 `SQL Server` 版本，都必须使用 `SQLTrace`）。\n\n    为了充分利用 `DEA` 工具，你需要捕获一个能代表应用程序的工作负载跟踪。`DEA`\
    \ 工具允许捕获时长从 `5` 分钟到 `3` 小时不等。你可能有一个测试服务器可以在其上为应用程序捕获跟踪，或者可能需要针对生产 `SQL Server`\
    \ 运行它。\n\n3.  准备重放跟踪：将步骤 `1` 中的备份还原到两个目标 `SQL Server` 实例：\n\n    **目标服务器 #1**\
    \ – 与步骤 `2` 中捕获跟踪的源相同版本的 `SQL Server`。你通常不希望使用你的生产 `SQL Server`。\n\n    **目标服务器\
    \ #2** – 你要迁移到的新版本 `SQL Server`，可以是 `Linux` 上的 `SQL Server`。\n\n    你应该将这些 `SQL\
    \ Server` 实例的环境（在 `CPU`、内存、磁盘速度和 `SQL Server` 配置方面）设置得尽可能接近相同。\n\n4.  使用 `DEA`\
    \ 工具在两个目标 `SQL Server` 上重放步骤 `2` 中捕获的跟踪。`DEA` 工具将要求提供一个位置来保存重放的跟踪。\n5.  使用 `DEA`\
    \ 工具分析两个捕获的重放跟踪，以便比较跟踪中查询的性能或可能的错误。`DEA` 工具将提示你提供一个 `SQL Server` 数据库来存储分析结果以及步骤\
    \ `4` 中重放跟踪的位置。\n\n### 提示\n\n早期版本的 `DEA` 要求你使用 `SQL Server` 中一个称为分布式重放（`Distributed\
    \ Replay`）的功能。你仍然可以使用该方法，但自 `DEA` 版本 `2.6` 起，你可以使用 **InBuilt** 重放方法。`InBuilt`\
    \ 重放方法在内部使用一个名为 `ostress.exe` 的工具（我在第 `2` 章向你介绍过这个工具）。它在 `SQL Server` 团队和社区中仍然是一个著名的工具，由我终生的朋友\
    \ `Keith Elmore` 和 `Robert Dorr` 在微软开发。\n\n我强烈建议你在执行任何主要的 `SQL Server` 迁移之前先看看\
    \ `DEA`。`Pedro Lopes` 在本章前面指向你的 YouTube 视频链接“The Pam and Pedro Show”中有一个很好的 `DEA`\
    \ 报告演示。\n\n以下是关于使用 `DEA` 工具的一些提示和注意事项：\n\n*   `DEA` 附带报告工具来查看重放的分析结果。你可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report)\
    \ 阅读更多关于 `DEA` 报告的信息。\n*   `DEA` 还允许你通过命令行界面（`CLI`）自动化执行，你可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt)\
    \ 阅读更多相关信息。\n\n### 升级到 SQL Server 2019\n\n在你完成所有评估并准备好继续升级后，你有以下选择。\n\n#### 就地升级\n\
    \n这是通过在同一台计算机上运行安装程序来直接升级 `SQL Server` 的过程。虽然此过程得到微软对生产环境企业级安装的完全支持，但我不推荐它，除非是滚动升级的情况，我将在本章后面讨论。这不是微软的官方立场，而是我根据在微软支持部门与客户合作多年的经验提出的建议。即使你选择此选项，在执行升级之前，**务必**\
    \ 确保你拥有来自先前版本 `SQL Server` 的完整备份。事实上，我实际上建议你捕获服务器或虚拟机的完整映像，以便在需要时能够快速回滚到生产服务器的确切快照。\n\
    \n### 注意\n\n`Linux` 上的 `SQL Server` 也支持就地升级，方法是将存储库更改为新版本的 `SQL Server` 并运行包管理器更新（例如，`yum\
    \ update mssql-server`）。\n\n有一种称为*滚动升级*的就地升级变体。你可以在 `Always On` 故障转移群集实例或 `Always\
    \ On` 可用性组中使用此方法。我将在“实时迁移”一节中讨论此选项。\n\n不要忘记我在第 `7` 章“更新 SQL Server 的新方法”一节中描述的可能使用容器的升级方案。\n\
    \n```\nyum update mssql-server\n```"
  raw: "### Database Experimentation Assistant\n\nAssessing the migration of your\
    \ database and SQL Server deployment is based on the configuration of your SQL\
    \ Server and databases (including your T-SQL code like stored procedures). However,\
    \ this assessment is fairly static for possible issues to migrate your SQL Server.\n\
    \nTherefore, one important piece of the migration is performance. Executing as\
    \ much performance testing of your SQL Server application is one of the most critical\
    \ aspects to a successful migration. **Database Experimentation Assistant (DEA)**\
    \ can be a very powerful tool to help you achieve that goal. The goal is to use\
    \ DEA to tell you what queries from your application will run better, worse, or\
    \ the same on the new target version of SQL Server. In addition, DEA can tell\
    \ you if any queries might fail, for example, due to a compatibility issue.\n\n\
    The DEA documentation can be found at [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview)\
    \ , including a pointer to download the tool. The tool is free and runs on Windows,\
    \ but can be used to assess migrations to SQL Server on Linux.\n\nTo use DEA correctly,\
    \ it is possible you will need up to four SQL Server instances:\n\n*   The source\
    \ SQL Server to capture your workload\n\n*   Two target SQL Servers to replay\
    \ the captured workload traces\n\n*   One SQL Server to store analysis and run\
    \ reports (you need a database to store the results, so it could actually exist\
    \ on one of the target SQL Server instances)\n\nThe basic flow for using DEA is\
    \ as follows:\n\n1.  Back up the database on the source SQL Server.\n\n2.  Capture\
    \ a trace of your workload using the DEA tool, which can use SQL Server Trace\
    \ or Extended Events. SQL Server Trace is required if you are capturing a workload\
    \ on a SQL Server version earlier than SQL Server 2012, because Extended Events\
    \ does not have the required events in SQL Server 2008\\. DEA does support SQL\
    \ Server 2005, but you must use SQLTrace (you must use SQLTrace for any SQL Server\
    \ version prior to 2012).\n\n    In order to make the best use of the DEA tool,\
    \ you need to capture a trace of your workload that is representative of the application.\
    \ The DEA tool allows for captures that range from 5 minutes up to 3 hours. You\
    \ may have a test server where you can capture a trace for your application, or\
    \ you may need to run it against the production SQL Server.\n\n3.  Prepare replaying\
    \ traces by restoring the backup in Step 1 to two target SQL Server instances:\n\
    \n    **Target Server #1** – A version of SQL Server that is the same as the source\
    \ from the captured trace in Step 2\\. You generally do not want to use your production\
    \ SQL Server.\n\n    **Target Server #2** – The new version of SQL Server you\
    \ are migrating toward, which can be SQL Server on Linux.\n\n    You should set\
    \ up these SQL Server instances with environments as close to identical as possible\
    \ in terms of CPU, Memory, disk speeds, and SQL Server configurations.\n\n4. \
    \ Use the DEA tool to replay the captured trace from Step 2 on both target SQL\
    \ Servers. The DEA tool will ask for a location to save a trace of the replay.\n\
    \n5.  Use the DEA tool to analyze the two captured replay traces so you can compare\
    \ performance or possible errors from queries in the trace. The DEA tool will\
    \ prompt you for a SQL Server database to store the analysis results and the location\
    \ of the replayed traces from Step 4.\n\n### Tip\n\nEarlier versions of DEA required\
    \ you to use a feature in SQL Server called Distributed Replay. You can still\
    \ use that method, but, as of DEA version 2.6, you can use the **InBuilt** replay\
    \ method. The InBuilt replay method internally uses a tool called ostress.exe\
    \ (I introduced you to this tool in Chapter [2](#479130_1_En_2_Chapter.xhtml)).\
    \ It is still a famous tool within the SQL Server team and community and was developed\
    \ by my lifetime friends at Microsoft, Keith Elmore and Robert Dorr.\n\nI highly\
    \ recommend you take a look at DEA before you perform any major migration of SQL\
    \ Server. Pedro Lopes has a nice walkthrough demo of DEA reports in the YouTube\
    \ video link I pointed you to previously in this chapter in the section “The Pam\
    \ and Pedro Show.”\n\nHere are a few tips and notes about using the DEA tool:\n\
    \n*   DEA comes with reporting tools to view an analysis of the replays. You can\
    \ read more about DEA reports at [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report)\
    \ .\n\n*   DEA also allows you to automate execution from a command-line interface\
    \ (CLI), which you can read more about at [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt)\
    \ .\n\n### Upgrading to SQL Server 2019\n\nAfter you perform all of your assessments\
    \ and you are ready to proceed with an upgrade, you have the following choices.\n\
    \n#### In-Place Upgrade\n\nThis is the process of directly upgrading SQL Server\
    \ by running setup on the same computer as the SQL Server installation. While\
    \ this process is completely supported by Microsoft for enterprise production\
    \ installations, I don’t recommend it, except in the case of rolling upgrades,\
    \ which I’ll discuss later in this chapter. This is not an official Microsoft\
    \ position, but my own recommendation based on years of experience working with\
    \ customers in Microsoft Support. Even if you choose this option, ALWAYS ensure\
    \ you have a complete backup of your SQL Server databases from the previous version\
    \ of SQL Server before you perform the upgrade. In fact, I actually recommend\
    \ you capture a complete image of the server or virtual machine, so that you could\
    \ rapidly roll back the exact snapshot of your production server should that be\
    \ needed.\n\n### Note\n\nSQL Server on Linux also supports an in-place upgrade\
    \ by changing the repository to the new version of SQL Server and running a package\
    \ manager update (e.g., yum update mssql-server).\n\nThere is a variation of an\
    \ in-place upgrade called a *rolling upgrade*. You can use this method with Always\
    \ On Failover Cluster Instance or Always On Availability Groups. I’ll discuss\
    \ this option in the section “Live Migration.”\n\nDon’t forget about the possible\
    \ upgrade scenario using containers as I described in Chapter [7](#479130_1_En_7_Chapter.xhtml),\
    \ in the section “A New Way to Update SQL Server.”"
  trans: "\n### 数据库实验助手\n\n评估数据库迁移和 SQL Server 部署是基于你的 SQL Server 和数据库（包括存储过程等 T-SQL\
    \ 代码）的配置。然而，这种评估对于迁移 SQL Server 可能出现的问题来说是相当静态的。\n\n因此，迁移的一个重要环节是性能。对你的 SQL Server\
    \ 应用程序执行尽可能多的性能测试，是成功迁移最关键的环节之一。`Database Experimentation Assistant (DEA)` 可以成为一个非常强大的工具，帮助你实现这一目标。其目的是使用\
    \ `DEA` 告知你，应用程序中的哪些查询在新的目标 `SQL Server` 版本上会运行得更好、更差或保持不变。此外，`DEA` 还可以告诉你是否有任何查询可能会失败，例如，由于兼容性问题。\n\
    \n`DEA` 的文档可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview)\
    \ 找到，其中包含指向下载该工具的链接。该工具是免费的，运行在 `Windows` 上，但可用于评估向 `Linux` 上的 `SQL Server` 的迁移。\n\
    \n要正确使用 `DEA`，你可能最多需要四个 `SQL Server` 实例：\n\n*   源 `SQL Server`，用于捕获工作负载\n*   两个目标\
    \ `SQL Server`，用于重放捕获的工作负载跟踪\n*   一个 `SQL Server` 用于存储分析结果和运行报告（你需要一个数据库来存储结果，因此它实际上可以存在于其中一个目标\
    \ `SQL Server` 实例上）\n\n使用 `DEA` 的基本流程如下：\n\n1.  备份源 `SQL Server` 上的数据库。\n2.  使用\
    \ `DEA` 工具捕获工作负载的跟踪，该工具可以使用 `SQL Server Trace` 或 `Extended Events`。如果你在早于 `SQL\
    \ Server 2012` 的版本上捕获工作负载，则必须使用 `SQL Server Trace`，因为 `Extended Events` 在 `SQL\
    \ Server 2008` 中没有所需的事件。`DEA` 确实支持 `SQL Server 2005`，但你必须使用 `SQLTrace`（对于任何 `2012`\
    \ 之前的 `SQL Server` 版本，都必须使用 `SQLTrace`）。\n\n    为了充分利用 `DEA` 工具，你需要捕获一个能代表应用程序的工作负载跟踪。`DEA`\
    \ 工具允许捕获时长从 `5` 分钟到 `3` 小时不等。你可能有一个测试服务器可以在其上为应用程序捕获跟踪，或者可能需要针对生产 `SQL Server`\
    \ 运行它。\n\n3.  准备重放跟踪：将步骤 `1` 中的备份还原到两个目标 `SQL Server` 实例：\n\n    **目标服务器 #1**\
    \ – 与步骤 `2` 中捕获跟踪的源相同版本的 `SQL Server`。你通常不希望使用你的生产 `SQL Server`。\n\n    **目标服务器\
    \ #2** – 你要迁移到的新版本 `SQL Server`，可以是 `Linux` 上的 `SQL Server`。\n\n    你应该将这些 `SQL\
    \ Server` 实例的环境（在 `CPU`、内存、磁盘速度和 `SQL Server` 配置方面）设置得尽可能接近相同。\n\n4.  使用 `DEA`\
    \ 工具在两个目标 `SQL Server` 上重放步骤 `2` 中捕获的跟踪。`DEA` 工具将要求提供一个位置来保存重放的跟踪。\n5.  使用 `DEA`\
    \ 工具分析两个捕获的重放跟踪，以便比较跟踪中查询的性能或可能的错误。`DEA` 工具将提示你提供一个 `SQL Server` 数据库来存储分析结果以及步骤\
    \ `4` 中重放跟踪的位置。\n\n### 提示\n\n早期版本的 `DEA` 要求你使用 `SQL Server` 中一个称为分布式重放（`Distributed\
    \ Replay`）的功能。你仍然可以使用该方法，但自 `DEA` 版本 `2.6` 起，你可以使用 **内置** 重放方法。**内置** 重放方法在内部使用一个名为\
    \ `ostress.exe` 的工具（我在第 `2` 章向你介绍过这个工具）。它在 `SQL Server` 团队和社区中仍然是一个著名的工具，由我终生的朋友\
    \ `Keith Elmore` 和 `Robert Dorr` 在微软开发。\n\n我强烈建议你在执行任何主要的 `SQL Server` 迁移之前先看看\
    \ `DEA`。`Pedro Lopes` 在本章前面指向你的 YouTube 视频链接“The Pam and Pedro Show”中有一个很好的 `DEA`\
    \ 报告演示。\n\n以下是关于使用 `DEA` 工具的一些提示和注意事项：\n\n*   `DEA` 附带报告工具来查看重放的分析结果。你可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report)\
    \ 阅读更多关于 `DEA` 报告的信息。\n*   `DEA` 还允许你通过命令行界面（`CLI`）自动化执行，你可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt)\
    \ 阅读更多相关信息。\n\n### 升级到 SQL Server 2019\n\n在你完成所有评估并准备好继续升级后，你有以下选择。\n\n#### 就地升级\n\
    \n这是通过在同一台计算机上运行安装程序来直接升级 `SQL Server` 的过程。虽然此过程得到微软对生产环境企业级安装的完全支持，但我不推荐它，除非是滚动升级的情况，我将在本章后面讨论。这不是微软的官方立场，而是我根据在微软支持部门与客户合作多年的经验提出的建议。即使你选择此选项，在执行升级之前，**务必**\
    \ 确保你拥有来自先前版本 `SQL Server` 的完整备份。事实上，我实际上建议你捕获服务器或虚拟机的完整映像，以便在需要时能够快速回滚到生产服务器的确切快照。\n\
    \n### 注意\n\n`Linux` 上的 `SQL Server` 也支持就地升级，方法是将存储库更改为新版本的 `SQL Server` 并运行包管理器更新（例如，`yum\
    \ update mssql-server`）。\n\n有一种称为*滚动升级*的就地升级变体。你可以在 `Always On` 故障转移群集实例或 `Always\
    \ On` 可用性组中使用此方法。我将在“实时迁移”一节中讨论此选项。\n\n不要忘记我在第 `7` 章“更新 SQL Server 的新方法”一节中描述的可能使用容器的升级方案。\n\
    \n```\nyum update mssql-server\n```\n"
- fmt: '#### Restore a Database


    This is perhaps the most common method to upgrade SQL Server (outside of a rolling
    upgrade). The SQL Server engine understands how to `upgrade` a database when it
    is restored (technically SQL Server knows how to upgrade a database when it is
    brought online which is how an in-place upgrade works). Therefore, many customers
    choose to install SQL Server on a different computer or virtual machine for a
    migration and restore their databases from an older version of SQL Server.


    It is not possible to restore an upgraded database from a major version back down
    to an older major version. For example, you cannot restore a backup from SQL Server
    2019 to SQL Server 2017 (but as I showed you in Chapter [7](#479130_1_En_7_Chapter.xhtml),
    you can switch between cumulative updates within a major version).


    For SQL Server 2019, you will be able to restore databases from SQL Server 2008
    or later. This includes the ability to restore from SQL Server on Windows to a
    SQL Server 2019 on Linux, since databases are fully compatible across operating
    system platforms. If you have a database backup from a version of SQL Server prior
    to SQL Server 2008, you will need to perform a “jump” process by restoring the
    backup to a supported version of SQL Server (as early as 2008), then back up from
    there and perform another restore to SQL Server 2019.


    One of the key pillars to help reduce problems with migration is that when a database
    is restored to a new version of SQL Server, `the database compatibility level
    is retained` from the older SQL Server version. I’ll discuss more about this concept
    in the section later in the chapter called “Database Compatibility.”


    #### SQL Server Integration Services (SSIS) or Bulk Import/Export


    Another method to migrate your database to SQL Server 2019 is to export and import
    the data using SQL Server Integration Services (SSIS) or other tools for bulk
    export/import.


    I’ve seen some customers use this method when they need to perform transformations
    or structural changes to the overall database design or schema. In other words,
    instead of just moving the database “as is,” some customers `migrate the application`
    with a move to a new version of SQL Server. This includes changes to the database
    schema. Another technique I’ve seen for transformation is to restore the database
    from a previous version and then run build code on the new version of SQL Server
    to redesign certain tables or stored procedures.


    #### Live Migration


    Restoring a database requires downtime for the application and users. What if
    your business requirements require a very small amount of downtime? In these scenarios,
    you may consider using some techniques, such as


    `Rolling upgrade`


    One popular option if you are using an Always On Failover Cluster Instance or
    Always On Availability Group is a rolling upgrade. Both of these options are possible
    with SQL Server 2019, and a rolling upgrade is one of the reasons customers use
    these High Availability solutions.


    Always On Failover Cluster Instance supports rolling upgrades, provided the SQL
    Server version on the current cluster is supported for an in-place upgrade scenario.
    You can read more about rolling upgrades for an Always On Failover Cluster Instance
    at [`https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance`](https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance)
    .


    Always On Availability Groups are only supported back to SQL Server 2012, since
    that is the first version where this technology was available. This rolling upgrade
    option has many options and is probably the most preferred method for an enterprise
    live migration scenario for SQL Server. You can read about this option at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances)
    .


    SQL Server 2017 also introduced a new feature for Availability Groups called `Clusterless`
    Availability Groups. A Clusterless Availability Group does not require underlying
    failover clustering software. It is also possible to perform a live migration
    using this technology, and it could be one of your best options to migrate from
    SQL Server 2017 to SQL Server on Linux. You can read more about this option at
    [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform)
    .


    `Log Shipping`


    A more basic method for a live migration is to use Log Shipping. Log Shipping
    is a simple technology that uses SQL Server database and transaction log backups
    and restores to synchronize data to a secondary SQL Server. You can read about
    Log Shipping at [`https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server)
    . This is a form of a `manual` rolling upgrade that does not require any Always
    On technologies.


    You can read through the process of upgrading with Log Shipping at [`https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql`](https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql)
    .


    `Replication`


    Our documentation provides details on how to upgrade a complete SQL Server replication
    topology at [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases)
    . One interesting idea (I was inspired by Amit Banerjee on this idea when we visited
    a customer together) is to use SQL Server Replication for a live migration, even
    if you don’t need replication as a strategy.


    Since a subscriber in a replication topology can be a newer version of SQL Server
    than the distributor and publisher, you could use the subscriber as your new primary.
    In other words, you could set a subscriber with SQL Server 2019, with an older
    version of SQL Server as the distributor and publisher. As your apps and users
    are writing against the older publisher, your SQL Server 2019 subscriber has all
    the latest data. When you are ready for a cutover, disable replication and point
    all users to the new SQL Server 2019 database (which `was` the subscriber). It
    sounds simple, but there will be some downtime, and it may be painful to set up
    and disable replication. Disabling replication does not remove data in the subscriber
    database, and this is documented at [`https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution`](https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution)
    .


    ### Database Compatibility


    Database compatibility is designed to `provide backward compatibility` as you
    migrate to a newer version of SQL Server. You should use the following resource
    for all terminology and details about database compatibility: [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)
    .


    One of the first things you should understand is how database compatibility levels
    correspond to the default level for a SQL Server version. You can see this list
    at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#syntax`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523syntax)
    . As an example, the default database compatibility level of SQL Server 2012 is
    110.'
