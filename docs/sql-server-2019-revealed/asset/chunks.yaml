    Java）时，我们也需要确保其同样适用于 Linux。


    ### 在 Linux 上部署 SQL Server 机器学习服务


    与 Windows 上的 SQL Server 类似，对于 Linux 上的 SQL Server 机器学习，我们会帮助您安装必要的包来部署 R 和 Python
    脚本。


    我们为您提供了部署 SQL Server 机器学习服务的选择——`minimal`、`full` 或 `combo`。它们的功能如下：


    `full` – 包含 R 或 Python 的所有包，并包括可用于机器学习的预训练模型。此包名为 `mssql-mlservices-mlm-r` 或 `mssql-mlservices-mlm-py`。当您使用此选项时，所有依赖包（如
    R Open）也会被安装。


    `minimal` – 包含 R 或 Python 的所有包，但不包含预训练模型。此包名为 `mssql-mlservices-packages-r` 或
    `mssql-mlservices-packages-py`。所有依赖包（如 R Open）也会被安装。


    `combo` – 一步安装 SQL Server 2019（数据库引擎）和 SQL Server 机器学习服务。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#install-all`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523install-all)
    阅读如何操作。


    当我为 R 安装完整版 SQL Server 机器学习服务时，安装的包如图 6-3 所示。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg](img/479130_1_En_6_Fig3_HTML.jpg)


    图 6-3


    为 R 安装完整的 SQL Server 机器学习服务


    ### 提示


    如果您正在寻找一种通过 SSH 连接到 Linux 上 SQL Server 的好方法，可以使用 Azure Data Studio 中的终端选项，正如您将在本章示例中看到的。


    请注意，安装的包之一是 `mssql-server-extensibility`，我将在本章后面描述，它是语言扩展的可扩展性框架所必需的（同一个框架既用于
    SQL Server 机器学习服务，也用于语言扩展）。


    部署完成后，您需要执行一些安装后步骤，例如接受 R 或 Python 的最终用户许可协议。请按照 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#post-install-config-required`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523post-install-config-required)
    文档中的步骤操作。


    我还建议，就像在 Windows 上一样，使用 “hello world” 示例来验证安装是否成功。R 的示例如下 T-SQL 语句：


    ```

    EXEC sp_execute_external_script

    @language =N''R'',

    @script=N''

    OutputDataSet <- InputDataSet'',

    @input_data_1 =N''SELECT 1 AS hello''

    WITH RESULT SETS (([hello] int not null));

    GO

    ```


    也有可能您、数据科学家或数据工程师需要额外的 R 或 Python 库用于您的应用程序。请使用 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#add-more-rpython-packages`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523add-more-rpython-packages)
    文档中的以下指南了解如何添加此代码。


