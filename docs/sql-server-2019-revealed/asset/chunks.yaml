    # 注意


    本文件夹中唯一不能使用的两个示例是 `hdfs` 和 `saphana`。在 BDC 中，HDFS 数据通过 `sqlhdfs` 连接器访问。目前 BDC
    不支持所需的用于 SAP HANA 的 ODBC 连接器。


    我认为你可能会更有兴趣使用示例通过 `sqlhdfs` 和 `sqldatapool` 连接器来访问数据。


    我建议你首先按照以下文档页面的说明加载用于使用 BDC 的示例数据：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data)。我执行了这些说明，加载此数据没有问题。在此示例中，你将使用
    curl 将 csv 文件目录加载到 HDFS 中。此示例使用来自 Knox 网关的 `WebHDFS` ([`https://hadoop.apache.org/docs/r1.0.4/webhdfs.html`](https://hadoop.apache.org/docs/r1.0.4/webhdfs.html))
    端点，该网关被称为 `HDFS 文件系统代理`。


    加载数据后，你现在可以按照教程访问 HDFS 数据：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool)。你可能还会觉得尝试
    Azure Data Studio 附带的 **外部表向导** 作为在 BDC 中创建映射到 HDFS 数据的外部表的另一种方式很有趣：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv)。


    你可能需要从 IOT 设备等来源将数据直接摄取到 BDC 的 HDFS 中。我们的文档中有如何直接与 BDC 中的 HDFS 交互的示例：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl`](https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl)。


    此外，Azure Data Studio 包含直接浏览和处理 HDFS 中文件的功能，如图 10-13 所示。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig13_HTML.jpg](img/479130_1_En_10_Fig13_HTML.jpg)


    图 10-13

    使用 Azure Data Studio 在 BDC 中处理 HDFS


    Buck Woody 创建了一个名为 `SQL Server 大数据集群 – 架构` 的研讨会，并有一套可以与 ADS 一起使用的 Notebooks，用于了解数据虚拟化如何与
    BDC 协同工作。你可以在 [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks)
    尝试这些 Notebooks，使用教程 00、01 和 02 作为基础的数据虚拟化 notebooks。


    # 使用数据池


    我在本书中将数据池描述为数据缓存。使用数据池的过程是根据来自其他数据源的查询摄取或插入数据，这些数据源可以是 SQL Server 主实例表、来自 HDFS
    的外部数据源或任何其他 Polybase 连接器。


    数据会自动分片分布到数据池中的 Pod 上，并通过聚集列存储索引优化读取访问。


    我建议你阅读我们文档中的示例，以了解使用数据池的基础知识：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql)。


    Buck Woody 在教程 03 中的研讨会展示了如何在 BDC 中使用数据池：[`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb)。


    # 使用 Spark


    Spark ([`https://spark.apache.org/`](https://spark.apache.org/)) 是一个常用于 Hadoop
    系统的计算引擎。BDC 自动提供了运行 Spark 作业以满足各种应用需求的功能。在 BDC 中运行 Spark 作业有几种方法，我将在本节中讨论。你可以运行其中一些示例，以了解
    Spark 如何与 BDC 协同工作。如果你是 Spark 新手，在向 BDC 提交 Spark 作业之前，你需要首先考虑为什么想使用 Spark。有一些非常好的场景，其中
    Spark 可以是处理 HDFS 中数据的有效方法，这就是为什么我们将 Spark 作为整个 BDC 解决方案的一部分。你还会发现 Spark 是机器学习场景中常用的解决方案，我将在本章后面的“机器学习与大数据集群”一节中详细讨论。


    ## 从 Azure Data Studio 运行 Spark 作业


    Spark 可能有用的一个场景是将存储池中 HDFS 的数据摄取到 BDC 中数据池的表中。


    运行 Spark 作业的一种方法是使用直接连接到 SQL Server 主实例的 Azure Data Studio。图 10-14 展示了如何使用 Azure
    Data Studio (ADS) 运行 Spark 作业的示例。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig14_HTML.jpg](img/479130_1_En_10_Fig14_HTML.jpg)


    图 10-14

    在 Azure Data Studio 中提交 Spark 作业


    有关直接使用 ADS 提交 Spark 作业的更多信息，请访问：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job)。


    ## 从其他工具运行 Spark 作业


    我们还支持使用名为 `IntelliJ` 的工具向 BDC 提交 Spark 作业，你可以阅读：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin)。你也可以使用
    `Visual Studio Code` 向 BDC 提交 Spark 作业，相关说明请阅读：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode)。在这两种场景中，你都将使用
    `访问 HDFS 文件、Spark 的网关` 端点连接到 BDC 以运行 Spark 作业。


    BDC 还提供了一个用于提交 Spark 作业的 REST 端点，称为 `Livy` ([`https://livy.apache.org/`](https://livy.apache.org/))。Livy
    端点通过作为 `<knox-ip>` 一部分的代理提供，称为 `运行 Spark 语句、作业、应用程序的代理`。


    也许你在 BDC 上下文中使用 Spark 最常见的方法是通过 Azure Data Studio (ADS) 的 Notebooks。在本章之前，我已经向你展示了许多使用
    ADS Notebooks 配合 SQL `内核` 的示例。ADS 支持其他语言环境的内核，包括


    *   PySpark3

    *   PySpark

    *   Spark | Scala

    *   Spark | R

    *   Python


    在任何这些场景中，你都将使用 Notebook 连接到 SQL Server 主实例。ADS 将通过 Knox 网关处理从 Notebook 提交 Spark
    作业，以便在 BDC 中正确运行。这些 Notebook 中的任何 Python 或 R 代码都将在你的本地计算机上运行。


    ## MSSQL Spark 连接器


    我们提供了另一种通过 `MSSQL Spark 连接器` 运行 Spark 作业的方法。该连接器与 SQL Server 主实例通信，使用 SQL 批量复制
    API 进行写入，并具有熟悉的 JDBC 接口。你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector)
    阅读有关 `MSSQL Spark 连接器` 及其如何与 BDC 配合使用的更多信息。

    '
- fmt: '### Deploying and Using Applications


    I described in the section "Big Data Cluster Architecture" how the Application
    Pool works in BDC including documentation on how to deploy an application in BDC.


    We supply the "runtime" for applications written in R and Python, as well as applications
    that support MLeap ( [`https://mleap-docs.combust.ml/`](https://mleap-docs.combust.ml/)
    ) and SSIS packages. A developer will supply the code and a YAML file specifying
    how to run the application, and BDC will run a ReplicaSet of containers for the
    application code.


    Once applications are deployed, they are always "running" as a container. If you
    want to consume or execute the application code, you can use the `azdata` command
    with the `app` option. You can see the `azdata app` reference at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app).


    BDC also provides another method to consume the deployed applications through
    a REST web interface. By default, all deployed applications have this capability
    through a protocol called `Swagger` ( [`https://swagger.io/`](https://swagger.io/)
    ).


    The best way to wrap your head around how this all works is to see the examples
    we have provided at [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy).


    ### Security


    At the time I wrote this chapter, BDC only supported basic authentication, which
    means logins and passwords. All the service endpoints that come from the controller,
    Knox, and SQL Server Master Instance require a login and password.


    All communication between pods within the cluster occurs with private communication
    channels using `k8s` secrets (which in themselves have logins and passwords) and
    self-signed certificates.


    It is our intention by the time we release Big Data Clusters for SQL Server 2019
    to support Active Directory (AD) authentication within BDC for all the service
    endpoints. This includes connecting to the SQL Server Master Instance, Controller
    Service, and Knox Gateway.


    I expect all the details for how to join BDC to a domain, how to deploy BDC with
    the necessary AD information, the process to add AD users, and how to log in to
    BDC with an AD account will be in our documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security).


    ### High Availability


    As I’ve mentioned in the chapter, pods in BDC are deployed using a `k8s` `StatefulSet`
    or `ReplicaSet`. This provides *built-in HA* for the `k8s` platform should a container,
    pod, or node fail (node failure would only work with a multi-node `k8s` deployment).


    While this form of *basic HA* is helpful for SQL Server, it would be better to
    use our Always On Availability Group (AG) technology that includes read replicas
    and SQL Server health detection.


    When you deploy BDC, you have the option of enabling `hadr`. Enabling `hadr` will
    create an Availability Group by default in BDC and includes the `system databases`
    in the AG. Multiple pods in a `StatefulSet` are created to support this deployment.


    Using this configuration, we also create endpoints to connect to the primary and
    secondary replicas of the AG. Since `system databases` are included as part of
    the AG, your primary connection is a connection to the SQL Server Master Instance
    primary, like an AG listener. If a failover occurs, this endpoint will stay connected
    to whatever replica becomes the new primary. Secondary read-only replica connections
    are also supported through a separate endpoint.


    Take a look at our documentation for how to enable `hadr` and some of the ramifications
    of using this type of deployment at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability).


    ### Jupyter Books for SQL Server Big Data Clusters


    Jupyter Books ( [`https://jupyter.org/jupyter-book/intro.html`](https://jupyter.org/jupyter-book/intro.html)
    ) provide a mechanism to build a collection of notebooks. Azure Data Studio (`ADS`)
    provides a Jupyter Book of notebooks to help monitor, manage, and troubleshoot
    SQL Server Big Data Clusters. All of these notebooks are based on actual Troubleshooting
    Guides (`TSG`) used by the SQL Server engineering team!


    Figure [10-15](#479130_1_En_10_Chapter.xhtml#Fig15) shows a look at Jupyter Books
    for SQL Server Big Data Clusters.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig15_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig15_HTML.jpg)


    Figure 10-15: Jupyter Books for SQL Server Big Data Clusters


    ### Machine Learning and Big Data Clusters


    One of the promises of SQL Server Big Data Clusters (BDC) is an *end-to-end Machine
    Learning platform*. Consider the workflow in Figure [10-16](#479130_1_En_10_Chapter.xhtml#Fig16).


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig16_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig16_HTML.jpg)


    Figure 10-16: *Machine Learning* *in Big Data Clusters*


    You can do all of this within BDC! Ingest data from different types of data sources,
    both structured and unstructured, with Spark and SSIS. You can store this data
    in BDC with Data Pools, HDFS, or even the SQL Server Master Instance. Some of
    your data for your Machine Learning models may exist in external data sources
    outside of BDC such as Azure, SQL Server, Oracle, Teradata, and MongoDB. BDC gives
    you access to any of this data using T-SQL.


    You can now prep and train your Machine Learning model using Spark, SparkML, and/or
    SQL Server Machine Learning Services (ML). You can then expose your model as a
    *Machine Learning application* using SQL Server ML with T-SQL or as an application
    with a REST interface in the Application Pool. The Application Pool provides an
    interesting method for developers since it is all based on your code with declarative
    YAML and containers. This means it could become a great candidate for a *Continuous
    Integration/Continuous Delivery* (CI/CD) development model.


    ### Machine Learning Packages


    One huge advantage for data scientists using BDC and SQL Server 2019 is all of
    the Machine Learning Packages we ship when you deploy the product. I asked Dr.
    Rony Chatterjee, a Senior Program Manager on our team, how I could discover all
    of these installed ML packages. He gave me the following T-SQL query I could run
    on SQL Server 2019 or BDC to see these packages:


    ```sql

    EXEC sp_execute_external_script

    @language=N''Python'',

    @script=N''

    import pkg_resources

    import pandas

    OutputDataSet = pandas.DataFrame([(d.project_name, d.version) for d in pkg_resources.working_set])''

    ```


    I ran this query on my deployed BDC, and there were well over 160+ Machine Learning
    packages!'
