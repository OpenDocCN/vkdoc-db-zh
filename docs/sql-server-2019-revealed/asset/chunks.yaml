  trans: '

    ### 客户之声


    凭借我在客户支持方面的背景，我总是很高兴看到我们的工程团队在新版本中加入那些能直接与客户反馈或我们的 CSS 团队支持问题趋势相关联的功能。


    这次的发布也不例外，其中包含了一系列对数据库引擎的增强，包括但不限于：


    *   更好的字符串截断错误信息，并提供了可操作的上下文。这是客户投票排名第一的需求，获得了数千票。

    *   新的动态管理对象，以深入洞察数据库页头的内部结构（是的，你也可以成为 Paul Randal）。这些语句可以帮助诊断页面闩锁争用问题。

    *   引擎在可扩展性方面的改进，包括并发 PFS 更新、并行批量插入和间接检查点。


    我将在第 `11` 章向你详细介绍这组增强功能。


    当你阅读本书的其余部分时，各章内容相对独立。然而，我强烈建议你首先阅读第 `7` 章和第 `8` 章作为基础知识，然后再深入学习关于数据虚拟化和大数据群集的第
    `9` 章和第 `10` 章。


    ## SQL Server 2019 入门


    以下是一些资源，可帮助你在准备学习新特性并尝试本书剩余章节中的示例时，部署和配置 SQL Server 2019。


    ### 下载 SQL Server 2019


    要下载并试用 SQL Server 2019，请访问 [`www.microsoft.com/en-us/sql-server/sql-server-2019#Install`](http://www.microsoft.com/en-us/sql-server/sql-server-2019%2523Install)。


    ### 部署 SQL Server 2019


    有关如何在 Windows 上部署 SQL Server 2019 的说明，请访问 [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server%253Fview%253Dsql-server-ver15)。


    对于 Linux 上的 SQL Server 2019，请访问 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview%253Fview%253Dsql-server-ver15)。


    要学习如何在容器中部署 SQL Server，请访问 [`https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker?view=sql-server-linux-ver15&pivots=cs1-bash`](https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker%253Fview%253Dsql-server-linux-ver15%2526pivots%253Dcs1-bash.%255C)。


    ### 迁移到 SQL Server 2019


    第 `11` 章将讨论迁移以及支持从旧版 SQL Server 和其他供应商数据库产品迁移至 SQL Server 2019 的工具。


    ### SQL Server 2019 新增功能


    在 [`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253Fview%253Dsqlallproducts-allversions)
    了解关于 SQL Server 2019 所有新功能的具体信息。


    ### 下载本书代码和示例数据库


    为了能够使用本书中的所有示例，你需要克隆本书的 GitHub 仓库，如本书引言中所讨论的那样。


    > **提示**

    >

    > Windows 用户，请务必使用以下 git 语法来克隆仓库，以避免 Linux 脚本的 CRLF 问题：

    >

    > `git clone --config core.autocrlf=false` `https://github.com/microsoft/sqlworkshops.git`


    此外，你还需要从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)
    下载示例数据库 `WideWorldImporters`，并从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)
    下载 `WideWorldImportersDW`。本书的代码包含如何在 Windows、Linux、容器和 Kubernetes 上还原备份的示例。


    ### SQL Server 研讨会


    尽管我在本书中包含了许多动手练习，但你仍可以访问 [`http://aka.ms/sqlworkshops`](http://aka.ms/sqlworkshops)
    以查找更多关于 SQL Server 的免费相关培训（我的朋友兼同事 Buck Woody 是我所知最优秀的培训师之一，他是这个网站背后的策划者）。


    ### 这是你爷爷的 SQL Server 吗？


    我喜欢编写这本书，不仅因为我喜欢这项技术（好吧，我对 SQL Server 有偏爱），还因为我们的工程团队正以业内任何其他竞品数据产品或平台都未曾见过的速度进行创新。而且我们得承认，学习新事物很有趣。


    也许 *ITProToday* 杂志的这句引述说得最好："我从未想过有一天我会在同一个句子里讨论 Microsoft SQL Server 的发布特性与 Linux、Oracle
    和 Apache Spark，但这是一个勇敢的新世界。Microsoft 的 SQL Server 开发正以其竞争对手无法匹敌的速度前进" ([`www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019`](https://www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019))。


    我记得我的同事 Travis Wright 在谈到 SQL Server 2019 时说："这不是你爷爷的 SQL Server。" 这是因为该产品已经从一个强大的关系数据库引擎，演变为现在包含了
    Spark、HDFS、Notebooks、Polybase、R、Python、Java、Linux、容器和 Kubernetes 等技术，所有这些都作为产品的一部分，真正成为了一个现代数据平台。


    我记得把这段话发在了 Twitter 上。我的同事 Pedro Lopes 看到后评论说，SQL Server 2019 确实是你爷爷的 SQL Server。那么谁是对的呢？他们两个都对。SQL
    Server 2019 仍然是你所熟知和喜爱的、令人难以置信的数据库引擎，具有可扩展的性能、关键任务安全性和高可用性。你将在本书中看到所有这些核心领域的增强功能。但
    SQL Server 2019 远不止于此。它是地球上最受欢迎的数据库平台之一，也是最新的后起之秀。它可以兼具两者。欢迎来到 SQL Server 2019。


    # 2. 智能性能


    SQL Server 性能对任何数据平台的运营都至关重要。本章包含了大量关于 SQL Server 2019 如何帮助你在不更改应用程序的情况下提升查询性能的信息。这是本书中最长的章节之一，包含大量示例，所以请坐稳并准备好你最喜欢的咖啡。

    '
- fmt: '# Why Intelligent Performance?


    To me, the most important takeaway from this book is `why` new capabilities in
    `SQL Server 2019` can benefit you or solve a particular problem or challenge.
    For performance, the theme is to help you increase the performance of your workloads,
    often `without` making any application or query changes.


    In September of 2018, I was preparing for a presentation at the `Microsoft Ignite`
    conference in Orlando, Florida. Up to this point in the year, everyone had only
    known our plans for `SQL vNext` at a high level. My colleague, `Amit Banerjee`,
    and I had the task of presenting the launch of `SQL Server 2019 Preview` at `Ignite`.
    As we were building out this deck, we knew we needed to showcase our new enhancements
    for performance. `Amit` had an idea for a new term, `Intelligent Database`. The
    idea was that `SQL Server` is building capabilities that include intelligence
    into the engine to detect, adapt, and provide insight like never before.


    I’ve taken that same term and focused it more on performance to call it `Intelligent
    Performance`. This includes the following new enhancements in `SQL Server 2019`:


    *   `Intelligent Query Processing`

    *   `Lightweight Query Profiling`

    *   `In-Memory Database`

    *   `Last-Page Insert Contention`


    Each of these areas contains built-in intelligence in the `SQL Server` engine
    to help you get better performance out of your systems, in many cases without
    any changes at all. In some cases, `SQL Server` provides you insights into query
    performance at a level never seen before. In other situations, `SQL Server` has
    built-in capabilities to automatically take advantage of new innovations in hardware.


    When you create a book, you make all types of decisions. One of them is how to
    organize your chapters. This chapter is very long, mostly due to examples that
    include many visuals. I’m a visual person, so I thought that would be a good way
    to show you these new features. Each section of this chapter is itself its own
    chapter, and you can treat it that way. I decided to include all of them in one
    single chapter because I wanted you to see all of the details and the sheer vastness
    of `Intelligent Performance` in `SQL Server 2019`.


    Each section of the chapter lists the prerequisites to run any of the examples.
    At a high level, you are going to need:


    *   An installation of `SQL Server 2019` on `Windows` or `Linux`

    *   `SQL Server Management Studio (SSMS)` 18.0 or later

    *   `Azure Data Studio` (any OS, but the minimum version you need is 1.7.0)


    Many of the examples use `SSMS` to view query plans, but, as you go through these
    examples, you can use `Azure Data Studio` as well (you will just need to look
    at the plan `XML`) using the new `SentryOne Plan Explorer` extension. Read more
    about this extension at [`https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available`](https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available).


    # Intelligent Query Processing


    In `SQL Server 2014`, our engineering team made a bold decision to introduce a
    new set of code for the query processor within the engine that makes decisions
    for cardinality estimation (`CE`). The new `CE model` would take effect if a database
    used a compatibility level of `120` or later (`120` is the default for `SQL Server
    2014`). You can read all the gory details of how this works and why we made this
    change in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server).


    Many have debated whether this was the right decision. One issue with the approach
    is that it was a broad, inflexible change. As the team was finishing `SQL Server
    2016` and planning `SQL Server 2017`, they all agreed we needed a new way to build
    query processing functionality. As `Joe Sack`, one of the lead program managers
    for the Query Processor (`QP`), tells it, “The team realized that doing one-size-fits-all
    changes isn’t what we should do moving forward. Rather – we need to invest in
    features that can adapt to the vast array of customer workloads in the `SQL Server`
    ecosystem (big, small, `OLTP`, Hybrid, `DW`).”


    Thus was born a new `feature family` of enhancements in `SQL Server 2017` called
    `Adaptive Query Processing (AQP)`. The concept was to build into the query processor
    the ability to `adapt` as a query executed (or before it executed `again`) to
    provide faster execution, without any user intervention or application changes.


    ### Note


    You can see examples of `SQL Server 2017` and `AQP` at [`https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp).


    As the team shipped `SQL Server 2017` and `AQP`, they were already backlogged
    with new things they had wanted to put in `AQP` but ran out of time. They started
    putting new features to enhance `AQP` in `Azure SQL Server Database`, with plans
    to roll them into `SQL Server 2019`. Furthermore, the word `adaptive` didn’t really
    reflect the vision of the work the team was producing. The `SQL Server` query
    processor has, for years, been pretty smart – using a sophisticated set of cost-based
    algorithms to make plan decisions. But the team wanted more; they wanted the `QP`
    to exhibit more intelligence. Thus, the name `Intelligent Query Processing` stuck.


    Figure [2-1](#479130_1_En_2_Chapter.xhtml#Fig1) shows this `family tree` of `QP`
    capabilities that includes both `SQL Server 2017` and 2019.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg)


    *Figure 2-1: Intelligent Query Processing family tree*


    Let’s take a look at each new capability you see in gray in Figure [2-1](#479130_1_En_2_Chapter.xhtml#Fig1),
    with examples of how each works. It is so important to keep in mind as you read
    through this section that we built these capabilities **so you don’t have to know
    about them**. In time, if we have done our job well, `Intelligent Query Processing`
    is “just” the query processor, and you as an application developer, `DBA`, or
    data professional are just used to an engine that is flexible, intelligent, and
    adaptive to your workload. You can see all the capabilities of `Adaptive Query
    Processing` as part of the new documentation on `IQP` at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing).


    ### Note


    In all scenarios except for `Approximate Count Distinct`, you can enable the capabilities
    of `Intelligent Query Processing` by changing the database compatibility level
    of the database to `150`. `Approximate Count Distinct` is a `T-SQL` function that
    is new to `SQL Server 2019` and does not require a database compatibility level
    of `150`.'
  raw: '## Why Intelligent Performance?


    To me, the most important takeaway from this book is ***why*** new capabilities
    in SQL Server 2019 can benefit you or solve a particular problem or challenge.
    For performance, the theme is to help you increase the performance of your workloads,
    often ***without*** making any application or query changes.


    In September of 2018, I was preparing for a presentation at the Microsoft Ignite
    conference in Orlando, Florida. Up to this point in the year, everyone had only
    known our plans for SQL vNext at a high level. My colleague, Amit Banerjee, and
    I had the task of presenting the launch of SQL Server 2019 Preview at Ignite.
    As we were building out this deck, we knew we needed to showcase our new enhancements
    for performance. Amit had an idea for a new term, *Intelligent Database*. The
    idea was that SQL Server is building capabilities that include intelligence into
    the engine to detect, adapt, and provide insight like never before.


    I’ve taken that same term and focused it more on performance to call it *Intelligent
    Performance*. This includes the following new enhancements in SQL Server 2019:


    *   Intelligent Query Processing


    *   Lightweight Query Profiling


    *   In-Memory Database


    *   Last-Page Insert Contention


    Each of these areas contains built-in intelligence in the SQL Server engine to
    help you get better performance out of your systems, in many cases without any
    changes at all. In some cases, SQL Server provides you insights into query performance
    at a level never seen before. In other situations, SQL Server has built-in capabilities
    to automatically take advantage of new innovations in hardware.


    When you create a book, you make all types of decisions. One of them is how to
    organize your chapters. This chapter is very long, mostly due to examples that
    include many visuals. I’m a visual person, so I thought that would be a good way
    to show you these new features. Each section of this chapter is itself its own
    chapter, and you can treat it that way. I decided to include all of them in one
    single chapter because I wanted you to see all of the details and the sheer vastness
    of Intelligent Performance in SQL Server 2019.


    Each section of the chapter lists the prerequisites to run any of the examples.
    At a high level, you are going to need


    *   An installation of SQL Server 2019 on Windows or Linux


    *   SQL Server Management Studio (SSMS) 18.0 or later


    *   Azure Data Studio (any OS, but the minimum version you need is 1.7.0)


    Many of the examples use SSMS to view query plans, but, as you go through these
    examples, you can use Azure Data Studio as well (you will just need to look at
    the plan XML) using the new SentryOne Plan Explorer extension. Read more about
    this extension at [`https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available`](https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available)
    .


    ## Intelligent Query Processing


    In SQL Server 2014, our engineering team made a bold decision to introduce a new
    set of code for the query processor within the engine that makes decisions for
    cardinality estimation (CE). The new “CE model” would take effect if a database
    used a compatibility level of 120 or later (120 is the default for SQL Server
    2014). You can read all the gory details of how this works and why we made this
    change in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server)
    .


    Many have debated whether this was the right decision. One issue with the approach
    is that it was a broad, inflexible change. As the team was finishing SQL Server
    2016 and planning SQL Server 2017, they all agreed we needed a new way to build
    query processing functionality. As Joe Sack, one of the lead program managers
    for the Query Processor (QP), tells it, “The team realized that doing one-size-fits-all
    changes isn’t what we should do moving forward. Rather – we need to invest in
    features that can adapt to the vast array of customer workloads in the SQL Server
    ecosystem (big, small, OLTP, Hybrid, DW).”


    Thus was born a new *feature family* of enhancements in SQL Server 2017 called
    **Adaptive Query Processing (AQP)** . The concept was to build into the query
    processor the ability to *adapt* as a query executed (or before it executed *again*)
    to provide faster execution, without any user intervention or application changes.


    ### Note


    You can see examples of SQL Server 2017 and AQP at [`https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp)
    .


    As the team shipped SQL Server 2017 and AQP, they were already backlogged with
    new things they had wanted to put in AQP but ran out of time. They started putting
    new features to enhance AQP in Azure SQL Server Database, with plans to roll them
    into SQL Server 2019. Furthermore, the word *adaptive* didn’t really reflect the
    vision of the work the team was producing. The SQL Server query processor has,
    for years, been pretty smart – using a sophisticated set of cost-based algorithms
    to make plan decisions. But the team wanted more; they wanted the QP to exhibit
    more intelligence. Thus, the name Intelligent Query Processing stuck.


    Figure [2-1](#479130_1_En_2_Chapter.xhtml#Fig1) shows this *family tree* of QP
    capabilities that includes both SQL Server 2017 and 2019.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Intelligent Query Processing family tree


    Let’s take a look at each new capability you see in gray in Figure [2-1](#479130_1_En_2_Chapter.xhtml#Fig1),
    with examples of how each works. It is so important to keep in mind as you read
    through this section that we built these capabilities **so you don’t have to know
    about them**. In time, if we have done our job well, Intelligent Query Processing
    is “just” the query processor, and you as an application developer, DBA, or data
    professional are just used to an engine that is flexible, intelligent, and adaptive
    to your workload. You can see all the capabilities of Adaptive Query Processing
    as part of the new documentation on IQP at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing)
    .


    ### Note


    In all scenarios except for Approximate Count Distinct, you can enable the capabilities
    of Intelligent Query Processing by changing the database compatibility level of
    the database to 150\. Approximate Count Distinct is a T-SQL function that is new
    to SQL Server 2019 and does not require a database compatibility level of 150.'
  trans: '

    # 为何是智能性能？


    对我而言，这本书最重要的启示在于，`SQL Server 2019`的新功能`为何`能为您带来益处，或解决特定的问题或挑战。就性能而言，其主题是帮助您提升工作负载的性能，通常`无需`对应用程序或查询进行任何更改。


    2018 年 9 月，我正在为佛罗里达州奥兰多市的`Microsoft Ignite`大会准备演讲。在那年此时之前，大家仅从高层次了解我们对`SQL vNext`的计划。我和我的同事`Amit
    Banerjee`的任务是在`Ignite`上展示`SQL Server 2019 预览版`的发布。在构建演示文稿时，我们知道需要展示我们在性能方面的新增强功能。`Amit`提出了一个新术语：`智能数据库`。其理念是，`SQL
    Server`正在构建将智能融入引擎的能力，以实现前所未有的检测、适应和提供洞察力。


    我沿用了这个术语，并将其更聚焦于性能，称之为`智能性能`。这包括`SQL Server 2019`中的以下新增强功能：


    *   `智能查询处理`

    *   `轻量级查询分析`

    *   `内存中数据库`

    *   `末页插入争用`


    这些领域中的每一个都在`SQL Server`引擎中内置了智能，以帮助您从系统中获得更好的性能，在许多情况下完全无需更改。在某些情况下，`SQL Server`为您提供了前所未有的查询性能洞察级别。在其他情况下，`SQL
    Server`具有内置功能，可自动利用硬件方面的创新。


    当您创作一本书时，您会做出各种决定。其中之一是如何组织您的章节。这一章非常长，主要是因为其中包含许多视觉元素的示例。我是一个视觉型的人，所以我认为这是向您展示这些新功能的好方法。本章的每一部分本身就是一个独立的章节，您可以将其视为独立章节。我决定将所有内容包含在一个章节中，是因为我希望您能看到所有细节以及`SQL
    Server 2019`中`智能性能`的庞大广度。


    本章的每一部分都列出了运行任何示例所需的先决条件。概括来说，您需要：


    *   安装在`Windows`或`Linux`上的`SQL Server 2019`

    *   `SQL Server Management Studio (SSMS)` 18.0 或更高版本

    *   `Azure Data Studio`（任何操作系统，但您需要的最低版本是 1.7.0）


    许多示例使用`SSMS`查看查询计划，但在学习这些示例时，您也可以使用`Azure Data Studio`（您只需使用新的`SentryOne Plan
    Explorer`扩展查看计划`XML`）。有关此扩展的更多信息，请访问 [`https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available`](https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available)。


    # 智能查询处理


    在`SQL Server 2014`中，我们的工程团队做出了一个大胆的决定，在引擎内为查询处理器引入一套新的代码，用于基数估计（`CE`）决策。如果数据库使用的兼容级别为`120`或更高（`120`是`SQL
    Server 2014`的默认值），则新的`CE 模型`将生效。您可以在我们的文档中阅读有关其工作原理以及我们为何做出此更改的所有详细信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server)。


    许多人争论这是否是正确的决定。这种方法的一个问题是它是一个广泛、不灵活的改动。当团队完成`SQL Server 2016`并规划`SQL Server 2017`时，他们都同意我们需要一种新的方式来构建查询处理功能。正如查询处理器（`QP`）的首席程序经理之一`Joe
    Sack`所说，“团队意识到，进行一刀切式的改动不是我们未来应该做的。相反——我们需要投资于能够适应`SQL Server`生态系统中庞杂客户工作负载（大型、小型、`OLTP`、混合型、`DW`）的功能。”


    因此，在`SQL Server 2017`中诞生了一系列名为`自适应查询处理 (AQP)`的新增强`功能家族`。其概念是在查询处理器中内置在查询执行期间（或在它`再次`执行之前）进行`自适应`的能力，以提供更快的执行速度，而无需任何用户干预或应用程序更改。


    ### 注意


    您可以在以下位置查看`SQL Server 2017`和`AQP`的示例：[`https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp)。


    随着团队发布`SQL Server 2017`和`AQP`，他们已经在处理积压的新需求，这些是他们本想放入`AQP`但当时没有时间的功能。他们开始在`Azure
    SQL Server Database`中添加增强`AQP`的新功能，并计划将它们纳入`SQL Server 2019`。此外，`自适应`这个词并没有真正反映团队所做工作的愿景。多年来，`SQL
    Server`查询处理器一直相当智能——使用一套复杂的基于成本的算法来制定计划决策。但团队想要更多；他们希望`QP`展现出更多的智能。于是，`智能查询处理`这个名字就确定下来了。


    图 2-1 展示了这个包含`SQL Server 2017`和 2019 的`QP`能力的`家族树`。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg](img/479130_1_En_2_Fig1_HTML.jpg)


    *图 2-1: 智能查询处理家族树*


    让我们看一下图 2-1 中以灰色显示的每个新功能，并举例说明其工作原理。在阅读本节时，请务必牢记，我们构建这些功能的目的**是让您无需了解它们**。将来，如果我们工作做得好，`智能查询处理`就是“默认”的查询处理器，而您作为应用程序开发人员、`DBA`或数据专业人员，只会习惯于一个灵活、智能且能适应您工作负载的引擎。您可以在关于`IQP`的新文档中查看`自适应查询处理`的所有功能：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing)。


    ### 注意


    除`近似计数 distinct`外，在所有场景中，您都可以通过将数据库的兼容级别更改为`150`来启用`智能查询处理`的功能。`近似计数 distinct`是`SQL
    Server 2019`新增的`T-SQL`函数，不需要数据库兼容级别为`150`。

    '
- fmt: '### Prerequisites for Using the Examples for Intelligent Query Processing


    While many workloads will see benefits from Intelligent Query Processing (IQP),
    it is easy to demonstrate the performance benefits of IQP with larger datasets
    and databases designed for analytic queries. Therefore, for examples in this chapter,
    you will use the `WideWorldImportersDW` example database (you can read more about
    this database and its schema at [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog)).


    These examples will work on SQL Server 2019 on Windows, Linux, and Containers.
    Given the large dataset, SQL Server is going to need at least 12Gb RAM to properly
    see performance differences. In addition, some of the query examples use parallelism,
    so installing SQL Server on a multiprocessor system is preferred.


    All the scripts used for this chapter can be found on the GitHub repo under the
    `ch2_intelligent_performance\iqp` directory.


    Complete credit to my colleague at Microsoft, Joe Sack, for all of these examples
    including how to extend out the `WideWorldImportersDW` database. These examples
    were modified based on Joe’s GitHub repo at [`https://github.com/joesackmsft/Conferences/tree/master/IQPDemos`](https://github.com/joesackmsft/Conferences/tree/master/IQPDemos).


    In order to use the examples in this chapter, you need to go through the following
    steps:


    1.  Download the `WideWorldImportersDW` database backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak).

    2.  Restore this database to your SQL Server 2019 instance. You can use the provided
    `restorewwidw.sql` script. You may need to change the directory paths for the
    location of your backup and where you will restore the database files.

    3.  In order to run some of the examples, you will need larger tables than what
    is installed by default in `WideWorldImportersDW` and that are not using columnstore.
    Therefore, run the script `extendwwidw.sql` to create two large tables. Extending
    this database will increase its size, including the transaction log, to about
    8Gb overall. One of these tables is called `Fact.OrderHistory`. Based on the `Orders`
    table, we will make this table much larger and not use a columnstore index. We
    will create another table called `Fact.OrderHistoryExtended`. This will be based
    on `Fact.OrderHistory` but will have even more rows.


    Almost all the examples come with two methods:


    *   A set of T-SQL scripts you can use with any tool like `SQL Server Management
    Studio`, `Azure Data Studio`, or `sqlcmd`.

    *   A T-SQL notebook that requires `Azure Data Studio`. Take a close look on how
    to run notebooks with `Azure Data Studio` at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks).


    One example requires a Windows client, as it uses the famous `ostress.exe` tool.
    Details of how to install and use `ostress.exe` are provided in the section “Memory
    Grant Feedback Row Mode.” I’ve built all the scripts assuming you will run them
    as a sysadmin (I used the `sa` login). In normal practice, you would create other
    logins to use SQL Server, but I wanted to simplify examples – so just use a login
    with sysadmin permissions.


    ### Memory Grant Feedback Row Mode


    Before joining the SQL Server engineering team, I had a long career at Microsoft
    in technical support. One of the toughest problems I’ve seen customers face when
    it comes to performance is problems with `memory grants`. What is a `memory grant`?


    SQL Server allocates memory for all kinds of reasons. When SQL Server executes
    a query, memory may be used to cache buffers associated with pages belonging to
    indexes or tables in the query. In most SQL Server instances that have been up
    and running, the buffer pool may be already in allocated memory so bringing in
    pages doesn’t require additional memory.


    Some query operations are intensive and require some type of temporary area to
    store data. Two such operations are `hash joins` (or even just hash operators)
    and `sorts`. To perform a `hash join`, SQL Server effectively has to build a mini-table
    in memory in order to perform the operation. Any type of data `sort` can require
    some type of array or structure to sort data. SQL Server has to have some place
    to perform these operations so it allocates memory outside the buffer pool. The
    process for allocating this memory by the query execution engine is called a `memory
    grant`.


    Sounds simple enough. Here is the problem: `Memory grants` are based on what the
    optimizer knows about the query plan as it is first being executed. And the “what”
    for these decisions usually comes down to cardinality estimation or unique number
    of rows for an operation. If SQL Server thinks a `sort` operation as part of a
    query plan will be on data columns that are 100 bytes in total but with an estimated
    1 billion rows, it must acquire a `memory grant` enough to allocate memory to
    sort that many rows of data of that size. The same type of concept applies for
    a `hash` operator.'
