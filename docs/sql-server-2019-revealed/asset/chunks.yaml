    ## 客户之声


    到目前为止，你在本书中读到的一切，都以这样或那样的方式受到了我们客户的影响。在本节中，我将向你展示一系列 `SQL Server 2019` 的增强功能，这些功能直接来源于客户的反馈和请求，途径包括
    Microsoft 支持的升级、我们自己的内部测试，或工程团队与客户的直接互动。如果你从未接触过直达产品团队的反馈渠道，可以访问 `https://aka.ms/sqlfeedback`
    查看。在本节中，我为你整理了一份按三个领域组织的增强功能列表：


    ### 性能


    *   **性能** – SQL Server 数据库引擎的性能增强，旨在帮助所有或特定的工作负载运行得更快。

    *   **用户体验** – 这些是用于改进 `SQL Server` 产品使用或配置方式的增强功能。

    *   **诊断** – 这些是旨在改进 `SQL Server` 问题故障排除或诊断的增强功能。


    ### 性能增强


    我们的工程团队始终致力于改进核心数据库引擎的性能，并通过客户观察、Microsoft 支持升级，以及经常通过基准测试调查来寻求机会。这些经验和观察促成了核心数据库引擎的以下变更：


    #### 减少临时表的编译


    使用临时表的一种设计模式是在一个*作用域*中创建临时表，然后在另一个作用域中使用它。例如，你可以在一个批处理中创建临时表，然后尝试在该批处理调用的存储过程中使用该临时表。这通常会导致引用临时表的存储过程重新编译。在
    `SQL Server 2019` 中，默认情况下，我们能够避免在此场景中进行重新编译。虽然这项改进可能不会使工作负载显著加快，但它有助于整个应用程序更好地使用
    `SQL Server`，因为降低重新编译次数可以减少 `SQL Server` 的总体 CPU 使用率。


    #### 间接检查点的可伸缩性


    间接检查点是数据库检查点的新默认方法，你可以在 `https://docs.microsoft.com/en-us/sql/relational-databases/logs/database-checkpoints-sql-server`
    阅读相关内容。我们通过一些基准测试和客户反馈发现，繁重的修改工作负载可能导致 `SQL Server` 引擎出现停滞，从而引发一种称为“非让步调度程序”的状况。我们通常只在具有多个
    CPU 的大型系统上看到这些问题，这让我们认为这是一个可伸缩性问题。`SQL Server 2019` 在数据库引擎中进行了改进以避免此问题。


    #### 并发 PFS 更新


    PFS 页是数据库文件内的特殊页面，`SQL Server` 用它来帮助在为对象分配空间时定位可用空间。（你可以阅读 Paul Randal 在 Microsoft
    工作时撰写的一篇关于 PFS 页的旧博文：`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/07/08/under-the-covers-gam-sgam-and-pfs-pages/`。）


    PFS 页上的页面闩锁争用通常与 `tempdb` 相关联，但当存在大量并发对象分配线程时，也可能发生在用户数据库上。这项改进改变了 PFS 更新的并发管理方式，使得它们可以在共享闩锁下更新，而不是独占闩锁。从
    `SQL Server 2019` 开始，此行为在所有数据库（包括 `tempdb`）中默认开启。


    随着客户采用 `SQL Server 2019`，我非常期待看到这项增强功能与 `TempDB` 内存优化元数据（在第 2 章讨论）相结合，对 `TempDB`
    并发性的实际效果。


    #### 工作线程窃取


    我将这项改进称为“Slava 特别版”，以 Slava Oks 的名字命名。多年来，我们看到 `SQLOS` 调度程序的一个弱点是工作线程的调度程序争用。如果我们能在检测到争用问题时，将特定任务的动态工作线程更改为不同的调度程序，`SQLOS`
    系统将会变得多么酷。在底层，我们已经开始以有限的规模实现这样的系统。`SQL Server` 支持恢复的并行重做概念。Dong Cao 是这项工作的负责人，他在
    `https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/`
    撰写了关于并行重做以及在 Always On 可用性组辅助副本上重做的内部机制的博文。Dong 在后台实现了工作线程窃取的概念，仅用于辅助副本上的并行重做。如果我们的测试继续成功，我期待有一天我们可以将这一改变应用于引擎核心调度程序
    `SQLOS` 中，适用于所有类型的工作负载。

    '
- fmt: '## User Experience


    We have worked on a set of improvements designed to help the user experience across
    error messages, setup, and configuration of SQL Server.


    ### Verbose truncation warnings


    Do you know what one of the most voted customer feedback requests of all time
    with SQL Server is? It is to improve the following error message:


    ```

    String or binary data would be truncated

    ```


    This error message, which is error message number `8152`, happens when you attempt
    to insert or update data in a column where the value to insert or update exceeds
    the size of the target column. The problem with this message is *there is no context*
    – it does not provide the name of the table, the column, or the piece of data
    that would be truncated.


    In SQL Server 2019, the default behavior for an application is to receive error
    message number `2628`, which looks like this:


    ```

    String or binary data would be truncated

    in table ''%.*ls'', column ''%.*ls’.

    Truncated value: ''%.*ls''

    ```


    Pam Lahoud of SQL Tiger Team fame blogs about this improvement, including examples,
    at [`https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/`](https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/)
    .


    In this blog, she calls out that you can use trace flag `460` in SQL Server 2017
    to take advantage of this better error message.


    SQL Server 2019 also has a database option to change the default behavior for
    this error message, which you can read about at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql?#verbose-truncation`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql%253F%2523verbose-truncation)
    .


    ### Memory and parallel options during setup


    Two of the most common instance configuration options to change after installation
    of SQL Server are "`max server memory`" and "`max degree of parallelism`."


    Given how often these are changed, we have now put in options during the setup
    of SQL Server on Windows to choose these configuration options.


    Figure [11-1](#479130_1_En_11_Chapter.xhtml#Fig1) shows the setup option to configure
    parallelism.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig1_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Configure MaxDOP during setup


    Figure [11-2](#479130_1_En_11_Chapter.xhtml#Fig2) shows the configuration option
    for memory during setup.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig2_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Memory configuration during setup


    Notice in this figure, SQL Server setup has recommended a **`Max Server Memory
    (MB)` value** . We do not document how we arrive at a specific value, and you
    can use whatever makes sense for your environment. Most customers we have found
    use a value less than the maximum physical memory of the computer or virtual machine.
    I personally believe the recommendations use algorithms you can also find in the
    Tiger Team tools `BPCheck`, which you can find at [`https://github.com/microsoft/tigertoolbox/tree/master/BPCheck`](https://github.com/microsoft/tigertoolbox/tree/master/BPCheck)
    .


    ### Memory grant percent in Resource Governor


    I described in Chapter [2](#479130_1_En_2_Chapter.xhtml) a performance problem
    that can occur due to large memory grants. One solution that can help control
    large memory grants is to use Resource Governor with the `REQUEST_MAX_MEMORY_GRANT_PERCENT`
    option. One issue with this option is that the possible values are in whole integer
    numbers from `1` to `100`, representing a percentage of the maximum memory value
    for SQL Server. Even `1%` of `1TB` is `10Gb`, which may be too much memory to
    allow to memory grants. SQL Server 2019 now allows `REQUEST_MAX_MEMORY_GRANT_PERCENT`
    to be a floating-point value, which means it can accept values < `1.0`.


    You can read more about the use of `REQUEST_MAX_MEMORY_GRANT_PERCENT` at [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings)
    .


    ### Columnstore Index compression estimation


    SQL Server includes a system procedure to help estimate savings for page and row
    compression called `sp_estimate_data_compression_savings`. SQL Server 2019 now
    enhances this procedure to show estimated compression for the use of columnstore
    indexes and options for columnstore archive. You can read more about the use of
    this procedure with these options at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql)
    .'
