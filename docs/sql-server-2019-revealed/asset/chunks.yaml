    ## Data Classification


    With the launch of SQL Server 2017, our security group within the SQL Server engineering
    team built a tool in SQL Server Management Studio (SSMS) to help customers *classify*
    data within a SQL Server database. This tool encompassed a wizard, a set of T-SQL
    logic, and a report. Figure [3-3](#479130_1_En_3_Chapter.xhtml#Fig3) shows the
    Data Classification wizard in SSMS.


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Data Classification wizard in SSMS


    One of the drivers behind building a tool like this was the growing trend in companies
    and regulatory agencies for privacy. And especially important was the pending
    General Data Protection Regulation (GDPR) being established by the European Union
    ( [`https://eugdpr.org/`](https://eugdpr.org/) ).'
  trans: '### 使用带安全区域的全程加密


    安全区域为全程加密的“索引问题”提供了一个独特的解决方案。从客户端应用程序到 SQL Server 再返回的数据仍然是完全加密的。SQL Server 内存中和磁盘上的数据也是如此。然而，当需要解密数据时（例如，为了构建索引或支持
    `富计算`），解密操作可以在服务器上的安全区域内进行。安全区域是 SQL Server 进程空间中的一个安全内存区域。这个内存区域很小，并通过安全区域 API
    与引擎表达服务紧密集成。富计算是指需要进行范围查询或模式匹配（即 `LIKE`）的查询。安全区域现在为全程加密解决方案提供了这种能力。


    请考虑来自 SQL Server 文档页面（[`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves)）的图
    3-2，该图展示了安全区域如何以安全的方式支持解密，同时也为应用程序提供了更大的灵活性。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig2_HTML.jpg](img/479130_1_En_3_Fig2_HTML.jpg)


    图 3-2


    带安全区域的全程加密


    配置全程加密从来不是面向普通的 SQL Server 用户的。它是一个针对复杂问题的复杂解决方案。但它非常强大，尤其是在现在有了安全区域之后。


    带安全区域的全程加密需要另一个重要的组件，称为 `认证` 服务。客户端应用程序使用认证服务来验证用于加密的安全区域是否可以被信任。对于 `VBS` 安全区域，Windows
    提供了 `Windows Defender System Guard` 运行时认证（这使用了称为主机守护服务 (`HGS`) 的技术）。您可以在 [`www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/`](https://www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/)
    阅读更多关于 `Windows Defender System Guard` 的内容。您还可以在 [`https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave`](https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave)
    阅读有关应用程序如何与安全区域通信的更多细节。


    除了设置 `VBS` 和配置主机守护服务外，您的应用程序还必须使用支持与安全区域通信的提供程序。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#secure-enclave-providers`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23secure-enclave-providers)
    阅读有关提供程序对安全区域支持的详细信息。


    在撰写本书时，SQL Server 尚未正式支持由 `Intel SGX` 等芯片制造商提供的硬件安全区域。我预计这种支持很快就会到来，您可以通过 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#why-use-always-encrypted-with-secure-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23why-use-always-encrypted-with-secure-enclaves)
    关注关于安全区域的全程加密文档以获取更新。目前 `Linux` 不支持像 `VBS` 这样的虚拟安全区域。然而，一旦 SQL Server 支持了硬件安全区域，我预计
    `Linux` 的支持也会随之而来。


    我没有为您构建一个完整的示例来设置和使用带安全区域的全程加密。正如本章前面所说，这不是一个面向普通 SQL Server 用户的功能。它是一个企业级功能，需要一些时间来设置。但一旦设置完成，它就非常强大。全程加密的高级项目经理和负责人
    Jakub Szymaszek 提供了一些关于该主题的宝贵资源。


    请使用以下 GitHub 仓库，亲自尝试一个使用 `VBS` 安全区域的全程加密示例：[`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves)。Jakub
    还在 Microsoft Ignite 上做了一个精彩的演示，您可以通过 [`https://myignite.techcommunity.microsoft.com/sessions/65357#ignite-html-anchor`](https://myignite.techcommunity.microsoft.com/sessions/65357%23ignite-html-anchor)
    获取有关带安全区域的全程加密的更多细节。


    ## 数据分类


    随着 SQL Server 2017 的发布，我们 SQL Server 工程团队内部的安全小组在 SQL Server Management Studio
    (`SSMS`) 中构建了一个工具，以帮助客户对 SQL Server 数据库中的数据进行 `分类`。该工具包含一个向导、一组 `T-SQL` 逻辑和一个报告。图
    3-3 显示了 `SSMS` 中的数据分类向导。


    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg](img/479130_1_En_3_Fig3_HTML.jpg)


    图 3-3


    SSMS 中的数据分类向导


    构建这样一个工具的驱动因素之一，是公司和监管机构对隐私日益增长的趋势。尤为重要的是欧盟正在制定的《通用数据保护条例》（`GDPR`）（[`https://eugdpr.org/`](https://eugdpr.org/)）。'
- fmt: '## Tip


    GDPR regulations took effect in May of 2018. If you would like a complete guide
    on how to use SQL Server to meet the needs of GDPR in your organization, go to
    [`www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr`](https://www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr).


    The idea of the tool was to analyze column names in your database and make recommendations
    on how to classify columns via a `label` and an `information_type`. The `information_type`
    could be used to tell you what kind of data exists in the column (e.g., Contact
    Info, Name, Financial), while the `label` could be used to classify the `sensitivity`
    of the data stored in that column (Confidential, Confidential-GDPR, HIPAA, etc.).


    The tool would analyze column names and look for known patterns that matched known
    types of information and sensitivity. An example of a simple match would be any
    column with a name that contained the word Email in it. The tool would provide
    recommendations for `labels` and `information_type` and let you persist these
    within your database. Then you could use a report to view this classification
    information.


    The tool was nice, but there were two limitations:

    *   The tool used a concept in SQL Server called `extended properties`. While
    that approach is supported and works, it is not the most efficient way to store
    metadata about column classification because it is a general property mechanism
    (you can read more about extended properties at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)).

    *   There is no built-in auditing for access to the columns that are marked for
    classification. Auditing is an important part of any classification system and
    is required to meet the needs of GDPR.


    So, our team worked on a new solution for SQL Server 2019 (which also works in
    the Azure SQL Database suite of services) for built-in `sensitivity classifications`.
    Built-in means a new set of T-SQL statements, catalog views, and auditing. The
    T-SQL statements now supported in SQL Server 2019 for classification are:

    *   [`ADD SENSITIVITY CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/add-sensitivity-classification-transact-sql)

    *   [`DROP SENSITIVITY CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/drop-sensitivity-classification-transact-sql)


    These T-SQL statements result in metadata stored directly into system tables (exposed
    by catalog views) that are specific to `labels` and `information_types` associated
    with columns in a table.


    A new catalog view is supported to view this metadata called [`sys.sensitivity_classifications`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-sensitivity-classifications-transact-sql).


    Furthermore, SQL Server Auditing now supports a new property called `data_sensitivity_information`
    which can be used to audit who, what, and when users are trying to view classified
    data.


    With these capabilities, the SSMS wizard was modified to use the new T-SQL statements
    if working with a database in SQL Server 2019. This now provides you the capability
    of built-in classifications and auditing with a tool in SSMS and native T-SQL
    support.


    ## Note


    If you have used the wizard with SSMS 17.0 or even 18.0 against a version of SQL
    Server prior to SQL Server 2019 and restore that database to SQL Server 2019,
    the classified `extended properties` will be migrated to the new `sensitivity
    classification` metadata.


    Let’s walk through an example of using the SSMS tool, the new T-SQL syntax, catalog
    views, and auditing.


    ## Prerequisites for Using the Examples


    First, you need to do some setup to use examples in this section of the chapter.
    For examples in this chapter, you will use the `WideWorldImporters` example database
    (you can read more about this database and its schema at [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)).
    If you have already restored the database from Chapter 2 examples, you can just
    keep using that database.


    These examples will work on SQL Server 2019 on Windows, Linux, and Containers.


    You will also need SQL Server Management Studio (SSMS) version `18.2` or higher
    to complete all the steps in the example. You can complete some of the steps using
    the T-SQL scripts provided, but some of the examples rely on the tools built into
    SSMS. You can download the latest version of SSMS from [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms).


    All the scripts used for this chapter can be found on the GitHub repo for this
    book under the `ch3_new_security_capabilities\dataclassification` directory.


    In order to use the examples in this chapter, you need to go through the following
    steps (skip these steps if you have already restored the database from Chapter
    2):

    1.  Download the WideWorldImporters database backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak).

    2.  Restore this database to your SQL Server 2019 instance. You can use the provided
    `restorewwi.sql` script. You may need to change the directory paths for the location
    of your backup and where you will restore the database files.'
