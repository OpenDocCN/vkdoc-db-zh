  trans: "\n### 注意\n\n我在部署 BDC 时使用的是 ADS 的 Insider 版本，因此随着 SQL Server 2019 的正式发布，此界面的一部分内容可能会发生变化。\n\
    \n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig6_HTML.jpg](img/479130_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6：部署后连接到 BDC 中的 SQL Server。\n\n使用以下命令验证 BDC 的整体状态：\n\n```\nazdata bdc status\
    \ show\n```\n\n我的 BDC 集群结果如下所示：\n\n```\nMssql-cluster: ready                 \
    \                        Health Status:  healthy\n =============================================================================\n\
    \ Services: ready                                              Health Status:\
    \  healthy\n -----------------------------------------------------------------------------\n\
    \ Servicename  State  Healthstatus  Details\n sql          ready  healthy    \
    \   -\n hdfs         ready  healthy       -\n spark        ready  healthy    \
    \   -\n control      ready  healthy       -\n gateway      ready  healthy    \
    \   -\n app          ready  healthy       -\n Sql Services: ready            \
    \                              Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n master        ready  healthy  \
    \     StatefulSet master is healthy\n compute-0     ready  healthy       StatefulSet\
    \ compute-0 is healthy\n data-0        ready  healthy       StatefulSet data-0\
    \ is healthy\n storage-0     ready  healthy       StatefulSet storage-0 is healthy\n\
    \ Hdfs Services: ready                                         Health Status:\
    \  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n nmnode-0      ready  healthy  \
    \     StatefulSet nmnode-0 is healthy\n storage-0     ready  healthy       StatefulSet\
    \ storage-0 is healthy\n sparkhead     ready  healthy       StatefulSet sparkhead\
    \ is healthy\n Spark Services: ready                                        Health\
    \ Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n sparkhead     ready  healthy  \
    \     StatefulSet sparkhead is healthy\n storage-0     ready  healthy       StatefulSet\
    \ storage-0 is healthy\n Control Services: ready                             \
    \         Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n controldb     ready  healthy  \
    \     -\n control       ready  healthy       -\n metricsdc     ready  healthy\
    \       DaemonSet metricsdc is healthy\n metricsui     ready  healthy       ReplicaSet\
    \ metricsui is healthy\n metricsdb     ready  healthy       StatefulSet metricsdb\
    \ is healthy\n logsui        ready  healthy       ReplicaSet logsui is healthy\n\
    \ logsdb        ready  healthy       StatefulSet logsdb is healthy\n mgmtproxy\
    \     ready  healthy       ReplicaSet mgmtproxy is healthy\n Gateway Services:\
    \ ready                                      Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n gateway       ready  healthy  \
    \     StatefulSet gateway is healthy\n App Services: ready                   \
    \                       Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n appproxy      ready  healthy  \
    \     ReplicaSet appproxy is healthy\n```\n\n如果并非所有项都显示为健康，请考虑使用以下文档来对集群进行故障排除：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`](https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands)。\n\
    \n### 配置生产环境部署\n\n我的部署经验使用了随 `azdata` 工具附带的一种*配置*，该配置是为开发或测试集群设计的。`azdata` 的配置通过\
    \ JSON 文件定义，用于控制集群内的各种资源定义。你可以使用以下命令查看这些配置的列表：\n\n```\nazdata bdc config list\n\
    ```\n\n配置的 JSON 文件与我在第 8 章中向你展示的 Kubernetes YAML 文件非常相似。在这种情况下，JSON 文件具有 `azdata`\
    \ 工具可识别的格式（就像 YAML 文件具有 `kubectl` 可识别的格式一样）。\n\n为了查看可以配置 BDC 部署的选项，你可以运行类似以下的命令来查看\
    \ `aks-dev-test` 默认配置是如何部署的：\n\n```\nazdata bdc config init --source aks-dev-test\
    \ --target custom\n```\n\n此命令创建一个名为 `custom` 的新文件夹，并将名为 `bdc.json` 和 `control.json`\
    \ 的文件存储在此目录中。你可以修改这些文件，然后运行类似以下的命令来使用这些所需的配置设置创建一个新的 BDC：\n\n```\nazdata bdc create\
    \ --config-profile custom --accept-eula yes\n```\n\n文档 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance?view=sqlallproducts-allversions#customconfig`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance%253Fview%253Dsqlallproducts-allversions%2523customconfig)\
    \ 中讨论了这种方法。\n\n为了了解如何修改 BDC JSON 文件，你需要了解更多架构知识，我将在下一节“大数据集群架构”中进行描述。届时，你可能需要返回本节，更仔细地研究\
    \ JSON 文件以及相应修改它们的技巧。一旦你对需要修改的内容有了一些想法，可以参考我们文档中关于如何修改 BDC JSON 文件的指南 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration)。BDC\
    \ JSON 文件的完整部署配置参考可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-deployment-config`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-deployment-config)\
    \ 找到。你还应该研究我们的 Python 和 bash “自动部署”脚本，以了解如何创建 `k8s` 和 `BDC`。\n\n`python` – [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\n\
    \n`bash` – [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm)\n\
    \n这些脚本假设使用一个 Kubernetes (`k8s`) 节点。在生产 `k8s` 集群中，你可能希望使用多个节点。然后，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration)\
    \ 决定如何将 `BDC` 的各个组件放置在特定的 `k8s` 节点上。\n\n为生产环境配置 `BDC` 的另一个重要方面是存储。我们的文档提供了关于如何为生产环境配置\
    \ `BDC` 存储以匹配你的 `k8s` 存储配置的指南，请访问 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence)。`BDC`\
    \ 中每一个具有有状态存储的 Pod 都使用一个单独的持久卷声明 (`PVC`)。你可以通过执行以下命令获取 `BDC` 中所有 `PVC` 对象的列表：\n\
    \n```\nget PersistentVolumeClaim --namespace=mssql-cluster\n```\n"
- fmt: '部署 BDC 时另外两个重要方面是安全性和高可用性，我将在本章后面的“安全性”和“高可用性”小节中进行更详细的描述。


    ## 大数据集群架构


    我将使用我部署的 BDC 来更详细地描述架构。我已经介绍了 BDC 包含哪些组件，但这更像是一个组件的“能力列表”。研究其架构很有趣，因为你可以准确地看到我们安装了哪些
    Pod 和容器。你从第 [7](#479130_1_En_7_Chapter.xhtml) 和 [8](#479130_1_En_8_Chapter.xhtml)
    章获得的知识在这里将变得重要。


    ### 注意


    如果你想开始使用 BDC，请转到下一节“使用大数据集群”。我认为本节关于架构的内容是本章的“400级”部分。在了解了 BDC 的使用方面后，你随时可以返回来阅读本节。你应该知道，我们构建
    BDC 时已考虑到你无需了解架构的每个细节。本节中的任何细节都可能随时更改。我将向你展示一些“幕后”细节，这些细节当然会随着时间的推移而发生变化。


    让我们以图 [10-7](#479130_1_En_10_Chapter.xhtml#Fig7) 作为 SQL Server 大数据集群 (BDC) 的整体架构。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig7_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig7_HTML.jpg)


    图 10-7


    SQL Server 大数据集群架构


    请注意，在此图中使用了术语 `pool`。在 BDC 中，`pool` 是一个逻辑术语，代表一组服务于 BDC 中特定用途的 Pod。我在本章前面已经提到过其中一些池，如计算池和数据池。我将在本节中更详细地描述哪些
    Pod 和容器组成了这些池。


    让我们分解图 [10-7](#479130_1_En_10_Chapter.xhtml#Fig7) 的每个部分来描述 BDC 架构，使用各种命令和图示。一种分解架构的方式是从
    `k8s perspective` 出发。


    当我运行这个命令时，我得到 BDC 在我的单节点 k8s 集群上部署的所有 Pod 的列表：


    ```

    kubectl get pods --namespace mssql-cluster

    ```


    结果是这个 Pod 列表及其状态：


    ```

    NAME              READY   STATUS    RESTARTS   AGE

    appproxy-q8zkk    2/2     Running   0          24h

    compute-0-0       3/3     Running   0          24h

    control-vjwjf     3/3     Running   0          24h

    controldb-0       2/2     Running   0          24h

    controlwd-l8fmp   1/1     Running   0          24h

    data-0-0          3/3     Running   0          24h

    data-0-1          3/3     Running   0          24h

    gateway-0         2/2     Running   0          24h

    logsdb-0          1/1     Running   0          24h

    logsui-f42ln      1/1     Running   0          24h

    master-0          3/3     Running   0          24h

    metricsdb-0       1/1     Running   0          24h

    metricsdc-gtrxn   1/1     Running   0          24h

    metricsui-kwh4q   1/1     Running   0          24h

    mgmtproxy-nc8tl   2/2     Running   0          24h

    nmnode-0-0        2/2     Running   0          24h

    sparkhead-0       4/4     Running   0          24h

    storage-0-0       4/4     Running   0          24h

    storage-0-1       4/4     Running   0          24h

    ```


    基于此列表和我到目前为止描述的概念，你可能可以猜到一些 Pod 如何映射到图 [10-7](#479130_1_En_10_Chapter.xhtml#Fig7)。`READY`
    列中的数字显示了每个 Pod 中运行的容器数量。这意味着用于“开发/测试”的简单 BDC 集群大约有 43 个容器！


    让我们使用此列表将 k8s 集群中的 Pod 映射到图 [10-7](#479130_1_En_10_Chapter.xhtml#Fig7) 的组件，包括
    `pools` 的概念。


    ### SQL Server 主实例


    SQL Server 主实例由 Pod `master-0` 表示。在此 Pod 中运行的主要容器是一个 SQL Server Linux 容器。你可以使用以下命令来获取
    BDC 如何部署 SQL Server 容器的详细信息：


    ```

    kubectl describe pod master-0 --namespace mssql-cluster

    ```


    我们组织 BDC 的一个重要方面是使用 Kubernetes 的标签。我在第 [8](#479130_1_En_8_Chapter.xhtml) 章中介绍了如何在
    SQL Server 和 k8s 中使用标签。查看上述命令输出的这一部分：


    ```

    Labels:             MSSQL_CLUSTER=mssql-cluster

    app=master

    controller-revision-hash=master-7bbc4d95fb

    mssql.microsoft.com/sql-instance=master

    plane=data

    role=master-pool

    statefulset.kubernetes.io/pod-name=master-0

    type=sqlservr

    ```


    你可以看到我们如何使用其中一些标签映射到 BDC 中的术语。例如，这两个标签很有意思：


    ```

    plane=data

    role=master-pool

    ```


    如果你运行以下命令，你可以看到“数据平面”中的所有 Pod：


    ```

    get pods --namespace mssql-cluster -lplane=data

    ```


    在我的 BDC 上，我得到以下输出：


    ```

    NAME             READY   STATUS    RESTARTS   AGE

    appproxy-q8zkk   2/2     Running   0          24h

    compute-0-0      3/3     Running   0          24h

    data-0-0         3/3     Running   0          24h

    data-0-1         3/3     Running   0          24h

    master-0         3/3     Running   0          24h

    nmnode-0-0       2/2     Running   0          24h

    sparkhead-0      4/4     Running   0          24h

    storage-0-0      4/4     Running   0          24h

    storage-0-1      4/4     Running   0          24h

    ```


    此列表代表了图 [10-7](#479130_1_En_10_Chapter.xhtml#Fig7) 中的大部分主要组件，除了我将在下一节“控制器”中描述的
    `Controller`。


    如果你进一步查看前面 `kubectl describe pod` 命令的输出，你将看到 SQL Server 容器的详细信息，从以下开始：


    ```

    Containers:

    mssql-server:

    ```


    如果你回顾第 [8](#479130_1_En_8_Chapter.xhtml) 章，在 k8s 中用于 SQL Server 的 Pod 所涉及的重要组件是


    *   容器镜像

    *   持久卷声明

    *   密钥

    *   负载均衡器

    *   副本集


    前面 `kubectl describe` 命令的输出显示了所有这些组件。


    你可以在这个部分看到 SQL Server 容器的 `container image`（请记住我当时使用的是 SQL Server 2019 大数据集群版本）：


    ```

    Image:          mcr.microsoft.com/mssql/bdc/mssql-server-data:2019-RC1-ubuntu

    ```


    在输出的后面部分，你将看到一个 `mounts` 列表，它描述了挂载到 `PersistentVolumeClaim` 对象的持久化存储。


    注意这个挂载：


    ```

    /var/opt from data (rw)

    ```


    以及这个 Volume


    ```

    Volumes:

    data:

    Type:       PersistentVolumeClaim (a reference to a PersistentVolumeClaim in the
    same namespace)

    ClaimName:  data-master-0

    ReadOnly:   false

    ```


    如果你还记得第 [8](#479130_1_En_8_Chapter.xhtml) 章，我向你展示了如何将像 `/var/opt` 这样的 SQL Server
    目录映射到 PVC 对象。


    你可以运行此命令来查看 PVC 对象的详细信息：


    ```

    describe PersistentVolumeClaim data-master-0 --namespace=mssql-cluster

    ```


    从这个输出中，你可以看到这个 PVC 对象绑定到 AKS 的默认 `StorageClass`，大小为 15Gb。当然，这对于存储你的 SQL Server
    数据来说并不是很大，但这只是一个测试集群。如果你需要为自定义配置更改这些大小，你可以阅读我们的文档 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence)
    来了解如何操作。'
  raw: 'Two other important aspects of deploying BDC in production are Security and
    High Availability which I’ll describe more in sections “Security” and “High Availability”
    later in this chapter.


    ## Big Data Cluster Architecture


    I’ll use my deployed BDC to describe more details about the architecture. I described
    what comes with BDC, but that was more of a “capability list” of components. The
    architecture is interesting to study because you can see exactly what pods and
    containers we have installed. Your knowledge from Chapters [7](#479130_1_En_7_Chapter.xhtml)
    and [8](#479130_1_En_8_Chapter.xhtml) will become important here.


    ### Note


    If you want to jump into using BDC, go to the next section called “Using Big Data
    Clusters.” I consider this section on architecture the “Level 400” section of
    the chapter. You can always come back and read this section after going through
    aspects of using BDC. You should know that we have built BDC so that you don’t
    have to know every detail of the architecture. And any of the details in this
    section of the chapter are subject to change. I’ll show you some details that
    are “behind the scenes” and those certainly could change over time.


    Let’s use Figure [10-7](#479130_1_En_10_Chapter.xhtml#Fig7) as the overall architecture
    of SQL Server Big Data Clusters (BDC).


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig7_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    The SQL Server Big Data Cluster architecture


    Notice that in this visual the term *pool* is used. A pool is a logical term in
    BDC that represents a collection of pods that serve a specific purpose in BDC.
    I’ve mentioned some of these pools previously in the chapter like Compute Pool
    and Data Pool. I’ll describe more of what pods and containers make up these pools
    in this section.


    Let’s break down each piece of Figure [10-7](#479130_1_En_10_Chapter.xhtml#Fig7)
    to describe the BDC architecture, using various commands and visuals. One way
    to break down the architecture is from a *k8s perspective*.


    When I run this command, I get a list of all the pods deployed by BDC on my single
    node k8s cluster:


    ```

    kubectl get pods --namespace mssql-cluster

    ```


    The result is this list of pods and their status:


    ```

    NAME              READY   STATUS    RESTARTS   AGE

    appproxy-q8zkk    2/2     Running   0          24h

    compute-0-0       3/3     Running   0          24h

    control-vjwjf     3/3     Running   0          24h

    controldb-0       2/2     Running   0          24h

    controlwd-l8fmp   1/1     Running   0          24h

    data-0-0          3/3     Running   0          24h

    data-0-1          3/3     Running   0          24h

    gateway-0         2/2     Running   0          24h

    logsdb-0          1/1     Running   0          24h

    logsui-f42ln      1/1     Running   0          24h

    master-0          3/3     Running   0          24h

    metricsdb-0       1/1     Running   0          24h

    metricsdc-gtrxn   1/1     Running   0          24h

    metricsui-kwh4q   1/1     Running   0          24h

    mgmtproxy-nc8tl   2/2     Running   0          24h

    nmnode-0-0        2/2     Running   0          24h

    sparkhead-0       4/4     Running   0          24h

    storage-0-0       4/4     Running   0          24h

    storage-0-1       4/4     Running   0          24h

    ```


    Based on this list and the concepts I’ve described to this point, you can probably
    guess how some of the pods map to Figure [10-7](#479130_1_En_10_Chapter.xhtml#Fig7).
    The numbers in the READY column show you how many containers are running in each
    pod. This means that a simple BDC cluster for “dev/test” has ~43 containers!


    Let’s use this list to map pods in the k8s cluster to Figure [10-7](#479130_1_En_10_Chapter.xhtml#Fig7)
    components, including the concept of *pools*.


    ### SQL Server Master Instance


    The SQL Server Master Instance is represented by the pod **master-0**. The main
    container running in this pod is a SQL Server Linux container. You can use the
    following command to get details of how BDC deploys a SQL Server container:


    ```

    kubectl describe pod master-0 --namespace mssql-cluster

    ```


    One important aspect of how we have organized BDC is the use of labels with Kubernetes.
    I described how to use a label in Chapter [8](#479130_1_En_8_Chapter.xhtml) with
    SQL Server and k8s. Look at this section of the output from the preceding command:


    ```

    Labels:             MSSQL_CLUSTER=mssql-cluster

    app=master

    controller-revision-hash=master-7bbc4d95fb

    mssql.microsoft.com/sql-instance=master

    plane=data

    role=master-pool

    statefulset.kubernetes.io/pod-name=master-0

    type=sqlservr

    ```


    You can see how we use some of these labels to map to terms in the BDC. For example,
    these two labels are interesting:


    ```

    plane=data

    role=master-pool

    ```


    If you run the following command, you can see all the pods in the “data plane”:


    ```

    get pods --namespace mssql-cluster -lplane=data

    ```


    On my BDC, I get the following output:


    ```

    NAME             READY   STATUS    RESTARTS   AGE

    appproxy-q8zkk   2/2     Running   0          24h

    compute-0-0      3/3     Running   0          24h

    data-0-0         3/3     Running   0          24h

    data-0-1         3/3     Running   0          24h

    master-0         3/3     Running   0          24h

    nmnode-0-0       2/2     Running   0          24h

    sparkhead-0      4/4     Running   0          24h

    storage-0-0      4/4     Running   0          24h

    storage-0-1      4/4     Running   0          24h

    ```


    This list represents most of the major components in Figure [10-7](#479130_1_En_10_Chapter.xhtml#Fig7),
    with the exception of the **Controller** , which I’ll describe later in the next
    section called “Controller.”


    If you look further at the output of the kubectl describe pod command earlier,
    you will see the details of the SQL Server container, starting with:


    ```

    Containers:

    mssql-server:

    ```


    If you look back at Chapter [8](#479130_1_En_8_Chapter.xhtml), the important components
    involved in a pod for SQL Server in k8s were


    *   Container image


    *   Persistent Volume Claim


    *   Secret


    *   Load Balancer


    *   ReplicaSet


    The output from the `kubectl describe` command earlier shows all of these components.


    You can see the **container image** for the SQL Server container (remember I was
    using SQL Server 2019 Big Data Clusters release) in this section:


    ```

    Image:          mcr.microsoft.com/mssql/bdc/mssql-server-data:2019-RC1-ubuntu

    ```


    Later in the output you will see a list of *mounts* which describe persisted storage
    mounts to **PersistentVolumeClaim** objects.


    Notice this mount:


    ```

    /var/opt from data (rw)

    ```


    And this Volume


    ```

    Volumes:

    data:

    Type:       PersistentVolumeClaim (a reference to a PersistentVolumeClaim in the
    same namespace)

    ClaimName:  data-master-0

    ReadOnly:   false

    ```


    If you remember in Chapter [8](#479130_1_En_8_Chapter.xhtml), I showed you how
    to map a SQL Server directory like /var/opt to a PVC object.


    You can run this command to see the details of the PVC object:


    ```

    describe PersistentVolumeClaim data-master-0 --namespace=mssql-cluster

    ```


    From this output, you can see this PVC object is bound to the default **StorageClass**
    for AKS and is 15Gb. That is not very big, of course, to store your SQL Server
    data, but this is just a test cluster. If you need to change these sizes for a
    custom configuration, you can read how to do this in our documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence)
    .'
