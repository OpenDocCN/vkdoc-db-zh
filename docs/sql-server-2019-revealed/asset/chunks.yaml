    ### Note


    Calling all macOS users. Please take a look at the following blog post I wrote
    showing how you can now run SQL Server and tools with no Windows software required!
    [`https://bobsql.com/take-the-sql-server-mac-challenge/`](https://bobsql.com/take-the-sql-server-mac-challenge/)


    **Lightweight**


    A container is a running instance of a container image, and it in the end is just
