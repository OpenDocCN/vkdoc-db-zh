    \ long but effectively contains the T-SQL code to set up a publisher, distributor,\
    \ subscriber, and snapshot publication.\n\ndb-init.sh for db2 will also pause\
    \ for its SQL Server to start and then execute the db-init.sql script in its directory.\
    \ db-init.sql for db2 only needs to create the database to hold the data for the\
    \ subscriber.\n\nIt is quite an interesting method to customize a SQL Server container.\
    \ This same method can be used to customize a SQL Server container to create a\
    \ database and run your own T-SQL scripts. In the long term, we want a better\
    \ method to achieve this type of goal so that you don’t have to manually “sleep”\
    \ in a shell script to execute custom code. For now, this method works quite well.\n\
    \n### Running the Containers for Replication\n\nTry it for yourself with one of\
    \ two methods:\n\n*   Run the following command (preface with sudo on Linux).\
    \ You must be in the **ch7_inside_sql_containers\\sqlrepl** directory to run this.\n\
    \n    **docker-compose up**\n\n    If you use this option, the containers are\
    \ not started in the background so you will see a dump of information to the console\
    \ including SQL Server ERRORLOG files. DO NOT hit <ctrl>+<c> at this point or\
    \ you will shut down the containers.\n\n*   If you have the Docker extension installed,\
    \ you can right-click the docker-compose.yml file and select Compose Up. This\
    \ method run the containers in the background.\n\n### Note\n\nOn some Windows\
    \ 10 systems, I have seen the following pop-up in Figure [7-6](#479130_1_En_7_Chapter.xhtml#Fig6)\
    \ for the Windows Defender Firewall for a service that is required for networking\
    \ for Docker. If you see this, click Allow Access.\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig6_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nWindows Firewall warning for Docker\n\nTo ensure your containers\
    \ deployed correctly and SQL Server Replication is running, first check to see\
    \ if the subscriber has the data replicated. Use Azure Data Studio or SQL Server\
    \ Management Studio (SSMS) to connect to localhost,2600 and see if the [Sales].[dbo].[customer]\
    \ table has data. It should have three rows.\n\nAlso, you can verify the snapshot\
    \ agent job was applied successfully by using SSMS connecting to the subscriber.\
    \ Use Object Explorer like in Figure [7-7](#479130_1_En_7_Chapter.xhtml#Fig7)\
    \ to check the snapshot job status.\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig7_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7\n\nSnapshot job for a SQL Server Replication container\n\nWhen Vin\
    \ first showed me this, I had to stop and think about this method. I’ve worked\
    \ on a complex system like Replication since it was first invented in SQL Server\
    \ 6.0\\. I never thought I would see a way to deploy it so easily. Of course,\
    \ SQL Server Replication can be more complex so using containers for your scenario\
    \ could involve more. But look at the promise of what containers can provide for\
    \ a distributed system like SQL Server Replication.\n\n*   If you ran docker-compose\
    \ up from the command line, hit Ctrl+C which will stop the containers.\n\n*  \
    \ You will want to clean up resources, so when you are done, run the following\
    \ command (preface with sudo on Linux). You must be in the **ch7_inside_sql_containers\\\
    sqlrepl** directory to run this.\n\n    **docker-compose down**\n\n    This will\
    \ stop and remove the running containers.\n\n    This will not remove the docker\
    \ custom images, so to clean up all resources, use the **cleanup.ps1** or **cleanup.sh**\
    \ script to remove the customized images.\n\n## Deploying SQL Containers in Production\n\
    \nI’ve been presenting and talking about containers ever since we started supporting\
    \ them with SQL Server 2017\\. As I’ve presented this topic even with the story\
    \ about how containers are really just the sqlservr program running in a unique\
    \ way, I’ve faced some skepticism that SQL Server containers can be used for a\
    \ production workload. I hope I’ll convince some of the skeptics with information\
    \ in this section about performance, security, availability, resource control,\
    \ and server configuration related to SQL Server containers."
  trans: "\n## 构建每个容器\n\n让我们看看示例中提供的各个目录的内容，以便构建和运行用于复制的容器。我将使用这些文件的场景称为“Vin Yu 方法”，用以构建\
    \ SQL Server 自定义容器镜像，以此向我的同事 Vin Yu 致敬，是他教会了我如何做到这一点。\n\n每个目录包含以下文件：\n\n`Dockerfile`\
    \ – 包含如何基于 SQL Server 容器镜像构建自定义镜像的定义。\n\n`entrypoint.sh` – 这成为容器要运行的主程序。它会启动一个名为\
    \ `db-init.sh` 的脚本和 `sqlservr` 程序。\n\n`db-init.sh` – 此脚本由 `entrypoint.sh` 调用，并将暂停一段时间，然后执行\
    \ `db-init.sql` 脚本。\n\n`db-init.sql` – 包含用于在 `db1` 上创建发布者、分发者、订阅者和快照发布的 T-SQL\
    \ 代码。它将为 `db2` 创建订阅者数据库。实际上，Vin 所做的是将 SQL Server Management Studio 用于设置复制的构建过程脚本化，并以一种巧妙的方式保存为\
    \ T-SQL 执行。\n\n如果你查看 `db1` 和 `db2` 的 `Dockerfile`，它看起来是这样的：\n\n```dockerfile\n\
    FROM mcr.microsoft.com/mssql/rhel/server:2019-latest\nCOPY . /\nRUN chmod +x /db-init.sh\n\
    CMD /bin/bash ./entrypoint.sh\n```\n\n当 `docker-compose` 为每个容器执行“构建”阶段时，`Dockerfile`\
    \ 的定义指示：\n\n*   使用最新的 SQL Server RHEL 容器镜像作为基础（该镜像本身使用 RHEL 操作系统镜像作为基础）。\n*  \
    \ 将 `entrypoint.sh`、`db-init.sh` 和 `db-init.sql` 脚本复制到容器镜像的文件系统中。\n*   修改 `db-init.sh`\
    \ 脚本，使其成为可执行脚本（对于 `entrypoint.sh` 脚本，你不需要这样做）。\n*   使要运行的默认程序成为执行 `entrypoint.sh`\
    \ 脚本的 Bash shell。\n\n现在让我们看看 `entrypoint.sh` 脚本：\n\n```bash\n#启动 SQL Server，启动创建/设置数据库的脚本\n\
    #你需要一个非终止进程来保持容器运行。\n#在一系列由单个 & 分隔的命令中，最右侧 & 左边的命令会在后台运行。\n#因此——如果你使用单个 & 同时执行一系列命令，最右边的命令需要是非终止的。\n\
    /db-init.sh & /opt/mssql/bin/sqlservr\n```\n\n此脚本将首先执行 `db-init.sh` 脚本，并在执行的同时启动\
    \ `sqlservr` 程序（这就是 `&` 符号的含义，启动一个程序，然后运行下一个）。\n\n`db1` 的 `db-init.sh` 如下所示：\n\
    \n```bash\n#等待 SQL Server 启动\nsleep 45s\nmkdir /var/opt/mssql/ReplData/\nchown\
    \ mssql /var/opt/mssql/ReplData/\nchgrp mssql /var/opt/mssql/ReplData/\necho \"\
    正在运行设置脚本\"\n#运行设置脚本以在数据库中创建 DB 和架构\n/opt/mssql-tools/bin/sqlcmd -S localhost -U\
    \ sa -P MssqlPass123 -d master -i db-init.sql\n```\n\n由于 `db-init.sh` 首先启动，它必须等待\
    \ SQL Server 启动后才能执行任何 T-SQL 脚本。\n\n然后，它在容器的可写层中创建存储复制快照所需的一些目录。\n\n最后，此脚本使用 `sqlcmd`（存在于每个\
    \ SQL Server 容器中）执行 `db-init.sql` T-SQL 脚本。\n\n`db1` 的 `db-init.sql` 相当长，但实际上包含用于设置发布者、分发者、订阅者和快照发布的\
    \ T-SQL 代码。\n\n`db2` 的 `db-init.sh` 也会暂停等待其 SQL Server 启动，然后执行其目录中的 `db-init.sql`\
    \ 脚本。`db2` 的 `db-init.sql` 只需要创建用于保存订阅者数据的数据库。\n\n这是一种相当有趣的自定义 SQL Server 容器的方法。相同的方法可用于自定义\
    \ SQL Server 容器以创建数据库并运行你自己的 T-SQL 脚本。从长远来看，我们希望有一种更好的方法来实现此类目标，这样你就不必手动在 shell\
    \ 脚本中“sleep”来执行自定义代码。就目前而言，这种方法效果很好。\n\n## 运行用于复制的容器\n\n通过以下两种方法之一亲自尝试：\n\n* \
    \  运行以下命令（在 Linux 上需加 `sudo` 前缀）。你必须位于 `ch7_inside_sql_containers\\sqlrepl` 目录中才能运行此命令。\n\
    \    ```\n    docker-compose up\n    ```\n    如果你使用此选项，容器不会在后台启动，因此你将在控制台上看到大量信息输出，包括\
    \ SQL Server 的 ERRORLOG 文件。此时请勿按 `<ctrl>+<c>`，否则你将关闭容器。\n\n*   如果你安装了 Docker 扩展，可以右键单击\
    \ `docker-compose.yml` 文件并选择“Compose Up”。此方法将在后台运行容器。\n\n## 注意\n\n在某些 Windows\
    \ 10 系统上，我见过图 7-6 所示的弹出窗口，涉及 Docker 所需网络服务的 Windows Defender 防火墙。如果你看到此窗口，请单击“允许访问”。\n\
    \n![图 7-6](img/479130_1_En_7_Fig6_HTML.jpg)\n\n图 7-6\n\nDocker 的 Windows 防火墙警告\n\
    \n为确保容器正确部署且 SQL Server 复制正在运行，首先要检查订阅者是否已复制数据。使用 Azure Data Studio 或 SQL Server\
    \ Management Studio (SSMS) 连接到 `localhost,2600`，并查看 `[Sales].[dbo].[customer]`\
    \ 表是否有数据。它应该包含三行。\n\n此外，你可以通过使用 SSMS 连接到订阅者来验证快照代理作业是否已成功应用。使用如图 7-7 所示的对象资源管理器检查快照作业状态。\n\
    \n![图 7-7](img/479130_1_En_7_Fig7_HTML.jpg)\n\n图 7-7\n\nSQL Server 复制容器的快照作业\n\
    \n当 Vin 第一次向我展示这个时，我不得不停下来思考这种方法。自从它首次在 SQL Server 6.0 中发明以来，我就一直在研究像复制这样的复杂系统。我从未想过会看到一种如此简单的方法来部署它。当然，SQL\
    \ Server 复制可以更复杂，因此针对你的场景使用容器可能涉及更多内容。但是，请看看容器能为像 SQL Server 复制这样的分布式系统带来的前景。\n\
    \n*   如果你是从命令行运行 `docker-compose up`，请按 `Ctrl+C`，这将停止容器。\n*   你会想要清理资源，因此完成后，运行以下命令（在\
    \ Linux 上需加 `sudo` 前缀）。你必须位于 `ch7_inside_sql_containers\\sqlrepl` 目录中才能运行此命令。\n\
    \    ```\n    docker-compose down\n    ```\n    这将停止并移除正在运行的容器。\n    这不会移除 Docker\
    \ 自定义镜像，因此要清理所有资源，请使用 `cleanup.ps1` 或 `cleanup.sh` 脚本来移除自定义镜像。\n\n## 在生产环境中部署\
    \ SQL 容器\n\n自从我们通过 SQL Server 2017 开始支持容器以来，我一直在介绍和谈论容器。即使我用“容器实际上只是以独特方式运行的 `sqlservr`\
    \ 程序”这样的故事来介绍这个主题时，我也面临着一些怀疑，即 SQL Server 容器能否用于生产工作负载。我希望通过本节中关于 SQL Server 容器的性能、安全性、可用性、资源控制和服务器配置的信息，能够说服一些怀疑论者。\n"
- fmt: '### Performance


    As I’ve talked about containers, one of the myths I’ve heard is that SQL Server
    containers may not perform as well as a SQL Server instance not running in a container.
    You have seen that I’ve presented the story that a SQL Server container is just
    a program running in an isolated manner and has direct access to operating system
    resources. Therefore, the performance you can expect for SQL Server Linux containers
    is exactly the same performance for SQL Server on Linux not running in a container.


    If you are like me though, you want some proof. Therefore, I took the open source
    benchmark tool called `HammerDB` (`www.hammerdb.com`) and ran a test using the
    analytic performance test derived from TPC-H. I compared the performance with
    `HammerDB` for SQL Server on Linux running in a container and SQL Server outside
    of a container on the same host Linux virtual machine. I found the performance
    100% identical using these deployments.


    I encourage you to try this yourself. Here are the details of how I used `HammerDB`
    for this test:


    *   I installed the `HammerDB` tool in a Windows 10 Virtual Machine in Azure.

    *   I created an Azure VM with RHEL 7.4 using a size of DS13 v2 (8 vcpus, 56GB
    RAM).

    *   I created a Premium SSD of 2TB to host the databases for `HammerDB`. I mounted
    this drive in a directory on Linux and called it `/data`. This is the guide I
    use to add a data disk to Linux in Azure VM (`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/attach-disk-portal`).

    *   Installed SQL Server 2019 CTP 3.2 in the host Linux Virtual Machine.

    *   I precreated the `tpch` database of a size of 35Gb and 5Gb log. I used a scale
    factor of 10 with 16 virtual users (the Windows VM client is an 8-core VM).


    #### Tip


    Change the driver to “ODBC Driver 17 for SQL Server” when using the latest version
    of `HammerDB` and use a clustered columnstore index.


    *   I then ran the TPC-H test using 16 virtual users. I was able to achieve ~160,000
    qph when running `HammerDB` against both the SQL Server container and SQL Server
    outside the container installed on the same VM (I only run one of these at a time).


    I encourage you to run a test like this for yourself or any other performance
    test with SQL Server containers. Just make sure you are running a fair comparison
    between a container and SQL Server outside of a container.


    ### Security


    Since SQL Server containers are just SQL Server on Linux as an isolated program,
    all the security capabilities and features of SQL Server on Linux work for containers.
    This includes all SQL Server engine security capabilities for logins, securables,
    and principles. Features like dynamic data masking, row-level security, Transparent
    Data Encryption (TDE), and others all work with containers.


    #### Active Directory Authentication


    The only exception to a complete secure feature set is Active Directory (AD) Authentication.
    During the lifecycle of building SQL Server 2019, it was our intention to document
    and support Active Directory authentication for containers. And it still may make
    our final release. But at the time I was writing this chapter, Dylan Gray, one
    of our lead developers for Linux and containers, and I were discussing this support.
    If at the time we ship SQL Server 2019 AD support was not documented and available,
    I expect it to be shortly close after SQL Server 2019 ships.


    Dylan and I discussed what the documented process will look like, and it is very
    similar to setting up AD authentication for SQL Server on Linux without containers
    which you can read at (`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-authentication`).
    The key differences will be to pass into the container information about the Kerberos
    SPN via a keytab file in a volume that the SQL Server container can use. I’ve
    had several customers tell me that having AD authentication is a key element to
    using SQL Server containers in a production environment, and we intend to deliver
    on that request and requirement.


    #### Non-root Containers


    Ever since we shipped SQL Server containers, the container program runs under
    the context of the root user in the container namespace. Even though a root container
    program does not have complete root privileges to the host computer, it is a best
    practice to run a container program not as root.


    SQL Server 2019 will support non-root containers, and in fact when I spoke to
    Madeline McDonald, one of our lead developers for containers, about support for
    non-root containers, she told me the intention as we shipped SQL Server 2019 was
    to ship any SQL Server 2019 container as non-root by default but leave SQL Server
    2017 containers “as is.”


    I asked Madeline what the procedure was to run a SQL Server 2017 or SQL Server
    2019 CTP container as non-root, and she gave me an example to try it.


    Try out the scripts and files I’ve provided in the `ch7_inside_sql_containers\nonroot`
    folder. You will use the `Dockerfile` to build a customer container. The `Dockerfile`
    looks like the following:


    ```

    FROM mcr.microsoft.com/mssql/rhel/server:2019-latest

    RUN useradd -u 10001 -g root mssql

    RUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql

    USER mssql

    CMD ["/opt/mssql/bin/sqlservr"]

    ```


    Notice the `RUN` commands which will add a user and group for `mssql` and precreate
    the SQL Server directories for permissions for the `mssql` group. The `Dockerfile`
    `USER` command indicates which user context to run the container program under.
    Everything else is the same as running a SQL Server container today. Build the
    docker image using `docker build` and then use the scripts I’ve provided to run
    the container.


    ### High Availability


    SQL Server Containers support the basics of backup and restore, and even log shipping
    can work. I’ve shown you an example of using SQL Server Replication which can
    be a high available solution for some customers.


    Even though it is possible to set up an Always On Availability Group between containers,
    the preferred method for high availability for containers is to use `Kubernetes`.
    I’ll discuss how to make SQL Server highly available using `Kubernetes` in Chapter
    [8](#479130_1_En_8_Chapter.xhtml).'
