    \nFigure 10-6\n\nConnect to SQL Server in BDC after deployment\n\n*   Verify the\
    \ overall status of BDC using the following command:\n\n```\n    azdata bdc status\
    \ show\n    ```\n\nThe results for my BDC cluster looked like this:\n\n```\n \
    \   Mssql-cluster: ready                                         Health Status:\
