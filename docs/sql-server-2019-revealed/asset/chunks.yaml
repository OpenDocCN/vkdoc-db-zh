    .


    ### Platforms and Editions


    Starting with SQL Server 2017, SQL Server is now supported on Windows, Linux,
    and with Docker Containers. This opens up the platform to developers who have
    never considered SQL Server before. Regardless of what operating system hosts
    the production SQL Server, developers can now test their applications with SQL
    Server Developer Edition on Windows, Linux, or with Containers. And because the
    SQL Server engine codebase is the same on all of these platforms, developers can
    write applications local to their SQL Server deployment and be assured it is compatible
    with the production SQL Server. This includes former feature gaps for SQL Server
    on Linux, such as replication and Distributed Transactions (DTC), which now are
    available in SQL Server 2019.


    Although not new to SQL Server 2019 (this was introduced in SQL Server 2016 SP1),
    SQL Server editions other than Enterprise Edition contain similar “surface area”
    features to make it easier to build a single application than can work across
    editions. For example, In-Memory OLTP is now available as a feature for SQL Server
    Enterprise and Standard Edition, and even SQL Server Express Edition (although
    the scale of this feature is not the same across editions). You can now build
    your application using In-Memory OLTP on Developer Edition and be assured it can
    work across various editions without putting logic to detect editions in your
    application.


    ## Graph Database


    The concept of a relational database handles all types of design models, data
    patterns, and applications. However, there are certain types of data models designed
    after a real-world problem that don’t necessarily fit well with a standard relational
    system and the SQL language. The models typically involve hierarchical, “network,”
    or complex many-to-many relationships of data. Wikipedia has a good description
    of this problem and solutions at [`https://en.m.wikipedia.org/wiki/Graph_database`](https://en.m.wikipedia.org/wiki/Graph_database)
    .


    Some developers have tried to still use a relational database to “fit” in a graph
    model and use complex T-SQL statements to “navigate” the graph. In some cases,
    dedicated projects to graph data have been built, such as the popular open source
    graph database Neo4j ( [`https://github.com/neo4j/neo4j`](https://github.com/neo4j/neo4j)
    ). Other database platforms have included an “add-on” to their relational database
    to provide graph capabilities.


    In 2016, members of the SQL Engineering team, including Hanuma Kodavalla, Craig
    Freedman, Devin Rider, and Shreya Verma, formed a project to look into building
    graph database capabilities into SQL Server and Azure SQL Database. Their goal
    was to include graph capabilities *built into the SQL Server engine* and find
    a way to use the T-SQL language to create *graph tables* and manipulate and search
    them with T-SQL. This is another great example of leveraging the power of T-SQL
    by extending it.


    The result of this effort was the release of graph database capabilities in SQL
    Server 2017 and Azure SQL Database. One of the huge benefits of a graph database
    in SQL Server is that it comes along with the power of SQL Server. This includes
    HADR, security, performance, and all the features of the engine. Rather than incorporate
    them into the engine, other platforms treat features like this as add-ons or completely
    separate products altogether.'
