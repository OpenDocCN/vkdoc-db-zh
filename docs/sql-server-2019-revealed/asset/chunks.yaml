  trans: '## SQL Server 2019 在 Linux 上有哪些新功能


    承接在 Linux 上交付 SQL Server 的势头，我们在 SQL Server 2019 中增加了多项增强功能，旨在解决数据专业人员面临的挑战，并实现与
    Windows 版 SQL Server 的功能对等，包括：


    *   **平台与部署增强**：确保 Linux 上的 SQL Server 能根据当前资源可用性做出正确响应，并提供与 Windows 版 SQL Server
    对等的部署选项。此外，我们努力确保支持最新版本的 Linux 发行版，其中包含受 SQL Server 工程团队影响的 Linux I/O 增强功能。


    *   **采用持久内存支持的 I/O 加速性能**：以跟上硬件技术的进步。


    *   **Linux 上现已支持 SQL Server 复制**：以提供数据同步功能——这是多年来一直广受欢迎的 SQL Server 功能。


    *   **更改数据捕获 (CDC)**：为开发人员和数据专业人员提供了一种跟踪 SQL Server 表中结构和数据变化的方法。这是 Windows 版
    SQL Server 多个发行版中一直广受欢迎的功能，现在在 Linux 上也可用。


    *   **确保支持分布式事务**：使开发人员能够像多年来在 Windows 版 SQL Server 上那样，编写分布式数据应用程序。


    *   **使用 OpenLDAP 提供程序简化 Active Directory 部署**。


    *   **在 Linux 上支持 SQL Server 机器学习服务和可扩展性**：以启用新的应用场景，以安全且可扩展的方式将机器学习模型靠近数据，并扩展
    T-SQL 语言。


    *   **通过支持对 Hadoop、SQL Server、Oracle、Teradata 和 MongoDB 等外部数据源的 PolyBase 查询（无需数据移动），将数据虚拟化引入
    Linux 版 SQL Server**。


    在本章后续部分，我将用一个主要章节来分别介绍这些增强功能。


    ## 平台与部署增强


    对于 SQL Server 2019，我们对核心引擎和 `SQLPAL` 进行了增强，以确保 SQL Server 像在 Windows 上一样“为企业就绪”。此外，我们投入资源改进部署，以支持实现新功能所需的新安装包，并为用户提供与
    Windows 上安装类似的功能。我们还想确保 Linux 版 SQL Server 受到最新 Linux 发行版的支持，例如 Red Hat Enterprise
    Linux 8.0、Ubuntu 18.04 和 SUSE Linux Enterprise Server 15。这些新的 Linux 发行版包含对 Linux
    内核的增强，以提升具有持久性的 I/O 性能，这一点受到了 SQL Server 中 I/O 重要性的影响。


    ### 平台增强


    虽然 Linux 上的 SQL Server 核心引擎与 Windows 上的 SQL Server 使用完全相同的代码库是千真万确的，但 `SQLPAL`（以及一个称为
    Host Extension 的组件）的设计目的是允许 SQL Server 在必要时与 Linux 内核交互。我们在发布 Linux 版 SQL Server
    后发现，有一些领域需要进行增强，以确保我们的数据库平台表现得与 Windows 版 SQL Server 一致。由于这些是集成在操作系统中的核心数据库引擎功能，我们将这些更改移植回了
    SQL Server 2017——如果您安装了 SQL Server 2017 的最新累积更新，您将拥有这些更改。


    #### 内存通知


    SQL Server 的内存管理系统始终设计为具有弹性，能够响应 SQL Server 内部的内存需求以及整体操作系统环境中引擎外部的需求。


    虽然 SQL Server 的核心引擎与 Windows 上的相同，但响应内存压力等概念是特定于操作系统的。我们发现 SQL Server 2017 on
    Linux 在“内存通知”概念上存在一些问题，并增强了我们的 Linux 集成，以确保其在 SQL Server 2019 中与 Windows 上的工作方式一致。


    ### 注意


    我们还在最新的累积更新中进行了更改，以确保这些增强功能也包含在 SQL Server 2017 on Linux 中。


    我们的增强功能将确保我们的“目标”（即 SQL Server 内存分配的上限）在操作系统存在内存压力时进行调整。换句话说，如果整个操作系统的物理内存不足，SQL
    Server 将调低“目标”，以尝试避免操作系统内存交换或可怕的“OOMKiller”场景（您可以在 `https://unix.stackexchange.com/questions/153585/how-does-the-oom-killer-decide-which-process-to-kill-first`
    阅读更多关于 oomkiller 的信息）。


    查看 SQL Server 目标内存随内存压力（即物理内存不足）而调整的方式是监控 `dm_os_sys_info` 动态管理视图 (DMV) 中的 `committed_target_kb`
    列。


    #### 环形缓冲区动态管理视图


    SQL Server 有一个名为 `dm_os_ring_buffers` 的 DMV，可用于跟踪服务器和 `SQLSERVR.EXE` 进程的 CPU 利用率。此
    DMV 官方未提供支持，但它用于一个关键的监控工具，即 SQL Server Management Studio (SSMS) 中的性能仪表板。您可以在 `https://docs.microsoft.com/en-us/sql/relational-databases/performance/performance-dashboard`
    阅读更多关于如何使用性能仪表板的信息。


    该仪表板的一个有用功能是显示计算机和 `SQLSERVR.EXE` 的整体 CPU 利用率（甚至可以是过去一小时的数据），以帮助缩小特定于 SQL Server
    的 CPU 问题范围。此报告依赖于 `dm_os_ring_buffers` 的数据。问题是，在 Linux 上，我们始终报告 CPU 使用率为固定的 100%，因此该报告无法显示正确的数据。使用
    SQL Server 2019（以及 SQL Server 2017 的最新 CU），此 DMV 报告正确的使用率，现在性能仪表板可以用于 Linux 上的
    SQL Server 了。'
- fmt: "## SQL Server 2019 on Linux Deployment\n\nIf you are familiar with installing\
    \ SQL Server on Windows, you will be completely amazed at the simplicity of deploying\
    \ SQL Server on Linux. You can start at this documentation page [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview)\
    \ to see the “quickstarts” for deploying SQL Server on Linux.\n\nThere were a\
    \ few changes for SQL Server on Linux deployment worth calling out:\n\n*   `New\
    \ packages` were created to support new features. One of the reasons why SQL Server\
    \ on Linux deployment is lighter and faster is the product is deployed in a series\
    \ of packages. While the `mssql-server` package includes the core database engine,\
    \ SQL Agent, Replication, CDC, and Distributed Transactions, the following packages\
    \ are required to enable new functionality:\n\n    `mssql-mlservices-mlm-py∗`\
    \ and `mssql-mlservices-mlm-r∗` – Software for Machine Learning services. There\
    \ are other packages for ML Services which I will describe later in this chapter.\n\
    \n    `mssql-server-extensibility` – Software to enable external languages for\
    \ the extensibility framework.\n\n    `mssql-server-extensibility-java` – Software\
    \ to enable Java support for external languages. This package will install the\
    \ `mssql-server-extensibility` package.\n\n    `mssql-server-polybase` – Software\
    \ to enable the Data Virtualization feature of Polybase for SQL Server on Linux.\n\
    \n*   Just as with SQL Server on Windows, SQL Server on Linux will now automatically\
    \ create `more than one data file for tempdb` (up to 8) based on the number of\
    \ cores discovered during installation. This option can help avoid page latch\
    \ contention on system allocation pages.\n\n*   `mssql-conf` options have been\
    \ added to support new features for SQL Server 2019. For example, `mssql-conf`\
    \ options for `DTC` support have been added, which you can read more about at\
    \ [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc).\n\
    \n## Supporting New Linux Releases\n\nIt is important for SQL Server to be supported\
    \ on the latest release of major Linux distributions. Therefore, with SQL Server\
    \ 2019, we want to ensure we support these major Linux versions:\n\n*   Red Hat\
    \ Linux Enterprise 8.0\n*   Ubuntu 18.04\n*   SUSE Linux Enterprise Server 15\n\
    \n## Note\n\nAt the time of the writing of this book, it was our intention to\
    \ officially support these Linux releases with SQL Server 2019. SQL Server does\
    \ work on all of them, but we had to make some changes to the deployment packaging\
    \ and ensure they were well tested. It is possible issues could come up to prevent\
    \ us from being 100% ready at the time SQL Server 2019 ships, but, if it isn’t\
    \ announced then, I expect it to be formally announced shortly thereafter.\n\n\
    Along with the support of the latest Linux releases comes a benefit to I/O performance.\
    \ My long-time colleague Bob Dorr noticed after the release of SQL Server 2017\
    \ that I/O performance of SQL Server on Linux with `complete durability` could\
    \ be a problem. This led to the addition of some SQL Server configuration options\
    \ for a concept called “forced flush,” as documented in the Microsoft article\
    \ at [`https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux`](https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux).\
    \ We decided to ensure SQL Server, by default, prioritized durability over performance.\
    \ But customers want both, of course. Any customer could change from the default\
    \ and achieve durability with performance, if they knew their disk system could\
    \ support proper flushed writes.\n\nDuring the calendar year of 2018, Bob Dorr\
    \ and others on the SQL Server engineering team worked with Linux open source\
    \ engineering, especially those at Red Hat. The result of this work was changes\
    \ to the Linux kernel for the `XFS` file system `upstream`. Red Hat Enterprise\
    \ Linux (`RHEL`) 8.0 includes these kernel changes. Other Linux releases are to\
    \ follow incorporating these changes. Now a user can “turn off” our enforced flush\
    \ changes for SQL Server on Linux, but still achieve maximum performance with\
    \ durability.\n\nAs with other experiences in our career, Bob Dorr wanted to tell\
    \ the “story behind the story.” And he did so in this detailed blog post at [`https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/`](https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/).\
    \ I demonstrated these changes at the Red Hat Summit in May of 2019 and showed\
    \ the incredible 100%+ performance improvements using `RHEL` 7.6 vs. `RHEL` 8.0\
    \ configuring SQL Server to use the `FUA` enhancements. It seems like a small\
    \ story, but stop and think about this: `Microsoft assisted in contributing to\
    \ the open source Linux kernel to improve I/O for all applications!`\n\n## Persistent\
    \ Memory Support\n\nOne of the things I love about the SQL Server engineering\
    \ team is that they are always looking to the future. Always looking at the latest\
    \ advances in technology to ensure SQL Server stays ahead of the curve.\n\nIt\
    \ doesn’t surprise me to see that SQL Server on Linux can take advantage of persistent\
    \ memory devices. Persistent memory (`pmem`) is a `byte-addressable` storage device.\
    \ This means persistent memory can be accessed like standard RAM but have the\
    \ properties of a storage device – so data stored on it can survive computer power\
    \ outages and restarts.\n\nPersistent memory devices can always be treated in\
    \ both Windows and Linux as `block` devices. In other words, they can be presented\
    \ by the operating system as a standard disk drive, and SQL Server can access\
    \ them like any drive. In block mode, persistent memory devices can be faster\
    \ to access than even some of the fastest SSDs on the market. However, because\
    \ `pmem` devices are byte addressable, an application like SQL Server could transfer\
    \ data between the device and standard RAM as though it was memory, using API\
    \ calls like `memcpy()`, resulting in even faster I/O performance.\n\nSQL Server\
    \ 2019 has been enhanced to recognize database and transaction log files stored\
    \ on `pmem` devices and to `bypass` the Linux kernel I/O stack to transfer data\
    \ from these devices. You can read more about how applications can take advantage\
    \ of `pmem` devices, using a concept called `DAX` [`(www.kernel.org/doc/Documentation/filesystems/dax.txt`](https://www.kernel.org/doc/Documentation/filesystems/dax.txt))\
    \ at [`https://docs.pmem.io/getting-started-guide/installing-ndctl`](https://docs.pmem.io/getting-started-guide/installing-ndctl).\n\
    \nYou can read how to configure a `pmem` device with SQL Server in our documentation\
    \ at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem).\
    \ As I described in Chapter [2](#479130_1_En_2_Chapter.xhtml), DELL EMC was able\
    \ to achieve faster performance of SQL Server using `pmem` support, which you\
    \ can read about at [`www.emc.com/about/news/press/2019/20190402-01.htm`](https://www.emc.com/about/news/press/2019/20190402-01.htm).\
    \ In addition, HPE engineers have demonstrated I/O performance improvements with\
    \ SQL Server 2019 in this YouTube video at [`www.youtube.com/watch?v=8WUix125tQQ`](https://www.youtube.com/watch%253Fv%253D8WUix125tQQ)."
