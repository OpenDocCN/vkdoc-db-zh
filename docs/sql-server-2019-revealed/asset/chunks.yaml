  trans: '

    ### 安全、隔离与治理


    Joseph Sirosh 最早交办给我的任务之一，是提升广大 SQL 社区对 SQL Server R 服务的信心。他曾与几家使用 SQL Server
    的大公司讨论过此功能，而这些公司的数据专业人员对在 SQL Server 中运行 R 脚本持谨慎态度。


    我首先做的几件事之一，便是如前文所述，并在演示文稿 [`www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know`](https://www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know)
    中描述的那样，阐释其架构。该架构有助于解释 SQL Server ML 服务的*隔离*模型。所有 R 和 Python 脚本都在与 `SQLSERVR.EXE`
    分离的独立进程中运行，因此这些脚本的任何问题都不会导致数据库引擎出现问题。这与 SQL Server 的其他“扩展”模型（如扩展存储过程和 SQLCLR）形成对比，后者均在
    `SQLSERVR.EXE` 的“进程内”运行。此外，辅助进程彼此隔离运行，因此无法干扰每个用户的 R 或 Python 处理。除了这些作为独立进程运行之外，任何从
    `Launchpad` 创建的进程都在使用 Windows 中的 `AppContainer` 概念（[`https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation`](https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation)）和
    Linux 中的 `namespace` 概念（[`https://en.wikipedia.org/wiki/Linux_namespaces`](https://en.wikipedia.org/wiki/Linux_namespaces)）的隔离模型中运行。


    #### 安全


    我需要解释的第二个概念是安全。考虑 SQL Server ML 服务执行 R 或 Python 的安全模型：


    *   此功能仅在先安装然后通过 `sp_configure` 配置后才启用。您可以阅读关于如何在 Windows 上安装 SQL Server ML 服务的文档
    [`https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install)，以及在
    Linux 上的文档 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning)。关于
    `sp_configure` 选项的说明，请参阅 [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option)。

    *   T-SQL 系统存储过程 `sp_execute_external_script` 要求具有 `EXECUTE ANY EXTERNAL SCRIPT`
    数据库权限。此权限默认仅授予具有 `CONTROL` 权限的用户或角色，或具有 `CONTROL SERVER` 权限的登录名或角色。任何其他尝试执行 R
    或 Python 脚本的用户或登录名都必须被明确授予权限。

    *   用户还需要权限来访问在 `sp_execute_external_script` 的“输入查询”中引用的对象。

    *   用于执行 R 和 Python 的进程（`rterm.exe` 和 `python.exe`）都在特定的低权限帐户下运行。对于 Windows，您可以在
    [`https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup`](https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup)
    了解更多。对于 Linux，这些程序在 `mssql_satellite` 帐户下运行。

    *   默认情况下，辅助进程无法连接到运行 SQL Server 的计算机之外的网络。


    #### 治理


    为了增强对 R 和 Python 执行的控制，从而提供更多信心，第三个概念是*治理*。自 SQL Server 2008 以来，SQL Server 就具有治理的概念，其功能称为
    `Resource Governor`。资源治理器提供了一种机制，用于控制 SQL Server 执行的 CPU、内存和 I/O 资源。因此，资源治理器是控制
    ML 服务程序资源使用的天然接口。


    SQL Server 新增了外部资源池的概念，以明确控制通过 `sp_execute_external_script` 创建的进程（包括 `rterm.exe`、`python.exe`、`bxlserver.exe`
    等）的资源使用。在 Windows 中，外部资源组是通过称为 Windows *Jobs* 或 Job Objects 的概念实现的。您可以在 [`https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects`](https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects)
    了解更多关于 Windows Job Objects 的信息。对于 Linux，则使用控制组（`cgroups`）的概念来控制资源使用。关于 `cgroups`
    的更多信息，请参阅 [`https://en.wikipedia.org/wiki/Cgroups`](https://en.wikipedia.org/wiki/Cgroups)。


    外部资源组不仅可以帮助您控制外部进程的 CPU 和内存，还可以指定 CPU 亲和性。这样，您可以将辅助进程绑定到特定节点或一组 CPU，同时将 SQL Server
    处理绑定到其他 CPU 或节点。这正是实现如今著名的每秒 100 万次预测证明点所使用的架构，您可以在 [`https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/`](https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/)
    阅读相关内容。


    ### SQL Server 2019 的新特性？


    SQL Server 机器学习服务是*革命性的*，它帮助 SQL Server 从数据库引擎转变为真正的数据平台。SQL Server 2019 通过以下新特性增强了
    SQL Server ML 服务：


    *   现在可以使用 T-SQL 语句 `CREATE EXTERNAL LIBRARY` 为新的 R 或 Python 包安装外部库。您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql)
    了解更多（SQL Server 2017 仅允许对 R 进行此操作）。

    *   `Launchpad` 服务（或在 Linux 上是守护进程）对于 SQL Server ML 服务架构至关重要。现在在 SQL Server 2019
    中，SQL Server ML 服务（包括 `Launchpad` 服务）可以成为 Always On 故障转移群集实例的一部分。

    *   SQL Server 机器学习服务现在在 Linux 上得到支持。我将在第 6 章进一步讨论这一点。

    *   SQL Server ML 服务现在支持使用 `sp_execute_external_script` 的新参数，在分区数据上创建和训练模型。要了解此新功能的示例，请阅读
    [`https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition`](https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition)。


    我认为 SQL Server 机器学习服务是一个“变革者”。我询问了我的同事 Buck Woody（微软应用数据科学家）对 SQL Server 与机器学习集成重要性的看法。根据
    Buck 的说法，“在 SQL Server 上运行预测性和分类性机器学习工作负载，不仅可以通过将计算直接置于数据之上来获得性能优势，而且在安全性方面也具有优势。SQL
    Server 保持了业界最高级别的安全性之一，通过添加 R 和 Python 等传统机器学习语言以及各种库，可以透明地利用这种安全性。使用 SQL Server
    作为机器学习平台还有另一个优势——它为数据科学家提供了一个实验和使工作负载可操作化的场所，并让数据库开发人员能够通过 Transact-SQL 控制 R 和
    Python 机器学习代码的实现，从而实现有效的职责分离。”

    '
- fmt: '## Extending the T-SQL Language


    In the late summer of 2018, I was at Redmond, Washington, at Microsoft corporate
    HQ preparing to build a presentation to help launch the official preview of SQL
    Server 2019 at the Microsoft Ignite conference. As part of this effort, I was
    interviewing various program managers to ensure I had the content accurate, and
    talking to them about building demos.


    One of these program managers (PM) is Nellie Gustafsson. Nellie is one of the
    lead PMs for SQL Server Machine Learning Services, among other things. I had been
    talking to Nellie about what other languages the team was thinking about including
    for SQL Server ML Services for SQL Server 2019. In our meeting, she caught me
    by surprise by telling me that `Java` would be the next language. She went further:
    She said that ideally the team would like to open up the architecture for ML Services
    with an SDK (Software Development Kit). This way anyone with enough technical
    knowledge could *bring their own language* to extend T-SQL using the same architecture
    used to run R and Python for SQL Server ML Services.


    However, at the time we launched CTP 2.0 for SQL Server 2019, we decided to hold
    back the SDK and just release Java as the third language for SQL Server ML Services.
    Java is not necessarily a common language for Machine Learning, so we launched
    this feature with examples that simply demonstrated how to extend T-SQL for functionality
    not built into the language (in fairness, we were also using Java to demonstrate
    Machine Learning with Big Data Clusters).


    The concepts would be the same as SQL Server ML Services. You would use the same
    `sp_execute_external_script` system stored procedure but specify “Java” as the
    language and supply a compiled Java class. Even though this was not the complete
    extensibility open architecture, integrating Java with SQL Server 2019 opened
    up some eyes to more radical work from Microsoft.


    ### The Extensibility Framework


    By the time we released SQL Server 2019, we had decided to *open up* the ML Services
    architecture. We called this the *extensibility framework*. The way to access
    the extensibility framework is through something called a *language extension*.
    Java would simply be an *example* of using this new framework, and we would ship
    the language extension to use it in the product.


    To make the extensibility framework viable, we had to make additions to the existing
    SQL Server ML Services architecture, including


    *   We need to keep R and Python “as is” so these languages are considered “built
    into” SQL Server. R and Python are not considered language extensions but are
    just part of SQL Server as SQL Server ML Services.

    *   The “launcher” for R and Python in the Launchpad service specifically launches
    `rterm.exe` and `python.exe`. `bxlserver.exe` was also designed to specifically
    work with R and Python. We built a “common” launcher within the Launchpad server
    to launch any language (you will see this is tied into the `CREATE EXTERNAL LANGUAGE`
    concept).

    *   We need a new “host” program to run other languages. Therefore, we supply
    a host program called `Extension Host.` On Windows, this program is called `exthost.exe`.

    *   The `Extension Host` has to include `sqlsatellite.dll` (or `sqlsatellite.so`
    on Linux) and provide a way for the language extension to interact with it to
    exchange data with SQL Server.


    Figure 5-8 shows a rough picture of this architecture for Windows (the Linux architecture
    diagram is there as well) from the documentation at [`https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework`](https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig8_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig8_HTML.jpg)


    Figure 5-8: The Extensibility architecture for external languages on Windows


    Now with these enhancements in SQL Server 2019, you can


    *   Use `sp_execute_external_script` to run R or Python scripts for Machine Learning
    programs.

    *   Extend T-SQL with `sp_execute_external_script` with other languages such as
    Java, provided you have installed a language extension. In SQL Server 2019, we
    provide all the software to extend T-SQL with Java.


    To be clear, the language extension (which is a DLL on Windows or a shared object
    library, `.so`, on Linux, typically written in C++) is a key piece of software
    to support a language extension. Microsoft provides the language extension for
    Java when you install SQL Server. Since the language extension is built for Java,
    it will load a Java Virtual Machine (`JVM`) to run your Java classes. How do you
    get a `JVM` to run these? You’ll learn about this in the next section.


    In addition, you will need an SDK library native to your language. As you will
    read in the next section, Microsoft provides an SDK library for Java. The SDK
    will implement a set of known classes and methods so that your class can be executed,
    and you can exchange data with SQL Server.


    ### Extending T-SQL with Java


    One question you may be asking is what is an example of extending the T-SQL language?
    Using R and Python for Machine Learning makes sense. T-SQL has no built-in Machine
    Learning functions or capabilities. So why might you need Java? Have you heard
    of the term regular expression or regex ([`https://en.wikipedia.org/wiki/Regular_expression`](https://en.wikipedia.org/wiki/Regular_expression))?
    Regex is all about searching patterns in string or character data based on an
    expression. A regex expression can be very powerful – a lot more powerful than
    the `LIKE` clause and other T-SQL string functions.


    Since there are no built-in full regex capabilities in T-SQL, you could build
    a Java class that supports regex and integrate it into T-SQL using the extensibility
    framework and the Java extension shipped with SQL Server 2019. Since the framework
    allows a language extension to exchange data with SQL Server in a unique way,
    you can use a Java class with `sp_execute_external_script` to apply a regex expression
    on data based on a T-SQL query.


    This is in fact what the supplied tutorial does in the documentation as found
    at [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java).


    Instead of supplying you with a step-by-step example, I encourage you to go through
    the tutorial yourself. I went through this tutorial on Windows, and it works just
    as well for Linux. I have some tips plus some scripts I used to go through it.


    This tutorial will show you the following:


    *   Create a database and sample data.

    *   Create a Java class to implement a regex expression engine.

    *   Build your code so it can be installed with SQL Server using the SQL Server
    Java SDK.

    *   Create an external language and libraries to enable Java and install your
    code. The external language will map to the language extension DLL or `.so` file.
    The external libraries will be the SQL Server Java SDK and your code.

    *   Call your Java class with `sp_execute_external_script`.


    Technically, you can build your code on a separate computer than SQL Server. But
    if you do this, you will need the SQL Server Java SDK which is called `mssql-java-lang-extension.jar`
    (Windows and Linux). One way to get the SDK is to install SQL Server with the
    Java extensibility feature. Therefore, I recommend you run this tutorial on the
    same computer where you install SQL Server. You can also build it on, say, your
    laptop, with SQL Server Developer Edition, and then install the final result of
    your code (which will be a `.jar` file) to a production SQL Server.'
