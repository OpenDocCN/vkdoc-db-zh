    这是因为 SQL Server 正在执行所有必要步骤，以更新系统和用户数据库，确保它们与新的累积更新兼容。此过程不影响任何用户数据。


    从技术上讲，并非每个累积更新都需要更改系统和用户数据库的元数据。然而，我们发现对于任何累积更新的更改，我们都会“尝试”运行这些更新步骤。这可能会减慢更新过程，但它远比实际修补
    SQL Server 要快得多。有一个技巧可以避免这种情况，但它仅用于调试目的。跟踪标志 902 可以绕过所有这些累积更新步骤。


    这意味着你可以通过将此语句添加到你迄今为止使用的 `docker run` 命令的末尾来运行容器。


    ```

    /opt/mssql/bin/sqlservr -T902

    ```


    这是 Docker 提供的一个有趣的技巧。我已经向你展示过，`CMD` 语句是 Docker 用来为容器运行程序的指令。事实证明，你可以通过指定要运行的替代程序来覆盖容器镜像的默认设置。通过使用此跟踪标志运行
    SQL Server，你可以启动一个使用 `sqlservr` 的容器，并用跟踪标志覆盖默认值。我在演示这种新的容器更新方法时会使用它，但这仅用于演示目的。我曾与我们的工程团队中的一位开发负责人张立讨论过，或许将来我们能巧妙地实现仅在需要时才运行更新步骤。


    最终，连接查询将会成功，你的输出应如下所示：


    ```

    Microsoft SQL Server 2017 (RTM-CU16) (KB4508218) - 14.0.3223.3 (X64)

    Jul 12 2019 17:43:08

    Copyright (C) 2017 Microsoft Corporation

    Developer Edition (64-bit) on Linux (Ubuntu 16.04.6 LTS)

    ```


    你可能会得到一个不同的版本，因为当你尝试这些步骤时，SQL Server 2017 很可能已有其他后续的累积更新版本。关键在于版本应晚于 CU10，并且你无需手动修补
    SQL Server。


    ## 回滚到先前的累积更新


    虽然更新本身很不错，但真正引人入胜的是回滚功能。实际上，这并非严格意义上的回滚，而更像是一个*切换*的故事。这是因为 `SQL Server 的累积更新版本彼此兼容`。通过使用相同的卷和端口，你现在只需运行以下语句或脚本
    `step5_dockerrollback.ps1` 即可切回 CU10：


    ```

    docker stop sql2017latest

    docker start sql2017CU10

    ```


    由于容器的参数已被保存，你实际上只是在针对同一组系统和/或用户数据库，在已安装的 SQL Server 版本之间进行切换。


    ## 验证回滚


    运行以下命令或脚本 `step6_dockerconnecttosql.ps1` 来证明你已切回并正在运行 SQL 2017 CU10：


    ```

    sqlcmd -Usa -PSql2017isfast ''-Slocalhost,1401'' ''-Q"SELECT @@VERSION"''

    ```


    再次说明，你可能会遇到脚本升级错误，但很快，你的结果应显示版本为 SQL 2017 CU10。


    你现在可以根据需要来回切换。想象一下，甚至可以在本地服务器上预先拉取一系列用于生产环境的累积更新版本的镜像。然后，你可以根据应用或公司需求，使用任何你需要的累积更新版本启动容器。


    真正具有吸引力的是使用容器在测试服务器上测试特定的累积更新，然后在合适的时候将其带到生产服务器进行更新。


    ## 清理资源


    使用 `cleanup.ps1` 脚本清理所有资源。如果你想删除所有资源但保留镜像以便更快地测试此序列，请使用 `reset.ps1` 脚本。


    ## 将容器作为应用程序部署


    在某些情况下，你可能希望*自定义* SQL Server 容器镜像。自定义容器涉及使用 SQL Server 容器镜像作为基础，并向容器镜像中添加文件。在许多情况下，这些文件是数据库备份和/或脚本文件。


    自定义 SQL 容器镜像的一个场景是将多个容器作为一个应用程序进行部署。我的同事 Vin Yu 经常演示的一个例子是部署一个带有数据库的 SQL Server
    容器和一个 ASP.Net 应用程序。你可以在 [`https://docs.docker.com/compose/aspnet-mssql-compose/`](https://docs.docker.com/compose/aspnet-mssql-compose/)
    查看一个构建此类带有 SQL Server 的容器化应用程序的示例。


    一个非常有用的、用于构建多个容器镜像并基于这些镜像运行容器的工具是 `docker-compose`。Docker-compose 允许你声明要构建的容器镜像的定义，以及基于这些镜像运行容器的参数。


    一个涉及 SQL Server 且需要多个容器的应用程序的绝佳示例是 SQL Server 复制。由于 SQL Server 复制现已在 SQL Server
    2019 中得到支持，容器提供了一种有趣的部署方式。在 2018 年，Vin Yu 和我需要在各种会议上展示 SQL Server on Linux 的新功能。我请
    Vin 来介绍复制部分。在我们准备演示时，他让我看看他构建的东西。他说他使用容器通过一条命令部署了快照复制，包含发布者、分发者和订阅者。我对 Vin 的第一反应是“你不可能做到这一点。”我很喜欢他证明我错了这一点。让我们使用他为那次演示构建的示例（你也可以在我们的
    GitHub 示例中找到：[`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication)）。


    本示例的所有文件可在 `ch7_inside_sql_containers\sqlrepl` 找到。因为我们将为此示例使用 `docker-compose`，所以不需要
    PowerShell 与 bash 版本的脚本。我们将提供一组 Bash Shell 和 T-SQL 脚本，但它们*在每个容器的上下文中运行*。


    由于此示例只需一条命令即可部署和运行容器以部署 SQL Server 复制，因此在你运行之前，让我们先看看此示例提供的所有文件。


    ### docker-compose.yml 文件


    `docker-compose` 依赖于一个名为 `docker-compose.yml` 的声明性文本文件（这是一个 YAML 文件。YAML 代表另一种标记语言）。你可以使用不同的文件名，但默认情况下
    `docker-compose` 会查找名为 `docker-compose.yml` 的文件。


    让我们看一下此示例的 `docker-compose.yml` 文件。文件顶部的 version 标签声明了应使用的 `docker-compose` 版本（3
    是最新版本，但你可以在 [`https://docs.docker.com/compose/compose-file/compose-versioning/`](https://docs.docker.com/compose/compose-file/compose-versioning/)
    阅读关于 Compose 版本控制的信息）。


    ```

    services:

    db1:

    build: ./db1

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2500:1433"

    container_name: db1

    hostname: db1

    db2:

    build: ./db2

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2600:1433"

    container_name: db2

    hostname: db2

    ```


    有两个“服务”或容器将由 `docker-compose` 构建并执行，一个名为 `db1`，另一个名为 `db2`。


    `docker-compose` 的工作方法是首先构建一个容器镜像（如果提供了 `build` 子句），然后使用 `docker-compose.yml`
    文件中的其他参数基于该镜像运行一个容器。


    子句


    ```

    build: ./db1

    ```


    表示 `docker-compose` 应从当前目录切换到 `db1` 目录，并在该目录中执行 `docker build`。`db2` 采用相同的概念。


    yml 文件中的其余定义指定了如何在每个目录中运行已构建的容器。


    ```

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2500:1433"

    container_name: db1

    hostname: db1

    ```


    这些值中的每一个都被传递给用于在构建后运行容器的 `docker run` 命令。请注意此示例中 `MSSQL_AGENT_ENABLED` 的使用，因为
    SQL Server 复制依赖于 SQL Server 代理。

