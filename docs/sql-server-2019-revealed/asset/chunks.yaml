  trans: '

    不过，您应该亲自尝试一下，看看实际效果。让我们看一个示例，了解内存优化的 tempdb 元数据如何提升使用临时表的应用程序的并发性。此示例的所有脚本都可以在
    `ch2_intelligent_performance\inmem\tempdb` 目录中找到。这个示例运行起来稍复杂一些，需要协调或模拟并发用户。因此，您将需要一款名为
    `ostress` 的免费压力测试工具，可以从 [`www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511)
    下载。该工具目前需要 Windows 客户端计算机。此示例在 Linux 上安装的 SQL Server 上仍然有效；您只需要一个 Windows 客户端来通过
    `ostress` 驱动并发用户工作负载。


    另外，我在一个拥有八个逻辑 CPU 的虚拟机上设置了我的 SQL Server。当我运行 SQL Server 安装程序时，它自动创建了八个 tempdb
    数据文件。我建议在您的系统上，如果您有八个或更多逻辑 CPU，请确保至少有八个 tempdb 数据文件。有关如何执行此操作的更多信息，请参阅此技术支持文章：[`https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d`](https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig27_HTML.jpg](img/479130_1_En_2_Fig27_HTML.jpg)

    图 2-27：Tempdb 中系统表的页闩锁等待


    ## 1. 禁用内存优化的 tempdb 元数据


    运行脚本 `disableopttempdb.cmd` 以禁用内存优化的 tempdb 元数据。默认情况下它是关闭的，但如果您曾经启用过它，请运行此脚本。您需要
    *在安装了 SQL Server 的服务器上* 运行此脚本（或使用其他技术远程重启 SQL Server）。此脚本假设使用 `sysadmin` 登录和服务器名称。您可以通过将
    `-Usa` 更改为 `-E` 来修改以使用集成身份验证，并且不要忘记为 `-S` 参数替换您的服务器名称：


    ```

    sqlcmd -Usa -idisableopttempdb.sql -Sbwsql2019

    net stop mssqlserver

    net start mssqlserver

    ```


    如您所见，此脚本指示 Windows Server 重启 SQL 服务。您可以在 Linux 上修改自己的脚本，使用像 `sudo systemctl restart
    mssql-server` 这样的命令来重启 SQL Server。


    `disableopttempdb.sql` 包含以下 T-SQL 语句：


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF

    GO

    ```


    ## 2. 创建测试数据库和存储过程


    运行 T-SQL 脚本 `tempstress_ddl.sql` 以创建一个数据库和存储过程，该存储过程仅执行一个简单的临时表创建操作：


    ```

    DROP DATABASE IF EXISTS DallasMavericks

    GO

    CREATE DATABASE DallasMavericks

    GO

    USE DallasMavericks

    GO

    CREATE OR ALTER PROCEDURE letsgomavs

    AS

    CREATE TABLE #gomavs (col1 INT)

    GO

    ```


    您可以看到该存储过程并没有真正对临时表执行任何操作。这是为了展示能够对临时表元数据并发性造成压力的最小工作负载量（因为存储过程的任何退出都会自动删除临时表）。


    ## 3. 运行并发工作负载


    现在您已准备好使用 `ostress` 运行并发 tempdb 工作负载。使用脚本 `tempstress.cmd` 来执行此 `ostress` 工作负载：


    ```

    ostress -Usa -Q"exec letsgomavs" -n50 -r10000 -dDallasMavericks -Sbwsql2019

    ```


    您可能需要调整脚本中的一些参数，包括在 Windows 上使用 `-E` 代替 `-Usa` 进行集成身份验证。您可能还想使用 `-S` 更改服务器名称。`-n50`
    参数是要运行工作负载的用户数，`-r10000` 是每个用户的迭代次数。注意使用 `-Q` 直接运行存储过程，这是我在此演示的早期版本工作中学到的一个技巧。使用
    `ostress` 的 `-Q` 选项直接运行查询比使用 `-i` 指定脚本更快。


    如果您使用 `-Usa`，系统将提示您输入密码，然后就开始运行。根据您计算机的速度，此工作负载将需要几分钟时间。


    ## 4. 监控页闩锁等待


    在此运行期间，在新连接中，打开 T-SQL 脚本 `pageinfo.sql`：


    ```

    USE tempdb

    GO

    SELECT object_name(page_info.object_id), page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info

    GO

    ```


    此脚本使用 SQL Server 2019 中的新功能，从 `sys.dm_exec_requests` 中找到的 *资源* 中 *解析* 页面信息，并以列格式转储出页面头的各个字段。


    您为什么要运行这个？这是因为当您遇到 tempdb 的闩锁等待时，会以 `<dbid>:<fileid>:<pageid>` 的形式提供一个资源。在此功能公开之前，您需要手动使用
    `DBCC PAGE` 来找出闩锁等待的页面属于哪个对象，而这个命令并非官方支持。现在，这种技术为您提供了官方支持，以便在页闩锁等待场景中查明页面。


    在上一步查询运行期间，您的结果应类似于图 2-27。


    如前所述，`sysschobjs` 是一个系统表，也是在创建和删除临时表时常见的争用点。


    ## 5. 启用内存优化的 tempdb 元数据


    现在让我们启用内存优化的 tempdb 元数据。在安装了 SQL Server 的服务器上运行脚本 `optimizetempdb.cmd`。此脚本运行以下命令，因此您可以使用其他方法来启用该功能并重启
    SQL Server：


    ```

    sqlcmd -Usa -ioptimizetempdb.sql -Sbwsql2019

    net stop mssqlserver

    net start mssqlserver

    ```


    `optimizetempdb.sql` 包含以下 T-SQL 语句：


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON

    GO

    ```


    ## 6. 验证功能已启用


    通过检查 SQL Server 的 `ERRORLOG` 文件来确认内存优化的 tempdb 元数据已启用。您应该在 `ERRORLOG` 中看到一条类似于下面的语句：


    `Tempdb started with memory-optimized metadata`。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig28_HTML.jpg](img/479130_1_En_2_Fig28_HTML.jpg)

    图 2-28：作为内存优化的 Tempdb 系统表


    ## 7. 再次运行工作负载并对比结果


    现在使用 `tempstress.cmd` 再次运行工作负载。这次运行相同的工作负载将只需要大约 30 多秒，应用程序无需任何更改。


    再次运行脚本 `pageinfo.sql` 以查看是否发生任何页闩锁等待。您的结果应该是 0 行！


    在此运行期间，在另一个会话中，运行 T-SQL 脚本 `find_memoptimized_tables.sql`。您的结果应该类似于图 2-28。


    您可以看到所有内存优化的系统表（您的结果甚至可能包含更多，因为此功能正在增强）。注意对 `sysschobjs` 的重大更改，但它并不是唯一涉及的系统表。


    ## 8. 检查内存消耗


    您可能想知道使用此功能会消耗多少额外内存。当您仍然在此环境运行时，对 DMV `sys.dm_os_memory_clerks` 运行一个查询。您将看到一行，其中
    `type = MEMORYCLERK_XTP` 且 `name = DB_ID_2`。`pages_kb` 列大致就是内存优化的 tempdb 元数据消耗的内存量，根据此示例，大约为
    200Mb。

    '
- fmt: 'At this point, you are free to leave this option enabled for your server,
    but if you want to turn it off, use the script `disableopttempdb.cmd`.


    You can see the huge benefits of this feature built into the engine. You only
    turn on a server configuration option, restart SQL Server, and you are ready to
    go.


    If you access to catalog views in tempdb, you will see there are a few restrictions
    when using memory-optimized tempdb metadata. You can read about these restrictions
    and all the details of this capability at [`https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database?view=sqlallproducts-allversions#memory-optimized-tempdb-metadata`](https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database%253Fview%253Dsqlallproducts-allversions%2523memory-optimized-tempdb-metadata).


    ### Hybrid Buffer Pool


    Persistent memory devices have been around for a few years but are now starting
    to become more popular. The concept is memory-based hardware that have persistence
    through a power source. Think the speed of RAM but any data stored is guaranteed
    to survive a power restart. One of the more popular persistent memory offerings
    is by Intel, called Optane ([`www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html`](https://www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html)).


    Our SQL Server engineering team is always looking to find ways to optimize access
    to data, and, with persistent memory, there are several opportunities. In fact,
    SQL Server 2016 included a feature called “tail of the log caching” based on persistent
    memory (see Kevin Farlee’s blog post on the topic [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/)).


    Since persistent memory is in fact memory, SQL Server can access any data stored
    on a persistent memory device like it is really memory. This means SQL Server
    can find creative ways to bypass kernel code for I/O processing when accessing
    data on persistent memory devices.


    One such new capability is `Hybrid Buffer Pool`. The concept is that if you place
    your database data files on a persistent memory device, SQL Server can simply
    access pages on the data file from this device without having to copy data from
    the data file into a buffer pool page. Hybrid buffer pool uses memory-mapped kernel
    calls to make this a reality. If a database page is modified, it must then be
    copied into the buffer pool and then eventually written back to the persistent
    memory device.


    Performance results vary on the benefits of using hybrid buffer pool, but you
    can typically expect some boost from this technology, especially on read-heavy
    workloads.


    For SQL Server, provided you have placed one or more database files on a persistent
    memory device, you can enable Hybrid Buffer Pool for all databases for SQL Server
    with the T-SQL statement:


    ```sql

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED HYBRID_BUFFER_POOL = ON

    ```


    ### Note


    When you enable hybrid buffer pool for all databases, you must restart SQL Server.


    You can enable hybrid buffer pool for a specific database with a T-SQL statement
    like this (which does not require a server restart):


    ```sql

    ALTER DATABASE <database_name> SET MEMORY_OPTIMIZED = ON

    ```


    To read more about how to enable your devices for persistent memory for databases,
    how to disable hybrid buffer pool, and best practices for using hybrid buffer
    pool, consult the documentation at [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool).


    ### Persistent Memory Support


    If you don’t want to enable hybrid buffer pool but would like SQL Server to take
    advantage of reading and writing both data and transaction log data to persistent
    memory devices, you can configure your device as a persistent memory device on
    Linux. SQL Server will automatically detect it and use memory-based operations
    to move data into SQL Server cache and the device, bypassing the Linux kernel
    I/O stack. This process is called `enlightenment`.


    Dell EMC was able to see significant performance improvements with enlightenment
    as documented at [`www.emc.com/about/news/press/2019/20190402-01.htm`](http://www.emc.com/about/news/press/2019/20190402-01.htm).
    According to Dell, “With new Intel® Optane™ DC persistent memory, customers can
    accelerate in-memory databases, virtualization and data analytics workloads with
    up to 2.5 times more memory capacity for select PowerEdge Servers. The PowerEdge
    R740xd enables up to 2.7 times the transactions per second with an Intel® Optane™
    DC persistent memory compared to NVMe drives in a virtualized Microsoft SQL Server
    2019 preview environment with VMware ESXi.1.”


    You can read all the details about how to enable your persistent memory device
    on Linux for SQL Server at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem%253Fview%253Dsqlallproducts-allversions).'
