    With SQL Server Big Data Clusters, what we are really providing in my opinion
    is a *single system* that gives you *both worlds* of data storage and processing.
    We deploy SQL Server for you to store and access data stored in a relational format
    with tables. And we deploy a Hadoop distributed file system (HDFS) cluster, allowing
    you to store data in an unstructured or semistructured file format. The key ingredient
    that makes this system special is that they are *integrated*. With the help of
    Polybase, you can join tables from SQL Server (and other sources like Oracle,
    Teradata, and MongoDB) with HDFS files, in a seamless method and with scalable
    performance.


    There is more to this story; in the next section, I’ll describe exactly what value
    you get by deploying a SQL Server Big Data Cluster.


    ## What Comes with Big Data Clusters?


    I’ve described a SQL Server Big Data Cluster (BDC) as a product within a product.
    This is because when you deploy BDC, you get a wealth of valuable functionality
    including the following.


    ### SQL Server 2019


    BDC comes with a *complete* SQL Server 2019 instance running in a container using
    a Linux OS image. This means that all of the capabilities of SQL Server 2019 for
    Linux also come with BDC. This will include Active Directory authentication and
    High Availability with Always On Availability Groups.


    ### Polybase


    The Polybase feature for SQL Server with BDC is automatically installed and enabled.
    This means you get built-in connectors for SQL Server, Oracle, Teradata, MongoDB,
    and Hadoop. In addition, BDC comes with *special connectors* to access HDFS files
    and data caches within the cluster in an optimized method. Furthermore, even though
    SQL Server 2019 on Linux doesn’t support Polybase Scale-Out Groups, BDC comes
    with an implementation of Polybase Scale-Out Groups using a concept called a *Compute
    Pool*, which I’ll talk about more in the section “Big Data Cluster Architecture.”


    ### Hadoop Distributed File System (HDFS)


    BDC will deploy a HDFS storage cluster using open source Apache Hadoop. You will
    have several different ways you can access files stored in the HDFS cluster in
    BDC, including Polybase through SQL Server. We also provide a method for you to
    mount your own external HDFS storage into the local HDFS storage in BDC, a concept
    we call *HDFS Tiering*.


    ### Spark


    BDC installs Apache Spark to provide another method to analyze and process data.
    I like Buck Woody’s definition of Spark as, “Apache Spark is an analytics engine
    for processing large-scale data. It can be used with data stored in HDFS and has
    connectors to work with data in SQL Server as well.” You will interact with Spark
    through Spark Jobs for data within the cluster. I’ll talk more about using Spark
    with BDC in the section titled “Using Spark.”


    ### Data Cache


    Our documentation says we provide a *data mart*, and I suppose that term is technically
    true. For me, what we are really providing is a *data cache* . I call it a data
    cache because we provide a special set of SQL Server instances optimized to store
    results from queries against Polybase external data sources. Think of the scenario
    where you want to *store a set of results*, refreshed weekly, for reporting purposes.
    Those results could come from Polybase queries using many different data sources,
    and our data cache in BDC is a perfect solution for that. We implement the data
    cache in a component called the *Data Pool*, which I’ll explain in more detail
    in the section “Big Data Cluster Architecture.”'
  trans: '# 大数据集群简介


    各组织希望在机器学习（ML）上投入更多，并希望构建和部署可扩展、安全且靠近驱动 ML 模型的数据源运行的 ML 应用程序。我听到客户说，他们想要一个*端到端机器学习平台*。


    图 10-2 是我们用来阐述大数据集群试图解决的三大解决方案领域的可视化图表。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig2_HTML.jpg](img/479130_1_En_10_Fig2_HTML.jpg)


    图 10-2


    `大数据集群`解决方案


    在本章中，我打算回答以下问题：


    *   我们**为什么**称其为大数据集群？

    *   部署大数据集群后，您能获得**哪些**功能？

    *   如何**部署**大数据集群？

    *   大数据集群的架构是什么，它**如何工作**？

    *   如何**使用**大数据集群？

    *   如何**使用大数据集群进行机器学习**？

    *   如何**管理和监控**大数据集群？


    这似乎足够单独写成一本书了，所以我无法深入探讨一切。但是，我将探讨一些文档中没有但我认为您应该知道的细节。我还将从我的角度给出示例和提示，说明为什么 `BDC`
    是 SQL Server 2019 的一个重要解决方案。


    ### 注意


    在本章中，我有时会提到我的同事 Buck Woody 制作的一个研讨会中的陈述或示例，该研讨会名为 `研讨会：SQL Server 大数据集群 – 架构`，您可以在
    [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)
    找到它。它是补充本章内容的一个极佳资源。


    ## 为什么是大数据集群？


    我相信我们团队会有很多理由说我们称这个解决方案为 SQL Server 大数据集群。对我来说，答案很简单。我们通过这个解决方案部署和结合了三大技术：


    *   **SQL Server** – SQL Server 将成为访问集群中数据的中心。这是完整的 SQL Server 产品，包含了我在这本书中描述的所有功能，运行在一个基于
    Linux 操作系统镜像的容器中。

    *   **大数据** – 我们为您部署大数据技术，如 `HDFS` 和 `Spark`。

    *   **集群** – 我们使用 `Kubernetes` 集群来部署和运行不同的容器，以提供一个完整的端到端系统。


    当您在接下来的几节中阅读更多内容时，关于我们将如何集成这些技术的细节会逐渐清晰。


    我认为描述一下我对*大数据*这个术语的看法，以及为什么我们认为将其包含在大数据集群解决方案中很重要，这一点很关键。我在微软的同事 Buck Woody 就大数据主题撰写了一篇出色的博客文章，地址是
    [`https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/`](https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/)。


    我喜欢这个对大数据术语的描述，“大数据是任何您无法在想要的时间内用现有系统处理的数据。”这对 SQL Server 意味着，您的组织中可能有一些数据，也许不太适合存储在像
    SQL Server 这样的关系数据库管理系统（`RDBMS`）中。这可能有各种原因，包括规模、结构、数据来源以及转换为关系表的复杂性。


    阅读最初 Hadoop 项目的起源很有趣。Hadoop 的创始人最初希望有一个文件系统，能够以分布式方式在商用硬件集群上存储海量数据。他们称之为 Google
    文件系统（这其实是一个更复杂的故事；您可以在 [`https://en.wikipedia.org/wiki/Apache_Hadoop#History`](https://en.wikipedia.org/wiki/Apache_Hadoop%2523History)
    阅读更多关于 Hadoop 的历史）。那个最初项目的目标就是解决 Buck 为大数据术语所定义的问题。


    通过 SQL Server 大数据集群，我认为我们真正提供的是一个*单一系统*，让您拥有数据存储和处理的*两个世界*。我们为您部署 SQL Server 来存储和访问以关系格式（表）存储的数据。同时，我们部署一个
    Hadoop 分布式文件系统（`HDFS`）集群，允许您以非结构化或半结构化文件格式存储数据。让这个系统特别的关键成分在于它们是*集成*的。在 `Polybase`
    的帮助下，您可以将来自 SQL Server（以及 Oracle、Teradata 和 MongoDB 等其他来源）的表与 `HDFS` 文件进行连接，这种方法是无缝的，并且具有可扩展的性能。


    这个故事还有更多内容；在下一节中，我将确切描述部署 SQL Server 大数据集群后您能获得什么价值。


    ## 大数据集群包含什么？


    我将 SQL Server 大数据集群（`BDC`）描述为产品中的产品。这是因为当您部署 `BDC` 时，您会获得丰富的功能，包括以下内容。


    ### SQL Server 2019


    `BDC` 附带一个使用 Linux 操作系统镜像在容器中运行的*完整* SQL Server 2019 实例。这意味着 SQL Server 2019 for
    Linux 的所有功能也都包含在 `BDC` 中。这将包括 Active Directory 身份验证和使用 Always On 可用性组的高可用性。


    ### Polybase


    SQL Server 的 `Polybase` 功能在安装 `BDC` 时会自动安装并启用。这意味着您将获得用于 SQL Server、Oracle、Teradata、MongoDB
    和 Hadoop 的内置连接器。此外，`BDC` 附带*特殊连接器*，可以以优化的方式访问集群内的 `HDFS` 文件和数据缓存。再者，尽管 Linux 上的
    SQL Server 2019 不支持 `Polybase 横向扩展组`，但 `BDC` 通过使用称为*计算池*的概念实现了 `Polybase 横向扩展组`，我将在“大数据集群架构”一节中详细讨论。


    ### Hadoop 分布式文件系统 (HDFS)


    `BDC` 将使用开源 Apache Hadoop 部署一个 `HDFS` 存储集群。您将有几种不同的方式可以访问 `BDC` 中 `HDFS` 集群里存储的文件，包括通过
    SQL Server 的 `Polybase`。我们还提供了一种方法，让您可以将您自己的外部 `HDFS` 存储挂载到 `BDC` 中的本地 `HDFS`
    存储，这个概念我们称之为*HDFS 分层*。


    ### Spark


    `BDC` 安装 Apache `Spark` 以提供另一种分析和处理数据的方法。我喜欢 Buck Woody 对 `Spark` 的定义：“Apache
    Spark 是一个用于处理大规模数据的分析引擎。它可以与存储在 `HDFS` 中的数据一起使用，并且也有连接器可用于处理 SQL Server 中的数据。”您将通过
    Spark 作业与集群内的数据进行交互。我将在标题为“使用 Spark”的部分更详细地讨论如何在 `BDC` 中使用 `Spark`。


    ### 数据缓存


    我们的文档说我们提供了一个*数据集市*，我认为这个术语在技术上是正确的。对我来说，我们真正提供的是一个*数据缓存*。我称它为数据缓存，因为我们提供了一组专门优化的
    SQL Server 实例，用于存储针对 `Polybase` 外部数据源查询的结果。设想一下这样的场景：您希望*存储一组结果*，每周刷新一次，用于报告目的。这些结果可能来自使用许多不同数据源的
    `Polybase` 查询，而我们在 `BDC` 中的数据缓存是解决这个问题的完美方案。我们在一个称为*数据池*的组件中实现数据缓存，我将在“大数据集群架构”一节中更详细地解释。'
- fmt: '### Tools and Services


    为了帮助您部署、使用和管理 BDC，我们提供了一套作为解决方案一部分的可用工具。您会发现，本书中已使用的 Azure Data Studio 工具将是整个
    BDC 工具解决方案的关键部分，包括对 `Notebooks` 的支持。此外，我们部署了一组容器作为 `services` 来帮助协调和管理 BDC。文档称这些服务为
    `Controller`，您将在本章的几个部分了解更多关于 Controller 工作原理的信息。


    ### Endpoints


    您需要能够连接到 BDC 以执行所有类型的任务，因此我们提供了一系列 `Service endpoints`。这将包括用于连接到 SQL Server、HDFS
    和 Spark 的端点，以及多个管理和监控服务的端点。您将在本章剩余部分了解更多关于服务端点的信息。


    ### Application Deployment


    SQL Server Big Data Clusters 允许您通过 T-SQL 语句和 Spark 作业执行代码。SQL Server Machine Learning
    Services 和 Extensibility 还允许您运行与 SQL Server 集成的 R、Python 和 Java 代码。由于 BDC 部署在
    Kubernetes 集群中，我们希望为开发人员提供一种方法，以便在 BDC 中部署应用程序，提供一个暴露的接口来与这些应用程序交互，并允许应用程序访问 BDC
    中连接的数据源，例如 SQL Server 表和外部表。因此，BDC 提供了 `Application Deployment` 的概念，供您部署 R、Python、MLeap
    和 SSIS 应用程序。Application Deployment 是将 BDC 用作端到端机器学习平台的关键要素。我将在本章后面的“使用大数据群集”一节中更详细地讨论
    Application Deployment。


    ### Machine Learning


    我曾告诉您，BDC 提供的解决方案之一是端到端机器学习平台。BDC 通过以下能力实现这一点：


    *   SQL Server Machine Learning Services

    *   SparkML

    *   MLeap

    *   Machine Learning packages

    *   Application Deployment


    我将在本章后面的“机器学习与大数据群集”一节中更详细地讨论这些内容。


    回顾这个列表！您现在能看出为什么 SQL Server Big Data Clusters 是“产品中的产品”了吗？这个故事还有更精彩的部分。请继续阅读。


    ### Note


    Buck Woody 的 `Workshop: SQL Server Big Data Clusters – Architecture` 在模块 2.0 中有一个描述
    BDC 组件的优秀页面。请将此作为另一个资源来研究 BDC 的内容。


    ## 示例的先决条件


    在我开始讨论部署之前，让我先描述一下如何找到本章中将使用的示例。我将不提供具体的示例和脚本，而是使用来自以下来源的几个示例：


    *   `SQL Server Samples GitHub Repo` – 我将使用并讨论位于 [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)
    的几个示例。

    *   `SQL Server 2019 Big Data Cluster Workshop` – Buck Woody 在 [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)
    提供了一些我将使用的优秀示例。


    使用这些示例需要满足以下条件：


    *   一个已部署的 SQL Server 2019 Big Data Cluster。在我撰写本书本章时，我使用的是 SQL Server 2019 Release
    Candidate，它非常接近 SQL Server 2019 的最终版本。我将在下一节“部署大数据群集”中详细讨论要求，包括客户端工具。

    *   一个 Windows、macOS 或 Linux 客户端，用于部署和运行示例脚本或 T-SQL 查询。几乎所有的部署工具和示例工具都可以在 Windows、macOS
    和 Linux 上运行。我还建议您安装并使用 Azure Data Studio (ADS)，您可以从 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)
    下载。ADS 和笔记本电脑的使用是成功使用大数据群集的关键。


    ## 部署大数据群集


    我将向您展示我部署 SQL Server Big Data Clusters 的经验，以便向您展示其组件和架构。很难决定是先展示架构还是先展示部署。我认为先进行部署然后再描述部署了什么很重要，我建议您也这样做。


    ### Note


    BDC 中的所有软件都作为容器部署在 Kubernetes 集群中。BDC 依赖于您部署自己的 Kubernetes 集群，但也提供了工具来帮助将 k8s
    部署作为一个选项。


    ### 计划部署


    部署需要一些规划。让我描述一下我计划如何部署 BDC 的经验，因为它可能对您的规划工作有所帮助。如果您正在计划 BDC 的生产部署，我建议您通读本章后面的“为生产配置部署”一节。


    #### 决定 k8s


    部署 BDC 时要做的第一个决定是选择 Kubernetes (k8s) 发行版和位置。BDC 支持部署在公共云提供商的 k8s 上，例如 `Azure Kubernetes
    Service` (AKS)，或部署在您自己的 Linux 服务器或虚拟机上的 k8s（例如，如果您自己使用 kubeadm 部署了 k8s）。我预计随着
    SQL Server 2019 及更高版本的发布，BDC 将支持其他知名 k8s 提供商的列表会增加，包括 Azure Stack、Red Hat OpenShift
    等。在我撰写本书时，您可以在 Windows Server 上的 k8s 部署上技术性地部署 BDC，但这种场景需要在 Windows Server 上运行
    Linux 虚拟机来运行 k8s。


    我们的部署 BDC 的工具将在 k8s 中创建一系列包含容器的 Pod（在大多数情况下，Pod 将包含多个容器）以支持 BDC 系统。我们还将部署和使用其他
    k8s 对象，例如 Load Balancer、Persistent Volume Claim、ReplicaSet 和 StatefulSet 对象。


    一旦决定了 k8s 选择，您可以自己部署 k8s，或者使用我们构建的脚本来同时部署 k8s 和 BDC。


    对于这两种选项，仅用于“开发/测试” BDC 的基本要求是一个 Linux 虚拟机 (VM) 或计算机（对于 AKS，选择 VM 大小），具备以下资源：


    ```

    *   64Gb RAM。

    *   8 个 CPU（可以是逻辑 CPU）。

    *   对于 AKS，一个支持至少 24 个磁盘的 Azure VM 大小。

    *   如果您计划部署多个 BDC 节点，每个节点（VM）都需要满足这些资源要求。

    ```


    ### Note


    Slava Oks 和我讨论过需要减少 BDC “开发者版”的占用空间，使其不需要那么多 RAM。我告诉 Slava，理想情况下我可以在我的笔记本电脑上部署一个
    BDC，仅仅用于测试基本功能。


    我们的脚本和笔记本默认选择 Azure VM 大小为 Standard_L8s_v2，但是，只要您为 AKS 选择具有 64Gb、8 个 CPU 和 24
    个磁盘的 Azure VM，部署就应该可以工作。您可以在 [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general)
    阅读更多关于 Azure VM 大小的信息。


    就我的部署经验而言，我将使用 AKS 并使用我们提供的脚本，该脚本将一次性部署 AKS 集群和 BDC。我建议您在规划部署时阅读以下文档资源：


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started)


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)'
  raw: '### Tools and Services


    In order to help you deploy, use, and manage BDC, we have a set of tools available
    as part of the solution. You will find the Azure Data Studio tool, which you have
    used in this book, will be a key part of the overall BDC tool solution, including
    support for *Notebooks*. In addition, we deploy a set of containers as *services*
    to help coordinate and manage BDC. The documentation calls these services the
    *Controller*, and you will learn more how the Controller works in several sections
    of the chapter.


    ### Endpoints


    You will need the ability to connect to BDC for all types of tasks, so we provide
    a series of *Service endpoints* . This will include endpoints to connect to SQL
    Server, HDFS and Spark, and several management and monitoring services. You will
    learn more about service endpoints throughout the rest of this chapter.


    ### Application Deployment


    SQL Server Big Data Clusters allow you to execute code via T-SQL statements and
    Spark Jobs. SQL Server Machine Learning Services and Extensibility also allow
    you to run R, Python, and Java code integrated with SQL Server. Since BDC is deployed
    in a Kubernetes cluster, we want to provide a method for developers to deploy
    applications in BDC, provide an exposed interface to interact with those applications,
    and allow the application to access data sources connected in BDC, such as SQL
    Server tables and external tables. Therefore, BDC provides the concept of *Application
    Deployment* for you to deploy R, Python, MLeap, and SSIS applications. Application
    Deployment is a key element in using BDC as an end-to-end Machine Learning platform.
    I’ll discuss more details about Application Deployment in the section “Using Big
    Data Clusters” later in this chapter.


    ### Machine Learning


    I told you one of the solutions BDC provides is an end-to-end Machine Learning
    platform. BDC does this through the following capabilities:


    *   SQL Server Machine Learning Services


    *   SparkML


    *   MLeap


    *   Machine Learning packages


    *   Application Deployment


    I’ll discuss these in more detail in the section “Machine Learning and Big Data
    Clusters” later in the chapter.


    Look back at this list! Can you see now why SQL Server Big Data Clusters is a
    product within a product? This story gets better. Keep reading.


    ### Note


    Buck Woody’s **Workshop: SQL Server Big Data Clusters – Architecture** has an
    excellent page describing BDC components in Module 2.0\. Use this as another resource
    to study what is in BDC.


    ## Prerequisites for the Examples


    Before I begin the discussion about deployment, let me describe how to find the
    examples I’ll be using in the chapter. Instead of providing specific examples
    and scripts, I’ll be using several examples from the following sources:


    *   **SQL Server Samples GitHub Repo** – There are several examples I will use
    and talk about at [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)
    .


    *   **SQL Server 2019 Big Data Cluster Workshop** – Buck Woody has some great
    examples I’ll use at [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)
    .


    Using these examples requires the following:


    *   A deployed SQL Server 2019 Big Data Cluster. At the time I wrote the chapter
    of this book, I was using SQL Server 2019 Release Candidate, which is very close
    to the final release of SQL Server 2019\. I’ll talk more about the requirements,
    including client tools, in the next section entitled “Deploying Big Data Clusters.”


    *   A Windows, macOS, or Linux client to deploy and to run example scripts or
    T-SQL queries. Almost all of the tools used in deployment and in the examples
    run on Windows, macOS, and Linux. I also recommend you install and use Azure Data
    Studio (ADS), which you can download at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)
    . ADS and the use of notebooks are key to the successful use of Big Data Clusters.


    ## Deploying Big Data Clusters


    I’ll show you my experiences deploying SQL Server Big Data Clusters so I can then
    show you the components and architecture. It was tough to decide whether to show
    you the architecture first or the deployment. I thought it was important to deploy
    first and then describe what is deployed, and I recommend you do the same.


    ### Note


    All of the software in a BDC is deployed as containers in a Kubernetes cluster.
    BDC relies on you deploying your own Kubernetes cluster, but tools are also provided
    to help deploy k8s as an option.


    ### Plan the Deployment


    Deployment requires some planning. Let me describe my experience to plan how I
    deployed BDC, as it could help you in your planning efforts. If you are planning
    a production deployment of BDC, I recommend you read through the section “Configuring
    Deployment for Production” later in this chapter.


    #### Decide on k8s


    The first decision to make when you will deploy BDC is choosing a Kubernetes (k8s)
    distribution and location. BDC supports deployment on k8s in a public cloud provider
    with **Azure Kubernetes Service** (AKS) or in your own Linux server or virtual
    machine deployment of k8s (e.g., if you have deployed k8s on your own with kubeadm).
    I expect the list of other well-known k8s providers to be supported with BDC to
    increase as we release SQL Server 2019 and beyond, including Azure Stack, Red
    Hat OpenShift, and others. At the time I wrote this book, you can technically
    deploy BDC on a k8s deployment on Windows Server, but this scenario will require
    Linux Virtual Machines running on Windows Server for k8s.


    Our tools to deploy BDC will create a series of pods with containers (in most
    cases pods will have multiple containers) in k8s to support the BDC system. We
    will also deploy and use other k8s objects, such as Load Balancer, Persistent
    Volume Claim, ReplicaSet, and StatefulSet objects.


    Once you decide your k8s choice, you can either deploy k8s yourself or use scripts
    we have built to deploy k8s and BDC together.


    For either option, the basic requirement just to deploy for “dev/test” BDC is
    a Linux virtual machine (VM) or computer (in the case of AKS, choose the VM size)
    with these resources:


    *   64Gb RAM.


    *   8 CPUs (can be logical).


    *   For AKS, an Azure VM size that supports at least 24 disks.


    *   If you plan to deploy more than one BDC node, each node (VM) will need to
    meet these resource requirements.


    ### Note


    Slava Oks and I have talked about the need to reduce the footprint for a “Developer
    Edition” of BDC that doesn’t require so much RAM. I told Slava that ideally I
    could deploy a BDC on my laptop just to test the basic capabilities.


    Our scripts and notebooks choose an Azure VM default size of Standard_L8s_v2,
    but, as long as you pick an Azure VM for AKS with 64Gb, 8 CPUs, and 24 disks,
    the deployment should work. You can read more about Azure VM sizes at [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general)
    .


    For my deployment experience, I’m going to use AKS and use a script we provide
    that will deploy an AKS cluster and BDC all in one step. I recommend as you plan
    your deployment you read the following documentation resources:


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started)


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)'
  trans: '

    ### 工具与服务


    为了帮助您部署、使用和管理大数据集群，我们提供了一套作为解决方案一部分的可用工具。您会发现，本书中已使用的 Azure Data Studio 工具将是整个
    BDC 工具解决方案的关键部分，包括对 `Notebooks` 的支持。此外，我们部署了一组容器作为 `services` 来帮助协调和管理大数据集群。文档称这些服务为
    `Controller`，您将在本章的几个部分了解更多关于控制器工作原理的信息。


    ### 端点


    您需要能够连接到大数据集群以执行所有类型的任务，因此我们提供了一系列 `Service endpoints`。这将包括用于连接到 SQL Server、HDFS
    和 Spark 的端点，以及多个管理和监控服务的端点。您将在本章剩余部分了解更多关于服务端点的信息。


    ### 应用程序部署


    SQL Server 大数据集群允许您通过 T-SQL 语句和 Spark 作业执行代码。SQL Server Machine Learning Services
    和 Extensibility 还允许您运行与 SQL Server 集成的 R、Python 和 Java 代码。由于大数据集群部署在 Kubernetes
    集群中，我们希望为开发人员提供一种方法，以便在大数据集群中部署应用程序，提供一个暴露的接口来与这些应用程序交互，并允许应用程序访问大数据集群中连接的数据源，例如
    SQL Server 表和外部表。因此，大数据集群提供了 `Application Deployment` 的概念，供您部署 R、Python、MLeap
    和 SSIS 应用程序。应用程序部署是将大数据集群用作端到端机器学习平台的关键要素。我将在本章后面的“使用大数据群集”一节中更详细地讨论应用程序部署。


    ### 机器学习


    我曾告诉您，大数据集群提供的解决方案之一是端到端机器学习平台。大数据集群通过以下能力实现这一点：


    *   SQL Server Machine Learning Services

    *   SparkML

    *   MLeap

    *   Machine Learning packages

    *   Application Deployment


    我将在本章后面的“机器学习与大数据群集”一节中更详细地讨论这些内容。


    回顾这个列表！您现在能看出为什么 SQL Server 大数据集群是“产品中的产品”了吗？这个故事还有更精彩的部分。请继续阅读。


    ### 注意


    Buck Woody 的 `Workshop: SQL Server Big Data Clusters – Architecture` 在模块 2.0 中有一个描述大数据集群组件的优秀页面。请将此作为另一个资源来研究大数据集群的内容。


    ### 示例的先决条件


    在我开始讨论部署之前，让我先描述一下如何找到本章中将使用的示例。我将不提供具体的示例和脚本，而是使用来自以下来源的几个示例：


    *   `SQL Server Samples GitHub Repo` – 我将使用并讨论位于 [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)
    的几个示例。

    *   `SQL Server 2019 Big Data Cluster Workshop` – Buck Woody 在 [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)
    提供了一些我将使用的优秀示例。


    使用这些示例需要满足以下条件：


    *   一个已部署的 SQL Server 2019 大数据集群。在我撰写本书本章时，我使用的是 SQL Server 2019 Release Candidate，它非常接近
    SQL Server 2019 的最终版本。我将在下一节“部署大数据群集”中详细讨论要求，包括客户端工具。

    *   一个 Windows、macOS 或 Linux 客户端，用于部署和运行示例脚本或 T-SQL 查询。几乎所有的部署工具和示例工具都可以在 Windows、macOS
    和 Linux 上运行。我还建议您安装并使用 Azure Data Studio (ADS)，您可以从 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)
    下载。ADS 和笔记本电脑的使用是成功使用大数据群集的关键。


    ## 部署大数据群集


    我将向您展示我部署 SQL Server 大数据集群的经验，以便向您展示其组件和架构。很难决定是先展示架构还是先展示部署。我认为先进行部署然后再描述部署了什么很重要，我建议您也这样做。


    ### 注意


    大数据集群中的所有软件都作为容器部署在 Kubernetes 集群中。大数据集群依赖于您部署自己的 Kubernetes 集群，但也提供了工具来帮助将 k8s
    部署作为一个选项。


    ### 计划部署


    部署需要一些规划。让我描述一下我计划如何部署大数据集群的经验，因为它可能对您的规划工作有所帮助。如果您正在计划大数据集群的生产部署，我建议您通读本章后面的“为生产配置部署”一节。


    #### 决定 k8s


    部署大数据集群时要做的第一个决定是选择 Kubernetes (k8s) 发行版和位置。大数据集群支持部署在公共云提供商的 k8s 上，例如 `Azure
    Kubernetes Service` (AKS)，或部署在您自己的 Linux 服务器或虚拟机上的 k8s（例如，如果您自己使用 kubeadm 部署了
    k8s）。我预计随着 SQL Server 2019 及更高版本的发布，大数据集群将支持其他知名 k8s 提供商的列表会增加，包括 Azure Stack、Red
    Hat OpenShift 等。在我撰写本书时，您可以在 Windows Server 上的 k8s 部署上技术性地部署大数据集群，但这种场景需要在 Windows
    Server 上运行 Linux 虚拟机来运行 k8s。


    我们的部署大数据集群的工具将在 k8s 中创建一系列包含容器的 Pod（在大多数情况下，Pod 将包含多个容器）以支持大数据集群系统。我们还将部署和使用其他
    k8s 对象，例如 Load Balancer、Persistent Volume Claim、ReplicaSet 和 StatefulSet 对象。


    一旦决定了 k8s 选择，您可以自己部署 k8s，或者使用我们构建的脚本来同时部署 k8s 和大数据集群。


    对于这两种选项，仅用于“开发/测试”大数据集群的基本要求是一个 Linux 虚拟机 (VM) 或计算机（对于 AKS，选择 VM 大小），具备以下资源：


    ```

    *   64Gb RAM。

    *   8 个 CPU（可以是逻辑 CPU）。

    *   对于 AKS，一个支持至少 24 个磁盘的 Azure VM 大小。

    *   如果您计划部署多个大数据集群节点，每个节点（VM）都需要满足这些资源要求。

    ```


    ### 注意


    Slava Oks 和我讨论过需要减少大数据集群“开发者版”的占用空间，使其不需要那么多 RAM。我告诉 Slava，理想情况下我可以在我的笔记本电脑上部署一个大数据集群，仅仅用于测试基本功能。


    我们的脚本和笔记本默认选择 Azure VM 大小为 Standard_L8s_v2，但是，只要您为 AKS 选择具有 64Gb、8 个 CPU 和 24
    个磁盘的 Azure VM，部署就应该可以工作。您可以在 [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general)
    阅读更多关于 Azure VM 大小的信息。


    就我的部署经验而言，我将使用 AKS 并使用我们提供的脚本，该脚本将一次性部署 AKS 集群和大数据集群。我建议您在规划部署时阅读以下文档资源：


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started)


    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)

