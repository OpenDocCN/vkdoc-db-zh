  trans: "## 西雅图项目成就了 SQL Server 2019\n\n虽然 Aris 项目和`大数据集群`的概念宏大、创新，而且坦白说，还有点令人生畏，但`SQL\
    \ Server`的每一次主要版本发布都会在平台的多个领域带来增强。这包括性能、安全性和可用性，这三个领域 Conor Cunningham 常常称之为“`SQL\
    \ Server`的根基”。我们的团队也在`SQL Server 2017`中首次将`SQL Server`引入了 Linux。尽管那款产品令人惊叹，但仍有一些随`Windows`版`SQL\
    \ Server`提供的功能需要被添加到 Linux 版本中。我们也认识到容器技术非常重要——我的意思是，它们是未来部署和运行应用程序（包括`SQL Server`）的一个主要方向。因此，我们知道在这方面需要做一些工作，包括探索`Kubernetes`集群的新场景（而不仅仅是大数据集群解决方案）。\n\
    \n如此多的团队为`SQL Server`这一卓越的产品做出了贡献。我们的企业团队（又称 Tiger Team）有一系列他们希望在新版本中加入的、能带来真正客户价值的新功能（因为这就是他们的职责！）。为`Azure\
    \ SQL Database`构建性能、可用性和安全新功能的同事们，也希望在“西雅图”项目中看到他们的工作成果，因为驱动 Azure 服务和`SQL Server`的引擎是相同的。正如我在\
    \ 2017 年所看到的那样，我能预感到一次历史性版本发布的势头正在形成。\n\n随着 2017 日历年的结束，我们已经为下一版`SQL Server`——`SQL\
    \ Server 2018`——做好了一切准备。这对我来说顺理成章。我们在连续的两年里发布了两个主要版本`SQL Server 2016`和`SQL Server\
    \ 2017`，那么为什么不能是`SQL Server 2018`呢？\n\n我们的产品和发布架构师 Conor Cunningham 曾告诉我，凭借我们敏捷的工程能力，如果我们愿意，我们可以每个月都发布`SQL\
    \ Server`。而且我们能保证质量。当然，我们不会这样做，因为我们希望发布的`SQL Server`版本既有质量，又能为客户带来重大价值。当时间进入 2018\
    \ 日历年的头几个月时，我们必须决定是否要在那一年发布一个全新的主要版本。当我们审视了可以纳入此版本的功能全景（包括大数据集群）后，我们在 2018 年春季做出了决定：将在\
    \ 2018 日历年内发布`SQL Server` vNext 的第一个预览版。（当我们不知道下一个版本的正式名称时，即使有像“西雅图”这样的项目代号，我们也称其为“vNext”。）您可能已经注意到，我们经常尝试在大型活动上发布主要新版本的消息。查看日历，微软最大的全球客户活动之一是\
    \ Microsoft Ignite（现在在奥兰多举行，约有 30,000 人参加）。因此，在 2018 年夏天，我们的领导层决定在 Microsoft Ignite\
    \ 上启动`SQL Server` vNext 的预览，并将其命名为`SQL Server 2019`，这意味着我们将在 2019 日历年的某个时间点使此版本\
    \ GA（即正式发布）。\n\n这对团队中的每个人来说都合情合理。它给了我们更多的时间来完善大数据集群，以及基于客户反馈和体验来增强`SQL Server`的“核心”功能。我的任务是什么？利用我此前为推广和展示`SQL\
    \ Server 2016`和`2017`所做的工作，向我们的客户、业界和社区展示，我们已经凭借`SQL Server 2019`真正构建了一个现代化的数据平台。\n\
    \n## 使用 SQL Server 2019 实现数据库现代化\n\n图 1-2 是我谈论`SQL Server 2019`时主要使用的“推介”图。它由我在微软市场部的一位同事\
    \ Debbi Lyons（您可能见过我和 Debbi 有时一起谈论`SQL Server`）制作，它完整地展示了`SQL Server 2019`全新的现代化数据平台。\n\
    \n![../images/479130_1_En_1_Chapter/479130_1_En_1_Fig2_HTML.jpg](img/479130_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2\n\n使用`SQL Server 2019`实现现代化\n\n如果您曾听过我谈论`SQL Server 2016`或`2017`，您会注意到这张幻灯片看起来有些相似，但存在关键差异：\n\
    \n*   一种集成的数据虚拟化解决方案，以创新的方式集成了`Spark`、`HDFS`和`SQL Server`（本质上是`SQL Server`“遇见大数据”）\n\
    *   新的功能，继续为我们的客户提供跨 Windows、Linux、容器和`Kubernetes`的“首选平台”价值\n\n`SQL Server`持续引领数据库行业性能，并且是过去十年中漏洞最少的数据平台。凭借`SQL\
    \ Server`许可证，客户可以访问商业智能服务，例如`Power BI Report Server`。此外，借助新的`Azure SQL Database`托管实例服务，在您的私有云中的`SQL\
    \ Server`和 Azure 公有云中的功能几乎是完全一致的。一致性信息还不止于此。您在`T-SQL`方面的技能适用于`SQL Server`和 Azure，我们的工具也继续在`SQL\
    \ Server`和 Azure 数据服务之间无缝工作。\n\n在新功能的讨论中，似乎容易被忽略的另一组功能是`SQL Server`（和 Azure）提供的内存中功能，这些功能使您能够最大化计算资源利用率，包括内存中\
    \ OLTP 和列存储索引。所有这些都包含在`SQL Server 2019`中。图 1-3 是`SQL Server 2019`独有的主要新关键功能更详细的图示。\n\
    \n![../images/479130_1_En_1_Chapter/479130_1_En_1_Fig3_HTML.jpg](img/479130_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3\n\n`SQL Server 2019`关键功能\n\n我将使用这张图（从左到右，从左上角开始）为您勾勒出`SQL Server 2019`的主要新功能，这将如同您阅读本书剩余部分的一份蓝图。在您阅读这些新功能时，请记住`SQL\
    \ Server`是`Azure SQL Database`的引擎，这意味着您在本书中看到的许多功能在`Azure SQL Database`中以相同的方式工作。此外，您在本书中看到的一切都可以在\
    \ Azure 中完成，无论是 Azure 虚拟机中的`SQL Server`，还是云中的容器和`Kubernetes`。\n\n### 数据虚拟化\n\n\
    本章前面，我讨论了数据虚拟化的起源，即 Aris 项目。`SQL Server 2019`通过两个具体的功能实现了这一愿景：\n\n*   **SQL Server\
    \ 2019 中的 PolyBase**\n\n    我称之为 PolyBase++，因为我们扩展了随`SQL Server 2016`发布的 PolyBase\
    \ 功能（有关 PolyBase 的更多信息，请参见 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide%253Fview%253Dsql-server-2017)），以提供包括\
    \ Oracle、`SQL Server`、MongoDB（`CosmosDB`）和 Teradata 在内的不同数据源连接器。而且，您无需安装任何客户端软件即可连接到这些数据源；`SQL\
    \ Server`内置了您所需的一切。此外，通过安装您自己的 ODBC 驱动程序，您可以连接到其他源（如 SAP HANA）。我将在第 9 章介绍`SQL\
    \ Server 2019`中的新 PolyBase。\n\n*   **大数据集群**\n\n    正如本章前面我描述了我们对 Aris 项目的愿景那样，我们决定构建一个完整的解决方案，将`SQL\
    \ Server`与新的 PolyBase 功能、`HDFS`、`Spark`以及其他用于管理、安全和可用性的组件一起部署。这其中包含的内容远比我在此能描述的要多，因此请在第\
    \ 10 章中阅读更多关于大数据集群的内容。"
- fmt: "### Note\n\nI originally wanted to come right out in the second and third\
    \ chapters of this book on these topics. However, I later decided that if you\
    \ need some more information about containers and Kubernetes, it would help to\
    \ put those chapters ahead of this topic. So, instead, I’ll “go out with a bang”\
    \ with this new innovation in the book. If you can’t help yourself, dive right\
    \ into Chapter [9](#479130_1_En_9_Chapter.xhtml).\n\n### Performance\n\nWe always\
    \ work on performance in any SQL Server release. Always. However, just making\
    \ your queries run fast is not enough. We need to keep making the SQL Server engine\
    \ smarter and more intelligent, adapting to your workload, hardware investments,\
    \ and complex query patterns. Chapter [2](#479130_1_En_2_Chapter.xhtml) has a\
    \ complete look at performance capabilities of SQL Server 2019 including but not\
    \ limited to\n\n*   `Intelligent Query Processing`, which is an extension to Adaptive\
    \ Query Processing introduced in SQL Server 2017.\n*   Query plan `insights anywhere\
    \ and anytime` you need it with Lightweight Query Profiling, Last Execution Plan,\
    \ and Query Store enhancements.\n*   A family of capabilities to provide a true\
    \ `in-memory database` including enlightened I/O and Hybrid Buffer Pool for persistent\
    \ memory and memory-optimized tempdb schema. Combining these technologies with\
    \ our built-in Columnstore Indexes and In-Memory OLTP provides a compelling in-memory\
    \ database solution.\n\n### Security\n\nSQL Server is not only the least vulnerable\
    \ database product in the industry over the last decade, but includes a wide range\
    \ of features and tools to meet the modern security needs of any business. This\
    \ includes the following enhancements for SQL Server 2019:\n\n*   `Always Encrypted\
    \ with Secure Enclaves`\n    SQL Server 2016 introduced a new end-to-end security\
    \ system for data applications called `Always Encrypted`. While this system provides\
    \ for encryption at rest, in-memory, and across the network, there were a few\
    \ limitations, most importantly `rich computing`. In Chapter [3](#479130_1_En_3_Chapter.xhtml),\
    \ I’ll talk about how `Always Encrypted`, using a concept called `Secure Enclaves`,\
    \ enables rich computing and other interesting security scenarios.\n\n*   `Data\
    \ Classification and Auditing built-in`\n    The General Data Protection Regulation\
    \ (GDPR) took effect from the European Union (EU) in May of 2018. I’ve talked\
    \ to many customers since that time based in the EU and companies that do business\
    \ with EU customers. Our new Data Classification and Auditing built-in features,\
    \ combined with our tools, can be very helpful for compliance scenarios such as\
    \ GDPR and others your business may need to handle.\n\nI’ll cover these new features\
    \ and more for security in Chapter [3](#479130_1_En_3_Chapter.xhtml).\n\n### Mission-Critical\
    \ Availability\n\nIt is one thing to be fast and secure, but customers that rely\
    \ on SQL Server to run their business need their data platform to be available\
    \ all the time. SQL Server 2019 includes new capabilities to meet your highly\
    \ available data needs, including\n\n*   Resumable Online Create Index and Clustered\
    \ Columnstore Online Create Index to help complete the online index availability\
    \ story.\n*   Enhances to our flagship HADR feature, Always On Availability Groups,\
    \ including increase in number of replicas and primary connection redirection.\n\
    *   Imagine a world where transaction rollback happens immediately, and recovery\
    \ and log truncation are not dependent on large or long-running transactions.\
    \ Welcome to the new world of Accelerated Database Recovery!\n\nI’ll talk more\
    \ about these and other mission-critical availability solutions in Chapter [4](#479130_1_En_4_Chapter.xhtml).\n\
    \n### Modern Development Platform\n\nSo far, I’m sure all the new things I’ve\
    \ talked about that are coming in SQL Server 2019 seem targeted only at DBAs or\
    \ IT Professionals. We definitely believe that developers are important to the\
    \ success of SQL Server, so we have also invested in these new features:\n\n*\
    \   In SQL Server 2016, we introduced a new platform for in-database Machine Learning\
    \ with a language called `R`. In SQL Server 2017, we enhanced this model by allowing\
    \ for `Python` programs. Using this same infrastructure, we now allow developers\
    \ to extend the `T-SQL` language using `Java` classes. In fact, we have built\
    \ an extensibility SDK to allow other languages to be part of the SQL Server story.\n\
    *   We have extended the capabilities on graph database, which was first introduced\
    \ in SQL Server 2017, with new features like edge constraints and `MERGE` support.\n\
    *   We want developers to use Unicode data types, so we have added new `UTF-8`\
    \ collations that can help developers manage `UTF-8` data without the overhead\
    \ of Unicode data types.\n\nI’ll talk more about developer-focused features in\
    \ SQL Server 2019 in Chapter [5](#479130_1_En_5_Chapter.xhtml).\n\n### Investing\
    \ in the Platform of Your Choice\n\nWe cranked out SQL Server on Linux in SQL\
    \ Server 2017, but we had a few features on the “edge” of the engine that did\
    \ not make that release. We want our users to have complete choice of what operating\
    \ system to run SQL Server without worrying about features or compatibility. We\
    \ have improved that now in SQL Server 2019 by adding `Replication`, `Change Data\
    \ Capture (CDC)`, `Distributed Transactions (DTC)`, `Machine Learning`, and `Polybase`\
    \ to SQL Server on Linux.\n\nWe also have made investments with containers including\
    \ a new container registry, support for Red Hat Enterprise Linux (`RHEL`), and\
    \ continued support for Kubernetes including OpenShift. And though not covered\
    \ in this book, we have expanded the platforms for SQL Server when we announced\
    \ preview support in May of 2019 for Arm processors with Azure SQL Database Edge.\
    \ You can read more about Azure SQL Database Edge at [`https://azure.microsoft.com/en-us/services/sql-database-edge/`](https://azure.microsoft.com/en-us/services/sql-database-edge/).\n\
    \nYou should stop and consider all of these platform icons, because SQL Server\
    \ is not just a platform of choice. It is a `platform of choice with compatibility`.\
    \ You can back up a database on any of these platforms and restore it to any of\
    \ these platforms unchanged.\n\nI’ll spend time diving into SQL Server on Linux\
    \ enhancements, SQL Server containers, and SQL Server on Kubernetes in Chapters\
    \ [6](#479130_1_En_6_Chapter.xhtml), [7](#479130_1_En_7_Chapter.xhtml), and [8](#479130_1_En_8_Chapter.xhtml)\
    \ in the book.\n\nIn addition to these major areas of investment for SQL Server\
    \ 2019, there are other innovations worth calling out.\n\n### Azure Data Studio\n\
    \nSQL Server Management Studio (`SSMS`) has been the stalwart graphical user interface\
    \ for SQL Server for many years. Last year we embarked on building a new tool\
    \ for data exploration, extensibility, and new experiences called SQL Operations\
    \ Studio. In September of 2018, we officially launched this tool and called it\
    \ Azure Data Studio (`ADS`).\n\nAzure Data Studio has some innovative new technology\
    \ including Notebooks, Big Data Cluster deployment, External Data Wizards, and\
    \ exploration of SQL Server, `HDFS`, and other Azure Data Services.\n\nThere is\
    \ no specific chapter dedicated to Azure Data Studio. Instead you will see me\
    \ use this tool (along with `SSMS` and others) throughout the chapters of this\
    \ book."
