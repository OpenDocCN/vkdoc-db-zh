  trans: "\n### 什么是数据虚拟化？\n\n我并没有在 `SQL Server 2016` 的 `Polybase` 上花费太多时间，但我了解其概念。当我开始投入大量时间用于\
    \ `SQL Server 2019` 的演讲和培训时，“`数据虚拟化`”（我想我第一次听到这个词是从 Travis Wright 那里）才真正促使我开始深入研究\
    \ `Polybase`。\n\n`数据虚拟化`有多种定义方式，但你可以在维基百科上阅读其“官方”定义：[`https://en.wikipedia.org/wiki/Data_virtualization`](https://en.wikipedia.org/wiki/Data_virtualization)。我喜欢其中这句特别的话：“与传统的提取、转换、加载（`\"\
    ETL\"`）过程不同，`数据保持在原地`，并为源系统提供实时数据访问。这降低了数据出错的风险，避免了传输那些可能永远不会被使用的数据的工作量，并且它不会试图将单一的数据模型强加于数据之上。”\n\
    \n`数据虚拟化`的关键在于 `无数据移动` 这一概念。需要澄清的是，这里的“数据”并非指以其原生格式从源位置移动。相反，是通过查询或向数据源请求来检索数据。\n\
    \n作为 `SQL Server 2019` 整体策略中实现 `数据虚拟化` 解决方案的一部分，我们的期望和承诺是：`SQL Server` 是 `数据虚拟化`\
    \ 的一个卓越 `中心`。换言之，`SQL Server 2019` 可以成为您组织的 `数据枢纽`。\n\n图 9-2 是一张常用来阐述 `Polybase`、`数据虚拟化`\
    \ 和 `SQL Server 2019` 整体概念的幻灯片。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig2_HTML.jpg](img/479130_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2\n\n`SQL Server 2019` 中的 `Polybase` 与 `数据虚拟化`\n\n看看图中所有的这些图标。借助 `SQL Server\
    \ 2019`，你可以对基于外部表运行 `T-SQL` 查询，这些外部表的数据源范围广泛，从 `HDFS` 到 `Oracle`，再到 `CosmosDB`，再到\
    \ `SAP HANA`。而这里激进的部分在于：你可以使用 `T-SQL` 查询这些资源，并将它们与本地 `SQL Server` 表或代表这些其他数据源的任何其他外部表进行连接。\n\
    \n在这张幻灯片上，我试图简化 `Polybase` 的定义：\n\n*   **分布式计算引擎**\n\n    `Polybase` 包含源自最初 `PDW`\
    \ 设计的软件，该软件与 `SQL Server` 集成，并提供了自己的分布式计算引擎。我将在下一节“`Polybase` 工作原理”中更详细地描述这个组件。\n\
    \n*   **使用 `T-SQL` 在数据所在的位置查询数据**\n\n    这是 `数据虚拟化` 的承诺。对本地 `SQL Server` 执行 `T-SQL`\
    \ 查询，并在不移动数据的情况下查询其他数据源中的数据。关于 `SQL Server 2019` 的 `Polybase` 还有一点：查询 `SQL Server`、`Oracle`、`Teradata`\
    \ 和 `MongoDB` 所需的软件已内置到 `SQL Server` 的安装程序中。**无需额外的客户端软件！**\n\n*   **分布式、可扩展的查询性能**\n\
    \n    `Polybase` 提供的不仅仅是“连接”到其他数据源的方法；`链接服务器` 就能提供这种功能。因为 `Polybase` 是一个集成的分布式计算引擎，它可以提供可扩展的查询性能。一个称为\
    \ `横向扩展组` 的概念提供了将查询分发到 `Hadoop`、`SQL Server` 和 `Oracle` 等数据源的能力。\n\n*   **手动/随\
    \ `SQL Server` 部署**\n\n    到目前为止，这听起来非常酷，那么，有什么陷阱吗？嗯，设置 `Polybase` 确实需要一些工作，特别是如果你想在\
    \ Windows 上设置 `横向扩展组`。一旦部署了 `Polybase`，就不需要太多配置了。设置数据源连接确实需要一些工作，因为 `Polybase`\
    \ 的效能取决于你通过外部表所代表的数据源获取访问权限和建立连接的能力。\n\n*   **随 `大数据群集` 自动部署/优化**\n\n    正如你将在第\
    \ 10 章发现的，`SQL Server 大数据群集` 将提供 `数据虚拟化`，其中 `Polybase` 已部署，并且部署了 `Hadoop` 群集，可优化对\
    \ `HDFS` 中数据的访问。\n\n## `Polybase` 工作原理\n\n我常常认为，在某种程度上理解 `SQL Server` 功能的工作原理，能让你更有效地使用它。如果你看过我在各种会议（如\
    \ `PASS Summit`）上的演讲，你也会知道我以讲解 `SQL Server` 功能的内部机制而闻名。因此，当我在英国曼彻斯特的 `SQL Bits\
    \ 2019` 会议上被邀请做几场报告时，我选择了 `Polybase` 作为我的主题。我想更深入地研究 `Polybase` 的内部工作原理，特别是我们如何构建一个架构来访问像\
    \ `Oracle` 这样的数据源。我有深厚的 `SQL Server` 背景，因此对 `链接服务器` 的细节非常熟悉。`Polybase` 有何不同？我将在本章后面更多地讨论这些技术的比较。作为本章的一个很好补充，你可以观看我在\
    \ `SQL Bits` 上关于这个主题的演讲，你可以在 [`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase)\
    \ 找到它。\n"
- fmt: '## The Polybase Workflow


    Before I describe all the software components that are deployed with SQL Server
    to provide Polybase capabilities, I think you should know the workflow of using
    Polybase.


    Figure 9-3 is a slide I often use to show the Polybase workflow in SQL Server.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg)


    Figure 9-3: The Polybase workflow in SQL Server


    Let me explain each of the pieces of this workflow:


    **Setup and configure Polybase** – I’ll talk more about the details of setup and
    configuration for Polybase in the section called “Prerequisites for the Examples.”
    You can also read about the setup of Polybase for Windows at `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`
    and for Linux at `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`.


    **Setup authentication** – You must have a way to authenticate a connection to
    an external data source. Polybase only supports the concept of basic authentication,
    which means you must store some type of `IDENTITY` (or user) and `SECRET` (password
    or key) in SQL Server in order to access the external data source. This is an
    object called a `database scoped credential`, and it is encrypted with a SQL Server
    `MASTER KEY` object. You can read about database scoped credentials at `https://docs.microsoft.com/en-us/sql/t-sql/statements/create-database-scoped-credential-transact-sql`.


    **`EXTERNAL DATA SOURCE`** – Think of an `EXTERNAL DATA SOURCE` as a T-SQL object
    similar to an ODBC data source. Create this one time for a data source you intend
    to use for one or more `EXTERNAL TABLE` definitions. You will see in the examples
    in this chapter that you will need connectivity information for an `EXTERNAL DATA
    SOURCE`. You can read about an `EXTERNAL DATA SOURCE` at `https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql`.
    The `CREDENTIAL` value will be the name of the database scoped credential you
    created.


    **`EXTERNAL FILE FORMAT`** – Relational and even noSQL data has structure, typically
    in the form of columns or fields. Data stored in Hadoop systems is typically semistructured.
    In order for SQL Server to access data in files in HDFS, you must specify a format,
    which is what `EXTERNAL FILE FORMAT` defines. This specification is unnecessary
    for data sources such as Oracle. You can read about an `EXTERNAL FILE FORMAT`
    at `https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`.


    **`EXTERNAL TABLE`** – Think of an `EXTERNAL TABLE` like a virtual SQL Server
    table (more commonly known as a view). This means an `EXTERNAL TABLE` acts like
    a SQL Server table – metadata about the table is stored in catalog views, but
    the data or storage of the external table is at the data source itself. You can
    read about an `EXTERNAL TABLE` at `https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql`.
    The `DATA_SOURCE` property when you create the external table will be the name
    of the external data source. For HDFS external tables, you will specify the external
    file format you created using the `FILE_FORMAT` property.


    **Statistics** – To assist the query processor and the Polybase compute engine
    to generate an optimal query plan for external tables, you can create statistics
    stored in SQL Server based on columns from the external tables. You can read about
    creating statistics at `https://docs.microsoft.com/en-us/sql/t-sql/statements/create-statistics-transact-sql`.


    **Query** – Once you have all these objects defined, you can run T-SQL queries
    against external tables, even joining them to local SQL Server tables or other
    external tables. The key concept is that the data lives at the external data source
    and is not loaded into SQL Server; only the metadata and statistics are stored
    in the SQL Server database. Queries against external tables are read-only except
    for Hadoop. SQL Server supports ingestion or `INSERT` into external tables based
    on Hadoop. You can read about Polybase queries at `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-queries`.


    ## SQL Server 2019 Polybase Architecture


    Now that you see the objects and workflow to use Polybase for queries against
    external tables, let me describe the software components that power this capability
    before you try it out for yourself.


    ## Note


    Full credits to Stuart Padley, David Kryze, James Rowland-Jones, and UC for all
    the details behind the internals of Polybase which turned into the section you
    see in this chapter.


    ## How External Tables Work


    First, Figure 9-4 is the first visual I show when talking about how Polybase works.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg)


    Figure 9-4: How external tables work


    It is important to understand when using and studying Polybase that SQL Server
    only stores metadata for an `EXTERNAL DATA SOURCE` and `EXTERNAL TABLE` and *not
    the data*. Users run T-SQL queries referencing an `EXTERNAL TABLE` just like a
    SQL Server table. The `EXTERNAL TABLE` is mapped to an `EXTERNAL DATA SOURCE`
    for the true location of the data. SQL Server as a data hub will take the query
    against the `EXTERNAL TABLE` and submit a new query to the external data source
    using the driver that corresponds with that source. Results are sent back to SQL
    Server and eventually the original user. Another aspect of queries against external
    tables is the concept of pushdown.


    Pushdown is the concept of pushing the responsibility of filtering data to an
    external data source. In Figure 9-4, if the external data source was Azure SQL
    Database and a query used a `WHERE` clause for query criteria, Polybase will attempt
    to push the query to Azure SQL Database, including the `WHERE` clause (it may
    not be an explicit `WHERE` clause for all data sources), so that the computation
    of obtaining the minimum amount of rows is done on the external data source. The
    opposite (and less efficient) approach would be to bring back all rows from an
    external table into SQL Server and let the SQL Server engine filter which rows
    are needed to satisfy a query. You can read more about pushdown computation with
    Polybase at `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-pushdown-computation`.'
  raw: '### The Polybase Workflow


    Before I describe all the software components that are deployed with SQL Server
    to provide Polybase capabilities, I think you should know the *workflow* of using
    Polybase.


    Figure [9-3](#479130_1_En_9_Chapter.xhtml#Fig3) is a slide I often use to show
    the Polybase workflow in SQL Server.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    The Polybase workflow in SQL Server


    Let me explain each of the pieces of this workflow:


    **Setup and configure Polybase** – I’ll talk more about the details of setup and
    configuration for Polybase in the section called “Prerequisites for the Examples.”
    You can also read about the setup of Polybase for Windows at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation)
    and for Linux at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)
    .


    **Setup authentication** – You must have a way to authenticate a connection to
    an external data source. Polybase only supports the concept of basic authentication,
    which means you must store some type of IDENTITY (or user) and SECRET (password
    or key) in SQL Server in order to access the external data source. This is an
    object called a *database scoped credential*, and it is encrypted with a SQL Server
    **MASTER KEY** object. You can read about database scoped credentials at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-database-scoped-credential-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-database-scoped-credential-transact-sql)
    .


    **EXTERNAL DATA SOURCE** – Think of an **EXTERNAL DATA SOURCE** as a T-SQL object
    similar to an ODBC data source. Create this one time for a data source you intend
    to use for one or more EXTERNAL TABLE definitions. You will see in the examples
    in this chapter that you will need connectivity information for an EXTERNAL DATA
    SOURCE. You can read about an EXTERNAL DATA SOURCE at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql)
    . The CREDENTIAL value will be the name of the database scoped credential you
    created.


    **EXTERNAL FILE FORMAT** – Relational and even noSQL data has structure, typically
    in the form of columns or fields. Data stored in Hadoop systems is typically semistructured.
    In order for SQL Server to access data in files in HDFS, you must specify a format,
    which is what **EXTERNAL FILE FORMAT** defines. This specification is unnecessary
    for data sources such as Oracle. You can read about an EXTERNAL FILE FORMAT at
    [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql)
    .


    **EXTERNAL TABLE** – Think of an EXTERNAL TABLE like a virtual SQL Server table
    (more commonly known as a view). This means an EXTERNAL TABLE acts like a SQL
    Server table – metadata about the table is stored in catalog views, but the data
    or storage of the external table is at the data source itself. You can read about
    an EXTERNAL TABLE at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql)
    . The DATA_SOURCE property when you create the external table will be the name
    of the external data source. For HDFS external tables, you will specify the external
    file format you created using the FILE_FORMAT property.


    **Statistics** – To assist the query processor and the Polybase compute engine
    to generate an optimal query plan for external tables, you can create statistics
    stored in SQL Server based on columns from the external tables. You can read about
    creating statistics at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-statistics-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-statistics-transact-sql)
    .


    **Query** – Once you have all these objects defined, you can run T-SQL queries
    against external tables, even joining them to local SQL Server tables or other
    external tables. The key concept is that the data lives at the external data source
    and is not loaded into SQL Server; only the metadata and statistics are stored
    in the SQL Server database. Queries against external tables are read-only except
    for Hadoop. SQL Server supports *ingestion* or INSERT into external tables based
    on Hadoop. You can read about Polybase queries at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-queries`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-queries)
    .


    ### SQL Server 2019 Polybase Architecture


    Now that you see the objects and workflow to use Polybase for queries against
    external tables, let me describe the software components that power this capability
    before you try it out for yourself.


    ### Note


    Full credits to Stuart Padley, David Kryze, James Rowland-Jones, and UC for all
    the details behind the internals of Polybase which turned into the section you
    see in this chapter.


    ### How External Tables Work


    First, Figure [9-4](#479130_1_En_9_Chapter.xhtml#Fig4) is the first visual I show
    when talking about how Polybase works.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    How external tables work


    It is important to understand when using and studying Polybase that SQL Server
    only stores metadata for an EXTERNAL DATA SOURCE and EXTERNAL TABLE and *not the
    data*. Users run T-SQL queries referencing an EXTERNAL TABLE just like a SQL Server
    table. The EXTERNAL TABLE is mapped to an EXTERNAL DATA SOURCE for the true location
    of the data. SQL Server as a data hub will take the query against the EXTERNAL
    TABLE and submit a new query to the external data source using the driver that
    corresponds with that source. Results are sent back to SQL Server and eventually
    the original user. Another aspect of queries against external tables is the concept
    of *pushdown*.


    Pushdown is the concept of pushing the responsibility of filtering data to an
    external data source. In Figure [9-4](#479130_1_En_9_Chapter.xhtml#Fig4), if the
    external data source was Azure SQL Database and a query used a WHERE clause for
    query criteria, Polybase will attempt to push the query to Azure SQL Database,
    including the WHERE clause (it may not be an explicit WHERE clause for all data
    sources), so that the computation of obtaining the minimum amount of rows is done
    on the external data source. The opposite (and less efficient) approach would
    be to bring back all rows from an external table into SQL Server and let the SQL
    Server engine filter which rows are needed to satisfy a query. You can read more
    about pushdown computation with Polybase at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-pushdown-computation`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-pushdown-computation)
    .'
  trans: '

    ## Polybase 工作流程


    在我描述 SQL Server 为提供 Polybase 功能而部署的所有软件组件之前，我认为你应该先了解使用 Polybase 的工作流程。


    图 9-3 是我经常用来展示 SQL Server 中 Polybase 工作流程的一张幻灯片。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg](img/479130_1_En_9_Fig3_HTML.jpg)


    图 9-3：SQL Server 中的 Polybase 工作流程


    让我解释这个工作流程中的每一部分：


    **设置和配置 Polybase** – 我将在名为“示例的先决条件”的部分中更详细地讨论 Polybase 的设置和配置。你也可以阅读关于 Windows
    上 Polybase 设置的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`，以及
    Linux 上的设置：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`。


    **设置身份验证** – 你必须有一种方式来验证到外部数据源的连接。Polybase 仅支持基本身份验证的概念，这意味着你必须在 SQL Server 中存储某种类型的
    `IDENTITY`（或用户）和 `SECRET`（密码或密钥）才能访问外部数据源。这是一个名为 `数据库范围凭据` 的对象，它使用 SQL Server
    的 `MASTER KEY` 对象进行加密。你可以阅读关于数据库范围凭据的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-database-scoped-credential-transact-sql`。


    **`外部数据源`** – 可以将 `外部数据源` 视为类似于 ODBC 数据源的 T-SQL 对象。为你打算用于一个或多个 `外部表` 定义的数据源创建一次。在本章的示例中，你会看到需要为
    `外部数据源` 提供连接信息。你可以阅读关于 `外部数据源` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql`。`CREDENTIAL`
    值将是你创建的数据库范围凭据的名称。


    **`外部文件格式`** – 关系型甚至 NoSQL 数据都具有结构，通常以列或字段的形式存在。存储在 Hadoop 系统中的数据通常是半结构化的。为了使
    SQL Server 能够访问 HDFS 中文件的数据，你必须指定一种格式，这正是 `外部文件格式` 所定义的。对于 Oracle 等数据源，此规范是不必要的。你可以阅读关于
    `外部文件格式` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`。


    **`外部表`** – 可以将 `外部表` 视为虚拟的 SQL Server 表（更常被称为视图）。这意味着 `外部表` 的行为类似于 SQL Server
    表——有关表的元数据存储在目录视图中，但外部表的数据或存储位于数据源本身。你可以阅读关于 `外部表` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql`。当你创建外部表时，`DATA_SOURCE`
    属性将是你创建的外部数据源的名称。对于 HDFS 外部表，你将使用 `FILE_FORMAT` 属性指定你创建的外部文件格式。


    **统计信息** – 为了协助查询处理器和 Polybase 计算引擎为外部表生成最优的查询计划，你可以基于外部表中的列创建存储在 SQL Server 中的统计信息。你可以阅读关于创建统计信息的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-statistics-transact-sql`。


    **查询** – 一旦你定义了所有这些对象，就可以针对外部表运行 T-SQL 查询，甚至可以将它们与本地 SQL Server 表或其他外部表进行联接。关键概念是数据驻留在外部数据源，而不是加载到
    SQL Server 中；只有元数据和统计信息存储在 SQL Server 数据库中。针对外部表的查询是只读的，Hadoop 除外。SQL Server 支持摄取或
    `INSERT` 到基于 Hadoop 的外部表中。你可以阅读关于 Polybase 查询的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-queries`。


    ## SQL Server 2019 Polybase 架构


    现在你已经了解了用于针对外部表查询的 Polybase 的对象和工作流程，让我在你亲自尝试之前描述一下支撑此功能的软件组件。


    ## 注意


    Stuart Padley、David Kryze、James Rowland-Jones 和 UC 对 Polybase 内部原理的所有细节完全负责，这些细节构成了你在本章中看到的部分。


    ## 外部表如何工作


    首先，图 9-4 是我在谈论 Polybase 如何工作时展示的第一张图。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg](img/479130_1_En_9_Fig4_HTML.jpg)


    图 9-4：外部表如何工作


    在使用和研究 Polybase 时，理解这一点很重要：SQL Server 仅为 `外部数据源` 和 `外部表` 存储元数据，*而不是数据*。用户运行 T-SQL
    查询时，像引用 SQL Server 表一样引用 `外部表`。`外部表` 被映射到 `外部数据源`，以定位数据的真实位置。SQL Server 作为数据枢纽，将针对
    `外部表` 的查询接收，并使用对应于该数据源的驱动程序向外部数据源提交一个新查询。结果被发送回 SQL Server，并最终返回给原始用户。针对外部表的查询的另一个方面是下推的概念。


    下推是将过滤数据的责任推给外部数据源的概念。在图 9-4 中，如果外部数据源是 Azure SQL Database，并且查询使用了 `WHERE` 子句作为查询条件，Polybase
    将尝试将查询（包括 `WHERE` 子句）（对于所有数据源，它可能不是显式的 `WHERE` 子句）下推到 Azure SQL Database，以便获取最少行数的计算在外部数据源上完成。相反（效率较低）的方法是将外部表中的所有行取回到
    SQL Server 中，然后让 SQL Server 引擎过滤出满足查询所需的行。你可以阅读更多关于使用 Polybase 进行下推计算的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-pushdown-computation`。

    '
- fmt: '## The Polybase Standalone Instance


    Let''s dig a little deeper into the architecture of Polybase using Figure [9-5](#479130_1_En_9_Chapter.xhtml#Fig5).


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig5_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig5_HTML.jpg)


    Figure 9-5 The Polybase head node architecture


    Let me describe this figure more in the context of Windows, and then I''ll discuss
    how we implement this on Linux.


    When you deploy Polybase on Windows, you will have two choices to make:


    **Standalone PolyBase-enabled instance**

    Choose this option if you only want one SQL Server instance to be used for Polybase.
    All software needed for Polybase will be installed on this instance, and it will
    be considered the *head node*.


    **Use the SQL Server instance as part of a PolyBase scale-out group**

    Use this option to set up what is called a scale-out group. I''ll describe more
    about a scale-out group later.


    Figure [9-5](#479130_1_En_9_Chapter.xhtml#Fig5) represents a standalone PolyBase-enabled
    instance scenario. Let me describe the components in this diagram:


    **Polybase Engine** – The Polybase Engine is a Windows service with a program
    called `mpdwsvc.exe`. Notice in the diagram that the Polybase Engine is responsible
    for **control and execution**. In other words, the Polybase Engine is the coordinator
    for execution of external table queries. The SQL Server engine will coordinate
    with the Polybase Engine. The Polybase Engine actually includes code from the
    Polybase functionality in PDW to support external tables. The `mpdwsvc.exe` is
    executed by the Windows Service using a parameter of `-dweng`. The communication
    between the Polybase Engine and SQL Server is through a local named pipe.


    **Polybase Data Movement Service (DMS)** – Much like the name implies, the Polybase
    DMS is responsible for the data. This means the Polybase DMS will execute the
    queries against external data sources and transfer results back to the SQL Server
    engine. What is interesting is that the Polybase DMS is also implemented with
    the executable called `mpdwsvc.exe` but with the parameter `-dms`. On a server
    for the head node, you should see two processes called `mpdwsvc.exe`. This also
    means the Polybase DMS is the program that loads all the ODBC drivers or runs
    the Java code for MapReduce against Hadoop systems. The Polybase DMS also communicates
    with the SQL Server engine and the Polybase Engine over named pipes. The Polybase
    DMS service will stream data over the named pipe with the SQL Server engine to
    send back results from external data queries.


    **DW dbs** – The Polybase feature requires its own metadata. When you install
    Polybase, you will find these databases installed on SQL Server: `DWConfiguration`,
    `DWDiagnostics`, and `DWQueue`. You should think of these databases as system
    databases for Polybase, so they need to be available for this feature to work.
    I won''t go into the specifics of what is in each database, and we don''t document
    these. I did find an interesting user who blogged about poking around the internals
    of these databases at [`https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/`](https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/).


    **Tempdb** – Polybase may use `tempdb` for intermediate query processing when
    executing external table queries. In addition, in order to ensure that the streaming
    of data is handled properly, Polybase will create `tempdb` tables as a "storage
    backing" to streaming of data (though it may never use that backing). In my use
    of Polybase, I have not seen significant use of `tempdb`; I just wanted you to
    be aware of `tempdb` usage – this way you are not surprised to see temporary table
    activity with Polybase.


    Polybase also comes with a series of catalog views and Dynamic Management Views,
    and I''ll use some of these in the examples in this chapter. You can see a list
    of these catalog views and Dynamic Management Views at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting).


    ## A Polybase Scale-Out Group


    If you choose to set up a Polybase Scale-Out Group, multiple SQL Server instances
    can be used for query processing with scale out. See Figure [9-6](#479130_1_En_9_Chapter.xhtml#Fig6)
    for a scale-out group configuration.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg)


    Figure 9-6 Polybase Scale-Out Groups


    With Polybase Scale-Out Groups, you can enable Polybase on other SQL Server instances
    to be used for scale-out query processing. The other SQL Server instances that
    enable Polybase are called *Compute nodes*. Notice on compute nodes the Polybase
    Engine is not active. On Windows, the Polybase Engine service is installed, but
    it is disabled and not needed. The Polybase Engine on the head node does all the
    coordination across all nodes, while Polybase DMS services perform all the data
    exchange on each node. The reason we install the Polybase Engine on all nodes
    is so that a Compute node can become a head node if needed (e.g., if the current
    head node had a problem).


    Scale-out groups can be most effective when SQL Server decides that using multiple
    instances can speed up a query to an external table. This could be very powerful
    for Hadoop systems, and scale-out groups were built with distributed Hadoop systems
    in mind. For other data sources, like SQL Server or Oracle, Polybase can detect
    partitions on these sources and use the scale-out group to query each partition
    on the target. We call this capability *scale-out reads*, which you can read about
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups?view=sql-server-ver15#scale-out-reads`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups%253Fview%253Dsql-server-ver15%2523scale-out-reads).


    ## Query Processing and Polybase


    One of the great innovations of Polybase is that querying external tables is integrated
    into the SQL Server query processor. This means the SQL Server query processor
    *understands* when it is working with an external table and builds the right execution
    details to submit to the Polybase Engine so that operations like pushdown can
    be supported.


    Later in the chapter, I''ll show an example of what a remote query operator looks
    like for an external table query in the SQL Server engine.


    ## How Does It Work on Linux?


    SQL Server 2019 on Linux only supports a standalone Polybase instance (we will
    support a scale-out group concept with SQL Server Big Data Clusters, which you
    will read about in Chapter [10](#479130_1_En_10_Chapter.xhtml)). In addition,
    Polybase for SQL Server 2019 on Linux does not support the generic ODBC connector
    for data sources.


    Therefore, the architecture of Polybase is for the Polybase Engine and Polybase
    Data Movement Service to be implemented in the `sqlservr` process on Linux using
    the SQLPAL (for more details on the SQLPAL, see Chapter [6](#479130_1_En_6_Chapter.xhtml)).


    At the time I was writing this chapter, we were winding down the release of SQL
    Server, but still had not shipped Hadoop external table capabilities with SQL
    Server on Linux (outside of SQL Server Big Data Clusters). I expect this feature
    to make the final release of SQL Server 2019, but the concepts are the same as
    with Windows. It is possible we will have a separate Linux package for this capability,
    but it should be in the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup).'
