    \ .\n\nYou can read how to configure a pmem device with SQL Server in our documentation\
    \ at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem)\
    \ . As I described in Chapter [2](#479130_1_En_2_Chapter.xhtml), DELL EMC was\
    \ able to achieve faster performance of SQL Server using pmem support, which you\
    \ can read about at [`www.emc.com/about/news/press/2019/20190402-01.htm`](https://www.emc.com/about/news/press/2019/20190402-01.htm)\
    \ . In addition, HPE engineers have demonstrated I/O performance improvements\
    \ with SQL Server 2019 in this YouTube video at [`www.youtube.com/watch?v=8WUix125tQQ`](https://www.youtube.com/watch%253Fv%253D8WUix125tQQ)\
    \ ."
  trans: "\n## 在 Linux 上部署 SQL Server 2019\n\n如果您熟悉在 Windows 上安装 SQL Server，那么您将对在\
    \ Linux 上部署 SQL Server 的简易性感到非常惊讶。您可以从此文档页面 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview)\
    \ 开始，查看在 Linux 上部署 SQL Server 的“快速入门”。\n\nLinux 版 SQL Server 的部署有几点值得注意的更改：\n\n\
    *   创建了`新软件包`以支持新功能。Linux 版 SQL Server 部署更轻量、更快的原因之一是产品以一系列软件包的形式部署。虽然 `mssql-server`\
    \ 软件包包含了核心数据库引擎、SQL Agent、复制、CDC 和分布式事务，但启用新功能需要以下软件包：\n\n    `mssql-mlservices-mlm-py∗`\
    \ 和 `mssql-mlservices-mlm-r∗` – 机器学习服务的软件。还有其他用于 ML 服务的软件包，我将在本章后面描述。\n\n    `mssql-server-extensibility`\
    \ – 用于为可扩展性框架启用外部语言的软件。\n\n    `mssql-server-extensibility-java` – 用于为外部语言启用 Java\
    \ 支持的软件。此软件包将安装 `mssql-server-extensibility` 软件包。\n\n    `mssql-server-polybase`\
    \ – 用于在 Linux 版 SQL Server 上启用 Polybase 的数据虚拟化功能的软件。\n\n*   与 Windows 版 SQL Server\
    \ 一样，Linux 版 SQL Server 现在将根据安装过程中检测到的核心数，自动为 tempdb 创建`多个数据文件`（最多 8 个）。此选项有助于避免在系统分配页上的页面闩锁争用。\n\
    \n*   添加了 `mssql-conf` 选项以支持 SQL Server 2019 的新功能。例如，添加了用于 `DTC` 支持的 `mssql-conf`\
    \ 选项，您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)\
    \ 阅读更多内容。\n\n## 支持新的 Linux 版本\n\nSQL Server 支持最新的主要 Linux 发行版版本至关重要。因此，对于 SQL\
    \ Server 2019，我们希望确保支持这些主要的 Linux 版本：\n\n*   Red Hat Linux Enterprise 8.0\n* \
    \  Ubuntu 18.04\n*   SUSE Linux Enterprise Server 15\n\n## 注意\n\n在本书撰写时，我们计划正式支持这些\
    \ Linux 版本与 SQL Server 2019。SQL Server 确实可以在所有这些版本上运行，但我们不得不对部署软件包进行一些更改，并确保它们经过充分测试。在\
    \ SQL Server 2019 发布时，可能会出现一些问题阻碍我们达到 100%就绪的状态，但如果届时未宣布，我预计不久之后会正式公布。\n\n支持最新的\
    \ Linux 版本还带来了一个 I/O 性能方面的好处。我的长期同事 Bob Dorr 在 SQL Server 2017 发布后注意到，在 Linux\
    \ 上使用`完全持久性`的 SQL Server 的 I/O 性能可能存在问题。这导致添加了一些 SQL Server 配置选项，用于一个称为“强制刷新”的概念，如微软文章\
    \ [`https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux`](https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux)\
    \ 中所述。我们决定确保 SQL Server 默认优先考虑持久性而非性能。但客户当然希望两者兼得。如果客户知道其磁盘系统能够支持正确的刷新写入，他们可以更改默认设置，在保证性能的同时实现持久性。\n\
    \n在 2018 日历年，Bob Dorr 和 SQL Server 工程团队的其他人与 Linux 开源工程人员，特别是 Red Hat 的人员进行了合作。这项工作的成果是对\
    \ Linux 内核中 `XFS` 文件系统的 `上游` 进行了更改。Red Hat Enterprise Linux (`RHEL`) 8.0 包含了这些内核更改。其他\
    \ Linux 发行版将陆续包含这些更改。现在，用户可以“关闭”我们对 Linux 版 SQL Server 强制执行的刷新更改，但仍能在保证持久性的同时获得最大性能。\n\
    \n就像我们职业生涯中的其他经历一样，Bob Dorr 想讲述“故事背后的故事”。他在这篇详细的博客文章 [`https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/`](https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/)\
    \ 中做到了这一点。我在 2019 年 5 月的 Red Hat 峰会上展示了这些更改，并展示了使用 `RHEL` 7.6 与 `RHEL` 8.0 相比，在配置\
    \ SQL Server 使用 `FUA` 增强功能时实现了惊人的 100%以上的性能提升。这看起来像是个小故事，但停下来想一想：`微软协助为开源 Linux\
    \ 内核做出了贡献，以改进所有应用程序的 I/O 性能！`\n\n## 持久内存支持\n\n我喜欢 SQL Server 工程团队的一点是，他们总是着眼未来。始终关注技术的最新进展，以确保\
    \ SQL Server 保持领先。\n\n看到 Linux 版 SQL Server 能够利用持久内存设备，我并不感到惊讶。持久内存 (`pmem`) 是一种`字节可寻址`的存储设备。这意味着持久内存可以像标准\
    \ RAM 一样访问，但具有存储设备的属性——因此存储在其上的数据可以在计算机断电和重启后得以保留。\n\n在 Windows 和 Linux 中，持久内存设备通常都可以被视为`块`设备。换句话说，它们可以由操作系统呈现为标准磁盘驱动器，SQL\
    \ Server 可以像访问任何驱动器一样访问它们。在块模式下，持久内存设备的访问速度甚至可能比市场上一些最快的 SSD 还要快。然而，由于 `pmem`\
    \ 设备是字节可寻址的，像 SQL Server 这样的应用程序可以使用 `memcpy()` 等 API 调用，像访问内存一样在设备与标准 RAM 之间传输数据，从而获得更快的\
    \ I/O 性能。\n\nSQL Server 2019 经过增强，能够识别存储在 `pmem` 设备上的数据库和事务日志文件，并`绕过` Linux 内核\
    \ I/O 堆栈来从这些设备传输数据。您可以在 [`https://docs.pmem.io/getting-started-guide/installing-ndctl`](https://docs.pmem.io/getting-started-guide/installing-ndctl)\
    \ 阅读更多关于应用程序如何利用 `pmem` 设备的内容，这涉及一个称为 `DAX` 的概念 [`(www.kernel.org/doc/Documentation/filesystems/dax.txt`](https://www.kernel.org/doc/Documentation/filesystems/dax.txt))。\n\
    \n您可以在我们的文档 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem)\
    \ 中了解如何为 SQL Server 配置 `pmem` 设备。正如我在第 2 章所述，DELL EMC 能够利用 `pmem` 支持实现 SQL Server\
    \ 更快的性能，您可以在 [`www.emc.com/about/news/press/2019/20190402-01.htm`](https://www.emc.com/about/news/press/2019/20190402-01.htm)\
    \ 阅读相关内容。此外，HPE 工程师在该 YouTube 视频 [`www.youtube.com/watch?v=8WUix125tQQ`](https://www.youtube.com/watch%253Fv%253D8WUix125tQQ)\
    \ 中展示了 SQL Server 2019 的 I/O 性能改进。\n"
- fmt: '## SQL Server 复制在 Linux 上


    SQL Server 复制是用于将数据复制和分发到其他 SQL Server 实例的最流行技术之一。由于 SQL Server Agent 在 SQL Server
    2017 中被包含，并且核心数据库引擎提供了 SQL Server 复制的大部分功能，我们希望该功能成为 SQL Server 2017 for Linux
    的一部分。但在我们能够将所有部分连接起来并确保其经过充分测试之前，时间已经耗尽，因此 Linux 版的 SQL Server 复制现在随 SQL Server
    2019 一起提供。


    为了延续兼容性的伟大故事，Windows 版 SQL Server 复制的几乎全部功能在 Linux 上都存在。这包括快照、事务、合并和对等复制。此外，您可以配置复制以在
    Windows 和 Linux 之间使用发布者和订阅者。


    要了解 Linux 上 SQL Server 复制功能的完整集合，请阅读位于 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication)
    的文档。


    在关于容器的第 [7](#479130_1_En_7_Chapter.xhtml) 章中，我将向您展示一个如何使用容器在 Linux 上使用 SQL Server
    复制的示例。该文档还包括一个位于 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql)
    的教程。


    ## Linux 上的变更数据捕获


    与 SQL Server 复制的情况类似，变更数据捕获的所有组件都存在于 SQL Server on Linux 中。然而，由于时间限制，我们无法在 SQL
    Server 2017 for Linux 中发布此功能。在 SQL Server 2019 中，CDC 得到了完全支持。


    如果您不熟悉 CDC，它是一项捕获表中数据更改的出色技术，对于提取、转换和加载应用程序特别有用。


    所有用于跟踪和查询更改的功能都由 SQL Server 内部提供。CDC 使用与 SQL Server 复制相同的一些内部技术来捕获更改的数据。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server)
    阅读所有关于 CDC 的内容。


    ## Linux 上的 DTC


    在我们发布 SQL Server 2017 for Linux 之后，我问我的朋友 Bob Dorr 他的新重点会是什么。当然他说“所有事情”，但 Slava
    Oks 交给他的一个任务是努力实现 SQL Server for Linux 的功能对等。其中一项功能是分布式事务支持，包括对 Microsoft 分布式事务协调器的支持。


    与工程团队的 Kapil Thacker 和其他人一起，我们能够利用 SQLPAL 架构让核心 MSDTC 服务和软件在 Linux 上工作，而无需为 Linux
    编写一个“新的”DTC。（那个 SQLPAL 是个好东西。我们总有一天应该找到一种方法来开放 SQLPAL 架构，以便其他人可以让他们的 Windows 应用程序在
    Linux 上运行。）


    使用 DTC 进行 SQL Server 操作的最常见方法之一是通过链接服务器在分布式事务中使用，从一个 SQL Server 到另一个 SQL Server，使用
    T-SQL `BEGIN DISTRIBUTED TRANSACTION` 语句。跨 SQL Server 实例的链接服务器查询在 SQL Server 2017
    for Linux 上有效，但不适用于分布式事务。正如 Bob Dorr 在这篇博客文章 [`https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/`](https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/)
    中指出的那样，如果您尝试这样做（等着瞧吧……现在使用最新的累积更新，在 SQL Server 2017 上就可以工作了），您将会收到错误。


    如果您想知道 DTC 如何工作及与 SQL Server（或任何 XA 事务）交互的内部原理，请阅读 Bob Dorr 在 [`https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/`](https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/)
    上这篇极其详细的博客文章。


    虽然分布式链接服务器事务是该团队将 DTC 事务引入 SQL Server for Linux 的首要目标，但团队还希望为开发人员启用其他场景，包括：


    *   针对 SQL Server on Linux 的 ODBC 提供程序的 OLE-TX 分布式事务。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc`](https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc)
    阅读更多关于构建 OLE-TX 应用程序的信息。


    *   使用 JDBC 和 ODBC 提供程序针对 SQL Server on Linux 的 XA 分布式事务。您可以在 [`https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions`](https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions)
    阅读更多关于 XA 事务的信息。


    为了实现此功能，Kapil、Bob 和团队必须以这样一种方式构建 MSDTC 服务：利用 SQLPAL 来支持其当前在 Windows 上运行时的现有端口通信结构。最终得到的架构如图
    [6-2](#479130_1_En_6_Chapter.xhtml#Fig2) 所示（Tejas Shah 和我合作构建了此图，并得到了 Kapil 和
    Bob 的帮助）。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig2_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig2_HTML.jpg)


    图 6-2


    Linux 上的 MSDTC


    这个图表绝对需要一些解释。想象 MSDTC 客户端是一个通过链接服务器的 SQL Server 分布式事务（因此是另一个运行 Linux 或 Windows
    的 SQL Server）。在右侧的方框中，有两个使用 SQLPAL 在 SQLSERVR Linux 进程中运行的组件：端点映射器和 MSDTC。整体主机是承载
    SQLSERVR 进程的 Linux 操作系统。


    MSDTC 特别依赖端口 135，我们无法更改这一点，除非我们为 Linux 修改 MSDTC 代码。MSDTC 客户端首先尝试在端口 135 上进行通信。我们构建了一个“端点映射器”，它将端口
    135 映射到我们可以监听的端口。这是由 `mssql-conf` 选项 `network.rpcport` 配置的。然后，该端点映射器将回传信息告诉 MSDTC
    客户端使用哪个端口与 MSDTC Linux 服务通信，该服务随后与 SQL Server 集成。MSDTC 服务的端口可以是随机生成的，但您需要对此端口的防火墙访问权限，因此您应该使用
    `mssql-conf` 选项 `distributedtransaction.servertcpport` 来配置它。


    完整的配置体验可在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)
    获取。完成这些配置后，您现在就可以跨 SQL Server 链接服务器启动 `BEGIN DISTRIBUTED TRANSACTION` 了。事实上，我有一个使用容器进行尝试的示例，位于
    [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)。'
  raw: '## SQL Server Replication on Linux


    One of the most popular technologies for copying and distributing data to other
    SQL Server instances is SQL Server Replication . Because SQL Server Agent was
    included in SQL Server 2017, and the core database engine provides much of the
    functionality of SQL Server Replication, we wanted this capability to be part
    of SQL Server 2017 on Linux. But time ran out before we could hook everything
    together and ensure it was well tested, so SQL Server Replication for Linux is
    now available in SQL Server 2019.


    To continue the great story of compatibility, almost all of the functionality
    of SQL Server Replication for Windows exists on Linux. This includes snapshot,
    transaction, merge, and peer-to-peer replication. Furthermore, you can configure
    replication to use publishers and subscribers across Windows and Linux.


    To know about the complete set of SQL Server Replication features on Linux, read
    through the documentation at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication)
    .


    In Chapter [7](#479130_1_En_7_Chapter.xhtml) on containers , I’ll show you an
    example of how to use SQL Server Replication on Linux using containers. The documentation
    also includes a tutorial at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql)
    .


    ## Change Data Capture (CDC) on Linux


    Similar to the story for SQL Server Replication, all the components for Change
    Data Capture (CDC) are in SQL Server on Linux. However, we could not release this
    feature in SQL Server 2017 on Linux just because of time constraints. In SQL Server
    2019, CDC is fully supported.


    If you are not familiar with CDC, it is an excellent technology to capture changes
    of data from tables and is especially useful for Extract, Transform, and Load
    (ETL) applications.


    All of the functionality to track and query changes is provided within SQL Server.
    CDC uses some of the same internal technology as SQL Server Replication to capture
    changed data. You can read all about CDC at [`https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server)
    .


    ## DTC on Linux


    After we released SQL Server 2017 on Linux, I asked my friend Bob Dorr what his
    new focus would be. He said “everything” of course, but one task Slava Oks gave
    him was to work on getting feature parity for SQL Server on Linux. One of those
    features was Distributed Transaction support, including support for the Microsoft
    Distributed Transaction Coordinator (MSDTC).


    Along with Kapil Thacker and others in the engineering team, we were able to leverage
    the SQLPAL architecture to get the core MSDTC service and software working on
    Linux without having to write a “new” DTC for Linux. (That SQLPAL is a thing of
    beauty. We should one day find a way to open up the SQLPAL architecture so others
    can just get their Windows apps to work on Linux.)


    One of the most common methods to use DTC for SQL Server is with a distributed
    transaction across linked servers, from one SQL Server to the other, using the
    T-SQL **BEGIN DISTRIBUTED TRANSACTION** statement. Linked server queries across
    SQL Server instances worked on Linux in SQL Server 2017, but not for distributed
    transactions. As Bob Dorr calls out in this blog post, [`https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/`](https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/)
    , you will get an error if you attempt this (wait for it… it will work on SQL
    Server 2017 now, with the latest Cumulative Update).


    If you ever want to know the internals of how DTC works and interacts with SQL
    Server (or any XA transaction), read this incredibly detailed blog post by Bob
    Dorr at [`https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/`](https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/)
    .


    While distributed linked server transactions were the number one goal for this
    team to bring DTC transactions to SQL Server on Linux, there are other scenarios
    for developers the team wanted to enable including


    *   OLE-TX Distributed Transactions against SQL Server on Linux for ODBC providers.
    You can read more about building applications with OLE-TX at [`https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc`](https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc)
    .


    *   XA Distributed Transactions against SQL Server on Linux using JDBC and ODBC
    providers. You can read more about XA transactions at [`https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions`](https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions)
    .


    To enable this functionality, Kapil, Bob, and the team had to build the MSDTC
    service in such a manner with SQLPAL to support the existing port communication
    structure as it runs on Windows today. The resulting architecture looks like Figure
    [6-2](#479130_1_En_6_Chapter.xhtml#Fig2) (Tejas Shah and I tag teamed to build
    this diagram, with help from Kapil and Bob).


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig2_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    MSDTC on Linux


    This diagram definitely needs some explaining. Imagine the MSDTC client is a SQL
    Server distributed transaction through a linked server (so another SQL Server
    running Linux or Windows). In the box on the right, there are two components running
    in the SQLSERVR Linux process using SQLPAL: the endpoint mapper and MSDTC. The
    overall host is the operating system on Linux hosting the SQLSERVR process.


    MSDTC relies specifically on port 135, and we could not change that unless we
    modified the MSDTC code for Linux. The MSDTC client tries to communicate first
    on port 135\. We built an “endpoint mapper” which will map port 135 to a port
    we can listen on. That is configured by the mssql-conf option **network.rpcport**.
    This endpoint mapper will then communicate back to the MSDTC client which port
    to use to communicate with the MSDTC Linux service, which then integrates with
    SQL Server. The port for the MSDTC service can be randomly generated, but you
    need firewall access to this port, so you should configure this with the mssql-conf
    option **distributedtransaction.servertcpport.**


    The complete configuration experience is available to you at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)
    . Once you complete these configurations, you can now just fire up a **BEGIN DISTRIBUTED
    TRANSACTION** across a SQL Server linked server. In fact, I have an example for
    you to try just that using containers at [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)
    .'
