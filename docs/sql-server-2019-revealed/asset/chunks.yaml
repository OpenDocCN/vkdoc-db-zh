  trans: '

    该查询试图获取订单和库存项目数据。注意在 T-SQL 语法中使用了 `HASH JOIN` 来强制优化器使用哈希连接。这是一种简单的方法，用于在演示中将哈希连接引入行数被低估的查询中。我在这里包含了注释，但关键在于不要执行带有注释的此
    T-SQL 代码段。我最初构建这些演示时就因此吃过亏。在匹配缓存计划以唯一标识查询时，注释是“算数的”。如果查询的下次执行没有相同的注释，这些查询将不会被重用。在
    SSMS 中，执行查询前，请选择**包含实际执行计划**选项（可以使用 `Ctrl+M` 启用）。此文档页面描述了如何启用此功能，[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan)。


    ## 步骤 3：运行查询以获取订单和库存项目数据


    ```sql

    -- DO NOT select the comments here to run the query!

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]

    FROM  Fact.OrderHistory AS fo

    INNER HASH JOIN Dimension.[Stock Item] AS si

    ON fo.[Stock Item Key] = si.[Stock Item Key]

    WHERE fo.[Lineage Key] = 9

    AND si.[Lead Time Days] > 19

    GO

    ```


    此查询应至少需要 30 秒运行，并返回大约 66K 行（实际结果可能有所不同）。使用 SSMS 的选项查看执行计划，它应该类似于图 2-2。


    ### 分析执行计划


    利用此计划，有几个细节需要观察。在 SSMS 中，如果将鼠标悬停在 `Table Scan` 运算符上，它应该类似于图 2-3。请注意，`估计行数`与扫描读取的实际行数相差甚远。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig3_HTML.jpg](img/479130_1_En_2_Fig3_HTML.jpg)

    *图 2-3：`Fact.OrderHistory` 表扫描的估计值与实际值对比*


    在这种情况下，`Fact.OrderHistory` 表是哈希连接的*生成输入*。SQL Server 将根据此生成输入为哈希连接请求内存授予。这是个问题，因为内存授予是基于仅估计为
    1000 行的估算值。使用鼠标悬停在带有警告图标的 `Hash Join` 上，注意如图 2-4 所见的关于溢出的警告。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig4_HTML.jpg](img/479130_1_En_2_Fig4_HTML.jpg)

    *图 2-4：哈希连接 tempdb 溢出*


    注意警告中的数字。`52008` 个页面（每页 8K）大约是 426Mb 的数据 I/O 写入 `tempdb` 文件。溢出非常糟糕，因为这不是放入与 `tempdb`
    关联的缓冲池页面的数据。`Tempdb` 数据文件成为哈希连接内存授予的*页面文件*（这些不是用于临时表的 `tempdb` 页面）。这也是我经常称 `tempdb`
    为 SQL Server 垃圾堆的另一个原因）。


    ### 提示：哈希连接如何工作


    想知道哈希连接如何工作吗？请阅读我们顶级查询处理团队工程师之一，独一无二的 Craig Freedman 的这篇经典博文：[`https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/`](https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/)。


    ### 检查内存授予


    将鼠标移到查询计划左侧，悬停在 `SELECT` 运算符上。在此运算符中是有关查询计划内存授予数量的详细信息。图 2-5 显示为此查询的授予请求了大约 1.4Mb
    的内存。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig5_HTML.jpg](img/479130_1_En_2_Fig5_HTML.jpg)

    *图 2-5：显示所请求内存授予的 `SELECT` 运算符*


    请求的 1.4Mb 内存授予远不足以容纳所需内容，根据溢出情况，大约需要 ~400Mb。


    XML 执行计划中提供的另一个有趣信息位于计划的属性中。要查看此信息，请右键单击 `SELECT` 运算符并选择 `属性`。展开名为 `MemoryGrantInfo`
    的选项，它将类似于图 2-6。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig6_HTML.jpg](img/479130_1_En_2_Fig6_HTML.jpg)

    *图 2-6：查询计划属性中的内存授予详细信息*


    关于内存授予反馈，最重要的属性是名为 **IsMemoryGrantFeedbackAdjusted** 的字段。**NoFirstExecution**
    的值意味着这只是查询的第一次执行，因此尚未收集反馈。您可以在我们的文档中查看可能的值列表：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)。


    由于已启用内存授予反馈，如果执行缓存中相同的查询，SQL Server 将进行自适应调整并更改内存授予以适应低估情况。


    ## 步骤 4：让我们再试一次


    1.  转到脚本中的 **步骤 4**，再次运行相同的查询。**重要提示**：运行查询时请勿使用注释。在匹配计划缓存中的确切查询时，注释是算数的。请确保保持
    SSMS 中的 `包含实际执行计划` 选项。


    ```sql

    -- Step 4: Let''s try this again

    -- DO NOT select the comments here to run the query!

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]

    FROM  Fact.OrderHistory AS fo

    INNER HASH JOIN Dimension.[Stock Item] AS si

    ON fo.[Stock Item Key] = si.[Stock Item Key]

    WHERE fo.[Lineage Key] = 9

    AND si.[Lead Time Days] > 19

    GO

    ```


    这次查询应该在 3 秒或更短时间内运行完成，而不是 30 秒或更长时间。请记住，概念是计划不会改变，所以当您查看 `实际执行计划` 时，它应该看起来相同，只是
    `Hash Match Join` 没有警告图标，也没有溢出警告。将鼠标悬停在 `SELECT` 运算符上，您将看到内存授予的显著差异，如图 2-7 所示。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig7_HTML.jpg](img/479130_1_En_2_Fig7_HTML.jpg)

    *图 2-7：显示改进后内存授予的 `SELECT` 运算符。*


    您可以看到它实际上需要大约 ~625Mb 才能获得正确的内存授予来适应 `Hash Join`。


    右键单击 `SELECT` 运算符并选择 `属性`。`内存授予反馈` 部分现在看起来像图 2-8。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig8_HTML.jpg](img/479130_1_En_2_Fig8_HTML.jpg)

    *图 2-8：内存授予修正后的内存授予反馈属性*


    ## 步骤 5：将表和聚集索引恢复到其原始状态


    我们需要确保通过运行 T-SQL 脚本中的 **步骤 5** 来将统计信息恢复到其原始状态：


    ```sql

    -- Step 5: Restore table and clustered index back to its original state

    UPDATE STATISTICS Fact.OrderHistory

    WITH ROWCOUNT = 3702592;

    GO

    ALTER TABLE [Fact].[OrderHistory] DROP CONSTRAINT [PK_Fact_OrderHistory]

    GO

    ALTER TABLE [Fact].[OrderHistory] ADD  CONSTRAINT [PK_Fact_OrderHistory] PRIMARY
    KEY NONCLUSTERED

    (

    [Order Key] ASC,

    [Order Date Key] ASC

    )

    GO

    ```

