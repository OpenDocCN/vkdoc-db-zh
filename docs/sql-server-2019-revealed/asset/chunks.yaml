  trans: "\n### 长活动事务的挑战\n\n长运行事务可能导致**恢复“失控”**（即耗时极长且无法预测），并影响应用程序对数据的可用性。这并非 SQL\
    \ Server 引擎的某种错误或问题；它完全是在按应用程序的指令执行。SQL Server 无法阻止应用程序在一个事务中执行大量修改操作，或者阻止一个修改操作很少但长时间不提交或不回滚的事务。这就是*长运行事务*的经典定义。\n\
    \n此外，回滚一个长事务需要执行所谓的*补偿*操作。回滚要求进行逻辑撤销。一个删除了 100 万行的 DELETE 操作需要生成 100 万条 DELETE\
    \ 日志记录。要回滚这个删除事务，SQL Server 需要撤销所有这些删除操作，并生成 100 万条 INSERT 日志记录。这**会减慢回滚事务所需的时间**。我经常看到客户试图\
    \ `KILL` 一个有长活动事务的会话，并疑惑为什么 `KILL` 命令没有立即生效。这通常是因为在可以安全终止会话之前，事务必须先完成回滚（否则会导致数据不一致）。\n\
    \n长运行事务的另一个后果是它对**事务日志截断**的影响。事务日志只能截断到最旧的活动事务处。对于尚未提交或回滚的事务，你无法移除其事务日志记录。但由于事务日志是串行的，一个“古老”的活动事务（即使它可能没有任何关联的活动）也可能阻碍其后所有其他事务的日志截断。对你而言，这意味着事务日志可能会“失控地增长”（并且你常常无法找出原因）。\n\
    \n加速数据库恢复 (Accelerated Database Recovery) 正是为了解决所有这些问题而设计的。\n\n### 加速数据库恢复的工作原理\n\
    \n加速数据库恢复 (ADR) 旨在通过以下功能来解决长运行事务的问题（如文档 [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery)\
    \ 所述）：\n\n*   **快速且一致的数据库恢复**\n\n    借助 ADR，长运行事务不会影响整体恢复时间，从而实现快速且一致的数据库恢复，无论系统中有多少活动事务或其大小如何。\n\
    \n*   **瞬时事务回滚**\n\n    借助 ADR，事务回滚是瞬时完成的，无论该事务已活动了多久或执行了多少次更新。\n\n*   **积极的日志截断**\n\
    \n    借助 ADR，事务日志会被积极截断，即使存在活动的长运行事务，这可以防止其失控增长。\n\n#### SQL Server 常规恢复\n\n为了理解加速数据库恢复如何解决这些问题，首先需要了解\
    \ SQL Server 传统恢复的工作原理。\n\n请考虑 CTR 论文（[`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](http://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)）中提供的图\
    \ 4-1。\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig1_HTML.jpg](img/479130_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1\n\nSQL Server 的常规恢复过程\n\nSQL Server 的恢复过程包括三个阶段：\n\n1.  **分析**\n\n   \
    \ 从记录 `CHECKPOINT` 的日志记录开始扫描，一直扫描到日志末尾。\n\n    此分析使 SQL Server 能够知道：\n    *  \
    \ 在数据库最后一次离线时（可能仅仅是 SQL Server 关闭），哪些事务未提交（处于活动状态）。这些事务很可能需要回滚以确保一致性。\n    * \
    \  包含最旧的已修改或“脏”页的日志记录。SQL Server 需要此信息，以便在必要时重做（redo）任何已提交事务中，其关联页面未能反映事务状态的情况。\n\
    \n    换句话说，分析就是为执行接下来的两个阶段——**重做 (redo)** 和 **撤销 (undo)** ——做好准备。\n\n2.  **重做**\n\
    \n    为了保证数据一致性，SQL Server 必须确保在恢复期间准确反映所有已提交的事务。实现此目标的方法涉及从事务日志中最旧的已修改或“脏”页的日志记录开始，将已提交事务中每个日志记录的\
    \ `LSN` 与受影响页面上的 `LSN` 进行比较。如果页面的 `LSN` 小于日志记录的 `LSN`，则必须*重做*该日志记录的操作（`INSERT`、`UPDATE`、`DELETE`\
    \ 等）。以此方式检查每个已提交事务的日志记录，直至日志末尾。\n\n    然而，第二阶段，即重做阶段，实际上是从最旧活动事务的日志记录处开始。重做阶段从这里开始是因为它需要为活动事务获取锁，以便在重做阶段之后数据库可以对用户可用（用户将被这些锁阻塞，因此无法访问活动事务的数据）。但是，这意味着重做阶段会受到最旧活动事务的日志记录大小的影响。现在你明白为什么恢复时间的长度会受到一个长活动事务的影响了吧？一旦重做完成，第三个也是最后一个阶段，撤销\
    \ (undo)，随即开始。\n\n3.  **撤销**\n\n    就像确保已提交事务准确反映在数据库页面上一样，SQL Server 必须确保任何**未**提交的事务**不**反映在数据库页面上。你可能想知道，对于未提交的事务，SQL\
    \ Server 怎么会将数据库页面固化到磁盘上呢？这是因为，如果 SQL Server 需要某个页面给其他用户，并且没有空闲页面可用，它可以在任何时候将已修改或脏页写入磁盘。或者，可能发生了\
    \ `CHECKPOINT`（包括间接检查点）操作，该操作会将已修改的页面写入磁盘，无论事务是否已提交。因此，如果 SQL Server 在有未提交的活动事务时关闭，引擎必须在恢复期间确保没有任何数据库页面包含与该未提交事务相关的任何修改。任何处于此状态的活动事务都需要被回滚，就像在运行时执行了\
    \ `ROLLBACK TRANSACTION` 一样。\n\n    SQL Server 通过反向扫描日志（从日志末尾扫描到最旧活动事务的日志记录）来执行必要的回滚操作，从而实现这一点。现在，撤销所需的时间与最旧活动事务的长度成正比。这也解释了为什么当客户试图终止\
    \ SQL Server 以期望快速启动数据库时会感到惊讶，因为一个长运行事务无法被终止（因为它正处于回滚状态），并且恢复需要很长时间。这是因为 SQL Server\
    \ 必须保持你的数据一致性，并且必须完成之前正在运行的回滚。\n\n    这种基于名为 ARIES 的设计的恢复系统（更多详情请参阅论文 [`https://dl.acm.org/citation.cfm?id=128770`](https://dl.acm.org/citation.cfm%253Fid%253D128770)）在过去的\
    \ 25 年里一直为 SQL Server 提供良好服务，并且除了我指出的这一种场景外，它都运行得非常完美（并且仍然需要并被使用）：即一个长运行的活动事务会延长重做和撤销处理的时间。\n\
    \n    现在，让我们看看加速数据库恢复 (ADR) 如何改变局面。\n"
- fmt: "# SQL Server Using Accelerated Database Recovery (ADR)\n\nI won’t attempt\
    \ to give you every detail of what the CTR paper describes, but I’ll describe\
    \ the basic components that make ADR work and how it is different from the standard\
    \ ARIES recovery approach and then use an example to give you more insight.\n\n\
    ADR introduces the concept of a Persistent Version Store (PVS). SQL Server has\
    \ a concept called a version store which is used for snapshot isolation, but that\
    \ version store is kept in tempdb. PVS is a similar concept in that versions of\
    \ modifications are kept for rows, but this version store is persistent, because\
    \ it is stored in the user database (the version store for snapshot isolation)\
    \ is not persistent because it is kept in tempdb, and tempdb is recreated after\
    \ a server restart). Once you enable ADR, SQL Server will start tracking modifications\
    \ using versions. Versions can be stored either in the row (`in-row`) of a database\
    \ page or in `off-row` storage within the database. Versions have the previous\
    \ state of the data before the modification and a transaction ID that caused the\
    \ version, to easily identify whether a version of the data should be visible\
    \ to other transactions.\n\nNow with PVS, transaction operations like rollback\
    \ get interesting and *easy*. If a transaction is rolled back, SQL Server simply\
    \ marks the transaction as ABORTED. Now any query looking at the row for data\
    \ can determine if a version of the row is visible and should be used. If the\
    \ latest version of a row is associated with an ABORTED transaction, the query\
    \ can ignore this version and look for a previous version. If the version of the\
    \ row is associated with a committed or active transaction, isolation level rules\
    \ apply to see if the row is visible.\n\nSQL Server maintains the state of transactions\
    \ to make all this work through the concept of an *Aborted Transaction Map*. This\
    \ is discussed in more detail in the CTR paper.\n\n### Note\n\nOne aspect of versions\
    \ with ADR that can be confusing is isolation levels. The current feature of versions\
    \ (in tempdb) is specifically built to support snapshot isolation levels. Versions\
    \ for ADR are not built to support snapshot isolation but can be used to support\
    \ them along with the other benefits of ADR.\n\nPVS also provides benefit to fast\
    \ recovery (hence the term constant time recovery). The redo phase just needs\
    \ to make sure the version store is consistent within rows of pages of tables.\
    \ Undo just needs to mark any active transaction as aborted, and the process of\
    \ versioning as described earlier does the rest. This makes recovery very quick.\n\
    \nSome transactions, mostly system transactions (e.g., page allocation, updating\
    \ statistics), cannot use the new PVS scheme. Therefore, when ADR is enabled,\
    \ SQL Server maintains a secondary log (`Slog`, which is stored in the transaction\
    \ log) for any transactions that cannot use versioning. Transactions associated\
    \ with the Slog must use the normal ARIES recovery mode. Fortunately, system transactions\
    \ are almost always short-lived so won’t cause issues as seen with long-running\
    \ user transactions.\n\nFigure 4-2, extracted from the CTR paper, shows the new\
    \ recovery process when ADR is enabled.\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig2_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2: SQL Server using Accelerated Database Recovery\n\nAs you can see\
    \ in the diagram, SQL Server still has three phases of recovery: analysis, redo,\
    \ and undo. But now the process is much faster, hence the term accelerated.\n\n\
    **Analysis** still must do the work as it has done in the past, starting from\
    \ the last log record for a CHECKPOINT, but redo and undo are significantly different.\n\
    \n**Redo** will ensure log records for Slog operations are redone from the oldest\
    \ active transaction to the log record from the oldest dirty page operation. From\
    \ this point, redo will perform the same operations of ensuring data is correctly\
    \ committed as with ARIES recovery. But this sequence should usually be short,\
    \ assuming standard checkpoint configurations are used for the database.\n\n**Undo**\
    \ just needs to mark any uncommitted transaction as aborted but will need to undo\
    \ Slog transaction operations similar to ARIES user transactions. But system transactions\
    \ are short in nature and represent a very small subset of all transactions, so\
    \ this process should always be fast.\n\nThe result is a new, incredibly fast\
    \ recovery system all based on a version store kept in the user database.\n\n\
    Let’s use an example to look more into how transaction logging is different when\
    \ using ADR. This example is all self-contained. You just need SQL Server 2019\
    \ and SQL Server Management Studio (SSMS) or Azure Data Studio (ADS) to run this\
    \ example. You will use the script `alookatadr.sql` as found in the `ch4_mission_critical_availability/adr`\
    \ directory.\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig3_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3: Log records from an aborted DELETE\n\n1.  Open up the script `alookatadr.sql`\
    \ and execute Step 1 in the script to create the database.\n\n    ```sql\n   \
    \ -- Step 1: Create the database and make it simple recovery. Default for ADR\
    \ is OFF\n    USE master\n    GO\n    DROP DATABASE IF EXISTS gocowboys\n    GO\n\
    \    CREATE DATABASE gocowboys\n    GO\n    ALTER DATABASE gocowboys SET RECOVERY\
    \ SIMPLE\n    GO\n    ```\n\n    Tip: This example uses a SIMPLE recovery model\
    \ for the database to make it easier to examine log records.\n\n2.  Run Step 2\
    \ in the script to create a table and insert rows. Note that the script inserts\
    \ 1000 rows. Because of an optimization with ADR, you can’t just use one row (you\
    \ will learn more about this optimization later in the chapter)."
