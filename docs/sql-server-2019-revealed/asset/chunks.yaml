  trans: "\n\n## 在 k8s 上更新 SQL Server\n\n你在第 7 章中学习了如何通过“切换”由持久卷支持的容器来更新 SQL Server\
    \ 容器。运行中的容器被停止，然后启动一个装有新 CU 版本 SQL Server 的新容器——指向同一个卷，该卷映射到包含系统和用户数据库的目录。\n\n\
    你可以在 k8s 中实现同样的效果。只是这一次，在给出正确的声明后，k8s 将为你完成所有工作。让我们回头看看本章第一个练习中的 `sql2019deployment.yaml`\
    \ 文件的这一部分：\n\n```yaml\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n \
    \     app: mssql\n  strategy:\n    type: Recreate\n```\n\n注意 `strategy`（策略）的类型是\
    \ `Recreate`（重新创建）。`Recreate` 向 k8s 声明，如果部署被更新，则停止并重新创建容器。策略类型的另一个选择是 `RollingUpdate`（滚动更新）。除非我们协调多个\
    \ SQL Server 容器，否则不能对 SQL Server 使用此策略。不过，我们将在本章最后一节关于 Always On 可用性组和 k8s 的内容中讨论这个概念。\n\
    \n更新部署的一种方式是更新 pod 中运行的容器的 `image`（镜像）。对于 SQL Server，这可能意味着更新到一个新的累计更新，就像我在第 7\
    \ 章中展示的如何切换到包含新镜像的容器一样。并且因为我们使用的是持久卷，系统和用户数据库将被使用更新镜像的新容器识别。k8s 为你提供了一种方法，通过一个命令完成所有这些操作。而且还有回滚机制，因为\
    \ k8s 将对部署的更新跟踪为一个修订版。\n\n让我们实际操作一下。此示例的所有脚本都可以在 `ch8_sql_on_k8s\\update` 找到。如果你已经运行了之前的示例，请务必使用\
    \ `ha` 或 `deploy` 文件夹中的 `cleanup.sh` 脚本清理所有现有资源。\n\n在撰写本书时，我们尚未发布 SQL Server 2019\
    \ 的累计更新，因此在这些示例中我将使用 SQL Server 2017。然而，一旦我们开始发布 CU 版本，你可以对 SQL Server 2019 使用相同的技术。\n\
    \n1.  首先，我们需要像本章第一个示例那样部署一个 SQL Server pod。为了省去所有步骤，我编写了一个名为 `step1_deploysql.sh`\
    \ 的脚本来完成所有操作。这个脚本使用以下命令：\n\n    ```bash\n    kubectl create namespace mssql\n\
    \    kubectl config set-context mssql --namespace=mssql --cluster=bwsqlaks --user=clusterUser_bwaks_bwsqlaks\n\
    \    kubectl config use-context mssql\n    kubectl apply -f sqlloadbalancer.yaml\n\
    \    kubectl create secret generic mssql --from-literal=SA_PASSWORD=\"Sql2017isfast\"\
    \n    kubectl apply -f storage.yaml\n    kubectl apply -f sql2017deployment.yaml\n\
    \    ```\n\n    `storage.yaml` 和 `sqlloadbalancer.yaml` 文件与本章第一个示例中使用的文件相同。`sql2017deployment.yaml`\
    \ 文件也相同，除了这一部分：\n\n    ```yaml\n    image:  mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
    \    ```\n\n    这意味着我们的新 pod 容器将使用 SQL Server 2017 CU10 for Ubuntu 镜像。如果此镜像不在部署\
    \ pod 的节点上，k8s 将首先拉取该镜像。\n\n### 注意\n迄今为止，除了运行使用这些镜像的容器然后删除容器（镜像将保留在本地节点缓存）之外，我还没有找到一种简单的方法来在所有\
    \ k8s 节点上预拉取 SQL Server 镜像。还有其他技术，其中之一是获取管理员权限登录到实际的 Linux 节点虚拟机，并直接使用 docker\
    \ 拉取镜像。\n\n使用与第一个示例相同的技术来检查 pod 和部署是否已启动并正在运行。例如，运行以下命令：\n\n```bash\nkubectl get\
    \ all\n```\n\npod 的状态必须是 `Running`，并且 LoadBalancer 必须有一个有效的 `External-IP` 地址，然后你才能继续。\n\
    \n2.  现在我们希望通过更改镜像来更新部署，使用以下命令或脚本 `step2_updatesql.sh`：\n\n    ```bash\n    kubectl\
    \ --record deployment set image mssql-deployment mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n\
    \    ```\n\nk8s 将在幕后完成所有工作，停止当前容器并使用相同部署参数启动一个新容器（使用新镜像）。\n\n3.  使用以下命令或脚本 `step3_checkstatus.sh`\
    \ 来观察更新进度。该命令将一直等待，直到使用新镜像的容器更新完成并且容器再次运行为止：\n\n    ```bash\n    kubectl rollout\
    \ status deployment mssql-deployment\n    kubectl rollout history deployment mssql-deployment\n\
    \    ```\n\n当新的部署完成后，你的结果应该如下所示：\n\n```\n    Waiting for deployment \"mssql-deployment\"\
    \ rollout to finish: 0 out of 1 new replicas have been updated...\n    Waiting\
    \ for deployment \"mssql-deployment\" rollout to finish: 0 out of 1 new replicas\
    \ have been updated...\n    Waiting for deployment \"mssql-deployment\" rollout\
    \ to finish: 0 out of 1 new replicas have been updated...\n    Waiting for deployment\
    \ \"mssql-deployment\" rollout to finish: 0 of 1 updated replicas are available...\n\
    \    deployment \"mssql-deployment\" successfully rolled out\n    deployment.extensions/mssql-deployment\n\
    \    REVISION  CHANGE-CAUSE\n    2         kubectl deployment set image mssql-deployment\
    \ mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu --record=true\n```\n\
    \n4.  你可以使用此命令或脚本 `step4_getpods.sh` 确保你的 pod 再次运行：\n\n    ```bash\n    kubectl\
    \ get pods -o wide\n    ```\n\n你的 pod 状态应显示为 `Running`。\n\n5.  SQL Server 将识别现有的系统和用户数据库，但需要执行任何必要的步骤来更新到新的\
    \ CU 版本。因此，如果你尝试过快地连接到 SQL Server，可能会遇到以下错误：\n\n```\n    Sqlcmd: Error: Microsoft\
    \ ODBC Driver 17 for SQL Server : Login failed for user 'sa'. Reason: Server is\
    \ in script upgrade mode. Only administrator can connect at this time.\n```\n\n\
    尝试执行以下命令或脚本 `step5_testsql.sh`，直到你看到新版本的 SQL Server：\n\n```bash\n    SERVERIP=$(kubectl\
    \ get service | grep mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd\
    \ -Usa -PSql2017isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\n```\n\n6.  就像第\
    \ 7 章中的容器示例一样，你可能希望回滚到之前的容器。k8s 提供了一种通过更改修订版本号来实现此目的的方法。运行以下命令回滚到之前的 CU 版本，或使用脚本\
    \ `step6_rollbacksql.sh`：\n\n    ```bash\n    kubectl rollout undo deployment\
    \ mssql-deployment --to-revision=1\n    ```\n\n7.  运行以下命令或脚本 `step7_getpods.sh`\
    \ 以验证 pod 已回到 `Running` 状态：\n\n    ```bash\n    kubectl get pods -o wide\n   \
    \ ```\n\n8.  一旦 pod 处于 `Running` 状态，运行以下命令（或使用脚本 `step8_testsql.sh`）以确保你已回滚到 SQL\
    \ 2017 CU10：\n\n    ```bash\n    SERVERIP=$(kubectl get service | grep mssql-service\
    \ | awk {'print $4'})\n    PORT=31433\n    sqlcmd -Usa -PSql2017isfast -S$SERVERIP,$PORT\
    \ -Q\"SELECT @@version\"\n    ```\n\n现在，你已经成功更新了一个 SQL Server 容器，并利用 k8s 内置的更新镜像功能将其从运行中的容器回滚。\n\
    \n使用脚本 `cleanup.sh` 清理你在本章此示例中部署的所有资源。\n\n"
- fmt: '## Using Helm Charts


    在 k8s 中部署带有容器的 Pod 的过程非常直接，但正如你在示例中所见，涉及很多步骤。如果能像从包管理器（例如 RHEL 上的 `yum`）安装一样，将一个容器（如
    SQL Server）部署到 Pod 中，岂不很好？


    Helm 使其成为可能。你可以在 [`https://helm.sh/`](https://helm.sh/) 上阅读如何使用 Helm Charts。


    对于 SQL Server，一个适用于 Linux 上 SQL Server 2017 的 Helm Chart 可在此处获取：[`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)。


    当你在 k8s 集群中安装 Helm 后，你将能够使用如下单条命令部署一个 SQL Server Pod：


    ```

    helm install --name sql-server stable/mssql-linux --set acceptEula.value=Y --set
    sapassword=Sql2019isfast --set edition.value=Developer

    ```


    [`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)
    上的示例包含了如何配置持久化安装，以及如何使用部署的内置 `LoadBalancer` 连接到正在运行的 Pod。


    我认为 Helm 在简化 k8s 上 SQL Server 的体验方面具有巨大潜力，因此结合 k8s 部署继续研究这项技术将会很有趣。


    ## SQL Server Availability Groups on k8s


    k8s 内置的高可用性解决方案非常契合 SQL Server 的需求。然而，仅使用这种方法为数据库提供高可用性存在几个问题：


    *   如果 k8s 必须启动一个新的 Pod 和容器，这实际上等同于重启 SQL Server。必须在所有系统和用户数据库上执行完整恢复。根据容器的关闭方式（如果你没有使用我们新的加速数据库恢复选项），这可能导致新的
    SQL Server 容器达到可用状态所需的时间超出预期（即使 Pod 状态为 `Running`）。一个 `Running` 的 Pod 仅意味着 `sqlservr`
    进程正在运行，并不意味着 SQL Server 实际上可用。


    *   第二个问题是拉取新的 SQL Server 镜像可能需要时间。如果在为 SQL Server 创建新 Pod 的节点上没有预先拉取 SQL Server
    镜像，这可能会导致启动 Pod 并使 SQL Server 可用出现延迟。


    *   k8s 仅能*理解*容器、Pod 或节点的运行状况。它无法理解运行在容器内的程序的运行状况。由于 SQL Server *运行状况*问题，一个 SQL
    Server 容器可能正在运行但不可用（或数据库不可用）。


    我们构建了 Always On 可用性组来帮助减少故障转移所需的停机时间。该技术的一部分是识别 SQL Server 主机运行状况之外的故障转移条件。你可以在
    [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)
    阅读有关这些故障转移条件的更多信息。此外，我们为可用性组中的数据库添加了故障转移运行状况检测，你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)
    了解更多。


    *   第四个问题是，对于单个 `sqlservr` Pod，没有副本的概念。一次只有一个 Pod 可以访问系统和用户数据库。如果能有多个 SQL Server
    参与高可用性解决方案，这样其他实例（副本）可以拥有数据的只读副本，并且所有容器都不依赖于单一的持久卷声明（`Persistent Volume Claim`），将会很有益。


    因此，为我们找到一种方法将 k8s 的内置高可用性与 SQL Server 可用性组的故障转移技术结合起来是有意义的。我们在 SQL Server 2019
    预览版期间就做到了这一点。你可以通过我的同事 Sourabh Agarwal 在 [`https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/)
    发表的这篇博客文章，了解我们如何实现以及它的工作原理的完整故事。


    其方法是使用 k8s 的 *StatefulSet* 概念（在 [`https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/`](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/)
    阅读更多）来部署可用性组副本。我们还将使用 *operator* 的概念来编排可用性组的部署并检测故障转移场景。


    此外，我们将此解决方案设计为对主副本和辅助副本都使用 `LoadBalancer` 服务。这样，应用程序可以使用主 `LoadBalancer` 连接到主副本，而不管哪个副本是主副本。同时，另一个应用程序（可能是报告应用程序）可以连接到一个或多个只读辅助副本，并使用
    k8s 真正实现连接的负载均衡。


    我们还在 SQL Server Pod 中构建了一个名为 *AG Agent* 的新容器，以帮助检测和协调 SQL Server 的故障转移检测逻辑。结合称为
    k8s *ConfigMap* 的概念（在 [`https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/`](https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/)
    阅读更多），`AG Agent` 和 `operator` 将帮助将故障转移决策与 k8s 集群集成，以处理超出 k8s 运行状况（容器、Pod 或节点）范围的情况。


    所有这些都基于我们在 SQL Server 2019 预览版期间构建的组件；我们已宣布 k8s 上的可用性组将不会是 SQL Server 2019 版本的一部分。但是，可用性组是大数据集群（Big
    Data Clusters）HADR 故事的一部分，你将在第 [10](#479130_1_En_10_Chapter.xhtml) 章了解更多内容。


    我与该功能的首席开发人员 Ross Monster 进行了交谈。他告诉我，其意图仍是在未来投资此功能。Ross 告诉我，我们的思路仍然是最终使用 `operator`
    概念、`AG Agent` 概念和 `StatefulSet` 概念，但整体设计可能会改变。一旦可用性组（`AG`）部署完成，其行为将与 k8s 之外的 `AG`
    完全一样，允许你读取辅助副本并拥有类似的故障转移体验。同样，k8s 与 `AG` 的美妙之处在于，无需你安装或维护任何故障转移集群软件。


    如果你想查看使用预览版 `AG` 与 k8s 的实验练习，请查看 [`https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md`](https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md)
    上的 SQL Server 2019 on OpenShift 实验的模块 5。


    Ross 解释的一个我们正在考虑的概念是，我们实际上可以支持滚动更新场景。因此，无需依赖手动切换容器并最终经历更多停机时间，我们有可能为在可用性组中更新一系列
    SQL Server 容器提供近乎零停机时间的场景。这个全新的世界将与我们在 2019 年 5 月 Red Hat 峰会上演示的代码非常相似。你可以在 [`www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl`](https://www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl)
    观看此演示的视频，亲眼目睹 `operator` 和 SQL Server 近乎零停机更新的这一全新世界。'
  raw: '## Using Helm Charts


    The process of deploying a pod with a container in k8s is pretty straightforward,
    but, as you saw from the examples, there are a lot of steps involved. Wouldn’t
    it be nice to deploy a container like SQL Server in a pod much like an installation
    occurs from a package manager (like yum on RHEL)?


    Helm makes this possible. You can read about how to use Helm Charts at [`https://helm.sh/`](https://helm.sh/)
    .


    For SQL Server, a Helm Chart for SQL Server 2017 on Linux is available at [`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)
    .


    When you install Helm in your k8s cluster, you will be able to deploy a SQL Server
    pod using a single command like this:


    ```

    helm install --name sql-server stable/mssql-linux --set acceptEula.value=Y --set
    sapassword=Sql2019isfast --set edition.value=Developer

    ```


    The examples at [`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)
    include how to configure the installation with persistence and how to connect
    to the running pod using the built-in LoadBalancer that is deployed.


    I think Helm has some great possibilities to simplify the k8s experience with
    SQL Server, so it will be interesting to continue looking into this technology
    in combination with k8s for deployment.


    ## SQL Server Availability Groups on k8s


    The built-in high availability solution for k8s fits well with the needs of SQL
    Server. However, there are a few issues with just using this approach for high
    availability for your database:


    *   If k8s must spin up a new pod and container, it is effectively a restart of
    SQL Server. A full recovery must be performed on all system and user databases.
    Depending on how the container was shut down (and if you are not using our new
    Accelerated Database Recovery option), this could lead to longer than expected
    times for the new SQL Server container to be usable (even though the pod is Running).
    A Running pod just means the sqlservr process is running, it doesn’t mean SQL
    Server is actually available.


    *   The second issue is the time it may take to pull a new SQL Server image. If
    the SQL Server images are not pre-pulled on a node where a new pod is created
    for SQL Server, this can cause a delay in starting up the pod and making SQL Server
    available.


    *   k8s only *understands* the health of a container, pod, or node. It doesn’t
    understand the health of a program running in the container. A SQL Server container
    could be running but not available (or the database not available) due to a SQL
    Server *health* issue.


    We built Always On Availability Groups to help reduce downtime for availability
    should a failover be required. Part of this technology is to recognize failover
    conditions outside of the health of the host for SQL Server. You can read more
    about these failover conditions at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)
    . In addition, we added in failover health for databases in Availability Groups,
    which you can read more about at [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)
    .


    *   The fourth issue is that, with a single sqlservr pod, there is no concept
    of a replica. Only one pod at a time can access the system and user databases.
    It would be nice to have more than one SQL Server involved in the HA solution
    so that the other instances (replicas) could have read copies of the data, and
    all the containers would not rely on a single Persistent Volume Claim.


    Therefore, it makes sense for us to find a way to combine the built-in HA of k8s
    with the SQL Server failover technology of Availability Groups. And we did just
    that during the preview of SQL Server 2019\. You can see the full story of how
    we did this and how it works through this blog post by my colleague Sourabh Agarwal
    at [`https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/)
    .


    The methodology is that we use the k8s concept of a *StatefulSet* (read more at
    [`https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/`](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/)
    ) to deploy Availability Group replicas. We would also use the concept of an *operator*
    to orchestrate deployment of the Availability Group and to detect failover scenarios.


    Furthermore, we designed this solution to use LoadBalancer services for both the
    primary and secondary replicas. This way an application could connect to the primary
    replica using the primary LoadBalancer, regardless of which replica was the primary.
    Also, another application, perhaps a reporting application, could connect to one
    or more read secondary replicas and use k8s to truly load balance the connections.


    We also built a new container called an *AG Agent* living in the SQL Server pod
    to help detect and coordinate failover detection logic for SQL Server. Combined
    with a concept called a k8s *ConfigMap* (read more at [`https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/`](https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/)
    ), the AG Agent and operator would help integrate failover decisions with the
    k8s cluster for scenarios outside the scope of k8s health (container, pod, or
    node).


    All of this is based on components we built during the preview of SQL Server 2019;
    we announced that Availability Groups for k8s will not be part of the SQL Server
    2019 release. However, Availability Groups are part of the HADR story for Big
    Data Clusters which you will learn about more in Chapter [10](#479130_1_En_10_Chapter.xhtml).


    I talked to Ross Monster, lead developer of this feature. He told me the intention
    is to still invest in this feature in the future. Ross told me that our thinking
    is to still end up using the operator concept, AG Agent concept, and StatefulSet
    concepts, but the overall design may change. Once the Availability Group (AG)
    is deployed, it will behave just like an AG does outside of k8s, allowing you
    to read secondary replicas and have a similar failover experience. Again, the
    beauty of k8s with AGs is that no failover cluster software is required on your
    part to install or maintain.


    If you want to see a lab exercise using the preview version of AG with k8s, take
    a look at Module 5 of the SQL Server 2019 on OpenShift lab at [`https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md`](https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md)
    .


    One concept Ross explained we are thinking about is that we could actually support
    a rolling update scenario. So instead of having to rely on switching containers
    manually and end up experiencing more downtime, we could potentially provide an
    almost no-downtime scenario to update a series of SQL Server containers in an
    Availability Group. This brave new world would act very similar to the code we
    built that Red Hat demonstrated at the May 2019 Summit. You can watch a video
    of this demonstration at [`www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl`](https://www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl)
    and see this new world of operators and almost zero downtime updates of SQL Server
    in action.'
  trans: '## 使用 Helm Chart


    在 Kubernetes（k8s）中部署带有容器的 Pod 过程非常直接，但正如你在示例中所见，涉及许多步骤。如果能像从包管理器（例如 RHEL 上的 `yum`）安装软件一样，轻松地将一个容器（如
    SQL Server）部署到 Pod 中，岂不是很好？


    Helm 使其成为可能。你可以在 [`https://helm.sh/`](https://helm.sh/) 上了解如何使用 Helm Chart。


    对于 SQL Server，一个适用于 Linux 上 SQL Server 2017 的 Helm Chart 可在此处获取：[`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)。


    当你在 k8s 集群中安装 Helm 后，你将能够使用如下单条命令部署一个 SQL Server Pod：


    ```

    helm install --name sql-server stable/mssql-linux --set acceptEula.value=Y --set
    sapassword=Sql2019isfast --set edition.value=Developer

    ```


    [`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)
    上的示例包含了如何配置持久化安装，以及如何使用部署的内置 `LoadBalancer` 服务连接到正在运行的 Pod。


    我认为 Helm 在简化 k8s 上部署 SQL Server 的体验方面具有巨大潜力，因此结合 k8s 部署继续研究这项技术将会很有趣。


    ## k8s 上的 SQL Server 可用性组


    k8s 内置的高可用性解决方案非常契合 SQL Server 的需求。然而，仅使用这种方法为数据库提供高可用性存在几个问题：


    *   如果 k8s 必须启动一个新的 Pod 和容器，这实际上等同于重启 SQL Server。必须在所有系统和用户数据库上执行完整恢复。根据容器的关闭方式（如果你没有使用我们新的加速数据库恢复选项），这可能导致新的
    SQL Server 容器达到可用状态所需的时间超出预期（即使 Pod 状态为 `Running`）。一个 `Running` 的 Pod 仅意味着 `sqlservr`
    进程正在运行，并不意味着 SQL Server 实际上可用。


    *   第二个问题是拉取新的 SQL Server 镜像可能需要时间。如果在为 SQL Server 创建新 Pod 的节点上没有预先拉取 SQL Server
    镜像，这可能会导致启动 Pod 并使 SQL Server 可用出现延迟。


    *   k8s 仅能*理解*容器、Pod 或节点的运行状况。它无法理解运行在容器内的程序的运行状况。由于 SQL Server *运行状况*问题，一个 SQL
    Server 容器可能正在运行但不可用（或数据库不可用）。


    我们构建了 Always On 可用性组来帮助减少故障转移所需的停机时间。该技术的一部分是识别 SQL Server 主机运行状况之外的故障转移条件。你可以在
    [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)
    阅读有关这些故障转移条件的更多信息。此外，我们为可用性组中的数据库添加了故障转移运行状况检测，你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)
    了解更多。


    *   第四个问题是，对于单个 `sqlservr` Pod，没有副本的概念。一次只有一个 Pod 可以访问系统和用户数据库。如果能有多个 SQL Server
    参与高可用性解决方案，这样其他实例（副本）可以拥有数据的只读副本，并且所有容器都不依赖于单一的持久卷声明（`Persistent Volume Claim`），将会很有益。


    因此，为我们找到一种方法将 k8s 的内置高可用性与 SQL Server 可用性组的故障转移技术结合起来是有意义的。我们在 SQL Server 2019
    预览版期间就做到了这一点。你可以通过我的同事 Sourabh Agarwal 在 [`https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/)
    发表的这篇博客文章，了解我们如何实现以及它的工作原理的完整故事。


    其方法是使用 k8s 的 *StatefulSet* 概念（在 [`https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/`](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/)
    阅读更多）来部署可用性组副本。我们还将使用 *operator* 的概念来编排可用性组的部署并检测故障转移场景。


    此外，我们将此解决方案设计为对主副本和辅助副本都使用 `LoadBalancer` 服务。这样，应用程序可以使用主 `LoadBalancer` 连接到主副本，而不管哪个副本是主副本。同时，另一个应用程序（可能是报告应用程序）可以连接到一个或多个只读辅助副本，并使用
    k8s 真正实现连接的负载均衡。


    我们还在 SQL Server Pod 中构建了一个名为 *AG Agent* 的新容器，以帮助检测和协调 SQL Server 的故障转移检测逻辑。结合称为
    k8s *ConfigMap* 的概念（在 [`https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/`](https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/)
    阅读更多），`AG Agent` 和 `operator` 将帮助将故障转移决策与 k8s 集群集成，以处理超出 k8s 运行状况（容器、Pod 或节点）范围的情况。


    所有这些都基于我们在 SQL Server 2019 预览版期间构建的组件；我们已宣布 k8s 上的可用性组将不会是 SQL Server 2019 版本的一部分。但是，可用性组是大数据集群（Big
    Data Clusters）HADR 故事的一部分，你将在第 10 章了解更多内容。


    我与该功能的首席开发人员 Ross Monster 进行了交谈。他告诉我，其意图仍是在未来投资此功能。Ross 告诉我，我们的思路仍然是最终使用 `operator`
    概念、`AG Agent` 概念和 `StatefulSet` 概念，但整体设计可能会改变。一旦可用性组（`AG`）部署完成，其行为将与 k8s 之外的 `AG`
    完全一样，允许你读取辅助副本并拥有类似的故障转移体验。同样，k8s 与 `AG` 的美妙之处在于，无需你安装或维护任何故障转移集群软件。


    如果你想查看使用预览版 `AG` 与 k8s 的实验练习，请查看 [`https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md`](https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md)
    上的 SQL Server 2019 on OpenShift 实验的模块 5。


    Ross 解释的一个我们正在考虑的概念是，我们实际上可以支持滚动更新场景。因此，无需依赖手动切换容器并最终经历更多停机时间，我们有可能为在可用性组中更新一系列
    SQL Server 容器提供近乎零停机时间的场景。这个全新的世界将与我们在 2019 年 5 月 Red Hat 峰会上演示的代码非常相似。你可以在 [`www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl`](https://www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl)
    观看此演示的视频，亲眼目睹 `operator` 和 SQL Server 近乎零停机更新的这一全新世界。'
- fmt: '# 9. SQL Server Data Virtualization


    ## Summary


    I’m very confident containers and Kubernetes are a big part of the future of distributed
    and scalable computing. And we have built SQL Server to be a part of this future.
    In this chapter, you learned enough fundamentals of Kubernetes (`k8s`) to understand
    how to deploy SQL Server in a `k8s` cluster. You also were able to see the power
    of HA built into `k8s` and how SQL Server can take advantage of it. Just like
    you saw in Chapter [7](#479130_1_En_7_Chapter.xhtml) with containers, you can
    use `k8s` capabilities to update a SQL Server container in a pod with a new cumulative
    update and roll back if necessary. I briefly introduced you to Helm Charts, which
    represent a new method to deploy pods and containers in `k8s` using a package
    management approach.


    Finally, I gave you a glimpse of the future of SQL Server with `k8s` as we integrate
    Availability Groups with `k8s` to provide a robust, integrated HA solution with
    SQL Server, including all the power of Availability Groups you see today. Chapters
    [7](#479130_1_En_7_Chapter.xhtml) and [8](#479130_1_En_8_Chapter.xhtml) are important
    building blocks for learning as you go through Chapter [10](#479130_1_En_10_Chapter.xhtml)
    for SQL Server Big Data Clusters.


    Data Virtualization is one of the most exciting capabilities we are delivering
    with SQL Server 2019\. In this chapter, you will learn more how Data Virtualization
    is made possible in SQL Server 2019 through a technology called Polybase. This
    chapter, along with Chapters [6](#479130_1_En_6_Chapter.xhtml), [7](#479130_1_En_7_Chapter.xhtml),
    and [8](#479130_1_En_8_Chapter.xhtml), provides the foundation to learn about
    `SQL Server Big Data Clusters` in Chapter [10](#479130_1_En_10_Chapter.xhtml).


    ## What Is Polybase?


    Polybase is an innovative technology introduced in SQL Server 2016, and expanded
    in SQL Server 2019, to solve the problem of *data movement*. Data movement typically
    involves building expensive and complex Extract, Transform, and Load (ETL) processes
    from other data sources into SQL Server from other data sources. Polybase solves
    this challenge by implementing a solution for *Data Virtualization* , a term I
    will discuss and define as we move along. I’ll discuss and define Data Virtualization
    through this chapter.


    In this chapter, I’ll walk you through the history of Polybase and how it provides
    Data Virtualization. I’ll talk about how Polybase works behind the scenes, and
    the typical workflow for Polybase through the concept of *external tables* . And,
    like most of the chapters in this book, we will use examples to show you the details
    of how to use Polybase for your Data Virtualization needs.


    You can use our documentation as a guide to also understand more about Polybase
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide)
    .


    ### The History of Polybase


    Around 2011, Dr. David DeWitt and his team created a new project called *Polybase*
    (you can see the project web site at [`http://gsl.azurewebsites.net/Projects/Polybase.aspx`](http://gsl.azurewebsites.net/Projects/Polybase.aspx)
    ). His team included Rimma Nehme (now of Azure CosmosDB fame) and Alan Halverson
    from the Jim Gray Systems Lab for Microsoft Research. The goal of this project
    was to create a new way to access data in Hadoop systems without coding MapReduce
    jobs (you can read more about MapReduce, which is very popular with those who
    use Hadoop, at [`https://en.wikipedia.org/wiki/MapReduce`](https://en.wikipedia.org/wiki/MapReduce)
    ).


    I interviewed David, who now works at MIT, about the history of Polybase. I asked
    him why he would try and create a new way to use MapReduce. He pointed me to a
    blog post he and Michael Stonebraker wrote, which you can find at [`https://homes.cs.washington.edu/~billhowe/mapreduce_a_major_step_backwards.html`](https://homes.cs.washington.edu/%257Ebillhowe/mapreduce_a_major_step_backwards.html)
    . The post describes multiple ways MapReduce represents an inferior approach to
    accessing data.


    David and his team subsequently created the Polybase project to use the Parallel
    Data Warehouse (PDW) technology at Microsoft to access “big data” in Hadoop systems.
    PDW, now called Analytics Platform System (APS), is the precursor to Azure SQL
    Data Warehouse in the cloud. As David tells it, “…we could connect PDW to HDFS
    and use PDW’s parallel query to give our customers the ability to use standard
    SQL instead of MapReduce. This would give customers the ability to access both
    their relational data and their external tables stored in HDFS in a single query.”


    The team created a paper for the technology, which you can read at [`http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf`](http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf)
    . The paper appeared in the proceedings of the 2013 ACM SIGMOD conference. Polybase
    first appeared as a feature in PDW in mid-2012 and is still there today.


    Figure [9-1](#479130_1_En_9_Chapter.xhtml#Fig1) represents a visual diagram of
    the original Polybase concept.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig1_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig1_HTML.jpg)


    Figure 9-1: The original Polybase concept from Jim Gray Systems Lab


    Fast forward to the development of SQL Server 2016\. If Polybase can be used via
    SQL in PDW, why not SQL Server? In SQL Server 2016, we added the Polybase feature
    to access data in Hadoop systems using T-SQL. I often refer to this feature as
    “Polybase classic” (my term; not an official Microsoft term). You can use T-SQL
    to create what is called an *external table* to map over HDFS files, then query
    that external table like any other table. The “query” would be converted into
    a MapReduce Java program to run on the target Hadoop system.


    I joined the engineering team right around the launch of SQL Server 2016, and
    I never really saw Polybase take off with our customers. I’m not sure exactly
    why, but part of the answer could be that customers would have to install Java –
    typically the Java Runtime Environment (`JRE`) from Oracle – on the same computer
    as SQL Server. It also could be that, back in 2016, SQL Server customers were
    just not ready to integrate with Hadoop, and Hadoop users wanted to segment themselves
    from relational databases.


    In 2016, Microsoft acquired a company called Metanautix, which I mentioned in
    the opening chapter of this book. With this acquisition came `ODBC` technology
    to access data sources like SQL Server, Oracle, Teradata, and MongoDB. Folks like
    Travis Wright and Slava Oks saw the vision with these technologies, and so they
    expanded Polybase in SQL Server 2019 to allow a user to use external tables to
    access not only Hadoop but also SQL Server, Oracle, Teradata, and MongoDB. And
    to add “icing to the cake,” we added support for accessing *any data source* using
    an `ODBC` driver of your choice. I call this new capability `Polybase++` (again,
    this is my term, not Microsoft official).'
