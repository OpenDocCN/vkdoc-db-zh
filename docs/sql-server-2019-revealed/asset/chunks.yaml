  trans: "\n### 注意事项\n\n我最初希望直接在本书的第二章和第三章讨论这些主题。然而，我后来认为，如果你需要更多关于容器和 Kubernetes\
    \ 的信息，将这些章节提前会有所帮助。因此，我将在这本书中以这个新功能作为“重磅结尾”。如果你等不及了，可以直接跳转到第 9 章。\n\n### 性能\n\n\
    在每一次 SQL Server 版本发布中，我们都会致力于提升性能。始终如此。但是，仅仅让你的查询运行得更快是不够的。我们需要持续让 SQL Server\
    \ 引擎变得更智能，能够适应你的工作负载、硬件投入和复杂的查询模式。第 2 章完整探讨了 SQL Server 2019 的性能功能，包括但不限于：\n\n\
    *   `智能查询处理`，这是对 SQL Server 2017 中引入的自适应查询处理的扩展。\n*   通过轻量级查询分析、上次执行计划和查询存储增强功能，随时随地提供查询计划\
    \ `洞察`。\n*   一系列功能可提供真正的 `内存中数据库`，包括增强的 I/O、用于持久内存的混合缓冲池以及内存优化的 tempdb 架构。将这些技术与我们内置的列存储索引和内存\
    \ OLTP 相结合，可提供一个引人注目的内存中数据库解决方案。\n\n### 安全性\n\n在过去十年中，SQL Server 不仅是业界漏洞最少的数据库产品，还包含了一系列广泛的特性和工具，以满足任何企业的现代安全需求。这包括\
    \ SQL Server 2019 的以下增强功能：\n\n*   `使用安全飞地的始终加密`\n    SQL Server 2016 引入了一个名为 `始终加密`\
    \ 的新数据应用程序端到端安全系统。虽然该系统提供了静态、内存中和跨网络的加密，但仍存在一些限制，最重要的是不支持 `丰富计算`。在第 3 章中，我将讨论\
    \ `始终加密` 如何利用称为 `安全飞地` 的概念来支持丰富计算和其他有趣的安全场景。\n\n*   `内置的数据分类与审核`\n    欧盟（EU）的《通用数据保护条例》（GDPR）于\
    \ 2018 年 5 月生效。自那时起，我与许多欧盟境内以及与欧盟客户有业务往来的公司的客户进行了交流。我们新的内置数据分类和审核功能，结合我们的工具，可以对\
    \ GDPR 等合规性场景以及你的业务可能需要处理的其他场景非常有帮助。\n\n我将在第 3 章中介绍这些安全方面的新特性及更多内容。\n\n### 任务关键型可用性\n\
    \n快速和安全是一方面，但依赖 SQL Server 运营业务的客户需要他们的数据平台始终可用。SQL Server 2019 包含满足你高可用数据需求的新功能，包括：\n\
    \n*   可恢复的联机创建索引和聚集列存储索引联机创建，以帮助完成联机索引可用性故事。\n*   增强了我们的旗舰 HADR 功能——Always On\
    \ 可用性组，包括增加副本数量和主连接重定向。\n*   想象这样一个世界：事务回滚立即发生，恢复和日志截断不依赖于大型或长时间运行的事务。欢迎来到全新的加速数据库恢复世界！\n\
    \n我将在第 4 章中更详细地讨论这些以及其他任务关键型可用性解决方案。\n\n### 现代开发平台\n\n到目前为止，我确信我所谈到的 SQL Server\
    \ 2019 中的所有新功能似乎都只针对 DBA 或 IT 专业人员。我们绝对相信开发人员对 SQL Server 的成功至关重要，因此我们也对以下新功能进行了投入：\n\
    \n*   在 SQL Server 2016 中，我们引入了一个名为 `R` 的语言，用于数据库内机器学习的新平台。在 SQL Server 2017 中，我们通过允许\
    \ `Python` 程序增强了这一模型。利用相同的基础设施，我们现在允许开发人员使用 `Java` 类来扩展 `T-SQL` 语言。事实上，我们构建了一个可扩展性\
    \ SDK，以使其他语言也能成为 SQL Server 故事的一部分。\n*   我们扩展了图数据库的功能（该功能在 SQL Server 2017 中首次引入），增加了诸如边约束和\
    \ `MERGE` 支持等新特性。\n*   我们希望开发人员使用 Unicode 数据类型，因此我们增加了新的 `UTF-8` 排序规则，可以帮助开发人员管理\
    \ `UTF-8` 数据，而无需承担 Unicode 数据类型的开销。\n\n我将在第 5 章中更详细地讨论 SQL Server 2019 中面向开发人员的功能。\n\
    \n### 投资于你选择的平台\n\n我们在 SQL Server 2017 中推出了 Linux 版 SQL Server，但引擎“边缘”的一些功能未能包含在该版本中。我们希望我们的用户能够完全选择运行\
    \ SQL Server 的操作系统，而无需担心功能或兼容性问题。我们在 SQL Server 2019 中通过向 Linux 版 SQL Server 添加\
    \ `复制`、`更改数据捕获 (CDC)`、`分布式事务 (DTC)`、`机器学习` 和 `Polybase` 来改进了这一点。\n\n我们在容器方面也进行了投资，包括新的容器注册表、支持\
    \ Red Hat Enterprise Linux (`RHEL`)，并持续支持包括 OpenShift 在内的 Kubernetes。虽然本书未涵盖，但我们在\
    \ 2019 年 5 月宣布了对 Azure SQL Database Edge 中的 Arm 处理器的预览支持，从而扩展了 SQL Server 的平台。你可以在\
    \ [`https://azure.microsoft.com/en-us/services/sql-database-edge/`](https://azure.microsoft.com/en-us/services/sql-database-edge/)\
    \ 阅读更多关于 Azure SQL Database Edge 的信息。\n\n你应该停下来思考一下所有这些平台标志，因为 SQL Server 不仅仅是一个可选平台。它是一个\
    \ `具备兼容性的可选平台`。你可以在这些平台中的任何一个上备份数据库，并将其原封不动地恢复到这些平台中的任何一个上。\n\n我将在本书的第 6 章、第 7\
    \ 章和第 8 章中花时间深入探讨 Linux 版 SQL Server 的增强功能、SQL Server 容器以及 Kubernetes 上的 SQL Server。\n\
    \n除了 SQL Server 2019 的这些主要投资领域外，还有其他值得一提的创新。\n\n### Azure Data Studio\n\nSQL Server\
    \ Management Studio (`SSMS`) 多年来一直是 SQL Server 坚定的图形用户界面。去年，我们开始构建一个名为 SQL Operations\
    \ Studio 的新工具，用于数据探索、可扩展性和新体验。在 2018 年 9 月，我们正式推出了这个工具，并将其命名为 Azure Data Studio\
    \ (`ADS`)。\n\nAzure Data Studio 包含一些创新的新技术，包括笔记本、大数据集群部署、外部数据向导，以及对 SQL Server、`HDFS`\
    \ 和其他 Azure 数据服务的探索。\n\n没有专门章节介绍 Azure Data Studio。相反，你会在本书各章中看到我使用这个工具（以及 `SSMS`\
    \ 等其他工具）。\n"
- fmt: '### Voice of the Customer


    Having a background in customer support, I''m always interested to see our engineering
    team include features into new releases that can be tied to direct customer feedback
    or trends of support issues with our CSS team.


    This release is no different and includes a series of enhancements to the database
    engine, including but not limited to:


    *   A better string truncation error message with actionable context. It has been
    the #1 voted customer request with 1000s of votes.

    *   New dynamic management objects to gain insights into the internals of database
    page headers (yes, you too can be Paul Randal). These statements can help troubleshoot
    page latch contention issues.

    *   Scalability improvements in the engine including concurrent PFS updates, parallel
    bulk insert, and indirect checkpoint.


    I''ll show you more details about this collection of enhancements in `Chapter`
    [`11`](#479130_1_En_11_Chapter.xhtml).


    As you look at the rest of the book, the chapters are fairly independent of each
    other. However, I highly recommend you first read `Chapters` [`7`](#479130_1_En_7_Chapter.xhtml)
    and [`8`](#479130_1_En_8_Chapter.xhtml) as foundational information before diving
    into `Chapters` [`9`](#479130_1_En_9_Chapter.xhtml) and [`10`](#479130_1_En_10_Chapter.xhtml)
    on Data Virtualization and Big Data Clusters.


    ## Getting Started with SQL Server 2019


    Here are some resources to help you deploy and configure SQL Server 2019 as you
    prepare to learn new features and try examples in the remaining chapters of this
    book.


    ### Download SQL Server 2019


    To download and try out SQL Server 2019, go to [`www.microsoft.com/en-us/sql-server/sql-server-2019#Install`](http://www.microsoft.com/en-us/sql-server/sql-server-2019%2523Install).


    ### Deploy SQL Server 2019


    For instructions on how to deploy SQL Server 2019 on Windows, go to [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server%253Fview%253Dsql-server-ver15).


    For SQL Server 2019 on Linux, go to [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview%253Fview%253Dsql-server-ver15).


    To learn how to deploy SQL Server in a Container, go to [`https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker?view=sql-server-linux-ver15&pivots=cs1-bash`](https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker%253Fview%253Dsql-server-linux-ver15%2526pivots%253Dcs1-bash.%255C).


    ### Migrate to SQL Server 2019


    `Chapter` [`11`](#479130_1_En_11_Chapter.xhtml) will include a discussion about
    migration and tools to support migration to Server 2019 from previous releases
    of SQL Server and other vendor database products.


    ### What''s New in SQL Server 2019


    Learn all the new feature specifics about SQL Server 2019 at [`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253Fview%253Dsqlallproducts-allversions).


    ### Download Book Code and Sample Databases


    To be able to work with all of the examples in this book, you will want to clone
    the GitHub repo for the book as discussed in the book introduction.


    > **Tip**

    >

    > Windows users, be sure to use the following git syntax to clone the repo to
    avoid any issues with CRLF for Linux scripts:

    >

    > `git clone --config core.autocrlf=false` `https://github.com/microsoft/sqlworkshops.git`


    In addition, you will want to download the sample databases `WideWorldImporters`
    from [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)
    and `WideWorldImportersDW` from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak).
    The code for the book has examples on how to restore the backup on Windows, Linux,
    Containers, and Kubernetes.


    ### SQL Server Workshops


    Even though I include many hands-on exercises in this book, go to [`http://aka.ms/sqlworkshops`](http://aka.ms/sqlworkshops)
    to find more free related training about SQL Server (my friend and colleague Buck
    Woody, who is one of the finest trainers I know, is the brainchild behind this
    site).


    ### It Is Your Grandpa''s SQL Server?


    I enjoyed authoring this book not just because I like the technology (OK I''m
    biased about SQL Server) but also because our engineering team is innovating at
    speeds not seen by any other competitive data product or platform in the industry.
    And let''s admit, it''s fun to learn new things.


    Perhaps this quote from *ITProToday* magazine says it best: "I never expected
    a day I''d be discussing release features of Microsoft SQL Server in the same
    sentence as Linux, Oracle and Apache Spark, but it''s a brave new world. Microsoft''s
    SQL Server development is moving at a pace none of its competitors is matching"
    ([`www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019`](https://www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019)).


    I remember my colleague Travis Wright saying about SQL Server 2019, "This is not
    your Grandpa''s SQL Server." This is because the product has evolved from a powerful
    relational database engine to now include technologies like Spark, HDFS, Notebooks,
    Polybase, R, Python, Java, Linux, containers, and Kubernetes all as part of the
    product, truly a Modern Data Platform.


    I remember putting this quote on Twitter. My colleague Pedro Lopes saw this and
    commented that SQL Server 2019 really is your grandpa''s SQL Server. So who is
    right? They both are. SQL Server 2019 is still the incredible database engine
    you know and love, with scalable performance, mission-critical security, and high
    availability. And you will see in this book enhancements to all these core areas.
    But SQL Server 2019 is so much more. One of the most popular database platforms
    on the planet and the newest kid on the block. You can be both. Welcome to SQL
    Server 2019.


    # 2. Intelligent Performance


    SQL Server Performance is critical to the operations of any data platform. This
    chapter is packed with information about how SQL Server 2019 can help you gain
    query performance with no application changes. This is one of the longest chapters
    in the book with plenty of examples so strap in and grab your favorite coffee.'
