  trans: '### 注意


    Linux 上的 SQL Server 不支持多实例，但你可以通过容器实现相同的解决方案。


    `一致性`


    这是我在容器方面绝对喜爱的特性之一，它帮助解决了 SQL Server 的一大难题。多年来，公司都为开发者搭建了安装了 SQL Server 的 `开发`
    服务器，作为测试和开发的演练场。但这会带来巨大的痛苦，因为太多开发者使用同一个 SQL Server（而且他们通常需要较高的 SQL Server 访问权限），可能导致不一致性和给数据库管理员等人员带来重大困扰。


    容器为开发者提供了一种一致的方式来使用 SQL Server，而无需共享一个 SQL Server 实例。例如，如果你希望所有开发者都使用特定版本的 SQL
    Server 镜像以及特定的数据库，你可以构建一个容器镜像来实现这一点。而且由于容器具有可移植性，并且 SQL Server 现在支持 Linux，你可以为使用不同平台的开发者提供相同的
    SQL Server 容器镜像。你的 macOS 开发者可以使用与 Windows 开发者相同的 SQL Server 镜像。这真是一个一致的方案！图中 `DevOps`
    标志左下角的符号仅仅描述了容器对于支持 DevOps 模型是多么重要。


    `高效`


    容器为更新像 SQL Server 这样的软件提供了一种全新的、坦白说令人思维开阔的体验。如果你曾经需要为 SQL Server 应用累积更新或补丁，你会发现容器的体验令人惊叹。你将体验到更少的停机时间，以及需要时更快回滚更新的体验。


    在右侧的图 7-1 中，图示说明了其工作原理。中间“灰掉”的容器代表一个已停止的 SQL Server 容器。左侧的容器是新版本的 SQL Server，它已启动但指向相同的系统和用户数据库，这些数据库存储在
    `持久化存储` 中（这称为卷的概念，我将在本章后面解释）。这是我在本章后面要向你展示的一种技术，我称之为“切换”容器，以应用或回滚 SQL Server 的累积更新。


    在你查看图示时，我想指出以下几点观察：


    *   标有 `Bin/libs` 的黑色方框代表运行 SQL Server 所需的最小二进制文件。这代表了容器相对于整个虚拟机的“轻量级”方面。图中没有真正体现的是，如果容器来自同一个镜像，这些文件是跨容器共享的。

    *   标有 `Docker` 的方框代表用于运行和管理容器的 docker 软件。实际上，这里应该写“容器运行时”，因为 Docker 只是容器运行时的一个例子。

    *   注意那些指向下方 *穿过* Docker 到 `主机操作系统` 的箭头。Docker 并不是容器和主机操作系统之间的一层。换句话说，SQL Server
    不必通过某个层来通信以执行内核操作系统操作。这就是为什么容器也被认为更轻量级，因为它们有一个直接与主机操作系统对话的程序。容器执行的独特之处在于它们彼此隔离运行，因此得名容器。


    有了这些容器的基础知识，让我们花时间学习容器的工作原理。理解事物的工作原理通常能让你更高效地使用它们。


    ## SQL Server 容器如何工作


    在你开始尝试 SQL Server 容器之旅前，让我花时间解释它们的工作原理。为了解释它们如何工作，我需要花一些时间谈谈 `容器托管`、docker 背后的魔力以及
    `容器生命周期`。


    ### 容器托管


    我刚在上一节结束时谈到容器实际上是直接与主机操作系统协同工作的程序。主机操作系统可以位于虚拟机中，也可以直接位于主机 `裸机` 计算机上。


    由于该程序像系统上的任何程序一样直接与主机操作系统交互（当然，它们以特殊隔离的方式运行），它们必须被编译和执行以在主机操作系统上运行。


    当我们在 Linux 上发布 SQL Server 2017 时，我们还引入了基于 Linux 的 SQL Server 容器镜像，即 Ubuntu Linux。世界上几乎每个容器镜像都基于一个主机操作系统，并且大多数基于
    Linux。对于 Linux 主机系统，运行基于 Linux 的 SQL Server 容器没有问题。无论 Linux 系统是裸机计算机还是虚拟机，SQL
    Server Linux 容器都是天然契合的。


    那么 Windows 和 macOS 呢？作为容器运行时的 Docker 是关键。Docker 通过一个名为 Docker Desktop for Windows
    的程序支持在 Windows 上运行容器。任何基于 Linux 镜像的容器都将在运行 Linux 的虚拟机上下文中运行，该虚拟机称为 `DockerDesktopVM`。macOS
    的 Docker Desktop 使用一个称为 HyperKit 的概念（ [`https://github.com/moby/hyperkit`](https://github.com/moby/hyperkit)
    ）。你可以在 [`www.docker.com/products/docker-desktop`](https://www.docker.com/products/docker-desktop)
    上阅读更多关于 Docker Desktop 的信息。


    最近，Docker for Windows 在容器方面取得了一些进展，支持一个称为 Linux Containers for Windows (LCOW)
    的概念。Windows 团队将此概念描述为在 Windows 中运行 Linux 容器比使用完整虚拟机更轻量的方法。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers)
    上阅读更多关于 LCOW 的信息。此外，Docker Desktop for Windows 可以使用一种更优化的方法，利用新的 Windows Subsystem
    for Linux (WSL)。你可以在 [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/)
    上阅读更多关于 Docker Desktop 如何使用 WSL2 的信息。


    那么基于 Windows 或 macOS 镜像的容器呢？如果容器镜像基于像 Linux 这样的操作系统，那么是否存在基于 Windows 或 macOS 的容器镜像？答案是
    Windows 有。Windows 确实有一个基于 Windows 的容器镜像概念。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/)
    上阅读更多关于 Windows 容器的信息。SQL Server 尚未发布受支持的 Windows 容器版本。但在 2019 年夏天，我们宣布了 SQL Server
    Windows 容器的私有预览计划。我将在本章末尾更多地讨论 SQL Server Windows 容器。在我撰写本书时，我尚未看到基于 macOS 的容器镜像。由于
    SQL Server 并非原生为 macOS 构建，这不是问题，但正如我所说，SQL Server 支持 Linux，而 Linux 将使用 macOS 的
    Docker Desktop（使用 HyperKit）运行。'
- fmt: '### Is Docker Magic?


    What I''ve described so far seems kind of magical to anyone familiar with computer
    systems. Anytime someone mentions the word container, the name Docker comes up
    in the same sentence. As it turns out, the concept of operating system virtualization,
    which defines the concept of what containers are all about, has been around for
    some time (read [`https://en.wikipedia.org/wiki/OS-level_virtualisation`](https://en.wikipedia.org/wiki/OS-level_virtualisation)
    for more info). Anyone that has worked with me when I research how something works
    knows I always want to know "What is the API?" In other words, what is the programming
    interface used to achieve a goal. For containers, using APIs provided by the kernel
    OS provides the answer behind the magic.


    Docker (as well as other container runtimes in the market) has taken the concept
    of containers and built a platform and ecosystem and that is universally used.
    But Docker itself uses the capabilities of the operating system to enable the
    concept of containers, namely, these main constructs (on Linux but similar concepts
    apply to Windows containers):


    `Namespace` – Namespaces provide a mechanism for processes to run isolated from
    each other. You can read more about namespaces at [`https://en.wikipedia.org/wiki/Cgroups#NAMESPACE-ISOLATION`](https://en.wikipedia.org/wiki/Cgroups%2523NAMESPACE-ISOLATION).


    `Control groups` (`cgroups`) – `cgroups` provide a mechanism to control resource
    usage for processes or a set of processes. Containers by default have access to
    all computing resources such as memory and CPU, but `cgroups` provide a method
    to limit resource usage for a container.


    `Union file system` – A union file system allows multiple directories to be presented
    as one. This concept is key to keeping the footprint of containers small and supporting
    a `readable` and `writeable` layer. In Linux system, the `OverlayFS` file system
    supports a union file system. You can read more about how this works for containers
    at [`https://docs.docker.com/storage/storagedriver/overlayfs-driver/#how-the-overlay-driver-works`](https://docs.docker.com/storage/storagedriver/overlayfs-driver/%2523how-the-overlay-driver-works).


    Let me stop and explain a key concept I just introduced for containers:


    `readable layer` – A container image is read-only and consists of a set of files
    presented in a file system. For SQL Server, this includes the minimum files supported
    from the base operating system image and the files for SQL Server including binaries
    and system databases.


    `writeable layer` – The writeable layer is any changes made to the file system
    of a container after it is started. This could include any changes to files from
    the readable layer or new files added. The writeable layer is persisted for the
    lifetime of the container. Once the container is removed, the writeable layer
    is also removed. As you can imagine for SQL Server user databases, this presents
    a problem.


    `volume` – A volume is a location of persisted storage on the host that is mapped
    to a directory location in the writeable layer of the container. You will see
    for SQL Server a common practice is to use a volume to map to a directory in the
    container to store databases. Volumes persist outside the lifetime of the container,
    so if a container is removed, the volume still exists.


    One thing I love docker has done is to introduce their own API abstracting the
    OS concepts that support containers called `libcontainer`. You can read more about
    `libcontainer` at [`https://github.com/opencontainers/runc/tree/master/libcontainer`](https://github.com/opencontainers/runc/tree/master/libcontainer).
    Another interesting read about the open source nature of containers is the Open
    Container Initiative (OCI), which Microsoft is a founding member ([`www.opencontainers.org/`](https://www.opencontainers.org/)).


    It is important to note that Docker is an example of a container runtime and one
    of the most popular in the industry. There is an open-source access container
    runtime called `containerd` which you can read about at [`https://containerd.io/`](https://containerd.io/).'
