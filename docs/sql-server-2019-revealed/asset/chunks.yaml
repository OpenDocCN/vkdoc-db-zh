  trans: '

    第 8 章中提到的 SQL Server 秘钥用于控制连接 SQL Server 的`sa`密码。BDC 的部署包含一个名为`MSSQL_SA_PASSWORD`的环境变量，在使用
    Python 部署脚本时系统会提示我输入该密码。对于 SQL Server 主实例，我们创建了一个名为`mssql-sa-password`的秘钥。


    如果你还记得在第 8 章中，我展示了如何为 pod 中的 SQL Server 创建一个`LoadBalancer`服务以连接到 SQL Server。我们的
    BDC 部署工具会为 SQL Server 主实例创建一个这样的服务。要查看此服务的确切对象，你可以运行以下命令：


    ```

    kubectl get service --namespace=mssql-cluster -lrole=master-pool

    ```


    输出将显示`master-svc-external`服务以及一个外部 IP 和端口。


    SQL Server pod 的最后一个组件是`ReplicaSet`。我在第 8 章向你展示了`ReplicaSet`如何为 k8s 上的 SQL Server
    提供“基础高可用性”。对于 BDC，我们使用一个称为`StatefulSet`的概念，它提供与`ReplicaSet`类似的高可用性功能，但能力更强。在 BDC
    中，除控制器外，所有 pod 都使用`StatefulSet`对象。`StatefulSet`对象允许对 pod 进行排序和扩展，是实现 BDC 稳健高可用性的关键组件。我将在本章后面的“高可用性”一节中更详细地讨论
    BDC 的高可用性。


    如果你查看`kubectl describe`命令的输出，你会看到这一部分：


    ```

    Controlled By:      StatefulSet/master

    ```


    你可以通过运行以下命令获取更多关于我们如何定义`StatefulSet`的信息：


    ```

    kubectl describe StatefulSet master --namespace=mssql-cluster

    ```


    你还会注意到在`master-0` pod 中有另外两个容器：


    ```

    collectd:

    fluentbit:

    ```


    这些容器是 BDC 中每个 pod 的一部分，用于帮助收集管理和监控 BDC 所需的日志和指标。


    我们的文档提供了关于 SQL Server 主实例的信息，位于 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance)。我将在本章后面的“使用大数据集群”一节中更详细地讨论如何使用
    SQL Server 主实例。


    ### 控制器


    控制器是一个逻辑术语，代表一组 pod 和容器。你可以使用以下命令找到控制器中的 pod 列表：


    ```

    kubectl get pods --namespace mssql-cluster -lplane=control

    ```


    以下是我的 BDC 部署中的 pod 列表：


    ```

    NAME              READY   STATUS    RESTARTS   AGE

    control-vjwjf     3/3     Running   0          38h

    controldb-0       2/2     Running   0          38h

    controlwd-l8fmp   1/1     Running   0          38h

    gateway-0         2/2     Running   0          38h

    logsdb-0          1/1     Running   0          38h

    logsui-f42ln      1/1     Running   0          38h

    metricsdb-0       1/1     Running   0          38h

    metricsdc-gtrxn   1/1     Running   0          38h

    metricsui-kwh4q   1/1     Running   0          38h

    mgmtproxy-nc8tl   2/2     Running   0          38h

    ```


    控制器也被称为控制平面，很类似于 Kubernetes 的控制平面概念（[`https://kubernetes.io/docs/concepts/#kubernetes-control-plane`](https://kubernetes.io/docs/concepts/%2523kubernetes-control-plane)）。图
    10-8 展示了 BDC 控制平面组件的特写。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig8_HTML.jpg](img/479130_1_En_10_Fig8_HTML.jpg)


    图 10-8

    BDC 控制平面


    你应该将控制器视为一组用于管理 BDC 的服务。管理的任务之一是部署，控制器用于帮助部署 BDC。一旦`azdata`部署了控制器，控制器就会“接管”并部署
    BDC 的其他组件。控制平面中运行的所有 pod 都使用 k8s 的`ReplicaSet`概念来实现基础高可用性。


    控制器最重要的组件之一是控制器服务（在图 10-8 中也列为控制服务）。控制器服务实际上是 BDC 的 API 服务器。该服务接受 REST API 以执行
    BDC 的所有类型的操作，包括部署、管理、数据虚拟化等。你将使用几种不同的方法与控制器服务交互，包括`azdata`、T-SQL 外部表和 Azure Data
    Studio (ADS)。


    在撰写本文时，尚无关于使用控制器服务特定 API 协议的公开文档。所有 API 都可以通过`azdata`、Azure Data Studio (ADS)和
    T-SQL 语句访问。


    ### 提示


    Azure Data Studio (ADS) 无需`azdata`即可连接并与 BDC 交互。因此，其开源代码中存在与控制器服务交互的 REST API
    示例，位于 [`https://github.com/microsoft/azuredatastudio`](https://github.com/microsoft/azuredatastudio)。虽然你可以在源代码中阅读这些示例，但我不建议你依赖它们，因为我们可能会更改它们。此外，没有方法让你在
    BDC 内安装程序并使用证书获得访问权限。


    控制平面中的其他 pod 实现了支持各种服务连接的代理（proxy）、用于日志记录的 Kibana 和 Elasticsearch、用于指标和监控的 Grafana
    和 InfluxDB，以及一个用于存储 BDC“元数据”的 SQL Server。


    用于存储元数据的 SQL Server 容器是一个普通的 SQL Server 实例，但它是“私有的”。换句话说，你永远不能连接到这个实例。控制器容器使用这个
    SQL Server 来读取管理和健康状况的重要数据，同时也用于 HDFS 查询功能。


    我喜欢弄清楚事物的工作原理，因此我使用以下技术在这个特殊的 SQL Server 容器内运行了一个 Bash shell。托管此容器的 pod 名称为`controldb-0`。


    我使用以下命令运行 Bash shell 并连接到 SQL Server 容器：


    ```

    kubectl exec -it controldb-0 --namespace=mssql-cluster -- /bin/bash

    ```


    这将我连接到 pod 中的第一个容器，即 SQL Server。事实证明，我们基于核心 SQL Server 镜像构建了这个 SQL Server 镜像，其中安装了`sqlcmd`。


    我需要`sa`密码来使用`sqlcmd`，但它不是用于连接到 SQL Server 主实例的`sa`密码。它是一个仅由控制器使用的私有密码。我发现我们将`sa`密码的秘钥存储在容器内的`/var/run/secrets/credentials/mssql-sa-password/password`。使用该密码字符串，我使用`sqlcmd`连接并发现容器中安装了这些数据库：`health_system`、`controller`和`hive_metastore`。这些是
    BDC 内部使用的数据库。这是一个用于内部 BDC 功能的 SQL Server 容器示例，与用于正常 SQL Server 用途以及通过 HDFS 和其他数据源进行数据虚拟化的
    SQL Server 主实例不同。

    '
- fmt: '### Storage Pool


    我在第 [9](#479130_1_En_9_Chapter.xhtml) 章描述了 Polybase 如何允许你访问 SQL Server 之外的数据源，包括
    HDFS 数据。通过 Polybase 访问 HDFS 会将 T-SQL 查询转换为 Java MapReduce 作业来访问 HDFS 数据。


    BDC 为你部署了自己的 HDFS 集群，以便你既可以通过 Polybase 访问 HDFS 数据，也可以通过 **Knox Gateway**（ [`https://knox.apache.org/`](https://knox.apache.org/)
    ）经由 Controller 直接访问。


    图 [10-9](#479130_1_En_10_Chapter.xhtml#Fig9) 更详细地展示了 HDFS 集群在 BDC 中如何作为 *存储池*
    进行部署。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg)

    图 10-9 BDC 存储池


    存储池由一个或多个 k8s Pod 组成。默认情况下，使用 aks-dev-test 配置会部署两个存储池 Pod。如果你使用 `kubectl describe`
    查看存储池中的 Pod，你会看到它们通过标签 `role=storage-pool` 绑定在一起。你可以通过自定义配置指定副本数（Replicas）来扩展更多的存储池
    Pod。


    在我部署在 BDC 上的 Pod 列表中，代表存储池的 Pod 如下：

    ```

    storage-0-0      4/4     Running   0          24h

    storage-0-1      4/4     Running   0          24h

    ```


    存储池 Pod 是它们自己 StatefulSet 的一部分，因此，对于 BDC 配置中的两个副本，你会在一个 StatefulSet 中得到两个 Pod。


    存储池中的每个 Pod 包含四个容器（安装了 collectd 和 fluentbit），其中一个容器用于 **Hadoop** 组件，另一个用于 **SQL
    Server**。运行 YARN 和 HDFS 的容器（容器名称为 Hadoop）承载 Hadoop 组件。YARN 是 Hadoop 组件（包括 Spark
    作业）在集群中运行的资源管理器（你可以在 [`https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html`](https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html)
    阅读更多关于 YARN 的信息）。HDFS 提供 Hadoop 分布式文件系统功能。BDC 还部署了一个 HDFS 名称节点（Name Node）用于存储元数据并控制对
    HDFS 集群的访问。


    YARN 和 HDFS 的部分能力是分布式计算和存储，这意味着当你通过 T-SQL 和 Spark 与存储池交互和使用时，你的计算和存储是内置分布式系统的一部分。


    SQL Server 容器在 BDC 系统中扮演着特殊的角色。注意图 [10-9](#479130_1_En_10_Chapter.xhtml#Fig9)
    中名为“直接从 HDFS 读取”的连接器。这意味着存储池 Pod 中的 SQL Server 容器可以直接从 HDFS 存储读取数据，包括 csv 和 parquet
    等文件类型。你不会直接连接到这些 SQL Server 容器；它们在 BDC 内部使用，以优化对 BDC 集群中 HDFS 文件的访问。Controller
    服务将针对 BDC 中 HDFS 的外部表查询重定向到这些 SQL Server 实例（可能会通过计算池）。


    如果你有自己的 HDFS 系统，可以使用称为 HDFS 分层（HDFS Tiering）的概念将其挂载到存储池中。你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering)
    阅读关于 HDFS 分层的信息。


    ### Compute Pool


    上一节关于存储池的图 [10-9](#479130_1_En_10_Chapter.xhtml#Fig9) 也展示了 *计算池* 的概念。计算池是一个 Pod
    的 StatefulSet，实现了我在第 [9](#479130_1_En_9_Chapter.xhtml) 章讨论的 **Polybase 扩展组**。


    计算池可以通过使用副本数自定义 BDC 部署的配置来扩展。默认情况下，aks-dev-test 配置仅部署一个计算池 Pod（文档也称之为实例）。


    如果存在计算池，所有通过 BDC 的外部表查询都将使用计算池。Controller 将所有针对 BDC 中数据源的外部表查询重定向到计算池。


    在我的 BDC 部署中，计算池由此 Pod 实现，并使用标签 `role=compute-pool`。

    ```

    compute-0-0       3/3     Running   0          43h

    ```


    ### Data Pool


    数据池实现了一个或多个 Pod，用于我在“大数据集群包含什么？”一节中讨论的数据缓存功能。默认情况下，BDC 的 aks-dev-test 配置为数据池部署两个
    Pod。在我的 BDC 部署中，这些 Pod 表示为：

    ```

    data-0-0          3/3     Running   0          43h

    data-0-1          3/3     Running   0          43h

    ```


    数据池由一个或多个使用标签 `role=data-pool` 在 StatefulSet 中的 Pod 组成，每个 Pod 都有一个 SQL Server
    容器。你对数据池中 SQL Server 的访问是通过来自 SQL Server 主实例的 Polybase 外部表进行的。


    当你使用数据池的外部数据源在 SQL Server 主实例中创建外部表时，SQL Server 将在数据池的每个 Pod 中创建一个数据库，其名称与 SQL
    Server 主实例中外部表的范围相同。此外，我们还会创建一个与外部表同名的表。


    这意味着你与数据池的所有交互都是通过 SQL Server 主实例中的外部表进行的。在数据池 Pod 的每个 SQL Server 上，我们将创建一个数据库和表来匹配你的外部表。此外，当你将数据插入数据池时，我们会自动分片或分区数据（不使用
    SQL Server 分区）（默认使用轮询方式），并在每个数据池 Pod 的每个表上构建聚集列存储索引以优化读取访问。这意味着我们的计算池可以跨分片以可扩展的方式访问此数据。数据池无法修改；你只能摄取（INSERT）或查询数据。由于它是一个缓存，这意味着当你需要刷新缓存时，必须删除外部表并重新填充它。Controller
    将特定的外部表请求重定向到数据池中的 SQL Server 实例（可能会通过计算池）。


    ### Application Pool


    应用程序池是基于在 BDC 中创建 *应用程序* 而部署的 Pod 集合。图 [10-10](#479130_1_En_10_Chapter.xhtml#Fig10)
    展示了 BDC 中用于应用程序池的区域。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg)

    图 10-10 BDC 中的应用程序池


    当你使用 BDC 接口通过 YAML 文件创建应用程序时，Controller 服务将动态创建一个包含你的应用程序在容器中运行的 Pod 副本集。目前支持的类型包括
    Python、MLeap 和 SSIS。


    还有另一个代表应用程序代理的 Pod，包括一个负载均衡器，它允许你从 BDC 内部以及通过服务端点从外部世界连接到池中运行的应用程序：

    ```

    appproxy-

    ```


    你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment)
    阅读更多关于 BDC 中应用程序部署架构的信息。'
  raw: '### Storage Pool


    I described in Chapter [9](#479130_1_En_9_Chapter.xhtml) how Polybase allows you
    to access data sources outside of SQL Server, including HDFS data. Polybase access
    to HDFS translates T-SQL queries into Java MapReduce jobs to access the HDFS data.


    BDC deploys its own HDFS cluster for you to access HDFS data both through Polybase
    and also directly using a **Knox Gateway** ( [`https://knox.apache.org/`](https://knox.apache.org/)
    ) through the Controller.


    Figure [10-9](#479130_1_En_10_Chapter.xhtml#Fig9) gives a closer view of how a
    HDFS cluster is deployed in BDC as a *Storage Pool*.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    The BDC Storage Pool


    The Storage Pool is made up of one or more k8s pods. By default, using the aks-dev-test
    configuration, two Storage Pool pods are deployed. If you look at pods in the
    Storage Pool with `kubectl describe`, you will see they are bound together with
    the label `role=storage-pool`. You can scale more Storage Pool pods using custom
    configuration by specifying a Replicas count.


    In my list of pods deployed on BDC, these pods represent the Storage Pool:


    ```

    storage-0-0      4/4     Running   0          24h

    storage-0-1      4/4     Running   0          24h

    ```


    Storage Pool pods are part of their own StatefulSet, so, in the case of two Replicas
    from BDC configuration, you get two pods in a single StatefulSet.


    Each pod in the Storage Pool holds four containers (collectd and fluentbit are
    installed) including a pod for **Hadoop** components and one for **SQL Server**.
    The pod for Hadoop components (the container name is called Hadoop) runs YARN
    and HDFS. YARN is a resource manager for Hadoop components run in the cluster
    including Spark Jobs (you can read more about YARN at [`https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html`](https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html)
    ). HDFS provides Hadoop distributed file system functionality. BDC also deploys
    an HDFS Name Node use to store metadata and control access to the HDFS cluster.


    Part of the capabilities of YARN and HDFS is distributed computing and storage,
    which means when you interact and use the Storage Pool through T-SQL and Spark,
    your compute and storage is part of a built-in distributed system.


    The SQL Server container serves a special purpose in the BDC system. Note the
    connector in Figure [10-9](#479130_1_En_10_Chapter.xhtml#Fig9) that says, “Directly
    Read from HDFS.” This note means that the SQL Server container in the Storage
    Pool pods can read data directly from HDFS storage, including file types like
    csv and parquet. You don’t connect to these SQL Server containers directly; they
    are used internally within BDC to optimize access to HDFS files in the BDC cluster.
    The Controller service redirects external table queries to HDFS in BDC to these
    SQL Server instances (which may be through the Compute Pool).


    If you have your own HDFS system, you can mount this into the Storage Pool using
    a concept called HDFS Tiering. You can read about HDFS Tiering at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering)
    .


    ### Compute Pool


    Figure [10-9](#479130_1_En_10_Chapter.xhtml#Fig9) in the previous section for
    Storage Pool also shows the concept of a *Compute Pool*. The Compute Pool is a
    StatefulSet of pods that implement the **Polybase Scale-Out Group** I discussed
    in Chapter [9](#479130_1_En_9_Chapter.xhtml).


    The Compute Pool can be scaled by customizing the configuration of the BDC deployment
    using the Replicas count. By default, the aks-dev-test configuration only deploys
    one Compute Pool pod (the documentation also calls this instance).


    If the Compute Pool is present, all external table queries through BDC will use
    the Compute Pool. The Controller redirects all external table queries for data
    sources in BDC through the Compute Pool.


    In the case of my BDC deployment, the Compute Pool is implemented by this pod
    and uses the label `role=compute-pool`.


    ```

    compute-0-0       3/3     Running   0          43h

    ```


    ### Data Pool


    The Data Pool implements one or more pods for the data cache functionality I discussed
    in the section “What Comes with Big Data Clusters?” By default, the aks-dev-test
    configuration for BDC deploys two pods for the Data Pool. In my BDC deployment,
    these pods are represented by:


    ```

    data-0-0          3/3     Running   0          43h

    data-0-1          3/3     Running   0          43h

    ```


    The Data Pool consists of one or more pods using the label `role=data-pool` in
    a StatefulSet, each with a SQL Server container. Your access to SQL Server in
    the Data Pool is through Polybase external tables from the SQL Server Master Instance.


    When you create external tables in the SQL Server Master Instance using the external
    data source for the Data Pool, SQL Server will create a database in each pod of
    the Data Pool, with the same name as the scope of the external table in the SQL
    Server Master Instance. Furthermore, we create a table with the same name as the
    external table name.


    This means your interaction with the Data Pool is all through external tables
    in the SQL Server Master Instance. On each SQL Server in pods for the Data Pool,
    we will create a database and table to match your external table. In addition,
    we automatically shard or partition data (not using SQL Server partitions) as
    you insert data into the Data Pool (using round robin by default), and we build
    a clustered columnstore index on each table in each pod of the Data Pool to optimize
    read access. This means our Compute Pool can be used to access this data in a
    scalable fashion across the shards. The Data Pool cannot be modified; you can
    only ingest (INSERT) or query data. Since it is a cache, this means you must drop
    the external table and repopulate it when you are ready to refresh the cache.
    The Controller redirects specific external table requests to the SQL Server instances
    in the Data Pool (which may be through the Compute Pool).


    ### Application Pool


    The Application Pool is a collection of pods deployed based on the creation of
    an **application** in BDC. Figure [10-10](#479130_1_En_10_Chapter.xhtml#Fig10)
    represents the area of BDC for the Application Pool.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    The Application Pool in BDC


    When you use BDC interfaces to create an application with a YAML file, the controller
    service will dynamically create a ReplicaSet of pods with your application running
    in a container. Python, MLeap, and SSIS are the types currently supported.


    There is another pod representing the application proxy, including a load balancer,
    which allows you to connect to the application running in the pool, both from
    within the BDC and from the outside world through a service endpoint:


    ```

    appproxy-

    ```


    You can read more about the Application Deployment architecture in BDC at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment)
    .'
  trans: '

    ### 存储池


    我在第 9 章描述了 Polybase 如何允许你访问 SQL Server 之外的数据源，包括 HDFS 数据。通过 Polybase 访问 HDFS 会将
    T-SQL 查询转换为 Java MapReduce 作业来访问 HDFS 数据。


    BDC 为你部署了自己的 HDFS 集群，以便你既可以通过 Polybase 访问 HDFS 数据，也可以通过 **Knox Gateway**（ [`https://knox.apache.org/`](https://knox.apache.org/)
    ）经由 Controller 直接访问。


    图 10-9 更详细地展示了 HDFS 集群在 BDC 中如何作为 *存储池* 进行部署。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg](img/479130_1_En_10_Fig9_HTML.jpg)

    图 10-9 BDC 存储池


    存储池由一个或多个 k8s Pod 组成。默认情况下，使用 aks-dev-test 配置会部署两个存储池 Pod。如果你使用 `kubectl describe`
    查看存储池中的 Pod，你会看到它们通过标签 `role=storage-pool` 绑定在一起。你可以通过自定义配置指定副本数（Replicas）来扩展更多的存储池
    Pod。


    在我部署在 BDC 上的 Pod 列表中，代表存储池的 Pod 如下：

    ```

    storage-0-0      4/4     Running   0          24h

    storage-0-1      4/4     Running   0          24h

    ```


    存储池 Pod 是它们自己 StatefulSet 的一部分，因此，对于 BDC 配置中的两个副本，你会在一个 StatefulSet 中得到两个 Pod。


    存储池中的每个 Pod 包含四个容器（安装了 collectd 和 fluentbit），其中一个容器用于 **Hadoop** 组件，另一个用于 **SQL
    Server**。运行 YARN 和 HDFS 的容器（容器名称为 Hadoop）承载 Hadoop 组件。YARN 是 Hadoop 组件（包括 Spark
    作业）在集群中运行的资源管理器（你可以在 [`https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html`](https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html)
    阅读更多关于 YARN 的信息）。HDFS 提供 Hadoop 分布式文件系统功能。BDC 还部署了一个 HDFS 名称节点（Name Node）用于存储元数据并控制对
    HDFS 集群的访问。


    YARN 和 HDFS 的部分能力是分布式计算和存储，这意味着当你通过 T-SQL 和 Spark 与存储池交互和使用时，你的计算和存储是内置分布式系统的一部分。


    SQL Server 容器在 BDC 系统中扮演着特殊的角色。注意图 10-9 中名为“直接从 HDFS 读取”的连接器。这意味着存储池 Pod 中的 SQL
    Server 容器可以直接从 HDFS 存储读取数据，包括 csv 和 parquet 等文件类型。你不会直接连接到这些 SQL Server 容器；它们在
    BDC 内部使用，以优化对 BDC 集群中 HDFS 文件的访问。Controller 服务将针对 BDC 中 HDFS 的外部表查询重定向到这些 SQL
    Server 实例（可能会通过计算池）。


    如果你有自己的 HDFS 系统，可以使用称为 HDFS 分层（HDFS Tiering）的概念将其挂载到存储池中。你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering)
    阅读关于 HDFS 分层的信息。


    ### 计算池


    上一节关于存储池的图 10-9 也展示了 *计算池* 的概念。计算池是一个 Pod 的 StatefulSet，实现了我在第 9 章讨论的 **Polybase
    扩展组**。


    计算池可以通过使用副本数自定义 BDC 部署的配置来扩展。默认情况下，aks-dev-test 配置仅部署一个计算池 Pod（文档也称之为实例）。


    如果存在计算池，所有通过 BDC 的外部表查询都将使用计算池。Controller 将所有针对 BDC 中数据源的外部表查询重定向到计算池。


    在我的 BDC 部署中，计算池由此 Pod 实现，并使用标签 `role=compute-pool`。

    ```

    compute-0-0       3/3     Running   0          43h

    ```


    ### 数据池


    数据池实现了一个或多个 Pod，用于我在“大数据集群包含什么？”一节中讨论的数据缓存功能。默认情况下，BDC 的 aks-dev-test 配置为数据池部署两个
    Pod。在我的 BDC 部署中，这些 Pod 表示为：

    ```

    data-0-0          3/3     Running   0          43h

    data-0-1          3/3     Running   0          43h

    ```


    数据池由一个或多个使用标签 `role=data-pool` 在 StatefulSet 中的 Pod 组成，每个 Pod 都有一个 SQL Server
    容器。你对数据池中 SQL Server 的访问是通过来自 SQL Server 主实例的 Polybase 外部表进行的。


    当你使用数据池的外部数据源在 SQL Server 主实例中创建外部表时，SQL Server 将在数据池的每个 Pod 中创建一个数据库，其名称与 SQL
    Server 主实例中外部表的范围相同。此外，我们还会创建一个与外部表同名的表。


    这意味着你与数据池的所有交互都是通过 SQL Server 主实例中的外部表进行的。在数据池 Pod 的每个 SQL Server 上，我们将创建一个数据库和表来匹配你的外部表。此外，当你将数据插入数据池时，我们会自动分片或分区数据（不使用
    SQL Server 分区）（默认使用轮询方式），并在每个数据池 Pod 的每个表上构建聚集列存储索引以优化读取访问。这意味着我们的计算池可以跨分片以可扩展的方式访问此数据。数据池无法修改；你只能摄取（INSERT）或查询数据。由于它是一个缓存，这意味着当你需要刷新缓存时，必须删除外部表并重新填充它。Controller
    将特定的外部表请求重定向到数据池中的 SQL Server 实例（可能会通过计算池）。


    ### 应用程序池


    应用程序池是基于在 BDC 中创建 *应用程序* 而部署的 Pod 集合。图 10-10 展示了 BDC 中用于应用程序池的区域。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg](img/479130_1_En_10_Fig10_HTML.jpg)

    图 10-10 BDC 中的应用程序池


    当你使用 BDC 接口通过 YAML 文件创建应用程序时，Controller 服务将动态创建一个包含你的应用程序在容器中运行的 Pod 副本集。目前支持的类型包括
    Python、MLeap 和 SSIS。


    还有另一个代表应用程序代理的 Pod，包括一个负载均衡器，它允许你从 BDC 内部以及通过服务端点从外部世界连接到池中运行的应用程序：

    ```

    appproxy-

    ```


    你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment)
    阅读更多关于 BDC 中应用程序部署架构的信息。

    '
- fmt: '## Using Big Data Clusters


    In this section, I''ll review various use cases for Big Data Clusters (BDC). One
    of the first things you will want to do is `log in to BDC` using `azdata`. Technically,
    you do not have to log in to access some resources in BDC, but using `azdata`
    to log in gives you context to access all the service endpoints in a simple fashion.


    In order to log in to BDC, you need the controller service endpoint, which is
    the LoadBalancer IP address and port for the controller service pod. On my AKS
    deployment, I was able to get the controller service endpoint by using the following
    command:


    ```bash

    kubectl get svc controller-svc-external -n mssql-cluster

    ```


    I can now give the `azdata` tool the proper context to use in various scenarios
    using the following command:


    ```bash

    azdata login --controller-endpoint https://:30080 --controller-username admin

    ```


    I was prompted for my password (this is the password I provided when prompted
    by the python script in the section titled “The BDC Deployment Experience”). When
    the login was successful, I saw the following message:


    ```

    Logged in successfully to `https://:30080`

    ```


    With this context, I can use `azdata` for many purposes. The first thing I want
    to do is to get a list of other service endpoints to use BDC. I''ll use this command
    to retrieve those endpoints:


    ```bash

    azdata bdc endpoint list -o table

    ```


    My list looked like the following:


    ```

    Protocol

    ------------------------------------------------------  ----------------------------------------------------  -----------------  -------

    Gateway to access HDFS files, Spark                     https://:30443                              gateway            https

    Spark Jobs Management and Monitoring Dashboard          https://:30443/gateway/default/sparkhistory  spark-history      https

    Spark Diagnostics and Monitoring Dashboard              https://:30443/gateway/default/yarn          yarn-ui            https

    Application Proxy                                       https://:30778                         app-proxy          https

    Management Proxy                                        https://:30777                              mgmtproxy          https

    Log Search Dashboard                                    https://:30777/grafana                       metricsui          https

    Cluster Management Service                              https://:30080                         controller         https

    SQL Server Master Instance Front-End                    ,31433                              sql-server-master  tds

    HDFS File System Proxy                                  https://:30443/gateway/default/webhdfs/v1    webhdfs            https

    Proxy for running Spark statements, jobs, applications  https://:30443/gateway/default/livy/v1       livy               https

    ```


    I substituted in some names to represent the actual IP address on my cluster:


    *   `<knox-ip>` – This is the IP address of the Knox Gateway which, as you can
    see in this list, is used for multiple purposes. The Knox Gateway is used to access
    HDFS files (`webhdfs`), run Spark Jobs (`livy`), view Spark Job History (`spark-history`),
    and monitor Spark Jobs (`yarn-ui`).


    *   `<appproxy-ip>` – This is the IP address used to connect to applications deployed
    in BDC.


    *   `<sql-ip>` – This is the IP address to connect to the SQL Server Master Instance.


    *   `<cluster-ip>` – This is the IP address for the controller service.


    You can also get all the endpoint IP address and ports using `kubectl`, but only
    `azdata` gives you specific details like how to access `webhdfs` and `livy`.


    Azure Data Studio (ADS) now offers a BDC management experience including the ability
    to see a list of endpoints.


    Figure 10-11 shows an example of BDC endpoints using ADS.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    BDC endpoints in Azure Data Studio


    The documentation at [https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security),
    which is also shown in Figure 10-12, shows the common BDC endpoints.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Common BDC endpoints


    ### Using Data Virtualization


    One important usage of BDC is to access data from external data sources using
    Polybase, as I''ve described in Chapter 9.


    Polybase with BDC provides the same functionality as Polybase for Linux, including
    built-in connectors for SQL Server, Oracle, Teradata, MongoDB, and HDFS.


    BDC provides a twist to this functionality through two additional built-in connectors
    unique to BDC:


    *   `sqlhdfs` – This connector allows you to access HDFS data within the Storage
    Pool.


    *   `sqldatapool` – This connector allows you to access data specifically stored
    in the Data Pool.


    Here are example T-SQL scripts to create external data sources within your database
    to access these built-in connectors:


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    ```


    Notice the URI for the `LOCATION` is a specific location for the controller service.
    The controller service directs requests for external tables based on these sources
    to the respective pool through the Compute Pool if it is deployed.


    Our documentation has an example on how to use an external table with BDC to access
    Oracle data at [https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization).
    You will need an Oracle instance to use this example. You can also use examples
    I''ve provided in Chapter 9 from the `ch9_data_virtualization\sqldatahub` folder.'
