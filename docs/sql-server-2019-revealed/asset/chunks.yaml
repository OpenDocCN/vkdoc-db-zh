    .


    In addition, as I described in the previous section, the source code and documentation
    for how to write a language extension will be available on GitHub at [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)
    .


    It will be interesting to see how language extensions take off within the SQL
    Server community. For you, imagine scenarios where you cannot implement something
    in T-SQL today, but would like to extend the language and take advantage of all
    the capabilities of SQL Server including security, availability, and resource
    governance without having to write code outside of T-SQL.


    All of the process isolation, security, and governance capabilities that exist
    for SQL Server ML Services apply language extensions and the extensibility framework.


    ## Summary


    In this chapter, you have learned how SQL Server 2019 provides features and tools
    for the modern data developer, including support for just about any programming
    language you need, updated data providers, graph database, UTF-8 support, Machine
    Learning, and T-SQL extensions. This is combined with the already powerful performance
    capabilities of Intelligent Query Processing and tempdb metadata optimizations
    to provide a complete package needed by any modern data developer.


    # 6. SQL Server 2019 on Linux


    In this chapter, I’ll describe what is new for SQL Server 2019 on Linux. However,
    if you are new to SQL Server on Linux, I’ll start the chapter by reviewing the
    amazing story of how and why we built SQL Server to run on Linux.


    ## The Amazing Story of SQL Server on Linux


    In October of 2017, our SQL Server engineering team rocked the industry by shipping
    SQL Server for Linux on platforms such as Red Hat, Ubuntu, and SUSE. Our engineering
    team was able to bring SQL Server to market using a very innovative strategy and
    architecture with software known as the SQL Platform Abstraction Layer (SQLPAL).


    Figure [6-1](#479130_1_En_6_Chapter.xhtml#Fig1) shows the fundamental architecture
    of SQL Server on Linux with SQLPAL.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    The SQL Server Linux architecture


    I go into a very deep detail of this architecture in my book *Pro SQL Server on
    Linux* by Apress Media, so I won’t repeat that in this book (I know; shameless
    plug for a different book). However, I include this figure and a brief discussion
    because it tells the story of **choice with compatibility**. The SQL Server core
    engine and its code are the same codebase for SQL Server on Windows and Linux.
    The SQLPAL provides the software so that the SQL Server engine doesn’t care on
    what OS platform it is running. This means you can take a database backup on SQL
    Server on Windows and restore it on Linux with complete compatibility.


    For the most part, the feature set of SQL Server 2017 on Linux was completely
    the same as on Windows. Slava Oks once told me, “Bob, the Query Processor is…
    the Query Processor, whether it is on Windows or Linux.” What he means is that
    the exact same binary code for the Query Processor runs on both Windows and Linux.
    Even features like SQL Server Agent and SSIS are available for SQL Server on Linux.


    We “timebox” almost every release of SQL Server, trying to maximize the value
    of what we put into a major release with the balance of getting it shipped in
    the timeframe we need it to go to market.


    While we would have loved that every feature of SQL Server on Windows was included
    in SQL Server 2017 on Linux, there were some features on the *edge of the engine*
    that we didn’t have time to put into the release – features like Replication and
    Distributed Transaction Coordinator (DTC) . Furthermore, there were a few platform
    enhancements that we made to ensure SQL Server on Linux was as robust and ready
    for enterprise customers as our software on Windows.


    Before I go deeper into this subject, I should come clean and tell you that there
    are no examples in this chapter. You might be reading this and be stunned, given
    I wrote an entire book on SQL Server on Linux. Most of the contents of this chapter
    either require some complex configuration or are part of using SQL Server independent
    of Linux. Having said that, consider these options for SQL Server examples and
    demos:


    *   ***Pro SQL Server on Linux*** **GitHub repo** – [`https://github.com/Apress/pro-sql-server-on-linux`](https://github.com/Apress/pro-sql-server-on-linux)


    *   **Demos and examples on the bobsql GitHub repo** – [`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql)


    *   **Microsoft hands-on lab for SQL Server on Linux** – [`https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/`](https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/)


    *   **The SQL Server Workshop site** – [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops)
    . While I don’t have a specific workshop there yet for SQL Server on Linux, don’t
    be surprised if one shows up at some point. There are labs to use SQL Server on
    Linux Replication with containers in these workshops.


    *   Finally, I will let you try out SQL Server Replication on Linux in action
    in Chapter [7](#479130_1_En_7_Chapter.xhtml), using containers.'
  trans: '### 实现和使用其他语言


    由于我们构建了扩展框架和外部语言的概念，现在除了 Java 之外的编程语言也可以与`T-SQL`一起使用。Java 只是我们提供给你的一个“开箱即用”的扩展示例，同时也展示了如何集成其他编程语言。想象一下，如果`.Net`或`Go`也能有外部语言可用会怎样。


    关键在于语言扩展。语言扩展是一个`DLL`文件（在`Windows`上）或一个共享库对象（在`Linux`上），它理解如何与`扩展主机`通信。一旦有了可用的语言扩展，就可以用该扩展的原生语言构建一套`SDK`类。你的代码将使用`SDK`实现的类，以及通过调用`sp_execute_external_script`来执行的类。


    通过 Java 示例[`https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server`](https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server)展示了为使语言扩展可用所需的`SDK`类集。


    此外，正如我在上一节中描述的，关于如何编写语言扩展的源代码和文档将在`GitHub`上提供，网址是 [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)。


    观察语言扩展在`SQL Server`社区内如何发展将会很有趣。对你而言，可以想象一下那些目前无法用`T-SQL`实现，但希望通过扩展语言并利用`SQL Server`所有功能（包括安全性、可用性和资源治理），而无需在`T-SQL`之外编写代码的场景。


    适用于`SQL Server ML Services`的所有进程隔离、安全性和治理能力都同样适用于语言扩展和扩展框架。


    ## 总结


    在本章中，你已经了解到`SQL Server 2019`如何为现代数据开发人员提供特性和工具，包括支持几乎所有你需要的编程语言、更新的数据提供程序、图形数据库、`UTF-8`支持、`机器学习`和`T-SQL`扩展。这些与已有的强大功能，如`智能查询处理`和`tempdb`元数据优化相结合，为任何现代数据开发人员提供了所需的完整工具包。


    # 6. SQL Server 2019 on Linux


    在本章中，我将介绍`SQL Server 2019`在`Linux`上的新特性。然而，如果你是`SQL Server` on `Linux`的新手，我将先回顾一下我们为何以及如何将`SQL
    Server`构建到`Linux`上运行这一非凡故事，以此作为本章的开始。


    ## SQL Server on Linux 的非凡故事


    2017 年 10 月，我们的`SQL Server`工程团队通过在`Red Hat`、`Ubuntu`和`SUSE`等平台上发布`Linux`版的`SQL
    Server`，震撼了业界。我们的工程团队能够采用一种非常创新的策略和架构，利用一种名为`SQL 平台抽象层` (`SQLPAL`)的软件，将`SQL Server`推向市场。


    图 6-1 展示了基于`SQLPAL`的`SQL Server` on `Linux`的基础架构。


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg](img/479130_1_En_6_Fig1_HTML.jpg)


    图 6-1

    `SQL Server` `Linux` 架构


    我在`Apress Media`出版的`Pro SQL Server on Linux`一书中对此架构进行了非常深入的探讨，因此我不会在本书中重复（我知道；这是对另一本书的无耻推销）。然而，我包含此图并进行简要讨论，是因为它讲述了`兼容性带来的选择`这一故事。`SQL
    Server`核心引擎及其代码在`Windows`和`Linux`上是相同的代码库。`SQLPAL`提供了软件，使得`SQL Server`引擎不关心它运行在哪个`OS`平台上。这意味着你可以在`Windows`的`SQL
    Server`上获取数据库备份，然后完全兼容地在`Linux`上还原它。


    在很大程度上，`SQL Server 2017`在`Linux`上的功能集与`Windows`上的完全相同。Slava Oks 曾告诉我，“Bob，`查询处理器`就是…`查询处理器`，无论是在`Windows`还是`Linux`上。”他的意思是，`查询处理器`的相同二进制代码在`Windows`和`Linux`上都能运行。甚至像`SQL
    Server Agent`和`SSIS`这样的功能在`Linux`版的`SQL Server`中也是可用的。


    我们为`SQL Server`的几乎每个版本都设置了“时间盒”，试图在我们需要它上市的时间框架内，最大化放入一个主要版本中的价值，并取得平衡。


    虽然我们本希望将`Windows`版`SQL Server`的所有功能都包含在`Linux`版的`SQL Server 2017`中，但有一些“引擎边缘”的功能我们没有时间放入该版本中——比如`复制`和`分布式事务协调器`(`DTC`)。此外，我们还进行了一些平台增强，以确保`Linux`上的`SQL
    Server`与`Windows`上的软件一样稳健，为企业客户做好准备。


    在我深入探讨这个主题之前，我应该坦诚地告诉你，本章没有示例。你可能会读到这里并感到震惊，毕竟我写了一整本关于`Linux`上的`SQL Server`的书。本章的大部分内容要么需要一些复杂的配置，要么是独立于`Linux`使用`SQL
    Server`的一部分。话虽如此，请考虑以下关于`SQL Server`示例和演示的选项：


    - `Pro SQL Server on Linux` `GitHub` 仓库 – [`https://github.com/Apress/pro-sql-server-on-linux`](https://github.com/Apress/pro-sql-server-on-linux)

    - `bobsql` `GitHub` 仓库上的演示和示例 – [`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql)

    - `Microsoft`关于`Linux`上`SQL Server`的动手实验 – [`https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/`](https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/)

    - `SQL Server Workshop` 网站 – [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops)。虽然我还没有在上面开设专门针对`Linux`上`SQL
    Server`的研讨会，但如果它将来某天出现，请不要惊讶。在这些研讨会中有使用容器进行`Linux`上`SQL Server` `复制`的实验。

    - 最后，在第 7 章中，我将让你使用容器亲身体验`Linux`上的`SQL Server` `复制`。'
- fmt: '## What Is New for SQL Server 2019 on Linux


    Taking the momentum of delivering SQL Server on Linux, in SQL Server 2019 we added
    several enhancements to solve challenges for the data professional and bring feature
    parity with SQL Server on Windows, including:


    *   Platform and deployment enhancements to ensure SQL Server on Linux responds
    correctly to current resource availability and to include deployment options for
    parity with SQL Server on Windows. In addition, we have worked to ensure we support
    the most up-to-date version of Linux distributions, which includes enhancements
    for Linux I/O influenced by the SQL Server engineering team.


    *   I/O Accelerated Performance with Persistent Memory Support to keep up with
    advancements in hardware technology.


    *   SQL Server Replication is now supported on Linux to provide data synchronization
    capabilities – this has been a popular SQL Server feature for years.


    *   Change Data Capture (CDC) provides a method for developers and data professionals
    to track changes to structure and data from SQL Server tables. This has been a
    popular feature on SQL Server on Windows for many releases and is now available
    on Linux.


    *   Ensure Distributed Transactions are supported so developers have options to
    write distributed data applications as they have for years on SQL Server on Windows.


    *   Simplified Active Directory deployment using OpenLDAP providers.


    *   Support SQL Server Machine Learning Services and Extensibility on Linux to
    enable new application scenarios, bring Machine Learning models close to the data
    in a secure and scalable fashion, and extend the T-SQL language.


    *   Bring Data Virtualization to SQL Server on Linux by supporting Polybase queries
    to external data sources, with no data movement, such as Hadoop, SQL Server, Oracle,
    Teradata, and MongoDB.


    I’ll devote a major section in the rest of this chapter to each of these enhancements.


    ## Platform and Deployment Enhancements


    For SQL Server 2019, we made enhancements to the core engine and `SQLPAL` to make
    sure SQL Server was “enterprise ready” as it has been on Windows. In addition,
    we invested in deployment improvements to support new packages for new capabilities
    and provide users with similar functionality as setup on Windows. We also want
    to make sure SQL Server on Linux is supported on the latest Linux releases, such
    as Red Hat Enterprise Linux 8.0, Ubuntu 18.04, and SUSE Linux Enterprise Server
    15. These new Linux releases include enhancements to the Linux kernel for I/O
    performance with durability which was influenced by the importance of I/O in SQL
    Server.


    ### Platform Enhancements


    While it is completely true that the core SQL Server engine on Linux is the same
    codebase as SQL Server on Windows, the `SQLPAL` (and a component called the Host
    Extension) is designed to allow SQL Server to interact with the Linux kernel when
    necessary. We discovered after we shipped SQL Server on Linux that a few areas
    needed to be enhanced to ensure our database platform behaved in the same fashion
    as SQL Server on Windows. Because these were core database engine capabilities
    integrated with the operating system, we backported these changes to SQL Server
    2017 – if you install the latest Cumulative Update for SQL Server 2017, you will
    have these changes.


    #### Memory Notifications


    The SQL Server memory management system has always been built to be resilient
    and responsive to both memory needs within SQL Server and demands outside the
    engine in the overall operating system environment.


    While the core engine of SQL Server is the same as on Windows, concepts such as
    responding to memory pressure are specific to the operating system. We discovered
    some issues with the concept of “memory notifications” in SQL Server 2017 on Linux
    and have enhanced our Linux integration to ensure this works as it does on Windows
    in SQL Server 2019.


    ### Note


    We also made changes in the latest Cumulative Update to ensure these enhancements
    are also in SQL Server 2017 on Linux.


    Our enhancement will ensure our “target,” which is the ceiling of memory allocations
    for SQL Server, and will be adjusted if there is memory pressure from the operating
    system. In other words, if the overall operating system is low on physical memory,
    SQL Server will adjust the “target” down to attempt to avoid OS memory swaps or
    the dreaded “OOMKiller” scenario (you can read more about oomkiller at `https://unix.stackexchange.com/questions/153585/how-does-the-oom-killer-decide-which-process-to-kill-first`).


    The way to see the SQL Server target memory get adjusted with memory pressure
    (i.e., low physical memory) is to monitor the `committed_target_kb` column in
    the `dm_os_sys_info` Dynamic Management View (DMV).


    #### Ring Buffer Dynamic Management Views


    SQL Server has a DMV called `dm_os_ring_buffers` that can be used to track CPU
    utilization for the server and `SQLSERVR.EXE` process. This DMV is not supported
    officially, but it is used for one key monitoring tool, the Performance Dashboard
    in SQL Server Management Studio (SSMS). You can read more about how to use the
    Performance Dashboard at `https://docs.microsoft.com/en-us/sql/relational-databases/performance/performance-dashboard`.


    One of the nice features of the dashboard is to show the overall CPU utilization
    of the computer and `SQLSERVR.EXE` (even over the last hour of time) to help narrow
    down CPU issues specific to SQL Server. This report relies on data from `dm_os_ring_buffers`.
    The problem is that, on Linux, we always reported CPU usage as 100% fixed, so
    the report would not show correct data. With SQL Server 2019 (and the latest CU
    on SQL Server 2017), this DMV reports the correct usage, and now the Performance
    Dashboard can be used against a SQL Server on Linux.'
