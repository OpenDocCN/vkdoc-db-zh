    \ both when he worked in Microsoft SQL Server engineering and in his long career\
    \ as the CEO of SQLskills along with his wife, Kimberly Tripp. Paul and I both\
    \ have reputations for internals knowledge, and examining the internals of database\
    \ pages (sometimes called “page cracking”) is an important skill to have. Both\
    \ of us have for years used the undocumented and unsupported DBCC PAGE command\
    \ to “hack” a database page. With SQL Server 2019 comes a pair of system objects\
    \ to help examine the header of a database page:\n\n**dm_db_page_info** – This\
    \ is a system function to return a page header as a one-row result of columns\
    \ for each field in the page header. You can read about this system function at\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql)\
    \ .\n\nThe required input for this function is information to identify a page,\
    \ which is the **database id, file id, and page number**. There are some scenarios\
    \ where the identifier for a page shows up in the result of column like from a\
    \ DMV. One example is the **wait_resource** of dm_exec_requests. A page identifier\
    \ from wait_resource is in the form of a *page resource string* which is <dbid>:<fileid>:<pageid>.\
    \ The system function **fn_PageResCracker** takes a page resource string as input\
    \ and returns a db_id, file_id, and page_id result.\n\nTherefore, you can run\
    \ a T-SQL statement like this:\n\n```\n    SELECT page_info.∗\n    FROM sys.dm_exec_requests\
    \ AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r\n    CROSS\
    \ APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,'DETAILED')\n    AS\
    \ page_info;\n    ```\n\nThis will extract page header details from a page resource.\
    \ For a concurrency scenario like a page latch wait, this technique can be useful\
    \ to find out what object belongs to the page for the latch wait.\n\nIf you go\
    \ back to Chapter [2](#479130_1_En_2_Chapter.xhtml), you will find I provided\
    \ you an example to use this technique to see which table was involved in tempdb\
    \ page latch waits:\n\n```\n    USE tempdb\n    GO\n    SELECT object_name(page_info.object_id),\
    \ page_info.∗\n    FROM sys.dm_exec_requests AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource)\
    \ AS r\n    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,'DETAILED')\n\
    \    AS page_info\n    GO\n    ```\n\nPam Lahoud also wrote a very nice blog post\
    \ on this small but important engine enhancement, which you can read at [`https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/`](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/)\
    \ .\n\n*   **Diagnostics on statistics**\n\nStatistics are a very important part\
    \ of query performance. Statistics can be updated using a synchronous or asynchronous\
    \ method, where synchronous means that the query must wait for the stats to be\
    \ updated, and asynchronous means the query can continue, but the statistics will\
    \ be updated in the background. Synchronous statistics updates can, in some cases,\
    \ cause a SELECT statement to take longer than normal. SQL Server 2019 provides\
    \ some diagnostics to give you granular information on waiting for synchronous\
    \ statistics updates:\n\n**WAIT_ON_SYNC_STATISTICS_REFRESH** – This is a new `wait_type`\
    \ found in **dm_os_wait_stats**. It shows the accumulated instance-level time\
    \ spent on synchronous statistics refresh operations.\n\n**dm_exec_requests** –\
    \ The `command` column of sys.dm_exec_requests will show the value of `SELECT\
    \ (STATMAN)` if a query is waiting for a synchronous statistics update operation\
    \ to complete prior to continuing query execution.\n\n*   **Query Store enhancements**\n\
    \nQuery Store is an important capability for performance tuning, benchmarking,\
    \ and troubleshooting. In Chapter [2](#479130_1_En_2_Chapter.xhtml), I showed\
    \ some examples of using the Query Store to compare differences in query performance\
    \ with Intelligent Query Processing.\n\nThe capabilities of Query Store have been\
    \ enhanced to include the following:\n\n**Forcing fast-forward and static cursors** –\
    \ Query Store now supports forcing plans that include fast-forward and static\
    \ cursors.\n\n**Custom capture policy for the Query Store** – Some customers have\
    \ had issues using Query Store with certain types of workloads. In SQL Server\
    \ 2019, we have added more parameters to help with granular control over what\
    \ is captured by the Query Store. You can find these new options explained using\
    \ the QUERY_CAPTURE_POLICY in the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options)\
    \ . What better way to interpret how to use the options than from the SQL Server\
    \ community. There may be no one I know who is more passionate about Query Store\
    \ than Erin Stellato, and she has an excellent blog talking about these new options\
    \ at [`www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/`](https://www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/)\
    \ .\n\n*   **Plan cache granular control**\n\nThere are some cases where you want\
    \ to manually clear a query or procedure from plan cache. One scenario might be\
    \ to force a query to be recompiled. You can use the ALTER DATABASE SCOPED CONFIGURATION\
    \ option CLEAR PROCEDURE_CACHE to clear plan cache for all queries and objects\
    \ related to a database. Starting in SQL Server 2019, you can clear a plan cache\
    \ using this statement based on a *plan_handle*. You can find a plan_handle using\
    \ a DMV like dm_exec_query_stats.\n\n*   **DBCC CLONEDATABASE enhancements**\n\
    \nDBCC CLONEDATABASE can be used for troubleshooting purposes to collect the schema\
    \ and statistics from a database, but without user data, into a new database.\
    \ This can allow you to investigate the estimated query plan for a database without\
    \ having to copy all of the actual data.\n\nSQL Server 2019 enhances DBCC CLONEDATABASE\
    \ by collecting statistics for columnstore indexes, which you can read more about\
    \ at [`https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql)\
    \ .\n\n### Tip\n\nSince DBCC CLONEDATABASE captures all data in system tables\
    \ (i.e., the metadata), this includes data for the Query Store. This means you\
    \ can examine Query Store performance data offline from the main user database."
