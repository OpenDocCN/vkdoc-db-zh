- fmt: "## Building Each Container\n\nLet’s look at what is in each directory provided\
    \ in the example to build and run the containers for replication. I call the scenario\
    \ of using these files the \"Vin Yu method\" to build a SQL Server custom container\
    \ image as a tribute to my colleague Vin Yu who taught me how to do this.\n\n\
    Each directory contains the following files:\n\n`Dockerfile` – Contains the definition\
    \ of how to build the custom image based on the SQL Server container image.\n\n\
    `entrypoint.sh` – This becomes the main program to run for the container. It launches\
    \ a script called `db-init.sh` and the `sqlservr` program.\n\n`db-init.sh` – This\
    \ script is called by `entrypoint.sh` and will pause for a period of time and\
    \ then execute the `db-init.sql` script.\n\n`db-init.sql` – This contains T-SQL\
    \ code to create the publisher, distributor, subscriber, and the snapshot publication\
    \ on `db1`. It will create the subscriber database for `db2`. Effectively what\
    \ Vin did was script out what SQL Server Management Studio builds to set up replication\
    \ and save it to execute with T-SQL in a clever way.\n\nIf you look at the `Dockerfile`\
    \ for `db1` and `db2`, it looks like this:\n\n```dockerfile\nFROM mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    COPY . /\nRUN chmod +x /db-init.sh\nCMD /bin/bash ./entrypoint.sh\n```\n\nWhen\
    \ `docker-compose` executes the \"build\" phase for each container, the definition\
    \ of the `Dockerfile` says to:\n\n*   Use the latest SQL Server RHEL container\
    \ image as the base (which uses the RHEL OS image as its base).\n*   Copy the\
    \ `entrypoint.sh`, `db-init.sh`, and `db-init.sql` scripts into the file system\
    \ of the container image.\n*   Modify the `db-init.sh` script so it is an executable\
    \ script (you don’t need to do this for the `entrypoint.sh` script).\n*   Make\
    \ the default program to run the Bash shell executing the `entrypoint.sh` script.\n\
    \nNow let’s look at the `entrypoint.sh` script:\n\n```bash\n#start SQL Server,\
    \ start the script to create/setup the DB\n#You need a non-terminating process\
    \ to keep the container alive.\n#In a series of commands separated by single ampersands\
    \ the commands to the left of the right-most ampersand are run in the background.\n\
    #So - if you are executing a series of commands simultaneously using single ampersands,\
    \ the command at the right-most position needs to be non-terminating\n/db-init.sh\
    \ & /opt/mssql/bin/sqlservr\n```\n\nThis script will execute the `db-init.sh`\
    \ script first and while it executes start the `sqlservr` program (that is what\
    \ the `&` symbol means, start one program and then run the next one).\n\n`db-init.sh`\
    \ for `db1` looks like this:\n\n```bash\n#wait for the SQL Server to come up\n\
    sleep 45s\nmkdir /var/opt/mssql/ReplData/\nchown mssql /var/opt/mssql/ReplData/\n\
    chgrp mssql /var/opt/mssql/ReplData/\necho \"running set up script\"\n#run the\
    \ setup script to create the DB and the schema in the DB\n/opt/mssql-tools/bin/sqlcmd\
    \ -S localhost -U sa -P MssqlPass123 -d master -i db-init.sql\n```\n\nSince `db-init.sh`\
    \ starts first, it must wait for SQL Server to start before executing any T-SQL\
    \ scripts.\n\nThen it creates some directories required to store snapshots for\
    \ replication in the containers’ writeable layer.\n\nFinally, this script executes\
    \ the `db-init.sql` T-SQL script using `sqlcmd` which exists in every SQL Server\
    \ container.\n\n`db-init.sql` for `db1` is quite long but effectively contains\
    \ the T-SQL code to set up a publisher, distributor, subscriber, and snapshot\
    \ publication.\n\n`db-init.sh` for `db2` will also pause for its SQL Server to\
    \ start and then execute the `db-init.sql` script in its directory. `db-init.sql`\
    \ for `db2` only needs to create the database to hold the data for the subscriber.\n\
    \nIt is quite an interesting method to customize a SQL Server container. This\
    \ same method can be used to customize a SQL Server container to create a database\
    \ and run your own T-SQL scripts. In the long term, we want a better method to\
    \ achieve this type of goal so that you don’t have to manually \"sleep\" in a\
    \ shell script to execute custom code. For now, this method works quite well.\n\
    \n## Running the Containers for Replication\n\nTry it for yourself with one of\
    \ two methods:\n\n*   Run the following command (preface with `sudo` on Linux).\
    \ You must be in the `ch7_inside_sql_containers\\sqlrepl` directory to run this.\n\
    \    ```\n    docker-compose up\n    ```\n    If you use this option, the containers\
    \ are not started in the background so you will see a dump of information to the\
    \ console including SQL Server ERRORLOG files. DO NOT hit `<ctrl>+<c>` at this\
    \ point or you will shut down the containers.\n\n*   If you have the Docker extension\
    \ installed, you can right-click the `docker-compose.yml` file and select \"Compose\
    \ Up\". This method run the containers in the background.\n\n## Note\n\nOn some\
    \ Windows 10 systems, I have seen the following pop-up in Figure 7-6 for the Windows\
    \ Defender Firewall for a service that is required for networking for Docker.\
    \ If you see this, click \"Allow Access\".\n\n![Figure 7-6](images/479130_1_En_7_Chapter/479130_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nWindows Firewall warning for Docker\n\nTo ensure your containers\
    \ deployed correctly and SQL Server Replication is running, first check to see\
    \ if the subscriber has the data replicated. Use Azure Data Studio or SQL Server\
    \ Management Studio (SSMS) to connect to `localhost,2600` and see if the `[Sales].[dbo].[customer]`\
    \ table has data. It should have three rows.\n\nAlso, you can verify the snapshot\
    \ agent job was applied successfully by using SSMS connecting to the subscriber.\
    \ Use Object Explorer like in Figure 7-7 to check the snapshot job status.\n\n\
    ![Figure 7-7](images/479130_1_En_7_Chapter/479130_1_En_7_Fig7_HTML.jpg)\n\nFigure\
    \ 7-7\n\nSnapshot job for a SQL Server Replication container\n\nWhen Vin first\
    \ showed me this, I had to stop and think about this method. I’ve worked on a\
    \ complex system like Replication since it was first invented in SQL Server 6.0.\
    \ I never thought I would see a way to deploy it so easily. Of course, SQL Server\
    \ Replication can be more complex so using containers for your scenario could\
    \ involve more. But look at the promise of what containers can provide for a distributed\
    \ system like SQL Server Replication.\n\n*   If you ran `docker-compose up` from\
    \ the command line, hit `Ctrl+C` which will stop the containers.\n*   You will\
    \ want to clean up resources, so when you are done, run the following command\
    \ (preface with `sudo` on Linux). You must be in the `ch7_inside_sql_containers\\\
    sqlrepl` directory to run this.\n    ```\n    docker-compose down\n    ```\n \
    \   This will stop and remove the running containers.\n    This will not remove\
    \ the docker custom images, so to clean up all resources, use the `cleanup.ps1`\
    \ or `cleanup.sh` script to remove the customized images.\n\n## Deploying SQL\
    \ Containers in Production\n\nI’ve been presenting and talking about containers\
    \ ever since we started supporting them with SQL Server 2017. As I’ve presented\
    \ this topic even with the story about how containers are really just the `sqlservr`\
    \ program running in a unique way, I’ve faced some skepticism that SQL Server\
    \ containers can be used for a production workload. I hope I’ll convince some\
    \ of the skeptics with information in this section about performance, security,\
    \ availability, resource control, and server configuration related to SQL Server\
    \ containers."
