- fmt: "### The Challenge of Long Active Transactions\n\nLong-running transactions\
    \ can cause **recovery to “run out of control”** (effectively take a very long\
    \ time that you can’t predict) and affect application availability to data. This\
    \ isn’t some type of bug or problem with the SQL Server engine; it is doing exactly\
    \ as it is told by the application. SQL Server can’t prevent an application from\
    \ running a large number of modifications within a transaction or a transaction\
    \ that makes few modifications but does not commit or roll back for long periods\
    \ of time. That is the classic definition of a *long-running transaction*.\n\n\
    In addition, rolling back a long transaction requires something called *compensation*\
    \ operations. Rollback requires logical undo. A DELETE of 1 million rows requires\
    \ 1 million DELETE log records. A rollback of this delete transaction would require\
    \ SQL Server to undo all the deletes and also log 1 million INSERT log records.\
    \ This **slows down the time it takes to roll back a transaction**. I’ve often\
    \ seen customers try to KILL a session with a long-running active transaction\
    \ and wonder why the KILL doesn’t have immediate effect. It is usually because\
    \ the transaction must be rolled back before the session can be safely terminated\
    \ (or you would have data inconsistency).\n\nAnother consequence of a long-running\
    \ transaction is its impact on **transaction log truncation**. The transaction\
    \ log can only be truncated up to the oldest active transaction. You can’t remove\
    \ transaction log records for a transaction that is still not committed or rolled\
    \ back. But since the transaction log is serial, a single “old” active transaction\
    \ (and it may not have any activity associated with it) can hold up the truncation\
    \ of the transaction log for every other transaction after it. This means to you\
    \ the appearance of a transaction log that seems to “grow out of control” (and\
    \ often you can’t figure out why).\n\nAccelerated Database Recovery was designed\
    \ to solve all of these problems.\n\n### How Accelerated Database Recovery Works\n\
    \nAccelerated Database Recovery (ADR) is designed to tackle the problems with\
    \ long-running transactions through the following capabilities, as listed in the\
    \ documentation at [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery)\
    \ :\n\n*   **Fast and consistent database recovery**\n\n    With ADR, long-running\
    \ transactions do not impact the overall recovery time, enabling fast and consistent\
    \ database recovery irrespective of the number of active transactions in the system\
    \ or their sizes.\n\n*   **Instantaneous transaction rollback**\n\n    With ADR,\
    \ transaction rollback is instantaneous, irrespective of the time that the transaction\
    \ has been active or the number of updates that it has performed.\n\n*   **Aggressive\
    \ log truncation**\n\n    With ADR, the transaction log is aggressively truncated,\
    \ even in the presence of active long-running transactions, which prevents it\
    \ from growing out of control.\n\n#### SQL Server Normal Recovery\n\nIn order\
    \ to understand how Accelerated Database Recovery can solve these problems, it\
    \ is first important to understand how traditional recovery works for SQL Server.\n\
    \nConsider this diagram in Figure [4-1](#479130_1_En_4_Chapter.xhtml#Fig1) as\
    \ provided in the CTR paper ( [`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](http://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)\
    \ ).\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig1_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nThe normal SQL Server recovery process\n\nThe recovery process\
    \ for SQL Server consists of three phases:\n\n1.  **Analysis**\n\nStart from the\
    \ log record when a `CHECKPOINT` was recorded and scan log records until the end\
    \ of the log.\n\nThis analysis allows SQL Server to know:\n*   Which transactions\
    \ were not committed (active) at the time the database was last taken offline\
    \ (could just be a SQL Server shutdown). These are likely the transactions that\
    \ need to be rolled back to ensure consistency.\n*   The log record containing\
    \ the oldest modified or “dirty” page. SQL Server needs this so it can redo, if\
    \ necessary, any committed transactions where pages associated with the committed\
    \ transactions do not reflect the transaction state.\n\nIn other words, analysis\
    \ is all about setting up recovery to perform the next two phases: **redo** and\
    \ **undo**.\n\n1.  **Redo**\n\nIn order for your data to be consistent, SQL Server\
    \ must ensure that any committed transactions are accurately reflected during\
    \ recovery. The method to achieve this involves finding the log record from the\
    \ oldest modified or “dirty” page in the transaction log and comparing the `LSN`\
    \ for each log record in the committed transaction with the `LSN` on the affected\
    \ page. If the page `LSN` is smaller than the log record `LSN`, the log record\
    \ operation (`INSERT`, `UPDATE`, `DELETE`, etc.) must be *redone*. Each log record\
    \ for committed transactions is examined this way until the end of the log.\n\n\
    However, the redo phase, phase 2, actually starts at the log record with the oldest\
    \ active transaction. The redo phase starts here because it needs to acquire locks\
    \ for active transactions so that the database can be made available to users\
    \ (who would be blocked on these locks so they cannot touch active transaction\
    \ data) after the redo phase. However, this means the redo phase is affected by\
    \ the size of log records from the oldest active transaction. Can you see now\
    \ why the length of recovery time can be affected by a long active transaction?\
    \ Once redo is finished, the third and final phase, undo, takes place.\n\n2. \
    \ **Undo**\n\nJust like ensuring committed transactions are accurately reflected\
    \ on database pages, SQL Server must make sure that any transactions that are\
    \ **not** committed are **not** reflected in database pages. You may be wondering\
    \ how could SQL Server have database pages hardened to disk for transactions that\
    \ were not committed? This is because SQL Server can at any time write a modified\
    \ or dirty page to disk if it needs a page for another user and no free pages\
    \ are available. Or a `CHECKPOINT` (including indirect checkpoint) operation could\
    \ take place, which will write modified pages to disk, whether the transaction\
    \ is committed or not. Therefore, if SQL Server was shut down with active transactions\
    \ that were not committed, the engine must ensure during recovery that no database\
    \ pages have any modifications associated with the uncommitted transaction. Any\
    \ active transactions in this state need to be rolled back, just like if a `ROLLBACK\
    \ TRANSACTION` was executed at runtime.\n\nSQL Server does this by scanning the\
    \ log backward, from the end of the log to the log record with the oldest active\
    \ transaction, to perform the necessary rollback operations. Now the time for\
    \ undo is proportional to the length of the oldest active transaction. This is\
    \ also why customers are surprised when they kill SQL Server in hopes of getting\
    \ the database up quickly when a long-running transaction can’t be killed (because\
    \ it is in rollback) and recovery takes a long time. It is because SQL Server\
    \ must keep your data consistent and has to finish the rollback it was previously\
    \ running.\n\nThis recovery system, based on a design called ARIES (see this paper\
    \ for more details [`https://dl.acm.org/citation.cfm?id=128770`](https://dl.acm.org/citation.cfm%253Fid%253D128770)\
    \ ), has served SQL Server well for 25 years and works perfectly fine (and is\
    \ still needed and used) except for the one scenario I have called out: a long-running\
    \ active transaction which lengthens the time for both redo and undo processing.\n\
    \nNow let’s look at how Accelerated Database Recovery (ADR) changes the game."
