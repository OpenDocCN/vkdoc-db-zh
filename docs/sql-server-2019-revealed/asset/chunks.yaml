- fmt: '## Languages, Drivers, and Platforms


    When I started with Microsoft in 1993, developers writing applications for SQL
    Server primarily used languages like Visual C or Visual Basic with a driver called
    DB-Library. The clients were all running DOS (yes, DOS) or Windows, while SQL
    Server was a Windows NT mainstream database server. C++ and ODBC soon followed,
    but the choice of languages, drivers, and platforms was pretty restricted. Today,
    the choice of language, drivers, and platforms for both client applications and
    SQL Server is way beyond anything I ever thought I would see.


    ### Languages and Drivers


    SQL Server 2019 is a modern database platform, and along with it comes a wide
    set of choices of programming languages, including modern languages popular with
    developers who traditionally have not used SQL Server.


    Along with these language choices are drivers to access SQL Server that match
    the requirements and needs of each language. Furthermore, these drivers work on
    a variety of client platforms including macOS, Linux, and Windows.


    Additionally, choices of drivers such as ODBC, OLE-DB, and .Net have become more
    focused, instead of the wide variety and sometimes confusing choices from the
    past.


    So how do you choose a language and/or driver? First, the language choice in some
    cases dictates the driver you will use. For example, if you want to write code
    in PHP and access SQL Server, you must use the `PHP Driver for SQL Server`.


    Fortunately, Microsoft has created a very nice web site to help you make decisions
    on language, choose the right driver, choose one or more client platforms, and
    see examples of writing code to access SQL Server in that language.


    To see this in action, go to the web site `http://aka.ms/sqldev`. The main web
    page looks like Figure [5-1](#479130_1_En_5_Chapter.xhtml#Fig1).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig1_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The SQL Server development hub


    If you hover over one of the language choices, you can pick a client platform
    language to get details of using that language with the appropriate driver and
    a code sample tutorial (Figure [5-2](#479130_1_En_5_Chapter.xhtml#Fig2) shows
    an example using Go).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig2_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Using the Go language with SQL Server


    Choosing the option for Windows, you will be presented with a complete tutorial
    to build your first Go application for Windows (your SQL Server could be running
    on Windows, Linux, or even containers) with SQL Server Developer Edition. Each
    language and platform choice has a similar template like Figure [5-3](#479130_1_En_5_Chapter.xhtml#Fig3)
    for Go.


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig3_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Creating a Go application for SQL Server


    Many developers who use languages such as C++ or C# have seen, to be honest, a
    confusing list of driver choices for SQL Server.


    After SQL Server 2012, we consolidated the list of drivers and versions you should
    be using for ODBC, OLE-DB, or ADO.Net. I have found this documentation page `https://docs.microsoft.com/en-us/sql/connect/connect-history`
    to show a very good history of past drivers and which ones to use now if you are
    using SQL Server 2014 or newer.


    In addition, to get a complete list of language and appropriate driver choices
    to build a SQL Server application, I find this documentation page to be an excellent
    resource: `https://docs.microsoft.com/en-us/sql/connect/sql-connection-libraries`.
    (This includes driver for object-relational mapping (ORM) framework applications.)


    I am a bit of an "old-school" developer, so ODBC is my primary choice for a driver.
    And we have built an ODBC driver for SQL Server that keeps up with new features
    of SQL Server and is available for Linux, macOS, and Windows. You can read the
    complete documentation for the latest SQL Server ODBC Driver at `https://docs.microsoft.com/en-us/sql/connect/odbc/microsoft-odbc-driver-for-sql-server`.


    ### Platforms and Editions


    Starting with SQL Server 2017, SQL Server is now supported on Windows, Linux,
    and with Docker Containers. This opens up the platform to developers who have
    never considered SQL Server before. Regardless of what operating system hosts
    the production SQL Server, developers can now test their applications with SQL
    Server Developer Edition on Windows, Linux, or with Containers. And because the
    SQL Server engine codebase is the same on all of these platforms, developers can
    write applications local to their SQL Server deployment and be assured it is compatible
    with the production SQL Server. This includes former feature gaps for SQL Server
    on Linux, such as replication and Distributed Transactions (DTC), which now are
    available in SQL Server 2019.


    Although not new to SQL Server 2019 (this was introduced in SQL Server 2016 SP1),
    SQL Server editions other than Enterprise Edition contain similar "surface area"
    features to make it easier to build a single application than can work across
    editions. For example, In-Memory OLTP is now available as a feature for SQL Server
    Enterprise and Standard Edition, and even SQL Server Express Edition (although
    the scale of this feature is not the same across editions). You can now build
    your application using In-Memory OLTP on Developer Edition and be assured it can
    work across various editions without putting logic to detect editions in your
    application.


    ## Graph Database


    The concept of a relational database handles all types of design models, data
    patterns, and applications. However, there are certain types of data models designed
    after a real-world problem that don’t necessarily fit well with a standard relational
    system and the SQL language. The models typically involve hierarchical, "network,"
    or complex many-to-many relationships of data. Wikipedia has a good description
    of this problem and solutions at `https://en.m.wikipedia.org/wiki/Graph_database`.


    Some developers have tried to still use a relational database to "fit" in a graph
    model and use complex T-SQL statements to "navigate" the graph. In some cases,
    dedicated projects to graph data have been built, such as the popular open source
    graph database Neo4j (`https://github.com/neo4j/neo4j`). Other database platforms
    have included an "add-on" to their relational database to provide graph capabilities.


    In 2016, members of the SQL Engineering team, including Hanuma Kodavalla, Craig
    Freedman, Devin Rider, and Shreya Verma, formed a project to look into building
    graph database capabilities into SQL Server and Azure SQL Database. Their goal
    was to include graph capabilities built into the SQL Server engine and find a
    way to use the T-SQL language to create graph tables and manipulate and search
    them with T-SQL. This is another great example of leveraging the power of T-SQL
    by extending it.


    The result of this effort was the release of graph database capabilities in SQL
    Server 2017 and Azure SQL Database. One of the huge benefits of a graph database
    in SQL Server is that it comes along with the power of SQL Server. This includes
    HADR, security, performance, and all the features of the engine. Rather than incorporate
    them into the engine, other platforms treat features like this as add-ons or completely
    separate products altogether.'
