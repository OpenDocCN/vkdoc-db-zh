    to data, and, with persistent memory, there are several opportunities. In fact,
    SQL Server 2016 included a feature called “tail of the log caching” based on persistent
    memory (see Kevin Farlee’s blog post on the topic [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/)
    ).


    Since persistent memory is in fact memory, SQL Server can access any data stored
    on a persistent memory device like it is really memory. This means SQL Server
    can find creative ways to bypass kernel code for I/O processing when accessing
    data on persistent memory devices.


    One such new capability is **Hybrid Buffer Pool** . The concept is that if you
    place your database data files on a persistent memory device, SQL Server can simply
    access pages on the data file from this device without having to copy data from
    the data file into a buffer pool page. Hybrid buffer pool uses memory-mapped kernel
    calls to make this a reality. If a database page is modified, it must then be
    copied into the buffer pool and then eventually written back to the persistent
    memory device.


    Performance results vary on the benefits of using hybrid buffer pool, but you
    can typically expect some boost from this technology, especially on read-heavy
    workloads.


    For SQL Server, provided you have placed one or more database files on a persistent
    memory device, you can enable Hybrid Buffer Pool for all databases for SQL Server
    with the T-SQL statement :


    ```

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED HYBRID_BUFFER_POOL = ON

    ```


    ### Note


    When you enable hybrid buffer pool for all databases, you must restart SQL Server.


    You can enable hybrid buffer pool for a specific database with a T-SQL statement
    like this (which does not require a server restart):


    ```

    ALTER DATABASE  SET MEMORY_OPTIMIZED = ON

    ```


    To read more about how to enable your devices for persistent memory for databases,
    how to disable hybrid buffer pool, and best practices for using hybrid buffer
    pool, consult the documentation at [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool)
    .


    ### Persistent Memory Support


    If you don’t want to enable hybrid buffer pool but would like SQL Server to take
    advantage of reading and writing both data and transaction log data to persistent
    memory devices, you can configure your device as a persistent memory device on
    Linux. SQL Server will automatically detect it and use memory-based operations
    to move data into SQL Server cache and the device, bypassing the Linux kernel
    I/O stack. This process is called *enlightenment*.


    Dell EMC was able to see significant performance improvements with enlightenment
    as documented at [`www.emc.com/about/news/press/2019/20190402-01.htm`](http://www.emc.com/about/news/press/2019/20190402-01.htm)
    . According to Dell, “With new Intel® Optane™ DC persistent memory, customers
    can accelerate in-memory databases, virtualization and data analytics workloads
    with up to 2.5 times more memory capacity for select PowerEdge Servers. The PowerEdge
    R740xd enables up to 2.7 times the transactions per second with an Intel® Optane™
    DC persistent memory compared to NVMe drives in a virtualized Microsoft SQL Server
    2019 preview environment with VMware ESXi.1.”


    You can read all the details about how to enable your persistent memory device
    on Linux for SQL Server at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem%253Fview%253Dsqlallproducts-allversions)
    .'
  trans: '

    此时，您可以选择为服务器保留此选项启用状态，但如果需要关闭它，请使用脚本 `disableopttempdb.cmd`。


    您可以体会到该引擎内置功能带来的巨大优势。只需开启一个服务器配置选项，重新启动 SQL Server，即可投入使用。


    如果您访问 tempdb 中的目录视图，会发现使用内存优化的 tempdb 元数据时存在一些限制。您可以在以下链接中阅读有关这些限制以及此功能的所有详细信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database?view=sqlallproducts-allversions#memory-optimized-tempdb-metadata`](https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database%253Fview%253Dsqlallproducts-allversions%2523memory-optimized-tempdb-metadata)。


    ### 混合缓冲池


    持久内存设备已经存在几年了，但如今正开始变得更加普及。其概念是基于内存的硬件，通过电源保障实现数据持久性。可以想象一下 RAM 的速度，同时保证存储的任何数据在电源重启后依然存在。其中一种较为流行的持久内存产品来自英特尔，称为傲腾（Optane）([`www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html`](https://www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html))。


    我们的 SQL Server 工程团队始终致力于寻找优化数据访问的方法，而持久内存带来了多种机会。事实上，SQL Server 2016 就包含了一项基于持久内存的特性，称为“日志尾部缓存”（参见
    Kevin Farlee 关于该主题的博文 [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/))。


    由于持久内存本质上就是内存，SQL Server 可以像访问普通内存一样访问存储在持久内存设备上的任何数据。这意味着在访问持久内存设备上的数据时，SQL Server
    可以创造性地绕过内核代码进行 I/O 处理。


    其中一项新功能就是 `混合缓冲池`。其概念是，如果您将数据库数据文件放置在持久内存设备上，SQL Server 可以直接从该设备访问数据文件中的页面，而无需将数据从数据文件复制到缓冲池页面中。混合缓冲池使用内存映射内核调用来实现这一点。如果数据库页面被修改，则必须将其复制到缓冲池中，最终再写回持久内存设备。


    使用混合缓冲池带来的性能提升因情况而异，但通常可以预期该技术会带来一定的性能提升，尤其是在读取密集型工作负载中。


    对于 SQL Server，只要您已将一个或多个数据库文件放置在持久内存设备上，就可以使用以下 T-SQL 语句为 SQL Server 的所有数据库启用混合缓冲池：


    ```sql

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED HYBRID_BUFFER_POOL = ON

    ```


    ### 注意


    为所有数据库启用混合缓冲池时，必须重新启动 SQL Server。


    您可以使用类似以下的 T-SQL 语句为特定数据库启用混合缓冲池（这不需要重启服务器）：


    ```sql

    ALTER DATABASE <database_name> SET MEMORY_OPTIMIZED = ON

    ```


    要了解更多关于如何为数据库配置持久内存设备、如何禁用混合缓冲池以及使用混合缓冲池的最佳实践，请参阅以下文档：[`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool)。


    ### 持久内存支持


    如果您不想启用混合缓冲池，但希望 SQL Server 能够利用持久内存设备进行数据和事务日志数据的读写，您可以在 Linux 上将您的设备配置为持久内存设备。SQL
    Server 将自动检测它，并使用基于内存的操作将数据移入 SQL Server 缓存和设备，从而绕过 Linux 内核 I/O 堆栈。此过程称为 `enlightenment`。


    Dell EMC 通过 enlightenment 实现了显著的性能提升，详情记录于 [`www.emc.com/about/news/press/2019/20190402-01.htm`](http://www.emc.com/about/news/press/2019/20190402-01.htm)。根据戴尔的说法，“借助全新的英特尔®
    傲腾™ DC 持久内存，客户可以加速内存数据库、虚拟化和数据分析工作负载，为精选的 PowerEdge 服务器提供高达 2.5 倍的内存容量。在采用 VMware
    ESXi 的虚拟化 Microsoft SQL Server 2019 预览版环境中，与 NVMe 驱动器相比，PowerEdge R740xd 能够将每秒事务数提升高达
    2.7 倍。”


    您可以在以下链接中阅读有关如何在 Linux 上为 SQL Server 启用持久内存设备的所有详细信息：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem%253Fview%253Dsqlallproducts-allversions)。'
- fmt: '## Last-Page Insert Contention


    Here is a common problem for SQL Server users for a very long time. You want to
    build a table with a primary key that will be used in a clustered index. And this
    primary key is a `sequential` value. In other words, each insert of a row leads
    to a new value in an incrementing order. The most common form of this type of
    key is a column using a `SEQUENCE` object or an `IDENTITY` property.


    While the design works fine in most cases, it presents a challenging problem for
    application performance. Each time a query needs to modify a page, SQL Server
    must physically protect other queries from changing or reading the page structure
    at the same time (even with row-level locking) using a page `latch`.


    If many users were all trying to modify the same page, your application might
    suffer in performance due to page latch contention. If you build a clustered index
    on a sequential key, the data is sorted on that key. Each insert will be trying
    to insert a new row in the last page of the clustered index leaf level. And if
    many users are concurrently executing inserts, they could all end up trying to
    modify the last page of the index, hence the term last-page insert contention.


    While this contention is not ideal, it normally is not too much of a problem,
    until a phenomenon called a latch `convoy` occurs. Pam Lahoud, Senior Program
    Manager on the team (also known as `@SQLGoddess`), showed me this resource on
    the convoy problem: [`https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/`](https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/).
    For SQL Server and the last-page insert contention problem, a page split is an
    example of a scenario where a convoy can build up. A page split can easily occur
    when there are not enough rows on the page for a new `INSERT`, and a new page
    must be created in the clustered index. Pam also had a really great analogy to
    the convoy issues. According to Pam, “Traffic jams are a common analogy used to
    describe the problem. If you have a road that is at maximum capacity, as long
    as all the traffic continues to move at the same speed, throughput will be consistent,
    albeit slightly slower. As soon as something occurs which causes drivers to hit
    the brakes, such as a slow driver, hazard on the road, or a contentious interchange,
    traffic piles up. If cars continue to enter the road at the same rate as before,
    the traffic just gets worse and worse. Drivers are still making progress, but
    at a very slow rate. At this point, the rate of throughput won''t recover until
    the rate of cars entering the road slows down dramatically, much lower than what
    the road would normally be able to handle.”


    Many users in the SQL community, technical support, and engineering have tackled
    this problem in many different ways over the years. This support article mentions
    many of them ([`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)).
    What about a solution within the engine itself that doesn’t require application
    changes? When I saw our solution show up in SQL Server 2019 CTP 3.1, I knew this
    problem had been discussed before by our engineering team with lots of possible
    solutions. I asked Wonseok Kim, the lead developer for the feature, about its
    history. He showed me an e-mail thread that I actually had laying around in my
    mail folder but forgot about. Turns out a familiar name had been working on an
    approach, Slava Oks, along with many other giants of the SQL Server engineering
    team.


    The solution now exists in the form of a new option for indexes called `OPTIMIZE_FOR_SEQUENTIAL_KEY`.
    By adding this option to your index or primary key constraint, you are telling
    SQL Server to enable new code to try and avoid the convoy problem. This option
    doesn’t eliminate latches or prevent a latch contention problem. What it does
    is try to avoid the dreaded convoy problem so that your workload throughput is
    consistent. You can read more about this option and how to use it in our documentation
    at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys).


    ### Note


    If you use this option, you may notice a new `wait_type` called `BTREE_INSERT_FLOW_CONTROL`.
    This is normal and part of the mechanism to avoid or reduce the convoy problem.


    This option is not for everyone. If you don’t use a sequential key for a clustered
    index or don’t see heavy contention, then I wouldn’t recommend using this option.
    In fact, you might experience worse performance by blindly applying this to any
    clustered index.


    If you want to try this out yourself, make sure you have a “wide” enough table.
    In my testing, simply creating a table with a single `IDENTITY` column did not
    yield any performance gains. What you need to do is cause conditions where enough
    page splits occur to see a convoy problem.


    ### Note


    It is possible the techniques as described in article [`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)
    may provide you better performance, but this new method for an index may give
    you the consistent performance you need and is far less intrusive to your application.


    ## Summary


    This chapter was very long, and it reflects the incredible capabilities of intelligent
    performance baked into SQL Server 2019 designed to help you improve performance
    without application changes. I provided many detailed examples so you can see
    for yourself these rich features and how they can help accelerate performance
    and save you time with performance tuning as you deploy SQL Server 2019 everywhere
    in your organization or develop with your application.


    # 3. New Security Capabilities


    Security is essential to managing data. SQL Server has a proven track record of
    not just building a secure product but providing the necessary capabilities to
    help you secure your data and access to the SQL Server instance. This chapter
    is about what we have added in SQL Server 2019 to the story of security.'
