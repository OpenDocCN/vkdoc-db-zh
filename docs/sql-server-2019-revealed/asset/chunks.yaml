    the traffic just gets worse and worse. Drivers are still making progress, but
    at a very slow rate. At this point, the rate of throughput won''t recover until
    the rate of cars entering the road slows down dramatically, much lower than what
    the road would normally be able to handle.”


    Many users in the SQL community, technical support, and engineering have tackled
