- fmt: '## What About Business Intelligence?


    The SQL Server product comes with Business Intelligence (BI) capabilities, including
    SQL Server Analysis Services (`SSAS`) and SQL Server Reporting Services (`SSRS`).


    Both `SSRS` and `SSAS` are part of the SQL Server license for various editions
    of SQL Server (`SSAS` is only part of Enterprise and Standard).


    `SSRS` has no new enhancements in SQL Server 2019. It is important to keep in
    mind that Power BI Report Server, which is updated at a different pace than SQL
    Server releases, is part of the Enterprise Edition license for SQL Server. You
    can read more about Power BI Report Server at [`https://docs.microsoft.com/en-us/power-bi/report-server/get-started#licensing-power-bi-report-server`](https://docs.microsoft.com/en-us/power-bi/report-server/get-started%2523licensing-power-bi-report-server).


    `SSAS` does offer new capabilities in SQL Server 2019; you can read about these
    enhancements at [`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?#analysis-services`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253F%2523analysis-services).


    ## Migration to SQL Server 2019


    As you make the decision to migrate to SQL Server 2019 for one, many, or all of
    your instances, it always makes sense to have a plan for migration. In this section,
    I’ll talk about tools and resources that can be helpful to you as you make decisions
    and build a plan for migration to SQL Server 2019.


    ### The Pam and Pedro Show


    This is not a new TV series, but it does sound like one. It represents the methodology
    that my colleagues Pam Lahoud and Pedro Lopes have been speaking and training
    customers and the community about how to plan for a successful migration to newer
    releases of SQL Server. Pam and Pedro call this process `Modernizing the Right
    Way`. Instead of trying to repeat all of the information Pam and Pedro have used
    for their training, why not watch it yourself on video? I highly recommend you
    sit back and watch at your own pace this video on YouTube, a 1-hour presentation
    by Pam and Pedro on this topic: [`www.youtube.com/watch?v=5RPkuQHcxxs`](https://www.youtube.com/watch%253Fv%253D5RPkuQHcxxs).


    I have also used a slide in my presentations about the flow of migration and tools
    you may want to consider using, as seen in Figure 11-3.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig3_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig3_HTML.jpg)


    Figure 11-3

    The migration flow and tools for SQL Server


    Pam and Pedro talk about tools as part of their training. I’ll spend the rest
    of the chapter reviewing this flow and the tools in Figure 11-3.


    ### Database Migration Assistant


    The `Database Migration Assistant (DMA)` is a free tool available for you to download
    and run on a Windows computer to assess the configuration and code for an existing
    instance of SQL Server and to see any possible issues you might face migrating
    to newer versions. Pedro shows you a walkthrough of this tool in the video I’ve
    referenced earlier, but let me also give you some more details about the tool
    and why I think you should strongly consider using it.


    `DMA` is much more than its predecessor tool, `Database Upgrade Advisor`. `DMA`
    has these major capabilities:


    *   Assess possible migration blockers for your SQL Server (`DMA` also supports
    `Amazon Relational Database Service (RDS)` as a source) migration. This includes
    options to see what using various database compatibility level options will provide
    for you as part of the migration. These blockers can include breaking changes,
    behavior changes, and deprecated features. I’ll discuss more details about these
    terms in the section “Database Compatibility.”

    *   Discover new features in a new version of SQL Server based on an assessment
    of your current deployment; `DMA` is smart enough to recognize features that might
    provide you benefits. Some examples of new feature recommendations include `columnstore
    indexes`, `Always Encrypted`, `Transparent Data Encryption (TDE)`, and `Dynamic
    Data Masking`.

    *   Although not specifically related to SQL Server 2019, `DMA` will also assess
    migration issues with `SSIS` packages when migrating to `Azure SQL Database`.

    *   `DMA` will also support performing the migration of your database to various
    target types like SQL Server 2019. I only recommend you use this for very small
    migrations or to test a migration of your database.


    Even though `DMA` is a tool built to run on Windows, you can use this tool for
    many different sources and targets, including SQL Server on Windows and Linux,
    `Azure SQL Database`, `Azure SQL Database Managed Instance`, and SQL Server in
    `Azure Virtual Machine`.


    Figure 11-4 shows the possible targets for an assessment and migration using `DMA
    4.4`.


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg](images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg)


    Figure 11-4

    Targets supported for `DMA`


    There are a few other nice aspects of `DMA` you should be aware of:


    *   `DMA` is a graphical tool on Windows, but also offers a command-line interface
    (`CLI`) so you can use it in automation scenarios. You can read more about the
    `DMA` `CLI` at [`https://docs.microsoft.com/en-us/sql/dma/dma-commandline`](https://docs.microsoft.com/en-us/sql/dma/dma-commandline).

    *   If you want to run an assessment for a large number of SQL Server instances,
    our migration team has provided a method to store the information in a database
    for the purpose of reporting, which you can read about at [`https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports`](https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports).

    *   With this data warehouse of assessment data, you can now build `Power BI`
    reports on this data. The migration team has also provided a `GitHub` repo for
    `Power BI` reports at [`https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport`](https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport).


    Pedro Lopes has a nice walkthrough demo of using `DMA` in the YouTube video link
    I pointed you to previously in this chapter in the section “The Pam and Pedro
    Show.”


    We have a great database migration team, and you will find some of their blog
    posts on the topic very valuable at [`https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration`](https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration).'
