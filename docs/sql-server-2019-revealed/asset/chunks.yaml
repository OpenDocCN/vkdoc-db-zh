  trans: '## 最后一页插入争用


    这是 SQL Server 用户长期以来面临的一个常见问题。你希望创建一个包含主键的表，该主键将用于聚集索引。并且此主键是一个 `顺序` 值。换句话说，每次插入一行都会产生一个递增的新值。这种类型键最常见的形式是使用
    `SEQUENCE` 对象或 `IDENTITY` 属性的列。


    虽然这种设计在大多数情况下表现良好，但它会给应用程序性能带来一个具有挑战性的问题。每次查询需要修改一个数据页时，SQL Server 必须物理地保护其他查询，防止它们在同一时间更改或读取该页的结构（即使使用行级锁），这是通过页
    `闩锁` 实现的。


    如果有许多用户都试图修改同一页，你的应用程序可能会因为页闩锁争用而遭受性能下降。如果你在一个顺序键上构建聚集索引，数据会根据该键排序。每次插入都会试图在聚集索引叶子级别的最后一页插入一个新行。如果许多用户并发执行插入操作，他们最终可能都试图修改索引的最后一页，因此称为“最后一页插入争用”。


    虽然这种争用并不理想，但通常问题不大，直到一种称为闩锁 `convoy`（车队）的现象发生。团队的高级项目经理 Pam Lahoud（也被称为 `@SQLGoddess`）给我展示了这个关于
    convoy 问题的资源：[`https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/`](https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/)。对于
    SQL Server 和最后一页插入争用问题，页拆分是可能形成 convoy 的一个场景示例。当一页上没有足够的行容纳新的 `INSERT` 时，就很容易发生页拆分，需要在聚集索引中创建一个新页。Pam
    还用了一个非常贴切的类比来说明 convoy 问题。据 Pam 说：“交通堵塞是用来描述这个问题的常见类比。如果有一条道路已达到最大容量，只要所有车辆继续以相同的速度行驶，吞吐量将保持稳定，尽管会稍慢一些。一旦发生导致司机踩刹车的情况，例如有慢车、道路上的危险或有争议的交叉口，车辆就会堆积起来。如果汽车继续以之前的速度进入道路，交通状况只会越来越糟。司机们仍在前进，但速度非常缓慢。此时，吞吐量速率直到汽车进入道路的速率大幅下降——远低于道路通常能处理的水平——才会恢复。”


    多年来，SQL 社区、技术支持和工程团队中的许多用户以多种不同的方式解决了这个问题。这篇支持文章提到了其中许多方法（[`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)）。那么，有没有一种无需修改应用程序、在引擎内部的解决方案呢？当我在
    SQL Server 2019 CTP 3.1 中看到我们的解决方案出现时，我知道这个问题之前已经被我们的工程团队讨论过，并提出了许多可能的解决方案。我询问了该功能的首席开发
    Wonseok Kim 关于它的历史。他给我看了一封电子邮件，实际上这封邮件一直躺在我的邮件文件夹里，但我忘记了。原来是一个熟悉的名字曾致力于此方法的开发，Slava
    Oks，以及 SQL Server 工程团队的许多其他巨人。


    该解决方案现在以一种名为 `OPTIMIZE_FOR_SEQUENTIAL_KEY` 的索引选项形式存在。通过将此选项添加到你的索引或主键约束中，你是在告诉
    SQL Server 启用新代码以尝试避免 convoy 问题。此选项不会消除闩锁或防止闩锁争用问题。它所做的是尝试避免可怕的 convoy 问题，从而使你的工作负载吞吐量保持一致。你可以在我们的文档
    [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys)
    中阅读有关此选项以及如何使用它的更多信息。


    ### 注意


    如果你使用此选项，可能会注意到一个新的 `wait_type`，称为 `BTREE_INSERT_FLOW_CONTROL`。这是正常的，是避免或减少 convoy
    问题机制的一部分。


    此选项并不适合所有人。如果你没有为聚集索引使用顺序键，或者没有看到严重的争用，那么我不建议使用此选项。事实上，盲目地将其应用到任何聚集索引上，可能会导致性能更差。


    如果你想亲自尝试，请确保你有一个足够“宽”的表。在我的测试中，仅创建一个具有单个 `IDENTITY` 列的表并未带来任何性能提升。你需要做的是制造足够的页拆分条件，从而引发
    convoy 问题。


    ### 注意


    文章 [`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)
    中描述的技术可能会为你提供更好的性能，但这种索引的新方法可能会提供你需要的稳定性能，并且对你的应用程序侵入性要小得多。


    ## 总结


    本章非常长，它反映了 SQL Server 2019 中内置的智能性能的惊人能力，旨在帮助你在不修改应用程序的情况下提高性能。我提供了许多详细的示例，以便你可以亲身体验这些丰富的功能，以及它们如何帮助加速性能，并在你将
    SQL Server 2019 部署到整个组织或使用应用程序进行开发时，为你节省性能调优的时间。


    # 3. 新的安全功能


    安全性对于管理数据至关重要。SQL Server 不仅拥有构建安全产品的可靠记录，还提供了必要的功能来帮助你保护数据以及对 SQL Server 实例的访问。本章是关于我们在
    SQL Server 2019 中为安全故事所增添的内容。'
- fmt: "## Enhancing What We Have Built\n\nAfter reading and using examples for a\
    \ very long chapter on performance, you may look at this chapter, see the number\
    \ of pages, and ask yourself, “Hey, isn’t security important?” The answer is absolutely\
    \ yes! For `SQL Server`, security is a very important part of the overall data\
    \ platform.\n\nIn `SQL Server 2019`, the new security capabilities and the *challenges*\
    \ they are designed to meet include\n\n*   **`Always Encrypted with Secure Enclaves`**\n\
    \n    Provide an end-to-end encryption solution, but not limit application query\
    \ capabilities.\n\n*   **Data Classification and Auditing**\n\n    Provide a built-in\
    \ classification system for `SQL Server` objects, along with auditing for viewing\
    \ of data that is marked for classification.\n\n*   **`Transparent Data Encryption\
    \ (TDE)` suspend and resume**\n\n    Provide a mechanism to schedule expensive\
    \ encryption “at rest” operations against a database.\n\n*   **Certificate management**\n\
    \n    Make certificate management easier with `SQL Server`, including Failover\
    \ Cluster Instance and Always On Availability Group scenarios.\n\nThis may not\
    \ seem like a big set of improvements, but each new feature attempts to solve\
    \ important security problems faced by our customers and originates from their\
    \ feedback. For example, data classification was specifically built into `SQL\
    \ Server` to address compliance with the General Data Protection Regulation (`GDPR`),\
    \ but can be used for many classification and auditing needs.\n\nIt is also very\
    \ important to remember that `SQL Server 2019` comes with a rich set of security\
    \ features introduced in `SQL Server 2016`. This includes\n\n*   Always Encrypted\n\
    *   Dynamic data masking\n*   Row-level security\n*   Transparent Data Encryption\
    \ performance with hardware acceleration\n\nYou can read about all these security\
    \ capabilities at [`https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016?view=sql-server-2017#security-enhancements`](https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016%253Fview%253Dsql-server-2017%2523security-enhancements).\n\
    \nIt is important to keep in mind that, for nearly a decade, `SQL Server` has\
    \ been the least vulnerable database and data platform – by a large percentage\
    \ – as tracked by the National Vulnerability Database (`NVD`) run by the National\
    \ Institute of Standards and Technology (`NIST`). You can see all of these details\
    \ at [`https://nvd.nist.gov/`](https://nvd.nist.gov/).\n\nLet’s look at each of\
    \ the new capabilities for security for `SQL Server 2019` in more detail, starting\
    \ with `Always Encrypted with Secure Enclaves`.\n\n## Always Encrypted with Secure\
    \ Enclaves\n\nPrior to `SQL Server 2016`, you had several methods to encrypt data,\
    \ including\n\n*   **Encrypting connections** – All data (the `TDS` protocol data)\
    \ exchanged between a client application and `SQL Server` is encrypted.\n*   **Encrypting\
    \ data** in `SQL Server` tables using **`T-SQL`** (sometimes called column-level\
    \ or cell-level encryption).\n*   **`Transparent Data Encryption (TDE)`** – Encrypting\
    \ data *at rest* or data encrypted at the file level for `SQL Server` database\
    \ files.\n\nNone of these solutions provide an “end-to-end” encryption mechanism.\
    \ And more importantly, `SQL Server` admins have control of the keys used to encrypt\
    \ data. Therefore, there is no concept of *separation of duties*. In the world\
    \ of today’s demanding security needs, application owners (i.e., business owners)\
    \ want complete control of the security of their data. They want roles like database\
    \ admins to manage the data platform infrastructure but not have access to business\
    \ data or the keys used to control access to that data.\n\nIn `SQL Server 2016`,\
    \ we introduced a feature called `Always Encrypted` to solve these problems. `Always\
    \ Encrypted` has its roots from projects at Microsoft Research. As Raghav Kaushik,\
    \ Principal Software Engineer at Microsoft, tells it, “…there are two projects\
    \ worth citing. One is the Cipherbase project at MSR-Redmond which was attempting\
    \ to build query processing on encrypted data, and the Trusted Cloud project at\
    \ MSR-Cambridge that focused more on the building blocks around secure hardware.”\n\
    \nFigure [3-1](#479130_1_En_3_Chapter.xhtml#Fig1) shows an example of the architecture\
    \ and flow of `Always Encrypted`.\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig1_HTML.jpg](images/479130_1_En_3_Chapter/479130_1_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n`Always Encrypted` in `SQL Server 2016`\n\nThe concept is the client\
    \ application and their owners control the encryption lifecycle. All data is passed\
    \ from the client application to `SQL Server` encrypted, stored in `SQL Server`\
    \ encrypted (at the column level), and sent back to the client application encrypted.\
    \ Only the client application can unencrypt the data at the application tier.\
    \ In addition, the keys used to encrypt and unencrypt data are not actually stored\
    \ in `SQL Server`. The location of the keys, owned by application owners, is stored\
    \ in `SQL Server`. But access to those keys is controlled by the application.\n\
    \nIt sounds like a great solution, but there is one drawback. Because all the\
    \ decryption happens in the client application, some query patterns are not allowed\
    \ against the data (e.g., only equality `WHERE` clauses are permitted). Furthermore,\
    \ indexes on encrypted data with `Always Encrypted` are not supported. Given that\
    \ the client application is the only place where decryption takes place, there\
    \ is no way to truly build an index with `Always Encrypted`. `SQL Server` would\
    \ have to send all the data for the columns encrypted as part of the index to\
    \ the client application to build the index and then send it back to the server.\
    \ So as good as the promise of `Always Encrypted` is, these limitations make it…well,\
    \ limited in several scenarios.\n\nIs there a solution? Yes, and it comes in the\
    \ form of a concept called *Secure Enclaves*.\n\n### Why Enclaves?\n\nWebster’s\
    \ dictionary defines an enclave ([`www.merriam-webster.com/dictionary/enclave`](http://www.merriam-webster.com/dictionary/enclave))\
    \ as “a distinct territorial, cultural, or social unit enclosed within or as if\
    \ within foreign territory.” In computer terms, it is a protective area that is\
    \ secure and independent of hostile invaders. Those invaders could be hackers,\
    \ but, unfortunately, they could also be administrators or DBAs.\n\nIntel has\
    \ released the concept of an enclave in their chipset known as Software Guard\
    \ Extensions (`SGX`), which you can read about at [`https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave`](https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave).\
    \ `SGX` provide instructions in the `CPU` to allow for protected regions of memory\
    \ that is secure for encryption and provides a safe haven from intrusion. That\
    \ is interesting, but what if you don’t happen to have an `SGX` chip? Microsoft\
    \ has come along with a *virtualized* enclave solution called virtualization-based\
    \ security (`VBS`) memory enclaves. You can read all the details about `VBS` at\
    \ [`www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/`](https://www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/).\n\
    \nWhat does that mean for `Always Encrypted`, and why does it matter?"
