    \ commands or the script **step9_dockerstopandremove.ps1**:\n\n```\ndocker stop\
    \ sql2019latest\ndocker rm sql2019latest\n```\n\nThink of stopping and removing\
    \ SQL Server as uninstalling SQL Server. But the good news is that any other SQL\
    \ Server containers (even based on the same image) are unaffected by this.\n\n\
    1.  As I described on how SQL Server container works, use a volume to store your\
    \ databases on persisted host storage that can survive when the container is removed.\n\
    \nRun the container with a volume using the following command or script **step10_dockerrunvolume.ps1**:\n\
    \n```\ndocker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433\
    \ --name sql2019latest --hostname sql2019latest -v sqlvolume:/opt/mssql/data -d\
    \ mcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\n### Note\n\nBecause\
    \ the image for SQL 2019 is still on your local computer, docker will not try\
    \ to pull it again.\n\nIn this example, the name **sqlvolume** will be automatically\
    \ mapped to a directory in the host server or VM that is not part of the writeable\
    \ layer. Any writes to the /var/opt/mssql directory in the writeable layer are\
    \ redirected to the host folder for sqlvolume.\n\nYou can find out the directory\
    \ for sqlvolume by running the following command:\n\n```\ndocker inspect sqlvolume\n\
    ```\n\nYour output should look like the following:\n\n```\n[\n{\n\"CreatedAt\"\
    : \"2019-08-07T02:24:50Z\",\n\"Driver\": \"local\",\n\"Labels\": null,\n\"Mountpoint\"\
    : \"/var/lib/docker/volumes/sqlvolume/_data\",\n\"Name\": \"sqlvolume\",\n\"Options\"\
    : null,\n\"Scope\": \"local\"\n}\n]\n```\n\nOn Windows, /var/lib/docker/volumes/sqlvolume/_data\
    \ is a directory inside the Linux VM but still persisted."
  trans: "\n# 查看 SQL Server 容器日志与管理\n\nWideWorldImporters 备份文件是使用 SQL Server 2016\
    \ 构建的，因此您会看到一条输出信息，提示数据库正在被还原并升级到 2019 版本。\n\n## 1. 查看 ERRORLOG\n\n您可能想查看容器中运行的\
    \ SQL Server 的 ERRORLOG。实现此目的的一种方法是使用 `docker exec`，并通过以下命令或脚本 `step5_dockerexec.ps1`\
    \ 来浏览容器的目录结构：\n\n```\ndocker exec -it sql2019latest bash\n```\n\n此命令成功后，您的光标将位于容器环境下的\
    \ Bash shell 提示符处，如下所示：\n\n```\nroot@sql2019latest:/#\n```\n\n现在您可以切换到 `/var/opt/mssql/log`\
    \ 目录，并使用 `cat ERRORLOG` 命令显示 ERRORLOG。\n\n请记住，容器的优势之一是比在虚拟机中运行整个操作系统具有更小的资源占用。此外，我之前告诉过您，容器实际上只是一个以隔离方式运行的程序，它共享主机操作系统的资源。您可以通过运行以下命令来查看此行为：\n\
    \n```\nps -axf\n```\n\n您的输出应类似于：\n\n```\n[root@sql2019latest /]# ps -axf\nPID\
    \ TTY      STAT   TIME COMMAND\n268 pts/0    Ss     0:00 bash\n561 pts/0    R+\
    \     0:00  \\_ ps -axf\n1 ?        Ssl    0:00 /opt/mssql/bin/sqlservr\n7 ? \
    \       Sl     1:25 /opt/mssql/bin/sqlservr\n```\n\n您可以看到只有 `bash` 和 `sqlservr`\
    \ 在运行。您可以将此与在主机（而非容器）的 RHEL 7.6 服务器或虚拟机上运行以下命令进行比较：\n\n```\nps -axf | wc -l\n\
    ```\n\n该命令用于统计进程数量。在我在 Azure 中安装的“全新”RHEL 7.6 服务器上，我得到了 122 这个数字！`bash` 程序与 SQL\
    \ Server 容器在同一个命名空间中运行，因此它被隔离，只能访问此特定容器的可读写层中的文件。\n\n输入命令 `exit` 退出 shell。\n\n\
    ### 注意\n您可能会问，如果容器只是 `sqlservr` 程序，怎么可能运行这些 Linux 命令。这是因为 `docker exec` 能够在容器程序的命名空间中运行一个程序（类似于\
    \ `sqlcmd` 与 SQL Server 容器的工作方式）。如果程序本身不存在于容器的文件目录结构中，`docker exec` 将会失败。`bash`\
    \ 可用是因为它在基础镜像中。`sqlcmd` 可用是因为我们在 SQL Server 镜像中安装了 `sqlcmd`。\n\n让我停下来提一下，Docker\
    \ 扩展与 Azure Data Studio（或 Visual Studio Code）配合使用是多么方便。我在“先决条件”中提到过您可能希望安装此扩展。图\
    \ 7-4 是管理一个正在运行的 SQL Server 容器以“附加”一个 `bash` shell 的示例。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig4_HTML.jpg](img/479130_1_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4**\n在 Azure Data Studio 中使用 Docker 扩展\n\n从该扩展的“资源管理器”选项中可以看到，您可以查看正在运行（或已停止）的容器、已拉取的镜像，甚至可以浏览像\
    \ `mcr.microsoft.com` 这样的注册表，或者您自己的 Azure 容器注册表或 Docker Hub。\n\n## 2. 停止容器\n\n\
    如果您需要关闭容器中的 SQL Server，从技术上讲，您可以发出 T-SQL `SHUTDOWN` 命令。这将停止 `SQLSERVR` 进程并关闭容器，因为它是容器的主程序。或者，您可以运行以下命令来停止容器，或使用脚本\
    \ `step6_dockerstop.ps1`：\n\n```\ndocker stop sql2019latest\n```\n\n命令成功时，它会将容器名称打印到标准输出。\n\
    \n当您停止容器时，启动容器的程序会被终止。对于 SQL Server，这将导致检测到终止信号并执行 SQL Server 的干净关闭。\n\n您可以在容器停止后运行以下命令来证明\
    \ SQL Server 已关闭：\n\n```\ndocker logs sql2019latest\n```\n\nSQL Server 容器的 ERRORLOG\
    \ 输出将显示在控制台中，其中包含如下语句：\n\n```\n spids      SQL Server is terminating in response\
    \ to a 'stop' request from Service Control\n```\n\n此时，容器的可读写层（在本例中，由于 WideWorldImporters\
    \ 数据库已被还原，它是此层的一部分）会被保留，容器被认为是*空闲*的但可以再次启动。您可以通过运行以下命令查看任何已停止但未被移除的容器：\n\n```\n\
    docker ps -a\n```\n\n您的输出应如下所示：\n\n```\nCONTAINER ID        IMAGE            \
    \                                   COMMAND                  CREATED\nSTATUS \
    \                     PORTS               NAMES\n95345f25b901        mcr.microsoft.com/mssql/rhel/server:2019-latest\
    \      \"/opt/mssql/bin/sqls...\"   10 hours ago\nExited (0) 11 seconds ago  \
    \               sql2019latest\n```\n\n## 3. 启动容器\n\n您可以使用以下命令或脚本 `step7_dockerstart.ps1`\
    \ 再次启动容器：\n\n```\ndocker start sql2019latest\n```\n\n容器的名称将再次显示在控制台中，然后您将返回到命令提示符。\n\
    \n## 4. 查询数据库\n\n您可以使用以下命令或脚本 `step8_dockerquerywwi.ps1` 查询 WideWorldImporters\
    \ 数据库：\n\n```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401' '-Q\"SELECT COUNT(*)\
    \ FROM [WideWorldImporters].[Application].[People]\"'\n```\n\n您应该会得到 People 表中行数为\
    \ 1111 的结果。\n\n## 5. 停止并移除容器\n\n如果您停止容器并移除它，可读写层将会消失，您的数据库也随之消失（这可不是好事）。您可以通过以下命令或脚本\
    \ `step9_dockerstopandremove.ps1` 来停止并移除容器：\n\n```\ndocker stop sql2019latest\n\
    docker rm sql2019latest\n```\n\n可以将停止并移除 SQL Server 视为卸载 SQL Server。但好消息是，任何其他\
    \ SQL Server 容器（即使基于同一镜像）都不受此操作影响。\n\n## 6. 使用数据卷持久化数据\n\n正如我在描述 SQL Server 容器工作原理时所说的，使用卷将数据库存储在持久化的主机存储上，这样即使容器被移除，数据也能得以保留。\n\
    \n使用以下命令或脚本 `step10_dockerrunvolume.ps1` 通过卷运行容器：\n\n```\ndocker run -e \"ACCEPT_EULA=Y\"\
    \ -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest --hostname\
    \ sql2019latest -v sqlvolume:/opt/mssql/data -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\n### 注意\n由于 SQL 2019 的镜像已在您的本地计算机上，`docker` 不会尝试再次拉取它。\n\n在此示例中，名称 `sqlvolume`\
    \ 将自动映射到主机服务器或虚拟机上的一个目录，该目录不是可读写层的一部分。任何对可读写层中 `/var/opt/mssql` 目录的写入操作都会被重定向到主机上\
    \ `sqlvolume` 对应的文件夹。\n\n您可以通过运行以下命令来找出 `sqlvolume` 所对应的目录：\n\n```\ndocker inspect\
    \ sqlvolume\n```\n\n您的输出应类似于：\n\n```\n[\n{\n\"CreatedAt\": \"2019-08-07T02:24:50Z\"\
    ,\n\"Driver\": \"local\",\n\"Labels\": null,\n\"Mountpoint\": \"/var/lib/docker/volumes/sqlvolume/_data\"\
    ,\n\"Name\": \"sqlvolume\",\n\"Options\": null,\n\"Scope\": \"local\"\n}\n]\n\
    ```\n\n在 Windows 上，`/var/lib/docker/volumes/sqlvolume/_data` 是 Linux 虚拟机内部的一个目录，但仍然会被持久化。\n"
- fmt: "# Note\n\n在编写本书的过程中，我们发现了 SQL Server 容器与 Windows 卷之间的一个问题。我原本希望 Windows 用户在示例中看到类似如下的卷映射：\n\
    \n`-v c:\\data:/var/opt/mssql`\n\n但我们发现了一个自 SQL Server 2017 CU14 开始出现并破坏此模型的问题。其他用户已在\
    \ GitHub 上报告了相同的问题：[`https://github.com/microsoft/mssql-docker/issues/441`](https://github.com/microsoft/mssql-docker/issues/441)。我相信在本书出版时，此问题将得到解决。您可以在该\
    \ GitHub 页面上跟踪我们对此问题的修复进展。\n\n1.  复制 WideWorldImporters 备份文件，并按照之前的步骤再次还原数据库。执行脚本\
    \ `step11_dockercopyandrestore.ps1` 或以下命令：\n\n    ```\n    docker cp c:\\sql_sample_databases\\\
    WideWorldImporters-Full.bak sql2019latest:/var/opt/mssql\n    docker exec -it\
    \ sql2019latest /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Sql2019isfast\"\
    \ -Q \"RESTORE DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
    \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n    ```\n\n1.\
    \  现在停止并移除容器。然后使用相同的卷名，通过以下命令或脚本 `step12_dockerrestart.ps1` 重新启动它：\n\n    ```\n\
    \    docker stop sql2019latest\n    docker rm sql2019latest\n    docker run -e\
    \ \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest\
    \ --hostname sql2019latest -v sqlvolume:/var/opt/mssql -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    \    ```\n\n在此情况下，当新的 SQL 2019 容器启动时，所有系统数据库和用户数据库已经存在。SQL Server 会识别这一点，并直接“使用”这些数据库并启动。\n\
    \n1.  通过运行查询（使用以下命令或脚本 `step13_dockerquerywwi.ps1`）来确保你的数据仍然存在：\n\n    ```\n \
    \   sqlcmd -Usa -PSql2019isfast '-Slocalhost,1401' '-Q\"SELECT COUNT(*) FROM [WideWorldImporters].[Application].[People]\"\
    '\n    ```\n\n你应返回 `People` 表中的行数为 1111。\n\n让我们使用 Azure Data Studio (ADS) 工具连接到容器。启动\
    \ Azure Data Studio（如果尚未启动）。开始一个新连接，在**服务器**字段中输入 **localhost,1401**（或 `<servername>,1401`）。输入你用于启动容器的\
    \ sa 密码。ADS 应能像连接其他任何 SQL Server 一样连接并与容器交互。\n\n图 [7-5](#479130_1_En_7_Chapter.xhtml#Fig5)\
    \ 展示了使用 ADS 连接到 WideWorldImporters 数据库并执行查询的界面。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**\n\n使用 Azure Data Studio 连接到容器\n\n1.  让我们通过停止容器、移除它、移除卷并移除镜像来清理所有资源，使用以下命令或脚本\
    \ `cleanup.sh`：\n\n    ```\n    sudo docker stop sql2019latest\n    sudo docker\
    \ rm sql2019latest\n    sudo docker volume rm sqlvolume\n    sudo docker rmi mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    \    ```\n\n现在你已经了解了部署和管理带有 SQL Server 的容器的基础知识，包括在卷中持久化用户数据库，让我们运用这些技能来学习一种使用容器更新\
    \ SQL Server 的新颖独特方式。\n\n## 一种更新 SQL Server 的新方法\n\n我在本章开头提到过，容器提供了一种全新且令人惊叹的更新\
    \ SQL Server 的方法。让我们看看它的实际操作。由于本书编写时 SQL Server 2019 仍处于预览版，没有可用于展示 2019 版容器更新的累积更新。因此，在此示例中，我将展示如何使用\
    \ SQL Server 2017 来更新容器。一旦 SQL Server 2019 正式发布并开始提供累积更新，你将能够使用相同的方法。\n\n想象一下这个场景以理解示例：你目前正在生产环境中运行带有\
    \ SQL Server 2017 累积更新 (CU) 10 的容器。你需要为 SQL Server 2017 应用最新的 CU。在 Windows 或 Linux\
    \ 上，此过程是对当前 SQL Server 实例进行修补或更新，这需要重启 SQL Server。\n\n容器提供了一种新方法，虽然也需要重启，但更新速度更快，并为回滚提供了巨大优势。记住\
    \ SQL Server 容器是预安装的。因此，当你运行基于任何累积更新的 SQL Server 容器时，你并不是在修补现有软件。\n\n所有展示更新实际操作的示例都可以在\
    \ `ch7_inside_sql_containers\\update` 找到。Windows 用户可以使用 `dockerpowershell` 目录，而\
    \ Linux 和 macOS 用户可以使用 `dockerbash` 目录（确保使用 `chmod u+x <script>` 使你的脚本可执行）。\n\n\
    我将在本节中引导你完成 PowerShell 的体验。\n\n1.  运行以下命令或脚本 `step1_dockerrun.ps1` 来部署一个 SQL Server\
    \ 2017 CU10 容器：\n\n    ```\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
    \ -p 1401:1433 --name sql2017CU10 --hostname sql2017CU10 -v sqlvolume:/var/opt/mssql\
    \ -d mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n    ```\n\n    你很可能还没有拉取\
    \ SQL 2017 CU10 镜像，所以它会先被拉取。注意这里使用了卷，这是这种 SQL Server 更新方法的关键。\n\n2.  使用以下命令或脚本\
    \ `step2_dockerconnecttosql.ps1` 连接到 SQL Server 以查找已安装的版本：\n\n    ```\n    sqlcmd\
    \ -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\n\
    \    你的输出应类似于：\n\n    ```\n    Microsoft SQL Server 2017 (RTM-CU10) (KB4342123)\
    \ - 14.0.3037.1 (X64)\n    Jul 27 2018 09:40:27\n    Copyright (C) 2017 Microsoft\
    \ Corporation\n    Developer Edition (64-bit) on Linux (Ubuntu 16.04.5 LTS)\n\
    \    ```\n\n3.  运行以下命令来更新容器，或使用脚本 `step3_dockerupdate.ps1`：\n\n    ```\n    docker\
    \ stop sql2017CU10\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
    \ -p 1401:1433 --name sql2017latest --hostname sql2017latest -v sqlvolume:/var/opt/mssql\
    \ -d mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n    ```\n\n    让我描述一下这里发生了什么。第一个容器被停止，不再能访问卷上的系统数据库。第二个容器启动，*使用相同的卷和端口*，但使用了最新\
    \ CU 版本的不同镜像。新容器启动 SQL Server，它识别出系统数据库已经存在。引擎足够智能，能在系统数据库存在时直接使用它们。此外，SQL Server\
    \ 足够智能，能够对系统和用户数据库执行任何必要的“更新”步骤，以确保它们与特定的 CU 版本兼容。\n\n4.  运行以下命令连接到容器（记住是同一个端口）以验证\
    \ SQL Server 版本已更新，或使用脚本 `step4_dockerconnecttosql.ps1`：\n\n    ```\n    sqlcmd\
    \ -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\n\
    \    根据你在更新后执行此步骤的时间早晚，你可能会收到此错误：\n\n    ```\n    Sqlcmd: Error: Microsoft ODBC\
    \ Driver 17 for SQL Server : Login failed for user 'sa'. Reason: Server is in\
    \ script upgrade mode. Only administrator can connect at this time..\n    ```"
  raw: "### Note\n\nAs part of writing this book, we had discovered a problem with\
    \ our SQL Server containers and Windows volumes. I wanted the examples for Windows\
    \ users to see a volume map of something like\n\n-v c:\\data:/var/opt/mssql\n\n\
    But we have discovered a problem that started in SQL Server 2017 CU14 that breaks\
    \ that model. Others have reported this same problem on GitHub at [`https://github.com/microsoft/mssql-docker/issues/441`](https://github.com/microsoft/mssql-docker/issues/441)\
    \ . I believe we will have this problem solved by the time this book is published.\
    \ You track our fix for this issue on the GitHub page.\n\n1.  Copy the WideWorldImporters\
    \ backup and restore the database again as you did in earlier steps by executing\
    \ the script **step11_dockercopyandrestore.ps1** or these commands:\n\n1.  Now\
    \ stop and remove the container. Then start it again with the same volume name\
    \ using the following commands or script **step12_dockerrestart.ps1**:\n\n```\n\
    docker cp c:\\sql_sample_databases\\WideWorldImporters-Full.bak sql2019latest:/var/opt/mssql\n\
    docker exec -it sql2019latest /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P\
    \ \"Sql2019isfast\" -Q \"RESTORE DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
    \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n```\n\n```\n\
    docker stop sql2019latest\ndocker rm sql2019latest\ndocker run -e \"ACCEPT_EULA=Y\"\
    \ -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest --hostname\
    \ sql2019latest -v sqlvolume:/var/opt/mssql -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\nIn this situation, when the new SQL 2019 container starts, all system and\
    \ user databases already exist. SQL Server recognizes this and just “uses” these\
    \ databases and starts up.\n\n1.  Make sure your data is still there by running\
    \ a query against WideWorldImporters as in a previous step using the following\
    \ command or script **step13_dockerquerywwi.ps1**:\n\n```\nsqlcmd -Usa -PSql2019isfast\
    \ '-Slocalhost,1401' '-Q\"SELECT COUNT(*) FROM [WideWorldImporters].[Application].[People]\"\
    '\n```\n\nYou should get back a number of 1111 for number of rows in the People\
    \ table.\n\nLet’s use the Azure Data Studio (ADS) tool to connect to the container.\
    \ Launch Azure Data Studio (if you have not already). Start a new connection and\
    \ in the **Server** field put in **localhost,1401** (or the <servername>,1401).\
    \ Put in your sa password you used to start the container. ADS should connect\
    \ and interact with the container just like any other SQL Server.\n\nFigure [7-5](#479130_1_En_7_Chapter.xhtml#Fig5)\
    \ shows a connection and query against the WideWorldImporters database with ADS.\n\
    \n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nConnecting to a container with Azure Data Studio\n\n1.  Let’s\
    \ clean up all the resources by stopping the container, removing it, removing\
    \ the volume, and removing the image using the following commands or script **cleanup.sh**:\n\
    \n```\nsudo docker stop sql2019latest\nsudo docker rm sql2019latest\nsudo docker\
    \ volume rm sqlvolume\nsudo docker rmi mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    ```\n\nNow that you know the fundamentals of deploying and managing a container\
    \ with SQL Server including persisting a user database in a volume, let’s use\
    \ these skills to learn a new and unique way to update SQL Server with containers.\n\
    \n## A New Way to Update SQL Server\n\nI mentioned very early in this chapter\
    \ how containers provide a new and amazing way to update SQL Server. Let’s see\
    \ it in action. Because SQL Server 2019 was in preview as I wrote this book, there\
    \ were no cumulative updates available to show you an update with containers for\
    \ 2019\\. Therefore, in this example, I’ll show you how to update containers using\
    \ SQL Server 2017\\. Once SQL Server 2019 ships and we start shipping cumulative\
    \ updates, you will be able to use the same approach.\n\nImagine this scenario\
    \ to understand the example. You are currently running SQL Server 2017 Cumulative\
    \ Update (CU) 10 with a container in production. You need to apply the latest\
    \ CU for SQL Server 2017\\. With Windows or Linux, the process is to patch or\
    \ update the current SQL Server instance which requires a restart of SQL Server.\n\
    \nContainers offer a new approach which also require a restart but are faster\
    \ to update and provide a huge benefit for rollback. Remember SQL Server containers\
    \ are pre-installed. Therefore, when you run a SQL Server container based on any\
    \ cumulative update, you are not patching existing software.\n\nAll the examples\
    \ to see updates in action can be found at **ch7_inside_sql_containers\\update**.\
    \ Windows users can use the **dockerpowershell** directory, and Linux and macOS\
    \ users can use the **dockerbash** directory (be sure to make your scripts executable\
    \ with chmod u+x <script>).\n\nI’ll walk you through the PowerShell experience\
    \ in this section.\n\n1.  Run the following command or script **step1_dockerrun.ps1**\
    \ to deploy a SQL Server 2017 CU10 container:\n\n```\n    docker run -e \"ACCEPT_EULA=Y\"\
    \ -e \"SA_PASSWORD=Sql2017isfast\" -p 1401:1433 --name sql2017CU10 --hostname\
    \ sql2017CU10 -v sqlvolume:/var/opt/mssql -d mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
    \    ```\n\nIt is unlikely you have already pulled the SQL 2017 CU10 image so\
    \ it will be pulled first. Notice the use of a volume here which is a key to this\
    \ method of updating SQL Server.\n\n2.  Connect to SQL Server to find the version\
    \ you have installed with the following command or script **step2_dockerconnecttosql.ps1**:\n\
    \n```\n    sqlcmd -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"\
    '\n    ```\n\nYour output should look like the following:\n\n```\n    Microsoft\
    \ SQL Server 2017 (RTM-CU10) (KB4342123) - 14.0.3037.1 (X64)\n    Jul 27 2018\
    \ 09:40:27\n    Copyright (C) 2017 Microsoft Corporation\n    Developer Edition\
    \ (64-bit) on Linux (Ubuntu 16.04.5 LTS)\n    ```\n\n3.  Run the following commands\
    \ to update the container or use the script **step3_dockerupdate.ps1**:\n\n```\n\
    \    docker stop sql2017CU10\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
    \ -p 1401:1433 --name sql2017latest --hostname sql2017latest -v sqlvolume:/var/opt/mssql\
    \ -d mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n    ```\n\nLet me describe\
    \ what is happening here. The first container is stopped and no longer has access\
    \ to the system databases on the volume. The second container starts up *using\
    \ the same volume and port* but a different image for the latest CU build. The\
    \ new container starts SQL Server which recognizes the system databases already\
    \ exist. The engine is smart enough to recognize when the system databases exist\
    \ to just use them. Furthermore, SQL Server is smart enough to perform any necessary\
    \ “update” steps on system and user databases to ensure they are compatible with\
    \ the specific CU build.\n\n4.  Run the following commands to connect to the container\
    \ (remember the same port) to verify the version of SQL Server has been updated\
    \ or use the script **step4_dockerconnecttosql.ps1**:\n\n```\n    sqlcmd -Usa\
    \ -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\nDepending\
    \ on how soon you run this step after the update, you may receive this error:\n\
    \n```\n    Sqlcmd: Error: Microsoft ODBC Driver 17 for SQL Server : Login failed\
    \ for user 'sa'. Reason: Server is in script upgrade mode. Only administrator\
    \ can connect at this time..\n    ```"
