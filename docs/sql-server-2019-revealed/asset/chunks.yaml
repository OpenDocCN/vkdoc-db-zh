- fmt: '### What Is a Graph Database in SQL Server?


    A graph database in SQL Server is using tables to represent *nodes* and *edges*
    in a graph model using T-SQL extensions. The term “database” is logical as it
    is not a different database in the SQL Server sense. In a graph database, a node
    is an entity or object, and an edge is a relationship between nodes.


    A graph database, therefore, is a collection of node and edge tables and the data
    and metadata that bind them together. SQL Server supports extensions to the T-SQL
    language to define a node or edge table through the `AS NODE` or `AS EDGE` syntax
    for `CREATE TABLE`. The complete syntax to create a node or edge table can be
    found at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-table-sql-graph`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-table-sql-graph).


    Additionally, SQL Server supports a new T-SQL keyword called `MATCH` to navigate
    the node and edge tables as part of a `SELECT` statement. The syntax for how to
    use a `MATCH` keyword can be found in the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/queries/match-sql-graph`](https://docs.microsoft.com/en-us/sql/t-sql/queries/match-sql-graph).


    You can read the complete set of documentation for graph database in SQL Server
    and Azure SQL Database at [`https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-overview`](https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-overview).
    You can also see a nice presentation from Kevin Farlee from Microsoft on YouTube
    at [`www.youtube.com/watch?v=xirfl_t4Gqs`](https://www.youtube.com/watch%3Fv%3Dxirfl_t4Gqs).


    The best way to see how a node or edge table works with SQL Server is to run through
    an example.


    ### Using a Graph Database in SQL Server


    Many of you as readers will likely be new to using a graph database in SQL Server,
    so I’ll use a simple example to demonstrate the power of this capability. In fact,
    I’ll use the example provided in the documentation as found at [`https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-sample`](https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-sample),
    but put in a few variations and add commentary to explain the example.


    Consider the concept of a *social network*. Many of you experience this every
    day on platforms like Facebook or LinkedIn. A network by its nature is a connection
    of things typically modeled in a graph. Consider a network of friends as seen
    in Figure [5-4](#479130_1_En_5_Chapter.xhtml#Fig4).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig4_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig4_HTML.jpg)


    Figure 5-4: A network of friends


    In this model of a graph, the nodes are Person, City, and Restaurant. The arrows
    represent the relationships between the nodes; these are the edges. Notice the
    particular relationship called Friends where Persons are related to each other.
    Building out this model in a pure set of relational tables is not all that difficult,
    but traversing the graph using traditional T-SQL queries gets complex.


    Let’s build an example of a graph database using the preceding model, so you can
    get the feel of the basics, and then look at what is new in SQL Server 2019.


    ### Note


    There is no special prerequisite to use the examples for Graph database except
    to install SQL Server 2019 (Windows, Linux, or a Container) and use a tool like
    SQL Server Management Studio (`SSMS`) or Azure Data Studio (`ADS`) (June 2019
    version or later). The graph example in this specific section is designed for
    SQL Server 2019.


    For this example, consider John in this social network. He already knows he is
    friends with Mary and Julie, but he doesn’t know whom they are friends with (and
    who their friends are friends with, and so on). He wants to expand his social
    network and also discover which restaurants his friends like.


    Consider the “social network of friends” in Figure [5-5](#479130_1_En_5_Chapter.xhtml#Fig5).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig5_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig5_HTML.jpg)


    Figure 5-5: The social network of friends


    John doesn’t know the entire network, so he needs to use a graph database to navigate.


    All scripts for graph database examples can be found in the `ch5_modern_development_platform\sqlgraph`
    directory. Using the model in Figure [5-4](#479130_1_En_5_Chapter.xhtml#Fig4)
    as a guide, follow Steps 1-7 in the T-SQL notebook `socialnetwork.ipynb` using
    Azure Data Studio. These steps will show you how to build graph tables as nodes
    and edges, populate data, and then traverse the graph using the T-SQL `MATCH`
    syntax.


    There is also a T-SQL script `socialnetwork.sql` you can use to follow Steps 1-7
    using `SSMS` or `ADS`.


    ### Graph Enhancements for SQL Server 2019


    SQL Server 2019 comes with a few enhancements to help make graph database a more
    powerful and compelling platform for graph data compared to other products. This
    includes:

    - Traversing a graph path using the new `SHORTEST_PATH()` syntax

    - Support for derived tables and views in a graph database

    - Edge constraints to enforce proper graph relationships

    - Using the T-SQL `MERGE` statement to support scenarios like *upsert*


    Let’s review some of these new enhancements.


    #### SHORTEST_PATH


    One of the more common challenges to solve with a graph database is to traverse
    the graph data recursively without having to manually navigate to each level.
    SQL Server 2017 did not support this concept, but SQL Server 2019 provides support
    for this through the new `SHORTEST_PATH()` T-SQL syntax.


    Using `Steps 8 and 9` examples in `socialnetwork.ipynb` and `socialnetwork.sql`,
    see how `SHORTEST_PATH` allows John and Jacob to traverse the social network of
    friends.


    You can see the details of using `SHORTEST_PATH()` in the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-shortest-path`](https://docs.microsoft.com/en-us/sql/relational-databases/graphs/sql-graph-shortest-path)
    or in this blog post by Shreya Verma at [`https://techcommunity.microsoft.com/t5/SQL-Server/Public-Preview-of-Shortest-Path-on-SQL-Server-2019/ba-p/721240`](https://techcommunity.microsoft.com/t5/SQL-Server/Public-Preview-of-Shortest-Path-on-SQL-Server-2019/ba-p/721240).'
