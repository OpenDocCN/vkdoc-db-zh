  trans: "\n### 我应该终止一个活动查询吗？\n\n考虑以下场景。有人告知你 SQL Server 正被一个查询占用，该查询在服务器上消耗了大量 CPU\
    \ 资源。你使用像 `sys.dm_exec_requests` 这样的 DMV 来识别查询和用户。该用户是你的副总裁，正在运行一份报表，而查询是基于一个缓存计划。你使用常见的\
    \ DMV `sys.dm_exec_requests` 和 `sys.dm_exec_query_stats` 来查看哪个查询正在运行。你该如何判断这个查询是会很快完成，还是应该被终止并进行修正？\n\
    \n让我们通过以下示例来观察这种行为，并了解内置的、默认开启的轻量级查询分析如何能帮你找到答案。\n\n你可以在任何能连接到 SQL Server 的工具中运行这些\
    \ T-SQL 脚本，但最佳体验是在 SQL Server Management Studio (SSMS) 中查看所有细节。\n\n1.  打开 T-SQL\
    \ 脚本 `mysmartquery.sql`（这名字或许暗示它没那么智能）并执行该批处理。\n2.  在一个新连接中，打开 T-SQL 脚本 `show_active_queries.sql`。\n\
    3.  运行脚本中的 **步骤 1**，如下所示：\n\n    ```\n    -- 步骤 1: 仅显示除本连接外的活动查询请求\n    SELECT\
    \ er.session_id, er.command, er.status, er.wait_type, er.cpu_time, er.logical_reads,\
    \ eqsx.query_plan, t.text\n    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
    \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
    \ <> @@SPID\n    GO\n    ```\n\n    此代码查找任何活动查询（当前连接除外）。如果你反复运行此查询，你会看到 `cpu`\
    \ 和 `logical_reads` 的值在增加，并且 `wait_type` 为 `ASYNC_NETWORK_IO`。这种模式表明两点：\n    *\
    \   该查询正在消耗大量 CPU 资源，并且很可能在扫描一个大表（`logical_reads` 值高且在增加）。\n    *   有大量结果正被发送回客户端（例如，`ASYNC_NETWORK_IO`\
    \ 等待）。\n\n根据我的经验，这不是一个“好”的查询，存在“优化”的机会。但问题是，你现在应该终止它，还是它“即将完成”？\n\n![活动查询的查询计划分析图](img/479130_1_En_2_Fig21_HTML.jpg)\n\
    \n图 2-21：活动查询的查询计划分析图\n\n1.  当查询处于活动状态时，若能了解查询计划操作符（如实时查询统计信息）的进度会很有帮助。运行脚本中的\
    \ **步骤 2**，如下所示：\n\n    ```\n    -- 步骤 2: 活动查询的查询计划分析图是什么样子\n    SELECT session_id,\
    \ physical_operator_name, node_id, thread_id, row_count, estimate_row_count\n\
    \    FROM sys.dm_exec_query_profiles\n    WHERE session_id <> @@SPID\n    ORDER\
    \ BY session_id, node_id DESC\n    GO\n    ```\n\n    结果应类似于图 2-21。\n\n注意嵌套循环和表假脱机操作符巨大的\
    \ `estimate_row_count`（估计行数）。同时注意 `row_count`（这是当前已处理的行数）远低于估计值。可能估计不准确，但如果估计正确，此查询还远未完成。再次运行此查询以观察这些操作符\
    \ `row_count` 的进展。\n\n### 注意\n\n当轻量级查询分析在 SQL Server 2019 中默认开启时，捕获的唯一统计信息是 `row_count`。默认情况下捕获\
    \ CPU 和 I/O 等统计信息可能开销较大。你可以使用标准分析来捕获这些信息。\n\n![活动查询的查询计划](img/479130_1_En_2_Fig22_HTML.jpg)\n\
    \n图 2-22：活动查询的查询计划\n\n1.  让我们看一下查询计划本身。这是估计的计划，但可能为这些巨大的估计行数提供线索。运行脚本中的 **步骤 3**，如下所示：\n\
    \n    ```\n    -- 步骤 3: 回头查看计划和查询文本以寻找线索\n    SELECT er.session_id, er.command,\
    \ er.status, er.wait_type, er.cpu_time, er.logical_reads, eqsx.query_plan, t.text\n\
    \    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
    \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
    \ <> @@SPID\n    GO\n    ```\n\n    在 SSMS 中，点击 `query_plan` 的值，这应该会打开一个带有可视化查询计划的新窗口。\n\
    \    该计划应类似于图 2-22。\n\n注意嵌套循环联接上带有 **X** 的图标符号。如果将鼠标指针悬停在嵌套循环联接操作符上，它将显示如图 2-23\
    \ 所示。\n\n![嵌套循环联接警告](img/479130_1_En_2_Fig23_HTML.jpg)\n\n图 2-23：嵌套循环联接警告\n\n\
    “无联接谓词”是什么意思？这意味着查询中的 JOIN 操作符存在重大问题。这意味着实际上没有“等值”联接。\n\n在 **步骤 3** 的结果中，查看诊断信息的\
    \ `text` 列的值。它看起来像这样：\n\n```\nSELECT si.CustomerID, sil.InvoiceID, sil.LineProfit\n\
    FROM Sales.Invoices si\nINNER JOIN Sales.InvoiceLines sil\nON si.InvoiceID = si.InvoiceID\n\
    OPTION (MAXDOP 1)\n```\n\n由于 JOIN 操作符有问题，让我们专注于 INNER JOIN 子句：\n\n```\nINNER JOIN\
    \ Sales.InvoiceLines sil\nON si.InvoiceID = si.InvoiceID\n```\n\n你会看到此查询只是将一个表与其自身联接。一个简单的拼写错误\
    \ `si` 与 `sil` 就是问题所在。此查询几乎永远不会完成。它可以被终止或修正，而你的副总裁会高兴得多。\n\n1.  如果 `mysmartquery.sql`\
    \ 中的查询仍在运行，请将其取消。\n\n轻量级查询分析还包括扩展事件和查询提示支持以启用它。你可以在 `https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`\
    \ 阅读更多关于如何启用这些功能以及如何按数据库禁用该功能的信息。\n"
- fmt: "### I Can’t Catch It\n\n考虑另一种场景。你观察到 SQL Server 的 CPU 使用率升高，并且认为这不应该发生（因为这与正常行为不同）。你可以从像\
    \ `sys.dm_exec_query_stats` 这样的 DMV 中看到哪些查询消耗了最多的 CPU，但你只能通过该 DMV 获取估计的执行计划。你可以尝试离线自行运行查询并观察实际执行计划，但你想看到来自应用程序的真实查询的实际执行计划，以确保你掌握了正确的细节。这个查询一直由许多用户运行，但每次只持续几秒钟（因此\
    \ CPU 持续处于较高水平），所以很难使用新工具来捕获正在运行的查询。你可以开启标准查询分析，但你发现那可能太重了，会在查询执行的关键时期导致应用程序问题。\n\
    \nSQL Server 2019 引入了一项名为轻量级查询分析的新功能。一个新的动态管理函数（DMF） `sys.dm_exec_query_plan_stats`\
    \ 随 SQL Server 2019 一同提供。其理念是捕获缓存查询的上一次实际执行计划。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql)\
    \ 阅读关于使用此 DMF 的所有细节。\n\n让我们看看如何使用这个 DMF 来解决一个问题：找到一个一直在运行的查询的实际执行计划，而*无需*开启任何特殊的诊断、开关或标志，也无需手动运行查询。这里唯一需要注意的是，轻量级查询分析的这一部分功能确实需要你为每个想要启用此功能的数据库启用它。你可以使用以下\
    \ T-SQL 语句来完成，该语句将在稍后的示例中使用：\n\n```\nALTER DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS\
    \ = ON\n```\n\n本示例的所有脚本也可以在 `ch2_intelligent_performance\\lwp` 目录中找到。为了更轻松地查看可视化的执行计划，建议你使用\
    \ SSMS 运行此示例。\n\n1.  打开 T-SQL 脚本 `mysmartquery_top.sql`。\n2.  通过运行脚本中的 **Step\
    \ 1** 来设置示例，如下所示：\n\n    ```\n    -- Step 1: 清除过程缓存并将数据库兼容性级别设为 130，以证明你不需 150\
    \ 就能使用最后计划统计信息\n    USE WideWorldImporters\n    GO\n    ALTER DATABASE SCOPED\
    \ CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ALTER DATABASE [WideWorldImporters]\
    \ SET COMPATIBILITY_LEVEL = 130\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET LAST_QUERY_PLAN_STATS = ON\n    GO\n    SELECT COUNT(*) FROM Sales.InvoiceLinesExtended\n\
    \    GO\n    ```\n\n    将数据库兼容性级别设置为 130 只是为了证明你不需要 150 的兼容性级别就能使用此功能。\n\n3. \
    \ 现在，通过运行脚本中的 **Step 2** 来模拟统计信息不正确的情况，如下所示：\n\n    ```\n    -- Step 2: 模拟一个过期的统计信息，将其设为一个非常低的值\n\
    \    UPDATE STATISTICS Sales.InvoiceLinesExtended\n    WITH ROWCOUNT = 1\n   \
    \ GO\n    ```\n\n4.  现在运行查询。它应该只需要几秒钟，但完全消耗 CPU。运行脚本中的 **Step 3** 来执行查询，如下所示：\n\
    \n### 注意\n\n你不需要选择实际执行计划，因为我们是在模拟如何独立于应用程序来查看计划。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg)\n\
    \n图 2-24\n问题查询的估计查询计划\n\n1.  现在，让我们使用标准的 DMV 查看此查询的估计查询计划。运行 **Step 4** 查看估计计划。记住，这允许你从不同的连接查看该查询的计划。\n\
    \n    ```\n    -- Step 4: 估计计划怎么说？看起来像是基于估计的正确计划\n    SELECT st.text, cp.plan_handle,\
    \ qp.query_plan\n    FROM sys.dm_exec_cached_plans AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle)\
    \ AS st\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) AS qp\n    WHERE\
    \ qp.dbid = db_id('WideWorldImporters')\n    GO\n    ```\n\n    从输出中，你想找到 `text`\
    \ 列值以 “**-- Step 3**” 开头的那一行。点击该行的 `query_plan` 值。你应该会看到一个类似于图 [2-24](#479130_1_En_2_Chapter.xhtml#Fig24)\
    \ 的计划。\n\n    ```\n    -- Step 3: 运行一个查询。这应该只需要几秒钟，但完全消耗 CPU\n    SELECT si.InvoiceID,\
    \ sil.StockItemID\n    FROM Sales.InvoiceLinesExtended sil\n    JOIN Sales.Invoices\
    \ si\n    ON si.InvoiceID = sil.InvoiceID\n    AND sil.StockItemID >= 225\n  \
    \  GO\n    ```\n\n    注意从聚集索引扫描出来的那条线有多细。这是因为优化器估计 `InvoiceLinesExtended` 表只有一行。但这只是估计计划，所以你不知道这是否是错误的（你刚刚模拟了估计行数是错误的，但假装你并不知道这一点）。\n\
    \n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg)\n\
    \n    图 2-25\n    问题查询的实际查询计划\n\n1.  现在，让我们使用新的 DMV 来获取此查询的上一次实际计划，看看估计行数是否不正确。运行\
    \ **Step 5**，如下所示：\n\n    ```\n    -- Step 5: 上一次实际计划怎么说？哎呀，实际值与估计值相差甚远\n    SELECT\
    \ st.text, cp.plan_handle, qps.query_plan, qps.*\n    FROM sys.dm_exec_cached_plans\
    \ AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st\n    CROSS\
    \ APPLY sys.dm_exec_query_plan_stats(cp.plan_handle) AS qps\n    WHERE qps.dbid\
    \ = db_id('WideWorldImporters')\n    GO\n    ```\n\n    在这个例子中，我们使用的是 `dm_exec_query_plan_stats`\
    \ 而不是 `dm_exec_query_plan`。在列表中再次找到该查询，并点击 `query_plan` 值。该计划应该看起来像图 [2-25](#479130_1_En_2_Chapter.xhtml#Fig25)。\n\
    \n    注意那些“更粗”的线。这是因为实际需要处理的行数远大于估计值。这是一个问题，也解释了为什么优化器选择使用嵌套循环连接并将 `InvoiceLinesExtended`\
    \ 作为“外部”表（因为它认为只有一行）。\n\n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg)\n\
    \n    图 2-26\n    更优查询的实际计划\n\n1.  更新统计信息以纠正它们，这样你就可以看到查询真正应该做什么。运行脚本中的 **Step\
    \ 6**，如下所示：\n\n    ```\n    -- Step 6: 将统计信息更新为正确的值并清除过程缓存\n    UPDATE STATISTICS\
    \ Sales.InvoiceLinesExtended\n    WITH ROWCOUNT = 3652240\n    GO\n    ALTER DATABASE\
    \ SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ```\n\n2.  使用脚本中的 **Step\
    \ 7** 再次运行查询，让我们看看新的实际计划。你会注意到它运行得快了一点：\n\n    ```\n    -- Step 7: 再次运行查询。更快了\n\
    \    SELECT si.InvoiceID, sil.StockItemID\n    FROM Sales.InvoiceLinesExtended\
    \ sil\n    JOIN Sales.Invoices si\n    ON si.InvoiceID = sil.InvoiceID\n    AND\
    \ sil.StockItemID >= 225\n    GO\n    ```\n\n3.  运行 **Step 8** 看看新的实际计划是否更优。"
  raw: "### I Can’t Catch It\n\nConsider another scenario. You have observed an increase\
    \ in CPU utilization of SQL Server and don’t believe it should be occurring (because\
    \ it is a change from the normal behavior). You can see from a DMV like **sys.dm_exec_query_stats**\
    \ where queries are taking the most CPU, but you only get the estimated plan through\
    \ that DMV. You could try to run the query yourself offline and observe the actual\
    \ plan, but you want to see the actual plan from the real query from the application\
    \ to make sure you know you have the right details. This query runs all the time\
    \ by many users but only takes a few seconds (hence the steady higher CPU all\
    \ the time) so it is hard to use the new tools to capture a query in progress.\
    \ You could turn on standard query profiling, but you have found that may be too\
    \ heavy and cause application issues during the crucial time the query is executed.\n\
    \nWith SQL Server 2019 comes a new capability with Lightweight Query Profiling.\
    \ A new Dynamic Management Function (DMF) called **sys.dm_exec_query_plan_stats**\
    \ now comes with SQL Server 2019\\. The idea is to capture the last actual execution\
    \ plan of a cached query. You can read all the details about using this DMF at\
    \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql)\
    \ .\n\nLet’s see the usage of this DMF to solve a problem of finding the actual\
    \ execution plan of a query that is run all the time *without* turning on any\
    \ special diagnostics, knobs, and flags or running the query manually. The only\
    \ catch here is that this part of Lightweight Query Profiling does require you\
    \ to enable it for each database where you want this capability. You can do this\
    \ with the following T-SQL statement which will be used in the example later:\n\
    \n```\nALTER DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS = ON\n```\n\
    \nAll the scripts for this example can be found also in the **ch2_intelligent_performance\\\
    lwp** directory. To make it easier to see the visual execution plans, I recommend\
    \ you run this example using SSMS.\n\n1.  Open up the T-SQL script **mysmartquery_top.sql.**\n\
    \n2.  Set up the example by running **Step 1** in the script as follows:\n\n \
    \   ```\n    -- Step 1: Clear the procedure cache and set dbcompat to 130 to prove\
    \ you don't need 150 for last plan stats\n    USE WideWorldImporters\n    GO\n\
    \    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ALTER\
    \ DATABASE [WideWorldImporters] SET COMPATIBILITY_LEVEL = 130\n    GO\n    ALTER\
    \ DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS = ON\n    GO\n    SELECT\
    \ COUNT(*) FROM Sales.InvoiceLinesExtended\n    GO\n    ```\n\n    The dbcompat\
    \ is set to 130 just to prove you don’t need dbcompat of 150 for this feature.\n\
    \n3.  Now let’s simulate statistics are incorrect by running **Step 2** in the\
    \ script as follows:\n\n    ```\n    -- Step 2: Simulate a statistic out of date\
    \ to a really low value\n    UPDATE STATISTICS Sales.InvoiceLinesExtended\n  \
    \  WITH ROWCOUNT = 1\n    GO\n    ```\n\n4.  Now run the query. It should only\
    \ take a few seconds, but it is all CPU. Run **Step 3** to execute the query as\
    \ follows:\n\n### Note\n\nYou don’t need to select actual execution plan as we\
    \ are simulating how you will look at plans separately from the application.\n\
    \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg)\n\
    \nFigure 2-24\n\nEstimated query plan for problem query\n\n1.  Now let’s look\
    \ at the estimated query plan for this query using standard DMVs. Run **Step 4**\
    \ to see the estimated plan. Remember this allows you to see the plan for the\
    \ query from a different connection.\n\n```\n    -- Step 4: What does the estimated\
    \ plan say? Looks like the right plan based on estimates\n    SELECT st.text,\
    \ cp.plan_handle, qp.query_plan\n    FROM sys.dm_exec_cached_plans AS cp\n   \
    \ CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle)\
    \ AS qp\n    WHERE qp.dbid = db_id('WideWorldImporters')\n    GO\n    ```\n\n\
    From the output you want to find the row where the **text** column values start\
    \ with “**-- Step 3**.” Click the query_plan value for that row. You should see\
    \ a plan that looks like Figure [2-24](#479130_1_En_2_Chapter.xhtml#Fig24) .\n\
    \n```\n-- Step 3: Run a query. This should only take a few seconds but it is all\
    \ CPU\nSELECT si.InvoiceID, sil.StockItemID\nFROM Sales.InvoiceLinesExtended sil\n\
    JOIN Sales.Invoices si\nON si.InvoiceID = sil.InvoiceID\nAND sil.StockItemID >=\
    \ 225\nGO\n```\n\nNotice how thin the line is coming out of the Clustered Index\
    \ Scan. That is because the optimizer estimates the InvoiceLinesExtended table\
    \ has one row. But this is only the estimated plan, so you don’t know if this\
    \ is wrong (you just simulated the estimated rows being wrong but pretend you\
    \ didn’t know this).\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg)\n\
    \nFigure 2-25\n\nActual query plan for problem query\n\n1.  Now let’s use the\
    \ new DMV to get the last actual plan for this query and see if the estimated\
    \ rows are incorrect. Run **Step 5** as follows:\n\n```\n    -- Step 5: What does\
    \ the last actual plan say? Ooops. Actual vs Estimates way off\n    SELECT st.text,\
    \ cp.plan_handle, qps.query_plan, qps.*\n    FROM sys.dm_exec_cached_plans AS\
    \ cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st\n    CROSS APPLY\
    \ sys.dm_exec_query_plan_stats(cp.plan_handle) AS qps\n    WHERE qps.dbid = db_id('WideWorldImporters')\n\
    \    GO\n    ```\n\nIn this example, we are using **dm_exec_query_plan_stats**\
    \ instead of dm_exec_query_plan. Find the query again in the list and click the\
    \ query_plan value. The plan should look like Figure [2-25](#479130_1_En_2_Chapter.xhtml#Fig25)\
    \ .\n\nNotice the “thicker” lines. That is because the actual number of rows to\
    \ process is much larger than the estimates. This is a problem and explains why\
    \ the optimizer chose to use a Nested Loops Join and make the InvoiceLinesExtended\
    \ the “outer” table (because it thought there was only one row).\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg)\n\
    \nFigure 2-26\n\nActual plan for better query\n\n1.  Update the statistics to\
    \ correct them, so you can see what the query really should be doing. Run **Step\
    \ 6** in the script as follows:\n\n```\n    -- Step 6: Update stats to the correct\
    \ value and clear proc cache\n    UPDATE STATISTICS Sales.InvoiceLinesExtended\n\
    \    WITH ROWCOUNT = 3652240\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE\n    GO\n    ```\n\n2.  Run the query again using **Step\
    \ 7** in the script and let’s see the new actual plan. You will notice it runs\
    \ a bit faster:\n\n```\n    -- Step 7: Run the query again. Faster\n    SELECT\
    \ si.InvoiceID, sil.StockItemID\n    FROM Sales.InvoiceLinesExtended sil\n   \
    \ JOIN Sales.Invoices si\n    ON si.InvoiceID = sil.InvoiceID\n    AND sil.StockItemID\
    \ >= 225\n    GO\n    ```\n\n3.  Run **Step 8** to see if the new actual plan\
    \ is better."
  trans: "\n### 我抓不住它\n\n考虑另一种场景。你观察到 SQL Server 的 CPU 使用率升高，并且认为这不应该发生（因为这与正常行为不同）。你可以从像\
    \ `sys.dm_exec_query_stats` 这样的动态管理视图（DMV）中看到哪些查询消耗了最多的 CPU，但你只能通过该 DMV 获取估计的执行计划。你可以尝试离线自行运行查询并观察实际执行计划，但你想看到来自应用程序的真实查询的实际执行计划，以确保你掌握了正确的细节。这个查询一直由许多用户运行，但每次只持续几秒钟（因此\
    \ CPU 持续处于较高水平），所以很难使用新工具来捕获正在运行的查询。你可以开启标准查询分析，但你发现那可能太重了，会在查询执行的关键时期导致应用程序问题。\n\
    \nSQL Server 2019 引入了一项名为轻量级查询分析的新功能。一个新的动态管理函数（DMF） `sys.dm_exec_query_plan_stats`\
    \ 随 SQL Server 2019 一同提供。其理念是捕获缓存查询的上一次实际执行计划。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql)\
    \ 阅读关于使用此 DMF 的所有细节。\n\n让我们看看如何使用这个 DMF 来解决一个问题：找到一个一直在运行的查询的实际执行计划，而*无需*开启任何特殊的诊断、开关或标志，也无需手动运行查询。这里唯一需要注意的是，轻量级查询分析的这一部分功能确实需要你为每个想要启用此功能的数据库启用它。你可以使用以下\
    \ T-SQL 语句来完成，该语句将在稍后的示例中使用：\n\n```\nALTER DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS\
    \ = ON\n```\n\n本示例的所有脚本也可以在 `ch2_intelligent_performance\\lwp` 目录中找到。为了更轻松地查看可视化的执行计划，建议你使用\
    \ SSMS 运行此示例。\n\n1.  打开 T-SQL 脚本 `mysmartquery_top.sql`。\n2.  通过运行脚本中的 **Step\
    \ 1** 来设置示例，如下所示：\n\n    ```\n    -- Step 1: 清除过程缓存并将数据库兼容性级别设为 130，以证明你不需 150\
    \ 就能使用最后计划统计信息\n    USE WideWorldImporters\n    GO\n    ALTER DATABASE SCOPED\
    \ CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ALTER DATABASE [WideWorldImporters]\
    \ SET COMPATIBILITY_LEVEL = 130\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ SET LAST_QUERY_PLAN_STATS = ON\n    GO\n    SELECT COUNT(*) FROM Sales.InvoiceLinesExtended\n\
    \    GO\n    ```\n\n    将数据库兼容性级别设置为 130 只是为了证明你不需要 150 的兼容性级别就能使用此功能。\n\n3. \
    \ 现在，通过运行脚本中的 **Step 2** 来模拟统计信息不正确的情况，如下所示：\n\n    ```\n    -- Step 2: 模拟一个过期的统计信息，将其设为一个非常低的值\n\
    \    UPDATE STATISTICS Sales.InvoiceLinesExtended\n    WITH ROWCOUNT = 1\n   \
    \ GO\n    ```\n\n4.  现在运行查询。它应该只需要几秒钟，但完全消耗 CPU。运行脚本中的 **Step 3** 来执行查询，如下所示：\n\
    \n### 注意\n\n你不需要选择实际执行计划，因为我们是在模拟如何独立于应用程序来查看计划。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg](img/479130_1_En_2_Fig24_HTML.jpg)\n\
    \n图 2-24\n问题查询的估计查询计划\n\n1.  现在，让我们使用标准的 DMV 查看此查询的估计查询计划。运行 **Step 4** 查看估计计划。记住，这允许你从不同的连接查看该查询的计划。\n\
    \n    ```\n    -- Step 4: 估计计划怎么说？看起来像是基于估计的正确计划\n    SELECT st.text, cp.plan_handle,\
    \ qp.query_plan\n    FROM sys.dm_exec_cached_plans AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle)\
    \ AS st\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) AS qp\n    WHERE\
    \ qp.dbid = db_id('WideWorldImporters')\n    GO\n    ```\n\n    从输出中，你想找到 `text`\
    \ 列值以 “**-- Step 3**” 开头的那一行。点击该行的 `query_plan` 值。你应该会看到一个类似于图 2-24 的计划。\n\n \
    \   ```\n    -- Step 3: 运行一个查询。这应该只需要几秒钟，但完全消耗 CPU\n    SELECT si.InvoiceID, sil.StockItemID\n\
    \    FROM Sales.InvoiceLinesExtended sil\n    JOIN Sales.Invoices si\n    ON si.InvoiceID\
    \ = sil.InvoiceID\n    AND sil.StockItemID >= 225\n    GO\n    ```\n\n    注意从聚集索引扫描出来的那条线有多细。这是因为优化器估计\
    \ `InvoiceLinesExtended` 表只有一行。但这只是估计计划，所以你不知道这是否是错误的（你刚刚模拟了估计行数是错误的，但假装你并不知道这一点）。\n\
    \n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg](img/479130_1_En_2_Fig25_HTML.jpg)\n\
    \n    图 2-25\n    问题查询的实际查询计划\n\n1.  现在，让我们使用新的 DMV 来获取此查询的上一次实际计划，看看估计行数是否不正确。运行\
    \ **Step 5**，如下所示：\n\n    ```\n    -- Step 5: 上一次实际计划怎么说？哎呀，实际值与估计值相差甚远\n    SELECT\
    \ st.text, cp.plan_handle, qps.query_plan, qps.*\n    FROM sys.dm_exec_cached_plans\
    \ AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st\n    CROSS\
    \ APPLY sys.dm_exec_query_plan_stats(cp.plan_handle) AS qps\n    WHERE qps.dbid\
    \ = db_id('WideWorldImporters')\n    GO\n    ```\n\n    在这个例子中，我们使用的是 `dm_exec_query_plan_stats`\
    \ 而不是 `dm_exec_query_plan`。在列表中再次找到该查询，并点击 `query_plan` 值。该计划应该看起来像图 2-25。\n\n\
    \    注意那些“更粗”的线。这是因为实际需要处理的行数远大于估计值。这是一个问题，也解释了为什么优化器选择使用嵌套循环连接并将 `InvoiceLinesExtended`\
    \ 作为“外部”表（因为它认为只有一行）。\n\n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg](img/479130_1_En_2_Fig26_HTML.jpg)\n\
    \n    图 2-26\n    更优查询的实际计划\n\n1.  更新统计信息以纠正它们，这样你就可以看到查询真正应该做什么。运行脚本中的 **Step\
    \ 6**，如下所示：\n\n    ```\n    -- Step 6: 将统计信息更新为正确的值并清除过程缓存\n    UPDATE STATISTICS\
    \ Sales.InvoiceLinesExtended\n    WITH ROWCOUNT = 3652240\n    GO\n    ALTER DATABASE\
    \ SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n    ```\n\n2.  使用脚本中的 **Step\
    \ 7** 再次运行查询，让我们看看新的实际计划。你会注意到它运行得快了一点：\n\n    ```\n    -- Step 7: 再次运行查询。更快了\n\
    \    SELECT si.InvoiceID, sil.StockItemID\n    FROM Sales.InvoiceLinesExtended\
    \ sil\n    JOIN Sales.Invoices si\n    ON si.InvoiceID = sil.InvoiceID\n    AND\
    \ sil.StockItemID >= 225\n    GO\n    ```\n\n3.  运行 **Step 8** 看看新的实际计划是否更优。\n"
- fmt: '## 内存数据库


    在 SQL Server 2014 中，我们引入了一项名为 `In-Memory OLTP` 的功能，其核心概念是内存优化表。此功能中，整张表存储在内存中，而其特殊之处在于**优化的**（即：无锁）访问方式。我们在
    SQL Server 2016 中对 `In-Memory OLTP` 进行了重大增强。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp)
    阅读关于该功能的更多细节。


    在着手规划 SQL Server 2019 新功能时，工程团队的 Slava Oks、Pam Lahoud、Brian Carrig、Argenis Fernandez
    等人共同决定，将一套新的功能套件命名为**内存数据库**，以扩充 `In-Memory OLTP` 的能力。


    以下功能共同构成了内存数据库特性套件：


    - `In-Memory OLTP`

    - `Memory-Optimized TempDB Metadata`

    - `Hybrid Buffer Pool`

    - `Persistent Memory Support`


    你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-database?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-database?view=sqlallproducts-allversions)
    查看此特性套件的完整集合。


    在本节中，我们将介绍除 `In-Memory OLTP`（对 SQL Server 2019 而言并非新功能）之外的所有这些新能力。


    ### 内存优化 TempDB 元数据


    自从我接触 SQL Server 以来，使用临时表的工作负载的并发性能一直是个问题。这导致几乎每一位 SQL Server 管理员都需要将 `tempdb`
    配置为使用多个文件。你可以通过以下资源了解更多关于此探索历程的背景：


    - Bob Ward 在 2017 年 PASS 峰会上的 Inside TempDB 演讲（[`https://www.youtube.com/watch?v=SvseGMobe2w`](https://www.youtube.com/watch?v=SvseGMobe2w)）

    - Paul Randal 关于添加 `tempdb` 文件的博客（[`https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/`](https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/)）


    使用 `tempdb` 文件的一个方面，大多数 SQL 专业人士并未意识到（因为现在这已成为普遍常识），即你是在为 SQL Server 引擎创建一种分区方案，以访问诸如
    `PFS`、`GAM` 和 `SGAM` 等分配页。这种方案很有用，因为使用临时表的工作负载会经历繁重的创建表、分配页、删除表循环。这会在这些系统分配页上引发**闩锁**争用。通过创建多个文件，你分散了对这些页的闩锁争用，从而提升了并发
    `tempdb` 工作负载的性能。


    在创建多个文件后（从 SQL Server 2016 开始，安装程序可以自动完成此操作，或者你也可以手动配置），对于更繁重的并发 `tempdb` 工作负载，你可能会看到更多的页闩锁等待，但这些等待是发生在你可能不识别的对象（如
    `sysschobjs`）所属的页上。这些页闩锁等待是针对 `tempdb` 中系统表页的。当你快速创建和删除表时，SQL Server 必须在系统表页上执行内部读写操作，以保持表元数据的一致性。这些操作导致跨用户的页闩锁压力。过去，当客户在支持服务中遇到系统表上的高页闩锁争用时，我通常会回答：“不幸的是，你必须减少
    `tempdb` 的使用负载以避免此问题。”


    Pam Lahoud 在她的博客 [`https://blogs.msdn.microsoft.com/sql_server_team/tempdb-files-and-trace-flags-and-updates-oh-my/`](https://blogs.msdn.microsoft.com/sql_server_team/tempdb-files-and-trace-flags-and-updates-oh-my/)
    中对这个问题描述得非常清楚。


    SQL Server 2019 提供了一个解决方案：内存优化 `tempdb` 元数据。内存优化表（还记得著名的 Hekaton 项目吗）天生无锁，且这些表的数据全部存在于内存中。如果内存优化表是“仅架构”的，它们甚至没有持久性约束。这是系统表的一个完美平台。由于
    `tempdb` 在每次服务器重启时都会重新创建，系统表不需要持久性。并且由于存储在内存优化表中的唯一数据是元数据（而非你的临时表中的数据），这些表的内存消耗应该很小。此项目的首席开发人员
    Ravinder Vuppula 称其为让 `tempdb` 系统表**Hekaton 化**。


    安装 SQL Server 时，默认情况下 `tempdb` 元数据并不使用内存优化表。你必须运行以下 `T-SQL` 命令来启用此功能：


    ```sql

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON

    ```


    你可以在 2019 年 SQLBits 主题演讲中观看我对该功能的演示：[`https://sqlbits.com/Sessions/Event18/Keynote`](https://sqlbits.com/Sessions/Event18/Keynote)。Brent
    Ozar 在他的博客中谈及此功能（在 2018 年 `PASS` 峰会主题演讲中看到演示后）时说：“……那个 `TempDB` 改进真是太棒了。这才是真正能改变局面的实际改进。人们一直在为
    `TempDB` 争用问题和他们无法解决的闩锁争用问题而苦恼。”'
  raw: "```\n    -- Step 8: What does the actual plan look like now? Different because\
    \ stats are up to date\n    SELECT st.text, cp.plan_handle, qps.query_plan\n \
    \   FROM sys.dm_exec_cached_plans AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle)\
    \ AS st\n    CROSS APPLY sys.dm_exec_query_plan_stats(cp.plan_handle) AS qps\n\
    \    WHERE qps.dbid = db_id('WideWorldImporters')\n    GO\n    ```\n\nIf you click\
    \ the query_plan for the row that matches the text for **“-- Step 7: Run the query\
    \ again…”**, you should now see a plan that looks like Figure [2-26](#479130_1_En_2_Chapter.xhtml#Fig26)\
    \ .\n\nThe plan is radically different. You can see that, in this case, the optimizer\
    \ builds a plan to perform an index seek on the InvoiceLinesExtended table and\
    \ then join to “itself” with a Key Lookup. For the query, based on available indexes,\
    \ that is a far more efficient way to get the results to join to the other tables\
    \ and filter the final results.\n\nNow with the ability to see the actual execution\
    \ plan at any time vs. having to turn on special flags that may be expensive or\
    \ run the query offline, this becomes a powerful part of your toolkit for query\
    \ performance tuning and troubleshooting.\n\nLightweight query profiling is just\
    \ plain cool! If you have spent anytime supporting production SQL Servers for\
    \ performance issues, having built-in diagnostics available anytime, anywhere\
    \ is a breath of fresh air.\n\n## In-Memory Database\n\nIn SQL Server 2014, we\
    \ introduced a feature called In-Memory OLTP, which centered on the concept of\
    \ memory-optimized tables. For this feature, the entire table is stored in memory,\
    \ but it is the *optimized* (read: latch-free) access that makes it special. We\
    \ made significant enhancements to In-Memory OLTP in SQL Server 2016\\. You can\
    \ read more details about that feature at [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp)\
    \ .\n\nAs we were working through the new features for SQL Server 2019, Slava\
    \ Oks, Pam Lahoud, Brian Carrig, Argenis Fernandez, and others from the engineering\
    \ team met together and collectively decided to call a new suite of features *In-Memory\
    \ Database* to add to the capabilities of In-Memory OLTP.\n\nTogether, the following\
    \ features have become the In-Memory Database feature suite:\n\n*   In-Memory\
    \ OLTP\n\n*   Memory-Optimized TempDB Metadata\n\n*   Hybrid Buffer Pool\n\n*\
    \   Persistent Memory Support\n\nYou can see the full collection of this feature\
    \ suite at [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-database?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-database%253Fview%253Dsqlallproducts-allversions)\
    \ .\n\nIn this section, we will cover all of these new capabilities except for\
    \ In-Memory OLTP (which is not new to SQL Server 2019).\n\n### Memory-Optimized\
    \ TempDB Metadata\n\nEven since I’ve been involved with SQL Server, the concurrency\
    \ performance of workloads using temporary tables has been an issue. This has\
    \ led for almost every SQL Server administrator to configure tempdb to use multiple\
    \ files. You can read more about the history of this adventure with these resources:\n\
    \n*   Inside TempDB talk by Bob Ward from the 2017 PASS Summit ( [`https://www.youtube.com/watch?v=SvseGMobe2w`](https://www.youtube.com/watch%253Fv%253DSvseGMobe2w)\
    \ )\n\n*   Paul Randal’s blog on adding tempdb files ( [`https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/`](https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/)\
    \ )\n\nOne aspect to using tempdb files that most SQL professionals don’t realize\
    \ (because it is just common culture now) is that you are creating a partitioning\
    \ scheme for the SQL Server engine to access allocation pages such as PFS, GAM,\
    \ and SGAM pages. This type of scheme is useful because a workload using temporary\
    \ tables results in a heavy create table, allocate pages, drop table cycle. This\
    \ creates contention on these system allocation pages in the form of *latches*.\
    \ By creating multiple files, you are spreading out the contention for latches\
    \ on these pages, which increases performance for concurrent tempdb workloads.\n\
    \nAfter creating multiple files (starting with SQL Server 2016, the setup program\
    \ can do this for you automatically, or you can configure it manually), you may\
    \ see with a heavier concurrent tempdb-based workload more page latch waits, but\
    \ these waits are on pages belonging to objects you may not recognize – objects\
    \ like sysschobjs. These page latch waits are for system table pages in tempdb.\
    \ When you create and drop tables at a rapid pace, SQL Server must perform internal\
    \ read/write operations on pages for system tables to keep the metadata of tables\
    \ consistent. These operations result in page latch pressure across users. In\
    \ the past when customers would run into high page latch contention on system\
    \ tables and contact me in support, I would answer, “Unfortunately you must reduce\
    \ the load of tempdb usage to avoid this problem.”\n\nPam Lahoud describes this\
    \ problem very well in her blog at [`https://blogs.msdn.microsoft.com/sql_server_team/tempdb-files-and-trace-flags-and-updates-oh-my/`](https://blogs.msdn.microsoft.com/sql_server_team/tempdb-files-and-trace-flags-and-updates-oh-my/)\
    \ .\n\nAlong comes a solution for SQL Server 2019, memory-optimized tempdb metadata.\
    \ Memory-optimized tables (remember the famous project Hekaton) are latch-free\
    \ by their nature, and the data for these tables all exist in memory. If the memory-optimized\
    \ tables are “schema only,” they don’t even have durability constraints. This\
    \ is a perfect platform for tempdb system tables. Since tempdb is recreated with\
    \ each server restart, the system tables don’t need to be durable. And since the\
    \ only data being stored in memory-optimized tables is metadata (not your data\
    \ in your temporary tables), the memory consumption for these should be small.\
    \ Ravinder Vuppula, the lead developer for this project, called it making tempdb\
    \ system tables *Hekatonized*.\n\nTempdb metadata does not use memory-optimized\
    \ tables by default when you install SQL Server. You must run the following T-SQL\
    \ command to enable this capability:\n\n```\nALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED\
    \ TEMPDB_METADATA = ON\n```\n\nYou can see me demo this feature at the 2019 SQLBits\
    \ keynote at [`https://sqlbits.com/Sessions/Event18/Keynote`](https://sqlbits.com/Sessions/Event18/Keynote)\
    \ . Brent Ozar on his blog said about this feature, after seeing it demonstrated\
    \ at the 2018 PASS Summit keynote, “…that TempDB improvement is just sweet. That’s\
    \ the kind of real-world improvement that will make a difference. People have\
    \ been struggling with TempDB contention issues and latch contention issues they\
    \ can’t solve.”"
