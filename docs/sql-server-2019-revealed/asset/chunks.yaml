    \ sa 密码。ADS 应能像连接其他任何 SQL Server 一样连接并与容器交互。\n\n图 7-5 展示了使用 ADS 连接到 WideWorldImporters\
    \ 数据库并执行查询的界面。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg](img/479130_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**\n\n使用 Azure Data Studio 连接到容器\n\n1.  让我们通过停止容器、移除它、移除卷并移除镜像来清理所有资源，使用以下命令或脚本\
    \ `cleanup.sh`：\n\n    ```\n    sudo docker stop sql2019latest\n    sudo docker\
    \ rm sql2019latest\n    sudo docker volume rm sqlvolume\n    sudo docker rmi mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    \    ```\n\n现在你已经了解了部署和管理带有 SQL Server 的容器的基础知识，包括在卷中持久化用户数据库，让我们运用这些技能来学习一种使用容器更新\
    \ SQL Server 的新颖独特方式。\n\n## 一种更新 SQL Server 的新方法\n\n我在本章开头提到过，容器提供了一种全新且令人惊叹的更新\
    \ SQL Server 的方法。让我们看看它的实际操作。由于本书编写时 SQL Server 2019 仍处于预览版，没有可用于展示 2019 版容器更新的累积更新。因此，在此示例中，我将展示如何使用\
    \ SQL Server 2017 来更新容器。一旦 SQL Server 2019 正式发布并开始提供累积更新，你将能够使用相同的方法。\n\n想象一下这个场景以理解示例：你目前正在生产环境中运行带有\
    \ SQL Server 2017 累积更新 (CU) 10 的容器。你需要为 SQL Server 2017 应用最新的 CU。在 Windows 或 Linux\
    \ 上，此过程是对当前 SQL Server 实例进行修补或更新，这需要重启 SQL Server。\n\n容器提供了一种新方法，虽然也需要重启，但更新速度更快，并为回滚提供了巨大优势。记住\
    \ SQL Server 容器是预安装的。因此，当你运行基于任何累积更新的 SQL Server 容器时，你并不是在修补现有软件。\n\n所有展示更新实际操作的示例都可以在\
    \ `ch7_inside_sql_containers\\update` 找到。Windows 用户可以使用 `dockerpowershell` 目录，而\
    \ Linux 和 macOS 用户可以使用 `dockerbash` 目录（确保使用 `chmod u+x <script>` 使你的脚本可执行）。\n\n\
    我将在本节中引导你完成 PowerShell 的体验。\n\n1.  运行以下命令或脚本 `step1_dockerrun.ps1` 来部署一个 SQL Server\
    \ 2017 CU10 容器：\n\n    ```\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
    \ -p 1401:1433 --name sql2017CU10 --hostname sql2017CU10 -v sqlvolume:/var/opt/mssql\
    \ -d mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n    ```\n\n    你很可能还没有拉取\
    \ SQL 2017 CU10 镜像，所以它会先被拉取。注意这里使用了卷，这是这种 SQL Server 更新方法的关键。\n\n2.  使用以下命令或脚本\
    \ `step2_dockerconnecttosql.ps1` 连接到 SQL Server 以查找已安装的版本：\n\n    ```\n    sqlcmd\
    \ -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\n\
    \    你的输出应类似于：\n\n    ```\n    Microsoft SQL Server 2017 (RTM-CU10) (KB4342123)\
    \ - 14.0.3037.1 (X64)\n    Jul 27 2018 09:40:27\n    Copyright (C) 2017 Microsoft\
    \ Corporation\n    Developer Edition (64-bit) on Linux (Ubuntu 16.04.5 LTS)\n\
    \    ```\n\n3.  运行以下命令来更新容器，或使用脚本 `step3_dockerupdate.ps1`：\n\n    ```\n    docker\
    \ stop sql2017CU10\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
    \ -p 1401:1433 --name sql2017latest --hostname sql2017latest -v sqlvolume:/var/opt/mssql\
    \ -d mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n    ```\n\n    让我描述一下这里发生了什么。第一个容器被停止，不再能访问卷上的系统数据库。第二个容器启动，*使用相同的卷和端口*，但使用了最新\
    \ CU 版本的不同镜像。新容器启动 SQL Server，它识别出系统数据库已经存在。引擎足够智能，能在系统数据库存在时直接使用它们。此外，SQL Server\
    \ 足够智能，能够对系统和用户数据库执行任何必要的“更新”步骤，以确保它们与特定的 CU 版本兼容。\n\n4.  运行以下命令连接到容器（记住是同一个端口）以验证\
    \ SQL Server 版本已更新，或使用脚本 `step4_dockerconnecttosql.ps1`：\n\n    ```\n    sqlcmd\
    \ -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\n\
    \    根据你在更新后执行此步骤的时间早晚，你可能会收到此错误：\n\n    ```\n    Sqlcmd: Error: Microsoft ODBC\
    \ Driver 17 for SQL Server : Login failed for user 'sa'. Reason: Server is in\
    \ script upgrade mode. Only administrator can connect at this time..\n    ```\n"
- fmt: 'This is because SQL Server is performing any necessary steps to update system
    and user databases to ensure they are compatible with the new CU. No user data
    is affected.


    Technically not every CU update requires any changes to metadata for system and
    user databases. However, we have discovered we “attempt” to run these update steps
    for any CU change. This can slow down the update process, but it is far faster
    than having to actually patch the SQL Server. There is a trick to avoid this,
    but it is only for debugging purposes. Trace flag 902 can bypass any of these
    CU update steps.


    This means you could run your container by adding this statement to the end of
    the docker run commands you have used to this point.


    ```

    /opt/mssql/bin/sqlservr -T902

    ```


    This is an interesting trick docker provides. I have shown you that the `CMD`
    statement is what docker uses to run the program for the container. Turns out
    you can override this for a container image by specifying a program to run instead.
    By running SQL Server with this trace flag, you can start a container with `sqlservr`
    using the trace flag to override the default. I use this when I demo this new
    way to update containers, but it is only for demo purposes. I’ve discussed in
    our engineering team with one of our development leads Li Zhang that perhaps in
    the future we can get clever to only run the update steps when needed.


    Eventually, the query to connect will work, and your output should look like this:


    ```

    Microsoft SQL Server 2017 (RTM-CU16) (KB4508218) - 14.0.3223.3 (X64)

    Jul 12 2019 17:43:08

    Copyright (C) 2017 Microsoft Corporation

    Developer Edition (64-bit) on Linux (Ubuntu 16.04.6 LTS)

    ```


    You may get a different version because when you try these steps, there are probably
    other later CU builds for SQL Server 2017. The key is that the version should
    be later than CU10, and you didn’t have to patch SQL Server.


    ## Rolling Back to a Previous CU


    While the update in itself is nice, the true compelling story is rollback. In
    fact, it is not really a rollback story but a *switch* story. This is because
    `SQL Server CU builds are compatible with each other`. By using the same volume
    and port, you can now switch back to CU10 by simply running these statements or
    the script `step5_dockerrollback.ps1`:


    ```

    docker stop sql2017latest

    docker start sql2017CU10

    ```


    Since the parameters for the containers are saved, you are really just switching
    to installed versions of SQL Server against the same set of system and/or user
    databases.


    ## Verifying the Rollback


    Run the following command or script `step6_dockerconnecttosql.ps1` to prove you
    are now back and running SQL 2017 CU10:


    ```

    sqlcmd -Usa -PSql2017isfast ''-Slocalhost,1401'' ''-Q"SELECT @@VERSION"''

    ```


    Again, you might get the script upgrade error, but fairly quick your results should
    show SQL 2017 CU10 as the version.


    You could now just switch back and forth per your needs. Imagine even a world
    where you pre-pull images for a series of CU builds you want to use for production
    on your local server. Then you can start containers with any CU build you need
    per your application or company requirements.


    What is really compelling is to use containers to test a specific CU on a test
    server and then bring it to your production server to update at the right time.


    ## Cleaning Up Resources


    Clean up all your resources with the `cleanup.ps1` script. If you want to remove
    all resources but keep the images to test this sequence faster, use the `reset.ps1`
    script.


    ## Deploying Container As an Application


    There are situations where you may want to *customize* the SQL Server container
    image. Customized containers involve using the SQL Server container image as the
    base and adding files to the container image. In many cases, these files are database
    backups and/or script files.


    One scenario to customize the SQL container image is to deploy multiple containers
    as an application. An example of this, which my colleague Vin Yu often demonstrates,
    deploys a SQL Server container with a database and an ASP.Net application. You
    can view an example of building a containerized application with SQL Server like
    this at [`https://docs.docker.com/compose/aspnet-mssql-compose/`](https://docs.docker.com/compose/aspnet-mssql-compose/).


    One tool that is very helpful to build multiple container images and run containers
    based on those images is `docker-compose`. Docker-compose allows you to declare
    the definition of container images to build along with parameters to run containers
    based on those images.


    A great example of an application involving SQL Server that needs multiple containers
    is SQL Server Replication. Since SQL Server Replication is now supported in SQL
    Server 2019, containers provide an interesting deployment method. In 2018, Vin
    Yu and I had to present at various conference new features coming for SQL Server
    on Linux. I asked Vin to present the replication story. As we were preparing our
    demos, he asked me to look over what he had built. He said he used containers
    to deploy snapshot replication with a publisher, distributor, and subscriber with
    a single command. My first reaction to Vin was “you can’t do that.” I loved that
    he proved me wrong. Let’s use the example he built for that demo (which you can
    also find on our samples on GitHub at [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication)).


    All files for this example can be found at `ch7_inside_sql_containers\sqlrepl`.
    Because we will use `docker-compose` for this example, we don’t need a PowerShell
    vs. bash version of the scripts. We will provide a set of Bash shell and T-SQL
    scripts, but they *run in the context of each container*.


    Since this example will only take a single command to deploy and run the containers
    to deploy SQL Server replication, let’s take a look at all the files provided
    for this example before you run it.


    ### The docker-compose.yml File


    `docker-compose` relies on a declarative text file called `docker-compose.yml`
    (which is a YAML file. YAML stands for Yet Another Markup Language). You can use
    a different file name, but by default `docker-compose` looks for a file called
    `docker-compose.yml`.


    Let’s look at the `docker-compose.yml` file for this example. The version tag
    at the top of the file declares what version of `docker-compose` should be used
    (3 is the latest but you can read about compose versioning at [`https://docs.docker.com/compose/compose-file/compose-versioning/`](https://docs.docker.com/compose/compose-file/compose-versioning/)).


    ```

    services:

    db1:

    build: ./db1

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2500:1433"

    container_name: db1

    hostname: db1

    db2:

    build: ./db2

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2600:1433"

    container_name: db2

    hostname: db2

    ```


    There are two “services” or containers that will be built and executed by `docker-compose`.
    One called `db1` and one called `db2`.


    The method in which `docker-compose` works is to first build a container image
    (if the `build` clause is provided) and then run a container based on that image
    using the other parameters in the `docker-compose.yml` file.


    The clause


    ```

    build: ./db1

    ```


    indicates `docker-compose` should change to the `db1` directory from the current
    directory and execute a `docker build` in that directory. The same concept applies
    for `db2`.


    The rest of the definition in the yml file defines how to run the built container
    in each directory.


    ```

    environment:

    SA_PASSWORD: "MssqlPass123"

    ACCEPT_EULA: "Y"

    MSSQL_AGENT_ENABLED: "true"

    ports:

    - "2500:1433"

    container_name: db1

    hostname: db1

    ```


    Each of these values is passed to the `docker run` command used to run the container
    after it is built. Note the use of `MSQL_AGENT_ENABLED` in this example because
    SQL Server Replication relies on SQL Server Agent.'
