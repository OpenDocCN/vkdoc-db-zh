- fmt: '## Edge Constraints


    While the `NODE` and `EDGE` T-SQL syntax provides a very nice new way of building
    graph data using SQL Server tables, in SQL Server 2017 there was no way to enforce
    *integrity* of node and edge data. Just like the concept of foreign key constraints
    in SQL Server tables, SQL Server 2019 provides the ability to enforce data integrity
    with nodes and edges.


    Consider the social network you just built using the examples in this chapter.
    It would be nice to ensure that any data for the `friendOf` edge table has to
    be from a valid row in the `Person` table. Edge constraints provide this capability.


    In addition, edge constraints enforce proper network relationships. In our social
    network model, a `Person` can like a `Restaurant`, but a `Restaurant` cannot like
    a `Person`. An edge constraint can enforce this, too. Furthermore, edge constraints
    ensure that edges are not left *dangling*. With edge constraints, you cannot delete
    a node that is part of an edge relationship if data exists in the edge table.
    Again, this behavior is similar to foreign keys in traditional relational tables.


    You can read more about edge constraints in the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/graph-edge-constraints`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/graph-edge-constraints)
    or in another blog post by Shreya at [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/09/28/public-preview-of-graph-edge-constraints-on-sql-server-2019/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/09/28/public-preview-of-graph-edge-constraints-on-sql-server-2019/).


    ## Using MERGE with Graph Tables


    SQL Server provides a T-SQL statement called `MERGE` which performs insert, update,
    or delete operations on a target table based on the results of a join with a source
    table. In SQL Server 2017, you can use the `MERGE` statement to consolidate DML
    operations on node tables, but not on edge tables. SQL Server 2019 now provides
    the capability to use `MERGE` with edge tables as well.


    Take a look at some great examples by Shreya in her blog post on this topic at
    [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/07/16/match-support-in-merge-dml-for-graph-tables/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/07/16/match-support-in-merge-dml-for-graph-tables/).


    ## UTF-8 Support


    Applications and databases have been using Unicode as a standard to encode character
    data as far back as the early 1990s. SQL Server on Windows has included data types
    and collations to support Unicode encoding of character data almost as long as
    the product has existed. SQL Server 2019 introduces a new method for Unicode encoding
    called `UTF-8`, which is widely used by applications and databases normally on
    Linux systems.


    If you would like to read more about the basics of Unicode before reading this
    section, you can use these resources:


    [`https://docs.microsoft.com/en-us/windows/win32/intl/unicode`](https://docs.microsoft.com/en-us/windows/win32/intl/unicode)

    [`https://en.wikipedia.org/wiki/Unicode`](https://en.wikipedia.org/wiki/Unicode)

    [`https://unicode.org/standard/WhatIsUnicode.html`](https://unicode.org/standard/WhatIsUnicode.html)


    ### Unicode and SQL Server


    The normal way SQL Server supports Unicode encoding is through the `nchar` and
    `nvarchar` data types. SQL Server supports Unicode encoding of these data types
    using the `UTF-16` encoding scheme. `UTF-16` requires a minimum 2 bytes per “character”
    to store data. The ASCII character using `UTF-16` “a” requires 2 bytes of storage.
    When you define a column like the following:


    ```

    col1 nchar(10) not null

    ```


    SQL Server requires 20 bytes of storage for this column, even if you are using
    just standard ASCII characters.


    This is opposed to the following column definition:


    ```

    col1 char(10) not null

    ```


    which requires 10 bytes but can only store characters from the ASCII character
    set.


    ### Note


    It is a very common mistake for developers and data professionals to use `nchar`,
    `char`, and so on and assume the length is the number of characters not byte storage.


    `UTF-16` allows for the entire spectrum of Unicode characters because many characters
    for language support outside of just ASCII characters require 2 bytes to represent
    the character.


    ### Why Would You Use UTF-8?


    While the majority of applications and databases like SQL Server use `UTF-16`
    for Unicode character encoding, many in the Linux community use an encoding called
    `UTF-8`. `UTF-8` is similar to `UTF-16`, in that it supports the entire Unicode
    character set, but uses a different encoding and byte storage scheme depending
    on which character is being stored. For example, ASCII characters only require
    1 byte of storage in `UTF-8` but require 2 bytes in `UTF-16`.


    Consider an application that was only developed for the ASCII character set but
    needs to be updated to support all Unicode characters. It is possible this application
    uses `char` and `varchar` data types in SQL Server. Before SQL Server supported
    `UTF-8`, the data professional would need to change the data types of all SQL
    Server columns from `char` to `nchar` and `varchar` to `nvarchar`. Using `ALTER
    TABLE` to change data types in this fashion for ASCII characters practically doubles
    the storage requirements for these columns even if you initially are only using
    ASCII characters.


    Now with SQL Server 2019, an alternative is to leave your data types as `char`
    and `varchar` but change the collation of the columns to use the new `UTF-8` collations,
    such as `LATIN1_GENERAL_100_CI_AS_SC_UTF8`. `ALTER TABLE` allows you to change
    the collation at the column level. `UTF-8` encoding for characters only requires
    1 byte of storage for ASCII characters.


    Make these decisions carefully, as there are some restrictions for `UTF-8`, and,
    for certain characters, the storage requirements are larger for `UTF-8` (not ASCII)
    than `UTF-16`.


    `UTF-8` is supported for SQL Server for Windows, Linux, and containers (remember
    “Windows” collations are supported for SQL Server on Linux because of the SQLPAL
    architecture. The documentation says `UTF-8` is only supported for Windows collations
    not SQL collations).


    Use these resources to study whether `UTF-8` is for you:


    [`https://cloudblogs.microsoft.com/sqlserver/2018/12/18/introducing-utf-8-support-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/18/introducing-utf-8-support-in-sql-server-2019-preview/)

    [`https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support`](https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support)

    [`https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support#utf8`](https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support#utf8)'
