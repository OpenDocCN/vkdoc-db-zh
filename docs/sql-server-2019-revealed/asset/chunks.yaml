- fmt: "## Excessive Memory Grant\n\nLet’s look at an example where the memory grant\
    \ was too large for what memory is really needed. As I mentioned earlier, if the\
    \ memory grant is very large and not what is really needed, it could be harmless\
    \ – but it could also lead to unexpected memory pressure or performance problems.\n\
    \nThis example is a little more complicated to run and requires simulation of\
    \ concurrent users. Therefore, for this example, you will need the free tool called\
    \ `ostress`, which can be downloaded at [`www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511).\
    \ This tool currently requires a Windows client computer.\n\nTo see how this problem\
    \ can lead to unexpected performance problems and `RESOURCE_SEMAPHORE` waits,\
    \ use the following steps. All scripts are found in the `ch2_intelligent_performance\\\
    iqp\\rowmodemgf` directory. I built all the command shell scripts to use the `sa`\
    \ login.\n\n1.  First, we need to adjust the resource governor setting for the\
    \ maximum amount of granted memory for the server by running the script `adjustrg.cmd`\
    \ (which runs the T-SQL script `adjustrg.sql`). This script assumes a server name\
    \ of `bwsql2019` so you will need to edit this for your server. I make this adjustment\
    \ in order to allow SQL Server to acquire a very large excessive grant as part\
    \ of the example.\n\n    ```\n    ALTER WORKLOAD GROUP [default]\n    WITH (REQUEST_MAX_MEMORY_GRANT_PERCENT\
    \ = 50)\n    GO\n    ALTER RESOURCE GOVERNOR RECONFIGURE\n    GO\n    ```\n\n\
    2.  Now execute the script `turn_off_mgf.cmd` (which executes the T-SQL script\
    \ `turn_off_mgf.sql`).\n\n    ```\n    -- Turn off memory grant feedback\n   \
    \ USE [WideWorldImportersDW]\n    GO\n    -- Step 2: Simulate statistics out of\
    \ date\n    UPDATE STATISTICS Fact.OrderHistory\n    WITH ROWCOUNT = 5000000000\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    \    ALTER DATABASE SCOPED CONFIGURATION SET ROW_MODE_MEMORY_GRANT_FEEDBACK =\
    \ OFF\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION SET BATCH_MODE_MEMORY_GRANT_FEEDBACK\
    \ = OFF\n    GO\n    ```\n\nIn this example script, I’ll use a technique similar\
    \ to the previous example for an underestimated grant, this time changing the\
    \ statistics to a number far greater than the number of rows in the table.\n\n\
    ### Note\n\nOver the years, I’ve seen several examples where the cardinality estimation\
    \ appears to be greater than it should be. One example is linked server queries\
    \ where there is no access to statistics for the remote data source. In these\
    \ cases, the cardinality estimates may be inaccurate and unusually large.\n\n\
    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig9_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9: Properties for an excessive memory grant\n\n1.  Now run the script\
    \ `rowmode_mgf.cmd` which will run the T-SQL script `rowmode_mgf.sql`.\n\n   \
    \ ```\n    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\n    FROM\
    \  Fact.OrderHistory AS fo\n    INNER JOIN Dimension.[Stock Item] AS si\n    ON\
    \ fo.[Stock Item Key] = si.[Stock Item Key]\n    WHERE fo.[Lineage Key] = 9\n\
    \    AND si.[Lead Time Days] > 19\n    ORDER BY fo.[Order Key], fo.Description,\
    \ si.[Lead Time Days]\n    OPTION (MAXDOP 1)\n    GO\n    ```\n\n    This query\
    \ is similar to the example from the underestimated memory grant but with an `ORDER\
    \ BY` to add in a sort operator.\n\n    The command shell script will use `ostress`\
    \ to run this T-SQL query with ten concurrent users, repeated ten times for each\
    \ user. While this script is running, use another SQL session to run the script\
    \ `dm_exec_requests.sql` to observe what type of waits queries may encounter.\
    \ You will notice a significant number of waits on `RESOURCE_SEMAPHORE`. You can\
    \ run this script repeatedly while the overall `ostress` script is running. These\
    \ waits explain the long duration of the `ostress` script.\n\n    The total time\
    \ of this `ostress` script execution should be over 40 seconds. When the script\
    \ completes, your output should look like this:\n\n    ```\n     [0x000046CC]\
    \ OSTRESS exiting normally, elapsed time: 00:00:43.833\n     [0x000046CC] RsFx\
    \ I/O completion thread ended.\n    ```\n\n2.  Execute a single query by using\
    \ `rowmode_mgf.sql` and look at the memory grant properties of the query plan\
    \ in SQL Server Management Studio. Use the same techniques as you did in the previous\
    \ part of this chapter to see the Properties of the `SELECT` operator for the\
    \ plan. Expand the `MemoryGrantInfo` section. The results should look similar\
    \ to Figure [2-9](#479130_1_En_2_Chapter.xhtml#Fig9).\n\nHere is a description\
    \ of the key properties:\n\n`DesiredMemory` – This is the ideal memory grant based\
    \ on cardinality estimates. This number is around ~56Gb. That is a crazy amount\
    \ of memory!\n\n`GrantedMemory` – We can’t let this query have 56Gb of memory,\
    \ so we only grant it around 5Gb. That is still a significant amount of memory\
    \ for a grant.\n\n`MaxUsedMemory` – This is the memory actually used for a grant\
    \ during the query which you can see is only 3Mb. This is definitely an example\
    \ of an excessive memory grant compared to what is needed.\n\n1.  Now let’s turn\
    \ on memory grant feedback by executing the command script `turn_on_mgf.cmd` (which\
    \ runs the T-SQL script `turn_on_mgf.sql`).\n\n2.  Let’s run the workload again\
    \ by executing `rowmode_mgf.cmd`. The execution should complete in half the time\
    \ (typically around 20 seconds). If you run `dm_exec_requests.sql` while the `ostress`\
    \ script is running, you will see a brief blip of `RESOURCE_SEMAPHORE` waits,\
    \ and then it will go away because memory grant feedback has kicked in and reduced\
    \ the size of the memory grant more in line with the grant actually needed for\
    \ the query.\n\n### Tip\n\nTry running `rowmode_mgf.cmd` a second time. Is it\
    \ faster? It actually might run a bit faster now. This is because when you ran\
    \ `rowmode_mgf.cmd` the first time, the first executions of the query were happening\
    \ very quickly, and the cached plan had not been updated with the new grant. But\
    \ as further executions ran, they were using the new grant. When you ran `rowmode_mgf.cmd`\
    \ the second time, all queries were using the new memory grant.\n\n1.  If you\
    \ look at the `SELECT` operator properties for the memory grant from `rowmode_mgf.sql`,\
    \ you will see the memory grant numbers line up closer to what should be used\
    \ for the query.\n\n2.  Restore the state of the database, table statistics, and\
    \ resource governor by running the scripts `adjustrgback.cmd` and `restore_orderhistory_state.cmd`.\n\
    \n### Note\n\nEven with the feedback system, in some cases, the actual needed\
    \ memory grant can be very large. Large enough that concurrent users will encounter\
    \ `RESOURCE_SEMAPHORE` waits to cause memory pressure within SQL Server. In these\
    \ cases, you can use resource governor to limit the amount of memory for grants.\
    \ See the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-workload-group-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-workload-group-transact-sql)\
    \ on how to change this. In SQL Server 2019, this value can now be a float value\
    \ so values < 1% are valid. This could be important with systems with a large\
    \ amount of memory. In addition, you can set these values at the query level.\
    \ See the documentation at [`https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query#arguments`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query%2523arguments).\n\
    \nThis system is well designed and could really help save you time on expensive\
    \ tuning for workloads requiring memory grants.\n\nThere are a few scenarios where\
    \ memory grant feedback will not be enabled or will not take effect:\n\n*   There\
    \ is no spill detected, or 50% of the granted memory is used.\n*   There is a\
    \ fluctuation where the memory grant is being reduced and increased constantly."
