    \ container\n    34s        Normal  Started           Pod         Started container\n\
    \    40s        Normal  SuccessfulCreate  ReplicaSet  Created pod: mssql-deployment-7b6565d684-gq48v\n\
    \    ```\n\n7.  Try to connect to SQL Server using the LoadBalancer service with\
    \ the following command or script **step18_testsql.sh**:\n\n```\n    SERVERIP=$(kubectl\
    \ get service | grep mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd\
    \ -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\n    ```\n\nBecause\
    \ we are using a LoadBalancer bound to the pod, the connection remains the same,\
    \ even though the pod has a new private IP address.\n\n8.  Clean up all resources\
    \ by running the following commands or script **cleanup.sh**:\n\n```\n    kubectl\
    \ delete namespace mssql\n    kubectl config delete-context mssql\n    kubectl\
    \ config use-context bwsqlaks\n    ```\n\nYou have now seen the fundamental HA\
    \ capabilities of SQL Server running in k8s. For the scenario where a node is\
    \ no longer available, simulating a true crash of a node would require you to\
    \ gain direct access to the VMs supporting a node and “crashing” it. However,\
    \ you can see the behavior for how k8s would automatically schedule the SQL Server\
    \ deployment based on the ReplicaSet definition by running the following command:\n\
    \n```\nkubectl drain \n```\n\nYou can bring your node back online for scheduling\
    \ (but it doesn’t mean pods would be moved to that node) by running the following\
    \ command:\n\n```\nkubectl uncordon \n```\n\nNow let’s examine how you can update\
    \ SQL Server in k8s similar to how you updated a container in Chapter [7](#479130_1_En_7_Chapter.xhtml)."
  trans: '## 3. 运行以下命令或脚本 `step14_getpods.sh` 以查看所有内容是否相同：


    ```

    kubectl get pods -o wide

    ```


    你的结果应该与之前相同，因为容器在同一个节点上的同一个 Pod 中重启了：


    ```

    NAME                               READY  STATUS   RESTARTS    AGE  IP           NODE                      NOMINATED
    NODE  READINESS GATES

    mssql-deployment-7b6565d684-8r7cc  1/1    Running  1           91m  10.244.1.11  aks-nodepool1-90949249-0

    ```


    运行以下命令以查看事件序列：


    ```

    kubectl get events

    ```


    你的结果应该类似于：


    ```

    LAST SEEN   TYPE     REASON    KIND   MESSAGE

    16s         Normal   Pulled    Pod    Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    16s         Normal   Created   Pod    Created container

    16s         Normal   Started   Pod    Started container

    ```


    ## 4. 尝试连接到 SQL Server，使用以下命令或脚本 `step15_testsql.sh` 查看一切是否正常：


    ```

    SERVERIP=$(kubectl get service | grep mssql-service | awk {''print $4''})

    PORT=31433

    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q"SELECT @@version"

    ```


    你应该能够看到成功连接到 SQL Server 并显示了版本信息。


    ## 5. 使用以下命令或脚本 `step16_pod_failure.sh` 测试 Pod 故障：


    ```

    kubectl delete pod -l app=mssql

    ```


    在这个例子中，我们不是按名称指定 Pod，而是利用了我们为 Pod 关联了一个易于记忆的标签这一点。


    你应该会看到类似这样的消息：


    ```

    pod "mssql-deployment-7b6565d684-8r7cc" deleted

    ```


    ## 6. 使用以下命令或脚本 `step17_getpods.sh` 检查 Pod 的状态，包括 IP 地址：


    ```

    kubectl get pods -o wide

    ```


    从输出中可以看到，Pod 现在运行在同一个节点上（它也可能被调度到一个新节点），并有了新的名称和新的 IP 地址：


    ```

    NAME                                READY   STATUS    RESTARTS   AGE     IP            NODE                       NOMINATED
    NODE   READINESS GATES

    mssql-deployment-7b6565d684-gq48v   1/1     Running   0          2m55s  10.244.1.12   aks-nodepool1-90949249-0

    ```


    使用以下命令查看事件序列：


    ```

    kubectl get events

    ```


    你的输出将显示终止旧 Pod 并创建新 Pod 的序列，类似于：


    ```

    LAST SEEN  TYPE    REASON            KIND        MESSAGE

    6m53s      Normal  Pulled            Pod         Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    6m53s      Normal  Created           Pod         Created container

    6m53s      Normal  Started           Pod         Started container

    39s        Normal  Killing           Pod         Killing container with id docker://mssql:Need
    to kill Pod

    40s        Normal  Scheduled         Pod         Successfully assigned mssql/mssql-deployment-7b6565d684-gq48v
    to aks-nodepool1-90949249-0

    34s        Normal  Pulled            Pod         Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    34s        Normal  Created           Pod         Created container

    34s        Normal  Started           Pod         Started container

    40s        Normal  SuccessfulCreate  ReplicaSet  Created pod: mssql-deployment-7b6565d684-gq48v

    ```


    ## 7. 使用以下命令或脚本 `step18_testsql.sh` 尝试通过 LoadBalancer 服务连接到 SQL Server：


    ```

    SERVERIP=$(kubectl get service | grep mssql-service | awk {''print $4''})

    PORT=31433

    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q"SELECT @@version"

    ```


    因为我们将 LoadBalancer 绑定到了 Pod，所以即使 Pod 有了新的私有 IP 地址，连接保持不变。


    ## 8. 通过运行以下命令或脚本 `cleanup.sh` 清理所有资源：


    ```

    kubectl delete namespace mssql

    kubectl config delete-context mssql

    kubectl config use-context bwsqlaks

    ```


    现在你已经了解了 SQL Server 在 k8s 中运行的基本 HA（高可用）能力。对于节点不再可用的情况，要模拟节点的真正崩溃，你需要直接访问支持节点的虚拟机并“崩溃”它。不过，你可以通过运行以下命令，观察
    k8s 如何根据 ReplicaSet 定义自动调度 SQL Server 部署的行为：


    ```

    kubectl drain

    ```


    你可以通过运行以下命令让节点重新上线以供调度（但这并不意味着 Pod 会移回该节点）：


    ```

    kubectl uncordon

    ```


    现在让我们探讨如何在 k8s 中更新 SQL Server，类似于你在第 7 章中更新容器的方式。'
- fmt: "## Updating SQL Server on k8s\n\nYou learned in Chapter [7](#479130_1_En_7_Chapter.xhtml)\
    \ how to update a SQL Server container by “switching” containers backed by a persisted\
    \ volume. The running container is stopped, and a new container, with a new CU\
    \ build of SQL Server, is started – pointing to the same volume, which is mapped\
    \ to the directory containing the system and user databases.\n\nYou can achieve\
    \ the same in k8s. Only this time k8s will do all the work for you, given the\
    \ right declarations. Let’s go back and look at this section of the `sql2019deployment.yaml`\
    \ file from the first exercise in this chapter:\n\n```yaml\nspec:\nreplicas: 1\n\
    selector:\nmatchLabels:\napp: mssql\nstrategy:\ntype: Recreate\n```\n\nNotice\
    \ the `strategy` of type `Recreate`. `Recreate` declares to k8s that if the deployment\
    \ is updated to stop and recreate the container. Another choice for a strategy\
    \ type is `RollingUpdate`. We can’t use this strategy with SQL Server unless we\
    \ have some coordination with multiple SQL Server containers. We will talk about\
    \ this concept, though, in the last section of this chapter, on Always On Availability\
    \ Groups and k8s.\n\nOne way to update the deployment is to update the `image`\
    \ of the container running in the pod. For SQL Server, this could mean updating\
    \ to a new cumulative update, just like I showed you how to switch to a container\
    \ with a new image in Chapter [7](#479130_1_En_7_Chapter.xhtml). And since we\
    \ are using a persistent volume, the system and user database will be recognized\
    \ by the new container using the updated image. k8s provides a method for you\
    \ to do this all in one command. And there is a rollback story, too, since k8s\
    \ tracks the update to the deployment as a revision.\n\nLet’s see this in action.\
    \ All the scripts for this example can be found at `ch8_sql_on_k8s\\update`. If\
    \ you have run the previous examples, be sure to clean up all your existing resources\
    \ using the `cleanup.sh` script found in either the `ha` or the `deploy` folder.\n\
    \nAt the time of writing this book, we have not yet shipped a cumulative update\
    \ for SQL Server 2019, so I’ll use SQL Server 2017 in these examples. However,\
    \ once we start shipping CU builds, you can use this same technique for SQL Server\
    \ 2019.\n\n1.  First, we need to deploy a SQL Server pod, as we did in the first\
    \ example in this chapter. Instead of going through all of those steps, I built\
    \ one script that does it all, called `step1_deploysql.sh`. This script uses the\
    \ following commands:\n\n    ```bash\n    kubectl create namespace mssql\n   \
    \ kubectl config set-context mssql --namespace=mssql --cluster=bwsqlaks --user=clusterUser_bwaks_bwsqlaks\n\
    \    kubectl config use-context mssql\n    kubectl apply -f sqlloadbalancer.yaml\n\
    \    kubectl create secret generic mssql --from-literal=SA_PASSWORD=\"Sql2017isfast\"\
    \n    kubectl apply -f storage.yaml\n    kubectl apply -f sql2017deployment.yaml\n\
    \    ```\n\n    The `storage.yaml` and `sqlloadbalancer.yaml` files are identical\
    \ to the files used in the first example in this chapter. The `sql2017deployment.yaml`\
    \ file is also the same, except for this section:\n\n    ```yaml\n    image: \
    \ mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n    ```\n\n    This means our\
    \ new pod with a container will use a SQL Server 2017 CU10 image for Ubuntu. If\
    \ this image is not on the node that is deployed for the pod, k8s will have to\
    \ pull the image first.\n\n### Note\nTo this date, I’ve not found a single easy\
    \ method to pre-pull SQL Server images on all the k8s nodes, except to run pods\
    \ using those images and then deleting the pods (the image will stay cached on\
    \ the local node). There are other techniques out there, and one of them is to\
    \ gain admin access to log in to the actual Linux node VMs and use docker directly\
    \ to pull images.\n\nUse the same techniques as in the first example to check\
    \ that the pod and deployment are up and running. For example, run the following\
    \ command:\n\n```bash\nkubectl get all\n```\n\nThe status of the pod must be Running,\
    \ and the LoadBalancer must have a valid External-IP address before you can continue.\n\
    \n2.  Now we want to update the deployment by changing the image using the following\
    \ command or script `step2_updatesql.sh`:\n\n    ```bash\n    kubectl --record\
    \ deployment set image mssql-deployment mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n\
    \    ```\n\nk8s will do all the work behind the scenes to stop the current container\
    \ and start a new one (using the same arguments from the deployment) with the\
    \ new image.\n\n3.  Use the following command or script `step3_checkstatus.sh`\
    \ to watch the progress of the update. This command won’t complete until the update\
    \ of the container with the new image is complete and the container is running\
    \ again:\n\n    ```bash\n    kubectl rollout status deployment mssql-deployment\n\
    \    kubectl rollout history deployment mssql-deployment\n    ```\n\nWhen the\
    \ new deployment is finished, your results should look something like this:\n\n\
    ```\n    Waiting for deployment \"mssql-deployment\" rollout to finish: 0 out\
    \ of 1 new replicas have been updated...\n    Waiting for deployment \"mssql-deployment\"\
    \ rollout to finish: 0 out of 1 new replicas have been updated...\n    Waiting\
    \ for deployment \"mssql-deployment\" rollout to finish: 0 out of 1 new replicas\
    \ have been updated...\n    Waiting for deployment \"mssql-deployment\" rollout\
    \ to finish: 0 of 1 updated replicas are available...\n    deployment \"mssql-deployment\"\
    \ successfully rolled out\n    deployment.extensions/mssql-deployment\n    REVISION\
    \  CHANGE-CAUSE\n\n2         kubectl deployment set image mssql-deployment mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu\
    \ --record=true\n```\n\n4.  You can make sure your pod is running again with this\
    \ command or script `step4_getpods.sh`:\n\n    ```bash\n    kubectl get pods -o\
    \ wide\n    ```\n\nYour pod status should show as Running.\n\n5.  SQL Server will\
    \ recognize the existing system and user databases, but will need to perform any\
    \ necessary steps to update to the new CU build. Therefore, if you try to connect\
    \ to SQL Server too quickly, you may get the following error:\n\n```\n    Sqlcmd:\
    \ Error: Microsoft ODBC Driver 17 for SQL Server : Login failed for user 'sa'.\
    \ Reason: Server is in script upgrade mode. Only administrator can connect at\
    \ this time.\n```\n\nTry executing the following command or script `step5_testsql.sh`\
    \ until you see the new version of SQL Server:\n\n```bash\n    SERVERIP=$(kubectl\
    \ get service | grep mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd\
    \ -Usa -PSql2017isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\n```\n\n6.  Just\
    \ like the example with containers in Chapter [7](#479130_1_En_7_Chapter.xhtml),\
    \ you may want to roll back to the previous container. k8s provides a method to\
    \ do this by changing the revision number. Run the following command to roll back\
    \ to the previous CU build or use script `step6_rollbacksql.sh`:\n\n    ```bash\n\
    \    kubectl rollout undo deployment mssql-deployment --to-revision=1\n    ```\n\
    \n7.  Run the following command or script `step7_getpods.sh` to verify the pod\
    \ is back to a Running state:\n\n    ```bash\n    kubectl get pods -o wide\n \
    \   ```\n\n8.  Once the pod is Running, run the following command (or use the\
    \ script `step8_testsql.sh`) to make sure you have rolled back to SQL 2017 CU10:\n\
    \n    ```bash\n    SERVERIP=$(kubectl get service | grep mssql-service | awk {'print\
    \ $4'})\n    PORT=31433\n    sqlcmd -Usa -PSql2017isfast -S$SERVERIP,$PORT -Q\"\
    SELECT @@version\"\n    ```\n\nYou have now successfully updated a SQL Server\
    \ container and rolled it back using the built-in capabilities of k8s to update\
    \ images from a running container.\n\nUse the script `cleanup.sh` to clean up\
    \ all resources you deployed in this example in the chapter."
