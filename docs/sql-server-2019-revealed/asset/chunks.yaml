- fmt: 'The secret for SQL Server in Chapter [8](#479130_1_En_8_Chapter.xhtml) was
    used to control the sa password to connect to SQL Server. The deployment for BDC
    includes an environment variable called `MSSQL_SA_PASSWORD`, which I was prompted
    for using the python deployment script. For the SQL Server Master Instance, we
    create a secret called `mssql-sa-password`.


    If you remember in Chapter [8](#479130_1_En_8_Chapter.xhtml), I showed you how
    to create a `LoadBalancer` service for SQL Server in a pod to connect to SQL Server.
    Our BDC deployment tool creates one for the SQL Server Master Instance. To see
    the exact objects for this service, you can run the following command:


    ```

    kubectl get service --namespace=mssql-cluster -lrole=master-pool

    ```


    The output will show you the `master-svc-external` service along with an External
    IP and port.


    The final component for the SQL Server pod is a `ReplicaSet`. I showed you in
    Chapter [8](#479130_1_En_8_Chapter.xhtml) how a `ReplicaSet` provides “basic HA”
    for k8s for SQL Server. For BDC, we use a concept called a `StatefulSet`, which
    gives similar HA functionality as a `ReplicaSet`, but with more capabilities.
    `StatefulSet` objects are used for all pods in BDC except for the Controller.
    `StatefulSet` objects allow for pod ordering and scale and are a key component
    to allow for robust High Availability with BDC. I’ll talk more about High Availability
    for BDC in the section “High Availability” later in this chapter.


    If you look at the output of the `kubectl describe` command, you will see this
    section:


    ```

    Controlled By:      StatefulSet/master

    ```


    You can get more information about how we define the `StatefulSet` by running
    this command:


    ```

    kubectl describe StatefulSet master --namespace=mssql-cluster

    ```


    You will also notice there are two other containers in the `master-0` pod:


    ```

    collectd:

    fluentbit:

    ```


    These containers are part of every pod in BDC and are used to help collect logs
    and metrics used in managing and monitoring BDC.


    Our documentation has information about the SQL Server Master Instance at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance).
    I’ll talk more about how to use the SQL Server Master Instance in the section
    “Using Big Data Clusters” later in this chapter.


    ### Controller


    The Controller is a logical term that represents a collection of pods and containers.
    You can find a list of pods in the Controller with the following command:


    ```

    kubectl get pods --namespace mssql-cluster -lplane=control

    ```


    Here is the list of pods on my BDC deployment:


    ```

    NAME              READY   STATUS    RESTARTS   AGE

    control-vjwjf     3/3     Running   0          38h

    controldb-0       2/2     Running   0          38h

    controlwd-l8fmp   1/1     Running   0          38h

    gateway-0         2/2     Running   0          38h

    logsdb-0          1/1     Running   0          38h

    logsui-f42ln      1/1     Running   0          38h

    metricsdb-0       1/1     Running   0          38h

    metricsdc-gtrxn   1/1     Running   0          38h

    metricsui-kwh4q   1/1     Running   0          38h

    mgmtproxy-nc8tl   2/2     Running   0          38h

    ```


    The Controller is also called the control plane, much like the Kubernetes concept
    of a control plane ([`https://kubernetes.io/docs/concepts/#kubernetes-control-plane`](https://kubernetes.io/docs/concepts/%2523kubernetes-control-plane)).
    Figure [10-8](#479130_1_En_10_Chapter.xhtml#Fig8) shows a closeup of the components
    of the control plane for BDC.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig8_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig8_HTML.jpg)


    Figure 10-8

    BDC control plane


    You should think of the Controller as a set of services that are used to manage
    BDC. One of the tasks for management is deployment, and the Controller is used
    to help deploy BDC. Once `azdata` deploys the Controller, the Controller “takes
    over” and deploys other components of BDC. All pods running in the control plane
    use the k8s concept of a `ReplicaSet` for basic high availability.


    One of the most important components of the Controller is the controller service
    (also listed as control service in Figure [10-8](#479130_1_En_10_Chapter.xhtml#Fig8)).
    The controller service is effectively the API server for BDC. This service accepts
    REST APIs to perform all types of operations for BDC including deploy, manage,
    Data Virtualization, and more. You will interact with the controller service using
    several different methods, including `azdata`, T-SQL external tables, and Azure
    Data Studio (ADS).


    At the time of writing, there is no public documentation on the protocol of using
    the controller service for specific APIs. All APIs are accessible using `azdata`,
    Azure Data Studio (ADS), and T-SQL statements.


    ### Tip


    Azure Data Studio (ADS) is capable of connecting and interacting with BDC without
    `azdata`. Therefore, REST API examples to interact with the controller service
    exist in its open source code at [`https://github.com/microsoft/azuredatastudio`](https://github.com/microsoft/azuredatastudio).
    While you read these examples in the source, I don’t recommend you rely on them,
    as we may change them. Furthermore, there is no method for you to install a program
    and gain access with certificates within BDC.


    The other pods in the control plane implement services that support connectivity
    to various services (proxy), Kibana and Elasticsearch for logging, Grafana and
    InfluxDB for metrics and monitoring, and a SQL Server to store BDC “metadata.”


    The SQL Server container to store metadata is a normal SQL Server instance, but
    it is “private.” In other words, you never connect to this instance. The controller
    container uses this SQL Server to read important data for management and health,
    but also for HDFS querying capabilities.


    I love to find out how things work, so I used the following techniques to run
    a Bash shell inside this special SQL Server container. The name of the pod hosting
    this container is called `controldb-0`.


    I used the following command to run a Bash shell and connect to the SQL Server
    container:


    ```

    kubectl exec -it controldb-0 --namespace=mssql-cluster -- /bin/bash

    ```


    This connects me to the first container in the pod which is SQL Server. As it
    turns out, we build this SQL Server image based on our core SQL Server image,
    which has `sqlcmd` installed.


    I need the sa password to use `sqlcmd`, but it is not the sa password used to
    connect into the SQL Server Master Instance. It is a private password used only
    by the controller. I found out we store the secret for the sa password inside
    the container at `/var/run/secrets/credentials/mssql-sa-password/password`. Using
    that password string, I connected with `sqlcmd` and found these databases installed
    in the container: `health_system`, `controller`, and `hive_metastore`. These are
    databases used internally by BDC. This is an example of a SQL Server container
    used for internal BDC functionality vs. the SQL Server Master Instance which is
    used for normal SQL Server purposes plus Data Virtualization with HDFS and other
    data sources.'
