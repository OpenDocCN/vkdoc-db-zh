    ### A Polybase Scale-Out Group


    If you choose to set up a Polybase Scale-Out Group, multiple SQL Server instances
    can be used for query processing with scale out. See Figure [9-6](#479130_1_En_9_Chapter.xhtml#Fig6)
    for a scale-out group configuration.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Polybase Scale-Out Groups


    With Polybase Scale-Out Groups, you can enable Polybase on other SQL Server instances
    to be used for scale-out query processing. The other SQL Server instances that
    enable Polybase are called *Compute nodes*. Notice on compute nodes the Polybase
    Engine is not active. On Windows, the Polybase Engine service is installed, but
    it is disabled and not needed. The Polybase Engine on the head node does all the
    coordination across all nodes, while Polybase DMS services perform all the data
    exchange on each node. The reason we install the Polybase Engine on all nodes
    is so that a Compute node can become a head node if needed (e.g., if the current
    head node had a problem).


    Scale-out groups can be most effective when SQL Server decides that using multiple
    instances can speed up a query to an external table. This could be very powerful
    for Hadoop systems, and scale-out groups were built with distributed Hadoop systems
    in mind. For other data sources, like SQL Server or Oracle, Polybase can detect
    partitions on these sources and use the scale-out group to query each partition
    on the target. We call this capability *scale-out reads*, which you can read about
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups?view=sql-server-ver15#scale-out-reads`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups%253Fview%253Dsql-server-ver15%2523scale-out-reads)
    .


    ### Query Processing and Polybase


    One of the great innovations of Polybase is that querying external tables is integrated
    into the SQL Server query processor. This means the SQL Server query processor
    *understands* when it is working with an external table and builds the right execution
    details to submit to the Polybase Engine so that operations like pushdown can
    be supported.


    Later in the chapter, I’ll show an example of what a remote query operator looks
    like for an external table query in the SQL Server engine.


    ### How Does It Work on Linux?


    SQL Server 2019 on Linux only supports a standalone Polybase instance (we will
    support a scale-out group concept with SQL Server Big Data Clusters, which you
    will read about in Chapter [10](#479130_1_En_10_Chapter.xhtml)). In addition,
    Polybase for SQL Server 2019 on Linux does not support the generic ODBC connector
    for data sources.


    Therefore, the architecture of Polybase is for the Polybase Engine and Polybase
    Data Movement Service to be implemented in the sqlservr process on Linux using
    the SQLPAL (for more details on the SQLPAL, see Chapter [6](#479130_1_En_6_Chapter.xhtml)).


    At the time I was writing this chapter, we were winding down the release of SQL
    Server, but still had not shipped Hadoop external table capabilities with SQL
    Server on Linux (outside of SQL Server Big Data Clusters). I expect this feature
    to make the final release of SQL Server 2019, but the concepts are the same as
    with Windows. It is possible we will have a separate Linux package for this capability,
    but it should be in the documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)
    .'
  trans: '## Polybase 独立实例


    让我们通过图 9-5 更深入地探讨一下 Polybase 的架构。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig5_HTML.jpg](img/479130_1_En_9_Fig5_HTML.jpg)


    图 9-5 Polybase 头节点架构


    让我先在 Windows 的背景下更详细地描述这张图，然后再讨论我们如何在 Linux 上实现它。


    当你在 Windows 上部署 Polybase 时，有两个选择：


    **独立的支持 PolyBase 的实例**

    如果你只想使用一个 SQL Server 实例进行 Polybase 操作，请选择此选项。Polybase 所需的所有软件都将安装在此实例上，它将被视为*头节点*。


    **将 SQL Server 实例用作 PolyBase 横向扩展组的一部分**

    使用此选项来设置所谓的横向扩展组。我将在后面更详细地描述横向扩展组。


    图 9-5 表示的是一个独立的支持 PolyBase 的实例场景。让我描述一下此图中的组件：


    **Polybase 引擎** – Polybase 引擎是一个 Windows 服务，包含一个名为`mpdwsvc.exe`的程序。请注意，图中的 Polybase
    引擎负责**控制和执行**。换句话说，Polybase 引擎是执行外部表查询的协调器。SQL Server 引擎将与 Polybase 引擎协调。Polybase
    引擎实际上包含了来自 PDW 中 Polybase 功能的代码，以支持外部表。`mpdwsvc.exe`由 Windows 服务使用`-dweng`参数执行。Polybase
    引擎与 SQL Server 之间的通信通过本地命名管道进行。


    **Polybase 数据移动服务 (DMS)** – 正如其名，Polybase DMS 负责数据。这意味着 Polybase DMS 将对远程数据源执行查询，并将结果传回
    SQL Server 引擎。有趣的是，Polybase DMS 同样是通过名为`mpdwsvc.exe`的可执行文件实现的，但使用的是`-dms`参数。在头节点的服务器上，你应该能看到两个名为`mpdwsvc.exe`的进程。这也意味着
    Polybase DMS 是加载所有 ODBC 驱动程序或运行针对 Hadoop 系统的 MapReduce Java 代码的程序。Polybase DMS
    还通过命名管道与 SQL Server 引擎和 Polybase 引擎通信。Polybase DMS 服务将通过命名管道与 SQL Server 引擎流式传输数据，以发送来自外部数据查询的结果。


    **DW 数据库** – Polybase 功能需要自己的元数据。当你安装 Polybase 时，你会在 SQL Server 上发现安装了这些数据库：`DWConfiguration`、`DWDiagnostics`和`DWQueue`。你应该将这些数据库视为
    Polybase 的系统数据库，因此它们需要可用，此功能才能工作。我不会详细介绍每个数据库的具体内容，而且我们也没有文档化这些。我确实发现一位有趣的博主撰写了关于探查这些数据库内部的文章：[`https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/`](https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/)。


    **Tempdb** – Polybase 在执行外部表查询时可能会使用`tempdb`进行中间查询处理。此外，为了确保数据流能被正确处理，Polybase
    会创建`tempdb`表作为数据流的“存储后端”（尽管它可能永远不会使用该后端）。在我使用 Polybase 的过程中，我没有看到对`tempdb`的显著使用；我只是想让你了解`tempdb`的使用情况——这样你就不会对看到与
    Polybase 相关的临时表活动感到惊讶。


    Polybase 还附带了一系列目录视图和动态管理视图，我将在本章的示例中使用其中一些。你可以在以下网址查看这些目录视图和动态管理视图的列表：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting)。


    ## Polybase 横向扩展组


    如果你选择设置一个 Polybase 横向扩展组，则可以使用多个 SQL Server 实例进行查询处理以实现横向扩展。有关横向扩展组配置，请参见图 9-6。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg](img/479130_1_En_9_Fig6_HTML.jpg)


    图 9-6 Polybase 横向扩展组


    通过 Polybase 横向扩展组，你可以在其他 SQL Server 实例上启用 Polybase，用于横向扩展查询处理。启用 Polybase 的其他
    SQL Server 实例称为*计算节点*。请注意，在计算节点上，Polybase 引擎是不活动的。在 Windows 上，Polybase 引擎服务已安装，但它被禁用且不需要。头节点上的
    Polybase 引擎负责跨所有节点的协调，而 Polybase DMS 服务则在每个节点上执行所有数据交换。我们在所有节点上安装 Polybase 引擎的原因是为了让计算节点可以在需要时（例如，当前头节点出现问题）成为头节点。


    当 SQL Server 确定使用多个实例可以加速对外部表的查询时，横向扩展组可能是最有效的。这对于 Hadoop 系统可能非常强大，横向扩展组在构建时就考虑了分布式
    Hadoop 系统。对于其他数据源，如 SQL Server 或 Oracle，Polybase 可以检测这些源上的分区，并使用横向扩展组来查询目标上的每个分区。我们将此功能称为*横向扩展读取*，你可以在以下网址阅读相关内容：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups?view=sql-server-ver15#scale-out-reads`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups%253Fview%253Dsql-server-ver15%2523scale-out-reads)。


    ## 查询处理与 Polybase


    Polybase 的一项重大创新是，查询外部表已集成到 SQL Server 查询处理器中。这意味着 SQL Server 查询处理器*理解*它何时在处理外部表，并构建正确的执行详细信息以提交给
    Polybase 引擎，从而支持像谓词下推这样的操作。


    在本章后面，我将展示一个示例，说明 SQL Server 引擎中外部表查询的远程查询操作符是什么样子。


    ## 在 Linux 上如何工作？


    Linux 上的 SQL Server 2019 仅支持独立的 Polybase 实例（我们将在第 10 章介绍的 SQL Server 大数据集群中支持横向扩展组的概念）。此外，Linux
    上 SQL Server 2019 的 Polybase 不支持用于数据源的通用 ODBC 连接器。


    因此，在 Linux 上，Polybase 的架构是使用 SQLPAL（有关 SQLPAL 的更多详细信息，请参见第 6 章）在`sqlservr`进程中实现
    Polybase 引擎和 Polybase 数据移动服务。


    在我撰写本章时，我们正接近 SQL Server 的发布尾声，但仍未发布带有 Linux 版 SQL Server 的 Hadoop 外部表功能（SQL Server
    大数据集群除外）。我预计此功能将包含在 SQL Server 2019 的最终版本中，但其概念与 Windows 版相同。我们可能会为此功能提供单独的 Linux
    软件包，但它应该记录在以下文档中：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)。'
- fmt: '### How Is This Different Than Azure?


    Polybase exists now as a feature in SQL Server, Azure SQL Data Warehouse, and
    Analytics Platform System (APS, formerly Parallel Data Warehouse). However, the
    capabilities provided by each are different.


    ### Note


    An `EXTERNAL TABLE` object does exist in Azure SQL Database, but it is not the
    Polybase feature per se (as of the release of SQL Server 2019). An external table
    in Azure SQL Database is used to support elastic queries. You can read more about
    elastic queries at [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started).


    Polybase for Azure SQL Data Warehouse is all about using external tables for access
    to Hadoop or HDFS with sources like Azure Blob Storage or Azure Data Lake. Sources
    like SQL Server, Oracle, and so on are not supported for Azure SQL Data Warehouse.
    You can read more about Polybase with Azure SQL Data Warehouse at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql?view=azure-sqldw-latest`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql%3Fview%3Dazure-sqldw-latest).


    Polybase for APS is similar to Azure SQL Data Warehouse, but is designed more
    for providing access to "on-premise" Hadoop systems. You can read about Polybase
    for APS at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql?view=aps-pdw-2016-au7`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql%3Fview%3Daps-pdw-2016-au7).


    ## Prerequisites for the Examples


    Let''s talk about some examples in the rest of the chapter. First, I''ll give
    you some tips on deploying and configuring Polybase, and then some guidance on
    using the examples.


    ### Setting Up and Enabling Polybase


    To install Polybase for Windows, you can follow the steps in the documentation
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation).
    The steps are very straightforward when choosing a standalone Polybase instance.
    One choice you do have to make is whether you want to use the `Java connector
    for HDFS`. If you do make this choice to support external tables for HDFS, you
    will have a choice to use the default Open Java we provide with SQL Server 2019
    or install your own. The Open Java we provide is based on Zulu Java, which you
    can read about at [`https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/`](https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/).


    Once you install Polybase on Windows, we will install a series of ODBC drivers
    (which we place in the `binn\Polybase\ODBC Drivers` directory). These drivers
    provide support for the built-in connectors to SQL Server, Oracle, Teradata, and
    MongoDB.


    Once you install the Polybase feature, you must enable the feature with `sp_configure`
    as documented at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation?view=sql-server-ver15#enable`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation%3Fview%3Dsql-server-ver15%23enable).


    For SQL Server on Linux, we provide a separate package for Polybase, which you
    can read about how to configure and use at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup).


    For scale-out groups, the process to set up gets very interesting. Since scale-out
    groups are only supported on Windows at this time, that is the only configuration
    you need to worry about for SQL Server 2019.


    My experience with scale-out group deployment was fairly difficult. You can read
    all the steps in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15).
    Let me give you some initial thoughts before you go down this path:


    *   You will need a Windows domain, so if you don''t have a domain controller,
    you will need to set one up.

    *   All the Windows services for the Polybase Scale-Out Group must be using the
    same domain service account. You have to configure this through setup or using
    the SQL Server Configuration Manager.

    *   You have to make some choices initially on head node and compute node. When
    you first install Polybase on all nodes using setup and choose the option `Use
    the SQL Server instance as part of a PolyBase scale-out group`, all nodes are
    candidates to be the head node. To get Polybase to work properly, you need to
    choose one of your computers as the head node. Then for the other nodes, you need
    to run a stored procedure to configure them as compute nodes, listing the name
    of the head node server and port (pay attention to the port you picked during
    setup, because you will need it here). The process to join as a compute node is
    documented at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15#add-other-sql-server-instances-as-compute-nodes`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15%23add-other-sql-server-instances-as-compute-nodes).

    *   You need to enable Polybase with `sp_configure` on all nodes and restart SQL
    Server.

    *   You also need to restart all Polybase services on all nodes. In fact, if the
    stored procedure doesn''t do this automatically, you need to stop the Polybase
    Engine on the compute nodes. If all works well, the Polybase Engine service will
    be disabled on the compute nodes, but you should double-check this.

    *   Query the DMV `dm_exec_compute_nodes` to make sure all the nodes are the right
    status of `HEAD` or `COMPUTE`. You can read more about this DMV at [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql).'
