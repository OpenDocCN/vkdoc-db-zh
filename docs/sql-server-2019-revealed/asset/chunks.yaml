    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Choosing to deploy BDC in Azure Data Studio


    Figure [10-5](#479130_1_En_10_Chapter.xhtml#Fig5) shows the experience to pick
    your deployment method.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Deployment options for BDC in Azure Data Studio


    #### Offline Deployment


    I want to mention that if you need an offline deployment experience because your
    k8s cluster is not connected to the Internet (at least when you need to deploy
    BDC), we have documented how to pull our container images and deploy BDC on k8s.
    You will still need all the tools I’ve described in this chapter to deploy offline.
    You can read the details at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline)
    .'
  trans: '

    #### 选择客户端与下载工具


    一旦你决定了 k8s 策略，就需要工具来部署 BDC。在尝试部署 BDC 之前，确保在客户端上安装了所有正确的工具至关重要。文档在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools)
    提供了所需工具列表。对于我的客户端，我选择了我的“云端笔记本电脑”。这意味着我在一个 Azure 虚拟机中安装了 Windows 10，并在那个 VM 中进行了所有的
    BDC 操作。


    工具列表包括以下内容：


    `python` – `python` 是几个不同工具使用的关键组件，可在所有操作系统平台上使用。安装 BDC 所需的 `azdata` 工具就是用 `python`
    编写的。我需要 `python`，因为我使用了一个 `python` 脚本来一步部署 AKS 和 BDC。对于 Windows 版的 `python`，我只是从
    [`www.python.org/downloads/release/python-374/`](https://www.python.org/downloads/release/python-374/)
    下载最新的 `python` 版本。


    `kubectl` – 正如你在第 8 章所学，`kubectl` 是一个专门设计用来向 k8s API 服务器发送请求的工具。这是你与 Kubernetes
    的编程接口。


    我已经在 Windows 机器上安装了 `kubectl`；我检查了版本，是 1.14。文档说明指出：“你必须使用 1.10 或更高版本的 `kubectl`。此外，`kubectl`
    的版本应该比你的 Kubernetes 集群的次要版本高或低一个版本。”因为我使用的是 AKS，我检查了命令以查看我的 AKS 部署中将使用哪些版本，发现支持的最高版本是
    1.14.6 – 所以我应该可以继续。你可以在 [`https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions`](https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions)
    找到更多关于检查你的集群上是否支持 AKS 版本的信息。


    `azdata` – 这个工具在 SQL Server 2019 的早期预览版中称为 `mssqlctl`，对于部署和管理 BDC 是*至关重要*的。它用
    `python` 编写，你应该把 `azdata` 看作是 BDC 的“`kubectl`”。


    为了验证我是否正确安装了 `azdata`，我只是从命令行运行 `azdata` 来看看接口是什么样子。结果如图 10-3 所示。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig3_HTML.jpg](img/479130_1_En_10_Fig3_HTML.jpg)

    *图 10-3：`azdata` CLI*


    你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata)
    查看完整的 `azdata` 参考文档。


    Azure Data Studio (ADS) – 这个跨平台的开源工具可用于查询、部署、管理和导航 BDC 的数据。虽然 SQL Server Management
    Studio (SSMS) 可用于连接到 BDC 中的 SQL Server 主实例，但 ADS 具有专为 BDC 设计的功能和扩展，包括对 Notebook
    的支持。


    我使用了来自 [`https://github.com/microsoft/azuredatastudio#try-out-the-latest-insiders-build-from-master`](https://github.com/microsoft/azuredatastudio%2523try-out-the-latest-insiders-build-from-master)
    的 ADS Insiders 构建版本，但我预计在 SQL Server 2019 发布时，你将获得一个包含 BDC 所需一切的公共 ADS 版本。你可以在
    [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)
    获取最新的 ADS 构建版本。


    我还在 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension)
    获取了最新的 SQL Server 2019 预览版扩展并安装了 vsix 文件。（你可以忽略关于第三方扩展的警告，因为该扩展来自微软。）很难知道它是否正常工作或已完成，但等几分钟，你会在右下角看到一条类似“扩展
    `microsoft.sql-vnext` 安装完成”的消息。


    `az` – 如果你使用 AKS，你将需要 Azure 命令行界面来登录 Azure 并部署和管理 AKS。


    `curl` – `curl` 代表“Client URL”，是一个流行的工具，用于从特定 URL 复制数据，通常是存储在网站上的文件。对我来说，`curl`
    随 Windows 10 一起提供。`curl` 是一个很棒的工具，不仅可以将远程脚本复制下来与 BDC 一起使用，还可以将数据复制到 BDC HDFS 集群中。


    #### 部署方法


    现在你知道了要部署哪种类型的 k8s 集群，并已下载了所需的工具；你可以选择部署方法：


    *   使用 `python` 的“单步”方法部署 AKS 和 BDC，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)
    找到。

    *   使用 `kubeadm` 在你的 k8s 集群上部署 k8s 和 BDC 的“单步” Bash shell 脚本，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm)
    找到。

    *   首先创建你自己的 AKS 或 k8s 集群，然后使用 `azdata` 工具部署 BDC，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)
    阅读相关内容。

    *   使用 Azure Data Studio (ADS) 将 BDC 部署到新的 AKS 集群、现有的 AKS 集群或你已使用 `kubeadm` 部署的现有
    k8s 集群。


    图 10-4 展示了如何在 ADS 中访问此部署体验。

    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg](img/479130_1_En_10_Fig4_HTML.jpg)

    *图 10-4：在 Azure Data Studio 中选择部署 BDC*


    图 10-5 展示了选择你的部署方法的体验。

    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg](img/479130_1_En_10_Fig5_HTML.jpg)

    *图 10-5：Azure Data Studio 中 BDC 的部署选项*


    #### 离线部署


    我想提一下，如果你需要离线部署体验，因为你的 k8s 集群没有连接到互联网（至少在你需要部署 BDC 的时候），我们已经记录了如何拉取我们的容器镜像并在 k8s
    上部署 BDC。你仍然需要本章描述的所有工具来进行离线部署。你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline)
    阅读详细信息。

    '
- fmt: "## BDC 部署体验\n\n为了分享我对 BDC 部署体验的看法，我将把 BDC 部署到 AKS 上，并使用提供的 Python 脚本作为“一步式”解决方案。您可以在\
    \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\
    \ 阅读如何使用此解决方案的详细信息。\n\n除了我需要将 AKS 和 BDC 群集部署在 `eastus2` 区域之外，其余我都选择了默认值。\n\nPython\
    \ 脚本实际上是 `az` 和 `azdata` 的包装器。它使用您的选择（或环境变量或默认值）来创建 Azure 资源组、AKS 群集和 BDC。BDC\
    \ 是使用 `aks-dev-test` 配置创建的。这是 BDC 的基本配置，非常适用于开发或测试场景。我将在本章后面的“为生产环境配置部署”一节中讨论生产部署的配置。\n\
    \n部署需要时间！BDC 解决方案需要部署许多 Pod 和容器，如果您还部署了 k8s 群集，这个过程将需要更长时间。对我来说，使用 Python 脚本和\
    \ AKS 的总部署时间约为 20 分钟，但我见过它需要长达一个小时的情况。\n\n当您运行 Python 脚本时，您将收到类似以下的消息：\n\n```\n\
    Creating azure resource group: \n\nCreating AKS cluster: \n\nCreating SQL Big\
    \ Data cluster:mssql-cluster\ncustom\\bdc.json created\ncustom\\control.json created\n\
    The privacy statement can be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=853010\n\
    The license terms for SQL Server Big Data Cluster can be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=2002534\n\
    Cluster deployment documentation can be viewed at:\nhttps://aka.ms/bdc-deploy\n\
    NOTE: Cluster creation can take a significant amount of time depending on\nconfiguration,\
    \ network speed, and the number of nodes in the cluster.\nStarting cluster deployment.\n\
    Waiting for cluster controller to start.\n```\n\n最后一条消息 `Waiting for cluster controller\
    \ to start` 是一条关键消息，可能会重复出现几次。`controller` 是首先在 k8s 群集中创建的，`controller service`\
    \ 将用于部署 BDC 的其余部分。\n\n然后您将看到类似这样的消息：\n\n```\nCluster controller endpoint is available\
    \ at :\nCluster control plane is ready.\n```\n\n很快您将看到这些消息：\n\n```\nData pool\
    \ is ready.\nMaster pool is ready.\nCompute pool is ready.\nStorage pool is ready.\n\
    Cluster deployed successfully.\n```\n\n最后一条消息意味着 AKS 和 BDC 都已成功部署。我采用“信任但验证”的原则，因此，在下一节中，我将讨论如何验证部署是否成功以及您是否准备好使用\
    \ BDC。\n\n## 注意事项\n\n`Creating SQL Big Data cluster:mssql-cluster` 中提供的名称将成为 BDC\
    \ 创建的所有对象的 Kubernetes 命名空间。因此，在我的部署中，`mssql-cluster` 是 k8s 命名空间。\n\n## 验证部署\n\n\
    我使用以下方法对 AKS 和 BDC 的成功部署进行了“完整性检查”：\n\n*   按照以下步骤使用 `kubectl` 检查群集：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy?view=sqlallproducts-allversions#inspect-the-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy%3Fview%3Dsqlallproducts-allversions%23inspect-the-cluster)。\n\
    \n*   使用 `azdata` 登录群集，找到控制器端点，然后连接到 SQL Server 以确保您可以连接到 SQL Server。请按照 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance?view=sqlallproducts-allversions#endpoints`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance%3Fview%3Dsqlallproducts-allversions%23endpoints)\
    \ 中的步骤操作。\n    查找名为 `SQL Server Master Instance Front-End` 的端点。该端点是连接到 SQL Server\
    \ 的 IP 地址和端口。\n    请按照以下文档页面中的指导，使用 Azure Data Studio (ADS) 连接到 BDC 中的 SQL Server：\n\
    \    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster)\n\
    \    我在 ADS 中对我的 BDC 进行的基本连接测试如图 [10-6](#479130_1_En_10_Chapter.xhtml#Fig6) 所示。"
  raw: "### The BDC Deployment Experience\n\nTo give you my perspective on the BDC\
    \ deployment experience, I’m going to deploy BDC on AKS and use the python script\
    \ provided as a “one-step” solution. You can read the details of how to use this\
    \ solution at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\
    \ .\n\nI chose the defaults except that I needed to deploy my AKS and BDC cluster\
    \ in the eastus2 region.\n\nThe python script is effectively a wrapper for az\
    \ and azdata. It uses your choices (or environment variables or defaults) to create\
    \ an Azure Resource Group, an AKS cluster, and a BDC. BDC is created using the\
    \ **aks-dev-test** configuration. This is a basic configuration for BDC that is\
    \ well suited for a development or test scenario. I’ll talk about configuration\
    \ for production deployments in the section “Configuring Deployment for Production”\
    \ later in this chapter.\n\nDeployment takes time! There are many pods and containers\
    \ to deploy for the BDC solution, and the process will take longer if you also\
    \ deploy a k8s cluster. For me, the total deployment time using the python script\
    \ with AKS was about 20 minutes, but I’ve seen it take up to an hour.\n\nWhen\
    \ you run the python script, you will get messages like\n\n```\nCreating azure\
    \ resource group: \n\nCreating AKS cluster: \n\nCreating SQL Big Data cluster:mssql-cluster\n\
    custom\\bdc.json created\ncustom\\control.json created\nThe privacy statement\
    \ can be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=853010\nThe license\
    \ terms for SQL Server Big Data Cluster can be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=2002534\n\
    Cluster deployment documentation can be viewed at:\nhttps://aka.ms/bdc-deploy\n\
    NOTE: Cluster creation can take a significant amount of time depending on\nconfiguration,\
    \ network speed, and the number of nodes in the cluster.\nStarting cluster deployment.\n\
    Waiting for cluster controller to start.\n```\n\nThis last message, `Waiting for\
    \ cluster controller to start`, is a key message and may be repeated several times.\
    \ The *controller* is created first within the k8s cluster, and the *controller\
    \ service* will be used to deploy the rest of the BDC.\n\nYou will then see a\
    \ message like this:\n\n```\nCluster controller endpoint is available at :\nCluster\
    \ control plane is ready.\n```\n\nAnd soon you will see these messages:\n\n```\n\
    Data pool is ready.\nMaster pool is ready.\nCompute pool is ready.\nStorage pool\
    \ is ready.\nCluster deployed successfully.\n```\n\nThis last message means both\
    \ AKS and BDC are successfully deployed. I use the philosophy of “trust but verify,”\
    \ so, in the next section, I’ll talk about how you can verify the deployment was\
    \ successful and you are ready to use BDC.\n\n### Note\n\nThe name provided for\
    \ `Creating SQL Big Data cluster:mssql-cluster` becomes the Kubernetes namespace\
    \ for all objects created by BDC. Therefore, in my deployment, **mssql-cluster**\
    \ is the k8s namespace.\n\n### Verify the Deployment\n\nI used the following methods\
    \ to perform a “sanity check” of a successful AKS and BDC deployment:\n\n*   Follow\
    \ these steps to use **kubectl** to inspect the cluster: [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy?view=sqlallproducts-allversions#inspect-the-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy%253Fview%253Dsqlallproducts-allversions%2523inspect-the-cluster)\
    \ .\n\n*   Log in to the cluster using **azdata**, find the controller endpoint,\
    \ and then connect to SQL Server to make sure you can connect to SQL Server. Follow\
    \ the steps at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance?view=sqlallproducts-allversions#endpoints`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance%253Fview%253Dsqlallproducts-allversions%2523endpoints)\
    \ .\n\n    Look for the endpoint called **SQL Server Master Instance Front-End**.\
    \ The endpoint is the IP address and port to connect to SQL Server.\n\n    Follow\
    \ the guidance at the following documentation page to connect to SQL Server in\
    \ BDC with Azure Data Studio (ADS):\n\n    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster)\n\
    \n    My basic connection test to my BDC looked like Figure [10-6](#479130_1_En_10_Chapter.xhtml#Fig6)\
    \ in ADS."
