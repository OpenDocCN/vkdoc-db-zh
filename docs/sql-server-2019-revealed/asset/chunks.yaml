  trans: "\n# 使用示例\n\n我相信你应该回顾甚至尝试一些示例，来了解机器学习和 SQL Server 大数据集群能实现什么：\n\n*   **`SparkML`**\
    \ – 我们提供了一个使用 Spark 和 Spark ML 与大数据集群的示例，该示例基于美国过去的人口普查数据来预测收入水平。你可以在 [`https://docs.microsoft.com/zh-cn/sql/big-data-cluster/spark-create-machine-learning-model`](https://docs.microsoft.com/zh-cn/sql/big-data-cluster/spark-create-machine-learning-model)\
    \ 查看此示例。\n\n*   **`BDC 应用程序`** – 在 [`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy)\
    \ 处，有几个使用应用程序部署的机器学习应用示例供你使用。\n\n*   **Buck Woody 示例** – 2019 年春天，我和 Buck Woody\
    \ 正在为一位客户做培训，Buck 提出了一个非常酷的机器学习现实世界示例。这个想法是，假设虚构的公司 WideWorldImporters 拥有运输对温度敏感产品的卡车。卡车的制冷系统由电池供电。一个大问题是，卡车的制冷系统可能会因电池生命周期而故障。电池设计寿命应为\
    \ 3 个月，但在许多情况下它们会提前失效。公司希望建立一个预测性机器学习模型，以根据卡车和货物的动态因素（而非固定的 3 个月周期）来确定电池何时可能需要更换。\n\
    \n    Buck 有一个特定的 Notebook 可供你使用，你可以在 [`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_05.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/buc_tutorial_05.ipynb)\
    \ 查看此示例。你需要遵循所有的 Notebook 才能使用这个教程，地址在 [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks)。当\
    \ Buck 和我做这个培训时，一位客户大概这样评论道：“终于有人向我解释了一个实用的、现实世界的机器学习示例，而且我认识到可以使用大数据集群来实现它。”\n\
    \n# 管理和监控大数据集群\n\n你可以看到 SQL Server 大数据集群有很多组件和活动部分。监控和管理大数据集群有许多需要考虑的事项，包括管理 Kubernetes\
    \ 集群、SQL Server 和其他大数据集群组件。\n\n## 管理 Kubernetes (k8s)\n\n如果你看看我们用大数据集群构建的东西，它实质上是一个\
    \ `由 Kubernetes 支撑的应用程序`。虽然我们具备特定功能来帮助你管理大数据集群应用程序，但你仍然必须准备好管理你的 k8s 集群。对于大数据集群的开发和测试，这对你来说可能不是问题，但是，要在生产环境中运行大数据集群，你必须规划如何独立于大数据集群来管理和监控你的\
    \ k8s 集群。我无法开始强调理解如何确保你的 k8s 集群得到妥善管理并以健康水平运行有多么重要。整个大数据集群解决方案都依赖于此。\n\n我推荐以下用于管理\
    \ k8s 的资源：\n\n*   查看我们关于管理 Azure Kubernetes 服务 (AKS) 的文档：[`https://docs.microsoft.com/zh-cn/azure/aks/best-practices`](https://docs.microsoft.com/zh-cn/azure/aks/best-practices)。\n\
    \n*   我强烈推荐这本书，它也包含了一些关于 k8s 内部原理的精彩信息：[`https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/`](https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/)。\n\
    \n我还在我负责的第 8 章“关于 k8s 的技巧”一节中提供了管理和监控 k8s 集群的技巧和技术。\n"
- fmt: '### Managing and Monitoring Big Data Clusters


    Besides standard management and monitoring of the `SQL Server` Master Instance
    through `SQL Server` diagnostics such as Dynamic Management Views (`DMVs`) and
    Extended Events, we have provided a series of tools and resources to help you
    specifically manage and monitor the `SQL Server Big Data Cluster` (`BDC`).


    *   **`Azure Data Studio (ADS) Big Data Cluster Dashboard`**


    `ADS` ships with a `BDC` dashboard to help you look at the health of the `BDC`
    cluster including all its components. Figure [10-17](#479130_1_En_10_Chapter.xhtml#Fig17)
    shows an example of the `ADS` `BDC` Dashboard.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig17_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig17_HTML.jpg)

    Figure 10-17 The `Azure Data Studio` Big Data Cluster Dashboard


    You can click one of the Cluster Details like `SQL Server` and see the status
    of the `SQL Server` Master Instance, Compute, Data, and Storage Pool. We have
    implemented a `liveness probe` ( `https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/`
    ) into each pod in `BDC` to feed the overall health status of all the `BDC` components.
    You can read more about the Big Data Cluster dashboard at `https://docs.microsoft.com/en-us/sql/big-data-cluster/manage-with-controller-dashboard`.


    *   **`Grafana` Metrics**


    Using this context, you can drill into Metrics showing a `Grafana` ( `https://grafana.com/`
    ) dashboard powered by components in the Controller. Figure [10-18](#479130_1_En_10_Chapter.xhtml#Fig18)
    shows the `Grafana` dashboard for the `SQL Server` Master Instance.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg)

    Figure 10-18 `Grafana` dashboard for `SQL Server Big Data Clusters`


    *   **`Kibana` and `Elasticsearch`**


    Every major component of `BDC` has a `Grafana` dashboard and a `Kibana` ( `https://en.wikipedia.org/wiki/Kibana`
    ) visualization of `Elasticsearch` ( `www.elastic.co/` ), with logs for deeper
    troubleshooting and analysis. Figure [10-19](#479130_1_En_10_Chapter.xhtml#Fig19)
    shows a `Kibana` visualization of `Elasticsearch` logging from the `SQL Server`
    Master Instance through the `ADS` Big Data Cluster Dashboard.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg)

    Figure 10-19 `Kibana` and `Elasticsearch` for logs with `BDC`


    *   **Using `azdata` with `SQL Server`**


    While `Kubernetes` allows you to interact with containers with a command like
    `kubectl exec`, the `azdata` program allows you to interact with `SQL Server`
    using the `sql` option of `azdata` as documented at `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-sql`.
    This allows you to execute `T-SQL` commands against the `SQL Server` Master Instance
    as well as access the `sqlcmd` “shell.” Remember `azdata` is like the `kubectl`
    program for `BDC`; you can see the complete reference at `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`.


    *   **`Kubernetes (k8s)` and `BDC` Troubleshooting**


    Read through my discussion of `k8s` commands in Chapter [8](#479130_1_En_8_Chapter.xhtml),
    but we also have some tips on our documentation at `https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`.
    Don’t forget to also use our `SQL Server` Troubleshooting Guides which I described
    earlier in this chapter in the section “Jupyter Books for `SQL Server Big Data
    Clusters`.”


    ## Summary


    While `SQL Server 2019` is radical, `SQL Server Big Data Clusters` is *revolutionary*.
    Who would have thought a product some consider just a relational database engine
    includes an entire solution for your own *data lake*, *Data Virtualization*, and
    an *end-to-end Machine Learning platform*, all built on top of `Kubernetes`?


    Think about the technologies we have deployed for Big Data Clusters:


    *   `SQL Server`

    *   `Polybase`

    *   `HDFS`

    *   `Spark`

    *   `Livy`

    *   `Kibana`

    *   `Elasticsearch`

    *   `Grafana`

    *   `InfluxDB`

    *   `Notebooks`

    *   Machine Learning with `R` and `Python`

    *   `Java Extensibility`

    *   `Always On Availability Groups`


    All of this is powered by a control plane with our “`API Server`” or controller
    serviced to deploy, manage, and power a Big Data Cluster built on `Kubernetes`.


    This is my opinion, but why not just hear from a customer who has already seen
    the promise of this solution:


    > “Building and deploying our vertical AI-solution for clinical radiology combines
    very diverse implementation paradigms, data formats, and regulatory requirements.
    `SQL Server 2019 Big Data Clusters` allowed us to accommodate and integrate all
    aspects from one shared platform – for our data scientists with their deep learning
    as well as for our software engineers who wire up workflows, security, and scalability.
    At runtime, our healthcare customers benefit from simple containerized deployment
    and maintenance while being able to move our solution between on-prem and the
    cloud easily.” – René Balzano, Founder and CEO of Balzano.


    This quote is from our blog we posted when we released Big Data Clusters for `SQL
    Server 2019` as a Release Candidate at `https://cloudblogs.microsoft.com/sqlserver/2019/08/29/sql-server-2019-release-candidate-refresh-with-big-data-clusters/`.
    I look forward to many other customers that believe Big Data Clusters is just
    the revolutionary solution they need to power their business.


    # 11. The Voice of the Customer and Migration


    I hope by the time you have reached this chapter, you can appreciate the incredible
    amount of innovation that has gone into `SQL Server 2019`. And if you have read
    all of the first ten chapters, you probably have the feeling of “information overload.”
    I’ve had several folks who have attended my presentations in the past feel like
    their “brain is melting.” If you feel that way up to this point of the book, I
    accomplished one of my goals. I wanted this book to be more than just a review
    of `SQL Server 2019`, because anyone can get that from the documentation. I wanted
    this to be a comprehensive look at the `SQL Server 2019` release.


    With all these capabilities to solve modern data challenges, is there anything
    left to talk about? Well, yes, in fact, there is. I’ll conclude this book by discussing
    the “pile of features” (I’m borrowing that term from my colleague Conor Cunningham)
    we built into `SQL Server 2019` based on customer feedback. I’ll also talk about
    methods, tools, and techniques for you to use when migrating to `SQL Server 2019`.'
