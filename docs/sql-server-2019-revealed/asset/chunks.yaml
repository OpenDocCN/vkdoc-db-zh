  trans: '

    # 在 Azure SQL 数据库中使用外部表


    SQL Server 的内置连接器之一提供了对 SQL Server、Azure SQL 数据库和 Azure SQL 数据仓库数据源的访问。


    我已经基于我所描述的模板步骤，在 `ch9_data_virtualization\sqldatahub\azuredb` 文件夹中提供了示例脚本。我提供了
    T-SQL 笔记本和 T-SQL 脚本两种方式来创建和查询外部表。


    要使用这些脚本，您首先需要预配并获取 Azure SQL 数据库的访问权限。针对您的 Azure SQL 数据库运行 `createazuredbtable.sql`
    脚本中的语句。


    设置完成后，让我们逐步演练使用 `azuredbexternaltable.sql` T-SQL 脚本的每个步骤及您应预期的结果：


    1.  运行 T-SQL 脚本中的 `Step 1` 以更改数据库上下文并创建主密钥来加密数据库范围凭据：


    ```sql

    -- 步骤 1：创建主密钥来加密数据库凭据

    USE [WideWorldImporters]

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''S0me!nfo''

    GO

    ```


    2.  运行 `Step 2` 以创建受主密钥保护的数据库范围凭据。您需要提供所创建的 Azure SQL 数据库的服务器登录名和密码：


    ```sql

    -- 步骤 2：创建存储 Azure SQL Server 数据库登录凭据的数据库凭据

    -- IDENTITY = 登录名

    -- SECRET = 密码

    CREATE DATABASE SCOPED CREDENTIAL AzureSQLDatabaseCredentials

    WITH IDENTITY = '''', SECRET = ''''

    GO

    ```


    3.  运行 `Step 3` 以使用数据库范围凭据作为 `CREDENTIAL` 进行身份验证，来创建外部数据源：


    ```sql

    -- 步骤 3：创建外部数据源

    -- sqlserver 是一个关键字，表示数据源是 SQL Server、Azure SQL 数据库或 Azure SQL 数据仓库

    -- :// 后面的名称是 Azure SQL Server 数据库服务器。您的 SQL Server 必须位于与 Azure SQL Server 数据库相同的虚拟网络中，或者必须通过其防火墙规则

    CREATE EXTERNAL DATA SOURCE AzureSQLDatabase

    WITH (

    LOCATION = ''sqlserver://'',

    PUSHDOWN = ON,

    CREDENTIAL = AzureSQLDatabaseCredentials

    )

    GO

    ```


    关于此脚本需要注意几点。`LOCATION` 语法包含一个 `<类型>:<连接信息>`，其中类型可以有以下可能值：

    *   sqlserver

    *   oracle

    *   teradata

    *   mongodb

    *   obdc


    该类型将指示 SQL Server 为外部数据源使用哪个 ODBC 驱动程序。对于 SQL Server，Azure SQL 数据库的连接信息应该是服务器的
    URL（例如，`<server>..database.windows.net`）。


    当您成功创建外部数据源后，可以在用户数据库的上下文中，使用 `external_data_sources` 目录视图查看已创建源的列表。


    ## 提示


    遗憾的是，创建外部数据源时并不验证与数据源的连接。如果您弄错了连接信息的名称，直到尝试创建外部表时才会发现。数据库范围凭据也存在同样的问题。如果您没有提供正确的登录名和密码，直到尝试创建外部表时才会知道。


    4.  运行脚本的 `Step 4` 以创建一个架构来存放外部表对象。这不是必需的，但我喜欢使用架构来帮助组织对象，这也使得安全设置非常方便：


    ```sql

    -- 步骤 4：在 WideWorldImporters 中为外部表创建一个架构

    CREATE SCHEMA azuresqldb

    GO

    ```


    5.  运行 `Step 5`，使用 `DATA_SOURCE` 属性中指定的外部数据源来创建外部表：


    ```sql

    -- 步骤 5：创建外部表

    -- 每一列必须与远程表中的列相匹配

    -- 注意字符列使用了与目标表兼容的排序规则

    -- WITH 子句包含了远程 [数据库].[架构].[表] 的名称以及外部数据库源

    CREATE EXTERNAL TABLE azuresqldb.ModernStockItems

    (

    [StockItemID] [int] NOT NULL,

    [StockItemName] nvarchar COLLATE Latin1_General_100_CI_AS NOT NULL,

    [SupplierID] [int] NOT NULL,

    [ColorID] [int] NULL,

    [UnitPackageID] [int] NOT NULL,

    [OuterPackageID] [int] NOT NULL,

    [Brand] nvarchar COLLATE Latin1_General_100_CI_AS NULL,

    [Size] nvarchar COLLATE Latin1_General_100_CI_AS NULL,

    [LeadTimeDays] [int] NOT NULL,

    [QuantityPerOuter] [int] NOT NULL,

    [IsChillerStock] [bit] NOT NULL,

    [Barcode] nvarchar COLLATE Latin1_General_100_CI_AS NULL,

    [TaxRate] decimal NOT NULL,

    [UnitPrice] decimal NOT NULL,

    [RecommendedRetailPrice] decimal NULL,

    [TypicalWeightPerUnit] decimal NOT NULL,

    [LastEditedBy] [int] NOT NULL

    )

    WITH (

    LOCATION=''wwiazure.dbo.ModernStockItems'',

    DATA_SOURCE=AzureSQLDatabase

    )

    GO

    ```


    这是 Polybase 场景中的一个重要部分，因此我将指出一些细节：

    *   列数、列名和数据类型必须与外部数据源表完全匹配，但您可以在 SQL 端自由命名列名和表名。

    *   类型映射可能比较棘手。我们有文档帮助您定义 SQL Server 类型以匹配相应的外部数据源类型，地址是 `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-type-mapping`。

    *   外部表的 `LOCATION` 语法是您映射外部数据源对象的方式。每个数据源都有一个 `LOCATION`，其内容可以不同，用于标识数据源对象。对于
    SQL Server 或 Azure SQL 数据库，您应使用 `<database>.<schema>.<tablename>` 的“三部分”约定来引用表。

    *   在尝试创建外部表时会执行验证，以确保正确的列匹配、类型映射以及是否使用了任何受限类型（我将在本章后面的“限制与约束”一节中提到限制）。


    创建后，您可以使用目录视图 `sys.external_tables` 查看外部表的列表。`sys.objects` 目录视图将外部表列为类型 `USER_TABLE`。`sys.tables`
    目录视图中有一个可用的列 `is_external`，用于识别哪些表是外部表。


    6.  运行 `Step 6`，在外部表的关键列上创建本地统计信息。这不是必需的，但建议执行，以帮助查询处理器做出明智的决策来支持如下推计算等操作：

    '
- fmt: '-- Step 6: Create local statistics on columns you will use for filters


    ```sql

    CREATE STATISTICS ModernStockItemsStats ON azuresqldb.ModernStockItems ([StockItemID])
    WITH FULLSCAN

    GO

    ```


    4. Run **Step 7** to see a simple example of scanning all rows in an external
    table. In this example, there should only be one row returned if the query was
    successful:


    ```sql

    -- Step 7: Just try to scan the remote table

    SELECT * FROM azuresqldb.ModernStockItems

    GO

    ```


    Remote operators are built into the query processor to support queries against
    external tables using the Polybase service. Figure 9-10 shows an Actual Execution
    Plan for the query in Step 7, including the details of the remote operator.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg)


    Figure 9-10: The remote operator for external tables


    Polybase also comes with a series of Dynamic Management Views that can be used
    to look at the execution of queries against external tables.


    `sys.dm_exec_distributed_requests` – Much like `sys.dm_exec_requests` you can
    find out queries specific to Polybase. What is nice about this DMV is that it
    holds the history of recent queries and not just the active ones. The value in
    the `execution_id` column is the key to use other DMVs to dig deeper into query
    execution.


    `sys.dm_exec_distributed_request_steps` – This DMV will take the `execution_id`
    from `sys.dm_exec_distributed_requests` and let you look at specific steps in
    the execution of Polybase to process the query against the external table. For
    an `execution_id`, each step has a `step_index` value.


    `sys.dm_exec_distributed_sql_requests` – This DMV shows more details for each
    `step_index` in `sys.dm_exec_distributed_steps`, including what compute node is
    executing the query (it could be the head and/or compute nodes for a scale-out
    query).


    `sys.dm_exec_dms_workers` – This DMV provides more details about execution with
    the Polybase Data Movement Service (DMS) for a specific `execution_id` and `step_index`.
    This DMV is important to see details of the connection to an external data source
    via the ODBC drivers, including possible error information.


    5. Run **Step 8** to use a WHERE clause to filter results (and possibly use pushdown
    to the external data source):


    ```sql

    -- Step 8: Try to find just a specific StockItemID

    SELECT * FROM azuresqldb.ModernStockItems WHERE StockItemID = 100000

    GO

    ```


    6. Run **Step 9** to find all stockitems both on SQL Server 2019 and Azure SQL
    Database using a UNION:


    ```sql

    -- Step 9: Use a UNION to find all stockitems for a specific supplier both locally
    and in the Azure table

    SELECT msi.StockItemName, msi.Brand, c.ColorName

    FROM azuresqldb.ModernStockItems msi

    JOIN [Purchasing].[Suppliers] s

    ON msi.SupplierID = s.SupplierID

    and s.SupplierName = ''Graphic Design Institute''

    JOIN [Warehouse].[Colors] c

    ON msi.ColorID = c.ColorID

    UNION

    SELECT si.StockItemName, si.Brand, c.ColorName

    FROM [Warehouse].[StockItems] si

    JOIN [Purchasing].[Suppliers] s

    ON si.SupplierID = s.SupplierID

    and s.SupplierName = ''Graphic Design Institute''

    JOIN [Warehouse].[Colors] c

    ON si.ColorID = c.ColorID

    GO

    ```


    The first part of the UNION involves a join between the external table and a local
    SQL Server table.


    You have seen an example of using an external table for Data Virtualization with
    Azure SQL Database using the built-in connector for SQL Server. Read on for some
    information about the other examples in the `sqldatahub` folder.


    ### Using Built-in Connectors for External Tables


    These are the other examples which use the built-in connectors for external tables.
    Each example has a `readme.md` file with tips on setting up the external data
    source and scripts to build the data source object and populate data. They all
    follow the same template as the example for Azure SQL Database.


    *   `ch9_data_virtualization\sqldatahub\cosmosdb` – Use this for an example of
    using the MongoDB connector with Azure CosmosDB.


    *   `ch9_data_virtualization\sqldatahub\oracle` – Use this for an example of using
    the Oracle connector.


    #### Tip


    One issue that I ran into is that the value for the LOCATION property for the
    EXTERNAL TABLE for Oracle is case sensitive.


    *   `ch9_data_virtualization\sqldatahub\sql2008r2` – Use this for an example of
    using the SQL Server connector to an older version of SQL Server.


    #### Note


    This example requires a workaround for SQL Server 2008R2 which was not addressed
    at the time I wrote this chapter. As we were getting close to release, it was
    not clear how far back we would support SQL Server versions, since 2008R2 is out
    of support.


    ### Using an External Table with HDFS


    An example of using Polybase with HDFS and Azure Blob Storage can be found in
    the `ch9_data_virtualization\sqldatahub\hdfs` directory. The `readme.md` file
    included provides more information on how to set this up and how to use the example.


    One big difference with external data sources with HDFS is the use of the LOCATION
    property with the external data source and the use of the TYPE property.


    Here is an example of the T-SQL statement to create the external data source from
    the example:


    ```sql

    CREATE EXTERNAL DATA SOURCE bwdatalake with (

    TYPE = HADOOP,

    LOCATION =''wasbs://@'',

    CREDENTIAL = AzureStorageCredential

    )

    GO

    ```


    Unlike the other examples, a TYPE field is needed for HADOOP. In addition, the
    LOCATION property doesn’t have a `<type>` like `sqlserver`. This is because the
    `TYPE = HADOOP` tells SQL Server the type of connector to use for HDFS.


    ### Using External Tables with ODBC Connectors


    The final example is for an external table for SAP HANA using the ODBC connector.
    Note that this example only works for SQL Server 2019 on Windows. You can find
    this example in the `ch9_data_virtualization\sqldatahub\saphana` directory.


    In this example, the data source is different, as it requires the ODBC data source
    and connection string details. Here is the external data source creation for this
    example:


    ```sql

    CREATE EXTERNAL DATA SOURCE SAPHANAServer

    WITH (

    LOCATION = ''odbc://'',

    CONNECTION_OPTIONS = ''Driver={HDBODBC};ServerNode=:'',

    PUSHDOWN = ON,

    CREDENTIAL = SAPHANACredentials

    )

    GO

    ```


    #### Tip


    Here is an important tip for using the ODBC data connector with scale-out groups,
    because it caused me issues when I was first setting up these scenarios. You must
    install the ODBC driver you are using on each node of the scale-out group. If
    you don’t, you may get intermittent errors when executing queries. This is because
    when you have a scale-out group, it is possible for any of the nodes to be used
    to execute the queries against the external data source, even if it is not a scale-out
    ready query.


    We also have documentation to guide you with ODBC connectors at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-configure-odbc-generic`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-configure-odbc-generic).
    I should tell you that ODBC connectors open up some interesting possibilities
    to use SQL Server as a data hub. I had one customer at a big event ask me about
    using Polybase with Office 365. I didn’t know the answer, and wondered, “Is there
    an ODBC Driver for O365?” Turns out there is at [`https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver`](https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver).
    Stand back. Maybe you might see me one day creating a demo of SQL Server running
    queries against my Office mail!


    ### Considerations for External Tables


    Now that you have seen how Polybase works and gone through some examples, there
    are a few areas to consider when deciding whether you should use Polybase with
    SQL Server 2019.'
