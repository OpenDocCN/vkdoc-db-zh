    \ or visit `www.springeronline.com`. Apress Media, LLC is a California LLC and\
    \ the sole member (owner) is Springer Science + Business Media Finance Inc (SSBM\
    \ Finance Inc). SSBM Finance Inc is a Delaware corporation.\n\n# Dedication\n\n\
    `This book is dedicated to the SQL Server Community, also known as the #sqlfamily.\
    \ Without the community, this amazing product would not be what it is today.`\n\
    \n# Foreword\n\nWe are truly at a unique tipping point in the history of technology,\
    \ and there has never been a better time to be in the field of data, analytics,\
    \ and AI. The pace of growth in data is more rapid than ever before, and digital\
    \ disruption through AI and ML has created unlimited potential for companies to\
    \ embrace data as a competitive advantage for their business. With the dramatic\
    \ acceleration of digitization, the primary question we now face is how to take\
    \ advantage of this massive volume of data to help our companies and communities\
    \ transform.\n\nWe see a massive opportunity powered by the intelligent cloud\
    \ and the intelligent edge. SQL Server is unparalleled in the industry in the\
    \ level of consistency it provides the developers, data engineers, and administrators\
    \ across the edge, on-premises, private cloud, and the public cloud. Our SQL Server\
    \ community has played a very important role in this evolution, and I cannot thank\
    \ them enough for their support and feedback over the last 25+ years.\n\nSQL Server\
    \ 2019 is a phenomenal release, and I am proud of what the team has delivered.\
    \ SQL Server 2019 builds on the innovation that was delivered in SQL Server 2016\
    \ and SQL Server 2017. While there are several new capabilities that will serve\
    \ our customers well, as is expected from every major release of SQL Server, I\
    \ am most excited about the remarkable innovation that extends the skills our\
    \ customers have built over multiple decades to manage and get insight from their\
    \ Big Data systems. This innovation will play a critical role in driving the digital\
    \ transformation for our customers.\n\nBob Ward has been with the SQL Server team\
    \ since the very early days and has had a notable impact on the product. There\
    \ are very few who have the breadth and depth of understanding that he does, and\
    \ it shows in how he manages to explain complex concepts in a simple, easy-to-understand\
    \ manner in this book. I hope you enjoy reading it.\n\n> Rohan Kumar\n> \n> Corporate\
    \ Vice President, Azure Data at Microsoft\n\n# Introduction\n\nLike my first book\
    \ `Pro SQL Server on Linux`, the pages you are about to read have seen some mileage.\
    \ I’ve travelled more in the year 2019 than any in my lifetime. That meant I needed\
    \ to be prepared to write wherever and whenever I could. This includes flights,\
    \ hotels, trains, and car rides across cities like Seattle, London, Manchester\
    \ (UK), Nashville, Las Vegas (multiple times), San Antonio, Austin, Houston, Orlando,\
    \ St. Lucia (that was on vacation), Genesee (Colorado), Charleston, Boston, Dubai,\
    \ Johannesburg (South Africa), Greenville (SC), and Indianapolis and late nights\
    \ in my office at my home in North Richland Hills, Texas.\n\nI thought after finishing\
    \ my first book I would not be ready to write another one, but I couldn’t resist\
    \ the chance to tell the story of SQL Server 2019. This book really does represent\
    \ that famous saying “A labor of love.” I’ve put my heart and soul into learning,\
    \ teaching, complaining about, breaking, documenting, testing, and using SQL Server\
    \ 2019. This book represents all of that and more.\n\nI wrote this book for data\
    \ professionals and developers who have a fundamental knowledge of SQL Server\
    \ but want a comprehensive look at SQL Server 2019 in one book. This book has\
    \ plenty of examples, figures, and references to guide you along the way. I wrote\
    \ this book so it would not only be a complete understanding of SQL Server 2019\
    \ but also as a reference you can come back to at any time.\n\nWhile each chapter\
    \ is independent, I highly recommend you start with Chapter 1 as it gives you\
    \ the history and background of the release. I also set the stage for all the\
    \ key capabilities of SQL Server 2019 and why I think it is a compelling product.\
    \ From there, you can go through the book in chapter sequence or skip around some.\
    \ One thing is for sure, in order to get the most out of Chapter 10 on Big Data\
    \ Clusters, you must read Chapters 6, 7, 8, and 9 first.\n\nThe book is essentially\
    \ broken down into these major sections:\n\n*   Chapter 1 to introduce the history\
    \ and the overall SQL Server 2019 release.\n*   Chapters 2, 3, and 4 to cover\
    \ performance, security, and availability. There is a lot in these chapters alone\
    \ to get you excited about SQL Server 2019.\n*   Chapter 5 stands on its own for\
    \ developers.\n*   Chapters 6, 7, and 8 are all about Linux, Containers, and Kubernetes.\n\
    *   Chapter 9 introduces you to Data Virtualization with Polybase.\n*   Chapter\
    \ 10 is a big chapter for a big topic: Big Data Clusters.\n*   Chapter 11 concludes\
    \ the book by talking about other new features and migration.\n\nI love “learning\
    \ by example” so I’ve included many examples for almost every chapter in the book\
    \ (and in some cases, I explain how to use an example already created). You can\
    \ find all the examples for this book on GitHub using the link for the book’s\
    \ reference at [`www.apress.com/9781484254189`](http://www.apress.com/9781484254189)\
    \ or on my GitHub repo at [`https://aka.ms/bobsqldemos`](https://aka.ms/bobsqldemos)\
    \ ( [`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql)\
    \ ).\n\nI also recommend you take a look at free training resources our team has\
    \ built at [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops). This\
    \ includes free hands-only lab training with SQL Server 2019!\n\nFor this book,\
    \ I spent a lot of time thinking for each chapter “what would a reader want” on\
    \ a particular topic or example. I hope you can see and feel that as you read\
    \ the book. If you have any questions or issues with the book, I really want to\
    \ hear about them. Please e-mail me directly at `bobward@microsoft.com`.\n\n>\
    \ Bob Ward\n> \n> North Richland Hills, Texas\n> \n> September 2019\n\n# Acknowledgments\n\
    \nI have so many things in my life to be thankful for, and having the ability\
    \ to write this book is one of them. I believe all of my blessings come from God,\
    \ and it is through His grace I have come to know the powerful message of Jesus\
    \ Christ. I must first give thanks to my beautiful and talented wife Ginger. She\
    \ is my partner and my soulmate. She tirelessly heard all my complaints, watched\
    \ me spend very late nights on the book, and sometimes had to be the driver so\
    \ I could work on the book in the passenger seat. I don’t know anyone who has\
    \ stronger faith than my wife Ginger, and I am so fortunate to share a wonderful\
    \ life together with her. We celebrated 30 years of marriage this year, and I\
    \ still love being with her as much as possible each and every day. I also want\
    \ to thank my sons Troy and Ryan. Troy these days lives in Charleston, South Carolina,\
    \ where I wrote the last part of the book as Hurricane Dorian approached. Troy\
    \ is someone who I admire not just for his character but his quest to make this\
    \ place a better world. Ryan is in his second year at Baylor Law School (Go Bears!).\
    \ He continues to amaze me with this intelligence, integrity, and ability to keep\
    \ it all together with confidence yet still find time to improve his golf game.\
    \ I also want to thank my mother Annette Gibaud who continues to show me the example\
    \ of finding a way to be kind to someone each and every day.\n\nThere are so many\
    \ people who helped contribute to this book. I want first to thank Apress Media\
    \ for giving me another chance to write a book. Jonathan Gennick and Jill Balzano\
    \ were there again every step of the way helping me push this book to conclusion.\
    \ And this book could not have been possible and on time without my Technical\
    \ Reviewer Aaron Bertrand. When I thought about writing this book, Aaron was one\
    \ of the first people that came to mind for a reviewer given his incredible knowledge\
    \ of SQL Server and reputation as an expert in the community. Aaron was simply\
    \ superhuman in how fast he cranked out reviews of each chapter.\n\nFrom Microsoft,\
    \ first and foremost thank you to Rohan Kumar, Gayle Sheppard, and Asad Khan for\
    \ giving me the opportunity to spread the message about SQL Server 2019 which\
    \ was instrumental in my detailed learning of the product to write this book.\
    \ I also want to personally thank two of my closest colleagues, Buck Woody and\
    \ Anna Hoffman (Thomas). I travelled the world with Buck and Anna in 2018 and\
    \ 2019 telling the story of SQL Server, Big Data Clusters, and Azure. They both\
    \ made me a better storyteller and teacher and are fun on the road. The Microsoft\
    \ SQL Server Engineering team is nothing short of amazing. I am in awe to be working\
    \ with such intelligent and professional people, many of whom helped me with details\
    \ you find in this book. It all has to start with Slava Oks and Travis Wright\
    \ who helped tell me the story of Seattle and Aris and were both instrumental\
    \ in pushing through much of this release including Big Data Clusters. Conor Cunningham\
    \ continues to amaze me with his deep knowledge of this product while being instrumental\
    \ in delivering a quality release.\n\nThe true heroes of this book are the engineering\
    \ team members who built this release and helped me with various parts of the\
    \ book. In no particular order, I want to say thank you to Pedro Lopes, Pam Lahoud,\
    \ Amit Banerjee, Brian Carrig, Tejas Shah, Vin Yu, Sourabh Agarwal, Mihaela Blendea,\
    \ Nellie Gustafsson, Abiola Oke, James Rowland-Jones, Scott Konersmann, Stuart\
    \ Padley, David Kryze, Robert Dorr, Mitchell Sternke, Ross Monster, Madeline MacDonald,\
    \ Dylan Gray, Joe Sack, Shreya Verma, Jakub Szymaszek, Joachim Hammer, Raghav\
    \ Kaushik, Parag Paul, Panagiotis Antonopoulos, Michael Nelson, Pranjal Gupta,\
    \ Jarupat Jisarojito, Weiyun Huang, George Reynya, Umachandar Jayachandran (UC),\
    \ Sahaj Saini, Mike Habben, Vaqar Pirzada, Rony Chatterjee, Vicky Harp, Alan Yu,\
    \ Jack Li, Alexey Eksarevskiy, Jay Choe, Argenis Fernandez, Kevin Farlee, Arieh\
    \ Bibliowicz, Alex Umansky, Matteo Taveggia, Kapil Thacker, Li Zhang, and Dong\
    \ Cao.\n\nI also want to thank members of Microsoft Marketing and CSS teams for\
    \ their help including Anshul Rampal, Matthew Burrows, Marko Hotti, Debbi Lyons,\
    \ Suresh Kandoth, and Pradeep M M.\n\nThis book and my work would not have been\
    \ possible without partners such as HPE, DELL, and Red Hat who allowed me to tell\
    \ the story of SQL Server 2019 to their customers. Thanks to Wendy Harms, Bill\
    \ Dunmire, Urs Renggli, Robert Sonders, Louis Imershein, and Stephane Bureau (my\
    \ video guy). Special thanks also to David DeWitt for your insights into the history\
    \ of Polybase, Brendan Burns for your insights and my foundation for Kubernetes\
    \ knowledge, and Anthony Nocentino for your great knowledge of Linux and Containers.\n\
    \nFinally, thank you to the SQL Server Community across the world. We now pour\
    \ releases of SQL Server at you faster than ever before, yet you still exhibit\
    \ immense enthusiasm and appreciation every time I present on SQL Server."
