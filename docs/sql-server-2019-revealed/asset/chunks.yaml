    \ gocowboys\n    GO\n    DROP TABLE IF EXISTS howboutthemcowboys\n    GO\n   \
    \ CREATE TABLE howboutthemcowboys (col1 int, col2 char(100) not null)\n    GO\n\
    \    INSERT INTO howboutthemcowboys VALUES (1, 'Whitten has returned')\n    GO\
    \ 1000\n    ```\n\n3.  Use Step 3 to truncate the log via a CHECKPOINT (to make\
    \ it easier to see existing log records) and delete the 1000 rows in a transaction.\
    \ Roll back the transaction and examine the log using the system function **sys.fn_dblog**:\n\
    \n```\n    -- Step 3: Truncate the log, delete all rows, roll it back, and look\
    \ at the tlog records\n    CHECKPOINT\n    GO\n    BEGIN TRANSACTION;\n    DELETE\
    \ FROM howboutthemcowboys\n    ROLLBACK TRANSACTION\n    GO\n    SELECT * FROM\
    \ sys.fn_dblog(NULL, NULL)\n    GO\n    ```\n\nThe results of querying the log\
    \ should yield some 2000+ rows. If you scroll to the bottom of the results, you\
    \ should see log records such as in Figure [4-3](#479130_1_En_4_Chapter.xhtml#Fig3).\n\
    \nNotice all the log records called LOP_INSERT_ROWS before the LOP_ABORT_XACT\
    \ to make the transaction aborted. These LOP_INSERT_ROWS records are compensation\
    \ log records for the DELETE. The logical rollback of a DELETE is an INSERT. All\
    \ the LOP_INSERT_ROW log records and the final LOP_ABORT_XACT were generated as\
    \ part of the ROLLBACK TRANSACTION statement.\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig4_HTML.jpg](images/479130_1_En_4_Chapter/479130_1_En_4_Fig4_HTML.jpg)\n\
