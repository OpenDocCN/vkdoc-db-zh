  trans: '

    ### 部署和使用应用程序


    我在“大数据集群架构”一节中描述了应用池在 BDC 中如何工作，包括关于如何在 BDC 中部署应用程序的文档。


    我们为用 R 和 Python 编写的应用程序提供“运行时”，也支持 MLeap（[`https://mleap-docs.combust.ml/`](https://mleap-docs.combust.ml/)）应用程序和
    SSIS 包。开发者将提供代码和一个 YAML 文件来指定如何运行应用程序，而 BDC 将为应用程序代码运行一个容器副本集。


    应用程序一旦部署，就会始终作为容器“运行”。如果你想要使用或执行应用程序代码，可以使用带有`app`选项的`azdata`命令。你可以在[`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app)查看`azdata
    app`的参考文档。


    BDC 还提供了通过 REST Web 界面使用已部署应用程序的另一种方法。默认情况下，所有已部署的应用程序都通过一个名为`Swagger`（[`https://swagger.io/`](https://swagger.io/)）的协议具备此功能。


    要理解这一切如何运作的最佳方式，是查看我们在[`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy)提供的示例。


    ### 安全性


    在我撰写本章时，BDC 仅支持基本身份验证，即登录名和密码。来自控制器、Knox 和 SQL Server 主实例的所有服务终结点都需要登录名和密码。


    集群内 Pod 之间的所有通信都通过使用`k8s`机密（本身也有登录名和密码）和自签名证书的私有通信通道进行。


    我们的目标是在发布 SQL Server 2019 大数据集群时，为 BDC 中的所有服务终结点支持 Active Directory (AD)身份验证。这包括连接到
    SQL Server 主实例、控制器服务和 Knox 网关。


    我预计，关于如何将 BDC 加入域、如何使用必要的 AD 信息部署 BDC、添加 AD 用户的过程，以及如何使用 AD 账户登录 BDC 的所有详细信息，都将在我们的文档[`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security)中提供。


    ### 高可用性


    正如我在本章中提到的，BDC 中的 Pod 是使用`k8s`的`StatefulSet`或`ReplicaSet`部署的。这为`k8s`平台提供了*内置的高可用性*，以防容器、Pod
    或节点故障（节点故障仅在多节点`k8s`部署中有效）。


    虽然这种*基本高可用性*形式对 SQL Server 有帮助，但最好使用我们的 Always On 可用性组(AG)技术，该技术包括只读副本和 SQL Server
    运行状况检测。


    在部署 BDC 时，你可以选择启用`hadr`。启用`hadr`将在 BDC 中默认创建一个可用性组，并将`系统数据库`包含在 AG 中。会创建`StatefulSet`中的多个
    Pod 来支持此部署。


    使用此配置，我们还会创建连接到 AG 主副本和辅助副本的终结点。由于`系统数据库`作为 AG 的一部分包含在内，你的主连接是连接到 SQL Server 主实例的主副本，就像
    AG 侦听器一样。如果发生故障转移，此终结点将保持连接到成为新主副本的任何副本。还通过单独的终结点支持辅助只读副本连接。


    请查看我们的文档，了解如何启用`hadr`以及使用此类部署的一些影响：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability)。


    ### SQL Server 大数据集群的 Jupyter Books


    Jupyter Books（[`https://jupyter.org/jupyter-book/intro.html`](https://jupyter.org/jupyter-book/intro.html)）提供了一种构建笔记本集合的机制。Azure
    Data Studio (`ADS`)提供了一个 Jupyter Book 笔记本，帮助监控、管理和排查 SQL Server 大数据集群问题。所有这些笔记本都基于
    SQL Server 工程团队使用的实际故障排除指南(`TSG`)！


    图 10-15 展示了 SQL Server 大数据集群的 Jupyter Books。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig15_HTML.jpg](img/479130_1_En_10_Fig15_HTML.jpg)


    图 10-15：SQL Server 大数据集群的 Jupyter Books


    ### 机器学习与大数据集群


    SQL Server 大数据集群(BDC)的承诺之一是提供一个*端到端的机器学习平台*。考虑图 10-16 中的工作流。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig16_HTML.jpg](img/479130_1_En_10_Fig16_HTML.jpg)


    图 10-16：*大数据集群中的机器学习*


    你可以在 BDC 中完成所有这些操作！使用 Spark 和 SSIS 从不同类型的数据源（包括结构化和非结构化）摄取数据。你可以使用数据池、HDFS 甚至
    SQL Server 主实例将数据存储在 BDC 中。你的一些机器学习模型数据可能存在于 BDC 外部的外部数据源中，例如 Azure、SQL Server、Oracle、Teradata
    和 MongoDB。BDC 允许你使用 T-SQL 访问这些数据中的任何一个。


    你现在可以使用 Spark、SparkML 和/或 SQL Server 机器学习服务(ML)来准备和训练你的机器学习模型。然后，你可以使用带有 T-SQL
    的 SQL Server ML 将你的模型作为*机器学习应用程序*公开，或者在应用池中作为一个带有 REST 接口的应用程序公开。应用池为开发人员提供了一种有趣的方法，因为它完全基于你的代码，使用声明式
    YAML 和容器。这意味着它可能成为*持续集成/持续交付*(CI/CD)开发模型的绝佳候选方案。


    ### 机器学习包


    数据科学家使用 BDC 和 SQL Server 2019 的一个巨大优势是我们部署产品时附带的所有机器学习包。我询问了我们团队的高级项目经理 Rony Chatterjee
    博士，如何发现所有这些已安装的 ML 包。他给了我以下可以在 SQL Server 2019 或 BDC 上运行的 T-SQL 查询，以查看这些包：


    ```sql

    EXEC sp_execute_external_script

    @language=N''Python'',

    @script=N''

    import pkg_resources

    import pandas

    OutputDataSet = pandas.DataFrame([(d.project_name, d.version) for d in pkg_resources.working_set])''

    ```


    我在部署的 BDC 上运行了这个查询，结果有超过 160 个机器学习包！

    '
- fmt: "# Using Examples\n\nI believe you should review and even try out some examples\
    \ to see what is possible with Machine Learning and SQL Server Big Data Clusters\
    \ (BDC):\n\n*   **`SparkML`** – We have an example of using Spark and Spark ML\
    \ with BDC to predict income levels based on past census data in the United States.\
    \ You can see this example at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-create-machine-learning-model`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-create-machine-learning-model).\n\
    \n*   **`BDC Applications`** – There are several ML application examples using\
    \ Application Deploy you can use at [`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy).\n\
    \n*   **The Buck Woody Example** – Buck Woody and I were doing some training for\
    \ a customer in spring of 2019, and Buck brought up a very cool real-world example\
    \ for Machine Learning (ML). The idea is that the mythical company WideWorldImporters\
    \ has trucks that ship temperature-sensitive products. The trucks have cooling\
    \ systems powered by batteries. A big problem is that the cooling systems in the\
    \ trucks can fail due to battery lifecycles. The batteries are supposed to last\
    \ 3 months, but in many cases they fail earlier. The company wants to build a\
    \ predictive ML model to determine when a battery may need to be replaced – based\
    \ on dynamic factors of the truck and cargo, instead of the fixed 3-month cycle.\n\
    \n    Buck has a specific Notebook you can use to see this example at [`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_05.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_05.ipynb).\
    \ You need to follow all the Notebooks to use this tutorial at [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks).\
    \ When Buck and I were doing this training, one of the customers remarked something\
    \ to the effect of, “Finally someone has explained to me a practical, real-world\
    \ example for Machine Learning, and I’ve learned I can use Big Data Clusters to\
    \ implement it.”\n\n# Managing and Monitoring Big Data Clusters\n\nYou can see\
    \ there are many components and moving parts to SQL Server Big Data Clusters (BDC).\
    \ There are many considerations to monitor and manage BDC including managing your\
    \ Kubernetes cluster, SQL Server, and other BDC components.\n\n## Managing Kubernetes\
    \ (k8s)\n\nIf you look at what we have built with BDC, it is effectively an `application\
    \ powered by Kubernetes`. While we have specific capabilities to help you manage\
    \ the BDC application, you still must be prepared to manage your k8s cluster.\
    \ For development and testing of BDC, this is probably not an issue for you, but,\
    \ to run BDC in production, you must plan for how your k8s cluster will be managed\
    \ and monitored independent of BDC. I cannot begin to emphasize how important\
    \ it is to understand how to ensure your k8s cluster is properly managed and functioning\
    \ at a healthy level. The entire BDC solution depends on it.\n\nI recommend the\
    \ following resources for managing k8s:\n\n*   Look at our documentation for managing\
    \ Azure Kubernetes Service (AKS) at [`https://docs.microsoft.com/en-us/azure/aks/best-practices`](https://docs.microsoft.com/en-us/azure/aks/best-practices).\n\
    \n*   I highly recommend this book which also includes some great information\
    \ on the internals of k8s: [`https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/`](https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/).\n\
    \nI also provided tips and techniques to manage and monitor a k8s cluster in Chapter\
    \ [8](#479130_1_En_8_Chapter.xhtml) in the section “Tips with k8s.”"
