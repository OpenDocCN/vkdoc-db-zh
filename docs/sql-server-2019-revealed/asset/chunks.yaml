    ## 示例的先决条件


    上一章或许让你们失望了，因为没有示例，而本章的示例将绰绰有余。这是我最喜欢的章节之一，因为我热爱容器这个主题。


    在本章中，我将向你展示几种在 Windows 和 Linux 上运行容器的不同方法。我为你提供了脚本，可以在任一平台（或 macOS）上运行所有示例，但在示例中，我可能会更详细地介绍如何在特定平台上使用某个示例。


    我编写本章的目标是，所有示例都基于 Bash shell 脚本，并且为 Windows 用户使用新的 Windows Subsystem for Linux
    (`WSL2`)。然而，在撰写本文时，这需要 Windows 10 的 `insider` 版本，而我不希望让作为读者的你承担这个风险。对于 Windows
    用户，我提供了可在 PowerShell 中使用的示例（但请记住，正如我在上一节讨论的，这仍然会使用 Docker Desktop 虚拟机）。`WSL2`
    将改变这个局面，但需要下一个主要的生产版 Windows 10 才能使用 `WSL2`（除非你愿意尝试 insider 版本）。


    对于所有平台上的所有示例，你都需要


    *   互联网连接，因为这些示例将从 Microsoft 容器注册表拉取 docker 镜像。

    *   WideWorldImporters 示例数据库备份，可以在 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)
    找到。

    *   如果尚未安装，需要在你的计算机上安装 SQL Server 命令行工具。Windows 用户可以从 [`https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility`](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)
    找到下载。Linux 用户可以使用以下文档：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools)。macOS
    用户请参考以下文档：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos)。

    *   Azure Data Studio 或 `ADS` (至少是 2019 年 6 月版)，从 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)
    获取。`ADS` 非常适合这些示例，因为它是一个跨平台工具。对于 `ADS` 用户，我建议你安装这个扩展：[`https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker`](https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker)。对于
    `ADS`，你需要在安装页面上选择 Download Extension 选项。将 `VSIX` 文件下载到你的本地计算机，然后按照 `ADS` 的文档进行安装。以下是为
    `ADS` 添加扩展的方法：[`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions)。


    以下是每个平台需要安装的内容列表：


    ### Windows 用户


    在 [`https://hub.docker.com/editions/community/docker-ce-desktop-windows`](https://hub.docker.com/editions/community/docker-ce-desktop-windows)
    安装 Docker Desktop for Windows。Windows Server 用户也可以通过阅读 [`https://docs.docker.com/install/windows/docker-ee/`](https://docs.docker.com/install/windows/docker-ee/)
    来安装 Docker。


    对于 Windows 用户，这里还有一个重要的点。你可能会使用 `git` 来克隆本书的仓库以获取所有示例。为此，你很可能已经安装了 Git for Windows。在安装
    Git for Windows 时，请务必关闭 `autocrlf` 选项。否则，本章所需的 Linux shell 脚本将运行失败。如果你不知道该使用什么选项，在克隆仓库时可以使用如下语法：


    ```

    git clone --config core.autocrlf=false

    ```


    ### Linux 用户


    Docker 有免费或社区版 (`CE`) 和付费企业版 (`EE`)。对于 `CE`，根据你的 Linux 发行版有不同的安装选项。例如，Ubuntu 用户可以从
    [`https://docs.docker.com/install/linux/docker-ce/ubuntu/`](https://docs.docker.com/install/linux/docker-ce/ubuntu/)
    或 [`https://hub.docker.com/search/?type=edition&offering=community`](https://hub.docker.com/search/?type=edition&offering=community)
    安装 docker。


    如果你使用 Docker `EE`，在 [`www.docker.com/products/docker-enterprise`](http://www.docker.com/products/docker-enterprise)
    有针对 Ubuntu、`RHEL` 和 `SUSE` 的具体安装说明。


    ### macOS 用户


    从 [`https://hub.docker.com/editions/community/docker-ce-desktop-mac`](https://hub.docker.com/editions/community/docker-ce-desktop-mac)
    安装 Docker Desktop for Mac。我为 Linux 和 macOS 用户构建的脚本在所有 docker 命令前都加了 `sudo`。虽然在
    macOS 上不是必需的，但使用 `sudo` 效果良好，并且允许为两个平台使用同一套脚本。

