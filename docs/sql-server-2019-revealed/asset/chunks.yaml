    ## SQL Server 机器学习服务


    我在微软支持部门工作了 20 多年后，于 2016 年加入 SQL 工程团队时，Joseph Sirosh 是负责 SQL Server 的副总裁。当时 SQL
    Server 2016 刚刚发布，我知道 Joseph 对 SQL Server 团队通过 R 编程语言将机器学习集成到产品中的工作感到特别自豪。


    Joseph 是一位数据科学家，对机器学习和数据有着无比的热情。R 作为一种开源语言，是数据科学和机器学习领域最受欢迎的编程语言之一，因此将其与 SQL Server
    集成似乎是自然而然的。此外，微软在 2015 年收购了一家名为 Revolution Analytics 的公司，该公司构建了 R 的商业版本，包括使其更具可扩展性的改进，称为`RevoScaleR`。（有关
    R 的历史，请参阅此资源：[`https://en.wikipedia.org/wiki/R_(programming_language)`](https://en.wikipedia.org/wiki/R_%2528programming_language%2529)。）现在，将这些力量结合起来，为数据构建一个基于
    SQL Server 的机器学习平台成为可能。这个最初的功能被称为`SQL Server 2016 R Services`。SQL Server 2017
    引入了与 Python 编程语言的集成，使用了相同的概念和架构。随着这一改变，R 和 Python 结合的新能力成为了`SQL Server Machine
    Learning Services`。


    虽然 SQL Server 2019 的 SQL Server 机器学习服务（ML Services）变化不大，但这可能是你正在研究的新功能，因此我将简要介绍一下它的工作原理。这很重要，原因有几个：


    *   了解 ML Services 如何工作以及使用它的好处，将帮助你判断这个功能是否适合你和你的应用程序。

    *   如果你更了解此功能的集成、安全性和治理，你将更有信心在 SQL Server 中使用 ML Services。

    *   ML Services 所使用的、称为`可扩展性框架`的架构，与 SQL Server 2019 的新功能——SQL Server 语言扩展所使用的架构是相同的。


    在阅读本章剩余部分之前，建议你查阅 SQL Server ML Services 的文档：[`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-server-machine-learning-services`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-server-machine-learning-services)。


    ### 工作原理


    在 SQL Server ML Services 出现之前，数据科学家在单独的计算机（工作站或服务器）上开发和执行他们的*模型*（通常指机器学习程序），而所有数据（如来自
    SQL Server 的数据）都是远程访问的。在许多情况下，用于这些模型的 R 或 Python 程序会简单地“拉取”整个表，然后在程序中过滤结果，从而未能发挥像
    SQL 这样的语言的强大能力。


    SQL Server ML Services 提供了一种新的能力，可在以下概念下执行可扩展的机器学习程序：


    *   机器学习程序在与 SQL Server 相同的计算机上执行，但在独立于`SQLSERVR.EXE`的进程中运行。

    *   SQL Server 通过系统存储过程`sp_execute_external_script`提供一个 T-SQL 接口，以执行机器学习代码。

    *   SQL Server 提供了一种架构，用于与机器学习代码进行智能数据交换和实现可扩展性。


    请参阅图 5-6，该图展示了 SQL Server ML Services 的架构，称为`SQL Server 机器学习服务中的可扩展性架构`，可在 SQL
    Server 文档中找到：[`https://docs.microsoft.com/en-us/sql/advanced-analytics/concepts/extensibility-framework#architecture-diagram`](https://docs.microsoft.com/en-us/sql/advanced-analytics/concepts/extensibility-framework%2523architecture-diagram)。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig6_HTML.jpg](img/479130_1_En_5_Fig6_HTML.jpg)


    图 5-6：SQL Server ML Services 架构


    遗憾的是，文档并未提供图中编号的详细说明，因此我将在此说明，这将帮助你更深入地理解其工作原理。

    '
- fmt: '# Note


    I’ve spoken on this topic in the past and have a very detailed architecture diagram
    and explanation. You can see this in Figure [5-7](#479130_1_En_5_Chapter.xhtml#Fig7)
    or the details at [`www.youtube.com/watch?v=y52oBaI32Jo`](https://www.youtube.com/watch%253Fv%253Dy52oBaI32Jo)
    and [`www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know`](https://www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know).
    These resources show the architecture for SQL 2016 R Services, but it is the same
    architecture to include Python. An updated slide that includes Python can be found
    at [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms). Search in the SQL2017
    folder for a deck called `Inside SQL Server Machine Learning Services`.


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig7_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    ## A deeper dive into SQL Server ML Services


    Here is my version of the architecture at a deeper dive (Figure [5-7](#479130_1_En_5_Chapter.xhtml#Fig7)).


    1.  User executes `sp_execute_external_script` with a language chosen (R or Python),
    a script, and other parameters like what T-SQL query to execute. SQL Server communicates
    to a separate program called the Launchpad (a service in Windows or daemon in
    Linux) via named pipes, passing in all the relevant details (such as the R or
    Python script).


    2.  Launchpad has the code to execute a DLL corresponding to the R or Python language.
    Launchpad uses a worker thread model similar to the SQL Server engine. In fact,
    it loads the SQLOS system that SQL Server uses for OS services.


    3.  The Launchpad DLL will fork or create a new process for the corresponding
    language (`rterm.exe` for R or `python.exe` for Python).


    4.  Another process is forked called `bxlserver.exe` (often referred to as a *satellite*
    process). This program will interact with `rterm.exe` or `python.exe` to exchange
    data.


    5.  `bxlserver.exe` communicates with the SQL Server engine on a private TCP channel
    (not the same as connecting as a client into SQL Server) to receive data from
    the T-SQL query executed to feed the R or Python program. This execution happens
    in an *interleaved* fashion. This means the engine can get rows for the T-SQL
    query to feed the Machine Learning program and at the same time get results back.
    The DLL that supports this exchange is called `sqlsatellite.dll`.


    6.  `sqlsatellite.dll` works with a module in `bxlserver.exe` to exchange data
    with `rterm.exe` or `python.exe`.


    7.  All results (including stdout messages) from the `rterm.exe` or `python.exe`
    program are streamed back to SQL Server through the TCP channel.


    The result of this is that a user executes `sp_execute_external_script` and receives
    back results in the form of a table (like a SELECT result set) along with stdout
    messages. There are also options for output parameters and more.


    The key concept for a better solution is that the R or Python code is running
    on the same computer as SQL Server (close to the data), and SQL Server can exchange
    data with the code in an efficient manner (there is no network traffic to exchange
    data).


    The best way to understand how the T-SQL query (aka “the input query”) and the
    R or Python program interact is to try an example. Instead of going through an
    example here, I highly recommend you use the example at [`https://aka.ms/sqldev`](https://aka.ms/sqldev)
    or directly for Python at [`https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/`](https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/).
    One reason I recommend you use this example is that it also includes an example
    of how to use **native scoring** through T-SQL ([`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)).


    My colleague Buck Woody also has an excellent workshop to try all of this and
    see it in action at [`https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices`](https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices).
    What is nice about this workshop is that you will learn a bit about data science
    along the way (for those of us who, unlike Buck, are mere mortals at data science).'
