    .'
  trans: '### Docker 有魔法吗？


    到目前为止我所描述的内容，对任何熟悉计算机系统的人来说似乎都有些神奇。每当有人提到“容器”这个词，“Docker”这个名字几乎总会紧随其后。事实证明，操作系统虚拟化的概念——即定义了容器到底是什么的概念——已经存在一段时间了（更多信息请阅读
    [`https://en.wikipedia.org/wiki/OS-level_virtualisation`](https://en.wikipedia.org/wiki/OS-level_virtualisation)）。任何曾与我共事过、当我去研究某样东西如何工作时的人都知道，我总是想知道“API
    是什么？” 换句话说，就是用来实现目标的编程接口是什么。对于容器而言，答案隐藏在内核操作系统提供的 API 之后。


    Docker（以及市场上其他的容器运行时）采用了容器的概念，并构建了一个被广泛使用的平台和生态系统。但 Docker 本身是利用操作系统的功能来实现容器概念的，具体来说，是以下这些主要结构（在
    Linux 上，但类似概念也适用于 Windows 容器）：


    `命名空间（Namespace）` – 命名空间提供了一种机制，使进程能够彼此隔离运行。你可以在 [`https://en.wikipedia.org/wiki/Cgroups#NAMESPACE-ISOLATION`](https://en.wikipedia.org/wiki/Cgroups%2523NAMESPACE-ISOLATION)
    阅读更多关于命名空间的信息。


    `控制组（Control groups，cgroups）` – `cgroups` 提供了一种控制进程或一组进程资源使用情况的机制。容器默认情况下可以访问所有计算资源，如内存和
    CPU，但 `cgroups` 提供了一种限制容器资源使用的方法。


    `联合文件系统（Union file system）` – 联合文件系统允许将多个目录呈现为一个目录。这个概念是保持容器体积小巧以及支持`可读`和`可写`层的关键。在
    Linux 系统中，`OverlayFS` 文件系统支持联合文件系统。你可以在 [`https://docs.docker.com/storage/storagedriver/overlayfs-driver/#how-the-overlay-driver-works`](https://docs.docker.com/storage/storagedriver/overlayfs-driver/%2523how-the-overlay-driver-works)
    阅读更多关于它如何为容器工作。


    让我停下来解释一下我刚刚为容器引入的一个关键概念：


    `可读层（readable layer）` – 容器镜像是只读的，由文件系统中呈现的一组文件组成。对于 SQL Server 而言，这包括基础操作系统镜像支持的最小文件集，以及
    SQL Server 的文件，包括二进制文件和系统数据库。


    `可写层（writeable layer）` – 可写层是指容器启动后对其文件系统所做的任何更改。这可能包括对来自可读层的文件的任何修改或添加的新文件。可写层在容器的整个生命周期内都是持久存在的。一旦容器被移除，可写层也会被移除。正如你可以想象的那样，对于
    SQL Server 用户数据库来说，这就带来了问题。


    `卷（volume）` – 卷是主机上持久存储的一个位置，它映射到容器可写层中的一个目录位置。你会看到，对于 SQL Server，常见的做法是使用一个卷来映射到容器中的某个目录以存储数据库。卷的存在独立于容器的生命周期，因此即使容器被移除，卷仍然存在。


    我非常喜欢 Docker 所做的一件事是引入了他们自己的 API，抽象了支持容器的底层操作系统概念，称为 `libcontainer`。你可以在 [`https://github.com/opencontainers/runc/tree/master/libcontainer`](https://github.com/opencontainers/runc/tree/master/libcontainer)
    阅读更多关于 `libcontainer` 的信息。另一篇关于容器开源性质的有趣读物是开放容器倡议（OCI），微软是其创始成员之一（[`www.opencontainers.org/`](https://www.opencontainers.org/)）。


    需要指出的是，Docker 是容器运行时的一个例子，也是业界最受欢迎的之一。还有一个名为 `containerd` 的开源容器运行时，你可以在 [`https://containerd.io/`](https://containerd.io/)
    了解它。'
- fmt: '# Container Lifecycle


    When you install Docker whether it is on Linux, Windows, or macOS, the following
    components are installed which enable containers:


    `Docker engine` – This consists of the `docker daemon` which is a “service” that
    controls all the operations for building and running containers. The `docker engine`
    supports an API for programs to interact with the engine for building and running
    containers. You can read more about the `docker engine` at [`https://docs.docker.com/engine/`](https://docs.docker.com/engine/).
    You can read more about the engine API at [`https://docs.docker.com/develop/sdk/`](https://docs.docker.com/develop/sdk/).


    `docker client` – This is a program called `docker` which uses the engine API
    to build and run containers. The `docker client` is a consistent program in that
    it supports options and behaves the same across Windows, macOS, and Linux. You
    will use the `docker client` throughout this chapter in the examples.


    `docker compose` – This is a program called `docker-compose` which allows you
    to build and run multi-container applications. You will use `docker-compose` in
    an example later in this chapter with SQL Server Replication.


    Using these components, consider the following workflow I call the container lifecycle
    as seen in Figure [7-2](#479130_1_En_7_Chapter.xhtml#Fig2).


    ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig2_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The container lifecycle


    Let’s look at each of these in more detail:


    ## build


    The `docker build` command is used to build a new container image. Even though
    an SDK is supported, the standard approach is to define the image to build using
    a file called `Dockerfile`. You can read more about `docker build` at [`https://docs.docker.com/engine/reference/commandline/build/`](https://docs.docker.com/engine/reference/commandline/build/).
    The reference for the syntax of a `Dockerfile` can be found at [`https://docs.docker.com/engine/reference/builder/`](https://docs.docker.com/engine/reference/builder/).
    Microsoft builds the images containing SQL Server so you in many cases will never
    build your own image. However, there are circumstances where you will build a
    customized image *based on SQL Server*. I’ll show you examples later in this chapter.


    ## push


    Once you build an image, you probably want others to use it so you can push or
    publish your container image to a registry using the `docker push` command. That
    registry can be on a local server or in the public domain. One of the most common
    public domain registries is the Docker Hub or hub.docker.com. Microsoft, including
    SQL Server, publishes their container images at mcr.microsoft.com (called the
    Microsoft Container Registry). I’ll talk later in this chapter on how to find
    the various SQL Server images on the Microsoft Container Registry. You can read
    more about `docker push` at [`https://docs.docker.com/engine/reference/commandline/push/`](https://docs.docker.com/engine/reference/commandline/push/).


    ## pull


    Anyone wanting to consume a container image must pull it even if it is stored
    on a local server. A container image is pulled using the `docker pull` command.
    The `docker engine` will store a copy of the image locally on the host computer.
    You can read more about the `docker pull` command at [`https://docs.docker.com/engine/reference/commandline/pull/`](https://docs.docker.com/engine/reference/commandline/pull/).


    ## run


    To run a container based on an image, you use the `docker run` command. If you
    run a container based on an image that is not already pulled, docker will first
    pull the image and then run the container. You will learn all the parameters and
    details required in this chapter to run a SQL Server container.


    ## manage


    After you run a container, you will want to `manage` it. The `docker client` will
    allow you to stop, start, restart, and remove a container. In addition, the `docker
    client` will let you manage images including removing them.


    ## monitor


    The `docker client` can also be used to `monitor` and manage the container ecosystem
    by listing out running containers and stopped containers and dumping out stats
    and logs from running and stopped containers.


    ## interact


    Finally, the `docker client` allows you to `interact` with running containers
    by copying files into the writeable layer from the host system and running a program
    that exists in the containers’ file system (which will be run in the same namespace
    as the main container program. These commands will be very useful for SQL Server
    containers as you will see in the examples in this chapter.'
