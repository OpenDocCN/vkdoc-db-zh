  trans: '### 这与 Azure 有何不同？


    Polybase 目前作为一项功能存在于 SQL Server、Azure SQL Data Warehouse 和 Analytics Platform
    System（APS，原名并行数据仓库）中。然而，它们各自提供的功能有所不同。


    ### 注意


    `EXTERNAL TABLE`（外部表）对象确实存在于 Azure SQL Database 中，但它本身并不是 Polybase 功能（截至 SQL Server
    2019 版本）。Azure SQL Database 中的外部表用于支持弹性查询。你可以在 [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started)
    阅读更多关于弹性查询的内容。


    Azure SQL Data Warehouse 的 Polybase 专注于使用外部表来访问 Hadoop 或 HDFS，数据源可以是 Azure Blob
    Storage 或 Azure Data Lake 等。Azure SQL Data Warehouse 不支持 SQL Server、Oracle 等数据源。你可以在
    [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql?view=azure-sqldw-latest`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql%3Fview%3Dazure-sqldw-latest)
    阅读更多关于 Azure SQL Data Warehouse 中 Polybase 的内容。


    APS 的 Polybase 与 Azure SQL Data Warehouse 类似，但更侧重于提供对“本地”Hadoop 系统的访问。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql?view=aps-pdw-2016-au7`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql%3Fview%3Daps-pdw-2016-au7)
    了解 APS 的 Polybase。


    ## 示例的先决条件


    我们将在本章剩余部分讨论一些示例。首先，我将给你一些部署和配置 Polybase 的提示，然后是一些关于使用示例的指导。


    ### 设置并启用 Polybase


    要在 Windows 上安装 Polybase，你可以按照文档 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation)
    中的步骤操作。在选择独立 Polybase 实例时，步骤非常直接。你必须做出的一个选择是是否要使用 `Java connector for HDFS`（HDFS
    的 Java 连接器）。如果你选择支持 HDFS 的外部表，你可以选择使用 SQL Server 2019 提供的默认 Open Java，或者安装你自己的
    Java。我们提供的 Open Java 基于 Zulu Java，你可以在 [`https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/`](https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/)
    了解相关信息。


    在 Windows 上安装 Polybase 后，我们将安装一系列 ODBC 驱动程序（放置在 `binn\Polybase\ODBC Drivers` 目录中）。这些驱动程序为内置的
    SQL Server、Oracle、Teradata 和 MongoDB 连接器提供支持。


    安装 Polybase 功能后，你必须按照 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation?view=sql-server-ver15#enable`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation%3Fview%3Dsql-server-ver15%23enable)
    的文档说明，使用 `sp_configure` 启用该功能。


    对于 Linux 上的 SQL Server，我们提供了一个单独的 Polybase 包，你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)
    了解如何配置和使用它。


    对于横向扩展组，设置过程变得非常有趣。由于目前仅在 Windows 上支持横向扩展组，因此对于 SQL Server 2019，这是你唯一需要担心的配置。


    我的横向扩展组部署经验相当困难。你可以在我们的文档 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15)
    中阅读所有步骤。在你踏上这条路之前，让我给你一些初步的想法：


    *   你将需要一个 Windows 域，因此如果你没有域控制器，你需要先设置一个。

    *   Polybase 横向扩展组的所有 Windows 服务必须使用相同的域服务帐户。你必须通过安装程序或使用 SQL Server 配置管理器进行配置。

    *   你最初必须在头节点和计算节点上做出一些选择。当你首次使用安装程序在所有节点上安装 Polybase 并选择选项 `Use the SQL Server
    instance as part of a PolyBase scale-out group`（将 SQL Server 实例用作 PolyBase 横向扩展组的一部分）时，所有节点都可能是头节点候选。要使
    Polybase 正常工作，你需要选择一台计算机作为头节点。然后对于其他节点，你需要运行一个存储过程将它们配置为计算节点，并列出头节点服务器的名称和端口（注意你在安装过程中选择的端口，因为这里会用到）。作为计算节点加入的过程记录在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15#add-other-sql-server-instances-as-compute-nodes`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15%23add-other-sql-server-instances-as-compute-nodes)。

    *   你需要在所有节点上使用 `sp_configure` 启用 Polybase，并重新启动 SQL Server。

    *   你还需要在所有节点上重新启动所有 Polybase 服务。实际上，如果存储过程没有自动执行此操作，你需要在计算节点上停止 Polybase 引擎。如果一切顺利，Polybase
    引擎服务将在计算节点上被禁用，但你应该仔细检查这一点。

    *   查询 DMV `dm_exec_compute_nodes` 以确保所有节点都处于正确的 `HEAD` 或 `COMPUTE` 状态。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql)
    阅读更多关于此 DMV 的内容。'
- fmt: '### Using the Examples


    Consider a possible scenario for the WideWorldImporters company in Figure [9-7](#479130_1_En_9_Chapter.xhtml#Fig7).


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig7_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig7_HTML.jpg)


    Figure 9-7: The SQL Server data hub


    In this example, the WideWorldImporters (WWI) company uses SQL Server 2019, but
    wants to access data in these data sources:


    `SQL Server 2008R2` – The company has an older SQL Server system that stores an
    archive of suppliers. They don’t want to touch this system but want to access
    this supplier information.


    `Azure SQL Database` – A team in the company is looking to move to the cloud and
    build a new StockItems database using Azure. Teams in WWI want to see and join
    this StockItem data with existing ones in the SQL Server 2019 database without
    disrupting the new team’s work.


    `Azure CosmosDB` – Another team is piloting a mobile application for Orders and
    is experimenting with Azure CosmosDB. The WWI team wants to be able to look at
    these orders and join with data associated with the orders in the local database.


    `Oracle` – The accounting software for the WWI is in Oracle. While WWI is considered
    a migration of this database to SQL Server, it is taking time for the migration
    project. In the meantime, the WWI knows that some data in the SQL Server database
    references data in Accounts Receivable. If they can get the right reasonable access
    to Oracle, they would like to join local SQL Server data with the Accounts Receivable
    data in Oracle, until the migration is complete.


    `Hadoop` – A team at WWI is building a rating system on the company web site for
    customers to review the order experience. To accelerate the project, the development
    team is storing the order reviews in semistructured format using Azure Blob Storage.
    Teams at WWI want to run analytics on this data and join with local data in SQL
    Server.


    `SAP HANA` – WWI recently acquired another company, Vandelay Industries (I was
    inspired by the fictional company from *Seinfeld*. See [https://seinfeld.fandom.com/wiki/Vandelay_Industries](https://seinfeld.fandom.com/wiki/Vandelay_Industries)
    ). This company has data on their customers in SAP HANA. While the WWI team devises
    a migration strategy, they want to run analytics on these customers without having
    to move the data.


    All of these scenarios are possible with Polybase in SQL Server 2019 and external
    tables. In fact, there is an example of each one of these in your examples in
    the `ch9_data_virtualization\sqldatahub` folder.


    ## Using External Tables


    Before I walk through some of the examples from the `sqldatahub` folder, let me
    explain the basic template you will consistently find in these examples. This
    template follows the general workflow of external tables, which I described in
    the section called “The Polybase Workflow.” All Polybase objects are in the scope
    of a user database.


    1.  Create a `MASTER KEY` in the database.


    2.  Create a `DATABASE SCOPED CREDENTIAL` for authentication to the external data
    source.


    3.  Create an `EXTERNAL DATA SOURCE` to show the location of the data source.
    The `CREDENTIAL` property will be the name of the database scoped credential.


    4.  Create an `EXTERNAL FILE FORMAT` for HDFS data.


    5.  Create an `EXTERNAL TABLE` to map to the external data source target tables.
    The `DATA_SOURCE` property will be the name of the external data source. The `FILE_FORMAT`
    property (for HDFS only) will be the name of the external file format object.


    6.  Create local statistics on columns for the external table.


    7.  Query the `EXTERNAL TABLE` sometimes joining the table to local SQL Server
    tables or other external tables.


    There is an excellent reference for all the T-SQL statement involved in creating
    Polybase objects at [https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects)
    .


    ### Tools and External Tables


    Before I walk through the example scripts for the sqldatahub, you should know
    about tools support for external data sources and external tables.


    SQL Server Management Studio (SSMS) supports creating external data sources and
    external tables through SSMS templates. Figure [9-8](#479130_1_En_9_Chapter.xhtml#Fig8)
    shows an example of using SSMS to create an external data source.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig8_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig8_HTML.jpg)


    Figure 9-8: Using an SSMS template to create an external data source


    The same concept applies to external tables.


    Once you create external data sources and tables, you can use SSMS Object Explorer
    to browse these resources. Figure [9-9](#479130_1_En_9_Chapter.xhtml#Fig9) shows
    an example of external data sources and file formats created in the WideWorldImporters
    database.


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig9_HTML.jpg](images/479130_1_En_9_Chapter/479130_1_En_9_Fig9_HTML.jpg)


    Figure 9-9: SSMS Object Explorer browsing external data sources and file formats


    Azure Data Studio (ADS) also supports an External Table Wizard for SQL Server
    and Oracle data sources to walk you through the process of creating new external
    tables. You can read about this capability at [https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)
    .


    I’ll walk you through the steps for setting up an external table for Azure SQL
    Database. For other sqldatahub examples, I’ll point you to the script examples
    and explain a few points about each scenario.'
