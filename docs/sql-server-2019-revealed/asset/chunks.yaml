    \ 已被调度创建，让我们创建一个 `secret` 来保存 SQL Server 的 `sa` 密码。使用以下命令或脚本 **step4_create_secret.sh**：\n\
    \n```\nkubectl create secret generic mssql-secret --from-literal=SA_PASSWORD=\"\
    Sql2019isfast\"\n```\n\n当此命令完成时，你应该会看到以下结果，并且 `secret` 应该立即创建：\n\n```\nsecret/mssql-secret\
    \ created\n```\n"
- fmt: "## Note\n\n在第[7](#479130_1_En_7_Chapter.xhtml)章中，我提到了SQL Server容器对Active Directory认证的支持即将到来，适用于SQL\
    \ Server 2019。一旦此功能最终确定，我们应该也能够在k8s中为SQL Server支持AD认证。\n\n### 步骤1\n下一步是使用`PersistentVolumeClaim`（PVC）的概念为SQL\
    \ Server数据库创建存储。PVC类似于在核心磁盘系统之上定义的卷，我们可以将其映射到SQL Server Pod的数据库目录。\n\n使用以下命令创建用于SQL\
    \ Server Pod的PVC，或运行脚本`step5_create_storage.sh`：\n```bash\nkubectl apply -f storage.yaml\n\
    ```\n\n您应该会很快看到此消息返回，并且PVC将在后台创建：\n```\npersistentvolumeclaim/mssql-data created\n\
    ```\n\n在创建的同时（这可能很快），让我们查看`storage.yaml`文件以了解幕后发生的事情：\n```yaml\napiVersion: v1\n\
    kind: PersistentVolumeClaim\nmetadata:\n  name: mssql-data\n  annotations:\n \
    \   volume.beta.kubernetes.io/storage-class: azure-disk\nspec:\n  accessModes:\n\
    \    - ReadWriteOnce\n  resources:\n    requests:\n      storage: 8Gi\n```\n\n\
    元数据很有趣，因为注释标签将PVC绑定到一个名为存储类的磁盘。我怎么知道要使用`azure-disk`？这是因为当您创建AKS集群时，您会自动获得一个基于高级存储的Azure磁盘，其存储类名为`azure-disk`。您可以创建其他的，但这是AKS创建的标准存储类。您可以在\
    \ [`https://docs.microsoft.com/en-us/azure/aks/concepts-storage`](https://docs.microsoft.com/en-us/azure/aks/concepts-storage)\
    \ 阅读更多关于AKS存储的信息。如果您不使用k8s，您可能已经创建了存储类，或者可以咨询您的k8s管理员，或者使用以下命令找出可用的存储类：\n```bash\n\
    kubectl get StorageClass\n```\n\n通过运行以下命令，您可以找到有关`azure-disk`的更多详细信息：\n```bash\n\
    kubectl describe StorageClass azure-disk\n```\n\n`storage.yaml`的`spec`部分描述了PVC允许的访问方式以及卷的大小。`AccessModes`为`ReadWriteOnce`意味着卷是读/写的，并且一次只允许一个Pod/节点访问该卷。这并不意味着Pod不能移动到另一个节点并访问卷（正如您将在本章后面学到的，这将是高可用性（HA）的基本概念）。它只是意味着两个Pod或两个节点不能同时访问该卷。这对于SQL\
    \ Server数据库来说是合理的。`8Gi`表示卷的大小为8GB。\n\n您可以通过运行以下命令查看PVC是否成功创建：\n```bash\nkubectl\
    \ describe PersistentVolumeClaims mssql-data\n```\n\n在输出的底部，成功的PVC创建看起来像这样：\n\
    ```\nType    Reason                 Age    From                         Message\n\
    ----    ------                 ----   ----                         -------\nNormal\
    \  ProvisioningSucceeded  9m16s  persistentvolume-controller  Successfully provisioned\
    \ volume pvc-b8c9225e-c038-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
    ```\n\n我见过一些场景，可能会有一些临时的超时或错误，但最终PVC会被创建。\n\n### 步骤2\n现在您有了负载均衡器服务、sa密码的秘钥和存储。是时候将这些整合在一起，创建一个包含单个SQL\
    \ Server容器的Pod了。运行以下命令或脚本`step6_deploy_sql2019.sh`（`--record`选项提供了来自部署幕后更多的细节）：\n\
    ```bash\nkubectl apply -f sql2019deployment.yaml --record\n```\n\n您应该会看到这些结果，表明已调度了一个`deployment`：\n\
    ```\ndeployment.apps/mssql-deployment created\n```\n\n`deployment`将允许我们使用`ReplicaSet`的概念为SQL\
    \ Server Pod创建Pod。当我向您展示k8s的内置HA功能时，我会稍后定义`ReplicaSet`。\n\n要查看部署的状态以及与Pod相关的对象，请运行以下命令：\n\
    ```bash\nkubectl get all\n```\n\n这将显示当前上下文（命名空间mssql）中的所有对象，包括Pod、LoadBalancer和部署的状态。\n\
    \n如果您立即运行此命令，可能会看到类似以下的结果：\n```\nNAME                                   READY\
    \  STATUS             RESTARTS  AGE\npod/mssql-deployment-7bb4c5f5d7-rpw45  0/1\
    \    ContainerCreating  0         4s\nNAME                    TYPE           CLUSTER-IP\
    \     EXTERNAL-IP     PORT(S)           AGE\nservice/mssql-service   LoadBalancer\
    \   10.0.150.233   13.77.103.119   31433:32010/TCP   55m\nNAME               \
    \               READY  UP-TO-DATE  AVAILABLE  AGE\ndeployment.apps/mssql-deployment\
    \  0/1    1           0          4s\nNAME                                    \
    \     DESIRED  CURRENT  READY  AGE\nreplicaset.apps/mssql-deployment-7bb4c5f5d7\
    \  1        1        0      4s\n```\n\n第一行是Pod创建的`STATUS`。`STATUS`为`ContainerCreating`意味着为Pod定义的容器正在创建过程中。如果这是您第一次使用SQL\
    \ Server容器镜像创建Pod，可能需要更长时间，因为容器镜像必须被拉取到k8s的本地docker注册表中。\n\n部署`STATUS`指示整体部署何时成功。LoadBalancer的`STATUS`独立于部署。这意味着您需要等待Pod状态变为`Running`，LoadBalancer具有有效的`EXTERNAL-IP`地址，并且部署的`AVAILABLE\
    \ = 1`，然后才能开始连接到SQL Server。`Replica`的状态应与Pod或部署的状态匹配。\n\n在Pod仍在创建时，让我们看看各个部分中的`sql2019deployment.yaml`文件。\n\
    ```yaml\nkind: Deployment\nmetadata:\n  name: mssql-deployment\n```\n\n此部分告诉API服务器我们正在创建一个Pod的部署及其名称。\n\
    \nYAML的其余部分是部署的规范，让我们来分解一下。\n```yaml\nreplicas: 1\nselector:\n  matchLabels:\n\
    \    app: mssql\nstrategy:\n  type: Recreate\n```\n\n这定义了Pod的副本数（一个），并在需要任何更新时重新创建Pod。我将在本章后面解释这些术语的重要性。`matchLabels`用于将部署的标签与Pod标签（两者都是`mssql`）关联起来。\n\
    \n下一个主要部分称为`template`，它定义了Pod容器的更多细节以及用于存储的卷。\n\n您可以在`template`部分看到我们使用了另一个`app`标签为`mssql`，因此我们可以使用标签来管理、查看或控制与部署相关的对象。\n\
    \n接下来是Pod的规范，其中包含有关要在Pod中部署的容器的详细信息。\n```yaml\nspec:\n  terminationGracePeriodSeconds:\
    \ 10\n  containers:\n  - name: mssql\n    image: mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    \    env:\n    - name: MSSQL_PID\n      value: \"Developer\"\n    - name: ACCEPT_EULA\n\
    \      value: \"Y\"\n    - name: MSSQL_SA_PASSWORD\n      valueFrom:\n       \
    \ secretKeyRef:\n          name: mssql-secret\n          key: SA_PASSWORD\n  \
    \  volumeMounts:\n    - name: mssqldb\n      mountPath: /var/opt/mssql\n```\n\n\
    在`spec`中，您可以看到一些熟悉的东西，如果您使用过容器。您看到容器将基于的镜像以及提供给SQL Server容器的环境变量。请注意`sa`密码是如何映射到您已经创建的秘钥的。\n\
    \n`terminationGracePeriodSeconds`的值定义了k8s在容器需要终止时允许其自行关闭的时间。SQL Server可能需要或多或少的时间，但我在我们的示例中选择了10秒。无论是否正常关闭，SQL\
    \ Server都具有一致性弹性。\n\n`volumeMount`条目是一个名为`mssqldb`的名称，它映射到存储所有SQL Server数据库的目录。`mssqldb`在此`spec`下方作为部署的一部分定义：\n\
    ```yaml\nvolumes:\n- name: mssqldb\n  persistentVolumeClaim:\n    claimName: mssql-data\n\
    ```\n\n这里是与所创建PVC的映射。现在，当SQL Server容器在Pod中启动时，默认情况下所有系统和用户数据库都将存在于具有PVC的持久存储中。当您在本章的其他部分了解HA和更新时，您将看到这如何变得重要。\n\
    \n您可以再次运行`kubectl get all`，查看SQL Server的所有组件是否已就绪。\n\n您还可以使用其他一些有趣的`kubectl`命令来检查Pod和SQL\
    \ Server的状态。要查看选项的完整列表，您可以运行命令`kubectl help`，或者查看`[`https://kubernetes.io/docs/reference/kubectl/overview`](https://kubernetes.io/docs/reference/kubectl/overview)`处的`kubectl`参考文档。\n\
    \n### 步骤3\n运行以下命令以查看Pod（以及Pod中的容器）的日志，这恰好是SQL Server的`ERRORLOG`。您也可以使用脚本`step7_getlogs.sh`：\n\
    ```bash\nkubectl logs -l app=mssql --tail=100000\n```\n\n通常，`kubectl logs`命令需要Pod名称，但您可以使用`mssql`标签，而不必查找Pod的名称。\n\
    \n您的结果应该是SQL Server `ERRORLOG`的转储。\n\n### 步骤4\n您还可以通过运行以下命令或脚本`step8_getevents.sh`，查看到目前为止在此命名空间中完成的与操作相关的事件的详细视图：\n\
    ```bash\nkubectl get events\n```\n\n您的输出应显示此命名空间中发生的事件的时间线。如果一切顺利，它应该类似于以下内容：\n\
    ```\nLAST SEEN   TYPE     REASON                   KIND                     MESSAGE\n\
    29m         Normal   ProvisioningSucceeded    PersistentVolumeClaim   Successfully\
    \ provisioned volume pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
    25m         Normal   Scheduled                Pod                      Successfully\
    \ assigned mssql/mssql-deployment-7b6565d684-8r7cc to aks-nodepool1-90949249-0\n\
    25m         Normal   SuccessfulAttachVolume   Pod                      AttachVolume.Attach\
    \ succeeded for volume \"pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8\"\n24m     \
    \    Normal   Pulled                   Pod                      Container image\
    \ \"mcr.microsoft.com/mssql/rhel/server:2019-latest\" already present on machine\n\
    24m         Normal   Created                  Pod                      Created\
    \ container\n24m         Normal   Started                  Pod               \
    \       Started container\n25m         Normal   SuccessfulCreate         ReplicaSet\
    \               Created pod: mssql-deployment-7b6565d684-8r7cc\n25m         Normal\
    \   ScalingReplicaSet        Deployment               Scaled up replica set mssql-deployment-7b6565d684\
    \ to 1\n30m         Normal   EnsuringLoadBalancer     Service                \
    \  Ensuring load balancer\n29m         Normal   EnsuredLoadBalancer      Service\
    \                  Ensured load balancer\n```\n\n### 步骤5\n您还可以使用以下命令或脚本`step9_describe_deployment.sh`获取有关部署的更多详细信息：\n\
    ```bash\nkubectl describe deployment mssql-deployment\n```\n\n您将获得有关部署的所有类型详细信息，包括专门与部署相关的最新事件。\n\
    \n### 步骤6\n您还可以使用以下命令或脚本`step10_describe_pod.sh`获取有关已部署Pod的更多详细信息：\n```bash\n\
    kubectl describe pod -l app=mssql\n```\n\n这就是使用`mssql`标签再次发挥作用的地方。您将获得有关Pod、Pod内的容器以及与Pod相关的事件的更多详细信息，而您只需记住`mssql`标签。\n\
    \n此命令与`kubectl get events`一起，对于Pod部署的故障排除目的非常有用。\n\n### 步骤7\n现在（终于）是时候连接到在Pod容器中运行的SQL\
    \ Server了。这是我从Anthony Nocentino（Linux、容器和k8s方面的知名专家，也是我《Pro SQL Server on Linux》的技术审稿人）那里学到的一个技巧。运行以下命令或脚本`step11_testsql.sh`以通过LoadBalancer连接到SQL\
    \ Server：\n```bash\nSERVERIP=$(kubectl get service | grep mssql-service | awk\
    \ {'print $4'})\nPORT=31433\nsqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"\
    SELECT @@version\"\n```\n\n您的结果应显示已安装的SQL Server版本。如果您仔细查看此命令，它会动态提取LoadBalancer的`EXTERNAL-IP`并解析出IP地址以用作连接字符串的一部分。您还可以更进一步，从`kubectl\
    \ get service`的输出中添加用于解析端口的逻辑。\n\n这比仅仅让您运行每个步骤要详细得多，因为我想向您描述幕后发生的事情，并让您了解更多关于YAML如何作为k8s的编程接口API工作的知识。"
  raw: "### Note\n\nIn Chapter [7](#479130_1_En_7_Chapter.xhtml), I mentioned that\
    \ Active Directory authentication for SQL Server containers is coming for SQL\
    \ Server 2019. Once this support is finalized, we should be able to also support\
    \ AD Authentication for SQL Server in k8s.\n\n1.  The next step is to create storage\
    \ for the SQL Server databases using the concept of a **PersistentVolumeClaim**\
    \ (PVC). A PVC is like a volume defined on top of a core disk system which we\
    \ can use to map to directories for databases for the SQL Server pod.\n\n    Use\
    \ the following command to create the PVC to be used for the SQL Server pod or\
    \ script **step5_create_storage.sh**:\n\n    ```\n    kubectl apply -f storage.yaml\n\
    \    ```\n\n    You should see this message come back quickly, and the PVC is\
    \ scheduled to be created in the background:\n\n    ```\n    persistentvolumeclaim/mssql-data\
    \ created\n    ```\n\n    While that is being created (which may be fast), let’s\
    \ look at the **storage.yaml** file to see what is happening behind the scenes:\n\
    \n    ```\n    apiVersion: v1\n    kind: PersistentVolumeClaim\n    metadata:\n\
    \    name: mssql-data\n    annotations:\n    volume.beta.kubernetes.io/storage-class:\
    \ azure-disk\n    spec:\n    accessModes:\n    - ReadWriteOnce\n    resources:\n\
    \    requests:\n    storage: 8Gi\n    ```\n\n    The metadata is interesting because\
    \ the annotations label binds the PVC to a disk called a storage class. How did\
    \ I know to use azure-disk? That is because when you create an AKS cluster, you\
    \ automatically get an Azure disk based on premium storage with a storage class\
    \ called azure-disk. You can create others, but this is the standard one created\
    \ by AKS. You can read more about storage with AKS at [`https://docs.microsoft.com/en-us/azure/aks/concepts-storage`](https://docs.microsoft.com/en-us/azure/aks/concepts-storage)\
    \ . If you are not using k8s, you would have created storage classes already,\
    \ or you can find out which ones are available with your k8s administrator, or\
    \ the following command:\n\n    ```\n    kubectl get StorageClass\n    ```\n\n\
    \    You can find more about the details of azure-disk by running this command:\n\
    \n    ```\n    kubectl describe StorageClass azure-disk\n    ```\n\n    The spec\
    \ section of this storage.yaml describes what access is allowed for PVC as well\
    \ as the size of the volume. The AccessModes of ReadWriteOnce means that the volume\
    \ is read/write and only one pod/node is allowed to access the volume at any time.\
    \ It doesn’t mean that a pod can’t be moved to another node and the volume accessed\
    \ (this will be a fundamental concept for HA, as you will learn later in the chapter).\
    \ It just means two pods, or two nodes, cannot access the volume at the same time.\
    \ This makes sense for a SQL Server database. 8Gi means a volume with a size of\
    \ 8Gb.\n\n    You can see whether the PVC was successfully created by running\
    \ this command:\n\n    ```\n    kubectl describe PersistentVolumeClaims mssql-data\n\
    \    ```\n\n    At the bottom of the output, a successful PVC creation looks like\
    \ this:\n\n    ```\n    Type    Reason                 Age    From           \
    \              Message\n    ----    ------                 ----   ----       \
    \                  -------\n    Normal  ProvisioningSucceeded  9m16s  persistentvolume-controller\
    \  Successfully provisioned volume pvc-b8c9225e-c038-11e9-b5fa-c6f80bad26d8 using\
    \ kubernetes.io/azure-disk\n    ```\n\n    I’ve seen some scenarios where there\
    \ might be some temporary timeouts or errors, but eventually the PVC is created.\n\
    \n2.  You now have a load balancer service, a secret for the sa password, and\
    \ storage. It’s time to put this all together and create a pod that has a single\
    \ container for SQL Server. Run the following command or script **step6_deploy_sql2019.sh**\
    \ (the --record option provides more details from behind the scenes of the deployment):\n\
    \n    ```\n    kubectl apply -f sql2019deployment.yaml --record\n    ```\n\n \
    \   You should see these results, which indicate that a *deployment* has been\
    \ scheduled:\n\n    ```\n    deployment.apps/mssql-deployment created\n    ```\n\
    \n    A *deployment* is going to allow us to create a pod with a concept of a\
    \ *ReplicaSet* for the SQL Server pod. I’ll define ReplicaSet later when I show\
    \ you the built-in HA capabilities of k8s.\n\n    To see the status of the deployment\
    \ and the objects related to the pod, run the following command:\n\n    ```\n\
    \    kubectl get all\n    ```\n\n    This will show all objects in the current\
    \ context (namespace mssql) including status of the pod, LoadBalancer, and deployment.\n\
    \n    When you run this immediately, you might see results like this:\n\n    ```\n\
    \    NAME                                   READY  STATUS             RESTARTS\
    \  AGE\n    pod/mssql-deployment-7bb4c5f5d7-rpw45  0/1    ContainerCreating  0\
    \         4s\n    NAME                    TYPE           CLUSTER-IP     EXTERNAL-IP\
    \     PORT(S)           AGE\n    service/mssql-service   LoadBalancer   10.0.150.233\
    \   13.77.103.119     31433:32010/TCP   55m\n    NAME                        \
    \      READY  UP-TO-DATE  AVAILABLE  AGE\n    deployment.apps/mssql-deployment\
    \  0/1    1           0          4s\n    NAME                                \
    \         DESIRED  CURRENT  READY  AGE\n    replicaset.apps/mssql-deployment-7bb4c5f5d7\
    \  1        1        0      4s\n    ```\n\n    The first line has the STATUS of\
    \ the pod creation. A STATUS of **ContainerCreating** means the container defined\
    \ for the pod is in the process of being created. If this is the first time you\
    \ have created a pod with the SQL Server container image, it may take longer,\
    \ as the container image must be pulled into the local docker registry of k8s.\n\
    \n    The deployment STATUS indicates when the overall deployment is successful.\
    \ The STATUS of the LoadBalancer is independent of the deployment. This means\
    \ you need to wait for the pod to have a status of **Running**, the LoadBalancer\
    \ to have a valid EXTERNAL-IP address, and the deployment to have AVAILABLE =\
    \ 1 before you can start connecting to SQL Server. The status of the Replica should\
    \ match the status of the pod or deployment.\n\n    While the pod is still being\
    \ created, let’s look at the **sql2019deployment.yaml** file in various parts.\n\
    \n    ```\n    kind: Deployment\n    metadata:\n    name: mssql-deployment\n \
    \   ```\n\n    This section tells the API server we are creating a deployment\
    \ of a pod and the name.\n\n    The rest of the YAML is the specification for\
    \ the deployment, so let’s break that down.\n\n    ```\n    replicas: 1\n    selector:\n\
    \    matchLabels:\n    app: mssql\n    strategy:\n    type: Recreate\n    ```\n\
    \n    This defines the number of replicas for the pod (one) and to recreate the\
    \ pod should any updates be needed. I’ll explain the significance of these terms\
    \ later in this chapter. The matchLabels is to associate the label of the deployment\
    \ with the pod label (which are both mssql).\n\n    The next big section is called\
    \ a template, which defines more details about the containers for the pod and\
    \ volumes used for storage.\n\n    You can see in the template section we use\
    \ another label for app of mssql so we can manage, view, or control objects with\
    \ the deployment using a label.\n\n    Next comes the specification for the pod,\
    \ which contains details about the container to deploy in the pod.\n\n    ```\n\
    \    spec:\n    terminationGracePeriodSeconds: 10\n    containers:\n    - name:\
    \ mssql\n    image: mcr.microsoft.com/mssql/rhel/server:2019-latest\n    env:\n\
    \    - name: MSSQL_PID\n    value: \"Developer\"\n    - name: ACCEPT_EULA\n  \
    \  value: \"Y\"\n    - name: MSSQL_SA_PASSWORD\n    valueFrom:\n    secretKeyRef:\n\
    \    name: mssql-secret\n    key: SA_PASSWORD\n    volumeMounts:\n    - name:\
    \ mssqldb\n    mountPath: /var/opt/mssql\n    ```\n\n    You can see in the spec\
    \ a few things that look familiar once you have used containers. You see the image\
    \ the container will be based on and the environment variables used to supply\
    \ to the SQL Server container. Notice how the sa password is mapped to the secret\
    \ you already created.\n\n    The value of **terminationGracePeriodSeconds** defines\
    \ how long k8s will allow the container to shut itself down should it need to\
    \ be terminated. It is possible for a SQL Server to need more or less time, but\
    \ I chose 10 seconds in our examples. SQL Server is resilient for consistency\
    \ whether or not it is shut down gracefully.\n\n    The volumeMount entry is a\
    \ name called mssqldb, which maps to the directory to store all SQL Server databases.\
    \ mssqldb is defined right below this spec as part of the deployment:\n\n    ```\n\
    \    volumes:\n    - name: mssqldb\n    persistentVolumeClaim:\n    claimName:\
    \ mssql-data\n    ```\n\n    Here is the mapping to the PVC that was created.\
    \ Now, when the SQL Server container is started in the pod, all system and user\
    \ databases by default will live in persisted storage with the PVC. You will see\
    \ how this can become important when you learn about HA and updating in other\
    \ sections of this chapter.\n\n    You can run `kubectl get all` again to see\
    \ if everything is ready to use for SQL Server.\n\n    You also have a few other\
    \ interesting kubectl commands at your disposal to examine the state of the pod\
    \ and SQL Server. To see a complete list of option, you can run the command `kubectl\
    \ help` or look at the kubectl reference documentation at [`https://kubernetes.io/docs/reference/kubectl/overview`](https://kubernetes.io/docs/reference/kubectl/overview)\
    \ .\n\n3.  Run the following command to see the logs of the pod (and container\
    \ in the pod) which happens to be the ERRORLOG of SQL Server. You can also use\
    \ the script **step7_getlogs.sh**:\n\n    ```\n    kubectl logs -l app=mssql --tail=100000\n\
    \    ```\n\n    Normally, the kubectl logs command requires a pod name, but you\
    \ can use the mssql label instead of having to look up the name of the pod.\n\n\
    \    Your results should literally be a dump of the SQL Server ERRORLOG.\n\n4.\
    \  You can also see a detailed view of events related to operations in k8s you\
    \ have completed so far in this namespace, by running the following command or\
    \ script **step8_getevents.sh**:\n\n    ```\n    kubectl get events\n    ```\n\
    \n    Your output should show you a timeline for events that have occurred in\
    \ this namespace. If all worked well, it should look something like the following:\n\
    \n    ```\n    LAST SEEN   TYPE     REASON                   KIND            \
    \         MESSAGE\n    29m         Normal   ProvisioningSucceeded    PersistentVolumeClaim\
    \   Successfully provisioned volume pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8 using\
    \ kubernetes.io/azure-disk\n    25m         Normal   Scheduled               \
    \ Pod                    Successfully assigned mssql/mssql-deployment-7b6565d684-8r7cc\
    \ toaks-nodepool1-90949249-0\n    25m         Normal   SuccessfulAttachVolume\
    \   Pod                     AttachVolume.Attach succeeded for volume \"pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8\"\
    \n    24m         Normal   Pulled                   Pod                     Container\
    \ image \"mcr.microsoft.com/mssql/rhel/server:2019-latest\" already present on\
    \ machine\n    24m         Normal   Created                  Pod             \
    \        Created container\n    24m         Normal   Started                 \
    \ Pod                      Started container\n    25m         Normal   SuccessfulCreate\
    \         ReplicaSet               Created pod: mssql-deployment-7b6565d684-8r7cc\n\
    \    25m         Normal   ScalingReplicaSet        Deployment               Scaled\
    \ up replica set mssql-deployment-7b6565d684 to 1\n    30m         Normal   EnsuringLoadBalancer\
    \     Service                  Ensuring load balancer\n    29m         Normal\
    \   EnsuredLoadBalancer      Service                  Ensured load balancer\n\
    \    ```\n\n5.  You can also get more details about the deployment using the following\
    \ command or script **step9_describe_deployment.sh**:\n\n    ```\n    kubectl\
    \ describe deployment mssql-deployment\n    ```\n\n    You will get all types\
    \ of details about the deployment, including the most recent events specifically\
    \ related to the deployment.\n\n6.  You can also get more details about the pod\
    \ that was deployed using the following command or script **step10_describe_pod.sh**:\n\
    \n    ```\n    kubectl describe pod -l app=mssql\n    ```\n\n    This is where\
    \ using the label of mssql pays off again. You will get more details of the pod,\
    \ containers within the pod, and events related to the pod, and all you have to\
    \ remember is the mssql label.\n\n    This command, along with `kubectl get events`,\
    \ can be useful for troubleshooting purposes for pod deployment.\n\n7.  Now (finally)\
    \ it is time to connect to SQL Server running in a container in the pod. Here\
    \ is a trick I learned from Anthony Nocentino (known expert on Linux, Containers,\
    \ and k8s and my technical reviewer for *Pro SQL Server on Linux*). Run the following\
    \ command or script **step11_testsql.sh** to connect to SQL Server through the\
    \ LoadBalancer:\n\n    ```\n    SERVERIP=$(kubectl get service | grep mssql-service\
    \ | awk {'print $4'})\n    PORT=31433\n    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT\
    \ -Q\"SELECT @@version\"\n    ```\n\n    Your results should show you the version\
    \ of SQL Server installed. If you look carefully at this command, it dynamically\
    \ extracts the EXTERNAL-IP of the LoadBalancer and parses out the IP address to\
    \ be used as part of the connection string. You could also go further and add\
    \ in parsing logic for the port from the output of `kubectl get service`.\n\n\
    This was more detailed than just having you run each step, because I wanted to\
    \ describe to you what is happening behind the scenes and learn more about how\
    \ YAML works as an API for programming interface for k8s."
  trans: "## 注意\n\n在第 7 章中，我提到了 SQL Server 容器对 Active Directory 认证的支持即将到来，适用于 SQL\
    \ Server 2019。一旦此功能最终确定，我们应该也能够在 k8s 中为 SQL Server 支持 AD 认证。\n\n### 步骤 1\n下一步是使用`PersistentVolumeClaim`（PVC）的概念为\
    \ SQL Server 数据库创建存储。PVC 类似于在核心磁盘系统之上定义的卷，我们可以将其映射到 SQL Server Pod 的数据库目录。\n\n\
    使用以下命令创建用于 SQL Server Pod 的 PVC，或运行脚本`step5_create_storage.sh`：\n```bash\nkubectl\
    \ apply -f storage.yaml\n```\n\n您应该会很快看到此消息返回，并且 PVC 将在后台创建：\n```\npersistentvolumeclaim/mssql-data\
    \ created\n```\n\n在创建的同时（这可能很快），让我们查看`storage.yaml`文件以了解幕后发生的事情：\n```yaml\napiVersion:\
    \ v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: mssql-data\n  annotations:\n\
    \    volume.beta.kubernetes.io/storage-class: azure-disk\nspec:\n  accessModes:\n\
    \    - ReadWriteOnce\n  resources:\n    requests:\n      storage: 8Gi\n```\n\n\
    元数据很有趣，因为注释标签将 PVC 绑定到一个名为存储类的磁盘。我怎么知道要使用`azure-disk`？这是因为当您创建 AKS 集群时，您会自动获得一个基于高级存储的\
    \ Azure 磁盘，其存储类名为`azure-disk`。您可以创建其他的，但这是 AKS 创建的标准存储类。您可以在 [`https://docs.microsoft.com/zh-cn/azure/aks/concepts-storage`](https://docs.microsoft.com/zh-cn/azure/aks/concepts-storage)\
    \ 阅读更多关于 AKS 存储的信息。如果您不使用 k8s，您可能已经创建了存储类，或者可以咨询您的 k8s 管理员，或者使用以下命令找出可用的存储类：\n\
    ```bash\nkubectl get StorageClass\n```\n\n通过运行以下命令，您可以找到有关`azure-disk`的更多详细信息：\n\
    ```bash\nkubectl describe StorageClass azure-disk\n```\n\n`storage.yaml`的`spec`部分描述了\
    \ PVC 允许的访问方式以及卷的大小。`AccessModes`为`ReadWriteOnce`意味着卷是读/写的，并且一次只允许一个 Pod/节点访问该卷。这并不意味着\
    \ Pod 不能移动到另一个节点并访问卷（正如您将在本章后面学到的，这将是高可用性（HA）的基本概念）。它只是意味着两个 Pod 或两个节点不能同时访问该卷。这对于\
    \ SQL Server 数据库来说是合理的。`8Gi`表示卷的大小为 8GB。\n\n您可以通过运行以下命令查看 PVC 是否成功创建：\n```bash\n\
    kubectl describe PersistentVolumeClaims mssql-data\n```\n\n在输出的底部，成功的 PVC 创建看起来像这样：\n\
    ```\nType    Reason                 Age    From                         Message\n\
    ----    ------                 ----   ----                         -------\nNormal\
    \  ProvisioningSucceeded  9m16s  persistentvolume-controller  Successfully provisioned\
    \ volume pvc-b8c9225e-c038-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
    ```\n\n我见过一些场景，可能会有一些临时的超时或错误，但最终 PVC 会被创建。\n\n### 步骤 2\n现在您有了负载均衡器服务、sa 密码的秘钥和存储。是时候将这些整合在一起，创建一个包含单个\
    \ SQL Server 容器的 Pod 了。运行以下命令或脚本`step6_deploy_sql2019.sh`（`--record`选项提供了来自部署幕后更多的细节）：\n\
    ```bash\nkubectl apply -f sql2019deployment.yaml --record\n```\n\n您应该会看到这些结果，表明已调度了一个`deployment`：\n\
    ```\ndeployment.apps/mssql-deployment created\n```\n\n`deployment`将允许我们使用`ReplicaSet`的概念为\
    \ SQL Server Pod 创建 Pod。当我向您展示 k8s 的内置 HA 功能时，我会稍后定义`ReplicaSet`。\n\n要查看部署的状态以及与\
    \ Pod 相关的对象，请运行以下命令：\n```bash\nkubectl get all\n```\n\n这将显示当前上下文（命名空间 mssql）中的所有对象，包括\
    \ Pod、LoadBalancer 和部署的状态。\n\n如果您立即运行此命令，可能会看到类似以下的结果：\n```\nNAME            \
    \                       READY  STATUS             RESTARTS  AGE\npod/mssql-deployment-7bb4c5f5d7-rpw45\
    \  0/1    ContainerCreating  0         4s\nNAME                    TYPE      \
    \     CLUSTER-IP     EXTERNAL-IP     PORT(S)           AGE\nservice/mssql-service\
    \   LoadBalancer   10.0.150.233   13.77.103.119   31433:32010/TCP   55m\nNAME\
    \                              READY  UP-TO-DATE  AVAILABLE  AGE\ndeployment.apps/mssql-deployment\
    \  0/1    1           0          4s\nNAME                                    \
    \     DESIRED  CURRENT  READY  AGE\nreplicaset.apps/mssql-deployment-7bb4c5f5d7\
    \  1        1        0      4s\n```\n\n第一行是 Pod 创建的`STATUS`。`STATUS`为`ContainerCreating`意味着为\
    \ Pod 定义的容器正在创建过程中。如果这是您第一次使用 SQL Server 容器镜像创建 Pod，可能需要更长时间，因为容器镜像必须被拉取到 k8s\
    \ 的本地 docker 注册表中。\n\n部署`STATUS`指示整体部署何时成功。LoadBalancer 的`STATUS`独立于部署。这意味着您需要等待\
    \ Pod 状态变为`Running`，LoadBalancer 具有有效的`EXTERNAL-IP`地址，并且部署的`AVAILABLE = 1`，然后才能开始连接到\
    \ SQL Server。`Replica`的状态应与 Pod 或部署的状态匹配。\n\n在 Pod 仍在创建时，让我们看看各个部分中的`sql2019deployment.yaml`文件。\n\
    ```yaml\nkind: Deployment\nmetadata:\n  name: mssql-deployment\n```\n\n此部分告诉 API\
    \ 服务器我们正在创建一个 Pod 的部署及其名称。\n\nYAML 的其余部分是部署的规范，让我们来分解一下。\n```yaml\nreplicas: 1\n\
    selector:\n  matchLabels:\n    app: mssql\nstrategy:\n  type: Recreate\n```\n\n\
    这定义了 Pod 的副本数（一个），并在需要任何更新时重新创建 Pod。我将在本章后面解释这些术语的重要性。`matchLabels`用于将部署的标签与 Pod\
    \ 标签（两者都是`mssql`）关联起来。\n\n下一个主要部分称为`template`，它定义了 Pod 容器的更多细节以及用于存储的卷。\n\n您可以在`template`部分看到我们使用了另一个`app`标签为`mssql`，因此我们可以使用标签来管理、查看或控制与部署相关的对象。\n\
    \n接下来是 Pod 的规范，其中包含有关要在 Pod 中部署的容器的详细信息。\n```yaml\nspec:\n  terminationGracePeriodSeconds:\
    \ 10\n  containers:\n  - name: mssql\n    image: mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
    \    env:\n    - name: MSSQL_PID\n      value: \"Developer\"\n    - name: ACCEPT_EULA\n\
    \      value: \"Y\"\n    - name: MSSQL_SA_PASSWORD\n      valueFrom:\n       \
    \ secretKeyRef:\n          name: mssql-secret\n          key: SA_PASSWORD\n  \
    \  volumeMounts:\n    - name: mssqldb\n      mountPath: /var/opt/mssql\n```\n\n\
    在`spec`中，您可以看到一些熟悉的东西，如果您使用过容器。您看到容器将基于的镜像以及提供给 SQL Server 容器的环境变量。请注意`sa`密码是如何映射到您已经创建的秘钥的。\n\
    \n`terminationGracePeriodSeconds`的值定义了 k8s 在容器需要终止时允许其自行关闭的时间。SQL Server 可能需要或多或少的时间，但我在我们的示例中选择了\
    \ 10 秒。无论是否正常关闭，SQL Server 都具有一致性弹性。\n\n`volumeMount`条目是一个名为`mssqldb`的名称，它映射到存储所有\
    \ SQL Server 数据库的目录。`mssqldb`在此`spec`下方作为部署的一部分定义：\n```yaml\nvolumes:\n- name:\
    \ mssqldb\n  persistentVolumeClaim:\n    claimName: mssql-data\n```\n\n这里是与所创建\
    \ PVC 的映射。现在，当 SQL Server 容器在 Pod 中启动时，默认情况下所有系统和用户数据库都将存在于具有 PVC 的持久存储中。当您在本章的其他部分了解\
    \ HA 和更新时，您将看到这如何变得重要。\n\n您可以再次运行`kubectl get all`，查看 SQL Server 的所有组件是否已就绪。\n\
    \n您还可以使用其他一些有趣的`kubectl`命令来检查 Pod 和 SQL Server 的状态。要查看选项的完整列表，您可以运行命令`kubectl\
    \ help`，或者查看`[`https://kubernetes.io/docs/reference/kubectl/overview`](https://kubernetes.io/zh-cn/docs/reference/kubectl/overview)`处的`kubectl`参考文档。\n\
    \n### 步骤 3\n运行以下命令以查看 Pod（以及 Pod 中的容器）的日志，这恰好是 SQL Server 的`ERRORLOG`。您也可以使用脚本`step7_getlogs.sh`：\n\
    ```bash\nkubectl logs -l app=mssql --tail=100000\n```\n\n通常，`kubectl logs`命令需要\
    \ Pod 名称，但您可以使用`mssql`标签，而不必查找 Pod 的名称。\n\n您的结果应该是 SQL Server `ERRORLOG`的转储。\n\
    \n### 步骤 4\n您还可以通过运行以下命令或脚本`step8_getevents.sh`，查看到目前为止在此命名空间中完成的与操作相关的事件的详细视图：\n\
    ```bash\nkubectl get events\n```\n\n您的输出应显示此命名空间中发生的事件的时间线。如果一切顺利，它应该类似于以下内容：\n\
    ```\nLAST SEEN   TYPE     REASON                   KIND                     MESSAGE\n\
    29m         Normal   ProvisioningSucceeded    PersistentVolumeClaim   Successfully\
    \ provisioned volume pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
    25m         Normal   Scheduled                Pod                      Successfully\
    \ assigned mssql/mssql-deployment-7b6565d684-8r7cc to aks-nodepool1-90949249-0\n\
    25m         Normal   SuccessfulAttachVolume   Pod                      AttachVolume.Attach\
    \ succeeded for volume \"pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8\"\n24m     \
    \    Normal   Pulled                   Pod                      Container image\
    \ \"mcr.microsoft.com/mssql/rhel/server:2019-latest\" already present on machine\n\
    24m         Normal   Created                  Pod                      Created\
    \ container\n24m         Normal   Started                  Pod               \
    \       Started container\n25m         Normal   SuccessfulCreate         ReplicaSet\
    \               Created pod: mssql-deployment-7b6565d684-8r7cc\n25m         Normal\
    \   ScalingReplicaSet        Deployment               Scaled up replica set mssql-deployment-7b6565d684\
    \ to 1\n30m         Normal   EnsuringLoadBalancer     Service                \
    \  Ensuring load balancer\n29m         Normal   EnsuredLoadBalancer      Service\
    \                  Ensured load balancer\n```\n\n### 步骤 5\n您还可以使用以下命令或脚本`step9_describe_deployment.sh`获取有关部署的更多详细信息：\n\
    ```bash\nkubectl describe deployment mssql-deployment\n```\n\n您将获得有关部署的所有类型详细信息，包括专门与部署相关的最新事件。\n\
    \n### 步骤 6\n您还可以使用以下命令或脚本`step10_describe_pod.sh`获取有关已部署 Pod 的更多详细信息：\n```bash\n\
    kubectl describe pod -l app=mssql\n```\n\n这就是使用`mssql`标签再次发挥作用的地方。您将获得有关 Pod、Pod\
    \ 内的容器以及与 Pod 相关的事件的更多详细信息，而您只需记住`mssql`标签。\n\n此命令与`kubectl get events`一起，对于 Pod\
    \ 部署的故障排除目的非常有用。\n\n### 步骤 7\n现在（终于）是时候连接到在 Pod 容器中运行的 SQL Server 了。这是我从 Anthony\
    \ Nocentino（Linux、容器和 k8s 方面的知名专家，也是我《Pro SQL Server on Linux》的技术审稿人）那里学到的一个技巧。运行以下命令或脚本`step11_testsql.sh`以通过\
    \ LoadBalancer 连接到 SQL Server：\n```bash\nSERVERIP=$(kubectl get service | grep\
    \ mssql-service | awk {'print $4'})\nPORT=31433\nsqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT\
    \ -Q\"SELECT @@version\"\n```\n\n您的结果应显示已安装的 SQL Server 版本。如果您仔细查看此命令，它会动态提取 LoadBalancer\
    \ 的`EXTERNAL-IP`并解析出 IP 地址以用作连接字符串的一部分。您还可以更进一步，从`kubectl get service`的输出中添加用于解析端口的逻辑。\n\
    \n这比仅仅让您运行每个步骤要详细得多，因为我想向您描述幕后发生的事情，并让您了解更多关于 YAML 如何作为 k8s 的编程接口 API 工作的知识。"
- fmt: "### Tips with k8s\n\nBefore you move on to the next section, since you have\
    \ a deployed SQL Server pod, let me show you some tips on using other resources\
    \ with k8s.\n\n#### k8s Extension\n\nI discussed in an earlier section of the\
    \ chapter called “Prerequisites for the Examples” the Kubernetes Extension for\
    \ Visual Studio Code and showed how to install this for Azure Data Studio (ADS).\n\
    \nLet me show you some examples of using this extension with your deployed SQL\
    \ Server pod.\n\nFirst, one thing about using the k8s extension, along with the\
    \ dependency for YAML, are the tips it provides for using YAML files. Find the\
    \ `sql2019deployment.yaml` file in the `ch8_sql_on_k8s\\deploy` directory with\
    \ the samples. Use the Explorer feature of ADS to find the file.\n\nHover over\
    \ any of the YAML syntax and get tips about the various statements in the file.\
    \ For example, Figure [8-3](#479130_1_En_8_Chapter.xhtml#Fig3) shows a tip for\
    \ the `terminationGracePeriodSeconds` declaration.\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg)\n\
    \n*Figure 8-3: Using the k8s extension to explore a YAML file*\n\nThe ADS extension\
    \ also includes a “live” explorer to look at k8s resources. I used this to connect\
    \ to my AKS cluster (if you use AKS, you will need to provide some login information\
    \ when you use the tool). Once connected, I could browse objects and even perform\
    \ some interesting operations.\n\nSince my pod was deployed in a namespace, I\
    \ first needed to change context to that namespace, as seen in Figure [8-4](#479130_1_En_8_Chapter.xhtml#Fig4).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg)\n\
    \n*Figure 8-4: Setting the namespace with the k8s extension*\n\nOne cool thing\
    \ I can do is to attach to a running pod and run a Bash shell to view the `ERRORLOG`.\
    \ First, I found my deployment in the k8s explorer, and used the right-click option\
    \ to select Terminal, as seen in Figure [8-5](#479130_1_En_8_Chapter.xhtml#Fig5).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg)\n\
    \n*Figure 8-5: Running a terminal session in a k8s pod*\n\nThe Terminal of ADS\
    \ was displayed, and now I was in a Bash shell in the SQL Container of the pod.\
    \ I was then able to navigate to `/var/opt/mssql/log` and dump out the `ERRORLOG`,\
    \ as seen in Figure [8-6](#479130_1_En_8_Chapter.xhtml#Fig6).\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg)\n\
    \n*Figure 8-6: Dumping out the ERRORLOG for a SQL Server pod in k8s*\n\nI typed\
    \ in `exit` to quit the terminal session. Another thing I discovered was the ability\
    \ to reverse engineer a deployment to see what the YAML file looked like for that\
    \ deployment. Using the right-click feature on the deployment, I selected Convert\
    \ to Template, as seen in Figure [8-7](#479130_1_En_8_Chapter.xhtml#Fig7).\n\n\
    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg)\n\
    \n*Figure 8-7: Reverse engineering a k8s deployment*\n\nI typed in the name of\
    \ my YAML file, and I was presented with an editor to see the resulting YAML file.\n\
    \nI’m sure there are other nifty options with the k8s extension I have not explored\
    \ yet, but will continue to use this with my journey with k8s.\n\n#### Other kubectl\
    \ Commands\n\n`kubectl` has many other commands that are worth showing, including:\n\
    \n*   `kubectl top` – This command on a node or pod basis displays metrics for\
    \ memory and CPU. This could be helpful, for example, to see how much memory a\
    \ pod is consuming or how much memory is left on a node.\n*   `kubectl cp` – This\
    \ command can be used to copy a file into the container file system for a pod.\
    \ Just like `docker cp`, you could use this to copy in a backup file of a SQL\
    \ Server database into the container writeable layer.\n\n    For example, given\
    \ the example you deployed, assume the pod name is `mssql-deployment-7b6565d684-92l8s`\
    \ in the `mssql` namespace and that you have downloaded the WideWorldImporters\
    \ database sample ( [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)\
    \ ) to your local directory. The following command will copy the backup file into\
    \ the SQL Server container so it can be restored:\n\n    ```\n    kubectl cp ./WideWorldImporters-Full.bak\
    \ mssql/mssql-deployment-7b6565d684-92l8s:/var/opt/mssql\n    ```\n*   `kubectl\
    \ exec` – This command allows you to execute a program in the namespace of the\
    \ container in a pod. You would use this command much like `docker exec` to run\
    \ a Bash shell for the container, or for SQL Server the `sqlcmd` utility, since\
    \ that is part of the SQL Server container.\n\n    Based on the example I just\
    \ showed you to copy in the WideWorldImporters backup, the following command could\
    \ be used to restore the backup:\n\n    ```\n    kubectl exec mssql-deployment-7b6565d684-92l8s\
    \ -- /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Sql2019isfast\" -Q \"\
    RESTORE DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
    \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n    ```\n\n \
    \   This syntax took me a while to figure out; note here that you don’t specify\
    \ the namespace, so you must be in the context of the namespace for your pod.\
    \ Also note the use of the `--` syntax before specifying `/opt/mssql/bin/sqlcmd`\
    \ which is used to separate arguments for `kubectl` and arguments for the program,\
    \ which in this case is `sqlcmd`.\n*   `kubectl version` – This command dumps\
    \ out the version of `kubectl`. I’ve seen situations where users had problems\
    \ with `kubectl` because it was older and not compatible with the version of the\
    \ k8s cluster. This command prints out the versions of both the client and the\
    \ server. Read more about version compatibility at [`https://kubernetes.io/docs/setup/release/version-skew-policy/`](https://kubernetes.io/docs/setup/release/version-skew-policy/).\n\
    *   `kubectl explain` – This command displays documentation explaining information\
    \ about k8s objects. Use a command like the following to find out more about YAML\
    \ requirements for a `ReplicaSet`:\n\n    ```\n    kubectl explain ReplicaSet\n\
    \    ```\n*   `kubectl cluster-info dump` – Stand back kubeheads (is that a term?\
    \ If not, I just made one). This command will dump out a massive set of diagnostics.\
    \ Use the `--output-directory` to create a set of diagnostic files. Be sure to\
    \ use the `--all-namespaces` option to get diagnostics about all namespaces. This\
    \ command dumps just about any log file that is part of the k8s cluster, including\
    \ pods. I couldn’t really find any specific documentation on what is in the logs,\
    \ but, as I use k8s myself more over time, I will probably learn more (and become\
    \ a kubehead)."
  raw: '### Tips with k8s


    Before you move on to the next section, since you have a deployed SQL Server pod,
    let me show you some tips on using other resources with k8s.


    #### k8s Extension


    I discussed in an earlier section of the chapter called “Prerequisites for the
    Examples” the Kubernetes Extension for Visual Studio Code and showed how to install
    this for Azure Data Studio (ADS).


    Let me show you some examples of using this extension with your deployed SQL Server
    pod.


    First, one thing about using the k8s extension, along with the dependency for
    YAML, are the tips it provides for using YAML files. Find the sql2019deployment.yaml
    file in the **ch8_sql_on_k8s\deploy** directory with the samples. Use the Explorer
    feature of ADS to find the file.


    Hover over any of the YAML syntax and get tips about the various statements in
    the file. For example, Figure [8-3](#479130_1_En_8_Chapter.xhtml#Fig3) shows a
    tip for the terminationGracePeriodSeconds declaration.


    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Using the k8s extension to explore a YAML file


    The ADS extension also includes a “live” explorer to look at k8s resources. I
    used this to connect to my AKS cluster (if you use AKS, you will need to provide
    some login information when you use the tool). Once connected, I could browse
    objects and even perform some interesting operations.


    Since my pod was deployed in a namespace, I first needed to change context to
    that namespace, as seen in Figure [8-4](#479130_1_En_8_Chapter.xhtml#Fig4).


    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Setting the namespace with the k8s extension


    One cool thing I can do is to attach to a running pod and run a Bash shell to
    view the ERRORLOG. First, I found my deployment in the k8s explorer, and used
    the right-click option to select Terminal, as seen in Figure [8-5](#479130_1_En_8_Chapter.xhtml#Fig5).


    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Running a terminal session in a k8s pod


    The Terminal of ADS was displayed, and now I was in a Bash shell in the SQL Container
    of the pod. I was then able to navigate to /var/opt/mssql/log and dump out the
    ERRORLOG, as seen in Figure [8-6](#479130_1_En_8_Chapter.xhtml#Fig6).


    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Dumping out the ERRORLOG for a SQL Server pod in k8s


    I typed in `exit` to quit the terminal session. Another thing I discovered was
    the ability to reverse engineer a deployment to see what the YAML file looked
    like for that deployment. Using the right-click feature on the deployment, I selected
    Convert to Template, as seen in Figure [8-7](#479130_1_En_8_Chapter.xhtml#Fig7).


    ![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Reverse engineering a k8s deployment


    I typed in the name of my YAML file, and I was presented with an editor to see
    the resulting YAML file.


    I’m sure there are other nifty options with the k8s extension I have not explored
    yet, but will continue to use this with my journey with k8s.


    #### Other kubectl Commands Include


    kubectl has many other commands that are worth showing, including


    **kubectl top** – This command on a node or pod basis displays metrics for memory
    and CPU. This could be helpful, for example, to see how much memory a pod is consuming
    or how much memory is left on a node.


    **kubectl cp** – This command can be used to copy a file into the container file
    system for a pod. Just like docker cp, you could use this to copy in a backup
    file of a SQL Server database into the container writeable layer.


    For example, given the example you deployed, assume the pod name is mssql-deployment-7b6565d684-92l8s
    in the mssql namespace and that you have downloaded the WideWorldImporters database
    sample ( [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)
    ) to your local directory. The following command will copy the backup file into
    the SQL Server container so it can be restored:


    ```

    kubectl cp ./WideWorldImporters-Full.bak mssql/mssql-deployment-7b6565d684-92l8s:/var/opt/mssql

    ```


    **kubectl exec** – This command allows you to execute a program in the namespace
    of the container in a pod. You would use this command much like docker exec to
    run a Bash shell for the container, or for SQL Server the sqlcmd utility, since
    that is part of the SQL Server container.


    Based on the example I just showed you to copy in the WideWorldImporters backup,
    the following command could be used to restore the backup:


    ```

    kubectl exec mssql-deployment-7b6565d684-92l8s -- /opt/mssql-tools/bin/sqlcmd
    -S localhost -U SA -P "Sql2019isfast" -Q "RESTORE DATABASE WideWorldImporters
    FROM DISK = ''/var/opt/mssql/WideWorldImporters-Full.bak'' WITH MOVE ''WWI_Primary''
    TO ''/var/opt/mssql/data/WideWorldImporters.mdf'', MOVE ''WWI_UserData'' TO ''/var/opt/mssql/data/WideWorldImporters_userdata.ndf'',
    MOVE ''WWI_Log'' TO ''/var/opt/mssql/data/WideWorldImporters.ldf'', MOVE ''WWI_InMemory_Data_1''
    TO ''/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1''"

    ```


    This syntax took me a while to figure out; note here that you don’t specify the
    namespace, so you must be in the context of the namespace for your pod. Also note
    the use of the -- syntax before specifying /opt/mssql/bin/sqlcmd which is used
    to separate arguments for kubectl and arguments for the program, which in this
    case is sqlcmd.


    **kubectl version** – This command dumps out the version of kubectl. I’ve seen
    situations where users had problems with kubectl because it was older and not
    compatible with the version of the k8s cluster. This command prints out the versions
    of both the client and the server. Read more about version compatibility at [`https://kubernetes.io/docs/setup/release/version-skew-policy/`](https://kubernetes.io/docs/setup/release/version-skew-policy/)
    .


    **kubectl explain** – This command displays documentation explaining information
    about k8s objects. Use a command like the following to find out more about YAML
    requirements for a ReplicaSet:


    ```

    kubectl explain ReplicaSet

    ```


    **kubectl cluster-info dump** – Stand back kubeheads (is that a term? If not,
    I just made one). This command will dump out a massive set of diagnostics. Use
    the --output-directory to create a set of diagnostic files. Be sure to use the
    --all-namespaces option to get diagnostics about all namespaces. This command
    dumps just about any log file that is part of the k8s cluster, including pods.
    I couldn’t really find any specific documentation on what is in the logs, but,
    as I use k8s myself more over time, I will probably learn more (and become a kubehead).'
  trans: "### 关于 Kubernetes 的使用技巧\n\n在进入下一节之前，既然你已经部署了一个 SQL Server Pod，让我向你展示一些结合\
    \ Kubernetes 使用其他资源的技巧。\n\n#### Kubernetes 扩展组件\n\n我在本章前面名为“示例先决条件”的一节中讨论了适用于\
    \ Visual Studio Code 的 Kubernetes 扩展组件，并演示了如何为 Azure Data Studio (ADS) 安装该组件。\n\
    \n让我向你展示一些在已部署的 SQL Server Pod 上使用此扩展组件的示例。\n\n首先，使用 k8s 扩展组件及其对 YAML 的依赖关系时，它会为\
    \ YAML 文件的使用提供提示。使用 ADS 的资源管理器功能在示例的 `ch8_sql_on_k8s\\deploy` 目录中找到 `sql2019deployment.yaml`\
    \ 文件。\n\n将鼠标悬停在任何 YAML 语法上，即可获取文件中各种语句的提示。例如，图 8-3 显示了关于 `terminationGracePeriodSeconds`\
    \ 声明的提示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg](img/479130_1_En_8_Fig3_HTML.jpg)\n\
    \n*图 8-3：使用 k8s 扩展组件浏览 YAML 文件*\n\nADS 扩展组件还包含一个“实时”资源管理器，用于查看 k8s 资源。我使用它来连接到我的\
    \ AKS 集群（如果你使用 AKS，在使用该工具时需要提供一些登录信息）。连接后，我可以浏览对象，甚至执行一些有趣的操作。\n\n由于我的 Pod 部署在一个命名空间中，我首先需要将上下文切换到该命名空间，如图\
    \ 8-4 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg](img/479130_1_En_8_Fig4_HTML.jpg)\n\
    \n*图 8-4：使用 k8s 扩展组件设置命名空间*\n\n一个很酷的功能是，我可以附加到正在运行的 Pod 上，并运行一个 Bash shell 来查看\
    \ `ERRORLOG`。首先，我在 k8s 资源管理器中找到我的部署，然后使用右键选项选择“终端”，如图 8-5 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg](img/479130_1_En_8_Fig5_HTML.jpg)\n\
    \n*图 8-5：在 k8s Pod 中运行终端会话*\n\nADS 的终端随即显示，现在我处于 Pod 的 SQL 容器内的 Bash shell 中。然后我可以导航到\
    \ `/var/opt/mssql/log` 并输出 `ERRORLOG`，如图 8-6 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg](img/479130_1_En_8_Fig6_HTML.jpg)\n\
    \n*图 8-6：在 k8s 中转储 SQL Server Pod 的 ERRORLOG*\n\n我输入 `exit` 以退出终端会话。我注意到的另一件事是能够对部署进行反向工程，以查看该部署对应的\
    \ YAML 文件是什么样子。在部署上使用右键功能，我选择了“转换为模板”，如图 8-7 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg](img/479130_1_En_8_Fig7_HTML.jpg)\n\
    \n*图 8-7：对 k8s 部署进行反向工程*\n\n我输入了 YAML 文件的名称，随后出现了一个编辑器，显示了生成的 YAML 文件。\n\n我相信\
    \ k8s 扩展组件还有其他我没有探索到的巧妙选项，但我将在我的 Kubernetes 之旅中继续使用它。\n\n#### 其他 kubectl 命令\n\n\
    `kubectl` 还有很多其他值得展示的命令，包括：\n\n*   `kubectl top` – 此命令可按节点或 Pod 基础显示内存和 CPU 的指标。例如，这有助于查看某个\
    \ Pod 消耗了多少内存，或者节点上还剩多少内存。\n*   `kubectl cp` – 此命令可用于将文件复制到 Pod 的容器文件系统中。就像 `docker\
    \ cp` 一样，你可以使用此命令将 SQL Server 数据库的备份文件复制到容器的可写层中。\n\n    例如，假设你部署的示例 Pod 名称在 `mssql`\
    \ 命名空间中是 `mssql-deployment-7b6565d684-92l8s`，并且你已将 WideWorldImporters 数据库示例 ([`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak))\
    \ 下载到本地目录。以下命令会将备份文件复制到 SQL Server 容器中以便还原：\n\n    ```\n    kubectl cp ./WideWorldImporters-Full.bak\
    \ mssql/mssql-deployment-7b6565d684-92l8s:/var/opt/mssql\n    ```\n*   `kubectl\
    \ exec` – 此命令允许你在 Pod 的容器命名空间中执行程序。你会像使用 `docker exec` 一样使用此命令来为容器运行 Bash shell，或者对于\
    \ SQL Server，运行 `sqlcmd` 实用程序，因为它是 SQL Server 容器的一部分。\n\n    基于我刚才展示的复制 WideWorldImporters\
    \ 备份的示例，可以使用以下命令来还原备份：\n\n    ```\n    kubectl exec mssql-deployment-7b6565d684-92l8s\
    \ -- /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Sql2019isfast\" -Q \"\
    RESTORE DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
    \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n    ```\n\n \
    \   我花了一些时间才弄清楚这个语法；请注意，这里没有指定命名空间，因此你必须处于该 Pod 所在命名空间的上下文中。还要注意在指定 `/opt/mssql/bin/sqlcmd`\
    \ 之前使用了 `--` 语法，该语法用于分隔 `kubectl` 的参数和程序的参数（本例中程序是 `sqlcmd`）。\n*   `kubectl version`\
    \ – 此命令会输出 `kubectl` 的版本。我见过用户遇到 `kubectl` 问题的情况，是因为其版本过旧且与 k8s 集群的版本不兼容。此命令会打印出客户端和服务器的版本。请阅读\
    \ [`https://kubernetes.io/docs/setup/release/version-skew-policy/`](https://kubernetes.io/docs/setup/release/version-skew-policy/)\
    \ 了解更多关于版本兼容性的信息。\n*   `kubectl explain` – 此命令显示解释 k8s 对象信息的文档。使用如下命令可以了解更多关于\
    \ `ReplicaSet` 的 YAML 要求：\n\n    ```\n    kubectl explain ReplicaSet\n    ```\n\
    *   `kubectl cluster-info dump` – 让开，kubeheads（这是个术语吗？如果不是，我刚发明了一个）。此命令将转储大量诊断信息。使用\
    \ `--output-directory` 来创建一组诊断文件。务必使用 `--all-namespaces` 选项来获取所有命名空间的诊断信息。此命令转储了\
    \ k8s 集群中几乎所有的日志文件，包括 Pods 的日志。我其实没有找到关于日志具体内容的详细文档，但随着我自己对 k8s 的使用增多，我可能会了解更多（并成为一个\
    \ kubehead）。"
- fmt: "## The k8s Dashboard\n\nThe Kubernetes dashboard displays visual information\
    \ about the k8s cluster. You can read all about the dashboard at [`https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/`](https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/)\
    \ .\n\nFor AKS, you can read how to display the k8s dashboard for your cluster\
    \ at [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard)\
    \ . When I used the steps in this documentation page to launch the dashboard,\
    \ my browser popped up with the UI. I then changed the namespace to `mssql`, and\
    \ my screen looked like Figure [8-8](#479130_1_En_8_Chapter.xhtml#Fig8).\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg)\n\
    *Figure 8-8: The k8s dashboard*\n\n## Metrics and Logs with AKS\n\nUsing AKS has\
    \ advantages because it is like a managed k8s platform. It includes built-in metrics,\
    \ visualizations, and log view capabilities in the Azure Portal. Figure [8-9](#479130_1_En_8_Chapter.xhtml#Fig9)\
    \ shows some of the insights I can gain using the Azure Portal with my AKS cluster.\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg)\n\
    *Figure 8-9: Insights from the Azure Portal for AKS*\n\nThe next step in this\
    \ chapter is to show you how built-in HA works with k8s and how it applies to\
    \ SQL Server. If you are going to use the examples in the next section, don’t\
    \ remove any resources you’ve already configured. The script `cleanup.sh` can\
    \ be used to clean up all resources, so you can use that if you *don’t* plan to\
    \ go through the examples in the next section.\n\n## SQL Server High Availability\
    \ on k8s\n\nOne of the most beautiful aspects of k8s is the built-in feature set\
    \ for high availability. Imagine having high availability for SQL Server with\
    \ no clustering software required for you to install or maintain!\n\nI talked\
    \ about the term `ReplicaSet` earlier in the chapter, and now it is time to talk\
    \ about its significance.\n\nWhen you applied the SQL Server deployment in the\
    \ previous section’s example, the YAML file included this declaration:\n\n```yaml\n\
    replicas: 1\n```\n\nThis declaration indicates to k8s to *always try to ensure*\
    \ that one instance of the container in the pod, which in this case holds the\
    \ SQL Server container, is always running. If the container crashes, then k8s\
    \ will restart the container. If the pod dies, then k8s will spin up a new pod,\
    \ and if the node dies, k8s will spin up a new pod on a new node, should one exist\
    \ (and there are resources to allow it).\n\nWith SQL Server, when you combine\
    \ a `ReplicaSet` with a `LoadBalancer` and persisted storage, this becomes a natural\
    \ shared storage HA story. Consider Figure [8-10](#479130_1_En_8_Chapter.xhtml#Fig10)\
    \ as a visual representation of the deployment you created in the previous section.\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg)\n\
    *Figure 8-10: Basic HA with SQL Server and k8s*\n\nIn this example, the user would\
    \ connect to the Load Balancer which is bound to the pod holding the SQL Server\
    \ Container (in reality the Load Balancer doesn’t just live in a user node). If\
    \ the SQL Server container crashed, you would only see a slight blip as k8s would\
    \ spin up another container in the pod.\n\nConsider what would happen if the pod\
    \ had a problem, as seen in Figure [8-11](#479130_1_En_8_Chapter.xhtml#Fig11).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg)\n\
    *Figure 8-11: A pod failure in k8s*\n\nIn this scenario, k8s would spin up another\
    \ pod (most likely on the same node) which starts a new container. But notice\
    \ the container still points to the `PVC`, which is bound to system and user databases.\
    \ To SQL Server, it just sees existing system and user databases and starts up.\
    \ The new pod would have a new private IP address, but the Load Balancer is automatically\
    \ redirected to this new address. From the application point of view, it is a\
    \ simple retry of the connection and all is well.\n\nWhat if the node (it could\
    \ be a VM) crashes, as seen in Figure [8-12](#479130_1_En_8_Chapter.xhtml#Fig12).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg)\n\
    *Figure 8-12: A node failure in k8s*\n\nk8s would detect this scenario and spin\
    \ up a new pod on a new node. Even though the new pod has a new private IP address,\
    \ the Load Balancer is still redirected to the new pod. This has a similar feel\
    \ to Always On Failover Cluster Instance, except you didn’t need to install any\
    \ special clustering software.\n\nLet’s build on the previous chapter example\
    \ to see how this works. All the scripts for this example can be found at `ch8_sql_on_k8s\\\
    ha`.\n\n1.  Run the following command or `step12_getpods.sh` to see the name of\
    \ the pod, IP address, and node the pod is running on:\n\n    ```bash\n    kubectl\
    \ get pods -o wide\n    ```\n\n    Your results should look something like this:\n\
    \n    ```\n    NAME                               READY  STATUS   RESTARTS   \
    \  AGE  IP           NODE                      NOMINATED NODE  READINESS GATES\n\
    \    mssql-deployment-7b6565d684-8r7cc  1/1    Running  0            91m  10.244.1.11\
    \  aks-nodepool1-90949249-0\n    ```\n\n2.  Let’s simulate a container failure\
    \ by shutting down SQL Server. Run the following command or script `step13_crash_sql.sh`\
    \ to shut down SQL Server, thereby stopping the container:\n\n    ```bash\n  \
    \  SERVERIP=$(kubectl get service | grep mssql-service | awk {'print $4'})\n \
    \   PORT=31433\n    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"SHUTDOWN\
    \ WITH NOWAIT\"\n    ```"
  raw: "#### The k8s Dashboard\n\nThe Kubernetes dashboard displays visual information\
    \ about the k8s cluster. You can read all about the dashboard at [`https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/`](https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/)\
    \ .\n\nFor AKS, you can read how to display the k8s dashboard for your cluster\
    \ at [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard)\
    \ . When I used the steps in this documentation page to launch the dashboard,\
    \ my browser popped up with the UI. I then changed the namespace to mssql, and\
    \ my screen looked like Figure [8-8](#479130_1_En_8_Chapter.xhtml#Fig8).\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8\n\nThe k8s dashboard\n\n#### Metrics and Logs with AKS\n\nUsing AKS\
    \ has advantages because it is like a managed k8s platform. It includes built-in\
    \ metrics, visualizations, and log view capabilities in the Azure Portal. Figure\
    \ [8-9](#479130_1_En_8_Chapter.xhtml#Fig9) shows some of the insights I can gain\
    \ using the Azure Portal with my AKS cluster.\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9\n\nInsights from the Azure Portal for AKS\n\nThe next step in this\
    \ chapter is to show you how built-in HA works with k8s and how it applies to\
    \ SQL Server. If you are going to use the examples in the next section, don’t\
    \ remove any resources you’ve already configured. The script **cleanup.sh** can\
    \ be used to clean up all resources, so you can use that if you *don’t* plan to\
    \ go through the examples in the next section.\n\n## SQL Server High Availability\
    \ on k8s\n\nOne of the most beautiful aspects of k8s is the built-in feature set\
    \ for high availability. Imagine having high availability for SQL Server with\
    \ no clustering software required for you to install or maintain!\n\nI talked\
    \ about the term **ReplicaSet** earlier in the chapter, and now it is time to\
    \ talk about its significance.\n\nWhen you applied the SQL Server deployment in\
    \ the previous section’s example, the YAML file included this declaration:\n\n\
    ```\nreplicas: 1\n```\n\nThis declaration indicates to k8s to *always try to ensure*\
    \ that one instance of the container in the pod, which in this case holds the\
    \ SQL Server container, is always running. If the container crashes, then k8s\
    \ will restart the container. If the pod dies, then k8s will spin up a new pod,\
    \ and if the node dies, k8s will spin up a new pod on a new node, should one exist\
    \ (and there are resources to allow it).\n\nWith SQL Server, when you combine\
    \ a ReplicaSet with a LoadBalancer and persisted storage, this becomes a natural\
    \ shared storage HA story. Consider Figure [8-10](#479130_1_En_8_Chapter.xhtml#Fig10)\
    \ as a visual representation of the deployment you created in the previous section.\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10\n\nBasic HA with SQL Server and k8s\n\nIn this example, the user\
    \ would connect to the Load Balancer which is bound to the pod holding the SQL\
    \ Server Container (in reality the Load Balancer doesn’t just live in a user node).\
    \ If the SQL Server container crashed, you would only see a slight blip as k8s\
    \ would spin up another container in the pod.\n\nConsider what would happen if\
    \ the pod had a problem, as seen in Figure [8-11](#479130_1_En_8_Chapter.xhtml#Fig11).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11\n\nA pod failure in k8s\n\nIn this scenario, k8s would spin up another\
    \ pod (most likely on the same node) which starts a new container. But notice\
    \ the container still points to the PVC, which is bound to system and user databases.\
    \ To SQL Server, it just sees existing system and user databases and starts up.\
    \ The new pod would have a new private IP address, but the Load Balancer is automatically\
    \ redirected to this new address. From the application point of view, it is a\
    \ simple retry of the connection and all is well.\n\nWhat if the node (it could\
    \ be a VM) crashes, as seen in Figure [8-12](#479130_1_En_8_Chapter.xhtml#Fig12).\n\
    \n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg](images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12\n\nA node failure in k8s\n\nk8s would detect this scenario and spin\
    \ up a new pod on a new node. Even though the new pod has a new private IP address,\
    \ the Load Balancer is still redirected to the new pod. This has a similar feel\
    \ to Always On Failover Cluster Instance, except you didn’t need to install any\
    \ special clustering software.\n\nLet’s build on the previous chapter example\
    \ to see how this works. All the scripts for this example can be found at **ch8_sql_on_k8s\\\
    ha**.\n\n1.  Run the following command or **step12_getpods.sh** to see the name\
    \ of the pod, IP address, and node the pod is running on:\n\n```\n    kubectl\
    \ get pods -o wide\n    ```\n\nYour results should look something like this:\n\
    \n```\n    NAME                               READY  STATUS   RESTARTS     AGE\
    \  IP           NODE                      NOMINATED NODE  READINESS GATES\n  \
    \  mssql-deployment-7b6565d684-8r7cc  1/1    Running  0            91m  10.244.1.11\
    \  aks-nodepool1-90949249-0            \n    ```\n\n2.  Let’s simulate a container\
    \ failure by shutting down SQL Server. Run the following command or script **step13_crash_sql.sh**\
    \ to shut down SQL Server, thereby stopping the container:\n\n```\n    SERVERIP=$(kubectl\
    \ get service | grep mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd\
    \ -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"SHUTDOWN WITH NOWAIT\"\n    ```"
  trans: "## k8s Dashboard\n\nKubernetes 仪表板可视化展示 k8s 集群的相关信息。您可以在 [`https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/`](https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/)\
    \ 阅读关于仪表板的所有内容。\n\n对于 AKS，您可以参考 [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard)\
    \ 了解如何为集群显示 k8s 仪表板。当我按照此文档页面的步骤启动仪表板时，浏览器弹出了用户界面。随后，我将命名空间更改为 `mssql`，屏幕显示如图\
    \ 8-8 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg](img/479130_1_En_8_Fig8_HTML.jpg)\n\
    *图 8-8：k8s 仪表板*\n\n## 使用 AKS 的指标和日志\n\n使用 AKS 有其优势，因为它类似于一个托管的 k8s 平台。它在 Azure\
    \ 门户中内置了指标、可视化图表和日志查看功能。图 8-9 展示了我通过 Azure 门户从 AKS 集群中获得的一些洞察。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg](img/479130_1_En_8_Fig9_HTML.jpg)\n\
    *图 8-9：来自 AKS 的 Azure 门户洞察*\n\n本章的下一步是向您展示 k8s 内置的高可用性（HA）如何工作以及它如何应用于 SQL Server。如果您打算使用下一节中的示例，请不要移除任何已配置的资源。脚本\
    \ `cleanup.sh` 可用于清理所有资源，因此如果您*不*打算继续学习下一节的示例，可以使用它。\n\n## 在 k8s 上实现 SQL Server\
    \ 高可用性\n\nk8s 最出色的方面之一是其内置的高可用性功能集。想象一下，无需安装或维护任何集群软件就能为 SQL Server 实现高可用性！\n\n\
    我在本章前面提到了 `ReplicaSet` 这个术语，现在是时候讨论它的重要性了。\n\n当您在上一节的示例中应用 SQL Server 部署时，YAML\
    \ 文件包含了如下声明：\n\n```yaml\nreplicas: 1\n```\n\n此声明指示 k8s *始终尝试确保* pod 中的容器（本例中是\
    \ SQL Server 容器）有一个实例在运行。如果容器崩溃，k8s 将重启该容器。如果 pod 终止，k8s 将启动一个新的 pod。如果节点终止，且存在新节点并有足够资源，k8s\
    \ 将在新节点上启动一个新的 pod。\n\n对于 SQL Server，当您将 `ReplicaSet` 与 `LoadBalancer` 和持久化存储结合使用时，就形成了一个天然的共享存储高可用性方案。请将图\
    \ 8-10 视为您在上一节创建的部署的可视化表示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg](img/479130_1_En_8_Fig10_HTML.jpg)\n\
    *图 8-10：使用 SQL Server 和 k8s 的基本高可用性*\n\n在此示例中，用户将连接到与持有 SQL Server 容器的 pod 绑定的负载均衡器（实际上，负载均衡器并不仅仅存在于用户节点中）。如果\
    \ SQL Server 容器崩溃，您只会看到短暂的停顿，因为 k8s 会在 pod 中启动另一个容器。\n\n考虑一下如果 pod 出现问题会发生什么，如图\
    \ 8-11 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg](img/479130_1_En_8_Fig11_HTML.jpg)\n\
    *图 8-11：k8s 中的 pod 故障*\n\n在此场景下，k8s 将启动另一个 pod（很可能在同一个节点上），并启动一个新容器。但请注意，新容器仍然指向\
    \ `PVC`，而 `PVC` 绑定着系统和用户数据库。对 SQL Server 而言，它只看到现有的系统和用户数据库，然后启动。新 pod 会有一个新的私有\
    \ IP 地址，但负载均衡器会自动重定向到这个新地址。从应用程序的角度来看，只需重试连接，一切就恢复正常。\n\n如果节点（可能是一个虚拟机）崩溃了，如图\
    \ 8-12 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg](img/479130_1_En_8_Fig12_HTML.jpg)\n\
    *图 8-12：k8s 中的节点故障*\n\nk8s 会检测到此情况，并在新节点上启动一个新的 pod。即使新 pod 有一个新的私有 IP 地址，负载均衡器仍会被重定向到新的\
    \ pod。这与“始终开启的故障转移集群实例”（Always On Failover Cluster Instance）有相似之处，只是您无需安装任何特殊的集群软件。\n\
    \n让我们基于前一章的示例来构建，看看这是如何工作的。此示例的所有脚本都可以在 `ch8_sql_on_k8s\\ha` 找到。\n\n1.  运行以下命令或\
    \ `step12_getpods.sh` 脚本，以查看 pod 的名称、IP 地址及其运行的节点：\n\n    ```bash\n    kubectl\
    \ get pods -o wide\n    ```\n\n    您的结果应类似于：\n\n    ```\n    NAME            \
    \                   READY  STATUS   RESTARTS     AGE  IP           NODE      \
    \                NOMINATED NODE  READINESS GATES\n    mssql-deployment-7b6565d684-8r7cc\
    \  1/1    Running  0            91m  10.244.1.11  aks-nodepool1-90949249-0\n \
    \   ```\n\n2.  让我们通过关闭 SQL Server 来模拟容器故障。运行以下命令或脚本 `step13_crash_sql.sh` 以关闭\
    \ SQL Server，从而停止容器：\n\n    ```bash\n    SERVERIP=$(kubectl get service | grep\
    \ mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd -Usa -PSql2019isfast\
    \ -S$SERVERIP,$PORT -Q\"SHUTDOWN WITH NOWAIT\"\n    ```"
- fmt: '## 3. 运行以下命令或脚本 `step14_getpods.sh` 以查看所有内容是否相同：


    ```

    kubectl get pods -o wide

    ```


    你的结果应该与之前相同，因为容器在同一个节点上的同一个Pod中重启了：


    ```

    NAME                               READY  STATUS   RESTARTS    AGE  IP           NODE                      NOMINATED
    NODE  READINESS GATES

    mssql-deployment-7b6565d684-8r7cc  1/1    Running  1           91m  10.244.1.11  aks-nodepool1-90949249-0

    ```


    运行以下命令以查看事件序列：


    ```

    kubectl get events

    ```


    你的结果应该类似于：


    ```

    LAST SEEN   TYPE     REASON    KIND   MESSAGE

    16s         Normal   Pulled    Pod    Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    16s         Normal   Created   Pod    Created container

    16s         Normal   Started   Pod    Started container

    ```


    ## 4. 尝试连接到 SQL Server，使用以下命令或脚本 `step15_testsql.sh` 查看一切是否正常：


    ```

    SERVERIP=$(kubectl get service | grep mssql-service | awk {''print $4''})

    PORT=31433

    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q"SELECT @@version"

    ```


    你应该能够看到成功连接到 SQL Server 并显示了版本信息。


    ## 5. 使用以下命令或脚本 `step16_pod_failure.sh` 测试 Pod 故障：


    ```

    kubectl delete pod -l app=mssql

    ```


    在这个例子中，我们不是按名称指定 Pod，而是利用了我们为 Pod 关联了一个易于记忆的标签这一点。


    你应该会看到类似这样的消息：


    ```

    pod "mssql-deployment-7b6565d684-8r7cc" deleted

    ```


    ## 6. 使用以下命令或脚本 `step17_getpods.sh` 检查 Pod 的状态，包括 IP 地址：


    ```

    kubectl get pods -o wide

    ```


    从输出中可以看到，Pod 现在运行在同一个节点上（它也可能被调度到一个新节点），并有了新的名称和新的 IP 地址：


    ```

    NAME                                READY   STATUS    RESTARTS   AGE     IP            NODE                       NOMINATED
    NODE   READINESS GATES

    mssql-deployment-7b6565d684-gq48v   1/1     Running   0          2m55s  10.244.1.12   aks-nodepool1-90949249-0

    ```


    使用以下命令查看事件序列：


    ```

    kubectl get events

    ```


    你的输出将显示终止旧 Pod 并创建新 Pod 的序列，类似于：


    ```

    LAST SEEN  TYPE    REASON            KIND        MESSAGE

    6m53s      Normal  Pulled            Pod         Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    6m53s      Normal  Created           Pod         Created container

    6m53s      Normal  Started           Pod         Started container

    39s        Normal  Killing           Pod         Killing container with id docker://mssql:Need
    to kill Pod

    40s        Normal  Scheduled         Pod         Successfully assigned mssql/mssql-deployment-7b6565d684-gq48v
    to aks-nodepool1-90949249-0

    34s        Normal  Pulled            Pod         Container image "mcr.microsoft.com/mssql/rhel/server:2019-latest"
    already present on machine

    34s        Normal  Created           Pod         Created container

    34s        Normal  Started           Pod         Started container

    40s        Normal  SuccessfulCreate  ReplicaSet  Created pod: mssql-deployment-7b6565d684-gq48v

    ```


    ## 7. 使用以下命令或脚本 `step18_testsql.sh` 尝试通过 LoadBalancer 服务连接到 SQL Server：


    ```

    SERVERIP=$(kubectl get service | grep mssql-service | awk {''print $4''})

    PORT=31433

    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q"SELECT @@version"

    ```


    因为我们将 LoadBalancer 绑定到了 Pod，所以即使 Pod 有了新的私有 IP 地址，连接保持不变。


    ## 8. 通过运行以下命令或脚本 `cleanup.sh` 清理所有资源：


    ```

    kubectl delete namespace mssql

    kubectl config delete-context mssql

    kubectl config use-context bwsqlaks

    ```


    现在你已经了解了 SQL Server 在 k8s 中运行的基本 HA（高可用）能力。对于节点不再可用的情况，要模拟节点的真正崩溃，你需要直接访问支持节点的虚拟机并“崩溃”它。不过，你可以通过运行以下命令，观察
    k8s 如何根据 ReplicaSet 定义自动调度 SQL Server 部署的行为：


    ```

    kubectl drain

    ```


    你可以通过运行以下命令让节点重新上线以供调度（但这并不意味着 Pod 会移回该节点）：


    ```

    kubectl uncordon

    ```


    现在让我们探讨如何在 k8s 中更新 SQL Server，类似于你在第 [7](#479130_1_En_7_Chapter.xhtml) 章中更新容器的方式。'
