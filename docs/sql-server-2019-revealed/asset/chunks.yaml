- fmt: "### Note\n\nI used an Insider build of ADS at the time I deployed BDC so some\
    \ of this interface may change as SQL Server 2019 is released.\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig6_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6: Connect to SQL Server in BDC after deployment.\n\nVerify the overall\
    \ status of BDC using the following command:\n\n```\nazdata bdc status show\n\
    ```\n\nThe results for my BDC cluster looked like this:\n\n```\nMssql-cluster:\
    \ ready                                         Health Status:  healthy\n =============================================================================\n\
    \ Services: ready                                              Health Status:\
    \  healthy\n -----------------------------------------------------------------------------\n\
    \ Servicename  State  Healthstatus  Details\n sql          ready  healthy    \
    \   -\n hdfs         ready  healthy       -\n spark        ready  healthy    \
    \   -\n control      ready  healthy       -\n gateway      ready  healthy    \
    \   -\n app          ready  healthy       -\n Sql Services: ready            \
    \                              Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n master        ready  healthy  \
    \     StatefulSet master is healthy\n compute-0     ready  healthy       StatefulSet\
    \ compute-0 is healthy\n data-0        ready  healthy       StatefulSet data-0\
    \ is healthy\n storage-0     ready  healthy       StatefulSet storage-0 is healthy\n\
    \ Hdfs Services: ready                                         Health Status:\
    \  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n nmnode-0      ready  healthy  \
    \     StatefulSet nmnode-0 is healthy\n storage-0     ready  healthy       StatefulSet\
    \ storage-0 is healthy\n sparkhead     ready  healthy       StatefulSet sparkhead\
    \ is healthy\n Spark Services: ready                                        Health\
    \ Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n sparkhead     ready  healthy  \
    \     StatefulSet sparkhead is healthy\n storage-0     ready  healthy       StatefulSet\
    \ storage-0 is healthy\n Control Services: ready                             \
    \         Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n controldb     ready  healthy  \
    \     -\n control       ready  healthy       -\n metricsdc     ready  healthy\
    \       DaemonSet metricsdc is healthy\n metricsui     ready  healthy       ReplicaSet\
    \ metricsui is healthy\n metricsdb     ready  healthy       StatefulSet metricsdb\
    \ is healthy\n logsui        ready  healthy       ReplicaSet logsui is healthy\n\
    \ logsdb        ready  healthy       StatefulSet logsdb is healthy\n mgmtproxy\
    \     ready  healthy       ReplicaSet mgmtproxy is healthy\n Gateway Services:\
    \ ready                                      Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n gateway       ready  healthy  \
    \     StatefulSet gateway is healthy\n App Services: ready                   \
    \                       Health Status:  healthy\n -----------------------------------------------------------------------------\n\
    \ Resourcename  State  Healthstatus  Details\n appproxy      ready  healthy  \
    \     ReplicaSet appproxy is healthy\n```\n\nIf everything is not healthy, consider\
    \ using the following documentation to troubleshoot the cluster: [`https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`](https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands).\n\
    \n### Configuring Deployment for Production\n\nMy deployment experience used a\
    \ *configuration*, shipped with the `azdata` tool, designed for a development\
    \ or test cluster. A configuration for `azdata` is defined through JSON files\
    \ and is used to control various types of resource definitions within the cluster.\
    \ You can see the list of these configurations by using the command:\n\n```\n\
    azdata bdc config list\n```\n\nThe JSON files for configuration look very much\
    \ like the Kubernetes YAML files I showed you in Chapter [8](#479130_1_En_8_Chapter.xhtml).\
    \ In this case, the JSON files have a format recognized by the `azdata` tool (much\
    \ like the YAML have a format recognized by `kubectl`).\n\nIn order to see what\
    \ options are possible for you to configure your BDC deployment, you can run a\
    \ command like the following to see how the `aks-dev-test` default configuration\
    \ is deployed:\n\n```\nazdata bdc config init --source aks-dev-test --target custom\n\
    ```\n\nThis command creates a new folder called `custom` and stores in this directory\
    \ files called `bdc.json` and `control.json`. You can make changes to these files\
    \ and run a command like this to create a new BDC with these desired configuration\
    \ settings:\n\n```\nazdata bdc create --config-profile custom --accept-eula yes\n\
    ```\n\nThere is a discussion of this method in the documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance?view=sqlallproducts-allversions#customconfig`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance%253Fview%253Dsqlallproducts-allversions%2523customconfig).\n\
    \nIn order to understand how to make changes to the BDC JSON files, you need to\
    \ understand more of the architecture, which I’ll describe in the next section\
    \ titled “Big Data Cluster Architecture.” I expect then you will need to come\
    \ back to this section and look closer at the JSON files and techniques to modify\
    \ them accordingly. Once you have some idea of what to change, you can use these\
    \ guidelines in our documentation on how to make changes to the BDC JSON files\
    \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration).\
    \ The complete deployment configuration reference for BDC JSON files can be found\
    \ at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-deployment-config`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-deployment-config).\
    \ You should also examine our “auto-deploy” scripts for Python and bash to see\
    \ how `k8s` and `BDC` can be created.\n\n`python` – [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\n\
    \n`bash` – [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm)\n\
    \nThese scripts assume one Kubernetes (`k8s`) node. You will likely want to use\
    \ multiple nodes in a production `k8s` cluster. You can then decide how to place\
    \ various components of `BDC` on specific `k8s` nodes at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-custom-configuration).\n\
    \nOne other important aspect to configure `BDC` for production is storage. Our\
    \ documentation provides guidance on how to configure `BDC` storage to match your\
    \ `k8s` storage configuration for production at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence).\
    \ Every pod that has stateful storage in `BDC` uses a separate Persistent Volume\
    \ Claim (`PVC`). You can get a list of all `PVC` objects in `BDC` by executing\
    \ the following command:\n\n```\nget PersistentVolumeClaim --namespace=mssql-cluster\n\
    ```"
