  trans: "\n# SQL Server 使用加速数据库恢复 (ADR)\n\n我不会试图详细介绍 CTR 论文描述的所有细节，但会阐述使 ADR 工作的基本组件，以及它与标准\
    \ ARIES 恢复方法的不同之处，然后通过一个例子让你有更深入的了解。\n\nADR 引入了**持久化版本存储** (PVS) 的概念。SQL Server\
    \ 有一个称为版本存储的概念，用于快照隔离，但该版本存储保存在 `tempdb` 中。PVS 是一个类似的概念，即为行的修改保存版本，但这个版本存储是持久的，因为它存储在用户数据库中（用于快照隔离的版本存储）不是持久的，因为它保存在\
    \ `tempdb` 中，而 `tempdb` 在服务器重启后会重建）。一旦启用 ADR，SQL Server 将开始使用版本跟踪修改。版本可以存储在数据库页面的行内\
    \ (`in-row`) 或数据库内的 `off-row` 存储中。版本包含修改前数据的先前状态以及导致该版本的事务 ID，以便轻松识别数据版本是否应对其它事务可见。\n\
    \n现在有了 PVS，像回滚这样的事务操作变得有趣且*简单*。如果一个事务被回滚，SQL Server 只需将该事务标记为 ABORTED（已中止）。现在，任何查询该行数据的请求都可以确定该行的某个版本是否可见并应被使用。如果一行的最新版本与一个\
    \ ABORTED 事务相关联，查询可以忽略此版本并查找先前的版本。如果该行的版本与已提交或活动事务相关联，则应用隔离级别规则来判断该行是否可见。\n\n\
    SQL Server 通过*中止事务映射表*的概念来维护事务状态以实现所有这些功能。CTR 论文中对此有更详细的讨论。\n\n### 注意\n\nADR 中关于版本的一个可能令人困惑的方面是隔离级别。当前的版本功能（在\
    \ `tempdb` 中）是专门为支持快照隔离级别而构建的。ADR 的版本并非为支持快照隔离而构建，但可以用来支持它们，并提供 ADR 的其它好处。\n\n\
    PVS 还对快速恢复有益（因此有恒定时间恢复的说法）。重做阶段只需确保版本存储在表页面的行内一致。撤销阶段只需将任何活动事务标记为已中止，然后如前所述的版本化过程会完成其余工作。这使得恢复非常迅速。\n\
    \n有些事务，主要是系统事务（例如，页面分配、更新统计信息），不能使用新的 PVS 方案。因此，当启用 ADR 时，SQL Server 为任何无法使用版本化的事务维护一个辅助日志\
    \ (`Slog`，存储在事务日志中)。与 Slog 关联的事务必须使用正常的 ARIES 恢复模式。幸运的是，系统事务几乎总是短暂的，因此不会像长时间运行的用户事务那样引起问题。\n\
    \n图 4-2 摘自 CTR 论文，展示了启用 ADR 后的新的恢复过程。\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig2_HTML.jpg](img/479130_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2: SQL Server 使用加速数据库恢复\n\n如图所示，SQL Server 的恢复仍然有三个阶段：分析、重做和撤销。但现在这个过程快得多，因此得名加速。\n\
    \n**分析**阶段仍然必须完成与过去相同的工作，从 CHECKPOINT 的最后一条日志记录开始，但重做和撤销阶段则大不相同。\n\n**重做**将确保\
    \ Slog 操作的日志记录从最旧的活动事务到最旧的脏页操作的日志记录被重做。从这一点开始，重做将执行与 ARIES 恢复相同的确保数据正确提交的操作。但假设数据库使用了标准的检查点配置，这个序列通常应该是很短的。\n\
    \n**撤销**阶段只需将任何未提交的事务标记为已中止，但需要撤销 Slog 事务操作，类似于 ARIES 撤销用户事务。但系统事务本质上是短暂的，并且只占所有事务的极小部分，因此这个过程应该总是很快。\n\
    \n结果是一个全新的、基于保存在用户数据库中的版本存储的、极其快速的恢复系统。\n\n让我们用一个例子来更深入地了解使用 ADR 时事务日志记录有何不同。这个例子是完全独立的。你只需要\
    \ SQL Server 2019 和 SQL Server Management Studio (SSMS) 或 Azure Data Studio (ADS)\
    \ 来运行此示例。你将使用脚本 `alookatadr.sql`，该脚本位于 `ch4_mission_critical_availability/adr`\
    \ 目录中。\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig3_HTML.jpg](img/479130_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3: 来自中止的 DELETE 操作的日志记录\n\n1.  打开脚本 `alookatadr.sql` 并执行脚本中的步骤 1 来创建数据库。\n\
    \n    ```sql\n    -- Step 1: 创建数据库并设为简单恢复模式。ADR 默认关闭\n    USE master\n    GO\n\
    \    DROP DATABASE IF EXISTS gocowboys\n    GO\n    CREATE DATABASE gocowboys\n\
    \    GO\n    ALTER DATABASE gocowboys SET RECOVERY SIMPLE\n    GO\n    ```\n\n\
    \    提示：此示例对数据库使用 SIMPLE（简单）恢复模型，以便于检查日志记录。\n\n2.  运行脚本中的步骤 2 来创建一个表并插入行。注意脚本插入了\
    \ 1000 行。由于 ADR 的一项优化，你不能只用一行数据（你将在本章后面了解更多关于此优化的信息）。\n"
- fmt: '### Using Accelerated Database Recovery


    As you saw from the example you just completed, using Accelerated Database Recovery
    (ADR) requires no application changes. You simply use the following T-SQL statement
    to enable ADR and you are off and running:


    ```

    ALTER DATABASE  SET ACCELERATED_DATABASE_RECOVERY = ON

    ```


    Let’s walk through two examples to see:

    *   How fast rollback now executes and how the transaction log is aggressively
    truncated

    *   How fast recovery completes, allowing you fast access to the database


    Everything you need to run these examples can be found in the notebooks and scripts
    for each example.


    #### Fast Rollback and Aggressive Log Truncation


    Use the following example to see how fast rollback can be executed using ADR,
    and how aggressive the transaction log is now truncated, avoiding excessive log
    growth scenarios. In this example, we will compare the speed of rollback and the
    growth of the transaction log with and without ADR.


    You can run through this example using the T-SQL script `adr.sql` in the `ch4_mission_critical_availability\adr`
    directory.


    I recommend in this situation to use the T-SQL notebook `adr.ipynb` in the `ch4_mission_critical_availability\adr`
    directory. The notebook has all the instructions to create a database, create
    a table, and insert data. Then with ADR disabled, you will delete all the rows
    in the table in a transaction. Then you will examine the amount of log space that
    has been used but can’t be truncated even after a checkpoint. Then you will observe
    the speed of a rollback of the entire delete (or lack of speed, to be more precise).


    Then, in the notebook, you will repeat those steps, but this time with ADR on.
    The T-SQL script has all the same steps. After going through this example, let’s
    do something a bit more advanced. Let’s see the speed of recovery using the same
    T-SQL example but with more rows to see the impact of recovery.


    #### Speeding Up Recovery


    In order to show how fast recovery works, you have to create an example where
    the undo phase of recovery needs to attempt to roll back a large number of modifications
    or transactions.


    So how do you create a scenario where SQL Server has to run the undo phase on
    a certain transaction? In order to do this, you need to craft a scenario for an
    active transaction that does NOT get rolled back or committed before SQL Server
    is shut down. There are three methods to make this happen:

    *   Execute the T-SQL statement `SHUTDOWN WITH NOWAIT`.

    *   Shut down the SQL Server service (e.g., `net stop mssqlserver`).

    *   Terminate the `SQLSERVR.EXE` process (for Windows, use “End Task” from Task
    Manager).


    Any of these techniques will stop SQL Server without affecting the active transaction.
    There is one additional consideration. For SQL Server to roll back the active
    transactions, there “has to be something to roll back.” If the database pages
    affected by the active transaction were never flushed to disk, when SQL Server
    runs recovery, it can’t “undo” something that was never there. Therefore, you
    should execute a `CHECKPOINT` against the database when using one of these methods
    (shutting the SQL Server service down gracefully does run a checkpoint against
    all databases). Note, it is possible that the Recovery Writer or Lazy Writer have
    flushed these pages, but this is not something you can rely on for a demo.'
