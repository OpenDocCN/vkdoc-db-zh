    .


    *   **Grafana Metrics**


    Using this context, you can drill into Metrics showing a Grafana ( [`https://grafana.com/`](https://grafana.com/)
    ) dashboard powered by components in the Controller. Figure [10-18](#479130_1_En_10_Chapter.xhtml#Fig18)
    shows the Grafana dashboard for the SQL Server Master Instance.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg)


    Figure 10-18


    Grafana dashboard for SQL Server Big Data Clusters


    *   **Kibana and Elasticsearch**


    Every major component of BDC has a Grafana dashboard and a Kibana ( [`https://en.wikipedia.org/wiki/Kibana`](https://en.wikipedia.org/wiki/Kibana)
    ) visualization of Elasticsearch ( [`www.elastic.co/`](https://www.elastic.co/)
    ), with logs for deeper troubleshooting and analysis. Figure [10-19](#479130_1_En_10_Chapter.xhtml#Fig19)
    shows a Kibana visualization of Elasticsearch logging from the SQL Server Master
    Instance through the ADS Big Data Cluster Dashboard.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg)


    Figure 10-19


    Kibana and Elasticsearch for logs with BDC


    *   **Using azdata with SQL Server**


    While Kubernetes allows you to interact with containers with a command like kubectl
    exec, the azdata program allows you to interact with SQL Server using the sql
    option of azdata as documented at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-sql`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-sql)
    . This allows you to execute T-SQL commands against the SQL Server Master Instance
    as well as access the sqlcmd “shell.” Remember azdata is like the kubectl program
    for BDC; you can see the complete reference at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata)
    .


    *   **Kubernetes (k8s) and BDC Troubleshooting**


    Read through my discussion of k8s commands in Chapter [8](#479130_1_En_8_Chapter.xhtml),
    but we also have some tips on our documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`](https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands)
    . Don’t forget to also use our SQL Server Troubleshooting Guides which I described
    earlier in this chapter in the section “Jupyter Books for SQL Server Big Data
    Clusters.”


    ## Summary


    While SQL Server 2019 is radical, SQL Server Big Data Clusters is *revolutionary*.
    Who would have thought a product some consider just a relational database engine
    includes an entire solution for your own *data lake*, *Data Virtualization*, and
    an *end-to-end Machine Learning platform*, all built on top of Kubernetes?


    Think about the technologies we have deployed for Big Data Clusters:


    *   SQL Server


    *   Polybase


    *   HDFS


    *   Spark


    *   Livy


    *   Kibana


    *   Elasticsearch


    *   Grafana


    *   InfluxDB


    *   Notebooks


    *   Machine Learning with R and Python


    *   Java Extensibility


    *   Always On Availability Groups


    All of this is powered by a control plane with our “API Server” or controller
    serviced to deploy, manage, and power a Big Data Cluster built on Kubernetes.


    This is my opinion, but why not just hear from a customer who has already seen
    the promise of this solution:


    “Building and deploying our vertical AI-solution for clinical radiology combines
    very diverse implementation paradigms, data formats, and regulatory requirements.
    SQL Server 2019 Big Data Clusters allowed us to accommodate and integrate all
    aspects from one shared platform – for our data scientists with their deep learning
    as well as for our software engineers who wire up workflows, security, and scalability.
    At runtime, our healthcare customers benefit from simple containerized deployment
    and maintenance while being able to move our solution between on-prem and the
    cloud easily.” – René Balzano, Founder and CEO of Balzano.


    This quote is from our blog we posted when we released Big Data Clusters for SQL
    Server 2019 as a Release Candidate at [`https://cloudblogs.microsoft.com/sqlserver/2019/08/29/sql-server-2019-release-candidate-refresh-with-big-data-clusters/`](https://cloudblogs.microsoft.com/sqlserver/2019/08/29/sql-server-2019-release-candidate-refresh-with-big-data-clusters/)
    . I look forward to many other customers that believe Big Data Clusters is just
    the revolutionary solution they need to power their business.


    # 11. The Voice of the Customer and Migration


    I hope by the time you have reached this chapter, you can appreciate the incredible
    amount of innovation that has gone into SQL Server 2019. And if you have read
    all of the first ten chapters, you probably have the feeling of “information overload.”
    I’ve had several folks who have attended my presentations in the past feel like
    their “brain is melting.” If you feel that way up to this point of the book, I
    accomplished one of my goals. I wanted this book to be more than just a review
    of SQL Server 2019, because anyone can get that from the documentation. I wanted
    this to be a comprehensive look at the SQL Server 2019 release.


    With all these capabilities to solve modern data challenges, is there anything
    left to talk about? Well, yes, in fact, there is. I’ll conclude this book by discussing
    the “pile of features” (I’m borrowing that term from my colleague Conor Cunningham)
    we built into SQL Server 2019 based on customer feedback. I’ll also talk about
    methods, tools, and techniques for you to use when migrating to SQL Server 2019.'
  trans: "\n### 管理和监控大数据集群\n\n除了通过动态管理视图（`DMVs`）和扩展事件等 `SQL Server` 诊断工具对 `SQL Server`\
    \ 主实例进行标准的管理和监控外，我们还提供了一系列工具和资源，帮助您专门管理和监控 `SQL Server 大数据集群`（`BDC`）。\n\n*   **`Azure\
    \ Data Studio (ADS) 大数据集群仪表板`**\n\n    `ADS` 自带一个 `BDC` 仪表板，用于查看 `BDC` 集群（包括其所有组件）的健康状况。图\
    \ 10-17 展示了 `ADS` `BDC` 仪表板的示例。\n\n    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig17_HTML.jpg](img/479130_1_En_10_Fig17_HTML.jpg)\n\
    \    图 10-17 `Azure Data Studio` 大数据集群仪表板\n\n    您可以点击“集群详细信息”中的某一项，例如 `SQL Server`，以查看\
    \ `SQL Server` 主实例、计算池、数据池和存储池的状态。我们已在 `BDC` 的每个 Pod 中实现了 `活性探针`（ `https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/`\
    \ ），以反馈所有 `BDC` 组件的总体健康状况。您可以在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/manage-with-controller-dashboard`\
    \ 阅读更多关于大数据集群仪表板的信息。\n\n*   **`Grafana` 指标**\n\n    利用此上下文，您可以深入查看由控制器中组件驱动的 `Grafana`（\
    \ `https://grafana.com/` ）仪表板显示的指标。图 10-18 显示了 `SQL Server` 主实例的 `Grafana` 仪表板。\n\
    \n    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg](img/479130_1_En_10_Fig18_HTML.jpg)\n\
    \    图 10-18 `SQL Server 大数据集群` 的 `Grafana` 仪表板\n\n*   **`Kibana` 和 `Elasticsearch`**\n\
    \n    `BDC` 的每个主要组件都有一个 `Grafana` 仪表板和一个 `Kibana`（ `https://en.wikipedia.org/wiki/Kibana`\
    \ ）对 `Elasticsearch`（ `www.elastic.co/` ）的可视化，其中包含用于更深入故障排除和分析的日志。图 10-19 显示了通过\
    \ `ADS` 大数据集群仪表板查看的、来自 `SQL Server` 主实例的 `Elasticsearch` 日志的 `Kibana` 可视化。\n\n\
    \    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg](img/479130_1_En_10_Fig19_HTML.jpg)\n\
    \    图 10-19 `BDC` 日志的 `Kibana` 和 `Elasticsearch`\n\n*   **在 `SQL Server` 中使用\
    \ `azdata`**\n\n    虽然 `Kubernetes` 允许您使用 `kubectl exec` 等命令与容器交互，但 `azdata` 程序允许您使用\
    \ `azdata` 的 `sql` 选项与 `SQL Server` 交互，如 `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-sql`\
    \ 文档所述。这使您可以针对 `SQL Server` 主实例执行 `T-SQL` 命令，并访问 `sqlcmd` “shell”。请记住，`azdata`\
    \ 之于 `BDC`，就如同 `kubectl` 程序之于 `Kubernetes`；您可以在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`\
    \ 查看完整的参考文档。\n\n*   **`Kubernetes (k8s)` 和 `BDC` 故障排除**\n\n    请通读我在第 8 章中对 `k8s`\
    \ 命令的讨论，但我们也在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`\
    \ 的文档中提供了一些提示。别忘了也使用我们的 `SQL Server` 故障排除指南，我在本章前面的“`SQL Server 大数据集群` 的 Jupyter\
    \ 书籍”一节中描述过这些指南。\n\n## 总结\n\n虽然 `SQL Server 2019` 是革命性的，但 `SQL Server 大数据集群` 是\
    \ *颠覆性的*。谁会想到一个有些人认为仅仅是关系数据库引擎的产品，却包含了您自己 *数据湖*、*数据虚拟化* 和一个 *端到端机器学习平台* 的完整解决方案，并且全部构建在\
    \ `Kubernetes` 之上？\n\n想想我们为大数据集群部署的技术：\n\n*   `SQL Server`\n*   `Polybase`\n*\
    \   `HDFS`\n*   `Spark`\n*   `Livy`\n*   `Kibana`\n*   `Elasticsearch`\n*   `Grafana`\n\
    *   `InfluxDB`\n*   `Notebooks`\n*   使用 `R` 和 `Python` 的机器学习\n*   `Java 可扩展性`\n\
    *   `Always On 可用性组`\n\n所有这些都由一个控制平面提供动力，该平面利用我们的“`API Server`”或控制器服务，来部署、管理和驱动构建在\
    \ `Kubernetes` 上的大数据集群。\n\n这是我的观点，但何不听听已经看到此解决方案前景的客户怎么说：\n\n> “构建和部署我们用于临床放射学的垂直\
    \ AI 解决方案需要结合非常多样化的实现范式、数据格式和法规要求。`SQL Server 2019 大数据集群` 让我们能够在一个共享平台上容纳和整合所有方面——既适用于从事深度学习的数据科学家，也适用于连接工作流、安全性和可扩展性的软件工程师。在运行时，我们的医疗客户受益于简化的容器化部署和维护，同时能够轻松地在本地和云之间迁移我们的解决方案。”\
    \ – René Balzano，Balzano 公司创始人兼首席执行官。\n\n此引述来自我们在 `https://cloudblogs.microsoft.com/sqlserver/2019/08/29/sql-server-2019-release-candidate-refresh-with-big-data-clusters/`\
    \ 发布 `SQL Server 2019` 大数据集群候选发布版时发布的博客。我期待更多客户相信大数据集群正是他们推动业务所需的革命性解决方案。\n\n\
    # 11. 客户之声与迁移\n\n我希望当您读到本章时，能够体会到投入到 `SQL Server 2019` 中的惊人创新量。如果您已经阅读了前十章，您可能会有“信息过载”的感觉。过去参加我演讲的几个人都感觉他们的“大脑要融化了”。如果您读到本书此处也有这种感觉，那么我的目标之一就实现了。我希望这本书不仅仅是\
    \ `SQL Server 2019` 的回顾，因为任何人都可以从文档中获得这些信息。我希望这是一次对 `SQL Server 2019` 版本的全面审视。\n\
    \n具备了所有这些解决现代数据挑战的能力，还有什么可谈的吗？嗯，事实上，还有。我将通过讨论我们根据客户反馈构建到 `SQL Server 2019` 中的“一堆功能”（我借用了同事\
    \ Conor Cunningham 的术语）来结束本书。我还将讨论您在迁移到 `SQL Server 2019` 时可以使用的方法、工具和技术。\n"
- fmt: '## The Voice of the Customer


    Everything you have read in this book so far is one way or another influenced
    by our customers. In this section, I’ll show you a collection of enhancements
    for `SQL Server 2019` which came directly from feedback and requests from customers,
    through escalations from Microsoft Support, our own internal testing, or engineering
    interaction directly with customers. If you have never seen the feedback channel
    directly to the product team, you can check it out at `https://aka.ms/sqlfeedback`.
    I’ve provided for you in this section a list of enhancements organized into three
    areas:


    ### Performance


    *   **Performance** – SQL Server database engine performance enhancements designed
    to help all or specific workloads run faster.

    *   **User experience** – These are enhancements to improve how the `SQL Server`
    product is used or configured.

    *   **Diagnostics** – These are enhancements designed to improve troubleshooting
    or diagnosing `SQL Server` problems.


    ### Performance Enhancements


    Our engineering team is always looking to improve performance in the core database
    engine and seeks opportunities through customer observation, Microsoft support
    escalations, and often through investigations using benchmark testing. These experiences
    and observations contributed to the following changes in the core database engine:


    #### Reduced compilations for temporary tables


    One design pattern to use temporary tables is to create the temporary table in
    one *scope* and use it in another. For example, you could create a temporary table
    in a batch and then try to use the temporary table in a stored procedure called
    by the batch. This would normally result in a recompilation of the stored procedure
    that references the temporary table. In `SQL Server 2019`, by default, we are
    able to avoid a recompilation in this scenario. While this improvement may not
    make the workload significantly faster, it can help an overall application use
    `SQL Server`, because lowering the number of recompilations can reduce the overall
    CPU usage of `SQL Server`.


    #### Indirect checkpoint scalability


    Indirect checkpoints are the new default method for database checkpoints, as you
    can read at `https://docs.microsoft.com/en-us/sql/relational-databases/logs/database-checkpoints-sql-server`.
    We discovered through some benchmark testing and customer feedback that heavy
    modification workloads could cause stalls in the `SQL Server` engine, leading
    to a condition called a non-yielding scheduler. We typically only saw these problems
    on larger systems with many CPUs, leading us to believe it was a scalability problem.
    `SQL Server 2019` made improvements in the database engine to avoid this problem.


    #### Concurrent PFS updates


    PFS pages are special pages within a database file that `SQL Server` uses to help
    locate free space when allocating space for an object. (You can read an older
    blog post by Paul Randal when he worked at Microsoft to explain PFS pages at `https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/07/08/under-the-covers-gam-sgam-and-pfs-pages/`.)


    Page latch contention on PFS pages is something that is commonly associated with
    `tempdb`, but it can also occur on user databases when there are many concurrent
    object allocation threads. This improvement changes the way that concurrency is
    managed with PFS updates so that they can be updated under a shared latch, rather
    than an exclusive latch. This behavior is on by default in all databases (including
    `tempdb`) starting with `SQL Server 2019`.


    As customers adopt `SQL Server 2019`, I’m very interested to see the effectiveness
    on `TempDB` concurrency with `TempDB` memory–optimized metadata (discussed in
    Chapter [2](#479130_1_En_2_Chapter.xhtml)) combined with this enhancement.


    #### Worker stealing


    I call this improvement the “Slava special” named after Slava Oks. We have seen
    over the years one weakness of the `SQLOS` scheduler is scheduler contention for
    worker threads. What a cool system `SQLOS` could become if we could dynamically
    change worker threads for a given task to a different scheduler if we detect a
    contention problem. Under the covers, we have begun to implement such a system,
    on a limited scale. `SQL Server` supports the concept of parallel redo for recovery.
    Dong Cao is the lead developer of this work and has blogged about parallel redo
    and the internals of redo on Always On Availability Group secondary replicas at
    `https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/`.
    Dong has implemented the concept of worker stealing behind the scenes, only for
    parallel redo on secondary replicas. If our tests continue to be successful, I
    look for a day when we can implement this change to the core scheduling in `SQLOS`
    across the engine for all types of workloads.'
