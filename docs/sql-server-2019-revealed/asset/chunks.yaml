    \ is no spill detected, or 50% of the granted memory is used.\n\n*   There is\
    \ a fluctuation where the memory grant is being reduced and increased constantly."
  trans: "\n## 过度内存授予\n\n让我们来看一个内存授予量远大于实际需要的例子。正如我之前提到的，如果内存授予非常大且并非实际所需，它可能是无害的——但也可能导致意外的内存压力或性能问题。\n\
    \n这个例子运行起来稍微复杂一些，需要模拟并发用户。因此，对于本例，你需要使用名为 `ostress` 的免费工具，可从 [`ostress 下载页面`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511)\
    \ 下载。该工具目前需要在 Windows 客户端计算机上使用。\n\n要了解此问题如何导致意外的性能问题和 `RESOURCE_SEMAPHORE` 等待，请使用以下步骤。所有脚本均位于\
    \ `ch2_intelligent_performance\\iqp\\rowmodemgf` 目录中。我构建的所有命令行脚本都使用 `sa` 登录名。\n\
    \n1.  首先，我们需要通过运行脚本 `adjustrg.cmd`（该脚本会运行 T-SQL 脚本 `adjustrg.sql`）来调整资源调控器关于服务器最大授予内存量的设置。此脚本假设服务器名称为\
    \ `bwsql2019`，因此你需要根据你的服务器进行编辑。我进行此调整是为了在示例中允许 SQL Server 获取非常大的超额授予。\n\n    ```\n\
    \    ALTER WORKLOAD GROUP [default]\n    WITH (REQUEST_MAX_MEMORY_GRANT_PERCENT\
    \ = 50)\n    GO\n    ALTER RESOURCE GOVERNOR RECONFIGURE\n    GO\n    ```\n\n\
    2.  现在执行脚本 `turn_off_mgf.cmd`（该脚本会执行 T-SQL 脚本 `turn_off_mgf.sql`）。\n\n    ```\n\
    \    -- 关闭内存授予反馈\n    USE [WideWorldImportersDW]\n    GO\n    -- 步骤 2: 模拟统计信息过期\n\
    \    UPDATE STATISTICS Fact.OrderHistory\n    WITH ROWCOUNT = 5000000000\n   \
    \ GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    \    ALTER DATABASE SCOPED CONFIGURATION SET ROW_MODE_MEMORY_GRANT_FEEDBACK =\
    \ OFF\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION SET_BATCH_MODE_MEMORY_GRANT_FEEDBACK\
    \ = OFF\n    GO\n    ```\n\n在此示例脚本中，我将使用与之前低估授予示例类似的技术，但这次将统计信息更改为远大于表中实际行数的数字。\n\
    \n### 注意\n\n多年来，我见过几个基数估计值看起来大于应有值的例子。其中一个例子是链接服务器查询，无法访问远程数据源的统计信息。在这些情况下，基数估计可能不准确且异常大。\n\
    \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig9_HTML.jpg](img/479130_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9: 过度内存授予的属性\n\n1.  现在运行脚本 `rowmode_mgf.cmd`，该脚本将运行 T-SQL 脚本 `rowmode_mgf.sql`。\n\
    \n    ```\n    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\n  \
    \  FROM  Fact.OrderHistory AS fo\n    INNER JOIN Dimension.[Stock Item] AS si\n\
    \    ON fo.[Stock Item Key] = si.[Stock Item Key]\n    WHERE fo.[Lineage Key]\
    \ = 9\n    AND si.[Lead Time Days] > 19\n    ORDER BY fo.[Order Key], fo.Description,\
    \ si.[Lead Time Days]\n    OPTION (MAXDOP 1)\n    GO\n    ```\n\n    此查询与之前的低估内存授予示例类似，但增加了\
    \ `ORDER BY` 子句以添加一个排序运算符。\n\n    该命令行脚本将使用 `ostress` 运行此 T-SQL 查询，并发用户数为十，每个用户重复十次。在此脚本运行时，使用另一个\
    \ SQL 会话运行脚本 `dm_exec_requests.sql` 来观察查询可能遇到的等待类型。你会注意到大量的 `RESOURCE_SEMAPHORE`\
    \ 等待。你可以在整个 `ostress` 脚本运行期间重复运行此脚本。这些等待解释了 `ostress` 脚本执行时间长的原因。\n\n    此 `ostress`\
    \ 脚本的总执行时间应超过 40 秒。脚本完成后，你的输出应如下所示：\n\n    ```\n     [0x000046CC] OSTRESS exiting\
    \ normally, elapsed time: 00:00:43.833\n     [0x000046CC] RsFx I/O completion\
    \ thread ended.\n    ```\n\n2.  使用 `rowmode_mgf.sql` 执行单个查询，并在 SQL Server Management\
    \ Studio 中查看查询计划的内存授予属性。使用与本章前面部分相同的技术来查看计划中 `SELECT` 操作符的属性。展开 `MemoryGrantInfo`\
    \ 部分。结果应与图 2-9 相似。\n\n以下是对关键属性的描述：\n\n`DesiredMemory` – 这是基于基数估计的理想内存授予量。这个数字大约在\
    \ ~56Gb 左右。这真是个疯狂的数量！\n\n`GrantedMemory` – 我们不能让这个查询拥有 56Gb 内存，所以我们只授予它大约 5Gb。这仍然是一个相当大的授予内存量。\n\
    \n`MaxUsedMemory` – 这是查询期间实际用于授予的内存，你可以看到只有 3Mb。这无疑是一个过度内存授予（与实际所需相比）的例子。\n\n\
    1.  现在，通过执行命令脚本 `turn_on_mgf.cmd`（该脚本会运行 T-SQL 脚本 `turn_on_mgf.sql`）来打开内存授予反馈。\n\
    \n2.  让我们再次运行工作负载，执行 `rowmode_mgf.cmd`。执行时间应缩短一半（通常在 20 秒左右）。如果在 `ostress` 脚本运行时运行\
    \ `dm_exec_requests.sql`，你会看到短暂的 `RESOURCE_SEMAPHORE` 等待峰值，然后它就会消失，因为内存授予反馈已生效，并减少了内存授予的大小，使其更符合查询的实际需要。\n\
    \n### 提示\n\n尝试第二次运行 `rowmode_mgf.cmd`。它是否更快？实际上现在可能会运行得稍快一些。这是因为当你第一次运行 `rowmode_mgf.cmd`\
    \ 时，查询的最初执行非常快，缓存的计划尚未用新的授予进行更新。但随着后续执行的进行，它们使用了新的授予。当你第二次运行 `rowmode_mgf.cmd`\
    \ 时，所有查询都在使用新的内存授予。\n\n1.  如果你查看 `rowmode_mgf.sql` 的内存授予中 `SELECT` 操作符的属性，你会看到内存授予数字更接近查询应该使用的数值。\n\
    \n2.  通过运行脚本 `adjustrgback.cmd` 和 `restore_orderhistory_state.cmd` 来恢复数据库状态、表统计信息和资源调控器设置。\n\
    \n### 注意\n\n即使有反馈系统，在某些情况下，实际需要的内存授予量也可能非常大。大到并发用户将遇到 `RESOURCE_SEMAPHORE` 等待，导致\
    \ SQL Server 内部出现内存压力。在这些情况下，你可以使用资源调控器来限制授予的内存量。有关如何更改此设置，请参阅文档 [`CREATE WORKLOAD\
    \ GROUP`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-workload-group-transact-sql)。在\
    \ SQL Server 2019 中，此值现在可以是浮点数，因此小于 1% 的值是有效的。这对于具有大量内存的系统可能很重要。此外，你可以在查询级别设置这些值。请参阅文档\
    \ [`查询提示 (Transact-SQL) 参数`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query%2523arguments)。\n\
    \n这个系统设计得很好，确实可以为你节省对需要内存授予的工作负载进行昂贵调优的时间。\n\n有几种情况不会启用或不会生效内存授予反馈：\n\n*   未检测到溢出，或使用了\
    \ 50% 的授予内存。\n*   存在波动，其中内存授予被持续减少和增加。\n"
- fmt: "### Table Variable Deferred Compilation\n\n当你已经在微软工作了26年，你会遇到很多人。我遇到的很多人中，有比我更聪明的，坦率地说，也比我更友善。Jack\
    \ Li 就是其中之一。Jack 曾在德克萨斯州欧文市的办公室与我一起在 CSS 技术支持部门共事多年。几年前，在我加入之后，Jack 有机会进入 SQL\
    \ 工程团队工作。有一天，他一如既往地谦逊地问我是否应该接受这份工作。我毫不犹豫。我告诉他，他具备成为顶尖开发人员的所有技能，并且在 SQL Server\
    \ 性能方面拥有独特的技能。尽管 CSS 失去了他们最优秀的员工之一，但我们的工程团队因此获益。\n\nJack 在新工作中接手的第一个项目就是解决表变量的著名问题——**基数估计**。自从表变量存在以来，就一直存在一个固有问题：无论向表变量中填充了多少行，SQL\
    \ Server 优化器的基数估计始终是 1 行。诚实地讲，优化器不知道表变量中实际有多少行，因为表变量是在批处理或存储过程中定义和填充的。事实上，当 Jack\
    \ 还在支持部门时，他写过一篇关于此问题和跟踪标志解决方案的博客：[`https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/`](https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/)。\n\
    \n这意味着，当 Jack 加入团队时，他非常了解这个问题。查询处理器团队的领导有一个想法，希望将其作为智能查询处理的一部分在 SQL Server 2019\
    \ 中实现，即*表变量延迟编译*。他们找到 Jack 来构建它。\n\n正如 SQL Server 文档在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523table-variable-deferred-compilation)\
    \ 中恰当描述的那样：“表变量延迟编译将引用表变量的语句的编译推迟到该语句第一次实际运行时。这种延迟编译行为与临时表相同。此更改导致使用实际基数，而不是原始的\
    \ 1 行猜测值。”\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql%253F%2523table-variable-deferred-compilation)\
    \ 阅读有关如何启用和禁用表变量延迟编译的示例，包括数据库选项和查询提示。\n\n本节所有的示例脚本可以在 `ch2_intelligent_performance\\\
    iqp\\tablevariable` 找到。\n\n让我们通过一个 T-SQL 笔记本（注意：你也可以从文件 `iqp_tablevariable.sql`\
    \ 查看此功能的 T-SQL 脚本）来逐步了解这个概念。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg)\n\
    *图 2-11 表变量使用的查询计划*\n\n1.  使用 Azure Data Studio 打开名为 `iqp_tablevariable.ipynb`\
    \ 的 T-SQL 笔记本。\n2.  按照笔记本中的每个步骤，比较使用和不使用延迟编译时表变量的性能。\n3.  要比较这两种场景的查询计划，我们可以使用一个称为**查询存储**的功能，它在\
    \ SQL Server 2016 中引入。你可能没有意识到，但当你还原 WideWorldImportersDW 备份时，该数据库已经启用了查询存储。\n\
    4.  以下是使用查询存储比较两个查询的方法：一个使用表变量延迟编译，一个不使用。\n5.  打开 SSMS，连接到你运行笔记本示例的 SQL Server，并找到“资源消耗最高的查询”报告，如图\
    \ [2-10](#479130_1_En_2_Chapter.xhtml#Fig10) 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg)\n\
    *图 2-10 查询存储的“资源消耗最高的查询”报告*\n\n6.  图 [2-10](#479130_1_En_2_Chapter.xhtml#Fig10)\
    \ 中的报告展示了运行之前行模式内存授权反馈示例以及本节表变量示例之后的查询存储数据。根据你运行过的内容，你的视图可能看起来略有不同。图表中的每个条形代表一个唯一的查询，因此你需要找到与表变量示例相关的查询。如果你点击每个条形，查询文本会列在下方。如果你查看笔记本中此示例的存储过程查询，它类似于这样：\n\
    \    ```sql\n    SELECT top 10 oh.[Order Key], oh.[Order Date Key],oh.[Unit Price],\
    \ o.Quantity\n    FROM Fact.OrderHistoryExtended AS oh\n    INNER JOIN @Order\
    \ AS o\n    ON o.[Order Key] = oh.[Order Key]\n    WHERE oh.[Unit Price] > 0.10\n\
    \    ORDER BY oh.[Unit Price] DESC\n    ```\n7.  点击图表中的每个条形，直到看到这个查询。注意右侧的两个点，它们代表此查询的两个查询计划。当你点击时，报告的输出应如图\
    \ [2-11](#479130_1_En_2_Chapter.xhtml#Fig11) 所示。\n图表中点的“高度”越高，表示该查询计划的平均持续时间越长。如果你点击每个点，可以在底部窗口中看到查询计划的视觉变化。\n\
    \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig12_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig12_HTML.jpg)\n\
    *图 2-12 较慢查询计划的平均持续时间*\n\n1.  将光标悬停在顶部的点上，以查看该查询计划的执行统计信息。查看如图 [2-12](#479130_1_En_2_Chapter.xhtml#Fig12)\
    \ 所示的平均持续时间等统计信息。\n如果你点击该点并在底部窗格中查看查询计划，将鼠标悬停在 Table Scan 运算符上。注意其估计值为 1，如图 [2-13](#479130_1_En_2_Chapter.xhtml#Fig13)\
    \ 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg)\n\
    *图 2-13 表变量的估计行数为 1*\n\n注意表变量与 OrderHistoryExtended 表的联接。它使用了一个 Nested Loops Join（嵌套循环联接）。优化器做出这个选择是有道理的，因为它*认为*表变量只有\
    \ 1 行。问题在于表变量有大约 300 万行！对如此多的行使用 Nested Loops Join 将非常昂贵且不合理。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg)\n\
    *图 2-14 较快查询计划的平均持续时间*\n\n1.  现在点击显示查询计划窗口中“较低”的点。将鼠标指针悬停在该点上以查看平均持续时间。它应该类似于图\
    \ [2-14](#479130_1_En_2_Chapter.xhtml#Fig14)。\n2.5 秒的平均值远好于 25 秒。\n现在查看查询计划。将鼠标指针移到\
    \ Table Scan 运算符上。注意估计值现在是准确的，而且，既然需要进行表扫描，使用批处理模式是有意义的。这是同时使用多个智能查询处理功能的一个例子。此运算符的详细信息应如图\
    \ [2-15](#479130_1_En_2_Chapter.xhtml#Fig15) 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg)\n\
    *图 2-15 使用表变量时更好的估计值*\n\n现在查看表变量与 OrderHistoryExtended 表的联接。现在使用了一个 Hash Join（哈希联接），同时也对\
    \ OrderHistoryExtended 表进行了表扫描。"
  raw: "### Table Variable Deferred Compilation\n\nWhen you have been at Microsoft\
    \ for 26 years, you meet a lot of people. There are so many folks I’ve met who\
    \ are smarter than me and, quite frankly, nicer than me. One of those people is\
    \ Jack Li. Jack worked in CSS Technical Support with me for many years in our\
    \ office in Irving, Texas. A few years back, Jack had an opportunity to work in\
    \ the SQL Engineering team after I had joined. One day he humbly (as he always\
    \ does) asked me whether I thought he should take the job. I didn’t hesitate.\
    \ I told him he had all the skills to be a top-notch developer and has a unique\
    \ skill in SQL Server performance. Even though CSS lost one of their best, our\
    \ engineering team gained from it.\n\nAnd the first project Jack worked on in\
    \ his new job was to tackle the famous problem of cardinality estimation for table\
    \ variables. As long as table variables have been around, they have the inherent\
    \ problem that the cardinality estimation by the SQL Server optimizer is always\
    \ one row, no matter how many rows are populated into the table variable. The\
    \ honest truth is that the optimizer doesn’t know how many rows are actually in\
    \ a table variable, since they are defined and typically populated as part of\
    \ a batch or stored procedure. In fact, when Jack was in support, he blogged about\
    \ this problem and trace flag solution to help at [`https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/`](https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/)\
    \ .\n\nThis means that, when Jack joined the team, he well understood this problem.\
    \ The leadership of the Query Processor team had an idea they wanted to implement\
    \ in SQL Server 2019 as part of Intelligent Query Processing called *table variable\
    \ deferred compilation* . They turned to Jack to build it.\n\nAs aptly described\
    \ by the SQL Server documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523table-variable-deferred-compilation)\
    \ , “Table variable deferred compilation defers compilation of a statement that\
    \ references a table variable until the first actual run of the statement. This\
    \ deferred compilation behavior is the same as that of temporary tables. This\
    \ change results in the use of actual cardinality instead of the original one-row\
    \ guess.”\n\nYou can read examples of how to enable and disable table variable\
    \ deferred compilation, including database options and query hints, at [`https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql%253F%2523table-variable-deferred-compilation)\
    \ .\n\nAll the example scripts for this section can be found at **ch2_intelligent_performance\\\
    iqp\\tablevariable.**\n\nLet’s walk through an example of this concept using a\
    \ T-SQL notebook (Note: You can also walk through a T-SQL script of this capability\
    \ from the file **iqp_tablevariable.sql**).\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11\n\nQuery plans for table variable use\n\n1.  Open the T-SQL notebook\
    \ with Azure Data Studio called **iqp_tablevariable.ipynb.**\n\n2.  Go through\
    \ each step in the notebook to compare performance of using table variables with\
    \ and without deferred compilation.\n\n3.  To compare query plans for these two\
    \ scenarios, we can use a feature called Query Store, which was introduced in\
    \ SQL Server 2016\\. You may not have realized, but when you restored the WideWorldImportersDW\
    \ backup, the database already had Query Store enabled.\n\n4.  Here is how to\
    \ use Query Store to compare the two queries: one using table variable deferred\
    \ compilation and one not.\n\n5.  Open up SSMS, connect to the SQL Server where\
    \ you ran the notebook examples, and find the Top Resource Consuming Queries report,\
    \ as seen in Figure [2-10](#479130_1_En_2_Chapter.xhtml#Fig10).\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10\n\nQuery Store Top Resource Consuming Query report\n\n6.  The report\
    \ in Figure [2-10](#479130_1_En_2_Chapter.xhtml#Fig10) shows Query Store data\
    \ after running the previous example of row mode memory grant feedback and the\
    \ table variable examples in this section. Your view may look slightly different\
    \ depending on what you have run. Each bar in the graph represents a unique query,\
    \ so you need to find the query associated with the table variable example. If\
    \ you click each bar, the query text is listed below. If you looked at the query\
    \ in the stored procedure for this example in the notebook, it has a query like\
    \ this:\n\n```\n    SELECT top 10 oh.[Order Key], oh.[Order Date Key],oh.[Unit\
    \ Price], o.Quantity\n    FROM Fact.OrderHistoryExtended AS oh\n    INNER JOIN\
    \ @Order AS o\n    ON o.[Order Key] = oh.[Order Key]\n    WHERE oh.[Unit Price]\
    \ > 0.10\n    ORDER BY oh.[Unit Price] DESC\n    ```\n\n7.  Click each bar in\
    \ the graph until you see this query. Notice the two dots on the right, which\
    \ represent the two query plans for this query. When you do, the output of the\
    \ report should look like Figure [2-11](#479130_1_En_2_Chapter.xhtml#Fig11).\n\
    \nThe “higher” the dot in the chart, the longer the average duration was for that\
    \ query plan. If you click each dot, you can see the query plan visual change\
    \ in the bottom window.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig12_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12\n\nAvg duration of the slower query plan\n\n1.  Move your cursor\
    \ over the top dot to see execution statistics of the query plan. See statistics\
    \ like the average duration like in Figure [2-12](#479130_1_En_2_Chapter.xhtml#Fig12).\n\
    \nIf you click the dot and look at the query plan in the bottom pane, hover over\
    \ the Table Scan operator. Notice the estimate of 1 as seen in Figure [2-13](#479130_1_En_2_Chapter.xhtml#Fig13).\n\
    \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13\n\nEstimate of one row for a table variable\n\nNotice the join of\
    \ the table variable and the OrderHistoryExtended table. It uses a Nested Loops\
    \ Join. This makes sense for the optimizer to make this choice since it *thinks*\
    \ the table variable has only one row. The problem is the table variable has ~3M\
    \ rows! Using a Nested Loops Join for that many rows would be very expensive and\
    \ not make sense.\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14\n\nAverage duration of faster query plan\n\n1.  Now click the “lower”\
    \ dot in the window showing query plans. Move your mouse pointer over the dot\
    \ to see the average duration. It should look something like Figure [2-14](#479130_1_En_2_Chapter.xhtml#Fig14).\n\
    \nAn average of 2.5 seconds is far better than 25 seconds.\n\nNow look at the\
    \ query plan. Move your mouse pointer to the Table Scan operator. Notice the estimates\
    \ are now accurate, and, since a table scan is needed, using batch mode makes\
    \ sense. This is an example of multiple Intelligent Query Processing features\
    \ being used at the same time. The details of this operator should look like Figure\
    \ [2-15](#479130_1_En_2_Chapter.xhtml#Fig15).\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15\n\nBetter estimates for using a table variable\n\nNow look at the\
    \ join of the table variable and the OrderHistoryExtended table. A hash join is\
    \ now used, and a table scan of the OrderHistoryExtended table is also used."
  trans: "\n### 表变量延迟编译\n\n当你在微软工作了 26 年，你会遇到很多人。我遇到的很多人中，有比我更聪明的，坦率地说，也比我更友善。Jack\
    \ Li 就是其中之一。Jack 曾在德克萨斯州欧文市的办公室与我一起在 CSS 技术支持部门共事多年。几年前，在我加入之后，Jack 有机会进入 SQL\
    \ 工程团队工作。有一天，他一如既往地谦逊地问我是否应该接受这份工作。我毫不犹豫。我告诉他，他具备成为顶尖开发人员的所有技能，并且在 SQL Server\
    \ 性能方面拥有独特的技能。尽管 CSS 失去了他们最优秀的员工之一，但我们的工程团队因此获益。\n\nJack 在新工作中接手的第一个项目就是解决表变量的著名问题——**基数估计**。自从表变量存在以来，就一直存在一个固有问题：无论向表变量中填充了多少行，SQL\
    \ Server 优化器的基数估计始终是 1 行。诚实地讲，优化器不知道表变量中实际有多少行，因为表变量是在批处理或存储过程中定义和填充的。事实上，当 Jack\
    \ 还在支持部门时，他写过一篇关于此问题和跟踪标志解决方案的博客：[`https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/`](https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/)。\n\
    \n这意味着，当 Jack 加入团队时，他非常了解这个问题。查询处理器团队的领导有一个想法，希望将其作为智能查询处理的一部分在 SQL Server 2019\
    \ 中实现，即*表变量延迟编译*。他们找到 Jack 来构建它。\n\n正如 SQL Server 文档在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523table-variable-deferred-compilation)\
    \ 中恰当描述的那样：“表变量延迟编译将引用表变量的语句的编译推迟到该语句第一次实际运行时。这种延迟编译行为与临时表相同。此更改导致使用实际基数，而不是原始的\
    \ 1 行猜测值。”\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql%253F%2523table-variable-deferred-compilation)\
    \ 阅读有关如何启用和禁用表变量延迟编译的示例，包括数据库选项和查询提示。\n\n本节所有的示例脚本可以在 `ch2_intelligent_performance\\\
    iqp\\tablevariable` 找到。\n\n让我们通过一个 T-SQL 笔记本（注意：你也可以从文件 `iqp_tablevariable.sql`\
    \ 查看此功能的 T-SQL 脚本）来逐步了解这个概念。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg](img/479130_1_En_2_Fig11_HTML.jpg)\n\
    *图 2-11 表变量使用的查询计划*\n\n1.  使用 Azure Data Studio 打开名为 `iqp_tablevariable.ipynb`\
    \ 的 T-SQL 笔记本。\n2.  按照笔记本中的每个步骤，比较使用和不使用延迟编译时表变量的性能。\n3.  要比较这两种场景的查询计划，我们可以使用一个称为**查询存储**的功能，它在\
    \ SQL Server 2016 中引入。你可能没有意识到，但当你还原 WideWorldImportersDW 备份时，该数据库已经启用了查询存储。\n\
    4.  以下是使用查询存储比较两个查询的方法：一个使用表变量延迟编译，一个不使用。\n5.  打开 SSMS，连接到你运行笔记本示例的 SQL Server，并找到“资源消耗最高的查询”报告，如图\
    \ 2-10 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg](img/479130_1_En_2_Fig10_HTML.jpg)\n\
    *图 2-10 查询存储的“资源消耗最高的查询”报告*\n\n6.  图 2-10 中的报告展示了运行之前行模式内存授权反馈示例以及本节表变量示例之后的查询存储数据。根据你运行过的内容，你的视图可能看起来略有不同。图表中的每个条形代表一个唯一的查询，因此你需要找到与表变量示例相关的查询。如果你点击每个条形，查询文本会列在下方。如果你查看笔记本中此示例的存储过程查询，它类似于这样：\n\
    \    ```sql\n    SELECT top 10 oh.[Order Key], oh.[Order Date Key],oh.[Unit Price],\
    \ o.Quantity\n    FROM Fact.OrderHistoryExtended AS oh\n    INNER JOIN @Order\
    \ AS o\n    ON o.[Order Key] = oh.[Order Key]\n    WHERE oh.[Unit Price] > 0.10\n\
    \    ORDER BY oh.[Unit Price] DESC\n    ```\n7.  点击图表中的每个条形，直到看到这个查询。注意右侧的两个点，它们代表此查询的两个查询计划。当你点击时，报告的输出应如图\
    \ 2-11 所示。\n图表中点的“高度”越高，表示该查询计划的平均持续时间越长。如果你点击每个点，可以在底部窗口中看到查询计划的视觉变化。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig12_HTML.jpg](img/479130_1_En_2_Fig12_HTML.jpg)\n\
    *图 2-12 较慢查询计划的平均持续时间*\n\n8.  将光标悬停在顶部的点上，以查看该查询计划的执行统计信息。查看如图 2-12 所示的平均持续时间等统计信息。\n\
    如果你点击该点并在底部窗格中查看查询计划，将鼠标悬停在 Table Scan 运算符上。注意其估计值为 1，如图 2-13 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg](img/479130_1_En_2_Fig13_HTML.jpg)\n\
    *图 2-13 表变量的估计行数为 1*\n\n注意表变量与 OrderHistoryExtended 表的联接。它使用了一个 Nested Loops Join（嵌套循环联接）。优化器做出这个选择是有道理的，因为它*认为*表变量只有\
    \ 1 行。问题在于表变量有大约 300 万行！对如此多的行使用 Nested Loops Join 将非常昂贵且不合理。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg](img/479130_1_En_2_Fig14_HTML.jpg)\n\
    *图 2-14 较快查询计划的平均持续时间*\n\n9.  现在点击显示查询计划窗口中“较低”的点。将鼠标指针悬停在该点上以查看平均持续时间。它应该类似于图\
    \ 2-14。\n2.5 秒的平均值远好于 25 秒。\n现在查看查询计划。将鼠标指针移到 Table Scan 运算符上。注意估计值现在是准确的，而且，既然需要进行表扫描，使用批处理模式是有意义的。这是同时使用多个智能查询处理功能的一个例子。此运算符的详细信息应如图\
    \ 2-15 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg](img/479130_1_En_2_Fig15_HTML.jpg)\n\
    *图 2-15 使用表变量时更好的估计值*\n\n现在查看表变量与 OrderHistoryExtended 表的联接。现在使用了一个 Hash Join（哈希联接），同时也对\
    \ OrderHistoryExtended 表进行了表扫描。\n"
- fmt: '### Batch Mode on Rowstore


    SQL Server 2012 添加了一项巧妙（说得太轻了！）、如今非常著名的能力，称为**Columnstore Indexes**，该项目代号 Apollo。原始博客见
    [`https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/`](https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/)。作为交付此功能的一部分，查询处理器得到增强，可与
    Columnstore 索引一起使用行的 **批处理模式**。在此之前，计划操作符（如扫描）执行和处理数据是基于单个行（以及整行）。批处理模式提供了一种新的范式，允许操作符基于按列组织并包含向量以标识合格行的行批来处理数据。这个概念与
    Columnstore 索引非常契合，因为 Columnstore 索引是按列而非按行组织的。


    虽然 Columnstore 索引对于需要扫描和处理大量行的分析查询工作负载非常有帮助，但它可能不符合您的需求，或者可能存在限制阻止您使用它。此外，您可能有一些符合“分析工作负载”场景的查询。换句话说，您并非试图查询单行或仅几行（许多人认为这是正常的“OLTP
    场景”）。任何未使用 Columnstore 索引组织的表或索引都被恰当地命名为**行存储**。


    在 SQL Server 2019 中，查询处理器可以自动检测您的查询是否符合在行存储上进行批处理模式处理的条件。同样，批处理模式可能并不适用于所有查询，因此必须满足一些基本条件。例如，您的查询需要处理*大量*行，并涉及需要聚合（例如
    `count(∗)` 或 `sum()`）、连接或排序的操作。换句话说，当大量行在多个操作符之间流动以执行查询时，批处理才有意义。多少算大量？我们没有在文档中说明具体数字（因为将来可能会改变），但阈值通常是
    128K 行。


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#batch-mode-on-rowstore`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523batch-mode-on-rowstore)
    阅读有关行存储上批处理模式的所有详细信息，包括启用和禁用此功能。该文档文章详细介绍了此功能的背景，包括哪些工作负载会受益，以及限制和约束。


    ### Tip


    您是否想真正深入这个主题？那么您会喜欢 SQL 社区专家 Dima Pilugin 的博客文章，他调试了神奇的 128K 数字。您可以在此处阅读该博客：[`www.queryprocessor.com/batch-mode-on-row-store/`](http://www.queryprocessor.com/batch-mode-on-row-store/)。


    使用您在本章开始时恢复并扩展的 `WideWorldImportersDW` 数据库，让我们看一个示例，其中行存储的批处理模式可以加速查询性能。所有脚本示例请使用目录
    **ch2_intelligent_performance\iqp\batchmoderow**。


    您可以从提供的示例脚本 **iqp_batchmoderow.sql** 或从 T-SQL 笔记本 **iqp_batchmoderow.ipynb** 运行以下查询。


    无论采用哪种方法，让我们一步一步来。对于本节，我鼓励您尝试 T-SQL 笔记本示例。您可以使用 `iqp_batchmoderow.sql` 和任何 SQL
    工具，但您需要在图形工具（如 SSMS 或 Azure Data Studio）中分析查询计划（或详细阅读计划 XML）。


    打开连接到 SQL Server 2019 实例的 Azure Data Studio，并打开 **iqp_batchmoderow.ipynb** 笔记本。


    笔记本的一个美妙之处在于每个步骤和单元格的文档都在笔记本本身中。而且，保存在本书 GitHub 仓库下的笔记本已经包含了所有答案，因此您知道可以期待什么！


    我甚至放入了使用 Azure Data Studio 的查询计划差异图像示例以及您应该期望看到的内容。


    阅读并遵循笔记本的每个步骤。您将看到行存储上的批处理模式可以显著提高性能，尤其是在处理大型数据集表时。此外，批处理模式现在同时适用于列存储（在 SQL Server
    2017 中实现）和行存储，因此您无需担心。查询处理器知道何时使用它以及如何帮助提升查询性能。


    作为完整性检查，图 [2-16](#479130_1_En_2_Chapter.xhtml#Fig16) 显示了加载后此示例笔记本顶部的样子。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg)


    图 2-16


    用于演示行存储上批处理模式的 T-SQL 笔记本


    ### Scalar UDF Inlining


    SQL Server 很久以前就有一个称为用户定义函数的概念。这个概念是您在 `FUNCTION` 中构建一些 T-SQL 代码，该函数接受一个或多个参数，并返回一个值。然后您可以在任何
    T-SQL `SELECT` 语句中使用该函数。这是一种像存储过程一样的代码重用流行方式，但函数具有作为 `SELECT` 语句*一部分*的良好特性。


    ### Note


    用户定义函数还有其他用途，您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql)
    阅读更多信息。


    用户定义函数有两种类型：


    *   标量，返回单个值

    *   表值，以 `TABLE` 类型的形式返回结果集


    尽管 UDF 很流行且具有编程优势，但它们的使用可能会导致性能问题，因为它们在编译和集成到整个查询计划中的方式存在限制。例如，任何时候使用标量 UDF 作为列列表的一部分来返回值，作为所访问表一部分的每一行都会被应用到
    UDF 的代码中，*一次一行*。查询处理器在处理 UDF 时还有其他限制，在某些情况下，这从性能角度来看使它们效率非常低。


    现在出现了标量 UDF **内联**。查询处理器可以获取代码（UDF 可能包含多个 T-SQL 语句），并能够将这些语句与整个查询集成，因此称为内联。


    您可以通过使用 `dbcompat` 在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#enabling-scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523enabling-scalar-udf-inlining)
    文档中阅读如何启用标量 UDF 内联。


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#disabling-scalar-udf-inlining-without-changing-the-compatibility-level`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523disabling-scalar-udf-inlining-without-changing-the-compatibility-level)
    阅读有关如何在不更改 `dbcompat` 的情况下禁用和启用标量 UDF 内联的更多信息。


    与所有这些智能查询处理场景一样，最好看一个示例。所有脚本示例请使用目录 **ch2_intelligent_performance\iqp\scalarinlineudf**。


    与本章中的其他示例一样，您有两种方式来体验标量 UDF 内联。您可以使用 **iqp_scalarudfinlining.pynb** T-SQL 笔记本或使用一组
    T-SQL 脚本。'
  raw: '### Batch Mode on Rowstore


    SQL Server 2012 added a nifty (what an understatement!), now famous capability
    called **Columnstore Indexes** , through Project Apollo. See the original blog
    at [`https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/`](https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/)
    . As a part of delivering this feature, the query processor was enhanced to use
    *batch mode* processing of rows with columnstore indexes. Up to this time, plan
    operators, like scans, execute and process data based on a single row (and the
    entire row). Batch mode provides a new paradigm to allow operators to process
    data based on batches of rows that are organized by column and include vectors
    to identify qualify rows. This concept aligns very well with columnstore indexes,
    which are organized by columns, not rows.


    While columnstore indexes are very helpful for analytic query workloads where
    scanning and processing large number of rows is common, columnstore indexes may
    not fit your needs or may have restrictions preventing you from using them. Furthermore,
    you may have queries that fit the “analytic workload” scenario. In other words,
    you are not trying to query a single row or just a few rows (which many consider
    the normal “OLTP scenario”). Any table or index that is not organized with a columnstore
    index is aptly named a **rowstore**.


    In SQL Server 2019, the query processor can automatically detect whether your
    query qualifies for batch mode processing on a rowstore. Batch mode, again, may
    not make sense for all queries, so a few basics must apply. For example, your
    query needs to process a *large* number of rows and involve operations that require
    aggregates (think count(∗) or sum(), joins, or sorts). In other words, batches
    make sense when there is a flow of data between several operators of a large number
    of rows to execute a query. What is large? We don’t document the number (because
    it may make sense to change this in the future), but the threshold is generally
    128K rows.


    You can read all the details of batch mode on rowstore, including enabling and
    disabling this capability, at [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#batch-mode-on-rowstore`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523batch-mode-on-rowstore)
    . This documentation article has many details on the background of this capability,
    including which workloads will benefit, as well as limits and restrictions.


    ### Tip


    Do you want to really go deep on this topic? Then you will love the blog post
    by SQL Community Expert, Dima Pilugin, who debugged the magical 128K number. You
    can read this blog at [`www.queryprocessor.com/batch-mode-on-row-store/`](http://www.queryprocessor.com/batch-mode-on-row-store/)
    .


    Using the WideWorldImportersDW database that you restored and extended in the
    beginning of this chapter, let’s look at an example where batch mode for rowstore
    can accelerate query performance. Use the directory **ch2_intelligent_performance\iqp\batchmoderow**
    for all script examples.


    You can run the following queries from the provided example script **iqp_batchmoderow.sql**
    or from the T-SQL notebook **iqp_batchmoderow.ipynb**.


    Based on either method, let’s go step by step. For this section, I encourage you
    to try the T-SQL notebook example. You can use iqp_batchmoderow.sql with any SQL
    tool, but you will need to analyze the query plans in a graphical tool like SSMS
    or Azure Data Studio (or read the plan XML in detail).


    Open Azure Data Studio connected to your SQL Server 2019 instance and open the
    **iqp_batchmoderow.ipynb** notebook.


    One of the beautiful aspects of notebooks is that the documentation for each step
    and cells are in the notebook itself. And, the notebooks that were saved under
    the GitHub repo for the book have all the answers already, so you know what to
    expect!


    I’ve even put in image examples of query plan differences using Azure Data Studio
    and what you should expect to see.


    Read and follow each step of the notebook. You will see that Batch Mode on Rowstore
    can have a significant performance difference, especially when dealing with tables
    of large datasets. Additionally, Batch Mode now works for both columnstore (implemented
    in SQL Server 2017) and rowstore, so you shouldn’t need to worry about it. The
    query processor knows when to use it and how it can help boost performance of
    your query.


    For a sanity check, Figure [2-16](#479130_1_En_2_Chapter.xhtml#Fig16) shows what
    the notebook for this example looks like at the top when loaded.


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg](images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    A T-SQL notebook to demonstrate Batch Mode on Rowstore


    ### Scalar UDF Inlining


    SQL Server has long had a concept called a user-defined function (UDF). The concept
    is that you build some T-SQL code inside a FUNCTION that takes one or more parameters,
    and this function returns a value. You could then use the function in any T-SQL
    SELECT statement. It is a popular way for code reuse like a stored procedure,
    but a function has the nice property of *being part* of the SELECT statement.


    ### Note


    There are other uses for user-defined functions, which you can read more about
    at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql)
    .


    There are two types of user-defined functions:


    *   Scalar, which returns a single value


    *   Table-valued, which returns a result set in the form of a TABLE type


    Despite the popularity and programming advantages of UDFs, their use can lead
    to performance problems because of the limitations in how they are compiled and
    integrated into the overall query plan. For example, any time a scalar UDF is
    used to return a value as part of a list of columns, each row that is part of
    the table being accessed is applied to the code in the UDF *one row at a time*.
    There are other limitations in how the query processor treats UDFs that in some
    situations just makes them very inefficient from a performance point of view.


    Now comes along scalar UDF *inlining*. The query processor can take the code (a
    UDF could have multiple T-SQL statements) and is able to integrate those statements
    with the overall query, hence the term inlining.


    You can read how to enable scalar UDF inlining by using dbcompat in the documentation
    at [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#enabling-scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523enabling-scalar-udf-inlining)
    .


    You can read more about how to disable and enable scalar UDF inlining without
    changing dbcompat at [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#disabling-scalar-udf-inlining-without-changing-the-compatibility-level`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523disabling-scalar-udf-inlining-without-changing-the-compatibility-level)
    .


    As with all of these Intelligent Query Processing scenarios, it is best to see
    an example. Use the directory **ch2_intelligent_performance\iqp\scalarinlineudf**
    for all script examples.


    As with the other examples in this chapter, you have two ways to go through scalar
    UDF inlining. You can use the **iqp_scalarudfinlining.pynb** T-SQL notebook or
    use a set of T-SQL scripts.'
  trans: '

    ### 行存储上的批处理模式


    SQL Server 2012 添加了一项巧妙（说得太轻了！）、如今非常著名的能力，称为**列存储索引**，该项目代号 Apollo。原始博客见 [`https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/`](https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/)。作为交付此功能的一部分，查询处理器得到增强，可与列存储索引一起使用行的**批处理模式**。在此之前，计划操作符（如扫描）执行和处理数据是基于单个行（以及整行）。批处理模式提供了一种新的范式，允许操作符基于按列组织并包含向量以标识合格行的行批来处理数据。这个概念与列存储索引非常契合，因为列存储索引是按列而非按行组织的。


    虽然列存储索引对于需要扫描和处理大量行的分析查询工作负载非常有帮助，但它可能不符合您的需求，或者可能存在限制阻止您使用它。此外，您可能有一些符合“分析工作负载”场景的查询。换句话说，您并非试图查询单行或仅几行（许多人认为这是正常的“OLTP
    场景”）。任何未使用列存储索引组织的表或索引都被恰当地命名为**行存储**。


    在 SQL Server 2019 中，查询处理器可以自动检测您的查询是否符合在行存储上进行批处理模式处理的条件。同样，批处理模式可能并不适用于所有查询，因此必须满足一些基本条件。例如，您的查询需要处理*大量*行，并涉及需要聚合（例如
    `count(∗)` 或 `sum()`）、连接或排序的操作。换句话说，当大量行在多个操作符之间流动以执行查询时，批处理才有意义。多少算大量？我们没有在文档中说明具体数字（因为将来可能会改变），但阈值通常是
    128K 行。


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#batch-mode-on-rowstore`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523batch-mode-on-rowstore)
    阅读有关行存储上批处理模式的所有详细信息，包括启用和禁用此功能。该文档文章详细介绍了此功能的背景，包括哪些工作负载会受益，以及限制和约束。


    ### 提示


    您是否想真正深入这个主题？那么您会喜欢 SQL 社区专家 Dima Pilugin 的博客文章，他调试了神奇的 128K 数字。您可以在此处阅读该博客：[`www.queryprocessor.com/batch-mode-on-row-store/`](http://www.queryprocessor.com/batch-mode-on-row-store/)。


    使用您在本章开始时恢复并扩展的 `WideWorldImportersDW` 数据库，让我们看一个示例，其中行存储的批处理模式可以加速查询性能。所有脚本示例请使用目录
    **ch2_intelligent_performance\iqp\batchmoderow**。


    您可以从提供的示例脚本 **iqp_batchmoderow.sql** 或从 T-SQL 笔记本 **iqp_batchmoderow.ipynb** 运行以下查询。


    无论采用哪种方法，让我们一步一步来。对于本节，我鼓励您尝试 T-SQL 笔记本示例。您可以使用 `iqp_batchmoderow.sql` 和任何 SQL
    工具，但您需要在图形工具（如 SSMS 或 Azure Data Studio）中分析查询计划（或详细阅读计划 XML）。


    打开连接到 SQL Server 2019 实例的 Azure Data Studio，并打开 **iqp_batchmoderow.ipynb** 笔记本。


    笔记本的一个美妙之处在于每个步骤和单元格的文档都在笔记本本身中。而且，保存在本书 GitHub 仓库下的笔记本已经包含了所有答案，因此您知道可以期待什么！


    我甚至放入了使用 Azure Data Studio 的查询计划差异图像示例以及您应该期望看到的内容。


    阅读并遵循笔记本的每个步骤。您将看到行存储上的批处理模式可以显著提高性能，尤其是在处理大型数据集表时。此外，批处理模式现在同时适用于列存储（在 SQL Server
    2017 中实现）和行存储，因此您无需担心。查询处理器知道何时使用它以及如何帮助提升查询性能。


    作为完整性检查，图 2-16 显示了加载后此示例笔记本顶部的样子。


    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg](img/479130_1_En_2_Fig16_HTML.jpg)


    图 2-16


    用于演示行存储上批处理模式的 T-SQL 笔记本


    ### 标量 UDF 内联


    SQL Server 很久以前就有一个称为用户定义函数的概念。这个概念是您在 `FUNCTION` 中构建一些 T-SQL 代码，该函数接受一个或多个参数，并返回一个值。然后您可以在任何
    T-SQL `SELECT` 语句中使用该函数。这是一种像存储过程一样的代码重用流行方式，但函数具有作为 `SELECT` 语句*一部分*的良好特性。


    ### 注意


    用户定义函数还有其他用途，您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql)
    阅读更多信息。


    用户定义函数有两种类型：


    *   标量，返回单个值

    *   表值，以 `TABLE` 类型的形式返回结果集


    尽管 UDF 很流行且具有编程优势，但它们的使用可能会导致性能问题，因为它们在编译和集成到整个查询计划中的方式存在限制。例如，任何时候使用标量 UDF 作为列列表的一部分来返回值，作为所访问表一部分的每一行都会被应用到
    UDF 的代码中，*一次一行*。查询处理器在处理 UDF 时还有其他限制，在某些情况下，这从性能角度来看使它们效率非常低。


    现在出现了标量 UDF **内联**。查询处理器可以获取代码（UDF 可能包含多个 T-SQL 语句），并能够将这些语句与整个查询集成，因此称为内联。


    您可以通过使用 `dbcompat` 在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#enabling-scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523enabling-scalar-udf-inlining)
    文档中阅读如何启用标量 UDF 内联。


    您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#disabling-scalar-udf-inlining-without-changing-the-compatibility-level`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523disabling-scalar-udf-inlining-without-changing-the-compatibility-level)
    阅读有关如何在不更改 `dbcompat` 的情况下禁用和启用标量 UDF 内联的更多信息。


    与所有这些智能查询处理场景一样，最好看一个示例。所有脚本示例请使用目录 **ch2_intelligent_performance\iqp\scalarinlineudf**。


    与本章中的其他示例一样，您有两种方式来体验标量 UDF 内联。您可以使用 **iqp_scalarudfinlining.pynb** T-SQL 笔记本或使用一组
    T-SQL 脚本。

