  trans: '### 在 Azure 虚拟机中运行


    当你决定部署或迁移到 `SQL Server 2019` 时，你可能需要考虑在云端使用 `SQL Server 2019`。在云端运行 `SQL Server
    2019` 的一个选择是使用 `Azure 虚拟机`（这被称为基础设施即服务或 `IAAS` 环境）。


    `Azure 虚拟机 (VM)` 允许你专注于操作系统（`Windows` 或 `Linux`）和 `SQL Server` 的部署，而无需担心硬件平台和基础设施。


    `Azure VM` 被认为是将 `SQL Server` 迁移到云端阻力最小的方法之一，因为你与 `SQL Server` 的交互就像操作数据中心或你本地环境中的虚拟机一样。


    实际上，这并非 100% 正确，因为你必须做出一些特定于 `Azure` 的选择，包括机器大小、存储、网络和安全性。我们在文档中提供了关于所有这些选择的指南，地址是
    [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview)。


    我们还提供了你可能不知道的、与 `Azure 虚拟机` 相关的自动化功能。这包括 `SQL Server` 的自动备份以及操作系统和 `SQL Server`
    的自动修补。你可以通过以下链接阅读关于自动备份（[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2)）和自动修补（[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching)）的信息。


    在 2019 年夏天，我们宣布了在 `Azure` 中的三项重要更新，它们有助于管理 `Azure 虚拟机` 中的 `SQL Server`：


    *   一个新的 `Azure` 门户体验，名为 `Azure SQL`，它简化了在云端创建和管理与 `SQL Server` 相关的资产。


    图 11-6 展示了新的 `Azure SQL` 门户体验。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig6_HTML.jpg](img/479130_1_En_11_Fig6_HTML.jpg)


    图 11-6

    `Azure SQL` 门户体验


    *   一种通过我们的资源提供程序 `注册你的 Azure 虚拟机 (VM) 和 SQL Server` 的方法。此注册适用于你在 `Azure 虚拟机`
    中安装 `SQL Server` 而非使用库映像的场景。它能解锁你 `Azure VM` 中的 `SQL Server`，以便利用 `Azure 混合权益`、合规性、自动备份和自动修补。你可以通过此链接阅读更多关于此功能的信息：[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider)。


    *   `Azure` 宣布了 `超磁盘存储` 或 `Ultra SSD` 的正式发布。`Ultra SSD` 在云端提供了低延迟、极快的性能，这与 `I/O`
    密集型的 `SQL Server` 工作负载非常匹配。你可以通过此链接阅读关于 `Ultra SSD` 的公告：[`https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/`](https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/)。如果你想看到
    `Ultra 磁盘存储` 在 `SQL Server` 中的实际应用，请查看 2018 年 `Microsoft Ignite` 会议的此段录像：[`https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/`](https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/)。如果你从录像的第
    46 分钟左右看起，当演示者展示 `Ultra 磁盘存储` 的 `SQL Server` 性能时，你可能会认出他。


    ### SQL Server 迁移助手


    阅读本书的你们中，有些人可能并未使用 `SQL Server`，或者在你的组织中还有其他用于诸如 `Oracle`、`mySQL` 和 `DB2` 等数据库产品的资产。我在第
    9 章介绍了如何使用 `Polybase` 访问这些数据源。但是，如果你想将数据库和应用程序从这些产品迁移到 `SQL Server` 怎么办呢？


    我们提供了一个免费工具来帮助你从其他“第三方”数据库解决方案迁移到 `SQL Server`（和 `Azure`）。这个工具叫做 `SQL Server 迁移助手`。图
    11-3 的右侧展示了使用此工具的可能性。你可以通过此链接阅读更多关于此工具的信息，包括如何部署它以及如何成功用于迁移：[`https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant)。


    图 11-7 展示了使用 `SSMS` 从 `Oracle` 进行迁移的屏幕截图。


    ![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg](img/479130_1_En_11_Fig7_HTML.jpg)


    图 11-7

    使用 `SSMS` 从 `Oracle` 迁移到 `SQL Server`


    `SSMA` 作为一系列工具提供，每种工具对应一种支持迁移的第三方产品类型。与 `DMA` 和 `DEA` 类似，`SSMS` 也有一个命令行界面 (`CLI`)。你可以通过此链接阅读更多关于
    `SSMA` 针对 `Oracle` 的语法：[`https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`](https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql)。


    ## 总结


    在本章中，我展示了基于客户反馈以及我们与客户直接合作的经验而对 `SQL Server 2019` 进行的众多增强。其中每一项可能看起来都不是重大增强，但它们共同代表了提升
    `SQL Server` 性能、用户体验和诊断能力的关键创新。


    我还讨论了如何规划和执行向 `SQL Server 2019` 的迁移，包括工具、策略以及利用数据库兼容性来实现功能和性能保护。


    本章标志着我们在这本书中与 `SQL Server 2019` 的共同旅程的结束。我希望你喜欢阅读和了解 `SQL Server 2019`，就像我享受撰写它的过程一样。对你们中的许多人来说，这将是你们与
    `SQL Server 2019` 旅程的真正开始。对我来说，你们将继续听到我谈论 `SQL Server 2019`。但我也将展望未来，关注我们的下一个版本、我们在云端的快速工作节奏，以及使
    `SQL Server` 成为行业中真正独特产品的下一波创新。


