  trans: '

    ## 扩展 T-SQL 语言


    2018 年夏末，我在华盛顿州雷德蒙德的微软公司总部，准备制作一份演示文稿，以协助在 Microsoft Ignite 大会上正式发布 SQL Server
    2019 的预览版。为此，我采访了多位项目经理以确保内容准确，并与他们讨论演示的构建。


    其中一位项目经理是内莉·古斯塔夫森。内莉是 SQL Server 机器学习服务的首席项目经理之一。当时，我一直在与内莉讨论团队为 SQL Server 2019
    的 ML 服务还考虑支持哪些其他语言。在我们的会议中，她告诉我 `Java` 将是下一个语言，这让我感到意外。她进一步说明：团队希望通过一个 SDK（软件开发包）来开放
    ML 服务的架构。这样，任何具备足够技术知识的人都可以*自带语言*，使用与 SQL Server ML 服务中运行 R 和 Python 相同的架构来扩展
    T-SQL。


    然而，在发布 SQL Server 2019 的 CTP 2.0 时，我们决定暂缓推出 SDK，仅将 Java 作为 SQL Server ML 服务的第三种语言发布。Java
    并非机器学习领域的常用语言，因此我们发布此功能时，附带的示例主要演示了如何为 T-SQL 扩展语言本身未内置的功能（公平地说，我们当时也使用 Java 来演示大数据集群上的机器学习）。


    其概念与 SQL Server ML 服务相同。你将使用相同的 `sp_execute_external_script` 系统存储过程，但指定 “Java”
    作为语言并提供一个编译好的 Java 类。尽管这还不是完整的可扩展开放架构，但将 Java 与 SQL Server 2019 集成，已经让许多人对微软更激进的工作方向有所领悟。


    ### 可扩展框架


    到我们发布 SQL Server 2019 时，我们已决定*开放* ML 服务的架构。我们称之为*可扩展框架*。访问可扩展框架的方式是通过一种称为*语言扩展*的机制。Java
    将仅仅是使用这个新框架的一个*示例*，我们会将该语言扩展随产品一起提供。


    为了使可扩展框架可行，我们必须对现有的 SQL Server ML 服务架构进行补充，包括：


    *   我们需要保持 R 和 Python “原样”，因此这些语言被视为“内置”于 SQL Server。R 和 Python 不被视为语言扩展，它们只是作为
    SQL Server ML 服务的一部分。

    *   启动板服务中用于 R 和 Python 的“启动器”专门用于启动 `rterm.exe` 和 `python.exe`。`bxlserver.exe`
    的设计初衷也是专门与 R 和 Python 配合工作。我们在启动板服务器内构建了一个“通用”启动器，用于启动任何语言（你将看到这与 `CREATE EXTERNAL
    LANGUAGE` 概念相关联）。

    *   我们需要一个新的“宿主”程序来运行其他语言。因此，我们提供了一个名为 `扩展宿主` 的宿主程序。在 Windows 上，此程序称为 `exthost.exe`。

    *   `扩展宿主` 必须包含 `sqlsatellite.dll`（在 Linux 上为 `sqlsatellite.so`），并为语言扩展提供一种与之交互以与
    SQL Server 交换数据的方式。


    图 5-8 展示了 Windows 上此架构的粗略示意图（Linux 架构图也包含在内），来源于 [`https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework`](https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework)。


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig8_HTML.jpg](img/479130_1_En_5_Fig8_HTML.jpg)


    图 5-8：Windows 上外部语言的可扩展架构


    现在，借助 SQL Server 2019 中的这些增强功能，你可以：


    *   使用 `sp_execute_external_script` 来运行用于机器学习程序的 R 或 Python 脚本。

    *   通过安装语言扩展，使用 `sp_execute_external_script` 用 Java 等其他语言扩展 T-SQL。在 SQL Server
    2019 中，我们提供了所有使用 Java 扩展 T-SQL 所需的软件。


    需要明确的是，语言扩展（在 Windows 上是 DLL，在 Linux 上是共享对象库 `.so`，通常用 C++ 编写）是支持语言扩展的关键软件。微软在你安装
    SQL Server 时提供了 Java 的语言扩展。由于该语言扩展是为 Java 构建的，它将加载一个 Java 虚拟机（`JVM`）来运行你的 Java
    类。如何让 `JVM` 来运行这些类呢？你将在下一节中了解。


    此外，你还需要一个与你的语言原生的 SDK 库。正如你将在下一节读到的，微软为 Java 提供了一个 SDK 库。该 SDK 将实现一组已知的类和方法，以便你的类可以被执行，并且你可以与
    SQL Server 交换数据。


    ### 用 Java 扩展 T-SQL


    你可能要问的一个问题是：扩展 T-SQL 语言的实例是什么？使用 R 和 Python 进行机器学习是有道理的，因为 T-SQL 没有内置的机器学习函数或能力。那么，为什么你可能需要
    Java 呢？你听说过正则表达式或 regex 这个术语吗（[`https://en.wikipedia.org/wiki/Regular_expression`](https://en.wikipedia.org/wiki/Regular_expression)）？正则表达式完全基于表达式在字符串或字符数据中搜索模式。一个正则表达式可以非常强大——比
    `LIKE` 子句和其他 T-SQL 字符串函数强大得多。


    由于 T-SQL 中没有内置完整的正则表达式功能，你可以构建一个支持正则表达式的 Java 类，并使用可扩展框架和 SQL Server 2019 附带的
    Java 扩展将其集成到 T-SQL 中。因为该框架允许语言扩展以一种独特的方式与 SQL Server 交换数据，所以你可以结合 `sp_execute_external_script`
    使用一个 Java 类，基于 T-SQL 查询对数据应用正则表达式。


    实际上，这就是文档中提供的教程所演示的内容，详见 [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java)。


    我不提供逐步示例，而是鼓励你亲自完成这个教程。我在 Windows 上完成了这个教程，它在 Linux 上同样运行良好。我有一些提示以及一些我用来完成它的脚本。


    本教程将向你展示：


    *   创建一个数据库和示例数据。

    *   创建一个 Java 类来实现正则表达式引擎。

    *   构建你的代码，以便可以使用 SQL Server Java SDK 将其安装到 SQL Server。

    *   创建一个外部语言和库以启用 Java 并安装你的代码。该外部语言将映射到语言扩展 DLL 或 `.so` 文件。外部库将是 SQL Server Java
    SDK 和你的代码。

    *   使用 `sp_execute_external_script` 调用你的 Java 类。


    从技术上讲，你可以在与 SQL Server 不同的计算机上构建你的代码。但如果这样做，你将需要 SQL Server Java SDK，它被称为 `mssql-java-lang-extension.jar`（适用于
    Windows 和 Linux）。获取该 SDK 的一种方法是安装带有 Java 可扩展功能的 SQL Server。因此，我建议你在安装 SQL Server
    的同一台计算机上运行此教程。你也可以在例如你的笔记本电脑上，使用 SQL Server 开发者版进行构建，然后将代码的最终结果（将是一个 `.jar` 文件）安装到生产
    SQL Server 上。

    '
- fmt: "### Note\n\nAt the time of the writing of this book, we had published a GitHub\
    \ repo at [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)\
    \ for language extensions, including the SQL Server Java SDK. But the `mssql-java-lang-extension.jar`\
    \ file was not available. The plan is to make the SDK available on GitHub so you\
    \ can build your own Java class independent of a SQL Server installation.\n\n\
    #### Prerequisites for the Tutorial\n\nThe prerequisites to use the tutorial are\
    \ called out in the documentation at [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java#prerequisites`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java%2523prerequisites).\n\
    \nOne of the steps for the prerequisites is to install a Java Runtime Engine (JRE).\
    \ Here is more radical stuff for you. In SQL Server 2019, we ship a JRE from the\
    \ Zulu Open JRE. That’s right. `SQL Server 2019 ships Java for free`!\n\nHere\
    \ is what the install screen looks like on Windows to choose your JRE (Figure\
    \ 5-9).\n\n![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig9_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9: Choosing a JRE for SQL Server\n\n#### Note on JRE and Installation\n\
    \nEven though Zulu Open JRE is free and shipped with SQL Server, it is fully supported\
    \ by Microsoft. You also have the option to install your own JRE. If you install\
    \ your own JRE, there are some additional steps for configuration, which the installation\
    \ documentation calls out.\n\nDon’t forget to properly set the `JRE_HOME` environment\
    \ variable on Windows and restart the Launchpad service after you install SQL\
    \ Server. You can read more about this at [`https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows#add-the-jre_home-variable`](https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows%2523add-the-jre_home-variable).\
    \ (For Linux, it is `JAVA_HOME`, but the install process should have added this\
    \ for you.) Note the tutorial mentions an example of `C:\\Program Files\\Zulu\\\
    zulu-8\\jre\\` when in fact SQL Server installs the Azul Open JRE at `C:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\AZUL-OpenJDK-JRE`.\n\nAs part\
    \ of the installation process, Microsoft will also install the Java language extension\
    \ file. For Windows, it is called `javaextension.dll` and packaged in a file called\
    \ `java-lang-extension.zip`. On Linux, it is called `javaextension.so` and packaged\
    \ in a file called `java-lang-extension.tar.gz`. The tutorial shows you the location\
    \ for these files, as you will need this path to create an external language.\n\
    \nNow you can go through the tutorial to create a database and data, build your\
    \ Java class, install an external language, install your code, and then call your\
    \ Java class.\n\n#### Tips for the Tutorial\n\nHere are some tips for using the\
    \ tutorial. I have provided a set of sample scripts I used in the `ch5_modern_development_platform\\\
    java` directory.\n\n*   **Picking a JDK to compile your code**\n\n    The tutorial\
    \ shows you example code for a regex class and the instructions for including\
    \ the SQL Server Java SDK. Unfortunately, the tutorial doesn’t give a lot of details\
    \ about how to build something in Java. I installed the Zulu Open JDK to get my\
    \ Java compiler, `javac`, to use with this tutorial from [`www.azul.com/downloads/zulu-community`](https://www.azul.com/downloads/zulu-community).\
    \ Since I was on Windows, I chose these options as seen in Figure 5-10.\n\n  \
    \  ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig10_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig10_HTML.jpg)\n\
    \n    Figure 5-10: Installing the Zulu JDK for Windows\n\n    You may already\
    \ have a Java SDK for your computer. You could be using Visual Studio Code, IntelliJ,\
    \ or Eclipse, which are some of the more popular ones. I just wanted a simple\
    \ way to compile my Java code from the command line, so I picked the Zulu JDK.\n\
    \n    The Zulu JDK comes as a zip file, and I pulled this into my Downloads folder.\
    \ I then extracted the zip file into the current directory. I wanted `javac` and\
    \ the `jar` program in my path, so I extracted the zip file in place and added\
    \ this directory to my system path, `C:\\Users\\Administrator\\Downloads\\zulu11.33.15-ca-jdk11.0.4-win_x64\\\
    zulu11.33.15-ca-jdk11.0.4-win_x64\\bin`.\n\n*   **Building your code**\n\n   \
    \ I recommend following the instructions in the tutorial to build a `.jar` file\
    \ for your code but use the package concept. Using this method will assume a subdirectory\
    \ of `pkg` for your class. I’ve provided a `buildclass.cmd` script I used that\
    \ does it all. It will compile the `RegexSample.java` code along with the SQL\
    \ Server Java SDK file `mssql-java-lang-extension.jar`. Then it uses the `jar`\
    \ program to build a package from the code in the `pkg` subdirectory. (The tutorial\
    \ example uses a package which will assume a `pkg` subdirectory when you build\
    \ the `.jar` file.) The result of the entire build process is a `sqlregex.jar`\
    \ file. This is your class code and will be installed as an `external library`.\n\
    \n*   **Installing your code**\n\n    The T-SQL script `setuplanguage.sql` is\
    \ used on Windows to create an external language for Java and to create two external\
    \ libraries: (1) for the SQL Server Java SDK and (2) your code.\n\n    It is important\
    \ to note that external language and libraries are installed in a user database.\n\
    \n*   **Executing your code**\n\n    The T-SQL script `sqlregex.sql` shows an\
    \ example like in the tutorial to execute your Java class.\n\n    I will be transparent\
    \ to you that if you miss a step here, including all the prerequisites, you will\
    \ hit an error executing `sp_execute_external_script`. It can be frustrating to\
    \ debug problems with this feature.\n\n    Here are a few things to remember:\n\
    \n    *   You have to enable external script execution with the configuration\
    \ option `external scripts enabled`.\n    *   If you pick the Zulu Open JRE during\
    \ install, make sure to set `JRE_HOME` if using Windows and restart the Launchpad\
    \ service.\n    *   If you use your own JRE, you have extra steps to perform for\
    \ permissions to the JRE binaries. The documentation shows how to do this on Windows\
    \ and Linux.\n    *   When you build your `.jar` file for your code, you must\
    \ put the compiled code (the `.class` file) in the subdirectory where you are\
    \ building the code called `pkg`. That is the convention for using a package name\
    \ (the package name could be anything in your code, and then your subdir needs\
    \ to match that name). The docs talk about how much easier it is with a Java IDE\
    \ to do all of this; I did try out IntelliJ and Visual Studio Code; I just preferred\
    \ a scriptable method from the command line with `javac` and `jar`."
  raw: '### Note


    At the time of the writing of this book, we had published a GitHub repo at [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)
    for language extensions, including the SQL Server Java SDK. But the mssql-java-lang-extension.jar
    file was not available. The plan is to make the SDK available on GitHub so you
    can build your own Java class independent of a SQL Server installation.


    #### Prerequisites for the Tutorial


    The prerequisites to use the tutorial are called out in the documentation at [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java#prerequisites`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java%2523prerequisites)
    .


    One of the steps for the prerequisites is to install a Java Runtime Engine (JRE).
    Here is more radical stuff for you. In SQL Server 2019, we ship a JRE from the
    Zulu Open JRE. That’s right. **SQL Server 2019 ships Java for free**!


    Here is what the install screen looks like on Windows to choose your JRE (Figure
    [5-9](#479130_1_En_5_Chapter.xhtml#Fig9)).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig9_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Choosing a JRE for SQL Server


    ### Note


    Even though Zulu Open JRE is free and shipped with SQL Server, it is fully supported
    by Microsoft. You also have the option to install your own JRE. If you install
    your own JRE, there are some additional steps for configuration, which the installation
    documentation calls out.


    Don’t forget to properly set the JRE_HOME environment variable on Windows and
    restart the Launchpad service after you install SQL Server. You can read more
    about this at [`https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows#add-the-jre_home-variable`](https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows%2523add-the-jre_home-variable)
    . (For Linux, it is JAVA_HOME, but the install process should have added this
    for you.) Note the tutorial mentions an example of C:\Program Files\Zulu\zulu-8\jre\
    when in fact SQL Server installs the Azul Open JRE at C:\Program Files\Microsoft
    SQL Server\MSSQL15.MSSQLSERVER\AZUL-OpenJDK-JRE.


    As part of the installation process, Microsoft will also install the Java language
    extension file. For Windows, it is called **javaextension.dll** and packaged in
    a file called **java-lang-extension.zip**. On Linux, it is called **javaextension.so**
    and packaged in a file called **java-lang-extension.tar.gz.** The tutorial shows
    you the location for these files, as you will need this path to create an external
    language.


    Now you can go through the tutorial to create a database and data, build your
    Java class, install an external language, install your code, and then call your
    Java class.


    #### Tips for the Tutorial


    Here are some tips for using the tutorial. I have provided a set of sample scripts
    I used in the **ch5_modern_development_platform\java** directory.


    *   **Picking a JDK to compile your code**


    The tutorial shows you example code for a regex class and the instructions for
    including the SQL Server Java SDK. Unfortunately, the tutorial doesn’t give a
    lot of details about how to build something in Java. I installed the Zulu Open
    JDK to get my Java compiler, javac, to use with this tutorial from [`www.azul.com/downloads/zulu-community`](https://www.azul.com/downloads/zulu-community)
    . Since I was on Windows, I chose these options as seen in Figure [5-10](#479130_1_En_5_Chapter.xhtml#Fig10).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig10_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Installing the Zulu JDK for Windows


    You may already have a Java SDK for your computer. You could be using Visual Studio
    Code, IntelliJ, or Eclipse, which are some of the more popular ones. I just wanted
    a simple way to compile my Java code from the command line, so I picked the Zulu
    JDK.


    The Zulu JDK comes as a zip file, and I pulled this into my Downloads folder.
    I then extracted the zip file into the current directory. I wanted javac and the
    jar program in my path, so I extracted the zip file in place and added this directory
    to my system path, C:\Users\Administrator\Downloads\zulu11.33.15-ca-jdk11.0.4-win_x64\zulu11.33.15-ca-jdk11.0.4-win_x64\bin.


    *   **Building your code**


    I recommend following the instructions in the tutorial to build a .jar file for
    your code but use the package concept. Using this method will assume a subdirectory
    of pkg for your class. I’ve provided a **buildclass.cmd** script I used that does
    it all. It will compile the RegexSample.java code along with the SQL Server Java
    SDK file mssql-java-lang-extension.jar. Then it uses the jar program to build
    a package from the code in the pkg subdirectory. (The tutorial example uses a
    package which will assume a pkg subdirectory when you build the .jar file.) The
    result of the entire build process is a **sqlregex.jar** file. This is your class
    code and will be installed as an **external library**.


    *   **Installing your code**


    The T-SQL script **setuplanguage.sql** is used on Windows to create an external
    language for Java and to create two external libraries: (1) for the SQL Server
    Java SDK and (2) your code.


    It is important to note that external language and libraries are installed in
    a user database.


    *   **Executing your code**


    The T-SQL script **sqlregex.sql** shows an example like in the tutorial to execute
    your Java class.


    I will be transparent to you that if you miss a step here, including all the prerequisites,
    you will hit an error executing sp_execute_external_script. It can be frustrating
    to debug problems with this feature.


    Here are a few things to remember:


    *   You have to enable external script execution with the configuration option
    *external scripts enabled*.


    *   If you pick the Zulu Open JRE during install, make sure to set JRE_HOME if
    using Windows and restart the Launchpad service.


    *   If you use your own JRE, you have extra steps to perform for permissions to
    the JRE binaries. The documentation shows how to do this on Windows and Linux.


    *   When you build your .jar file for your code, you must put the compiled code
    (the .class file) in the subdirectory where you are building the code called pkg.
    That is the convention for using a package name (the package name could be anything
    in your code, and then your subdir needs to match that name). The docs talk about
    how much easier it is with a Java IDE to do all of this; I did try out IntelliJ
    and Visual Studio Code; I just preferred a scriptable method from the command
    line with javac and jar.'
