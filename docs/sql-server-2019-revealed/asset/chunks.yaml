  trans: '

    # 7. SQL Server 容器内部探秘


    ## 概要


    SQL Server on Linux 的核心在于提供**兼容的选择**。在 SQL Server 2017 中，用于 Linux 的核心数据库引擎与 Windows
    上的 SQL Server 保持兼容。到了 SQL Server 2019，我们进一步增强了引擎边缘能力的特性支持，包括 `复制`、`变更数据捕获`、`分布式事务`、`机器学习服务`
    和 `语言扩展`，以及 `Polybase`。


    此外，我们还改进了与 Linux 平台的集成，支持最新的 Linux 发行版，通过增强的 I/O 性能提高了持久性，增加了持久内存支持，并明确了如何使用 `OpenLDAP`
    提供程序来配置 `Active Directory` 身份验证。


    SQL Server on Linux 的故事是强有力的。2019 年 5 月，我受邀参加红帽峰会，不仅作为听众，还与几位同事一起（其中一次是与红帽联合演讲）讲述
    SQL Server on Linux 的故事。我也曾参加过 2018 年的红帽峰会，当 2019 年的活动结束时，我不再觉得 Microsoft SQL
    Server 是“新来的”。我感到我们现在已成为 Linux 生态系统和社区的主流组成部分。


    ## 为何选择 SQL Server 容器？


    当我构思本章内容时，曾考虑只介绍 SQL Server 2019 在容器方面的新特性。虽然仅此内容就足以成章，但我决定扩大范围，更全面地探讨容器的概念、为何将其作为部署
    SQL Server 的新方式很重要，当然还有 SQL Server 2019 为容器带来的新功能。关于容器我可以写一整本书，因此你读完本章后不会对该主题有详尽无遗的了解。有许多关于容器的优秀资源（我发现
    [`www.docker.com`](http://www.docker.com) 仍然很有价值！）可以作为本章的补充。我本章的目标是为你提供足够的信息，让你了解
    SQL Server 容器的工作原理以及为何应考虑使用它们。我保证，读完本章你将懂得如何部署、管理和使用 SQL Server 容器。


    如果你觉得自己对容器的概念已经相当熟悉，欢迎直接跳转到“SQL Server 2019 的新特性”一节。该节之后是一系列示例，你会发现它们对深入探索容器非常有价值。我应该说，即使你了解容器的基础知识，也可能需要从“SQL
    Server 容器如何工作”一节开始阅读，特别是“SQL Server 容器”小节，因为我将揭示 SQL Server 使用容器时一些独特方面的内部机制。


    容器解决了虚拟机目前无法应对的一项挑战。虚拟机是一项将应用程序与底层硬件*抽象分离*的卓越技术，但它需要为你的应用程序加载并运行一整套操作系统。虚拟机确实允许应用程序在主机上彼此隔离运行，对于
    SQL Server 而言，这一直是整合场景的一个很好的解决方案（尽管 SQL Server 本身也支持在同一台计算机上托管多个实例）。容器提供了相同的概念隔离，但它们比使用虚拟机**轻量得多**。容器通常被视为对操作系统的一种抽象。


    在我描述容器时，请记住一个重要概念：容器**并非取代**虚拟机，而是对虚拟机的**补充**。事实上，运行容器最常见的环境之一就是在虚拟机内部。让我先定义*容器镜像*，再给出容器的定义。容器镜像是一个二进制文件，描述了按文件系统组织的一组文件以及要从这些文件运行的
    `程序`。而*容器*则是在**隔离方式**下运行容器镜像程序以及该镜像文件系统的一个实例。


    请看下面图 7-1 中我常用来讨论容器是什么以及为何能解决现代应用某些挑战的示意图。


    ![图 7-1：SQL Server 容器的承诺](img/479130_1_En_7_Fig1_HTML.jpg)


    让我从图的左侧开始解读这张图：


    **可移植性**


    容器具有可移植性，因为容器镜像可以在任何能运行 `docker` 的地方运行，这几乎无处不在，包括 Windows、Linux 和 macOS 计算机，或是支持这些操作系统的云系统，亦或是
    `Kubernetes`（你将在第 8 章了解更多关于 `Kubernetes` 的内容）。你可以将 SQL Server 容器镜像作为二进制文件“拉取”到上述任何系统中，它都能以相同方式运行。


    ### 注意


    所有 macOS 用户请注意。请查看我撰写的以下博文，了解如何无需任何 Windows 软件即可运行 SQL Server 及其工具！[`https://bobsql.com/take-the-sql-server-mac-challenge/`](https://bobsql.com/take-the-sql-server-mac-challenge/)


    **轻量级**


    容器是容器镜像的运行实例，它本质上只是一个基于程序、以隔离方式运行的进程。这使得它比运行一整套虚拟机来托管一个程序要**轻量得多**。容器的足迹也得到了优化，因为如果你从一个镜像运行多个容器，镜像文件的一部分（称为
    `可读` 层，我将在本章后面解释）会在容器之间共享。这将减少在同一台主机或虚拟机上运行多个 SQL Server 实例所需的占用空间和资源。

    '
- fmt: '### Note


    SQL Server on Linux does not support multiple instances, but you can achieve the
    same solution using containers.


    `Consistent`


    This is one of the aspects about containers I absolutely love, and it helps solve
    a big challenge for SQL Server. For years, companies have set up `development`
    servers with SQL Server to host a test and development playground for developers.
    This causes major pain as so many developers using the same SQL Server (and they
    usually need a higher level of access for SQL Server) can result in inconsistencies
    and major pains for folks like database administrators.


    Containers provide a consistent way for developers to use SQL Server without having
    to share a SQL Server instance. For example, if you want all developers to use
    a specific image of a SQL Server version along with a specific database, you can
    build a container image to achieve this. And because containers are portable and
    SQL Server now supports Linux, you can give the same SQL Server container image
    for developers that are using different platforms. Your macOS developers can use
    the same SQL Server image as your Windows developers. Now that is a consistent
    story! The symbol in the bottom left-hand corner of the figure for `DevOps` simply
    describes how important the container story is to support a DevOps model.


    `Efficient`


    Containers provide a new and quite frankly mind-opening experience for updating
    software like SQL Server. If you have ever had to apply a cumulative update or
    patch for SQL Server, you will find the container experience amazing. You will
    experience less downtime and a faster experience to roll back updates should that
    be needed.


    In Figure [7-1](#479130_1_En_7_Chapter.xhtml#Fig1) on the right side, the diagram
    shows a picture of how this works. The container in the middle which is “grayed”
    out represents a SQL Server container that is stopped. The container on the left
    is a new version of SQL Server that is started but pointed to the same system
    and user databases which are stored in `persisted storage` (in a concept called
    a volume which I’ll explain later in this chapter). This is a technique I’ll show
    you later in this chapter I call “switching” containers to apply or roll back
    a cumulative update of SQL Server.


    While you are looking at the diagram, I want to call out the following observations:


    *   The black boxes that say `Bin/libs` represent the minimum binaries required
    to run SQL Server. This represents the “lightweight” aspect of a container vs.
    an entire virtual machine. And what is not really represented in the diagram is
    that if the containers are from the same image, these files are shared across
    containers.

    *   The box that says `Docker` represents the docker software that is used to
    run and manage containers. In reality this should say Container Runtime as Docker
    is just an example of a container runtime.

    *   Notice the arrows that point down *through* Docker to the `Host OS` . Docker
    is not a layer in between a container and the host operating system. In other
    words, SQL Server doesn’t have to communicate through some layer to execute kernel
    OS operations. This is why containers are also considered more lightweight because
    they have a program that talks directly to the host OS. The unique aspect of container
    execution is that they run in isolation from each other, hence the term container.


    With these fundamentals of container in mind, let’s spend time learning how containers
    work. Understanding how things work often allows you to use things more efficiently.


    ## How SQL Server Containers Work


    Before you begin your journey of trying out SQL Server containers, let me spend
    time explaining how they work. To first explain how they work, I need to spend
    some time talking about `container hosting`, the magic behind docker, and the
    `container lifecycle`.


    ### Container Hosting


    I just finished the last section talking about how containers are really programs
    that work directly with the host operating system. The host operating system could
    be in a virtual machine or directly with a host `bare metal` computer.


    Given the program interacts directly with the host operating system like any program
    on the system (except of course they run in a special isolated manner), they must
    be compiled and executed to run on the host operating system.


    When we shipped SQL Server 2017 on Linux, we also introduced SQL Server container
    images based on Linux, namely, Ubuntu Linux. Almost every container image in the
    world is based on a host operating system, and most of them are based on Linux.
    For Linux host systems, running a SQL Server container based on Linux is no problem.
    Whether the Linux system is a bare metal computer or a virtual machine, SQL Server
    Linux containers are a natural fit.


    What about Windows and macOS? Docker as a container runtime is the key. Docker
    supports containers running on Windows through a program called Docker Desktop
    for Windows. Any container based on a Linux image will be run in the context of
    a Virtual Machine that runs Linux called `DockerDesktopVM` . Docker Desktop for
    macOS uses a concept called HyperKit ( [`https://github.com/moby/hyperkit`](https://github.com/moby/hyperkit)
    ). You can read more about Docker Desktop at [`www.docker.com/products/docker-desktop`](https://www.docker.com/products/docker-desktop)
    .


    Recently, there have been some advances in containers with Docker for Windows
    to support a concept called Linux Containers for Windows (LCOW). The Windows team
    describes this concept as a lighter method to run Linux containers in Windows
    than a full virtual machine. You can read more about LCOW at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers)
    . In addition, Docker Desktop for Windows can use a more optimized method using
    the new Windows Subsystem for Linux (WSL). You can read more about how Docker
    Desktop can use WSL2 at [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/)
    .


    What about containers based on images for Windows or macOS? If a container image
    is based on an operating system like Linux, are there container images based on
    Windows or macOS? The answer is yes for Windows. Windows does have a concept of
    a container image based on Windows. You can read more about Windows containers
    at [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/)
    . SQL Server has not produced a supported version of a Windows container. But
    in the summer of 2019, we announced a private preview program for SQL Server Windows
    Container. I’ll talk more about SQL Server Windows Containers at the end of this
    chapter. As of the time I wrote this book, I’ve yet to see a container image based
    on macOS. Since SQL Server is not built for macOS natively, this is not an issue,
    but as I’ve stated SQL Server supports Linux which will run using Docker Desktop
    for macOS (using HyperKit).'
