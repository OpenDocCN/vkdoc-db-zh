    -- 步骤 6：在你将用于筛选器的列上创建本地统计信息


    ```sql

    CREATE STATISTICS ModernStockItemsStats ON azuresqldb.ModernStockItems ([StockItemID])
    WITH FULLSCAN

    GO

    ```


    4. 运行**步骤 7**，查看一个扫描外部表中所有行的简单示例。在此示例中，如果查询成功，应该只返回一行：


    ```sql

    -- 步骤 7：尝试扫描远程表

    SELECT * FROM azuresqldb.ModernStockItems

    GO

    ```


    远程运算符内置于查询处理器中，用于支持通过 PolyBase 服务对外部表进行查询。图 9-10 显示了步骤 7 中查询的实际执行计划，包括远程运算符的详细信息。


    ![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg](img/479130_1_En_9_Fig10_HTML.jpg)


    图 9-10：用于外部表的远程运算符


    PolyBase 还附带了一系列动态管理视图，可用于查看针对外部表的查询执行情况。


    `sys.dm_exec_distributed_requests` – 与 `sys.dm_exec_requests` 非常相似，你可以找出特定于 PolyBase
    的查询。这个 DMV 的优点在于它保存了最近查询的历史记录，而不仅仅是活动查询。`execution_id` 列中的值是使用其他 DMV 深入挖掘查询执行情况的关键。


    `sys.dm_exec_distributed_request_steps` – 此 DMV 将接收来自 `sys.dm_exec_distributed_requests`
    的 `execution_id`，并让你查看 PolyBase 处理针对外部表的查询的执行过程中的特定步骤。对于一个 `execution_id`，每个步骤都有一个
    `step_index` 值。


    `sys.dm_exec_distributed_sql_requests` – 此 DMV 显示 `sys.dm_exec_distributed_steps`
    中每个 `step_index` 的更多详细信息，包括哪个计算节点正在执行查询（对于横向扩展查询，可能是头节点和/或计算节点）。


    `sys.dm_exec_dms_workers` – 此 DMV 提供有关通过 PolyBase 数据移动服务 (DMS) 为特定 `execution_id`
    和 `step_index` 执行的更多详细信息。此 DMV 对于查看通过 ODBC 驱动程序连接到外部数据源的详细信息（包括可能的错误信息）非常重要。


    5. 运行**步骤 8**，使用 WHERE 子句筛选结果（并可能使用向下推送到外部数据源）：


    ```sql

    -- 步骤 8：尝试查找特定的 StockItemID

    SELECT * FROM azuresqldb.ModernStockItems WHERE StockItemID = 100000

    GO

    ```


    6. 运行**步骤 9**，使用 UNION 查找 SQL Server 2019 和 Azure SQL 数据库上的所有库存物品：


    ```sql

    -- 步骤 9：使用 UNION 查找本地表和 Azure 表中特定供应商的所有库存物品

    SELECT msi.StockItemName, msi.Brand, c.ColorName

    FROM azuresqldb.ModernStockItems msi

    JOIN [Purchasing].[Suppliers] s

    ON msi.SupplierID = s.SupplierID

    and s.SupplierName = ''Graphic Design Institute''

    JOIN [Warehouse].[Colors] c

    ON msi.ColorID = c.ColorID

    UNION

    SELECT si.StockItemName, si.Brand, c.ColorName

    FROM [Warehouse].[StockItems] si

    JOIN [Purchasing].[Suppliers] s

    ON si.SupplierID = s.SupplierID

    and s.SupplierName = ''Graphic Design Institute''

    JOIN [Warehouse].[Colors] c

    ON si.ColorID = c.ColorID

    GO

    ```


    UNION 的第一部分涉及外部表与本地 SQL Server 表的连接。


    你已经看到了一个使用内置的 SQL Server 连接器，通过外部表与 Azure SQL 数据库进行数据虚拟化的示例。请继续阅读有关 `sqldatahub`
    文件夹中其他示例的一些信息。


    ### 使用内置连接器创建外部表


    以下是其他使用内置连接器创建外部表的示例。每个示例都有一个 `readme.md` 文件，其中包含有关设置外部数据源以及构建数据源对象和填充数据的脚本的提示。它们都遵循与
    Azure SQL 数据库示例相同的模板。


    *   `ch9_data_virtualization\sqldatahub\cosmosdb` – 用于使用 MongoDB 连接器与 Azure CosmosDB
    的示例。

    *   `ch9_data_virtualization\sqldatahub\oracle` – 用于使用 Oracle 连接器的示例。


    #### 提示


    我遇到的一个问题是，用于 Oracle 的外部表的 LOCATION 属性值是区分大小写的。


    *   `ch9_data_virtualization\sqldatahub\sql2008r2` – 用于使用 SQL Server 连接器连接到旧版本
    SQL Server 的示例。


    #### 注意


    此示例需要针对 SQL Server 2008R2 的变通方法，而在我撰写本章时该问题尚未解决。由于我们即将发布，目前尚不清楚我们会支持到多旧的 SQL Server
    版本，因为 2008R2 已经停止支持。


    ### 使用外部表与 HDFS


    可以在 `ch9_data_virtualization\sqldatahub\hdfs` 目录中找到一个使用 PolyBase 与 HDFS 和 Azure
    Blob 存储的示例。附带的 `readme.md` 文件提供了有关如何设置以及如何使用此示例的更多信息。


    使用 HDFS 的外部数据源的一个很大不同之处在于对外部数据源使用 LOCATION 属性以及使用 TYPE 属性。


    以下是从该示例中创建外部数据源的 T-SQL 语句示例：


    ```sql

    CREATE EXTERNAL DATA SOURCE bwdatalake with (

    TYPE = HADOOP,

    LOCATION =''wasbs://@'',

    CREDENTIAL = AzureStorageCredential

    )

    GO

    ```


    与其他示例不同，对于 HADOOP 需要一个 TYPE 字段。此外，LOCATION 属性没有像 `sqlserver` 这样的 `<type>`。这是因为
    `TYPE = HADOOP` 告诉 SQL Server 要为 HDFS 使用哪种类型的连接器。


    ### 使用外部表与 ODBC 连接器


    最后一个示例是关于使用 ODBC 连接器创建用于 SAP HANA 的外部表。请注意，此示例仅适用于 Windows 上的 SQL Server 2019。你可以在
    `ch9_data_virtualization\sqldatahub\saphana` 目录中找到此示例。


    在此示例中，数据源不同，因为它需要 ODBC 数据源和连接字符串详细信息。以下是此示例的外部数据源创建语句：


    ```sql

    CREATE EXTERNAL DATA SOURCE SAPHANAServer

    WITH (

    LOCATION = ''odbc://'',

    CONNECTION_OPTIONS = ''Driver={HDBODBC};ServerNode=:'',

    PUSHDOWN = ON,

    CREDENTIAL = SAPHANACredentials

    )

    GO

    ```


    #### 提示


    这里是使用 ODBC 数据连接器与横向扩展组的一个重要提示，因为在我首次设置这些场景时它给我造成了问题。你必须在横向扩展组的每个节点上安装你正在使用的 ODBC
    驱动程序。如果不这样做，在执行查询时可能会遇到间歇性错误。这是因为当你有一个横向扩展组时，即使查询不是横向扩展就绪的，任何节点都有可能被用来执行针对外部数据源的查询。


    我们也有文档指导你使用 ODBC 连接器：[`https://docs.microsoft.com/zh-cn/sql/relational-databases/polybase/polybase-configure-odbc-generic`](https://docs.microsoft.com/zh-cn/sql/relational-databases/polybase/polybase-configure-odbc-generic)。我应该告诉你，ODBC
    连接器为使用 SQL Server 作为数据枢纽开辟了一些有趣的可能。我在一个大型活动上有一位客户问我关于将 PolyBase 与 Office 365 一起使用的问题。我当时不知道答案，并想知道，“有
    O365 的 ODBC 驱动程序吗？” 结果发现有：[`https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver`](https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver)。退后一步。也许有一天你会看到我创建一个演示，展示
    SQL Server 对我的 Office 邮件运行查询！


    ### 外部表的注意事项


    现在你已经了解了 PolyBase 的工作原理并看了一些示例，在决定是否将 PolyBase 与 SQL Server 2019 一起使用时，有几个方面需要考虑。

    '
- fmt: '### A New Semantic Layer


    I borrowed this concept from my colleague Travis Wright. The idea is that Polybase
    allows you to define objects by naming conventions under your control vs. having
    to use the naming conventions of objects from external data sources.


    In other words, you can use the semantics of the policies and procedures you use
    with SQL Server. When you build external tables, you use SQL Server conventions,
    schemas, and securables under your control. Combine this with the ability to join
    with local SQL Server tables, use `UNION` to combine with local tables, and then
    create views on top of these constructs.


    Also remember that Polybase is defined at the user database level, so all objects
    are secured and controlled by the owner of the user database.


    ### External Tables vs. Linked Servers


    One of the most frequent questions I get on Polybase and external tables is if
    they are different from linked servers, which have been in the product since SQL
    Server 7.0.


    We have built a nice comparison of the technologies in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq?view=sql-server-ver15#polybase-vs-linked-servers`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq%253Fview%253Dsql-server-ver15%2523polybase-vs-linked-servers).


    The most noticeable difference is that linked servers are defined at the instance
    level, and use OLE-DB to access data from the other data source. Polybase is defined
    at the user database level and uses ODBC to access external data.


    ### Restrictions and Limitations


    The number one restriction that you need to know is that Polybase is, for the
    most part, a read-only solution (the exception is that you can use `INSERT` statements
    with external tables based on HDFS).


    I also ran into a few problems with supported data types in SQL Server for an
    external table. The following data types are not supported with an `EXTERNAL TABLE`
    in SQL Server 2019:


    *   `VARCHAR(MAX)`

    *   `GEOGRAPHY`

    *   Computed Columns

    *   `JSON`


    ### Summary


    With the addition of new built-in connectors and support for ODBC, I believe Polybase
    will gain more adoption than when it was first released in SQL Server 2016. The
    possibility of now accessing and querying data to many different data sources
    without moving the data is compelling. In fact, even since I’ve presented the
    SQL Server 2019 story since September of 2019, this is one of the most asked about
    features of the new release from customers. The fact that you can query Oracle
    data through SQL Server and not have to install any special software on the SQL
    Server has opened up some eyes. It is possible for Polybase to become part of
    a `migration strategy from Oracle to SQL Server`. Take a look at this recording
    of a session I did with my colleague Amit Banerjee at Microsoft Ignite in 2019,
    where Amit shows how to use Polybase with SQL Server 2019 for an incremental migration
    strategy from Oracle to SQL Server ([`https://myignite.techcommunity.microsoft.com/sessions/65955`](https://myignite.techcommunity.microsoft.com/sessions/65955)).


    It is important that you have read this chapter before moving to Chapter [10](#479130_1_En_10_Chapter.xhtml).
    That is because in Chapter [10](#479130_1_En_10_Chapter.xhtml) I will discuss
    a new solution with SQL Server 2019 that will involve the concept of Data Virtualization
    and Polybase called SQL Server Big Data Clusters.


    ### 10. SQL Server Big Data Clusters


    If you remember back to Chapter [1](#479130_1_En_1_Chapter.xhtml), I showed the
    key major new capabilities of SQL Server 2019. Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1)
    shows the first major feature at the top left-hand corner from Figure [1-3](#479130_1_En_1_Chapter.xhtml#Fig3)
    in that chapter.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg)


    *Figure 10-1*


    A more accurate representation of this infographic is `Intelligence over all your
    data`. This is because the functionality behind Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1)
    is more than just Polybase++. You will learn more about what I mean by `Intelligence
    over all your data` as you read through this chapter.


    Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1) represents in a nutshell what
    is behind `SQL Server Big Data Clusters (BDC)`, but it can’t possibly show their
    full potential. What started as Project Aris, which I described in Chapter [1](#479130_1_En_1_Chapter.xhtml),
    has become a `product within a product` and one of the most compelling stories
    of SQL Server 2019.


    Since I started in Chapter [1](#479130_1_En_1_Chapter.xhtml) by talking about
    Project Aris and this infographic in Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1),
    why is SQL Server Big Data Clusters way back in Chapter [10](#479130_1_En_10_Chapter.xhtml)?


    When I was planning this book, I originally had BDC as the first chapter, and
    the lead story to start off with a bang! However, as I thought more about how
    the book would play out, leaving this as one of the last chapters made sense for
    the following reasons:


    *   I wanted you to learn the fundamentals of SQL Server 2019 on Linux, Containers,
    Kubernetes, and Polybase to help you understand BDC. This is why those topics
    landed in Chapters [6](#479130_1_En_6_Chapter.xhtml), [7](#479130_1_En_7_Chapter.xhtml),
    [8](#479130_1_En_8_Chapter.xhtml), and [9](#479130_1_En_9_Chapter.xhtml).

    *   You will see that part of BDC is a `SQL Server Master Instance`. When you
    see the `SQL Server Master Instance`, I wanted you to already be familiar with
    what other core capabilities in SQL Server 2019 come with that component of BDC.

    *   BDC was a major effort and took many team members to design, build, and code.
    Therefore, it was the largest component of SQL Server 2019 to become fully functional
    during our CTP builds and preview releases. I wanted to wait as close as possible
    to the completion of the book to give you the most up-to-date and accurate information
    about BDC, what you can use it for, and how it works.


    In this chapter, you are going to learn why BDC solves some interesting challenges
    for today’s data professional:


    *   As I described in Chapter [9](#479130_1_En_9_Chapter.xhtml) on Polybase, data
    professionals need to access data sources in their organization outside of SQL
    Server. They would like to be able to access data from a variety of sources `with
    little or no data movement`.

    *   Many data professionals are looking into investing in `Big Data`. I’ll talk
    more about some crisp details around the term `Big Data` in the next section,
    but when this term comes up, it usually involves a system powered by `Hadoop`.

    *   Some organizations have never invested in `Hadoop`, so would like guidance
    or even automation to deploy a `Hadoop` system to store unstructured or semistructured
    data. This data is usually `high-volume data`, while data stored in their SQL
    Server is considered `high-value data`.

    *   Furthermore, many organizations need more rigor around securing and managing
    a `Hadoop` system, much like they do with SQL Server today. They would like a
    complete ecosystem to build a `data lake` that is easily deployable, secure, and
    scalable and leverages the best of modern technology for both SQL Server and Big
    Data.'
  raw: '### A New Semantic Layer


    I borrowed this concept from my colleague Travis Wright. The idea is that Polybase
    allows you to define objects by naming conventions under your control vs. having
    to use the naming conventions of objects from external data sources.


    In other words, you can use the semantics of the policies and procedures you use
    with SQL Server. When you build external tables, you use SQL Server conventions,
    schemas, and securables under your control. Combine this with the ability to join
    with local SQL Server tables, use UNION to combine with local tables, and then
    create views on top of these constructs.


    Also remember that Polybase is defined at the user database level, so all objects
    are secured and controlled by the owner of the user database.


    ### External Tables vs. Linked Servers


    One of the most frequent questions I get on Polybase and external tables is if
    they are different from linked servers, which have been in the product since SQL
    Server 7.0.


    We have built a nice comparison of the technologies in our documentation at [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq?view=sql-server-ver15#polybase-vs-linked-servers`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq%253Fview%253Dsql-server-ver15%2523polybase-vs-linked-servers)
    .


    The most noticeable difference is that linked servers are defined at the instance
    level, and use OLE-DB to access data from the other data source. Polybase is defined
    at the user database level and uses ODBC to access external data.


    ### Restrictions and Limitations


    The number one restriction that you need to know is that Polybase is, for the
    most part, a read-only solution (the exception is that you can use INSERT statements
    with external tables based on HDFS).


    I also ran into a few problems with supported data types in SQL Server for an
    external table. The following data types are not supported with an EXTERNAL TABLE
    in SQL Server 2019:


    *   VARCHAR(MAX)


    *   GEOGRAPHY


    *   Computed Columns


    *   JSON


    ## Summary


    With the addition of new built-in connectors and support for ODBC, I believe Polybase
    will gain more adoption than when it was first released in SQL Server 2016\. The
    possibility of now accessing and querying data to many different data sources
    without moving the data is compelling. In fact, even since I’ve presented the
    SQL Server 2019 story since September of 2019, this is one of the most asked about
    features of the new release from customers. The fact that you can query Oracle
    data through SQL Server and not have to install any special software on the SQL
    Server has opened up some eyes. It is possible for Polybase to become part of
    a *migration strategy from Oracle to SQL Server*. Take a look at this recording
    of a session I did with my colleague Amit Banerjee at Microsoft Ignite in 2019,
    where Amit shows how to use Polybase with SQL Server 2019 for an incremental migration
    strategy from Oracle to SQL Server ( [`https://myignite.techcommunity.microsoft.com/sessions/65955`](https://myignite.techcommunity.microsoft.com/sessions/65955)
    ).


    It is important that you have read this chapter before moving to Chapter [10](#479130_1_En_10_Chapter.xhtml).
    That is because in Chapter [10](#479130_1_En_10_Chapter.xhtml) I will discuss
    a new solution with SQL Server 2019 that will involve the concept of Data Virtualization
    and Polybase called SQL Server Big Data Clusters.


    # 10. SQL Server Big Data Clusters


    If you remember back to Chapter [1](#479130_1_En_1_Chapter.xhtml), I showed the
    key major new capabilities of SQL Server 2019\. Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1)
    shows the first major feature at the top left-hand corner from Figure [1-3](#479130_1_En_1_Chapter.xhtml#Fig3) in
    that chapter.


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg](images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Intelligence over all your data


    A more accurate representation of this infographic is *Intelligence over all your
    data*. This is because the functionality behind Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1)
    is more than just Polybase++. You will learn more about what I mean by Intelligence
    over all your data as you read through this chapter.


    Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1) represents in a nutshell what
    is behind **SQL Server Big Data Clusters (BDC)**, but it can’t possibly show their
    full potential. What started as Project Aris, which I described in Chapter [1](#479130_1_En_1_Chapter.xhtml),
    has become a *product within a product* and one of the most compelling stories
    of SQL Server 2019.


    Since I started in Chapter [1](#479130_1_En_1_Chapter.xhtml) by talking about
    Project Aris and this infographic in Figure [10-1](#479130_1_En_10_Chapter.xhtml#Fig1),
    why is SQL Server Big Data Clusters way back in Chapter [10](#479130_1_En_10_Chapter.xhtml)?


    When I was planning this book, I originally had BDC as the first chapter, and
    the lead story to start off with a bang! However, as I thought more about how
    the book would play out, leaving this as one of the last chapters made sense for
    the following reasons:


    *   I wanted you to learn the fundamentals of SQL Server 2019 on Linux, Containers,
    Kubernetes, and Polybase to help you understand BDC. This is why those topics
    landed in Chapters [6](#479130_1_En_6_Chapter.xhtml), [7](#479130_1_En_7_Chapter.xhtml),
    [8](#479130_1_En_8_Chapter.xhtml), and [9](#479130_1_En_9_Chapter.xhtml).


    *   You will see that part of BDC is a **SQL Server Master Instance**. When you
    see the SQL Server Master Instance, I wanted you to already be familiar with what
    other core capabilities in SQL Server 2019 come with that component of BDC.


    *   BDC was a major effort and took many team members to design, build, and code.
    Therefore, it was the largest component of SQL Server 2019 to become fully functional
    during our CTP builds and preview releases. I wanted to wait as close as possible
    to the completion of the book to give you the most up-to-date and accurate information
    about BDC, what you can use it for, and how it works.


    In this chapter, you are going to learn why BDC solves some interesting challenges
    for today’s data professional:


    *   As I described in Chapter [9](#479130_1_En_9_Chapter.xhtml) on Polybase, data
    professionals need to access data sources in their organization outside of SQL
    Server. They would like to be able to access data from a variety of sources *with
    little or no data movement*.


    *   Many data professionals are looking into investing in *Big Data*. I’ll talk
    more about some crisp details around the term Big Data in the next section, but
    when this term comes up, it usually involves a system powered by *Hadoop*.


    *   Some organizations have never invested in Hadoop, so would like guidance or
    even automation to deploy a Hadoop system to store unstructured or semistructured
    data. This data is usually *high-volume data*, while data stored in their SQL
    Server is considered *high-value data*.


    *   Furthermore, many organizations need more rigor around securing and managing
    a Hadoop system, much like they do with SQL Server today. They would like a complete
    ecosystem to build a *data lake* that is easily deployable, secure, and scalable
    and leverages the best of modern technology for both SQL Server and Big Data.'
  trans: '

    ### 一个全新的语义层


    这个概念我借鉴了我的同事特拉维斯·赖特（Travis Wright）。其核心思想是，Polybase 允许你通过自己掌控的命名约定来定义对象，而不必使用来自外部数据源的对象的命名约定。


    换句话说，你可以使用你在 SQL Server 中使用的策略和过程的语义。当你构建外部表时，你使用的是你掌控下的 SQL Server 约定、架构和安全对象。将此功能与能够同本地
    SQL Server 表进行联接、使用 `UNION` 与本地表进行组合，然后在这些结构之上创建视图的能力相结合。


    另外请记住，Polybase 是在用户数据库级别定义的，因此所有对象都由该用户数据库的所有者进行保护和管理。


    ### 外部表 vs. 链接服务器


    关于 Polybase 和外部表，我最常被问到的一个问题是：它们与自 SQL Server 7.0 以来就存在于产品中的链接服务器是否有所不同。


    我们在文档中对这两种技术进行了一个很好的比较：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq?view=sql-server-ver15#polybase-vs-linked-servers`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq%253Fview%253Dsql-server-ver15%2523polybase-vs-linked-servers)。


    最明显的区别在于，链接服务器是在实例级别定义的，并使用 OLE-DB 访问其他数据源的数据。而 Polybase 是在用户数据库级别定义的，并使用 ODBC
    访问外部数据。


    ### 限制与约束


    你需要知道的首要限制是，Polybase 在绝大多数情况下是一个只读解决方案（例外是你可以对基于 HDFS 的外部表使用 `INSERT` 语句）。


    我还遇到了 SQL Server 对外部表支持的数据类型的一些问题。在 SQL Server 2019 中，以下数据类型不支持用于 `EXTERNAL TABLE`：


    *   `VARCHAR(MAX)`

    *   `GEOGRAPHY`

    *   计算列

    *   `JSON`


    ### 总结


    随着新增的内置连接器以及对 ODBC 的支持，我相信 Polybase 将比它首次在 SQL Server 2016 中发布时获得更广泛的采用。现在能够访问和查询许多不同数据源的数据，而无需移动数据，这一可能性非常有吸引力。事实上，自
    2019 年 9 月我开始介绍 SQL Server 2019 的特性以来，这是客户询问最多的新功能之一。能够通过 SQL Server 查询 Oracle
    数据，而无需在 SQL Server 上安装任何特殊软件，这一事实让许多人眼前一亮。Polybase 有可能成为 `从 Oracle 迁移到 SQL Server
    的迁移策略` 的一部分。请查看这段录像，那是我在 2019 年微软 Ignite 大会上与微软同事阿米特·班纳吉（Amit Banerjee）共同主持的一场会议，阿米特展示了如何使用
    Polybase 配合 SQL Server 2019 实现从 Oracle 到 SQL Server 的增量迁移策略：[`https://myignite.techcommunity.microsoft.com/sessions/65955`](https://myignite.techcommunity.microsoft.com/sessions/65955)。


    在你继续阅读第 10 章之前，请务必先阅读本章。这是因为在第 10 章中，我将讨论 SQL Server 2019 的一个新解决方案，该方案将涉及数据虚拟化和
    Polybase 的概念，称为 SQL Server 大数据群集。


    ### 10. SQL Server 大数据群集


    如果你还记得第 1 章，我展示了 SQL Server 2019 的主要新功能。图 10-1 显示了该章图 1-3 左上角的第一个主要特性。


    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg](img/479130_1_En_10_Fig1_HTML.jpg)


    *图 10-1*


    对这个信息图更准确的表述是 `对您所有数据的智能处理`。这是因为图 10-1 背后的功能远不止 Polybase++。随着你阅读本章，你会更多地理解我所说的
    `对您所有数据的智能处理` 是什么意思。


    图 10-1 简洁地概括了 `SQL Server 大数据群集 (BDC)` 的核心，但它不可能展示其全部潜力。始于我在第 1 章描述的 Project Aris
    的这个项目，已经发展成为一个 `产品中的产品`，并且是 SQL Server 2019 最引人入胜的亮点之一。


    既然我在第 1 章就从谈论 Project Aris 和图 10-1 中的这个信息图开始，为什么 SQL Server 大数据群集要放在第 10 章这么靠后呢？


    在我规划这本书时，原本打算将 BDC 作为第一章，作为开场的重头戏！然而，当我更深入地思考全书的结构后，将其作为后面的章节之一是有道理的，原因如下：


    *   我希望你首先学习 SQL Server 2019 在 Linux、容器、Kubernetes 和 Polybase 方面的基础知识，这将有助于你理解
    BDC。这就是为什么这些主题分布在第 6、7、8 和 9 章。

    *   你会看到 BDC 的一部分是一个 `SQL Server 主实例`。当你看到 `SQL Server 主实例` 时，我希望你已经熟悉 BDC 的该组件随附的
    SQL Server 2019 其他核心功能。

    *   BDC 是一项重大工程，需要众多团队成员设计、构建和编码。因此，它是在我们的 CTP 版本和预览发布期间，SQL Server 2019 中功能完善最晚、最大的组件。我希望尽可能等到书稿完成时再定稿，以便为你提供关于
    BDC 最新、最准确的信息，包括它的用途和工作原理。


    在本章中，你将了解为什么 BDC 能为当今的数据专业人士解决一些有趣的挑战：


    *   正如我在第 9 章关于 Polybase 的描述中所说，数据专业人士需要访问其组织中 SQL Server 之外的数据源。他们希望能够 `以很少或无需数据移动`
    的方式访问来自各种来源的数据。

    *   许多数据专业人士正在考虑投资 `大数据`。我将在下一节更详细地讨论 `大数据` 这个术语的一些清晰细节，但当这个术语出现时，它通常涉及一个由 `Hadoop`
    驱动的系统。

    *   有些组织从未投资过 `Hadoop`，因此希望获得指导甚至自动化部署一个 `Hadoop` 系统来存储非结构化或半结构化数据。这类数据通常是 `高容量数据`，而存储在其
    SQL Server 中的数据则被视为 `高价值数据`。

    *   此外，许多组织需要更严格地保护和管理 `Hadoop` 系统，就像他们今天对 SQL Server 所做的那样。他们希望有一个完整的生态系统来构建一个易于部署、安全且可扩展的
    `数据湖`，并充分利用 SQL Server 和大数据两方面的现代技术优势。

