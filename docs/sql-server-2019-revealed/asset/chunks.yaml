- fmt: '### Implementing and Using Other Languages


    Since we built the extensibility framework and concept of external languages,
    now programming languages other than Java are possible with `T-SQL`. Java is just
    an example we shipped to let you use an extension “out of the box” but also show
    others how to integrate other programming languages. Imagine if external languages
    were available for `.Net` or `Go`.


    The key is the language extension. The language extension is a `DLL` on `Windows`
    or shared library object on `Linux` that understands how to communicate with the
    `Extension Host`. Once a language extension is available, then an `SDK` set of
    classes can be built in the native language of the extension. Your code will use
    the classes implemented by the `SDK` along with the class to be executed by the
    call to `sp_execute_external_script`.


    The required set of classes for an `SDK` to enable a language extension is shown
    through the Java example at [`https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server`](https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server).


    In addition, as I described in the previous section, the source code and documentation
    for how to write a language extension will be available on `GitHub` at [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions).


    It will be interesting to see how language extensions take off within the `SQL
    Server` community. For you, imagine scenarios where you cannot implement something
    in `T-SQL` today, but would like to extend the language and take advantage of
    all the capabilities of `SQL Server` including security, availability, and resource
    governance without having to write code outside of `T-SQL`.


    All of the process isolation, security, and governance capabilities that exist
    for `SQL Server ML Services` apply language extensions and the extensibility framework.


    ## Summary


    In this chapter, you have learned how `SQL Server 2019` provides features and
    tools for the modern data developer, including support for just about any programming
    language you need, updated data providers, graph database, `UTF-8` support, `Machine
    Learning`, and `T-SQL` extensions. This is combined with the already powerful
    performance capabilities of `Intelligent Query Processing` and `tempdb` metadata
    optimizations to provide a complete package needed by any modern data developer.


    # 6. SQL Server 2019 on Linux


    In this chapter, I’ll describe what is new for `SQL Server 2019` on `Linux`. However,
    if you are new to `SQL Server` on `Linux`, I’ll start the chapter by reviewing
    the amazing story of how and why we built `SQL Server` to run on `Linux`.


    ## The Amazing Story of SQL Server on Linux


    In October of 2017, our `SQL Server` engineering team rocked the industry by shipping
    `SQL Server` for `Linux` on platforms such as `Red Hat`, `Ubuntu`, and `SUSE`.
    Our engineering team was able to bring `SQL Server` to market using a very innovative
    strategy and architecture with software known as the `SQL Platform Abstraction
    Layer` (`SQLPAL`).


    Figure [6-1](#479130_1_En_6_Chapter.xhtml#Fig1) shows the fundamental architecture
    of `SQL Server` on `Linux` with `SQLPAL`.


    ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg](images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg)


    Figure 6-1

    The `SQL Server` `Linux` architecture


    I go into a very deep detail of this architecture in my book `Pro SQL Server on
    Linux` by `Apress Media`, so I won’t repeat that in this book (I know; shameless
    plug for a different book). However, I include this figure and a brief discussion
    because it tells the story of `choice with compatibility`. The `SQL Server` core
    engine and its code are the same codebase for `SQL Server` on `Windows` and `Linux`.
    The `SQLPAL` provides the software so that the `SQL Server` engine doesn’t care
    on what `OS` platform it is running. This means you can take a database backup
    on `SQL Server` on `Windows` and restore it on `Linux` with complete compatibility.


    For the most part, the feature set of `SQL Server 2017` on `Linux` was completely
    the same as on `Windows`. Slava Oks once told me, “Bob, the `Query Processor`
    is… the `Query Processor`, whether it is on `Windows` or `Linux`.” What he means
    is that the exact same binary code for the `Query Processor` runs on both `Windows`
    and `Linux`. Even features like `SQL Server Agent` and `SSIS` are available for
    `SQL Server` on `Linux`.


    We “timebox” almost every release of `SQL Server`, trying to maximize the value
    of what we put into a major release with the balance of getting it shipped in
    the timeframe we need it to go to market.


    While we would have loved that every feature of `SQL Server` on `Windows` was
    included in `SQL Server 2017` on `Linux`, there were some features on the `edge
    of the engine` that we didn’t have time to put into the release – features like
    `Replication` and `Distributed Transaction Coordinator` (`DTC`). Furthermore,
    there were a few platform enhancements that we made to ensure `SQL Server` on
    `Linux` was as robust and ready for enterprise customers as our software on `Windows`.


    Before I go deeper into this subject, I should come clean and tell you that there
    are no examples in this chapter. You might be reading this and be stunned, given
    I wrote an entire book on `SQL Server` on `Linux`. Most of the contents of this
    chapter either require some complex configuration or are part of using `SQL Server`
    independent of `Linux`. Having said that, consider these options for `SQL Server`
    examples and demos:


    - `Pro SQL Server on Linux` `GitHub` repo – [`https://github.com/Apress/pro-sql-server-on-linux`](https://github.com/Apress/pro-sql-server-on-linux)

    - Demos and examples on the `bobsql` `GitHub` repo – [`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql)

    - `Microsoft` hands-on lab for `SQL Server` on `Linux` – [`https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/`](https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/)

    - The `SQL Server Workshop` site – [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops).
    While I don’t have a specific workshop there yet for `SQL Server` on `Linux`,
    don’t be surprised if one shows up at some point. There are labs to use `SQL Server`
    on `Linux` `Replication` with containers in these workshops.

    - Finally, I will let you try out `SQL Server` `Replication` on `Linux` in action
    in Chapter [7](#479130_1_En_7_Chapter.xhtml), using containers.'
