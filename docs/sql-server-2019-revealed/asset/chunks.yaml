    ### 诊断功能


    诊断和故障排除曾是我在微软支持部门工作 20 多年的领域。我仍然乐于看到产品中新增的诊断功能，即使它们看起来微不足道。对一些人来说可能微不足道的功能，却能为其他人带来巨大的好处。


    ### 你也可以成为 Paul Randal


    Paul Randal 是我多年的朋友，无论是在他任职于微软 SQL Server 工程部门期间，还是在他与妻子 Kimberly Tripp 一起担任 SQLskills
    CEO 的漫长职业生涯中。Paul 和我都以内核知识著称，而检查数据库页面的内部结构（有时称为“页面破解”）是一项重要的技能。多年来，我们两人都使用未文档化且不受支持的
    `DBCC PAGE` 命令来“破解”数据库页面。随着 SQL Server 2019 的推出，新增了一对系统对象来帮助检查数据库页面的头部：


    `dm_db_page_info` – 这是一个系统函数，用于返回页面头部信息，结果集中的每一列对应页面头部的一个字段。你可以在 [`docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql)
    阅读关于此系统函数的说明。


    此函数所需的输入是标识一个页面的信息，即 `database id`、`file id` 和 `page number`。在某些情况下，页面的标识符会出现在查询结果中，例如来自某个
    DMV 的列。一个例子是 `dm_exec_requests` 中的 `wait_resource`。来自 `wait_resource` 的页面标识符采用页面资源字符串的形式，即
    `<dbid>:<fileid>:<pageid>`。系统函数 `fn_PageResCracker` 接受一个页面资源字符串作为输入，并返回一个包含 `db_id`、`file_id`
    和 `page_id` 的结果。


    因此，你可以运行如下的 T-SQL 语句：


    ```

    SELECT page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info;

    ```


    这将从一个页面资源中提取页面头部详细信息。对于像页面闩锁等待这样的并发场景，此技术对于找出闩锁等待所涉及的页面属于哪个对象非常有用。


    如果你回顾第 2 章，你会发现我提供了一个示例，使用此技术来查看 tempdb 中哪些表涉及了页面闩锁等待：


    ```

    USE tempdb

    GO

    SELECT object_name(page_info.object_id), page_info.*

    FROM sys.dm_exec_requests AS d

    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r

    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,''DETAILED'')

    AS page_info

    GO

    ```


    Pam Lahoud 也撰写了一篇关于这个虽小但重要的引擎增强功能的精彩博客文章，你可以在 [`blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/`](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/)
    阅读。


    ### 关于统计信息的诊断


    统计信息是查询性能非常重要的一部分。统计信息可以通过同步或异步方式更新，其中同步意味着查询必须等待统计信息更新完成，而异步则意味着查询可以继续执行，但统计信息会在后台更新。同步统计信息更新在某些情况下可能会导致
    `SELECT` 语句执行时间比正常情况更长。SQL Server 2019 提供了一些诊断功能，可以为你提供关于等待同步统计信息更新的详细信息：


    `WAIT_ON_SYNC_STATISTICS_REFRESH` – 这是在 `dm_os_wait_stats` 中发现的一个新 `wait_type`。它显示了在同步统计信息刷新操作上累计花费的实例级别时间。


    `dm_exec_requests` – 如果一个查询正在等待同步统计信息更新操作完成才能继续执行，`sys.dm_exec_requests` 的 `command`
    列将显示 `SELECT (STATMAN)` 的值。


    ### 查询存储增强功能


    查询存储是用于性能调优、基准测试和故障排除的重要功能。在第 2 章中，我展示了一些使用查询存储来比较智能查询处理前后查询性能差异的示例。


    查询存储的功能已得到增强，包括以下内容：


    **强制快速转发和静态游标** – 查询存储现在支持强制执行包含快速转发和静态游标的计划。


    **查询存储的自定义捕获策略** – 一些客户在使用查询存储处理特定类型的工作负载时遇到了问题。在 SQL Server 2019 中，我们添加了更多参数，以帮助对查询存储捕获的内容进行更精细的控制。你可以在文档中找到这些新选项的解释，它们与
    `QUERY_CAPTURE_POLICY` 相关： [`docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options)。有什么比从
    SQL Server 社区了解如何使用这些选项更好的方式呢？在我认识的人中，可能没有人比 Erin Stellato 更热衷于查询存储了，她在博客中精彩地讨论了这些新选项：[www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/](https://www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/)。


    ### 计划缓存的精细控制


    在某些情况下，你可能希望手动从计划缓存中清除某个查询或存储过程。一种场景可能是强制查询重新编译。你可以使用 `ALTER DATABASE SCOPED CONFIGURATION`
    选项 `CLEAR PROCEDURE_CACHE` 来清除与数据库相关的所有查询和对象的计划缓存。从 SQL Server 2019 开始，你可以使用基于
    `plan_handle` 的此语句来清除计划缓存。你可以使用像 `dm_exec_query_stats` 这样的 DMV 找到 `plan_handle`。


    ### DBCC CLONEDATABASE 增强功能


    `DBCC CLONEDATABASE` 可用于故障排除，从数据库中收集架构和统计信息（但不包含用户数据），并存入一个新数据库。这使你能够调查数据库的估计查询计划，而无需复制所有实际数据。


    SQL Server 2019 通过收集列存储索引的统计信息增强了 `DBCC CLONEDATABASE`，你可以在 [`docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql)
    阅读更多相关内容。


    ### 提示


    由于 `DBCC CLONEDATABASE` 捕获系统表中的所有数据（即元数据），这包括了查询存储的数据。这意味着你可以离线检查来自主用户数据库的查询存储性能数据。

