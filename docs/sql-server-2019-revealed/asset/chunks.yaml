  trans: '#### 还原数据库


    这或许是升级 SQL Server 最常见的方法（除了滚动升级之外）。SQL Server 引擎在还原数据库时懂得如何进行 `upgrade`（从技术上讲，SQL
    Server 知道在数据库联机时如何升级，而这正是就地升级的工作方式）。因此，许多客户选择为迁移在另一台计算机或虚拟机上安装 SQL Server，并从旧版本的
    SQL Server 还原其数据库。


    无法将升级后的主要版本数据库还原回旧的主要版本。例如，你不能将 SQL Server 2019 的备份还原到 SQL Server 2017（但正如我在第
    7 章向你展示的，你可以在一个主要版本内的累积更新之间切换）。


    对于 SQL Server 2019，你将能够从 SQL Server 2008 或更高版本还原数据库。这包括能够从 Windows 上的 SQL Server
    还原到 Linux 上的 SQL Server 2019，因为数据库在不同操作系统平台之间是完全兼容的。如果你的数据库备份来自 SQL Server 2008
    之前的版本，你将需要执行一个“跳转”过程：先将备份还原到一个受支持的 SQL Server 版本（最早到 2008 年），然后从那里进行备份，再执行另一次还原到
    SQL Server 2019。


    帮助减少迁移问题的关键支柱之一是，当数据库被还原到新版本的 SQL Server 时，`数据库兼容性级别会被保留`，与旧的 SQL Server 版本一致。我将在本章后面名为“数据库兼容性”的章节中更详细地讨论这个概念。


    #### SQL Server Integration Services (SSIS) 或批量导入/导出


    另一种将数据库迁移到 SQL Server 2019 的方法是使用 SQL Server Integration Services (SSIS) 或其他批量导出/导入工具来导出和导入数据。


    我曾见过一些客户在需要执行转换或对整体数据库设计或架构进行结构性更改时使用此方法。换句话说，有些客户在迁移到新版本 SQL Server 的同时 `迁移应用程序`，而不是仅仅“原样”移动数据库。这包括对数据库架构的更改。我见过的另一种转换技术是从先前版本还原数据库，然后在新版本的
    SQL Server 上运行构建代码，以重新设计某些表或存储过程。


    #### 实时迁移


    还原数据库需要应用程序和用户停机。如果你的业务要求需要非常短的停机时间怎么办？在这些情况下，你可以考虑使用一些技术，例如：


    `滚动升级`


    如果你使用的是 Always On 故障转移群集实例或 Always On 可用性组，一个流行的选择是滚动升级。这两种选项在 SQL Server 2019
    中都可行，而滚动升级是客户使用这些高可用性解决方案的原因之一。


    Always On 故障转移群集实例支持滚动升级，前提是当前群集上的 SQL Server 版本支持就地升级场景。你可以在 [`https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance`](https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance)
    阅读更多关于 Always On 故障转移群集实例的滚动升级信息。


    Always On 可用性组仅支持回溯到 SQL Server 2012，因为那是该技术首次可用的版本。此滚动升级选项有许多配置，可能是企业 SQL Server
    实时迁移场景最受青睐的方法。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances)
    了解此选项。


    SQL Server 2017 还为可用性组引入了一个名为 `无群集` 可用性组的新功能。无群集可用性组不需要底层故障转移群集软件。也可以使用此技术执行实时迁移，它可能是你从
    SQL Server 2017 迁移到 Linux 上的 SQL Server 的最佳选择之一。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform)
    阅读更多关于此选项的信息。


    `日志传送`


    一种更基础的实时迁移方法是使用日志传送。日志传送是一种简单的技术，它使用 SQL Server 数据库和事务日志备份与还原，将数据同步到辅助 SQL Server。你可以在
    [`https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server)
    了解日志传送。这是一种 `手动` 滚动升级的形式，不需要任何 Always On 技术。


    你可以在 [`https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql`](https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql)
    阅读使用日志传送升级的过程。


    `复制`


    我们的文档在 [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases)
    提供了如何升级完整 SQL Server 复制拓扑的详细信息。一个有趣的想法（当我与 Amit Banerjee 一起拜访一位客户时，受到了他的启发）是即使你不需要将复制作为策略，也使用
    SQL Server 复制进行实时迁移。


    由于复制拓扑中的订阅者可以是比分发者和发布者更新版本的 SQL Server，你可以将订阅者用作你的新主服务器。换句话说，你可以将订阅者设置为 SQL Server
    2019，而使用旧版本的 SQL Server 作为分发者和发布者。当你的应用和用户针对旧的发布者进行写入时，你的 SQL Server 2019 订阅者拥有所有最新数据。当你准备好进行切换时，禁用复制并将所有用户指向新的
    SQL Server 2019 数据库（该数据库 `曾经是` 订阅者）。听起来很简单，但会有一些停机时间，并且设置和禁用复制可能很麻烦。禁用复制不会删除订阅者数据库中的数据，这一点记录在
    [`https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution`](https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution)。


    ### 数据库兼容性


    数据库兼容性旨在当你迁移到新版本的 SQL Server 时 `提供向后兼容性`。对于所有术语和关于数据库兼容性的详细信息，你应该使用以下资源：[`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。


    你首先应该了解的事情之一是数据库兼容性级别如何对应于 SQL Server 版本的默认级别。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#syntax`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523syntax)
    查看此列表。例如，SQL Server 2012 的默认数据库兼容性级别是 110。'
- fmt: '### Note


    I’ve been asked before why the dbcompat levels don’t line up with the name or
    version label of the SQL Server release. This is because SQL Server has an internal
    version number, and the dbcompat levels line up with that version number. SQL
    Server 2012 is really version 11.x (see `@@VERSION`) so the dbcompat level is
    110. Confusing, I realize, but we name releases a bit differently from how we
    version them.


    If you restore a database backup from SQL Server 2012 to SQL Server 2019, SQL
    Server will keep the database compatibility level at 110. The intention of this
    design is for you to have confidence that your application, queries, and behavior
    against the database will behave just like it was running on SQL Server 2012.
    The difference is you can now take advantage of new features in the new release
    of SQL Server (there is an exception to this in that we sometimes use database
    compatibility to enable new functionality).


    I mentioned in the preceding section on `Database Migration Assistant (DMA)` that
    the `DMA` tool would look for migration problems using the following terms: `breaking
    changes`, `behavior changes`, and `deprecated features`. Let me define these terms
    in relation to the use of database compatibility for backward compatibility.


    `Breaking changes` is defined as *behavior changes* that can result in a different
    outcome. In some cases, a breaking change is protected by using a database compatibility
    level on a new version of SQL Server. In other cases, a breaking change is not
    protected by database compatibility level. Confusing? I understand how you feel.
    Fortunately, the most recent versions of SQL Server have very few breaking changes
    that are not protected. The good news is that the `DMA` tool is designed to help
    detect these issues.


    To find out a list of breaking changes with each SQL Server version, start at
    this documentation page [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#using-compatibility-level-for-backward-compatibility`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523using-compatibility-level-for-backward-compatibility)
    and scroll down for the section that starts with the sentence, “Breaking changes
    introduced in a given SQL Server version…” This section includes pointers to breaking
    changes in all SQL Server versions back to SQL Server 2012.


    There are some behavior changes used with database compatibility level that are
    designed to correct a problem or enable new functionality. One example of this
    is the Intelligent Query Processing capability I discussed in Chapter [2](#479130_1_En_2_Chapter.xhtml),
    which is enabled with database compatibility 140 or 150.


    `Deprecated` functionality is protected by database compatibility level. Deprecated
    functionality includes features or behavior that we do not intend to enhance in
    the future. Microsoft may remove this functionality in any new release. `Discontinued`
    functionality means we have removed a feature or behavior from a release of SQL
    Server, so database compatibility will not help. Discontinued functionality starts
    as deprecated first. Fortunately, we have made decisions in recent releases to
    not discontinue anything. However, I personally would not rely on deprecated functionality,
    especially for new projects. The SQL Server documentation to find deprecated functionality
    is easier with recent releases. Use the following documentation link to find deprecated
    and discontinued functionality in recent releases: [`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility).
    To go further back, you will have to switch to an older release of the documentation.
    For example, this is the documentation link for SQL Server 2014: [`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility?view=sql-server-2014`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility%253Fview%253Dsql-server-2014).


    With this in mind, how good is database compatibility level to maintain backward
    compatibility when migrating to a new version of SQL Server? It is good enough
    that Pedro Lopes is hoping you will bet on it. And he is hoping to convince many
    Independent Software Vendors (ISV) to do the same. Pedro’s vision is for application
    developers to *certify* their application on a database compatibility level instead
    of on a version of SQL Server. If you listen closely to Pedro on the video link
    I provided in “The Pam and Pedro Show” section, he says, “Microsoft will stand
    by Database Compatibility” as a certification model by


    *   Full functional protection if the `DMA` tool comes back clean with no errors.

    This means no breaking changes for your application if you pick an appropriate
    database compatibility level that comes back with no errors.


    *   Query plan shape protection on similar hardware

    This means the structure of a query plan (i.e. operators and their flow) should
    not change on similar hardware where you ran the query on a previous version using
    the same database compatibility level on the new version of SQL Server.


    To this date, our experience is that these bold statements are holding true with
    our customers.


    Here is my summary of what you can expect for backward compatibility as you think
    of migrating to SQL Server 2019:


    *   If you have been using a discontinued feature, your application might break
    after migrating.

    *   If you have been using a deprecated feature, you should be fine. But I would
    make plans to move away from relying on this deprecated functionality.

    *   Start with the database compatibility (dbcompat) level that matches the SQL
    Server version you were migrating from. If you are on SQL Server 2012, keep your
    dbcompat at 110 as a starting point.'
