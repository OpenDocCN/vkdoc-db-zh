- fmt: "# Deploying a SQL Server Container\n\nYou really need to see containers in\
    \ action to appreciate the power of what they bring and how they work. If you\
    \ remember the container lifecycle I discussed earlier in the chapter, Microsoft\
    \ has already completed the build and push steps for SQL Server containers. I\
    \ will discuss later in the chapter how you will build your own images based on\
    \ SQL Server, but for now I’ll show you the **pull ➤ run** sequence and **stop\
    \ ➤ start ➤ remove** manage sequence. And I will show you other docker commands\
    \ you can use to explore containers.\n\n**IMPORTANT**: You must copy the WideWorldImporters\
    \ backup file into a local directory where you run these scripts to go through\
    \ this activity. You can download this backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak).\n\
    \nAll the examples in this section can be found at `ch7_inside_sql_containers\\\
    deploy`. Use the `dockerpowershell` directory for Windows. For Linux and macOS\
    \ users, use the `dockerbash` directory (be sure to make your scripts executable\
    \ with `chmod u+x <script>`). I’ll walk you through in this chapter the PowerShell\
    \ examples.\n\n## Run the SQL Server Container\n\nRun the following command from\
    \ PowerShell to start a SQL Server container. (I choose to use the Terminal option\
    \ in Azure Data Studio (ADS) to run the scripts or script `step1_dockerrunsql.ps1`.)\
    \ Since the image for SQL Server 2019 is not locally on my computer, docker will\
    \ do a pull first and then start the container:\n\n```\ndocker run -e \"ACCEPT_EULA=Y\"\
    \ -e \"SA_PASSWORD=Sql2019isfast\" -p 1433:1433 --name sql2019latest --hostname\
    \ sql2019latest -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\nFigure\
    \ 7-3 shows an example in ADS for this script to pull the SQL Server 2019 RHEL\
    \ image.\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig3_HTML.jpg](images/479130_1_En_7_Chapter/479130_1_En_7_Fig3_HTML.jpg)\n\
    \n*Figure 7-3 Deploying a SQL Server RHEL container*\n\nYou may want to see more\
    \ about the SQL Server 2019 image. You can do that with a command like the following:\n\
    \n```\ndocker inspect mcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\n\
    The output will be a very long JSON file. Take note of this interesting section\
    \ of the output:\n\n```\n\"Cmd\": [\n\"/bin/sh\",\n\"-c\",\n\"#(nop) \",\n\"CMD\
    \ [\\\"/opt/mssql/bin/sqlservr\\\"]\"\n],\n```\n\nThis shows you the `CMD` from\
    \ the Dockerfile which is to just run `sqlservr`. Unfortunately, there is not\
    \ a proven way to confirm what the base image of a container image is. I’ve seen\
    \ lots of programs out there, and the `docker history` command for our containers\
    \ doesn’t give the name of the base image.\n\nWhen the container is run, unfortunately\
    \ you will not know if SQL Server started correctly or not. The command will dump\
    \ out a long “guid” value and come back to the command prompt. We can use the\
    \ docker tool to see if the container started plus try to connect to SQL Server.\n\
    \n## Check Container Status\n\nRun the following command to see the status of\
    \ the container that was run for SQL Server:\n\n```\ndocker ps\n```\n\nYour output\
    \ will look something like the following if SQL Server was started successfully.\n\
    \n```\nCONTAINER ID        IMAGE                                             COMMAND\
    \                  CREATED\nSTATUS                  PORTS                    NAMES\n\
    95345f25b901        mcr.microsoft.com/mssql/rhel/server:2019-latest   \"/opt/mssql/bin/sqls...\"\
    \   About a minute ago   Up About a minute       0.0.0.0:1401->1433/tcp   sql2019latest\n\
    ```\n\n## Connect to SQL Server\n\nThe only true way to see if SQL Server started\
    \ is to try and connect to it. You can connect with a program outside the container\
    \ or inside the container. Let’s use a way outside the container first by executing\
    \ the following command or use the script `step2_dockerconnecttosql.ps1`:\n\n\
    ```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n\
    ```\n\nYour output should look something like the following (the version may be\
    \ different since I did this with SQL Server 2019 CTP 3.2):\n\n```\nMicrosoft\
    \ SQL Server 2019 (CTP3.2) - 15.0.1800.32 (X64)\nJul 17 2019 21:29:33\nCopyright\
    \ (C) 2019 Microsoft Corporation\nDeveloper Edition (64-bit) on Linux (Red Hat\
    \ Enterprise Linux Server 7.6 (Maipo)) \n```\n\nNotice SQL Server thinks it is\
    \ running on RHEL 7.6. I’ve also mentioned that the container is a program running\
    \ in an isolated manner. You can prove that if you are on Linux systems by running\
    \ the following command on the host.\n\n```\nps -axf\n```\n\nYour output should\
    \ look something like this (the PID values will likely be different):\n\n```\n\
    /usr/bin/containerd\n22846 ?        Sl     0:02  \\_ containerd-shim -namespace\
    \ moby -workdir /var/lib/containerd/io.containerd.runtime.v1.linux/moby/4f5c\n\
    22864 ?        Ssl    0:00      \\_ /opt/mssql/bin/sqlservr\n22909 ?        Sl\
    \     31:37          \\_ /opt/mssql/bin/sqlservr\n```\n\n### For Windows and macOS\
    \ Users\n\nWindows and macOS users: I have a trick for you to see this same type\
    \ of information. Since the SQL Server Linux container is running in a Linux VM,\
    \ how can you access the VM itself?\n\nTry this out. Run the following commands\
    \ either from PowerShell or your macOS terminal (complete credit to this blog\
    \ post [`https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos`](https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos)):\n\
    \n```\ndocker container run --rm -it -v /:/host alpine\n```\n\nYou should get\
    \ a root prompt. Now run this command:\n\n```\nchroot /host\n```\n\nYou are now\
    \ in a Bash shell in the context of the Linux VM on Windows. You are limited in\
    \ what you can do, and the `ps` command earlier does not work. But you can run\
    \ this command:\n\n```\nps -o ppid,pid,comm\n```\n\nThis will dump out a bunch\
    \ of processes, and since `sqlservr` was just started, it should be near the end\
    \ of the list. There will be two `sqlservr` processes like this (your values will\
    \ likely be different):\n\n```\n2922  2946 sqlservr\n2946  2991 sqlservr\n```\n\
    \nFor the first `sqlservr` process, the value on the left side is the `ppid` or\
    \ parent pid. Now run this command (substitute in your `ppid` value):\n\n```\n\
    ps | grep 2922\n```\n\nYou should see a result like this:\n\n```\n2922 root  \
    \    0:00 containerd-shim -namespace moby -workdir /var/lib/docker/containerd/daemon/io.containerd.runtime.v1.linux/moby/a0c005ccefe8c8a716e066b0a857e919bded6f50ac791cb82f6de2b0dbef220e\
    \ -address /var/run/docker/containerd/containerd.sock -containerd-binary /usr/local/bin/containerd\
    \ -runtime-root /var/run/docker/runtime-runc -debug\n```\n\nThis is a docker process\
    \ that is used to fork the container program which in this case is `sqlservr`.\n\
    \n## Copy the Backup File\n\nTo restore the WideWorldImporters backup, you must\
    \ copy this into the writeable layer of the container. Run the following command\
    \ or script `step3_dockercopybackup.ps1`:\n\n```\ndocker cp c:\\sql_sample_databases\\\
    WideWorldImporters-Full.bak sql2019latest:/var/opt/mssql\n```\n\nBy copying the\
    \ backup file into `/var/opt/mssql`, the backup file is immediately accessible\
    \ by SQL Server in the container.\n\n## Restore the Database\n\nWith the backup\
    \ in the writeable layer, SQL Server in the container context can access this\
    \ backup so you can restore it. To restore the database, you can use the `sqlcmd`\
    \ tool that exists in the container. For this you can use the `docker exec` command\
    \ like the following or in the script `step4_dockerrestorebackup.ps1`:\n\n```\n\
    docker exec -it sql2019latest /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P\
    \ \"Sql2019isfast\" -Q \"RESTORE DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
    \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
    \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
    \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
    \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n```"
