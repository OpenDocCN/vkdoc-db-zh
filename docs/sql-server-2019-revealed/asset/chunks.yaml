    ## 边缘约束


    虽然 `NODE` 和 `EDGE` 的 T-SQL 语法提供了一种利用 SQL Server 表构建图数据的绝佳新方式，但在 SQL Server 2017
    中，尚无法强制实施节点和边缘数据的 *完整性*。就像 SQL Server 表中的外键约束概念一样，SQL Server 2019 提供了对节点和边缘强制实施数据完整性的能力。


    考虑一下你刚刚使用本章示例构建的社交网络。能够确保 `friendOf` 边缘表中的任何数据都必须来自 `Person` 表中的有效行，这将是非常好的。边缘约束提供了这种能力。


    此外，边缘约束强制实施正确的网络关系。在我们的社交网络模型中，一个 `Person` 可以喜欢一家 `Restaurant`，但一家 `Restaurant`
    不能喜欢一个 `Person`。边缘约束同样可以强制实施这一点。更进一步，边缘约束确保边缘不会 *悬空*。借助边缘约束，如果边缘表中存在数据，你将无法删除作为边缘关系一部分的节点。再次说明，此行为类似于传统关系表中的外键。


    你可以在以下文档中阅读更多关于边缘约束的信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/tables/graph-edge-constraints`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/graph-edge-constraints)
    或者 Shreya 的另一篇博客文章：[`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/09/28/public-preview-of-graph-edge-constraints-on-sql-server-2019/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/09/28/public-preview-of-graph-edge-constraints-on-sql-server-2019/)。


    ## 在图中表使用 MERGE


    SQL Server 提供了一个名为 `MERGE` 的 T-SQL 语句，它根据与源表连接的结果，在目标表上执行插入、更新或删除操作。在 SQL Server
    2017 中，你可以使用 `MERGE` 语句对节点表进行整合的 DML 操作，但不能用于边缘表。SQL Server 2019 现在提供了同样将 `MERGE`
    用于边缘表的能力。


    请查看 Shreya 在她关于此主题的博客文章中的一些精彩示例：[`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/07/16/match-support-in-merge-dml-for-graph-tables/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/07/16/match-support-in-merge-dml-for-graph-tables/)。


    ## UTF-8 支持


    早在 1990 年代初，应用程序和数据库就一直使用 Unicode 作为对字符数据进行编码的标准。Windows 上的 SQL Server 几乎在产品存在之初就包含了支持
    Unicode 字符编码的数据类型和排序规则。SQL Server 2019 引入了一种称为 `UTF-8` 的新 Unicode 编码方法，它通常在 Linux
    系统上被应用程序和数据库广泛使用。


    如果你想在阅读本节之前了解更多关于 Unicode 的基础知识，可以使用以下资源：


    [`https://docs.microsoft.com/en-us/windows/win32/intl/unicode`](https://docs.microsoft.com/en-us/windows/win32/intl/unicode)

    [`https://en.wikipedia.org/wiki/Unicode`](https://en.wikipedia.org/wiki/Unicode)

    [`https://unicode.org/standard/WhatIsUnicode.html`](https://unicode.org/standard/WhatIsUnicode.html)


    ### Unicode 与 SQL Server


    SQL Server 支持 Unicode 编码的常规方式是通过 `nchar` 和 `nvarchar` 数据类型。SQL Server 使用 `UTF-16`
    编码方案支持这些数据类型的 Unicode 编码。`UTF-16` 要求每个“字符”最少使用 2 字节来存储数据。使用 `UTF-16` 的 ASCII 字符
    “a” 需要 2 字节的存储空间。当你定义如下列时：


    ```

    col1 nchar(10) not null

    ```


    SQL Server 需要为此列分配 20 字节的存储空间，即使你只使用标准 ASCII 字符。


    这与以下列定义形成对比：


    ```

    col1 char(10) not null

    ```


    它需要 10 字节，但只能存储 ASCII 字符集中的字符。


    ### 注意


    开发人员和数据专业人员常犯的一个错误是使用 `nchar`、`char` 等类型时，默认其长度是字符数而非字节存储量。


    `UTF-16` 允许表示整个 Unicode 字符范围，因为许多超出 ASCII 字符的语言支持字符需要 2 字节来表示该字符。


    ### 为什么使用 UTF-8？


    虽然大多数应用程序和数据库（如 SQL Server）对 Unicode 字符编码使用 `UTF-16`，但 Linux 社区中的许多人使用一种称为 `UTF-8`
    的编码。`UTF-8` 与 `UTF-16` 类似，因为它支持整个 Unicode 字符集，但根据所存储的字符不同，采用不同的编码和字节存储方案。例如，ASCII
    字符在 `UTF-8` 中只需要 1 字节存储，而在 `UTF-16` 中需要 2 字节。


    考虑一个仅针对 ASCII 字符集开发但需要更新以支持所有 Unicode 字符的应用程序。该应用程序可能在 SQL Server 中使用了 `char`
    和 `varchar` 数据类型。在 SQL Server 支持 `UTF-8` 之前，数据专业人员需要将所有 SQL Server 列的数据类型从 `char`
    更改为 `nchar`，从 `varchar` 更改为 `nvarchar`。使用 `ALTER TABLE` 以这种方式更改数据类型，对于 ASCII 字符来说，实际上使这些列的存储需求翻倍，即使最初你只使用
    ASCII 字符。


    现在，有了 SQL Server 2019，另一种选择是保留数据类型为 `char` 和 `varchar`，但将列的排序规则更改为使用新的 `UTF-8`
    排序规则，例如 `LATIN1_GENERAL_100_CI_AS_SC_UTF8`。`ALTER TABLE` 允许你在列级别更改排序规则。`UTF-8`
    编码对于 ASCII 字符仅需要 1 字节的存储空间。


    请谨慎做出这些决定，因为 `UTF-8` 有一些限制，并且对于某些字符，`UTF-8`（非 ASCII 字符）的存储需求比 `UTF-16` 更大。


    SQL Server for Windows、Linux 和容器均支持 `UTF-8`（请记住，由于 SQLPAL 架构，SQL Server on Linux
    支持“Windows”排序规则。文档说明 `UTF-8` 仅支持 Windows 排序规则，不支持 SQL 排序规则）。


    使用这些资源来研究 `UTF-8` 是否适合你：


    [`https://cloudblogs.microsoft.com/sqlserver/2018/12/18/introducing-utf-8-support-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/18/introducing-utf-8-support-in-sql-server-2019-preview/)

    [`https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support`](https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support)

    [`https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support#utf8`](https://docs.microsoft.com/en-us/sql/relational-databases/collations/collation-and-unicode-support#utf8)

    '
- fmt: '## SQL Server Machine Learning Services


    When I joined the SQL Engineering team in 2016, after working in Microsoft support
    for 20+ years, Joseph Sirosh was the VP in charge of SQL Server. SQL Server 2016
    had just shipped, and I knew Joseph was particularly proud of the work the SQL
    Server team had done to integrate Machine Learning through the R programming language
    with the product.


    Joseph is a data scientist and has an incredible passion for Machine Learning
    and Data. As an open source language, R is one of the most popular programming
    languages for data science and Machine Learning, so integrating this with SQL
    Server seemed like a natural fit. In addition, in 2015, Microsoft had acquired
    a company called Revolution Analytics, which had built a commercial version of
    R, including changes to make it more scalable, called `RevoScaleR`. (See this
    resource for the history of R, [`https://en.wikipedia.org/wiki/R_(programming_language)`](https://en.wikipedia.org/wiki/R_%2528programming_language%2529).)
    Joining these forces to build a Machine Learning platform for data with SQL Server
    was now possible. This original feature was called `SQL Server 2016 R Services`.
    SQL Server 2017 introduced integration with the Python programming language, using
    the same concepts and architecture. With this change, the new capability of R
    and Python together became `SQL Server Machine Learning Services`.


    While the changes for SQL Server Machine Learning Services (ML Services) for SQL
    Server 2019 are not significant, this capability may be something new you are
    looking at, so I’ll spend some brief time talking about how it works. This is
    important for several reasons:


    *   Understanding how ML Services works and the benefits of using it will allow
    you to make decisions on whether this capability is right for you and your application.

    *   You can gain more confidence in allowing ML Services to be used with SQL Server
    if you know more about the integration, security, and governance of this capability.

    *   The architecture, called the `Extensibility Framework`, used for ML Services
    is the same one used for what is called SQL Server Language Extensions, new for
    SQL Server 2019.


    Before you read the rest of this chapter, consider reviewing the documentation
    of SQL Server ML Services at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-server-machine-learning-services`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-server-machine-learning-services).


    ### How It Works


    Prior to SQL Server ML Services, data scientists developed and executed their
    *models* (a term often used for a Machine Learning program) on separate computers
    (workstations or servers) where all data, such as SQL Server, was accessed remotely.
    In many cases, R or Python programs used for these models would simply “pull back”
    an entire table and filter the results in the program, thus not taking advantage
    of the power of languages like SQL.


    SQL Server ML Services offers a new capability to execute scalable Machine Learning
    programs under the following concepts:


    *   Machine Learning programs are executed on the same computer as SQL Server,
    but in independent processes from `SQLSERVR.EXE`.

    *   SQL Server provides a T-SQL interface through a system stored procedure, `sp_execute_external_script`,
    to execute Machine Learning code.

    *   SQL Server provides an architecture for intelligent data exchange and scalability
    with Machine Learning code.


    Consider Figure [5-6](#479130_1_En_5_Chapter.xhtml#Fig6) for the SQL Server ML
    Services architecture, called the `Extensibility architecture in SQL Server Machine
    Learning Services`, as found in the SQL Server documentation at [`https://docs.microsoft.com/en-us/sql/advanced-analytics/concepts/extensibility-framework#architecture-diagram`](https://docs.microsoft.com/en-us/sql/advanced-analytics/concepts/extensibility-framework%2523architecture-diagram).


    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig6_HTML.jpg](images/479130_1_En_5_Chapter/479130_1_En_5_Fig6_HTML.jpg)


    Figure 5-6: The SQL Server ML Services architecture


    Unfortunately, the documentation does not provide the details of the numbers in
    the diagram, so I’ll do so here, which will help you understand more how it works.'
