  \ 1 行。问题在于表变量有大约 300 万行！对如此多的行使用 Nested Loops Join 将非常昂贵且不合理。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig14_HTML.jpg](img/479130_1_En_2_Fig14_HTML.jpg)\n\
