  如果你点击该点并在底部窗格中查看查询计划，将鼠标悬停在 Table Scan 运算符上。注意其估计值为 1，如图 2-13 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig13_HTML.jpg](img/479130_1_En_2_Fig13_HTML.jpg)\n\
