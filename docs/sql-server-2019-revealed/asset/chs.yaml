  2.5 秒的平均值远好于 25 秒。\n现在查看查询计划。将鼠标指针移到 Table Scan 运算符上。注意估计值现在是准确的，而且，既然需要进行表扫描，使用批处理模式是有意义的。这是同时使用多个智能查询处理功能的一个例子。此运算符的详细信息应如图\
  \ 2-15 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig15_HTML.jpg](img/479130_1_En_2_Fig15_HTML.jpg)\n\
  *图 2-15 使用表变量时更好的估计值*\n\n现在查看表变量与 OrderHistoryExtended 表的联接。现在使用了一个 Hash Join（哈希联接），同时也对\
  \ OrderHistoryExtended 表进行了表扫描。\n\n\n\n### 行存储上的批处理模式\n\nSQL Server 2012 添加了一项巧妙（说得太轻了！）、如今非常著名的能力，称为**列存储索引**，该项目代号\
  \ Apollo。原始博客见 [`https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/`](https://cloudblogs.microsoft.com/sqlserver/2011/08/04/columnstore-indexes-a-new-feature-in-sql-server-known-as-project-apollo/)。作为交付此功能的一部分，查询处理器得到增强，可与列存储索引一起使用行的**批处理模式**。在此之前，计划操作符（如扫描）执行和处理数据是基于单个行（以及整行）。批处理模式提供了一种新的范式，允许操作符基于按列组织并包含向量以标识合格行的行批来处理数据。这个概念与列存储索引非常契合，因为列存储索引是按列而非按行组织的。\n\
  \n虽然列存储索引对于需要扫描和处理大量行的分析查询工作负载非常有帮助，但它可能不符合您的需求，或者可能存在限制阻止您使用它。此外，您可能有一些符合“分析工作负载”场景的查询。换句话说，您并非试图查询单行或仅几行（许多人认为这是正常的“OLTP\
  \ 场景”）。任何未使用列存储索引组织的表或索引都被恰当地命名为**行存储**。\n\n在 SQL Server 2019 中，查询处理器可以自动检测您的查询是否符合在行存储上进行批处理模式处理的条件。同样，批处理模式可能并不适用于所有查询，因此必须满足一些基本条件。例如，您的查询需要处理*大量*行，并涉及需要聚合（例如\
  \ `count(∗)` 或 `sum()`）、连接或排序的操作。换句话说，当大量行在多个操作符之间流动以执行查询时，批处理才有意义。多少算大量？我们没有在文档中说明具体数字（因为将来可能会改变），但阈值通常是\
  \ 128K 行。\n\n您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#batch-mode-on-rowstore`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523batch-mode-on-rowstore)\
  \ 阅读有关行存储上批处理模式的所有详细信息，包括启用和禁用此功能。该文档文章详细介绍了此功能的背景，包括哪些工作负载会受益，以及限制和约束。\n\n### 提示\n\
  \n您是否想真正深入这个主题？那么您会喜欢 SQL 社区专家 Dima Pilugin 的博客文章，他调试了神奇的 128K 数字。您可以在此处阅读该博客：[`www.queryprocessor.com/batch-mode-on-row-store/`](http://www.queryprocessor.com/batch-mode-on-row-store/)。\n\
  \n使用您在本章开始时恢复并扩展的 `WideWorldImportersDW` 数据库，让我们看一个示例，其中行存储的批处理模式可以加速查询性能。所有脚本示例请使用目录\
  \ **ch2_intelligent_performance\\iqp\\batchmoderow**。\n\n您可以从提供的示例脚本 **iqp_batchmoderow.sql**\
  \ 或从 T-SQL 笔记本 **iqp_batchmoderow.ipynb** 运行以下查询。\n\n无论采用哪种方法，让我们一步一步来。对于本节，我鼓励您尝试\
  \ T-SQL 笔记本示例。您可以使用 `iqp_batchmoderow.sql` 和任何 SQL 工具，但您需要在图形工具（如 SSMS 或 Azure Data\
  \ Studio）中分析查询计划（或详细阅读计划 XML）。\n\n打开连接到 SQL Server 2019 实例的 Azure Data Studio，并打开\
  \ **iqp_batchmoderow.ipynb** 笔记本。\n\n笔记本的一个美妙之处在于每个步骤和单元格的文档都在笔记本本身中。而且，保存在本书 GitHub\
  \ 仓库下的笔记本已经包含了所有答案，因此您知道可以期待什么！\n\n我甚至放入了使用 Azure Data Studio 的查询计划差异图像示例以及您应该期望看到的内容。\n\
  \n阅读并遵循笔记本的每个步骤。您将看到行存储上的批处理模式可以显著提高性能，尤其是在处理大型数据集表时。此外，批处理模式现在同时适用于列存储（在 SQL Server\
  \ 2017 中实现）和行存储，因此您无需担心。查询处理器知道何时使用它以及如何帮助提升查询性能。\n\n作为完整性检查，图 2-16 显示了加载后此示例笔记本顶部的样子。\n\
  \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig16_HTML.jpg](img/479130_1_En_2_Fig16_HTML.jpg)\n\
  \n图 2-16\n\n用于演示行存储上批处理模式的 T-SQL 笔记本\n\n### 标量 UDF 内联\n\nSQL Server 很久以前就有一个称为用户定义函数的概念。这个概念是您在\
  \ `FUNCTION` 中构建一些 T-SQL 代码，该函数接受一个或多个参数，并返回一个值。然后您可以在任何 T-SQL `SELECT` 语句中使用该函数。这是一种像存储过程一样的代码重用流行方式，但函数具有作为\
  \ `SELECT` 语句*一部分*的良好特性。\n\n## 注意\n\n用户定义函数还有其他用途，您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-function-transact-sql)\
  \ 阅读更多信息。\n\n用户定义函数有两种类型：\n\n*   标量，返回单个值\n*   表值，以 `TABLE` 类型的形式返回结果集\n\n尽管 UDF\
  \ 很流行且具有编程优势，但它们的使用可能会导致性能问题，因为它们在编译和集成到整个查询计划中的方式存在限制。例如，任何时候使用标量 UDF 作为列列表的一部分来返回值，作为所访问表一部分的每一行都会被应用到\
  \ UDF 的代码中，*一次一行*。查询处理器在处理 UDF 时还有其他限制，在某些情况下，这从性能角度来看使它们效率非常低。\n\n现在出现了标量 UDF **内联**。查询处理器可以获取代码（UDF\
  \ 可能包含多个 T-SQL 语句），并能够将这些语句与整个查询集成，因此称为内联。\n\n您可以通过使用 `dbcompat` 在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#enabling-scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523enabling-scalar-udf-inlining)\
  \ 文档中阅读如何启用标量 UDF 内联。\n\n您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining?#disabling-scalar-udf-inlining-without-changing-the-compatibility-level`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining%253F%2523disabling-scalar-udf-inlining-without-changing-the-compatibility-level)\
  \ 阅读有关如何在不更改 `dbcompat` 的情况下禁用和启用标量 UDF 内联的更多信息。\n\n与所有这些智能查询处理场景一样，最好看一个示例。所有脚本示例请使用目录\
  \ **ch2_intelligent_performance\\iqp\\scalarinlineudf**。\n\n与本章中的其他示例一样，您有两种方式来体验标量\
  \ UDF 内联。您可以使用 **iqp_scalarudfinlining.pynb** T-SQL 笔记本或使用一组 T-SQL 脚本。\n\n\n\n##\
  \ 注意事项\n\n本文档示例基于微软的一篇博文，博文链接为[`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2018/11/07/introducing-scalar-udf-inlining/)。该博文还详细介绍了标量\
  \ UDF 函数先前存在的限制，以及智能查询处理如何实现显著的性能提升。\n\n对于本节内容，让我们结合 SQL Server Management Studio\
  \ (SSMS) 中的实际执行计划来检查 T-SQL 脚本。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig17_HTML.jpg](img/479130_1_En_2_Fig17_HTML.jpg)\n\
  *图 2-17 未内联的标量 UDF 的执行计划*\n\n1.  打开 T-SQL 脚本 **get_customer_spend.sql**。\n该脚本代码如下：\n\
  ```\n    USE WideWorldImportersDW\n    GO\n    SELECT c.[Customer Key], SUM(oh.[Total\
  \ Including Tax]) as total_spend\n    FROM [Fact].[OrderHistory] oh\n    JOIN [Dimension].[Customer]\
  \ c\n    ON oh.[Customer Key] = c.[Customer Key]\n    GROUP BY c.[Customer Key]\n\
  \    ORDER BY total_spend DESC\n    GO\n    ```\n此脚本将找出 `OrderHistory` 表中每个客户的总消费金额。检查输出，您可以看到客户的消费范围从\
  \ 200 万到超过 700 万。根据应用程序需求，我们需要创建一个用户定义函数，该函数以客户“键”作为输入，并根据其总消费金额将客户分类到某个类别中。任何小于等于\
  \ 300 万的标记为 'REGULAR'。消费在 300 万到 450 万之间的客户标记为 'GOLD'。超过此金额的任何人将被视为 'PLATINUM'。使用函数的优势在于，我们可以更改判定\
  \ REGULAR、GOLD 或 PLATINUM 的规则，而不会影响所有其他使用此函数的代码。\n\n2.  打开 T-SQL 脚本 **iqp_scalarudfinlining.sql**，并按照脚本中的注释执行每个步骤。\n\
  \n3.  执行脚本中的 **Step 1** 部分，这将创建标量 UDF。\n```\n    -- Step 1: 创建一个新函数，根据订单消费获取客户类别\n\
  \    USE WideWorldImportersDW\n    GO\n    CREATE OR ALTER FUNCTION [Dimension].customer_category\n\
  \    RETURNS CHAR(10) AS\n    BEGIN\n    DECLARE @total_amount DECIMAL(18,2)\n \
  \   DECLARE @category CHAR(10)\n    SELECT @total_amount = SUM([Total Including\
  \ Tax])\n    FROM [Fact].[OrderHistory]\n    WHERE [Customer Key] = @CustomerKey\n\
  \    IF @total_amount <= 3000000\n    SET @category = 'REGULAR'\n    ELSE IF @total_amount\
  \ < 4500000\n    SET @category = 'GOLD'\n    ELSE\n    SET @category = 'PLATINUM'\n\
  \    RETURN @category\n    END\n    GO\n    ```\n\n4.  设置数据库兼容性级别 (`dbcompat`)，清除过程缓存，并通过执行\
  \ **Step 2** 预热缓冲池缓存。\n```\n    -- Step 2: 将数据库设置为 db compat 150，清除之前执行的过程缓存，并通过预热缓存使比较公平\n\
  \    ALTER DATABASE WideWorldImportersDW\n    SET COMPATIBILITY_LEVEL = 150\n  \
  \  GO\n    ALTER DATABASE SCOPED CONFIGURATION\n    CLEAR PROCEDURE_CACHE;\n   \
  \ GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n    ```\n\n5.  让我们运行一个使用\
  \ UDF 的查询，但使用查询提示临时禁用标量 UDF 内联。在 SSMS 中启用实际执行计划，并按脚本顺序运行 **Step 3**。\n```\n    --\
  \ Step 3: 运行查询，但使用查询提示禁用标量内联功能\n    SELECT [Customer Key], [Customer], [Dimension].customer_category\
  \ AS [Discount Price]\n    FROM [Dimension].[Customer]\n    ORDER BY [Customer Key]\n\
  \    OPTION (USE HINT('DISABLE_TSQL_SCALAR_UDF_INLINING'))\n    GO\n    ```\n该查询至少需要\
  \ 30 多秒。实际执行计划应类似于图 2-17。\n如果将鼠标指针悬停在每个运算符上，您会看到它影响了 403 行。这看起来行数并不多，那为什么需要这么长时间？这是因为您看不到的是，标量函数访问了具有\
  \ 300 万+行的 `OrderHistory` 表；对于 `Dimension.Customer` 表中的每一行，它都要访问 `OrderHistory`\
  \ 表中的所有 300 万行。效率很低。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig18_HTML.jpg](img/479130_1_En_2_Fig18_HTML.jpg)\n\
  *图 2-18 启用内联的标量 UDF 的执行计划*\n\n1.  运行脚本中的 **Step 4**，它将运行相同的查询但不使用提示，从而启用标量 UDF 内联。\n\
  ```\n    -- Step 4: 再次运行，但不使用提示\n    SELECT [Customer Key], [Customer], [Dimension].customer_category\
  \ AS [Discount Price]\n    FROM [Dimension].[Customer]\n    ORDER BY [Customer Key]\n\
  \    GO\n    ```\n查询的执行速度应该显著加快。如果查看实际执行计划，您将看到运行函数所需的操作符如何在计划中展现出来，以及为了支持函数中的查询，如何使访问\
  \ `OrderHistory` 表更高效的新操作符。该计划将类似于图 2-18。\n\n您可以看到标量 UDF 内联的强大功能；现在您应该更有信心在应用程序中使用标量\
  \ UDF 了。\n\n您可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining`](https://docs.microsoft.com/en-us/sql/relational-databases/user-defined-functions/scalar-udf-inlining)阅读更多关于标量\
  \ UDF 内联的信息，包括所有要求和限制。\n\n\n### 近似计数不同值\n\n存在需要统计任何表中行数的场景。这很简单，只需使用 `SELECT COUNT(*)\
  \ FROM <table>` 即可得到答案。但也有些情况需要知道表中某一列在所有行中的不同值数量。此时，问题也不算太难，只需使用 `SELECT COUNT(DISTINCT\
  \ <col>) FROM <table>`。这看起来足够简单，唯一的问题在于查询处理器需要做大量工作来找出所有不同的值。\n\n对于 SQL Server，这通常需要使用\
  \ `Hash Match` 操作符。该操作符类似于 Hash Join，它使用一个“哈希表”来构建所有不同值的列表以进行计数。如果你还记得本章前面内容，Hash\
  \ Join 需要一个内存授权，因此所有与内存授权相关的问题都可能出现。此外，使用哈希表来统计所有不同值会消耗大量计算资源。\n\n有更好的方法吗？嗯，有一种不同的方法可能更快，代价是答案的精确度稍低。解决方案是一个名为\
  \ `APPROX_COUNT_DISTINCT()` 的新 T-SQL 函数。这是一个内置函数，它基于样本近似来统计列的不同值数量。这不是对 `COUNT()`\
  \ 函数的增强，而是一个全新的函数，这就是为什么它不需要 `dbcompat = 150`。该函数使用了一个称为 `HyperLogLog` 的概念（你可以在\
  \ [`https://en.wikipedia.org/wiki/HyperLogLog`](https://en.wikipedia.org/wiki/HyperLogLog)\
  \ 阅读更多关于此概念的内容）。使用近似值统计不同值会带来 2% 的误差率（在 97% 的概率下）。这意味着，如果你可以接受一个你认为很接近真实情况的答案，就可以使用此函数。\n\
  \n让我们看一个使用此函数与使用 `COUNT` 和 `DISTINCT` 的对比示例。\n\n所有脚本示例请使用目录 `ch2_intelligent_performance\\\
  iqp\\approxcount`。你可以使用 T-SQL 笔记本 `iqp_approxcountdistinct.ipynb` 来逐步查看示例。我还提供了一个名为\
  \ `iqp_approxcountdistinct.sql` 的 T-SQL 脚本。让我们使用这个 T-SQL 脚本，逐步检查查询和执行计划的差异。\n\n\
  ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig19_HTML.jpg](img/479130_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19\n\n`COUNT` 和 `DISTINCT` 的查询计划\n\n1.  在 SSMS 中打开 `iqp_approxcountdistinct.sql`\
  \ 脚本。\n2.  运行 **Step 1** 组的语句以清除过程缓存、将数据库兼容级别更改为 130，并预热缓冲池（以确保公平竞争）。\n\n    ```sql\n\
  \    -- Step 1: 清除缓存，将数据库兼容级别设置为 130 以证明其有效，并预热缓存\n    USE WideWorldImportersDW\n\
  \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE\n    GO\n\
  \    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 130\n    GO\n\
  \    SELECT COUNT(*) FROM Fact.OrderHistoryExtended\n    GO\n    ```\n\n你可能会好奇为什么我强制将\
  \ `dbcompat` 设置为 130——这是为了向你证明，利用此功能不必使用最新的 `dbcompat` 150。这是因为新的 T-SQL 函数 `APPROX_COUNT_DISTINCT()`\
  \ *仅仅* 随 SQL Server 2019 引擎提供，不像其他智能查询处理功能那样需要新的数据库兼容级别。\n\n3.  在 SSMS 中启用实际执行计划，然后按如下方式运行\
  \ **Step 2**：\n\n    ```sql\n    -- Step 2: 首先使用 COUNT 和 DISTINCT\n    SELECT COUNT(DISTINCT\
  \ [WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n    GO\n    ```\n\n根据计算机速度，此查询运行时间不会太长——大约\
  \ 4 到 5 秒。你的结果应该是 29620736。用五秒钟统计不同值并不算太糟。然而，如果这个表有一亿行或更多呢？在大型数据库中，这并不罕见。\n\n如果你查看执行计划，会看到类似图\
  \ 2-19 的内容。\n\n注意 `Hash Match` 操作符。将鼠标悬停在该操作符上，你会看到它使用行模式，并且必须在哈希操作符中处理全部 2900 万行数据。\n\
  \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig20_HTML.jpg](img/479130_1_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20\n\n`APPROX_COUNT_DISTINCT` 的查询计划\n\n1.  现在运行脚本中的 **Step 3**：\n\n    ```sql\n\
  \    -- Step 3: 使用新的 APPROX_COUNT_DISTINCT 函数来比较值和性能\n    -- 我们与实际不同值的偏差不应超过 2%（97%\
  \ 概率）\n    SELECT APPROX_COUNT_DISTINCT([WWI Order ID])\n    FROM [Fact].[OrderHistoryExtended]\n\
  \    GO\n    ```\n\n这次，查询应该只需要一两秒——比之前快了约 50%。同样，在非常大的数据集上，这可能意义重大。\n\n如果你查看执行计划，它看起来相似但操作符更少，如图\
  \ 2-20 所示。\n\n注意 `Hash Match` 操作符的输出没有“粗线”，因为近似操作随此操作符应用，只向计划的其余部分输出一行。\n\n如你所见，使用近似值来统计不同值可以提供更好的性能，前提是你只需要一个“足够接近”的值。\n\
  \n1.  通过执行脚本中的 **Step 4** 将数据库兼容级别恢复为 150。\n\n    ```sql\n    -- Step 4: 恢复数据库兼容级别\n\
  \    ALTER DATABASE WideWorldImportersDW SET COMPATIBILITY_LEVEL = 150\n    GO\n\
  \    ```\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/approx-count-distinct-transact-sql)\
  \ 阅读更多关于 `APPROX_COUNT_DISTINCT` 函数的内容。\n\n智能查询处理的核心在于，一个更智能的查询处理器无需对应用程序进行重大修改即可满足你的查询工作负载需求。大多数功能只需将数据库兼容级别更改为\
  \ 150 即可启用。随着查询处理器在未来基于你的反馈应对新场景，我期待看到更多的增强功能。\n\n\n## 轻量级查询分析\n\n2016 年我加入 SQL\
  \ Server 工程团队时，已在技术支持部门工作多年，处理过 SQL Server 客户遇到的一些最具挑战性的问题。其中，没有任何一类问题比性能问题更让我和\
  \ CSS 部门的同事们感到棘手。SQL Server 的性能问题非常棘手——它们模糊不清、时间紧迫，而且你几乎总是在需要时无法获得所需的信息。\n\nSQL\
  \ Server 提供了强大的性能问题诊断工具，包括`动态管理视图（DMVs）`和`扩展事件`。我们构建`DMVs`是为了提供一种出色的机制，让你能随时查看`正在运行的内容`。这是了解活动会话及其正在执行查询的好方法。但通常，要解决复杂的性能问题，你需要查询计划的详细信息。\n\
  \n因此，差距在于深入分析。你可以看到正在运行的内容，但无法深入查看活动查询的查询计划。此外，如果你需要查找已完成查询的查询计划详情，就必须使用`扩展事件`这种可能`影响较大`的诊断方式。或者，你需要找到确切的查询，并在单独的工具中`离线`（即远离应用程序）运行它，并开启查询计划诊断来获取所有细节。\n\
  \n加入工程团队后，我发现著名的老虎团队正在开展工作以解决这类问题。Pedro Lopes、Alexey Eksarevskiy 和 Jay Choe 已经在研究一个名为`查询分析基础设施`的项目。如果你问任何开发人员如何追踪代码，他们会使用`分析`这个术语。那么，在\
  \ SQL Server 中如何分析查询呢？这通常归结为获取查询执行计划的详细信息。关键在于在查询运行时获取这些洞见，并在查询完成后获取实际的查询执行计划。\n\
  \n这个团队已经建立了`实时查询统计信息`的概念。（你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/live-query-statistics)阅读更多关于这个主题的内容。）按逻辑，他们可以做得更多。正如\
  \ Alexey 所说，“我早在 2009 年就希望产品中能有这个功能……那时花了那么多时间盯着计划看，我真希望它们能‘活’过来，以便更容易看清发生了什么。于是有了实时查询统计信息的想法。这两者完美互补，尽管当然，轻量级分析允许做更多的事情。”\n\
  \n事实上，团队已经构建了一个查询执行统计信息分析基础设施，即`标准分析`。此功能为你提供操作符级别的行数、`CPU`和`I/O`的实际执行计划统计信息。这是分析查询的关键信息，但有个问题。你必须在运行查询前启用此功能，或者为所有查询启用`扩展事件`，这可能会影响生产工作负载。你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#the-standard-query-execution-statistics-profiling-infrastructure`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523the-standard-query-execution-statistics-profiling-infrastructure)阅读更多关于标准分析的内容。\n\
  \n我喜欢与 Pedro、Alexey 和 Jay 这样的同事一起工作。他们总是问，“我们能让这个变得更好吗？”当然，他们都非常聪明。他们从经验中知道使用标准分析可能有多么痛苦。他们创建了轻量级查询执行统计信息分析基础设施，即`轻量级分析`。其理念是在不需要标准分析所需开销的情况下获取查询分析。然而，为了使其“轻量”，我们不得不移除收集`CPU`统计信息的功能，因此你仍然可以获得“每个操作符”的行数和`I/O`统计信息。你可以在[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure%253F%2523lwp)阅读更多关于轻量级分析的内容。\n\
  \n这很好，但是……你仍然需要`开启它`才能使其工作。你怎么知道何时启用轻量级分析呢？嗯，通常你不知道。没人知道。真正的答案就是让轻量级分析`默认运行`。而这正是\
  \ SQL Server 2019 所提供的。Pedro 称之为，“随时随地获取性能洞见。”有陷阱吗？有。你只能从正在运行的查询中获取行数信息，但这通常足以帮助查看性能问题。但还有个额外好处。我们增加了为大多数缓存查询获取上一次实际执行计划的能力。\n\
  \n让我们看两个场景，以便你理解在 SQL Server 2019 中默认启用轻量级查询分析的好处。\n\n### 使用轻量级查询分析示例的先决条件\n\n首先，你需要进行一些设置来使用两个场景的示例。对于本章的示例，你将使用`WideWorldImporters`示例数据库（你可以在[`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)阅读更多关于该数据库及其架构的内容）。\n\
  \n这些示例适用于 Windows、Linux 和容器上的 SQL Server 2019。鉴于数据集较大，SQL Server 至少需要 12Gb `RAM`才能正确观察到性能差异。此外，部分查询示例使用了并行处理，因此更推荐在多处理器系统上安装\
  \ SQL Server。\n\n本章使用的所有脚本都可以在 GitHub 仓库的`ch2_intelligent_performance\\lwp`目录下找到。\n\
  \n要使用本章中的示例，你需要完成以下步骤：\n\n1.  从[`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)下载`WideWorldImporters`数据库备份。\n\
  \n2.  将此数据库还原到你的 SQL Server 2019 实例。你可以使用提供的`restorewwi.sql`脚本。你可能需要更改备份文件位置和数据库文件还原目录的路径。\n\
  \n3.  为了运行部分示例，你需要比`WideWorldImporters`默认安装更大的表。因此，运行脚本`extendwwi.sql`以创建更大的表。扩展此数据库将使其大小（包括事务日志）增加到总共约\
  \ 5Gb。其中一张表名为`Sales.InvoiceLinesExtended`。基于`InvoiceLines`表，我们将使这张表变得更大，并且不使用列存储索引。\n\
  \n\n\n### 我应该终止一个活动查询吗？\n\n考虑以下场景。有人告知你 SQL Server 正被一个查询占用，该查询在服务器上消耗了大量 CPU 资源。你使用像\
  \ `sys.dm_exec_requests` 这样的 DMV 来识别查询和用户。该用户是你的副总裁，正在运行一份报表，而查询是基于一个缓存计划。你使用常见的\
  \ DMV `sys.dm_exec_requests` 和 `sys.dm_exec_query_stats` 来查看哪个查询正在运行。你该如何判断这个查询是会很快完成，还是应该被终止并进行修正？\n\
  \n让我们通过以下示例来观察这种行为，并了解内置的、默认开启的轻量级查询分析如何能帮你找到答案。\n\n你可以在任何能连接到 SQL Server 的工具中运行这些\
  \ T-SQL 脚本，但最佳体验是在 SQL Server Management Studio (SSMS) 中查看所有细节。\n\n1.  打开 T-SQL\
  \ 脚本 `mysmartquery.sql`（这名字或许暗示它没那么智能）并执行该批处理。\n2.  在一个新连接中，打开 T-SQL 脚本 `show_active_queries.sql`。\n\
  3.  运行脚本中的 **步骤 1**，如下所示：\n\n    ```\n    -- 步骤 1: 仅显示除本连接外的活动查询请求\n    SELECT er.session_id,\
  \ er.command, er.status, er.wait_type, er.cpu_time, er.logical_reads, eqsx.query_plan,\
  \ t.text\n    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
  \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
  \ <> @@SPID\n    GO\n    ```\n\n    此代码查找任何活动查询（当前连接除外）。如果你反复运行此查询，你会看到 `cpu` 和\
  \ `logical_reads` 的值在增加，并且 `wait_type` 为 `ASYNC_NETWORK_IO`。这种模式表明两点：\n    *   该查询正在消耗大量\
  \ CPU 资源，并且很可能在扫描一个大表（`logical_reads` 值高且在增加）。\n    *   有大量结果正被发送回客户端（例如，`ASYNC_NETWORK_IO`\
  \ 等待）。\n\n根据我的经验，这不是一个“好”的查询，存在“优化”的机会。但问题是，你现在应该终止它，还是它“即将完成”？\n\n![活动查询的查询计划分析图](img/479130_1_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21：活动查询的查询计划分析图\n\n1.  当查询处于活动状态时，若能了解查询计划操作符（如实时查询统计信息）的进度会很有帮助。运行脚本中的 **步骤\
  \ 2**，如下所示：\n\n    ```\n    -- 步骤 2: 活动查询的查询计划分析图是什么样子\n    SELECT session_id, physical_operator_name,\
  \ node_id, thread_id, row_count, estimate_row_count\n    FROM sys.dm_exec_query_profiles\n\
  \    WHERE session_id <> @@SPID\n    ORDER BY session_id, node_id DESC\n    GO\n\
  \    ```\n\n    结果应类似于图 2-21。\n\n注意嵌套循环和表假脱机操作符巨大的 `estimate_row_count`（估计行数）。同时注意\
  \ `row_count`（这是当前已处理的行数）远低于估计值。可能估计不准确，但如果估计正确，此查询还远未完成。再次运行此查询以观察这些操作符 `row_count`\
  \ 的进展。\n\n## 注意\n\n当轻量级查询分析在 SQL Server 2019 中默认开启时，捕获的唯一统计信息是 `row_count`。默认情况下捕获\
  \ CPU 和 I/O 等统计信息可能开销较大。你可以使用标准分析来捕获这些信息。\n\n![活动查询的查询计划](img/479130_1_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22：活动查询的查询计划\n\n1.  让我们看一下查询计划本身。这是估计的计划，但可能为这些巨大的估计行数提供线索。运行脚本中的 **步骤 3**，如下所示：\n\
  \n    ```\n    -- 步骤 3: 回头查看计划和查询文本以寻找线索\n    SELECT er.session_id, er.command,\
  \ er.status, er.wait_type, er.cpu_time, er.logical_reads, eqsx.query_plan, t.text\n\
  \    FROM sys.dm_exec_requests er\n    CROSS APPLY sys.dm_exec_query_statistics_xml(er.session_id)\
  \ eqsx\n    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) t\n    WHERE er.session_id\
  \ <> @@SPID\n    GO\n    ```\n\n    在 SSMS 中，点击 `query_plan` 的值，这应该会打开一个带有可视化查询计划的新窗口。\n\
  \    该计划应类似于图 2-22。\n\n注意嵌套循环联接上带有 **X** 的图标符号。如果将鼠标指针悬停在嵌套循环联接操作符上，它将显示如图 2-23\
  \ 所示。\n\n![嵌套循环联接警告](img/479130_1_En_2_Fig23_HTML.jpg)\n\n图 2-23：嵌套循环联接警告\n\n“无联接谓词”是什么意思？这意味着查询中的\
  \ JOIN 操作符存在重大问题。这意味着实际上没有“等值”联接。\n\n在 **步骤 3** 的结果中，查看诊断信息的 `text` 列的值。它看起来像这样：\n\
  \n```\nSELECT si.CustomerID, sil.InvoiceID, sil.LineProfit\nFROM Sales.Invoices\
  \ si\nINNER JOIN Sales.InvoiceLines sil\nON si.InvoiceID = si.InvoiceID\nOPTION\
  \ (MAXDOP 1)\n```\n\n由于 JOIN 操作符有问题，让我们专注于 INNER JOIN 子句：\n\n```\nINNER JOIN Sales.InvoiceLines\
  \ sil\nON si.InvoiceID = si.InvoiceID\n```\n\n你会看到此查询只是将一个表与其自身联接。一个简单的拼写错误 `si`\
  \ 与 `sil` 就是问题所在。此查询几乎永远不会完成。它可以被终止或修正，而你的副总裁会高兴得多。\n\n1.  如果 `mysmartquery.sql`\
  \ 中的查询仍在运行，请将其取消。\n\n轻量级查询分析还包括扩展事件和查询提示支持以启用它。你可以在 `https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-profiling-infrastructure?#lwp`\
  \ 阅读更多关于如何启用这些功能以及如何按数据库禁用该功能的信息。\n\n\n\n### 我抓不住它\n\n考虑另一种场景。你观察到 SQL Server 的\
  \ CPU 使用率升高，并且认为这不应该发生（因为这与正常行为不同）。你可以从像 `sys.dm_exec_query_stats` 这样的动态管理视图（DMV）中看到哪些查询消耗了最多的\
  \ CPU，但你只能通过该 DMV 获取估计的执行计划。你可以尝试离线自行运行查询并观察实际执行计划，但你想看到来自应用程序的真实查询的实际执行计划，以确保你掌握了正确的细节。这个查询一直由许多用户运行，但每次只持续几秒钟（因此\
  \ CPU 持续处于较高水平），所以很难使用新工具来捕获正在运行的查询。你可以开启标准查询分析，但你发现那可能太重了，会在查询执行的关键时期导致应用程序问题。\n\
  \nSQL Server 2019 引入了一项名为轻量级查询分析的新功能。一个新的动态管理函数（DMF） `sys.dm_exec_query_plan_stats`\
  \ 随 SQL Server 2019 一同提供。其理念是捕获缓存查询的上一次实际执行计划。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-query-plan-stats-transact-sql)\
  \ 阅读关于使用此 DMF 的所有细节。\n\n让我们看看如何使用这个 DMF 来解决一个问题：找到一个一直在运行的查询的实际执行计划，而*无需*开启任何特殊的诊断、开关或标志，也无需手动运行查询。这里唯一需要注意的是，轻量级查询分析的这一部分功能确实需要你为每个想要启用此功能的数据库启用它。你可以使用以下\
  \ T-SQL 语句来完成，该语句将在稍后的示例中使用：\n\n```\nALTER DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS\
  \ = ON\n```\n\n本示例的所有脚本也可以在 `ch2_intelligent_performance\\lwp` 目录中找到。为了更轻松地查看可视化的执行计划，建议你使用\
  \ SSMS 运行此示例。\n\n1.  打开 T-SQL 脚本 `mysmartquery_top.sql`。\n2.  通过运行脚本中的 **Step 1**\
  \ 来设置示例，如下所示：\n\n    ```\n    -- Step 1: 清除过程缓存并将数据库兼容性级别设为 130，以证明你不需 150 就能使用最后计划统计信息\n\
  \    USE WideWorldImporters\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR\
  \ PROCEDURE_CACHE\n    GO\n    ALTER DATABASE [WideWorldImporters] SET COMPATIBILITY_LEVEL\
  \ = 130\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION SET LAST_QUERY_PLAN_STATS\
  \ = ON\n    GO\n    SELECT COUNT(*) FROM Sales.InvoiceLinesExtended\n    GO\n  \
  \  ```\n\n    将数据库兼容性级别设置为 130 只是为了证明你不需要 150 的兼容性级别就能使用此功能。\n\n3.  现在，通过运行脚本中的\
  \ **Step 2** 来模拟统计信息不正确的情况，如下所示：\n\n    ```\n    -- Step 2: 模拟一个过期的统计信息，将其设为一个非常低的值\n\
  \    UPDATE STATISTICS Sales.InvoiceLinesExtended\n    WITH ROWCOUNT = 1\n    GO\n\
  \    ```\n\n4.  现在运行查询。它应该只需要几秒钟，但完全消耗 CPU。运行脚本中的 **Step 3** 来执行查询，如下所示：\n\n## 注意\n\
  \n你不需要选择实际执行计划，因为我们是在模拟如何独立于应用程序来查看计划。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig24_HTML.jpg](img/479130_1_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24\n问题查询的估计查询计划\n\n1.  现在，让我们使用标准的 DMV 查看此查询的估计查询计划。运行 **Step 4** 查看估计计划。记住，这允许你从不同的连接查看该查询的计划。\n\
  \n    ```\n    -- Step 4: 估计计划怎么说？看起来像是基于估计的正确计划\n    SELECT st.text, cp.plan_handle,\
  \ qp.query_plan\n    FROM sys.dm_exec_cached_plans AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle)\
  \ AS st\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) AS qp\n    WHERE\
  \ qp.dbid = db_id('WideWorldImporters')\n    GO\n    ```\n\n    从输出中，你想找到 `text`\
  \ 列值以 “**-- Step 3**” 开头的那一行。点击该行的 `query_plan` 值。你应该会看到一个类似于图 2-24 的计划。\n\n   \
  \ ```\n    -- Step 3: 运行一个查询。这应该只需要几秒钟，但完全消耗 CPU\n    SELECT si.InvoiceID, sil.StockItemID\n\
  \    FROM Sales.InvoiceLinesExtended sil\n    JOIN Sales.Invoices si\n    ON si.InvoiceID\
  \ = sil.InvoiceID\n    AND sil.StockItemID >= 225\n    GO\n    ```\n\n    注意从聚集索引扫描出来的那条线有多细。这是因为优化器估计\
  \ `InvoiceLinesExtended` 表只有一行。但这只是估计计划，所以你不知道这是否是错误的（你刚刚模拟了估计行数是错误的，但假装你并不知道这一点）。\n\
  \n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig25_HTML.jpg](img/479130_1_En_2_Fig25_HTML.jpg)\n\
  \n    图 2-25\n    问题查询的实际查询计划\n\n1.  现在，让我们使用新的 DMV 来获取此查询的上一次实际计划，看看估计行数是否不正确。运行\
  \ **Step 5**，如下所示：\n\n    ```\n    -- Step 5: 上一次实际计划怎么说？哎呀，实际值与估计值相差甚远\n    SELECT\
  \ st.text, cp.plan_handle, qps.query_plan, qps.*\n    FROM sys.dm_exec_cached_plans\
  \ AS cp\n    CROSS APPLY sys.dm_exec_sql_text(cp.plan_handle) AS st\n    CROSS APPLY\
  \ sys.dm_exec_query_plan_stats(cp.plan_handle) AS qps\n    WHERE qps.dbid = db_id('WideWorldImporters')\n\
  \    GO\n    ```\n\n    在这个例子中，我们使用的是 `dm_exec_query_plan_stats` 而不是 `dm_exec_query_plan`。在列表中再次找到该查询，并点击\
  \ `query_plan` 值。该计划应该看起来像图 2-25。\n\n    注意那些“更粗”的线。这是因为实际需要处理的行数远大于估计值。这是一个问题，也解释了为什么优化器选择使用嵌套循环连接并将\
  \ `InvoiceLinesExtended` 作为“外部”表（因为它认为只有一行）。\n\n    ![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig26_HTML.jpg](img/479130_1_En_2_Fig26_HTML.jpg)\n\
  \n    图 2-26\n    更优查询的实际计划\n\n1.  更新统计信息以纠正它们，这样你就可以看到查询真正应该做什么。运行脚本中的 **Step 6**，如下所示：\n\
  \n    ```\n    -- Step 6: 将统计信息更新为正确的值并清除过程缓存\n    UPDATE STATISTICS Sales.InvoiceLinesExtended\n\
  \    WITH ROWCOUNT = 3652240\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR\
  \ PROCEDURE_CACHE\n    GO\n    ```\n\n2.  使用脚本中的 **Step 7** 再次运行查询，让我们看看新的实际计划。你会注意到它运行得快了一点：\n\
  \n    ```\n    -- Step 7: 再次运行查询。更快了\n    SELECT si.InvoiceID, sil.StockItemID\n\
  \    FROM Sales.InvoiceLinesExtended sil\n    JOIN Sales.Invoices si\n    ON si.InvoiceID\
  \ = sil.InvoiceID\n    AND sil.StockItemID >= 225\n    GO\n    ```\n\n3.  运行 **Step\
  \ 8** 看看新的实际计划是否更优。\n\n\n\n## 内存数据库\n\n在 SQL Server 2014 中，我们引入了一项名为 `In-Memory\
  \ OLTP` 的功能，其核心概念是内存优化表。此功能中，整张表存储在内存中，而其特殊之处在于**优化的**（即：无锁）访问方式。我们在 SQL Server\
  \ 2016 中对 `In-Memory OLTP` 进行了重大增强。你可以在 [`In-Memory OLTP (内存中 OLTP)](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp)`\
  \ 阅读关于该功能的更多细节。\n\n在着手规划 SQL Server 2019 新功能时，工程团队的 Slava Oks、Pam Lahoud、Brian Carrig、Argenis\
  \ Fernandez 等人共同决定，将一套新的功能套件命名为**内存数据库**，以扩充 `In-Memory OLTP` 的能力。\n\n以下功能共同构成了内存数据库特性套件：\n\
  \n- `In-Memory OLTP`\n- `Memory-Optimized TempDB Metadata`\n- `Hybrid Buffer Pool`\n\
  - `Persistent Memory Support`\n\n你可以在 [`内存数据库](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-database?view=sqlallproducts-allversions)`\
  \ 查看此特性套件的完整集合。\n\n在本节中，我们将介绍除 `In-Memory OLTP`（对 SQL Server 2019 而言并非新功能）之外的所有这些新能力。\n\
  \n### 内存优化 TempDB 元数据\n\n自从我接触 SQL Server 以来，使用临时表的工作负载的并发性能一直是个问题。这导致几乎每一位 SQL\
  \ Server 管理员都需要将 `tempdb` 配置为使用多个文件。你可以通过以下资源了解更多关于此探索历程的背景：\n\n- Bob Ward 在 2017\
  \ 年 PASS 峰会上的 Inside TempDB 演讲（[`https://www.youtube.com/watch?v=SvseGMobe2w`](https://www.youtube.com/watch?v=SvseGMobe2w)）\n\
  - Paul Randal 关于添加 `tempdb` 文件的博客（[`https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/`](https://www.sqlskills.com/blogs/paul/correctly-adding-data-files-tempdb/)）\n\
  \n使用 `tempdb` 文件的一个方面，大多数 SQL 专业人士并未意识到（因为现在这已成为普遍常识），即你是在为 SQL Server 引擎创建一种分区方案，以访问诸如\
  \ `PFS`、`GAM` 和 `SGAM` 等分配页。这种方案很有用，因为使用临时表的工作负载会经历繁重的创建表、分配页、删除表循环。这会在这些系统分配页上引发**闩锁**争用。通过创建多个文件，你分散了对这些页的闩锁争用，从而提升了并发\
  \ `tempdb` 工作负载的性能。\n\n在创建多个文件后（从 SQL Server 2016 开始，安装程序可以自动完成此操作，或者你也可以手动配置），对于更繁重的并发\
  \ `tempdb` 工作负载，你可能会看到更多的页闩锁等待，但这些等待是发生在你可能不识别的对象（如 `sysschobjs`）所属的页上。这些页闩锁等待是针对\
  \ `tempdb` 中系统表页的。当你快速创建和删除表时，SQL Server 必须在系统表页上执行内部读写操作，以保持表元数据的一致性。这些操作导致跨用户的页闩锁压力。过去，当客户在支持服务中遇到系统表上的高页闩锁争用时，我通常会回答：“不幸的是，你必须减少\
  \ `tempdb` 的使用负载以避免此问题。”\n\nPam Lahoud 在她的博客 [`tempdb 文件、跟踪标志和更新，哦，我的天！`](https://blogs.msdn.microsoft.com/sql_server_team/tempdb-files-and-trace-flags-and-updates-oh-my/)\
  \ 中对这个问题描述得非常清楚。\n\nSQL Server 2019 提供了一个解决方案：内存优化 `tempdb` 元数据。内存优化表（还记得著名的 Hekaton\
  \ 项目吗）天生无锁，且这些表的数据全部存在于内存中。如果内存优化表是“仅架构”的，它们甚至没有持久性约束。这是系统表的一个完美平台。由于 `tempdb` 在每次服务器重启时都会重新创建，系统表不需要持久性。并且由于存储在内存优化表中的唯一数据是元数据（而非你的临时表中的数据），这些表的内存消耗应该很小。此项目的首席开发人员\
  \ Ravinder Vuppula 称其为让 `tempdb` 系统表**Hekaton 化**。\n\n安装 SQL Server 时，默认情况下 `tempdb`\
  \ 元数据并不使用内存优化表。你必须运行以下 `T-SQL` 命令来启用此功能：\n\n```sql\nALTER SERVER CONFIGURATION SET\
  \ MEMORY_OPTIMIZED TEMPDB_METADATA = ON\n```\n\n你可以在 2019 年 SQLBits 主题演讲中观看我对该功能的演示：[`SQLBits\
  \ 2018 主题演讲`](https://sqlbits.com/Sessions/Event18/Keynote)。Brent Ozar 在他的博客中谈及此功能（在\
  \ 2018 年 `PASS` 峰会主题演讲中看到演示后）时说：“……那个 `TempDB` 改进真是太棒了。这才是真正能改变局面的实际改进。人们一直在为 `TempDB`\
  \ 争用问题和他们无法解决的闩锁争用问题而苦恼。”\n\n\n\n不过，您应该亲自尝试一下，看看实际效果。让我们看一个示例，了解内存优化的 tempdb 元数据如何提升使用临时表的应用程序的并发性。此示例的所有脚本都可以在\
  \ `ch2_intelligent_performance\\inmem\\tempdb` 目录中找到。这个示例运行起来稍复杂一些，需要协调或模拟并发用户。因此，您将需要一款名为\
  \ `ostress` 的免费压力测试工具，可以从 [`www.microsoft.com/en-us/download/details.aspx?id=4511`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511)\
  \ 下载。该工具目前需要 Windows 客户端计算机。此示例在 Linux 上安装的 SQL Server 上仍然有效；您只需要一个 Windows 客户端来通过\
  \ `ostress` 驱动并发用户工作负载。\n\n另外，我在一个拥有八个逻辑 CPU 的虚拟机上设置了我的 SQL Server。当我运行 SQL Server\
  \ 安装程序时，它自动创建了八个 tempdb 数据文件。我建议在您的系统上，如果您有八个或更多逻辑 CPU，请确保至少有八个 tempdb 数据文件。有关如何执行此操作的更多信息，请参阅此技术支持文章：[`https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d`](https://support.microsoft.com/en-us/help/2154845/recommendations-to-reduce-allocation-contention-in-sql-server-tempdb-d)。\n\
  \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig27_HTML.jpg](img/479130_1_En_2_Fig27_HTML.jpg)\n\
  图 2-27：Tempdb 中系统表的页闩锁等待\n\n## 1. 禁用内存优化的 tempdb 元数据\n\n运行脚本 `disableopttempdb.cmd`\
  \ 以禁用内存优化的 tempdb 元数据。默认情况下它是关闭的，但如果您曾经启用过它，请运行此脚本。您需要 *在安装了 SQL Server 的服务器上* 运行此脚本（或使用其他技术远程重启\
  \ SQL Server）。此脚本假设使用 `sysadmin` 登录和服务器名称。您可以通过将 `-Usa` 更改为 `-E` 来修改以使用集成身份验证，并且不要忘记为\
  \ `-S` 参数替换您的服务器名称：\n\n```\nsqlcmd -Usa -idisableopttempdb.sql -Sbwsql2019\nnet\
  \ stop mssqlserver\nnet start mssqlserver\n```\n\n如您所见，此脚本指示 Windows Server 重启 SQL\
  \ 服务。您可以在 Linux 上修改自己的脚本，使用像 `sudo systemctl restart mssql-server` 这样的命令来重启 SQL\
  \ Server。\n\n`disableopttempdb.sql` 包含以下 T-SQL 语句：\n\n```\nALTER SERVER CONFIGURATION\
  \ SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF\nGO\n```\n\n## 2. 创建测试数据库和存储过程\n\n\
  运行 T-SQL 脚本 `tempstress_ddl.sql` 以创建一个数据库和存储过程，该存储过程仅执行一个简单的临时表创建操作：\n\n```\nDROP\
  \ DATABASE IF EXISTS DallasMavericks\nGO\nCREATE DATABASE DallasMavericks\nGO\n\
  USE DallasMavericks\nGO\nCREATE OR ALTER PROCEDURE letsgomavs\nAS\nCREATE TABLE\
  \ #gomavs (col1 INT)\nGO\n```\n\n您可以看到该存储过程并没有真正对临时表执行任何操作。这是为了展示能够对临时表元数据并发性造成压力的最小工作负载量（因为存储过程的任何退出都会自动删除临时表）。\n\
  \n## 3. 运行并发工作负载\n\n现在您已准备好使用 `ostress` 运行并发 tempdb 工作负载。使用脚本 `tempstress.cmd` 来执行此\
  \ `ostress` 工作负载：\n\n```\nostress -Usa -Q\"exec letsgomavs\" -n50 -r10000 -dDallasMavericks\
  \ -Sbwsql2019\n```\n\n您可能需要调整脚本中的一些参数，包括在 Windows 上使用 `-E` 代替 `-Usa` 进行集成身份验证。您可能还想使用\
  \ `-S` 更改服务器名称。`-n50` 参数是要运行工作负载的用户数，`-r10000` 是每个用户的迭代次数。注意使用 `-Q` 直接运行存储过程，这是我在此演示的早期版本工作中学到的一个技巧。使用\
  \ `ostress` 的 `-Q` 选项直接运行查询比使用 `-i` 指定脚本更快。\n\n如果您使用 `-Usa`，系统将提示您输入密码，然后就开始运行。根据您计算机的速度，此工作负载将需要几分钟时间。\n\
  \n## 4. 监控页闩锁等待\n\n在此运行期间，在新连接中，打开 T-SQL 脚本 `pageinfo.sql`：\n\n```\nUSE tempdb\n\
  GO\nSELECT object_name(page_info.object_id), page_info.*\nFROM sys.dm_exec_requests\
  \ AS d\nCROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r\nCROSS APPLY sys.dm_db_page_info(r.db_id,\
  \ r.file_id, r.page_id,'DETAILED')\nAS page_info\nGO\n```\n\n此脚本使用 SQL Server 2019\
  \ 中的新功能，从 `sys.dm_exec_requests` 中找到的 *资源* 中 *解析* 页面信息，并以列格式转储出页面头的各个字段。\n\n您为什么要运行这个？这是因为当您遇到\
  \ tempdb 的闩锁等待时，会以 `<dbid>:<fileid>:<pageid>` 的形式提供一个资源。在此功能公开之前，您需要手动使用 `DBCC PAGE`\
  \ 来找出闩锁等待的页面属于哪个对象，而这个命令并非官方支持。现在，这种技术为您提供了官方支持，以便在页闩锁等待场景中查明页面。\n\n在上一步查询运行期间，您的结果应类似于图\
  \ 2-27。\n\n如前所述，`sysschobjs` 是一个系统表，也是在创建和删除临时表时常见的争用点。\n\n## 5. 启用内存优化的 tempdb\
  \ 元数据\n\n现在让我们启用内存优化的 tempdb 元数据。在安装了 SQL Server 的服务器上运行脚本 `optimizetempdb.cmd`。此脚本运行以下命令，因此您可以使用其他方法来启用该功能并重启\
  \ SQL Server：\n\n```\nsqlcmd -Usa -ioptimizetempdb.sql -Sbwsql2019\nnet stop mssqlserver\n\
  net start mssqlserver\n```\n\n`optimizetempdb.sql` 包含以下 T-SQL 语句：\n\n```\nALTER\
  \ SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON\nGO\n```\n\n##\
  \ 6. 验证功能已启用\n\n通过检查 SQL Server 的 `ERRORLOG` 文件来确认内存优化的 tempdb 元数据已启用。您应该在 `ERRORLOG`\
  \ 中看到一条类似于下面的语句：\n\n`Tempdb started with memory-optimized metadata`。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig28_HTML.jpg](img/479130_1_En_2_Fig28_HTML.jpg)\n\
  图 2-28：作为内存优化的 Tempdb 系统表\n\n## 7. 再次运行工作负载并对比结果\n\n现在使用 `tempstress.cmd` 再次运行工作负载。这次运行相同的工作负载将只需要大约\
  \ 30 多秒，应用程序无需任何更改。\n\n再次运行脚本 `pageinfo.sql` 以查看是否发生任何页闩锁等待。您的结果应该是 0 行！\n\n在此运行期间，在另一个会话中，运行\
  \ T-SQL 脚本 `find_memoptimized_tables.sql`。您的结果应该类似于图 2-28。\n\n您可以看到所有内存优化的系统表（您的结果甚至可能包含更多，因为此功能正在增强）。注意对\
  \ `sysschobjs` 的重大更改，但它并不是唯一涉及的系统表。\n\n## 8. 检查内存消耗\n\n您可能想知道使用此功能会消耗多少额外内存。当您仍然在此环境运行时，对\
  \ DMV `sys.dm_os_memory_clerks` 运行一个查询。您将看到一行，其中 `type = MEMORYCLERK_XTP` 且 `name\
  \ = DB_ID_2`。`pages_kb` 列大致就是内存优化的 tempdb 元数据消耗的内存量，根据此示例，大约为 200Mb。\n\n\n\n此时，您可以选择为服务器保留此选项启用状态，但如果需要关闭它，请使用脚本\
  \ `disableopttempdb.cmd`。\n\n您可以体会到该引擎内置功能带来的巨大优势。只需开启一个服务器配置选项，重新启动 SQL Server，即可投入使用。\n\
  \n如果您访问 tempdb 中的目录视图，会发现使用内存优化的 tempdb 元数据时存在一些限制。您可以在以下链接中阅读有关这些限制以及此功能的所有详细信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database?view=sqlallproducts-allversions#memory-optimized-tempdb-metadata`](https://docs.microsoft.com/en-us/sql/relational-databases/databases/tempdb-database%253Fview%253Dsqlallproducts-allversions%2523memory-optimized-tempdb-metadata)。\n\
  \n### 混合缓冲池\n\n持久内存设备已经存在几年了，但如今正开始变得更加普及。其概念是基于内存的硬件，通过电源保障实现数据持久性。可以想象一下 RAM 的速度，同时保证存储的任何数据在电源重启后依然存在。其中一种较为流行的持久内存产品来自英特尔，称为傲腾（Optane）([`www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html`](https://www.intel.com/content/www/us/en/architecture-and-technology/optane-technology/optane-for-data-centers.html))。\n\
  \n我们的 SQL Server 工程团队始终致力于寻找优化数据访问的方法，而持久内存带来了多种机会。事实上，SQL Server 2016 就包含了一项基于持久内存的特性，称为“日志尾部缓存”（参见\
  \ Kevin Farlee 关于该主题的博文 [`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/`](https://blogs.msdn.microsoft.com/sqlserverstorageengine/2016/12/02/transaction-commit-latency-acceleration-using-storage-class-memory-in-windows-server-2016sql-server-2016-sp1/))。\n\
  \n由于持久内存本质上就是内存，SQL Server 可以像访问普通内存一样访问存储在持久内存设备上的任何数据。这意味着在访问持久内存设备上的数据时，SQL Server\
  \ 可以创造性地绕过内核代码进行 I/O 处理。\n\n其中一项新功能就是 `混合缓冲池`。其概念是，如果您将数据库数据文件放置在持久内存设备上，SQL Server\
  \ 可以直接从该设备访问数据文件中的页面，而无需将数据从数据文件复制到缓冲池页面中。混合缓冲池使用内存映射内核调用来实现这一点。如果数据库页面被修改，则必须将其复制到缓冲池中，最终再写回持久内存设备。\n\
  \n使用混合缓冲池带来的性能提升因情况而异，但通常可以预期该技术会带来一定的性能提升，尤其是在读取密集型工作负载中。\n\n对于 SQL Server，只要您已将一个或多个数据库文件放置在持久内存设备上，就可以使用以下\
  \ T-SQL 语句为 SQL Server 的所有数据库启用混合缓冲池：\n\n```sql\nALTER SERVER CONFIGURATION SET\
  \ MEMORY_OPTIMIZED HYBRID_BUFFER_POOL = ON\n```\n\n## 注意\n\n为所有数据库启用混合缓冲池时，必须重新启动\
  \ SQL Server。\n\n您可以使用类似以下的 T-SQL 语句为特定数据库启用混合缓冲池（这不需要重启服务器）：\n\n```sql\nALTER DATABASE\
  \ <database_name> SET MEMORY_OPTIMIZED = ON\n```\n\n要了解更多关于如何为数据库配置持久内存设备、如何禁用混合缓冲池以及使用混合缓冲池的最佳实践，请参阅以下文档：[`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/hybrid-buffer-pool)。\n\
  \n## 持久内存支持\n\n如果您不想启用混合缓冲池，但希望 SQL Server 能够利用持久内存设备进行数据和事务日志数据的读写，您可以在 Linux 上将您的设备配置为持久内存设备。SQL\
  \ Server 将自动检测它，并使用基于内存的操作将数据移入 SQL Server 缓存和设备，从而绕过 Linux 内核 I/O 堆栈。此过程称为 `enlightenment`。\n\
  \nDell EMC 通过 enlightenment 实现了显著的性能提升，详情记录于 [`www.emc.com/about/news/press/2019/20190402-01.htm`](http://www.emc.com/about/news/press/2019/20190402-01.htm)。根据戴尔的说法，“借助全新的英特尔®\
  \ 傲腾™ DC 持久内存，客户可以加速内存数据库、虚拟化和数据分析工作负载，为精选的 PowerEdge 服务器提供高达 2.5 倍的内存容量。在采用 VMware\
  \ ESXi 的虚拟化 Microsoft SQL Server 2019 预览版环境中，与 NVMe 驱动器相比，PowerEdge R740xd 能够将每秒事务数提升高达\
  \ 2.7 倍。”\n\n您可以在以下链接中阅读有关如何在 Linux 上为 SQL Server 启用持久内存设备的所有详细信息：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem%253Fview%253Dsqlallproducts-allversions)。\n\
  \n## 最后一页插入争用\n\n这是 SQL Server 用户长期以来面临的一个常见问题。你希望创建一个包含主键的表，该主键将用于聚集索引。并且此主键是一个\
  \ `顺序` 值。换句话说，每次插入一行都会产生一个递增的新值。这种类型键最常见的形式是使用 `SEQUENCE` 对象或 `IDENTITY` 属性的列。\n\
  \n虽然这种设计在大多数情况下表现良好，但它会给应用程序性能带来一个具有挑战性的问题。每次查询需要修改一个数据页时，SQL Server 必须物理地保护其他查询，防止它们在同一时间更改或读取该页的结构（即使使用行级锁），这是通过页\
  \ `闩锁` 实现的。\n\n如果有许多用户都试图修改同一页，你的应用程序可能会因为页闩锁争用而遭受性能下降。如果你在一个顺序键上构建聚集索引，数据会根据该键排序。每次插入都会试图在聚集索引叶子级别的最后一页插入一个新行。如果许多用户并发执行插入操作，他们最终可能都试图修改索引的最后一页，因此称为“最后一页插入争用”。\n\
  \n虽然这种争用并不理想，但通常问题不大，直到一种称为闩锁 `convoy`（车队）的现象发生。团队的高级项目经理 Pam Lahoud（也被称为 `@SQLGoddess`）给我展示了这个关于\
  \ convoy 问题的资源：[`https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/`](https://blog.acolyer.org/2019/07/01/the-convoy-phenomenon/)。对于\
  \ SQL Server 和最后一页插入争用问题，页拆分是可能形成 convoy 的一个场景示例。当一页上没有足够的行容纳新的 `INSERT` 时，就很容易发生页拆分，需要在聚集索引中创建一个新页。Pam\
  \ 还用了一个非常贴切的类比来说明 convoy 问题。据 Pam 说：“交通堵塞是用来描述这个问题的常见类比。如果有一条道路已达到最大容量，只要所有车辆继续以相同的速度行驶，吞吐量将保持稳定，尽管会稍慢一些。一旦发生导致司机踩刹车的情况，例如有慢车、道路上的危险或有争议的交叉口，车辆就会堆积起来。如果汽车继续以之前的速度进入道路，交通状况只会越来越糟。司机们仍在前进，但速度非常缓慢。此时，吞吐量速率直到汽车进入道路的速率大幅下降——远低于道路通常能处理的水平——才会恢复。”\n\
  \n多年来，SQL 社区、技术支持和工程团队中的许多用户以多种不同的方式解决了这个问题。这篇支持文章提到了其中许多方法（[`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)）。那么，有没有一种无需修改应用程序、在引擎内部的解决方案呢？当我在\
  \ SQL Server 2019 CTP 3.1 中看到我们的解决方案出现时，我知道这个问题之前已经被我们的工程团队讨论过，并提出了许多可能的解决方案。我询问了该功能的首席开发\
  \ Wonseok Kim 关于它的历史。他给我看了一封电子邮件，实际上这封邮件一直躺在我的邮件文件夹里，但我忘记了。原来是一个熟悉的名字曾致力于此方法的开发，Slava\
  \ Oks，以及 SQL Server 工程团队的许多其他巨人。\n\n该解决方案现在以一种名为 `OPTIMIZE_FOR_SEQUENTIAL_KEY` 的索引选项形式存在。通过将此选项添加到你的索引或主键约束中，你是在告诉\
  \ SQL Server 启用新代码以尝试避免 convoy 问题。此选项不会消除闩锁或防止闩锁争用问题。它所做的是尝试避免可怕的 convoy 问题，从而使你的工作负载吞吐量保持一致。你可以在我们的文档\
  \ [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql?view=sqlallproducts-allversions#sequential-keys)\
  \ 中阅读有关此选项以及如何使用它的更多信息。\n\n## 注意\n\n如果你使用此选项，可能会注意到一个新的 `wait_type`，称为 `BTREE_INSERT_FLOW_CONTROL`。这是正常的，是避免或减少\
  \ convoy 问题机制的一部分。\n\n此选项并不适合所有人。如果你没有为聚集索引使用顺序键，或者没有看到严重的争用，那么我不建议使用此选项。事实上，盲目地将其应用到任何聚集索引上，可能会导致性能更差。\n\
  \n如果你想亲自尝试，请确保你有一个足够“宽”的表。在我的测试中，仅创建一个具有单个 `IDENTITY` 列的表并未带来任何性能提升。你需要做的是制造足够的页拆分条件，从而引发\
  \ convoy 问题。\n\n## 注意\n\n文章 [`https://support.microsoft.com/kb/4460004`](https://support.microsoft.com/kb/4460004)\
  \ 中描述的技术可能会为你提供更好的性能，但这种索引的新方法可能会提供你需要的稳定性能，并且对你的应用程序侵入性要小得多。\n\n## 总结\n\n本章非常长，它反映了\
  \ SQL Server 2019 中内置的智能性能的惊人能力，旨在帮助你在不修改应用程序的情况下提高性能。我提供了许多详细的示例，以便你可以亲身体验这些丰富的功能，以及它们如何帮助加速性能，并在你将\
  \ SQL Server 2019 部署到整个组织或使用应用程序进行开发时，为你节省性能调优的时间。\n\n"
- "# 3. 新的安全功能\n\n安全性对于管理数据至关重要。SQL Server 不仅拥有构建安全产品的可靠记录，还提供了必要的功能来帮助你保护数据以及对 SQL\
  \ Server 实例的访问。本章是关于我们在 SQL Server 2019 中为安全故事所增添的内容。\n\n\n\n## 增强我们已构建的功能\n\n在阅读并使用了关于性能的非常长的章节示例后，你可能会看着本章的页数问自己：“嘿，安全性不重要吗？”答案绝对是肯定的！对于\
  \ `SQL Server`，安全性是整个数据平台非常重要的一部分。\n\n在 `SQL Server 2019` 中，新的安全功能及其旨在应对的*挑战*包括：\n\
  \n*   **`具有安全飞地的始终加密 (Always Encrypted with Secure Enclaves)`**\n\n    提供一种端到端的加密解决方案，但不限制应用程序的查询能力。\n\
  \n*   **数据分类与审计**\n\n    为 `SQL Server` 对象提供内置的分类系统，并对查看标记为分类数据的操作进行审计。\n\n*   **`透明数据加密\
  \ (TDE)` 挂起与恢复**\n\n    提供一种机制来调度针对数据库的高开销“静态”加密操作。\n\n*   **证书管理**\n\n    使 `SQL\
  \ Server` 中的证书管理更加简便，包括故障转移集群实例和 Always On 可用性组场景。\n\n这看起来可能不是一个很大的改进集合，但每个新功能都试图解决客户面临的重要安全问题，并且都源自他们的反馈。例如，将数据分类功能专门内置于\
  \ `SQL Server` 中是为了满足《通用数据保护条例》(`GDPR`)的合规要求，但它也可以用于许多分类和审计需求。\n\n同样重要的是要记住，`SQL\
  \ Server 2019` 附带了 `SQL Server 2016` 中引入的一套丰富的安全功能。这包括：\n\n*   始终加密\n*   动态数据屏蔽\n\
  *   行级安全性\n*   硬件加速的透明数据加密性能\n\n你可以在以下网址阅读所有这些安全功能： [`https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016?view=sql-server-2017#security-enhancements`](https://docs.microsoft.com/en-us/sql/database-engine/whats-new-in-sql-server-2016%253Fview%253Dsql-server-2017%2523security-enhancements)。\n\
  \n必须记住，近十年来，根据美国国家标准与技术研究院 (`NIST`) 运行的国家漏洞数据库 (`NVD`) 的追踪，`SQL Server` 一直是漏洞最少的数据库和数据平台——并且领先幅度很大。你可以在以下网址查看所有这些详细信息：\
  \ [`https://nvd.nist.gov/`](https://nvd.nist.gov/)。\n\n让我们更详细地了解 `SQL Server 2019`\
  \ 的每个新安全功能，首先从 `具有安全飞地的始终加密` 开始。\n\n## 具有安全飞地的始终加密\n\n在 `SQL Server 2016` 之前，你有几种加密数据的方法，包括：\n\
  \n*   **加密连接** – 客户端应用程序与 `SQL Server` 之间交换的所有数据（`TDS` 协议数据）都经过加密。\n*   使用 **`T-SQL`**\
  \ 在 `SQL Server` 表中**加密数据**（有时称为列级或单元级加密）。\n*   **`透明数据加密 (TDE)`** – 加密*静态*数据，或为\
  \ `SQL Server` 数据库文件在文件级别加密数据。\n\n这些解决方案都不提供“端到端”加密机制。更重要的是，`SQL Server` 管理员控制着用于加密数据的密钥。因此，不存在*职责分离*的概念。在当今要求严苛的安全环境中，应用程序所有者（即业务所有者）希望完全控制其数据的安全性。他们希望数据库管理员等角色管理数据平台基础设施，但不能访问业务数据或用于控制对该数据访问的密钥。\n\
  \n在 `SQL Server 2016` 中，我们引入了一个名为 `始终加密` 的功能来解决这些问题。`始终加密` 源自微软研究院的项目。正如微软首席软件工程师\
  \ Raghav Kaushik 所述，“...有两个项目值得一提。一个是位于雷德蒙德微软研究院的 Cipherbase 项目，旨在构建对加密数据的查询处理；另一个是位于剑桥微软研究院的\
  \ Trusted Cloud 项目，更侧重于围绕安全硬件的构建模块。”\n\n图 3-1 展示了 `始终加密` 的架构和流程示例。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig1_HTML.jpg](img/479130_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n`SQL Server 2016` 中的 `始终加密`\n\n其概念是客户端应用程序及其所有者控制加密生命周期。所有数据在从客户端应用程序传递到\
  \ `SQL Server` 时都是加密的，在 `SQL Server` 中以加密形式存储（在列级），并以加密形式发回客户端应用程序。只有客户端应用程序可以在应用层解密数据。此外，用于加密和解密数据的密钥实际上并不存储在\
  \ `SQL Server` 中。这些密钥的位置（由应用程序所有者拥有）存储在 `SQL Server` 中，但对这些密钥的访问由应用程序控制。\n\n这听起来是个很棒的解决方案，但有一个缺点。因为所有的解密都发生在客户端应用程序中，所以某些查询模式不允许在数据上进行（例如，只允许相等的\
  \ `WHERE` 子句）。此外，不支持对使用 `始终加密` 加密的数据建立索引。鉴于客户端应用程序是唯一进行解密的地方，无法真正使用 `始终加密` 来构建索引。`SQL\
  \ Server` 必须将作为索引一部分的加密列的所有数据发送到客户端应用程序以构建索引，然后再将其发送回服务器。因此，尽管 `始终加密` 的承诺很好，但这些限制使其...嗯，在多种场景下受到限制。\n\
  \n有解决方案吗？有，它以一种称为*安全飞地*的概念形式出现。\n\n### 为什么需要飞地？\n\n韦氏词典将飞地（enclave）定义为“被外国领土包围或似乎包围的独特领土、文化或社会单元”([`www.merriam-webster.com/dictionary/enclave`](http://www.merriam-webster.com/dictionary/enclave))。在计算机术语中，它是一个安全且独立于敌对入侵者的受保护区域。那些入侵者可能是黑客，但不幸的是，也可能是管理员或\
  \ DBA。\n\n英特尔在其芯片组中发布了飞地的概念，称为软件防护扩展 (`SGX`)，你可以在以下网址阅读相关信息： [`https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave`](https://software.intel.com/en-us/blogs/2016/06/06/overview-of-intel-software-guard-extension-enclave)。`SGX`\
  \ 在 `CPU` 中提供指令，允许创建受保护的内存区域，用于安全加密并提供免受入侵的安全避风港。这很有趣，但如果你恰好没有 `SGX` 芯片怎么办？微软提出了一种*虚拟化*飞地解决方案，称为基于虚拟化的安全\
  \ (`VBS`) 内存飞地。你可以在以下网址阅读有关 `VBS` 的所有详细信息： [`www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/`](https://www.microsoft.com/security/blog/2018/06/05/virtualization-based-security-vbs-memory-enclaves-data-protection-through-isolation/)。\n\
  \n这对 `始终加密` 意味着什么，为什么这很重要？\n\n\n### 使用带安全区域的全程加密\n\n安全区域为全程加密的“索引问题”提供了一个独特的解决方案。从客户端应用程序到\
  \ SQL Server 再返回的数据仍然是完全加密的。SQL Server 内存中和磁盘上的数据也是如此。然而，当需要解密数据时（例如，为了构建索引或支持 `富计算`），解密操作可以在服务器上的安全区域内进行。安全区域是\
  \ SQL Server 进程空间中的一个安全内存区域。这个内存区域很小，并通过安全区域 API 与引擎表达服务紧密集成。富计算是指需要进行范围查询或模式匹配（即\
  \ `LIKE`）的查询。安全区域现在为全程加密解决方案提供了这种能力。\n\n请考虑来自 SQL Server 文档页面（[`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves)）的图\
  \ 3-2，该图展示了安全区域如何以安全的方式支持解密，同时也为应用程序提供了更大的灵活性。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig2_HTML.jpg](img/479130_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n带安全区域的全程加密\n\n配置全程加密从来不是面向普通的 SQL Server 用户的。它是一个针对复杂问题的复杂解决方案。但它非常强大，尤其是在现在有了安全区域之后。\n\
  \n带安全区域的全程加密需要另一个重要的组件，称为 `认证` 服务。客户端应用程序使用认证服务来验证用于加密的安全区域是否可以被信任。对于 `VBS` 安全区域，Windows\
  \ 提供了 `Windows Defender System Guard` 运行时认证（这使用了称为主机守护服务 (`HGS`) 的技术）。您可以在 [`www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/`](https://www.microsoft.com/security/blog/2018/04/19/introducing-windows-defender-system-guard-runtime-attestation/)\
  \ 阅读更多关于 `Windows Defender System Guard` 的内容。您还可以在 [`https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave`](https://docs.microsoft.com/en-us/windows/desktop/api/enclaveapi/nf-enclaveapi-callenclave)\
  \ 阅读有关应用程序如何与安全区域通信的更多细节。\n\n除了设置 `VBS` 和配置主机守护服务外，您的应用程序还必须使用支持与安全区域通信的提供程序。您可以在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#secure-enclave-providers`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23secure-enclave-providers)\
  \ 阅读有关提供程序对安全区域支持的详细信息。\n\n在撰写本书时，SQL Server 尚未正式支持由 `Intel SGX` 等芯片制造商提供的硬件安全区域。我预计这种支持很快就会到来，您可以通过\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves?view=sqlallproducts-allversions#why-use-always-encrypted-with-secure-enclaves`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-enclaves%3Fview%3Dsqlallproducts-allversions%23why-use-always-encrypted-with-secure-enclaves)\
  \ 关注关于安全区域的全程加密文档以获取更新。目前 `Linux` 不支持像 `VBS` 这样的虚拟安全区域。然而，一旦 SQL Server 支持了硬件安全区域，我预计\
  \ `Linux` 的支持也会随之而来。\n\n我没有为您构建一个完整的示例来设置和使用带安全区域的全程加密。正如本章前面所说，这不是一个面向普通 SQL Server\
  \ 用户的功能。它是一个企业级功能，需要一些时间来设置。但一旦设置完成，它就非常强大。全程加密的高级项目经理和负责人 Jakub Szymaszek 提供了一些关于该主题的宝贵资源。\n\
  \n请使用以下 GitHub 仓库，亲自尝试一个使用 `VBS` 安全区域的全程加密示例：[`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/security/always-encrypted-with-secure-enclaves)。Jakub\
  \ 还在 Microsoft Ignite 上做了一个精彩的演示，您可以通过 [`https://myignite.techcommunity.microsoft.com/sessions/65357#ignite-html-anchor`](https://myignite.techcommunity.microsoft.com/sessions/65357%23ignite-html-anchor)\
  \ 获取有关带安全区域的全程加密的更多细节。\n\n## 数据分类\n\n随着 SQL Server 2017 的发布，我们 SQL Server 工程团队内部的安全小组在\
  \ SQL Server Management Studio (`SSMS`) 中构建了一个工具，以帮助客户对 SQL Server 数据库中的数据进行 `分类`。该工具包含一个向导、一组\
  \ `T-SQL` 逻辑和一个报告。图 3-3 显示了 `SSMS` 中的数据分类向导。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig3_HTML.jpg](img/479130_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\nSSMS 中的数据分类向导\n\n构建这样一个工具的驱动因素之一，是公司和监管机构对隐私日益增长的趋势。尤为重要的是欧盟正在制定的《通用数据保护条例》（`GDPR`）（[`https://eugdpr.org/`](https://eugdpr.org/)）。\n\
  \n## 提示\n\nGDPR 法规已于 2018 年 5 月生效。如果您需要关于如何使用 SQL Server 来满足组织中 GDPR 需求的完整指南，请访问\
  \ [`www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr`](https://www.microsoft.com/en-us/trustcenter/cloudservices/sql/gdpr)。\n\
  \n该工具的理念是分析数据库中的列名，并就如何通过一个`标签`和一个`信息类型`对列进行分类提出建议。`信息类型`可用于告知您列中存在何种数据（例如，联系信息、姓名、财务信息），而`标签`则可用于对存储在该列中的数据`敏感度`进行分类（机密、机密-GDPR、HIPAA\
  \ 等）。\n\n该工具会分析列名，查找与已知信息类型和敏感度相匹配的已知模式。一个简单的匹配示例是任何名称中包含“Email”一词的列。工具会提供`标签`和`信息类型`的建议，并允许您将这些信息持久化存储在数据库中。然后，您可以使用报告来查看此分类信息。\n\
  \n该工具虽然不错，但存在两个局限：\n*   该工具使用了 SQL Server 中一个称为`扩展属性`的概念。虽然这种方法受支持且有效，但它并非存储列分类元数据的最有效方式，因为它是一种通用属性机制（您可以在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-addextendedproperty-transact-sql)\
  \ 阅读更多关于扩展属性的内容）。\n*   没有内置的对访问被标记分类列的审计功能。审计是任何分类系统的重要组成部分，也是满足 GDPR 需求所必需的。\n\n\
  因此，我们的团队为 SQL Server 2019（也适用于 Azure SQL Database 服务套件）开发了一个用于内置`敏感度分类`的新解决方案。内置意味着一套新的\
  \ T-SQL 语句、目录视图和审计功能。SQL Server 2019 中现在支持的分类 T-SQL 语句有：\n*   [`ADD SENSITIVITY\
  \ CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/add-sensitivity-classification-transact-sql)\n\
  *   [`DROP SENSITIVITY CLASSIFICATION`](https://docs.microsoft.com/en-us/sql/t-sql/statements/drop-sensitivity-classification-transact-sql)\n\
  \n这些 T-SQL 语句会将元数据直接存储到系统表中（通过目录视图公开），这些元数据专用于与表中列关联的`标签`和`信息类型`。\n\n现在支持一个新的目录视图来查看此元数据，称为\
  \ [`sys.sensitivity_classifications`](https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-sensitivity-classifications-transact-sql)。\n\
  \n此外，SQL Server 审计现在支持一个名为`data_sensitivity_information`的新属性，可用于审计谁、在何时、试图查看分类数据。\n\
  \n借助这些功能，SSMS 向导已被修改为：如果操作对象是 SQL Server 2019 中的数据库，则使用新的 T-SQL 语句。这为您提供了通过 SSMS\
  \ 中的工具和原生 T-SQL 支持实现内置分类和审计的能力。\n\n## 注意\n\n如果您使用 SSMS 17.0 或 18.0 针对 SQL Server\
  \ 2019 之前的版本使用过该向导，并将该数据库还原到 SQL Server 2019，那么已分类的`扩展属性`将被迁移到新的`敏感度分类`元数据中。\n\n\
  让我们通过一个使用 SSMS 工具、新 T-SQL 语法、目录视图和审计功能的示例来逐步了解。\n\n### 使用示例的先决条件\n\n首先，您需要进行一些设置才能使用本章节中的示例。对于本章的示例，您将使用`WideWorldImporters`示例数据库（您可以在\
  \ [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-oltp-database-catalog)\
  \ 阅读更多关于此数据库及其架构的信息）。如果您已经从第 2 章的示例中还原了该数据库，则可以继续使用该数据库。\n\n这些示例适用于 Windows、Linux\
  \ 和容器上的 SQL Server 2019。\n\n您还需要 SQL Server Management Studio (SSMS) `18.2`或更高版本来完成示例中的所有步骤。您可以使用提供的\
  \ T-SQL 脚本完成部分步骤，但有些示例依赖于 SSMS 中内置的工具。您可以从 [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)\
  \ 下载最新版本的 SSMS。\n\n本章使用的所有脚本都可以在本书的 GitHub 仓库的 `ch3_new_security_capabilities\\\
  dataclassification` 目录下找到。\n\n为了使用本章中的示例，您需要执行以下步骤（如果已经从第 2 章还原了数据库，请跳过这些步骤）：\n\
  1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)\
  \ 下载 WideWorldImporters 数据库备份。\n2.  将此数据库还原到您的 SQL Server 2019 实例。您可以使用提供的 `restorew\
  \ wi.sql` 脚本。您可能需要更改备份位置和数据库文件还原位置的目录路径。\n\n### 数据分类操作指南\n\n以下步骤将演示数据分类的实际操作。下一节中，你将学习如何设置审计，以跟踪试图查看设置了分类的列的用户。\n\
  \n#### 运行设置脚本\n\n首先，你可能需要多次运行这些示例，因此请先运行以下脚本 `setup_classification.sql`：\n\n```sql\n\
  -- Step 1: In case you have run these demos before drop existing classifications\n\
  USE WideWorldImporters\nGO\nIF EXISTS (SELECT * FROM sys.sensitivity_classifications\
  \ sc WHERE object_id('[Application].[PaymentMethods]') = sc.major_id)\nBEGIN\nDROP\
  \ SENSITIVITY CLASSIFICATION FROM [Application].[PaymentMethods].[PaymentMethodName]\n\
  END\nGO\nIF EXISTS (SELECT * FROM sys.sensitivity_classifications sc WHERE object_id('[Application].[People]')\
  \ = sc.major_id)\nBEGIN\nDROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[FullName]\n\
  DROP SENSITIVITY CLASSIFICATION FROM [Application].[People].[EmailAddress]\nEND\n\
  GO\n```\n\n#### 使用 SSMS 数据分类工具\n\n现在，使用 SSMS 数据分类工具为 `WideWorldImporters` 数据库中的两个列添加分类。启动\
  \ SSMS，在对象资源管理器中找到 `WideWorldImporters` 数据库。右键单击并选择 **任务** ➤ **数据发现与分类** ➤ **对数据进行分类**，如图\
  \ 3-4 所示。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig4_HTML.jpg](img/479130_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4**\n\n启动数据分类工具\n\n#### 查看分类建议\n\n该工具会分析 `WideWorldImporters` 数据库中对象的列名，并为应分类的列以及要使用的标签和信息类型创建建议。当你使用\
  \ `WideWorldImporters` 启动该工具时，应该会得到 66 个带有建议的列。单击“建议”以查看结果，如图 3-5 所示。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig5_HTML.jpg](img/479130_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5**\n\nSSMS 的分类建议\n\n#### 接受建议\n\n你现在将看到一个列列表，其中包含建议的 `information_type`（信息类型）和（敏感性）`label`（标签）选项。这些建议的值是内置在工具中的，无法配置。不过，我会用\
  \ T-SQL 展示如何“使用你自己的系统”。勾选 `PaymentMethodName` 和 `FullName` 列以保存这些建议，然后单击 **接受所选建议**。在单击“接受”之前，你的屏幕应如图\
  \ 3-6 所示。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig6_HTML.jpg](img/479130_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6**\n\n接受分类建议\n\n请注意，`PaymentMethodName` 的建议是 `Financial`（财务）和 `Confidential`（机密）（如果你查询此表，会发现值是\
  \ `Cash`、`Check`、`Credit-Card` 和 `EFT`）。对于 `FullName`，建议是 `Name`（姓名）和 `Confidential-GDPR`（机密-GDPR）。\n\
  \n## 注意\n\n该工具不保证 GDPR 合规性，甚至不会特别查看 GDPR 的详细信息。这些只是基于我们对 GDPR 的了解的建议。如果你需要将此系统用于\
  \ GDPR 目的，请务必遵循你公司的政策和程序。\n\n#### 保存选择\n\n单击“接受”后，工具将显示哪些列被选中，并允许你保存选择。“垃圾桶”图标允许你删除你的选择并重新选择。请注意，建议列的数量已减少\
  \ 2 个。现在，选择“保存”，如图 3-7 所示。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig7_HTML.jpg](img/479130_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7**\n\n保存已接受的建议\n\n#### 查看报告\n\n保存后，你可以选择“查看报告”选项，以查看与你的数据库一起保存的分类的可视化报告。将在\
  \ SSMS 中为报告创建一个新选项卡。请务必单击 `Application` 架构旁边的 `+` 号以查看所有已分类的列。报告应如图 3-8 所示。\n\n\
  ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig8_HTML.jpg](img/479130_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8**\n\n数据分类报告\n\n该报告将查询 `sys.sensitivity_classifications` 目录视图以及数据库中的其他元数据。报告显示了在所有可能的列和表中，有多少列和表被标记了标签。报告还显示了数据库中标签和信息类型值的分布情况。请注意，在报告底部的列列表中，出现了\
  \ `People_Archive` 和 `PaymentMethods_Archive` 表。为什么？因为这些表是随系统版本临时表一起构建的。临时表（在 SQL\
  \ Server 2016 中引入）提供了数据库中表随时间变化的信息（你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables`](https://docs.microsoft.com/en-us/sql/relational-databases/tables/temporal-tables)\
  \ 阅读有关临时表的更多信息）。\n\n由于你接受了包含临时表的表中列的建议，我们希望确保也对“隐藏”存档表中的列进行分类。你不会直接访问那些列，但 SQL Server\
  \ 会持久保存存档表。因此，对临时数据的任何访问也可以被审计。\n\n**注意**\n\n不允许直接从时态数据中为归档表添加敏感度分类。当您删除某列的敏感度分类时，该列所在归档表的分类也会被一并删除。\n\
  \n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig10_HTML.jpg](img/479130_1_En_3_Fig10_HTML.jpg)\n\
  **图 3-10：来自工具和 T-SQL 的分类**\n\n1.  如果您回到保存了建议的选项卡，会看到一个 **“添加分类”** 的选项。这是一种让您通过工具手动添加敏感度分类的方式，可用于覆盖建议，或为未被推荐的列进行分类。您仍然可以获得工具提供的标签和信息类型选项。如果您点击“添加分类”，界面将如图\
  \ 3-9 所示。\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig9_HTML.jpg](img/479130_1_En_3_Fig9_HTML.jpg)\n\
  \    **图 3-9：通过工具手动添加分类**\n\n2.  工具很好用，但您可能也想直接使用 T-SQL 来添加您自己的分类和体系。首先，使用脚本 `findclassifications.sql`\
  \ 来查看如何使用 T-SQL 查看所有现有分类。\n    ```sql\n    USE WideWorldImporters\n    GO\n    SELECT\
  \ o.name as table_name, c.name as column_name, sc.information_type, sc.label\n \
  \   FROM sys.sensitivity_classifications sc\n    JOIN sys.objects o\n    ON o.object_id\
  \ = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id = sc.minor_id\n    AND\
  \ c.object_id = sc.major_id\n    ORDER BY sc.information_type, sc.label\n    GO\n\
  \    ```\n    您的结果应该与报表中的结果相同。\n\n3.  要通过 T-SQL 添加您自己的分类，请使用脚本 `addclassification.sql`。运行每个步骤来添加分类并查看新结果。您可以根据需要输入任何\
  \ `label`（标签）和 `information_type`（信息类型）值。在这个例子中，我选择了与工具不同的标签和类型。由于这是一个电子邮件地址，我将类型设为\
  \ `Email`，标签设为 `PII`（代表个人身份信息）。本质上，这些只是我们存储的与列关联的字符串值。但就像任何正在构建和设计的系统一样，一个好的分类体系会对公司及数据库应使用哪些\
  \ `label` 和 `information_type` 标签规定一些结构，正如我们稍后将看到的，这些元数据将以这种方式出现在审计中。\n    ```sql\n\
  \    -- 步骤 1：添加分类\n    ADD SENSITIVITY CLASSIFICATION TO\n    [Application].[People].[EmailAddress]\n\
  \    WITH (LABEL='PII', INFORMATION_TYPE=\"Email\")\n    GO\n    -- 步骤 2：查看所有分类\n\
  \    USE WideWorldImporters\n    GO\n    SELECT o.name as table_name, c.name as\
  \ column_name, sc.information_type, sc.information_type_id, sc.label, sc.label_id\n\
  \    FROM sys.sensitivity_classifications sc\n    JOIN sys.objects o\n    ON o.object_id\
  \ = sc.major_id\n    JOIN sys.columns c\n    ON c.column_id = sc.minor_id\n    AND\
  \ c.object_id = sc.major_id\n    ORDER BY sc.information_type, sc.label\n    GO\n\
  \    ```\n    您的结果应如图 3-10 所示。\n\n在这些结果中，请注意工具添加的列具有 `information_type_id` 和 `label_id`\
  \ 的值。T-SQL 语句 `ADD SENSITIVITY CLASSIFICATION` 支持使用 GUID 值来标记标签和类型的字符串。如果您的公司构建了一个分类系统来存储所有可接受的标签和类型，这一点可能特别有价值。您现在可以通过\
  \ GUID 值引用任何标签或类型，不过生成 GUID 值的工作需要您自己完成。\n\n**提示**\n\nT-SQL 函数 `NEWID()` 可用于在 SQL\
  \ Server 中生成唯一的 GUID 值。您可以在 [`docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/functions/newid-transact-sql)\
  \ 找到更多详细信息。\n\n到目前为止一切顺利。这看起来是一个相当简单直接的系统，事实也确实如此。但它的效果完全取决于您选择使用的 `label` 和 `information_type`\
  \ 值。T-SQL 支持的优点在于，任何支持 T-SQL 的应用程序现在都可以构建分类系统并进行查询，因为通过 T-SQL 也支持编目视图。\n\n那么审计呢？请继续下一节了解其工作原理。请保持所有设置不变，以便利用前面这些步骤来展示审计的工作方式。\n\
  \n### 审计与数据分类\n\n拥有列的敏感度分类元数据很有价值，但更有价值的功能是，审计应能自动拾取用户查看标有这些分类的列的操作。\n\n现代版本的 SQL\
  \ Server 包含一个名为`SQL Server Audit`的内置功能。基于扩展事件技术，`审计`提供了众多选项和一个丰富的审计系统。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)\
  \ 阅读关于`SQL Server Audit`完整功能的更多信息。\n\n审计以记录格式生成，每个`审计事件`都附带各种属性。SQL Server 2019\
  \ 新增了一个名为`data_sensitivity_information`的审计事件属性。例如，如果你正在对某些表（你已在这些表的列上添加了敏感度分类）上的`SELECT`语句进行审计，并且这些列是`SELECT`“列表”的一部分以查看数据，那么`data_sensitivity_information`列将显示此次访问。\n\
  \n让我们延续之前的例子，看看审计如何与敏感度分类协同工作。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig11_HTML.jpg](img/479130_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11** 对带有分类的表进行单次表扫描的审计\n\n1.  由于你可能多次运行这些示例，并且不想每次都必须还原数据库，首先运行脚本 `dropsqlaudit.sql`。\n\
  \n    ```sql\n    -- Step 1: Disable the audits and drop them\n    USE WideWorldImporters\n\
  \    GO\n    IF EXISTS (SELECT * FROM sys.database_audit_specifications WHERE name\
  \ = 'People_Audit')\n    BEGIN\n    ALTER DATABASE AUDIT SPECIFICATION People_Audit\n\
  \    WITH (STATE = OFF)\n    DROP DATABASE AUDIT SPECIFICATION People_Audit\n  \
  \  END\n    GO\n    USE master\n    GO\n    IF EXISTS (SELECT * FROM sys.server_audits\
  \ WHERE name = 'GDPR_Audit')\n    BEGIN\n    ALTER SERVER AUDIT GDPR_Audit\n   \
  \ WITH (STATE = OFF);\n    DROP SERVER AUDIT GDPR_Audit\n    END\n    GO\n    --\
  \ Step 2: Remove the .audit files from default or your path\n    -- del C:\\program\
  \ files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\GDPR*.audit\n \
  \   ```\n\n    注意，步骤 2 是脚本中用于删除文件的注释。当你运行审计时，它会在你指定的路径中创建文件。当你禁用并删除审计后，这些文件仍会留在该目录中。为了保持示例干净，请手动删除之前执行留下的任何文件。\n\
  \n2.  打开脚本 `setupsqlaudit.sql` 以创建并启动审计。我不会深入探讨审计和规范如何工作的细节。通过我提供的语法，你可以看到审计被设置为跟踪\
  \ `WideWorldImporters` 数据库中 `[Application].[People]` 表上的 `SELECT` 语句。请查阅审计相关文档以了解更多：[`https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine`](https://docs.microsoft.com/en-us/sql/relational-databases/security/auditing/sql-server-audit-database-engine)。\n\
  \n    ```sql\n    USE master\n    GO\n    -- Create the server audit.\n    CREATE\
  \ SERVER AUDIT GDPR_Audit\n    TO FILE (FILEPATH = 'C:\\program files\\microsoft\
  \ sql server\\mssql15.mssqlserver\\mssql\\data')\n    GO\n    -- Enable the server\
  \ audit.\n    ALTER SERVER AUDIT GDPR_Audit\n    WITH (STATE = ON)\n    GO\n   \
  \ USE WideWorldImporters\n    GO\n    -- Create the database audit specification.\n\
  \    CREATE DATABASE AUDIT SPECIFICATION People_Audit\n    FOR SERVER AUDIT GDPR_Audit\n\
  \    ADD (SELECT ON Application.People BY public )\n    WITH (STATE = ON)\n    GO\n\
  \    ```\n\n3.  现在让我们运行一些查询，看看审计了什么。打开脚本 `findpeople.sql`，并按照脚本中的注释指导运行步骤 1 和步骤\
  \ 2：\n\n    ```sql\n    -- Step 1: Scan the table and see if the sensitivity columns\
  \ were audited\n    USE WideWorldImporters\n    GO\n    SELECT * FROM [Application].[People]\n\
  \    GO\n    -- Step 2: Check the audit\n    -- The audit may not show up EXACTLY\
  \ right after the query but within a few seconds.\n    SELECT event_time, session_id,\
  \ server_principal_name,\n    database_name, object_name,\n    cast(data_sensitivity_information\
  \ as XML) as data_sensitivity_information,\n    client_ip, application_name\n  \
  \  FROM sys.fn_get_audit_file ('C:\\program files\\microsoft sql server\\mssql15.mssqlserver\\\
  mssql\\data\\*.sqlaudit',default,default)\n    GO\n    ```\n\n    你的结果应如图 3-11 所示。\n\
  \n    在这个例子中，你运行了一个从 `People` 表中选择所有列的查询。`fn_get_audit_file` T-SQL 函数用于以行/列格式检索审计结果。我仅从此函数的结果集中提取了部分列。你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-functions/sys-fn-get-audit-file-transact-sql)\
  \ 查看此函数的所有参数和输出列的完整列表。\n\n    第一行是审计已启动的记录。第二行是对 `SELECT` 语句的审计记录。注意 `data_sensitivity_information`\
  \ 列值是 XML 数据类型。点击该值，SSMS 将打开一个包含完整 XML 数据的新窗口。你的结果应如图 3-12 所示。\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig12_HTML.jpg](img/479130_1_En_3_Fig12_HTML.jpg)\n\
  \n    **图 3-12** 数据敏感度详情\n\n    XML 的详细信息包含 `SELECT` 语句访问的任何唯一`标签`和`信息类型`的属性。你现在可以获取此信息，并通过\
  \ `sys.sensitivity_classifications` 目录视图查找哪些列与这些详细信息相关联。\n\n4.  现在执行 `findpeople.sql`\
  \ 中的步骤 3 和步骤 4：\n\n    ```sql\n    -- Step 3: What if I access just one of the columns\
  \ directly?\n    SELECT FullName FROM [Application].[People]\n    GO\n    -- Step\
  \ 4: Check the audit\n    -- The audit may not show up EXACTLY right after the query\
  \ but within a few seconds.\n    SELECT event_time, session_id, server_principal_name,\n\
  \    database_name, object_name,\n    cast(data_sensitivity_information as XML)\
  \ as data_sensitivity_information,\n    client_ip, application_name\n    FROM sys.fn_get_audit_file\
  \ ('C:\\program files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\\
  *.sqlaudit',default,default)\n    GO\n    ```\n\n    步骤 4 的结果应如图 3-13 所示。\n\n  \
  \  ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig13_HTML.jpg](img/479130_1_En_3_Fig13_HTML.jpg)\n\
  \n    **图 3-13** 包含对一个标记为分类的列进行`SELECT`操作的审计\n\n    审计中存在第三行（每次`SELECT`操作会产生一行）。如果你点击\
  \ `data_sensitivity_information` 列，你将只看到一个标签，因为只选择了 `FullName` 列。\n\n    ![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig14_HTML.jpg](img/479130_1_En_3_Fig14_HTML.jpg)\n\
  \n    **图 3-14** `WHERE`子句中对分类列的审计结果\n\n5.  审计只会在分类的某个列是`SELECT`*列表*或查询输出的一部分时，才会跟踪对该分类的访问。让我们来验证一下。运行\
  \ `findpeople.sql` 中的步骤 5 和步骤 6：\n\n\n```\n-- 步骤 5：如果在 WHERE 子句中只引用了已分类列，会怎样？\n\
  SELECT PreferredName FROM [Application].[People]\nWHERE EmailAddress LIKE '%microsoft%'\n\
  GO\n-- 步骤 6：检查审核日志\n-- 审核结果可能不会在查询后立即准确显示，但会在几秒钟内出现。\nSELECT event_time, session_id,\
  \ server_principal_name,\ndatabase_name, object_name,\ncast(data_sensitivity_information\
  \ as XML) as data_sensitivity_information,\nclient_ip, application_name\nFROM sys.fn_get_audit_file\
  \ ('C:\\program files\\microsoft sql server\\mssql15.mssqlserver\\mssql\\data\\\
  *.sqlaudit',default,default)\nGO\n```\n\n步骤 6 的结果应如图 3-14 所示。\n\n在此示例中，查询使用 `EmailAddress`\
  \ 列作为条件，为 `PreferredName` 列生成结果。`PreferredName` 未被分类，但 `EmailAddress` 已被分类。然而，由于\
  \ `EmailAddress` 不是 `SELECT` 列表的一部分，`data_sensitivity_information` 列不会被填充。\n\n数据分类是\
  \ SQL Server 2019 中一个简单但非常强大的新功能，您可以将其添加到保持数据安全和确保组织符合任何监管政策的工具集中。此功能在 SQL Server\
  \ 2019 和 Azure SQL Database 中均有效。请查阅我们团队关于信息保护的完整指南：[`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-data-discovery-and-classification)。\n\
  \n## 其他新安全功能\n\nSQL Server 2019 中还有其他一些次要但重要的新安全功能，包括 TDE 的暂停和恢复，以及简化的 SQL Server\
  \ 加密证书管理。\n\n### TDE 暂停和恢复\n\n透明数据加密（TDE）专注于对*静止*数据进行加密。这允许您独立于 SQL Server 引擎加密\
  \ SQL Server 数据库和日志文件。这样，如果有人试图访问您的数据库和/或事务日志文件，文件中的数据将被加密。TDE 已经是几个版本中都有的功能；您可以在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)\
  \ 阅读更多关于如何使用它的信息。\n\n当您为现有数据库启用 TDE 时，SQL Server 必须将*每个*数据库页从磁盘读入缓冲池，并将其写回已加密的数据库文件。加密在后台工作线程中进行，因此不会直接影响用户工作负载，但读取和写入所有数据库页可能非常密集，并消耗\
  \ CPU 和 I/O 资源。对于非常大的数据库，这可能会影响关键任务应用程序。\n\nSQL Server 2019 引入了 TDE 加密的*暂停*和*恢复*概念。现在，您可以为数据库启用\
  \ TDE，但随后在任何时候暂停加密，并从暂停的最后一个点恢复加密。这允许您根据应用程序需求有效地安排使用 TDE 对数据库进行完整加密。\n\n暂停 TDE\
  \ 很简单，只需运行以下 T-SQL 语句：\n```\nALTER DATABASE  SET ENCRYPTION SUSPEND\n```\n从暂停点恢复加密过程可以通过以下\
  \ T-SQL 语句完成：\n```\nALTER DATABASE  SET ENCRYPTION RESUME\n```\n为了帮助诊断此新功能，DMV `sys.dm_database_encryption_keys`\
  \ 有三个新列来查看 TDE 扫描的状态：\n*   `encryption_scan_state` – 一个数字，指示 TDE 扫描是正在进行、已暂停还是已完成\n\
  *   `encryption_scan_state_desc` – 扫描状态的字符串描述，例如 RUNNING、SUSPENDED、COMPLETE\n* \
  \  `encryption_scan_modify_date` – 扫描状态最后一次更改的日期/时间\n\n这是对在非常大的 SQL Server 数据库中使用\
  \ TDE 的一个重要但微小的增强。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/transparent-data-encryption)\
  \ 阅读更多关于 TDE 暂停和恢复的信息。\n\n### 证书管理\n\n假设您想要加密到 SQL Server 的连接，这是确保客户端应用程序和 SQL Server\
  \ 之间的表格数据流（TDS）协议被加密的常见做法。当您使用 TLS 等协议设置加密时，需要证书。Windows 上的 SQL Server 提供了一种通过流行的程序\
  \ SQL Server 配置管理器使用证书的机制。但是，您必须首先完成所有工作，在服务器甚至多台服务器（用于故障转移群集实例（FCI）或 Always On\
  \ 可用性组）上安装证书。\n\n图 3-15 显示了 SQL Server 配置管理器的对话框，用于选择要用于 SQL Server 2017 的已安装证书。\n\
  \n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig15_HTML.jpg](img/479130_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15 SQL Server 2017 和证书管理\n\nSQL Server 2019 现在通过 SQL Server 配置管理器提供了导入证书的能力，甚至可以在故障转移群集实例或可用性组的节点之间导入证书——并且您可以从主实例执行所有这些操作。图\
  \ 3-16 显示了 SQL Server 2019 上 SQL Server 配置管理器的对话框。\n\n![../images/479130_1_En_3_Chapter/479130_1_En_3_Fig16_HTML.jpg](img/479130_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16 SQL Server 2019 和配置管理\n\n请注意此对话框上的新“导入”按钮。您可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/manage-certificates)\
  \ 阅读有关如何在单台服务器或群集上使用此功能的所有说明。\n\n## 总结\n\n建立在 SQL Server 2016 的丰富功能（如 Always Encrypted、行级安全和动态数据屏蔽）之上，SQL\
  \ Server 2019 引入了新的安全功能，如安全飞地、数据敏感度分类、TDE 暂停/恢复以及更简单的证书管理。所有这些，加上 SQL Server 以前版本中内置的所有安全功能，提供了一个正确的平台，以保持您的数据安全、可信、合规且可管理。\n\
  \n\n"
- "# 4. 任务关键型可用性\n\n在前面两章中，你了解了 SQL Server 2019 中应对性能和安全性方面现代挑战的新功能。对于许多企业客户而言，确保数据库平台能够满足当今应用程序和业务挑战还有一个关键要素：*可用性*。\n\
  \nSQL Server 默认就提供了可用性，因为几乎所有对 SQL 的操作都可以 **联机** 完成。SQL Server 2019 通过以下旨在解决新挑战的新功能，增强了数据的联机可用性：\n\
  \n*   **联机索引增强**\n\n    用户总是“鱼与熊掌兼得”。他们希望管理员保持索引健康且最新，同时又希望随时能完全访问自己的数据。SQL Server\
  \ 2019 通过 `可恢复的联机索引创建` 和 `联机聚集列存储索引` 维护，增强了之前的联机索引功能。\n\n*   **可用性组增强**\n\n    SQL\
  \ Server 的旗舰高可用性灾难恢复功能——Always On 可用性组，在 SQL Server 的每个版本中持续增强，包括支持更多副本和更好的应用程序连接重定向。\n\
  \n*   **加速数据库恢复**\n\n    阅读本书的任何人可能都遇到过这种情况。有人试图终止一个长时间运行的事务，最终沮丧地不得不重启 SQL Server。然后他们来找你，却发现数据库的恢复过程长得令人抓狂，这让他们更加沮丧。为什么\
  \ SQL Server 不能立即将数据库恢复上线？你解释道，因为恢复过程必须回滚你终止的事务，否则数据库将处于不一致状态。想象一下，如果这一切都不再需要发生。欢迎了解加速数据库恢复（ADR），这是我近来见过的最具创新性的技术之一，它被引入到了核心\
  \ SQL Server 引擎中。ADR 旨在实现即时回滚、允许事务日志被积极截断，并为用户数据库提供“恒定时间恢复”。我本想从这个主题开始介绍，但为了满足你的好奇心，我会把它留到本章末尾。\n\
  \n## 联机索引维护\n\n索引对于数据库性能至关重要。因此，维护索引是保持数据库健康的常见任务。创建索引的一个问题在于，由于需要在表上加锁，可能会影响数据的可用性。创建或重建聚集索引实质上会在索引操作期间锁定整个表。非聚集索引的创建或重建同样可能具有侵入性，因为它需要共享（SH）表锁。\n\
  \nSQL Server 2005（是的，它已经存在这么久了）引入了 *联机* 索引创建或重建的概念。联机索引构建为应用程序提供了更好的可用性，因为在索引构建过程中不需要表锁。\n\
  \n## 注意\n\n在联机索引构建过程中，确实会对表进行一些锁定，但这些锁的持续时间较短，并且是在构建过程中分阶段执行的。要了解更多关于联机索引如何构建的信息，请阅读文档\
  \ [`https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/how-online-index-operations-work`](https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/how-online-index-operations-work)。理解原始联机索引实现的有用资源位于\
  \ [`https://docs.microsoft.com/zh-cn/previous-versions/sql/sql-server-2005/administrator/cc966402(v=technet.10)`](https://docs.microsoft.com/zh-cn/previous-versions/sql/sql-server-2005/administrator/cc966402%28v%3Dtechnet.10%29)。\n\
  \n虽然联机索引构建有助于提高可用性，但构建索引可能非常消耗资源，根据应用程序查询的性质，这仍然可能影响应用程序的整体可用性。此外，在某些情况下，一次性在大型表上构建索引可能会出现问题，例如索引在完成前失败。在索引构建期间失败（例如，数据库空间不足）需要你修复问题并从头开始重新构建索引。如果能够对任何索引构建操作进行“从上次中断处继续”，在失败时恢复，那不是很好吗？将索引构建计划为多个段，例如分散在不同的维护窗口中进行，也会很方便。\n\
  \n### 可恢复索引操作\n\n在 SQL Server 2017 中，我们引入了 *可恢复* 索引 *重建* 操作的概念。其思路是，你使用 T-SQL 语句\
  \ `ALTER INDEX REBUILD` 开始重建索引，然后可以使用带有 `PAUSE` 选项的 `ALTER INDEX` 来暂停索引重建。重建新联机索引的所有进度都会被保存，这样你就可以使用带有\
  \ `RESUME` 选项的 `ALTER INDEX` 来恢复索引重建。你还可以选择使用带有 `ABORT` 选项的 `ALTER INDEX` 命令中止正在进行的联机索引重建。你可以在文档\
  \ [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql)\
  \ 中阅读有关如何使用 `ALTER INDEX` 进行可恢复索引操作的完整语法。你还可以在 [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql#online-index-operations`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/alter-index-transact-sql%23online-index-operations)\
  \ 阅读有关可恢复索引重建如何工作以及任何限制的更多具体细节。\n\nSQL Server 2019 在使用 `CREATE INDEX` *创建* 索引时引入了可恢复索引的概念。你可以在文档\
  \ [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql)\
  \ 中阅读如何创建可恢复索引的语法。你还可以在 [`https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql#online-option`](https://docs.microsoft.com/zh-cn/sql/t-sql/statements/create-index-transact-sql%23online-option)\
  \ 阅读有关可恢复索引创建的更多详细信息。\n\n此外，SQL Server 2019 为联机和可恢复索引操作引入了 `默认数据库范围设置` 的概念。这些新选项称为\
  \ `ELEVATE_ONLINE` 和 `ELEVATE_RESUMABLE`。你可以在文档 [`https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/guidelines-for-online-index-operations?#online-default-options`](https://docs.microsoft.com/zh-cn/sql/relational-databases/indexes/guidelines-for-online-index-operations%3F%23online-default-options)\
  \ 中阅读使用这些选项的详细信息。\n\n与其只是阅读关于可恢复索引创建的内容，不如让我们尝试一个使用新的数据库范围选项的示例。\n\n### 使用示例的先决条件\n\
  \n要执行本章介绍的示例，你必须安装 SQL Server 2019。在 SQL Server 2017 中，可恢复索引重建需要企业版。因此，对于这些示例，你需要安装企业版、评估版或开发者版。\n\
  \n此示例的所有脚本和文件都可以在本书的 GitHub 仓库中找到，位于 `ch4_mission_critical_availability\\resumableindex`\
  \ 目录下。\n\n使用该示例有三种方式：\n\n*   一个名为 `resumableindex.ipynb` 的 T-SQL 笔记本，需要 Azure Data\
  \ Studio（你需要 2019 年 6 月或之后的版本）。该 T-SQL 笔记本包含了完整示例的所有说明。\n*   在 SQL Server Management\
  \ Studio (SSMS) 或 Azure Data Studio 中加载 T-SQL 脚本 `resumableindex.sql`，并按照脚本中的注释逐步操作。\n\
  *   单独运行 T-SQL 脚本 `resumableindex.sql` 中的每组 T-SQL 语句，正如我将在下一节中引导你做的那样。\n\n\n###\
  \ 尝试可恢复索引创建\n\n让我们逐步了解如何使用可恢复的在线索引。\n\n#### 步骤 1：运行脚本创建数据库\n在`resumableindex.sql`脚本中运行第\
  \ 1 步，为此示例创建数据库：\n```sql\n    -- Step 1: Create the database\n    USE master\n \
  \   GO\n    DROP DATABASE IF EXISTS gotexasrangers\n    GO\n    CREATE DATABASE\
  \ gotexasrangers\n    GO\n    ```\n\n#### 步骤 2：创建表并填充数据\n运行第 2 步以创建一个表并填充一些数据。我选择这个行数是为了让索引构建花费一分钟以上。这是因为当我向你展示如何使用`MAX_DURATION`选项时，该选项的最小值为\
  \ 1 分钟。请耐心等待此步骤，因为它可能需要长达 10-15 分钟才能运行完成。你可以去喝杯咖啡，回来看到它完成后再继续第 3 步。\n```sql\n  \
  \  -- Step 2: Create a table as a heap with no clustered index\n    -- Make the\
  \ table fairly big so an index build takes at least\n    -- a few minutes. The resumable\
  \ index option for MAX_DURATION has\n    -- a minimum value of 1 minute.\n    USE\
  \ gotexasrangers\n    GO\n    DROP TABLE IF EXISTS letsgorangers\n    GO\n    CREATE\
  \ TABLE letsgorangers (col1 int, col2 char(7000) not null)\n    GO\n    SET NOCOUNT\
  \ ON\n    GO\n    BEGIN TRANSACTION\n    GO\n    INSERT INTO letsgorangers values\
  \ (1, 'I would love to win the World Series')\n    GO 750000\n    COMMIT TRANSACTION\n\
  \    GO\n    SET NOCOUNT OFF\n    GO\n    ```\n\n#### 步骤 3：创建在线、可恢复的聚集索引\n运行第 3\
  \ 步以创建一个在线的、可恢复的聚集索引。注意名为`MAX_DURATION`选项的用法。这意味着如果索引构建在 1 分钟后未完成，它将被暂停。\n```sql\n\
  \    -- Step 3: Try to create the index as online, resumable, and a max_duration\
  \ of one minute\n    CREATE CLUSTERED INDEX rangeridx ON letsgorangers (col1) WITH\
  \ (ONLINE = ON, RESUMABLE = ON, MAX_DURATION = 1)\n    GO\n    ```\n\n当持续时间到期时，`CREATE\
  \ INDEX`将遇到失败。通常，这会要求你“重新开始”，因为整个索引构建将被回滚。但由于你创建索引时指定了可恢复，索引构建只是被暂停了。\n\n当失败发生时，你的输出应类似于以下内容：\n\
  ```text\n    Msg 3643, Level 16, State 1, Line 31\n    The operation elapsed time\
  \ exceeded the maximum time specified for this operation. The execution has been\
  \ stopped.\n    The statement has been terminated.\n    Msg 596, Level 21, State\
  \ 1, Line 29\n    Cannot continue the execution because the session is in the kill\
  \ state.\n    Msg 0, Level 20, State 0, Line 29\n    A severe error occurred on\
  \ the current command.  The results, if any, should be discarded.\n    ```\n此消息意味着语句已失败并终止了连接。这看起来是个问题，但同样，创建索引的进度只是被暂停了。\n\
  \n注意 暂停可恢复索引构建的另一种方法是在创建索引运行时，在另一个连接上使用带有`PAUSE`选项的`ALTER INDEX`命令。\n\n#### 步骤 4：检查索引构建进度\n\
  运行第 4 步，使用动态管理视图`sys.index_resumable_operations`来检查索引构建的进度。\n```sql\n    -- Step\
  \ 4: Check the progress of the index build\n    USE gotexasrangers\n    GO\n   \
  \ SELECT * FROM sys.index_resumable_operations\n    GO\n    ```\n在你的结果集中，`state_desc`应该为`PAUSED`，`percent_complete`应该在\
  \ 30% 左右。这意味着当你恢复索引构建时，它应该只剩下大约 70% 的工作需要完成。\n\n#### 步骤 5：恢复并完成索引构建\n要恢复索引构建操作并完成它，你可以像第\
  \ 5 步那样使用`ALTER INDEX`语句。\n```sql\n    -- Step 6: Resume the index build\n    ALTER\
  \ INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n在此运行期间，你可以使用带有`PAUSE`选项的`ALTER\
  \ INDEX`来再次暂停索引构建（然后再次恢复它）。\n\n#### 步骤 6：使用默认选项创建可恢复索引\n让我们尝试用另一种方式创建可恢复索引。首先，使用第\
  \ 6 步删除现有索引，并设置两个数据库范围选项，使创建在线和可恢复的索引成为默认设置（在支持的情况下）。\n\n注意 并非所有索引都可以在线且可恢复地构建。例如，XML\
  \ 索引不支持。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations`](https://docs.microsoft.com/en-us/sql/relational-databases/indexes/guidelines-for-online-index-operations)\
  \ 查看不支持在线操作的索引列表。\n\n1.  现在使用第 7 步创建索引，不使用任何特殊选项。**让`CREATE INDEX`运行大约 30 秒，然后取消它。**\
  \ 使用你工具中取消查询的任何技术（对于 SSMS，点击红色停止按钮）：\n```sql\n    -- Step 7: Create the index again.\
  \ Notice there are no options used.\n    -- CANCEL this after about 30 seconds\n\
  \    CREATE CLUSTERED INDEX rangeridx ON letsgorangers (col1)\n    GO\n    ```\n\
  你的输出将类似于：\n```text\n    The statement has been terminated.\n    Query was canceled\
  \ by user.\n    ```\n通常，取消`CREATE INDEX`会导致它回滚。但由于受支持索引的默认选项是`ONLINE`和`RESUMABLE`，即使你没有显式指定这些选项，索引构建也只是被暂停了。\n\
  \n2.  使用第 8 步检查暂停的索引构建状态。\n```sql\n    -- Step 8: Check the index progress\n   \
  \ USE gotexasrangers\n    GO\n    SELECT * FROM sys.index_resumable_operations\n\
  \    GO\n    ```\n如本示例前面所见，`state_desc`应为`PAUSED`，`percent_complete`应在 20-30% 左右。\n\
  \n3.  使用第 9 步恢复并完成索引构建。\n```sql\n    -- Step 9: Resume the index build\n    ALTER\
  \ INDEX rangeridx on letsgorangers RESUME\n    GO\n    ```\n```sql\n    -- Step\
  \ 6: Drop the first index . Use the default scoped option for resumable and online\n\
  \    USE gotexasrangers\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_RESUMABLE\
  \ = WHEN_SUPPORTED\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_ONLINE\
  \ = WHEN_SUPPORTED\n    GO\n    DROP INDEX IF EXISTS letsgorangers.rangeridx\n \
  \   GO\n    ```\n当你想到可恢复索引时，请记住这种可能的场景。假设创建或重建一个索引需要 4 小时，在此期间，构建索引会消耗一定数量的内存、CPU\
  \ 和 I/O 资源，这可能对你的应用程序产生一定影响。你现在可以使用一种技术，即分多个片段进行`CREATE`，然后`PAUSE`/`RESUME`。选择在应用程序使用率最低的时间段创建或恢复索引构建；你实际上是将索引构建安排到多个阶段。你甚至可以使用\
  \ SQL Server Agent 作业来调度这些阶段，以最适合你应用程序需求的时间进行。\n\n\n\n### 列存储的在线索引维护\n\n聚集列存储索引对于高性能分析查询至关重要，尤其是在数据仓库场景中。鉴于通常需要为其构建聚集列存储索引的表的大小，构建（或重建）聚集列存储索引可能是一项耗时的操作。由于聚集列存储索引的构建或重建是\
  \ `离线` 操作，整个表必须被锁定，阻止其他事务访问，这很可能不是你所需的可用性。\n\nSQL Server 2017 引入了在线构建和重建非聚集列存储索引的功能。在\
  \ SQL Server 2019 中，聚集列存储索引现在也可以在线构建和重建。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-columnstore-index-transact-sql)\
  \ 阅读在线构建聚集列存储索引的语法详情。在线重建聚集列存储索引的语法将与使用 `ALTER INDEX` 语法的标准索引相同，具体可参考 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-index-transact-sql)。对于在线聚集或非聚集列存储索引，目前尚不支持可恢复索引功能。\n\
  \n## 增强 Always On 可用性组\n\nAlways On 可用性组（在本章剩余部分我将简称其为可用性组）是 SQL Server 中的旗舰级高可用性灾难恢复（HADR）功能。该功能首次发布于\
  \ SQL Server 2012，其后的每个版本都带来了新的增强，以扩展可用性组的能力。\n\n例如，在 SQL Server 2016 中，我们引入了基于数据库健康状态进行可用性组故障转移的概念（你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)\
  \ 阅读更多关于此概念的信息）。我们还提升了可用性组的内部性能，相关内容可在 [`https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/`](https://blogs.msdn.microsoft.com/bobsql/2016/09/26/sql-server-2016-it-just-runs-faster-always-on-availability-groups-turbocharged/)\
  \ 阅读。\n\n在 SQL Server 2017 中，可用性组的一项关键新功能是 `无集群` 可用性组的概念。这允许你在没有集群软件的情况下设置可用性组。任何故障转移都是手动的，但此功能使你能够建立一个读取横向扩展的副本平台，甚至可以在\
  \ Windows 和 Linux 之间设置可用性组。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/read-scale-availability-groups)\
  \ 阅读更多关于此功能的信息。\n\n对于 SQL Server 2019，基于客户反馈和技术趋势，我们为可用性组引入了两项新功能：\n\n*   支持更多副本\n\
  *   一种确保你的应用程序连接到主副本的新方法\n\n### 支持更多同步副本\n\n我们现在支持在单个可用性组中最多 `五个同步副本`，总共最多九个副本。更多信息请参阅文档：[`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/always-on-availability-groups-sql-server)。\n\
  \n### 辅助副本到主副本的读写连接重定向\n\n`辅助副本到主副本的读写连接重定向` 是一项新功能，旨在解决无论承载可用性组主副本的是哪个 SQL 实例，你的应用程序都必须被定向到主副本的挑战。\n\
  \n在早期版本的 SQL Server 中，作为开发人员，确保你连接到可用性组的主副本的唯一方法是使用 `侦听器` 的概念。然而，如我之前在本节描述的，当你配置类似\
  \ `无集群` 可用性组这样的 SQL Server 可用性组时，侦听器可能并非总是可用。\n\nSQL Server 2019 现在为可用性组提供了 T-SQL\
  \ 设置，并为客户端应用程序提供了连接字符串选项，以确保无论应用程序连接到可用性组中的哪个服务器，它都将始终连接到主副本。SQL Server 为此概念提供了内置逻辑，并使用重定向的概念：如果应用程序连接到一个作为辅助副本的服务器，则会被重定向。\n\
  \n你可以在文档 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/secondary-replica-connection-redirection-always-on-availability-groups)\
  \ 中阅读所有关于如何为 SQL Server 和你的应用程序设置主连接重定向的细节。\n\n## 加速数据库恢复\n\n我在微软工作中仍然感到非常兴奋的一个方面，是了解到那些最初作为项目开始的创新，然后看到它们成为已发布产品的新功能，有时是几年之后。\n\
  \n举个例子，我记得在 2016 年我刚加入工程团队时，看到了一个名为常数时间恢复（`CTR`）的项目。我记得我花了一些时间去了解这个项目，因为我看到了我的长期同事\
  \ Peter Byrne 的名字参与其中。`CTR` 在 SQL Server 2019 和 Azure SQL Database 中已演变为加速数据库恢复（`ADR`）。\n\
  \n`CTR` 实际上始于 2015 年由微软杰出工程师 Hanuma Kodavalla 发起的一个项目。Hanuma 招募了其他人加入该项目，包括 Peter\
  \ Byrne、Panagiotis Antonopoulos 和 Srikumar Rangarajan 等。该项目试图解决 SQL Server 中一个非常棘手的问题：`长时间运行的事务`。当这些工程师完成工作后，他们决定就这个概念撰写一篇论文。在你阅读本章剩余部分并使用示例时，也请考虑阅读\
  \ `CTR` 项目论文的全部细节：[`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)。我称其为\
  \ `CTR 论文`，并在本章剩余部分如此称呼。我建议你采取我在撰写本章时的做法：打开这篇论文，边阅读章节边使用示例时，来回参考它。\n\n\n\n### 长活动事务的挑战\n\
  \n长运行事务可能导致**恢复“失控”**（即耗时极长且无法预测），并影响应用程序对数据的可用性。这并非 SQL Server 引擎的某种错误或问题；它完全是在按应用程序的指令执行。SQL\
  \ Server 无法阻止应用程序在一个事务中执行大量修改操作，或者阻止一个修改操作很少但长时间不提交或不回滚的事务。这就是*长运行事务*的经典定义。\n\n\
  此外，回滚一个长事务需要执行所谓的*补偿*操作。回滚要求进行逻辑撤销。一个删除了 100 万行的 DELETE 操作需要生成 100 万条 DELETE 日志记录。要回滚这个删除事务，SQL\
  \ Server 需要撤销所有这些删除操作，并生成 100 万条 INSERT 日志记录。这**会减慢回滚事务所需的时间**。我经常看到客户试图 `KILL`\
  \ 一个有长活动事务的会话，并疑惑为什么 `KILL` 命令没有立即生效。这通常是因为在可以安全终止会话之前，事务必须先完成回滚（否则会导致数据不一致）。\n\n\
  长运行事务的另一个后果是它对**事务日志截断**的影响。事务日志只能截断到最旧的活动事务处。对于尚未提交或回滚的事务，你无法移除其事务日志记录。但由于事务日志是串行的，一个“古老”的活动事务（即使它可能没有任何关联的活动）也可能阻碍其后所有其他事务的日志截断。对你而言，这意味着事务日志可能会“失控地增长”（并且你常常无法找出原因）。\n\
  \n加速数据库恢复 (Accelerated Database Recovery) 正是为了解决所有这些问题而设计的。\n\n### 加速数据库恢复的工作原理\n\
  \n加速数据库恢复 (ADR) 旨在通过以下功能来解决长运行事务的问题（如文档 [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-accelerated-database-recovery)\
  \ 所述）：\n\n*   **快速且一致的数据库恢复**\n\n    借助 ADR，长运行事务不会影响整体恢复时间，从而实现快速且一致的数据库恢复，无论系统中有多少活动事务或其大小如何。\n\
  \n*   **瞬时事务回滚**\n\n    借助 ADR，事务回滚是瞬时完成的，无论该事务已活动了多久或执行了多少次更新。\n\n*   **积极的日志截断**\n\
  \n    借助 ADR，事务日志会被积极截断，即使存在活动的长运行事务，这可以防止其失控增长。\n\n#### SQL Server 常规恢复\n\n为了理解加速数据库恢复如何解决这些问题，首先需要了解\
  \ SQL Server 传统恢复的工作原理。\n\n请考虑 CTR 论文（[`www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](http://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/)）中提供的图\
  \ 4-1。\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig1_HTML.jpg](img/479130_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\nSQL Server 的常规恢复过程\n\nSQL Server 的恢复过程包括三个阶段：\n\n1.  **分析**\n\n    从记录\
  \ `CHECKPOINT` 的日志记录开始扫描，一直扫描到日志末尾。\n\n    此分析使 SQL Server 能够知道：\n    *   在数据库最后一次离线时（可能仅仅是\
  \ SQL Server 关闭），哪些事务未提交（处于活动状态）。这些事务很可能需要回滚以确保一致性。\n    *   包含最旧的已修改或“脏”页的日志记录。SQL\
  \ Server 需要此信息，以便在必要时重做（redo）任何已提交事务中，其关联页面未能反映事务状态的情况。\n\n    换句话说，分析就是为执行接下来的两个阶段——**重做\
  \ (redo)** 和 **撤销 (undo)** ——做好准备。\n\n2.  **重做**\n\n    为了保证数据一致性，SQL Server 必须确保在恢复期间准确反映所有已提交的事务。实现此目标的方法涉及从事务日志中最旧的已修改或“脏”页的日志记录开始，将已提交事务中每个日志记录的\
  \ `LSN` 与受影响页面上的 `LSN` 进行比较。如果页面的 `LSN` 小于日志记录的 `LSN`，则必须*重做*该日志记录的操作（`INSERT`、`UPDATE`、`DELETE`\
  \ 等）。以此方式检查每个已提交事务的日志记录，直至日志末尾。\n\n    然而，第二阶段，即重做阶段，实际上是从最旧活动事务的日志记录处开始。重做阶段从这里开始是因为它需要为活动事务获取锁，以便在重做阶段之后数据库可以对用户可用（用户将被这些锁阻塞，因此无法访问活动事务的数据）。但是，这意味着重做阶段会受到最旧活动事务的日志记录大小的影响。现在你明白为什么恢复时间的长度会受到一个长活动事务的影响了吧？一旦重做完成，第三个也是最后一个阶段，撤销\
  \ (undo)，随即开始。\n\n3.  **撤销**\n\n    就像确保已提交事务准确反映在数据库页面上一样，SQL Server 必须确保任何**未**提交的事务**不**反映在数据库页面上。你可能想知道，对于未提交的事务，SQL\
  \ Server 怎么会将数据库页面固化到磁盘上呢？这是因为，如果 SQL Server 需要某个页面给其他用户，并且没有空闲页面可用，它可以在任何时候将已修改或脏页写入磁盘。或者，可能发生了\
  \ `CHECKPOINT`（包括间接检查点）操作，该操作会将已修改的页面写入磁盘，无论事务是否已提交。因此，如果 SQL Server 在有未提交的活动事务时关闭，引擎必须在恢复期间确保没有任何数据库页面包含与该未提交事务相关的任何修改。任何处于此状态的活动事务都需要被回滚，就像在运行时执行了\
  \ `ROLLBACK TRANSACTION` 一样。\n\n    SQL Server 通过反向扫描日志（从日志末尾扫描到最旧活动事务的日志记录）来执行必要的回滚操作，从而实现这一点。现在，撤销所需的时间与最旧活动事务的长度成正比。这也解释了为什么当客户试图终止\
  \ SQL Server 以期望快速启动数据库时会感到惊讶，因为一个长运行事务无法被终止（因为它正处于回滚状态），并且恢复需要很长时间。这是因为 SQL Server\
  \ 必须保持你的数据一致性，并且必须完成之前正在运行的回滚。\n\n    这种基于名为 ARIES 的设计的恢复系统（更多详情请参阅论文 [`https://dl.acm.org/citation.cfm?id=128770`](https://dl.acm.org/citation.cfm%253Fid%253D128770)）在过去的\
  \ 25 年里一直为 SQL Server 提供良好服务，并且除了我指出的这一种场景外，它都运行得非常完美（并且仍然需要并被使用）：即一个长运行的活动事务会延长重做和撤销处理的时间。\n\
  \n    现在，让我们看看加速数据库恢复 (ADR) 如何改变局面。\n\n\n\n"
- "# SQL Server 使用加速数据库恢复 (ADR)\n\n我不会试图详细介绍 CTR 论文描述的所有细节，但会阐述使 ADR 工作的基本组件，以及它与标准\
  \ ARIES 恢复方法的不同之处，然后通过一个例子让你有更深入的了解。\n\nADR 引入了**持久化版本存储** (PVS) 的概念。SQL Server\
  \ 有一个称为版本存储的概念，用于快照隔离，但该版本存储保存在 `tempdb` 中。PVS 是一个类似的概念，即为行的修改保存版本，但这个版本存储是持久的，因为它存储在用户数据库中（用于快照隔离的版本存储）不是持久的，因为它保存在\
  \ `tempdb` 中，而 `tempdb` 在服务器重启后会重建）。一旦启用 ADR，SQL Server 将开始使用版本跟踪修改。版本可以存储在数据库页面的行内\
  \ (`in-row`) 或数据库内的 `off-row` 存储中。版本包含修改前数据的先前状态以及导致该版本的事务 ID，以便轻松识别数据版本是否应对其它事务可见。\n\
  \n现在有了 PVS，像回滚这样的事务操作变得有趣且*简单*。如果一个事务被回滚，SQL Server 只需将该事务标记为 ABORTED（已中止）。现在，任何查询该行数据的请求都可以确定该行的某个版本是否可见并应被使用。如果一行的最新版本与一个\
  \ ABORTED 事务相关联，查询可以忽略此版本并查找先前的版本。如果该行的版本与已提交或活动事务相关联，则应用隔离级别规则来判断该行是否可见。\n\nSQL\
  \ Server 通过*中止事务映射表*的概念来维护事务状态以实现所有这些功能。CTR 论文中对此有更详细的讨论。\n\n## 注意\n\nADR 中关于版本的一个可能令人困惑的方面是隔离级别。当前的版本功能（在\
  \ `tempdb` 中）是专门为支持快照隔离级别而构建的。ADR 的版本并非为支持快照隔离而构建，但可以用来支持它们，并提供 ADR 的其它好处。\n\nPVS\
  \ 还对快速恢复有益（因此有恒定时间恢复的说法）。重做阶段只需确保版本存储在表页面的行内一致。撤销阶段只需将任何活动事务标记为已中止，然后如前所述的版本化过程会完成其余工作。这使得恢复非常迅速。\n\
  \n有些事务，主要是系统事务（例如，页面分配、更新统计信息），不能使用新的 PVS 方案。因此，当启用 ADR 时，SQL Server 为任何无法使用版本化的事务维护一个辅助日志\
  \ (`Slog`，存储在事务日志中)。与 Slog 关联的事务必须使用正常的 ARIES 恢复模式。幸运的是，系统事务几乎总是短暂的，因此不会像长时间运行的用户事务那样引起问题。\n\
  \n图 4-2 摘自 CTR 论文，展示了启用 ADR 后的新的恢复过程。\n\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig2_HTML.jpg](img/479130_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2: SQL Server 使用加速数据库恢复\n\n如图所示，SQL Server 的恢复仍然有三个阶段：分析、重做和撤销。但现在这个过程快得多，因此得名加速。\n\
  \n**分析**阶段仍然必须完成与过去相同的工作，从 CHECKPOINT 的最后一条日志记录开始，但重做和撤销阶段则大不相同。\n\n**重做**将确保 Slog\
  \ 操作的日志记录从最旧的活动事务到最旧的脏页操作的日志记录被重做。从这一点开始，重做将执行与 ARIES 恢复相同的确保数据正确提交的操作。但假设数据库使用了标准的检查点配置，这个序列通常应该是很短的。\n\
  \n**撤销**阶段只需将任何未提交的事务标记为已中止，但需要撤销 Slog 事务操作，类似于 ARIES 撤销用户事务。但系统事务本质上是短暂的，并且只占所有事务的极小部分，因此这个过程应该总是很快。\n\
  \n结果是一个全新的、基于保存在用户数据库中的版本存储的、极其快速的恢复系统。\n\n让我们用一个例子来更深入地了解使用 ADR 时事务日志记录有何不同。这个例子是完全独立的。你只需要\
  \ SQL Server 2019 和 SQL Server Management Studio (SSMS) 或 Azure Data Studio (ADS)\
  \ 来运行此示例。你将使用脚本 `alookatadr.sql`，该脚本位于 `ch4_mission_critical_availability/adr` 目录中。\n\
  \n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig3_HTML.jpg](img/479130_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3: 来自中止的 DELETE 操作的日志记录\n\n1.  打开脚本 `alookatadr.sql` 并执行脚本中的步骤 1 来创建数据库。\n\
  \n    ```sql\n    -- Step 1: 创建数据库并设为简单恢复模式。ADR 默认关闭\n    USE master\n    GO\n \
  \   DROP DATABASE IF EXISTS gocowboys\n    GO\n    CREATE DATABASE gocowboys\n \
  \   GO\n    ALTER DATABASE gocowboys SET RECOVERY SIMPLE\n    GO\n    ```\n\n  \
  \  提示：此示例对数据库使用 SIMPLE（简单）恢复模型，以便于检查日志记录。\n\n2.  运行脚本中的步骤 2 来创建一个表并插入行。注意脚本插入了 1000\
  \ 行。由于 ADR 的一项优化，你不能只用一行数据（你将在本章后面了解更多关于此优化的信息）。\n\n\n### 使用加速数据库恢复\n\n正如您从刚刚完成的示例中所见，使用加速数据库恢复无需进行任何应用程序更改。您只需使用以下\
  \ T-SQL 语句启用 ADR，即可开始运行：\n\n```\nALTER DATABASE  SET ACCELERATED_DATABASE_RECOVERY\
  \ = ON\n```\n\n让我们通过两个示例来了解：\n*   回滚现在执行的速度有多快，以及事务日志是如何被积极截断的\n*   恢复完成的速度有多快，让您可以快速访问数据库\n\
  \n运行这些示例所需的一切都可以在每个示例的笔记本和脚本中找到。\n\n#### 快速回滚与积极的日志截断\n\n使用以下示例，您可以查看使用 ADR 执行回滚的速度有多快，以及事务日志现在被截断得多么积极，从而避免过度的日志增长场景。在此示例中，我们将比较启用和不启用\
  \ ADR 时回滚的速度以及事务日志的增长情况。\n\n您可以使用 `ch4_mission_critical_availability\\adr` 目录中的\
  \ T-SQL 脚本 `adr.sql` 来运行此示例。\n\n我建议在此情况下使用 `ch4_mission_critical_availability\\\
  adr` 目录中的 T-SQL 笔记本 `adr.ipynb`。该笔记本包含创建数据库、创建表和插入数据的所有说明。然后，在禁用 ADR 的情况下，您将在一个事务中删除表中的所有行。接着，您将检查已使用但即使在检查点之后也无法截断的日志空间量。然后，您将观察回滚整个删除操作的速度（更准确地说，是缺乏速度）。\n\
  \n之后，在笔记本中，您将重复这些步骤，但这次启用 ADR。T-SQL 脚本包含所有相同的步骤。完成此示例后，让我们做一些更高级的操作。让我们使用相同的 T-SQL\
  \ 示例，但增加更多行，以查看恢复操作的影响。\n\n#### 加速恢复\n\n为了展示恢复速度有多快，您必须创建一个示例，其中恢复的撤销阶段需要尝试回滚大量修改或事务。\n\
  \n那么，如何创建一个 SQL Server 必须对某个事务运行撤销阶段的场景呢？为此，您需要构造一个场景，使得一个活动事务在 SQL Server 关闭前既未被回滚也未被提交。有三种方法可以实现这一点：\n\
  *   执行 T-SQL 语句 `SHUTDOWN WITH NOWAIT`。\n*   关闭 SQL Server 服务（例如，`net stop mssqlserver`）。\n\
  *   终止 `SQLSERVR.EXE` 进程（在 Windows 上，使用任务管理器的“结束任务”）。\n\n这些技术中的任何一种都会在不影响活动事务的情况下停止\
  \ SQL Server。还有一个额外的考虑因素。为了让 SQL Server 回滚活动事务，“必须有可回滚的内容”。如果受活动事务影响的数据库页从未被刷写到磁盘，那么当\
  \ SQL Server 运行恢复时，它无法“撤销”从未存在的东西。因此，当使用这些方法之一时，您应该对数据库执行一次 `CHECKPOINT`（正常关闭 SQL\
  \ Server 服务确实会对所有数据库运行检查点）。请注意，恢复编写器或延迟编写器可能已经刷写了这些页面，但这对于演示来说是不可靠的。\n\n### 提示\n\
  \n如果需要强制重做该怎么办？这有点像相反的方法。你必须有一个已提交的事务，但该事务影响的页面不能被刷新到磁盘。运行一个类似本章示例的事务，但提交该事务。然后“崩溃”服务器，但你必须在不进行检查点的情况下执行此操作，因此请使用“结束任务”方法。\n\
  \n了解这些知识后，你可以查阅位于 `ch4_mission_critical_availability\\adr` 目录下的 T-SQL 脚本 `adr_recovery.sql`\
  \ 或 T-SQL 笔记本 `adr_recovery.ipynb`。我推荐使用笔记本，因为它有文档说明了每个步骤，并指导何时“崩溃” SQL Server。\n\
  \n在执行笔记本或脚本的步骤时，你需要检查 `ERRORLOG`。我这里提供了在启用和未启用 ADR 的情况下，恢复运行时你应该看到的日志示例。\n\n以下是未启用\
  \ ADR 时的 `ERRORLOG` 示例。\n\n```\nspid25s     数据库 'gocowboys' (6) 的恢复已完成 2%（大约剩余 697\
  \ 秒）。3 个阶段中的第 2 阶段。这只是信息性消息。不需要用户操作。\nspid25s     数据库 'gocowboys' (6) 的恢复已完成 5%（大约剩余\
