  \    ```sql\n    SELECT top 10 oh.[Order Key], oh.[Order Date Key],oh.[Unit Price],\
  \ o.Quantity\n    FROM Fact.OrderHistoryExtended AS oh\n    INNER JOIN @Order AS\
  \ o\n    ON o.[Order Key] = oh.[Order Key]\n    WHERE oh.[Unit Price] > 0.10\n \
