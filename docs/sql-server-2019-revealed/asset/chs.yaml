  \ Linux。`k8s` 起源于 Linux，所以这很有道理。不过，为了给您更多灵活性，我们希望 Windows Server 能成为 `k8s` 世界的一部分，因此现在可以使用\
  \ Windows Server 来托管 `k8s` 集群。集群中的所有内容不会是“纯” Windows，但支持基于 Windows 容器的节点。您可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/kubernetes/getting-started-kubernetes-windows)\
  \ 阅读更多关于 Kubernetes 与 Windows 的信息。\n\n### 其他 `k8s` 云提供商\n\nAzure 并不是唯一的云 `k8s` 提供商。亚马逊有\
  \ Elastic Kubernetes 服务 (EKS)，谷歌有 Google Kubernetes 引擎 (GKE)，还有其他一些。\n\n### 其他 `k8s`\
  \ 提供商\n\n市场上还有其他 `k8s` 提供商。SUSE 有几个 `k8s` 解决方案，您可以在 [`www.suse.com/solutions/kubernetes/`](https://www.suse.com/solutions/kubernetes/)\
  \ 阅读相关信息。我看到客户经常谈论的一个较受欢迎的方案是 Rancher ( [`https://rancher.com/`](https://rancher.com/)\
  \ )。我相信您可能也听说过客户想使用的其他方案。我未来将特别关注的另一个 `k8s` 提供商是 VMWare PKS ( [`https://cloud.vmware.com/vmware-enterprise-pks`](https://cloud.vmware.com/vmware-enterprise-pks)\
  \ )。\n\n最终，您对 `k8s` 的选择取决于您是想在数据中心还是在公共云中部署 `k8s`。您的其他决策应基于您将获得何种支持、`k8s` 集群是托管的还是需要您管理一切，以及该\
  \ `k8s` 发行版是否能够持续存在并在未来保持相关性。SQL Server 几乎可以在所有 `k8s` 平台和提供商上运行。作为微软的员工，我很有兴趣观察\
  \ AKS 和 Windows Server 上 `k8s` 的普及程度。根据我与 Linux 的经验，OpenShift 是一股主要力量，也是许多客户正在使用或评估的\
  \ `k8s` 平台。\n\n是时候通过示例来学习了，让我们来看看使用 `k8s` 和 SQL Server 2019 进行部署、高可用性和更新的示例所需的先决条件。\n\
  \n\n## 示例的先决条件\n\n本章中的所有示例都依赖于跨平台 CLI 工具 `kubectl`。您应该能够将任何使用 `kubectl` 的 k8s 发行版与本章中的示例配合使用。\n\
  \n我使用 Azure Kubernetes Service (`AKS`) 来部署我的 k8s 集群以运行所有示例。因此，当您将我的示例用于您的 k8s 发行版时，可能会存在两个差异：\n\
  \n*   `存储类` – 我的示例使用了 Azure 磁盘的存储类。您需要将其替换为特定于您平台的存储类。\n*   `负载均衡器` – 我的示例为服务使用了负载均衡器类型，但这仅在\
  \ k8s 云提供商中实现。如果您不是为 k8s 使用云提供商，您将需要使用一种名为 `NodePort` 的服务类型。您可以在 [`https://kubernetes.io/docs/concepts/services-networking/#nodeport`](https://kubernetes.io/docs/concepts/services-networking/%2523nodeport)\
  \ 阅读更多关于 `NodePort` 的信息。\n\n除此之外，本章中的这些示例应该能在您配置的任何 k8s 平台上运行。\n\n如果您使用 `AKS`，我根据文档\
  \ [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-walkthrough)\
  \ 中的步骤创建了我的 `AKS` 集群。\n\n**`createaksrg.sh`**\n```\naz group create --name bwaks\
  \ --location eastus2\n```\n\n**`createaks.sh`**\n```\naz aks create \\\n--resource-group\
  \ bwaks \\\n--name bwsqlaks \\\n--node-count 2 \\\n--enable-addons monitoring \\\
  \n--generate-ssh-keys\n```\n\n**`connectoaks.sh`**\n```\naz aks get-credentials\
  \ --resource-group bwaks --name bwsqlaks\n```\n\n您可以在 `ch8_sql_on_k8s` 目录中看到我用于创建资源组、创建集群和连接到集群的脚本及命令。尽管这些是\
  \ Bash shell 脚本，但您可以在支持 Azure CLI 的地方运行这些命令。我喜欢使用 Azure Cloud Shell（我将在这些示例中展示），因为其中内置了\
  \ Azure CLI。如果您想使用某个平台，您需要在 [`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli?view=azure-cli-latest`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli%253Fview%253Dazure-cli-latest)\
  \ 安装 Azure CLI。\n\n我还建议您安装 Kubernetes Visual Studio Code 扩展，以协助使用 k8s 集群和对象。我本想将其安装在\
  \ Azure Data Studio 上。为此，您需要下载以下扩展：\n*   [`https://marketplace.visualstudio.com/items?itemName=redhat.vscode-yaml`](https://marketplace.visualstudio.com/items%253FitemName%253Dredhat.vscode-yaml)\n\
  *   [`https://marketplace.visualstudio.com/items?itemName=ms-kubernetes-tools.vscode-kubernetes-tools`](https://marketplace.visualstudio.com/items%253FitemName%253Dms-kubernetes-tools.vscode-kubernetes-tools)\n\
  \n要使用此扩展，您还需要从 [`https://kubernetes.io/docs/tasks/tools/install-kubectl/`](https://kubernetes.io/docs/tasks/tools/install-kubectl/)\
  \ 安装 `kubectl`。\n\n要了解有关如何使用 Azure Data Studio 安装扩展的更多信息，请参阅文档 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions)。\n\
  \n正如我所说，对我来说，我喜欢在 Azure Cloud Shell 中使用这些示例。Azure Cloud Shell 同时支持 PowerShell 和\
  \ bash，并包含许多内置工具，如 Azure CLI、`kubectl`，甚至 `sqlcmd`。您可以在 [`https://azure.microsoft.com/en-us/features/cloud-shell`](https://azure.microsoft.com/en-us/features/cloud-shell)\
  \ 阅读更多关于 Azure Cloud Shell 的信息。\n\n无论您使用什么客户端或 k8s 发行版，只要您能运行 `kubectl`，您就可以使用这些示例。\n\
  \n## 在 k8s 上部署 SQL Server\n\n对于本节中的示例，让我向您展示如何部署一个包含单个 SQL Server 容器的 pod。\n\n您将需要一个用于\
  \ `sa` 密码的 secret，用于数据库的存储，以及一个用于连接到 SQL Server 的负载均衡器。所有这些都将通过一系列 `kubectl` 命令和声明式的\
  \ `YAML` 文件来完成。\n\n此外，我建议您使用 k8s 中的命名空间概念来创建自己的 pod。命名空间为您在 k8s 集群中创建的对象（例如 pod）提供了一个作用域，使其与其他对象分离。命名空间提供了一个非常好的机制来组织和管理您的\
  \ k8s 对象。\n\n让我们一步一步地完成在 pod 中部署和连接到 SQL Server 容器的过程。这些步骤假设您有一个现有的 k8s 集群。我按照先决条件中描述的那样，使用\
  \ `AKS` 创建了一个双节点集群，但即使是单节点集群也可以工作。\n\n当我进行这些示例时，我使用了 Azure Cloud Shell，它可以从任何浏览器运行，如图\
  \ 8-1 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig1_HTML.jpg](img/479130_1_En_8_Fig1_HTML.jpg)\n\
  *图 8-1 使用 Azure Cloud Shell 运行 Kubernetes*\n\n我喜欢 Azure Cloud Shell。有一次，我在飞回德克萨斯州的航班上，笔记本电脑的电池没电了。我需要为正在构建的演示做一些与\
  \ `AKS` 相关的工作。我的 iPhone 还有电，而且我听说过 Azure 应用（[`https://apps.apple.com/us/app/microsoft-azure/id1219013620`](https://apps.apple.com/us/app/microsoft-azure/id1219013620)）。我安装了该应用，使用我的订阅登录，并浏览了我的\
  \ Azure 资源。然后我注意到该应用有一个云 Shell 选项。我选择了它，现在我又能继续工作了。图 8-2 展示了我从手机使用 Azure Cloud Shell\
  \ 的示例。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig2_HTML.jpg](img/479130_1_En_8_Fig2_HTML.jpg)\n\
  *图 8-2 移动的 k8s 用户*\n\n我记得当时坐在一位正在手机上玩 Candy Crush 的乘客旁边。他看到我做的事，问道：“你在玩什么游戏？”我的回答是：“我正在用\
  \ Cloud Shell 部署一个 Kubernetes 集群。”他回去玩他的游戏了，毫无疑问在想这个怪人玩的是什么“Kubernetes 游戏”。\n\n\
  部署的示例脚本可以在 `ch8_sql_on_k8s\\deploy` 目录中找到。确保使用 `chmod u+x <script>` 为 shell 脚本设置执行权限。另外，如果您想在\
  \ Azure Cloud Shell 中运行这些脚本，请阅读以下关于上传这些示例脚本的文档（[`https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage#transfer-local-files-to-cloud-shell`](https://docs.microsoft.com/en-us/azure/cloud-shell/persisting-shell-storage%2523transfer-local-files-to-cloud-shell)）。请记住，Azure\
  \ Cloud Shell 的最大优势在于它只需要一个浏览器，并且所有工具如 `kubectl`、`az` 和 `sqlcmd` 都已预先安装。\n\n开始在\
  \ `AKS` 中部署 SQL Server 的示例：\n\n1.  使用以下命令或脚本 `step1_create_namespace.sh` 创建一个命名空间：\n\
  \    ```\n    kubectl create namespace mssql\n    ```\n    您应该会收到这条指示命名空间已创建的消息：\n\
  \    ```\n    namespace/mssql created\n    ```\n    您也可以通过运行此命令来验证命名空间是否已创建：\n \
  \   ```\n    kubectl get namespaces\n    ```\n    在我的集群上，我得到了以下结果。其他命名空间是 k8s 集群自带的。\n\
  \    ```\n    NAME          STATUS   AGE\n    default       Active   2d10h\n   \
  \ kube-public   Active   2d10h\n    kube-system   Active   2d10h\n    mssql    \
  \     Active   56s\n    ```\n\n\n2. 我希望我所有的对象都在新的 `mssql` 命名空间中创建。在创建对象时，我可以显式地使用命名空间，也可以使用以下命令（或使用脚本\
  \ **step2_setcontext.sh**）设置新命名空间的默认上下文。请替换你的集群和用户名。你可以使用命令 `kubectl config view`\
  \ 来找到这些信息。\n\n```\nkubectl config set-context mssql --namespace=mssql --cluster=bwsqlaks\
  \ --user=clusterUser_bwaks_bwsqlaks\nkubectl config use-context mssql\n```\n\n如果此命令成功，你应该会看到如下输出：\n\
  \n```\nContext \"mssql\" created.\nSwitched to context \"mssql\".\n```\n\n要验证你的上下文是否正确或随时查看它，请运行以下命令：\n\
  \n```\nkubectl config current-context\n```\n\n3. 现在，让我们创建用于 SQL Server Pod 的负载均衡器服务。关于负载均衡器和\
  \ Azure 这样的云服务，我要提醒你注意。Azure 实际上是为你提供一个不会改变的公共 IP 端点，因此你可以将其绑定到 Pod 的私有 IP 地址，无论该地址如何变化。我遇到过负载均衡器服务需要一些时间才能创建的情况。因此，我建议一旦创建它们，就不要删除，除非你正在进行本章演示中的测试。\n\
  \n运行以下命令或脚本 **step3_create_service.sh** 来创建负载均衡器：\n\n```\nkubectl apply -f sqlloadbalancer.yaml\
  \ --record\n```\n\n这是一个使用 YAML 文件以声明方式访问 k8s API 服务器的示例。使用 `kubectl apply` 你实际是在向\
  \ API 服务器发送 API 命令，就像你直接使用 API 编写代码一样（是的，你现在是一名 k8s 程序员了）。\n\n让我们查看 **sqlloadbalancer.yaml**\
  \ 文件来理解这种格式的示例：\n\n```\napiVersion: v1\nkind: Service\nmetadata:\n  name: mssql-service\n\
  spec:\n  selector:\n    app: mssql\n  ports:\n    - protocol: TCP\n      port: 31433\n\
  \      targetPort: 1433\n  type: LoadBalancer\n```\n\n协议使用标签和值语法。你可以使用的一个参考资源是 [`https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/`](https://kubernetes.io/docs/concepts/overview/working-with-objects/kubernetes-objects/)\
  \ ，用于确定各种 k8s 对象的确切标签和值集。就我个人而言，我会查看示例，复制它们，然后根据我自己的场景进行修改。\n\n让我们使用这个 YAML 文件来解释一些值。\n\
  \n```\napiVersion: v1\n```\n\n每个 YAML 文件都需要这个 `apiVersion` 字段。这告诉 API 服务器你在使用哪个“版本”的\
  \ API 来进行各种 k8s 操作。你通常应该坚持使用 `v1`，但一些新的 k8s 概念可能需要“beta”或其他版本。在 [`https://kubernetes.io/docs/reference/using-api/api-overview/#api-versioning`](https://kubernetes.io/docs/reference/using-api/api-overview/%23api-versioning)\
  \ 阅读更多关于 API 版本控制的信息。\n\n```\nkind: Service\n```\n\n这告诉 API 服务器你正在与哪种对象进行交互。在这种情况下，它是一个\
  \ `Service` 对象，它将帮助我们部署一个负载均衡器。你可以在 [`https://kubernetes.io/docs/concepts/services-networking/service/`](https://kubernetes.io/docs/concepts/services-networking/service/)\
  \ 阅读更多关于 k8s `Service` 的信息。\n\n```\nmetadata:\n  name: mssql-service\n```\n\n这是服务的名称。你将使用它来管理对象，并将其绑定到另一个对象（如\
  \ Pod）。\n\n```\nspec:\n  selector:\n    app: mssql\n  ports:\n    - protocol: TCP\n\
  \      port: 31433\n      targetPort: 1433\n  type: LoadBalancer\n```\n\n`spec`\
  \ 标签允许你定义有关 `Service` 对象的更多详细信息。`selector` 允许你使用“标签”来分组和标识对象。在这种情况下，使用 **app:mssql**\
  \ 标签将允许你基于标签在 k8s 中管理和查看对象。我将在本练习中展示一个使用此标签的示例。`app: mssql` 标签对于 `LoadBalancer`\
  \ 也很关键，因为它将 `LoadBalancer` 绑定到任何使用相同标签的 Pod（这将是我们的 SQL Server Pod）。\n\n`ports` 部分允许你将外部查看的端口映射到\
  \ Pod 内部的端口。这对于 SQL Server 来说是合理的，因为就像你在第 7 章关于容器中学到的，在主机级别不能有多个 SQL Server 监听端口\
  \ 1433。在这个示例中，当应用程序想要连接到 SQL Server 时，它们将使用 `Service` 的 IP 地址和端口 31433。我稍后会在示例中向你展示一个连接到\
  \ SQL Server `Service` 的巧妙技巧。\n\n`type` 是服务的类型，在这种情况下，是由云提供商实现的 `LoadBalancer` 服务。可以在\
  \ [`https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types`](https://kubernetes.io/docs/concepts/services-networking/service/%23publishing-services-service-types)\
  \ 找到各种服务类型。\n\n当你使用 `apply` 选项和 YAML 文件执行 `kubectl` 时，执行通常是*异步*的。这意味着 `kubectl`\
  \ 命令将立即返回，但 YAML 文件中声明的操作由 API 服务器在后台调度。\n\n在这种情况下，当你为此服务执行 `kubectl apply` 命令时，你的结果应该如下所示：\n\
  \n```\nservice/mssql-service created\n```\n\n这个结果实际上意味着服务创建已被*调度*。如何知道服务是否已准备好使用？有几种方法。首先，你可以运行以下命令：\n\
  \n```\nkubectl get service\n```\n\n你的结果可能如下所示：\n\n```\nNAME            TYPE    \
  \       CLUSTER-IP      EXTERNAL-IP   PORT(S)           AGE\nmssql-service   LoadBalancer\
  \   10.0.150.233    <pending>     31433:32010/TCP   61s\n```\n\n`CLUSTER-IP` 是 k8s\
  \ 集群内的私有 IP 地址。`EXTERNAL-IP` 将是你可以用于连接 SQL Server 的静态公共 IP。注意 `PORT` 的值是 `31433:32010`。尽管\
  \ SQL Server 在容器中监听端口 1433，但端口 32010 映射到集群内的端口 1433。端口 31433 映射到 32010，允许你通过连接 `<EXTERNAL-IP>,<31433>`\
  \ 来连接 SQL Server，无论 SQL Server 的 Pod 位于 k8s 集群内的哪个位置。\n\n注意，在你运行此 `kubectl apply`\
  \ 命令后立即查看时，`EXTERNAL-IP` 的值是 `<pending>`。在该值变为有效的 IP 地址之前，你将无法使用 `LoadBalancer`；这可能需要几分钟才能完成。\n\
  \n4. 既然 `LoadBalancer` 已被调度创建，让我们创建一个 `secret` 来保存 SQL Server 的 `sa` 密码。使用以下命令或脚本\
  \ **step4_create_secret.sh**：\n\n```\nkubectl create secret generic mssql-secret\
  \ --from-literal=SA_PASSWORD=\"Sql2019isfast\"\n```\n\n当此命令完成时，你应该会看到以下结果，并且 `secret`\
  \ 应该立即创建：\n\n```\nsecret/mssql-secret created\n```\n\n\n## 注意\n\n在第 7 章中，我提到了 SQL\
  \ Server 容器对 Active Directory 认证的支持即将到来，适用于 SQL Server 2019。一旦此功能最终确定，我们应该也能够在 k8s\
  \ 中为 SQL Server 支持 AD 认证。\n\n### 步骤 1\n下一步是使用`PersistentVolumeClaim`（PVC）的概念为 SQL\
  \ Server 数据库创建存储。PVC 类似于在核心磁盘系统之上定义的卷，我们可以将其映射到 SQL Server Pod 的数据库目录。\n\n使用以下命令创建用于\
  \ SQL Server Pod 的 PVC，或运行脚本`step5_create_storage.sh`：\n```bash\nkubectl apply -f\
  \ storage.yaml\n```\n\n您应该会很快看到此消息返回，并且 PVC 将在后台创建：\n```\npersistentvolumeclaim/mssql-data\
  \ created\n```\n\n在创建的同时（这可能很快），让我们查看`storage.yaml`文件以了解幕后发生的事情：\n```yaml\napiVersion:\
  \ v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: mssql-data\n  annotations:\n\
  \    volume.beta.kubernetes.io/storage-class: azure-disk\nspec:\n  accessModes:\n\
  \    - ReadWriteOnce\n  resources:\n    requests:\n      storage: 8Gi\n```\n\n元数据很有趣，因为注释标签将\
  \ PVC 绑定到一个名为存储类的磁盘。我怎么知道要使用`azure-disk`？这是因为当您创建 AKS 集群时，您会自动获得一个基于高级存储的 Azure\
  \ 磁盘，其存储类名为`azure-disk`。您可以创建其他的，但这是 AKS 创建的标准存储类。您可以在 [`https://docs.microsoft.com/zh-cn/azure/aks/concepts-storage`](https://docs.microsoft.com/zh-cn/azure/aks/concepts-storage)\
  \ 阅读更多关于 AKS 存储的信息。如果您不使用 k8s，您可能已经创建了存储类，或者可以咨询您的 k8s 管理员，或者使用以下命令找出可用的存储类：\n```bash\n\
  kubectl get StorageClass\n```\n\n通过运行以下命令，您可以找到有关`azure-disk`的更多详细信息：\n```bash\n\
  kubectl describe StorageClass azure-disk\n```\n\n`storage.yaml`的`spec`部分描述了 PVC\
  \ 允许的访问方式以及卷的大小。`AccessModes`为`ReadWriteOnce`意味着卷是读/写的，并且一次只允许一个 Pod/节点访问该卷。这并不意味着\
  \ Pod 不能移动到另一个节点并访问卷（正如您将在本章后面学到的，这将是高可用性（HA）的基本概念）。它只是意味着两个 Pod 或两个节点不能同时访问该卷。这对于\
  \ SQL Server 数据库来说是合理的。`8Gi`表示卷的大小为 8GB。\n\n您可以通过运行以下命令查看 PVC 是否成功创建：\n```bash\n\
  kubectl describe PersistentVolumeClaims mssql-data\n```\n\n在输出的底部，成功的 PVC 创建看起来像这样：\n\
  ```\nType    Reason                 Age    From                         Message\n\
  ----    ------                 ----   ----                         -------\nNormal\
  \  ProvisioningSucceeded  9m16s  persistentvolume-controller  Successfully provisioned\
  \ volume pvc-b8c9225e-c038-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
  ```\n\n我见过一些场景，可能会有一些临时的超时或错误，但最终 PVC 会被创建。\n\n### 步骤 2\n现在您有了负载均衡器服务、sa 密码的秘钥和存储。是时候将这些整合在一起，创建一个包含单个\
  \ SQL Server 容器的 Pod 了。运行以下命令或脚本`step6_deploy_sql2019.sh`（`--record`选项提供了来自部署幕后更多的细节）：\n\
  ```bash\nkubectl apply -f sql2019deployment.yaml --record\n```\n\n您应该会看到这些结果，表明已调度了一个`deployment`：\n\
  ```\ndeployment.apps/mssql-deployment created\n```\n\n`deployment`将允许我们使用`ReplicaSet`的概念为\
  \ SQL Server Pod 创建 Pod。当我向您展示 k8s 的内置 HA 功能时，我会稍后定义`ReplicaSet`。\n\n要查看部署的状态以及与\
  \ Pod 相关的对象，请运行以下命令：\n```bash\nkubectl get all\n```\n\n这将显示当前上下文（命名空间 mssql）中的所有对象，包括\
  \ Pod、LoadBalancer 和部署的状态。\n\n如果您立即运行此命令，可能会看到类似以下的结果：\n```\nNAME              \
  \                     READY  STATUS             RESTARTS  AGE\npod/mssql-deployment-7bb4c5f5d7-rpw45\
  \  0/1    ContainerCreating  0         4s\nNAME                    TYPE        \
  \   CLUSTER-IP     EXTERNAL-IP     PORT(S)           AGE\nservice/mssql-service\
  \   LoadBalancer   10.0.150.233   13.77.103.119   31433:32010/TCP   55m\nNAME  \
  \                            READY  UP-TO-DATE  AVAILABLE  AGE\ndeployment.apps/mssql-deployment\
  \  0/1    1           0          4s\nNAME                                      \
  \   DESIRED  CURRENT  READY  AGE\nreplicaset.apps/mssql-deployment-7bb4c5f5d7  1\
  \        1        0      4s\n```\n\n第一行是 Pod 创建的`STATUS`。`STATUS`为`ContainerCreating`意味着为\
  \ Pod 定义的容器正在创建过程中。如果这是您第一次使用 SQL Server 容器镜像创建 Pod，可能需要更长时间，因为容器镜像必须被拉取到 k8s 的本地\
  \ docker 注册表中。\n\n部署`STATUS`指示整体部署何时成功。LoadBalancer 的`STATUS`独立于部署。这意味着您需要等待 Pod\
  \ 状态变为`Running`，LoadBalancer 具有有效的`EXTERNAL-IP`地址，并且部署的`AVAILABLE = 1`，然后才能开始连接到\
  \ SQL Server。`Replica`的状态应与 Pod 或部署的状态匹配。\n\n在 Pod 仍在创建时，让我们看看各个部分中的`sql2019deployment.yaml`文件。\n\
  ```yaml\nkind: Deployment\nmetadata:\n  name: mssql-deployment\n```\n\n此部分告诉 API\
  \ 服务器我们正在创建一个 Pod 的部署及其名称。\n\nYAML 的其余部分是部署的规范，让我们来分解一下。\n```yaml\nreplicas: 1\n\
  selector:\n  matchLabels:\n    app: mssql\nstrategy:\n  type: Recreate\n```\n\n\
  这定义了 Pod 的副本数（一个），并在需要任何更新时重新创建 Pod。我将在本章后面解释这些术语的重要性。`matchLabels`用于将部署的标签与 Pod\
  \ 标签（两者都是`mssql`）关联起来。\n\n下一个主要部分称为`template`，它定义了 Pod 容器的更多细节以及用于存储的卷。\n\n您可以在`template`部分看到我们使用了另一个`app`标签为`mssql`，因此我们可以使用标签来管理、查看或控制与部署相关的对象。\n\
  \n接下来是 Pod 的规范，其中包含有关要在 Pod 中部署的容器的详细信息。\n```yaml\nspec:\n  terminationGracePeriodSeconds:\
  \ 10\n  containers:\n  - name: mssql\n    image: mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  \    env:\n    - name: MSSQL_PID\n      value: \"Developer\"\n    - name: ACCEPT_EULA\n\
  \      value: \"Y\"\n    - name: MSSQL_SA_PASSWORD\n      valueFrom:\n        secretKeyRef:\n\
  \          name: mssql-secret\n          key: SA_PASSWORD\n    volumeMounts:\n \
  \   - name: mssqldb\n      mountPath: /var/opt/mssql\n```\n\n在`spec`中，您可以看到一些熟悉的东西，如果您使用过容器。您看到容器将基于的镜像以及提供给\
  \ SQL Server 容器的环境变量。请注意`sa`密码是如何映射到您已经创建的秘钥的。\n\n`terminationGracePeriodSeconds`的值定义了\
  \ k8s 在容器需要终止时允许其自行关闭的时间。SQL Server 可能需要或多或少的时间，但我在我们的示例中选择了 10 秒。无论是否正常关闭，SQL Server\
  \ 都具有一致性弹性。\n\n`volumeMount`条目是一个名为`mssqldb`的名称，它映射到存储所有 SQL Server 数据库的目录。`mssqldb`在此`spec`下方作为部署的一部分定义：\n\
  ```yaml\nvolumes:\n- name: mssqldb\n  persistentVolumeClaim:\n    claimName: mssql-data\n\
  ```\n\n这里是与所创建 PVC 的映射。现在，当 SQL Server 容器在 Pod 中启动时，默认情况下所有系统和用户数据库都将存在于具有 PVC 的持久存储中。当您在本章的其他部分了解\
  \ HA 和更新时，您将看到这如何变得重要。\n\n您可以再次运行`kubectl get all`，查看 SQL Server 的所有组件是否已就绪。\n\n\
  您还可以使用其他一些有趣的`kubectl`命令来检查 Pod 和 SQL Server 的状态。要查看选项的完整列表，您可以运行命令`kubectl help`，或者查看`[`https://kubernetes.io/docs/reference/kubectl/overview`](https://kubernetes.io/zh-cn/docs/reference/kubectl/overview)`处的`kubectl`参考文档。\n\
  \n### 步骤 3\n运行以下命令以查看 Pod（以及 Pod 中的容器）的日志，这恰好是 SQL Server 的`ERRORLOG`。您也可以使用脚本`step7_getlogs.sh`：\n\
  ```bash\nkubectl logs -l app=mssql --tail=100000\n```\n\n通常，`kubectl logs`命令需要 Pod\
  \ 名称，但您可以使用`mssql`标签，而不必查找 Pod 的名称。\n\n您的结果应该是 SQL Server `ERRORLOG`的转储。\n\n###\
  \ 步骤 4\n您还可以通过运行以下命令或脚本`step8_getevents.sh`，查看到目前为止在此命名空间中完成的与操作相关的事件的详细视图：\n```bash\n\
  kubectl get events\n```\n\n您的输出应显示此命名空间中发生的事件的时间线。如果一切顺利，它应该类似于以下内容：\n```\nLAST\
  \ SEEN   TYPE     REASON                   KIND                     MESSAGE\n29m\
  \         Normal   ProvisioningSucceeded    PersistentVolumeClaim   Successfully\
  \ provisioned volume pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8 using kubernetes.io/azure-disk\n\
  25m         Normal   Scheduled                Pod                      Successfully\
  \ assigned mssql/mssql-deployment-7b6565d684-8r7cc to aks-nodepool1-90949249-0\n\
  25m         Normal   SuccessfulAttachVolume   Pod                      AttachVolume.Attach\
  \ succeeded for volume \"pvc-c18b530f-c040-11e9-b5fa-c6f80bad26d8\"\n24m       \
  \  Normal   Pulled                   Pod                      Container image \"\
  mcr.microsoft.com/mssql/rhel/server:2019-latest\" already present on machine\n24m\
  \         Normal   Created                  Pod                      Created container\n\
  24m         Normal   Started                  Pod                      Started container\n\
  25m         Normal   SuccessfulCreate         ReplicaSet               Created pod:\
  \ mssql-deployment-7b6565d684-8r7cc\n25m         Normal   ScalingReplicaSet    \
  \    Deployment               Scaled up replica set mssql-deployment-7b6565d684\
  \ to 1\n30m         Normal   EnsuringLoadBalancer     Service                  Ensuring\
  \ load balancer\n29m         Normal   EnsuredLoadBalancer      Service         \
  \         Ensured load balancer\n```\n\n### 步骤 5\n您还可以使用以下命令或脚本`step9_describe_deployment.sh`获取有关部署的更多详细信息：\n\
  ```bash\nkubectl describe deployment mssql-deployment\n```\n\n您将获得有关部署的所有类型详细信息，包括专门与部署相关的最新事件。\n\
  \n### 步骤 6\n您还可以使用以下命令或脚本`step10_describe_pod.sh`获取有关已部署 Pod 的更多详细信息：\n```bash\n\
  kubectl describe pod -l app=mssql\n```\n\n这就是使用`mssql`标签再次发挥作用的地方。您将获得有关 Pod、Pod\
  \ 内的容器以及与 Pod 相关的事件的更多详细信息，而您只需记住`mssql`标签。\n\n此命令与`kubectl get events`一起，对于 Pod\
  \ 部署的故障排除目的非常有用。\n\n### 步骤 7\n现在（终于）是时候连接到在 Pod 容器中运行的 SQL Server 了。这是我从 Anthony\
  \ Nocentino（Linux、容器和 k8s 方面的知名专家，也是我《Pro SQL Server on Linux》的技术审稿人）那里学到的一个技巧。运行以下命令或脚本`step11_testsql.sh`以通过\
  \ LoadBalancer 连接到 SQL Server：\n```bash\nSERVERIP=$(kubectl get service | grep mssql-service\
  \ | awk {'print $4'})\nPORT=31433\nsqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT\
  \ -Q\"SELECT @@version\"\n```\n\n您的结果应显示已安装的 SQL Server 版本。如果您仔细查看此命令，它会动态提取 LoadBalancer\
  \ 的`EXTERNAL-IP`并解析出 IP 地址以用作连接字符串的一部分。您还可以更进一步，从`kubectl get service`的输出中添加用于解析端口的逻辑。\n\
  \n这比仅仅让您运行每个步骤要详细得多，因为我想向您描述幕后发生的事情，并让您了解更多关于 YAML 如何作为 k8s 的编程接口 API 工作的知识。\n\n\
  ### 关于 Kubernetes 的使用技巧\n\n在进入下一节之前，既然你已经部署了一个 SQL Server Pod，让我向你展示一些结合 Kubernetes\
  \ 使用其他资源的技巧。\n\n#### Kubernetes 扩展组件\n\n我在本章前面名为“示例先决条件”的一节中讨论了适用于 Visual Studio\
  \ Code 的 Kubernetes 扩展组件，并演示了如何为 Azure Data Studio (ADS) 安装该组件。\n\n让我向你展示一些在已部署的\
  \ SQL Server Pod 上使用此扩展组件的示例。\n\n首先，使用 k8s 扩展组件及其对 YAML 的依赖关系时，它会为 YAML 文件的使用提供提示。使用\
  \ ADS 的资源管理器功能在示例的 `ch8_sql_on_k8s\\deploy` 目录中找到 `sql2019deployment.yaml` 文件。\n\
  \n将鼠标悬停在任何 YAML 语法上，即可获取文件中各种语句的提示。例如，图 8-3 显示了关于 `terminationGracePeriodSeconds`\
  \ 声明的提示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig3_HTML.jpg](img/479130_1_En_8_Fig3_HTML.jpg)\n\
  \n*图 8-3：使用 k8s 扩展组件浏览 YAML 文件*\n\nADS 扩展组件还包含一个“实时”资源管理器，用于查看 k8s 资源。我使用它来连接到我的\
  \ AKS 集群（如果你使用 AKS，在使用该工具时需要提供一些登录信息）。连接后，我可以浏览对象，甚至执行一些有趣的操作。\n\n由于我的 Pod 部署在一个命名空间中，我首先需要将上下文切换到该命名空间，如图\
  \ 8-4 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig4_HTML.jpg](img/479130_1_En_8_Fig4_HTML.jpg)\n\
  \n*图 8-4：使用 k8s 扩展组件设置命名空间*\n\n一个很酷的功能是，我可以附加到正在运行的 Pod 上，并运行一个 Bash shell 来查看 `ERRORLOG`。首先，我在\
  \ k8s 资源管理器中找到我的部署，然后使用右键选项选择“终端”，如图 8-5 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig5_HTML.jpg](img/479130_1_En_8_Fig5_HTML.jpg)\n\
  \n*图 8-5：在 k8s Pod 中运行终端会话*\n\nADS 的终端随即显示，现在我处于 Pod 的 SQL 容器内的 Bash shell 中。然后我可以导航到\
  \ `/var/opt/mssql/log` 并输出 `ERRORLOG`，如图 8-6 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig6_HTML.jpg](img/479130_1_En_8_Fig6_HTML.jpg)\n\
  \n*图 8-6：在 k8s 中转储 SQL Server Pod 的 ERRORLOG*\n\n我输入 `exit` 以退出终端会话。我注意到的另一件事是能够对部署进行反向工程，以查看该部署对应的\
  \ YAML 文件是什么样子。在部署上使用右键功能，我选择了“转换为模板”，如图 8-7 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig7_HTML.jpg](img/479130_1_En_8_Fig7_HTML.jpg)\n\
  \n*图 8-7：对 k8s 部署进行反向工程*\n\n我输入了 YAML 文件的名称，随后出现了一个编辑器，显示了生成的 YAML 文件。\n\n我相信 k8s\
  \ 扩展组件还有其他我没有探索到的巧妙选项，但我将在我的 Kubernetes 之旅中继续使用它。\n\n#### 其他 kubectl 命令\n\n`kubectl`\
  \ 还有很多其他值得展示的命令，包括：\n\n*   `kubectl top` – 此命令可按节点或 Pod 基础显示内存和 CPU 的指标。例如，这有助于查看某个\
  \ Pod 消耗了多少内存，或者节点上还剩多少内存。\n*   `kubectl cp` – 此命令可用于将文件复制到 Pod 的容器文件系统中。就像 `docker\
  \ cp` 一样，你可以使用此命令将 SQL Server 数据库的备份文件复制到容器的可写层中。\n\n    例如，假设你部署的示例 Pod 名称在 `mssql`\
  \ 命名空间中是 `mssql-deployment-7b6565d684-92l8s`，并且你已将 WideWorldImporters 数据库示例 ([`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak))\
  \ 下载到本地目录。以下命令会将备份文件复制到 SQL Server 容器中以便还原：\n\n    ```\n    kubectl cp ./WideWorldImporters-Full.bak\
  \ mssql/mssql-deployment-7b6565d684-92l8s:/var/opt/mssql\n    ```\n*   `kubectl\
  \ exec` – 此命令允许你在 Pod 的容器命名空间中执行程序。你会像使用 `docker exec` 一样使用此命令来为容器运行 Bash shell，或者对于\
  \ SQL Server，运行 `sqlcmd` 实用程序，因为它是 SQL Server 容器的一部分。\n\n    基于我刚才展示的复制 WideWorldImporters\
  \ 备份的示例，可以使用以下命令来还原备份：\n\n    ```\n    kubectl exec mssql-deployment-7b6565d684-92l8s\
  \ -- /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Sql2019isfast\" -Q \"RESTORE\
  \ DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
  \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
  \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
  \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
  \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n    ```\n\n   \
  \ 我花了一些时间才弄清楚这个语法；请注意，这里没有指定命名空间，因此你必须处于该 Pod 所在命名空间的上下文中。还要注意在指定 `/opt/mssql/bin/sqlcmd`\
  \ 之前使用了 `--` 语法，该语法用于分隔 `kubectl` 的参数和程序的参数（本例中程序是 `sqlcmd`）。\n*   `kubectl version`\
  \ – 此命令会输出 `kubectl` 的版本。我见过用户遇到 `kubectl` 问题的情况，是因为其版本过旧且与 k8s 集群的版本不兼容。此命令会打印出客户端和服务器的版本。请阅读\
  \ [`https://kubernetes.io/docs/setup/release/version-skew-policy/`](https://kubernetes.io/docs/setup/release/version-skew-policy/)\
  \ 了解更多关于版本兼容性的信息。\n*   `kubectl explain` – 此命令显示解释 k8s 对象信息的文档。使用如下命令可以了解更多关于 `ReplicaSet`\
  \ 的 YAML 要求：\n\n    ```\n    kubectl explain ReplicaSet\n    ```\n*   `kubectl cluster-info\
  \ dump` – 让开，kubeheads（这是个术语吗？如果不是，我刚发明了一个）。此命令将转储大量诊断信息。使用 `--output-directory`\
  \ 来创建一组诊断文件。务必使用 `--all-namespaces` 选项来获取所有命名空间的诊断信息。此命令转储了 k8s 集群中几乎所有的日志文件，包括\
  \ Pods 的日志。我其实没有找到关于日志具体内容的详细文档，但随着我自己对 k8s 的使用增多，我可能会了解更多（并成为一个 kubehead）。\n\n\
  ## k8s Dashboard\n\nKubernetes 仪表板可视化展示 k8s 集群的相关信息。您可以在 [`https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/`](https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/)\
  \ 阅读关于仪表板的所有内容。\n\n对于 AKS，您可以参考 [`https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard`](https://docs.microsoft.com/en-us/azure/aks/kubernetes-dashboard)\
  \ 了解如何为集群显示 k8s 仪表板。当我按照此文档页面的步骤启动仪表板时，浏览器弹出了用户界面。随后，我将命名空间更改为 `mssql`，屏幕显示如图 8-8\
  \ 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig8_HTML.jpg](img/479130_1_En_8_Fig8_HTML.jpg)\n\
  *图 8-8：k8s 仪表板*\n\n## 使用 AKS 的指标和日志\n\n使用 AKS 有其优势，因为它类似于一个托管的 k8s 平台。它在 Azure 门户中内置了指标、可视化图表和日志查看功能。图\
  \ 8-9 展示了我通过 Azure 门户从 AKS 集群中获得的一些洞察。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig9_HTML.jpg](img/479130_1_En_8_Fig9_HTML.jpg)\n\
  *图 8-9：来自 AKS 的 Azure 门户洞察*\n\n本章的下一步是向您展示 k8s 内置的高可用性（HA）如何工作以及它如何应用于 SQL Server。如果您打算使用下一节中的示例，请不要移除任何已配置的资源。脚本\
  \ `cleanup.sh` 可用于清理所有资源，因此如果您*不*打算继续学习下一节的示例，可以使用它。\n\n## 在 k8s 上实现 SQL Server\
  \ 高可用性\n\nk8s 最出色的方面之一是其内置的高可用性功能集。想象一下，无需安装或维护任何集群软件就能为 SQL Server 实现高可用性！\n\n\
  我在本章前面提到了 `ReplicaSet` 这个术语，现在是时候讨论它的重要性了。\n\n当您在上一节的示例中应用 SQL Server 部署时，YAML 文件包含了如下声明：\n\
  \n```yaml\nreplicas: 1\n```\n\n此声明指示 k8s *始终尝试确保* pod 中的容器（本例中是 SQL Server 容器）有一个实例在运行。如果容器崩溃，k8s\
  \ 将重启该容器。如果 pod 终止，k8s 将启动一个新的 pod。如果节点终止，且存在新节点并有足够资源，k8s 将在新节点上启动一个新的 pod。\n\n\
  对于 SQL Server，当您将 `ReplicaSet` 与 `LoadBalancer` 和持久化存储结合使用时，就形成了一个天然的共享存储高可用性方案。请将图\
  \ 8-10 视为您在上一节创建的部署的可视化表示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig10_HTML.jpg](img/479130_1_En_8_Fig10_HTML.jpg)\n\
  *图 8-10：使用 SQL Server 和 k8s 的基本高可用性*\n\n在此示例中，用户将连接到与持有 SQL Server 容器的 pod 绑定的负载均衡器（实际上，负载均衡器并不仅仅存在于用户节点中）。如果\
  \ SQL Server 容器崩溃，您只会看到短暂的停顿，因为 k8s 会在 pod 中启动另一个容器。\n\n考虑一下如果 pod 出现问题会发生什么，如图\
  \ 8-11 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig11_HTML.jpg](img/479130_1_En_8_Fig11_HTML.jpg)\n\
  *图 8-11：k8s 中的 pod 故障*\n\n在此场景下，k8s 将启动另一个 pod（很可能在同一个节点上），并启动一个新容器。但请注意，新容器仍然指向\
  \ `PVC`，而 `PVC` 绑定着系统和用户数据库。对 SQL Server 而言，它只看到现有的系统和用户数据库，然后启动。新 pod 会有一个新的私有\
  \ IP 地址，但负载均衡器会自动重定向到这个新地址。从应用程序的角度来看，只需重试连接，一切就恢复正常。\n\n如果节点（可能是一个虚拟机）崩溃了，如图 8-12\
  \ 所示。\n\n![../images/479130_1_En_8_Chapter/479130_1_En_8_Fig12_HTML.jpg](img/479130_1_En_8_Fig12_HTML.jpg)\n\
  *图 8-12：k8s 中的节点故障*\n\nk8s 会检测到此情况，并在新节点上启动一个新的 pod。即使新 pod 有一个新的私有 IP 地址，负载均衡器仍会被重定向到新的\
  \ pod。这与“始终开启的故障转移集群实例”（Always On Failover Cluster Instance）有相似之处，只是您无需安装任何特殊的集群软件。\n\
  \n让我们基于前一章的示例来构建，看看这是如何工作的。此示例的所有脚本都可以在 `ch8_sql_on_k8s\\ha` 找到。\n\n1.  运行以下命令或\
  \ `step12_getpods.sh` 脚本，以查看 pod 的名称、IP 地址及其运行的节点：\n\n    ```bash\n    kubectl get\
  \ pods -o wide\n    ```\n\n    您的结果应类似于：\n\n    ```\n    NAME                  \
  \             READY  STATUS   RESTARTS     AGE  IP           NODE              \
  \        NOMINATED NODE  READINESS GATES\n    mssql-deployment-7b6565d684-8r7cc\
  \  1/1    Running  0            91m  10.244.1.11  aks-nodepool1-90949249-0\n   \
  \ ```\n\n2.  让我们通过关闭 SQL Server 来模拟容器故障。运行以下命令或脚本 `step13_crash_sql.sh` 以关闭 SQL\
  \ Server，从而停止容器：\n\n    ```bash\n    SERVERIP=$(kubectl get service | grep mssql-service\
  \ | awk {'print $4'})\n    PORT=31433\n    sqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT\
  \ -Q\"SHUTDOWN WITH NOWAIT\"\n    ```\n\n## 3. 运行以下命令或脚本 `step14_getpods.sh` 以查看所有内容是否相同：\n\
  \n```\nkubectl get pods -o wide\n```\n\n你的结果应该与之前相同，因为容器在同一个节点上的同一个 Pod 中重启了：\n\n\
  ```\nNAME                               READY  STATUS   RESTARTS    AGE  IP    \
  \       NODE                      NOMINATED NODE  READINESS GATES\nmssql-deployment-7b6565d684-8r7cc\
  \  1/1    Running  1           91m  10.244.1.11  aks-nodepool1-90949249-0\n```\n\
  \n运行以下命令以查看事件序列：\n\n```\nkubectl get events\n```\n\n你的结果应该类似于：\n\n```\nLAST SEEN\
  \   TYPE     REASON    KIND   MESSAGE\n16s         Normal   Pulled    Pod    Container\
  \ image \"mcr.microsoft.com/mssql/rhel/server:2019-latest\" already present on machine\n\
  16s         Normal   Created   Pod    Created container\n16s         Normal   Started\
  \   Pod    Started container\n```\n\n## 4. 尝试连接到 SQL Server，使用以下命令或脚本 `step15_testsql.sh`\
  \ 查看一切是否正常：\n\n```\nSERVERIP=$(kubectl get service | grep mssql-service | awk {'print\
  \ $4'})\nPORT=31433\nsqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\
  \n```\n\n你应该能够看到成功连接到 SQL Server 并显示了版本信息。\n\n## 5. 使用以下命令或脚本 `step16_pod_failure.sh`\
  \ 测试 Pod 故障：\n\n```\nkubectl delete pod -l app=mssql\n```\n\n在这个例子中，我们不是按名称指定 Pod，而是利用了我们为\
  \ Pod 关联了一个易于记忆的标签这一点。\n\n你应该会看到类似这样的消息：\n\n```\npod \"mssql-deployment-7b6565d684-8r7cc\"\
  \ deleted\n```\n\n## 6. 使用以下命令或脚本 `step17_getpods.sh` 检查 Pod 的状态，包括 IP 地址：\n\n```\n\
  kubectl get pods -o wide\n```\n\n从输出中可以看到，Pod 现在运行在同一个节点上（它也可能被调度到一个新节点），并有了新的名称和新的\
  \ IP 地址：\n\n```\nNAME                                READY   STATUS    RESTARTS\
  \   AGE     IP            NODE                       NOMINATED NODE   READINESS\
  \ GATES\nmssql-deployment-7b6565d684-gq48v   1/1     Running   0          2m55s\
  \  10.244.1.12   aks-nodepool1-90949249-0\n```\n\n使用以下命令查看事件序列：\n\n```\nkubectl\
  \ get events\n```\n\n你的输出将显示终止旧 Pod 并创建新 Pod 的序列，类似于：\n\n```\nLAST SEEN  TYPE  \
  \  REASON            KIND        MESSAGE\n6m53s      Normal  Pulled            Pod\
  \         Container image \"mcr.microsoft.com/mssql/rhel/server:2019-latest\" already\
  \ present on machine\n6m53s      Normal  Created           Pod         Created container\n\
  6m53s      Normal  Started           Pod         Started container\n39s        Normal\
  \  Killing           Pod         Killing container with id docker://mssql:Need to\
  \ kill Pod\n40s        Normal  Scheduled         Pod         Successfully assigned\
  \ mssql/mssql-deployment-7b6565d684-gq48v to aks-nodepool1-90949249-0\n34s     \
  \   Normal  Pulled            Pod         Container image \"mcr.microsoft.com/mssql/rhel/server:2019-latest\"\
  \ already present on machine\n34s        Normal  Created           Pod         Created\
  \ container\n34s        Normal  Started           Pod         Started container\n\
  40s        Normal  SuccessfulCreate  ReplicaSet  Created pod: mssql-deployment-7b6565d684-gq48v\n\
  ```\n\n## 7. 使用以下命令或脚本 `step18_testsql.sh` 尝试通过 LoadBalancer 服务连接到 SQL Server：\n\
  \n```\nSERVERIP=$(kubectl get service | grep mssql-service | awk {'print $4'})\n\
  PORT=31433\nsqlcmd -Usa -PSql2019isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\
  \n```\n\n因为我们将 LoadBalancer 绑定到了 Pod，所以即使 Pod 有了新的私有 IP 地址，连接保持不变。\n\n## 8. 通过运行以下命令或脚本\
  \ `cleanup.sh` 清理所有资源：\n\n```\nkubectl delete namespace mssql\nkubectl config delete-context\
  \ mssql\nkubectl config use-context bwsqlaks\n```\n\n现在你已经了解了 SQL Server 在 k8s 中运行的基本\
  \ HA（高可用）能力。对于节点不再可用的情况，要模拟节点的真正崩溃，你需要直接访问支持节点的虚拟机并“崩溃”它。不过，你可以通过运行以下命令，观察 k8s 如何根据\
  \ ReplicaSet 定义自动调度 SQL Server 部署的行为：\n\n```\nkubectl drain\n```\n\n你可以通过运行以下命令让节点重新上线以供调度（但这并不意味着\
  \ Pod 会移回该节点）：\n\n```\nkubectl uncordon\n```\n\n现在让我们探讨如何在 k8s 中更新 SQL Server，类似于你在第\
  \ 7 章中更新容器的方式。\n\n\n\n## 在 k8s 上更新 SQL Server\n\n你在第 7 章中学习了如何通过“切换”由持久卷支持的容器来更新\
  \ SQL Server 容器。运行中的容器被停止，然后启动一个装有新 CU 版本 SQL Server 的新容器——指向同一个卷，该卷映射到包含系统和用户数据库的目录。\n\
  \n你可以在 k8s 中实现同样的效果。只是这一次，在给出正确的声明后，k8s 将为你完成所有工作。让我们回头看看本章第一个练习中的 `sql2019deployment.yaml`\
  \ 文件的这一部分：\n\n```yaml\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n   \
  \   app: mssql\n  strategy:\n    type: Recreate\n```\n\n注意 `strategy`（策略）的类型是 `Recreate`（重新创建）。`Recreate`\
  \ 向 k8s 声明，如果部署被更新，则停止并重新创建容器。策略类型的另一个选择是 `RollingUpdate`（滚动更新）。除非我们协调多个 SQL Server\
  \ 容器，否则不能对 SQL Server 使用此策略。不过，我们将在本章最后一节关于 Always On 可用性组和 k8s 的内容中讨论这个概念。\n\n\
  更新部署的一种方式是更新 pod 中运行的容器的 `image`（镜像）。对于 SQL Server，这可能意味着更新到一个新的累计更新，就像我在第 7 章中展示的如何切换到包含新镜像的容器一样。并且因为我们使用的是持久卷，系统和用户数据库将被使用更新镜像的新容器识别。k8s\
  \ 为你提供了一种方法，通过一个命令完成所有这些操作。而且还有回滚机制，因为 k8s 将对部署的更新跟踪为一个修订版。\n\n让我们实际操作一下。此示例的所有脚本都可以在\
  \ `ch8_sql_on_k8s\\update` 找到。如果你已经运行了之前的示例，请务必使用 `ha` 或 `deploy` 文件夹中的 `cleanup.sh`\
  \ 脚本清理所有现有资源。\n\n在撰写本书时，我们尚未发布 SQL Server 2019 的累计更新，因此在这些示例中我将使用 SQL Server 2017。然而，一旦我们开始发布\
  \ CU 版本，你可以对 SQL Server 2019 使用相同的技术。\n\n1.  首先，我们需要像本章第一个示例那样部署一个 SQL Server pod。为了省去所有步骤，我编写了一个名为\
  \ `step1_deploysql.sh` 的脚本来完成所有操作。这个脚本使用以下命令：\n\n    ```bash\n    kubectl create\
  \ namespace mssql\n    kubectl config set-context mssql --namespace=mssql --cluster=bwsqlaks\
  \ --user=clusterUser_bwaks_bwsqlaks\n    kubectl config use-context mssql\n    kubectl\
  \ apply -f sqlloadbalancer.yaml\n    kubectl create secret generic mssql --from-literal=SA_PASSWORD=\"\
  Sql2017isfast\"\n    kubectl apply -f storage.yaml\n    kubectl apply -f sql2017deployment.yaml\n\
  \    ```\n\n    `storage.yaml` 和 `sqlloadbalancer.yaml` 文件与本章第一个示例中使用的文件相同。`sql2017deployment.yaml`\
  \ 文件也相同，除了这一部分：\n\n    ```yaml\n    image:  mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
  \    ```\n\n    这意味着我们的新 pod 容器将使用 SQL Server 2017 CU10 for Ubuntu 镜像。如果此镜像不在部署\
  \ pod 的节点上，k8s 将首先拉取该镜像。\n\n## 注意\n迄今为止，除了运行使用这些镜像的容器然后删除容器（镜像将保留在本地节点缓存）之外，我还没有找到一种简单的方法来在所有\
  \ k8s 节点上预拉取 SQL Server 镜像。还有其他技术，其中之一是获取管理员权限登录到实际的 Linux 节点虚拟机，并直接使用 docker 拉取镜像。\n\
  \n使用与第一个示例相同的技术来检查 pod 和部署是否已启动并正在运行。例如，运行以下命令：\n\n```bash\nkubectl get all\n```\n\
  \npod 的状态必须是 `Running`，并且 LoadBalancer 必须有一个有效的 `External-IP` 地址，然后你才能继续。\n\n2.\
  \  现在我们希望通过更改镜像来更新部署，使用以下命令或脚本 `step2_updatesql.sh`：\n\n    ```bash\n    kubectl\
  \ --record deployment set image mssql-deployment mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n\
  \    ```\n\nk8s 将在幕后完成所有工作，停止当前容器并使用相同部署参数启动一个新容器（使用新镜像）。\n\n3.  使用以下命令或脚本 `step3_checkstatus.sh`\
  \ 来观察更新进度。该命令将一直等待，直到使用新镜像的容器更新完成并且容器再次运行为止：\n\n    ```bash\n    kubectl rollout\
  \ status deployment mssql-deployment\n    kubectl rollout history deployment mssql-deployment\n\
  \    ```\n\n当新的部署完成后，你的结果应该如下所示：\n\n```\n    Waiting for deployment \"mssql-deployment\"\
  \ rollout to finish: 0 out of 1 new replicas have been updated...\n    Waiting for\
  \ deployment \"mssql-deployment\" rollout to finish: 0 out of 1 new replicas have\
  \ been updated...\n    Waiting for deployment \"mssql-deployment\" rollout to finish:\
  \ 0 out of 1 new replicas have been updated...\n    Waiting for deployment \"mssql-deployment\"\
  \ rollout to finish: 0 of 1 updated replicas are available...\n    deployment \"\
  mssql-deployment\" successfully rolled out\n    deployment.extensions/mssql-deployment\n\
  \    REVISION  CHANGE-CAUSE\n    2         kubectl deployment set image mssql-deployment\
  \ mssql=mcr.microsoft.com/mssql/server:2017-latest-ubuntu --record=true\n```\n\n\
  4.  你可以使用此命令或脚本 `step4_getpods.sh` 确保你的 pod 再次运行：\n\n    ```bash\n    kubectl get\
  \ pods -o wide\n    ```\n\n你的 pod 状态应显示为 `Running`。\n\n5.  SQL Server 将识别现有的系统和用户数据库，但需要执行任何必要的步骤来更新到新的\
  \ CU 版本。因此，如果你尝试过快地连接到 SQL Server，可能会遇到以下错误：\n\n```\n    Sqlcmd: Error: Microsoft\
  \ ODBC Driver 17 for SQL Server : Login failed for user 'sa'. Reason: Server is\
  \ in script upgrade mode. Only administrator can connect at this time.\n```\n\n\
  尝试执行以下命令或脚本 `step5_testsql.sh`，直到你看到新版本的 SQL Server：\n\n```bash\n    SERVERIP=$(kubectl\
  \ get service | grep mssql-service | awk {'print $4'})\n    PORT=31433\n    sqlcmd\
  \ -Usa -PSql2017isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\n```\n\n6.  就像第\
  \ 7 章中的容器示例一样，你可能希望回滚到之前的容器。k8s 提供了一种通过更改修订版本号来实现此目的的方法。运行以下命令回滚到之前的 CU 版本，或使用脚本\
  \ `step6_rollbacksql.sh`：\n\n    ```bash\n    kubectl rollout undo deployment mssql-deployment\
  \ --to-revision=1\n    ```\n\n7.  运行以下命令或脚本 `step7_getpods.sh` 以验证 pod 已回到 `Running`\
  \ 状态：\n\n    ```bash\n    kubectl get pods -o wide\n    ```\n\n8.  一旦 pod 处于 `Running`\
  \ 状态，运行以下命令（或使用脚本 `step8_testsql.sh`）以确保你已回滚到 SQL 2017 CU10：\n\n    ```bash\n  \
  \  SERVERIP=$(kubectl get service | grep mssql-service | awk {'print $4'})\n   \
  \ PORT=31433\n    sqlcmd -Usa -PSql2017isfast -S$SERVERIP,$PORT -Q\"SELECT @@version\"\
  \n    ```\n\n现在，你已经成功更新了一个 SQL Server 容器，并利用 k8s 内置的更新镜像功能将其从运行中的容器回滚。\n\n使用脚本 `cleanup.sh`\
  \ 清理你在本章此示例中部署的所有资源。\n\n\n\n### 使用 Helm Chart\n\n在 Kubernetes（k8s）中部署带有容器的 Pod 过程非常直接，但正如你在示例中所见，涉及许多步骤。如果能像从包管理器（例如\
  \ RHEL 上的 `yum`）安装软件一样，轻松地将一个容器（如 SQL Server）部署到 Pod 中，岂不是很好？\n\nHelm 使其成为可能。你可以在\
  \ [`https://helm.sh/`](https://helm.sh/) 上了解如何使用 Helm Chart。\n\n对于 SQL Server，一个适用于\
  \ Linux 上 SQL Server 2017 的 Helm Chart 可在此处获取：[`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)。\n\
  \n当你在 k8s 集群中安装 Helm 后，你将能够使用如下单条命令部署一个 SQL Server Pod：\n\n```\nhelm install --name\
  \ sql-server stable/mssql-linux --set acceptEula.value=Y --set sapassword=Sql2019isfast\
  \ --set edition.value=Developer\n```\n\n[`https://github.com/helm/charts/tree/master/stable/mssql-linux`](https://github.com/helm/charts/tree/master/stable/mssql-linux)\
  \ 上的示例包含了如何配置持久化安装，以及如何使用部署的内置 `LoadBalancer` 服务连接到正在运行的 Pod。\n\n我认为 Helm 在简化 k8s\
  \ 上部署 SQL Server 的体验方面具有巨大潜力，因此结合 k8s 部署继续研究这项技术将会很有趣。\n\n### k8s 上的 SQL Server\
  \ 可用性组\n\nk8s 内置的高可用性解决方案非常契合 SQL Server 的需求。然而，仅使用这种方法为数据库提供高可用性存在几个问题：\n\n*  \
  \ 如果 k8s 必须启动一个新的 Pod 和容器，这实际上等同于重启 SQL Server。必须在所有系统和用户数据库上执行完整恢复。根据容器的关闭方式（如果你没有使用我们新的加速数据库恢复选项），这可能导致新的\
  \ SQL Server 容器达到可用状态所需的时间超出预期（即使 Pod 状态为 `Running`）。一个 `Running` 的 Pod 仅意味着 `sqlservr`\
  \ 进程正在运行，并不意味着 SQL Server 实际上可用。\n\n*   第二个问题是拉取新的 SQL Server 镜像可能需要时间。如果在为 SQL\
  \ Server 创建新 Pod 的节点上没有预先拉取 SQL Server 镜像，这可能会导致启动 Pod 并使 SQL Server 可用出现延迟。\n\n\
  *   k8s 仅能*理解*容器、Pod 或节点的运行状况。它无法理解运行在容器内的程序的运行状况。由于 SQL Server *运行状况*问题，一个 SQL\
  \ Server 容器可能正在运行但不可用（或数据库不可用）。\n\n我们构建了 Always On 可用性组来帮助减少故障转移所需的停机时间。该技术的一部分是识别\
  \ SQL Server 主机运行状况之外的故障转移条件。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/flexible-automatic-failover-policy-availability-group)\
  \ 阅读有关这些故障转移条件的更多信息。此外，我们为可用性组中的数据库添加了故障转移运行状况检测，你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/sql-server-always-on-database-health-detection-failover-option)\
  \ 了解更多。\n\n*   第四个问题是，对于单个 `sqlservr` Pod，没有副本的概念。一次只有一个 Pod 可以访问系统和用户数据库。如果能有多个\
  \ SQL Server 参与高可用性解决方案，这样其他实例（副本）可以拥有数据的只读副本，并且所有容器都不依赖于单一的持久卷声明（`Persistent Volume\
  \ Claim`），将会很有益。\n\n因此，为我们找到一种方法将 k8s 的内置高可用性与 SQL Server 可用性组的故障转移技术结合起来是有意义的。我们在\
  \ SQL Server 2019 预览版期间就做到了这一点。你可以通过我的同事 Sourabh Agarwal 在 [`https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/`](https://cloudblogs.microsoft.com/sqlserver/2018/12/10/availability-groups-on-kubernetes-in-sql-server-2019-preview/)\
  \ 发表的这篇博客文章，了解我们如何实现以及它的工作原理的完整故事。\n\n其方法是使用 k8s 的 *StatefulSet* 概念（在 [`https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/`](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/)\
  \ 阅读更多）来部署可用性组副本。我们还将使用 *operator* 的概念来编排可用性组的部署并检测故障转移场景。\n\n此外，我们将此解决方案设计为对主副本和辅助副本都使用\
  \ `LoadBalancer` 服务。这样，应用程序可以使用主 `LoadBalancer` 连接到主副本，而不管哪个副本是主副本。同时，另一个应用程序（可能是报告应用程序）可以连接到一个或多个只读辅助副本，并使用\
  \ k8s 真正实现连接的负载均衡。\n\n我们还在 SQL Server Pod 中构建了一个名为 *AG Agent* 的新容器，以帮助检测和协调 SQL\
  \ Server 的故障转移检测逻辑。结合称为 k8s *ConfigMap* 的概念（在 [`https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/`](https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/)\
  \ 阅读更多），`AG Agent` 和 `operator` 将帮助将故障转移决策与 k8s 集群集成，以处理超出 k8s 运行状况（容器、Pod 或节点）范围的情况。\n\
  \n所有这些都基于我们在 SQL Server 2019 预览版期间构建的组件；我们已宣布 k8s 上的可用性组将不会是 SQL Server 2019 版本的一部分。但是，可用性组是大数据集群（Big\
  \ Data Clusters）HADR 故事的一部分，你将在第 10 章了解更多内容。\n\n我与该功能的首席开发人员 Ross Monster 进行了交谈。他告诉我，其意图仍是在未来投资此功能。Ross\
  \ 告诉我，我们的思路仍然是最终使用 `operator` 概念、`AG Agent` 概念和 `StatefulSet` 概念，但整体设计可能会改变。一旦可用性组（`AG`）部署完成，其行为将与\
  \ k8s 之外的 `AG` 完全一样，允许你读取辅助副本并拥有类似的故障转移体验。同样，k8s 与 `AG` 的美妙之处在于，无需你安装或维护任何故障转移集群软件。\n\
  \n如果你想查看使用预览版 `AG` 与 k8s 的实验练习，请查看 [`https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md`](https://github.com/microsoft/sqlworkshops/blob/master/SQLonOpenShift/sqlonopenshift/05_Operator.md)\
  \ 上的 SQL Server 2019 on OpenShift 实验的模块 5。\n\nRoss 解释的一个我们正在考虑的概念是，我们实际上可以支持滚动更新场景。因此，无需依赖手动切换容器并最终经历更多停机时间，我们有可能为在可用性组中更新一系列\
  \ SQL Server 容器提供近乎零停机时间的场景。这个全新的世界将与我们在 2019 年 5 月 Red Hat 峰会上演示的代码非常相似。你可以在 [`www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl`](https://www.pscp.tv/RedHatOfficial/1vAGRWYPjngJl)\
  \ 观看此演示的视频，亲眼目睹 `operator` 和 SQL Server 近乎零停机更新的这一全新世界。\n\n\n"
- "# 9. SQL Server 数据虚拟化\n\n## 概要\n\n我坚信容器和 Kubernetes 将成为分布式与可扩展计算未来的重要组成部分，而 SQL\
  \ Server 正是为此未来而构建。在本章中，你学习了足够的 Kubernetes (`k8s`) 基础知识，足以理解如何在 `k8s` 集群中部署 SQL\
  \ Server。你也见证了内置于 `k8s` 的高可用性（HA）的强大功能，以及 SQL Server 如何利用它。就像你在第 7 章中看到的容器那样，你可以使用\
  \ `k8s` 的功能来更新 Pod 中的 SQL Server 容器（应用新的累积更新），并在必要时回滚。我还简要介绍了 Helm Charts，它代表了一种使用包管理方式在\
  \ `k8s` 中部署 Pod 和容器的新方法。\n\n最后，我让你简要了解了 SQL Server 与 `k8s` 集成的未来，我们将可用性组与 `k8s`\
  \ 集成，以提供一个健壮、集成的 HA 解决方案，其中包含了你今天所见到的可用性组的所有强大功能。第 7 章和第 8 章是重要的学习基石，有助于你学习第 10\
  \ 章关于 SQL Server 大数据集群的内容。\n\n数据虚拟化是我们通过 SQL Server 2019 提供的最令人兴奋的功能之一。在本章中，你将学习更多关于\
  \ SQL Server 2019 中如何通过一种名为 PolyBase 的技术实现数据虚拟化。本章，连同第 6、7 和 8 章，为学习第 10 章的 `SQL\
  \ Server 大数据集群`奠定了基础。\n\n## 什么是 PolyBase？\n\nPolyBase 是一项在 SQL Server 2016 中引入并在\
  \ SQL Server 2019 中扩展的创新技术，旨在解决 *数据移动* 问题。数据移动通常涉及构建昂贵且复杂的提取、转换和加载（ETL）过程，将数据从其他数据源移入\
  \ SQL Server。PolyBase 通过实现 *数据虚拟化* 解决方案来应对此挑战，我将在下文中讨论并定义这个术语。我将贯穿本章讨论并定义数据虚拟化。\n\
  \n在本章中，我将带你了解 PolyBase 的历史以及它如何提供数据虚拟化。我将讲解 PolyBase 在幕后的工作原理，以及通过 *外部表* 概念的典型 PolyBase\
  \ 工作流程。并且，像本书大多数章节一样，我们将使用示例向你展示如何使用 PolyBase 满足数据虚拟化需求的细节。\n\n你也可以使用我们的文档作为指南，在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-guide)\
  \ 了解更多关于 PolyBase 的信息。\n\n### PolyBase 的历史\n\n大约在 2011 年，David DeWitt 博士及其团队创建了一个名为\
  \ *Polybase* 的新项目（你可以在 [`http://gsl.azurewebsites.net/Projects/Polybase.aspx`](http://gsl.azurewebsites.net/Projects/Polybase.aspx)\
  \ 看到项目网站）。他的团队成员包括 Rimma Nehme（现以 Azure CosmosDB 闻名）和来自微软研究院 Jim Gray 系统实验室的 Alan\
  \ Halverson。该项目的目标是创建一种无需编写 MapReduce 作业即可访问 Hadoop 系统中数据的新方法（你可以在 [`https://en.wikipedia.org/wiki/MapReduce`](https://en.wikipedia.org/wiki/MapReduce)\
  \ 阅读更多关于 MapReduce 的信息，它在 Hadoop 用户中非常流行）。\n\n我采访了现在 MIT 工作的 David，了解了 PolyBase\
  \ 的历史。我问他为什么尝试创建一种使用 MapReduce 的新方法。他向我指了一篇他与 Michael Stonebraker 写的博客文章，你可以在 [`https://homes.cs.washington.edu/~billhowe/mapreduce_a_major_step_backwards.html`](https://homes.cs.washington.edu/%257Ebillhowe/mapreduce_a_major_step_backwards.html)\
  \ 找到。该文章描述了 MapReduce 作为一种访问数据的劣等方式的多种表现。\n\nDavid 和他的团队随后创建了 PolyBase 项目，利用微软的并行数据仓库（PDW）技术来访问\
  \ Hadoop 系统中的“大数据”。PDW，现在称为分析平台系统（APS），是云端 Azure SQL 数据仓库的前身。正如 David 所说，“...我们可以将\
  \ PDW 连接到 HDFS，并使用 PDW 的并行查询，让客户能够使用标准的 SQL 而不是 MapReduce。这将使客户能够在一个查询中同时访问他们的关系数据和存储在\
  \ HDFS 中的外部表。”\n\n该团队为这项技术撰写了一篇论文，你可以在 [`http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf`](http://gsl.azurewebsites.net/portals/0/users/projects/polybase/polybasesigmod2013.pdf)\
  \ 阅读。该论文发表在 2013 年 ACM SIGMOD 会议的论文集中。PolyBase 首次作为一项功能出现在 PDW 中是在 2012 年中，并且至今仍在那里。\n\
  \n图 9-1 展示了原始 PolyBase 概念的示意图。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig1_HTML.jpg](img/479130_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1：来自 Jim Gray 系统实验室的原始 PolyBase 概念\n\n快进到 SQL Server 2016 的开发。如果 PolyBase\
  \ 可以通过 PDW 中的 SQL 使用，那为什么不能在 SQL Server 中使用呢？在 SQL Server 2016 中，我们添加了 PolyBase\
  \ 功能以使用 T-SQL 访问 Hadoop 系统中的数据。我常将此功能称为“经典 PolyBase”（这是我的说法；并非微软官方术语）。你可以使用 T-SQL\
  \ 创建所谓的 *外部表* 来映射 HDFS 文件，然后像查询任何其他表一样查询该外部表。该“查询”会被转换为 MapReduce Java 程序，在目标 Hadoop\
  \ 系统上运行。\n\n我大约在 SQL Server 2016 发布时加入了工程团队，但我从未真正看到 PolyBase 在我们的客户中流行起来。我不确定确切原因，但部分答案可能是客户必须在与\
  \ SQL Server 同一台计算机上安装 Java——通常是来自 Oracle 的 Java 运行时环境（`JRE`）。也可能是在 2016 年，SQL Server\
  \ 客户还没有准备好与 Hadoop 集成，而 Hadoop 用户则希望与关系数据库保持距离。\n\n2016 年，微软收购了一家名为 Metanautix 的公司，我在本书开篇章节提到过。通过此次收购，我们获得了\
  \ `ODBC` 技术，用于访问 SQL Server、Oracle、Teradata 和 MongoDB 等数据源。像 Travis Wright 和 Slava\
  \ Oks 这样的人看到了这些技术的愿景，因此他们在 SQL Server 2019 中扩展了 PolyBase，允许用户使用外部表访问的不仅仅是 Hadoop，还包括\
  \ SQL Server、Oracle、Teradata 和 MongoDB。并且，“锦上添花”的是，我们添加了使用你选择的 `ODBC` 驱动程序访问 *任何数据源*\
  \ 的支持。我称这种新能力为 `PolyBase++`（再次强调，这是我的说法，不是微软官方术语）。\n\n\n\n### 什么是数据虚拟化？\n\n我并没有在\
  \ `SQL Server 2016` 的 `Polybase` 上花费太多时间，但我了解其概念。当我开始投入大量时间用于 `SQL Server 2019`\
  \ 的演讲和培训时，“`数据虚拟化`”（我想我第一次听到这个词是从 Travis Wright 那里）才真正促使我开始深入研究 `Polybase`。\n\n\
  `数据虚拟化`有多种定义方式，但你可以在维基百科上阅读其“官方”定义：[`https://en.wikipedia.org/wiki/Data_virtualization`](https://en.wikipedia.org/wiki/Data_virtualization)。我喜欢其中这句特别的话：“与传统的提取、转换、加载（`\"\
  ETL\"`）过程不同，`数据保持在原地`，并为源系统提供实时数据访问。这降低了数据出错的风险，避免了传输那些可能永远不会被使用的数据的工作量，并且它不会试图将单一的数据模型强加于数据之上。”\n\
  \n`数据虚拟化`的关键在于 `无数据移动` 这一概念。需要澄清的是，这里的“数据”并非指以其原生格式从源位置移动。相反，是通过查询或向数据源请求来检索数据。\n\
  \n作为 `SQL Server 2019` 整体策略中实现 `数据虚拟化` 解决方案的一部分，我们的期望和承诺是：`SQL Server` 是 `数据虚拟化`\
  \ 的一个卓越 `中心`。换言之，`SQL Server 2019` 可以成为您组织的 `数据枢纽`。\n\n图 9-2 是一张常用来阐述 `Polybase`、`数据虚拟化`\
  \ 和 `SQL Server 2019` 整体概念的幻灯片。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig2_HTML.jpg](img/479130_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n`SQL Server 2019` 中的 `Polybase` 与 `数据虚拟化`\n\n看看图中所有的这些图标。借助 `SQL Server\
  \ 2019`，你可以对基于外部表运行 `T-SQL` 查询，这些外部表的数据源范围广泛，从 `HDFS` 到 `Oracle`，再到 `CosmosDB`，再到\
  \ `SAP HANA`。而这里激进的部分在于：你可以使用 `T-SQL` 查询这些资源，并将它们与本地 `SQL Server` 表或代表这些其他数据源的任何其他外部表进行连接。\n\
  \n在这张幻灯片上，我试图简化 `Polybase` 的定义：\n\n*   **分布式计算引擎**\n\n    `Polybase` 包含源自最初 `PDW`\
  \ 设计的软件，该软件与 `SQL Server` 集成，并提供了自己的分布式计算引擎。我将在下一节“`Polybase` 工作原理”中更详细地描述这个组件。\n\
  \n*   **使用 `T-SQL` 在数据所在的位置查询数据**\n\n    这是 `数据虚拟化` 的承诺。对本地 `SQL Server` 执行 `T-SQL`\
  \ 查询，并在不移动数据的情况下查询其他数据源中的数据。关于 `SQL Server 2019` 的 `Polybase` 还有一点：查询 `SQL Server`、`Oracle`、`Teradata`\
  \ 和 `MongoDB` 所需的软件已内置到 `SQL Server` 的安装程序中。**无需额外的客户端软件！**\n\n*   **分布式、可扩展的查询性能**\n\
  \n    `Polybase` 提供的不仅仅是“连接”到其他数据源的方法；`链接服务器` 就能提供这种功能。因为 `Polybase` 是一个集成的分布式计算引擎，它可以提供可扩展的查询性能。一个称为\
  \ `横向扩展组` 的概念提供了将查询分发到 `Hadoop`、`SQL Server` 和 `Oracle` 等数据源的能力。\n\n*   **手动/随 `SQL\
  \ Server` 部署**\n\n    到目前为止，这听起来非常酷，那么，有什么陷阱吗？嗯，设置 `Polybase` 确实需要一些工作，特别是如果你想在\
  \ Windows 上设置 `横向扩展组`。一旦部署了 `Polybase`，就不需要太多配置了。设置数据源连接确实需要一些工作，因为 `Polybase` 的效能取决于你通过外部表所代表的数据源获取访问权限和建立连接的能力。\n\
  \n*   **随 `大数据群集` 自动部署/优化**\n\n    正如你将在第 10 章发现的，`SQL Server 大数据群集` 将提供 `数据虚拟化`，其中\
  \ `Polybase` 已部署，并且部署了 `Hadoop` 群集，可优化对 `HDFS` 中数据的访问。\n\n## `Polybase` 工作原理\n\n\
  我常常认为，在某种程度上理解 `SQL Server` 功能的工作原理，能让你更有效地使用它。如果你看过我在各种会议（如 `PASS Summit`）上的演讲，你也会知道我以讲解\
  \ `SQL Server` 功能的内部机制而闻名。因此，当我在英国曼彻斯特的 `SQL Bits 2019` 会议上被邀请做几场报告时，我选择了 `Polybase`\
  \ 作为我的主题。我想更深入地研究 `Polybase` 的内部工作原理，特别是我们如何构建一个架构来访问像 `Oracle` 这样的数据源。我有深厚的 `SQL\
  \ Server` 背景，因此对 `链接服务器` 的细节非常熟悉。`Polybase` 有何不同？我将在本章后面更多地讨论这些技术的比较。作为本章的一个很好补充，你可以观看我在\
  \ `SQL Bits` 上关于这个主题的演讲，你可以在 [`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_2019_Polybase)\
  \ 找到它。\n\n\n\n### Polybase 工作流程\n\n在我描述 SQL Server 为提供 Polybase 功能而部署的所有软件组件之前，我认为你应该先了解使用\
  \ Polybase 的工作流程。\n\n图 9-3 是我经常用来展示 SQL Server 中 Polybase 工作流程的一张幻灯片。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig3_HTML.jpg](img/479130_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3：SQL Server 中的 Polybase 工作流程\n\n让我解释这个工作流程中的每一部分：\n\n**设置和配置 Polybase** –\
  \ 我将在名为“示例的先决条件”的部分中更详细地讨论 Polybase 的设置和配置。你也可以阅读关于 Windows 上 Polybase 设置的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`，以及\
  \ Linux 上的设置：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`。\n\
  \n**设置身份验证** – 你必须有一种方式来验证到外部数据源的连接。Polybase 仅支持基本身份验证的概念，这意味着你必须在 SQL Server 中存储某种类型的\
  \ `IDENTITY`（或用户）和 `SECRET`（密码或密钥）才能访问外部数据源。这是一个名为 `数据库范围凭据` 的对象，它使用 SQL Server\
  \ 的 `MASTER KEY` 对象进行加密。你可以阅读关于数据库范围凭据的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-database-scoped-credential-transact-sql`。\n\
  \n**`外部数据源`** – 可以将 `外部数据源` 视为类似于 ODBC 数据源的 T-SQL 对象。为你打算用于一个或多个 `外部表` 定义的数据源创建一次。在本章的示例中，你会看到需要为\
  \ `外部数据源` 提供连接信息。你可以阅读关于 `外部数据源` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql`。`CREDENTIAL`\
  \ 值将是你创建的数据库范围凭据的名称。\n\n**`外部文件格式`** – 关系型甚至 NoSQL 数据都具有结构，通常以列或字段的形式存在。存储在 Hadoop\
  \ 系统中的数据通常是半结构化的。为了使 SQL Server 能够访问 HDFS 中文件的数据，你必须指定一种格式，这正是 `外部文件格式` 所定义的。对于\
  \ Oracle 等数据源，此规范是不必要的。你可以阅读关于 `外部文件格式` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`。\n\
  \n**`外部表`** – 可以将 `外部表` 视为虚拟的 SQL Server 表（更常被称为视图）。这意味着 `外部表` 的行为类似于 SQL Server\
  \ 表——有关表的元数据存储在目录视图中，但外部表的数据或存储位于数据源本身。你可以阅读关于 `外部表` 的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql`。当你创建外部表时，`DATA_SOURCE`\
  \ 属性将是你创建的外部数据源的名称。对于 HDFS 外部表，你将使用 `FILE_FORMAT` 属性指定你创建的外部文件格式。\n\n**统计信息** –\
  \ 为了协助查询处理器和 Polybase 计算引擎为外部表生成最优的查询计划，你可以基于外部表中的列创建存储在 SQL Server 中的统计信息。你可以阅读关于创建统计信息的文档：`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-statistics-transact-sql`。\n\
  \n**查询** – 一旦你定义了所有这些对象，就可以针对外部表运行 T-SQL 查询，甚至可以将它们与本地 SQL Server 表或其他外部表进行联接。关键概念是数据驻留在外部数据源，而不是加载到\
  \ SQL Server 中；只有元数据和统计信息存储在 SQL Server 数据库中。针对外部表的查询是只读的，Hadoop 除外。SQL Server 支持摄取或\
  \ `INSERT` 到基于 Hadoop 的外部表中。你可以阅读关于 Polybase 查询的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-queries`。\n\
  \n## SQL Server 2019 Polybase 架构\n\n现在你已经了解了用于针对外部表查询的 Polybase 的对象和工作流程，让我在你亲自尝试之前描述一下支撑此功能的软件组件。\n\
  \n## 注意\n\nStuart Padley、David Kryze、James Rowland-Jones 和 UC 对 Polybase 内部原理的所有细节完全负责，这些细节构成了你在本章中看到的部分。\n\
  \n## 外部表如何工作\n\n首先，图 9-4 是我在谈论 Polybase 如何工作时展示的第一张图。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig4_HTML.jpg](img/479130_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4：外部表如何工作\n\n在使用和研究 Polybase 时，理解这一点很重要：SQL Server 仅为 `外部数据源` 和 `外部表` 存储元数据，*而不是数据*。用户运行\
  \ T-SQL 查询时，像引用 SQL Server 表一样引用 `外部表`。`外部表` 被映射到 `外部数据源`，以定位数据的真实位置。SQL Server\
  \ 作为数据枢纽，将针对 `外部表` 的查询接收，并使用对应于该数据源的驱动程序向外部数据源提交一个新查询。结果被发送回 SQL Server，并最终返回给原始用户。针对外部表的查询的另一个方面是下推的概念。\n\
  \n下推是将过滤数据的责任推给外部数据源的概念。在图 9-4 中，如果外部数据源是 Azure SQL Database，并且查询使用了 `WHERE` 子句作为查询条件，Polybase\
  \ 将尝试将查询（包括 `WHERE` 子句）（对于所有数据源，它可能不是显式的 `WHERE` 子句）下推到 Azure SQL Database，以便获取最少行数的计算在外部数据源上完成。相反（效率较低）的方法是将外部表中的所有行取回到\
  \ SQL Server 中，然后让 SQL Server 引擎过滤出满足查询所需的行。你可以阅读更多关于使用 Polybase 进行下推计算的文档：`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-pushdown-computation`。\n\
  \n\n## Polybase 独立实例\n\n让我们通过图 9-5 更深入地探讨一下 Polybase 的架构。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig5_HTML.jpg](img/479130_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5 Polybase 头节点架构\n\n让我先在 Windows 的背景下更详细地描述这张图，然后再讨论我们如何在 Linux 上实现它。\n\n\
  当你在 Windows 上部署 Polybase 时，有两个选择：\n\n**独立的支持 PolyBase 的实例**\n如果你只想使用一个 SQL Server\
  \ 实例进行 Polybase 操作，请选择此选项。Polybase 所需的所有软件都将安装在此实例上，它将被视为*头节点*。\n\n**将 SQL Server\
  \ 实例用作 PolyBase 横向扩展组的一部分**\n使用此选项来设置所谓的横向扩展组。我将在后面更详细地描述横向扩展组。\n\n图 9-5 表示的是一个独立的支持\
  \ PolyBase 的实例场景。让我描述一下此图中的组件：\n\n**Polybase 引擎** – Polybase 引擎是一个 Windows 服务，包含一个名为`mpdwsvc.exe`的程序。请注意，图中的\
  \ Polybase 引擎负责**控制和执行**。换句话说，Polybase 引擎是执行外部表查询的协调器。SQL Server 引擎将与 Polybase 引擎协调。Polybase\
  \ 引擎实际上包含了来自 PDW 中 Polybase 功能的代码，以支持外部表。`mpdwsvc.exe`由 Windows 服务使用`-dweng`参数执行。Polybase\
  \ 引擎与 SQL Server 之间的通信通过本地命名管道进行。\n\n**Polybase 数据移动服务 (DMS)** – 正如其名，Polybase DMS\
  \ 负责数据。这意味着 Polybase DMS 将对远程数据源执行查询，并将结果传回 SQL Server 引擎。有趣的是，Polybase DMS 同样是通过名为`mpdwsvc.exe`的可执行文件实现的，但使用的是`-dms`参数。在头节点的服务器上，你应该能看到两个名为`mpdwsvc.exe`的进程。这也意味着\
  \ Polybase DMS 是加载所有 ODBC 驱动程序或运行针对 Hadoop 系统的 MapReduce Java 代码的程序。Polybase DMS\
  \ 还通过命名管道与 SQL Server 引擎和 Polybase 引擎通信。Polybase DMS 服务将通过命名管道与 SQL Server 引擎流式传输数据，以发送来自外部数据查询的结果。\n\
  \n**DW 数据库** – Polybase 功能需要自己的元数据。当你安装 Polybase 时，你会在 SQL Server 上发现安装了这些数据库：`DWConfiguration`、`DWDiagnostics`和`DWQueue`。你应该将这些数据库视为\
  \ Polybase 的系统数据库，因此它们需要可用，此功能才能工作。我不会详细介绍每个数据库的具体内容，而且我们也没有文档化这些。我确实发现一位有趣的博主撰写了关于探查这些数据库内部的文章：[`https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/`](https://36chambers.wordpress.com/2019/04/03/polybase-revealed-the-dw-databases/)。\n\
  \n**Tempdb** – Polybase 在执行外部表查询时可能会使用`tempdb`进行中间查询处理。此外，为了确保数据流能被正确处理，Polybase\
  \ 会创建`tempdb`表作为数据流的“存储后端”（尽管它可能永远不会使用该后端）。在我使用 Polybase 的过程中，我没有看到对`tempdb`的显著使用；我只是想让你了解`tempdb`的使用情况——这样你就不会对看到与\
  \ Polybase 相关的临时表活动感到惊讶。\n\nPolybase 还附带了一系列目录视图和动态管理视图，我将在本章的示例中使用其中一些。你可以在以下网址查看这些目录视图和动态管理视图的列表：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-troubleshooting)。\n\
  \n## Polybase 横向扩展组\n\n如果你选择设置一个 Polybase 横向扩展组，则可以使用多个 SQL Server 实例进行查询处理以实现横向扩展。有关横向扩展组配置，请参见图\
  \ 9-6。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig6_HTML.jpg](img/479130_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6 Polybase 横向扩展组\n\n通过 Polybase 横向扩展组，你可以在其他 SQL Server 实例上启用 Polybase，用于横向扩展查询处理。启用\
  \ Polybase 的其他 SQL Server 实例称为*计算节点*。请注意，在计算节点上，Polybase 引擎是不活动的。在 Windows 上，Polybase\
  \ 引擎服务已安装，但它被禁用且不需要。头节点上的 Polybase 引擎负责跨所有节点的协调，而 Polybase DMS 服务则在每个节点上执行所有数据交换。我们在所有节点上安装\
  \ Polybase 引擎的原因是为了让计算节点可以在需要时（例如，当前头节点出现问题）成为头节点。\n\n当 SQL Server 确定使用多个实例可以加速对外部表的查询时，横向扩展组可能是最有效的。这对于\
  \ Hadoop 系统可能非常强大，横向扩展组在构建时就考虑了分布式 Hadoop 系统。对于其他数据源，如 SQL Server 或 Oracle，Polybase\
  \ 可以检测这些源上的分区，并使用横向扩展组来查询目标上的每个分区。我们将此功能称为*横向扩展读取*，你可以在以下网址阅读相关内容：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups?view=sql-server-ver15#scale-out-reads`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-scale-out-groups%253Fview%253Dsql-server-ver15%2523scale-out-reads)。\n\
  \n## 查询处理与 Polybase\n\nPolybase 的一项重大创新是，查询外部表已集成到 SQL Server 查询处理器中。这意味着 SQL Server\
  \ 查询处理器*理解*它何时在处理外部表，并构建正确的执行详细信息以提交给 Polybase 引擎，从而支持像谓词下推这样的操作。\n\n在本章后面，我将展示一个示例，说明\
  \ SQL Server 引擎中外部表查询的远程查询操作符是什么样子。\n\n## 在 Linux 上如何工作？\n\nLinux 上的 SQL Server\
  \ 2019 仅支持独立的 Polybase 实例（我们将在第 10 章介绍的 SQL Server 大数据集群中支持横向扩展组的概念）。此外，Linux 上\
  \ SQL Server 2019 的 Polybase 不支持用于数据源的通用 ODBC 连接器。\n\n因此，在 Linux 上，Polybase 的架构是使用\
  \ SQLPAL（有关 SQLPAL 的更多详细信息，请参见第 6 章）在`sqlservr`进程中实现 Polybase 引擎和 Polybase 数据移动服务。\n\
  \n在我撰写本章时，我们正接近 SQL Server 的发布尾声，但仍未发布带有 Linux 版 SQL Server 的 Hadoop 外部表功能（SQL Server\
  \ 大数据集群除外）。我预计此功能将包含在 SQL Server 2019 的最终版本中，但其概念与 Windows 版相同。我们可能会为此功能提供单独的 Linux\
  \ 软件包，但它应该记录在以下文档中：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)。\n\
  \n### 这与 Azure 有何不同？\n\nPolybase 目前作为一项功能存在于 SQL Server、Azure SQL Data Warehouse\
  \ 和 Analytics Platform System（APS，原名并行数据仓库）中。然而，它们各自提供的功能有所不同。\n\n## 注意\n\n`EXTERNAL\
  \ TABLE`（外部表）对象确实存在于 Azure SQL Database 中，但它本身并不是 Polybase 功能（截至 SQL Server 2019\
  \ 版本）。Azure SQL Database 中的外部表用于支持弹性查询。你可以在 [`https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started`](https://docs.microsoft.com/en-us/azure/sql-database/sql-database-elastic-query-getting-started)\
  \ 阅读更多关于弹性查询的内容。\n\nAzure SQL Data Warehouse 的 Polybase 专注于使用外部表来访问 Hadoop 或 HDFS，数据源可以是\
  \ Azure Blob Storage 或 Azure Data Lake 等。Azure SQL Data Warehouse 不支持 SQL Server、Oracle\
  \ 等数据源。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql?view=azure-sqldw-latest`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-data-source-transact-sql%3Fview%3Dazure-sqldw-latest)\
  \ 阅读更多关于 Azure SQL Data Warehouse 中 Polybase 的内容。\n\nAPS 的 Polybase 与 Azure SQL\
  \ Data Warehouse 类似，但更侧重于提供对“本地”Hadoop 系统的访问。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql?view=aps-pdw-2016-au7`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-table-transact-sql%3Fview%3Daps-pdw-2016-au7)\
  \ 了解 APS 的 Polybase。\n\n## 示例的先决条件\n\n我们将在本章剩余部分讨论一些示例。首先，我将给你一些部署和配置 Polybase 的提示，然后是一些关于使用示例的指导。\n\
  \n### 设置并启用 Polybase\n\n要在 Windows 上安装 Polybase，你可以按照文档 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation)\
  \ 中的步骤操作。在选择独立 Polybase 实例时，步骤非常直接。你必须做出的一个选择是是否要使用 `Java connector for HDFS`（HDFS\
  \ 的 Java 连接器）。如果你选择支持 HDFS 的外部表，你可以选择使用 SQL Server 2019 提供的默认 Open Java，或者安装你自己的\
  \ Java。我们提供的 Open Java 基于 Zulu Java，你可以在 [`https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/`](https://cloudblogs.microsoft.com/sqlserver/2019/07/24/free-supported-java-in-sql-server-2019-is-now-available/)\
  \ 了解相关信息。\n\n在 Windows 上安装 Polybase 后，我们将安装一系列 ODBC 驱动程序（放置在 `binn\\Polybase\\ODBC\
  \ Drivers` 目录中）。这些驱动程序为内置的 SQL Server、Oracle、Teradata 和 MongoDB 连接器提供支持。\n\n安装 Polybase\
  \ 功能后，你必须按照 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation?view=sql-server-ver15#enable`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-installation%3Fview%3Dsql-server-ver15%23enable)\
  \ 的文档说明，使用 `sp_configure` 启用该功能。\n\n对于 Linux 上的 SQL Server，我们提供了一个单独的 Polybase 包，你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)\
  \ 了解如何配置和使用它。\n\n对于横向扩展组，设置过程变得非常有趣。由于目前仅在 Windows 上支持横向扩展组，因此对于 SQL Server 2019，这是你唯一需要担心的配置。\n\
  \n我的横向扩展组部署经验相当困难。你可以在我们的文档 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15)\
  \ 中阅读所有步骤。在你踏上这条路之前，让我给你一些初步的想法：\n\n*   你将需要一个 Windows 域，因此如果你没有域控制器，你需要先设置一个。\n\
  *   Polybase 横向扩展组的所有 Windows 服务必须使用相同的域服务帐户。你必须通过安装程序或使用 SQL Server 配置管理器进行配置。\n\
  *   你最初必须在头节点和计算节点上做出一些选择。当你首次使用安装程序在所有节点上安装 Polybase 并选择选项 `Use the SQL Server\
  \ instance as part of a PolyBase scale-out group`（将 SQL Server 实例用作 PolyBase 横向扩展组的一部分）时，所有节点都可能是头节点候选。要使\
  \ Polybase 正常工作，你需要选择一台计算机作为头节点。然后对于其他节点，你需要运行一个存储过程将它们配置为计算节点，并列出头节点服务器的名称和端口（注意你在安装过程中选择的端口，因为这里会用到）。作为计算节点加入的过程记录在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows?view=sql-server-ver15#add-other-sql-server-instances-as-compute-nodes`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/configure-scale-out-groups-windows%3Fview%3Dsql-server-ver15%23add-other-sql-server-instances-as-compute-nodes)。\n\
  *   你需要在所有节点上使用 `sp_configure` 启用 Polybase，并重新启动 SQL Server。\n*   你还需要在所有节点上重新启动所有\
  \ Polybase 服务。实际上，如果存储过程没有自动执行此操作，你需要在计算节点上停止 Polybase 引擎。如果一切顺利，Polybase 引擎服务将在计算节点上被禁用，但你应该仔细检查这一点。\n\
  *   查询 DMV `dm_exec_compute_nodes` 以确保所有节点都处于正确的 `HEAD` 或 `COMPUTE` 状态。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-exec-compute-nodes-transact-sql)\
  \ 阅读更多关于此 DMV 的内容。\n\n\n## 使用示例\n\n考虑图 9-7 中 WideWorldImporters 公司的一个可能场景。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig7_HTML.jpg](img/479130_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7：SQL Server 数据枢纽\n\n在此示例中，WideWorldImporters (WWI) 公司使用 SQL Server 2019，但希望访问以下数据源中的数据：\n\
  \n`SQL Server 2008R2` – 公司有一个较旧的 SQL Server 系统，用于存储供应商存档。他们不想动这个系统，但希望访问此供应商信息。\n\
  \n`Azure SQL Database` – 公司内的一个团队正考虑迁移到云端，并使用 Azure 构建一个新的 StockItems 数据库。WWI 的团队希望查看此\
  \ StockItem 数据，并将其与 SQL Server 2019 数据库中的现有数据进行连接，同时不干扰新团队的工作。\n\n`Azure CosmosDB`\
  \ – 另一个团队正在为订单（Orders）试点一个移动应用程序，并试验使用 Azure CosmosDB。WWI 团队希望能够查看这些订单，并与本地数据库中与该订单相关的数据进行连接。\n\
  \n`Oracle` – WWI 的会计软件运行在 Oracle 上。虽然 WWI 正在考虑将此数据库迁移到 SQL Server，但迁移项目尚需时日。与此同时，WWI\
  \ 知道 SQL Server 数据库中的某些数据引用了应收账款（Accounts Receivable）中的数据。如果他们能获得合理的 Oracle 访问权限，他们希望将本地\
  \ SQL Server 数据与 Oracle 中的应收账款数据进行连接，直到迁移完成。\n\n`Hadoop` – WWI 的一个团队正在公司网站上构建一个评级系统，供客户评论订单体验。为了加速项目，开发团队使用\
  \ Azure Blob 存储以半结构化格式存储订单评论。WWI 的团队希望对此数据运行分析，并与 SQL Server 中的本地数据进行连接。\n\n`SAP\
  \ HANA` – WWI 最近收购了另一家公司 Vandelay Industries（我的灵感来源于*Seinfeld*中的虚构公司。参见[`seinfeld.fandom.com/wiki/Vandelay_Industries`](https://seinfeld.fandom.com/wiki/Vandelay_Industries)）。该公司在\
  \ SAP HANA 中存储了其客户的数据。在 WWI 团队制定迁移策略期间，他们希望分析这些客户的数据，而无需移动数据。\n\n所有这些场景都可以通过 SQL\
  \ Server 2019 中的 Polybase 和外部表实现。实际上，在你的`ch9_data_virtualization\\sqldatahub`文件夹示例中，每种情况都有一个例子。\n\
  \n## 使用外部表\n\n在我详细介绍`sqldatahub`文件夹中的一些示例之前，让我先解释一下你在这些示例中会一致发现的基本模板。此模板遵循外部表的一般工作流程，我在名为“Polybase\
  \ 工作流程”的章节中已作描述。所有 Polybase 对象都在用户数据库范围内。\n\n1.  在数据库中创建`MASTER KEY`。\n\n2.  创建一个`DATABASE\
  \ SCOPED CREDENTIAL`，用于对外部数据源进行身份验证。\n\n3.  创建一个`EXTERNAL DATA SOURCE`以指定数据源的位置。`CREDENTIAL`属性将是数据库范围凭据的名称。\n\
  \n4.  为 HDFS 数据创建一个`EXTERNAL FILE FORMAT`。\n\n5.  创建一个`EXTERNAL TABLE`以映射到外部数据源的目标表。`DATA_SOURCE`属性将是外部数据源的名称。`FILE_FORMAT`属性（仅适用于\
  \ HDFS）将是外部文件格式对象的名称。\n\n6.  在外部表的列上创建本地统计信息。\n\n7.  查询`EXTERNAL TABLE`，有时将该表与本地\
  \ SQL Server 表或其他外部表进行连接。\n\n关于创建 Polybase 对象所涉及的所有 T-SQL 语句，有一个很好的参考文档：[`docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-t-sql-objects)。\n\
  \n### 工具与外部表\n\n在我详细介绍 sqldatahub 的示例脚本之前，你应该了解工具对外部数据源和外部表的支持情况。\n\nSQL Server\
  \ Management Studio (SSMS) 通过 SSMS 模板支持创建外部数据源和外部表。图 9-8 展示了一个使用 SSMS 创建外部数据源的示例。\n\
  \n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig8_HTML.jpg](img/479130_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8：使用 SSMS 模板创建外部数据源\n\n同样的概念也适用于外部表。\n\n一旦你创建了外部数据源和表，就可以使用 SSMS 对象资源管理器浏览这些资源。图\
  \ 9-9 展示了在 WideWorldImporters 数据库中创建的外部数据源和文件格式的一个示例。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig9_HTML.jpg](img/479130_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9：SSMS 对象资源管理器浏览外部数据源和文件格式\n\nAzure Data Studio (ADS) 也为 SQL Server 和 Oracle\
  \ 数据源提供了一个“外部表向导”，指导你完成创建新外部表的过程。你可以在[`docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)阅读有关此功能的信息。\n\
  \n我将引导你完成为 Azure SQL Database 设置外部表的步骤。对于其他 sqldatahub 示例，我将指引你查看脚本示例，并对每种情况解释几个要点。\n\
  \n\n\n## 在 Azure SQL 数据库中使用外部表\n\nSQL Server 的内置连接器之一提供了对 SQL Server、Azure SQL 数据库和\
  \ Azure SQL 数据仓库数据源的访问。\n\n我已经基于我所描述的模板步骤，在 `ch9_data_virtualization\\sqldatahub\\\
  azuredb` 文件夹中提供了示例脚本。我提供了 T-SQL 笔记本和 T-SQL 脚本两种方式来创建和查询外部表。\n\n要使用这些脚本，您首先需要预配并获取\
  \ Azure SQL 数据库的访问权限。针对您的 Azure SQL 数据库运行 `createazuredbtable.sql` 脚本中的语句。\n\n设置完成后，让我们逐步演练使用\
  \ `azuredbexternaltable.sql` T-SQL 脚本的每个步骤及您应预期的结果：\n\n1.  运行 T-SQL 脚本中的 `Step 1`\
  \ 以更改数据库上下文并创建主密钥来加密数据库范围凭据：\n\n```sql\n-- 步骤 1：创建主密钥来加密数据库凭据\nUSE [WideWorldImporters]\n\
  GO\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'S0me!nfo'\nGO\n```\n\n2.  运行 `Step\
  \ 2` 以创建受主密钥保护的数据库范围凭据。您需要提供所创建的 Azure SQL 数据库的服务器登录名和密码：\n\n```sql\n-- 步骤 2：创建存储\
  \ Azure SQL Server 数据库登录凭据的数据库凭据\n-- IDENTITY = 登录名\n-- SECRET = 密码\nCREATE DATABASE\
  \ SCOPED CREDENTIAL AzureSQLDatabaseCredentials\nWITH IDENTITY = '', SECRET = ''\n\
  GO\n```\n\n3.  运行 `Step 3` 以使用数据库范围凭据作为 `CREDENTIAL` 进行身份验证，来创建外部数据源：\n\n```sql\n\
  -- 步骤 3：创建外部数据源\n-- sqlserver 是一个关键字，表示数据源是 SQL Server、Azure SQL 数据库或 Azure SQL\
  \ 数据仓库\n-- :// 后面的名称是 Azure SQL Server 数据库服务器。您的 SQL Server 必须位于与 Azure SQL Server\
  \ 数据库相同的虚拟网络中，或者必须通过其防火墙规则\nCREATE EXTERNAL DATA SOURCE AzureSQLDatabase\nWITH (\n\
  LOCATION = 'sqlserver://',\nPUSHDOWN = ON,\nCREDENTIAL = AzureSQLDatabaseCredentials\n\
  )\nGO\n```\n\n关于此脚本需要注意几点。`LOCATION` 语法包含一个 `<类型>:<连接信息>`，其中类型可以有以下可能值：\n*   sqlserver\n\
  *   oracle\n*   teradata\n*   mongodb\n*   obdc\n\n该类型将指示 SQL Server 为外部数据源使用哪个\
  \ ODBC 驱动程序。对于 SQL Server，Azure SQL 数据库的连接信息应该是服务器的 URL（例如，`<server>..database.windows.net`）。\n\
  \n当您成功创建外部数据源后，可以在用户数据库的上下文中，使用 `external_data_sources` 目录视图查看已创建源的列表。\n\n## 提示\n\
  \n遗憾的是，创建外部数据源时并不验证与数据源的连接。如果您弄错了连接信息的名称，直到尝试创建外部表时才会发现。数据库范围凭据也存在同样的问题。如果您没有提供正确的登录名和密码，直到尝试创建外部表时才会知道。\n\
  \n4.  运行脚本的 `Step 4` 以创建一个架构来存放外部表对象。这不是必需的，但我喜欢使用架构来帮助组织对象，这也使得安全设置非常方便：\n\n```sql\n\
  -- 步骤 4：在 WideWorldImporters 中为外部表创建一个架构\nCREATE SCHEMA azuresqldb\nGO\n```\n\n\
  5.  运行 `Step 5`，使用 `DATA_SOURCE` 属性中指定的外部数据源来创建外部表：\n\n```sql\n-- 步骤 5：创建外部表\n--\
  \ 每一列必须与远程表中的列相匹配\n-- 注意字符列使用了与目标表兼容的排序规则\n-- WITH 子句包含了远程 [数据库].[架构].[表] 的名称以及外部数据库源\n\
  CREATE EXTERNAL TABLE azuresqldb.ModernStockItems\n(\n[StockItemID] [int] NOT NULL,\n\
  [StockItemName] nvarchar COLLATE Latin1_General_100_CI_AS NOT NULL,\n[SupplierID]\
  \ [int] NOT NULL,\n[ColorID] [int] NULL,\n[UnitPackageID] [int] NOT NULL,\n[OuterPackageID]\
  \ [int] NOT NULL,\n[Brand] nvarchar COLLATE Latin1_General_100_CI_AS NULL,\n[Size]\
  \ nvarchar COLLATE Latin1_General_100_CI_AS NULL,\n[LeadTimeDays] [int] NOT NULL,\n\
  [QuantityPerOuter] [int] NOT NULL,\n[IsChillerStock] [bit] NOT NULL,\n[Barcode]\
  \ nvarchar COLLATE Latin1_General_100_CI_AS NULL,\n[TaxRate] decimal NOT NULL,\n\
  [UnitPrice] decimal NOT NULL,\n[RecommendedRetailPrice] decimal NULL,\n[TypicalWeightPerUnit]\
  \ decimal NOT NULL,\n[LastEditedBy] [int] NOT NULL\n)\nWITH (\nLOCATION='wwiazure.dbo.ModernStockItems',\n\
  DATA_SOURCE=AzureSQLDatabase\n)\nGO\n```\n\n这是 Polybase 场景中的一个重要部分，因此我将指出一些细节：\n\
  *   列数、列名和数据类型必须与外部数据源表完全匹配，但您可以在 SQL 端自由命名列名和表名。\n*   类型映射可能比较棘手。我们有文档帮助您定义 SQL\
  \ Server 类型以匹配相应的外部数据源类型，地址是 `https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-type-mapping`。\n\
  *   外部表的 `LOCATION` 语法是您映射外部数据源对象的方式。每个数据源都有一个 `LOCATION`，其内容可以不同，用于标识数据源对象。对于 SQL\
  \ Server 或 Azure SQL 数据库，您应使用 `<database>.<schema>.<tablename>` 的“三部分”约定来引用表。\n\
  *   在尝试创建外部表时会执行验证，以确保正确的列匹配、类型映射以及是否使用了任何受限类型（我将在本章后面的“限制与约束”一节中提到限制）。\n\n创建后，您可以使用目录视图\
  \ `sys.external_tables` 查看外部表的列表。`sys.objects` 目录视图将外部表列为类型 `USER_TABLE`。`sys.tables`\
  \ 目录视图中有一个可用的列 `is_external`，用于识别哪些表是外部表。\n\n6.  运行 `Step 6`，在外部表的关键列上创建本地统计信息。这不是必需的，但建议执行，以帮助查询处理器做出明智的决策来支持如下推计算等操作：\n\
  \n\n\n-- 步骤 6：在你将用于筛选器的列上创建本地统计信息\n\n```sql\nCREATE STATISTICS ModernStockItemsStats\
  \ ON azuresqldb.ModernStockItems ([StockItemID]) WITH FULLSCAN\nGO\n```\n\n4. 运行**步骤\
  \ 7**，查看一个扫描外部表中所有行的简单示例。在此示例中，如果查询成功，应该只返回一行：\n\n```sql\n-- 步骤 7：尝试扫描远程表\nSELECT\
  \ * FROM azuresqldb.ModernStockItems\nGO\n```\n\n远程运算符内置于查询处理器中，用于支持通过 PolyBase\
  \ 服务对外部表进行查询。图 9-10 显示了步骤 7 中查询的实际执行计划，包括远程运算符的详细信息。\n\n![../images/479130_1_En_9_Chapter/479130_1_En_9_Fig10_HTML.jpg](img/479130_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10：用于外部表的远程运算符\n\nPolyBase 还附带了一系列动态管理视图，可用于查看针对外部表的查询执行情况。\n\n`sys.dm_exec_distributed_requests`\
  \ – 与 `sys.dm_exec_requests` 非常相似，你可以找出特定于 PolyBase 的查询。这个 DMV 的优点在于它保存了最近查询的历史记录，而不仅仅是活动查询。`execution_id`\
  \ 列中的值是使用其他 DMV 深入挖掘查询执行情况的关键。\n\n`sys.dm_exec_distributed_request_steps` – 此 DMV\
  \ 将接收来自 `sys.dm_exec_distributed_requests` 的 `execution_id`，并让你查看 PolyBase 处理针对外部表的查询的执行过程中的特定步骤。对于一个\
  \ `execution_id`，每个步骤都有一个 `step_index` 值。\n\n`sys.dm_exec_distributed_sql_requests`\
  \ – 此 DMV 显示 `sys.dm_exec_distributed_steps` 中每个 `step_index` 的更多详细信息，包括哪个计算节点正在执行查询（对于横向扩展查询，可能是头节点和/或计算节点）。\n\
  \n`sys.dm_exec_dms_workers` – 此 DMV 提供有关通过 PolyBase 数据移动服务 (DMS) 为特定 `execution_id`\
  \ 和 `step_index` 执行的更多详细信息。此 DMV 对于查看通过 ODBC 驱动程序连接到外部数据源的详细信息（包括可能的错误信息）非常重要。\n\
  \n5. 运行**步骤 8**，使用 WHERE 子句筛选结果（并可能使用向下推送到外部数据源）：\n\n```sql\n-- 步骤 8：尝试查找特定的 StockItemID\n\
  SELECT * FROM azuresqldb.ModernStockItems WHERE StockItemID = 100000\nGO\n```\n\n\
  6. 运行**步骤 9**，使用 UNION 查找 SQL Server 2019 和 Azure SQL 数据库上的所有库存物品：\n\n```sql\n--\
  \ 步骤 9：使用 UNION 查找本地表和 Azure 表中特定供应商的所有库存物品\nSELECT msi.StockItemName, msi.Brand,\
  \ c.ColorName\nFROM azuresqldb.ModernStockItems msi\nJOIN [Purchasing].[Suppliers]\
  \ s\nON msi.SupplierID = s.SupplierID\nand s.SupplierName = 'Graphic Design Institute'\n\
  JOIN [Warehouse].[Colors] c\nON msi.ColorID = c.ColorID\nUNION\nSELECT si.StockItemName,\
  \ si.Brand, c.ColorName\nFROM [Warehouse].[StockItems] si\nJOIN [Purchasing].[Suppliers]\
  \ s\nON si.SupplierID = s.SupplierID\nand s.SupplierName = 'Graphic Design Institute'\n\
  JOIN [Warehouse].[Colors] c\nON si.ColorID = c.ColorID\nGO\n```\n\nUNION 的第一部分涉及外部表与本地\
  \ SQL Server 表的连接。\n\n你已经看到了一个使用内置的 SQL Server 连接器，通过外部表与 Azure SQL 数据库进行数据虚拟化的示例。请继续阅读有关\
  \ `sqldatahub` 文件夹中其他示例的一些信息。\n\n## 使用内置连接器创建外部表\n\n以下是其他使用内置连接器创建外部表的示例。每个示例都有一个\
  \ `readme.md` 文件，其中包含有关设置外部数据源以及构建数据源对象和填充数据的脚本的提示。它们都遵循与 Azure SQL 数据库示例相同的模板。\n\
  \n*   `ch9_data_virtualization\\sqldatahub\\cosmosdb` – 用于使用 MongoDB 连接器与 Azure\
  \ CosmosDB 的示例。\n*   `ch9_data_virtualization\\sqldatahub\\oracle` – 用于使用 Oracle\
  \ 连接器的示例。\n\n#### 提示\n\n我遇到的一个问题是，用于 Oracle 的外部表的 LOCATION 属性值是区分大小写的。\n\n*   `ch9_data_virtualization\\\
  sqldatahub\\sql2008r2` – 用于使用 SQL Server 连接器连接到旧版本 SQL Server 的示例。\n\n## 注意\n\n\
  此示例需要针对 SQL Server 2008R2 的变通方法，而在我撰写本章时该问题尚未解决。由于我们即将发布，目前尚不清楚我们会支持到多旧的 SQL Server\
  \ 版本，因为 2008R2 已经停止支持。\n\n### 使用外部表与 HDFS\n\n可以在 `ch9_data_virtualization\\sqldatahub\\\
  hdfs` 目录中找到一个使用 PolyBase 与 HDFS 和 Azure Blob 存储的示例。附带的 `readme.md` 文件提供了有关如何设置以及如何使用此示例的更多信息。\n\
  \n使用 HDFS 的外部数据源的一个很大不同之处在于对外部数据源使用 LOCATION 属性以及使用 TYPE 属性。\n\n以下是从该示例中创建外部数据源的\
  \ T-SQL 语句示例：\n\n```sql\nCREATE EXTERNAL DATA SOURCE bwdatalake with (\nTYPE = HADOOP,\n\
  LOCATION ='wasbs://@',\nCREDENTIAL = AzureStorageCredential\n)\nGO\n```\n\n与其他示例不同，对于\
  \ HADOOP 需要一个 TYPE 字段。此外，LOCATION 属性没有像 `sqlserver` 这样的 `<type>`。这是因为 `TYPE = HADOOP`\
  \ 告诉 SQL Server 要为 HDFS 使用哪种类型的连接器。\n\n### 使用外部表与 ODBC 连接器\n\n最后一个示例是关于使用 ODBC 连接器创建用于\
  \ SAP HANA 的外部表。请注意，此示例仅适用于 Windows 上的 SQL Server 2019。你可以在 `ch9_data_virtualization\\\
  sqldatahub\\saphana` 目录中找到此示例。\n\n在此示例中，数据源不同，因为它需要 ODBC 数据源和连接字符串详细信息。以下是此示例的外部数据源创建语句：\n\
  \n```sql\nCREATE EXTERNAL DATA SOURCE SAPHANAServer\nWITH (\nLOCATION = 'odbc://',\n\
  CONNECTION_OPTIONS = 'Driver={HDBODBC};ServerNode=:',\nPUSHDOWN = ON,\nCREDENTIAL\
  \ = SAPHANACredentials\n)\nGO\n```\n\n#### 提示\n\n这里是使用 ODBC 数据连接器与横向扩展组的一个重要提示，因为在我首次设置这些场景时它给我造成了问题。你必须在横向扩展组的每个节点上安装你正在使用的\
  \ ODBC 驱动程序。如果不这样做，在执行查询时可能会遇到间歇性错误。这是因为当你有一个横向扩展组时，即使查询不是横向扩展就绪的，任何节点都有可能被用来执行针对外部数据源的查询。\n\
  \n我们也有文档指导你使用 ODBC 连接器：[`https://docs.microsoft.com/zh-cn/sql/relational-databases/polybase/polybase-configure-odbc-generic`](https://docs.microsoft.com/zh-cn/sql/relational-databases/polybase/polybase-configure-odbc-generic)。我应该告诉你，ODBC\
  \ 连接器为使用 SQL Server 作为数据枢纽开辟了一些有趣的可能。我在一个大型活动上有一位客户问我关于将 PolyBase 与 Office 365 一起使用的问题。我当时不知道答案，并想知道，“有\
  \ O365 的 ODBC 驱动程序吗？” 结果发现有：[`https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver`](https://marketplace.visualstudio.com/items?itemName=CDATASOFTWARE.Office365ODBCDriver)。退后一步。也许有一天你会看到我创建一个演示，展示\
  \ SQL Server 对我的 Office 邮件运行查询！\n\n### 外部表的注意事项\n\n现在你已经了解了 PolyBase 的工作原理并看了一些示例，在决定是否将\
  \ PolyBase 与 SQL Server 2019 一起使用时，有几个方面需要考虑。\n\n\n\n### 一个全新的语义层\n\n这个概念我借鉴了我的同事特拉维斯·赖特（Travis\
  \ Wright）。其核心思想是，Polybase 允许你通过自己掌控的命名约定来定义对象，而不必使用来自外部数据源的对象的命名约定。\n\n换句话说，你可以使用你在\
  \ SQL Server 中使用的策略和过程的语义。当你构建外部表时，你使用的是你掌控下的 SQL Server 约定、架构和安全对象。将此功能与能够同本地 SQL\
  \ Server 表进行联接、使用 `UNION` 与本地表进行组合，然后在这些结构之上创建视图的能力相结合。\n\n另外请记住，Polybase 是在用户数据库级别定义的，因此所有对象都由该用户数据库的所有者进行保护和管理。\n\
  \n### 外部表 vs. 链接服务器\n\n关于 Polybase 和外部表，我最常被问到的一个问题是：它们与自 SQL Server 7.0 以来就存在于产品中的链接服务器是否有所不同。\n\
  \n我们在文档中对这两种技术进行了一个很好的比较：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq?view=sql-server-ver15#polybase-vs-linked-servers`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-faq%253Fview%253Dsql-server-ver15%2523polybase-vs-linked-servers)。\n\
  \n最明显的区别在于，链接服务器是在实例级别定义的，并使用 OLE-DB 访问其他数据源的数据。而 Polybase 是在用户数据库级别定义的，并使用 ODBC\
  \ 访问外部数据。\n\n### 限制与约束\n\n你需要知道的首要限制是，Polybase 在绝大多数情况下是一个只读解决方案（例外是你可以对基于 HDFS\
  \ 的外部表使用 `INSERT` 语句）。\n\n我还遇到了 SQL Server 对外部表支持的数据类型的一些问题。在 SQL Server 2019 中，以下数据类型不支持用于\
  \ `EXTERNAL TABLE`：\n\n*   `VARCHAR(MAX)`\n*   `GEOGRAPHY`\n*   计算列\n*   `JSON`\n\
  \n## 总结\n\n随着新增的内置连接器以及对 ODBC 的支持，我相信 Polybase 将比它首次在 SQL Server 2016 中发布时获得更广泛的采用。现在能够访问和查询许多不同数据源的数据，而无需移动数据，这一可能性非常有吸引力。事实上，自\
  \ 2019 年 9 月我开始介绍 SQL Server 2019 的特性以来，这是客户询问最多的新功能之一。能够通过 SQL Server 查询 Oracle\
  \ 数据，而无需在 SQL Server 上安装任何特殊软件，这一事实让许多人眼前一亮。Polybase 有可能成为 `从 Oracle 迁移到 SQL Server\
  \ 的迁移策略` 的一部分。请查看这段录像，那是我在 2019 年微软 Ignite 大会上与微软同事阿米特·班纳吉（Amit Banerjee）共同主持的一场会议，阿米特展示了如何使用\
  \ Polybase 配合 SQL Server 2019 实现从 Oracle 到 SQL Server 的增量迁移策略：[`https://myignite.techcommunity.microsoft.com/sessions/65955`](https://myignite.techcommunity.microsoft.com/sessions/65955)。\n\
  \n在你继续阅读第 10 章之前，请务必先阅读本章。这是因为在第 10 章中，我将讨论 SQL Server 2019 的一个新解决方案，该方案将涉及数据虚拟化和\
  \ Polybase 的概念，称为 SQL Server 大数据群集。\n\n"
- "# 10. SQL Server 大数据群集\n\n如果你还记得第 1 章，我展示了 SQL Server 2019 的主要新功能。图 10-1 显示了该章图\
  \ 1-3 左上角的第一个主要特性。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig1_HTML.jpg](img/479130_1_En_10_Fig1_HTML.jpg)\n\
  \n*图 10-1*\n\n对这个信息图更准确的表述是 `对您所有数据的智能处理`。这是因为图 10-1 背后的功能远不止 Polybase++。随着你阅读本章，你会更多地理解我所说的\
  \ `对您所有数据的智能处理` 是什么意思。\n\n图 10-1 简洁地概括了 `SQL Server 大数据群集 (BDC)` 的核心，但它不可能展示其全部潜力。始于我在第\
  \ 1 章描述的 Project Aris 的这个项目，已经发展成为一个 `产品中的产品`，并且是 SQL Server 2019 最引人入胜的亮点之一。\n\n\
  既然我在第 1 章就从谈论 Project Aris 和图 10-1 中的这个信息图开始，为什么 SQL Server 大数据群集要放在第 10 章这么靠后呢？\n\
  \n在我规划这本书时，原本打算将 BDC 作为第一章，作为开场的重头戏！然而，当我更深入地思考全书的结构后，将其作为后面的章节之一是有道理的，原因如下：\n\n\
  *   我希望你首先学习 SQL Server 2019 在 Linux、容器、Kubernetes 和 Polybase 方面的基础知识，这将有助于你理解 BDC。这就是为什么这些主题分布在第\
  \ 6、7、8 和 9 章。\n*   你会看到 BDC 的一部分是一个 `SQL Server 主实例`。当你看到 `SQL Server 主实例` 时，我希望你已经熟悉\
  \ BDC 的该组件随附的 SQL Server 2019 其他核心功能。\n*   BDC 是一项重大工程，需要众多团队成员设计、构建和编码。因此，它是在我们的\
  \ CTP 版本和预览发布期间，SQL Server 2019 中功能完善最晚、最大的组件。我希望尽可能等到书稿完成时再定稿，以便为你提供关于 BDC 最新、最准确的信息，包括它的用途和工作原理。\n\
  \n在本章中，你将了解为什么 BDC 能为当今的数据专业人士解决一些有趣的挑战：\n\n*   正如我在第 9 章关于 Polybase 的描述中所说，数据专业人士需要访问其组织中\
  \ SQL Server 之外的数据源。他们希望能够 `以很少或无需数据移动` 的方式访问来自各种来源的数据。\n*   许多数据专业人士正在考虑投资 `大数据`。我将在下一节更详细地讨论\
  \ `大数据` 这个术语的一些清晰细节，但当这个术语出现时，它通常涉及一个由 `Hadoop` 驱动的系统。\n*   有些组织从未投资过 `Hadoop`，因此希望获得指导甚至自动化部署一个\
  \ `Hadoop` 系统来存储非结构化或半结构化数据。这类数据通常是 `高容量数据`，而存储在其 SQL Server 中的数据则被视为 `高价值数据`。\n\
  *   此外，许多组织需要更严格地保护和管理 `Hadoop` 系统，就像他们今天对 SQL Server 所做的那样。他们希望有一个完整的生态系统来构建一个易于部署、安全且可扩展的\
  \ `数据湖`，并充分利用 SQL Server 和大数据两方面的现代技术优势。\n\n\n## 大数据集群简介\n\n各组织希望在机器学习（ML）上投入更多，并希望构建和部署可扩展、安全且靠近驱动\
  \ ML 模型的数据源运行的 ML 应用程序。我听到客户说，他们想要一个*端到端机器学习平台*。\n\n图 10-2 是我们用来阐述大数据集群试图解决的三大解决方案领域的可视化图表。\n\
  \n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig2_HTML.jpg](img/479130_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n\n`大数据集群`解决方案\n\n在本章中，我打算回答以下问题：\n\n*   我们**为什么**称其为大数据集群？\n*   部署大数据集群后，您能获得**哪些**功能？\n\
  *   如何**部署**大数据集群？\n*   大数据集群的架构是什么，它**如何工作**？\n*   如何**使用**大数据集群？\n*   如何**使用大数据集群进行机器学习**？\n\
  *   如何**管理和监控**大数据集群？\n\n这似乎足够单独写成一本书了，所以我无法深入探讨一切。但是，我将探讨一些文档中没有但我认为您应该知道的细节。我还将从我的角度给出示例和提示，说明为什么\
  \ `BDC` 是 SQL Server 2019 的一个重要解决方案。\n\n## 注意\n\n在本章中，我有时会提到我的同事 Buck Woody 制作的一个研讨会中的陈述或示例，该研讨会名为\
  \ `研讨会：SQL Server 大数据集群 – 架构`，您可以在 [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)\
  \ 找到它。它是补充本章内容的一个极佳资源。\n\n## 为什么是大数据集群？\n\n我相信我们团队会有很多理由说我们称这个解决方案为 SQL Server 大数据集群。对我来说，答案很简单。我们通过这个解决方案部署和结合了三大技术：\n\
  \n*   **SQL Server** – SQL Server 将成为访问集群中数据的中心。这是完整的 SQL Server 产品，包含了我在这本书中描述的所有功能，运行在一个基于\
  \ Linux 操作系统镜像的容器中。\n*   **大数据** – 我们为您部署大数据技术，如 `HDFS` 和 `Spark`。\n*   **集群** –\
  \ 我们使用 `Kubernetes` 集群来部署和运行不同的容器，以提供一个完整的端到端系统。\n\n当您在接下来的几节中阅读更多内容时，关于我们将如何集成这些技术的细节会逐渐清晰。\n\
  \n我认为描述一下我对*大数据*这个术语的看法，以及为什么我们认为将其包含在大数据集群解决方案中很重要，这一点很关键。我在微软的同事 Buck Woody 就大数据主题撰写了一篇出色的博客文章，地址是\
  \ [`https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/`](https://buckwoody.wordpress.com/2019/08/26/big-data-is-just-data/)。\n\
  \n我喜欢这个对大数据术语的描述，“大数据是任何您无法在想要的时间内用现有系统处理的数据。”这对 SQL Server 意味着，您的组织中可能有一些数据，也许不太适合存储在像\
  \ SQL Server 这样的关系数据库管理系统（`RDBMS`）中。这可能有各种原因，包括规模、结构、数据来源以及转换为关系表的复杂性。\n\n阅读最初 Hadoop\
  \ 项目的起源很有趣。Hadoop 的创始人最初希望有一个文件系统，能够以分布式方式在商用硬件集群上存储海量数据。他们称之为 Google 文件系统（这其实是一个更复杂的故事；您可以在\
  \ [`https://en.wikipedia.org/wiki/Apache_Hadoop#History`](https://en.wikipedia.org/wiki/Apache_Hadoop%2523History)\
  \ 阅读更多关于 Hadoop 的历史）。那个最初项目的目标就是解决 Buck 为大数据术语所定义的问题。\n\n通过 SQL Server 大数据集群，我认为我们真正提供的是一个*单一系统*，让您拥有数据存储和处理的*两个世界*。我们为您部署\
  \ SQL Server 来存储和访问以关系格式（表）存储的数据。同时，我们部署一个 Hadoop 分布式文件系统（`HDFS`）集群，允许您以非结构化或半结构化文件格式存储数据。让这个系统特别的关键成分在于它们是*集成*的。在\
  \ `Polybase` 的帮助下，您可以将来自 SQL Server（以及 Oracle、Teradata 和 MongoDB 等其他来源）的表与 `HDFS`\
  \ 文件进行连接，这种方法是无缝的，并且具有可扩展的性能。\n\n这个故事还有更多内容；在下一节中，我将确切描述部署 SQL Server 大数据集群后您能获得什么价值。\n\
  \n## 大数据集群包含什么？\n\n我将 SQL Server 大数据集群（`BDC`）描述为产品中的产品。这是因为当您部署 `BDC` 时，您会获得丰富的功能，包括以下内容。\n\
  \n### SQL Server 2019\n\n`BDC` 附带一个使用 Linux 操作系统镜像在容器中运行的*完整* SQL Server 2019 实例。这意味着\
  \ SQL Server 2019 for Linux 的所有功能也都包含在 `BDC` 中。这将包括 Active Directory 身份验证和使用 Always\
  \ On 可用性组的高可用性。\n\n### Polybase\n\nSQL Server 的 `Polybase` 功能在安装 `BDC` 时会自动安装并启用。这意味着您将获得用于\
  \ SQL Server、Oracle、Teradata、MongoDB 和 Hadoop 的内置连接器。此外，`BDC` 附带*特殊连接器*，可以以优化的方式访问集群内的\
  \ `HDFS` 文件和数据缓存。再者，尽管 Linux 上的 SQL Server 2019 不支持 `Polybase 横向扩展组`，但 `BDC` 通过使用称为*计算池*的概念实现了\
  \ `Polybase 横向扩展组`，我将在“大数据集群架构”一节中详细讨论。\n\n### Hadoop 分布式文件系统 (HDFS)\n\n`BDC` 将使用开源\
  \ Apache Hadoop 部署一个 `HDFS` 存储集群。您将有几种不同的方式可以访问 `BDC` 中 `HDFS` 集群里存储的文件，包括通过 SQL\
  \ Server 的 `Polybase`。我们还提供了一种方法，让您可以将您自己的外部 `HDFS` 存储挂载到 `BDC` 中的本地 `HDFS` 存储，这个概念我们称之为*HDFS\
  \ 分层*。\n\n### Spark\n\n`BDC` 安装 Apache `Spark` 以提供另一种分析和处理数据的方法。我喜欢 Buck Woody 对\
  \ `Spark` 的定义：“Apache Spark 是一个用于处理大规模数据的分析引擎。它可以与存储在 `HDFS` 中的数据一起使用，并且也有连接器可用于处理\
  \ SQL Server 中的数据。”您将通过 Spark 作业与集群内的数据进行交互。我将在标题为“使用 Spark”的部分更详细地讨论如何在 `BDC` 中使用\
  \ `Spark`。\n\n### 数据缓存\n\n我们的文档说我们提供了一个*数据集市*，我认为这个术语在技术上是正确的。对我来说，我们真正提供的是一个*数据缓存*。我称它为数据缓存，因为我们提供了一组专门优化的\
  \ SQL Server 实例，用于存储针对 `Polybase` 外部数据源查询的结果。设想一下这样的场景：您希望*存储一组结果*，每周刷新一次，用于报告目的。这些结果可能来自使用许多不同数据源的\
  \ `Polybase` 查询，而我们在 `BDC` 中的数据缓存是解决这个问题的完美方案。我们在一个称为*数据池*的组件中实现数据缓存，我将在“大数据集群架构”一节中更详细地解释。\n\
  \n\n### 工具与服务\n\n为了帮助您部署、使用和管理大数据集群，我们提供了一套作为解决方案一部分的可用工具。您会发现，本书中已使用的 Azure Data\
  \ Studio 工具将是整个 BDC 工具解决方案的关键部分，包括对 `Notebooks` 的支持。此外，我们部署了一组容器作为 `services` 来帮助协调和管理大数据集群。文档称这些服务为\
  \ `Controller`，您将在本章的几个部分了解更多关于控制器工作原理的信息。\n\n### 端点\n\n您需要能够连接到大数据集群以执行所有类型的任务，因此我们提供了一系列\
  \ `Service endpoints`。这将包括用于连接到 SQL Server、HDFS 和 Spark 的端点，以及多个管理和监控服务的端点。您将在本章剩余部分了解更多关于服务端点的信息。\n\
  \n### 应用程序部署\n\nSQL Server 大数据集群允许您通过 T-SQL 语句和 Spark 作业执行代码。SQL Server Machine\
  \ Learning Services 和 Extensibility 还允许您运行与 SQL Server 集成的 R、Python 和 Java 代码。由于大数据集群部署在\
  \ Kubernetes 集群中，我们希望为开发人员提供一种方法，以便在大数据集群中部署应用程序，提供一个暴露的接口来与这些应用程序交互，并允许应用程序访问大数据集群中连接的数据源，例如\
  \ SQL Server 表和外部表。因此，大数据集群提供了 `Application Deployment` 的概念，供您部署 R、Python、MLeap\
  \ 和 SSIS 应用程序。应用程序部署是将大数据集群用作端到端机器学习平台的关键要素。我将在本章后面的“使用大数据群集”一节中更详细地讨论应用程序部署。\n\n\
  ### 机器学习\n\n我曾告诉您，大数据集群提供的解决方案之一是端到端机器学习平台。大数据集群通过以下能力实现这一点：\n\n*   SQL Server Machine\
  \ Learning Services\n*   SparkML\n*   MLeap\n*   Machine Learning packages\n*  \
  \ Application Deployment\n\n我将在本章后面的“机器学习与大数据群集”一节中更详细地讨论这些内容。\n\n回顾这个列表！您现在能看出为什么\
  \ SQL Server 大数据集群是“产品中的产品”了吗？这个故事还有更精彩的部分。请继续阅读。\n\n## 注意\n\nBuck Woody 的 `Workshop:\
  \ SQL Server Big Data Clusters – Architecture` 在模块 2.0 中有一个描述大数据集群组件的优秀页面。请将此作为另一个资源来研究大数据集群的内容。\n\
  \n## 示例的先决条件\n\n在我开始讨论部署之前，让我先描述一下如何找到本章中将使用的示例。我将不提供具体的示例和脚本，而是使用来自以下来源的几个示例：\n\
  \n*   `SQL Server Samples GitHub Repo` – 我将使用并讨论位于 [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)\
  \ 的几个示例。\n*   `SQL Server 2019 Big Data Cluster Workshop` – Buck Woody 在 [`https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters`](https://github.com/Microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters)\
  \ 提供了一些我将使用的优秀示例。\n\n使用这些示例需要满足以下条件：\n\n*   一个已部署的 SQL Server 2019 大数据集群。在我撰写本书本章时，我使用的是\
  \ SQL Server 2019 Release Candidate，它非常接近 SQL Server 2019 的最终版本。我将在下一节“部署大数据群集”中详细讨论要求，包括客户端工具。\n\
  *   一个 Windows、macOS 或 Linux 客户端，用于部署和运行示例脚本或 T-SQL 查询。几乎所有的部署工具和示例工具都可以在 Windows、macOS\
  \ 和 Linux 上运行。我还建议您安装并使用 Azure Data Studio (ADS)，您可以从 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)\
  \ 下载。ADS 和笔记本电脑的使用是成功使用大数据群集的关键。\n\n## 部署大数据群集\n\n我将向您展示我部署 SQL Server 大数据集群的经验，以便向您展示其组件和架构。很难决定是先展示架构还是先展示部署。我认为先进行部署然后再描述部署了什么很重要，我建议您也这样做。\n\
  \n## 注意\n\n大数据集群中的所有软件都作为容器部署在 Kubernetes 集群中。大数据集群依赖于您部署自己的 Kubernetes 集群，但也提供了工具来帮助将\
  \ k8s 部署作为一个选项。\n\n### 计划部署\n\n部署需要一些规划。让我描述一下我计划如何部署大数据集群的经验，因为它可能对您的规划工作有所帮助。如果您正在计划大数据集群的生产部署，我建议您通读本章后面的“为生产配置部署”一节。\n\
  \n#### 决定 k8s\n\n部署大数据集群时要做的第一个决定是选择 Kubernetes (k8s) 发行版和位置。大数据集群支持部署在公共云提供商的 k8s\
  \ 上，例如 `Azure Kubernetes Service` (AKS)，或部署在您自己的 Linux 服务器或虚拟机上的 k8s（例如，如果您自己使用\
  \ kubeadm 部署了 k8s）。我预计随着 SQL Server 2019 及更高版本的发布，大数据集群将支持其他知名 k8s 提供商的列表会增加，包括\
  \ Azure Stack、Red Hat OpenShift 等。在我撰写本书时，您可以在 Windows Server 上的 k8s 部署上技术性地部署大数据集群，但这种场景需要在\
  \ Windows Server 上运行 Linux 虚拟机来运行 k8s。\n\n我们的部署大数据集群的工具将在 k8s 中创建一系列包含容器的 Pod（在大多数情况下，Pod\
  \ 将包含多个容器）以支持大数据集群系统。我们还将部署和使用其他 k8s 对象，例如 Load Balancer、Persistent Volume Claim、ReplicaSet\
  \ 和 StatefulSet 对象。\n\n一旦决定了 k8s 选择，您可以自己部署 k8s，或者使用我们构建的脚本来同时部署 k8s 和大数据集群。\n\n\
  对于这两种选项，仅用于“开发/测试”大数据集群的基本要求是一个 Linux 虚拟机 (VM) 或计算机（对于 AKS，选择 VM 大小），具备以下资源：\n\n\
  ```\n*   64Gb RAM。\n*   8 个 CPU（可以是逻辑 CPU）。\n*   对于 AKS，一个支持至少 24 个磁盘的 Azure VM\
  \ 大小。\n*   如果您计划部署多个大数据集群节点，每个节点（VM）都需要满足这些资源要求。\n```\n\n## 注意\n\nSlava Oks 和我讨论过需要减少大数据集群“开发者版”的占用空间，使其不需要那么多\
  \ RAM。我告诉 Slava，理想情况下我可以在我的笔记本电脑上部署一个大数据集群，仅仅用于测试基本功能。\n\n我们的脚本和笔记本默认选择 Azure VM\
  \ 大小为 Standard_L8s_v2，但是，只要您为 AKS 选择具有 64Gb、8 个 CPU 和 24 个磁盘的 Azure VM，部署就应该可以工作。您可以在\
  \ [`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general`](https://docs.microsoft.com/en-us/azure/virtual-machines/linux/sizes-general)\
  \ 阅读更多关于 Azure VM 大小的信息。\n\n就我的部署经验而言，我将使用 AKS 并使用我们提供的脚本，该脚本将一次性部署 AKS 集群和大数据集群。我建议您在规划部署时阅读以下文档资源：\n\
  \n[`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-get-started)\n\
  \n[`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)\n\
  \n\n\n#### 选择客户端与下载工具\n\n一旦你决定了 k8s 策略，就需要工具来部署 BDC。在尝试部署 BDC 之前，确保在客户端上安装了所有正确的工具至关重要。文档在\
  \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-big-data-tools)\
  \ 提供了所需工具列表。对于我的客户端，我选择了我的“云端笔记本电脑”。这意味着我在一个 Azure 虚拟机中安装了 Windows 10，并在那个 VM 中进行了所有的\
  \ BDC 操作。\n\n工具列表包括以下内容：\n\n`python` – `python` 是几个不同工具使用的关键组件，可在所有操作系统平台上使用。安装\
  \ BDC 所需的 `azdata` 工具就是用 `python` 编写的。我需要 `python`，因为我使用了一个 `python` 脚本来一步部署 AKS\
  \ 和 BDC。对于 Windows 版的 `python`，我只是从 [`www.python.org/downloads/release/python-374/`](https://www.python.org/downloads/release/python-374/)\
  \ 下载最新的 `python` 版本。\n\n`kubectl` – 正如你在第 8 章所学，`kubectl` 是一个专门设计用来向 k8s API 服务器发送请求的工具。这是你与\
  \ Kubernetes 的编程接口。\n\n我已经在 Windows 机器上安装了 `kubectl`；我检查了版本，是 1.14。文档说明指出：“你必须使用\
  \ 1.10 或更高版本的 `kubectl`。此外，`kubectl` 的版本应该比你的 Kubernetes 集群的次要版本高或低一个版本。”因为我使用的是\
  \ AKS，我检查了命令以查看我的 AKS 部署中将使用哪些版本，发现支持的最高版本是 1.14.6 – 所以我应该可以继续。你可以在 [`https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions`](https://docs.microsoft.com/en-us/azure/aks/supported-kubernetes-versions)\
  \ 找到更多关于检查你的集群上是否支持 AKS 版本的信息。\n\n`azdata` – 这个工具在 SQL Server 2019 的早期预览版中称为 `mssqlctl`，对于部署和管理\
  \ BDC 是*至关重要*的。它用 `python` 编写，你应该把 `azdata` 看作是 BDC 的“`kubectl`”。\n\n为了验证我是否正确安装了\
  \ `azdata`，我只是从命令行运行 `azdata` 来看看接口是什么样子。结果如图 10-3 所示。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig3_HTML.jpg](img/479130_1_En_10_Fig3_HTML.jpg)\n\
  *图 10-3：`azdata` CLI*\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata)\
  \ 查看完整的 `azdata` 参考文档。\n\nAzure Data Studio (ADS) – 这个跨平台的开源工具可用于查询、部署、管理和导航 BDC\
  \ 的数据。虽然 SQL Server Management Studio (SSMS) 可用于连接到 BDC 中的 SQL Server 主实例，但 ADS\
  \ 具有专为 BDC 设计的功能和扩展，包括对 Notebook 的支持。\n\n我使用了来自 [`https://github.com/microsoft/azuredatastudio#try-out-the-latest-insiders-build-from-master`](https://github.com/microsoft/azuredatastudio%2523try-out-the-latest-insiders-build-from-master)\
  \ 的 ADS Insiders 构建版本，但我预计在 SQL Server 2019 发布时，你将获得一个包含 BDC 所需一切的公共 ADS 版本。你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)\
  \ 获取最新的 ADS 构建版本。\n\n我还在 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-server-2019-extension)\
  \ 获取了最新的 SQL Server 2019 预览版扩展并安装了 vsix 文件。（你可以忽略关于第三方扩展的警告，因为该扩展来自微软。）很难知道它是否正常工作或已完成，但等几分钟，你会在右下角看到一条类似“扩展\
  \ `microsoft.sql-vnext` 安装完成”的消息。\n\n`az` – 如果你使用 AKS，你将需要 Azure 命令行界面来登录 Azure\
  \ 并部署和管理 AKS。\n\n`curl` – `curl` 代表“Client URL”，是一个流行的工具，用于从特定 URL 复制数据，通常是存储在网站上的文件。对我来说，`curl`\
  \ 随 Windows 10 一起提供。`curl` 是一个很棒的工具，不仅可以将远程脚本复制下来与 BDC 一起使用，还可以将数据复制到 BDC HDFS 集群中。\n\
  \n#### 部署方法\n\n现在你知道了要部署哪种类型的 k8s 集群，并已下载了所需的工具；你可以选择部署方法：\n\n*   使用 `python` 的“单步”方法部署\
  \ AKS 和 BDC，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\
  \ 找到。\n*   使用 `kubeadm` 在你的 k8s 集群上部署 k8s 和 BDC 的“单步” Bash shell 脚本，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-script-single-node-kubeadm)\
  \ 找到。\n*   首先创建你自己的 AKS 或 k8s 集群，然后使用 `azdata` 工具部署 BDC，你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance)\
  \ 阅读相关内容。\n*   使用 Azure Data Studio (ADS) 将 BDC 部署到新的 AKS 集群、现有的 AKS 集群或你已使用 `kubeadm`\
  \ 部署的现有 k8s 集群。\n\n图 10-4 展示了如何在 ADS 中访问此部署体验。\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig4_HTML.jpg](img/479130_1_En_10_Fig4_HTML.jpg)\n\
  *图 10-4：在 Azure Data Studio 中选择部署 BDC*\n\n图 10-5 展示了选择你的部署方法的体验。\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig5_HTML.jpg](img/479130_1_En_10_Fig5_HTML.jpg)\n\
  *图 10-5：Azure Data Studio 中 BDC 的部署选项*\n\n#### 离线部署\n\n我想提一下，如果你需要离线部署体验，因为你的 k8s\
  \ 集群没有连接到互联网（至少在你需要部署 BDC 的时候），我们已经记录了如何拉取我们的容器镜像并在 k8s 上部署 BDC。你仍然需要本章描述的所有工具来进行离线部署。你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-offline)\
  \ 阅读详细信息。\n\n\n### BDC 部署体验\n\n为了分享我对 BDC 部署体验的看法，我将把 BDC 部署到 AKS 上，并使用提供的 Python\
  \ 脚本作为“一步式”解决方案。您可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy)\
  \ 阅读如何使用此解决方案的详细信息。\n\n除了我需要将 AKS 和 BDC 群集部署在 `eastus2` 区域之外，其余我都选择了默认值。\n\nPython\
  \ 脚本实际上是 `az` 和 `azdata` 的包装器。它使用您的选择（或环境变量或默认值）来创建 Azure 资源组、AKS 群集和 BDC。BDC 是使用\
  \ `aks-dev-test` 配置创建的。这是 BDC 的基本配置，非常适用于开发或测试场景。我将在本章后面的“为生产环境配置部署”一节中讨论生产部署的配置。\n\
  \n部署需要时间！BDC 解决方案需要部署许多 Pod 和容器，如果您还部署了 k8s 群集，这个过程将需要更长时间。对我来说，使用 Python 脚本和 AKS\
  \ 的总部署时间约为 20 分钟，但我见过它需要长达一个小时的情况。\n\n当您运行 Python 脚本时，您将收到类似以下的消息：\n\n```\nCreating\
  \ azure resource group: \n\nCreating AKS cluster: \n\nCreating SQL Big Data cluster:mssql-cluster\n\
  custom\\bdc.json created\ncustom\\control.json created\nThe privacy statement can\
  \ be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=853010\nThe license terms\
  \ for SQL Server Big Data Cluster can be viewed at:\nhttps://go.microsoft.com/fwlink/?LinkId=2002534\n\
  Cluster deployment documentation can be viewed at:\nhttps://aka.ms/bdc-deploy\n\
  NOTE: Cluster creation can take a significant amount of time depending on\nconfiguration,\
  \ network speed, and the number of nodes in the cluster.\nStarting cluster deployment.\n\
  Waiting for cluster controller to start.\n```\n\n最后一条消息 `Waiting for cluster controller\
  \ to start` 是一条关键消息，可能会重复出现几次。`controller` 是首先在 k8s 群集中创建的，`controller service`\
  \ 将用于部署 BDC 的其余部分。\n\n然后您将看到类似这样的消息：\n\n```\nCluster controller endpoint is available\
  \ at :\nCluster control plane is ready.\n```\n\n很快您将看到这些消息：\n\n```\nData pool is\
  \ ready.\nMaster pool is ready.\nCompute pool is ready.\nStorage pool is ready.\n\
  Cluster deployed successfully.\n```\n\n最后一条消息意味着 AKS 和 BDC 都已成功部署。我采用“信任但验证”的原则，因此，在下一节中，我将讨论如何验证部署是否成功以及您是否准备好使用\
  \ BDC。\n\n## 注意事项\n\n`Creating SQL Big Data cluster:mssql-cluster` 中提供的名称将成为 BDC\
  \ 创建的所有对象的 Kubernetes 命名空间。因此，在我的部署中，`mssql-cluster` 是 k8s 命名空间。\n\n## 验证部署\n\n\
  我使用以下方法对 AKS 和 BDC 的成功部署进行了“完整性检查”：\n\n*   按照以下步骤使用 `kubectl` 检查群集：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy?view=sqlallproducts-allversions#inspect-the-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/quickstart-big-data-cluster-deploy%3Fview%3Dsqlallproducts-allversions%23inspect-the-cluster)。\n\
  \n*   使用 `azdata` 登录群集，找到控制器端点，然后连接到 SQL Server 以确保您可以连接到 SQL Server。请按照 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance?view=sqlallproducts-allversions#endpoints`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-guidance%3Fview%3Dsqlallproducts-allversions%23endpoints)\
  \ 中的步骤操作。\n    查找名为 `SQL Server Master Instance Front-End` 的端点。该端点是连接到 SQL Server\
  \ 的 IP 地址和端口。\n    请按照以下文档页面中的指导，使用 Azure Data Studio (ADS) 连接到 BDC 中的 SQL Server：\n\
  \    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster`](https://docs.microsoft.com/en-us/sql/big-data-cluster/connect-to-big-data-cluster)\n\
  \    我在 ADS 中对我的 BDC 进行的基本连接测试如图 10-6 所示。\n\n\n## 注意\n\n我在部署 BDC 时使用的是 ADS 的 Insider\
  \ 版本，因此随着 SQL Server 2019 的正式发布，此界面的一部分内容可能会发生变化。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig6_HTML.jpg](img/479130_1_En_10_Fig6_HTML.jpg)\n\
