  \ k8s 集成。\n\n### k8s 对象\n\n无论你是否阅读了这些资源，让我在本章中从我的角度描述一些 k8s 的术语，并分享一些我在学习这个主题时发现的关于内部原理的有趣评论。阅读本章时，你需要了解的基本术语和对象包括：\n\
