  \ ADR 时的 `ERRORLOG`。启用 ADR 后，恢复发生得如此之快，以至于 SQL Server 甚至没有记录恢复花费了多长时间！\n\n```\n\
  spid25s     在数据库 'gocowboys' (6:0) 中回滚了 1 个事务。这只是信息性消息。不需要用户操作。\nspid25s     恢复正在数据库\
  \ 'gocowboys' (6) 中写入一个检查点。这只是信息性消息。不需要用户操作。\n```\n\n### 加速数据库恢复的机制详解\n\n这一切听起来好得令人难以置信，我相信你一定在想这是否会有什么副作用。如果\
  \ ADR 如此出色，为什么我们不直接将其设为默认功能呢？\n\n#### 性能和大小\n\n当我和客户讨论 ADR 时，经常会出现两个问题：\n\n**数据库会变大吗？**\n\
  \n这个问题的简短答案是：是的。更重要的问题是变大多少。由于我们在一段时间内保留行的版本，因此 PVS 所需的空间自然比没有它时更大。\n\n和任何类似功能一样，问题在于那个令人头疼的答案：“视情况而定”。取决于什么？影响因素包括：\n\
  \n*   应用程序是否是写入密集型的，有大量修改？修改的数量越大，存储版本所需的空间就越多。\n*   需要读取版本数据的事务有多长？一旦任何查询都不再需要某些版本，它们就可以被移除。\n\
  \n加速数据库恢复具有内置优化，以尽可能减小版本存储的大小，包括以下内容：\n\n*   **“按需”**\n    在更新一行时，SQL Server 可以“重用”已中止事务的行版本，并在原处写入一个新版本。这发生在数据修改的过程中。\n\
  *   **后台清理**\n    如果版本仍然存在但不再需要（例如，已中止的事务），并且尚未发生更新怎么办？SQL Server 使用现有的后台工作线程架构来调度清理（每隔“几分钟”）任何可以丢弃的版本，包括行内和行外版本。SQL\
  \ Server 使用一种称为*逻辑还原*的概念来清理这些版本。逻辑还原是确保行的已提交版本是页面的“主要”行的过程，从而缩短需要遍历的版本“列表”。CTR 论文\
  \ [`(www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/`](https://www.microsoft.com/en-us/research/publication/constant-time-recovery-in-azure-sql-database/))\
  \ 的第 3.3 节对逻辑还原的工作原理进行了出色的详细描述。此外，该论文的第 3.7 节描述了整个清理过程。\n\n该论文的第 4 节提供了关于增长的实验测试结果，使用了一个包含\
  \ 5000 万次插入、更新和删除操作的示例。团队发现，在 5000 万次更新后，PVS 使数据库增长了大约 1GB。你应该仔细阅读这些结果，因为它还显示了由于使用\
  \ ADR 而导致事务日志大小的显著减少（你在本章使用 `alookatadr.sql` 脚本的活动中也观察到了这一点）。\n\n**使用 ADR 会导致任何性能影响吗？**\n\
  \n这可能是关于 ADR 最常被问到的问题。和增长因素一样，答案是“可能，并且视情况而定”。由于 ADR 通过版本跟踪每一次修改，写入密集型工作负载将受到最大影响。对于写入密集型工作负载的读取操作，在查找行版本时也可能受到一些影响。\n\
  \n作为 CTR 论文的一部分，工程团队使用源自行业标准 `TPC-C` 和 `TPC-E` 基准的测试进行了性能测试（有关这些基准的更多信息，请参见 [`www.tpc.org`](http://www.tpc.org)）。`TPC-C`\
  \ 是一个较旧的基准测试，但写入非常密集。`TPC-E` 是一个更均衡但仍然是“OLTP”写入工作负载的基准测试。你可以在论文的 **第 4.2 节** 中看到结果，但简而言之，`TPC-C`\
  \ 的运行遇到了大约 14%（行内版本）的影响，而 `TPC-E` 遇到了 2.5%（行内版本）的影响。\n\n我自己使用开源工具 `HammerDB`（更多详细信息请参见\
  \ [`www.hammerdb.com`](http://www.hammerdb)）进行了“快速而简单”的测试。该工具附带一个 `TPC-C` 基准的变体。使用\
  \ 10 个仓库/10 个虚拟用户在 5 分钟内执行，我观察到使用 ADR 大约造成了 15% 的影响。\n\n\n### ADR 性能测试说明\n\n这些测试结果都不意味着，当你为自己的数据库启用\
  \ ADR 时，会看到这些完全相同的数字或任何性能影响。这是因为这些测试使用的是特定类型工作负载的基准测试，它们可能与你的应用程序匹配，也可能不匹配。你需要找到一种标准方法，在启用和不启用\
  \ ADR 的情况下测试你的应用程序性能，才能了解真正的性能影响。\n请仔细查看论文第 4 节的所有结果，因为它还展示了团队在 Azure 中观察到的一些惊人的恢复时间结果（你已经看到了一个简单数据库的可能影响）。\n\
  加速数据库恢复的另一个主要好处是，Always On 可用性组的故障转移时间可以更快，并且对于副本上的只读查询存在一个更好的版本方案。\n\n#### 意外场景\n\
  \n在某些情况下，持久化版本存储 (`PVS`) 无法存储在行内，因为它不适合页面。在这种情况下，版本存储在一个内部系统表中。这些被称为“行外”场景。可以想象，当\
  \ `PVS` 存储在行外时，这并非理想情况。因此，如果可能，应避免这些场景。\n行外版本主要发生在对当前行的版本进行重大修改时。如果一个更新非常显著，以至于在行内存储版本不可行或不合理；该版本将作为一个行外版本存储在内部系统表中。我在一个启用了\
  \ `ADR` 的数据库中做了一些探查，发现 `PVS` 保存在每个数据库中一个名为 `persistent_version_store` 的表中。该表被标记为\
  \ `INTERNAL_TABLE` 类型，类似于查询存储等其他表。这个系统表包含版本数据和元数据，用于将其链接回表中页面的实际行。\n如果你担心你的应用程序是否生成了大量行外版本，有一些性能计数器和扩展事件可以使用，我将在下一节“追踪\
  \ `ADR`”中描述。\n\n#### 文件组与优化说明\n\n在我撰写本章时，行外 `PVS` 存储在你数据库的 `PRIMARY` 文件组中，并且无法选择其他文件组。工程团队当时正在讨论是否可以通过\
  \ `ALTER DATABASE` 添加一个选项，让用户选择将行外 `PVS` 移动到另一个文件组。请查阅 `ALTER DATABASE` 的文档，看看这项增强功能是否已包含在最终的\
  \ SQL Server 2019 版本中。\n另一个意外情况称为短事务优化。这种情况是件好事。当事务本质上非常短时，使用 `PVS` 没有意义。因此，在测试\
  \ `ADR` 时，不要期望一个只删除几行的事务会使用 `ADR`。如果你使用 `fn_dblog()` 检查日志，你可以通过以下操作和上下文 `LOP_FORGET_XACT`\
  \ 和 `LCX_XACT_DOES_NOT_SUPPORT_CTR` 看到哪些事务不会应用 `ADR`。\n\n#### 追踪 ADR\n\n与 SQL Server\
  \ 的许多新功能一样，`ADR` 团队提供了等待类型、扩展事件和性能监视计数器来跟踪 `ADR` 的执行、持久化版本存储 (`PVS`) 的使用以及清理处理过程。\n\
  图 4-5 显示了一些可用于跟踪持久化版本存储 (`PVS`) 使用情况的性能计数器，包括跟踪生成了多少行外版本。\n![../images/479130_1_En_4_Chapter/479130_1_En_4_Fig5_HTML.jpg](img/479130_1_En_4_Fig5_HTML.jpg)\n\
  图 4-5 `PVS` 性能计数器\n还有几个扩展事件也可用于跟踪特定版本的生成和清理任务。你可以通过针对 `XE` 动态管理视图执行以下查询来找到所有这些事件：\n\
  ```sql\nselect * from sys.dm_xe_objects where name like '%pvs%'\nselect * from sys.dm_xe_objects\
  \ where name like '%ctr%'\n```\n其中一个可能有趣的事件是 `pvs_add_record` 事件。你可以将此事件与一个 `sql_text`\
  \ 操作结合使用，以找出哪些查询正在生成行外版本。\n我尚未使用这些扩展事件进行任何测试，因此无法说明它们可能对你的应用程序产生的性能影响。\n最后，对于那些真正想深入了解的人，`sys.dm_os_wait_stats`\
  \ `DMV` 中列出了几个适用于 `ADR` 的等待类型。你可以监控这些等待类型来跟踪清理等活动的执行情况。使用以下 `T-SQL` 语句查找这些等待类型：\n\
  ```sql\nselect * from sys.dm_os_wait_stats\nwhere wait_type like '%pvs%' or wait_type\
  \ like '%ctr%'\n```\n\n#### 是否应该使用 ADR？\n\n如果你没有长时间运行的事务，`ADR` 可能对你帮助不大，甚至可能对你的应用程序产生负面影响。如果你的应用程序生成大量行外版本，其影响可能过高，以至于看不到\
  \ `ADR` 的好处。不过请记住，对于故障转移场景（例如 Always On 可用性组），这仍然可能带来巨大益处。\n我的建议是找到一种方法用你的应用程序进行测试。我们没有在\
  \ SQL Server 2019 中（暂时）将其设为默认，因为存在太多类型的工作负载，正如我在本章所讨论的，并非所有工作负载都能看到好处。但请牢记这些最终思考：\n\
  *   这是那种你现在可能不知道自己需要，但当你需要它时……你确实需要它的功能之一。你可能无法预测何时一次长时间运行的恢复会导致你的业务中断。如果启用了这个功能，让这种情况根本不会发生，岂不是很好？\n\
  *   大多数工作负载不像 `TPC-C` 那样是真正、极其写密集型的。我们使用像 `TPC-E` 这样更均衡的读/写工作负载进行的测试结果并未显示出巨大影响。\n\
  *   考虑一下工程团队在 `CTR` 论文中引用的这句话，他们采用“云优先”方法首先在 Azure 中推出此功能：“……`CTR` 已经在五个区域启用，涉及大约一百万个数据库，结果非常有希望。”\n\
  \n## 总结\n\n确保你的数据和应用程序可用是任何值得信赖的数据平台产品的重要方面。SQL Server 2019 持续增强核心可用性功能，例如可恢复的联机索引创建和可用性组。此外，SQL\
  \ Server 2019 为业界带来了一种非常创新的方法，通过加速数据库恢复来解决因长时间运行的活动事务导致的停机问题。\n\n"
- '# 5. 现代开发平台


  几乎任何开发者都需要数据，而像 SQL Server 这样的产品具备你所需的能力、语言、驱动程序和平台。现代数据开发者需要一个数据库平台来应对当今应用程序的挑战。SQL
  Server 2019 通过以下功能迎接这些挑战：

  *   支持跨多种操作系统平台（如 Windows、macOS 和 Linux）的多种语言和驱动程序，并具有兼容性。SQL Server 各版本提供公共的应用程序接口区域，以最小化应用程序逻辑。

  *   与 SQL Server 集成的图数据库允许开发人员实现诸如社交网络等数据模型，而无需额外产品——并使用熟悉的语言（如 `T-SQL`）进行查询。

  *   开发人员需要能够构建应用程序，使用业界广泛使用的编码系统处理 Unicode 数据。SQL Server 2019 通过新的排序规则支持 `UTF-8`
  编码。

  *   开发人员需要一个数据库平台来支持整合了机器学习的新型应用程序，这些应用程序应可扩展、安全且与数据库集成。SQL Server 机器学习服务在 SQL Server
  2019 中包含了新的增强功能。

  *   `T-SQL` 语言提供了许多功能，但开发人员可能需要更多。他们希望能够扩展与数据库集成的 `T-SQL` 语言。SQL Server 2019 中的
  SQL Server 语言扩展允许开发人员安装和使用与 SQL Server 数据集成的新语言，例如 `Java`。




  ## 语言、驱动程序与平台


  1993 年我刚加入微软时，为 SQL Server 编写应用程序的开发人员主要使用 Visual C 或 Visual Basic 等语言，并通过一种名为 DB-Library
  的驱动程序进行连接。客户端全部运行在 DOS（是的，DOS）或 Windows 上，而 SQL Server 则是 Windows NT 上的主流数据库服务器。C++
  和 ODBC 很快也出现了，但可供选择的语言、驱动程序和平台种类相当有限。时至今日，无论是客户端应用程序还是 SQL Server 本身，在语言、驱动程序和平台方面的选择之多，已远超我当初的想象。


  ### 语言与驱动程序


  SQL Server 2019 是一个现代化的数据库平台，随之而来的是广泛的编程语言选择，包括那些传统上不使用 SQL Server 的开发人员所青睐的现代语言。


  与这些语言选择相匹配的，是满足每种语言需求的、用于访问 SQL Server 的驱动程序。此外，这些驱动程序可在多种客户端平台上运行，包括 macOS、Linux
  和 Windows。


  另外，像 ODBC、OLE-DB 和 .Net 这样的驱动程序选择也变得更加聚焦，而不像过去那样种类繁多、有时甚至令人困惑。


  那么，如何选择语言和/或驱动程序呢？首先，在某些情况下，语言的选择决定了你将使用的驱动程序。例如，如果你想用 PHP 编写代码来访问 SQL Server，就必须使用
  `PHP Driver for SQL Server`。


  幸运的是，微软建立了一个非常实用的网站来帮助你做出语言选择、选择合适的驱动程序、选定一个或多个客户端平台，并查看用该语言编写代码访问 SQL Server 的示例。


  要查看实际效果，请访问网站 `http://aka.ms/sqldev`。主网页如图 5-1 所示。


  ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig1_HTML.jpg](img/479130_1_En_5_Fig1_HTML.jpg)


