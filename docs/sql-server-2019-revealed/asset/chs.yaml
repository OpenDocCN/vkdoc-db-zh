  ### 性能\n\n在每一次 SQL Server 版本发布中，我们都会致力于提升性能。始终如此。但是，仅仅让你的查询运行得更快是不够的。我们需要持续让 SQL\
  \ Server 引擎变得更智能，能够适应你的工作负载、硬件投入和复杂的查询模式。第 2 章完整探讨了 SQL Server 2019 的性能功能，包括但不限于：\n\
  \n*   `智能查询处理`，这是对 SQL Server 2017 中引入的自适应查询处理的扩展。\n*   通过轻量级查询分析、上次执行计划和查询存储增强功能，随时随地提供查询计划\
  \ `洞察`。\n*   一系列功能可提供真正的 `内存中数据库`，包括增强的 I/O、用于持久内存的混合缓冲池以及内存优化的 tempdb 架构。将这些技术与我们内置的列存储索引和内存\
  \ OLTP 相结合，可提供一个引人注目的内存中数据库解决方案。\n\n### 安全性\n\n在过去十年中，SQL Server 不仅是业界漏洞最少的数据库产品，还包含了一系列广泛的特性和工具，以满足任何企业的现代安全需求。这包括\
  \ SQL Server 2019 的以下增强功能：\n\n*   `使用安全飞地的始终加密`\n    SQL Server 2016 引入了一个名为 `始终加密`\
  \ 的新数据应用程序端到端安全系统。虽然该系统提供了静态、内存中和跨网络的加密，但仍存在一些限制，最重要的是不支持 `丰富计算`。在第 3 章中，我将讨论 `始终加密`\
  \ 如何利用称为 `安全飞地` 的概念来支持丰富计算和其他有趣的安全场景。\n\n*   `内置的数据分类与审核`\n    欧盟（EU）的《通用数据保护条例》（GDPR）于\
  \ 2018 年 5 月生效。自那时起，我与许多欧盟境内以及与欧盟客户有业务往来的公司的客户进行了交流。我们新的内置数据分类和审核功能，结合我们的工具，可以对\
  \ GDPR 等合规性场景以及你的业务可能需要处理的其他场景非常有帮助。\n\n我将在第 3 章中介绍这些安全方面的新特性及更多内容。\n\n### 任务关键型可用性\n\
  \n快速和安全是一方面，但依赖 SQL Server 运营业务的客户需要他们的数据平台始终可用。SQL Server 2019 包含满足你高可用数据需求的新功能，包括：\n\
  \n*   可恢复的联机创建索引和聚集列存储索引联机创建，以帮助完成联机索引可用性故事。\n*   增强了我们的旗舰 HADR 功能——Always On 可用性组，包括增加副本数量和主连接重定向。\n\
  *   想象这样一个世界：事务回滚立即发生，恢复和日志截断不依赖于大型或长时间运行的事务。欢迎来到全新的加速数据库恢复世界！\n\n我将在第 4 章中更详细地讨论这些以及其他任务关键型可用性解决方案。\n\
  \n### 现代开发平台\n\n到目前为止，我确信我所谈到的 SQL Server 2019 中的所有新功能似乎都只针对 DBA 或 IT 专业人员。我们绝对相信开发人员对\
  \ SQL Server 的成功至关重要，因此我们也对以下新功能进行了投入：\n\n*   在 SQL Server 2016 中，我们引入了一个名为 `R`\
  \ 的语言，用于数据库内机器学习的新平台。在 SQL Server 2017 中，我们通过允许 `Python` 程序增强了这一模型。利用相同的基础设施，我们现在允许开发人员使用\
  \ `Java` 类来扩展 `T-SQL` 语言。事实上，我们构建了一个可扩展性 SDK，以使其他语言也能成为 SQL Server 故事的一部分。\n*  \
  \ 我们扩展了图数据库的功能（该功能在 SQL Server 2017 中首次引入），增加了诸如边约束和 `MERGE` 支持等新特性。\n*   我们希望开发人员使用\
  \ Unicode 数据类型，因此我们增加了新的 `UTF-8` 排序规则，可以帮助开发人员管理 `UTF-8` 数据，而无需承担 Unicode 数据类型的开销。\n\
  \n我将在第 5 章中更详细地讨论 SQL Server 2019 中面向开发人员的功能。\n\n### 投资于你选择的平台\n\n我们在 SQL Server\
  \ 2017 中推出了 Linux 版 SQL Server，但引擎“边缘”的一些功能未能包含在该版本中。我们希望我们的用户能够完全选择运行 SQL Server\
  \ 的操作系统，而无需担心功能或兼容性问题。我们在 SQL Server 2019 中通过向 Linux 版 SQL Server 添加 `复制`、`更改数据捕获\
  \ (CDC)`、`分布式事务 (DTC)`、`机器学习` 和 `Polybase` 来改进了这一点。\n\n我们在容器方面也进行了投资，包括新的容器注册表、支持\
  \ Red Hat Enterprise Linux (`RHEL`)，并持续支持包括 OpenShift 在内的 Kubernetes。虽然本书未涵盖，但我们在\
  \ 2019 年 5 月宣布了对 Azure SQL Database Edge 中的 Arm 处理器的预览支持，从而扩展了 SQL Server 的平台。你可以在\
  \ [`https://azure.microsoft.com/en-us/services/sql-database-edge/`](https://azure.microsoft.com/en-us/services/sql-database-edge/)\
  \ 阅读更多关于 Azure SQL Database Edge 的信息。\n\n你应该停下来思考一下所有这些平台标志，因为 SQL Server 不仅仅是一个可选平台。它是一个\
  \ `具备兼容性的可选平台`。你可以在这些平台中的任何一个上备份数据库，并将其原封不动地恢复到这些平台中的任何一个上。\n\n我将在本书的第 6 章、第 7 章和第\
  \ 8 章中花时间深入探讨 Linux 版 SQL Server 的增强功能、SQL Server 容器以及 Kubernetes 上的 SQL Server。\n\
  \n除了 SQL Server 2019 的这些主要投资领域外，还有其他值得一提的创新。\n\n### Azure Data Studio\n\nSQL Server\
  \ Management Studio (`SSMS`) 多年来一直是 SQL Server 坚定的图形用户界面。去年，我们开始构建一个名为 SQL Operations\
  \ Studio 的新工具，用于数据探索、可扩展性和新体验。在 2018 年 9 月，我们正式推出了这个工具，并将其命名为 Azure Data Studio\
  \ (`ADS`)。\n\nAzure Data Studio 包含一些创新的新技术，包括笔记本、大数据集群部署、外部数据向导，以及对 SQL Server、`HDFS`\
  \ 和其他 Azure 数据服务的探索。\n\n没有专门章节介绍 Azure Data Studio。相反，你会在本书各章中看到我使用这个工具（以及 `SSMS`\
  \ 等其他工具）。\n\n\n\n## 客户之声\n\n凭借我在客户支持方面的背景，我总是很高兴看到我们的工程团队在新版本中加入那些能直接与客户反馈或我们的 CSS\
  \ 团队支持问题趋势相关联的功能。\n\n这次的发布也不例外，其中包含了一系列对数据库引擎的增强，包括但不限于：\n\n*   更好的字符串截断错误信息，并提供了可操作的上下文。这是客户投票排名第一的需求，获得了数千票。\n\
  *   新的动态管理对象，以深入洞察数据库页头的内部结构（是的，你也可以成为 Paul Randal）。这些语句可以帮助诊断页面闩锁争用问题。\n*   引擎在可扩展性方面的改进，包括并发\
  \ PFS 更新、并行批量插入和间接检查点。\n\n我将在第 `11` 章向你详细介绍这组增强功能。\n\n当你阅读本书的其余部分时，各章内容相对独立。然而，我强烈建议你首先阅读第\
  \ `7` 章和第 `8` 章作为基础知识，然后再深入学习关于数据虚拟化和大数据群集的第 `9` 章和第 `10` 章。\n\n## SQL Server 2019\
  \ 入门\n\n以下是一些资源，可帮助你在准备学习新特性并尝试本书剩余章节中的示例时，部署和配置 SQL Server 2019。\n\n### 下载 SQL\
  \ Server 2019\n\n要下载并试用 SQL Server 2019，请访问 [`www.microsoft.com/en-us/sql-server/sql-server-2019#Install`](http://www.microsoft.com/en-us/sql-server/sql-server-2019%2523Install)。\n\
  \n### 部署 SQL Server 2019\n\n有关如何在 Windows 上部署 SQL Server 2019 的说明，请访问 [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/installation-for-sql-server%253Fview%253Dsql-server-ver15)。\n\
  \n对于 Linux 上的 SQL Server 2019，请访问 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview%253Fview%253Dsql-server-ver15)。\n\
  \n要学习如何在容器中部署 SQL Server，请访问 [`https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker?view=sql-server-linux-ver15&pivots=cs1-bash`](https://docs.microsoft.com/en-us/sql/linux/quickstart-install-connect-docker%253Fview%253Dsql-server-linux-ver15%2526pivots%253Dcs1-bash.%255C)。\n\
  \n## 迁移到 SQL Server 2019\n\n第 `11` 章将讨论迁移以及支持从旧版 SQL Server 和其他供应商数据库产品迁移至 SQL Server\
  \ 2019 的工具。\n\n### SQL Server 2019 新增功能\n\n在 [`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?view=sqlallproducts-allversions`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253Fview%253Dsqlallproducts-allversions)\
  \ 了解关于 SQL Server 2019 所有新功能的具体信息。\n\n### 下载本书代码和示例数据库\n\n为了能够使用本书中的所有示例，你需要克隆本书的\
  \ GitHub 仓库，如本书引言中所讨论的那样。\n\n> **提示**\n>\n> Windows 用户，请务必使用以下 git 语法来克隆仓库，以避免 Linux\
  \ 脚本的 CRLF 问题：\n>\n> `git clone --config core.autocrlf=false` `https://github.com/microsoft/sqlworkshops.git`\n\
  \n此外，你还需要从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)\
  \ 下载示例数据库 `WideWorldImporters`，并从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)\
  \ 下载 `WideWorldImportersDW`。本书的代码包含如何在 Windows、Linux、容器和 Kubernetes 上还原备份的示例。\n\n\
  ### SQL Server 研讨会\n\n尽管我在本书中包含了许多动手练习，但你仍可以访问 [`http://aka.ms/sqlworkshops`](http://aka.ms/sqlworkshops)\
  \ 以查找更多关于 SQL Server 的免费相关培训（我的朋友兼同事 Buck Woody 是我所知最优秀的培训师之一，他是这个网站背后的策划者）。\n\n\
  ### 这是你爷爷的 SQL Server 吗？\n\n我喜欢编写这本书，不仅因为我喜欢这项技术（好吧，我对 SQL Server 有偏爱），还因为我们的工程团队正以业内任何其他竞品数据产品或平台都未曾见过的速度进行创新。而且我们得承认，学习新事物很有趣。\n\
  \n也许 *ITProToday* 杂志的这句引述说得最好：\"我从未想过有一天我会在同一个句子里讨论 Microsoft SQL Server 的发布特性与\
  \ Linux、Oracle 和 Apache Spark，但这是一个勇敢的新世界。Microsoft 的 SQL Server 开发正以其竞争对手无法匹敌的速度前进\"\
  \ ([`www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019`](https://www.itprotoday.com/sql-server/polybase-expansion-big-clusters-are-key-features-new-sql-server-2019))。\n\
  \n我记得我的同事 Travis Wright 在谈到 SQL Server 2019 时说：\"这不是你爷爷的 SQL Server。\" 这是因为该产品已经从一个强大的关系数据库引擎，演变为现在包含了\
  \ Spark、HDFS、Notebooks、Polybase、R、Python、Java、Linux、容器和 Kubernetes 等技术，所有这些都作为产品的一部分，真正成为了一个现代数据平台。\n\
  \n我记得把这段话发在了 Twitter 上。我的同事 Pedro Lopes 看到后评论说，SQL Server 2019 确实是你爷爷的 SQL Server。那么谁是对的呢？他们两个都对。SQL\
  \ Server 2019 仍然是你所熟知和喜爱的、令人难以置信的数据库引擎，具有可扩展的性能、关键任务安全性和高可用性。你将在本书中看到所有这些核心领域的增强功能。但\
  \ SQL Server 2019 远不止于此。它是地球上最受欢迎的数据库平台之一，也是最新的后起之秀。它可以兼具两者。欢迎来到 SQL Server 2019。\n\
  \n"
- "# 2. 智能性能\n\nSQL Server 性能对任何数据平台的运营都至关重要。本章包含了大量关于 SQL Server 2019 如何帮助你在不更改应用程序的情况下提升查询性能的信息。这是本书中最长的章节之一，包含大量示例，所以请坐稳并准备好你最喜欢的咖啡。\n\
  \n\n\n## 为何是智能性能？\n\n对我而言，这本书最重要的启示在于，`SQL Server 2019`的新功能`为何`能为您带来益处，或解决特定的问题或挑战。就性能而言，其主题是帮助您提升工作负载的性能，通常`无需`对应用程序或查询进行任何更改。\n\
  \n2018 年 9 月，我正在为佛罗里达州奥兰多市的`Microsoft Ignite`大会准备演讲。在那年此时之前，大家仅从高层次了解我们对`SQL vNext`的计划。我和我的同事`Amit\
  \ Banerjee`的任务是在`Ignite`上展示`SQL Server 2019 预览版`的发布。在构建演示文稿时，我们知道需要展示我们在性能方面的新增强功能。`Amit`提出了一个新术语：`智能数据库`。其理念是，`SQL\
  \ Server`正在构建将智能融入引擎的能力，以实现前所未有的检测、适应和提供洞察力。\n\n我沿用了这个术语，并将其更聚焦于性能，称之为`智能性能`。这包括`SQL\
  \ Server 2019`中的以下新增强功能：\n\n*   `智能查询处理`\n*   `轻量级查询分析`\n*   `内存中数据库`\n*   `末页插入争用`\n\
  \n这些领域中的每一个都在`SQL Server`引擎中内置了智能，以帮助您从系统中获得更好的性能，在许多情况下完全无需更改。在某些情况下，`SQL Server`为您提供了前所未有的查询性能洞察级别。在其他情况下，`SQL\
  \ Server`具有内置功能，可自动利用硬件方面的创新。\n\n当您创作一本书时，您会做出各种决定。其中之一是如何组织您的章节。这一章非常长，主要是因为其中包含许多视觉元素的示例。我是一个视觉型的人，所以我认为这是向您展示这些新功能的好方法。本章的每一部分本身就是一个独立的章节，您可以将其视为独立章节。我决定将所有内容包含在一个章节中，是因为我希望您能看到所有细节以及`SQL\
  \ Server 2019`中`智能性能`的庞大广度。\n\n本章的每一部分都列出了运行任何示例所需的先决条件。概括来说，您需要：\n\n*   安装在`Windows`或`Linux`上的`SQL\
  \ Server 2019`\n*   `SQL Server Management Studio (SSMS)` 18.0 或更高版本\n*   `Azure\
  \ Data Studio`（任何操作系统，但您需要的最低版本是 1.7.0）\n\n许多示例使用`SSMS`查看查询计划，但在学习这些示例时，您也可以使用`Azure\
  \ Data Studio`（您只需使用新的`SentryOne Plan Explorer`扩展查看计划`XML`）。有关此扩展的更多信息，请访问 [`https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available`](https://cloudblogs.microsoft.com/sqlserver/2019/07/11/the-july-release-of-azure-data-studio-is-now-available)。\n\
  \n## 智能查询处理\n\n在`SQL Server 2014`中，我们的工程团队做出了一个大胆的决定，在引擎内为查询处理器引入一套新的代码，用于基数估计（`CE`）决策。如果数据库使用的兼容级别为`120`或更高（`120`是`SQL\
  \ Server 2014`的默认值），则新的`CE 模型`将生效。您可以在我们的文档中阅读有关其工作原理以及我们为何做出此更改的所有详细信息：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/cardinality-estimation-sql-server)。\n\
  \n许多人争论这是否是正确的决定。这种方法的一个问题是它是一个广泛、不灵活的改动。当团队完成`SQL Server 2016`并规划`SQL Server 2017`时，他们都同意我们需要一种新的方式来构建查询处理功能。正如查询处理器（`QP`）的首席程序经理之一`Joe\
  \ Sack`所说，“团队意识到，进行一刀切式的改动不是我们未来应该做的。相反——我们需要投资于能够适应`SQL Server`生态系统中庞杂客户工作负载（大型、小型、`OLTP`、混合型、`DW`）的功能。”\n\
  \n因此，在`SQL Server 2017`中诞生了一系列名为`自适应查询处理 (AQP)`的新增强`功能家族`。其概念是在查询处理器中内置在查询执行期间（或在它`再次`执行之前）进行`自适应`的能力，以提供更快的执行速度，而无需任何用户干预或应用程序更改。\n\
  \n## 注意\n\n您可以在以下位置查看`SQL Server 2017`和`AQP`的示例：[`https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp`](https://github.com/Microsoft/bobsql/tree/master/demos/sqlserver/aqp)。\n\
  \n随着团队发布`SQL Server 2017`和`AQP`，他们已经在处理积压的新需求，这些是他们本想放入`AQP`但当时没有时间的功能。他们开始在`Azure\
  \ SQL Server Database`中添加增强`AQP`的新功能，并计划将它们纳入`SQL Server 2019`。此外，`自适应`这个词并没有真正反映团队所做工作的愿景。多年来，`SQL\
  \ Server`查询处理器一直相当智能——使用一套复杂的基于成本的算法来制定计划决策。但团队想要更多；他们希望`QP`展现出更多的智能。于是，`智能查询处理`这个名字就确定下来了。\n\
  \n图 2-1 展示了这个包含`SQL Server 2017`和 2019 的`QP`能力的`家族树`。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig1_HTML.jpg](img/479130_1_En_2_Fig1_HTML.jpg)\n\
  \n*图 2-1: 智能查询处理家族树*\n\n让我们看一下图 2-1 中以灰色显示的每个新功能，并举例说明其工作原理。在阅读本节时，请务必牢记，我们构建这些功能的目的**是让您无需了解它们**。将来，如果我们工作做得好，`智能查询处理`就是“默认”的查询处理器，而您作为应用程序开发人员、`DBA`或数据专业人员，只会习惯于一个灵活、智能且能适应您工作负载的引擎。您可以在关于`IQP`的新文档中查看`自适应查询处理`的所有功能：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing)。\n\
  \n## 注意\n\n除`近似计数 distinct`外，在所有场景中，您都可以通过将数据库的兼容级别更改为`150`来启用`智能查询处理`的功能。`近似计数\
  \ distinct`是`SQL Server 2019`新增的`T-SQL`函数，不需要数据库兼容级别为`150`。\n\n\n\n### 使用智能查询处理示例的先决条件\n\
  \n虽然许多工作负载都能从智能查询处理中受益，但使用较大数据集和为分析查询设计的数据库能更轻松地展示其性能优势。因此，本章示例将使用 `WideWorldImportersDW`\
  \ 示例数据库（您可以在 [`https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog`](https://docs.microsoft.com/en-us/sql/samples/wide-world-importers-dw-database-catalog)\
  \ 了解更多关于此数据库及其架构的信息）。\n\n这些示例适用于 Windows、Linux 和容器上运行的 SQL Server 2019。鉴于数据集较大，SQL\
  \ Server 需要至少 12GB 内存才能正常观察到性能差异。此外，部分查询示例使用了并行处理，因此更推荐在多处理器系统上安装 SQL Server。\n\n\
  本章使用的所有脚本都可以在 GitHub 仓库的 `ch2_intelligent_performance\\iqp` 目录下找到。\n\n这些示例（包括如何扩展\
  \ `WideWorldImportersDW` 数据库的方法）完全归功于我在微软的同事 Joe Sack。这些示例是基于 Joe 的 GitHub 仓库 [`https://github.com/joesackmsft/Conferences/tree/master/IQPDemos`](https://github.com/joesackmsft/Conferences/tree/master/IQPDemos)\
  \ 修改而来。\n\n要使用本章中的示例，您需要完成以下步骤：\n\n1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)\
  \ 下载 `WideWorldImportersDW` 数据库备份文件。\n2.  将此数据库还原到您的 SQL Server 2019 实例。您可以使用提供的\
  \ `restorewwidw.sql` 脚本。您可能需要更改备份文件位置以及数据库文件还原目录的路径。\n3.  为了运行部分示例，您需要比 `WideWorldImportersDW`\
  \ 默认安装更大的表，并且这些表不使用列存储索引。因此，请运行脚本 `extendwwidw.sql` 来创建两个大表。扩展此数据库将使其大小（包括事务日志）增加到总共约\
  \ 8GB。其中一个表名为 `Fact.OrderHistory`。基于 `Orders` 表，我们将大幅扩展此表且不使用列存储索引。我们将创建另一个名为 `Fact.OrderHistoryExtended`\
  \ 的表，它将基于 `Fact.OrderHistory`，但包含更多行。\n\n几乎所有示例都提供两种方法：\n\n*   一套 T-SQL 脚本，您可以配合任何工具使用，例如\
  \ `SQL Server Management Studio`、`Azure Data Studio` 或 `sqlcmd`。\n*   一个需要使用 `Azure\
  \ Data Studio` 的 T-SQL 笔记本。请仔细查阅如何在 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks`](https://docs.microsoft.com/en-us/sql/azure-data-studio/sql-notebooks)\
  \ 使用 `Azure Data Studio` 运行笔记本。\n\n有一个示例需要在 Windows 客户端运行，因为它使用了著名的 `ostress.exe`\
  \ 工具。有关如何安装和使用 `ostress.exe` 的详细信息，请参见“内存授权反馈（行模式）”部分。我编写所有脚本时假设您将以系统管理员身份运行（我使用了\
  \ `sa` 登录）。在实际操作中，您会创建其他登录名来使用 SQL Server，但为了简化示例——请仅使用具有系统管理员权限的登录名。\n\n### 内存授权反馈（行模式）\n\
  \n在加入 SQL Server 工程团队之前，我在微软技术支持部门有很长的职业生涯。在性能方面，我见过客户面临的最棘手问题之一就是与 `内存授权` 相关的问题。什么是\
  \ `内存授权`？\n\nSQL Server 会因各种原因分配内存。当 SQL Server 执行查询时，可能会使用内存来缓存与查询中索引或表的页面相关联的缓冲区。在大多数已运行一段时间的\
  \ SQL Server 实例中，缓冲池可能已经在分配的内存中，因此引入页面不需要额外内存。\n\n某些查询操作是密集型的，需要某种临时区域来存储数据。其中两种操作是\
  \ `哈希联接`（或仅仅是哈希运算符）和 `排序`。要执行 `哈希联接`，SQL Server 实际上必须在内存中构建一个迷你表来执行该操作。任何类型的数据 `排序`\
  \ 都可能需要某种数组或结构来对数据进行排序。SQL Server 必须有某个地方来执行这些操作，因此它会在缓冲池之外分配内存。查询执行引擎分配此内存的过程称为\
  \ `内存授权`。\n\n听起来很简单。问题在于：`内存授权` 是基于优化器在首次执行查询计划时对查询的了解。而这些决策的“依据”通常归结为基数估计或操作的唯一行数。如果\
  \ SQL Server 认为查询计划中的 `排序` 操作将作用于总大小为 100 字节的数据列，并且估计有 10 亿行数据，它必须获取足够的 `内存授权` 来分配内存以对如此多行、该大小的数据进行排序。同样的概念也适用于\
  \ `哈希` 运算符。\n\n\n\n### 提示\n\nSQL Server 工程团队撰写了一篇关于内存授权（memory grants）的非常古老的博客。我建议您暂停阅读本文，以了解更多概念和细节。您可以阅读这篇博客：[`https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/`](https://blogs.msdn.microsoft.com/sqlqueryprocessing/2010/02/16/understanding-sql-server-memory-grant/)。\n\
  \n在许多场景中，这个系统运行良好，不会出现明显问题。但是，如果内存授权基于不准确的基数估计会怎样？\n\n可能会出现两类问题：\n\n*   内存授权可能*小于实际所需*，导致臭名昭著且令人头疼的“tempdb\
  \ 溢出”。SQL Server 不会允许哈希连接运算符或排序操作获得其所需的所有内存。如果内存请求过大（我们没有记录什么算“过大”，因为我们可能会更改它，并且不希望您依赖于此），当前分配的内存必须被保存。保存到哪里？您猜对了…\
  \ tempdb。可以将此视为类似于物理 RAM 耗尽时操作系统对内存进行分页的分页系统。\n\n*   内存授权可能*大于实际所需*。这可能会挤压 SQL Server\
  \ 引擎其他部分的内存压力，但更可能的情况是多个用户运行的查询都具有*过多*的内存授权，从而导致 SQL Server 对查询进行节流。结果是一些用户在名为 `RESOURCE_SEMAPHORE`\
  \ 的等待类型上遇到瓶颈。\n\n这两个问题都可能导致性能问题。在 SQL Server 2017 中，我们为批处理模式引入了一个称为*内存授权反馈*的概念。此功能是*自适应*的完美示例。当查询执行完成后，SQL\
  \ Server 知道实际使用的内存与原始请求的内存相比如何。如果实际使用的内存远少于授权的内存，为什么下次执行相同的缓存计划时还要请求过多的内存？同样，如果实际使用的内存远多于原始授权请求的内存，为什么还要一遍又一遍地向\
  \ tempdb 溢出？\n\n内存授权反馈通过将未来执行的正确内存授权信息存储在缓存查询计划中来解决此问题。对用户而言，感觉就像 SQL Server *自我修复*了。此功能在\
  \ SQL Server 2017 中很好用，但仅适用于批处理模式操作，这意味着它仅适用于列存储索引操作。正如您将在本章后面题为“行存储上的批处理模式”的部分中了解到的，SQL\
  \ Server 支持的批处理模式操作不仅仅针对列存储。那么，为什么在未使用批处理模式时不支持内存授权反馈呢？\n\n其结果是，无论使用何种类型的表或索引，SQL\
  \ Server 引擎在内存授权场景下都具备了自适应能力。\n\n启用行模式内存授权反馈只需将数据库兼容性级别 (`dbcompat`) 更改为 150 即可。\n\
  \n即使 `dbcompat` 为 150，您也可以使用 `ALTER DATABASE SCOPED CONFIGURATION` 的 `ROW_MODE_MEMORY_GRANT_FEEDBACK`\
  \ 选项来禁用或启用行模式内存授权反馈。您还可以使用 `DISABLE_ROW_MODE_MEMORY_GRANT_FEEDBACK` 查询选项在查询级别禁用此功能。您可以阅读如何设置这些选项的示例：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)。\n\
  \n#### 低估的内存授权\n\n让我们看一些例子。首先看一个内存授权小于实际内存使用量，导致溢出到 tempdb 的场景。这些示例中使用的所有脚本都可以在\
  \ **ch2_intelligent_performance\\iqp\\rowmodemgf** 目录中找到。有两种方法可以运行此场景的示例：\n\n* \
  \  使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。\n*   使用 Azure Data Studio 中名为 **iqp_rowmodemfg.ipynb**\
  \ 的 T-SQL notebook。\n\n让我们逐步使用 T-SQL 脚本 **iqp_rowmodemfg.sql**。我将使用 SQL Server Management\
  \ Studio 来解释查询计划差异，但您可以使用任何可以显示查询计划的工具。T-SQL 脚本中注释了示例的每个步骤。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig2_HTML.jpg](img/479130_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n\n低估内存授权的查询计划\n\n1.  **步骤 1** 说明将数据库兼容性级别更改为 150，清除过程缓存，并*预热* `WideWorldImportersDW`\
  \ 数据库中名为 `Fact.OrderHistory` 的表所在的缓冲池。需要 `Dbcompat` 150 以为行存储启用内存授权反馈。清除过程缓存只是确保我们“从干净状态开始”的一步。（注意使用\
  \ `ALTER DATABASE` 选项仅为此数据库清除过程缓存。这个选项非常有用！）从磁盘加载 `Fact.OrderHistory` 表的页面只是为了确保有无内存授权反馈的查询性能比较是“公平的”。\n\
  \n    ```\n    -- 步骤 1：确保此数据库处于兼容级别 150，并清除此数据库的过程缓存。同时将表加载到缓存中以比较预热缓存的查询\n    USE\
  \ [WideWorldImportersDW]\n    GO\n    ALTER DATABASE [WideWorldImportersDW] SET\
  \ COMPATIBILITY_LEVEL = 150\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR\
  \ PROCEDURE_CACHE\n    GO\n    SELECT COUNT(*) FROM [Fact].[OrderHistory]\n    GO\n\
  \    ```\n\n2.  **步骤 2** 完全是为内存授权的*低估*设置条件。我将向您展示如何模拟此情况的技巧。T-SQL `UPDATE STATISTICS`\
  \ 命令有一个特殊选项，可强制存储特定的行数或页数统计信息。通常您绝不会想使用此选项。事实上，在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/update-statistics-transact-sql)\
  \ 的 `UPDATE STATISTICS` 命令文档中，关于此选项写道：“仅出于信息目的而标识。不支持。将来不保证兼容性。”因此，此选项仅用于此演示目的。在这种情况下，让我们强制将此表的统计信息的基数设置为\
  \ 1000 行：\n\n    ```\n    -- 步骤 2：模拟统计信息过期\n    UPDATE STATISTICS Fact.OrderHistory\n\
  \    WITH ROWCOUNT = 1000\n    GO\n    ```\n\n    此表实际有 3702592 行；强制统计信息认为其只有 1000\
  \ 行，可以模拟统计信息与表中实际数据不同步的场景。\n\n3.  进入 **步骤 3**。现在是运行使用 `Fact.OrderHistory` 表的查询的时候了。\n\
  \n    ```\n    -- 步骤 3：运行查询以获取订单和库存项目数据\n    -- 不要选中此处的注释来运行查询！\n    SELECT fo.[Order\
  \ Key], fo.Description, si.[Lead Time Days]\n    FROM  Fact.OrderHistory AS fo\n\
  \    INNER HASH JOIN Dimension.[Stock Item] AS si\n    ON fo.[Stock Item Key] =\
  \ si.[Stock Item Key]\n    WHERE fo.[Lineage Key] = 9\n    AND si.[Lead Time Days]\
  \ > 19\n    GO\n    ```\n\n\n\n该查询试图获取订单和库存项目数据。注意在 T-SQL 语法中使用了 `HASH JOIN` 来强制优化器使用哈希连接。这是一种简单的方法，用于在演示中将哈希连接引入行数被低估的查询中。我在这里包含了注释，但关键在于不要执行带有注释的此\
  \ T-SQL 代码段。我最初构建这些演示时就因此吃过亏。在匹配缓存计划以唯一标识查询时，注释是“算数的”。如果查询的下次执行没有相同的注释，这些查询将不会被重用。在\
  \ SSMS 中，执行查询前，请选择**包含实际执行计划**选项（可以使用 `Ctrl+M` 启用）。此文档页面描述了如何启用此功能，[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/display-an-actual-execution-plan)。\n\
  \n## 步骤 3：运行查询以获取订单和库存项目数据\n\n```sql\n-- DO NOT select the comments here to run\
  \ the query!\nSELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\nFROM \
  \ Fact.OrderHistory AS fo\nINNER HASH JOIN Dimension.[Stock Item] AS si\nON fo.[Stock\
  \ Item Key] = si.[Stock Item Key]\nWHERE fo.[Lineage Key] = 9\nAND si.[Lead Time\
  \ Days] > 19\nGO\n```\n\n此查询应至少需要 30 秒运行，并返回大约 66K 行（实际结果可能有所不同）。使用 SSMS 的选项查看执行计划，它应该类似于图\
  \ 2-2。\n\n### 分析执行计划\n\n利用此计划，有几个细节需要观察。在 SSMS 中，如果将鼠标悬停在 `Table Scan` 运算符上，它应该类似于图\
  \ 2-3。请注意，`估计行数`与扫描读取的实际行数相差甚远。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig3_HTML.jpg](img/479130_1_En_2_Fig3_HTML.jpg)\n\
  *图 2-3：`Fact.OrderHistory` 表扫描的估计值与实际值对比*\n\n在这种情况下，`Fact.OrderHistory` 表是哈希连接的*生成输入*。SQL\
  \ Server 将根据此生成输入为哈希连接请求内存授予。这是个问题，因为内存授予是基于仅估计为 1000 行的估算值。使用鼠标悬停在带有警告图标的 `Hash\
  \ Join` 上，注意如图 2-4 所见的关于溢出的警告。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig4_HTML.jpg](img/479130_1_En_2_Fig4_HTML.jpg)\n\
  *图 2-4：哈希连接 tempdb 溢出*\n\n注意警告中的数字。`52008` 个页面（每页 8K）大约是 426Mb 的数据 I/O 写入 `tempdb`\
  \ 文件。溢出非常糟糕，因为这不是放入与 `tempdb` 关联的缓冲池页面的数据。`Tempdb` 数据文件成为哈希连接内存授予的*页面文件*（这些不是用于临时表的\
  \ `tempdb` 页面）。这也是我经常称 `tempdb` 为 SQL Server 垃圾堆的另一个原因）。\n\n### 提示：哈希连接如何工作\n\n\
  想知道哈希连接如何工作吗？请阅读我们顶级查询处理团队工程师之一，独一无二的 Craig Freedman 的这篇经典博文：[`https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/`](https://blogs.msdn.microsoft.com/craigfr/2006/08/10/hash-join/)。\n\
  \n### 检查内存授予\n\n将鼠标移到查询计划左侧，悬停在 `SELECT` 运算符上。在此运算符中是有关查询计划内存授予数量的详细信息。图 2-5 显示为此查询的授予请求了大约\
  \ 1.4Mb 的内存。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig5_HTML.jpg](img/479130_1_En_2_Fig5_HTML.jpg)\n\
  *图 2-5：显示所请求内存授予的 `SELECT` 运算符*\n\n请求的 1.4Mb 内存授予远不足以容纳所需内容，根据溢出情况，大约需要 ~400Mb。\n\
  \nXML 执行计划中提供的另一个有趣信息位于计划的属性中。要查看此信息，请右键单击 `SELECT` 运算符并选择 `属性`。展开名为 `MemoryGrantInfo`\
  \ 的选项，它将类似于图 2-6。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig6_HTML.jpg](img/479130_1_En_2_Fig6_HTML.jpg)\n\
  *图 2-6：查询计划属性中的内存授予详细信息*\n\n关于内存授予反馈，最重要的属性是名为 **IsMemoryGrantFeedbackAdjusted**\
  \ 的字段。**NoFirstExecution** 的值意味着这只是查询的第一次执行，因此尚未收集反馈。您可以在我们的文档中查看可能的值列表：[`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#row-mode-memory-grant-feedback`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523row-mode-memory-grant-feedback)。\n\
  \n由于已启用内存授予反馈，如果执行缓存中相同的查询，SQL Server 将进行自适应调整并更改内存授予以适应低估情况。\n\n## 步骤 4：让我们再试一次\n\
  \n1.  转到脚本中的 **步骤 4**，再次运行相同的查询。**重要提示**：运行查询时请勿使用注释。在匹配计划缓存中的确切查询时，注释是算数的。请确保保持\
  \ SSMS 中的 `包含实际执行计划` 选项。\n\n```sql\n-- Step 4: Let's try this again\n-- DO NOT select\
  \ the comments here to run the query!\nSELECT fo.[Order Key], fo.Description, si.[Lead\
  \ Time Days]\nFROM  Fact.OrderHistory AS fo\nINNER HASH JOIN Dimension.[Stock Item]\
  \ AS si\nON fo.[Stock Item Key] = si.[Stock Item Key]\nWHERE fo.[Lineage Key] =\
  \ 9\nAND si.[Lead Time Days] > 19\nGO\n```\n\n这次查询应该在 3 秒或更短时间内运行完成，而不是 30 秒或更长时间。请记住，概念是计划不会改变，所以当您查看\
  \ `实际执行计划` 时，它应该看起来相同，只是 `Hash Match Join` 没有警告图标，也没有溢出警告。将鼠标悬停在 `SELECT` 运算符上，您将看到内存授予的显著差异，如图\
  \ 2-7 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig7_HTML.jpg](img/479130_1_En_2_Fig7_HTML.jpg)\n\
  *图 2-7：显示改进后内存授予的 `SELECT` 运算符。*\n\n您可以看到它实际上需要大约 ~625Mb 才能获得正确的内存授予来适应 `Hash Join`。\n\
  \n右键单击 `SELECT` 运算符并选择 `属性`。`内存授予反馈` 部分现在看起来像图 2-8。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig8_HTML.jpg](img/479130_1_En_2_Fig8_HTML.jpg)\n\
  *图 2-8：内存授予修正后的内存授予反馈属性*\n\n## 步骤 5：将表和聚集索引恢复到其原始状态\n\n我们需要确保通过运行 T-SQL 脚本中的 **步骤\
  \ 5** 来将统计信息恢复到其原始状态：\n\n```sql\n-- Step 5: Restore table and clustered index back\
  \ to its original state\nUPDATE STATISTICS Fact.OrderHistory\nWITH ROWCOUNT = 3702592;\n\
  GO\nALTER TABLE [Fact].[OrderHistory] DROP CONSTRAINT [PK_Fact_OrderHistory]\nGO\n\
  ALTER TABLE [Fact].[OrderHistory] ADD  CONSTRAINT [PK_Fact_OrderHistory] PRIMARY\
  \ KEY NONCLUSTERED\n(\n[Order Key] ASC,\n[Order Date Key] ASC\n)\nGO\n```\n\n\n\n\
  ## 过度内存授予\n\n让我们来看一个内存授予量远大于实际需要的例子。正如我之前提到的，如果内存授予非常大且并非实际所需，它可能是无害的——但也可能导致意外的内存压力或性能问题。\n\
  \n这个例子运行起来稍微复杂一些，需要模拟并发用户。因此，对于本例，你需要使用名为 `ostress` 的免费工具，可从 [`ostress 下载页面`](https://www.microsoft.com/en-us/download/details.aspx%253Fid%253D4511)\
  \ 下载。该工具目前需要在 Windows 客户端计算机上使用。\n\n要了解此问题如何导致意外的性能问题和 `RESOURCE_SEMAPHORE` 等待，请使用以下步骤。所有脚本均位于\
  \ `ch2_intelligent_performance\\iqp\\rowmodemgf` 目录中。我构建的所有命令行脚本都使用 `sa` 登录名。\n\n\
  1.  首先，我们需要通过运行脚本 `adjustrg.cmd`（该脚本会运行 T-SQL 脚本 `adjustrg.sql`）来调整资源调控器关于服务器最大授予内存量的设置。此脚本假设服务器名称为\
  \ `bwsql2019`，因此你需要根据你的服务器进行编辑。我进行此调整是为了在示例中允许 SQL Server 获取非常大的超额授予。\n\n    ```\n\
  \    ALTER WORKLOAD GROUP [default]\n    WITH (REQUEST_MAX_MEMORY_GRANT_PERCENT\
  \ = 50)\n    GO\n    ALTER RESOURCE GOVERNOR RECONFIGURE\n    GO\n    ```\n\n2.\
  \  现在执行脚本 `turn_off_mgf.cmd`（该脚本会执行 T-SQL 脚本 `turn_off_mgf.sql`）。\n\n    ```\n \
  \   -- 关闭内存授予反馈\n    USE [WideWorldImportersDW]\n    GO\n    -- 步骤 2: 模拟统计信息过期\n\
  \    UPDATE STATISTICS Fact.OrderHistory\n    WITH ROWCOUNT = 5000000000\n    GO\n\
  \    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n    ALTER\
  \ DATABASE SCOPED CONFIGURATION SET ROW_MODE_MEMORY_GRANT_FEEDBACK = OFF\n    GO\n\
  \    ALTER DATABASE SCOPED CONFIGURATION SET_BATCH_MODE_MEMORY_GRANT_FEEDBACK =\
  \ OFF\n    GO\n    ```\n\n在此示例脚本中，我将使用与之前低估授予示例类似的技术，但这次将统计信息更改为远大于表中实际行数的数字。\n\n\
  ## 注意\n\n多年来，我见过几个基数估计值看起来大于应有值的例子。其中一个例子是链接服务器查询，无法访问远程数据源的统计信息。在这些情况下，基数估计可能不准确且异常大。\n\
  \n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig9_HTML.jpg](img/479130_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9: 过度内存授予的属性\n\n1.  现在运行脚本 `rowmode_mgf.cmd`，该脚本将运行 T-SQL 脚本 `rowmode_mgf.sql`。\n\
  \n    ```\n    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]\n    FROM\
  \  Fact.OrderHistory AS fo\n    INNER JOIN Dimension.[Stock Item] AS si\n    ON\
  \ fo.[Stock Item Key] = si.[Stock Item Key]\n    WHERE fo.[Lineage Key] = 9\n  \
  \  AND si.[Lead Time Days] > 19\n    ORDER BY fo.[Order Key], fo.Description, si.[Lead\
  \ Time Days]\n    OPTION (MAXDOP 1)\n    GO\n    ```\n\n    此查询与之前的低估内存授予示例类似，但增加了\
  \ `ORDER BY` 子句以添加一个排序运算符。\n\n    该命令行脚本将使用 `ostress` 运行此 T-SQL 查询，并发用户数为十，每个用户重复十次。在此脚本运行时，使用另一个\
  \ SQL 会话运行脚本 `dm_exec_requests.sql` 来观察查询可能遇到的等待类型。你会注意到大量的 `RESOURCE_SEMAPHORE`\
  \ 等待。你可以在整个 `ostress` 脚本运行期间重复运行此脚本。这些等待解释了 `ostress` 脚本执行时间长的原因。\n\n    此 `ostress`\
  \ 脚本的总执行时间应超过 40 秒。脚本完成后，你的输出应如下所示：\n\n    ```\n     [0x000046CC] OSTRESS exiting\
  \ normally, elapsed time: 00:00:43.833\n     [0x000046CC] RsFx I/O completion thread\
  \ ended.\n    ```\n\n2.  使用 `rowmode_mgf.sql` 执行单个查询，并在 SQL Server Management Studio\
  \ 中查看查询计划的内存授予属性。使用与本章前面部分相同的技术来查看计划中 `SELECT` 操作符的属性。展开 `MemoryGrantInfo` 部分。结果应与图\
  \ 2-9 相似。\n\n以下是对关键属性的描述：\n\n`DesiredMemory` – 这是基于基数估计的理想内存授予量。这个数字大约在 ~56Gb 左右。这真是个疯狂的数量！\n\
  \n`GrantedMemory` – 我们不能让这个查询拥有 56Gb 内存，所以我们只授予它大约 5Gb。这仍然是一个相当大的授予内存量。\n\n`MaxUsedMemory`\
  \ – 这是查询期间实际用于授予的内存，你可以看到只有 3Mb。这无疑是一个过度内存授予（与实际所需相比）的例子。\n\n1.  现在，通过执行命令脚本 `turn_on_mgf.cmd`（该脚本会运行\
  \ T-SQL 脚本 `turn_on_mgf.sql`）来打开内存授予反馈。\n\n2.  让我们再次运行工作负载，执行 `rowmode_mgf.cmd`。执行时间应缩短一半（通常在\
  \ 20 秒左右）。如果在 `ostress` 脚本运行时运行 `dm_exec_requests.sql`，你会看到短暂的 `RESOURCE_SEMAPHORE`\
  \ 等待峰值，然后它就会消失，因为内存授予反馈已生效，并减少了内存授予的大小，使其更符合查询的实际需要。\n\n### 提示\n\n尝试第二次运行 `rowmode_mgf.cmd`。它是否更快？实际上现在可能会运行得稍快一些。这是因为当你第一次运行\
  \ `rowmode_mgf.cmd` 时，查询的最初执行非常快，缓存的计划尚未用新的授予进行更新。但随着后续执行的进行，它们使用了新的授予。当你第二次运行 `rowmode_mgf.cmd`\
  \ 时，所有查询都在使用新的内存授予。\n\n1.  如果你查看 `rowmode_mgf.sql` 的内存授予中 `SELECT` 操作符的属性，你会看到内存授予数字更接近查询应该使用的数值。\n\
  \n2.  通过运行脚本 `adjustrgback.cmd` 和 `restore_orderhistory_state.cmd` 来恢复数据库状态、表统计信息和资源调控器设置。\n\
  \n## 注意\n\n即使有反馈系统，在某些情况下，实际需要的内存授予量也可能非常大。大到并发用户将遇到 `RESOURCE_SEMAPHORE` 等待，导致\
  \ SQL Server 内部出现内存压力。在这些情况下，你可以使用资源调控器来限制授予的内存量。有关如何更改此设置，请参阅文档 [`CREATE WORKLOAD\
  \ GROUP`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-workload-group-transact-sql)。在\
  \ SQL Server 2019 中，此值现在可以是浮点数，因此小于 1% 的值是有效的。这对于具有大量内存的系统可能很重要。此外，你可以在查询级别设置这些值。请参阅文档\
  \ [`查询提示 (Transact-SQL) 参数`](https://docs.microsoft.com/en-us/sql/t-sql/queries/hints-transact-sql-query%2523arguments)。\n\
  \n这个系统设计得很好，确实可以为你节省对需要内存授予的工作负载进行昂贵调优的时间。\n\n有几种情况不会启用或不会生效内存授予反馈：\n\n*   未检测到溢出，或使用了\
  \ 50% 的授予内存。\n*   存在波动，其中内存授予被持续减少和增加。\n\n\n\n### 表变量延迟编译\n\n当你在微软工作了 26 年，你会遇到很多人。我遇到的很多人中，有比我更聪明的，坦率地说，也比我更友善。Jack\
  \ Li 就是其中之一。Jack 曾在德克萨斯州欧文市的办公室与我一起在 CSS 技术支持部门共事多年。几年前，在我加入之后，Jack 有机会进入 SQL 工程团队工作。有一天，他一如既往地谦逊地问我是否应该接受这份工作。我毫不犹豫。我告诉他，他具备成为顶尖开发人员的所有技能，并且在\
  \ SQL Server 性能方面拥有独特的技能。尽管 CSS 失去了他们最优秀的员工之一，但我们的工程团队因此获益。\n\nJack 在新工作中接手的第一个项目就是解决表变量的著名问题——**基数估计**。自从表变量存在以来，就一直存在一个固有问题：无论向表变量中填充了多少行，SQL\
  \ Server 优化器的基数估计始终是 1 行。诚实地讲，优化器不知道表变量中实际有多少行，因为表变量是在批处理或存储过程中定义和填充的。事实上，当 Jack\
  \ 还在支持部门时，他写过一篇关于此问题和跟踪标志解决方案的博客：[`https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/`](https://blogs.msdn.microsoft.com/psssql/2014/08/11/having-performance-issues-with-table-variables-sql-server-2012-sp2-can-help/)。\n\
  \n这意味着，当 Jack 加入团队时，他非常了解这个问题。查询处理器团队的领导有一个想法，希望将其作为智能查询处理的一部分在 SQL Server 2019\
  \ 中实现，即*表变量延迟编译*。他们找到 Jack 来构建它。\n\n正如 SQL Server 文档在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/intelligent-query-processing%253F%2523table-variable-deferred-compilation)\
  \ 中恰当描述的那样：“表变量延迟编译将引用表变量的语句的编译推迟到该语句第一次实际运行时。这种延迟编译行为与临时表相同。此更改导致使用实际基数，而不是原始的\
  \ 1 行猜测值。”\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql?#table-variable-deferred-compilation`](https://docs.microsoft.com/en-us/sql/t-sql/data-types/table-transact-sql%253F%2523table-variable-deferred-compilation)\
  \ 阅读有关如何启用和禁用表变量延迟编译的示例，包括数据库选项和查询提示。\n\n本节所有的示例脚本可以在 `ch2_intelligent_performance\\\
  iqp\\tablevariable` 找到。\n\n让我们通过一个 T-SQL 笔记本（注意：你也可以从文件 `iqp_tablevariable.sql`\
  \ 查看此功能的 T-SQL 脚本）来逐步了解这个概念。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig11_HTML.jpg](img/479130_1_En_2_Fig11_HTML.jpg)\n\
  *图 2-11 表变量使用的查询计划*\n\n1.  使用 Azure Data Studio 打开名为 `iqp_tablevariable.ipynb` 的\
  \ T-SQL 笔记本。\n2.  按照笔记本中的每个步骤，比较使用和不使用延迟编译时表变量的性能。\n3.  要比较这两种场景的查询计划，我们可以使用一个称为**查询存储**的功能，它在\
  \ SQL Server 2016 中引入。你可能没有意识到，但当你还原 WideWorldImportersDW 备份时，该数据库已经启用了查询存储。\n4.\
  \  以下是使用查询存储比较两个查询的方法：一个使用表变量延迟编译，一个不使用。\n5.  打开 SSMS，连接到你运行笔记本示例的 SQL Server，并找到“资源消耗最高的查询”报告，如图\
  \ 2-10 所示。\n\n![../images/479130_1_En_2_Chapter/479130_1_En_2_Fig10_HTML.jpg](img/479130_1_En_2_Fig10_HTML.jpg)\n\
