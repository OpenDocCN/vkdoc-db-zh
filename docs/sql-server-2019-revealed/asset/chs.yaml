  \ SQL 2016 R Services 的架构，但它同样适用于包含 Python 的架构。包含 Python 的更新幻灯片可以在 [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms)\
  \ 找到。请在 SQL2017 文件夹中搜索名为 `Inside SQL Server Machine Learning Services` 的演示文稿。\n\n\
  ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig7_HTML.jpg](img/479130_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\n## 深入探究 SQL Server ML Services\n\n以下是我更深入探究的架构版本（图 5-7）。\n\n1.  用户执行\
  \ `sp_execute_external_script`，指定一种语言（R 或 Python）、一个脚本以及其他参数（例如要执行的 T-SQL 查询）。SQL\
  \ Server 通过命名管道与一个名为 Launchpad（Windows 中的服务或 Linux 中的守护进程）的独立程序通信，传入所有相关细节（如 R 或\
  \ Python 脚本）。\n\n2.  Launchpad 拥有执行与 R 或 Python 语言对应的 DLL 的代码。Launchpad 使用与 SQL\
  \ Server 引擎类似的工作线程模型。实际上，它加载了 SQL Server 用于操作系统服务的 SQLOS 系统。\n\n3.  Launchpad DLL\
  \ 将为对应的语言（R 为 `rterm.exe`，Python 为 `python.exe`）派生或创建一个新进程。\n\n4.  另一个名为 `bxlserver.exe`（通常被称为*卫星*进程）的进程被派生出来。这个程序将与\
  \ `rterm.exe` 或 `python.exe` 交互以交换数据。\n\n5.  `bxlserver.exe` 通过一个私有 TCP 通道（与作为客户端连接到\
  \ SQL Server 的连接不同）与 SQL Server 引擎通信，接收来自已执行 T-SQL 查询的数据，以提供给 R 或 Python 程序。此执行以*交织*的方式进行。这意味着引擎可以获取\
  \ T-SQL 查询的行来提供给机器学习程序，同时也可以获取返回的结果。支持此交换的 DLL 称为 `sqlsatellite.dll`。\n\n6.  `sqlsatellite.dll`\
  \ 与 `bxlserver.exe` 中的一个模块协作，与 `rterm.exe` 或 `python.exe` 交换数据。\n\n7.  来自 `rterm.exe`\
  \ 或 `python.exe` 程序的所有结果（包括标准输出消息）都通过 TCP 通道流回 SQL Server。\n\n这样做的结果是，用户执行 `sp_execute_external_script`\
  \ 并会收到以表形式（类似于 SELECT 结果集）以及标准输出消息返回的结果。还有一些用于输出参数等的选项。\n\n更好解决方案的关键概念是，R 或 Python\
  \ 代码在与 SQL Server 相同的计算机上运行（靠近数据），并且 SQL Server 可以以高效的方式与代码交换数据（没有网络流量用于交换数据）。\n\
  \n理解 T-SQL 查询（即“输入查询”）与 R 或 Python 程序如何交互的最好方法是尝试一个示例。与其在这里介绍一个例子，我强烈建议你使用 [`https://aka.ms/sqldev`](https://aka.ms/sqldev)\
  \ 处的示例，或者直接使用 Python 的示例：[`https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/`](https://microsoft.github.io/sql-ml-tutorials/python/rentalprediction/)。我推荐你使用此示例的一个原因是，它还包括了如何通过\
  \ T-SQL 使用**原生评分**的示例（[`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)）。\n\
  \n我的同事 Buck Woody 还有一个很好的研讨会，可以尝试所有这些并查看实际效果：[`https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices`](https://github.com/Microsoft/sqlworkshops/tree/master/SQLServerMLServices)。这个研讨会的好处是，你将在此过程中学到一些数据科学知识（对于我们这些不像\
  \ Buck 那样，只是数据科学领域普通凡人的人来说）。\n\n\n\n### 安全、隔离与治理\n\nJoseph Sirosh 最早交办给我的任务之一，是提升广大\
  \ SQL 社区对 SQL Server R 服务的信心。他曾与几家使用 SQL Server 的大公司讨论过此功能，而这些公司的数据专业人员对在 SQL Server\
  \ 中运行 R 脚本持谨慎态度。\n\n我首先做的几件事之一，便是如前文所述，并在演示文稿 [`www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know`](https://www.slideshare.net/BobWard28/sql-server-r-services-what-every-sql-professional-should-know)\
  \ 中描述的那样，阐释其架构。该架构有助于解释 SQL Server ML 服务的*隔离*模型。所有 R 和 Python 脚本都在与 `SQLSERVR.EXE`\
  \ 分离的独立进程中运行，因此这些脚本的任何问题都不会导致数据库引擎出现问题。这与 SQL Server 的其他“扩展”模型（如扩展存储过程和 SQLCLR）形成对比，后者均在\
  \ `SQLSERVR.EXE` 的“进程内”运行。此外，辅助进程彼此隔离运行，因此无法干扰每个用户的 R 或 Python 处理。除了这些作为独立进程运行之外，任何从\
  \ `Launchpad` 创建的进程都在使用 Windows 中的 `AppContainer` 概念（[`https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation`](https://docs.microsoft.com/en-us/windows/win32/secauthz/appcontainer-isolation)）和\
  \ Linux 中的 `namespace` 概念（[`https://en.wikipedia.org/wiki/Linux_namespaces`](https://en.wikipedia.org/wiki/Linux_namespaces)）的隔离模型中运行。\n\
  \n#### 安全\n\n我需要解释的第二个概念是安全。考虑 SQL Server ML 服务执行 R 或 Python 的安全模型：\n\n*   此功能仅在先安装然后通过\
  \ `sp_configure` 配置后才启用。您可以阅读关于如何在 Windows 上安装 SQL Server ML 服务的文档 [`https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/en-us/sql/advanced-analytics/install/sql-machine-learning-services-windows-install)，以及在\
  \ Linux 上的文档 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning)。关于\
  \ `sp_configure` 选项的说明，请参阅 [`https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option`](https://docs.microsoft.com/en-us/sql/database-engine/configure-windows/external-scripts-enabled-server-configuration-option)。\n\
  *   T-SQL 系统存储过程 `sp_execute_external_script` 要求具有 `EXECUTE ANY EXTERNAL SCRIPT`\
  \ 数据库权限。此权限默认仅授予具有 `CONTROL` 权限的用户或角色，或具有 `CONTROL SERVER` 权限的登录名或角色。任何其他尝试执行 R\
  \ 或 Python 脚本的用户或登录名都必须被明确授予权限。\n*   用户还需要权限来访问在 `sp_execute_external_script` 的“输入查询”中引用的对象。\n\
  *   用于执行 R 和 Python 的进程（`rterm.exe` 和 `python.exe`）都在特定的低权限帐户下运行。对于 Windows，您可以在\
  \ [`https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup`](https://docs.microsoft.com/en-us/sql/advanced-analytics/security/create-a-login-for-sqlrusergroup)\
  \ 了解更多。对于 Linux，这些程序在 `mssql_satellite` 帐户下运行。\n*   默认情况下，辅助进程无法连接到运行 SQL Server\
  \ 的计算机之外的网络。\n\n#### 治理\n\n为了增强对 R 和 Python 执行的控制，从而提供更多信心，第三个概念是*治理*。自 SQL Server\
  \ 2008 以来，SQL Server 就具有治理的概念，其功能称为 `Resource Governor`。资源治理器提供了一种机制，用于控制 SQL Server\
  \ 执行的 CPU、内存和 I/O 资源。因此，资源治理器是控制 ML 服务程序资源使用的天然接口。\n\nSQL Server 新增了外部资源池的概念，以明确控制通过\
  \ `sp_execute_external_script` 创建的进程（包括 `rterm.exe`、`python.exe`、`bxlserver.exe`\
  \ 等）的资源使用。在 Windows 中，外部资源组是通过称为 Windows *Jobs* 或 Job Objects 的概念实现的。您可以在 [`https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects`](https://docs.microsoft.com/en-us/windows/win32/procthread/job-objects)\
  \ 了解更多关于 Windows Job Objects 的信息。对于 Linux，则使用控制组（`cgroups`）的概念来控制资源使用。关于 `cgroups`\
  \ 的更多信息，请参阅 [`https://en.wikipedia.org/wiki/Cgroups`](https://en.wikipedia.org/wiki/Cgroups)。\n\
  \n外部资源组不仅可以帮助您控制外部进程的 CPU 和内存，还可以指定 CPU 亲和性。这样，您可以将辅助进程绑定到特定节点或一组 CPU，同时将 SQL Server\
  \ 处理绑定到其他 CPU 或节点。这正是实现如今著名的每秒 100 万次预测证明点所使用的架构，您可以在 [`https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/`](https://cloudblogs.microsoft.com/sqlserver/2016/10/11/1000000-predictions-per-second/)\
  \ 阅读相关内容。\n\n### SQL Server 2019 的新特性？\n\nSQL Server 机器学习服务是*革命性的*，它帮助 SQL Server\
  \ 从数据库引擎转变为真正的数据平台。SQL Server 2019 通过以下新特性增强了 SQL Server ML 服务：\n\n*   现在可以使用 T-SQL\
  \ 语句 `CREATE EXTERNAL LIBRARY` 为新的 R 或 Python 包安装外部库。您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-library-transact-sql)\
  \ 了解更多（SQL Server 2017 仅允许对 R 进行此操作）。\n*   `Launchpad` 服务（或在 Linux 上是守护进程）对于 SQL\
  \ Server ML 服务架构至关重要。现在在 SQL Server 2019 中，SQL Server ML 服务（包括 `Launchpad` 服务）可以成为\
  \ Always On 故障转移群集实例的一部分。\n*   SQL Server 机器学习服务现在在 Linux 上得到支持。我将在第 6 章进一步讨论这一点。\n\
  *   SQL Server ML 服务现在支持使用 `sp_execute_external_script` 的新参数，在分区数据上创建和训练模型。要了解此新功能的示例，请阅读\
  \ [`https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition`](https://docs.microsoft.com/en-us/sql/advanced-analytics/tutorials/r-tutorial-create-models-per-partition)。\n\
  \n我认为 SQL Server 机器学习服务是一个“变革者”。我询问了我的同事 Buck Woody（微软应用数据科学家）对 SQL Server 与机器学习集成重要性的看法。根据\
  \ Buck 的说法，“在 SQL Server 上运行预测性和分类性机器学习工作负载，不仅可以通过将计算直接置于数据之上来获得性能优势，而且在安全性方面也具有优势。SQL\
  \ Server 保持了业界最高级别的安全性之一，通过添加 R 和 Python 等传统机器学习语言以及各种库，可以透明地利用这种安全性。使用 SQL Server\
  \ 作为机器学习平台还有另一个优势——它为数据科学家提供了一个实验和使工作负载可操作化的场所，并让数据库开发人员能够通过 Transact-SQL 控制 R 和\
  \ Python 机器学习代码的实现，从而实现有效的职责分离。”\n\n\n\n## 扩展 T-SQL 语言\n\n2018 年夏末，我在华盛顿州雷德蒙德的微软公司总部，准备制作一份演示文稿，以协助在\
  \ Microsoft Ignite 大会上正式发布 SQL Server 2019 的预览版。为此，我采访了多位项目经理以确保内容准确，并与他们讨论演示的构建。\n\
  \n其中一位项目经理是内莉·古斯塔夫森。内莉是 SQL Server 机器学习服务的首席项目经理之一。当时，我一直在与内莉讨论团队为 SQL Server 2019\
  \ 的 ML 服务还考虑支持哪些其他语言。在我们的会议中，她告诉我 `Java` 将是下一个语言，这让我感到意外。她进一步说明：团队希望通过一个 SDK（软件开发包）来开放\
  \ ML 服务的架构。这样，任何具备足够技术知识的人都可以*自带语言*，使用与 SQL Server ML 服务中运行 R 和 Python 相同的架构来扩展\
  \ T-SQL。\n\n然而，在发布 SQL Server 2019 的 CTP 2.0 时，我们决定暂缓推出 SDK，仅将 Java 作为 SQL Server\
  \ ML 服务的第三种语言发布。Java 并非机器学习领域的常用语言，因此我们发布此功能时，附带的示例主要演示了如何为 T-SQL 扩展语言本身未内置的功能（公平地说，我们当时也使用\
  \ Java 来演示大数据集群上的机器学习）。\n\n其概念与 SQL Server ML 服务相同。你将使用相同的 `sp_execute_external_script`\
  \ 系统存储过程，但指定 “Java” 作为语言并提供一个编译好的 Java 类。尽管这还不是完整的可扩展开放架构，但将 Java 与 SQL Server 2019\
  \ 集成，已经让许多人对微软更激进的工作方向有所领悟。\n\n### 可扩展框架\n\n到我们发布 SQL Server 2019 时，我们已决定*开放* ML\
  \ 服务的架构。我们称之为*可扩展框架*。访问可扩展框架的方式是通过一种称为*语言扩展*的机制。Java 将仅仅是使用这个新框架的一个*示例*，我们会将该语言扩展随产品一起提供。\n\
  \n为了使可扩展框架可行，我们必须对现有的 SQL Server ML 服务架构进行补充，包括：\n\n*   我们需要保持 R 和 Python “原样”，因此这些语言被视为“内置”于\
  \ SQL Server。R 和 Python 不被视为语言扩展，它们只是作为 SQL Server ML 服务的一部分。\n*   启动板服务中用于 R 和\
  \ Python 的“启动器”专门用于启动 `rterm.exe` 和 `python.exe`。`bxlserver.exe` 的设计初衷也是专门与 R 和\
  \ Python 配合工作。我们在启动板服务器内构建了一个“通用”启动器，用于启动任何语言（你将看到这与 `CREATE EXTERNAL LANGUAGE`\
  \ 概念相关联）。\n*   我们需要一个新的“宿主”程序来运行其他语言。因此，我们提供了一个名为 `扩展宿主` 的宿主程序。在 Windows 上，此程序称为\
  \ `exthost.exe`。\n*   `扩展宿主` 必须包含 `sqlsatellite.dll`（在 Linux 上为 `sqlsatellite.so`），并为语言扩展提供一种与之交互以与\
  \ SQL Server 交换数据的方式。\n\n图 5-8 展示了 Windows 上此架构的粗略示意图（Linux 架构图也包含在内），来源于 [`https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework`](https://docs.microsoft.com/en-us/sql/language-extensions/concepts/extensibility-framework)。\n\
  \n![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig8_HTML.jpg](img/479130_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8：Windows 上外部语言的可扩展架构\n\n现在，借助 SQL Server 2019 中的这些增强功能，你可以：\n\n*   使用 `sp_execute_external_script`\
  \ 来运行用于机器学习程序的 R 或 Python 脚本。\n*   通过安装语言扩展，使用 `sp_execute_external_script` 用 Java\
  \ 等其他语言扩展 T-SQL。在 SQL Server 2019 中，我们提供了所有使用 Java 扩展 T-SQL 所需的软件。\n\n需要明确的是，语言扩展（在\
  \ Windows 上是 DLL，在 Linux 上是共享对象库 `.so`，通常用 C++ 编写）是支持语言扩展的关键软件。微软在你安装 SQL Server\
  \ 时提供了 Java 的语言扩展。由于该语言扩展是为 Java 构建的，它将加载一个 Java 虚拟机（`JVM`）来运行你的 Java 类。如何让 `JVM`\
  \ 来运行这些类呢？你将在下一节中了解。\n\n此外，你还需要一个与你的语言原生的 SDK 库。正如你将在下一节读到的，微软为 Java 提供了一个 SDK 库。该\
  \ SDK 将实现一组已知的类和方法，以便你的类可以被执行，并且你可以与 SQL Server 交换数据。\n\n### 用 Java 扩展 T-SQL\n\n\
  你可能要问的一个问题是：扩展 T-SQL 语言的实例是什么？使用 R 和 Python 进行机器学习是有道理的，因为 T-SQL 没有内置的机器学习函数或能力。那么，为什么你可能需要\
  \ Java 呢？你听说过正则表达式或 regex 这个术语吗（[`https://en.wikipedia.org/wiki/Regular_expression`](https://en.wikipedia.org/wiki/Regular_expression)）？正则表达式完全基于表达式在字符串或字符数据中搜索模式。一个正则表达式可以非常强大——比\
  \ `LIKE` 子句和其他 T-SQL 字符串函数强大得多。\n\n由于 T-SQL 中没有内置完整的正则表达式功能，你可以构建一个支持正则表达式的 Java\
  \ 类，并使用可扩展框架和 SQL Server 2019 附带的 Java 扩展将其集成到 T-SQL 中。因为该框架允许语言扩展以一种独特的方式与 SQL\
  \ Server 交换数据，所以你可以结合 `sp_execute_external_script` 使用一个 Java 类，基于 T-SQL 查询对数据应用正则表达式。\n\
  \n实际上，这就是文档中提供的教程所演示的内容，详见 [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java)。\n\
  \n我不提供逐步示例，而是鼓励你亲自完成这个教程。我在 Windows 上完成了这个教程，它在 Linux 上同样运行良好。我有一些提示以及一些我用来完成它的脚本。\n\
  \n本教程将向你展示：\n\n*   创建一个数据库和示例数据。\n*   创建一个 Java 类来实现正则表达式引擎。\n*   构建你的代码，以便可以使用\
  \ SQL Server Java SDK 将其安装到 SQL Server。\n*   创建一个外部语言和库以启用 Java 并安装你的代码。该外部语言将映射到语言扩展\
  \ DLL 或 `.so` 文件。外部库将是 SQL Server Java SDK 和你的代码。\n*   使用 `sp_execute_external_script`\
  \ 调用你的 Java 类。\n\n从技术上讲，你可以在与 SQL Server 不同的计算机上构建你的代码。但如果这样做，你将需要 SQL Server Java\
  \ SDK，它被称为 `mssql-java-lang-extension.jar`（适用于 Windows 和 Linux）。获取该 SDK 的一种方法是安装带有\
  \ Java 可扩展功能的 SQL Server。因此，我建议你在安装 SQL Server 的同一台计算机上运行此教程。你也可以在例如你的笔记本电脑上，使用\
  \ SQL Server 开发者版进行构建，然后将代码的最终结果（将是一个 `.jar` 文件）安装到生产 SQL Server 上。\n\n\n\n## 注意\n\
  \n在撰写本书时，我们已在 GitHub 上发布了一个关于语言扩展的仓库 [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)，其中包括\
  \ SQL Server Java SDK。但 `mssql-java-lang-extension.jar` 文件当时尚未提供。计划是使该 SDK 在 GitHub\
  \ 上可用，以便您可以构建自己的 Java 类，而无需依赖 SQL Server 安装。\n\n#### 教程前提条件\n\n使用该教程所需的前提条件在文档 [`https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java#prerequisites`](https://docs.microsoft.com/en-us/sql/language-extensions/tutorials/search-for-string-using-regular-expressions-in-java%2523prerequisites)\
  \ 中已指明。\n\n前提条件之一是安装 Java 运行时引擎（JRE）。这里有个更劲爆的消息。在 SQL Server 2019 中，我们附带了来自 Zulu\
  \ Open JRE 的 JRE。没错，`SQL Server 2019 免费附带了 Java`！\n\n以下是在 Windows 上选择 JRE 的安装界面外观（图\
  \ 5-9）。\n\n![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig9_HTML.jpg](img/479130_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9：为 SQL Server 选择 JRE\n\n#### 关于 JRE 和安装的注意事项\n\n尽管 Zulu Open JRE 是免费的并随 SQL\
  \ Server 一起提供，但它得到了 Microsoft 的完全支持。您也可以选择安装自己的 JRE。如果安装自己的 JRE，则需要一些额外的配置步骤，安装文档中对此有说明。\n\
  \n别忘了在 Windows 上正确设置 `JRE_HOME` 环境变量，并在安装 SQL Server 后重新启动 Launchpad 服务。您可以阅读 [`https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows#add-the-jre_home-variable`](https://docs.microsoft.com/en-us/sql/language-extensions/install/install-sql-server-language-extensions-on-windows%2523add-the-jre_home-variable)\
  \ 了解更多。（对于 Linux，则是 `JAVA_HOME`，但安装过程应该已为您添加了此变量。）请注意，教程中提到了一个示例路径 `C:\\Program\
  \ Files\\Zulu\\zulu-8\\jre\\`，但实际上 SQL Server 将 Azul Open JRE 安装在 `C:\\Program Files\\\
  Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\AZUL-OpenJDK-JRE`。\n\n作为安装过程的一部分，Microsoft\
  \ 还将安装 Java 语言扩展文件。对于 Windows，它名为 `javaextension.dll`，并打包在名为 `java-lang-extension.zip`\
  \ 的文件中。在 Linux 上，它名为 `javaextension.so`，并打包在名为 `java-lang-extension.tar.gz` 的文件中。教程会向您展示这些文件的位置，因为您需要此路径来创建外部语言。\n\
  \n现在，您可以按照教程创建数据库和数据，构建您的 Java 类，安装外部语言，安装您的代码，然后调用您的 Java 类。\n\n#### 教程使用提示\n\n\
  以下是一些使用教程的提示。我在 `ch5_modern_development_platform\\java` 目录中提供了一套我使用的示例脚本。\n\n* \
  \  **选择 JDK 来编译您的代码**\n\n    教程向您展示了用于正则表达式类的示例代码以及包含 SQL Server Java SDK 的说明。遗憾的是，教程没有提供很多关于如何在\
  \ Java 中构建某些东西的细节。我安装了 Zulu Open JDK 来获取我的 Java 编译器 `javac`，以配合本教程使用，下载地址是 [`www.azul.com/downloads/zulu-community`](https://www.azul.com/downloads/zulu-community)。由于我使用的是\
  \ Windows，所以我选择了如图 5-10 所示的这些选项。\n\n    ![../images/479130_1_En_5_Chapter/479130_1_En_5_Fig10_HTML.jpg](img/479130_1_En_5_Fig10_HTML.jpg)\n\
  \n    图 5-10：在 Windows 上安装 Zulu JDK\n\n    您的计算机上可能已经有一个 Java SDK。您可能正在使用 Visual\
  \ Studio Code、IntelliJ 或 Eclipse，这些是较为流行的一些 IDE。我只是想要一种从命令行编译 Java 代码的简单方法，因此我选择了\
  \ Zulu JDK。\n\n    Zulu JDK 以 zip 文件形式提供，我将其下载到了我的“下载”文件夹。然后，我将 zip 文件解压到当前目录。我希望\
  \ `javac` 和 `jar` 程序位于我的路径中，因此我直接在当前位置解压了 zip 文件，并将此目录 `C:\\Users\\Administrator\\\
  Downloads\\zulu11.33.15-ca-jdk11.0.4-win_x64\\zulu11.33.15-ca-jdk11.0.4-win_x64\\\
  bin` 添加到了系统路径中。\n\n*   **构建您的代码**\n\n    我建议按照教程中的说明为您的代码构建一个 `.jar` 文件，但使用包的概念。使用此方法将假设您的类位于\
  \ `pkg` 子目录中。我提供了一个我使用的 `buildclass.cmd` 脚本，它完成所有工作。它将编译 `RegexSample.java` 代码以及\
  \ SQL Server Java SDK 文件 `mssql-java-lang-extension.jar`。然后它使用 `jar` 程序从 `pkg` 子目录中的代码构建一个包。（教程示例使用了一个包，当您构建\
  \ `.jar` 文件时，这将假设一个 `pkg` 子目录。）整个构建过程的结果是生成一个 `sqlregex.jar` 文件。这就是您的类代码，并将作为 `外部库`\
  \ 安装。\n\n*   **安装您的代码**\n\n    T-SQL 脚本 `setuplanguage.sql` 在 Windows 上用于为 Java\
  \ 创建外部语言，并创建两个外部库：(1) 用于 SQL Server Java SDK 和 (2) 您的代码。\n\n    重要的是要注意，外部语言和库是安装在用户数据库中的。\n\
  \n*   **执行您的代码**\n\n    T-SQL 脚本 `sqlregex.sql` 展示了一个类似教程中的示例，用于执行您的 Java 类。\n\n\
  \    我坦诚地告诉您，如果您在此处遗漏了一个步骤，包括所有前提条件，您在执行 `sp_execute_external_script` 时将会遇到错误。调试此功能的问题可能会令人沮丧。\n\
  \n    请记住以下几点：\n\n    *   您必须使用配置选项 `external scripts enabled` 来启用外部脚本执行。\n    *\
  \   如果您在安装时选择了 Zulu Open JRE，请确保在 Windows 上设置 `JRE_HOME` 并重新启动 Launchpad 服务。\n \
  \   *   如果您使用自己的 JRE，您需要执行额外的步骤来获取对 JRE 二进制文件的权限。文档说明了如何在 Windows 和 Linux 上执行此操作。\n\
  \    *   当您为代码构建 `.jar` 文件时，必须将编译后的代码（`.class` 文件）放在您构建代码的子目录中，该目录名为 `pkg`。这是使用包名称的约定（包名称可以是您代码中的任何名称，然后您的子目录需要与该名称匹配）。文档谈到了使用\
  \ Java IDE 来完成这一切要容易得多；我确实尝试过 IntelliJ 和 Visual Studio Code；我只是更喜欢使用 `javac` 和 `jar`\
  \ 从命令行进行可编写脚本的方法。\n\n\n### 实现和使用其他语言\n\n由于我们构建了扩展框架和外部语言的概念，现在除了 Java 之外的编程语言也可以与`T-SQL`一起使用。Java\
  \ 只是我们提供给你的一个“开箱即用”的扩展示例，同时也展示了如何集成其他编程语言。想象一下，如果`.Net`或`Go`也能有外部语言可用会怎样。\n\n关键在于语言扩展。语言扩展是一个`DLL`文件（在`Windows`上）或一个共享库对象（在`Linux`上），它理解如何与`扩展主机`通信。一旦有了可用的语言扩展，就可以用该扩展的原生语言构建一套`SDK`类。你的代码将使用`SDK`实现的类，以及通过调用`sp_execute_external_script`来执行的类。\n\
  \n通过 Java 示例[`https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server`](https://docs.microsoft.com/en-us/sql/language-extensions/how-to/extensibility-sdk-java-sql-server)展示了为使语言扩展可用所需的`SDK`类集。\n\
  \n此外，正如我在上一节中描述的，关于如何编写语言扩展的源代码和文档将在`GitHub`上提供，网址是 [`https://github.com/microsoft/sql-server-language-extensions`](https://github.com/microsoft/sql-server-language-extensions)。\n\
  \n观察语言扩展在`SQL Server`社区内如何发展将会很有趣。对你而言，可以想象一下那些目前无法用`T-SQL`实现，但希望通过扩展语言并利用`SQL Server`所有功能（包括安全性、可用性和资源治理），而无需在`T-SQL`之外编写代码的场景。\n\
  \n适用于`SQL Server ML Services`的所有进程隔离、安全性和治理能力都同样适用于语言扩展和扩展框架。\n\n## 总结\n\n在本章中，你已经了解到`SQL\
  \ Server 2019`如何为现代数据开发人员提供特性和工具，包括支持几乎所有你需要的编程语言、更新的数据提供程序、图形数据库、`UTF-8`支持、`机器学习`和`T-SQL`扩展。这些与已有的强大功能，如`智能查询处理`和`tempdb`元数据优化相结合，为任何现代数据开发人员提供了所需的完整工具包。\n\
  \n"
- "# 6. SQL Server 2019 on Linux\n\n在本章中，我将介绍`SQL Server 2019`在`Linux`上的新特性。然而，如果你是`SQL\
  \ Server` on `Linux`的新手，我将先回顾一下我们为何以及如何将`SQL Server`构建到`Linux`上运行这一非凡故事，以此作为本章的开始。\n\
  \n## SQL Server on Linux 的非凡故事\n\n2017 年 10 月，我们的`SQL Server`工程团队通过在`Red Hat`、`Ubuntu`和`SUSE`等平台上发布`Linux`版的`SQL\
  \ Server`，震撼了业界。我们的工程团队能够采用一种非常创新的策略和架构，利用一种名为`SQL 平台抽象层` (`SQLPAL`)的软件，将`SQL Server`推向市场。\n\
  \n图 6-1 展示了基于`SQLPAL`的`SQL Server` on `Linux`的基础架构。\n\n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig1_HTML.jpg](img/479130_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n`SQL Server` `Linux` 架构\n\n我在`Apress Media`出版的`Pro SQL Server on Linux`一书中对此架构进行了非常深入的探讨，因此我不会在本书中重复（我知道；这是对另一本书的无耻推销）。然而，我包含此图并进行简要讨论，是因为它讲述了`兼容性带来的选择`这一故事。`SQL\
  \ Server`核心引擎及其代码在`Windows`和`Linux`上是相同的代码库。`SQLPAL`提供了软件，使得`SQL Server`引擎不关心它运行在哪个`OS`平台上。这意味着你可以在`Windows`的`SQL\
  \ Server`上获取数据库备份，然后完全兼容地在`Linux`上还原它。\n\n在很大程度上，`SQL Server 2017`在`Linux`上的功能集与`Windows`上的完全相同。Slava\
  \ Oks 曾告诉我，“Bob，`查询处理器`就是…`查询处理器`，无论是在`Windows`还是`Linux`上。”他的意思是，`查询处理器`的相同二进制代码在`Windows`和`Linux`上都能运行。甚至像`SQL\
  \ Server Agent`和`SSIS`这样的功能在`Linux`版的`SQL Server`中也是可用的。\n\n我们为`SQL Server`的几乎每个版本都设置了“时间盒”，试图在我们需要它上市的时间框架内，最大化放入一个主要版本中的价值，并取得平衡。\n\
  \n虽然我们本希望将`Windows`版`SQL Server`的所有功能都包含在`Linux`版的`SQL Server 2017`中，但有一些“引擎边缘”的功能我们没有时间放入该版本中——比如`复制`和`分布式事务协调器`(`DTC`)。此外，我们还进行了一些平台增强，以确保`Linux`上的`SQL\
  \ Server`与`Windows`上的软件一样稳健，为企业客户做好准备。\n\n在我深入探讨这个主题之前，我应该坦诚地告诉你，本章没有示例。你可能会读到这里并感到震惊，毕竟我写了一整本关于`Linux`上的`SQL\
  \ Server`的书。本章的大部分内容要么需要一些复杂的配置，要么是独立于`Linux`使用`SQL Server`的一部分。话虽如此，请考虑以下关于`SQL\
  \ Server`示例和演示的选项：\n\n- `Pro SQL Server on Linux` `GitHub` 仓库 – [`https://github.com/Apress/pro-sql-server-on-linux`](https://github.com/Apress/pro-sql-server-on-linux)\n\
  - `bobsql` `GitHub` 仓库上的演示和示例 – [`https://github.com/microsoft/bobsql`](https://github.com/microsoft/bobsql)\n\
  - `Microsoft`关于`Linux`上`SQL Server`的动手实验 – [`https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/`](https://docs.microsoft.com/en-us/learn/paths/sql-server-2017-on-linux/)\n\
  - `SQL Server Workshop` 网站 – [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops)。虽然我还没有在上面开设专门针对`Linux`上`SQL\
  \ Server`的研讨会，但如果它将来某天出现，请不要惊讶。在这些研讨会中有使用容器进行`Linux`上`SQL Server` `复制`的实验。\n- 最后，在第\
  \ 7 章中，我将让你使用容器亲身体验`Linux`上的`SQL Server` `复制`。\n\n## SQL Server 2019 在 Linux 上有哪些新功能\n\
  \n承接在 Linux 上交付 SQL Server 的势头，我们在 SQL Server 2019 中增加了多项增强功能，旨在解决数据专业人员面临的挑战，并实现与\
  \ Windows 版 SQL Server 的功能对等，包括：\n\n*   **平台与部署增强**：确保 Linux 上的 SQL Server 能根据当前资源可用性做出正确响应，并提供与\
  \ Windows 版 SQL Server 对等的部署选项。此外，我们努力确保支持最新版本的 Linux 发行版，其中包含受 SQL Server 工程团队影响的\
  \ Linux I/O 增强功能。\n\n*   **采用持久内存支持的 I/O 加速性能**：以跟上硬件技术的进步。\n\n*   **Linux 上现已支持\
  \ SQL Server 复制**：以提供数据同步功能——这是多年来一直广受欢迎的 SQL Server 功能。\n\n*   **更改数据捕获 (CDC)**：为开发人员和数据专业人员提供了一种跟踪\
  \ SQL Server 表中结构和数据变化的方法。这是 Windows 版 SQL Server 多个发行版中一直广受欢迎的功能，现在在 Linux 上也可用。\n\
  \n*   **确保支持分布式事务**：使开发人员能够像多年来在 Windows 版 SQL Server 上那样，编写分布式数据应用程序。\n\n*   **使用\
  \ OpenLDAP 提供程序简化 Active Directory 部署**。\n\n*   **在 Linux 上支持 SQL Server 机器学习服务和可扩展性**：以启用新的应用场景，以安全且可扩展的方式将机器学习模型靠近数据，并扩展\
  \ T-SQL 语言。\n\n*   **通过支持对 Hadoop、SQL Server、Oracle、Teradata 和 MongoDB 等外部数据源的 PolyBase\
  \ 查询（无需数据移动），将数据虚拟化引入 Linux 版 SQL Server**。\n\n在本章后续部分，我将用一个主要章节来分别介绍这些增强功能。\n\n\
  ## 平台与部署增强\n\n对于 SQL Server 2019，我们对核心引擎和 `SQLPAL` 进行了增强，以确保 SQL Server 像在 Windows\
  \ 上一样“为企业就绪”。此外，我们投入资源改进部署，以支持实现新功能所需的新安装包，并为用户提供与 Windows 上安装类似的功能。我们还想确保 Linux\
  \ 版 SQL Server 受到最新 Linux 发行版的支持，例如 Red Hat Enterprise Linux 8.0、Ubuntu 18.04 和\
  \ SUSE Linux Enterprise Server 15。这些新的 Linux 发行版包含对 Linux 内核的增强，以提升具有持久性的 I/O 性能，这一点受到了\
  \ SQL Server 中 I/O 重要性的影响。\n\n### 平台增强\n\n虽然 Linux 上的 SQL Server 核心引擎与 Windows 上的\
  \ SQL Server 使用完全相同的代码库是千真万确的，但 `SQLPAL`（以及一个称为 Host Extension 的组件）的设计目的是允许 SQL\
  \ Server 在必要时与 Linux 内核交互。我们在发布 Linux 版 SQL Server 后发现，有一些领域需要进行增强，以确保我们的数据库平台表现得与\
  \ Windows 版 SQL Server 一致。由于这些是集成在操作系统中的核心数据库引擎功能，我们将这些更改移植回了 SQL Server 2017——如果您安装了\
  \ SQL Server 2017 的最新累积更新，您将拥有这些更改。\n\n#### 内存通知\n\nSQL Server 的内存管理系统始终设计为具有弹性，能够响应\
  \ SQL Server 内部的内存需求以及整体操作系统环境中引擎外部的需求。\n\n虽然 SQL Server 的核心引擎与 Windows 上的相同，但响应内存压力等概念是特定于操作系统的。我们发现\
  \ SQL Server 2017 on Linux 在“内存通知”概念上存在一些问题，并增强了我们的 Linux 集成，以确保其在 SQL Server 2019\
  \ 中与 Windows 上的工作方式一致。\n\n## 注意\n\n我们还在最新的累积更新中进行了更改，以确保这些增强功能也包含在 SQL Server 2017\
  \ on Linux 中。\n\n我们的增强功能将确保我们的“目标”（即 SQL Server 内存分配的上限）在操作系统存在内存压力时进行调整。换句话说，如果整个操作系统的物理内存不足，SQL\
  \ Server 将调低“目标”，以尝试避免操作系统内存交换或可怕的“OOMKiller”场景（您可以在 `https://unix.stackexchange.com/questions/153585/how-does-the-oom-killer-decide-which-process-to-kill-first`\
  \ 阅读更多关于 oomkiller 的信息）。\n\n查看 SQL Server 目标内存随内存压力（即物理内存不足）而调整的方式是监控 `dm_os_sys_info`\
  \ 动态管理视图 (DMV) 中的 `committed_target_kb` 列。\n\n#### 环形缓冲区动态管理视图\n\nSQL Server 有一个名为\
  \ `dm_os_ring_buffers` 的 DMV，可用于跟踪服务器和 `SQLSERVR.EXE` 进程的 CPU 利用率。此 DMV 官方未提供支持，但它用于一个关键的监控工具，即\
  \ SQL Server Management Studio (SSMS) 中的性能仪表板。您可以在 `https://docs.microsoft.com/en-us/sql/relational-databases/performance/performance-dashboard`\
  \ 阅读更多关于如何使用性能仪表板的信息。\n\n该仪表板的一个有用功能是显示计算机和 `SQLSERVR.EXE` 的整体 CPU 利用率（甚至可以是过去一小时的数据），以帮助缩小特定于\
  \ SQL Server 的 CPU 问题范围。此报告依赖于 `dm_os_ring_buffers` 的数据。问题是，在 Linux 上，我们始终报告 CPU\
  \ 使用率为固定的 100%，因此该报告无法显示正确的数据。使用 SQL Server 2019（以及 SQL Server 2017 的最新 CU），此 DMV\
  \ 报告正确的使用率，现在性能仪表板可以用于 Linux 上的 SQL Server 了。\n\n\n## 在 Linux 上部署 SQL Server 2019\n\
  \n如果您熟悉在 Windows 上安装 SQL Server，那么您将对在 Linux 上部署 SQL Server 的简易性感到非常惊讶。您可以从此文档页面\
  \ [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-overview)\
  \ 开始，查看在 Linux 上部署 SQL Server 的“快速入门”。\n\nLinux 版 SQL Server 的部署有几点值得注意的更改：\n\n\
  *   创建了`新软件包`以支持新功能。Linux 版 SQL Server 部署更轻量、更快的原因之一是产品以一系列软件包的形式部署。虽然 `mssql-server`\
  \ 软件包包含了核心数据库引擎、SQL Agent、复制、CDC 和分布式事务，但启用新功能需要以下软件包：\n\n    `mssql-mlservices-mlm-py∗`\
  \ 和 `mssql-mlservices-mlm-r∗` – 机器学习服务的软件。还有其他用于 ML 服务的软件包，我将在本章后面描述。\n\n    `mssql-server-extensibility`\
  \ – 用于为可扩展性框架启用外部语言的软件。\n\n    `mssql-server-extensibility-java` – 用于为外部语言启用 Java\
  \ 支持的软件。此软件包将安装 `mssql-server-extensibility` 软件包。\n\n    `mssql-server-polybase`\
  \ – 用于在 Linux 版 SQL Server 上启用 Polybase 的数据虚拟化功能的软件。\n\n*   与 Windows 版 SQL Server\
  \ 一样，Linux 版 SQL Server 现在将根据安装过程中检测到的核心数，自动为 tempdb 创建`多个数据文件`（最多 8 个）。此选项有助于避免在系统分配页上的页面闩锁争用。\n\
  \n*   添加了 `mssql-conf` 选项以支持 SQL Server 2019 的新功能。例如，添加了用于 `DTC` 支持的 `mssql-conf`\
  \ 选项，您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)\
  \ 阅读更多内容。\n\n## 支持新的 Linux 版本\n\nSQL Server 支持最新的主要 Linux 发行版版本至关重要。因此，对于 SQL Server\
  \ 2019，我们希望确保支持这些主要的 Linux 版本：\n\n*   Red Hat Linux Enterprise 8.0\n*   Ubuntu 18.04\n\
  *   SUSE Linux Enterprise Server 15\n\n## 注意\n\n在本书撰写时，我们计划正式支持这些 Linux 版本与 SQL\
  \ Server 2019。SQL Server 确实可以在所有这些版本上运行，但我们不得不对部署软件包进行一些更改，并确保它们经过充分测试。在 SQL Server\
  \ 2019 发布时，可能会出现一些问题阻碍我们达到 100%就绪的状态，但如果届时未宣布，我预计不久之后会正式公布。\n\n支持最新的 Linux 版本还带来了一个\
  \ I/O 性能方面的好处。我的长期同事 Bob Dorr 在 SQL Server 2017 发布后注意到，在 Linux 上使用`完全持久性`的 SQL Server\
  \ 的 I/O 性能可能存在问题。这导致添加了一些 SQL Server 配置选项，用于一个称为“强制刷新”的概念，如微软文章 [`https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux`](https://support.microsoft.com/en-us/help/4131496/enable-forced-flush-mechanism-in-sql-server-2017-on-linux)\
  \ 中所述。我们决定确保 SQL Server 默认优先考虑持久性而非性能。但客户当然希望两者兼得。如果客户知道其磁盘系统能够支持正确的刷新写入，他们可以更改默认设置，在保证性能的同时实现持久性。\n\
  \n在 2018 日历年，Bob Dorr 和 SQL Server 工程团队的其他人与 Linux 开源工程人员，特别是 Red Hat 的人员进行了合作。这项工作的成果是对\
  \ Linux 内核中 `XFS` 文件系统的 `上游` 进行了更改。Red Hat Enterprise Linux (`RHEL`) 8.0 包含了这些内核更改。其他\
  \ Linux 发行版将陆续包含这些更改。现在，用户可以“关闭”我们对 Linux 版 SQL Server 强制执行的刷新更改，但仍能在保证持久性的同时获得最大性能。\n\
  \n就像我们职业生涯中的其他经历一样，Bob Dorr 想讲述“故事背后的故事”。他在这篇详细的博客文章 [`https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/`](https://bobsql.com/sql-server-on-linux-forced-unit-access-fua-internals/)\
  \ 中做到了这一点。我在 2019 年 5 月的 Red Hat 峰会上展示了这些更改，并展示了使用 `RHEL` 7.6 与 `RHEL` 8.0 相比，在配置\
  \ SQL Server 使用 `FUA` 增强功能时实现了惊人的 100%以上的性能提升。这看起来像是个小故事，但停下来想一想：`微软协助为开源 Linux\
  \ 内核做出了贡献，以改进所有应用程序的 I/O 性能！`\n\n## 持久内存支持\n\n我喜欢 SQL Server 工程团队的一点是，他们总是着眼未来。始终关注技术的最新进展，以确保\
  \ SQL Server 保持领先。\n\n看到 Linux 版 SQL Server 能够利用持久内存设备，我并不感到惊讶。持久内存 (`pmem`) 是一种`字节可寻址`的存储设备。这意味着持久内存可以像标准\
  \ RAM 一样访问，但具有存储设备的属性——因此存储在其上的数据可以在计算机断电和重启后得以保留。\n\n在 Windows 和 Linux 中，持久内存设备通常都可以被视为`块`设备。换句话说，它们可以由操作系统呈现为标准磁盘驱动器，SQL\
  \ Server 可以像访问任何驱动器一样访问它们。在块模式下，持久内存设备的访问速度甚至可能比市场上一些最快的 SSD 还要快。然而，由于 `pmem` 设备是字节可寻址的，像\
  \ SQL Server 这样的应用程序可以使用 `memcpy()` 等 API 调用，像访问内存一样在设备与标准 RAM 之间传输数据，从而获得更快的 I/O\
  \ 性能。\n\nSQL Server 2019 经过增强，能够识别存储在 `pmem` 设备上的数据库和事务日志文件，并`绕过` Linux 内核 I/O 堆栈来从这些设备传输数据。您可以在\
  \ [`https://docs.pmem.io/getting-started-guide/installing-ndctl`](https://docs.pmem.io/getting-started-guide/installing-ndctl)\
  \ 阅读更多关于应用程序如何利用 `pmem` 设备的内容，这涉及一个称为 `DAX` 的概念 [`(www.kernel.org/doc/Documentation/filesystems/dax.txt`](https://www.kernel.org/doc/Documentation/filesystems/dax.txt))。\n\
  \n您可以在我们的文档 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-pmem)\
  \ 中了解如何为 SQL Server 配置 `pmem` 设备。正如我在第 2 章所述，DELL EMC 能够利用 `pmem` 支持实现 SQL Server\
  \ 更快的性能，您可以在 [`www.emc.com/about/news/press/2019/20190402-01.htm`](https://www.emc.com/about/news/press/2019/20190402-01.htm)\
  \ 阅读相关内容。此外，HPE 工程师在该 YouTube 视频 [`www.youtube.com/watch?v=8WUix125tQQ`](https://www.youtube.com/watch%253Fv%253D8WUix125tQQ)\
  \ 中展示了 SQL Server 2019 的 I/O 性能改进。\n\n\n\n## SQL Server 复制在 Linux 上\n\nSQL Server\
  \ 复制是用于将数据复制和分发到其他 SQL Server 实例的最流行技术之一。由于 SQL Server Agent 在 SQL Server 2017 中被包含，并且核心数据库引擎提供了\
  \ SQL Server 复制的大部分功能，我们希望该功能成为 SQL Server 2017 for Linux 的一部分。但在我们能够将所有部分连接起来并确保其经过充分测试之前，时间已经耗尽，因此\
  \ Linux 版的 SQL Server 复制现在随 SQL Server 2019 一起提供。\n\n为了延续兼容性的伟大故事，Windows 版 SQL\
  \ Server 复制的几乎全部功能在 Linux 上都存在。这包括快照、事务、合并和对等复制。此外，您可以配置复制以在 Windows 和 Linux 之间使用发布者和订阅者。\n\
  \n要了解 Linux 上 SQL Server 复制功能的完整集合，请阅读位于 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication)\
  \ 的文档。\n\n在关于容器的第 7 章中，我将向您展示一个如何使用容器在 Linux 上使用 SQL Server 复制的示例。该文档还包括一个位于 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-replication-tutorial-tsql)\
  \ 的教程。\n\n## Linux 上的变更数据捕获\n\n与 SQL Server 复制的情况类似，变更数据捕获的所有组件都存在于 SQL Server on\
  \ Linux 中。然而，由于时间限制，我们无法在 SQL Server 2017 for Linux 中发布此功能。在 SQL Server 2019 中，CDC\
  \ 得到了完全支持。\n\n如果您不熟悉 CDC，它是一项捕获表中数据更改的出色技术，对于提取、转换和加载应用程序特别有用。\n\n所有用于跟踪和查询更改的功能都由\
  \ SQL Server 内部提供。CDC 使用与 SQL Server 复制相同的一些内部技术来捕获更改的数据。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server`](https://docs.microsoft.com/en-us/sql/relational-databases/track-changes/about-change-data-capture-sql-server)\
  \ 阅读所有关于 CDC 的内容。\n\n## Linux 上的 DTC\n\n在我们发布 SQL Server 2017 for Linux 之后，我问我的朋友\
  \ Bob Dorr 他的新重点会是什么。当然他说“所有事情”，但 Slava Oks 交给他的一个任务是努力实现 SQL Server for Linux 的功能对等。其中一项功能是分布式事务支持，包括对\
  \ Microsoft 分布式事务协调器的支持。\n\n与工程团队的 Kapil Thacker 和其他人一起，我们能够利用 SQLPAL 架构让核心 MSDTC\
  \ 服务和软件在 Linux 上工作，而无需为 Linux 编写一个“新的”DTC。（那个 SQLPAL 是个好东西。我们总有一天应该找到一种方法来开放 SQLPAL\
  \ 架构，以便其他人可以让他们的 Windows 应用程序在 Linux 上运行。）\n\n使用 DTC 进行 SQL Server 操作的最常见方法之一是通过链接服务器在分布式事务中使用，从一个\
  \ SQL Server 到另一个 SQL Server，使用 T-SQL `BEGIN DISTRIBUTED TRANSACTION` 语句。跨 SQL Server\
  \ 实例的链接服务器查询在 SQL Server 2017 for Linux 上有效，但不适用于分布式事务。正如 Bob Dorr 在这篇博客文章 [`https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/`](https://bobsql.com/sql-server-linux-distributed-transactions-requiring-the-microsoft-distributed-transaction-coordinator-service-are-not-supported-on-sql-server-running-on-linux-sql-server-to-sql-server-distributed-tr/)\
  \ 中指出的那样，如果您尝试这样做（等着瞧吧……现在使用最新的累积更新，在 SQL Server 2017 上就可以工作了），您将会收到错误。\n\n如果您想知道\
  \ DTC 如何工作及与 SQL Server（或任何 XA 事务）交互的内部原理，请阅读 Bob Dorr 在 [`https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/`](https://bobsql.com/how-it-works-sql-server-dtc-msdtc-and-xa-transactions/)\
  \ 上这篇极其详细的博客文章。\n\n虽然分布式链接服务器事务是该团队将 DTC 事务引入 SQL Server for Linux 的首要目标，但团队还希望为开发人员启用其他场景，包括：\n\
  \n*   针对 SQL Server on Linux 的 ODBC 提供程序的 OLE-TX 分布式事务。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc`](https://docs.microsoft.com/en-us/sql/relational-databases/native-client-odbc-how-to/use-microsoft-distributed-transaction-coordinator-odbc)\
  \ 阅读更多关于构建 OLE-TX 应用程序的信息。\n\n*   使用 JDBC 和 ODBC 提供程序针对 SQL Server on Linux 的 XA\
  \ 分布式事务。您可以在 [`https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions`](https://docs.microsoft.com/en-us/sql/connect/jdbc/understanding-xa-transactions)\
  \ 阅读更多关于 XA 事务的信息。\n\n为了实现此功能，Kapil、Bob 和团队必须以这样一种方式构建 MSDTC 服务：利用 SQLPAL 来支持其当前在\
  \ Windows 上运行时的现有端口通信结构。最终得到的架构如图 6-2 所示（Tejas Shah 和我合作构建了此图，并得到了 Kapil 和 Bob 的帮助）。\n\
  \n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig2_HTML.jpg](img/479130_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\nLinux 上的 MSDTC\n\n这个图表绝对需要一些解释。想象 MSDTC 客户端是一个通过链接服务器的 SQL Server 分布式事务（因此是另一个运行\
  \ Linux 或 Windows 的 SQL Server）。在右侧的方框中，有两个使用 SQLPAL 在 SQLSERVR Linux 进程中运行的组件：端点映射器和\
  \ MSDTC。整体主机是承载 SQLSERVR 进程的 Linux 操作系统。\n\nMSDTC 特别依赖端口 135，我们无法更改这一点，除非我们为 Linux\
  \ 修改 MSDTC 代码。MSDTC 客户端首先尝试在端口 135 上进行通信。我们构建了一个“端点映射器”，它将端口 135 映射到我们可以监听的端口。这是由\
  \ `mssql-conf` 选项 `network.rpcport` 配置的。然后，该端点映射器将回传信息告诉 MSDTC 客户端使用哪个端口与 MSDTC\
  \ Linux 服务通信，该服务随后与 SQL Server 集成。MSDTC 服务的端口可以是随机生成的，但您需要对此端口的防火墙访问权限，因此您应该使用 `mssql-conf`\
  \ 选项 `distributedtransaction.servertcpport` 来配置它。\n\n完整的配置体验可在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-msdtc)\
  \ 获取。完成这些配置后，您现在就可以跨 SQL Server 链接服务器启动 `BEGIN DISTRIBUTED TRANSACTION` 了。事实上，我有一个使用容器进行尝试的示例，位于\
  \ [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)。\n\
  \n\n\n## Active Directory 与 OpenLDAP\n\n为了确保 Linux 上的 SQL Server 具备企业级可信度，我们必须支持\
  \ Active Directory (AD) 认证。与 Linux 上的 SQL Server 其他方面类似，其配置体验与 Windows 不同，但功能体验和兼容性是相同的。\n\
  \n我们在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-auth-overview)\
  \ 文档中概述了在 Linux 上设置此功能的过程，而我在我著作 *Linux 上的 Pro SQL Server* 的第 7 章中讨论了其架构。\n\n为 SQL\
  \ Server on Linux 配置 AD 支持的步骤之一，是让托管 SQL Server 的 Linux 服务器加入 Active Directory 域。当我们发布\
  \ SQL Server 2017 on Linux 时，我们记录了如何使用名为 `SSSD` 的 Linux 包和名为 `realmd` 的程序来完成此操作。我们收到了客户的反馈，他们希望有替代方法加入域——具体来说，是更简单的体验，使用像\
  \ PBIS、VAS 或 Centrify 这样的第三方包。事实证明，SQL Server 并不阻止使用这些包；我们只需要进行一些微小的配置更改就能使它们工作。我们在\
  \ [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-join-domain)\
  \ 文档中概述并记录了这些方法。Tejas Shah 和团队花了一些时间清理了所有这些选项的文档。需要了解的是，这并非 SQL Server 2019 的新增强功能，因为它同样适用于\
  \ SQL Server 2017。然而，这个概念足够新，我想在本书中特别指出。\n\n## SQL Server 机器学习服务与 Linux 上的可扩展性\n\
  \n正如我在第 5 章详细描述的，SQL Server 机器学习服务是**革命性的**——它允许您结合 R 和 Python 的强大功能，与 SQL Server\
  \ 集成，以构建可扩展且强大的机器学习模型和应用程序。\n\n虽然这对于 Windows 上的 SQL Server 来说一直是个很棒的功能，但我们需要通过将此技术引入\
  \ Linux 来完善兼容性故事。此外，当我们引入新的可扩展性框架和语言扩展（包括 Java）时，我们也需要确保其同样适用于 Linux。\n\n### 在 Linux\
  \ 上部署 SQL Server 机器学习服务\n\n与 Windows 上的 SQL Server 类似，对于 Linux 上的 SQL Server 机器学习，我们会帮助您安装必要的包来部署\
  \ R 和 Python 脚本。\n\n我们为您提供了部署 SQL Server 机器学习服务的选择——`minimal`、`full` 或 `combo`。它们的功能如下：\n\
  \n`full` – 包含 R 或 Python 的所有包，并包括可用于机器学习的预训练模型。此包名为 `mssql-mlservices-mlm-r` 或 `mssql-mlservices-mlm-py`。当您使用此选项时，所有依赖包（如\
  \ R Open）也会被安装。\n\n`minimal` – 包含 R 或 Python 的所有包，但不包含预训练模型。此包名为 `mssql-mlservices-packages-r`\
  \ 或 `mssql-mlservices-packages-py`。所有依赖包（如 R Open）也会被安装。\n\n`combo` – 一步安装 SQL Server\
  \ 2019（数据库引擎）和 SQL Server 机器学习服务。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#install-all`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523install-all)\
  \ 阅读如何操作。\n\n当我为 R 安装完整版 SQL Server 机器学习服务时，安装的包如图 6-3 所示。\n\n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig3_HTML.jpg](img/479130_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n为 R 安装完整的 SQL Server 机器学习服务\n\n### 提示\n\n如果您正在寻找一种通过 SSH 连接到 Linux 上\
  \ SQL Server 的好方法，可以使用 Azure Data Studio 中的终端选项，正如您将在本章示例中看到的。\n\n请注意，安装的包之一是 `mssql-server-extensibility`，我将在本章后面描述，它是语言扩展的可扩展性框架所必需的（同一个框架既用于\
  \ SQL Server 机器学习服务，也用于语言扩展）。\n\n部署完成后，您需要执行一些安装后步骤，例如接受 R 或 Python 的最终用户许可协议。请按照\
  \ [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#post-install-config-required`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523post-install-config-required)\
  \ 文档中的步骤操作。\n\n我还建议，就像在 Windows 上一样，使用 “hello world” 示例来验证安装是否成功。R 的示例如下 T-SQL 语句：\n\
  \n```\nEXEC sp_execute_external_script\n@language =N'R',\n@script=N'\nOutputDataSet\
  \ <- InputDataSet',\n@input_data_1 =N'SELECT 1 AS hello'\nWITH RESULT SETS (([hello]\
  \ int not null));\nGO\n```\n\n也有可能您、数据科学家或数据工程师需要额外的 R 或 Python 库用于您的应用程序。请使用 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning#add-more-rpython-packages`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-machine-learning%2523add-more-rpython-packages)\
  \ 文档中的以下指南了解如何添加此代码。\n\n## 注意\n\n如果您曾在 SQL Server 2019 CTP 版本中使用此功能，请务必在尝试使用 SQL\
  \ Server 2019 RTM 功能之前删除所有那些包。\n\n\n\n## 工作原理\n\n我在第 5 章描述了 SQL Server ML Services\
  \ 的架构，包括启动板服务和卫星进程。\n\nSQL Server ML Services 在 Linux 上的概念相同。在 Linux 上，启动板进程是一个名为\
  \ `mssql-launchpadd` 的 systemd 单元服务。你可以使用 `systemctl` 查看或控制此服务。图 6-4 显示了该服务在 Linux\
  \ 上状态的示例。\n\n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig4_HTML.jpg](img/479130_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 Linux 上的启动板\n\n在 Linux 上，启动板服务由一个名为 `launchpadd` 的守护进程表示。与在 Windows 上为卫星进程派生进程的概念相同，这在\
  \ Linux 上也适用，包括 R 程序和 `bxlserver`。图 6-5 显示了从 `launchpadd` 服务派生出来运行 R 脚本的进程。\n\n\
  ![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig5_HTML.jpg](img/479130_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 SQL Server on Linux 上用于 R 脚本的卫星进程\n\n你可能会问，我是如何捕获这些正在运行的进程的？请按以下步骤操作：\n\n\
  从另一个 `ssh` 会话，运行以下 T-SQL 脚本：\n\n```sql\nEXEC sp_execute_external_script\n@language\
  \ =N'R',\n@script=N'\nOutputDataSet <- InputDataSet\nSys.sleep(10)',\n@input_data_1\
  \ =N'SELECT 1 AS hello'\nWITH RESULT SETS (([hello] int not null));\nGO\n```\n\n\
  注意 `Sys.sleep()` 调用会使 R 脚本在执行期间暂停。\n\n从你的另一个 `ssh` 会话，从 Linux shell 运行以下命令：\n\n\
  ```bash\nps -axf\n```\n\nSQL Server ML Services（以及可扩展性框架）使用命名空间来实现卫星进程的进程隔离。你可以使用与前面相同的示例使\
  \ R 脚本暂停，并在 Linux 上运行命令：\n\n```bash\nsudo lsns\n```\n\n你将看到为启动板进程（它会派生卫星进程）创建的独立命名空间。图\
  \ 6-6 显示了这个独立命名空间的示例。\n\n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig6_HTML.jpg](img/479130_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6 Linux 上用于卫星进程的命名空间\n\n图 6-6 揭示了关于 SQL Server ML Services（以及可扩展性框架）的另一个重要方面。卫星进程运行所使用的用户账户称为\
  \ `mssql_satellite` 登录名。这对于 R 或 Python 脚本（以及可扩展语言）所需的任何权限都很重要。\n\n## 注意\n\n别忘了，SQL\
  \ Server 的本机评分功能内置于 SQL Server 引擎中，因此可以在 SQL Server on Linux（甚至 SQL Server 2017）上使用。请在\
  \ [`https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring`](https://docs.microsoft.com/en-us/sql/advanced-analytics/sql-native-scoring)\
  \ 阅读更多信息。\n\n## 可扩展性框架与语言扩展\n\n基于与 SQL Server ML Services 相同的框架，我们引入了语言扩展的概念，我在第\
  \ 5 章对此有详细描述。作为此功能的一部分，我们将 Java 作为一个开箱即用的语言扩展示例进行了发布。\n\n要在 Linux 上部署 SQL Server\
  \ 语言扩展，你可以安装以下软件包之一：\n\n`mssql-server-extensibility` – 这是用于任何语言的可扩展性框架的核心软件。如你在本章前面所见，这是一个依赖包，在安装\
  \ SQL Server ML Services 时会一同安装。\n\n`mssql-server-extensibility-java` – 这将安装可扩展性框架、Java\
  \ 语言扩展以及 SDK，以便你可以运行 Java 代码。\n\n与 SQL Server ML Services 一样，你还可以选择执行 SQL Server\
  \ 与语言扩展的组合安装，你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-language-extensions)\
  \ 阅读相关信息。此外，如果 Linux 上尚未安装 Java 运行时环境（JRE）版本 8（与 Windows 类似，我们将安装 Zulu JRE），SQL\
  \ Server 将会安装它。\n\n部署 Java 类的过程与 Windows 上的 SQL Server 以及我在第 5 章描述的如何使用正则表达式教程几乎相同。事实上，Java\
  \ 的兼容性非常好，因此你可以获取在第 5 章构建的相同 Java 类，并在 Linux 上编译/构建一个 `jar` 文件。你使用相同的步骤来创建外部语言、用于\
  \ SDK 的外部库以及用于你的 Java 类（以 `jar` 文件形式）的外部库。\n\n当你运行代码时，会使用相同的启动板架构来派生一个进程进行卫星处理。与\
  \ Windows 上的 SQL Server 类似，此进程称为扩展主机，在 Linux 上的进程输出如图 6-7 所示。\n\n![../images/479130_1_En_6_Chapter/479130_1_En_6_Fig7_HTML.jpg](img/479130_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7 用于在 SQL Server on Linux 上运行 Java 的 `exthost` 卫星进程\n\n## Linux 上的 PolyBase\n\
  \n很难在书中将所有内容都以完全正确的顺序安排妥当。第 9 章专门介绍 SQL Server 2019 中的数据虚拟化和 PolyBase 概念。我在这里想简要提一下，因为这对\
  \ SQL Server on Linux 来说是新的功能。\n\nPolyBase 在 SQL Server 2016 中作为 Hadoop 连接器引入，并在\
  \ SQL Server 2019 中通过用于 SQL Server、Oracle、Teradata 和 MongoDB 的连接器得到了增强。\n\n正如你将在第\
  \ 9 章读到的，PolyBase 使用了我们 Analytics Platform System（APS，以前称为并行数据仓库）的一些组件来执行横向扩展查询处理。这些在\
  \ Windows 上作为服务存在，并在 SQL Server 2019 for Linux 上使用 SQLPAL。\n\n我们引入了 `mssql-server-polybase`\
  \ 软件包来为 SQL Server on Linux 启用 PolyBase。你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/polybase-linux-setup)\
  \ 阅读完整的部署步骤。\n\n用于 SQL Server on Linux 的 PolyBase 与用于 Windows 的 PolyBase 使用相同的 T-SQL\
  \ 语句和概念，但 SQL Server 2019 有以下例外：\n\n*   SQL Server on Linux 的 PolyBase 不支持横向扩展组。\n\
  \n*   不支持通用 ODBC 连接器。\n\n我们未来的计划是使 SQL Server on Linux 的 PolyBase 在 SQL Server 2019\
  \ 之后实现功能完全对等。你将在第 9 章了解更多关于如何使用 PolyBase 的信息。\n\n\n\n"
- "# 7. SQL Server 容器内部探秘\n\n## 概要\n\nSQL Server on Linux 的核心在于提供**兼容的选择**。在 SQL Server\
  \ 2017 中，用于 Linux 的核心数据库引擎与 Windows 上的 SQL Server 保持兼容。到了 SQL Server 2019，我们进一步增强了引擎边缘能力的特性支持，包括\
  \ `复制`、`变更数据捕获`、`分布式事务`、`机器学习服务` 和 `语言扩展`，以及 `Polybase`。\n\n此外，我们还改进了与 Linux 平台的集成，支持最新的\
  \ Linux 发行版，通过增强的 I/O 性能提高了持久性，增加了持久内存支持，并明确了如何使用 `OpenLDAP` 提供程序来配置 `Active Directory`\
  \ 身份验证。\n\nSQL Server on Linux 的故事是强有力的。2019 年 5 月，我受邀参加红帽峰会，不仅作为听众，还与几位同事一起（其中一次是与红帽联合演讲）讲述\
  \ SQL Server on Linux 的故事。我也曾参加过 2018 年的红帽峰会，当 2019 年的活动结束时，我不再觉得 Microsoft SQL\
  \ Server 是“新来的”。我感到我们现在已成为 Linux 生态系统和社区的主流组成部分。\n\n## 为何选择 SQL Server 容器？\n\n当我构思本章内容时，曾考虑只介绍\
  \ SQL Server 2019 在容器方面的新特性。虽然仅此内容就足以成章，但我决定扩大范围，更全面地探讨容器的概念、为何将其作为部署 SQL Server\
  \ 的新方式很重要，当然还有 SQL Server 2019 为容器带来的新功能。关于容器我可以写一整本书，因此你读完本章后不会对该主题有详尽无遗的了解。有许多关于容器的优秀资源（我发现\
  \ [`www.docker.com`](http://www.docker.com) 仍然很有价值！）可以作为本章的补充。我本章的目标是为你提供足够的信息，让你了解\
  \ SQL Server 容器的工作原理以及为何应考虑使用它们。我保证，读完本章你将懂得如何部署、管理和使用 SQL Server 容器。\n\n如果你觉得自己对容器的概念已经相当熟悉，欢迎直接跳转到“SQL\
  \ Server 2019 的新特性”一节。该节之后是一系列示例，你会发现它们对深入探索容器非常有价值。我应该说，即使你了解容器的基础知识，也可能需要从“SQL\
  \ Server 容器如何工作”一节开始阅读，特别是“SQL Server 容器”小节，因为我将揭示 SQL Server 使用容器时一些独特方面的内部机制。\n\
  \n容器解决了虚拟机目前无法应对的一项挑战。虚拟机是一项将应用程序与底层硬件*抽象分离*的卓越技术，但它需要为你的应用程序加载并运行一整套操作系统。虚拟机确实允许应用程序在主机上彼此隔离运行，对于\
  \ SQL Server 而言，这一直是整合场景的一个很好的解决方案（尽管 SQL Server 本身也支持在同一台计算机上托管多个实例）。容器提供了相同的概念隔离，但它们比使用虚拟机**轻量得多**。容器通常被视为对操作系统的一种抽象。\n\
  \n在我描述容器时，请记住一个重要概念：容器**并非取代**虚拟机，而是对虚拟机的**补充**。事实上，运行容器最常见的环境之一就是在虚拟机内部。让我先定义*容器镜像*，再给出容器的定义。容器镜像是一个二进制文件，描述了按文件系统组织的一组文件以及要从这些文件运行的\
  \ `程序`。而*容器*则是在**隔离方式**下运行容器镜像程序以及该镜像文件系统的一个实例。\n\n请看下面图 7-1 中我常用来讨论容器是什么以及为何能解决现代应用某些挑战的示意图。\n\
  \n![图 7-1：SQL Server 容器的承诺](img/479130_1_En_7_Fig1_HTML.jpg)\n\n让我从图的左侧开始解读这张图：\n\
  \n**可移植性**\n\n容器具有可移植性，因为容器镜像可以在任何能运行 `docker` 的地方运行，这几乎无处不在，包括 Windows、Linux 和\
  \ macOS 计算机，或是支持这些操作系统的云系统，亦或是 `Kubernetes`（你将在第 8 章了解更多关于 `Kubernetes` 的内容）。你可以将\
  \ SQL Server 容器镜像作为二进制文件“拉取”到上述任何系统中，它都能以相同方式运行。\n\n## 注意\n\n所有 macOS 用户请注意。请查看我撰写的以下博文，了解如何无需任何\
  \ Windows 软件即可运行 SQL Server 及其工具！[`https://bobsql.com/take-the-sql-server-mac-challenge/`](https://bobsql.com/take-the-sql-server-mac-challenge/)\n\
  \n**轻量级**\n\n容器是容器镜像的运行实例，它本质上只是一个基于程序、以隔离方式运行的进程。这使得它比运行一整套虚拟机来托管一个程序要**轻量得多**。容器的足迹也得到了优化，因为如果你从一个镜像运行多个容器，镜像文件的一部分（称为\
  \ `可读` 层，我将在本章后面解释）会在容器之间共享。这将减少在同一台主机或虚拟机上运行多个 SQL Server 实例所需的占用空间和资源。\n\n\n##\
  \ 注意\n\nLinux 上的 SQL Server 不支持多实例，但你可以通过容器实现相同的解决方案。\n\n`一致性`\n\n这是我在容器方面绝对喜爱的特性之一，它帮助解决了\
  \ SQL Server 的一大难题。多年来，公司都为开发者搭建了安装了 SQL Server 的 `开发` 服务器，作为测试和开发的演练场。但这会带来巨大的痛苦，因为太多开发者使用同一个\
  \ SQL Server（而且他们通常需要较高的 SQL Server 访问权限），可能导致不一致性和给数据库管理员等人员带来重大困扰。\n\n容器为开发者提供了一种一致的方式来使用\
  \ SQL Server，而无需共享一个 SQL Server 实例。例如，如果你希望所有开发者都使用特定版本的 SQL Server 镜像以及特定的数据库，你可以构建一个容器镜像来实现这一点。而且由于容器具有可移植性，并且\
  \ SQL Server 现在支持 Linux，你可以为使用不同平台的开发者提供相同的 SQL Server 容器镜像。你的 macOS 开发者可以使用与 Windows\
  \ 开发者相同的 SQL Server 镜像。这真是一个一致的方案！图中 `DevOps` 标志左下角的符号仅仅描述了容器对于支持 DevOps 模型是多么重要。\n\
  \n`高效`\n\n容器为更新像 SQL Server 这样的软件提供了一种全新的、坦白说令人思维开阔的体验。如果你曾经需要为 SQL Server 应用累积更新或补丁，你会发现容器的体验令人惊叹。你将体验到更少的停机时间，以及需要时更快回滚更新的体验。\n\
  \n在右侧的图 7-1 中，图示说明了其工作原理。中间“灰掉”的容器代表一个已停止的 SQL Server 容器。左侧的容器是新版本的 SQL Server，它已启动但指向相同的系统和用户数据库，这些数据库存储在\
  \ `持久化存储` 中（这称为卷的概念，我将在本章后面解释）。这是我在本章后面要向你展示的一种技术，我称之为“切换”容器，以应用或回滚 SQL Server 的累积更新。\n\
  \n在你查看图示时，我想指出以下几点观察：\n\n*   标有 `Bin/libs` 的黑色方框代表运行 SQL Server 所需的最小二进制文件。这代表了容器相对于整个虚拟机的“轻量级”方面。图中没有真正体现的是，如果容器来自同一个镜像，这些文件是跨容器共享的。\n\
  *   标有 `Docker` 的方框代表用于运行和管理容器的 docker 软件。实际上，这里应该写“容器运行时”，因为 Docker 只是容器运行时的一个例子。\n\
  *   注意那些指向下方 *穿过* Docker 到 `主机操作系统` 的箭头。Docker 并不是容器和主机操作系统之间的一层。换句话说，SQL Server\
  \ 不必通过某个层来通信以执行内核操作系统操作。这就是为什么容器也被认为更轻量级，因为它们有一个直接与主机操作系统对话的程序。容器执行的独特之处在于它们彼此隔离运行，因此得名容器。\n\
  \n有了这些容器的基础知识，让我们花时间学习容器的工作原理。理解事物的工作原理通常能让你更高效地使用它们。\n\n## SQL Server 容器如何工作\n\n\
  在你开始尝试 SQL Server 容器之旅前，让我花时间解释它们的工作原理。为了解释它们如何工作，我需要花一些时间谈谈 `容器托管`、docker 背后的魔力以及\
  \ `容器生命周期`。\n\n### 容器托管\n\n我刚在上一节结束时谈到容器实际上是直接与主机操作系统协同工作的程序。主机操作系统可以位于虚拟机中，也可以直接位于主机\
  \ `裸机` 计算机上。\n\n由于该程序像系统上的任何程序一样直接与主机操作系统交互（当然，它们以特殊隔离的方式运行），它们必须被编译和执行以在主机操作系统上运行。\n\
  \n当我们在 Linux 上发布 SQL Server 2017 时，我们还引入了基于 Linux 的 SQL Server 容器镜像，即 Ubuntu Linux。世界上几乎每个容器镜像都基于一个主机操作系统，并且大多数基于\
  \ Linux。对于 Linux 主机系统，运行基于 Linux 的 SQL Server 容器没有问题。无论 Linux 系统是裸机计算机还是虚拟机，SQL\
  \ Server Linux 容器都是天然契合的。\n\n那么 Windows 和 macOS 呢？作为容器运行时的 Docker 是关键。Docker 通过一个名为\
  \ Docker Desktop for Windows 的程序支持在 Windows 上运行容器。任何基于 Linux 镜像的容器都将在运行 Linux 的虚拟机上下文中运行，该虚拟机称为\
  \ `DockerDesktopVM`。macOS 的 Docker Desktop 使用一个称为 HyperKit 的概念（ [`https://github.com/moby/hyperkit`](https://github.com/moby/hyperkit)\
  \ ）。你可以在 [`www.docker.com/products/docker-desktop`](https://www.docker.com/products/docker-desktop)\
  \ 上阅读更多关于 Docker Desktop 的信息。\n\n最近，Docker for Windows 在容器方面取得了一些进展，支持一个称为 Linux\
  \ Containers for Windows (LCOW) 的概念。Windows 团队将此概念描述为在 Windows 中运行 Linux 容器比使用完整虚拟机更轻量的方法。你可以在\
  \ [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers)\
  \ 上阅读更多关于 LCOW 的信息。此外，Docker Desktop for Windows 可以使用一种更优化的方法，利用新的 Windows Subsystem\
  \ for Linux (WSL)。你可以在 [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/)\
  \ 上阅读更多关于 Docker Desktop 如何使用 WSL2 的信息。\n\n那么基于 Windows 或 macOS 镜像的容器呢？如果容器镜像基于像\
  \ Linux 这样的操作系统，那么是否存在基于 Windows 或 macOS 的容器镜像？答案是 Windows 有。Windows 确实有一个基于 Windows\
  \ 的容器镜像概念。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/)\
  \ 上阅读更多关于 Windows 容器的信息。SQL Server 尚未发布受支持的 Windows 容器版本。但在 2019 年夏天，我们宣布了 SQL Server\
  \ Windows 容器的私有预览计划。我将在本章末尾更多地讨论 SQL Server Windows 容器。在我撰写本书时，我尚未看到基于 macOS 的容器镜像。由于\
  \ SQL Server 并非原生为 macOS 构建，这不是问题，但正如我所说，SQL Server 支持 Linux，而 Linux 将使用 macOS 的\
  \ Docker Desktop（使用 HyperKit）运行。\n\n### Docker 有魔法吗？\n\n到目前为止我所描述的内容，对任何熟悉计算机系统的人来说似乎都有些神奇。每当有人提到“容器”这个词，“Docker”这个名字几乎总会紧随其后。事实证明，操作系统虚拟化的概念——即定义了容器到底是什么的概念——已经存在一段时间了（更多信息请阅读\
  \ [`https://en.wikipedia.org/wiki/OS-level_virtualisation`](https://en.wikipedia.org/wiki/OS-level_virtualisation)）。任何曾与我共事过、当我去研究某样东西如何工作时的人都知道，我总是想知道“API\
  \ 是什么？” 换句话说，就是用来实现目标的编程接口是什么。对于容器而言，答案隐藏在内核操作系统提供的 API 之后。\n\nDocker（以及市场上其他的容器运行时）采用了容器的概念，并构建了一个被广泛使用的平台和生态系统。但\
  \ Docker 本身是利用操作系统的功能来实现容器概念的，具体来说，是以下这些主要结构（在 Linux 上，但类似概念也适用于 Windows 容器）：\n\n\
  `命名空间（Namespace）` – 命名空间提供了一种机制，使进程能够彼此隔离运行。你可以在 [`https://en.wikipedia.org/wiki/Cgroups#NAMESPACE-ISOLATION`](https://en.wikipedia.org/wiki/Cgroups%2523NAMESPACE-ISOLATION)\
  \ 阅读更多关于命名空间的信息。\n\n`控制组（Control groups，cgroups）` – `cgroups` 提供了一种控制进程或一组进程资源使用情况的机制。容器默认情况下可以访问所有计算资源，如内存和\
  \ CPU，但 `cgroups` 提供了一种限制容器资源使用的方法。\n\n`联合文件系统（Union file system）` – 联合文件系统允许将多个目录呈现为一个目录。这个概念是保持容器体积小巧以及支持`可读`和`可写`层的关键。在\
  \ Linux 系统中，`OverlayFS` 文件系统支持联合文件系统。你可以在 [`https://docs.docker.com/storage/storagedriver/overlayfs-driver/#how-the-overlay-driver-works`](https://docs.docker.com/storage/storagedriver/overlayfs-driver/%2523how-the-overlay-driver-works)\
  \ 阅读更多关于它如何为容器工作。\n\n让我停下来解释一下我刚刚为容器引入的一个关键概念：\n\n`可读层（readable layer）` – 容器镜像是只读的，由文件系统中呈现的一组文件组成。对于\
  \ SQL Server 而言，这包括基础操作系统镜像支持的最小文件集，以及 SQL Server 的文件，包括二进制文件和系统数据库。\n\n`可写层（writeable\
  \ layer）` – 可写层是指容器启动后对其文件系统所做的任何更改。这可能包括对来自可读层的文件的任何修改或添加的新文件。可写层在容器的整个生命周期内都是持久存在的。一旦容器被移除，可写层也会被移除。正如你可以想象的那样，对于\
  \ SQL Server 用户数据库来说，这就带来了问题。\n\n`卷（volume）` – 卷是主机上持久存储的一个位置，它映射到容器可写层中的一个目录位置。你会看到，对于\
  \ SQL Server，常见的做法是使用一个卷来映射到容器中的某个目录以存储数据库。卷的存在独立于容器的生命周期，因此即使容器被移除，卷仍然存在。\n\n我非常喜欢\
  \ Docker 所做的一件事是引入了他们自己的 API，抽象了支持容器的底层操作系统概念，称为 `libcontainer`。你可以在 [`https://github.com/opencontainers/runc/tree/master/libcontainer`](https://github.com/opencontainers/runc/tree/master/libcontainer)\
  \ 阅读更多关于 `libcontainer` 的信息。另一篇关于容器开源性质的有趣读物是开放容器倡议（OCI），微软是其创始成员之一（[`www.opencontainers.org/`](https://www.opencontainers.org/)）。\n\
  \n需要指出的是，Docker 是容器运行时的一个例子，也是业界最受欢迎的之一。还有一个名为 `containerd` 的开源容器运行时，你可以在 [`https://containerd.io/`](https://containerd.io/)\
  \ 了解它。\n\n## 容器生命周期\n\n无论您在 Linux、Windows 还是 macOS 上安装 Docker，都会安装以下支持容器的组件：\n\n\
  `Docker 引擎` – 这由 `docker 守护进程` 组成，它是一个用于控制构建和运行容器的所有操作的“服务”。`docker 引擎` 支持一个 API，供程序与之交互以构建和运行容器。您可以在\
  \ [`https://docs.docker.com/engine/`](https://docs.docker.com/engine/) 阅读更多关于 `docker\
  \ 引擎` 的内容。您可以在 [`https://docs.docker.com/develop/sdk/`](https://docs.docker.com/develop/sdk/)\
  \ 阅读更多关于引擎 API 的内容。\n\n`docker 客户端` – 这是一个名为 `docker` 的程序，它使用引擎 API 来构建和运行容器。`docker\
  \ 客户端` 是一个一致性程序，因为它在 Windows、macOS 和 Linux 上支持相同的选项和行为。在本章的示例中，您将全程使用 `docker 客户端`。\n\
  \n`docker compose` – 这是一个名为 `docker-compose` 的程序，它允许您构建和运行多容器应用程序。在本章稍后关于 SQL Server\
  \ 复制的示例中，您将使用 `docker-compose`。\n\n结合这些组件，以下是我称之为容器生命周期的工作流程，如图 7-2 所示。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig2_HTML.jpg](img/479130_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\n容器生命周期\n\n让我们更详细地看看其中的每一个环节：\n\n### 构建\n\n`docker build` 命令用于构建新的容器镜像。尽管支持\
  \ SDK，但标准方法是使用名为 `Dockerfile` 的文件来定义要构建的镜像。您可以在 [`https://docs.docker.com/engine/reference/commandline/build/`](https://docs.docker.com/engine/reference/commandline/build/)\
  \ 阅读更多关于 `docker build` 的内容。`Dockerfile` 语法的参考文档可以在 [`https://docs.docker.com/engine/reference/builder/`](https://docs.docker.com/engine/reference/builder/)\
  \ 找到。Microsoft 构建了包含 SQL Server 的镜像，因此在许多情况下您永远不需要构建自己的镜像。但是，在某些情况下，您可能需要构建一个 *基于\
  \ SQL Server* 的自定义镜像。我将在本章后面展示一些例子。\n\n### 推送\n\n构建镜像后，您可能希望其他人也能使用它，因此您可以使用 `docker\
  \ push` 命令将容器镜像推送或发布到注册表。该注册表可以位于本地服务器上，也可以是公共领域的。最常见的公共领域注册表之一是 Docker Hub 或 hub.docker.com。Microsoft（包括\
  \ SQL Server）在 mcr.microsoft.com（称为 Microsoft 容器注册表）发布其容器镜像。我将在本章后面讨论如何在 Microsoft\
  \ 容器注册表上找到各种 SQL Server 镜像。您可以在 [`https://docs.docker.com/engine/reference/commandline/push/`](https://docs.docker.com/engine/reference/commandline/push/)\
  \ 阅读更多关于 `docker push` 的内容。\n\n### 拉取\n\n任何想要使用容器镜像的人都必须先拉取它，即使它存储在本地服务器上。容器镜像使用\
  \ `docker pull` 命令进行拉取。`docker 引擎` 会将镜像的一份副本本地存储在主机计算机上。您可以在 [`https://docs.docker.com/engine/reference/commandline/pull/`](https://docs.docker.com/engine/reference/commandline/pull/)\
  \ 阅读更多关于 `docker pull` 命令的内容。\n\n### 运行\n\n要基于镜像运行容器，请使用 `docker run` 命令。如果您运行容器的镜像尚未拉取，docker\
  \ 会先拉取该镜像，然后运行容器。您将在本章中学习运行 SQL Server 容器所需的所有参数和细节。\n\n### 管理\n\n运行容器后，您将需要 `管理`\
  \ 它。`docker 客户端` 将允许您停止、启动、重启和移除容器。此外，`docker 客户端` 还允许您管理镜像，包括删除它们。\n\n### 监控\n\n\
  `docker 客户端` 也可用于 `监控` 和管理容器生态系统，方法是列出正在运行和已停止的容器，并转储运行中和已停止容器的统计信息和日志。\n\n### 交互\n\
  \n最后，`docker 客户端` 允许您与正在运行的容器进行 `交互`，方法是从主机系统将文件复制到容器的可写层，并运行存在于容器文件系统中的程序（该程序将在与主容器程序相同的命名空间中运行）。这些命令对于\
  \ SQL Server 容器将非常有用，正如您将在本章的示例中看到的那样。\n\n### SQL Server 容器\n\nSQL Server 容器镜像包含了\
  \ SQL Server 引擎、SQL Server Agent、引擎附带的所有功能（如复制）以及 SQL Server 命令行工具（`sqlcmd` 和 `bcp`）所需的必要文件。当你运行一个\
  \ SQL Server 容器时，`SQL Server` 已经预先安装好了！换句话说，当你拉取并运行一个 SQL Server 容器后，就可以直接使用它了。这是使用\
  \ SQL Server 容器的主要优势之一。一旦启动容器，就无需再安装 SQL Server。\n\n我在前一节提到过，镜像是使用一个名为 Dockerfile\
  \ 的文件通过 `docker build` 命令构建的。为了理解 SQL Server 容器是如何预先安装的，这里大致列出了 SQL Server Dockerfile\
  \ 中的命令：\n\n```\nFROM \nLABEL \nEXPOSE 1433\nCOPY \nRUN ./install.sh\nCMD [\"/opt/mssql/bin/sqlservr”]\n\
  ```\n\n`FROM` 命令指定了 SQL Server 容器镜像所基于的基础操作系统镜像。容器的一大优点就是能够基于其他镜像构建新镜像，从而形成镜像的分层效果。实际上，本章稍后我会展示如何基于\
  \ SQL Server 镜像（该镜像又基于基础操作系统镜像）构建你自己的镜像。\n\n`EXPOSE` 命令允许 SQL Server 容器使程序能够连接到容器内部的\
  \ `1433` 端口。这一点很重要，因为默认情况下容器是隔离的。你会看到，这个端口通常会被映射到主机上的另一个端口，从而允许多个 SQL Server 容器在同一主机上运行（否则通常会失败，因为两个程序不能监听同一个端口）。\n\
  \n`COPY` 和 `RUN` 命令只是构建过程的一部分，用于将所有 SQL Server 二进制文件复制到容器镜像的文件系统中，并安装任何软件依赖项。\n\n\
  到目前为止，SQL Server Dockerfile 中的这些命令都是构建容器镜像的一部分。当执行 `docker build` 命令时，这些语句中的每一个都会被用来构建镜像。`CMD`\
  \ 语句向 docker 指明容器启动时要运行的程序名称，即 `sqlservr`。这意味着 SQL Server 容器的运行方式不像一个“服务”（例如 Linux\
  \ 中的 `systemd` 单元服务）。当我向一些人描述这一点时，他们曾问：“那 SQL Server 是如何保持运行的？”原来，SQL Server 程序（这与在\
  \ Windows 上相同）被设计为一个守护程序，这意味着它会在后台运行，直到收到停止信号。\n\n考虑到这一点，让我们看看如何运行一个 SQL Server\
  \ 容器，然后讨论一下我们是如何在内部“预先安装” SQL Server 的。\n\n## 运行 SQL Server 容器\n\n使用 `docker run`\
  \ 命令运行 SQL Server 容器的基本语法如下（注意：在 Linux 上，通常需要在命令前加 `sudo`）：\n\n```\ndocker run\n\
  -e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n-p 1401:1433\n-v sqlvolume:/var/opt/mssql\n\
  --hostname sql2019latest\n--name sql2019latest\n-d\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  ```\n\n让我解释一下每个参数的含义：\n\n#### 环境变量 (`-e`)\n\n```\n-e 'ACCEPT_EULA=Y' -e 'MSSQL_SA_PASSWORD=Sql2017isfast’\n\
  ```\n\n`-e` 参数指定了容器执行所需的环境变量。对于 SQL Server，你至少需要接受 EULA 协议和设置 `sa` 密码。还可以使用其他环境变量来指定\
  \ SQL Server 版本或启用 SQL Server Agent。任何 SQL Server 支持的环境变量都可以用来在启动容器时预配置 SQL Server\
  \ 的安装。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-environment-variables)\
  \ 获取完整的环境变量列表。\n\n#### 端口映射 (`-p`)\n\n```\n-p 1401:1433\n```\n\n如果你只打算在主机上运行一个 SQL\
  \ Server 容器（并且假设主机上没有安装 SQL Server），则不需要此参数。如果你有多个 SQL Server 实例，则需要将 `1433` 端口映射到不同的端口。现在，任何想要连接此\
  \ SQL Server 容器的应用程序都需要使用端口 `1401`，而不是默认端口。\n\n#### 卷映射 (`-v`)\n\n```\n-v sqlvolume:/var/opt/mssql\n\
  ```\n\n此参数指定用于映射到存储数据库的 SQL Server 目录的卷。这不是必需的，但如果你希望你的数据库独立于容器的生命周期而持久存在，就需要使用一个卷。对于任何生产环境的\
  \ SQL Server 容器，你都应该使用一个卷。\n\n#### 主机名 (`--hostname`)\n\n```\n--hostname sql2019latest\n\
  ```\n\n此参数也不是必需的，但非常方便。因为你指定的主机名将成为 SQL Server 内部的 `@@SERVERNAME`。\n\n#### 容器名称\
  \ (`--name`)\n\n```\n--name sql2019latest\n```\n\n此参数也不是必需的，但便于你管理容器。通过使用一个名称，你现在可以轻松地通过名称来识别和管理容器。例如，启动此容器后，你可以通过运行\
  \ `docker stop sql2019latest` 来停止它。\n\n#### 分离模式 (`-d`)\n\n```\n-d\n```\n\n此参数表示在后台运行容器。你通常希望对\
  \ SQL Server 容器使用此参数。然而，如果你无法启动 SQL Server 容器，一个很好的调试技巧是移除此参数。这是因为当 `sqlservr` 程序从命令行运行时，默认行为是将\
  \ `ERRORLOG` 的内容转储到 `stdout`，这会在你运行容器时显示出来。你也可以使用 `docker logs` 命令来转储 SQL Server\
  \ 容器的 `ERRORLOG`。\n\n#### 镜像标签\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  ```\n\n这是你想要运行的容器镜像的标签。我将在下一节展示如何确定特定 SQL Server 容器应使用的标签。如果标记的镜像在本地不存在，`docker`\
  \ 会先拉取该镜像，然后运行容器。\n\n### SQL Server 容器启动\n\nSQL Server 容器工作原理的一个有趣方面是它的启动序列。当 `sqlservr`\
  \ 程序在容器中运行时，`/var/opt/mssql` 目录并不存在。然而，`sqlservr` 程序具备智能，能够在启动时创建此目录，并从容器镜像的已安装文件中提取系统数据库。此外，`sqlservr`\
  \ 知道如何将环境变量用作启动参数，以绑定 EULA 协议、`sa` 密码和其他环境变量。换句话说，`sqlservr` 程序懂得如何安装它自己！\n\n在深入探讨一些示例之前，让我们先看看\
  \ SQL Server 2019 中与容器相关的新特性。\n\n## SQL Server 2019 有哪些新特性\n\n现在你已经了解了容器的工作原理以及它们如何与\
  \ SQL Server 协同工作，让我们来回顾一下 SQL Server 2019 中与容器相关的新功能：\n\n*   我们现在提供基于 **红帽企业级 Linux\
  \ (RHEL)** 基础 OS 镜像的 SQL Server 2019 容器镜像。请参阅下一点了解如何查看这些镜像的样子。在本章的示例中，我将主要使用 RHEL\
  \ 镜像。\n\n*   SQL Server 2019 容器默认以非 root 用户身份运行，这使得 SQL Server 获得了在红帽 OpenShift\
  \ 上运行的官方支持。\n\n*   所有 SQL Server 容器镜像现在都存储在 Microsoft 容器注册表 (`mcr.microsoft.com`)\
  \ 中。\n\n    当我们发布 SQL Server 2017 和容器镜像时，我们将镜像发布在 Docker Hub 仓库 [`https://hub.docker.com/_/microsoft-mssql-server`](https://hub.docker.com/_/microsoft-mssql-server)\
  \ 中。自那时起，微软内部确立了一个标准，即官方的微软容器镜像现在将发布在 Microsoft 容器注册表 (`mcr.microsoft.com`) 中。我们继续在\
  \ Docker Hub 上“分发”或列出我们的镜像，但镜像本身只能在 `mcr.microsoft.com` 找到。\n\n    让我在这里停下来解释一下容器镜像的命名约定：\n\
  \n    SQL 容器镜像将遵循以下命名约定：\n\n    `mcr.microsoft.com/mssql/server:<标签>` – Ubuntu 镜像\n\
  \n    `mcr.microsoft.com/mssql/rhel/server:<标签>` – 红帽企业级 Linux 镜像\n\n    ### 注意\n\
  \n    虽然我们目前没有为 SUSE 打包容器镜像，但你可以使用微软的 Vin Yu 提供的这个示例自行构建一个：[`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/SLES)。\n\
  \n`<标签>` 语法基于你正在寻找的特定构建或“最新”构建。\n\n例如，要获取适用于 Ubuntu 的 SQL Server 2017 最新构建容器镜像，你会使用以下容器镜像名称：\n\
  \n```\nmcr.microsoft.com/mssql/server:2017-latest-ubuntu\n```\n\n或者，对于适用于 Ubuntu\
  \ 的 SQL 2017 CU10，你会使用\n\n```\nmcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n\
  ```\n\n## 注意\n\n你也可以使用 `2017-latest` 作为标签来获取最新的 Ubuntu 镜像，但这并不推荐。那是我们最初发布 SQL 2017\
  \ 时使用的原始标签。最好通过名称明确指定基础镜像。\n\n我们没有为 SQL Server 2017 发布任何 RHEL 容器镜像。它们都是为 SQL Server\
  \ 2019 列出的。例如，要获取最新的 SQL Server 2019 RHEL 容器镜像，你会使用：\n\n```\nmcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  ```\n\n如果你拉取了一个 SQL 容器镜像，但不确定该镜像是为哪个版本的 SQL Server 构建的，请使用 `docker inspect` 命令。首先运行以下命令：\n\
  \n```\ndocker images\n```\n\n这将列出本地服务器上存储的镜像。`TAG`（标签）列可能会给你关于 SQL Server 版本的线索。但是，如果\
  \ `TAG` 的值类似于 `2017-latest-ubuntu`，在不运行基于此镜像的容器的情况下，你无法知道这是 SQL Server 2017 的哪个\
  \ CU 构建。但如果你运行类似以下的命令：\n\n```\ndocker inspect <IMAGE ID>\n```\n\n其中 `<IMAGE ID>`\
  \ 是来自 `docker images` 命令的 `GUID`。\n\n结果是一个描述该镜像的 `JSON` 文件。这对于任何容器镜像都非常有用。如果你在 `JSON`\
  \ 文本中搜索名为 `Labels`（标签）的部分，你会得到类似下面的结果：\n\n```\n\"Labels\": {\n\"com.microsoft.product\"\
  : \"Microsoft SQL Server\",\n\"com.microsoft.version\": \"14.0.3223.3\",\n\"vendor\"\
  : \"Microsoft\"\n```\n\n版本号就是 SQL Server 的构建版本。你可以在互联网上进行简单搜索，找到与 SQL Server 构建版本匹配的版本号。在此示例中，`14.0.3223.3`\
  \ 对应 SQL Server 2017 CU16。\n\n这当然很好，但你如何知道 `mcr.microsoft.com` 上所有可能的容器镜像列表呢？我的同事\
  \ Umachandar Jayachandran（他叫 UC）提供的这个技巧将为你节省大量时间。\n\n使用此 URL 查找所有 Ubuntu 镜像的列表：\n\
  \n[`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list)\n\
  \n对于 RHEL 镜像，你可以使用\n\n[`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)\n\
  \n### 提示\n\n如果你在 Azure Data Studio 或 Visual Studio Code 中安装了 Docker 扩展，你可以使用该扩展浏览\
  \ `mcr.microsoft.com`，包括 `mssql/server` 镜像。这篇博客文章介绍了该扩展：[`https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/`](https://jeeweetje.net/2019/07/10/exploring-containers-in-the-microsoft-container-registry-with-visual-studio-code/)。\n\
  \n### 非 root 容器\n\n*   我们现在在 SQL Server 2019 中支持非 root 容器。在此之前，所有 SQL Server 容器都是在\
  \ Linux 中以 root 用户身份运行的。虽然容器在隔离环境中运行，但业内一些人士认为以 root 身份运行并非安全模型，并且阻碍了 SQL Server\
  \ 在诸如红帽 OpenShift 等环境中获得官方支持。\n\n### Active Directory 身份验证\n\n*   到目前为止，SQL Server\
  \ 容器仅支持 SQL Server 身份验证。我们的目标是在 SQL Server 2019 中支持容器的 Active Directory 身份验证。在我撰写本章时，这功能是否会在\
  \ SQL Server 2019 版本中获得官方支持尚不确定。我将在本章后面的“在生产环境中部署 SQL 容器”一节中进一步讨论这个概念。\n\n### Windows\
  \ 容器镜像\n\n*   随着 SQL Server 2019 发布临近，我们宣布了对基于 Windows 基础镜像的 SQL Server 容器的预览支持。我称之为\
  \ SQL Server 容器 Windows 镜像。在本章末尾有一个单独的章节讨论此主题。\n\n与许多计算机技术相关的话题一样，你只能阅读到关于某物如何工作的部分内容。只有通过使用某物，你才能真正将所有拼图碎片组合起来。让我们通过一系列关于\
  \ SQL Server 容器的示例来探讨相关主题。\n\n\n## 示例的先决条件\n\n上一章或许让你们失望了，因为没有示例，而本章的示例将绰绰有余。这是我最喜欢的章节之一，因为我热爱容器这个主题。\n\
  \n在本章中，我将向你展示几种在 Windows 和 Linux 上运行容器的不同方法。我为你提供了脚本，可以在任一平台（或 macOS）上运行所有示例，但在示例中，我可能会更详细地介绍如何在特定平台上使用某个示例。\n\
  \n我编写本章的目标是，所有示例都基于 Bash shell 脚本，并且为 Windows 用户使用新的 Windows Subsystem for Linux\
  \ (`WSL2`)。然而，在撰写本文时，这需要 Windows 10 的 `insider` 版本，而我不希望让作为读者的你承担这个风险。对于 Windows\
  \ 用户，我提供了可在 PowerShell 中使用的示例（但请记住，正如我在上一节讨论的，这仍然会使用 Docker Desktop 虚拟机）。`WSL2`\
  \ 将改变这个局面，但需要下一个主要的生产版 Windows 10 才能使用 `WSL2`（除非你愿意尝试 insider 版本）。\n\n对于所有平台上的所有示例，你都需要\n\
  \n*   互联网连接，因为这些示例将从 Microsoft 容器注册表拉取 docker 镜像。\n*   WideWorldImporters 示例数据库备份，可以在\
  \ [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)\
  \ 找到。\n*   如果尚未安装，需要在你的计算机上安装 SQL Server 命令行工具。Windows 用户可以从 [`https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility`](https://docs.microsoft.com/en-us/sql/tools/sqlcmd-utility)\
  \ 找到下载。Linux 用户可以使用以下文档：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools)。macOS\
  \ 用户请参考以下文档：[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup-tools#macos)。\n\
  *   Azure Data Studio 或 `ADS` (至少是 2019 年 6 月版)，从 [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)\
  \ 获取。`ADS` 非常适合这些示例，因为它是一个跨平台工具。对于 `ADS` 用户，我建议你安装这个扩展：[`https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker`](https://marketplace.visualstudio.com/items?itemName=ms-azuretools.vscode-docker)。对于\
  \ `ADS`，你需要在安装页面上选择 Download Extension 选项。将 `VSIX` 文件下载到你的本地计算机，然后按照 `ADS` 的文档进行安装。以下是为\
  \ `ADS` 添加扩展的方法：[`https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions`](https://docs.microsoft.com/en-us/sql/azure-data-studio/extensions)。\n\
  \n以下是每个平台需要安装的内容列表：\n\n### Windows 用户\n\n在 [`https://hub.docker.com/editions/community/docker-ce-desktop-windows`](https://hub.docker.com/editions/community/docker-ce-desktop-windows)\
  \ 安装 Docker Desktop for Windows。Windows Server 用户也可以通过阅读 [`https://docs.docker.com/install/windows/docker-ee/`](https://docs.docker.com/install/windows/docker-ee/)\
  \ 来安装 Docker。\n\n对于 Windows 用户，这里还有一个重要的点。你可能会使用 `git` 来克隆本书的仓库以获取所有示例。为此，你很可能已经安装了\
  \ Git for Windows。在安装 Git for Windows 时，请务必关闭 `autocrlf` 选项。否则，本章所需的 Linux shell\
  \ 脚本将运行失败。如果你不知道该使用什么选项，在克隆仓库时可以使用如下语法：\n\n```\ngit clone --config core.autocrlf=false\n\
  ```\n\n### Linux 用户\n\nDocker 有免费或社区版 (`CE`) 和付费企业版 (`EE`)。对于 `CE`，根据你的 Linux 发行版有不同的安装选项。例如，Ubuntu\
  \ 用户可以从 [`https://docs.docker.com/install/linux/docker-ce/ubuntu/`](https://docs.docker.com/install/linux/docker-ce/ubuntu/)\
  \ 或 [`https://hub.docker.com/search/?type=edition&offering=community`](https://hub.docker.com/search/?type=edition&offering=community)\
  \ 安装 docker。\n\n如果你使用 Docker `EE`，在 [`www.docker.com/products/docker-enterprise`](http://www.docker.com/products/docker-enterprise)\
  \ 有针对 Ubuntu、`RHEL` 和 `SUSE` 的具体安装说明。\n\n### macOS 用户\n\n从 [`https://hub.docker.com/editions/community/docker-ce-desktop-mac`](https://hub.docker.com/editions/community/docker-ce-desktop-mac)\
  \ 安装 Docker Desktop for Mac。我为 Linux 和 macOS 用户构建的脚本在所有 docker 命令前都加了 `sudo`。虽然在\
  \ macOS 上不是必需的，但使用 `sudo` 效果良好，并且允许为两个平台使用同一套脚本。\n\n\n\n## 部署 SQL Server 容器\n\n\
  你真的需要亲眼看到容器运行起来，才能真正体会到它们带来的强大功能以及其工作原理。如果你还记得本章前面讨论的**容器生命周期**，那么微软实际上已经完成了 SQL\
  \ Server 容器的**构建**和**推送**步骤。本章后面我将讨论如何基于 SQL Server 构建你自己的镜像，但目前我会先向你展示**拉取 ➤ 运行**序列以及**停止\
  \ ➤ 启动 ➤ 移除**的管理序列。并且我会向你展示其他一些可用于探索容器的 docker 命令。\n\n**重要提示**：你必须将 WideWorldImporters\
  \ 备份文件复制到运行这些脚本的本地目录中，才能完成此活动。你可以从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Full.bak)\
  \ 下载此备份文件。\n\n本节中的所有示例都可以在 `ch7_inside_sql_containers\\deploy` 目录下找到。Windows 用户请使用\
  \ `dockerpowershell` 目录。Linux 和 macOS 用户请使用 `dockerbash` 目录（请确保使用 `chmod u+x <script>`\
  \ 命令使你的脚本可执行）。本章我将带你逐步了解 PowerShell 示例。\n\n## 运行 SQL Server 容器\n\n从 PowerShell 运行以下命令以启动\
  \ SQL Server 容器。（我选择使用 Azure Data Studio (ADS)中的 Terminal 选项来运行脚本或执行 `step1_dockerrunsql.ps1`\
  \ 脚本。）由于 SQL Server 2019 的镜像尚未在我的本地计算机上，docker 将先执行拉取操作，然后启动容器：\n\n```\ndocker run\
  \ -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1433:1433 --name sql2019latest\
  \ --hostname sql2019latest -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  ```\n\n图 7-3 展示了在 ADS 中运行此脚本以拉取 SQL Server 2019 RHEL 镜像的示例。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig3_HTML.jpg](img/479130_1_En_7_Fig3_HTML.jpg)\n\
  \n*图 7-3 部署 SQL Server RHEL 容器*\n\n你可能想了解更多关于 SQL Server 2019 镜像的信息。你可以使用如下命令来实现：\n\
  \n```\ndocker inspect mcr.microsoft.com/mssql/rhel/server:2019-latest\n```\n\n输出将是一个非常长的\
  \ JSON 文件。请注意输出中的这个有趣部分：\n\n```\n\"Cmd\": [\n\"/bin/sh\",\n\"-c\",\n\"#(nop) \"\
  ,\n\"CMD [\\\"/opt/mssql/bin/sqlservr\\\"]\"\n],\n```\n\n这向你展示了 Dockerfile 中的 `CMD`\
  \ 指令，其作用就是运行 `sqlservr`。不幸的是，目前并没有一种可靠的方法来确认一个容器镜像的基础镜像是什么。我见过很多工具，对于我们使用的容器，`docker\
  \ history` 命令也不会给出基础镜像的名称。\n\n当容器运行时，不幸的是，你无法立即知道 SQL Server 是否正确启动。该命令会输出一长串“guid”值，然后返回到命令提示符。我们可以使用\
  \ docker 工具来查看容器是否启动，并尝试连接到 SQL Server。\n\n## 检查容器状态\n\n运行以下命令以查看为 SQL Server 运行的容器的状态：\n\
  \n```\ndocker ps\n```\n\n如果 SQL Server 启动成功，你的输出将类似于以下内容：\n\n```\nCONTAINER ID \
  \       IMAGE                                             COMMAND              \
  \    CREATED\nSTATUS                  PORTS                    NAMES\n95345f25b901\
  \        mcr.microsoft.com/mssql/rhel/server:2019-latest   \"/opt/mssql/bin/sqls...\"\
  \   About a minute ago   Up About a minute       0.0.0.0:1401->1433/tcp   sql2019latest\n\
  ```\n\n## 连接到 SQL Server\n\n验证 SQL Server 是否启动的唯一可靠方法是尝试连接到它。你可以使用容器外部或内部的程序进行连接。让我们先使用容器外的一种方式，执行以下命令或使用脚本\
  \ `step2_dockerconnecttosql.ps1`：\n\n```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401'\
  \ '-Q\"SELECT @@VERSION\"'\n```\n\n你的输出应类似于以下内容（版本可能不同，因为我是使用 SQL Server 2019 CTP\
  \ 3.2 进行的操作）：\n\n```\nMicrosoft SQL Server 2019 (CTP3.2) - 15.0.1800.32 (X64)\n\
  Jul 17 2019 21:29:33\nCopyright (C) 2019 Microsoft Corporation\nDeveloper Edition\
  \ (64-bit) on Linux (Red Hat Enterprise Linux Server 7.6 (Maipo)) \n```\n\n请注意，SQL\
  \ Server 认为它运行在 RHEL 7.6 上。我也提到过，容器是一个以隔离方式运行的程序。如果你在 Linux 系统上，可以通过在主机上运行以下命令来证明这一点：\n\
  \n```\nps -axf\n```\n\n你的输出应类似于这样（PID 值可能会不同）：\n\n```\n/usr/bin/containerd\n22846\
  \ ?        Sl     0:02  \\_ containerd-shim -namespace moby -workdir /var/lib/containerd/io.containerd.runtime.v1.linux/moby/4f5c\n\
  22864 ?        Ssl    0:00      \\_ /opt/mssql/bin/sqlservr\n22909 ?        Sl \
  \   31:37          \\_ /opt/mssql/bin/sqlservr\n```\n\n### 面向 Windows 和 macOS 用户\n\
  \nWindows 和 macOS 用户：我有一个技巧可以让你们看到同样的信息。由于 SQL Server Linux 容器运行在一个 Linux 虚拟机中，你如何访问这个虚拟机本身呢？\n\
  \n试试这个。从 PowerShell 或你的 macOS 终端运行以下命令（完全归功于这篇博文 [`https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos`](https://nickjanetakis.com/blog/docker-tip-70-gain-access-to-the-mobylinux-vm-on-windows-or-macos)）：\n\
  \n```\ndocker container run --rm -it -v /:/host alpine\n```\n\n你应该会得到一个 root 提示符。现在运行这个命令：\n\
  \n```\nchroot /host\n```\n\n你现在处于 Windows 上 Linux 虚拟机上下文中的 Bash shell 里。你能做的操作是有限的，前面的\
  \ `ps` 命令在这里不起作用。但你可以运行这个命令：\n\n```\nps -o ppid,pid,comm\n```\n\n这将输出一系列进程，由于 `sqlservr`\
  \ 是刚刚启动的，它应该靠近列表的末尾。会有两个 `sqlservr` 进程，像这样（你的值很可能不同）：\n\n```\n2922  2946 sqlservr\n\
  2946  2991 sqlservr\n```\n\n对于第一个 `sqlservr` 进程，左边的值是 `ppid` 或父进程 ID。现在运行这个命令（将你的\
  \ `ppid` 值代入）：\n\n```\nps | grep 2922\n```\n\n你应该会看到类似这样的结果：\n\n```\n2922 root \
  \     0:00 containerd-shim -namespace moby -workdir /var/lib/docker/containerd/daemon/io.containerd.runtime.v1.linux/moby/a0c005ccefe8c8a716e066b0a857e919bded6f50ac791cb82f6de2b0dbef220e\
  \ -address /var/run/docker/containerd/containerd.sock -containerd-binary /usr/local/bin/containerd\
  \ -runtime-root /var/run/docker/runtime-runc -debug\n```\n\n这是一个 docker 进程，用于 fork\
  \ 容器程序，在这个例子中就是 `sqlservr`。\n\n## 复制备份文件\n\n要还原 WideWorldImporters 备份，你必须将此文件复制到容器的可写层中。运行以下命令或脚本\
  \ `step3_dockercopybackup.ps1`：\n\n```\ndocker cp c:\\sql_sample_databases\\WideWorldImporters-Full.bak\
  \ sql2019latest:/var/opt/mssql\n```\n\n通过将备份文件复制到 `/var/opt/mssql` 目录，该备份文件立即可被容器内的\
  \ SQL Server 访问。\n\n#### 还原数据库\n\n备份文件位于可写层后，容器上下文中的 SQL Server 便可以访问此备份，从而进行还原。要还原数据库，你可以使用容器中存在的\
  \ `sqlcmd` 工具。为此，你可以使用 `docker exec` 命令，如下所示，或在脚本 `step4_dockerrestorebackup.ps1`\
  \ 中执行：\n\n```\ndocker exec -it sql2019latest /opt/mssql-tools/bin/sqlcmd -S localhost\
  \ -U SA -P \"Sql2019isfast\" -Q \"RESTORE DATABASE WideWorldImporters FROM DISK\
  \ = '/var/opt/mssql/WideWorldImporters-Full.bak' WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf',\
  \ MOVE 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf',\
  \ MOVE 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
  \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n```\n\n\n\n## 查看\
  \ SQL Server 容器日志与管理\n\nWideWorldImporters 备份文件是使用 SQL Server 2016 构建的，因此您会看到一条输出信息，提示数据库正在被还原并升级到\
  \ 2019 版本。\n\n## 1. 查看 ERRORLOG\n\n您可能想查看容器中运行的 SQL Server 的 ERRORLOG。实现此目的的一种方法是使用\
  \ `docker exec`，并通过以下命令或脚本 `step5_dockerexec.ps1` 来浏览容器的目录结构：\n\n```\ndocker exec\
  \ -it sql2019latest bash\n```\n\n此命令成功后，您的光标将位于容器环境下的 Bash shell 提示符处，如下所示：\n\n\
  ```\nroot@sql2019latest:/#\n```\n\n现在您可以切换到 `/var/opt/mssql/log` 目录，并使用 `cat ERRORLOG`\
  \ 命令显示 ERRORLOG。\n\n请记住，容器的优势之一是比在虚拟机中运行整个操作系统具有更小的资源占用。此外，我之前告诉过您，容器实际上只是一个以隔离方式运行的程序，它共享主机操作系统的资源。您可以通过运行以下命令来查看此行为：\n\
  \n```\nps -axf\n```\n\n您的输出应类似于：\n\n```\n[root@sql2019latest /]# ps -axf\nPID TTY\
  \      STAT   TIME COMMAND\n268 pts/0    Ss     0:00 bash\n561 pts/0    R+     0:00\
  \  \\_ ps -axf\n1 ?        Ssl    0:00 /opt/mssql/bin/sqlservr\n7 ?        Sl  \
  \   1:25 /opt/mssql/bin/sqlservr\n```\n\n您可以看到只有 `bash` 和 `sqlservr` 在运行。您可以将此与在主机（而非容器）的\
  \ RHEL 7.6 服务器或虚拟机上运行以下命令进行比较：\n\n```\nps -axf | wc -l\n```\n\n该命令用于统计进程数量。在我在 Azure\
  \ 中安装的“全新”RHEL 7.6 服务器上，我得到了 122 这个数字！`bash` 程序与 SQL Server 容器在同一个命名空间中运行，因此它被隔离，只能访问此特定容器的可读写层中的文件。\n\
  \n输入命令 `exit` 退出 shell。\n\n## 注意\n您可能会问，如果容器只是 `sqlservr` 程序，怎么可能运行这些 Linux 命令。这是因为\
  \ `docker exec` 能够在容器程序的命名空间中运行一个程序（类似于 `sqlcmd` 与 SQL Server 容器的工作方式）。如果程序本身不存在于容器的文件目录结构中，`docker\
  \ exec` 将会失败。`bash` 可用是因为它在基础镜像中。`sqlcmd` 可用是因为我们在 SQL Server 镜像中安装了 `sqlcmd`。\n\
  \n让我停下来提一下，Docker 扩展与 Azure Data Studio（或 Visual Studio Code）配合使用是多么方便。我在“先决条件”中提到过您可能希望安装此扩展。图\
  \ 7-4 是管理一个正在运行的 SQL Server 容器以“附加”一个 `bash` shell 的示例。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig4_HTML.jpg](img/479130_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4**\n在 Azure Data Studio 中使用 Docker 扩展\n\n从该扩展的“资源管理器”选项中可以看到，您可以查看正在运行（或已停止）的容器、已拉取的镜像，甚至可以浏览像\
  \ `mcr.microsoft.com` 这样的注册表，或者您自己的 Azure 容器注册表或 Docker Hub。\n\n## 2. 停止容器\n\n如果您需要关闭容器中的\
  \ SQL Server，从技术上讲，您可以发出 T-SQL `SHUTDOWN` 命令。这将停止 `SQLSERVR` 进程并关闭容器，因为它是容器的主程序。或者，您可以运行以下命令来停止容器，或使用脚本\
  \ `step6_dockerstop.ps1`：\n\n```\ndocker stop sql2019latest\n```\n\n命令成功时，它会将容器名称打印到标准输出。\n\
  \n当您停止容器时，启动容器的程序会被终止。对于 SQL Server，这将导致检测到终止信号并执行 SQL Server 的干净关闭。\n\n您可以在容器停止后运行以下命令来证明\
  \ SQL Server 已关闭：\n\n```\ndocker logs sql2019latest\n```\n\nSQL Server 容器的 ERRORLOG\
  \ 输出将显示在控制台中，其中包含如下语句：\n\n```\n spids      SQL Server is terminating in response\
  \ to a 'stop' request from Service Control\n```\n\n此时，容器的可读写层（在本例中，由于 WideWorldImporters\
  \ 数据库已被还原，它是此层的一部分）会被保留，容器被认为是*空闲*的但可以再次启动。您可以通过运行以下命令查看任何已停止但未被移除的容器：\n\n```\n\
  docker ps -a\n```\n\n您的输出应如下所示：\n\n```\nCONTAINER ID        IMAGE              \
  \                                 COMMAND                  CREATED\nSTATUS     \
  \                 PORTS               NAMES\n95345f25b901        mcr.microsoft.com/mssql/rhel/server:2019-latest\
  \      \"/opt/mssql/bin/sqls...\"   10 hours ago\nExited (0) 11 seconds ago    \
  \             sql2019latest\n```\n\n## 3. 启动容器\n\n您可以使用以下命令或脚本 `step7_dockerstart.ps1`\
  \ 再次启动容器：\n\n```\ndocker start sql2019latest\n```\n\n容器的名称将再次显示在控制台中，然后您将返回到命令提示符。\n\
  \n## 4. 查询数据库\n\n您可以使用以下命令或脚本 `step8_dockerquerywwi.ps1` 查询 WideWorldImporters 数据库：\n\
  \n```\nsqlcmd -Usa -PSql2019isfast '-Slocalhost,1401' '-Q\"SELECT COUNT(*) FROM\
  \ [WideWorldImporters].[Application].[People]\"'\n```\n\n您应该会得到 People 表中行数为 1111\
  \ 的结果。\n\n## 5. 停止并移除容器\n\n如果您停止容器并移除它，可读写层将会消失，您的数据库也随之消失（这可不是好事）。您可以通过以下命令或脚本\
  \ `step9_dockerstopandremove.ps1` 来停止并移除容器：\n\n```\ndocker stop sql2019latest\n\
  docker rm sql2019latest\n```\n\n可以将停止并移除 SQL Server 视为卸载 SQL Server。但好消息是，任何其他 SQL\
  \ Server 容器（即使基于同一镜像）都不受此操作影响。\n\n## 6. 使用数据卷持久化数据\n\n正如我在描述 SQL Server 容器工作原理时所说的，使用卷将数据库存储在持久化的主机存储上，这样即使容器被移除，数据也能得以保留。\n\
  \n使用以下命令或脚本 `step10_dockerrunvolume.ps1` 通过卷运行容器：\n\n```\ndocker run -e \"ACCEPT_EULA=Y\"\
  \ -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest --hostname\
  \ sql2019latest -v sqlvolume:/opt/mssql/data -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  ```\n\n## 注意\n由于 SQL 2019 的镜像已在您的本地计算机上，`docker` 不会尝试再次拉取它。\n\n在此示例中，名称 `sqlvolume`\
  \ 将自动映射到主机服务器或虚拟机上的一个目录，该目录不是可读写层的一部分。任何对可读写层中 `/var/opt/mssql` 目录的写入操作都会被重定向到主机上\
  \ `sqlvolume` 对应的文件夹。\n\n您可以通过运行以下命令来找出 `sqlvolume` 所对应的目录：\n\n```\ndocker inspect\
  \ sqlvolume\n```\n\n您的输出应类似于：\n\n```\n[\n{\n\"CreatedAt\": \"2019-08-07T02:24:50Z\"\
  ,\n\"Driver\": \"local\",\n\"Labels\": null,\n\"Mountpoint\": \"/var/lib/docker/volumes/sqlvolume/_data\"\
  ,\n\"Name\": \"sqlvolume\",\n\"Options\": null,\n\"Scope\": \"local\"\n}\n]\n```\n\
  \n在 Windows 上，`/var/lib/docker/volumes/sqlvolume/_data` 是 Linux 虚拟机内部的一个目录，但仍然会被持久化。\n\
  \n\n\n## 注意\n\n在编写本书的过程中，我们发现了 SQL Server 容器与 Windows 卷之间的一个问题。我原本希望 Windows 用户在示例中看到类似如下的卷映射：\n\
  \n`-v c:\\data:/var/opt/mssql`\n\n但我们发现了一个自 SQL Server 2017 CU14 开始出现并破坏此模型的问题。其他用户已在\
  \ GitHub 上报告了相同的问题：[`https://github.com/microsoft/mssql-docker/issues/441`](https://github.com/microsoft/mssql-docker/issues/441)。我相信在本书出版时，此问题将得到解决。您可以在该\
  \ GitHub 页面上跟踪我们对此问题的修复进展。\n\n1.  复制 WideWorldImporters 备份文件，并按照之前的步骤再次还原数据库。执行脚本\
  \ `step11_dockercopyandrestore.ps1` 或以下命令：\n\n    ```\n    docker cp c:\\sql_sample_databases\\\
  WideWorldImporters-Full.bak sql2019latest:/var/opt/mssql\n    docker exec -it sql2019latest\
  \ /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Sql2019isfast\" -Q \"RESTORE\
  \ DATABASE WideWorldImporters FROM DISK = '/var/opt/mssql/WideWorldImporters-Full.bak'\
  \ WITH MOVE 'WWI_Primary' TO '/var/opt/mssql/data/WideWorldImporters.mdf', MOVE\
  \ 'WWI_UserData' TO '/var/opt/mssql/data/WideWorldImporters_userdata.ndf', MOVE\
  \ 'WWI_Log' TO '/var/opt/mssql/data/WideWorldImporters.ldf', MOVE 'WWI_InMemory_Data_1'\
  \ TO '/var/opt/mssql/data/WideWorldImporters_InMemory_Data_1'\"\n    ```\n\n1. \
  \ 现在停止并移除容器。然后使用相同的卷名，通过以下命令或脚本 `step12_dockerrestart.ps1` 重新启动它：\n\n    ```\n \
  \   docker stop sql2019latest\n    docker rm sql2019latest\n    docker run -e \"\
  ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2019isfast\" -p 1401:1433 --name sql2019latest\
  \ --hostname sql2019latest -v sqlvolume:/var/opt/mssql -d mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  \    ```\n\n在此情况下，当新的 SQL 2019 容器启动时，所有系统数据库和用户数据库已经存在。SQL Server 会识别这一点，并直接“使用”这些数据库并启动。\n\
  \n1.  通过运行查询（使用以下命令或脚本 `step13_dockerquerywwi.ps1`）来确保你的数据仍然存在：\n\n    ```\n   \
  \ sqlcmd -Usa -PSql2019isfast '-Slocalhost,1401' '-Q\"SELECT COUNT(*) FROM [WideWorldImporters].[Application].[People]\"\
  '\n    ```\n\n你应返回 `People` 表中的行数为 1111。\n\n让我们使用 Azure Data Studio (ADS) 工具连接到容器。启动\
  \ Azure Data Studio（如果尚未启动）。开始一个新连接，在**服务器**字段中输入 **localhost,1401**（或 `<servername>,1401`）。输入你用于启动容器的\
  \ sa 密码。ADS 应能像连接其他任何 SQL Server 一样连接并与容器交互。\n\n图 7-5 展示了使用 ADS 连接到 WideWorldImporters\
  \ 数据库并执行查询的界面。\n\n![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig5_HTML.jpg](img/479130_1_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5**\n\n使用 Azure Data Studio 连接到容器\n\n1.  让我们通过停止容器、移除它、移除卷并移除镜像来清理所有资源，使用以下命令或脚本\
  \ `cleanup.sh`：\n\n    ```\n    sudo docker stop sql2019latest\n    sudo docker\
  \ rm sql2019latest\n    sudo docker volume rm sqlvolume\n    sudo docker rmi mcr.microsoft.com/mssql/rhel/server:2019-latest\n\
  \    ```\n\n现在你已经了解了部署和管理带有 SQL Server 的容器的基础知识，包括在卷中持久化用户数据库，让我们运用这些技能来学习一种使用容器更新\
  \ SQL Server 的新颖独特方式。\n\n### 一种更新 SQL Server 的新方法\n\n我在本章开头提到过，容器提供了一种全新且令人惊叹的更新\
  \ SQL Server 的方法。让我们看看它的实际操作。由于本书编写时 SQL Server 2019 仍处于预览版，没有可用于展示 2019 版容器更新的累积更新。因此，在此示例中，我将展示如何使用\
  \ SQL Server 2017 来更新容器。一旦 SQL Server 2019 正式发布并开始提供累积更新，你将能够使用相同的方法。\n\n想象一下这个场景以理解示例：你目前正在生产环境中运行带有\
  \ SQL Server 2017 累积更新 (CU) 10 的容器。你需要为 SQL Server 2017 应用最新的 CU。在 Windows 或 Linux\
  \ 上，此过程是对当前 SQL Server 实例进行修补或更新，这需要重启 SQL Server。\n\n容器提供了一种新方法，虽然也需要重启，但更新速度更快，并为回滚提供了巨大优势。记住\
  \ SQL Server 容器是预安装的。因此，当你运行基于任何累积更新的 SQL Server 容器时，你并不是在修补现有软件。\n\n所有展示更新实际操作的示例都可以在\
  \ `ch7_inside_sql_containers\\update` 找到。Windows 用户可以使用 `dockerpowershell` 目录，而\
  \ Linux 和 macOS 用户可以使用 `dockerbash` 目录（确保使用 `chmod u+x <script>` 使你的脚本可执行）。\n\n\
  我将在本节中引导你完成 PowerShell 的体验。\n\n1.  运行以下命令或脚本 `step1_dockerrun.ps1` 来部署一个 SQL Server\
  \ 2017 CU10 容器：\n\n    ```\n    docker run -e \"ACCEPT_EULA=Y\" -e \"SA_PASSWORD=Sql2017isfast\"\
  \ -p 1401:1433 --name sql2017CU10 --hostname sql2017CU10 -v sqlvolume:/var/opt/mssql\
  \ -d mcr.microsoft.com/mssql/server:2017-CU10-ubuntu\n    ```\n\n    你很可能还没有拉取 SQL\
  \ 2017 CU10 镜像，所以它会先被拉取。注意这里使用了卷，这是这种 SQL Server 更新方法的关键。\n\n2.  使用以下命令或脚本 `step2_dockerconnecttosql.ps1`\
  \ 连接到 SQL Server 以查找已安装的版本：\n\n    ```\n    sqlcmd -Usa -PSql2017isfast '-Slocalhost,1401'\
  \ '-Q\"SELECT @@VERSION\"'\n    ```\n\n    你的输出应类似于：\n\n    ```\n    Microsoft SQL\
  \ Server 2017 (RTM-CU10) (KB4342123) - 14.0.3037.1 (X64)\n    Jul 27 2018 09:40:27\n\
  \    Copyright (C) 2017 Microsoft Corporation\n    Developer Edition (64-bit) on\
  \ Linux (Ubuntu 16.04.5 LTS)\n    ```\n\n3.  运行以下命令来更新容器，或使用脚本 `step3_dockerupdate.ps1`：\n\
  \n    ```\n    docker stop sql2017CU10\n    docker run -e \"ACCEPT_EULA=Y\" -e \"\
  SA_PASSWORD=Sql2017isfast\" -p 1401:1433 --name sql2017latest --hostname sql2017latest\
  \ -v sqlvolume:/var/opt/mssql -d mcr.microsoft.com/mssql/server:2017-latest-ubuntu\n\
  \    ```\n\n    让我描述一下这里发生了什么。第一个容器被停止，不再能访问卷上的系统数据库。第二个容器启动，*使用相同的卷和端口*，但使用了最新\
  \ CU 版本的不同镜像。新容器启动 SQL Server，它识别出系统数据库已经存在。引擎足够智能，能在系统数据库存在时直接使用它们。此外，SQL Server\
  \ 足够智能，能够对系统和用户数据库执行任何必要的“更新”步骤，以确保它们与特定的 CU 版本兼容。\n\n4.  运行以下命令连接到容器（记住是同一个端口）以验证\
  \ SQL Server 版本已更新，或使用脚本 `step4_dockerconnecttosql.ps1`：\n\n    ```\n    sqlcmd\
  \ -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT @@VERSION\"'\n    ```\n\n\
  \    根据你在更新后执行此步骤的时间早晚，你可能会收到此错误：\n\n    ```\n    Sqlcmd: Error: Microsoft ODBC\
  \ Driver 17 for SQL Server : Login failed for user 'sa'. Reason: Server is in script\
  \ upgrade mode. Only administrator can connect at this time..\n    ```\n\n\n\n这是因为\
  \ SQL Server 正在执行所有必要步骤，以更新系统和用户数据库，确保它们与新的累积更新兼容。此过程不影响任何用户数据。\n\n从技术上讲，并非每个累积更新都需要更改系统和用户数据库的元数据。然而，我们发现对于任何累积更新的更改，我们都会“尝试”运行这些更新步骤。这可能会减慢更新过程，但它远比实际修补\
  \ SQL Server 要快得多。有一个技巧可以避免这种情况，但它仅用于调试目的。跟踪标志 902 可以绕过所有这些累积更新步骤。\n\n这意味着你可以通过将此语句添加到你迄今为止使用的\
  \ `docker run` 命令的末尾来运行容器。\n\n```\n/opt/mssql/bin/sqlservr -T902\n```\n\n这是 Docker\
  \ 提供的一个有趣的技巧。我已经向你展示过，`CMD` 语句是 Docker 用来为容器运行程序的指令。事实证明，你可以通过指定要运行的替代程序来覆盖容器镜像的默认设置。通过使用此跟踪标志运行\
  \ SQL Server，你可以启动一个使用 `sqlservr` 的容器，并用跟踪标志覆盖默认值。我在演示这种新的容器更新方法时会使用它，但这仅用于演示目的。我曾与我们的工程团队中的一位开发负责人张立讨论过，或许将来我们能巧妙地实现仅在需要时才运行更新步骤。\n\
  \n最终，连接查询将会成功，你的输出应如下所示：\n\n```\nMicrosoft SQL Server 2017 (RTM-CU16) (KB4508218)\
  \ - 14.0.3223.3 (X64)\nJul 12 2019 17:43:08\nCopyright (C) 2017 Microsoft Corporation\n\
  Developer Edition (64-bit) on Linux (Ubuntu 16.04.6 LTS)\n```\n\n你可能会得到一个不同的版本，因为当你尝试这些步骤时，SQL\
  \ Server 2017 很可能已有其他后续的累积更新版本。关键在于版本应晚于 CU10，并且你无需手动修补 SQL Server。\n\n### 回滚到先前的累积更新\n\
  \n虽然更新本身很不错，但真正引人入胜的是回滚功能。实际上，这并非严格意义上的回滚，而更像是一个*切换*的故事。这是因为 `SQL Server 的累积更新版本彼此兼容`。通过使用相同的卷和端口，你现在只需运行以下语句或脚本\
  \ `step5_dockerrollback.ps1` 即可切回 CU10：\n\n```\ndocker stop sql2017latest\ndocker\
  \ start sql2017CU10\n```\n\n由于容器的参数已被保存，你实际上只是在针对同一组系统和/或用户数据库，在已安装的 SQL Server\
  \ 版本之间进行切换。\n\n### 验证回滚\n\n运行以下命令或脚本 `step6_dockerconnecttosql.ps1` 来证明你已切回并正在运行\
  \ SQL 2017 CU10：\n\n```\nsqlcmd -Usa -PSql2017isfast '-Slocalhost,1401' '-Q\"SELECT\
  \ @@VERSION\"'\n```\n\n再次说明，你可能会遇到脚本升级错误，但很快，你的结果应显示版本为 SQL 2017 CU10。\n\n你现在可以根据需要来回切换。想象一下，甚至可以在本地服务器上预先拉取一系列用于生产环境的累积更新版本的镜像。然后，你可以根据应用或公司需求，使用任何你需要的累积更新版本启动容器。\n\
  \n真正具有吸引力的是使用容器在测试服务器上测试特定的累积更新，然后在合适的时候将其带到生产服务器进行更新。\n\n### 清理资源\n\n使用 `cleanup.ps1`\
  \ 脚本清理所有资源。如果你想删除所有资源但保留镜像以便更快地测试此序列，请使用 `reset.ps1` 脚本。\n\n## 将容器作为应用程序部署\n\n在某些情况下，你可能希望*自定义*\
  \ SQL Server 容器镜像。自定义容器涉及使用 SQL Server 容器镜像作为基础，并向容器镜像中添加文件。在许多情况下，这些文件是数据库备份和/或脚本文件。\n\
  \n自定义 SQL 容器镜像的一个场景是将多个容器作为一个应用程序进行部署。我的同事 Vin Yu 经常演示的一个例子是部署一个带有数据库的 SQL Server\
  \ 容器和一个 ASP.Net 应用程序。你可以在 [`https://docs.docker.com/compose/aspnet-mssql-compose/`](https://docs.docker.com/compose/aspnet-mssql-compose/)\
  \ 查看一个构建此类带有 SQL Server 的容器化应用程序的示例。\n\n一个非常有用的、用于构建多个容器镜像并基于这些镜像运行容器的工具是 `docker-compose`。Docker-compose\
  \ 允许你声明要构建的容器镜像的定义，以及基于这些镜像运行容器的参数。\n\n一个涉及 SQL Server 且需要多个容器的应用程序的绝佳示例是 SQL Server\
  \ 复制。由于 SQL Server 复制现已在 SQL Server 2019 中得到支持，容器提供了一种有趣的部署方式。在 2018 年，Vin Yu 和我需要在各种会议上展示\
  \ SQL Server on Linux 的新功能。我请 Vin 来介绍复制部分。在我们准备演示时，他让我看看他构建的东西。他说他使用容器通过一条命令部署了快照复制，包含发布者、分发者和订阅者。我对\
  \ Vin 的第一反应是“你不可能做到这一点。”我很喜欢他证明我错了这一点。让我们使用他为那次演示构建的示例（你也可以在我们的 GitHub 示例中找到：[`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/replication)）。\n\
  \n本示例的所有文件可在 `ch7_inside_sql_containers\\sqlrepl` 找到。因为我们将为此示例使用 `docker-compose`，所以不需要\
  \ PowerShell 与 bash 版本的脚本。我们将提供一组 Bash Shell 和 T-SQL 脚本，但它们*在每个容器的上下文中运行*。\n\n由于此示例只需一条命令即可部署和运行容器以部署\
  \ SQL Server 复制，因此在你运行之前，让我们先看看此示例提供的所有文件。\n\n### docker-compose.yml 文件\n\n`docker-compose`\
  \ 依赖于一个名为 `docker-compose.yml` 的声明性文本文件（这是一个 YAML 文件。YAML 代表另一种标记语言）。你可以使用不同的文件名，但默认情况下\
  \ `docker-compose` 会查找名为 `docker-compose.yml` 的文件。\n\n让我们看一下此示例的 `docker-compose.yml`\
  \ 文件。文件顶部的 version 标签声明了应使用的 `docker-compose` 版本（3 是最新版本，但你可以在 [`https://docs.docker.com/compose/compose-file/compose-versioning/`](https://docs.docker.com/compose/compose-file/compose-versioning/)\
  \ 阅读关于 Compose 版本控制的信息）。\n\n```\nservices:\ndb1:\nbuild: ./db1\nenvironment:\nSA_PASSWORD:\
  \ \"MssqlPass123\"\nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED: \"true\"\nports:\n\
  - \"2500:1433\"\ncontainer_name: db1\nhostname: db1\ndb2:\nbuild: ./db2\nenvironment:\n\
  SA_PASSWORD: \"MssqlPass123\"\nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED: \"true\"\
  \nports:\n- \"2600:1433\"\ncontainer_name: db2\nhostname: db2\n```\n\n有两个“服务”或容器将由\
  \ `docker-compose` 构建并执行，一个名为 `db1`，另一个名为 `db2`。\n\n`docker-compose` 的工作方法是首先构建一个容器镜像（如果提供了\
  \ `build` 子句），然后使用 `docker-compose.yml` 文件中的其他参数基于该镜像运行一个容器。\n\n子句\n\n```\nbuild:\
  \ ./db1\n```\n\n表示 `docker-compose` 应从当前目录切换到 `db1` 目录，并在该目录中执行 `docker build`。`db2`\
  \ 采用相同的概念。\n\nyml 文件中的其余定义指定了如何在每个目录中运行已构建的容器。\n\n```\nenvironment:\nSA_PASSWORD:\
  \ \"MssqlPass123\"\nACCEPT_EULA: \"Y\"\nMSSQL_AGENT_ENABLED: \"true\"\nports:\n\
  - \"2500:1433\"\ncontainer_name: db1\nhostname: db1\n```\n\n这些值中的每一个都被传递给用于在构建后运行容器的\
  \ `docker run` 命令。请注意此示例中 `MSSQL_AGENT_ENABLED` 的使用，因为 SQL Server 复制依赖于 SQL Server\
  \ 代理。\n\n\n\n### 构建每个容器\n\n让我们看看示例中提供的各个目录的内容，以便构建和运行用于复制的容器。我将使用这些文件的场景称为“Vin Yu\
  \ 方法”，用以构建 SQL Server 自定义容器镜像，以此向我的同事 Vin Yu 致敬，是他教会了我如何做到这一点。\n\n每个目录包含以下文件：\n\n\
  `Dockerfile` – 包含如何基于 SQL Server 容器镜像构建自定义镜像的定义。\n\n`entrypoint.sh` – 这成为容器要运行的主程序。它会启动一个名为\
  \ `db-init.sh` 的脚本和 `sqlservr` 程序。\n\n`db-init.sh` – 此脚本由 `entrypoint.sh` 调用，并将暂停一段时间，然后执行\
  \ `db-init.sql` 脚本。\n\n`db-init.sql` – 包含用于在 `db1` 上创建发布者、分发者、订阅者和快照发布的 T-SQL 代码。它将为\
  \ `db2` 创建订阅者数据库。实际上，Vin 所做的是将 SQL Server Management Studio 用于设置复制的构建过程脚本化，并以一种巧妙的方式保存为\
  \ T-SQL 执行。\n\n如果你查看 `db1` 和 `db2` 的 `Dockerfile`，它看起来是这样的：\n\n```dockerfile\nFROM\
  \ mcr.microsoft.com/mssql/rhel/server:2019-latest\nCOPY . /\nRUN chmod +x /db-init.sh\n\
  CMD /bin/bash ./entrypoint.sh\n```\n\n当 `docker-compose` 为每个容器执行“构建”阶段时，`Dockerfile`\
  \ 的定义指示：\n\n*   使用最新的 SQL Server RHEL 容器镜像作为基础（该镜像本身使用 RHEL 操作系统镜像作为基础）。\n*   将\
  \ `entrypoint.sh`、`db-init.sh` 和 `db-init.sql` 脚本复制到容器镜像的文件系统中。\n*   修改 `db-init.sh`\
  \ 脚本，使其成为可执行脚本（对于 `entrypoint.sh` 脚本，你不需要这样做）。\n*   使要运行的默认程序成为执行 `entrypoint.sh`\
  \ 脚本的 Bash shell。\n\n现在让我们看看 `entrypoint.sh` 脚本：\n\n```bash\n#启动 SQL Server，启动创建/设置数据库的脚本\n\
  #你需要一个非终止进程来保持容器运行。\n#在一系列由单个 & 分隔的命令中，最右侧 & 左边的命令会在后台运行。\n#因此——如果你使用单个 & 同时执行一系列命令，最右边的命令需要是非终止的。\n\
  /db-init.sh & /opt/mssql/bin/sqlservr\n```\n\n此脚本将首先执行 `db-init.sh` 脚本，并在执行的同时启动\
  \ `sqlservr` 程序（这就是 `&` 符号的含义，启动一个程序，然后运行下一个）。\n\n`db1` 的 `db-init.sh` 如下所示：\n\n\
  ```bash\n#等待 SQL Server 启动\nsleep 45s\nmkdir /var/opt/mssql/ReplData/\nchown mssql\
  \ /var/opt/mssql/ReplData/\nchgrp mssql /var/opt/mssql/ReplData/\necho \"正在运行设置脚本\"\
  \n#运行设置脚本以在数据库中创建 DB 和架构\n/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P MssqlPass123\
  \ -d master -i db-init.sql\n```\n\n由于 `db-init.sh` 首先启动，它必须等待 SQL Server 启动后才能执行任何\
  \ T-SQL 脚本。\n\n然后，它在容器的可写层中创建存储复制快照所需的一些目录。\n\n最后，此脚本使用 `sqlcmd`（存在于每个 SQL Server\
  \ 容器中）执行 `db-init.sql` T-SQL 脚本。\n\n`db1` 的 `db-init.sql` 相当长，但实际上包含用于设置发布者、分发者、订阅者和快照发布的\
  \ T-SQL 代码。\n\n`db2` 的 `db-init.sh` 也会暂停等待其 SQL Server 启动，然后执行其目录中的 `db-init.sql`\
  \ 脚本。`db2` 的 `db-init.sql` 只需要创建用于保存订阅者数据的数据库。\n\n这是一种相当有趣的自定义 SQL Server 容器的方法。相同的方法可用于自定义\
  \ SQL Server 容器以创建数据库并运行你自己的 T-SQL 脚本。从长远来看，我们希望有一种更好的方法来实现此类目标，这样你就不必手动在 shell\
  \ 脚本中“sleep”来执行自定义代码。就目前而言，这种方法效果很好。\n\n### 运行用于复制的容器\n\n通过以下两种方法之一亲自尝试：\n\n*  \
  \ 运行以下命令（在 Linux 上需加 `sudo` 前缀）。你必须位于 `ch7_inside_sql_containers\\sqlrepl` 目录中才能运行此命令。\n\
  \    ```\n    docker-compose up\n    ```\n    如果你使用此选项，容器不会在后台启动，因此你将在控制台上看到大量信息输出，包括\
  \ SQL Server 的 ERRORLOG 文件。此时请勿按 `<ctrl>+<c>`，否则你将关闭容器。\n\n*   如果你安装了 Docker 扩展，可以右键单击\
  \ `docker-compose.yml` 文件并选择“Compose Up”。此方法将在后台运行容器。\n\n## 注意\n\n在某些 Windows 10\
  \ 系统上，我见过图 7-6 所示的弹出窗口，涉及 Docker 所需网络服务的 Windows Defender 防火墙。如果你看到此窗口，请单击“允许访问”。\n\
  \n![图 7-6](img/479130_1_En_7_Fig6_HTML.jpg)\n\n图 7-6\n\nDocker 的 Windows 防火墙警告\n\
  \n为确保容器正确部署且 SQL Server 复制正在运行，首先要检查订阅者是否已复制数据。使用 Azure Data Studio 或 SQL Server\
  \ Management Studio (SSMS) 连接到 `localhost,2600`，并查看 `[Sales].[dbo].[customer]` 表是否有数据。它应该包含三行。\n\
  \n此外，你可以通过使用 SSMS 连接到订阅者来验证快照代理作业是否已成功应用。使用如图 7-7 所示的对象资源管理器检查快照作业状态。\n\n![图 7-7](img/479130_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\nSQL Server 复制容器的快照作业\n\n当 Vin 第一次向我展示这个时，我不得不停下来思考这种方法。自从它首次在 SQL Server\
  \ 6.0 中发明以来，我就一直在研究像复制这样的复杂系统。我从未想过会看到一种如此简单的方法来部署它。当然，SQL Server 复制可以更复杂，因此针对你的场景使用容器可能涉及更多内容。但是，请看看容器能为像\
  \ SQL Server 复制这样的分布式系统带来的前景。\n\n*   如果你是从命令行运行 `docker-compose up`，请按 `Ctrl+C`，这将停止容器。\n\
  *   你会想要清理资源，因此完成后，运行以下命令（在 Linux 上需加 `sudo` 前缀）。你必须位于 `ch7_inside_sql_containers\\\
  sqlrepl` 目录中才能运行此命令。\n    ```\n    docker-compose down\n    ```\n    这将停止并移除正在运行的容器。\n\
  \    这不会移除 Docker 自定义镜像，因此要清理所有资源，请使用 `cleanup.ps1` 或 `cleanup.sh` 脚本来移除自定义镜像。\n\
  \n### 在生产环境中部署 SQL 容器\n\n自从我们通过 SQL Server 2017 开始支持容器以来，我一直在介绍和谈论容器。即使我用“容器实际上只是以独特方式运行的\
  \ `sqlservr` 程序”这样的故事来介绍这个主题时，我也面临着一些怀疑，即 SQL Server 容器能否用于生产工作负载。我希望通过本节中关于 SQL\
  \ Server 容器的性能、安全性、可用性、资源控制和服务器配置的信息，能够说服一些怀疑论者。\n\n\n\n### 性能\n\n在我谈论容器的过程中，我听到的一个传言是，SQL\
  \ Server 容器的性能可能不如未运行在容器中的 SQL Server 实例。我已经阐明，SQL Server 容器本质上就是一个以隔离方式运行的程序，并且可以直接访问操作系统资源。因此，对于\
  \ SQL Server Linux 容器，你可以预期获得与未运行在容器中的 SQL Server on Linux **完全相同**的性能。\n\n不过，如果你像我一样，你可能需要一些证据证明。因此，我使用了名为\
  \ `HammerDB` (`www.hammerdb.com`) 的开源基准测试工具，并采用基于 TPC-H 衍生的分析性能测试运行了一项测试。我在同一台主机\
  \ Linux 虚拟机上，比较了运行在容器中的 SQL Server on Linux 与容器外的 SQL Server on Linux 使用 `HammerDB`\
  \ 测试的性能。通过这些部署方式，我发现性能**完全一致**。\n\n我鼓励你自己尝试一下。以下是我如何使用 `HammerDB` 进行此测试的详细信息：\n\n\
  *   我在 Azure 中的一个 Windows 10 虚拟机上安装了 `HammerDB` 工具。\n*   我创建了一个使用 RHEL 7.4 的 Azure\
  \ VM，大小为 DS13 v2（8 个 vCPU，56GB RAM）。\n*   我创建了一个 2TB 的高级 SSD 来托管 `HammerDB` 的数据库。我将此驱动器挂载到\
  \ Linux 上的一个目录中，并将其命名为 `/data`。这是我用来向 Azure VM 中的 Linux 添加数据磁盘的指南 (`https://docs.microsoft.com/en-us/azure/virtual-machines/linux/attach-disk-portal`)。\n\
  *   在主机 Linux 虚拟机中安装了 SQL Server 2019 CTP 3.2。\n*   我预先创建了大小为 35GB、日志为 5GB 的 `tpch`\
  \ 数据库。我使用了比例因子 10 和 16 个虚拟用户（Windows VM 客户端是一个 8 核 VM）。\n\n#### 提示\n\n当使用最新版本的 `HammerDB`\
  \ 时，请将驱动程序更改为“ODBC Driver 17 for SQL Server”，并使用聚集列存储索引。\n\n*   然后，我使用 16 个虚拟用户运行了\
  \ TPC-H 测试。在针对 SQL Server 容器和同一 VM 上安装的容器外的 SQL Server（我一次只运行其中之一）运行 `HammerDB`\
  \ 时，我都能够实现约 160,000 qph 的性能。\n\n我鼓励你自己运行这样的测试，或者对 SQL Server 容器进行任何其他性能测试。只要确保你在容器和容器外的\
  \ SQL Server 之间进行的是公平的比较。\n\n### 安全性\n\n由于 SQL Server 容器只是以隔离程序形式运行的 SQL Server\
  \ on Linux，因此 SQL Server on Linux 的所有安全能力和功能都适用于容器。这包括 SQL Server 引擎的所有登录、安全对象和主体的安全功能。像动态数据屏蔽、行级安全性、透明数据加密（TDE）等功能都适用于容器。\n\
  \n### Active Directory 身份验证\n\n唯一例外是完整的安全功能集是 Active Directory（AD）身份验证。在构建 SQL Server\
  \ 2019 的生命周期内，我们的意图是记录并支持容器的 Active Directory 身份验证。它仍然可能出现在我们的最终版本中。但在我撰写本章时，我与我们\
  \ Linux 和容器的首席开发人员之一 Dylan Gray 讨论了这项支持。如果在我们发布 SQL Server 2019 时，AD 支持尚未被记录和可用，我预计它将在\
  \ SQL Server 2019 发布后不久推出。\n\nDylan 和我讨论了记录在案的过程会是什么样子，它与为不使用容器的 SQL Server on Linux\
  \ 设置 AD 身份验证非常相似，你可以在 (`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-active-directory-authentication`)\
  \ 阅读。关键区别将是，需要通过一个 SQL Server 容器可以使用的卷中的 keytab 文件，将有关 Kerberos SPN 的信息传递给容器。我有几个客户告诉我，拥有\
  \ AD 身份验证是在生产环境中使用 SQL Server 容器的关键要素，我们打算满足这一请求和要求。\n\n### 非 root 容器\n\n自从我们发布\
  \ SQL Server 容器以来，容器程序都是在容器命名空间中的 root 用户上下文下运行的。即使一个 root 容器程序并不拥有对宿主机的完全 root\
  \ 权限，最佳实践仍然是不要以 root 身份运行容器程序。\n\nSQL Server 2019 将支持非 root 容器。事实上，当我与我们的容器首席开发人员之一\
  \ Madeline McDonald 谈论对非 root 容器的支持时，她告诉我，我们的意图是在发布 SQL Server 2019 时，默认将所有 SQL\
  \ Server 2019 容器作为非 root 容器发布，但 SQL Server 2017 容器则“保持原样”。\n\n我询问 Madeline 将 SQL\
  \ Server 2017 或 SQL Server 2019 CTP 容器作为非 root 运行的过程是什么，她给了我一个示例来尝试。\n\n尝试一下我在 `ch7_inside_sql_containers\\\
  nonroot` 文件夹中提供的脚本和文件。你将使用 `Dockerfile` 来构建一个自定义容器。`Dockerfile` 如下所示：\n\n```\nFROM\
  \ mcr.microsoft.com/mssql/rhel/server:2019-latest\nRUN useradd -u 10001 -g root\
  \ mssql\nRUN mkdir -p -m 770 /var/opt/mssql && chgrp -R 0 /var/opt/mssql\nUSER mssql\n\
  CMD [\"/opt/mssql/bin/sqlservr\"]\n```\n\n注意 `RUN` 命令，它将为 `mssql` 添加一个用户和组，并为 `mssql`\
  \ 组预先创建 SQL Server 目录以设置权限。`Dockerfile` 的 `USER` 命令指示在哪个用户上下文下运行容器程序。其余部分与当今运行 SQL\
  \ Server 容器相同。使用 `docker build` 构建 Docker 镜像，然后使用我提供的脚本来运行容器。\n\n### 高可用性\n\nSQL\
  \ Server 容器支持基本的备份和还原，甚至日志传送也可以工作。我已经向你展示了使用 SQL Server 复制的一个例子，这对某些客户来说可以是一种高可用解决方案。\n\
  \n尽管在容器之间建立 Always On 可用性组是可行的，但容器首选的高可用方法是使用 `Kubernetes`。我将在第 8 章讨论如何使用 `Kubernetes`\
  \ 实现 SQL Server 的高可用性。\n\n\n\n"
- '# 资源控制


  默认情况下，SQL Server 容器（如同所有容器）可以访问主机服务器上的所有 CPU 和内存资源。Docker 提供了一种方法来控制和管理任何容器对这些资源的访问。例如，`docker
  run` 命令提供了以下选项：


  `-m` – 控制容器可访问的内存量。


  `-cpuset-cpus` – 控制容器内的线程可以在哪些 CPU 上运行。使用此选项时请务必小心。SQL Server 不会基于此选项限制调度器的数量。但是，Docker（使用
  cgroups）将强制规定所有 SQL Server 线程在哪些 CPU 上运行。如果您使用此选项，我建议结合使用 SQL Server 亲和性配置 `ALTER
  SERVER CONFIGURATION`。


  您可以在 [`https://docs.docker.com/config/containers/resource_constraints/`](https://docs.docker.com/config/containers/resource_constraints/)
  阅读更多关于 Docker 容器资源使用的内容。


  虽然这些选项确实有效，但对于 SQL Server，我建议您使用 SQL Server 配置的内置功能来控制内存和 CPU 资源。


  例如，考虑以下您可用的选项：


  `memorylimitmb` – 此选项控制在 Linux 上暴露给 SQL Server 使用的物理内存量。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#memorylimit)
  阅读更多关于此选项的内容。


  `"max server memory"` – 此 `sp_configure` 选项对于 SQL Server 用户非常熟悉，用于控制 SQL Server
  引擎在 `memorylimitmb` 空间内使用的内存量。


  `ALTER SERVER CONFIGURATION` – 此 T-SQL 命令允许您设置 SQL Server 将运行于哪些 NUMA 节点和/或 CPU
  的亲和性。您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-server-configuration-transact-sql)
  阅读更多关于此选项的内容。


  `Resource Governor` – 资源调控器有助于控制 CPU、内存和 I/O 资源，特别是在应用程序或工作负载级别。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/resource-governor)
  阅读更多关于资源调控器的内容。


  公平地说，并非在 Linux 上运行于 `sqlservr` 中（使用 SQLPAL）的所有内容都受这些 T-SQL 选项控制。由 SQL Agent、DTC、Polybase
  或运行在 SQLPAL 内的、位于 SQL 引擎之外的其他代码进行的处理，在作为容器运行时可能需要一些资源控制，如果您有需要，本节列出的 Docker 选项可能会有用。然而，绝大多数的
  CPU 和内存消耗来自数据库引擎，而 SQL 提供了相应的选项让您能实现所需的控制。


  '
- '# 服务器或数据库配置


  在本节中，我列出了几个您可能需要考虑的 SQL Server 配置选项。此外，`mssql-conf` 脚本、T-SQL `sp_configure` 和 `ALTER
  SERVER CONFIGURATION` 还提供了许多其他选项。此外，数据库在创建时或通过 `ALTER DATABASE` 还有许多其他配置选项。


  虽然可以使用 T-SQL 语句修改正在运行的 SQL Server 容器，但在使用容器时，您应仔细考虑这是否是正确的策略。例如，如果您对需要重启的容器应用了 `sp_configure`
  更改，您将必须重启容器才能使更改生效。此外，您需要确保为系统数据库使用持久化卷，这样您的更改才不会丢失。


  另一个选项是构建一个自定义镜像（就像本章中为复制示例展示的容器那样），在 SQL Server 启动后运行您所需的任何配置脚本。


  例如，假设您希望确保您的 SQL Server 对环境中的任何 SQL Server 容器强制执行特定的 `max degree of parallelism`
  值。一种方法是构建一个自定义容器镜像，其中包含一个设置所需 `maxdop` 值的脚本。您甚至可以为此打标签和命名，以便您知道为某个 SQL 容器使用的选项。现在，这些用于构建容器的脚本以及
  T-SQL 脚本可以成为您的变更控制和 CI/CD 生命周期的一部分。


  这种方法唯一的缺点是针对那些不需要重启 SQL Server 实例（或数据库实例）的配置更改。对于这些情况，您仍然可以构建一个包含新所需配置更改的特定容器镜像，但也可以直接将配置更改应用到正在运行的
  SQL Server。


  另一个有趣的问题是应用需要重启的配置更改（这种情况比您想象的要少）。然而，如果您确实遇到这种情况，您将必须在应用配置更改并启动容器后立即重启它。


  对于任何 `mssql-conf` 更改，您应使用与您想要设置匹配的环境变量，正如本章中 `docker run` 示例所示。一个使用此选项进行 DTC 配置的绝佳示例可以在
  [`https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc`](https://github.com/microsoft/sql-server-samples/tree/master/samples/containers/dtc)
  找到。如果由于某种原因，某个 `mssql-conf` 设置没有对应的等效环境变量设置，您可以创建一个包含预先创建的 `mssql.conf` 文件的自定义镜像。您可以使用如下的
  Dockerfile：


  ```

  FROM microsoft/mssql-server-linux:latest

  COPY ./mssql.conf /

  RUN mkdir /var/opt/mssql

  RUN mv ./mssql.conf /var/opt/mssql

  CMD ["/opt/mssql/bin/sqlservr"]

  ```


  其中您的 `mssql.conf` 文件包含了所有需要的配置值。您可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#mssql-conf-format)
  了解此文件的协议格式。


  '
- '# 使用其他包


  我已经告诉过您，SQL Server 容器镜像包含数据库引擎、SQL Server Agent，并包含复制和 DTC 等功能。Linux 上的 SQL Server
  是基于包的概念构建的。像 Polybase 这样的功能不包含在标准的 SQL Server 包中，也不在 SQL Server 容器镜像中。


  我们为您构建了一系列示例，指导您如何基于 SQL Server 镜像构建自己的自定义镜像，添加您希望在容器中包含的包。您可以在 [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples)
  找到这些示例。




  ### 版本与许可


  默认情况下，如本章所示，当你拉取并运行 SQL Server 容器镜像时，我们自动使用的是 SQL Server **开发人员版**。如你所知，开发人员版不支持用于生产环境。


  因此，在运行 SQL Server 容器时，你可以使用 `MSSQL_PID` 环境变量来指明 SQL Server 的版本。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker#production`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-docker%2523production)
  阅读更多关于使用此选项的信息。


  关于容器，我收到的最常见问题之一是容器如何获得许可。


  随着 SQL Server 2017 的发布，我们更新了许可指南，其中包含了关于容器的讨论。你可以从 [`www.microsoft.com/en-us/sql-server/sql-server-2017-pricing`](https://www.microsoft.com/en-us/sql-server/sql-server-2017-pricing)
  下载该指南。请特别查看 "`Licensing SQL Server 2017 in Containers`"（`在容器中许可 SQL Server 2017`）这一节（SQL
  Server 2019 发布时会有新的指南）。容器的许可方式与虚拟机类似。对于许多用户，完整的基于核心的许可模型适用。你应该阅读的一个有趣的例外情况是，拥有软件保障（SA）的企业版客户可获得一项福利。根据指南，“……在所有企业版核心许可证上增加软件保障（SA）覆盖（针对一个完全获得许可的服务器）后，客户的使用权限得以扩展，允许在许可的服务器上运行任意数量的容器。这项宝贵的
  SA 福利使客户能够部署无限数量的容器来处理动态工作负载，并充分利用硬件计算能力。”


  ## SQL Server Windows 容器


  到目前为止，本章中关于容器的所有讨论都是基于 Linux 镜像的 SQL Server 容器。你已经看到这些容器可以在任何平台上运行，包括 Linux、Windows
  和 macOS。


  然而，Windows 团队已经基于 Windows 镜像构建了在 Windows 中原生运行容器的能力。我们在 2019 年夏天宣布了一项私人预览计划，以支持基于
  Windows 镜像的 SQL Server 容器。


  本章中我讨论的许多相同概念几乎都适用于此。这部分归功于 SQL Server 在 Windows 和 Linux 上出色的兼容性。关键差异将体现在 Windows
  和 Linux 有所不同的某些方面，例如 Active Directory 的配置。此外，当你想要直接与容器交互时，通常会使用 PowerShell 或命令行
  shell。


  Windows 支持与 Linux 相同的概念来使容器成为一个引人注目的方案，包括通过命名空间实现的隔离。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/)
  阅读更多关于 Windows 容器工作原理的信息。


  Windows 在容器方面提供了一个与 Linux 略有不同的选项。容器可以以两种隔离模式运行：


  `进程隔离` – 容器作为使用命名空间的隔离进程运行。


  `Hyper-V 隔离` – 容器在一个“特殊”的虚拟机中运行（这是文档使用的术语，不是我的）。


  你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container)
  阅读更多关于这些隔离模型的信息。


  在 Windows 版 Docker Desktop 上，你**只能**运行 Windows 容器或 Linux 容器中的一种。（注：当 Docker for
  WSL2 可用时，这应该会改变。你可以在 [`https://engineering.docker.com/2019/06/docker-hearts-wsl-2/`](https://engineering.docker.com/2019/06/docker-hearts-wsl-2/)
  阅读更多相关信息。）


  默认情况下，Docker Desktop 支持 Linux 容器。要切换到使用 Windows 容器，请从 Windows 系统托盘中的 Docker 图标选择该选项，如图
  7-8 所示。


  ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig8_HTML.jpg](img/479130_1_En_7_Fig8_HTML.jpg)


  图 7-8


  使用 Docker Desktop 切换到 Windows 容器


  在最新版本的 Windows 10 和 Windows Server 2019 上，Windows 容器支持 Hyper-V 隔离和进程隔离。你可以在 [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/quick-start/quick-start-windows-server)
  阅读更多关于 Windows Server 2019 上 Windows 容器的信息。我也鼓励你阅读 Windows 容器的常见问题解答（FAQ）[`https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/about/faq)。


  此外，Windows Server 2019 支持 Windows 上的 Linux 容器（LCOW），它使用 Hyper-V 隔离来支持 Linux 容器。你可以在
  [`https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers`](https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/linux-containers)
  阅读更多关于 LCOW 的信息。这使得 Windows Server 几乎成为唯一一个能同时运行 Windows 和 Linux 容器的平台（你可以在 macOS
  上安装一个 Windows 虚拟机来运行 Windows 容器，但 Windows Server 是唯一“原生”支持这些场景的平台）。


  我在 Windows Server 2019 系统上尝试了早期私人预览形式的 Windows 容器。


  以下是用于 SQL Server Windows 容器的 Hyper-V 隔离和进程隔离的 `docker run` 命令示例语法：


  ```

  docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1401:1433
  --isolation=process -d -e ''MSSQL_PID=Developer'' --name sql1 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

  docker run -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=SafePassw0rd'' -p 1402:1433
  --isolation=hyperv -d -e ''MSSQL_PID=Developer'' --name sql2 private-repo.microsoft.com/mssql-private-preview/mssql-server:windows-ctp3.1

  ```


  你可以看到语法与 Linux 容器几乎完全相同。注意 `--isolation` 参数的语法。


  我使用著名的 Sysinternals 工具 Process Explorer（[`https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer`](https://docs.microsoft.com/en-us/sysinternals/downloads/process-explorer)）来查看进程隔离下
  `sqlservr` 程序的样子。如图 7-9 所示，类似于 docker 守护进程，一个名为 `CExecSvc` 的程序负责派生（forking） `sqlservr`
  容器程序。


  ![../images/479130_1_En_7_Chapter/479130_1_En_7_Fig9_HTML.jpg](img/479130_1_En_7_Fig9_HTML.jpg)


  图 7-9


  进程隔离模式下的 SQL Server Windows 容器


  关于 Hyper-V 隔离的文档不多，只知道容器程序托管在一个名为 `vmwp.exe` 的 Windows 程序中。


  我希望当你读到这本书时，我们在 SQL Server Windows 容器方面的工作已经取得进展，因为我相信许多客户希望实现容器的承诺，但由于各种原因无法或不能使用基于
  Linux 的容器。我个人认为，如果 LCOW 容器性能良好，那么许多客户最终可能会在他们的 Windows Server 上拥有 Windows 和 Linux
  容器混合的环境。




  ## 总结


  这是一个非常长的章节，需要耐心阅读和消化。我介绍了什么是容器，以及它为何能解决托管 SQL Server 等产品和开发应用程序所面临的现代挑战。容器具有可移植、轻量、一致和高效的特点。


  我向你描述并展示了，容器本质上就是以隔离且独特方式运行的程序。你了解了 SQL Server 2019 为容器带来的新增强功能，包括 RHEL 镜像和新的 Microsoft
  容器注册表。


  如果你学习了本章的其他内容，你就有机会亲自尝试几个示例，包括部署容器、体验更新（及回滚）SQL Server 的全新高效方式，以及部署像 SQL Server
  复制这样的多容器应用程序。


  你了解了容器已经为生产环境做好了准备，无论你之前可能听到过什么说法，包括 SQL Server 容器的性能、安全性和可用性。


  最后，你还对 SQL Server Windows 容器的未来面貌进行了一番预览。


  希望你现在已经对 SQL Server 容器有了扎实的理解，并准备好学习一个专为部署和扩展容器而构建的平台——Kubernetes。


