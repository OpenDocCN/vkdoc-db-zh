  \          3/3     Running   0          24h\ngateway-0         2/2     Running \
  \  0          24h\nlogsdb-0          1/1     Running   0          24h\nlogsui-f42ln\
  \      1/1     Running   0          24h\nmaster-0          3/3     Running   0 \
  \         24h\nmetricsdb-0       1/1     Running   0          24h\nmetricsdc-gtrxn\
  \   1/1     Running   0          24h\nmetricsui-kwh4q   1/1     Running   0    \
  \      24h\nmgmtproxy-nc8tl   2/2     Running   0          24h\nnmnode-0-0     \
  \   2/2     Running   0          24h\nsparkhead-0       4/4     Running   0    \
  \      24h\nstorage-0-0       4/4     Running   0          24h\nstorage-0-1    \
  \   4/4     Running   0          24h\n```\n\n基于此列表和我到目前为止描述的概念，你可能可以猜到一些 Pod 如何映射到图\
  \ 10-7。`READY` 列中的数字显示了每个 Pod 中运行的容器数量。这意味着用于“开发/测试”的简单 BDC 集群大约有 43 个容器！\n\n让我们使用此列表将\
  \ k8s 集群中的 Pod 映射到图 10-7 的组件，包括 `pools` 的概念。\n\n### SQL Server 主实例\n\nSQL Server\
  \ 主实例由 Pod `master-0` 表示。在此 Pod 中运行的主要容器是一个 SQL Server Linux 容器。你可以使用以下命令来获取 BDC\
  \ 如何部署 SQL Server 容器的详细信息：\n\n```\nkubectl describe pod master-0 --namespace mssql-cluster\n\
  ```\n\n我们组织 BDC 的一个重要方面是使用 Kubernetes 的标签。我在第 8 章中介绍了如何在 SQL Server 和 k8s 中使用标签。查看上述命令输出的这一部分：\n\
  \n```\nLabels:             MSSQL_CLUSTER=mssql-cluster\napp=master\ncontroller-revision-hash=master-7bbc4d95fb\n\
  mssql.microsoft.com/sql-instance=master\nplane=data\nrole=master-pool\nstatefulset.kubernetes.io/pod-name=master-0\n\
  type=sqlservr\n```\n\n你可以看到我们如何使用其中一些标签映射到 BDC 中的术语。例如，这两个标签很有意思：\n\n```\nplane=data\n\
  role=master-pool\n```\n\n如果你运行以下命令，你可以看到“数据平面”中的所有 Pod：\n\n```\nget pods --namespace\
  \ mssql-cluster -lplane=data\n```\n\n在我的 BDC 上，我得到以下输出：\n\n```\nNAME           \
  \  READY   STATUS    RESTARTS   AGE\nappproxy-q8zkk   2/2     Running   0      \
  \    24h\ncompute-0-0      3/3     Running   0          24h\ndata-0-0         3/3\
  \     Running   0          24h\ndata-0-1         3/3     Running   0          24h\n\
  master-0         3/3     Running   0          24h\nnmnode-0-0       2/2     Running\
  \   0          24h\nsparkhead-0      4/4     Running   0          24h\nstorage-0-0\
  \      4/4     Running   0          24h\nstorage-0-1      4/4     Running   0  \
  \        24h\n```\n\n此列表代表了图 10-7 中的大部分主要组件，除了我将在下一节“控制器”中描述的 `Controller`。\n\n\
  如果你进一步查看前面 `kubectl describe pod` 命令的输出，你将看到 SQL Server 容器的详细信息，从以下开始：\n\n```\n\
  Containers:\nmssql-server:\n```\n\n如果你回顾第 8 章，在 k8s 中用于 SQL Server 的 Pod 所涉及的重要组件是\n\
  \n*   容器镜像\n*   持久卷声明\n*   密钥\n*   负载均衡器\n*   副本集\n\n前面 `kubectl describe` 命令的输出显示了所有这些组件。\n\
  \n你可以在这个部分看到 SQL Server 容器的 `container image`（请记住我当时使用的是 SQL Server 2019 大数据集群版本）：\n\
  \n```\nImage:          mcr.microsoft.com/mssql/bdc/mssql-server-data:2019-RC1-ubuntu\n\
  ```\n\n在输出的后面部分，你将看到一个 `mounts` 列表，它描述了挂载到 `PersistentVolumeClaim` 对象的持久化存储。\n\n\
  注意这个挂载：\n\n```\n/var/opt from data (rw)\n```\n\n以及这个 Volume\n\n```\nVolumes:\ndata:\n\
  Type:       PersistentVolumeClaim (a reference to a PersistentVolumeClaim in the\
  \ same namespace)\nClaimName:  data-master-0\nReadOnly:   false\n```\n\n如果你还记得第\
  \ 8 章，我向你展示了如何将像 `/var/opt` 这样的 SQL Server 目录映射到 PVC 对象。\n\n你可以运行此命令来查看 PVC 对象的详细信息：\n\
  \n```\ndescribe PersistentVolumeClaim data-master-0 --namespace=mssql-cluster\n\
  ```\n\n从这个输出中，你可以看到这个 PVC 对象绑定到 AKS 的默认 `StorageClass`，大小为 15Gb。当然，这对于存储你的 SQL Server\
  \ 数据来说并不是很大，但这只是一个测试集群。如果你需要为自定义配置更改这些大小，你可以阅读我们的文档 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-data-persistence)\
  \ 来了解如何操作。\n\n\n第 8 章中提到的 SQL Server 秘钥用于控制连接 SQL Server 的`sa`密码。BDC 的部署包含一个名为`MSSQL_SA_PASSWORD`的环境变量，在使用\
  \ Python 部署脚本时系统会提示我输入该密码。对于 SQL Server 主实例，我们创建了一个名为`mssql-sa-password`的秘钥。\n\n\
  如果你还记得在第 8 章中，我展示了如何为 pod 中的 SQL Server 创建一个`LoadBalancer`服务以连接到 SQL Server。我们的\
  \ BDC 部署工具会为 SQL Server 主实例创建一个这样的服务。要查看此服务的确切对象，你可以运行以下命令：\n\n```\nkubectl get\
  \ service --namespace=mssql-cluster -lrole=master-pool\n```\n\n输出将显示`master-svc-external`服务以及一个外部\
  \ IP 和端口。\n\nSQL Server pod 的最后一个组件是`ReplicaSet`。我在第 8 章向你展示了`ReplicaSet`如何为 k8s\
  \ 上的 SQL Server 提供“基础高可用性”。对于 BDC，我们使用一个称为`StatefulSet`的概念，它提供与`ReplicaSet`类似的高可用性功能，但能力更强。在\
  \ BDC 中，除控制器外，所有 pod 都使用`StatefulSet`对象。`StatefulSet`对象允许对 pod 进行排序和扩展，是实现 BDC 稳健高可用性的关键组件。我将在本章后面的“高可用性”一节中更详细地讨论\
  \ BDC 的高可用性。\n\n如果你查看`kubectl describe`命令的输出，你会看到这一部分：\n\n```\nControlled By:  \
  \    StatefulSet/master\n```\n\n你可以通过运行以下命令获取更多关于我们如何定义`StatefulSet`的信息：\n\n```\n\
  kubectl describe StatefulSet master --namespace=mssql-cluster\n```\n\n你还会注意到在`master-0`\
  \ pod 中有另外两个容器：\n\n```\ncollectd:\nfluentbit:\n```\n\n这些容器是 BDC 中每个 pod 的一部分，用于帮助收集管理和监控\
  \ BDC 所需的日志和指标。\n\n我们的文档提供了关于 SQL Server 主实例的信息，位于 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-master-instance)。我将在本章后面的“使用大数据集群”一节中更详细地讨论如何使用\
  \ SQL Server 主实例。\n\n### 控制器\n\n控制器是一个逻辑术语，代表一组 pod 和容器。你可以使用以下命令找到控制器中的 pod 列表：\n\
  \n```\nkubectl get pods --namespace mssql-cluster -lplane=control\n```\n\n以下是我的\
  \ BDC 部署中的 pod 列表：\n\n```\nNAME              READY   STATUS    RESTARTS   AGE\n\
  control-vjwjf     3/3     Running   0          38h\ncontroldb-0       2/2     Running\
  \   0          38h\ncontrolwd-l8fmp   1/1     Running   0          38h\ngateway-0\
  \         2/2     Running   0          38h\nlogsdb-0          1/1     Running  \
  \ 0          38h\nlogsui-f42ln      1/1     Running   0          38h\nmetricsdb-0\
  \       1/1     Running   0          38h\nmetricsdc-gtrxn   1/1     Running   0\
  \          38h\nmetricsui-kwh4q   1/1     Running   0          38h\nmgmtproxy-nc8tl\
  \   2/2     Running   0          38h\n```\n\n控制器也被称为控制平面，很类似于 Kubernetes 的控制平面概念（[`https://kubernetes.io/docs/concepts/#kubernetes-control-plane`](https://kubernetes.io/docs/concepts/%2523kubernetes-control-plane)）。图\
  \ 10-8 展示了 BDC 控制平面组件的特写。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig8_HTML.jpg](img/479130_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\nBDC 控制平面\n\n你应该将控制器视为一组用于管理 BDC 的服务。管理的任务之一是部署，控制器用于帮助部署 BDC。一旦`azdata`部署了控制器，控制器就会“接管”并部署\
  \ BDC 的其他组件。控制平面中运行的所有 pod 都使用 k8s 的`ReplicaSet`概念来实现基础高可用性。\n\n控制器最重要的组件之一是控制器服务（在图\
  \ 10-8 中也列为控制服务）。控制器服务实际上是 BDC 的 API 服务器。该服务接受 REST API 以执行 BDC 的所有类型的操作，包括部署、管理、数据虚拟化等。你将使用几种不同的方法与控制器服务交互，包括`azdata`、T-SQL\
  \ 外部表和 Azure Data Studio (ADS)。\n\n在撰写本文时，尚无关于使用控制器服务特定 API 协议的公开文档。所有 API 都可以通过`azdata`、Azure\
  \ Data Studio (ADS)和 T-SQL 语句访问。\n\n### 提示\n\nAzure Data Studio (ADS) 无需`azdata`即可连接并与\
  \ BDC 交互。因此，其开源代码中存在与控制器服务交互的 REST API 示例，位于 [`https://github.com/microsoft/azuredatastudio`](https://github.com/microsoft/azuredatastudio)。虽然你可以在源代码中阅读这些示例，但我不建议你依赖它们，因为我们可能会更改它们。此外，没有方法让你在\
  \ BDC 内安装程序并使用证书获得访问权限。\n\n控制平面中的其他 pod 实现了支持各种服务连接的代理（proxy）、用于日志记录的 Kibana 和 Elasticsearch、用于指标和监控的\
  \ Grafana 和 InfluxDB，以及一个用于存储 BDC“元数据”的 SQL Server。\n\n用于存储元数据的 SQL Server 容器是一个普通的\
  \ SQL Server 实例，但它是“私有的”。换句话说，你永远不能连接到这个实例。控制器容器使用这个 SQL Server 来读取管理和健康状况的重要数据，同时也用于\
  \ HDFS 查询功能。\n\n我喜欢弄清楚事物的工作原理，因此我使用以下技术在这个特殊的 SQL Server 容器内运行了一个 Bash shell。托管此容器的\
  \ pod 名称为`controldb-0`。\n\n我使用以下命令运行 Bash shell 并连接到 SQL Server 容器：\n\n```\nkubectl\
  \ exec -it controldb-0 --namespace=mssql-cluster -- /bin/bash\n```\n\n这将我连接到 pod\
  \ 中的第一个容器，即 SQL Server。事实证明，我们基于核心 SQL Server 镜像构建了这个 SQL Server 镜像，其中安装了`sqlcmd`。\n\
  \n我需要`sa`密码来使用`sqlcmd`，但它不是用于连接到 SQL Server 主实例的`sa`密码。它是一个仅由控制器使用的私有密码。我发现我们将`sa`密码的秘钥存储在容器内的`/var/run/secrets/credentials/mssql-sa-password/password`。使用该密码字符串，我使用`sqlcmd`连接并发现容器中安装了这些数据库：`health_system`、`controller`和`hive_metastore`。这些是\
  \ BDC 内部使用的数据库。这是一个用于内部 BDC 功能的 SQL Server 容器示例，与用于正常 SQL Server 用途以及通过 HDFS 和其他数据源进行数据虚拟化的\
  \ SQL Server 主实例不同。\n\n\n\n### 存储池\n\n我在第 9 章描述了 Polybase 如何允许你访问 SQL Server 之外的数据源，包括\
  \ HDFS 数据。通过 Polybase 访问 HDFS 会将 T-SQL 查询转换为 Java MapReduce 作业来访问 HDFS 数据。\n\nBDC\
  \ 为你部署了自己的 HDFS 集群，以便你既可以通过 Polybase 访问 HDFS 数据，也可以通过 **Knox Gateway**（ [`https://knox.apache.org/`](https://knox.apache.org/)\
  \ ）经由 Controller 直接访问。\n\n图 10-9 更详细地展示了 HDFS 集群在 BDC 中如何作为 *存储池* 进行部署。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig9_HTML.jpg](img/479130_1_En_10_Fig9_HTML.jpg)\n\
  图 10-9 BDC 存储池\n\n存储池由一个或多个 k8s Pod 组成。默认情况下，使用 aks-dev-test 配置会部署两个存储池 Pod。如果你使用\
  \ `kubectl describe` 查看存储池中的 Pod，你会看到它们通过标签 `role=storage-pool` 绑定在一起。你可以通过自定义配置指定副本数（Replicas）来扩展更多的存储池\
  \ Pod。\n\n在我部署在 BDC 上的 Pod 列表中，代表存储池的 Pod 如下：\n```\nstorage-0-0      4/4     Running\
  \   0          24h\nstorage-0-1      4/4     Running   0          24h\n```\n\n存储池\
  \ Pod 是它们自己 StatefulSet 的一部分，因此，对于 BDC 配置中的两个副本，你会在一个 StatefulSet 中得到两个 Pod。\n\n\
  存储池中的每个 Pod 包含四个容器（安装了 collectd 和 fluentbit），其中一个容器用于 **Hadoop** 组件，另一个用于 **SQL\
  \ Server**。运行 YARN 和 HDFS 的容器（容器名称为 Hadoop）承载 Hadoop 组件。YARN 是 Hadoop 组件（包括 Spark\
  \ 作业）在集群中运行的资源管理器（你可以在 [`https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html`](https://hadoop.apache.org/docs/current/hadoop-yarn/hadoop-yarn-site/YARN.html)\
  \ 阅读更多关于 YARN 的信息）。HDFS 提供 Hadoop 分布式文件系统功能。BDC 还部署了一个 HDFS 名称节点（Name Node）用于存储元数据并控制对\
  \ HDFS 集群的访问。\n\nYARN 和 HDFS 的部分能力是分布式计算和存储，这意味着当你通过 T-SQL 和 Spark 与存储池交互和使用时，你的计算和存储是内置分布式系统的一部分。\n\
  \nSQL Server 容器在 BDC 系统中扮演着特殊的角色。注意图 10-9 中名为“直接从 HDFS 读取”的连接器。这意味着存储池 Pod 中的 SQL\
  \ Server 容器可以直接从 HDFS 存储读取数据，包括 csv 和 parquet 等文件类型。你不会直接连接到这些 SQL Server 容器；它们在\
  \ BDC 内部使用，以优化对 BDC 集群中 HDFS 文件的访问。Controller 服务将针对 BDC 中 HDFS 的外部表查询重定向到这些 SQL\
  \ Server 实例（可能会通过计算池）。\n\n如果你有自己的 HDFS 系统，可以使用称为 HDFS 分层（HDFS Tiering）的概念将其挂载到存储池中。你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering)\
  \ 阅读关于 HDFS 分层的信息。\n\n### 计算池\n\n上一节关于存储池的图 10-9 也展示了 *计算池* 的概念。计算池是一个 Pod 的 StatefulSet，实现了我在第\
  \ 9 章讨论的 **Polybase 扩展组**。\n\n计算池可以通过使用副本数自定义 BDC 部署的配置来扩展。默认情况下，aks-dev-test 配置仅部署一个计算池\
  \ Pod（文档也称之为实例）。\n\n如果存在计算池，所有通过 BDC 的外部表查询都将使用计算池。Controller 将所有针对 BDC 中数据源的外部表查询重定向到计算池。\n\
  \n在我的 BDC 部署中，计算池由此 Pod 实现，并使用标签 `role=compute-pool`。\n```\ncompute-0-0       3/3\
  \     Running   0          43h\n```\n\n### 数据池\n\n数据池实现了一个或多个 Pod，用于我在“大数据集群包含什么？”一节中讨论的数据缓存功能。默认情况下，BDC\
  \ 的 aks-dev-test 配置为数据池部署两个 Pod。在我的 BDC 部署中，这些 Pod 表示为：\n```\ndata-0-0         \
  \ 3/3     Running   0          43h\ndata-0-1          3/3     Running   0      \
  \    43h\n```\n\n数据池由一个或多个使用标签 `role=data-pool` 在 StatefulSet 中的 Pod 组成，每个 Pod 都有一个\
  \ SQL Server 容器。你对数据池中 SQL Server 的访问是通过来自 SQL Server 主实例的 Polybase 外部表进行的。\n\n\
  当你使用数据池的外部数据源在 SQL Server 主实例中创建外部表时，SQL Server 将在数据池的每个 Pod 中创建一个数据库，其名称与 SQL Server\
  \ 主实例中外部表的范围相同。此外，我们还会创建一个与外部表同名的表。\n\n这意味着你与数据池的所有交互都是通过 SQL Server 主实例中的外部表进行的。在数据池\
  \ Pod 的每个 SQL Server 上，我们将创建一个数据库和表来匹配你的外部表。此外，当你将数据插入数据池时，我们会自动分片或分区数据（不使用 SQL\
  \ Server 分区）（默认使用轮询方式），并在每个数据池 Pod 的每个表上构建聚集列存储索引以优化读取访问。这意味着我们的计算池可以跨分片以可扩展的方式访问此数据。数据池无法修改；你只能摄取（INSERT）或查询数据。由于它是一个缓存，这意味着当你需要刷新缓存时，必须删除外部表并重新填充它。Controller\
  \ 将特定的外部表请求重定向到数据池中的 SQL Server 实例（可能会通过计算池）。\n\n### 应用程序池\n\n应用程序池是基于在 BDC 中创建\
  \ *应用程序* 而部署的 Pod 集合。图 10-10 展示了 BDC 中用于应用程序池的区域。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig10_HTML.jpg](img/479130_1_En_10_Fig10_HTML.jpg)\n\
  图 10-10 BDC 中的应用程序池\n\n当你使用 BDC 接口通过 YAML 文件创建应用程序时，Controller 服务将动态创建一个包含你的应用程序在容器中运行的\
  \ Pod 副本集。目前支持的类型包括 Python、MLeap 和 SSIS。\n\n还有另一个代表应用程序代理的 Pod，包括一个负载均衡器，它允许你从 BDC\
  \ 内部以及通过服务端点从外部世界连接到池中运行的应用程序：\n```\nappproxy-\n```\n\n你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-application-deployment)\
  \ 阅读更多关于 BDC 中应用程序部署架构的信息。\n\n\n## 使用大数据集群\n\n在本节中，我将回顾大数据集群的各种用例。你需要做的第一件事就是使用\
  \ `azdata` `登录到 BDC`。从技术上讲，你无需登录即可访问 BDC 中的某些资源，但使用 `azdata` 登录可以让你以简单的方式访问所有服务端点，并获得相应的上下文。\n\
  \n要登录 BDC，你需要控制器服务端点，即控制器服务 Pod 的负载均衡器 IP 地址和端口。在我的 AKS 部署上，我能够通过以下命令获取控制器服务端点：\n\
  \n```bash\nkubectl get svc controller-svc-external -n mssql-cluster\n```\n\n我现在可以通过以下命令为\
  \ `azdata` 工具提供正确的上下文，以便在各种场景中使用：\n\n```bash\nazdata login --controller-endpoint\
  \ https://:30080 --controller-username admin\n```\n\n系统提示我输入密码（这是在名为“BDC 部署体验”的章节中，当\
  \ python 脚本提示时我提供的密码）。当登录成功时，我看到了以下消息：\n\n```\nLogged in successfully to `https://:30080`\n\
  ```\n\n有了这个上下文，我可以将 `azdata` 用于多种目的。我想做的第一件事是获取其他服务端点的列表以使用 BDC。我将使用以下命令来检索这些端点：\n\
  \n```bash\nazdata bdc endpoint list -o table\n```\n\n我的列表如下所示：\n\n```\nProtocol\n\
  ------------------------------------------------------  ----------------------------------------------------\
  \  -----------------  -------\n用于访问 HDFS 文件、Spark 的网关                     https://:30443\
  \                              gateway            https\nSpark 作业管理及监控仪表板      \
  \                        https://:30443/gateway/default/sparkhistory  spark-history\
  \      https\nSpark 诊断和监控仪表板                                 https://:30443/gateway/default/yarn\
  \          yarn-ui            https\n应用程序代理                                    \
  \       https://:30778                         app-proxy          https\n管理代理  \
  \                                             https://:30777                   \
  \           mgmtproxy          https\n日志搜索仪表板                                  \
  \      https://:30777/grafana                       metricsui          https\n集群管理服务\
  \                                          https://:30080                      \
  \   controller         https\nSQL Server 主实例前端                                 \
  \ ,31433                              sql-server-master  tds\nHDFS 文件系统代理      \
  \                                https://:30443/gateway/default/webhdfs/v1    webhdfs\
  \            https\n用于运行 Spark 语句、作业、应用程序的代理             https://:30443/gateway/default/livy/v1\
  \       livy               https\n```\n\n我使用了一些名称来代表集群上的实际 IP 地址：\n\n*   `<knox-ip>`\
  \ – 这是 Knox 网关的 IP 地址，如你在此列表中所见，它用于多种用途。Knox 网关用于访问 HDFS 文件 (`webhdfs`)、运行 Spark\
  \ 作业 (`livy`)、查看 Spark 作业历史 (`spark-history`) 以及监控 Spark 作业 (`yarn-ui`)。\n*   `<appproxy-ip>`\
  \ – 这是用于连接到部署在 BDC 中的应用程序的 IP 地址。\n*   `<sql-ip>` – 这是连接到 SQL Server 主实例的 IP 地址。\n\
  *   `<cluster-ip>` – 这是控制器服务的 IP 地址。\n\n你也可以使用 `kubectl` 获取所有端点的 IP 地址和端口，但只有 `azdata`\
  \ 能为你提供诸如如何访问 `webhdfs` 和 `livy` 等具体细节。\n\nAzure Data Studio (ADS) 现在提供了 BDC 管理体验，包括查看端点列表的功能。\n\
  \n图 10-11 展示了使用 ADS 查看 BDC 端点的示例。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig11_HTML.jpg](img/479130_1_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11\n\nAzure Data Studio 中的 BDC 端点\n\n位于 [`docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security)\
  \ 的文档（也在图 10-12 中显示）展示了常见的 BDC 端点。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig12_HTML.jpg](img/479130_1_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12\n\n常见的 BDC 端点\n\n### 使用数据虚拟化\n\nBDC 的一个重要用途是使用 Polybase 从外部数据源访问数据，正如我在第\
  \ 9 章中所描述的。\n\nBDC 中的 Polybase 提供了与 Linux 版 Polybase 相同的功能，包括用于 SQL Server、Oracle、Teradata、MongoDB\
  \ 和 HDFS 的内置连接器。\n\nBDC 通过两个 BDC 独有的额外内置连接器为这一功能提供了独特的扩展：\n\n*   `sqlhdfs` – 此连接器允许你访问存储池内的\
  \ HDFS 数据。\n*   `sqldatapool` – 此连接器允许你访问专门存储在数据池中的数据。\n\n以下是在数据库中创建外部数据源以访问这些内置连接器的\
  \ T-SQL 脚本示例：\n\n```sql\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE\
  \ name = 'SqlDataPool')\nCREATE EXTERNAL DATA SOURCE SqlDataPool\nWITH (LOCATION\
  \ = 'sqldatapool://controller-svc/default');\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources\
  \ WHERE name = 'SqlStoragePool')\nCREATE EXTERNAL DATA SOURCE SqlStoragePool\nWITH\
  \ (LOCATION = 'sqlhdfs://controller-svc/default');\n```\n\n请注意，`LOCATION` 的 URI\
  \ 是控制器服务的特定位置。如果已部署，控制器服务会通过计算池将对外部表的请求（基于这些源）定向到相应的池。\n\n我们的文档有一个关于如何在 BDC 中使用外部表访问\
  \ Oracle 数据的示例，链接为 [`docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization)。你需要一个\
  \ Oracle 实例来使用此示例。你也可以使用我在第 9 章 `ch9_data_virtualization\\sqldatahub` 文件夹中提供的示例。\n\
  \n\n## 注意\n\n本文件夹中唯一不能使用的两个示例是 `hdfs` 和 `saphana`。在 BDC 中，HDFS 数据通过 `sqlhdfs` 连接器访问。目前\
  \ BDC 不支持所需的用于 SAP HANA 的 ODBC 连接器。\n\n我认为你可能会更有兴趣使用示例通过 `sqlhdfs` 和 `sqldatapool`\
  \ 连接器来访问数据。\n\n我建议你首先按照以下文档页面的说明加载用于使用 BDC 的示例数据：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-load-sample-data)。我执行了这些说明，加载此数据没有问题。在此示例中，你将使用\
  \ curl 将 csv 文件目录加载到 HDFS 中。此示例使用来自 Knox 网关的 `WebHDFS` ([`https://hadoop.apache.org/docs/r1.0.4/webhdfs.html`](https://hadoop.apache.org/docs/r1.0.4/webhdfs.html))\
  \ 端点，该网关被称为 `HDFS 文件系统代理`。\n\n加载数据后，你现在可以按照教程访问 HDFS 数据：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-query-hdfs-storage-pool)。你可能还会觉得尝试\
  \ Azure Data Studio 附带的 **外部表向导** 作为在 BDC 中创建映射到 HDFS 数据的外部表的另一种方式很有趣：[`https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv`](https://docs.microsoft.com/en-us/sql/relational-databases/polybase/data-virtualization-csv)。\n\
  \n你可能需要从 IOT 设备等来源将数据直接摄取到 BDC 的 HDFS 中。我们的文档中有如何直接与 BDC 中的 HDFS 交互的示例：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl`](https://docs.microsoft.com/en-us/sql/big-data-cluster/data-ingestion-curl)。\n\
  \n此外，Azure Data Studio 包含直接浏览和处理 HDFS 中文件的功能，如图 10-13 所示。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig13_HTML.jpg](img/479130_1_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13\n使用 Azure Data Studio 在 BDC 中处理 HDFS\n\nBuck Woody 创建了一个名为 `SQL Server\
  \ 大数据集群 – 架构` 的研讨会，并有一套可以与 ADS 一起使用的 Notebooks，用于了解数据虚拟化如何与 BDC 协同工作。你可以在 [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks)\
  \ 尝试这些 Notebooks，使用教程 00、01 和 02 作为基础的数据虚拟化 notebooks。\n\n### 使用数据池\n\n我在本书中将数据池描述为数据缓存。使用数据池的过程是根据来自其他数据源的查询摄取或插入数据，这些数据源可以是\
  \ SQL Server 主实例表、来自 HDFS 的外部数据源或任何其他 Polybase 连接器。\n\n数据会自动分片分布到数据池中的 Pod 上，并通过聚集列存储索引优化读取访问。\n\
  \n我建议你阅读我们文档中的示例，以了解使用数据池的基础知识：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql`](https://docs.microsoft.com/en-us/sql/big-data-cluster/tutorial-data-pool-ingest-sql)。\n\
  \nBuck Woody 在教程 03 中的研讨会展示了如何在 BDC 中使用数据池：[`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_03.ipynb)。\n\
  \n### 使用 Spark\n\nSpark ([`https://spark.apache.org/`](https://spark.apache.org/))\
  \ 是一个常用于 Hadoop 系统的计算引擎。BDC 自动提供了运行 Spark 作业以满足各种应用需求的功能。在 BDC 中运行 Spark 作业有几种方法，我将在本节中讨论。你可以运行其中一些示例，以了解\
  \ Spark 如何与 BDC 协同工作。如果你是 Spark 新手，在向 BDC 提交 Spark 作业之前，你需要首先考虑为什么想使用 Spark。有一些非常好的场景，其中\
  \ Spark 可以是处理 HDFS 中数据的有效方法，这就是为什么我们将 Spark 作为整个 BDC 解决方案的一部分。你还会发现 Spark 是机器学习场景中常用的解决方案，我将在本章后面的“机器学习与大数据集群”一节中详细讨论。\n\
  \n#### 从 Azure Data Studio 运行 Spark 作业\n\nSpark 可能有用的一个场景是将存储池中 HDFS 的数据摄取到 BDC\
  \ 中数据池的表中。\n\n运行 Spark 作业的一种方法是使用直接连接到 SQL Server 主实例的 Azure Data Studio。图 10-14\
  \ 展示了如何使用 Azure Data Studio (ADS) 运行 Spark 作业的示例。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig14_HTML.jpg](img/479130_1_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14\n在 Azure Data Studio 中提交 Spark 作业\n\n有关直接使用 ADS 提交 Spark 作业的更多信息，请访问：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job)。\n\
  \n#### 从其他工具运行 Spark 作业\n\n我们还支持使用名为 `IntelliJ` 的工具向 BDC 提交 Spark 作业，你可以阅读：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-submit-job-intellij-tool-plugin)。你也可以使用\
  \ `Visual Studio Code` 向 BDC 提交 Spark 作业，相关说明请阅读：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-hive-tools-vscode)。在这两种场景中，你都将使用\
  \ `访问 HDFS 文件、Spark 的网关` 端点连接到 BDC 以运行 Spark 作业。\n\nBDC 还提供了一个用于提交 Spark 作业的 REST\
  \ 端点，称为 `Livy` ([`https://livy.apache.org/`](https://livy.apache.org/))。Livy 端点通过作为\
  \ `<knox-ip>` 一部分的代理提供，称为 `运行 Spark 语句、作业、应用程序的代理`。\n\n也许你在 BDC 上下文中使用 Spark 最常见的方法是通过\
  \ Azure Data Studio (ADS) 的 Notebooks。在本章之前，我已经向你展示了许多使用 ADS Notebooks 配合 SQL `内核`\
  \ 的示例。ADS 支持其他语言环境的内核，包括\n\n*   PySpark3\n*   PySpark\n*   Spark | Scala\n*   Spark\
  \ | R\n*   Python\n\n在任何这些场景中，你都将使用 Notebook 连接到 SQL Server 主实例。ADS 将通过 Knox 网关处理从\
  \ Notebook 提交 Spark 作业，以便在 BDC 中正确运行。这些 Notebook 中的任何 Python 或 R 代码都将在你的本地计算机上运行。\n\
  \n### MSSQL Spark 连接器\n\n我们提供了另一种通过 `MSSQL Spark 连接器` 运行 Spark 作业的方法。该连接器与 SQL Server\
  \ 主实例通信，使用 SQL 批量复制 API 进行写入，并具有熟悉的 JDBC 接口。你可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector`](https://docs.microsoft.com/en-us/sql/big-data-cluster/spark-mssql-connector)\
  \ 阅读有关 `MSSQL Spark 连接器` 及其如何与 BDC 配合使用的更多信息。\n\n\n\n### 部署和使用应用程序\n\n我在“大数据集群架构”一节中描述了应用池在\
  \ BDC 中如何工作，包括关于如何在 BDC 中部署应用程序的文档。\n\n我们为用 R 和 Python 编写的应用程序提供“运行时”，也支持 MLeap（[`https://mleap-docs.combust.ml/`](https://mleap-docs.combust.ml/)）应用程序和\
  \ SSIS 包。开发者将提供代码和一个 YAML 文件来指定如何运行应用程序，而 BDC 将为应用程序代码运行一个容器副本集。\n\n应用程序一旦部署，就会始终作为容器“运行”。如果你想要使用或执行应用程序代码，可以使用带有`app`选项的`azdata`命令。你可以在[`https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app`](https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-app)查看`azdata\
  \ app`的参考文档。\n\nBDC 还提供了通过 REST Web 界面使用已部署应用程序的另一种方法。默认情况下，所有已部署的应用程序都通过一个名为`Swagger`（[`https://swagger.io/`](https://swagger.io/)）的协议具备此功能。\n\
  \n要理解这一切如何运作的最佳方式，是查看我们在[`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy)提供的示例。\n\
  \n### 安全性\n\n在我撰写本章时，BDC 仅支持基本身份验证，即登录名和密码。来自控制器、Knox 和 SQL Server 主实例的所有服务终结点都需要登录名和密码。\n\
  \n集群内 Pod 之间的所有通信都通过使用`k8s`机密（本身也有登录名和密码）和自签名证书的私有通信通道进行。\n\n我们的目标是在发布 SQL Server\
  \ 2019 大数据集群时，为 BDC 中的所有服务终结点支持 Active Directory (AD)身份验证。这包括连接到 SQL Server 主实例、控制器服务和\
  \ Knox 网关。\n\n我预计，关于如何将 BDC 加入域、如何使用必要的 AD 信息部署 BDC、添加 AD 用户的过程，以及如何使用 AD 账户登录 BDC\
  \ 的所有详细信息，都将在我们的文档[`https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security`](https://docs.microsoft.com/en-us/sql/big-data-cluster/concept-security)中提供。\n\
  \n### 高可用性\n\n正如我在本章中提到的，BDC 中的 Pod 是使用`k8s`的`StatefulSet`或`ReplicaSet`部署的。这为`k8s`平台提供了*内置的高可用性*，以防容器、Pod\
  \ 或节点故障（节点故障仅在多节点`k8s`部署中有效）。\n\n虽然这种*基本高可用性*形式对 SQL Server 有帮助，但最好使用我们的 Always\
  \ On 可用性组(AG)技术，该技术包括只读副本和 SQL Server 运行状况检测。\n\n在部署 BDC 时，你可以选择启用`hadr`。启用`hadr`将在\
  \ BDC 中默认创建一个可用性组，并将`系统数据库`包含在 AG 中。会创建`StatefulSet`中的多个 Pod 来支持此部署。\n\n使用此配置，我们还会创建连接到\
  \ AG 主副本和辅助副本的终结点。由于`系统数据库`作为 AG 的一部分包含在内，你的主连接是连接到 SQL Server 主实例的主副本，就像 AG 侦听器一样。如果发生故障转移，此终结点将保持连接到成为新主副本的任何副本。还通过单独的终结点支持辅助只读副本连接。\n\
  \n请查看我们的文档，了解如何启用`hadr`以及使用此类部署的一些影响：[`https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deployment-high-availability)。\n\
  \n### SQL Server 大数据集群的 Jupyter Books\n\nJupyter Books（[`https://jupyter.org/jupyter-book/intro.html`](https://jupyter.org/jupyter-book/intro.html)）提供了一种构建笔记本集合的机制。Azure\
  \ Data Studio (`ADS`)提供了一个 Jupyter Book 笔记本，帮助监控、管理和排查 SQL Server 大数据集群问题。所有这些笔记本都基于\
  \ SQL Server 工程团队使用的实际故障排除指南(`TSG`)！\n\n图 10-15 展示了 SQL Server 大数据集群的 Jupyter Books。\n\
  \n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig15_HTML.jpg](img/479130_1_En_10_Fig15_HTML.jpg)\n\
  \n图 10-15：SQL Server 大数据集群的 Jupyter Books\n\n### 机器学习与大数据集群\n\nSQL Server 大数据集群(BDC)的承诺之一是提供一个*端到端的机器学习平台*。考虑图\
  \ 10-16 中的工作流。\n\n![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig16_HTML.jpg](img/479130_1_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16：*大数据集群中的机器学习*\n\n你可以在 BDC 中完成所有这些操作！使用 Spark 和 SSIS 从不同类型的数据源（包括结构化和非结构化）摄取数据。你可以使用数据池、HDFS\
  \ 甚至 SQL Server 主实例将数据存储在 BDC 中。你的一些机器学习模型数据可能存在于 BDC 外部的外部数据源中，例如 Azure、SQL Server、Oracle、Teradata\
  \ 和 MongoDB。BDC 允许你使用 T-SQL 访问这些数据中的任何一个。\n\n你现在可以使用 Spark、SparkML 和/或 SQL Server\
  \ 机器学习服务(ML)来准备和训练你的机器学习模型。然后，你可以使用带有 T-SQL 的 SQL Server ML 将你的模型作为*机器学习应用程序*公开，或者在应用池中作为一个带有\
  \ REST 接口的应用程序公开。应用池为开发人员提供了一种有趣的方法，因为它完全基于你的代码，使用声明式 YAML 和容器。这意味着它可能成为*持续集成/持续交付*(CI/CD)开发模型的绝佳候选方案。\n\
  \n### 机器学习包\n\n数据科学家使用 BDC 和 SQL Server 2019 的一个巨大优势是我们部署产品时附带的所有机器学习包。我询问了我们团队的高级项目经理\
  \ Rony Chatterjee 博士，如何发现所有这些已安装的 ML 包。他给了我以下可以在 SQL Server 2019 或 BDC 上运行的 T-SQL\
  \ 查询，以查看这些包：\n\n```sql\nEXEC sp_execute_external_script\n@language=N'Python',\n\
  @script=N'\nimport pkg_resources\nimport pandas\nOutputDataSet = pandas.DataFrame([(d.project_name,\
  \ d.version) for d in pkg_resources.working_set])'\n```\n\n我在部署的 BDC 上运行了这个查询，结果有超过\
  \ 160 个机器学习包！\n\n\n\n## 使用示例\n\n我相信你应该回顾甚至尝试一些示例，来了解机器学习和 SQL Server 大数据集群能实现什么：\n\
  \n*   **`SparkML`** – 我们提供了一个使用 Spark 和 Spark ML 与大数据集群的示例，该示例基于美国过去的人口普查数据来预测收入水平。你可以在\
  \ [`https://docs.microsoft.com/zh-cn/sql/big-data-cluster/spark-create-machine-learning-model`](https://docs.microsoft.com/zh-cn/sql/big-data-cluster/spark-create-machine-learning-model)\
  \ 查看此示例。\n\n*   **`BDC 应用程序`** – 在 [`https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy`](https://github.com/microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/app-deploy)\
  \ 处，有几个使用应用程序部署的机器学习应用示例供你使用。\n\n*   **Buck Woody 示例** – 2019 年春天，我和 Buck Woody\
  \ 正在为一位客户做培训，Buck 提出了一个非常酷的机器学习现实世界示例。这个想法是，假设虚构的公司 WideWorldImporters 拥有运输对温度敏感产品的卡车。卡车的制冷系统由电池供电。一个大问题是，卡车的制冷系统可能会因电池生命周期而故障。电池设计寿命应为\
  \ 3 个月，但在许多情况下它们会提前失效。公司希望建立一个预测性机器学习模型，以根据卡车和货物的动态因素（而非固定的 3 个月周期）来确定电池何时可能需要更换。\n\
  \n    Buck 有一个特定的 Notebook 可供你使用，你可以在 [`https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/bdc_tutorial_05.ipynb`](https://github.com/microsoft/sqlworkshops/blob/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks/buc_tutorial_05.ipynb)\
  \ 查看此示例。你需要遵循所有的 Notebook 才能使用这个教程，地址在 [`https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks`](https://github.com/microsoft/sqlworkshops/tree/master/sqlserver2019bigdataclusters/SQL2019BDC/notebooks)。当\
  \ Buck 和我做这个培训时，一位客户大概这样评论道：“终于有人向我解释了一个实用的、现实世界的机器学习示例，而且我认识到可以使用大数据集群来实现它。”\n\n\
  ### 管理和监控大数据集群\n\n你可以看到 SQL Server 大数据集群有很多组件和活动部分。监控和管理大数据集群有许多需要考虑的事项，包括管理 Kubernetes\
  \ 集群、SQL Server 和其他大数据集群组件。\n\n### 管理 Kubernetes (k8s)\n\n如果你看看我们用大数据集群构建的东西，它实质上是一个\
  \ `由 Kubernetes 支撑的应用程序`。虽然我们具备特定功能来帮助你管理大数据集群应用程序，但你仍然必须准备好管理你的 k8s 集群。对于大数据集群的开发和测试，这对你来说可能不是问题，但是，要在生产环境中运行大数据集群，你必须规划如何独立于大数据集群来管理和监控你的\
  \ k8s 集群。我无法开始强调理解如何确保你的 k8s 集群得到妥善管理并以健康水平运行有多么重要。整个大数据集群解决方案都依赖于此。\n\n我推荐以下用于管理\
  \ k8s 的资源：\n\n*   查看我们关于管理 Azure Kubernetes 服务 (AKS) 的文档：[`https://docs.microsoft.com/zh-cn/azure/aks/best-practices`](https://docs.microsoft.com/zh-cn/azure/aks/best-practices)。\n\
  \n*   我强烈推荐这本书，它也包含了一些关于 k8s 内部原理的精彩信息：[`https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/`](https://learning.oreilly.com/library/view/managing-kubernetes/9781492033905/)。\n\
  \n我还在我负责的第 8 章“关于 k8s 的技巧”一节中提供了管理和监控 k8s 集群的技巧和技术。\n\n\n\n### 管理和监控大数据集群\n\n除了通过动态管理视图（`DMVs`）和扩展事件等\
  \ `SQL Server` 诊断工具对 `SQL Server` 主实例进行标准的管理和监控外，我们还提供了一系列工具和资源，帮助您专门管理和监控 `SQL\
  \ Server 大数据集群`（`BDC`）。\n\n*   **`Azure Data Studio (ADS) 大数据集群仪表板`**\n\n    `ADS`\
  \ 自带一个 `BDC` 仪表板，用于查看 `BDC` 集群（包括其所有组件）的健康状况。图 10-17 展示了 `ADS` `BDC` 仪表板的示例。\n\n\
  \    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig17_HTML.jpg](img/479130_1_En_10_Fig17_HTML.jpg)\n\
  \    图 10-17 `Azure Data Studio` 大数据集群仪表板\n\n    您可以点击“集群详细信息”中的某一项，例如 `SQL Server`，以查看\
  \ `SQL Server` 主实例、计算池、数据池和存储池的状态。我们已在 `BDC` 的每个 Pod 中实现了 `活性探针`（ `https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/`\
  \ ），以反馈所有 `BDC` 组件的总体健康状况。您可以在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/manage-with-controller-dashboard`\
  \ 阅读更多关于大数据集群仪表板的信息。\n\n*   **`Grafana` 指标**\n\n    利用此上下文，您可以深入查看由控制器中组件驱动的 `Grafana`（\
  \ `https://grafana.com/` ）仪表板显示的指标。图 10-18 显示了 `SQL Server` 主实例的 `Grafana` 仪表板。\n\
  \n    ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig18_HTML.jpg](img/479130_1_En_10_Fig18_HTML.jpg)\n\
  \    图 10-18 `SQL Server 大数据集群` 的 `Grafana` 仪表板\n\n*   **`Kibana` 和 `Elasticsearch`**\n\
  \n    `BDC` 的每个主要组件都有一个 `Grafana` 仪表板和一个 `Kibana`（ `https://en.wikipedia.org/wiki/Kibana`\
  \ ）对 `Elasticsearch`（ `www.elastic.co/` ）的可视化，其中包含用于更深入故障排除和分析的日志。图 10-19 显示了通过\
  \ `ADS` 大数据集群仪表板查看的、来自 `SQL Server` 主实例的 `Elasticsearch` 日志的 `Kibana` 可视化。\n\n \
  \   ![../images/479130_1_En_10_Chapter/479130_1_En_10_Fig19_HTML.jpg](img/479130_1_En_10_Fig19_HTML.jpg)\n\
  \    图 10-19 `BDC` 日志的 `Kibana` 和 `Elasticsearch`\n\n*   **在 `SQL Server` 中使用 `azdata`**\n\
  \n    虽然 `Kubernetes` 允许您使用 `kubectl exec` 等命令与容器交互，但 `azdata` 程序允许您使用 `azdata`\
  \ 的 `sql` 选项与 `SQL Server` 交互，如 `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata-sql`\
  \ 文档所述。这使您可以针对 `SQL Server` 主实例执行 `T-SQL` 命令，并访问 `sqlcmd` “shell”。请记住，`azdata` 之于\
  \ `BDC`，就如同 `kubectl` 程序之于 `Kubernetes`；您可以在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/reference-azdata`\
  \ 查看完整的参考文档。\n\n*   **`Kubernetes (k8s)` 和 `BDC` 故障排除**\n\n    请通读我在第 8 章中对 `k8s`\
  \ 命令的讨论，但我们也在 `https://docs.microsoft.com/en-us/sql/big-data-cluster/cluster-troubleshooting-commands`\
  \ 的文档中提供了一些提示。别忘了也使用我们的 `SQL Server` 故障排除指南，我在本章前面的“`SQL Server 大数据集群` 的 Jupyter\
  \ 书籍”一节中描述过这些指南。\n\n## 总结\n\n虽然 `SQL Server 2019` 是革命性的，但 `SQL Server 大数据集群` 是 *颠覆性的*。谁会想到一个有些人认为仅仅是关系数据库引擎的产品，却包含了您自己\
  \ *数据湖*、*数据虚拟化* 和一个 *端到端机器学习平台* 的完整解决方案，并且全部构建在 `Kubernetes` 之上？\n\n想想我们为大数据集群部署的技术：\n\
  \n*   `SQL Server`\n*   `Polybase`\n*   `HDFS`\n*   `Spark`\n*   `Livy`\n*   `Kibana`\n\
  *   `Elasticsearch`\n*   `Grafana`\n*   `InfluxDB`\n*   `Notebooks`\n*   使用 `R`\
  \ 和 `Python` 的机器学习\n*   `Java 可扩展性`\n*   `Always On 可用性组`\n\n所有这些都由一个控制平面提供动力，该平面利用我们的“`API\
  \ Server`”或控制器服务，来部署、管理和驱动构建在 `Kubernetes` 上的大数据集群。\n\n这是我的观点，但何不听听已经看到此解决方案前景的客户怎么说：\n\
  \n> “构建和部署我们用于临床放射学的垂直 AI 解决方案需要结合非常多样化的实现范式、数据格式和法规要求。`SQL Server 2019 大数据集群` 让我们能够在一个共享平台上容纳和整合所有方面——既适用于从事深度学习的数据科学家，也适用于连接工作流、安全性和可扩展性的软件工程师。在运行时，我们的医疗客户受益于简化的容器化部署和维护，同时能够轻松地在本地和云之间迁移我们的解决方案。”\
  \ – René Balzano，Balzano 公司创始人兼首席执行官。\n\n此引述来自我们在 `https://cloudblogs.microsoft.com/sqlserver/2019/08/29/sql-server-2019-release-candidate-refresh-with-big-data-clusters/`\
  \ 发布 `SQL Server 2019` 大数据集群候选发布版时发布的博客。我期待更多客户相信大数据集群正是他们推动业务所需的革命性解决方案。\n\n"
- "# 11. 客户之声与迁移\n\n我希望当您读到本章时，能够体会到投入到 `SQL Server 2019` 中的惊人创新量。如果您已经阅读了前十章，您可能会有“信息过载”的感觉。过去参加我演讲的几个人都感觉他们的“大脑要融化了”。如果您读到本书此处也有这种感觉，那么我的目标之一就实现了。我希望这本书不仅仅是\
  \ `SQL Server 2019` 的回顾，因为任何人都可以从文档中获得这些信息。我希望这是一次对 `SQL Server 2019` 版本的全面审视。\n\
  \n具备了所有这些解决现代数据挑战的能力，还有什么可谈的吗？嗯，事实上，还有。我将通过讨论我们根据客户反馈构建到 `SQL Server 2019` 中的“一堆功能”（我借用了同事\
  \ Conor Cunningham 的术语）来结束本书。我还将讨论您在迁移到 `SQL Server 2019` 时可以使用的方法、工具和技术。\n\n\n\n\
  ## 客户之声\n\n到目前为止，你在本书中读到的一切，都以这样或那样的方式受到了我们客户的影响。在本节中，我将向你展示一系列 `SQL Server 2019`\
  \ 的增强功能，这些功能直接来源于客户的反馈和请求，途径包括 Microsoft 支持的升级、我们自己的内部测试，或工程团队与客户的直接互动。如果你从未接触过直达产品团队的反馈渠道，可以访问\
  \ `https://aka.ms/sqlfeedback` 查看。在本节中，我为你整理了一份按三个领域组织的增强功能列表：\n\n### 性能\n\n*  \
  \ **性能** – SQL Server 数据库引擎的性能增强，旨在帮助所有或特定的工作负载运行得更快。\n*   **用户体验** – 这些是用于改进 `SQL\
  \ Server` 产品使用或配置方式的增强功能。\n*   **诊断** – 这些是旨在改进 `SQL Server` 问题故障排除或诊断的增强功能。\n\n\
  ### 性能增强\n\n我们的工程团队始终致力于改进核心数据库引擎的性能，并通过客户观察、Microsoft 支持升级，以及经常通过基准测试调查来寻求机会。这些经验和观察促成了核心数据库引擎的以下变更：\n\
  \n#### 减少临时表的编译\n\n使用临时表的一种设计模式是在一个*作用域*中创建临时表，然后在另一个作用域中使用它。例如，你可以在一个批处理中创建临时表，然后尝试在该批处理调用的存储过程中使用该临时表。这通常会导致引用临时表的存储过程重新编译。在\
  \ `SQL Server 2019` 中，默认情况下，我们能够避免在此场景中进行重新编译。虽然这项改进可能不会使工作负载显著加快，但它有助于整个应用程序更好地使用\
  \ `SQL Server`，因为降低重新编译次数可以减少 `SQL Server` 的总体 CPU 使用率。\n\n#### 间接检查点的可伸缩性\n\n间接检查点是数据库检查点的新默认方法，你可以在\
  \ `https://docs.microsoft.com/en-us/sql/relational-databases/logs/database-checkpoints-sql-server`\
  \ 阅读相关内容。我们通过一些基准测试和客户反馈发现，繁重的修改工作负载可能导致 `SQL Server` 引擎出现停滞，从而引发一种称为“非让步调度程序”的状况。我们通常只在具有多个\
  \ CPU 的大型系统上看到这些问题，这让我们认为这是一个可伸缩性问题。`SQL Server 2019` 在数据库引擎中进行了改进以避免此问题。\n\n####\
  \ 并发 PFS 更新\n\nPFS 页是数据库文件内的特殊页面，`SQL Server` 用它来帮助在为对象分配空间时定位可用空间。（你可以阅读 Paul Randal\
  \ 在 Microsoft 工作时撰写的一篇关于 PFS 页的旧博文：`https://blogs.msdn.microsoft.com/sqlserverstorageengine/2006/07/08/under-the-covers-gam-sgam-and-pfs-pages/`。）\n\
  \nPFS 页上的页面闩锁争用通常与 `tempdb` 相关联，但当存在大量并发对象分配线程时，也可能发生在用户数据库上。这项改进改变了 PFS 更新的并发管理方式，使得它们可以在共享闩锁下更新，而不是独占闩锁。从\
  \ `SQL Server 2019` 开始，此行为在所有数据库（包括 `tempdb`）中默认开启。\n\n随着客户采用 `SQL Server 2019`，我非常期待看到这项增强功能与\
  \ `TempDB` 内存优化元数据（在第 2 章讨论）相结合，对 `TempDB` 并发性的实际效果。\n\n#### 工作线程窃取\n\n我将这项改进称为“Slava\
  \ 特别版”，以 Slava Oks 的名字命名。多年来，我们看到 `SQLOS` 调度程序的一个弱点是工作线程的调度程序争用。如果我们能在检测到争用问题时，将特定任务的动态工作线程更改为不同的调度程序，`SQLOS`\
  \ 系统将会变得多么酷。在底层，我们已经开始以有限的规模实现这样的系统。`SQL Server` 支持恢复的并行重做概念。Dong Cao 是这项工作的负责人，他在\
  \ `https://blogs.msdn.microsoft.com/sql_server_team/sql-server-20162017-availability-group-secondary-replica-redo-model-and-performance/`\
  \ 撰写了关于并行重做以及在 Always On 可用性组辅助副本上重做的内部机制的博文。Dong 在后台实现了工作线程窃取的概念，仅用于辅助副本上的并行重做。如果我们的测试继续成功，我期待有一天我们可以将这一改变应用于引擎核心调度程序\
  \ `SQLOS` 中，适用于所有类型的工作负载。\n\n\n\n### 用户体验\n\n我们致力于一系列旨在提升用户体验的改进，涵盖错误信息、SQL Server\
  \ 的安装与配置。\n\n### 详细的截断警告\n\n你知道 SQL Server 史上获得最多投票的客户反馈请求之一是什么吗？那就是改进下面这条错误信息：\n\
  \n```\nString or binary data would be truncated\n```\n\n这条错误信息（错误号 `8152`）会在您尝试向列中插入或更新数据，而待插入或更新的值超出目标列的大小时发生。这条信息的问题在于*没有提供上下文*——它没有提供表名、列名或即将被截断的具体数据片段。\n\
  \n在 SQL Server 2019 中，应用程序接收到的默认错误信息是错误号 `2628`，如下所示：\n\n```\nString or binary data\
  \ would be truncated\nin table '%.*ls', column '%.*ls’.\nTruncated value: '%.*ls'\n\
  ```\n\n著名的 SQL Tiger Team 成员 Pam Lahoud 在其博客 [`https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/`](https://blogs.msdn.microsoft.com/sql_server_team/string-or-binary-data-would-be-truncated-replacing-the-infamous-error-8152/)\
  \ 中介绍了这一改进，并包含示例。\n\n在该博客中，她指出您可以在 SQL Server 2017 中使用跟踪标志 `460` 来利用这条更好的错误信息。\n\
  \nSQL Server 2019 还提供了一个数据库选项，用于更改此错误信息的默认行为，您可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql?#verbose-truncation`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql%253F%2523verbose-truncation)\
  \ 阅读相关内容。\n\n### 安装期间的内存与并行选项\n\n安装 SQL Server 后最常更改的两个实例配置选项是 \"`max server memory`\"\
  \ 和 \"`max degree of parallelism`\"。\n\n考虑到这些选项更改的频率，我们现在在 Windows 上安装 SQL Server\
  \ 时加入了选择这些配置选项的设置项。\n\n图 11-1 显示了配置并行度的安装选项。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig1_HTML.jpg](img/479130_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n在安装期间配置 MaxDOP\n\n图 11-2 显示了安装期间的内存配置选项。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig2_HTML.jpg](img/479130_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n安装期间的内存配置\n\n请注意，在此图中，SQL Server 安装程序推荐了一个 **`最大服务器内存 (MB)` 值**。我们没有记录如何得出特定值的过程，您可以根据您的环境使用合理的值。我们发现大多数客户使用的值都小于计算机或虚拟机的最大物理内存。我个人认为，这些推荐值所使用的算法，您也可以在\
  \ Tiger Team 工具 `BPCheck` 中找到，该工具位于 [`https://github.com/microsoft/tigertoolbox/tree/master/BPCheck`](https://github.com/microsoft/tigertoolbox/tree/master/BPCheck)。\n\
  \n### 资源调控器中的内存授予百分比\n\n我在第 2 章描述了一个可能因大型内存授予而发生的性能问题。一个有助于控制大型内存授予的解决方案是使用带有 `REQUEST_MAX_MEMORY_GRANT_PERCENT`\
  \ 选项的资源调控器。此选项的一个问题是可能的值是 `1` 到 `100` 的整数，代表 SQL Server 最大内存值的一个百分比。即使 `1TB` 的 `1%`\
  \ 也是 `10Gb`，这对于内存授予来说可能仍然过多。SQL Server 2019 现在允许 `REQUEST_MAX_MEMORY_GRANT_PERCENT`\
  \ 是一个浮点值，这意味着它可以接受小于 `1.0` 的值。\n\n您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings`](https://docs.microsoft.com/en-us/sql/relational-databases/resource-governor/change-workload-group-settings)\
  \ 阅读更多关于 `REQUEST_MAX_MEMORY_GRANT_PERCENT` 的用法。\n\n### 列存储索引压缩估算\n\nSQL Server\
  \ 包含一个系统存储过程，用于帮助估算页压缩和行压缩的节省量，名为 `sp_estimate_data_compression_savings`。SQL Server\
  \ 2019 现在增强了此过程，以显示使用列存储索引和列存储存档选项的估计压缩率。您可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-stored-procedures/sp-estimate-data-compression-savings-transact-sql)\
  \ 阅读更多关于使用此过程及其选项的信息。\n\n\n\n### 诊断功能\n\n诊断和故障排除曾是我在微软支持部门工作 20 多年的领域。我仍然乐于看到产品中新增的诊断功能，即使它们看起来微不足道。对一些人来说可能微不足道的功能，却能为其他人带来巨大的好处。\n\
  \n### 你也可以成为 Paul Randal\n\nPaul Randal 是我多年的朋友，无论是在他任职于微软 SQL Server 工程部门期间，还是在他与妻子\
  \ Kimberly Tripp 一起担任 SQLskills CEO 的漫长职业生涯中。Paul 和我都以内核知识著称，而检查数据库页面的内部结构（有时称为“页面破解”）是一项重要的技能。多年来，我们两人都使用未文档化且不受支持的\
  \ `DBCC PAGE` 命令来“破解”数据库页面。随着 SQL Server 2019 的推出，新增了一对系统对象来帮助检查数据库页面的头部：\n\n`dm_db_page_info`\
  \ – 这是一个系统函数，用于返回页面头部信息，结果集中的每一列对应页面头部的一个字段。你可以在 [`docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql`](https://docs.microsoft.com/en-us/sql/relational-databases/system-dynamic-management-views/sys-dm-db-page-info-transact-sql)\
  \ 阅读关于此系统函数的说明。\n\n此函数所需的输入是标识一个页面的信息，即 `database id`、`file id` 和 `page number`。在某些情况下，页面的标识符会出现在查询结果中，例如来自某个\
  \ DMV 的列。一个例子是 `dm_exec_requests` 中的 `wait_resource`。来自 `wait_resource` 的页面标识符采用页面资源字符串的形式，即\
  \ `<dbid>:<fileid>:<pageid>`。系统函数 `fn_PageResCracker` 接受一个页面资源字符串作为输入，并返回一个包含 `db_id`、`file_id`\
  \ 和 `page_id` 的结果。\n\n因此，你可以运行如下的 T-SQL 语句：\n\n```\nSELECT page_info.*\nFROM sys.dm_exec_requests\
  \ AS d\nCROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r\nCROSS APPLY sys.dm_db_page_info(r.db_id,\
  \ r.file_id, r.page_id,'DETAILED')\nAS page_info;\n```\n\n这将从一个页面资源中提取页面头部详细信息。对于像页面闩锁等待这样的并发场景，此技术对于找出闩锁等待所涉及的页面属于哪个对象非常有用。\n\
  \n如果你回顾第 2 章，你会发现我提供了一个示例，使用此技术来查看 tempdb 中哪些表涉及了页面闩锁等待：\n\n```\nUSE tempdb\nGO\n\
  SELECT object_name(page_info.object_id), page_info.*\nFROM sys.dm_exec_requests\
  \ AS d\nCROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r\nCROSS APPLY sys.dm_db_page_info(r.db_id,\
  \ r.file_id, r.page_id,'DETAILED')\nAS page_info\nGO\n```\n\nPam Lahoud 也撰写了一篇关于这个虽小但重要的引擎增强功能的精彩博客文章，你可以在\
  \ [`blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/`](https://blogs.msdn.microsoft.com/sql_server_team/sql-server-2019-ctp-2-0-new-features-introducing-the-page-cracker-aka-sys-dm_db_page_info/)\
  \ 阅读。\n\n### 关于统计信息的诊断\n\n统计信息是查询性能非常重要的一部分。统计信息可以通过同步或异步方式更新，其中同步意味着查询必须等待统计信息更新完成，而异步则意味着查询可以继续执行，但统计信息会在后台更新。同步统计信息更新在某些情况下可能会导致\
  \ `SELECT` 语句执行时间比正常情况更长。SQL Server 2019 提供了一些诊断功能，可以为你提供关于等待同步统计信息更新的详细信息：\n\n\
  `WAIT_ON_SYNC_STATISTICS_REFRESH` – 这是在 `dm_os_wait_stats` 中发现的一个新 `wait_type`。它显示了在同步统计信息刷新操作上累计花费的实例级别时间。\n\
  \n`dm_exec_requests` – 如果一个查询正在等待同步统计信息更新操作完成才能继续执行，`sys.dm_exec_requests` 的 `command`\
  \ 列将显示 `SELECT (STATMAN)` 的值。\n\n### 查询存储增强功能\n\n查询存储是用于性能调优、基准测试和故障排除的重要功能。在第 2\
  \ 章中，我展示了一些使用查询存储来比较智能查询处理前后查询性能差异的示例。\n\n查询存储的功能已得到增强，包括以下内容：\n\n**强制快速转发和静态游标**\
  \ – 查询存储现在支持强制执行包含快速转发和静态游标的计划。\n\n**查询存储的自定义捕获策略** – 一些客户在使用查询存储处理特定类型的工作负载时遇到了问题。在\
  \ SQL Server 2019 中，我们添加了更多参数，以帮助对查询存储捕获的内容进行更精细的控制。你可以在文档中找到这些新选项的解释，它们与 `QUERY_CAPTURE_POLICY`\
  \ 相关： [`docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-set-options)。有什么比从\
  \ SQL Server 社区了解如何使用这些选项更好的方式呢？在我认识的人中，可能没有人比 Erin Stellato 更热衷于查询存储了，她在博客中精彩地讨论了这些新选项：[www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/](https://www.sqlskills.com/blogs/erin/query-store-in-sql-server-2019-ctp-3-0/)。\n\
  \n### 计划缓存的精细控制\n\n在某些情况下，你可能希望手动从计划缓存中清除某个查询或存储过程。一种场景可能是强制查询重新编译。你可以使用 `ALTER\
  \ DATABASE SCOPED CONFIGURATION` 选项 `CLEAR PROCEDURE_CACHE` 来清除与数据库相关的所有查询和对象的计划缓存。从\
  \ SQL Server 2019 开始，你可以使用基于 `plan_handle` 的此语句来清除计划缓存。你可以使用像 `dm_exec_query_stats`\
  \ 这样的 DMV 找到 `plan_handle`。\n\n### DBCC CLONEDATABASE 增强功能\n\n`DBCC CLONEDATABASE`\
  \ 可用于故障排除，从数据库中收集架构和统计信息（但不包含用户数据），并存入一个新数据库。这使你能够调查数据库的估计查询计划，而无需复制所有实际数据。\n\n\
  SQL Server 2019 通过收集列存储索引的统计信息增强了 `DBCC CLONEDATABASE`，你可以在 [`docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/database-console-commands/dbcc-clonedatabase-transact-sql)\
  \ 阅读更多相关内容。\n\n### 提示\n\n由于 `DBCC CLONEDATABASE` 捕获系统表中的所有数据（即元数据），这包括了查询存储的数据。这意味着你可以离线检查来自主用户数据库的查询存储性能数据。\n\
  \n\n\n## 商业智能方面如何？\n\nSQL Server 产品自带商业智能 (BI) 功能，包括 SQL Server Analysis Services\
  \ (`SSAS`) 和 SQL Server Reporting Services (`SSRS`)。\n\n`SSRS` 和 `SSAS` 都是 SQL Server\
  \ 各个版本许可的一部分（`SSAS` 仅包含在企业版和标准版中）。\n\n在 SQL Server 2019 中，`SSRS` 没有新的增强功能。需要重点注意的是，Power\
  \ BI 报表服务器（其更新节奏与 SQL Server 版本发布不同）是 SQL Server 企业版许可的一部分。您可以在此处阅读更多关于 Power BI\
  \ 报表服务器的信息：[`https://docs.microsoft.com/en-us/power-bi/report-server/get-started#licensing-power-bi-report-server`](https://docs.microsoft.com/en-us/power-bi/report-server/get-started%2523licensing-power-bi-report-server)。\n\
  \n在 SQL Server 2019 中，`SSAS` 确实提供了新功能；您可以在此处阅读关于这些增强功能的信息：[`https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15?#analysis-services`](https://docs.microsoft.com/en-us/sql/sql-server/what-s-new-in-sql-server-ver15%253F%2523analysis-services)。\n\
  \n## 迁移到 SQL Server 2019\n\n当您决定将一个、多个或所有实例迁移到 SQL Server 2019 时，制定一个迁移计划总是明智的。在本节中，我将讨论一些工具和资源，它们在您做出决策和制定迁移到\
  \ SQL Server 2019 的计划时会有所帮助。\n\n### Pam 和 Pedro 的展示\n\n这不是一个新的电视剧，但它听起来确实有点像。它代表了我的同事\
  \ Pam Lahoud 和 Pedro Lopes 一直在向客户和社区宣讲和培训的关于如何规划成功迁移到更新版本 SQL Server 的方法。Pam 和 Pedro\
  \ 将此过程称为 `现代化正确之路`。与其尝试重复 Pam 和 Pedro 在其培训中使用的所有信息，不如您自己观看视频？我强烈建议您坐下来，按照自己的节奏观看\
  \ YouTube 上由 Pam 和 Pedro 关于此主题进行的 1 小时演讲视频：[`www.youtube.com/watch?v=5RPkuQHcxxs`](https://www.youtube.com/watch%253Fv%253D5RPkuQHcxxs)。\n\
  \n在我的演示文稿中，我也使用了一张关于迁移流程以及您可能考虑使用的工具的幻灯片，如图 11-3 所示。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig3_HTML.jpg](img/479130_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\nSQL Server 的迁移流程和工具\n\nPam 和 Pedro 在他们的培训中讨论了这些工具。本章的剩余部分，我将回顾这个流程以及图\
  \ 11-3 中的工具。\n\n### 数据库迁移助手\n\n`数据库迁移助手 (DMA)` 是一个可免费下载并在 Windows 计算机上运行的工具，用于评估现有\
  \ SQL Server 实例的配置和代码，并查看迁移到新版本时可能遇到的任何问题。Pedro 在我之前提到的视频中向您展示了该工具的演练，但请允许我再为您提供一些关于该工具的详细信息，以及为什么我认为您应该强烈考虑使用它。\n\
  \n`DMA` 比其前身工具 `数据库升级顾问` 强大得多。`DMA` 具备这些主要功能：\n\n*   评估您的 SQL Server 迁移可能遇到的阻碍（`DMA`\
  \ 也支持将 `Amazon Relational Database Service (RDS)` 作为源）。这包括查看使用各种数据库兼容级别选项在迁移过程中能为您提供什么。这些阻碍可能包括中断性变更、行为变更和已弃用功能。我将在“数据库兼容性”一节中更详细地讨论这些术语。\n\
  *   基于对您当前部署的评估，发现 SQL Server 新版本中的新功能；`DMA` 足够智能，可以识别可能为您带来益处的功能。一些新功能推荐的例子包括 `列存储索引`、`Always\
  \ Encrypted`、`透明数据加密 (TDE)` 和 `动态数据屏蔽`。\n*   虽然与 SQL Server 2019 没有直接关系，但在迁移到 `Azure\
  \ SQL Database` 时，`DMA` 也会评估 `SSIS` 包的迁移问题。\n*   `DMA` 还支持将您的数据库执行迁移到各种目标类型，如 SQL\
  \ Server 2019。我只建议您将此用于非常小的迁移或测试数据库迁移。\n\n尽管 `DMA` 是一个构建在 Windows 上运行的工具，但您可以将此工具用于许多不同的源和目标，包括\
  \ Windows 和 Linux 上的 SQL Server、`Azure SQL Database`、`Azure SQL Database 托管实例` 以及\
  \ `Azure 虚拟机` 中的 SQL Server。\n\n图 11-4 显示了使用 `DMA 4.4` 进行评估和迁移可能的目标。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig4_HTML.jpg](img/479130_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4\n`DMA` 支持的目标\n\n您还应该了解 `DMA` 的一些其他优点：\n\n*   `DMA` 在 Windows 上是一个图形化工具，但也提供命令行界面\
  \ (`CLI`)，以便您可以在自动化场景中使用它。您可以在此处阅读更多关于 `DMA` `CLI` 的信息：[`https://docs.microsoft.com/en-us/sql/dma/dma-commandline`](https://docs.microsoft.com/en-us/sql/dma/dma-commandline)。\n\
  *   如果您想对大量 SQL Server 实例运行评估，我们的迁移团队提供了一种方法，可以将信息存储在数据库中以便生成报告，您可以在此处阅读相关信息：[`https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports`](https://docs.microsoft.com/en-us/sql/dma/dma-consolidatereports)。\n\
  *   凭借这个评估数据仓库，您现在可以基于这些数据构建 `Power BI` 报告。迁移团队还为 `Power BI` 报告提供了一个 `GitHub` 仓库：[`https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport`](https://docs.microsoft.com/en-us/sql/dma/dma-powerbiassesreport)。\n\
  \nPedro Lopes 在本章前面“Pam 和 Pedro 的展示”一节中指向您的 YouTube 视频链接中，有一个很好的使用 `DMA` 的演示演练。\n\
  \n我们有一个出色的数据库迁移团队，您可以在 [`https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration`](https://techcommunity.microsoft.com/t5/Microsoft-Data-Migration/bg-p/MicrosoftDataMigration)\
  \ 找到他们关于此主题的一些非常有价值的博客文章。\n\n\n\n### 数据库实验助手\n\n评估数据库迁移和 SQL Server 部署是基于你的 SQL\
  \ Server 和数据库（包括存储过程等 T-SQL 代码）的配置。然而，这种评估对于迁移 SQL Server 可能出现的问题来说是相当静态的。\n\n因此，迁移的一个重要环节是性能。对你的\
  \ SQL Server 应用程序执行尽可能多的性能测试，是成功迁移最关键的环节之一。`Database Experimentation Assistant (DEA)`\
  \ 可以成为一个非常强大的工具，帮助你实现这一目标。其目的是使用 `DEA` 告知你，应用程序中的哪些查询在新的目标 `SQL Server` 版本上会运行得更好、更差或保持不变。此外，`DEA`\
  \ 还可以告诉你是否有任何查询可能会失败，例如，由于兼容性问题。\n\n`DEA` 的文档可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-overview)\
  \ 找到，其中包含指向下载该工具的链接。该工具是免费的，运行在 `Windows` 上，但可用于评估向 `Linux` 上的 `SQL Server` 的迁移。\n\
  \n要正确使用 `DEA`，你可能最多需要四个 `SQL Server` 实例：\n\n*   源 `SQL Server`，用于捕获工作负载\n*   两个目标\
  \ `SQL Server`，用于重放捕获的工作负载跟踪\n*   一个 `SQL Server` 用于存储分析结果和运行报告（你需要一个数据库来存储结果，因此它实际上可以存在于其中一个目标\
  \ `SQL Server` 实例上）\n\n使用 `DEA` 的基本流程如下：\n\n1.  备份源 `SQL Server` 上的数据库。\n2.  使用\
  \ `DEA` 工具捕获工作负载的跟踪，该工具可以使用 `SQL Server Trace` 或 `Extended Events`。如果你在早于 `SQL Server\
  \ 2012` 的版本上捕获工作负载，则必须使用 `SQL Server Trace`，因为 `Extended Events` 在 `SQL Server 2008`\
  \ 中没有所需的事件。`DEA` 确实支持 `SQL Server 2005`，但你必须使用 `SQLTrace`（对于任何 `2012` 之前的 `SQL Server`\
  \ 版本，都必须使用 `SQLTrace`）。\n\n    为了充分利用 `DEA` 工具，你需要捕获一个能代表应用程序的工作负载跟踪。`DEA` 工具允许捕获时长从\
  \ `5` 分钟到 `3` 小时不等。你可能有一个测试服务器可以在其上为应用程序捕获跟踪，或者可能需要针对生产 `SQL Server` 运行它。\n\n3.\
  \  准备重放跟踪：将步骤 `1` 中的备份还原到两个目标 `SQL Server` 实例：\n\n    **目标服务器 #1** – 与步骤 `2` 中捕获跟踪的源相同版本的\
  \ `SQL Server`。你通常不希望使用你的生产 `SQL Server`。\n\n    **目标服务器 #2** – 你要迁移到的新版本 `SQL Server`，可以是\
  \ `Linux` 上的 `SQL Server`。\n\n    你应该将这些 `SQL Server` 实例的环境（在 `CPU`、内存、磁盘速度和 `SQL\
  \ Server` 配置方面）设置得尽可能接近相同。\n\n4.  使用 `DEA` 工具在两个目标 `SQL Server` 上重放步骤 `2` 中捕获的跟踪。`DEA`\
  \ 工具将要求提供一个位置来保存重放的跟踪。\n5.  使用 `DEA` 工具分析两个捕获的重放跟踪，以便比较跟踪中查询的性能或可能的错误。`DEA` 工具将提示你提供一个\
  \ `SQL Server` 数据库来存储分析结果以及步骤 `4` 中重放跟踪的位置。\n\n### 提示\n\n早期版本的 `DEA` 要求你使用 `SQL\
  \ Server` 中一个称为分布式重放（`Distributed Replay`）的功能。你仍然可以使用该方法，但自 `DEA` 版本 `2.6` 起，你可以使用\
  \ **内置** 重放方法。**内置** 重放方法在内部使用一个名为 `ostress.exe` 的工具（我在第 `2` 章向你介绍过这个工具）。它在 `SQL\
  \ Server` 团队和社区中仍然是一个著名的工具，由我终生的朋友 `Keith Elmore` 和 `Robert Dorr` 在微软开发。\n\n我强烈建议你在执行任何主要的\
  \ `SQL Server` 迁移之前先看看 `DEA`。`Pedro Lopes` 在本章前面指向你的 YouTube 视频链接“The Pam and Pedro\
  \ Show”中有一个很好的 `DEA` 报告演示。\n\n以下是关于使用 `DEA` 工具的一些提示和注意事项：\n\n*   `DEA` 附带报告工具来查看重放的分析结果。你可以在\
  \ [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-view-report)\
  \ 阅读更多关于 `DEA` 报告的信息。\n*   `DEA` 还允许你通过命令行界面（`CLI`）自动化执行，你可以在 [`https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt`](https://docs.microsoft.com/en-us/sql/dea/database-experimentation-assistant-run-command-prompt)\
  \ 阅读更多相关信息。\n\n### 升级到 SQL Server 2019\n\n在你完成所有评估并准备好继续升级后，你有以下选择。\n\n#### 就地升级\n\
  \n这是通过在同一台计算机上运行安装程序来直接升级 `SQL Server` 的过程。虽然此过程得到微软对生产环境企业级安装的完全支持，但我不推荐它，除非是滚动升级的情况，我将在本章后面讨论。这不是微软的官方立场，而是我根据在微软支持部门与客户合作多年的经验提出的建议。即使你选择此选项，在执行升级之前，**务必**\
  \ 确保你拥有来自先前版本 `SQL Server` 的完整备份。事实上，我实际上建议你捕获服务器或虚拟机的完整映像，以便在需要时能够快速回滚到生产服务器的确切快照。\n\
  \n## 注意\n\n`Linux` 上的 `SQL Server` 也支持就地升级，方法是将存储库更改为新版本的 `SQL Server` 并运行包管理器更新（例如，`yum\
  \ update mssql-server`）。\n\n有一种称为*滚动升级*的就地升级变体。你可以在 `Always On` 故障转移群集实例或 `Always\
  \ On` 可用性组中使用此方法。我将在“实时迁移”一节中讨论此选项。\n\n不要忘记我在第 `7` 章“更新 SQL Server 的新方法”一节中描述的可能使用容器的升级方案。\n\
  \n```\nyum update mssql-server\n```\n\n\n#### 还原数据库\n\n这或许是升级 SQL Server 最常见的方法（除了滚动升级之外）。SQL\
  \ Server 引擎在还原数据库时懂得如何进行 `upgrade`（从技术上讲，SQL Server 知道在数据库联机时如何升级，而这正是就地升级的工作方式）。因此，许多客户选择为迁移在另一台计算机或虚拟机上安装\
  \ SQL Server，并从旧版本的 SQL Server 还原其数据库。\n\n无法将升级后的主要版本数据库还原回旧的主要版本。例如，你不能将 SQL Server\
  \ 2019 的备份还原到 SQL Server 2017（但正如我在第 7 章向你展示的，你可以在一个主要版本内的累积更新之间切换）。\n\n对于 SQL Server\
  \ 2019，你将能够从 SQL Server 2008 或更高版本还原数据库。这包括能够从 Windows 上的 SQL Server 还原到 Linux 上的\
  \ SQL Server 2019，因为数据库在不同操作系统平台之间是完全兼容的。如果你的数据库备份来自 SQL Server 2008 之前的版本，你将需要执行一个“跳转”过程：先将备份还原到一个受支持的\
  \ SQL Server 版本（最早到 2008 年），然后从那里进行备份，再执行另一次还原到 SQL Server 2019。\n\n帮助减少迁移问题的关键支柱之一是，当数据库被还原到新版本的\
  \ SQL Server 时，`数据库兼容性级别会被保留`，与旧的 SQL Server 版本一致。我将在本章后面名为“数据库兼容性”的章节中更详细地讨论这个概念。\n\
  \n#### SQL Server Integration Services (SSIS) 或批量导入/导出\n\n另一种将数据库迁移到 SQL Server\
  \ 2019 的方法是使用 SQL Server Integration Services (SSIS) 或其他批量导出/导入工具来导出和导入数据。\n\n我曾见过一些客户在需要执行转换或对整体数据库设计或架构进行结构性更改时使用此方法。换句话说，有些客户在迁移到新版本\
  \ SQL Server 的同时 `迁移应用程序`，而不是仅仅“原样”移动数据库。这包括对数据库架构的更改。我见过的另一种转换技术是从先前版本还原数据库，然后在新版本的\
  \ SQL Server 上运行构建代码，以重新设计某些表或存储过程。\n\n#### 实时迁移\n\n还原数据库需要应用程序和用户停机。如果你的业务要求需要非常短的停机时间怎么办？在这些情况下，你可以考虑使用一些技术，例如：\n\
  \n`滚动升级`\n\n如果你使用的是 Always On 故障转移群集实例或 Always On 可用性组，一个流行的选择是滚动升级。这两种选项在 SQL Server\
  \ 2019 中都可行，而滚动升级是客户使用这些高可用性解决方案的原因之一。\n\nAlways On 故障转移群集实例支持滚动升级，前提是当前群集上的 SQL\
  \ Server 版本支持就地升级场景。你可以在 [`https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance`](https://docs.microsoft.com/en-us/sql/sql-server/failover-clusters/windows/upgrade-a-sql-server-failover-cluster-instance)\
  \ 阅读更多关于 Always On 故障转移群集实例的滚动升级信息。\n\nAlways On 可用性组仅支持回溯到 SQL Server 2012，因为那是该技术首次可用的版本。此滚动升级选项有许多配置，可能是企业\
  \ SQL Server 实时迁移场景最受青睐的方法。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances`](https://docs.microsoft.com/en-us/sql/database-engine/availability-groups/windows/upgrading-always-on-availability-group-replica-instances)\
  \ 了解此选项。\n\nSQL Server 2017 还为可用性组引入了一个名为 `无群集` 可用性组的新功能。无群集可用性组不需要底层故障转移群集软件。也可以使用此技术执行实时迁移，它可能是你从\
  \ SQL Server 2017 迁移到 Linux 上的 SQL Server 的最佳选择之一。你可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-availability-group-cross-platform)\
  \ 阅读更多关于此选项的信息。\n\n`日志传送`\n\n一种更基础的实时迁移方法是使用日志传送。日志传送是一种简单的技术，它使用 SQL Server 数据库和事务日志备份与还原，将数据同步到辅助\
  \ SQL Server。你可以在 [`https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server`](https://docs.microsoft.com/en-us/sql/database-engine/log-shipping/about-log-shipping-sql-server)\
  \ 了解日志传送。这是一种 `手动` 滚动升级的形式，不需要任何 Always On 技术。\n\n你可以在 [`https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql`](https://docs.microsoft.com/en-ca/sql/database-engine/log-shipping/upgrading-log-shipping-to-sql-server-2016-transact-sql)\
  \ 阅读使用日志传送升级的过程。\n\n`复制`\n\n我们的文档在 [`https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases`](https://docs.microsoft.com/en-us/sql/database-engine/install-windows/upgrade-replicated-databases)\
  \ 提供了如何升级完整 SQL Server 复制拓扑的详细信息。一个有趣的想法（当我与 Amit Banerjee 一起拜访一位客户时，受到了他的启发）是即使你不需要将复制作为策略，也使用\
  \ SQL Server 复制进行实时迁移。\n\n由于复制拓扑中的订阅者可以是比分发者和发布者更新版本的 SQL Server，你可以将订阅者用作你的新主服务器。换句话说，你可以将订阅者设置为\
  \ SQL Server 2019，而使用旧版本的 SQL Server 作为分发者和发布者。当你的应用和用户针对旧的发布者进行写入时，你的 SQL Server\
  \ 2019 订阅者拥有所有最新数据。当你准备好进行切换时，禁用复制并将所有用户指向新的 SQL Server 2019 数据库（该数据库 `曾经是` 订阅者）。听起来很简单，但会有一些停机时间，并且设置和禁用复制可能很麻烦。禁用复制不会删除订阅者数据库中的数据，这一点记录在\
  \ [`https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution`](https://docs.microsoft.com/en-us/sql/relational-databases/replication/disable-publishing-and-distribution)。\n\
  \n### 数据库兼容性\n\n数据库兼容性旨在当你迁移到新版本的 SQL Server 时 `提供向后兼容性`。对于所有术语和关于数据库兼容性的详细信息，你应该使用以下资源：[`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。\n\
  \n你首先应该了解的事情之一是数据库兼容性级别如何对应于 SQL Server 版本的默认级别。你可以在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#syntax`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523syntax)\
  \ 查看此列表。例如，SQL Server 2012 的默认数据库兼容性级别是 110。\n\n## 注意\n\n之前有人问过我，为什么数据库兼容性级别（dbcompat\
  \ levels）与 SQL Server 发布版本的名称或版本号不对应。这是因为 SQL Server 有一个内部版本号，而数据库兼容性级别正是与该内部版本号对齐。例如，SQL\
  \ Server 2012 实际上是 11.x 版本（参见 `@@VERSION`），因此其数据库兼容性级别为 110。我知道这有点令人困惑，但我们对发布版本的命名方式与其版本编号方式略有不同。\n\
  \n如果您将 SQL Server 2012 的数据库备份还原到 SQL Server 2019，SQL Server 会将数据库兼容性级别保持在 110。这样设计的目的是让您确信，您的应用程序、查询以及对数据库的操作行为，将与在\
  \ SQL Server 2012 上运行时完全一致。不同之处在于，您现在可以利用 SQL Server 新版本中的新功能（有一个例外，即我们有时会使用数据库兼容性来启用新功能）。\n\
  \n我在前面关于 `数据库迁移助手 (DMA)` 的部分提到过，`DMA` 工具会使用以下术语来查找迁移问题：`重大变更`、`行为变更` 和 `已弃用功能`。现在让我结合数据库兼容性用于向后兼容的用途，来定义这些术语。\n\
  \n`重大变更` 被定义为可能导致不同结果的 *行为变更*。在某些情况下，通过在新版 SQL Server 上使用数据库兼容性级别，可以保护系统免受重大变更的影响。在其他情况下，重大变更则不受数据库兼容性级别的保护。听起来很混乱？我理解您的感受。幸运的是，最新版本的\
  \ SQL Server 中，不受保护的重大变更非常少。好消息是，`DMA` 工具正是为了帮助检测这些问题而设计的。\n\n要了解每个 SQL Server 版本中的重大变更列表，请从这个文档页面开始：[`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#using-compatibility-level-for-backward-compatibility`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523using-compatibility-level-for-backward-compatibility)，然后向下滚动到以“在特定\
  \ SQL Server 版本中引入的重大变更...”这句话开头的部分。该部分包含了指向从 SQL Server 2012 起所有版本重大变更的指引。\n\n\
  数据库兼容性级别所涉及的一些行为变更是为了纠正问题或启用新功能而设计的。其中一个例子是我将在第 2 章讨论的智能查询处理功能，该功能在数据库兼容性级别为 140\
  \ 或 150 时启用。\n\n`已弃用` 功能受数据库兼容性级别的保护。已弃用功能包括我们不打算在未来增强的特性或行为。微软可能在任何新版本中移除这些功能。`已停止`\
  \ 功能意味着我们已经从某个 SQL Server 版本中移除了某个特性或行为，因此数据库兼容性将无济于事。已停止功能通常首先会经历被弃用的阶段。幸运的是，我们在最近的版本中已经决定不再停止使用任何功能。然而，我个人建议不要依赖已弃用功能，尤其是对于新项目。在近期版本中，通过\
  \ SQL Server 文档查找已弃用功能变得更加容易。请使用以下文档链接查找近期版本中的已弃用和已停止功能：[`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility)。要追溯更早的版本，您需要切换到旧版本的文档。例如，这是\
  \ SQL Server 2014 的文档链接：[`https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility?view=sql-server-2014`](https://docs.microsoft.com/en-us/sql/database-engine/sql-server-database-engine-backward-compatibility%253Fview%253Dsql-server-2014)。\n\
  \n考虑到这一点，在迁移到新版本 SQL Server 时，数据库兼容性级别在维护向后兼容性方面的效果如何？它足够好，以至于 Pedro Lopes 希望您能信赖它。他也希望说服许多独立软件供应商（ISV）这样做。Pedro\
  \ 的愿景是让应用程序开发人员基于数据库兼容性级别来 *认证* 他们的应用程序，而不是基于某个特定的 SQL Server 版本。如果您仔细聆听 Pedro 在我“Pam\
  \ 和 Pedro 秀”部分提供的视频链接中所说的话，他提到，“微软将支持以数据库兼容性级别作为认证模型”，具体体现在：\n\n*   如果 `DMA` 工具返回干净结果，没有错误，则提供完整的功能保护。\n\
  \    这意味着，如果您选择一个返回无错误的适当数据库兼容性级别，您的应用程序就不会遇到重大变更。\n\n*   在类似硬件上提供查询计划形状保护\n   \
  \ 这意味着，在类似硬件上，当您在先前版本上使用相同数据库兼容性级别运行查询时，查询计划的结构（即操作符及其流程）在新版本的 SQL Server 上不应改变。\n\
  \n迄今为止，我们的经验表明，这些大胆的声明在我们的客户那里得到了验证。\n\n以下是我对您在考虑迁移到 SQL Server 2019 时，关于向后兼容性所能期望情况的总结：\n\
  \n*   如果您一直在使用已停止的功能，迁移后您的应用程序可能会中断。\n*   如果您一直在使用已弃用的功能，应该没问题。但我建议您制定计划，逐步减少对此类已弃用功能的依赖。\n\
  *   从与您迁移来源 SQL Server 版本相匹配的数据库兼容性级别开始。如果您使用的是 SQL Server 2012，请将 dbcompat 保持在\
  \ 110 作为起点。\n\n### 数据库兼容级别注意事项\n\n影响查询性能最大的数据库兼容性级别（`dbcompat`）变化是 120。这是因为我们引入了对查询优化器的一个重大更改，称为基数估计（CE）模型。如果你迁移到较新版本的\
  \ SQL Server 并且需要使用 120 或更高的 `dbcompat` 级别，但遇到与 CE 模型相关的问题，可以使用 `ALTER DATABASE\
  \ SCOPED CONFIGURATION` 的 `LEGACY_CARDINALITY_ESTIMATION` 选项来禁用 CE 模型。\n\n*   在你的生产环境\
  \ SQL Server 2019 实例中保留此 `dbcompat` 级别，或者执行一次到 SQL Server 2019 的测试迁移，并使用更新的 `dbcompat`\
  \ 级别进行进一步测试，以查找你的应用程序可能存在的任何问题。在下一节中，我将讨论一个名为 **查询调优助手** 的工具，它可以在这些工作中帮助你。你可以使用\
  \ DMA 工具查看你的数据库在 SQL Server 2019 上各个 `dbcompat` 级别的配置评估。\n\n关于数据库兼容性（`dbcompat`）和向后兼容性的其他几点说明：\n\
  \n*   你可以从这个文档链接开始查看 `dbcompat` 级别之间行为差异的完整列表：[`https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level?#differences-between-compatibility-level-140-and-level-150`](https://docs.microsoft.com/en-us/sql/t-sql/statements/alter-database-transact-sql-compatibility-level%253F%2523differences-between-compatibility-level-140-and-level-150)。从这里开始向下滚动查看差异，一直到\
  \ 90（SQL Server 2005）。\n*   数据库兼容性不影响 SQL Server 实例级别的破坏性更改。因此，尽管我们将 `dbcompat`\
  \ 用作认证应用程序的机制，但如果应用程序使用了任何 SQL Server 实例级别的功能，你需要确保对此进行充分测试。实例级别的功能可以是任何从使用系统目录视图、系统动态管理视图、SQL\
  \ Server 代理、链接服务器，到影响整个 SQL Server 实例且不局限于数据库的 T-SQL 语句。\n\n### 查询调优助手和迁移后工作\n\n\
  在 2018 年的不同时期，我不断看到 Pedro Lopes 发给我们的团队的电子邮件，内容是关于一个他正在从事的名为 TUNA 的项目。至少这是我记忆中一直记得的项目名称。后来我发现，这个项目的真正名称其实是\
  \ **TunA**。TunA 代表 **Tun**ing **A**ssistant（调优助手）。\n\n如果你还记得前面关于数据库兼容性建议的部分，我提到了在迁移过程中针对新的数据库兼容级别测试你的应用程序的想法。\n\
  \n让我们回顾一下本章前面“Pam and Pedro Show”部分的视频。在视频大约 40 分 40 秒处，你会看到 Pedro 谈论 **迁移后** 。他这里的意思是，在你迁移到较新版本的\
  \ SQL Server 后，你可以采取一些步骤来优化你的工作负载，*假设* 你从旧版本的 SQL Server 中保留了 *源* 数据库的兼容级别。\n\n\
  Pedro 提出了一种使用查询存储来比较更改数据库兼容级别前后工作负载性能的方法。该方法来自查询存储文档中的一个使用场景，称为 **在升级到较新 SQL Server\
  \ 版本期间保持性能稳定性**，你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios?#CEUpgrade`](https://docs.microsoft.com/en-us/sql/relational-databases/performance/query-store-usage-scenarios%253F%2523CEUpgrade)\
  \ 阅读。\n\n现在轮到 TunA 项目登场了。Pedro 和他的团队在 SQL Server Management Studio (SSMS) 18.x 版本中内置了一个名为\
  \ **查询调优助手 (QTA)** 的功能。QTA 允许你自动化使用查询存储来评估和修复在迁移到新的数据库兼容级别时可能出现的任何查询性能问题。\n\n图 11-5\
  \ 展示了 QTA 的工作流程。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig5_HTML.jpg](img/479130_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 QTA 工作流程\n\n在 SSMS 中使用 QTA 工具，可以在迁移到较新版本的 SQL Server 后，当查询性能在新的数据库兼容级别下可能变差时，为你提供专家建议。最终的建议可能涉及对查询的更改，例如使用查询选项。所有的建议都基于有据可查的建议。这就像拥有“盒子里的\
  \ Pedro Lopes”。\n\n我曾考虑在本章中放一个 QTA 的示例，但是，为什么不直接使用 Pedro Lopes 在 GitHub 上整理得极其完善的示例呢。你可以从\
  \ [`https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md`](https://github.com/microsoft/tigertoolbox/blob/master/Sessions/Winter-Ready-2019/Lab-QTA.md)\
  \ 下载和使用此示例。\n\n```json\n{\n    \"name\": \"sample\",\n    \"version\": \"1.0.0\"\
  ,\n    \"description\": \"示例配置\",\n    \"settings\": {\n        \"database\": {\n\
  \            \"compatibilityLevel\": 150,\n            \"useLegacyCardinalityEstimation\"\
  : false\n        }\n    }\n}\n```\n\n### 在 Azure 虚拟机中运行\n\n当你决定部署或迁移到 `SQL Server\
  \ 2019` 时，你可能需要考虑在云端使用 `SQL Server 2019`。在云端运行 `SQL Server 2019` 的一个选择是使用 `Azure\
  \ 虚拟机`（这被称为基础设施即服务或 `IAAS` 环境）。\n\n`Azure 虚拟机 (VM)` 允许你专注于操作系统（`Windows` 或 `Linux`）和\
  \ `SQL Server` 的部署，而无需担心硬件平台和基础设施。\n\n`Azure VM` 被认为是将 `SQL Server` 迁移到云端阻力最小的方法之一，因为你与\
  \ `SQL Server` 的交互就像操作数据中心或你本地环境中的虚拟机一样。\n\n实际上，这并非 100% 正确，因为你必须做出一些特定于 `Azure`\
  \ 的选择，包括机器大小、存储、网络和安全性。我们在文档中提供了关于所有这些选择的指南，地址是 [`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-server-iaas-overview)。\n\
  \n我们还提供了你可能不知道的、与 `Azure 虚拟机` 相关的自动化功能。这包括 `SQL Server` 的自动备份以及操作系统和 `SQL Server`\
  \ 的自动修补。你可以通过以下链接阅读关于自动备份（[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-backup-v2)）和自动修补（[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-automated-patching)）的信息。\n\
  \n在 2019 年夏天，我们宣布了在 `Azure` 中的三项重要更新，它们有助于管理 `Azure 虚拟机` 中的 `SQL Server`：\n\n* \
  \  一个新的 `Azure` 门户体验，名为 `Azure SQL`，它简化了在云端创建和管理与 `SQL Server` 相关的资产。\n\n图 11-6\
  \ 展示了新的 `Azure SQL` 门户体验。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig6_HTML.jpg](img/479130_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n`Azure SQL` 门户体验\n\n*   一种通过我们的资源提供程序 `注册你的 Azure 虚拟机 (VM) 和 SQL Server`\
  \ 的方法。此注册适用于你在 `Azure 虚拟机` 中安装 `SQL Server` 而非使用库映像的场景。它能解锁你 `Azure VM` 中的 `SQL\
  \ Server`，以便利用 `Azure 混合权益`、合规性、自动备份和自动修补。你可以通过此链接阅读更多关于此功能的信息：[`https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider`](https://docs.microsoft.com/en-us/azure/virtual-machines/windows/sql/virtual-machines-windows-sql-register-with-resource-provider)。\n\
  \n*   `Azure` 宣布了 `超磁盘存储` 或 `Ultra SSD` 的正式发布。`Ultra SSD` 在云端提供了低延迟、极快的性能，这与 `I/O`\
  \ 密集型的 `SQL Server` 工作负载非常匹配。你可以通过此链接阅读关于 `Ultra SSD` 的公告：[`https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/`](https://azure.microsoft.com/en-us/blog/announcing-the-general-availability-of-azure-ultra-disk-storage/)。如果你想看到\
  \ `Ultra 磁盘存储` 在 `SQL Server` 中的实际应用，请查看 2018 年 `Microsoft Ignite` 会议的此段录像：[`https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/`](https://azure.microsoft.com/en-us/resources/videos/ignite-2018-running-high-performance-workloads-in-azure-with-ultra-ssds-the-next-gen-azure-managed-disk/)。如果你从录像的第\
  \ 46 分钟左右看起，当演示者展示 `Ultra 磁盘存储` 的 `SQL Server` 性能时，你可能会认出他。\n\n### SQL Server 迁移助手\n\
  \n阅读本书的你们中，有些人可能并未使用 `SQL Server`，或者在你的组织中还有其他用于诸如 `Oracle`、`mySQL` 和 `DB2` 等数据库产品的资产。我在第\
  \ 9 章介绍了如何使用 `Polybase` 访问这些数据源。但是，如果你想将数据库和应用程序从这些产品迁移到 `SQL Server` 怎么办呢？\n\n\
  我们提供了一个免费工具来帮助你从其他“第三方”数据库解决方案迁移到 `SQL Server`（和 `Azure`）。这个工具叫做 `SQL Server 迁移助手`。图\
  \ 11-3 的右侧展示了使用此工具的可能性。你可以通过此链接阅读更多关于此工具的信息，包括如何部署它以及如何成功用于迁移：[`https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant`](https://docs.microsoft.com/en-us/sql/ssma/sql-server-migration-assistant)。\n\
  \n图 11-7 展示了使用 `SSMS` 从 `Oracle` 进行迁移的屏幕截图。\n\n![../images/479130_1_En_11_Chapter/479130_1_En_11_Fig7_HTML.jpg](img/479130_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n使用 `SSMS` 从 `Oracle` 迁移到 `SQL Server`\n\n`SSMA` 作为一系列工具提供，每种工具对应一种支持迁移的第三方产品类型。与\
  \ `DMA` 和 `DEA` 类似，`SSMS` 也有一个命令行界面 (`CLI`)。你可以通过此链接阅读更多关于 `SSMA` 针对 `Oracle` 的语法：[`https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql`](https://docs.microsoft.com/en-us/sql/ssma/oracle/command-line-options-in-ssma-console-oracletosql)。\n\
  \n## 总结\n\n在本章中，我展示了基于客户反馈以及我们与客户直接合作的经验而对 `SQL Server 2019` 进行的众多增强。其中每一项可能看起来都不是重大增强，但它们共同代表了提升\
  \ `SQL Server` 性能、用户体验和诊断能力的关键创新。\n\n我还讨论了如何规划和执行向 `SQL Server 2019` 的迁移，包括工具、策略以及利用数据库兼容性来实现功能和性能保护。\n\
  \n本章标志着我们在这本书中与 `SQL Server 2019` 的共同旅程的结束。我希望你喜欢阅读和了解 `SQL Server 2019`，就像我享受撰写它的过程一样。对你们中的许多人来说，这将是你们与\
  \ `SQL Server 2019` 旅程的真正开始。对我来说，你们将继续听到我谈论 `SQL Server 2019`。但我也将展望未来，关注我们的下一个版本、我们在云端的快速工作节奏，以及使\
  \ `SQL Server` 成为行业中真正独特产品的下一波创新。\n\n### 索引\n\n### A\n\n已中止事务映射\n加速数据库恢复 (`ADR`)\n\
