  \ 70.28、80.00 和 0.00，这些值被高亮显示。\n\n图 11-2\n\nINSERT 后的碎片结果（百分比结果可能有所不同）\n\n`INSERT`\
  \ 操作影响碎片的另一种方式是作用于非聚集索引。虽然聚集索引值可能是递增的，但非聚集索引中的列值不一定具有相同的特性。一个很好的例子是在非聚集索引中对产品名称进行索引。插入到表中的下一条记录可能以字母\
  \ *M* 开头，需要放置在非聚集索引的中间位置。如果该位置没有空间，则会发生页拆分，从而导致碎片。\n\n为了演示这种行为，请向之前演示中使用的表 `dbo.UsingUniqueidentifier`\
