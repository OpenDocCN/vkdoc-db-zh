  \       ghost_version_offrow,\n       insert_over_ghost_version_inrow,\n       insert_over_ghost_version_offrow\n\
  FROM sys.dm_db_index_operational_stats(NULL, NULL, NULL, NULL)\nWHERE database_id\
  \ > 4;\n```\n清单 15-9 填充索引操作统计信息快照\n\n填充快照表之后，下一步是填充历史表。与之前一样，历史表的目的是存储两个快照之间统计信息**差值**。这些差值提供了发生了哪些操作的信息，并且还有助于将这些操作限定在特定时间范围内，以便在需要时，可以将更多重点放在核心时段或非核心时段的这些操作上。识别统计信息何时被重置的业务规则与索引使用情况统计信息类似：如果索引上的任何统计信息返回负值，则将忽略前一个快照中的那一行。此外，任何返回全零值的行也不会被包含在内。清单\
  \ 15-10 展示了用于生成历史差值的代码。\n\n\n\n#### 清单 15-10: 索引操作统计快照填充\n\n```sql\nUSE IndexingMethod;\n\
  GO\nWITH IndexOperationalCTE\nAS (SELECT DENSE_RANK() OVER (ORDER BY create_date\
