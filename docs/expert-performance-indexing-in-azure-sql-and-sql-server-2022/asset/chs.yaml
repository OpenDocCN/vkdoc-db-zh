  正如该误区的演示所示，堆中先前保存数据的空间会被释放，供表重新使用。对于有大量数据持续写入的堆，没有必要特别监控页面重用的情况，因此该误区可以被认为是不准确的。而对于那些删除了大量数据且无意替换的堆，可以使用
  `ALTER TABLE ... REBUILD` 来回收空间。该语句的语法和影响将在下一章讨论。


  ### 误区 9：每个表都应该使用堆/聚集索引


  最后一个误区涉及两个方面。一方面，有些人会建议所有表都应该建为堆。另一方面，另一些人则会建议在所有表上创建聚集索引。问题在于，这种观点忽略了每种结构为表带来的潜在益处。它脱离了实际存储的数据及其使用方式，仅仅围绕数据库中数据存储方式，进行一种教条式的争论。


  反对使用聚集索引的一些论点如下：


  *   碎片化通过额外的 I/O 操作对性能产生负面影响。

  *   当触发页拆分时，修改单条记录可能会影响聚集索引中的多条记录。

  *   过多的键查找会通过额外的 I/O 操作对性能产生负面影响。


  当然，也存在一些反对使用堆的常见论点：


  *   过多的转发记录会通过额外的 I/O 操作对性能产生负面影响。

  *   移除转发记录需要重建整个表。

  *   需要非聚集索引来实现高效的筛选数据访问。

  *   当数据被移除时，堆不会自动释放页面。


  在决定使用聚集索引还是堆时，两者各自的负面影响并非唯一需要考虑的因素。在特定情况下，其中一种的表现会优于另一种。


  例如，在以下情况下，聚集索引表现最佳：


  *   表具有唯一的、单调递增的键列。

  *   查询将访问表中的数据范围。

  *   表中的记录将被高速插入和删除。


  另一方面，堆在以下一些情况中是理想选择：


  *   表中的数据仅会使用有限的时间，其中索引创建时间超过了对数据的查询时间。

  *   键值会频繁更改，这反过来会改变记录在索引中的位置。

  *   大量记录正在被插入到暂存表中。

  *   主键是非升序值，例如唯一标识符。


  尽管本节并未包含证明该误区为何错误的演示，但重要的是要记住，堆和聚集索引都是可用的，并且应该被恰当地使用。选择哪种类型的索引是一个测试问题，而不是一个教条问题。


  对于那些属于“聚集索引万能派”的人，可以参考《Fast Track Data Warehouse Architecture》白皮书 (`https://msdn.microsoft.com/en-us/library/hh918452.aspx`)。该白皮书阐述了堆可能带来的一些显著性能提升，以及这些提升效果消失的临界点。它有助于展示
  I/O 系统技术（如闪存和基于缓存的设备）的变化如何改变关于堆和聚集索引的模式与实践。这有助于提倡不时验证误区和最佳实践的观点。请注意，前述文章是为 SQL Server
  2012 编写的，并强调了最佳实践是如何随时间演变的。




  ## 索引最佳实践


  索引的最佳实践与迷思类似。当缺乏足够信息来验证其他方向时，最佳实践可被视为默认推荐方案。最佳实践并非唯一选项，而是处理任何技术时的一个起点。


  当使用他人提供的最佳实践（例如本章中出现的这些）时，重要的是首先根据你的数据工作负载进行验证。务必对它们持审慎态度。最佳实践值得信赖，能够提供有价值的指导，但在选择和微调解决方案时可能需要考虑细节。例外情况总会存在。虽然解决方案绝不应仅基于例外情况来架构，但理解例外偶尔会出现，有助于在接受最佳实践和构建数据结构以处理非常规用例之间取得平衡。


  鉴于前述注意事项，在处理索引时，有几项最佳实践可供考虑。本节将回顾这些最佳实践，并讨论它们是什么以及意味着什么。


  ### 为当前工作负载建立索引


  为数据库建立索引最重要的方面是基于该数据库当前的工作负载来建立索引。在评估定义工作负载的变量时，请考虑读取、写入、可用性和争用。首先关注当前的数据库使用情况，然后是未来的增长。过去的使用情况可以提供有用的指导，但不要假设未来的性能总是会模仿过去的性能。


  为今天构建的索引很可能不是未来数据库所需的索引。因此，第一项最佳实践是定期审查、分析并实施对环境中索引的更改。要认识到，无论两个数据库多么相似，如果数据库中的数据和用户不同，那么这两个数据库的索引可能需要不同。关于监控和索引使用模式的详细分析，请参见第
  15 章和第 16 章。


  ### 默认在主键上使用聚集索引


  一项可靠的最佳实践是默认在主键上使用聚集索引。这似乎与本章提出的第九个迷思相悖。迷思 9 讨论了选择聚集索引还是堆是一个原则问题。无论数据库是基于其中一种还是另一种构建的，该迷思会让你相信，如果你的表设计与该迷思不符，那么无论情况如何都应该更改。这项最佳实践建议将主键上使用聚集索引作为起点。


  通过默认对表的主键进行聚集，索引选择更适合该表的可能性会增加。如本章前面所述，聚集索引控制表中数据的逻辑存储方式。主键通常建立在利用标识属性的列上，该属性会随着每条新记录添加到表而递增。那些非标识列的主键通常设置在数值型、递增且可预测的列上。为主键选择聚集索引将提供访问此类数据的最有效方法。


  如果具有聚集主键的表性能欠佳，则需要对该表进行更详细的审查，以确定原因。这可能是该规则的一个例外，也可能是另一个问题的表现，例如：


  *   当前工作负载可能受益于非聚集索引。

  *   该表存储分析数据，可能受益于列存储索引，而非行存储索引。

  *   统计信息已过时。


  ### 指定填充因子


  填充因子控制索引构建或碎片整理后，索引数据页上保留的空闲空间量。此空闲空间用于允许页面上的记录扩展，从而降低记录大小变化可能导致页拆分的风险。这是索引维护中非常有用的属性。修改填充因子可以降低碎片化的风险。关于填充因子的更深入讨论见第
  8 章。就本最佳实践而言，主要关注点是能够根据需要在数据库和索引级别设置填充因子。


  #### 数据库级填充因子


  `SQL Server` 中的数据库属性之一是设置索引默认填充因子的选项。此设置是 `SQL Server` 级别的设置，可以在 `SQL Server` 属性的“数据库属性”页面上更改。默认情况下，此值设置为零，相当于
  100。请勿将默认填充因子修改为 0 或 100 以外的值（这两者效果相同）。这样做会将数据库中每个索引的填充因子更改为新值。下次创建、重建或重新组织索引时，这会为所有索引添加指定数量的空闲空间。


  表面上看，这似乎是个好主意，但这会盲目地将所有索引的大小增加指定的量。索引大小的增加将需要更多的 I/O 来完成与更改前相同的工作。此外，重建索引时将消耗存储空间。对于许多索引来说，进行此更改会导致资源的不必要浪费。


  #### 索引级填充因子


  在索引级别，应对频繁出现严重碎片化的索引修改填充因子。降低填充因子将增加索引中的空闲空间量，并提供额外空间来补偿导致碎片化的记录长度变化。在索引级别管理填充因子是合适的，因为它提供了根据数据库需求精确调整索引的能力。


  可能需要进行一些试验才能有信心调整索引的填充因子，但随着时间的推移，可以在调整填充因子与减少碎片化频率之间建立直接关联。



  '
- "# 11. 索引维护\n\n如同生活中的任何事物一样，索引也需要维护。随着时间的推移，索引带来的性能效益可能会减弱，或者由于数据修改，其大小和底层统计信息可能发生变化并膨胀。为了防止这些问题，必须对索引进行维护。这样做将有助于确保数据库保持为一台精简、高效的查询运行机器！\n\
  \n关于维护，有五个方面需要考虑：\n\n- 索引碎片\n- 堆膨胀与转发\n- 列存储碎片\n- 统计信息\n- 内存中统计信息\n\n每一个都在维护正确索引和性能良好的数据库中扮演着关键角色。\n\
  \n本章将探讨所有这些方面。讨论将包括因不维护索引而产生的问题，以及对实施索引维护过程策略的回顾。为了说明碎片如何产生，会有一些简单的演示。关于统计信息的讨论将扩展第\
  \ 3 章中讨论的内容，并阐述如何更新统计信息以保持其准确性。\n\n## 总结\n\n本章探讨了一些围绕索引的迷思以及一些最佳实践。对于这两个方面，我们研究了一些普遍持有的观点，并围绕每个观点提供了详细信息。\n\
  \n通过这些迷思，展示了那些普遍相信的关于索引的观点被证明是不真实的。这些迷思涵盖了聚集索引、填充因子、索引的列组成等等。如何看待任何可能属于迷思的、关于索引的观点，其关键在于亲自去测试它。\n\
  \n最佳实践也得到了定义和讨论。本章提供的最佳实践应该是构建索引的基础。当不确定如何为表或工作负载建立索引时，首先遵循最佳实践。如果将来需要调整，那么偏离最佳实践以应对变化是一个合理的响应。\n\
  \n## 为外键列创建索引\n\n当在表上创建外键时，该表中的外键列应该被索引。这对于辅助外键确定父表中的哪些记录受到引用表中每条记录的约束是必要的。这一点在对引用表进行更改时很重要。引用表中的更改可能需要检查所有与父表中记录匹配的行。如果不存在索引，则会发生对该列的扫描。在大型父表上，这可能导致大量的\
  \ I/O，并可能引发一些并发问题。\n\n一个关于此问题的例子是州表和地址表。地址表中可能有数千或数百万条记录，而州表中可能只有大约一百条记录。地址表会包含一个被州表引用的列。设想一下，如果州表中的一条记录需要被删除。如果地址表中的外键列上没有索引，那么地址表将如何识别那些会因删除州记录而受到影响的行？没有索引的话，SQL\
  \ Server 将不得不检查地址表中的每一条记录。如果该列有索引，SQL Server 将能够执行范围扫描，定位到与州表中被删除值匹配的记录。\n\n通过对您的外键列创建索引，可以避免诸如本节所述的性能问题。对于外键的最佳实践是为其列创建索引。如果将来确定某个应用程序不再需要外键列上的索引，可以放心地将其删除。第\
  \ 13 章包含了关于此最佳实践的更多细节和一个代码示例。\n\n## 平衡索引数量\n\n索引在访问特定行的信息时对提高性能极为有用。然而，索引并非没有成本。拥有索引的成本超出了数据库内的空间。构建索引时，请考虑以下各项：\n\
  \n- 行插入或删除的频率如何？\n- 键列更新的频率如何？\n- 索引的使用频率如何？\n- 索引支持哪些进程？\n- 表上还有多少其他索引？\n\n这些只是构建索引时需要考虑的一些首要因素。索引构建之后，更新和维护索引将花费多少时间？索引被修改的频率是否会高于它用于返回查询结果的频率？表中有多少列？索引数量是否超过了列的数量？\n\
  \n平衡表上索引数量的难题在于，没有一个可以推荐的精确数字。索引可以提高能使用该索引的查询的性能，但会消耗资源，包括：\n\n- 数据文件（MDF 或 NDF）中的存储空间\n\
  - 备份大小（维护索引的备份）\n- 写入速度（维护索引中的数据）\n\n如果工作负载恰好同时写入不同的索引，从而导致锁或阻塞，索引有时会引入争用。以最简洁的方式总结，索引在提高查询读取速度的同时，会减慢写入操作。\n\
  \n一个表上合理的索引数量是一个针对每个表单独决定的问题。索引过少可能导致过度扫描聚集索引或堆来返回常见查询的结果。表上的索引也不应过多，以至于用于维护索引的时间超过了返回结果的时间。虽然没有关于表应有多少索引的黄金法则，但当表上的索引数量超过十个时，保持谨慎是有价值的。\n\
  \n同样重要的是，要能区分服务于频繁或关键查询的索引和很少使用的索引。一个月执行一次的表扫描可能比一个整天每时每刻都在维护的索引更可取。或者，如果那个月度查询是一个关键的财务报告，那么那个专门的索引可能\
  \ 100%值得其成本。\n\n## 索引碎片\n\n可能导致索引性能下降的第一个维护问题是索引碎片。当索引中的页不再物理上连续时，就会发生碎片。\n\n虽然索引碎片在早期版本的\
  \ SQL Server 和较旧的存储系统中引发了更大的关注，但在 SQL Server 中它仍然值得关注。碎片带来的主要挑战是，由于页被拆分并留下半空状态，存储索引所需的空间量增加。这种额外的空间影响了数据库在磁盘上消耗的空间量、在内存中的占用，以及\
  \ CPU 处理数据时的开销。\n\n在 SQL Server 中，有一些事件可能导致索引碎片：\n\n- `INSERT` 操作\n- `UPDATE` 操作\n\
  - `DELETE` 操作\n- `DBCC SHRINKDATABASE` 操作\n\n除了从数据库中选择数据，任何写入操作都可能导致碎片。除非数据库是只读的，否则碎片是一个需要在成为问题之前解决的相关问题。\n\
  \n\n### 碎片整理操作\n\n理解碎片的最佳方式是观察其实际发生。在第 3 章中，我们回顾了动态管理对象 (DMO) `sys.dm_index_physical_stats`\
  \ 所返回的信息。本节将检视多个会导致碎片的脚本，并使用该 DMO 来调查已发生的碎片量。\n\n当索引内的物理页不连续时，就会发生碎片。当执行插入操作，且新行未被放置在索引页的末尾时，该新行将被放置到已包含其他行的页面上。如果该页面上没有足够空间容纳新行，则会发生页面拆分，从而导致索引碎片。碎片是索引中页面拆分的物理结果。\n\
  \n#### 插入操作\n\n第一个可能导致索引碎片的操作是 `INSERT` 操作。这通常不被认为是导致碎片的最可能操作，但某些数据库设计模式确实会导致碎片产生。`INSERT`\
  \ 操作导致碎片的情况有两种：聚集索引和非聚集索引。\n\n设计聚集索引最常见的模式是将索引建立在一个值始终递增的单列上。这通常通过数值数据类型和 `IDENTITY`\
  \ 属性，或一个始终递增的数值键来实现。遵循此模式时，插入过程中发生碎片的可能性相对较低。不幸的是，这并非唯一的聚集索引设计模式，其他一些模式可能导致大量碎片。例如，使用无序的业务键或\
  \ `uniqueidentifier` 数据类型就常常引起碎片。\n\n使用 `uniqueidentifier` 数据类型值的聚集索引通常利用 `NEWID()`\
  \ 函数生成一个随机的唯一值作为聚集键。此值唯一，但并非始终递增。最后生成的值可能出现在前一个值之前或之后。因此，当向聚集索引插入新行时，它很可能被放置在索引中许多现有行之间。如果索引中没有足够空间，就会发生碎片。\n\
  \n为了演示使用 `uniqueidentifier` 作为聚集索引导致的碎片，请执行代码清单 11-1 中的代码。此代码创建了一个名为 `dbo.UsingUniqueidentifier`\
  \ 的表，使用 `sys.columns` 的数据填充它，然后添加一个聚集索引。此时，索引中的所有页在物理上是连续的。运行代码清单 11-2 中的代码以查看图\
  \ 11-1 所示的结果；这些结果显示索引的平均碎片为 0.00%。\n\n![](img/338675_4_En_11_Fig1_HTML.png)\n\n\
  一个表格有 9 列和 3 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（以页计）和平均页空间使用率百分比。所有\
  \ 3 个索引的平均碎片均为 0.00%。\n\n图 11-1\n\n初始碎片结果（结果可能有所不同）\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT index_type_desc\n,index_depth\n,index_level\n,page_count\n,record_count\n\
  ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_frag_in_percent\n,fragment_count\
  \ AS frag_count\n,avg_fragment_size_in_pages AS avg_frag_size_in_pages\n,CAST(avg_page_space_used_in_percent\
  \ as DECIMAL(6,2)) as avg_page_space_used_in_percent\nFROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID('dbo.UsingUniqueidentifier'),NULL,NULL,'DETAILED')\n\
  ```\n\n代码清单 11-2\n\n查看 INSERT 操作导致的索引碎片\n\n```\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.UsingUniqueidentifier')\
  \ IS NOT NULL\nDROP TABLE dbo.UsingUniqueidentifier;\nCREATE TABLE dbo.UsingUniqueidentifier\n\
  (\nRowID uniqueidentifier CONSTRAINT DF_GUIDValue DEFAULT NEWID()\n,Name sysname\n\
  ,JunkValue varchar(2000)\n);\nINSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)\n\
  SELECT name, REPLICATE('X', 2000)\nFROM sys.columns\nCREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier\
  \ ON dbo.UsingUniqueidentifier(RowID);\n```\n\n代码清单 11-1\n\n填充一个 Uniqueidentifier\
  \ 表\n\n\n\n#### 使用唯一标识符作为聚集索引键对碎片的影响\n\n基于 `uniqueidentifier` 列构建带有聚集索引的表后，可以执行\
  \ `INSERT` 操作来观察其对索引的影响。为了演示，请使用清单 11-3 中的代码，将 `sys.objects` 中的所有行插入到 `dbo.UsingUniqueidentifier`\
  \ 中。插入后，可以使用清单 11-2 中的 T-SQL 查询索引的碎片情况。结果应与图 11-2 所示相似，该图显示在向表中添加 689 行后，聚集索引在索引级别\
  \ 0 的碎片率超过 70%。\n\n```sql\nUSE AdventureWorks2017\nGO\nINSERT INTO dbo.UsingUniqueidentifier\
  \ (Name, JunkValue)\nSELECT name, REPLICATE('X', 2000)\nFROM sys.objects\n-- 清单\
  \ 11-3\n-- 向唯一标识符表执行 INSERT\n```\n\n正如这段代码示例所展示的，基于非递增值的聚集索引会导致碎片。这种行为最典型的例子就是使用\
  \ `uniqueidentifier`。当聚集键是计算值或基于无序的业务键时，也可能发生这种情况。在查看业务键时，如果为订单分配了一个随机的采购订单号，那么该值的行为可能类似于\
  \ `uniqueidentifier` 数据类型值。\n\n![](img/338675_4_En_11_Fig2_HTML.png)\n\n一个包含 9 列\
