  *图 3-14 索引页面的行数据打印选项的 DBCC PAGE 输出*\n\n行数据打印选项是 `DBCC PAGE` 命令最有用的选项之一。对于数据页面，它提供了对页面上存储的数据、所占用空间及其位置的全面洞察。这为理解为何只有某些行能放在页面上，以及为何例如发生页面拆分提供了直接依据。索引页面输出的结果集同样有用。将索引行映射到页面并返回键值的能力，可以深入了解索引的组织方式以及页面的布局方式。\n\
  \n## 摘要\n\n在本章中，提供了一些工具，允许直接在 SQL Server 中查看索引数据的存储细节。尽管是记录最少的工具，`DBCC PAGE` 和 `DBCC\
  \ IND` 允许从索引中收集大量知识，否则这些知识将难以获得。\n\n谨慎使用，这些工具对于管理员或架构师来说是一个宝贵的资产，他们希望深入了解索引结构及其存储。\n\
  \n"
- '# 4. 碎片化


  对索引内部结构的讨论也必须涉及碎片化对存储和性能的影响。本章概述了碎片化、其对数据存储的影响以及它如何损害性能。


  ## 页面碎片化


  SQL Server 将数据库中的信息存储在 8 KB 的页面上。通常，表中的行被限制在该大小内；如果它们小于 8 KB，SQL Server 会在一个页面上存储多行。在一个页面上存储多行所面临的挑战之一是处理页面上所有行的总大小超过
  8 KB 空间的情况。在这些情况下，SQL Server 必须更改页面上行的存储方式。根据页面的组织方式，SQL Server 将通过两种方式处理这些情况：转发行和页面拆分。


  > **注意**

  > 此讨论不考虑单个记录可能大于页面的两种情况。这两种情况是行溢出和大型对象。对于行溢出，在某些情况下，SQL Server 允许页面上的单个记录超过 8 KB。此外，当大型对象值超过
  8 KB 大小时，它们使用 LOB 页面而不是数据页面。这些对本节讨论的页面碎片没有直接影响。



  ### 转发记录


  当记录大小超出数据页时，管理记录的第一种方法是使用转发记录。此方法仅适用于使用堆结构的情况。通过转发记录，当某行数据被更新后不再适合当前数据页时，SQL Server
  会将该记录移动到堆中的一个新数据页，并在两个位置之间添加指针。第一个指针标识记录当前所在的数据页，通常称为*转发记录指针*。第二个指针位于新数据页上，指回转发记录原始所在的数据页；它被称为*反向指针*。


  以下是转发操作如何进行的逻辑示例。考虑一个编号为 100 的数据页，它存在于一个使用堆的表上（见图 4-1）。该页上有四行，每行大小约为 2 KB，总共使用了
  8 KB 的空间。如果第二行被更新，现在需要占用 2.5 KB，那么它将不再适合该数据页。SQL Server 会从堆中选择另一个数据页，或在需要时分配一个新数据页（本例中是编号为
  101 的数据页）。然后，第二行被写入该页，并且指向新数据页的指针会替换掉第 100 页上该行的原始位置。


  ![](img/338675_4_En_4_Fig1_HTML.png)


  一个数据流图有 3 个数据页，其中 2 个编号为 100，各有 4 行，1 个编号为 101。数据从第 100 页的第二行转发至第 101 页的第一行，第 100
  页上的第二行更新为指针。


  **图 4-1**

  转发记录过程图


  接下来要考虑的是如何检查表上的记录转发情况。例如，创建一个名为 `dbo.HeapForwardedRecords` 的表，如代码清单 4-1 所示。为了表示此逻辑示例中的行，将使用
  `sys.objects` 向 `dbo.HeapForwardedRecords` 添加 24 行。这些行中的每一行都有一个 `RowID` 来标识它，以及
  2,000 个字符，导致表中每页有四行。可以使用 `sys.dm_db_index_physical_stats` 来验证（见图 4-2）表中共有六页，总计 24
  行。


  ![](img/338675_4_En_4_Fig2_HTML.png)


  一个表格有 5 列和一行数据。第 1 至第 5 列标题分别为：对象 i d、索引类型描述、页数、记录数和转发记录数。选中了对象 i d 660197402，各列内容依次为
  HEAP、6、24 和 0。


  **图 4-2**

  引入转发记录前 `dbo.HeapForwardedRecords` 的物理状态


  ```

  USE AdventureWorks2017

  GO

  CREATE TABLE dbo.HeapForwardedRecords

  (

  RowId INT IDENTITY(1,1)

  ,FillerData VARCHAR(2500)

  );

  INSERT INTO dbo.HeapForwardedRecords (FillerData)

  SELECT TOP 24 REPLICATE(''X'',2000)

  FROM sys.objects;

  DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

  SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

  FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

  ```

  **代码清单 4-1** 转发记录场景


  此演示的下一步是在表中创建转发记录。为此，将更新表中每隔一行，将 `FillerData` 的值从 2,000 个字符扩展到 2,500 个字符，如代码清单 4-2
  所示。结果，其中两行将因过大而无法容纳在其所在数据页的剩余空间中。原本要写入 8 KB 页的数据量将增加到大约 9 KB。


  因此，SQL Server 需要将记录移出数据页才能完成更新。由于将其中一行移出数据页将为第二行留出足够空间，因此只有一条记录会被转发。`sys.dm_db_index_physical_stats`
  的输出（见图 4-3）证实了这一点。页数增加到九页，并且有六条记录被记录为已转发。一个特别值得关注的项目是记录数。虽然表中的行数没有增加，但现在表中多了六条额外的记录。这是因为该行的原始记录仍然保留在其原始位置，并带有一个指向其他位置包含该行数据的另一条记录的指针。


  ![](img/338675_4_En_4_Fig3_HTML.png)


  一个表格有 5 列和一行数据。第 1 至第 5 列标题分别为：对象 i d、索引类型描述、页数、记录数和转发记录数。它有 1 条记录，对象 i d 660197402
  被选中，后面各列依次是 HEAP、9、30 和 6。


  **图 4-3** 引入转发记录后 `dbo.HeapForwardedRecords` 的物理状态


  ```

  USE AdventureWorks2017

  GO

  UPDATE dbo.HeapForwardedRecords

  SET FillerData = REPLICATE(''X'',2500)

  WHERE RowId % 2 = 0;

  DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

  SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

  FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

  ```

  **代码清单 4-2** 引起转发记录的脚本


  转发记录带来的挑战是，它们导致表中的行需要在两个位置被引用，从而在从表中检索数据和向表中写入数据时增加了所需的 I/O 量。表越大，存在的转发记录越多，转发记录对性能产生负面影响的可能性就越大。



  ## 页面分裂


  处理页面上行数据大小超出页面容量的第二种方法是执行页面分裂。页面分裂适用于任何基于 B 树索引结构实现的索引，这包括聚集索引和非聚集索引。在进行页面分裂时，如果某一行被更新到其大小不再适合当前所在的数据页面，`SQL
  Server` 会将该页面上的一半行数据移至一个新页面。然后，`SQL Server` 会尝试再次将该行的数据写入页面。如果此时数据能放入页面，则该页面将被写入。如果不能，该过程将重复进行，直到数据能放入页面为止。


  为了说明页面分裂如何运作，我们将探讨一个导致页面分裂的更新操作。与上一节类似，考虑一个页面编号为 100 的表（见图 4-4）。页面 100 上存储了四行数据，每行大约
  2 KB 大小。假设其中一行（例如第二行）被更新，大小增至 2.5 KB。该页面的数据总量将达到 8.5 KB，超过了可用空间，从而引发页面分裂。为了分裂页面，系统会分配一个编号为
  101 的新页面，并将原页面上的一半行（第三行和第四行）写入新页面。此时，由于页面上有 4 KB 的可用空间，第二行数据就可以写入原页面了。


  ![](img/338675_4_En_4_Fig4_HTML.png)


  该图展示了如何将数据页 100 中第二行的数据更新到另一个数据页 100 中的第二行。第二行的值被加载到数据页 101 的第三行和第四行中。


  图 4-4：页面分裂过程示意图


  以下是一个关于页面分裂如何在表中发生的示例，我们将逐步演示一个强制表上发生页面分裂的场景。首先，将创建表 `dbo.ClusteredPageSplits`，如代码清单
  4-3 所示。将向此表插入 24 行数据，每行长度约为 2 KB。这将导致每页存放四行，为该表分配六个数据页。考虑索引级别 0（即叶级）的信息。由于该表通过聚集索引使用
  B 树，因此还会有一个额外的页面用于索引树结构。在索引级别 1 上有六条记录，引用索引中的六个页面。此信息可从图 4-5 中确认。


  ![](img/338675_4_En_4_Fig5_HTML.png)


  该表有 5 列和 2 行。第 1 至 5 列的标题分别是：object i d、index type description、index level、page
  count 和 record count。表中有 2 条记录，第一行中的 object i d 676197459 被选中。


  图 4-5：页面分裂前 `dbo.ClusteredPageSplits` 的物理状态


  ```sql

  USE AdventureWorks2017

  GO

  CREATE TABLE dbo.ClusteredPageSplits

  (

  RowId INT IDENTITY(1,1)

  ,FillerData VARCHAR(2500)

  ,CONSTRAINT PK_ClusteredPageSplits PRIMARY KEY CLUSTERED (RowId)

  );

  INSERT INTO dbo.ClusteredPageSplits (FillerData)

  SELECT TOP 24 REPLICATE(''X'',2000)

  FROM sys.objects;

  DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

  SELECT object_id, index_type_desc, index_level, page_count, record_count

  FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

  ```

  代码清单 4-3：页面分裂场景


  通过更新某些记录使其大小超过页面容量，可以引发表上的页面分裂。这将通过执行一个 `UPDATE` 语句来实现，该语句使用代码清单 4-4 中的脚本，将每隔一行的
  `FillerData` 列长度从 2000 个字符增加到 2500 个字符。每页上结果行的大小将达到 9 KB，与之前的例子一样，这超过了可用的页面大小，从而导致
  `SQL Server` 使用页面分裂来释放页面上的空间。


  调查页面分裂发生后的结果（图 4-6）显示了页面分裂对表的影响。首先，在索引的叶级，页面数量从 6 个增加到了 12 个（索引级别 0）。如前所述，当发生页面分裂时，页面会被对半分裂，并添加一个新页面。由于表中的所有数据页都被更新，所有页面都进行了分裂，导致叶级页面数量翻倍。索引级别
  1 唯一的变化是增加了六个页面来引用索引中的新页面。


  ![](img/338675_4_En_4_Fig6_HTML.png)


  该表有 5 列和 2 行。列标题依次为：object i d, index type description, index level, page count,
  和 record count。第一行中的 object i d 676197459 被选中。


  图 4-6：页面分裂后的物理状态


  ```sql

  USE AdventureWorks2017

  GO

  UPDATE dbo.ClusteredPageSplits

  SET FillerData = REPLICATE(''X'',2500)

  WHERE RowId % 2 = 0;

  DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

  SELECT object_id, index_type_desc, index_level, page_count, record_count

  FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

  ```

  代码清单 4-4：引发页面分裂的脚本


  页面分裂和转寄记录之间有两个值得关注的区别。首先，当页面分裂发生时，数据页上的记录数量并未增加。页面分裂只是移动了记录的位置，以便为逻辑索引顺序中的记录腾出空间。其次是页面分裂不会增加记录数。由于页面分裂已经为记录腾出了空间，因此不需要额外的记录来指向数据存储的位置。


  页面分裂可能导致与转寄记录类似的性能问题。这些性能问题既发生在页面分裂进行时，也发生在其之后。在页面分裂过程中，被分裂的页面在记录被分配到两个页面时需要被独占锁定。这会导致当页面分裂发生时，其他人需要访问除正在更新的行以外的行时产生争用。页面分裂后，索引中数据页的物理顺序通常不再符合其在索引中的逻辑顺序。这会阻碍
  `SQL Server` 执行连续读取的能力，从而减少单次操作可读取的数据量。此外，与使用较少页面获得相同结果相比，查询执行时需要读入内存的页面越多，查询性能就越慢。


  ## 总结


  本章详细地介绍、演示和描述了索引碎片。理解了碎片对索引存储和性能的影响后，第 11 章将探讨解决碎片的问题。在该章中，将提供更深入的方法来识别和解决索引碎片问题。




  '
- "# 5. 索引元数据与统计信息\n\n在理解了索引的逻辑和物理基础之后，现在可以讨论描述索引运作方式的元数据。这些统计信息有助于深入了解 SQL Server\
  \ 如何管理和使用索引。它还提供了所需的信息，用于确定一个索引可能被选择或不被选择的原因，以及它的运行状况。本章将更深入地介绍这些信息在何处以及如何被收集。还将介绍\
  \ SQL Server 提供的一些附加 `DBCC` 命令和动态管理对象（DMO），以及这些信息是如何生成和使用的。\n\n本章涵盖的统计信息将涉及四个信息领域。第一个领域是列级统计信息。它为查询优化器提供列（以及索引）中数据分布情况的信息。接下来是索引使用统计信息。这里的信息有助于了解一个索引是否被使用以及如何被使用。第三个是操作统计信息，它提供了索引使用方式的详细信息。最后一个信息领域是物理统计信息，它提供了索引物理特征及其在数据库内分布情况的洞察。\n\
  \n此外，本章还将回顾列存储索引可用的元数据和统计信息，以及收集到的信息。这些信息有助于理解存储在列存储索引中的内容，以及这可能如何影响针对这些索引的查询性能。\n\
  \n## 列级统计信息\n\n列级统计信息是 SQL Server 中与索引相关的最重要领域之一。这些统计信息提供了值在索引的键列上如何分布的信息。SQL Server\
  \ 利用它来确定索引中值的预期频率和分布；这被称为 `基数`。\n\n通过 `基数`，查询优化器开发一系列基于成本的执行计划，以找到执行已提交请求的最佳执行计划。如果索引的统计信息不正确或不再代表索引中的数据，那么所创建的计划就不太可能是最优的。理解并与统计信息进行交互非常重要，以确保环境中的索引不仅存在，而且能提供其预期的效益。\n\
  \n> 注意\n>\n> 通常，当为“修复”性能问题而重建索引时，碎片通常不是问题的原因或直接解决方案。重建时，索引会获得新的统计信息，并且与这些索引相关的执行计划需要重新编译，这两者中的任何一个都可能是性能问题的原因，而不是索引碎片。\n\
  \n在 SQL Server 中，有许多与统计信息交互的方法。接下来的章节将回顾一些最常见的机制。对于每种方法，都将讨论其是什么、提供什么以及使用每种方法的价值。\n\
  \n### DBCC SHOW_STATISTICS\n\n与统计信息交互的第一种，也可能是最熟悉的方式是通过 `DBCC` 命令 `SHOW_STATISTICS`。此命令将返回所请求数据库对象（表或索引视图）的统计信息。返回的信息是一个统计对象，包含三个不同的组成部分：头信息、直方图和密度向量。每个部分都为\
  \ SQL Server 提供了对索引中可用数据的理解。\n\n可以使用清单 5-1 中的 `DBCC` 语法返回统计对象。此语法接受表或索引视图的名称作为统计信息的来源，然后返回目标信息。目标可以是索引的名称，也可以是创建的列级统计信息的名称。\n\
  \n```sql\nDBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )\n[ WITH [\
  \  ]\n```\n\n清单 5-1 `DBCC SHOW_STATISTICS` 语法\n\n`DBCC` 命令可以包含四个选项：`NO_INFOMSGS`、`STAT_HEADER`、`DENSITY_VECTOR`\
  \ 和 `HISTOGRAM`。这些选项中的任何一个或全部都可以包含在逗号分隔的列表中。\n\n选项 `NO_INFOMSGS` 会在执行 `DBCC` 命令时抑制所有信息性消息。这些是严重级别从\
  \ 0 到 10 的错误消息，其中 10 为最高严重级别。在大多数情况下，由于这些错误消息是信息性的，在使用此 `DBCC` 语句时它们没有价值。\n\n选项\
  \ `STAT_HEADER`、`DENSITY_VECTOR` 和 `HISTOGRAM` 会限制 `DBCC` 命令的输出。如果包含一个或多个选项，则仅返回所包含项的统计信息组件。如果未选择其中任何一个，则包含所有组件。还有一个\
  \ `STATS_STREAM` 选项，这里不作讨论，因为它已弃用，并且可能不会包含在 SQL Server 的未来版本中。\n\n定义了此 `DBCC` 命令后，可以更详细地讨论其统计信息组件。将对每个组件进行定义，然后我们将探讨来自\
  \ AdventureWorks2017 数据库的内容示例。清单 5-2 提供了本次回顾所需的结果。\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nDBCC SHOW_STATISTICS ( 'Sales.SalesOrderDetail'\n, PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID\
  \ )\n```\n\n清单 5-2 针对 `Sales.SalesOrderDetail` 表上索引的 `DBCC SHOW_STATISTICS`\n\n\n\
  #### 统计头信息\n\n统计头信息是统计对象的元数据部分。表 5-1 中列出的这些列主要是信息性的。它们提供了在构建统计信息时考虑的行数，以及这些行是如何通过筛选确定的。表\
  \ 5-1 还包含了统计信息最后更新时间的信息，这对于调查统计信息质量方面的潜在问题很有用。\n\n表 5-1：`DBCC SHOW_STATISTICS` 中的统计头信息列\n\
  \n| 列名 | 描述 |\n| --- | --- |\n| `Name` | 统计对象的名称。对于索引统计信息，此名称与索引名称相同。 |\n| `Updated`\
  \ | 统计信息最后更新的日期和时间。 |\n| `Rows` | 统计信息最后更新时，表或索引视图中的总行数。对于筛选的统计信息或索引，此计数指的是符合筛选条件的行数。\
  \ |\n| `Rows Sampled` | 为统计计算采样的行数。当 `Rows Sampled` 的值小于 `Rows` 中的值时，直方图和密度值是估计值。\
  \ |\n| `Steps` | 直方图中的步数。每个步跨越一个列值范围，后跟一个上限列值。直方图步是在统计信息的第一个关键列上定义的。最大步数为 200。 |\n\
  | `Density` | 计算为 1/*唯一值数量*，适用于统计对象第一个关键列中的所有值，不包括直方图边界值。从 SQL Server 2008 开始，查询优化器不再使用此值，但出于信息和向后兼容性目的仍提供。\
  \ |\n| `Average Key Length` | 统计对象中所有关键列每个值的平均字节数。 |\n| `String Index` | 指示统计对象是否包含字符串摘要统计信息，以改进使用\
  \ `LIKE` 运算符的查询谓词的基数估计。 |\n| `Filter Expression` | 如果已填充，则是包含在统计对象中的表行子集的谓词。 |\n\
  | `Unfiltered Rows` | 应用筛选表达式之前表中的总行数。如果 `Filter Expression` 为 `NULL`，则 `Unfiltered\
  \ Rows` 等于 `Rows`。 |\n| `Persisted Sample Percent` | 在 SQL Server 2016 中新增，显示用于更新统计信息的样本百分比。如果为零，则表示没有为统计信息设置样本百分比。\
  \ |\n\n查看图 5-1 所示的 `Sales.SalesOrderDetail` 表上 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`\
  \ 的统计头信息，可以发现一些值得注意的项目。由于 `Rows` 和 `Rows Sampled` 的值相同，这些统计信息并非基于估计。统计信息最后更新于 2017\
  \ 年 10 月 27 日（尽管在另一个数据库副本中此值可能不同）。统计直方图中有 163 步，最大可达 200 步。步数等于范围数。在本例中，163 步意味着有\
  \ 163 个值范围，每个范围在统计信息中提供了上限值。上限值定义了该范围内的最大值。如果第 1 步的上限值为 42，那么第 1 步将涵盖值 0–42。下一步则从\
  \ 43 开始，并包含直至其上限的值。注意缺少筛选表达式和未筛选行数；索引和统计信息都没有筛选掉行。最后，`Persisted Sample Percent`\
  \ 设置为 0，这意味着所有行都用于统计信息的采样，这可以通过比较 `Rows` 和 `Rows Sampled` 来确认。\n\n![](img/338675_4_En_5_Fig1_HTML.png)\n\
  \n图 5-1：`Sales.SalesOrderDetail` 表上索引的统计头信息\n\n#### 密度向量\n\n统计对象的下一个组件是密度向量。密度向量描述了统计对象内部的列。统计或索引对象中的每个关键值都对应一行。例如，如果一个索引中有两列，分别名为\
  \ `SaleOrderID` 和 `SalesOrderDetailID`，密度向量中将有两行。密度向量将为 `SaleOrderID` 和 `SaleOrderID`\
  \ 与 `SalesOrderDetailID` 各有一行，如图 5-2 所示。密度向量有三部分信息可用：密度、平均长度和向量中包含的列（列名详见表 5-2）。\n\
  \n![](img/338675_4_En_5_Fig2_HTML.png)\n\n图 5-2：`Sales.SalesOrderDetail` 表上索引的密度向量示例\n\
  \n密度向量的价值在于它有助于查询优化器调整多列统计对象的基数。如下一节所述，直方图中的范围仅基于统计对象的第一列，而密度则在执行单列或多列查询之间提供调整。虽然更新统计信息的重点通常在于直方图的变化，但密度向量提供了一种有价值的方法，用于调整直方图中的范围，以校正超出索引第一列的数据分布差异。\n\
  \n表 5-2：`DBCC SHOW_STATISTICS` 中的密度向量列\n\n| 列名 | 描述 |\n| --- | --- |\n| `All Density`\
  \ | 返回统计对象中每个列前缀的密度，每个密度一行。密度计算为 1/*唯一列值数量*。密度越接近 1，列中的值越均匀。 |\n| `Average Length`\
  \ | 存储密度向量中每一级的列值的平均长度（字节）。 |\n| `Columns` | 每个密度向量级别的列名。 |\n\n\n#### 直方图\n\n`DBCC\
  \ SHOW_STATISTICS` 输出的最后一个组件是直方图。直方图提供了查询优化器用于确定基数的统计对象的详细信息。在构建直方图时，SQL Server\
  \ 会计算一系列聚合值，这些值基于统计样本或表或视图中的所有行。这些聚合值衡量值出现的频率，并将值分组为不超过 200 个*步骤*。对于每个步骤，都会计算统计列的分布，包括步骤中的行数、步骤的上限值、与上限值匹配的行数、步骤中的唯一行数以及步骤中重复值的平均数量。表\
  \ 5-3 列出了与这些聚合值对应的列。有了这些信息，查询优化器就能够估计索引中值范围返回的行数，从而使其能够计算与检索行相关的成本。\n\n**表 5-3**\n\
  来自 `DBCC SHOW_STATISTICS` 的直方图列\n\n| 列名 | 描述 |\n| --- | --- |\n| `RANGE_HI_KEY`\
  \ | 直方图步骤的上限列值。此列值也称为 `键值`。 |\n| `RANGE_ROWS` | 估计列值落在直方图步骤内（不包括上限）的行数。 |\n| `EQ_ROWS`\
  \ | 估计列值等于直方图步骤上限的行数。 |\n| `DISTINCT_RANGE_ROWS` | 估计直方图步骤内（不包括上限）具有唯一列值的行数。 |\n\
  | `AVG_RANGE_ROWS` | 直方图步骤内（不包括上限）具有重复列值的行的平均数量（当 `DISTINCT_RANGE_ROWS` > 0 时为 `RANGE_ROWS/DISTINCT_RANGE_ROWS`）。\
  \ |\n\n本示例中的直方图有 163 个步骤。图 5-3（包含直方图中的一些行）展示了 `Sales.SalesOrderDetail` 表中部分步骤的聚合方式。图\
  \ 5-3 中的第二项显示 `RANGE_HI_KEY` 值为 43692，这意味着 43660 到 43692 之间的所有 `SalesOrderID` 值都包含在这些估算值中。根据\
  \ `RANGE_ROWS` 值，此系列中有 282 行，其中包含 32 个唯一行。将这些数字转换到 `SalesOrderDetail` 表，意味着有 32\
  \ 个不同的 `SalesOrderID` 值，它们之间共有 282 个 `SalesOrderDetailID` 项。最后，对于 `SalesOrderID`\
  \ 43692，有 28 个 `SalesOrderDetailID` 项。\n\n![](img/338675_4_En_5_Fig3_HTML.jpg)\n\
  *一张包含 10 行 5 列的查询表销售订单详情的截图。表头列分别是 range H I key, range rows, E Q rows, distinct\
  \ range rows 和 A V G range row。10 个 H I key 的范围是 43659 到 44801。*\n\n**图 5-3**\n\
  `Sales.SalesOrderDetail` 表上索引的直方图示例\n\n`AVG_RANGE_ROWS` 列中的值非常重要，当统计信息过时时，它可能是导致性能问题的原因。它说明了当检索索引中的任何一个值或值范围时，可以预期有多少行。要检查范围平均值的准确性，请执行清单\
  \ 5-3 中的查询，该查询将聚合第二步中的一些值。完成后，结果（如图 5-4 所示）将显示平均值与平均范围行值 8.8125 非常接近。\n\n![](img/338675_4_En_5_Fig4_HTML.png)\n\
  *一张显示 3 种条件下平均行数的表格输出截图。*\n\n**图 5-4**\n`AVG_RANGE_ROWS` 估算验证结果\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows\nFROM Sales.SalesOrderDetail\n\
  WHERE SalesOrderID BETWEEN 43672 AND 43677;\nSELECT (COUNT(*)*1.)/COUNT(DISTINCT\
