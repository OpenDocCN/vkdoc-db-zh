  \n图 9-4：全文索引信息的查询结果\n\n\n### 概述\n\n本章概述了如何创建和查询全文索引。能够对大文档和自由格式文本进行过滤和查询，其重要性不亚于使用传统的结构化索引。通过全文索引，不仅可以检查列的内容，还可以检查列中文件的内容，从而使应用程序能够更好地识别与所提交请求在上下文上匹配的文档和其他工件。\n\
  \n"
- '# 10. 索引的误解与最佳实践


  在前几章中，已经介绍了索引及其结构。在接下来的章节中，将讨论构建索引并确保其按预期运行的策略。本章将破除一些常见的误解，同时为创建有效的索引奠定基础。


  误解会在尝试构建索引时带来不必要的负担。了解与索引相关的误解可以防止使用适得其反的索引策略。本章讨论的索引误解如下：


  *   数据库不需要索引。

  *   主键总是聚集的。

  *   在线索引操作不会阻塞。

  *   任何列都可以在多列索引中进行过滤。

  *   聚集索引按物理顺序存储记录。

  *   索引总是以相同的顺序输出。

  *   填充因子在插入时应用于索引。

  *   从堆表中删除会导致无法恢复的空间。

  *   每个表都应该是堆表，或者每个表都应该有一个聚集索引。


  在审视误解时，也值得一看最佳实践。最佳实践在许多方面看似误解，因为它们是普遍持有的信念。不同之处在于，最佳实践经得起推敲，并且在构建索引时是有用的建议。本章将探讨以下最佳实践：


  *   基于当前工作负载进行索引。

  *   默认情况下在主键上使用聚集索引。

  *   正确设定数据库级别的填充因子。

  *   正确设定索引级别的填充因子。

  *   如果用于过滤，对唯一键和外键列进行索引。

  *   平衡索引数量。


  ## 索引误解


  在构建数据库和索引时遇到的一个问题是处理误解。索引起源于许多不同的地方。有些来自先前版本的 SQL Server 及其工具、功能或限制。其他则来自他人的建议，这些建议基于特定数据库或场景中的条件，但并非普遍适用。


  索引误解的麻烦在于，它们混淆了索引策略。在可以构建索引来解决严重性能问题的情况下，误解有时会阻止考虑正确的方法。在接下来的几节中，将讨论一些关于索引的误解，并提供足够的细节来有效地破除它们。


  ### 误解 1：数据库不需要索引


  通常，在开发的应用程序中，会创建一个或多个数据库来存储应用程序的数据。在许多开发过程中，重点是添加新功能，并期望“性能会自行解决”。一个不幸的结果是，许多数据库在开发和部署时没有构建索引，因为人们认为它们不需要。


  除此之外，还有一些数据库开发人员认为他们的数据库在某种程度上与其他数据库不同。以下是不时听到的一些原因：


  *   “这是一个小数据库，不会有太多数据。”

  *   “这只是一个概念验证，不会存在太久。”

  *   “这不是一个重要应用，所以性能不关键。”

  *   “整个数据库已经可以放入内存；索引只会让它需要更多内存。”

  *   “我将只用这个数据库插入数据；永远不会查看结果。”


  这些原因中的每一个都很容易反驳。在当今的大数据世界中，即使预期很小的数据库在被采用后也可能开始快速成长。此外，数据库大小的小是相对的，每个人都会以不同的方式定义。一个开发者可能认为
  1 GB 很小，而另一个根据其先前经验可能认为 1 TB 很小。任何概念验证或不重要的数据库和应用程序，如果没有人需要或没有人有兴趣为其功能投入资源，就不会被创建。那些提出需求的人很可能期望他们要求的功能能够按预期执行。最后，将数据库放入内存并不意味着它会很快。正如之前讨论的，索引为数据提供了替代访问路径，旨在减少访问数据所需的页面数量。没有这些替代路径，数据访问很可能需要读取和维护内存中表的每一个页面。


  任何特定开发者听到的原因可能不完全是这些，但很可能是类似的。围绕这个误解的核心观点是索引不能帮助数据库表现得更好。打破这个借口的最有力方法之一是展示索引在特定场景下的好处。


  为了演示，考虑清单 10-1 中的 T-SQL。此代码示例创建了表 `MythOne`。接下来是一个几乎任何应用程序中都类似的查询。在清单 10-2 的查询输出中，显示该查询产生了
  1,496 次读取。


  ```

  表 ''MythOne''。 扫描计数 1，逻辑读取 1496，物理读取 0，预读 0，

  LOB 逻辑读取 0，LOB 物理读取 0，LOB 预读 0。

  ```

  `清单 10-2`

  `无索引表的 I/O 统计信息`


  ```

  USE AdventureWorks2017;

  GO

  SELECT * INTO MythOne

  FROM Sales.SalesOrderDetail;

  GO

  SET STATISTICS IO ON

  SET NOCOUNT ON

  GO

  SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
  SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

  FROM MythOne

  WHERE CarrierTrackingNumber = ''4911-403C-98'';

  GO

  SET STATISTICS IO OFF

  GO

  ```

  `清单 10-1`

  `无索引的表`


  有人可能会争辩说 1,496 次输入/输出（I/O）并不多。考虑到某些数据库的大小和当今世界的数据量，这可能是真的。但查询的 I/O 不应该与世界其他地方的性能相比较；它需要与其潜在的
  I/O、应用程序的需求以及部署它的平台进行比较。



  改进前一个演示中的查询，就像在 `CarrierTrackingNumber` 列上为表添加索引一样简单。要查看为 `MythOne` 添加索引的效果，请执行代码清单
  10-3 中的代码。创建索引后，查询的读取次数从 1,496 次减少到 15 次，如代码清单 10-4 所示。仅通过一个索引，查询的 I/O 就减少了近两个数量级。在这种情况下，索引提供了显著的价值。


  ```

  Table ''MythOne''. Scan count 1, logical reads 15 physical reads 0, read-ahead reads
  0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

  Listing 10-4

  I/O Statistics for the Table with an Index

  ```


  ```

  USE AdventureWorks2017;

  GO

  CREATE INDEX IX_CarrierTrackingNumber ON MythOne (CarrierTrackingNumber)

  GO

  SET STATISTICS IO ON

  SET NOCOUNT ON

  GO

  SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
  SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

  FROM MythOne

  WHERE CarrierTrackingNumber = ''4911-403C-98'';

  GO

  SET STATISTICS IO OFF

  GO

  Listing 10-3

  Adding an Index to MythOne

  ```


  这些示例表明索引能提供切实的好处。如果遇到对在数据库上建立索引感到焦虑的情况，试着剖析出反对的真正原因，并提供一个类似于本节中的例子。在第 13 章中，将讨论可用于确定在数据库中创建哪些索引的策略。


  ### 迷思 2：主键总是聚集的


  下一个相当普遍的迷思是认为主键总是聚集的。虽然在很多情况下确实如此，但不能假设所有主键也都是聚集索引。本书前面已经讨论过，一个表只能有一个聚集索引。如果是在聚集索引建立之后才创建主键，那么主键很可能会被创建为非聚集索引。


  为了说明主键的索引行为，将使用一个包含创建两个表的脚本。第一个表名为 `dbo.MythTwo1`，将首先创建；然后在 `RowID` 列上创建主键。对于第二个名为
  `dbo.MythTwo2` 的表，脚本将先创建它，并在创建主键之前先建立一个聚集索引。相关代码在代码清单 10-5 中。


  ```

  USE AdventureWorks2017;

  GO

  CREATE TABLE dbo.MythTwo1

  (

  RowID int NOT NULL

  ,Column1 nvarchar(128)

  ,Column2 nvarchar(128)

  );

  ALTER TABLE dbo.MythTwo1

  ADD CONSTRAINT PK_MythTwo1 PRIMARY KEY (RowID);

  GO

  CREATE TABLE dbo.MythTwo2

  (

  RowID int NOT NULL

  ,Column1 nvarchar(128)

  ,Column2 nvarchar(128)

  );

  CREATE CLUSTERED INDEX CL_MythTwo2 ON dbo.MythTwo2 (RowID);

  ALTER TABLE dbo.MythTwo2

  ADD CONSTRAINT PK_MythTwo2 PRIMARY KEY (RowID);

  GO

  SELECT OBJECT_NAME(object_id) AS table_name

  ,name

  ,index_id

  ,type

  ,type_desc

  ,is_unique

  ,is_primary_key

  FROM sys.indexes

  WHERE object_id IN (OBJECT_ID(''dbo.MythTwo1''),OBJECT_ID(''dbo.MythTwo2''));

  Listing 10-5

  Two Ways to Create Primary Keys

  ```


  运行代码段后，最终的查询将返回如图 10-1 所示的结果。该图显示，第一个表上的主键 `PK_MythTwo1` 被创建为聚集索引。然后在第二个表上，`PK_MythTwo2`
  被创建为非聚集索引。


  ![](img/338675_4_En_10_Fig1_HTML.png)


  A table has 3 rows and 7 columns labeled table name, name, index i d, type, type
  description, is unique, and is primary key. The row 1 entry, Myth Two 1 of table
  name is highlighted.


  图 10-1

  主键 `sys.indexes` 输出


  在创建主键和聚集索引时，记住本节讨论的行为很重要。如果存在需要将它们分离的情况，则需要在聚集索引之后定义主键，或者将其定义为 `NONCLUSTERED` 索引。


  主键定义了表中唯一性的真相来源，而聚集索引则为存储目的提供了逻辑排序顺序。理解各自的用例，可以在聚集索引和主键不在同一列上的场景中实现有效的索引。


  ### 迷思 3：联机索引操作不会阻塞


  SQL Server 企业版的优势之一是能够联机建立索引。在联机索引建立期间，正在创建索引的表仍然可用于查询和数据修改。当数据库需要被访问且维护窗口很短或不存在时，此功能非常有用。


  关于联机索引重建的一个常见迷思是它们不会引起任何阻塞。像任何迷思一样，这是错误的。使用联机索引操作时，在构建的主要部分，表上会持有一个意向共享锁。在结束时，为了交换进更新的索引，会短暂地持有一个共享锁（用于非聚集索引）或一个架构修改锁（用于聚集索引）。这与离线索引构建不同，后者在整个索引构建期间都会持有共享锁或架构修改锁。


  为了观察此行为的实际效果，将创建一个表，并使用扩展事件来监视在创建索引时应用到该表上的锁，包括使用和不使用 `ONLINE` 选项的情况。要开始此演示，请执行代码清单
  10-6 中的代码。此脚本创建表 `dbo.MythThree` 并用 1000 万条记录填充它。它返回的最后一项是表的 `object_id`，这是演示后续部分所需要的。对于此示例，`dbo.MythThree`
  的 `object_id` 是 624721278。


  **注意**

  此迷思的所有演示都需要 SQL Server 企业版或开发者版。


  ```

  USE AdventureWorks2017

  GO

  CREATE TABLE dbo.MythThree

  (

  RowID int NOT NULL

  ,Column1 uniqueidentifier

  );

  WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

  , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

  , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

  , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

  , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

  , L6(z) AS (SELECT TOP 10000000 0 FROM L5 a CROSS JOIN L5 b)

  INSERT INTO dbo.MythThree

  SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

  FROM L6;

  GO

  SELECT OBJECT_ID(''dbo.MythThree'')

  GO

  Listing 10-6

  MythThree Table Create Script

  ```


  为了在此场景中监视这些事件，将使用扩展事件来捕获在索引创建期间触发的 `lock_acquired` 和 `lock_released` 事件。在 SSMS 中为代码清单
  10-7 和代码清单 10-8 的代码打开新查询窗口。运行前，将代码清单 10-8 中的 `session_id` 更新为代码清单 10-7 中使用的 `session_id`；在此场景中，`session_id`
  是 `42`。对 `object_id` 也进行相同的更新。在扩展事件会话开始运行后，可以使用实时视图来监视发生的锁。


  ```

  USE AdventureWorks2017;

  GO

  IF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name = ''MythThreeXevents'')

