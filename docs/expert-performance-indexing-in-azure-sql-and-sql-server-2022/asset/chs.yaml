  \n对于 `GEOMETRY` 和 `GEOGRAPHY`，要返回任何非空结果，第一个参数和第二个参数必须具有相同的空间参考标识符 (`SRID`)，这是一种基于特定椭球体的空间参考系统，用于将地球展平或视为球体。\n\
