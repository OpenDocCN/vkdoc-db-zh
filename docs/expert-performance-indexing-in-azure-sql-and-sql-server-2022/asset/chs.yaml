  \ - COALESCE(i2.page_latch_wait_in_ms, 0),\ni1.page_io_latch_wait_count - COALESCE(i2.page_io_latch_wait_count,\
  \ 0),\ni1.page_io_latch_wait_in_ms - COALESCE(i2.page_io_latch_wait_in_ms, 0),\n\
  i1.tree_page_latch_wait_count - COALESCE(i2.tree_page_latch_wait_count, 0),\ni1.tree_page_latch_wait_in_ms\
  \ - COALESCE(i2.tree_page_latch_wait_in_ms, 0),\ni1.tree_page_io_latch_wait_count\
  \ - COALESCE(i2.tree_page_io_latch_wait_count, 0),\ni1.tree_page_io_latch_wait_in_ms\
  \ - COALESCE(i2.tree_page_io_latch_wait_in_ms, 0),\ni1.page_compression_attempt_count\
  \ - COALESCE(i2.page_compression_attempt_count, 0),\ni1.page_compression_success_count\
  \ - COALESCE(i2.page_compression_success_count, 0),\ni1.version_generated_inrow\
  \ - COALESCE(i2.version_generated_inrow, 0),\ni1.version_generated_offrow - COALESCE(i2.version_generated_offrow,\
  \ 0),\ni1.ghost_version_inrow - COALESCE(i2.ghost_version_inrow, 0),\ni1.ghost_version_offrow\
  \ - COALESCE(i2.ghost_version_offrow, 0),\ni1.insert_over_ghost_version_inrow -\
  \ COALESCE(i2.insert_over_ghost_version_inrow, 0),\ni1.insert_over_ghost_version_offrow\
  \ - COALESCE(i2.insert_over_ghost_version_offrow, 0)\nFROM IndexOperationalCTE i1\n\
  LEFT OUTER JOIN IndexOperationalCTE i2 ON i1.database_id = i2.database_id\nAND i1.object_id\
  \ = i2.object_id\nAND i1.index_id = i2.index_id\nAND i1.partition_number = i2.partition_number\n\
  AND i2.HistoryID = 2\n--验证没有行数小于 0\nAND NOT (i1.leaf_insert_count - COALESCE(i2.leaf_insert_count,\
  \ 0)  0\nOR i1.leaf_delete_count - COALESCE(i2.leaf_delete_count, 0) > 0\nOR i1.leaf_update_count\
  \ - COALESCE(i2.leaf_update_count, 0) > 0\nOR i1.leaf_ghost_count - COALESCE(i2.leaf_ghost_count,\
  \ 0) > 0\nOR i1.nonleaf_insert_count - COALESCE(i2.nonleaf_insert_count, 0) > 0\n\
  OR i1.nonleaf_delete_count - COALESCE(i2.nonleaf_delete_count, 0) > 0\nOR i1.nonleaf_update_count\
  \ - COALESCE(i2.nonleaf_update_count, 0) > 0\nOR i1.leaf_allocation_count - COALESCE(i2.leaf_allocation_count,\
  \ 0) > 0\nOR i1.nonleaf_allocation_count - COALESCE(i2.nonleaf_allocation_count,\
  \ 0) > 0\nOR i1.leaf_page_merge_count - COALESCE(i2.leaf_page_merge_count, 0) >\
  \ 0\nOR i1.nonleaf_page_merge_count - COALESCE(i2.nonleaf_page_merge_count, 0) >\
  \ 0\nOR i1.range_scan_count - COALESCE(i2.range_scan_count, 0) > 0\nOR i1.singleton_lookup_count\
