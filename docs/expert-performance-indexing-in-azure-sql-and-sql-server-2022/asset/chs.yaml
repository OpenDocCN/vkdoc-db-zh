  ### 误区六：索引总是以相同顺序输出行


  关于索引，一个比较常见的误区是它们保证了查询结果的输出顺序。这是不正确的，更糟糕的是，它为编写不准确的查询提供了无效的依据。正如本书前面所述，索引的目的是为数据提供高效的访问路径。这个目的并不能保证数据返回的顺序。这个误区的麻烦之处在于，在类似条件下执行查询时，SQL
  Server 通常会*看似*维持了顺序，但当这些条件改变时，执行计划就会变化，结果会按照数据处理的顺序返回，而不是最终用户所期望的顺序。


  为了探究这个误区，有必要看看在使用聚集索引的查询上，条件如何变化。在清单 10-15 中，有一个查询被执行了两次，针对 `Sales.SalesOrderHeader`
  和 `Sales.SalesOrderDetail` 表执行一个简单的聚合。这种查询可能会出现在 SQL Server 的多种查询类型中。


  ```sql

  USE AdventureWorks2017

  GO

  SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

  FROM Sales.SalesOrderHeader soh

  INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

  GROUP BY soh.SalesOrderID;

  GO

  DBCC FREEPROCCACHE

  DBCC SETCPUWEIGHT(1000)

  GO

  SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

  FROM Sales.SalesOrderHeader soh

  INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

  GROUP BY soh.SalesOrderID;

  GO

  DBCC FREEPROCCACHE

  DBCC SETCPUWEIGHT(1)

  GO

  ```

