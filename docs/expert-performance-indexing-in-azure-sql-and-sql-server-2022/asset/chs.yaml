  \n![](img/338675_4_En_11_Fig3_HTML.png)\n\n一个包含 9 列 6 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。包含了\
  \ 3 个非聚集索引。\n\n图 11-3\n\n非聚集索引的碎片结果\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE\
  \ NONCLUSTERED INDEX IX_Name ON dbo.UsingUniqueidentifier(Name) INCLUDE (JunkValue);\n\
