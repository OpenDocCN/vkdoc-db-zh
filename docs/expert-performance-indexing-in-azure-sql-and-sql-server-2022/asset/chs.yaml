  \ 500 毫秒。删除索引并执行相同的查询，总执行时间为 1,500 毫秒。这个测试非常基础，但它是一个坚实的基础，可以在此基础上构建策略，为现有的空间数据建立索引以提高整体性能。\n\
  \n## 理解统计信息、属性和信息\n\n一般来说，索引有许多数据管理视图和函数，使它们的管理比手动收集指标更容易、更高效。对于空间索引，还有一些额外包含的目录视图，有助于对它们进行独特的设置和管理。除了这些视图，还可以调用内置的存储过程来获取有关空间索引的信息。\n\
  \n\n\n### 视图\n\n有两个目录视图与空间索引相关：`sys.spatial_indexes` 和 `sys.spatial_index_tessellations`。`sys.spatial_indexes`\
  \ 视图提供了空间索引的类型、细分方案以及基本信息。`sys.spatial_indexes` 返回的 `spatial_index_type` 列，对 `GEOMETRY`\
  \ 索引返回 1，对 `GEOGRAPHY` 索引返回 2。清单 7-8 是查询该视图的示例，图 7-7 展示了结果。\n\n![](img/338675_4_En_7_Fig7_HTML.png)\n\
  \n一个表格有 5 列和一行数据。列标题分别为 name, type descending, spatial index type, spatial index\
  \ type descending, 和 tessellation scheme。其中 spatial index type descending 显示为 geometry。\n\
  \n图 7-7\n\n查询 `sys.spatial_indexes` 及结果显示了 IDX_WIZIP_GEOM 索引\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT  name,\n        type_desc,\n        spatial_index_type,\n        spatial_index_type_desc,\n\
  \        tessellation_scheme\nFROM    sys.spatial_indexes;\n```\n清单 7-8\n检索空间索引元数据的查询\n\
  \n现在可以查询 `sys.spatial_index_tessellations` 来查看索引的参数和细分方案。清单 7-9 是查询语句，图 7-8 展示了结果。\n\
  \n![](img/338675_4_En_7_Fig8_HTML.png)\n\n一个表格有 5 列和一行数据。列标题分别为 tessellation scheme,\
  \ bounding box x max, bounding box x min, bounding box y max, bounding box y min,\
  \ level 1 grid descending, level 4 grid descending, 和 cells per object。\n\n图 7-8\n\
  \n查询 `sys.spatial_index_tessellations` 及部分结果\n\n```\nUSE AdventureWorks2017\nGO\n\
  SELECT  tessellation_scheme,\n        bounding_box_xmax,\n        bounding_box_xmin,\n\
  \        bounding_box_ymax,\n        bounding_box_ymin,\n        level_1_grid_desc,\n\
  \        level_2_grid_desc,\n        level_3_grid_desc,\n        level_4_grid_desc,\n\
  \        cells_per_object\nFROM    sys.spatial_index_tessellations;\n```\n清单 7-9\n\
  检索细分信息的查询\n\n这两个目录视图都可以通过 `object_id` 进行连接，对于调优和维护任务非常有用。有时，根据空间数据的相关需求来操作并重建索引可能是有效的。\n\
  \n##### 存储过程\n\n除了目录视图之外，还提供了四个内部存储过程，用于进一步分析空间索引。这些存储过程返回索引上设置的所有属性的完整列表。这四个过程及其参数如下：\n\
  \n```\nsp_help_spatial_GEOMETRY_index [ @tabname =] 'tabname'\n    [ , [ @indexname\
  \ = ] 'indexname' ]\n    [ , [ @verboseoutput = ] 'verboseoutput'\n    [ , [ @query_sample\
  \ = ] 'query_sample']\nsp_help_spatial_GEOMETRY_index_xml [ @tabname =] 'tabname'\n\
  \    [ , [ @indexname = ] 'indexname' ]\n    [ , [ @verboseoutput = ]'{ 0 | 1 }]\n\
  \    [ , [ @query_sample = ] 'query_sample' ]\n    [ ,.[ @xml_output = ] 'xml_output'\
  \ ]\nsp_help_spatial_GEOGRAPHY_index [ @tabname =] 'tabname'\n    [ , [ @indexname\
  \ = ] 'indexname' ]\n    [ , [ @verboseoutput = ] 'verboseoutput' ]\n    [ , [ @query_sample\
  \ = ] 'query_sample' ]\nsp_help_spatial_GEOGRAPHY_index_xml [@tabname = 'tabname'\n\
  \    [ , [ @indexname = ] 'indexname' ]\n    [ , [ @verboseoutput = ] 'verboseoutput'\
  \ ]\n    [ , [ @query_sample = ] 'query_sample' ]\n    [ ,.[ @xml_output = ] 'xml_output'\
  \ ]\n```\n\n清单 7-10 展示了如何执行这些存储过程。该示例返回关于 `GEOMETRY` 索引 `IDX_COUNTY_GEOM` 的信息，该索引在清单\
  \ 7-7 中创建。图 7-9 展示了结果。\n\n![](img/338675_4_En_7_Fig9_HTML.jpg)\n\n一个表格有 2 列和 15\
  \ 行。列标题为 prop name 和 prop value，并选择了查询中第 0 级的对象单元总数。\n\n图 7-9\n\n`sp_help_spatial_GEOMETRY_index`\
  \ 示例及结果（结果可能有所不同）\n\n```\nUSE AdventureWorks2017\nGO\nDECLARE @Sample GEOMETRY\n\
  \    = 'POLYGON((-90.0 -180.0, -90.0 180.0, 90.0 180.0, 90.0 -180.0, -90.0 -180.0))';\n\
  EXEC sp_help_spatial_GEOMETRY_index 'dbo.tl_2017_us_county', 'IDX_COUNTY_GEOM',\
  \ 0, @Sample;\n```\n清单 7-10\n调查几何索引\n\n这些信息对于调整索引以使其更好地工作非常有用。这些细节类似于标准索引可用的统计信息。其中包括索引的每个级别中有多少对象可用。此外，还会返回与提供的查询样本匹配的数据。看到特定数量的相交对象与查询样本匹配，表明给定对象是否会被索引返回。通过将索引中的对象与匹配的对象进行比较，还可以检索索引中未被查询样本返回的对象百分比。所有这些都有助于理解索引满足空间查询要求的程度。\n\
  \n\n## 调优空间索引\n\n如代码清单 7-7 所示，创建空间索引时，有多种选项可用。通过调整这些选项，可以调整空间索引的行为。为了获得索引的最佳行为，需要尝试一些不同的选项组合。执行计划与查询性能指标相结合，有助于确定一组有效的选项。\n\
  \n对于一个`GEOMETRY`类型的列，可以向索引中添加一个边界框。这限制了索引覆盖的区域，从而可以创建一个比更通用的索引更能满足特定查询条件的索引。例如，如果更改边界框并重建索引，如代码清单\
  \ 7-11 所示，执行时间大约减少了 10%。\n\n```\nUSE AdventureWorks2017\nGO\nCREATE SPATIAL INDEX\
  \ IDX_COUNTY_GEOM ON dbo.tl_2017_us_county\n(\nGEOM\n)USING  GEOMETRY_GRID\nWITH\
  \ (\nBOUNDING_BOX =(-96.9, -95.3, 36.4, 36.6),\nGRIDS =(LEVEL_1 = LOW,LEVEL_2 =\
  \ MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),\nCELLS_PER_OBJECT = 16,\nPAD_INDEX  =\
  \ OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = ON,\nALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS\
  \  = ON) ON [PRIMARY];\nGO\n代码清单 7-11\n调整空间索引的边界框\n```\n\n通过更改边界框，一些对象被排除在索引之外。根据索引中使用的数据和参数，过滤掉更多项目并不一定能提高性能。由于空间索引的这种复杂性，在调整和测试索引时，进行测试和验证以确保达到预期的性能改进非常重要。为一组县改进查询性能的调整，可能会导致美国其他县的查询性能下降。因此，可能并不总是存在一个无需额外调整和验证即可实施的简单解决方案。\n\
  \n另一个可以进行的调整是更改索引的网格。到目前为止的示例中所做的选择是一个标准选择，如果不确定数据分布情况以及任何一次查询可能获得多少匹配项。如果某个特定查询包含的结果比例较高，不同的网格分布可能会带来更高的速度。这主要是一个实验的问题。但是，就像边界框一样，为一个数据集更改网格分布可能会损害另一个数据集。需要进行严格的测试，以确保空间索引对于常见的数据配置文件是最优的。\n\
  \n使用相同的示例，如果将第 1 级网格调整为`HIGH`详细网格，性能将降低 10%，使查询运行更慢。将其更改为`MEDIUM`既不会有益也不会损害执行时间。在这种情况下，调整任何组合的网格级别都没有显著提高速度，但在网格的第\
  \ 1 级或第 2 级使用`HIGH`详细级别会对性能产生负面影响。实验完成后，在此实例中选择保留默认网格是合理的。\n\n## 空间索引的限制\n\n空间索引提供了一些独特的功能，同时也带来了一系列限制。以下是空间索引限制的完整列表：\n\
  \n*   空间索引要求已存在聚集索引。\n*   空间索引只能在类型为`GEOMETRY`或`GEOGRAPHY`的列上创建。\n*   空间索引只能在具有主键的表上定义。表上主键列的最大数量为\
  \ 15。\n*   索引键记录的最大大小为 895 字节。更大的大小会引发错误。\n*   不支持使用数据库引擎优化顾问（DTA）。\n*   无法执行空间索引的联机重建。空间索引重建是离线操作，在重建期间索引不可用。如果需要重建，请在索引不太可能被使用的非工作时间进行。\n\
  *   不能在索引视图上指定空间索引。\n*   在支持的表中，任何空间列上最多只能创建 249 个空间索引。在同一空间列上创建多个空间索引可能很有用，例如，可以在单个列中索引不同的镶嵌参数。\n\
  *   空间数据的索引构建无法使用可用的进程并行性。\n\n## 总结\n\n空间数据的索引是一种复杂的数据存储和操作形式。本章介绍了空间数据处理和存储的关键组成部分，以帮助管理和审查数据库中空间数据类型的实现。\n\
  \n空间索引提供了快速确定点是否位于区域内或区域是否与其他区域重叠的能力。空间索引无需完全渲染每个空间要素，而是允许查询快速计算空间函数的结果。确保最佳性能的关键在于检查执行计划，并验证空间索引是否被使用以及查询持续时间是否可接受。\n\
  \n"
- '# 8. 索引内存优化表


  前几章重点介绍了 SQL Server 中特殊数据类型的索引。内存优化表也可用，它们允许模式和/或数据持久保存在内存中，而不是存储在磁盘上。这些表于 SQL Server
  2014 中引入，在 SQL Server 运行时完全驻留在内存中，依赖于基于磁盘的结构以根据需要持久保存模式/数据。


  由于内存优化表主要基于内存，这对表及其索引的传统结构有重大影响。本章将回顾内存优化表，重点介绍这些表与更熟悉的基于磁盘的表之间的差异。此外，还将提供关于如何在内存优化表上创建理想索引的指导。


  注意


  根据来源和 SQL Server 版本，内存优化表也被称为内存中 OLTP 和 Hekaton。本书将使用术语`内存优化表`，因为它与 Microsoft 联机丛书中使用的术语一致。


  ## 内存优化表概述


  ### 概述


  在深入探讨内存优化表的索引选项之前，有必要回顾一下内存优化表的基础知识。内存优化表是 SQL Server 2014 引入的一种表类型。与传统的表及其索引不同，内存优化表完全驻留在内存中。它们通过磁盘结构得到支持，但不依赖这些结构进行事务处理。这与传统表形成对比，传统表基于磁盘存储，在任何给定时间，通常只有一部分表及其索引驻留在缓冲池中。


  内存优化表提供的价值在于其为高度事务性工作负载带来的性能提升。通过将整个表管理在内存中，事务无需等待数据写入缓冲池。此外，内存优化表消除了锁定和闩锁，通过消除传统表所面临的经典争用问题，从而改善了
  OLTP 工作负载。


  内存优化表的实现导致在 SQL Server 中设计表的方式发生了一些变化。由于表现在是内存驻留的，它们被构建成一种对访问内存中数据最优的结构，这与从磁盘检索数据子集的方式不同。因此，内存优化表使用哈希索引和范围索引来存储数据，而不是
  B 树。此外，这些表不需要像传统表那样将数据从磁盘读取到缓冲池，从而消除了磁盘和内存结构之间对闩锁的需求。


  ### 创建前提条件


  要在数据库中创建内存优化表，需要在数据库内准备好一些先决条件。首先，需要向数据库添加一个专门用于内存优化数据的文件组，并包含一个支持内存优化表的文件。此外，数据库应启用属性
  `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`。此属性确保针对内存优化表的事务在 SNAPSHOT 隔离级别下执行。在清单 [8-1]
  中，数据库 `MemOptIndexing` 使用这些设置进行准备。


  ```sql

  USE master

  GO

  IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

  DROP DATABASE MemOptIndexing

  GO

  CREATE DATABASE MemOptIndexing

  GO

  ALTER DATABASE MemOptIndexing

  ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

  --This file location may change in your environment

  ALTER DATABASE MemOptIndexing

  ADD FILE (name=''memoryOptimizedData'',

  filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

  TO FILEGROUP memoryOptimizedFG

  ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

  GO

  ```

