  \ - COALESCE(i2.ghost_version_offrow, 0) > 0\nOR i1.insert_over_ghost_version_inrow\
  \ - COALESCE(i2.insert_over_ghost_version_inrow, 0) > 0\nOR i1.insert_over_ghost_version_offrow\
  \ - COALESCE(i2.insert_over_ghost_version_offrow, 0) > 0\n);\n```\n\n\n### 索引物理统计信息\n\
  \n用于监控索引的最后一个动态管理对象是 `sys.dm_db_index_physical_stats`。该动态管理对象提供数据库中索引当前物理结构的统计信息。这些信息的价值在于确定索引的碎片化程度，这一点将在第\
  \ 8 章中更详细地讨论。从监控的角度来看，收集物理统计信息是为了辅助后续分析。其目标是识别可能影响索引存储效率的潜在问题，或者反之，从而影响查询性能。\n\n\
  对于物理统计信息动态管理对象，统计信息的收集方式与其他动态管理对象略有不同。此动态管理对象与其他对象的主要区别在于收集信息时可能对数据库造成的影响。与另外两个引用内存中表的动态管理对象不同，`index_physical_stats`\
  \ 会读取索引中的页面以确定索引的实际碎片化和物理布局。有关使用 `sys.dm_db_index_physical_stats` 的影响的更多信息，请参考第\
  \ 5 章。为了适应这种差异，统计信息仅存储在历史表中；不会计算检索历史记录之间的时间点差异。此外，由于动态管理对象中包含的统计信息的性质，计算差异值几乎没有价值。\n\
  \n开始收集索引物理统计信息所需的第一个要素是前面提到的历史表。如代码清单 15-11 所示，该表使用与动态管理对象相同的架构，并增加了 `create_date`\
  \ 列。\n\n**提示**\n\n在生成动态管理对象所需的表架构时，使用了 SQL Server 2012 中引入的表值函数。函数 `sys.dm_exec_describe_first_result_set`\
  \ 可用于标识查询的列名和数据类型。\n\n```\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.index_physical_stats_history\n\
  (\nhistory_id INT IDENTITY(1, 1),\ncreate_date DATETIME2(0),\ndatabase_id SMALLINT,\n\
  object_id INT,\nindex_id INT,\npartition_number INT,\nindex_type_desc NVARCHAR(60),\n\
  alloc_unit_type_desc NVARCHAR(60),\nindex_depth TINYINT,\nindex_level TINYINT,\n\
  avg_fragmentation_in_percent FLOAT,\nfragment_count BIGINT,\navg_fragment_size_in_pages\
  \ FLOAT,\npage_count BIGINT,\navg_page_space_used_in_percent FLOAT,\nrecord_count\
  \ BIGINT,\nghost_record_count BIGINT,\nversion_ghost_record_count BIGINT,\nmin_record_size_in_bytes\
  \ INT,\nmax_record_size_in_bytes INT,\navg_record_size_in_bytes FLOAT,\nforwarded_record_count\
  \ BIGINT,\ncompressed_page_count BIGINT,\nhobt_id BIGINT NULL,\ncolumnstore_delete_buffer_state\
  \ TINYINT NULL,\ncolumnstore_delete_buffer_state_desc NVARCHAR(60) NULL,\nversion_record_count\
  \ BIGINT NULL,\ninrow_version_record_count BIGINT NULL,\ninrow_diff_version_record_count\
  \ BIGINT NULL,\ntotal_inrow_version_payload_size_in_bytes BIGINT NULL,\noffrow_regular_version_record_count\
  \ BIGINT NULL,\noffrow_long_term_version_record_count BIGINT NULL,\nCONSTRAINT PK_IndexPhysicalStatsHistory\n\
  PRIMARY KEY CLUSTERED (history_id),\nCONSTRAINT UQ_IndexPhysicalStatsHistory\nUNIQUE\n\
  (\ncreate_date,\ndatabase_id,\nobject_id,\nindex_id,\npartition_number,\nalloc_unit_type_desc,\n\
  index_depth,\nindex_level\n)\n);\n代码清单 15-11\n索引物理统计信息历史表\n```\n\n`index_physical_stats`\
  \ 的历史记录收集方式与前两个动态管理对象不同。由于它仅记录历史，因此无需捕获快照信息来为历史记录构建两个快照之间的差异。相反，当前统计信息会直接插入历史表，如代码清单\
  \ 15-12 所示。此外，由于 `index_physical_stats` 在收集统计信息时会对索引执行物理操作，因此在生成历史信息时需要注意几点。首先，脚本将通过\
  \ `CURSOR` 驱动的循环独立于其他数据库从每个数据库收集信息。这为每个数据库的统计信息收集提供了批处理分离，并限制了动态管理对象的影响。其次，查询应在非核心时段执行。每日维护窗口的开始时间最为理想。重要的是，此信息应在碎片整理或重新索引之前收集，因为这些操作将更改动态管理对象提供的信息。通常，此信息是碎片整理过程中的一个步骤收集的，这将在第\
  \ 8 章中讨论。如果是这样，则无需收集两次信息。为碎片整理收集并存储，以供以后监控索引使用。\n\n```\nUSE IndexingMethod;\nGO\n\
  DECLARE @DatabaseID INT;\nDECLARE DatabaseList CURSOR FAST_FORWARD FOR\nSELECT database_id\n\
  FROM sys.databases\nWHERE state_desc = 'ONLINE'\nAND database_id > 4;\nOPEN DatabaseList;\n\
  FETCH NEXT FROM DatabaseList\nINTO @DatabaseID;\nWHILE @@FETCH_STATUS = 0\nBEGIN\n\
  INSERT INTO dbo.index_physical_stats_history (\ncreate_date,\ndatabase_id,\nobject_id,\n\
  index_id,\npartition_number,\nindex_type_desc,\nalloc_unit_type_desc,\nindex_depth,\n\
  index_level,\navg_fragmentation_in_percent,\nfragment_count,\navg_fragment_size_in_pages,\n\
  page_count,\navg_page_space_used_in_percent,\nrecord_count,\nghost_record_count,\n\
  version_ghost_record_count,\nmin_record_size_in_bytes,\nmax_record_size_in_bytes,\n\
  avg_record_size_in_bytes,\nforwarded_record_count,\ncompressed_page_count,\nhobt_id,\n\
  columnstore_delete_buffer_state,\ncolumnstore_delete_buffer_state_desc,\nversion_record_count,\n\
  inrow_version_record_count,\ninrow_diff_version_record_count,\ntotal_inrow_version_payload_size_in_bytes,\n\
  offrow_regular_version_record_count,\noffrow_long_term_version_record_count\n)\n\
  SELECT GETDATE(),\ndatabase_id,\nobject_id,\nindex_id,\npartition_number,\nindex_type_desc,\n\
  alloc_unit_type_desc,\nindex_depth,\nindex_level,\navg_fragmentation_in_percent,\n\
  fragment_count,\navg_fragment_size_in_pages,\npage_count,\navg_page_space_used_in_percent,\n\
  record_count,\nghost_record_count,\nversion_ghost_record_count,\nmin_record_size_in_bytes,\n\
  max_record_size_in_bytes,\navg_record_size_in_bytes,\nforwarded_record_count,\n\
  compressed_page_count,\nhobt_id,\ncolumnstore_delete_buffer_state,\ncolumnstore_delete_buffer_state_desc,\n\
  version_record_count,\ninrow_version_record_count,\ninrow_diff_version_record_count,\n\
  total_inrow_version_payload_size_in_bytes,\noffrow_regular_version_record_count,\n\
  offrow_long_term_version_record_count\nFROM sys.dm_db_index_physical_stats(@DatabaseID,\
  \ NULL, NULL, NULL, 'SAMPLED');\nFETCH NEXT FROM DatabaseList\nINTO @DatabaseID;\n\
  END;\nCLOSE DatabaseList;\nDEALLOCATE DatabaseList;\n代码清单 15-12\n填充索引物理统计信息历史表\n\
  ```\n\n## 等待统计信息\n\n另一个提供索引相关信息的 DMO 是`sys.dm_os_wait_stats`。此 DMO 收集 SQL Server\
  \ 为启动或继续执行查询或其他请求而正在等待的资源相关信息。大多数性能调优方法都包含收集和分析等待统计信息的过程。从索引角度来看，有许多等待资源可以表明 SQL\
  \ Server 实例上可能存在索引问题。通过监控这些统计信息，我们可以在这些问题可能存在时得到通知。表 15-2 提供了一个最常表明可能存在索引问题的等待类型简短列表。\n\
  \n### 表 15-2: 与索引相关的等待统计信息\n\n| 选项名 | 描述 |\n| --- | --- |\n| `CXPACKET` | 同步参与并行查询的线程。此等待类型意味着并行查询正在尝试同步并行查询中操作员之间的数据，可能表示工作负载不平衡或工作线程被前置请求阻塞。\
  \ |\n| `IO_COMPLETION` | 表示等待诸如排序等各种情况的 I/O 操作（通常是同步 I/O）。此等待类型代表非数据页 I/O。 |\n|\
  \ `LCK_M_*` | 当任务正在等待获取索引或表上的锁时发生。 |\n| `PAGEIOLATCH_*` | 当任务正在等待 I/O 请求中的缓冲区的闩锁时发生。长时间等待可能表明磁盘子系统存在问题。\
  \ |\n\n与性能计数器类似，等待统计信息是反映 SQL Server 实例整体信息的一般健康指标。它们不直接指向资源；相反，它们收集的是 SQL Server\
  \ 实例上等待特定资源时的信息。\n\n> **注意**\n> 许多第三方供应商的性能监控工具将收集等待统计信息作为其监控的一部分。如果您的环境中已经安装了工具，请检查是否可以从该工具中检索等待统计信息。\n\
  \n收集等待统计信息遵循使用快照表和历史表的模式。为此，数据将首先收集在快照表中，快照之间的增量存储在历史表中。如清单 15-13 所示的快照和历史表包含支持快照和历史模式所需的列。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.wait_stats_snapshot\n(\nwait_stats_snapshot_id\
  \ INT IDENTITY(1, 1),\ncreate_date DATETIME2(0),\nwait_type NVARCHAR(60) NOT NULL,\n\
  waiting_tasks_count BIGINT NOT NULL,\nwait_time_ms BIGINT NOT NULL,\nmax_wait_time_ms\
  \ BIGINT NOT NULL,\nsignal_wait_time_ms BIGINT NOT NULL,\nCONSTRAINT PK_wait_stats_snapshot\n\
  PRIMARY KEY CLUSTERED (wait_stats_snapshot_id)\n);\nCREATE TABLE dbo.wait_stats_history\n\
  (\nwait_stats_history_id INT IDENTITY(1, 1),\ncreate_date DATETIME2(0),\nwait_type\
  \ NVARCHAR(60) NOT NULL,\nwaiting_tasks_count BIGINT NOT NULL,\nwait_time_ms BIGINT\
  \ NOT NULL,\nmax_wait_time_ms BIGINT NOT NULL,\nsignal_wait_time_ms BIGINT NOT NULL,\n\
  CONSTRAINT PK_wait_stats_history\nPRIMARY KEY CLUSTERED (wait_stats_history_id)\n\
  );\n```\n\n**清单 15-13**\n等待统计信息快照和历史表\n\n要收集等待统计信息，需要查询`sys.dm_os_wait_stats`的输出。与本章讨论的其他\
  \ DMO 不同，在插入数据之前需要对信息进行一些汇总。在之前版本的 SQL Server 中，`wait_stats` DMO 包含等待类型`MISCELLANEOUS`的两行。为了适应这种差异，清单\
  \ 15-14 中的示例脚本使用聚合来解决此问题。`wait_stats_snapshot`与其他快照之间的另一个区别是信息收集的频率。`Wait_stats`报告请求资源不可用时的信息。能够将此信息与一天中的特定时间联系起来可能至关重要。因此，`wait_stats`信息应大约每小时收集一次。在较繁忙的环境中可以更频繁地收集，以增加粒度，了解重要事件发生的时间。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nTRUNCATE TABLE dbo.wait_stats_snapshot\nINSERT\
  \ INTO dbo.wait_stats_snapshot (\ncreate_date,\nwait_type,\nwaiting_tasks_count,\n\
  wait_time_ms,\nmax_wait_time_ms,\nsignal_wait_time_ms\n)\nSELECT GETDATE(),\nwait_type,\n\
  waiting_tasks_count,\nwait_time_ms,\nmax_wait_time_ms,\nsignal_wait_time_ms\nFROM\
  \ sys.dm_os_wait_stats;\n```\n\n**清单 15-14**\n等待统计信息快照填充\n\n每次收集快照时，都需要将其与上一个快照之间的增量添加到`wait_stats_history`表中。为了确定`sys.dm_os_wait_stats`中的信息何时被重置，使用了`waiting_tasks_count`列。如果该列中的值低于上一个快照，则\
  \ DMO 中的信息已被重置。清单 15-15 提供了填充历史表的代码。\n\n虽然只有少数等待类型指向索引问题，但历史表将显示所有遇到的等待类型的结果。原因是需要将资源上的等待与发生的其他等待总数进行比较。例如，如果`CXPACKET`是服务器上相对最低的等待，那么研究查询并确定可以减少此等待类型发生的索引就没有太大价值，因为其他问题可能更显著地影响性能。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nWITH WaitStatCTE\nAS (SELECT create_date,\nDENSE_RANK()\
  \ OVER (ORDER BY create_date DESC) AS HistoryID,\nwait_type,\nwaiting_tasks_count,\n\
  wait_time_ms,\nmax_wait_time_ms,\nsignal_wait_time_ms\nFROM dbo.wait_stats_snapshot)\n\
  INSERT INTO dbo.wait_stats_history\nSELECT w1.create_date,\nw1.wait_type,\nw1.waiting_tasks_count\
  \ - COALESCE(w2.waiting_tasks_count, 0),\nw1.wait_time_ms - COALESCE(w2.wait_time_ms,\
  \ 0),\nw1.max_wait_time_ms - COALESCE(w2.max_wait_time_ms, 0),\nw1.signal_wait_time_ms\
  \ - COALESCE(w2.signal_wait_time_ms, 0)\nFROM WaitStatCTE w1\nLEFT OUTER JOIN WaitStatCTE\
  \ w2 ON w1.wait_type = w2.wait_type\nAND w1.waiting_tasks_count >= COALESCE(w2.waiting_tasks_count,\
  \ 0)\nAND w2.HistoryID = 2\nWHERE w1.HistoryID = 1\nAND w1.waiting_tasks_count -\
  \ COALESCE(w2.waiting_tasks_count, 0) > 0;\n```\n\n**清单 15-15**\n等待统计信息历史填充\n\n\n\
  ### 数据清理\n\n尽管监控所需的所有信息对索引分析都是必要的，但这些信息并非需要无限期保留。若没有在合理时间后清理已收集信息的任务，监控流程就不算完整。一个普遍可接受的信息清理计划是：在\
  \ 3 天后清除快照信息，在 90 天后清除历史信息。如果需要将历史数据保留更长时间，可以据此进行调整。\n\n快照信息仅用于准备历史信息，一旦增量创建完成就不再需要。由于\
  \ SQL Agent 作业可能出错，且收集点可能与上一次相隔一天，通常 3 天的窗口期能为流程提供所需余地，并适应可能出现的任何问题。\n\n历史表中的数据比快照信息更为关键，需要保留更长时间。这些信息为索引分析期间的活动提供数据支持。保留此信息的窗口期应与完成索引方法三次或更多次迭代通常所需的时间相匹配。这样，保留的信息可以在流程的几个周期中作为参考。\n\
  \n安排清理流程时，应至少每天执行一次，并在非核心处理时段进行。这将最小化每次执行时删除的信息量，并减少删除操作与服务器上其他活动可能产生的争用。如代码清单 15-16\
  \ 所示的删除脚本涵盖了本节讨论的所有表。\n\n```sql\nUSE IndexingMethod\nGO\nDECLARE @SnapshotDays INT\
  \ = 3\n,@HistoryDays INT = 90\nDELETE FROM dbo.index_usage_stats_snapshot\nWHERE\
  \ create_date < DATEADD(d, -@SnapshotDays, GETDATE())\nDELETE FROM dbo.index_usage_stats_history\n\
  WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())\nDELETE FROM dbo.index_operational_stats_snapshot\n\
  WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())\nDELETE FROM dbo.index_operational_stats_history\n\
  WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())\nDELETE FROM dbo.index_physical_stats_history\n\
  WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())\nDELETE FROM dbo.wait_stats_snapshot\n\
  WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())\nDELETE FROM dbo.wait_stats_history\n\
  WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())\n```\n\n代码清单 15-16\n索引监控快照与历史记录清理\n\
  \n### 事件追踪\n\n可以为监控索引收集的最后一套信息是事件追踪。追踪信息收集代表生产活动的 SQL 语句，这些语句可用于索引分析，以根据生产环境中的查询活动及其中存储的数据来识别可能有用的索引。虽然迄今为止收集的统计信息提供了活动对索引的影响以及\
  \ SQL Server 实例上其他资源使用情况的信息，但事件追踪收集的是导致这些统计信息产生活动的原因。对于 SQL Server，有两种方法可用于收集事件追踪数据：\n\
  \n*   SQL Trace\n\n*   扩展事件\n\n为了完整性，两种方法都将讨论。在我看来，在 SQL Server 中应仅使用扩展事件来收集事件追踪数据。这是因为扩展事件与\
  \ SQL Server 的集成度很高，有助于防止其在监控时引起性能问题。而且它能检索的详细程度远超 SQL Trace 的能力。\n\n#### SQL Trace\n\
  \nSQL Trace 以及由此衍生的 SQL Profiler 是 SQL Server 最初的追踪工具。它是 DBA 最常用的工具之一，可以轻松收集 SQL\
  \ Server 中的事件。使用 SQL Trace 收集信息时需要注意几个方面。首先，SQL Trace 很可能会收集大量信息，需要为此做好准备。换句话说，服务器和数据库越活跃，追踪（`.trc`）文件就越大。过滤事件有助于确保只返回相关细节。同样，不要在已经使用率很高或专用于数据或事务日志文件的驱动器上收集追踪信息。这样做可能（并且很可能）会影响这些驱动器上的\
  \ I/O 性能。监控的最终目标是提高系统性能；需要尽量减小监控的影响。\n\n最后，SQL Trace 和 SQL Profiler 在 SQL Server\
  \ 2012 中已被弃用。这并不意味着这些工具不再起用，但它们计划在未来的 SQL Server 版本中移除。尽管 SQL Trace 已被弃用，但在某些场景下，例如为数据库引擎优化顾问构建工作负载时，它仍然是收集追踪信息最方便的工具。\n\
  \n注意\n建议随时了解 SQL Server 中的已弃用功能。有关已弃用功能的更多信息，请参阅 SQL Docs 的 [`https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022`](https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022)。\n\
  \n创建 SQL Trace 会话有四个基本步骤：\n\n1.  构建追踪会话。\n\n2.  为会话分配事件和列。\n\n3.  向会话添加筛选器。\n\n\
  4.  启动 SQL Trace 会话。\n\n接下来的几页将介绍这些步骤，并描述在 SQL Server 2022 中创建 SQL Trace 会话所使用的组件。该脚本也适用于早期版本的\
  \ SQL Server。\n\n要开始使用 SQL Trace 进行监控，必须首先创建一个追踪会话。会话使用 `sp_trace_create` 存储过程创建。该过程接受多个参数来配置会话如何收集信息。在代码清单\
  \ 15-17 所示的示例会话中，SQL Trace 会话将创建文件，当文件大小达到 50 MB 限制时自动滚动更新。限制文件大小是为了便于文件管理。在大多数环境中，复制许多\
  \ 50 MB 的文件比复制 1 GB 或更大的文件更容易。如果偏好更大的文件而非大量小文件，可以调整此大小。追踪文件创建在 `c:\\temp` 目录下，文件名为\
  \ `IndexingMethod`。如果此文件夹不存在，请务必创建。注意，此名称可以更改为适合监控设置所在服务器和数据库需求的任何名称。\n\n```sql\n\
  USE master;\nGO\nDECLARE @rc INT,\n@TraceID INT,\n--Maximum .trc file size in MB\n\
  @maxfilesize BIGINT = 50,\n--File name and path, minus the extension\n@FileName\
  \ NVARCHAR(256) = N'c:\\temp\\IndexingMethod';\nEXEC @rc = sp_trace_create @TraceID\
  \ OUTPUT, 0, @FileName, @maxfilesize, NULL;\nIF (@rc  0)\nRAISERROR('Error creating\
  \ trace file', 16, 1);\nSELECT *\nFROM sys.traces\nWHERE id = @TraceID;\n```\n\n\
  代码清单 15-17\n创建 SQL Trace 会话\n\n\n\n在创建了 SQL Trace 会话后，下一步是向会话中添加事件。有两种事件对于索引监控最有价值：`RPC:Completed`\
  \ 和 `SQL:BatchCompleted`。`RPC:Completed` 在远程过程调用完成时返回结果；其最佳示例是存储过程的完成。另一个事件 `SQL:BatchCompleted`\
  \ 在即席（ad hoc）和预准备（prepared）批处理完成时发生。通过这两个事件，将收集服务器上所有已完成的 SQL 语句。\n\n要向 SQL Trace\
  \ 会话添加事件，需使用存储过程 `sp_trace_setevent`。该存储过程添加事件以及从事件中请求的列到跟踪中，每次执行存储过程都会添加一对事件和列。对于两个事件，每个事件有\
  \ 15 列，则需要执行该存储过程 30 次。对于示例会话（如清单 15-18 所示），每个会话收集以下列：\n\n*   `ApplicationName`\n\
  *   `ClientProcessID`\n*   `CPU`\n*   `DatabaseID`\n*   `DatabaseName`\n*   `Duration`\n\
  *   `EndTime`\n*   `HostName`\n*   `LoginName`\n*   `NTUserName`\n*   `Reads`\n\
  *   `SPID`\n*   `StartTime`\n*   `TextData`\n*   `Writes`\n\n事件和列的代码可以在系统目录视图中找到。事件列在视图\
  \ `sys.trace_events` 中。可用的列列在 `sys.trace_columns` 中。列视图还包括一个指示符，用于标识是否可以筛选该列的值，这在创建\
  \ SQL Trace 会话的下一步中很有用。\n\n```sql\nUSE master;\nGO\nDECLARE @on INT = 1,\n@FileName\
  \ NVARCHAR(256) = N'c:\\temp\\IndexingMethod',\n@TraceID INT;\nSET @TraceID = (\n\
  SELECT id FROM sys.traces WHERE path LIKE @FileName + '%'\n);\n-- RPC:Completed\n\
  EXEC sp_trace_setevent @TraceID, 10, 1, @on;\nEXEC sp_trace_setevent @TraceID, 10,\
  \ 10, @on;\nEXEC sp_trace_setevent @TraceID, 10, 11, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 12, @on;\nEXEC sp_trace_setevent @TraceID, 10, 13, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 14, @on;\nEXEC sp_trace_setevent @TraceID, 10, 15, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 16, @on;\nEXEC sp_trace_setevent @TraceID, 10, 17, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 18, @on;\nEXEC sp_trace_setevent @TraceID, 10, 3, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 35, @on;\nEXEC sp_trace_setevent @TraceID, 10, 6, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 10, 8, @on;\nEXEC sp_trace_setevent @TraceID, 10, 9, @on;\n--SQL:BatchCompleted\n\
  EXEC sp_trace_setevent @TraceID, 12, 1, @on;\nEXEC sp_trace_setevent @TraceID, 12,\
  \ 10, @on;\nEXEC sp_trace_setevent @TraceID, 12, 11, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 12, @on;\nEXEC sp_trace_setevent @TraceID, 12, 13, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 14, @on;\nEXEC sp_trace_setevent @TraceID, 12, 15, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 16, @on;\nEXEC sp_trace_setevent @TraceID, 12, 17, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 18, @on;\nEXEC sp_trace_setevent @TraceID, 12, 3, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 35, @on;\nEXEC sp_trace_setevent @TraceID, 12, 6, @on;\nEXEC sp_trace_setevent\
  \ @TraceID, 12, 8, @on;\nEXEC sp_trace_setevent @TraceID, 12, 9, @on;\n```\n清单 15-18\
  \ 向 SQL Trace 会话添加事件和列\n\n下一步是从 SQL Trace 会话中筛选掉不需要的事件。没有必要在每次 SQL Trace 会话中，为所有数据库和所有应用程序一直收集所有语句。事实上，在清单\
  \ 15-19 中，来自系统数据库（数据库 ID 小于 5）的事件将从会话中移除。用于筛选 SQL Trace 会话的存储过程是 `sp_trace_setfilter`。该存储过程接受来自\
  \ `sys.trace_columns` 的列 ID。可以对事件中未包含的列进行筛选，并且筛选器适用于所有事件。\n\n```sql\nUSE master;\n\
  GO\nDECLARE @intfilter INT = 5,\n@FileName NVARCHAR(256) = N'c:\\temp\\IndexingMethod',\n\
  @TraceID INT;\nSET @TraceID = (\nSELECT id FROM sys.traces WHERE path LIKE @FileName\
  \ + '%'\n);\n--Remove system databases from output\nEXEC sp_trace_setfilter @TraceID,\
  \ 3, 0, 4, @intfilter;\n```\n清单 15-19 向 SQL Trace 会话添加筛选器\n\n设置 SQL Trace 监控的最后一步是启动跟踪。此任务使用存储过程\
  \ `sp_trace_setstatus` 完成，如清单 15-20 所示。通过此过程，可以启动、暂停和停止 SQL Trace 会话。一旦跟踪启动，它将在提供的文件位置开始创建\
  \ `.trc` 文件，SQL Trace 监控的配置即告完成。当 SQL Trace 会话的收集期结束时，将使用状态码 2（而不是 1）的此脚本来终止会话。清单\
  \ 15-21 提供了此脚本。\n\n```sql\nUSE master;\nGO\nDECLARE @FileName NVARCHAR(256) = N'c:\\\
  temp\\IndexingMethod',\n@TraceID INT;\nSET @TraceID = (\nSELECT id FROM sys.traces\
  \ WHERE path LIKE @FileName + '%'\n);\n-- Set the trace status to start\nEXEC sp_trace_setstatus\
  \ @TraceID, 1;\n```\n清单 15-20 启动 SQL Trace 会话\n\n> 注意\n> 一些 SQL Server 专家更喜欢不使用数据库引擎优化顾问，因为可能收到无效的建议，他们更倾向于手动分析数据库并确定所需的索引。这种偏见错过了发现容易解决的问题（low-hanging\
  \ fruit）或通过更改聚集索引位置来提高性能的机会。\n\n```sql\nUSE master;\nGO\nDECLARE @FileName NVARCHAR(256)\
  \ = N'c:\\temp\\IndexingMethod',\n@TraceID INT;\nSET @TraceID = (\nSELECT id FROM\
  \ sys.traces WHERE path LIKE @FileName + '%'\n);\n-- Set the trace status to stop\n\
  EXEC sp_trace_setstatus @TraceID, 0;\n```\n清单 15-21 停止 SQL Trace 会话\n\n本节中的 SQL\
  \ Trace 会话示例相当基础。在任何给定的生产环境中，可能需要设计更智能的进程，该进程在每个跟踪文件中收集指定时间段的信息，而不是使用文件大小来控制文件滚动速率。对\
  \ SQL Trace 收集信息以进行监控索引的这些类型的更改，应该不会影响在本章后面使用 SQL Trace 信息用于预期目的的能力。使用 SQL Trace\
  \ 时，还有最后一项需要考虑。跟踪信息不需要像性能计数器和 DMO 信息那样持续收集。相反，SQL Trace 信息通常更适合收集 4-8 小时的时间段，该时间段代表数据库平台上的常规活动日。如果存在已知的性能不佳时间段，则可以专门针对该特定时间段。\n\
  \n使用 SQL Trace，有可能收集过多信息，这会压倒分析阶段并延迟索引建议。因此，筛选和针对关键时间和事件可以使发现有用信息的任务变得显著更容易完成。\n\
  \n\n\n#### 扩展事件\n\n扩展事件是 SQL Server 中首选的跟踪工具。它包含的功能远多于 SQL Trace，但缺乏后者的直观简洁性。如果有机会在两种解决方案之间选择，使用扩展事件创建跟踪是更优的选择。创建扩展事件会话有两种方式。第一种是通过\
  \ T-SQL，本章将演示这种方法。第二种是使用 SQL Server Management Studio 中的图形用户界面，其中包含用于构建新会话的向导。创建会话的最佳实践在很大程度上与\
  \ SQL Trace 相同。例如，请务必在非数据和日志文件存储驱动器上收集会话日志。\n\n将在扩展事件中创建的跟踪将收集与 SQL Trace 相同的一般信息。主要区别在于会话的创建方式以及某些事件和列的名称。在扩展事件中捕获的事件是\
  \ `rpc_completed` 和 `sql_batch_completed`，分别替代了 RPC:Completed 和 SQL:BatchCompleted。每个事件都捕获自己的一组列或数据元素，如表\
  \ 15-3 所列。\n\n**表 15-3 扩展事件列**\n\n| 事件 | 列 |\n| --- | --- |\n| `rpc_completed` |\
  \ • `connection_reset_option`• `cpu_time`• `data_stream`• `duration`• `logical_reads`•\
  \ `object_name`• `output_parameters`• `physical_reads`• `result`• `row_count`• `statement`•\
  \ `writes` |\n| `sql_batch_completed` | • `batch_text`• `cpu_time`• `duration`•\
  \ `logical_reads`• `physical_reads`• `result`• `row_count`• `writes` |\n\n扩展事件会话中将包含一些额外的数据，这些数据作为全局字段或操作提供，可用于扩展每个事件中包含的默认信息。这些类似于上一个会话中\
  \ SQL Trace 会话包含的元素。要包含的全局字段如下：\n\n*   `client_app_name`\n*   `client_hostname`\n\
  *   `database_id`\n*   `database_name`\n*   `nt_username`\n*   `process_id`\n* \
  \  `session_id`\n*   `sql_text`\n*   `username`\n\n定义好会话后，下一步是创建会话。扩展事件利用 T-SQL\
  \ 数据定义语言（DDL）而不是存储过程来创建会话。清单 15-22 中的代码提供了会话的 DDL 并启动了会话。对于添加的每个事件，使用 `ADD EVENT`\
  \ 语法，并使用 `ACTION` 子句来包含全局字段。为方便起见，该会话被设计为将输出存储在 SQL Server 的默认日志文件夹中，文件名为 `EventTracingforIndexTuning`。\n\
  \n```sql\nUSE master;\nGO\nIF EXISTS (\nSELECT *\nFROM sys.server_event_sessions\n\
  WHERE name = 'EventTracingforIndexTuning'\n)\nDROP EVENT SESSION [EventTracingforIndexTuning]\
  \ ON SERVER;\nCREATE EVENT SESSION [EventTracingforIndexTuning]\nON SERVER\nADD\
  \ EVENT sqlserver.rpc_completed\n(ACTION (\npackage0.process_id,\nsqlserver.client_app_name,\n\
  sqlserver.client_hostname,\nsqlserver.database_id,\nsqlserver.database_name,\nsqlserver.nt_username,\n\
  sqlserver.session_id,\nsqlserver.sql_text,\nsqlserver.username\n)\n),\nADD EVENT\
  \ sqlserver.sql_batch_completed\n(ACTION (\npackage0.process_id,\nsqlserver.client_app_name,\n\
  sqlserver.client_hostname,\nsqlserver.database_id,\nsqlserver.database_name,\nsqlserver.nt_username,\n\
  sqlserver.session_id,\nsqlserver.sql_text,\nsqlserver.username\n)\n)\nADD TARGET\
  \ package0.event_file\n(SET filename = N'EventTracingforIndexTuning')\nWITH (\n\
  STARTUP_STATE = ON\n);\nGO\nALTER EVENT SESSION [EventTracingforIndexTuning] ON\
  \ SERVER STATE = START;\nGO\n```\n**清单 15-22 创建并启动扩展事件会话**\n\n与 SQL Trace 会话类似，扩展事件会话可以启动和停止。不需要暂停它们，因为会话的元数据独立于会话是否正在运行而存在。清单\
  \ 15-22 包含了启动跟踪的语法。清单 15-23 显示了停止跟踪的代码。此外，如果 SQL Server 重启，扩展事件跟踪会话将被保留，并且可以配置为自动重启，这与\
  \ SQL Trace 在重启后消失不同。\n\n```sql\nUSE master;\nGO\nALTER EVENT SESSION [EventTracingforIndexTuning]\
  \ ON SERVER STATE = STOP;\nGO\n```\n**清单 15-23 停止扩展事件会话**\n\n这个扩展事件会话代表了一个相对简单的用例。扩展事件的好处在于它能够轻松捕获\
  \ SQL Server 实例的工作负载。使用来自跟踪的工作负载，可以定位、分析常见查询，并在需要时通过适当的索引更改进行优化。这允许利用这些信息改进环境中的性能，然后使用额外的跟踪来监控和测试这些改进。\n\
  \n### 查询存储\n\n查询存储在 SQL Server 2016 中引入，是一个每个数据库的数据存储，包含执行计划信息和相关的执行统计信息。虽然它不一定直接提供索引调优信息，但此功能的进步允许实现自动索引功能。这基于\
  \ Azure SQL Database 中 SQL Server 现有的自动索引管理功能，详见 [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-%25C2%25A\
  \ Dserver-%25C2%25A Dver15%2523automatic-index-management)。截至撰写本文时，自动索引管理在 SQL Server\
  \ 2022 或更早版本中不可用。\n\n查询存储提供了对数据库中执行的查询、其资源消耗、执行计划等的直接洞察。这提供了一个清晰的界面来理解计划缓存中的内容，无需进行复杂的系统视图查询，这在较大的\
  \ SQL Server 上可能具有挑战性。\n\n使用查询存储的另一个好处是，在执行计划因性能改进而被其他执行计划替换的情况下，有时这可能与索引相关。这可能是由于索引的统计信息不佳，或者缺乏最佳索引以在不替换计划的情况下提供所需的性能。对于这两种情况，通过监控查询存储活动来识别这些性能问题，可以洞察环境中所需的索引。\n\
  \n出于监控索引的目的，这些原因提供了利用查询存储的另一个理由。要在数据库上启用查询存储，请执行清单 15-24 中的代码。请注意，从 SQL Server 2022\
  \ 开始，默认启用查询存储。\n\n虽然深入探讨查询存储本身超出了本书的范围，但在数据收集频率、存储数据量、数据丢弃率以及查询存储当前是否可写等方面具有很大的灵活性。建议进一步阅读查询存储相关资料；一个很好的起点是\
  \ Apress 出版的《Query Store for SQL Server 2019》。\n\n```sql\nUSE [master]\nGO\nALTER\
  \ DATABASE [AdventureWorks2017] SET QUERY_STORE = ON\nGO\nALTER DATABASE [AdventureWorks2017]\
  \ SET QUERY_STORE (OPERATION_MODE = READ_WRITE)\nGO\n```\n**清单 15-24 在 AdventureWorks2017\
  \ 上启用查询存储**\n\n\n"
- "# 16. 索引分析\n\n## 摘要\n\n在本章中，我们逐步讲解了如何使用各种工具来监控索引。监控索引是通用平台监控的延伸，但也是为确定索引是否合适或进一步调整是否有益提供基础的重要环节。通过监控和索引分析，我们回顾了如何收集动态管理数据和性能计数器。在下一章，这些信息将被用于分析索引是否存在或是否合适。\n\
  \n在上一章中，我们讨论了监控索引时应收集哪些信息。所有这些信息对于索引数据库的下一步流程——即确定要应用哪些索引——都是必需的。在本章中，我们将利用监控期间收集的所有信息，来分析性能状态和现有索引的价值。索引分析的最终目标是构建一个需要创建、修改以及可能从数据库中删除的索引列表。在某些情况下，索引分析似乎近乎于一门艺术。有许多决策将依据过去的性能来预估未来的索引需求。然而，最终，对于提出的每一项变更，在索引解决方案实施前后，都会有支持性的证据，从统计学上确认或反驳索引的价值。这有助于确保，无论索引挑战多么复杂，它都并将始终应该更像科学而非艺术。\n\
  \n索引分析的一般流程分为几个部分。每个部分都包含一个分析过程：从高层次开始以识别需要关注的焦点，然后深入到现有问题。分析部分如下：\n\n*   服务器状态审查\n\
  *   模式发现\n*   `数据库引擎优化顾问`\n*   未使用的索引\n*   索引计划使用情况\n\n在开始分析数据库索引的任何练习之前，首先有必要了解当前的部署状态。针对部署中的数据库与已部署到生产环境的数据库，可使用的策略大致相同。然而，在统计信息收集的地点和方式上，两者之间存在显著差异。\n\
  \n对于尚未开发完成的数据库，重点将放在部署后用户预期如何与数据和应用程序交互。针对数据库的测试和工作负载将侧重于验证数据库中的索引是否支持这些活动。为测试选择的活动很可能是基于对用户将如何使用应用程序的估算和预测。确定这些活动将是负责制定应用程序需求的业务分析师的职责。\n\
  \n一旦数据库部署完成，监控的重点就从“活动可能是什么”转变为“活动实际是什么”。用户采用功能的速率以及该活动中数据的分布情况将变得已知。此时，在测试和规划阶段开发的索引可能并不适合实际工作负载。在部署后首次对数据库使用`索引方法`可能会带来重大的索引变更。对已部署数据库进行索引的关键在于，分析需要基于生产环境中的工作负载统计数据。这样做将为实施能为数据库带来最大收益的索引提供必要的指导，并将其与用户正在使用的功能及其使用频率相匹配。\n\
  \n对处于任一部署状态的数据库进行索引分析，将提供一组基于当前已知和理解的数据库情况下的最优索引。当索引被应用后，其效果可能且将会有所不同。一个索引可能为上个月数据库中的某个活动提供了完美的数据访问路径，但随着新版本的发布、新客户端的加入或用户行为的改变，它可能不再是最佳选择。正如常听到的关于股市的说法：过往业绩并不预示未来结果。\n\
  \n幸运的是，通过熟练运用`索引方法`，我们将能够为环境提供所需的索引。在本章中，重点是已部署到生产环境的数据库。如前所述，这些策略对于处于开发和生产两种状态的数据库和服务器都适用——但为简化起见，默认视角和方法将以生产环境为准。\n\
  \n随着我们深入索引分析的每个领域，将逐步制定一个索引列表，用于创建、修改、删除或进一步调查。对于需要进一步调查的索引，将在索引分析过程的后续部分中确定如何处理该索引。\n\
  \n**注意**\n\n在本章中，在创建工作负载的脚本和用于审查统计信息的查询脚本之间，运行来自`第 15 章`的监控脚本将非常重要。根据收集统计信息所使用的计划，可能需要等待数小时才能收集到统计信息，这可能导致查询无法提供预期的结果。\n\
  \n## 服务器状态审查\n\n索引分析的第一步是审查服务器的状态。同时审查主机服务器环境和`SQL Server`实例环境，以识别是否存在表明可能存在索引问题的状况。通过从高层次开始，而不是直接查看表和单个索引，我们可以避免“只见树木，不见森林”。通常，当许多数据库中有数百（或数千）个索引时，很容易过度专注于一个看起来索引不佳的索引或表，结果后来才发现该表只有不到一百行，而数据库中的其他表则有数十亿行。\n\
  \n在分析服务器状态时，将考虑以下三个领域：\n\n*   `性能计数器`\n*   `等待统计信息`\n*   `缓冲区分配`\n\n这些领域中的每一个都为我们提供了从何处开始聚焦索引分析过程的思路。它们让数据库平台能够确定与索引相关的性能问题可能存在于何处。\n\
  \n### 性能计数器\n\n为索引监控收集的第一组信息包括性能计数器。自然，在执行索引分析时，我们首先会查看这些性能计数器。在监控期内跟踪性能计数器并随时间推移进行观察，并不能就如何处理索引问题提供明确的指导，但它会为发现性能问题提供一个切入点，从而确定从何处着手。\n\
  \n对于每个计数器，我们将讨论一些通用准则。这些准则是一般性指导，应**谨慎看待**。使用它们来初步判断计数器是否超出了可能被视为正常的范围。如果您的平台上计数器值偏高有特定原因，那么维护基线表就能确保在标记异常值之前识别出正常状态。使用对您的环境有效的计数器值，而不是对其他环境效果最佳的值。\n\
  \n性能计数器应通过两种方式分析。第一种是使用 Excel 和/或 Power BI 查看基于性能计数器的图表和趋势线。第二种是通过查询性能计数器表中的信息快照来进行审查。本章采用第二种方法，因为它易于设置和演示。快照查询的指南同样适用于这两种方法。\n\
  \n> 注意\n>\n> 为简化起见，本节中的快照分析查询将限定在数据库级别。在大多数情况下，需要针对 SQL Server 实例上的每个数据库执行这些查询。实现此目的的方法包括使用\
  \ `sp_MSForEachDB` 或一个逐一遍历给定数据库集的流程。\n\n#### 每秒转发票据数\n\n如第 2 章所述，当堆记录被更新且不再适合存储在其原始数据页中时，就会发生记录转发。在这些情况下，会在原始记录中放置一个指向新记录位置的指针。性能计数器\
  \ `Forwarded Records/sec`（每秒转发票据数）衡量服务器上访问转发行的速率。通常，`Forwarded Records/sec` 的比率不应超过\
  \ `Batch Requests/sec`（每秒批处理请求数）的 10%。这个比率可能存在误导，因为 `Forwarded Records` 代表行级别的数据访问，而\
  \ `Batch Requests` 代表更高范围的操作。尽管如此，该比率提供了一个指标，用于判断 `Forwarded Records/sec` 的数值何时可能超过建议水平。\n\
  \n用于转发票据的快照查询（如清单 16-1 所示）提供了 `Forwarded Records/sec` 计数器和比率计算的列。在此查询中，值被聚合为最小值、平均值和最大值。比率是在每组收集的计数器上计算的，并在计算之后进行聚合。最后一列\
  \ `PctViolation` 显示 Forward Records 与 `Batch Requests` 的比率超过 10% 准则的次数百分比。\n\n```sql\n\
  USE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n        \
  \   server_name,\n           MAX(IIF(counter_name = 'Forwarded Records/sec', Calculated_Counter_value,\
  \ NULL)) AS ForwardedRecords,\n           MAX(IIF(counter_name = 'Forwarded Records/sec',\
  \ Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name =\
  \ 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 10) AS ForwardedRecordRatio\n\
  \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Forwarded Records/sec',\
  \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
  SELECT server_name,\n       MIN(ForwardedRecords) AS MinForwardedRecords,\n    \
  \   AVG(ForwardedRecords) AS AvgForwardedRecords,\n       MAX(ForwardedRecords)\
  \ AS MaxForwardedRecords,\n       MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n\
  \       AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,\n       MAX(ForwardedRecordRatio)\
  \ AS MaxForwardedRecordRatio,\n       FORMAT(1. * SUM(IIF(ForwardedRecordRatio >\
  \ 1, 1, NULL)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
  \ BY server_name;\n```\n\n**清单 16-1**\n转发票据计数器分析\n\n在审查快照查询的输出时，需要对返回的信息提出几个问题。首先，审查计数器和比率的最小值和最大值。最小值是否接近或等于零？最大值有多高？与监控期间收集的先前值相比如何？计数器和比率的平均值更接近最小值还是最大值？如果转发票据的数量和峰值在增加，则需要进行进一步分析。接下来，考虑\
  \ `PctViolation` 列。百分比是否大于 1%？如果是，则需要对转发票据进行进一步分析。如果需要深入研究 Forward Records，下一步是将分析从服务器级别转移到各个数据库。\n\
  \n为了提供一些转发票据活动的示例，请执行清单 16-2 中的脚本。该脚本将创建一个包含堆的表，向其中插入记录，并更新这些记录，导致某些记录被扩展，从而引发记录转发。最后，一个查询将访问这些转发票据，导致转发票据访问操作。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nDROP TABLE IF EXISTS dbo.HeapExample;\nGO\n\
  CREATE TABLE dbo.HeapExample (\n    ID INT IDENTITY,\n    FillerData VARCHAR(2000)\n\
  );\nINSERT INTO dbo.HeapExample (FillerData)\nSELECT REPLICATE('X',100)\nFROM sys.all_objects\n\
  UPDATE dbo.HeapExample\nSET FillerData = REPLICATE('X',2000)\nWHERE ID % 5 = 1\n\
  GO\nSELECT *\nFROM dbo.HeapExample\nWHERE ID % 3 = 1\nGO 2\n```\n\n**清单 16-2**\n\
  转发票据示例\n\n\n需要注意的是，只有当数据库中使用了堆表，或者需要识别堆表何时被不当时，才需要进行“转发记录数/秒”的分析。\n\n一旦确定需要对数据库进行转发记录分析，该过程将利用动态管理对象（DMO）中可用的信息。有两个\
  \ DMO 有助于确定转发记录问题的范围和程度，它们是 `sys.dm_db_index_physical_stats` 和 `sys.dm_db_index_operational_stats`。在分析中，`sys.dm_db_index_operational_stats`\
  \ 的信息将来自监控表 `dbo.index_operational_stats_history`。如清单 16-3 所示的分析过程，涉及识别数据库中的所有堆表，然后检查堆表的物理结构。随后，将此信息与收集到\
  \ `dbo.index_operational_stats_history` 中的信息进行联接。索引的物理状态是从 `sys.dm_db_index_operational_stats`\
  \ 中检索的，因为需要该 DMO 的 `DETAILED` 选项才能获取转发记录信息。\n\n```\nUSE AdventureWorks2017\nGO\n\
  IF OBJECT_ID('tempdb..#HeapList') IS NOT NULL\nDROP TABLE #HeapList\nCREATE TABLE\
  \ #HeapList\n(\ndatabase_id int\n,object_id int\n,page_count INT\n,avg_page_space_used_in_percent\
  \ DECIMAL(6,3)\n,record_count INT\n,forwarded_record_count INT\n)\nDECLARE HEAP_CURS\
  \ CURSOR FORWARD_ONLY FOR\nSELECT object_id\nFROM sys.indexes i\nWHERE index_id\
  \ = 0\nDECLARE @IndexID INT\nOPEN HEAP_CURS\nFETCH NEXT FROM HEAP_CURS INTO @IndexID\n\
  WHILE @@FETCH_STATUS = 0\nBEGIN\nINSERT INTO #HeapList\nSELECT\nDB_ID()\n,object_id\n\
  ,page_count\n,CAST(avg_page_space_used_in_percent AS DECIMAL(6,3))\n,record_count\n\
  ,forwarded_record_count\nFROM\nsys.dm_db_index_physical_stats(DB_ID(), @IndexID,\
  \ 0, NULL,'DETAILED') ;\nFETCH NEXT FROM HEAP_CURS INTO @IndexID\nEND\nCLOSE HEAP_CURS\n\
  DEALLOCATE HEAP_CURS\nSELECT\nQUOTENAME(DB_NAME(database_id))\n,QUOTENAME(OBJECT_SCHEMA_NAME(object_id))\
  \ + '.'\n+ QUOTENAME(OBJECT_NAME(object_id)) AS ObjectName\n,page_count\n,avg_page_space_used_in_percent\n\
  ,record_count\n,forwarded_record_count\n,x.forwarded_fetch_count\n,CAST(100.*forwarded_record_count/record_count\
  \ AS DECIMAL(6,3)) AS forwarded_record_pct\n,CAST(1.*x.forwarded_fetch_count/forwarded_record_count\
  \ AS DECIMAL(12,3)) AS forwarded_row_ratio\nFROM #HeapList h\nCROSS APPLY(\nSELECT\
  \ SUM(forwarded_fetch_count) AS forwarded_fetch_count\nFROM IndexingMethod.dbo.index_operational_stats_history\
  \ i\nWHERE h.database_id = i.database_id\nAND h.object_id = i.OBJECT_ID\nAND i.index_id\
  \ = 0) x\nWHERE forwarded_record_count > 0\nORDER BY page_count DESC\nListing 16-3\n\
  Forwarded Records Snapshot Query\n```\n清单 16-3\n转发记录快照查询\n\n快照查询的结果（如图 16-1 所示）提供了数据库中所有存在转发记录的堆表信息。通过这些结果，可以识别出存在转发和转发记录问题的堆表。首先要关注的列是\
  \ `page_count` 和 `record_count`。拥有大量转发记录问题的行的堆表比行数少的堆表更重要。在调查此计数器时，应重点关注那些通过解决转发记录问题能带来最大收益的表。`forwarded_record_count`\
  \ 和 `forwarded_fetch_count` 列分别提供了表中已被转发的记录数量以及这些转发记录被访问的次数。这些列定义了问题的规模。最后要查看的列是\
  \ `forwarded_record_pct` 和 `forwarded_row_ratio`。这些列详细说明了被转发行的百分比以及每条转发行被访问的次数。\n\
  \n在示例表中，统计信息表明存在转发记录问题。该表有超过 16% 的行被转发。根据 `forwarded_fetch_count`，这些行中的每一行都被访问了三次。从代码样本来看，仅对该表执行了三次查询，这意味着每次进行数据访问时，所有转发行都会被访问。在分析此数据库中的索引时，减轻此表的转发记录问题将是值得的。请特别注意转发记录是否正在被访问。对于具有非常高转发记录数但没有任何转发记录访问的表，减轻其转发记录问题将不值得付出努力，并且对“转发记录数/秒”计数器没有影响。\n\
  \n![](img/338675_4_En_16_Fig1_HTML.png)\n\n一个包含 9 列和 1 行的表。列标题依次为：无列名、对象名称、页数、平均页空间使用百分比、记录数、转发记录数、转发提取次数、转发记录百分比和转发行比率。\n\
  \n图 16-1\n转发记录快照查询结果\n\n当识别出存在转发记录问题的堆表后，通常有两种方法可以缓解转发记录。第一种方法是将可变长度列的数据类型更改为固定长度数据类型。例如，将\
  \ `varchar` 数据类型更改为 `char`。这种方法并不总是理想的，因为它可能导致表需要更多空间，而且某些查询可能无法适应字符字段末尾的额外空间，从而可能返回不正确的结果。第二种选择是向表添加聚集索引，这将移除堆作为表中数据存储的组织方法。这种方法的缺点在于确定要聚集表的适当键列。如果表上存在主键，它通常可以作为聚集索引键。还有第三种选择可用：可以重建堆，这将把堆重写回数据库文件并移除所有转发记录（使用清单\
  \ 16-4 中的脚本）。这通常被认为是解决堆中转发记录问题的较差方法，因为它没有提供有意义的永久修复方案。重要的是要考虑到转发记录不一定就是坏的。然而，当与批处理请求相比，转发记录操作的比例开始增加时，它们确实会带来潜在的性能挑战。\n\
  \n```\nUSE AdventureWorks2017\nGO\nALTER TABLE dbo.HeapExample REBUILD\nListing\
  \ 16-4\nRebuild Heap Script\n```\n清单 16-4\n重建堆脚本\n\n\n#### 每秒空闲空间扫描与页面获取次数\n\n性能计数器\
  \ `FreeSpace Scans/sec` 是另一个与堆表相关的计数器。此计数器表示当记录被插入到堆表中时发生的活动。在向堆表执行插入操作时，可能会在 `GAM`、`SGAM`\
  \ 和 `PFS` 页面上产生活动。如果插入速率足够高，这些页面上就可能发生争用。分析 `FreeSpace Scans/sec` 和 `FreeSpace Page\
  \ Fetches/sec` 计数器的值，提供了一个跟踪此活动并确定活动量何时增加以及堆表何时可能需要进一步分析的机会。结合使用时，`FreeSpace Scans/sec`\
  \ 和 `FreeSpace Page Fetches/sec` 计数器分别指示了堆表上扫描活动的频率和数量。\n\n与转发改的记录一样，此指标仅适用于堆表，在不使用堆表存储数据的环境中不会提供有用的洞察。\n\
  \n##### 分析 FreeSpace Scans/sec 计数器\n\n清单 16-5 提供了分析 `FreeSpace Scans/sec` 计数器的查询。它提供了\
  \ SQL Server 实例上 `FreeSpace Scans` 活动的快照。该查询提供了该计数器的最小值、平均值和最大值聚合。与前一个计数器类似，该计数器也遵循推荐的准则，即每十个\
  \ `Batch Requests/sec` 对应一个 `FreeSpace Scans/sec`。`PctViolation` 列衡量了计数器超出准则的时间百分比。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
  server_name,\nMAX(IIF(counter_name = 'FreeSpace Scans/sec', Calculated_Counter_value,\
  \ NULL)) FreeSpaceScans,\nMAX(IIF(counter_name = 'FreeSpace Page Fetches/sec', Calculated_Counter_value,\
  \ NULL)) FreeSpacePageFetches,\nMAX(IIF(counter_name = 'FreeSpace Scans/sec', Calculated_Counter_value,\
  \ NULL))\n/ (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
  \ NULL)), 0) * 10) AS ForwardedRecordRatio\nFROM dbo.IndexingCounters\nWHERE counter_name\
  \ IN ( 'FreeSpace Scans/sec', 'FreeSpace Page Fetches/sec', 'Batch Requests/sec'\
  \ )\nGROUP BY create_date,\nserver_name)\nSELECT server_name,\nMIN(FreeSpaceScans)\
  \ AS MinFreeSpaceScans,\nAVG(FreeSpaceScans) AS AvgFreeSpaceScans,\nMAX(FreeSpaceScans)\
  \ AS MaxFreeSpaceScans,\nMIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,\n\
  AVG(FreeSpacePageFetches) AS AvgFreeSpacePageFetches,\nMAX(FreeSpacePageFetches)\
  \ AS MaxFreeSpacePageFetches,\nMIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n\
  AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,\nMAX(ForwardedRecordRatio)\
  \ AS MaxForwardedRecordRatio,\nFORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1,\
  \ NULL)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n\
  ```\n\n清单 16-5：空闲空间扫描计数器分析\n\n##### 识别具有高插入率的堆表\n\n当 `FreeSpace Scans/sec` 数值较高时，分析将侧重于确定数据库中哪些堆表具有最高的插入速率。要识别堆表上插入最多的表，请使用来自\
  \ `sys.dm_db_index_operational_stats` 的监控表中的信息。包含插入信息的列是 `leaf_insert_count`。清单\
  \ 16-6 中的查询提供了监控表 `dbo.index_operational_stats_history` 中索引最多的堆表列表。\n\n```sql\n\
  USE IndexingMethod\nGO\nSELECT\nQUOTENAME(DB_NAME(database_id)) AS database_name\n\
  ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.'\n+ QUOTENAME(OBJECT_NAME(object_id,\
  \ database_id)) AS ObjectName\n, SUM(leaf_insert_count) AS leaf_insert_count\n,\
  \ SUM(leaf_allocation_count) AS leaf_allocation_count\nFROM dbo.index_operational_stats_history\n\
  WHERE index_id = 0\nAND database_id > 4\nand QUOTENAME(OBJECT_NAME(object_id, database_id))\
  \ IS NOT NULL\nGROUP BY object_id, database_id\nORDER BY leaf_insert_count DESC\n\
  ```\n\n清单 16-6：空闲空间扫描快照查询\n\n##### 示例结果与缓解措施\n\n回顾清单 16-3 演示脚本中的表格并结合 `FreeSpace\
  \ Scans` 快照查询，得到图 16-2 所示的结果。如本示例所示，对堆表进行了数千次插入。虽然结果中只显示了一个表，但出现在此列表顶部的表将是最常导致 `FreeSpace\
  \ Scans/sec` 的表。\n\n![](img/338675_4_En_16_Fig2_HTML.png)\n\n图 16-2：每秒空闲空间扫描快照查询结果\n\
  \n一旦识别出导致问题的堆表，缓解此问题的最佳方法是在插入最多的表上创建聚集索引。由于该计数器基于对 `GAM`、`SGAM` 和 `PFS` 页面上空闲空间的扫描，在堆表上构建聚集索引会将页面分配转移到\
  \ `IAM` 页面，这些页面专用于每个聚集索引，而堆表则会与其他堆表竞争页面分配。\n\n\n### 每秒完整扫描次数\n\n通过性能计数器 `Full Scans/sec`，可以测量在聚集索引、非聚集索引和堆上执行的完整扫描次数。在执行计划中，此计数器在索引扫描和表扫描期间触发。执行完整扫描的速率越高，发生与完整扫描相关的性能问题的可能性就越大。从性能角度来看，这会影响\
  \ `Page Life Expectancy` 值，因为数据在内存中被换入换出，并且可能存在 I/O 争用，因为查询需要等待数据被加载到内存中。\n\n使用清单\
  \ 16-7 中的查询，可以分析当前监控窗口内 `Full Scans/sec` 的状态。与之前的计数器一样，考虑此计数器与 `Batch Requests/sec`\
  \ 计数器之间的关系非常重要。当 `Full Scans/sec` 与 `Batch Requests/sec` 的比率超过千分之一时，可能存在需要进一步审查的\
  \ `Full Scans/sec` 问题。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\n\
  AS (SELECT create_date,\n           server_name,\n           MAX(IIF(counter_name\
  \ = 'Full Scans/sec', Calculated_Counter_value, NULL)) FullScans,\n           MAX(IIF(counter_name\
  \ = 'Full Scans/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
  \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 1000) AS FullRatio\n\
  \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Full Scans/sec', 'Batch\
  \ Requests/sec' )\n    GROUP BY create_date,\n             server_name)\nSELECT\
  \ server_name,\n       MIN(FullScans) AS MinFullScans,\n       AVG(FullScans) AS\
  \ AvgFullScans,\n       MAX(FullScans) AS MaxFullScans,\n       MIN(FullRatio) AS\
  \ MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n       MAX(FullRatio) AS\
  \ MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), '0.00%')\
  \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n清单 16-7 完整扫描计数器分析\n\
  \n在演示如何检查高 `Full Scans/sec` 计数器值的根本原因之前，将设置一些示例统计信息。清单 16-8 将提供大量的完整扫描，这些扫描可以通过前一节详述的监控过程收集。执行示例脚本后，请务必执行收集监控信息的脚本。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC ('SELECT * INTO #temp\
  \ FROM Sales.SalesOrderHeader')\nGO 1000\n```\n清单 16-8 完整扫描示例查询\n\n主要目标是识别 `Full\
  \ Scans/sec` 计数器受哪些索引影响。一旦识别出索引，就需要对其进行分析，以确定它们是否适合该操作，或者是否需要其他性能调整策略来减少在完整扫描操作中使用该索引。用于调查完整扫描的\
  \ DMO 是监控表中的 `sys.dm_db_index_usage_stats`；在监控中，这存储在 `dbo.index_usage_stats_history`\
  \ 表中。\n\n可以使用清单 16-9 中所示的查询来识别索引。快照结果排除了没有任何行的索引。这些索引仍用于完整扫描，但减轻这些索引上的扫描不会对性能产生重大影响。为了对结果排序，索引上的扫描次数乘以表中的行数。通过这种方式排序，输出会侧重于那些可能对降低\
  \ `Full Scans/sec` 值影响不大，但将为索引性能提供最大改进的索引。\n\n```sql\nUSE IndexingMethod;\nGO\n\
  SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
  \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
  \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
  \       SUM(uh.user_seeks) AS user_seeks,\n       x.record_count\nFROM dbo.index_usage_stats_history\
  \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
  \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
  \ ph\n    WHERE ph.database_id = uh.database_id\n          AND ph.object_id = uh.object_id\n\
  \          AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n      AND\
  \ uh.database_id <> DB_ID()\n      AND OBJECT_NAME(uh.object_id, uh.database_id)\
  \ IS NOT NULL\n      AND x.RankID = 1\nGROUP BY uh.database_id,\n         uh.object_id,\n\
  \         uh.index_id,\n         x.record_count\nORDER BY SUM(uh.user_scans) * x.record_count\
  \ DESC;\nGO\n```\n清单 16-9 完整扫描快照查询\n\n完整扫描快照查询的结果将类似于图 16-3 中的输出。有了这个输出，下一步是确定哪些索引需要进一步分析。当前分析的目的是识别出待后续分析的问题索引。一旦识别出来，下一步就是确定它们在哪里被使用，以及如何在这些地方减少完整扫描，这将在本章后面的“索引计划使用”部分进行演示。\n\
  \n![完整扫描快照查询结果](img/338675_4_En_16_Fig3_HTML.png)\n\n结果选项卡下列出了一个具有 6 列 7 行的表格。列标题为数据库名称、对象名称、索引\
  \ ID、用户扫描次数、用户查找次数和记录数。数据库名称下选择了 Adventure Works 2017。\n\n图 16-3 完整扫描快照查询结果\n\n\n\
  ### 每秒索引搜索次数\n\n### 每秒索引搜索次数\n\n与扫描索引相对的替代方法是对索引执行查找操作。性能计数器 `索引搜索/秒` 用于报告 SQL Server\
  \ 实例上索引查找的速率。这可以包括范围扫描和键查找等操作。在大多数环境中，我们更希望看到较高的 `索引搜索/秒` 计数器值。因此，该性能计数器相对于 `全扫描/秒`\
  \ 的比值越高越好。\n\n对 `索引搜索/秒` 的分析将从审查一段时间内收集的性能计数器信息开始（如清单 16-10 所示）。`索引搜索/秒` 与 `全扫描/秒`\
  \ 的比值是可用于评估 `索引搜索/秒` 是否表明存在潜在索引问题的指标之一。评估这两个计数器之间比值的指导原则是，每出现 1 次 `全扫描/秒`，应寻找 1,000\
  \ 次 `索引搜索/秒`。分析查询提供了此计算，并通过 `PctViolation` 列确定了计数器值超过此比值的时间量。\n\n```\nUSE IndexingMethod;\n\
  GO\nWITH CounterSummary\nAS (SELECT create_date,\n           server_name,\n    \
  \       MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value, NULL))\
  \ IndexSearches,\n           MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value,\
  \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value,\
  \ NULL)), 0) * 1000) AS SearchToScanRatio\n    FROM dbo.IndexingCounters\n    WHERE\
  \ counter_name IN ( 'Index Searches/sec', 'Full Scans/sec' )\n    GROUP BY create_date,\n\
  \             server_name)\nSELECT server_name,\n       MIN(IndexSearches) AS MinIndexSearches,\n\
  \       AVG(IndexSearches) AS AvgIndexSearches,\n       MAX(IndexSearches) AS MaxIndexSearches,\n\
  \       MIN(SearchToScanRatio) AS MinSearchToScanRatio,\n       AVG(SearchToScanRatio)\
  \ AS AvgSearchToScanRatio,\n       MAX(SearchToScanRatio) AS MaxSearchToScanRatio,\n\
  \       FORMAT(1. * SUM(IIF(SearchToScanRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
  \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n清单 16-10\n索引搜索计数器分析\n\
  \n如果分析表明索引搜索存在问题，下一步是验证是否已完成上一节中关于 `全扫描/秒` 的分析。该分析将提供哪些索引存在大量全扫描的最深入信息，这些全扫描会导致\
  \ `索引搜索/秒` 的比值偏高。\n\n为了帮助演示如何检查 `索引搜索/秒` 计数器值，将执行清单 16-11 中的查询。该查询将提供一些可以通过上一节详述的监控过程收集到的全扫描。运行示例脚本后，请务必执行收集监控信息的脚本。\n\
  \n```\nUSE AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC('SELECT SOH.SalesOrderID,\
  \ SOD.SalesOrderDetailID\n      INTO #temp\n      FROM Sales.SalesOrderHeader SOH\n\
  \      INNER JOIN Sales.SalesOrderDetail SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n\
  \      WHERE SOH.SalesOrderID = 43659')\nGO 1000\n```\n清单 16-11\n全扫描示例查询\n\n一旦该分析完成，我们就可以开始识别索引级别上扫描与查找比值存在问题的具体位置。使用清单\
  \ 16-12 中的查询，可以识别出扫描与查找比值偏高的索引。与每 1 次扫描对应 1,000 次查找的性能计数器指导原则类似，该查询返回那些查找次数与扫描次数之比低于\
  \ 1,000 的索引结果。由于全扫描问题应该已在上一节中被识别，该分析也排除了没有任何查找的索引。\n\n```\nUSE IndexingMethod;\n\
  GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
  \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
  \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
  \       SUM(uh.user_seeks) AS user_seeks,\n       1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
  \ 0) AS SeekScanRatio,\n       x.record_count\nFROM dbo.index_usage_stats_history\
  \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
  \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
  \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
  \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
  \ < DB_ID()\n  AND x.RankID = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n\
  \         uh.object_id,\n         uh.index_id,\n         x.record_count\nHAVING\
  \ 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) < 1000\n   AND 1. * SUM(uh.user_seeks)\
  \ / NULLIF(SUM(uh.user_scans), 0) > 0\nORDER BY 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
  \ 0) DESC,\n         SUM(uh.user_scans) DESC;\nGO\n```\n清单 16-12\n索引搜索快照查询\n\n查看快照查询的结果（如图\
  \ 16-4 所示），只识别出一个索引，其查找与扫描的比值接近 1。出现这种情况是因为在上一节中，大约有 1,000 次扫描是针对 `Sales.SalesOrderHeader`\
  \ 执行的，而针对 `Sales.SalesOrderDetail` 则没有扫描，尽管在清单 16-11 中访问了这两个表及其索引。将 `索引搜索` 与 `全扫描`\
  \ 结合考虑的优势在于，它们通过识别更理想活动发生的频率，有助于抵消问题的严重性。\n\n![](img/338675_4_En_16_Fig4_HTML.png)\n\
  \n结果选项卡下列出的表格有 7 列和一行数据。列标题分别是数据库名称、对象名称、索引 ID、用户扫描数、用户查找数、查找扫描比和记录数。索引 ID 为 1，用户扫描数为\
  \ 1005，用户查找数为 1002，查找扫描比为 0.99701。\n\n图 16-4\n索引搜索快照查询示例结果\n\n在进行深入分析时，有几点需要考虑，它们可能表明已识别出的索引存在问题。首先是当前索引表现出的查找与扫描行为与之前相比有何新变化；换句话说，这种差异是否一直沿着一个逐渐恶化的共同趋势发展？如果变化是突然的，可能是某个执行计划不再像以前那样使用该索引，也许是由于代码更改或不良的参数嗅探。其次是当变化是渐进性的；查看数据量是否增加，以及数据库中的某个查询或功能是否比以前使用得更频繁。这也可能暗示人们使用数据库及其应用程序的方式发生了变化，这种情况有时是渐进的，直到达到一定程度，导致索引及其支持的性能受到影响。\n\
  \n\n### 每秒页面拆分数\n\n类似于聚簇索引是堆的“对立面”，页面拆分是转发记录的对立面。关于页面拆分的深入讨论包含在第 2 章中。不过就本章而言，页面拆分发生在聚簇或非聚簇索引需要在索引页的排序中腾出空间，以便将数据放置到其正确位置时。页面拆分可能非常消耗资源，因为单个页面被分成两个或更多页面，并且涉及锁定，以及潜在的阻塞。页面拆分越频繁，索引越容易遭受阻塞，性能也会受到影响。此外，页面拆分引起的碎片会减少单次操作中可以执行的读取大小。\n\
  \n为了开始分析页面拆分的性能计数器，需要使用计数器`Page Splits/sec`。清单 16-13 中的查询提供了一种汇总页面拆分活动的方法。该查询包括性能计数器的最小、最大和平均级别。还包括`Page\
  \ Splits/sec`与`Batch Requests/sec`的比率。在识别 SQL Server 实例上是否存在页面拆分问题时，经验法则是寻找每 20\
  \ 个`batch requests/sec`对应超过 1 个`page split/sec`的时间段。与其他计数器一样，需要注意通过`PctViolation`显示的计数器超出阈值的时长。\n\
  \n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n \
  \          server_name,\n           MAX(IIF(counter_name = 'Page Splits/sec', Calculated_Counter_value,\
  \ NULL)) PageSplits,\n           MAX(IIF(counter_name = 'Page Splits/sec', Calculated_Counter_value,\
  \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
  \ NULL)), 0) * 20) AS FullRatio\n    FROM dbo.IndexingCounters\n    WHERE counter_name\
  \ IN ( 'Page Splits/sec', 'Batch Requests/sec' )\n    GROUP BY create_date,\n  \
  \           server_name)\nSELECT server_name,\n       MIN(PageSplits) AS MinPageSplits,\n\
  \       AVG(PageSplits) AS AvgPageSplits,\n       MAX(PageSplits) AS MaxPageSplits,\n\
  \       MIN(FullRatio) AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n\
  \       MAX(FullRatio) AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio >\
  \ 1, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY\
  \ server_name;\n```\n**清单 16-13** 页面拆分计数器分析\n\n为了确定受页面拆分影响的索引，需要考虑几个值。其中一些值来自`sys.dm_db_index_operational_stats`或来自索引监控过程的`dbo.index_operational_stats_history`。这些列报告索引上发生的每次页面分配，无论是来自\
  \ B 树末尾的插入还是中间的页面拆分。由于此分析只关心属于页面拆分的操作，因此接下来的两个列提供了是否发生由页面拆分引起的碎片的信息。为了确定碎片，监控表`dbo.index_physical_stats_history`中包含了来自`sys.dm_db_index_physical_stats`的列`avg_fragmentation_in_percent`。对于平均碎片，会返回两个值。第一个是报告给索引的最后一个碎片值；第二个是收集的所有碎片值的平均值。参见清单\
  \ 16-14。\n\n```\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id))\
  \ AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id))\
  \ + '.' + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName,\n      \
  \ SUM(leaf_allocation_count) AS leaf_insert_count,\n       SUM(nonleaf_allocation_count)\
  \ AS nonleaf_allocation_count,\n       MAX(IIF(RankID = 1, x.avg_fragmentation_in_percent,\
  \ NULL)) AS last_fragmenation,\n       AVG(x.avg_fragmentation_in_percent) AS average_fragmenation\n\
  FROM dbo.index_operational_stats_history oh\nCROSS APPLY (SELECT DENSE_RANK() OVER\
  \ (ORDER BY ph.create_date DESC) AS RankID,\n                    CAST(ph.avg_fragmentation_in_percent\
  \ AS DECIMAL(6, 3)) AS avg_fragmentation_in_percent\n             FROM dbo.index_physical_stats_history\
  \ ph\n             WHERE ph.database_id = oh.database_id\n               AND ph.object_id\
  \ = oh.object_id\n               AND ph.index_id = oh.index_id\n            ) x\n\
  WHERE database_id > 4\n  AND database_id != DB_ID()\n  AND oh.index_id != 0\n  AND\
  \ (\n      leaf_allocation_count > 0\n      OR nonleaf_allocation_count > 0\n  \
  \   )\nGROUP BY object_id,\n         database_id\nORDER BY leaf_insert_count DESC;\n\
  ```\n**清单 16-14** 页面拆分快照查询\n\n以这种方式调查页面拆分提供了一种查看分配次数并将该信息与碎片配对的方法。一个具有低碎片和高`leaf_insert_count`的表，例如图\
  \ 16-5 所示的`dbo.IndexingCounters`表，从页面拆分的角度来看并不令人担忧。另一方面，`dbo.index_operational_stats_history`确实显示了大量的碎片和`leaf_insert_count`。值得进一步研究该索引。虽然清单\
  \ 16-14 中的脚本通常不会显示`IndexingMethod`数据库的索引结果，但该脚本已根据清单中的内容进行了修改，以提供一些可供检查的结果。\n\n\
  ![](img/338675_4_En_16_Fig5_HTML.png)\n\n**图 16-5** 页面拆分快照查询示例结果\n\n一个包含 6 列 8 行的表格。列标题为数据库名称、对象名称、叶子插入计数、非叶子分配计数、上次碎片和平均碎片。在数据库名称下选择的是`IndexingMethod`。\n\
  \n在确定了需要进一步分析的索引后，下一步是缓解。有多种方法可以缓解索引上的页面拆分。首先是审查索引的碎片历史。如果需要定期重建索引，首先可以做的就是降低索引上的`fill\
  \ factor`。降低填充因子会增加重建索引后页面上的剩余空间，这将减少页面拆分的可能性。减少碎片的第二种策略是考虑索引中的列。这些列是否高度易变且值变化剧烈？例如，基于`create_date`的索引不太可能频繁发生页面拆分。但基于`update_date`的索引则容易产生碎片。如果索引的使用率不足以证明其存在是合理的，那么完全删除它可能是值得的。或者，在多列索引中，将易变列移动到索引的右侧或将它们添加为包含列。缓解页面拆分的第三种方法可以是识别索引的使用位置。最后一种缓解索引页面拆分的方法是审查索引使用的数据类型。在某些情况下，可变数据类型可能比固定长度数据类型更合适。\n\
  \n\n\n#### 每秒页查找次数\n\n性能计数器 `Page Lookups/sec` 用于衡量在 SQL Server 实例中从缓冲池检索单个数据页的请求数量。当此计数器值较高时，通常意味着查询计划中存在低效问题，这往往可以通过执行计划分析来解决。通常，`Page\
  \ Lookups/sec` 值过高可归因于每次执行时包含大量页查找和行查找的计划。一般来说，在性能问题方面，`Page Lookups/sec` 的值不应超过每个\
  \ `Batch Request/sec` 对应 100 次操作的比率。\n\n对 `Page Lookups/sec` 的初步分析需要同时查看 `Page Lookups/sec`\
  \ 和 `Batch Request/sec`。首先，使用代码清单 16-15 中所示的查询；该分析将包括监控期间内 `Page Lookups/sec` 值的最小值、最大值和平均值。其次，计算并包含每个时间段内\
  \ `Page Lookups/sec` 与 `Batch Request/sec` 的比率的最小值、最大值和平均值，并通过 `PctViolation` 列显示比率违规情况。违规计算用于验证操作比率是否超过\
  \ 100:1。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
  server_name,\nMAX(IIF(counter_name = 'Page Lookups/sec', Calculated_Counter_value,\
  \ NULL)) PageLookups,\nMAX(IIF(counter_name = 'Page Lookups/sec', Calculated_Counter_value,\
  \ NULL))\n/ (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
  \ NULL)), 0) * 100) AS PageLookupRatio\nFROM dbo.IndexingCounters\nWHERE counter_name\
  \ IN ( 'Page Lookups/sec', 'Batch Requests/sec' )\nGROUP BY create_date,\nserver_name)\n\
  SELECT server_name,\nMIN(PageLookups) AS MinPageLookups,\nAVG(PageLookups) AS AvgPageLookups,\n\
  MAX(PageLookups) AS MaxPageLookups,\nMIN(PageLookupRatio) AS MinPageLookupRatio,\n\
  AVG(PageLookupRatio) AS AvgPageLookupRatio,\nMAX(PageLookupRatio) AS MaxPageLookupRatio,\n\
  FORMAT(1\\. * SUM(IIF(PageLookupRatio > 1, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\n\
  FROM CounterSummary\nGROUP BY server_name;\n```\n代码清单 16-15 页查找计数器分析\n\n与其他计数器一样，当分析表明该计数器存在潜在问题时，下一步就是深入挖掘。有三种方法可以解决\
  \ `Page Lookups/sec` 值过高的问题。第一种是查询 `sys.dm_exec_query_stats` 以识别频繁执行且 I/O 开销高的查询；有关此\
  \ DMV 的更多信息，请参阅 [`http://msdn.microsoft.com/en-us/library/ms189741.aspx`](http://msdn.microsoft.com/en-us/library/ms189741.aspx)。需要检查这些查询，并判断它们是否占用了过多的\
  \ I/O 资源。另一种方法是检查 SQL Server 实例中的数据库是否存在索引缺失问题。第三种方法（本节将详细介绍）是检查聚集索引和堆上的查找操作。\n\n\
  要调查聚集索引和堆上的查找操作，主要信息来源是 DMO `sys.dm_db_index_usage_stats`。得益于前一章实现的监控，此信息已保存在表 `dbo.index_usage_stats_history`\
  \ 中。要执行分析，请使用代码清单 16-16 中的查询；我们将从用户角度查看发生的 `user lookups`、`user seeks` 和 `user scans`。利用这些值，查询计算\
  \ `user lookups` 与 `user seeks` 的比率，并返回所有比率高于 100:1 的记录。\n\n```sql\nUSE IndexingMethod;\n\
  GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
  \ uh.database_id)) + '.'\n+ QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
  \ AS ObjectName,\nuh.index_id,\nSUM(uh.user_lookups) AS user_lookups,\nSUM(uh.user_seeks)\
  \ AS user_seeks,\nSUM(uh.user_scans) AS user_scans,\nx.record_count,\nCAST(1\\.\
  \ * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks)) AS\
  \ DECIMAL(18, 2)) AS LookupSeekRatio\nFROM dbo.index_usage_stats_history uh\nCROSS\
  \ APPLY (\nSELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,\n\
  ph.record_count\nFROM dbo.index_physical_stats_history ph\nWHERE ph.database_id\
  \ = uh.database_id\nAND ph.object_id = uh.object_id\nAND ph.index_id = uh.index_id)\
  \ x\nWHERE uh.database_id > 4\nAND x.RankID = 1\nAND x.record_count > 0\nGROUP BY\
  \ uh.database_id,\nuh.object_id,\nuh.index_id,\nx.record_count\nHAVING CAST(1\\\
  . * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks)) AS\
  \ DECIMAL(18, 2)) > 100\nORDER BY 1\\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks)\
  \ = 0, 1, SUM(uh.user_seeks)) DESC;\nGO\n```\n代码清单 16-16 页查找快照查询\n\n一旦识别出有问题的索引，下一步就是确定索引的使用方式和位置，其流程将在本章后续部分描述。\n\
  \n\n\n#### 页面压缩\n\n性能计数器 `Page compression attempts/sec` 和 `Pages compressed/sec`\
  \ 分别用于度量被压缩的页面数量和尝试压缩的页面数量。当 `Pages compressed/sec` 的速率相对于 `Page compression attempts/sec`\
  \ 下降时，表明 SQL Server 压缩算法在将数据页保存为压缩状态时出现失败。当存在未压缩存储更高效的数据时，或者解压页面的 CPU 成本超过了压缩数据的价值时，审查压缩对于表或索引是否合适可能是有价值的。这通常发生在看起来随机的数据上，例如图像文件的原始输出。压缩失败的挑战在于，SQL\
  \ Server 已经花费了时间，特别是 CPU 资源，去尝试压缩页面。通常，当超过 5% 的页面压缩尝试失败时，值得识别并审查发生失败的索引。\n\n为了分析页面压缩是否存在问题，应首先审查页面压缩的计数器。使用清单\
  \ 16-17 中所示的查询，我们可以查看监测期间 `Page compression attempts/sec` 和 `Pages compressed/sec`\
  \ 的最小值、最大值和平均值。此外，还包含了 `Pages compressed/sec` 与 `Page compression attempts/sec`\
  \ 的比率及其最小值、最大值和平均值。`PctViolation` 列让我们知道 5% 阈值被违反的时间百分比。\n\n```sql\nUSE IndexingMethod;\n\
  GO\nWITH CounterSummary\nAS (SELECT create_date,\n        server_name,\n       \
  \ MAX(IIF(counter_name = 'Page compression attempts/sec', Calculated_Counter_value,\
  \ NULL)) PageCompressionAttempts,\n        MAX(IIF(counter_name = 'Pages compressed/sec',\
  \ Calculated_Counter_value, NULL)) PagesCompressed,\n        MAX(IIF(counter_name\
  \ = 'Page compression attempts/sec', Calculated_Counter_value, NULL))\n        /\
  \ (NULLIF(MAX(IIF(counter_name = 'Pages compressed/sec', Calculated_Counter_value,\
  \ NULL)), 0) * 100.) AS CompressionRate\n    FROM dbo.IndexingCounters\n    WHERE\
  \ counter_name IN ( 'Page compression attempts/sec', 'Pages compressed/sec')\n \
  \   GROUP BY create_date,\n             server_name)\nSELECT server_name,\n    \
  \   MIN(PageCompressionAttempts) AS MinPageCompressionAttempts,\n       AVG(PageCompressionAttempts)\
  \ AS AvgPageCompressionAttempts,\n       MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,\n\
  \       MIN(PagesCompressed) AS MinPagesCompressed,\n       AVG(PagesCompressed)\
  \ AS AvgPagesCompressed,\n       MAX(PagesCompressed) AS MaxPagesCompressed,\n \
  \      MIN(CompressionRate) AS MinCompressionRate,\n       AVG(CompressionRate)\
  \ AS AvgCompressionRate,\n       MAX(CompressionRate) AS MaxCompressionRate,\n \
  \      FORMAT(1. * SUM(IIF(CompressionRate < 95, 1, 0)) / COUNT(*), '0.00%') AS\
  \ PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n**清单 16-17 页面压缩计数器分析**\n\
  \n如果表明页面压缩失败率很高或频率在增加，值得在数据库内部调查以确定哪些表和索引未能进行页面压缩。使用已为索引存储的数据，可以使用清单 16-18 中的查询确定具体哪个索引存在页面压缩失败，或具有最低的页面压缩成功率。结果将类似于图\
  \ 16-6 中的示例。该索引是使用 `Person.Person` 表中的所有列创建的，其中包括一些 `XML` 和 `varchar(max)` 列。此索引的页面压缩成功率略高于\
  \ 50%，这是一个次优结果。\n\n![](img/338675_4_En_16_Fig6_HTML.png)\n\n一个表格出现在结果选项卡下。列标题和数据为：数据库名\
  \ `adventure works 2017`，对象名 `person person`，索引 `i d 4`，页面压缩尝试计数 `4649`，页面压缩成功计数\
  \ `2332`，以及页面压缩成功率 `0.50161`。\n\n**图 16-6 页面压缩快照查询示例结果**\n\n```sql\nUSE IndexingMethod;\n\
  GO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(object_id,\
  \ database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName,\n\
  \       oh.index_id,\n       SUM(oh.page_compression_attempt_count) AS page_compression_attempt_count,\n\
  \       SUM(oh.page_compression_success_count) AS page_compression_success_count,\n\
  \       SUM(1. * oh.page_compression_success_count / NULLIF(oh.page_compression_attempt_count,\
  \ 0)) AS page_compression_success_rate\nFROM dbo.index_operational_stats_history\
  \ oh\nWHERE database_id > 4\n  AND database_id  DB_ID()\n  AND oh.page_compression_attempt_count\
  \ > 0\nGROUP BY object_id,\n         database_id,\n         index_id;\n```\n**清单\
  \ 16-18 页面压缩快照查询**\n\n一旦确定了压缩效果不佳的索引，下一步是确定页面压缩是否适用于该索引。包含诸如 `XML` 或 `varchar(max)`\
  \ 等数据类型的索引是页面压缩的不良候选者，如图 16-6 所示。\n\n\n\n### 锁等待时间\n\n某些性能计数器可用于根据其使用情况来确定索引是否存在压力。其中一个计数器是\
  \ `锁等待时间 (ms)`。该计数器衡量 SQL Server 为等待对表、索引或页实施锁所花费的时间（以毫秒为单位）。此计数器并没有任何特定的“良好”指导值。一般来说，该值越低越好，但“低”的具体含义完全取决于数据库平台和访问它的应用程序。\n\
  \n由于没有关于 `锁等待时间 (ms)` 值可接受水平的准则，评估该计数器的最佳方法是将其与基线值进行比较。在这种情况下，收集基线对于监控何时发生与 `锁等待时间`\
  \ 相关的索引性能下降变得极其重要。使用清单 16-19 中的查询，将 `锁等待时间 (ms)` 值与可用的基线值进行比较。对于基线值和监控期的值，都提供了计数器值的最小值、最大值、平均值和标准差的聚合。这些聚合有助于提供计数器状态的概况，以及与基线相比它是增加还是减少了。\n\
  \n#### 清单 16-19\n锁等待时间计数器分析\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\n\
  AS (SELECT create_date,\nserver_name,\ninstance_name,\nMAX(IIF(counter_name = 'Lock\
  \ Wait Time (ms)', Calculated_Counter_value, NULL)) / 1000 LockWaitTime\nFROM dbo.IndexingCounters\n\
  WHERE counter_name = 'Lock Wait Time (ms)'\nGROUP BY create_date,\nserver_name,\n\
  instance_name)\nSELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,\n\
  server_name,\ninstance_name,\nMIN(LockWaitTime) AS MinLockWaitTime,\nAVG(LockWaitTime)\
  \ AS AvgLockWaitTime,\nMAX(LockWaitTime) AS MaxLockWaitTime,\nSTDEV(LockWaitTime)\
  \ AS StdDevLockWaitTime\nFROM CounterSummary\nGROUP BY server_name,\ninstance_name\n\
  UNION ALL\nSELECT 'Baseline: ' + CONVERT(VARCHAR(50), start_date, 101) + ' --> '\
  \ + CONVERT(VARCHAR(50), end_date, 101),\nserver_name,\ninstance_name,\nminimum_counter_value\
  \ / 1000,\nmaximum_counter_value / 1000,\naverage_counter_value / 1000,\nstandard_deviation_counter_value\
  \ / 1000\nFROM dbo.IndexingCountersBaseline\nWHERE counter_name = 'Lock Wait Time\
  \ (ms)'\nORDER BY instance_name,\nCounterDate DESC;\n```\n\n例如，在图 16-7 中，平均和最大锁等待时间相较于基线值有所下降，这是期望的情况。如果平均锁等待时间相比基线有所增加，则可能需要关注，特别是如果该增加量达到数十毫秒。此外，如果最大值范围有所扩大，这也是需要调查的另一件事。等待获取锁所花费的时间增加得越多，对用户的直接影响就越大。\n\
  \n![](img/338675_4_En_16_Fig7_HTML.png)\n\n页面在结果选项卡下呈现了一个表格，截取了第 1 到 4 行以及第 15 到\
  \ 18 行两组。列标题包括计数器日期、服务器名称、实例名称、最小锁等待时间、平均锁等待时间、最大锁等待时间、以及标准差锁等待时间。\n\n**图 16-7**\n\
  锁等待时间计数器分析示例结果\n\n在调查 `锁等待时间` 时，使用清单 16-20 中的查询来识别哪些索引产生了最多的 `锁等待时间` 非常重要。该信息可在\
  \ DMO `sys.dm_db_index_operational_stats` 或监控表 `dbo.index_operational_stats_history`\
  \ 中找到。为检查 `锁等待时间` 而需审阅的列是 `row_lock_wait_count`、`row_lock_wait_count`、`row_lock_wait_count`\
  \ 和 `page_lock_wait_in_ms`。这些列报告了每个索引的等待次数以及这些等待的时间。正如这些列所表明的，锁存在于行级别和页级别；通常，锁类型之间的变化与索引上的查找和扫描操作相关。\n\
  \n#### 清单 16-20\n锁等待时间快照查询\n\n```sql\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id))\
  \ AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.'\
  \ + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName,\nindex_id,\nSUM(row_lock_wait_count)\
  \ AS row_lock_wait_count,\nSUM(row_lock_wait_in_ms) / 1000. AS row_lock_wait_in_sec,\n\
  ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000., 0)\
  \ AS avg_row_lock_wait_in_sec,\nSUM(page_lock_wait_count) AS page_lock_wait_count,\n\
  SUM(page_lock_wait_in_ms) / 1000. AS page_lock_wait_in_sec,\nISNULL(SUM(page_lock_wait_in_ms)\
  \ / NULLIF(SUM(page_lock_wait_count), 0) / 1000., 0) AS avg_page_lock_wait_in_sec\n\
  FROM dbo.index_operational_stats_history oh\nWHERE database_id > 4\nAND database_id\
  \ <> DB_ID()\nAND (\nrow_lock_wait_in_ms > 0\nOR page_lock_wait_in_ms > 0\n)\nGROUP\
  \ BY database_id,\nobject_id,\nindex_id;\n```\n\n观察快照查询的结果（如图 16-8 所示），有几点需要指出。首先，所有锁都发生在表的页上，而不是行级别。这可能导致更大范围的阻塞，因为被锁定的不仅仅是正在访问的行。此外，平均页锁时间约为\
  \ 7 秒。对于大多数环境来说，这是一个过长的锁定时间。基于这些信息，应该对表 `Sales.SalesOrderDetail` 上的聚集索引（`index_id=1`）进行调查。\n\
  \n![](img/338675_4_En_16_Fig8_HTML.png)\n\n一个包含 9 列和 1 行的表格。列标题包括数据库名称、对象名称、索引 id、行锁等待次数、行锁等待秒数、平均行锁等待秒数、页锁等待次数、页锁等待秒数、以及平均页锁等待秒数。\n\
  \n**图 16-8**\n锁等待时间索引分析示例结果\n\n当我们需要更深入地研究一个索引及其用法时，下一步是确定哪些执行计划正在使用该索引。然后优化查询或索引以减少锁定。在某些情况下，如果索引对表不关键，更好的做法可能是移除该索引，让其他索引来满足查询需求。\n\
  \n\n\n### 每秒锁等待数\n\n下一个计数器 Lock Waits/sec 的分析方法与 Lock Wait Time (ms) 类似。Lock Waits/sec\
  \ 计数器测量无法立即满足的锁请求数量。对于这些请求，SQL Server 会等待直到行或页可用于锁定，然后才授予锁。与前一个计数器一样，这个计数器也没有关于什么是“好”值的特定准则。对于这些，我们应该参考基线并与之比较，以确定该计数器何时超出了正常的操作边界。\n\
  \nLock Waits/sec 的分析包括与 Lock Wait Time (ms) 相同的最小值、最大值、平均值和标准差聚合。这些值针对每个计数器表 `dbo.IndexingCounters`\
  \ 和基线表 `dbo.IndexingCountersBaseline` 进行聚合，如清单 16-21 所示。图 16-9 显示了查询的结果。\n\n```sql\n\
  USE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\nserver_name,\n\
  instance_name,\nMAX(IIF(counter_name = 'Lock Waits/sec', Calculated_Counter_value,\
  \ NULL)) LockWaits\nFROM dbo.IndexingCounters\nWHERE counter_name = 'Lock Waits/sec'\n\
  GROUP BY create_date,\nserver_name,\ninstance_name)\nSELECT CONVERT(VARCHAR(50),\
  \ MAX(create_date), 101) AS CounterDate,\nserver_name,\ninstance_name,\nMIN(LockWaits)\
  \ AS MinLockWait,\nAVG(LockWaits) AS AvgLockWait,\nMAX(LockWaits) AS MaxLockWait,\n\
  STDEV(LockWaits) AS StdDevLockWait\nFROM CounterSummary\nGROUP BY server_name,\n\
  instance_name\nUNION ALL\nSELECT 'Baseline: ' + CONVERT(VARCHAR(50), start_date,\
  \ 101) + ' --> ' + CONVERT(VARCHAR(50), end_date, 101),\nserver_name,\ninstance_name,\n\
  minimum_counter_value / 1000,\nmaximum_counter_value / 1000,\naverage_counter_value\
  \ / 1000,\nstandard_deviation_counter_value / 1000\nFROM dbo.IndexingCountersBaseline\n\
  WHERE counter_name = 'Lock Waits/sec'\nORDER BY instance_name,\nCounterDate DESC;\n\
  ```\n清单 16-21 Lock Waits 计数器分析\n\n有时，如图 16-9 所包含的情况，Lock Wait/sec 并非问题所在，但 Lock\
  \ Wait Time(ms) 却存在问题。这些情况指向了长时间的阻塞情况。相反，Lock Wait/sec 对于监控很重要，因为它将指示何时存在大范围的阻塞。阻塞持续时间可能不长，但范围很广；一个长时间的阻塞就可能导致显著的性能问题。\n\
  \n![](img/338675_4_En_16_Fig9_HTML.png)\n\n一个页面在结果选项卡下显示了一个表格，被剪切成了两部分。列标题是计数器日期、服务器名称、实例名称、最小锁等待、平均锁等待、最大锁等待时间和标准差锁等待。\n\
  \n图 16-9 Lock Waits 计数器分析示例结果\n\n在大范围阻塞的情况下，如 Lock Wait/sec 值较高所指示的那样，分析将需要使用 DMO\
  \ `sys.dm_db_index_operational_stats` 来调查索引统计信息。通过监控过程，此信息将存储在表 `dbo.index_operational_stats_history`\
  \ 中。使用清单 16-22 中的查询，可以确定等待的锁的数量和百分比。与 Lock Wait Time (ms) 一样，此计数器分析也查看行和页级别的统计信息。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n\
  QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id,\
  \ database_id)) AS ObjectName,\nindex_id,\nSUM(row_lock_count) AS row_lock_count,\n\
  SUM(row_lock_wait_count) AS row_lock_wait_count,\nISNULL(SUM(row_lock_wait_count)\
  \ / NULLIF(SUM(row_lock_count), 0), 0) AS pct_row_lock_wait,\nSUM(page_lock_count)\
  \ AS page_lock_count,\nSUM(page_lock_wait_count) AS page_lock_wait_count,\nISNULL(SUM(page_lock_wait_count)\
  \ / NULLIF(SUM(page_lock_count), 0), 0) AS pct_page_lock_wait\nFROM dbo.index_operational_stats_history\
  \ oh\nWHERE database_id > 4\nAND (\nrow_lock_wait_in_ms > 0\nOR page_lock_wait_in_ms\
  \ > 0\n)\nGROUP BY database_id,\nobject_id,\nindex_id;\n```\n清单 16-22 Lock Waits\
  \ 快照查询\n\n锁等待百分比高的索引是索引调优的首要目标。通常，当数据库中存在过多的锁等待时，终端用户会感觉到他们的应用程序缓慢，在最坏的情况下，会出现应用程序超时。分析此计数器的目的是识别可以优化的索引，然后调查这些索引被使用的位置。完成此操作后，解决锁产生的原因，并调整索引和查询以减少索引上的锁定。\n\
  \n\n### 每秒死锁数\n\n在极端情况下，索引性能低下和过多的锁定/阻塞可能导致死锁。死锁发生的情况是：两个或多个事务放置了锁，其中一个事务的锁定顺序因其他事务的锁而被阻止获取和/或释放其锁。如果应用程序不明确重试发生死锁的查询，其结果可能是重要的事务永远无法执行。对于管理重要用户数据的应用程序来说，这可能产生深远的负面影响。有多种方法可以解决死锁问题，其中之一是改进索引。\n\
  \n要确定 SQL Server 实例上是否发生死锁，请检查在监控期间收集的性能计数器。清单 16-23 中的查询提供了在监控窗口期内死锁率的概览。该查询返回服务器上死锁的最小值、平均值、最大值和标准差等聚合值。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
  server_name,\nCalculated_Counter_value AS NumberDeadlocks\nFROM dbo.IndexingCounters\n\
  WHERE counter_name = 'Number of Deadlocks/sec')\nSELECT server_name,\nMIN(NumberDeadlocks)\
  \ AS MinNumberDeadlocks,\nAVG(NumberDeadlocks) AS AvgNumberDeadlocks,\nMAX(NumberDeadlocks)\
  \ AS MaxNumberDeadlocks,\nSTDEV(NumberDeadlocks) AS StdDevNumberDeadlocks\nFROM\
  \ CounterSummary\nGROUP BY server_name;\n```\n**清单 16-23** 每秒死锁数计数器分析\n\n通常，一个经过良好调优的数据库平台不应发生死锁。当死锁发生时，应对每一次死锁进行调查以确定其根本原因。然而，在检查死锁之前，首先需要检索死锁信息。\n\
  \n有多种方法可以从 SQL Server 收集死锁信息。这些方法包括跟踪标志、SQL Profiler 和事件通知。另一种方法是使用内置的 `system_health`\
  \ 会话，通过扩展事件。清单 16-24 中的查询返回当前该会话的 `ring_buffer` 中所有死锁的列表。\n\n```sql\nUSE IndexingMethod;\n\
  GO\nWITH deadlock\nAS (SELECT CAST(target_data AS XML) AS target_data\nFROM sys.dm_xe_session_targets\
  \ st\nINNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address\n\
  WHERE name = 'system_health'\nAND target_name = 'ring_buffer')\nSELECT c.value('(@timestamp)[1]',\
  \ 'datetime') AS event_timestamp,\nc.query('data/value/deadlock')\nFROM deadlock\
  \ d\nCROSS APPLY target_data.nodes('//RingBufferTarget/event') AS t(c)\nWHERE c.exist('.[@name\
  \ = \"xml_deadlock_report\"]') = 1;\n```\n**清单 16-24** 系统运行状况死锁查询\n\n当识别出死锁时，它们会以\
  \ XML 文档的形式返回。对大多数人来说，阅读 XML 文档并不是检查死锁的自然方式。相反，通常更可取的方法是查看与死锁关联的死锁图，例如图 16-10 中所示的那个。要获取清单\
  \ 16-22 返回的任何一个死锁的死锁图，请在 SQL Server Management Studio 中打开死锁 XML 文档，然后将文件保存为 `.xdl`\
  \ 扩展名。当文件重新打开时，它将显示为死锁图，而不是 XML 文档。\n\n![](img/338675_4_En_16_Fig10_HTML.png)\n\n\
  *该图展示了 2 台服务器之间的死锁。服务器 A 以 U（更新）模式向键锁发送请求。该键锁以 X（排他）模式向服务器 B 发送所有者模式。服务器 B 以请求模式向另一个键锁发送请求。它以所有者模式向服务器\
  \ A 发送请求。*\n\n**图 16-10** SQL Server Management Studio 中的死锁图\n\n一旦死锁被识别，重要的是确定它们发生的原因以防止其再次发生。导致死锁的一个常见问题是多个事务之间的操作顺序。这个原因通常难以解决，因为它可能需要重写部分应用程序代码。为了解决死锁，最简单的方法之一是减少事务发生的时间。对访问的表进行索引是一种典型方法，在许多情况下可以通过缩小可能产生死锁的时间窗口来解决死锁。\n\
  \n## 等待统计\n\n等待统计的分析过程与性能计数器的分析过程类似。对于这两组数据，信息都指向资源可能正承受压力的区域，识别出这些资源并指出后续步骤。许多适用于性能计数器的流程同样适用于等待统计。这两组信息的一个主要区别在于，等待统计是作为一个整体来审视的，其价值是通过与\
  \ SQL Server 实例上的其他等待统计进行比较来确定的。\n\n由于这个区别，在查看等待统计时，分析只需要一个查询。在使用清单 16-25 提供的等待统计分析查询之前，有几个关于等待统计分析的方面应该讨论一下。\n\
  \n首先，正如忽略等待统计列表所显示的那样，有些等待状态无论服务器上的活动如何都会累积。对于这些，调查与其相关的行为没有任何价值，原因要么是它们只是服务器上 CPU\
  \ 时间的推移，要么是与无法影响的内部操作有关。因此，它们不在索引讨论的范围内。\n\n其次，等待统计的价值在于将其与服务器上经过的时间关联起来审视。虽然一个等待状态高于另一个等待状态很重要，但如果没有知道经过的时间量，就没有衡量该等待状态对服务器造成压力的尺度。为了解决这个问题，监控表中第一组结果中的等待会被忽略，并使用它们与最后一个收集点之间的日期来计算经过的时间。等待状态发生的时长与总时间相比，提供了确定该等待状态对\
  \ SQL Server 实例压力所需的数值。\n\n**注意** 如果表 `dbo.wait_stats_history` 中只有一个样本，清单 16-25\
  \ 结果中的 `pct` 列将为 null。\n\n### 列表 16-25 等待统计信息分析查询\n\n```sql\nUSE IndexingMethod;\n\
  GO\nWITH WaitStats\nAS (SELECT DENSE_RANK() OVER (ORDER BY w.create_date ASC) AS\
  \ RankID,\ncreate_date,\nwait_type,\nwaiting_tasks_count,\nwait_time_ms,\nmax_wait_time_ms,\n\
  signal_wait_time_ms,\nMIN(create_date) OVER () AS min_create_date,\nMAX(create_date)\
  \ OVER () AS max_create_date\nFROM dbo.wait_stats_history w\nWHERE wait_type NOT\
  \ IN ( 'BROKER_EVENTHANDLER', 'BROKER_RECEIVE_WAITFOR', 'BROKER_TASK_STOP', 'BROKER_TO_FLUSH',\
  \ 'BROKER_TRANSMITTER', 'CHECKPOINT_QUEUE', 'CHKPT', 'CLR_AUTO_EVENT', 'CLR_MANUAL_EVENT',\
  \ 'CLR_SEMAPHORE', 'CXCONSUMER', 'DBMIRROR_DBM_EVENT', 'DBMIRROR_EVENTS_QUEUE',\
  \ 'DBMIRROR_WORKER_QUEUE', 'DBMIRRORING_CMD', 'DIRTY_PAGE_POLL', 'DISPATCHER_QUEUE_SEMAPHORE',\
  \ 'EXECSYNC', 'FSAGENT', 'FT_IFTS_SCHEDULER_IDLE_WAIT', 'FT_IFTSHC_MUTEX', 'HADR_CLUSAPI_CALL',\
  \ 'HADR_FILESTREAM_IOMGR_IOCOMPLETIO,', 'HADR_LOGCAPTURE_WAIT', 'HADR_NOTIFICATION_DEQUEUE',\
  \ 'HADR_TIMER_TASK', 'HADR_WORK_QUEUE', 'KSOURCE_WAKEUP', 'LAZYWRITER_SLEEP', 'LOGMGR_QUEUE',\
  \ 'MEMORY_ALLOCATION_EXT', 'ONDEMAND_TASK_QUEUE', 'PARALLEL_REDO_DRAIN_WORKER',\
  \ 'PARALLEL_REDO_LOG_CACHE', 'PARALLEL_REDO_TRAN_LIST', 'PARALLEL_REDO_WORKER_SYNC',\
  \ 'PARALLEL_REDO_WORKER_WAIT_WORK', 'PREEMPTIVE_HADR_LEASE_MECHANISM', 'PREEMPTIVE_SP_SERVER_DIAGNOSTICS',\
  \ 'PREEMPTIVE_OS_LIBRARYOPS', 'PREEMPTIVE_OS_COMOPS', 'PREEMPTIVE_OS_CRYPTOPS',\
  \ 'PREEMPTIVE_OS_PIPEOPS', 'PREEMPTIVE_OS_AUTHENTICATIONOPS', 'PREEMPTIVE_OS_GENERICOPS',\
  \ 'PREEMPTIVE_OS_VERIFYTRUST', 'PREEMPTIVE_OS_FILEOPS', 'PREEMPTIVE_OS_DEVICEOPS',\
  \ 'PREEMPTIVE_OS_QUERYREGISTRY', 'PREEMPTIVE_OS_WRITEFILE', 'PREEMPTIVE_XE_CALLBACKEXECUTE',\
  \ 'PREEMPTIVE_XE_DISPATCHER', 'PREEMPTIVE_XE_GETTARGETSTATE', 'PREEMPTIVE_XE_SESSIONCOMMIT',\
  \ 'PREEMPTIVE_XE_TARGETINIT', 'PREEMPTIVE_XE_TARGETFINALIZE', 'PWAIT_ALL_COMPONENTS_INITIALIZED',\
  \ 'PWAIT_DIRECTLOGCONSUMER_GETNEXT', 'PWAIT_EXTENSIBILITY_CLEANUP_TASK', 'QDS_PERSIST_TASK_MAIN_LOOP_SLEEP',\
  \ 'QDS_ASYNC_QUEUE', 'QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP', 'REQUEST_FOR_DEADLOCK_SEARCH',\
  \ 'RESOURCE_QUEUE', 'SERVER_IDLE_CHECK', 'SLEEP_BPOOL_FLUSH', 'SLEEP_DBSTARTUP',\
  \ 'SLEEP_DCOMSTARTUP', 'SLEEP_MASTERDBREADY', 'SLEEP_MASTERMDREADY', 'SLEEP_MASTERUPGRADED',\
  \ 'SLEEP_MSDBSTARTUP', 'SLEEP_SYSTEMTASK', 'SLEEP_TASK', 'SLEEP_TEMPDBSTARTUP',\
  \ 'SNI_HTTP_ACCEPT', 'SOS_WORK_DISPATCHER', 'SP_SERVER_DIAGNOSTICS_SLEEP', 'SQLTRACE_BUFFER_FLUSH',\
  \ 'SQLTRACE_INCREMENTAL_FLUSH_SLEEP', 'SQLTRACE_WAIT_ENTRIES', 'STARTUP_DEPENDENCY_MANAGER',\
  \ 'WAIT_FOR_RESULTS', 'WAITFOR', 'WAITFOR_TASKSHUTDOW', 'WAIT_XTP_HOST_WAIT', 'WAIT_XTP_OFFLINE_CKPT_NEW_LOG',\
  \ 'WAIT_XTP_CKPT_CLOSE', 'WAIT_XTP_RECOVERY', 'XE_BUFFERMGR_ALLPROCESSED_EVENT',\
  \ 'XE_DISPATCHER_JOI,', 'XE_DISPATCHER_WAIT', 'XE_LIVE_TARGET_TVF', 'XE_TIMER_EVENT'))\n\
  SELECT wait_type,\nDATEDIFF(ms, min_create_date, max_create_date) AS total_time_ms,\n\
  SUM(waiting_tasks_count) AS waiting_tasks_count,\nSUM(wait_time_ms) AS wait_time_ms,\n\
  CAST(1. * SUM(wait_time_ms) / NULLIF(SUM(waiting_tasks_count),0) AS DECIMAL(18,\
  \ 3)) AS avg_wait_time_ms,\nCAST(100. * SUM(wait_time_ms) / NULLIF(DATEDIFF(ms,\
  \ min_create_date, max_create_date),0) AS DECIMAL(18, 3)) AS pct_time_in_wait,\n\
  SUM(signal_wait_time_ms) AS signal_wait_time_ms,\nCAST(100. * SUM(signal_wait_time_ms)\
  \ / NULLIF(SUM(wait_time_ms), 0) AS DECIMAL(18, 3)) AS pct_time_runnable\nFROM WaitStats\n\
  GROUP BY wait_type,\nmin_create_date,\nmax_create_date\nORDER BY SUM(wait_time_ms)\
  \ DESC;\n```\n\n该查询包含许多计算，有助于识别特定等待类型何时出现问题。为更好地理解提供的信息，请参见表 16-1 中的定义。这些计算及其定义将有助于聚焦与等待统计信息相关的性能问题。\n\
  \n在查看等待统计信息查询的结果（如图 16-11 所示）时，有两个阈值需要注意。首先，如果任何等待超过总等待时间的`5%`，则可能存在与该等待类型相关的瓶颈，应进行进一步调查。类似地，如果任何等待超过时间的`1%`，应考虑进行进一步分析，但在分析更高等待的项目之后再进行。审查等待统计信息时需要考虑的一点是，如果等待所花费的时间主要是因为`signal_wait_time_ms`，那么首先关注服务器上的`CPU`压力可以更好地解决资源争用问题。\n\
  \n![图 16-11](img/338675_4_En_16_Fig11_HTML.png)\n\n*一个包含 8 列和 10 行的表格。列标题为：等待类型、总时间（毫秒）、等待任务数、等待时间（毫秒）、平均等待时间（毫秒）、等待时间百分比、信号等待时间（毫秒）和可运行时间百分比。*\n\
  \n**图 16-11** 等待统计信息分析输出\n\n**表 16-1** 等待统计信息查询列定义\n\n| 选项名称 | 描述 |\n| --- | ---\
  \ |\n| `wait_type` | 引起等待的等待统计信息 |\n| `total_time_ms` | 查询测量的总时间（毫秒） |\n| `waiting_tasks_count`\
  \ | 此等待类型的等待次数计数 |\n| `wait_time_ms` | 为此等待类型累计的时间（毫秒）。包括 `signal_wait_time_ms`\
  \ 所花费的时间 |\n| `avg_wait_time_ms` | 每种等待类型的平均时间（毫秒） |\n| `pct_time_in_wait` | 为此等待类型花费的总时间百分比\
  \ |\n| `signal_wait_time_ms` | 等待类型可用且不再等待后、在开始运行前累计的时间（毫秒）。这是在 `RUNNABLE` 状态花费的时间\
  \ |\n| `pct_time_runnable` | 此等待类型在 `RUNNABLE` 状态花费的时间百分比 |\n\n一旦识别出有问题的等待状态，下一步就是审查该等待及建议的应对措施。由于本章重点介绍更偏向索引相关的等待类型，我们将只关注这些定义。要了解其他等待类型，请查阅\
  \ `sys.dm_os_wait_stats`（Transact SQL）的联机文档主题。\n\n#### CXPACKET\n\nCXPACKET 等待类型发生在并行查询执行（也称为*并行处理*）出现等待时。并行查询可能遇到\
  \ CXPACKET 等待的情况主要有两种。第一种是当并行查询中的某个操作符无法执行，因为其他线程已经在调度器上运行。第二种是当并行线程中的某个线程执行时间比其余线程长，而其他线程需要等待这个较慢的线程完成。第一种原因是并行等待中更常见的原因，但它超出了本书的范围，通常与配置设置和查询调优有关。而第二种原因则可以通过索引来解决。通常，解决了导致\
  \ CXPACKET 等待的第二个原因后，第一个并行等待的原因也能得到缓解。\n\n> **注意**\n>\n> 还有第二种并行等待名为 CXCONSUMER，用于标识与并行操作符等待线程向其发送行相关的等待。这通常不是一个可操作的等待，且不在本书的讨论范围内。\n\
  \n解决 CXPACKET 等待的两种常见方法是调整服务器属性 `max degree of parallelism`（最大并行度）和 `cost threshold\
  \ for parallelism`（并行的成本阈值）。与并行等待的第一个原因类似，通过这些服务器属性解决并行问题也超出了本书的范围。使用这两个属性有有效的方法，但这里的重点是索引，而不是限制并行的范围和成本。简单来说，`max\
  \ degree of parallelism` 限制了任何单个查询在并行处理期间可以使用的内核总数。而 `cost threshold for parallelism`\
  \ 则提高了 SQL Server 判定查询可以使用并行的阈值，但不限制并行的范围。\n\n本书讨论的范围是通过索引来缓解 CXPACKET 等待，并可结合查询调优。要解决并行运行的查询的索引问题，我们首先需要识别正在使用并行的查询。有多种方法可以识别参与并行操作的查询和索引。\n\
  \n第一种方法是检查以前执行中使用了并行的执行计划。通过这种方法，可以查询计划缓存以识别包含并行操作符的已创建执行计划。这提供了一个理想的查询列表，这些查询可以被调优以减少\
  \ I/O 消耗或消除对并行的需求。并行查询的需求有时可归因于基础表上的不当索引。例如，在利用扫描的表上执行的并行操作，可以通过一个支持查询中谓词或排序的索引来缓解。清单\
  \ 16-26 中的查询提供了计划缓存中使用了并行的执行计划列表。\n\n```sql\nSET TRANSACTION ISOLATION LEVEL READ\
  \ UNCOMMITTED;\nWITH XMLNAMESPACES (\nDEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
  )\nSELECT COALESCE(\nDB_NAME([p].[dbid]),\n[p].[query_plan].value[1]', 'nvarchar(128)')\n\
  ) AS [database_name],\nIIF([p].[objectid] <> 0,\nCONCAT(\nQUOTENAME(DB_NAME([p].[dbid])),\n\
  '.',\nQUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),\n'.',\nQUOTENAME(OBJECT_NAME([p].[objectid],\
  \ [p].[dbid]))\n),\nNULL) AS [object_name],\n[cp].[objtype],\n[p].[query_plan],\n\
  [cp].[usecounts] AS [use_counts],\n[cp].[plan_handle],\nCAST('' AS XML) AS [sql_text]\n\
  FROM [sys].[dm_exec_cached_plans] AS [cp]\nCROSS APPLY [sys].dm_exec_query_plan\
  \ AS [p]\nCROSS APPLY [sys].dm_exec_sql_text AS [q]\nWHERE [cp].[cacheobjtype] =\
  \ 'Compiled Plan'\nAND [p].[query_plan].exist = 1\nORDER BY COALESCE(\nDB_NAME([p].[dbid]),\n\
  [p].[query_plan].value[1]', 'nvarchar(128)')\n),\n[cp].[usecounts] DESC;\n```\n\
  *清单 16-26 计划缓存中使用了并行的执行计划*\n\n> **警告**\n>\n> 本章包含许多针对计划缓存和查询存储执行的查询。这些是通过动态管理对象（DMO）访问的，它们提供了对\
  \ SQL Server 中执行计划的访问，允许调查服务器上当前和最近的执行活动。虽然这些信息非常有用，但在生产系统上执行此代码时请务必小心。对这些视图执行过于昂贵的查询可能会影响\
  \ SQL Server 的性能。请务必在非生产环境中监控和测试此类查询，然后再在生产环境中使用。\n\n下一种方法与使用计划缓存类似，但使用的是查询存储。前提是该功能已在数据库上启用，`sys.query_store_plan`\
  \ 表中有一个列用于标识并行计划。将它与一些其他 DMO 结合使用，可以提供包含并行操作符的 T-SQL 语句列表。清单 16-27 提供了一个从查询存储返回并行查询的查询，其中包含该\
  \ T-SQL 语句的执行次数。使用查询存储的一个优势是它将结果限制在单个数据库内。\n\n```sql\nSET TRANSACTION ISOLATION\
  \ LEVEL READ UNCOMMITTED;\nSELECT IIF([qsq].[object_id] <> 0,\nCONCAT(\nQUOTENAME(DB_NAME()),\n\
  '.',\nQUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),\n'.',\nQUOTENAME(OBJECT_NAME([qsq].[object_id]))\n\
  ),\nNULL) AS [object_name],\nCAST([qsp].[query_plan] AS XML) AS [query_plan],\n\
  [deqs].[execution_count],\nCAST('' AS XML) AS [sql_text],\n[qsp].[engine_version],\n\
  [qsp].[compatibility_level],\n[qsq].[query_parameterization_type_desc],\n[qsp].[is_forced_plan],\n\
  [deqs].[total_worker_time]\nFROM [sys].[query_store_plan] AS [qsp]\nINNER JOIN [sys].[query_store_query]\
  \ AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]\nINNER JOIN [sys].[query_store_query_text]\
  \ AS [qsqt] ON [qsq].[query_text_id] = [qsqt].[query_text_id]\nINNER JOIN sys.[dm_exec_query_stats]\
  \ AS deqs ON [last_compile_batch_sql_handle] = [deqs].[sql_handle]\nWHERE [qsp].[is_parallel_plan]\
  \ = 1\nORDER BY [deqs].[execution_count] DESC,\n[deqs].[total_worker_time] DESC;\n\
  ```\n*清单 16-27 查询存储中使用了并行的执行计划*\n\n研究并行等待的另一种方法是调查当前正在执行的计划。此信息可在 DMO `sys.dm_os_tasks`\
  \ 中获得，该视图返回当前正在使用多个工作线程的等待；清单 16-28 提供了一个用于检索此信息的示例查询。此查询提供了一个当前正在执行的并行计划列表。\n\n\
  \n```sql\nWITH executing\nAS (SELECT er.session_id,\ner.request_id,\nMAX(ISNULL(exec_context_id,\
  \ 0)) AS number_of_workers,\ner.sql_handle,\ner.statement_start_offset,\ner.statement_end_offset,\n\
  er.plan_handle\nFROM sys.dm_exec_requests er\nINNER JOIN sys.dm_os_tasks t ON er.session_id\
  \ = t.session_id\nINNER JOIN sys.dm_exec_sessions es ON er.session_id = es.session_id\n\
  WHERE es.is_user_process = 0x1\nGROUP BY er.session_id,\ner.request_id,\ner.sql_handle,\n\
  er.statement_start_offset,\ner.statement_end_offset,\ner.plan_handle)\nSELECT QUOTENAME(DB_NAME(st.dbid))\
  \ AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + '.' +\
  \ QUOTENAME(OBJECT_NAME(st.objectid, st.dbid)) AS object_name,\ne.session_id,\n\
  e.request_id,\ne.number_of_workers,\nSUBSTRING(\nst.text,\ne.statement_start_offset\
  \ / 2,\n(CASE\nWHEN e.statement_end_offset = -1 THEN LEN(CONVERT(NVARCHAR(MAX),\
  \ st.text)) * 2\nELSE e.statement_end_offset END - e.statement_start_offset\n) /\
  \ 2\n) AS query_text,\nqp.query_plan\nFROM executing e\nCROSS APPLY sys.dm_exec_sql_text(e.plan_handle)\
  \ st\nCROSS APPLY sys.dm_exec_query_plan(e.plan_handle) qp\nWHERE number_of_workers\
  \ > 0;\n```\n代码清单 16-28\n当前正在执行的并行查询\n\n##### 用于分析并行等待的扩展事件会话\n\n第二种方法是启动一个扩展事件会话，捕获事务信息，然后根据可用的调用堆栈对该信息进行分组。如代码清单\
  \ 16-29 定义的会话，它会在并行等待发生时检索所有并行等待，并根据其 `T-SQL` 堆栈进行分组。在运行脚本前，请确保 `CXPACKET` 等待类型的值与查询中的值匹配；对于\
  \ `SQL Server 2019`，该值为 `265`。`T-SQL` 堆栈包含所有促成最终执行点的 SQL 语句。例如，深入分析执行堆栈可以提供有关正在执行某个函数（该函数又执行单条\
  \ `T-SQL` 语句）的存储过程的信息。这提供了可用于跟踪并行等待发生位置的详细信息。这些语句使用 `histogram` 目标进行分组，这使我们能够最小化收集的数据量，并专注于系统中导致最多\
  \ `CXPACKET` 等待的项目。\n\n```sql\nUSE master;\nGO\nSELECT name,\nmap_key,\nmap_value\n\
  FROM sys.dm_xe_map_values\nWHERE name = 'wait_types'\nAND map_value = 'CXPACKET';\n\
  GO\nIF EXISTS (\nSELECT *\nFROM sys.server_event_sessions\nWHERE name = 'ex_cxpacket'\n\
  )\nDROP EVENT SESSION ex_cxpacket ON SERVER;\nGO\nCREATE EVENT SESSION [ex_cxpacket]\n\
  ON SERVER\nADD EVENT sqlos.wait_info\n(ACTION (\nsqlserver.plan_handle,\nsqlserver.tsql_stack)\n\
  WHERE ([wait_type] = (265)\nAND [sqlserver].[is_system] = (0)))\nADD TARGET package0.histogram\n\
  (SET filtering_event_name = N'sqlos.wait_info', slots = (2048), source = N'sqlserver.tsql_stack',\
  \ source_type = (1))\nWITH (STARTUP_STATE = ON);\nGO\nALTER EVENT SESSION ex_cxpacket\
  \ ON SERVER STATE = START;\nGO\n```\n代码清单 16-29\n用于 `CXPACKET` 的扩展事件会话\n\n一旦扩展事件会话收集了一段时间的数据，就可以更仔细地查看等待最多的会话。代码清单\
  \ 16-30 提供了所有已收集的 `CXPACKET` 等待及其关联的语句和查询计划的列表。一旦我们知道这些信息，就可以调查正在使用的索引，以确定哪些索引导致了低选择性或意外的扫描。\n\
  \n```sql\nWITH XData\nAS (SELECT CAST(target_data AS XML) AS TargetData\nFROM sys.dm_xe_session_targets\
  \ st\nINNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address\n\
  WHERE name = 'ex_cxpacket'\nAND target_name = 'histogram'),\nParsedEvent\nAS (SELECT\
  \ c.value('(@count)[1]', 'bigint') AS event_count,\nc.value('xs:hexBinary(substring((value/frames/frame/@handle)[1],3))',\
  \ 'varbinary(255)') AS sql_handle,\nc.value('(value/frames/frame/@offsetStart)[1]',\
  \ 'int') AS statement_start_offset,\nc.value('(value/frames/frame/@offsetEnd)[1]',\
  \ 'int') AS statement_end_offset\nFROM XData d\nCROSS APPLY TargetData.nodes('//Slot')\
  \ t(c) )\nSELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(st.objectid,\
  \ st.dbid)) + '.' + QUOTENAME(OBJECT_NAME(st.objectid, st.dbid)) AS object_name,\n\
  e.event_count,\nSUBSTRING(\nst.text,\ne.statement_start_offset / 2,\n(IIF(e.statement_end_offset\
  \ = -1, LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2, e.statement_end_offset)\n- e.statement_start_offset\n\
  ) / 2\n) AS query_text,\nqp.query_plan\nFROM ParsedEvent e\nCROSS APPLY sys.dm_exec_sql_text(e.sql_handle)\
  \ st\nCROSS APPLY (\nSELECT plan_handle\nFROM sys.dm_exec_query_stats qs\nWHERE\
  \ e.sql_handle = qs.sql_handle\nGROUP BY plan_handle\n) x\nCROSS APPLY sys.dm_exec_query_plan(x.plan_handle)\
  \ qp\nORDER BY e.event_count DESC;\n```\n代码清单 16-30\n查看 `CXPACKET` 扩展事件会话的查询\n\n\
  ##### SQL Server 2022 中的并行度反馈\n\n`SQL Server 2022` 为智能查询处理 (`IQP`) 增加了一项新功能，极大地改进了执行计划中并行度的使用方式：并行度反馈。这是一个数据库作用域的配置更改，允许\
  \ `SQL Server` 在查询优化器认为当前 `DOP` 对于重复出现的查询并非最优时，自动为单个查询调整并行度。这是一个强大的增强功能，可以自动调优并行度，对于大量使用并行执行计划的服务器特别有用。代码清单\
  \ 16-31 中的 `T-SQL` 提供了在 `SQL Server 2022+` 中启用 `DOP Feedback` 的语法。\n\n```sql\nALTER\
  \ DATABASE SCOPED CONFIGURATION SET DOP_FEEDBACK = ON;\n```\n代码清单 16-31\n启用 `DOP\
  \ Feedback` 的查询\n\n要验证此功能的当前（及默认）设置，可以使用代码清单 16-32 中的 `T-SQL`。\n\n```sql\nSELECT\n\
  *\nFROM sys.database_scoped_configurations\nWHERE database_scoped_configurations.name\
  \ = 'DOP_FEEDBACK';\n```\n代码清单 16-32\n查看当前 `DOP Feedback` 设置的查询\n\n图 16-12 中的结果验证了\
  \ `DOP Feedback` 现已启用，并且 `SQL Server` 默认禁用此功能。\n\n![images/338675_4_En_16_Chapter/338675_4_En_16_Fig12_HTML.png](img/338675_4_En_16_Fig12_HTML.png)\n\
  \n一个页面在“结果”选项卡下呈现了一个包含 5 列和一行的表格。列标题及数据为：configuration i d 37， name D O P feedback，\
  \ value 1， value for secondary 为 null， value default 0。\n\n图 16-12\n`DOP_Feedback`\
  \ 配置详情。\n\n虽然并行度反馈不能解决所有与并行相关的问题，但它可以帮助自动纠正那些原本会消耗宝贵时间和资源的问题。在并行性挑战没有明确的索引或查询调优解决方案可用的情况下，这尤其有价值。\n\
  \n\n\n#### IO_COMPLETION\n\n`IO_COMPLETION` 等待类型发生在 SQL Server 等待非数据页 I/O 操作（例如索引页）完成时。尽管此等待与非数据操作相关，但当此等待在\
  \ SQL Server 实例中较高时，仍可采取一些与索引相关的操作。\n\n首先，检查服务器上 `Full Scans/sec` 的状态。如果该性能计数器存在问题，其下的操作可能会波及到用于管理索引的非数据页。如果两者都处于高位，应首先重点分析\
  \ `Full Scans/sec` 问题。\n\n我们可以采取的第二个操作是检查 SQL Server 实例中的缺失索引信息。该信息在第 9 章讨论。添加缺失索引可以将数据消耗的压力转移到新结构上，查询可能不再需要等待非数据\
  \ I/O 完成，因为它现在利用了不同的索引。\n\n接下来，考虑索引上发生的页拆分数量；页拆分在将页重新分配到新页时会影响非数据页。大量的页拆分活动将导致高非数据页\
  \ I/O，这可能是这些等待的根源或与之相关。\n\n最后，如果 `IO_COMPLETION` 问题的原因不明显，请使用扩展事件会话进行调查。这类分析超出了本书的范围，因为这些原因很可能与索引无关。用于调查\
  \ `CXPACKET` 的方法可以适用，并将是开始调查的起点。\n\n#### LCK_M_∗\n\n`LCK_M_∗` 等待类型集合指的是在 SQL Server\
  \ 实例上发生的等待。这些不仅仅是锁的使用，还包括锁有关联等待的时候。`LCK_M_∗` 中的每个等待类型都引用一种特定的锁类型，例如排他锁或共享锁。要解读不同的等待类型，请使用表\
  \ 16-2。当 `LCK_M_∗` 等待类型增加时，它们总是伴随着锁等待时间（毫秒）和锁等待/秒的增加，因此可以利用这些计数器来调查此等待类型。\n\n在调查性能计数器或不同锁类型的增加时，请参阅表\
  \ 16-2。结合等待类型和性能计数器来锁定特定问题。例如，当性能计数器指向锁等待时间（毫秒）问题时，查找 `LCK_M_∗` 上的长时间等待。使用 SQL Server\
  \ Management Studio 中的向导创建“统计查询锁定”会话，并确定是哪些锁以及哪些查询（通过 `query_hash`）导致了问题。类似地，如果问题在于锁等待/秒，请查找锁最多的查询。\n\
  \n**表 16-2 LCK_M_∗ 等待类型**\n\n| 等待类型 | 锁类型 |\n| --- | --- |\n| `LCK_M_BU` | 批量更新\
  \ |\n| `LCK_M_IS` | 意向共享 |\n| `LCK_M_IU` | 意向更新 |\n| `LCK_M_IX` | 意向排他 |\n| `LCK_M_RIn_NL`\
  \ | 在当前键值与前一键值之间插入范围锁，当前键值使用 `NULL` 锁 |\n| `LCK_M_RIn_S` | 在当前键值与前一键值之间插入范围锁，当前键值使用共享锁\
  \ |\n| `LCK_M_RIn_U` | 在当前键值与前一键值之间插入范围锁，当前键值使用更新锁 |\n| `LCK_M_RIn_X` | 在当前键值与前一键值之间插入范围锁，当前键值使用排他锁\
  \ |\n| `LCK_M_RS_S` | 在当前键值与前一键值之间共享范围锁，当前键值使用共享锁 |\n| `LCK_M_RS_U` | 在当前键值与前一键值之间共享范围锁，当前键值使用更新锁\
  \ |\n| `LCK_M_RX_S` | 在当前键值与前一键值之间排他范围锁，当前键值使用共享锁 |\n| `LCK_M_RX_U` | 在当前键值与前一键值之间排他范围锁，当前键值使用更新锁\
  \ |\n| `LCK_M_RX_X` | 在当前键值与前一键值之间排他范围锁，当前键值使用排他锁 |\n| `LCK_M_S` | 共享 |\n| `LCK_M_SCH_M`\
  \ | 架构修改 |\n| `LCK_M_SCH_S` | 架构共享 |\n| `LCK_M_SIU` | 共享，带意向更新 |\n| `LCK_M_SIX`\
  \ | 共享，带意向排他 |\n| `LCK_M_U` | 更新 |\n| `LCK_M_UIX` | 更新，带意向排他 |\n| `LCK_M_X` | 排他\
  \ |\n\n表 16-2 中的所有锁都可以带有 `_ABORT_BLOCKERS` 和 `_LOW_PRIORITY` 后缀，这与联机索引和分区切换操作添加的低优先级选项有关。此功能自\
  \ SQL Server 2014 起可用。如果看到带有这些后缀的锁，请检查正在发生的索引维护操作。当等待过多时，可能需要调整维护计划。\n\n#### PAGEIOLATCH_∗\n\
  \n最后一个与索引相关的等待是 `PAGEIOLATCH_∗` 等待类型。此等待指的是当 SQL Server 从索引中检索数据页并将其放入内存时发生的等待。SQL\
  \ Server 使用这些计数器来跟踪查询准备好检索数据页到它们在内存中可用的时间。与 `LCK_M_∗` 等待一样，有许多不同的 `PAGEIOLATCH_∗`\
  \ 类型，每种类型都在表 16-3 中定义。\n\n首先，监视当前在缓冲区缓存中的索引，以确定哪些索引是可用的。另外，检查页面寿命预期/秒（PLE）计数器，该计数器目前未在监控部分收集。在\
  \ PLE 变化前后检查缓冲区中分配给索引的页面，有助于识别哪些索引正在将信息推出内存。然后调查查询计划，并调整查询或索引以减少满足查询所需的数据量。\n\n\
  **表 16-3 PAGEIOLATCH_∗ 等待类型**\n\n| 等待类型 | 锁类型 |\n| --- | --- |\n| `PAGEIOLATCH_DT`\
  \ | 以销毁模式挂起 I/O |\n| `PAGEIOLATCH_EX` | 以排他模式挂起 I/O |\n| `PAGEIOLATCH_KP` | 以保持模式挂起\
  \ I/O |\n| `PAGEIOLATCH_SH` | 以共享模式挂起 I/O |\n| `PAGEIOLATCH_UP` | 以更新模式挂起 I/O |\n\
  \n解决 `PAGEIOLATCH_∗` 的第二个策略是更加强调 `Full Scans/sec` 分析。通常，导致此等待类型增加的索引与数据库中正在使用的全表扫描有关。通过更加强调减少执行计划中对全表扫描的需求，将需要拉入内存的数据减少，从而导致此等待类型下降。\n\
  \n在某些情况下，与 `PAGEIOLATCH_∗` 相关的问题与索引无关。问题可能仅仅是磁盘性能缓慢。要验证是否是这种情况，请监视服务器计数器 `Physical\
  \ disk: disk seconds/read` 和 `Physical disk: disk seconds/write` 以及 SQL Server 的虚拟文件统计信息。如果这些统计数据持续偏高，则应将调查扩展到索引之外，转向硬件和\
  \ I/O 存储层面。除了改善磁盘性能外，增加可用内存也可以减少此等待统计信息，这可以降低数据页被推出内存的可能性。\n\n请注意，较高的 `PAGEIOLATCH`\
  \ 等待可能表明存在内存压力，需要为 SQL Server 增加内存分配。这应该被视为在所有其他研究和调整选项都已用尽后的最后手段。\n\n\n### 缓冲区分配\n\
  \n在通过索引确定服务器状态时，最终需要查看的领域是缓冲区缓存中的数据页面。这通常不是在考虑索引时会典型查看的区域，但它提供了关于 SQL Server 正将什么数据加载到内存中的丰富信息。它可以为\
  \ SQL Server 实例回答的核心问题是：缓冲区中的数据是否代表了使用该 SQL Server 的应用程序最重要的数据？\n\n回答这个问题的第一部分是查看内存中每个数据库的页面数量。这可能看起来不重要，但不同数据库所使用的内存量有时会令人惊讶。在为\
  \ `MSDB` 数据库中的备份表添加索引之前，这些表将所有备份数据推送到内存中的情况并不少见。如果表中的数据不经常被清理，这可能导致大量对业务应用程序并非关键的数据消耗了不必要的资源。\n\
  \n对于问题的第二部分，我们需要联系使用该 SQL Server 实例的应用程序所有者和主题专家。如果这些人的回答与缓冲区中的信息不符，这就为我们提供了一个数据库列表，我们可以专注于对这些数据库进行索引优化。\n\
  \n类似地，许多应用程序都有用于存储错误和处理事件以便日后进行故障排除的日志数据库。当问题出现时，开发人员无需查看日志文件，只需简单地查询数据库并提取他们进行故障排除所需的事件即可。但是，如果这些表没有正确索引或者查询不是\
  \ SARGable 会怎样呢？拥有数百万或数十亿行的日志表可能会被推入内存，将来自业务线应用程序的数据挤出内存，从而损害整个 SQL Server 的性能。如果不检查缓冲区中的数据，就无法知道内存中有什么以及它是否有价值。\n\
  \n检查内存中的数据是一项相对简单的任务，它利用了动态管理对象 `sys.dm_os_buffer_descriptors`。此 DMO 列出了内存中的每个数据页面并描述了页面上的信息。通过统计每个数据库的每个页面，可以确定分配给该数据库的页面总数和内存大小。使用清单\
  \ 16-33 中的查询，我们可以在图 16-13 中看到 `ContosoRetailDW` 数据库在服务器上占用的内存最多，而 `IndexingMethod`\
  \ 数据库当前使用了 8.84 MB 的空间。\n\n![](img/338675_4_En_16_Fig13_HTML.jpg)\n一个包含 3 列 7 行的表格截图。列标题为数据库名称、缓冲页面计数和缓冲池\
  \ M B。Contoso 零售 D W 的数据为 8115 和 63.40。\n\n图 16-13\n每个数据库查询的缓冲区分配结果\n\n```sql\n\
  SELECT LEFT(CASE database_id\nWHEN 32767 THEN 'ResourceDb'\nELSE DB_NAME(database_id)\
  \ END, 20) AS Database_Name,\nCOUNT(*) AS Buffered_Page_Count,\nCAST(COUNT(*) *\
  \ 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_Pool_MB\nFROM sys.dm_os_buffer_descriptors\n\
  GROUP BY DB_NAME(database_id),\ndatabase_id\nORDER BY Buffered_Page_Count DESC;\n\
  ```\n清单 16-33\n每个数据库的缓冲区分配\n\n一旦确定了内存中的数据库，确定数据库中的哪些对象在内存中也是有用的。与查看哪些数据库在内存中的原因相同，识别内存中的对象有助于确定在建立索引时需要重点关注的表和索引。检索每个表和索引的内存使用情况同样使用\
  \ `sys.dm_os_buffer_descriptors`，但需要将行映射到目录视图 `sys.allocation_units` 和 `sys.partitions`\
  \ 中的 `allocation_unit_id` 值。\n\n通过清单 16-34 中的查询，可以返回每个用户表和索引使用的内存量。在图 16-14 的结果中，显示表\
  \ FactSales 和 FactOnlineSales 占用了大量的内存。如果这出乎意料并且这些事实表并不明显，我们肯定想了解更多为什么它们占用如此多内存的原因。这可以引出其他问题，例如：这些数据是什么？为什么它如此之大？该表占用的空间是否影响了其他数据库使用其索引最佳利用内存的能力？在这些情况下，我们需要调查这些表上的索引，因为消耗内存最多的表应该拥有最优化的索引配置。\n\
  \n![](img/338675_4_En_16_Fig14_HTML.png)\n一个包含 11 行 5 列的表格，列在结果选项卡下。列标题为名称、名称、类型描述、缓冲页面计数和缓冲\
  \ M B。fact sales 的缓冲页面计数和缓冲 M B 分别为 18918 和 147.80。\n\n图 16-14\n每个表/索引查询的缓冲区分配结果\n\
  \n```sql\nWITH BufferAllocation\nAS (SELECT object_id,\nindex_id,\nallocation_unit_id\n\
  FROM sys.allocation_units AS au\nINNER JOIN sys.partitions AS p ON au.container_id\
  \ = p.hobt_id\nAND (au.type = 1 OR au.type = 3)\nUNION ALL\nSELECT object_id,\n\
  index_id,\nallocation_unit_id\nFROM sys.allocation_units AS au\nINNER JOIN sys.partitions\
  \ AS p ON au.container_id = p.hobt_id\nAND au.type = 2)\nSELECT t.name,\nwe.name,\n\
  we.type_desc,\nCOUNT(*) AS Buffered_Page_Count,\nCAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10,\
  \ 2)) AS Buffer_MB\nFROM sys.tables t\nINNER JOIN BufferAllocation ba ON t.object_id\
  \ = ba.object_id\nLEFT JOIN sys.indexes we ON ba.object_id = we.object_id\nAND ba.index_id\
  \ = we.index_id\nINNER JOIN sys.dm_os_buffer_descriptors bd ON ba.allocation_unit_id\
  \ = bd.allocation_unit_id\nWHERE bd.database_id = DB_ID()\nGROUP BY t.name,\nwe.index_id,\n\
  we.name,\nwe.type_desc\nORDER BY Buffered_Page_Count DESC;\n```\n清单 16-34\n按表/索引的缓冲区分配\n\
  \n## 模式发现\n\n在调查了服务器状态及其索引需求之后，索引分析过程的下一步是研究数据库的模式，以确定是否存在可以解决的与模式相关的索引问题。对于这些问题，主要关注点将放在可以通过目录视图发现的一些关键细节上。\n\
  \n\n### 模式问题：堆表与重复索引\n\n#### 识别堆表\n\n通常，在表上使用聚集索引比将表存储为堆表更为理想。当堆表更可取时，应是在已证明使用聚集索引会对性能产生负面影响，而非堆表的情况下。调查堆表时，最好考虑行数以及堆表的利用率。当堆表的行数很少或未被使用时，费心为其表创建聚集索引可能对性能影响甚微或毫无影响。\n\
  \n要识别堆表，请使用目录视图 `sys.indexes` 和 `sys.partitions`。性能信息可在表 `dbo.index_usage_stats_history`\
  \ 中获得。可以结合使用来形成清单 16-35 中的查询，其输出如图 16-15 所示。\n\n结果显示 `dbo.DatabaseLog` 有很多行。下一步是审查该表的模式。如果表上已存在主键，那它就是聚集索引键的良好候选。如果没有，则检查其他键列，例如业务键。如果没有键列，可能值得向表中添加一个代理键。\n\
  \n```sql\nSELECT QUOTENAME(DB_NAME()) AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(we.object_id))\
  \ + '.' + QUOTENAME(OBJECT_NAME(we.object_id)) AS object_name,\nwe.index_id,\np.rows,\n\
  SUM(h.user_seeks) AS user_seeks,\nSUM(h.user_scans) AS user_scans,\nSUM(h.user_lookups)\
  \ AS user_lookups,\nSUM(h.user_updates) AS user_updates\nFROM sys.indexes we\nINNER\
  \ JOIN sys.partitions p ON we.index_id = p.index_id\nAND we.object_id = p.object_id\n\
  LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON p.object_id =\
  \ h.object_id\nAND p.index_id = h.index_id\nWHERE type_desc = 'HEAP'\nGROUP BY we.index_id,\n\
  p.rows,\nwe.object_id\nORDER BY p.rows DESC;\n```\n**清单 16-35**\n识别堆表的查询\n\n![](img/338675_4_En_16_Fig15_HTML.png)\n\
  **图 16-15**\n识别堆表查询的输出\n\n#### 重复索引\n\n下一个要审查的模式问题是重复索引。除了极少数边缘情况外，数据库中无需存在重复索引。它们浪费空间并消耗资源进行维护，却未提供任何好处。要确定一个索引是否是另一个的重复项，请审查索引的键列和包含列。如果这些值匹配，则认为该索引是重复的。\n\
  \n要找出重复索引，需结合使用 `sys.indexes` 视图和 `sys.index_columns` 目录视图。使用清单 16-36 中的代码将这些视图相互比较，将提供重复索引的列表。查询结果如图\
  \ 16-16 所示，显示在 `AdventureWorks2017` 数据库中，索引 `AK_Document_rowguid` 和 `UQ__Document__F73921F7C5112C2E`\
  \ 是重复的。\n\n发现重复项后，应从数据库中移除两个索引中的一个。虽然其中一个索引会有索引活动，但移除任一索引都会将活动从一个转移到另一个。在移除任一索引前，请审查索引的非列属性，以确保不会丢失索引的重要方面。例如，如果其中一个索引被指定为唯一，请确保保留的索引仍具有该属性。\n\
  \n```sql\nUSE AdventureWorks2017;\nGO\nWITH IndexSchema\nAS (SELECT we.object_id,\n\
  we.index_id,\nwe.name,\nISNULL(we.filter_definition, '') AS filter_definition,\n\
  we.is_unique,\n(\nSELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE\nWHEN\
  \ ic.is_descending_key = 1 THEN '-'\nELSE '+' END,\n'('\n)\nFROM sys.index_columns\
  \ ic\nINNER JOIN sys.columns c ON ic.object_id = c.object_id\nAND ic.column_id =\
  \ c.column_id\nWHERE we.object_id = ic.object_id\nAND we.index_id = ic.index_id\n\
  AND is_included_column = 0\nORDER BY key_ordinal ASC\nFOR XML PATH('')\n) + COALESCE((\n\
  SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE\nWHEN ic.is_descending_key\
  \ = 1 THEN '-'\nELSE '+' END,\n'('\n)\nFROM sys.index_columns ic\nINNER JOIN sys.columns\
  \ c ON ic.object_id = c.object_id\nAND ic.column_id = c.column_id\nLEFT OUTER JOIN\
  \ sys.index_columns ic_key ON c.object_id = ic_key.object_id\nAND c.column_id =\
  \ ic_key.column_id\nAND we.index_id = ic_key.index_id\nAND ic_key.is_included_column\
  \ = 0\nWHERE we.object_id = ic.object_id\nAND ic.index_id = 1\nAND ic.is_included_column\
  \ = 0\nAND ic_key.index_id IS NULL\nORDER BY ic.key_ordinal ASC\nFOR XML PATH('')\n\
  ),\n''\n) + CASE\nWHEN we.is_unique = 1 THEN 'U'\nELSE '' END AS index_columns_keys_ids,\n\
  CASE\nWHEN we.index_id IN ( 0, 1 ) THEN 'ALL-COLUMNS'\nELSE COALESCE((\nSELECT QUOTENAME(ic.column_id,\
  \ '(')\nFROM sys.index_columns ic\nINNER JOIN sys.columns c ON ic.object_id = c.object_id\n\
  AND ic.column_id = c.column_id\nLEFT OUTER JOIN sys.index_columns ic_key ON c.object_id\
  \ = ic_key.object_id\nAND c.column_id = ic_key.column_id\nAND ic_key.index_id =\
  \ 1\nWHERE we.object_id = ic.object_id\nAND we.index_id = ic.index_id\nAND ic.is_included_column\
  \ = 1\nAND ic_key.index_id IS NULL\nORDER BY ic.key_ordinal ASC\nFOR XML PATH('')\n\
  ),\nSPACE(0)\n) END AS included_columns_ids\nFROM sys.tables t\nINNER JOIN sys.indexes\
  \ we ON t.object_id = we.object_id\nINNER JOIN sys.data_spaces ds ON we.data_space_id\
  \ = ds.data_space_id\nINNER JOIN sys.dm_db_partition_stats ps ON we.object_id =\
  \ ps.object_id\nAND we.index_id = ps.index_id)\nSELECT QUOTENAME(DB_NAME()) AS database_name,\n\
  QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + '.' + QUOTENAME(OBJECT_NAME(is1.object_id))\
  \ AS object_name,\nis1.name AS index_name,\nis2.name AS duplicate_index_name\nFROM\
  \ IndexSchema is1\nINNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id\n\
  AND is1.index_id <> is2.index_id\nAND is1.index_columns_keys_ids = is2.index_columns_keys_ids\n\
  AND is1.included_columns_ids = is2.included_columns_ids\nAND is1.filter_definition\
  \ = is2.filter_definition\nAND is1.is_unique = is2.is_unique;\n```\n**清单 16-36**\n\
  识别重复索引的查询\n\n![](img/338675_4_En_16_Fig16_HTML.png)\n**图 16-16**\n识别重复索引查询的输出\n\n\
  注意\n重叠索引查询的最初灵感来自 Paul Nielsen 发布在 `http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx`\
  \ 的博客文章。\n\n\n#### 重叠索引\n\n在识别了重复索引之后，下一步是查找重叠索引。当一个索引的键列完全或部分构成了另一个索引的键列时，该索引就被认为是与另一个索引重叠。在检查列重叠时，不考虑包含列；此评估的重点仅在于键列。\n\
  \n要识别重叠索引，需要使用相同的目录视图 `sys.indexes` 和 `sys.index_columns`。对于每个索引，将使用 `LIKE` 运算符和通配符将其键列与表上其他索引的键列进行比较。当匹配时，它将被标记为重叠索引。此检查的查询如代码清单\
  \ 16-37 所示，在 `AdventureWorks2017` 数据库上执行的结果如图 16-17 所示。\n\n处理重叠索引的决策不如处理重复索引那样简单。为了帮助说明重叠索引，在\
  \ `DocumentNode` 列上创建了索引 `IX_SameAsPK`。这与用作 `Production.Document` 表聚簇索引键的列相同。然而，这个例子表明，非聚簇索引也可以被视为聚簇索引的重叠索引。在某些情况下，移除重叠的非聚簇索引可能是可取的。实际上，聚簇索引具有相同的键，并且页面以相同的方式排序。我们可以在两者中找到相同的值。当考虑聚簇索引中行的大小时，就出现了灰色地带。如果行足够宽，并且仅查询聚簇键，那么使用非聚簇索引有时会更有益。这样的话，就需要花费更多时间来分析索引，以确定重叠索引是否具有任何效用。同样的灰色地带也适用于两个非聚簇索引之间的比较。\n\
  \n在审查重叠索引时，还有几点需要注意。务必保留索引属性，例如索引是否唯一。同时，要密切关注包含列。包含列不参与重叠比较。两个索引之间可能存在唯一的包含列集。请注意这一点，并酌情合并包含列。同样，检查筛选器或其他索引属性，这些可能有助于理解特定索引存在的原因以及如何优化它们。\n\
  \n```sql\nWITH IndexSchema\nAS (SELECT we.object_id,\nwe.index_id,\nwe.name,\n(\n\
  SELECT CASE key_ordinal\nWHEN 0 THEN NULL\nELSE QUOTENAME(column_id, '(') END\n\
  FROM sys.index_columns ic\nWHERE ic.object_id = we.object_id\nAND ic.index_id =\
  \ we.index_id\nORDER BY key_ordinal,\ncolumn_id\nFOR XML PATH('')\n) AS index_columns_keys\n\
  FROM sys.tables t\nINNER JOIN sys.indexes we ON t.object_id = we.object_id\nWHERE\
  \ we.type_desc IN ( 'CLUSTERED', 'NONCLUSTERED', 'HEAP' ))\nSELECT QUOTENAME(DB_NAME())\
  \ AS database_name,\nQUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + '.' + QUOTENAME(OBJECT_NAME(is1.object_id))\
  \ AS object_name,\nSTUFF((\nSELECT ', ' + c.name\nFROM sys.index_columns ic\nINNER\
  \ JOIN sys.columns c ON ic.object_id = c.object_id\nAND ic.column_id = c.column_id\n\
  WHERE ic.object_id = is1.object_id\nAND ic.index_id = is1.index_id\nORDER BY ic.key_ordinal,\n\
  ic.column_id\nFOR XML PATH('')\n),\n1,\n2,\n''\n) AS index_columns,\nSTUFF((\nSELECT\
  \ ', ' + c.name\nFROM sys.index_columns ic\nINNER JOIN sys.columns c ON ic.object_id\
  \ = c.object_id\nAND ic.column_id = c.column_id\nWHERE ic.object_id = is1.object_id\n\
  AND ic.index_id = is1.index_id\nAND ic.is_included_column = 1\nORDER BY ic.column_id\n\
  FOR XML PATH('')\n),\n1,\n2,\n''\n) AS included_columns,\nis1.name AS index_name,\n\
  SUM(CASE\nWHEN is1.index_id = h.index_id THEN\nISNULL(h.user_seeks, 0) + ISNULL(h.user_scans,\
  \ 0) + ISNULL(h.user_lookups, 0)\n+ ISNULL(h.user_updates, 0) END\n) index_activity,\n\
  is2.name AS duplicate_index_name,\nSUM(CASE\nWHEN is2.index_id = h.index_id THEN\n\
  ISNULL(h.user_seeks, 0) + ISNULL(h.user_scans, 0) + ISNULL(h.user_lookups, 0)\n\
  + ISNULL(h.user_updates, 0) END\n) duplicate_index_activity\nFROM IndexSchema is1\n\
  INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id\nAND is1.index_id >\
  \ is2.index_id\nAND (\nis1.index_columns_keys LIKE is2.index_columns_keys + '%'\n\
  AND is2.index_columns_keys LIKE is2.index_columns_keys + '%'\n)\nLEFT OUTER JOIN\
  \ IndexingMethod.dbo.index_usage_stats_history h ON is1.object_id = h.object_id\n\
  GROUP BY is1.object_id,\nis1.name,\nis2.name,\nis1.index_id;\n```\n代码清单 16-37\n\
  识别重叠索引的查询\n\n![](img/338675_4_En_16_Fig17_HTML.png)\n页面在结果选项卡下显示一个表格。列标题为数据库名称、对象名称、索引列、包含列、索引名称、索引活动、重复索引名称和重复索引活动。\n\
  图 16-17\n识别重叠索引的查询输出\n\n#### 未索引的外键\n\n外键对于在数据库中实施约束非常有用。当表之间存在父子关系时，外键提供了一种机制，用于验证子表没有引用不存在的父值。同样，外键确保父值在子值仍在使用时不能被移除（假设没有\
  \ `ON DELETE` 属性）。为了支持这些验证，表之间父值和子值的列需要建立索引。如果其中一方未被索引，SQL Server 就无法通过 Seek 操作来优化该操作，而被迫使用\
  \ Scan 操作来验证值是否存在于相关表中。类似地，如果删除了父行，则需要检查子表中的所有行，以确定是否有行依赖于该值。\n\n验证外键是否被索引涉及一个与重复索引和重叠索引类似的过程。除了\
  \ `sys.indexes` 和 `sys.index_columns` 目录视图外，还使用 `sys.foreign_key_columns` 视图来提供外键将依赖的索引模板。这些信息在代码清单\
  \ 16-38 的查询中汇集在一起，在 `AdventureWorks2017` 数据库上的结果如图 16-18 所示。\n\n常见的最佳实践是，每个外键都应该被索引。然而，并非每个外键都总是如此。在添加索引之前需要考虑几点。首先，子表中有多少行？如果行数较少，添加索引可能不会带来性能提升。如果列的唯一性相当低，统计信息可能证明扫描每一行是合理的，而不管索引如何。在这些情况下，可以认为如果表的大小很小，索引的成本也很小，添加索引没有什么损失。另一个考虑因素是是否会从表中删除数据，以及需要验证外键的活动何时会发生。对于具有大量列和外键的大表，性能可能会因为需要在表上维护又一个索引而受到影响。这个索引可能很有价值，但它是否足够有价值来证明创建它是合理的？\n\
  \n虽然这些是为外键创建索引时的良好考虑因素，但在大多数情况下，我们默认会希望为外键创建索引。类似于对聚簇表的建议，为外键创建索引，除非我们有性能文档表明为外键创建索引会对性能产生负面影响。\n\
  \n#### 清单 16-38\n用于识别未索引外键的查询\n\n```sql\nWITH cIndexes\nAS (SELECT we.object_id,\n\
  we.name,\n(\nSELECT QUOTENAME(ic.column_id, '(')\nFROM sys.index_columns ic\nWHERE\
  \ we.object_id = ic.object_id\nAND we.index_id = ic.index_id\nAND is_included_column\
  \ = 0\nORDER BY key_ordinal ASC\nFOR XML PATH('')\n) AS indexed_compare\nFROM sys.indexes\
  \ we),\ncForeignKeys\nAS (SELECT fk.name AS foreign_key_name,\n'PARENT' AS foreign_key_type,\n\
  fkc.parent_object_id AS object_id,\nSTUFF((\nSELECT ', ' + QUOTENAME(c.name)\nFROM\
  \ sys.foreign_key_columns ifkc\nINNER JOIN sys.columns c ON ifkc.parent_object_id\
  \ = c.object_id\nAND ifkc.parent_column_id = c.column_id\nWHERE fk.object_id = ifkc.constraint_object_id\n\
  ORDER BY ifkc.constraint_column_id\nFOR XML PATH('')\n),\n1,\n2,\n''\n) AS fk_columns,\n\
  (\nSELECT QUOTENAME(ifkc.parent_column_id, '(')\nFROM sys.foreign_key_columns ifkc\n\
  WHERE fk.object_id = ifkc.constraint_object_id\nORDER BY ifkc.constraint_column_id\n\
  FOR XML PATH('')\n) AS fk_columns_compare\nFROM sys.foreign_keys fk\nINNER JOIN\
  \ sys.foreign_key_columns fkc ON fk.object_id = fkc.constraint_object_id\nWHERE\
  \ fkc.constraint_column_id = 1),\ncRowCount\nAS (SELECT object_id,\nSUM(row_count)\
  \ AS row_count\nFROM sys.dm_db_partition_stats ps\nWHERE index_id IN ( 1, 0 )\n\
  GROUP BY object_id)\nSELECT QUOTENAME(DB_NAME()),\nQUOTENAME(OBJECT_SCHEMA_NAME(fk.object_id))\
  \ + '.' + QUOTENAME(OBJECT_NAME(fk.object_id)) AS ObjectName,\nfk.foreign_key_name,\n\
  fk_columns,\nrow_count\nFROM cForeignKeys fk\nINNER JOIN cRowCount rc ON fk.object_id\
  \ = rc.object_id\nLEFT OUTER JOIN cIndexes we ON fk.object_id = we.object_id\nAND\
  \ we.indexed_compare LIKE fk.fk_columns_compare + '%'\nWHERE we.name IS NULL\nORDER\
  \ BY row_count DESC,\nOBJECT_NAME(fk.object_id),\nfk.fk_columns;\n```\n\n#### 图\
  \ 16-18\n用于识别缺失外键索引的查询输出\n\n结果选项卡下呈现一个表格页面。列标题依次为：无列名、对象名称、外键名称、外键列和行数。“无列名”下的 `adventure\
  \ works 2017` 被选中。\n\n### 未压缩的索引\n\n正如本章前文及本书其他部分所讨论的，通常对索引应用某种程度的压缩是有益的。使用行压缩时，索引通常将定长数据存储为变长数据；而页面压缩则会检查数据并减少重复以进行进一步压缩。在许多情况下，通过压缩可以将数据库大小减少到当前大小的\
  \ 25%–75%。这种缩减提高了 SQL Server 通过 CPU 可处理的数据量。通常，压缩数据所带来的额外 CPU 成本，远低于处理未压缩数据量所节省的\
  \ CPU 开销。\n\n在检查数据库中是否存在未压缩的索引时，清单 16-39 中的查询会为每个数据库提供一份列表，包含每个索引的文件组、分区边界、行数和大小。这些信息特别有用，因为它有助于识别最大的索引，而在这些索引上应用压缩可能带来最显著的收益。请审阅该列表并确定哪些索引值得考虑进行压缩，同时请牢记是否存在诸如\
  \ `varchar(max)` 之类的数据类型，它们压缩效果不佳，并可能导致压缩失败，正如本章前面所讨论的。\n\n#### 清单 16-39\n用于识别未压缩索引的查询\n\
  \n```sql\nWITH partitioning\nAS (SELECT dds.data_space_id,\ndds.partition_scheme_id,\n\
  ds.name,\ndds.destination_id AS partition_number,\nCASE\nWHEN prv.value IS NOT NULL\
  \ THEN\nCONCAT(\nIIF(pf.boundary_value_on_right = 1, '小于 ', '大于或等于 '),\nCAST(prv.value\
  \ AS VARCHAR(MAX))\n)\nWHEN pf.boundary_value_on_right = 1 THEN '大于 MAX 边界'\nELSE\
  \ '小于 MIN 边界' END AS Boundary\nFROM sys.destination_data_spaces AS dds\nINNER JOIN\
  \ sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id\nINNER\
  \ JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id\nINNER JOIN\
  \ sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id\nLEFT OUTER JOIN\
  \ sys.partition_range_values AS prv ON pf.function_id = prv.function_id\nAND prv.boundary_id\
  \ = dds.destination_id)\nSELECT S.name AS schema_name,\nT.name AS table_name,\n\
  I.name AS index_name,\nI.index_id,\nP.partition_number,\nP.data_compression_desc,\n\
  I.type_desc,\nIIF(DS.type_desc = 'PARTITION_SCHEME', PS.name, DS.name) AS file_group,\n\
  PS.Boundary AS partition_boundary,\nDS.type_desc AS data_space_type,\nP.rows,\n\
  CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024. AS DECIMAL(20, 3)) AS mb_size\n\
  FROM sys.tables AS T\nINNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id\n\
  INNER JOIN sys.indexes AS I ON T.object_id = I.object_id\nINNER JOIN sys.partitions\
  \ AS P ON I.object_id = P.object_id\nAND I.index_id = P.index_id\nINNER JOIN sys.dm_db_partition_stats\
  \ AS dps ON P.object_id = dps.object_id\nAND P.index_id = dps.index_id\nAND P.partition_number\
  \ = dps.partition_number\nLEFT OUTER JOIN partitioning AS PS ON I.data_space_id\
  \ = PS.partition_scheme_id\nAND P.partition_number = PS.partition_number\nINNER\
  \ JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id\nWHERE P.data_compression_desc\
  \ = 'NONE';\nGO\n```\n\n### 注意\n\n数据库引擎优化顾问（DTA）是一个用于确定可添加到数据库的有用索引的好工具。虽然手动为数据库设计索引可能更有成就感，但忽略有用的建议并不可取。应将\
  \ DTA 作为一个起点，用以发现那些若没有该工具可能需要花费数小时才能确定的索引建议。\n\n\n## 数据库引擎调优顾问\n\n数据库引擎调优顾问（`DTA`）已在第\
  \ 9 章中讨论。在那一章里，介绍了使用`DTA`的两种模式：图形界面（GUI）和命令行实用工具。虽然调整查询通常是一个查看统计信息和评估执行计划的过程，但`DTA`提供了一种加速此分析的方法，它利用前一章监控过程中的跟踪文件来识别潜在有用的索引建议。此过程能在对生产环境影响最小的情况下完成调优，因为所有建议都源自非生产环境的分析。\n\
  \n使用`DTA`索引分析的基本过程可以分解为五个不同的步骤，如图 16-19 所示：\n\n1.  收集工作负载。\n2.  收集元数据。\n3.  执行调优。\n\
  4.  考虑建议并进行审查。\n5.  部署变更。\n\n通过这个过程，我们可以在索引方面抢占先机，并着手处理与现有性能问题相关的建议。\n\n![](img/338675_4_En_16_Fig19_HTML.png)\n\
  \n一个流程图定义了来自生产环境的工作负载、元数据和调优通过数据库发送到非生产环境。建议和部署则从数据库发送到生产环境。\n图 16-19\n使用`DTA`索引分析的步骤\n\
  \n该过程的第一步是收集工作负载。如果我们遵循了前一章索引监控过程中的步骤，那么这些信息应该已经被收集了。工作负载应代表两种标准场景。首先，收集一个代表典型一天的工作负载，因为即使是正常的一天也可能存在潜在的性能问题，调优可以帮助缓解这些问题。其次，收集已知存在性能问题时段的工作负载。这将有助于提供可能通过手动调优实现的建议。\n\
  \n收集工作负载后，下一步是收集必要的元数据以开始调优会话。收集元数据包括两个部分。第一部分是为`DTA`会话创建一个 XML 输入文件。XML 输入文件包含生产服务器和非生产服务器的名称，以及工作负载的位置和要使用的调优选项类型（清单\
  \ 16-40 展示了一个示例）。有关调优选项的更多信息，请参见第 9 章。此步骤的第二部分是对调优的影响，源自第一部分。当调优发生时，SQL Server 将从生产数据库收集架构和统计信息，并将这些信息移动到非生产服务器。虽然数据库不会有生产数据，但它将拥有做出索引建议所需的信息。\n\
  \n```\nSTR8-SQL-PRD\nAdventureWorks2017\nc:\\temp\\IndexingMethod.trc\nSTR8-SQL-TEST\
  \ \nIDX\nNONE\nNONE\n```\n清单 16-40\n`DTA`的 XML 输入文件示例\n\n注意：我们可以在 SQL Server 联机丛书中找到有关\
  \ XML 输入文件配置的更多信息，网址为[`https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta%253Fview%253Dsql-server-ver16)。\n\
  \n下一步是实际执行`DTA`调优会话。要运行会话，请使用`-ix`命令行选项执行`DTA`命令，如清单 16-41 所示。由于会话的所有配置信息都位于 XML\
  \ 文件中，因此无需添加任何额外参数。\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\n```\n清单 16-41\n\
  带有 XML 输入文件的`DTA`命令\n\n调优会话完成后，将会收到一个索引建议列表。这并不是此部分流程的最后一步。在实施`DTA`的任何建议之前，必须对其进行审查。虽然使用此工具将加速索引分析过程，但所有建议都需要经过审查和验证，以确保其合理，并且不会使表上的索引超出\
  \ SQL Server 对该工作负载的支持能力。\n\n最后一步是部署索引建议。此步骤从技术上讲超出了索引方法当前阶段的范围。不过，此时我们应该熟悉将要实施的索引变更。将这些变更添加到来自其他分析的现有索引变更列表中，并为实施做好准备，这将在下一章中讨论。\n\
  \n\n## 未使用的索引\n\n在索引分析过程中，一个必要且可能危险的步骤是确定要删除哪些索引。有些索引会因整合或重复而被移除。通常，这类操作的风险低于直接删除索引。另一类索引则是那些未被使用的索引。\n\
  \n识别未使用索引的最简单方法是，将每个数据库中的索引列表与`IndexingMethod`数据库中的`dbo.index_usage_stats_history`表进行核对。如果数据库中存在任何未使用的索引，清单\
  \ 16-42 中的查询将会识别出它们。关于未使用索引需要提醒一点：在此分析中，堆表、聚集索引以及任何唯一索引和主键都会被忽略。具有这些属性的索引通常与其他业务规则相关，其删除应基于其他因素考虑。图\
  \ 16-20 展示了`AdventureWorks2017`数据库中的一个未使用索引示例。\n\n![](img/338675_4_En_16_Fig20_HTML.png)\n\
  \n图 16-20: 识别缺失外键索引的查询输出结果\n\n```sql\nSELECT OBJECT_NAME(we.object_id) AS table_name,\n\
  \       COALESCE(we.name, SPACE(0)) AS index_name,\n       ps.partition_number,\n\
  \       ps.row_count,\n       CAST((ps.reserved_page_count * 8) / 1024\\. AS DECIMAL(12,\
  \ 2)) AS size_in_mb,\n       COALESCE(ius.user_seeks, 0) AS user_seeks,\n      \
  \ COALESCE(ius.user_scans, 0) AS user_scans,\n       COALESCE(ius.user_lookups,\
  \ 0) AS user_lookups,\n       we.type_desc\nFROM sys.all_objects t\nINNER JOIN sys.indexes\
  \ we ON t.object_id = we.object_id\nINNER JOIN sys.dm_db_partition_stats ps ON we.object_id\
  \ = ps.object_id\n                                       AND we.index_id = ps.index_id\n\
  LEFT OUTER JOIN sys.dm_db_index_usage_stats ius ON ius.database_id = DB_ID()\n \
  \                                              AND we.object_id = ius.object_id\n\
  \                                               AND we.index_id = ius.index_id\n\
  WHERE we.type_desc NOT IN ( 'HEAP', 'CLUSTERED' )\n  AND we.is_unique = 0\n  AND\
  \ we.is_primary_key = 0\n  AND we.is_unique_constraint = 0\n  AND COALESCE(ius.user_seeks,\
  \ 0) <= 0\n  AND COALESCE(ius.user_scans, 0) <= 0\n  AND COALESCE(ius.user_lookups,\
  \ 0) <= 0\nORDER BY OBJECT_NAME(we.object_id),\n         we.name;\n```\n清单 16-42:\
  \ 查询未使用索引\n\n尽管本节未作讨论，但还有两种识别未使用索引的额外情况。它们是极少使用的索引和不再使用的索引。对于这些情况，可以采用类似流程：不是查找从未使用过的索引，而是筛选出使用率低的索引，或者在数周或数月内未使用的索引。但在没有进一步研究和考虑的情况下，不要自动删除这些索引。如果索引使用频率很低，在删除前请核实其使用方式。它可能每天只使用一次，但那一次使用可能与关键流程相关。此外，对于未使用的索引，请核实该索引是否属于季节性流程的一部分。删除与季节性活动相关的索引，在非高峰期可能比维护它们带来更大负担。例如，一份庞大或复杂的月度报告可能依赖某个索引才能在合理时间内完成，或使用可接受的计算资源（或两者兼有）。\n\
  \n## 索引的计划使用情况\n\n本章前面几节讨论了检查计划缓存以分析和调查索引使用情况的概念。虽然统计信息可以显示是否有对索引的查找或扫描操作，但它并未提供足够细节来指示应添加哪些列，或是什么原因导致索引使用扫描而非查找。要收集这些信息，需要查阅执行计划。而数据库执行计划所在的位置就是计划缓存。在本节中，针对索引分析，我们将回顾两个可用于从计划缓存中检索执行计划的查询。\n\
  \n第一个查询用于需要检索特定索引的所有相关计划的情况。假设我们需要确定哪些流程或 T-SQL 语句正在使用某个表上的某个索引，而该索引每天只使用一两次。为此，我们可以使用清单\
  \ 16-43 中的查询访问计划缓存，检查该查询的计划是否仍在缓存中。使用该查询时，将变量`@IndexName`中的索引名称替换掉，然后执行它以返回使用该索引的计划列表。请注意，如果数据库中有许多同名索引（因为索引名称只需在表内唯一），则需谨慎处理。如果所有索引都命名为`IX_1`和`IX_2`，我们将在搜索中验证表名，以确保识别出正确的索引。\n\
  \n```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nGO\nDECLARE @IndexName\
  \ sysname = 'PK_SalesOrderHeader_SalesOrderID';\nSET @IndexName = QUOTENAME(@IndexName,\
  \ '[');\nWITH XMLNAMESPACES (\n    DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
  )\n, IndexSearch\nAS (SELECT qp.query_plan,\n           cp.usecounts,\n        \
  \   ix.query('.') AS StmtSimple\n    FROM sys.dm_exec_cached_plans cp\n        OUTER\
  \ APPLY sys.dm_exec_query_plan(cp.plan_handle) qp\n        CROSS APPLY qp.query_plan.nodes('//StmtSimple')\
  \ AS p(ix)\n    WHERE query_plan.exist('//Object[@Index = sql:variable (\"@IndexName\"\
  )]') = 1)\nSELECT StmtSimple.value('StmtSimple[1]/@StatementText', 'VARCHAR(4000)')\
  \ AS sql_text,\n       obj.value('@Database', 'sysname') AS database_name,\n   \
  \    obj.value('@Schema', 'sysname') AS schema_name,\n       obj.value('@Table',\
  \ 'sysname') AS table_name,\n       obj.value('@Index', 'sysname') AS index_name,\n\
  \       ixs.query_plan\nFROM IndexSearch ixs\n    CROSS APPLY StmtSimple.nodes('//Object')\
  \ AS o(obj)\nWHERE obj.exist('//Object[@Index = sql:variable(\"@IndexName\")]')\
  \ = 1;\n```\n清单 16-43: 查询计划缓存中的索引使用情况\n\n其他时候，仅按索引名称搜索计划缓存范围可能太广。在这些情况下，可以使用清单 16-44\
  \ 中的查询。该查询在计划缓存搜索中添加了物理运算符名称。例如，假设我们正在调查`Full Scans/sec`，并且我们知道是哪个索引导致了性能计数器的峰值。仅搜索索引可能返回数十个执行计划。或者，我们可以添加对特定运算符（如索引扫描）的搜索，使用提供的查询中的`@op`变量。\n\
  \n```sql\nDECLARE @IndexName sysname = 'IX_SalesOrderHeader_SalesPersonID';\nDECLARE\
  \ @op sysname = 'Index Scan';\n;WITH XMLNAMESPACES (\n    DEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
  )\nSELECT cp.plan_handle,\n       DB_NAME(dbid) + '.' + OBJECT_SCHEMA_NAME(objectid,\
  \ dbid) + '.' + OBJECT_NAME(objectid, dbid) AS database_object,\n       qp.query_plan,\n\
  \       c1.value('@PhysicalOp', 'nvarchar(50)'),\n       c2.value('@Index', 'nvarchar(max)')\n\
  FROM sys.dm_exec_cached_plans cp\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle)\
  \ qp\n    CROSS APPLY query_plan.nodes('//RelOp') r(c1)\n    OUTER APPLY c1.nodes('IndexScan/Object')\
  \ AS o(c2)\nWHERE c2.value('@Index', 'nvarchar(max)') = QUOTENAME(@IndexName, '[')\n\
  \  AND c1.exist('@PhysicalOp[. = sql:variable(\"@op\")]') = 1;\n```\n清单 16-44: 查询计划缓存中的索引使用情况和物理操作\n\
  \n这两个查询都提供了机制，用于调查其环境中的索引，并查看 SQL Server 具体如何使用它们。这些信息可以轻松地用于识别问题何时发生及原因，从而为解决索引问题提供途径，而无需像现在许多人所做的那样进行大量猜测。\n\
  \n\n## 总结\n\n正如本章所示，从监控索引收集的信息可用于分析索引并识别哪些需要进一步研究。此分析的结果有助于确定要修改的索引类型及位置。诸如数据库引擎优化顾问\
  \ (`Database Engine Tuning Advisor`) 和缺失索引 `DMO` 之类的索引工具可用于发现“低垂的果实”，为分析提供一个可能无法以其他方式发现的起点。遵循本章概述的索引分析流程，我们可以构建一个稳定、可重复的索引流程，有助于提高数据库平台的性能并随时间推移实现稳定的性能。\n\
  \n如果本章中多种类型的分析都推荐了特定的索引更改，请优先考虑这些更改，因为它们更有可能带来益处并对性能产生更大的积极影响。\n\n"
- '# 17. 索引方法学


  在本书中，我们讨论了索引是什么、它们的作用、构建它们的模式，以及确定 `SQL Server` 数据库应如何构建索引的许多其他方面。所有这些信息都是数据库索引最后一块拼图所必需的，即管理索引的方法学。为此，需要一个流程来应用这些知识，以确定最适合某个环境并能带来最大性能提升的索引。


  在这最后一章中，将讨论一种可用于构建索引方法学的通用实践。将提供管理索引所需的步骤列表。此方法学可应用于单个数据库、服务器或整个 `SQL Server` 环境。无论数据库支持的操作或业务类型如何，都可以使用相同的索引构建方法学。


  ## 索引方法


  在开始创建和删除索引之前，首先需要一个流程来分析当前和潜在的索引。此流程需要提供一种方式来观察您的数据库并确定适合它们的索引。正如前几章所提到的，索引应该更像科学而非艺术。正确索引数据库所需的信息是可用的；通过一些研究，可以识别出潜在的索引。类似于科学家使用科学方法来证明理论，数据库管理员和开发人员可以使用索引方法
  (`Indexing Method`) 来证明数据库需要哪些索引。


  本书中使用的索引方法 (`Indexing Method`) 由三个阶段组成：监控 (`Monitor`)、分析 (`Analyze`) 和实施 (`Implement`)（参见图
  17-1）。在每个组成部分中都有若干步骤，完成后有助于为数据库提供适当的索引。在实施 (`Implement`) 阶段完成后，索引方法 (`Indexing Method`)
  重新启动第一阶段，使索引成为一个持续的迭代过程。


  从监控 (`Monitor`) 阶段开始，主要活动是观察索引。观察包括审查索引的性能和行为（即第 15 章描述的索引概念）。`SQL Server` 将使用它认为最有益的可用索引。通过观察这种行为，您可以识别最常使用的索引以及它们是如何使用的。


  ![](img/338675_4_En_17_Fig1_HTML.jpg)


  图 17-1 索引生命周期


  观察之后，索引方法 (`Indexing Method`) 的分析 (`Analyze`) 阶段开始。在分析 (`Analyze`) 阶段（第 16 章详述），上一阶段收集的统计数据用于确定哪些索引最适合数据库。目标是识别需要创建、删除和修改的索引。同时，任何索引更改的影响也将被识别出来。


  索引方法 (`Indexing Method`) 的最后一个阶段是实施 (`Implementation`) 阶段。在此阶段，上一阶段确定的索引被应用（或部署）到数据库中。对于每个数据库和环境，部署过程可能不同。例如，在第三方数据库上部署索引的过程不同于您公司拥有的应用程序。然而，在此阶段，存在适用于所有环境的核心概念；除了实际构建索引之外，您还需要沟通变更计划及变更可能产生的影响。然后，您需要随时间跟踪变更。实施索引不仅仅是执行一个
  `CREATE INDEX` 语句。


  最后一个阶段完成后，索引方法 (`Indexing Method`) 重新从第一阶段开始。这样，索引就是一个持续循环的过程。今天提供最佳性能的索引可能不是明天最理想的索引。主要有两个事件导致需要随时间更改索引。首先是数据使用，应用程序的功能和特性可能随时间变化，因此应用程序的用途也可能改变。其次，数据量和分布可能（并且通常会）随时间变化。随着这些变化，索引可能不再被使用，而其他数据访问路径可能成为必需。数据变化并不是导致索引使用变化的唯一原因；未来
  `SQL Server` 版本或服务包中对查询优化器的更改也可能调整其使用索引的方式。


  现在索引方法 (`Indexing Method`) 的基础知识已经介绍完毕，本章的剩余部分将重点关注实施 (`Implement`) 部分。监控 (`Monitor`)
  和分析 (`Analyze`) 阶段的概念分别在第 15 章和第 16 章中介绍。重要的是，随着您对索引了解更多，将会发现可用于识别索引的新模式。随着您对索引和数据库的了解加深，您会找到其他查看性能和使用统计信息的方法，从而提供更多或更明智的指导。利用本书和您学到的信息，继续扩展您的索引方法学。


  ## 实施


  索引方法 (`Indexing Method`) 的最后阶段是实施 (`Implement`) 阶段。此阶段顾名思义：它实施通过分析 (`Analyze`) 阶段确定的必要索引更改。虽然此阶段不太复杂，但在实施
  (`Implement`) 阶段需要完成一些重要的步骤，这些步骤将有助于建立一个成功的流程。整个流程的目标是改善数据库环境的性能。基于此目标，在实施过程中需要考虑三个关键点：


  *   沟通

  *   源代码控制（例如，通过部署脚本）

  *   执行


  虽然只有最后一步会修改数据库，但其他两点有助于确保变更会被注意到，并且索引方法 (`Indexing Method`) 可以在未来继续使用。




  ## 沟通


  在修改任何数据库上的索引时，首要障碍是需要与管理层和数据库用户沟通您打算更改数据库的意图。对数据库的修改常常会引发警觉，尤其是当这些修改是由数据库所支持的应用程序的所有者之外的人员提出时。在应用程序所有者、数据库管理团队与开发团队之间建立并保持开放的沟通渠道，不仅有助于索引处理过程，也对其他共同关注的领域有益。缺乏这种沟通，团队可能会对索引更改措手不及，而这些更改可能会影响到分析未发现的内容，或影响到已计划但尚未发布的功能。


  就沟通而言，基本上有两项内容需要为数据库所有者准备好：索引更改的**影响分析**，以及更改实施后的**状态报告**。这类似于在设计、发布和测试新功能时所遵循的质量保证流程。


  ### 影响分析


  在为数据库索引变更做准备时，强调其对应用程序性能的预期影响非常重要。从历史上看，这有时可能像是一场猜测游戏。当时并没有太多容易获取的信息能够表明索引在何处被使用、如何被使用以及使用频率。


  借助`Monitor`阶段所阐述的流程，您能够自信地理解索引使用情况。您可以确定索引上次使用的时间以及包含了哪些操作。同时，也有信息可用于识别索引将不再被使用或使用频率正在增加的趋势。


  通过`Analyze`阶段，已阐述了可用于识别使用不同索引的执行计划的步骤。请利用这些步骤来识别索引更改将产生影响的位置，然后在索引更改实施前后，对`T-SQL`语句进行样本执行。


  最终，影响分析将对`Implement`阶段内的两个重要角色产生影响。首先，它会向管理者和同事传达索引更改的意图，告知他们所做的变更以供验证，并给予他们反馈的机会。其次，影响分析提供了一份保险策略，以防索引更改产生意外的负面影响。这并不是说糟糕的索引建议就不会带来负面后果，但如果有其他人参与其中且影响被记录在案，则更有可能快速减轻负面影响，甚至可能在该影响在生产环境中显现之前就予以化解。


  > 注意

  >

  > 在我工作过的一个环境中，一些使用频率较低的索引被从数据库中移除了。它们通常每天只被使用一次。但那唯一的一次使用，却是一个无法在没有这些索引的情况下执行的、对业务至关重要的导入过程。如果在移除这些索引之前进行了影响分析，许多棘手的问题本是可以避免的。


  ### 状态报告


  在`Implement`阶段的另一端是状态报告。顾名思义，状态报告是一份向管理者和同事反馈索引实际影响的文档。这份文档无需非常详尽，但需要涵盖一些关键点。状态报告应包含以下信息：


  *   所做的所有索引更改

  *   变更部署的状态

  *   简要的性能评估

  *   关于注意到的任何性能回退的信息

  *   在部署过程中获得的经验教训

  *   遇到问题的摘要


  撰写状态报告时，不要过于陷入细节。成功的索引部署将引导未来更多的`Monitor`和`Analyze`阶段。最终，状态报告需要传达两点。首先，它对索引部署的成功与失败提供了诚实的评估。其次，也是最重要的，它列出了索引更改目前正在实现哪些收益。这一点最为重要，因为它是管理者需要看到的投资回报率（`ROI`），以此来证明在索引上投入的时间和精力是合理的。


  > 注意

  >

  > 我作为顾问所做的最成功的事情之一，就是不断向客户更新我所做索引更改的影响。在我协助的一些团队看来，带有前后性能对比的图表常常像是“自我表扬”，但聘请我来的管理层却发现，这在识别聘请顾问的`ROI`，以及向上级沟通为解决业务性能问题所付出的努力方面，都极其有用。


  ## 部署脚本


  `Analyze`阶段的主要可交付成果是为您环境中数据库规划的索引更改列表。在`Implement`阶段，需要对这些索引进行审查并为部署做准备。作为索引部署准备工作的一部分，需要完成三个步骤：


  1.  准备模式的部署与回滚。

  2.  将索引更改保存到源代码控制中。

  3.  将同行评审结果连同影响分析一起分享。


  ### 准备模式的部署与回滚


  通常，在`Analyze`阶段完成时，您将拥有提议的索引更改列表。该列表在阶段结束时通常还不能直接用于部署。从那时点到执行更改之间，需要将索引更改调整至可用于部署的状态。


  在构建部署脚本时，请务必遵循“无害”（doing no harm）原则。换句话说，构建的脚本应该足够智能，能够多次执行并产生相同的结果。同时，这意味着应有可用的脚本来撤销任何已进行的索引更改。切勿假设表之前的索引状态已存储在源代码控制中。务必检查以确认现有状态是已知的，并开发脚本以便在需要时能回退到该状态。


  部署脚本还需要考虑所使用的`SQL Server`版本。例如，如果您使用的是`Enterprise Edition`，对于需要以新特性重建的索引，请利用`在线索引重建`功能。如果索引适用，`Enterprise
  Edition`还允许对索引进行压缩，这在许多情况下可以节省空间并提升性能。


  同样，请确保部署脚本的编写能最大限度地减少对生产系统的干扰。如果必须进行离线操作，请确保这些操作发生在受影响的应用程序可以接受这种干扰的时间段。对于会锁定表或导致阻塞的操作，也应考虑类似的指导原则。干扰较小的部署不仅对软件应用程序的影响更小，也更不可能对部署脚本所针对的数据库服务器造成运维问题。



  #### 将索引更改保存到源代码存储库


  表上索引的当前状态应存放在源代码存储库中。如果没有，那么在实施阶段的此次迭代中正是完成此项工作的绝佳机会。源代码存储库为数据库的代码或模式提供了一个存储位置，使组织能够确定索引、表或存储过程模式在特定日期和时间的状态。源代码通常从应用程序角度得到了良好管理。开发者通常会快速选择一种工具并将其用于自己的应用程序。


  源代码存储库允许对数据库模式进行时间点恢复。如果组织内有任何开发团队，他们很可能已经有期望的存储库。这可能是一个内部存储库，如 `Perforce`，或是一个外部可用的解决方案，如
  `GitHub`。


  #### 具有影响分析的同行评审


  在执行步骤之前要做的最后一件事是寻求对索引更改的同行评审。最糟糕的情况莫过于闭门造车，不理解针对使用数据库的应用程序所提出的更改的全部影响。很容易陷入只关注索引目标的隧道视野，而忽略了当前部署的业务目标，或者忽略了索引分析中不明显的东西。这种同行评审类似于软件开发团队使用的代码评审流程。如果您的团队已经有评审数据库脚本的同行评审流程，那么这一需求已经得到了满足。


  避免这些陷阱的最佳方法是找一位同行来评审索引更改。将索引部署脚本和影响分析带给同行，并一起过一遍这些更改。您的同行不一定需要了解环境的所有细节，只需对索引有基本了解即可。同行评审的目的是解释每一项更改。在这种对话中，当您解释索引需求时，您的同行可以充当共鸣板。这起到了双重作用。首先，您的同行能够对索引更改提供反馈。其次，通过讨论这些更改，您可能会听到自己描述某个索引更改时，觉得解释起来并不正确。


  在某些环境中，您可能没有可以求助来评审索引的同行。在这种情况下，可以考虑找您的经理进行同行评审。如果这也不可能，请与您的经理讨论利用您技术网络中的其他人。利用论坛和社交网络找到愿意与您一起评审更改的同行或同行小组。使用像
  `Twitter` 这样的社交网络与技术同行联系并评审一些索引更改，远胜于根本没有同行评审。


  同行评审完成后，索引就可以进入实施阶段的下一步：将索引应用到数据库的步骤。


  注意


  在 `SQL Server` 社区中，`Twitter` 是比较活跃的社交网络工具之一。使用标签 `#sql` 和 `#sqlserver` 可以查找关于 `SQL
  Server` 的常规信息。当寻找有关 `SQL Server` 的具体问题答案时，可以使用标签 `#sqlhelp`。`Twitter` 还允许您通过在推文中包含对方的
  Twitter 句柄来将人员加入对话。例如，本书的作者可以通过 Twitter 句柄 `@stratesql` 和 `@edwardpollack` 联系到。


  ### 执行


  实施阶段的最后部分是执行 `T-SQL` 脚本，这些脚本将把索引更改应用到数据库。这些脚本应该已经通过“部署脚本”步骤准备好，并且更改的范围也应通过“沟通”步骤被充分了解。因此，由于准备工作已经完成，“执行”步骤应该相对轻松。


  从执行的角度来看，执行的方式完全取决于您组织的变更控制流程。在某些环境中，存在自动化流程，脚本可以加载到部署机制并按计划执行。在其他环境中，管理员只需打开 `SQL
  Server Management Studio` 并执行每个脚本，直到所有更改完成。无论采用何种机制，关键在于索引得到部署。


  随着部署的进行，请务必记录所做的更改以及执行过程中出现的任何问题。注意数据库上意外的阻塞。如果索引是以离线状态部署的，请务必选择数据库维护窗口期间的执行时间窗口。请记住，即使是联机索引操作也可能导致短暂的阻塞。


  ## 重复


  在本章开头，讨论从审视索引方法的三个阶段开始。该过程的示意图（图 17-1）显示了三个阶段形成一个循环，每个阶段导向下一个阶段。这种布局选择是故意的。索引不是一项固定于一点的活动。一旦索引方法的第一轮完成，开始下一轮索引工作就很重要了。


  当数据库得到适当调优时，很容易让人想放松索引实践，转而关注其他优先事项。不幸的是，新功能添加到应用程序的频率，往往与新数据添加到数据库的频率一样高。这两类事件都会改变数据库使用索引的方式，以及当前“良好”索引状态的有效性。


  为了维持数据库平台的期望性能，必须持续评审索引。这并不是说总是需要分配一个全职资源来监控、分析和实施索引。但是，必须承认，需要在某个时间间隔完成对索引状态的评估。


  ## 总结


  正如本章所示，索引方法与科学方法非常相似。在数据库平台上，可以收集关于索引的统计信息，以识别可能存在索引问题的地方。然后，这些统计信息可进一步用于确定要修改的索引类型和位置。可以利用诸如
  `Database Engine Tuning Advisor` 和缺失索引 `DMO` 之类的索引工具来发现“唾手可得的成果”，为分析提供一个可能原本无法找到的开端。通过遵循索引方法中列出的各个阶段，您可以构建一个稳定、可重复的索引流程，帮助提高数据库平台的性能，并随时间推移实现稳定的性能。



  '
- '# 数据库索引与存储结构


  ## 索引基础概念


  ### 数据类型与存储


  数据库处理多种数据类型，包括结构化数据、半结构化数据和非结构化数据。大型对象（`LOBs`）的存储涉及特殊的页面类型。`varbinary(max)` 数据是一种常见的大型对象存储形式。


  数据库的物理存储单元是**页**（`Pages`）。页是数据存储的基本单位，大小通常为 `8 KB`。页的类型包括数据页、索引页、`LOB` 页、`GAM` 页、`SGAM`
  页、`PFS` 页、`DCM` 页和 `BCM` 页等。页的分配与组织构成了 `B-tree` 结构和堆结构。


  区（`Extents`）是页的集合，用于管理空间分配。区分为混合区和统一区。


  ### 索引结构


  索引是提升查询性能的关键物理设计结构（`PDSs`）。主要的索引类型包括：

  - **堆**（`Heaps`）：无聚集索引的表。

  - **聚集索引**（`Clustered indexes`）：将数据行存储在叶子层。

  - **非聚集索引**（`Non-clustered indexes`）：包含指向数据行的指针。

  - **列存储索引**（`Columnstore index`）：为数据分析工作负载优化。

  - **全文索引**（`Full-text index`）：用于全文搜索（`FTS`）。

  - **空间索引**（`Spatial index`）：用于地理空间数据类型，如 `GEOMETRY` 和 `GEography`。

  - **哈希索引**（`Hash index`）：内存优化表中使用。

  - **筛选索引**（`Filtered indexes`）：包含 `WHERE` 子句的索引。

  - **包含列索引**（`Included columns`）：在非聚集索引中添加非键列。

  - **索引视图**（`Indexed views`）：物化的视图。


  ## 索引类型与特性


  ### 聚集索引

  聚集索引决定了表中数据的物理存储顺序。每个表只能有一个聚集索引。其叶子节点包含数据行本身。设计时需考虑聚集键（`clustering key`）的选择，例如使用
  `GUID` 模式（属性为 `ever-increasing`）或标识列（`identity column`）模式。聚集索引有助于实现页的预排序（`pre-sorted
  pages`）。


  ### 非聚集索引

  非聚集索引包含索引键值和指向数据行的指针（`Forwarded record pointer`）。其结构包含一个背部指针（`Back pointer`）。非聚集索引支持多种模式：

  - **覆盖索引模式**（`Covering index pattern`）：通过包含列（`INCLUDE` 子句）避免键查找（`Key lookup`）。

  - **多列模式**（`Multiple column pattern`）：在多个列上创建索引。

  - **筛选索引模式**（`Filtered indexes pattern`）：使用 `WHERE` 子句索引部分数据。

  - **索引交集模式**（`Index intersection pattern`）：使用多个索引的交集。

  - **搜索列模式**（`Search columns pattern`）：针对 `WHERE` 子句中的列创建索引。


  非聚集索引的设计需要权衡，例如与聚集索引的对比（`*vs*. covering index patterns`）。


  ### 列存储索引

  列存储索引（`Columnstore structures`）适用于数据仓库和分析查询。它分为聚集列存储索引（`clustered`）和非聚集列存储索引（`non-clustered`）。其优势在于高效的压缩（`row/page/columnstore
  compression`）和批量加载（`minimally logged bulk load process`）。核心结构包括：

  - **行组**（`Row groups`）：数据的逻辑分段。

  - **删除位图**（`Delete bitmap`）：跟踪已删除的行。

  - **`deltastore`**：用于存储新插入或更新的行，直到它们被压缩到列存储中。


  ### 其他索引特性

  - **填充因子**（`Fill factor`）：控制页填充的程度，以减少页拆分（`Page splits`）。

  - **分区**（`Partitioning`）：将大表或索引分成更小的部分。

  - **唯一索引**（`Unique index`）：确保索引键的唯一性。

  - **主键**（`Primary keys`）：通常是聚集索引的候选键。


  ## 索引操作与维护


  ### 创建与修改

  索引的定义语言（`DDL`）包括：

  - `CREATE INDEX` 语句

  - `ALTER INDEX` 语句

  - `DROP INDEX` 语句


  创建索引时可以使用 `SORT_IN_TEMPDB` 选项。可恢复索引操作（`resumable index operations`）可通过 `sys.index_resumable_operations`
  监控。


  ### 碎片整理

  索引碎片（`Fragmentation`）会影响 `I/O` 性能。碎片类型包括内部碎片和外部碎片。维护操作包括：

  - **重新组织**（`Reorganize`）：在线操作，清理页碎片。

  - **重新生成**（`Rebuild`）：可以联机或脱机进行，创建新的索引副本。在维护计划中，可以使用 `Reorganize Index Task` 和 `Rebuild
  Index Task`。


  ### 填充操作

  大容量加载（`Bulk-loading`）操作（如 `BULK_LOGGED` 恢复模型下的操作）可能产生碎片。数据加载和更新（`UPDATE operation`）操作也会导致页拆分和转发记录（`Forwarded
  record process`）。


  ## 统计与监控


  ### 统计信息

  统计信息（`Statistics`）是查询优化器的依据。包括列级统计信息（`Column-level statistics`）和索引统计信息。统计信息包含直方图（`Histogram`）、密度向量（`Density
  vector`）等。

  - **创建与更新**：可以自动创建（`auto-update`）或手动更新（`Update Statistics` 命令）。对于内存优化表（`Memory-optimized
  tables`），统计信息需要单独管理。

  - **查看命令**：`DBCC SHOW_STATISTICS`。

  - **相关函数**：`STATISTICS_DATE` 函数。

  - **相关 `DMO`**：`sys.dm_db_stats_properties`, `sys.dm_db_stats_histogram`, `sys.dm_db_incremental_stats_properties`。


  ### 系统视图与动态管理对象（`DMOs`）

  监控和发现索引及统计信息依赖于系统视图和 `DMOs`。


  **关键目录视图**：

  - `sys.indexes`

  - `sys.index_columns`

  - `sys.columns`

  - `sys.dm_db_index_physical_stats`

  - `sys.dm_db_index_usage_stats`

  - `sys.dm_db_index_operational_stats`

  - `sys.foreign_key_columns`

  - `sys.dm_db_missing_index_details`

  - `sys.dm_db_stats_properties`


  **操作统计信息**：通过 `sys.dm_db_index_operational_stats` 可以查看 `I/O` 统计信息、闩锁争用（`latch contention`）、锁争用（`locking
  contention`）和 `LOB` 访问情况。关键列包括 `leaf_ghost_count`, `forwarded_fetch_count`, `range_scan_count`,
  `singleton_lookup_count`, `page_lock_count`, `row_lock_count`, `page_latch_wait_count`
  等。


  **使用情况统计信息**：通过 `sys.dm_db_index_usage_stats` 可以查看用户查找（`user_lookups`）、用户扫描（`user_scans`）、用户搜索（`user_seeks`）等操作，帮助识别未使用的索引。


  ### 性能监控

  监控索引和查询性能涉及多种 `DMVs` 和性能计数器（`Performance counters`）。


  **关键性能计数器**（通过 `sys.dm_os_performance_counters` 或 `Performance Monitor`）：

  - `Page Life Expectancy/sec (PLE)`

  - `Buffer cache hit ratio`

  - `Page lookups/sec`

  - `Page reads/sec`

  - `Page writes/sec`

  - `Full Scans/sec`

  - `Index Searches/sec`

  - `Page Splits/sec`

  - `Lock Waits/sec`

  - `Lock Wait Time`

  - `Deadlocks/sec`


  **等待统计信息**：通过 `sys.dm_os_wait_stats` 分析性能瓶颈，常见等待类型包括 `PAGEIOLATCH_*`, `LCK_M_*`,
  `CXPACKET`, `CXCONSUMER` 等。


  **碎片统计信息**：使用 `sys.dm_db_index_physical_stats` 获取碎片化统计信息，列包括 `avg_fragmentation_in_percent`,
  `fragment_count`, `avg_fragment_size_in_pages`。


  ## 最佳实践与工具


  ### 索引设计最佳实践

  - 分析当前工作负载（`current workload`）。

  - 合理设置填充因子（`fill factors`）。

  - 考虑数据库级和索引级设置。

  - 审视主键和索引策略。


  ### 工具

  - **数据库引擎优化顾问（`DTA`）**：用于分析工作负载并提供索引和统计信息建议。

  - **查询存储（`Query Store`）**：跟踪查询执行历史、等待统计信息和性能变化，用于识别回归和优化查询。

  - **扩展事件（`Extended Events`）**：用于生产环境下的活动监控，比 `SQL Trace` 更轻量高效。一个关键会话示例是 `Waitstats`
  分析。

  - **`SQL Trace`**：传统跟踪工具，使用 `sp_trace_set`, `sp_trace_setfilter`, `sp_trace_setstatus`
  等存储过程管理。

  - **`T-SQL` 脚本**：广泛用于索引分析、维护和监控。例如，查询 `sys.dm_db_index_physical_stats` 来分析碎片，或运行
  `DBCC IND` 和 `DBCC PAGE` 来深入检查页结构。


  ### 重要命令与函数

  - `DBCC` 命令：`DBCC SHOW_STATISTICS`, `DBCC IND`, `DBCC PAGE`, `DBCC EXTENTINFO`。

  - 统计信息函数：`STATISTICS_DATE`。

  - 新序列函数：`NEWID()`, `NEWSEQUENTIALID()`。

  - 全文属性函数：`FULLTEXTCATALOGPROPERTY`。

  - 空间方法：`MakeValid()`, `STDistance()`。

  - 智能查询处理（`IQP`）相关功能。


  ### 最小日志记录与恢复

  `BULK_LOGGED` 恢复模型允许最小日志记录（`Minimally Logged (ML)`）操作，可以提升大容量加载性能，但会增加事务日志备份的大小。


  ### 压缩技术

  页压缩（`Page compression`）和行压缩（`Row compression`）可以减少存储空间占用，提升 `I/O` 性能，但会增加 `CPU`
  开销。压缩通过字典编码（`Dictionary encoding`）和前缀压缩（`Prefix compression`）实现。

