  添加非聚集索引后的 UPDATE 碎片化结果\n\n此时，需要修改一些键值。使用清单 11-9，对表执行 `UPDATE` 操作，每九行更新一行。为了模拟更改键值，`UPDATE`\
  \ 语句反转了列中的字符。这么少量的活动足以导致大量的碎片化。如图 11-8 的结果所示，非聚集索引从没有碎片变成了超过 30% 的碎片。\n\n需要注意的一点是，聚集索引上的碎片没有随着这些更新而改变。并非所有更新都会导致碎片化。只有那些因为记录当前存储的页面上空间不足而导致数据移动的更新才会产生碎片化。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nUPDATE dbo.UpdateOperations\nSET Name = REVERSE(Name)\n\
  WHERE RowID % 9 = 1\n```\n\n清单 11-9\n\n用于更改索引键值的 UPDATE 操作\n\n![图 11-8：更改索引键值后的\
  \ UPDATE 碎片化结果。两个非聚集索引的平均碎片率分别为 29.45% 和 66.67%。](img/338675_4_En_11_Fig8_HTML.png)\n\
  \n图 11-8\n\n更改索引键值后的 UPDATE 碎片化结果\n\n#### 删除操作\n\n导致碎片化的第三种操作类型是 `DELETE` 操作。删除操作在性质上有些不同，因为它是在数据库内部产生碎片化。它不是因为页拆分而重定位页，而是可能导致页从索引中被移除。随后，索引页的物理序列中就会出现间隙。由于页不再物理连续，它们就被认为是碎片化的。这一点很重要，因为一旦页从索引中被释放，它们就可以被重新分配给其他索引，从而构成一种更传统的碎片化形式。\n\
  \n为了演示这种行为，请创建一个表，填充一些记录，然后添加一个聚集索引。完成这些任务的脚本如代码清单 11-10 所示。运行该脚本，然后运行代码清单 11-11\
  \ 的脚本来获取聚集索引当前的碎片化情况。结果应与图 11-9 中的匹配。平均碎片化（百分比）列 (`avg_fragmentation_in_percent`)\
  \ 显示当前索引中没有碎片化。\n\n![图 11-9](img/338675_4_En_11_Fig9_HTML.png)\n\n*一个表格有 9 列和 2\
  \ 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。两个聚集索引的平均碎片化均为\
  \ 0。*\n\n**图 11-9** DELETE 操作前的碎片化结果\n\n```sql\n代码清单 11-11 查看 DELETE 索引碎片化情况\nUSE\
  \ AdventureWorks2017\nGO\nSELECT index_type_desc\n,index_depth\n,index_level\n,page_count\n\
  ,record_count\n,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent\n\
  ,fragment_count\n,avg_fragment_size_in_pages\n,CAST(avg_page_space_used_in_percent\
  \ as DECIMAL(6,2)) as avg_page_space_used_in_percent\nFROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID('dbo.DeleteOperations'),NULL,NULL,'DETAILED')\n\
  ```\n\n```sql\n代码清单 11-10 创建用于 DELETE 操作的表\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.DeleteOperations')\
  \ IS NOT NULL\nDROP TABLE dbo.DeleteOperations;\nCREATE TABLE dbo.DeleteOperations\n\
  (\nRowID int IDENTITY(1,1)\n,Name sysname\n,JunkValue varchar(2000)\n);\nINSERT\
  \ INTO dbo.DeleteOperations (Name, JunkValue)\nSELECT name, REPLICATE('X', 1000)\n\
  FROM sys.columns\nCREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.DeleteOperations(RowID);\n\
  ```\n\n为了演示由 `DELETE` 操作引起的碎片化，将使用代码清单 11-12 中的代码删除表中每隔 50 条记录。和之前一样，将使用代码清单 11-11\
  \ 来查看索引中碎片化的状态。结果如图 11-10 所示，表明 `DELETE` 操作导致了大约 13% 的碎片化。对于 `DELETE` 操作，碎片化的产生速度通常不会太快。此外，由于碎片化不是页拆分的结果，页的顺序在物理上不会变得无序。相反，在连续的页之间会出现间隙。但是，留空的页可能会在未来的\
  \ `INSERT` 和 `UPDATE` 事务中被重用，这可能导致页在物理上变得无序。\n\n![图 11-10](img/338675_4_En_11_Fig10_HTML.png)\n\
  \n*一个表格有 9 列和 2 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。平均碎片化为\
  \ 12.42%。*\n\n**图 11-10** DELETE 操作后的碎片化结果\n\n```sql\n代码清单 11-12 执行 DELETE 操作\n\
  USE AdventureWorks2017\nGO\nDELETE dbo.DeleteOperations\nWHERE RowID % 100 BETWEEN\
  \ 1 AND 50\n```\n\n请注意，由删除操作产生的碎片化可能不会在执行 `DELETE` 操作后立即显现。当记录要被删除时，它们首先被标记为删除，然后才实际删除记录本身。在标记为删除期间，该记录被视为幽灵记录。在此阶段，记录在逻辑上已被删除，但在物理上仍存在于索引中。在未来的某个时间点，在事务提交并完成\
  \ `CHECKPOINT` 之后，清除幽灵记录进程将物理删除该行。此时，索引中的碎片化将变得可见。\n\n\n## 收缩操作\n\n最后一种可能导致碎片化的操作是收缩数据库。可以使用\
  \ `DBCC SHRINKDATABASE` 或 `DBCC SHRINKFILE` 来收缩数据库。这些操作用于收缩数据库或其文件的大小。使用它们时，数据文件末尾的页面会被重新定位到数据文件的开头。就其预期目的而言，收缩操作可以是有效的工具。\n\
  \n不幸的是，这些收缩操作并不考虑被移动数据页面的性质。对于收缩操作来说，一个数据页面就是一个数据页面。该操作的优先级是让数据文件末尾的页面在文件开头找到位置。如前所述，当索引的页面在物理上未按顺序存储时，索引就被认为是碎片化的。\n\
  \n为了演示收缩操作可能导致的碎片化损害，将创建一个数据库并对其执行收缩操作。相关代码见代码清单 11-13。在此示例中，有两个表：`FirstTable` 和\
  \ `SecondTable`。将向每个表插入一些记录。插入操作将交替进行，向 `FirstTable` 插入三条，再向 `SecondTable` 插入两条。通过这些插入操作，分配给两个表的页面将形成交替的条带。接下来，将删除\
  \ `SecondTable`，这将导致在 `FirstTable` 的每个页面条带之间出现未分配的数据页面。使用代码清单 11-14 将显示 `FirstTable`\
  \ 上存在少量碎片，如图 11-11 所示。\n\n![](img/338675_4_En_11_Fig11_HTML.png)\n\n图 11-11：插入操作后\
  \ FirstTable 的碎片化情况\n\n```\nUse Fragmentation\nGO\nSELECT index_type_desc\n,index_depth\n\
  ,index_level\n,page_count\n,record_count\n,CAST(avg_fragmentation_in_percent as\
  \ DECIMAL(6,2)) as avg_fragmentation_in_percent\n,fragment_count\n,avg_fragment_size_in_pages\n\
  ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent\n\
  FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID('dbo.FirstTable'),NULL,NULL,'DETAILED')\n\
  ```\n\n代码清单 11-14：查看由收缩导致的索引碎片化\n\n```\nUSE master\nGO\nIF EXISTS (SELECT * FROM\
  \ sys.databases WHERE name = 'Fragmentation')\nDROP DATABASE Fragmentation\nGO\n\
  CREATE DATABASE Fragmentation\nGO\nUse Fragmentation\nGO\nIF OBJECT_ID('dbo.FirstTable')\
  \ IS NOT NULL\nDROP TABLE dbo.FirstTable;\nCREATE TABLE dbo.FirstTable\n(\nRowID\
  \ int IDENTITY(1,1)\n,Name sysname\n,JunkValue varchar(2000)\n,CONSTRAINT PK_FirstTable\
  \ PRIMARY KEY CLUSTERED (RowID)\n);\nINSERT INTO dbo.FirstTable (Name, JunkValue)\n\
  SELECT TOP 750 name, REPLICATE('X', 2000)\nFROM sys.columns\nIF OBJECT_ID('dbo.SecondTable')\
  \ IS NOT NULL\nDROP TABLE dbo.SecondTable;\nCREATE TABLE dbo.SecondTable\n(\nRowID\
  \ int IDENTITY(1,1)\n,Name sysname\n,JunkValue varchar(2000)\n,CONSTRAINT PK_SecondTable\
  \ PRIMARY KEY CLUSTERED (RowID)\n);\nINSERT INTO dbo.SecondTable (Name, JunkValue)\n\
  SELECT TOP 750 name, REPLICATE('X', 2000)\nFROM sys.columns\nGO\nINSERT INTO dbo.FirstTable\
  \ (Name, JunkValue)\nSELECT TOP 750 name, REPLICATE('X', 2000)\nFROM sys.columns\n\
  GO\nINSERT INTO dbo.SecondTable (Name, JunkValue)\nSELECT TOP 750 name, REPLICATE('X',\
  \ 2000)\nFROM sys.columns\nGO\nINSERT INTO dbo.FirstTable (Name, JunkValue)\nSELECT\
  \ TOP 750 name, REPLICATE('X', 2000)\nFROM sys.columns\nGO\nIF OBJECT_ID('dbo.SecondTable')\
  \ IS NOT NULL\nDROP TABLE dbo.SecondTable;\nGO\n```\n\n代码清单 11-13：收缩操作数据库准备\n\n\
  数据库准备好后，下一步是收缩数据库。目的是回收原本分配给 `SecondTable` 的空间，并将数据库大小缩减到仅需的大小。要执行收缩操作，请使用代码清单 11-15\
  \ 中的代码。当 `SHRINKDATABASE` 操作完成时，图 11-12 将显示，运行代码清单 11-14 中的代码会使索引的碎片化从略高于 2%增加到超过\
  \ 35%。这是一个仅包含单个表的数据库上碎片化程度的显著变化。试想一下，对一个拥有几十个、几百个或几千个索引的数据库执行收缩操作的影响。\n\n![](img/338675_4_En_11_Fig12_HTML.png)\n\
  \n图 11-12：收缩操作后 FirstTable 的碎片化情况\n\n```\nDBCC SHRINKDATABASE (Fragmentation)\n\
  ```\n\n代码清单 11-15：收缩操作\n\n这只是一个关于收缩操作可能对索引造成碎片化损害的简单示例。即使在这个例子中也很明显，收缩操作导致了大量碎片。大多数\
  \ SQL Server 数据库管理员都会同意，收缩操作在任何数据库上都应该是极其罕见的操作。一些数据库管理员认为，出于任何原因都不应在任何数据库上使用此操作。最常被推荐的准则是，在执行数据库收缩操作时要极其谨慎。最危险的模式是采用一种循环：收缩数据库以回收空间\
  \ -> 导致碎片化 -> 然后通过碎片整理索引来扩展数据库。这构成了对时间和资源的浪费，而这些资源本可以更好地用于解决实际的性能和维护问题。\n\n关于收缩操作的另一个重要注意事项是，大多数繁忙的生产表会随着时间的推移而增长。如果是这种情况，那么收缩数据库只能为未来的必然增长提供暂时的缓解。因此，收缩操作应仅用于回收的空间量远大于其可能导致的任何碎片的场景。\n\
  \n## 碎片化的变体\n\n传统上，在讨论索引碎片时，主要关注的是聚集索引或非聚集索引内部的碎片化。在评估索引碎片化时，这并不是唯一需要考虑的因素。考虑表或索引是否存在臃肿、转发或分段也是有价值的，这些都是索引碎片化概念的变体。在本节中，将回顾表上可能需要进行碎片化类型维护的另外两个领域：\n\
  \n*   堆表臃肿与转发\n\n*   列存储碎片化\n\n\n\n### 堆膨胀与记录转发\n\n#### 堆膨胀\n\n如第 3 章所述，堆是无序页面的集合，用于存储表的数据。随着新行添加到表中，堆会随着新页的分配而增长。插入和更新操作可能导致堆发生变化，从而需要对表进行维护。\n\
  \n首先，我们将回顾堆内部的膨胀现象。对于堆而言，当记录从堆中删除且未被新记录重用时，就会发生膨胀。如第 10 章所讨论的，这并非记录移动到新页面的问题，而是表中记录总数的下降。页面会被重用，但当它们未被重用时，页面会保持分配状态，这可能对性能产生影响。\n\
  \n为了演示这一活动，将使用代码清单 11-16 中的脚本。此脚本从一个已插入 400 条记录的堆表开始。接着，删除一半的记录，表中剩余 200 条。如图 11-13\
  \ 所示，表的记录数反映了这些变化，但在两种情况下，DMV 结果都显示与该表关联的页面有 100 个。这是因为除非维护活动强制执行，否则页面不会从堆中移除。通过使用`REBUILD`选项对`dbo.HeapTable`执行`ALTER\
  \ TABLE`语句，表被重建，多余的页面被清除。\n\n![](img/338675_4_En_11_Fig13_HTML.png)\n\n3 个具有 5 列表头的表格。表头分别为：无列名、索引类型降序、页数、记录数和转递记录数，及其在\
  \ 6 行中的对应值。3 个表的记录数分别为 400、200 和 200。\n\n图 11-13\n\n从堆中删除操作的结果\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nIF OBJECT_ID('dbo.HeapTable') IS NOT NULL\nDROP TABLE dbo.HeapTable;\nCREATE\
  \ TABLE dbo.HeapTable\n(\nRowId INT IDENTITY(1,1)\n,FillerData VARCHAR(2500)\n);\n\
  INSERT INTO dbo.HeapTable (FillerData)\nSELECT TOP 400 REPLICATE('X',2000)\nFROM\
  \ sys.objects;\nSELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count,\
  \ forwarded_record_count\nFROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID('dbo.HeapTable'),NULL,NULL,'DETAILED');\n\
  SET STATISTICS IO ON;\nSELECT COUNT(*) FROM dbo.HeapTable;\nSET STATISTICS IO OFF;\n\
  DELETE FROM dbo.HeapTable\nWHERE RowId % 2 = 0;\nSELECT OBJECT_NAME(object_id),\
  \ index_type_desc, page_count, record_count, forwarded_record_count\nFROM sys.dm_db_index_physical_stats\
  \ (DB_ID(),OBJECT_ID('dbo.HeapTable'),NULL,NULL,'DETAILED');\nSET STATISTICS IO\
  \ ON;\nSELECT COUNT(*) FROM dbo.HeapTable;\nSET STATISTICS IO OFF;\nALTER TABLE\
  \ dbo.HeapTable REBUILD;\nSELECT OBJECT_NAME(object_id), index_type_desc, page_count,\
  \ record_count, forwarded_record_count\nFROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID('dbo.HeapTable'),NULL,NULL,'DETAILED');\n\
  SET STATISTICS IO ON;\nSELECT COUNT(*) FROM dbo.HeapTable;\nSET STATISTICS IO OFF;\n\
  ```\n\n代码清单 11-16\n删除操作对堆页面分配的影响\n\n为了强调页面仍在表中，图 11-14 展示了在计算表中所有行时读取的页面，进一步证明了有\
  \ 100 个页面正在被访问。在考虑删除操作后对堆性能的影响时，堆中页面数量相对于数据量过多，会增加 SQL Server 执行针对其的查询所需的工作量。在此演示案例中，`COUNT(*)`查询处理的数据量是实际所需数据量的两倍。\n\
  \n![](img/338675_4_En_11_Fig14_HTML.png)\n\n一个输入输出页面，包含 3 行数据。每行有一个表、堆表、扫描计数 1、逻辑读取\
  \ 100、物理读取 0、预读取 0 和大对象逻辑读取 0，但第 3 行的逻辑读取为 50。\n\n图 11-14\n\n删除操作对堆的 I/O 影响\n\n\
  #### 记录转发\n\n堆维护的另一个考虑领域是表中的转递记录数量。转递记录在第 3 章中讨论过，指的是堆中不再适合其最初添加位置的记录。为了适应记录大小的变化，该记录被存储在另一个页面上，并且之前的记录位置包含一个指向新位置的指针。\n\
  \n这种变化的影响是增加了堆中的页面数量，因为为现有记录添加了新页面，并且在查找记录时，需要额外的一次 I/O 操作从第一页跳转到转递页。虽然这看起来可能不是一个严重问题，但累积起来，转递记录的累积影响增加了系统的\
  \ I/O 量，并增加了查询执行的延迟。\n\n为了演示转递记录对查询的影响，请执行代码清单 11-17 中的代码。此脚本创建一个包含堆的表，运行一系列查询，更新记录以导致堆记录转发发生，然后通过重新执行之前的查询集合来完成。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nSET NOCOUNT ON\nIF OBJECT_ID('dbo.ForwardedRecords')\
  \ IS NOT NULL\nDROP TABLE dbo.ForwardedRecords;\nCREATE TABLE dbo.ForwardedRecords\n\
  (\nID INT IDENTITY(1,1)\n,VALUE VARCHAR(8000)\n);\nCREATE NONCLUSTERED INDEX IX_ForwardedRecords_ID\
  \ ON dbo.ForwardedRecords(ID);\nINSERT INTO dbo.ForwardedRecords (VALUE)\nSELECT\
  \ REPLICATE(type, 500)\nFROM sys.objects;\nSET STATISTICS IO ON\nPRINT '*** No forwarded\
  \ records'\nSELECT * FROM dbo.ForwardedRecords;\nSELECT * FROM dbo.ForwardedRecords\n\
  WHERE ID = 40;\nSELECT * FROM dbo.ForwardedRecords\nWHERE ID BETWEEN 40 AND 60;\n\
  SET STATISTICS IO OFF\nUPDATE dbo.ForwardedRecords\nSET VALUE =REPLICATE(VALUE,\
  \ 16)\nWHERE ID%3 = 1;\nSET STATISTICS IO ON\nPRINT '*** With forwarded records'\n\
  SELECT * FROM dbo.ForwardedRecords;\nSELECT * FROM dbo.ForwardedRecords\nWHERE ID\
  \ = 40;\nSELECT * FROM dbo.ForwardedRecords\nWHERE ID BETWEEN 40 AND 60;\nSET STATISTICS\
  \ IO OFF\n```\n\n代码清单 11-17\n转递记录对查询性能的影响\n\n代码清单 11-17 中包含三个查询，用以演示转递记录对堆的影响：\n\
  \n*   `SELECT *`：用以演示索引扫描的影响\n*   带等值谓词的`SELECT *`：用以演示对单例查找的影响\n*   带不等值谓词的`SELECT\
  \ *`：用以演示对范围查找的影响\n\n对于`SELECT *`查询，在堆中存在转递记录之前，查询以 99 次读取执行，如图 11-15 所示。引入转递记录后，读取次数增加到\
  \ 561 次。这种增加是因为为适应行大小的增加而向堆中添加了新页面。对于第二个查询，单例查找从 3 次读取增长到 4 次读取，这代表了从记录的原始位置跳转到转递位置所需的一次额外读取。在最后一个查询中，带查找的范围查询以\
  \ 23 次读取执行，但在将转递记录添加到表后，读取次数跃升至 30 次。\n\n![](img/338675_4_En_11_Fig15_HTML.png)\n\
  \n两个输入输出统计页面：无转递记录和有转递记录。每条记录包含三行数据，数据如下：表、转递记录、扫描计数、逻辑读取和物理读取。1. 逻辑读取分别为 99、3、23。2.\
  \ 逻辑读取分别为 561、4、30。\n\n图 11-15\n\n转递记录查询的 I/O 统计\n\n\n转发记录的整体效应是增加了读取次数。虽然单次查询的增加可能并不显著，但长期累积的影响不容忽视。包含转发记录的堆扫描需要访问更多页面，而查找操作则需要额外的\
  \ I/O。减少堆中转发记录的影响，是维护索引和优化性能的重要一环。\n\n### 列存储碎片化\n\n列存储索引的运作方式与标准行存储索引（聚集、非聚集和堆）大相径庭。列存储索引一个有趣的特点是其段的只读性质。正如第\
  \ 2 章所讨论的，对列存储索引的小型插入将由 `deltastore` 处理，随后异步合并到压缩后的 `行组` 中。此外，删除操作以软删除方式处理。行被标记为已删除，但不会立即移除，导致段中包含不再属于表的数据。\n\
  \n为了演示这些概念，请执行清单 11-18 中的代码来准备一个包含聚集列存储索引的表。表创建后，插入两组行。第一组包含 1,000 行，索引被重组以强制该行组压缩为列存储格式。第二组包含\
  \ 105,000 行，超过了 102,400 行的阈值，这会导致行自动直接插入到压缩行组中。图 11-16 显示插入的记录被直接压缩为列存储格式。\n\n![](img/338675_4_En_11_Fig16_HTML.png)\n\
  \n一个表有 10 列和 10 行。列标题为 `object_id`、`index_id`、`partition_number`、`row_group_id`、`delta_store_hobt_id`、`state`、`state_description`、`total_rows`、`deleted_rows`\
  \ 和 `size_in_bytes`。其中 7 行具有压缩行组。\n\n**图 11-16**  \n列存储行组结果集\n\n**注意**  \n根据您的环境，清单\
  \ 11-18 中的脚本可能需要运行一段时间。\n\n```sql\nUSE ContosoRetailDW\nGO\nIF OBJECT_ID('dbo.FactOnlineSalesCI')\
  \ IS NOT NULL\nDROP TABLE dbo.FactOnlineSalesCI\nCREATE TABLE dbo.FactOnlineSalesCI(\n\
  \    [OnlineSalesKey] [int] NOT NULL,\n    [DateKey] [datetime] NOT NULL,\n    [StoreKey]\
  \ [int] NOT NULL,\n    [ProductKey] [int] NOT NULL,\n    [PromotionKey] [int] NOT\
  \ NULL,\n    [CurrencyKey] [int] NOT NULL,\n    [CustomerKey] [int] NOT NULL,\n\
  \    [SalesOrderNumber] nvarchar NOT NULL,\n    [SalesOrderLineNumber] [int] NULL,\n\
  \    [SalesQuantity] [int] NOT NULL,\n    [SalesAmount] [money] NOT NULL,\n    [ReturnQuantity]\
  \ [int] NOT NULL,\n    [ReturnAmount] [money] NULL,\n    [DiscountQuantity] [int]\
  \ NULL,\n    [DiscountAmount] [money] NULL,\n    [TotalCost] [money] NOT NULL,\n\
  \    [UnitCost] [money] NULL,\n    [UnitPrice] [money] NULL,\n    [ETLLoadID] [int]\
  \ NULL,\n    [LoadDate] [datetime] NULL,\n    [UpdateDate] [datetime] NULL\n)\n\
  INSERT INTO dbo.FactOnlineSalesCI\nSELECT *\nFROM dbo.FactOnlineSales\nCREATE CLUSTERED\
  \ COLUMNSTORE INDEX FactOnlineSalesCI_CCI ON dbo.FactOnlineSalesCI\nDECLARE @we\
  \ int= 1\nWHILE @we <= 5\nBEGIN\n    INSERT INTO dbo.FactOnlineSalesCI\n    SELECT\
  \ TOP 1000 *\n    FROM dbo.FactOnlineSales\n    ALTER INDEX ALL ON dbo.FactOnlineSalesCI\
  \ REORGANIZE\n    WITH (COMPRESS_ALL_ROW_GROUPS =ON)\n    SET @we += 1\nEND\nWHILE\
  \ @we <= 10\nBEGIN\n    INSERT INTO dbo.FactOnlineSalesCI\n    SELECT TOP 105000\
  \ *\n    FROM dbo.FactOnlineSales\n    SET @we += 1\nEND\nSELECT*\nFROM sys.column_store_row_groups\n\
  WHERE object_id=OBJECT_ID('dbo.FactOnlineSalesCI')\nORDER BY row_group_id DESC\n\
  ```\n\n**清单 11-18**  \n准备列存储表\n\n此时有趣的一点是，创建的行组远小于行组的最大大小（约 100 万行）。由于它们较小，可能有机会通过增加每个行组的记录数来优化它们使用的页数。这可以通过重建列存储索引来完成。为了说明重建列存储索引的价值，请执行清单\
  \ 11-19 中的代码。该代码显示，重建前的逻辑读取次数在两次扫描操作中为 83,423，然后在重建后降至 833 次逻辑读取，如图 11-17 所示。这是访问页面数量的大幅下降。在考虑对使用列存储索引的大型事实表进行此类维护的影响时，这种过度的页面分配将极大地影响性能。此外，对比图\
  \ 11-16 和图 11-18，表的行组数量也从重建列存储索引前的 34 个大幅减少到 14 个。\n\n![](img/338675_4_En_11_Fig18_HTML.png)\n\
  \n一个表有 10 列和 10 行。列标题为 `object_id`、`index_id`、`partition_number`、`row_group_id`、`delta_store_hobt_id`、`state`、`state_description`、`total_rows`、`deleted_rows`\
  \ 和 `size_in_bytes`。所有行的增量存储和状态描述分别为 null 和 compressed。\n\n**图 11-18**  \n列存储索引重建后的行组统计信息\n\
  \n![](img/338675_4_En_11_Fig17_HTML.png)\n\n一个输入输出统计信息页面展示了如何重建列存储表，影响了 1096 行数据，并附有警告文本，提示因为使用了本地联接提示，已强制执行联接顺序。`LOB`\
  \ 逻辑读取从 83423 次下降到 833 次。\n\n**图 11-17**  \n列存储表插入操作的 I/O 统计信息\n\n```sql\nUSE ContosoRetailDW\n\
  GO\nSET STATISTICS IO ON\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\n\
  GROUP BY DateKey\nALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD\nSELECT DateKey,COUNT(*)\n\
  FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nSET STATISTICS IO OFF\nSELECT *\n\
  FROM sys.column_store_row_groups\nWHERE object_id = OBJECT_ID('dbo.FactOnlineSalesCI')\n\
  ORDER BY row_group_id DESC\n```\n\n**清单 11-19**  \n插入操作对列存储表的影响\n\n列存储索引发生的另一种类型的碎片化是通过删除操作。虽然这被称为\
  \ *碎片化*，但当在列存储索引上执行删除时，行并未从索引中移除。相反，它们被标记为已删除，并继续在行组内占用空间。因此，分配给聚集列存储索引的页面，即使其所有记录都被删除，仍然会在索引中保持活动状态。\n\
  \n为了说明列存储索引中软删除行的影响，将使用清单 11-20 中的脚本从表中删除 2007 年的数据。然后，另一条语句将重建列存储索引。在这些操作之间，将执行一个聚合查询，以提供分析操作来衡量删除操作对查询\
  \ I/O 的影响。\n\n```sql\nUSE ContosoRetailDW\nGO\nSET STATISTICS IO ON\nSELECT DateKey,COUNT(*)\n\
  FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nDELETE FROM dbo.FactOnlineSalesCI\n\
  WHERE DateKey <'2008-01-01'\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\n\
  GROUP BY DateKey\nALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD\nSELECT DateKey,COUNT(*)\n\
  FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nSET STATISTICS IO OFF\n```\n\n**清单\
  \ 11-20**  \n对聚集列存储索引的删除操作\n\n\n运行这些查询并重建索引后，最终的性能数字将显示出相当显著的提升。执行第一个查询时，聚合查询会产生\
  \ 659 次逻辑读取，如图 11-19 所示。删除一年的数据后，聚合查询需要 79,982 次逻辑读取，这比返回行数减少 365 行的原始查询还要多。这是因为管理已删除行需要额外的页面。重建索引后，I/O\
  \ 降至仅 444 次逻辑读取。\n\n![](img/338675_4_En_11_Fig19_HTML.png)\n\n一个输入输出统计页面展示了如何进行删除操作演示，包括受影响的行数数据以及高亮显示的\
  \ `lob 逻辑读取` 数据。5 个查询的 `lob 逻辑读取` 分别为 370、289、370、79612 和 444。\n\n图 11-19：删除操作演示的统计\
  \ I/O 结果\n\n通过新增行和删除现有行，有理由考虑列存储索引的维护需求。影响这些索引的问题与传统聚集索引的问题不尽相同，但它们同样重要。\n\n###\
  \ 碎片问题\n\n这些演示展示了许多索引可能产生碎片的方式，但尚未讨论其重要性。索引内部的碎片可能成为问题，有几个重要原因：\n\n*   索引 I/O\n\
  *   连续读取\n\n随着索引碎片的增加，这两个方面都会影响索引的性能表现。在某些最坏的情况下，碎片化程度可能非常严重，以至于查询优化器将在查询计划中停止使用该索引。\n\
  \n#### 索引 I/O\n\nI/O 是 SQL Server 中容易出现性能瓶颈的领域。同样，也有多种解决方案可以帮助缓解这些瓶颈。从本章的角度出发，主要关注点将是碎片对\
  \ I/O 的影响。\n\n由于页拆分通常是碎片产生的原因，它们为研究碎片对 I/O 影响提供了一个很好的起点。回顾一下，当发生页拆分时，页面上一半的内容会被移出到另一个页面上。如果原始页面是\
  \ 100%满的，那么得到的两个页面都将大约 50%满。本质上，从存储中读取相同数量的信息现在需要两次 I/O，而在页拆分之前只需要一次 I/O。这种 I/O\
  \ 的增加会推高读写次数，从而对性能产生负面影响。\n\n为了验证碎片对 I/O 的影响，将提供另一个碎片示例。这次将构建一个表，填充数据，并进行更新以产生页拆分和碎片。代码清单\
  \ 11-22 将执行这些操作。脚本的最后一部分将查询 `sys.dm_db_partition_stats` 以返回为索引保留的页面数。执行代码清单 11-21\
  \ 中的碎片脚本。这将显示此时索引的碎片率超过 99%。代码清单 11-21 的结果显示索引使用了 209 个页面。结果见图 11-20。\n\n![](img/338675_4_En_11_Fig20_HTML.jpg)\n\
  \n一个表有 2 列和 1 行数据。列标题是 `name` 和 `in_row_reserved_page_count`。行数据是 `CLUS_IndexIO`\
  \ 和 585。\n\n图 11-20：`CLUS_IndexIO` 的碎片情况\n\n```\nUSE AdventureWorks2017\nGO\nIF\
  \ OBJECT_ID('dbo.IndexIO') IS NOT NULL\nDROP TABLE dbo.IndexIO;\nCREATE TABLE dbo.IndexIO\n\
  (\nRowID int IDENTITY(1,1)\n,Name sysname\n,JunkValue varchar(2000)\n);\nINSERT\
  \ INTO dbo.IndexIO (Name, JunkValue)\nSELECT name, REPLICATE('X', 1000)\nFROM sys.columns\n\
  CREATE CLUSTERED INDEX CLUS_IndexIO ON dbo.IndexIO(RowID);\nUPDATE dbo.IndexIO\n\
  SET JunkValue = REPLICATE('X', 2000)\nWHERE RowID % 5 = 1\nSELECT we.name, ps.in_row_reserved_page_count\n\
  FROM sys.indexes we\nINNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id\
  \ AND we.index_id = ps.index_id\nWHERE we.name = 'CLUS_IndexIO'\n```\n代码清单 11-22：构建索引\
  \ I/O 示例的脚本\n\n```\nSELECT index_type_desc\n,index_depth\n,index_level\n,page_count\n\
  ,record_count\n,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent\n\
  ,fragment_count\n,avg_fragment_size_in_pages\n,CAST(avg_page_space_used_in_percent\
  \ as DECIMAL(6,2)) as avg_page_space_used_in_percent\nFROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID('dbo.IndexIO'),NULL,NULL,'DETAILED')\n\
  ```\n代码清单 11-21：查看 I/O 示例的索引碎片\n\n从索引中移除碎片会对索引的页面数量产生显著影响吗？正如这个演示将要展示的，减少碎片确实会产生影响。\n\
  \n此演示的下一步是从索引中移除碎片。为此，执行代码清单 11-23 中的 `ALTER INDEX` 语句，它将消除碎片。在本章的剩余部分，将讨论从索引中移除碎片的机制。此命令的效果是索引中的所有碎片都被移除了。图\
  \ 11-21 显示了代码清单 11-23 的结果。它们显示索引使用的页面数从 585 个减少到 417 个。移除碎片的效果令人印象深刻，索引页面数量减少了近\
  \ 30%。\n\n![](img/338675_4_En_11_Fig21_HTML.jpg)\n\n一个表有 2 列标题：`name` 和 `in_row_reserved_page_count`，以及其对应的一行数据：`CLUS_IndexIO`\
  \ 和 417。\n\n图 11-21：重建操作导致的页面数量\n\n```\nUSE AdventureWorks2017\nGO\nALTER INDEX\
  \ CLUS_IndexIO ON dbo.IndexIO REBUILD\nSELECT we.name, ps.in_row_reserved_page_count\n\
  FROM sys.indexes we\nINNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id\
  \ AND we.index_id = ps.index_id\nWHERE we.name = 'CLUS_IndexIO'\n```\n代码清单 11-23：重建索引以移除碎片的脚本\n\
  \n这证明了碎片会影响索引中的页面数量。索引中的页面越多，为了获取查询所需的数据就需要读取更多的页面。减少页面数量有助于让 SQL Server 数据库在相同的读取次数内处理更多数据，从而提高它们在更少的页面上读取相同信息的速度。\n\
  \n#### 连续读取\n\n碎片对性能的另一个负面影响与连续读取有关。在 SQL Server 中，连续读取影响其利用预读操作的能力。预读允许 SQL Server\
  \ 将预计会使用的页面请求到内存中。SQL Server 无需等待为页面生成 I/O 请求，而是可以将大块页面读入内存，预期这些数据页将来会被查询使用。\n\n\
  如前所述，索引内的碎片是由于索引中物理数据页的连续性中断造成的。每次物理页面出现中断时，I/O 操作都必须改变从 SQL Server 读取数据的位置。这就是碎片如何对连续读取造成阻碍的。\n\
  \n## 碎片整理选项\n\nSQL Server 提供了多种方法来移除或缓解索引中的碎片。每种方法都有其优缺点。在本节中，将回顾这些选项以及使用每种选项的原因。\n\
  \n\n\n"
- "# 索引维护\n\n### 索引重建\n\n从索引中清除碎片的第一种方法是重建索引。重建索引会创建索引的一个新的、连续副本。当新索引完成后，现有的索引将被删除。索引重建操作通过\
  \ `CREATE INDEX` 或 `ALTER INDEX` 语句完成。通常，碎片率超过 30% 的索引被认为是重建的良好候选者。请注意，在大多数数据库中，30%\
  \ 及以下的碎片水平不会对性能产生大的负面影响。虽然 30% 的碎片是一个很好的起点，但每个数据库和索引都应根据实际情况进行评估，如果性能在低于 30% 的碎片时就显示出更明显的负面影响，则应进行调整。\n\
  \n执行索引重建的主要好处是，生成的新索引具有连续的页面。当索引高度碎片化时，有时解决碎片问题的最好方法就是简单地重新开始并重建索引。重建索引的另一个好处是可以在重建过程中修改索引选项。最后，对于大多数索引，在重建期间可以保持在线状态。\n\
  \n> **注意**\n>\n> 自 SQL Server 2012 起，包含 `varchar(max)`、`nvarchar(max)`、`varbinary(max)`\
  \ 和 `XML` 数据类型的聚集索引可以在线重建。当聚集索引包含以下数据类型时，仍然无法在线重建：`image`、`ntext` 或 `text`。在线重建仅限于\
  \ SQL Server 企业版、开发版和评估版。此外，在线重建需要索引的两倍空间，因为重建完成需要同时存在索引的旧版本和新版本，这对于大表来说可能是个问题。\n\
  \n重建索引的第一个选项是使用 `CREATE INDEX` 语句，如代码清单 11-24 所示。这是通过 `DROP_EXISTING` 索引选项完成的。选择\
  \ `CREATE INDEX` 选项而不是 `ALTER INDEX` 有几个原因：\n\n*   需要更改索引定义，例如需要添加或删除列，或者需要更改列的顺序。\n\
  *   需要将索引从一个文件组移动到另一个文件组。\n*   需要修改索引分区。\n\n```sql\nCREATE [ UNIQUE ] [ CLUSTERED\
  \ | NONCLUSTERED ] INDEX index_name\nON  ( column [ ASC | DESC ] [ ,...n ] )\n[\
  \ INCLUDE ( column_name [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n ] ) ]\n[ ON\
  \ { partition_scheme_name ( column_name )\n| filegroup_name\n| default\n}\n]\n[\
  \ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | \"NULL\" }\
  \ ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON | OFF }\n| ONLINE = { ON | OFF }\n| RESUMABLE\
  \ = {ON | OF }\n| MAX_DURATION =  [MINUTES]\n```\n代码清单 11-24\n使用 `CREATE INDEX`\
  \ 重建索引\n\n另一个选项是 `ALTER INDEX` 语句，如代码清单 11-25 所示。此选项在语法中使用 `REBUILD` 选项。从概念上讲，这与\
  \ `CREATE INDEX` 语句完成相同的事情，但有以下好处：\n\n*   可以在单条语句中重建表上的多个索引。\n*   可以重建索引的单个分区。\n\
  \n```sql\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n\
  [ WITH (  [ ,...n ] ) ]\n| [ PARTITION = partition_number\n[ WITH ( \n[ ,...n ]\
  \ )\n]\n]\n]\n```\n代码清单 11-25\n使用 `ALTER INDEX` 重建索引\n\n索引重建的主要缺点是在重建操作期间索引所需的空间量。数据库中至少应有当前索引大小\
  \ 120% 的可用空间用于重建后的索引。原因是当前索引在重建完成之前不会被删除。在短时间内，索引将在数据库中存在两次。\n\n有两种方法可以减少重建期间索引所需的部分空间。首先，可以使用\
  \ `SORT_IN_TEMPDB` 索引选项来减少中间结果所需的空间量。数据库中仍然需要两个索引副本的空间，但不再需要 20% 的缓冲空间。第二种减少空间需求的方法是在重建之前禁用索引。禁用索引会从索引中删除索引和数据页，同时保留索引元数据。这将允许在索引先前占用的空间内重建索引。请注意，禁用选项仅适用于非聚集索引。\n\
  \n从 SQL Server 2019 开始的一个选项是能够恢复索引构建。在线构建索引时，可以将 `RESUMABLE` 选项设置为 `ON`，并将 `MAX_DURATION`\
  \ 设置为索引构建将运行直到应停止的分钟数。当索引重建停止时，旧索引保持可用，并且重建已完成的部分将被存储，直到重新启动时。此外，如果索引重建在 `RESUMABLE`\
  \ 选项设置为 `ON` 时失败，这将允许重新启动索引重建。如果事务日志空间不足或索引重建被维护或服务重启中断，这可能非常有用。\n\n在发出重建命令之前，务必考虑索引的大小，因为较大的索引需要更多时间和资源来重建。同时确定索引是否自然是写入密集型的，并且无论对其执行多少维护，都注定会严重碎片化。队列、会话数据或中间数据存储表通常会因频繁的写入操作而严重碎片化。如果这些表的大小有限，那么对它们进行重建将带来很少或没有好处。被识别为符合此使用模式的表可以从索引重建过程中排除，从而将维护资源留给其他能从重建操作中受益更多的表。\n\
  \n### 索引重组\n\n索引重建的替代方法是重组索引。这种类型的碎片整理正如其名。索引中的数据页在已分配给索引的页面之间重新排序。重组完成后，索引中页面的物理顺序与页面的逻辑顺序相匹配。当索引碎片不严重时，应重组索引。通常，碎片少于\
  \ 30% 的索引是重组的候选者。与所有最佳实践一样，30% 是一个提供坚实维护起点的指导原则。现实世界的用例将存在需要根据表的类型、使用情况和大小来调整此指导原则的情况。\n\
  \n要重组索引，使用 `ALTER INDEX` 语法（见代码清单 11-26）和 `REORGANIZE` 选项。如果需要，重组选项允许一次重组一个分区。\n\
  \n```sql\nALTER INDEX { index_name | ALL }\nON \n| REORGANIZE\n[ PARTITION =partition_number\
  \ ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n```\n代码清单 11-26\n使用 `ALTER INDEX`\
  \ 进行索引重组\n\n使用 `REORGANIZE` 选项有几个好处。首先，在重组期间，索引保持在线或可供优化器在新执行计划或缓存的执行计划中使用。其次，该过程设计为资源使用最少，这显著降低了在事务期间发生锁定和阻塞问题的机会。\n\
  \n索引重组的缺点是重组只使用已分配给索引的数据页。存在碎片时，分配给一个索引的区段常常与其他索引分配的区段交织在一起。重新排序数据页不会使数据页比当前更连续，但会确保已分配的页面按与数据本身相同的顺序排序。\n\
  \n\n#### 删除并重新创建\n\n索引碎片整理的第三种方法是简单地删除索引并重新创建。包含此选项是为了保证完整性，但请注意它并未被广泛实践或推荐。有几个原因可以说明为什么删除并创建索引可能是个坏主意。\n\
  \n如果索引是聚集索引，那么在删除聚集索引时，所有其他索引都将需要重建。聚集索引和堆使用不同的结构来标识行和存储数据。表上的非聚集索引需要记录位置信息，因此需要重新创建以获取此信息。\n\
  \n如果索引是主键或唯一索引，则很可能存在对该索引的其他依赖关系。例如，该索引可能被外键引用。该索引可能与业务规则（如唯一性）相关联，即使在维护窗口中也无法从表中移除。\n\
  \n避免此方法的第三个原因是，它需要了解索引上的所有属性。使用其他策略时，索引会保留所有现有的索引属性。而通过重新创建索引，存在某个属性未在索引的 DDL 中保留的风险，从而导致索引的重要方面丢失。\n\
  \n索引从该表中删除后，它就无法再被使用。这应该是一个显而易见的问题，但在考虑此选项时常常被忽视。索引的目的通常是它带来的性能提升；将其从表中移除也就带走了这些提升。\n\
  \n### 碎片整理策略\n\n本章至此主要讨论了碎片的产生原因、为何它是个问题以及如何从索引中消除碎片。将这些知识应用到任何给定数据库中的索引上是很重要的。在本节中，将提供两种索引碎片整理的方法。\n\
  \n#### 维护计划\n\n第一个可用的自动化选项是通过维护计划进行碎片整理，这提供了快速创建和安排索引维护的机会，这些维护将对索引进行重组或重建。对于每种索引碎片整理类型，维护计划中都有一个可用的任务。\n\
  \n创建维护计划有几种方式。为简洁起见，将假定用户熟悉 SQL Server 中的维护计划，因此本节将重点介绍与碎片整理索引相关的具体任务。\n\n#####\
  \ 重组索引任务\n\n第一个可用的任务是重组索引任务。此任务提供了上一节中 `ALTER INDEX REORGANIZE` 语法的封装。配置后，此任务将重组所有符合任务条件的索引。\n\
  \n使用重组索引任务时，需要配置几个属性（参见图 11-22）：\n\n![](img/338675_4_En_11_Fig22_HTML.png)\n\n重组索引任务的属性窗口截图，包含连接、数据库、对象、选择、索引统计信息选项，以及仅优化具有选定碎片和页数的索引。\n\
  \n图 11-22\n\n重组索引任务的属性窗口\n\n*   `Connection`: 任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`:\
  \ 任务将连接到以进行重组的数据库。此属性的选项有：\n    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n\
  \    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重组是针对表、视图，还是表和视图。\n\
  *   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n*   `Compact large objects`:\
  \ 确定重组是否使用选项 `ALTER INDEX LOB_COMPACTION = ON`。\n*   `Scan type`: 指示你希望 SQL Server\
  \ 如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize index only if`: 提供通过碎片百分比、页数以及索引在过去\
  \ 7 天内是否被使用来限制重组的能力。\n\n索引统计信息选项在 SQL Server 2016 中引入，是对此功能的一个有益补充。在没有数据库管理员主动管理服务器内索引的环境中，这是确保索引得到维护的一个绝佳选项。\n\
  \n##### 重建索引任务\n\n另一个可用的任务是重建索引任务。这提供了 `ALTER INDEX REBUILD` 语法的封装。配置后，此任务将重建所有符合任务条件的索引。\n\
  \n与重组索引任务类似，重建索引任务在使用前也需要配置多个属性（参见图 11-23）：\n\n![](img/338675_4_En_11_Fig23_HTML.png)\n\
  \n重建索引任务的属性窗口截图，包含连接、数据库、对象、选择、可用空间选项、高级选项、索引统计信息选项以及仅优化索引选项。\n\n图 11-23\n\n重建索引任务的属性窗口\n\
  \n*   `Connection`: 任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`: 任务将连接到以进行重建的数据库。此属性的选项有：\n\
  \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
  \    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重建是针对表、视图，还是表和视图。\n*   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
  *   `Default free space per page`: 指定重建是否应使用索引上当前的填充因子。\n*   `Change free space\
  \ per page to`: 允许重建在索引重建时指定新的填充因子。\n*   `Sort results in tempdb`: 确定重建是否使用选项 `ALTER\
  \ INDEX SORT_IN_TEMPDB = ON`。\n*   `MAXDOP`: 确定重建的最大并行度，这决定了 SQL Server 可用于重建索引的最大\
  \ CPU 线程数。\n*   `Keep index online while re-indexing`: 确定重建是否使用选项 `ALTER INDEX ONLINE\
  \ = ON`。对于无法在线重建的索引，有一个选项可确定是跳过索引还是脱机重建索引。此外，你可以设置“低优先级使用”，以确定阻塞是否会取消索引重建，以及它是自行取消还是取消阻塞者，以及在多长时间后取消。\n\
  *   `Scan type`: 指示你希望 SQL Server 如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize\
  \ index only if`: 提供通过碎片百分比、页数以及索引在过去 7 天内是否被使用来限制重建的能力。\n\n与重组任务一样，索引统计信息选项是在 SQL\
  \ Server 2016 中添加的。类似地，这些更改使重建任务成为没有专用数据库管理资源的环境，或需要保持索引维护简单并避免使用自定义代码来管理此过程的环境的可行选择。\n\
  \n\n#### 维护计划摘要\n\n维护计划提供了一种可以立即开始着手消除索引碎片的方法。这些任务可以在几分钟内配置并安排好。自 SQL Server 2016\
  \ 增强功能加入以来，它们已成为管理索引维护的绝佳选择。使用其他选项（例如 T-SQL 脚本）的主要原因是在需要额外功能时，例如自定义日志记录或恢复操作的逻辑。\n\
  \n#### T-SQL 脚本\n\n另一种对数据库进行碎片整理的方法是使用 T-SQL 脚本来智能地整理索引。本节将逐步介绍整理单个数据库中所有索引所需的步骤。此方法的主要优点在于能够将所有内容保持在一个精炼的流程中。该脚本将选择最能从碎片整理中受益的索引，确定是重建还是重新组织，并忽略那些收益很小或没有收益的索引。此外，它允许根据业务规则或其他超出维护计划范围的逻辑来自定义维护操作。\n\
  \n为了实现筛选，将应用一些碎片整理最佳实践，以帮助确定是否应对索引进行碎片整理以及应采用何种方法。将使用的指导原则如下：\n\n*   对碎片率低于 30%\
  \ 的索引进行重新组织。\n*   对碎片率达到或超过 30% 的索引进行重建。\n*   忽略页数少于 1,000 的索引。\n*   如果使用企业版，并且在维护期间需要访问数据，请使用在线重建。\n\
  *   如果正在重建聚集索引，请重建表中的所有索引。\n\n**注意** 索引存在碎片并不意味着总是需要对其进行碎片整理。对于小表的索引，进行碎片整理的收益不大。例如，页数少于\
  \ 8 页的索引将放入一个区中，因此从减少 I/O 的角度来看，对此类索引进行碎片整理没有好处。一些 Microsoft 文档和 SQL Server 专家建议不要对页数少于\
  \ 1,000 的表进行碎片整理。该值是否适合您的数据库取决于您的具体情况，但它可以作为制定索引维护策略的起点。\n\n碎片整理脚本将执行几个步骤来智能地整理索引：\n\
  \n1.  收集碎片数据。\n2.  确定要整理的索引。\n3.  构建碎片整理语句。\n\n在开始碎片整理步骤之前，需要一个索引维护脚本的模板。如清单 11-27\
  \ 所示，该模板声明了多个变量，并使用 `CURSOR` 循环遍历每个索引并执行必要的索引维护。变量在 `DECLARE` 语句中设置，阈值在本节开头定义。模板中还有一个\
  \ `table` 变量，用于存储数据库中碎片状态的中间结果。\n\n```sql\nDECLARE @MaxFragmentation TINYINT=30\n\
  ,@MinimumPages SMALLINT=1000\n,@SQL nvarchar(max)\n,@ObjectName NVARCHAR(300)\n\
  ,@IndexName NVARCHAR(300)\n,@CurrentFragmentation DECIMAL(9, 6)\nDECLARE @FragmentationState\
  \ TABLE\n(\nSchemaName SYSNAME\n,TableName SYSNAME\n,object_id INT\n,IndexName SYSNAME\n\
  ,index_id INT\n,page_count BIGINT\n,avg_fragmentation_in_percent FLOAT\n,avg_page_space_used_in_percent\
  \ FLOAT\n,type_desc VARCHAR(255)\n)\nINSERT INTO @FragmentationState\n\nDECLARE\
  \ INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR\n\nOPEN INDEX_CURSE\nWHILE 1=1\nBEGIN\n\
  FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName\n,@CurrentFragmentation\n\
  IF @@FETCH_STATUS  0\nBREAK\n\nEXEC sp_ExecuteSQL @SQL\nEND\nCLOSE INDEX_CURSE\n\
  DEALLOCATE INDEX_CURSE\n```\n\n清单 11-27 索引碎片整理脚本模板\n\n首先，需要收集有关索引的碎片数据并填充到 `table`\
  \ 变量中。在清单 11-28 的脚本中，使用了 DMF `sys.dm_db_index_physical_stats` 并指定了 `SAMPLED` 选项。使用此选项是为了最小化执行\
  \ DMF 对数据库的影响。结果中包含架构、表和索引名称以标识正在报告的索引，以及 `object_id` 和 `index_id`。来自 DMF 的关于索引碎片的统计列包含在\
  \ `page_count`、`avg_fragmentation_in_percent` 和 `avg_page_space_used_in_percent`\
  \ 列中。结果中的最后一列是 `has_LOB_column`。此列是关联子查询的结果，用于确定索引中的任何列是否为 LOB 类型，LOB 类型不允许在线索引重建。\n\
  \n```sql\nSELECT\ns.name as SchemaName\n,t.name as TableName\n,t.object_id\n,we.name\
  \ as IndexName\n,we.index_id\n,x.page_count\n,x.avg_fragmentation_in_percent\n,x.avg_page_space_used_in_percent\n\
  ,we.type_desc\nFROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, 'SAMPLED')\
  \ x\nINNER JOIN sys.tables t ON x.object_id = t.object_id\nINNER JOIN sys.schemas\
  \ s ON t.schema_id = s.schema_id\nINNER JOIN sys.indexes we ON x.object_id = we.object_id\
  \ AND x.index_id = we.index_id\nWHERE x.index_id > 0\nAND x.avg_fragmentation_in_percent\
  \ > 0\nAND alloc_unit_type_desc = 'IN_ROW_DATA'\n```\n\n清单 11-28 收集碎片数据的脚本\n\n清单\
  \ 11-28 中查询的结果会因每个读者而异。通常，结果应类似于图 11-24 中的结果，其中包含了 `AdventureWorks2017` 数据库中的聚集索引、非聚集索引和\
  \ XML 索引。\n\n![](img/338675_4_En_11_Fig24_HTML.png)\n\n一个包含 9 列 5 行的表。列标题为：架构名、表名、对象\
  \ i d、索引名、索引 id、页数、平均碎片百分比、平均页面空间使用百分比、类型降序。它包括聚集和非聚集索引。\n\n图 11-24 表碎片数据查询结果\n\n\
  碎片整理脚本的下一步是构建需要整理的索引列表。通过清单 11-29 创建的索引列表用于填充游标。然后游标循环遍历每个索引以执行碎片整理。脚本中一个值得注意的点是，对于聚集索引，将重建所有底层索引。这不是碎片整理索引时的必需操作，但应考虑此选项。当表上只有少数索引时，这可能是一种值得采用的管理方式。随着索引数量的增加，这种方法可能变得不那么有吸引力。此查询的结果应类似于图\
  \ 11-25 中的结果。\n\n![](img/338675_4_En_11_Fig25_HTML.png)\n\n一个包含三列的表。表头为：无列名、无列名、平均碎片百分比。人力资源员工薪资历史记录被高亮显示。\n\
  \n图 11-25 用于重建/重新组织操作的索引\n\n```sql\nSELECT  QUOTENAME(x.SchemaName)+'.'+QUOTENAME(x.TableName)\n\
  ,CASE WHEN x.type_desc = 'CLUSTERED' THEN 'ALL'\nELSE QUOTENAME(x.IndexName) END\n\
  ,x.avg_fragmentation_in_percent\nFROM    @FragmentationState x\nLEFT OUTER JOIN\
  \ @FragmentationState y ON x.object_id = y.object_id AND y.index_id = 1\nWHERE \
  \  (\nx.type_desc = 'CLUSTERED'\nAND y.type_desc = 'CLUSTERED'\n)\nOR y.index_id\
  \ IS NULL\nORDER BY x.object_id\n,x.index_id\n```\n\n清单 11-29 用于识别碎片化索引的脚本\n\n\n\
  \n模板的最后一部分是魔法生效之处。代码清单 11-30 中的脚本用于构建 `ALTER INDEX` 语句，以进行索引碎片整理。此时，会检查碎片级别以确定是执行\
  \ `REBUILD`（重建）还是 `REORGANIZATION`（重组）。对于支持 `ONLINE`（在线）索引重建的索引，会使用 `CASE` 语句添加相应的语法。\n\
  \n```\nSET @SQL = CONCAT('ALTER INDEX ', @IndexName,' ON ',@ObjectName,\nCASE WHEN\
  \ @CurrentFragmentation <= 30 THEN ' REORGANIZE;'\nELSE ' REBUILD' END,\nCASE WHEN\
  \ CONVERT(VARCHAR(100), SERVERPROPERTY('Edition')) LIKE 'Enterprise%'\nOR CONVERT(VARCHAR(100),\
  \ SERVERPROPERTY('Edition')) LIKE 'Developer%'\nTHEN ' WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)\
  \ ' END, ';');\n代码清单 11-30\n构建索引碎片整理语句的脚本\n```\n\n**注意**\n\nSQL Server 2017 企业版的一项改进是，当索引包含大型对象（LOB）数据类型的列时，能够执行在线索引重建。\n\
  \n将所有部分与本节开头的模板结合起来，创建一个索引碎片整理脚本，其提供的功能与维护计划任务类似。通过能够设置发生碎片整理的大小和碎片级别，此脚本仅对真正需要处理的索引消除碎片，而不是对数据库中的每个索引进行碎片整理。在\
  \ `AdventureWorks2017` 上使用 Extended Events 追踪脚本输出，显示先前查询结果的 `ALTER INDEX` 语法与代码清单\
  \ 11-31 中的语法类似。\n\n```\nALTER INDEX ALL ON [HumanResources].[EmployeePayHistory]\
  \ REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) ;\nALTER INDEX ALL ON [HumanResources].[JobCandidate]\
  \ REORGANIZE; WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) ;\nALTER INDEX ALL ON [dbo].[AllocationCycle]\
  \ REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) ;\nALTER INDEX ALL ON [dbo].[PageCompression]\
  \ REORGANIZE; WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) ;\nALTER INDEX ALL ON [Sales].[SalesPersonQuotaHistory]\
  \ REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) ;\n代码清单 11-31\n索引碎片整理语句\n```\n\n正如本节代码所演示的，使用\
  \ T-SQL 脚本可能比使用维护计划任务复杂得多。这种复杂性的优点在于，一旦脚本完成，它可以被包装在存储过程中，并在任何 SQL Server 实例上使用。此脚本旨在作为使用\
  \ T-SQL 脚本实现自动化碎片整理的第一步。它没有考虑分区表，也没有在重建或重组索引之前检查索引是否正在被使用。优点在于，脚本化解决方案可以智能地决定如何及何时整理索引碎片，而不是像“开卡车”一样粗放地对一组数据库进行重新索引。\n\
  \n此外，自定义 T-SQL 解决方案可以允许对数据库、表或索引进行自定义的维护或忽略。当管理员对应用程序的工作方式有深入了解，并且知道哪些索引需要特殊维护（或根本不需要）时，这非常有帮助。\n\
  \n**注意**\n\n有关完整的索引碎片整理解决方案，请查看 Ola Hallengren 的索引维护脚本：`https://ola.hallengren.com`。\n\
  \n## 防止碎片化\n\n索引内的碎片化并非总是不可避免。可以采用一些方法来减缓碎片化的发生速率。当存在经常受碎片化影响的索引时，建议调查碎片化发生的原因。\n\
  \n这项研究可能会发现应用程序、服务器或维护方面的问题，这些问题可以通过与索引维护无关的其他方式解决。因此，了解应用程序及其基础架构的运行方式，可以为查询或使用模式中的次优情况提供宝贵的见解。例如，一个应用程序更新表的频率可能远超所需。这些更新可能导致意外的碎片化。对于此类问题，解决应用程序错误也能减少碎片化，而无需实施任何额外的索引或维护选项。\n\
  \n有几种策略可以帮助减轻碎片化；它们是填充因子、数据类型和默认值。\n\n### 填充因子\n\n填充因子是构建或重建索引时可以使用的一个选项。此属性用于确定索引首次创建或下次重建时，每个数据页中应保留多少可用空间。例如，填充因子为\
  \ 75 时，每个数据页大约 25% 的空间会保持为空。\n\n如果一个索引遇到显著或频繁的碎片化，调整填充因子以减轻碎片化是值得的。通过这样做，导致碎片化活动的影响应该会减小，从而降低索引需要进行碎片整理的频率。\n\
  \n默认情况下，SQL Server 创建所有索引时填充因子为 0。这是服务器和数据库级别的推荐值。并非所有索引都是一样的，填充因子应根据需要应用，而不是作为一项一刀切的保险策略。此外，填充因子为\
  \ 0 等同于填充因子为 100。\n\n填充因子的一个缺点是，在数据页中保留可用空间意味着索引将需要更多的数据页来容纳所有记录。更多的页面意味着使用更多的存储空间、更多的\
  \ I/O，并且如果有其他索引可供选择，索引的利用率可能更低。\n\n### 数据类型\n\n避免碎片化的另一种方法是通过适当的数据类型选择。此策略适用于长度可能因其包含的数据而改变的数据类型。这些数据类型包括\
  \ `VARCHAR` 和 `NVARCHAR`，它们的长度可能随时间变化。\n\n在许多情况下，可变长度数据类型非常适合表中的列。当数据的变动性很高且数据长度也具有变动性时，问题就会出现。随着数据长度的变化，可能会发生页拆分，从而导致碎片化。如果长度变动发生在索引的很大一部分上，那么也可能有大量页拆分，从而导致碎片化。\n\
  \n一个关于不良数据类型的例子来自我参与的第一个数据仓库的经验。许多表的原始设计包括一个数据类型为 `VARCHAR(10)` 的列。该列填充了格式为 `yyyymmdd`\
  \ 的日期，值类似于 20191011。作为导入过程的一部分，日期值被更新为 `yyyy-mm-dd` 格式。当导入移到生产环境，并且一次处理数百万行时，列长度从八个字符增加到十个字符，由于页拆分导致了惊人的碎片化水平。解决问题的办法很简单，就是将列的数据类型从\
  \ `VARCHAR(10)` 更改为 `CHAR(10)`。\n\n如此简单的解决方案可以应用于许多数据库。这需要对碎片化发生的原因进行一些调查，但通过逐步跟踪写入操作，可以确定碎片化发生的时间，并能够制定相应的应对措施。\n\
  \n\n\n### 默认值\n\n合理应用默认值看似与防止碎片化无关，但在某些场景下，它能对碎片化产生显著影响。此类优化最典型的案例是数据库使用 `uniqueidentifier`\
  \ 数据类型时。\n\n大多数情况下，`uniqueidentifier` 值是通过 `NEWID()` 函数生成的。此函数创建一个全局唯一标识符（GUID），理论上在整个地球上都应是唯一的。这对于为行生成唯一标识很有用，但其作用域可能超出了数据库的需求。很多时候，唯一值可能只需要在服务器或表级别保持唯一即可。\n\
  \n`NEWID()` 函数的主要问题在于，生成 GUID 并非一个顺序过程。如本章开头所示，使用此函数为聚集索引键生成值会导致严重的碎片化。\n\n`NEWID()`\
  \ 函数的一个替代方案是 `NEWSEQUENTIALID()` 函数。该函数同样返回 GUID，但其生成值的方式有几点不同。首先，在服务器上由该函数生成的每个\
  \ GUID 都与前一个值顺序相关。第二个区别是，生成的 GUID 值仅在生成它的服务器上是唯一的。如果另一个 SQL Server 实例对同一个表使用此函数生成\
  \ GUID，则可能产生重复值，并且由于作用域是服务器级别，这些值也不会是顺序的。\n\n考虑到这些限制，如果一个表必须使用 `uniqueidentifier`\
  \ 数据类型，那么 `NEWSEQUENTIALID()` 函数是 `NEWID()` 函数的一个绝佳替代方案。它生成的值将是顺序的，所遇到的碎片量将大大减少，频率也更低。\n\
  \n## 索引统计信息维护\n\n在第 3 章中，讨论了收集索引统计信息的相关内容。这些统计信息为查询优化器提供了关键信息，用于编译查询的执行计划。当此信息过时或不准确时，数据库将提供次优或不正确的查询计划。\n\
  \n在大多数情况下，索引统计信息不需要大量维护。本节将回顾 SQL Server 中可用于创建和更新统计信息的内部流程。同时也会讨论在自动化流程跟不上索引内数据变化速率时，维护统计信息的方法。\n\
  \n需要注意的是，SQL Server 中的统计信息是对表中数据基数（行数）和值频率的估计。它们并非实时维护，因为实时维护的成本过高。\n\n### 自动维护统计信息\n\
  \n在 SQL Server 中构建和维护统计信息最简单的方法是让 SQL Server 自动完成。有三个数据库属性控制 SQL Server 是否自动构建和维护统计信息：\n\
  \n*   `AUTO_CREATE_STATISTICS`\n*   `AUTO_UPDATE_STATISTICS`\n*   `AUTO_UPDATE_STATISTICS_ASYNC`\n\
  \n默认情况下，前两个属性在数据库中是启用的。最后一个选项默认是禁用的。在大多数场景下，这三个属性都应启用。\n\n#### 自动创建\n\n第一个数据库属性是\
  \ `AUTO_CREATE_STATISTICS`。此属性指导 SQL Server 自动在没有统计信息的列上创建单列统计信息。从索引的角度看，此属性没有影响。创建索引时，会为索引创建一个统计信息对象。\n\
  \n#### 自动更新\n\n接下来的两个属性是 `AUTO_UPDATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS_ASYNC`。从高层次来看，这两个属性非常相似。当超过一个内部阈值时，SQL\
  \ Server 将启动统计信息对象的更新。更新操作旨在使统计信息对象中的值与表中数据的实际基数保持同步。\n\n触发统计信息更新的阈值可能因表而异。该阈值基于与已更改行数相关的几个计算。对于空表，当向表中添加超过\
  \ 500 行时，将触发统计信息更新。如果表已有超过 500 行，那么当修改的行数达到 500 行加上表中总行数的 20% 时，统计信息将被更新。此时，SQL\
  \ Server 将安排更新统计信息。随着表中行数的增加，20% 的阈值会相应降低，以适应表中数据量更大时需要更频繁更新统计信息的需求。大约在 50 万行时，该百分比降至约\
  \ 5%，而对于超过 10 亿行的表，则降至不到 1%。此行为类似于之前通过跟踪标志 2371 实现的功能，该标志自 SQL Server 2016 起默认开启。\n\
  \n当统计信息更新发生时，有两种模式：同步和异步。默认情况下，统计信息是同步更新的。这意味着当统计信息被判定为过时并需要更新时，查询优化器会等待统计信息更新完成后，再编译查询的执行计划。这对于数据易变的表非常有用。例如，`TRUNCATE\
  \ TABLE` 操作前后的表统计信息会大不相同。也可以选择通过启用 `AUTO_UPDATE_STATISTICS_ASYNC` 属性来异步更新统计信息。这改变了查询优化器在触发更新统计信息事件时的反应方式。查询优化器不再等待统计信息更新完成，而是基于现有统计信息编译执行计划，并在更新完成后为后续查询使用更新后的统计信息。对于查询量高、数据吞吐量大的数据库，这通常是更新统计信息的首选方式。它避免了事务吞吐量出现偶尔的停顿，查询能够顺畅执行，执行计划在获得改进的信息后随之更新。\n\
  \n对于之前在旧版 SQL Server 中禁用了 `AUTO_UPDATE_STATISTICS` 的环境，现在考虑启用它并配合 `AUTO_UPDATE_STATISTICS_ASYNC`\
  \ 是值得的。过去禁用 `AUTO_UPDATE_STATISTICS` 的最主要原因是担心更新统计信息导致的延迟。有了启用 `AUTO_UPDATE_STATISTICS_ASYNC`\
  \ 的选项，这些性能顾虑很可能得以缓解。除非有充分的理由并经过彻底论证，否则不应禁用统计信息的自动更新。\n\n\n#### 防止自动更新\n\n根据表上的索引情况，有时自动更新索引统计信息弊大于利。例如，对大型表执行自动统计信息更新可能会在统计信息对象更新期间导致性能问题。在这种情况下，现有的统计信息对象可能足够好用，直到下一个维护窗口。同样，通过受控数据加载过程经历大量数据更新的表，最好在数据加载过程结束时更新统计信息，而不是自动进行。\n\
  \n有多种方法可以禁用单个统计信息对象上的 `AUTO_UPDATE_STATISTICS`，而不是在整个数据库范围内禁用：\n\n*   对统计信息对象执行\
  \ `sp_autostats` 系统存储过程\n\n*   在 `UPDATE STATISTICS` 或 `CREATE STATISTICS` 语句上使用\
  \ `NORECOMPUTE` 选项\n\n*   在 `CREATE INDEX` 语句上使用 `STATISTICS_NORECOMPUTE`\n\n这些选项都可用于禁用或启用索引上的\
  \ `AUTO_UPDATE_STATISTICS` 选项。在禁用此功能之前，请务必验证统计信息更新是否真正必要。\n\n#### 内存优化表统计信息\n\n\
  在考虑统计信息时，内存优化表是一个统计信息创建和使用方式略有不同的领域。重要的是要理解，无法在内存优化表上自动生成统计信息，并且始终需要完整扫描。此外，内存优化表上的本机编译存储过程仅在存储过程编译或\
  \ SQL Server 重启时检索统计信息。这意味着在考虑统计信息对索引的影响时，内存优化表在安排统计信息对象的维护时机方面需要格外小心。\n\n### 手动维护统计信息\n\
  \n有时，用于维护统计信息的自动化流程可能不够好。这通常与数据正在发生变化但不足以触发统计信息更新的情况有关。发生这种情况的一个例子是更新语句改变了表的基数但未影响大量行。例如，如果表中\
  \ 10% 的数据从多个值更改为单个值，那么查询数据的执行计划最终可能不是最优的。在这种情况下，能够手动更新统计信息是有价值的。与索引碎片整理一样，有两种手动维护统计信息的方法：\n\
  \n*   维护计划\n\n*   T-SQL 脚本\n\n在接下来的部分中，将解释每种方法，并提供如何实现它们的演练。\n\n#### 维护计划\n\n在维护计划中，有一个允许进行统计信息维护的任务：更新统计信息任务。使用此任务时，可以配置许多属性来控制其行为（参见图\
  \ 11-26）：\n\n![](img/338675_4_En_11_Fig26_HTML.png)\n\n更新统计信息任务属性窗口的屏幕截图，包含连接、数据库、对象、选择、更新和扫描类型。\n\
  \n图 11-26\n\n更新统计信息任务的属性窗口\n\n*   *连接*：任务执行时将连接到的 SQL Server 实例。\n\n*   *数据库*：任务将连接到以进行维护过程的数据库。此属性的选项包括：\n\
  \    *   所有数据库。\n\n    *   所有系统数据库。\n\n    *   所有用户数据库。\n\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
  \n    *   忽略状态不为在线的数据库。\n\n*   *对象*：确定重建是针对表、视图，还是表和视图。\n\n*   *选择*：指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
  \n*   *更新*：对于每个表，确定是更新所有现有统计信息、仅列统计信息（使用 `WITH COLUMN` 子句），还是仅索引统计信息（使用 `WITH INDEX`\
  \ 子句）。\n\n*   *扫描类型*：在完整扫描索引的所有叶级页面与“抽样”之间进行选择，后者将扫描一定百分比或数量的行来构建统计信息对象。\n\n与之前讨论的维护计划不同，更新统计信息任务没有更深入的控制来帮助确定是否应更新统计信息。一个有用的选项是将统计信息更新限制在指定的日期范围内，这将减少每次执行期间更新的统计信息数量。在大多数情况下，缺少该选项不会造成问题。统计信息更新不像索引更新那样每次更新都需要足够的空间来重建整个索引。然而，能够保留当前的抽样扫描类型会很好，因为这可能会影响性能，并且采用一刀切的方法可能无法达到预期的性能效果。\n\
  \n#### T-SQL 脚本\n\n通过 T-SQL，有几种替代方法可用于更新统计信息：使用存储过程或使用 DDL 语句。每种方法都有其优缺点。在接下来的部分中，将讨论每种方法以及它可能成为一种有价值方法的原因。\n\
  \n##### 存储过程\n\n在 `master` 数据库中，有一个名为 `sp_updatestats` 的系统存储过程，可用于更新数据库中的所有统计信息。由于它是一个系统存储过程，因此可以从任何数据库调用它，以更新调用该过程的数据库中的统计信息。\n\
  \n当执行 `sp_updatestats` 时，它会使用 `ALL` 选项运行 `UPDATE STATISTICS` 语句（下一节将描述）。该存储过程接受一个名为\
  \ `resample` 的参数，如清单 11-32 所示。`resample` 参数仅接受值 `resample`。如果提供了此值，则存储过程使用 `UPDATE\
  \ STATISTICS` 的 `RESAMPLE` 选项。否则，存储过程使用 SQL Server 中的默认抽样算法。\n\n```\nsp_updatestats\
  \ [ [ @resample = ] 'resample']\n```\n清单 11-32\n`sp_updatestats` 语法\n\n使用 `sp_updatestats`\
  \ 的一个好处是，它只会更新那些数据已发生修改的项目的统计信息。会检查用于触发自动统计信息更新的内部计数器，以确保仅更新已更改的统计信息。此外，`resample`\
  \ 选项使用统计信息最近使用的抽样率。\n\n在需要更新统计信息的情况下，`sp_updatestats` 是一个很好的工具，它仅更新那些自上次更新以来可能已过时的统计信息。如果说更新统计信息任务是一张覆盖整个数据库的巨大毯子，那么\
  \ `sp_updatestats` 就是一张恰到好处地覆盖关键部位的被子。\n\n"
- '# 12. 索引工具


  ## 概要


  本章介绍了多种影响表索引的维护考量因素，这些因素对于确保最佳查询性能至关重要。它们可归结为管理索引碎片和管理其统计数据。对于索引碎片，讨论了索引可能碎片化的方式、其成为问题的原因以及消除碎片的策略。这些维护任务对于确保
  SQL Server 能够最大限度地利用索引至关重要。除了维护活动外，索引的统计数据也必须得到维护。过时或不准确的统计数据可能导致执行计划与表中的数据不匹配。如果没有正确的执行计划，无论索引是否存在，性能都会受到影响。


  ### DDL 命令


  更新统计信息的另一个选项是通过 DDL 命令 `UPDATE STATISTICS`，如清单 11-33 所示。`UPDATE STATISTICS` 语句允许对每个统计信息进行精细调整的更新，并提供了多种用于收集和构建统计信息的选项。


  ```sql

  UPDATE STATISTICS table_or_indexed_view_name

  [

  {

  { index_or_statistics_name }

  | ( { index_or_statistics_name } [ ,...n ] )

  }

  ]

  [    WITH

  [

  FULLSCAN

  [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

  | SAMPLE number { PERCENT | ROWS }

  [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

  | RESAMPLE

  [ ON PARTITIONS ( { <partition_number> | <range> } [, ...n] ) ] ]

  [ [ , ] [ ALL | COLUMNS | INDEX ]

  [ [ , ] NORECOMPUTE ]

  [ [ , ] INCREMENTAL = { ON | OFF } ]

  [ [ , ] MAXDOP = max_degree_of_parallelism ]

  ] ;

  ```


  清单 11-33. `UPDATE STATISTICS` 语法


  使用 `UPDATE STATISTICS` 时，第一个设置的参数是 `table_or_indexed_view_name`。此参数引用将要更新统计信息的表。使用
  `UPDATE STATISTICS` 命令，一次只能更新一个表或视图的统计信息。


  下一个参数是 `index_or_statistics_name`。此参数用于确定是更新单个统计信息、统计信息列表还是表上的所有统计信息。要更新单个统计信息，请在表名或视图名后包含统计信息对象的名称。对于统计信息列表，统计信息名称应包含在括号内的逗号分隔列表中。如果未指定任何统计信息，则将考虑更新所有统计信息。


  设置好参数后，需要将相应的选项添加到 `UPDATE STATISTICS` 命令中。这正是此语法强大和灵活之处所在。这些参数允许根据统计信息中的可用数据对其进行精细调整，以便为正确的表和正确的索引获取合适的统计信息：


  *   `FULLSCAN`：构建统计信息对象时，扫描表或视图中的所有行和页。对于大型表，在创建统计信息对象时会影响性能。这等同于执行 `SAMPLE 100
  PERCENT` 操作。

  *   `SAMPLE`：使用表或视图中行的计数或百分比样本来创建统计信息对象。如果未选择采样率，SQL Server 将根据表中的行数确定合适的采样率。

  *   `RESAMPLE`：使用上次更新统计信息时的采样率进行更新。例如，如果上次更新使用了 `FULLSCAN`，那么 `RESAMPLE` 也将导致 `FULLSCAN`。

  *   `PERSIST_SAMPLE_PERCENT`：确定定义的采样率是否应持久化到统计信息中，作为未来未指定默认值时的默认值。

  *   `ALL | COLUMNS | INDEX`：确定应更新列统计信息、索引统计信息还是两者都更新。

  *   `NORECOMPUTE`：禁用查询优化器请求自动更新统计信息的选项。这对于锁定不应更改或使用当前采样率是最优的统计信息非常有用。在频繁修改数据的表上使用此选项时需谨慎，并确保有其他机制在需要时更新统计信息。

  *   `INCREMENTAL`：启用时，统计信息将创建为按分区统计信息，这允许使用 `ON PARTITIONS` 子句按分区更新统计信息。

  *   `MAXDOP`：确定统计信息更新操作的最大并行度，并覆盖服务器的最大并行度配置。


  此列表中的前三个选项是互斥的。只能选择其中一个选项。选择多个选项将产生错误。


  由于 `UPDATE STATISTICS` 是 DDL 命令，它可以很容易地实现自动化，类似于索引碎片整理的自动化。为简洁起见，未包含示例脚本，但可以以索引碎片维护模板为起点。`sp_updatestats`
  在底层使用了 `UPDATE STATISTICS`。这个 DDL 命令是一种强大的方式，可以按需更新数据库中的统计信息，而无需执行超出必要的操作。延续上一节的类比，使用
  `UPDATE STATISTICS` 相当于用一件手工定制的、合身的毛衣替代了通用的毯子和被子。


  关于索引，Microsoft 在 SQL Server 中内置了两个工具，可用于帮助识别可以改善数据库性能的索引。它们是缺失索引动态管理对象（DMO）和数据库引擎优化顾问（DTA）。这两个工具都有助于索引数据库，并且在调整数据库时可以提供有价值的输入。


  此外，Azure SQL Database 包含一个名为“自动索引管理”的功能。此功能根据使用情况自动创建和删除索引，旨在用于没有开发人员或管理员可用以监视和管理索引的环境。


  本章深入探讨了这些工具，描述了如何使用它们以及各自的优点。本章分为两节，分别描述每个工具的功能，并简要讨论自动索引管理。



  ## 缺失索引


  缺失索引动态管理对象（DMOs）是一组管理对象，它们提供来自查询优化器的索引反馈。当查询优化器编译执行计划时，它可以识别出将一组列的统计信息物化为物理索引是否将提升性能。在这些情况下，查询优化器将编译结果并将信息存储在缺失索引
  DMOs 中。


  缺失索引 DMOs 提供了几点好处。首先，缺失索引信息是从查询优化器收集的，无需您执行任何操作。与 `Extended Events` 和其他性能监控工具不同，无需对其进行配置和启用即可收集信息。另一个考虑是，缺失索引信息是基于在
  SQL Server 实例上实际发生的活动。索引建议并非基于您认为可能在生产环境中发生的测试负载，而是基于生产负载本身。随着数据库中数据使用模式的变化，缺失索引的建议也会随之改变。


  尽管缺失索引 DMOs 提供了诸多好处，但在使用它们时，考虑几个注意事项非常重要。缺失索引 DMOs 的局限性可以总结为以下几个类别：


  *   队列大小


  *   分析深度


  *   准确性


  *   索引类型


  缺失索引的队列大小是一个容易被忽视的限制。无论 SQL Server 实例上有多少个数据库，最多只能有 600 个缺失索引组。一旦识别出 600 个缺失索引组，查询优化器将停止报告新的缺失索引建议。它不会去判断一个新的可能缺失索引是否比已报告的项目质量更高；相关信息根本不会被收集。当这种情况发生时，微软建议处理现有的索引建议，以帮助缓解此限制。


  > **注意**

  >

  > 与其他动态管理对象一样，缺失索引 DMOs 中的信息在 SQL Server 重启时会重置，并且每当数据库离线时，该数据库的信息也会被删除。


  在考虑缺失索引的信息时，分析深度是每次审查建议时都需要考虑的一个限制。查询优化器只考虑当前的执行计划以及缺失索引是否会对该执行计划有益。有时，将缺失索引添加到数据库中会导致一个新的执行计划，而这个新计划又会带来新的缺失索引建议。这些建议只是提升执行计划性能的第一步。此限制的另一半是，缺失索引详情不包括测试来确定建议的缺失索引中的列顺序是否最优。在查看缺失索引建议时，需要进行测试以确定正确的列顺序。


  缺失索引建议的第三个限制是其返回统计信息的准确性。关于这个限制，有两点需要考虑。当查询使用不等式谓词时，其成本信息不如使用等式谓词返回的信息有效。此外，可能会返回具有不同成本估算的同一缺失索引建议。如何以及在何处利用缺失索引可能会改变所计算的成本估算。对于每个成本估算，都会记录一个缺失索引建议。


  最后，缺失索引工具在它可以建议的索引类型方面存在限制。主要限制是索引类型，即缺失索引无法建议聚集索引、XML 索引、空间索引或列存储索引。这些建议也不会包含关于何时创建过滤索引的信息。同样地，建议有时可能只包含
  `INCLUDED` 列。当这种情况发生时，需要将其中一个 `INCLUDED` 列指定为键列。


  > **注意**

  >

  > 每当对表进行元数据操作时，该表的缺失索引信息将被删除。例如，当向表中添加一列时，缺失索引信息将被删除。一个不太明显的例子是当表上的索引发生变化时。在这种情况下，缺失索引信息也会被删除。


  正如本书其他地方提到的，仔细权衡一个新索引是否足够有价值以保证其创建，始终是很重要的。盲目遵循这些 DMOs 中的每一个索引建议，将很快导致表被过度索引。在介绍这些
  DMOs 时请牢记这一点，因为它有助于强调一个事实：并非所有索引都是平等的。有些能提供卓越的价值，而另一些的维护成本可能超过其带来的价值。


  ### 解读 DMOs


  有四个 DMOs 可用于返回有关缺失索引的信息。每个 DMO 提供了构建索引所需的部分信息，查询优化器可使用这些索引来提升查询性能。缺失索引相关的 DMOs 如下：


  *   `sys.dm_db_missing_index_details`

  *   `sys.dm_db_missing_index_columns`

  *   `sys.dm_db_missing_index_group_stats`

  *   `sys.dm_db_missing_index_groups`


  在接下来的四个小节中，将逐一审视每个动态管理对象，并详细介绍它们如何提供有关如何识别缺失索引的信息。




  ### sys.dm_db_missing_index_details


  动态管理对象 (DMO) `sys.dm_db_missing_index_details` 是一个动态管理视图 (DMV)，用于返回缺失索引的建议列表。该视图中的每一行都提供了一个单独的缺失索引建议。表
  12-1 中的列提供了有关数据库和要创建索引的表的信息，还包括了应构成索引键的列以及索引的包含列。


  表 12-1


  `sys.dm_db_missing_index_details` 中的列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `index_handle` | `int` | 每个缺失索引建议的唯一标识符。这是此 DMV 的键值。 |

  | `database_id` | `smallint` | 标识存在缺失索引的表所在的数据库。 |

  | `object_id` | `int` | 标识缺失索引的表。 |

  | `equality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与了相等谓词。 |

  | `inequality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与了不等谓词。 |

  | `included_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列是查询所需的覆盖列。 |

  | `statement` | `nvarchar(4000)` | 缺失索引的表的名称。 |


  `sys.dm_db_missing_index_details` 中有两个列用于标识缺失索引建议中的键列：`equality_columns` 和 `inequality_columns`。当查询计划中存在直接相等比较时，会生成
  `equality_columns`。例如，当查询的过滤条件是 `ColumnA = @Parameter` 时，这就是一个相等谓词。当查询计划中使用任何不等过滤条件时，会生成
  `inequality_columns` 的详细信息，例如使用大于、小于或 `NOT IN` 比较时。


  关于 `included_columns` 信息，当存在不属于过滤条件但可用于允许索引通过单个索引覆盖查询请求的列时，会生成此信息。包含列在第 10 章中有更深入的介绍。使用包含列有助于防止如果创建了缺失索引，查询计划在执行计划中不得不使用键查找。也就是说，首先测试不包含包含列的新索引并衡量由此产生的性能改进是有价值的。缺失索引建议通常包含包含列，但这些额外的包含列（及其相关的维护）可能并非实现足够性能提升所必需的。


  ### sys.dm_db_missing_index_columns


  下一个 DMO 是 `sys.dm_db_missing_index_columns`，它是一个动态管理函数 (DMF)。此函数为 `sys.dm_db_missing_index_details`
  中列出的每个缺失索引返回一个列列表。要使用此 DMF，需要将一个 `index_handle` 作为参数传递给该函数。结果集中的每一行代表 `sys.dm_db_missing_index_details`
  中缺失索引建议的一个列，并重复了 `equality_columns`、`inequality_columns` 和 `included_columns` 中的信息。表
  12-2 列出了 `sys.dm_db_missing_index_columns` 的输出。


  表 12-2


  `sys.dm_db_missing_index_columns` 中的列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `column_id` | `int` | 列的 ID |

  | `column_name` | `sysname` | 表列的名称 |

  | `column_usage` | `varchar(20)` | 描述列在索引中的使用方式 |


  此 DMF 中的主要信息是 `column_usage` 列。对于每一行，此列将返回以下值之一：`EQUALITY`、`INEQUALITY` 或 `INCLUDE`。这些值对应于
  `sys.dm_db_missing_index_details` 中的 `equality_columns`、`inequality_columns` 和 `included_columns`。根据前者
  DMV 中的使用类型，此 DMF 中的使用方式将相同。


  ### sys.dm_db_missing_index_groups


  DMV `sys.dm_db_missing_index_groups` 是下一个缺失索引 DMO。此 DMV 返回一个缺失索引组与缺失索引建议配对的列表。表
  12-3 列出了 `sys.dm_db_missing_index_groups` 的列。尽管此 DMV 支持在缺失索引建议中存在多对多关系的能力，但它们总是以一对一的关系建立。


  表 12-3


  `sys.dm_db_missing_index_groups` 中的列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `index_group_handle` | `int` | 标识一个缺失索引组。此值连接到 `sys.dm_db_missing_index_group_stats`
  中的 `group_handle`。 |

  | `index_handle` | `int` | 标识一个缺失索引句柄。此值连接到 `sys.dm_db_missing_index_details` 中的
  `index_handle`。 |


  ### sys.dm_db_missing_index_group_stats


  最后一个缺失索引 DMO 是 DMV `sys.dm_db_missing_index_group_stats`。此 DMV 中的信息包含有关查询优化器预期如何使用缺失索引（如果已构建）的统计信息。由此，使用表
  12-4 中的列，可以确定哪些缺失索引将提供最大的收益以及索引将被使用的范围。这些信息非常有用，并提供了各种指标，有助于更好地理解为何建议某个索引以及如果实施它可能对性能产生的潜在影响。


  表 12-4


  `sys.dm_db_missing_index_group_stats` 中的列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `group_handle` | `int` | 每个缺失索引组的唯一标识符。这是此 DMV 的键值。所有将从使用该缺失索引组中受益的查询都包含在此组中。
  |

  | `unique_compiles` | `bigint` | 将从此缺失索引组受益的执行计划编译和重编译的计数。 |

  | `user_seeks` | `bigint` | 如果缺失索引已构建，用户查询中将发生的查找操作计数。 |

  | `user_scans` | `bigint` | 如果缺失索引已构建，用户查询中将发生的扫描操作计数。 |

  | `last_user_seek` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户查找的日期和时间。 |

  | `last_user_scan` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户扫描的日期和时间。 |

  | `avg_total_user_cost` | `float` | 该组中索引可以降低的用户查询的平均成本。 |

  | `avg_user_impact` | `float` | 如果实施了此缺失索引组，用户查询可能获得的平均百分比收益。 |

  | `system_seeks` | `bigint` | 如果缺失索引已构建，系统查询中将发生的查找操作计数。 |

  | `system_scans` | `bigint` | 如果缺失索引已构建，系统查询中将发生的扫描操作计数。 |

  | `last_system_seek` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统查找的日期和时间。 |

  | `last_system_scan` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统扫描的日期和时间。 |

  | `avg_total_system_cost` | `float` | 该组中索引可以降低的系统查询的平均成本。 |

  | `avg_system_impact` | `float` | 如果实施了此缺失索引组，系统查询可能获得的平均百分比收益。 |



  ### 使用 DMO


  既然已经解释了缺失索引 DMO，现在是时候看看如何将它们结合起来使用以提供缺失索引建议了。缺失索引 DMO 的结果被称为“建议”而非“推荐”。这种措辞上的变化不仅是刻意的，而且至关重要。通常，当有人收到同事的索引推荐时，该推荐是经过深思熟虑、可以立即实施的。但对于缺失索引
  DMO 来说则不然；因此，它们被称为“建议”。


  缺失索引 DMO 提供的建议是一个起点，从中可以开始审视和构建新的索引。在查看缺失索引建议时，有两点需要考虑。首先，每个缺失索引建议的变体可能会在结果中多次出现。不建议实现每个变体。应该找出建议中的常见模式。一个能覆盖少数几个建议的索引通常是理想的。其次，当建议涉及多个列时，需要测试列的顺序以确定哪种是最优的。


  为了帮助解释缺失索引 DMO 的工作原理及其相互关系，将提供一个包含几个 SQL 语句的示例。如清单 12-1 所示，这些语句在 `AdventureWorks2017`
  数据库的 `SalesOrderHeader` 表上执行查询。对于每个查询，过滤条件都基于 `DueDate` 或 `OrderDate` 列，或者两者兼有。


  ```sql

  USE AdventureWorks2017

  GO

  SELECT DueDate FROM Sales.SalesOrderHeader

  WHERE DueDate = ''2014-07-01 00:00:00.000''

  AND OrderDate = ''2014-06-19 00:00:00.000''

  GO

  SELECT DueDate FROM Sales.SalesOrderHeader

  WHERE OrderDate Between ''20140601'' AND ''20140630''

  AND DueDate Between ''20140701'' AND ''20140731''

  GO

  SELECT DueDate, OrderDate FROM Sales.SalesOrderHeader

  WHERE DueDate Between ''20140701'' AND ''20140731''

  GO

  SELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader

  WHERE OrderDate Between ''20140601'' AND ''20140630''

  AND DueDate Between ''20140701'' AND ''20140731''

  GO

  ```


  清单 12-1

  用于生成缺失索引建议的 SQL 语句


  检查任一示例查询的执行计划都会发现，它们都使用聚集索引扫描来满足查询。图 12-1 显示了第一个查询的执行计划。在此执行计划中，存在针对表聚集索引的索引扫描，以及一个可能有助于消除索引扫描的缺失索引建议。


  ![](img/338675_4_En_12_Fig1_HTML.png)


  图 12-1

  清单 12-1 中第一个查询的执行计划


  要查看此缺失索引建议的更多详细信息，可以双击它以生成索引创建语句。虽然这有帮助，但它并未提供该建议背后的详细信息。这些细节能让人更好地理解为何提供此索引建议，以及描述其潜在影响的详细度量指标。要了解这些细节，需要查看缺失索引
  DMO。查询缺失索引 DMO 的语句将类似于清单 12-2。该查询包含了前面描述的等值列、不等值列和包含列信息。它还包含了之前未描述的两个计算字段：`Impact`
  和 `Score`。


  `Impact` 计算有助于识别那些在多次查询执行中具有最高总体影响的缺失索引建议。它是基于平均影响，将缺失索引上潜在的查找和扫描次数相加来计算的；所得值代表所有可能使用该索引的查询所能带来的总体改进。该值越高，索引能提供的改进就越大。


  `Score` 计算同样有助于识别能提高查询性能的缺失索引建议。`Score` 与 `Impact` 的区别在于包含了平均总用户成本。对于 `Score` 计算，平均总用户成本乘以
  `Impact` 分数再除以 100。在决定是否考虑该缺失索引时，成本值的加入有助于区分昂贵和不昂贵的查询。例如，一个为平均成本值为 1,000 的查询提供 80%
  改进的缺失索引建议，其回报可能优于为一个平均成本值为 1 的查询提供 90% 改进的建议。


  在审查索引建议时，始终要考虑该索引所针对的查询的频率及其查询成本。如果一个查询每月运行一次，可以提升 100,000 倍，这值得吗？同样，如果一个查询每秒运行一次，可以提升
  10%，这值得吗？了解这些查询相关联的工作负载有助于确定答案。


  ```sql

  SELECT

  DB_NAME(database_id) AS database_name

  ,OBJECT_NAME(object_id, database_id) AS table_name

  ,mid.equality_columns

  ,mid.inequality_columns

  ,mid.included_columns

  ,(migs.user_seeks + migs.user_scans) * migs.avg_user_impact AS Impact

  ,migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks +
  migs.user_scans) AS Score

  ,migs.user_seeks

  ,migs.user_scans

  FROM sys.dm_db_missing_index_details mid

  INNER JOIN sys.dm_db_missing_index_groups mig ON mid.index_handle = mig.index_handle

  INNER JOIN sys.dm_db_missing_index_group_stats migs ON mig.index_group_handle =
  migs.group_handle

  WHERE DB_NAME(database_id) = ''AdventureWorks2017''

  ORDER BY migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
  + migs.user_scans) DESC

  ```


  清单 12-2

  查询缺失索引 DMO


  图 12-2 显示了执行此查询的一些结果。


  ![](img/338675_4_En_12_Fig2_HTML.png)


  图 12-2

  缺失索引查询的结果


  根据图 12-2 所示的缺失索引查询结果，有几点需要考虑。首先，这些建议之间有很多相似之处。除了一个缺失索引外，每个建议的谓词列都包含 `OrderDate`
  和 `DueDate`。由于列顺序尚未测试，最优列顺序尚不明确。为了满足缺失索引建议，一个可能的索引可以将键列设为 `DueDate` 后跟 `OrderDate`。这种配置将创建一个能满足所有四个缺失索引项的索引。



  接下来要查看的是 `included_columns`。在四个建议中的两个，列出了 `included_columns` 值。在第四个缺失索引建议中，它建议包含
  `OrderDate` 列。由于它将成为索引的关键列之一，因此无需被包含。另一个列来自第三个缺失索引建议，即 `CustomerID` 列。虽然只有一个索引需要此列作为包含列，但添加此列的影响可能微乎其微，因为它是一个窄列。将此列添加到索引中会有价值，尽管对于实现查询的预期性能可能并非必需。


  在查看了这些结果并考虑了四个缺失索引建议后，我们能够提出一个单一索引建议，该索引可以覆盖所有四个缺失索引项。如果使用类似于代码清单 12-3 中的 DDL 语句构建索引，其结果将是一个解决了这些缺失索引问题的索引。如果再次执行代码清单
  12-1 中的查询，执行计划输出将显示所有查询现在都使用针对新索引的索引查找，如图 12-3 所示。


  ![](img/338675_4_En_12_Fig3_HTML.png)


  图 12-3。创建缺失索引后的查询执行计划


  ```

  USE AdventureWorks2017

  GO

  CREATE NONCLUSTERED INDEX missing_index_SalesOrderHeader

  ON Sales.SalesOrderHeader([DueDate], [OrderDate])

  INCLUDE ([CustomerID])

  ```


  `注意`：关于 `数据库引擎优化顾问` 的价值存在许多负面意见。该工具有其适用场景，如果为其提供足够代表性的工作负载，它将返回有价值的建议。这些建议为调优数据库提供了一个比毫无头绪更好的起点。


  ## 数据库引擎优化顾问


  SQL Server 中可用的另一个索引工具是 `数据库引擎优化顾问`。该工具允许 SQL Server 分析来自文件、表、计划缓存或查询存储的工作负载。`DTA`
  的输出可以为工作负载的索引和分区配置提供建议。使用该工具的主要好处是，它不需要深入理解底层数据库即可提出建议。


  无论是处理单个查询还是全天的工作负载，`DTA` 都为以下类型的对象提供索引建议：


  *   用于聚集和非聚集索引的行存储表和列存储表

  *   对齐或非对齐分区

  *   可以支持索引的视图


  通过 `DTA` 中的会话，可以真正将建议重点放在特定环境（无论是事务型还是分析型）的预期上，并同时关注读和写操作，从而提供与这些需求相符的索引建议。还可以修改环境，以查找因磁盘空间变化而产生的索引建议。


  分析完成后，`DTA` 会提供多个报告和输出。这些信息允许审查建议并了解其对数据库的影响。


  尽管 `DTA` 功能相当强大，但该工具也存在一些限制。以下是一些限制：


  *   无法在系统表上推荐索引。

  *   无法添加或删除唯一索引或强制执行主键或唯一约束的索引。

  *   在某些工作负载上可能提供不同的建议。`DTA` 在执行时会采样数据，这将影响建议。

  *   无法对远程服务器上的跟踪表进行调优。

  *   如果调优会话超出限制，对调优工作负载施加的限制可能对建议产生负面影响。


  `注意`：作为一种索引工具，`DTA` 很容易被滥用。这通常是由于未提供代表性工作负载或未经适当测试就采纳建议所致。使用该工具时，请务必验证所建议的任何更改，并在将其应用于生产环境之前彻底测试这些更改。



  ### 解释 DTA


  用户可以通过图形用户界面（GUI）和命令行实用程序两种方式与数据库引擎优化顾问（DTA）进行交互。这两种方法提供了大部分相同的功能。根据用户的熟练程度，两种方式都可以有效使用。


  GUI 工具为 DTA 提供了一个包装器，本章大部分内容将使用它。它允许选择可用的选项，并能够查看先前执行的调优会话。对于查看调优结果，GUI 非常适合此任务。可以通过
  GUI 配置和执行调优会话。


  命令行实用程序在配置和执行会话方面提供了与 GUI 相同的功能。命令行实用程序可以通过开关或 XML 配置文件进行配置。这两种选项都允许数据库管理员（DBA）和开发人员构建流程来自动执行调优活动，以审查和分析工作负载，并构建一个索引调优流程，使
  DBA 能够直接处理结果。将 DTA 实用程序集成到性能调优方法中将在第 17 章中讨论。


  对于这两种工具，都需要进行两个一般领域的配置。第一个确定调优会话将如何与物理设计结构（PDS）交互并提出建议。第二个确定 DTA 在尝试调优数据库时应采用何种分区策略。


  关于如何生成物理设计结构建议的选项有两个部分。第一个要配置的选项是调优中使用哪种类型的 PDS。物理设计结构可以扩展到包括考虑筛选索引和列存储索引。物理设计结构使用的选项如下：

  *   索引和索引视图。

  *   索引（默认选项）。

  *   仅评估现有 PDS 的利用情况。

  *   索引视图。

  *   非聚集索引。


  下一个 PDS 选项是索引调优中要考虑的分区。DTA 提供使用无分区、对齐分区或完全分区。使用完全分区时，建议将考虑表是否应包含已分区和未分区的索引。


  最后一个 PDS 选项确定要在数据库中保留哪些对象。此选项有助于确保提供的建议不会对先前测试和部署的调优产生不利影响。以下是要在数据库中保留的 PDS 项目的选项：

  *   不保留任何现有 PDS。

  *   保留所有现有 PDS（默认选项）。

  *   保留对齐分区。

  *   仅保留索引。

  *   仅保留聚集索引。


  除了这些选项之外，还有几个其他选项可以配置。这些选项确定调优会话将运行多长时间，如果需要分析大量数据库，这可能至关重要。同样，对于大型工作负载，可能需要防止其运行时间过长。此外，可以定义建议的最大磁盘空间和每个索引的最大列数。最后一个设置选项指示索引建议是否可以或必须能够在线部署。


  **注意**

  在继续下一节之前，请运行清单 12-1 中的代码。如果清单 12-3 中的索引已创建，请使用清单 12-4 中提供的 `DROP INDEX` 语句删除该索引。

  ```

  USE AdventureWorks2017

  GO

  DROP INDEX IF EXISTS Sales.SalesOrderHeader.missing_index_SalesOrderHeader;

  Listing 12-4

  DDL Statement to Drop Index missing_index_SalesOrderHeader

  ```


  ### 使用 DTA GUI


  如本章前面所述，与 DTA 交互的一种方式是通过 GUI。在本节中，将提供一个场景来演示如何使用 DTA 进行索引调优。有几种启动该工具的方法。第一个选项在 SQL
  Server Management Studio（SSMS）中。在 SSMS 中，导航到菜单栏的“工具”➤“数据库引擎优化顾问”。另一个选项是从“开始”菜单的“Microsoft
  SQL Server 工具”中打开“数据库引擎优化顾问”。


  启动 DTA 后，系统将提示连接到 SQL Server 实例。连接后，该工具将打开一个新的调优会话以供配置。图 12-4 显示了一个 DTA 会话。


  ![](img/338675_4_En_12_Fig4_HTML.png)


  数据库引擎优化顾问窗口有一个标签页，左侧“会话监视器”下标记为“索引书管理员”。从打开的“常规”选项卡中显示了会话名称和负载等信息。


  **图 12-4**

  数据库引擎优化顾问的常规配置屏幕


  在“常规”选项卡的会话启动屏幕中，最初有一些需要配置的内容。首先是会话名称，可以是任何值。默认值包括用户名以及日期和时间。接下来，选择将使用的工作负载类型。工作负载有四个选项：

  *   `文件`：包含 SQL 跟踪输出、XML 配置或 SQL 脚本的文件。

  *   `表`：包含 SQL 跟踪输出的 SQL Server 数据库表。使用表之前，请确保填充它的跟踪已完成。

  *   `计划缓存`：调优会话所连接到的 SQL Server 的计划缓存。此功能在 SQL Server 2012 中引入，提供了一个强大的机制来调优 SQL
  Server 环境中正在使用的执行计划。

  *   `查询存储`：调优会话所连接到的选定数据库的查询存储。此选项在 SQL Server 2016 中引入，与计划缓存类似，为调优实际工作负载提供了极好的机制，且工作量最小。


  每种工作负载都可以用于提供建议。通过这些工作负载来源中的每一种，都有机会调优所需的任何类型的工作负载。出于本练习的目的，请选择“计划缓存”选项。


  下一步是选择要调优的数据库和表。对于大型数据库，仅选择属于需要索引建议的工作负载一部分的表至关重要。当 DTA 执行时，它将根据表中的信息生成统计信息，需要考虑的表越少，调优会话完成得越快。在继续之前，在“选择要调优的数据库和表”部分中选中
  `AdventureWorks2017` 数据库旁边的复选框。


  **注意**

  请勿在生产 SQL Server 环境中使用 DTA。该工具使用强力策略来识别索引建议并创建假设索引以支持此工作。在生产环境中运行该工具可能会对服务器上的其他工作负载性能产生不利影响。考虑从命令行运行
  DTA 并在远程 SQL Server 上分析生产数据库。本章稍后将演示此技术，并在第 17 章中进一步讨论。


  配置好“常规”选项后，下一步是配置“调优选项”设置。在图 12-5 所示的屏幕上，取消选中“限制调优时间”选项。对于其他选项，请保留其默认选择。这些应该如下所示：

  ![](img/338675_4_En_12_Fig5_HTML.png)



  数据库引擎调优顾问的一个窗口中，在会话监视器下方的左侧面板中，有一个标签为**索引书管理器**的选项卡。从打开的调优选项选项卡中，会显示诸如要使用并保留在数据库中的`PDS`（物理设计结构）等信息片段。


  **图 12-5**

  数据库引擎调优顾问的调优选项配置屏幕


  *   *要在数据库中使用的物理设计结构 (`PDS`)*：索引

  *   *要采用的分区策略*：不分区

  *   *要保留在数据库中的物理设计结构 (`PDS`)*：保留所有现有 `PDS`


  下一步是启动数据库引擎调优顾问。这可以通过工具栏或菜单完成，选择 `操作` ➤ `开始分析`。启动`DTA`后，“进度”选项卡将打开，如图 12-6 所示。


  ![](img/338675_4_En_12_Fig6_HTML.png)


  **图 12-6**

  数据库引擎调优顾问的进度屏幕


  数据库引擎调优顾问的一个窗口中，在会话监视器下方的左侧面板中，有一个标签为**索引书管理器**的选项卡。从打开的进度选项卡中，会显示调优进度和调优日志。


  几分钟后，调优会话将完成，不过所需时间完全取决于给定计算机的工作负载。使用清单 12-1 中的索引，结果应与图 12-7 中的类似。在这些结果中，有两条建议。虽然名称在不同环境中会有所不同，但建议应如下所示：


  ![](img/338675_4_En_12_Fig7_HTML.png)


  **图 12-7**

  数据库引擎调优顾问的建议


  数据库引擎调优顾问的一个窗口中，在会话监视器下方的左侧面板中，有一个标签为**索引书管理器**的选项卡。从打开的建议选项卡中，会显示分区建议部分下方的索引建议部分中的几个复选框。


  *   在 `OrderDate` 和 `DueDate` 上建立索引，并包含 `CustomerID`

  *   在 `OrderDate` 和 `DueDate` 上建立统计信息


  此索引与之前使用缺失索引 `DMO`（动态管理对象）找到的建议相似。在提供多条建议的情况下，有必要考虑与审查来自缺失索引 `DMO` 的建议时相同的因素，例如“这些建议能否合并？”此外，当建议创建统计信息时，它们是否与将要创建的索引足够匹配，以至于该索引能够提供查询所需的统计信息？要从建议列表中删除任何项目，请取消选中其复选框，这样它就不会包含在任何建议输出中。


  此时，有几种选项可用于应用索引：


  *   *应用索引*：要应用索引，请在菜单栏中选择 `操作`，然后选择 `应用建议`。在出现的 `应用建议` 窗口中，保留默认选项 `立即应用` 被选中，然后单击确定。

  *   *将来应用索引*：要将来应用索引，请在菜单栏中选择 `操作`，然后选择 `应用建议`。在出现的 `应用建议` 窗口中，选择“计划稍后执行”。根据需要修改计划的日期，然后单击确定。这将创建一个
  `SQL Server 代理` 作业。请确保 `SQL Server 代理` 正在运行，并且代理服务帐户具有应用索引所需的权限。

  *   *保存建议*：要保存建议，请单击菜单栏中的 `保存建议` 图标，然后按组合键 `Ctrl+S`，或在菜单栏中选择 `操作` ➤ `保存建议`。


  如果保存建议，它们将生成一个类似于清单 12-5 中的脚本。在应用来自 `DTA` 的索引之前，建议将索引名称更改为符合您组织索引命名标准。同样重要的是要考虑是否对索引应用压缩。至于统计信息，添加这些就不那么重要了，原因有几个。首先，`SQL
  Server` 会在后台根据需要自动创建统计信息，无需手动创建自定义统计信息。其次，索引本身就包含统计信息，通常能提供所需的内容。


  ```sql

  use AdventureWorks2017;

  go

  CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderHeader_8_1922105888__K4_K3_11] ON
  [Sales].[SalesOrderHeader]

  (

  [DueDate] ASC,

  [OrderDate] ASC

  )

  INCLUDE([CustomerID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE =
  OFF) ON [PRIMARY]

  go

  ```

  **清单 12-5**

  数据库引擎调优顾问索引建议


  通过其 `GUI`（图形用户界面）使用 `DTA`，可以快速优化工作负载。返回的建议提供了比使用缺失索引 `DMO` 更高层次的索引调优。本质上，它们提供了一种强力的索引实践，可以在不改进代码的情况下提升性能。这样，就无需花费大量时间调优那些只需添加几个新索引就能解决的问题，而是可以将时间和精力集中在比仅仅添加索引更复杂的性能调优问题上。


  **注意**

  如果 `DTA` 在处理过程中被终止，有时会留下一些假设索引，这些索引是它在调查可能改善环境的索引时使用的。假设索引是仅包含统计信息而不包含数据的索引。可以通过
  `sys.indexes` 中的 `is_hypothetical` 列来识别这些索引。如果它们存在于您的环境中，应始终将其删除。


  ### 使用 `DTA` 实用工具


  `GUI` 并不是在 `SQL Server` 环境中使用 `DTA` 的唯一方式。另一种方式是通过命令行使用 `DTA` 实用工具。`DTA` 实用工具虽然缺乏交互式界面，但它通过可以在脚本和自动化中灵活利用该实用工具来弥补这一不足。


  使用 `DTA` 实用工具的语法如清单 12-6 所示，包含多个参数。这些参数在表 12-5 中定义，它们使得 `DTA` 实用工具具有与 `GUI` 相同的功能和灵活性。配置信息是通过这些参数传入的，而不是通过点击多个屏幕。


  **表 12-5**

  DTA 实用工具参数




  #### DTA 参数说明


  | 参数 | 描述 |

  | --- | --- |

  | `-?` | 返回帮助信息，包括所有参数的列表。 |

  | `-A` | 提供时间限制（以分钟为单位），指定 DTA 实用程序优化工作负载的时间上限。默认时间限制为 8 小时，即 640 分钟。将限制设置为 0 将导致无限制的优化会话。
  |

  | `-a` | 在工作负载优化后，无需进一步提示即可应用推荐。 |

  | `-B` | 指定推荐索引可以消耗的最大大小（以兆字节为单位）。默认情况下，该值设置为当前原始数据大小的三倍，或附加磁盘驱动器的可用空间加上原始数据大小，以两者中较小者为准。
  |

  | `-c` | DTA 在索引中推荐的键列的最大数量。此值默认为 `16`。此限制不包括 `INCLUDED` 列。 |

  | `-C` | DTA 在索引中推荐的列的最大数量。该值默认为 `16`，但可以提高到 `1024`（索引允许的最大列数）。 |

  | `-d` | 标识 DTA 会话开始时连接到的数据库。此参数只能指定单个数据库。 |

  | `-D` | 标识 DTA 会话将针对其优化工作负载的数据库。此参数可以指定一个或多个数据库。要将会话添加多个数据库，可以在一个参数中以逗号分隔的列表包含所有数据库名称，或者每个数据库添加一个参数。
  |

  | `-e` | 标识日志表或文件的名称，DTA 会话将输出无法优化的事件。指定表名时，请使用三部分命名约定 `[database_name].[schema_name].[table_name]`。对于输出文件，文件的扩展名应为
  `.xml`。 |

  | `-E` | 使用可信连接设置数据库连接。未使用必需参数 `-U` 时需要。 |

  | `-F` | 授予 DTA 权限以覆盖已存在的输出文件。 |

  | `-fa` | 标识 DTA 会话可以在推荐中包含的物理设计结构的类型。此参数的默认值为 `IDX`。可用值如下：<br>• `IDX_IV`：索引和索引视图<br>•
  `IDX`：仅索引<br>• `IX`：仅索引视图<br>• `NCL_IDX`：仅非聚集索引 |

  | `-fi` | 允许 DTA 会话包含对筛选索引的推荐。 |

  | `-fc` | 允许 DTA 会话包含对列存储索引的推荐。 |

  | `-fk` | 设置 DTA 会话可以在推荐中修改的现有物理设计结构的限制。可用值如下：<br>• `NONE`：无现有结构<br>• `ALL`：所有现有结构<br>•
  `ALIGNED`：所有分区对齐的结构<br>• `CL_IDX`：表上的所有聚集索引<br>• `IDX`：表上的所有聚集和非聚集索引 |

  | `-fp` | 确定是否可以将分区推荐包含在 DTA 会话推荐中。此参数的默认值为 `NONE`。可用值如下：<br>• `NONE`：无分区<br>• `FULL`：完整分区<br>•
  `ALIGNED`：对齐分区 |

  | `-fx` | 限制 DTA 会话仅包含删除现有物理设计结构的推荐。评估会话中使用不频繁的索引，并提供删除它们的推荐。此参数不能与参数 `-fa`、`-fp`
  和 `-fk ALL` 一起使用。 |

  | `-ID` | 为 DTA 会话设置数字标识符。必须指定此参数或 `-s`。 |

  | `-ip` | 将 DTA 会话的工作负载源设置为计划缓存。分析使用 `-D` 参数指定的数据库的前 `–n` 个计划缓存事件。 |

  | `-ipf` | 将 DTA 会话的工作负载源设置为计划缓存。分析所有数据库的前 `–n` 个计划缓存事件。 |

  | `-if` | 将 DTA 会话的工作负载源设置为文件源。路径和文件名通过此参数传递。文件必须是 SQL Server Profiler 跟踪文件 (`.trc`)、SQL
  文件 (`.sql`) 或 SQL Server 跟踪文件 (`.log`)。 |

  | `-it` | 将 DTA 会话的工作负载源设置为表。指定表名时，请使用三部分命名约定 `[database_name].dbo.[table_name]`。表的架构必须是
  `dbo`。 |

  | `-ix` | 标识包含 DTA 会话配置信息的 XML 文件。XML 文件必须符合 `DTASchema.xsd`（位于 [`http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd`](http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd)）。
  |

  | `-m` | 设置推荐必须提供的最小改进百分比。 |

  | `-n` | 设置 DTA 会话应优化的工作负载中的事件数量。为跟踪文件指定时，所选事件的顺序基于持续时间的降序。 |

  | `-N` | 确定物理设计结构是联机还是脱机创建。可用值如下：<br>• `OFF`：不联机创建任何对象。<br>• `ON`：所有对象联机创建。<br>•
  `MIXED`：尽可能创建对象。 |

  | `-of` | 配置 DTA 会话以 T-SQL 格式输出推荐到指定的路径和文件。 |

  | `-or` | 配置 DTA 会话将推荐输出为 XML 格式的报告。未提供文件名时，将使用基于会话 (`-s`) 名称的文件名。 |

  | `-ox` | 配置 DTA 会话以 XML 格式输出推荐到指定的路径和文件。 |

  | `-P` | 设置数据库连接中 SQL 登录使用的密码。 |

  | `-q` | 将 DTA 会话设置为以静默模式执行。 |

  | `-rl` | 配置 DTA 会话将生成的报告。可以在逗号分隔的列表中选择一个或多个报告。可用值如下：<br>• `ALL`：所有分析报告<br>• `STMT_COST`：语句成本报告<br>•
  `EVT_FREQ`：事件频率报告<br>• `STMT_DET`：语句详细信息报告<br>• `CUR_STMT_IDX`：语句-索引关系报告（当前配置）<br>•
  `REC_STMT_IDX`：语句-索引关系报告（推荐配置）<br>• `STMT_COSTRANGE`：语句成本范围报告<br>• `CUR_IDX_USAGE`：索引使用情况报告（当前配置）<br>•
  `REC_IDX_USAGE`：索引使用情况报告（推荐配置）<br>• `CUR_IDX_DET`：索引详细信息报告（当前配置）<br>• `REC_IDX_DET`：索引详细信息报告（推荐配置）<br>•
  `VIW_TAB`：视图-表关系报告<br>• `WKLD_ANL`：工作负载分析报告<br>• `DB_ACCESS`：数据库访问报告<br>• `TAB_ACCESS`：表访问报告<br>•
  `COL_ACCESS`：列访问报告 |

  | `-S` | 设置 DTA 会话要使用的 SQL Server 实例。 |

  | `-s` | 设置 DTA 会话的名称。 |

  | `-Tf` | 标识包含用于优化的表列表的路径和文件的名称。该文件应包含使用三部分命名约定的每行一个表。在每个表名之后，可以指定行数以针对该表的缩放版本优化工作负载。如果省略
  `-Tf` 和 `-Tl`，DTA 会话将默认使用所有表。 |

  | `-Tl` | 设置用于优化的表列表。每个表应使用三部分命名约定列出，每个表名用逗号分隔。如果省略 `-Tf` 和 `-Tl`，DTA 会话将默认使用所有表。
  |

  | `-U` | 设置数据库连接中 SQL 登录使用的用户名。未使用必需参数 `-E` 时需要。 |

  | `-u` | 启动 DTA 的 GUI 界面，其中包含为 DTA 实用程序指定的所有配置值。 |

  | `-x` | 启动 DTA 会话并在完成后退出。 |




  ```

  dta

  [ -? ] |

  [

  [ -S 服务器名[ \实例名 ] ]

  { { -U 登录 ID [-P 密码 ] } | –E  }

  { -D 数据库名 [ ,...n ] }

  [ -d 数据库名 ]

  [ -Tl 表列表 | -Tf 表列表文件 ]

  { -if 工作负载文件 | -it 工作负载跟踪表名  | -ip | -ipf }

  { -s 会话名 | -ID 会话 ID }

  [ -F ]

  [ -of 输出脚本文件名 ]

  [ -or 输出 XML 报告文件名 ]

  [ -ox 输出 XML 文件名 ]

  [ -rl 分析报告列表 [ ,...n ] ]

  [ -ix 输入 XML 文件名 ]

  [ -A 调优时间（分钟） ]

  [ -n 事件数量 ]

  [ -m 最小改进百分比 ]

  [ -fa 要添加的物理设计结构 ]

  [ -fi 筛选索引]

  [ -fc 列存储索引]

  [ -fp 分区策略 ]

  [ -fk 保留现有选项 ]

  [ -fx 仅删除模式 ]

  [ -B 存储大小 ]

  [ -c 索引中最大键列数 ]

  [ -C 索引中最大列数 ]

  [ -e | -e 调优日志名 ]

  [ -N 在线选项]

  [ -q ]

