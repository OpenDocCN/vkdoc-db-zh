  > 动态管理函数 `sys.dm_db_database_page_allocations` 是 `DBCC IND` 的替代品。此函数在 SQL Server
  2012 中引入，与之前的 DBCC 命令相比，它提供了一个改进的接口来检查数据库中对象的页面分配。


