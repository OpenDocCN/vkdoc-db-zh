  在本节中，讨论的重点是隐式数据转换及其对查询性能的负面影响。虽然这些转换可能比显式数据转换更隐蔽，但相同的概念和缓解方法同样适用。由于它们更具意图性，因此应该更少发生。即便如此，在执行数据转换时，也要密切关注所涉及的数据类型，因为它们的更改方式将影响查询性能和索引利用率。



  ## 摘要


  本章通过分析查询结构，旨在理解索引何时能被有效利用，以及何时其使用会受到阻碍，从而对性能产生负面影响。有时，特定类型的索引可能并不适用于某些场景，例如在大表中搜索字符串内的值。而在其他情况下，在正确的地方应用正确类型的索引或函数，会对查询能否使用索引产生重大影响。


  在本章的许多示例中，通过使用索引扫描（而非索引查找），使有问题的索引使用情况变得清晰明了。在这些场景中，索引查找是理想的索引操作。然而情况并非总是如此，在某些情况下，对索引进行扫描才是最佳操作符，例如当需要读取整个表（或大部分表）时。理解环境所针对的事务类型以及所访问表的大小至关重要。


  本章的主要结论是：查询结构往往与索引结构同等重要。在开发数据库代码时所做的选择，可能会完全破坏为正确建立数据库索引所做的努力。务必让索引策略辅以高效的代码，以充分发挥其潜力。


  '
- "# 15. 监控索引\n\n本书已讨论了许多主题，例如索引是什么、它们的作用、构建索引的模式，以及确定 SQL Server 数据库应如何建立索引的诸多其他方面。所有这些信息对于索引数据库的最后一步——分析数据库以确定哪些索引是必需的——都是必要的。本书最后三章将整合实施索引方法所需的信息。\n\
  \n首先，本章将讨论一种可用于监控索引的通用实践。它将包括可采取的步骤，用以观察索引的行为并理解它们如何影响环境。此方法可应用于单个数据库、一个服务器或整个 SQL\
  \ Server 环境。无论数据库支持何种类型的运营或业务，都可以使用类似的监控流程。\n\n监控索引背后的主要目标是创建收集、存储和报告索引相关信息的能力。这些信息将来自多种来源。监控的来源应该很熟悉，因为它们常用于与索引类似的任务，例如性能调优。对于某些来源，信息将随时间推移而收集，以提供总体趋势的概念。对于其他来源，在特定时间点的快照就足够了。重要的是要随时间收集一些信息，以提供一个基准来比较性能。这将有助于理解索引使用情况和有效性何时发生了变化。\n\
  \n监控索引需要从多个来源收集信息。本章将讨论的来源如下：\n\n*   性能计数器\n*   动态管理对象\n*   事件追踪\n\n针对这些来源中的每一个，后续章节将描述需要收集的内容，并就如何收集这些信息提供指导。到本章结束时，将形成一个框架，能够提供启动分析阶段所需的信息。\n\
  \n> 注意\n> \n> 本章的所有监控信息将收集在一个名为 `IndexingMethod` 的数据库中。脚本可以在该数据库中运行，也可以在另一个性能监控数据库中运行。\n\
  \n### 性能计数器\n\n监控索引的第一个信息来源是 SQL Server 性能计数器。性能计数器是 Microsoft 提供的度量标准，用于衡量服务器上应用程序和硬件中事件的发生速率或资源的状态。对于某些性能计数器，存在通用准则可用于指示何时可能存在索引问题。对于其他计数器，其速率或级别的变化可能表明需要调整服务器上的索引。\n\
  \n使用性能计数器的主要挑战在于，它们代表的是服务器级别或 SQL Server 实例级别的计数器状态。它们并不指示可能发生索引问题的数据库或表级别。不过，在考虑到可用于监控索引和识别潜在索引需求的其他工具时，这种详细程度是可接受且有用的。在此级别收集计数器信息的一个优势是，我们被迫考虑全局以及所有索引对性能的影响。在孤立的情况下，一个表上几个性能不佳的索引可能是可以接受的。然而，当与其他索引不佳的表结合时，总体性能可能会达到一个临界点，此时索引性能问题需要得到解决。借助性能计数器提供的服务器级别统计信息，我们将能够识别何时达到了这个临界点。\n\
  \nSQL Server 和 Windows Server 有许多可用的性能计数器。但从索引的角度来看，许多性能计数器可以忽略。最有用的性能计数器是那些映射到与索引操作或访问方式相关的操作，例如转送的记录和索引搜索。有关对索引最有用的性能计数器的定义，请参见表\
  \ 15-1。收集每个计数器的原因及其如何影响索引决策将在下一章讨论。\n\n表 15-1\n索引相关性能计数器\n\n| 选项名称 | 描述 |\n| ---\
  \ | --- |\n| `Access Methods\\Forwarded Records/sec` | 每秒通过转送记录指针获取的记录数 |\n| `Access\
  \ Methods\\FreeSpace Page Fetches/sec` | 每秒在已分配给对象的页面中获取页面以插入或修改记录的次数 |\n| `Access\
  \ Methods\\FreeSpace Scans/sec` | 每秒启动的扫描次数，用于在已分配给对象的页面中搜索空闲空间以插入或修改记录 |\n| `Access\
  \ Methods\\Full Scans/sec` | 每秒无限制的完全扫描次数。可以是基表扫描或完整索引扫描 |\n| `Access Methods\\\
  Index Searches/sec` | 每秒索引搜索次数。这些搜索用于启动范围扫描和单索引记录获取，以及重新定位索引 |\n| `Access Methods\\\
  Page compression attempts/sec` | 每秒使用 PAGE 压缩尝试压缩页面的次数；包括失败的页面压缩 |\n| `Access Methods\\\
  Pages compressed/sec` | 每秒使用 PAGE 压缩成功压缩的页面数 |\n| `Access Methods\\Page Splits/sec`\
  \ | 每秒发生的页拆分次数，由索引页面溢出导致 |\n| `Buffer Manager\\Page Lookups/sec` | 在缓冲池中查找页面的请求数\
  \ |\n| `Locks(*)\\Lock Wait Time (ms)` | 上一秒中锁的总等待时间（毫秒） |\n| `Locks(*)\\Lock Waits/sec`\
  \ | 每秒导致调用方需要等待的锁请求数 |\n| `Locks(*)\\Number of Deadlocks/sec` | 每秒导致死锁的锁请求数 |\n\
  | `SQL Statistics\\Batch Requests/sec` | 每秒接收到的 Transact SQL 命令批次数 |\n\n\n\n收集性能计数器的方法有多种。本章的监控将使用动态管理视图\
  \ `sys.dm_os_performance_counters`。该视图会为实例的所有 SQL Server 计数器返回一行。返回的值是计数器的原始值。根据计数器类型，该值可以是时间点的状态值，也可以是持续累积的聚合值。\n\
  \n为了开始收集用于监控的性能计数器信息，需要创建一个表来存储这些信息。清单 15-1 中的表定义满足此需求。在收集性能计数器时，将使用一个表来存储计数器名称及其值，并为每一行添加日期戳以标识信息的收集时间。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCounters\n(\ncounter_id\
  \ INT IDENTITY(1, 1),\ncreate_date DATETIME2(0),\nserver_name VARCHAR(128) NOT NULL,\n\
  object_name VARCHAR(128) NOT NULL,\ncounter_name VARCHAR(128) NOT NULL,\ninstance_name\
  \ VARCHAR(128) NULL,\nCalculated_Counter_value FLOAT NULL,\nCONSTRAINT PK_IndexingCounters\n\
  PRIMARY KEY CLUSTERED (counter_id)\n);\nGO\nCREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName\n\
  ON dbo.IndexingCounters (counter_name)\nINCLUDE (create_date, server_name, object_name,\
  \ Calculated_Counter_value);\n```\n\n清单 15-1\n性能计数器快照表\n\n为了收集索引监控信息，将从 `sys.dm_os_performance_counters`\
  \ 收集信息，并用于计算该动态管理视图中的适当值。这些值与从其他工具（如 `性能监视器`）查看性能计数器信息时可用的值相同。需要几个步骤来填充 `dbo.IndexingCounters`。该动态管理视图包含原始计数器值。为了正确计算这些值，需要对动态管理视图中的值进行多次快照，每次快照间隔数秒，然后计算值之间的差异。在清单\
  \ 15-2 中，计数器值在 10 秒后计算。时间一到，计数器值即被计算并插入到 `dbo.IndexingCounters` 表中。此脚本应被计划并频繁执行。理想情况下，应每\
  \ 1-5 分钟收集一次此信息，不过频率可以根据特定环境中的索引活动级别进行调整。您可以自定义此过程的时机以满足特定数据库的索引需求。\n\n注意\n\n性能计数器信息可以更频繁地收集。例如，`性能监视器`\
  \ 默认为每 15 秒收集一次。对于索引监控而言，无需如此高的频率。\n\n```sql\nUSE IndexingMethod;\nGO\nDROP TABLE\
  \ IF EXISTS #Counters;\nSELECT pc.object_name,\npc.counter_name\nINTO #Counters\n\
  FROM sys.dm_os_performance_counters pc\nWHERE pc.cntr_type IN ( 272696576, 1073874176\
  \ )\nAND (\npc.object_name LIKE '%:Access Methods%'\nAND (\npc.counter_name LIKE\
  \ 'Forwarded Records/sec%'\nOR pc.counter_name LIKE 'FreeSpace Scans/sec%'\nOR pc.counter_name\
  \ LIKE 'FreeSpace Page Fetches/sec%'\nOR pc.counter_name LIKE 'Full Scans/sec%'\n\
  OR pc.counter_name LIKE 'Index Searches/sec%'\nOR pc.counter_name LIKE 'Page Splits/sec%'\n\
  OR pc.counter_name LIKE 'Page compression attempts/sec%'\nOR pc.counter_name LIKE\
  \ 'Pages compressed/sec%'\n)\n)\nOR (\npc.object_name LIKE '%:Buffer Manager%'\n\
  AND (\npc.counter_name LIKE 'Page life expectancy%'\nOR pc.counter_name LIKE 'Page\
  \ lookups/sec%'\n)\n)\nOR (\npc.object_name LIKE '%:Locks%'\nAND (\npc.counter_name\
  \ LIKE 'Lock Wait Time (ms)%'\nOR pc.counter_name LIKE 'Lock Waits/sec%'\nOR pc.counter_name\
  \ LIKE 'Number of Deadlocks/sec%'\n)\n)\nOR (\npc.object_name LIKE '%:SQL Statistics%'\n\
  AND pc.counter_name LIKE 'Batch Requests/sec%'\n)\nGROUP BY pc.object_name,\npc.counter_name;\n\
  DROP TABLE IF EXISTS #Baseline;\nSELECT GETDATE() AS sample_time,\npc1.object_name,\n\
  pc1.counter_name,\npc1.instance_name,\npc1.cntr_value,\npc1.cntr_type,\nx.cntr_value\
  \ AS base_cntr_value\nINTO #Baseline\nFROM sys.dm_os_performance_counters pc1\n\
  INNER JOIN #Counters c ON c.object_name = pc1.object_name\nAND c.counter_name =\
  \ pc1.counter_name\nOUTER APPLY (\nSELECT cntr_value\nFROM sys.dm_os_performance_counters\
  \ pc2\nWHERE pc2.cntr_type           = 1073939712\nAND UPPER(pc1.counter_name) =\
  \ UPPER(pc2.counter_name)\nAND pc1.object_name         = pc2.object_name\nAND pc1.instance_name\
  \       = pc2.instance_name\n) x;\nWAITFOR DELAY '00:00:15';\nINSERT INTO dbo.IndexingCounters\
  \ (\ncreate_date,\nserver_name,\nobject_name,\ncounter_name,\ninstance_name,\nCalculated_Counter_value\n\
  )\nSELECT GETDATE(),\nLEFT(pc1.object_name, CHARINDEX(':', pc1.object_name) - 1),\n\
  SUBSTRING(pc1.object_name, 1 + CHARINDEX(':', pc1.object_name), LEN(pc1.object_name)),\n\
  pc1.counter_name,\npc1.instance_name,\nCASE\nWHEN pc1.cntr_type = 65792 THEN pc1.cntr_value\n\
  WHEN pc1.cntr_type = 272696576 THEN\nCOALESCE((1. * pc1.cntr_value - x.cntr_value)\
  \ / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0), 0)\nWHEN pc1.cntr_type = 537003264\
  \ THEN COALESCE((1. * pc1.cntr_value) / NULLIF(base.cntr_value, 0), 0)\nWHEN pc1.cntr_type\
  \ = 1073874176 THEN\nCOALESCE(\n(1. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value\
  \ - x.base_cntr_value, 0)\n/ NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),\n0\n\
  ) END AS real_cntr_value\nFROM sys.dm_os_performance_counters pc1\nINNER JOIN #Counters\
  \ c ON c.object_name = pc1.object_name\nAND c.counter_name = pc1.counter_name\n\
  OUTER APPLY (\nSELECT cntr_value,\nbase_cntr_value,\nsample_time\nFROM #Baseline\
  \ b\nWHERE b.object_name   = pc1.object_name\nAND b.counter_name  = pc1.counter_name\n\
  AND b.instance_name = pc1.instance_name\n) x\nOUTER APPLY (\nSELECT cntr_value\n\
  FROM sys.dm_os_performance_counters pc2\nWHERE pc2.cntr_type           = 1073939712\n\
  AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)\nAND pc1.object_name     \
  \    = pc2.object_name\nAND pc1.instance_name       = pc2.instance_name\n) base;\n\
  ```\n\n清单 15-2\n性能计数器快照脚本\n\n第一次为索引收集性能计数器时，无法将计数器值与 SQL Server 数据库实例的其他合理值进行比较。但随着时间的推移，可以保留先前的性能计数器样本以进行比较。作为监控的一部分，重要的是识别出性能计数器值代表您环境典型活动的时期。利用这些数据，可以识别异常情况或使用非典型、需要关注的时期。\n\
  \n\n\n### 性能计数器与动态管理对象监控\n\n### 建立性能基线表\n\n要存储这些值，请将它们插入到一个类似于清单 15-3 的表中。此表包含开始日期和结束日期，以指示基线所代表的范围。此外，还有最小值、最大值、平均值和标准差列，用于存储从收集的计数器中获取的值。最小值和最大值将有助于理解性能计数器的变化情况。平均值提供了计数器值在“良好”状态时的概貌。标准差使我们能够了解计数器值的变异性。数值越低，表示计数器值越频繁地聚集在平均值附近。数值越高，则表示计数器值变化更频繁，并且通常更接近最小值和最大值。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCountersBaseline\n(\n\
  \    counter_baseline_id INT IDENTITY(1, 1),\n    start_date DATETIME2(0),\n   \
  \ end_date DATETIME2(0),\n    server_name VARCHAR(128) NOT NULL,\n    object_name\
  \ VARCHAR(128) NOT NULL,\n    counter_name VARCHAR(128) NOT NULL,\n    instance_name\
  \ VARCHAR(128) NULL,\n    minimum_counter_value FLOAT NULL,\n    maximum_counter_value\
  \ FLOAT NULL,\n    average_counter_value FLOAT NULL,\n    standard_deviation_counter_value\
  \ FLOAT NULL,\n    CONSTRAINT PK_IndexingCountersBaseline\n        PRIMARY KEY CLUSTERED\
  \ (counter_baseline_id)\n);\nGO\n```\n**清单 15-3 性能计数器基线表**\n\n### 填充基线数据\n\n将值填充到\
  \ `dbo.IndexingCountersBaseline` 表中的过程有两个步骤。首先，需要从代表典型一周的性能计数器中收集样本。如果没有典型的一周，则选择本周并为其收集样本。收集到典型一周的数据后，下一步是将信息聚合到基线表中。这实质上是总结\
  \ `dbo.IndexingCounters` 表中特定日期范围内的信息。在清单 15-4 中，数据范围是从 2019 年 8 月 1 日到 8 月 15 日。接下来是验证基线。仅仅因为过去一周的平均值显示每秒转发记录数为\
  \ 100，并不意味着该值代表了一个良好的基线。应使用服务器和数据库的经验来影响基线中的值。如果最近的趋势低于或高于正常水平，请根据需要调整基线。\n\n```sql\n\
  USE IndexingMethod;\nGO\nDECLARE @StartDate DATETIME = '20190911',\n        @EndDate\
  \       DATETIME = '20190918';\nINSERT INTO dbo.IndexingCountersBaseline (\n   \
  \ start_date,\n    end_date,\n    server_name,\n    object_name,\n    counter_name,\n\
  \    instance_name,\n    minimum_counter_value,\n    maximum_counter_value,\n  \
  \  average_counter_value,\n    standard_deviation_counter_value\n)\nSELECT MIN(create_date),\n\
  \       MAX(create_date),\n       server_name,\n       object_name,\n       counter_name,\n\
  \       instance_name,\n       MIN(Calculated_Counter_value),\n       MAX(Calculated_Counter_value),\n\
  \       AVG(Calculated_Counter_value),\n       STDEV(Calculated_Counter_value)\n\
  FROM dbo.IndexingCounters\nWHERE create_date BETWEEN @StartDate AND @EndDate\nGROUP\
  \ BY server_name,\n         object_name,\n         counter_name,\n         instance_name;\n\
  ```\n**清单 15-4 填充计数器基线表**\n\n### 其他收集与查看工具\n\n还有其他方法可以收集和查看 SQL Server 实例的性能计数器。Windows\
  \ 应用程序性能监视器可用于实时查看性能计数器，也可用于将性能计数器记录到二进制或文本文件中。命令行实用程序 `Logman` 可用于与性能监视器交互，以创建数据收集器并根据需要启动和停止它们。此外，`PowerShell`\
  \ 也可以协助收集性能计数器。\n\n这些替代方案都是收集数据库和索引性能计数器的有效选择。关键在于，如果我们想要监控索引，就必须收集必要的信息，以便了解潜在的索引问题何时可能出现。选择一个最顺手的工具，并立即开始收集这些计数器。\n\
  \n## 动态管理对象\n\n监控索引的一些最佳性能信息包含在动态管理对象（DMO）中。DMO 包含关于索引的逻辑和物理使用情况以及整体物理结构的信息。对于监控而言，有四个\
  \ DMO 可提供有关索引使用情况的信息：`sys.dm_db_index_usage_stats`、`sys.dm_db_index_operational_stats`、`sys.dm_db_index_physical_stats`\
  \ 和 `sys.dm_os_wait_stats`。本节将介绍一个使用这些 DMO 监控索引的过程。\n\n接下来的前三节将讨论 `sys.dm_db_index_*`\
  \ 系列 DMO。第 5 章定义并演示了这些 DMO 的内容。关于这些 DMO 需要记住的一点是，它们可能会由于服务器上的各种操作（例如重启服务或重新创建索引）而被刷新。第四个\
  \ DMO `sys.dm_os_wait_stats` 与索引监控相关，并提供可在索引分析期间提供帮助的信息。\n\n> **警告**\n>\n> 索引 DMO\
  \ 没有行级别的信息来精确指示何时重置了为索引收集的信息。因此，可能存在报告的统计信息略高于或低于实际情况的情况。虽然这应该不会对分析结果产生重大影响，但需要牢记这一点。\n\
  \n\n\n### 索引使用统计信息\n\n动态管理对象 `sys.dm_db_index_usage_stats` 提供了关于索引如何被使用以及索引最后被使用的时间的信息。当我们想要跟踪索引是否正在被使用以及针对它们执行了哪些操作时，这会非常有用。\n\
  \n对这个 DMO 的监控过程（与其他 DMO 类似）包括以下步骤：\n\n1.  创建一个表来保存快照信息。\n2.  将 DMO 的当前状态插入快照表。\n\
  3.  将最新的快照与前一个快照进行比较，并将行之间的差异量插入输出的历史表中。\n\n要构建这个过程，我们首先需要创建快照表和历史表。这些表的结构将与 DMO\
  \ 的架构相同，并包含 DMO 的所有列以及一个 `create_date` 列。为了与源 DMO 保持一致，表中的列将匹配 DMO 的架构。\n\n```sql\n\
  USE IndexingMethod;\nGO\nCREATE TABLE dbo.index_usage_stats_snapshot\n(\nsnapshot_id\
  \ INT IDENTITY(1, 1),\ncreate_date DATETIME2(0),\ndatabase_id SMALLINT NOT NULL,\n\
  object_id INT NOT NULL,\nindex_id INT NOT NULL,\nuser_seeks BIGINT NOT NULL,\nuser_scans\
  \ BIGINT NOT NULL,\nuser_lookups BIGINT NOT NULL,\nuser_updates BIGINT NOT NULL,\n\
  last_user_seek DATETIME,\nlast_user_scan DATETIME,\nlast_user_lookup DATETIME,\n\
  last_user_update DATETIME,\nsystem_seeks BIGINT NOT NULL,\nsystem_scans BIGINT NOT\
  \ NULL,\nsystem_lookups BIGINT NOT NULL,\nsystem_updates BIGINT NOT NULL,\nlast_system_seek\
  \ DATETIME,\nlast_system_scan DATETIME,\nlast_system_lookup DATETIME,\nlast_system_update\
  \ DATETIME,\nCONSTRAINT PK_IndexUsageStatsSnapshot\nPRIMARY KEY CLUSTERED (snapshot_id),\n\
  CONSTRAINT UQ_IndexUsageStatsSnapshot\nUNIQUE (create_date, database_id, object_id,\
  \ index_id)\n);\nCREATE TABLE dbo.index_usage_stats_history\n(\nhistory_id INT IDENTITY(1,\
  \ 1),\ncreate_date DATETIME2(0),\ndatabase_id SMALLINT NOT NULL,\nobject_id INT\
  \ NOT NULL,\nindex_id INT NOT NULL,\nuser_seeks BIGINT NOT NULL,\nuser_scans BIGINT\
  \ NOT NULL,\nuser_lookups BIGINT NOT NULL,\nuser_updates BIGINT NOT NULL,\nlast_user_seek\
  \ DATETIME,\nlast_user_scan DATETIME,\nlast_user_lookup DATETIME,\nlast_user_update\
  \ DATETIME,\nsystem_seeks BIGINT NOT NULL,\nsystem_scans BIGINT NOT NULL,\nsystem_lookups\
  \ BIGINT NOT NULL,\nsystem_updates BIGINT NOT NULL,\nlast_system_seek DATETIME,\n\
  last_system_scan DATETIME,\nlast_system_lookup DATETIME,\nlast_system_update DATETIME,\n\
  CONSTRAINT PK_IndexUsageStatsHistory\nPRIMARY KEY CLUSTERED (history_id),\nCONSTRAINT\
  \ UQ_IndexUsageStatsHistory\nUNIQUE (create_date, database_id, object_id, index_id)\n\
  );\n```\n清单 15-5 索引使用统计信息快照表统计信息\n\n捕获索引使用历史统计信息的下一个组件是收集 `sys.dm_db_index_usage_stats`\
  \ 中的当前值。与性能监视器脚本类似，收集查询需要安排为大约每 4 小时运行一次。数据库环境的活动量以及索引被修改的频率应有助于确定捕获信息的频率。务必在任何索引碎片整理过程之前安排一次快照，以捕获在索引重建时可能丢失的信息。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nINSERT INTO dbo.index_usage_stats_snapshot\n\
  SELECT GETDATE(),\ndatabase_id,\nobject_id,\nindex_id,\nuser_seeks,\nuser_scans,\n\
  user_lookups,\nuser_updates,\nlast_user_seek,\nlast_user_scan,\nlast_user_lookup,\n\
  last_user_update,\nsystem_seeks,\nsystem_scans,\nsystem_lookups,\nsystem_updates,\n\
  last_system_seek,\nlast_system_scan,\nlast_system_lookup,\nlast_system_update\n\
  FROM sys.dm_db_index_usage_stats;\n```\n清单 15-6 索引使用统计信息快照填充\n\n填充索引使用统计信息的快照后，需要将最新快照和前一个快照之间的差异量插入到\
  \ `index_usage_stats_history` 表中。由于 `sys.dm_db_index_usage_stats` 的行中没有指示符来标识索引统计信息何时被重置，因此识别两个索引条目之间是否存在差异的过程是：如果索引上的任何统计信息返回负值，则删除该行。生成的查询实现了此逻辑，并同时删除了没有任何新活动发生的行。\n\
  \n```sql\nUSE IndexingMethod;\nGO\nWITH IndexUsageCTE\nAS (SELECT DENSE_RANK() OVER\
  \ (ORDER BY create_date DESC) AS HistoryID,\ncreate_date,\ndatabase_id,\nobject_id,\n\
  index_id,\nuser_seeks,\nuser_scans,\nuser_lookups,\nuser_updates,\nlast_user_seek,\n\
  last_user_scan,\nlast_user_lookup,\nlast_user_update,\nsystem_seeks,\nsystem_scans,\n\
  system_lookups,\nsystem_updates,\nlast_system_seek,\nlast_system_scan,\nlast_system_lookup,\n\
  last_system_update\nFROM dbo.index_usage_stats_snapshot)\nINSERT INTO dbo.index_usage_stats_history\n\
  SELECT i1.create_date,\ni1.database_id,\ni1.object_id,\ni1.index_id,\ni1.user_seeks\
  \ - COALESCE(i2.user_seeks, 0),\ni1.user_scans - COALESCE(i2.user_scans, 0),\ni1.user_lookups\
  \ - COALESCE(i2.user_lookups, 0),\ni1.user_updates - COALESCE(i2.user_updates, 0),\n\
  i1.last_user_seek,\ni1.last_user_scan,\ni1.last_user_lookup,\ni1.last_user_update,\n\
  i1.system_seeks - COALESCE(i2.system_seeks, 0),\ni1.system_scans - COALESCE(i2.system_scans,\
  \ 0),\ni1.system_lookups - COALESCE(i2.system_lookups, 0),\ni1.system_updates -\
  \ COALESCE(i2.system_updates, 0),\ni1.last_system_seek,\ni1.last_system_scan,\n\
  i1.last_system_lookup,\ni1.last_system_update\nFROM IndexUsageCTE i1\nLEFT OUTER\
  \ JOIN IndexUsageCTE i2 ON i1.database_id = i2.database_id\nAND i1.object_id   =\
  \ i2.object_id\nAND i1.index_id    = i2.index_id\nAND i2.HistoryID   = 2\n--验证没有行小于\
  \ 0\nAND NOT (\ni1.system_seeks - COALESCE(i2.system_seeks, 0)  < 0\nOR i1.system_scans\
  \ - COALESCE(i2.system_scans, 0)     < 0\nOR i1.system_lookups - COALESCE(i2.system_lookups,\
  \ 0) < 0\nOR i1.system_updates - COALESCE(i2.system_updates, 0) < 0\nOR i1.user_seeks\
  \ - COALESCE(i2.user_seeks, 0)         < 0\nOR i1.user_scans - COALESCE(i2.user_scans,\
  \ 0)         < 0\nOR i1.user_lookups - COALESCE(i2.user_lookups, 0)     < 0\nOR\
  \ i1.user_updates - COALESCE(i2.user_updates, 0)     < 0\n);\nGO\n```\n清单 15-7 索引使用统计信息快照填充\n\
  \n### 索引操作统计信息\n\n动态管理对象 `sys.dm_db_index_operational_stats` 提供了在查询计划执行期间发生在索引上的物理操作的信息。这些信息可用于跟踪索引被使用时发生的物理计划操作及其操作速率。该\
  \ DMO 监控的其他内容之一是压缩的成功率。\n\n监控此 DMO 的过程涉及几个简单的步骤。首先，将创建表来存储 DMO 输出的快照和历史信息。然后，定期将\
  \ DMO 输出的快照插入快照表。检索快照后，当前快照与前一个快照之间的差异量将被插入历史表。\n\n该过程使用一个与 `sys.dm_db_index_operational_stats`\
  \ 架构几乎相同的快照表和历史表。架构的主要差异是添加了一个 `create_date` 列，用于标识快照发生的时间。以下代码提供了快照表和历史表所需的架构。\n\
  \n**注意**\n\n列 `version_generated_inrow`、`version_generated_offrow`、`ghost_version_inrow`、`ghost_version_offrow`、`insert_over_ghost_version_inrow`\
  \ 和 `insert_over_ghost_version_offrow` 是 SQL Server 2019 中新增的。如果在之前版本的 SQL Server\
  \ 中使用此代码，应删除这些列。\n\n\n\n```\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.index_operational_stats_snapshot\n\
  (\n    snapshot_id INT IDENTITY(1, 1),\n    create_date DATETIME2(0),\n    database_id\
  \ SMALLINT NOT NULL,\n    object_id INT NOT NULL,\n    index_id INT NOT NULL,\n\
  \    partition_number INT NOT NULL,\n    hobt_id BIGINT NOT NULL,\n    leaf_insert_count\
  \ BIGINT NOT NULL,\n    leaf_delete_count BIGINT NOT NULL,\n    leaf_update_count\
  \ BIGINT NOT NULL,\n    leaf_ghost_count BIGINT NOT NULL,\n    nonleaf_insert_count\
  \ BIGINT NOT NULL,\n    nonleaf_delete_count BIGINT NOT NULL,\n    nonleaf_update_count\
  \ BIGINT NOT NULL,\n    leaf_allocation_count BIGINT NOT NULL,\n    nonleaf_allocation_count\
  \ BIGINT NOT NULL,\n    leaf_page_merge_count BIGINT NOT NULL,\n    nonleaf_page_merge_count\
  \ BIGINT NOT NULL,\n    range_scan_count BIGINT NOT NULL,\n    singleton_lookup_count\
  \ BIGINT NOT NULL,\n    forwarded_fetch_count BIGINT NOT NULL,\n    lob_fetch_in_pages\
  \ BIGINT NOT NULL,\n    lob_fetch_in_bytes BIGINT NOT NULL,\n    lob_orphan_create_count\
  \ BIGINT NOT NULL,\n    lob_orphan_insert_count BIGINT NOT NULL,\n    row_overflow_fetch_in_pages\
  \ BIGINT NOT NULL,\n    row_overflow_fetch_in_bytes BIGINT NOT NULL,\n    column_value_push_off_row_count\
  \ BIGINT NOT NULL,\n    column_value_pull_in_row_count BIGINT NOT NULL,\n    row_lock_count\
  \ BIGINT NOT NULL,\n    row_lock_wait_count BIGINT NOT NULL,\n    row_lock_wait_in_ms\
  \ BIGINT NOT NULL,\n    page_lock_count BIGINT NOT NULL,\n    page_lock_wait_count\
  \ BIGINT NOT NULL,\n    page_lock_wait_in_ms BIGINT NOT NULL,\n    index_lock_promotion_attempt_count\
  \ BIGINT NOT NULL,\n    index_lock_promotion_count BIGINT NOT NULL,\n    page_latch_wait_count\
  \ BIGINT NOT NULL,\n    page_latch_wait_in_ms BIGINT NOT NULL,\n    page_io_latch_wait_count\
  \ BIGINT NOT NULL,\n    page_io_latch_wait_in_ms BIGINT NOT NULL,\n    tree_page_latch_wait_count\
  \ BIGINT NOT NULL,\n    tree_page_latch_wait_in_ms BIGINT NOT NULL,\n    tree_page_io_latch_wait_count\
  \ BIGINT NOT NULL,\n    tree_page_io_latch_wait_in_ms BIGINT NOT NULL,\n    page_compression_attempt_count\
  \ BIGINT NOT NULL,\n    page_compression_success_count BIGINT NOT NULL,\n    version_generated_inrow\
  \ BIGINT NOT NULL,\n    version_generated_offrow BIGINT NOT NULL,\n    ghost_version_inrow\
  \ BIGINT NOT NULL,\n    ghost_version_offrow BIGINT NOT NULL,\n    insert_over_ghost_version_inrow\
  \ BIGINT NOT NULL,\n    insert_over_ghost_version_offrow BIGINT NOT NULL,\n    CONSTRAINT\
  \ PK_IndexOperationalStatsSnapshot\n        PRIMARY KEY CLUSTERED (snapshot_id),\n\
  \    CONSTRAINT UQ_IndexOperationalStatsSnapshot\n        UNIQUE (create_date, database_id,\
  \ object_id, index_id, partition_number)\n);\n\nCREATE TABLE dbo.index_operational_stats_history\n\
  (\n    history_id INT IDENTITY(1, 1),\n    create_date DATETIME2(0),\n    database_id\
  \ SMALLINT NOT NULL,\n    object_id INT NOT NULL,\n    index_id INT NOT NULL,\n\
  \    partition_number INT NOT NULL,\n    hobt_id BIGINT NOT NULL,\n    leaf_insert_count\
  \ BIGINT NOT NULL,\n    leaf_delete_count BIGINT NOT NULL,\n    leaf_update_count\
  \ BIGINT NOT NULL,\n    leaf_ghost_count BIGINT NOT NULL,\n    nonleaf_insert_count\
  \ BIGINT NOT NULL,\n    nonleaf_delete_count BIGINT NOT NULL,\n    nonleaf_update_count\
  \ BIGINT NOT NULL,\n    leaf_allocation_count BIGINT NOT NULL,\n    nonleaf_allocation_count\
  \ BIGINT NOT NULL,\n    leaf_page_merge_count BIGINT NOT NULL,\n    nonleaf_page_merge_count\
  \ BIGINT NOT NULL,\n    range_scan_count BIGINT NOT NULL,\n    singleton_lookup_count\
  \ BIGINT NOT NULL,\n    forwarded_fetch_count BIGINT NOT NULL,\n    lob_fetch_in_pages\
  \ BIGINT NOT NULL,\n    lob_fetch_in_bytes BIGINT NOT NULL,\n    lob_orphan_create_count\
  \ BIGINT NOT NULL,\n    lob_orphan_insert_count BIGINT NOT NULL,\n    row_overflow_fetch_in_pages\
  \ BIGINT NOT NULL,\n    row_overflow_fetch_in_bytes BIGINT NOT NULL,\n    column_value_push_off_row_count\
  \ BIGINT NOT NULL,\n    column_value_pull_in_row_count BIGINT NOT NULL,\n    row_lock_count\
  \ BIGINT NOT NULL,\n    row_lock_wait_count BIGINT NOT NULL,\n    row_lock_wait_in_ms\
  \ BIGINT NOT NULL,\n    page_lock_count BIGINT NOT NULL,\n    page_lock_wait_count\
  \ BIGINT NOT NULL,\n    page_lock_wait_in_ms BIGINT NOT NULL,\n    index_lock_promotion_attempt_count\
  \ BIGINT NOT NULL,\n    index_lock_promotion_count BIGINT NOT NULL,\n    page_latch_wait_count\
  \ BIGINT NOT NULL,\n    page_latch_wait_in_ms BIGINT NOT NULL,\n    page_io_latch_wait_count\
  \ BIGINT NOT NULL,\n    page_io_latch_wait_in_ms BIGINT NOT NULL,\n    tree_page_latch_wait_count\
  \ BIGINT NOT NULL,\n    tree_page_latch_wait_in_ms BIGINT NOT NULL,\n    tree_page_io_latch_wait_count\
  \ BIGINT NOT NULL,\n    tree_page_io_latch_wait_in_ms BIGINT NOT NULL,\n    page_compression_attempt_count\
  \ BIGINT NOT NULL,\n    page_compression_success_count BIGINT NOT NULL,\n    version_generated_inrow\
  \ BIGINT NOT NULL,\n    version_generated_offrow BIGINT NOT NULL,\n    ghost_version_inrow\
  \ BIGINT NOT NULL,\n    ghost_version_offrow BIGINT NOT NULL,\n    insert_over_ghost_version_inrow\
  \ BIGINT NOT NULL,\n    insert_over_ghost_version_offrow BIGINT NOT NULL,\n    CONSTRAINT\
  \ PK_IndexOperationalStatsHistory\n        PRIMARY KEY CLUSTERED (history_id),\n\
  \    CONSTRAINT UQ_IndexOperationalStatsHistory\n        UNIQUE (create_date, database_id,\
  \ object_id, index_id, partition_number)\n);\n```\n清单 15-8 索引操作统计信息快照表\n\n表创建完成后，下一步是捕获\
  \ `sys.dm_db_index_operational_stats` 中信息的当前快照。可以使用清单 15-9 中的脚本来填充这些信息。由于**索引方法**旨在捕获服务器上所有数据库的索引信息，`sys.dm_db_index_operational_stats`\
  \ 的参数值被设置为 `NULL`。这将返回服务器上所有数据库中所有表的所有索引的所有分区的结果。如果需要限制数据库、表或索引的列表，则可以添加筛选器以减少要收集的索引指标数量。与索引使用情况统计信息类似，此信息应大约每\
  \ 4 小时捕获一次，其中一次计划捕获点应在服务器上的索引维护操作之前。\n\n```\nUSE IndexingMethod;\nGO\nTRUNCATE TABLE\
  \ dbo.index_operational_stats_snapshot\n\nINSERT INTO dbo.index_operational_stats_snapshot\n\
  SELECT GETDATE(),\n       database_id,\n       object_id,\n       index_id,\n  \
  \     partition_number,\n       hobt_id,\n       leaf_insert_count,\n       leaf_delete_count,\n\
  \       leaf_update_count,\n       leaf_ghost_count,\n       nonleaf_insert_count,\n\
  \       nonleaf_delete_count,\n       nonleaf_update_count,\n       leaf_allocation_count,\n\
  \       nonleaf_allocation_count,\n       leaf_page_merge_count,\n       nonleaf_page_merge_count,\n\
  \       range_scan_count,\n       singleton_lookup_count,\n       forwarded_fetch_count,\n\
  \       lob_fetch_in_pages,\n       lob_fetch_in_bytes,\n       lob_orphan_create_count,\n\
  \       lob_orphan_insert_count,\n       row_overflow_fetch_in_pages,\n       row_overflow_fetch_in_bytes,\n\
  \       column_value_push_off_row_count,\n       column_value_pull_in_row_count,\n\
  \       row_lock_count,\n       row_lock_wait_count,\n       row_lock_wait_in_ms,\n\
  \       page_lock_count,\n       page_lock_wait_count,\n       page_lock_wait_in_ms,\n\
  \       index_lock_promotion_attempt_count,\n       index_lock_promotion_count,\n\
  \       page_latch_wait_count,\n       page_latch_wait_in_ms,\n       page_io_latch_wait_count,\n\
  \       page_io_latch_wait_in_ms,\n       tree_page_latch_wait_count,\n       tree_page_latch_wait_in_ms,\n\
  \       tree_page_io_latch_wait_count,\n       tree_page_io_latch_wait_in_ms,\n\
  \       page_compression_attempt_count,\n       page_compression_success_count,\n\
