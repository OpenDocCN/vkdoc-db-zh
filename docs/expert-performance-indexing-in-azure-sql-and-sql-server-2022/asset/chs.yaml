  在 WHERE 子句中使用标量函数时的 STATISTICS I/O


  关于如何将标量函数从键列移动到参数中的一个好例子，是当使用 `MONTH` 和 `YEAR` 函数时。假设一个查询需要返回 2001 年 12 月的所有销售订单。这可以通过清单
  14-11 中的第一个 `SELECT` 查询来实现。然而，使用 `MONTH` 和 `YEAR` 函数会改变 `OrderDate` 的值，该列上的索引仍然被使用，但使用的是扫描而非查找（见图
  14-20 中的第一个执行计划）。可以通过修改查询来避免此问题，方法不是使用函数，而是将筛选条件应用于值的范围，例如清单 14-11 中的第二个 `SELECT`
  语句。如第二个执行计划所示，查询可以通过查找而非扫描来返回结果，读取次数显著减少，从 73 次降至 3 次，如图 14-19 所示。这样修复的妙处在于，无需任何有形的成本即可大幅提升性能。


  ```

  USE AdventureWorks2017

  GO

  CREATE INDEX IX_SalesSalesOrderHeader_OrderDate ON Sales.SalesOrderHeader(OrderDate);

  SET STATISTICS IO ON;

  SELECT SalesOrderID, OrderDate

  FROM Sales.SalesOrderHeader

  WHERE MONTH(OrderDate) = 12

  AND YEAR(OrderDate) = 2012;

  SELECT SalesOrderID, OrderDate

  FROM Sales.SalesOrderHeader

  WHERE OrderDate BETWEEN ''20121201'' AND ''20121231'';

  SET STATISTICS IO OFF;

  Listing 14-11

  在 WHERE 子句中使用值范围而非函数的查询

  ```


  ![](img/338675_4_En_14_Fig20_HTML.png)


  一个页面展示了执行计划选项卡下的输出。它读取了查询 1 和 2 及其成本，并展示了查询 1 中成本为 97%的非聚集索引扫描和查询 2 中的非聚集索引查找。每个都映射到一个选定的表，成本分别为
  3%和 0%。

