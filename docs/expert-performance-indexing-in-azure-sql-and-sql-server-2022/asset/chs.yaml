  \ 99%，平均页面空间使用率降至约 50%。正如这段代码所示，当一行在 `UPDATE` 操作期间大小增加时，存在显著碎片化的可能性。\n\n![图 11-6：记录长度增加后的\
  \ UPDATE 碎片化结果。平均碎片率增至 99.65%，平均页面空间使用率为 53.61%。](img/338675_4_En_11_Fig6_HTML.png)\n\
  \n图 11-6\n\n记录长度增加后的 UPDATE 碎片化结果\n\n```sql\nUSE AdventureWorks2017\nGO\nUPDATE\
  \ dbo.UpdateOperations\nSET JunkValue = REPLICATE('X', 2000)\nWHERE RowID % 5 =\
