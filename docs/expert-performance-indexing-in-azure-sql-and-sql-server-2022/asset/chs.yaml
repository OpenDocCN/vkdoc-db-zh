  \ AverageRows\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderID BETWEEN 43675 AND\
  \ 43680;\n```\n**清单 5-3**\n用于检查 `AVG_RANGE_ROWS` 估算的查询\n\n当索引的统计信息受到质疑时，此直方图是一个非常有价值的工具。如果需要确定为什么查询性能不如预期，或者为什么查询计划错误地估计行数，可以使用直方图来验证这些行为和结果。\n\
  \n### 目录视图\n\n使用 `DBCC SHOW_STATISTICS` 可以提供有关查询优化统计信息的最详细信息。然而，它依赖于用户知道统计信息的存在。虽然默认情况下，每个索引都会为其创建统计信息，但列级统计信息需要通过其他方法来发现。这通过两个目录视图来完成：`sys.stats`\
  \ 和 `sys.stats_columns`。\n\n#### sys.stats\n\n目录视图 `sys.stats` 为数据库中存在的每个统计信息对象返回一行，无论统计信息是基于索引还是列创建的。表\
  \ 5-4 提供了 `sys.stats` 中列的详细信息。\n\n**表 5-4**\n`sys.stats` 的列\n\n| 列名 | 数据类型 | 描述\
  \ |\n| --- | --- | --- |\n| `object_id` | `int` | 这些统计信息所属对象的 ID。 |\n| `name` |\
  \ `sysname` | 统计信息的名称。此值对于每个 `object_id` 必须是唯一的。 |\n| `stats_id` | `int` | 统计信息的\
  \ ID（在对象内唯一）。 |\n| `auto_created` | `bit` | 指示统计信息是否由查询处理器自动创建。 |\n| `user_created`\
  \ | `bit` | 指示统计信息是否由用户显式创建。 |\n| `no_recompute` | `bit` | 指示统计信息创建时是否使用了 `NORECOMPUTE`\
  \ 选项。 |\n| `has_filter` | `bit` | 指示统计信息是否基于筛选或行子集聚合。 |\n| `filter_definition` |\
  \ `nvarchar(max)` | 包含在筛选统计信息中的行子集的表达式。 |\n| `is_temporary` | `bit` | 指示统计信息是否为临时。\
  \  SQL Server 2012 中添加。 |\n| `is_incremental` | `bit` | 指示统计信息是否为增量。  SQL Server\
  \ 2014 中添加。 |\n| `has_persisted_sample` | `bit` | 指示统计信息是否具有持久化的采样率。  SQL Server\
  \ 2019 中添加。 |\n| `stats_generation_method` | `int` | 标识统计信息生成方法的标志。 SQL Server 2019\
  \ 中添加。 |\n| `stats_generattion_method_desc` | `varchar(80)` | 标识统计信息生成方法的文本描述。 SQL\
  \ Server 2019 中添加。 |\n\n#### sys.stats_columns\n\n作为 `sys.stats` 的配套视图，目录视图 `sys.stats_columns`\
  \ 为统计信息对象中的每一列提供一行。表 5-5 列出了 `sys.stats_columns` 中的列。\n\n**表 5-5**\n`sys.stats_columns`\
  \ 的列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `object_id` | int | 此列所属对象的 ID\
  \ |\n| `stats_id` | int | 此列所属统计信息的 ID |\n| `stats_column_id` | int | 在统计信息列集合中的基于\
  \ 1 的序号 |\n| `column_id` | int | 来自 `sys.columns` 的列的 ID |\n\n\n\n### STATS_DATE\n\
  \n在评估统计信息准确性时，一个重要的考量因素是统计信息是否已过时。判断统计信息是否过时的常用方法是使用 `STATS_DATE` 函数。该函数提供了统计信息最近一次更新的日期。如清单\
  \ 5-4 所示，该函数的语法接受一个 `object_id` 和一个 `stats_id`。对于索引而言，`stats_id` 与 `index_id` 的值相同。\n\
  \n```\nSTATS_DATE ( object_id , stats_id )\nListing 5-4\nSTATS_DATE 语法\n```\n\n\
  虽然 `STATS_DATE` 函数常用于识别过时的统计信息，但这种方法对于此任务并不有效。统计信息的最后更新日期并不一定能反映数据变化的速率。一个数据数年未更新、统计信息是数月前的表，其统计信息可能并未过时；而一个频繁进行插入、更新和删除操作、但其统计信息在前一天更新的表，其统计信息可能已经无法代表索引中的实际值。尽管对于统计信息变化缓慢的索引，该函数可以作为一个通用的检查工具，但鉴于上述例子，使用时应谨慎。\n\
  \n### sys.dm_db_stats_properties\n\n识别统计信息变化率的更好方法是使用 `sys.dm_db_stats_properties`\
  \ DMO，它提供了一个能反映数据变化情况的指标。这个 DMO 在 SQL Server 2008 中引入，提供了自上次更新统计信息以来已更改行数的详细信息。如清单\
  \ 5-5 所示，`sys.dm_db_stats_properties` 的语法接受一个 `object_id` 和一个 `stats_id`。与 `STATS_DATE`\
  \ 一样，`stats_id` 与 `index_id` 值相同。表 5-6 列出了 `sys.dm_db_stats_properties` 中的列。\n\n\
  表 5-6\n\nsys.dm_db_stats_properties 的列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | ---\
  \ |\n| `object_id` | `int` | 相关对象的 ID。 |\n| `stats_id` | `int` | 统计信息的 ID。对于索引，该\
  \ ID 与索引 ID 匹配。 |\n| `last_updated` | `datetime2(7)` | 统计信息最后一次更新的日期和时间。 |\n| `rows`\
  \ | `bigint` | 统计信息最后一次更新时，表或索引视图中的总行数。对于筛选统计信息或索引，该计数指的是符合筛选条件的行数。 |\n| `rows_sampled`\
  \ | `bigint` | 用于统计信息计算的采样行总数。当 `rows_sampled` 的值小于 `rows` 中的值时，直方图和密度值是估计值。 |\n\
  | `steps` | `int` | 直方图中的步数。每一步跨越一系列列值，后跟一个上限列值。直方图步长在统计信息的第一个键列上定义。最大步数为 200。 |\n\
  | `unfiltered_rows` | `bigint` | 应用筛选表达式之前表中的总行数。如果 `Filter Expression` 为 `NULL`，则\
  \ `unfiltered_rows` 等于 `rows`。 |\n| `modification_counter` | `bigint` | 自上次更新表统计信息以来，插入、删除或更新的行总数。\
  \ |\n| `persisted_sample_percent` | `Float` | 用于未显式指定样本百分比的统计信息更新的样本百分比。值为零表示此统计信息没有保留的样本百分比。在\
  \ SQL Server 2016 中新增。 |\n\n```\nsys.dm_db_stats_properties (object_id, stats_id)\n\
  Listing 5-5\nsys.dm_db_stats_properties 的语法\n```\n\n由于 `sys.dm_db_stats_properties`\
  \ 提供了更好地理解统计信息是否过时的机会，其输出可以显示表中值的变化如何影响 `modification_counter` 列。为此，将创建一个包含一些索引的表\
  \ `dbo.SalesOrderHeaderStats`，如清单 5-6 所示。为了研究 `modification_counter`，将使用清单 5-7 中的查询来查看该列的变化。图\
  \ 5-5 显示该表中有 20,000 行数据，每个列出的索引和统计信息的当前 `modification_counter` 值均为 0。\n\n![](img/338675_4_En_5_Fig5_HTML.png)\n\
  \n一个包含 3 行 8 列的查询表截图。列标题为：对象名称、统计信息名称、上次更新时间、行数、采样行数、步数、未筛选行数和修改计数器。\n\n图 5-5\n\n\
  在 dbo.SalesOrderHeaderStats 上执行 sys.dm_db_stats_properties 的查询结果\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT\nOBJECT_SCHEMA_NAME(s.object_id)\n+'.'+OBJECT_NAME(s.object_id) AS object_name\n\
  ,s.name as statistics_name\n,x.last_updated\n,x.rows\n,x.rows_sampled\n,x.steps\n\
  ,x.unfiltered_rows\n,x.modification_counter\nFROM sys.stats s\nCROSS APPLY sys.dm_db_stats_properties(s.object_id,\
  \ s.stats_id) x\nWHERE s.object_id = OBJECT_ID('dbo.SalesOrderHeaderStats')\nListing\
  \ 5-7\n用于 dbo.SalesOrderHeaderStats 的 sys.dm_db_stats_properties 查询\n```\n\n\n\n\
  #### 准备用于 `sys.dm_db_stats_properties` 审查的表\n\n`USE AdventureWorks2017`\n`GO`\n\
  `DROP TABLE IF EXISTS dbo.SalesOrderHeaderStats;`\n`SELECT SalesOrderID`\n`,OrderDate`\n\
  `,SalesOrderNumber`\n`INTO dbo.SalesOrderHeaderStats`\n`FROM Sales.SalesOrderHeader`\n\
  `WHERE SalesOrderID <= 63658`\n`CREATE CLUSTERED INDEX CIX_SalesOrderHeaderStats`\n\
  `ON dbo.SalesOrderHeaderStats(SalesOrderID)`\n`CREATE INDEX CIX_SalesOrderHeaderStats_OrderDate`\n\
  `ON dbo.SalesOrderHeaderStats(OrderDate)`\n`CREATE INDEX CIX_SalesOrderHeaderStats_SalesOrderNumber`\n\
  `ON dbo.SalesOrderHeaderStats(SalesOrderNumber)`\n\n有了可操作的表后，就可以更改表中的数据，并观察这些更改对统计信息的影响。在示例中，将使用五个不同的查询，如代码清单\
  \ 5-8 所示。第一个查询更新了 `OrderDate` 列，导致 40 行数据被更改。第二个查询更新了 50 行，其中 `SalesOrderNumber`\
  \ 被设置为其当前值。第三个查询再次更新 `SalesOrderNumber` 列，但对相同的 50 行数据进行了值反转。第四个查询向表中插入了 11,465\
  \ 条记录。最后一个查询从表中删除了前 20,000 条记录。在每个查询之间，执行代码清单 5-7 中的代码；这样做将提供统计信息详情，如图 5-6 的输出所示。\n\
  \n![](img/338675_4_En_5_Fig6_HTML.jpg)\n\n**图 5-6** 针对 `dbo.SalesOrderHeaderStats`\
  \ 上的示例查询，`sys.dm_db_stats_properties` 的查询结果\n\n#### 在 dbo.SalesOrderHeaderStats\
  \ 上的示例 DML 查询\n\n```sql\nUSE AdventureWorks2017\nGO\nUPDATE dbo.SalesOrderHeaderStats\n\
  set OrderDate = GETDATE()\nWHERE SalesOrderID % 500 = 1\n--执行代码清单 5-7 中的代码\nUPDATE\
  \ dbo.SalesOrderHeaderStats\nSET SalesOrderNumber = SalesOrderNumber\nWHERE SalesOrderID\
  \ % 400 = 1\n--执行代码清单 5-7 中的代码\nUPDATE dbo.SalesOrderHeaderStats\nSET SalesOrderNumber\
  \ = REVERSE(SalesOrderNumber)\nWHERE SalesOrderID % 400 = 1\n--执行代码清单 5-7 中的代码\n\
  SET IDENTITY_INSERT dbo.SalesOrderHeaderStats ON\nINSERT INTO dbo.SalesOrderHeaderStats\
  \ (SalesOrderID\n,OrderDate\n,SalesOrderNumber)\nSELECT SalesOrderID\n,OrderDate\n\
  ,SalesOrderNumber\nFROM Sales.SalesOrderHeader\nWHERE SalesOrderID > 63658\nSET\
  \ IDENTITY_INSERT dbo.SalesOrderHeaderStats OFF\n--执行代码清单 5-7 中的代码\nDELETE FROM\
  \ dbo.SalesOrderHeaderStats\nWHERE SalesOrderID <= 63658\n--执行代码清单 5-7 中的代码\n```\n\
  \n回顾图 5-6 中的结果，可以深入了解 `modification_counter` 列是如何填充的。任何插入、更新或删除操作都被视为对索引和统计信息的一次更改。查看查询\
  \ 1 的结果，更改的 40 行导致 `CIX_SalesOrderHeaderStats_OrderDate` 的 `modification_counter`\
  \ 值增加到 40。类似地，当查询 2 和 3 中更改了 `SalesOrderNumber` 时，每个查询都导致 `modification_counter`\
  \ 增加了 50，无论值是否实际发生了变化。增加记录数导致所有三个索引的 `modification_counter` 值都增加了 11,465，这与插入的记录数一致。最后，在查询\
  \ 5 的结果中，删除了 20,000 条记录。有趣的是，在最后一个查询的结果中，`CIX_SalesOrderHeaderStats` 的统计信息被更新，以更好地反映索引中值的变化。\n\
  \n虽然 `sys.dm_db_stats_properties` 不提供表中所有不同记录的列表及其对统计信息可能产生的影响，但它确实提供了详细信息，可用于识别索引及其支持统计信息的变化量。当试图确定索引的统计信息是否可能过时时，这个\
  \ DMO 非常有用。\n\n### sys.dm_db_stats_histogram\n\n虽然可以使用 `DBCC SHOW_STATISTICS` 获取统计信息的直方图，但\
  \ SQL Server 2016 引入了 DMO 函数 `sys.dm_db_stats_histogram`。该函数返回与 `DBCC` 命令类似的输出，其额外优点是可以与其他\
  \ DMO 连接，以提高数据的可用性。该函数的语法如代码清单 5-9 所示，它接受一个 `object_id` 和 `stats_id`，输出中返回的列如表 5-7\
  \ 所列。\n\n#### 表 5-7\n`sys.dm_db_stats_histogram` 的列\n\n| 列名 | 数据类型 | 描述 |\n| ---\
  \ | --- | --- |\n| `object_id` | `int` | 统计信息所属基础对象的 ID。 |\n| `stats_id` | `int`\
  \ | 统计信息的 ID。对于索引，此 ID 与索引 ID 匹配。 |\n| `step_number` | `int` | 直方图中的步骤编号。最大值为 200。\
  \ |\n| `range_high_key` | `sql_variant` | 直方图步骤的上限列值。该列值也称为 *键值*。 |\n| `range_rows`\
  \ | `real` | 列值落在直方图步骤范围内（不包括上限）的估计行数。 |\n| `equal_rows` | `real` | 列值等于直方图步骤上限的估计行数。\
  \ |\n| `distinct_range_rows` | `bigint` | 在直方图步骤范围内（不包括上限）具有不同列值的估计行数。 |\n| `average_range_rows`\
  \ | `real` | 在直方图步骤范围内（不包括上限）具有重复列值的平均行数（当 `distinct_range_rows > 0` 时为 `range_rows/distinct_range_rows`）。\
  \ |\n\n#### 代码清单 5-9\n`sys.dm_db_stats_histogram` 的语法\n\n```sql\nsys.dm_db_stats_histogram\
  \ (object_id, stats_id)\n```\n\n如果将 `sys.stats` 与 `sys.dm_db_stats_histogram` 结合使用，如代码清单\
  \ 5-10 所示，则可以检索 `Sales.SalesOrderDetail` 上所有统计信息的直方图。这提供了所有步骤及其范围值的信息。滚动浏览如图 5-7\
  \ 所示的结果，到第 163 和 164 行，可以看到 `range_high_key` 值从数字数据变为字符数据，这与统计信息和步骤之间的变化相对应。\n\n\
  ![](img/338675_4_En_5_Fig7_HTML.png)\n\n**图 5-7** 在 `Sales.SalesOrderDetail` 上查询\
  \ `sys.dm_db_stats_histogram` 的结果\n\n#### 代码清单 5-10\n针对 `Sales.SalesOrderDetail`\
  \ 的 `sys.dm_db_stats_histogram` 查询\n\n```sql\nUSE AdventureWorks2017;\nGO\nSELECT\
  \ h.object_id,\nh.stats_id,\nh.step_number,\nh.range_high_key,\nh.range_rows,\n\
  h.equal_rows,\nh.distinct_range_rows,\nh.average_range_rows\nFROM sys.stats s\n\
  CROSS APPLY sys.dm_db_stats_histogram(s.object_id, s.stats_id) h\nWHERE s.object_id\
  \ = OBJECT_ID('Sales.SalesOrderDetail');\n```\n\n这个新函数是查看和检查直方图的绝佳工具。例如，如果一个列上有多个索引和统计信息，可以编写一个查询，仅包含这些统计信息，并筛选\
  \ `range_high_key` 以仅包含匹配所需记录的步骤。此时，`average_range_rows` 是可用的，并有助于理解为什么 SQL Server\
  \ 可能选择一个索引而非另一个。\n\n\n\n### `sys.dm_db_incremental_stats_properties`\n\n关于增量索引维护（将在第\
  \ 9 章讨论），统计信息需要能够支持增量更新以及描述它们所需的元数据。作为`sys.dm_db_stats_properties`的配套函数，`sys.dm_db_incremental_stats_properties`函数提供了对增量统计信息和索引的统计属性的可见性。如清单\
  \ 5-11 所示，`sys.dm_db_incremental_stats_properties`的语法包含与其他函数相同的参数：`object_id`和`stats_id`。其返回的列与表\
  \ 5-6 中的列相同，只是此函数包含一个`partition_number`列，用于提供增量统计信息所在的分区。\n\n```\nsys.dm_db_incremental_stats_properties\
  \ (object_id, stats_id)\n```\n\n清单 5-11\n`sys.dm_db_incremental_stats_properties`的语法\n\
  \n## 统计信息 DDL\n\n本节主要讨论了索引级别的统计信息。这些统计信息在创建索引时自动创建，并在索引被删除时删除。统计信息也可以在非索引列上创建，并能提供显著的价值。当在未索引列上手动创建或删除统计信息时，可以使用两个\
  \ DDL 语句来完成：`CREATE`和`DROP STATISTICS`。由于它们超出了本书的范围，此处将不作讨论。第三个 DDL 语句`UPDATE STATISTICS`适用于所有统计信息，包括索引级统计信息。由于`UPDATE\
  \ STATISTICS`主要与索引维护相关，将在第 9 章讨论。\n\n### 列级统计信息总结\n\n查询优化统计信息是索引的重要组成部分。它们提供了查询优化器为了构建基于成本的查询计划所需的信息。通过这个过程，SQL\
  \ Server 可以通过计算的成本来识别高质量的计划。本节回顾了统计信息及其存储方式，以及充分理解其细节及其与索引关系所需的工具。\n\n请注意，所有缺失索引动态管理对象在\
  \ SQL Server 服务重启时都会重置。因此，必须定期采样这些数据，才能使其发挥最大效用。这对于因例行维护而定期重启的 SQL Server 尤其重要。\n\
  \n### 索引使用统计信息\n\n接下来要讨论的信息领域是索引使用统计信息。这些统计信息通过 DMO `sys.dm_db_index_usage_stats`累积，该视图返回不同类型索引操作的计数以及这些操作最后一次执行的时间。这有助于了解索引的使用频率以及最近的使用情况。\n\
  \n`sys.dm_db_index_usage_stats`是一个动态管理视图（DMV）。因此，它不需要任何参数。它可以通过任何`JOIN`运算符与其他表或视图进行联接。索引在第一次被使用后或自统计信息重置以来，会出现在该\
  \ DMV 中。\n\n注意\n除了重启 SQL Server 服务外，关闭或分离数据库也会重置`sys.dm_db_index_usage_stats`中为索引累积的所有统计信息。\n\
  \n在 DMV `sys.dm_db_index_usage_stats`中，提供了三种类型的数据：标题列、用户统计信息和系统统计信息。接下来的几个小节将分别探讨这些数据，以了解它们所包含的信息及其使用方法。\n\
  \n### 标题列\n\nDMV 的标题列提供了参考信息，可用于确定统计信息是为哪个索引累积的。表 5-8 列出了这些列。这些列主要用于将 DMV 与系统目录视图和其他\
  \ DMO 进行联接。\n\n表 5-8\n`sys.dm_db_index_usage_stats`中的标题列\n\n| 列名 | 数据类型 | 描述 |\n\
  | --- | --- | --- |\n| `database_id` | `smallint` | 定义表或视图的数据库 ID |\n| `object_id`\
  \ | `int` | 定义索引的表或视图的 ID |\n| `index_id` | `int` | 索引的 ID |\n\n使用`sys.dm_db_index_usage_stats`首先可以做的事情之一，就是检查自上次重置\
  \ DMV 中的统计信息以来，某个索引是否已被使用。类似于清单 5-12 中的 T-SQL 语句，标题列可以提供一个未被使用的索引列表。如果使用的是 AdventureWorks2017\
  \ 数据库，结果将类似于图 5-8。这些结果中返回的是未被使用的索引。\n\n![](img/338675_4_En_5_Fig8_HTML.jpg)\n一个包含\
  \ 10 行 5 列数据的表格截图。列标题为表名、索引名、数据库 ID、对象 ID 和索引 ID。所有 ID 数据均为 NULL。\n图 5-8\n`sys.dm_db_index_usage_stats`标题列查询结果\n\
  \n```\nUSE AdventureWorks2017\nGO\nSELECT TOP 10 OBJECT_NAME(i.object_id) AS table_name\n\
  ,i.name AS index_name\n,ius.database_id\n,ius.object_id\n,ius.index_id\nFROM sys.indexes\
  \ i\nLEFT JOIN sys.dm_db_index_usage_stats ius\nON i.object_id = ius.object_id\n\
  AND i.index_id = ius.index_id\nAND ius.database_id = DB_ID()\nWHERE ius.index_id\
  \ IS NULL\nAND OBJECTPROPERTY(i.object_id, 'IsUserTable') = 1\nORDER BY table_name,\
  \ index_name\n```\n\n清单 5-12\n`sys.dm_db_index_usage_stats`标题列查询\n\n这类信息对于管理数据库中的索引非常有用。它是一个极好的资源，可以快速识别一段时间内未被使用的索引。这种索引管理策略将在后续章节中进一步讨论。\n\
  \n\n\n### 用户列\n\nDMV `sys.dm_db_index_usage_stats` 中的下一组列是用户列。用户列提供了有关索引如何在查询计划中被使用的洞察。这些列列于表\
  \ 5-9 中，包含了关于每个操作发生了多少次（以及最近一次发生时间）的统计信息。\n\n表 5-9\n\n`sys.dm_db_index_usage_stats`\
  \ 中的用户列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `user_seeks` | `bigint` |\
  \ 由用户查询执行的查找操作的总计数 |\n| `user_scans` | `bigint` | 由用户查询执行的扫描操作的总计数 |\n| `user_lookups`\
  \ | `bigint` | 由用户查询执行的书签/键查找操作的总计数 |\n| `user_updates` | `bigint` | 由用户查询执行的更新操作的总计数\
  \ |\n| `last_user_seek` | `datetime` | 上次用户查找的日期和时间 |\n| `last_user_scan` | `datetime`\
  \ | 上次用户扫描的日期和时间 |\n| `last_user_lookup` | `datetime` | 上次用户查找的日期和时间 |\n| `last_user_update`\
  \ | `datetime` | 上次用户更新的日期和时间 |\n\n`sys.dm_db_index_usage_stats` 监视四种类型的索引操作。这些操作通过列\
  \ `user_seeks`、`user_scans`、`user_lookups` 和 `user_updates` 来表示。\n\n#### user_seeks\n\
  \n第一个索引使用列是 `user_seeks`。当查询执行并返回一个它拥有直接访问路径的单行或行范围时，就会发生此列对应的操作。例如，如果一个查询执行并检索单个订单或一小批订单的所有销售详情，类似于清单\
  \ 5-13 中的查询，则这些查询的查询计划将使用查找操作（参见图 5-9）。\n\n![](img/338675_4_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9：查找查询的查询计划\n\n```\nUSE AdventureWorks2017\nGO\nSELECT * FROM Sales.SalesOrderDetail\n\
  WHERE SalesOrderID = 43659;\nSELECT * FROM Sales.SalesOrderDetail\nWHERE SalesOrderID\
  \ BETWEEN 43659 AND 44659;\n清单 5-13：索引查找查询\n```\n\n运行清单 5-13 中的查询后，DMV `sys.dm_db_index_usage_stats`\
  \ 中的计数将被计入 `user_seeks` 列。清单 5-14 提供了一个用于调查此情况的查询。图 5-10 中的结果显示 `user_seeks` 列中的值为\
  \ 5，这与清单 5-13 中的操作计数相符。基于此，有两个查询使用了索引执行，并且两者都能够使用索引直接定位到请求的行。\n\n![](img/338675_4_En_5_Fig10_HTML.png)\n\
  \n图 5-10：`sys.dm_db_index_usage_stats` 中 `user_seeks` 的查询结果\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT TOP 10\nOBJECT_NAME(i.object_id) AS table_name\n,i.name AS index_name\n\
  ,ius.user_seeks\n,ius.last_user_seek\nFROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats\
  \ ius\nON i.object_id = ius.object_id\nAND i.index_id = ius.index_id\nAND ius.database_id\
  \ = DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\n清单 5-14：查询\
  \ `sys.dm_db_index_usage_stats` 中的 `user_seeks`\n```\n\n#### user_scans\n\n下一个使用列是\
  \ `user_scans`。每当查询执行并必须扫描索引中的每一行时，此列的值就会增加。例如，考虑一个对销售详情的未过滤查询，它必须返回所有记录，或者一个对未索引列进行过滤的查询。清单\
  \ 5-15 中显示的这两个查询，都是要求 SQL Server 返回表中所有内容，或者返回它没有定位信息的少数几行。满足此请求的唯一方法是扫描 `SalesOrderDetail`\
  \ 表。图 5-11 显示了这两个查询的执行计划。\n\n![](img/338675_4_En_5_Fig11_HTML.jpg)\n\n图 5-11：来自\
  \ `sys.dm_db_index_usage_stats` 的扫描查询的查询计划\n\n```\nUSE AdventureWorks2017\nGO\n\
  SELECT * FROM  Sales.SalesOrderDetail;\nSELECT * FROM  Sales.SalesOrderDetail\n\
  WHERE CarrierTrackingNumber = '4911-403C-98';\n清单 5-15：索引扫描查询\n```\n\n当发生索引扫描时，可以在\
  \ `sys.dm_db_index_usage_stats` 中看到它们。清单 5-16 中的查询提供了来自 DMV 的详细信息，显示了扫描计数。由于有两次扫描，分别对应两个查询，图\
  \ 5-12 中的结果显示在 `user_scans` 下有两次操作。在尝试对表上存在大量扫描的情况进行故障排除时，此信息可能很有用。通过查看这些详细信息，可以找到扫描次数高的索引，然后研究使用这些索引的查询为何选择扫描而不是查找。\n\
  \n![](img/338675_4_En_5_Fig12_HTML.png)\n\n图 5-12：`sys.dm_db_index_usage_stats`\
  \ 中 `user_scans` 的查询结果\n\n```\nUSE AdventureWorks2017\nGO\nSELECT TOP 10\nOBJECT_NAME(i.object_id)\
  \ AS table_name\n,i.name AS index_name\n,ius.user_scans\n,ius.last_user_scan\nFROM\
  \ sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats ius\nON i.object_id = ius.object_id\n\
  AND i.index_id = ius.index_id\nAND ius.database_id = DB_ID()\nWHERE ius.object_id\
  \ = OBJECT_ID('Sales.SalesOrderDetail');\n清单 5-16：查询 `sys.dm_db_index_usage_stats`\
  \ 中的 `user_scans`\n```\n\n#### user_lookups\n\nDMV 中的第三列是 `user_lookups`。当在非聚集索引上执行查找，但该索引不包含满足查询所需的所有列时，就会发生用户查找。发生这种情况时，查询必须从聚集索引中查找这些列。一个例子是针对\
  \ `SalesOrderDetail` 表的查询，它返回 `ProductID` 和 `CarrierTrackingNumber` 列，并根据 `ProductID`\
  \ 进行过滤；清单 5-17 显示了此查询。图 5-13 显示了查询计划，其中包括对非聚集索引的查找和对聚集索引的键查找。\n\n![](img/338675_4_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13：查找和键查找的查询计划\n\n```\nUSE AdventureWorks2017\nGO\nSELECT ProductID, CarrierTrackingNumber\n\
  FROM Sales.SalesOrderDetail\nWHERE ProductID = 778\nGO\n清单 5-17：索引查找查询\n```\n\n\n\
  ### 使用 `sys.dm_db_index_usage_stats` 监控索引活动\n\n在 `sys.dm_db_index_usage_stats` 中，`user_seeks`\
  \ 和 `user_lookups` 的计数都会增加一。要查看这些值，可以使用清单 5-18，它将返回如图 5-14 所示的结果。这些列之间的模式有助于确定合适的聚集索引键，或识别何时需要修改索引以避免键查找。键查找本身不一定有问题，但如果过度使用且不加控制，可能会成为性能瓶颈。本书后续将更深入地讨论键查找的有效管理。\n\
  \n![](img/338675_4_En_5_Fig14_HTML.png)\n\n图 5-14：`sys.dm_db_index_usage_stats`\
  \ 中 `user_lookups` 的查询结果\n\n```sql\nSELECT TOP 10\n    OBJECT_NAME(i.object_id)\
  \ AS table_name\n    ,i.name AS index_name\n    ,ius.user_seeks\n    ,ius.user_lookups\n\
  \    ,ius.last_user_lookup\nFROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats\
  \ ius\n    ON i.object_id = ius.object_id\n    AND i.index_id = ius.index_id\n \
  \   AND ius.database_id = DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\n\
  ```\n清单 5-18：查询 `sys.dm_db_index_usage_stats` 中的 `user_lookups`\n\n最后的索引操作是 `user_updates`。`user_updates`\
  \ 列不仅限于更新操作，它涵盖了表上发生的所有 `INSERT`、`UPDATE` 和 `DELETE` 操作。为了演示这一点，可以执行清单 5-19 中的 T-SQL\
  \ 代码。此代码将向 `SalesOrderDetail` 表插入一条记录，更新该记录，然后将其从表中删除。由于这些操作涉及许多外键关系，其执行计划较为复杂，本示例中未包含。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\n\nINSERT INTO Sales.SalesOrderDetail\n   \
  \ (SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID, UnitPrice,\
  \ UnitPriceDiscount, ModifiedDate)\nSELECT SalesOrderID, CarrierTrackingNumber,\
  \ OrderQty, ProductID, SpecialOfferID, UnitPrice, UnitPriceDiscount, GETDATE() AS\
  \ ModifiedDate\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderDetailID = 1;\n\nUPDATE\
  \ Sales.SalesOrderDetail\nSET CarrierTrackingNumber = '999-99-9999'\nWHERE ModifiedDate\
  \ > DATEADD(d, -1, GETDATE());\n\nDELETE FROM Sales.SalesOrderDetail\nWHERE ModifiedDate\
  \ > DATEADD(d, -1, GETDATE());\n```\n清单 5-19：索引更新查询\n\n在代码清单执行完毕后，表上共发生了三个操作。对于这些操作中的每一个，`sys.dm_db_index_usage_stats`\
  \ 都会在 `user_updates` 列中累积一次计数。执行清单 5-20 中的代码以查看索引上发生的活动。结果将与图 5-15 中的类似。除了对 `SalesOrderDetail`\
  \ 的聚集索引所做的更改外，对非聚集索引所做的更新也包括在内。能够查看插入、更新或删除操作对表产生的全面影响，有助于更好地理解执行写入操作时发生的所有 I/O。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\n\nSELECT TOP 10\n    OBJECT_NAME(i.object_id)\
  \ AS table_name\n    ,i.name AS index_name\n    ,ius.user_updates\n    ,ius.last_user_update\n\
  FROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats ius\n    ON i.object_id\
  \ = ius.object_id\n    AND i.index_id = ius.index_id\n    AND ius.database_id =\
  \ DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\n```\n清单 5-20：查询\
  \ `sys.dm_db_index_usage_stats` 中的 `user_updates`\n\n![](img/338675_4_En_5_Fig15_HTML.png)\n\
  \n图 5-15：`sys.dm_db_index_usage_stats` 中 `user_updates` 的查询结果\n\n\n### 系统列\n\n`sys.dm_db_index_usage_stats`\
  \ 中的最后一列组是系统列。系统列返回的信息与用户列大致相同，但仅包括与后台进程相关的活动。每当 SQL Server 中触发一个非用户进程时（例如自动统计信息更新），该活动都将通过这些列进行跟踪。表\
  \ 5-10 列出了这些系统列。\n\n表 5-10\n\n`sys.dm_db_index_usage_stats` 中的系统列\n\n| 列名 | 数据类型\
  \ | 描述 |\n| --- | --- | --- |\n| `system_seeks` | `bigint` | 系统查询执行的查找次数 |\n| `system_scans`\
  \ | `bigint` | 系统查询执行的扫描次数 |\n| `system_lookups` | `bigint` | 系统查询执行的查找次数 |\n| `system_updates`\
  \ | `bigint` | 系统查询执行的更新次数 |\n| `last_system_seek` | `datetime` | 上次系统查找的时间 |\n\
  | `last_system_scan` | `datetime` | 上次系统扫描的时间 |\n| `last_system_lookup` | `datetime`\
  \ | 上次系统查找的时间 |\n| `last_system_update` | `datetime` | 上次系统更新的时间 |\n\n对于大多数常见用法，这些列可以忽略。然而，理解它们的聚合方式是有价值的。要查看示例，请执行清单\
  \ 5-21 中的代码，该代码可能运行长达 1 分钟。这将更改 `SalesOrderDetail` 表中的大部分行。由于超过 20% 的行已更改，将触发自动统计信息更新。统计信息更新与用户活动没有直接关系，而是后台（即系统）进程。\n\
  \n```\nUSE AdventureWorks2017\nGO\nUPDATE Sales.SalesOrderDetail\nSET UnitPriceDiscount\
  \ = 0.01\nWHERE UnitPriceDiscount = 0.00;\nListing 5-21\nUpdate for Sales.SalesOrderDetail\n\
  ```\n\n更新完成后，运行清单 5-22 中的 T-SQL 语句。这将从 `sys.stats` 和 `sys.dm_db_index_usage_stats`\
  \ 的系统列返回结果，如图 5-16 所示。其中包含 `system_scans` 列，该列显示 `Sales.SalesOrderDetail` 上已发生三次系统扫描。这些扫描与统计信息更新有关，其中一次发生在\
  \ `UnitPriceDiscount` 列上。查看统计信息创建的时间可以显示更新顺序：先是 `CarrierTrackingNumber`，然后是 `SalesOrderDetailId`，接着是\
  \ `ModifiedDate`，最后是 `UnitPriceDiscount`。\n\n![](img/338675_4_En_5_Fig16_HTML.jpg)\n\
  \n两个查询表结果的截图。1. 8 行 5 列。列标题为 object i d、name、auto created、no column name 和 stats\
  \ column names。2. 3 行 10 列。列标题为 table name、index name、system seeks、system scans、system\
  \ lookups、system updates、last system seek、last system scan、last system lookup 和\
  \ last system update。\n\n图 5-16\n\n`sys.stats` 和 `sys.dm_db_index_usage_stats` 系统列查询结果\n\
  \n```\nUSE AdventureWorks2017\nGO\nSELECT S.object_id,\nS.name,\nS.auto_created,\n\
  STATS_DATE(S.object_id, S.stats_id),\nX.stats_column_names\nFROM sys.stats S\nCROSS\
  \ APPLY\n(\nSELECT STRING_AGG(C.name, ',') AS stats_column_names\nFROM sys.stats_columns\
  \ SC\nINNER JOIN sys.columns C\nON C.object_id = SC.object_id\nAND C.column_id =\
  \ SC.column_id\nWHERE S.object_id = SC.object_id\nAND S.stats_id = SC.stats_id\n\
  ) X\nWHERE S.object_id = OBJECT_ID('Sales.SalesOrderDetail');\nSELECT OBJECT_NAME(i.object_id)\
  \ AS table_name\n,i.name AS index_name\n,ius.system_seeks\n,ius.system_scans\n,ius.system_lookups\n\
  ,ius.system_updates\n,ius.last_system_seek\n,ius.last_system_scan\n,ius.last_system_lookup\n\
  ,ius.last_system_update\nFROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats\
  \ ius\nON i.object_id = ius.object_id\nAND i.index_id = ius.index_id\nAND ius.database_id\
  \ = DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\nListing\
  \ 5-22\nQuery for System Columns in sys.dm_db_index_usage_stats\n```\n\n从实用性的角度来看，这些列对于用户应用程序通常并不重要，但确实有助于更全面地了解所有\
  \ SQL Server 函数的索引使用情况。\n\n### 索引使用统计信息摘要\n\n本节讨论了在 DMV `sys.dm_db_index_usage_stats`\
  \ 中找到的统计信息。此 DMV 提供了关于数据库中索引如何以及是否正在使用的极其有用的统计信息。通过长期监视这些统计信息，可以了解哪些索引提供了最大的价值。使用这些列来改进索引性能的策略将在第\
  \ 9 章讨论。\n\n### 索引操作统计信息\n\n第三个需要考虑的统计信息区域是索引操作统计信息。这些统计信息通过 DMO `sys.dm_db_index_operational_stats`\
  \ 提供给用户。从高层次来看，此 DMO 提供了有关索引上发生的 I/O、锁定、闩锁和访问方法的详细信息。通过这些信息，可以识别可能遇到性能问题的索引。一旦识别出来，就有可能了解导致这些性能问题的原因。本节旨在帮助理解\
  \ DMO 中提供的统计信息以及如何使用这些统计信息调查索引。\n\n与 `sys.dm_db_index_usage_stats` 不同，`sys.dm_db_index_operational_stats`\
  \ 是一个动态管理函数（DMF）。因此，它在使用时需要提供参数。表 5-11 详细说明了此 DMF 的参数。\n\n表 5-11\n\n`sys.dm_db_index_operational_stats`\
  \ 的参数\n\n| 参数名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `database_id` | `smallint`\
  \ | 索引所在数据库的 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有数据库的索引信息。可以在此参数中使用函数 `DB_ID`。 |\n\
  | `object_id` | `int` | 应为其返回信息的表或视图的对象 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回数据库中所有表或视图的索引详细信息。\
  \ |\n| `index_id` | `int` | 应为其返回信息的索引的索引 ID。提供值 `-1`、`NULL` 或 `DEFAULT` 将返回表或视图上所有索引的详细信息。\
  \ |\n| `partition_number` | `int` | 应为其返回索引信息的分区号。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有分区的详细信息。\
  \ |\n\n通过这些参数，可以广泛或窄地聚焦于索引统计信息。这种灵活性很有用，因为 `sys.dm_db_index_operational_stats` 不允许使用\
  \ `CROSS APPLY` 或 `OUTER APPLY` 运算符。将参数传递给 DMF 时，其语法如清单 5-23 所定义。\n\n```\nsys.dm_db_index_operational_stats\
  \ (\n{ database_id | NULL | 0 | DEFAULT }\n, { object_id | NULL | 0 | DEFAULT }\n\
  , { index_id | 0 | NULL | -1 | DEFAULT }\n, { partition_number | NULL | 0 | DEFAULT\
  \ }\n)\nListing 5-23\nIndex Operational Stats Syntax\n```\n\n注意\n\nDMF `sys.dm_db_index_operational_stats`\
  \ 可以接受使用 Transact-SQL 函数 `DB_ID()` 和 `OBJECT_ID()`。这些函数可分别用于参数 `database_id` 和 `object_id`。\n\
  \n\n#### 头列\n\n对于通过动态管理函数返回的每一行，都会包含 `database_id`、`object_id`、`index_id` 和 `partition_number`。这些列在表\
  \ 5-12 中有进一步定义。正如 `partition_number` 所暗示的，此函数返回结果的粒度是分区级别。对于非分区索引，分区号将为 1。\n\n表\
  \ 5-12\n\n`sys.dm_db_index_operational_stats` 中的头列\n\n| 列名 | 数据类型 | 描述 |\n| ---\
  \ | --- | --- |\n| `database_id` | `smallint` | 定义表或视图所在的数据库 ID |\n| `object_id`\
  \ | `int` | 定义索引所在的表或视图的 ID |\n| `index_id` | `int` | 索引的 ID |\n| `partition_number`\
  \ | `int` | 索引或堆内的分区号（从 1 开始） |\n| `hobt_id` | `bigint` | 用于标识与索引分区关联的堆或 B 树（hobt）的\
  \ ID。自 SQL Server 2016 起新增 |\n\n头列为理解统计信息所适用的索引提供了基础。这将有助于理解返回信息的上下文。此外，它们可用于与目录视图（如\
  \ `sys.indexes`）进行联接，以提供索引的名称。\n\n此函数中的有用信息来自该函数返回的其余列。可以返回的信息提供了对 DML 活动、页面分配周期、数据访问模式、索引争用和磁盘活动的洞察。在以下部分中，将回顾该函数返回的每一列，以及它们如何提供关于索引使用情况的洞察。\n\
  \n#### DML 活动\n\n了解索引上的 DML 活动是开始分析索引使用统计信息的理想起点。表 5-13 列出了代表此活动的列。它们提供了受 DML 操作影响的行数的计数。接下来的统计信息与\
  \ `sys.dm_db_index_usage_stats` 中的类似，但在视角上存在一些差异，接下来将讨论这些差异。\n\n表 5-13\n\n`sys.dm_db_index_operational_stats`\
  \ 中的 DML 活动列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `leaf_insert_count` |\
  \ `bigint` | 插入到叶级的行的累积计数。 |\n| `leaf_delete_count` | `bigint` | 从叶级删除的行的累积计数。 |\n\
  | `leaf_update_count` | `bigint` | 在叶级更新的行的累积计数。 |\n| `leaf_ghost_count` | `bigint`\
  \ | 在叶级被标记为删除但尚未移除的行的累积计数。 |\n| `nonleaf_insert_count` | `bigint` | 叶级以上的插入操作的累积计数。对于堆，此值始终为\
  \ `0`。 |\n| `nonleaf_delete_count` | `bigint` | 叶级以上的删除操作的累积计数。对于堆，此值始终为 `0`。 |\n\
  | `nonleaf_update_count` | `bigint` | 叶级以上的更新操作的累积计数。对于堆，此值始终为 `0`。 |\n\n在 `sys.dm_db_index_operational_stats`\
  \ 内部，可以跟踪 DML 活动的两个区域：叶级和非叶级。有关叶级和非叶级页面上 DML 活动的更多信息，请参见第 4 章。\n\n这两种数据更改类型之间的区别对于识别索引更改是直接通过\
  \ DML 活动发生，还是作为内部索引更改的结果非常重要。当叶级活动导致索引结构发生变化时，就会发生非叶级 DML 活动，这不是可以通过 `INSERT`、`UPDATE`\
  \ 或 `DELETE` 语句直接影响的。\n\n叶级和非叶级的 DML 活动都根据已发生的 DML 操作类型被分解为统计信息。如前所述，DML 活动监视 `INSERT`、`UPDATE`\
  \ 和 `DELETE` 活动。对于这些操作中的每一个，`sys.dm_db_index_operational_stats` 中都有一个对应的列。此外，还有一个列用于统计已从叶级\
  \ DML 活动中“虚化”掉的记录。\n\n在 `DELETE` 操作期间，受语句影响的行会通过两阶段操作被删除。最初，记录被标记为删除。当这种情况发生时，这些记录被称为被\
  \ *虚化*；处于此状态的行被计入 `leaf_ghost_count`。SQL Server 会以固定的时间间隔运行一个清理线程，遍历并执行对标记为虚化的行的实际删除操作。那时，这些记录将被计入\
  \ `leaf_delete_count`。此过程提高了删除操作的性能，因为行的实际删除发生在事务提交之后。如果发生事务回滚，则只需回滚行上的虚化标志，而不必尝试在表中重新创建该行。此活动仅发生在叶级；当与页面关联的所有行都被删除或以其他方式移除时，非叶级页面会被删除。\n\
  \n\n### 理解和分析 `sys.dm_db_index_operational_stats`\n\n虽然此动态管理函数 (DMF) 的活动与在 `sys.dm_db_index_usage_stats`\
  \ 中发现的相似，但存在一些显著差异。首先，`sys.dm_db_index_operational_stats` 中的信息比 `sys.dm_db_index_usage_stats`\
  \ 中的更细粒度。操作统计信息会报告到叶级和非叶级，而使用统计信息则不会。除了粒度之外，计数统计方式也有所不同。使用统计信息为在索引上执行该操作的每个计划计数一次，无论影响了多少行。操作统计信息的不同之处在于，每对行执行一次\
  \ DML 操作，计数就会增加一次。总而言之，使用统计信息在索引被使用时进行汇总，而操作统计信息则根据索引被使用的程度进行汇总。\n\n#### DML 活动\n\
  \n清单 5-24 中的代码说明了操作统计信息是如何统计的。在清单中，79 行被添加到 `dbo.Karaoke` 表中。然后从该表中删除了 44 行。接着更新了表中的\
  \ 35 行。最后一个查询返回基于 DML 活动的操作统计信息。图 5-17 显示了最终查询的结果。\n\n![](img/338675_4_En_5_Fig17_HTML.png)\n\
  \n查询表结果的屏幕截图，包含一行数据。列标题和值分别是：表名、索引名、叶级插入计数 79、叶级更新计数 35、叶级删除计数 0 和叶级幽灵计数 44。\n\n\
  **图 5-17** DML 活动查询结果（结果在您的系统上可能有所不同）\n\n```sql\nUSE AdventureWorks2017\nGO\nIF\
  \ OBJECT_ID('dbo.Karaoke') IS NOT NULL\nDROP TABLE dbo.Karaoke;\nCREATE TABLE dbo.Karaoke\n\
  (\nKaraokeID INT\n,Duet BIT\n,CONSTRAINT PK_Karaoke_KaraokeID PRIMARY KEY CLUSTERED\
  \ (KaraokeID)\n);\nINSERT INTO dbo.Karaoke\nSELECT ROW_NUMBER() OVER (ORDER BY t.object_id)\n\
  ,t.object_id % 2\nFROM sys.tables t;\nDELETE FROM dbo.Karaoke\nWHERE  Duet = 0;\n\
  UPDATE dbo.Karaoke\nSET    Duet = 0\nWHERE  Duet = 1;\nSELECT OBJECT_SCHEMA_NAME(ios.object_id)\
  \ + '.' + OBJECT_NAME(ios.object_id) AS table_name\n,i.name AS index_name\n,ios.leaf_insert_count\n\
  ,ios.leaf_update_count\n,ios.leaf_delete_count\n,ios.leaf_ghost_count\nFROM sys.dm_db_index_operational_stats(DB_ID(),NULL,NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nWHERE ios.object_id = OBJECT_ID('dbo.Karaoke')\nORDER BY ios.range_scan_count\
  \ DESC;\n```\n**清单 5-24** DML 活动脚本\n\n查看索引中的 DML 活动的价值在于帮助详细了解索引中数据的情况。例如，如果一个非聚集索引经常被更新，那么查看索引中的列以确定列的易变性是否与索引的益处相匹配可能会有益。检查具有大量\
  \ DML 活动的索引并考虑该活动是否符合对数据库平台的理解是很好的做法。一个经常被写入但很少（或从未）被读取的索引是考虑移除的好候选对象。\n\n#### SELECT\
  \ 活动\n\n在 DML 活动之后，下一个可以评估的信息领域是有关 `SELECT` 活动的信息。`SELECT` 活动列（如表 5-14 所示）标识了查询执行时使用的物理操作类型。SQL\
  \ Server 收集信息的访问类型有三种：范围扫描、单例查找和转递记录。\n\n**表 5-14** `sys.dm_db_index_operational_stats`\
  \ 中的访问模式列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `range_scan_count` | bigint\
  \ | 对索引或堆执行的范围和表扫描的累计计数。 |\n| `singleton_lookup_count` | bigint | 从索引或堆中检索单行的累计计数。\
  \ |\n| `forwarded_fetch_count` | bigint | 通过转递记录获取的行计数。 |\n\n##### 范围扫描\n\n每当使用行范围或表扫描来访问数据时，就会发生范围扫描。在考虑行范围时，范围可以是\
  \ 1 到 1000 行或更多行。范围中的行数对于 SQL Server 访问数据的方式并不重要。对于表扫描，行数也不重要，但假定它包含索引中的所有记录。在 `sys.dm_db_index_operational_stats`\
  \ 中，这些值存储在 `range_scan_count` 列中。\n\n要查看在 `range_scan_count` 中收集的此信息，请执行上一节中的清单\
  \ 5-13 和 5-15 中的代码。在此之前，请先将 AdventureWorks2017 数据库脱机，然后再将其联机。这将重置从 DMO 返回的统计信息。在这两个代码示例中，将执行四个查询。前两个将导致查询计划中的索引查找，如图\
  \ 5-9 所示。后两个查询导致索引扫描，如图 5-11 中的执行计划所示。运行清单 5-25 中的代码将显示，如图 5-18 所示，所有四个查询都使用范围扫描从表中检索数据。\n\
  \n![](img/338675_4_En_5_Fig18_HTML.png)\n\n范围扫描计数查询表结果的屏幕截图，包含一行数据。列标题是表名、索引名和范围扫描计数。范围扫描计数数据为\
  \ 4。\n\n**图 5-18** `range_scan_count` 的查询结果\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nSELECT OBJECT_NAME(ios.object_id) AS table_name\n,i.name AS index_name\n,ios.range_scan_count\n\
  FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('Sales.SalesOrderDetail'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios.range_scan_count DESC;\n```\n**清单 5-25** 从 `sys.dm_db_index_operational_stats`\
  \ 查询 `range_scan_count` 的脚本\n\n\n\n##### 单例查找\n\n`SELECT` 活动收集的下一个统计列是 `singleton_lookup_count`。该列中的值会在使用键查找（以前称为书签查找）时增加。一般来说，这与在\
  \ `sys.dm_db_index_usage_stats` 的 `user_lookups` 列中收集的信息类型相同。然而，`user_lookups` 和\
  \ `singleton_lookup_count` 之间有一个显著的区别。当使用键查找时，`user_lookups` 会增加一，表示索引操作已被使用。而对于\
  \ `singleton_lookup_count`，使用键查找操作的每一行都会被计入此列。\n\n例如，运行清单 5-17 中的代码将导致键查找。这可以通过检查执行计划（如图\
  \ 5-13 所示）来验证。此操作产生的统计数据已在前面讨论过，并显示在图 5-19 中。可以通过运行清单 5-26 中的 T-SQL 语句来调查新信息。这显示\
  \ `singleton_lookup_count` 的值为 243。这是该列的一个重要区别。该统计信息不仅表明发生了键查找，还提供了查找操作规模的信息。考虑单例查找与范围扫描的比率很高的情况。这可能表明存在其他索引替代方案需要考虑。\n\
  \n![](img/338675_4_En_5_Fig19_HTML.png)\n\n显示单例查找计数的查询表结果的屏幕截图，包含 3 行数据。列标题为表名、索引名称、行锁计数、行锁等待计数和行锁等待毫秒数。\n\
  \n**图 5-19**\n\n`singleton_lookup_count` 的查询结果\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nSELECT OBJECT_NAME(ios.object_id) AS table_name\n,i.name AS index_name\n,ios.singleton_lookup_count\n\
  FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('Sales.SalesOrderDetail'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios. singleton_lookup_count DESC;\n-- 清单 5-26\n-- 从 sys.dm_db_index_operational_stats\
  \ 查询 singleton_lookup_count\n```\n\n##### 转发获取\n\n`SELECT` 活动收集的最后一个统计列是 `forwarded_fetch_count`。转发记录发生在堆中，当一行大小增加并且无法再容纳在当前所在的页面上时。每次发生记录转发操作时，`forwarded_fetch_count`\
  \ 列就会增加一。\n\n为了演示，清单 5-27 中的代码构建了一个包含堆的表并填充了值。然后，一个 `UPDATE` 语句将每三行的大小增加。新行的大小将超过页面上的可用空间，从而导致转发记录。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nCREATE TABLE dbo.ForwardedRecords\n(\nID INT\
  \ IDENTITY(1,1)\n,VALUE VARCHAR(8000)\n);\nINSERT INTO dbo.ForwardedRecords (VALUE)\n\
  SELECT REPLICATE(type, 500)\nFROM sys.objects;\nUPDATE dbo.ForwardedRecords\nSET\
  \ VALUE = REPLICATE(VALUE, 16)\nWHERE ID%3 = 1;\n-- 清单 5-27\n-- 用于生成转发记录的 T-SQL\
  \ 脚本\n```\n\n脚本完成后，可以使用清单 5-28 中的 `sys.dm_db_index_operational_stats` 脚本来查看转发记录被获取的次数。在本例中，222\
  \ 条被转发的记录转换为 222 的 `forwarded_fetch_count`，如图 5-20 所示。在调查性能计数器“转发记录/秒”时，此列非常有用。查看此列将有助于识别哪个堆是导致该计数器活动的源头，从而为调查特定表提供重点。\n\
  \n![](img/338675_4_En_5_Fig20_HTML.png)\n\n显示转发获取计数的查询表结果的屏幕截图，包含一行数据。列标题和值分别为：表名“转发记录”，索引名称“null”，以及转发获取计数\
  \ 222。\n\n**图 5-20**\n\n`forwarded_fetch_count` 的查询结果\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nSELECT OBJECT_NAME(ios.object_id) AS table_name\n,i.name AS index_name\n,ios.forwarded_fetch_count\n\
  FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('dbo.ForwardedRecords'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios.forwarded_fetch_count DESC\n-- 清单 5-28\n-- 从 sys.dm_db_index_operational_stats\
  \ 查询 forwarded_fetch_count\n```\n\n##### 锁争用\n\n在 SQL Server 数据库中读取或写入数据时，会对数据进行锁定，以在其他操作尝试使用它时提供一致性。有时，一个用户的锁定会干扰另一个用户的请求。`sys.dm_db_index_operational_stats`\
  \ 提供了详细说明锁计数和等待锁解决所花费时间的列。表 5-15 列出了与 `sys.dm_db_index_operational_stats` 中跟踪的三类锁相关的三组列，以提供对锁争用的洞察：行锁、页锁和索引锁升级。\n\
  \n**表 5-15**\n\n`sys.dm_db_index_operational_stats` 中的索引争用列\n\n| 列名 | 数据类型 | 描述\
  \ |\n| --- | --- | --- |\n| `row_lock_count` | `bigint` | 已请求的行锁累计数量 |\n| `row_lock_wait_count`\
  \ | `bigint` | 数据库引擎等待行锁的累计次数 |\n| `row_lock_wait_in_ms` | `bigint` | 数据库引擎等待行锁的总毫秒数\
  \ |\n| `page_lock_count` | `bigint` | 已请求的页锁累计数量 |\n| `page_lock_wait_count` | `bigint`\
  \ | 数据库引擎等待页锁的累计次数 |\n| `page_lock_wait_in_ms` | `bigint` | 数据库引擎等待页锁的总毫秒数 |\n|\
  \ `index_lock_promotion_attempt_count` | `bigint` | 数据库引擎尝试升级锁的累计次数 |\n| `index_lock_promotion_count`\
  \ | `bigint` | 数据库引擎成功升级锁的累计次数 |\n\n\n\n###### 行锁\n\n第一组列由行锁列组成。这些列包括 `row_lock_count`、`row_lock_wait_count`\
  \ 和 `row_lock_wait_in_ms`。通过这些列，可以衡量在行上发生的锁的数量，以及在获取行锁时是否存在争用。行锁争用通常可以通过其对事务性能的影响（如阻塞和死锁）来观察。\n\
  \n为了演示如何收集这些信息，请执行清单 5-29 中的代码。在此脚本中，根据 `ProductID` 从 `Sales.SalesOrderDetail` 表中检索行。在\
  \ `AdventureWorks2017` 数据库中，该查询检索到 44 行。\n\n```sql\nUSE AdventureWorks2017\nGO\n\
  ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;\nSELECT SalesOrderID\n,SalesOrderDetailID\n\
  ,CarrierTrackingNumber\n,OrderQty\nFROM Sales.SalesOrderDetail\nWHERE ProductID\
  \ = 710;\nListing 5-29\n用于生成行锁的 T-SQL 脚本\n```\n\n要观察查询获取的行锁，请使用清单 5-30 提供的查询中的行锁列。在这些结果中，对于查询\
  \ `Sales.SalesOrderDetail` 所返回的每一行，在 `sys.dm_db_index_operational_stats` 的结果中都有一把锁，如图\
  \ 5-21 所示。因此，在索引 `IX_SalesOrderDetail_ProductID` 上总共放置了 44 把行锁。\n\n![](img/338675_4_En_5_Fig21_HTML.png)\n\
  \n一个显示行锁查询表结果的截图，包含 3 行数据。列标题为表名、索引名、页锁计数、页锁等待计数和页锁等待毫秒数。\n\n图 5-21\n\n行锁的查询结果\n\
  \n请注意，`row_lock_wait_count` 和 `row_lock_wait_in_ms` 列没有返回任何信息。这是因为该脚本未被任何其他查询阻塞。如果清单\
  \ 5-29 中的查询被另一个事务阻塞，那么这些列中的值将会相应调整以反映该阻塞。\n\n```sql\nUSE AdventureWorks2017\nGO\n\
  SELECT OBJECT_NAME(ios.object_id) AS table_name\n,i.name AS index_name\n,ios.row_lock_count\n\
  ,ios.row_lock_wait_count\n,ios.row_lock_wait_in_ms\nFROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('Sales.SalesOrderDetail'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios.range_scan_count DESC;\nListing 5-30\n查询 sys.dm_db_index_operational_stats\
  \ 中的行锁\n```\n\n###### 页锁\n\n下一组列是页锁列。这组列具有与行锁列相似的特征，不同之处在于它们的作用范围是页级别而非行级别。对于访问的行所涉及的每一个页，都会获取一把页锁。这些列是\
  \ `page_lock_count`、`page_lock_wait_count` 和 `page_lock_wait_in_ms`。在监控索引上的锁争用时，同时查看页级别和行级别非常重要，以确定争用是发生在被访问的各个行上，还是发生在同一页上的不同行上。\n\
  \n为了查看差异，请继续使用清单 5-29 的查询，并检索该查询在 `sys.dm_db_index_operational_stats` 中收集到的页锁统计信息。此信息可使用清单\
  \ 5-31 中的脚本获取。结果与行锁的结果略有不同。对于页锁，请参见图 5-22；在索引 `IX_SalesOrderDetail_ProductID` 上只有两把页锁。此外，在\
  \ `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上有 44 把页锁，该索引并未遇到任何行锁。\n\
  \n![](img/338675_4_En_5_Fig22_HTML.png)\n\n一个显示页锁查询表结果的截图，包含 3 行数据。列标题为表名、索引名、索引锁升级尝试计数和索引锁升级计数。\n\
  \n图 5-22\n\n页锁的查询结果\n\n```sql\nUSE AdventureWorks2017\nGO\nSELECT OBJECT_NAME(ios.object_id)\
  \ AS table_name\n,i.name AS index_name\n,ios.page_lock_count\n,ios.page_lock_wait_count\n\
  ,ios.page_lock_wait_in_ms\nFROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('Sales.SalesOrderDetail'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios.range_scan_count DESC;\nListing 5-31\n查询 sys.dm_db_index_operational_stats\
  \ 中的页锁\n```\n\n锁行为的统计信息起初可能不太容易理解，直到考虑查询（来自清单 5-29）执行时发生的活动。查询执行时，它使用了索引查找和键查找（执行计划见图\
  \ 5-23）。在 `IX_SalesOrderDetail_ProductID` 上的索引查找解释了那 2 把页锁和 44 把行锁。有 44 行符合查询的谓词条件，并且它们分布在\
  \ 2 个页上。在 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上的 44 把页锁是对 `IX_SalesOrderDetail_ProductID`\
  \ 中所有行进行键查找操作的结果。行锁和页锁列共同帮助描述了发生的活动。\n\n![](img/338675_4_En_5_Fig23_HTML.jpg)\n\n\
  一个 SELECT 查询计划执行的流程图。执行一个查询。执行成本为 2% 的查找和成本为 98% 的键查找条件。它流向成本为 0% 的嵌套循环和成本为 0% 的\
  \ SELECT 以进行显示。\n\n图 5-23\n\nSELECT 查询的执行计划\n\n虽然行锁和页锁对于识别是否存在争用很有用，但锁有一个方面它并未提供：正在放置的锁的类型。这些锁可能是共享锁，也可能是排他锁。锁等待计数提供了关于表上不兼容锁的频率和这些锁持续时间的范围信息，但锁本身的细节并未被识别出来。\n\
  \n\n\n###### 锁升级\n\n关于锁争用需要讨论的最后一部分是数据库中发生的锁升级数量。当一个事务获取的锁数量超过 SQL Server 实例上的锁阈值时，锁将升级到下一个更高级别。这种升级可能发生在页、分区和表级别。数据库上发生锁升级的原因有很多。一是锁需要内存，因此锁越多，所需的内存越多，管理锁所需的资源也越多。另一个原因是，许多单独的低级别锁为阻塞升级为死锁提供了机会。由于这些原因，锁升级对于考虑对象争用非常重要。\n\
  \n为了帮助理解锁升级，之前的一个演示查询将被稍作修改。将不再选择 44 行，而是更新所有 `ProductID` 小于或等于 712 的行（参见清单 5-32）。更新会将\
  \ `ProductID` 更改为当前值，因此实际上不更改任何数据值，但仍会引发更新操作。\n\n```\nUSE AdventureWorks2017\nGO\n\
  UPDATE Sales.SalesOrderDetail\nSET ProductID = ProductID\nWHERE ProductID <= 712\n\
  清单 5-32\n用于生成锁升级的 T-SQL 脚本\n```\n\n清单 5-33 中的脚本可用于检查 `sys.dm_db_index_operational_stats`\
  \ 中的统计信息，以查看是否发生过任何锁升级。如脚本输出所示（图 5-24），列 `index_lock_promotion_attempt_count` 为\
  \ `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 和 `IX_SalesOrderDetail_ProductID`\
  \ 记录了四个事件。因此，触发了四次锁升级的机会。列 `index_lock_promotion_count` 显示 `IX_SalesOrderDetail_ProductID`\
  \ 上有一次锁升级。对于这两个索引，SQL Server 考虑锁升级是否适用于该查询的情况发生了四次。在第四次检查 `IX_SalesOrderDetail_ProductID`\
  \ 时，SQL Server 确定需要锁升级，于是锁被升级。\n\n![](img/338675_4_En_5_Fig24_HTML.png)\n\n一张包含\
  \ 3 行数据的锁升级查询结果表截图。列标题为表名、索引名、索引锁升级尝试次数、索引锁升级次数。\n\n图 5-24\n\n锁升级查询结果\n\n```\nUSE\
  \ AdventureWorks2017\nGO\nSELECT OBJECT_NAME(ios.object_id) AS table_name\n,i.name\
  \ AS index_name\n,ios.index_lock_promotion_attempt_count\n,ios.index_lock_promotion_count\n\
  FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID('Sales.SalesOrderDetail'),NULL,NULL)\
  \ ios\nINNER JOIN sys.indexes i\nON i.object_id = ios.object_id\nAND i.index_id\
  \ = ios.index_id\nORDER BY ios.range_scan_count DESC;\n清单 5-33\n查询 sys.dm_db_index_operational_stats\
  \ 中的锁升级\n```\n\n监控锁升级与监控行和页锁是相辅相成的。当行和页锁争用增加时（无论是通过增加频率还是锁等待持续时间），评估锁升级有助于识别 SQL\
  \ Server 考虑升级锁的次数以及这些锁何时被升级。在某些表索引不当的情况下，锁升级可能更频繁地发生，并导致阻塞和死锁增加。\n\n##### 闩锁争用\n\
  \n除了锁，索引中也可能发生闩锁争用。闩锁是短的、轻量级的数据同步控制。从高层看，闩锁允许在活动执行时对内存对象进行隔离。闩锁的一个例子是将数据从磁盘传输到内存时。如果在此过程中存在磁盘瓶颈，闩锁等待会在磁盘传输完成时累积。这些信息的价值在于，当发生闩锁等待时，表\
  \ 5-16 中显示的列提供了一种机制，可以将等待跟踪到特定索引，从而允许在索引作为其管理的一部分存储的位置上进行重点优化。\n\n表 5-16\n\nsys.dm_db_index_operational_stats\
  \ 中的闩锁活动列\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `page_latch_wait_count`\
  \ | `bigint` | 因闩锁争用导致数据库引擎等待的累计次数。 |\n| `page_latch_wait_in_ms` | `bigint` | 因闩锁争用导致数据库引擎等待的累计毫秒数。\
  \ |\n| `page_io_latch_wait_count` | `bigint` | 数据库引擎在 I/O 页闩锁上等待的累计次数。 |\n| `page_io_latch_wait_in_ms`\
  \ | `bigint` | 数据库引擎在页 I/O 闩锁上等待的累计毫秒数。 |\n| `tree_page_latch_wait_count` | `bigint`\
  \ | 仅包含上层 B 树页的 `page_latch_wait_count` 子集。对于堆始终为 0。 |\n| `tree_page_latch_wait_in_ms`\
  \ | `bigint` | 仅包含上层 B 树页的 `page_latch_wait_in_ms` 子集。对于堆始终为 0。 |\n| `tree_page_io_latch_wait_count`\
  \ | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_count` 子集。对于堆始终为 0。 |\n| `tree_page_io_latch_wait_in_ms`\
  \ | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_in_ms` 子集。对于堆始终为 0。 |\n\n\n######\
  \ Page I/O Latch\n\n关于页面 I/O 闩锁，收集了两组与闩锁相关的数据：页面级闩锁和树页面闩锁。当需要检索索引叶子级别（数据页面）的数据页面时，会发生页面级闩锁。这与树页面闩锁不同，后者发生在索引的所有其他级别。这两个统计数据都是衡量在将数据移入缓冲区时创建的闩锁数量以及任何与延迟相关的时间的指标。每当时间在`page_io_latch_wait_in_ms`或`tree_page_io_latch_wait_in_ms`中累积时，都对应于`PAGEIOLATCH_*`等待类型的等待时间增加。\n\
  \n为了更好地理解页面 I/O 闩锁如何发生以及如何收集这些统计数据，将回顾一个会导致这些等待发生的示例。在此演示中，将通过清单[5-34]中的脚本从`Sales.SalesOrderDetail`、`Sales.SalesOrderHeader`和`Production.Product`返回所有数据。在执行脚本之前，将清除缓冲区缓存以强制\
  \ SQL Server 从磁盘检索这些页面的数据。请确保仅在清除缓冲区缓存不会影响其他进程的非生产服务器上使用此脚本。\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nDBCC DROPCLEANBUFFERS\nGO\nSELECT *\nFROM Sales.SalesOrderDetail sod\nINNER\
  \ JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID\nINNER\
  \ JOIN Production.Product p ON sod.ProductID = p.ProductID;\n```\n**清单 5-34** 生成页面\
  \ I/O 闩锁的 T-SQL 脚本\n\n查询完成后，将表和索引的页面复制到缓冲区缓存的过程中会发生许多页面 I/O 闩锁。要查看页面 I/O 闩锁，请使用清单[5-35]中的脚本查询`sys.dm_db_index_operational_stats`中的页面\
  \ I/O 闩锁列。结果显示在图[5-25]中，表明示例查询中的所有三个表都存在页面 I/O 闩锁等待，包括在`Sales.SalesOrderHeader`上发生的整整\
  \ 1 毫秒的等待。此处的结果高度依赖于底层存储。因此，这些数字会因数据库使用的存储基础设施而有很大差异，但在相同硬件上重新测试时应保持一致。\n\n![images/338675_4_En_5_Chapter/338675_4_En_5_Fig25_HTML.jpg](img/338675_4_En_5_Fig25_HTML.jpg)\n\
  \n*图 5-25 页面 I/O 闩锁的查询结果。一个包含 12 行数据的查询表结果的截图。列标题为表名、索引名、页面 I/O 闩锁等待计数、页面 I/O 闩锁等待毫秒数和页面\
  \ I/O 平均锁等待毫秒数。*\n\n```sql\nUSE AdventureWorks2017\nGO\nSELECT OBJECT_SCHEMA_NAME(ios.object_id)\
  \ + '.' + OBJECT_NAME(ios.object_id) as table_name\n,i.name as index_name\n,page_io_latch_wait_count\n\
  ,page_io_latch_wait_in_ms\n,CAST(1. * page_io_latch_wait_in_ms\n/ NULLIF(page_io_latch_wait_count\
  \ ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms\nFROM sys.dm_db_index_operational_stats\
  \ (DB_ID(), NULL, NULL, NULL) ios\nINNER JOIN sys.indexes i ON i.object_id = ios.object_id\
  \ AND i.index_id = ios.index_id\nWHERE i.object_id = OBJECT_ID('Sales.SalesOrderHeader')\n\
  OR i.object_id = OBJECT_ID('Sales.SalesOrderDetail')\nOR i.object_id = OBJECT_ID('Production.Product')\n\
  ORDER BY 5 DESC;\n```\n**清单 5-35** 在`sys.dm_db_index_operational_stats`中查询页面 I/O\
  \ 闩锁统计信息\n\n###### Page Latch\n\n数据库中可能发生的另一种与索引相关的闩锁是页面闩锁。页面闩锁涵盖发生在非数据页面上的任何闩锁。页面闩锁包括\
  \ GAM 和 SGAM 页面的分配以及`DBCC`和备份活动。当页面被不同资源分配时，可能会发生争用，监控页面闩锁可以揭示这种活动。\n\n对于索引，页面闩锁可能发生的一种常见情况是，由于频繁插入或页面分配，在索引上形成“热点”。为了演示此场景，将在清单\
  \ 536 中创建表`dbo.PageLatchDemo`。接下来，使用首选的负载生成工具，执行清单[5-37]中的代码五个会话。为了生成此示例的负载，在 SQL\
  \ Server Management Studio 中打开五个查询窗口，每个窗口运行一个负载查询的副本。通过此示例，数百行数据将快速插入到同一系列页面中，并且将进行大量页面分配。由于这些插入操作非常接近，将形成“热点”，从而导致页面闩锁争用。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nINSERT INTO dbo.PageLatchDemo\n(FillerData)\n\
  SELECT  t.object_id % 2\nFROM sys.tables t;\nGO 5000\n```\n**清单 5-37** 生成页面闩锁负载的\
  \ T-SQL 脚本\n\n```sql\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.PageLatchDemo')\
  \ IS NOT NULL\nDROP TABLE dbo.PageLatchDemo;\nCREATE TABLE dbo.PageLatchDemo\n(\n\
  PageLatchDemoID INT IDENTITY (1,1)\n,FillerData  bit\n,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID\
  \ PRIMARY KEY CLUSTERED  (PageLatchDemoID)\n);\n```\n**清单 5-36** 生成页面闩锁场景的 T-SQL\
  \ 脚本\n\n要验证页面闩锁争用是否确实发生，请使用清单[5-38]中提供的脚本。结果如图[5-26]所示，显示存在大量页面闩锁及其相关的延迟。在此示例中，每个页面闩锁的延迟超过\
  \ 20 毫秒。在更关键的情况下，这些值会高得多，并有助于识别索引何时干扰对表的访问或写入数据。\n\n![images/338675_4_En_5_Chapter/338675_4_En_5_Fig26_HTML.png](img/338675_4_En_5_Fig26_HTML.png)\n\
  \n*图 5-26 页面闩锁的查询结果。一个包含一行数据的查询表结果的截图。列标题为表名、索引名、页面闩锁等待计数、页面闩锁等待毫秒数和页面平均锁等待毫秒数。*\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nSELECT OBJECT_SCHEMA_NAME(ios.object_id) +\
  \ '.' + OBJECT_NAME(ios.object_id) as table_name\n,i.name as index_name\n,page_latch_wait_count\n\
  ,page_latch_wait_in_ms\n,CAST(100. * page_latch_wait_in_ms\n/ NULLIF(page_latch_wait_count\
  \ ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms\nFROM sys.dm_db_index_operational_stats\
  \ (DB_ID(), NULL, NULL, NULL) ios\nINNER JOIN sys.indexes i ON i.object_id = ios.object_id\
  \ AND i.index_id = ios.index_id\nWHERE i.object_id = OBJECT_ID('dbo.PageLatchDemo');\n\
  ```\n**清单 5-38** 在`sys.dm_db_index_operational_stats`中查询页面闩锁统计信息\n\n> **注意**\n>\
  \ 页面 I/O 和页面闩锁争用高度依赖于硬件。本节中的演示查询结果不会与所示结果完全匹配。\n\n##### 页面分配周期\n\n由于 DML 活动，叶子与非叶子页面会不时地从索引中分配或释放。监控页面分配是监控索引的重要部分（相关选项参见表\
  \ 5-17）。通过此监控，可以掌握索引在维护窗口之间是如何“呼吸”的。这种活动体现了通过插入和页面拆分分配给索引的页面与通过删除移除（或合并）的页面之间的关系。通过监控此类活动，可以了解何时调整索引的`FILLFACTOR`值可能有益，从而更好地维护索引。\n\
  \n**表 5-17** `sys.dm_db_index_operational_stats`中的页面分配周期列\n\n| 列名 | 数据类型 | 描述 |\n\
  | --- | --- | --- |\n| `leaf_allocation_count` | `bigint` | 索引或堆中叶子级别页面分配的累计计数 |\n\
  | `nonleaf_allocation_count` | `bigint` | 由叶子级别以上的页面拆分引起的页面分配的累计计数 |\n| `leaf_page_merge_count`\
  \ | `bigint` | 叶子级别页面合并的累计计数 |\n| `nonleaf_page_merge_count` | `bigint` | 叶子级别以上页面合并的累计计数\
  \ |\n\n以表上如何发生页面分配为例，执行清单 5-39 中的脚本。此脚本创建了表`dbo.AllocationCycle`，随后向表中插入了 100,000\
  \ 行数据。由于这是一个新表，页面分配上没有争用，数据得以有序添加。此时，页面已分配给表，且这些分配专门与这些插入操作相关。此脚本将运行一分钟或更长时间。执行时请确保未启用“包括实际执行计划”，因为生成大量可视化计划信息会大大减慢执行速度。\n\
  \n**清单 5-39** 生成页面分配的 T-SQL 脚本\n```sql\nUSE AdventureWorks2017;\nGO\nSET NOCOUNT\
  \ ON\nDROP TABLE IF EXISTS dbo.AllocationCycle;\nCREATE TABLE dbo.AllocationCycle\
  \ (\nID INT IDENTITY,\nFillerData VARCHAR(1000),\nCreateDate DATETIME,\nCONSTRAINT\
  \ PK_AllocationCycle PRIMARY KEY CLUSTERED (ID)\n);\nGO\nINSERT INTO dbo.AllocationCycle\
  \ (FillerData, CreateDate)\nVALUES (NEWID(), GETDATE());\nGO 100000\n```\n\n要验证分配情况，可以检查`sys.dm_db_index_operational_stats`中的叶子与非叶子分配列`leaf_allocation_count`和`nonleaf_allocation_count`。清单\
  \ 5-40 中的脚本显示叶子级别有 758 次分配，非叶子级别有 3 次（见图 5-27）。使用这些列时考虑此细节很重要：分配的一部分页面可能与插入操作相关。\n\
  \n![](img/338675_4_En_5_Fig27_HTML.png)\n*包含一行数据的插入页面分配查询表结果截图。列标题和值分别为：表名、索引名、叶子分配计数\
  \ 758、非叶子分配计数 3、叶子页面合并计数 0、非叶子页面合并计数 0。*\n\n**图 5-27** `sys.dm_db_index_operational_stats`中插入页面分配统计的查询结果\n\
  \n**清单 5-40** 查询`sys.dm_db_index_operational_stats`中的页面分配统计\n```sql\nUSE AdventureWorks2017\n\
  GO\nSELECT OBJECT_SCHEMA_NAME(ios.object_id) + '.' + OBJECT_NAME(ios.object_id)\
  \ as table_name\n,i.name as index_name\n,ios.leaf_allocation_count\n,ios.nonleaf_allocation_count\n\
  ,ios.leaf_page_merge_count\n,ios.nonleaf_page_merge_count\nFROM sys.dm_db_index_operational_stats(DB_ID(),\
  \ OBJECT_ID('dbo.AllocationCycle'), NULL,NULL) ios\nINNER JOIN sys.indexes i ON\
  \ i.object_id = ios.object_id AND i.index_id = ios.index_id;\n```\n\n> 注意：在 SQL\
  \ Server 2014 之后，这些列的行为发生了变化，对于批量插入，`leaf_allocation_count`仅记录一个页面。\n\n有了索引元数据的基础，可以继续讨论使用页面分配来监控页面拆分，并确定在何处修改填充因子可能有益。为此，将在`dbo.AllocationCycle`表上生成页面拆分。清单\
  \ 5-41 中的脚本可用于实现此目的。该脚本将每第三行的`FillerData`列长度增加到 1000 个字符。\n\n**清单 5-41** 增加页面分配的\
  \ T-SQL 脚本\n```sql\nUSE AdventureWorks2017;\nGO\nUPDATE  dbo.AllocationCycle\nSET\
  \     FillerData = REPLICATE('x',1000)\nWHERE   ID % 3 = 1;\n```\n\n数据修改后，执行清单 5-40\
  \ 中`sys.dm_db_index_operational_stats`查询的结果发生巨大变化。随着行大小的扩展，分配的页面数跃升至 9,849 个，非叶子页面总数达到\
  \ 35 个（图 5-28）。由于行的顺序未改变，此活动与因行大小扩展导致的页面拆分有关。通过监控这些统计信息，可以识别受此类活动模式影响的索引。\n\n![](img/338675_4_En_5_Fig28_HTML.png)\n\
  *包含一行数据的更新页面分配查询表结果截图。列标题和值分别为：表名、索引名、叶子分配计数 9849、非叶子分配计数 35、叶子页面合并计数 0、非叶子页面合并计数\
  \ 0。*\n\n**图 5-28** 更新页面分配的查询结果\n\n\n##### 压缩\n\n`sys.dm_db_index_operational_stats`\
  \ 中有两列用于监控压缩。如表 5-18 所列，这两列分别记录了尝试压缩页面的次数以及成功压缩的次数。这些列的主要价值在于提供关于 `PAGE` 级别压缩的反馈。压缩失败可能导致决定移除压缩，因为在压缩失败率高的情况下启用压缩通常不切实际。\n\
  \n**表 5-18**\n**`sys.dm_db_index_operational_stats` 中的压缩列**\n\n| 列名 | 数据类型 | 描述\
  \ |\n| --- | --- | --- |\n| `page_compression_attempt_count` | `bigint` | 为表、索引或索引视图的特定分区评估\
  \ `PAGE` 级别压缩的页面数。包括因无法实现显著节省而未被压缩的页面。 |\n| `page_compression_success_count` | `bigint`\
  \ | 对表、索引或索引视图的特定分区使用 `PAGE` 级别压缩压缩的数据页数。 |\n\n当压缩数据的成本超过以后解压缩该数据的价值时，页面压缩可能会失败。这通常出现在重复数据模式较少的数据中，例如图像。压缩图像数据时，通常无法获得足够的压缩效益，SQL\
  \ Server 就不会将页面存储为压缩页面。为了演示这一点，请执行清单 5-42 中的代码，该代码创建一个启用了页面压缩的表，并向其中插入多张图像。\n\n\
  ```sql\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.PageCompression') IS NOT NULL\n\
  DROP TABLE dbo.PageCompression;\nCREATE TABLE dbo.PageCompression(\nProductPhotoID\
  \ int NOT NULL,\nThumbNailPhoto varbinary(max) NULL,\nLargePhoto varbinary(max)\
  \ NULL,\nCONSTRAINT PK_PageCompression PRIMARY KEY CLUSTERED (ProductPhotoID))\n\
  WITH (DATA_COMPRESSION = PAGE);\nINSERT INTO dbo.PageCompression\nSELECT ProductPhotoID\n\
  ,ThumbNailPhoto\n,LargePhoto\nFROM Production.ProductPhoto;\n```\n清单 5-42\n创建带页面压缩的表的\
  \ T-SQL 脚本\n\n插入表的操作没有失败，但所有页面都被压缩了吗？要找出答案，请执行清单 5-43 中的脚本；它返回 `page_compression_attempt_count`\
  \ 和 `page_compression_success_count` 列。图 5-29 中的结果显示，有 7 个页面成功压缩，但有 46 个页面压缩失败。根据这个页面压缩的成功与失败比例，可以很容易看出页面压缩在\
  \ `dbo.PageCompression` 聚集索引上的价值很低。\n\n![](img/338675_4_En_5_Fig29_HTML.png)\n**图\
  \ 5-29**\n压缩查询结果\n\n```sql\nUSE AdventureWorks2017\nGO\nSELECT OBJECT_SCHEMA_NAME(ios.object_id)\
  \ + '.' + OBJECT_NAME(ios.object_id) as table_name\n,i.name as index_name\n,page_compression_attempt_count\n\
  ,page_compression_success_count\nFROM sys.dm_db_index_operational_stats (DB_ID(),\
  \ OBJECT_ID('dbo.PageCompression'), NULL, NULL) ios\nINNER JOIN sys.indexes i ON\
  \ i.object_id = ios.object_id AND i.index_id = ios.index_id;\n```\n清单 5-43\n在 `sys.dm_db_index_operational_stats`\
  \ 中查询页面压缩尝试情况\n\n##### LOB 访问\n\n`sys.dm_db_index_operational_stats` 中的下一组列涉及大型对象（LOB）。它们提供了有关提取的页面数量及其大小的信息。还有一些列用于衡量被推出行和被拉入行的\
  \ LOB 数据量。表 5-19 列出了该组中的所有这些列以及其他列。\n\n**表 5-19**\n**`sys.dm_db_index_operational_stats`\
  \ 中的 LOB 访问列**\n\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `lob_fetch_in_pages`\
  \ | `bigint` | 从 `LOB_DATA` 分配单元检索的 LOB 页面的累计计数。这些页面包含存储在 `text`、`ntext`、`image`、`varchar(max)`、`nvarchar(max)`、`varbinary(max)`\
  \ 和 `xml` 类型列中的数据。 |\n| `lob_fetch_in_bytes` | `bigint` | 检索的 LOB 数据字节的累计计数。 |\n\
  | `lob_orphan_create_count` | `bigint` | 为批量操作创建的孤立 LOB 值的累计计数。 |\n| `lob_orphan_insert_count`\
  \ | `bigint` | 在批量操作期间插入的孤立 LOB 值的累计计数。 |\n| `row_overflow_fetch_in_pages` | `bigint`\
  \ | 从 `ROW_OVERFLOW_DATA` 分配单元检索的行溢出数据页的累计计数。 |\n| `row_overflow_fetch_in_bytes`\
  \ | `bigint` | 检索的行溢出数据字节的累计计数。 |\n| `column_value_push_off_row_count` | `bigint`\
  \ | 为使插入或更新的行能放入页面，将 LOB 数据和行溢出数据的列值推出行的累计计数。 |\n| `column_value_pull_in_row_count`\
  \ | `bigint` | 将 LOB 数据和行溢出数据的列值拉入行的累计计数。当更新操作释放了记录中的空间，并有机会将一个或多个来自 `LOB_DATA`\
  \ 或 `ROW_OVERFLOW_DATA` 分配单元的行外值拉入 `IN_ROW_DATA` 分配单元时，就会发生这种情况。 |\n\nLOB 访问列可用于确定大型对象活动的量以及数据何时可能从大型对象存储移动到行溢出存储。这在遇到与检索或更新\
  \ LOB 数据相关的性能问题时很有用。例如，`lob_fetch_in_bytes` 列衡量 SQL Server 为索引检索的 LOB 列的字节数。\n\n\
  清单 5-44 中的脚本可用于演示 LOB 活动。这并不代表所有可能的活动，但涵盖了基础内容。脚本开头创建了表 `dbo.LOBAccess`，其中包含使用大型对象数据类型的列\
  \ `LOBValue`。对表的第一个操作插入了十个足够窄的行，使得 `LOBValue` 值可以与行一起存储在数据页上。第二个操作增大了 `LOBValue`\
  \ 列的大小，迫使它超出数据行 8 KB 的最大限制。最后一个操作从表中检索所有行。\n\n```sql\nUSE AdventureWorks2017\nGO\n\
  IF OBJECT_ID('dbo.LOBAccess') IS NOT NULL\nDROP TABLE dbo.LOBAccess;\nCREATE TABLE\
  \ dbo.LOBAccess\n(\nID INT IDENTITY(1,1) PRIMARY KEY CLUSTERED\n,LOBValue VARCHAR(MAX)\n\
  ,FillerData CHAR(2000) DEFAULT(REPLICATE('X',2000))\n,FillerDate DATETIME DEFAULT(GETDATE())\n\
  );\nINSERT INTO dbo.LOBAccess (LOBValue)\nSELECT TOP 10 'Short Value'\nFROM Production.ProductPhoto;\n\
  UPDATE dbo.LOBAccess\nSET LOBValue = REPLICATE('Long Value',8000);\nSELECT * FROM\
  \ dbo.LOBAccess;\n```\n清单 5-44\n创建带 LOB 数据的表的 T-SQL 脚本\n\n\n\n利用表 5-19 中列出的 LOB\
  \ 访问列，可以通过清单 5-45 中的脚本观察结果。正如图 5-30 中的输出所示，`column_value_push_off_row_count`列追踪了索引上的十次行操作，这些操作将行内数据移出到大对象存储中。该操作与增加行长度的更新操作时间吻合。另外两个累积的统计信息`lob_fetch_in_pages`和`lob_fetch_in_bytes`，详细说明了通过`SELECT`语句检索的数据页数和数据大小。正如这些统计信息所示，LOB\
  \ 访问列提供了对 LOB 活动的细粒度追踪。\n\n![](img/338675_4_En_5_Fig30_HTML.png)\n\n一个查询表 LOB 访问的截图，显示一行数据和\
  \ 10 个头部。列值推挤出的行计数值为 10。\n\n图 5-30: LOB 访问的查询结果\n\n```\nUSE AdventureWorks2017\n\
  GO\nSELECT OBJECT_SCHEMA_NAME(ios.object_id) + '.' + OBJECT_NAME(ios.object_id)\
  \ as table_name\n,i.name as index_name\n,lob_fetch_in_pages\n,lob_fetch_in_bytes\n\
  ,lob_orphan_create_count\n,lob_orphan_insert_count\n,row_overflow_fetch_in_pages\n\
  ,row_overflow_fetch_in_bytes\n,column_value_push_off_row_count\n,column_value_pull_in_row_count\n\
  FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID('dbo.LOBAccess'), NULL,\
  \ NULL) ios\nINNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id\
  \ = ios.index_id;\n```\n\n清单 5-45: 查询`sys.dm_db_index_operational_stats`中的 LOB 访问\n\
  \n##### 行版本\n\n`sys.dm_db_index_operational_stats`中的最后一组列报告了由于快照隔离列而在索引中产生的版本计数。这些列是在\
  \ SQL Server 2019 中引入的。虽然本书不会演示它们在快照隔离级别中的使用，但为了完整性，这里仍将它们包含进来。\n\n表 5-20: `sys.dm_db_index_operational_stats`中的行版本列\n\
  \n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `version_generated_inrow` | `bigint`\
  \ | 快照隔离事务保留的行内版本记录数。 |\n| `version_generated_offrow` | `bigint` | 快照隔离事务保留的行外版本记录数。\
  \ |\n| `ghost_version_inrow` | `bigint` | 快照隔离事务保留的行内幽灵版本记录数。 |\n| `ghost_version_offrow`\
  \ | `bigint` | 快照隔离事务保留的行外幽灵版本记录数。 |\n| `insert_over_ghost_version_inrow` | `bigint`\
  \ | 快照隔离事务保留的、在幽灵版本记录之上执行的行内插入次数。 |\n| `insert_over_ghost_version_offrow` | `bigint`\
  \ | 快照隔离事务保留的、在幽灵版本记录之上执行的行外插入次数。 |\n\n### 索引操作统计信息摘要\n\n本节讨论了在 DMO `sys.dm_db_index_operational_stats`中可用的统计信息。虽然它不是一个被广泛使用的\
  \ DMO，但它确实提供了有关索引的广泛低级细节，可用于更深入地挖掘索引行为。从关于 DML 和`SELECT`活动的列，到锁争用，再到压缩，该 DMO 中的列提供了丰富的信息。\n\
  \n### 索引物理统计信息\n\nSQL Server 收集的最后一个统计信息领域是索引物理统计信息。这些统计信息报告有关索引当前结构的信息，以及插入、更新和删除操作对索引产生的物理影响。这些统计信息在\
  \ DMO `sys.dm_db_index_physical_stats`中收集。\n\n与`sys.dm_db_index_operational_stats`类似，`sys.dm_db_index_physical_stats`是一个动态管理函数。要使用此\
  \ DMF，在使用时需要提供参数。清单 5-46 详细说明了此 DMF 的参数。\n\n```\nsys.dm_db_index_physical_stats\
  \ (\n{ database_id | NULL | 0 | DEFAULT }\n, { object_id | NULL | 0 | DEFAULT }\n\
  , { index_id | NULL | 0 | -1 | DEFAULT }\n, { partition_number | NULL | 0 | DEFAULT\
  \ }\n, { mode | NULL | DEFAULT }\n)\n```\n\n清单 5-46: `sys.dm_db_index_physical_stats`的参数\n\
  \n`sys.dm_db_index_physical_stats`的`mode`参数接受五个值之一：`DEFAULT`、`NULL`、`LIMITED`、`SAMPLED`或`DETAILED`。`DEFAULT`、`NULL`和`LIMITED`实际上是同一个值，将一并描述。表\
  \ 5-21 列出了这些参数值。\n\n注意\n\nDMF `sys.dm_db_index_physical_stats`可以接受使用 Transact-SQL\
  \ 函数`DB_ID()`和`OBJECT_ID()`。这些函数可分别用于`database_id`和`object_id`参数。\n\n表 5-21: `sys.dm_db_index_physical_stats`中`mode`参数的值\n\
  \n| 值名称 | 描述 |\n| --- | --- |\n| LIMITED | 最快的模式，扫描的页数最少。对于索引，只扫描 B 树的父级页。对于堆，只检查相关的\
  \ PFS 和 IAM 页。 |\n| SAMPLED | 此模式基于索引或堆中所有页的 1%样本返回统计信息。如果索引或堆少于 10000 页，则使用 DETAILED\
  \ 模式代替 SAMPLED。 |\n| DETAILED | 此模式扫描索引的所有页（叶级和非叶级），并返回所有统计信息。 |\n\n执行时，该 DMF 会报告三类信息：头部列、行统计信息和碎片统计信息。需要提醒的是：此\
  \ DMF 在执行时收集它所报告的信息。如果系统使用率很高，此 DMF 可能会干扰生产工作负载。\n\n### 头部列\n\n从`sys.dm_db_index_physical_stats`返回的第一组列是头部列。这些列提供了围绕该行结果中包含的信息类型的元数据和描述性信息。头部列列于表\
  \ 5-22 中。查看头部列时，最重要的信息是`alloc_unit_type_desc`和`index_level`。这两列提供了关于正在报告的数据类型以及统计信息在索引中来源位置的信息。\n\
  \n表 5-22: `sys.dm_db_index_physical_stats`的头部列\n\n| 列名 | 数据类型 | 描述 |\n| --- | ---\
  \ | --- |\n| `database_id` | `smallint` | 表或视图的数据库 ID |\n| `object_id` | `int` |\
  \ 索引所属表或视图的对象 ID |\n| `index_id` | `int` | 索引的索引 ID |\n| `partition_number` | `int`\
  \ | 所属对象（表、视图或索引）内基于 1 的分区号 |\n| `index_type_desc` | `nvarchar(60)` | 索引类型的描述 |\n\
  | `hobt_id` | `bigint` | 索引或分区的堆或 B 树 ID |\n| `alloc_unit_type_desc` | `nvarchar(60)`\
  \ | 分配单元类型的描述 |\n| `index_depth` | `tinyint` | 索引级别数 |\n| `index_level` | `tinyint`\
  \ | 索引的当前级别 |\n\n\n\n### 行统计信息\n\n`sys.dm_db_index_physical_stats` 的第二组列是行统计信息列。这些列提供了索引中包含的行的详细信息，如表\
  \ 5-23 所示。\n\n表 5-23\n\nsys.dm_db_index_physical_stats 的行统计信息列\n\n| 列名 | 数据类型 |\
  \ 描述 |\n| --- | --- | --- |\n| `page_count` | `bigint` | 索引或数据页的总数 |\n| `record_count`\
  \ | `bigint` | 记录总数 |\n| `ghost_record_count` | `bigint` | 在分配单元中准备由后台清理任务移除的幽灵记录数\
  \ |\n| `version_ghost_record_count` | `bigint` | 在分配单元中由未完成的快照隔离事务保留的幽灵记录数 |\n|\
  \ `min_record_size_in_bytes` | `int` | 最小记录大小（以字节为单位） |\n| `max_record_size_in_bytes`\
  \ | `int` | 最大记录大小（以字节为单位） |\n| `avg_record_size_in_bytes` | `float` | 平均记录大小（以字节为单位）\
  \ |\n| `forwarded_record_count` | `bigint` | 堆中指向另一个数据位置的前向指针记录数 |\n| `compressed_page_count`\
  \ | `bigint` | 压缩页的数量 |\n\n首先值得关注的列是 `ghost_record_count` 和 `version_ghost_record_count`。这些列提供了在\
  \ `sys.dm_db_index_operational_stats` 中找到的 `ghost_record_count` 的细分信息。\n\n接下来要检查的列是\
  \ `forwarded_record_count`。该列提供了堆中前向记录的数量统计。这也在 `sys.dm_db_index_operational_stats`\
  \ 中通过 `forwarded_fetch_count` 列被引用过。在那个 DMF 中，该计数提供了访问前向记录的次数。而在 `sys.dm_db_index_physical_stats`\
  \ 中，该计数指的是表中存在的前向记录的数量。\n\n最后要查看的列是 `compressed_page_count`。压缩页计数提供了索引中所有已被压缩的页的数量。这有助于衡量通过\
  \ `PAGE` 级压缩来压缩页的价值。\n\n### 碎片统计信息\n\n该 DMF 中最后一组统计信息是碎片统计信息。毫无疑问，碎片详细信息是大多数人使用\
  \ `sys.dm_db_index_physical_stats` 的原因。当在索引中插入或修改行，导致该行不再适合其本应所在的页面时，索引中就会发生碎片。当这种情况发生时，页面会分裂，将一半的数据从一页移动到另一页。由于在分裂的页面之后通常没有连续的可用页面，这些数据会被移动到一个可用的空闲页面。这导致了索引中页面预期连续的位置出现间隙，阻碍了\
  \ SQL Server 在磁盘上读取索引时完成顺序读取。\n\n有四个列（如表 5-24 所示）提供了分析索引中碎片状态所需的信息。这些列各自有助于提供碎片程度的视图，并帮助确定如何缓解碎片。\n\
  \n表 5-24\n\nsys.dm_db_index_physical_stats 的碎片统计信息列\n\n| 列名 | 数据类型 | 描述 |\n| ---\
  \ | --- | --- |\n| `avg_fragmentation_in_percent` | `float` | 索引的逻辑碎片或堆在 `IN_ROW_DATA`\
  \ 分配单元中的范围碎片 |\n| `fragment_count` | `bigint` | `IN_ROW_DATA` 分配单元叶级中的片段数量 |\n|\
  \ `avg_fragment_size_in_pages` | `float` | `IN_ROW_DATA` 分配单元叶级中每个片段的平均页数 |\n| `avg_page_space_used_in_percent`\
  \ | `float` | 所有页面中已用可用数据存储空间的平均百分比 |\n\n第一个碎片列是 `avg_fragmentation_in_percent`。该列提供了索引的碎片百分比。随着碎片增加，SQL\
  \ Server 从索引中检索数据所需的物理 I/O 操作量可能会增加。利用该列，可以构建一个通过重建或重组索引来缓解碎片的流程。碎片非常严重（30% 或更多）的索引可能受益于重建，而碎片较少的索引可能受益于重组。在设计索引维护流程时，考虑表的目的和使用情况非常重要，因为没有可以盲目应用于所有索引的规则。这将在第\
  \ 9 章中进一步讨论。\n\n下一列 `fragment_count` 提供了索引中所有片段的计数。对于索引中创建的每个片段，该列将汇总其页面的计数。\n\n\
  第三列是 `avg_fragment_size_in_pages`。该列代表每个片段中的平均页数。该值越高，且越接近 `page_count`，SQL Server\
  \ 读取数据所需的 I/O 就越少。\n\n最后一列是 `avg_page_space_used_in_percent`。该列提供了页面上可用空间的使用量。DML\
  \ 活动少的索引应尽可能接近 100%。如果索引上没有预期的更新，目标应该是使索引尽可能紧凑。\n\n### 索引物理统计信息摘要\n\n查看 `sys.dm_db_index_physical_stats`\
  \ 的主要目的是帮助指导索引维护。通过此 DMF，可以分析索引各个级别的统计信息。利用这些信息，可以确定索引每个级别所需进行的维护量。无论是需要对索引进行碎片整理、修改填充因子，还是填充索引，`sys.dm_db_index_physical_stats`\
  \ 中的信息都可以指导此活动。\n\n### 列存储统计信息\n\n列存储索引使用的结构与典型的 B 树或堆（也称为行存储）截然不同。因此，针对这些索引收集的统计信息存在一些差异，这些差异与底层架构及其访问方式有关。为了提供这些不同方面的可见性，有两个\
  \ DMO 专注于列存储统计信息的物理和操作统计信息。\n\n#### 列存储物理统计信息\n\n首先要考虑的元数据是列存储索引上收集的物理统计信息。这些信息可以通过\
  \ DMO `sys.dm_db_column_store_row_group_physical_stats` 访问。该 DMO 在列存储索引中的每个行组对应一行。如果表已分区，则每个分区中的每个行组将有一行。\n\
  \n##### 标头列\n\n由于每个行组对应一行，每行将包含 `object_id`、`index_id`、`partition_number`、`row_group_id`\
  \ 和 `delta_store_hobt_id`。这些列在表 5-25 中有进一步定义。与其他索引类似，`partition_number` 验证了列存储索引可以被分区。对于未分区的列存储索引，分区号将为\
  \ 1。\n\n表 5-25\n\nsys.dm_db_column_store_row_group_physical_stats 中的 Header Columns\n\
  \n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `object_id` | `int` | 定义索引的表或视图的 ID。\
  \ |\n| `index_id` | `int` | 索引的 ID。 |\n| `partition_number` | `int` | 索引或堆中的基于 1\
  \ 的分区号。 |\n| `row_group_id` | `bigint` | 行组的 ID。 |\n| `delta_store_hobt_id` | `bigint`\
  \ | 行组 deltastore 的 hobt_id。如果为 NULL，则该行组没有关联的 deltastore。 |\n\n\n"
- '# 第 6 章 XML 索引


  #### 统计列


  `sys.dm_db_column_store_row_group_physical_stats` 中的统计列提供了列存储索引的大量元数据，有助于理解其结构的构建方式。表
  **5-26** 中定义的统计信息为管理列存储索引提供了必要的洞察。例如，`total_rows` 和 `deleted_rows` 可用于确定行组中仍然有效的部分。在某些情况下，对行组进行激进的修改可能会在表中留下空行组。当行组小于
  `2²⁰` 行时，`state`、`trim_reason` 和 `transition_to_compressed` 信息可以帮助识别行组是如何被压缩的。例如，如果有大量由于
  `BULKLOAD` 而关闭的小行组，重建这些行组或修改加载过程以尝试在每次插入操作中插入更多行可能是有价值的。


  **表 5-26**


  `sys.dm_db_column_store_row_group_physical_stats` 中的统计列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `state` | `tinyint` | 与 `state_desc` 关联的 ID 号。 |

  | `state_desc` | `nvarchar(60)` | 行组状态的描述，可以是 `INVISIBLE`、`OPEN`、`CLOSED`、`COMPRESSED`
  或 `TOMBSTONE`。 |

  | `total_rows` | `bigint` | 行组中行的完整计数，包括任何被标记为删除的行。 |

  | `deleted_rows` | `bigint` | 行组中被标记为要删除的行数。 |

  | `size_in_bytes` | `bigint` | 行组的大小（字节）。 |

  | `trim_reason` | `tinyint` | 与 `trim_reason_desc` 关联的 ID 号。 |

  | `trim_reason_desc` | `nvarchar(60)` | 描述压缩行组行数少于一百万行最大值的原因，可以是 `NO_TRIM`、`BULKLOAD`、`ROERG`、`DICTIONARY
  SIZE`、`MEMORY LIMITATION`、`RESIDUAL ROW GROUP`、`STATS MISMATCH` 或 `SPILLOVER`。 |

  | `transition_to_compressed_state` | `tinyint` | 与 `transition_to_compressed_state_desc`
  关联的 ID 号。 |

  | `transition_to_compressed_state_desc` | `nvarchar(60)` | 描述行组如何从增量存储转换为行组，包括 `NOT
  APPLICABLE`、`INDEX BUILD`、`TUPLE MOVER`、`REORG NORMAL`、`REORG FORCED`、`BULKLOAD`
  或 `MERGE`。 |

  | `has_vertipaq_optimization` | `bit` | 布尔值，标识压缩过程中是否使用了 Vertipaq 优化。此功能大大提高了列存储压缩的效率。
  |

  | `generation` | `bigint` | 与此行组关联的行组代。 |

  | `created_time` | `datetime2` | 创建此行组时的时钟时间。 |

  | `closed_time` | `datetime2` | 关闭此行组时的时钟时间。 |


  ### 列存储操作统计信息


  列存储索引操作统计信息由 DMO `sys.dm_db_column_store_row_group_operational_stats` 提供。此 DMO 也返回列存储索引中每个行组的一行。如果表已分区，则将返回每个分区的每个行组一行。


  #### 头列


  `sys.dm_db_column_store_row_group_operational_stats` 的头列类似于列存储物理统计 DMO 的头列。不同之处在于没有对增量存储的引用。此
  DMO 返回列 `object_id`、`index_id`、`partition_number` 和 `row_group_id`。这些列在表 **5-27**
  中定义。


  **表 5-27**


  `sys.dm_db_column_store_row_group_operational_stats` 中的头列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `object_id` | `int` | 定义索引的表或视图的 ID |

  | `index_id` | `int` | 索引的 ID |

  | `partition_number` | `int` | 索引或堆内的 1 基分区号 |

  | `row_group_id` | `bigint` | 行组的 ID |


  #### 统计列


  在表 **5-28** 中定义的列中，包含了关于行组扫描次数、删除位图被扫描次数以及列存储分区被扫描次数的详细信息。这些详细信息识别了与索引的其余部分相比，每个行组被访问的频率，以及删除位图被查询的频率，描绘了数据如何写入每个行组。


  此外，还可以测量对行组可访问性产生负面影响的锁和阻塞事务，从而深入了解何时存在需要解决的潜在 I/O 或事务瓶颈。


  **表 5-28**


  `sys.dm_db_column_store_row_group_operational_stats` 中的统计列


  | 列名 | 数据类型 | 描述 |

  | --- | --- | --- |

  | `scan_count` | `int` | 自上次 SQL 重启以来扫描行组的次数。 |

  | `delete_buffer_scan_count` | `int` | 使用删除缓冲区确定此行组中已删除行的次数。这包括访问内存中的哈希表和底层的 B 树。
  |

  | `index_scan_count` | `int` | 扫描列存储索引分区的次数。对于分区中的所有行组，此值相同。 |

  | `rowgroup_lock_count` | `bigint` | 自上次 SQL 重启以来，此行组锁请求的累计计数。 |

  | `rowgroup_lock_wait_count` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计次数。 |

  | `rowgroup_lock_wait_in_ms` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计毫秒数。 |


  ## 总结


  本章广泛介绍了 SQL Server 中与索引相关的统计信息。这些信息为深入了解 SQL Server 中索引这一广泛主题打开了一扇窗口。在接下来的章节中，将利用这些信息，通过查看已捕获的统计数据并使用它们来改进索引创建、使用和维护的各个方面。


  '
- '# 第 6 章 XML 索引


  过去几章重点介绍了对通常称为*结构化数据*的索引，其中数据及其存储具有通用的模式和组织。在本章和接下来的几章中，索引的重点将转向非结构化和半结构化数据。对于结构化和非结构化数据，索引的任务都是为了获得检索和操作数据的最佳效率，但表示这些类型的数据的数据类型在数据库中的存储方式存在差异。这些差异决定了索引的实现方式以及查询优化器如何使用索引。


  SQL Server 有一个专门的数据类型来存储最常见的非结构化和半结构化数据类型——XML。本章探讨 SQL Server 为优化 XML 数据提供的索引类型。本章还将展示这些索引对可针对
  XML 数据编写的查询类型的影响（使用 XQuery），以及对优化器所做选择的影响。


  ## XML 数据


  可扩展标记语言（XML）在 20 世纪 90 年代开发，并于 1998 年 2 月被万维网联盟采纳为标准。多年来，XML 数据一直存储在数据库中，但在 SQL
  Server 2005 之前，它没有专门的数据类型或访问方法。当引入时，XML 数据类型扩展了 SQL Server 的功能，以适当地管理这种不同的数据结构。随着
  XML 的接受，SQL Server 数据库中 XML 内容的使用和总量有所增长。这种增长是由 XML 为应用程序开发人员提供的优势所推动的。



  ### 优势


  引入 `XML` 数据类型使得在 `SQL Server` 数据库中能够充分发挥 `XML` 存储的能力。这包括能够根据针对 `XML` 本身编写的查询来检索
  `XML` 内容。`XML` 为开发者提供的最强大支持在于它既是基于文本的，同时从本质上讲也是**自描述的**。基于文本意味着 `XML` 可以轻松地从一个应用程序传递到另一个应用程序，不受底层操作系统或编程语言的限制。`XML`
  的自描述特性意味着，它不需要像数据库中定义列和表那样预先定义结构。相反，`XML` 的元素和属性会描述它们自身。`XML` 被称为**半结构化**数据，因为通常会有一个模板来定义预期的结构，以帮助验证任何给定的
  `XML` 集合是否**格式良好**。


  在使用 `SQL Server` 处理大量 `XML` 时，对 `XML` 建立索引可能是有益的。`XML` 索引的最大好处体现在存储了大量 `XML` 数据但只需要检索其中一小部分子集的场景中。在这些情况下，`XML`
  索引可以确保快速读取一小部分 `XML` 数据，而无需缓慢地扫描整个文档。


  #### 注意事项


  尽管 `XML` 数据类型听起来是每种 `XML` 实例的完美选择，但在设计 `SQL Server` 中用于存储 `XML` 的列时，仍需评估一些注意事项。最关键的一点是
  `XML` 内容应该是**格式良好**的。这确保了 `XML` 数据类型以及为最有效利用数据而提供的功能能够充分发挥优势。`XML` 列以二进制大对象（更常见的名称是
  `BLOB`）的形式存储。这种存储方式意味着在大多数情况下，对该内容进行运行时查询是资源密集型且缓慢的。对于任何涉及数据检索的任务，检索的效率都是需要关注的问题。在
  `SQL Server` 中，索引对于效率的高低至关重要。完全缺乏索引或索引过多都会影响任何数据操作任务。`XML` 数据类型也不例外。`XML` 索引与 `SQL
  Server` 中的其他索引方法相比是独特的。


  ## XML 索引


  `XML` 索引主要分为两大类：主/辅助 `XML` 索引和选择性 `XML` 索引。这些索引类型之间的主要区别在于索引中包含的 `XML` 数据量。对于主/辅助索引，所有路径、节点和值都包含在索引中。当不清楚
  `XML` 的哪些部分会被最频繁访问时，这种方式很有效。反之，如果只会访问 `XML` 的有限部分，那么选择性 `XML` 索引可以提供更好的性能，因为被索引的数据量减少了。接下来的两节将全面探讨这两类
  `XML` 索引。


  ### 主/辅助 XML 索引


  顾名思义，主/辅助 `XML` 索引下包含两种索引类型：主索引和辅助索引。这两种索引类型在 `XML` 文档内提供的索引关系类似于聚集索引和非聚集索引之间的关系。在实现
  `XML` 索引时，一些基本规则适用于每种类型：


  *   一个列上只能存在一个主 `XML` 索引，但一个表上可以存在多个主 `XML` 索引。

  *   主 `XML` 索引不能存在于没有聚集索引的表的主键上（该表包含 `XML` 列）。此聚集索引是表分区所必需的，而 `XML` 索引可以使用相同的分区方案和功能。

  *   主 `XML` 索引包含 `XML` 内容的所有路径、标签和值。

  *   没有主 `XML` 索引，就无法存在辅助 `XML` 索引。

  *   辅助 `XML` 索引扩展了主索引，包含了路径、值和属性。


  为了演示主/辅助 `XML` 索引，将使用 `AdventureWorks2017` 数据库中的 `[Sales].[Store]` 表。该表在 `[Demographics]`
  列上已存在一个主 `XML` 索引，需要使用清单 6-1 中的代码将其删除。


  ```sql

  USE AdventureWorks2017;

  GO

  DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

  ```


  清单 6-1

  删除 [Sales].[Store] 上现有的主 XML 索引


  首先对针对该表的示例查询进行成本基准测试是有用的。在清单 6-2 的查询中，将在 `[Sales].[Store]` 表中查询年销售额等于 1,500,000
  美元的商店。对于一个返回不到 200 条记录的查询，其成本为 12.751（如图 6-1 所示），这是相当高的。这是由于 `XML` Reader 带有 `XPath`
  过滤器，它必须为所有行解构整个 `XML` 文档以查找请求的记录，这是一个缓慢且资源密集型的过程。


  ```

  A X M L query page. The records requested in the query, returns a set of data. Cached
  plan size is 32 kilobytes. The degree of parallelism is 1\. Estimated subtree cost
  is 12.751\. Estimated number of rows is 630.9.

  ```


  图 6-1

  无 XML 索引时的 XML 查询成本


  ```sql

  USE AdventureWorks2017;

  GO

  WITH XMLNAMESPACES

  (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

  SELECT BusinessEntityID, Name, Demographics

  FROM [Sales].[Store]

  WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

  ```


  清单 6-2

  针对年销售额查询 [Sales].[Store]


  **注意**

  本章将使用估计子树成本与逻辑读取的比较来展示 `XML` 索引的价值。虽然本书中的大多数分析都侧重于通过使用索引来减少 I/O，但解析 `XML` 通常是一个计算成本高昂的操作，因此重点关注查询成本。也可以使用统计时间来大致比较
  CPU 测量值。


  这种查询方法成本高昂，但在表中数据量较少时是高效的。然而，在现实生活中，表可能会变得非常大，超过扫描多个 `XML` 文档仍然高效的临界点。例如，想象一个销售点系统，它将每次销售的收据信息存储为
  `XML` 文档。面对这样的数据量，性能将很快开始下降。




  #### 主 XML 索引


  既然我们已经了解了在没有任何 XML 索引的情况下示例查询的成本，现在让我们看看当添加主 XML 索引时会发生什么。使用清单 6-3 中的 `CREATE INDEX`
  代码创建主 XML 索引。有关语法的更多信息请参见第 1 童。这将在 `Demographics` 列上创建一个主 XML 索引。


  ```sql

  USE AdventureWorks2017;

  GO

  CREATE PRIMARY XML INDEX [PXML_Store_Demographics] ON [Sales].[Store]

  ([Demographics])

  ```

  清单 6-3

  在 `[Sales].[Store]` 上创建主 XML 索引


  创建主 XML 索引后，所有路径、标签和节点都会被索引。对于这些项目中的每一项，都会在 XML 索引中创建一条记录，其中包含该项目、该项目在 XML 文档中的出现方式信息以及与该记录关联的表中的行。这一点很重要，因为
  XML 索引通常会显著增加底层表的存储空间占用。为了演示，运行清单 6-4 中的代码以查看每个索引的记录数和页数。如图 6-2 所示的结果所示，主 XML 索引中的记录数大大超过了表中的记录数，达到了
  13 倍。


  ![](img/338675_4_En_6_Fig2_HTML.png)

  图 6-2

  创建主 XML 索引后的物理统计信息


  ```sql

  USE AdventureWorks2017;

  GO

  SELECT [i].[name]

  ,[i].[index_id]

  ,[IPS].[index_level]

  ,[IPS].[index_type_desc]

  ,[IPS].[fragment_count]

  ,[IPS].[avg_page_space_used_in_percent]

  ,[IPS].[record_count]

  ,[IPS].[page_count]

  FROM [sys].dm_db_index_physical_stats, OBJECT_ID(N''Sales.Store''), NULL, NULL,
  ''DETAILED'') AS [IPS]

  INNER JOIN [sys].[indexes] AS [i]

  ON [i].[object_id] = [IPS].[object_id]

  AND [i].[index_id] = [IPS].[index_id]

  WHERE [IPS].[index_type_desc] <> ''NONCLUSTERED INDEX''

  ORDER BY [i].[index_id]

  ,[IPS].[index_level];

  ```

  清单 6-4

  `[Sales].[Store]` 上的主 XML 索引详细信息


  主 XML 索引就位后，可以执行清单 6-2 中的代码来演示新索引的性能。回顾执行计划，可以清楚地看到执行计划呈现出一种截然不同的模式，如图 6-3 所示。估计子树成本从超过
  12 降低到 0.1535，带有 XPath 过滤器的 XML Reader 被替换为主 XML 索引的聚集索引扫描。在底层，查询仍然在扫描表，但这样做所需的工作量要小得多。对于更大的表，这种索引更改将显著缩短查询的持续时间。


  ![](img/338675_4_En_6_Fig3_HTML.jpg)

  图 6-3

  使用主 XML 索引的 XML 查询成本


  使用主 XML 索引，优化器可以做出更均衡的选择。`Sales.Store` 表的 `聚集索引扫描` 的估计成本与针对最近创建的 XML 索引的 `聚集索引查找`
  一样高。查询引擎中工作发生位置的这种转变将带来性能的提升。


  **注意**

  当删除主 XML 索引时，所有辅助 XML 索引也将被删除，因为它们依赖于主索引。此操作不会给出警告。


  #### 辅助 XML 索引


  辅助 XML 索引提供了进一步改善 XML 数据查询的能力。使用辅助 XML 索引时，在构建索引时需要在 `PATH`、`VALUE` 和 `PROPERTY`
  类型之间做出选择。这些选项决定了主 XML 索引中的哪些元素将包含在辅助 XML 索引中，并根据经常针对 XML 文档运行的查询类型提供性能改进。例如，如果更多查询访问的是属性元素，那么辅助
  XML 索引的 `PROPERTY` 类型将是有益的。


  回到清单 6-2 中的示例查询，现有的函数调用同时使用了路径和值。由于此查询首先搜索路径以检查值，并且没有访问其他路径，因此将使用 `PATH` 创建辅助 XML
  索引。`CREATE INDEX` 语句的语法如清单 6-5 所示。请注意，`CREATE INDEX` 语法现在包含一个 `USING` 语句，该语句引用主
  XML 索引，并带有 `FOR PATH` 子句。


  ```sql

  USE AdventureWorks2017;

  GO

  CREATE XML INDEX [SXML_Store_Demographics] ON [Sales].[Store] (Demographics)

  USING XML INDEX [PXML_Store_Demographics]

  FOR PATH;

  ```

  清单 6-5

  创建辅助索引


  创建辅助 XML 索引后，将再次测试清单 6-2 中的示例查询，以查看执行计划如何变化。如图 6-4 所示，执行计划得到了显著改进。估计子树成本从 0.1535
  减少了一半左右，降至 0.0888，并且主 XML 索引上的聚集索引扫描被替换为辅助 XML 索引上的索引查找。现在查询中成本最高的项目是表聚集索引上的聚集索引扫描。使用辅助
  XML 索引几乎消除了访问 XML 数据相关的开销。


  ![](img/338675_4_En_6_Fig4_HTML.jpg)

  图 6-4

  使用辅助 XML 索引的 XML 查询成本


  请注意，辅助 XML 索引有时可能几乎与主 XML 索引一样大。通过运行清单 6-4 中的代码可以证明这一点，如图 6-5 所示，主 XML 索引和辅助 XML
  索引中存在相同数量的记录。在这种情况下，这是意料之中的，因为 XML 文档中的所有数据都是 XML 路径上的值。在这种情况下，辅助 XML 索引的优势在于基于这些路径的排序，这使得
  XML 索引更具选择性。


  ![](img/338675_4_En_6_Fig5_HTML.png)

  图 6-5

  创建辅助 XML 索引后的物理统计信息


  尽管 `sys.dm_db_index_physical_stats` 对于查找维护所有索引（包括 XML 索引）所需的信息很有用，但有一个专门用于 XML 索引的系统视图：`sys.xml_indexes`。此视图显示已应用于
  XML 索引的所有选项。通过了解索引的类型和其他设置，此视图返回的信息对于进一步维护索引很有用。此视图继承自 `sys.indexes`，并返回 `sys.indexes`
  中提供的列。如图 6-6 所示，还存在以下附加列：


  ![](img/338675_4_En_6_Fig6_HTML.png)




  一个包含 2 行 9 列数据的数据库表。列标题为 `name`、`index_id`、`type_desc`、`using_xml_index_id`、`secondary_type`、`secondary_type_desc`、`xml_index_type`、`xml_index_type_description`
  和 `path_id`。表中存在一个主 XML 索引和一个辅助 XML 索引。


  图 6-6


  `sys.xml_indexes` 查询结果


  *   `using_xml_index_id`：辅助索引所基于的父索引。如前所述，创建辅助索引前需要存在主索引。对于主 XML 索引，此列为 `NULL`，仅用于辅助索引。


  *   `secondary_type`：指定辅助索引所基于类型的标志。每个辅助索引基于特定类型（`V` = `VALUE`，`P` = `PATH`，`R`
  = `PROPERTY`）。对于主 XML 索引，此列为 `NULL`。


  *   `secondary_type_desc`：辅助索引类型的描述。描述值对应于 `secondary_type` 列中所述的值。


  考虑主 XML 索引和辅助 XML 索引的存储影响非常重要，因为表中数据越多、数据修改越频繁，这些索引对写入操作的影响就越大。使用辅助 XML 索引带来的性能提升需要与其维护所需的时间进行权衡，以决定是否创建该索引。在构建主
  XML 索引和辅助 XML 索引时，努力在硬件资源、存储空间、索引实用性、创建的索引数量以及索引实际可能被需要的次数之间取得平衡。


  ### 选择性 XML 索引


  SQL Server 2012 引入了选择性 XML 索引，以解决主/辅助 XML 索引的一个重大问题。XML 文档可能非常大。对整个文档创建索引会对索引的创建和随时间的维护产生重大的性能影响。此外，这些过大的索引也会加剧组织内常见的存储困境。当索引变得很大时，其功能可能不如较小时那么好。基于这些原因，引入了选择性
  XML 索引。


  选择性 XML 索引允许仅在 XML 文档的一个子集上创建索引。这使得索引更小、更灵活，并针对 XML 中的特定路径。创建索引时，会解析文档并分解 XML。分解后的值存储在数据库中的标准关系存储中。除了选择性
  XML 索引本身，还可以基于定义选择性 XML 索引的路径内的节点添加辅助索引。


  当通常只需要元素的子集时，选择性 XML 索引相比标准 XML 索引可以实现显著的性能优势。然而，如果对 XML 列的查询大多是即席查询，可能请求 XML 文档中的任何元素，那么标准
  XML 索引可能更有用。同样，具有大量节点路径的 XML 文档可能从标准 XML 索引中获益更多，而非选择性 XML 索引。


  要创建选择性 XML 索引，必须遵循以下条件：


  *   表必须在主键上定义聚集索引。

  *   主键大小限制为 128 字节。

  *   聚集索引键列在与选择性 XML 索引一起使用时限制为 15 列。


  选择性 XML 索引不会用于 XQuery 语句中的 `query()` 或 `modify()` 方法。它将支持 `exist()`、`value()` 和
  `nodes()`。如果同时使用 `query()` 和 `modify()`，它将仅辅助节点查找。


  清单 6-6 中的脚本在选择性 XML 索引中创建路径。由于文档中仅访问年度销售额，因此选择性 XML 索引可以仅限于该 XML 路径。


  ```

  USE AdventureWorks2017;

  GO

  CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSales]

  ON [Sales].[Store] (Demographics)

  WITH XMLNAMESPACES

  (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

  FOR (AnnualSales = ''/StoreSurvey/AnnualSales'');

  ```


  清单 6-6

  创建选择性 XML 索引的脚本


