  `用于查看哈希索引统计信息的查询`


  查看 `代码清单 8-7` 的结果（如图 `8-3` 所示），可以揭示几个关键指标。第一个指定了 1,000 个存储桶的索引 (`SalesOrderHeader_low`)
  实际上有 1,024 个索引存储桶。这是因为存储桶是按照二的幂次对齐进行分配创建的。这也是为什么在 `SalesOrderHeader_high` 上为 1,000,000
  行创建的索引有 1,048,576 个存储桶的原因。下一个值得注意的属性是 `SalesOrderHeader_high` 上哈希索引的空存储桶数量。虽然有 1,000,000
  行数据和超过一百万个存储桶，但仍有 37% 的存储桶是空的。这种情况发生的原因是，在使用确定性的哈希函数时，在所有的存储桶被利用完之前，一些被哈希的值可能在值范围内重复了。这是在构建哈希索引时需要考虑的一点，特别是当目标是实现存储桶与行数
  1:1 比例时。


