  与哈希索引类似，范围索引在创建内存优化表时提供了一个宝贵的性能提升机会。执行范围扫描和排序结果的需求在许多应用中都很常见。通过使用范围索引，这些操作的性能可以得到极大的改善。





  ## 本章总结


  本章介绍了可用于内存优化表的索引类型。这些选项包括哈希索引和范围索引，它们是内存优化表能够提供卓越性能的动力所在。如文所示，每种索引类型都对应不同的查询模式。理解这些模式对于为内存优化表及其支持的工作负载构建最优索引至关重要。


  '
- "# 9. 全文索引\n\nSQL Server 支持用于存储大量非结构化文本信息的机制。自 SQL Server 2008 起，其中一种机制便是与可变长度字符数据类型\
  \ `VARCHAR` 和 `NVARCHAR` 一起使用的 `MAX` 长度。这意味着你可以在单个列中存储最多 2 GB 的字符信息。虽然 SQL Server\
  \ 可以存储此类信息，但非聚集索引的 1,700 字节限制和聚集索引的 900 字节限制使得通过传统方式进行索引成为一个挑战。幸运的是，SQL Server 提供了另一种索引机制用于在这些大型数据类型中进行搜索：全文索引。\n\
  \n## 全文索引\n\n全文索引是 SQL Server 中另一项索引功能，它超出了常规的索引方法和对象。本章将简要描述全文搜索（FTS）的架构、存储和索引，以实现最佳性能。\n\
  \n全文搜索（FTS）允许存储和高效搜索大量基于文本的内容。此内容可以包含许多不同的格式，例如 Word 文档（`.docx`）文件。此类存储位于 BLOB（二进制大对象）列中，而非纯文本数据中。存储和搜索非结构化性质的内容的能力，为数据库管理系统提供了许多技术机遇。\n\
  \n文档留存就是这样一个机遇，它允许以低得多的成本长期存储文档。其搜索能力使得能够针对各种需求查询这些内容。想象一家航运公司，它根据纯文本模板生成了数千份运输单据。为了确保日后能够跟踪货物运输情况，这些文档的留存构成了一个庞大的任务。存储仓库房间的维护需要成本。当需要研究特定货物运输的任务出现时，除非能够自动化，否则完成该任务所需的工时是相当可观的。\n\
  \n如果这家航运公司使用 `FTS` 功能和索引结构，那么文档会被扫描到系统中，系统读取文本后再将其插入 SQL Server 数据库。这允许对特定的账号、运输发票以及日后审查所需的文档中任何独特文本进行全文搜索。可以创建一个类似书籍索引的索引，使查找特定文档变得更快。更进一步，`FTS`\
  \ 可以在文档本身内部查找特定内容。如果请求是查找由特定货运公司在特定拖车上发送的所有运输文档，`FTS` 功能允许在几分之一的时间内检索到信息，与手动流程或未索引的文本搜索相比。\n\
  \n### 创建全文索引示例\n\n既然已经介绍了 `FTS` 的概念，现在可以讨论索引策略了。全文索引是搜索和查询非结构化文本数据的支柱。这些数据可以是多种数据类型，包括\
  \ `char`、`varchar`、`nchar`、`nvarchar`、`xml` 和 `varbinary`。虽然可以使用 `text`、`ntext`\
  \ 和 `image`，但最好避免使用它们，因为它们在 SQL Server 中已弃用。数据类型 `varchar`、`nvarchar` 和 `varbinary`\
  \ 分别提供了等效的类型。\n\n在本节关于全文索引的剩余部分，Joseph Sack 的白皮书“Optimizing Your Query Plans with\
  \ the SQL Server 2014 Cardinality Estimator”的内容已使用清单 9-1 中的脚本插入到示例表中。该文档将用于演示全文索引，可以在联机丛书或从\
  \ [`http://bit.ly/1II5UfU`](http://bit.ly/1II5UfU) 下载，并放置在目录 `c:\\temp` 中。此外，需要安装全文目录功能才能成功运行本章中的代码。全文目录不是默认安装的功能，因此可能需要先安装它。\n\
  \n注意\n\n对于所有版本的 SQL Server，要在 Microsoft Office 文档上构建全文索引，必须安装筛选器包 IFilter。请从 [`https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server`](https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server)\
  \ 下载并安装 Microsoft Office Filter Packs。请务必遵循额外的步骤来运行 `sp_fulltext_service` 并重新启动\
  \ SQL Server 实例。\n\n\n\n\n#### 创建全文目录\n\n以 AdventureWorks2017 为例，我们将准备一个用于全文搜索的表。使用\
  \ `varbinary(max)` 数据类型可以导入大多数文档类型和图像。在代码清单 `9-1` 中，`CREATE TABLE` 和 `INSERT` 语句准备了创建全文搜索索引所需的对象。\n\
  \n```\nUSE AdventureWorks2017\nGO\nDROP TABLE IF EXISTS dbo.SQLServerDocuments;\n\
  CREATE TABLE dbo.SQLServerDocuments (\nSQLServerDocumentsID INT IDENTITY(1, 1),\n\
  DocType VARCHAR(6),\nDOC VARBINARY(MAX),\nCONSTRAINT PK_SQLServerDocuments PRIMARY\
  \ KEY CLUSTERED\n(SQLServerDocumentsID)\n);\nGO\nDECLARE @worddoc VARBINARY(MAX);\n\
  SELECT  @worddoc = CAST(bulkcolumn AS VARBINARY(MAX))\nFROM    OPENROWSET(BULK 'c:\\\
  temp\\Optimizing Your Query Plans with the SQL Server 2014 Cardinality Estimator.docx',\
  \ SINGLE_BLOB) AS x;\nINSERT  INTO dbo.SQLServerDocuments\n(DocType, DOC)\nVALUES\
  \  ('docx', @worddoc);\nGO\n代码清单 9-1\n用于全文搜索的 CREATE TABLE 和 INSERT 语句\n```\n\n\
  在创建 FTS 索引时，必须首先创建一个全文目录。自 SQL Server 2008 起，目录作为定义包含在数据库中。目录本身是一个虚拟对象，通过消除 I/O\
  \ 瓶颈极大地提升了性能。一个目录包含所有可搜索的属性。\n\n目录是通向全文索引的桥梁。在开始之前，让我们回顾一下 `CREATE FULLTEXT CATALOG`\
  \ 的语法，如代码清单 `9-2` 所示。\n\n```\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT CATALOG\
  \ \nWITH \nAS DEFAULT\nAUTHORIZATION \nACCENT_SENSITIVITY = ;\n代码清单 9-2\nCREATE\
  \ FULLTEXT CATALOG 语法\n```\n\n创建目录时，应首先考虑的选项是 `AS DEFAULT` 设置。通常，人们在创建全文索引时并未考虑其应归属哪个目录。如果在创建索引时省略了目录指定，则会使用已被设为默认值的目录。\n\
  \n授权和重音敏感性在 `CREATE` 命令中是明确指定的。如果省略授权选项，所有权将归属于 `dbo`。对于 SQL Server 中未声明所有权的大多数对象也是如此。建议分配所有权以进行安全管理并将对象分组到适当的区域。当为所有权指定用户时，必须指定一个用户名，该用户名需符合以下条件之一：\n\
  *   运行该语句的用户的名称\n*   执行该命令的用户拥有模拟权限的用户的名称\n*   数据库所有者或系统管理员\n\n重音敏感性决定目录是重音敏感还是不敏感。例如，在重音不敏感的情况下，“piñata”和“pinata”将被视为同一个词。在创建目录之前，请务必研究是否应启用重音敏感性。如果更改此选项，则必须重建目录上的全文索引。\n\
  \n为了在本白皮书中创建全文目录，请执行代码清单 `9-3` 中的语句。对于此目录，语法将使用默认选项，这些选项将重音敏感性设置为表的排序规则。\n\n```\n\
  USE AdventureWorks2017\nGO\nCREATE FULLTEXT CATALOG WhitePaperCatalog AS DEFAULT;\n\
  代码清单 9-3\n创建新的全文目录\n```\n\n#### 创建全文索引\n\n目录已创建，并且已决定如何处理目录、重音敏感性和所有权后，就可以考虑如何配置和创建全文索引了。其中最关键的决策是键索引的要求。\n\
  \n##### 语法\n\n代码清单 `9-4` 中的语法用于创建全文索引。表 `9-1` 描述了可用的不同选项。\n\n表 9-1\n全文索引选项\n\n|\
  \ 选项名称 | 描述 |\n| --- | --- |\n| `TYPE COLUMN` | 指定用于存储加载到 BLOB 类型（如 `.doc`、`.pdf`\
  \ 和 `.xls`）中的文档的文档类型的列的名称。此选项仅适用于 `varbinary`、`varbinary(max)` 和 `image` 数据类型。如果在任何其他数据类型上指定此选项，`CREATE\
  \ FULLTEXT INDEX` 语句将引发错误。 |\n| `LANGUAGE` | 更改用于索引的默认语言，具有以下变体和选项：• 可以将语言指定为字符串、整数或十六进制。•\
  \ 如果指定了语言，则在使用索引运行查询时将使用该语言。• 当语言指定为字符串值时，`syslanguages` 系统表必须与该语言相对应。• 如果使用双字节值，则在创建时将其转换为十六进制。•\
  \ 必须启用特定语言的断字器和词干分析器，否则将生成 SQL Server 错误。• 包含多种语言的非 BLOB 和非 XML 列应遵循 0 `×` 0 中性语言设置。•\
  \ 对于 BLOB 和 XML 类型，将使用文档本身中的语言类型。例如，语言类型为俄语或 LCID 为 1049 的 Word 文档将强制在索引中使用相同的设置。使用\
  \ `sys.fulltext_languages` 查看所有可用的语言类型和 LCID 编码。 |\n| `KEY INDEX` | 每个全文索引都需要指定一个相邻的唯一、单键、非空列。使用此选项在同一个表中指定该列。\
  \ |\n| `FULLTEXT_CATALOG_NAME` | 如果全文索引不使用默认目录创建，请使用此选项指定目录名称。 |\n| `CHANGE_TRACKING`\
  \ | 确定索引的填充方式和时间。选项为 `MANUAL`、`AUTO` 和 `OFF [NO_POPULATION]`。`MANUAL` 设置需要在填充索引前执行\
  \ `ALTER FULLTEXT INDEX ... START UPDATE POPULATION`。`AUTO` 设置在创建时填充索引，并根据后续进行的更改自动更新。如果在\
  \ `CREATE` 语句中省略了 `CHANGE_TRACKING`，则此为默认设置。`OFF [NO_POPULATION]` 设置用于完全关闭索引的填充，并且\
  \ SQL Server 将不保留更改列表。除非指定了 `NO_POPULATION`，否则索引在创建时会被填充一次。 |\n| `STOPLIST` | 指定一个停用词列表，以阻止某些词被索引。可用选项为\
  \ `OFF`、`SYSTEM` 和一个自定义停用词列表。`OFF` 设置将不使用停用词列表，并会增加填充索引的性能开销。`SYSTEM` 是已创建的默认停用词列表。用户创建的停用词列表是已创建的、可与给定全文索引关联使用的停用词列表。\
  \ |\n| `SEARCH PROPERTY LIST` | 指定要与全文索引关联的搜索属性列表。属性列表允许对文档属性（如标题或标签）之间的搜索进行区分，从而提供对全文搜索的更精细控制。\
  \ |\n\n```\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT INDEX ON \n()\nKEY INDEX\
  \ \nON \nWITH \nCHANGE_TRACKING = ;\n代码清单 9-4\nCREATE FULLTEXT INDEX 语法\n```\n\n\
  在大多数其他 `CREATE INDEX` 语句中，基本语法和选项相似，只有细微修改。而对于 FTS 索引创建，则有一套完全不同的选项和考虑因素。最初的 `CREATE\
  \ FULLTEXT INDEX` 与任何 `CREATE INDEX` 相同，需要指定表以及要索引的列。之后，其他选项就不是普通索引创建中常见的了。\n\n\n\
  \n### 全文索引关键配置\n\n#### 键索引\n\n选择键索引是一个相对直接的选择，因为键索引必须是唯一的、单键的且非空的列。主键通常很适合这个任务，如清单\
  \ 9-1 中 `dbo.SQLServerDocuments` 表所示。然而，应考虑键的大小。理想情况下，推荐使用 6 字节的键，并证明其能最大程度减少 I/O\
  \ 和 CPU 资源消耗的开销。回顾一下，唯一键的限制之一是其长度不能超过 900 字节。如果达到这个最大限制，填充将会失败。解决此问题可能需要强制创建新索引并修改表本身。对于高使用率的表，这可能会造成昂贵的停机时间。\n\
  \n#### 填充\n\n在创建全文索引时，应仔细权衡全文索引的更改跟踪方式。默认的 `AUTO` 设置可能会在被索引列内容频繁更改时产生影响性能的额外开销。例如，一个存储每月只插入一次且永不更改的货运发票的系统，可能不会受益于\
  \ `AUTO` 设置。可以使用 SQL Server Agent 在指定时间运行 `MANUAL` 填充，这取决于表中内容的加载情况。虽然不常见，但有些系统是静态的，只加载一次。这将是使用\
  \ `OFF` 设置的理想情况，仅在当时执行初始填充。\n\n填充的最后一个选项是增量填充。增量填充的概念与数据的增量更新相同。随着数据的更改，这些更改会被跟踪。可以将合并复制作为比较。合并复制通过使用触发器以及将插入/更新/删除跟踪行写入合并系统表来保留更改。在给定时间点，数据库管理员可以设置同步计划来处理这些更改并将其复制到订阅者。增量填充的工作方式与此相同。通过在表中使用\
  \ `timestamp` 列，可以跟踪更改。只有发现需要更改的行才会被处理。这意味着必须满足表上存在 `timestamp` 列的要求才能执行增量填充。对于更改极其频繁的数据，这可能不是理想的选择。然而，对于随机且很少更改的数据，增量填充可能是理想的。\n\
  \n#### 停止列表\n\n停止列表在管理不进行填充的内容方面极其有用。这可以通过绕过所谓的“干扰词”来提高填充性能。例如，考虑句子 “A dog chewed\
  \ through the fiber going to the SAN causing the disaster recovery plans to be used\
  \ for the SQL Server instance.” 在这个句子中，最应该被索引的有用词是 `fiber`、`SAN`、`disaster`、`recovery`、`SQL`\
  \ 或 `Server`。而 `A`、`the`、`to` 和 `be` 则不是理想的索引词。这些词被认为是干扰词，不属于填充过程的一部分。人们很少搜索介词、副词或其他用于连接想法而非构成想法本身的词语。\n\
  \n使用停止列表对整体填充性能和解析全文索引内容非常有帮助。停止列表的使用也可以特定于语言。例如，法语中的 `la` 会优先于英语中的 `the` 被指定。\n\
  \n要创建自定义停止列表，请使用 `CREATE FULLTEXT STOPLIST` 语句，如清单 9-5 所示。可以使用系统默认的停止列表来预生成所有已被识别为干扰词的词。对于本文档示例，停止列表的名称将是\
  \ `WhitePaperStopList`。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT STOPLIST\
  \ WhitePaperStopList FROM SYSTEM STOPLIST;\nListing 9-5\nCreating a Full-Text StopList\n\
  ```\n\n要查看停止列表，请使用系统视图 `sys.fulltext_stoplists` 和 `sys.fulltext_stopwords`。`sys.fulltext_stoplists`\
  \ 视图将保存与在 SQL Server 实例上创建的停止列表相关的元数据。确定 `stoplist_id` 以连接到 `sys.fulltext_stopwords`\
  \ 来显示完整的词列表。单独来看，此停止列表并不比系统默认停止列表更好。要向停止列表添加词，请使用 `ALTER FULLTEXT STOPLIST` 语句，如清单\
  \ 9-6 所示，该语句移除了 `Downtime` 一词作为待索引词。\n\n```sql\nUSE AdventureWorks2017\nGO\nALTER\
  \ FULLTEXT STOPLIST WhitePaperStopList ADD 'Downtime' LANGUAGE 1033;\nListing 9-6\n\
  Modifying a Full-Text StopList\n```\n\n要查看停止列表中的词，请运行清单 9-7 所示的查询。\n\n```sql\nUSE\
  \ AdventureWorks2017\nGO\nSELECT  lists.stoplist_id,\n        lists.name,\n    \
  \    words.stopword\nFROM    sys.fulltext_stoplists AS lists\nINNER JOIN    sys.fulltext_stopwords\
  \ AS words\n    ON lists.stoplist_id = words.stoplist_id\nWHERE   words.language\
  \ = 'English'\nORDER BY lists.name;\nListing 9-7\nUsing sys.fulltext_stoplists to\
  \ Review StopList Words\n```\n\n查询结果如图 9-1 所示；单词 `Downtime` 已成功添加。\n\n![](img/338675_4_En_9_Fig1_HTML.png)\n\
  \n一张包含 3 列（stoplist id、name 和 stopword）的表格截图。表格有 4 行，编号从 13 到 16。第 4 行的 stopword\
  \ 列下显示有条目 \"downtime\"。\n\n图 9-1\n停止列表的查询结果\n\n## 创建和使用全文索引\n\n在目录、停止列表以及清单 9-1\
  \ 中创建的表上定义的键索引可用之后，可以在该表的 `DOC` 列上创建全文索引。要创建全文索引，请使用 `CREATE FULLTEXT INDEX` 语句（参见清单\
  \ 9-8）。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT INDEX ON dbo.SQLServerDocuments\n\
  (\n  DOC\n  TYPE COLUMN DocType\n)\nKEY INDEX PK_SQLServerDocuments\nON WhitePaperCatalog\n\
  WITH STOPLIST = WhitePaperStopList;\nListing 9-8\nCREATE FULLTEXT INDEX Statement\n\
  ```\n\n一旦索引创建完成，由于没有为 `CHANGE_TRACKING` 添加选项，填充将立即开始。目录状态的监控将在本章后面讨论。根据文档的大小，加载可能需要一段时间，因为默认的\
  \ `AUTO` 设置会生效。要查询 `SQLServerDocuments` 表和 `DOC` 列的内容，可以运行 `CONTAINS` 语句来返回特定的词。清单\
  \ 9-9 展示了此类语句的示例。\n\n```sql\nUSE AdventureWorks2017\nGO\nSELECT  ssd.DOC,\n    \
  \    ssd.DocType\nFROM    dbo.SQLServerDocuments AS ssd\nWHERE   CONTAINS (ssd.DOC,\
  \ 'statistic');\nListing 9-9\nUsing CONTAINS to Query for a Specific Word\n```\n\
  \n图 9-2 显示了查询的执行计划。\n\n![](img/338675_4_En_9_Fig2_HTML.jpg)\n\n一个包含 4 个组件及其各自成本百分比的流程图：select\
  \ 和 nested loops 各为 0；Clustered index scan 和 table-valued function 各为 50。\n\n图 9-2\n\
  CONTAINS 和全文索引使用的执行计划\n\n通过使用 `CONTAINS`(ssd.DOC,`'statistic')` 进行搜索，图 9-2 中的执行计划显示了在\
