- '# 2. 索引存储基础


  上一章讨论了索引的逻辑设计和语法，本章将重点讨论索引的物理实现。理解索引如何存储以及如何与 SQL Server 和存储引擎交互，是更好地理解索引优势以及如何更有效地利用它们的关键。


  本讨论将从 SQL Server 中数据存储的基础知识开始，包括数据页、它们的格式以及如何管理它们。然后，此信息将被扩展到不同索引类型的基本结构以及每种类型在
  SQL Server 中的实现方式。


  ## 存储基础


  数据库中使用多种结构来存储和组织数据。本章将重点关注那些与表和索引直接相关的结构。此讨论将从页和区开始，然后更深入地探讨 SQL Server 中可用的不同类型的页以及它们如何与索引相关联。




  ### 页


  SQL Server 中数据的基本存储单元是页。页用于存储从表中的行到在最低层映射索引结构的所有内容。


  当空间分配给数据库数据文件时，空间被划分为页。在分配期间，每个页被创建为使用 8 KB（8,192 字节）的空间，并且页从 0 开始编号，每分配一个页递增 1。当
  SQL Server 与数据库文件交互时，可以发生输入/输出（I/O）操作的最小单位是页级别。例如，使用 `STATISTICS IO` 时，读取和写入的计数以页为单位进行度量。


  一个页有三个主要组成部分：页头、其记录和偏移数组，如图 2-1 所示。所有页都以页头开始。页头为 96 字节，包含有关页的元数据，例如页号、其所属对象以及页类型。如果要在页上存储行（例如数据和索引页），页的末尾将包含一个偏移数组。偏移数组为
  36 字节，提供指向页上行起始位置的指针。在这两个区域之间是 8,060 字节，用于存储记录和其他页面数据。


  ![](img/338675_4_En_2_Fig1_HTML.png)


  一个带有三个自上而下标签的狗耳文件图标，分别是：header、records 和 offset array。


  **图 2-1**


  页结构


  如果页包含偏移数组，则它从页的末尾开始。随着行被添加到页，每一行都被添加到页面记录区域的第一个可用位置。接下来，该行的起始位置存储在偏移数组的最后一个可用位置。对于添加的每一行，行的数据存储在离页起始位置更远的地方，而偏移量则存储在离页末尾更远的地方，如图
  2-2 所示。从页的末尾向后读取，偏移量可用于识别页上每一行（有时称为`槽`）的起始位置。


  ![](img/338675_4_En_2_Fig2_HTML.jpg)


  三个狗耳文件图标，页头下方的两个部分有不同的标签。三个图标中分别列出了“行 1 和 1”、“行 1、行 2、2 和 1”以及“行 1、行 2、行 3、3、2 和
  1”，分别对应记录和偏移数组部分。


  **图 2-2**


  行放置和偏移数组


  虽然页的基础知识是相同的，但页的使用方式有所不同。这些用途包括存储数据页、索引结构和大对象。这些用例的每一个细节以及它们如何与 SQL Server 数据库交互，将在本章后面讨论。


  ### 区


  从*页*向上移动，下一个基本的数据存储结构是*区*。区是数据文件中八个物理上连续的页的组。所有页必须属于一个区，并且一个区不能少于或多于八个页。SQL Server
  数据库使用两种类型的区：*混合区*和*统一区*。


  一个混合区包含分配给多个对象的页。例如，当一个表首次创建且分配的页少于八个时，它将构建为一个混合区。只要表的总大小小于八个页，该表就会使用混合区，如图 2-3
  所示。通过使用混合区，数据库可以减少分配给小表的空间量。


  ![](img/338675_4_En_2_Fig3_HTML.png)


  一个示意图，展示了在标有“混合区”的水平条下，八个标有表 A、A、B、B、B、C、C 和 D 的狗耳文件图标。


  **图 2-3**


  混合区


  一旦表中的页数超过八个，它将开始使用统一区。在统一区中，该区中的所有页都分配给数据库中的单个对象（参见图 2-4）。因此，一个对象的页将是连续的，这增加了可以在单个读取操作中读取的对象页数。有关连续读取好处的更多信息，请参见第
  6 章。


  ![](img/338675_4_En_2_Fig4_HTML.png)


  一个示意图，展示了在标有“统一区”的水平条下，八个都标有表 A 的狗耳文件图标。


  **图 2-4**


  统一区


  自 SQL Server 2016 以来，使用统一区已成为所有数据库中所有区分配的默认行为。可以使用 `MIXED_PAGE_ALLOCATION` 数据库选项修改此行为，该选项会将默认分配设置为使用混合区。在
  SQL Server 2014 及更早版本中，此行为相反，默认分配混合区。可以使用跟踪标志 `1118` 在那些版本中修改此行为，该标志指示 SQL Server
  使用统一区，就像当前的默认行为一样。这些配置考虑的关键在于，SQL Server 默认使用统一区，这缓解了大量的页分配争用问题。


  ## 页类型


  一个页可以在 SQL Server 中服务于多种用途。对于每种用途，都有一个与页关联的类型，定义了它的使用方式。SQL Server 数据库中可用的页类型包括：


  *   `文件头页`

  *   `引导页`

  *   `页自由空间 (PFS) 页`

  *   `全局分配映射 (GAM) 页`

  *   `共享全局分配映射 (SGAM) 页`

  *   `差异更改映射 (DIFF) 页`

  *   `最小记录 (ML) 页`

  *   `索引分配映射 (IAM) 页`

  *   `数据页`

  *   `索引页`

  *   `大对象（文本和图像）页`


  接下来的几节将详细阐述页类型并解释它们的使用方式。虽然并非所有页类型都直接涉及索引，但每种类型都将被定义和解释，以帮助提供对数据存储的整体理解。对于每个数据库，页面的布局方式有相似之处。例如，在每个数据库的第一个文件中，页面的布局如图
  2-5 所示。可用的页类型比图中显示的更多，但正如对每种页类型的考察将显示的那样，只有前几页是固定的。许多其他页类型以由数据库中的数据决定的模式出现。


  ![](img/338675_4_En_2_Fig5_HTML.png)


  一个示意图，展示了在向右箭头上方，10 个标有“file header page”、“P F S page”、“G A M page”、“S G A M page”、“N
  A”、“N A”、“D C M page”、“M L page”、“data page”和“boot page”的狗耳文件图标。图标编号从 0 到 9，而第十一个图标没有标签，编号为
  10+。


  **图 2-5**


  数据文件页


  > **注意**

  >

  > 数据库日志文件不使用页架构。页结构仅适用于数据库数据文件。日志文件架构的讨论超出了本书的范围。


  ### 文件头页


  任何数据库数据文件中的第一页都是文件头页，如图 2-5 所示。由于这是数据文件的第一页，其编号为 `0`。文件头页包含有关数据库文件的元数据，包括：


  *   `文件 ID`

  *   `文件组 ID`

  *   `文件的当前大小`

  *   `最大文件大小`

  *   `扇区大小`

  *   `LSN 信息`


  文件头页上存储的其他各种细节将不再进一步讨论，因为它们超出了索引讨论的范围。




  ### 启动页


  启动页类似于文件头页，它提供重要的元数据。不过，此页面提供的是关于数据库本身的信息，而非数据文件的信息。每个数据库有一个启动页，它位于数据库第一个数据文件的`第
  9 页`（参见图 2-5）。启动页上的一些信息包括：


  *   数据库版本

  *   创建日期

  *   数据库名称

  *   数据库 ID

  *   兼容性级别


  启动页上的一个重要属性是 `dbi_dbccLastKnownGood`。此属性提供了已知最后一次 `DBCC CHECKDB` 成功完成的日期。虽然数据库维护不在本书讨论范围内，但定期对数据库进行一致性检查对于确保高可用性至关重要。


  ### 页空间页


  为了跟踪页面是否有空间可用于插入行，每个数据文件都包含页空间页。这些页面是数据文件的第二页（参见图 2-5），之后每隔 `8,088` 页出现一个，用于跟踪数据库中的空闲空间量。PFS
  页上的每个字节代表数据文件中的一个后续页面，并提供有关该页面的基本分配信息。这包括页面上大约的空闲空间量。


  当数据库引擎需要存储 LOB 数据或堆数据时，它必须找到下一个可用页面并确定当前已分配页面的使用程度。此功能由 PFS 页面提供。每个字节内的位标识当前已使用的空间量。`位
  0–2` 确定页面是否处于以下空闲空间状态之一：


  *   页面为空。

  *   已使用 `1–50`%。

  *   已使用 `51–80`%。

  *   已使用 `81–95`%。

  *   已使用 `96–100`%。


  除了空闲空间，PFS 页面还包含位来标识页面的其他几种信息类型。例如，`位 3` 确定页面上是否存在幽灵记录。`位 4` 标识页面是否是索引分配映射的一部分（本章稍后描述）。`位
  5` 指示页面是否属于混合区。`位 6` 标识页面是否已分配。


  通过这些附加位，SQL Server 可以在较高层面确定页面的当前使用情况。这包括页面是否已分配。如果尚未分配，是否可用于 LOB 或堆数据？如果已分配，则 PFS
  页面提供如本节前面所述的详细信息。


  最后，当幽灵清理进程运行时，它无需检查数据库中的每个页面是否有记录需要清理。相反，可以检查 PFS 页面，只需要管理那些包含幽灵记录的页面。


  > 注意

  >

  > 索引本身处理非 LOB 数据和索引的空闲空间及页面分配。这些结构的页面分配由结构的定义决定。


  ### 全局分配映射页


  与 PFS 页面类似的是全局分配映射页。此页面确定一个区是否已被指定用作统一区，以及该区是否空闲且可用于分配。


  每个 GAM 页提供其 GAM 间隔内所有后续区的映射。一个 GAM 间隔由 GAM 页之后的 `64,000` 个区（`4 GB`）组成。GAM 页上的每个位代表
  GAM 页之后的一个区。第一个 GAM 页位于数据库文件的`第 2 页`（参见图 2-5）。


  为了确定一个区是否已分配为统一区，SQL Server 检查 GAM 页上代表该区的位。如果该区已分配，则该位设置为 `0`；否则，设置为 `1`，表示该区空闲且可用于其他目的。


  ### 共享全局分配映射页


  与 GAM 页几乎相同的是共享全局分配映射页。页面之间的主要区别在于，SGAM 页确定一个区是否被分配为混合区。与 GAM 页一样，SGAM 页也用于确定页面是否可用于分配。


  每个 SGAM 页提供每个 SGAM 间隔内所有后续区的映射。一个 SGAM 间隔由 SGAM 页之后的 `64,000` 个区（即 `4 GB`）组成。SGAM
  页上的每个位代表 SGAM 页之后的一个区。第一个 SGAM 页位于 GAM 页之后，数据库文件的`第 3 页`（参见图 2-5）。


  SGAM 页确定一个区何时被分配用作混合区。如果该区为此目的而分配并且有可用页面，则该位设置为 `1`。当设置为 `0` 时，表示该区未用作混合区，或者是所有页面都在使用的混合区。


  ### 差异更改映射页


  下一页是差异更改映射页。此页面用于确定 GAM 间隔中的某个区是否已更改。当一个区发生变化时，一个位值从 `0` 更改为 `1`。这些位存储在 DCM 页的一个位图行中，每个位代表一个区。


  DCM 页用于跟踪在完整数据库备份之间哪些区发生了更改。每当进行完整数据库备份时，DCM 页上的所有位都会重置为 `0`。然后，当关联的区中发生更改时，该位会更改回
  `1`。


  DCM 页的主要用途是为差异备份提供已修改区的列表。这比检查数据库中的每个页面或区以查看其是否已更改要高效得多。相反，DCM 页提供了需要备份的区的列表。


  第一个 DCM 页位于数据文件的`第 6 页`。后续的 DCM 页对应数据文件中的每个 GAM 间隔出现。


  ### 最小日志页


  DCM 页之后是最小日志页，以前称为批量更改映射页。ML 页用于指示 GAM 间隔中的某个区是否已被最小日志操作修改。任何受最小日志操作影响的区，其位值将设置为
  `1`，未受影响的则设置为 `0`。这些位存储在 ML 页的一个位图行中，每个位代表 GAM 间隔中的一个区。


  正如 ML 页的旧名称（批量更改映射）所暗示的，这些页面与 `BULK_LOGGED` 恢复模型结合使用。当数据库使用此恢复模型时，ML 页用于标识自上次事务日志备份以来通过最小日志操作修改的区。当事务日志备份完成时，ML
  页上的位将重置为 `0`。


  第一个 ML 页位于数据文件的`第 7 页`。后续的 ML 页对应数据文件中的每个 GAM 间隔出现。


  请注意，虽然在 SQL Server 中还有其他方法可以执行最小日志操作（例如 `BCP` 或批量列存储索引插入），但最小日志页仅跟踪与 `bulk_logged`
  恢复模型相关联的那些操作。




  ### 索引分配映射页


  目前为止讨论的大多数页面，都提供了关于它们所覆盖页面上是否存在数据的信息。除了了解一个页面是否开放可用之外，SQL Server 还需要知道页面上的信息是否与特定的表或索引关联。提供此信息的页面就是索引分配映射（IAM）页。


  每个表或索引都首先从一个 IAM 页开始。此页指示在一个 GAM 间隔内，哪些区与该表或索引相关联。如果一个表或索引跨越多个 GAM 间隔，则该表或索引将有多个
  IAM 页。


  一个 IAM 页将一个表或索引与四种类型的页面关联起来。这些类型是数据页、索引页、大型对象页和小大型对象页。IAM 页上使用一个位图行将页面与表或索引关联。


  IAM 页上还定位有一个 IAM 头行。IAM 头提供了一个表或索引的 IAM 页序列号、该 IAM 页所关联的 GAM 间隔的起始页面，以及一个单页分配数组。当分配给一个表或索引的空间少于一个完整区时，会使用这个数组。


  IAM 页提供了一个映射，通过它，一个表或索引的所有页面汇集在一起。当需要定位一个表或索引的所有区时，就会使用此页。


  ### 数据页


  数据页是任何数据库中最普遍的页面类型，用于存储数据库表中的数据。除 LOB 数据类型外，一条记录的所有数据都位于数据页上。LOB 数据类型存储在大型对象页上，这将在本节稍后讨论。


  ### 索引页


  与数据页类似的是索引页。这些页面提供有关索引结构以及数据页位置的信息。对于聚集索引，索引页构建了一个页面层次结构，用于导航聚集索引的二叉树结构。对于非聚集索引，索引页执行相同的功能，但也用于存储构成索引的键值。


  为了构建索引内的页面层次结构，索引页中包含的数据提供了键值和页面地址的映射。键值是子表中第一个排序行所包含的索引键值，而页面地址则标识了此数据的所在位置。


  索引页的构造与其他页面类型相似，它们都有一个页面头部，包含所有标准信息，如页面类型、分配单元、分区 ID 和分配状态。行偏移数组包含指向索引数据行在页面上位置的指针。索引数据行包含两部分信息：键值和一个页面地址。


  索引页提供了索引中所有数据页如何链接在一起的映射，因此在理解 SQL Server 中的数据存储方面扮演着至关重要的角色。


  ### 大型对象页


  单个页面上数据的限制是 8 KB。然而，某些数据类型的大小可能高达 2 GB。因此，对于这些数据类型，需要另一种存储机制来存储它们：大型对象页类型。


  可以利用 LOB 页的数据类型包括 `text`、`ntext`、`image`、`nvarchar(max)`、`varchar(max)`、`varbinary(max)`
  和 `xml`。当这些数据类型之一的数据存储在数据页上时，如果行的大小超过 8 KB，将使用 LOB 页。在这些情况下，列将包含对数据所需 LOB 页的引用，并将数据存储在
  LOB 页上（参见图 2-6）。


