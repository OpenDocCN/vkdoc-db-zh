  \ 0 和 0，其上方和下方各有 1 行受影响的标签。\n\n图 13-44\n使用了索引的外键模式的统计信息 I/O 结果\n\n```\nUSE AdventureWorks2017\n\
  GO\nCREATE INDEX IX_SalesOrderHeader_CustomerID ON dbo.SalesOrderHeader(CustomerID);\n\
  SELECT MAX(c.CustomerID)\nFROM dbo.Customer c\nLEFT OUTER JOIN dbo.SalesOrderHeader\
  \ soh ON c.CustomerID = soh.CustomerID\nWHERE soh.CustomerID IS NULL;\nSET STATISTICS\
  \ IO ON\nDELETE FROM dbo.Customer\nWHERE CustomerID = 700\n```\n\n清单 13-29\n使用了索引的外键模式\n\
  \n**外键模式**对于在表之间建立外键关系至关重要。这些关系的目的是验证数据，因此必须确保支持该活动的索引已就位。不要以此模式为借口从数据库中移除验证；相反，应将其视为对繁忙表进行正确索引的机会。如果该列需要被查询以进行数据验证和约束，那么当该数据需要用于其他目的时，它很可能也会被应用程序访问。\n\
  \n### 列存储索引\n\n随着数据库规模的增长，传统聚集和非聚集索引无法为计算结果提供所需性能的情况越来越多。这对于大型数据仓库构成了最大的挑战，为解决此问题，SQL\
  \ Server 2012 引入了列存储索引。前面的章节讨论了列存储如何利用基于列的存储而非基于行的存储。本节将介绍聚集和非聚集列存储索引的一些指导原则，以及如何识别何时应构建列存储索引。在介绍指导原则之后，将提供一个实现列存储索引的示例。\n\
  \n### 注意\n\n本节中的列存储索引示例使用了 Microsoft Contoso BI Demo Dataset for Retail Industry。该数据库包含一个拥有超过\
  \ 800 万条记录的事实表。可在 `www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`\
  \ 下载。\n\n使用列存储索引的关键在于能够正确识别应应用它们的场景。虽然在某些 OLTP 数据库中使用列存储索引可能有用，但这并非其目标场景。尽管列存储索引的性能在\
  \ OLTP 数据库中可能有用，但与此索引类型相关的限制使其难以在事务性工作负载中有意义地使用。列存储索引主要适用于数据仓库，因为那里需要跨大量行进行聚合，并且返回的列较少。凭借基于列的存储和内置压缩，这种索引类型提供了一种尽可能快地访问所需数据的方法，而无需加载不属于查询的列。在数据仓库中，列存储索引更适用于事实表而非维度表。列存储索引在应用于大型表时才能证明其价值。表越大，列存储索引相对于传统索引带来的性能提升就越大。此外，在考虑数据仓库查询时，它们有一个共同特征，即使用可用列的聚合和子集。通过聚合，列存储索引的批处理模式处理提供了更大的性能改进。查询中涉及的列越少，意味着加载到内存中的数据就越少，因为查询上下文中只使用了被访问的列。\n\
  \n当发现适合使用列存储索引的场景时，首先需要考虑几点。由于列存储索引既可以是聚集的，也可以是非聚集的，因此第一个决策是使用哪种类型。聚集列存储索引将表中的所有数据与索引一起存储，这意味着数据库中只出现数据的一份副本。由于是所有数据，表中的所有列都会出现在列存储索引中。对于主要或完全是分析性质的工作负载来说，这很可能是理想的选择。\n\
  \n或者，列存储索引可以是非聚集的。这提供了限制索引中包含的列数的能力。非聚集列存储索引将依赖于表中已有的聚集行存储索引，这意味着非聚集列存储索引会增加表的总体存储占用空间。\n\
  \n\n\n非聚集列存储索引在创建时需要考虑更多因素，因此在构建它们时需要遵循若干准则。首先，非聚集列存储索引中列的顺序并不重要。每一列都与其他列分开存储，且彼此之间不存在关系。其次需要记住的是，表中所有将被列存储索引利用的列都必须出现在该列存储索引中。如果查询中的某个列未出现在非聚集列存储索引中，则该索引在其执行过程中将无法被使用。\n\
  \n如果使用 SQL Server 2017 之前的版本，则必须牢记非聚集列存储索引是*只读*的，任何构建了非聚集列存储索引的表或分区都将被置于只读状态。若要修改表，则需要禁用或删除该非聚集列存储索引，待更新完成后再重建或重新创建。此限制不影响聚集列存储索引，并且从\
  \ SQL Server 2017 开始，非聚集列存储索引的此项限制已被取消。\n\n非聚集列存储索引非常适用于本质上以事务为主，但同时也需要支持关键分析查询的表。额外的好处是，可以为非聚集列存储索引指定列列表，从而使索引能够专门针对用于重要分析查询的列。\n\
  \n影响两种类型列存储索引的一个限制是创建索引所需的时间长度。在许多情况下，创建列存储索引所需的时间可能是构建聚集或非聚集索引的四到五倍。因此，索引创建应安排在资源充足的时间进行。有关列存储索引的更多信息，请参阅第\
  \ 2 章。\n\n在展示列存储索引的价值之前，值得先回顾一个使用传统索引针对数据仓库的查询演示。在清单 13-30 中，该查询按 `CalendarQuarter`\
  \ 和 `ProductCategoryName` 汇总 `SalesQuantity` 值。执行该查询并不需要大量时间；图 13-46 显示耗时为 4,293\
  \ 毫秒（即 4.2 秒），在 `dbo.FactSales` 上进行了不到 20,000 次读取。对于当前的记录量来说，结果是合理的，但设想一下如果表中的行数增加\
  \ 10 倍或 100 倍会怎样。在什么情况下，4.2 秒的执行时间会增长到超出可接受的执行时间范围？\n\n![](img/338675_4_En_13_Fig46_HTML.png)\n\
  \n一个面板，其消息选项卡已打开，显示 8 行对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读读取、LOB 逻辑读取和 LOB 物理读取值，标签为“受影响的\
  \ 96 行”。此外，在 SQL Server 执行信息下还显示了 CPU 时间 3606 毫秒和总耗时 4293 毫秒。\n\n图 13-46\n针对事实表上聚集索引的统计\
  \ I/O 结果\n\n注意\n由于执行计划的尺寸较大，它们未包含在列存储索引示例中。并且由于本节依赖 CPU 时间来演示性能，因此会多次运行查询以确保磁盘到内存的性能不是影响因素。\n\
  \n```\nUSE ContosoRetailDW\nGO\nSET STATISTICS IO ON\nSET STATISTICS TIME ON\nSELECT\
  \ dd.CalendarQuarter\n,dpc.ProductCategoryName\n,COUNT(*) As TotalRows\n,SUM(SalesQuantity)\
  \ AS TotalSales\nFROM dbo.FactSales fs\nINNER JOIN dbo.DimDate dd ON fs.DateKey\
  \ = dd.Datekey\nINNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey\n\
  INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey\n\
  INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey\n\
  GROUP BY dd.CalendarQuarter\n,dpc.ProductCategoryName;\n```\n清单 13-30: 使用传统索引的分析查询\n\
  \n为了测试在 `dbo.FactSales` 上使用非聚集列存储索引的性能，将向该表添加一个新索引。`dbo.FactSales` 中的所有列都被添加到该列存储索引中，如清单\
  \ 13-31 所示。索引就位后，查询性能发生了显著变化。从时间角度看，查询在 286 毫秒内完成，如图 13-47 所示，相比没有非聚集列存储索引的情况，性能提升了超过\
  \ 15 倍。此外，I/O 次数从近 20,000 次下降到 2,608 次。\n\n![](img/338675_4_En_13_Fig47_HTML.png)\n\
  \n一个面板，其消息选项卡已打开，显示 8 行对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读读取、LOB 逻辑读取和 LOB 物理读取值，标签为“受影响的\
  \ 96 行”。此外，在 SQL Server 执行信息下还显示了 CPU 时间 168 毫秒和总耗时 286 毫秒。\n\n图 13-47\n针对非聚集列存储索引的统计\
  \ I/O 结果\n\n```\nUSE ContosoRetailDW\nGO\nCREATE NONCLUSTERED COLUMNSTORE INDEX\
  \ IX_FactSales_CStore ON dbo.FactSales (\nSalesKey, DateKey, channelKey, StoreKey,\
  \ ProductKey, PromotionKey, CurrencyKey, UnitCost, UnitPrice,\nSalesQuantity, ReturnQuantity,\
  \ ReturnAmount, DiscountQuantity, DiscountAmount, TotalCost, SalesAmount,\nETLLoadID,\
  \ LoadDate, UpdateDate);\nSET STATISTICS IO ON;\nSET STATISTICS TIME ON;\nSELECT\
  \ dd.CalendarQuarter\n,dpc.ProductCategoryName\n, COUNT(*) As TotalRows\n,SUM(SalesQuantity)\
  \ AS TotalSales\nFROM dbo.FactSales fs\nINNER JOIN dbo.DimDate dd ON fs.DateKey\
  \ = dd.Datekey\nINNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey\n\
  INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey\n\
  INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey\n\
  GROUP BY dd.CalendarQuarter\n,dpc.ProductCategoryName;\n```\n清单 13-31: 添加非聚集列存储索引\n\
  \n在测试、分析和优化工作负载时，考虑哪些列属于非聚集列存储索引至关重要。非分析查询目标的列可以省略。这可以节省存储空间，减少执行索引维护的时间，并在插入、更新或删除数据时减少需要更新的段和行组数量，从而缩短写入时间。\n\
  \n接下来，考虑在 `dbo.FactSales` 上使用聚集列存储索引的影响。由于该表上已存在聚集索引，因此将使用清单 13-32 中的脚本创建一个名为 `dbo.FactSales_CCI`\
  \ 的新表，用 `dbo.FactSales` 中的相同数据填充它，并向其添加聚集列存储索引。\n\n使用与前面示例相同的聚合查询，聚集列存储索引的性能价值显而易见。考虑到执行时间（如图\
  \ 13-48 所示），它进一步下降到 164 毫秒，这比使用聚集索引的事实表快了超过 26 倍。I/O 也相应减少，执行仅消耗了 1,309 次 I/O。虽然其\
  \ I/O 占用与非聚集列存储索引相似，但请记住，聚集列存储索引仅存储一次，并且其中的值可以被修改。\n\n\n![](img/338675_4_En_13_Fig48_HTML.png)\n\
  \n一个面板中打开了“消息”选项卡，显示了 8 行数据，对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读取、LOB 逻辑读取和 LOB 物理读取等值，位于“96\
  \ 行受影响”标签下。此外，在“SQL Server 执行时间”下还显示了 107 毫秒和 164 毫秒，分别对应 CPU 时间和已用时间。\n\n图 13-48\n\
  \n聚集列存储索引的统计信息 I/O 结果\n\n```sql\nUSE ContosoRetailDW\nGO\nIF OBJECT_ID('dbo.FactSales_CCI')\
  \ IS NOT NULL\nDROP TABLE FactSales_CCI\nCREATE TABLE dbo.FactSales_CCI(\nSalesKey\
  \ int NOT NULL,\nDateKey datetime NOT NULL,\nchannelKey int NOT NULL,\nStoreKey\
  \ int NOT NULL,\nProductKey int NOT NULL,\nPromotionKey int NOT NULL,\nCurrencyKey\
  \ int NOT NULL,\nUnitCost money NOT NULL,\nUnitPrice money NOT NULL,\nSalesQuantity\
  \ int NOT NULL,\nReturnQuantity int NOT NULL,\nReturnAmount money NULL,\nDiscountQuantity\
  \ int NULL,\nDiscountAmount money NULL,\nTotalCost money NOT NULL,\nSalesAmount\
  \ money NOT NULL,\nETLLoadID int NULL,\nLoadDate datetime NULL,\nUpdateDate datetime\
  \ NULL\n)\nINSERT INTO dbo.FactSales_CCI\nSELECT * FROM dbo.FactSales\nCREATE CLUSTERED\
  \ COLUMNSTORE INDEX FactSales_CStore ON dbo.FactSales_CCI\nSET STATISTICS IO ON;\n\
  SET STATISTICS TIME ON;\nSELECT dd.CalendarQuarter\n,dpc.ProductCategoryName\n,\
  \ COUNT(*) As TotalRows\n,SUM(SalesQuantity) AS TotalSales\nFROM dbo.FactSales_CCI\
  \ fs\nINNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey\nINNER JOIN dbo.DimProduct\
  \ dp ON fs.ProductKey = dp.ProductKey\nINNER JOIN dbo.DimProductSubcategory dps\
  \ ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey\nINNER JOIN dbo.DimProductCategory\
  \ dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey\nGROUP BY dd.CalendarQuarter\n\
  ,dpc.ProductCategoryName;\n```\n\n清单 13-32\n创建带有聚集列存储索引的事实表\n\n虽然聚集列存储索引对于分析工作负载是最优的，但它对于事务性查询的性能表现不佳。如果一个表服务于\
  \ OLTP 查询，那么聚集列存储索引很可能是一个错误的选择。同时包含 OLAP 和 OLTP 查询的混合工作负载可能难以优化。如果为这些工作负载创建索引被证明是困难的，请考虑将事务性查询和分析查询及其数据相互分离的方法。事务性和分析性工作负载的混合是数据库管理员和开发人员面临的最复杂挑战之一，因此，解决这个问题的有效方案可能需要除索引之外的额外优化策略。\n\
  \n可以在具有聚集列存储索引的表上创建非聚集的行存储索引。这些索引可以支持那些与表的自然数据顺序不匹配的备选搜索路径。在聚集列存储表上实施非聚集行存储索引之前，请务必在没有额外索引的情况下测试查询性能。通常情况下，压缩、行组消除和其他列存储特性所提供的速度可能足以提供足够的性能，而无需额外的索引。\n\
  \n也可以在内存优化表上创建列存储索引。内存优化表旨在处理高度争用、繁重的 OLTP 工作负载。这使得它们不适合作为列存储索引的候选对象。内存优化表上的列存储索引应进行仔细测试，以确保其不仅性能良好，而且不会消耗过多内存或妨碍\
  \ OLTP 性能。\n\n有序列存储索引在 SQL Server 2022 中引入，允许在插入数据时对其进行预排序。这是一个离线操作（按分区进行），使用 TempDB\
  \ 对新插入的数据进行排序。如果一个表有专门的离线时间段，在此期间可以不受阻碍地执行数据加载，那么这可以是改善数据顺序性，从而提升行组消除效果的有用方法。有关此功能的更多信息，请查阅微软的以下文档：\n\
  \n[`https://docs.microsoft.com/zh-cn/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci`](https://docs.microsoft.com/zh-cn/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci)\n\
  \n请注意，由于需要在 TempDB 中对数据进行排序，大型的 INSERT 操作可能会导致 TempDB 产生大量 I/O，并消耗系统数据库中的空间。如果使用此选项，请确保\
  \ TempDB 有足够的可用空间来支持它。\n\n以下是列存储索引的一些最佳实践简要列表，有助于了解何时使用它们以及如何确保最佳性能：\n\n*   列存储索引应针对每个分区至少有数千万行（或将增长到此规模）的表。\n\
  *   以至少 102,400 行或更多的批次将行插入聚集列存储索引，以允许使用最小日志记录的大容量加载过程。\n*   有序数据可以实现有效的行组消除。确保数据按最常作为过滤目标的列排序后插入列存储索引。\n\
  *   对具有列存储索引的大表进行分区。这允许进行分区消除，并能够针对单个分区执行维护任务（备份、重建、重新组织、截断、分区交换）。\n*   避免对列存储索引执行\
  \ UPDATE 操作。这些操作表现为 DELETE 加 INSERT，并且会由于删除的数据膨胀而产生碎片。UPDATE 操作还会导致数据无序，降低行组消除的效果。\n\
  *   使用列存储索引时，只查询所需的列。这减少了必须读取的段数，从而减少 I/O 和内存使用量，并提高查询速度。\n*   仅在满足上述许多或所有标准的表上使用非聚集列存储索引。一个碎片严重的非聚集列存储索引可能不会比经典的行存储覆盖索引提供更多的价值（如果有的话）。\n\
  \n列存储索引是数据仓库索引方式的一个重大改进。随着 SQL Server 每个版本的更新，列存储索引不断改进，成为索引大型分析数据的更高效方式。这些性能改进为数据库的扩展提供了机会，使其能够超越传统索引解决方案所能达到的范围。列存储索引使\
  \ OLAP 表能够轻松扩展到数百亿行（或更多）。\n\n注意\n\n下一节使用了 WorldWideImporters 数据库，可从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)\
  \ 下载。\n\n\n### JSON 索引\n\nSQL Server 2016 引入了在 SQL Server 中处理 JSON（JavaScript 对象表示法）数据的能力。JSON\
  \ 定义了结构化数据的方法，便于应用程序和人员读写。由于其易用性，它在应用程序开发中变得非常流行。\n\n与 XML 中使用的标签和属性不同，JSON 利用括号、冒号和引号来定义实体-属性关系。例如，清单\
  \ 13-33 包含一个 XML 文档，定义了 WideWorldImporters 一名员工的额外信息。相同信息用 JSON 表示则显示在清单 13-34 中。两者比较，JSON\
  \ 比相同数据表示的 XML 容易阅读和理解得多。\n\n```\n{\n\"OtherLanguages\": [\"Polish\",\"Chinese\"\
  ,\"Japanese\"] ,\n\"HireDate\":\"2008-04-19T00:00:00\",\n\"Title\":\"Team Member\"\
  ,\n\"PrimarySalesTerritory\":\"Plains\",\n\"CommissionRate\":\"0.98\"\n}\n清单 13-34\n\
  JSON 示例\n```\n\n```\nPolish\nChines\nJapanese\n\n2008-04-19T00:00:00\nTeam Member\n\
  Plains\n0.98\n\n清单 13-33\nXML 示例\n```\n\n虽然 SQL Server 可以处理 JSON 数据，但 Microsoft\
  \ 实现 JSON 的方式与 XML 和空间数据的实现方式略有不同。JSON 数据没有专用的数据类型，而是存储在定义为 `varchar(max)` 或 `nvarchar(max)`\
  \ 数据类型的列中。然后可以使用函数 `JSON_VALUE` 或 `JSON_QUERY` 检索数据中的信息。这种实现方式的优势在于，没有与 JSON 数据关联的特殊索引类型，这就是为什么没有专门章节讨论\
  \ JSON 索引。相反，JSON 数据通过利用持久化到索引中的计算列，利用了现有的索引功能。\n\n在深入探讨如何索引 JSON 数据之前，将展示一个示例，说明\
  \ JSON 函数的工作原理及其对性能的影响。首先，从 WideWorldImporters 中的 `Application.People` 创建表 `dbo.People`，如清单\
  \ 13-35 所提供。在该表中，将包含一个用于 `HireDate` 的列，该列从 `CustomFields` 中的 JSON 文档检索 `HireDate`。\n\
  \n```\nUSE WideWorldImporters;\nGO\nDROP TABLE IF EXISTS dbo.People;\nCREATE TABLE\
  \ [dbo].[People]\n(\n[PersonID] [INT] NOT NULL,\n[FullName] NVARCHAR NOT NULL,\n\
  [CustomFields] NVARCHAR NULL,\n[HireDate] AS JSON_VALUE([CustomFields], N'$.HireDate'),\n\
  [Junk] VARCHAR NULL,\nCONSTRAINT [PK_People]\nPRIMARY KEY CLUSTERED ([PersonID])\n\
  );\nGO\nINSERT INTO dbo.People\n(\nPersonID,\nFullName,\nCustomFields,\nJunk\n)\n\
  SELECT PersonID,\nFullName,\nCustomFields,\nREPLICATE('x', 4000) AS Junk\nFROM Application.People;\n\
  GO\n清单 13-35\nJSON 示例设置\n```\n\n当使用清单 13-36 中的代码查询 `dbo.People` 时，将使用计算列从 JSON 数据中返回所需的结果。不幸的是，为了检索这些结果，SQL\
  \ Server 需要扫描聚集索引，如图 13-50 所示。此扫描的影响是访问了表中的所有 1,111 行，图 13-49 中的统计输出表明了这一点，并导致查询发生\
  \ 762 次读取。\n\n![](img/338675_4_En_13_Fig50_HTML.png)\n一个面板，其中打开了执行计划选项卡，显示了查询 1\
  \ 的两行文本，其成本占批处理的 100%。下方是一个流程图，展示了从聚集索引扫描（聚集，people，成本 100%）到选择（成本 0%）的连接。\n图 13-50\n\
  计算 JSON 列的执行计划\n\n![](img/338675_4_En_13_Fig49_HTML.png)\n一个面板，其中打开了消息选项卡，显示了一行条目，内容为\
  \ `table 'people'，扫描计数 1，逻辑读取 742，物理读取 0，页面服务器读取 0，预读读取 0，页面服务器预读读取 0`，位于“19 行受影响”标签下方和“1\
  \ 行受影响”标签上方。\n图 13-49\n计算 JSON 列的统计 I/O 结果\n\n```\nUSE WideWorldImporters;\nGO\n\
  SET STATISTICS IO ON;\nSELECT PersonID,\nHireDate\nFROM dbo.People\nWHERE HireDate\
  \ IS NOT NULL;\n清单 13-36\n查询计算 JSON 列\n```\n\n为了减轻计算 JSON 列的性能影响，可以向计算列添加索引，如清单\
  \ 13-37 所示，然后再次对 `dbo.People` 执行查询。这次性能大大改善。不是 762 次读取，图 13-51 显示只有 3 次读取。此外，图 13-52\
  \ 中的执行计划表明使用了在添加的索引上进行的索引查找。\n\n```\nUSE WideWorldImporters;\nGO\nCREATE INDEX IX_People_HireDate\
  \ ON dbo.People (HireDate);\nGO\nSET STATISTICS IO ON;\nSELECT PersonID,\nHireDate\n\
  FROM dbo.People\nWHERE HireDate IS NOT NULL\n清单 13-37\n索引并查询 JSON 计算列\n```\n\n![](img/338675_4_En_13_Fig52_HTML.png)\n\
  一个面板，其中打开了执行计划选项卡，显示了查询 1 的两行文本，其成本占批处理的 100%。下方是一个流程图，展示了从聚集索引查找（非聚集，people，成本\
  \ 100%）到选择（成本 0%）的连接。\n图 13-52\n计算并索引后的 JSON 列的执行计划\n\n![](img/338675_4_En_13_Fig51_HTML.png)\n\
  一个面板，其中打开了消息选项卡，显示了一行条目，内容为 `table 'people'，扫描计数 1，逻辑读取 3，物理读取 1，页面服务器读取 0，预读读取\
  \ 1，页面服务器预读读取 0`，位于“19 行受影响”标签下方和“1 行受影响”标签上方。\n图 13-51\n计算并索引后的 JSON 列的统计 I/O 结果\n\
  \n通过利用计算列，可以轻松高效地访问表中的 JSON 数据。无需学习新的索引技术来获得这种效率，而是可以利用现有功能。这使得采用和支持 JSON 以及高效查询\
  \ JSON 数据变得更加容易。\n\n## 索引存储策略\n\n到目前为止，本章的策略主要侧重于通过索引的键列和非键列设计来提高使用索引的查询性能。在索引设计中，还可以考虑与列选择结合使用的其他选项。这些替代策略都与数据库中索引的存储方式有关。\n\
  \n有两种选项可用于处理索引如何存储其数据。这两种选项的基本前提是，索引越小，包含的页就越少，查询数据时所需的读写操作也就越少。第一个可用选项是行压缩，第二个是页压缩。这两个选项都有可能显著节省存储空间并提高性能。\n\
  \n注意\n在 SQL Server 2016 SP1 之前，行和页压缩的使用仅限于 SQL Server 企业版，之后它对所有 SQL Server 版本都可用。\n\
  \n\n\n#### 行压缩\n\n减少索引大小的第一种方法是减小索引内行的大小。行压缩通过改变数据在行中的存储方式来实现这一点。行压缩可用于堆、聚集索引和非聚集索引。启用行压缩后，行上会发生一些变化，具体如下：\n\
  \n*   修改行的元数据。\n*   定长字符数据以变长格式存储。\n*   基于数字的数据类型以变长格式存储。\n\n通过元数据更改，与未启用行压缩的记录相比，为每个列存储的信息通常会减少。行开销中的多余位被移除，信息被精简以减少浪费。不过，这种更改有一个例外：对某些定长数据类型的更改可能会导致更大的行开销，以适应数据长度和偏移值所需的额外信息。\n\
  \n对于定长字符数据，会移除列中值末尾的空白。这些信息并未丢失，且定长数据类型（如 `char` 和 `nchar`）的行为不受影响。区别仅在于数据的存储方式。对于二进制数据，会移除值末尾的零，类似于移除空白。从列中移除的字符信息存储在行开销中。\n\
  \n数字数据类型是行压缩中操作最多的数据类型。这些数据类型以该类型可能的最小形式存储。这意味着一个定义为 `bigint` 数据类型的列，通常需要 8 字节，但如果存储的值介于\
  \ 0 到 255 之间，则只需 1 字节。当值为 256 时，该列将存储为 2 字节。这个递进过程持续进行，直到需要以 8 字节存储该值。这适用于所有基于数字的数据类型，包括\
  \ `smallint`、`int`、`bigint`、`decimal`、`numeric`、`smallmoney`、`money`、`float`、`real`、`datetime`、`datetime2`、`datetimeoffset`\
  \ 和 `timestamp`。\n\n为了演示，需要一个表来实现压缩，如代码清单 13-38 所示。此脚本创建了两个表：`dbo.NoCompression`\
  \ 和 `dbo.RowCompression`。这些表用于演示行压缩通过聚集索引对表大小以及对查询性能的影响。\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nIF OBJECT_ID('dbo.NoCompression') IS NOT NULL\nDROP TABLE dbo.NoCompression;\n\
  IF OBJECT_ID('dbo.RowCompression') IS NOT NULL\nDROP TABLE dbo.RowCompression;\n\
  SELECT SalesOrderID\n,SalesOrderDetailID\n,CarrierTrackingNumber\n,OrderQty\n,ProductID\n\
  ,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n,LineTotal\n,rowguid\n,ModifiedDate\n\
  INTO dbo.NoCompression\nFROM Sales.SalesOrderDetail;\nSELECT SalesOrderID\n,SalesOrderDetailID\n\
  ,CarrierTrackingNumber\n,OrderQty\n,ProductID\n,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n\
  ,LineTotal\n,rowguid\n,ModifiedDate\nINTO dbo.RowCompression\nFROM Sales.SalesOrderDetail;\n\
  ```\n\n*代码清单 13-38*  \n*行压缩的设置*\n\n行压缩的实现依赖于在 `CREATE` 或 `ALTER INDEX` 语句中使用 `DATA_COMPRESSION`\
  \ 索引选项。压缩可用于聚集索引或非聚集索引。对于行压缩，`ROW` 选项如代码清单 13-39 所示。在此示例中，向两个示例表都添加了一个聚集索引。在此表上使用行压缩的影响令人印象深刻；聚集索引所需的页数减少了超过\
  \ 35%（见图 13-53）。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE CLUSTERED INDEX CLIX_NoCompression\
  \ ON dbo.NoCompression\n(SalesOrderID, SalesOrderDetailID);\nCREATE CLUSTERED INDEX\
  \ CLIX_RowCompression ON dbo.RowCompression\n(SalesOrderID, SalesOrderDetailID)\n\
  WITH (DATA_COMPRESSION = ROW);\nSELECT OBJECT_NAME(object_id) AS table_name\n,in_row_reserved_page_count\n\
  FROM sys.dm_db_partition_stats\nWHERE object_id IN (OBJECT_ID('dbo.NoCompression'),OBJECT_ID('dbo.RowCompression'));\n\
  ```\n\n*代码清单 13-39*  \n*实现行压缩*\n\n![图 13-53：一个表格有两列，分别标记为表名和行内保留页数，以及两行标记为 1 和 2。第一列下的“无压缩”和“行压缩”条目分别在第二列下伴随有\
  \ 1531 和 971 个条目。](img/338675_4_En_13_Fig53_HTML.jpg)\n\n*图 13-53*  \n*行压缩输出结果*\n\
  \n存储并非使用行压缩后唯一得到改善的地方；查询性能也有所提升。为了证明这一优势，请执行代码清单 13-40 中的代码。在此脚本中，针对上一个示例中的表执行了两个查询。虽然查询的业务规则相同，但启用了行压缩的表在页读取方面减少了超过\
  \ 36%。将索引存储在更少的页上意味着在检索行执行查询时，需要读入内存的页更少。通过向索引添加压缩，查询所需的资源减少，性能得到提升，而无需更改查询设计，如图\
  \ 13-54 所示。\n\n```sql\nUSE AdventureWorks2017\nGO\nSET STATISTICS IO, TIME ON\n\
  SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber\nFROM dbo.NoCompression\n\
  WHERE SalesOrderID BETWEEN 51500 AND 52000;\nSELECT SalesOrderID, SalesOrderDetailID,\
  \ CarrierTrackingNumber\nFROM dbo.RowCompression\nWHERE SalesOrderID BETWEEN 51500\
  \ AND 52000;\n```\n\n*代码清单 13-40*  \n*行压缩查询*\n\n![图 13-54：一个面板上显示一个打开的“消息”选项卡，其中“无压缩”和“行压缩”表各有一行条目，显示扫描计数为\
  \ 1 和 1，逻辑读取为 66 和 42，物理读取为 0 和 0，预读为 0 和 0，Lob 逻辑读取为 0 和 0，Lob 物理读取为 0 和 0。下方还显示了\
  \ SQL 的服务器执行时间和服务器解析与编译时间。](img/338675_4_En_13_Fig54_HTML.png)\n\n*图 13-54*  \n\
  *行压缩查询统计信息*\n\n在索引上实现行压缩时需要考虑许多因素。首先，任何压缩使用所实现的压缩量将因所使用的数据类型和存储的数据而异。这种改进会且应该因表而异，并随时间而变化。如果行的最大可能大小超过\
  \ 8,060 字节（包括数据大小和行开销），则无法启用压缩。非聚集索引不会继承聚集索引或堆的压缩设置；这必须在创建索引时指定。但是，如果未指定，聚集索引将继承其所在的堆的压缩设置。\n\
  \n行压缩是一种用于更改索引存储方式的有用机制。它减小了行的大小，这具有提高查询性能和减少索引存储需求的双重好处。实现行压缩时的主要关注点是与之相关的额外开销；这种开销表现为\
  \ CPU 利用率略有增加。这通常被处理查询所需的 I/O 减少所抵消，如图 13-54 所示。\n\n对于包含许多数字数据类型以及倾向于包含空白字符的字符串/二进制数据的\
  \ OLTP 工作负载，行压缩是一种有效的索引方式。因为每行都是单独压缩的，`UPDATE` 操作的成本不会显著增加，因为对于 `UPDATE` 查询更新的每一行，只需要更新该行的数据。\n\
  \n\n\n#### 页面压缩\n\n#### 行压缩\n\n#### 前缀压缩\n\n#### 字典压缩\n\n页面压缩的行压缩组件与行压缩选项相同。在压缩一个页面之前，该页面上的每一行会首先被压缩。\n\
  \n页面压缩的下一步是通过前缀压缩完成的。前缀压缩扫描每一列，移除相似的值并将它们分组到页面头中。例如，如果一列中有多个值以 `\"`abc`\"` 开头，则该值被放置在页面头中，并且该列中的值被替换为指向前缀的指针。如果另一行包含值\
  \ `\"`abcd`\"`，则会包含对页面头中 `abc` 值的引用，将该列值更改为 `0d`。这个过程对所有值持续进行，以移除最常见的模式并减少每行列存储的信息。前缀压缩对每一列单独进行评估。因此，不同列中的相似值无法共享前缀。\n\
  \n页面压缩的最后一步是字典压缩。通过字典压缩，检查所有列中的值是否存在重复值。延续前面的例子，如果多行中两列的值与 `0d` 值匹配，则该值会被放置在页面头中，并在那些列中存储对该值的引用。这在整个页面范围内完成，减少了重复的前缀压缩值。\n\
  \n#### 演示\n\n为了演示页面压缩的好处，将在行压缩部分的示例基础上进行扩展。首先，执行清单 13-41 中的脚本。这会创建一个类似于前面示例中表的 `dbo.PageCompression`\
  \ 表。\n\n```sql\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.PageCompression')\
  \ IS NOT NULL\nDROP TABLE dbo.PageCompression;\nSELECT SalesOrderID\n,SalesOrderDetailID\n\
  ,CarrierTrackingNumber\n,OrderQty\n,ProductID\n,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n\
  ,LineTotal\n,rowguid\n,ModifiedDate\nINTO dbo.PageCompression\nFROM Sales.SalesOrderDetail;\n\
  Listing 13-41\n页面压缩设置\n```\n\n实现页面压缩与实现行压缩非常相似。两者都使用 `DATA_COMPRESSION` 选项，但页面压缩使用\
  \ `PAGE` 选项。为了观察页面压缩对表的影响，执行清单 13-42 中的代码。在此示例中，页面压缩对表的影响比行压缩观察到的要显著得多。这一次，表使用的页面数量减少了\
  \ 55%，如图 13-55 所示。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE CLUSTERED INDEX\
  \ CLIX_PageCompression ON dbo.PageCompression\n(SalesOrderID, SalesOrderDetailID)\n\
  WITH (DATA_COMPRESSION = PAGE);\nSELECT OBJECT_NAME(object_id) AS table_name\n,in_row_reserved_page_count\n\
  FROM sys.dm_db_partition_stats\nWHERE object_id IN (OBJECT_ID('dbo.NoCompression'),OBJECT_ID('dbo.PageCompression'));\n\
  Listing 13-42\n实现页面压缩\n```\n\n![](img/338675_4_En_13_Fig55_HTML.jpg)\n一个包含两列的表格，列名为\
  \ table name 和 in row reserved page count，以及两行标记为 1 和 2。第一列下的未压缩和页面压缩条目分别对应第二列下的\
  \ 1531 和 683 条目。\n图 13-55\n页面压缩输出\n\n页面压缩的改进不仅限于索引存储。这些改进也延续到对表的查询中。将之前针对 `dbo.NoCompression`\
  \ 的结果与针对 `dbo.PageCompression` 的结果（清单 13-43）进行比较表明，读取节省的优势在页面压缩中得以延续。在这种情况下，读取次数减少到\
  \ 29（见图 13-56），这比 55% 的 I/O 成本降低还要多。\n\n```sql\nUSE AdventureWorks2017\nGO\nSET\
  \ STATISTICS IO, TIME ON\nSELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber\n\
  FROM dbo.PageCompression\nWHERE SalesOrderID BETWEEN 51500 AND 52000;\nListing 13-43\n\
  页面压缩查询\n```\n\n![](img/338675_4_En_13_Fig56_HTML.png)\n一个面板，打开了消息选项卡，其中有一行条目，内容为：表\
  \ \"page compression\"，扫描计数 1，逻辑读取 29，物理读取 0，预读 0，L O B 逻辑读取 0，L O B 物理读取 0，位于标签\
  \ \"4569 行受影响\" 下方。还显示了 S Q L 服务器执行时间下的 0 和 187 毫秒的 C P U 时间和已用时间。\n图 13-56\n页面压缩查询统计信息\n\
  \n#### 注意事项\n\n页面压缩的注意事项在本质上与行压缩的注意事项相似，但增加了一些项目。首先，由于页面压缩的实现方式，有时 SQL Server 会判断页面的压缩率不足以证明压缩该页面的成本是合理的。在这些情况下，SQL\
  \ Server 会尝试压缩页面，但会记录页面压缩失败，并在没有页面压缩相对于行压缩的益处的情况下存储该页面。监控页面压缩尝试未成功的比率非常重要，因为它们可能表明在索引上使用页面压缩的价值很低。这在第\
  \ 3 章有进一步讨论。\n\n其次，页面压缩的 CPU 成本远高于行压缩或没有压缩。如果没有足够的 CPU 资源可用，这可能会导致其他性能挑战。最后，页面压缩不适用于预期频繁数据修改的表和索引。为修改单行而压缩和解压缩一个页面可能会对\
  \ CPU 产生显著影响。因此，适合作为页面压缩候选对象的表不应是频繁 `UPDATE` 操作的目标。\n\n## 结论\n\n行压缩和页面压缩都可以为索引解决方案提供显著的成本节约。在设计索引解决方案时，请同时考虑这两种压缩方式。在其他选项可能未产生预期结果的情况下，这样做将提供性能改进。\n\
  \n注\n有关压缩的其他注意事项，请参阅在线丛书主题“数据压缩”：`https://docs.microsoft.com/en-us/sql/relational-databases/data-compression/data-compression`。\n\
  \n\n\n## 索引视图\n\n在许多情况下，数据库中数据的存储方式并不能完全代表用户需要检索的信息。为了解决这个问题，可以构建查询将用户所需的数据提取到结果集中，以便更轻松地使用。在执行这些活动的过程中，可以对数据进行**聚合**，以提供用户所需详细程度的结果。\n\
  \n例如，用户可能希望看到数据库中某个产品在所有订单中的总销售额，但不包含明细项目的信息。在大多数情况下，检索此信息没有问题。然而，在某些情况下，动态执行该聚合可能会在数据库中造成瓶颈。虽然索引有助于简化聚合，但它们有时无法提供所需的成本改进以达到要求的性能。\n\
  \n解决此问题的一种可能方案是在数据库中的视图上创建索引。可以创建视图来提供所需的摘要和聚合，并使用索引将视图中的信息**具体化**为聚合形式。对视图建立索引时，查询结果的存储方式与任何表的存储方式大致相同。通过提前存储此信息，使用视图中聚合的查询可以获得更快的响应时间。\n\
  \n在了解如何实现索引视图之前，让我们首先演练前面概述的检索产品摘要信息的问题。在此示例中，假设需要在产品子类别级别的所有产品的摘要信息。为此提供的查询，如清单\
  \ 13-44，需要提供 `LineTotal` 和 `OrderQty` 值的 `SUM` 聚合，以及 `UnitPrice` 的平均值。虽然查询的读取次数看起来并不算特别高（见图\
  \ 13-57），但对于发布到某些生产环境的查询来说，可能被认为过于显著。如果该查询要非常频繁地执行，情况尤其如此。检查执行计划（见图 13-58）显示，虽然它并不是特别复杂，但该计划包含多个步骤，不能被视为一个简单的计划。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.ProductSubcategorySummary')\
  \ IS NOT NULL\nDROP VIEW dbo.ProductSubcategorySummary;\nSET STATISTICS IO ON;\n\
  SELECT psc.Name\n,SUM(sod.LineTotal) AS SumLineTotal\n,SUM(sod.OrderQty) AS SumOrderQty\n\
  ,AVG(sod.UnitPrice) AS AvgUnitPrice\nFROM Sales.SalesOrderDetail sod\nINNER JOIN\
  \ Production.Product p ON sod.ProductID = p.ProductID\nINNER JOIN Production.ProductSubcategory\
  \ psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID\nGROUP BY psc.Name\n\
  ORDER BY psc.Name;\n```\n*清单 13-44：昂贵的聚合查询*\n\n![](img/338675_4_En_13_Fig58_HTML.png)\n\
  *图 13-58：昂贵聚合查询的执行计划*\n\n![](img/338675_4_En_13_Fig57_HTML.png)\n*图 13-57：昂贵聚合查询的\
  \ Statistics I/O 结果*\n\n针对此性能问题的解决方案可以通过为清单 13-44 中的查询创建一个视图并向该视图添加索引来找到。向视图添加索引时需要考虑许多事项，例如：\n\
  \n*   视图中的所有列必须是**确定性的**。\n*   必须使用 `SCHEMA_BINDING` 视图选项创建视图。\n*   必须将聚集索引创建为唯一索引。\n\
  *   视图中引用的表必须使用两部分命名法。\n*   如果聚合值，则必须包含 `COUNT_BIG()` 函数。\n*   某些聚合（例如 `AVG()`）在索引视图中是不允许的。\n\
  \n有关创建索引视图的更多注意事项包含在“联机丛书”主题“创建索引视图”([`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?))\
  \ 中。\n\n创建索引视图的第一步是创建底层视图。根据列出的注意事项，清单 13-44 中的查询不能直接转换为视图。必须更改查询以移除 `AVG` 函数并包含\
  \ `COUNT_BIG` 函数。虽然此更改从输出中移除了所需的数据元素之一，但该值可以在对视图建立索引后计算。此外，视图定义必须包含 `WITH SCHEMABINDING`\
  \ 选项。结果是清单 13-45 中的视图定义。最后一步是使用 `Production.ProductSubcategory` 表中的 `Name` 列在表上创建唯一聚集索引。\n\
  \n```sql\nUSE AdventureWorks2017\nGO\nCREATE VIEW dbo.ProductSubcategorySummary\n\
  WITH SCHEMABINDING\nAS\nSELECT psc.Name\n,SUM(sod.LineTotal) AS SumLineTotal\n,SUM(sod.OrderQty)\
  \ AS SumOrderQty\n,SUM(sod.UnitPrice) AS TotalUnitPrice\n,COUNT_BIG(*) AS Occurrences\n\
  FROM Sales.SalesOrderDetail sod\nINNER JOIN Production.Product p ON sod.ProductID\
  \ = p.ProductID\nINNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID\
  \ = psc.ProductSubcategoryID\nGROUP BY psc.Name;\nGO\nCREATE UNIQUE CLUSTERED INDEX\
  \ CLIX_ProductSubcategorySummary\nON dbo.ProductSubcategorySummary(Name)\n```\n\
  *清单 13-45：索引视图定义*\n\n索引视图就位后，下一步是测试该视图与原始查询相比的性能。在执行清单 13-46 中的代码之前，首先查看第二个查询，该查询使用\
  \ `TotalUnitPrice` 和 `Occurrences` 列来生成 `AvgUnitPrice`。虽然 `AVG` 函数不能包含在索引视图的定义中，但可以用最小的努力实现相同的结果。\n\
  \n执行清单 13-46 中的查询后，可以观察到这些查询的性能比清单 13-44 中的示例有显著提升。不再需要超过 1,200 次读取，而只需 2 次读取（见图\
  \ 13-59），并且执行计划（图 13-60）也简单了不少。计划从许多运算符简化为三个。\n\n```sql\nUSE AdventureWorks2017;\n\
  GO\nSET STATISTICS IO ON;\nSELECT psc.Name,\nSUM(sod.LineTotal) AS SumLineTotal,\n\
  SUM(sod.OrderQty) AS SumOrderQty,\nAVG(sod.UnitPrice) AS AvgUnitPrice\nFROM Sales.SalesOrderDetail\
  \ sod\nINNER JOIN Production.Product p\nON sod.ProductID = p.ProductID\nINNER JOIN\
  \ Production.ProductSubcategory psc\nON p.ProductSubcategoryID = psc.ProductSubcategoryID\n\
  GROUP BY psc.Name\nORDER BY psc.Name;\nSELECT Name,\nSumLineTotal,\nSumOrderQty,\n\
  TotalUnitPrice / Occurrences AS AvgUnitPrice\nFROM dbo.ProductSubcategorySummary\n\
  ORDER BY Name;\n```\n*清单 13-46：使用索引视图的查询*\n\n![](img/338675_4_En_13_Fig60_HTML.png)\n\
  \n\n\n一个面板显示已打开的执行计划选项卡，其中包含查询 1 和查询 2 的两行文本，每个查询相对于批处理的成本各占 50%。每个查询都有一个流程图，展示了从`clustered\
  \ index scan`、`view clustered`、`product subcategory summary`（成本占 100%）到`select`（成本占\
  \ 0%）的连接关系。\n\n图 13-60\n\n索引视图模式的执行计划\n\n![](img/338675_4_En_13_Fig59_HTML.png)\n\
  \n一个面板显示已打开的消息选项卡，其中有两条相似的单行条目，内容为`table \"product subcategory summary\"`，扫描计数 1，逻辑读取\
  \ 2，物理读取 0，预读取 0，LOB 逻辑读取 0，LOB 物理读取 0。每条都位于`35 rows affected`和`1 row affected`标签之间。\n\
  \n图 13-59\n\n索引视图模式的统计信息 I/O 结果\n\n在执行过程中还观察到了另一个特殊现象。在实施`indexed view`后，针对基础表的查询和针对视图的查询执行情况完全相同。这是`indexed\
  \ views`带来的额外好处之一。当`SQL Server`为第一个查询确定执行计划时，它可以推断出存在一个`indexed view`可以覆盖与该查询相同的逻辑，即使平均值列的计算方式并不相同。\n\
  \n请注意，`indexed views`的成本在于维护其索引。每当其源表中的任何基础值发生变化时，索引也需要随之更新。理想的`indexed views`是针对特定用例的，并不试图为整个表重新创建索引。当`indexed\
  \ views`变得过于复杂或开始包含许多不同的索引时，值得考虑重新构建基础表，以降低需要它们的业务逻辑的复杂性。\n\n当需要将多个表连接到一个单元中以减少运行时连接数据所需的`I/O`时，`Indexed\
  \ views`是一个极其有用的工具。尽管`indexed views`有一些限制，但它也带来许多好处，包括能够在类似清单 13-46 中的情况下使用。当存在经常使用的、具有相同结构的视图和查询时，可以考虑引入视图是否能提供基础表上的索引所无法提供的好处。\n\
  \n## 总结\n\n本章重点介绍在多种情况下如何以及何时对表应用索引。每个示例都演示了如何将特定的索引模式应用到具体场景中，以通过索引提升性能。本章涵盖了使用堆的有限但有效的实例，接着介绍了构建`clustered\
  \ indexes`的各种选项和方式。对于`non-clustered indexes`，示例展示了在聚类键之外的列上添加性能的选项，这些选项可添加到`clustered\
  \ indexes`中。本章还包括了一个实现`columnstore indexes`的示例，并讨论了何时应用此类索引。总的来说，这些模式为识别对不同列类型和工作负载最有用的索引类型奠定了基础，并提供了有意义的比较一种索引解决方案与另一种解决方案的能力。\n\
  \n"
- '# 14. 查询策略


  在上一章中，讨论了为各种表识别潜在索引的策略。然而，这通常只是故事的一半。一旦索引创建完成，数据库的性能有望得到提升，从而暴露出下一个瓶颈。不幸的是，编码实践和选择性可能会对索引应用于查询的方式产生负面影响。有时，数据库和表的访问方式会阻碍使用一些最有益的可用索引。


  恰当的索引为关键数据提供了一组高效的访问路径。有效的查询对于确保数据按照这些路径进行读写并提供良好性能是必不可少的。


  本章涵盖了索引可能无法按预期使用的查询策略。这些场景包括：


  *   `LIKE` 比较


  *   字符串连接


  *   计算列


  *   标量函数


  *   数据类型转换


  对于每种场景，将讨论其相关情况以及它们表现不如预期的原因。针对每个场景，将提供缓解策略以及如何在正确的位置使用正确索引的一些提示。本章将提供所需的工具，以识别阻碍为数据库建立性能优化索引的情况，以及解决这些挑战的策略。




  ## LIKE 比较


  ### LIKE 比较基础


  在评估查询对索引使用的影响时，最简单直接的起点是 `LIKE` 比较。`LIKE` 比较允许基于任意字符或模式在列中进行搜索。如果需要识别表中所有以字母 `AAA`
  或 `BBB` 开头的值，`LIKE` 比较就能提供这种功能。在此类搜索中，查询可以读取索引并找到与字符或模式匹配的值。当在查询中使用此比较来查找包含或以某个字符/模式结尾的值时，可能会出现问题。


  在这种情况下，索引变得无关紧要，因为统计信息仅针对字符值最左侧的部分收集。假设是随机分布，字母 `B` 出现在索引第一个值中的概率与其出现在最后一个值中的概率是相等的。要确定表中哪些记录的列中任何位置包含
  `B`，则必须检查所有行。没有可用的统计信息来识别字母是否包含在字符串中。由于没有可靠的统计信息可用，SQL Server 将不知道使用哪个索引来满足查询，最终很可能会扫描聚集索引来返回匹配的值。


  ### 前导通配符的问题


  为了理解使用 `LIKE` 比较可能出现的问题，将提供一些演示，展示两种场景及其相关的统计信息。首先，考虑一个场景：查询 `Person.Address` 表中
  `AddressLine1` 以“710%”开头的记录（参见清单 14-1）。查看图 14-1 中的 `STATISTICS IO` 输出，该查询需要三次逻辑读取。检查图
  14-2 中的执行计划，显示了在非聚集索引上执行了索引查找。


  ![](img/338675_4_En_14_Fig2_HTML.png)


  一个输入输出页面的截图，展示了执行计划选项卡下的输出。它显示了查询、地址，以及在非聚集索引上成本为 100% 的索引查找执行，该索引映射到成本为 0% 的选定表。


  图 14-2：地址以 710 开头的执行计划


  ![](img/338675_4_En_14_Fig1_HTML.png)


  一个输入输出页面的截图，标题包含结果、消息和执行计划选项卡。它展示了消息选项卡下的输出。显示了表地址和受影响行数。逻辑读取数为 3。


  图 14-1：地址以 710 开头的 STATISTICS I/O


  ```sql

  USE AdventureWorks2017

  GO

  SET STATISTICS IO ON;

  SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

  FROM Person.Address

  WHERE AddressLine1 LIKE ''710%'';

  ```

  清单 14-1：查询地址以 710 开头的语句


  在此情况下，`LIKE` 比较工作良好，执行计划、统计信息和 I/O 都适合该请求。因为筛选器检查的是 `AddressLine1` 最左侧的字符，SQL Server
  能够使用该列上的索引来有效地筛选该列并返回预期结果。


  不幸的是，`LIKE` 比较并非只有这一种用法。它还可以用于在列中查找值。考虑一个需要查找匹配特定街道名称（如“Longbrook”）的所有地址的场景（参见清单
  14-2）。对于此查询，执行计划对非聚集索引使用扫描，并需要 216 次逻辑读取，如图 14-3 所示。图 14-4 显示了执行计划。


  ![](img/338675_4_En_14_Fig4_HTML.png)


  一个输入输出页面的截图，展示了执行计划选项卡下的输出。它显示了查询、地址，以及在非聚集索引上成本为 100% 的索引扫描执行，该索引映射到成本为 0% 的选定表。


  图 14-4：地址包含“Longbrook”的执行计划


  ![](img/338675_4_En_14_Fig3_HTML.png)


  一个输入输出页面的消息选项卡截图。显示了标记为地址的表和受影响的行。逻辑读取数为 216。


  图 14-3：地址包含“Longbrook”的 STATISTICS I/O


  ```sql

  USE AdventureWorks2017

  GO

  SET STATISTICS IO ON;

  SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

  FROM Person.Address

  WHERE AddressLine1 LIKE ''%Longbrook%'';

  ```

  清单 14-2：查询地址包含“Longbrook”的语句


  因为 `AddressLine1` 上的筛选器有一个前导通配符，SQL Server 无法使用该列上的索引来满足筛选条件。相反，它被迫扫描整个索引以确定哪些值符合筛选条件。


  在此场景中，表和索引都很小。索引查找和扫描之间的差异并不极端。设想一下，如果这个场景发生在一个表大得多的生产系统中。SQL Server 无法快速筛选出匹配搜索值的记录，而是被迫使用暴力方式遍历所有行。即使所需时间可能只是几十秒，这也为阻塞、锁定和死锁打开了机会，这将进一步减慢环境中的查询速度。当查询执行时，它们在写入或读取行时会锁定资源，锁定时间越长，这些锁定资源影响其他试图访问相同数据的查询的概率就越大。


  一种避免这种情况的流行方法是声明绝不允许在搜索的左边缘使用通配符。在某些应用程序中，这是合理的，并且可以在不对 SQL Server 做任何更改的情况下实施。


  不幸的是，这可能是一个不切实际的期望。世界上很少会有业务经理同意要求其用户输入所有可能的街道号码组合，以试图查找匹配街道名称搜索的每一个地址。光是阅读这里的解释就让人觉得荒谬。


  ### 解决方案：全文索引


  针对此场景，一个更合适且有用的解决方案（尽管不太流行）是在表上创建全文索引。全文索引不如非聚集索引流行的一个促成因素是其构建和创建方式的差异，这使得大多数人对其不太熟悉。使用全文索引，一个或多个列中的单词及其在表中的位置会被编入目录。这使得查询能够快速搜索列内的离散值，而无需检查索引中的所有记录。


  要在 `Person.Address` 表上使用全文索引，首先必须构建全文目录，如清单 14-3 所示。之后，创建全文索引并包含将在查询中被搜索的列。最后，需要修改查询以使用全文谓词函数之一。在此示例中，将使用
  `CONTAINS` 函数。


  ```sql

  USE AdventureWorks2017

  GO

  SET STATISTICS IO ON;

  CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

  CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

  KEY INDEX PK_Address_AddressID;

  GO

  SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

  FROM Person.Address

  WHERE CONTAINS (AddressLine1,''Longbrook'');

  ```

  清单 14-3：使用 `CONTAINS` 查询地址的语句




  在部署了全文索引后，搜索名为 Longbrook 的街道的性能与第一次搜索（查询以 710 开头的地址）相似。在图 14-6 的执行计划中，查询没有扫描非聚集索引，而是使用了聚集索引上的查找操作，并通过表值函数查询全文索引。因此，与使用`LIKE`比较时的
  216 次逻辑读取相比，使用全文索引仅需要 12 次逻辑读取（如图 14-5 所示）。读取次数上的差异带来了相比第一次搜索尝试的显著性能提升。


  更多关于全文索引的信息，请阅读第 9 章。


  ![](img/338675_4_En_14_Fig6_HTML.png)


  一个页面在执行计划选项卡下展示了输出结果。它显示查询、地址、嵌套循环、成本为 17%的表值函数以及成本为 83%的聚集索引查找被映射到一个成本为 0%的选定表。


  图 14-6


  使用`CONTAINS`查询地址的执行计划


  ![](img/338675_4_En_14_Fig5_HTML.png)


  一个消息选项卡的输入输出页面截图。它显示了标记为`address`的表以及受影响的行数。逻辑读取数为 12。


  图 14-5


  使用`CONTAINS`查询地址时的`STATISTICS I/O`


  解决此问题还有其他潜在方案，例如手动创建 N-gram 表来管理字符串列中的离散关键字。当搜索词集合有限且能以某种自动化方式维护时，这可以是定制化字符串搜索解决方案的有效方法。演示这一点超出了本书的范围，但在标准索引和全文索引不足以解决字符串搜索挑战的场景中，值得一提。


  ## 字符串连接


  另一个可能严重破坏索引策略的场景是使用字符串连接。`字符串连接`是指将两个或多个值相互追加在一起。当这种情况发生在`WHERE`子句中时，常常会导致意想不到的性能低下。


  为了演示此场景，考虑一个查询名为 Gustavo Achong 的人的请求。搜索这个值需要使用`FirstName`和`LastName`列，这两列之间用空格连接在一起。清单
  14-4 显示了这个查询。代码清单中还包含了在这些列上创建索引的脚本。为该查询生成的执行计划如图 14-8 所示，显示使用了新索引，但操作是扫描而非更理想的查找。即使索引的最左侧前缀与连接值的左侧值相匹配，索引也无法确定在哪里可以找到这些值。这导致索引使用了
  99 次逻辑读取来返回查询结果，如图 14-7 所示。


  ```

  USE AdventureWorks2017

  GO

  SET STATISTICS IO ON;

  CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

  GO

  SELECT BusinessEntityID, FirstName, LastName

  FROM Person.Person

  WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

  清单 14-4

  使用字符串连接的查询

  ```


