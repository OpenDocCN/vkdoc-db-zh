  ### 迷思 5：聚集索引按物理顺序存储记录


  一个更为普遍存在的迷思是认为聚集索引在磁盘上按物理顺序存储表中的记录。这个迷思似乎主要是由于混淆了存储在页面上的内容与记录在这些页面上的存储位置而产生的。正如第
  2 章所讨论的，数据页和记录之间是有区别的。下面将提供一个演示来消除这个迷思。


