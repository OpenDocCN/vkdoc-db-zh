  \n标识列模式的执行计划\n\n```\nUSE AdventureWorks2017\nGO\nSELECT e.EmployeeName, jr.RoleName\n\
  FROM dbo.Employee e\nINNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID\n\
  INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID\nWHERE EmployeeName =\
  \ 'Purchasing|ShipMethod'\nSELECT e.EmployeeName, jr.RoleName\nFROM dbo.Employee\
  \ e\nINNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID\nINNER\
  \ JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID\nWHERE EmployeeName = 'Purchasing|ShipMethod'\n\
  代码清单 13-11\n多列模式的脚本\n```\n\n多列模式有多种实现方式。聚集索引中的关键列可以反转，这将改变为测试脚本生成的执行计划。虽然这种模式可能有益，但在使用时需谨慎，并在使用前充分了解预期的工作负载。\n\
  \n作为对多列模式的总结，我们将回顾一个定义良好的聚集索引应具备的属性。首先，值是静态的。如果发生更改，很可能是删除一条记录并插入一条新记录。这实际上仍然是一次更新操作。为了降低此风险，应尝试让聚集索引以最不可能更改或变化最少的值开头。第二个属性是聚集键是否窄。在此示例中，键大多是窄的。它由两个\
  \ 4 字节的列组成。如果使用更大的列或超过两列，则需要仔细考虑这是否是正确的做法。下一个属性是值是否唯一。在此场景中是唯一的，在现实世界的任何场景中也应该如此。如果不唯一，那么此模式自然不合格。与其他非标识列模式一样，此模式不提供单调递增的聚集键。\n\
  \n最后需要注意一点，数据仓库中的事实表常常容易落入使用多列模式的诱惑中。在这些情况下，事实表中的所有维度键都被放入聚集索引中。这样做的目的是对事实行强制实施唯一性。其效果是创建了一个极宽的聚集键，然后该键会被添加到表上的所有非聚集索引中。很可能，聚集键中的每个维度列都会在事实表上拥有一个单独的索引。结果，这些索引浪费了大量空间，并且由于其尺寸，其性能远不如使用非聚集唯一索引来约束事实表上的唯一性那么好。对于数据仓库或其他\
  \ OLAP 类型的表，列存储索引可以提供最佳的数据结构。在设计复杂的聚集行存储索引之前，请考虑先测试列存储索引。本章后面将更详细地讨论列存储索引。\n\n#####\
  \ 全局唯一标识符\n\n最后一种，也毫无疑问是效益最低（且最不流行）的用于选择聚集索引列的模式是使用全局唯一标识符，也称为 GUID。GUID 模式涉及使用唯一生成的值为表中的每一行提供唯一值。该值不是基于整数的，之所以常被选用，是因为它可以在任何位置（在应用程序的拓扑结构内）生成，并保证唯一性。此模式解决的问题是需要能够在与通常控制唯一值列表的源断开连接时生成新的唯一值。不幸的是，GUID\
  \ 模式常常制造出与它解决的问题一样多的挑战。\n\n生成 GUID 值主要有两种方法。第一种是通过 `NEWID()` 函数。该函数生成一个 16 字节的十六进制值，该值部分基于创建它时计算机的\
  \ MAC 地址。每个生成的值都是唯一的，并且可以以 0 到 9 或 a 到 f 中的任何值开头。下一个创建的值在排序中可能位于前一个值之前或之后。无法保证下一个值是单调递增的。生成\
  \ GUID 的第二种选择是通过 `NEWSEQUENTIALID()`。该函数也创建一个 16 字节的十六进制值。与另一个函数不同，`NEWSEQUENTIALID()`\
  \ 创建的新值自计算机上次启动以来始终大于前一个生成的值。最后一点很重要，因为当服务器重新启动时，使用 `NEWSEQUENTIALID()` 生成的新值有可能小于重启前创建的值。`NEWSEQUENTIALID()`\
  \ 的逻辑仅保证自服务器启动以来的值是顺序的。\n\n如前所述，使用 GUID 模式不能保证提供单调递增的值。无论是 `NEWID()` 还是 `NEWSEQUENTIALID()`，都无法保证下一个值总是大于最后一个值。此外，它不能提供一个窄索引。当将\
  \ GUID 存储为 `uniqueidentifier` 时，它需要 16 字节的存储空间。这相当于四个 `int` 或两个 `bigint` 的大小。相比之下，GUID\
  \ 相当大，而且这个值会用于表上的所有非聚集索引。然而，GUID 模式使用的空间有时可能比这更糟。在某些情况下，如果 GUID 模式实现不当，GUID 值会存储为字符，这需要\
  \ 36 字节来存储，如果使用 Unicode 数据类型则需要 72 字节。\n\n即使 GUID 模式有这些缺陷，它确实实现了定义良好的聚集键的其他一些属性。首先，该值是唯一的。使用\
  \ `NEWID()` 和 `NEWSEQUENTIALID()` 函数生成的 GUID 值都是唯一的。该值也是静态的，因为生成的 GUID 值没有业务含义，因此没有理由更改。\n\
  \n为了演示使用 GUID 模式的影响，将检查其在表上与其他实现的对比。在此场景中，如代码清单 13-12 所示，有三个表。表 `dbo.IndexStrategiesGUID_ICP`\
  \ 使用标识列模式设计。表 `dbo.IndexStrategiesGUID_UniqueID` 使用 GUID 模式构建，遵循最佳实践采用 `uniqueidentifier`。最后一个脚本包含表\
  \ `dbo.IndexStrategiesGUID_String`，它使用 `varchar(36)` 来存储 GUID 值。后一种方法不是实现 GUID 模式的正确方式，分析将有助于突出这一点。在构建好所有三个表后，插入语句将向每个表填充\
  \ 250,000 行。场景中的最后一条语句检索每个表使用的页数。\n\n\n###### 清单 13-12 GUID 模式场景的脚本\n\n```\nUSE\
  \ AdventureWorks2017\nGO\nCREATE TABLE dbo.IndexStrategiesGUID_ICP (\nRowID int\
  \ IDENTITY(1,1)\n,FillerData varchar(1000)\n,CONSTRAINT PK_IndexStrategiesGUID_ICP\
  \ PRIMARY KEY CLUSTERED (RowID)\n);\nCREATE TABLE dbo.IndexStrategiesGUID_UniqueID\
  \ (\nRowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())\n,FillerData varchar(1000)\n\
  ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)\n);\n\
  CREATE TABLE dbo.IndexStrategiesGUID_String (\nRowID varchar(36) DEFAULT(NEWID())\n\
  ,FillerData varchar(1000)\n,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY\
  \ CLUSTERED (RowID)\n);\nINSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)\n\
  SELECT TOP (250000) a1.name+a2.name\nFROM sys.all_objects a1 CROSS JOIN sys.all_objects\
  \ a2\nINSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)\nSELECT TOP (250000)\
  \ a1.name+a2.name\nFROM sys.all_objects a1 CROSS JOIN sys.all_objects a2\nINSERT\
  \ INTO dbo.IndexStrategiesGUID_String (FillerData)\nSELECT TOP (250000) a1.name+a2.name\n\
  FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2\nSELECT OBJECT_NAME(object_ID)\
  \ as table_name, in_row_used_page_count, in_row_reserved_page_count\nFROM sys.dm_db_partition_stats\n\
  WHERE object_id IN (OBJECT_ID('dbo.IndexStrategiesGUID_ICP')\n,OBJECT_ID('dbo.IndexStrategiesGUID_UniqueID')\n\
  ,OBJECT_ID('dbo.IndexStrategiesGUID_String'))\nORDER BY 1\n```\n\n图 13-14 展示了此查询的一些输出结果。\n\
  \n![](img/338675_4_En_13_Fig14_HTML.jpg)\n\n一个表格有 3 列，标签分别为 table name、in row used\
  \ page count 和 in row reserved page count，以及 3 行，标签为 1 到 3。这 3 行条目，即 index strategies\
  \ G U I D I C P、string 和 unique i d，分别对应着 1869 和 1889、2959 和 2977，以及 2250 和 2273\
  \ 的条目。\n\n图 13-14\n\nGUID 模式的页数统计\n\n###### GUID 模式分析\n\n与其他场景不同，GUID 模式的使用与标识列模式相似。主要有两个区别。首先，GUID\
  \ 模式不提供窄聚簇键。对于使用 `uniqueidentifier` 数据类型的聚簇键，其大小的变化需要多出大约 400 个页面来存储相同的信息（参见图 13-14）。更糟糕的是，当错误地将\
  \ GUID 存储在 `varchar` 数据类型中时，表需要多出大约 1100 个页面。毫无疑问，使用 GUID 模式会导致聚簇索引中浪费大量空间，这些空间也会包含在该表的任何非聚集索引中。GUID\
  \ 模式的第二个挑战与聚簇索引的递增属性相关。GUID 不是以有序方式呈现的。下一个值可以大于或小于前一个值，这会导致行在表内的随机放置，从而产生碎片化。有关\
  \ GUID 导致索引碎片化的更多信息，请阅读第 10 章。\n\n关于明确定义的聚簇键的最后两个属性，GUID 模式表现良好。该值是静态的，预计不会随时间变化。该值也是唯一的。事实上，它应该在整个数据库中是唯一的。尽管\
  \ GUID 模式确实实现了明确定义的聚簇索引的两个属性，但它们并不能缓解该模式前述的问题。在确定如何为表构建聚簇索引时，GUID 模式应该是最后的手段。\n\n\
  注意\n\n使用新的 `sp_sequence_get_range` 存储过程结合 `SEQUENCE`，可以成为希望从 `uniqueidentifier`\
  \ 模式迁移到使用标识列模式进行聚簇索引设计的应用程序的一个有效替代方案。\n\n### 非聚集索引\n\n在前两节中，讨论集中在堆和聚簇索引上，它们用于确定存储数据的主要方法。对于堆，数据是未排序存储的。对于聚簇索引，数据基于一组列进行排序。在几乎所有数据库中，都需要其他方法来访问表中与数据存储顺序不一致的数据。这就是非聚集索引的用武之地。非聚集索引提供了除堆或聚簇索引之外的另一种访问表中数据的方法。\n\
  \n在本节中，将回顾一些与非聚集索引相关的模式。这些模式将有助于确定何时何地考虑构建非聚集索引。对于每种模式，将讨论其主要组成部分和可能应用的情况。与聚簇索引模式类似，每种非聚集索引模式都将包含场景以展示该模式的益处。将讨论的非聚集索引模式有：\n\
  \n*   搜索列\n*   索引交集\n*   多列索引\n*   覆盖索引\n*   包含列\n*   筛选索引\n*   外键\n\n在回顾这些模式之前，有一些适用于所有非聚集索引的指南。这些指南与明确定义的聚簇索引的属性不同。对于那些属性，关键目标之一是尽可能遵守它们。而非聚集索引指南则构成了一些考量因素，这些因素有助于加强索引的合理性，但可能不会排除索引的使用。在设计索引时需要考虑的一些最常见因素如下：\n\
  \n*   *非聚集索引键列的更改频率如何？* 数据更改越频繁，非聚集索引中的行可能需要更频繁地更改其在索引中的位置。\n*   *该索引能改进哪些频繁执行的查询？*\
  \ 一个索引能覆盖的查询越多，这些查询执行越频繁，数据库平台的整体运行就越好。\n*   *该索引支持哪些业务需求？* 支持关键业务操作但使用不频繁的索引，有时可能比频繁使用的索引更重要。\n\
  *   *维护索引的时间成本与查询数据的时间成本相比如何？* 可能存在一个点，超过该点后，从索引中获得的性能增益会被创建和整理索引碎片所花费的时间以及所需的空间所抵消。\n\
  \n正如引言中提到的，索引常常让人感觉像是一门艺术。幸运的是，可以使用科学或统计来证明索引的价值。在回顾每种模式时，我们将考察它们可以应用的场景，并使用一些科学方法（或此处的度量标准）来判断索引是否提供价值。用来评判索引的两个指标将是执行期间的读取操作和执行计划的复杂性。\n\
  \n\n### 搜索列\n\n设计非聚集索引最基本、最常见的模式是基于已定义或预期的搜索模式来构建它们。搜索列模式应该是最为人所知的模式，但也经常容易被忽视。\n\
  \n如果查询将通过名字搜索包含联系人的表，那么就为名字列建立索引。如果地址表将通过城市或州进行搜索，那么就为这些列建立索引。搜索列模式的主要目标是减少对聚集索引的扫描，并将这些操作转移到一个非聚集索引上，该索引可以提供更直接的数据访问路径。\n\
  \n为了演示搜索列模式，将使用本节提到的第一个场景，一个联系人表。为简单起见，示例将使用一个名为 `dbo.Contacts` 的表，该表包含来自 `AdventureWorks2017`\
  \ 表 `Person.Person` 的数据（参见清单 13-13）。应该有 19,972 行插入到 `dbo.Contacts` 中，尽管具体数量会根据你的\
  \ `AdventureWorks2017` 数据库的新旧程度而有所不同。\n\n```sql\nUSE AdventureWorks2017;\nGO\nCREATE\
  \ TABLE dbo.Contacts (\nContactID INT IDENTITY(1, 1),\nFirstName NVARCHAR(50),\n\
  LastName NVARCHAR(50),\nIsActive BIT,\nEmailAddress NVARCHAR(50),\nCertificationDate\
  \ DATETIME,\nFillerData CHAR(1000),\nCONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED\
  \ (ContactID));\nINSERT INTO dbo.Contacts (\nFirstName,\nLastName,\nIsActive,\n\
  EmailAddress,\nCertificationDate )\nSELECT pp.FirstName,\npp.LastName,\nIIF(pp.BusinessEntityID\
  \ / 10 = 1, 1, 0),\npea.EmailAddress,\nIIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate,\
  \ NULL)\nFROM Person.Person pp\nINNER JOIN Person.EmailAddress pea\nON pp.BusinessEntityID\
  \ = pea.BusinessEntityID;\nListing 13-13\n搜索列模式的设置\n```\n\n有了 `dbo.Contacts` 表之后，对它进行的第一次测试是在没有为其构建任何非聚集索引的情况下查询该表。在示例（清单\
  \ 13-14）中，查询搜索名字为 Catherine 的行。执行查询显示 `dbo.Contacts` 中有 22 行符合标准（参见图 13-15）。为了检索这\
  \ 22 行，SQL Server 最终读取了 2,866 页，这是表中的所有页面。并且如图 13-16 所示，页面读取是对 `dbo.Contacts` 上的\
  \ `PK_Contacts` 进行索引扫描的结果。查询的目标是从超过 19,000 行中检索 22 行，因此检查表中的每一页以查找 `FirstName` 为\
  \ Catherine 的行并不是最优的方法，应该避免。\n\n![Figure 13-16](img/338675_4_En_13_Fig16_HTML.png)\n\
  *图 13-16：没有非聚集索引时搜索列模式的执行计划*\n\n![Figure 13-15](img/338675_4_En_13_Fig15_HTML.png)\n\
  *图 13-15：没有非聚集索引时搜索列模式的 Statistics I/O 结果*\n\n```sql\nUSE AdventureWorks2017;\n\
  GO\nSET STATISTICS IO ON;\nSELECT ContactID,\nFirstName\nFROM dbo.Contacts\nWHERE\
  \ FirstName = 'Catherine';\nListing 13-14\n没有非聚集索引的搜索列模式\n```\n\n通过向 `dbo.Contacts`\
  \ 添加一个非聚集索引，可以相对简单地实现最优地检索所有 Catherine 行的目标。在下一个脚本（清单 13-15）中，在 `FirstName` 列上创建了一个非聚集索引。除了对\
  \ `FirstName` 的过滤外，查询还需要返回 `ContactID`。由于非聚集索引包含聚集索引键，`ContactID` 中的值默认包含在索引中。\n\
  \n执行清单 13-15 中的脚本会带来与在表上添加非聚集索引之前截然不同的性能表现。非聚集索引将查询使用的页数减少到两页（图 13-17），而不是读取表中的每一页。这里的减少是显著的，并突显了使用非聚集索引在聚集索引键之外的列上提供对表中信息更直接访问的能力和价值。执行计划还有一个变化：执行计划不再扫描\
  \ `PK_Index`，而是对 `IC_Contacts_FirstName` 使用索引查找，如图 13-18 所示。操作符的改变进一步证明非聚集索引有助于提高查询性能。\n\
  \n![Figure 13-18](img/338675_4_En_13_Fig18_HTML.png)\n*图 13-18：有非聚集索引时搜索列模式的执行计划*\n\
  \n![Figure 13-17](img/338675_4_En_13_Fig17_HTML.png)\n*图 13-17：有非聚集索引时搜索列模式的 Statistics\
  \ I/O 结果*\n\n```sql\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Contacts_FirstName\
  \ ON dbo.Contacts (FirstName);\nSET STATISTICS IO ON;\nSELECT ContactID,\nFirstName\n\
  FROM dbo.Contacts\nWHERE FirstName = 'Catherine';\nListing 13-15\n有非聚集索引的搜索列模式\n\
  ```\n\n使用搜索列模式可能是将非聚集索引模式应用于数据库最重要的第一步。它提供了访问数据的替代路径，这可能是从几页与数千页中获取数据的差别。本节中的搜索列示例展示了在单个列上构建索引。接下来的几个模式将以此为基础进行扩展。\n\
  \n\n### 索引交叉\n\n“搜索列”模式的目标是创建一个索引，以最小化查询的页面读取次数并提升其性能。然而，有时查询会超出前面演示的单列示例。额外的列可能出现在谓词中，或在\
  \ `SELECT` 语句中返回。解决此问题的方法之一是创建包含额外列的非聚集索引。当存在可以满足 `WHERE` 子句中每个谓词的索引时，SQL Server\
  \ 可以使用多个非聚集索引来查找两者之间匹配聚集键的行。此操作称为索引交叉。\n\n为了演示索引交叉模式，我们将回顾当筛选条件扩展到涵盖多列时会发生什么。清单\
  \ 13-16 中的代码包含了扩展后的 `SELECT` 语句和 `WHERE` 子句，将谓词扩展为包括 `LastName` 为 Cox 的行。\n\n查询的更改导致性能与上一节的结果相比发生了显著变化。由于查询中增加了列，满足查询需要读取\
  \ 68 个页面，而之前未包含 `LastName` 时只需读取 2 个页面（图 13-19）。页面读取次数的增加是由于执行计划的改变（图 13-20）。在此执行计划中，查询执行增加了两个额外的操作：一个键查找和一个嵌套循环。添加这些运算符是因为索引\
  \ `IX_Contacts_FirstName` 无法提供满足查询所需的所有信息。SQL Server 判定使用 `IX_Contacts_FirstName`\
  \ 并从聚集索引中查找缺失信息仍然比扫描聚集索引成本更低。问题在于，对于非聚集索引匹配的每一行，都必须在聚集索引上进行一次查找。虽然键查找并不总是问题，但它们可能会推高查询的\
  \ CPU 和 I/O 成本。\n\n![](img/338675_4_En_13_Fig20_HTML.png)\n一个面板，打开了执行计划选项卡，包含两行文本，对应查询\
  \ 1，成本相对于批处理为 100%。下方是一个流程图，展示了多条路径：索引查找，非聚集，Contacts，成本占 14%；键查找，聚集，Contacts，成本占\
  \ 86%；最后选择操作成本占 0%。\n图 13-20\n未利用索引交叉模式时的执行计划\n\n![](img/338675_4_En_13_Fig19_HTML.png)\n\
  一个面板，打开了消息选项卡，其中有一行条目，内容为：表 'Contacts'，扫描计数 1，逻辑读取 68，物理读取 0，预读 0，LOB 逻辑读取 0，LOB\
  \ 物理读取 0，在 2 1 行受影响 标签之间。\n图 13-19\n未利用索引交叉模式时的统计信息 I/O 结果\n\n```\nUSE AdventureWorks2017;\n\
  GO\nSET STATISTICS IO ON;\nSELECT ContactID,\nFirstName,\nLastName\nFROM dbo.Contacts\n\
  WHERE FirstName = 'Catherine'\nAND LastName = 'Cox';\n```\n清单 13-16\n未利用索引交叉模式的查询\n\
  \n利用索引交叉模式是提升清单 13-16 中查询性能的少数方法之一。当 SQL Server 可以在同一张表上使用多个非聚集索引来满足查询要求时，就会发生索引交叉。对于清单\
  \ 13-16 中的查询，查找 `FirstName` 最直接的路径是通过索引 `IX_Contacts_FirstName`。然而，此时为了筛选并返回 `LastName`\
  \ 列，SQL Server 使用了聚集索引并对每一行执行了一次查找，类似于图 13-21 左侧的图像。另一种情况是，如果存在一个用于 `LastName` 列的索引，SQL\
  \ Server 本可以将其与 `IX_Contacts_FirstName` 一起使用。本质上，通过索引交叉模式，SQL Server 能够执行类似于在同一张表的索引之间进行联接的操作，以找到两者之间重叠的行，如图\
  \ 13-21 右侧所示。\n\n![](img/338675_4_En_13_Fig21_HTML.png)\n一个图表，左侧是名字索引（22 行），连接到\
  \ 6 个未标记的水平条，位于一个向下的箭头之上。右侧是一个维恩图，展示了在名字索引（22 行）和姓氏索引（99 行）之间存在 1 行。\n图 13-21\n\
  带键查找的索引查找 vs. 使用索引交叉模式的两个索引查找\n\n为了演示索引交叉模式并让 SQL Server 使用索引交叉，下一个示例在 `LastName`\
  \ 列上创建了一个索引（清单 13-17）。创建了索引 `IX_Contacts_LastName` 后，结果与索引未创建时相比发生了显著变化。第一个变化在于读取次数。之前的执行需要读取\
  \ 68 次，而现在只需读取 5 次（图 13-22）。读取次数减少的原因是 SQL Server 在查询计划中利用了索引交叉（图 13-23）。索引 `IX_Contacts_FirstName`\
  \ 和 `IX_Contacts_LastName` 被用于满足查询，而无需返回聚集索引检索查询数据。这是因为两个索引一起可以完全满足查询需求。\n\n![](img/338675_4_En_13_Fig23_HTML.png)\n\
  一个面板，打开了执行计划选项卡，包含两行文本，对应查询 1，成本相对于批处理为 100%。下方是一个流程图，展示了多条路径：索引查找，非聚集，Contacts，成本占\
  \ 26%；索引查找，非聚集，Contacts，成本占 27%；最后选择操作成本占 0%。\n图 13-23\n索引交叉模式的执行计划\n\n![](img/338675_4_En_13_Fig22_HTML.png)\n\
  一个面板，打开了消息选项卡，其中有一行条目，内容为：表 'Contacts'，扫描计数 2，逻辑读取 5，物理读取 0，预读 0，LOB 逻辑读取 0，在 2\
  \ 1 行受影响 标签之间。\n图 13-22\n索引交叉模式的统计信息 I/O 结果\n\n```\nUSE AdventureWorks2017;\nGO\n\
  CREATE INDEX IX_Contacts_LastName ON dbo.Contacts (LastName);\nSET STATISTICS IO\
  \ ON;\nSELECT ContactID,\nFirstName,\nLastName\nFROM dbo.Contacts\nWHERE FirstName\
  \ = 'Catherine'\nAND LastName = 'Cox';\n```\n清单 13-17\n索引交叉模式\n\n索引交叉是 SQL Server\
  \ 的一项功能，当同一张表的多个非聚集索引可以为查询提供结果时，它用于更好地满足查询。在为索引交叉设计索引时，目标是拥有基于“搜索列”模式的多个索引，这些索引可以以多种组合方式一起使用，以支持各种筛选条件。关于索引交叉模式需要记住的一个关键点是，SQL\
  \ Server 无法被指示何时使用索引交叉；它会在每个请求、底层索引及其关联数据合适时选择使用它。\n\n### 多列索引\n\n前两节中的示例都集中于在索引中包含单个键列的索引。而非聚集索引最多可以包含\
  \ 16 列。虽然“窄”是定义良好的聚集索引的一个属性，但同样的原则并不总是适用于非聚集索引。相反，非聚集索引应包含尽可能多的列，以确保能被尽可能多的查询使用。如果许多查询使用相同的列作为谓词，那么通常将它们全部包含在一个索引中是个好主意。\n\
  \n值得注意的是，仅仅因为一个索引可以包含很多列，并不意味着它就应该包含很多列。如果一两个列具有高选择性，那么即使还需要键查找，这几个列可能也足以确保相当快的索引查找。通常，查询持续时间应该是衡量索引有效性的首要基准，其次是资源消耗。\n\
  \n演示使用多列模式索引的一个简单方法是使用前一节中的相同查询并应用此模式。在该查询中，构建了两个索引，一个在`FirstName`列上，另一个在`LastName`列上。对于多列模式，新索引将同时包含这两个列（代码清单\
  \ 13-18）。\n\n正如统计数据所示（图 13-24），通过使用多列模式，返回请求结果所需的读取次数有所减少。从索引交集模式的五次读取减少到多列模式的两次读取。此外，执行计划（如图\
  \ 13-25 所示）也得到了简化。现在只包含一个在索引 `IX_Contacts_FirstNameLastName` 上的索引查找操作。\n\n![图 13-25](img/338675_4_En_13_Fig25_HTML.png)\n\
  *图 13-25：多列模式的执行计划*\n\n![图 13-24](img/338675_4_En_13_Fig24_HTML.png)\n*图 13-24：多列模式的\
  \ Statistics I/O 结果*\n\n```sql\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Contacts_FirstNameLastName\n\
  ON dbo.Contacts (FirstName, LastName);\nSET STATISTICS IO ON;\nSELECT ContactID,\n\
  FirstName,\nLastName\nFROM dbo.Contacts\nWHERE FirstName = 'Catherine'\nAND LastName\
  \ = 'Cox';\n```\n*代码清单 13-18：多列模式*\n\n在为数据库编制索引时，实现多列模式与搜索列模式同样重要。该模式通过将最常用于谓词的列组合在一起，有助于减少所使用的索引数量。虽然这个模式与索引交集模式的部分价值相矛盾，但关键在于平衡。在某些情况下，对于查询谓词变化很多的表，依赖单列索引上的索引交集将提供最佳性能。而在其他时候，具有特定列顺序的更宽的索引将是有益的。同时也要考虑候选索引是否会在应用程序的其他地方有用。如果是这样，那么利用这些信息在多列索引或多单列索引之间做出明智的决定。\n\
  \n尝试这两种模式，并以提供最佳整体性能的方式应用它们。请记住，如果索引不适用，它们总是可以被删除的。\n\n### 覆盖索引\n\n下一个索引模式是覆盖索引模式。使用覆盖索引模式时，可以将谓词之外的列添加到索引的键列中，以便这些值可以作为查询\
  \ `SELECT` 子句的一部分返回。这个模式在 SQL Server 中已经成为标准的索引实践一段时间了。然而，索引创建方式的增强使得这个模式不如过去那么有用了。不过，讨论这个模式还是有价值的，因为许多使用\
  \ SQL Server 的人都很熟悉它。\n\n为了开始研究覆盖索引模式，将提供一个示例来定义该索引所解决的问题。为了展示问题，下一个测试查询将在 `SELECT`\
  \ 列表中包含 `IsActive` 列（代码清单 13-19）。添加此列后，I/O 统计信息再次从两次读取增加到五次读取，如图 13-26 所示。性能的变化与执行计划的变化直接相关（见图\
  \ 13-27），其中包含了键查找和嵌套循环。与前面的示例一样，当查询中添加了未包含在非聚集索引中的项时，需要从包含表的所有数据的聚集索引中检索它们。\n\n\
  ![图 13-27](img/338675_4_En_13_Fig27_HTML.png)\n*图 13-27：未利用覆盖索引模式的查询的执行计划*\n\n![图\
  \ 13-26](img/338675_4_En_13_Fig26_HTML.png)\n*图 13-26：未利用覆盖索引模式的查询的 Statistics I/O\
  \ 结果*\n\n```sql\nUSE AdventureWorks2017;\nGO\nSET STATISTICS IO ON;\nSELECT ContactID,\n\
  FirstName,\nLastName,\nIsActive\nFROM dbo.Contacts\nWHERE FirstName = 'Catherine'\n\
  AND LastName = 'Cox';\n```\n*代码清单 13-19：未利用覆盖索引模式的查询*\n\n一个理想的索引应该能够处理查询的筛选条件，并返回\
  \ `SELECT` 列表中请求的列。覆盖索引模式可以满足这些要求。即使 `IsActive` 不是查询的谓词之一，也可以将其添加到索引中，SQL Server\
  \ 可以使用该键列来返回查询的列值。为了演示覆盖索引模式，将创建一个以 `FirstName`、`LastName` 和 `IsActive` 作为键列的索引（见代码清单\
  \ 13-20）。有了索引 `IX_Contacts_FirstNameLastName` 之后，每次执行的读取次数恢复到两次（见图 13-28）。执行计划现在也只使用索引查找（见图\
  \ 13-29）。\n\n![图 13-29](img/338675_4_En_13_Fig29_HTML.png)\n*图 13-29：覆盖索引模式的执行计划*\n\
  \n![图 13-28](img/338675_4_En_13_Fig28_HTML.png)\n*图 13-28：覆盖索引模式的 Statistics I/O\
  \ 结果*\n\n\n#### 覆盖索引模式\n\n```\nUSE AdventureWorks2017\nGO\nCREATE INDEX IX_Contacts_FirstNameLastNameIsActive\
  \ ON dbo.Contacts(FirstName, LastName, IsActive);\nSET STATISTICS IO ON;\nSELECT\
  \ ContactID,\nFirstName,\nLastName,\nIsActive\nFROM dbo.Contacts\nWHERE FirstName\
  \ = 'Catherine'\nAND LastName = 'Cox';\n```\n**清单 13-20** 覆盖索引模式\n\n覆盖索引模式非常有用，并有潜力在许多方面提升性能。这种方法的缺点是，索引键列中包含的每个列都需要被排序。如果一个列需要被查询返回，但不会用于排序，那么它更适合被设为包含列，而不是键列。\n\
  \n> **注意**\n> 有些人认为覆盖索引和带包含列的索引是同一回事。虽然非常相似，但两者之间的关键区别在于列的位置——是作为索引键的一部分，还是作为索引包含的数据。\n\
  \n##### 包含列模式\n\n包含列模式与覆盖索引模式密切相关。包含列模式利用了 `CREATE` 和 `ALTER INDEX` 语法中的 `INCLUDE`\
  \ 子句。该子句允许将非键列添加到非聚集索引中，类似于非键数据在聚集索引中的存储方式。这是包含列模式与覆盖索引模式的主要区别，后者的额外列是索引上的键列。与聚集索引类似，作为\
  \ `INCLUDE` 子句一部分的非键列不会被排序，尽管它们可以在某些查询中用作谓词。\n\n包含列模式的用例源于它所提供的灵活性。它与覆盖索引模式基本相同，有时这两个名称可以互换使用。关键的区别，也是本节将要演示的，在于覆盖索引模式受限于索引中所有列的排序顺序。而包含列模式通过包含非键数据，可以避免这个潜在问题，从而增加了使用的灵活性。\n\
  \n在演示包含列模式的灵活性之前，我们将先检查另一个针对 `dbo.Contacts` 表的索引。在清单 13-21 中，查询筛选 `FirstName` 值为\
  \ Catherine，并返回 `ContactID`、`FirstName`、`LastName` 和 `EmailAddress` 列。此查询请求与其他示例不同，因为它现在包含了\
  \ `EmailAddress` 列。由于该列未包含在任何其他非聚集索引中，因此没有索引能完全满足该查询。结果，执行计划使用 `IX_Contacts_FirstName`\
  \ 来识别 Catherine 的行，然后从聚集索引中查找其余数据，如图 13-30 所示。由于需要进行键查找，查询的 I/O 增加到 68 次读取（见图 13-31），这与之前的示例情况相同。\n\
  \n![Figure 13-31](img/338675_4_En_13_Fig31_HTML.png)\n**图 13-31** 使用现有索引的包含列模式的执行计划\n\
  \n![Figure 13-30](img/338675_4_En_13_Fig30_HTML.png)\n**图 13-30** 使用现有索引的包含列模式的\
  \ Statistics I/O 结果\n\n```\nUSE AdventureWorks2017;\nGO\nSET STATISTICS IO ON;\n\
  SELECT ContactID,\nFirstName,\nLastName,\nEmailAddress\nFROM dbo.Contacts\nWHERE\
  \ FirstName = 'Catherine';\n```\n**清单 13-21** 使用现有索引的包含列模式\n\n为了提高此查询的性能，可以创建基于多列模式或覆盖索引模式的另一个索引。然而，这些选项的问题在于，生成的索引将具有与其能改进的查询相同的限制。相反，我们将创建一个基于包含列模式的新索引。这个新索引（如清单\
  \ 13-22 所示）以 `FirstName` 作为键列，并包含 `LastName`、`IsActive` 和 `EmailAddress` 作为非键列。尽管\
  \ `IsActive` 列未在索引中使用，但仍将其包含在内，以便为该索引提供额外的灵活性，本节后面的示例将使用此灵活性。索引就位后，清单 13-21 中查询的性能显著提升。在此示例中，每次执行的读取次数从之前的\
  \ 68 次下降到 3 次（见图 13-32）。在执行计划中，不再需要键查找和嵌套循环；取而代之的是索引查找，现在使用的是 `IX_Contacts_FirstNameINC`\
  \ 索引（见图 13-33）。\n\n![Figure 13-33](img/338675_4_En_13_Fig33_HTML.png)\n**图 13-33**\
  \ 使用新索引的包含列模式的执行计划\n\n![Figure 13-32](img/338675_4_En_13_Fig32_HTML.png)\n**图 13-32**\
  \ 使用新索引的包含列模式的 Statistics I/O 结果\n\n```\nUSE AdventureWorks2017\nGO\nCREATE INDEX\
  \ IX_Contacts_FirstNameINC ON dbo.Contacts(FirstName)\nINCLUDE (LastName, IsActive,\
  \ EmailAddress);\nSET STATISTICS IO ON;\nSELECT ContactID,\nFirstName,\nLastName,\n\
  EmailAddress\nFROM dbo.Contacts\nWHERE FirstName = 'Catherine';\n```\n**清单 13-22**\
  \ 使用新索引的包含列模式\n\n虽然使用包含列模式创建的索引其读取次数略高，但该索引具有的灵活性足以弥补这一差异。在本章的每个示例中，都向 `dbo.Contacts`\
  \ 表添加了一个新索引。此时，该表上有六个索引，每个索引服务于不同的目的，其中四个以相同的列 `FirstName` 开头。这些索引每个都占用空间，并且在 `dbo.Contacts`\
  \ 中的数据被修改时需要进行维护。在活跃的表中，过度索引可能对表上的所有活动产生负面影响。\n\n包含列模式可以帮助解决这个问题。在存在多个具有相同前导键列的索引的情况下，可以使用包含列模式将这些索引合并为一个索引，将一些键列作为非键列添加到索引中。为了演示，首先删除所有以\
  \ `FirstName` 开头的索引，除了使用包含列模式创建的那个（清单 13-23 提供了脚本）。\n\n```\nUSE AdventureWorks2017\n\
  GO\nDROP INDEX IF EXISTS IX_Contacts_FirstNameLastName ON dbo.Contacts\nGO\nDROP\
  \ INDEX IF EXISTS IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts\nGO\nDROP\
  \ INDEX IF EXISTS IX_Contacts_FirstName ON dbo.Contacts\nGO\n```\n**清单 13-23** 在包含列模式中删除索引\n\
  \n\n\n`dbo.Contact` 表目前仅有三个索引。分别是 `ContactID` 列上的聚集索引、`LastName` 上的非聚集索引，以及一个包含\
  \ `LastName`、`IsActive` 和 `EmailAddress` 作为索引数据的 `FirstName` 索引。在这些索引就位后，需要对前文模式中的查询（如清单\
  \ 13-24 所示）针对该表进行测试。\n\n关于查询在“包含列”模式与其他模式下的性能表现，有两点关键需要注意。首先，所有查询的执行计划（如图 13-35\
  \ 所示）都使用了索引查找操作。对于仅按 `FirstName` 过滤的查询，使用查找操作是预期的；但当附加了对 `LastName` 的过滤条件时，它仍然可以使用。SQL\
  \ Server 能够做到这一点，是因为在索引查找之下，它会扫描匹配第一个谓词的行范围，然后移除 `LastName` 值不为 `Cox` 的结果。第二个需要注意的点是每个查询的读取次数，如图\
  \ 13-34 所示。读取次数从两次增加到了三次。虽然这构成了 50% 的读取增长，但性能变化并不显著，不足以证明在单一索引已能充分提供所需性能的情况下，创建四个索引是合理的。\n\
  \n![](img/338675_4_En_13_Fig35_HTML.png)\n\n一个面板，其中打开了执行计划选项卡，包含查询 1 到 3 的各 2 行文本，每个查询占批处理成本的\
  \ 33%。每个查询都有一个流程图，展示了从索引查找（非聚集，Contacts，成本 100%）到选择（成本 0%）的连接。\n\n图 13-35\n“包含列”模式的执行计划\n\
  \n![](img/338675_4_En_13_Fig34_HTML.png)\n\n一个面板，其中打开了消息选项卡，包含 Contacts 表的 3 行条目，具有相同的扫描计数\
  \ 1，逻辑读取 3，物理读取 0，预读取 0，LOB 逻辑读取 0，LOB 物理读取 0，位于“影响了 22 行”标签之下，中间穿插着“影响了 1 行”标签。\n\
  \n图 13-34\n“包含列”模式的统计 I/O 结果\n\n```\nUSE AdventureWorks2017;\nGO\nSET STATISTICS\
  \ IO ON;\nSELECT ContactID,\nFirstName\nFROM dbo.Contacts\nWHERE FirstName = 'Catherine';\n\
  SELECT ContactID,\nFirstName,\nLastName\nFROM dbo.Contacts\nWHERE FirstName = 'Catherine'\n\
  AND LastName = 'Cox';\nSELECT ContactID,\nFirstName,\nLastName,\nIsActive\nFROM\
  \ dbo.Contacts\nWHERE FirstName = 'Catherine'\nAND LastName = 'Cox';\n清单 13-24\n\
  针对“包含列”模式的其他查询\n```\n\n构建非聚集索引的“包含列”模式是创建索引时使用的重要模式。当与导致查找操作的具体查询结合使用时，它能提升读取和执行性能。它还提供了整合相似索引的机会，从而减少表上的索引总数，同时相比不存在索引的情况仍能提供性能提升。\n\
  \n##### 筛选索引\n\n在某些表中，存在某些具有特定值的行，这些行在应用程序使用数据库时极少或永远不会在结果集中返回。在这些场景中，将这些行作为结果集返回的选项移除可能是有益的。在其他一些情况下，识别表中的数据子集并基于此创建索引可能很有用。通过使用仅覆盖查询需要返回结果的那数百或数千行的索引，而不是扫描表中的数百万或数十亿条记录，可以提升性能。这两种情况都指明了使用“筛选索引”模式有助于提升性能的场景。\n\
  \n“筛选索引”模式，顾名思义，使用了 SQL Server 中的筛选索引功能。使用筛选索引时，会在非聚集索引中添加一个 `WHERE` 子句，以减少索引中包含的行数。通过仅包含匹配\
  \ `WHERE` 子囧过滤条件的行，查询引擎在构建执行计划时只需考虑这些行；此外，扫描行范围的成本也低于索引包含所有行的情况。\n\n为了说明使用筛选索引的价值，考虑一个场景：只有表中的一小部分行在被筛选的列中包含值。清单\
  \ 13-25 考虑了一个查询的不同版本。第一个版本返回 `CertificationDate` 有值的行。第二个版本仅返回 `CertificationDate`\
  \ 在 2005 年 1 月 1 日至 2005 年 2 月 1 日之间的行。对于这两个查询，表中都没有索引能为执行提供最优计划，并且在执行过程中访问了索引的所有\
  \ 2,866 个页面（参见图 13-36）。检查两个执行计划（图 13-37）显示，使用了 `dbo.Contacts` 的聚集索引扫描来查找匹配 `CertificationDate`\
  \ 谓词的行。正如缺失索引提示所建议的，在 `CertificationDate` 列上创建索引可以提升查询性能。\n\n![](img/338675_4_En_13_Fig37_HTML.png)\n\
  \n一个面板，其中打开了执行计划选项卡，包含查询 1 和 2 的各 3 行文本，每个查询占批处理成本的 50%。每个查询都有一个流程图，展示了从聚集索引扫描（聚集，Contacts，成本\
  \ 99%）到选择（成本 0%）的连接。\n\n图 13-37\n未使用“筛选索引”模式的查询的执行计划\n\n![](img/338675_4_En_13_Fig36_HTML.png)\n\
  \n一个面板，其中打开了消息选项卡，包含 worktable 和 contacts 表的 2 组各 2 行条目，具有相同的扫描计数 0 和 1，逻辑读取 0 和\
  \ 2866，物理读取 0 和 0，预读取 0 和 0，LOB 逻辑读取 0 和 0，LOB 物理读取 0 和 0，位于“影响了 10 行”标签之下，中间穿插着“影响了\
  \ 1 行”标签。\n\n图 13-36\n未使用“筛选索引”模式的查询的统计 I/O 结果\n\n```\nUSE AdventureWorks2017;\n\
  GO\nSET STATISTICS IO ON;\nSELECT ContactID,\nFirstName,\nLastName,\nCertificationDate\n\
  FROM dbo.Contacts\nWHERE CertificationDate IS NOT NULL\nORDER BY CertificationDate;\n\
  SELECT ContactID,\nFirstName,\nLastName,\nCertificationDate\nFROM dbo.Contacts\n\
  WHERE CertificationDate\nBETWEEN '20110101' AND '20110201'\nORDER BY CertificationDate;\n\
  清单 13-25\n未使用“筛选索引”模式的查询\n```\n\n在应用缺失索引建议之前，请考虑索引在此查询及未来查询中将如何使用。在此场景中，假设永远不会有一个查询在值为\
  \ `NULL` 时使用 `CertificationDate`。那么，在索引中为所有 `NULL` 行存储空值有意义吗？基于所述假设，这样做没有意义；这样做会浪费数据库空间，并且如果因扫描读取量足够高而选择了其他索引，导致跳过\
  \ `CertificationDate` 上的索引，则可能会导致执行计划不是最优的。\n\n在此场景中，过滤索引中的行是有意义的。为此，索引的创建方式与其他索引相同，只是在其索引创建语句中添加了一个\
  \ `WHERE` 子句（参见清单 13-26）。创建过滤索引时，关于 `WHERE` 子句有几点需要注意。首先，`WHERE` 子句必须是确定性的。它不能随着时间推移根据子句内函数的结果而改变。例如，不能使用\
  \ `GETDATE()` 函数，因为其返回的值每毫秒都在变化。第二个限制是只允许简单的比较逻辑。这意味着不能使用 `BETWEEN` 和 `LIKE` 比较。有关过滤索引的限制和约束的更多信息，请参阅第\
  \ 2 章。\n\n执行清单 13-26 中的 `CertificationDate` 查询表明，过滤索引对查询性能有显著影响。关于产生的读取次数，现在只有 2\
  \ 次读取，而应用索引之前是 2,866 次读取（参见图 13-38）。此外，执行计划现在对两个查询都使用索引查找，而不是聚集索引扫描，如图 13-39 所示。虽然这些结果是预料之中的，但关于该索引的另一个考虑是，新索引仅由两个页组成。如图\
  \ 13-40 所示，整个索引所需的页数大大少于聚集索引和其他非聚集索引。\n\n![](img/338675_4_En_13_Fig40_HTML.png)\n\
  \n图 13-40 过滤索引的页数比较\n\n![](img/338675_4_En_13_Fig39_HTML.png)\n\n图 13-39 过滤索引模式的执行计划\n\
  \n![](img/338675_4_En_13_Fig38_HTML.png)\n\n图 13-38 过滤索引模式的统计信息 I/O 结果\n\n```sql\n\
  USE AdventureWorks2017\nGO\nCREATE INDEX IX_Contacts_CertificationDate ON dbo.Contacts(CertificationDate)\n\
  INCLUDE (FirstName, LastName)\nWHERE CertificationDate IS NOT NULL;\nSET STATISTICS\
  \ IO ON;\nSELECT ContactID,\nFirstName,\nLastName,\nCertificationDate\nFROM dbo.Contacts\n\
  WHERE CertificationDate IS NOT NULL\nORDER BY CertificationDate;\nSELECT ContactID,\n\
  FirstName,\nLastName,\nCertificationDate\nFROM dbo.Contacts\nWHERE CertificationDate\n\
  BETWEEN '20110101' AND '20110201'\nORDER BY CertificationDate;\nSET STATISTICS IO\
  \ OFF;\nSELECT OBJECT_NAME(object_id) as table_name\n,CASE index_id\nWHEN INDEXPROPERTY(object_id\
  \ , 'IX_Contacts_CertificationDate', 'IndexID') THEN 'Filtered Index'\nWHEN 1 THEN\
  \ 'Clustered Index'\nELSE 'Other Indexes' END As index_type\n,index_id\n,in_row_data_page_count\n\
  ,in_row_reserved_page_count\n,in_row_used_page_count\nFROM sys.dm_db_partition_stats\n\
  WHERE object_id = OBJECT_ID('dbo.Contacts');\n```\n清单 13-26 过滤索引模式\n\n仅将表中行的一个子集包含在索引中具有许多优势。一个优势是，由于索引更小，索引中的页更少，这直接转化为数据库的存储需求更低。类似地，如果索引中的页更少，则索引碎片的机会更少，维护索引所需的工作量也更小。过滤索引的最后一个优势与性能和计划质量有关。由于过滤索引中的值是有限的，索引的统计信息也是有限的。由于在过滤索引中需要遍历的页更少，对过滤索引的扫描几乎总是比对聚集索引或堆的扫描性能问题更小。\n\
  \n在创建索引时，有几种情况可以并且应该使用过滤索引模式。第一种情况是当需要在配置为稀疏的列上创建索引时。在这种情况下，预期将具有该值的行数与总行数相比会很小。使用稀疏列的好处之一是避免了在这些列中存储\
  \ `NULL` 值所带来的存储成本。通过使用过滤索引，确保这些列上的索引不存储 `NULL` 值。第二种情况是当需要在可以包含多个 `NULL` 值的列上强制唯一性时。创建一个键列不为\
  \ `NULL` 的唯一过滤索引，将绕过唯一性限制（该限制只允许列中存在单个 `NULL` 值）。如果一个列包含社会安全号码，有时可能包含 `NULL`，但当不为\
  \ `NULL` 时应始终唯一，则可以创建一个唯一过滤索引来强制非 `NULL` 值的唯一性。\n\n最后一种适合过滤索引的情况是，当需要运行的查询不符合表的正常索引配置文件时。在这种情况下，可能有一个用于一次性报告的查询需要从数据库中检索几千行。与其运行报告并处理可能的聚集索引或堆扫描，不如创建模拟查询谓词的过滤索引。这将允许快速执行查询，而无需花费时间构建包含查询永远不会考虑的值的索引。\n\
  \n在值经常更改的列上实现过滤索引时要小心。SQL Server 将需要在每次更改时重新评估更改后的值，以确定是否应将其添加到过滤索引、从中移除或不做更改。对常见写入操作的性能和负载测试是规避此风险的可靠方法。\n\
  \n正如本节详细阐述的，过滤索引模式在各种情况下都很有用。在为大型表编制索引且通常只需要一小部分数据子集时，请务必考虑它。通常，当发现过滤索引的第一个用途时，还会出现其他用途，并且这些情况将通过前面提到的数据选择和修改来识别，这些操作可以受益于过滤索引的使用。\n\
  \n\n### 外键\n\n最后一个非聚集索引模式是外键模式。这是唯一直接与数据库设计中的对象相关联的模式。外键提供了一种机制，用于将一个表中的值约束为另一个表中的行值。这种关系提供了在大多数数据库部署中至关重要的引用完整性。然而，外键有时会成为数据库中性能问题的根源，而无人意识到它们正在干扰性能。\n\
  \n由于外键对列的可能值提供了约束，因此在需要验证值时会进行一次检查。外键可能涉及两种类型的验证。第一种发生在父表 `dbo.ParentTable` 上，第二种发生在子表\
  \ `dbo.ChildTable` 上（见图 13-41）。每当在 `dbo.ChildTable` 中修改行时，就会在 `dbo.ParentTable`\
  \ 上进行验证。在这些情况下，会通过查找 `dbo.ParentTable` 中的值来验证来自 `dbo.ChildTable` 的 `ParentID` 值。通常，这不会导致性能问题，因为\
  \ `dbo.ParentTable` 中的 `ParentID` 将是表的主键，并且通常是表进行聚集的列。另一种验证发生在 `dbo.ParentTable`\
  \ 被修改时，此时会在 `dbo.ChildTable` 上进行。例如，如果要删除 `dbo.ParentTable` 中的某一行，则需要检查 `dbo.ChildTable`\
  \ 以查看该 `ParentID` 值是否正在该表中使用。这种验证正是需要应用外键模式的地方。\n\n![](img/338675_4_En_13_Fig41_HTML.png)\n\
  \n一幅图示包含两个五列的表格，由一个对角线方向的箭头连接。左侧的表格标签为 d b o 点 parent table, parent i d, name, description,\
  \ 和 create date，右侧的表格标签为 d b o 点 child table, child i d, parent i d, name, 和 description。\n\
  \n图 13-41：外键关系\n\n为了演示外键模式，示例中将需要几个表。清单 13-27 中的代码创建了两个表：`dbo.Customer` 和 `dbo.SalesOrderHeader`。在这两个表之间，在\
  \ `CustomerID` 列上存在外键关系。对于每个 `dbo.SalesOrderHeader` 行，都有一个与该行关联的客户。反之，`dbo.Customer`\
  \ 中的每一行可能与 `dbo.SalesOrderHeader` 中的一个或多个行相关。\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nCREATE TABLE dbo.Customer(\nCustomerID int\n,FillterData char(1000)\n,CONSTRAINT\
  \ PK_Customer_CustomerID PRIMARY KEY CLUSTERED (CustomerID)\n);\nCREATE TABLE dbo.SalesOrderHeader(\n\
  SalesOrderID int\n,OrderDate datetime\n,DueDate datetime\n,CustomerID int\n,FillterData\
  \ char(1000)\n,CONSTRAINT PK_SalesOrderHeader_SalesOrderID\nPRIMARY KEY CLUSTERED\
  \ (SalesOrderID)\n,CONSTRAINT GK_SalesOrderHeader_CustomerID_FROM_Customer\nFOREIGN\
  \ KEY (CustomerID) REFERENCES dbo.Customer(CustomerID)\n);\nINSERT INTO dbo.Customer\
  \ (CustomerID)\nSELECT CustomerID\nFROM Sales.Customer;\nINSERT INTO dbo.SalesOrderHeader\n\
  (SalesOrderID, OrderDate, DueDate, CustomerID)\nSELECT SalesOrderID, OrderDate,\
  \ DueDate, CustomerID\nFROM Sales.SalesOrderHeader;\n```\n\n清单 13-27：外键模式的设置\n\n\
  在此示例中，当 `dbo.Customer` 中的一行被修改时，`dbo.SalesOrderHeader` 中会发生什么？为了演示在 `dbo.Customer`\
  \ 上的操作，清单 13-28 中的脚本在 `CustomerID` 等于 701 的行上执行 `DELETE`。该行在 `dbo.SalesOrderHeader`\
  \ 中应该没有对应的行。即便如此，外键仍要求进行检查以确定 `dbo.SalesOrderHeader` 中是否有使用该 `CustomerID` 的行。如果有，SQL\
  \ Server 将在删除时抛出错误，删除操作将失败。由于 `dbo.SalesOrderHeader` 中没有行，因此可以删除 `dbo.Customer`\
  \ 中的该行。\n\n执行过程指出了删除操作可能存在的几个性能问题。首先，虽然只删除了一行，但总共产生了 4,516 次读取（见图 13-42）。在这些读取中，有\
  \ 3 次发生在 `dbo.Customer` 上，而有 4,513 次发生在 `dbo.SalesOrderHeader` 上。造成这种情况的原因是必须在 `dbo.SalesOrderHeader`\
  \ 上进行 `聚集索引扫描`（如图 13-43 所示）。之所以进行扫描，是因为检查哪些行使用了 `Customer` 等于 701 的唯一方法是扫描表中的所有行。没有索引可以提供更快的路径来验证该值是否被使用。\n\
  \n![](img/338675_4_En_13_Fig43_HTML.png)\n\n一个面板中打开了执行计划选项卡，包含查询 2 的两行文本，占批处理总成本的\
  \ 24%。下方是一个流程图，展示了多条路径：聚集索引删除，customer，占成本 1%；聚集索引扫描，clustered，sales order header，占成本\
  \ 99%；删除占成本 0%。\n\n图 13-43：无索引时外键模式的执行计划\n\n![](img/338675_4_En_13_Fig42_HTML.png)\n\
