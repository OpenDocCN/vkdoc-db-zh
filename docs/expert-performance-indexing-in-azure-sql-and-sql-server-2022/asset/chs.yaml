  \ `char` 和 `nchar`）的字符数据。\n\n![](img/338675_4_En_3_Fig12_HTML.jpg)\n\nD B C C 页面输出的截图。它由\
  \ 5 个数据框组成。1. 显示页面 1:377。2 和 3. 2 个空的缓冲区和页面头部框。4. 字母数字形式的内存转储数据输出。5. 显示一个偏移表，其中行是偏移量。\n\
  \n图 3-12\n\n十六进制数据打印选项的 DBCC PAGE 输出\n\n最初，十六进制数据打印选项可能看起来不如其他打印选项有用，而且在许多情况下确实如此。此打印选项的真正价值在于\
  \ `DBCC PAGE` 不会尝试为您解释页面，它按原样显示页面。使用其他打印选项时，输出有时会重新排序以符合预期的槽位顺序；第 10 章中演示了这样一个例子。\n\
  \n\n#### 行数据打印选项\n\n`DBCC PAGE` 的最后一个打印选项是行数据打印选项，其中 `print_option` 等于 3。此打印选项的输出可能会根据所请求的页面类型而变化。对于大多数页面，返回的基本信息与十六进制行打印选项相同：数据按行以十六进制格式拆分。不过，数据页面和索引页面的输出有所不同。对于这些页面类型，此选项提供了关于页面的一些极其有用的信息。\n\
  \n> **注意**\n> 您可以在 `DBCC PAGE` 中使用 `WITH TABLERESULTS` 选项，将命令的结果输出到结果集而不是消息中。当您想将\
  \ `DBCC` 命令返回的结果插入到表中时，此选项非常有用。\n\n为了展示数据页面和索引页面输出之间的差异，让我们来看另一个示例。此示例将使用在代码清单 3-15\
  \ 中创建的表 `dbo.IndexInternalsFour`。在此打印选项的演示中（如代码清单 3-19 所示），您将对表的数据页面和索引页面之一执行 `DBCC\
