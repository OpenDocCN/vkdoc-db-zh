- fmt: '## Listing 13-12 Script for the GUID Pattern Scenario


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesGUID_ICP (

    RowID int IDENTITY(1,1)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_ICP PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_UniqueID (

    RowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_String (

    RowID varchar(36) DEFAULT(NEWID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_String (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    SELECT OBJECT_NAME(object_ID) as table_name, in_row_used_page_count, in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.IndexStrategiesGUID_ICP'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_UniqueID'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_String''))

    ORDER BY 1

    ```


    Figure [13-14](#338675_4_En_13_Chapter.xhtml#Fig14) shows some output from this
    query.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig14_HTML.jpg)


    A table has 3 columns labeled table name, in row used page count, and in row reserved
    page count and 3 rows labeled 1 to 3. The 3 row entries, namely, index strategies
    G U I D I C P, string, and unique i d, have accompanying 1869 and 1889, 2959 and
    2977, and 2250 and 2273 entries, respectively.


    Figure 13-14


    Page counts for the GUID pattern


    ### Analysis of the GUID Pattern


    Unlike the other scenarios, the use of the GUID pattern is similar to the Identity
    Column pattern. There are two primary differences. First, the GUID pattern does
    not provide a narrow clustering key. For the clustering key with the `uniqueidentifier`
    data type, the change in size of the clustering key requires about 400 more pages
    to store the same information (see Figure [13-14](#338675_4_En_13_Chapter.xhtml#Fig14)).
    Even worse, when improperly storing the GUID in a `varchar` data type, the table
    requires about 1,100 more pages. Without a doubt, using the GUID pattern amounts
    to a lot of wasted space in the clustered index, which would also be included
    in any non-clustered indexes on the table. The second challenge with the GUID
    pattern is tied with the ever-increasing attribute of clustered indexes. GUIDs
    are not presented in an ordered fashion. The next value can be greater or less
    than the previous value, and this leads to a random placement of rows within a
    table, which results in fragmentation. For more information on index fragmentation
    as a result of GUIDs, read Chapter [10](#338675_4_En_10_Chapter.xhtml).


    In regard to the last two attributes of a well-defined clustering key, the GUID
    pattern does well with those. The value is static and should not be expected to
    change over time. The value is also unique. It should, in fact, be unique throughout
    the entire database. Even though the GUID pattern does achieve the two attributes
    of a well-defined clustered index, they do not mitigate the aforementioned issues
    with this pattern. The GUID pattern should be a pattern of last resort when determining
    how to build the clustered index for a table.


    Note


    Using the new `sp_sequence_get_range` stored procedure in conjunction with `SEQUENCE`s
    can be a valid replacement in applications using the `uniqueidentifier` pattern
    that would like to migrate to using an Identity Column pattern for clustered index
    design.


    ## Non-clustered Indexes


    In the previous two sections, the discussion focused on heaps and clustered indexes,
    which are used to determine the primary method for storing data. With heaps, the
    data is stored unsorted. With clustered indexes, data is sorted based on one set
    of columns. In nearly all databases, there will need to be other ways of accessing
    the data in the table that do not align with the sort order in which the data
    is stored. This is where non-clustered indexes come in. Non-clustered indexes
    provide another method for accessing data in addition to the heap or clustered
    index to locate data in a table.


    In this section, a number of patterns that are associated with non-clustered indexes
    will be reviewed. These patterns will help identify when and where to consider
    building non-clustered indexes. For each pattern, the chief components and situations
    where it may be leveraged will be discussed. Similar to the clustered index patterns,
    each non-clustered index pattern will include scenarios to demonstrate the benefit
    of the pattern. The non-clustered index patterns that will be discussed are


    *   Search Columns

    *   Index Intersection

    *   Multiple Column

    *   Covering Index

    *   Included Columns

    *   Filtered Indexes

    *   Foreign Keys


    Before reviewing the patterns, there are a number of guidelines that will apply
    to all non-clustered indexes. These guidelines differ from the attributes of well-defined
    clustered indexes. With those attributes, one of the key goals was to adhere to
    them as much as possible. The non-clustered indexing guidelines form considerations
    that will help strengthen the case for an index but may not disqualify the use
    of the index. Some of the most common considerations to think of when designing
    indexes are the following:


    *   *What is the frequency of change for the non-clustered index key columns?*
    The more frequent the data changes, the more often the row in the non-clustered
    index may need to change its position in the index.

    *   *What frequent queries will the index improve?* The more queries an index
    can cover and the more often they execute, the better the database platform will
    operate as a whole.

    *   *What business needs does the index support?* Infrequently used indexes that
    support critical business operations can sometimes be more important than frequently
    used indexes.

    *   *What is the cost in time to maintain the index vs. the cost in time to query
    the data?* There can be a point where the performance gain from an index is outweighed
    by the time spent creating and defragmenting an index and the space that it requires.


    As mentioned in the introduction, indexing can often feel like art. Fortunately,
    science or statistics can be used to demonstrate the value of indexes. As each
    of these patterns is reviewed, we’ll look at scenarios where they can be applied
    and use some science, or metrics in this case, to determine whether the index
    provides value. The two things that will be used to judge indexes will be reads
    during the execution and complexity of the execution plan.'
