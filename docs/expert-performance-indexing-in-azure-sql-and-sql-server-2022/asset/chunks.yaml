    This can also result in a change in the order of the results, such as when a query
    changes from using a clustered index to a non-clustered index.


    To demonstrate this change in behavior, execute the code in Listing [10-16](#338675_4_En_10_Chapter.xhtml#PC16).
    This code runs two queries. Both queries return `SalesOrderID`, `CustomerID`,
    and `Status`. For the purposes of the example, the business rule dictates that
    the results must be sorted by `SalesOrderID`. In this case, the results from the
    first query are sorted as the business rule states, shown at the top of Figure
    [10-13](#338675_4_En_10_Chapter.xhtml#Fig13). But in the second query, when the
    logic changes to request fewer rows by adding a filter, the results are no longer
    ordered, shown at the bottom of Figure [10-13](#338675_4_En_10_Chapter.xhtml#Fig13).
    The cause of the change comes from a change in the indexes that SQL Server is
    using to execute the query. The change in indexes drives the results to be processed,
    as well as how they are ordered, in the way those indexes sort the data.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig13_HTML.jpg)


    Two tables under the results tab have 3 columns labeled sales order i d, customer
    i d, and status and 10 and 3 observable rows, respectively. The first entries,
    namely, 43659 and 51193, under the first column of the two tables are highlighted.


    Figure 10-13


    Query results demonstrating effect of filtering on order


    ```

    USE AdventureWorks2017

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    WHERE CustomerID IN (11020, 11021, 11022)

    GO

    Listing 10-16

    Unordered Results with a Non-clustered Index

    ```


    In these examples, a handful of scenarios were reviewed in which different SQL
    Server conditions can change how results are returned for a query. While an index
    might provide results from the query in the order desired this time, there is
    no guarantee that this will not change. It is important to not rely on indexes
    to enforce ordering. If order is required for a result set, always use the ORDER
    BY clause to ensure that the correct order is applied to a given result set.'
  trans: '### 误区六：索引总是以相同顺序输出行


    关于索引，一个比较常见的误区是它们保证了查询结果的输出顺序。这是不正确的，更糟糕的是，它为编写不准确的查询提供了无效的依据。正如本书前面所述，索引的目的是为数据提供高效的访问路径。这个目的并不能保证数据返回的顺序。这个误区的麻烦之处在于，在类似条件下执行查询时，SQL
    Server 通常会*看似*维持了顺序，但当这些条件改变时，执行计划就会变化，结果会按照数据处理的顺序返回，而不是最终用户所期望的顺序。


    为了探究这个误区，有必要看看在使用聚集索引的查询上，条件如何变化。在清单 10-15 中，有一个查询被执行了两次，针对 `Sales.SalesOrderHeader`
    和 `Sales.SalesOrderDetail` 表执行一个简单的聚合。这种查询可能会出现在 SQL Server 的多种查询类型中。


    ```sql

    USE AdventureWorks2017

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1000)

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1)

    GO

    ```

    清单 10-15

    使用聚集索引时的无序结果


    这两个查询的执行条件略有不同。第一个查询运行在标准的 SQL Server 成本模型下，生成一个执行计划，执行两次索引扫描和一次流聚合来返回结果，如图 10-9
    所示。该查询的结果如图 10-10 所示，这支持了如果用户希望按 `SaleOrderID` 列排序，SQL Server 就会按期望的输出顺序返回数据的观点。


    ![](img/338675_4_En_10_Fig10_HTML.png)


    一个包含两列（标记为 sales order i d 和 detail rows）和 10 行（标记为 1 到 10）的表格。第一行第一列的条目 43697
    被高亮显示，而第二列的所有条目均为 1。


    图 10-10

    默认聚合执行计划的结果


    ![](img/338675_4_En_10_Fig9_HTML.jpg)


    一个面板，显示查询 1 下与销售订单相关的两行文本项，查询成本相对于批处理为 1%。下方是两个流程图，展示了从成本较高的聚集索引扫描到成本均为 0% 的标记为
    select 的终点的路径。


    图 10-9

    默认聚合执行计划


    但是，如果 SQL Server 的条件发生了变化，而期望的业务规则没有变，会发生什么？在清单 10-15 中执行的第二个查询是同一个查询，但条件发生了变化。在这个例子中，利用
    `DBCC` 命令 `SETCPUWEIGHT` 来改变执行计划的成本。这种成本变化导致使用了并行执行计划，如图 10-11 所示。并行计划的一个副作用是查询结果的返回顺序发生了变化，如图
    10-12 所示。虽然结果看起来仍然是有序的，查询的逻辑也没有改变，但返回的第一条记录是不同的。这是因为其中一个并行线程比其他线程更快地返回了结果。


    ![](img/338675_4_En_10_Fig12_HTML.png)


    一个包含 10 行和两列（标记为 sales order i d 和 detail rows）的表格。第一行第一列的条目 43659 被高亮显示。


    图 10-12

    使用并行的聚合执行计划结果


    ![](img/338675_4_En_10_Fig11_HTML.png)


    一个面板，显示查询 1 下与销售订单相关的两行文本项，查询成本相对于批处理难以辨别。下方是一个流程图，展示了从成本较高的聚集索引扫描到成本为 0% 的标记为
    select 的终点的两条路径。


    图 10-11

    使用并行的聚合执行计划


    **警告**


    切勿在生产代码中使用 `DBCC SETCPUWEIGHT` 来控制并行性或出于任何其他原因。此 `DBCC` 命令仅严格用于在 SQL Server 中控制环境变量以测试和验证执行计划。


    需要考虑的第二个条件是当查询的业务规则发生变化时。例如，也许一组结果最初没有被过滤，但在应用程序更改后，查询可能会改用不同的索引集。这也可能导致结果顺序的变化，例如当查询从使用聚集索引更改为使用非聚集索引时。


    为了演示这种行为变化，请执行清单 10-16 中的代码。此代码运行两个查询。两个查询都返回 `SalesOrderID`、`CustomerID` 和 `Status`。出于本例的目的，业务规则规定结果必须按
    `SalesOrderID` 排序。在这种情况下，第一个查询的结果如业务规则所述进行排序，显示在图 10-13 的顶部。但在第二个查询中，当逻辑更改为通过添加筛选器来请求更少的行时，结果不再有序，显示在图
    10-13 的底部。变化的原因来自于 SQL Server 用于执行查询的索引发生了变化。索引的变化驱动了结果的处理方式，以及它们按照这些索引排序数据的方式进行排序。


    ![](img/338675_4_En_10_Fig13_HTML.jpg)


    “结果”选项卡下的两个表格，分别包含 3 列（标记为 sales order i d, customer i d, 和 status）和可观察到的 10 行与
    3 行。两个表格中第一列的第一条目，即 43659 和 51193，被高亮显示。


    图 10-13

    演示筛选对排序影响的查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    WHERE CustomerID IN (11020, 11021, 11022)

    GO

    ```

    清单 10-16

    使用非聚集索引时的无序结果


    在这些例子中，我们回顾了几种不同的 SQL Server 条件可能改变查询结果返回方式的情景。虽然这次索引可能提供了按期望顺序排列的查询结果，但并不能保证这种情况不会改变。重要的是不要依赖索引来强制排序。如果结果集需要有序，请始终使用
    `ORDER BY` 子句来确保对给定的结果集应用正确的顺序。'
- fmt: '### Myth 7: Fill Factor Is Applied to Indexes During Inserts


    When the fill factor is set on an index, it is applied to the index when the index
    is built, rebuilt, or reorganized. Unfortunately, with this myth, it is often
    believed that the fill factor is applied as records are inserted into a table.
    In this section, this myth will be investigated to see that it is not correct.


    To begin pulling this myth apart, its premise will be directly tested. In the
    myth, the thought is that if a fill factor has been specified when rows are added
    to a table, the fill factor is used during the inserts. To dispel this portion
    of the myth, execute the code in Listing 10-17. In this script, the table `dbo.MythSeven`
    is created with a clustered index that has a 50 percent fill factor. That means
    that 50 percent of every page in the index should be left empty. With the table
    built, records will be inserted into the table. Finally, the average amount of
    space available on each page will be checked using the `sys.dm_db_index_physical_stats`
    DMV. Looking at the results of the script, as shown in Figure 10-14, the index
    is using 95 percent of every page vs. the 50 percent that was specified in the
    creation of the clustered index.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythSeven'') IS NOT NULL

    DROP TABLE dbo.MythSeven;

    GO

    CREATE TABLE dbo.MythSeven

    (

    RowID int NOT NULL

    ,Column1 varchar(500)

    );

    GO

    ALTER TABLE dbo.MythSeven ADD CONSTRAINT

    PK_MythSeven PRIMARY KEY CLUSTERED (RowID) WITH(FILLFACTOR = 50);

    GO

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythSeven

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, REPLICATE(''X'', 500)

    FROM L6;

    GO

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0;

    ```

    Listing 10-17: Create and Populate the MythSeven Table


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig14_HTML.png)

    Figure 10-14: Fill factor myth on inserts


    Sometimes when this myth is dispelled, the belief is reversed, and it is believed
    that the fill factor is broken or doesn’t work. This is also incorrect. The fill
    factor isn’t applied to indexes during data modifications. It is applied when
    the index is rebuilt, reorganized, or created. To demonstrate this, the clustered
    index on `dbo.MythSeven` can be rebuilt with the script included in Listing 10-18.


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX PK_MythSeven ON dbo.MythSeven REBUILD

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0

    ```

    Listing 10-18: Rebuild the Clustered Index on the MythSeven Table


    After the clustered index is rebuilt, the index will have the specified fill factor,
    or at least close to the value specified, as shown in Figure 10-15. The average
    space used on the table, after the rebuild, changed from 95 to 51 percent. This
    change is in alignment with the fill factor that was specified for the index.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig15_HTML.png)

    Figure 10-15: Fill factor myth after index rebuild


    When it comes to the fill factor, there are a number of myths surrounding the
    index property. The key to understanding the fill factor is to remember when and
    how it is applied. It is not a property enforced on an index as it is used. It
    is, instead, a property used to distribute data within an index when it is created
    or rebuilt.'
  raw: '### Myth 7: Fill Factor Is Applied to Indexes During Inserts


    When the fill factor is set on an index, it is applied to the index when the index
    is built, rebuilt, or reorganized. Unfortunately, with this myth, it is often
    believed that the fill factor is applied as records are inserted into a table.
    In this section, this myth will be investigated to see that it is not correct.


    To begin pulling this myth apart, its premise will be directly tested. In the
    myth, the thought is that if a fill factor has been specified when rows are added
    to a table, the fill factor is used during the inserts. To dispel this portion
    of the myth, execute the code in Listing [10-17](#338675_4_En_10_Chapter.xhtml#PC17).
    In this script, the table `dbo.MythSeven` is created with a clustered index that
    has a 50 percent fill factor. That means that 50 percent of every page in the
