- fmt: '# 12. Indexing Tools


    ## Summary


    In this chapter, a variety of maintenance considerations were introduced that
    impact table indexing and are important to ensuring optimal query performance.
    These break down to managing the fragmentation of indexes and managing their statistics.
    For index fragmentation, the ways in which indexes can become fragmented were
    discussed, as well as why it is an issue and strategies to remove the fragmentation.
    These maintenance tasks are critical for making certain that SQL Server can use
    indexes to the best of its ability. Along with maintenance activity, statistics
    on indexes must also be maintained. Out-of-date or inaccurate statistics can lead
    to execution plans that do not match the data in the table. Without proper execution
    plans, performance will suffer regardless of the indexes in place.


    ### DDL Command


    The other option for updating statistics is through the DDL command `UPDATE STATISTICS`,
    shown in Listing [11-33](#338675_4_En_11_Chapter.xhtml#PC33). The `UPDATE STATISTICS`
    statement allows for finely tuned statistics updates on a per-statistics basis
    with a number of options for how to collect and build statistics information.


    ```sql

    UPDATE STATISTICS table_or_indexed_view_name

    [

    {

    { index_or_statistics_name }

    | ( { index_or_statistics_name } [ ,...n ] )

    }

    ]

    [    WITH

    [

    FULLSCAN

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | SAMPLE number { PERCENT | ROWS }

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | RESAMPLE

    [ ON PARTITIONS ( { <partition_number> | <range> } [, ...n] ) ] ]

    [ [ , ] [ ALL | COLUMNS | INDEX ]

    [ [ , ] NORECOMPUTE ]

    [ [ , ] INCREMENTAL = { ON | OFF } ]

    [ [ , ] MAXDOP = max_degree_of_parallelism ]

    ] ;

    ```


    Listing 11-33. `UPDATE STATISTICS` Syntax


    The first parameter to set when using `UPDATE STATISTICS` is `table_or_indexed_view_name`.
    This parameter references the table in which the statistics will be updated. With
    the `UPDATE STATISTICS` command, only one table or view can have its statistics
    updated at a time.


    The next parameter is `index_or_statistics_name`. This parameter is used to determine
    whether a single statistic, list of statistics, or all statistics on a table will
    be updated. To update a single statistic, include the name of the statistics object
    after the name of the table or view. For a list of statistics objects, the names
    of the statistics are included in a comma-separated list within parentheses. If
    no statistics are named, then all statistics will be considered for updating.


    After the parameters are set, the applicable options need to be added to the `UPDATE
    STATISTICS` command. This is where the power and flexibility of this syntax really
    shines. These parameters allow statistics to be finely tuned to the data available
    in them to get the right statistics for the right table and the right index:


    *   `FULLSCAN`: When the statistics object is built, all rows and pages in the
    table or view are scanned. For large tables, this will have an impact on performance
    while creating the statistics object. This is the same as performing a `SAMPLE
    100 PERCENT` operation.

    *   `SAMPLE`: The statistics object is created using either a count or a percentage
    sample of the rows in the table or view. When the sample rate is not selected,
    SQL Server will determine an appropriate sample rate based on the number of rows
    in the table.

    *   `RESAMPLE`: Updates the statistics using the sample rate from the last time
    that the statistics were updated. For instance, if that last update used a `FULLSCAN`,
    then a `RESAMPLE` will result in a `FULLSCAN` as well.

    *   `PERSIST_SAMPLE_PERCENT`: Determines whether the defined sample rate should
    be persisted into the statistics as their future default value for when default
    values are not specified.

    *   `ALL | COLUMNS | INDEX`: Determines whether column statistics, index statistics,
    or both should be updated.

    *   `NORECOMPUTE`: Disables the option for the query optimizer to request an automatic
    update to the statistics. This is useful for locking in statistics that shouldn’t
    change or are optimal with the current sample. Take caution when using this on
    tables that have frequent data modifications and make certain there are other
    mechanisms in place to update statistics if needed.

    *   `INCREMENTAL`: When enabled, statistics are created as per-partition statistics,
    which allows statistics to be updated per partition using the `ON PARTITIONS`
    clause.

    *   `MAXDOP`: Determines the max degree of parallelism for the statistics update
    operation and overrides the max degree of parallelism configuration for the server.


    The first three options in this list are mutually exclusive. Only one of the options
    may be chosen. Selecting more than one of those options will generate an error.


    Since `UPDATE STATISTICS` is a DDL command, it can easily be automated similar
    to how index defragmentation can be automated. For brevity, a sample script is
    not included, but the template for the index fragmentation maintenance could be
    used as a starting point. `sp_updatestats` uses `UPDATE STATISTICS` under the
    covers. This DDL command is a powerful way to update statistics as needed in your
    databases without doing more than is necessary. To continue the analogy from the
    previous section, using `UPDATE STATISTICS` replaces the blanket and comforter
    with a handmade, fitted sweater.


    With respect to indexing, Microsoft has two tools built into SQL Server that can
    be used to help identify indexes that can improve database performance. These
    are the missing index dynamic management objects (DMOs) and the Database Engine
    Tuning Advisor (DTA). Both tools are useful to assist with indexing databases
    and can provide valuable input when working on tuning a database.


    In addition, Azure SQL Database contains a feature called Automatic Index Management.
    This feature automatically creates and drops indexes based on usage and is intended
    for environments where there are no developers or administrators available to
    monitor and manage indexing.


    This chapter delves into these tools, describing how to use them and the benefits
    of each. The chapter is divided into two sections that each describe the capabilities
    of each tool, as well as a brief discussion of Automatic Index Management.'
  raw: '##### DDL Command


    The other option for updating statistics is through the DDL command `UPDATE STATISTICS`,
    shown in Listing [11-33](#338675_4_En_11_Chapter.xhtml#PC33). The `UPDATE STATISTICS`
    statement allows for finely tuned statistics updates on a per-statistics basis
    with a number of options for how to collect and build statistics information.


    ```

    UPDATE STATISTICS table_or_indexed_view_name

    [

    {

    { index_or_statistics_name }

    | ( { index_or_statistics_name } [ ,...n ] )

    }

    ]

    [    WITH

    [

    FULLSCAN

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | SAMPLE number { PERCENT | ROWS }

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | RESAMPLE

    [ ON PARTITIONS ( {  |  } [, ...n] ) ] ]

    [ [ , ] [ ALL | COLUMNS | INDEX ]

    [ [ , ] NORECOMPUTE ]

    [ [ , ] INCREMENTAL = { ON | OFF } ]

    [ [ , ] MAXDOP = max_degree_of_parallelism ]

    ] ;

    Listing 11-33

    UPDATE STATISTICS Syntax

    ```


    The first parameter to set when using `UPDATE STATISTICS` is *table_or_indexed_view_name*.
    This parameter references the table in which the statistics will be updated. With
    the `UPDATE STATISTICS` command, only one table or view can have its statistics
    updated at a time.


    The next parameter is *index_or_statistics_name*. This parameter is used to determine
    whether a single statistic, list of statistics, or all statistics on a table will
    be updated. To update a single statistic, include the name of the statistics object
    after the name of the table or view. For a list of statistics objects, the names
    of the statistics are included in a comma-separated list within parentheses. If
    no statistics are named, then all statistics will be considered for updating.


    After the parameters are set, the applicable options need to be added to the `UPDATE
    STATISTICS` command. This is where the power and flexibility of this syntax really
    shines. These parameters allow statistics to be finely tuned to the data available
    in them to get the right statistics for the right table and the right index:


    *   `FULLSCAN`: When the statistics object is built, all rows and pages in the
    table or view are scanned. For large tables, this will have an impact on performance
    while creating the statistics object. This is the same as performing a `SAMPLE
    100 PERCENT` operation.


    *   `SAMPLE`: The statistics object is created using either a count or a percentage
    sample of the rows in the table or view. When the sample rate is not selected,
    SQL Server will determine an appropriate sample rate based on the number of rows
    in the table.


    *   `RESAMPLE`: Updates the statistics using the sample rate from the last time
    that the statistics were updated. For instance, if that last update used a `FULLSCAN`,
    then a `RESAMPLE` will result in a `FULLSCAN` as well.


    *   `PERSIST_SAMPLE_PERCENT`: Determines whether the defined sample rate should
    be persisted into the statistics as their future default value for when default
    values are not specified.


    *   `ALL | COLUMNS | INDEX`: Determines whether column statistics, index statistics,
    or both should be updated.


    *   `NORECOMPUTE`: Disables the option for the query optimizer to request an automatic
    update to the statistics. This is useful for locking in statistics that shouldn’t
    change or are optimal with the current sample. Take caution when using this on
    tables that have frequent data modifications and make certain there are other
    mechanisms in place to update statistics if needed.


    *   `INCREMENTAL`: When enabled, statistics are created as per-partition statistics,
    which allows statistics to be updated per partition using the `ON PARTITIONS`
    clause.


    *   `MAXDOP`: Determines the max degree of parallelism for the statistics update
    operation and overrides the max degree of parallelism configuration for the server.


    The first three options in this list are mutually exclusive. Only one of the options
    may be chosen. Selecting more than one of those options will generate an error.


    Since `UPDATE STATISTICS` is a DDL command, it can easily be automated similar
    to how index defragmentation can be automated. For brevity, a sample script is
    not included, but the template for the index fragmentation maintenance could be
    used as a starting point. `sp_updatestats` uses `UPDATE STATISTICS` under the
    covers. This DDL command is a powerful way to update statistics as needed in your
    databases without doing more than is necessary. To continue the analogy from the
    previous section, using `UPDATE STATISTICS` replaces the blanket and comforter
    with a handmade, fitted sweater.


    ## Summary


    In this chapter, a variety of maintenance considerations were introduced that
    impact table indexing and are important to ensuring optimal query performance.
    These break down to managing the fragmentation of indexes and managing their statistics.
    For index fragmentation, the ways in which indexes can become fragmented were
    discussed, as well as why it is an issue and strategies to remove the fragmentation.
    These maintenance tasks are critical for making certain that SQL Server can use
    indexes to the best of its ability. Along with maintenance activity, statistics
    on indexes must also be maintained. Out-of-date or inaccurate statistics can lead
    to execution plans that do not match the data in the table. Without proper execution
    plans, performance will suffer regardless of the indexes in place.


    # 12. Indexing Tools


    With respect to indexing, Microsoft has two tools built into SQL Server that can
    be used to help identify indexes that can improve database performance. These
    are the missing index dynamic management objects (DMOs) and the Database Engine
    Tuning Advisor (DTA). Both tools are useful to assist with indexing databases
    and can provide valuable input when working on tuning a database.


    In addition, Azure SQL Database contains a feature called Automatic Index Management.
    This feature automatically creates and drops indexes based on usage and is intended
    for environments where there are no developers or administrators available to
    monitor and manage indexing.


    This chapter delves into these tools, describing how to use them and the benefits
    of each. The chapter is divided into two sections that each describe the capabilities
    of each tool, as well as a brief discussion of Automatic Index Management.'
  trans: '# 12. 索引工具


    ## 概要


    本章介绍了多种影响表索引的维护考量因素，这些因素对于确保最佳查询性能至关重要。它们可归结为管理索引碎片和管理其统计数据。对于索引碎片，讨论了索引可能碎片化的方式、其成为问题的原因以及消除碎片的策略。这些维护任务对于确保
    SQL Server 能够最大限度地利用索引至关重要。除了维护活动外，索引的统计数据也必须得到维护。过时或不准确的统计数据可能导致执行计划与表中的数据不匹配。如果没有正确的执行计划，无论索引是否存在，性能都会受到影响。


    ### DDL 命令


    更新统计信息的另一个选项是通过 DDL 命令 `UPDATE STATISTICS`，如清单 11-33 所示。`UPDATE STATISTICS` 语句允许对每个统计信息进行精细调整的更新，并提供了多种用于收集和构建统计信息的选项。


    ```sql

    UPDATE STATISTICS table_or_indexed_view_name

    [

    {

    { index_or_statistics_name }

    | ( { index_or_statistics_name } [ ,...n ] )

    }

    ]

    [    WITH

    [

    FULLSCAN

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | SAMPLE number { PERCENT | ROWS }

    [ [ , ] PERSIST_SAMPLE_PERCENT = { ON | OFF } ]

    | RESAMPLE

    [ ON PARTITIONS ( { <partition_number> | <range> } [, ...n] ) ] ]

    [ [ , ] [ ALL | COLUMNS | INDEX ]

    [ [ , ] NORECOMPUTE ]

    [ [ , ] INCREMENTAL = { ON | OFF } ]

    [ [ , ] MAXDOP = max_degree_of_parallelism ]

    ] ;

    ```


    清单 11-33. `UPDATE STATISTICS` 语法


    使用 `UPDATE STATISTICS` 时，第一个设置的参数是 `table_or_indexed_view_name`。此参数引用将要更新统计信息的表。使用
    `UPDATE STATISTICS` 命令，一次只能更新一个表或视图的统计信息。


    下一个参数是 `index_or_statistics_name`。此参数用于确定是更新单个统计信息、统计信息列表还是表上的所有统计信息。要更新单个统计信息，请在表名或视图名后包含统计信息对象的名称。对于统计信息列表，统计信息名称应包含在括号内的逗号分隔列表中。如果未指定任何统计信息，则将考虑更新所有统计信息。


    设置好参数后，需要将相应的选项添加到 `UPDATE STATISTICS` 命令中。这正是此语法强大和灵活之处所在。这些参数允许根据统计信息中的可用数据对其进行精细调整，以便为正确的表和正确的索引获取合适的统计信息：


    *   `FULLSCAN`：构建统计信息对象时，扫描表或视图中的所有行和页。对于大型表，在创建统计信息对象时会影响性能。这等同于执行 `SAMPLE 100
    PERCENT` 操作。

    *   `SAMPLE`：使用表或视图中行的计数或百分比样本来创建统计信息对象。如果未选择采样率，SQL Server 将根据表中的行数确定合适的采样率。

    *   `RESAMPLE`：使用上次更新统计信息时的采样率进行更新。例如，如果上次更新使用了 `FULLSCAN`，那么 `RESAMPLE` 也将导致
    `FULLSCAN`。

    *   `PERSIST_SAMPLE_PERCENT`：确定定义的采样率是否应持久化到统计信息中，作为未来未指定默认值时的默认值。

    *   `ALL | COLUMNS | INDEX`：确定应更新列统计信息、索引统计信息还是两者都更新。

    *   `NORECOMPUTE`：禁用查询优化器请求自动更新统计信息的选项。这对于锁定不应更改或使用当前采样率是最优的统计信息非常有用。在频繁修改数据的表上使用此选项时需谨慎，并确保有其他机制在需要时更新统计信息。

    *   `INCREMENTAL`：启用时，统计信息将创建为按分区统计信息，这允许使用 `ON PARTITIONS` 子句按分区更新统计信息。

    *   `MAXDOP`：确定统计信息更新操作的最大并行度，并覆盖服务器的最大并行度配置。


    此列表中的前三个选项是互斥的。只能选择其中一个选项。选择多个选项将产生错误。


    由于 `UPDATE STATISTICS` 是 DDL 命令，它可以很容易地实现自动化，类似于索引碎片整理的自动化。为简洁起见，未包含示例脚本，但可以以索引碎片维护模板为起点。`sp_updatestats`
    在底层使用了 `UPDATE STATISTICS`。这个 DDL 命令是一种强大的方式，可以按需更新数据库中的统计信息，而无需执行超出必要的操作。延续上一节的类比，使用
    `UPDATE STATISTICS` 相当于用一件手工定制的、合身的毛衣替代了通用的毯子和被子。


    关于索引，Microsoft 在 SQL Server 中内置了两个工具，可用于帮助识别可以改善数据库性能的索引。它们是缺失索引动态管理对象（DMO）和数据库引擎优化顾问（DTA）。这两个工具都有助于索引数据库，并且在调整数据库时可以提供有价值的输入。


    此外，Azure SQL Database 包含一个名为“自动索引管理”的功能。此功能根据使用情况自动创建和删除索引，旨在用于没有开发人员或管理员可用以监视和管理索引的环境。


    本章深入探讨了这些工具，描述了如何使用它们以及各自的优点。本章分为两节，分别描述每个工具的功能，并简要讨论自动索引管理。'
- fmt: '## Missing Indexes


    The missing index DMOs are a set of management objects that provide indexing feedback
    from the query optimizer. When the query optimizer compiles an execution plan,
    it can identify when materializing statistics for a set of columns into a physical
    index would improve performance. In these situations, the query optimizer will
    compile the results and store the information in the missing index DMOs.


    There are a couple of benefits that the missing index DMOs provide. First, the
    missing index information is collected from the query optimizer without any action
    required on your part. Unlike `Extended Events` and other performance monitoring
    tools, there is no need to configure and enable it for information to be collected.
    The other consideration is that the missing index information is based on actual
    activity occurring on the SQL Server instance. The index suggestions are not based
    on a test load you believe might happen in production but rather on the production
    load itself. As the usage patterns of the data in a database change, so too will
    the missing index recommendations.


    Despite the benefits provided by the missing index DMOs, it is important take
    into account a few considerations when using them. The limitations on the missing
    index DMOs can be summarized into the following categories:


    *   Size of queue


    *   Depth of analysis


    *   Accuracy


    *   Type of indexes


    The size of the queue for missing indexes is one of the limitations that is easy
    to miss. Regardless of the number of databases on the SQL Server instance, there
    can be no more than 600 missing index groups. Once 600 missing index groups have
    been identified, the query optimizer will stop reporting new missing index suggestions.
    It will not make any determinations to decide whether a new possible missing index
    is of better quality than items already reported; the information is simply not
    collected. When this occurs, Microsoft recommends addressing existing index recommendations
    in order to help alleviate this limitation.


    Note


    As with other dynamic management objects, the information within the missing index
    DMOs resets when SQL Server restarts and gets dropped for a database whenever
    the database is brought offline.


    When considering the information in missing indexes, the depth of the analysis
    is a limitation that needs to be considered whenever reviewing the suggestions.
    The query optimizer considers only the current plan and whether the missing index
    would benefit the execution plan. Sometimes, adding the missing index to the database
    will result in a new plan with a new missing index suggestion. These suggestions
    are only a first pass at improving performance on an execution plan. The other
    half of this limitation is that the missing index details don’t include tests
    to determine whether the order of the columns in the missing index suggestion
    is optimal. When looking at missing index suggestions, it will be necessary to
    test to determine the proper column order.


    The third limitation of the missing index suggestion is the accuracy of the information
    returned with the statistics. There are two things that need to be considered
    with this limitation. When queries use inequality predicates, the cost information
    is less effective than those returned with equality predicates. Also, it is possible
    to return the same missing index suggestion with multiple cost estimates. How
    and where the missing index would be leveraged may change the cost estimate that
    is calculated. For each cost estimate, a missing index suggestion will be logged.


    Lastly, the missing index tool is limited in the types of indexes it can suggest.
    The main limitation is index types and the inability of missing indexes to suggest
    clustered, XML, spatial, or columnstore indexes. The suggestions also will not
    include information on when to make an index filtered. Along these same lines,
    suggestions may, at times, contain only `INCLUDED` columns. When this happens,
    one of the `INCLUDED` columns will need to be designated as the key column.


    Note


    Missing index information for a table will be dropped whenever there are metadata
    operations made on the table. For instance, when a column is added to a table,
    the missing index information will be dropped. A less obvious example is when
    an index on a table changes. In this case as well, the missing index information
    will be dropped.


    As mentioned at other times in this book, it is always important to carefully
    weigh whether a new index is valuable enough to warrant its creation. Following
    every index recommendation in these DMOs would quickly result in over-indexed
    tables. Keep this in mind as these DMOs are introduced as it helps highlight the
    fact that not all indexes are created equal. Some can provide exceptional value,
    whereas others may incur more cost to maintain than the value they offer.


    ### Explaining the DMOs


    There are four DMOs that can be used to return information on missing indexes.
    Each DMO provides a portion of the information needed to build indexes that the
    query optimizer can use to improve the performance of a query. The DMOs for missing
    indexes are as follows:


    *   `sys.dm_db_missing_index_details`


    *   `sys.dm_db_missing_index_columns`


    *   `sys.dm_db_missing_index_group_stats`


    *   `sys.dm_db_missing_index_groups`


    In the next four sections, each of the dynamic management objects will be reviewed
    alongside details to how each provides information on how to identify missing
    indexes.'
