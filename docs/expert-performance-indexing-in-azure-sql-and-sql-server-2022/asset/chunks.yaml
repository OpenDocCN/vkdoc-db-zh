    GO

    CREATE INDEX IX_Contacts_CertificationDate ON dbo.Contacts(CertificationDate)

    INCLUDE (FirstName, LastName)

    WHERE CertificationDate IS NOT NULL;

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    SET STATISTICS IO OFF;

    SELECT OBJECT_NAME(object_id) as table_name

    ,CASE index_id

    WHEN INDEXPROPERTY(object_id , ''IX_Contacts_CertificationDate'', ''IndexID'')
    THEN ''Filtered Index''

    WHEN 1 THEN ''Clustered Index''

    ELSE ''Other Indexes'' END As index_type

    ,index_id

    ,in_row_data_page_count

    ,in_row_reserved_page_count

    ,in_row_used_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = OBJECT_ID(''dbo.Contacts'');

    ```

    清单 13-26 过滤索引模式


    仅将表中行的一个子集包含在索引中具有许多优势。一个优势是，由于索引更小，索引中的页更少，这直接转化为数据库的存储需求更低。类似地，如果索引中的页更少，则索引碎片的机会更少，维护索引所需的工作量也更小。过滤索引的最后一个优势与性能和计划质量有关。由于过滤索引中的值是有限的，索引的统计信息也是有限的。由于在过滤索引中需要遍历的页更少，对过滤索引的扫描几乎总是比对聚集索引或堆的扫描性能问题更小。


    在创建索引时，有几种情况可以并且应该使用过滤索引模式。第一种情况是当需要在配置为稀疏的列上创建索引时。在这种情况下，预期将具有该值的行数与总行数相比会很小。使用稀疏列的好处之一是避免了在这些列中存储
    `NULL` 值所带来的存储成本。通过使用过滤索引，确保这些列上的索引不存储 `NULL` 值。第二种情况是当需要在可以包含多个 `NULL` 值的列上强制唯一性时。创建一个键列不为
    `NULL` 的唯一过滤索引，将绕过唯一性限制（该限制只允许列中存在单个 `NULL` 值）。如果一个列包含社会安全号码，有时可能包含 `NULL`，但当不为
    `NULL` 时应始终唯一，则可以创建一个唯一过滤索引来强制非 `NULL` 值的唯一性。


    最后一种适合过滤索引的情况是，当需要运行的查询不符合表的正常索引配置文件时。在这种情况下，可能有一个用于一次性报告的查询需要从数据库中检索几千行。与其运行报告并处理可能的聚集索引或堆扫描，不如创建模拟查询谓词的过滤索引。这将允许快速执行查询，而无需花费时间构建包含查询永远不会考虑的值的索引。


    在值经常更改的列上实现过滤索引时要小心。SQL Server 将需要在每次更改时重新评估更改后的值，以确定是否应将其添加到过滤索引、从中移除或不做更改。对常见写入操作的性能和负载测试是规避此风险的可靠方法。


    正如本节详细阐述的，过滤索引模式在各种情况下都很有用。在为大型表编制索引且通常只需要一小部分数据子集时，请务必考虑它。通常，当发现过滤索引的第一个用途时，还会出现其他用途，并且这些情况将通过前面提到的数据选择和修改来识别，这些操作可以受益于过滤索引的使用。'
  raw: 'Before applying the missing index suggestion, consider how the index will
    be used in this and future queries. In this scenario, assume that there will never
    be a query that uses `CertificationDate` when the value is `NULL`. Does it make
    sense then to store the empty values for all the `NULL` rows in the index? Given
    the stated assumption, it doesn’t make sense; doing so would waste space in the
    database and potentially lead to execution plans that were not optimal if the
    index on `CertificationDate` was skipped because the reads for a scan were high
    enough that other indexes were selected.


    In this scenario, it makes sense to filter the rows in the index. To do so, the
    index is created like any other index, except that a `WHERE` clause is added to
    its index creation statement (see Listing [13-26](#338675_4_En_13_Chapter.xhtml#PC26)).
    When creating filtered indexes, there are a few things to keep in mind about the
    `WHERE` clause. To start with, the `WHERE` clause must be deterministic. It cannot
    change over time depending on the results of functions within the clause. For
    instance, the `GETDATE()` function can’t be used since the value returned changes
    every millisecond. The second restriction is that only simple comparison logic
    is allowed. This means that the `BETWEEN` and `LIKE` comparisons can’t be used.
    For more information on the restrictions and limitations with filtered indexes,
    refer to Chapter [2](#338675_4_En_2_Chapter.xhtml).


    Executing the `CertificationDate` queries from Listing [13-26](#338675_4_En_13_Chapter.xhtml#PC26)
    shows that the filtered index provides a significant impact on the performance
    for the query. Regarding the reads incurred, there are now only 2 reads as opposed
    to the 2,866 reads before the index was applied (see Figure [13-38](#338675_4_En_13_Chapter.xhtml#Fig38)).
    Also, the execution plans now use index seeks for both queries instead of the
    clustered index scans, as shown in Figure [13-39](#338675_4_En_13_Chapter.xhtml#Fig39).
    While these results are to be expected, the other consideration with the index
    is that the new index is comprised of only two pages. As seen in Figure [13-40](#338675_4_En_13_Chapter.xhtml#Fig40),
    the number of pages required for the entire index is substantially less than the
    clustered index and the other non-clustered indexes.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig40_HTML.png)


    A table has 6 columns labeled table name, index type, index i d, in row data page
    count, in row reserved page count, and in row used page count and 4 rows labeled
    1 to 4\. Clustered indexes have the highest page counts followed by other indexes,
    other indexes, and filtered index.


    Figure 13-40


    Page count comparison for the filtered index


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig39_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text each for
    queries 1 and 2 with 11% cost each relative to the batch. Each has a flow diagram
    exhibiting the connection from index scan, nonclustered, contacts, at 100% cost
    each to select at 0% cost.


    Figure 13-39


    Execution plans for the Filtered Indexes pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig38_HTML.png)


    A panel with an opened messages tab with 2 lines of entries for contacts tables
    with the same scan count at 1, logical reads at 2, physical reads at 0, read-ahead
    reads at 0, l o b logical reads at 0, and l o b physical reads at 0 under the
    10 rows affected label with various numbered row affected labels in between.


    Figure 13-38


    Statistics I/O results for the Filtered Indexes pattern


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_CertificationDate ON dbo.Contacts(CertificationDate)

    INCLUDE (FirstName, LastName)

    WHERE CertificationDate IS NOT NULL;

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate IS NOT NULL

    ORDER BY CertificationDate;

    SELECT ContactID,

    FirstName,

    LastName,

    CertificationDate

    FROM dbo.Contacts

    WHERE CertificationDate

    BETWEEN ''20110101'' AND ''20110201''

    ORDER BY CertificationDate;

    SET STATISTICS IO OFF;

    SELECT OBJECT_NAME(object_id) as table_name

    ,CASE index_id

    WHEN INDEXPROPERTY(object_id , ''IX_Contacts_CertificationDate'', ''IndexID'')
    THEN ''Filtered Index''

    WHEN 1 THEN ''Clustered Index''

    ELSE ''Other Indexes'' END As index_type

    ,index_id

    ,in_row_data_page_count

    ,in_row_reserved_page_count

    ,in_row_used_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id = OBJECT_ID(''dbo.Contacts'');

    Listing 13-26

    Filtered Indexes Pattern

    ```


    Including only a subset of the rows in a table within an index has a number of
    advantages. One advantage is that since the index is smaller, there are fewer
    pages in the index, which translates directly to lower storage requirements for
    the database. Similarly, if there are fewer pages in the index, there are fewer
    opportunities for index fragmentation and less effort required to maintain the
    index. The final advantage of filtered indexes relates to performance and plan
    quality. Since the values in the filtered index are limited, the statistics for
    the index are limited as well. Since there are fewer pages to traverse in the
    filtered index, a scan against a filtered index is almost always less of a performance
    issue than a scan on a clustered index or heap.


    There are a few situations where using the Filtered Indexes pattern can and should
    be used when creating indexes. The first situation is when an index is needed
    on a column that is configured as sparse. In this case, the expected number of
    rows that will have the value will be small compared with the total number of
    rows. One of the benefits of using sparse columns is avoiding the storage costs
    associated with storing `NULL` values in these columns. Make certain that the
    indexes on these columns don’t store the `NULL` values by using filtered indexes.
    The second situation is when uniqueness needs to be enforced on a column that
    can have multiple `NULL` values in it. Creating the filtered index as unique where
    the key columns are not `NULL` will bypass the restrictions on uniqueness that
    allow only a single `NULL` value in the columns. If a column contained Social
    Security Numbers that can sometimes contain NULL, but should always be unique
    when NOT NULL, a unique filtered index could enforce uniqueness on the non-NULL
    values.


    The last situation that is a good fit for filtered indexes is when queries need
    to be run that don’t fit the normal index profile for a table. In this case, there
    might be a query for a one-off report that needs to retrieve a few thousand rows
    from the database. Instead of running the report and dealing with the potential
    scan of the clustered index or heap, create filtered indexes that mimic the predicates
    of the query. This will allow the query to be quickly executed, without having
    to spend the time building indexes that contain values the query would never have
    considered.


    Use caution when implementing filtered indexes on columns where their values change
    often. SQL Server will need to re-evaluate changed values each time they change
    to determine if they should be added to the filtered index, removed, or no change
    made. Performance and load testing of common write operations is a reliable way
    to offset this risk.


    As this section has detailed, the Filtered Indexes pattern is one that can be
    useful in a variety of situations. Be sure to consider it when indexing a large
    table where only a small subset of data is routinely needed. Often, when the first
    use for a filtered index is found, there are others that start appearing, and
    these situations will be identified with selecting and modifying data, as earlier,
    that can benefit from its use.'
