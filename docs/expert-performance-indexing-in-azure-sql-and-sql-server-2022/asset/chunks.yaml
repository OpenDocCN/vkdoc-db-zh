- fmt: '### Header Columns


    For every row that is returned through the DMF, there will be a `database_id`,
    `object_id`, `index_id`, and `partition_number`. These columns are defined further
    in Table [5-12](#338675_4_En_5_Chapter.xhtml#Tab12). As is implied through the
    `partition_number`, the granularity of the results for this DMF is at the partition
    level. For nonpartitioned indexes, the partition number will be 1.


    Table 5-12


    Header Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database on which the table or view is
    defined |

    | `object_id` | `int` | ID of the table or view on which the index is defined
    |

    | `index_id` | `int` | ID of the index |

    | `partition_number` | `int` | 1-based partition number within the index or heap
    |

    | `hobt_id` | `bigint` | ID used to identify the heap or B-tree (hobt) associated
    with an index partition.  New as of SQL Server 2016 |


    The header columns provide the basis for understanding which indexes the statistics
    apply to. This will help provide perspective regarding the information that is
    returned. Also, they can be used to join to catalog views, such as `sys.indexes`,
    to provide the names of the indexes.


    The useful information in this DMF comes in the rest of the columns returned by
    the function. The information that can be returned provides insight into DML activity,
    the page allocation cycle, data access patterns, index contention, and disk activity.
    In the following sections, each column returned by the DMF will be reviewed, as
    well as how they provide insight into index usage.


    ### DML Activity


    Understanding DML activity on an index is an ideal place to begin analysis of
    index usage statistics. Table [5-13](#338675_4_En_5_Chapter.xhtml#Tab13) lists
    the columns that represent this activity. They provide a count of the number of
    rows that are affected by DML operations. The statistics that follow are similar
    to those in `sys.dm_db_index_usage_stats`, but with a few differences in perspective
    that will be discussed next.


    Table 5-13


    DML Activity Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_insert_count` | `bigint` | Cumulative count of leaf-level rows inserted.
    |

    | `leaf_delete_count` | `bigint` | Cumulative count of leaf-level rows deleted.
    |

    | `leaf_update_count` | `bigint` | Cumulative count of leaf-level rows updated.
    |

    | `leaf_ghost_count` | `bigint` | Cumulative count of leaf-level rows that are
    marked to be deleted but not yet removed. |

    | `nonleaf_insert_count` | `bigint` | Cumulative count of inserts above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_delete_count` | `bigint` | Cumulative count of deletes above the leaf
    level. For heaps, this value will always be `0`. |

    | `nonleaf_update_count` | `bigint` | Cumulative count of updates above the leaf
    level. For heaps, this value will always be `0`. |


    Within `sys.dm_db_index_operational_stats`, there are two areas where DML activity
    can be tracked: the leaf and nonleaf levels. For more information on DML activity
    on leaf and nonleaf pages, see Chapter [4](#338675_4_En_4_Chapter.xhtml).


    The difference between these two types of data changes is important to identifying
    whether index changes occurred directly via DML activity or as the result of internal
    indexing changes. Nonleaf-level DML activity happens when leaf-level activity
    results in a change in how the index is structured and is not something that can
    be directly influenced with an `INSERT`, `UPDATE`, or `DELETE` statement.


    Both leaf-level and nonleaf-level DML activities are broken apart into statistics
    based on the type of DML operation that has occurred. As previously indicated,
    DML activity monitors `INSERT`, `UPDATE`, and `DELETE` activities. For each of
    these operations, there is a column in `sys.dm_db_index_operational_stats`. Additionally,
    there is a column that counts records that have been ghosted off the leaf-level
    DML activity.


    During `DELETE` operations, rows affected by the statement are deleted in a two-phase
    operation. Initially, the records are marked for deletion. When this occurs, the
    records are referred to as being *ghosted*; the rows in this state are counted
    in `leaf_ghost_count`. At regular intervals, a cleanup thread within SQL Server
    will go through and perform the actual delete operation on rows marked as ghosted.
    At that point, the records will be counted in the `leaf_delete_count`. This process
    improves the performance of delete operations since the actual delete of a row
    happens after the transaction is committed. In the event of transaction rollback,
    the ghost flag on a row is all that needs to revert rather than an attempt to
    recreate the row in the table. This activity occurs only at the leaf level; nonleaf
    pages are deleted whenever all the rows associated with the pages have been deleted
    or otherwise removed.'
