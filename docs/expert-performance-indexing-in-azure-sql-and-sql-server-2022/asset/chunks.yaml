    ### Forwarded Fetch


    `SELECT` 活动收集的最后一个统计列是 `forwarded_fetch_count`。转发记录发生在堆中，当一行大小增加并且无法再容纳在当前所在的页面上时。每次发生记录转发操作时，`forwarded_fetch_count`
    列就会增加一。


    为了演示，清单 [5-27](#338675_4_En_5_Chapter.xhtml#PC27) 中的代码构建了一个包含堆的表并填充了值。然后，一个 `UPDATE`
    语句将每三行的大小增加。新行的大小将超过页面上的可用空间，从而导致转发记录。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    UPDATE dbo.ForwardedRecords

    SET VALUE = REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    -- 清单 5-27

    -- 用于生成转发记录的 T-SQL 脚本

    ```


    脚本完成后，可以使用清单 [5-28](#338675_4_En_5_Chapter.xhtml#PC28) 中的 `sys.dm_db_index_operational_stats`
    脚本来查看转发记录被获取的次数。在本例中，222 条被转发的记录转换为 222 的 `forwarded_fetch_count`，如图 [5-20](#338675_4_En_5_Chapter.xhtml#Fig20)
    所示。在调查性能计数器“转发记录/秒”时，此列非常有用。查看此列将有助于识别哪个堆是导致该计数器活动的源头，从而为调查特定表提供重点。


