- fmt: "# CREATE INDEX Syntax Options\n\nEach of the options allows for different\
    \ levels of control on the index creation process. Options with defaults indicate\
    \ the default option by underlining it. It is worthwhile to use the default options\
    \ when working with indexes unless there is a specific use case that necessitates\
    \ altering them. Table [1-1](#338675_4_En_1_Chapter.xhtml#Tab1) lists the options\
    \ available for `CREATE INDEX`. In later chapters, examples will be provided along\
    \ with strategies for applying them. Further information on the `CREATE INDEX`\
    \ syntax and examples of its use can be found in SQL Docs for SQL Server.\n\n\
    **Table 1-1: CREATE INDEX Syntax Options**\n\n| Option Name | Description |\n\
    | --- | --- |\n| `FILLFACTOR` | Defines the amount of empty space to leave in\
    \ each data page of an index when it is created. This is applied only at the time\
    \ an index is created or rebuilt. |\n| `PAD_INDEX` | Specifies whether the `FILLFACTOR`\
    \ for the index should be applied to the nonleaf data pages for the index. The\
    \ `PAD_INDEX` option is used when data manipulation language (DML) operations\
    \ that lead to excessive nonleaf-level page splitting need to be mitigated. |\n\
    | `SORT_IN_TEMPDB` | Determines whether to store temporary results from building\
    \ the index in the `tempdb` database. This option will increase the amount of\
    \ space required. |\n| `IGNORE_DUP_KEY` | Changes the behavior when duplicate\
    \ keys are encountered when performing inserts into a table. When enabled, rows\
    \ violating the key constraint will fail. When the default behavior is disabled,\
    \ the entire insert will fail. |\n| `STATISTICS_NORECOMPUTE` | Specifies whether\
    \ any statistics related to the index should be recreated when the index is created.\
    \ |\n| `STATISTICS_INCREMENTAL` | Specifies whether statistics collected for the\
    \ index should be created on the index as a whole or per partition. |\n| `DROP_EXISTING`\
    \ | Determines the behavior when an index of the same name on the table already\
    \ exists. By default, when `OFF`, the index creation will fail. When set to `ON`,\
    \ the index creation will replace the existing index. |\n| `ONLINE` | Determines\
    \ whether a table and its indexes are available for queries and data modification\
    \ during index operations. When enabled, locking is minimized, and an intent shared\
    \ is the primary lock held during index creation. When disabled, the locking will\
    \ prevent data modifications to the index and underlying table for the duration\
    \ of the operation. `ONLINE` is an Enterprise Edition–only feature until SQL Server\
    \ 2016 Service Pack 1. |\n| `RESUMABLE` | Identifies whether an indexing operation\
    \ will be resumable. New as of SQL Server 2019. |\n| `MAX_DURATION` | Determines\
    \ the maximum number of minutes for a resumable indexing operation to execute\
    \ until pausing. New as of SQL Server 2019. |\n| `ALLOW_ROW_LOCKS` | Determines\
    \ whether row locks are allowed on an index. By default, they are allowed. |\n\
    | `ALLOW_PAGE_LOCKS` | Determines whether page locks are allowed on an index.\
    \ By default, they are allowed. |\n| `MAXDOP` | Overrides the server-level maximum\
    \ degree of parallelism during the index operation. The setting determines the\
    \ maximum number of processors that an index can utilize during an index operation.\
    \ |\n| `DATA_COMPRESSION` | Determines the type of data compression to use on\
    \ the index. By default, no compression is enabled. With this, either the page-\
    \ or row-level compression type may be specified. |\n\nTo demonstrate the `CREATE\
    \ INDEX` syntax, an index will be built on the table `Sales.SalesOrderDetail`\
    \ in `AdventureWorks2017`. The key column for the index is `ProductID` with the\
    \ columns `OrderQty` and `UnitPrice` included as non-key columns. Additionally,\
    \ the index will be `PAGE` compressed. The code in Listing [1-3](#338675_4_En_1_Chapter.xhtml#PC3)\
    \ builds this index.\n\n```sql\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Sales_SalesOrderDetail_ProductID\n\
    ON Sales.SalesOrderDetail (ProductID)\nINCLUDE (OrderQty, UnitPrice)\nWITH (DATA_COMPRESSION\
    \ = PAGE);\n```\nListing 1-3: CREATE INDEX Example\n\n## Altering an Index\n\n\
    After an index has been created, there will sometimes be a need to modify the\
    \ index. Altering an index is the way in which an index rebuild or reorganization\
    \ can be executed as part of ongoing index maintenance. In addition, altering\
    \ an index allows for some index options to be adjusted, such as the compression\
    \ type.\n\nTo modify an index, the `ALTER INDEX` syntax is used. Listing [1-4](#338675_4_En_1_Chapter.xhtml#PC4)\
    \ shows the basic syntax for altering an index.\n\n```sql\nALTER INDEX { index_name\
    \ | ALL }\nON <table_or_view_name>\n{ REBUILD\n  [ [PARTITION = ALL] [ WITH (\
    \ <rebuild_index_option> [ ,...n ] ) ]\n  | [ PARTITION = partition_number [ WITH\
    \ ( <rebuild_index_option> [ ,...n ] ) ] ] ]\n| DISABLE\n| REORGANIZE\n  [ PARTITION\
    \ = partition_number ]\n  [ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n| SET (\
    \ <index_option> [ ,...n ] )\n| RESUME [WITH (<resume_index_option>[,...n])]\n\
    | PAUSE\n| ABORT\n} [ ; ]\n```\nListing 1-4: ALTER INDEX Syntax\n\nWhen using\
    \ the `ALTER INDEX` syntax for index maintenance, there are two options in the\
    \ syntax that can be used. These options are `REBUILD` and `REORGANIZE`. The `REBUILD`\
    \ option recreates the index using the existing index structure and options. It\
    \ can also be used to enable a disabled index. The `REORGANIZE` option re-sorts\
    \ the leaf-level pages of an index. This is similar to reshuffling the cards in\
    \ a deck to get them back in sequential order. Both of these options will be discussed\
    \ more thoroughly in Chapter [11](#338675_4_En_11_Chapter.xhtml).\n\nAdditionally,\
    \ the `ALTER INDEX` syntax can be used to disable an index. This is accomplished\
    \ through the `DISABLE` option under the `ALTER INDEX` syntax. A disabled index\
    \ will not be used or made available by the database engine. After an index is\
    \ disabled, it can be reenabled only by altering the index again with the `REBUILD`\
    \ option.\n\nBeyond those functions, many of the index options available through\
    \ the `CREATE INDEX` syntax are also available with the `ALTER INDEX` syntax.\
    \ The `ALTER INDEX` syntax can be used to modify the compression of an index.\
    \ It can also be used to change the fill factor or the pad index setting. Depending\
    \ on the needs of a given index, this syntax can be used to change any of the\
    \ available options, though there are some limitations with how the options are\
    \ used. When `REBUILD ALL` partitions is used on an index, all of the same options\
    \ that were available with the `CREATE INDEX` syntax can be modified, as shown\
    \ in Listing [1-5](#338675_4_En_1_Chapter.xhtml#PC5). However, when a single partition\
    \ is targeted with a `REBUILD` operation, the list of options available is greatly\
    \ reduced, as shown in Listing [1-6](#338675_4_En_1_Chapter.xhtml#PC6). This is\
    \ because some index properties are universal and apply to an entire index, whereas\
    \ others can be defined on a partition-by-partition basis.\n\n```sql\nSORT_IN_TEMPDB\
    \ = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n| RESUMABLE = { ON | OFF\
    \ }\n| MAX_DURATION = <minutes> [MINUTES]\n| DATA_COMPRESSION = { NONE | ROW |\
    \ PAGE }\n| ONLINE = { ON [ ( <low_priority_lock_wait> ) ] | OFF }\n```\nListing\
    \ 1-5: ALTER INDEX Single-Partition Rebuild Options\n\n```sql\nPAD_INDEX = { ON\
    \ | OFF }\n| FILLFACTOR = fillfactor\n| SORT_IN_TEMPDB = { ON | OFF }\n| IGNORE_DUP_KEY\
    \ = { ON | OFF }\n| STATISTICS_NORECOMPUTE = { ON | OFF }\n| STATISTICS_INCREMENTAL\
    \ = { ON | OFF }\n| ONLINE = { ON [ ( <low_priority_lock_wait> ) ] | OFF }\n|\
    \ RESUMABLE = { ON | OFF }\n| MAX_DURATION = <minutes> [MINUTES]\n| ALLOW_ROW_LOCKS\
    \ = { ON | OFF }\n| ALLOW_PAGE_LOCKS = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n\
    | DATA_COMPRESSION = { NONE | ROW | PAGE }\n[ ON PARTITIONS ( { <partition_number>\
    \ [ TO ] <partition_number> } [ , ...n ] ) ]\n```\nListing 1-6: ALTER INDEX Rebuild\
    \ Options\n\nFor `REORGANIZE`, the options for `ALTER INDEX` are limited to `LOB_COMPACTION`,\
    \ shown in Listing [1-7](#338675_4_En_1_Chapter.xhtml#PC7). When `LOB_COMPACTION`\
    \ is set to `ON`, the reorganization will attempt to compact large object (LOB)\
    \ pages, allowing space within the index associated with these pages to be reduced\
    \ and released. Without this option, the reorganization will not release these\
    \ pages.\n\n```sql\nLOB_COMPACTION = { ON | OFF }\n```\nListing 1-7: ALTER INDEX\
    \ Reorganize Options"
