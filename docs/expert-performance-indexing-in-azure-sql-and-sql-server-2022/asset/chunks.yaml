    depend entirely on a given computer’s workload. With the indexes from Listing
    12-1, the results should be similar to those in Figure 12-7. In these results,
    there are two recommendations. While the names will vary between different environments,
    the recommendations should be as follows:


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig7_HTML.png)


    **Figure 12-7**

    Recommendations from the Database Engine Tuning Advisor


    A window of database engine tuning advisor has a tab labeled indexbook administrator
    from the left panel under the session monitor. Several checkboxes under the index
    recommendations section, which is below the partition recommendations section,
    are exhibited from the opened recommendations tab.


    *   Index on `OrderDate` and then `DueDate` including `CustomerID`

    *   `Statistics on OrderDate` and then `DueDate`


    This index is similar to the suggestion previously found with the missing index
    `DMOs`. In situations where there are multiple recommendations provided, it will
    be necessary to go through the same considerations that were part of reviewing
    the suggestions from the missing index `DMOs`, such as “Can the recommendations
    be consolidated?” Additionally, when statistics are recommended, do they match
    an index that will be created enough that the index can provide the statistics
    required for queries? To remove any item from the list of recommendations, deselect
    the check box, and it will not be included in any of the recommendation outputs.


    At this point, there are a few options that can be used to apply the indexes:


    *   *Apply the indexes*: To apply the indexes, select `Actions` in the menu bar
    and select `Apply Recommendations`. In the `Apply Recommendations` window that
    comes up, leave the default, `Apply Now`, selected and click OK.

    *   *Apply the indexes in the future*: To apply the indexes in the future, select
    `Actions` in the menu bar and select `Apply Recommendations`. In the `Apply Recommendations`
    window that comes up, select “Schedule for later.” Alter the scheduled date as
    desired and click OK. This will create the `SQL Agent` job. Ensure the `SQL Agent`
    is running and the agent service account has the required permissions to apply
    the indexes.

    *   *Save recommendations*: To save recommendations, click the `Save Recommendations`
    icon in the menu bar and press the key combination `Ctrl+S` or select `Actions`
    ➤ `Save Recommendations` in the menu bar.


    If the recommendations are saved, they will create a script like the one in Listing
    12-5. Before applying indexes from the `DTA`, it is recommended that the names
    of indexes be changed to match your organization’s index naming standards. Also
    important is to consider whether to apply compression to the index. When it comes
    to statistics, it’s not as important to add these for a couple of reasons. First,
    `SQL Server` will create statistics as needed behind the scenes, removing the
    need for customized statistics to be built. Second, indexes include statistics
    and usually provide what is required.


    ```sql

    use AdventureWorks2017;

    go

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderHeader_8_1922105888__K4_K3_11]
    ON [Sales].[SalesOrderHeader]

    (

    [DueDate] ASC,

    [OrderDate] ASC

    )

    INCLUDE([CustomerID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    go

    ```

    **Listing 12-5**

    Database Engine Tuning Advisor Index Recommendations


    By using the `DTA` through its `GUI`, it is possible to quickly optimize a workload.
    The recommendations returned provide a level of index tuning above using the missing
    index `DMOs`. In essence, they provide a brute-force indexing exercise to improve
    performance without improving code. Instead of spending many hours on tuning that
    can be resolved with a few new indexes, time and energy can be focused on more
    complex performance tuning issues than simply adding an index.


    **Note**

    When the `DTA` is terminated while processing, it will sometimes leave behind
    hypothetical indexes that were used while it was investigating possible indexes
    that could improve an environment. A hypothetical index is an index that contains
    only statistics and no data. These indexes can be identified through the `is_hypothetical`
    column in `sys.indexes`. If they exist in your environment, they should always
    be dropped.


