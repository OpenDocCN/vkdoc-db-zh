    ### 锁争用


    在 SQL Server 数据库中读取或写入数据时，会对数据进行锁定，以在其他操作尝试使用它时提供一致性。有时，一个用户的锁定会干扰另一个用户的请求。`sys.dm_db_index_operational_stats`
    提供了详细说明锁计数和等待锁解决所花费时间的列。表 [5-15](#338675_4_En_5_Chapter.xhtml#Tab15) 列出了与 `sys.dm_db_index_operational_stats`
    中跟踪的三类锁相关的三组列，以提供对锁争用的洞察：行锁、页锁和索引锁升级。


    **表 5-15**


    `sys.dm_db_index_operational_stats` 中的索引争用列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `row_lock_count` | `bigint` | 已请求的行锁累计数量 |

    | `row_lock_wait_count` | `bigint` | 数据库引擎等待行锁的累计次数 |

    | `row_lock_wait_in_ms` | `bigint` | 数据库引擎等待行锁的总毫秒数 |

    | `page_lock_count` | `bigint` | 已请求的页锁累计数量 |

    | `page_lock_wait_count` | `bigint` | 数据库引擎等待页锁的累计次数 |

    | `page_lock_wait_in_ms` | `bigint` | 数据库引擎等待页锁的总毫秒数 |

    | `index_lock_promotion_attempt_count` | `bigint` | 数据库引擎尝试升级锁的累计次数 |

    | `index_lock_promotion_count` | `bigint` | 数据库引擎成功升级锁的累计次数 |'
  raw: '#### Singleton Lookup


    The next statistics column collected on `SELECT` activity is `singleton_lookup_count`.
    Values in this column are increased whenever the key lookup, formerly bookmark
    lookup, is used. In general terms, this is the same type of information as collected
    in the column `user_lookups` in `sys.dm_db_index_usage_stats`. There is a significant
    difference, though, between `user_lookups` and `singleton_lookup_count`. When
    a key lookup is used, `user_lookups` will increment by one to indicate that the
    index operation has been used. With `singleton_lookup_count`, every row that uses
    the key lookup operation will be counted in this column.


    For example, running the code in Listing [5-17](#338675_4_En_5_Chapter.xhtml#PC17)
    will result in a key lookup. This can be validated by examining the execution
    plan, shown in Figure [5-13](#338675_4_En_5_Chapter.xhtml#Fig13). The statistics
    from this were discussed previously and are shown in Figure [5-19](#338675_4_En_5_Chapter.xhtml#Fig19).
    The new information to look at can be investigated by running the T-SQL statement
    in Listing [5-26](#338675_4_En_5_Chapter.xhtml#PC26). This shows a value of 243
    in `singleton_lookup_count`. This is an important distinction for this column.
    Rather than knowing that key lookups have occurred, this statistic provides information
    on the size of lookup operations. Consider scenarios where the ratio of singleton
    lookups to range scans was high. This may indicate that there are other indexing
    alternatives to consider.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig19_HTML.png)


    A screenshot of query table results for singleton lookup count with 3 rows of
    data. The column headers are table name, index name, row lock count, row lock
    wait count, and row lock wait in m s.


    Figure 5-19


    Query results for singleton_lookup_count


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.singleton_lookup_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios. singleton_lookup_count DESC;

    Listing 5-26

    Query for singleton_lookup_count from sys.dm_db_index_operational_stats

    ```


    #### Forwarded Fetch


    The last column of statistics collected on `SELECT` activity is `forwarded_fetch_count`.
    Forwarded records occur in heaps when a row increases in size and can no longer
    fit on the page where it currently resides. The column `forwarded_fetch_count`
    increases by one each time a record forward operation occurs.


    To demonstrate, the code in Listing [5-27](#338675_4_En_5_Chapter.xhtml#PC27)
    builds a table with a heap and populates it with values. An `UPDATE` statement
    then increases the size of every third row. The size of the new row will exceed
    the available space on the page, resulting in a forwarded record.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    UPDATE dbo.ForwardedRecords

    SET VALUE = REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    Listing 5-27

    T-SQL Script for Forwarded Records

    ```


    Once the script is completed, the `sys.dm_db_index_operational_stats` script in
    Listing [5-28](#338675_4_En_5_Chapter.xhtml#PC28) can be used to view the number
    of times that forwarded records have been fetched. In this case, the 222 records
    that were forwarded translated to a `forwarded_fetch_count` of 222, as shown in
    Figure [5-20](#338675_4_En_5_Chapter.xhtml#Fig20). This column is useful when
    looking into the performance counter Forwarded Records/sec. Reviewing this column
    will help identify which heap is leading to the counter activity, providing a
    focus on the table to investigate.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig20_HTML.png)


    A screenshot of query table results for forwarded fetch count with a row of data.
    The column headers and values are table name forwarded records, index name null,
    and forwarded fetch count 222.


    Figure 5-20


    Query result for forwarded_fetch_count


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.forwarded_fetch_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''dbo.ForwardedRecords''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.forwarded_fetch_count DESC

    Listing 5-28

    Query for forwarded_fetch_count from sys.dm_db_index_operational_stats

    ```


    ### Locking Contention


    As data is read or written within SQL Server databases, it is locked to provide
    consistency as other operations may attempt to use it. At times, locking for one
    user can interfere with another user’s requests. `sys.dm_db_index_operational_stats`
    provides columns that detail the counts of locks and time spent waiting for locks
    to resolve. Table [5-15](#338675_4_En_5_Chapter.xhtml#Tab15) lists three groups
    of columns that relate to three types of locks that are tracked in `sys.dm_db_index_operational_stats`
    to provide insight into locking contention: row locks, page locks, and index lock
    promotion.


    Table 5-15


    Index Contention Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `row_lock_count` | `bigint` | Cumulative number of row locks requested |

    | `row_lock_wait_count` | `bigint` | Cumulative number of times the database engine
    waited on a row lock |

    | `row_lock_wait_in_ms` | `bigint` | Total number of milliseconds the database
    engine waited on a row lock |

    | `page_lock_count` | `bigint` | Cumulative number of page locks requested |

    | `page_lock_wait_count` | `bigint` | Cumulative number of times the database
    engine waited on a page lock |

    | `page_lock_wait_in_ms` | `bigint` | Total number of milliseconds the database
    engine waited on a page lock |

    | `index_lock_promotion_attempt_count` | `bigint` | Cumulative number of times
    the database engine tried to escalate locks |

    | `index_lock_promotion_count` | `bigint` | Cumulative number of times the database
    engine escalated locks |'
