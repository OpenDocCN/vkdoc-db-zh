    ```


    ### sys.dm_db_page_info


    Another dynamic management function that helps understand how indexes operate
    is sys.dm_db_page_info. This DMF is documented and supported by Microsoft, unlike
    sys.dm_db_database_page_allocations. It provides page header row information for
    database pages. This information includes number of slots, free bytes, minimally
    logged status, ghost records, and page linking details.


    Listing [3-6](#338675_4_En_3_Chapter.xhtml#PC6) shows the syntax for using `sys.dm_db_page_info`.
    The execution requires four parameters, which are defined in Table [3-3](#338675_4_En_3_Chapter.xhtml#Tab3).
    Note that while the parameters allow NULL, the function will return an error if
    any are set to NULL.


    Table 3-3


    Parameters for sys.dm_db_page_info


    | Parameter | Description |

    | --- | --- |

    | `@DatabaseId` | Database to return page header information from. |

    | `@FileId` | `File` `Id` for the page that will be returned. |

    | `@PageId` | `Page` `id` for the page that will be returned. |

    | `@Mode` | Defines the mode for returning data. The options are `DETAILED` and
    `LIMITED`.  With `LIMITED`, only page metadata is returned.  Under the `DETAILED`
    mode, page descriptive columns will be populated. |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {FileId}, {PageId}, {DETAILED | LIMITED})

    Listing 3-6

    sys.dm_db_page_info Syntax

    ```


    When returning data from sys.dm_db_page_info, results include the columns defined
    in Table [3-4](#338675_4_En_3_Chapter.xhtml#Tab4). For every page requested, there
    will be one row of header information in the results.


    Table 3-4


    Columns for sys.dm_db_page_info'
  trans: "\n索引分配映射页始终是混合区的一部分，因为其分配决定了多个表的索引映射。为演示这一点，可以运行清单 3-4 中的脚本，该脚本创建了第二个表，该表通过主键包含一个聚集索引。查看图\
    \ 3-2 中的结果，六行数据被添加到从第 328 页开始的一个区中，绕过了之前表中已分配但未使用的四个页。索引分配映射页与 `dbo.IndexInternalsOne`\
    \ 属于同一个区，该区从第 232 页开始，这表明该区确实是混合的。此外，还为该表分配了一个索引页以支持聚集索引的 B 树结构。\n\n![](img/338675_4_En_3_Fig2_HTML.png)\n\
    \n一个包含 4 行数据的查询表结果截图。7 个列标题分别是：区文件 ID、区页 ID、页类型描述、分配单元类型描述、是否索引分配映射页、是否混合页分配、页计数。\n\
    \n**图 3-2**\n`dbo.IndexInternalsTwo` 的区分配结果\n\n```\nUSE Chapter2Internals;\nGO\n\
    CREATE TABLE dbo.IndexInternalsTwo\n(\n    RowID INT IDENTITY(1, 1) PRIMARY KEY,\n\
    \    FillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsTwo\nDEFAULT\
    \ VALUES;\nGO 6\nSELECT DPA.extent_file_id,\n       DPA.extent_page_id,\n    \
    \   DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n       DPA.is_iam_page,\n\
    \       DPA.is_mixed_page_allocation,\n       COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n\
    \         DPA.extent_page_id,\n         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n\
    \         DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n**清单 3-4**\n创建 `dbo.IndexInternalsTwo` 并插入\
    \ 12 行数据的脚本\n\n除了区级别的详细信息，此动态管理视图函数还可用于在页面级别调查索引，以了解分配给表的所有页面及其与索引中其他页面的关系。使用清单\
    \ 3-5 中的脚本，可以看到从第 232 页开始的区包含了索引分配映射的已分配页 235 和 236，如图 3-3 所示。从第 312 页开始的区包括页\
    \ 312、313 等，这与从第 328 页开始的区类似，该区包括页 328、329 等。此外，还可以查看每个页面在 B 树中的级别以及页面之间的连接，从而验证在索引中上下移动以及通过数据页在页面之间移动的能力。\n\
    \n![](img/338675_4_En_3_Fig3_HTML.png)\n\n一个包含 9 行数据的查询表结果截图。10 个列标题分别是：页类型描述、分配单元类型描述、对象\
    \ ID、索引 ID、区页 ID、已分配页的索引分配映射页 ID、已分配页页 ID、页级别、下一页页 ID、上一页页 ID。\n\n**图 3-3**\n\
    用于查看所有已分配页的区分配结果\n\n```\nUSE Chapter2Internals;\nGO\nSELECT DPA.page_type_desc,\n\
    \       DPA.allocation_unit_type_desc,\n       DPA.object_id,\n       DPA.index_id,\n\
    \       DPA.extent_page_id,\n       DPA.allocated_page_iam_page_id,\n       DPA.allocated_page_page_id,\n\
    \       DPA.page_level,\n       DPA.next_page_page_id,\n       DPA.previous_page_page_id\n\
    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsTwo'),\
    \ NULL, NULL, 'DETAILED') DPA\n```\n**清单 3-5**\n用于查看所有已分配页的脚本\n\n### sys.dm_db_page_info\n\
    \n另一个有助于理解索引运作方式的动态管理函数是 `sys.dm_db_page_info`。与 `sys.dm_db_database_page_allocations`\
    \ 不同，此 DMF 有 Microsoft 文档记录并受其支持。它提供数据库页的页头行信息。此信息包括槽数、可用字节、最小日志记录状态、幽灵记录以及页面链接详细信息。\n\
    \n清单 3-6 展示了使用 `sys.dm_db_page_info` 的语法。执行需要四个参数，定义见表 3-3。注意，虽然参数允许 `NULL`，但如果任何一个参数设置为\
    \ `NULL`，函数将返回错误。\n\n**表 3-3**\n`sys.dm_db_page_info` 的参数\n\n| 参数 | 描述 |\n| ---\
    \ | --- |\n| `@DatabaseId` | 要返回页头信息的数据库。 |\n| `@FileId` | 将要返回的页面的 `文件` `ID`。\
    \ |\n| `@PageId` | 将要返回的页面的 `页` `ID`。 |\n| `@Mode` | 定义返回数据的模式。选项为 `DETAILED`（详细）和\
    \ `LIMITED`（有限）。使用 `LIMITED` 模式时，仅返回页面元数据。在 `DETAILED` 模式下，页面描述性列将被填充。 |\n\n```\n\
    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},\n{FileId}, {PageId},\
    \ {DETAILED | LIMITED})\n```\n**清单 3-6**\n`sys.dm_db_page_info` 语法\n\n当从 `sys.dm_db_page_info`\
    \ 返回数据时，结果包含表 3-4 中定义的列。对于每个请求的页面，结果中将有一行页头信息。\n\n**表 3-4**\n`sys.dm_db_page_info`\
    \ 的列\n"
- fmt: "## 页面信息表\n\n| `Column Name` | `Description` |\n| --- | --- |\n| `database_id`\
    \ | ID of the database |\n| `file_id` | ID of the data file |\n| `page_id` | ID\
    \ of the page |\n| `page_header_version` | Version of the page header |\n| `page_type`\
    \ | ID for the page type |\n| `page_type_desc` | Text description of the page\
    \ type |\n| `page_type_flag_bits` | Type flag bits in the page header |\n| `page_type_flag_bits_desc`\
    \ | Description of type flag bits in the page header |\n| `page_flag_bits` | Flag\
    \ bits in the page header |\n| `page_flag_bits_desc` | Text description of flag\
    \ bits in the page header |\n| `page_lsn` | Log sequence number associated with\
    \ last page modification |\n| `page_level` | Level of the page in the index |\n\
    | `object_id` | ID of the object associated with the page |\n| `index_id` | ID\
    \ of the index |\n| `partition_id` | ID of the partition |\n| `alloc_unit_id`\
    \ | ID of the allocation unit |\n| `is_encrypted` | Indicates whether a page is\
    \ encrypted |\n| `has_checksum` | Indicates whether a page has a checksum value\
    \ |\n| `checksum` | Checksum value for a page |\n| `is_iam_page` | Indicates whether\
    \ a page is the Index Allocation Map page |\n| `is_mixed_extent` | Indicates whether\
    \ a page is part of a mixed extent |\n| `has_ghost_records` | Indicates whether\
    \ the page has ghost records. |\n| `has_version_records` | Indicates whether the\
    \ page has version records |\n| `has_persisted_version_records` | Indicates whether\
    \ the page has persisted version records |\n| `pfs_page_id` | Page ID of the PFS\
    \ page associated with this page |\n| `pfs_is_allocated` | Indicates whether the\
    \ PFS page has allocated this page |\n| `pfs_alloc_percent` | Allocation percentage\
    \ as indicated by the PFS page |\n| `pfs_status` | Bit value for the PFS status\
    \ |\n| `pfs_status_desc` | Text description of the PFS status |\n| `gam_page_id`\
    \ | Page ID of the GAM page associated with this page |\n| `gam_status` | ID value\
    \ indicating the GAM status of this page |\n| `gam_status_desc` | Text description\
    \ of the GAM status of this page |\n| `sgam_page_id` | Page ID of the SGAM page\
    \ associated with this page |\n| `sgam_status` | ID value indicating the SGAM\
    \ status of this page |\n| `sgam_status_desc` | Text description of the SGAM status\
    \ of this page |\n| `diff_map_page_id` | Page ID of the differential map page\
    \ associated with this page |\n| `diff_status` | ID value indicating the differential\
    \ map status of this page |\n| `diff_status_desc` | Text description of the differential\
    \ map status of this page |\n| `ml_map_page_id` | Page ID of the Minimally Logged\
    \ page associated with this page |\n| `ml_status` | ID value indicating the Minimally\
    \ Logged page status of this page |\n| `ml_status_desc` | Text description of\
    \ the Minimally Logged page status of this page |\n| `prev_page_file_id` | File\
    \ ID for the previous page |\n| `prev_page_page_id` | Page ID for the previous\
    \ page |\n| `next_page_file_id` | File ID for the next page |\n| `next_page_page_id`\
    \ | Page ID for the next page |\n| `fixed_length` | Unknown |\n| `slot_count`\
    \ | Total number of used and unused slots |\n| `ghost_rec_count` | Number of records\
    \ marked as ghost on the page |\n| `free_bytes` | Number of free bytes on the\
    \ page |\n| `free_bytes_offset` | Offset of free space at the end of the data\
    \ area |\n| `reserved_bytes` | Number of reserved bytes on the page |\n| `reserved_bytes_by_xdes_id`\
    \ | Space contributed by `m_xdesID` to `m_reservedCnt` |\n| `xdes_id` | Latest\
    \ transaction contributed by `m_reserved` |\n\nThis header information is quite\
    \ extensive and can be used to identify how pages are interrelated between different\
    \ structures, such as PFS pages, or use it to inspect pages to verify checksum,\
    \ number of slots, or free space. The code in Listing [3-7](#338675_4_En_3_Chapter.xhtml#PC7)\
    \ retrieves all page allocations for the two previously created tables, including\
    \ page header information for all of the assigned pages.\n\n## 代码示例\n\n```\nUSE\
    \ Chapter2Internals;\nGO\nSELECT T.name,\nDPA.page_type_desc,\nDPI.page_id,\n\
    DPI.pfs_page_id,\nDPI.gam_page_id,\nDPI.sgam_page_id,\nDPI.diff_map_page_id,\n\
    DPI.ml_map_page_id,\nDPI.prev_page_page_id,\nDPI.next_page_page_id,\nDPI.fixed_length,\n\
    DPI.slot_count,\nDPI.free_bytes\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ NULL, NULL, NULL, 'DETAILED') DPA\nINNER JOIN sys.tables T ON T.object_id =\
    \ DPA.object_id\nCROSS APPLY sys.dm_db_page_info(DPA.database_id, DPA.allocated_page_file_id,\
    \ DPA.allocated_page_page_id, DEFAULT) DPI;\n```\n\n**Listing 3-7**  \nQuery Using\
    \ `sys.dm_db_page_info`\n\n## 执行结果\n\nOnce executed, results will be returned\
    \ that are similar to those in Figure [3-4](#338675_4_En_3_Chapter.xhtml#Fig4).\
    \ The results show the same previous and next page connections for `dbo.IndexInternalsTwo`,\
    \ but no page IDs listed for `dbo.IndexInternalsOne`. Additionally, the PFS, GAM,\
    \ SGAM, DIFF, and ML pages are identified for both tables, which are the same\
    \ since the database is smaller than the threshold required for having multiples\
    \ of these page types. Also shown are the number of slots, length, and free bytes\
    \ per page. Of note is page 329, which is the index page for `dbo.IndexInternalsTwo`,\
    \ that has six slots, one for each page that the index page manages in the clustered\
