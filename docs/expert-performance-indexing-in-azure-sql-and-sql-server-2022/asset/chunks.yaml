- fmt: '在应用缺失索引建议之前，请考虑索引在此查询及未来查询中将如何使用。在此场景中，假设永远不会有一个查询在值为 `NULL` 时使用 `CertificationDate`。那么，在索引中为所有
    `NULL` 行存储空值有意义吗？基于所述假设，这样做没有意义；这样做会浪费数据库空间，并且如果因扫描读取量足够高而选择了其他索引，导致跳过 `CertificationDate`
    上的索引，则可能会导致执行计划不是最优的。


    在此场景中，过滤索引中的行是有意义的。为此，索引的创建方式与其他索引相同，只是在其索引创建语句中添加了一个 `WHERE` 子句（参见清单 [13-26](#338675_4_En_13_Chapter.xhtml#PC26)）。创建过滤索引时，关于
    `WHERE` 子句有几点需要注意。首先，`WHERE` 子句必须是确定性的。它不能随着时间推移根据子句内函数的结果而改变。例如，不能使用 `GETDATE()`
    函数，因为其返回的值每毫秒都在变化。第二个限制是只允许简单的比较逻辑。这意味着不能使用 `BETWEEN` 和 `LIKE` 比较。有关过滤索引的限制和约束的更多信息，请参阅第
    [2](#338675_4_En_2_Chapter.xhtml) 章。


    执行清单 [13-26](#338675_4_En_13_Chapter.xhtml#PC26) 中的 `CertificationDate` 查询表明，过滤索引对查询性能有显著影响。关于产生的读取次数，现在只有
    2 次读取，而应用索引之前是 2,866 次读取（参见图 [13-38](#338675_4_En_13_Chapter.xhtml#Fig38)）。此外，执行计划现在对两个查询都使用索引查找，而不是聚集索引扫描，如图
    [13-39](#338675_4_En_13_Chapter.xhtml#Fig39) 所示。虽然这些结果是预料之中的，但关于该索引的另一个考虑是，新索引仅由两个页组成。如图
    [13-40](#338675_4_En_13_Chapter.xhtml#Fig40) 所示，整个索引所需的页数大大少于聚集索引和其他非聚集索引。


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig40_HTML.png)


