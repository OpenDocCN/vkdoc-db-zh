    \ tessellation scheme, bounding box x max, bounding box x min, bounding box y\
    \ max, bounding box y min, level 1 grid descending, level 4 grid descending, 和\
    \ cells per object。\n\n图 7-8\n\n查询 `sys.spatial_index_tessellations` 及部分结果\n\n\
    ```\nUSE AdventureWorks2017\nGO\nSELECT  tessellation_scheme,\n        bounding_box_xmax,\n\
    \        bounding_box_xmin,\n        bounding_box_ymax,\n        bounding_box_ymin,\n\
    \        level_1_grid_desc,\n        level_2_grid_desc,\n        level_3_grid_desc,\n\
    \        level_4_grid_desc,\n        cells_per_object\nFROM    sys.spatial_index_tessellations;\n\
    ```\n清单 7-9\n检索细分信息的查询\n\n这两个目录视图都可以通过 `object_id` 进行连接，对于调优和维护任务非常有用。有时，根据空间数据的相关需求来操作并重建索引可能是有效的。\n\
    \n### 存储过程\n\n除了目录视图之外，还提供了四个内部存储过程，用于进一步分析空间索引。这些存储过程返回索引上设置的所有属性的完整列表。这四个过程及其参数如下：\n\
    \n```\nsp_help_spatial_GEOMETRY_index [ @tabname =] 'tabname'\n    [ , [ @indexname\
    \ = ] 'indexname' ]\n    [ , [ @verboseoutput = ] 'verboseoutput'\n    [ , [ @query_sample\
    \ = ] 'query_sample']\nsp_help_spatial_GEOMETRY_index_xml [ @tabname =] 'tabname'\n\
    \    [ , [ @indexname = ] 'indexname' ]\n    [ , [ @verboseoutput = ]'{ 0 | 1\
    \ }]\n    [ , [ @query_sample = ] 'query_sample' ]\n    [ ,.[ @xml_output = ]\
    \ 'xml_output' ]\nsp_help_spatial_GEOGRAPHY_index [ @tabname =] 'tabname'\n  \
    \  [ , [ @indexname = ] 'indexname' ]\n    [ , [ @verboseoutput = ] 'verboseoutput'\
    \ ]\n    [ , [ @query_sample = ] 'query_sample' ]\nsp_help_spatial_GEOGRAPHY_index_xml\
    \ [@tabname = 'tabname'\n    [ , [ @indexname = ] 'indexname' ]\n    [ , [ @verboseoutput\
    \ = ] 'verboseoutput' ]\n    [ , [ @query_sample = ] 'query_sample' ]\n    [ ,.[\
    \ @xml_output = ] 'xml_output' ]\n```\n\n清单 7-10 展示了如何执行这些存储过程。该示例返回关于 `GEOMETRY`\
    \ 索引 `IDX_COUNTY_GEOM` 的信息，该索引在清单 7-7 中创建。图 7-9 展示了结果。\n\n![](img/338675_4_En_7_Fig9_HTML.jpg)\n\
    \n一个表格有 2 列和 15 行。列标题为 prop name 和 prop value，并选择了查询中第 0 级的对象单元总数。\n\n图 7-9\n\n\
    `sp_help_spatial_GEOMETRY_index` 示例及结果（结果可能有所不同）\n\n```\nUSE AdventureWorks2017\n\
    GO\nDECLARE @Sample GEOMETRY\n    = 'POLYGON((-90.0 -180.0, -90.0 180.0, 90.0\
    \ 180.0, 90.0 -180.0, -90.0 -180.0))';\nEXEC sp_help_spatial_GEOMETRY_index 'dbo.tl_2017_us_county',\
    \ 'IDX_COUNTY_GEOM', 0, @Sample;\n```\n清单 7-10\n调查几何索引\n\n这些信息对于调整索引以使其更好地工作非常有用。这些细节类似于标准索引可用的统计信息。其中包括索引的每个级别中有多少对象可用。此外，还会返回与提供的查询样本匹配的数据。看到特定数量的相交对象与查询样本匹配，表明给定对象是否会被索引返回。通过将索引中的对象与匹配的对象进行比较，还可以检索索引中未被查询样本返回的对象百分比。所有这些都有助于理解索引满足空间查询要求的程度。\n"
- fmt: '## Tuning Spatial Indexes


    As seen in Listing [7-7](#338675_4_En_7_Chapter.xhtml#PC7), when a spatial index
    is created, various options are available. Manipulating these options allows the
    behavior of a spatial index to be adjusted. Some experimentation will be necessary
    to arrive at the right set of options for the optimal behavior of an index. A
    combination of the execution plan and query performance metrics can help in arriving
    at an effective set of options.


    For a `GEOMETRY` column, a bounding box can be added to the index. This limits
    the area that the index covers, which can allow an index to be created that can
    help satisfy certain query criteria better than a more generic index. For example,
    if the bounding box is changed and the index recreated, as shown in Listing [7-11](#338675_4_En_7_Chapter.xhtml#PC12),
    there is about a 10 percent reduction in execution time.


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2017_us_county

    (

    GEOM

    )USING  GEOMETRY_GRID

    WITH (

    BOUNDING_BOX =(-96.9, -95.3, 36.4, 36.6),

    GRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = ON,

    ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];

    GO

    Listing 7-11

    Adjusting the Bounding Box of the Spatial Index

    ```


    By changing the bounding box, some objects are excluded from the index. Depending
    on the data and parameters used in the index, performance may not improve with
    more items filtered out from the index. Due to this complexity with spatial indexes,
    it is important to test and verify that the desired performance improvements are
    achieved as an index is adjusted and tested. Making changes to improve the queries
    for one set of counties may lead to poor performance for other counties in the
    United States. Therefore, there may not always be a simple solution available
    that can be implemented without some additional tweaking and validation.


    Another adjustment that can be made is to change the grids of the index. The choice
    made in the examples so far is a standard choice if unsure of how the data is
    distributed and of how many matches it is likely to get from any one query. If
    a given query has a higher percentage of inclusive results, a different distribution
    on the grids can result in higher speed. It’s largely a question of experimentation.
    But, just as with the bounding box, changing the grid distribution for one dataset
    could hurt another. Rigorous testing is required to ensure that a special index
    is optimal for common data profiles.


    Using the same example, if the level 1 grid were to be adjusted into a `HIGH`
    detailed grid, there would be a 10 percent reduction in performance, making the
    query run slower. Changing it to `MEDIUM` neither benefited nor hurt the execution
    time. In this case, adjusting the grid levels in any combination didn’t result
    in a significant improvement in speed, but having the `HIGH` level of detail on
    either level 1 or level 2 of the grid would negatively impact performance. With
    this experiment complete, it would be reasonable to choose to leave the default
    grids alone in this instance.


    ## Restrictions on Spatial Indexes


    Spatial indexes provide some unique features, as well as a set of restrictions.
    The following is a comprehensive list of restrictions for spatial indexing:


    *   Spatial indexes require an existing clustered index.

    *   A spatial index can be created only on a column of type `GEOMETRY` or `GEOGRAPHY`.

    *   Spatial indexes can be defined only on a table that has a primary key. The
    maximum number of primary key columns on the table is 15.

    *   The maximum size of index key records is 895 bytes. Larger sizes raise an
    error.

    *   The use of the Database Engine Tuning Advisor (DTA) is not supported.

    *   An online rebuild of a spatial index cannot be performed. Spatial index rebuilds
    are offline operations that leave the index unavailable while being rebuilt. If
    a rebuild is required, perform it at an off-hours time when the index is unlikely
    to be needed.

    *   Spatial indexes cannot be specified on indexed views.

    *   Only up to 249 spatial indexes can be created on any of the spatial columns
    in a supported table. Creating more than one spatial index on the same spatial
    column can be useful, for example, to index different tessellation parameters
    in a single column.

    *   An index build of spatial data cannot use available process parallelism.


    ## Summary


    Indexing spatial data is a complicated form of data storage and manipulation.
    This chapter covered the key components of how spatial data is processed and stored
    to help in managing and reviewing an implementation of the spatial data types
    in databases.


    Spatial indexes provide the ability to quickly determine whether points lie within
    regions or whether regions overlap other regions. Instead of having to fully render
    each spatial artifact, spatial indexes allow queries to quickly calculate the
    results of the spatial function. A key to ensuring optimal performance is to examine
    the execution plan and validate that the spatial index is being used and that
    query duration is acceptable.


    # 8. Indexing Memory-Optimized Tables


    The past few chapters have focused on indexing specialized data types in SQL Server.
    Memory-optimized tables are also available that allow schema and/or data to be
    persisted in memory, rather than on storage. Introduced in SQL Server 2014, these
    tables reside fully within memory while SQL Server is running, relying on disk-based
    structures to allow for schema/data to be persisted as needed.


    With memory-optimized tables being primarily memory based, this has a significant
    impact on the traditional structures of a table and its indexes. In this chapter,
    memory-optimized tables will be reviewed, focusing on the differences between
    these tables and the more familiar disk-based tables. In addition, guidance will
    be provided as to how to create the ideal indexes on memory-optimized tables.


    Note


    Depending on the source and SQL Server version, memory-optimized tables are also
    referred to as in-memory OLTP and Hekaton. This book will use the term `memory-optimized
    tables` as it aligns to the terminology used in Microsoft Books Online.'
