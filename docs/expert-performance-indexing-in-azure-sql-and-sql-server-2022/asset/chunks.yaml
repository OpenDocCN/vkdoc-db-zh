- fmt: '### Extended Events


    Extended Events 是 SQL Server 中首选的跟踪工具。它包含的功能远多于 SQL Trace，但缺乏后者的直观简洁性。如果有机会在两种解决方案之间选择，使用
    Extended Events 创建跟踪是更优的选择。创建 Extended Events 会话有两种方式。第一种是通过 T-SQL，本章将演示这种方法。第二种是使用
    SQL Server Management Studio 中的图形用户界面，其中包含用于构建新会话的向导。创建会话的最佳实践在很大程度上与 SQL Trace
    相同。例如，请务必在非数据和日志文件存储驱动器上收集会话日志。


    将在 Extended Events 中创建的跟踪将收集与 SQL Trace 相同的一般信息。主要区别在于会话的创建方式以及某些事件和列的名称。在 Extended
    Events 中捕获的事件是 `rpc_completed` 和 `sql_batch_completed`，分别替代了 RPC:Completed 和 SQL:BatchCompleted。每个事件都捕获自己的一组列或数据元素，如表
    15-3 所列。


    **表 15-3 Extended Events 列**


    | 事件 | 列 |

    | --- | --- |

    | `rpc_completed` | • `connection_reset_option`• `cpu_time`• `data_stream`• `duration`•
    `logical_reads`• `object_name`• `output_parameters`• `physical_reads`• `result`•
    `row_count`• `statement`• `writes` |

    | `sql_batch_completed` | • `batch_text`• `cpu_time`• `duration`• `logical_reads`•
    `physical_reads`• `result`• `row_count`• `writes` |


    Extended Events 会话中将包含一些额外的数据，这些数据作为全局字段或操作提供，可用于扩展每个事件中包含的默认信息。这些类似于上一个会话中 SQL
    Trace 会话包含的元素。要包含的全局字段如下：


    *   `client_app_name`

    *   `client_hostname`

    *   `database_id`

    *   `database_name`

    *   `nt_username`

    *   `process_id`

    *   `session_id`

    *   `sql_text`

    *   `username`


    定义好会话后，下一步是创建会话。Extended Events 利用 T-SQL 数据定义语言（DDL）而不是存储过程来创建会话。清单 15-22 中的代码提供了会话的
    DDL 并启动了会话。对于添加的每个事件，使用 `ADD EVENT` 语法，并使用 `ACTION` 子句来包含全局字段。为方便起见，该会话被设计为将输出存储在
    SQL Server 的默认日志文件夹中，文件名为 `EventTracingforIndexTuning`。


    ```sql

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    ```

    **清单 15-22 创建并启动 Extended Events 会话**


    与 SQL Trace 会话类似，Extended Events 会话可以启动和停止。不需要暂停它们，因为会话的元数据独立于会话是否正在运行而存在。清单 15-22
    包含了启动跟踪的语法。清单 15-23 显示了停止跟踪的代码。此外，如果 SQL Server 重启，Extended Events 跟踪会话将被保留，并且可以配置为自动重启，这与
    SQL Trace 在重启后消失不同。


    ```sql

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    ```

    **清单 15-23 停止 Extended Events 会话**


    这个 Extended Events 会话代表了一个相对简单的用例。Extended Events 的好处在于它能够轻松捕获 SQL Server 实例的工作负载。使用来自跟踪的工作负载，可以定位、分析常见查询，并在需要时通过适当的索引更改进行优化。这允许利用这些信息改进环境中的性能，然后使用额外的跟踪来监控和测试这些改进。


    ### Query Store


    查询存储（Query Store）在 SQL Server 2016 中引入，是一个每个数据库的数据存储，包含执行计划信息和相关的执行统计信息。虽然它不一定直接提供索引调优信息，但此功能的进步允许实现自动索引功能。这基于
    Azure SQL Database 中 SQL Server 现有的自动索引管理功能，详见 [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-%25C2%25ADserver-%25C2%25ADver15%2523automatic-index-management)。截至撰写本文时，自动索引管理在
    SQL Server 2022 或更早版本中不可用。


    查询存储提供了对数据库中执行的查询、其资源消耗、执行计划等的直接洞察。这提供了一个清晰的界面来理解计划缓存中的内容，无需进行复杂的系统视图查询，这在较大的
    SQL Server 上可能具有挑战性。


    使用查询存储的另一个好处是，在执行计划因性能改进而被其他执行计划替换的情况下，有时这可能与索引相关。这可能是由于索引的统计信息不佳，或者缺乏最佳索引以在不替换计划的情况下提供所需的性能。对于这两种情况，通过监控查询存储活动来识别这些性能问题，可以洞察环境中所需的索引。


    出于监控索引的目的，这些原因提供了利用查询存储的另一个理由。要在数据库上启用查询存储，请执行清单 15-24 中的代码。请注意，从 SQL Server 2022
    开始，默认启用查询存储。


    虽然深入探讨查询存储本身超出了本书的范围，但在数据收集频率、存储数据量、数据丢弃率以及查询存储当前是否可写等方面具有很大的灵活性。建议进一步阅读查询存储相关资料；一个很好的起点是
    Apress 出版的《Query Store for SQL Server 2019》。


    ```sql

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    ```

    **清单 15-24 在 AdventureWorks2017 上启用查询存储**'
  raw: '### Extended Events


    Extended Events is the preferred tracing tool in SQL Server. It contains far more
    functionality than SQL Trace but lacks its straightforward simplicity. Given the
    opportunity to choose between these solutions, creating traces with Extended Events
    is the preferable option. There are two ways to create Extended Events sessions.
    The first is through T-SQL, which will be demonstrated in this chapter. The second
    uses a GUI in SQL Server Management Studio that includes wizards for building
    a new session. The best practices in session creation are the same as SQL Trace
    for the most part. For example, be sure to collect session logs on drives other
    than those in which data and log files are stored.


    The trace that will be created in Extended Events will collect the same general
    information as SQL Trace. The main differences will be how the session is created
    and some of the names of events and columns. Instead of RPC:Completed and SQL:BatchCompleted,
    the events to capture in Extended Events are `rpc_completed` and `sql_batch_completed`,
    respectively. Each of these events captures their own set of columns, or data
    elements, which are listed in Table [15-3](#338675_4_En_15_Chapter.xhtml#Tab3).


    Table 15-3


    Extended Events Columns


    | Event | Columns |

    | --- | --- |

    | `rpc_completed` | • `connection_reset_option`• `cpu_time`• `data_stream`• `duration`•
    `logical_reads`• `object_name`• `output_parameters`• `physical_reads`• `result`•
    `row_count`• `statement`• `writes` |

    | `sql_batch_completed` | • `batch_text`• `cpu_time`• `duration`• `logical_reads`•
    `physical_reads`• `result`• `row_count`• `writes` |


    Some additional data will be included in the Extended Events session that is available
    as global fields, or actions, which can be used to extend the default information
    included in each event. These are similar to the elements included in the SQL
    Trace session from the previous session. The global fields to be included are
    as follows:


    *   `client_app_name`


    *   `client_hostname`


    *   `database_id`


    *   `database_name`


    *   `nt_username`


    *   `process_id`


    *   `session_id`


    *   `sql_text`


    *   `username`


    With the session defined, the next step is to create the sessions. Extended Events
    leverages the T-SQL data definition language (DDL) instead of stored procedures
    to create sessions. The code in Listing [15-22](#338675_4_En_15_Chapter.xhtml#PC22)
    provides the DDL for the session and starts the session. For each event added,
    the `ADD EVENT` syntax is used, and the `ACTION` clause is used to include the
    global fields. For convenience, the session is designed to store the output in
    the default log folder for SQL Server in the file `EventTracingforIndexTuning`.


    ```

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    Listing 15-22

    Create and Start Extended Events Session

    ```


    Similar to SQL Trace sessions, Extended Events sessions can be started and stopped.
    There is no need to pause them since the metadata for a session exists independent
    from whether the session is running. Listing [15-22](#338675_4_En_15_Chapter.xhtml#PC22)
    includes the syntax for starting the trace. Listing [15-23](#338675_4_En_15_Chapter.xhtml#PC23)
    shows the code to stop the trace. Additionally, if SQL Server restarts, the Extended
    Events tracing session will be retained and can be configured to restart, unlike
    SQL Trace which disappears on restart.


    ```

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    Listing 15-23

    Create and Start Extended Events Session

    ```


    This Extended Events session represents a relatively simple use case. The benefit
    of Extended Events is its ability to easily capture workloads from SQL Server
    instances. Using the workloads from tracing, common queries can be located, analyzed,
    and targeted with appropriate indexing changes, if needed. This allows performance
    in an environment to be improved using that information and then those improvements
    monitored and tested using additional tracing.


    ## Query Store


    Introduced in SQL Server 2016, Query Store is a per-database data store that contains
    execution plan information and related execution statistics. While it doesn’t
    necessarily provide direct index tuning information, advances in this feature
    allow for automated indexing capabilities. This is based on the existing changes
    available to SQL Server in Azure SQL Database, which is detailed at [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-%25C2%25ADserver-%25C2%25ADver15%2523automatic-index-management).
    Automated index management is not available in SQL Server 2022 or earlier, as
    of the time of this writing.


    Query Store provides direct insight into the queries executed in a database, their
    resource consumption, execution plans, and more. This provides a clean interface
    to understand what is in the plan cache, without the need for complex system view
    queries that may be challenging on a larger SQL Server.


    An additional benefit to using Query Store is that in situations where execution
    plans are being replaced by other execution plans for improved performance, this
    can sometimes be index-related. This could be due to poor statistics available
    for the indexes or a lack of the best indexes to provide desired performance without
    replaced plans. For either scenario, identifying these performance issues by monitoring
    Query Store activity can provide insight into indexes needed in an environment.


    For the purposes of monitoring indexes, those reasons provide an additional reason
    to leverage Query Store. To enable Query Store on a database, execute the code
    in Listing [15-24](#338675_4_En_15_Chapter.xhtml#PC24). Note that Query Store
    is enabled by default starting in SQL Server 2022.


    While a deep dive into Query Store is itself outside the scope of this book, there
    is a lot of flexibility that can be leveraged around how frequently data is collected,
    how much data is stored, what the rate of dropping data is, and whether the Query
    Store is currently writable. Further reading on Query Store is recommended; a
    great start is *Query Store for SQL Server 2019* by Apress.


    ```

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWoListing 15-24\. Enable Query Store on AdventureWorks2017

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWoListing 15-24\. Enable Query Store on AdventureWorks2017

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    Listing 15-24

    Enable Query Store on AdventureWorks2017

    ```'
  trans: '

    ### 扩展事件


    扩展事件是 SQL Server 中首选的跟踪工具。它包含的功能远多于 SQL Trace，但缺乏后者的直观简洁性。如果有机会在两种解决方案之间选择，使用扩展事件创建跟踪是更优的选择。创建扩展事件会话有两种方式。第一种是通过
    T-SQL，本章将演示这种方法。第二种是使用 SQL Server Management Studio 中的图形用户界面，其中包含用于构建新会话的向导。创建会话的最佳实践在很大程度上与
    SQL Trace 相同。例如，请务必在非数据和日志文件存储驱动器上收集会话日志。


    将在扩展事件中创建的跟踪将收集与 SQL Trace 相同的一般信息。主要区别在于会话的创建方式以及某些事件和列的名称。在扩展事件中捕获的事件是 `rpc_completed`
    和 `sql_batch_completed`，分别替代了 RPC:Completed 和 SQL:BatchCompleted。每个事件都捕获自己的一组列或数据元素，如表
    15-3 所列。


    **表 15-3 扩展事件列**


    | 事件 | 列 |

    | --- | --- |

    | `rpc_completed` | • `connection_reset_option`• `cpu_time`• `data_stream`• `duration`•
    `logical_reads`• `object_name`• `output_parameters`• `physical_reads`• `result`•
    `row_count`• `statement`• `writes` |

    | `sql_batch_completed` | • `batch_text`• `cpu_time`• `duration`• `logical_reads`•
    `physical_reads`• `result`• `row_count`• `writes` |


    扩展事件会话中将包含一些额外的数据，这些数据作为全局字段或操作提供，可用于扩展每个事件中包含的默认信息。这些类似于上一个会话中 SQL Trace 会话包含的元素。要包含的全局字段如下：


    *   `client_app_name`

    *   `client_hostname`

    *   `database_id`

    *   `database_name`

    *   `nt_username`

    *   `process_id`

    *   `session_id`

    *   `sql_text`

    *   `username`


    定义好会话后，下一步是创建会话。扩展事件利用 T-SQL 数据定义语言（DDL）而不是存储过程来创建会话。清单 15-22 中的代码提供了会话的 DDL 并启动了会话。对于添加的每个事件，使用
    `ADD EVENT` 语法，并使用 `ACTION` 子句来包含全局字段。为方便起见，该会话被设计为将输出存储在 SQL Server 的默认日志文件夹中，文件名为
    `EventTracingforIndexTuning`。


    ```sql

    USE master;

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''EventTracingforIndexTuning''

    )

    DROP EVENT SESSION [EventTracingforIndexTuning] ON SERVER;

    CREATE EVENT SESSION [EventTracingforIndexTuning]

    ON SERVER

    ADD EVENT sqlserver.rpc_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    ),

    ADD EVENT sqlserver.sql_batch_completed

    (ACTION (

    package0.process_id,

    sqlserver.client_app_name,

    sqlserver.client_hostname,

    sqlserver.database_id,

    sqlserver.database_name,

    sqlserver.nt_username,

    sqlserver.session_id,

    sqlserver.sql_text,

    sqlserver.username

    )

    )

    ADD TARGET package0.event_file

    (SET filename = N''EventTracingforIndexTuning'')

    WITH (

    STARTUP_STATE = ON

    );

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = START;

    GO

    ```

    **清单 15-22 创建并启动扩展事件会话**


    与 SQL Trace 会话类似，扩展事件会话可以启动和停止。不需要暂停它们，因为会话的元数据独立于会话是否正在运行而存在。清单 15-22 包含了启动跟踪的语法。清单
    15-23 显示了停止跟踪的代码。此外，如果 SQL Server 重启，扩展事件跟踪会话将被保留，并且可以配置为自动重启，这与 SQL Trace 在重启后消失不同。


    ```sql

    USE master;

    GO

    ALTER EVENT SESSION [EventTracingforIndexTuning] ON SERVER STATE = STOP;

    GO

    ```

    **清单 15-23 停止扩展事件会话**


    这个扩展事件会话代表了一个相对简单的用例。扩展事件的好处在于它能够轻松捕获 SQL Server 实例的工作负载。使用来自跟踪的工作负载，可以定位、分析常见查询，并在需要时通过适当的索引更改进行优化。这允许利用这些信息改进环境中的性能，然后使用额外的跟踪来监控和测试这些改进。


    ### 查询存储


    查询存储在 SQL Server 2016 中引入，是一个每个数据库的数据存储，包含执行计划信息和相关的执行统计信息。虽然它不一定直接提供索引调优信息，但此功能的进步允许实现自动索引功能。这基于
    Azure SQL Database 中 SQL Server 现有的自动索引管理功能，详见 [`https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning?view=sql-server-ver15#automatic-index-management`](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-%25C2%25A
    Dserver-%25C2%25A Dver15%2523automatic-index-management)。截至撰写本文时，自动索引管理在 SQL Server
    2022 或更早版本中不可用。


    查询存储提供了对数据库中执行的查询、其资源消耗、执行计划等的直接洞察。这提供了一个清晰的界面来理解计划缓存中的内容，无需进行复杂的系统视图查询，这在较大的
    SQL Server 上可能具有挑战性。


    使用查询存储的另一个好处是，在执行计划因性能改进而被其他执行计划替换的情况下，有时这可能与索引相关。这可能是由于索引的统计信息不佳，或者缺乏最佳索引以在不替换计划的情况下提供所需的性能。对于这两种情况，通过监控查询存储活动来识别这些性能问题，可以洞察环境中所需的索引。


    出于监控索引的目的，这些原因提供了利用查询存储的另一个理由。要在数据库上启用查询存储，请执行清单 15-24 中的代码。请注意，从 SQL Server 2022
    开始，默认启用查询存储。


    虽然深入探讨查询存储本身超出了本书的范围，但在数据收集频率、存储数据量、数据丢弃率以及查询存储当前是否可写等方面具有很大的灵活性。建议进一步阅读查询存储相关资料；一个很好的起点是
    Apress 出版的《Query Store for SQL Server 2019》。


    ```sql

    USE [master]

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE = ON

    GO

    ALTER DATABASE [AdventureWorks2017] SET QUERY_STORE (OPERATION_MODE = READ_WRITE)

    GO

    ```

    **清单 15-24 在 AdventureWorks2017 上启用查询存储**

    '
- fmt: '# 16. Index Analysis


    ## Summary


    In this chapter, we walked through the steps to monitor indexes using a variety
    of tools. Monitoring indexes is an extension of general platform monitoring but
    an important part of providing the foundation for determining whether indexes
    are adequate or if further tuning would be beneficial. Through monitoring and
    index analysis, we reviewed how to gather dynamic management data and performance
    counters. In the next chapter, this information will be applied to analyze whether
    the right indexes are present or not.


    In the previous chapter, we discussed what information should be collected when
    monitoring indexes. All of that information is necessary for the next process
    of indexing databases, which is determining which indexes to apply. In this chapter,
    we will take all the information gathered while monitoring and use it to analyze
    the state of performance and the value of the existing indexes. The end goal of
    the index analysis is to build a list of indexes to create, modify, and, potentially,
    drop from the databases. In some cases, the index analysis will appear to border
    on art. There are many decisions in which previous performance will be used to
    anticipate future indexing needs. Ultimately, though, with every change proposed,
    there will be supporting evidence before and after the indexing solutions to statistically
    confirm or disprove the value of the index. This helps to ensure that regardless
    of the complexity of an indexing challenge, it will and always should be more
    science than art.


    The general process of index analysis is broken down into several components.
    Each component contains a process in which the analysis will start from high levels
    to identify the needed focus and then zoom into existing issues. The analysis
    components are as follows:


    *   Review of server state

    *   Schema discovery

    *   `Database Engine Tuning Advisor`

    *   Unused indexes

    *   Index plan usage


    Before any exercise in analyzing the indexes of a database can take place, it
    is first necessary to know the current deployment state. The tactics that can
    be used for a database in deployment vs. a database already deployed to the production
    environment will be roughly the same. There is a significant difference between
    the two, though, when it comes to where and how the statistics are gathered.


    For a database that has not been developed, the focus will be on how users are
    expected to interact with the data and application after it is deployed. Tests
    and workloads against the database will focus on validating that the indexing
    in the database supports those activities. The activity that is chosen for the
    testing will likely be the result of estimations and projections of what users
    will do with the application. Determining the activity will be the responsibility
    of the business analysts who develop the requirements for the application.


    Once the database has been deployed, the monitoring shifts from what the activity
    could be to what the activity is. The rate at which users adopt features and what
    the distribution of the data is with that activity will be known. At this point,
    the indexes developed during testing and planning may not be correct for the workload.
    The first round of using the `Indexing Method` on the database after deployment
    may lead to significant indexing changes. The key to indexing databases that have
    been deployed is that the analysis needs to be against the statistics of the workload
    in production. Doing so will provide the necessary guidance for implementing indexes
    that provide the best benefit to the database and pair them with the features
    that users are using and the frequency in which they use them.


    Going through the index analysis with databases in either deployment state will
    provide a set of indexes that are optimal for what is currently known and understood
    about the database. When the indexes are applied, their effectiveness can and
    will vary. An index may provide the perfect access path for data for an activity
    in the database last month, but with a new release, new clients, or changes in
    user behavior, it may not continue to be optimal. As is often heard with regard
    to the stock market, past performance does not predict future results.


    Fortunately, with a well-practiced use of the `Indexing Method`, we will be able
    to provide the indexing that an environment needs. In this chapter, the focus
    is on databases that are already deployed to production. As mentioned, these tactics
    will work with databases and servers in both states—development and production—but
    for simplicity, a production environment will be the default perspective and approach.


    As we move through each of the areas in the index analysis, a list of indexes
    will be developed to either create, modify, delete, or investigate further. For
    the indexes that require further investigation, subsequent portions of the index
    analysis process will be used to determine how to progress and handle the index.


    **Note**


    In this chapter, it will be important to run the monitoring scripts from `Chapter
    15` between the scripts that create the workload and the queries to review the
    statistics. Depending on the schedule used for collecting the statistics, it could
    be hours before the statistics are collected that prevent the queries from providing
    the anticipated results.


    ## Review of Server State


    The first step in index analysis is to review the state of the server. Review
    both the host server environment and the `SQL Server` instance environment to
    identify whether there are conditions indicating that there may be indexing issues.
    By starting at a high level and not looking directly at tables and individual
    indexes, we can avoid getting blinded by the trees in the forest. Often, when
    there are hundreds (or thousands) of indexes in many databases, it is easy to
    get overly focused on an index or table that looks poorly indexed, only to later
    discover that the table has fewer than a hundred rows in a database with billions
    of rows in other tables.


    When analyzing the server state, the following three areas will be considered:


    *   `Performance counters`

    *   `Wait statistics`

    *   `Buffer allocation`


    Each of these areas provides an idea of where to start focusing the index analysis
    process. They let the database platform determine where the performance issues
    related to indexing may reside.'
