    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts(FirstName,
    LastName, IsActive);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    **Listing 13-20** Covering Index Pattern


    The Covering Index pattern can be useful and has the potential to improve performance
    in many areas. The downside to this approach is that each column included in the
    key columns of an index needs to be sorted. If a column needs to be returned by
    a query, but will not be sorted on, then it is better off as an included column,
    rather than a key column.


    > **Note**

    > Some consider covering indexes and indexes with included columns the same thing.
    While very similar, the key difference between the two is the location of the
    columns as part of the key or data included in the index.


    ### Included Columns


    The Included Columns pattern is a close cousin to the Covering Index pattern.
    The Included Columns pattern leverages the `INCLUDE` clause of the `CREATE` and
    `ALTER INDEX` syntax. The clause allows non-key columns to be added to non-clustered
    indexes, similar to how non-key data is stored in clustered indexes. This is the
    primary difference between the Included Columns and Covering Index patterns, where
    the additional columns in the Covering Index are key columns on the index. Like
    clustered indexes, the non-key columns that are part of the `INCLUDE` clause are
    not sorted, although they can be used as predicates in some queries.


    The use case for the Included Columns pattern comes from the flexibility that
    it provides. It is generally the same as the Covering Index pattern, and sometimes
    the names are used interchangeably. The key difference, which is demonstrated
    in this section, is that the Covering Index pattern is limited by the sort order
    of all columns in the index. The Included Columns pattern can avoid this potential
    issue by including non-key data, thereby increasing its flexibility of use.


    Before demonstrating the flexibility of the Included Columns pattern, another
    index against the `dbo.Contacts` table will be examined. In Listing 13-21, the
    query is filtering on a `FirstName` value of Catherine and returning the `ContactID`,
    `FirstName`, `LastName`, and `EmailAddress` columns. This query request differs
    from the other examples because it now includes the `EmailAddress` column. Since
    this column is not included in any of the other non-clustered indexes, none of
    them can fully satisfy the query. As a result, the execution plan uses `IX_Contacts_FirstName`
    to identify the Catherine rows and then looks up the rest of the data from the
    clustered index, shown in Figure 13-30. With the key lookup, the I/O for the query
    increases to 68 reads (see Figure 13-31), as they have in previous examples.


    ![Figure 13-31](images/338675_4_En_13_Chapter/338675_4_En_13_Fig31_HTML.png)

    **Figure 13-31** Execution plan for the Included Columns pattern with the Existing
    index


    ![Figure 13-30](images/338675_4_En_13_Chapter/338675_4_En_13_Fig30_HTML.png)

    **Figure 13-30** Statistics I/O results for the Included Columns pattern with
    the Existing index


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    ```

    **Listing 13-21** Included Columns Pattern with the Existing Index


    To improve the performance of this query, another index based on either the Multiple
    Column pattern or the Covering Index pattern could be created. The trouble with
    these options, though, is that the resulting index would have the same limitations
    as the queries that it could improve. Instead, a new index based on the Included
    Columns pattern will be created. This new index, shown in Listing 13-22, has `FirstName`
    as the key column and includes `LastName`, `IsActive`, and `EmailAddress` as the
    non-key columns. Even though the `IsActive` column is not used in the index, it
    is being included to allow additional flexibility for the index, which a later
    example in this section will use. With the index in place, the performance of
    the query in Listing 13-21 improves significantly. In this example, the reads
    drop from the previous 68 per execution to 3 reads (see Figure 13-32). In the
    execution plan, the key lookup and nested loop are no longer needed; instead,
    there is just the index seek, which is now using the index `IX_Contacts_FirstNameINC`
    (see Figure 13-33).


    ![Figure 13-33](images/338675_4_En_13_Chapter/338675_4_En_13_Fig33_HTML.png)

    **Figure 13-33** Execution plan for the Included Columns pattern with a new index


    ![Figure 13-32](images/338675_4_En_13_Chapter/338675_4_En_13_Fig32_HTML.png)

    **Figure 13-32** Statistics I/O results for the Included Columns pattern with
    a new index


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_Contacts_FirstNameINC ON dbo.Contacts(FirstName)

    INCLUDE (LastName, IsActive, EmailAddress);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    EmailAddress

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    ```

    **Listing 13-22** Included Columns Pattern with a New Index


    While the number of reads is slightly higher with an index created with the Included
    Columns pattern, there is flexibility with the index that offsets that difference.
    With each of the examples in this chapter, a new index has been added to the table
    `dbo.Contacts`. At this point, there are six indexes on the table, each serving
    a different purpose and four leading with the same column, `FirstName`. Each of
    these indexes takes up space and requires maintenance when the data in `dbo.Contacts`
    is modified. In active tables, over-indexing can have a negative impact on all
    activity on the table.


    The Included Columns pattern can assist with this issue. In scenarios where there
    are multiple indexes with the same leading key column, it is possible to consolidate
    those indexes into a single index using the Included Columns pattern with some
    of the key columns added to the index instead as non-key columns. To demonstrate,
    first remove all the indexes that start with `FirstName`, except for the one created
    using the Included Columns pattern (script provided in Listing 13-23).


    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastName ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstNameLastNameIsActive ON dbo.Contacts

    GO

    DROP INDEX IF EXISTS IX_Contacts_FirstName ON dbo.Contacts

    GO

    ```

    **Listing 13-23** Dropping Indexes in the Included Columns Pattern'
