    XML 查询页面查询成本为 100%。请求的选择性 XML 索引成本为 8%，返回一组数据。缓存的计划大小为 32 千字节。估计运算符成本为 0。并行度为
    1。估计子树成本为 0.0933749。估计行数为 172.8。


    **图 6-7**

    使用选择性 XML 索引的 XML 查询成本


    虽然这为 XML 索引提供了一个显著改善的机会，但有一个重要的限制需要考虑。如果查询随着时间的推移而演变，以至于选择性 XML 索引不再覆盖它们，那么性能将会下降。这与典型的聚集索引和非聚集索引不同，后者索引的是列中每个值的全部内容，而不是每个值的选择性部分。


    为了演示此场景，将在查询中添加另一个 XML 元素以按 `BusinessType` 进行筛选。`Exist()` 将被添加到 `WHERE` 子句中，如**清单
    6-7** 所示，同时删除先前创建的主/辅助 XML 索引以防止它们干扰输出。一般来说，当使用选择性 XML 索引时，不会同时使用主/辅助 XML 索引。


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [SXML_Store_Demographics] ON [Sales].[Store];

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store];

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1

    AND Demographics.exist(''/StoreSurvey/BusinessType[.="OS"]'') = 1

    ```


    **清单 6-7**

    在 `[Sales].[Store]` 上查询 `AnnualSales` 和 `BusinessType`


    运行**清单 6-7** 中的代码后，可以看到查询性能已大幅下降。其原因是包含了带有 `XPath` 筛选器的 `XML Reader`，这增加了估计子树成本，如**图
    6-9** 所示。其表现不像首次执行此查询时那么差，因为选择性 XML 索引仍在协助减少需要使用函数扫描整个 XML 文档的记录数。但这确实是一种性能下降，对于大表来说，这可能会导致显著的性能挑战。


    ![](img/338675_4_En_6_Fig9_HTML.jpg)


    XML 查询页面查询成本为 100%。请求的选择性 XML 索引成本为 7%，返回一组数据。缓存的计划大小为 40 千字节。估计运算符成本为 0。并行度为
    1。估计子树成本为 00.108878。估计行数为 57.1892。附有带网站链接的语句。


    **图 6-9**

    使用选择性 XML 索引但未包含 XML 元素的 XML 查询成本


    幸运的是，选择性 XML 索引提供了灵活性来调整此类问题。具体来说，如**清单 6-8** 所示的 `FOR` 子句可以扩展以包含多个 XML 节点和路径。在此场景中，`BusinessType`
    被添加到索引中。正如预期且如**图 6-10** 所示，索引中的此项更改通过将估计子树成本降至 0.108 来提高了查询性能。这是在选择性 XML 索引上添加第二个聚集索引扫描操作的直接结果。


    ![](img/338675_4_En_6_Fig10_HTML.jpg)


    XML 查询页面查询成本为 100%。请求的选择性 XML 索引成本为 0%，返回一组数据。缓存的计划大小为 40 千字节。估计运算符成本为 0。并行度为
    1。估计子树成本为 3.56432。估计行数为 172.8。附有带网页链接的语句。


    **图 6-10**

    在两个元素上建立选择性 XML 索引的 XML 查询成本


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [SEL_XML_Store_Demographics_AnnualSales] ON [Sales].[Store];

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSalesBusinessType]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'',

    BusinessType = ''/StoreSurvey/BusinessType'');

    ```


    **清单 6-8**

    创建选择性 XML 索引的脚本


    再次，通过运行**清单 6-4** 中的脚本来检查扩展索引的存储影响。**图 6-11** 显示，即使增加了索引中的元素数量，索引的存储占用空间也没有发生显著变化。记录数为
    701，分布在 6 个页面上，而不是 5 个。


    ![](img/338675_4_En_6_Fig11_HTML.png)


    一个 4 行 8 列的数据库表。列标题为 `name`、`index I D`、`index level`、`index type descending order`、`fragment
    count`、`average page space used in percent`、`record count` 和 `page count`。行中存在
    2 个选择性 XML 索引。


    **图 6-11**

    在两个元素上创建选择性 XML 索引后的物理统计信息


    虽然选择性 XML 索引是优化对 XML 文档读取的一种更复杂的方式，但入门的学习曲线并不显著。选择性 XML 索引支持比本章提供的示例更复杂的 XQuery，允许更精确地指定
    XML 文档的哪些部分将被索引。


    ## 本章小结


    本章介绍了对存储在 SQL Server 中的非结构化和半结构化数据进行搜索和索引的需求。XML 索引为开发人员和数据库管理员提供了改进 XML 文档搜索性能的选项。这对于通过筛选数据和检索数据以进行显示的查询都有益。选择性
    XML 索引提供了一种更精细和详细的方法来进行 XML 索引。XML 索引可能需要大量的存储空间；因此，应提前相应地规划容纳它们所需的空间。


    # 7. 空间索引


    空间数据类型提升了 SQL Server 的存储能力，允许存储定义形状和位置信息的数据。在这些增强功能出现之前，空间数据通常存储为字符串或数值，在数据库中没有隐含的意义。这需要繁琐的转换和计算才能将信息解析为有意义的见解。


    作为空间数据支持的一部分，SQL Server 引入了 `GEOMETRY` 和 `GEOGRAPHY` 数据类型。这些类型分别支持平面和测地数据。平面数据包括二维平面上的线、点和多边形，而测地数据包括类似的数据，但定义在测地椭球体上。测地数据描述了在地球地图上识别的数据点。这两种数据类型可以这样描述：`GEOMETRY`
    是所描述形状的平面表示，而 `GEOGRAPHY` 则包含一个圆形的全球表示。


    空间数据索引在创建和解释方式上是独特的。每个索引由一组网格组成。这些网格由一组单元组成，布局类似于方形电子表格。网格最大可达 16 × 16，最小可达 4
    × 4。网格内的单元包含定义所存储空间数据对象的值。`GEOGRAPHY` 和 `GEOMETRY` 数据类型在此类索引中存在明显区别。`GEOMETRY`
    数据类型需要一个边界框，这是对索引定义区域大小的限制。`GEOGRAPHY` 数据类型没有边界框，因为它受行星大小的限制。


    本章将探讨空间索引、其行为及其在查询中的使用，以增强空间数据的性能。'
- fmt: '## How Spatial Data Is Indexed


    The grids that make up a spatial index are nested within each other. At the top
    layer, known as level 1, there can be, for example, a 4 × 4 grid. Each cell within
    that level 1 grid then contains another grid, consisting of the number of cells
    defined for that level, in this example 4 × 4. This second grid defines level
    2. The cells in level 2 each have a grid that defines level 3, and the cells there
    contain another grid, level 4. Figure 7-1 shows how a `GEOMETRY` index consists
    of these four levels. The index is then made up of these four grids, each one
    being composed of a series of cells. This layering and grid hierarchy, called
    `decomposing`, is created when the index is created.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig1_HTML.png)


    A diagram illustrates how the cells in the 4 by 4 grid from level 1 are indexed
    into three different levels of the 4 by 4 grid within cells.


    Figure 7-1


    Grid storage representation of the `GEOMETRY` index storage and cells


    As many as 4 billion cells are possible, as shown in Figure 7-1. This is important
    when creating the index and determining what density to use at creation. Each
    layer, or level, can have a specified density. There are three levels of density
    (`low = 4 × 4`, `medium = 8 × 8`, and `high = 16 × 16`). If the density is omitted
    at the time an index is created, the default is `medium`. Manipulating the density
    is most commonly useful for tuning the storage space of the index. All layers
    may not be required at a high density. Save space by not using more density than
    is needed.


    This background is necessary because the actual storage of the information from
    within these grids is the same `B-tree` format used to store standard indexes.
    Their definitions within storage and the retrieval of those definitions are radically
    different within spatial indexes than they are within standard indexes. To convert
    this information into a `B-tree` format, additional processing on top of the grid
    is necessary.


    The next step in the indexing process that SQL Server performs is tessellation.
    `Tessellation` is the process that places or fits the objects into the grid hierarchy
    starting at layer 1. This process may require only the first layer of the grid
    but can require all four depending on the objects involved. Tessellation is essentially
    taking all data from the spatial column and placing it onto the grids in cells
    while retaining each cell that is touched. The index then knows exactly how to
    find the cells in each grid when a request is evaluated, using the `B-tree`.


    Having the cells in a grid storage and tessellation process, however, does not
    fully work in theory as there are openings for the cells to be misused or not
    used efficiently based on the extreme number of touched cells to retain. With
    the `GEOMETRY` data type and indexes created on it, the bounding box is required
    because SQL Server needs a finite space. Creating such a box is done by using
    the coordinates `xmin, xmax` and `ymin, ymax`. The result can be visualized as
    a square having the x-coordinate and y-coordinate of the lower-left corner and
    the x-coordinate and y-coordinate of the upper-right corner. What is most critical
    when determining the bounding box with an index on a `GEOMETRY` data type is to
    ensure that all objects fall within the bounding box. This decision needs to also
    not make the bounding box excessively large, with lots and lots of empty cells.
    Therefore, there is a balancing act that results where a bounding box needs to
    be big enough for any data contained within, but not so large that excessive space
    is wasted. An index will be effective only for the objects or shapes within the
    bounding box. Not containing objects within a bounding box could severely impact
    the performance of spatial queries.


    To retain the ability to use an index efficiently in the tessellation process,
    rules are applied. These rules are as follows:


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig2_HTML.png)


    A diagram presents a dark circle covers two cells in the 4 by 4 grid on level
    1, and on level 2, the circle covers many cells.


    Figure 7-2


    Visual representation of an object and how many cells the object covers within
    the grid layers


    *   `Covering rule`: The covering rule is the most basic rule applied in tessellation.
    This is in no way related to the term *covering index*. The rule states that any
    cell that is completely covered is not recorded individually for that object.
    Covered cells are counted for the object. Not storing the details of covered cells
    saves processing time and data storage space.


    *   `Cells-per-object rule`: The cells-per-object rule is a more in-depth rule
    that applies a limit to the number of cells that can be counted for a specific
    object. In Figure 7-2, the circle shown covers 2 cells in level 1 and 12 in level
    2. The circle is tessellated to the second layer because of a cells-per-object
    default of 16. If the circle did cover more than 16 cells at level 2, tessellation
    would not continue through to level 2. Since the object would cover far more than
    16 cells at level 3, tessellation stops here. Tuning the cells per object can
    enhance the accuracy of an index. Tuning this value based on the data stored can
    be very effective. Given the importance of the cells-per-object rule, the setting
    is exposed in a dynamic management view, `sys.spatial_index_tessellations`. This
    setting will be reviewed later in this chapter.


    *   `Deepest cell rule`: The last rule of the tessellation process is the deepest
    cell rule. Each layer of grids and the cells within them are referenced in each
    deeper layer. In Figure 7-2, cells defined in level 2 are the only ones needed
    to completely refer to any other levels, in this case level 1. This rule is built
    into the optimizer’s processing of how to retrieve data from the index.


    With the `GEOGRAPHY` type, there is the added challenge of projecting the form
    in a flattened representation through the tessellation process. This process first
    divides the `GEOGRAPHY` grid into two hemispheres. Each hemisphere is projected
    onto the facets of a quadrilateral pyramid and flattened, and then the two are
    joined into a non-Euclidean plane. Once this process is complete, the plane is
    decomposed into the aforementioned grid hierarchy.'
  raw: '## How Spatial Data Is Indexed


    The grids that make up a spatial index are nested within each other. At the top
    layer, known as level 1, there can be, for example, a 4 × 4 grid. Each cell within
    that level 1 grid then contains another grid, consisting of the number of cells
    defined for that level, in this example 4 × 4\. This second grid defines level
    2\. The cells in level 2 each have a grid that defines level 3, and the cells
    there contain another grid, level 4\. Figure [7-1](#338675_4_En_7_Chapter.xhtml#Fig1)
    shows how a `GEOMETRY` index consists of these four levels. The index is then
    made up of these four grids, each one being composed of a series of cells. This
    layering and grid hierarchy, called *decomposing*, is created when the index is
    created.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig1_HTML.png)


    A diagram illustrates how the cells in the 4 by 4 grid from level 1 are indexed
    into three different levels of the 4 by 4 grid within cells.


    Figure 7-1


    Grid storage representation of the GEOMETRY index storage and cells


    As many as 4 billion cells are possible, as shown in Figure [7-1](#338675_4_En_7_Chapter.xhtml#Fig1).
    This is important when creating the index and determining what density to use
    at creation. Each layer, or level, can have a specified density. There are three
    levels of density (low = 4 × 4, medium = 8 × 8, and high = 16 × 16). If the density
    is omitted at the time an index is created, the default is medium. Manipulating
    the density is most commonly useful for tuning the storage space of the index.
    All layers may not be required at a high density. Save space by not using more
    density than is needed.


    This background is necessary because the actual storage of the information from
    within these grids is the same B-tree format used to store standard indexes. Their
    definitions within storage and the retrieval of those definitions are radically
    different within spatial indexes than they are within standard indexes. To convert
    this information into a B-tree format, additional processing on top of the grid
    is necessary.


    The next step in the indexing process that SQL Server performs is tessellation.
    *Tessellation* is the process that places or fits the objects into the grid hierarchy
    starting at layer 1\. This process may require only the first layer of the grid
    but can require all four depending on the objects involved. Tessellation is essentially
    taking all data from the spatial column and placing it onto the grids in cells
    while retaining each cell that is touched. The index then knows exactly how to
    find the cells in each grid when a request is evaluated, using the B-tree.


    Having the cells in a grid storage and tessellation process, however, does not
    fully work in theory as there are openings for the cells to be misused or not
    used efficiently based on the extreme number of touched cells to retain. With
    the `GEOMETRY` data type and indexes created on it, the bounding box is required
    because SQL Server needs a finite space. Creating such a box is done by using
    the coordinates `xmin, xmax` and `ymin, ymax`. The result can be visualized as
    a square having the x-coordinate and y-coordinate of the lower-left corner and
    the x-coordinate and y-coordinate of the upper-right corner. What is most critical
    when determining the bounding box with an index on a `GEOMETRY` data type is to
    ensure that all objects fall within the bounding box. This decision needs to also
    not make the bounding box excessively large, with lots and lots of empty cells.
    Therefore, there is a balancing act that results where a bounding box needs to
    be big enough for any data contained within, but not so large that excessive space
    is wasted. An index will be effective only for the objects or shapes within the
    bounding box. Not containing objects within a bounding box could severely impact
    the performance of spatial queries.


    To retain the ability to use an index efficiently in the tessellation process,
    rules are applied. These rules are as follows:


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig2_HTML.png)


    A diagram presents a dark circle covers two cells in the 4 by 4 grid on level
    1, and on level 2, the circle covers many cells.


    Figure 7-2


    Visual representation of an object and how many cells the object covers within
    the grid layers


    *   *Covering rule*: The covering rule is the most basic rule applied in tessellation.
    This is in no way related to the term *covering index*. The rule states that any
    cell that is completely covered is not recorded individually for that object.
    Covered cells are counted for the object. Not storing the details of covered cells
    saves processing time and data storage space.


    *   *Cells-per-object rule*: The cells-per-object rule is a more in-depth rule
    that applies a limit to the number of cells that can be counted for a specific
    object. In Figure [7-2](#338675_4_En_7_Chapter.xhtml#Fig2), the circle shown covers
    2 cells in level 1 and 12 in level 2\. The circle is tessellated to the second
    layer because of a cells-per-object default of 16\. If the circle did cover more
    than 16 cells at level 2, tessellation would not continue through to level 2\.
    Since the object would cover far more than 16 cells at level 3, tessellation stops
    here. Tuning the cells per object can enhance the accuracy of an index. Tuning
    this value based on the data stored can be very effective. Given the importance
    of the cells-per-object rule, the setting is exposed in a dynamic management view,
    `sys.spatial_index_tessellations`. This setting will be reviewed later in this
    chapter.


    *   *Deepest cell rule*: The last rule of the tessellation process is the deepest
    cell rule. Each layer of grids and the cells within them are referenced in each
    deeper layer. In Figure [7-2](#338675_4_En_7_Chapter.xhtml#Fig2), cells defined
    in level 2 are the only ones needed to completely refer to any other levels, in
    this case level 1\. This rule is built into the optimizer’s processing of how
    to retrieve data from the index.


    With the `GEOGRAPHY` type, there is the added challenge of projecting the form
    in a flattened representation through the tessellation process. This process first
    divides the `GEOGRAPHY` grid into two hemispheres. Each hemisphere is projected
    onto the facets of a quadrilateral pyramid and flattened, and then the two are
    joined into a non-Euclidean plane. Once this process is complete, the plane is
    decomposed into the aforementioned grid hierarchy.'
  trans: '## 空间数据如何被索引


    构成空间索引的网格是相互嵌套的。在顶层，即第 1 级，可以有一个例如 4 × 4 的网格。该第 1 级网格内的每个单元格随后又包含另一个网格，该网格由为该级别定义的单元格数量组成，在本例中为
    4 × 4。这第二个网格定义了第 2 级。第 2 级的每个单元格都有一个定义第 3 级的网格，而那里的单元格包含另一个网格，即第 4 级。图 7-1 展示了一个
    `GEOMETRY` 索引如何由这四个级别组成。索引则由这四个网格构成，每个网格由一系列单元格组成。这种分层和网格层次结构，称为`分解`，是在创建索引时创建的。


    ![](img/338675_4_En_7_Fig1_HTML.png)


    一张图表展示了来自第 1 级的 4 乘 4 网格中的单元格如何被索引到单元格内的 4 乘 4 网格的三个不同层级中。


    图 7-1


    `GEOMETRY` 索引存储和单元格的网格存储表示


    如图 7-1 所示，最多可以有 40 亿个单元格。这在创建索引以及确定创建时使用的密度时非常重要。每一层或每一级都可以有一个指定的密度。密度分为三个级别 (`低
    = 4 × 4`，`中 = 8 × 8`，`高 = 16 × 16`)。如果在创建索引时省略密度，则默认为 `中`。调整密度最常用于优化索引的存储空间。并非所有层都需要高密度。通过不使用超出需要的密度来节省空间。


    这个背景知识是必要的，因为存储这些网格内信息的实际格式与存储标准索引所用的 `B-树` 格式相同。然而，它们在存储中的定义以及这些定义的检索方式在空间索引中与标准索引截然不同。为了将此信息转换为
    `B-树` 格式，需要在网格之上进行额外的处理。


    SQL Server 在索引过程中执行的下一步是细分。`细分`是将对象放入从第 1 层开始的网格层次结构中的过程。此过程可能只需要网格的第一层，但也可能根据所涉及的对象需要所有四层。细分本质上是获取来自空间列的所有数据，并将其放入网格的单元格中，同时保留所有被触及的单元格。然后，在评估请求时，索引使用
    `B-树` 精确知道如何在每个网格中找到单元格。


    然而，拥有网格存储和细分过程中的单元格在理论上并不完全有效，因为基于要保留的被触及单元格的极大数量，存在单元格被滥用或未有效使用的漏洞。对于 `GEOMETRY`
    数据类型及其上创建的索引，需要边界框，因为 SQL Server 需要一个有限的空间。创建这样一个框是通过使用坐标 `xmin, xmax` 和 `ymin,
    ymax` 来完成的。结果可以可视化为一个正方形，其左下角有 x 坐标和 y 坐标，右上角有 x 坐标和 y 坐标。在确定 `GEOMETRY` 数据类型索引的边界框时，最关键的是确保所有对象都落在边界框内。此决策还需要避免使边界框过大，导致出现大量空单元格。因此，需要取得一种平衡，边界框需要足够大以容纳任何包含的数据，但也不能太大以致浪费过多空间。索引仅对边界框内的对象或形状有效。边界框内不包含对象可能会严重影响空间查询的性能。


    为了在细分过程中保留有效使用索引的能力，应用了规则。这些规则如下：


    ![](img/338675_4_En_7_Fig2_HTML.png)


    一张图表展示了一个深色圆圈覆盖了第 1 级 4 乘 4 网格中的两个单元格，而在第 2 级，该圆圈覆盖了许多单元格。


    图 7-2


    对象在网格层级中覆盖多少个单元格的视觉表示


    *   `覆盖规则`：覆盖规则是细分中应用的最基本规则。这与术语 *覆盖索引* 无关。该规则规定，任何被完全覆盖的单元格都不会为该对象单独记录。被覆盖的单元格会被计入该对象。不存储被覆盖单元格的详细信息可节省处理时间和数据存储空间。

    *   `每对象单元格规则`：每对象单元格规则是一个更深入的规则，它对特定对象可以计数的单元格数量应用了一个限制。在图 7-2 中，所示圆圈在第 1 级覆盖了
    2 个单元格，在第 2 级覆盖了 12 个。由于每对象单元格的默认值为 16，该圆圈被细分到第二层。如果该圆圈在第 2 级确实覆盖了超过 16 个单元格，细分将不会继续到第
    2 级。由于该对象在第 3 级将覆盖远超过 16 个单元格，细分在此停止。调整每对象单元格数可以增强索引的准确性。根据存储的数据调整此值可能非常有效。鉴于每对象单元格规则的重要性，该设置在一个动态管理视图
    `sys.spatial_index_tessellations` 中公开。本章稍后将回顾此设置。

    *   `最深单元格规则`：细分过程的最后一条规则是最深单元格规则。每一层网格及其内的单元格都在更深层中被引用。在图 7-2 中，第 2 级中定义的单元格是唯一需要用来完全引用任何其他层级的单元格，在本例中是第
    1 级。此规则内置于优化器如何从索引检索数据的处理过程中。


    对于 `GEOGRAPHY` 类型，还存在通过细分过程将形态投影为扁平化表示的额外挑战。此过程首先将 `GEOGRAPHY` 网格划分为两个半球。每个半球被投影到四棱锥的各个面上并压平，然后两者合并到一个非欧几里得平面中。此过程完成后，该平面被分解为前述的网格层次结构。'
- fmt: '## 创建空间索引


    `创建空间索引`语句具有与普通聚集或非聚集索引大部分相同的选项。然而，此索引类型需要特定的选项，如表 7-1 所列。


    表 7-1：空间索引选项


    | 选项名称 | 描述 |

    | --- | --- |

    | `USING` | `USING` 子句指定空间数据类型。这必须是 `GEOMETRY_GRID` 或 `GEOGRAPHY_GRID`，且是必需的。
    |

    | `WITH GEOMETRY_GRID, GEOGRAPHY_GRID` | `WITH` 选项包括基于列数据类型为 `GEOMETRY_GRID` 或
    `GEOGRAPHY_GRID` 设置细分方案。 |

    | `BOUNDING_BOX` | `BOUNDING_BOX` 用于 `GEOMETRY` 数据类型，以定义单元的边框。此选项没有默认值，在 `GEOMETRY`
    数据类型上创建索引时必须指定。清单 7-2 中的 `CREATE SPATIAL INDEX IDX_CITY_GEOM` 展示了此选项的语法。设置 `BOUNDING_BOX`
    是通过设置 `xmin` 和 `ymin` 以及 `xmax` 和 `ymax` 坐标来完成的，如下所示：`BOUNDING_BOX = (XMIN = xmin,
    YMIN = ymin, XMAX = xmax, YMAX = ymax)`。 |

    | `GRIDS` | `GRIDS` 选项用于更改每个网格层的密度。所有层的默认值为中等密度，但可以更改为低或高，以进一步调整空间索引和密度设置。 |


    以清单 7-1 中的 `CREATE TABLE` 语句为例。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE CITY_MAPS (

    ID BIGINT PRIMARY KEY

    IDENTITY(1, 1),

    CITYNAME NVARCHAR(150),

    CITY_GEOM GEOMETRY

    );

    GO

    Listing 7-1

    CREATE TABLE with a GEOMETRY Data Type

    ```


    该表将包含主键、城市名称，然后是一个 `GEOMETRY` 列，用于存储城市本身的地图数据。城市的密度可能会影响调整细分中每个对象的单元规则以及网格层次结构中每层的密度。


    要为 `CITY_GEOM` 列创建索引，将使用清单 7-2 中的 `CREATE` 语句，其中前两层的网格层密度为 `LOW`，第三层和第四层分别为 `MEDIUM`
    和 `HIGH`。这种密度更改允许调整索引中的对象和覆盖的单元，因为层在网格中越深入。每个对象的单元设置是对象可以覆盖的最大 24 个单元。边框坐标也已设置。


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_CITY_GEOM

    ON CITY_MAPS (CITY_GEOM)

    USING GEOMETRY_GRID

    WITH (

    BOUNDING_BOX = ( xmin=-50, ymin=-50, xmax=500, ymax=500 ),

    GRIDS = (LOW, LOW, MEDIUM, HIGH),

    CELLS_PER_OBJECT = 24,

    PAD_INDEX  = ON );

    Listing 7-2

    Definition of a Spatial Index on a GEOMETRY Column

    ```


    要利用和测试创建的索引，需要检查预估和实际执行计划，以确定索引是否已被使用。对于空间数据，审查查询将产生的实际结果也是有益的。SQL Server Management
    Studio 有一个内置的空间数据查看器，可用于查看空间数据。


    清单 7-3 创建了一个可受益于空间索引的表。该表用于存储来自美国人口普查局的邮政编码和其他数据。此表将在 `AdventureWorks2017` 数据库中创建。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.tl_2021_us_county (

    STATEFP CHAR(2) NULL,

    COUNTYFP CHAR(3) NULL,

    COUNTYNS CHAR(8) NULL,

    GEOID CHAR(5) NULL,

    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    Listing 7-3

    Creating a Table to Hold GEOMETRY-Related Data

    ```


    `GEOM` 列将存储 `GEOMETRY` 数据。此列将用于从 SQL Server Management Studio 查询数据，以显示可以从其他应用程序完成的成像。


    > **注意**

    > 对于本章的示例，需要一个 shape 文件和工具 OGR2OGR。shape 文件来自 [TIGER/Line Shapefile, 2021, nation,
    US, Current County and Equivalent National Shapefile](http://www2.census.gov/geo/tiger/TIGER2021/COUNTY/tl_2021_us_county.zip)。OGR2OGR
    可从 [OSGeo4W](http://download.osgeo.org/osgeo4w/osgeo4w-setup-v2.exe) 获取。安装应用程序时，仅安装
    GDAL 包。安装后，运行 PowerShell 命令 `[Environment]::SetEnvironmentVariable(“GDAL_DATA”,
    “C:\OSGeo4W64\share\gdal”, “Machine”)` 以设置环境变量。最后，从提取地理文件的目录，运行命令 `C:\OSGeo4W64\bin\ogr2ogr
    -f “MSSQLSpatial” MSSQL:“server=localhost;database=AdventureWorks2017;trusted_connection=yes;”
    -nln “tl_2021_us_county” -a_srs “ESPG:4269” -lco “GEOM_TYPE=geography” -lco “GEOM_NAME=geog4269”
    “tl_2021_us_county.shp” -s_srs EPSG:4269 -t_srs EPSG:26713`。


    在 SSMS 的普通网格和表格结果集中查看 `GEOMETRY` 数据类型列的查询的实际数据并不有用。要利用空间数据功能，使用 SSMS 中的“空间结果”选项卡要有效得多。给定清单
    7-3 中的表，可以对 `GEOM` 列执行 `SELECT`，`SELECT` 语句的结果将自动生成“空间结果”选项卡。例如，清单 7-4 中的查询将生成华盛顿州的图像，每个县区域用不同的颜色编码。


    ```

    USE AdventureWorks2017

    GO

    SELECT  *

    FROM    dbo.tl_2021_us_county AS tuc

    WHERE   tuc.STATEFP = ''41'';

    Listing 7-4

    Initial Query for Pulling Back Spatial Data

    ```


    单击 SSMS 结果窗口中的“空间结果”选项卡，以显示查询生成的图像。结果应类似于图 7-3 中的图像。


    ![输出图像](images/338675_4_En_7_Chapter/338675_4_En_7_Fig3_HTML.jpg)


    图 7-3：针对县数据的空间查询输出

    网格图显示了位置的输出，其中有多个县区域以不同的阴影表示。


    清单 7-4 中的查询使用了标准列 `STATEFP` 来过滤信息，以便一次只查看特定州内的县。但在使用此数据之前，最好确保 `GEOM` 列中只包含有效的形状。可能会存储不正确的数据，因此可能需要清理数据。为此，可以使用方法
    `MakeValid()` 来修改任何 `GEOMETRY` 实例，使其有效。根据 Microsoft 的文档，使用该函数可能会导致形状“轻微移动”，但它对你控制的形状可能产生的影响程度尚不清楚。执行清单
    7-5 将更新 `GEOM` 列中任何无效的 `GEOMETRY` 实例。


    ```

    USE AdventureWorks2017

    GO

    UPDATE  dbo.tl_2021_us_county

    SET     GEOM = GEOM.MakeValid();

    Listing 7-5

    Using MakeValid() to Correct Any Invalid GEOMETRY Instances

    ```


    `MakeValid()` 方法应谨慎使用，并且在生产环境中应审查发现的所有无效 `GEOMETRY` 实例。使用 `MakeValid()` 函数后，应仔细审查形状，因为它可能会修改这些形状。'
  raw: '## Creating Spatial Indexes


    The `Create Spatial Index` statement has most of the same options of a normal
    clustered or non-clustered index. However, there are specific options that are
    required for this index type, as listed in Table [7-1](#338675_4_En_7_Chapter.xhtml#Tab1).


    Table 7-1


    Spatial Index Options


    | Option Name | Description |

    | --- | --- |

    | `USING` | The `USING` clause specifies the spatial data type. This will be `GEOMETRY_GRID`
    or `GEOGRAPHY_GRID` and is required. |

    | `WITH GEOMETRY_GRID,``GEOGRAPHY_GRID` | The `WITH` options include the setting
    of the tessellation schema for either the `GEOMETRY_GRID` or the `GEOGRAPHY_GRID`
    based on the column data type. |

    | `BOUNDING_BOX` | The `BOUNDING_BOX` is used in the `GEOMETRY` data type to define
    the bounding box of the cells. This option does not have defaults and must be
    specified when creating indexes on the `GEOMETRY` data type. The `CREATE SPATIAL
    INDEX IDX_CITY_GEOM` (in Listing [7-2](#338675_4_En_7_Chapter.xhtml#PC2)) shows
    the syntax for this option. Setting the `BOUNDING_BOX` is done by setting the
    `xmin` and `ymin` and `xmax` and `ymax` coordinates, like so: `BOUNDING_BOX =
    (XMIN = xmin, YMIN = ymin, XMAX = xmax, YMAX = ymax`). |

    | `GRIDS` | The `GRIDS` option is used for altering the density of each grid layer.
    All layer defaults are medium density but can be altered to low or high to further
    tune spatial indexes and density settings. |


    Take the `CREATE TABLE` statement in Listing [7-1](#338675_4_En_7_Chapter.xhtml#PC1)
    as an example.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE CITY_MAPS (

    ID BIGINT PRIMARY KEY

    IDENTITY(1, 1),

    CITYNAME NVARCHAR(150),     CITY_GEOM GEOMETRY

    );

    GO

    Listing 7-1

    CREATE TABLE with a GEOMETRY Data Type

    ```


    This table will consist of the primary key, the city name, and then a `GEOMETRY`
    column that holds map data for the city itself. The city’s density may affect
    tuning the cells-per-object rule in tessellation as well as the density of each
    layer in the grid hierarchy.


    To index the `CITY_GEOM` column, the `CREATE` statement in Listing [7-2](#338675_4_En_7_Chapter.xhtml#PC2)
    would be used with a grid layer density of `LOW` for the first two layers and
    then `MEDIUM` and `HIGH` for the third and fourth layers. This density change
    allows for tuning the object in the index and the covering cells as the layers
    go deeper in the grid. The cells-per-object setting is 24 maximum cells an object
    can cover. The bounding box coordinates are also set.


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_CITY_GEOM

    ON CITY_MAPS (CITY_GEOM)

    USING GEOMETRY_GRID

    WITH (

    BOUNDING_BOX = ( xmin=-50, ymin=-50, xmax=500, ymax=500 ),

    GRIDS = (LOW, LOW, MEDIUM, HIGH),

    CELLS_PER_OBJECT = 24,

    PAD_INDEX  = ON );

    Listing 7-2

    Definition of a Spatial Index on a GEOMETRY Column

    ```


    To utilize and test the index created, the estimated and actual execution plans
    will need to be reviewed to determine whether the index has been used. In the
    case of spatial data, reviewing the actual results that a query will yield is
    also beneficial. SQL Server Management Studio has a built-in spatial data viewer
    that can be used for reviewing spatial data.


    Listing [7-3](#338675_4_En_7_Chapter.xhtml#PC3) creates a table that can benefit
    from spatial indexing. The table is created to store ZIP codes and other data
    from the US Census Bureau. This table will be created in the `AdventureWorks2017`
    database.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.tl_2021_us_county (

    STATEFP CHAR(2) NULL,

    COUNTYFP CHAR(3) NULL,

    COUNTYNS CHAR(8) NULL,

    GEOID CHAR(5) NULL,

    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    Listing 7-3

    Creating a Table to Hold GEOMETRY-Related Data

    ```


    The `GEOM` column will store the `GEOMETRY` data. This column will be used to
    query the data from SQL Server Management Studio to show the imaging that can
    be done from other applications.


    Note


    For the examples in this chapter, a shape file and the tool OGR2OGR are required.
    The shape file will come from TIGER/Line Shapefile, 2021, nation, US, Current
    County and Equivalent National Shapefile available at [`www2.census.gov/geo/tiger/TIGER2021/COUNTY/tl_2021_us_county.zip`](http://www2.census.gov/geo/tiger/TIGER2021/COUNTY/tl_2021_us_county.zip).
    OGR2OGR is available in OSGeo4W from [`http://download.osgeo.org/osgeo4w/osgeo4w-setup-v2.exe`](http://download.osgeo.org/osgeo4w/osgeo4w-setup-v2.exe).
    When installing the application, only install the GDAL package. After installation,
    run the PowerShell command [Environment]::SetEnvironmentVariable(“GDAL_DATA”,
    “C:\OSGeo4W64\share\gdal”, “Machine”) to set an environment variable. Finally,
    from the directory where the geography files were extracted to, run the command
    C:\OSGeo4W64\bin\ogr2ogr -f “MSSQLSpatial” MSSQL:“server=localhost;database=AdventureWorks2017;trusted_connection=yes;”
    -nln “tl_2021_us_county” -a_srs “ESPG:4269” -lco “GEOM_TYPE=geography” -lco “GEOM_NAME=geog4269”
    “tl_2021_us_county.shp” -s_srs EPSG:4269 -t_srs EPSG:26713.


    Reviewing the actual data from a query of a `GEOMETRY` data type column is not
    useful in the normal grid and tabular result set from within SSMS. To take advantage
    of the spatial data features, using the Spatial Results tab in SSMS is much more
    effective. Given the table from Listing [7-3](#338675_4_En_7_Chapter.xhtml#PC3),
    a `SELECT` on the column `GEOM` can be executed, and the results of the `SELECT`
    statement will automatically generate the Spatial Results tab. For example, the
    query in Listing [7-4](#338675_4_En_7_Chapter.xhtml#PC4) will result in an image
    generated of the state of Washington, coding each county area in a different color.


    ```

    USE AdventureWorks2017

    GO

    SELECT  *

    FROM    dbo.tl_2021_us_county AS tuc

    WHERE   tuc.STATEFP = ''41'';

    Listing 7-4

    Initial Query for Pulling Back Spatial Data

    ```


    Click the Spatial Results tab in the result window of SSMS to reveal the image
    generated by the query. The results should look similar to the image in Figure
    [7-3](#338675_4_En_7_Chapter.xhtml#Fig3).


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig3_HTML.jpg)


    A grid plot presents the output of the location, which has several county areas
    that are represented in different shades.


    Figure 7-3


    Output from a spatial query against county data


    The query in Listing [7-4](#338675_4_En_7_Chapter.xhtml#PC4) used a standard column,
    `STATEFP`, to filter the information so that only counties within a particular
    state were viewed at one time. Before using this data, though, it is a good idea
    to ensure that only good shapes reside within the `GEOM` column. It is possible
    to have improper data stored, so cleaning the data may be required. To do this,
    the method `MakeValid()` can be used to modify any `GEOMETRY` instances, making
    them valid. According to the documentation from Microsoft, using the function
    can cause shapes to “shift slightly,” but the extent to which it may affect the
    shapes under your control is unclear. Executing Listing [7-5](#338675_4_En_7_Chapter.xhtml#PC5)
    will result in an update to any invalid `GEOMETRY` instances in the `GEOM` column.


    ```

    USE AdventureWorks2017

    GO

    UPDATE  dbo.tl_2021_us_county

    SET     GEOM = GEOM.MakeValid();

    Listing 7-5

    Using MakeValid() to Correct Any Invalid GEOMETRY Instances

    ```


    The `MakeValid()` method should be used sparingly, and all invalid `GEOMETRY`
    instances that are found should be reviewed in a production setting. Shapes should
    carefully be reviewed after using the `MakeValid()` function as it could possibly
    modify those shapes.'
  trans: '## 创建空间索引


    `创建空间索引`语句具有与普通聚集或非聚集索引大部分相同的选项。然而，此索引类型需要特定的选项，如表 7-1 所列。


    表 7-1：空间索引选项


    | 选项名称 | 描述 |

    | --- | --- |

    | `USING` | `USING` 子句指定空间数据类型。这必须是 `GEOMETRY_GRID` 或 `GEOGRAPHY_GRID`，且是必需的。
    |

    | `WITH GEOMETRY_GRID, GEOGRAPHY_GRID` | `WITH` 选项包括基于列数据类型为 `GEOMETRY_GRID` 或
    `GEOGRAPHY_GRID` 设置细分方案。 |

    | `BOUNDING_BOX` | `BOUNDING_BOX` 用于 `GEOMETRY` 数据类型，以定义单元的边框。此选项没有默认值，在 `GEOMETRY`
    数据类型上创建索引时必须指定。清单 7-2 中的 `CREATE SPATIAL INDEX IDX_CITY_GEOM` 展示了此选项的语法。设置 `BOUNDING_BOX`
    是通过设置 `xmin` 和 `ymin` 以及 `xmax` 和 `ymax` 坐标来完成的，如下所示：`BOUNDING_BOX = (XMIN = xmin,
    YMIN = ymin, XMAX = xmax, YMAX = ymax)`。 |

    | `GRIDS` | `GRIDS` 选项用于更改每个网格层的密度。所有层的默认值为中等密度，但可以更改为低或高，以进一步调整空间索引和密度设置。 |


    以清单 7-1 中的 `CREATE TABLE` 语句为例。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE CITY_MAPS (

    ID BIGINT PRIMARY KEY

    IDENTITY(1, 1),

    CITYNAME NVARCHAR(150),

    CITY_GEOM GEOMETRY

    );

    GO

    Listing 7-1

    CREATE TABLE with a GEOMETRY Data Type

    ```


    该表将包含主键、城市名称，然后是一个 `GEOMETRY` 列，用于存储城市本身的地图数据。城市的密度可能会影响调整细分中每个对象的单元规则以及网格层次结构中每层的密度。


    要为 `CITY_GEOM` 列创建索引，将使用清单 7-2 中的 `CREATE` 语句，其中前两层的网格层密度为 `LOW`，第三层和第四层分别为 `MEDIUM`
    和 `HIGH`。这种密度更改允许调整索引中的对象和覆盖的单元，因为层在网格中越深入。每个对象的单元设置是对象可以覆盖的最大 24 个单元。边框坐标也已设置。


    ```

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_CITY_GEOM

    ON CITY_MAPS (CITY_GEOM)

    USING GEOMETRY_GRID

    WITH (

    BOUNDING_BOX = ( xmin=-50, ymin=-50, xmax=500, ymax=500 ),

    GRIDS = (LOW, LOW, MEDIUM, HIGH),

    CELLS_PER_OBJECT = 24,

    PAD_INDEX  = ON );

    Listing 7-2

    Definition of a Spatial Index on a GEOMETRY Column

    ```


    要利用和测试创建的索引，需要检查预估和实际执行计划，以确定索引是否已被使用。对于空间数据，审查查询将产生的实际结果也是有益的。SQL Server Management
    Studio 有一个内置的空间数据查看器，可用于查看空间数据。


    清单 7-3 创建了一个可受益于空间索引的表。该表用于存储来自美国人口普查局的邮政编码和其他数据。此表将在 `AdventureWorks2017` 数据库中创建。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.tl_2021_us_county (

    STATEFP CHAR(2) NULL,

    COUNTYFP CHAR(3) NULL,

    COUNTYNS CHAR(8) NULL,

    GEOID CHAR(5) NULL,

    NAME CHAR(100) NULL,

    NAMELSAD CHAR(100) NULL,

    LSAD CHAR(2) NULL,

    CLASSFP CHAR(2) NULL,

    MTFCC CHAR(5) NULL,

    CSAFP CHAR(3) NULL,

    CBSAFP CHAR(5) NULL,

    METDIVFP CHAR(5) NULL,

    FUNCSTAT CHAR(1) NULL,

    ALAND FLOAT NULL,

    AWATER FLOAT NULL,

    INTPTLAT CHAR(11) NULL,

    INTPTLON CHAR(12) NULL,

    GEOM GEOMETRY NULL

    );

    Listing 7-3

    Creating a Table to Hold GEOMETRY-Related Data

    ```


    `GEOM` 列将存储 `GEOMETRY` 数据。此列将用于从 SQL Server Management Studio 查询数据，以显示可以从其他应用程序完成的成像。


    > **注意**

    > 对于本章的示例，需要一个 shape 文件和工具 OGR2OGR。shape 文件来自 [TIGER/Line Shapefile, 2021, nation,
    US, Current County and Equivalent National Shapefile](http://www2.census.gov/geo/tiger/TIGER2021/COUNTY/tl_2021_us_county.zip)。OGR2OGR
    可从 [OSGeo4W](http://download.osgeo.org/osgeo4w/osgeo4w-setup-v2.exe) 获取。安装应用程序时，仅安装
    GDAL 包。安装后，运行 PowerShell 命令 `[Environment]::SetEnvironmentVariable(“GDAL_DATA”,
    “C:\OSGeo4W64\share\gdal”, “Machine”)` 以设置环境变量。最后，从提取地理文件的目录，运行命令 `C:\OSGeo4W64\bin\ogr2ogr
    -f “MSSQLSpatial” MSSQL:“server=localhost;database=AdventureWorks2017;trusted_connection=yes;”
    -nln “tl_2021_us_county” -a_srs “ESPG:4269” -lco “GEOM_TYPE=geography” -lco “GEOM_NAME=geog4269”
    “tl_2021_us_county.shp” -s_srs EPSG:4269 -t_srs EPSG:26713`。


    在 SSMS 的普通网格和表格结果集中查看 `GEOMETRY` 数据类型列的查询的实际数据并不有用。要利用空间数据功能，使用 SSMS 中的“空间结果”选项卡要有效得多。给定清单
    7-3 中的表，可以对 `GEOM` 列执行 `SELECT`，`SELECT` 语句的结果将自动生成“空间结果”选项卡。例如，清单 7-4 中的查询将生成华盛顿州的图像，每个县区域用不同的颜色编码。


    ```

    USE AdventureWorks2017

    GO

    SELECT  *

    FROM    dbo.tl_2021_us_county AS tuc

    WHERE   tuc.STATEFP = ''41'';

    Listing 7-4

    Initial Query for Pulling Back Spatial Data

    ```


    单击 SSMS 结果窗口中的“空间结果”选项卡，以显示查询生成的图像。结果应类似于图 7-3 中的图像。


    ![输出图像](img/338675_4_En_7_Fig3_HTML.jpg)


    图 7-3：针对县数据的空间查询输出

    网格图显示了位置的输出，其中有多个县区域以不同的阴影表示。


    清单 7-4 中的查询使用了标准列 `STATEFP` 来过滤信息，以便一次只查看特定州内的县。但在使用此数据之前，最好确保 `GEOM` 列中只包含有效的形状。可能会存储不正确的数据，因此可能需要清理数据。为此，可以使用方法
    `MakeValid()` 来修改任何 `GEOMETRY` 实例，使其有效。根据 Microsoft 的文档，使用该函数可能会导致形状“轻微移动”，但它对你控制的形状可能产生的影响程度尚不清楚。执行清单
    7-5 将更新 `GEOM` 列中任何无效的 `GEOMETRY` 实例。


    ```

    USE AdventureWorks2017

    GO

    UPDATE  dbo.tl_2021_us_county

    SET     GEOM = GEOM.MakeValid();

    Listing 7-5

    Using MakeValid() to Correct Any Invalid GEOMETRY Instances

    ```


    `MakeValid()` 方法应谨慎使用，并且在生产环境中应审查发现的所有无效 `GEOMETRY` 实例。使用 `MakeValid()` 函数后，应仔细审查形状，因为它可能会修改这些形状。'
- fmt: '# Spatial columns can also be used to filter the data being returned based
    on the behavior of locations and distances.


    Listing [7-6](#338675_4_En_7_Chapter.xhtml#PC6) shows an example of invoking one
    of the special methods that have been defined to work with spatial information.
    The query returns the ten counties closest to the county of Tulsa in Oklahoma
    (see Figure [7-4](#338675_4_En_7_Chapter.xhtml#Fig4)).


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig4_HTML.jpg)


    A grid plot presents the output of the state of Oklahoma, which has several county
    areas and is represented in different shades.


    Figure 7-4


    Narrowing the results of the ZIP code data using `STDistance()`


    ```sql

    USE AdventureWorks2017

    GO

    DECLARE @polygon GEOMETRY;

    SELECT  @polygon = tuc.GEOM

    FROM    dbo.tl_2021_us_county AS tuc

    WHERE   tuc.NAME = ''Tulsa'';

    SELECT TOP 10

    tuc.GEOM,

    tuc.GEOM.STDistance(@polygon),

    tuc.NAME

    FROM    dbo.tl_2021_us_county AS tuc

    WHERE   tuc.GEOM.STDistance(@polygon) IS NOT NULL

    AND tuc.GEOM.STDistance(@polygon) < 1

    ORDER BY tuc.GEOM.STDistance(@polygon);

    ```

    Listing 7-6

    Query for the Top Ten Closest ZIP Codes to a Given Point


    The query from Listing [7-6](#338675_4_En_7_Chapter.xhtml#PC6) creates the execution
    plan shown in Figure [7-5](#338675_4_En_7_Chapter.xhtml#Fig5).


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig5_HTML.png)


    A flow diagram depicts execution plan of table scan at cost 4% to filter at cost
    95%, compute scalar at cost 0%, sort at cost 1%, selects the table at cost 0%.


    Figure 7-5


    Execution plan generated from `STDistance()` without indexing


    Reviewing the Spatial Results tab shows the northeast corner of Oklahoma containing
    what the ten counties will look like Figure [7-4](#338675_4_En_7_Chapter.xhtml#Fig4).
    However, the query’s execution plan shown in Figure [7-5](#338675_4_En_7_Chapter.xhtml#Fig5)
    is less than ideal, with a table scan and a high-cost `filter` operation. With
    the use of the `STDistance` predicate, the query is a candidate for using an index
    on the `GEOMETRY` column, so an index can and should be added.


    ## Supporting Methods with Indexes


    With `GEOMETRY` and `GEOGRAPHY` data types, only certain methods are supported
    with the use of spatial indexes. The `STDistance()` method will support indexing,
    which would benefit the query shown in Listing [7-6](#338675_4_En_7_Chapter.xhtml#PC6).
    Before diving deeply into indexing the query, the methods that do support indexing
    should be pointed out. These methods have rules in how respective predicates are
    written. The following is a list of supported methods for the `GEOMETRY` type:


    *   `GEOMETRY.STContains() = 1`

    *   `GEOMETRY.STDistance() < number`

    *   `GEOMETRY.STDistance() <= number`

    *   `GEOMETRY.STEquals() = 1`

    *   `GEOMETRY.STIntersects() = 1`

    *   `GEOMETRY.STOverlaps() = 1`

    *   `GEOMETRY.STTouches() = 1`

    *   `GEOMETRY.STWithin() = 1`


    The following are the supported methods for the `GEOGRAPHY` type:


    *   `GEOGRAPHY.STIntersects() = 1`

    *   `GEOGRAPHY.STEquals() = 1`

    *   `GEOGRAPHY.STDistance() < number`

    *   `GEOGRAPHY.STDistance() <= number`


    For both `GEOMETRY` and `GEOGRAPHY`, to return any result that is not null, the
    first parameter and the second parameter must have the same spatial reference
    identifier (`SRID`), which is a spatial reference system based on a specific ellipsoid
    used to flatten or round the earth.


    Recall that the query used in Figure [7-6](#338675_4_En_7_Chapter.xhtml#Fig6)
    to return the counties around Tulsa uses the `STDistance()` method in the expression
    `STDistance(@polygon) < 1`. Based on the methods supported and analyzing the options
    and `CREATE` syntax for spatial indexing, the `INDEX CREATE` statement shown in
    Listing [7-7](#338675_4_En_7_Chapter.xhtml#PC7) can be used in an attempt to optimize
    the query.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig6_HTML.jpg)


    A flow diagram of execution plan illustrates the table-valued function, and the
    scan are executed with nested loop, math match, clustered index seek, and sort
    and select.


    Figure 7-6


    Optimized details of a tuned execution plan using spatial data


    ```sql

    USE AdventureWorks2017

    GO

    CREATE SPATIAL INDEX IDX_COUNTY_GEOM ON dbo.tl_2021_us_county

    (

    GEOM

    ) USING  GEOMETRY_GRID

    WITH (

    BOUNDING_BOX =(-91.513079, -87.496494, 36.970298, 36.970298),

    GRIDS =(LEVEL_1 = LOW,LEVEL_2 = MEDIUM,LEVEL_3 = MEDIUM,LEVEL_4 = HIGH),

    CELLS_PER_OBJECT = 16,

    PAD_INDEX  = OFF, SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF,

    ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON) ON [PRIMARY];

    GO

    ```

    Listing 7-7

    `CREATE` Statement for a Spatial Index


    Executing the query in Listing [7-7](#338675_4_En_7_Chapter.xhtml#PC7) results
    in a much different execution plan, shown in Figure [7-6](#338675_4_En_7_Chapter.xhtml#Fig6).
    It results in a shorter duration when executing and returning the results, plus
    spatial results. The largest difference in the execution plan is the use of the
    index `IDX_COUNTY_GEOM`.


    There is an overall improvement via a more optimal execution plan from the creation
    of the spatial index. The index and execution plan are good, but validating the
    actual improvement by checking the duration in execution time should not be skipped.
    By capturing the execution time using Extended Events, an overall review of the
    execution of the statement can be retrieved. In the case of the query that searches
    for the counties near Tulsa, the results with the index in place return 500 milliseconds.
    Dropping the index and executing the same query returns 1,500 milliseconds for
    total execution time. This test is extremely basic, but it is a solid foundation
    upon which to build a strategy for indexing existing spatial data to improve overall
    performance.


    ## Understanding Statistics, Properties, and Information


    Indexes in general have many data management views and functions that make their
    administration easier and more efficient than manual metrics gathering. With spatial
    indexes, there are additional catalog views that are included that assist in the
    unique settings and administration of them. In addition to these views, there
    are also built-in stored procedures that can be invoked to get information about
    spatial indexes.'
