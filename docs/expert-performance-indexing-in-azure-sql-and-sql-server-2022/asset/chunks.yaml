    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 13-17

    Index Intersection Pattern

    ```


    Index intersection is a feature of SQL Server that is used to better satisfy queries
    when more than one non-clustered index from the same table can provide the results
    for the queries. When indexing for index intersection, the aim is to have multiple
    indexes based on the Search Columns pattern that can be used together in numerous
    combinations to allow for a variety of filters. One key thing to remember with
    the Index Intersection pattern is that SQL Server cannot be instructed as to when
    to use index intersection; it will opt to use it when it is appropriate for each
    request, the underlying indexes, and their associated data.'
  trans: '## 索引交叉


    “搜索列”模式的目标是创建一个索引，以最小化查询的页面读取次数并提升其性能。然而，有时查询会超出前面演示的单列示例。额外的列可能出现在谓词中，或在 `SELECT`
    语句中返回。解决此问题的方法之一是创建包含额外列的非聚集索引。当存在可以满足 `WHERE` 子句中每个谓词的索引时，SQL Server 可以使用多个非聚集索引来查找两者之间匹配聚集键的行。此操作称为索引交叉。


    为了演示索引交叉模式，我们将回顾当筛选条件扩展到涵盖多列时会发生什么。清单 13-16 中的代码包含了扩展后的 `SELECT` 语句和 `WHERE` 子句，将谓词扩展为包括
    `LastName` 为 Cox 的行。


    查询的更改导致性能与上一节的结果相比发生了显著变化。由于查询中增加了列，满足查询需要读取 68 个页面，而之前未包含 `LastName` 时只需读取 2
    个页面（图 13-19）。页面读取次数的增加是由于执行计划的改变（图 13-20）。在此执行计划中，查询执行增加了两个额外的操作：一个键查找和一个嵌套循环。添加这些运算符是因为索引
    `IX_Contacts_FirstName` 无法提供满足查询所需的所有信息。SQL Server 判定使用 `IX_Contacts_FirstName`
    并从聚集索引中查找缺失信息仍然比扫描聚集索引成本更低。问题在于，对于非聚集索引匹配的每一行，都必须在聚集索引上进行一次查找。虽然键查找并不总是问题，但它们可能会推高查询的
    CPU 和 I/O 成本。


    ![](img/338675_4_En_13_Fig20_HTML.png)

    一个面板，打开了执行计划选项卡，包含两行文本，对应查询 1，成本相对于批处理为 100%。下方是一个流程图，展示了多条路径：索引查找，非聚集，Contacts，成本占
    14%；键查找，聚集，Contacts，成本占 86%；最后选择操作成本占 0%。

    图 13-20

    未利用索引交叉模式时的执行计划


    ![](img/338675_4_En_13_Fig19_HTML.png)

    一个面板，打开了消息选项卡，其中有一行条目，内容为：表 ''Contacts''，扫描计数 1，逻辑读取 68，物理读取 0，预读 0，LOB 逻辑读取 0，LOB
    物理读取 0，在 2 1 行受影响 标签之间。

    图 13-19

    未利用索引交叉模式时的统计信息 I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    清单 13-16

    未利用索引交叉模式的查询


    利用索引交叉模式是提升清单 13-16 中查询性能的少数方法之一。当 SQL Server 可以在同一张表上使用多个非聚集索引来满足查询要求时，就会发生索引交叉。对于清单
    13-16 中的查询，查找 `FirstName` 最直接的路径是通过索引 `IX_Contacts_FirstName`。然而，此时为了筛选并返回 `LastName`
    列，SQL Server 使用了聚集索引并对每一行执行了一次查找，类似于图 13-21 左侧的图像。另一种情况是，如果存在一个用于 `LastName` 列的索引，SQL
    Server 本可以将其与 `IX_Contacts_FirstName` 一起使用。本质上，通过索引交叉模式，SQL Server 能够执行类似于在同一张表的索引之间进行联接的操作，以找到两者之间重叠的行，如图
    13-21 右侧所示。


    ![](img/338675_4_En_13_Fig21_HTML.png)

    一个图表，左侧是名字索引（22 行），连接到 6 个未标记的水平条，位于一个向下的箭头之上。右侧是一个维恩图，展示了在名字索引（22 行）和姓氏索引（99
    行）之间存在 1 行。

    图 13-21

    带键查找的索引查找 vs. 使用索引交叉模式的两个索引查找


    为了演示索引交叉模式并让 SQL Server 使用索引交叉，下一个示例在 `LastName` 列上创建了一个索引（清单 13-17）。创建了索引 `IX_Contacts_LastName`
    后，结果与索引未创建时相比发生了显著变化。第一个变化在于读取次数。之前的执行需要读取 68 次，而现在只需读取 5 次（图 13-22）。读取次数减少的原因是
    SQL Server 在查询计划中利用了索引交叉（图 13-23）。索引 `IX_Contacts_FirstName` 和 `IX_Contacts_LastName`
    被用于满足查询，而无需返回聚集索引检索查询数据。这是因为两个索引一起可以完全满足查询需求。


    ![](img/338675_4_En_13_Fig23_HTML.png)

    一个面板，打开了执行计划选项卡，包含两行文本，对应查询 1，成本相对于批处理为 100%。下方是一个流程图，展示了多条路径：索引查找，非聚集，Contacts，成本占
    26%；索引查找，非聚集，Contacts，成本占 27%；最后选择操作成本占 0%。

    图 13-23

    索引交叉模式的执行计划


    ![](img/338675_4_En_13_Fig22_HTML.png)

    一个面板，打开了消息选项卡，其中有一行条目，内容为：表 ''Contacts''，扫描计数 2，逻辑读取 5，物理读取 0，预读 0，LOB 逻辑读取 0，在
    2 1 行受影响 标签之间。

    图 13-22

    索引交叉模式的统计信息 I/O 结果


    ```

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_LastName ON dbo.Contacts (LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    清单 13-17

    索引交叉模式


    索引交叉是 SQL Server 的一项功能，当同一张表的多个非聚集索引可以为查询提供结果时，它用于更好地满足查询。在为索引交叉设计索引时，目标是拥有基于“搜索列”模式的多个索引，这些索引可以以多种组合方式一起使用，以支持各种筛选条件。关于索引交叉模式需要记住的一个关键点是，SQL
    Server 无法被指示何时使用索引交叉；它会在每个请求、底层索引及其关联数据合适时选择使用它。'
- fmt: '## Multiple Column


    前两节中的示例都集中于在索引中包含单个键列的索引。而非聚集索引最多可以包含16列。虽然“窄”是定义良好的聚集索引的一个属性，但同样的原则并不总是适用于非聚集索引。相反，非聚集索引应包含尽可能多的列，以确保能被尽可能多的查询使用。如果许多查询使用相同的列作为谓词，那么通常将它们全部包含在一个索引中是个好主意。


    值得注意的是，仅仅因为一个索引可以包含很多列，并不意味着它就应该包含很多列。如果一两个列具有高选择性，那么即使还需要键查找，这几个列可能也足以确保相当快的索引查找。通常，查询持续时间应该是衡量索引有效性的首要基准，其次是资源消耗。


    演示使用多列模式索引的一个简单方法是使用前一节中的相同查询并应用此模式。在该查询中，构建了两个索引，一个在`FirstName`列上，另一个在`LastName`列上。对于多列模式，新索引将同时包含这两个列（代码清单
    [13-18](#338675_4_En_13_Chapter.xhtml#PC18)）。


    正如统计数据所示（图 [13-24](#338675_4_En_13_Chapter.xhtml#Fig24)），通过使用多列模式，返回请求结果所需的读取次数有所减少。从索引交集模式的五次读取减少到多列模式的两次读取。此外，执行计划（如图
    [13-25](#338675_4_En_13_Chapter.xhtml#Fig25) 所示）也得到了简化。现在只包含一个在索引 `IX_Contacts_FirstNameLastName`
    上的索引查找操作。


    ![图13-25](images/338675_4_En_13_Chapter/338675_4_En_13_Fig25_HTML.png)

    *图 13-25：多列模式的执行计划*


    ![图13-24](images/338675_4_En_13_Chapter/338675_4_En_13_Fig24_HTML.png)

    *图 13-24：多列模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstNameLastName

    ON dbo.Contacts (FirstName, LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    *代码清单 13-18：多列模式*


    在为数据库编制索引时，实现多列模式与搜索列模式同样重要。该模式通过将最常用于谓词的列组合在一起，有助于减少所使用的索引数量。虽然这个模式与索引交集模式的部分价值相矛盾，但关键在于平衡。在某些情况下，对于查询谓词变化很多的表，依赖单列索引上的索引交集将提供最佳性能。而在其他时候，具有特定列顺序的更宽的索引将是有益的。同时也要考虑候选索引是否会在应用程序的其他地方有用。如果是这样，那么利用这些信息在多列索引或多单列索引之间做出明智的决定。


    尝试这两种模式，并以提供最佳整体性能的方式应用它们。请记住，如果索引不适用，它们总是可以被删除的。


    ## Covering Index


    下一个索引模式是覆盖索引模式。使用覆盖索引模式时，可以将谓词之外的列添加到索引的键列中，以便这些值可以作为查询 `SELECT` 子句的一部分返回。这个模式在
    SQL Server 中已经成为标准的索引实践一段时间了。然而，索引创建方式的增强使得这个模式不如过去那么有用了。不过，讨论这个模式还是有价值的，因为许多使用
    SQL Server 的人都很熟悉它。


    为了开始研究覆盖索引模式，将提供一个示例来定义该索引所解决的问题。为了展示问题，下一个测试查询将在 `SELECT` 列表中包含 `IsActive` 列（代码清单
    [13-19](#338675_4_En_13_Chapter.xhtml#PC19)）。添加此列后，I/O 统计信息再次从两次读取增加到五次读取，如图 [13-26](#338675_4_En_13_Chapter.xhtml#Fig26)
    所示。性能的变化与执行计划的变化直接相关（见图 [13-27](#338675_4_En_13_Chapter.xhtml#Fig27)），其中包含了键查找和嵌套循环。与前面的示例一样，当查询中添加了未包含在非聚集索引中的项时，需要从包含表的所有数据的聚集索引中检索它们。


    ![图13-27](images/338675_4_En_13_Chapter/338675_4_En_13_Fig27_HTML.png)

    *图 13-27：未利用覆盖索引模式的查询的执行计划*


    ![图13-26](images/338675_4_En_13_Chapter/338675_4_En_13_Fig26_HTML.png)

    *图 13-26：未利用覆盖索引模式的查询的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    *代码清单 13-19：未利用覆盖索引模式的查询*


    一个理想的索引应该能够处理查询的筛选条件，并返回 `SELECT` 列表中请求的列。覆盖索引模式可以满足这些要求。即使 `IsActive` 不是查询的谓词之一，也可以将其添加到索引中，SQL
    Server 可以使用该键列来返回查询的列值。为了演示覆盖索引模式，将创建一个以 `FirstName`、`LastName` 和 `IsActive` 作为键列的索引（见代码清单
    [13-20](#338675_4_En_13_Chapter.xhtml#PC20)）。有了索引 `IX_Contacts_FirstNameLastName`
    之后，每次执行的读取次数恢复到两次（见图 [13-28](#338675_4_En_13_Chapter.xhtml#Fig28)）。执行计划现在也只使用索引查找（见图
    [13-29](#338675_4_En_13_Chapter.xhtml#Fig29)）。


    ![图13-29](images/338675_4_En_13_Chapter/338675_4_En_13_Fig29_HTML.png)

    *图 13-29：覆盖索引模式的执行计划*


    ![图13-28](images/338675_4_En_13_Chapter/338675_4_En_13_Fig28_HTML.png)

    *图 13-28：覆盖索引模式的 Statistics I/O 结果*'
  raw: '### Multiple Column


    The examples in the previous two sections focused on indexes that included a single
    key column in the index. Non-clustered indexes, though, can have up to 16 columns.
    While being narrow was an attribute of a well-defined clustered index, the same
    does not always apply to non-clustered indexes. Instead, non-clustered indexes
    should contain as many columns as necessary to be used by the most queries possible.
    If many queries use the same columns as predicates, it is often a good idea to
    include them all in a single index.


    It is worth noting that just because an index can have many columns in, it does
    not mean it should. If one or two columns are highly selective, then those few
    columns may be sufficient to ensure a reasonably fast index seek, even if a key
    lookup is also required. Query duration should generally be the primary benchmark
    as to index effectiveness, followed by resource consumption.


    A simple method for demonstrating an index using the Multiple Column pattern is
    to use the same query from the previous section and apply this pattern to it.
    In that query, two indexes were built, one each on the `FirstName` and `LastName`
    columns. For the Multiple Column pattern, the new index will include both the
    columns together (Listing [13-18](#338675_4_En_13_Chapter.xhtml#PC18)).


    As the statistics indicate (Figure [13-24](#338675_4_En_13_Chapter.xhtml#Fig24)),
    by using the Multiple Column pattern, there is a reduction in the number of reads
    necessary to return the request results. Instead of five reads from the Index
    Intersection pattern, there are only two reads with the Multiple Column pattern.
    Additionally, the execution plan (shown in Figure [13-25](#338675_4_En_13_Chapter.xhtml#Fig25))
    has been simplified. There is only an index seek on the index `IX_Contacts_FirstNameLastName`.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig25_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting the
    connection from index seek, nonclustered, contacts, at 100% cost to select at
    0% cost.


    Figure 13-25


    Execution plan for the Multiple Column pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig24_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 2, physical reads 0, read-ahead reads
    0, l o b logical reads 0, l o b physical reads 0 between 2 1 row affected labels.


    Figure 13-24


    Statistics I/O results for the Multiple Column pattern


    ```

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstNameLastName

    ON dbo.Contacts (FirstName, LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 13-18

    Multiple Column Pattern

    ```


    The Multiple Column pattern is as important to implement as the Search Columns
    pattern when indexing a database. This pattern can help reduce the number of indexes
    used by putting the columns together that are most often used in predicates. While
    this pattern does contradict some of the value of the Index Intersection pattern,
    the key between them is balance. In some cases, relying on index intersection
    on single-column indexes will provide the best performance for a table with many
    variations on the query predicates. In other times, wider indexes with specific
    orders to the columns will be beneficial. Also consider if candidate indexes will
    be useful elsewhere in an application. If so, then use that information to make
    an informed decision between a multicolumn index or multiple single-column indexes.


    Try both patterns and apply them in the manner that provides the best overall
    performance. Remember that indexes can always be removed if they don’t work out.


    ### Covering Index


    The next indexing pattern is the Covering Index pattern. With the Covering Index
    pattern, columns outside the predicates are added to an index’s key columns to
    allow those values to be returned as part of the `SELECT` clauses of queries.
    This pattern has been a standard indexing practice for a while with SQL Server.
    Enhancements in how indexes can be created, though, make this pattern less useful
    than it was in the past. It is a worthwhile pattern to discuss as it is familiar
    to many people who work with SQL Server.


    To begin looking at the Covering Index pattern, an example will be provided that
    defines the problem that the index solves. To show the issue, the next test query
    will include the `IsActive` column in the `SELECT` list (Listing [13-19](#338675_4_En_13_Chapter.xhtml#PC19)).
    With this column added, the I/O statistics increase again from two reads to five
    reads, shown in Figure [13-26](#338675_4_En_13_Chapter.xhtml#Fig26). The change
    in performance is directly related to the change in the execution plan (see Figure
    [13-27](#338675_4_En_13_Chapter.xhtml#Fig27)) that includes a key lookup and a
    nested loop. As with the previous examples, as items not included in the non-clustered
    index are added to the query, they need to be retrieved from the clustered index,
    which contains all data for the table.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig27_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting multiple
    paths, namely, index seek, nonclustered, contacts, and key lookup, clustered,
    contacts, at 50% cost each to select at 0% cost.


    Figure 13-27


    Execution plan for a query that does not take advantage of the Covering Index
    pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig26_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 5, physical reads 0, read-ahead reads
    0, l o b logical reads 0 between 2 1 row affected labels.


    Figure 13-26


    Statistics I/O results for a query that does not take advantage of the Covering
    Index pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    Listing 13-19

    Query that does not take advantage of the Covering Index Pattern

    ```


    An ideal index would be able to accommodate the filters on the query and also
    return the columns requested in the `SELECT` list. The Covering Index pattern
    can fulfill these requirements. Even though `IsActive` is not one of the predicates
    for the query, it can be added to the index, and SQL Server can use that key column
    to return the column values with the query. To demonstrate the Covering Index
    pattern, an index will be created that has `FirstName`, `LastName`, and `IsActive`
    as the key columns (see Listing [13-20](#338675_4_En_13_Chapter.xhtml#PC20)).
    With the index `IX_Contacts_FirstNameLastName` in place, the reads return to two
    per execution (see Figure [13-28](#338675_4_En_13_Chapter.xhtml#Fig28)). The execution
    plan is also now using only an index seek (see Figure [13-29](#338675_4_En_13_Chapter.xhtml#Fig29)).


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig29_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting the
    connection from index seek, nonclustered, contacts, at 100% cost to select at
    0% cost.


    Figure 13-29


    Execution plan for the Covering Index pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig28_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 2, physical reads 0, read-ahead reads
    0, l o b logical reads 0 between 2 1 row affected labels.


    Figure 13-28


    Statistics I/O results for the Covering Index pattern'
  trans: '## 多列索引


    前两节中的示例都集中于在索引中包含单个键列的索引。而非聚集索引最多可以包含 16 列。虽然“窄”是定义良好的聚集索引的一个属性，但同样的原则并不总是适用于非聚集索引。相反，非聚集索引应包含尽可能多的列，以确保能被尽可能多的查询使用。如果许多查询使用相同的列作为谓词，那么通常将它们全部包含在一个索引中是个好主意。


    值得注意的是，仅仅因为一个索引可以包含很多列，并不意味着它就应该包含很多列。如果一两个列具有高选择性，那么即使还需要键查找，这几个列可能也足以确保相当快的索引查找。通常，查询持续时间应该是衡量索引有效性的首要基准，其次是资源消耗。


    演示使用多列模式索引的一个简单方法是使用前一节中的相同查询并应用此模式。在该查询中，构建了两个索引，一个在`FirstName`列上，另一个在`LastName`列上。对于多列模式，新索引将同时包含这两个列（代码清单
    13-18）。


    正如统计数据所示（图 13-24），通过使用多列模式，返回请求结果所需的读取次数有所减少。从索引交集模式的五次读取减少到多列模式的两次读取。此外，执行计划（如图
    13-25 所示）也得到了简化。现在只包含一个在索引 `IX_Contacts_FirstNameLastName` 上的索引查找操作。


    ![图 13-25](img/338675_4_En_13_Fig25_HTML.png)

    *图 13-25：多列模式的执行计划*


    ![图 13-24](img/338675_4_En_13_Fig24_HTML.png)

    *图 13-24：多列模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstNameLastName

    ON dbo.Contacts (FirstName, LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    *代码清单 13-18：多列模式*


    在为数据库编制索引时，实现多列模式与搜索列模式同样重要。该模式通过将最常用于谓词的列组合在一起，有助于减少所使用的索引数量。虽然这个模式与索引交集模式的部分价值相矛盾，但关键在于平衡。在某些情况下，对于查询谓词变化很多的表，依赖单列索引上的索引交集将提供最佳性能。而在其他时候，具有特定列顺序的更宽的索引将是有益的。同时也要考虑候选索引是否会在应用程序的其他地方有用。如果是这样，那么利用这些信息在多列索引或多单列索引之间做出明智的决定。


    尝试这两种模式，并以提供最佳整体性能的方式应用它们。请记住，如果索引不适用，它们总是可以被删除的。


    ## 覆盖索引


    下一个索引模式是覆盖索引模式。使用覆盖索引模式时，可以将谓词之外的列添加到索引的键列中，以便这些值可以作为查询 `SELECT` 子句的一部分返回。这个模式在
    SQL Server 中已经成为标准的索引实践一段时间了。然而，索引创建方式的增强使得这个模式不如过去那么有用了。不过，讨论这个模式还是有价值的，因为许多使用
    SQL Server 的人都很熟悉它。


    为了开始研究覆盖索引模式，将提供一个示例来定义该索引所解决的问题。为了展示问题，下一个测试查询将在 `SELECT` 列表中包含 `IsActive` 列（代码清单
    13-19）。添加此列后，I/O 统计信息再次从两次读取增加到五次读取，如图 13-26 所示。性能的变化与执行计划的变化直接相关（见图 13-27），其中包含了键查找和嵌套循环。与前面的示例一样，当查询中添加了未包含在非聚集索引中的项时，需要从包含表的所有数据的聚集索引中检索它们。


    ![图 13-27](img/338675_4_En_13_Fig27_HTML.png)

    *图 13-27：未利用覆盖索引模式的查询的执行计划*


    ![图 13-26](img/338675_4_En_13_Fig26_HTML.png)

    *图 13-26：未利用覆盖索引模式的查询的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName,

    IsActive

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    *代码清单 13-19：未利用覆盖索引模式的查询*


    一个理想的索引应该能够处理查询的筛选条件，并返回 `SELECT` 列表中请求的列。覆盖索引模式可以满足这些要求。即使 `IsActive` 不是查询的谓词之一，也可以将其添加到索引中，SQL
    Server 可以使用该键列来返回查询的列值。为了演示覆盖索引模式，将创建一个以 `FirstName`、`LastName` 和 `IsActive` 作为键列的索引（见代码清单
    13-20）。有了索引 `IX_Contacts_FirstNameLastName` 之后，每次执行的读取次数恢复到两次（见图 13-28）。执行计划现在也只使用索引查找（见图
    13-29）。


    ![图 13-29](img/338675_4_En_13_Fig29_HTML.png)

    *图 13-29：覆盖索引模式的执行计划*


    ![图 13-28](img/338675_4_En_13_Fig28_HTML.png)

    *图 13-28：覆盖索引模式的 Statistics I/O 结果*'
