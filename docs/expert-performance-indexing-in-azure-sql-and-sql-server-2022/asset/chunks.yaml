- fmt: '# 11. Index Maintenance


    Like anything in life, indexes require maintenance. Over time, the performance
    benefits of indexes can wane or, through data modifications, their sizes and the
    underlying statistics can drift and bloat. To prevent these issues, indexes must
    be maintained. Doing so will help ensure that a database will remain a lean, mean
    query-running machine!


    With regard to maintenance, there are five areas to consider:


    - Index fragmentation

    - Heap bloat and forwarding

    - Columnstore fragmentation

    - Statistics

    - In-memory statistics


    Each plays a key role in maintaining a properly indexed and well-performing database.


    This chapter explores all of these areas. This discussion will include issues
    that arise from not maintaining indexes as well as a review of strategies for
    implementing an index maintenance process. To illustrate how fragmentation occurs,
    there will be a number of simple demos. The statistics conversation will expand
    on the items discussed in Chapter [3](#338675_4_En_3_Chapter.xhtml) and lay out
    how to update statistics to keep them accurate.


    ## Summary


    This chapter looked at some myths surrounding indexes as well as some best practices.
    For both areas, some commonly held beliefs were investigated and were presented
    with details around each of them.


    With these myths, ideas that are generally believed about indexes were shown to
    be untrue. These myths covered clustered indexes, the fill factor, the column
    makeup of indexes, and more. The key to how to view anything that is believed
    about indexes that may be a myth is to take it upon yourself to test it.


    Best practices were also defined and discussed. The best practices provided in
    the chapter should be the basis upon which indexes can be built. When unsure of
    how to index a table or workload, start by adhering to best practices. If adjustments
    are required in the future, then deviating from best practices is a reasonable
    response to change.


    ## Index Foreign Key Columns


    When a foreign key is created on a table, the foreign key column in the table
    should be indexed. This is necessary to assist the foreign key in determining
    which records in the parent table are constrained to each record in the referenced
    table. This is important when changes are being made against the referenced table.
    The changes in the referenced table may need to check all the rows that match
    the record in the parent table. If an index does not exist, then a scan of the
    column will occur. On a large parent table, this could result in a significant
    amount of I/O and potentially some concurrency issues.


    An example of this issue would be state and address tables. There would likely
    be thousands or millions of records in the address table and maybe a hundred records
    in the state table. The address table would include a column that is referenced
    by the state table. Consider whether one of the records in the state table needed
    to be deleted. If there wasn’t an index on the foreign key column in the address
    table, then how would the address table identify the rows that would be affected
    by deleting the state record? Without an index, SQL Server would have to check
    every record in the address table. If the column is indexed, SQL Server would
    be able to perform a range scan across the records that match to the value being
    deleted from the state table.


    By indexing your foreign key columns, performance issues, such as the one described
    in this section, can be avoided. The best practice with foreign keys is to index
    their columns. If in the future it is determined that an index on a foreign key
    column is not needed by an application, it can be removed with confidence. Chapter
    [13](#338675_4_En_13_Chapter.xhtml) includes more details on this best practice
    and a code example.


    ## Balance Index Count


    Indexes are extremely useful for improving performance when accessing information
    in specific rows. Indexes are not without costs, though. The costs of having indexes
    go beyond just space within a database. When building an index, consider each
    of the following:


    - How frequently will rows be inserted or deleted?

    - How frequently will the key columns be updated?

    - How often will the index be used?

    - What processes does the index support?

    - How many other indexes are on the table?


    These are just some of the first considerations that need to be accounted for
    when building indexes. After the index is built, how much time will be spent updating
    and maintaining the index? Will the index be modified more frequently than it
    is used to return results for queries? How many columns are in the table, and
    are there more indexes than columns?


    The trouble with balancing the index count on a table is that there is no precise
    number that can be recommended. An index improves query performance for queries
    that can use that index, but consumes resources, including:


    - Storage space in the data file (MDF or NDF)

    - Backup size (maintaining backups of the index)

    - Write speeds, maintaining the data in the index


    Indexes can sometimes introduce contention if a workload happens to write to different
    indexes at one time in such a way that locking or blocking is introduced. To summarize
    in the simplest way possible, indexes improve query read speeds while slowing
    down write operations.


    The number of indexes that it makes sense to have on a table is a per-table decision.
    Too few indexes may result in excessive scans of the clustered index or heap to
    return results from common queries. The table should not have too many indexes,
    where more time is being spent maintaining the indexes than returning results.
    While there is no golden rule to how many indexes a table should have, there is
    value in using caution if the count of indexes on a table increases past ten.


    Equally important is being able to separate between indexes that serve frequent
    or critical queries and those that are rarely used. A table scan once a month
    may be preferable to an index that is maintained all day every day. Alternatively,
    if that single monthly query is a critical financial report, then that specialized
    index may be 100 percent worth the cost.


    ## Index Fragmentation


    The first maintenance issue that can lead to a degradation of index performance
    is index fragmentation. Fragmentation occurs when the pages in an index are no
    longer physically sequential.


    While index fragmentation generated a much greater concern in previous versions
    of SQL Server and with older storage systems, it is still something to be concerned
    with in SQL Server. The main challenge that arises with fragmentation is an increase
    in the amount of space required to store the index due to pages being split and
    left half-empty. This excess space impacts the amount of space the database consumes
    on disk, in memory, and through the CPU as it processes the data.


    There are a few events in SQL Server that can lead to index fragmentation:


    - `INSERT` operations

    - `UPDATE` operations

    - `DELETE` operations

    - `DBCC SHRINKDATABASE` operations


    Except for selecting data from the database, any write operation can potentially
    lead to fragmentation. Unless a database is read-only, fragmentation is a relevant
    concern that needs to be addressed before it becomes an issue.'
