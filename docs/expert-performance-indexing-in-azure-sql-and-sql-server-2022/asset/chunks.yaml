    | Record Size | Size of the row on the page. |

    | Memory Dump | The memory location for the data on the page. For the hex rows
    option, it is limited to the information in that slot. The memory address is provided,
    and afterward a hex dump of the data is stored in the slot. |


    For the hex rows example, the index page (1:279) investigated in the previous
    section will be further reviewed. This time, the hex rows print option will be
    used, which is when a `print_option` of 1 is set in `DBCC PAGE`, as shown in Listing
    [3-17](#338675_4_En_3_Chapter.xhtml#PC17).


    The results for the `DBCC PAGE` command will be lengthier than the previous execution
    since they include the row data with the page header. To focus on the new information,
    the buffer and page header results have been excluded in the sample output in
    Figure [3-11](#338675_4_En_3_Chapter.xhtml#Fig11). In the data section, there
    are two slots shown, slot 0 and slot 1\. These slots map to the two index rows
    on the page, which can be verified through the record type of `INDEX_RECORD` for
    each of the rows. The hex data for the rows contains the page and range information
    for the index record, but that isn’t translated with this print option. The last
    section contains the offset table with the slot information for both rows in the
    table. Note that the offset ends with 0 and counts up from the bottom. The rows
    start after the header incrementing up, while the offset array starts at the end
    of the page incrementing backward. In this manner, new rows can be added to the
    table without reorganizing the page.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig11_HTML.jpg)


    A screenshot of D B C C page output. It consists of 5 boxes of data. 1\. Displays
    page 1:377\. 2 and 3\. 2 empty buffer and page header boxes. 4\. Data output of
    slots 0 and 1\. 5\. An offset table is displayed where row is offset.


    Figure 3-11


    DBCC PAGE output for the hex rows print option


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,1)

    Listing 3-17

    DBCC PAGE with the Hex Rows Print Option

    ```


    The hex rows print option includes the page header information but expands on
    it to provide insight into the actual rows on the page. This information can prove
    valuable when attempting to understand a row’s size on the page and why it may
    be larger than expected.


    #### Hex Data Print Option


    The third print option available for `DBCC PAGE` is the hex data print option,
    where `print_option` equals 2\. This print option, like the previous one, starts
    with the output from the page header–only print option and adds to it. The information
    added through this option includes the hex output of the data section of the page
    and the offset array. With the data section, the detail is output unformatted—just
    as it appears on the actual page. The output in this format can be useful when
    there is a need to see the page in its raw form.


    To demonstrate the hex data print option, the script in Listing [3-18](#338675_4_En_3_Chapter.xhtml#PC18)
    will be used. In it, the `DBCC PAGE` command is used to retrieve the page from
    `dbo.IndexInternalsFour` that contains the last row. This row contains 25 fives
    in the `FillerData` column.


    ```

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,2)

    Listing 3-18

    DBCC PAGE with the Hex Data Print Option

    ```


    In the results, shown in Figure [3-12](#338675_4_En_3_Chapter.xhtml#Fig12), the
    output contains a large block of characters in the data section. The block contains
    three components. On the far left is page address information, such as `0x0000003BCEBF8000`.
    The page address identifies where on the page the information is located. The
    middle section contains the hex data that is contained in that section of the
    page. The right side of the character block contains the character representation
    of the hex data. For the most part, this data is not legible, except when it comes
    to character data being stored from character data types, such as `char` and `nchar`.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig12_HTML.jpg)


    A screenshot of D B C C page output. It consists of 5 boxes of data. 1\. Displays
    page 1:377\. 2 and 3\. 2 empty buffer and page header boxes. 4\. Data output of
    memory dumps in alphanumeric. 5\. An offset table is displayed where row is offset.


    Figure 3-12


    DBCC PAGE output for the hex data print option


    Initially, the hex data print option may seem less useful than the other print
    options, and, in many situations, that will be the case. The true value in this
    print option is that `DBCC PAGE` does not try to interpret the page for you. It
    displays the page as is. With the other print options, the output will sometimes
    be reordered to conform to expected slot orders; an example of this is demonstrated
    in Chapter [10](#338675_4_En_10_Chapter.xhtml).'
  trans: '#### 十六进制行打印选项


    `DBCC PAGE` 的下一个可用打印选项是十六进制行打印选项，其中 `print_option` 等于 1。此选项在前一选项的基础上进行了扩展，在输出中添加了页面上每个槽位的条目，以及描述页面上每个槽位位置的偏移数组。


    页面的数据部分会针对页面上的每一行重复出现，并包含该行的所有元数据和关联数据。对于元数据，行包括槽位号、页面偏移量、记录类型和记录属性。这些信息有助于定义行以及影响行大小的因素（除了数据大小）。在槽位的末尾是行的内存转储。内存转储以十六进制格式显示行，虽然不易于人类阅读，但包含了行的所有数据。有关属性及其定义的更多信息，请参见表
    3-12。


    偏移数组是包含在十六进制行选项结果中的最后一个信息部分。偏移数组包含表中每一行的两个重要细节。第一个是带有其十六进制表示的槽位号。第二个是该槽位在页面上的字节位置。利用这两条信息，可以定位并返回页面上的任何行。


    表 3-12


    十六进制行关键属性定义


    | **属性** | **定义** |

    | --- | --- |

    | 槽位 | 行在页面上的位置。计数从 0 开始，紧接在页面头部之后。 |

    | 偏移量 | 行在页面上的物理字节位置。 |

    | 长度 | 行在页面上的长度。 |

    | 记录类型 | 行的类型。一些可能的值包括 `INDEX_RECORD` 和 `PRIMARY_RECORD`。 |

    | 记录属性 | 行上影响行大小的属性列表。这些可以包括 `NULL_BITMAP` 和 `VARIABLE_COLUMNS` 数组。 |

    | 记录大小 | 行在页面上的大小。 |

    | 内存转储 | 页面上数据的内存位置。对于十六进制行选项，它仅限于该槽位中的信息。提供内存地址，之后是存储在槽位中的数据的十六进制转储。 |


    对于十六进制行示例，将对上一节研究的索引页 (1:279) 进行进一步检查。这次将使用十六进制行打印选项，即在 `DBCC PAGE` 中设置 `print_option`
    为 1，如清单 3-17 所示。


    `DBCC PAGE` 命令的结果将比之前的执行更长，因为它们包含了带有页面头部的行数据。为了专注于新信息，示例输出（图 3-11）中排除了缓冲区和页面头部的结果。在数据部分，显示了两个槽位：槽位
    0 和槽位 1。这些槽位对应于页面上的两个索引行，可以通过每行的记录类型 `INDEX_RECORD` 来验证。行的十六进制数据包含索引记录的页面和范围信息，但此打印选项不会翻译这些信息。最后一部分包含偏移表，其中有表中两行的槽位信息。请注意，偏移量以
    0 结尾并从底部开始计数。行在头部之后开始并递增向上，而偏移数组从页面末尾开始并反向递增。通过这种方式，可以向表中添加新行而无需重新组织页面。


    ![](img/338675_4_En_3_Fig11_HTML.jpg)


    D B C C 页面输出的截图。它由 5 个数据框组成。1. 显示页面 1:377。2 和 3. 2 个空的缓冲区和页面头部框。4. 槽位 0 和 1 的数据输出。5.
    显示一个偏移表，其中行是偏移量。


    图 3-11


    十六进制行打印选项的 DBCC PAGE 输出


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,1)

    清单 3-17

    使用十六进制行打印选项的 DBCC PAGE

    ```


    十六进制行打印选项包含页面头部信息，并在此基础上进行了扩展，以提供对页面上实际行的深入了解。当试图了解页面上行的大小及其可能比预期更大的原因时，此信息可能非常有价值。


    #### 十六进制数据打印选项


    `DBCC PAGE` 的第三个打印选项是十六进制数据打印选项，其中 `print_option` 等于 2。此打印选项与前一个类似，以仅打印页面头部的选项输出开始，并在此基础上添加内容。通过此选项添加的信息包括页面数据部分的十六进制输出和偏移数组。对于数据部分，细节以未格式化的形式输出——正如其出现在实际页面上的那样。当需要查看页面的原始形式时，这种格式的输出可能很有用。


    为了演示十六进制数据打印选项，将使用清单 3-18 中的脚本。其中，`DBCC PAGE` 命令用于从 `dbo.IndexInternalsFour` 中检索包含最后一行的页面。该行在
    `FillerData` 列中包含 25 个数字 5。


    ```

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,2)

    清单 3-18

    使用十六进制数据打印选项的 DBCC PAGE

    ```


    在结果中（如图 3-12 所示），输出在数据部分包含一大块字符。该块包含三个组成部分。最左边是页面地址信息，例如 `0x0000003BCEBF8000`。页面地址标识了页面上信息的位置。中间部分包含页面该部分中的十六进制数据。字符块的右侧包含十六进制数据的字符表示。在大多数情况下，这些数据是难以辨认的，除非存储的是字符数据类型（如
    `char` 和 `nchar`）的字符数据。


    ![](img/338675_4_En_3_Fig12_HTML.jpg)


    D B C C 页面输出的截图。它由 5 个数据框组成。1. 显示页面 1:377。2 和 3. 2 个空的缓冲区和页面头部框。4. 字母数字形式的内存转储数据输出。5.
    显示一个偏移表，其中行是偏移量。


    图 3-12


    十六进制数据打印选项的 DBCC PAGE 输出


    最初，十六进制数据打印选项可能看起来不如其他打印选项有用，而且在许多情况下确实如此。此打印选项的真正价值在于 `DBCC PAGE` 不会尝试为您解释页面，它按原样显示页面。使用其他打印选项时，输出有时会重新排序以符合预期的槽位顺序；第
    10 章中演示了这样一个例子。'
- fmt: '## Row Data Print Option


    `DBCC PAGE`的最后一个打印选项是行数据打印选项，其中`print_option`等于3。此打印选项的输出可能会根据所请求的页面类型而变化。对于大多数页面，返回的基本信息与十六进制行打印选项相同：数据按行以十六进制格式拆分。不过，数据页面和索引页面的输出有所不同。对于这些页面类型，此选项提供了关于页面的一些极其有用的信息。


    > **注意**

    > 您可以在`DBCC PAGE`中使用`WITH TABLERESULTS`选项，将命令的结果输出到结果集而不是消息中。当您想将`DBCC`命令返回的结果插入到表中时，此选项非常有用。


    为了展示数据页面和索引页面输出之间的差异，让我们来看另一个示例。此示例将使用在代码清单 3-15 中创建的表`dbo.IndexInternalsFour`。在此打印选项的演示中（如代码清单
    3-19 所示），您将对表的数据页面和索引页面之一执行`DBCC PAGE`。


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,378,3) -- Data page

    DBCC PAGE(0,1,377,3) -- Index page

    ```

    *代码清单 3-19 使用行数据打印选项的 DBCC PAGE*


    将数据页面的结果（如图 3-13 所示）与十六进制数据打印选项的输出（如图 3-12 所示）进行比较，有一个主要区别。在插槽的十六进制内存转储下方，行中的所有列详细信息都被解码并以易读的格式呈现。它从插槽
    0 列 1 开始，该列包含`RowID`列，显示其值为5。下一列（第2列）是`FillerData`列，包含25个5。对于这些列中的每一列，都会注明物理长度以及值在行内的偏移量。页面数据部分提供的最后一个值是`KeyHashValue`。此值并未存储在页面上，相反，它是页面放入内存时根据页面上的键创建的一个哈希值。此值显示在
    SQL Server 用于向最终用户报告页面信息的工具中。任何在调查死锁时见过此值的人都可能会熟悉它。


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig13_HTML.jpg)

    *图 3-13 数据页面的行数据打印选项的 DBCC PAGE 输出*


    对于索引页面，消息输出与其他页面类型相比没有变化。不同之处在于结果集。它不仅提供消息输出，还返回一个表。该表为页面上的每一行索引包含一行。查看索引页面的输出（如图
    3-14 所示），返回了两行。第一行表示页面`1:376`是索引页面的子页面。它还显示索引的键值是`RowID`，对于第一个索引行它是`NULL`。这表明这是索引的开始，没有值限制子页面上的第一行。第二行映射到页面`1:378`，键值为5。在这种情况下，键值表明子页面上的第一行的`RowID`为5。由于键值可能因索引而异，因此使用这些选项的`DBCC
    PAGE`命令的结果也会随之改变。对于每个索引变体，输出将返回该索引的相关值。


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig14_HTML.png)

    *图 3-14 索引页面的行数据打印选项的 DBCC PAGE 输出*


    行数据打印选项是`DBCC PAGE`命令最有用的选项之一。对于数据页面，它提供了对页面上存储的数据、所占用空间及其位置的全面洞察。这为理解为何只有某些行能放在页面上，以及为何例如发生页面拆分提供了直接依据。索引页面输出的结果集同样有用。将索引行映射到页面并返回键值的能力，可以深入了解索引的组织方式以及页面的布局方式。


    ## 摘要


    在本章中，提供了一些工具，允许直接在 SQL Server 中查看索引数据的存储细节。尽管是记录最少的工具，`DBCC PAGE`和`DBCC IND`允许从索引中收集大量知识，否则这些知识将难以获得。


    谨慎使用，这些工具对于管理员或架构师来说是一个宝贵的资产，他们希望深入了解索引结构及其存储。


    # 4. 碎片化


    对索引内部结构的讨论也必须涉及碎片化对存储和性能的影响。本章概述了碎片化、其对数据存储的影响以及它如何损害性能。


    ## 页面碎片化


    SQL Server 将数据库中的信息存储在 8 KB 的页面上。通常，表中的行被限制在该大小内；如果它们小于 8 KB，SQL Server 会在一个页面上存储多行。在一个页面上存储多行所面临的挑战之一是处理页面上所有行的总大小超过
    8 KB 空间的情况。在这些情况下，SQL Server 必须更改页面上行的存储方式。根据页面的组织方式，SQL Server 将通过两种方式处理这些情况：转发行和页面拆分。


    > **注意**

    > 此讨论不考虑单个记录可能大于页面的两种情况。这两种情况是行溢出和大型对象。对于行溢出，在某些情况下，SQL Server 允许页面上的单个记录超过 8
    KB。此外，当大型对象值超过 8 KB 大小时，它们使用 LOB 页面而不是数据页面。这些对本节讨论的页面碎片没有直接影响。'
  raw: '#### Row Data Print Option


    The last print option available for `DBCC PAGE` is the row data print option,
    where `print_option` equals 3\. The output from this print option can change depending
    on the type of page that is being requested. The basic information returned for
    most pages is identical to that returned from the hex rows print option: the data
    split per row in the hex format. The output varies, though, between data pages
    and index pages. For these page types, this print option provides some extremely
    useful information about the page.


    Note


    You can use the `WITH TABLERESULTS` option with `DBCC PAGE` to output the results
    from the command to a result set instead of messages. This option is useful when
    you want to insert the results returned from the `DBCC` command into a table.


    To show the differences between the data and index page outputs, let’s walk through
    another example. This example will use the table `dbo.IndexInternalsFour` that
    was created in Listing [3-15](#338675_4_En_3_Chapter.xhtml#PC15). In the demo
    for this print option, shown in Listing [3-19](#338675_4_En_3_Chapter.xhtml#PC19),
    you’ll execute `DBCC PAGE` against one of the data pages and the index page for
    the table.


    ```

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,378,3) -- Data page

    DBCC PAGE(0,1,377,3) -- Index page

    Listing 3-19

    DBCC PAGE with the Row Data Print Option

    ```


    Comparing the results from the data page, shown in Figure [3-13](#338675_4_En_3_Chapter.xhtml#Fig13),
    with the output from the hex data print option, shown in Figure [3-12](#338675_4_En_3_Chapter.xhtml#Fig12),
    there is one major difference. Underneath the hex memory dump for the slot, all
    the column details from the row are decoded and presented in a legible format.
    It starts with slot 0 column 1, which contains the `RowID` column, which it shows
    to have a value of 5\. The next column, column 2, is the `FillerData` column,
    which contains 25 fives. For each of these columns, the physical length is noted
    along with the offset of the value within the row. The last value provided in
    the data section of the page is the `KeyHashValue`. This value isn’t stored on
    the page. Instead, it is a hash value that was created when the page was placed
    in memory based on the keys on the page. This value is shown in tools that are
    used by SQL Server to report information about pages back to the end user. It
    may be familiar to anyone who has seen this value while investigating deadlocks.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig13_HTML.jpg)


    A screenshot of D B C C page output. It consists of 4 boxes of data. 1\. Displays
    page 1:377\. 2 and 3\. 2 empty buffer and page header boxes. 4\. Data output of
    slot 0 of different column values.


    Figure 3-13


    DBCC PAGE output for the row data print option for a data page


    With the index page, there is not a change in the message output from other page
    types. Instead, the difference is the result set. Instead of solely providing
    a message output, a table is also returned. The table includes one row for every
    index row on the page. Reviewing the output for the index page, shown in Figure
    [3-14](#338675_4_En_3_Chapter.xhtml#Fig14), there are two rows returned. The first
    row indicates that page 1:376 is the child page to the index page. It also shows
    that the key value for the index is `RowID`, which is `NULL` for the first index
    row. This indicates that this is the start of the index and no values are limiting
    the first ones on the child page. The second row maps to page 1:378 with a key
    value of 5\. In this case, the key value indicates that the first row on the child
    page has a `RowID` of 5\. Since the key value can change from index to index,
    the results from the `DBCC PAGE` command with these options will change as well.
    For every index variation, the output will return the relevant values for the
    index.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig14_HTML.png)


    A screenshot of a D B C C page output for row print with 2 rows of data. The 9
    column headers are field, page i d, row, level, child file l d, child page i d,
    row i d, key hash value, and row size. The child page i d of 2 rows are 376 and
    378 respectively.


    Figure 3-14


    DBCC PAGE output for the row data print option for an index page


    The row data print option is one of the most useful options for the `DBCC PAGE`
    command. For data pages, it provides total insight into the data stored on the
    page, how much space it takes up, and its position. This provides a direct line
    into understanding why only certain rows may be fitting on the page and why, for
    instance, a page split may have occurred. The result set from the index page output
    is equally as useful. The ability to map the index rows to pages and return the
    key values can provide insight into how the index is organized and how the pages
    are laid out.


    ## Summary


    In this chapter, tools were provided that allow the details of how index data
    is stored to be viewed directly in SQL Server. Despite being minimally documented
    tools, DBCC PAGE and DBCC IND allow for a vast amount of knowledge to be gleaned
    from indexes that would otherwise be challenging to obtain.


    Used with caution, these tools are a valuable asset to an administrator or architect
    looking to gain intimate knowledge of index structures and their storage.


    # 4. Fragmentation


    A discussion of index internals must also address the impact of fragmentation
    on storage and performance. This chapter provides an overview of fragmentation,
    its impact on data storage, and how it can harm performance.


    ## Page Fragmentation


    SQL Server stores information in the database on 8 KB pages. In general, rows
    in tables are limited to that size; if they are smaller than 8 KB, SQL Server
    stores more than one row per page. One of the challenges with storing more than
    a single row per page is handling situations where the total size of all rows
    on a page exceeds 8 KB of space. In these situations, SQL Server must change how
    the rows on a page are stored. Depending on how the pages are organized, there
    are two ways in which SQL Server will handle the situations: forwarded records
    and page splits.


    Note


    This discussion does not consider two situations where single records can be larger
    than a page. These other situations are row overflow and large objects. With row
    overflow, SQL Server will allow a single record on a page to exceed the 8 KB in
    certain situations. Also, when large object values exceed the 8 KB size, they
    utilize LOB pages instead of data pages. These do not have a direct impact on
    the page fragmentation discussed in this section.'
  trans: '

    ## 行数据打印选项


    `DBCC PAGE` 的最后一个打印选项是行数据打印选项，其中 `print_option` 等于 3。此打印选项的输出可能会根据所请求的页面类型而变化。对于大多数页面，返回的基本信息与十六进制行打印选项相同：数据按行以十六进制格式拆分。不过，数据页面和索引页面的输出有所不同。对于这些页面类型，此选项提供了关于页面的一些极其有用的信息。


    > **注意**

    > 您可以在 `DBCC PAGE` 中使用 `WITH TABLERESULTS` 选项，将命令的结果输出到结果集而不是消息中。当您想将 `DBCC` 命令返回的结果插入到表中时，此选项非常有用。


    为了展示数据页面和索引页面输出之间的差异，让我们来看另一个示例。此示例将使用在代码清单 3-15 中创建的表 `dbo.IndexInternalsFour`。在此打印选项的演示中（如代码清单
    3-19 所示），您将对表的数据页面和索引页面之一执行 `DBCC PAGE`。


    ```sql

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,378,3) -- Data page

    DBCC PAGE(0,1,377,3) -- Index page

    ```

    *代码清单 3-19 使用行数据打印选项的 DBCC PAGE*


    将数据页面的结果（如图 3-13 所示）与十六进制数据打印选项的输出（如图 3-12 所示）进行比较，有一个主要区别。在插槽的十六进制内存转储下方，行中的所有列详细信息都被解码并以易读的格式呈现。它从插槽
    0 列 1 开始，该列包含 `RowID` 列，显示其值为 5。下一列（第 2 列）是 `FillerData` 列，包含 25 个 5。对于这些列中的每一列，都会注明物理长度以及值在行内的偏移量。页面数据部分提供的最后一个值是
    `KeyHashValue`。此值并未存储在页面上，相反，它是页面放入内存时根据页面上的键创建的一个哈希值。此值显示在 SQL Server 用于向最终用户报告页面信息的工具中。任何在调查死锁时见过此值的人都可能会熟悉它。


    ![](img/338675_4_En_3_Fig13_HTML.jpg)

    *图 3-13 数据页面的行数据打印选项的 DBCC PAGE 输出*


    对于索引页面，消息输出与其他页面类型相比没有变化。不同之处在于结果集。它不仅提供消息输出，还返回一个表。该表为页面上的每一行索引包含一行。查看索引页面的输出（如图
    3-14 所示），返回了两行。第一行表示页面 `1:376` 是索引页面的子页面。它还显示索引的键值是 `RowID`，对于第一个索引行它是 `NULL`。这表明这是索引的开始，没有值限制子页面上的第一行。第二行映射到页面
    `1:378`，键值为 5。在这种情况下，键值表明子页面上的第一行的 `RowID` 为 5。由于键值可能因索引而异，因此使用这些选项的 `DBCC PAGE`
    命令的结果也会随之改变。对于每个索引变体，输出将返回该索引的相关值。


    ![](img/338675_4_En_3_Fig14_HTML.png)

    *图 3-14 索引页面的行数据打印选项的 DBCC PAGE 输出*


    行数据打印选项是 `DBCC PAGE` 命令最有用的选项之一。对于数据页面，它提供了对页面上存储的数据、所占用空间及其位置的全面洞察。这为理解为何只有某些行能放在页面上，以及为何例如发生页面拆分提供了直接依据。索引页面输出的结果集同样有用。将索引行映射到页面并返回键值的能力，可以深入了解索引的组织方式以及页面的布局方式。


    ## 摘要


    在本章中，提供了一些工具，允许直接在 SQL Server 中查看索引数据的存储细节。尽管是记录最少的工具，`DBCC PAGE` 和 `DBCC IND`
    允许从索引中收集大量知识，否则这些知识将难以获得。


    谨慎使用，这些工具对于管理员或架构师来说是一个宝贵的资产，他们希望深入了解索引结构及其存储。


    # 4. 碎片化


    对索引内部结构的讨论也必须涉及碎片化对存储和性能的影响。本章概述了碎片化、其对数据存储的影响以及它如何损害性能。


    ## 页面碎片化


    SQL Server 将数据库中的信息存储在 8 KB 的页面上。通常，表中的行被限制在该大小内；如果它们小于 8 KB，SQL Server 会在一个页面上存储多行。在一个页面上存储多行所面临的挑战之一是处理页面上所有行的总大小超过
    8 KB 空间的情况。在这些情况下，SQL Server 必须更改页面上行的存储方式。根据页面的组织方式，SQL Server 将通过两种方式处理这些情况：转发行和页面拆分。


    > **注意**

    > 此讨论不考虑单个记录可能大于页面的两种情况。这两种情况是行溢出和大型对象。对于行溢出，在某些情况下，SQL Server 允许页面上的单个记录超过 8
    KB。此外，当大型对象值超过 8 KB 大小时，它们使用 LOB 页面而不是数据页面。这些对本节讨论的页面碎片没有直接影响。

    '
- fmt: '### Forwarded Records


    The first method for managing records when they exceed the size of a data page
    is through forwarded records. This applies only when the heap structure is used.
    With forwarded records, when a row is updated and no longer fits on the data page,
    SQL Server will move that record to a new data page in the heap and add pointers
    between the two locations. The first pointer identifies the page on which the
    record now exists, often called the *forwarded record pointer*. The second is
    on the new page, pointing back to the original page on which the forwarded record
    existed; it’s called the *back pointer*.


    The following is a logical example of how forwarding operates. Consider a page,
    numbered 100, that exists on a table using a heap (see Figure [4-1](#338675_4_En_4_Chapter.xhtml#Fig1)).
    This page has four rows on it, and each row is approximately 2 KB in size, totaling
    8 KB in space used. If the second row is updated to now consume 2.5 KB, it will
    no longer fit on the page. SQL Server selects another page in the heap or allocates
    a new page (if needed), the page numbered 101 in this case. The second row is
    then written to that page, and the pointer to the new page replaces the row on
    page 100.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig1_HTML.png)


    A diagram of dataflow has 3 data pages, 2 numbered 100 with 4 rows, and 1 numbered
    101\. Data forwards from the second row in page 100 to the first row in page 101
    and the second row in data page 100 updates as the pointer.


    **Figure 4-1**

    Forwarded record process diagram


    The next consideration is to examine how records are forwarded on a table. For
    example, create a table named `dbo.HeapForwardedRecords`, as shown in Listing
    [4-1](#338675_4_En_4_Chapter.xhtml#PC1). To represent the rows from this logical
    example, `sys.objects` will be used to add 24 rows to `dbo.HeapForwardedRecords`.
    Each of these rows has a `RowID` to identify it and 2,000 characters, resulting
    in four rows per page in the table. `sys.dm_db_index_physical_stats` can be used
    to verify (see Figure [4-2](#338675_4_En_4_Chapter.xhtml#Fig2)) that there are
    six pages in the table with a total of 24 rows.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig2_HTML.png)


    A table has 5 columns and a row. Columns 1 through 5 are titled object i d, index
    type description, page count, record count, and forwarded record count. The object
    i d 660197402 is selected, with entries HEAP, 6, 24, and 0 in order.


    **Figure 4-2**

    Physical state of `dbo.HeapForwardedRecords` before forwarding records are introduced


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.HeapForwardedRecords

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapForwardedRecords (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    **Listing 4-1** Forwarded Record Scenario


    The next step in this demonstration is to create forwarded records in the table.
    To do this, every other row in the table will be updated to expand the values
    of `FillerData` from 2,000 to 2,500 characters, shown in Listing [4-2](#338675_4_En_4_Chapter.xhtml#PC2).
    As a result, two of the rows will be too large to fit in the space remaining on
    the pages where they are located. Instead of 8 KB of data, there will be about
    9 KB being written to the 8 KB page.


    Because of this, SQL Server will need to move records off the page to complete
    the updates. Since moving one of the rows off the page will leave enough room
    for the second row, only one record will be forwarded. The output from `sys.dm_db_index_physical_stats`
    (see Figure [4-3](#338675_4_En_4_Chapter.xhtml#Fig3)) verifies that this is the
    case. The page count increases to nine, and six records are logged as being forwarded.
    One item of particular interest is the record count. While the number of rows
    in the table did not increase, there are now six additional records in the table.
    This is because the original record for the row is still in its original position
    with a pointer to another record elsewhere that contains the data for the row.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig3_HTML.png)


    A table has 5 columns and a row. Columns 1 through 5 are titled object i d, index
    type description, page count, record count, and forwarded record count. It has
    1 entry with the object i d 660197402 selected, followed by HEAP, 9, 30, and 6,
    in respective columns.


    **Figure 4-3** Physical state of `dbo.HeapForwardedRecords` after forwarding records


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.HeapForwardedRecords

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    **Listing 4-2** Script to Cause Forwarded Records


    The challenge with forwarded records is that they cause rows in the table to be
    referenced in two locations, resulting in an increase in the amount of I/O required
    when retrieving data from and writing data to the table. The larger the table
    and the more forwarded records that exist, the more likely that forwarded records
    can have a negative impact on performance.'
