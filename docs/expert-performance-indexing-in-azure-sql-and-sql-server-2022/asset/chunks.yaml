- fmt: '## 解释 DTA


    用户可以通过图形用户界面（GUI）和命令行实用程序两种方式与 DTA 进行交互。这两种方法提供了大部分相同的功能。根据用户的熟练程度，两种方式都可以有效使用。


    GUI 工具为 DTA 提供了一个包装器，本章大部分内容将使用它。它允许选择可用的选项，并能够查看先前执行的调优会话。对于查看调优结果，GUI 非常适合此任务。可以通过
    GUI 配置和执行调优会话。


    命令行实用程序在配置和执行会话方面提供了与 GUI 相同的功能。命令行实用程序可以通过开关或 XML 配置文件进行配置。这两种选项都允许数据库管理员（DBA）和开发人员构建流程来自动执行调优活动，以审查和分析工作负载，并构建一个索引调优流程，使
    DBA 能够直接处理结果。将 DTA 实用程序集成到性能调优方法中将在第 17 章中讨论。


    对于这两种工具，都需要进行两个一般领域的配置。第一个确定调优会话将如何与物理设计结构（PDS）交互并提出建议。第二个确定 DTA 在尝试调优数据库时应采用何种分区策略。


    关于如何生成物理设计结构建议的选项有两个部分。第一个要配置的选项是调优中使用哪种类型的 PDS。物理设计结构可以扩展到包括考虑筛选索引和列存储索引。物理设计结构使用的选项如下：

    *   索引和索引视图。

    *   索引（默认选项）。

    *   仅评估现有 PDS 的利用情况。

    *   索引视图。

    *   非聚集索引。


    下一个 PDS 选项是索引调优中要考虑的分区。DTA 提供使用无分区、对齐分区或完全分区。使用完全分区时，建议将考虑表是否应包含已分区和未分区的索引。


    最后一个 PDS 选项确定要在数据库中保留哪些对象。此选项有助于确保提供的建议不会对先前测试和部署的调优产生不利影响。以下是要在数据库中保留的 PDS 项目的选项：

    *   不保留任何现有 PDS。

    *   保留所有现有 PDS（默认选项）。

    *   保留对齐分区。

    *   仅保留索引。

    *   仅保留聚集索引。


    除了这些选项之外，还有几个其他选项可以配置。这些选项确定调优会话将运行多长时间，如果需要分析大量数据库，这可能至关重要。同样，对于大型工作负载，可能需要防止其运行时间过长。此外，可以定义建议的最大磁盘空间和每个索引的最大列数。最后一个设置选项指示索引建议是否可以或必须能够在线部署。


    注意

    在继续下一节之前，请运行清单 12-1 中的代码。如果清单 12-3 中的索引已创建，请使用清单 12-4 中提供的 `DROP INDEX` 语句删除该索引。

    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS Sales.SalesOrderHeader.missing_index_SalesOrderHeader;

    Listing 12-4

    DDL Statement to Drop Index missing_index_SalesOrderHeader

    ```


    ## 使用 DTA GUI


    如本章前面所述，与 DTA 交互的一种方式是通过 GUI。在本节中，将提供一个场景来演示如何使用 DTA 进行索引调优。有几种启动该工具的方法。第一个选项在
    SQL Server Management Studio（SSMS）中。在 SSMS 中，导航到菜单栏的“工具”➤“数据库引擎优化顾问”。另一个选项是从“开始”菜单的“Microsoft
    SQL Server 工具”中打开“数据库引擎优化顾问”。


    启动 DTA 后，系统将提示连接到 SQL Server 实例。连接后，该工具将打开一个新的调优会话以供配置。图 12-4 显示了一个 DTA 会话。


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig4_HTML.png)


    数据库引擎优化顾问窗口有一个标签页，左侧“会话监视器”下标记为“索引书管理员”。从打开的“常规”选项卡中显示了会话名称和负载等信息。


    图 12-4

    数据库引擎优化顾问的常规配置屏幕


    在“常规”选项卡的会话启动屏幕中，最初有一些需要配置的内容。首先是会话名称，可以是任何值。默认值包括用户名以及日期和时间。接下来，选择将使用的工作负载类型。工作负载有四个选项：

    *   `文件`：包含 SQL 跟踪输出、XML 配置或 SQL 脚本的文件。

    *   `表`：包含 SQL 跟踪输出的 SQL Server 数据库表。使用表之前，请确保填充它的跟踪已完成。

    *   `计划缓存`：调优会话所连接到的 SQL Server 的计划缓存。此功能在 SQL Server 2012 中引入，提供了一个强大的机制来调优 SQL
    Server 环境中正在使用的执行计划。

    *   `查询存储`：调优会话所连接到的选定数据库的查询存储。此选项在 SQL Server 2016 中引入，与计划缓存类似，为调优实际工作负载提供了极好的机制，且工作量最小。


    每种工作负载都可以用于提供建议。通过这些工作负载来源中的每一种，都有机会调优所需的任何类型的工作负载。出于本练习的目的，请选择“计划缓存”选项。


    下一步是选择要调优的数据库和表。对于大型数据库，仅选择属于需要索引建议的工作负载一部分的表至关重要。当 DTA 执行时，它将根据表中的信息生成统计信息，需要考虑的表越少，调优会话完成得越快。在继续之前，在“选择要调优的数据库和表”部分中选中
    `AdventureWorks2017` 数据库旁边的复选框。


    注意

    请勿在生产 SQL Server 环境中使用 DTA。该工具使用强力策略来识别索引建议并创建假设索引以支持此工作。在生产环境中运行该工具可能会对服务器上的其他工作负载性能产生不利影响。考虑从命令行运行
    DTA 并在远程 SQL Server 上分析生产数据库。本章稍后将演示此技术，并在第 17 章中进一步讨论。


    配置好“常规”选项后，下一步是配置“调优选项”设置。在图 12-5 所示的屏幕上，取消选中“限制调优时间”选项。对于其他选项，请保留其默认选择。这些应该如下所示：

    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig5_HTML.png)'
  raw: '### Explaining the DTA


    There are two ways in which users can interact with the DTA. These are the graphical
    user interface (GUI) and the command-line utility. Both methods offer most of
    the same capabilities. Depending on comfort level, either can be used effectively.


    The GUI tool, which will be used throughout most of this chapter, provides a wrapper
    for the DTA. It allows for the selection of the available options, and it enables
    the viewing of tuning sessions that were previously executed. For viewing tuning
    results, the GUI is well-suited to the task. Tuning sessions can be configured
    and executed through the GUI.


    The command-line utility provides the same capabilities as the GUI when it comes
    to configuring and executing sessions. The command-line utility can be configured
    through either switches or an XML configuration file. Both options allow database
    administrators (DBAs) and developers to build processes to automate tune activities
    for reviewing and analyzing workloads and to build an index tuning process that
    allows the DBA to work directly with the results. Integrating the DTA utility
    into a performance tuning methodology will be discussed in Chapter [17](#338675_4_En_17_Chapter.xhtml).


    With both tools, two general areas of configuration need to occur. The first determines
    how the tuning session will interact and makes suggestions with the physical design
    structures (PDSs). The second determines which type of partitioning strategy the
    DTA should employ when trying to tune the database.


    There are two parts to the options on how physical design structure suggestions
    will be generated. The first option to configure is which type of PDS to utilize
    in the tuning. The physical design structure can be augmented to include considering
    filtered and columnstore indexes. The options for physical design structure use
    are as follows:


    *   Indexes and indexed views.


    *   Indexes (default option).


    *   Evaluate utilization of existing PDSs only.


    *   Indexed views.


    *   Non-clustered indexes.


    The next PDS option is the partitioning to consider in the index tuning. The DTA
    offers to use no partitioning, aligned partitioning, or full partitioning. With
    full partitioning, recommendations will consider whether a table should include
    indexes that are partitioned and nonpartitioned.


    The last PDS option determines which objects to keep within the database. This
    option can help ensure that the recommendations provided do not adversely affect
    tuning that was previously tested and deployed. The following are the options
    for PDS items to retain in the database:


    *   Do not keep any existing PDSs.


    *   Keep all existing PDSs (default option).


    *   Keep aligned partitioning.


    *   Keep indexes only.


    *   Keep clustered indexes only.


    Outside these options, there are a few other options that can be configured. These
    options determine how long the tuning session will run, which can be critically
    important if a lot of databases need to be analyzed. Similarly, for a large workload,
    there may be a desire to prevent it from running too long. Additionally, the max
    disk space for the recommendations and max columns for each index can be defined.
    The last setup option indicates whether index recommendations can or must be able
    to be deployed online.


    Note


    Before following along in the next section, run the code in Listing [12-1](#338675_4_En_12_Chapter.xhtml#PC1).
    If the index in Listing [12-3](#338675_4_En_12_Chapter.xhtml#PC3) has been created,
    drop the index using the `DROP INDEX` statement provided in Listing [12-4](#338675_4_En_12_Chapter.xhtml#PC4).


    ```

    USE AdventureWorks2017

    GO

    DROP INDEX IF EXISTS Sales.SalesOrderHeader.missing_index_SalesOrderHeader;

    Listing 12-4

    DDL Statement to Drop Index missing_index_SalesOrderHeader

    ```


    ### Using the DTA GUI


    As mentioned earlier in the chapter, one of the ways to interact with the DTA
    is through the GUI. In this section, a scenario will be provided that demonstrates
    how to use the DTA for index tuning. There are a few methods for launching the
    tool. The first option is within SQL Server Management Studio (SSMS). Within SSMS,
    navigate to Tools ➤ Database Engine Tuning Advisor from the menu bar. The other
    option is to open the Database Engine Tuning Advisor from Microsoft SQL Server
    Tools on the Start menu.


    After launching the DTA, there will be a prompt to connect to a SQL Server instance.
    Once connected, the tool will open a new tuning session for configuration. Figure
    [12-4](#338675_4_En_12_Chapter.xhtml#Fig4) shows a DTA session.


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig4_HTML.png)


    A window of database engine tuning advisor has a tab labeled indexbook administrator
    from the left panel under the session monitor. Pieces of information such as the
    session name and workload are exhibited from the opened general tab.


    Figure 12-4


    General configuration screen from the Database Engine Tuning Advisor


    In the session launch screen on the General options tab, there are a few things
    to configure initially. To start, there is the session name, which can be any
    value. The default value includes the username with the date and time. Next, select
    the type of workload that will be used. There are four options for the workload:


    *   *File*: A file containing SQL Trace output, an XML configuration, or SQL scripts.


    *   *Table*: SQL Server database table containing SQL Trace output. Before using
    the table, be sure the trace populating it has been completed.


    *   *Plan Cache*: The plan cache of the SQL Server that the tuning session is
    connected to. This capability was introduced in SQL Server 2012 and provides a
    powerful mechanism to tune execution plans that are being used in your SQL Server
    environment.


    *   *Query Store*: The Query Store for the selected database(s) that the tuning
    session is connected to. This option was introduced in SQL Server 2016 and similar
    to the plan cache provides an excellent mechanism for tuning a real-world workload
    with minimal effort.


    Each of the workloads can be used to provide recommendations. Through each of
    these workload sources, there is an opportunity to tune any type of workload that
    is needed. For the purposes of this exercise, select the Plan Cache option.


    The next step is to select the database and tables to tune. With large databases,
    it will be critical to select only the tables that are part of the workload for
    which index recommendations are needed. When the DTA executes, it will generate
    statistics based on information in the table, and the fewer tables that need to
    be considered, the faster the tuning session can complete. Check the box in the
    “Select databases and tables to tune” section next to the `AdventureWorks2017`
    database before continuing.


    Caution


    Do not use the DTA in production SQL Server environments. The tool uses brute-force
    tactics to identify index recommendations and create hypothetical indexes to support
    this effort. Running the tool in production can adversely affect the performance
    of other workloads on the server. Consider running the DTA from a command line
    and on a remote SQL Server for analyzing production databases. This technique
    will be demonstrated later in this chapter and discussed further in Chapter [17](#338675_4_En_17_Chapter.xhtml).


    With the General options configured, the next step is to configure the Tuning
    Options settings. On the screen shown in Figure [12-5](#338675_4_En_12_Chapter.xhtml#Fig5),
    deselect the “Limit tuning time” option. For the other options, leave them as
    the default selections. These should be as follows:


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig5_HTML.png)'
  trans: '## 解释 DTA


    用户可以通过图形用户界面（GUI）和命令行实用程序两种方式与数据库引擎优化顾问（DTA）进行交互。这两种方法提供了大部分相同的功能。根据用户的熟练程度，两种方式都可以有效使用。


