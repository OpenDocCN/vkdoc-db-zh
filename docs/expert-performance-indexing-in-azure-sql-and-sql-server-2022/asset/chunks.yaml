- fmt: "# 使用 `sys.dm_db_index_usage_stats` 监控索引活动\n\n在 `sys.dm_db_index_usage_stats`\
    \ 中，`user_seeks` 和 `user_lookups` 的计数都将增加一。要查看这些值，可以使用清单 [5-18](#338675_4_En_5_Chapter.xhtml#PC18)，它将返回如图\
    \ [5-14](#338675_4_En_5_Chapter.xhtml#Fig14) 所示的结果。这些列之间的模式有助于确定合适的聚集索引键，或识别何时需要修改索引以避免键查找。键查找本身不一定有问题，但如果过度使用且不加控制，可能会成为性能瓶颈。本书后续将更深入地讨论键查找的有效管理。\n\
    \n![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig14_HTML.png)\n\n图 5-14：`sys.dm_db_index_usage_stats`\
    \ 中 `user_lookups` 的查询结果\n\n```sql\nSELECT TOP 10\n    OBJECT_NAME(i.object_id)\
    \ AS table_name\n    ,i.name AS index_name\n    ,ius.user_seeks\n    ,ius.user_lookups\n\
    \    ,ius.last_user_lookup\nFROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats\
    \ ius\n    ON i.object_id = ius.object_id\n    AND i.index_id = ius.index_id\n\
    \    AND ius.database_id = DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\n\
    ```\n清单 5-18：查询 `sys.dm_db_index_usage_stats` 中的 `user_lookups`\n\n最后的索引操作是 `user_updates`。`user_updates`\
    \ 列不仅限于更新操作，它涵盖了表上发生的所有 `INSERT`、`UPDATE` 和 `DELETE` 操作。为了演示这一点，可以执行清单 [5-19](#338675_4_En_5_Chapter.xhtml#PC19)\
    \ 中的 T-SQL 代码。此代码将向 `SalesOrderDetail` 表插入一条记录，更新该记录，然后将其从表中删除。由于这些操作涉及许多外键关系，其执行计划较为复杂，本示例中未包含。\n\
    \n```sql\nUSE AdventureWorks2017\nGO\n\nINSERT INTO Sales.SalesOrderDetail\n \
    \   (SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID,\
    \ UnitPrice, UnitPriceDiscount, ModifiedDate)\nSELECT SalesOrderID, CarrierTrackingNumber,\
    \ OrderQty, ProductID, SpecialOfferID, UnitPrice, UnitPriceDiscount, GETDATE()\
    \ AS ModifiedDate\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderDetailID = 1;\n\
    \nUPDATE Sales.SalesOrderDetail\nSET CarrierTrackingNumber = '999-99-9999'\nWHERE\
    \ ModifiedDate > DATEADD(d, -1, GETDATE());\n\nDELETE FROM Sales.SalesOrderDetail\n\
    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());\n```\n清单 5-19：索引更新查询\n\n在代码清单执行完毕后，表上共发生了三个操作。对于这些操作中的每一个，`sys.dm_db_index_usage_stats`\
    \ 都会在 `user_updates` 列中累积一次计数。执行清单 [5-20](#338675_4_En_5_Chapter.xhtml#PC20) 中的代码以查看索引上发生的活动。结果将与图\
    \ [5-15](#338675_4_En_5_Chapter.xhtml#Fig15) 中的类似。除了对 `SalesOrderDetail` 的聚集索引所做的更改外，对非聚集索引所做的更新也包括在内。能够查看插入、更新或删除操作对表产生的全面影响，有助于更好地理解执行写入操作时发生的所有\
    \ I/O。\n\n```sql\nUSE AdventureWorks2017\nGO\n\nSELECT TOP 10\n    OBJECT_NAME(i.object_id)\
    \ AS table_name\n    ,i.name AS index_name\n    ,ius.user_updates\n    ,ius.last_user_update\n\
    FROM sys.indexes i\nINNER JOIN sys.dm_db_index_usage_stats ius\n    ON i.object_id\
    \ = ius.object_id\n    AND i.index_id = ius.index_id\n    AND ius.database_id\
    \ = DB_ID()\nWHERE ius.object_id = OBJECT_ID('Sales.SalesOrderDetail');\n```\n\
    清单 5-20：查询 `sys.dm_db_index_usage_stats` 中的 `user_updates`\n\n![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig15_HTML.png)\n\
    \n图 5-15：`sys.dm_db_index_usage_stats` 中 `user_updates` 的查询结果"
  raw: 'In `sys.dm_db_index_usage_stats`, there will be a tally of one for both `user_seeks`
    and `user_lookups`. To see these values, use Listing [5-18](#338675_4_En_5_Chapter.xhtml#PC18),
    which will return the results in Figure [5-14](#338675_4_En_5_Chapter.xhtml#Fig14).
    Patterns between these columns can help with determining proper clustered index
    keys or identifying when to modify indexes to avoid key lookups. Key lookups are
    not necessarily problematic, but can be a performance bottleneck if overused and
    left unchecked. Effective management of key lookups will be further discussed
    later in this book.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig14_HTML.png)


    A screenshot of query table results for user lookups with 2 rows of data. The
    column headers are table name, index name, user seeks, user lookups, and last
    user lookup. Data in user lookups are 1 and 0 respectively.


    Figure 5-14


    Query results for user_lookups from sys.dm_db_index_usage_stats


    ```

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.user_lookups

    ,ius.last_user_lookup

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-18

    Query for user_lookups from sys.dm_db_index_usage_stats

    ```


    The last of the index operations is `user_updates`. The `user_updates` column
    is not limited to update operations and covers all `INSERT`, `UPDATE`, and `DELETE`
    operations that occur on a table. To demonstrate this, the T-SQL in Listing [5-19](#338675_4_En_5_Chapter.xhtml#PC19)
    can be executed. This code will insert a record into the `SalesOrderDetail` table,
    update the record, and then delete it from the table. Since the execution plans
    for these operations are complex due to the presence of many foreign key relationships,
    they have not been included in this example.


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO Sales.SalesOrderDetail

    (SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID, UnitPrice,
    UnitPriceDiscount, ModifiedDate)

    SELECT SalesOrderID, CarrierTrackingNumber, OrderQty, ProductID, SpecialOfferID,
    UnitPrice, UnitPriceDiscount, GETDATE() AS ModifiedDate

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderDetailID = 1;

    UPDATE Sales.SalesOrderDetail

    SET CarrierTrackingNumber = ''999-99-9999''

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    DELETE FROM Sales.SalesOrderDetail

    WHERE ModifiedDate > DATEADD(d, -1, GETDATE());

    Listing 5-19

    Index Update Queries

    ```


    At the completion of the execution of the code listing, there were three operations
    that occurred on the table. For each of these operations, `sys.dm_db_index_usage_stats`
    accumulated one tick in the `user_updates` column. Execute the code in Listing
    [5-20](#338675_4_En_5_Chapter.xhtml#PC20) to see the activity that occurred on
    the index. The results will be similar to those in Figure [5-15](#338675_4_En_5_Chapter.xhtml#Fig15).
    Besides the changes made to the clustered index for `SalesOrderDetail`, updates
    made to the non-clustered indexes are also included. Being able to see the full
    effect of an insert, update, or delete on a table can help provide a better understanding
    of all I/O that occurs when write operations are executed.


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_updates

    ,ius.last_user_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-20

    Query for user_updates from sys.dm_db_index_usage_stats

    ```


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig15_HTML.png)


    A screenshot of query table results for user updates with 3 rows of data. The
    column headers are table name, index name, user updates, and last user update.
    Data in user updates are 2, 3 and 2.


    Figure 5-15


    Query results for user_updates from sys.dm_db_index_usage_stats'
