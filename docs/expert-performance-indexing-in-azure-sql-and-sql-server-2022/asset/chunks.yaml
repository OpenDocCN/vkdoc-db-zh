- fmt: 'The last part of the template is where the magic happens. The script in Listing
    [11-30](#338675_4_En_11_Chapter.xhtml#PC30) is used to construct the `ALTER INDEX`
    statement that is used to defragment the index. At this point, the level of fragmentation
    is checked to determine whether to issue a `REBUILD` or `REORGANIZATION`. For
    indexes that can support `ONLINE` index rebuilds, a `CASE` statement adds the
    appropriate syntax.


    ```

    SET @SQL = CONCAT(''ALTER INDEX '', @IndexName,'' ON '',@ObjectName,

    CASE WHEN @CurrentFragmentation <= 30 THEN '' REORGANIZE;''

    ELSE '' REBUILD'' END,

    CASE WHEN CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition'')) LIKE ''Enterprise%''

    OR CONVERT(VARCHAR(100), SERVERPROPERTY(''Edition'')) LIKE ''Developer%''

    THEN '' WITH (ONLINE=ON, SORT_IN_TEMPDB=ON) '' END, '';'');

    Listing 11-30

    Script to Build Index Defragmentation Statements

    ```


    **Note**


    One of the improvements in SQL Server 2017 Enterprise Edition is the ability to
    perform online index rebuilds when the index contains columns with large object
    (LOB) data types.


    Combining all of these pieces into the template from the beginning of this section
    to create an index defragmentation script provides similar functionality to that
    of the maintenance plan tasks. With the ability to set the size and fragmentation
    levels in which the defragmentation occurs, this script removes the fragmentation
    from indexes that really need the work done on them vs. defragmenting every index
    in the database. Using Extended Events on `AdventureWorks2017` to trace the output
    of the script reveals that the `ALTER INDEX` syntax for the results of the previous
    queries is similar to that in Listing [11-31](#338675_4_En_11_Chapter.xhtml#PC31).


    ```

    ALTER INDEX ALL ON [HumanResources].[EmployeePayHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [HumanResources].[JobCandidate] REORGANIZE; WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    ALTER INDEX ALL ON [dbo].[AllocationCycle] REBUILD WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [dbo].[PageCompression] REORGANIZE; WITH (ONLINE=ON, SORT_IN_TEMPDB=ON)
    ;

    ALTER INDEX ALL ON [Sales].[SalesPersonQuotaHistory] REBUILD WITH (ONLINE=ON,
    SORT_IN_TEMPDB=ON) ;

    Listing 11-31

    Index Defragmentation Statements

    ```


    As the code in this section demonstrated, using a T-SQL script can be much more
    complicated than using the maintenance plan tasks. The upside to the complexity
    is that once the script is complete, it can be wrapped in a stored procedure and
    used on any SQL Server instances. This script is meant as a first step in automating
    defragmentation with T-SQL scripts. It does not account for partitioned tables
    and does not check to see whether the index is being used before rebuilding or
    reorganizing the index. On the upside, rather than driving a truck through a set
    of databases and re-indexing everything, a scripted solution can intelligently
    decide how and when to defragment your indexes.


    In addition, a custom T-SQL solution can allow for databases, tables, or indexes
    to be maintained or ignored on a customized basis. This is helpful when an administrator
    has intimate knowledge of how an application works and knows which indexes require
    special maintenance (or none).


    **Note**


    For a complete index defragmentation solution, check out Ola Hallengren’s index
    maintenance scripts at `https://ola.hallengren.com`.


    ## Preventing Fragmentation


    Fragmentation within an index is not always a foregone conclusion. There are some
    methods that can be utilized to mitigate the rate at which fragmentation occurs.
    When there are indexes that are often affected by fragmentation, it is advisable
    to investigate why the fragmentation is occurring.


    It is possible that this research may uncover application, server, or maintenance
    issues that can be solved via other means unrelated to index maintenance. For
    this reason, understanding how an application and its infrastructure operate can
    provide valuable insight into suboptimal query or usage patterns. For example,
    an application may be updating a table far more often than it needs to. These
    updates could manifest as unexpected fragmentation. For a problem such as this,
    resolving the application bug would also reduce fragmentation without the need
    to implement any additional indexing or maintenance options.


    There are a few strategies that can help mitigate fragmentation; these are fill
    factor, data typing, and default values.


    ### Fill Factor


    Fill factor is an option that can be used when building or rebuilding indexes.
    This property is used to determine how much space per page should be left available
    in the index when it is first created or the next time it is rebuilt. For example,
    with a fill factor of 75, about 25 percent of every data page is left empty.


    If an index encounters a significant or frequent amount of fragmentation, it is
    worthwhile to adjust the fill factor to mitigate the fragmentation. By doing this,
    the activities that are causing fragmentation should be less impactful, which
    should reduce the frequency that the index needs to be defragmented.


    By default, SQL Server creates all indexes with a fill factor of 0. This is a
    recommended value for both the server and database levels. Not all indexes are
    created equal, and fill factor should be applied as it is needed, not as a blanket
    insurance policy. Also, a fill factor of 0 is the same as a fill factor of 100.


    The one downside of fill factor is that leaving space available in data pages
    means that the index will require more data pages for all the records in the index.
    More pages mean more storage is used, more I/O, and possibly less utilization
    of the index if there are alternate indexes to select from.


    ### Data Typing


    Another way to avoid fragmentation is through appropriate data typing. This strategy
    applies to data types that can change length depending on the data that they contain.
    These are data types such as `VARCHAR` and `NVARCHAR`, which have lengths that
    can change over time.


    In many cases, variable-length data types are a great fit for columns in a table.
    Issues arise when the volatility of the data is high and the length of the data
    is volatile as well. As the data changes length, there can be page splits, which
    lead to fragmentation. If the length volatility occurs across significant portions
    of the index, then there may also be significant numbers of page splits and thus
    fragmentation.


    A great example of bad data typing comes from my experience with the first data
    warehouse that I worked with. The original design for many of the tables included
    a column with a data type of `VARCHAR(10)`. The column was populated with dates
    in the format of `yyyymmdd`, with values similar to 20191011. As part of the import
    process, the date values were updated into a format of `yyyy-mm-dd`. When the
    import was moved to production and millions of rows were being processed at a
    time, the increase in the length of the column from eight to ten characters led
    to an astounding level of fragmentation because of page splits. Resolving the
    problem was as simple as changing the data type of the column from `VARCHAR(10)`
    to `CHAR(10)`.


    Such simple solutions can apply to many databases. It requires a bit of investigation
    into why the fragmentation is occurring, but by tracking write operations step-by-step,
    it is possible to establish when fragmentation occurs and be able to formulate
    a response to it.'
