    构建非聚集索引的“包含列”模式是创建索引时使用的重要模式。当与导致查找操作的具体查询结合使用时，它能提升读取和执行性能。它还提供了整合相似索引的机会，从而减少表上的索引总数，同时相比不存在索引的情况仍能提供性能提升。


    ### 筛选索引


    在某些表中，存在某些具有特定值的行，这些行在应用程序使用数据库时极少或永远不会在结果集中返回。在这些场景中，将这些行作为结果集返回的选项移除可能是有益的。在其他一些情况下，识别表中的数据子集并基于此创建索引可能很有用。通过使用仅覆盖查询需要返回结果的那数百或数千行的索引，而不是扫描表中的数百万或数十亿条记录，可以提升性能。这两种情况都指明了使用“筛选索引”模式有助于提升性能的场景。


    “筛选索引”模式，顾名思义，使用了 SQL Server 中的筛选索引功能。使用筛选索引时，会在非聚集索引中添加一个 `WHERE` 子句，以减少索引中包含的行数。通过仅包含匹配
    `WHERE` 子囧过滤条件的行，查询引擎在构建执行计划时只需考虑这些行；此外，扫描行范围的成本也低于索引包含所有行的情况。


    为了说明使用筛选索引的价值，考虑一个场景：只有表中的一小部分行在被筛选的列中包含值。清单 13-25 考虑了一个查询的不同版本。第一个版本返回 `CertificationDate`
    有值的行。第二个版本仅返回 `CertificationDate` 在 2005 年 1 月 1 日至 2005 年 2 月 1 日之间的行。对于这两个查询，表中都没有索引能为执行提供最优计划，并且在执行过程中访问了索引的所有
    2,866 个页面（参见图 13-36）。检查两个执行计划（图 13-37）显示，使用了 `dbo.Contacts` 的聚集索引扫描来查找匹配 `CertificationDate`
    谓词的行。正如缺失索引提示所建议的，在 `CertificationDate` 列上创建索引可以提升查询性能。


