- fmt: '### Index Physical Stats


    The last indexing DMO for monitoring indexes is `sys.dm_db_index_physical_stats`.
    This DMO provides statistics on the current physical structure of the indexes
    in a database. The value of this information is in determining the fragmentation
    of the index, which is discussed more in Chapter [8](#338675_4_En_8_Chapter.xhtml).
    From a monitoring perspective, physical statistics are being collected to aid
    with later analysis. The goal is to identify potential issues that may be affecting
    the efficiency in how the index is stored, or vice versa, thus impacting query
    performance.


    With the physical stats DMO, the statistics are collected a bit differently than
    with the other DMOs. The main difference between this DMO and the others is the
    impact that can be placed on the database while collecting the information. With
    the other two reference in-memory tables, `index_physical_stats` reads the pages
    in the index to determine the actual fragmentation and physical layout of the
    indexes. Chapter [5](#338675_4_En_5_Chapter.xhtml) can be referenced for more
    about the impact of using `sys.dm_db_index_physical_stats`. To accommodate this
    difference, the statistics are stored only in a history table; the deltas between
    the points in which the history is retrieved are not determined. Also, because
    of the nature of the statistics contained in the DMO, there would be little value
    in calculating delta values.


    The first piece needed to begin collecting statistics on index physical stats
    is the previously mentioned history table. This table, shown in Listing [15-11](#338675_4_En_15_Chapter.xhtml#PC11),
    uses the same schema as the DMO, with the addition of the `create_date` column.


    Tip


    When generating the table schema needed for the DMOs, a table-valued function
    introduced in SQL Server 2012 is used. The function `sys.dm_exec_describe_first_result_set`
    can be used to identify the column names and data types for a query.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_physical_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT,

    object_id INT,

    index_id INT,

    partition_number INT,

    index_type_desc NVARCHAR(60),

    alloc_unit_type_desc NVARCHAR(60),

    index_depth TINYINT,

    index_level TINYINT,

    avg_fragmentation_in_percent FLOAT,

    fragment_count BIGINT,

    avg_fragment_size_in_pages FLOAT,

    page_count BIGINT,

    avg_page_space_used_in_percent FLOAT,

    record_count BIGINT,

    ghost_record_count BIGINT,

    version_ghost_record_count BIGINT,

    min_record_size_in_bytes INT,

    max_record_size_in_bytes INT,

    avg_record_size_in_bytes FLOAT,

    forwarded_record_count BIGINT,

    compressed_page_count BIGINT,

    hobt_id BIGINT NULL,

    columnstore_delete_buffer_state TINYINT NULL,

    columnstore_delete_buffer_state_desc NVARCHAR(60) NULL,

    version_record_count BIGINT NULL,

    inrow_version_record_count BIGINT NULL,

    inrow_diff_version_record_count BIGINT NULL,

    total_inrow_version_payload_size_in_bytes BIGINT NULL,

    offrow_regular_version_record_count BIGINT NULL,

    offrow_long_term_version_record_count BIGINT NULL,

    CONSTRAINT PK_IndexPhysicalStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexPhysicalStatsHistory

    UNIQUE

    (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    alloc_unit_type_desc,

    index_depth,

    index_level

    )

    );

    Listing 15-11

    Index Physical Stats History Table

    ```


    The collection of the history for `index_physical_stats` differs from the previous
    two DMOs. Since it is only history, there is no need to capture the snapshot information
    to build the delta between the two snapshots for the history. Instead, the current
    statistics are inserted directly into the history table, as shown in Listing [15-12](#338675_4_En_15_Chapter.xhtml#PC12).
    Also, since `index_physical_stats` performs physical operations on the index while
    collecting the statistics, there are a few things to keep in mind when generating
    the history information. First, the script will collect information from each
    database independently from the other databases through a `CURSOR`-drive loop.
    This provides a batched separation between the collections of statistics for each
    database and limits the impact of the DMO. Second, the query should be executed
    during noncore hours. The start of the daily maintenance window would be ideal.
    It is important that this information is collected prior to defragmentation or
    re-indexing since these operations will change the information provided by the
    DMO. Usually, this information is collected as a step in the defragmentation process,
    which is discussed in Chapter [8](#338675_4_En_8_Chapter.xhtml). If so, there’s
    no need to collect the information twice. Collect it for defragmentation and store
    it for later use in monitoring indexes.


    ```

    USE IndexingMethod;

    GO

    DECLARE @DatabaseID INT;

    DECLARE DatabaseList CURSOR FAST_FORWARD FOR

    SELECT database_id

    FROM sys.databases

    WHERE state_desc = ''ONLINE''

    AND database_id > 4;

    OPEN DatabaseList;

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO dbo.index_physical_stats_history (

    create_date,

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    )

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    partition_number,

    index_type_desc,

    alloc_unit_type_desc,

    index_depth,

    index_level,

    avg_fragmentation_in_percent,

    fragment_count,

    avg_fragment_size_in_pages,

    page_count,

    avg_page_space_used_in_percent,

    record_count,

    ghost_record_count,

    version_ghost_record_count,

    min_record_size_in_bytes,

    max_record_size_in_bytes,

    avg_record_size_in_bytes,

    forwarded_record_count,

    compressed_page_count,

    hobt_id,

    columnstore_delete_buffer_state,

    columnstore_delete_buffer_state_desc,

    version_record_count,

    inrow_version_record_count,

    inrow_diff_version_record_count,

    total_inrow_version_payload_size_in_bytes,

    offrow_regular_version_record_count,

    offrow_long_term_version_record_count

    FROM sys.dm_db_index_physical_stats(@DatabaseID, NULL, NULL, NULL, ''SAMPLED'');

    FETCH NEXT FROM DatabaseList

    INTO @DatabaseID;

    END;

    CLOSE DatabaseList;

    DEALLOCATE DatabaseList;

    Listing 15-12

    Index Physical Stats History Population

    ```'
