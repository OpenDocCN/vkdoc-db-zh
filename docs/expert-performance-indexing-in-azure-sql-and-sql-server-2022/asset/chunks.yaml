    #### Columnstore Fragmentation


    Columnstore indexes operate very differently from standard rowstore indexes (clustered,
    non-clustered, and heaps). An interesting component of columnstore indexes is
    the read-only nature of segments. As discussed in Chapter [2](#338675_4_En_2_Chapter.xhtml),
    small inserts into a columnstore index will be processed by the deltastore and
    later asynchronously merged into compressed rowgroups. In addition, deletes are
    processed as soft deletes. Rows are flagged as deleted, but not immediately removed,
    resulting in segments that contain data that is no longer part of the table.


    To demonstrate each of these concepts, execute the code in Listing [11-18](#338675_4_En_11_Chapter.xhtml#PC18)
    to prepare a table with a clustered columnstore index. After the table is built,
    the two sets of rows are inserted. The first set contains 1,000 rows, and the
    index is reorganized to force the rowgroup to compress to columnstore format.
    The second set contains 105,000 rows, which is more than the 102,400 threshold
    that automatically inserts rows directly into compressed rowgroups. Figure [11-16](#338675_4_En_11_Chapter.xhtml#Fig16)
    shows that the inserted records are compressed directly into columnstore format.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig16_HTML.png)


    A table has 10 columns and 10 rows. The column headers are object i d, the index
    i d, partition number, row group id, delta store heap or b tree i d, state, state
    description, total rows, deleted rows, and size in bytes. 7 rows have compressed
    row groups.


    Figure 11-16


    Columnstore rowgroup result set


    Note


    Depending on your environment, the script in Listing [11-18](#338675_4_En_11_Chapter.xhtml#PC18)
    may take a while to run.


    ```

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactOnlineSalesCI'') IS NOT NULL

    DROP TABLE dbo.FactOnlineSalesCI

    CREATE TABLE dbo.FactOnlineSalesCI(

    [OnlineSalesKey] [int] NOT NULL,

    [DateKey] [datetime] NOT NULL,

    [StoreKey] [int] NOT NULL,

    [ProductKey] [int] NOT NULL,

    [PromotionKey] [int] NOT NULL,

    [CurrencyKey] [int] NOT NULL,

    [CustomerKey] [int] NOT NULL,

    [SalesOrderNumber] [nvarchar](20) NOT NULL,

    [SalesOrderLineNumber] [int] NULL,

    [SalesQuantity] [int] NOT NULL,

    [SalesAmount] [money] NOT NULL,

    [ReturnQuantity] [int] NOT NULL,

    [ReturnAmount] [money] NULL,

    [DiscountQuantity] [int] NULL,

    [DiscountAmount] [money] NULL,

    [TotalCost] [money] NOT NULL,

    [UnitCost] [money] NULL,

    [UnitPrice] [money] NULL,

    [ETLLoadID] [int] NULL,

    [LoadDate] [datetime] NULL,

    [UpdateDate] [datetime] NULL

    )

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT *

    FROM dbo.FactOnlineSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactOnlineSalesCI_CCI ON dbo.FactOnlineSalesCI

    DECLARE @we int= 1

    WHILE @we <= 5

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 1000 *

    FROM dbo.FactOnlineSales

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REORGANIZE

    WITH (COMPRESS_ALL_ROW_GROUPS =ON)

    SET @we += 1

    END

    WHILE @we <= 10

    BEGIN

    INSERT INTO dbo.FactOnlineSalesCI

    SELECT TOP 105000 *

    FROM dbo.FactOnlineSales

    SET @we += 1

    END

    SELECT*

    FROM sys.column_store_row_groups

    WHERE object_id=OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

