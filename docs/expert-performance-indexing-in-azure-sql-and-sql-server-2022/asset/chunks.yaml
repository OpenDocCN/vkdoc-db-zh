    几分钟后，调优会话将完成，不过所需时间完全取决于给定计算机的工作负载。使用清单 12-1 中的索引，结果应与图 12-7 中的类似。在这些结果中，有两条建议。虽然名称在不同环境中会有所不同，但建议应如下所示：


    ![](img/338675_4_En_12_Fig7_HTML.png)


    **图 12-7**

    数据库引擎调优顾问的建议


    数据库引擎调优顾问的一个窗口中，在会话监视器下方的左侧面板中，有一个标签为**索引书管理器**的选项卡。从打开的建议选项卡中，会显示分区建议部分下方的索引建议部分中的几个复选框。


    *   在 `OrderDate` 和 `DueDate` 上建立索引，并包含 `CustomerID`

    *   在 `OrderDate` 和 `DueDate` 上建立统计信息


    此索引与之前使用缺失索引 `DMO`（动态管理对象）找到的建议相似。在提供多条建议的情况下，有必要考虑与审查来自缺失索引 `DMO` 的建议时相同的因素，例如“这些建议能否合并？”此外，当建议创建统计信息时，它们是否与将要创建的索引足够匹配，以至于该索引能够提供查询所需的统计信息？要从建议列表中删除任何项目，请取消选中其复选框，这样它就不会包含在任何建议输出中。


    此时，有几种选项可用于应用索引：


    *   *应用索引*：要应用索引，请在菜单栏中选择 `操作`，然后选择 `应用建议`。在出现的 `应用建议` 窗口中，保留默认选项 `立即应用` 被选中，然后单击确定。

    *   *将来应用索引*：要将来应用索引，请在菜单栏中选择 `操作`，然后选择 `应用建议`。在出现的 `应用建议` 窗口中，选择“计划稍后执行”。根据需要修改计划的日期，然后单击确定。这将创建一个
    `SQL Server 代理` 作业。请确保 `SQL Server 代理` 正在运行，并且代理服务帐户具有应用索引所需的权限。

    *   *保存建议*：要保存建议，请单击菜单栏中的 `保存建议` 图标，然后按组合键 `Ctrl+S`，或在菜单栏中选择 `操作` ➤ `保存建议`。


    如果保存建议，它们将生成一个类似于清单 12-5 中的脚本。在应用来自 `DTA` 的索引之前，建议将索引名称更改为符合您组织索引命名标准。同样重要的是要考虑是否对索引应用压缩。至于统计信息，添加这些就不那么重要了，原因有几个。首先，`SQL
    Server` 会在后台根据需要自动创建统计信息，无需手动创建自定义统计信息。其次，索引本身就包含统计信息，通常能提供所需的内容。


    ```sql

    use AdventureWorks2017;

    go

    CREATE NONCLUSTERED INDEX [_dta_index_SalesOrderHeader_8_1922105888__K4_K3_11]
    ON [Sales].[SalesOrderHeader]

    (

    [DueDate] ASC,

    [OrderDate] ASC

    )

    INCLUDE([CustomerID]) WITH (SORT_IN_TEMPDB = OFF, DROP_EXISTING = OFF, ONLINE
    = OFF) ON [PRIMARY]

    go

    ```

    **清单 12-5**

    数据库引擎调优顾问索引建议


    通过其 `GUI`（图形用户界面）使用 `DTA`，可以快速优化工作负载。返回的建议提供了比使用缺失索引 `DMO` 更高层次的索引调优。本质上，它们提供了一种强力的索引实践，可以在不改进代码的情况下提升性能。这样，就无需花费大量时间调优那些只需添加几个新索引就能解决的问题，而是可以将时间和精力集中在比仅仅添加索引更复杂的性能调优问题上。


    **注意**

    如果 `DTA` 在处理过程中被终止，有时会留下一些假设索引，这些索引是它在调查可能改善环境的索引时使用的。假设索引是仅包含统计信息而不包含数据的索引。可以通过
    `sys.indexes` 中的 `is_hypothetical` 列来识别这些索引。如果它们存在于您的环境中，应始终将其删除。


    ## 使用 `DTA` 实用工具


    `GUI` 并不是在 `SQL Server` 环境中使用 `DTA` 的唯一方式。另一种方式是通过命令行使用 `DTA` 实用工具。`DTA` 实用工具虽然缺乏交互式界面，但它通过可以在脚本和自动化中灵活利用该实用工具来弥补这一不足。


    使用 `DTA` 实用工具的语法如清单 12-6 所示，包含多个参数。这些参数在表 12-5 中定义，它们使得 `DTA` 实用工具具有与 `GUI` 相同的功能和灵活性。配置信息是通过这些参数传入的，而不是通过点击多个屏幕。


    **表 12-5**

    DTA 实用工具参数

    '
- fmt: '# DTA 参数说明


    | 参数 | 描述 |

    | --- | --- |

    | `-?` | 返回帮助信息，包括所有参数的列表。 |

    | `-A` | 提供时间限制（以分钟为单位），指定 DTA 实用程序优化工作负载的时间上限。默认时间限制为 8 小时，即 640 分钟。将限制设置为 0
    将导致无限制的优化会话。 |

    | `-a` | 在工作负载优化后，无需进一步提示即可应用推荐。 |

    | `-B` | 指定推荐索引可以消耗的最大大小（以兆字节为单位）。默认情况下，该值设置为当前原始数据大小的三倍，或附加磁盘驱动器的可用空间加上原始数据大小，以两者中较小者为准。
    |

    | `-c` | DTA 在索引中推荐的键列的最大数量。此值默认为 `16`。此限制不包括 `INCLUDED` 列。 |

    | `-C` | DTA 在索引中推荐的列的最大数量。该值默认为 `16`，但可以提高到 `1024`（索引允许的最大列数）。 |

    | `-d` | 标识 DTA 会话开始时连接到的数据库。此参数只能指定单个数据库。 |

    | `-D` | 标识 DTA 会话将针对其优化工作负载的数据库。此参数可以指定一个或多个数据库。要将会话添加多个数据库，可以在一个参数中以逗号分隔的列表包含所有数据库名称，或者每个数据库添加一个参数。
    |

    | `-e` | 标识日志表或文件的名称，DTA 会话将输出无法优化的事件。指定表名时，请使用三部分命名约定 `[database_name].[schema_name].[table_name]`。对于输出文件，文件的扩展名应为
    `.xml`。 |

    | `-E` | 使用可信连接设置数据库连接。未使用必需参数 `-U` 时需要。 |

    | `-F` | 授予 DTA 权限以覆盖已存在的输出文件。 |

    | `-fa` | 标识 DTA 会话可以在推荐中包含的物理设计结构的类型。此参数的默认值为 `IDX`。可用值如下：<br>• `IDX_IV`：索引和索引视图<br>•
    `IDX`：仅索引<br>• `IX`：仅索引视图<br>• `NCL_IDX`：仅非聚集索引 |

    | `-fi` | 允许 DTA 会话包含对筛选索引的推荐。 |

    | `-fc` | 允许 DTA 会话包含对列存储索引的推荐。 |

    | `-fk` | 设置 DTA 会话可以在推荐中修改的现有物理设计结构的限制。可用值如下：<br>• `NONE`：无现有结构<br>• `ALL`：所有现有结构<br>•
    `ALIGNED`：所有分区对齐的结构<br>• `CL_IDX`：表上的所有聚集索引<br>• `IDX`：表上的所有聚集和非聚集索引 |

    | `-fp` | 确定是否可以将分区推荐包含在 DTA 会话推荐中。此参数的默认值为 `NONE`。可用值如下：<br>• `NONE`：无分区<br>•
    `FULL`：完整分区<br>• `ALIGNED`：对齐分区 |

    | `-fx` | 限制 DTA 会话仅包含删除现有物理设计结构的推荐。评估会话中使用不频繁的索引，并提供删除它们的推荐。此参数不能与参数 `-fa`、`-fp`
    和 `-fk ALL` 一起使用。 |

    | `-ID` | 为 DTA 会话设置数字标识符。必须指定此参数或 `-s`。 |

    | `-ip` | 将 DTA 会话的工作负载源设置为计划缓存。分析使用 `-D` 参数指定的数据库的前 `–n` 个计划缓存事件。 |

    | `-ipf` | 将 DTA 会话的工作负载源设置为计划缓存。分析所有数据库的前 `–n` 个计划缓存事件。 |

    | `-if` | 将 DTA 会话的工作负载源设置为文件源。路径和文件名通过此参数传递。文件必须是 SQL Server Profiler 跟踪文件 (`.trc`)、SQL
    文件 (`.sql`) 或 SQL Server 跟踪文件 (`.log`)。 |

    | `-it` | 将 DTA 会话的工作负载源设置为表。指定表名时，请使用三部分命名约定 `[database_name].dbo.[table_name]`。表的架构必须是
    `dbo`。 |

    | `-ix` | 标识包含 DTA 会话配置信息的 XML 文件。XML 文件必须符合 `DTASchema.xsd`（位于 [`http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd`](http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd)）。
    |

    | `-m` | 设置推荐必须提供的最小改进百分比。 |

    | `-n` | 设置 DTA 会话应优化的工作负载中的事件数量。为跟踪文件指定时，所选事件的顺序基于持续时间的降序。 |

    | `-N` | 确定物理设计结构是联机还是脱机创建。可用值如下：<br>• `OFF`：不联机创建任何对象。<br>• `ON`：所有对象联机创建。<br>•
    `MIXED`：尽可能创建对象。 |

    | `-of` | 配置 DTA 会话以 T-SQL 格式输出推荐到指定的路径和文件。 |

    | `-or` | 配置 DTA 会话将推荐输出为 XML 格式的报告。未提供文件名时，将使用基于会话 (`-s`) 名称的文件名。 |

    | `-ox` | 配置 DTA 会话以 XML 格式输出推荐到指定的路径和文件。 |

    | `-P` | 设置数据库连接中 SQL 登录使用的密码。 |

    | `-q` | 将 DTA 会话设置为以静默模式执行。 |

    | `-rl` | 配置 DTA 会话将生成的报告。可以在逗号分隔的列表中选择一个或多个报告。可用值如下：<br>• `ALL`：所有分析报告<br>• `STMT_COST`：语句成本报告<br>•
    `EVT_FREQ`：事件频率报告<br>• `STMT_DET`：语句详细信息报告<br>• `CUR_STMT_IDX`：语句-索引关系报告（当前配置）<br>•
    `REC_STMT_IDX`：语句-索引关系报告（推荐配置）<br>• `STMT_COSTRANGE`：语句成本范围报告<br>• `CUR_IDX_USAGE`：索引使用情况报告（当前配置）<br>•
    `REC_IDX_USAGE`：索引使用情况报告（推荐配置）<br>• `CUR_IDX_DET`：索引详细信息报告（当前配置）<br>• `REC_IDX_DET`：索引详细信息报告（推荐配置）<br>•
    `VIW_TAB`：视图-表关系报告<br>• `WKLD_ANL`：工作负载分析报告<br>• `DB_ACCESS`：数据库访问报告<br>• `TAB_ACCESS`：表访问报告<br>•
    `COL_ACCESS`：列访问报告 |

    | `-S` | 设置 DTA 会话要使用的 SQL Server 实例。 |

    | `-s` | 设置 DTA 会话的名称。 |

    | `-Tf` | 标识包含用于优化的表列表的路径和文件的名称。该文件应包含使用三部分命名约定的每行一个表。在每个表名之后，可以指定行数以针对该表的缩放版本优化工作负载。如果省略
    `-Tf` 和 `-Tl`，DTA 会话将默认使用所有表。 |

    | `-Tl` | 设置用于优化的表列表。每个表应使用三部分命名约定列出，每个表名用逗号分隔。如果省略 `-Tf` 和 `-Tl`，DTA 会话将默认使用所有表。
    |

    | `-U` | 设置数据库连接中 SQL 登录使用的用户名。未使用必需参数 `-E` 时需要。 |

    | `-u` | 启动 DTA 的 GUI 界面，其中包含为 DTA 实用程序指定的所有配置值。 |

    | `-x` | 启动 DTA 会话并在完成后退出。 |'
  raw: '| Argument | Description |

    | --- | --- |

    | `-?` | Returns help information, including a list of all arguments. |

    | `-A` | Provides a time limit, in minutes, in which the DTA utility will spend
    tuning the workload. The default time limit is 8 hours, or 640 minutes. Setting
    the limit to 0 will result in an unlimited tuning session. |

    | `-a` | After the workload is tuned, the recommendations are applied without
    further prompting. |

    | `-B` | Specifies the maximum size, in megabytes, that recommended indexes can
    consume. By default, this value is set to either three times the current raw data
    size or the free space on attached disk drives plus raw data size, whichever is
    smaller. |

    | `-c` | Maximum number of key columns that the DTA will recommend in an index.
    This value defaults to 16\. The restriction does not include `INCLUDED` columns.
    |

    | `-C` | Maximum number of columns that the DTA will recommend in an index. The
    value defaults to 16 but can be raised as high as 1024, the maximum columns allowed
    in an index. |

    | `-d` | Identifies the database that the DTA session connects to when the session
    begins. Only a single database can be specified for this argument. |

    | `-D` | Identifies the databases that the DTA session will tune the workload
    against. One or more databases can be specified for this argument. To add multiple
    databases to a session, either include all the database names in a comma-separated
    list in one argument or add one argument per database. |

    | `-e` | Identifies the name of the logging table or file where the DTA session
    will output events that could not be tuned. When specifying a table name, use
    the three-part naming convention of `[database_name].[schema_name].[table_name]`.
    With an output file, the extension for the file should be `.xml`. |

    | `-E` | Sets the database connection using a trusted connection. The required
    argument `if -U` is not used. |

    | `-F` | Grants DTA permission to overwrite an output file if it already exists.
    |

    | `-fa` | Identifies the types of physical design structures that the DTA session
    can include in the recommendations. The default value for this argument is IDX.
    The available values are as follows:• `IDX_IV`: Indexes and indexed views• `IDX`:
    Indexes only• `IX`: Indexed views only• `NCL_IDX`: Non-clustered indexes only
    |

    | `-fi` | Allows the DTA session to include recommendations for filtered indexes.
    |

    | `-fc` | Allows the DTA session to include recommendations for columnstore indexes.
    |

    | `-fk` | Sets the limitations on the existing physical design structures that
    the DTA session can modify in the recommendations. The available values are as
    follows:•    `NONE`: No existing structures•    `ALL`: All existing structures•    `ALIGNED`:
    All partition-aligned structures•    `CL_IDX`: All clustered indexes on tables•    `IDX`:
    All clustered and non-clustered indexes on tables |

    | `-fp` | Determines whether partitioning recommendations can be included in the
    DTA session recommendations. The default value for this argument is `NONE`. The
    available values are as follows:• `NONE`: No partitioning• `FULL`: Full partitioning•
    `ALIGNED`: Aligned partitioning |

    | `-fx` | Limits the DTA session to only including recommendations to drop existing
    physical design structures. Lightly used indexes in the session are evaluated,
    and recommendations for dropping them are provided. This argument cannot be used
    with the arguments `-fa`, `-fp`, and `-fk ALL`. |

    | `-ID` | Sets a numerical identifier for the DTA session. Either this argument
    or `-s` must be specified. |

    | `-ip` | Sets the source of the workload for the DTA session to the plan cache.
    The top `–n` plan cache events for the databases specified with argument `–D`
    are analyzed. |

    | `-ipf` | Sets the source of the workload for the DTA session to the plan cache.
    The top `–n` plan cache events for all databases are analyzed. |

    | `-if` | Sets the source of the workload for the DTA session to a file source.
    The path and file name are passed in through this argument. The file must be a
    SQL Server Profiler trace file (`trc`), SQL file (`sql`), or SQL Server trace
    file (`log`). |

    | `-it` | Sets the source of the workload for the DTA session to a table. When
    specifying a table name, use the three-part naming convention of `[database_name].dbo.[table_name]`.
    The schema for the table must be `dbo`. |

    | `-ix` | Identifies an XML file containing the configuration information for
    the DTA session. The XML file must conform to the `DTASchema.xsd` (which is located
    at [`http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd`](http://schemas.microsoft.com/sqlserver/2004/07/dta/dtaschema.xsd)).
    |

    | `-m` | Sets the minimum percentage of improvement that a recommendation must
    provide. |

    | `-n` | Sets the number of events in the workload that the DTA session should
    tune. When specified for a trace file, the order of the events selected is based
    on the decreasing order of duration. |

    | `-N` | Determines whether the physical design structures are created online
    or offline. The available values are as follows:• `OFF`: No objects are created
    online.• `ON`: All objects are created online.• `MIXED`: Objects are created where
    possible. |

    | `-of` | Configures the DTA session to output the recommendations in a T-SQL
    format in the path and file specified. |

    | `-or` | Configures the DTA session to output the recommendations to a report
    in an XML format. When a file name is not provided, a file name based on the session
    (`-s`) name will be used. |

    | `-ox` | Configures the DTA session to output the recommendations in an XML format
    in the path and file specified. |

    | `-P` | Sets the password to be used for the SQL login in the database connection.
    |

    | `-q` | Sets the DTA session to execute in quiet mode. |

    | `-rl` | Configures the reports that will be generated by the DTA session. One
    or more reports can be selected in a comma-separated list. The available values
    are as follows:• `ALL`: All analysis reports• `STMT_COST`: Statement cost report•
    `EVT_FREQ`: Event frequency report• `STMT_DET`: Statement detail report• `CUR_STMT_IDX`:
    Statement-index relations report (current configuration)• `REC_STMT_IDX`: Statement-index
    relations report (recommended configuration)• `STMT_COSTRANGE`: Statement cost
    range report• `CUR_IDX_USAGE`: Index usage report (current configuration)• `REC_IDX_USAGE`:
    Index usage report (recommended configuration)• `CUR_IDX_DET`: Index detail report
    (current configuration)• `REC_IDX_DET`: Index detail report (recommended configuration)•
    `VIW_TAB`: View-table relations report• `WKLD_ANL`: Workload analysis report•
    `DB_ACCESS`: Database access report• `TAB_ACCESS`: Table access report• `COL_ACCESS`:
    Column access report |

    | `-S` | Sets the instance of SQL Server to be used for the DTA session. |

    | `-s` | Sets the name of the DTA session. |

    | `-Tf` | Identifies the name of a path and file containing a list of tables to
    be used for tuning. The file should contain one table per line using the three-part
    naming convention. After each table name, the number of rows can be specified
    to tune the workload for a scaled version of the table. If `-Tf` and `-Tl` are
    omitted, the DTA session will default to using all tables. |

    | `-Tl` | Sets a list of tables to be used for tuning. Each table should be listed
    using the three-part naming convention, with each table name separated by a comma.
    If `-Tf` and `-Tl` are omitted, the DTA session will default to using all tables.
    |

    | `-U` | Sets the username to be used for the SQL login in the database connection.
    The required argument `if -E` is not used. |

    | `-u` | Launches the GUI interface for the DTA with all of the configuration
    values specified to the DTA utility. |

    | `-x` | Starts the DTA session and exists upon completion. |'
