    \ during index operations. When enabled, locking is minimized, and an intent shared\
    \ is the primary lock held during index creation. When disabled, the locking will\
    \ prevent data modifications to the index and underlying table for the duration\
    \ of the operation. `ONLINE` is an Enterprise Edition–only feature until SQL Server\
    \ 2016 Service Pack 1. |\n| `RESUMABLE` | Identifies whether an indexing operation\
    \ will be resumable. New as of SQL Server 2019. |\n| `MAX_DURATION` | Determines\
    \ the maximum number of minutes for a resumable indexing operation to execute\
    \ until pausing. New as of SQL Server 2019. |\n| `ALLOW_ROW_LOCKS` | Determines\
    \ whether row locks are allowed on an index. By default, they are allowed. |\n\
    | `ALLOW_PAGE_LOCKS` | Determines whether page locks are allowed on an index.\
    \ By default, they are allowed. |\n| `MAXDOP` | Overrides the server-level maximum\
    \ degree of parallelism during the index operation. The setting determines the\
    \ maximum number of processors that an index can utilize during an index operation.\
    \ |\n| `DATA_COMPRESSION` | Determines the type of data compression to use on\
    \ the index. By default, no compression is enabled. With this, either the page-\
    \ or row-level compression type may be specified. |\n\nTo demonstrate the CREATE\
    \ INDEX syntax, an index will be built on the table *Sales.SalesOrderDetail* in\
    \ *AdventureWorks2017*. The key column for the index is *ProductID* with the columns\
    \ *OrderQty* and *UnitPrice* included as non-key columns. Additionally, the index\
    \ will be PAGE compressed. The code in Listing [1-3](#338675_4_En_1_Chapter.xhtml#PC3)\
    \ builds this index.\n\n```\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Sales_SalesOrderDetail_ProductID\n\
    ON Sales.SalesOrderDetail (ProductID)\nINCLUDE (OrderQty, UnitPrice)\nWITH (DATA_COMPRESSION\
    \ = PAGE);\nListing 1-3\nCREATE INDEX Example\n```\n\n### Altering an Index\n\n\
    After an index has been created, there will sometimes be a need to modify the\
    \ index. Altering an index is the way in which an index rebuild or reorganization\
    \ can be executed as part of ongoing index maintenance. In addition, altering\
    \ an index allows for some index options to be adjusted, such as the compression\
    \ type.\n\nTo modify an index, the `ALTER INDEX` syntax is used. Listing [1-4](#338675_4_En_1_Chapter.xhtml#PC4)\
    \ shows the basic syntax for altering an index.\n\n```\nALTER INDEX { index_name\
    \ | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL] [ WITH (  [ ,...n ] ) ]\n| [ PARTITION\
    \ = partition_number [ WITH (  [ ,...n ] ) ] ] ]\n| DISABLE\n| REORGANIZE\n[ PARTITION\
    \ = partition_number ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n| SET (  [\
    \ ,...n ] )\n| RESUME [WITH (,[...n])]\n| PAUSE\n| ABORT\n} [ ; ]\nListing 1-4\n\
    ALTER INDEX Syntax\n```\n\nWhen using the `ALTER INDEX` syntax for index maintenance,\
    \ there are two options in the syntax that can be used. These options are `REBUILD`\
    \ and `REORGANIZE`. The `REBUILD` option recreates the index using the existing\
    \ index structure and options. It can also be used to enable a disabled index.\
    \ The `REORGANIZE` option re-sorts the leaf-level pages of an index. This is similar\
    \ to reshuffling the cards in a deck to get them back in sequential order. Both\
    \ of these options will be discussed more thoroughly in Chapter [11](#338675_4_En_11_Chapter.xhtml).\n\
    \nAdditionally, the ALTER INDEX syntax can be used to disable an index. This is\
    \ accomplished through the `DISABLE` option under the `ALTER INDEX` syntax. A\
    \ disabled index will not be used or made available by the database engine. After\
    \ an index is disabled, it can be reenabled only by altering the index again with\
    \ the `REBUILD` option.\n\nBeyond those functions, many of the index options available\
    \ through the `CREATE INDEX` syntax are also available with the `ALTER INDEX`\
    \ syntax. The `ALTER INDEX` syntax can be used to modify the compression of an\
    \ index. It can also be used to change the fill factor or the pad index setting.\
    \ Depending on the needs of a given index, this syntax can be used to change any\
    \ of the available options, though there are some limitations with how the options\
    \ are used. When REBUILD ALL partitions is used on an index, all of the same options\
    \ that were available with the CREATE INDEX syntax can be modified, as shown in\
    \ Listing [1-5](#338675_4_En_1_Chapter.xhtml#PC5). However, when a single partition\
    \ is targeted with a REBUILD operation, the list of options available is greatly\
    \ reduced, as shown in Listing [1-6](#338675_4_En_1_Chapter.xhtml#PC6). This is\
    \ because some index properties are universal and apply to an entire index, whereas\
    \ others can be defined on a partition-by-partition basis.\n\n```\nSORT_IN_TEMPDB\
    \ = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n| RESUMABLE = { ON | OFF\
    \ }\n| MAX_DURATION =  [MINUTES}\n| DATA_COMPRESSION = { NONE | ROW | PAGE } }\n\
    | ONLINE = { ON [ (  ) ] | OFF }\nListing 1-6\nALTER INDEX Single-Partition Rebuild\
    \ Options\n```\n\n```\nPAD_INDEX = { ON | OFF }\n| FILLFACTOR = fillfactor\n|\
    \ SORT_IN_TEMPDB = { ON | OFF }\n| IGNORE_DUP_KEY = { ON | OFF }\n| STATISTICS_NORECOMPUTE\
    \ = { ON | OFF }\n| STATISTICS_INCREMENTAL = { ON | OFF }\n| ONLINE = { ON [ (\
    \  ) ] | OFF }\n| RESUMABLE = { ON | OFF }\n| MAX_DURATION =  [MINUTES}\n| ALLOW_ROW_LOCKS\
    \ = { ON | OFF }\n| ALLOW_PAGE_LOCKS = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n\
    | DATA_COMPRESSION = { NONE | ROW | PAGE }\n[ ON PARTITIONS ( { [ TO ] } [ , ...n\
    \ ] ) ]\nListing 1-5\nALTER INDEX Rebuild Options\n```\n\nFor REORGANIZE, the\
    \ options for ALTER INDEX are limited to LOB_COMPACTION, shown in Listing [1-7](#338675_4_En_1_Chapter.xhtml#PC7).\
    \ When LOB_COMPACTION is set to ON, the reorganization will attempt to compact\
    \ large object (LOB) pages, allowing space within the index associated with these\
    \ pages to be reduced and released. Without this option, the reorganization will\
    \ not release these pages.\n\n```\nLOB_COMPACTION = { ON | OFF }\nListing 1-7\n\
    ALTER INDEX Reorganize Options\n```"
  trans: "# CREATE INDEX 语法选项\n\n每个选项都允许对索引创建过程进行不同级别的控制。标有下划线的选项表示其默认值。在处理索引时，除非有特定用例需要更改它们，否则使用默认选项是值得的。表\
    \ 1-1 列出了 `CREATE INDEX` 的可用选项。在后续章节中，将提供示例及其应用策略。关于 `CREATE INDEX` 语法的更多信息及其使用示例，可参考\
    \ SQL Server 的 SQL 文档。\n\n**表 1-1: CREATE INDEX 语法选项**\n\n| 选项名称 | 描述 |\n| ---\
    \ | --- |\n| `FILLFACTOR` | 定义索引创建时每个数据页中应保留的空闲空间量。此选项仅在索引创建或重建时应用。 |\n| `PAD_INDEX`\
    \ | 指定是否应将索引的 `FILLFACTOR` 应用于索引的非叶级数据页。当需要缓解导致过度非叶级页拆分的数据操作语言（DML）操作时，使用 `PAD_INDEX`\
    \ 选项。 |\n| `SORT_IN_TEMPDB` | 确定是否将构建索引时产生的临时结果存储在 `tempdb` 数据库中。此选项会增加所需的空间量。\
    \ |\n| `IGNORE_DUP_KEY` | 更改在对表执行插入操作时遇到重复键时的行为。启用时，违反键约束的行将失败。当默认行为被禁用时，整个插入操作将失败。\
    \ |\n| `STATISTICS_NORECOMPUTE` | 指定在创建索引时是否应重新创建与该索引相关的任何统计信息。 |\n| `STATISTICS_INCREMENTAL`\
    \ | 指定为索引收集的统计信息是应基于整个索引创建，还是应按分区创建。 |\n| `DROP_EXISTING` | 确定当表中已存在同名索引时的行为。默认情况下，当设置为\
    \ `OFF` 时，索引创建将失败。当设置为 `ON` 时，索引创建将替换现有索引。 |\n| `ONLINE` | 确定在索引操作期间，表及其索引是否可用于查询和数据修改。启用时，锁被最小化，在索引创建期间持有的主要锁是意向共享锁。禁用时，锁将在操作期间阻止对索引和基础表的数据修改。在\
    \ SQL Server 2016 Service Pack 1 之前，`ONLINE` 是仅限于企业版的功能。 |\n| `RESUMABLE` | 标识索引操作是否可恢复。此为\
    \ SQL Server 2019 新增功能。 |\n| `MAX_DURATION` | 确定可恢复索引操作在暂停前可执行的最大分钟数。此为 SQL Server\
    \ 2019 新增功能。 |\n| `ALLOW_ROW_LOCKS` | 确定是否允许在索引上使用行锁。默认情况下是允许的。 |\n| `ALLOW_PAGE_LOCKS`\
    \ | 确定是否允许在索引上使用页锁。默认情况下是允许的。 |\n| `MAXDOP` | 覆盖索引操作期间服务器级别的最大并行度设置。该设置决定了在索引操作期间索引可利用的最大处理器数量。\
    \ |\n| `DATA_COMPRESSION` | 确定在索引上使用的数据压缩类型。默认情况下，未启用压缩。通过此选项，可以指定页级或行级压缩类型。 |\n\
    \n为了演示 `CREATE INDEX` 语法，将在 `AdventureWorks2017` 数据库的 `Sales.SalesOrderDetail`\
    \ 表上构建一个索引。该索引的键列为 `ProductID`，并包含 `OrderQty` 和 `UnitPrice` 作为非键列。此外，该索引将使用 `PAGE`\
    \ 压缩。清单 1-3 中的代码构建了此索引。\n\n```sql\nUSE AdventureWorks2017;\nGO\nCREATE INDEX IX_Sales_SalesOrderDetail_ProductID\n\
    ON Sales.SalesOrderDetail (ProductID)\nINCLUDE (OrderQty, UnitPrice)\nWITH (DATA_COMPRESSION\
    \ = PAGE);\n```\n清单 1-3: CREATE INDEX 示例\n\n## 修改索引\n\n创建索引后，有时需要修改它。修改索引是执行索引重建或重组的方式，作为持续索引维护的一部分。此外，修改索引允许调整某些索引选项，例如压缩类型。\n\
    \n要修改索引，需使用 `ALTER INDEX` 语法。清单 1-4 显示了修改索引的基本语法。\n\n```sql\nALTER INDEX { index_name\
    \ | ALL }\nON <table_or_view_name>\n{ REBUILD\n  [ [PARTITION = ALL] [ WITH (\
    \ <rebuild_index_option> [ ,...n ] ) ]\n  | [ PARTITION = partition_number [ WITH\
    \ ( <rebuild_index_option> [ ,...n ] ) ] ] ]\n| DISABLE\n| REORGANIZE\n  [ PARTITION\
    \ = partition_number ]\n  [ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n| SET (\
    \ <index_option> [ ,...n ] )\n| RESUME [WITH (<resume_index_option>[,...n])]\n\
    | PAUSE\n| ABORT\n} [ ; ]\n```\n清单 1-4: ALTER INDEX 语法\n\n当使用 `ALTER INDEX` 语法进行索引维护时，语法中有两个选项可以使用：`REBUILD`\
    \ 和 `REORGANIZE`。`REBUILD` 选项使用现有的索引结构和选项重新创建索引。它也可用于启用已禁用的索引。`REORGANIZE` 选项则对索引的叶级页面重新排序。这类似于重新洗牌，使卡片恢复顺序。这两个选项将在第\
    \ 11 章中更详细地讨论。\n\n此外，`ALTER INDEX` 语法可用于禁用索引。这通过 `ALTER INDEX` 语法下的 `DISABLE`\
    \ 选项实现。禁用的索引将不会被数据库引擎使用或提供。索引被禁用后，只能通过再次使用 `REBUILD` 选项修改索引来重新启用。\n\n除此之外，许多通过\
    \ `CREATE INDEX` 语法可用的索引选项也可在 `ALTER INDEX` 语法中使用。`ALTER INDEX` 语法可用于修改索引的压缩。它也可用于更改填充因子或填充索引设置。根据特定索引的需求，此语法可用于更改任何可用选项，尽管选项的使用方式存在一些限制。当在索引上使用\
    \ `REBUILD ALL` 分区时，所有与 `CREATE INDEX` 语法相同的可用选项都可以被修改，如清单 1-5 所示。但是，当针对单个分区进行\
    \ `REBUILD` 操作时，可用的选项列表会大大减少，如清单 1-6 所示。这是因为一些索引属性是通用的，适用于整个索引，而另一些则可以逐个分区定义。\n\
    \n```sql\nSORT_IN_TEMPDB = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n\
    | RESUMABLE = { ON | OFF }\n| MAX_DURATION = <minutes> [MINUTES]\n| DATA_COMPRESSION\
    \ = { NONE | ROW | PAGE }\n| ONLINE = { ON [ ( <low_priority_lock_wait> ) ] |\
    \ OFF }\n```\n清单 1-5: ALTER INDEX 单分区重建选项\n\n```sql\nPAD_INDEX = { ON | OFF }\n\
    | FILLFACTOR = fillfactor\n| SORT_IN_TEMPDB = { ON | OFF }\n| IGNORE_DUP_KEY =\
    \ { ON | OFF }\n| STATISTICS_NORECOMPUTE = { ON | OFF }\n| STATISTICS_INCREMENTAL\
    \ = { ON | OFF }\n| ONLINE = { ON [ ( <low_priority_lock_wait> ) ] | OFF }\n|\
    \ RESUMABLE = { ON | OFF }\n| MAX_DURATION = <minutes> [MINUTES]\n| ALLOW_ROW_LOCKS\
    \ = { ON | OFF }\n| ALLOW_PAGE_LOCKS = { ON | OFF }\n| MAXDOP = max_degree_of_parallelism\n\
    | DATA_COMPRESSION = { NONE | ROW | PAGE }\n[ ON PARTITIONS ( { <partition_number>\
    \ [ TO ] <partition_number> } [ , ...n ] ) ]\n```\n清单 1-6: ALTER INDEX 重建选项\n\n\
    对于 `REORGANIZE`，`ALTER INDEX` 的选项仅限于 `LOB_COMPACTION`，如清单 1-7 所示。当 `LOB_COMPACTION`\
    \ 设置为 `ON` 时，重组将尝试压缩大型对象（LOB）页面，从而减少并释放与这些页面关联的索引内的空间。若没有此选项，重组将不会释放这些页面。\n\n\
    ```sql\nLOB_COMPACTION = { ON | OFF }\n```\n清单 1-7: ALTER INDEX 重组选项"
- fmt: "Like the `CREATE INDEX` syntax, starting with SQL Server 2019, it is possible\
    \ to resume `ALTER INDEX` statements. Listing 1-8 shows that for the `ALTER INDEX`\
    \ syntax, the options available are similar to `CREATE INDEX` with the exception\
    \ of the inclusion of the low-priority lock wait.\n\n```\nMAXDOP = max_degree_of_parallelism\n\
    | MAX_DURATION = [MINUTES]\n| \nListing 1-8\nALTER INDEX Resumable Options\n```\n\
    \nThe low-priority lock wait provides the `ALTER INDEX` syntax with the ability\
    \ to predefine how it will behave when blocked by a `SCH-M` lock, shown in Listing\
    \ 1-9. This is supported on `REBUILD`, `REORGANIZE`, and resumable options. This\
    \ option allows the `ALTER INDEX` to terminate its own or other transactions that\
    \ are blocking the `ALTER INDEX` operation after a set amount of time. This can\
    \ be useful when there is a queue of `ALTER INDEX` statements waiting to execute\
    \ and one of them gets held up by another transaction.\n\n```\nWAIT_AT_LOW_PRIORITY\
    \ ( MAX_DURATION =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE | SELF | BLOCKERS\
    \ } )\nListing 1-9\nALTER INDEX Low-Priority Lock Wait Options\n```\n\nThere is\
    \ one type of index modification that is not possible with the `ALTER INDEX` syntax.\
    \ When altering an index, the key and included columns cannot be changed. If there\
    \ is a need to change the key or included columns in an index, then a new index\
    \ needs to be created and the old one dropped.\n\nAs an example of the `ALTER\
    \ INDEX` syntax, the index built in the last section will be disabled. Using the\
    \ script in Listing 1-10, the index is disabled. While disabled, the index exists\
    \ solely as metadata, without the underlying data structure. For more information\
    \ on the `ALTER INDEX` syntax and examples of its use, it can be searched for\
    \ in SQL Docs.\n\n```\nUSE AdventureWorks2017;\nGO\nALTER INDEX IX_Sales_SalesOrderDetail_ProductID\n\
    ON Sales.SalesOrderDetail\nDISABLE;\nListing 1-10\nALTER INDEX Example\n```\n\n\
    ## Dropping an Index\n\nThere will be times when an index is no longer needed.\
    \ This may be due to changing usage patterns of the database, or perhaps the index\
    \ is similar enough to another index that maintaining both is not necessary.\n\
    \nTo drop, or remove, an index, the `DROP INDEX` syntax may be used. This syntax\
    \ includes the name of the index and the table/view that the index is built against.\
    \ Listing 1-11 shows the syntax for dropping an index. Starting with SQL Server\
    \ 2016, the `DROP INDEX` syntax supports the `IF EXISTS` clause, allowing indexes\
    \ to be dropped without first verifying that they exist.\n\n```\nDROP INDEX [\
    \ IF EXISTS ]\nindex_name ON \n[ WITH (  [ ,...n ] ) ]\nListing 1-11\nDROP INDEX\
    \ Syntax\n```\n\nBesides dropping an index, there are additional options that\
    \ can be added, if needed. These options primarily apply to dropping clustered\
    \ indexes. Listing 1-12 details the options available for use with a `DROP INDEX`\
    \ operation.\n\n```\nMAXDOP = max_degree_of_parallelism\n| ONLINE = { ON | OFF\
    \ }\n| MOVE TO { partition_scheme_name ( column_name )\n| filegroup_name\n| \"\
    default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n| filestream_filegroup_name\n\
    | \"default\" } ]\nListing 1-12\nDROP INDEX Options\n```\n\nWhen a clustered index\
    \ is dropped, the base structure of the table will change from a clustered index\
    \ to a heap. When built, a clustered index defines where the data for a table\
    \ is stored. When changing from a clustered index to a heap, the target location\
    \ of the new heap structure must be specified. If the location is anywhere other\
    \ than the default filegroup, it will need to be specified. The location for the\
    \ heap can be a single filegroup or defined by a partitioning scheme. This information\
    \ is set through the `MOVE TO` option. Along with the data location, the `FILESTREAM`\
    \ location may also be adjusted using these options.\n\nThe performance impact\
    \ of the drop index operation may be something that needs to be considered. Because\
    \ of this, there are options in the `DROP INDEX` syntax to specify the maximum\
    \ number of processors to utilize along with whether the operation should be completed\
    \ online. Both of these options function similarly to those in the `CREATE INDEX`\
    \ syntax.\n\nTo remove the index used in the last two sections, we can use the\
    \ code in Listing 1-13 to drop the index. More information on the `DROP INDEX`\
    \ syntax and examples of its use can be found in Microsoft’s online docs.\n\n\
    ```\nUSE AdventureWorks2017;\nGO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductID\
    \ ON Sales.SalesOrderDetail;\nListing 1-13\nDROP INDEX Example\n```\n\n## Index\
    \ Metadata\n\nBefore delving into indexing strategies, it is important to understand\
    \ the index-related information available in SQL Server. All details of an index\
    \ and how it was built are stored in system views. All user and system databases\
    \ contain these catalog views, and only indexes that are unique to each database\
    \ in which they are queried will be returned.\n\nThese views are incredibly useful\
    \ and provide a detailed accounting of index metadata that is not as conveniently\
    \ available elsewhere.\n\n### sys.indexes\n\nThe `sys.indexes` catalog view provides\
    \ information on each index in a database. For every table, index, or table-valued\
    \ function, there is one row within the catalog view. This provides a full accounting\
    \ of all indexes in a database.\n\nThe information in `sys.indexes` is extensive\
    \ and can answer many basic questions about an index including its type, options,\
    \ filter, and more. This metadata can indicate if an index is clustered or non-clustered,\
    \ its fill factor, filter definition, if it is unique, and so on.\n\n### sys.index_columns\n\
    \nThe `sys.index_columns` catalog view lists the columns included in each index.\
    \ For each key and included column that is a part of an index, there is one row\
    \ in this catalog view. The sequence of key columns is provided in addition to\
    \ the sort order of each column. This view can be used to locate duplicate indexes\
    \ or determine if an index functionally overlaps another index.\n\n### sys.index_resumable_operations\n\
    \nThe `sys.index_resumable_operations` catalog view lists the execution status\
    \ for resumable index rebuilds. For each index rebuild that is paused or currently\
    \ executing, there is a record in this catalog view. The view describes the DDL\
    \ for the resumable index rebuild operation and provides a state to identify if\
    \ it is running or paused.\n\n### sys.xml_indexes\n\nThe catalog view `sys.xml_indexes`\
    \ is similar to `sys.indexes`. This catalog view returns one row per XML index\
    \ in a database. The chief difference with this catalog view is that it also provides\
    \ some information that is unique to XML indexes. The view includes information\
    \ on whether the XML index is a primary or secondary XML index. If the XML index\
    \ is a secondary XML index, the view includes a type for the secondary index.\n\
    \n### sys.selective_xml_index_paths\n\nThe `sys.selective_xml_index_paths` catalog\
    \ view is a subset of the indexes in `sys.indexes`, which contains only selective\
    \ XML indexes. For each selective XML created for an XPath, there is one entry\
    \ in this catalog view. Selective XML indexes allow for an XML index to be created\
    \ over a subset of an XML document and can save significant space and improve\
    \ query performance when accessing XML data. This is discussed in detail in Chapter\
    \ 6.\n\n### sys.selective_xml_index_namespaces\n\nThe `sys.selective_xml_index_namespaces`\
    \ catalog view identifies the namespace associated with selective XML indexes.\
    \ For each namespace associated with an XML index, there is an entry in this catalog\
    \ view identifying the namespace and indicating if it is the default."
  raw: "Like the CREATE INDEX syntax, starting with SQL Server 2019, it is possible\
    \ to resume ALTER INDEX statements. Listing [1-8](#338675_4_En_1_Chapter.xhtml#PC8)\
    \ shows that for the ALTER INDEX syntax, the options available are similar to\
    \ CREATE INDEX with the exception of the inclusion of the low-priority lock wait.\n\
    \n```\nMAXDOP = max_degree_of_parallelism\n| MAX_DURATION = [MINUTES]\n| \nListing\
    \ 1-8\nALTER INDEX Resumable Options\n```\n\nThe low-priority lock wait provides\
    \ the ALTER INDEX syntax with the ability to predefine how it will behave when\
    \ blocked by a SCH-M lock, shown in Listing [1-9](#338675_4_En_1_Chapter.xhtml#PC9).\
    \ This is supported on REBUILD, REORGANIZE, and resumable options. This option\
    \ allows the ALTER INDEX to terminate its own or other transactions that are blocking\
    \ the ALTER INDEX operation after a set amount of time. This can be useful when\
    \ there is a queue of ALTER INDEX statements waiting to execute and one of them\
    \ gets held up by another transaction.\n\n```\nWAIT_AT_LOW_PRIORITY ( MAX_DURATION\
    \ =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE | SELF | BLOCKERS } )\nListing 1-9\n\
    ALTER INDEX Low-Priority Lock Wait Options\n```\n\nThere is one type of index\
    \ modification that is not possible with the `ALTER INDEX` syntax. When altering\
    \ an index, the key and included columns cannot be changed. If there is a need\
    \ to change the key or included columns in an index, then a new index needs to\
    \ be created and the old one dropped.\n\nAs an example of the ALTER INDEX syntax,\
    \ the index built in the last section will be disabled. Using the script in Listing\
    \ [1-10](#338675_4_En_1_Chapter.xhtml#PC10), the index is disabled. While disabled,\
    \ the index exists solely as metadata, without the underlying data structure.\
    \ For more information on the `ALTER INDEX` syntax and examples of its use, it\
    \ can be searched for in SQL Docs.\n\n```\nUSE AdventureWorks2017;\nGO\nALTER\
    \ INDEX IX_Sales_SalesOrderDetail_ProductID\nON Sales.SalesOrderDetail\nDISABLE;\n\
    Listing 1-10\nALTER INDEX Example\n```\n\n### Dropping an Index\n\nThere will\
    \ be times when an index is no longer needed. This may be due to changing usage\
    \ patterns of the database, or perhaps the index is similar enough to another\
    \ index that maintaining both is not necessary.\n\nTo *drop*, or remove, an index,\
    \ the `DROP INDEX` syntax may be used. This syntax includes the name of the index\
    \ and the table/view that the index is built against. Listing [1-11](#338675_4_En_1_Chapter.xhtml#PC11)\
    \ shows the syntax for dropping an index. Starting with SQL Server 2016, the DROP\
    \ INDEX syntax supports the IF EXISTS clause, allowing indexes to be dropped without\
    \ first verifying that they exist.\n\n```\nDROP INDEX [ IF EXISTS ]\nindex_name\
    \ ON \n[ WITH (  [ ,...n ] ) ]\nListing 1-11\nDROP INDEX Syntax\n```\n\nBesides\
    \ dropping an index, there are additional options that can be added, if needed.\
    \ These options primarily apply to dropping clustered indexes. Listing [1-12](#338675_4_En_1_Chapter.xhtml#PC12)\
    \ details the options available for use with a `DROP INDEX` operation.\n\n```\n\
    MAXDOP = max_degree_of_parallelism\n| ONLINE = { ON | OFF }\n| MOVE TO { partition_scheme_name\
    \ ( column_name )\n| filegroup_name\n| \"default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n\
    | filestream_filegroup_name\n| \"default\" } ]\nListing 1-12\nDROP INDEX Options\n\
    ```\n\nWhen a clustered index is dropped, the base structure of the table will\
    \ change from a clustered index to a heap. When built, a clustered index defines\
    \ where the data for a table is stored. When changing from a clustered index to\
    \ a heap, the target location of the new heap structure must be specified. If\
    \ the location is anywhere other than the default filegroup, it will need to be\
    \ specified. The location for the heap can be a single filegroup or defined by\
    \ a partitioning scheme. This information is set through the `MOVE TO` option.\
    \ Along with the data location, the `FILESTREAM` location may also be adjusted\
    \ using these options.\n\nThe performance impact of the drop index operation may\
    \ be something that needs to be considered. Because of this, there are options\
    \ in the `DROP INDEX` syntax to specify the maximum number of processors to utilize\
    \ along with whether the operation should be completed online. Both of these options\
    \ function similarly to those in the `CREATE INDEX` syntax.\n\nTo remove the index\
    \ used in the last two sections, we can use the code in Listing [1-13](#338675_4_En_1_Chapter.xhtml#PC13)\
    \ to drop the index. More information on the `DROP INDEX` syntax and examples\
    \ of its use can be found in Microsoft’s online docs.\n\n```\nUSE AdventureWorks2017;\n\
    GO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail;\n\
    Listing 1-13\nDROP INDEX Example\n```\n\n## Index Metadata\n\nBefore delving into\
    \ indexing strategies, it is important to understand the index-related information\
    \ available in SQL Server. All details of an index and how it was built are stored\
    \ in system views. All user and system databases contain these catalog views,\
    \ and only indexes that are unique to each database in which they are queried\
    \ will be returned.\n\nThese views are incredibly useful and provide a detailed\
    \ accounting of index metadata that is not as conveniently available elsewhere.\n\
    \n### sys.indexes\n\nThe `sys.indexes` catalog view provides information on each\
    \ index in a database. For every table, index, or table-valued function, there\
    \ is one row within the catalog view. This provides a full accounting of all indexes\
    \ in a database.\n\nThe information in `sys.indexes` is extensive and can answer\
    \ many basic questions about an index including its type, options, filter, and\
    \ more. This metadata can indicate if an index is clustered or non-clustered,\
    \ its fill factor, filter definition, if it is unique, and so on.\n\n### sys.index_columns\n\
    \nThe `sys.index_columns` catalog view lists the columns included in each index.\
    \ For each key and included column that is a part of an index, there is one row\
    \ in this catalog view. The sequence of key columns is provided in addition to\
    \ the sort order of each column. This view can be used to locate duplicate indexes\
    \ or determine if an index functionally overlaps another index.\n\n### sys.index_resumable_operations\n\
    \nThe sys.index_resumable_operations catalog view lists the execution status for\
    \ resumable index rebuilds. For each index rebuild that is paused or currently\
    \ executing, there is a record in this catalog view. The view describes the DDL\
    \ for the resumable index rebuild operation and provides a state to identify if\
    \ it is running or paused.\n\n### sys.xml_indexes\n\nThe catalog view `sys.xml_indexes`\
    \ is similar to `sys.indexes`. This catalog view returns one row per XML index\
    \ in a database. The chief difference with this catalog view is that it also provides\
    \ some information that is unique to XML indexes. The view includes information\
    \ on whether the XML index is a primary or secondary XML index. If the XML index\
    \ is a secondary XML index, the view includes a type for the secondary index.\n\
    \n### sys.selective_xml_index_paths\n\nThe `sys.selective_xml_index_paths` catalog\
    \ view is a subset of the indexes in `sys.indexes`, which contains only selective\
    \ XML indexes. For each selective XML created for an XPath, there is one entry\
    \ in this catalog view. Selective XML indexes allow for an XML index to be created\
    \ over a subset of an XML document and can save significant space and improve\
    \ query performance when accessing XML data. This is discussed in detail in Chapter\
    \ [6](#338675_4_En_6_Chapter.xhtml).\n\n### sys.selective_xml_index_namespaces\n\
    \nThe sys.selective_xml_index_namespaces catalog view identifies the namespace\
    \ associated with selective XML indexes. For each namespace associated with an\
    \ XML index, there is an entry in this catalog view identifying the namespace\
    \ and indicating if it is the default."
  trans: "\n与 `CREATE INDEX` 语法类似，从 SQL Server 2019 开始，可以恢复 `ALTER INDEX` 语句。清单 1-8\
    \ 显示，对于 `ALTER INDEX` 语法，可用的选项与 `CREATE INDEX` 类似，但增加了低优先级锁等待选项。\n\n```\nMAXDOP\
    \ = max_degree_of_parallelism\n| MAX_DURATION = [MINUTES]\n| \nListing 1-8\nALTER\
    \ INDEX 可恢复选项\n```\n\n低优先级锁等待为 `ALTER INDEX` 语法提供了预定义行为的能力，使其在被 `SCH-M` 锁阻塞时如何应对，如清单\
    \ 1-9 所示。此功能支持 `REBUILD`、`REORGANIZE` 和可恢复选项。此选项允许 `ALTER INDEX` 在设定的时间后终止自身或其他阻塞了\
    \ `ALTER INDEX` 操作的事务。当有一系列等待执行的 `ALTER INDEX` 语句，而其中某个被其他事务阻塞时，这会非常有用。\n\n```\n\
    WAIT_AT_LOW_PRIORITY ( MAX_DURATION =  [ MINUTES ] ,\nABORT_AFTER_WAIT = { NONE\
    \ | SELF | BLOCKERS } )\nListing 1-9\nALTER INDEX 低优先级锁等待选项\n```\n\n有一种索引修改操作无法通过\
    \ `ALTER INDEX` 语法完成。在修改索引时，无法更改键列和包含列。如果需要更改索引中的键列或包含列，则必须创建一个新索引并删除旧索引。\n\n\
    作为 `ALTER INDEX` 语法的示例，我们将禁用上一节创建的索引。使用清单 1-10 中的脚本，索引将被禁用。禁用后，索引仅作为元数据存在，不再有底层数据结构。有关\
    \ `ALTER INDEX` 语法及其使用示例的更多信息，可在 SQL Docs 中搜索。\n\n```\nUSE AdventureWorks2017;\n\
    GO\nALTER INDEX IX_Sales_SalesOrderDetail_ProductID\nON Sales.SalesOrderDetail\n\
    DISABLE;\nListing 1-10\nALTER INDEX 示例\n```\n\n## 删除索引\n\n有时索引将不再需要。这可能是由于数据库使用模式发生变化，或者某个索引与另一个索引非常相似，以至于维护两者没有必要。\n\
    \n要删除（或移除）索引，可以使用 `DROP INDEX` 语法。此语法包括索引名称以及构建该索引所基于的表或视图。清单 1-11 显示了删除索引的语法。从\
    \ SQL Server 2016 开始，`DROP INDEX` 语法支持 `IF EXISTS` 子句，允许在无需预先验证索引是否存在的情况下直接删除。\n\
    \n```\nDROP INDEX [ IF EXISTS ]\nindex_name ON \n[ WITH (  [ ,...n ] ) ]\nListing\
    \ 1-11\nDROP INDEX 语法\n```\n\n除了删除索引外，根据需要还可以添加其他选项。这些选项主要适用于删除聚集索引。清单 1-12 详细列出了可用于\
    \ `DROP INDEX` 操作的选项。\n\n```\nMAXDOP = max_degree_of_parallelism\n| ONLINE = {\
    \ ON | OFF }\n| MOVE TO { partition_scheme_name ( column_name )\n| filegroup_name\n\
    | \"default\"\n}\n[ FILESTREAM_ON { partition_scheme_name\n| filestream_filegroup_name\n\
    | \"default\" } ]\nListing 1-12\nDROP INDEX 选项\n```\n\n当聚集索引被删除时，表的基础结构将从聚集索引变为堆。构建聚集索引时，它定义了表数据的存储位置。当从聚集索引更改为堆时，必须指定新堆结构的目标位置。如果位置不是默认文件组，则需要明确指定。堆的位置可以是单个文件组，也可以由分区方案定义。此信息通过\
    \ `MOVE TO` 选项设置。除了数据位置外，还可以使用这些选项调整 `FILESTREAM` 位置。\n\n删除索引操作的性能影响可能需要考虑。因此，`DROP\
    \ INDEX` 语法中提供了选项来指定要使用的最大处理器数量，以及操作是否应联机完成。这两个选项的功能与 `CREATE INDEX` 语法中的类似。\n\
    \n要删除前两节中使用的索引，我们可以使用清单 1-13 中的代码。有关 `DROP INDEX` 语法及其使用示例的更多信息，请参阅 Microsoft\
    \ 的在线文档。\n\n```\nUSE AdventureWorks2017;\nGO\nDROP INDEX IX_Sales_SalesOrderDetail_ProductID\
    \ ON Sales.SalesOrderDetail;\nListing 1-13\nDROP INDEX 示例\n```\n\n## 索引元数据\n\n\
    在深入研究索引策略之前，了解 SQL Server 中可用的与索引相关的信息非常重要。索引的所有详细信息及其构建方式都存储在系统视图中。所有用户和系统数据库都包含这些目录视图，并且只返回每个查询数据库中唯一的索引。\n\
    \n这些视图非常有用，提供了详细的索引元数据记录，这些信息在其他地方不易获得。\n\n### sys.indexes\n\n`sys.indexes` 目录视图提供数据库中每个索引的信息。对于每个表、索引或表值函数，该目录视图中都有一行。这提供了数据库中所有索引的完整清单。\n\
    \n`sys.indexes` 中的信息非常广泛，可以回答关于索引的许多基本问题，包括其类型、选项、筛选器等。此元数据可以指示索引是聚集索引还是非聚集索引、其填充因子、筛选器定义、是否唯一等等。\n\
    \n### sys.index_columns\n\n`sys.index_columns` 目录视图列出了每个索引中包含的列。对于作为索引一部分的每个键列和包含列，此目录视图中都有一行。除了每列的排序顺序外，还提供了键列的顺序。此视图可用于定位重复索引或确定一个索引是否在功能上与另一个索引重叠。\n\
    \n### sys.index_resumable_operations\n\n`sys.index_resumable_operations` 目录视图列出了可恢复索引重建操作的执行状态。对于每个暂停或当前正在执行的索引重建，此目录视图中都有一条记录。该视图描述了可恢复索引重建操作的\
    \ DDL，并提供了一个状态以标识其是正在运行还是已暂停。\n\n### sys.xml_indexes\n\n目录视图 `sys.xml_indexes`\
    \ 类似于 `sys.indexes`。此目录视图为数据库中的每个 XML 索引返回一行。该目录视图的主要区别在于它还提供了一些 XML 索引特有的信息。该视图包括\
    \ XML 索引是主 XML 索引还是辅助 XML 索引的信息。如果是辅助 XML 索引，该视图还包括辅助索引的类型。\n\n### sys.selective_xml_index_paths\n\
    \n`sys.selective_xml_index_paths` 目录视图是 `sys.indexes` 中索引的一个子集，仅包含选择性 XML 索引。每个为\
    \ XPath 创建的选择性 XML 索引在此目录视图中都有一条记录。选择性 XML 索引允许在 XML 文档的子集上创建 XML 索引，在访问 XML 数据时可以节省大量空间并提高查询性能。第\
    \ 6 章将详细讨论这一点。\n\n### sys.selective_xml_index_namespaces\n\n`sys.selective_xml_index_namespaces`\
    \ 目录视图标识与选择性 XML 索引关联的命名空间。每个与 XML 索引关联的命名空间在此目录视图中都有一条记录，用于标识命名空间并指示其是否为默认命名空间。\n"
- fmt: '### sys.spatial_indexes


    `sys.spatial_indexes`目录视图也与`sys.indexes`类似。该目录视图针对数据库中的每个空间索引返回一行。此视图的主要区别在于它提供了特定于空间索引的附加信息。该视图包含空间索引是几何索引还是地理索引的信息。


    ### sys.spatial_index_tessellations


    `sys.spatial_index_tessellations`目录视图扩充了`sys.spatial_indexes`目录视图，并提供了与空间索引关联的边界框和网格的详细信息。


    ### sys.column_store_dictionaries


    `sys.column_store_dictionaries`目录视图支持列存储索引。该目录视图针对列存储索引中使用的每个字典返回一行。根据列的数据分布和表的分区详细信息，一个列可能定义有多个字典。此元数据描述了为该列构建的字典的结构和类型。


    ### sys.column_store_segments


    `sys.column_store_segments`目录视图通过为列存储索引中的每一列至少返回一行来支持列存储索引。列可以有多个段，每个段大约包含一百万行。此目录视图中的行描述了每个段的内容（例如，该段是否包含空值，以及该段的最小和最大数据ID是什么）。


    ### sys.column_store_row_groups


    `sys.column_store_row_groups`目录视图通过针对每个列存储行组返回一行来支持列存储段。这包括诸如行组中的行数、其状态以及在数据库中的物理位置等详细信息。


    ### sys.hash_indexes


    `sys.hash_indexes`目录视图类似于`sys.indexes`，但专门用于内存优化表上的哈希索引。此视图移除了一些不相关的列，并增加了列`bucket_count`。此增加的列返回为每个哈希索引创建的存储桶数量。对于哈希索引，存储桶指的是为存储索引中的值而创建的内存位置。存储桶与索引值之间的关系详见第[8]章。


    ### sys.fulltext_catalogs


    `sys.fulltext_catalogs`目录视图针对数据库中的每个全文目录包含一行。


    ### sys.fulltext_indexes


    `sys.fulltext_indexes`目录视图针对数据库中的每个全文索引包含一行。该视图描述了该索引所属的全文目录，并提供了有关索引状态及其更新方式的详细信息。


    ### sys.fulltext_index_columns


    `sys.fulltext_index_columns`目录视图支持`sys.fulltext_indexes`。它针对与全文索引关联的每一列包含一行。


    ## Summary


    本章介绍了与索引相关的诸多基础知识。介绍了 SQL Server 中可用的各种索引类型。从堆到非聚集索引再到空间索引，每种索引都被引入，并与杜威十进分类法相关联，以此作为索引的现实世界类比。此示例有助于说明每种索引类型如何相互交互，以及一种索引在何种场景下能比其他索引提供价值。


    提供了用于创建、更改和删除索引的数据定义语言（DDL）。DDL 具有丰富的选项集，可用于精细调整索引的结构，以帮助提高其在数据库中的性能。


    本章还包含了记录 SQL Server 中索引的目录视图所含元数据的信息。每个目录视图都提供了有关索引结构和组成的信息。此信息可帮助研究和理解表是如何被索引的，并基于常见的查询和维护模式促进改进。


    本章的细节为本书后续将要讨论的内容提供了框架。此信息为深入讨论索引提供了一个起点。本书的剩余部分将在此框架上构建，从而设计和实现有效的索引策略，以改进查询和应用程序性能。


    脚注 [1]


    # 2. Index Storage Fundamentals


    上一章讨论了索引的逻辑设计和语法，本章将重点讨论索引的物理实现。理解索引如何存储以及如何与 SQL Server 和存储引擎交互，是更好地理解索引优势以及如何更有效地利用它们的关键。


    本讨论将从 SQL Server 中数据存储的基础知识开始，包括数据页、它们的格式以及如何管理它们。然后，此信息将被扩展到不同索引类型的基本结构以及每种类型在
    SQL Server 中的实现方式。


    ## Storage Basics


    数据库中使用多种结构来存储和组织数据。本章将重点关注那些与表和索引直接相关的结构。此讨论将从页和区开始，然后更深入地探讨 SQL Server 中可用的不同类型的页以及它们如何与索引相关联。'
  raw: '### sys.spatial_indexes


    The `sys.spatial_indexes` catalog view is also similar to `sys.indexes`. This
    catalog view returns one row for every spatial index in a database. The main difference
    with this catalog view is that it provides additional information specific to
    spatial indexes. The view includes information on whether the spatial index is
    a geometric or geographic index.


    ### sys.spatial_index_tessellations


    The `sys.`spatial_index_tessellations catalog view augments the sys.spatial_indexes
    catalog view and provides details on the bounding boxes and grids associated with
    a spatial index.


    ### sys.column_store_dictionaries


    The `sys.column_store_dictionaries` catalog view supports columnstore indexes.
    This catalog view returns one row for each dictionary used in a columnstore index.
    A column may have more than one dictionary defined on it, depending on its data
    profile and the partitioning details of the table. This metadata describes the
    structure and type of dictionary built for the column.


    ### sys.column_store_segments


    The `sys.column_store_segments` catalog view supports columnstore indexes by returning
    at least one row for every column in a columnstore index. Columns can have multiple
    segments of approximately 1 million rows each. The rows in this catalog view describe
    the contents of each segment (e.g., whether the segment has null values and what
    the minimum and maximum data IDs are for the segment).


    ### sys.column_store_row_groups


    The `sys.column_store_row_groups` catalog view supports columnstore segments by
    returning a row per columnstore rowgroup. This includes details such as the number
    of rows in a rowgroup, its state, and physical location in the database.


    ### sys.hash_indexes


    The `sys.hash_indexes` catalog view is similar to `sys.indexes`, but pertains
    exclusively to hash indexes on memory-optimized tables. This view removes a few
    columns that are not relevant and adds the column *bucket_count*. This added column
    returns the number of buckets created for each hash index. For hash indexes, buckets
    refer to the memory locations created to store values in the index. The relationship
    between buckets and indexed values is detailed in Chapter [8](#338675_4_En_8_Chapter.xhtml).


    ### sys.fulltext_catalogs


    The `sys.fulltext_catalogs` catalog view contains one row for every full-text
    catalog in a database.


    ### sys.fulltext_indexes


    The `sys.fulltext_indexes` catalog view contains one row for every full-text index
    in a database. The view describes the full-text catalog that the index is a part
    of and provides details on the state of the index and how it is being updated.


    ### sys.fulltext_index_columns


    The `sys.fulltext_index_columns` catalog view supports `sys.fulltext_indexes`.
    It contains one row for every column associated with a full-text index.


    ## Summary


    This chapter presented a number of fundamentals related to indexes. The various
    types of indexes available within SQL Server were presented. From heaps to non-clustered
    to spatial indexes, each index was introduced and related to the library Dewey
    Decimal System as a real-world analogy to indexing. This example helped illustrate
    how each of the index types interacted with the others and the scenarios where
    one index can provide value over another.


    Data definition language was provided for creating, altering, and dropping indexes.
    DDL has a rich set of options that can be used to finely tune how an index is
    structured to help improve its performance within a database.


    This chapter also included information on the metadata contained within catalog
    views that document indexes within SQL Server. Each catalog view provides information
    on the structure and makeup of an index. This information can assist in researching
    and understanding how tables are indexed and facilitate improvements based on
    common query and maintenance patterns.


    The details in this chapter provide the framework for what will be discussed later
    in this book. This information provides a starting point from which indexing can
    be more deeply discussed. The remainder of this book will build on this framework,
    allowing for effective indexing strategies to be architected and implemented to
    improve query and application performance.


    Footnotes [1](#338675_4_En_1_Chapter.xhtml#Fn1_source)


    # 2. Index Storage Fundamentals


    Where the previous chapter discussed the logical design and syntax of indexes,
    this one will focus on the physical implementation of indexes. Understanding how
    indexes are stored and interact with SQL Server and the storage engine is key
    to better understanding the benefits of indexes and how to make more effective
    use of them.


    This discussion will start with the basics of data storage in SQL Server, including
    data pages, their format, and how they are managed. This information will then
    be extended into the basic structure of different index types and how each is
    implemented in SQL Server.


    ## Storage Basics


    A number of structures are used to store and organize data within databases. This
    chapter will focus on those that directly relate to tables and indexes. This discussion
    will begin with pages and extents and then delve deeper into the different types
    of pages available in SQL Server and how they relate back to indexes.'
  trans: '

    ### sys.spatial_indexes


    `sys.spatial_indexes`目录视图与`sys.indexes`类似。该视图为数据库中的每个空间索引返回一行。其主要区别在于提供了特定于空间索引的附加信息，例如标识该空间索引是几何索引还是地理索引。


    ### sys.spatial_index_tessellations


    `sys.spatial_index_tessellations`目录视图扩充了`sys.spatial_indexes`目录视图，并提供与空间索引关联的边界框和网格的详细信息。


    ### sys.column_store_dictionaries


    `sys.column_store_dictionaries`目录视图支持列存储索引。该视图为列存储索引中使用的每个字典返回一行。根据列的数据分布和表的分区详情，一个列可能定义有多个字典。此元数据描述了为该列构建的字典的结构和类型。


    ### sys.column_store_segments


    `sys.column_store_segments`目录视图通过为列存储索引中的每一列至少返回一行来支持列存储索引。列可以有多个段，每个段大约包含一百万行。此视图中的行描述了每个段的内容，例如该段是否包含空值，以及该段的最小和最大数据
    ID。


    ### sys.column_store_row_groups


    `sys.column_store_row_groups`目录视图通过针对每个列存储行组返回一行来支持列存储段。这包括诸如行组中的行数、其状态以及在数据库中的物理位置等详细信息。


    ### sys.hash_indexes


    `sys.hash_indexes`目录视图类似于`sys.indexes`，但专门用于内存优化表上的哈希索引。此视图移除了一些不相关的列，并增加了`bucket_count`列。此列返回为每个哈希索引创建的存储桶数量。对于哈希索引，存储桶指的是为存储索引中的值而创建的内存位置。存储桶与索引值之间的关系详见第[8]章。


    ### sys.fulltext_catalogs


    `sys.fulltext_catalogs`目录视图针对数据库中的每个全文目录包含一行。


    ### sys.fulltext_indexes


    `sys.fulltext_indexes`目录视图针对数据库中的每个全文索引包含一行。该视图描述了该索引所属的全文目录，并提供了有关索引状态及其更新方式的详细信息。


    ### sys.fulltext_index_columns


    `sys.fulltext_index_columns`目录视图支持`sys.fulltext_indexes`。它针对与全文索引关联的每一列包含一行。


    ## Summary


    本章介绍了与索引相关的诸多基础知识，涵盖了 SQL Server 中可用的各种索引类型。从堆到非聚集索引再到空间索引，每种索引都被引入，并与杜威十进分类法相关联，以此作为现实世界的类比。此示例有助于说明每种索引类型如何相互交互，以及一种索引在何种场景下能比其他索引提供价值。


    本章提供了用于创建、更改和删除索引的数据定义语言（DDL）。DDL 具有丰富的选项集，可用于精细调整索引的结构，以帮助提高其在数据库中的性能。


    本章还包含了记录 SQL Server 中索引的目录视图所含元数据的信息。每个目录视图都提供了有关索引结构和组成的信息。此信息可帮助研究和理解表是如何被索引的，并基于常见的查询和维护模式促进改进。


    本章的细节为本书后续将要讨论的内容提供了框架。此信息为深入讨论索引提供了一个起点。本书的剩余部分将在此框架上构建，从而设计和实现有效的索引策略，以改进查询和应用程序性能。


    脚注 [1]


    # 2. 索引存储基础


    上一章讨论了索引的逻辑设计和语法，本章将重点讨论索引的物理实现。理解索引如何存储以及如何与 SQL Server 和存储引擎交互，是更好地理解索引优势以及如何更有效地利用它们的关键。


    本讨论将从 SQL Server 中数据存储的基础知识开始，包括数据页、它们的格式以及如何管理它们。然后，此信息将被扩展到不同索引类型的基本结构以及每种类型在
    SQL Server 中的实现方式。


    ## 存储基础


    数据库中使用多种结构来存储和组织数据。本章将重点关注那些与表和索引直接相关的结构。此讨论将从页和区开始，然后更深入地探讨 SQL Server 中可用的不同类型的页以及它们如何与索引相关联。

    '
- fmt: '## Pages


    SQL Server 中数据的基本存储单元是页。页用于存储从表中的行到在最低层映射索引结构的所有内容。


    当空间分配给数据库数据文件时，空间被划分为页。在分配期间，每个页被创建为使用 8 KB（8,192 字节）的空间，并且页从 0 开始编号，每分配一个页递增
    1。当 SQL Server 与数据库文件交互时，可以发生输入/输出（I/O）操作的最小单位是页级别。例如，使用 `STATISTICS IO` 时，读取和写入的计数以页为单位进行度量。


    一个页有三个主要组成部分：页头、其记录和偏移数组，如图 [2-1](#338675_4_En_2_Chapter.xhtml#Fig1) 所示。所有页都以页头开始。页头为
    96 字节，包含有关页的元数据，例如页号、其所属对象以及页类型。如果要在页上存储行（例如数据和索引页），页的末尾将包含一个偏移数组。偏移数组为 36 字节，提供指向页上行起始位置的指针。在这两个区域之间是
    8,060 字节，用于存储记录和其他页面数据。


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig1_HTML.png)


    一个带有三个自上而下标签的狗耳文件图标，分别是：header、records 和 offset array。


    **Figure 2-1**


    Page structure


    如果页包含偏移数组，则它从页的末尾开始。随着行被添加到页，每一行都被添加到页面记录区域的第一个可用位置。接下来，该行的起始位置存储在偏移数组的最后一个可用位置。对于添加的每一行，行的数据存储在离页起始位置更远的地方，而偏移量则存储在离页末尾更远的地方，如图
    [2-2](#338675_4_En_2_Chapter.xhtml#Fig2) 所示。从页的末尾向后读取，偏移量可用于识别页上每一行（有时称为`slot`）的起始位置。


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig2_HTML.jpg)


    三个狗耳文件图标，页头下方的两个部分有不同的标签。三个图标中分别列出了“行 1 和 1”、“行 1、行 2、2 和 1”以及“行 1、行 2、行 3、3、2
    和 1”，分别对应记录和偏移数组部分。


    **Figure 2-2**


    Row placement and offset array


    虽然页的基础知识是相同的，但页的使用方式有所不同。这些用途包括存储数据页、索引结构和大对象。这些用例的每一个细节以及它们如何与 SQL Server 数据库交互，将在本章后面讨论。


    ## Extents


    从*页*向上移动，下一个基本的数据存储结构是*区*。区是数据文件中八个物理上连续的页的组。所有页必须属于一个区，并且一个区不能少于或多于八个页。SQL Server
    数据库使用两种类型的区：*混合区*和*统一区*。


    一个混合区包含分配给多个对象的页。例如，当一个表首次创建且分配的页少于八个时，它将构建为一个混合区。只要表的总大小小于八个页，该表就会使用混合区，如图 [2-3](#338675_4_En_2_Chapter.xhtml#Fig3)
    所示。通过使用混合区，数据库可以减少分配给小表的空间量。


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig3_HTML.png)


    一个示意图，展示了在标有“混合区”的水平条下，八个标有表 A、A、B、B、B、C、C 和 D 的狗耳文件图标。


    **Figure 2-3**


    Mixed extent


    一旦表中的页数超过八个，它将开始使用统一区。在统一区中，该区中的所有页都分配给数据库中的单个对象（参见图 [2-4](#338675_4_En_2_Chapter.xhtml#Fig4)）。因此，一个对象的页将是连续的，这增加了可以在单个读取操作中读取的对象页数。有关连续读取好处的更多信息，请参见第
    [6](#338675_4_En_6_Chapter.xhtml) 章。


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig4_HTML.png)


    一个示意图，展示了在标有“统一区”的水平条下，八个都标有表 A 的狗耳文件图标。


    **Figure 2-4**


    Uniform extent


    自 SQL Server 2016 以来，使用统一区已成为所有数据库中所有区分配的默认行为。可以使用 `MIXED_PAGE_ALLOCATION` 数据库选项修改此行为，该选项会将默认分配设置为使用混合区。在
    SQL Server 2014 及更早版本中，此行为相反，默认分配混合区。可以使用跟踪标志 `1118` 在那些版本中修改此行为，该标志指示 SQL Server
    使用统一区，就像当前的默认行为一样。这些配置考虑的关键在于，SQL Server 默认使用统一区，这缓解了大量的页分配争用问题。


    ## Page Types


    一个页可以在 SQL Server 中服务于多种用途。对于每种用途，都有一个与页关联的类型，定义了它的使用方式。SQL Server 数据库中可用的页类型包括：


    *   `File header page`

    *   `Boot page`

    *   `Page Free Space (PFS) page`

    *   `Global Allocation Map (GAM) page`

    *   `Shared Global Allocation Map (SGAM) page`

    *   `Differential Changed Map (DIFF) page`

    *   `Minimally Logged (ML) page`

    *   `Index Allocation Map (IAM) page`

    *   `Data page`

    *   `Index page`

    *   `Large object (text and image) page`


    接下来的几节将详细阐述页类型并解释它们的使用方式。虽然并非所有页类型都直接涉及索引，但每种类型都将被定义和解释，以帮助提供对数据存储的整体理解。对于每个数据库，页面的布局方式有相似之处。例如，在每个数据库的第一个文件中，页面的布局如图
    [2-5](#338675_4_En_2_Chapter.xhtml#Fig5) 所示。可用的页类型比图中显示的更多，但正如对每种页类型的考察将显示的那样，只有前几页是固定的。许多其他页类型以由数据库中的数据决定的模式出现。


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig5_HTML.png)


    一个示意图，展示了在向右箭头上方，10个标有“file header page”、“P F S page”、“G A M page”、“S G A M page”、“N
    A”、“N A”、“D C M page”、“M L page”、“data page”和“boot page”的狗耳文件图标。图标编号从0到9，而第十一个图标没有标签，编号为10+。


    **Figure 2-5**


    Data file pages


    > **注意**

    >

    > 数据库日志文件不使用页架构。页结构仅适用于数据库数据文件。日志文件架构的讨论超出了本书的范围。


    ### File Header Page


    任何数据库数据文件中的第一页都是文件头页，如图 [2-5](#338675_4_En_2_Chapter.xhtml#Fig5) 所示。由于这是数据文件的第一页，其编号为
    `0`。文件头页包含有关数据库文件的元数据，包括：


    *   `File ID`

    *   `Filegroup ID`

    *   `Current size of the file`

    *   `Max file size`

    *   `Sector size`

    *   `LSN information`


    文件头页上存储的其他各种细节将不再进一步讨论，因为它们超出了索引讨论的范围。'
  raw: '### Pages


    The basic storage unit for data in SQL Server is the page. Pages are used to store
    everything from the rows in tables to the structures used to map out indexes at
    their lowest levels.


    When space is allocated to database data files, the space is divided into pages.
    During allocation, each page is created to use 8 KB (8,192 bytes) of space, and
    pages are numbered starting at 0, incrementing by 1 for every page allocated.
    When SQL Server interacts with the database files, the smallest unit in which
    an input/output (I/O) operation can occur is at the page level. When using STATISTICS
    IO, for example, the counts for reads and writes are measured in pages.


    There are three primary components to a page: the page header, its records, and
    the offset array, as shown in Figure [2-1](#338675_4_En_2_Chapter.xhtml#Fig1).
    All pages begin with the page header. The header is 96 bytes and contains metadata
    about the page, such as the page number, its owning object, and the type of page.
    If rows will be stored on the pages, such as with data and index pages, the end
    of the page will contain an offset array. The offset array is 36 bytes and provides
    pointers to the location of the start of rows on the page. Between these two areas
    are 8,060 bytes where records and other page data are stored.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig1_HTML.png)


    A dog-eared file icon with three top-down labels, namely, header, records, and
    offset array.


    Figure 2-1


    Page structure


    If the page includes an offset array, it begins at the end of the page. As rows
    are added to a page, each one is added to the first open position in the records
    area of the page. Next, the starting location of the page is stored in the last
    available position in the offset array. For every row added, the data for the
    row is stored further away from the start of the page, and the offset is stored
    further away from the end of the page, as shown in Figure [2-2](#338675_4_En_2_Chapter.xhtml#Fig2).
    Reading from the end of the page backward, the offset can be used to identify
    the starting position of every row, sometimes referred to as a *slot*, on the
    page.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig2_HTML.jpg)


    3 dog-eared file icons with different labels for the two sections below the header.
    Row 1 and 1, row 1, row 2, 2, and 1, and row 1, row 2, row 3, 3, 2, and 1 are
    listed in the three icons for the records and offset array sections, respectively.


    Figure 2-2


    Row placement and offset array


    While the basics of pages are the same, there are different ways in which pages
    are used. These uses include storing data pages, index structures, and large objects.
    Details of each of these use cases and how they interact with a SQL Server database
    will be discussed later in this chapter.


    ### Extents


    Moving up from the *page*, the next basic structure for data storage is the *extent*.
    An extent is a group of eight physically contiguous pages in a data file. All
    pages must belong to an extent, and extents cannot have fewer or more than eight
    pages. There are two types of extents used by SQL Server databases: *mixed extents*
    and *uniform* extents.


    A mixed extent contains pages that are allocated to multiple objects. For example,
    when a table is first created and there are fewer than eight pages allocated,
    it will be built as a mixed extent. The table will use mixed extents as long as
    the total size of the table is less than eight pages, as shown in Figure [2-3](#338675_4_En_2_Chapter.xhtml#Fig3).
    By using mixed extents, databases can reduce the amount of space allocated to
    small tables.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig3_HTML.png)


    A diagram of eight dog-eared file icons labeled tables A, A, B, B, B, C, C, and
    D under a horizontal bar labeled mixed extent.


    Figure 2-3


    Mixed extent


    Once the number of pages in a table exceeds eight pages, it will begin using uniform
    extents. In a uniform extent, all pages in the extent are allocated to a single
    object in the database (see Figure [2-4](#338675_4_En_2_Chapter.xhtml#Fig4)).
    Because of this, pages for an object will be contiguous, which increases the number
    of pages of an object that can be read in a single read operation. For more information
    on the benefits of contiguous reads, see Chapter [6](#338675_4_En_6_Chapter.xhtml).


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig4_HTML.png)


    A diagram of 8 dog-eared file icons, which are all labeled table A, under a horizontal
    bar labeled uniform extent.


    Figure 2-4


    Uniform extent


    Since SQL Server 2016, the use of uniform extents has become default behavior
    for all extent allocations in all databases. The behavior can be modified using
    the MIXED_PAGE_ALLOCATION database option, which will default the allocations
    to use mixed extents. With SQL Server 2014 and earlier versions, this behavior
    was reversed and defaulted to allocating mixed extents. This behavior could be
    modified in those versions using trace flag 1118, which would instruct SQL Server
    to use uniform extents, as is the current default behavior. The key to these configuration
    considerations is that SQL Server defaults to using uniform extents, which mitigates
    a significant amount of page allocation contention issues.


    ## Page Types


    A page can serve many purposes in SQL Server. For each of these uses, there is
    a type associated with the page that defines how it is being used. The page types
    available in a SQL Server database are


    *   File header page


    *   Boot page


    *   Page Free Space (PFS) page


    *   Global Allocation Map (GAM) page


    *   Shared Global Allocation Map (SGAM) page


    *   Differential Changed Map (DIFF) page


    *   Minimally Logged (ML) page


    *   Index Allocation Map (IAM) page


    *   Data page


    *   Index page


    *   Large object (text and image) page


    The next few sections will expand on the types of pages and explain how they are
    used. While not all of the page types deal directly with indexing, each will be
    defined and explained to help provide an overall understanding of data storage.
    With every database, there are similarities in the way pages are laid out. For
    instance, in the first file of every database, the pages are laid out as shown
    in Figure [2-5](#338675_4_En_2_Chapter.xhtml#Fig5). There are more page types
    available than the figure indicates, but as the examinations of each page type
    will show, only those in the first few pages are fixed. Many of the others appear
    in patterns that are dictated by the data in the database.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig5_HTML.png)


    A diagram of 10 dog-eared file icons labeled file header page, P F S page, G A
    M page, S G A M page, N A, N A, D C M page, M L page, data page, and boot page
    atop a rightward arrow. The icons are numbered from 0 to 9, while the eleventh
    icon has no label and is numbered 10+.


    Figure 2-5


    Data file pages


    Note


    Database log files do not use the page architecture. Page structures apply only
    to database data files. A discussion of log file architecture is outside the scope
    of this book.


    ### File Header Page


    The first page in any database data file is the file header page, shown in Figure
    [2-5](#338675_4_En_2_Chapter.xhtml#Fig5). Since this is the first page of a data
    file, it is numbered 0\. The file header page contains metadata about the database
    file that includes


    *   File ID


    *   Filegroup ID


    *   Current size of the file


    *   Max file size


    *   Sector size


    *   LSN information


    There are a variety of other details stored on the file header page that will
    not be discussed further as they are out of scope for a discussion of indexing.'
