  raw: '### STATS_DATE


    An important consideration when reviewing the accuracy of statistics is whether
    the statistics are out of date. A frequent method for determining whether statistics
    are out of date is through the `STATS_DATE` function. This function provides the
    date of the most recent update to statistics. The syntax for the function, shown
    in Listing [5-4](#338675_4_En_5_Chapter.xhtml#PC4), accepts an `object_id` and
    `stats_id`. In the case of indexes, the `stats_id` is the same value as the `index_id`.


    ```

    STATS_DATE ( object_id , stats_id )

    Listing 5-4

    STATS_DATE Syntax

    ```


    While the `STATS_DATE` function is routinely used to identify out-of-date statistics,
    that approach isn’t effective for this task. The date that statistics were last
    updated does not necessarily reflect anything about the rate at which data has
    changed. A table that hasn’t had an update in years with stats that are months
    old won’t have out-of-date statistics, while a table with constant inserts, updates,
    and deletes with stats that were updated the previous day could have statistics
    that no longer represent the values in the index. While the function can be useful
    as a catchall for indexes whose statistics change slowly, it should be used with
    caution due to the example just given.


    ### sys.dm_db_stats_properties


    A better method for identifying the rate of change in statistics, which provides
    a qualifier that is reflective of the data, is the `sys.dm_db_stats_properties`
    DMO. The DMO, introduced in SQL Server 2008, provides the details on the number
    of rows that have changed since the statistics were last updated. The syntax for
    `sys.dm_db_stats_properties`, shown in Listing [5-5](#338675_4_En_5_Chapter.xhtml#PC5),
    accepts an `object_id` and `stats_id`. As with `STATS_DATE`, `stats_id` is the
    same value as the `index_id`. Table [5-6](#338675_4_En_5_Chapter.xhtml#Tab6) lists
    the columns in `sys.dm_db_stats_properties`.


    Table 5-6


    Columns for sys.dm_db_stats_properties


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the object in question. |

    | `stats_id` | `int` | ID of the statistics. For indexes, the ID matches the index
    ID. |

    | `last_updated` | `datetime2(7)` | Date and time that the statistics were last
    updated. |

    | `rows` | `bigint` | Total number of rows in the table or indexed view when the
    statistics were last updated. For filtered statistics or indexes, the count pertains
    to the number of rows that matched the filter criteria. |

    | `rows_sampled` | `bigint` | Total number of rows sampled for statistics calculations.
    Histogram and density values are estimates when the `rows_sampled` value is less
    than the value in `rows`. |

    | `steps` | `int` | Number of steps in the histogram. Each step spans a range
    of column values followed by an upper-bound column value. The histogram steps
    are defined on the first key column in the statistics. The maximum number of steps
    is 200. |

    | `unfiltered_rows` | `bigint` | Total number of rows in the table before applying
    the filter expression. If `Filter Expression` is `NULL`, `unfiltered_rows` is
    equal to r`ows`. |

    | `modification_counter` | `bigint` | Count of the total number of inserted, deleted,
    or updated rows since the last time statistics were updated for the table. |

    | `persisted_sample_percent` | `Float` | A sample percentage used for statistics
    updates that do not explicitly specify one.  A value of zero means there is no
    persisted sample percentage for this statistic.  Added in SQL Server 2016. |


    ```

    sys.dm_db_stats_properties (object_id, stats_id)

    Listing 5-5

    Syntax for sys.dm_db_stats_properties

    ```


    Since `sys.dm_db_stats_properties` provides the opportunity for a better understanding
    of whether statistics are out of date, its output can show how changes to values
    in a table affect the `modification_counter` column. To do this, the table `dbo.SalesOrderHeaderStats`
    will be created with some indexes, as shown in with Listing [5-6](#338675_4_En_5_Chapter.xhtml#PC6).
    To investigate `modification_counter`, the query in Listing [5-7](#338675_4_En_5_Chapter.xhtml#PC7)
    will be used to see changes in the column. Figure [5-5](#338675_4_En_5_Chapter.xhtml#Fig5)
    shows that there are 20,000 rows in the table with a current `modification_counter`
    value of 0 for each index and statistic listed.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig5_HTML.png)


    A screenshot of query table of 3 rows and 8 columns. The column headers are object
    name, statistics name, last updated, rows, rows sampled, steps, unfiltered rows,
    and modification counter.


    Figure 5-5


    Query results for sys.dm_db_stats_properties on dbo.SalesOrderHeaderStats


    ```

    USE AdventureWorks2017

    GO

    SELECT

    OBJECT_SCHEMA_NAME(s.object_id)

    +''.''+OBJECT_NAME(s.object_id) AS object_name

    ,s.name as statistics_name

    ,x.last_updated

    ,x.rows

    ,x.rows_sampled

    ,x.steps

    ,x.unfiltered_rows

    ,x.modification_counter

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_properties(s.object_id, s.stats_id) x

    WHERE s.object_id = OBJECT_ID(''dbo.SalesOrderHeaderStats'')

    Listing 5-7

    sys.dm_db_stats_properties Query for dbo.SalesOrderHeaderStats

    ```'
  trans: '

    ### STATS_DATE


    在评估统计信息准确性时，一个重要的考量因素是统计信息是否已过时。判断统计信息是否过时的常用方法是使用 `STATS_DATE` 函数。该函数提供了统计信息最近一次更新的日期。如清单
    5-4 所示，该函数的语法接受一个 `object_id` 和一个 `stats_id`。对于索引而言，`stats_id` 与 `index_id` 的值相同。


    ```

    STATS_DATE ( object_id , stats_id )

    Listing 5-4

    STATS_DATE 语法

    ```


    虽然 `STATS_DATE` 函数常用于识别过时的统计信息，但这种方法对于此任务并不有效。统计信息的最后更新日期并不一定能反映数据变化的速率。一个数据数年未更新、统计信息是数月前的表，其统计信息可能并未过时；而一个频繁进行插入、更新和删除操作、但其统计信息在前一天更新的表，其统计信息可能已经无法代表索引中的实际值。尽管对于统计信息变化缓慢的索引，该函数可以作为一个通用的检查工具，但鉴于上述例子，使用时应谨慎。


    ### sys.dm_db_stats_properties


    识别统计信息变化率的更好方法是使用 `sys.dm_db_stats_properties` DMO，它提供了一个能反映数据变化情况的指标。这个 DMO 在
    SQL Server 2008 中引入，提供了自上次更新统计信息以来已更改行数的详细信息。如清单 5-5 所示，`sys.dm_db_stats_properties`
    的语法接受一个 `object_id` 和一个 `stats_id`。与 `STATS_DATE` 一样，`stats_id` 与 `index_id` 值相同。表
    5-6 列出了 `sys.dm_db_stats_properties` 中的列。


    表 5-6


    sys.dm_db_stats_properties 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 相关对象的 ID。 |

    | `stats_id` | `int` | 统计信息的 ID。对于索引，该 ID 与索引 ID 匹配。 |

    | `last_updated` | `datetime2(7)` | 统计信息最后一次更新的日期和时间。 |

    | `rows` | `bigint` | 统计信息最后一次更新时，表或索引视图中的总行数。对于筛选统计信息或索引，该计数指的是符合筛选条件的行数。 |

    | `rows_sampled` | `bigint` | 用于统计信息计算的采样行总数。当 `rows_sampled` 的值小于 `rows` 中的值时，直方图和密度值是估计值。
    |

    | `steps` | `int` | 直方图中的步数。每一步跨越一系列列值，后跟一个上限列值。直方图步长在统计信息的第一个键列上定义。最大步数为 200。
    |

    | `unfiltered_rows` | `bigint` | 应用筛选表达式之前表中的总行数。如果 `Filter Expression` 为 `NULL`，则
    `unfiltered_rows` 等于 `rows`。 |

    | `modification_counter` | `bigint` | 自上次更新表统计信息以来，插入、删除或更新的行总数。 |

    | `persisted_sample_percent` | `Float` | 用于未显式指定样本百分比的统计信息更新的样本百分比。值为零表示此统计信息没有保留的样本百分比。在
    SQL Server 2016 中新增。 |


    ```

    sys.dm_db_stats_properties (object_id, stats_id)

    Listing 5-5

    sys.dm_db_stats_properties 的语法

    ```


    由于 `sys.dm_db_stats_properties` 提供了更好地理解统计信息是否过时的机会，其输出可以显示表中值的变化如何影响 `modification_counter`
    列。为此，将创建一个包含一些索引的表 `dbo.SalesOrderHeaderStats`，如清单 5-6 所示。为了研究 `modification_counter`，将使用清单
    5-7 中的查询来查看该列的变化。图 5-5 显示该表中有 20,000 行数据，每个列出的索引和统计信息的当前 `modification_counter`
    值均为 0。


    ![](img/338675_4_En_5_Fig5_HTML.png)


    一个包含 3 行 8 列的查询表截图。列标题为：对象名称、统计信息名称、上次更新时间、行数、采样行数、步数、未筛选行数和修改计数器。


    图 5-5


    在 dbo.SalesOrderHeaderStats 上执行 sys.dm_db_stats_properties 的查询结果


    ```

