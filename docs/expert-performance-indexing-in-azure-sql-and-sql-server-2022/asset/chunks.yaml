    \ utility. While tuning queries is often a process of reviewing statistics and\
    \ evaluating execution plans, the DTA provides a means to accelerate this analysis\
    \ by using the trace files from the monitoring process in the previous chapter\
    \ to identify potentially useful indexing recommendations. This process can accomplish\
    \ the tuning with minimal impact on the production environment since all recommendations\
    \ are derived from analysis on a nonproduction environment.\n\nThe basic process\
