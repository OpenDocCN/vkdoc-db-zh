    SELECT wait_type,

    DATEDIFF(ms, min_create_date, max_create_date) AS total_time_ms,

    SUM(waiting_tasks_count) AS waiting_tasks_count,

    SUM(wait_time_ms) AS wait_time_ms,

    CAST(1\. * SUM(wait_time_ms) / NULLIF(SUM(waiting_tasks_count),0) AS DECIMAL(18,
    3)) AS avg_wait_time_ms,

    CAST(100\. * SUM(wait_time_ms) / NULLIF(DATEDIFF(ms, min_create_date, max_create_date),0)
    AS DECIMAL(18, 3)) AS pct_time_in_wait,

    SUM(signal_wait_time_ms) AS signal_wait_time_ms,

    CAST(100\. * SUM(signal_wait_time_ms) / NULLIF(SUM(wait_time_ms), 0) AS DECIMAL(18,
    3)) AS pct_time_runnable

    FROM WaitStats

    GROUP BY wait_type,

    min_create_date,

    max_create_date

    ORDER BY SUM(wait_time_ms) DESC;

    Listing 16-25

    Wait Statistics Analysis Query

    ```


    The query includes a number of calculations to help identify when there are issues
    with specific wait types. To best understand the information provided, see the
    definitions provided in Table [16-1](#338675_4_En_16_Chapter.xhtml#Tab1). These
    calculations and their definitions will help focus the performance issues related
    to wait statistics.


    When reviewing the results of the wait statistics query, shown in Figure [16-11](#338675_4_En_16_Chapter.xhtml#Fig11),
    there are two thresholds to watch. First, if any of the waits exceed 5 percent
    of the total wait time, there is likely a bottleneck related to that wait type,
    and further investigation into the wait should happen. Similarly, if any of the
    waits exceed 1 percent of the time, they should be considered for further analysis,
    but not before reviewing the items with higher waits. One thing to consider when
    reviewing wait statistics is that if the time spent on the wait is mostly because
    of signal wait time, then the resource contention can be better resolved by first
    focusing on CPU pressure on the server.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig11_HTML.png)


    A table with 8 columns and 10 rows. Column headers are wait type, total time m
    s, waiting tasks count, wait time m s, average wait time m s, p c t time in wait,
    signal wait time m s, and p c t time runnable.


    Figure 16-11


    Wait statistics analysis output


    Table 16-1


    Wait Statistics Query Column Definitions


    | Option name | Description |

    | --- | --- |

    | wait_type | Wait statistics that incurred the wait |

    | total_time_ms | Total amount of time measured by the query in milliseconds |

    | waiting_tasks_count | Count of the number of waits for this wait type |

    | wait_time_ms | Time in milliseconds accumulated for this wait type. This includes
    the time spent on signal_wait_time_ms |

    | avg_wait_time_ms | Average time per wait type in milliseconds |

    | pct_time_in_wait | Percent of total time spent for this wait type |

    | signal_wait_time_ms | Time in milliseconds accumulated after the wait type was
    available and no longer waiting before it was running. This is the time spent
    in the RUNNABLE state |

    | pct_time_runnable | Percentage of time spent for this wait type in the RUNNABLE
    state |


    Once wait states with issues have been identified, the next step is to review
    the wait and the recommended courses of actions for the wait. Since this chapter
    focuses on more index-centric wait types, we’ll focus on those definitions only.
    To learn more about the other wait types, review the Books Online topic for `sys.dm_os_wait_stats`
    (Transact SQL).'
