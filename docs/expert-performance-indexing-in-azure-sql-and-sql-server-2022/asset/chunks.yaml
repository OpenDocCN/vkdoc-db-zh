  trans: '### 统计头信息


    统计头信息是统计对象的元数据部分。表 5-1 中列出的这些列主要是信息性的。它们提供了在构建统计信息时考虑的行数，以及这些行是如何通过筛选确定的。表 5-1
    还包含了统计信息最后更新时间的信息，这对于调查统计信息质量方面的潜在问题很有用。


    表 5-1：`DBCC SHOW_STATISTICS` 中的统计头信息列


    | 列名 | 描述 |

    | --- | --- |

    | `Name` | 统计对象的名称。对于索引统计信息，此名称与索引名称相同。 |

    | `Updated` | 统计信息最后更新的日期和时间。 |

    | `Rows` | 统计信息最后更新时，表或索引视图中的总行数。对于筛选的统计信息或索引，此计数指的是符合筛选条件的行数。 |

    | `Rows Sampled` | 为统计计算采样的行数。当 `Rows Sampled` 的值小于 `Rows` 中的值时，直方图和密度值是估计值。 |

    | `Steps` | 直方图中的步数。每个步跨越一个列值范围，后跟一个上限列值。直方图步是在统计信息的第一个关键列上定义的。最大步数为 200。 |

    | `Density` | 计算为 1/*唯一值数量*，适用于统计对象第一个关键列中的所有值，不包括直方图边界值。从 SQL Server 2008 开始，查询优化器不再使用此值，但出于信息和向后兼容性目的仍提供。
    |

    | `Average Key Length` | 统计对象中所有关键列每个值的平均字节数。 |

    | `String Index` | 指示统计对象是否包含字符串摘要统计信息，以改进使用 `LIKE` 运算符的查询谓词的基数估计。 |

    | `Filter Expression` | 如果已填充，则是包含在统计对象中的表行子集的谓词。 |

    | `Unfiltered Rows` | 应用筛选表达式之前表中的总行数。如果 `Filter Expression` 为 `NULL`，则 `Unfiltered
    Rows` 等于 `Rows`。 |

    | `Persisted Sample Percent` | 在 SQL Server 2016 中新增，显示用于更新统计信息的样本百分比。如果为零，则表示没有为统计信息设置样本百分比。
    |


    查看图 5-1 所示的 `Sales.SalesOrderDetail` 表上 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    的统计头信息，可以发现一些值得注意的项目。由于 `Rows` 和 `Rows Sampled` 的值相同，这些统计信息并非基于估计。统计信息最后更新于 2017
    年 10 月 27 日（尽管在另一个数据库副本中此值可能不同）。统计直方图中有 163 步，最大可达 200 步。步数等于范围数。在本例中，163 步意味着有
    163 个值范围，每个范围在统计信息中提供了上限值。上限值定义了该范围内的最大值。如果第 1 步的上限值为 42，那么第 1 步将涵盖值 0–42。下一步则从
    43 开始，并包含直至其上限的值。注意缺少筛选表达式和未筛选行数；索引和统计信息都没有筛选掉行。最后，`Persisted Sample Percent`
    设置为 0，这意味着所有行都用于统计信息的采样，这可以通过比较 `Rows` 和 `Rows Sampled` 来确认。


    ![](img/338675_4_En_5_Fig1_HTML.png)


    图 5-1：`Sales.SalesOrderDetail` 表上索引的统计头信息


    ### 密度向量


    统计对象的下一个组件是密度向量。密度向量描述了统计对象内部的列。统计或索引对象中的每个关键值都对应一行。例如，如果一个索引中有两列，分别名为 `SaleOrderID`
    和 `SalesOrderDetailID`，密度向量中将有两行。密度向量将为 `SaleOrderID` 和 `SaleOrderID` 与 `SalesOrderDetailID`
    各有一行，如图 5-2 所示。密度向量有三部分信息可用：密度、平均长度和向量中包含的列（列名详见表 5-2）。


    ![](img/338675_4_En_5_Fig2_HTML.png)


    图 5-2：`Sales.SalesOrderDetail` 表上索引的密度向量示例


    密度向量的价值在于它有助于查询优化器调整多列统计对象的基数。如下一节所述，直方图中的范围仅基于统计对象的第一列，而密度则在执行单列或多列查询之间提供调整。虽然更新统计信息的重点通常在于直方图的变化，但密度向量提供了一种有价值的方法，用于调整直方图中的范围，以校正超出索引第一列的数据分布差异。


    表 5-2：`DBCC SHOW_STATISTICS` 中的密度向量列


    | 列名 | 描述 |

    | --- | --- |

    | `All Density` | 返回统计对象中每个列前缀的密度，每个密度一行。密度计算为 1/*唯一列值数量*。密度越接近 1，列中的值越均匀。 |

    | `Average Length` | 存储密度向量中每一级的列值的平均长度（字节）。 |

    | `Columns` | 每个密度向量级别的列名。 |'
- fmt: '### Histogram


    The last component of the `DBCC SHOW_STATISTICS` output is the histogram. The
    histogram provides the details of the statistics object that the query optimizer
    uses to determine cardinality. When building the histogram, SQL Server calculates
    a number of aggregates that are based on either a statistics sample or all the
    rows in the table or view. The aggregates measure the frequency in which values
    occur and group the values into no more than 200 *steps*. For each of these steps,
    a distribution of the statistics columns is computed that includes the number
    of rows in the step, the upper bound of the step, the number of rows matching
    the upper bound, the distinct rows in the step, and the average number of duplicate
    values in the step. Table 5-3 lists the columns that match these aggregates. With
    this information, the query optimizer is able to estimate the number of rows returned
    for ranges of values in an index, thus allowing it to calculate a cost associated
    with retrieving the row.


    **Table 5-3**

    Histogram Columns from `DBCC SHOW_STATISTICS`


    | Column Name | Description |

    | --- | --- |

    | `RANGE_HI_KEY` | Upper-bound column value for a histogram step. This column
    value is also called a `key value`. |

    | `RANGE_ROWS` | Estimated number of rows whose column value falls within a histogram
    step, excluding the upper bound. |

    | `EQ_ROWS` | Estimated number of rows whose column value equals the upper bound
    of the histogram step. |

    | `DISTINCT_RANGE_ROWS` | Estimated number of rows with a distinct column value
    within a histogram step, excluding the upper bound. |

    | `AVG_RANGE_ROWS` | Average number of rows with duplicate column values within
    a histogram step, excluding the upper bound (`RANGE_ROWS/DISTINCT_RANGE_ROWS`
    for `DISTINCT_RANGE_ROWS` > 0). |


    There are 163 steps in the histogram for this example. Figure 5-3, which includes
    a number of rows from the histogram, shows how a few of the steps in `Sales.SalesOrderDetail`
    are aggregated. The second item in Figure 5-3 shows a `RANGE_HI_KEY` value of
    43692, which means that all `SalesOrderID` values between 43660 and 43692 are
    included in these estimates. There are 282 rows in this series, based on the `RANGE_ROWS`
    value, with 32 distinct rows in the series. Translating these numbers to the `SalesOrderDetail`
    table, there are 32 distinct `SalesOrderID` values with 282 `SalesOrderDetailID`
    items between them. Lastly, there are 28 `SalesOrderDetailID` items for `SalesOrderID`
    43692.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig3_HTML.jpg)

    *A screenshot of a query table sales order detail of 10 rows and 5 columns. The
    header columns are range H I key, range rows, E Q rows, distinct range rows, and
    A V G range row. The range of 10 H I key is 43659 to 44801.*


    **Figure 5-3**

    Sample of the histogram for an index on the `Sales.SalesOrderDetail` table


    The value in the `AVG_RANGE_ROWS` column is quite important and can be the cause
    of performance problems when statistics are out of date. It states how many rows
    can be expected when any one value or range of values from the index are retrieved.
    To check the accuracy of the range average, execute the queries in Listing 5-3,
    which will aggregate some of the values in the second step. After it is complete,
    the results (as seen in Figure 5-4) will show that the averages closely match
    the average range rows value of 8.8125.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig4_HTML.png)

    *A screenshot of a table output displays 3 average rows on 3 conditions.*


    **Figure 5-4**

    Results of `AVG_RANGE_ROWS` estimate validation


    ```

    USE AdventureWorks2017

    GO

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43672 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43680;

    ```

    **Listing 5-3**

    Query to Check `AVG_RANGE_ROWS` Estimate


    This histogram is a valuable tool to use when the statistics of an index are in
    question. If there is a need to determine why a query is not performing as well
    as expected or why a query plan is estimating rows inaccurately, the histogram
    can be used to validate these behaviors and results.


    ### Catalog Views


    Using `DBCC SHOW_STATISTICS` provides the most detailed information on query optimization
    statistics. It does, however, rely on the user knowing that the statistics exist.
    While by default, each index will have statistics created for it, column-level
    statistics require an alternative method for discovering them. This is accomplished
    through two catalog views: `sys.stats` and `sys.stats_columns`.


    #### sys.stats


    The catalog view `sys.stats` returns one row for every statistics object that
    exists within a database, regardless of whether statistics were created based
    on an index or column. Table 5-4 provides details on the columns in `sys.stats`.


    **Table 5-4**

    Columns for `sys.stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the object to which these statistics belong. |

    | `name` | `sysname` | Name of the statistics. This value must be unique for every
    `object_id`. |

    | `stats_id` | `int` | ID of the statistics (unique within the object). |

    | `auto_created` | `bit` | Indicates whether the statistics were autocreated by
    the query processor. |

    | `user_created` | `bit` | Indicates whether the statistics were explicitly created
    by a user. |

    | `no_recompute` | `bit` | Indicates whether the statistics were created with
    the `NORECOMPUTE` option. |

    | `has_filter` | `bit` | Indicates whether the statistics are aggregated based
    on a filter or subset of rows. |

    | `filter_definition` | `nvarchar(max)` | Expression for the subset of rows included
    in filtered statistics. |

    | `is_temporary` | `bit` | Indicates whether the statistics are temporary.  Added
    in SQL Server 2012. |

    | `is_incremental` | `bit` | Indicates whether the statistics are incremental.  Added
    in SQL Server 2014. |

    | `has_persisted_sample` | `bit` | Indicates whether the statistics have a persisted
    sample rate.  Added in SQL Server 2019. |

    | `stats_generation_method` | `int` | Flag identifying the generation method for
    the statistics. Added in SQL Server 2019. |

    | `stats_generattion_method_desc` | `varchar(80)` | Text description identifying
    the generation method for the statistics. Added in SQL Server 2019. |


    #### sys.stats_columns


    As a companion to `sys.stats`, the catalog view `sys.stats_columns` provides one
    row for every column within a statistics object. Table 5-5 lists the columns in
    `sys.stats_columns`.


    **Table 5-5**

    Columns for `sys.stats_columns`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | int | ID of the object of which this column is part |

    | `stats_id` | int | ID of the statistics of which this column is part |

    | `stats_column_id` | int | 1-based ordinal within a set of stats columns |

    | `column_id` | int | ID of the column from `sys.columns` |'
