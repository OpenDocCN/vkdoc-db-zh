    一个面板显示已打开的执行计划选项卡，其中包含查询 1 和查询 2 的两行文本，每个查询相对于批处理的成本各占 50%。每个查询都有一个流程图，展示了从`clustered
    index scan`、`view clustered`、`product subcategory summary`（成本占 100%）到`select`（成本占
    0%）的连接关系。


    图 13-60


    索引视图模式的执行计划


    ![](img/338675_4_En_13_Fig59_HTML.png)


    一个面板显示已打开的消息选项卡，其中有两条相似的单行条目，内容为`table "product subcategory summary"`，扫描计数 1，逻辑读取
    2，物理读取 0，预读取 0，LOB 逻辑读取 0，LOB 物理读取 0。每条都位于`35 rows affected`和`1 row affected`标签之间。


    图 13-59


    索引视图模式的统计信息 I/O 结果


    在执行过程中还观察到了另一个特殊现象。在实施`indexed view`后，针对基础表的查询和针对视图的查询执行情况完全相同。这是`indexed views`带来的额外好处之一。当`SQL
    Server`为第一个查询确定执行计划时，它可以推断出存在一个`indexed view`可以覆盖与该查询相同的逻辑，即使平均值列的计算方式并不相同。


    请注意，`indexed views`的成本在于维护其索引。每当其源表中的任何基础值发生变化时，索引也需要随之更新。理想的`indexed views`是针对特定用例的，并不试图为整个表重新创建索引。当`indexed
    views`变得过于复杂或开始包含许多不同的索引时，值得考虑重新构建基础表，以降低需要它们的业务逻辑的复杂性。


    当需要将多个表连接到一个单元中以减少运行时连接数据所需的`I/O`时，`Indexed views`是一个极其有用的工具。尽管`indexed views`有一些限制，但它也带来许多好处，包括能够在类似清单
    13-46 中的情况下使用。当存在经常使用的、具有相同结构的视图和查询时，可以考虑引入视图是否能提供基础表上的索引所无法提供的好处。


    ## 总结


    本章重点介绍在多种情况下如何以及何时对表应用索引。每个示例都演示了如何将特定的索引模式应用到具体场景中，以通过索引提升性能。本章涵盖了使用堆的有限但有效的实例，接着介绍了构建`clustered
    indexes`的各种选项和方式。对于`non-clustered indexes`，示例展示了在聚类键之外的列上添加性能的选项，这些选项可添加到`clustered
    indexes`中。本章还包括了一个实现`columnstore indexes`的示例，并讨论了何时应用此类索引。总的来说，这些模式为识别对不同列类型和工作负载最有用的索引类型奠定了基础，并提供了有意义的比较一种索引解决方案与另一种解决方案的能力。


    # 14. 查询策略


    在上一章中，讨论了为各种表识别潜在索引的策略。然而，这通常只是故事的一半。一旦索引创建完成，数据库的性能有望得到提升，从而暴露出下一个瓶颈。不幸的是，编码实践和选择性可能会对索引应用于查询的方式产生负面影响。有时，数据库和表的访问方式会阻碍使用一些最有益的可用索引。


    恰当的索引为关键数据提供了一组高效的访问路径。有效的查询对于确保数据按照这些路径进行读写并提供良好性能是必不可少的。


    本章涵盖了索引可能无法按预期使用的查询策略。这些场景包括：


    *   `LIKE` 比较


    *   字符串连接


    *   计算列


    *   标量函数


    *   数据类型转换


    对于每种场景，将讨论其相关情况以及它们表现不如预期的原因。针对每个场景，将提供缓解策略以及如何在正确的位置使用正确索引的一些提示。本章将提供所需的工具，以识别阻碍为数据库建立性能优化索引的情况，以及解决这些挑战的策略。

