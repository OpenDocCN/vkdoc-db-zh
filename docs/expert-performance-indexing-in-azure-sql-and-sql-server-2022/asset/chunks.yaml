- fmt: '### Data Cleanup


    While all the information for monitoring is needed for the index analysis, this
    information is not needed indefinitely. The process for monitoring would not be
    complete without tasks in place to clean up the information collected after a
    reasonable amount of time. A generally acceptable schedule for cleaning up information
    is to purge snapshots after 3 days and history information after 90 days. This
    may be adjusted as needed if there is a desire to maintain history data for longer
    periods of time.


    The snapshot information is used simply to prepare the history information and
    is not needed once the delta is created. Since SQL Agent jobs can error and collection
    points may be a day apart from the previous, a 3-day window generally provides
    the leeway needed to support the process and accommodate any issues that may arise.


    The data in the history tables is more crucial than the snapshot information and
    needs to be kept longer. This information feeds the activities during index analysis.
    The window for retaining this information should match the amount of time that
    it generally takes to go through the Indexing Method three or more times. This
    way, the information retained can be used for reference in a few cycles of the
    process.


    When scheduling the cleanup process, it should be at least daily and during noncore
    processing hours. This will minimize the amount of information deleted in each
    execution and reduce the possible contention of the delete with other activity
    on the server. The delete script, shown in Listing 15-16, covers each of the tables
    discussed throughout this section.


    ```sql

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.wait_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.wait_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    ```


    Listing 15-16

    Index Monitoring Snapshot and History Cleanup


    ### Event Tracing


    The last set of information that can be collected for monitoring indexes is event
    tracing. The trace information collects SQL statements that represent production
    activity that can be used during index analysis to identify indexes that could
    be useful based on the query activity in a production environment and on the data
    that is being stored there. While the statistics collected so far provide information
    on the effect of activity on indexes and other resource use on the SQL Server
    instance, event tracing collects the activity that is causing those statistics.
    With SQL Server, there are two methods that can be used to collect event tracing
    data:


    *   SQL Trace


    *   Extended Events


    For the purposes of completeness, both methods will be discussed. In my opinion,
    only Extended Events should be used to collect event tracing data in SQL Server.
    This is due to how well Extended Events are incorporated into SQL Server to help
    prevent it from causing performance issues while monitoring. And the level of
    detail that it can retrieve goes far beyond the capabilities of SQL Trace.


    #### SQL Trace


    SQL Trace, and by extension SQL Profiler, is the original tracing tool for SQL
    Server. It is one of the most common tools that DBAs have available to them and
    can easily collect events in SQL Server. With SQL Trace, there are a number of
    areas to be careful of when collecting information. First, SQL Trace will likely
    collect a lot of information, and this will need to be accommodated. In other
    words, the more active the server and the databases, the larger the trace (`.trc`)
    files will be. Filtering events can help ensure that only relevant details are
    returned. Along these same lines, do not collect the trace information on drives
    that are already heavily used or dedicated to data or transaction log files. Doing
    this can, and likely will, impact the performance of I/O on those drives. The
    end goal for monitoring is to improve the performance of the system; care needs
    to be taken to minimize the impact of monitoring.


    Finally, SQL Trace and SQL Profiler were deprecated in SQL Server 2012. This does
    not mean that these tools no longer function, but they are slated for removal
    in a future SQL Server release. While SQL Trace is deprecated, it is still the
    most convenient tool in some scenarios for collecting trace information, such
    as for building workloads for the Database Engine Tuning Advisor.


    Note

    It is always advisable to keep apprised of deprecated features within SQL Server.
    For more information on deprecated features, see SQL Docs at [`https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022`](https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022).


    There are four basic steps to creating a SQL Trace session:


    1.  Build the trace session.


    2.  Assign the events and columns to the session.


    3.  Add filters to the session.


    4.  Start the SQL Trace session.


    The next few pages will cover these steps and describe the components used in
    creating the SQL Trace session in SQL Server 2022. The script will also work in
    earlier versions of SQL Server.


    To begin monitoring with SQL Trace, a trace session must first be created. Sessions
    are created using the `sp_trace_create` stored procedure. This procedure accepts
    a number of parameters that configure how the session will collect information.
    In the example session, shown in Listing 15-17, the SQL Trace session will create
    files that automatically rollover when they reach the 50 MB file size limit. The
    file size is limited to allow for better file management. In most environments,
    it’s easier to copy many 50 MB files compared to files that are 1 GB or more.
    This size may be adjusted if larger files are preferred over a large number of
    them. The trace files are being created in `c:\temp` with the file name `IndexingMethod`.
    Be sure to create this folder if it doesn’t exist. Note that this name can be
    changed to anything that suits the needs of the server and databases where the
    monitoring is being set up.


    ```sql

    USE master;

    GO

    DECLARE @rc INT,

    @TraceID INT,

    --Maximum .trc file size in MB

    @maxfilesize BIGINT = 50,

    --File name and path, minus the extension

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'';

    EXEC @rc = sp_trace_create @TraceID OUTPUT, 0, @FileName, @maxfilesize, NULL;

    IF (@rc  0)

    RAISERROR(''Error creating trace file'', 16, 1);

    SELECT *

    FROM sys.traces

    WHERE id = @TraceID;

    ```


    Listing 15-17

    Create SQL Trace Session'
  raw: '### Data Cleanup


    While all the information for monitoring is needed for the index analysis, this
    information is not needed indefinitely. The process for monitoring would not be
    complete without tasks in place to clean up the information collected after a
    reasonable amount of time. A generally acceptable schedule for cleaning up information
    is to purge snapshots after 3 days and history information after 90 days. This
    may be adjusted as needed if there is a desire to maintain history data for longer
    periods of time.


    The snapshot information is used simply to prepare the history information and
    is not needed once the delta is created. Since SQL Agent jobs can error and collection
    points may be a day apart from the previous, a 3-day window generally provides
    the leeway needed to support the process and accommodate any issues that may arise.


    The data in the history tables is more crucial than the snapshot information and
    needs to be kept longer. This information feeds the activities during index analysis.
    The window for retaining this information should match the amount of time that
    it generally takes to go through the Indexing Method three or more times. This
    way, the information retained can be used for reference in a few cycles of the
    process.


    When scheduling the cleanup process, it should be at least daily and during noncore
    processing hours. This will minimize the amount of information deleted in each
    execution and reduce the possible contention of the delete with other activity
    on the server. The delete script, shown in Listing [15-16](#338675_4_En_15_Chapter.xhtml#PC16),
    covers each of the tables discussed throughout this section.


    ```

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

