- fmt: '# User Columns


    The next set of columns in the DMV `sys.dm_db_index_usage_stats` are the user
    columns. The user columns provide insight into how indexes are being used within
    query plans. The columns are listed in Table 5-9 and include statistics on how
    many times (and the most recent time) each operation occurred.


    Table 5-9


    User Columns in `sys.dm_db_index_usage_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `user_seeks` | `bigint` | Aggregate count of seeks by user queries |

    | `user_scans` | `bigint` | Aggregate count of scans by user queries |

    | `user_lookups` | `bigint` | Aggregate count of bookmark/key lookups by user
    queries |

    | `user_updates` | `bigint` | Aggregate count of updates by user queries |

    | `last_user_seek` | `datetime` | Date and time of last user seek |

    | `last_user_scan` | `datetime` | Date and time of last user scan |

    | `last_user_lookup` | `datetime` | Date and time of last user lookup |

    | `last_user_update` | `datetime` | Date and time of last user update |


    `sys.dm_db_index_usage_stats` monitors four types of index operations. These are
    represented through the columns `user_seeks`, `user_scans`, `user_lookups`, and
    `user_updates`.


    ## user_seeks


    The first of the index usage columns is `user_seeks`. The operations for this
    column occur whenever a query executes and returns a single row or range of rows
    for which it has a direct access path. For instance, if a query executes and retrieves
    all the sales details for a single order or a small range of orders, similar to
    the queries in Listing 5-13, the query plan for these would use a seek operation
    (see Figure 5-9).


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig9_HTML.jpg)


    Figure 5-9: Query plans for seek queries


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID = 43659;

    SELECT * FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43659 AND 44659;

    Listing 5-13: Index Seek Queries

    ```


    After running the queries from Listing 5-13, the DMV `sys.dm_db_index_usage_stats`
    will be counted into the `user_seeks` column. Listing 5-14 provides a query to
    investigate this. The results in Figure 5-10 show that the value in the `user_seeks`
    column is 5, which matches the count of operations from Listing 5-13. Based on
    this, two queries were executed using the index, and both were able to use the
    index to go directly to the rows that were requested.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig10_HTML.png)


    Figure 5-10: Query results for `user_seeks` from `sys.dm_db_index_usage_stats`


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_seeks

    ,ius.last_user_seek

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-14: Query for `user_seeks` from `sys.dm_db_index_usage_stats`

    ```


    ## user_scans


    The next usage column is `user_scans`. The value of this column is increased whenever
    a query executes and must scan through every row in an index. For instance, consider
    a query on sales details that is unfiltered and must return all records or a query
    that is filtered on a column that is unindexed. Both of these queries, shown in
    Listing 5-15, are asking SQL Server for either everything it has in a table or
    a few rows that it doesn’t have a location on. The only way to accommodate this
    request would be through a scan of the `SalesOrderDetail` table. Figure 5-11 shows
    the execution plans for these two queries.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig11_HTML.jpg)


    Figure 5-11: Query plans for scan queries from `sys.dm_db_index_usage_stats`


    ```

    USE AdventureWorks2017

    GO

    SELECT * FROM  Sales.SalesOrderDetail;

    SELECT * FROM  Sales.SalesOrderDetail

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    Listing 5-15: Index Scan Queries

    ```


    When index scans occur, they can be seen in `sys.dm_db_index_usage_stats`. The
    query in Listing 5-16 provides details from the DMV showing a count of scans.
    Since there were two scans, one for each of the two queries, the results in Figure
    5-12 show that there have been two operations under `user_scans`. This information
    can be useful when trying to troubleshoot situations where there are large numbers
    of scans on a table. By looking at these details, it is possible to find the indexes
    with high scans and then research why queries using those indexes are choosing
    scans, rather than seeks.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig12_HTML.png)


    Figure 5-12: Query results for `user_scans` from `sys.dm_db_index_usage_stats`


    ```

    USE AdventureWorks2017

    GO

    SELECT TOP 10

    OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.user_scans

    ,ius.last_user_scan

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-16: Query for `user_scans` from `sys.dm_db_index_usage_stats`

    ```


    ## user_lookups


    The third column in the DMV is `user_lookups`. User lookups occur when a seek
    on a non-clustered index occurs, but the index does not have all of the required
    columns in it to satisfy the query. When this happens, the query must look up
    the columns from the clustered index. An example would be a query against the
    `SalesOrderDetail` table that is returning the `ProductID` and `CarrierTrackingNumber`
    columns, which is filtered on `ProductID`; Listing 5-17 shows this query. Figure
    5-13 shows the query plan, which includes a seek on the non-clustered index and
    a key lookup on the clustered index.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig13_HTML.jpg)


    Figure 5-13: Query plans for seek and key lookup


    ```

    USE AdventureWorks2017

    GO

    SELECT ProductID, CarrierTrackingNumber

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 778

    GO

    Listing 5-17: Index Lookup Query

    ```'
