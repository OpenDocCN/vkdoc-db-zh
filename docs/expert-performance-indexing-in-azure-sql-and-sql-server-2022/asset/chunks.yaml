  trans: "\n# 摘要\n\n本章通过分析查询结构，旨在理解索引何时能被有效利用，以及何时其使用会受到阻碍，从而对性能产生负面影响。有时，特定类型的索引可能并不适用于某些场景，例如在大表中搜索字符串内的值。而在其他情况下，在正确的地方应用正确类型的索引或函数，会对查询能否使用索引产生重大影响。\n\
    \n在本章的许多示例中，通过使用索引扫描（而非索引查找），使有问题的索引使用情况变得清晰明了。在这些场景中，索引查找是理想的索引操作。然而情况并非总是如此，在某些情况下，对索引进行扫描才是最佳操作符，例如当需要读取整个表（或大部分表）时。理解环境所针对的事务类型以及所访问表的大小至关重要。\n\
    \n本章的主要结论是：查询结构往往与索引结构同等重要。在开发数据库代码时所做的选择，可能会完全破坏为正确建立数据库索引所做的努力。务必让索引策略辅以高效的代码，以充分发挥其潜力。\n\
    \n# 15. 监控索引\n\n本书已讨论了许多主题，例如索引是什么、它们的作用、构建索引的模式，以及确定 SQL Server 数据库应如何建立索引的诸多其他方面。所有这些信息对于索引数据库的最后一步——分析数据库以确定哪些索引是必需的——都是必要的。本书最后三章将整合实施索引方法所需的信息。\n\
    \n首先，本章将讨论一种可用于监控索引的通用实践。它将包括可采取的步骤，用以观察索引的行为并理解它们如何影响环境。此方法可应用于单个数据库、一个服务器或整个\
    \ SQL Server 环境。无论数据库支持何种类型的运营或业务，都可以使用类似的监控流程。\n\n监控索引背后的主要目标是创建收集、存储和报告索引相关信息的能力。这些信息将来自多种来源。监控的来源应该很熟悉，因为它们常用于与索引类似的任务，例如性能调优。对于某些来源，信息将随时间推移而收集，以提供总体趋势的概念。对于其他来源，在特定时间点的快照就足够了。重要的是要随时间收集一些信息，以提供一个基准来比较性能。这将有助于理解索引使用情况和有效性何时发生了变化。\n\
    \n监控索引需要从多个来源收集信息。本章将讨论的来源如下：\n\n*   性能计数器\n*   动态管理对象\n*   事件追踪\n\n针对这些来源中的每一个，后续章节将描述需要收集的内容，并就如何收集这些信息提供指导。到本章结束时，将形成一个框架，能够提供启动分析阶段所需的信息。\n\
    \n> 注意\n> \n> 本章的所有监控信息将收集在一个名为 `IndexingMethod` 的数据库中。脚本可以在该数据库中运行，也可以在另一个性能监控数据库中运行。\n\
    \n## 性能计数器\n\n监控索引的第一个信息来源是 SQL Server 性能计数器。性能计数器是 Microsoft 提供的度量标准，用于衡量服务器上应用程序和硬件中事件的发生速率或资源的状态。对于某些性能计数器，存在通用准则可用于指示何时可能存在索引问题。对于其他计数器，其速率或级别的变化可能表明需要调整服务器上的索引。\n\
    \n使用性能计数器的主要挑战在于，它们代表的是服务器级别或 SQL Server 实例级别的计数器状态。它们并不指示可能发生索引问题的数据库或表级别。不过，在考虑到可用于监控索引和识别潜在索引需求的其他工具时，这种详细程度是可接受且有用的。在此级别收集计数器信息的一个优势是，我们被迫考虑全局以及所有索引对性能的影响。在孤立的情况下，一个表上几个性能不佳的索引可能是可以接受的。然而，当与其他索引不佳的表结合时，总体性能可能会达到一个临界点，此时索引性能问题需要得到解决。借助性能计数器提供的服务器级别统计信息，我们将能够识别何时达到了这个临界点。\n\
    \nSQL Server 和 Windows Server 有许多可用的性能计数器。但从索引的角度来看，许多性能计数器可以忽略。最有用的性能计数器是那些映射到与索引操作或访问方式相关的操作，例如转送的记录和索引搜索。有关对索引最有用的性能计数器的定义，请参见表\
    \ 15-1。收集每个计数器的原因及其如何影响索引决策将在下一章讨论。\n\n表 15-1\n索引相关性能计数器\n\n| 选项名称 | 描述 |\n| ---\
    \ | --- |\n| `Access Methods\\Forwarded Records/sec` | 每秒通过转送记录指针获取的记录数 |\n| `Access\
    \ Methods\\FreeSpace Page Fetches/sec` | 每秒在已分配给对象的页面中获取页面以插入或修改记录的次数 |\n| `Access\
    \ Methods\\FreeSpace Scans/sec` | 每秒启动的扫描次数，用于在已分配给对象的页面中搜索空闲空间以插入或修改记录 |\n| `Access\
    \ Methods\\Full Scans/sec` | 每秒无限制的完全扫描次数。可以是基表扫描或完整索引扫描 |\n| `Access Methods\\\
    Index Searches/sec` | 每秒索引搜索次数。这些搜索用于启动范围扫描和单索引记录获取，以及重新定位索引 |\n| `Access Methods\\\
    Page compression attempts/sec` | 每秒使用 PAGE 压缩尝试压缩页面的次数；包括失败的页面压缩 |\n| `Access\
    \ Methods\\Pages compressed/sec` | 每秒使用 PAGE 压缩成功压缩的页面数 |\n| `Access Methods\\\
    Page Splits/sec` | 每秒发生的页拆分次数，由索引页面溢出导致 |\n| `Buffer Manager\\Page Lookups/sec`\
    \ | 在缓冲池中查找页面的请求数 |\n| `Locks(*)\\Lock Wait Time (ms)` | 上一秒中锁的总等待时间（毫秒） |\n|\
    \ `Locks(*)\\Lock Waits/sec` | 每秒导致调用方需要等待的锁请求数 |\n| `Locks(*)\\Number of Deadlocks/sec`\
    \ | 每秒导致死锁的锁请求数 |\n| `SQL Statistics\\Batch Requests/sec` | 每秒接收到的 Transact SQL\
    \ 命令批次数 |\n"
- fmt: 'There are a number of ways to collect performance counters. For the monitoring
    in this chapter, the DMV `sys.dm_os_performance_counters` will be used. This DMV
    returns a row for all SQL Server counters for an instance. The values returned
    are the raw values for the counters. Depending on the type of counter, the value
    can be a point in time state value or an ever-accumulating aggregate.


    To begin collecting performance counter information for monitoring, a table will
    need to be created for storing this information. The table definition in Listing
    15-1 provides for this need. When collecting the performance counters, a table
    will be used that stores the counter name with the value and then date-stamps
    each row to identify when the information was collected.


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCounters

    (

    counter_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    Calculated_Counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCounters

    PRIMARY KEY CLUSTERED (counter_id)

    );

    GO

    CREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName

    ON dbo.IndexingCounters (counter_name)

    INCLUDE (create_date, server_name, object_name, Calculated_Counter_value);

    ```


    Listing 15-1

    Performance Counter Snapshot Table


    For the purposes of collecting information for monitoring indexing, the information
    from `sys.dm_os_performance_counters` will be collected and used to calculate
    the appropriate values from the DMV. These would be the same values that are available
    when viewing performance counter information from other tools, such as `Performance
    Monitor`. There are a few steps required to populate `dbo.IndexingCounters`. The
    DMV contains raw counter values. To calculate these values properly, it is necessary
    to take multiple snapshots of the values in the DMV, separated by a number of
    seconds before calculating the difference in values. In Listing 15-2, the counter
    value is calculated after 10 seconds. Once the time has expired, the counters
    are calculated and inserted into the `dbo.IndexingCounters` tables. This script
    should be scheduled and executed frequently. Ideally, this information should
    be collected every 1–5 minutes, though frequency can be adjusted based on the
    level of index activity in a given environment. Feel free to customize the timing
    of this process to meet the indexing needs of a given database.


    Note


    Performance counter information can be collected more frequently. For instance,
    `Performance Monitor` defaults to every 15 seconds. For the purposes of index
    monitoring, that frequency is not necessary.


    ```sql

    USE IndexingMethod;

    GO

    DROP TABLE IF EXISTS #Counters;

    SELECT pc.object_name,

    pc.counter_name

    INTO #Counters

    FROM sys.dm_os_performance_counters pc

    WHERE pc.cntr_type IN ( 272696576, 1073874176 )

    AND (

    pc.object_name LIKE ''%:Access Methods%''

    AND (

    pc.counter_name LIKE ''Forwarded Records/sec%''

    OR pc.counter_name LIKE ''FreeSpace Scans/sec%''

    OR pc.counter_name LIKE ''FreeSpace Page Fetches/sec%''

    OR pc.counter_name LIKE ''Full Scans/sec%''

    OR pc.counter_name LIKE ''Index Searches/sec%''

    OR pc.counter_name LIKE ''Page Splits/sec%''

    OR pc.counter_name LIKE ''Page compression attempts/sec%''

    OR pc.counter_name LIKE ''Pages compressed/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Buffer Manager%''

    AND (

    pc.counter_name LIKE ''Page life expectancy%''

    OR pc.counter_name LIKE ''Page lookups/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Locks%''

    AND (

    pc.counter_name LIKE ''Lock Wait Time (ms)%''

    OR pc.counter_name LIKE ''Lock Waits/sec%''

    OR pc.counter_name LIKE ''Number of Deadlocks/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:SQL Statistics%''

    AND pc.counter_name LIKE ''Batch Requests/sec%''

    )

    GROUP BY pc.object_name,

    pc.counter_name;

    DROP TABLE IF EXISTS #Baseline;

    SELECT GETDATE() AS sample_time,

    pc1.object_name,

    pc1.counter_name,

    pc1.instance_name,

    pc1.cntr_value,

    pc1.cntr_type,

    x.cntr_value AS base_cntr_value

    INTO #Baseline

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) x;

    WAITFOR DELAY ''00:00:15'';

    INSERT INTO dbo.IndexingCounters (

    create_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    Calculated_Counter_value

    )

    SELECT GETDATE(),

    LEFT(pc1.object_name, CHARINDEX('':'', pc1.object_name) - 1),

    SUBSTRING(pc1.object_name, 1 + CHARINDEX('':'', pc1.object_name), LEN(pc1.object_name)),

    pc1.counter_name,

    pc1.instance_name,

    CASE

    WHEN pc1.cntr_type = 65792 THEN pc1.cntr_value

    WHEN pc1.cntr_type = 272696576 THEN

    COALESCE((1. * pc1.cntr_value - x.cntr_value) / NULLIF(DATEDIFF(s, sample_time,
    GETDATE()), 0), 0)

    WHEN pc1.cntr_type = 537003264 THEN COALESCE((1. * pc1.cntr_value) / NULLIF(base.cntr_value,
    0), 0)

    WHEN pc1.cntr_type = 1073874176 THEN

    COALESCE(

    (1. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value - x.base_cntr_value,
    0)

    / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),


    ) END AS real_cntr_value

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value,

    base_cntr_value,

    sample_time

    FROM #Baseline b

    WHERE b.object_name   = pc1.object_name

    AND b.counter_name  = pc1.counter_name

    AND b.instance_name = pc1.instance_name

    ) x

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) base;

    ```


    Listing 15-2

    Performance Counter Snapshot Script


    The first time performance counters are collected for indexes, it will not be
    possible to compare the counters to other reasonable values for a SQL Server database
    instance. As time goes on, though, previous performance counter samples can be
    retained to make comparisons. As part of monitoring, it is important to identify
    periods in which values for the performance counters represent the typical activity
    for your environment. Using that data, it is possible to identify anomalies or
    periods when usage is atypical and requires attention.'
