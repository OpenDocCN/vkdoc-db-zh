- fmt: '## Summary


    This chapter looked at the types of indexes available for memory-optimized tables.
    These options, which include hash and range indexes, are the power behind the
    ability for memory-optimized tables to provide the incredible performance that
    they deliver. As demonstrated, each index type aligns to different querying patterns.
    It is important to understand those patterns to build the optimal indexes for
    memory-optimized tables and the workloads that they support.


    # 9. Full-Text Indexing


    SQL Server supports mechanisms that allow you to store large amounts of unstructured
    text information. Since SQL Server 2008, one of those mechanisms has been the
    `MAX` length used with variable-length character data types `VARCHAR` and `NVARCHAR`.
    This means you can store up to 2 GB worth of character information within a single
    column. While SQL Server can store this information, the 1,700-byte limit for
    non-clustered indexes and 900-byte limit on clustered indexes make indexing through
    traditional means a challenge. Fortunately, SQL Server offers another indexing
    mechanism for searching within these large data types: full-text indexing.


    ## Full-Text Indexing


    Full-text indexing is another indexing feature in SQL Server that falls outside
    of the normal indexing methods and objects. This chapter will briefly describe
    full-text search (FTS) architecture, storage, and indexing for optimal performance.


    Full-text search (FTS) allows large amounts of text-based content to be stored
    and efficiently searched. This content can include many different formats, such
    as Word document (`.docx`) files. This storage is in BLOB (binary large object)
    columns instead of plain-text data. The ability to store and search content of
    an unstructured nature provides a number of technical opportunities in a database
    management system.


    Document retention is one such opportunity as it allows documents to be stored
    for vast lengths of time at a much lower cost. The search abilities allow for
    querying this content for a wide variety of needs. Imagine a shipping company
    that generates thousands of shipping documents from a template created in plain
    text. Those documents constitute a massive initiative for retention purposes to
    ensure shipments can be tracked for later needs. Storage warehouse rooms cost
    money to maintain. When the task of researching a specific shipment arises, the
    hours taken for that task are significant unless it can be automated.


    If this shipping company is using the `FTS` feature and an indexing structure,
    then documents are scanned with systems that read the text into a system that
    later inserts it into a SQL Server database. This allows for full-text search
    of specific account numbers, shipping invoices, and any distinct text in the documents
    needed for later review. An index just like a book index can be created, making
    it even quicker to find specific documents. Going further, `FTS` lets specific
    content be found within the documents themselves. If a request is made to find
    all shipping documents that were sent by a specific freight company on a specific
    trailer, the `FTS` capabilities allow the information to be retrieved in a fraction
    of the time as compared with a manual process or an unindexed text search.


    ### Creating a Full-Text Example


    Now that the concept of `FTS` has been introduced, indexing strategy can be discussed.
    Full-text indexes are the backbone of searching and querying unstructured text
    data. This data can be a number of data types including `char`, `varchar`, `nchar`,
    `nvarchar`, `xml`, and `varbinary`. While it is possible to use `text`, `ntext`,
    and `image`, it''s best to avoid their use as they are deprecated in SQL Server.
    The data types `varchar`, `nvarchar`, and `varbinary` provide equivalent types,
    respectively.


    For the remainder of this section on full-text indexing, the contents of the white
    paper “Optimizing Your Query Plans with the SQL Server 2014 Cardinality Estimator”
    by Joseph Sack have been inserted into the sample table using the script in Listing
    [9-1](#338675_4_En_9_Chapter.xhtml#PC1). The document will be used to demonstrate
    full-text indexing and can be found in Books Online or downloaded from [`http://bit.ly/1II5UfU`](http://bit.ly/1II5UfU)
    and placed in the directory `c:\temp`. Additionally, the full-text catalog feature
    needs to be installed to successfully run the code in this chapter. Full-text
    catalog is not a feature that is installed by default, so it may need to be installed
    first.


    Note


    For all versions of SQL Server, to build a full-text index on Microsoft Office
    documents, the Filter Pack IFilters must be installed. Download and install Microsoft
    Office Filter Packs from [`https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server`](https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server).
    Be sure to follow the additional steps to run `sp_fulltext_service` and restart
    the SQL Server instance.'
