    ## 统计列


    `sys.dm_db_column_store_row_group_physical_stats` 中的统计列提供了列存储索引的大量元数据，有助于理解其结构的构建方式。表
    **5-26** 中定义的统计信息为管理列存储索引提供了必要的洞察。例如，`total_rows` 和 `deleted_rows` 可用于确定行组中仍然有效的部分。在某些情况下，对行组进行激进的修改可能会在表中留下空行组。当行组小于
    `2²⁰` 行时，`state`、`trim_reason` 和 `transition_to_compressed` 信息可以帮助识别行组是如何被压缩的。例如，如果有大量由于
    `BULKLOAD` 而关闭的小行组，重建这些行组或修改加载过程以尝试在每次插入操作中插入更多行可能是有价值的。


    **表 5-26**


    `sys.dm_db_column_store_row_group_physical_stats` 中的统计列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `state` | `tinyint` | 与 `state_desc` 关联的 ID 号。 |

    | `state_desc` | `nvarchar(60)` | 行组状态的描述，可以是 `INVISIBLE`、`OPEN`、`CLOSED`、`COMPRESSED`
    或 `TOMBSTONE`。 |

    | `total_rows` | `bigint` | 行组中行的完整计数，包括任何被标记为删除的行。 |

    | `deleted_rows` | `bigint` | 行组中被标记为要删除的行数。 |

    | `size_in_bytes` | `bigint` | 行组的大小（字节）。 |

    | `trim_reason` | `tinyint` | 与 `trim_reason_desc` 关联的 ID 号。 |

    | `trim_reason_desc` | `nvarchar(60)` | 描述压缩行组行数少于一百万行最大值的原因，可以是 `NO_TRIM`、`BULKLOAD`、`ROERG`、`DICTIONARY
    SIZE`、`MEMORY LIMITATION`、`RESIDUAL ROW GROUP`、`STATS MISMATCH` 或 `SPILLOVER`。
    |

    | `transition_to_compressed_state` | `tinyint` | 与 `transition_to_compressed_state_desc`
    关联的 ID 号。 |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | 描述行组如何从增量存储转换为行组，包括
    `NOT APPLICABLE`、`INDEX BUILD`、`TUPLE MOVER`、`REORG NORMAL`、`REORG FORCED`、`BULKLOAD`
    或 `MERGE`。 |

    | `has_vertipaq_optimization` | `bit` | 布尔值，标识压缩过程中是否使用了 Vertipaq 优化。此功能大大提高了列存储压缩的效率。
    |

    | `generation` | `bigint` | 与此行组关联的行组代。 |

    | `created_time` | `datetime2` | 创建此行组时的时钟时间。 |

    | `closed_time` | `datetime2` | 关闭此行组时的时钟时间。 |


    ## 列存储操作统计信息


    列存储索引操作统计信息由 DMO `sys.dm_db_column_store_row_group_operational_stats` 提供。此 DMO
    也返回列存储索引中每个行组的一行。如果表已分区，则将返回每个分区的每个行组一行。


    ### 头列


    `sys.dm_db_column_store_row_group_operational_stats` 的头列类似于列存储物理统计 DMO 的头列。不同之处在于没有对增量存储的引用。此
    DMO 返回列 `object_id`、`index_id`、`partition_number` 和 `row_group_id`。这些列在表 **5-27**
    中定义。


    **表 5-27**


    `sys.dm_db_column_store_row_group_operational_stats` 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 定义索引的表或视图的 ID |

    | `index_id` | `int` | 索引的 ID |

    | `partition_number` | `int` | 索引或堆内的 1 基分区号 |

    | `row_group_id` | `bigint` | 行组的 ID |


    ### 统计列


    在表 **5-28** 中定义的列中，包含了关于行组扫描次数、删除位图被扫描次数以及列存储分区被扫描次数的详细信息。这些详细信息识别了与索引的其余部分相比，每个行组被访问的频率，以及删除位图被查询的频率，描绘了数据如何写入每个行组。


    此外，还可以测量对行组可访问性产生负面影响的锁和阻塞事务，从而深入了解何时存在需要解决的潜在 I/O 或事务瓶颈。


    **表 5-28**


    `sys.dm_db_column_store_row_group_operational_stats` 中的统计列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `scan_count` | `int` | 自上次 SQL 重启以来扫描行组的次数。 |

    | `delete_buffer_scan_count` | `int` | 使用删除缓冲区确定此行组中已删除行的次数。这包括访问内存中的哈希表和底层的 B
    树。 |

    | `index_scan_count` | `int` | 扫描列存储索引分区的次数。对于分区中的所有行组，此值相同。 |

    | `rowgroup_lock_count` | `bigint` | 自上次 SQL 重启以来，此行组锁请求的累计计数。 |

    | `rowgroup_lock_wait_count` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计次数。 |

    | `rowgroup_lock_wait_in_ms` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计毫秒数。 |


    ## 总结


    本章广泛介绍了 SQL Server 中与索引相关的统计信息。这些信息为深入了解 SQL Server 中索引这一广泛主题打开了一扇窗口。在接下来的章节中，将利用这些信息，通过查看已捕获的统计数据并使用它们来改进索引创建、使用和维护的各个方面。


    # 第 6 章 XML 索引


    过去几章重点介绍了对通常称为*结构化数据*的索引，其中数据及其存储具有通用的模式和组织。在本章和接下来的几章中，索引的重点将转向非结构化和半结构化数据。对于结构化和非结构化数据，索引的任务都是为了获得检索和操作数据的最佳效率，但表示这些类型的数据的数据类型在数据库中的存储方式存在差异。这些差异决定了索引的实现方式以及查询优化器如何使用索引。


    SQL Server 有一个专门的数据类型来存储最常见的非结构化和半结构化数据类型——XML。本章探讨 SQL Server 为优化 XML 数据提供的索引类型。本章还将展示这些索引对可针对
    XML 数据编写的查询类型的影响（使用 XQuery），以及对优化器所做选择的影响。


    ## XML 数据


    可扩展标记语言（XML）在 20 世纪 90 年代开发，并于 1998 年 2 月被万维网联盟采纳为标准。多年来，XML 数据一直存储在数据库中，但在 SQL
    Server 2005 之前，它没有专门的数据类型或访问方法。当引入时，XML 数据类型扩展了 SQL Server 的功能，以适当地管理这种不同的数据结构。随着
    XML 的接受，SQL Server 数据库中 XML 内容的使用和总量有所增长。这种增长是由 XML 为应用程序开发人员提供的优势所推动的。'
- fmt: '### Benefits


    The introduction of the `XML` data type allowed for the full capability of `XML`
    storage inside a `SQL Server` database. This included the ability to retrieve
    `XML` contents based on queries written against the `XML` itself. The strongest
    support that `XML` offers developers is that it is both text based and, nominally,
    self-documenting. Being text based means that `XML` is easily passed from one
    application to another, regardless of underlying operating system or programming
    language. The self-documenting nature of `XML` means that it is not necessary
    to have a structure defined in the same way as columns and tables are defined
    within a database. Instead, the elements and properties of the `XML` will describe
    what they are. `XML` is referred to as `semistructured` because there is generally
    a template defining an expected structure in order to help validate that any given
    set of `XML` is well-formed.


    Indexing `XML` can be beneficial when processing extensive `XML` using `SQL Server`.
    The largest benefit for `XML` indexes will be in situations where there are large
    amounts of `XML` stored but there is a need to only retrieve a small subset of
    that data. In these scenarios, `XML` indexes can ensure that a small portion of
    `XML` data can be read quickly, rather than needing to slowly scan a document
    in its entirety.


    ### Cautions


    Although the `XML` data type sounds like a perfect fit for every instance of `XML`,
    some considerations should be evaluated when designing a column in `SQL Server`
    that will be storing `XML`. One of the most critical is that `XML` content should
    be well-formed. This ensures that the `XML` data type and features provided to
    utilize the data most efficiently are used to their full advantage. `XML` columns
    are stored as binary large objects, more commonly known as `BLOB`s. This storage
    means that runtime querying of this content is resource-intensive and slow in
    most cases. With any task that involves data retrieval, efficiency of that retrieval
    will be of concern. In `SQL Server`, indexing is paramount to how efficient or
    inefficient this can be. A complete lack of indexing or too many indexes will
    affect any data manipulation task. The `XML` data type is no exception to this
    guidance. `XML` indexing is unique compared with the other indexing methods in
    `SQL Server`.


    # XML Indexes


    `XML` indexes fall into two main categories: primary/secondary and selective `XML`
    indexes. The main difference between these index types is how much of the `XML`
    data is included within the index. For primary/secondary indexes, all paths, nodes,
    and values are included in the index. This works well when it is unknown what
    portions of the `XML` will be most accessed. Alternatively, if only a limited
    portion of the `XML` will be accessed, then a selective `XML` index can provide
    better performance since the volume of data indexed is reduced. The next two sections
    will fully explore these categories of `XML` indexes.


    ## Primary/Secondary XML Indexes


    As the name implies, there are two types of indexes that fall under primary/secondary
    `XML` indexes: primary and secondary indexes. These two index types provide an
    indexing relationship within the `XML` documents similar to the relationship between
    clustered and non-clustered indexes. When implementing `XML` indexes, some basic
    rules apply to each:


    *   Only one primary `XML` index can exist on a column, though multiple primary
    `XML` indexes can exist on a table.

    *   Primary `XML` indexes cannot exist without a clustered index on the primary
    key of the table that the `XML` column is in. This clustered index is required
    for partitioning the table, and the `XML` index can use the same partitioning
    scheme and functioning.

    *   Primary `XML` indexes include all paths, tags, and values of the `XML` content.

    *   A secondary `XML` index cannot exist without a primary `XML` index.

    *   A secondary `XML` index extends the primary index including paths, values,
    and properties.


    To demonstrate primary/secondary `XML` indexes, the table `[Sales].[Store]` within
    the `AdventureWorks2017` database will be used. This table has an existing primary
    `XML` index on `[Demographics]` that will need to be dropped using the code in
    Listing 6-1.


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    ```


    Listing 6-1

    Drop the Existing Primary XML Index on [Sales].[Store]


    It is useful to first benchmark the cost to execute an example query against this
    table. In the query in Listing 6-2, `[Sales].[Store]` will be queried for the
    stores with annual sales equal to $1,500,000. For a query returning less than
    200 records, the cost is 12.751, shown in Figure 6-1, which is quite expensive.
    This is due to the `XML` Reader with `XPath` filter, which had to shred the entire
    `XML` document for all rows to find the requested records, which is a slow and
    resource-intensive process.


    ```

    A X M L query page. The records requested in the query, returns a set of data.
    Cached plan size is 32 kilobytes. The degree of parallelism is 1\. Estimated subtree
    cost is 12.751\. Estimated number of rows is 630.9.

    ```


    Figure 6-1

    XML query cost with no XML indexes


    ```sql

    USE AdventureWorks2017;

    GO

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    ```


    Listing 6-2

    Query on [Sales].[Store] for AnnualSales


    **Note**

    This chapter will use comparisons of estimated subtree cost vs. logical reads
    to demonstrate the value of `XML` indexes. While most analysis in this book focuses
    on reducing I/O through the use of indexes, parsing `XML` is generally a computationally
    expensive operation, hence a focus on query cost. Statistics time can also be
    used to roughly compare CPU measurements.


    This query approach is costly, yet efficient with a small amount of data in the
    table. However, in real life, tables can become quite large, surpassing the point
    where scanning through multiple `XML` documents is efficient. For example, imagine
    a point-of-sale system that stores receipt information in `XML` documents for
    each sale. With this amount of data volume, performance would begin to suffer
    quickly.'
