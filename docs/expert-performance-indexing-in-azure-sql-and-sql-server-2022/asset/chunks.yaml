  trans: '

    ## 维护计划摘要


    维护计划提供了一种可以立即开始着手消除索引碎片的方法。这些任务可以在几分钟内配置并安排好。自 SQL Server 2016 增强功能加入以来，它们已成为管理索引维护的绝佳选择。使用其他选项（例如
    T-SQL 脚本）的主要原因是在需要额外功能时，例如自定义日志记录或恢复操作的逻辑。


    ### T-SQL 脚本


    另一种对数据库进行碎片整理的方法是使用 T-SQL 脚本来智能地整理索引。本节将逐步介绍整理单个数据库中所有索引所需的步骤。此方法的主要优点在于能够将所有内容保持在一个精炼的流程中。该脚本将选择最能从碎片整理中受益的索引，确定是重建还是重新组织，并忽略那些收益很小或没有收益的索引。此外，它允许根据业务规则或其他超出维护计划范围的逻辑来自定义维护操作。


    为了实现筛选，将应用一些碎片整理最佳实践，以帮助确定是否应对索引进行碎片整理以及应采用何种方法。将使用的指导原则如下：


    *   对碎片率低于 30% 的索引进行重新组织。

    *   对碎片率达到或超过 30% 的索引进行重建。

    *   忽略页数少于 1,000 的索引。

    *   如果使用企业版，并且在维护期间需要访问数据，请使用在线重建。

    *   如果正在重建聚集索引，请重建表中的所有索引。


    **注意** 索引存在碎片并不意味着总是需要对其进行碎片整理。对于小表的索引，进行碎片整理的收益不大。例如，页数少于 8 页的索引将放入一个区中，因此从减少
    I/O 的角度来看，对此类索引进行碎片整理没有好处。一些 Microsoft 文档和 SQL Server 专家建议不要对页数少于 1,000 的表进行碎片整理。该值是否适合您的数据库取决于您的具体情况，但它可以作为制定索引维护策略的起点。


    碎片整理脚本将执行几个步骤来智能地整理索引：


    1.  收集碎片数据。

    2.  确定要整理的索引。

    3.  构建碎片整理语句。


    在开始碎片整理步骤之前，需要一个索引维护脚本的模板。如清单 11-27 所示，该模板声明了多个变量，并使用 `CURSOR` 循环遍历每个索引并执行必要的索引维护。变量在
    `DECLARE` 语句中设置，阈值在本节开头定义。模板中还有一个 `table` 变量，用于存储数据库中碎片状态的中间结果。


    ```sql

    DECLARE @MaxFragmentation TINYINT=30

    ,@MinimumPages SMALLINT=1000

    ,@SQL nvarchar(max)

    ,@ObjectName NVARCHAR(300)

    ,@IndexName NVARCHAR(300)

    ,@CurrentFragmentation DECIMAL(9, 6)

    DECLARE @FragmentationState TABLE

    (

    SchemaName SYSNAME

    ,TableName SYSNAME

    ,object_id INT

    ,IndexName SYSNAME

    ,index_id INT

    ,page_count BIGINT

    ,avg_fragmentation_in_percent FLOAT

    ,avg_page_space_used_in_percent FLOAT

    ,type_desc VARCHAR(255)

    )

    INSERT INTO @FragmentationState


    DECLARE INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR


    OPEN INDEX_CURSE

    WHILE 1=1

    BEGIN

    FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName

    ,@CurrentFragmentation

    IF @@FETCH_STATUS  0

    BREAK


    EXEC sp_ExecuteSQL @SQL

    END

    CLOSE INDEX_CURSE

    DEALLOCATE INDEX_CURSE

    ```


    清单 11-27 索引碎片整理脚本模板


    首先，需要收集有关索引的碎片数据并填充到 `table` 变量中。在清单 11-28 的脚本中，使用了 DMF `sys.dm_db_index_physical_stats`
    并指定了 `SAMPLED` 选项。使用此选项是为了最小化执行 DMF 对数据库的影响。结果中包含架构、表和索引名称以标识正在报告的索引，以及 `object_id`
    和 `index_id`。来自 DMF 的关于索引碎片的统计列包含在 `page_count`、`avg_fragmentation_in_percent`
    和 `avg_page_space_used_in_percent` 列中。结果中的最后一列是 `has_LOB_column`。此列是关联子查询的结果，用于确定索引中的任何列是否为
    LOB 类型，LOB 类型不允许在线索引重建。


    ```sql

    SELECT

    s.name as SchemaName

    ,t.name as TableName

    ,t.object_id

    ,we.name as IndexName

    ,we.index_id

    ,x.page_count

    ,x.avg_fragmentation_in_percent

    ,x.avg_page_space_used_in_percent

    ,we.type_desc

    FROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, ''SAMPLED'') x

    INNER JOIN sys.tables t ON x.object_id = t.object_id

    INNER JOIN sys.schemas s ON t.schema_id = s.schema_id

    INNER JOIN sys.indexes we ON x.object_id = we.object_id AND x.index_id = we.index_id

    WHERE x.index_id > 0

    AND x.avg_fragmentation_in_percent > 0

    AND alloc_unit_type_desc = ''IN_ROW_DATA''

    ```


    清单 11-28 收集碎片数据的脚本


    清单 11-28 中查询的结果会因每个读者而异。通常，结果应类似于图 11-24 中的结果，其中包含了 `AdventureWorks2017` 数据库中的聚集索引、非聚集索引和
    XML 索引。


    ![](img/338675_4_En_11_Fig24_HTML.png)


    一个包含 9 列 5 行的表。列标题为：架构名、表名、对象 i d、索引名、索引 id、页数、平均碎片百分比、平均页面空间使用百分比、类型降序。它包括聚集和非聚集索引。


    图 11-24 表碎片数据查询结果


    碎片整理脚本的下一步是构建需要整理的索引列表。通过清单 11-29 创建的索引列表用于填充游标。然后游标循环遍历每个索引以执行碎片整理。脚本中一个值得注意的点是，对于聚集索引，将重建所有底层索引。这不是碎片整理索引时的必需操作，但应考虑此选项。当表上只有少数索引时，这可能是一种值得采用的管理方式。随着索引数量的增加，这种方法可能变得不那么有吸引力。此查询的结果应类似于图
    11-25 中的结果。


    ![](img/338675_4_En_11_Fig25_HTML.png)


    一个包含三列的表。表头为：无列名、无列名、平均碎片百分比。人力资源员工薪资历史记录被高亮显示。


    图 11-25 用于重建/重新组织操作的索引


    ```sql

    SELECT  QUOTENAME(x.SchemaName)+''.''+QUOTENAME(x.TableName)

    ,CASE WHEN x.type_desc = ''CLUSTERED'' THEN ''ALL''

    ELSE QUOTENAME(x.IndexName) END

    ,x.avg_fragmentation_in_percent

    FROM    @FragmentationState x

    LEFT OUTER JOIN @FragmentationState y ON x.object_id = y.object_id AND y.index_id
    = 1

    WHERE   (

    x.type_desc = ''CLUSTERED''

    AND y.type_desc = ''CLUSTERED''

    )

    OR y.index_id IS NULL

    ORDER BY x.object_id

    ,x.index_id

    ```


    清单 11-29 用于识别碎片化索引的脚本

