  trans: '### 误区 7：填充因子会在插入数据时应用于索引


    当为索引设置填充因子时，它会在索引被创建、重建或重组时应用。不幸的是，关于这个误区，常有人误以为填充因子会在记录插入表时生效。本节将探讨并证实这种观点是不正确的。


    为了拆解这个误区，我们将直接检验其前提。该误区认为，如果在向表中添加行时指定了填充因子，那么插入操作过程中就会使用该填充因子。为了破除这部分误解，请执行清单
    10-17 中的代码。在此脚本中，创建了一个名为 `dbo.MythSeven` 的表，其聚集索引的填充因子设为 50%。这意味着索引中每个数据页应留出 50%
    的空闲空间。表创建后，会向其中插入记录。最后，使用 `sys.dm_db_index_physical_stats` DMV 检查每个数据页的平均可用空间。查看脚本的结果，如图
    10-14 所示，索引实际使用了每个数据页 95% 的空间，而非创建聚集索引时指定的 50%。


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythSeven'') IS NOT NULL

    DROP TABLE dbo.MythSeven;

    GO

    CREATE TABLE dbo.MythSeven

    (

    RowID int NOT NULL

    ,Column1 varchar(500)

    );

    GO

    ALTER TABLE dbo.MythSeven ADD CONSTRAINT

    PK_MythSeven PRIMARY KEY CLUSTERED (RowID) WITH(FILLFACTOR = 50);

    GO

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythSeven

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, REPLICATE(''X'', 500)

    FROM L6;

    GO

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0;

    ```

    清单 10-17：创建并填充 MythSeven 表


    ![](img/338675_4_En_10_Fig14_HTML.png)

    图 10-14：插入数据时的填充因子误区


    有时，当这个误区被澄清后，人们的观念又会走向另一个极端，认为填充因子是损坏的或不起作用的。这同样不正确。填充因子并非在数据修改期间应用于索引。它是在索引被创建、重建或重组时应用的。为了证明这一点，可以使用清单
    10-18 中包含的脚本来重建 `dbo.MythSeven` 上的聚集索引。


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX PK_MythSeven ON dbo.MythSeven REBUILD

    SELECT object_id, index_id, avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.MythSeven''),NULL,NULL,''DETAILED'')

    WHERE index_level = 0

    ```

    清单 10-18：重建 MythSeven 表上的聚集索引


    重建聚集索引后，索引将具有指定的填充因子，或至少接近指定的值，如图 10-15 所示。重建后，表上的平均空间使用率从 95% 变为了 51%。这一变化与为索引指定的填充因子是一致的。


    ![](img/338675_4_En_10_Fig15_HTML.png)

    图 10-15：索引重建后的填充因子误区


    关于填充因子，围绕这一索引属性存在许多误区。理解填充因子的关键在于记住它何时以及如何被应用。它不是在索引使用过程中强制实施的属性。相反，它是一个在索引创建或重建时，用于安排索引内数据分布的属性。'
- fmt: '## Myth 8: Deleting from Heaps Results in Unrecoverable Space


    Heaps are an interesting structure in SQL Server. In Chapter 2, they were briefly
    reviewed as being less of an index and more a collection of pages for storing
    data. One of the index maintenance tasks that will be a part of the next chapter
    is recovering space from heap tables. As will be more deeply discussed in that
    chapter, when rows are deleted from a heap, the pages associated with those rows
    are not removed. This is generally referred to as `bloat` within the heap.


    An interesting side effect of the concept of heap bloat is the myth that bloat
    never gets reused. The space stays in the heap and is not recoverable until the
    heap is rebuilt. Fortunately, for both heaps and database administrators, this
    is not the case. When data is removed from a heap, the space that the data previously
    held is made available for future inserts into the table.


    To demonstrate how this works, a table will be built using the code in Listing
    10-19. This demonstration creates a heap named `MythEight` and inserts 400 records,
    which results in 100 pages of data. This page count can be validated with the
    `page_count` column in the first result set in Figure 10-16. The next part of
    the script deletes every other row that was inserted into the heap. Generally,
    this should leave each page with half as many rows as it had previously, shown
    in the second result set in Figure 10-16. The last part of the script inserts
    200 rows into the `MythEight` table, returning the row count to 400 records and
    reusing the previously used pages that had data removed from them. There is a
    slight growth in the page count from the last result set in Figure 10-16, but
    most of the new rows fit into the space already allocated.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig16_HTML.jpg)


    3 tables of 5 columns labeled no column name, index type description, page count,
    record count, and forwarded record count and 1 row labeled 1. The 3 have the same
    Myth Eight, which are highlighted, HEAP, and 0 entries under the first, second,
    and fifth rows but differ in entries under the third and the fourth.


    Figure 10-16 Heap reuse query results


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythEight'') IS NOT NULL

    DROP TABLE dbo.MythEight;

    CREATE TABLE dbo.MythEight

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    DELETE FROM dbo.MythEight

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 200 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    ```

    Listing 10-19 Reusing Allocated Space from the `MythEight` Heap


    As the demonstration for this myth shows, space in a heap that previously held
    data is released for use by the table. For heaps that have large amounts of data
    being written to the table, there is not a significant need to monitor for page
    reuse, and the myth can be considered inaccurate. With heaps that have a lot of
    data deleted without the intention to replace it, then the space may be recovered
    with `ALTER TABLE ... REBUILD`. The syntax and impact of this statement are discussed
    in the next chapter.


    ## Myth 9: Every Table Should Have a Heap/Clustered Index


    The last myth to consider is twofold. On the one hand, some people will recommend
    that all tables should be built as heaps. On the other hand, others will recommend
    creating clustered indexes on all tables. The trouble is that this viewpoint will
    exclude considering the benefits that each of the structures can offer on a table.
    The viewpoint makes a religious-styled argument for or against ways to store data
    in databases without any consideration for the actual data that is being stored
    and how it will be used.


    Some of the arguments against the use of clustered indexes are as follows:


    *   Fragmentation negatively impacts performance through additional I/O.

    *   The modification of a single record can impact multiple records in the clustered
    index when a page split is triggered.

    *   Excessive key lookups will negatively impact performance through additional
    I/O.


    Naturally, there are common arguments against using heaps:


    *   Excessive forwarded records negatively impact performance through additional
    I/O.

    *   Removing forwarded records requires a rebuild of the entire table.

    *   Non-clustered indexes are required for efficient filtered data access.

    *   Heaps don’t automatically release pages when data is removed.


    The negative impacts associated with either clustered indexes or heaps aren’t
    the only things to consider when deciding between one and the other. Each has
    circumstances where one will outperform the other.


    For instance, clustered indexes perform best in the following circumstances:


    *   The table has a unique, ever-increasing key column.

    *   Ranges of data in a table will be accessed via queries.

    *   Records in the table will be inserted and deleted at a high rate.


    On the other hand, heaps are ideal for some of the following situations:


    *   Data in the table will be used only for a limited amount of time where index
    creation time exceeds query time on the data.

    *   Key values will change frequently, which in turn would change the position
    of the record in an index.

    *   Copious numbers of records are being inserted into a staging table.

    *   The primary key is a non-ascending value, such as a unique identifier.


    Although this section doesn’t include a demonstration of why this myth is false,
    it is important to remember that both heaps and clustered indexes are available
    and should be used appropriately. Knowing which type of index to choose is a matter
    of testing, not a matter of doctrine.


    A good resource to consider for those in the “cluster everything camp” is the
    Fast Track Data Warehouse Architecture white paper (`https://msdn.microsoft.com/en-us/library/hh918452.aspx`).
    The white paper addresses some significant performance improvements that can be
    found with heaps and also the point at which these improvements dissipate. The
    white paper helps show how changes in I/O system technologies, with flash and
    cache-based devices, can change patterns and practices regarding heaps and clustered
    indexes. This helps promote the idea of validating myths and best practices from
    time to time. Note that the preceding article was written for SQL Server 2012
    and highlights how best practices evolve over time.'
  raw: '### Myth 8: Deleting from Heaps Results in Unrecoverable Space


    Heaps are an interesting structure in SQL Server. In Chapter [2](#338675_4_En_2_Chapter.xhtml),
    they were briefly reviewed as being less of an index and more a collection of
    pages for storing data. One of the index maintenance tasks that will be a part
    of the next chapter is recovering space from heap tables. As will be more deeply
    discussed in that chapter, when rows are deleted from a heap, the pages associated
    with those rows are not removed. This is generally referred to as *bloat* within
    the heap.


    An interesting side effect of the concept of heap bloat is the myth that bloat
    never gets reused. The space stays in the heap and is not recoverable until the
    heap is rebuilt. Fortunately, for both heaps and database administrators, this
    is not the case. When data is removed from a heap, the space that the data previously
    held is made available for future inserts into the table.


    To demonstrate how this works, a table will be built using the code in Listing
    [10-19](#338675_4_En_10_Chapter.xhtml#PC19). This demonstration creates a heap
    named `MythEight` and inserts 400 records, which results in 100 pages of data.
    This page count can be validated with the `page_count` column in the first result
    set in Figure [10-16](#338675_4_En_10_Chapter.xhtml#Fig16). The next part of the
    script deletes every other row that was inserted into the heap. Generally, this
    should leave each page with half as many rows as it had previously, shown in the
    second result set in Figure [10-16](#338675_4_En_10_Chapter.xhtml#Fig16). The
    last part of the script inserts 200 rows into the `MythEight` table, returning
    the row count to 400 records and reusing the previously used pages that had data
    removed from them. There is a slight growth in the page count from the last result
    set in Figure [10-16](#338675_4_En_10_Chapter.xhtml#Fig16), but most of the new
    rows fit into the space already allocated.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig16_HTML.jpg)


    3 tables of 5 columns labeled no column name, index type description, page count,
    record count, and forwarded record count and 1 row labeled 1\. The 3 have the
    same Myth Eight, which are highlighted, HEAP, and 0 entries under the first, second,
    and fifth rows but differ in entries under the third and the fourth.


    Figure 10-16


    Heap reuse query results


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythEight'') IS NOT NULL

    DROP TABLE dbo.MythEight;

    CREATE TABLE dbo.MythEight

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    DELETE FROM dbo.MythEight

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 200 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    Listing 10-19

    Reusing Allocated Space from the MythEight Heap

    ```


    As the demonstration for this myth shows, space in a heap that previously held
    data is released for use by the table. For heaps that have large amounts of data
    being written to the table, there is not a significant need to monitor for page
    reuse, and the myth can be considered inaccurate. With heaps that have a lot of
    data deleted without the intention to replace it, then the space may be recovered
    with `ALTER TABLE ... REBUILD`. The syntax and impact of this statement are discussed
    in the next chapter.


