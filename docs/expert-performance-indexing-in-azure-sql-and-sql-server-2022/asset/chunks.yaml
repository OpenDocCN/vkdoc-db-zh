    | `last_user_seek` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户查找的日期和时间。 |

    | `last_user_scan` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户扫描的日期和时间。 |

    | `avg_total_user_cost` | `float` | 该组中索引可以降低的用户查询的平均成本。 |

    | `avg_user_impact` | `float` | 如果实施了此缺失索引组，用户查询可能获得的平均百分比收益。 |

    | `system_seeks` | `bigint` | 如果缺失索引已构建，系统查询中将发生的查找操作计数。 |

    | `system_scans` | `bigint` | 如果缺失索引已构建，系统查询中将发生的扫描操作计数。 |

    | `last_system_seek` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统查找的日期和时间。 |

    | `last_system_scan` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统扫描的日期和时间。 |

    | `avg_total_system_cost` | `float` | 该组中索引可以降低的系统查询的平均成本。 |

    | `avg_system_impact` | `float` | 如果实施了此缺失索引组，系统查询可能获得的平均百分比收益。 |

    '
- fmt: '### Using the DMOs


    Now that the missing index DMOs have been explained, it is time to look at how
    they can be used together to provide missing index suggestions. The results of
    the missing index DMOs have been referred to as suggestions instead of recommendations.
    This variation in wording is not only intentional but critically important. Typically,
    when someone receives an index recommendation from a colleague, it is fully thought
    through and ready to be implemented. This is not so with the missing index DMOs;
    thus, they are referred to as suggestions.


    The suggestions from the missing index DMOs provide a starting point to begin
    looking at and building new indexes. There are two things that are important to
    consider when looking at missing index suggestions. First, variations of each
    missing index suggestion may appear multiple times in the results. It is not recommended
    that each of these variations be implemented. Common patterns within the suggestions
    should be found. An index that covers a few of the suggestions is usually ideal.
    Second, when more than one column is suggested, the order of the columns needs
    to be tested to determine which is optimal.


    To help explain how the missing index DMOs work and are related to one another,
    an example will be provided that includes a few SQL statements. These statements,
    shown in Listing [12-1](#338675_4_En_12_Chapter.xhtml#PC1), execute queries against
    the `SalesOrderHeader` table in the `AdventureWorks2017` database. For each of
    the queries, the filtering is on either the `DueDate` or `OrderDate` column or
    both.


    ```sql

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE DueDate = ''2014-07-01 00:00:00.000''

    AND OrderDate = ''2014-06-19 00:00:00.000''

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT DueDate, OrderDate FROM Sales.SalesOrderHeader

    WHERE DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    ```


    Listing 12-1

    SQL Statements to Generate Missing Index Suggestions


    Examining the execution plan for any of the example queries reveals that they
    each use a clustered index scan to satisfy the query. Figure [12-1](#338675_4_En_12_Chapter.xhtml#Fig1)
    shows the execution plan for the first query. In this execution plan, there is
    an index scan across the table’s clustered index and a missing index suggestion
    that may help eliminate the index scan.


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig1_HTML.png)


    Figure 12-1

    Execution plan for the first query from Listing [12-1](#338675_4_En_12_Chapter.xhtml#PC1)


    To see more details on this missing index suggestion, it can be double-clicked
    to generate the index creation statement. While helpful, this does not provide
    the details behind the suggestion. Those details allow for a better understanding
    of why this index suggestion was provided and the detailed metrics that describe
    its potential impact. For this detail, it is necessary to look at the missing
    index DMOs. A query against the missing index DMOs will look similar to Listing
    [12-2](#338675_4_En_12_Chapter.xhtml#PC2). The query includes the equality, inequality,
    and included column information that was described earlier. It also includes two
    calculations not previously described: `Impact` and `Score`.


    The `Impact` calculation helps identify missing index suggestions that will have
    the highest overall impact across multiple query executions. This is calculated
    by adding the potential seeks and scans on the missing index based on the average
    impact; the resulting value represents the total improvement across all queries
    that might have used the index. The higher the value, the more improvement the
    index could provide.


    The `Score` calculation also helps identify missing index suggestions that will
    improve query performance. The difference between `Impact` and `Score` is the
    inclusion of the average total user cost. For the `Score` calculation, the average
    total user cost is multiplied by the `Impact` score and divided by 100\. The inclusion
    of the cost value helps differentiate between expensive and inexpensive queries
    when deciding whether to consider the missing index. For instance, a missing index
    suggestion that provides an 80 percent improvement on queries with an average
    cost value of 1,000 would likely provide a better return than a 90 percent improvement
    for a query with an average cost value of 1.


    When reviewing an index suggestion, always consider both the frequency of the
    query that the index is addressing and its query cost. If a query runs once a
    month and can be improved by 100,000`×`, is it worth it? Similarly, if a query
    runs once a second and can be improved by 10 percent, is it worth it? An understanding
    of these queries’ associated workloads is helpful in determining the answer to
    that question.


    ```sql

    SELECT

    DB_NAME(database_id) AS database_name

    ,OBJECT_NAME(object_id, database_id) AS table_name

    ,mid.equality_columns

    ,mid.inequality_columns

    ,mid.included_columns

    ,(migs.user_seeks + migs.user_scans) * migs.avg_user_impact AS Impact

    ,migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) AS Score

    ,migs.user_seeks

    ,migs.user_scans

    FROM sys.dm_db_missing_index_details mid

    INNER JOIN sys.dm_db_missing_index_groups mig ON mid.index_handle = mig.index_handle

    INNER JOIN sys.dm_db_missing_index_group_stats migs ON mig.index_group_handle
    = migs.group_handle

    WHERE DB_NAME(database_id) = ''AdventureWorks2017''

    ORDER BY migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) DESC

    ```


    Listing 12-2

    Query for Missing Index DMOs


    Figure [12-2](#338675_4_En_12_Chapter.xhtml#Fig2) shows some results from executing
    this query.


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig2_HTML.png)


    Figure 12-2

    Results from the missing index query


    With the results from the missing index query, shown in Figure [12-2](#338675_4_En_12_Chapter.xhtml#Fig2),
    there are a few items to consider from these suggestions. First, there are quite
    a few similarities between the suggestions. The predicate columns between each
    of the suggestions include the `OrderDate` and `DueDate`, except for one missing
    index. Since the column order has not been tested, the optimal column order is
    not clear. To satisfy the missing index suggestion, one possible index could have
    the key column `DueDate` followed by `OrderDate`. This configuration would create
    an index that would satisfy all four of the missing index items.'
