  trans: '

    ### 索引分配映射页


    目前为止讨论的大多数页面，都提供了关于它们所覆盖页面上是否存在数据的信息。除了了解一个页面是否开放可用之外，SQL Server 还需要知道页面上的信息是否与特定的表或索引关联。提供此信息的页面就是索引分配映射（IAM）页。


    每个表或索引都首先从一个 IAM 页开始。此页指示在一个 GAM 间隔内，哪些区与该表或索引相关联。如果一个表或索引跨越多个 GAM 间隔，则该表或索引将有多个
    IAM 页。


    一个 IAM 页将一个表或索引与四种类型的页面关联起来。这些类型是数据页、索引页、大型对象页和小大型对象页。IAM 页上使用一个位图行将页面与表或索引关联。


    IAM 页上还定位有一个 IAM 头行。IAM 头提供了一个表或索引的 IAM 页序列号、该 IAM 页所关联的 GAM 间隔的起始页面，以及一个单页分配数组。当分配给一个表或索引的空间少于一个完整区时，会使用这个数组。


    IAM 页提供了一个映射，通过它，一个表或索引的所有页面汇集在一起。当需要定位一个表或索引的所有区时，就会使用此页。


    ### 数据页


    数据页是任何数据库中最普遍的页面类型，用于存储数据库表中的数据。除 LOB 数据类型外，一条记录的所有数据都位于数据页上。LOB 数据类型存储在大型对象页上，这将在本节稍后讨论。


    ### 索引页


    与数据页类似的是索引页。这些页面提供有关索引结构以及数据页位置的信息。对于聚集索引，索引页构建了一个页面层次结构，用于导航聚集索引的二叉树结构。对于非聚集索引，索引页执行相同的功能，但也用于存储构成索引的键值。


    为了构建索引内的页面层次结构，索引页中包含的数据提供了键值和页面地址的映射。键值是子表中第一个排序行所包含的索引键值，而页面地址则标识了此数据的所在位置。


    索引页的构造与其他页面类型相似，它们都有一个页面头部，包含所有标准信息，如页面类型、分配单元、分区 ID 和分配状态。行偏移数组包含指向索引数据行在页面上位置的指针。索引数据行包含两部分信息：键值和一个页面地址。


    索引页提供了索引中所有数据页如何链接在一起的映射，因此在理解 SQL Server 中的数据存储方面扮演着至关重要的角色。


    ### 大型对象页


    单个页面上数据的限制是 8 KB。然而，某些数据类型的大小可能高达 2 GB。因此，对于这些数据类型，需要另一种存储机制来存储它们：大型对象页类型。


    可以利用 LOB 页的数据类型包括 `text`、`ntext`、`image`、`nvarchar(max)`、`varchar(max)`、`varbinary(max)`
    和 `xml`。当这些数据类型之一的数据存储在数据页上时，如果行的大小超过 8 KB，将使用 LOB 页。在这些情况下，列将包含对数据所需 LOB 页的引用，并将数据存储在
    LOB 页上（参见图 2-6）。


    ![](img/338675_4_En_2_Fig6_HTML.png)


    一个图表，显示了两个标有“数据页”和“L OB 页”的折角文件图标，位于头部部分。前者的唯一记录在第 1 行中标有“L O B ref”，链接到后者的唯一记录“L
    O B row”。


    图 2-6


    数据页链接到 LOB 页


    注意


    SQL Server 2022 包含了“系统页闩锁并发增强功能”，该功能允许 GAM 和 SGAM 并发更新，这将大大减少在工作负载对 GAM 或 SGAM
    页产生大量更新时出现的争用情况。


    ### 组织页面


    至此，已经回顾了构成索引内部结构的底层组件。虽然构成索引内部结构的底层结构很重要，但它们的上下文只有在应用于数据库内数据的组织和存储时才有意义。


    SQL Server 中的组织结构是


    *   堆


    *   B 树


    *   列存储


    这些结构映射到本章稍后将讨论的特定索引类型。在本节中，将考察组织页面的方式，以便建立这种理解。


    注意


    在组织索引的结构中，包含索引页的索引级别被视为 `非叶` 级别。当引用包含数据页的级别时，这些级别称为 `叶级`。


    ### 堆结构


    组织页面的默认结构称为 `堆`。当不使用 B 树结构（下一节讨论）来组织表中的数据页时，就会形成堆。从概念上讲，可以想象堆是一堆无特定顺序的数据页，如图 2-7
    所示。在这个例子中，检索所有“Madison”记录的唯一方法是检查每个页面，查看“Madison”是否在页面上。


    ![](img/338675_4_En_2_Fig7_HTML.jpg)


    一个图表，显示了一叠六个折角文件图标。每个图标的标题都有一个不同的带引号的名称。标注的名称是 Sarah、Nikolai、Dysin、Aspen 和 Madison。


    图 2-7


    堆叠示例


    然而，从内部结构来看，堆不仅仅是页面的堆砌。虽然未排序，但堆有一些关键组件来组织页面以便轻松访问。所有堆都从一个 IAM 页开始，如图 2-8 所示。IAM
    页映射出在一个 GAM 间隔内，哪些区和单页分配与一个索引相关联。对于堆，IAM 页是将数据页和区与堆关联起来的唯一机制。堆结构不对与堆关联的页面强加任何排序。堆中第一个可用的页面是在数据库文件中找到的该堆的第一个页面。


    ![](img/338675_4_En_2_Fig8_HTML.jpg)


    一个分支图，显示了一个标有 I A M 的折角文件图标下有三个标有 Madison、Dysin 和 Nikolai 的折角文件图标，该图标连接到另一个标有
    I A M 的折角文件图标，其分支为三个标有 Sarah、Aspen 和 Tasha 的折角文件图标。


    图 2-8


    堆结构


    IAM 页列出了与堆关联的所有数据页。堆的数据页存储表的行，根据需要使用 LOB 页。当 IAM 页在其 GAM 间隔内没有更多页面可供分配时，会为堆分配一个新的
    IAM 页，并将下一组页面及其相应的行添加到堆中，如图 2-1 所示。在此图中，堆结构是扁平的。从 IAM 页到结构的数据页，始终只有一层。


    虽然堆提供了一种组织页面的机制，但它与索引类型无关。当表没有聚集索引时，会使用堆结构。当堆存储表中的行时，行的插入没有强制顺序。因此，堆不保证行将以任何特定顺序返回，代码也不应假设任何顺序，即使是任意顺序。

    '
- fmt: '### B-Tree Structure


    The second available structure that can be used for indexing is the `B-tree`.
    The B-tree is often referred to as a balanced or binary tree, though its creators
    never formally provided an authoritative meaning for the “B” in B-tree. This is
    the most commonly used structure for organizing indexes in SQL Server and is used
    by both clustered and non-clustered indexes.


    In a B-tree, pages are organized in a hierarchical tree structure, as shown in
    Figure [2-9](#338675_4_En_2_Chapter.xhtml#Fig9). Within the structure, pages are
    sorted to optimize searches for information within the structure. Along with the
    sorting, relationships between pages are maintained to allow sequential access
    to pages across the levels of an index.


    Similar to heaps, B-trees start with an IAM page that identifies where the first
    page of the B-tree is located within the GAM interval. The first page of the B-tree
    is an index page and is often referred to as the `root level` of the index. As
    an index page, the root level contains key values and page addresses for the next
    pages in the index. Depending on the size of the index, the next level of the
    index may be data pages or additional index pages.


    If the number of index rows required to sort all the rows on the data pages exceeds
    the space available, then the root page will be followed by another level of index
    pages. Additional levels of index pages in a B-tree are referred to as `intermediate
    levels`. Most indexes built with a B-tree structure will not require more than
    one or two intermediate levels. Even with a wide indexing key, millions to billions
    of rows can be sorted with just a few levels.


    The next level of pages below the root and intermediate levels of the indexes,
    referred to as the `nonleaf levels`, is the `leaf level` (see Figure [2-9](#338675_4_En_2_Chapter.xhtml#Fig9)).
    The leaf level contains all data pages for an index. The data pages are where
    the key values and the non-key values for the row are stored. Non-key values are
    not stored on the index pages.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig9_HTML.jpg)


    A branching diagram of the multiple offspring of the I A M page from a dog-eared
    icon labeled 1 to 4000 as the root and the resulting interconnected networks as
    the intermediates in the non-leaf levels. The farthest offspring in the leaf level
    also exhibit interconnections.


    Figure 2-9


    B-tree structure


    Another differentiator between heaps and B-trees is the ability within the index
    levels to perform sequential page reads. Pages contain links to the previous and
    next pages within their page header. With index and data pages, these properties
    are populated and can be used to traverse the B-tree to find the next requested
    row from the B-tree without returning to the root level of the index and traversing
    the B-tree repeatedly. To illustrate this, consider a situation where rows are
    requested with key values between 925 and 3,025 from the index shown in Figure
    [2-9](#338675_4_En_2_Chapter.xhtml#Fig9). Through a B-tree, this operation can
    be done by traversing the B-tree down to key value 925, shown in Figure [2-10](#338675_4_En_2_Chapter.xhtml#Fig10).
    After that, all rows through key value 3,025 can be retrieved by accessing the
    pages after the first page in order, finishing the operation when the last key
    value is encountered.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig10_HTML.jpg)


    A branching diagram of the interconnected offspring of the I A M page in the non-leaf
    and leaf levels. Bold arrows create a path from 1 to 4000, 1 to 1000, 901 to 1000,
    901 to 950, and 951 to 1000.


    Figure 2-10


    B-tree sequential read


    One option available for tables and indexes is the ability to partition these
    structures. Partitioning changes the physical implementation of the index and
    how the index and data pages are organized. From the perspective of the B-tree
    structure, each partition of an index has its own B-tree. If a table is partitioned
    into three different partitions, there will then be three B-tree structures for
    the index.'
  raw: '### B-Tree Structure


    The second available structure that can be used for indexing is the *B-tree*.
    The B-tree is often referred to as a balanced or binary tree, though its creators
    never formally provided an authoritative meaning for the “B” in B-tree. This is
    the most commonly used structure for organizing indexes in SQL Server and is used
    by both clustered and non-clustered indexes.


    In a B-tree, pages are organized in a hierarchical tree structure, as shown in
    Figure [2-9](#338675_4_En_2_Chapter.xhtml#Fig9). Within the structure, pages are
    sorted to optimize searches for information within the structure. Along with the
    sorting, relationships between pages are maintained to allow sequential access
    to pages across the levels of an index.


    Similar to heaps, B-trees start with an IAM page that identifies where the first
    page of the B-tree is located within the GAM interval. The first page of the B-tree
    is an index page and is often referred to as the *root level* of the index. As
    an index page, the root level contains key values and page addresses for the next
    pages in the index. Depending on the size of the index, the next level of the
    index may be data pages or additional index pages.


    If the number of index rows required to sort all the rows on the data pages exceeds
    the space available, then the root page will be followed by another level of index
    pages. Additional levels of index pages in a B-tree are referred to as *intermediate
    levels*. Most indexes built with a B-tree structure will not require more than
    one or two intermediate levels. Even with a wide indexing key, millions to billions
    of rows can be sorted with just a few levels.


    The next level of pages below the root and intermediate levels of the indexes,
    referred to as the *nonleaf levels*, is the *leaf level* (see Figure [2-9](#338675_4_En_2_Chapter.xhtml#Fig9)).
    The leaf level contains all data pages for an index. The data pages are where
    the key values and the non-key values for the row are stored. Non-key values are
    not stored on the index pages.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig9_HTML.jpg)


    A branching diagram of the multiple offspring of the I A M page from a dog-eared
    icon labeled 1 to 4000 as the root and the resulting interconnected networks as
    the intermediates in the non-leaf levels. The farthest offspring in the leaf level
    also exhibit interconnections.


    Figure 2-9


    B-tree structure


    Another differentiator between heaps and B-trees is the ability within the index
    levels to perform sequential page reads. Pages contain links to the previous and
    next pages within their page header. With index and data pages, these properties
    are populated and can be used to traverse the B-tree to find the next requested
    row from the B-tree without returning to the root level of the index and traversing
    the B-tree repeatedly. To illustrate this, consider a situation where rows are
    requested with key values between 925 and 3,025 from the index shown in Figure
    [2-9](#338675_4_En_2_Chapter.xhtml#Fig9). Through a B-tree, this operation can
    be done by traversing the B-tree down to key value 925, shown in Figure [2-10](#338675_4_En_2_Chapter.xhtml#Fig10).
    After that, all rows through key value 3,025 can be retrieved by accessing the
    pages after the first page in order, finishing the operation when the last key
    value is encountered.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig10_HTML.jpg)


    A branching diagram of the interconnected offspring of the I A M page in the non-leaf
    and leaf levels. Bold arrows create a path from 1 to 4000, 1 to 1000, 901 to 1000,
    901 to 950, and 951 to 1000.


    Figure 2-10


    B-tree sequential read


    One option available for tables and indexes is the ability to partition these
    structures. Partitioning changes the physical implementation of the index and
    how the index and data pages are organized. From the perspective of the B-tree
    structure, each partition of an index has its own B-tree. If a table is partitioned
    into three different partitions, there will then be three B-tree structures for
    the index.'
  trans: '### B 树结构


    可用于索引的第二种可用结构是 `B 树`。B 树常被称为平衡树或二叉树，但其创建者从未为 B 树中的“B”提供正式的权威定义。这是 SQL Server 中最常用的组织索引的结构，聚簇索引和非聚簇索引都使用它。


    在 B 树中，页面以分层树状结构组织，如图 2-9 所示。在该结构中，页面经过排序以优化在结构内搜索信息。除了排序之外，页面之间的关系也得到维护，以允许跨索引级别的页面顺序访问。


    与堆类似，B 树从一个 IAM 页开始，该页标识 B 树的第一页在 GAM 间隔内的位置。B 树的第一页是一个索引页，通常被称为索引的 `根级别`。作为索引页，根级别包含键值和索引中下一页的页面地址。根据索引的大小，索引的下一级别可能是数据页或其他索引页。


    如果排序数据页上所有行所需的索引行数超过了可用空间，则根页后面将跟随另一个级别的索引页。B 树中额外的索引页级别称为 `中间级别`。大多数使用 B 树结构构建的索引不需要超过一两个中间级别。即使索引键很宽，只需几个级别也可以对数百万到数十亿行进行排序。


    索引的根级别和中间级别之下的下一级页面，称为 `非叶级别`，即 `叶级别`（参见图 2-9）。叶级别包含索引的所有数据页。数据页是存储行的键值和非键值的位置。非键值不存储在索引页上。


    ![](img/338675_4_En_2_Fig9_HTML.jpg)


    一个分支图，显示了从一个标记为 1 到 4000 的折角图标代表的 IAM 页产生的多个后代，作为根节点，以及由此产生的互连网络作为非叶级别的中间节点。叶级别中最远的后代也表现出互连关系。


    图 2-9


    B 树结构


    堆和 B 树的另一个区别在于索引级别内执行顺序页读取的能力。页面在其页面头中包含指向前一页和下一页的链接。对于索引页和数据页，这些属性会被填充，并可用于遍历
    B 树以从 B 树中找到下一个请求的行，而无需返回到索引的根级别并重复遍历 B 树。为了说明这一点，考虑一个情况：从图 2-9 所示的索引中请求键值在 925
    和 3,025 之间的行。通过 B 树，可以通过遍历 B 树到键值 925（如图 2-10 所示）来完成此操作。之后，可以通过顺序访问第一页之后的页面来检索直到键值
    3,025 的所有行，当遇到最后一个键值时完成操作。


    ![](img/338675_4_En_2_Fig10_HTML.jpg)


    一个分支图，显示了非叶级别和叶级别中 IAM 页的互连后代。粗体箭头创建了一条从 1 到 4000、1 到 1000、901 到 1000、901 到 950
    以及 951 到 1000 的路径。


    图 2-10


    B 树顺序读取


    表和索引的一个可用选项是能够对它们进行分区。分区改变了索引的物理实现以及索引和数据页的组织方式。从 B 树结构的角度来看，索引的每个分区都有自己的 B 树。如果一个表被划分为三个不同的分区，那么该索引将会有三个
    B 树结构。'
- fmt: '# Columnstore Structure


    Columnstore structures are used exclusively by clustered and non-clustered columnstore
    index types. The columnstore structure diverges from the traditional method of
    storing and indexing data from a rowwise to a column-wise format. This means that
    instead of storing values for each column in a row sequentially, column data is
    grouped together and stored independently from the data for other columns in a
    table. For instance, in the example in Figure [2-11](#338675_4_En_2_Chapter.xhtml#Fig11),
    instead of four rows stored one after another on a page, three column “groups”
    are stored.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig11_HTML.png)


    A diagram of 2 dog-eared file icons with C 1 to C 3 entries for rows 1 to 4 and
    R 1 to R 4 entries for columns 1 to 3 as their respective records. A rightward
    arrow is observed at the back of the first icon and the leftmost side of the second.


    **Figure 2-11** Row-wise vs. column-wise storage


    The physical implementation of the columnstore structure does not introduce any
    new page types, relying solely on existing page types. A columnstore begins with
    an `IAM` page, shown in Figure [2-12](#338675_4_En_2_Chapter.xhtml#Fig12). From
    the `IAM` page are `LOB` pages that contain the columnstore information. For each
    column stored in the columnstore, there are one or more `segments`. `segments`
    contain up to about 1 million rows worth of data for the columns that they represent.
    An `LOB` page can contain one or more `segments`, and the `segments` can span
    multiple `LOB` pages.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig12_HTML.jpg)


    A branching diagram of 3 labeled dog-eared icons under a dog-eared file icon labeled
    I A M. Each has its header labeled L O B page with the first and the third having
    2 separate segment-labeled blocks as their records on the sides of the second''s
    lone segment-labeled block.


    **Figure 2-12** Columnstore structure


    Within each `segment` is a `hash dictionary` that is used to map the data that
    comprises the `segment` of the columnstore. The `hash dictionary` also contains
    the minimum and maximum values for the data in the `segment`. This information
    is used by SQL Server during query execution to eliminate `segments` during query
    execution.


    One of the advantages of the columnstore structure is its ability to leverage
    compression. Since each `segment` of the columnstore structure contains the same
    type of data, SQL Server has a greater likelihood of being able to effectively
    compress that data.


    `Dictionary encoding` is used per column to compress similar values into a dictionary
    and then index references to the dictionary. Within each `segment`, rows are reordered
    (a.k.a. optimized via `Vertipaq` optimization). Finally, classic compression algorithms
    similar to `page compression` are used to reduce the size of repeated data patterns.


    There are several significant differences between `row/page compression` and columnstore
    compression:


    1.  While `row` and `page` compressions are optional for rowstore tables, `columnstore
    index compression` is required for all columnstore indexes.

    2.  `Columnstore compression` applies to each `segment`, which can span many pages,
    unlike `page compression`, which is limited to each individual page.


    Another advantage of the columnstore is that only the columns requested from the
    columnstore are returned. In heaps and clustered B-tree indexes, each column value
    for a row is stored together. This allows for efficient access to many columns
    from a small number of rows, but is not effective for analytics, where query patterns
    typically request few columns but many rows. Columnstore indexes address this
    issue by reading from disk only the columns (`segments`) that are requested and
    moving that data into memory. As a result, if a columnstore table has twenty columns,
    but only three are required for a query, then the rest will not need to be read
    into memory.


    There are a handful of additional structures and processes specific to columnstore
    indexes that are worthy of a brief overview.


    ## Minimally Logged Bulk-Loading Data


    When more than 102,400 rows are inserted into a columnstore index in a single
    insert operation, a minimally logged bulk load process will be used to insert
    the rows more efficiently than a standard insert operation would. This greatly
    reduces the compute needed for write operations. Bulk-loading is ideal for OLAP
    tables given that writes are typically comprised of infrequent (but large) data
    load processes.


    While bulk-loading removes the ability to fully examine the detail of an insert
    operation, it allows for inserts to execute more quickly and have significantly
    less impact on the transaction log when used. Consequently, because transaction
    log growth is smaller, transaction log backups are also smaller.


    ## The Deltastore


    Writing to a columnstore index is expensive as each change requires decompressing
    `segments`, writing changes, and then recompressing those `segments`. When bulk-loading
    is not possible, write operations will be made to delta `rowgroups` within the
    `deltastore`. These are clustered B-trees that are ideal for small trickle inserts
    or update operations. When data is read from a columnstore index, the contents
    of the `deltastore` will be read alongside compressed `segments`, returning results
    seamlessly to SQL Server.


    An asynchronous system process called the `tuple-mover` will periodically merge
    rows from the `deltastore` into compressed `segments`. While this process is automatic
    and requires no user intervention, index maintenance may be used to influence
    its behavior.


    ## The Delete Bitmap


    For the same reasons that the `deltastore` is needed to allow for efficient insert
    operations, a mechanism must also be available to ensure that delete operations
    do not cause unneeded waits, locking, or resource consumption.


    When data is deleted from a columnstore index, it is flagged as deleted in a clustered
    B-tree structure called the `delete bitmap`. This soft-deleted data remains in
    the columnstore index until index maintenance assists in cleaning it up.


    When data is read from a columnstore index that contains deleted rows, the `delete
    bitmap` is used to identify and exclude them from the result set.


    # Index Characteristics


    The first part of this chapter discussed the physical structures that are used
    to store indexes. Here, a clear line between the types of indexes available and
    these structures was not defined. In this section, the main index types for SQL
    Server will be discussed, along with the indexing structures that they use. For
    each, the requirements and restrictions associated with the indexes will be provided.


    ## Heap


    The first index type to discuss is the heap. A heap is not actually a type of
    index. It is instead the result of the lack of a clustered index on a table. A
    heap will, as the name implies, use the heap structure for organizing pages in
    a table.


    There is only a single requirement for creating a table with a heap: a clustered
    index can’t already be created on the table. If there is a clustered index, then
    a heap will not be used. Heaps and clustered indexes are mutually exclusive. Provided
    there is not a clustered index, there can be only a single heap on a table. The
    heap is used to store the data pages for the index, and this is done only once.


    The primary concern when using heaps is that the data in the heap is not ordered.
    There is no column that determines the sort order for the data on its pages. The
    result of this is that, without other supporting non-clustered indexes, queries
    will always be forced to scan the information in the table.'
