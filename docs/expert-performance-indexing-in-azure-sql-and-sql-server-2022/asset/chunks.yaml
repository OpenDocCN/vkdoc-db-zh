  trans: '

    #### 每秒页查找次数


    性能计数器 `Page Lookups/sec` 用于衡量在 SQL Server 实例中从缓冲池检索单个数据页的请求数量。当此计数器值较高时，通常意味着查询计划中存在低效问题，这往往可以通过执行计划分析来解决。通常，`Page
    Lookups/sec` 值过高可归因于每次执行时包含大量页查找和行查找的计划。一般来说，在性能问题方面，`Page Lookups/sec` 的值不应超过每个
    `Batch Request/sec` 对应 100 次操作的比率。


    对 `Page Lookups/sec` 的初步分析需要同时查看 `Page Lookups/sec` 和 `Batch Request/sec`。首先，使用代码清单
    16-15 中所示的查询；该分析将包括监控期间内 `Page Lookups/sec` 值的最小值、最大值和平均值。其次，计算并包含每个时间段内 `Page
    Lookups/sec` 与 `Batch Request/sec` 的比率的最小值、最大值和平均值，并通过 `PctViolation` 列显示比率违规情况。违规计算用于验证操作比率是否超过
    100:1。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Lookups/sec'', Calculated_Counter_value, NULL))
    PageLookups,

    MAX(IIF(counter_name = ''Page Lookups/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 100) AS PageLookupRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Lookups/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageLookups) AS MinPageLookups,

    AVG(PageLookups) AS AvgPageLookups,

    MAX(PageLookups) AS MaxPageLookups,

    MIN(PageLookupRatio) AS MinPageLookupRatio,

    AVG(PageLookupRatio) AS AvgPageLookupRatio,

    MAX(PageLookupRatio) AS MaxPageLookupRatio,

    FORMAT(1\. * SUM(IIF(PageLookupRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```

    代码清单 16-15 页查找计数器分析


    与其他计数器一样，当分析表明该计数器存在潜在问题时，下一步就是深入挖掘。有三种方法可以解决 `Page Lookups/sec` 值过高的问题。第一种是查询
    `sys.dm_exec_query_stats` 以识别频繁执行且 I/O 开销高的查询；有关此 DMV 的更多信息，请参阅 [`http://msdn.microsoft.com/en-us/library/ms189741.aspx`](http://msdn.microsoft.com/en-us/library/ms189741.aspx)。需要检查这些查询，并判断它们是否占用了过多的
    I/O 资源。另一种方法是检查 SQL Server 实例中的数据库是否存在索引缺失问题。第三种方法（本节将详细介绍）是检查聚集索引和堆上的查找操作。


    要调查聚集索引和堆上的查找操作，主要信息来源是 DMO `sys.dm_db_index_usage_stats`。得益于前一章实现的监控，此信息已保存在表
    `dbo.index_usage_stats_history` 中。要执行分析，请使用代码清单 16-16 中的查询；我们将从用户角度查看发生的 `user
    lookups`、`user seeks` 和 `user scans`。利用这些值，查询计算 `user lookups` 与 `user seeks`
    的比率，并返回所有比率高于 100:1 的记录。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_lookups) AS user_lookups,

    SUM(uh.user_seeks) AS user_seeks,

    SUM(uh.user_scans) AS user_scans,

    x.record_count,

    CAST(1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    AS DECIMAL(18, 2)) AS LookupSeekRatio

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id) x

    WHERE uh.database_id > 4

    AND x.RankID = 1

    AND x.record_count > 0

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    HAVING CAST(1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    AS DECIMAL(18, 2)) > 100

    ORDER BY 1\. * SUM(uh.user_lookups) / IIF(SUM(uh.user_seeks) = 0, 1, SUM(uh.user_seeks))
    DESC;

    GO

    ```

    代码清单 16-16 页查找快照查询


    一旦识别出有问题的索引，下一步就是确定索引的使用方式和位置，其流程将在本章后续部分描述。

    '
- fmt: "#### Page Compression\n\n性能计数器 `Page compression attempts/sec` 和 `Pages compressed/sec`\
    \ 分别用于度量被压缩的页面数量和尝试压缩的页面数量。当 `Pages compressed/sec` 的速率相对于 `Page compression attempts/sec`\
    \ 下降时，表明 SQL Server 压缩算法在将数据页保存为压缩状态时出现失败。当存在未压缩存储更高效的数据时，或者解压页面的 CPU 成本超过了压缩数据的价值时，审查压缩对于表或索引是否合适可能是有价值的。这通常发生在看起来随机的数据上，例如图像文件的原始输出。压缩失败的挑战在于，SQL\
    \ Server 已经花费了时间，特别是 CPU 资源，去尝试压缩页面。通常，当超过 5% 的页面压缩尝试失败时，值得识别并审查发生失败的索引。\n\n为了分析页面压缩是否存在问题，应首先审查页面压缩的计数器。使用清单\
    \ [16-17](#338675_4_En_16_Chapter.xhtml#PC17) 中所示的查询，我们可以查看监测期间 `Page compression\
    \ attempts/sec` 和 `Pages compressed/sec` 的最小值、最大值和平均值。此外，还包含了 `Pages compressed/sec`\
    \ 与 `Page compression attempts/sec` 的比率及其最小值、最大值和平均值。`PctViolation` 列让我们知道 5%\
    \ 阈值被违反的时间百分比。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT\
    \ create_date,\n        server_name,\n        MAX(IIF(counter_name = 'Page compression\
    \ attempts/sec', Calculated_Counter_value, NULL)) PageCompressionAttempts,\n \
    \       MAX(IIF(counter_name = 'Pages compressed/sec', Calculated_Counter_value,\
    \ NULL)) PagesCompressed,\n        MAX(IIF(counter_name = 'Page compression attempts/sec',\
    \ Calculated_Counter_value, NULL))\n        / (NULLIF(MAX(IIF(counter_name = 'Pages\
    \ compressed/sec', Calculated_Counter_value, NULL)), 0) * 100.) AS CompressionRate\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Page compression\
    \ attempts/sec', 'Pages compressed/sec')\n    GROUP BY create_date,\n        \
    \     server_name)\nSELECT server_name,\n       MIN(PageCompressionAttempts) AS\
    \ MinPageCompressionAttempts,\n       AVG(PageCompressionAttempts) AS AvgPageCompressionAttempts,\n\
    \       MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,\n       MIN(PagesCompressed)\
    \ AS MinPagesCompressed,\n       AVG(PagesCompressed) AS AvgPagesCompressed,\n\
    \       MAX(PagesCompressed) AS MaxPagesCompressed,\n       MIN(CompressionRate)\
    \ AS MinCompressionRate,\n       AVG(CompressionRate) AS AvgCompressionRate,\n\
    \       MAX(CompressionRate) AS MaxCompressionRate,\n       FORMAT(1. * SUM(IIF(CompressionRate\
    \ < 95, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\n**清单 16-17 页面压缩计数器分析**\n\n如果表明页面压缩失败率很高或频率在增加，值得在数据库内部调查以确定哪些表和索引未能进行页面压缩。使用已为索引存储的数据，可以使用清单\
    \ [16-18](#338675_4_En_16_Chapter.xhtml#PC18) 中的查询确定具体哪个索引存在页面压缩失败，或具有最低的页面压缩成功率。结果将类似于图\
    \ [16-6](#338675_4_En_16_Chapter.xhtml#Fig6) 中的示例。该索引是使用 `Person.Person` 表中的所有列创建的，其中包括一些\
    \ `XML` 和 `varchar(max)` 列。此索引的页面压缩成功率略高于 50%，这是一个次优结果。\n\n![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig6_HTML.png)\n\
    \n一个表格出现在结果选项卡下。列标题和数据为：数据库名 `adventure works 2017`，对象名 `person person`，索引 `i\
    \ d 4`，页面压缩尝试计数 `4649`，页面压缩成功计数 `2332`，以及页面压缩成功率 `0.50161`。\n\n**图 16-6 页面压缩快照查询示例结果**\n\
    \n```sql\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n\
    \       QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id,\
    \ database_id)) AS ObjectName,\n       oh.index_id,\n       SUM(oh.page_compression_attempt_count)\
    \ AS page_compression_attempt_count,\n       SUM(oh.page_compression_success_count)\
    \ AS page_compression_success_count,\n       SUM(1. * oh.page_compression_success_count\
    \ / NULLIF(oh.page_compression_attempt_count, 0)) AS page_compression_success_rate\n\
    FROM dbo.index_operational_stats_history oh\nWHERE database_id > 4\n  AND database_id\
    \  DB_ID()\n  AND oh.page_compression_attempt_count > 0\nGROUP BY object_id,\n\
    \         database_id,\n         index_id;\n```\n**清单 16-18 页面压缩快照查询**\n\n一旦确定了压缩效果不佳的索引，下一步是确定页面压缩是否适用于该索引。包含诸如\
    \ `XML` 或 `varchar(max)` 等数据类型的索引是页面压缩的不良候选者，如图 [16-6](#338675_4_En_16_Chapter.xhtml#Fig6)\
    \ 所示。"
  raw: '#### Page Compression


    The performance counters Page compression attempts/sec and Pages compressed/sec
    measure the number of pages compressed and attempted to be compressed. When the
    rate of Pages Compressed/sec decreases in comparison with the Page Compressions/sec,
    it indicates failures in the SQL Server compression algorithm to save data pages
    in a compressed state. While there is data that is more efficiently stored uncompressed,
    scenarios where the CPU cost to decompress pages exceeds the point where there
    is value in compressing the data, then reviewing whether compression is ideal
    or not for a table or index may be worthwhile. This often happens on data that
    appears random, such as the raw output of an image file. The challenge with compression
    failures is that SQL Server already spent time, specifically CPU resources, attempting
    to compress the page. Generally, when more than 5 percent of page compression
    attempts fail, it is worthwhile identifying and reviewing indexes that failures
    are occurring on.


    To analyze if there is an issue with page compression, the counters for page compression
    should first be reviewed. Using the query shown in Listing [16-17](#338675_4_En_16_Chapter.xhtml#PC17),
    we can review the minimum, maximum, and average Page compression attempts/sec
    and Pages compressed/sec values from the monitoring period. Additionally, the
    ratio of Pages compressed/sec to Page compression attempts/sec is included with
    the minimum, maximum, and average values. The `PctViolation` column lets us know
    the percentage of time the 5 percent threshold is violated.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page compression attempts/sec'', Calculated_Counter_value,
    NULL)) PageCompressionAttempts,

    MAX(IIF(counter_name = ''Pages compressed/sec'', Calculated_Counter_value, NULL))
    PagesCompressed,

    MAX(IIF(counter_name = ''Page compression attempts/sec'', Calculated_Counter_value,
    NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Pages compressed/sec'', Calculated_Counter_value,
    NULL)), 0) * 100.) AS CompressionRate

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page compression attempts/sec'', ''Pages compressed/sec'')

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageCompressionAttempts) AS MinPageCompressionAttempts,

    AVG(PageCompressionAttempts) AS AvgPageCompressionAttempts,

    MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,

    MIN(PagesCompressed) AS MinPagesCompressed,

    AVG(PagesCompressed) AS AvgPagesCompressed,

    MAX(PagesCompressed) AS MaxPagesCompressed,

    MIN(CompressionRate) AS MinCompressionRate,

    AVG(CompressionRate) AS AvgCompressionRate,

    MAX(CompressionRate) AS MaxCompressionRate,

    FORMAT(1\. * SUM(IIF(CompressionRate < 95, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-17

    Page Compression Counter Analysis

    ```


    If there is an indication that page compression failures are high or gaining in
    frequency, it’s worth investigating within the databases to determine which tables
    and indexes are failing to page compress. Using the data that has been stored
    for the indexes, it can be determined which specific index has page compression
    failures, or the lowest page compression success rate, using the query in Listing
    [16-18](#338675_4_En_16_Chapter.xhtml#PC18). The results would look similar to
    those in Figure [16-6](#338675_4_En_16_Chapter.xhtml#Fig6). That index was created
    with all the columns from Person.Person, which included some XML and varchar(max)
    columns. The success rate for page compressions for this index is just over 50
    percent which is a suboptimal result.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig6_HTML.png)


    A page presents a table under the results tab. Column headers and data are database
    name adventure works 2017, object name person person, the index i d 4, page compression
    attempt count 4649, page compression success count 2332, and page compression
    success rate 0.50161.


    Figure 16-6


    Page Compression snapshot query sample results


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    oh.index_id,

    SUM(oh.page_compression_attempt_count) AS page_compression_attempt_count,

    SUM(oh.page_compression_success_count) AS page_compression_success_count,

    SUM(1\. * oh.page_compression_success_count / NULLIF(oh.page_compression_attempt_count,
    0)) AS page_compression_success_rate

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND oh.page_compression_attempt_count > 0

    GROUP BY object_id,

    database_id,

    index_id;

    Listing 16-18

    Page Compression Snapshot Query

    ```


    Once indexes with suboptimal compression are identified, the next step is to determine
    whether page compression is appropriate for the index. Indexes that contain data
    types such as XML or varchar(max) are poor candidates for page compression, as
    seen in Figure [16-6](#338675_4_En_16_Chapter.xhtml#Fig6).'
  trans: "\n#### 页面压缩\n\n性能计数器 `Page compression attempts/sec` 和 `Pages compressed/sec`\
    \ 分别用于度量被压缩的页面数量和尝试压缩的页面数量。当 `Pages compressed/sec` 的速率相对于 `Page compression attempts/sec`\
    \ 下降时，表明 SQL Server 压缩算法在将数据页保存为压缩状态时出现失败。当存在未压缩存储更高效的数据时，或者解压页面的 CPU 成本超过了压缩数据的价值时，审查压缩对于表或索引是否合适可能是有价值的。这通常发生在看起来随机的数据上，例如图像文件的原始输出。压缩失败的挑战在于，SQL\
    \ Server 已经花费了时间，特别是 CPU 资源，去尝试压缩页面。通常，当超过 5% 的页面压缩尝试失败时，值得识别并审查发生失败的索引。\n\n为了分析页面压缩是否存在问题，应首先审查页面压缩的计数器。使用清单\
    \ 16-17 中所示的查询，我们可以查看监测期间 `Page compression attempts/sec` 和 `Pages compressed/sec`\
    \ 的最小值、最大值和平均值。此外，还包含了 `Pages compressed/sec` 与 `Page compression attempts/sec`\
    \ 的比率及其最小值、最大值和平均值。`PctViolation` 列让我们知道 5% 阈值被违反的时间百分比。\n\n```sql\nUSE IndexingMethod;\n\
    GO\nWITH CounterSummary\nAS (SELECT create_date,\n        server_name,\n     \
    \   MAX(IIF(counter_name = 'Page compression attempts/sec', Calculated_Counter_value,\
    \ NULL)) PageCompressionAttempts,\n        MAX(IIF(counter_name = 'Pages compressed/sec',\
    \ Calculated_Counter_value, NULL)) PagesCompressed,\n        MAX(IIF(counter_name\
    \ = 'Page compression attempts/sec', Calculated_Counter_value, NULL))\n      \
    \  / (NULLIF(MAX(IIF(counter_name = 'Pages compressed/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 100.) AS CompressionRate\n    FROM dbo.IndexingCounters\n    WHERE\
    \ counter_name IN ( 'Page compression attempts/sec', 'Pages compressed/sec')\n\
    \    GROUP BY create_date,\n             server_name)\nSELECT server_name,\n \
    \      MIN(PageCompressionAttempts) AS MinPageCompressionAttempts,\n       AVG(PageCompressionAttempts)\
    \ AS AvgPageCompressionAttempts,\n       MAX(PageCompressionAttempts) AS MaxPageCompressionAttempts,\n\
    \       MIN(PagesCompressed) AS MinPagesCompressed,\n       AVG(PagesCompressed)\
    \ AS AvgPagesCompressed,\n       MAX(PagesCompressed) AS MaxPagesCompressed,\n\
    \       MIN(CompressionRate) AS MinCompressionRate,\n       AVG(CompressionRate)\
    \ AS AvgCompressionRate,\n       MAX(CompressionRate) AS MaxCompressionRate,\n\
    \       FORMAT(1. * SUM(IIF(CompressionRate < 95, 1, 0)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n**清单 16-17\
    \ 页面压缩计数器分析**\n\n如果表明页面压缩失败率很高或频率在增加，值得在数据库内部调查以确定哪些表和索引未能进行页面压缩。使用已为索引存储的数据，可以使用清单\
    \ 16-18 中的查询确定具体哪个索引存在页面压缩失败，或具有最低的页面压缩成功率。结果将类似于图 16-6 中的示例。该索引是使用 `Person.Person`\
    \ 表中的所有列创建的，其中包括一些 `XML` 和 `varchar(max)` 列。此索引的页面压缩成功率略高于 50%，这是一个次优结果。\n\n![](img/338675_4_En_16_Fig6_HTML.png)\n\
    \n一个表格出现在结果选项卡下。列标题和数据为：数据库名 `adventure works 2017`，对象名 `person person`，索引 `i\
    \ d 4`，页面压缩尝试计数 `4649`，页面压缩成功计数 `2332`，以及页面压缩成功率 `0.50161`。\n\n**图 16-6 页面压缩快照查询示例结果**\n\
    \n```sql\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n\
    \       QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id,\
    \ database_id)) AS ObjectName,\n       oh.index_id,\n       SUM(oh.page_compression_attempt_count)\
    \ AS page_compression_attempt_count,\n       SUM(oh.page_compression_success_count)\
    \ AS page_compression_success_count,\n       SUM(1. * oh.page_compression_success_count\
    \ / NULLIF(oh.page_compression_attempt_count, 0)) AS page_compression_success_rate\n\
    FROM dbo.index_operational_stats_history oh\nWHERE database_id > 4\n  AND database_id\
    \  DB_ID()\n  AND oh.page_compression_attempt_count > 0\nGROUP BY object_id,\n\
    \         database_id,\n         index_id;\n```\n**清单 16-18 页面压缩快照查询**\n\n一旦确定了压缩效果不佳的索引，下一步是确定页面压缩是否适用于该索引。包含诸如\
    \ `XML` 或 `varchar(max)` 等数据类型的索引是页面压缩的不良候选者，如图 16-6 所示。\n"
- fmt: '## Lock Wait Time


    Some performance counters can be used to determine whether there is pressure on
    the indexes based on their usage. One such counter is `Lock Wait Time (ms)`. This
    counter measures the amount of time, in milliseconds, that SQL Server spends waiting
    to implement a lock on a table, index, or page. There are not any specific “good”
    guidance values for this counter. Generally, the lower this value, the better,
    but what “low” means is entirely dependent on the database platform and the applications
    that are accessing it.


    Since there are no guidelines for the level at which the values from `Lock Wait
    Time (ms)` are acceptable or not, the best method for evaluating the counter is
    to compare it to baseline values. In this case, collecting a baseline becomes
    incredibly important in terms of being able to monitor when index performance
    regressions related to `Lock Wait Time` occur. Using the query in Listing 16-19,
    the `Lock Wait Time (ms)` value is compared to the available baseline values.
    For both the baseline and the values from the monitoring period, an aggregate
    of the counter values is provided for the minimum, maximum, average, and standard
    deviation. These aggregations assist in providing a profile of the state of the
    counter and whether it has increased or decreased compared to the baseline.


    ### Listing 16-19

    Lock Wait Time Counter Analysis


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Wait Time (ms)'', Calculated_Counter_value, NULL))
    / 1000 LockWaitTime

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Wait Time (ms)''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaitTime) AS MinLockWaitTime,

    AVG(LockWaitTime) AS AvgLockWaitTime,

    MAX(LockWaitTime) AS MaxLockWaitTime,

    STDEV(LockWaitTime) AS StdDevLockWaitTime

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Wait Time (ms)''

    ORDER BY instance_name,

    CounterDate DESC;

    ```


    As an example, in Figure 16-7, the average and maximum Lock Wait Times have decreased
    from the baseline values which is what would be desired. In the case where there
    was an increase in the average lock wait over the baseline, there could be a cause
    for concern, especially if that increase is in tens of milliseconds. Also, if
    there were an increase in the range to the maximum value, it would be something
    else to investigate. The more that the time spent waiting to acquire locks increases,
    the more it is going to directly impact users.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig7_HTML.png)


    A page presents a table under the results tab, clipped off into two set of rows
    1 to 4 and 15 to 18. Column headers are counter date, server name, instance name,
    min lock wait time, average lock wait time, max lock wait time, and std Dev lock
    wait time.


    **Figure 16-7**

    Lock Wait Time counter analysis sample results


    When investigating `Lock Wait Time`, it is important to identify which indexes
    are generating the most `Lock Wait Time` by using the query in Listing 16-20.
    This information is found in the DMO `sys.dm_db_index_operational_stats` or the
    monitoring table `dbo.index_operational_stats_history`. The columns reviewed for
    `Lock Wait Time` are `row_lock_wait_count`, `row_lock_wait_count`, `row_lock_wait_count`,
    and `page_lock_wait_in_ms`. These columns report the number of waits per index
    and the time for those waits. As the columns indicate, there are locks at both
    the row and page levels; most often the variations between the lock types correlate
    with seek and scan operations on the index.


    ### Listing 16-20

    Lock Wait Time Snapshot Query


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    SUM(row_lock_wait_in_ms) / 1000. AS row_lock_wait_in_sec,

    ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000.,
    0) AS avg_row_lock_wait_in_sec,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    SUM(page_lock_wait_in_ms) / 1000. AS page_lock_wait_in_sec,

    ISNULL(SUM(page_lock_wait_in_ms) / NULLIF(SUM(page_lock_wait_count), 0) / 1000.,
    0) AS avg_page_lock_wait_in_sec

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id <> DB_ID()

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```


    Looking at the results of the snapshot query, shown in Figure 16-8, there are
    several things to point out. First, all locks are occurring across the pages of
    the table, not at the row level. This can result in larger-scale blocking since
    more than the rows being accessed will be locked. Also, the average page lock
    is about 7 seconds. For most environments, this is an excessive amount of time
    for locking. Based on this information, the clustered index (`index_id=1`) on
    the table `Sales.SalesOrderDetail` should be investigated.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig8_HTML.png)


    A table with 9 columns and a row. Column headers are database name, object name,
    the index id, row lock wait count, row lock wait in seconds, average row lock
    wait in seconds, page lock wait count, page lock wait in seconds, and average
    page lock wait in seconds.


    **Figure 16-8**

    Lock Wait Time index analysis sample results


    When we need to dig deeper into an index and its usage, the next step is to determine
    which execution plans are utilizing the index. Then optimize either the queries
    or the index to reduce locking. In some cases, if the index is not critical to
    the table, it might be better to remove the index and allow other indexes to satisfy
    the queries instead.'
