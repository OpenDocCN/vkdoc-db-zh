    to the stock market, past performance does not predict future results.


    Fortunately, with a well-practiced use of the Indexing Method, we will be able
    to provide the indexing that an environment needs. In this chapter, the focus
    is on databases that are already deployed to production. As mentioned, these tactics
    will work with databases and servers in both states—development and production—but
    for simplicity, a production environment will be the default perspective and approach.


    As we move through each of the areas in the index analysis, a list of indexes
    will be developed to either create, modify, delete, or investigate further. For
    the indexes that require further investigation, subsequent portions of the index
    analysis process will be used to determine how to progress and handle the index.


    Note


    In this chapter, it will be important to run the monitoring scripts from Chapter
    [15](#338675_4_En_15_Chapter.xhtml) between the scripts that create the workload
    and the queries to review the statistics. Depending on the schedule used for collecting
    the statistics, it could be hours before the statistics are collected that prevent
    the queries from providing the anticipated results.


    ## Review of Server State


    The first step in index analysis is to review the state of the server. Review
    both the host server environment and the SQL Server instance environment to identify
    whether there are conditions indicating that there may be indexing issues. By
    starting at a high level and not looking directly at tables and individual indexes,
    we can avoid getting blinded by the trees in the forest. Often, when there are
    hundreds (or thousands) of indexes in many databases, it is easy to get overly
    focused on an index or table that looks poorly indexed, only to later discover
    that the table has fewer than a hundred rows in a database with billions of rows
    in other tables.


    When analyzing the server state, the following three areas will be considered:


    *   Performance counters


    *   Wait statistics


    *   Buffer allocation


    Each of these areas provides an idea of where to start focusing the index analysis
    process. They let the database platform determine where the performance issues
    related to indexing may reside.'
  trans: '# 16. 索引分析


    ## 摘要


    在本章中，我们逐步讲解了如何使用各种工具来监控索引。监控索引是通用平台监控的延伸，但也是为确定索引是否合适或进一步调整是否有益提供基础的重要环节。通过监控和索引分析，我们回顾了如何收集动态管理数据和性能计数器。在下一章，这些信息将被用于分析索引是否存在或是否合适。


    在上一章中，我们讨论了监控索引时应收集哪些信息。所有这些信息对于索引数据库的下一步流程——即确定要应用哪些索引——都是必需的。在本章中，我们将利用监控期间收集的所有信息，来分析性能状态和现有索引的价值。索引分析的最终目标是构建一个需要创建、修改以及可能从数据库中删除的索引列表。在某些情况下，索引分析似乎近乎于一门艺术。有许多决策将依据过去的性能来预估未来的索引需求。然而，最终，对于提出的每一项变更，在索引解决方案实施前后，都会有支持性的证据，从统计学上确认或反驳索引的价值。这有助于确保，无论索引挑战多么复杂，它都并将始终应该更像科学而非艺术。


    索引分析的一般流程分为几个部分。每个部分都包含一个分析过程：从高层次开始以识别需要关注的焦点，然后深入到现有问题。分析部分如下：


    *   服务器状态审查

    *   模式发现

    *   `数据库引擎优化顾问`

    *   未使用的索引

    *   索引计划使用情况


    在开始分析数据库索引的任何练习之前，首先有必要了解当前的部署状态。针对部署中的数据库与已部署到生产环境的数据库，可使用的策略大致相同。然而，在统计信息收集的地点和方式上，两者之间存在显著差异。


    对于尚未开发完成的数据库，重点将放在部署后用户预期如何与数据和应用程序交互。针对数据库的测试和工作负载将侧重于验证数据库中的索引是否支持这些活动。为测试选择的活动很可能是基于对用户将如何使用应用程序的估算和预测。确定这些活动将是负责制定应用程序需求的业务分析师的职责。


    一旦数据库部署完成，监控的重点就从“活动可能是什么”转变为“活动实际是什么”。用户采用功能的速率以及该活动中数据的分布情况将变得已知。此时，在测试和规划阶段开发的索引可能并不适合实际工作负载。在部署后首次对数据库使用`索引方法`可能会带来重大的索引变更。对已部署数据库进行索引的关键在于，分析需要基于生产环境中的工作负载统计数据。这样做将为实施能为数据库带来最大收益的索引提供必要的指导，并将其与用户正在使用的功能及其使用频率相匹配。


    对处于任一部署状态的数据库进行索引分析，将提供一组基于当前已知和理解的数据库情况下的最优索引。当索引被应用后，其效果可能且将会有所不同。一个索引可能为上个月数据库中的某个活动提供了完美的数据访问路径，但随着新版本的发布、新客户端的加入或用户行为的改变，它可能不再是最佳选择。正如常听到的关于股市的说法：过往业绩并不预示未来结果。


    幸运的是，通过熟练运用`索引方法`，我们将能够为环境提供所需的索引。在本章中，重点是已部署到生产环境的数据库。如前所述，这些策略对于处于开发和生产两种状态的数据库和服务器都适用——但为简化起见，默认视角和方法将以生产环境为准。


    随着我们深入索引分析的每个领域，将逐步制定一个索引列表，用于创建、修改、删除或进一步调查。对于需要进一步调查的索引，将在索引分析过程的后续部分中确定如何处理该索引。


    **注意**


    在本章中，在创建工作负载的脚本和用于审查统计信息的查询脚本之间，运行来自`第 15 章`的监控脚本将非常重要。根据收集统计信息所使用的计划，可能需要等待数小时才能收集到统计信息，这可能导致查询无法提供预期的结果。


    ## 服务器状态审查


    索引分析的第一步是审查服务器的状态。同时审查主机服务器环境和`SQL Server`实例环境，以识别是否存在表明可能存在索引问题的状况。通过从高层次开始，而不是直接查看表和单个索引，我们可以避免“只见树木，不见森林”。通常，当许多数据库中有数百（或数千）个索引时，很容易过度专注于一个看起来索引不佳的索引或表，结果后来才发现该表只有不到一百行，而数据库中的其他表则有数十亿行。


    在分析服务器状态时，将考虑以下三个领域：


    *   `性能计数器`

    *   `等待统计信息`

    *   `缓冲区分配`


    这些领域中的每一个都为我们提供了从何处开始聚焦索引分析过程的思路。它们让数据库平台能够确定与索引相关的性能问题可能存在于何处。'
- fmt: "### Performance Counters\n\nThe first set of information collected for index\
    \ monitoring included the performance counters. Naturally, we want to look at\
    \ these performance counters first when performing index analysis. Tracking performance\
    \ counters over a monitoring period and over time will not provide prescriptive\
    \ guidance on what to do about indexing issues, but it will provide a point for\
    \ discovering performance issues and thus where to begin.\n\nFor each of the counters,\
    \ some general guidelines will be discussed. These guidelines are generalities\
    \ that should be taken with a grain of salt. Use them to initially guide whether\
    \ the counter is outside of what might be considered normal. If there is a reason\
    \ that counters on your platform trend higher than typical, then maintaining the\
    \ baseline tables ensures that the norm is identified prior to highlighting outliers.\
    \ Work with the counter values that are valid for an environment as opposed to\
    \ those that work best for others.\n\nThere are two ways in which performance\
    \ counters should be analyzed. The first is to use Excel and/or Power BI to view\
    \ graphs and trend lines based on the performance counters. The second is to review\
    \ the performance counters with a query that takes a snapshot of the information\
    \ in the performance counter table. The second approach is the one used in this\
    \ chapter due to its ease in setup and demonstration. The guidelines for the snapshot\
    \ queries apply to both approaches.\n\nNote\n\nFor simplicity, the snapshot analysis\
    \ queries in this section will be scoped to the database level. In most cases,\
    \ they will need to be executed against every database on the SQL Server instance.\
    \ Options for accomplishing this are using `sp_MSForEachDB` or a process that\
    \ loops through a given set of databases one-at-a-time.\n\n#### Forwarded Records\
    \ per Second\n\nAs discussed in Chapter [2](#338675_4_En_2_Chapter.xhtml), forwarded\
    \ records occur when heap records are updated and no longer fit on the page in\
    \ which they were originally stored. In these situations, a pointer is placed\
    \ in the original record to the new record location. The performance counter `Forwarded\
    \ Records/sec` measures the rate at which forwarded rows are accessed on the server.\
    \ Generally, the ratio of `Forwarded Records/sec` should not exceed 10 percent\
    \ of `Batch Requests/sec`. This ratio can be a misnomer since `Forwarded Records`\
    \ represents the access of data at the row level and `Batch Requests` represents\
    \ a higher-scoped operation. The ratio, though, provides an indicator of when\
    \ the balance of `Forwarded Records/sec` may be exceeding an advisable level.\n\
    \nThe snapshot query for forwarded records, shown in Listing [16-1](#338675_4_En_16_Chapter.xhtml#PC1),\
    \ provides columns for the `Forwarded Records/sec` counter and the ratio calculation.\
    \ In this query, the values are aggregated into minimum, average, and maximum\
    \ values. The ratio is calculated on each set of collected counters and aggregated\
    \ after that calculation. The final column, `PctViolation`, shows the percentage\
    \ of time in which the Forward Records to `Batch Requests` ratio exceeds the 10\
    \ percent guideline.\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\n\
    AS (SELECT create_date,\n           server_name,\n           MAX(IIF(counter_name\
    \ = 'Forwarded Records/sec', Calculated_Counter_value, NULL)) AS ForwardedRecords,\n\
    \           MAX(IIF(counter_name = 'Forwarded Records/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 10) AS ForwardedRecordRatio\n    FROM dbo.IndexingCounters\n  \
    \  WHERE counter_name IN ( 'Forwarded Records/sec', 'Batch Requests/sec' )\n \
    \   GROUP BY create_date,\n             server_name)\nSELECT server_name,\n  \
    \     MIN(ForwardedRecords) AS MinForwardedRecords,\n       AVG(ForwardedRecords)\
    \ AS AvgForwardedRecords,\n       MAX(ForwardedRecords) AS MaxForwardedRecords,\n\
    \       MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n       AVG(ForwardedRecordRatio)\
    \ AS AvgForwardedRecordRatio,\n       MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,\n\
    \       FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n\nListing\
    \ 16-1\nForwarded Records Counter Analysis\n\nWhen reviewing the output from the\
    \ snapshot query, there are a few things to ask about the information returned.\
    \ First, review the minimum and maximum values for the counter and ratio. Is the\
    \ minimum value close to or at zero? How high is the maximum? How does it compare\
    \ to previous values collected during monitoring? Is the average value for the\
    \ counter and ratio closer to the minimum or maximum value? If the volume and\
    \ peaks of forwarded records is increasing, then further analysis is warranted.\
    \ Next, consider the `PctViolation` column. Is the percentage greater than 1 percent?\
    \ If so, further analysis of forwarded records is warranted. If there is a need\
    \ to dig deeper into Forward Records, the next step is to move the analysis from\
    \ the server level to individual databases.\n\nTo provide an example of some forwarded\
    \ record activity, execute the script in Listing [16-2](#338675_4_En_16_Chapter.xhtml#PC2).\
    \ This script will create a table with a heap, insert records into it, and update\
    \ those records, causing some to be expanded and leading to record forwarding.\
    \ Finally, a query will access the forwarded records, causing forwarded record\
    \ access operations.\n\n```sql\nUSE AdventureWorks2017\nGO\nDROP TABLE IF EXISTS\
    \ dbo.HeapExample;\nGO\nCREATE TABLE dbo.HeapExample (\n    ID INT IDENTITY,\n\
    \    FillerData VARCHAR(2000)\n);\nINSERT INTO dbo.HeapExample (FillerData)\n\
    SELECT REPLICATE('X',100)\nFROM sys.all_objects\nUPDATE dbo.HeapExample\nSET FillerData\
    \ = REPLICATE('X',2000)\nWHERE ID % 5 = 1\nGO\nSELECT *\nFROM dbo.HeapExample\n\
    WHERE ID % 3 = 1\nGO 2\n```\n\nListing 16-2\nForwarded Records Example"
  raw: '### Performance Counters


    The first set of information collected for index monitoring included the performance
    counters. Naturally, we want to look at these performance counters first when
    performing index analysis. Tracking performance counters over a monitoring period
    and over time will not provide prescriptive guidance on what to do about indexing
    issues, but it will provide a point for discovering performance issues and thus
    where to begin.


    For each of the counters, some general guidelines will be discussed. These guidelines
    are generalities that should be taken with a grain of salt. Use them to initially
    guide whether the counter is outside of what might be considered normal. If there
    is a reason that counters on your platform trend higher than typical, then maintaining
    the baseline tables ensures that the norm is identified prior to highlighting
    outliers. Work with the counter values that are valid for an environment as opposed
    to those that work best for others.


    There are two ways in which performance counters should be analyzed. The first
    is to use Excel and/or Power BI to view graphs and trend lines based on the performance
    counters. The second is to review the performance counters with a query that takes
    a snapshot of the information in the performance counter table. The second approach
    is the one used in this chapter due to its ease in setup and demonstration. The
    guidelines for the snapshot queries apply to both approaches.


    Note


    For simplicity, the snapshot analysis queries in this section will be scoped to
    the database level. In most cases, they will need to be executed against every
    database on the SQL Server instance. Options for accomplishing this are using
    `sp_MSForEachDB` or a process that loops through a given set of databases one-at-a-time.


    #### Forwarded Records per Second


    As discussed in Chapter [2](#338675_4_En_2_Chapter.xhtml), forwarded records occur
    when heap records are updated and no longer fit on the page in which they were
    originally stored. In these situations, a pointer is placed in the original record
    to the new record location. The performance counter Forwarded Records/sec measures
    the rate at which forwarded rows are accessed on the server. Generally, the ratio
    of Forwarded Records/sec should not exceed 10 percent of Batch Requests/sec. This
    ratio can be a misnomer since Forwarded Records represents the access of data
    at the row level and Batch Requests represents a higher-scoped operation. The
    ratio, though, provides an indicator of when the balance of Forwarded Records/sec
    may be exceeding an advisable level.


    The snapshot query for forwarded records, shown in Listing [16-1](#338675_4_En_16_Chapter.xhtml#PC1),
    provides columns for the Forwarded Records/sec counter and the ratio calculation.
    In this query, the values are aggregated into minimum, average, and maximum values.
    The ratio is calculated on each set of collected counters and aggregated after
    that calculation. The final column, `PctViolation`, shows the percentage of time
    in which the Forward Records to Batch Requests ratio exceeds the 10 percent guideline.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))
    AS ForwardedRecords,

    MAX(IIF(counter_name = ''Forwarded Records/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Forwarded Records/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(ForwardedRecords) AS MinForwardedRecords,

    AVG(ForwardedRecords) AS AvgForwardedRecords,

    MAX(ForwardedRecords) AS MaxForwardedRecords,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1\. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-1

    Forwarded Records Counter Analysis

    ```


    When reviewing the output from the snapshot query, there are a few things to ask
    about the information returned. First, review the minimum and maximum values for
    the counter and ratio. Is the minimum value close to or at zero? How high is the
    maximum? How does it compare to previous values collected during monitoring? Is
    the average value for the counter and ratio closer to the minimum or maximum value?
    If the volume and peaks of forwarded records is increasing, then further analysis
    is warranted. Next, consider the `PctViolation` column. Is the percentage greater
    than 1 percent? If so, further analysis of forwarded records is warranted. If
    there is a need to dig deeper into Forward Records, the next step is to move the
    analysis from the server level to individual databases.


    To provide an example of some forwarded record activity, execute the script in
    Listing [16-2](#338675_4_En_16_Chapter.xhtml#PC2). This script will create a table
    with a heap, insert records into it, and update those records, causing some to
    be expanded and leading to record forwarding. Finally, a query will access the
    forwarded records, causing forwarded record access operations.


    ```

    USE AdventureWorks2017

    GO

    DROP TABLE IF EXISTS dbo.HeapExample;

    GO

    CREATE TABLE dbo.HeapExample (

    ID INT IDENTITY,

    FillerData VARCHAR(2000)

    );

    INSERT INTO dbo.HeapExample (FillerData)

    SELECT REPLICATE(''X'',100)

    FROM sys.all_objects

    UPDATE dbo.HeapExample

    SET FillerData = REPLICATE(''X'',2000)

    WHERE ID % 5 = 1

    GO

    SELECT *

    FROM dbo.HeapExample

    WHERE ID % 3 = 1

    GO 2

    Listing 16-2

    Forwarded Records Example

    ```'
  trans: "### 性能计数器\n\n为索引监控收集的第一组信息包括性能计数器。自然，在执行索引分析时，我们首先会查看这些性能计数器。在监控期内跟踪性能计数器并随时间推移进行观察，并不能就如何处理索引问题提供明确的指导，但它会为发现性能问题提供一个切入点，从而确定从何处着手。\n\
    \n对于每个计数器，我们将讨论一些通用准则。这些准则是一般性指导，应**谨慎看待**。使用它们来初步判断计数器是否超出了可能被视为正常的范围。如果您的平台上计数器值偏高有特定原因，那么维护基线表就能确保在标记异常值之前识别出正常状态。使用对您的环境有效的计数器值，而不是对其他环境效果最佳的值。\n\
    \n性能计数器应通过两种方式分析。第一种是使用 Excel 和/或 Power BI 查看基于性能计数器的图表和趋势线。第二种是通过查询性能计数器表中的信息快照来进行审查。本章采用第二种方法，因为它易于设置和演示。快照查询的指南同样适用于这两种方法。\n\
    \n> 注意\n>\n> 为简化起见，本节中的快照分析查询将限定在数据库级别。在大多数情况下，需要针对 SQL Server 实例上的每个数据库执行这些查询。实现此目的的方法包括使用\
    \ `sp_MSForEachDB` 或一个逐一遍历给定数据库集的流程。\n\n#### 每秒转发票据数\n\n如第 2 章所述，当堆记录被更新且不再适合存储在其原始数据页中时，就会发生记录转发。在这些情况下，会在原始记录中放置一个指向新记录位置的指针。性能计数器\
    \ `Forwarded Records/sec`（每秒转发票据数）衡量服务器上访问转发行的速率。通常，`Forwarded Records/sec` 的比率不应超过\
    \ `Batch Requests/sec`（每秒批处理请求数）的 10%。这个比率可能存在误导，因为 `Forwarded Records` 代表行级别的数据访问，而\
    \ `Batch Requests` 代表更高范围的操作。尽管如此，该比率提供了一个指标，用于判断 `Forwarded Records/sec` 的数值何时可能超过建议水平。\n\
    \n用于转发票据的快照查询（如清单 16-1 所示）提供了 `Forwarded Records/sec` 计数器和比率计算的列。在此查询中，值被聚合为最小值、平均值和最大值。比率是在每组收集的计数器上计算的，并在计算之后进行聚合。最后一列\
    \ `PctViolation` 显示 Forward Records 与 `Batch Requests` 的比率超过 10% 准则的次数百分比。\n\n\
    ```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Forwarded Records/sec',\
    \ Calculated_Counter_value, NULL)) AS ForwardedRecords,\n           MAX(IIF(counter_name\
    \ = 'Forwarded Records/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 10) AS ForwardedRecordRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Forwarded Records/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(ForwardedRecords) AS MinForwardedRecords,\n  \
    \     AVG(ForwardedRecords) AS AvgForwardedRecords,\n       MAX(ForwardedRecords)\
    \ AS MaxForwardedRecords,\n       MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,\n\
    \       AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,\n       MAX(ForwardedRecordRatio)\
    \ AS MaxForwardedRecordRatio,\n       FORMAT(1. * SUM(IIF(ForwardedRecordRatio\
    \ > 1, 1, NULL)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\n\n**清单 16-1**\n转发票据计数器分析\n\n在审查快照查询的输出时，需要对返回的信息提出几个问题。首先，审查计数器和比率的最小值和最大值。最小值是否接近或等于零？最大值有多高？与监控期间收集的先前值相比如何？计数器和比率的平均值更接近最小值还是最大值？如果转发票据的数量和峰值在增加，则需要进行进一步分析。接下来，考虑\
    \ `PctViolation` 列。百分比是否大于 1%？如果是，则需要对转发票据进行进一步分析。如果需要深入研究 Forward Records，下一步是将分析从服务器级别转移到各个数据库。\n\
    \n为了提供一些转发票据活动的示例，请执行清单 16-2 中的脚本。该脚本将创建一个包含堆的表，向其中插入记录，并更新这些记录，导致某些记录被扩展，从而引发记录转发。最后，一个查询将访问这些转发票据，导致转发票据访问操作。\n\
    \n```sql\nUSE AdventureWorks2017\nGO\nDROP TABLE IF EXISTS dbo.HeapExample;\n\
    GO\nCREATE TABLE dbo.HeapExample (\n    ID INT IDENTITY,\n    FillerData VARCHAR(2000)\n\
    );\nINSERT INTO dbo.HeapExample (FillerData)\nSELECT REPLICATE('X',100)\nFROM\
    \ sys.all_objects\nUPDATE dbo.HeapExample\nSET FillerData = REPLICATE('X',2000)\n\
    WHERE ID % 5 = 1\nGO\nSELECT *\nFROM dbo.HeapExample\nWHERE ID % 3 = 1\nGO 2\n\
    ```\n\n**清单 16-2**\n转发票据示例"
- fmt: '需要注意的是，只有当数据库中使用了堆表，或者需要识别堆表何时被不当时，才需要进行“转发记录数/秒”的分析。


    一旦确定需要对数据库进行转发记录分析，该过程将利用动态管理对象（DMO）中可用的信息。有两个DMO有助于确定转发记录问题的范围和程度，它们是 `sys.dm_db_index_physical_stats`
    和 `sys.dm_db_index_operational_stats`。在分析中，`sys.dm_db_index_operational_stats`
    的信息将来自监控表 `dbo.index_operational_stats_history`。如清单 [16-3](#338675_4_En_16_Chapter.xhtml#PC3)
    所示的分析过程，涉及识别数据库中的所有堆表，然后检查堆表的物理结构。随后，将此信息与收集到 `dbo.index_operational_stats_history`
    中的信息进行联接。索引的物理状态是从 `sys.dm_db_index_operational_stats` 中检索的，因为需要该DMO的 `DETAILED`
    选项才能获取转发记录信息。


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..#HeapList'') IS NOT NULL

    DROP TABLE #HeapList

    CREATE TABLE #HeapList

    (

    database_id int

    ,object_id int

    ,page_count INT

    ,avg_page_space_used_in_percent DECIMAL(6,3)

    ,record_count INT

    ,forwarded_record_count INT

    )

    DECLARE HEAP_CURS CURSOR FORWARD_ONLY FOR

    SELECT object_id

    FROM sys.indexes i

    WHERE index_id = 0

    DECLARE @IndexID INT

    OPEN HEAP_CURS

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO #HeapList

    SELECT

    DB_ID()

    ,object_id

    ,page_count

    ,CAST(avg_page_space_used_in_percent AS DECIMAL(6,3))

    ,record_count

    ,forwarded_record_count

    FROM

    sys.dm_db_index_physical_stats(DB_ID(), @IndexID, 0, NULL,''DETAILED'') ;

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    END

    CLOSE HEAP_CURS

    DEALLOCATE HEAP_CURS

    SELECT

    QUOTENAME(DB_NAME(database_id))

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id)) AS ObjectName

    ,page_count

    ,avg_page_space_used_in_percent

    ,record_count

    ,forwarded_record_count

    ,x.forwarded_fetch_count

    ,CAST(100.*forwarded_record_count/record_count AS DECIMAL(6,3)) AS forwarded_record_pct

    ,CAST(1.*x.forwarded_fetch_count/forwarded_record_count AS DECIMAL(12,3)) AS forwarded_row_ratio

    FROM #HeapList h

    CROSS APPLY(

    SELECT SUM(forwarded_fetch_count) AS forwarded_fetch_count

    FROM IndexingMethod.dbo.index_operational_stats_history i

    WHERE h.database_id = i.database_id

    AND h.object_id = i.OBJECT_ID

    AND i.index_id = 0) x

    WHERE forwarded_record_count > 0

    ORDER BY page_count DESC

    Listing 16-3

    Forwarded Records Snapshot Query

    ```


    快照查询的结果（如图 [16-1](#338675_4_En_16_Chapter.xhtml#Fig1) 所示）提供了数据库中所有存在转发记录的堆表信息。通过这些结果，可以识别出存在转发和转发记录问题的堆表。首先要关注的列是
    `page_count` 和 `record_count`。拥有大量转发记录问题的行的堆表比行数少的堆表更重要。在调查此计数器时，应重点关注那些通过解决转发记录问题能带来最大收益的表。`forwarded_record_count`
    和 `forwarded_fetch_count` 列分别提供了表中已被转发的记录数量以及这些转发记录被访问的次数。这些列定义了问题的规模。最后要查看的列是
    `forwarded_record_pct` 和 `forwarded_row_ratio`。这些列详细说明了被转发行的百分比以及每条转发行被访问的次数。


    在示例表中，统计信息表明存在转发记录问题。该表有超过 16% 的行被转发。根据 `forwarded_fetch_count`，这些行中的每一行都被访问了三次。从代码样本来看，仅对该表执行了三次查询，这意味着每次进行数据访问时，所有转发行都会被访问。在分析此数据库中的索引时，减轻此表的转发记录问题将是值得的。请特别注意转发记录是否正在被访问。对于具有非常高转发记录数但没有任何转发记录访问的表，减轻其转发记录问题将不值得付出努力，并且对“转发记录数/秒”计数器没有影响。


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig1_HTML.png)


    一个包含 9 列和 1 行的表。列标题依次为：无列名、对象名称、页数、平均页空间使用百分比、记录数、转发记录数、转发提取次数、转发记录百分比和转发行比率。


    图 16-1

    转发记录快照查询结果


    当识别出存在转发记录问题的堆表后，通常有两种方法可以缓解转发记录。第一种方法是将可变长度列的数据类型更改为固定长度数据类型。例如，将 `varchar` 数据类型更改为
    `char`。这种方法并不总是理想的，因为它可能导致表需要更多空间，而且某些查询可能无法适应字符字段末尾的额外空间，从而可能返回不正确的结果。第二种选择是向表添加聚集索引，这将移除堆作为表中数据存储的组织方法。这种方法的缺点在于确定要聚集表的适当键列。如果表上存在主键，它通常可以作为聚集索引键。还有第三种选择可用：可以重建堆，这将把堆重写回数据库文件并移除所有转发记录（使用清单
    [16-4](#338675_4_En_16_Chapter.xhtml#PC4) 中的脚本）。这通常被认为是解决堆中转发记录问题的较差方法，因为它没有提供有意义的永久修复方案。重要的是要考虑到转发记录不一定就是坏的。然而，当与批处理请求相比，转发记录操作的比例开始增加时，它们确实会带来潜在的性能挑战。


    ```

    USE AdventureWorks2017

    GO

    ALTER TABLE dbo.HeapExample REBUILD

    Listing 16-4

    Rebuild Heap Script

    ```'
  raw: 'Note that Forwarded Records/sec analysis is only necessary when heaps are
    used in a database or if there is a desire to identify when heaps have been used
    inappropriately.


    Once determining that Forwarded Records/sec analysis needs to go into the database,
    the process will leverage information available in DMOs. There are two DMOs that
    will help to determine the scope and extent of forwarded record issues. These
    are `sys.dm_db_index_physical_stats` and `sys.dm_db_index_operational_stats`.
    For the analysis, the `sys.dm_db_index_operational_stats` information will come
    from the monitoring table `dbo.index_operational_stats_history`. The analysis
    process, shown in Listing [16-3](#338675_4_En_16_Chapter.xhtml#PC3), involves
    identifying all heaps in a database and then checking the physical structure of
    the heap. This information is then joined to what is collected in `dbo.index_operational_stats_history`.
    The physical stature of the index is retrieved from `sys.dm_db_index_operational_stats`
    because the `DETAILED` option for the DMO is required to get the forwarded record
    information.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..#HeapList'') IS NOT NULL

    DROP TABLE #HeapList

    CREATE TABLE #HeapList

    (

    database_id int

    ,object_id int

    ,page_count INT

    ,avg_page_space_used_in_percent DECIMAL(6,3)

    ,record_count INT

    ,forwarded_record_count INT

    )

    DECLARE HEAP_CURS CURSOR FORWARD_ONLY FOR

    SELECT object_id

    FROM sys.indexes i

    WHERE index_id = 0

    DECLARE @IndexID INT

    OPEN HEAP_CURS

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    WHILE @@FETCH_STATUS = 0

    BEGIN

    INSERT INTO #HeapList

    SELECT

    DB_ID()

    ,object_id

    ,page_count

    ,CAST(avg_page_space_used_in_percent AS DECIMAL(6,3))

    ,record_count

    ,forwarded_record_count

    FROM

    sys.dm_db_index_physical_stats(DB_ID(), @IndexID, 0, NULL,''DETAILED'') ;

    FETCH NEXT FROM HEAP_CURS INTO @IndexID

    END

    CLOSE HEAP_CURS

    DEALLOCATE HEAP_CURS

    SELECT

    QUOTENAME(DB_NAME(database_id))

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id)) AS ObjectName

    ,page_count

    ,avg_page_space_used_in_percent

    ,record_count

    ,forwarded_record_count

    ,x.forwarded_fetch_count

    ,CAST(100.*forwarded_record_count/record_count AS DECIMAL(6,3)) AS forwarded_record_pct

    ,CAST(1.*x.forwarded_fetch_count/forwarded_record_count AS DECIMAL(12,3)) AS forwarded_row_ratio

    FROM #HeapList h

    CROSS APPLY(

    SELECT SUM(forwarded_fetch_count) AS forwarded_fetch_count

    FROM IndexingMethod.dbo.index_operational_stats_history i

    WHERE h.database_id = i.database_id

    AND h.object_id = i.OBJECT_ID

    AND i.index_id = 0) x

    WHERE forwarded_record_count > 0

    ORDER BY page_count DESC

    Listing 16-3

    Forwarded Records Snapshot Query

    ```


    The results of the snapshot query, shown in Figure [16-1](#338675_4_En_16_Chapter.xhtml#Fig1),
    provide information on all the heaps in a database that have any forwarded records.
    Through these results, the heaps that have issues with forwarding and forwarded
    records can be identified. The first columns to pay attention to are `page_count`
    and `record_count`. Heaps with many records with forwarded record issues will
    be more important than those with few rows. It is worthwhile to focus on those
    tables that will provide the greatest relief to forwarded records when investigating
    this counter. The columns `forwarded_record_count` and `forwarded_fetch_count`
    provide a count of the number of records in a table that have been forwarded and
    the number of times those forwarded records have been accessed, respectively.
    These columns provide a scope to the size of the problem. The last columns to
    look at are `forwarded_record_pct` and `forwarded_row_ratio`. These columns detail
    the percentage of columns that are forwarded and how many times each of the forwarded
    rows has been accessed.


    In the example table, the statistics indicate that there is an issue with forwarded
    records. The table has more than 16 percent of its rows forwarded. Each of these
    rows has been accessed three times, based on the forwarded_fetch_count. From the
    code sample, there have been only three queries executed on the table, meaning
    that every time there has been data access, all forwarded rows are being accessed.
    When analyzing the indexes in this database, mitigating the forwarded records
    for this table would be worthwhile. Do pay special attention to whether forwarded
    records are being accessed. Mitigating forwarded records on a table that has very
    high forwarded records but no forwarded record access would not be worth the effort
    and would have no impact on the Forwarded Records/sec counter.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig1_HTML.png)


    A table with 9 column and a row. The column headers are no column name, object
    name, page count, average page space used in percent, record count, forwarded
    record count, forwarded fetch count, forwarded record p c t., and forwarded row
    ratio.


    Figure 16-1


    Forwarded record snapshot query results


    When heaps that have forwarded record issues have been identified, there are generally
    two ways in which the forwarded record can be mitigated. The first approach is
    to change the data types for the columns that are variable to fixed-length data
    types. For instance, the `varchar` data type would be changed to `char`. This
    approach is not always ideal since it can result in more space being required
    by the table, and some queries may not accommodate the extra space at the end
    of character fields and could return incorrect results. The second option is to
    add a clustered index to the table, which would remove the heap as the organizational
    method for storing data in the table. The downside to this approach is in identifying
    the appropriate key column to cluster the table on. If there is a primary key
    on the table, it can usually suffice as the clustered index key. There is a third
    option available: the heap can be rebuilt, which will rewrite the heap back to
    the database file and remove all forwarded records (using the script in Listing [16-4](#338675_4_En_16_Chapter.xhtml#PC4)).
    This is generally considered a poor approach to resolving forwarded records in
    heaps since it does not provide a meaningful permanent fix to the issue. It is
    important to consider that forwarded records are not necessarily bad. They do,
    though, provide a potential performance challenge when the ratio of operations
    for forwarded records starts to increase when compared to batch requests.


    ```

    USE AdventureWorks2017

    GO

    ALTER TABLE dbo.HeapExample REBUILD

    Listing 16-4

    Rebuild Heap Script

    ```'
