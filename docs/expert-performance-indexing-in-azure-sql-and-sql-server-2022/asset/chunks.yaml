    locks. The lock wait count provides scope around the frequency of incompatible
    locks on the tables and the duration of those locks, though the details of the
    locks themselves are not identified.'
  trans: '

    ## 行锁


    第一组列由行锁列组成。这些列包括 `row_lock_count`、`row_lock_wait_count` 和 `row_lock_wait_in_ms`。通过这些列，可以衡量在行上发生的锁的数量，以及在获取行锁时是否存在争用。行锁争用通常可以通过其对事务性能的影响（如阻塞和死锁）来观察。


    为了演示如何收集这些信息，请执行清单 5-29 中的代码。在此脚本中，根据 `ProductID` 从 `Sales.SalesOrderDetail` 表中检索行。在
    `AdventureWorks2017` 数据库中，该查询检索到 44 行。


    ```sql

    USE AdventureWorks2017

    GO

    ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 710;

    Listing 5-29

    用于生成行锁的 T-SQL 脚本

    ```


    要观察查询获取的行锁，请使用清单 5-30 提供的查询中的行锁列。在这些结果中，对于查询 `Sales.SalesOrderDetail` 所返回的每一行，在
    `sys.dm_db_index_operational_stats` 的结果中都有一把锁，如图 5-21 所示。因此，在索引 `IX_SalesOrderDetail_ProductID`
    上总共放置了 44 把行锁。


    ![](img/338675_4_En_5_Fig21_HTML.png)


    一个显示行锁查询表结果的截图，包含 3 行数据。列标题为表名、索引名、页锁计数、页锁等待计数和页锁等待毫秒数。


    图 5-21


    行锁的查询结果


    请注意，`row_lock_wait_count` 和 `row_lock_wait_in_ms` 列没有返回任何信息。这是因为该脚本未被任何其他查询阻塞。如果清单
    5-29 中的查询被另一个事务阻塞，那么这些列中的值将会相应调整以反映该阻塞。


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.row_lock_count

    ,ios.row_lock_wait_count

    ,ios.row_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-30

    查询 sys.dm_db_index_operational_stats 中的行锁

    ```


    ## 页锁


    下一组列是页锁列。这组列具有与行锁列相似的特征，不同之处在于它们的作用范围是页级别而非行级别。对于访问的行所涉及的每一个页，都会获取一把页锁。这些列是 `page_lock_count`、`page_lock_wait_count`
    和 `page_lock_wait_in_ms`。在监控索引上的锁争用时，同时查看页级别和行级别非常重要，以确定争用是发生在被访问的各个行上，还是发生在同一页上的不同行上。


    为了查看差异，请继续使用清单 5-29 的查询，并检索该查询在 `sys.dm_db_index_operational_stats` 中收集到的页锁统计信息。此信息可使用清单
    5-31 中的脚本获取。结果与行锁的结果略有不同。对于页锁，请参见图 5-22；在索引 `IX_SalesOrderDetail_ProductID` 上只有两把页锁。此外，在
    `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上有 44 把页锁，该索引并未遇到任何行锁。


    ![](img/338675_4_En_5_Fig22_HTML.png)


    一个显示页锁查询表结果的截图，包含 3 行数据。列标题为表名、索引名、索引锁升级尝试计数和索引锁升级计数。


    图 5-22


    页锁的查询结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.page_lock_count

    ,ios.page_lock_wait_count

    ,ios.page_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-31

    查询 sys.dm_db_index_operational_stats 中的页锁

    ```


    锁行为的统计信息起初可能不太容易理解，直到考虑查询（来自清单 5-29）执行时发生的活动。查询执行时，它使用了索引查找和键查找（执行计划见图 5-23）。在
    `IX_SalesOrderDetail_ProductID` 上的索引查找解释了那 2 把页锁和 44 把行锁。有 44 行符合查询的谓词条件，并且它们分布在
    2 个页上。在 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 上的 44 把页锁是对 `IX_SalesOrderDetail_ProductID`
    中所有行进行键查找操作的结果。行锁和页锁列共同帮助描述了发生的活动。


    ![](img/338675_4_En_5_Fig23_HTML.jpg)


    一个 SELECT 查询计划执行的流程图。执行一个查询。执行成本为 2% 的查找和成本为 98% 的键查找条件。它流向成本为 0% 的嵌套循环和成本为 0%
    的 SELECT 以进行显示。


    图 5-23


    SELECT 查询的执行计划


    虽然行锁和页锁对于识别是否存在争用很有用，但锁有一个方面它并未提供：正在放置的锁的类型。这些锁可能是共享锁，也可能是排他锁。锁等待计数提供了关于表上不兼容锁的频率和这些锁持续时间的范围信息，但锁本身的细节并未被识别出来。

    '
- fmt: '## Lock Escalation


    关于锁争用需要讨论的最后一部分是数据库中发生的锁升级数量。当一个事务获取的锁数量超过 SQL Server 实例上的锁阈值时，锁将升级到下一个更高级别。这种升级可能发生在页、分区和表级别。数据库上发生锁升级的原因有很多。一是锁需要内存，因此锁越多，所需的内存越多，管理锁所需的资源也越多。另一个原因是，许多单独的低级别锁为阻塞升级为死锁提供了机会。由于这些原因，锁升级对于考虑对象争用非常重要。


    为了帮助理解锁升级，之前的一个演示查询将被稍作修改。将不再选择 44 行，而是更新所有 `ProductID` 小于或等于 712 的行（参见清单 [5-32](#338675_4_En_5_Chapter.xhtml#PC32)）。更新会将
    `ProductID` 更改为当前值，因此实际上不更改任何数据值，但仍会引发更新操作。


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    Listing 5-32

    T-SQL Script to Generate Lock Promotion

    ```


    清单 [5-33](#338675_4_En_5_Chapter.xhtml#PC33) 中的脚本可用于检查 `sys.dm_db_index_operational_stats`
    中的统计信息，以查看是否发生过任何锁升级。如脚本输出所示（图 [5-24](#338675_4_En_5_Chapter.xhtml#Fig24)），列 `index_lock_promotion_attempt_count`
    为 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID` 和 `IX_SalesOrderDetail_ProductID`
    记录了四个事件。因此，触发了四次锁升级的机会。列 `index_lock_promotion_count` 显示 `IX_SalesOrderDetail_ProductID`
    上有一次锁升级。对于这两个索引，SQL Server 考虑锁升级是否适用于该查询的情况发生了四次。在第四次检查 `IX_SalesOrderDetail_ProductID`
    时，SQL Server 确定需要锁升级，于是锁被升级。


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig24_HTML.png)


    A screenshot of the query table results for lock escalation with 3 rows of data.
    The column headers are table name, index name, index lock promotion attempt count,
    index lock promotion count.


    图 5-24


    锁升级查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-33

    Query for Lock Escalation in sys.dm_db_index_operational_stats

    ```


    监控锁升级与监控行和页锁是相辅相成的。当行和页锁争用增加时（无论是通过增加频率还是锁等待持续时间），评估锁升级有助于识别 SQL Server 考虑升级锁的次数以及这些锁何时被升级。在某些表索引不当的情况下，锁升级可能更频繁地发生，并导致阻塞和死锁增加。


    ### Latch Contention


    除了锁，索引中也可能发生闩锁争用。闩锁是短的、轻量级的数据同步控制。从高层看，闩锁允许在活动执行时对内存对象进行隔离。闩锁的一个例子是将数据从磁盘传输到内存时。如果在此过程中存在磁盘瓶颈，闩锁等待会在磁盘传输完成时累积。这些信息的价值在于，当发生闩锁等待时，表
    [5-16](#338675_4_En_5_Chapter.xhtml#Tab16) 中显示的列提供了一种机制，可以将等待跟踪到特定索引，从而允许在索引作为其管理的一部分存储的位置上进行重点优化。


    表 5-16


    sys.dm_db_index_operational_stats 中的闩锁活动列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_latch_wait_count` | `bigint` | 因闩锁争用导致数据库引擎等待的累计次数。 |

    | `page_latch_wait_in_ms` | `bigint` | 因闩锁争用导致数据库引擎等待的累计毫秒数。 |

    | `page_io_latch_wait_count` | `bigint` | 数据库引擎在 I/O 页闩锁上等待的累计次数。 |

    | `page_io_latch_wait_in_ms` | `bigint` | 数据库引擎在页 I/O 闩锁上等待的累计毫秒数。 |

    | `tree_page_latch_wait_count` | `bigint` | 仅包含上层 B 树页的 `page_latch_wait_count`
    子集。对于堆始终为 0。 |

    | `tree_page_latch_wait_in_ms` | `bigint` | 仅包含上层 B 树页的 `page_latch_wait_in_ms`
    子集。对于堆始终为 0。 |

    | `tree_page_io_latch_wait_count` | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_count`
    子集。对于堆始终为 0。 |

    | `tree_page_io_latch_wait_in_ms` | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_in_ms`
    子集。对于堆始终为 0。 |'
  raw: '#### Lock Escalation


    The last piece with locking contention to discuss is the amount of lock escalation
    that is occurring in the database. When the number of locks acquired for a transaction
    exceeds the locking threshold on a SQL Server instance, the locks will escalate
    to the next higher level of locking. This escalation can happen at the page, partition,
    and table levels. There are a number of reasons for escalating locks on a database.
    One is that locks require memory, so the more locks there are, the more memory
    is required and the more resources are needed to manage locks. Another reason
    is that many individual low-level locks open the opportunity for blocking to escalate
    into deadlocking. For these reasons, lock escalations are important to consider
    with regard to object contention.


    To help provide an understanding of lock escalation, a demo query from earlier
    will be modified slightly. Instead of selecting 44 rows, all rows where `ProductID`
    is less than or equal to 712 (see Listing [5-32](#338675_4_En_5_Chapter.xhtml#PC32))
    will be updated. The update will change `ProductID` to its current value, therefore
    not actually changing any data values, but still incurring update operations.


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    Listing 5-32

    T-SQL Script to Generate Lock Promotion

    ```


    The script in Listing [5-33](#338675_4_En_5_Chapter.xhtml#PC33) can be used to
    review the statistics in `sys.dm_db_index_operational_stats` to see whether there
    were any lock escalations. As the output from the script shows (Figure [5-24](#338675_4_En_5_Chapter.xhtml#Fig24)),
    the column `index_lock_promotion_attempt_count` recorded four events for `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    and `IX_SalesOrderDetail_ProductID`. Therefore, there were four opportunities
    for lock escalation that were triggered. The column `index_lock_promotion_count`
    shows that there was one lock escalation on `IX_SalesOrderDetail_ProductID`. For
    the two indexes, there were four instances when SQL Server considered whether
    a lock escalation was appropriate for the query. At the fourth check on `IX_SalesOrderDetail_ProductID`,
    SQL Server determined that a lock escalation was needed, and the lock was escalated.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig24_HTML.png)


    A screenshot of the query table results for lock escalation with 3 rows of data.
    The column headers are table name, index name, index lock promotion attempt count,
    index lock promotion count.


    Figure 5-24


    Query results for lock escalation


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-33

    Query for Lock Escalation in sys.dm_db_index_operational_stats

    ```


    Monitoring lock escalation goes hand in hand with monitoring row and page locks.
    When row and page lock contention increases, either through increased frequency
    or through duration of lock waits, evaluating lock escalation can help identify
    the number of times SQL Server considered escalating locks and when those locks
    have been escalated. In some scenarios where tables are improperly indexed, locks
    can escalate more frequently and lead to increased blocking and deadlocking.


    ### Latch Contention


    In addition to locking, latch contention can also occur in indexes. Latches are
    short, lightweight data synchronization controls. From a high level, latches allow
    for isolation on memory objects while activities are executing. One example of
    a latch is when data is transferred from disk to memory. If there are disk bottlenecks
    while this occurs, latch waits will accumulate while the disk transfer completes.
    The value in this information is that when latch waits are occurring, the columns
    (shown in Table [5-16](#338675_4_En_5_Chapter.xhtml#Tab16)) provide a mechanism
    to track the waits down to specific indexes, thus allowing for focus on where
    indexes are stored as part of their management.


    Table 5-16


    Latch Activity Columns in sys.dm_db_index_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `page_latch_wait_count` | `bigint` | Cumulative number of times the database
    engine waited because of latch contention. |

    | `page_latch_wait_in_ms` | `bigint` | Cumulative number of milliseconds the database
    engine waited because of latch contention. |

    | `page_io_latch_wait_count` | `bigint` | Cumulative number of times the database
    engine waited on an I/O page latch. |

    | `page_io_latch_wait_in_ms` | `bigint` | Cumulative number of milliseconds the
    database engine waited on a page I/O latch. |

    | `tree_page_latch_wait_count` | `bigint` | Subset of `page_latch_wait_count`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_latch_wait_in_ms` | `bigint` | Subset of `page_latch_wait_in_ms`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_io_latch_wait_count` | `bigint` | Subset of `page_io_latch_wait_count`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |

    | `tree_page_io_latch_wait_in_ms` | `bigint` | Subset of `page_io_latch_wait_in_ms`
    that includes only the upper-level B-tree pages. This is always 0 for a heap.
    |'
  trans: '

    ## 锁升级


    关于锁争用需要讨论的最后一部分是数据库中发生的锁升级数量。当一个事务获取的锁数量超过 SQL Server 实例上的锁阈值时，锁将升级到下一个更高级别。这种升级可能发生在页、分区和表级别。数据库上发生锁升级的原因有很多。一是锁需要内存，因此锁越多，所需的内存越多，管理锁所需的资源也越多。另一个原因是，许多单独的低级别锁为阻塞升级为死锁提供了机会。由于这些原因，锁升级对于考虑对象争用非常重要。


    为了帮助理解锁升级，之前的一个演示查询将被稍作修改。将不再选择 44 行，而是更新所有 `ProductID` 小于或等于 712 的行（参见清单 5-32）。更新会将
    `ProductID` 更改为当前值，因此实际上不更改任何数据值，但仍会引发更新操作。


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET ProductID = ProductID

    WHERE ProductID <= 712

    清单 5-32

    用于生成锁升级的 T-SQL 脚本

    ```


    清单 5-33 中的脚本可用于检查 `sys.dm_db_index_operational_stats` 中的统计信息，以查看是否发生过任何锁升级。如脚本输出所示（图
    5-24），列 `index_lock_promotion_attempt_count` 为 `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    和 `IX_SalesOrderDetail_ProductID` 记录了四个事件。因此，触发了四次锁升级的机会。列 `index_lock_promotion_count`
    显示 `IX_SalesOrderDetail_ProductID` 上有一次锁升级。对于这两个索引，SQL Server 考虑锁升级是否适用于该查询的情况发生了四次。在第四次检查
    `IX_SalesOrderDetail_ProductID` 时，SQL Server 确定需要锁升级，于是锁被升级。


    ![](img/338675_4_En_5_Fig24_HTML.png)


    一张包含 3 行数据的锁升级查询结果表截图。列标题为表名、索引名、索引锁升级尝试次数、索引锁升级次数。


    图 5-24


    锁升级查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.index_lock_promotion_attempt_count

    ,ios.index_lock_promotion_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    清单 5-33

    查询 sys.dm_db_index_operational_stats 中的锁升级

    ```


    监控锁升级与监控行和页锁是相辅相成的。当行和页锁争用增加时（无论是通过增加频率还是锁等待持续时间），评估锁升级有助于识别 SQL Server 考虑升级锁的次数以及这些锁何时被升级。在某些表索引不当的情况下，锁升级可能更频繁地发生，并导致阻塞和死锁增加。


    ### 闩锁争用


    除了锁，索引中也可能发生闩锁争用。闩锁是短的、轻量级的数据同步控制。从高层看，闩锁允许在活动执行时对内存对象进行隔离。闩锁的一个例子是将数据从磁盘传输到内存时。如果在此过程中存在磁盘瓶颈，闩锁等待会在磁盘传输完成时累积。这些信息的价值在于，当发生闩锁等待时，表
    5-16 中显示的列提供了一种机制，可以将等待跟踪到特定索引，从而允许在索引作为其管理的一部分存储的位置上进行重点优化。


    表 5-16


    sys.dm_db_index_operational_stats 中的闩锁活动列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_latch_wait_count` | `bigint` | 因闩锁争用导致数据库引擎等待的累计次数。 |

    | `page_latch_wait_in_ms` | `bigint` | 因闩锁争用导致数据库引擎等待的累计毫秒数。 |

    | `page_io_latch_wait_count` | `bigint` | 数据库引擎在 I/O 页闩锁上等待的累计次数。 |

    | `page_io_latch_wait_in_ms` | `bigint` | 数据库引擎在页 I/O 闩锁上等待的累计毫秒数。 |

    | `tree_page_latch_wait_count` | `bigint` | 仅包含上层 B 树页的 `page_latch_wait_count`
    子集。对于堆始终为 0。 |

    | `tree_page_latch_wait_in_ms` | `bigint` | 仅包含上层 B 树页的 `page_latch_wait_in_ms`
    子集。对于堆始终为 0。 |

    | `tree_page_io_latch_wait_count` | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_count`
    子集。对于堆始终为 0。 |

    | `tree_page_io_latch_wait_in_ms` | `bigint` | 仅包含上层 B 树页的 `page_io_latch_wait_in_ms`
    子集。对于堆始终为 0。 |

