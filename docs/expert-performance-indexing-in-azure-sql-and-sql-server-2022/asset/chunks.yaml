    ![](img/338675_4_En_13_Fig10_HTML.png)


    一个面板，其中打开了执行计划选项卡，查询 1 有 2 行文本，占批处理成本的 61%。下方是一个流程图，展示了多条路径，即索引查找、工作角色、索引查找、员工工作角色
    I C P、键查找、员工工作角色 I C P 和聚集索引查找、员工，成本分别为 11%、11%、16%和 36%，最终指向成本为 0%的端点 select。


    图 13-10

    标识列模式的执行计划


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

