    清单 11-7


    导致碎片化的 UPDATE 操作


    索引可能产生碎片化的第二种方式是通过更改索引的键值。当索引的键值更改时，记录可能需要更改其在索引中的位置。例如，如果索引是基于产品名称构建的，那么将名称从
    Acme Mop 更改为 XYZ Mop 将改变产品名称在索引排序中的位置。更改记录在索引中的位置可能会将其放置在不同的页面上，如果新页面上没有足够的空间，则会发生页面拆分和碎片化。


    为了演示这个概念，请执行清单 11-8，然后使用清单 11-6 获取图 11-7 所示的结果。对于新的非聚集索引，目前没有碎片。


    注意


    如果聚集索引的键值经常更改，这可能表明为聚集索引选择的键值不合适。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UpdateOperations(Name) INCLUDE (JunkValue);

    ```


    清单 11-8


    为 UPDATE 操作创建非聚集索引


    ![图 11-7：添加非聚集索引后的 UPDATE 碎片化结果。新增的 3 个非聚集索引没有碎片。](img/338675_4_En_11_Fig7_HTML.png)


    图 11-7


    添加非聚集索引后的 UPDATE 碎片化结果


    此时，需要修改一些键值。使用清单 11-9，对表执行 `UPDATE` 操作，每九行更新一行。为了模拟更改键值，`UPDATE` 语句反转了列中的字符。这么少量的活动足以导致大量的碎片化。如图
    11-8 的结果所示，非聚集索引从没有碎片变成了超过 30% 的碎片。


    需要注意的一点是，聚集索引上的碎片没有随着这些更新而改变。并非所有更新都会导致碎片化。只有那些因为记录当前存储的页面上空间不足而导致数据移动的更新才会产生碎片化。


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET Name = REVERSE(Name)

    WHERE RowID % 9 = 1

    ```


    清单 11-9


    用于更改索引键值的 UPDATE 操作


    ![图 11-8：更改索引键值后的 UPDATE 碎片化结果。两个非聚集索引的平均碎片率分别为 29.45% 和 66.67%。](img/338675_4_En_11_Fig8_HTML.png)


    图 11-8


    更改索引键值后的 UPDATE 碎片化结果'
- fmt: '### Delete Operations


    The third type of operation that can cause fragmentation is the `DELETE` operation.
    Deletes are a bit different in nature in that they create fragmentation within
    a database. Instead of relocating pages because of page splits, a delete can lead
    to pages being removed from an index. Gaps will then appear in the physical sequence
    of pages for the index. Since the pages are no longer physically sequential, they
    are considered fragmented. This is significant since once the pages are deallocated
    from the index, they can be reallocated to other indexes, comprising a more traditional
    form of fragmentation.


    To demonstrate this type of behavior, create a table, populate it with a number
    of records, and then add a clustered index. The script for these tasks is shown
    in Listing 11-10. Run the script followed by the script from Listing 11-11 to
    get the current fragmentation for the clustered index. The results should match
    those in Figure 11-9. The average fragmentation (as a percent column (`avg_fragmentation_in_percent`))
    shows that there is no fragmentation currently in the index.


    ![Figure 11-9](images/338675_4_En_11_Chapter/338675_4_En_11_Fig9_HTML.png)


    *A table has 9 columns and 2 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. Average fragmentation for both clustered indexes is 0.*


    **Figure 11-9** Fragmentation results before DELETE operation


    ```sql

    Listing 11-11 View DELETE Index Fragmentation

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.DeleteOperations''),NULL,NULL,''DETAILED'')

    ```


    ```sql

    Listing 11-10 Creating a Table for DELETE Operation

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.DeleteOperations'') IS NOT NULL

    DROP TABLE dbo.DeleteOperations;

    CREATE TABLE dbo.DeleteOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.DeleteOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.DeleteOperations(RowID);

    ```


    To demonstrate fragmentation caused by `DELETE` operations, every other 50 records
    in the table will be deleted using the code in Listing 11-12. As before, Listing
    11-11 will be used to view the state of fragmentation in the index. The results,
    shown in Figure 11-10, indicate that the `DELETE` operation resulted in about
    13 percent fragmentation. With `DELETE` operations, the rate at which fragmentation
    usually occurs is not too fast. Also, since the fragmentation is not the result
    of page splits, the order of the pages does not become physically out of order.
    Instead, there are gaps in the contiguous pages. However, pages left empty could
    be reused in future `INSERT` and `UPDATE` transactions, which could result in
    the pages being physically out of order.


    ![Figure 11-10](images/338675_4_En_11_Chapter/338675_4_En_11_Fig10_HTML.png)


    *A table has 9 columns and 2 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. The average fragmentation is 12.42%.*


    **Figure 11-10** Fragmentation results after DELETE


    ```sql

    Listing 11-12 Performing DELETE Operation

    USE AdventureWorks2017

    GO

    DELETE dbo.DeleteOperations

    WHERE RowID % 100 BETWEEN 1 AND 50

    ```


    Note that fragmentation resulting from delete operations may not appear immediately
    after a `DELETE` operation is executed. When records are to be deleted, they are
    first marked for deletion before the record itself is actually deleted. While
    it is marked for deletion, the record is considered to be a ghost record. During
    this stage, the record is logically deleted but is physically still present in
    the index. At a future point, after the transaction has been committed and a `CHECKPOINT`
    has completed, the ghost cleanup process will physically remove the row. At this
    time, the fragmentation will become visible in the index.'
