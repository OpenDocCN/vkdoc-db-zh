    一张表有 5 列，标签为 object id、name、mode、timestamp 和 sql text，共 9 行。三个弯曲的双头箭头分别指向两对 SCH_S、S
    和 SCH_S 模式的条目，表示锁的获取和释放。


    图 10-2

    使用 ONLINE 选项创建索引


    对于默认的索引创建（不使用 `ONLINE` 选项），`S` 锁在整个索引构建期间都保持。如图 10-3 所示，`S` 锁在 `SCH_S` 锁之前被获取，并且直到索引构建完成后才释放。结果是在索引构建期间索引不可用。


    ![图 10-3. 不使用 ONLINE 选项创建索引](img/338675_4_En_10_Fig3_HTML.png)


    一张表有 5 列，标签为 object id、name、mode、timestamp 和 sql text，共 7 行。三个弯曲的双头箭头分别指向两对 SCH_S、S（其变量间距更大）和
    SCH_S 模式的条目，表示锁的获取和释放。


    图 10-3

    不使用 ONLINE 选项创建索引


    ### 误区 4：在多列索引中，任何列都可以被过滤


    关于索引的下一个常见误区是，无论列在索引中的位置如何，索引都可以在有序搜索中使用该列来过滤表中的数据。与本章到目前为止讨论的其他误区一样，这个也是不正确的。索引不一定需要使用索引中的所有列。但是，在执行有序搜索时，它需要从索引中最左边的列开始，并按从左到右的顺序使用索引中的列。这就是为什么索引中列的顺序至关重要。


    为了演示这个误区，将展示几个例子，如清单 10-9 所示。在脚本中，基于 `Sales.SalesOrderHeader` 创建一个表，其主键为 `SalesOrderID`。为了测试通过多列索引搜索所有列的误区，创建了一个包含
    `OrderDate`、`DueDate` 和 `ShipDate` 列的索引。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFour'') IS NOT NULL

    DROP TABLE dbo.MythFour

    GO

    SELECT SalesOrderID, OrderDate, DueDate, ShipDate

    INTO dbo.MythFour

    FROM Sales.SalesOrderHeader;

    GO

    ALTER TABLE dbo.MythFour

    ADD CONSTRAINT PK_MythFour PRIMARY KEY CLUSTERED (SalesOrderID);

    GO

    CREATE NONCLUSTERED INDEX IX_MythFour ON dbo.MythFour (OrderDate, DueDate, ShipDate);

    GO

    ```

    清单 10-9

    多列索引误区


    测试对象就位后，接下来要观察的是可能使用该非聚集索引的查询行为。首先，将测试一个使用索引中最左列的查询。清单 10-10 给出了该代码。如图 10-4 所示，通过对最左列进行筛选，查询在
    `IX_MythFour` 上使用了 seek 操作。


    ![图 10-4. 在索引的最左列上过滤时的执行计划](img/338675_4_En_10_Fig4_HTML.jpg)


    一个打开的执行计划选项卡面板包含 2 行关于 order date 的文本，位于查询 1 下，查询成本（相对于批处理）为 100%。下方是一个流程图，将 index
    seek, nonclustered, myth four（成本 100%）连接到 select（成本 0%）。


