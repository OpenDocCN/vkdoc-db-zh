- fmt: '# Prepare a Table for sys.dm_db_stats_properties Review


    `USE AdventureWorks2017`

    `GO`

    `DROP TABLE IF EXISTS dbo.SalesOrderHeaderStats;`

    `SELECT SalesOrderID`

    `,OrderDate`

    `,SalesOrderNumber`

    `INTO dbo.SalesOrderHeaderStats`

    `FROM Sales.SalesOrderHeader`

    `WHERE SalesOrderID <= 63658`

    `CREATE CLUSTERED INDEX CIX_SalesOrderHeaderStats`

    `ON dbo.SalesOrderHeaderStats(SalesOrderID)`

    `CREATE INDEX CIX_SalesOrderHeaderStats_OrderDate`

    `ON dbo.SalesOrderHeaderStats(OrderDate)`

    `CREATE INDEX CIX_SalesOrderHeaderStats_SalesOrderNumber`

    `ON dbo.SalesOrderHeaderStats(SalesOrderNumber)`


    With a table to work with, changes can be made to the data in the table and the
    impact of those changes observed in statistics. For the examples, five different
    queries will be used, provided in Listing 5-8. The first updates the `OrderDate`
    column resulting in 40 rows changed. The second query updates 50 rows where the
    `SalesOrderNumber` is set to its current value. The third query updates the `SalesOrderNumber`
    column again but reverses the value for the same 50 rows. The fourth query inserts
    11,465 records into the table. The final query deletes the first 20,000 records
    from the table. Between each of these queries, execute the code in Listing 5-7;
    doing so will provide statistics detail, as shown in the output in Figure 5-6.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Query results for `sys.dm_db_stats_properties` for sample queries
    on `dbo.SalesOrderHeaderStats`


    # Sample DML Queries on dbo.SalesOrderHeaderStats


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.SalesOrderHeaderStats

    set OrderDate = GETDATE()

    WHERE SalesOrderID % 500 = 1

    --execute code in Listing 5-7

    UPDATE dbo.SalesOrderHeaderStats

    SET SalesOrderNumber = SalesOrderNumber

    WHERE SalesOrderID % 400 = 1

    --execute code in Listing 5-7

    UPDATE dbo.SalesOrderHeaderStats

    SET SalesOrderNumber = REVERSE(SalesOrderNumber)

    WHERE SalesOrderID % 400 = 1

    --execute code in Listing 5-7

    SET IDENTITY_INSERT dbo.SalesOrderHeaderStats ON

    INSERT INTO dbo.SalesOrderHeaderStats (SalesOrderID

    ,OrderDate

    ,SalesOrderNumber)

    SELECT SalesOrderID

    ,OrderDate

    ,SalesOrderNumber

    FROM Sales.SalesOrderHeader

    WHERE SalesOrderID > 63658

    SET IDENTITY_INSERT dbo.SalesOrderHeaderStats OFF

    --execute code in Listing 5-7

    DELETE FROM dbo.SalesOrderHeaderStats

    WHERE SalesOrderID <= 63658

    --execute code in Listing 5-7

    ```


    Reviewing the results in Figure 5-6 provides some interesting insight into how
    the `modification_counter` column is populated. Any insert, update, or delete
    is considered a single change for the index and statistics. Looking at the results
    for query 1, the 40 rows changed the result in `modification_counter` for `CIX_SalesOrderHeaderStats_OrderDate`
    to increase to 40. Similarly, when `SalesOrderNumber` was changed in queries 2
    and 3, each query resulted in an increase of 50 to `modification_counter`, whether
    the value changed or not. Increasing the number of records caused all three indexes
    to increase the `modification_counter` value by 11,465, which coincides with the
    number of records inserted. Finally, in the query 5 results, 20,000 records were
    deleted. Interestingly enough, in the results for the last query, the statistics
    from `CIX_SalesOrderHeaderStats` were updated to better reflect the changes in
    values in the index.


    While `sys.dm_db_stats_properties` doesn’t provide a list of all distinct records
    in a table and the impact that might have on statistics, it does provide details
    that identify the volume of change on an index and the statistics that support
    it. When trying to determine whether an index has statistics that may be out of
    date, this DMO is extremely useful.


    ## sys.dm_db_stats_histogram


    While getting the histogram for statistics can be done with `DBCC SHOW_STATISTICS`,
    SQL Server 2016 introduced the DMO function `sys.dm_db_stats_histogram`. This
    function returns output similar to the `DBCC` command with the added benefit that
    it can be joined with other DMOs to increase the usability of the data. The syntax
    for the function, shown in Listing 5-9, accepts an `object_id` and `stats_id`
    with the columns listed in Table 5-7 returned in the output.


    ### Table 5-7

    Columns for `sys.dm_db_stats_histogram`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the underlying object that the stats belong to.
    |

    | `stats_id` | `int` | ID of the statistics. For indexes, the ID matches the index
    ID. |

    | `step_number` | `int` | Number of steps in the histogram. Max value is 200.
    |

    | `range_high_key` | `sql_variant` | Upper-bound column value for a histogram
    step. The column value is also called a *key value*. |

    | `range_rows` | `real` | Estimated number of rows whose column value falls within
    a histogram step, excluding the upper bound. |

    | `equal_rows` | `real` | Estimated number of rows whose column value equals the
    upper bound of the histogram step. |

    | `distinct_range_rows` | `bigint` | Estimated number of rows with a distinct
    column value within a histogram step, excluding the upper bound. |

    | `average_range_rows` | `real` | Average number of rows with duplicate column
    values in the histogram step, excluding the upper bound (`range_rows/distinct_range_rows
    for distinct_range_rows > 0`). |


    ### Listing 5-9

    Syntax for `sys.dm_db_stats_histogram`


    ```sql

    sys.dm_db_stats_histogram (object_id, stats_id)

    ```


    If `sys.stats` is combined with `sys.dm_db_stats_histogram`, as is done in Listing
    5-10, a histogram for all statistics on `Sales.SalesOrderDetail` can be retrieved.
    This provides information on all steps and their range values. Scroll through
    the results, shown in Figure 5-7, to rows 163 and 164 to see where the `range_high_key`
    value changes from numeric to character data with the change between the statistics
    and steps.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig7_HTML.png)


    **Figure 5-7** Query results for `sys.dm_db_stats_histogram` on `Sales.SalesOrderDetail`


    ### Listing 5-10

    `sys.dm_db_stats_histogram` Query for `Sales.SalesOrderDetail`


    ```sql

    USE AdventureWorks2017;

    GO

    SELECT h.object_id,

    h.stats_id,

    h.step_number,

    h.range_high_key,

    h.range_rows,

    h.equal_rows,

    h.distinct_range_rows,

    h.average_range_rows

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_histogram(s.object_id, s.stats_id) h

    WHERE s.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    ```


    This new function is an excellent tool to view and inspect histograms. For example,
    if there were multiple indexes and statistics on a column, a query could be written
    that includes just those statistics and filter the `range_high_key` to only include
    the steps that match the records needed. At that point, the `average_range_rows`
    are available and provide an understanding of why SQL Server may have chosen one
    index over another.'
