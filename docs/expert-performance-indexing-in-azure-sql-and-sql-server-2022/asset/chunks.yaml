    | reserved_bytes_by_xdes_id | Space contributed by m_xdesID to m_reservedCnt |

    | xdes_id | Latest transaction contributed by m_reserved |


    This header information is quite extensive and can be used to identify how pages
    are interrelated between different structures, such as PFS pages, or use it to
    inspect pages to verify checksum, number of slots, or free space. The code in
    Listing [3-7](#338675_4_En_3_Chapter.xhtml#PC7) retrieves all page allocations
    for the two previously created tables, including page header information for all
    of the assigned pages.


    ```

    USE Chapter2Internals;

    GO

    SELECT T.name,

    DPA.page_type_desc,

    DPI.page_id,

    DPI.pfs_page_id,

    DPI.gam_page_id,

    DPI.sgam_page_id,

    DPI.diff_map_page_id,

    DPI.ml_map_page_id,

    DPI.prev_page_page_id,

    DPI.next_page_page_id,

    DPI.fixed_length,

    DPI.slot_count,

    DPI.free_bytes

    FROM sys.dm_db_database_page_allocations(DB_ID(), NULL, NULL, NULL, ''DETAILED'')
    DPA

    INNER JOIN sys.tables T ON T.object_id = DPA.object_id

    CROSS APPLY sys.dm_db_page_info(DPA.database_id, DPA.allocated_page_file_id, DPA.allocated_page_page_id,
    DEFAULT) DPI;

    Listing 3-7

    Query Using sys.dm_db_page_info

    ```


    Once executed, results will be returned that are similar to those in Figure [3-4](#338675_4_En_3_Chapter.xhtml#Fig4).
    The results show the same previous and next page connections for dbo.IndexInternalsTwo,
    but no page IDs listed for dbo.IndexInternalsOne. Additionally, the PFS, GAM,
    SGAM, DIFF, and ML pages are identified for both tables, which are the same since
    the database is smaller than the threshold required for having multiples of these
    page types. Also shown are the number of slots, length, and free bytes per page.
    Of note is page 329, which is the index page for dbo.IndexInternalsTwo, that has
    six slots, one for each page that the index page manages in the clustered index.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig4_HTML.jpg)


    A screenshot of a query table results of page header with 26 rows of data. The
    column headers are name, page type d e s c, page i d, p f s page i d, g a m page
    i d, a g a m page id, d i f f map page i d, m l map page i d, p r e v page page
    i d, next page page i d, allot count, and free byte.


    Figure 3-4


    Page header results from sys.dm_db_page_info


    ## DBCC Commands


    While exploration of data structures can be done with dynamic management functions,
    there will be some scenarios where further research will be desired. To accomplish
    this in SQL Server, the following DBCC commands can be used:


    *   DBCC EXTENTINFO


    *   DBCC IND


    *   DBCC PAGE'
