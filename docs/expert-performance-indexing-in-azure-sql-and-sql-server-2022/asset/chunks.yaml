- fmt: '## Data Conversion


    One last area where queries can negatively affect how indexes are used is when
    the data types of columns change within a `JOIN` operation or `WHERE` clause.
    When data types do not match in either of those conditions, SQL Server will need
    to convert the values in one column to match the other column. If the data conversion
    is not included in the syntax of the query, SQL Server will attempt the data conversion
    behind the scenes.


    The reason that data conversions can have a negative effect on query performance
    is similar to the issues related to scalar functions. If a column in an index
    needs to be converted from `varchar` to `int`, the statistics for this index will
    not be useful in determining the frequency and location of values. For instance,
    the number `10` and the string `"10"` would be sorted into entirely different
    positions in the same index. To illustrate the effect that data conversions can
    have on a query, start by executing the code in Listing 14-12.


    ```

    USE AdventureWorks2017

    GO

    SELECT BusinessEntityID

    ,CAST(FirstName as varchar(50)) as FirstName

    ,CAST(MiddleName as varchar(50)) as MiddleName

    ,CAST(LastName as varchar(50)) as LastName

    INTO PersonPerson

    FROM Person.Person;

    CREATE CLUSTERED INDEX IX_PersonPerson_ContactID ON PersonPerson (BusinessEntityID);

    CREATE INDEX IX_PersonContact_FirstName ON PersonPerson(FirstName);

    Listing 14-12

    Data Conversion Setup

    ```


    Listing 14-12 will create a table with `varchar` data in it. It will then add
    two indexes to the table that will be used in the demonstration queries. The two
    sample queries, shown in Listing 14-13, will be used to show how data conversions
    can affect the performance and utilization of an index. For both queries, the
    `RECOMPILE` option is being used to prevent inadvertent parameter sniffing.


    Note


    For more information on parameter sniffing, read Paul White’s “Parameter Sniffing,
    Embedding, and the RECOMPILE Options” article on SQLPerformance.com at [`http://sqlperformance.com/2013/08/t-sql-queries/parameter-sniffing-embedding-and-the-recompile-options`](http://sqlperformance.com/2013/08/t-sql-queries/parameter-%25C2%25ADsniffing-%25C2%25ADembedding-and-the-recompile-options).


    The first `SELECT` query uses the `@FirstName` variable with the `nvarchar` data
    type. This data type does not match the data type for the column in the table
    `PersonContact`, so the column in the table must be converted from `varchar` to
    `nvarchar`. The execution plan for the query (Figure 14-21) shows that the query
    is using an index seek on the non-clustered index to satisfy the query, and the
    predicate is converting the data in the column to `nvarchar`, with a key lookup
    on the clustered index for the columns not in the non-clustered index. Also note
    that the cost for the first query is `40 percent` of the total batch, which is
    just the two queries.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    DECLARE @FirstName nvarchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    GO

    DECLARE @FirstName varchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    Listing 14-13

    Implicit Conversion Queries

    ```


    Note


    The additional information shown for the operators in the execution plans is available
    in the Properties window in SQL Server Management Studio. The Properties window
    is full of useful information about the operations from the columns that are used
    for estimated and actual row counts.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig21_HTML.png)


    Figure 14-21: Execution plan with implicit data conversion


    One other item to note in the execution plan in Figure 14-22 is the warning included
    on the `SELECT` operation for the first query. SQL Server 2012 and above include
    detailed warning messages in execution plans that contain implicit conversions.
    The warning message appears as a yellow triangle with an exclamation mark in it.
    Checking the properties for the operator will include details of the operator
    and for the warning message. These messages include information about what column
    is being converted and the issue associated with the problem. In this example,
    the issue is `SeekPlan ConvertIssue`. In other words, SQL Server does not have
    statistics on the converted data to build an execution plan that knows the frequency
    of the values in the predicate.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig22_HTML.png)


    Figure 14-22: Warning included with implicit conversion


    The second `SELECT` query in Listing 14-13 uses a variable with a `varchar` data
    type. Since this data type already matches the data type of the column in the
    table, the non-clustered index can be used. As the execution plan in Figure 14-23
    shows, with matching data types, the query optimizer can build a plan that knows
    where the rows in the index are and can perform a seek to obtain them.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig23_HTML.png)


    Figure 14-23: Execution plan without data conversion


    At first glance, the second execution plan may appear less efficient due to there
    being more operations, higher complexity, and a key lookup, but this is not the
    case. Reviewing the logical reads from `STATISTICS IO`, shown in Figure 14-24,
    allows for a clearer understanding of performance. For the first query, there
    were `89 logical reads` with an index scan on the clustered index. The second
    query had only `18 reads` while accessing two indexes. The difference in I/O is
    attributed to the high number of reads required to scan the clustered index, which
    ends up being greater than the cost of both an index seek and a key lookup.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig24_HTML.png)


    Figure 14-24: STATISTICS I/O for implicit conversion queries


    In this section, the discussion focused on implicit data conversions and the negative
    impact they can have on query performance. While these can be more silent than
    explicit data conversions, the same concepts and mitigations apply. Since they
    are more intentional, they should be less frequent. Even so, when performing data
    conversions, pay close attention to the data types involved because how they are
    changed will impact query performance and index utilization.'
