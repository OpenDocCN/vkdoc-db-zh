  trans: '### 转发记录


    当记录大小超出数据页时，管理记录的第一种方法是使用转发记录。此方法仅适用于使用堆结构的情况。通过转发记录，当某行数据被更新后不再适合当前数据页时，SQL Server
    会将该记录移动到堆中的一个新数据页，并在两个位置之间添加指针。第一个指针标识记录当前所在的数据页，通常称为*转发记录指针*。第二个指针位于新数据页上，指回转发记录原始所在的数据页；它被称为*反向指针*。


    以下是转发操作如何进行的逻辑示例。考虑一个编号为 100 的数据页，它存在于一个使用堆的表上（见图 4-1）。该页上有四行，每行大小约为 2 KB，总共使用了
    8 KB 的空间。如果第二行被更新，现在需要占用 2.5 KB，那么它将不再适合该数据页。SQL Server 会从堆中选择另一个数据页，或在需要时分配一个新数据页（本例中是编号为
    101 的数据页）。然后，第二行被写入该页，并且指向新数据页的指针会替换掉第 100 页上该行的原始位置。


    ![](img/338675_4_En_4_Fig1_HTML.png)


    一个数据流图有 3 个数据页，其中 2 个编号为 100，各有 4 行，1 个编号为 101。数据从第 100 页的第二行转发至第 101 页的第一行，第
    100 页上的第二行更新为指针。


    **图 4-1**

    转发记录过程图


    接下来要考虑的是如何检查表上的记录转发情况。例如，创建一个名为 `dbo.HeapForwardedRecords` 的表，如代码清单 4-1 所示。为了表示此逻辑示例中的行，将使用
    `sys.objects` 向 `dbo.HeapForwardedRecords` 添加 24 行。这些行中的每一行都有一个 `RowID` 来标识它，以及
    2,000 个字符，导致表中每页有四行。可以使用 `sys.dm_db_index_physical_stats` 来验证（见图 4-2）表中共有六页，总计
    24 行。


    ![](img/338675_4_En_4_Fig2_HTML.png)


    一个表格有 5 列和一行数据。第 1 至第 5 列标题分别为：对象 i d、索引类型描述、页数、记录数和转发记录数。选中了对象 i d 660197402，各列内容依次为
    HEAP、6、24 和 0。


    **图 4-2**

    引入转发记录前 `dbo.HeapForwardedRecords` 的物理状态


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.HeapForwardedRecords

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapForwardedRecords (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    **代码清单 4-1** 转发记录场景


    此演示的下一步是在表中创建转发记录。为此，将更新表中每隔一行，将 `FillerData` 的值从 2,000 个字符扩展到 2,500 个字符，如代码清单
    4-2 所示。结果，其中两行将因过大而无法容纳在其所在数据页的剩余空间中。原本要写入 8 KB 页的数据量将增加到大约 9 KB。


    因此，SQL Server 需要将记录移出数据页才能完成更新。由于将其中一行移出数据页将为第二行留出足够空间，因此只有一条记录会被转发。`sys.dm_db_index_physical_stats`
    的输出（见图 4-3）证实了这一点。页数增加到九页，并且有六条记录被记录为已转发。一个特别值得关注的项目是记录数。虽然表中的行数没有增加，但现在表中多了六条额外的记录。这是因为该行的原始记录仍然保留在其原始位置，并带有一个指向其他位置包含该行数据的另一条记录的指针。


    ![](img/338675_4_En_4_Fig3_HTML.png)


    一个表格有 5 列和一行数据。第 1 至第 5 列标题分别为：对象 i d、索引类型描述、页数、记录数和转发记录数。它有 1 条记录，对象 i d 660197402
    被选中，后面各列依次是 HEAP、9、30 和 6。


    **图 4-3** 引入转发记录后 `dbo.HeapForwardedRecords` 的物理状态


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.HeapForwardedRecords

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.HeapForwardedRecords'');

    SELECT object_id, index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    **代码清单 4-2** 引起转发记录的脚本


    转发记录带来的挑战是，它们导致表中的行需要在两个位置被引用，从而在从表中检索数据和向表中写入数据时增加了所需的 I/O 量。表越大，存在的转发记录越多，转发记录对性能产生负面影响的可能性就越大。'
- fmt: '## Page Splits


    The second approach for handling pages where the size of the rows on the page
    exceeds the size of the page is to perform a page split. A page split is used
    on any index that is implemented under the B-tree index structure, which includes
    clustered and non-clustered indexes. With page splits, if a row is updated to
    a size that will no longer fit on the data page on which it currently exists,
    `SQL Server` will take half of the rows on the page and place them on a new page.
    Then `SQL Server` will attempt to write the data for the row to the page again.
    If the data will then fit on the page, the page will be written. If not, then
    the process will be repeated until it fits on the page.


    To explain how page splits operate, an update operation that results in a page
    split will be explored. Similar to the previous section, consider a table with
    a page numbered 100 (see Figure 4-4). There are four rows stored on page 100,
    and each is approximately 2 KB in size. Suppose that one of the rows, such as
    the second row, is updated to 2.5 KB in size. The data for the page will be 8.5
    KB, which exceeds the available space, which causes a page split to occur. To
    split the page, a new page is allocated, numbered 101, and half of the rows on
    the page (the third and fourth rows) are written to the new page. At this point,
    the second row can be written to the page since there is now 4 KB of open space
    on the page.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig4_HTML.png)


    A diagram presents how the data from the second row in data page 100 is updated
    to the second row in another data page 100\. The value from the second row is
    loaded into the third and fourth rows in data page 101.


    Figure 4-4: Page split process diagram


    The following is an example of how page splits occur on a table, walking through
    a scenario in which page splits are forced to occur on a table. To start the example,
    the table `dbo.ClusteredPageSplits` will be created, as provided in Listing 4-3.
    Into this table 24 rows will be inserted that are each about 2 KB in length. This
    will result in four rows per page and six data pages allocated to the table. Consider
    the information on index level 0, which is the leaf level. Since the table is
    using a B-tree, through the clustered index, there will be an additional page
    that is used for the index tree structure. On index level 1, there are six records,
    which reference the six pages in the index. This information can be confirmed
    in Figure 4-5.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig5_HTML.png)


    A table has 5 columns and 2 rows. Columns 1 through 5 are titled object i d, index
    type description, index level, page count, and record count. It has 2 entries
    and the object i d 676197459 in the first row is selected.


    Figure 4-5: Physical state of `dbo.ClusteredPageSplits` before page splits


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ClusteredPageSplits

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    ,CONSTRAINT PK_ClusteredPageSplits PRIMARY KEY CLUSTERED (RowId)

    );

    INSERT INTO dbo.ClusteredPageSplits (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    Listing 4-3: Page Split Scenario


    Causing page splits on the table can be accomplished by updating some of the records
    to exceed the size of the page. This will be done by issuing an `UPDATE` statement
    that increases the `FillerData` column in every other row from 2,000 to 2,500
    characters in length, using the script in Listing 4-4. The resulting rows on each
    page will be 9 KB in size, which, like the previous example, exceeds the available
    page size, thus causing `SQL Server` to use page splits to free up space on the
    page.


    Investigating the results (Figure 4-6) after the page splits have occurred shows
    the effect of the page splits on the table. For starters, instead of 6 pages at
    the leaf level of the index, there are 12 pages at index level 0\. As mentioned,
    when a page split occurs, the page is split in half, and a new page is added.
    Since all data pages were updated in the table, all of the pages were split, resulting
    in a doubling in the number of pages at the leaf level. The only change at index
    level 1 was the addition of six pages to reference the new pages in the index.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig6_HTML.png)


    A table has 5 columns and 2 rows. The columns are titled object i d, index type
    description, index level, page count, and record count, respectively. The object
    i d 676197459 in the first row is selected.


    Figure 4-6: Physical state after page splits


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.ClusteredPageSplits

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    Listing 4-4: Script to Cause Page Splits


    There are two distinctions between page splits and forwarded records worthy of
    discussion. First, when the page splits occurred, the number of records on the
    data pages did not increase. A page split moves the location of records to make
    room for the ones within the logical index ordering. The second is that page splits
    do not increase the record count. Since page splits have made room for the records,
    there is no need for additional records to point to where data is stored.


    Page splits can lead to performance problems similar to forwarded records. These
    performance issues occur both when the page split is occurring and afterward.
    During the page splits, the page that is being split needs to be locked exclusively
    while the records are split between two pages. This results in contention when
    someone needs to access a row other than the one being updated when the page split
    happens. After the page is split, the physical order of the data pages in the
    index will typically not be in their logical order within the index. This hampers
    `SQL Server`’s ability to perform contiguous reads, decreasing the amount of data
    that can be read in single operations. In addition, the more pages that need to
    be read into memory for a query to execute, the slower the query will perform
    compared with the same results using fewer pages.


    ## Summary


    In this chapter, fragmentation was introduced, demonstrated, and described in
    detail. With an understanding of the impact of fragmentation on index storage
    and performance, the question of resolving fragmentation can be addressed in Chapter
    11. Here, a more in-depth approach will be provided for identifying and resolving
    index fragmentation.'
  raw: '### Page Splits


    The second approach for handling pages where the size of the rows on the page
    exceeds the size of the page is to perform a page split. A page split is used
    on any index that is implemented under the B-tree index structure, which includes
    clustered and non-clustered indexes. With page splits, if a row is updated to
    a size that will no longer fit on the data page on which it currently exists,
    SQL Server will take half of the rows on the page and place them on a new page.
    Then SQL Server will attempt to write the data for the row to the page again.
    If the data will then fit on the page, the page will be written. If not, then
    the process will be repeated until it fits on the page.


    To explain how page splits operate, an update operation that results in a page
    split will be explored. Similar to the previous section, consider a table with
    a page numbered 100 (see Figure [4-4](#338675_4_En_4_Chapter.xhtml#Fig4)). There
    are four rows stored on page 100, and each is approximately 2 KB in size. Suppose
    that one of the rows, such as the second row, is updated to 2.5 KB in size. The
    data for the page will be 8.5 KB, which exceeds the available space, which causes
    a page split to occur. To split the page, a new page is allocated, numbered 101,
    and half of the rows on the page (the third and fourth rows) are written to the
    new page. At this point, the second row can be written to the page since there
    is now 4 KB of open space on the page.


    ![](images/338675_4_En_4_Chapter/338675_4_En_4_Fig4_HTML.png)


    A diagram presents how the data from the second row in data page 100 is updated
    to the second row in another data page 100\. The value from the second row is
    loaded into the third and fourth rows in data page 101.


