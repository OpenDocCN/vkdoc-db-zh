  trans: '

    ### 碎片整理操作


    理解碎片的最佳方式是观察其实际发生。在第 3 章中，我们回顾了动态管理对象 (DMO) `sys.dm_index_physical_stats` 所返回的信息。本节将检视多个会导致碎片的脚本，并使用该
    DMO 来调查已发生的碎片量。


    当索引内的物理页不连续时，就会发生碎片。当执行插入操作，且新行未被放置在索引页的末尾时，该新行将被放置到已包含其他行的页面上。如果该页面上没有足够空间容纳新行，则会发生页面拆分，从而导致索引碎片。碎片是索引中页面拆分的物理结果。


    #### 插入操作


    第一个可能导致索引碎片的操作是 `INSERT` 操作。这通常不被认为是导致碎片的最可能操作，但某些数据库设计模式确实会导致碎片产生。`INSERT` 操作导致碎片的情况有两种：聚集索引和非聚集索引。


    设计聚集索引最常见的模式是将索引建立在一个值始终递增的单列上。这通常通过数值数据类型和 `IDENTITY` 属性，或一个始终递增的数值键来实现。遵循此模式时，插入过程中发生碎片的可能性相对较低。不幸的是，这并非唯一的聚集索引设计模式，其他一些模式可能导致大量碎片。例如，使用无序的业务键或
    `uniqueidentifier` 数据类型就常常引起碎片。


    使用 `uniqueidentifier` 数据类型值的聚集索引通常利用 `NEWID()` 函数生成一个随机的唯一值作为聚集键。此值唯一，但并非始终递增。最后生成的值可能出现在前一个值之前或之后。因此，当向聚集索引插入新行时，它很可能被放置在索引中许多现有行之间。如果索引中没有足够空间，就会发生碎片。


    为了演示使用 `uniqueidentifier` 作为聚集索引导致的碎片，请执行代码清单 11-1 中的代码。此代码创建了一个名为 `dbo.UsingUniqueidentifier`
    的表，使用 `sys.columns` 的数据填充它，然后添加一个聚集索引。此时，索引中的所有页在物理上是连续的。运行代码清单 11-2 中的代码以查看图
    11-1 所示的结果；这些结果显示索引的平均碎片为 0.00%。


    ![](img/338675_4_En_11_Fig1_HTML.png)


    一个表格有 9 列和 3 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（以页计）和平均页空间使用率百分比。所有
    3 个索引的平均碎片均为 0.00%。


    图 11-1


    初始碎片结果（结果可能有所不同）


    ```

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_frag_in_percent

    ,fragment_count AS frag_count

    ,avg_fragment_size_in_pages AS avg_frag_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UsingUniqueidentifier''),NULL,NULL,''DETAILED'')

    ```


    代码清单 11-2


    查看 INSERT 操作导致的索引碎片


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UsingUniqueidentifier'') IS NOT NULL

    DROP TABLE dbo.UsingUniqueidentifier;

    CREATE TABLE dbo.UsingUniqueidentifier

    (

    RowID uniqueidentifier CONSTRAINT DF_GUIDValue DEFAULT NEWID()

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UsingUniqueidentifier(RowID);

    ```


    代码清单 11-1


    填充一个 Uniqueidentifier 表

    '
- fmt: '# 使用 Uniqueidentifier 作为聚集索引键对碎片的影响


    基于 `uniqueidentifier` 列构建带有聚集索引的表后，可以执行 `INSERT` 操作来观察其对索引的影响。为了演示，请使用清单 [11-3](#338675_4_En_11_Chapter.xhtml#PC3)
    中的代码，将 `sys.objects` 中的所有行插入到 `dbo.UsingUniqueidentifier` 中。插入后，可以使用清单 [11-2](#338675_4_En_11_Chapter.xhtml#PC2)
    中的 T-SQL 查询索引的碎片情况。结果应与图 [11-2](#338675_4_En_11_Chapter.xhtml#Fig2) 所示相似，该图显示在向表中添加
    689 行后，聚集索引在索引级别 0 的碎片率超过 70%。


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.objects

    -- Listing 11-3

    -- INSERT into the Uniqueidentifier Table

    ```


    正如这段代码示例所展示的，基于非递增值的聚集索引会导致碎片。这种行为最典型的例子就是使用 `uniqueidentifier`。当聚集键是计算值或基于无序的业务键时，也可能发生这种情况。在查看业务键时，如果为订单分配了一个随机的采购订单号，那么该值的行为可能类似于
    `uniqueidentifier` 数据类型值。


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig2_HTML.png)


    一个包含 9 列 3 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。所有
    3 个索引的“平均碎片百分比”分别为 70.28、80.00 和 0.00，这些值被高亮显示。


    图 11-2


    INSERT 后的碎片结果（百分比结果可能有所不同）


    `INSERT` 操作影响碎片的另一种方式是作用于非聚集索引。虽然聚集索引值可能是递增的，但非聚集索引中的列值不一定具有相同的特性。一个很好的例子是在非聚集索引中对产品名称进行索引。插入到表中的下一条记录可能以字母
    *M* 开头，需要放置在非聚集索引的中间位置。如果该位置没有空间，则会发生页拆分，从而导致碎片。


    为了演示这种行为，请向之前演示中使用的表 `dbo.UsingUniqueidentifier` 添加一个非聚集索引。清单 [11-4](#338675_4_En_11_Chapter.xhtml#PC4)
    显示了新索引的模式。在插入更多记录以查看插入非聚集索引的效果之前，请再次运行清单 [11-2](#338675_4_En_11_Chapter.xhtml#PC2)。结果将与图
    [11-3](#338675_4_En_11_Chapter.xhtml#Fig3) 相似。


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig3_HTML.png)


    一个包含 9 列 6 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。包含了
    3 个非聚集索引。


    图 11-3


    非聚集索引的碎片结果


    ```sql

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UsingUniqueidentifier(Name) INCLUDE (JunkValue);

    -- Listing 11-4

    -- Create a Non-clustered Index

    ```


    此时，需要向 `dbo.UsingUniqueidentifier` 插入更多行。再次执行清单 [11-3](#338675_4_En_11_Chapter.xhtml#PC3)
    中的 T-SQL 以插入更多记录到表中，然后使用清单 [11-2](#338675_4_En_11_Chapter.xhtml#PC2) 查看非聚集索引中的碎片状态。完成此操作后，非聚集索引的碎片率现已超过
    40%，如图 [11-4](#338675_4_En_11_Chapter.xhtml#Fig4) 所示。


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig4_HTML.png)


    一个包含 9 列 6 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。非聚集索引的“平均碎片百分比”数据被高亮显示。


    图 11-4


    非聚集索引 INSERT 后的碎片结果


    每当执行 `INSERT` 操作时，总是存在发生碎片的可能性。这将同时发生在聚集索引和非聚集索引上。为聚集索引选择递增的键列将减少插入相关碎片的影响。'
  raw: 'With the table built with a clustered index based on a `uniqueidentifier`
    column, an `INSERT` can be made into the table to see the effect that it has on
    the index. To demonstrate, insert all the rows in `sys.objects` into `dbo.UsingUniqueidentifier`
    using the code in Listing [11-3](#338675_4_En_11_Chapter.xhtml#PC3). After the
    insert, the fragmentation of the index can be reviewed in the results, using the
    T-SQL in Listing [11-2](#338675_4_En_11_Chapter.xhtml#PC2). The results should
    be similar to those shown in Figure [11-2](#338675_4_En_11_Chapter.xhtml#Fig2),
    which shows fragmentation in the clustered index at over 70 percent at index level
    0 after adding 689 rows to the table.


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.objects

    Listing 11-3

    INSERT into the Uniqueidentifier Table

    ```


    As this code sample demonstrated, clustered indexes that are based on values that
    are not ever-increasing result in fragmentation. The best example of this type
    of behavior is through the use of `uniqueidentifier`s. This can also happen when
    the clustering key is a computed value or based on an unordered business key.
    When looking at business keys, if a random purchase order is assigned to an order,
    then that value will likely behave similar to a `uniqueidentifier` data type value.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig2_HTML.png)


    A table has 9 columns and 3 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, average page space used in percent.
    The average fragment in percentage of all 3 indexes are 70.28, 80.00, and 0.00
    which are highlighted.


    Figure 11-2


    Post-INSERT fragmentation results (percentage results may vary)


    The other way in which `INSERT` operations can affect fragmentation is on the
    non-clustered indexes. While the clustered index values may be ever-increasing
    values, the values for the columns in the non-clustered index won’t necessarily
    have that same quality. A good example of this is when indexing the name of a
    product in a non-clustered index. The next record inserted into the table may
    start with the letter *M* and will need to be placed near the middle of the non-clustered
    index. If there isn’t room at that location, a page split will occur, and fragmentation
    will result.


    To demonstrate this behavior, add a non-clustered index to the table `dbo.UsingUniqueidentifier`
    that was used in the previous demonstrations. Listing [11-4](#338675_4_En_11_Chapter.xhtml#PC4)
    shows the schema for the new index. Before inserting more records to see the effect
    of inserting into a non-clustered index, run Listing [11-2](#338675_4_En_11_Chapter.xhtml#PC2)
    again. The results will be similar to those in Figure [11-3](#338675_4_En_11_Chapter.xhtml#Fig3).


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig3_HTML.png)


    A table has 9 columns and 6 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. 3 non clustered indexes are included.


    Figure 11-3


    Non-clustered index fragmentation results


    ```

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UsingUniqueidentifier(Name) INCLUDE (JunkValue);

    Listing 11-4

    Create a Non-clustered Index

    ```


    At this point, more rows need to be inserted into `dbo.UsingUniqueidentifier`.
    Execute the T-SQL in Listing [11-3](#338675_4_En_11_Chapter.xhtml#PC3) again to
    insert more records into the table and then use Listing [11-2](#338675_4_En_11_Chapter.xhtml#PC2)
    to view the state of fragmentation in the non-clustered index. With this complete,
    the non-clustered index is now more than 40 percent fragmented, as shown in Figure
    [11-4](#338675_4_En_11_Chapter.xhtml#Fig4).


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig4_HTML.png)


    A table has 9 columns and 6 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, average page space used in percent.
    The data in average fragment in percent of non-clustered indexes are highlighted.


    Figure 11-4


    Non-clustered post-INSERT fragmentation results


    Whenever `INSERT` operations are performed, there is always a possibility fragmentation
    can occur. This will happen on both clustered and non-clustered indexes. Choosing
    ever-increasing key columns for clustered indexes will reduce the impact from
    insert-related fragmentation.'
  trans: '

    # 使用唯一标识符作为聚集索引键对碎片的影响


    基于 `uniqueidentifier` 列构建带有聚集索引的表后，可以执行 `INSERT` 操作来观察其对索引的影响。为了演示，请使用清单 11-3
    中的代码，将 `sys.objects` 中的所有行插入到 `dbo.UsingUniqueidentifier` 中。插入后，可以使用清单 11-2 中的
    T-SQL 查询索引的碎片情况。结果应与图 11-2 所示相似，该图显示在向表中添加 689 行后，聚集索引在索引级别 0 的碎片率超过 70%。


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.objects

    -- 清单 11-3

    -- 向唯一标识符表执行 INSERT

    ```


    正如这段代码示例所展示的，基于非递增值的聚集索引会导致碎片。这种行为最典型的例子就是使用 `uniqueidentifier`。当聚集键是计算值或基于无序的业务键时，也可能发生这种情况。在查看业务键时，如果为订单分配了一个随机的采购订单号，那么该值的行为可能类似于
    `uniqueidentifier` 数据类型值。


    ![](img/338675_4_En_11_Fig2_HTML.png)


    一个包含 9 列 3 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。所有
    3 个索引的“平均碎片百分比”分别为 70.28、80.00 和 0.00，这些值被高亮显示。


    图 11-2


    INSERT 后的碎片结果（百分比结果可能有所不同）


    `INSERT` 操作影响碎片的另一种方式是作用于非聚集索引。虽然聚集索引值可能是递增的，但非聚集索引中的列值不一定具有相同的特性。一个很好的例子是在非聚集索引中对产品名称进行索引。插入到表中的下一条记录可能以字母
    *M* 开头，需要放置在非聚集索引的中间位置。如果该位置没有空间，则会发生页拆分，从而导致碎片。


    为了演示这种行为，请向之前演示中使用的表 `dbo.UsingUniqueidentifier` 添加一个非聚集索引。清单 11-4 显示了新索引的模式。在插入更多记录以查看插入非聚集索引的效果之前，请再次运行清单
    11-2。结果将与图 11-3 相似。


    ![](img/338675_4_En_11_Fig3_HTML.png)


    一个包含 9 列 6 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。包含了
    3 个非聚集索引。


    图 11-3


    非聚集索引的碎片结果


    ```sql

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UsingUniqueidentifier(Name) INCLUDE (JunkValue);

    -- 清单 11-4

    -- 创建非聚集索引

    ```


    此时，需要向 `dbo.UsingUniqueidentifier` 插入更多行。再次执行清单 11-3 中的 T-SQL 以插入更多记录到表中，然后使用清单
    11-2 查看非聚集索引中的碎片状态。完成此操作后，非聚集索引的碎片率现已超过 40%，如图 11-4 所示。


    ![](img/338675_4_En_11_Fig4_HTML.png)


    一个包含 9 列 6 行的表格。列标题为：索引类型降序、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。非聚集索引的“平均碎片百分比”数据被高亮显示。


    图 11-4


    非聚集索引 INSERT 后的碎片结果


    每当执行 `INSERT` 操作时，总是存在发生碎片的可能性。这将同时发生在聚集索引和非聚集索引上。为聚集索引选择递增的键列将减少插入相关碎片的影响。

