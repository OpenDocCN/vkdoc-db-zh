    ### DBCC PAGE


    The last command available for examining pages is `DBCC PAGE`. While the other
    two commands provide information about the pages and their relationship with tables
    and indexes, the output from `DBCC PAGE` provides the actual contents of a page.
    Listing [3-14](#338675_4_En_3_Chapter.xhtml#PC14) shows the syntax for using `DBCC
    PAGE`.


    ```

    DBCC PAGE ( { database_name | database_id | 0}, file_number, page_number

    [,print_option ={0|1|2|3} ])

    Listing 3-14

    DBCC PAGE Syntax

    ```


    `The DBCC PAGE` command accepts a number of parameters. Through these parameters,
    it is able to determine the database and specific page requested, which is then
    returned in the result set in the requested format. Table [3-10](#338675_4_En_3_Chapter.xhtml#Tab10)
    details the parameters for `DBCC PAGE`.


    Table 3-10


    DBCC PAGE Parameters


    | **Parameter** | **Description** |

    | --- | --- |

    | database_name &#124; database_id | Specifies either the database name or the
    database ID where the page will be retrieved. This defaults to the current database
    if this parameter is not provided or if zero is used for its value. |

    | `file_number` | Specifies the file number for the data file in the database
    from where the page will be retrieved. |

    | `page_number` | Specifies the page number in the database file that will be
    retrieved. |

    | `print_option` | Specifies how the output should be returned. There are four
    print options available:*0—page header only*: Returns only page header information.*1—hex
    rows*: Returns the page header information, all the rows on the page, and the
    offset array. In this output, each row is returned individually.*2—hex data*:
    Returns the page header information, all the rows on the page, and the offset
    array. Unlike option 1, the output shows all the rows as a single block of data.*3—data
    rows*: Returns the page header information, all the rows on the page, and the
    offset array. This option differs from the other options in that the data in the
    columns for the row is translated as listed with their column names.This parameter
    is optional, and 0 is used as the default when no option is selected. |


    Note


    By default, the `DBCC PAGE` command outputs its messages to the SQL Server event
    log. In most situations, this is not the ideal output mechanism. Trace flag 3604
    allows you to modify this behavior. By utilizing this trace flag, the output from
    the `DBCC` statements returns to the Messages tab in SQL Server Management Studio
    (SSMS).


    Through `DBCC PAGE` and its print options, everything that is on a page can be
    retrieved. What is the value in delving into the detailed contents of pages? Looking
    at an index or data page can provide an understanding of unexpected index behavior
    (such as poor performance). Insight can be gained into how the data within rows
    is structured, such as why rows may be larger than expected. The size of rows
    does have an important impact on how indexes behave as when a row gets larger,
    the number of pages required to store the index increases. More pages for an index
    will result in the need for more memory to cache it, ultimately leading to higher
    resource consumption and longer query wait times. A larger index size may alter
    the decisions the query optimizer makes, ultimately changing the execution plan
    and performance of a query that uses it.


    Another reason to use `DBCC PAGE` is to observe what happens to a data page when
    various operations occur. As the examples later in this chapter will illustrate,
    `DBCC PAGE` can be used to uncover what happens during page splits and forwarded
    record operations.'
  trans: "Here, the third row in the result set has an `IndexLevel` of 1 and a `PageType`\
    \ of 2, which is an index page. With these results, there is enough information\
    \ to rebuild the B-tree structure for the index, as shown in Figure 3-8. The B-tree\
    \ starts with the IAM page, which is page number 1:237. This page is linked to\
    \ page 1:361, which is an index page at index level 1. Following that, pages 1:360,\
    \ 1:362, 1:363, and 1:364 are at index level 0 and doubly linked to each other.\n\
    \n![图 3-8](img/338675_4_En_3_Fig8_HTML.png)\nB-tree 结构框架，其 IAM 页为 1:237。它链接到非叶级别的页\
    \ 1:361。进一步链接到叶级别的页 1:360、1:362、1:363 和 1:364。\n图 3-8\n\n### 针对 dbo.IndexInternalsThree\
    \ 的 DBCC IND\n\n在上述两个示例中，`DBCC IND` 被用于调查堆或聚集索引关联的页。此 DBCC 命令提供表或索引所有页的信息，包括 IAM\
    \ 页。这些页包含页号，用于标识它们在数据文件中的位置。页之间的关系也被包含在内，例如用于在 B-tree 中导航到相邻页的下一个和上一个页号。\n\n`sys.dm_db_database_page_allocations`\
    \ 可以提供相同的信息（甚至更多）。为了演示这一点，清单 3-13 展示了如何从 `sys.dm_db_database_page_allocations`\
    \ 获取 `DBCC IND` 信息。如果比较输出，可以注意到它们几乎完全相同，仅在少数情况下 `NULL` 和 0 的返回方式不同。考虑到工具的选择，应优先使用\
    \ DMF 而非 DBCC 命令。\n\n```sql\nUSE Chapter2Internals;\nGO\nSELECT\n    allocated_page_file_id\
    \ AS PageFID\n    ,allocated_page_page_id AS PagePID\n    ,allocated_page_iam_file_id\
    \ AS IAMFID\n    ,allocated_page_iam_page_id AS IAMPID\n    ,object_id AS ObjectID\n\
    \    ,index_id AS IndexID\n    ,partition_id AS PartitionNumber\n    ,rowset_id\
    \ AS PartitionID\n    ,allocation_unit_type_desc AS iam_chain_type\n    ,page_type\
    \ AS PageType\n    ,page_level AS IndexLevel\n    ,next_page_file_id AS NextPageFID\n\
    \    ,next_page_page_id AS NextPagePID\n    ,previous_page_file_id AS PrevPageFID\n\
    \    ,previous_page_page_id AS PrevPagePID\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), 1, NULL, 'DETAILED')\nWHERE is_allocated\
    \ = 1;\nGO\nDBCC IND (0,'dbo.IndexInternalsTwo',1)\n```\n清单 3-13\n通过 sys.dm_db_database_page_allocations\
    \ 获取的 DBCC IND 输出\n\n### DBCC PAGE\n\n最后一个用于检查页的命令是 `DBCC PAGE`。虽然其他两个命令提供关于页以及它们与表和索引关系的信息，但\
    \ `DBCC PAGE` 的输出则提供了页的实际内容。清单 3-14 展示了使用 `DBCC PAGE` 的语法。\n\n```sql\nDBCC PAGE\
    \ ( { database_name | database_id | 0}, file_number, page_number\n    [,print_option\
    \ ={0|1|2|3} ])\n```\n清单 3-14\nDBCC PAGE 语法\n\n`DBCC PAGE` 命令接受多个参数。通过这些参数，它能够确定要检索的数据库和具体页，然后以请求的格式在结果集中返回。表\
    \ 3-10 详细说明了 `DBCC PAGE` 的参数。\n\n表 3-10\nDBCC PAGE 参数\n\n| **参数** | **描述** |\n\
    | --- | --- |\n| `database_name | database_id` | 指定从中检索页的数据库名称或数据库 ID。如果未提供此参数或其值为零，则默认为当前数据库。\
    \ |\n| `file_number` | 指定要从中检索页的数据文件在数据库中的文件编号。 |\n| `page_number` | 指定要检索的页在数据库文件中的页号。\
    \ |\n| `print_option` | 指定输出应如何返回。有四种打印选项可用：<br>*0—仅页头*：仅返回页头信息。<br>*1—十六进制行*：返回页头信息、页上的所有行以及偏移数组。在此输出中，每一行单独返回。<br>*2—十六进制数据*：返回页头信息、页上的所有行以及偏移数组。与选项\
    \ 1 不同，输出将所有行显示为单个数据块。<br>*3—数据行*：返回页头信息、页上的所有行以及偏移数组。此选项与其他选项的不同之处在于，行中列的数据会按其列名列表进行转换。<br>此参数是可选的，如果未选择任何选项，则默认使用\
    \ 0。 |\n\n**注意：** 默认情况下，`DBCC PAGE` 命令将其消息输出到 SQL Server 事件日志。在大多数情况下，这不是理想的输出机制。跟踪标志\
    \ 3604 允许你修改此行为。利用此跟踪标志，`DBCC` 语句的输出将返回到 SQL Server Management Studio (SSMS) 的“消息”选项卡中。\n\
    \n通过 `DBCC PAGE` 及其打印选项，可以检索页上的所有内容。深入研究页的详细内容有何价值？查看索引或数据页可以帮助理解意外的索引行为（例如性能不佳）。可以深入了解行内数据的结构方式，例如为什么行可能比预期更大。行的大小确实对索引的行为有重要影响，因为当一行变大时，存储索引所需的页数会增加。索引需要更多页将导致需要更多内存来缓存它，最终导致更高的资源消耗和更长的查询等待时间。更大的索引大小可能会改变查询优化器所做的决策，最终改变使用该索引的查询的执行计划和性能。\n\
    \n使用 `DBCC PAGE` 的另一个原因是观察在发生各种操作时数据页的变化情况。正如本章后面的示例将说明的，`DBCC PAGE` 可用于揭示在页拆分和转发达记录操作期间发生的情况。"
- fmt: 'To help demonstrate how to use `DBCC PAGE`, a few demonstrations will be shown
    with each of the print options. These demos will be based on the code in Listing
    3-15, which uses `sys.dm_db_database_page_allocations` to identify page numbers
    for the examples. For each example, an illustration will be provided of some of
    the ways that results can differ between page types. While the page numbers in
    each database may differ slightly, the demos are based on an IAM page of 238,
    index page of 377, and data pages of 376 and 378, as shown in Figure 3-9.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig9_HTML.png)


    A screenshot of a query table results of page allocations with 4 rows of data.
    The header columns are page F I D, page P I D, I A M F I D, I A M P I D, object
    I D, index I D, partition number, partition I D, I A M chain type, page type,
    index level, next page F I D, next page P I D, p r e v page F I D, and p r e v
    page P I D. The page types differ from each other in the table.


    Figure 3-9 Page allocations for dbo.IndexInternalsFour


    ```sql

    USE [Chapter2Internals];

    GO

    CREATE TABLE dbo.IndexInternalsFour (

    RowID INT IDENTITY(1, 1) NOT NULL,

    FillerData VARCHAR(2000) NULL,

    CONSTRAINT PK_IndexInternalsFour

    PRIMARY KEY CLUSTERED ([RowID] ASC));

    INSERT INTO dbo.IndexInternalsFour (FillerData)

    VALUES (REPLICATE(1, 2000)),

    (REPLICATE(2, 2000)), (REPLICATE(3, 2000)),

    (REPLICATE(4, 2000)), (REPLICATE(5, 25));

    SELECT allocated_page_file_id AS PageFID,

    allocated_page_page_id AS PagePID,

    allocated_page_iam_file_id AS IAMFID,

    allocated_page_iam_page_id AS IAMPID,

    index_id AS IndexID,

    allocation_unit_type_desc AS iam_chain_type,

    page_type_desc,

    page_level AS IndexLevel,

    next_page_file_id AS NextPageFID,

    next_page_page_id AS NextPagePID,

    previous_page_file_id AS PrevPageFID,

    previous_page_page_id AS PrevPagePID

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsFour''),
    1, NULL, ''DETAILED'')

    WHERE is_allocated = 1;

    ```

    **Listing 3-15** DBCC IND Query for DBCC PAGE Examples


    ### Page Header–Only Print Option


    The first print option available for `DBCC PAGE` returns only the page header
    where `print_option` equals 0 (the default). The page header is returned with
    all `DBCC PAGE` requests; using this option limits the results to the page header
    exclusively. Two sections are returned as part of the page header.


    The first section returned is the buffer information. The buffer provides information
    on where the page is currently located in memory in SQL Server. To read a page,
    the page must first be read from disk and written to memory. This section provides
    the address that could be used to find the current memory location of the page.


    The second section is the page header itself. The page header contains attributes
    that describe the page and its contents. Not all attributes are currently in use
    by SQL Server, but there are many that are worth further discussion. These key
    attributes are detailed in Table 3-11.


    **Table 3-11** Page Header Key Attribute Definitions


    | Attribute | Definition |

    | --- | --- |

    | `m_pageId` | File ID and page number for the page. |

    | `m_type` | The type of page returned; see the page type list in Table 3-9. |

    | `Metadata: AllocUnitId` | Allocation unit ID that maps from the catalog view
    `sys.allocation_units`. |

    | `Metadata: PartitionId` | Partition ID for the table or index. This maps to
    `partition_ID` in the catalog view `sys.partitions`. |

    | `Metadata: ObjectId` | Object ID for the table. This maps to the `object_ID`
    in the catalog view `sys.tables`. |

    | `Metadata: IndexId` | Index ID for the table or index. This maps to the `index_ID`
    in the catalog view `sys.indexes`. |

    | `m_prevPage` | Previous page in the index structure. This is used in B-tree
    indexes to allow reading sequential pages along index levels. |

    | `m_nextPage` | Next page in the index structure. This is used in B-tree indexes
    to allow reading sequential pages along index levels. |

    | `m_slotCnt` | Number of slots, or rows, on the page. |

    | `Allocation Status` | Lists the locations of the GAM, SGAM, PFS, DIFF (or DCM),
    and ML (or BCM) pages for the page requested. It also includes the status for
    each from those metadata pages. |


    To demonstrate the use of `DBCC PAGE` for the page header–only option, the code
    in Listing 3-16 can be used. The results should be similar to those in Figure
    3-10. In this scenario, the page number is provided at the top of the page, indicating
    that it is page 1:377. The `m_type` is 2, which means it is an index page. The
    `m_slotCnt` shows that there are two rows on the page. Referring to Figure 3-10,
    the row count would correlate to the two index records needed to map data pages
    1:376 and 1:378 to the index. Finally, the allocation statuses show that the page
    is allocated on the GAM page, it is 0 percent full (per PFS page), and the page
    has been changed since the last full backup (per the DCM page).


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig10_HTML.jpg)


    A screenshot of D B C C page output. It consists of 3 boxes of data. 1. Displays
    page 1:377. 2. Buffer page. 3. page header is displayed with allocation statuses
    for G A M, S G A M, P F S, D I F F, and M L. G A Mis allocated in the output.


    Figure 3-10 DBCC PAGE output for the page header–only print option


    ```sql

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,0)

    ```

    **Listing 3-16** DBCC PAGE with the Page Header–Only Print Option


    The page header–only option shows that there is a lot of useful information in
    the page header. It provides enough information to envision how this page relates
    to the other pages in the index and the extent it occupies. This information is
    similar to `sys.dm_db_page_info`, but generally speaking, `DBCC PAGE` provides
    more information than the DMF.'
