    A panel with an opened messages tab with 8 lines for 8 tables with different scan
    count, logical reads, physical reads, read-ahead reads, l o b logical reads, and
    l o b physical reads values under the 96 rows affected label. Also exhibited are
    107 and 164 milliseconds for C P U and elapsed times under S Q L server execution.


    Figure 13-48


    Statistics I/O results for a clustered columnstore index


    ```sql

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactSales_CCI'') IS NOT NULL

    DROP TABLE FactSales_CCI

    CREATE TABLE dbo.FactSales_CCI(

    SalesKey int NOT NULL,

    DateKey datetime NOT NULL,

    channelKey int NOT NULL,

    StoreKey int NOT NULL,

    ProductKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

    UnitCost money NOT NULL,

    UnitPrice money NOT NULL,

    SalesQuantity int NOT NULL,

    ReturnQuantity int NOT NULL,

    ReturnAmount money NULL,

    DiscountQuantity int NULL,

    DiscountAmount money NULL,

    TotalCost money NOT NULL,

    SalesAmount money NOT NULL,

    ETLLoadID int NULL,

    LoadDate datetime NULL,

    UpdateDate datetime NULL

    )

    INSERT INTO dbo.FactSales_CCI

    SELECT * FROM dbo.FactSales

    CREATE CLUSTERED COLUMNSTORE INDEX FactSales_CStore ON dbo.FactSales_CCI

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales_CCI fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```


    Listing 13-32

    Create a Fact Table with a Clustered Columnstore Index


    While a clustered columnstore index is optimal for analytic workloads, it will
    not perform well for transactional queries. If a table services OLTP queries,
    then a clustered columnstore index is likely the wrong solution. A mixed workload
    that contains both OLAP and OLTP queries can be challenging to optimize. If indexing
    those workloads proves difficult, consider ways to separate transactional and
    analytic queries and data from each other. The intermingling of transactional
    and analytic workloads is one of the more complex challenges that database administrators
    and developers face, and therefore an effective solution to that problem may require
    additional optimization tactics beyond indexing alone.


    Non-clustered rowstore indexes may be built on clustered columnstore indexed tables.
    These can support alternate search paths that do not match the natural data order
    of the table. Before implementing a non-clustered rowstore index on a clustered
    columnstore table, be sure to test query performance without the additional indexes.
    Oftentimes the speed provided by compression, rowgroup elimination, and other
    columnstore features may be enough to provide adequate performance without the
    need for additional indexes.


    Columnstore indexes may also be created on memory-optimized tables. Memory-optimized
    tables are intended for highly contentious, heavy OLTP workloads. This makes them
    poor candidates for columnstore indexes. A columnstore index on a memory-optimized
    table should be tested carefully to ensure that it not only performs well but
    also does not consume excessive memory or impede OLTP performance.


    Ordered columnstore indexes were introduced in SQL Server 2022 and allow for data
    to be pre-sorted as it is inserted. This is an offline operation (by partition)
    that uses TempDB to sort the newly inserted data. If a table has a dedicated offline
    period where a data load can be performed unimpeded, then this can be a useful
    way to improve data order, therefore improving rowgroup elimination. For more
    information on this feature, review the following documentation from Microsoft:


    [`https://docs.microsoft.com/en-us/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci`](https://docs.microsoft.com/en-us/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci)


    Note that because sorting of the data is required in TempDB, a large INSERT operation
    may cause extensive I/O on TempDB, as well as consume space within the system
    database. Ensure that TempDB has sufficient space available to support this option,
    if used.


    The following is a brief list of best practices for columnstore indexes that can
    help in knowing when to use them and how to ensure optimal performance:


    *   Columnstore indexes should target tables that have (or will grow to) at least
    tens of millions of rows per partition.

    *   Insert rows into clustered columnstore indexes in batches of at least 102,400
    rows or more to allow for the minimally logged bulk load process to be used.

    *   Ordered data allows for effective rowgroup elimination. Ensure that data is
    inserted into columnstore indexes ordered by a column that will be the most common
    target of filters.

    *   Partition large tables that have columnstore indexes on them. This allows
    for partition elimination and the ability to target maintenance tasks at individual
    partitions (backup, rebuild, reorganization, truncation, partition swapping).

    *   Avoid UPDATE operations against a columnstore index. They manifest as a DELETE
    plus an INSERT and will create fragmentation due to deleted data bloat. UPDATE
    operations also result in out-of-order data, reducing the effectiveness of rowgroup
    elimination.

    *   When using a columnstore index, only query columns that are needed. This reduces
    the segments that must be read, reducing I/O and memory usage and improving query
    speed.

    *   Only use non-clustered columnstore indexes on tables that meet many or all
    of the preceding criteria. A heavily fragmented non-clustered columnstore index
    may not provide much (if any) more value than a classic rowstore covering index.


    Columnstore indexes are a significant improvement in the way that data warehouses
    can be indexed. With each version of SQL Server, columnstore indexes improve and
    become more efficient ways of indexing large analytic data. These performance
    improvements open opportunities to scale databases even further than is possible
    with traditional indexing solutions. Columnstore indexes allow OLAP tables to
    be scaled into tens or hundreds of billions of rows (or more) with ease.


    Note


    The next section utilizes the WorldWideImporters databases, which can be downloaded
    from [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0).'
