    # 11. Index Maintenance


    Like anything in life, indexes require maintenance. Over time, the performance
    benefits of indexes can wane or, through data modifications, their sizes and the
    underlying statistics can drift and bloat. To prevent these issues, indexes must
    be maintained. Doing so will help ensure that a database will remain a lean, mean
    query-running machine!


    With regard to maintenance, there are five areas to consider:


    *   Index fragmentation


    *   Heap bloat and forwarding


    *   Columnstore fragmentation


    *   Statistics


    *   In-memory statistics


    Each plays a key role in maintaining a properly indexed and well-performing database.


    This chapter explores all of these areas. This discussion will include issues
    that arise from not maintaining indexes as well as a review of strategies for
    implementing an index maintenance process. To illustrate how fragmentation occurs,
    there will be a number of simple demos. The statistics conversation will expand
    on the items discussed in Chapter [3](#338675_4_En_3_Chapter.xhtml) and lay out
    how to update statistics to keep them accurate.


    ## Index Fragmentation


    The first maintenance issue that can lead to a degradation of index performance
    is index fragmentation. Fragmentation occurs when the pages in an index are no
    longer physically sequential.


    While index fragmentation generated a much greater concern in previous versions
    of SQL Server and with older storage systems, it is still something to be concerned
    with in SQL Server. The main challenge that arises with fragmentation is an increase
    in the amount of space required to store the index due to pages being split and
    left half-empty. This excess space impacts the amount of space the database consumes
    on disk, in memory, and through the CPU as it processes the data.


    There are a few events in SQL Server that can lead to index fragmentation:


    *   `INSERT` operations


    *   `UPDATE` operations


    *   `DELETE` operations


    *   `DBCC SHRINKDATABASE` operations


    Except for selecting data from the database, any write operation can potentially
    lead to fragmentation. Unless a database is read-only, fragmentation is a relevant
    concern that needs to be addressed before it becomes an issue.'
  trans: '# 11. 索引维护


    如同生活中的任何事物一样，索引也需要维护。随着时间的推移，索引带来的性能效益可能会减弱，或者由于数据修改，其大小和底层统计信息可能发生变化并膨胀。为了防止这些问题，必须对索引进行维护。这样做将有助于确保数据库保持为一台精简、高效的查询运行机器！


    关于维护，有五个方面需要考虑：


    - 索引碎片

    - 堆膨胀与转发

    - 列存储碎片

    - 统计信息

    - 内存中统计信息


    每一个都在维护正确索引和性能良好的数据库中扮演着关键角色。


    本章将探讨所有这些方面。讨论将包括因不维护索引而产生的问题，以及对实施索引维护过程策略的回顾。为了说明碎片如何产生，会有一些简单的演示。关于统计信息的讨论将扩展第
    3 章中讨论的内容，并阐述如何更新统计信息以保持其准确性。


    ## 总结


    本章探讨了一些围绕索引的迷思以及一些最佳实践。对于这两个方面，我们研究了一些普遍持有的观点，并围绕每个观点提供了详细信息。


    通过这些迷思，展示了那些普遍相信的关于索引的观点被证明是不真实的。这些迷思涵盖了聚集索引、填充因子、索引的列组成等等。如何看待任何可能属于迷思的、关于索引的观点，其关键在于亲自去测试它。


    最佳实践也得到了定义和讨论。本章提供的最佳实践应该是构建索引的基础。当不确定如何为表或工作负载建立索引时，首先遵循最佳实践。如果将来需要调整，那么偏离最佳实践以应对变化是一个合理的响应。


    ## 为外键列创建索引


    当在表上创建外键时，该表中的外键列应该被索引。这对于辅助外键确定父表中的哪些记录受到引用表中每条记录的约束是必要的。这一点在对引用表进行更改时很重要。引用表中的更改可能需要检查所有与父表中记录匹配的行。如果不存在索引，则会发生对该列的扫描。在大型父表上，这可能导致大量的
    I/O，并可能引发一些并发问题。


    一个关于此问题的例子是州表和地址表。地址表中可能有数千或数百万条记录，而州表中可能只有大约一百条记录。地址表会包含一个被州表引用的列。设想一下，如果州表中的一条记录需要被删除。如果地址表中的外键列上没有索引，那么地址表将如何识别那些会因删除州记录而受到影响的行？没有索引的话，SQL
    Server 将不得不检查地址表中的每一条记录。如果该列有索引，SQL Server 将能够执行范围扫描，定位到与州表中被删除值匹配的记录。


    通过对您的外键列创建索引，可以避免诸如本节所述的性能问题。对于外键的最佳实践是为其列创建索引。如果将来确定某个应用程序不再需要外键列上的索引，可以放心地将其删除。第
    13 章包含了关于此最佳实践的更多细节和一个代码示例。


    ## 平衡索引数量


    索引在访问特定行的信息时对提高性能极为有用。然而，索引并非没有成本。拥有索引的成本超出了数据库内的空间。构建索引时，请考虑以下各项：


    - 行插入或删除的频率如何？

    - 键列更新的频率如何？

    - 索引的使用频率如何？

    - 索引支持哪些进程？

    - 表上还有多少其他索引？


    这些只是构建索引时需要考虑的一些首要因素。索引构建之后，更新和维护索引将花费多少时间？索引被修改的频率是否会高于它用于返回查询结果的频率？表中有多少列？索引数量是否超过了列的数量？


    平衡表上索引数量的难题在于，没有一个可以推荐的精确数字。索引可以提高能使用该索引的查询的性能，但会消耗资源，包括：


    - 数据文件（MDF 或 NDF）中的存储空间

    - 备份大小（维护索引的备份）

    - 写入速度（维护索引中的数据）


    如果工作负载恰好同时写入不同的索引，从而导致锁或阻塞，索引有时会引入争用。以最简洁的方式总结，索引在提高查询读取速度的同时，会减慢写入操作。


    一个表上合理的索引数量是一个针对每个表单独决定的问题。索引过少可能导致过度扫描聚集索引或堆来返回常见查询的结果。表上的索引也不应过多，以至于用于维护索引的时间超过了返回结果的时间。虽然没有关于表应有多少索引的黄金法则，但当表上的索引数量超过十个时，保持谨慎是有价值的。


    同样重要的是，要能区分服务于频繁或关键查询的索引和很少使用的索引。一个月执行一次的表扫描可能比一个整天每时每刻都在维护的索引更可取。或者，如果那个月度查询是一个关键的财务报告，那么那个专门的索引可能
    100%值得其成本。


    ## 索引碎片


    可能导致索引性能下降的第一个维护问题是索引碎片。当索引中的页不再物理上连续时，就会发生碎片。


    虽然索引碎片在早期版本的 SQL Server 和较旧的存储系统中引发了更大的关注，但在 SQL Server 中它仍然值得关注。碎片带来的主要挑战是，由于页被拆分并留下半空状态，存储索引所需的空间量增加。这种额外的空间影响了数据库在磁盘上消耗的空间量、在内存中的占用，以及
    CPU 处理数据时的开销。


    在 SQL Server 中，有一些事件可能导致索引碎片：


    - `INSERT` 操作

    - `UPDATE` 操作

    - `DELETE` 操作

    - `DBCC SHRINKDATABASE` 操作


    除了从数据库中选择数据，任何写入操作都可能导致碎片。除非数据库是只读的，否则碎片是一个需要在成为问题之前解决的相关问题。'
- fmt: '### Fragmentation Operations


    The best way to understand fragmentation is to see it in action. In Chapter [3](#338675_4_En_3_Chapter.xhtml),
    the information returned by the dynamic management object (DMO) `sys.dm_index_physical_stats`
    was reviewed. In this section, a number of fragmentation-causing scripts will
    be reviewed, and the DMO will be used to investigate the amount of fragmentation
    that has occurred.


    Fragmentation occurs when physical pages within an index are not sequential. When
    an insert occurs and the new row is not placed at the end of the pages for the
    index, the new row will be placed on a page that already has other rows on it.
    If there is not enough room on the page for the new row, then the page will split,
    leading to fragmentation of the index. Fragmentation is the physical result of
    page splits in the index.


    #### Insert Operations


    The first operation that can lead to index fragmentation is an `INSERT` operation.
    This is not usually considered the most likely operation to result in fragmentation,
    but there are database design patterns that can lead to fragmentation. There are
    two areas in which `INSERT` operations can lead to fragmentation: clustered and
    non-clustered indexes.


    The most common pattern for designing clustered indexes is to place the index
    on a single column with a value that is ever-increasing. This is often done using
    a numeric data type and the `IDENTITY` property or an ever-increasing numeric
    key. When this pattern is followed, the chances of fragmentation occurring during
    inserts are relatively rare. Unfortunately, this isn’t the only clustered index
    pattern that exists, and some others can lead to considerable fragmentation. For
    example, using unordered business keys or `uniqueidentifier` data types can often
    cause fragmentation.


    Clustered indexes that use `uniqueidentifier` data type values often use the `NEWID()`
    function to generate a random, unique value to serve as the clustering key. This
    value is unique but not ever-increasing. The most recent value generated may or
    may not be after the previous value. Because of this, when a new row is inserted
    into the clustered index, it is most likely to be placed between a number of other
    rows already in the index. If there is not enough room in the index, fragmentation
    will occur.


    To demonstrate fragmentation caused by the use of a `uniqueidentifier` as a clustered
    index, execute the code in Listing [11-1](#338675_4_En_11_Chapter.xhtml#PC1).
    This code creates a table named `dbo.UsingUniqueidentifier`. It is populated with
    rows from `sys.columns`, and then a clustered index is added. At this point, all
    pages in the index are physically sequential. Run the code in Listing [11-2](#338675_4_En_11_Chapter.xhtml#PC2)
    to view the results shown in Figure [11-1](#338675_4_En_11_Chapter.xhtml#Fig1);
    these results show that the average fragmentation for the index is 0.00 percent.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig1_HTML.png)


    A table has 9 columns and 3 rows. The column headers are index type descending,
    index depth, index level, page count, record count, average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. The average fragmentation for all 3 indexes is 0.00%.


    Figure 11-1


    Starting fragmentation results (results may vary)


    ```

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_frag_in_percent

    ,fragment_count AS frag_count

    ,avg_fragment_size_in_pages AS avg_frag_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UsingUniqueidentifier''),NULL,NULL,''DETAILED'')

    ```


    Listing 11-2


    View INSERT Index Fragmentation


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UsingUniqueidentifier'') IS NOT NULL

    DROP TABLE dbo.UsingUniqueidentifier;

    CREATE TABLE dbo.UsingUniqueidentifier

    (

    RowID uniqueidentifier CONSTRAINT DF_GUIDValue DEFAULT NEWID()

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UsingUniqueidentifier (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 2000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UsingUniqueidentifier(RowID);

    ```


    Listing 11-1


    Populate a Uniqueidentifier Table'
