    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_MythThree_ONLINE ON MythThree (Column1) WITH (ONLINE = ON);

    GO

    CREATE INDEX IX_MythThree ON MythThree (Column1);

    GO

    ```

    Listing 10-8

    Online Index Operations on Non-clustered Index Creation


    When the index is created with the ONLINE option, note that in Figure 10-2 `SCH_S`
    (`Schema_Shared`) and `S` (`Shared`) locks are acquired and released within milliseconds
    of each other. Because these locks are acquired and released throughout the index
    creation process, other transactions can continue to occur against the table.
    The `SCH_S` locks ensure that the schema of the table does not change, while the
    `S` locks pages from inserts, updates, and deletes. Because these locks are acquired
    for very short amounts of time, they allow the table to be available throughout
    the index creation process.


    Note

    If you do not see any results from the Extended Events session, it’s likely due
    to a mismatch between the `object_id` for `MythThree` and the `object_id` traced
    through the Extended Events session.


    ![Figure 10-2. Index creation with the ONLINE option](images/338675_4_En_10_Chapter/338675_4_En_10_Fig2_HTML.jpg)


    A table has 5 columns labeled object i d, name, mode, timestamp, and s q l text
    and 9 rows. Three curved double-headed arrows point at pairs of S C H S, S, and
    S C H S mode entries, where locks are acquired and released.


    Figure 10-2

    Index creation with the ONLINE option


    With the default index creation, which does not use the `ONLINE` option, the `S`
    locks are held for the entirety of the index build. Shown in Figure 10-3, the
    `S` lock is taken before the `SCH_S` lock and isn’t released until after the index
    is built. The result is that the index is unavailable during the index build.


    ![Figure 10-3. Index creation without the ONLINE option](images/338675_4_En_10_Chapter/338675_4_En_10_Fig3_HTML.png)


    A table has 5 columns labeled object i d, name, mode, timestamp, and s q l text
    and 7 rows. Three curved double-headed arrows point at pairs of S C H S, S, which
    has its variables farther apart, and S C H S mode entries, where locks are acquired
    and released.


    Figure 10-3

    Index creation without the ONLINE option


    ### Myth 4: Any Column Can Be Filtered in Multicolumn Indexes


    The next common myth with indexes is that regardless of the position of a column
    in an index, the index can use that column in an ordered search to filter data
    within the table. As with the other myths discussed so far in this chapter, this
    one is also incorrect. An index does not need to use all columns in an index.
    It does, however, need to start with the leftmost column in an index when performing
    an ordered search and use the columns from left to right, in their order, within
    the index. This is why the order of the columns in an index is critically important.


    To demonstrate this myth, a few examples will be presented, as shown in Listing
    10-9. In the script, a table is created based on `Sales.SalesOrderHeader` with
    a primary key on `SalesOrderID`. To test the myth of searching all columns through
    multicolumn indexes, an index with the columns `OrderDate`, `DueDate`, and `ShipDate`
    is created.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFour'') IS NOT NULL

    DROP TABLE dbo.MythFour

    GO

    SELECT SalesOrderID, OrderDate, DueDate, ShipDate

    INTO dbo.MythFour

    FROM Sales.SalesOrderHeader;

    GO

    ALTER TABLE dbo.MythFour

    ADD CONSTRAINT PK_MythFour PRIMARY KEY CLUSTERED (SalesOrderID);

    GO

    CREATE NONCLUSTERED INDEX IX_MythFour ON dbo.MythFour (OrderDate, DueDate, ShipDate);

    GO

    ```

    Listing 10-9

    Multicolumn Index Myth


    With the test objects in place, the next behavior to observe is that of the queries
    against the table that could potentially use the non-clustered index. First, a
    query that uses the leftmost column in the index will be tested. Listing 10-10
    gives the code for this. As shown in Figure 10-4, by filtering on the leftmost
    column, the query uses a seek operation on `IX_MythFour`.


    ![Figure 10-4. Execution plan when filtering on the leftmost column in an index](images/338675_4_En_10_Chapter/338675_4_En_10_Fig4_HTML.jpg)


    A panel of an opened execution plan tab contains 2 lines of text for order date
    under query 1 with query cost, relative to the batch, at 100%. Below is a flow
    diagram connecting index seek, nonclustered, myth four, at 100% cost to select
    at 0% cost.


    Figure 10-4

    Execution plan when filtering on the leftmost column in an index


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OrderDate FROM dbo.MythFour

    WHERE OrderDate = ''2011-07-17 00:00:00.000''

    ```

    Listing 10-10

    Query Filtering on the Leftmost Column in the Index


    Next, consider what happens when filtering from other index key columns. In Listing
    10-11, the query filters the results on the rightmost column of the index. The
    execution plan for this query, shown in Figure 10-5, uses a scan operation on
    `IX_MythFour`. Instead of being able to go directly to the records that match
    the `OrderDate`, the query needs to check all records to determine which match
    the filter. While the index is used, it isn’t able to filter the rows based on
    the sort within the index.


    ![Figure 10-5. Execution plan when filtering on the rightmost column in an index](images/338675_4_En_10_Chapter/338675_4_En_10_Fig5_HTML.jpg)


    A panel of an opened execution plan tab contains 2 lines of text for ship date
    under query 1 with query cost, relative to the batch, at 100%. Below is a flow
    diagram connecting index scan, nonclustered, myth four, at 100% cost to select
    at 0% cost.


    Figure 10-5

    Execution plan when filtering on the rightmost column in an index


    ```sql

    USE AdventureWorks2017

    GO

    SELECT ShipDate FROM dbo.MythFour

    WHERE ShipDate = ''2011-07-17 00:00:00.000''

    ```

    Listing 10-11

    Query Filtering on the Rightmost Column in the Index'
