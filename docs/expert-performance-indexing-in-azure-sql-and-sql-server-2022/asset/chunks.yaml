    Office Filter Packs from [`https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server`](https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server).
    Be sure to follow the additional steps to run sp_fulltext_service and restart
    the SQL Server instance.'
  trans: '


    ## 本章总结


    本章介绍了可用于内存优化表的索引类型。这些选项包括哈希索引和范围索引，它们是内存优化表能够提供卓越性能的动力所在。如文所示，每种索引类型都对应不同的查询模式。理解这些模式对于为内存优化表及其支持的工作负载构建最优索引至关重要。


    # 9. 全文索引


    SQL Server 支持用于存储大量非结构化文本信息的机制。自 SQL Server 2008 起，其中一种机制便是与可变长度字符数据类型 `VARCHAR`
    和 `NVARCHAR` 一起使用的 `MAX` 长度。这意味着你可以在单个列中存储最多 2 GB 的字符信息。虽然 SQL Server 可以存储此类信息，但非聚集索引的
    1,700 字节限制和聚集索引的 900 字节限制使得通过传统方式进行索引成为一个挑战。幸运的是，SQL Server 提供了另一种索引机制用于在这些大型数据类型中进行搜索：全文索引。


    ## 全文索引


    全文索引是 SQL Server 中另一项索引功能，它超出了常规的索引方法和对象。本章将简要描述全文搜索（FTS）的架构、存储和索引，以实现最佳性能。


    全文搜索（FTS）允许存储和高效搜索大量基于文本的内容。此内容可以包含许多不同的格式，例如 Word 文档（`.docx`）文件。此类存储位于 BLOB（二进制大对象）列中，而非纯文本数据中。存储和搜索非结构化性质的内容的能力，为数据库管理系统提供了许多技术机遇。


    文档留存就是这样一个机遇，它允许以低得多的成本长期存储文档。其搜索能力使得能够针对各种需求查询这些内容。想象一家航运公司，它根据纯文本模板生成了数千份运输单据。为了确保日后能够跟踪货物运输情况，这些文档的留存构成了一个庞大的任务。存储仓库房间的维护需要成本。当需要研究特定货物运输的任务出现时，除非能够自动化，否则完成该任务所需的工时是相当可观的。


    如果这家航运公司使用 `FTS` 功能和索引结构，那么文档会被扫描到系统中，系统读取文本后再将其插入 SQL Server 数据库。这允许对特定的账号、运输发票以及日后审查所需的文档中任何独特文本进行全文搜索。可以创建一个类似书籍索引的索引，使查找特定文档变得更快。更进一步，`FTS`
    可以在文档本身内部查找特定内容。如果请求是查找由特定货运公司在特定拖车上发送的所有运输文档，`FTS` 功能允许在几分之一的时间内检索到信息，与手动流程或未索引的文本搜索相比。


    ### 创建全文索引示例


    既然已经介绍了 `FTS` 的概念，现在可以讨论索引策略了。全文索引是搜索和查询非结构化文本数据的支柱。这些数据可以是多种数据类型，包括 `char`、`varchar`、`nchar`、`nvarchar`、`xml`
    和 `varbinary`。虽然可以使用 `text`、`ntext` 和 `image`，但最好避免使用它们，因为它们在 SQL Server 中已弃用。数据类型
    `varchar`、`nvarchar` 和 `varbinary` 分别提供了等效的类型。


    在本节关于全文索引的剩余部分，Joseph Sack 的白皮书“Optimizing Your Query Plans with the SQL Server
    2014 Cardinality Estimator”的内容已使用清单 9-1 中的脚本插入到示例表中。该文档将用于演示全文索引，可以在联机丛书或从 [`http://bit.ly/1II5UfU`](http://bit.ly/1II5UfU)
    下载，并放置在目录 `c:\temp` 中。此外，需要安装全文目录功能才能成功运行本章中的代码。全文目录不是默认安装的功能，因此可能需要先安装它。


    注意


    对于所有版本的 SQL Server，要在 Microsoft Office 文档上构建全文索引，必须安装筛选器包 IFilter。请从 [`https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server`](https://support.microsoft.com/en-us/help/945934/how-to-register-microsoft-filter-pack-ifilters-with-sql-server)
    下载并安装 Microsoft Office Filter Packs。请务必遵循额外的步骤来运行 `sp_fulltext_service` 并重新启动
    SQL Server 实例。


