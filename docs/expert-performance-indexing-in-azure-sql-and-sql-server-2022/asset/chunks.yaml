- fmt: '## LIKE Comparison


    ### LIKE Comparison Basics


    When looking at the impact of queries on the use of indexes, the first and simplest
    place to start is with the `LIKE` comparison. The `LIKE` comparison allows searches
    in columns on any characters or pattern. If there is a need to identify all values
    in a table that start with the letters `AAA` or `BBB`, the `LIKE` comparison would
    provide this functionality. In these searches, the query can read through the
    index and find the values that match to the characters or pattern. Problems can
    arise when using this comparison in queries to find values that contain or end
    with a character or pattern.


    In this situation, the index becomes immaterial because statistics are collected
    only on the leftmost side of character values. Assuming a random distribution,
    the likelihood that the letter `B` appears in the first value in the index is
    equal to it appearing in the last value in the index. To determine which records
    in the table have a `B` anywhere in the column, all rows must be checked. There
    are no statistics available to identify whether a letter is contained within a
    character string. Without reliable statistics to use, SQL Server will not know
    what index to use to satisfy a query and will likely end up scanning the clustered
    index to return the matching values.


    ### The Problem with Leading Wildcards


    To understand the problems that can occur with the `LIKE` comparison, a few demonstrations
    will be provided that show both scenarios and their related statistics. To start,
    consider a scenario querying the `Person.Address` table for records where `AddressLine1`
    starts with “710%” (see Listing 14-1). A review of the `STATISTICS IO` output
    in Figure 14-1 shows the query required three logical reads. Examining the execution
    plan in Figure 14-2 shows an index seek on the non-clustered index.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig2_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index seek of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-2: Execution plan for addresses beginning with 710


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig1_HTML.png)


    A screenshot of input output page with a header that has results, messages, and
    execution plan tabs. It presents the output under the messages tab. It reads the
    table address and the number of rows affected. The logical reads is 3.


    Figure 14-1: STATISTICS I/O for addresses beginning with 710


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''710%'';

    ```

    Listing 14-1: Query for Addresses Beginning with 710


    In this situation, the `LIKE` comparison worked well, and the execution plan,
    statistics, and I/O were all appropriate for the request. Because the filter checked
    the leftmost characters in `AddressLine1`, SQL Server was able to use an index
    on that column to effectively filter that column and return the expected results.


    Unfortunately, this is not the only way `LIKE` comparisons can be used. It can
    be used to find values within a column. Consider a scenario where there is a need
    to find all addresses that match a specific street name, such as “Longbrook” (see
    Listing 14-2). With this query, the execution plan uses a scan on the non-clustered
    index and requires 216 logical reads, as shown in Figure 14-3. Figure 14-4 shows
    the execution plan.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig4_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index scan of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-4: Execution plan for addresses containing “Longbrook”


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig3_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    address and the affected rows. The logical reads is 216.


    Figure 14-3: STATISTICS I/O for addresses containing “Longbrook”


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''%Longbrook%'';

    ```

    Listing 14-2: Query for Addresses Containing “Longbrook”


    Because the filter on `AddressLine1` had a leading wildcard, SQL Server was unable
    to use an index on the column to satisfy the filter. Instead, it was forced to
    scan the index in its entirety to determine which values met the filter criteria.


    In this scenario, the table and index were both small. The difference between
    an index seek and a scan was not extreme. Consider if this scenario was happening
    in a production system with a much larger table. Instead of being able to quickly
    filter out records that match the search values, SQL Server is required to look
    through all rows using brute force. Even when that time may be just tens of seconds
    to complete, it opens the opportunity for blocking, locking, and deadlocking,
    which will further slow down queries in an environment. When queries execute,
    they lock resources as rows are written or read, and the longer locks are held,
    the greater the probability that those locked resources will impact other queries
    that are trying to access the same data.


    A popular method of avoiding this situation is to declare that wildcards are never
    allowed on the left edge of searches. In some applications, this is reasonable
    and can be implemented without any changes to SQL Server.


    Unfortunately, this can be an unrealistic expectation. There are few business
    managers in the world who would agree to require their users to enter all possible
    street number combinations in an attempt to find every address that matches the
    street name search. Just reading that explanation here makes it sound silly.


    ### Solution: Full-Text Indexing


    A much more appropriate and useful solution (though less popular) for this scenario
    is to create a full-text index on the table. A contributing factor to full-text
    indexes being less popular than non-clustered indexes is because of the difference
    in building and creating them, which has made them less familiar to most people.
    With a full-text index, words within one or more columns are cataloged, along
    with their position in the table. This enables the query to search quickly for
    the discrete values within a column without having to check all the records in
    an index.


    To use a full-text index on the `Person.Address` table, a full-text catalog must
    first be built, as shown in Listing 14-3. After that, the full-text index is created
    and includes the column that will be searched in the queries. Lastly, the query
    needs to be modified to use one of the full-text predicate functions. In this
    example, the `CONTAINS` function will be used.


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

    CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

    KEY INDEX PK_Address_AddressID;

    GO

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE CONTAINS (AddressLine1,''Longbrook'');

    ```

    Listing 14-3: Query for Addresses Using `CONTAINS`'
  raw: '## LIKE Comparison


    When looking at the impact of queries on the use of indexes, the first and simplest
    place to start is with the `LIKE` comparison. The `LIKE` comparison allows searches
    in columns on any characters or pattern. If there is a need to identify all values
    in a table that start with the letters *AAA* or *BBB*, the `LIKE` comparison would
    provide this functionality. In these searches, the query can read through the
    index and find the values that match to the characters or pattern. Problems can
    arise when using this comparison in queries to find values that contain or end
    with a character or pattern.


    In this situation, the index becomes immaterial because statistics are collected
    only on the leftmost side of character values. Assuming a random distribution,
    the likelihood that the letter *B* appears in the first value in the index is
    equal to it appearing in the last value in the index. To determine which records
    in the table have a *B* anywhere in the column, all rows must be checked. There
    are no statistics available to identify whether a letter is contained within a
    character string. Without reliable statistics to use, SQL Server will not know
    what index to use to satisfy a query and will likely end up scanning the clustered
    index to return the matching values.


    To understand the problems that can occur with the `LIKE` comparison, a few demonstrations
    will be provided that show both scenarios and their related statistics. To start,
    consider a scenario querying the `Person.Address` table for records where `AddressLine1`
    starts with “710%” (see Listing [14-1](#338675_4_En_14_Chapter.xhtml#PC1)). A
    review of the `STATISTICS IO` output in Figure [14-1](#338675_4_En_14_Chapter.xhtml#Fig1)
    shows the query required three logical reads. Examining the execution plan in
    Figure [14-2](#338675_4_En_14_Chapter.xhtml#Fig2) shows an index seek on the non-clustered
    index.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig2_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index seek of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-2


    Execution plan for addresses beginning with 710


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig1_HTML.png)


    A screenshot of input output page with a header that has results, messages, and
    execution plan tabs. It presents the output under the messages tab. It reads the
    table address and the number of rows affected. The logical reads is 3.


    Figure 14-1


    STATISTICS I/O for addresses beginning with 710


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''710%'';

    Listing 14-1

    Query for Addresses Beginning with 710

    ```


    In this situation, the `LIKE` comparison worked well, and the execution plan,
    statistics, and I/O were all appropriate for the request. Because the filter checked
    the leftmost characters in *AddressLine1*, SQL Server was able to use an index
    on that column to effectively filter that column and return the expected results.


    Unfortunately, this is not the only way `LIKE` comparisons can be used. It can
    be used to find values within a column. Consider a scenario where there is a need
    to find all addresses that match a specific street name, such as “Longbrook” (see
    Listing [14-2](#338675_4_En_14_Chapter.xhtml#PC2)). With this query, the execution
    plan uses a scan on the non-clustered index and requires 216 logical reads, as
    shown in Figure [14-3](#338675_4_En_14_Chapter.xhtml#Fig3). Figure [14-4](#338675_4_En_14_Chapter.xhtml#Fig4)
    shows the execution plan.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig4_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index scan of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-4


    Execution plan for addresses containing “Longbrook”


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig3_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    address and the affected rows. The logical reads is 216.


    Figure 14-3


    STATISTICS I/O for addresses containing “Longbrook”


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''%Longbrook%'';

    Listing 14-2

    Query for Addresses Containing “Longbrook”

    ```


    Because the filter on *AddressLine1* had a leading wildcard, SQL Server was unable
    to use an index on the column to satisfy the filter. Instead, it was forced to
    scan the index in its entirety to determine which values met the filter criteria.


    In this scenario, the table and index were both small. The difference between
    an index seek and a scan was not extreme. Consider if this scenario was happening
    in a production system with a much larger table. Instead of being able to quickly
    filter out records that match the search values, SQL Server is required to look
    through all rows using brute force. Even when that time may be just tens of seconds
    to complete, it opens the opportunity for blocking, locking, and deadlocking,
    which will further slow down queries in an environment. When queries execute,
    they lock resources as rows are written or read, and the longer locks are held,
    the greater the probability that those locked resources will impact other queries
    that are trying to access the same data.


    A popular method of avoiding this situation is to declare that wildcards are never
    allowed on the left edge of searches. In some applications, this is reasonable
    and can be implemented without any changes to SQL Server.


    Unfortunately, this can be an unrealistic expectation. There are few business
    managers in the world who would agree to require their users to enter all possible
    street number combinations in an attempt to find every address that matches the
    street name search. Just reading that explanation here makes it sound silly.


    A much more appropriate and useful solution (though less popular) for this scenario
    is to create a full-text index on the table. A contributing factor to full-text
    indexes being less popular than non-clustered indexes is because of the difference
    in building and creating them, which has made them less familiar to most people.
    With a full-text index, words within one or more columns are cataloged, along
    with their position in the table. This enables the query to search quickly for
    the discrete values within a column without having to check all the records in
    an index.


    To use a full-text index on the `Person.Address` table, a full-text catalog must
    first be built, as shown in Listing [14-3](#338675_4_En_14_Chapter.xhtml#PC3).
    After that, the full-text index is created and includes the column that will be
    searched in the queries. Lastly, the query needs to be modified to use one of
    the full-text predicate functions. In this example, the `CONTAINS` function will
    be used.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

    CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

    KEY INDEX PK_Address_AddressID;

    GO

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE CONTAINS (AddressLine1,''Longbrook'');

    Listing 14-3

    Query for Addresses Using CONTAINS

    ```'
  trans: '

    ## LIKE 比较


    ### LIKE 比较基础


    在评估查询对索引使用的影响时，最简单直接的起点是 `LIKE` 比较。`LIKE` 比较允许基于任意字符或模式在列中进行搜索。如果需要识别表中所有以字母 `AAA`
    或 `BBB` 开头的值，`LIKE` 比较就能提供这种功能。在此类搜索中，查询可以读取索引并找到与字符或模式匹配的值。当在查询中使用此比较来查找包含或以某个字符/模式结尾的值时，可能会出现问题。


    在这种情况下，索引变得无关紧要，因为统计信息仅针对字符值最左侧的部分收集。假设是随机分布，字母 `B` 出现在索引第一个值中的概率与其出现在最后一个值中的概率是相等的。要确定表中哪些记录的列中任何位置包含
    `B`，则必须检查所有行。没有可用的统计信息来识别字母是否包含在字符串中。由于没有可靠的统计信息可用，SQL Server 将不知道使用哪个索引来满足查询，最终很可能会扫描聚集索引来返回匹配的值。


    ### 前导通配符的问题


    为了理解使用 `LIKE` 比较可能出现的问题，将提供一些演示，展示两种场景及其相关的统计信息。首先，考虑一个场景：查询 `Person.Address`
    表中 `AddressLine1` 以“710%”开头的记录（参见清单 14-1）。查看图 14-1 中的 `STATISTICS IO` 输出，该查询需要三次逻辑读取。检查图
    14-2 中的执行计划，显示了在非聚集索引上执行了索引查找。


    ![](img/338675_4_En_14_Fig2_HTML.png)


    一个输入输出页面的截图，展示了执行计划选项卡下的输出。它显示了查询、地址，以及在非聚集索引上成本为 100% 的索引查找执行，该索引映射到成本为 0% 的选定表。


    图 14-2：地址以 710 开头的执行计划


    ![](img/338675_4_En_14_Fig1_HTML.png)


    一个输入输出页面的截图，标题包含结果、消息和执行计划选项卡。它展示了消息选项卡下的输出。显示了表地址和受影响行数。逻辑读取数为 3。


    图 14-1：地址以 710 开头的 STATISTICS I/O


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''710%'';

    ```

    清单 14-1：查询地址以 710 开头的语句


    在此情况下，`LIKE` 比较工作良好，执行计划、统计信息和 I/O 都适合该请求。因为筛选器检查的是 `AddressLine1` 最左侧的字符，SQL
    Server 能够使用该列上的索引来有效地筛选该列并返回预期结果。


    不幸的是，`LIKE` 比较并非只有这一种用法。它还可以用于在列中查找值。考虑一个需要查找匹配特定街道名称（如“Longbrook”）的所有地址的场景（参见清单
    14-2）。对于此查询，执行计划对非聚集索引使用扫描，并需要 216 次逻辑读取，如图 14-3 所示。图 14-4 显示了执行计划。


    ![](img/338675_4_En_14_Fig4_HTML.png)


    一个输入输出页面的截图，展示了执行计划选项卡下的输出。它显示了查询、地址，以及在非聚集索引上成本为 100% 的索引扫描执行，该索引映射到成本为 0% 的选定表。


    图 14-4：地址包含“Longbrook”的执行计划


    ![](img/338675_4_En_14_Fig3_HTML.png)


    一个输入输出页面的消息选项卡截图。显示了标记为地址的表和受影响的行。逻辑读取数为 216。


    图 14-3：地址包含“Longbrook”的 STATISTICS I/O


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE AddressLine1 LIKE ''%Longbrook%'';

    ```

    清单 14-2：查询地址包含“Longbrook”的语句


    因为 `AddressLine1` 上的筛选器有一个前导通配符，SQL Server 无法使用该列上的索引来满足筛选条件。相反，它被迫扫描整个索引以确定哪些值符合筛选条件。


    在此场景中，表和索引都很小。索引查找和扫描之间的差异并不极端。设想一下，如果这个场景发生在一个表大得多的生产系统中。SQL Server 无法快速筛选出匹配搜索值的记录，而是被迫使用暴力方式遍历所有行。即使所需时间可能只是几十秒，这也为阻塞、锁定和死锁打开了机会，这将进一步减慢环境中的查询速度。当查询执行时，它们在写入或读取行时会锁定资源，锁定时间越长，这些锁定资源影响其他试图访问相同数据的查询的概率就越大。


    一种避免这种情况的流行方法是声明绝不允许在搜索的左边缘使用通配符。在某些应用程序中，这是合理的，并且可以在不对 SQL Server 做任何更改的情况下实施。


    不幸的是，这可能是一个不切实际的期望。世界上很少会有业务经理同意要求其用户输入所有可能的街道号码组合，以试图查找匹配街道名称搜索的每一个地址。光是阅读这里的解释就让人觉得荒谬。


    ### 解决方案：全文索引


    针对此场景，一个更合适且有用的解决方案（尽管不太流行）是在表上创建全文索引。全文索引不如非聚集索引流行的一个促成因素是其构建和创建方式的差异，这使得大多数人对其不太熟悉。使用全文索引，一个或多个列中的单词及其在表中的位置会被编入目录。这使得查询能够快速搜索列内的离散值，而无需检查索引中的所有记录。


    要在 `Person.Address` 表上使用全文索引，首先必须构建全文目录，如清单 14-3 所示。之后，创建全文索引并包含将在查询中被搜索的列。最后，需要修改查询以使用全文谓词函数之一。在此示例中，将使用
    `CONTAINS` 函数。


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE FULLTEXT CATALOG ftQueryStrategies AS DEFAULT;

    CREATE FULLTEXT INDEX ON Person.Address(AddressLine1)

    KEY INDEX PK_Address_AddressID;

    GO

    SELECT AddressID, AddressLine1, AddressLine2, City, StateProvinceID, PostalCode

    FROM Person.Address

    WHERE CONTAINS (AddressLine1,''Longbrook'');

    ```

    清单 14-3：使用 `CONTAINS` 查询地址的语句

    '
- fmt: 'With the full-text index in place, the performance of the search for streets
    named Longbrook is similar to the first search where the query was looking for
    addresses starting with 710. In the execution plan in Figure [14-6](#338675_4_En_14_Chapter.xhtml#Fig6),
    instead of a scan of the non-clustered index, the query is using a seek operation
    on the clustered index with a table-valued function lookup against the full-text
    index. As a result, instead of the 216 logical reads when using the `LIKE` comparison,
    using the full-text index requires only 12 logical reads (shown in Figure [14-5](#338675_4_En_14_Chapter.xhtml#Fig5)).
    The difference in reads provides a substantial improvement in performance over
    the first search attempt.


    For more information on full-text indexes, read Chapter [9](#338675_4_En_9_Chapter.xhtml).


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig6_HTML.png)


    A page presents the output under the execution plan tab. It reads the query, address,
    nested loops, table-valued functions at cost 17%, and clustered index seek at
    cost 83% is mapped to a selected table at cost 0%.


    Figure 14-6


    Execution plan for addresses using `CONTAINS`


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig5_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    address and the affected rows. The logical reads is 12.


    Figure 14-5


    `STATISTICS I/O` for addresses using `CONTAINS`


    There are other potential solutions to this problem, such as the manual creation
    of N-gram tables to manage discrete keywords within a string column. This can
    be an effective way to customize a string search solution when the set of search
    terms is limited and can be maintained in some automated fashion. Demonstrating
    this is out of scope for this book, but it is worth mentioning for scenarios where
    standard indexing and full-text indexing are inadequate to solve a string searching
    challenge.


    ## Concatenation


    Another scenario that can wreak havoc on indexing strategies is the use of concatenation.
    `Concatenation` is when two or more values are appended to one another. When this
    happens in a `WHERE` clause, it can often lead to poor performance that isn’t
    expected.


    To demonstrate this scenario, consider a query for someone with the name Gustavo
    Achong. Searching for this value requires using the `FirstName` and `LastName`
    columns, which are concatenated together with a space between the columns. Listing
    [14-4](#338675_4_En_14_Chapter.xhtml#PC4) shows the query. A script to build an
    index on these columns is also included in the code listing. The execution plan
    generated for this query, shown in Figure [14-8](#338675_4_En_14_Chapter.xhtml#Fig8),
    shows that the new index is used but the operation is a scan instead of a seek,
    which would be more desirable. Even though the leading left edge of the index
    matches the left-side values of the concatenated values, the index is not able
    to determine where to find the values in the index. This results in the index
    using 99 logical reads to return the query results, shown in Figure [14-7](#338675_4_En_14_Chapter.xhtml#Fig7).


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    Listing 14-4

    Query with Concatenation

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig8_HTML.png)


    A screenshot of a page presents the output under the execution plan tab. It reads
    the query, address, index scan on non-clustered index at cost 89%, computes scalar
    at cost 2%, and filter at cost 9%, is mapped to a selected table.


    Figure 14-8


    Execution plan for concatenation


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig7_HTML.png)


    A screenshot of a page presents the output under the messages tab. It reads the
    tables worktable, person and the number of rows affected. Logical reads of the
    table person is 99 which is highlighted.


    Figure 14-7


    `STATISTICS I/O` for concatenation


    As mentioned, using a scan on the index is not necessarily a bad thing. However,
    using a scan when there are a lot of concurrent users or data modifications occurring
    could lead to contention and latency. When it comes to larger tables with millions
    or more records, this can possibly lead to a lack of scalability for the database.


    It may seem reasonable at first glance to remove the space between the first and
    last names (see Listing [14-5](#338675_4_En_14_Chapter.xhtml#PC5)), since then
    it’s using the two columns from the index we created. The issue with this solution
    is that it doesn’t work. As the execution plan in Figure [14-10](#338675_4_En_14_Chapter.xhtml#Fig10)
    shows, it is nearly identical to the one with the space in the concatenated value
    with the same 99 reads as well (shown in Figure [14-9](#338675_4_En_14_Chapter.xhtml#Fig9)).


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    Listing 14-5

    Concatenation Without Spaces

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig10_HTML.png)


    A screenshot of a page presents the output under the execution plan tab. It reads
    the query, address, index scan on non-clustered index at cost 89%, computes scalar
    at cost 2%, and filter at cost 9%, is mapped to a selected table. The concatenation
    with no space in query.


    Figure 14-10


    Execution plan for concatenation without spaces


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig9_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    person and the affected rows. The logical reads is 99.


    Figure 14-9


    `STATISTICS I/O` for concatenation without spaces


    Probably the best way to fix issues with concatenated values is to remove the
    need to concatenate. Instead of searching for the value `Gustavo Achong`, search
    for the first name `Gustavo` and the last name `Achong` (see Listing [14-6](#338675_4_En_14_Chapter.xhtml#PC6)).
    When this change is made, the query is then able to use a seek operation on the
    non-clustered index and return the results with only two logical reads (see Figure
    [14-11](#338675_4_En_14_Chapter.xhtml#Fig11)). These results are a significant
    improvement over when the values were concatenated together. See Figure [14-12](#338675_4_En_14_Chapter.xhtml#Fig12)
    for the execution plan.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo''

    AND LastName = ''Achong'';

    Listing 14-6

    Query with Concatenation Removed

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig12_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index seek of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-12


    Execution plan with concatenation removed


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig11_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    person and the affected rows. The logical reads is 2.


    Figure 14-11


    `STATISTICS I/O` for concatenation removed


    The ideal `WHERE` clause is composed of simple predicates that can be easily resolved.
    Functions, transformations, combinations, and other attempts to alter data on
    the fly while trying to filter data are more likely to lead to unexpected index
    scans, unwanted contention, and longer-running queries.


    At times, you won’t have the option to remove concatenation from a query. In these
    scenarios, there is another way to resolve index performance issues: the concatenated
    values can be added to the table as a computed column. This solution, along with
    some of its challenges, is discussed in the next section.'
