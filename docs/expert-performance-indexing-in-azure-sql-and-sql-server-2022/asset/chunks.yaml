- fmt: '## Row Lock


    The first set of columns consists of the row lock columns. These columns include
    `row_lock_count`, `row_lock_wait_count`, and `row_lock_wait_in_ms`. Through these
    columns, the number of locks that occur on a row can be measured, as well as whether
    there was contention when acquiring the row lock. Row lock contention can often
    be observed by its effect on transaction performance through blocking and deadlocking.


    To demonstrate how this information is collected, execute the code in Listing
    [5-29](#338675_4_En_5_Chapter.xhtml#Fig29). In this script, rows from the `Sales.SalesOrderDetail`
    table are retrieved based on `ProductID`. In the `AdventureWorks2017` database,
    the query retrieves 44 rows.


    ```sql

    USE AdventureWorks2017

    GO

    ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 710;

    Listing 5-29

    T-SQL Script to Generate Row Locks

    ```


    To observe the row locks that were acquired by the query, use the row lock columns
    in the query provided in Listing [5-30](#338675_4_En_5_Chapter.xhtml#PC30). In
    these results, for each row that was returned by the query against `Sales.SalesOrderDetail`,
    there is one lock included in the results of `sys.dm_db_index_operational_stats`,
    shown in Figure [5-21](#338675_4_En_5_Chapter.xhtml#Fig21). As a result, there
    were a total of 44 row locks placed on the index `IX_SalesOrderDetail_ProductID`.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig21_HTML.png)


    A screenshot of the query table results for row locks with 3 rows of data. The
    column headers are table name, index name, page lock count, page lock wait count,
    and page lock wait in m s.


    Figure 5-21


    Query results for row locks


    Note that there is no information returned for the `row_lock_wait_count` and `row_lock_wait_in_ms`
    columns. This is because the script was not blocked by any other query. Had the
    query in Listing [5-29](#338675_4_En_5_Chapter.xhtml#PC29) been blocked by another
    transaction, then the values in these columns would have been adjusted to reflect
    that blocking.


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.row_lock_count

    ,ios.row_lock_wait_count

    ,ios.row_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-30

    Query for Row Locks in sys.dm_db_index_operational_stats

    ```


    ## Page Lock


    The next set of columns are the page lock columns. The columns in this group have
    similar characteristics to the row lock columns, with the exception that they
    are scoped at the page level instead of the row level. For every page that relates
    to an accessed row, a page lock is acquired. These columns are `page_lock_count`,
    `page_lock_wait_count`, and `page_lock_wait_in_ms`. When monitoring for locking
    contention on an index, it is important to look at both page and row levels to
    identify whether the contention is on the individual rows being accessed or different
    rows accessed on the same page.


    To review the differences, continue with the query from Listing [5-29](#338675_4_En_5_Chapter.xhtml#PC29)
    and retrieve the page lock statistics that were collected in `sys.dm_db_index_operational_stats`
    for the query. This information is available using the script in Listing [5-31](#338675_4_En_5_Chapter.xhtml#PC31).
    The results are a bit different than those for the row locks. For the page locks,
    see Figure [5-22](#338675_4_En_5_Chapter.xhtml#Fig22); there are only two page
    locks on the index `IX_SalesOrderDetail_ProductID`. In addition, there are 44
    page locks on `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`, which did
    not encounter any row locks.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig22_HTML.png)


    A screenshot of the query table results for page locks with 3 rows of data. The
    column headers are table name, index name, index lock promotion attempt count,
    index lock promotion count.


    Figure 5-22


    Query results for page locks


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.page_lock_count

    ,ios.page_lock_wait_count

    ,ios.page_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-31

    Query for Page Locks in sys.dm_db_index_operational_stats

    ```


    The statistics for the locking behavior may not make sense initially, until considering
    the activity that occurred when the query (from Listing [5-29](#338675_4_En_5_Chapter.xhtml#PC29))
    executed. When the query executed, it utilized an index seek and a key lookup
    (see the execution plan in Figure [5-23](#338675_4_En_5_Chapter.xhtml#Fig23)).
    The index seek on `IX_SalesOrderDetail_ProductID` accounts for the 2 page locks
    and the 44 row locks. There were 44 rows that matched the predicate for the query,
    and they spanned 2 pages. The 44 page locks on `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    are the result of the key lookup operations that occurred for all rows from `IX_SalesOrderDetail_ProductID`.
    Together, the row and page lock columns help describe the activity that occurred.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig23_HTML.jpg)


    A flow diagram of select query plan execution. A query is executed. The conditions
    for seek and key lookup at cost 2% and 98% are executed. It flows to the nested
    loops at 0% cost and select at 0% cost to display.


    Figure 5-23


    Execution plan for SELECT query


    While row and page locking are useful for identifying when contention exists,
    there is one aspect of locking that it does not provide: the types of locks that
    are being placed. The locks could be shared locks, or they could be exclusive
    locks. The lock wait count provides scope around the frequency of incompatible
    locks on the tables and the duration of those locks, though the details of the
    locks themselves are not identified.'
  raw: '#### Row Lock


    The first set of columns consists of the row lock columns. These columns include
    `row_lock_count`, `row_lock_wait_count`, and `row_lock_wait_in_ms`. Through these
    columns, the number of locks that occur on a row can be measured, as well as whether
    there was contention when acquiring the row lock. Row lock contention can often
    be observed by its effect on transaction performance through blocking and deadlocking.


    To demonstrate how this information is collected, execute the code in Listing
    [5-29](#338675_4_En_5_Chapter.xhtml#Fig29). In this script, rows from the `Sales.SalesOrderDetail`
    table are retrieved based on `ProductID`. In the AdventureWorks2017 database,
    the query retrieves 44 rows.


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX ALL ON Sales.SalesOrderDetail REBUILD;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    FROM Sales.SalesOrderDetail

    WHERE ProductID = 710;

    Listing 5-29

    T-SQL Script to Generate Row Locks

    ```


    To observe the row locks that were acquired by the query, use the row lock columns
    in the query provided in Listing [5-30](#338675_4_En_5_Chapter.xhtml#PC30). In
    these results, for each row that was returned by the query against `Sales.SalesOrderDetail`,
    there is one lock included in the results of `sys.dm_db_index_operational_stats`,
    shown in Figure [5-21](#338675_4_En_5_Chapter.xhtml#Fig21). As a result, there
    were a total of 44 row locks placed on the index `IX_SalesOrderDetail_ProductID`.


