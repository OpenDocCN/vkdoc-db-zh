    一个面板，其中打开了执行计划选项卡，针对查询 2 显示了两行文本，其成本占批处理的 50%。下方是一个流程图，展示了多条路径，即：索引查找（非聚集，员工）、索引查找（聚集，员工职位
    ICP）以及聚集索引查找（聚集，职位），各占 33%、33%和 33%的成本，最终汇聚到标记为“选择”的端点，该端点成本为 0%。


    图 13-13


    多列模式的执行计划


    ![](img/338675_4_En_13_Fig12_HTML.png)


    一个面板，其中打开了执行计划选项卡，针对查询 2 显示了两行文本，其成本占批处理的 50%。下方是一个流程图，展示了多条路径，即：索引查找（非聚集，员工）、索引查找（非聚集，员工职位
    ICP）以及聚集索引查找（聚集，职位），各占 33%、33%和 33%的成本，最终汇聚到标记为“选择”的端点，该端点成本为 0%。


    图 13-12


    标识列模式的执行计划


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE EmployeeName = ''Purchasing|ShipMethod''

    代码清单 13-11

    多列模式的脚本

    ```


    多列模式有多种实现方式。聚集索引中的关键列可以反转，这将改变为测试脚本生成的执行计划。虽然这种模式可能有益，但在使用时需谨慎，并在使用前充分了解预期的工作负载。


    作为对多列模式的总结，我们将回顾一个定义良好的聚集索引应具备的属性。首先，值是静态的。如果发生更改，很可能是删除一条记录并插入一条新记录。这实际上仍然是一次更新操作。为了降低此风险，应尝试让聚集索引以最不可能更改或变化最少的值开头。第二个属性是聚集键是否窄。在此示例中，键大多是窄的。它由两个
    4 字节的列组成。如果使用更大的列或超过两列，则需要仔细考虑这是否是正确的做法。下一个属性是值是否唯一。在此场景中是唯一的，在现实世界的任何场景中也应该如此。如果不唯一，那么此模式自然不合格。与其他非标识列模式一样，此模式不提供单调递增的聚集键。


    最后需要注意一点，数据仓库中的事实表常常容易落入使用多列模式的诱惑中。在这些情况下，事实表中的所有维度键都被放入聚集索引中。这样做的目的是对事实行强制实施唯一性。其效果是创建了一个极宽的聚集键，然后该键会被添加到表上的所有非聚集索引中。很可能，聚集键中的每个维度列都会在事实表上拥有一个单独的索引。结果，这些索引浪费了大量空间，并且由于其尺寸，其性能远不如使用非聚集唯一索引来约束事实表上的唯一性那么好。对于数据仓库或其他
    OLAP 类型的表，列存储索引可以提供最佳的数据结构。在设计复杂的聚集行存储索引之前，请考虑先测试列存储索引。本章后面将更详细地讨论列存储索引。


    ### 全局唯一标识符


    最后一种，也毫无疑问是效益最低（且最不流行）的用于选择聚集索引列的模式是使用全局唯一标识符，也称为 GUID。GUID 模式涉及使用唯一生成的值为表中的每一行提供唯一值。该值不是基于整数的，之所以常被选用，是因为它可以在任何位置（在应用程序的拓扑结构内）生成，并保证唯一性。此模式解决的问题是需要能够在与通常控制唯一值列表的源断开连接时生成新的唯一值。不幸的是，GUID
    模式常常制造出与它解决的问题一样多的挑战。


    生成 GUID 值主要有两种方法。第一种是通过 `NEWID()` 函数。该函数生成一个 16 字节的十六进制值，该值部分基于创建它时计算机的 MAC 地址。每个生成的值都是唯一的，并且可以以
    0 到 9 或 a 到 f 中的任何值开头。下一个创建的值在排序中可能位于前一个值之前或之后。无法保证下一个值是单调递增的。生成 GUID 的第二种选择是通过
    `NEWSEQUENTIALID()`。该函数也创建一个 16 字节的十六进制值。与另一个函数不同，`NEWSEQUENTIALID()` 创建的新值自计算机上次启动以来始终大于前一个生成的值。最后一点很重要，因为当服务器重新启动时，使用
    `NEWSEQUENTIALID()` 生成的新值有可能小于重启前创建的值。`NEWSEQUENTIALID()` 的逻辑仅保证自服务器启动以来的值是顺序的。


    如前所述，使用 GUID 模式不能保证提供单调递增的值。无论是 `NEWID()` 还是 `NEWSEQUENTIALID()`，都无法保证下一个值总是大于最后一个值。此外，它不能提供一个窄索引。当将
    GUID 存储为 `uniqueidentifier` 时，它需要 16 字节的存储空间。这相当于四个 `int` 或两个 `bigint` 的大小。相比之下，GUID
    相当大，而且这个值会用于表上的所有非聚集索引。然而，GUID 模式使用的空间有时可能比这更糟。在某些情况下，如果 GUID 模式实现不当，GUID 值会存储为字符，这需要
    36 字节来存储，如果使用 Unicode 数据类型则需要 72 字节。


    即使 GUID 模式有这些缺陷，它确实实现了定义良好的聚集键的其他一些属性。首先，该值是唯一的。使用 `NEWID()` 和 `NEWSEQUENTIALID()`
    函数生成的 GUID 值都是唯一的。该值也是静态的，因为生成的 GUID 值没有业务含义，因此没有理由更改。


    为了演示使用 GUID 模式的影响，将检查其在表上与其他实现的对比。在此场景中，如代码清单 13-12 所示，有三个表。表 `dbo.IndexStrategiesGUID_ICP`
    使用标识列模式设计。表 `dbo.IndexStrategiesGUID_UniqueID` 使用 GUID 模式构建，遵循最佳实践采用 `uniqueidentifier`。最后一个脚本包含表
    `dbo.IndexStrategiesGUID_String`，它使用 `varchar(36)` 来存储 GUID 值。后一种方法不是实现 GUID 模式的正确方式，分析将有助于突出这一点。在构建好所有三个表后，插入语句将向每个表填充
    250,000 行。场景中的最后一条语句检索每个表使用的页数。

