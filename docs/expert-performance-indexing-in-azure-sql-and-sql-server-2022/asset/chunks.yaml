  trans: '

    # 哈希索引


    可用于内存优化数据的一种索引类型是哈希索引。哈希索引将表中的数据分隔成固定数量的**存储桶**。插入表中的行随后使用哈希函数分配到可用的存储桶中。这些存储桶使得查询能够基于点查找操作返回特定的行。哈希索引专为需要检索表中单个行的查询工作负载而设计。


    创建哈希索引时，要创建的存储桶数量是索引列预期值数量的函数。如果一个列或一组列具有较高的**基数**，则需要更大的存储桶计数。理想情况下，存储桶计数应恰好等于索引列的不同值的数量。实际上，该数字会更高，以便为未来的增长留出一些空间。


    这是在内存优化表上创建和调整哈希索引的重要组成部分。随着每个存储桶中行数的增加，由于哈希冲突，检索数据所需的时间也会增加。


    最优的哈希索引需要有足够的存储桶来应对未来的增长（并避免哈希冲突），同时不能有过多的存储桶（从而浪费空间）。


    为了演示存储桶大小的影响，代码清单 8-4 创建了两个内存优化表。两个表都有 1,000,000 行数据，第一个表有 1,000 个存储桶，第二个表有 1,000,000
    个存储桶。在此配置下，第一个表每个存储桶大约有 1,000 行，第二个表每个存储桶有 1 行。由于索引的是一个标识列，因此每行的 `SalesOrderID`
    值都是唯一的。


    ```sql

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_low'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_low

    CREATE TABLE dbo.SalesOrderHeader_low(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_Hash_low PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_low

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high

    CREATE TABLE dbo.SalesOrderHeader_high(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    ```

    代码清单 8-4 创建带有哈希索引的内存优化表


    **警告**


    代码清单 8-4 中的代码可能需要长达 5 分钟才能执行完毕。


    在执行此演示的下一部分代码之前，请基于**查询详细信息跟踪模板**创建一个扩展事件会话。该会话应使用默认配置创建，然后启动到扩展事件实时数据查看器。将列 `session_id`、`statement`、`writes`、`physical_reads`、`logical_reads`、`duration`
    和 `cpu_time` 添加到实时查看器窗口。最后，根据代码清单 8-5 和 8-6 中的 `session_id` 值以及事件名称 `sql_statement_completed`，对输出中的
    `session_id` 进行筛选。


    当如代码清单 8-5 所示对两个表执行查询以返回相同的行时，可以观察到两者之间存在略微不同的性能。在此示例中，第一个查询的执行时间为 359 微秒，而第二个查询为
    48 微秒，如图 8-1 所示。虽然总持续时间上的这个差异很小，但它们之间的相对差异却很显著。在将使用内存优化表来检索结果的解决方案中，这种性能差异可能很重要，尤其是在查询频繁执行的情况下。


    ![](img/338675_4_En_8_Fig1_HTML.png)


    一个表格查询的屏幕截图，包含 9 列 8 行。表项提供了每个查询持续时间的详细信息。以 WHERE 结尾的查询的持续时间分别为 359 和 48。


    图 8-1 带有哈希索引的内存优化表查询的持续时间——单行


    ```sql

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    PRINT ''Memory Optimized Table with 1000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_low

    WHERE SalesOrderID = 42

    ORDER BY SalesOrderID

    PRINT ''Memory Optimized Table with 1,000,000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID = 42

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```

    代码清单 8-5 查询带有哈希索引的内存优化表——单行


    重要的是，不要将上一个脚本的结果解读为指示存储桶与值的 1:1 比例是最佳实践。如果运行另一组查询，检索多于单行，例如如代码清单 8-6 所示返回第 42
    到 420 行，那么性能概况就会发生变化。在这种情况下，性能优势转向了拥有更多值的存储桶。现在的结果是，第一个表的查询为 86,973 微秒，而第二个表的查询为
    101,127 微秒，如图 8-2 所示。


    ![](img/338675_4_En_8_Fig2_HTML.png)


    一个包含 8 行 9 列的表格屏幕截图。它提供了每个查询的持续时间和 CPU 时间的详细信息。以 WHERE 结尾的两个查询的持续时间和 CPU 时间分别给出为
    86973 和 135000，以及 101127 和 110000。


    图 8-2 带有哈希索引的内存优化表查询的持续时间——多行


    ```sql

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    PRINT ''Memory Optimized Table with 1000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_low

    WHERE SalesOrderID BETWEEN 42 AND 420

    ORDER BY SalesOrderID

    PRINT ''Memory Optimized Table with 1,000,000 buckets''

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 42 AND 420

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```

    代码清单 8-6 查询带有哈希索引的内存优化表——多行


    使用哈希索引时，了解 SQL Server 如何使用哈希中的存储桶非常重要。需要注意的一个关键点是，即使有足够的存储桶让每个值都拥有自己的存储桶，也并不意味着每个值都会获得自己的存储桶。要查看本章创建的哈希索引的统计信息，请运行代码清单
    8-7 中的查询，该查询访问动态管理视图 `sys.dm_db_xtp_hash_index_stats`。此 DMV 提供了有关存储桶数量以及这些存储桶填充情况的信息。

    '
- fmt: '```

    USE MemOptIndexing

    GO

    SELECT OBJECT_NAME(hs.object_id) AS object_name

    ,i.name as index_name

    ,hs.total_bucket_count

    ,hs.empty_bucket_count

    ,FLOOR((CAST(empty_bucket_count as float)/total_bucket_count) * 100) AS empty_bucket_percent

    ,hs.avg_chain_length

    ,hs.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS hs

    INNER JOIN sys.indexes AS i ON hs.object_id=i.object_id AND hs.index_id=i.index_id

    ```


    `Listing 8-7`

    `Query to Review Hash Index Statistics`


    Reviewing the results of `Listing 8-7`, provided in Figure `8-3`, reveals a few
    key metrics. The first index with 1,000 buckets specified (`SalesOrderHeader_low`)
    actually has 1,024 buckets for the index. This is because buckets are created
    in allocations that align to a power of two. This is the same reason there are
    1,048,576 buckets for the 1,000,000-bucket index on `SalesOrderHeader_high`. The
    next notable property is the number of empty buckets in the hash index on `SalesOrderHeader_high`.
    With 1,000,000 rows and more than a million buckets, there are still 37 percent
    of the buckets that are empty. This happens because with the deterministic hashing
    function, some hashed values are repeated within the range of values before all
    the buckets are utilized. This is something to consider when building hash indexes,
    especially when aiming to have a 1:1 ratio of buckets to rows.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig3_HTML.png)


    Figure 8-3

    Output from the hash bucket statistics query


    Note

    Query performance details were captured using an Extended Events session based
    on the Query Detail Tracking template with a filter for the session that included
    the demonstration queries. More information on building sessions can be found
    here: `https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server?view=sql-server-ver16`.


    Hash indexes on memory-optimized tables are the ideal indexing choice when queries
    will retrieve individual or small numbers of values from an index at any given
    time. When building the tables and hash indexes, focus on setting the number of
    buckets to a size that presents a reasonable ratio of values to buckets with consideration
    for the number of values that will be retrieved through typical queries.


    ## Range Indexes


    The second type of index that is supported for memory-optimized tables is the
    range index. Range indexes are used to support range and ordered scans of data.
    They leverage a variation of a B-tree, which Microsoft calls a Bw-tree. The key
    difference between these two structures is the reference between the nodes in
    the Bw-tree, which refers to memory locations vs. physical page location. When
    determining whether to include a range index on a memory-optimized table, the
    primary consideration will be whether a range of values will be scanned or `ORDER
    BY` statements will need to be supported.


    Note

    You can find more information on Bw-trees at `http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf`.


    To create a range index on a memory-optimized table, the index is declared within
    the schema of the table by indicating a `NONCLUSTERED` index with the key values.
    As shown in `Listing 8-8`, the index `IX_SalesOrderHeader` is a range index on
    the `SalesOrderID` column. Unlike hash indexes, there are no other attributes
    to consider. Therefore, bucket counts are not relevant for range indexes.


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high_range'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high_range

    CREATE TABLE dbo.SalesOrderHeader_high_range(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high_range PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000)

    ,INDEX IX_SalesOrderHeader NONCLUSTERED (SalesOrderID)

    )

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high_range

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    ```


    `Listing 8-8`

    `Create a Table with a Range Index`


    To demonstrate the value of the range index on memory-optimized tables, the table
    created in `Listing 8-8` will be used with queries that will leverage range scans.
    Consider `Listing 8-9`, which queries the new table (`dbo.SalesOrderHeader_high_range`)
    and the table previously created with a hash index (`dbo.SalesOrderHeader_high`).
    By executing a query against both tables for the rows with `SalesOrderID` between
    100 and 10,000, a significant difference in the execution time can be observed.
    The query against a hash index runs in 216 ms (see Figure `8-4`), while the query
    against a range index runs in 97 ms. In this scenario, range indexes provide a
    substantial performance improvement.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig4_HTML.png)


    Figure 8-4

    Duration for memory-optimized table queries with a range scan


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SELECT *

    FROM dbo.SalesOrderHeader_high_range

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```


    `Listing 8-9`

    `Query Memory-Optimized Tables with a Range Scan`


    In a similar fashion, `ORDER BY` statements are also greatly improved when range
    indexes on memory-optimized tables are available. Using the code in `Listing 8-10`,
    two queries are executed against the same tables from the previous demonstration.
    In this scenario, using the output in Figure `8-5` shows that the range scan took
    462 μs compared with the 240,733 μs that the hash index required. This illustrates
    a substantial performance improvement through the use of the range index.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig5_HTML.png)


    Figure 8-5

    Duration for memory-optimized table queries with TOP clause and ORDER BY


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high

    ORDER BY SalesOrderID

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high_range

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```


    `Listing 8-10`

    `Query Memory-Optimized Tables with an ORDER BY Statement`


    Similar to hash indexes, range indexes provide a valuable performance improvement
    opportunity when creating memory-optimized tables. The need to perform range scans
    and order results is common in many applications. These operations are greatly
    improved by the use of range indexes.'
  raw: '```

    USE MemOptIndexing

    GO

    SELECT OBJECT_NAME(hs.object_id) AS object_name

    ,i.name as index_name

    ,hs.total_bucket_count

    ,hs.empty_bucket_count

    ,FLOOR((CAST(empty_bucket_count as float)/total_bucket_count) * 100) AS empty_bucket_percent

    ,hs.avg_chain_length

    ,hs.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS hs

    INNER JOIN sys.indexes AS i ON hs.object_id=i.object_id AND hs.index_id=i.index_id

    Listing 8-7

    Query to Review Hash Index Statistics

    ```


    Reviewing the results of Listing [8-7](#338675_4_En_8_Chapter.xhtml#PC7), provided
    in Figure [8-3](#338675_4_En_8_Chapter.xhtml#Fig3), reveals a few key metrics.
    The first index with 1,000 buckets specified (`SalesOrderHeader_low`) actually
    has 1,024 buckets for the index. This is because buckets are created in allocations
    that align to a power of two. This is the same reason there are 1,048,576 buckets
    for the 1,000,000-bucket index on `SalesOrderHeader_high`. The next notable property
    is the number of empty buckets in the hash index on `SalesOrderHeader_high`. With
    1,000,000 rows and more than a million buckets, there are still 37 percent of
    the buckets that are empty. This happens because with the deterministic hashing
    function, some hashed values are repeated within the range of values before all
    the buckets are utilized. This is something to consider when building hash indexes,
    especially when aiming to have a 1:1 ratio of buckets to rows.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig3_HTML.png)


    A screenshot of a table with 7 columns and 3 rows. The columns are titled object
    name, index name, total bucket count, empty bucket count, empty bucket percentage,
    average chain length, and max chain length.


    Figure 8-3


    Output from the hash bucket statistics query


    Note


    Query performance details were captured using an Extended Events session based
    on the Query Detail Tracking template with a filter for the session that included
    the demonstration queries. More information on building sessions can be found
    here: [`https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server?view=sql-server-ver16`](https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server%253Fview%253Dsql-server-ver16).


    Hash indexes on memory-optimized tables are the ideal indexing choice when queries
    will retrieve individual or small numbers of values from an index at any given
    time. When building the tables and hash indexes, focus on setting the number of
    buckets to a size that presents a reasonable ratio of values to buckets with consideration
    for the number of values that will be retrieved through typical queries.


    ## Range Indexes


    The second type of index that is supported for memory-optimized tables is the
    range index. Range indexes are used to support range and ordered scans of data.
    They leverage a variation of a B-tree, which Microsoft calls a Bw-tree. The key
    difference between these two structures is the reference between the nodes in
    the Bw-tree, which refers to memory locations vs. physical page location. When
    determining whether to include a range index on a memory-optimized table, the
    primary consideration will be whether a range of values will be scanned or ORDER
    BY statements will need to be supported.


    Note


    You can find more information on Bw-trees at [`http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf`](http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf).


    To create a range index on a memory-optimized table, the index is declared within
    the schema of the table by indicating a `NONCLUSTERED` index with the key values.
    As shown in Listing [8-8](#338675_4_En_8_Chapter.xhtml#PC8), the index `IX_SalesOrderHeader`
    is a range index on the `SalesOrderID` column. Unlike hash indexes, there are
    no other attributes to consider. Therefore, bucket counts are not relevant for
    range indexes.


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high_range'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high_range

    CREATE TABLE dbo.SalesOrderHeader_high_range(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high_range PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000)

    ,INDEX IX_SalesOrderHeader NONCLUSTERED (SalesOrderID)

    )

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high_range

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    Listing 8-8

    Create a Table with a Range Index

    ```


    To demonstrate the value of the range index on memory-optimized tables, the table
    created in Listing [8-8](#338675_4_En_8_Chapter.xhtml#PC8) will be used with queries
    that will leverage range scans. Consider Listing [8-9](#338675_4_En_8_Chapter.xhtml#PC9),
    which queries the new table (`dbo.SalesOrderHeader_high_range`) and the table
    previously created with a hash index (`dbo.SalesOrderHeader_high`). By executing
    a query against both tables for the rows with `SalesOrderID` between 100 and 10,000,
    a significant difference in the execution time can be observed. The query against
    a hash index runs in 216 ms (see Figure [8-4](#338675_4_En_8_Chapter.xhtml#Fig4)),
    while the query against a range index runs in 97 ms. In this scenario, range indexes
    provide a substantial performance improvement.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig4_HTML.png)


    A screenshot of a table with 9 columns and 6 columns. It gives the duration and
    C P U times for different queries. 2 queries ending with WHERE have durations
    210643 and 97080, and C P U times, 124000 and 0.


    Figure 8-4


    Duration for memory-optimized table queries with a range scan


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SELECT *

    FROM dbo.SalesOrderHeader_high_range

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    Listing 8-9

    Query Memory-Optimized Tables with a Range Scan

    ```


    In a similar fashion, `ORDER BY` statements are also greatly improved when range
    indexes on memory-optimized tables are available. Using the code in Listing [8-10](#338675_4_En_8_Chapter.xhtml#PC10),
    two queries are executed against the same tables from the previous demonstration.
    In this scenario, using the output in Figure [8-5](#338675_4_En_8_Chapter.xhtml#Fig5)
    shows that the range scan took 462 μs compared with the 240,733 μs that the hash
    index required. This illustrates a substantial performance improvement through
    the use of the range index.


    ![](images/338675_4_En_8_Chapter/338675_4_En_8_Fig5_HTML.png)


    A screenshot of a table has 9 columns and 6 rows. It gives the duration and C
    P U time for the different queries. 2 queries ending with WHERE have a duration
    of 240733 and 482, and, a C P U time of 234000 and 0.


    Figure 8-5


    Duration for memory-optimized table queries with TOP clause and ORDER BY


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high

    ORDER BY SalesOrderID

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high_range

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    Listing 8-10

    Query Memory-Optimized Tables with an ORDER BY Statement

    ```


    Similar to hash indexes, range indexes provide a valuable performance improvement
    opportunity when creating memory-optimized tables. The need to perform range scans
    and order results is common in many applications. These operations are greatly
    improved by the use of range indexes.'
  trans: '

    ```

    USE MemOptIndexing

    GO

    SELECT OBJECT_NAME(hs.object_id) AS object_name

    ,i.name as index_name

    ,hs.total_bucket_count

    ,hs.empty_bucket_count

    ,FLOOR((CAST(empty_bucket_count as float)/total_bucket_count) * 100) AS empty_bucket_percent

    ,hs.avg_chain_length

    ,hs.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS hs

    INNER JOIN sys.indexes AS i ON hs.object_id=i.object_id AND hs.index_id=i.index_id

    ```


    `代码清单 8-7`

    `用于查看哈希索引统计信息的查询`


    查看 `代码清单 8-7` 的结果（如图 `8-3` 所示），可以揭示几个关键指标。第一个指定了 1,000 个存储桶的索引 (`SalesOrderHeader_low`)
    实际上有 1,024 个索引存储桶。这是因为存储桶是按照二的幂次对齐进行分配创建的。这也是为什么在 `SalesOrderHeader_high` 上为 1,000,000
    行创建的索引有 1,048,576 个存储桶的原因。下一个值得注意的属性是 `SalesOrderHeader_high` 上哈希索引的空存储桶数量。虽然有
    1,000,000 行数据和超过一百万个存储桶，但仍有 37% 的存储桶是空的。这种情况发生的原因是，在使用确定性的哈希函数时，在所有的存储桶被利用完之前，一些被哈希的值可能在值范围内重复了。这是在构建哈希索引时需要考虑的一点，特别是当目标是实现存储桶与行数
    1:1 比例时。


    ![](img/338675_4_En_8_Fig3_HTML.png)


    图 8-3

    哈希存储桶统计信息查询的输出


    注意

    查询性能详情是使用基于“Query Detail Tracking”模板的扩展事件会话捕获的，该会话包含了一个针对演示查询的筛选器。有关构建会话的更多信息，请参见此处：`https://docs.microsoft.com/en-us/sql/relational-databases/extended-events/quick-start-extended-events-in-sql-server?view=sql-server-ver16`。


    当查询需要在任何给定时间从索引中检索单个或少量值时，内存优化表上的哈希索引是理想的索引选择。在创建表和哈希索引时，应着重将存储桶数量设置为一个合理的大小，使其呈现出合理的值与存储桶比例，同时考虑通过典型查询将检索到的值的数量。


    ## 范围索引


    内存优化表支持的第二种索引类型是范围索引。范围索引用于支持数据的范围扫描和有序扫描。它们利用了 B 树的一种变体，微软称之为 Bw-tree。这两种结构之间的关键区别在于
    Bw-tree 中节点之间的引用，它引用的是内存位置而非物理页面位置。在确定是否要在内存优化表上包含范围索引时，主要的考虑因素将是是否需要扫描值范围或是否需要支持
    `ORDER BY` 语句。


    注意

    您可以在 `http://research.microsoft.com/pubs/178758/bw-tree-icde2013-final.pdf` 找到关于
    Bw-tree 的更多信息。


    要在内存优化表上创建范围索引，需要在表的架构中声明索引，通过指定 `NONCLUSTERED` 索引及其键值。如 `代码清单 8-8` 所示，索引 `IX_SalesOrderHeader`
    是在 `SalesOrderID` 列上的范围索引。与哈希索引不同，范围索引没有其他属性需要考虑。因此，存储桶计数与范围索引无关。


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high_range'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high_range

    CREATE TABLE dbo.SalesOrderHeader_high_range(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high_range PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000)

    ,INDEX IX_SalesOrderHeader NONCLUSTERED (SalesOrderID)

    )

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high_range

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    ```


    `代码清单 8-8`

    `创建包含范围索引的表`


    为了演示内存优化表上范围索引的价值，将使用 `代码清单 8-8` 中创建的表，并运行利用范围扫描的查询。考虑 `代码清单 8-9`，它查询新表 (`dbo.SalesOrderHeader_high_range`)
    和之前创建的带有哈希索引的表 (`dbo.SalesOrderHeader_high`)。通过对两个表执行查询，检索 `SalesOrderID` 在 100
    到 10,000 之间的行，可以观察到执行时间的显著差异。针对哈希索引的查询运行时间为 216 毫秒（见图 `8-4`），而针对范围索引的查询运行时间为 97
    毫秒。在这种场景下，范围索引提供了显著的性能提升。


    ![](img/338675_4_En_8_Fig4_HTML.png)


    图 8-4

    使用范围扫描的内存优化表查询的持续时间


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT *

    FROM dbo.SalesOrderHeader_high

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SELECT *

    FROM dbo.SalesOrderHeader_high_range

    WHERE SalesOrderID BETWEEN 100 AND 10000

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```


    `代码清单 8-9`

    `使用范围扫描查询内存优化表`


    类似地，当内存优化表上存在范围索引时，`ORDER BY` 语句的性能也会得到极大提升。使用 `代码清单 8-10` 中的代码，对上一个演示中的两个表执行两个查询。在此场景下，图
    `8-5` 的输出显示，范围扫描耗时 462 微秒，而哈希索引则需要 240,733 微秒。这说明了使用范围索引带来的显著性能提升。


    ![](img/338675_4_En_8_Fig5_HTML.png)


    图 8-5

    使用 TOP 子句和 ORDER BY 的内存优化表查询的持续时间


    ```

    USE MemOptIndexing

    GO

    SET STATISTICS TIME ON

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high

    ORDER BY SalesOrderID

    SELECT TOP 100 *

    FROM dbo.SalesOrderHeader_high_range

    ORDER BY SalesOrderID

    SET STATISTICS TIME OFF

    ```


    `代码清单 8-10`

    `使用 ORDER BY 语句查询内存优化表`


    与哈希索引类似，范围索引在创建内存优化表时提供了一个宝贵的性能提升机会。执行范围扫描和排序结果的需求在许多应用中都很常见。通过使用范围索引，这些操作的性能可以得到极大的改善。

