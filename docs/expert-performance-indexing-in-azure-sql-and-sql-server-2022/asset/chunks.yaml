- fmt: '## Default Values


    The proper application of default values may not seem to be something that can
    assist in preventing fragmentation, but there are some scenarios in which it can
    have a significant effect on fragmentation. The poster child for this type of
    mitigation is when databases utilize the `uniqueidentifier` data type.


    In most cases, `uniqueidentifier` values are generated using the `NEWID()` function.
    This function creates a globally unique identifier (GUID) that should be unique
    across the entire planet. This is useful for generating unique identifiers for
    rows but is likely scoped larger than that of your database. In many cases, the
    unique value probably needs to be unique for the server or the table.


    The main problem with the `NEWID()` function is that generating the GUID is not
    a sequential process. As demonstrated at the beginning of the chapter, using this
    function to generate values for the clustered index key can lead to severe levels
    of fragmentation.


    An alternative to the `NEWID()` function is the `NEWSEQUENTIALID()` function.
    This function returns a GUID just like the other function but with a couple variations
    on how the values are generated. First, each GUID generated by the function on
    a server is sequential to the last value. The second variation is that the GUID
    value generated is unique only to the server that is generating it. If another
    SQL Server instance generates a GUID with this function for the same table, it
    is possible that duplicate values will be generated, and the values will not be
    sequential since these are scoped to the server level.


    With these restrictions in mind, if a table must use the `uniqueidentifier` data
    type, the `NEWSEQUENTIALID()` function is an excellent alternative to the `NEWID()`
    function. The values will be sequential, and the amount of fragmentation encountered
    will be much lower and less frequent.


    ## Index Statistics Maintenance


    In Chapter 3, the statistics collected on indexes were discussed. These statistics
    provide crucial information that the query optimizer uses to compile execution
    plans for queries. When this information is out of date or inaccurate, the database
    will provide suboptimal or inaccurate query plans.


    For the most part, index statistics do not require significant maintenance. In
    this section, the processes within SQL Server that can be used to create and update
    statistics will be reviewed. Maintaining statistics in situations where the automated
    processes cannot keep up with the rate of data change within an index will also
    be discussed.


    It is important to note that statistics in SQL Server are estimates of the cardinality
    and frequency of values found in a table. They are not maintained real-time as
    to do so would be prohibitively expensive.


    ### Automatically Maintaining Statistics


    The easiest way to build and maintain statistics in SQL Server is to let SQL Server
    do it automatically. There are three database properties that control whether
    SQL Server will automatically build and maintain statistics:


    *   `AUTO_CREATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS_ASYNC`


    By default, the first two properties are enabled in databases. The last option
    is disabled by default. In most scenarios, all three of these properties should
    be enabled.


    #### Automatic Creation


    The first database property is `AUTO_CREATE_STATISTICS`. This database property
    directs SQL Server to automatically create single-column statistics on columns
    that do not have statistics. From the perspective of indexes, this property does
    not have an impact. When an index is created, a statistics object is created for
    the index.


    #### Automatic Updating


    The next two properties are `AUTO_UPDATE_STATISTICS` and `AUTO_UPDATE_STATISTICS_ASYNC`.
    At a high level, these two properties are quite similar. When an internal threshold
    is surpassed, SQL Server will initiate an update of the statistics object. The
    update occurs to keep the values within the statistics object current with the
    cardinality of values within the table.


    The threshold for triggering a statistics update can change from table to table.
    The threshold is based on a couple of calculations relating to the number of rows
    that have changed. For an empty table, when more than 500 rows are added to the
    table, a statistics update will be triggered. If the table has more than 500 rows,
    then statistics will be updated when 500 rows plus at most 20 percent of the cardinality
    of rows have been modified. At this point, SQL Server will schedule an update
    to the statistics. As the number of rows in the table increases, then the 20 percent
    threshold decreases, which accommodates the need to update statistics more frequently
    when there are larger numbers of rows within a table. At about 500,000 rows, the
    percentage drops to about 5 percent and then less than 1 percent for over 1 billion
    rows. This is the behavior that was previously available through trace flag 2371,
    which is on by default since SQL Server 2016.


    When the statistics update occurs, there are two modes in which it can be accomplished:
    synchronously and asynchronously. By default, statistics update synchronously.
    This means that when statistics are deemed out of date and require an update,
    the query optimizer will wait until after the statistics have been updated before
    it will compile an execution plan for the query. This is extremely useful for
    tables that have data that is volatile. For instance, the statistics for a table
    before and after a `TRUNCATE TABLE` would be quite different. Optionally, statistics
    can be built asynchronously through enabling the `AUTO_UPDATE_STATISTICS_ASYNC`
    property. This changes how the query optimizer reacts when an update statistics
    event is triggered. Instead of waiting for the statistics update to complete,
    the query optimizer will compile an execution plan based on the existing statistics
    and use the updated statistics for future queries after the update is completed.
    For databases with high volumes of queries and data being pushed through, this
    is often the preferred manner of updating statistics. Instead of occasional pauses
    in transactional throughput, the queries will flow through unencumbered, and plans
    will update as improved information is available.


    For an environment where `AUTO_UPDATE_STATISTICS` had been disabled in previous
    SQL Server versions, it would be worthwhile to consider enabling it now with `AUTO_UPDATE_STATISTICS_ASYNC`.
    The most common reason to disable `AUTO_UPDATE_STATISTICS` in the past was the
    delay caused by the update of statistics. With the option to enable `AUTO_UPDATE_STATISTICS_ASYNC`,
    those performance concerns can likely be mitigated. Automatic updating of statistics
    should not be disabled without a compelling use case to thoroughly justify that
    decision.'
