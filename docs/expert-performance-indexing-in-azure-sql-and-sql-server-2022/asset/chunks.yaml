  raw: '## Hash Indexes


    One type of index that can be used for memory-optimized data is the hash index.
    Hash indexes separate the data in the table into a fixed number of buckets. Rows
    inserted into the table then use a hash function to assign rows to available buckets.
    These buckets provide the ability for queries to return specific rows based on
    the point lookup operations. Hash indexes are designed for query workloads where
    individual rows from a table need to be retrieved.


    When creating hash indexes, the number of buckets to create is a function of the
    number of expected values for the indexed column(s). If a column or set of columns
    has a higher cardinality, a larger bucket count would be required. Ideally, the
    bucket count would be exactly equal to the number of distinct values for the indexed
    column(s). In reality, the number will be higher to allow for some amount of future
    growth.


    This is an important part of creating and tuning hash indexes on memory-optimized
    tables. As the number of rows in each bucket increases, the time required to retrieve
    data increases due to hash collisions.


    Optimal hash indexes need to have enough buckets to account for future growth
    (and avoid hash collisions) while not having too many buckets (and wasting space).


    To demonstrate the impact of bucket size, Listing [8-4](#338675_4_En_8_Chapter.xhtml#PC4)
    creates two memory-optimized tables. Both tables have 1,000,000 rows in them,
    with the first table having 1,000 buckets and the second having 1,000,000 buckets.
    With this configuration, there will be approximately 1,000 rows per bucket for
    the first table and 1 row per bucket in the second table. Since an identity column
    is being indexed, each row will have a unique value for SalesOrderID.


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_low'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_low

    CREATE TABLE dbo.SalesOrderHeader_low(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_Hash_low PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_low

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader_high'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader_high

    CREATE TABLE dbo.SalesOrderHeader_high(

    SalesOrderID int NOT NULL

    ,Column1 uniqueidentifier

    ,CONSTRAINT IX_SalesOrderHeader_hash_high PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 1000000))

    WITH (MEMORY_OPTIMIZED = ON);

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 1000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.SalesOrderHeader_high

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    Listing 8-4

    Create Memory-Optimized Tables with Hash Indexes

    ```


