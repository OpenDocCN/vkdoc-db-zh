- fmt: "Here, the third row in the result set has an `IndexLevel` of 1 and a `PageType`\
    \ of 2, which is an index page. With these results, there is enough information\
    \ to rebuild the B-tree structure for the index, as shown in Figure 3-8. The B-tree\
    \ starts with the IAM page, which is page number 1:237. This page is linked to\
    \ page 1:361, which is an index page at index level 1. Following that, pages 1:360,\
    \ 1:362, 1:363, and 1:364 are at index level 0 and doubly linked to each other.\n\
    \n![Figure 3-8](images/338675_4_En_3_Chapter/338675_4_En_3_Fig8_HTML.png)\nA framework\
    \ of B tree structure of IAM page 1:237. It is linked to non-leaf levels of page\
    \ 1:361. It is further linked to leaf levels of page 1:360, 1:362, 1:363, and\
    \ 1:364.\nFigure 3-8\n\n### DBCC IND for dbo.IndexInternalsThree\n\nIn both examples,\
    \ `DBCC IND` was used to investigate the pages associated with a heap or a clustered\
    \ index. This DBCC command provides the information on all pages of the table\
    \ or index, including the IAM page. These pages include the page numbers to identify\
    \ where they are in the data file. The relationships between the pages are also\
    \ included, such as the next and previous page numbers that are used to navigate\
    \ to adjacent pages in a B-tree.\n\n`sys.dm_db_database_page_allocations` can\
    \ provide this same information (and more). To demonstrate this, Listing 3-13\
    \ shows how to get `DBCC IND` information from `sys.dm_db_database_page_allocations`.\
    \ If the outputs are compared, it can be noted that they are nearly identical,\
    \ with only a few scenarios where `NULL` and 0 are returned differently. Given\
    \ the choice of tools, the DMF should be used preferentially over the DBCC command.\n\
    \n```sql\nUSE Chapter2Internals;\nGO\nSELECT\n    allocated_page_file_id AS PageFID\n\
    \    ,allocated_page_page_id AS PagePID\n    ,allocated_page_iam_file_id AS IAMFID\n\
    \    ,allocated_page_iam_page_id AS IAMPID\n    ,object_id AS ObjectID\n    ,index_id\
    \ AS IndexID\n    ,partition_id AS PartitionNumber\n    ,rowset_id AS PartitionID\n\
    \    ,allocation_unit_type_desc AS iam_chain_type\n    ,page_type AS PageType\n\
    \    ,page_level AS IndexLevel\n    ,next_page_file_id AS NextPageFID\n    ,next_page_page_id\
    \ AS NextPagePID\n    ,previous_page_file_id AS PrevPageFID\n    ,previous_page_page_id\
    \ AS PrevPagePID\nFROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsTwo'),\
    \ 1, NULL, 'DETAILED')\nWHERE is_allocated = 1;\nGO\nDBCC IND (0,'dbo.IndexInternalsTwo',1)\n\
    ```\nListing 3-13\nDBCC IND Output from sys.dm_db_database_page_allocations\n\n\
    ### DBCC PAGE\n\nThe last command available for examining pages is `DBCC PAGE`.\
    \ While the other two commands provide information about the pages and their relationship\
    \ with tables and indexes, the output from `DBCC PAGE` provides the actual contents\
    \ of a page. Listing 3-14 shows the syntax for using `DBCC PAGE`.\n\n```sql\n\
    DBCC PAGE ( { database_name | database_id | 0}, file_number, page_number\n   \
    \ [,print_option ={0|1|2|3} ])\n```\nListing 3-14\nDBCC PAGE Syntax\n\nThe `DBCC\
    \ PAGE` command accepts a number of parameters. Through these parameters, it is\
    \ able to determine the database and specific page requested, which is then returned\
    \ in the result set in the requested format. Table 3-10 details the parameters\
    \ for `DBCC PAGE`.\n\nTable 3-10\nDBCC PAGE Parameters\n\n| **Parameter** | **Description**\
    \ |\n| --- | --- |\n| `database_name | database_id` | Specifies either the database\
    \ name or the database ID where the page will be retrieved. This defaults to the\
    \ current database if this parameter is not provided or if zero is used for its\
    \ value. |\n| `file_number` | Specifies the file number for the data file in the\
    \ database from where the page will be retrieved. |\n| `page_number` | Specifies\
    \ the page number in the database file that will be retrieved. |\n| `print_option`\
    \ | Specifies how the output should be returned. There are four print options\
    \ available:<br>*0—page header only*: Returns only page header information.<br>*1—hex\
    \ rows*: Returns the page header information, all the rows on the page, and the\
    \ offset array. In this output, each row is returned individually.<br>*2—hex data*:\
    \ Returns the page header information, all the rows on the page, and the offset\
    \ array. Unlike option 1, the output shows all the rows as a single block of data.<br>*3—data\
    \ rows*: Returns the page header information, all the rows on the page, and the\
    \ offset array. This option differs from the other options in that the data in\
    \ the columns for the row is translated as listed with their column names.<br>This\
    \ parameter is optional, and 0 is used as the default when no option is selected.\
    \ |\n\n**Note:** By default, the `DBCC PAGE` command outputs its messages to the\
    \ SQL Server event log. In most situations, this is not the ideal output mechanism.\
    \ Trace flag 3604 allows you to modify this behavior. By utilizing this trace\
    \ flag, the output from the `DBCC` statements returns to the Messages tab in SQL\
    \ Server Management Studio (SSMS).\n\nThrough `DBCC PAGE` and its print options,\
    \ everything that is on a page can be retrieved. What is the value in delving\
    \ into the detailed contents of pages? Looking at an index or data page can provide\
    \ an understanding of unexpected index behavior (such as poor performance). Insight\
    \ can be gained into how the data within rows is structured, such as why rows\
    \ may be larger than expected. The size of rows does have an important impact\
    \ on how indexes behave as when a row gets larger, the number of pages required\
    \ to store the index increases. More pages for an index will result in the need\
    \ for more memory to cache it, ultimately leading to higher resource consumption\
    \ and longer query wait times. A larger index size may alter the decisions the\
    \ query optimizer makes, ultimately changing the execution plan and performance\
    \ of a query that uses it.\n\nAnother reason to use `DBCC PAGE` is to observe\
    \ what happens to a data page when various operations occur. As the examples later\
    \ in this chapter will illustrate, `DBCC PAGE` can be used to uncover what happens\
    \ during page splits and forwarded record operations."
