- fmt: '### IO_COMPLETION


    `IO_COMPLETION` 等待类型发生在 SQL Server 等待非数据页 I/O 操作（例如索引页）完成时。尽管此等待与非数据操作相关，但当此等待在
    SQL Server 实例中较高时，仍可采取一些与索引相关的操作。


    首先，检查服务器上 `Full Scans/sec` 的状态。如果该性能计数器存在问题，其下的操作可能会波及到用于管理索引的非数据页。如果两者都处于高位，应首先重点分析
    `Full Scans/sec` 问题。


    我们可以采取的第二个操作是检查 SQL Server 实例中的缺失索引信息。该信息在第 [9](#338675_4_En_9_Chapter.xhtml)
    章讨论。添加缺失索引可以将数据消耗的压力转移到新结构上，查询可能不再需要等待非数据 I/O 完成，因为它现在利用了不同的索引。


    接下来，考虑索引上发生的页拆分数量；页拆分在将页重新分配到新页时会影响非数据页。大量的页拆分活动将导致高非数据页 I/O，这可能是这些等待的根源或与之相关。


    最后，如果 `IO_COMPLETION` 问题的原因不明显，请使用扩展事件会话进行调查。这类分析超出了本书的范围，因为这些原因很可能与索引无关。用于调查
    `CXPACKET` 的方法可以适用，并将是开始调查的起点。


    ### LCK_M_∗


    `LCK_M_∗` 等待类型集合指的是在 SQL Server 实例上发生的等待。这些不仅仅是锁的使用，还包括锁有关联等待的时候。`LCK_M_∗` 中的每个等待类型都引用一种特定的锁类型，例如排他锁或共享锁。要解读不同的等待类型，请使用表
    [16-2](#338675_4_En_16_Chapter.xhtml#Tab2)。当 `LCK_M_∗` 等待类型增加时，它们总是伴随着锁等待时间（毫秒）和锁等待/秒的增加，因此可以利用这些计数器来调查此等待类型。


    在调查性能计数器或不同锁类型的增加时，请参阅表 [16-2](#338675_4_En_16_Chapter.xhtml#Tab2)。结合等待类型和性能计数器来锁定特定问题。例如，当性能计数器指向锁等待时间（毫秒）问题时，查找
    `LCK_M_∗` 上的长时间等待。使用 SQL Server Management Studio 中的向导创建“统计查询锁定”会话，并确定是哪些锁以及哪些查询（通过
    `query_hash`）导致了问题。类似地，如果问题在于锁等待/秒，请查找锁最多的查询。


    **表 16-2 LCK_M_∗ 等待类型**


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `LCK_M_BU` | 批量更新 |

    | `LCK_M_IS` | 意向共享 |

    | `LCK_M_IU` | 意向更新 |

    | `LCK_M_IX` | 意向排他 |

    | `LCK_M_RIn_NL` | 在当前键值与前一键值之间插入范围锁，当前键值使用 `NULL` 锁 |

    | `LCK_M_RIn_S` | 在当前键值与前一键值之间插入范围锁，当前键值使用共享锁 |

    | `LCK_M_RIn_U` | 在当前键值与前一键值之间插入范围锁，当前键值使用更新锁 |

    | `LCK_M_RIn_X` | 在当前键值与前一键值之间插入范围锁，当前键值使用排他锁 |

    | `LCK_M_RS_S` | 在当前键值与前一键值之间共享范围锁，当前键值使用共享锁 |

    | `LCK_M_RS_U` | 在当前键值与前一键值之间共享范围锁，当前键值使用更新锁 |

    | `LCK_M_RX_S` | 在当前键值与前一键值之间排他范围锁，当前键值使用共享锁 |

    | `LCK_M_RX_U` | 在当前键值与前一键值之间排他范围锁，当前键值使用更新锁 |

    | `LCK_M_RX_X` | 在当前键值与前一键值之间排他范围锁，当前键值使用排他锁 |

    | `LCK_M_S` | 共享 |

    | `LCK_M_SCH_M` | 架构修改 |

    | `LCK_M_SCH_S` | 架构共享 |

    | `LCK_M_SIU` | 共享，带意向更新 |

    | `LCK_M_SIX` | 共享，带意向排他 |

    | `LCK_M_U` | 更新 |

    | `LCK_M_UIX` | 更新，带意向排他 |

    | `LCK_M_X` | 排他 |


    表 [16-2](#338675_4_En_16_Chapter.xhtml#Tab2) 中的所有锁都可以带有 `_ABORT_BLOCKERS` 和 `_LOW_PRIORITY`
    后缀，这与联机索引和分区切换操作添加的低优先级选项有关。此功能自 SQL Server 2014 起可用。如果看到带有这些后缀的锁，请检查正在发生的索引维护操作。当等待过多时，可能需要调整维护计划。


    ### PAGEIOLATCH_∗


    最后一个与索引相关的等待是 `PAGEIOLATCH_∗` 等待类型。此等待指的是当 SQL Server 从索引中检索数据页并将其放入内存时发生的等待。SQL
    Server 使用这些计数器来跟踪查询准备好检索数据页到它们在内存中可用的时间。与 `LCK_M_∗` 等待一样，有许多不同的 `PAGEIOLATCH_∗`
    类型，每种类型都在表 [16-3](#338675_4_En_16_Chapter.xhtml#Tab3) 中定义。


    首先，监视当前在缓冲区缓存中的索引，以确定哪些索引是可用的。另外，检查页面寿命预期/秒（PLE）计数器，该计数器目前未在监控部分收集。在 PLE 变化前后检查缓冲区中分配给索引的页面，有助于识别哪些索引正在将信息推出内存。然后调查查询计划，并调整查询或索引以减少满足查询所需的数据量。


    **表 16-3 PAGEIOLATCH_∗ 等待类型**


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `PAGEIOLATCH_DT` | 以销毁模式挂起 I/O |

    | `PAGEIOLATCH_EX` | 以排他模式挂起 I/O |

    | `PAGEIOLATCH_KP` | 以保持模式挂起 I/O |

    | `PAGEIOLATCH_SH` | 以共享模式挂起 I/O |

    | `PAGEIOLATCH_UP` | 以更新模式挂起 I/O |


    解决 `PAGEIOLATCH_∗` 的第二个策略是更加强调 `Full Scans/sec` 分析。通常，导致此等待类型增加的索引与数据库中正在使用的全表扫描有关。通过更加强调减少执行计划中对全表扫描的需求，将需要拉入内存的数据减少，从而导致此等待类型下降。


    在某些情况下，与 `PAGEIOLATCH_∗` 相关的问题与索引无关。问题可能仅仅是磁盘性能缓慢。要验证是否是这种情况，请监视服务器计数器 `Physical
    disk: disk seconds/read` 和 `Physical disk: disk seconds/write` 以及 SQL Server 的虚拟文件统计信息。如果这些统计数据持续偏高，则应将调查扩展到索引之外，转向硬件和
    I/O 存储层面。除了改善磁盘性能外，增加可用内存也可以减少此等待统计信息，这可以降低数据页被推出内存的可能性。


    请注意，较高的 `PAGEIOLATCH` 等待可能表明存在内存压力，需要为 SQL Server 增加内存分配。这应该被视为在所有其他研究和调整选项都已用尽后的最后手段。'
  raw: '#### IO_COMPLETION


    The IO_COMPLETION wait type happens when SQL Server is waiting for I/O operations
    to complete for nondata page I/Os, such as index pages. Even though this wait
    is related to nondata operations, there are still some indexing-related actions
    that can be taken when this wait is high for the SQL Server instance.


    First, review the state of Full Scans/sec on the server. If there is an issue
    with that performance counter, the operations under that counter could bleed through
    to nondata pages that are being used to manage the indexes. In cases where the
    two of these are high, place additional emphasis on analyzing Full Scans/sec issues
    first.


    The second action that we can take is to review the missing index information
    within the SQL Server instance. That information is discussed in Chapter [9](#338675_4_En_9_Chapter.xhtml).
    Adding missing indexes can shift the pressure of the data being consumed to new
    structures where the query may no longer need to wait for the nondata I/Os to
    complete since the query now leverages a different index.


    Next, consider the volume of page splits occurring on the index; page splits affect
    nondata pages when they reallocate the pages to new pages. Heavy page split activity
    will result in high nondata page I/Os which can be the source of or related to
    these waits.


    Finally, if the cause of the IO_COMPLETION issues is not apparent, investigate
    them with an Extended Events session. This type of analysis is outside the scope
    of this book since these causes would likely be nonindex-related. The method used
    for investigating CXPACKET could apply and would be a place to start the investigation.


    #### LCK_M_∗


    The LCK_M_∗ collection of wait types refers to waits that are occurring on the
    SQL Server instance. These are not just the use of locks but also the times when
    locks have waits associated with them. Each wait type in LCK_M_∗ references a
    distinct type of lock, such as exclusive or shared locks. To decipher the different
    wait types, use Table [16-2](#338675_4_En_16_Chapter.xhtml#Tab2). When the LCK_M_∗
    wait types increase, they will always be in conjunction with increases in Lock
    Wait Time (ms) and Lock Waits/sec, allowing these counters to help investigate
    this wait type.


    When investigating increases in either the performance counters or the different
    lock types, see Table [16-2](#338675_4_En_16_Chapter.xhtml#Tab2). Use the combination
    of the wait types and the performance counters to home in on specific issues.
    For instance, when the performance counters are pointing to Lock Wait Time (ms)
    issues, look for long-running waits on LCK_M_∗. Use the wizard in SQL Server Management
    Studio to create the Count Query Lock session and determine which lock and which
    queries, through the `query_hash`, are causing the issue. Similarly, if the issue
    is with Lock Waits/sec, look for those with the most numerous locks.


    Table 16-2


    LCK_M_∗ Wait Types


    | Wait type | Lock type |

    | --- | --- |

    | LCK_M_BU | Bulk Update |

    | LCK_M_IS | Intent Shared |

    | LCK_M_IU | Intent Update |

    | LCK_M_IX | Intent Exclusive |

    | LCK_M_RIn_NL | Insert Range lock between the current and previous key with `NULL`
    lock on the current key value |

    | LCK_M_RIn_S | Insert Range lock between the current and previous key with shared
    lock on the current key value |

    | LCK_M_RIn_U | Insert Range lock between the current and previous key with Update
    lock on the current key value |

    | LCK_M_RIn_X | Insert Range lock between the current and previous key with Exclusive
    lock on the current key value |

    | LCK_M_RS_S | Shared Range lock between the current and previous key with shared
    lock on the current key value |

    | LCK_M_RS_U | Shared Range lock between the current and previous key with Update
    lock on the current key value |

    | LCK_M_RX_S | Exclusive Range lock between the current and previous key with
    shared lock on the current key value |

    | LCK_M_RX_U | Exclusive Range lock between the current and previous key with
    Update lock on the current key value |

    | LCK_M_RX_X | Exclusive Range lock between the current and previous key with
    Exclusive lock on the current key value |

    | LCK_M_S | Shared |

    | LCK_M_SCH_M | Schema Modify |

    | LCK_M_SCH_S | Schema Share |

    | LCK_M_SIU | Shared with Intent Update |

    | LCK_M_SIX | Shared with Intent Exclusive |

    | LCK_M_U | Update |

    | LCK_M_UIX | Update with Intent Exclusive |

    | LCK_M_X | Exclusive |


    All the locks in Table [16-2](#338675_4_En_16_Chapter.xhtml#Tab2) can appear with
    the suffixes _ABORT_BLOCKERS and _LOW_PRIORITY which are related to the low priority
    options added to online index and partition switching operations. This capability
    has been available since SQL Server 2014\. If locks are seen with these suffixes,
    review the index maintenance operations that are occurring. When the waits are
    excessive, the maintenance schedule will likely need to be adjusted.


    #### PAGEIOLATCH_∗


    The final index-related wait is PAGEIOLATCH_∗ wait types. This wait refers to
    the waits that occur when SQL Server is retrieving data pages from indexes and
    placing them into memory. The time in which the query is ready to retrieve the
    data pages and when they are available in memory is tracked by SQL Server with
    these counters. As with LCK_M_∗ waits, there are a number of different PAGEIOLATCH_∗
    types, each of which are defined in Table [16-3](#338675_4_En_16_Chapter.xhtml#Tab3).


    First, monitor the indexes that are currently in the buffer cache to identify
    which indexes are available. Also, review the Page Life Expectancy/sec (PLE) counter,
    which is not currently collected in the monitoring section. Reviewing the allocation
    of pages to indexes in the buffer before and after changes in the PLE can help
    identify which indexes are pushing information out of memory. Then investigate
    query plans, and tune the queries or indexes to reduce the amount of data needed
    to satisfy the queries.


    Table 16-3


    PAGEIOLATCH_∗ Wait Types


    | Wait type | Lock type |

    | --- | --- |

    | PAGEIOLATCH_DT | IO Latch in Destroy mode |

    | PAGEIOLATCH_EX | IO Latch in Exclusive mode |

    | PAGEIOLATCH_KP | IO Latch in Keep mode |

    | PAGEIOLATCH_SH | IO Latch in Shared mode |

    | PAGEIOLATCH_UP | IO Latch in Update mode |


    The second tactic to addressing PAGEIOLATCH_∗ is to put more emphasis on the Full
    Scans/sec analysis. Often, indexes that lead to increases in this wait type are
    related to full scans that are in use by the database. By placing more emphasis
    on reducing the need for full scans in execution plans, less data will need to
    be pulled into memory, leading to a decrease in this wait type.


    In some cases, the issues related to PAGEIOLATCH_∗ are unrelated to indexing.
    The issue can simply be a matter of slow disk performance. To verify whether this
    is the case, monitor the performance of the server counters for Physical disk:
    disk seconds/read and Physical disk: disk seconds/write and the virtual file stats
    for SQL Server. If these statistics are continually high, expand the investigation
    outside of indexing to hardware and the I/O storage level. Besides improving disk
    performance, this wait statistic can be reduced by increasing the available memory,
    which can decrease the likelihood that the data page will be pushed out of memory.


    Note that high PAGEIOLATCH waits may be indicative of memory pressure and a need
    to increase memory allocation to SQL Server. This should be seen as a last resort
    when other research and tuning options have already been exhausted.'
  trans: '

    ### IO_COMPLETION


    `IO_COMPLETION` 等待类型发生在 SQL Server 等待非数据页 I/O 操作（例如索引页）完成时。尽管此等待与非数据操作相关，但当此等待在
    SQL Server 实例中较高时，仍可采取一些与索引相关的操作。


    首先，检查服务器上 `Full Scans/sec` 的状态。如果该性能计数器存在问题，其下的操作可能会波及到用于管理索引的非数据页。如果两者都处于高位，应首先重点分析
    `Full Scans/sec` 问题。


    我们可以采取的第二个操作是检查 SQL Server 实例中的缺失索引信息。该信息在第 9 章讨论。添加缺失索引可以将数据消耗的压力转移到新结构上，查询可能不再需要等待非数据
    I/O 完成，因为它现在利用了不同的索引。


    接下来，考虑索引上发生的页拆分数量；页拆分在将页重新分配到新页时会影响非数据页。大量的页拆分活动将导致高非数据页 I/O，这可能是这些等待的根源或与之相关。


    最后，如果 `IO_COMPLETION` 问题的原因不明显，请使用扩展事件会话进行调查。这类分析超出了本书的范围，因为这些原因很可能与索引无关。用于调查
    `CXPACKET` 的方法可以适用，并将是开始调查的起点。


    ### LCK_M_∗


    `LCK_M_∗` 等待类型集合指的是在 SQL Server 实例上发生的等待。这些不仅仅是锁的使用，还包括锁有关联等待的时候。`LCK_M_∗` 中的每个等待类型都引用一种特定的锁类型，例如排他锁或共享锁。要解读不同的等待类型，请使用表
    16-2。当 `LCK_M_∗` 等待类型增加时，它们总是伴随着锁等待时间（毫秒）和锁等待/秒的增加，因此可以利用这些计数器来调查此等待类型。


    在调查性能计数器或不同锁类型的增加时，请参阅表 16-2。结合等待类型和性能计数器来锁定特定问题。例如，当性能计数器指向锁等待时间（毫秒）问题时，查找 `LCK_M_∗`
    上的长时间等待。使用 SQL Server Management Studio 中的向导创建“统计查询锁定”会话，并确定是哪些锁以及哪些查询（通过 `query_hash`）导致了问题。类似地，如果问题在于锁等待/秒，请查找锁最多的查询。


    **表 16-2 LCK_M_∗ 等待类型**


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `LCK_M_BU` | 批量更新 |

    | `LCK_M_IS` | 意向共享 |

    | `LCK_M_IU` | 意向更新 |

    | `LCK_M_IX` | 意向排他 |

    | `LCK_M_RIn_NL` | 在当前键值与前一键值之间插入范围锁，当前键值使用 `NULL` 锁 |

    | `LCK_M_RIn_S` | 在当前键值与前一键值之间插入范围锁，当前键值使用共享锁 |

    | `LCK_M_RIn_U` | 在当前键值与前一键值之间插入范围锁，当前键值使用更新锁 |

    | `LCK_M_RIn_X` | 在当前键值与前一键值之间插入范围锁，当前键值使用排他锁 |

    | `LCK_M_RS_S` | 在当前键值与前一键值之间共享范围锁，当前键值使用共享锁 |

    | `LCK_M_RS_U` | 在当前键值与前一键值之间共享范围锁，当前键值使用更新锁 |

    | `LCK_M_RX_S` | 在当前键值与前一键值之间排他范围锁，当前键值使用共享锁 |

    | `LCK_M_RX_U` | 在当前键值与前一键值之间排他范围锁，当前键值使用更新锁 |

    | `LCK_M_RX_X` | 在当前键值与前一键值之间排他范围锁，当前键值使用排他锁 |

    | `LCK_M_S` | 共享 |

    | `LCK_M_SCH_M` | 架构修改 |

    | `LCK_M_SCH_S` | 架构共享 |

    | `LCK_M_SIU` | 共享，带意向更新 |

    | `LCK_M_SIX` | 共享，带意向排他 |

    | `LCK_M_U` | 更新 |

    | `LCK_M_UIX` | 更新，带意向排他 |

    | `LCK_M_X` | 排他 |


    表 16-2 中的所有锁都可以带有 `_ABORT_BLOCKERS` 和 `_LOW_PRIORITY` 后缀，这与联机索引和分区切换操作添加的低优先级选项有关。此功能自
    SQL Server 2014 起可用。如果看到带有这些后缀的锁，请检查正在发生的索引维护操作。当等待过多时，可能需要调整维护计划。


    ### PAGEIOLATCH_∗


    最后一个与索引相关的等待是 `PAGEIOLATCH_∗` 等待类型。此等待指的是当 SQL Server 从索引中检索数据页并将其放入内存时发生的等待。SQL
    Server 使用这些计数器来跟踪查询准备好检索数据页到它们在内存中可用的时间。与 `LCK_M_∗` 等待一样，有许多不同的 `PAGEIOLATCH_∗`
    类型，每种类型都在表 16-3 中定义。


    首先，监视当前在缓冲区缓存中的索引，以确定哪些索引是可用的。另外，检查页面寿命预期/秒（PLE）计数器，该计数器目前未在监控部分收集。在 PLE 变化前后检查缓冲区中分配给索引的页面，有助于识别哪些索引正在将信息推出内存。然后调查查询计划，并调整查询或索引以减少满足查询所需的数据量。


    **表 16-3 PAGEIOLATCH_∗ 等待类型**


    | 等待类型 | 锁类型 |

    | --- | --- |

    | `PAGEIOLATCH_DT` | 以销毁模式挂起 I/O |

    | `PAGEIOLATCH_EX` | 以排他模式挂起 I/O |

    | `PAGEIOLATCH_KP` | 以保持模式挂起 I/O |

    | `PAGEIOLATCH_SH` | 以共享模式挂起 I/O |

    | `PAGEIOLATCH_UP` | 以更新模式挂起 I/O |


    解决 `PAGEIOLATCH_∗` 的第二个策略是更加强调 `Full Scans/sec` 分析。通常，导致此等待类型增加的索引与数据库中正在使用的全表扫描有关。通过更加强调减少执行计划中对全表扫描的需求，将需要拉入内存的数据减少，从而导致此等待类型下降。


    在某些情况下，与 `PAGEIOLATCH_∗` 相关的问题与索引无关。问题可能仅仅是磁盘性能缓慢。要验证是否是这种情况，请监视服务器计数器 `Physical
    disk: disk seconds/read` 和 `Physical disk: disk seconds/write` 以及 SQL Server 的虚拟文件统计信息。如果这些统计数据持续偏高，则应将调查扩展到索引之外，转向硬件和
    I/O 存储层面。除了改善磁盘性能外，增加可用内存也可以减少此等待统计信息，这可以降低数据页被推出内存的可能性。


    请注意，较高的 `PAGEIOLATCH` 等待可能表明存在内存压力，需要为 SQL Server 增加内存分配。这应该被视为在所有其他研究和调整选项都已用尽后的最后手段。

    '
- fmt: '### Buffer Allocation


    The final area to look at when determining the server state with indexing is to
    look at the data pages that are in the buffer cache. This is not a typical area
    that is usually looked at when considering indexing, but it provides a wealth
    of information regarding what SQL Server is putting into memory. The basic question
    that this can answer for the SQL Server instance is: does the data in the buffer
    represent the data most important to the applications using the SQL Server?


    The first part of answering this question is to review how many pages are in memory
    for each database. This might not seem important, but the amount of memory being
    used by the different databases can sometimes be surprising. Before indexes were
    added to the backup tables in the `MSDB` database, it wouldn’t be uncommon for
    those tables to push all the data in the backup tables into memory. If the data
    in the tables wasn’t trimmed often, this could be a lot of information not critical
    to the business applications consuming an unnecessary amount of data.


    For the second part of the question, we will need to engage the owners and subject
    matter experts for the applications using the SQL Server instance. If the answers
    from these individuals do not match the information that is in the buffer, this
    provides a list of databases for which we can focus the index tuning effort.


    Similarly, many applications have logging databases where error and processing
    events are stored for troubleshooting at a later date. When issues arise, instead
    of going to log files, the developers can simply query the database and extract
    the events they need to perform their troubleshooting. But what if these tables
    aren’t properly indexed or the queries aren’t SARGable? Log tables with millions
    or billions of rows may be pushed into memory, pushing the data from the line-of-business
    applications out of memory and harming overall SQL Server performance. If the
    data in the buffer is not being checked, there is no way to know what is in memory
    and if it is valuable or not.


    Checking the data in memory is a relatively simple task that utilizes the DMO
    `sys.dm_os_buffer_descriptors`. This DMO lists each data page that is in memory
    and describes the information on the page. By counting each page for each database,
    the total number of pages and the size of memory allocated to the database can
    be determined. Using the query in Listing 16-33, we can see in Figure 16-13 that
    the `ContosoRetailDW` database occupies the most memory on the server with the
    `IndexingMethod` database currently using 8.84 MB of space.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig13_HTML.jpg)

    A screenshot of a table has 3 columns and 7 rows. Column headers are database
    name, buffered page count, and buffer pool M B. The data of Contoso retail D W
    are 8115 and 63.40.


    Figure 16-13

    Results for buffer allocation for each database query


    ```sql

    SELECT LEFT(CASE database_id

    WHEN 32767 THEN ''ResourceDb''

    ELSE DB_NAME(database_id) END, 20) AS Database_Name,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_Pool_MB

    FROM sys.dm_os_buffer_descriptors

    GROUP BY DB_NAME(database_id),

    database_id

    ORDER BY Buffered_Page_Count DESC;

    ```

    Listing 16-33

    Buffer Allocation for Each Database


    Once the databases in memory have been identified, it is also useful to determine
    what objects in the database are in memory. For the same reason as looking to
    see what databases are in memory, identifying the objects in memory helps with
    identifying the tables and indexes to focus on when indexing. Retrieving the memory
    use per table and index also utilizes `sys.dm_os_buffer_descriptors` but includes
    mapping the rows to `allocation_unit_id` values in the catalog views `sys.allocation_units`
    and `sys.partitions`.


    Through the query in Listing 16-34, the memory used by each of the user tables
    and indexes is returned. In the results in Figure 16-14, it is shown that the
    tables FactSales and FactOnlineSales are taking up a substantial amount of memory.
    If this was unexpected and it was not obvious these were fact tables, we would
    definitely want to understand more about why they were taking up so much memory.
    This can lead us to other questions, such as: What is this data? Why is it so
    large? Is the space used by the table impacting the ability of other databases
    to use memory optimally with their indexes? In these cases, we need to investigate
    the indexes on these tables because the tables that consume the most memory ought
    to have the best-honed indexing profiles.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig14_HTML.png)

    A table with 11 rows and 5 columns, is listed under the results tab. Column headers
    are name, name, type descending, buffered page count, and buffer M B. The buffer
    page count and buffer M B of fact sales are 18918 and 147.80.


    Figure 16-14

    Results for buffer allocation for each table/index query


    ```sql

    WITH BufferAllocation

    AS (SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND (au.type = 1 OR au.type = 3)

    UNION ALL

    SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND au.type = 2)

    SELECT t.name,

    we.name,

    we.type_desc,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_MB

    FROM sys.tables t

    INNER JOIN BufferAllocation ba ON t.object_id = ba.object_id

    LEFT JOIN sys.indexes we ON ba.object_id = we.object_id

    AND ba.index_id = we.index_id

    INNER JOIN sys.dm_os_buffer_descriptors bd ON ba.allocation_unit_id = bd.allocation_unit_id

    WHERE bd.database_id = DB_ID()

    GROUP BY t.name,

    we.index_id,

    we.name,

    we.type_desc

    ORDER BY Buffered_Page_Count DESC;

    ```

    Listing 16-34

    Buffer Allocation by Table/Index


    ## Schema Discovery


    After investigating the state of the server and its indexing needs, the next step
    in the index analysis process is to investigate the schema of the databases to
    determine whether there are schema-related indexing issues that can be addressed.
    For these issues, the primary focus will be on a few key details that can be discovered
    through catalog views.'
