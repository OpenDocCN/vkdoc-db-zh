    the one shown in Listing [12-8](#338675_4_En_12_Chapter.xhtml#PC8). For your environment,
    the server name (`-S`) will be different. The rest, however, will be identical.
    The database (`-D` and `–d` arguments) will be `AdventureWorks2017`. The source
    of the workload will be the plan cache (`-ip` argument). The name of the session
    (`-s` argument) is `"First Scenario."`


