    This has been a simple example of the damage in terms of fragmentation that a
    shrink operation can have on an index. As was evident even with this example,
    the shrink operation led to a significant amount of fragmentation. Most SQL Server
    database administrators will agree that shrink operations should be an extremely
    rare operation on any database. Some database administrators are also of the opinion
    that this operation should never be used on any database for any reason. The guideline
    that is most often recommended is to be extremely cautious when database shrink
    operations are performed. The most dangerous pattern to adopt is a cycle of shrinking
    a database to recover space, causing fragmentation, and then expanding the database
    through defragmenting the indexes. This constitutes a waste of time and resources
    that could be better spent on real performance and maintenance issues.


    Another important note on shrink operations is that most busy production tables
    will grow over time. If this is the case, then shrinking the database only provides
    temporary relief against inevitable future growth. Because of this, shrink operations
    should be reserved for scenarios when the amount of space recouped is far more
    significant than any fragmentation that may result from it.


    ### Fragmentation Variants


    Traditionally, when index fragmentation is discussed, the primary focus is on
    fragmentation within the clustered or non-clustered index. This is not the only
    consideration to keep in mind when evaluating index fragmentation. It is also
    valuable to consider whether the table or index has bloat, forwarding, or segmentation,
    each of which is a variation on the idea of index fragmentation. In this section,
    these other two areas in which fragmentation-type maintenance can be required
    on tables will be reviewed:


    *   Heap bloat and forwarding


    *   Columnstore fragmentation'
