  trans: '

    ### 聚簇索引


    第二种索引类型是**聚簇索引**。聚簇索引利用 B 树结构来存储数据。实际上，聚簇索引可以说是堆表的对立面。当在表上构建聚簇索引时，堆结构会被替换为 B 树结构，并按照聚簇索引的键列对数据页进行组织。聚簇索引的
    B 树包含了存储表中所有行数据的数据页。


    在考虑索引列时，聚簇索引有一些限制。第一个限制是键列的总长度不能超过 900 字节。其次，聚簇索引中的聚簇键应该是唯一的。如果聚簇键中的列不唯一，SQL Server
    在存储行时会为该行添加一个隐藏的唯一标识符列。这个唯一标识符是一个 4 字节的数字值，会被添加到非唯一的聚簇键中以强制实现唯一性。唯一标识符的大小不计入 900
    字节的限制。虽然聚簇索引键不需要是唯一的，但如果其本身具有唯一性，则可以省去因添加唯一标识符而带来的资源开销。


    每个表只能有一个聚簇索引。因为聚簇索引是按聚簇键的顺序存储的，且行数据与键存储在一起，所以无法再按其他顺序对表进行替代排序。当在已有堆表上构建聚簇索引时，请确保有足够的可用空间来容纳数据的第二份副本。在索引构建完成之前，两份数据副本都将存在。


    正如后续章节将讨论的，通常更倾向于在所有表上创建聚簇索引。这种偏好并非绝对，在极少数情况下聚簇索引并不适用。虽然需要通过研究来确定哪种结构最合适，但在几乎所有用例中，默认选择使用聚簇索引（而不是堆）都是正确的。那些更适合使用堆的场景是例外情况，应具体问题具体分析。


    ### 非聚簇索引


    **非聚簇索引**与聚簇索引类似。它们也使用 B 树结构来存储数据。对于 SQL Server 2016 及更高版本，键列限制为 1,700 字节；对于之前的所有
    SQL Server 版本，则限制为 900 字节。


    除了与聚簇索引的相似之处，它们也存在一些差异。首先，一个表上可以有多个非聚簇索引。一个表上最多可以有 999 个非聚簇索引，每个索引不超过 16 列。虽然非聚簇索引的数量限制相当大，但通常最佳实践是仅在需要时创建索引，并且不要维护未使用或使用率低的索引，因为它们会消耗内存和存储资源。此外，随着表上索引数量的增加，写操作所需的时间也会变长，因为一个写操作必须等待所有索引更新完成后才能完成。


    在非聚簇索引的 B 树中，叶子级存储的不是数据本身，而是指向表中堆或聚簇索引中数据所在位置的页引用。检索那些不在非聚簇索引内、但位于聚簇索引中的列所需的过程称为**键查找**。


    ### 列存储索引


    顾名思义，**列存储索引**使用列存储结构，并且可以是聚簇的或非聚簇的。


    两种类型的列存储索引都有一些限制需要考虑。首先，并非所有数据类型都可用于列存储索引。随着新版本 SQL Server 的发布，受限制的数据类型列表已经缩小。以下列表按版本概述了哪些数据类型不允许在**聚簇列存储索引**中使用：


    *所有版本（截至 SQL Server 2022）*：`ntext`、`text`、`image`、`rowversion`、`timestamp`、`sql_variant`、`hierarchyid`、`spatial`、`XML`


    *SQL Server 2016 及更早版本*：`nvarchar(max)`、`varchar(max)`、`varbinary(max)`


    *SQL Server 2012*：`uniqueidentifier`


    请注意，**非聚簇列存储索引**允许使用相同的数据类型，只有一个重要例外：在任何版本的 SQL Server 中都不允许使用 `varchar(max)`、`nvarchar(max)`
    和 `varbinary(max)`。


    列存储索引限制为 1,024 列。这意味着无法在超过 1,024 列的表上创建列存储索引。由于列存储索引不强制数据顺序，因此它们不能是唯一的或有序的，也不能包含包含列。每个表只能有一个列存储索引。这个限制通常不是问题，因为聚簇列存储索引会自动包含所有列，而非聚簇列存储索引可以包含满足其用例所需的任意数量（或多或少）的列。


    对于包含多年数据的表，分区可能是一种有价值的方法，可以通过分区切换或分区截断轻松地将旧数据移出表。


    使用列存储索引时，SQL Server 中有一些功能无法与其结合使用。由于列存储使用其自身的压缩技术，因此无法与行压缩或页压缩结合使用。复制和文件流也可能无法与列存储索引一起使用。在
    SQL Server 2017 之前，计算列不允许在列存储索引中使用。在 SQL Server 2017 及更高版本中，聚簇列存储索引只能包含非持久化计算列。持久化计算列不允许在列存储索引上使用，并且计算列也不允许在非聚簇列存储索引中使用。


    最后，SQL Server 2014 引入了可写的聚簇列存储索引。非聚簇列存储索引在此版本中仍然是只读的。因此，有一些特定于 SQL Server 2014
    的限制值得注意，以防使用此版本：


    *   更改跟踪无法与列存储索引结合使用。

    *   更改数据捕获无法与列存储索引结合使用。SQL Server 2016 及更高版本仅允许其与非聚簇列存储索引一起使用。

    *   在 AlwaysOn 可用性组的可读辅助副本中，聚簇列存储索引不可访问。

    *   多个活动结果集 (MARS)。

    *   无法在视图上创建非聚簇列存储索引。


    请注意，这些限制仅适用于 SQL Server 2014。


    ## 本章小结


    本章详细讨论了用作索引构建块的组件。这为创建具有可预测行为的索引提供了必要的基础。


    本次讨论详细介绍了 SQL Server 用于在数据库中存储数据的不同类型页面，以及这些页面如何组合在一起形成区。同时详细阐述了用于将页面组织成逻辑存储的结构，以及
    SQL Server 中每种索引类型组织方式的基础知识。


    # 3. 检查索引内容


    在理解了索引在物理和逻辑级别的存储方式后，可以通过更仔细地查看索引的详细信息和内容，对索引存储获得更深入的认识。


    这次深入探讨将涉及一组在日常工作中很少使用的命令，因此将提供既具有挑战性又有趣的内容供学习和测试。


    **警告**


    本节使用的工具是未文档化且不受支持的。它们不会出现在联机丛书中，并且其功能可能在不通知的情况下发生更改。这些工具已存在很长时间，并且有许多博客文章描述了它们的行为。在使用较旧版本的
    SQL Server 时，理解这些工具很重要，因为某些动态管理函数 (DMF) 可能不可用。务必先在非生产数据上测试这些工具，并确保在测试前备份重要数据。

    '
- fmt: "## Examining Pages\n\nThe first part of the previous chapter outlined the\
    \ types of pages found in SQL Server databases. In addition, the structures available\
    \ for organizing and managing the relationship between pages within databases\
    \ have been reviewed. In the next section, dynamic management functions and DBCC\
    \ commands will be used to examine pages in a database. For current versions of\
    \ SQL Server, `DMFs` can be used, but on older releases, `DBCC` commands will\
    \ need to be used instead.\n\nBy using these tools, a foundation will be built\
    \ that will allow for a more in-depth look at the behaviors of indexes in this\
    \ chapter and throughout the rest of the book. Also, this will provide the tools\
    \ to explore indexes in extensive detail in any database.\n\n## Dynamic Management\
    \ Functions\n\nThere are two dynamic management functions that will be used to\
    \ examine the pages within a SQL Server database. These are:\n\n*   `sys.dm_db_database_page_allocations`\n\
    *   `sys.dm_db_page_info`\n\n### sys.dm_db_database_page_allocations\n\nThe `DMF`\
    \ `sys.dm_db_database_page_allocations` provides information on page allocations\
    \ within a database. The function can be used to investigate indexes and their\
    \ associated pages. It can also be used to identify how extents have been allocated\
    \ and whether the extents being used are mixed or uniform.\n\nThe `DMF` provides\
    \ data similar to `DBCC EXTENTINFO` and `DBCC IND`, which are described later.\
    \ An advantage of using the `DMF` is that the results can be filtered and merged\
    \ with other `DMFs`. Additionally, it provides details on all pages allocated\
    \ to an index, even those without data in them. One restriction of the output\
    \ is that it only returns pages associated with data allocation, such as the data,\
    \ index, and `IAM` pages.\n\nListing 3-1 shows the syntax for using `sys.dm_db_database_page_allocations`.\
    \ The execution requires five parameters, which are defined in Table 3-1.\n\n\
    **Table 3-1**  \nParameters for `sys.dm_db_database_page_allocations`\n\n| **Parameter**\
    \ | **Description** |\n| --- | --- |\n| `@DatabaseId` | Database from which to\
    \ return the page listing for tables and indexes. The parameter is required and\
    \ accepts the use of the `DB_ID()` function. |\n| `@TableId` | `Object_id` for\
    \ the table from which to return the page listing. The parameter is required and\
    \ accepts the use of the `OBJECT_ID()` function. `NULL` can also be used to return\
    \ all tables. |\n| `@IndexId` | `Index_id` from the table that the page list is\
    \ from. The parameter is required and accepts the use of `NULL` to return information\
    \ for all indexes. |\n| `@PartitionId` | ID of the partition that the page list\
    \ is returning. The parameter is required and accepts the use of `NULL` to return\
    \ information for all indexes. |\n| `@Mode` | Defines the mode for returning data.\
    \ The options are `DETAILED` and `LIMITED`. With `LIMITED`, only page metadata\
    \ is returned, such as page allocation and relationship information. Using the\
    \ `DETAILED` mode, additional information is provided such as page type and interpage\
    \ relationship chains. |\n\n```\nSELECT * FROM sys.dm_db_database_page_allocations\
    \ ({database_id},\n{TableId | NULL}, {IndexId | NULL}, { PartitionId | NULL },\n\
    {DETAILED | LIMITED})\n```\n*Listing 3-1*  \n`sys.dm_db_database_page_allocations`\
    \ Syntax\n\nWhen executing `sys.dm_db_database_page_allocations`, results include\
    \ the columns defined in Table 3-2. For every page allocation, there will be one\
    \ row in the results.\n\n**Table 3-2**  \nColumns for `sys.dm_db_database_page_allocations`\n\
    \n| **DMF Column** | **Description** |\n| --- | --- |\n| `database_id` | ID of\
    \ the database |\n| `object_id` | Object ID for the table or view |\n| `index_id`\
    \ | ID for the index |\n| `partition_id` | Partition number for the index |\n\
    | `rowset_id` | Partition ID for the index |\n| `allocation_unit_id` | ID of the\
    \ allocation unit |\n| `allocation_unit_type` | Type of allocation unit |\n| `allocation_unit_type_desc`\
    \ | Description of the allocation unit |\n| `extent_file_id` | File ID of the\
    \ extent |\n| `extent_page_id` | Page ID for the extent |\n| `allocated_page_iam_file_id`\
    \ | File ID for the Index Allocation Map page associated with the page |\n| `allocated_page_iam_page_id`\
    \ | Page ID for the Index Allocation Map page associated with the page |\n| `allocated_page_file_id`\
    \ | File ID of the allocated page |\n| `allocated_page_page_id` | Page ID for\
    \ the allocated page |\n| `is_allocated` | Indicates whether a page is allocated\
    \ |\n| `is_iam_page` | Indicates whether a page is the Index Allocation Map page\
    \ |\n| `is_mixed_page_allocation` | Indicates whether a page is allocated to a\
    \ mixed extent |\n| `page_free_space_percent` | Percentage of space free on the\
    \ page |\n| `page_type` | Page type ID for the allocated page |\n| `page_type_desc`\
    \ | Description of the page type |\n| `page_level` | Level of the page in the\
    \ B-tree index |\n| `next_page_file_id` | File ID for the next page |\n| `next_page_page_id`\
    \ | Page ID for the next page |\n| `previous_page_file_id` | File ID for the previous\
    \ page |\n| `previous_page_page_id` | Page ID for the previous page |\n| `is_page_compressed`\
    \ | Indicates whether the page is compressed |\n| `has_ghost_records` | Indicates\
    \ whether the page has ghost records |\n\nWith this `DMF`, there are several use\
    \ cases that can be investigated that will help demonstrate leveraging `sys.dm_db_database_page_allocations`.\
    \ To begin, a database, a table, and a small amount of data will be created, as\
    \ shown in Listing 3-2.\n\n```\nUSE master;\nGO\nCREATE DATABASE Chapter2Internals;\n\
    GO\nUSE Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsOne\n(\nRowID INT\
    \ IDENTITY(1, 1),\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsOne\n\
    DEFAULT VALUES;\nGO 12\n```\n*Listing 3-2*  \nScript for Creating `dbo.IndexInternalsOne`\
    \ with 12 Rows\n\nAfter creating the table, the script will be used in Listing\
    \ 3-3 to illustrate how SQL Server stores the rows in the table and how they can\
    \ be examined with `sys.dm_db_database_page_allocations`. As Figure 3-1 shows,\
    \ there is one Index Allocation Map page allocated to the table, which is within\
    \ a mixed page allocation. This means that multiple indexes can use that extent\
    \ to allocate these pages. There are eight pages allocated to the first data page\
    \ extent of the index starting at page 312 and another four pages allocated from\
    \ an extent starting at page 320. Additionally, there are four pages allocated\
    \ but not assigned a page type on the extent at page 320. There is an index allocation\
    \ map and extents with data pages allocated to that map.\n\n![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1**  \nExtent allocation results for `dbo.IndexInternalsOne`\n\n\
    ```\nSELECT DPA.extent_file_id,\nDPA.extent_page_id,\nDPA.page_type_desc,\nDPA.allocation_unit_type_desc,\n\
    DPA.is_iam_page,\nDPA.is_mixed_page_allocation,\nCOUNT(*) AS page_count\nFROM\
    \ sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsOne'),\
    \ NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\nDPA.extent_page_id,\n\
    DPA.page_type_desc,\nDPA.allocation_unit_type_desc,\nDPA.is_iam_page,\nDPA.is_mixed_page_allocation\n\
    ORDER BY DPA.extent_page_id,\nDPA.page_type_desc;\n```\n*Listing 3-3*  \nExtent\
    \ Allocation with `sys.dm_db_database_page_allocations`"
  raw: '## Examining Pages


    The first part of the previous chapter outlined the types of pages found in SQL
    Server databases. In addition, the structures available for organizing and managing
    the relationship between pages within databases have been reviewed. In the next
    section, dynamic management functions and DBCC commands will be used to examine
    pages in a database. For current versions of SQL Server, DMFs can be used, but
    on older releases, DBCC commands will need to be used instead.


    By using these tools, a foundation will be built that will allow for a more in-depth
    look at the behaviors of indexes in this chapter and throughout the rest of the
    book. Also, this will provide the tools to explore indexes in extensive detail
    in any database.


    ## Dynamic Management Functions


    There are two dynamic management functions that will be used to examine the pages
    within a SQL Server database. These are


    *   sys.dm_db_database_page_allocations


    *   sys.dm_db_page_info


    ### sys.dm_db_database_page_allocations


    The DMF `sys.dm_db_database_page_allocations` provides information on page allocations
    within a database. The function can be used to investigate indexes and their associated
    pages. It can also be used to identify how extents have been allocated and whether
    the extents being used are mixed or uniform.


    The DMF provides data similar to DBCC EXTENTINFO and DBCC IND, which are described
    later. An advantage of using the DMF is that the results can be filtered and merged
    with other DMFs. Additionally, it provides details on all pages allocated to an
    index, even those without data in them. One restriction of the output is that
    it only returns pages associated with data allocation, such as the data, index,
    and IAM pages.


    Listing [3-1](#338675_4_En_3_Chapter.xhtml#PC1) shows the syntax for using `sys.dm_db_database_page_allocations`.
    The execution requires five parameters, which are defined in Table [3-1](#338675_4_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    Parameters for sys.dm_db_database_page_allocations


    | **Parameter** | **Description** |

    | --- | --- |

    | `@DatabaseId` | Database from which to return the page listing for tables and
    indexes.  The parameter is required and accepts the use of the `DB_ID()` function.
    |

    | `@TableId` | `Object_id` for the table from which to return the page listing.  The
    parameter is required and accepts the use of the `OBJECT_ID()` function.  `NULL`
    can also be used to return all tables. |

    | `@IndexId` | `Index_id` from the table that the page list is from.  The parameter
    is required and accepts the use of `NULL` to return information for all indexes.
    |

    | `@PartitionId` | ID of the partition that the page list is returning.  The parameter
    is required and accepts the use of `NULL` to return information for all indexes.
    |

    | `@Mode` | Defines the mode for returning data. The options are `DETAILED` and
    `LIMITED`.  With `LIMITED`, only page metadata is returned, such as page allocation
    and relationship information.  Using the `DETAILED` mode, additional information
    is provided such as page type and interpage relationship chains. |


    ```

    SELECT * FROM sys.dm_db_database_page_allocations ({database_id},

    {TableId | NULL}, {IndexId | NULL}, { PartitionId | NULL },

    {DETAILED | LIMITED})

    Listing 3-1

    sys.dm_db_database_page_allocations Syntax

    ```


    When executing `sys.dm_db_database_page_allocations`, results include the columns
    defined in Table [3-2](#338675_4_En_3_Chapter.xhtml#Tab2). For every page allocation,
    there will be one row in the results.


    Table 3-2


    Columns for sys.dm_db_database_page_allocations


    | **DMF Column** | **Description** |

    | --- | --- |

    | `database_id` | ID of the database |

    | `object_id` | Object ID for the table or view |

    | `index_id` | ID for the index |

    | `partition_id` | Partition number for the index |

    | `rowset_id` | Partition ID for the index |

    | `allocation_unit_id` | ID of the allocation unit |

    | `allocation_unit_type` | Type of allocation unit |

    | `allocation_unit_type_desc` | Description of the allocation unit |

    | `extent_file_id` | File ID of the extent |

    | `extent_page_id` | Page ID for the extent |

    | `allocated_page_iam_file_id` | File ID for the Index Allocation Map page associated
    with the page |

    | `allocated_page_iam_page_id` | Page ID for the Index Allocation Map page associated
    with the page |

    | `allocated_page_file_id` | File ID of the allocated page |

    | `allocated_page_page_id` | Page ID for the allocated page |

    | `is_allocated` | Indicates whether a page is allocated |

    | `is_iam_page` | Indicates whether a page is the Index Allocation Map page |

    | `is_mixed_page_allocation` | Indicates whether a page is allocated to a mixed
    extent |

    | `page_free_space_percent` | Percentage of space free on the page |

    | `page_type` | Page type ID for the allocated page |

    | `page_type_desc` | Description of the page type |

    | `page_level` | Level of the page in the B-tree index |

    | `next_page_file_id` | File ID for the next page |

    | `next_page_page_id` | Page ID for the next page |

    | `previous_page_file_id` | File ID for the previous page |

    | `previous_page_page_id` | Page ID for the previous page |

    | `is_page_compressed` | Indicates whether the page is compressed |

    | `has_ghost_records` | Indicates whether the page has ghost records |


    With this DMF, there are several use cases that can be investigated that will
    help demonstrate leveraging sys.dm_db_database_page_allocations. To begin, a database,
    a table, and a small amount of data will be created, as shown in Listing [3-2](#338675_4_En_3_Chapter.xhtml#PC2).


    ```

    USE master;

    GO

    CREATE DATABASE Chapter2Internals;

    GO

    USE Chapter2Internals;

    GO

    CREATE TABLE dbo.IndexInternalsOne

    (

    RowID INT IDENTITY(1, 1),

    FillerData CHAR(8000)

    );

    GO

    INSERT INTO dbo.IndexInternalsOne

    DEFAULT VALUES;

    GO 12

    Listing 3-2

    Script for Creating dbo.IndexInternalsOne with 12 Rows

    ```


    After creating the table, the script will be used in Listing [3-3](#338675_4_En_3_Chapter.xhtml#PC3)
    to illustrate how SQL Server stores the rows in the table and how they can be
    examined with sys.dm_db_database_page_allocations. As Figure [3-1](#338675_4_En_3_Chapter.xhtml#Fig1)
    shows, there is one Index Allocation Map page allocated to the table, which is
    within a mixed page allocation. This means that multiple indexes can use that
    extent to allocate these pages. There are eight pages allocated to the first data
    page extent of the index starting at page 312 and another four pages allocated
    from an extent starting at page 320\. Additionally, there are four pages allocated
    but not assigned a page type on the extent at page 320\. There is an index allocation
    map and extents with data pages allocated to that map.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig1_HTML.jpg)


    A screenshot of a query table results of 3 rows of data. The 7 column headers
    are extent file I D, extent page I D, page type d e s c, allocation unit type
    d e s c, is i am page, is mixed page allocation, and page count.


    Figure 3-1


    Extent allocation results for dbo.IndexInternalsOne


    ```

    SELECT DPA.extent_file_id,

    DPA.extent_page_id,

    DPA.page_type_desc,

    DPA.allocation_unit_type_desc,

    DPA.is_iam_page,

    DPA.is_mixed_page_allocation,

    COUNT(*) AS page_count

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.IndexInternalsOne''),
    NULL, NULL, ''DETAILED'') DPA

    GROUP BY DPA.extent_file_id,

    DPA.extent_page_id,

    DPA.page_type_desc,

    DPA.allocation_unit_type_desc,

    DPA.is_iam_page,

    DPA.is_mixed_page_allocation

    ORDER BY DPA.extent_page_id,

    DPA.page_type_desc;

    Listing 3-3

    Extent Allocation with sys.dm_db_database_page_allocations

    ```'
  trans: "## 审查页面\n\n上一章的第一部分概述了 SQL Server 数据库中页面的类型。此外，还回顾了可用于组织和管理数据库内页面关系的结构。在下一节中，将使用动态管理函数和\
    \ DBCC 命令来检查数据库中的页面。对于当前版本的 SQL Server，可以使用 `DMF`，但在较旧的版本上，则需要使用 `DBCC` 命令。\n\n\
    通过使用这些工具，将为本章及本书其余部分深入探讨索引行为奠定基础。同时，这也提供了在任何数据库中详尽探索索引的工具。\n\n## 动态管理函数\n\n有两个动态管理函数将用于检查\
    \ SQL Server 数据库中的页面。它们是：\n\n*   `sys.dm_db_database_page_allocations`\n*   `sys.dm_db_page_info`\n\
    \n### sys.dm_db_database_page_allocations\n\n动态管理函数 (`DMF`) `sys.dm_db_database_page_allocations`\
    \ 提供有关数据库内页面分配的信息。该函数可用于调查索引及其关联的页面。它还可用于识别区的分配方式以及使用的区是混合区还是统一区。\n\n该动态管理函数提供的数据类似于稍后描述的\
    \ `DBCC EXTENTINFO` 和 `DBCC IND`。使用动态管理函数的一个优势是结果可以被过滤并与其他动态管理函数合并。此外，它还提供了分配给索引的所有页面的详细信息，即使这些页面中没有数据。其输出的一个限制是它只返回与数据分配相关的页面，例如数据页、索引页和\
    \ `IAM` 页。\n\n清单 3-1 展示了使用 `sys.dm_db_database_page_allocations` 的语法。执行需要五个参数，这些参数在表\
    \ 3-1 中定义。\n\n**表 3-1**  \n`sys.dm_db_database_page_allocations` 的参数\n\n| **参数**\
    \ | **描述** |\n| --- | --- |\n| `@DatabaseId` | 要从中返回表和索引页面列表的数据库。此参数是必需的，接受使用\
    \ `DB_ID()` 函数。 |\n| `@TableId` | 要从中返回页面列表的表的 `Object_id`。此参数是必需的，接受使用 `OBJECT_ID()`\
    \ 函数。也可以使用 `NULL` 来返回所有表。 |\n| `@IndexId` | 页面列表所属表的 `Index_id`。此参数是必需的，接受使用 `NULL`\
    \ 来返回所有索引的信息。 |\n| `@PartitionId` | 页面列表要返回的分区的 ID。此参数是必需的，接受使用 `NULL` 来返回所有索引的信息。\
    \ |\n| `@Mode` | 定义返回数据的模式。选项为 `DETAILED` 和 `LIMITED`。使用 `LIMITED` 模式时，仅返回页面元数据，例如页面分配和关系信息。使用\
    \ `DETAILED` 模式时，会提供额外信息，如页面类型和页面间关系链。 |\n\n```\nSELECT * FROM sys.dm_db_database_page_allocations\
    \ ({database_id},\n{TableId | NULL}, {IndexId | NULL}, { PartitionId | NULL },\n\
    {DETAILED | LIMITED})\n```\n*清单 3-1*  \n`sys.dm_db_database_page_allocations`\
    \ 语法\n\n执行 `sys.dm_db_database_page_allocations` 时，结果包括表 3-2 中定义的列。每个页面分配在结果中都会对应一行。\n\
    \n**表 3-2**  \n`sys.dm_db_database_page_allocations` 的列\n\n| **DMF 列名** | **描述**\
    \ |\n| --- | --- |\n| `database_id` | 数据库的 ID |\n| `object_id` | 表或视图的对象 ID |\n\
    | `index_id` | 索引的 ID |\n| `partition_id` | 索引的分区号 |\n| `rowset_id` | 索引的分区 ID\
    \ |\n| `allocation_unit_id` | 分配单元的 ID |\n| `allocation_unit_type` | 分配单元的类型 |\n\
    | `allocation_unit_type_desc` | 分配单元的描述 |\n| `extent_file_id` | 区的文件 ID |\n| `extent_page_id`\
    \ | 区的页面 ID |\n| `allocated_page_iam_file_id` | 与该页面关联的索引分配映射页的文件 ID |\n| `allocated_page_iam_page_id`\
    \ | 与该页面关联的索引分配映射页的页面 ID |\n| `allocated_page_file_id` | 已分配页面的文件 ID |\n| `allocated_page_page_id`\
    \ | 已分配页面的页面 ID |\n| `is_allocated` | 指示页面是否已分配 |\n| `is_iam_page` | 指示页面是否是索引分配映射页\
    \ |\n| `is_mixed_page_allocation` | 指示页面是否分配到混合区 |\n| `page_free_space_percent`\
    \ | 页面上的可用空间百分比 |\n| `page_type` | 已分配页面的页面类型 ID |\n| `page_type_desc` | 页面类型的描述\
    \ |\n| `page_level` | 页面在 B 树索引中的级别 |\n| `next_page_file_id` | 下一页的文件 ID |\n|\
    \ `next_page_page_id` | 下一页的页面 ID |\n| `previous_page_file_id` | 上一页的文件 ID |\n\
    | `previous_page_page_id` | 上一页的页面 ID |\n| `is_page_compressed` | 指示页面是否被压缩 |\n\
    | `has_ghost_records` | 指示页面是否含有幽灵记录 |\n\n使用此动态管理函数，可以研究几个用例，以帮助演示如何利用 `sys.dm_db_database_page_allocations`。首先，将创建一个数据库、一个表和少量数据，如清单\
    \ 3-2 所示。\n\n```\nUSE master;\nGO\nCREATE DATABASE Chapter2Internals;\nGO\nUSE\
    \ Chapter2Internals;\nGO\nCREATE TABLE dbo.IndexInternalsOne\n(\nRowID INT IDENTITY(1,\
    \ 1),\nFillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsOne\nDEFAULT\
    \ VALUES;\nGO 12\n```\n*清单 3-2*  \n创建包含 12 行的 `dbo.IndexInternalsOne` 的脚本\n\n\
    创建表后，将使用清单 3-3 中的脚本来说明 SQL Server 如何存储表中的行以及如何使用 `sys.dm_db_database_page_allocations`\
    \ 来检查它们。如图 3-1 所示，为该表分配了一个索引分配映射页，该页位于一个混合页分配中。这意味着多个索引可以使用该区来分配这些页面。索引的第一个数据页区分配了八个页面，起始页为\
    \ 312；另一个区分配了四个页面，起始页为 320。此外，在起始页为 320 的区上，有四个页面已分配但未指定页面类型。存在一个索引分配映射以及分配给该映射的带有数据页的区。\n\
    \n![](img/338675_4_En_3_Fig1_HTML.jpg)\n\n**图 3-1**  \n`dbo.IndexInternalsOne`\
    \ 的区分配结果\n\n```\nSELECT DPA.extent_file_id,\nDPA.extent_page_id,\nDPA.page_type_desc,\n\
    DPA.allocation_unit_type_desc,\nDPA.is_iam_page,\nDPA.is_mixed_page_allocation,\n\
    COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsOne'),\
    \ NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\nDPA.extent_page_id,\n\
    DPA.page_type_desc,\nDPA.allocation_unit_type_desc,\nDPA.is_iam_page,\nDPA.is_mixed_page_allocation\n\
    ORDER BY DPA.extent_page_id,\nDPA.page_type_desc;\n```\n*清单 3-3*  \n使用 `sys.dm_db_database_page_allocations`\
    \ 查看区分配"
- fmt: "Index Allocation Map pages are always part of a mixed extent since the allocation\
    \ determines the index mapping for multiple tables. To demonstrate, the script\
    \ in Listing 3-4 can be run, which creates a second table that includes a clustered\
    \ index via a primary key. Reviewing the results in Figure 3-2, the six rows were\
    \ added to an extent that starts at page 328, bypassing the four pages that were\
    \ allocated but not used in the previous table. The Index Allocation Map page\
    \ belongs to the same extent as that of `dbo.IndexInternalsOne`, which starts\
    \ at page 232, showing that this extent is indeed mixed. Additionally, an index\
    \ page is allocated to the table to support the B-tree structure of the clustered\
    \ index.\n\n![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig2_HTML.png)\n\n\
    A screenshot of a query table results of 4 rows of data. The 7 column headers\
    \ are extent file I D, extent page I D, page type d e s c, allocation unit type\
    \ d e s c, is i am page, is mixed page allocation, and page count.\n\n**Figure\
    \ 3-2**\nExtent allocation results for `dbo.IndexInternalsTwo`\n\n```\nUSE Chapter2Internals;\n\
    GO\nCREATE TABLE dbo.IndexInternalsTwo\n(\n    RowID INT IDENTITY(1, 1) PRIMARY\
    \ KEY,\n    FillerData CHAR(8000)\n);\nGO\nINSERT INTO dbo.IndexInternalsTwo\n\
    DEFAULT VALUES;\nGO 6\nSELECT DPA.extent_file_id,\n       DPA.extent_page_id,\n\
    \       DPA.page_type_desc,\n       DPA.allocation_unit_type_desc,\n       DPA.is_iam_page,\n\
    \       DPA.is_mixed_page_allocation,\n       COUNT(*) AS page_count\nFROM sys.dm_db_database_page_allocations(DB_ID(),\
    \ OBJECT_ID('dbo.IndexInternalsTwo'), NULL, NULL, 'DETAILED') DPA\nGROUP BY DPA.extent_file_id,\n\
    \         DPA.extent_page_id,\n         DPA.page_type_desc,\n         DPA.allocation_unit_type_desc,\n\
    \         DPA.is_iam_page,\n         DPA.is_mixed_page_allocation\nORDER BY DPA.extent_page_id,\n\
    \         DPA.page_type_desc;\n```\n**Listing 3-4**\nScript for Creating `dbo.IndexInternalsTwo`\
    \ with 12 Rows\n\nBeyond extent-level details, this DMF can be used to investigate\
    \ indexes at the page level to understand all pages allocated to the table and\
    \ how they relate to other pages in an index. Using the script in Listing 3-5,\
    \ it can be seen that the extent starting on page 232 includes the allocated pages\
    \ 235 and 236 for the index allocation maps, as shown in Figure 3-3. The extent\
    \ starting at page 312 includes pages 312, 313, and so on, which is similar to\
    \ the extent starting at page 328, which includes pages 328, 329, and so on. Add\
    \ to this the ability to see per page its level within the B-tree and the connections\
    \ between pages, verifying the ability to move up and down the index and from\
    \ page to page via the data pages.\n\n![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig3_HTML.png)\n\
    \nA screenshot of a query table results of 9 rows of data. The 10 column headers\
    \ are page type d e s c, allocation unit type d e s c, object i d, index i d,\
    \ extent page i d, allocated page page i d, page level, next page page i d, previous\
    \ page page i d.\n\n**Figure 3-3**\nExtent allocation results for reviewing all\
    \ allocated pages\n\n```\nUSE Chapter2Internals;\nGO\nSELECT DPA.page_type_desc,\n\
    \       DPA.allocation_unit_type_desc,\n       DPA.object_id,\n       DPA.index_id,\n\
    \       DPA.extent_page_id,\n       DPA.allocated_page_iam_page_id,\n       DPA.allocated_page_page_id,\n\
    \       DPA.page_level,\n       DPA.next_page_page_id,\n       DPA.previous_page_page_id\n\
    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID('dbo.IndexInternalsTwo'),\
    \ NULL, NULL, 'DETAILED') DPA\n```\n**Listing 3-5**\nScript for Reviewing All\
    \ Allocated Pages\n\n### sys.dm_db_page_info\n\nAnother dynamic management function\
    \ that helps understand how indexes operate is `sys.dm_db_page_info`. This DMF\
    \ is documented and supported by Microsoft, unlike `sys.dm_db_database_page_allocations`.\
    \ It provides page header row information for database pages. This information\
    \ includes number of slots, free bytes, minimally logged status, ghost records,\
    \ and page linking details.\n\nListing 3-6 shows the syntax for using `sys.dm_db_page_info`.\
    \ The execution requires four parameters, which are defined in Table 3-3. Note\
    \ that while the parameters allow `NULL`, the function will return an error if\
    \ any are set to `NULL`.\n\n**Table 3-3**\nParameters for `sys.dm_db_page_info`\n\
    \n| Parameter | Description |\n| --- | --- |\n| `@DatabaseId` | Database to return\
    \ page header information from. |\n| `@FileId` | `File` `Id` for the page that\
    \ will be returned. |\n| `@PageId` | `Page` `id` for the page that will be returned.\
    \ |\n| `@Mode` | Defines the mode for returning data. The options are `DETAILED`\
    \ and `LIMITED`.  With `LIMITED`, only page metadata is returned.  Under the `DETAILED`\
    \ mode, page descriptive columns will be populated. |\n\n```\nSELECT * FROM sys.dm_db_database_page_allocations\
    \ ({database_id},\n{FileId}, {PageId}, {DETAILED | LIMITED})\n```\n**Listing 3-6**\n\
    `sys.dm_db_page_info` Syntax\n\nWhen returning data from `sys.dm_db_page_info`,\
    \ results include the columns defined in Table 3-4. For every page requested,\
    \ there will be one row of header information in the results.\n\n**Table 3-4**\n\
    Columns for `sys.dm_db_page_info`"
