    The Included Columns pattern for building non-clustered indexes is an important
    pattern to use when creating indexes. When used with specific queries that result
    in lookup operations, it provides improved read and execution performance. It
    also provides opportunities to consolidate similar indexes to reduce the overall
    number of indexes on the table while still providing performance improvements
    over situations where the indexes do not exist.


    ### Filtered Indexes


    In some tables, there are rows with certain values that will rarely, or never,
    be returned in the result set as part of the applications using the databases.
    In these scenarios, it may be beneficial to remove the rows as an option to be
    returned by the result set. In some other situations, it may be useful to identify
    a subset of data in a table and create indexes based on it. Instead of querying
    across millions or billions of records in the table, indexes can be used that
    cover the hundreds or thousands of rows that the query needs to return results.
    Both of these situations identify scenarios where using the Filtered Indexes pattern
    can help improve performance.


    The Filtered Indexes pattern uses, as the name suggests, the filtered index feature
    in SQL Server. When using filtered indexes, a `WHERE` clause is added to a non-clustered
    index to reduce the rows that are contained within the index. By including only
    the rows that match the filter of the `WHERE` clause, the query engine has to
    consider only those rows in building an execution plan; moreover, the cost of
    scanning a range of rows is less expensive than if all the rows were included
    in the index.


    To illustrate the value in using filtered indexes, consider a scenario where only
    a small subset of the table has values in the column that is being filtered. Listing
    13-25 considers variations of a query. In the first version, the rows where `CertificationDate`
    has a value are returned. The second version returns only rows that have a `CertificationDate`
    between January 1, 2005, and February 1, 2005. With both of these queries, there
    is no index on the table that will provide an optimal plan for execution, and
    all 2,866 pages of the index are accessed during execution (see Figure 13-36).
    Examining both execution plans (Figure 13-37) shows that a clustered index scan
    of `dbo.Contacts` is used to find the rows that match the `CertificationDate`
    predicate. An index on the `CertificationDate` column could, as the missing index
    hint suggests, improve the performance of the query.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig37_HTML.png)


    A panel with an opened execution plan tab containing 3 lines of text each for
    queries 1 and 2 with 50% cost each relative to the batch. Each has a flow diagram
    exhibiting the connection from clustered index scan, clustered, contacts, at 99%
    cost each to select at 0% cost.


    Figure 13-37


    Execution plans for a query that does not use the Filtered Indexes pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig36_HTML.png)


    A panel with an opened messages tab with 2 pairs of 2 lines of entries for worktable
