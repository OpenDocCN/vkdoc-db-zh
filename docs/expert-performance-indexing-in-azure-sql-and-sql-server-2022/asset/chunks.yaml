- fmt: "### The Views\n\n有两个目录视图与空间索引相关：`sys.spatial_indexes` 和 `sys.spatial_index_tessellations`。`sys.spatial_indexes`\
    \ 视图提供了空间索引的类型、细分方案以及基本信息。`sys.spatial_indexes` 返回的 `spatial_index_type` 列，对 `GEOMETRY`\
    \ 索引返回 1，对 `GEOGRAPHY` 索引返回 2。清单 [7-8](#338675_4_En_7_Chapter.xhtml#PC8) 是查询该视图的示例，图\
    \ [7-7](#338675_4_En_7_Chapter.xhtml#Fig7) 展示了结果。\n\n![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig7_HTML.png)\n\
