    清单 13-29

    使用了索引的外键模式


    **外键模式**对于在表之间建立外键关系至关重要。这些关系的目的是验证数据，因此必须确保支持该活动的索引已就位。不要以此模式为借口从数据库中移除验证；相反，应将其视为对繁忙表进行正确索引的机会。如果该列需要被查询以进行数据验证和约束，那么当该数据需要用于其他目的时，它很可能也会被应用程序访问。


    ## 列存储索引


    随着数据库规模的增长，传统聚集和非聚集索引无法为计算结果提供所需性能的情况越来越多。这对于大型数据仓库构成了最大的挑战，为解决此问题，SQL Server
    2012 引入了列存储索引。前面的章节讨论了列存储如何利用基于列的存储而非基于行的存储。本节将介绍聚集和非聚集列存储索引的一些指导原则，以及如何识别何时应构建列存储索引。在介绍指导原则之后，将提供一个实现列存储索引的示例。


    ### 注意


    本节中的列存储索引示例使用了 Microsoft Contoso BI Demo Dataset for Retail Industry。该数据库包含一个拥有超过
    800 万条记录的事实表。可在 `www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`
    下载。


    使用列存储索引的关键在于能够正确识别应应用它们的场景。虽然在某些 OLTP 数据库中使用列存储索引可能有用，但这并非其目标场景。尽管列存储索引的性能在 OLTP
    数据库中可能有用，但与此索引类型相关的限制使其难以在事务性工作负载中有意义地使用。列存储索引主要适用于数据仓库，因为那里需要跨大量行进行聚合，并且返回的列较少。凭借基于列的存储和内置压缩，这种索引类型提供了一种尽可能快地访问所需数据的方法，而无需加载不属于查询的列。在数据仓库中，列存储索引更适用于事实表而非维度表。列存储索引在应用于大型表时才能证明其价值。表越大，列存储索引相对于传统索引带来的性能提升就越大。此外，在考虑数据仓库查询时，它们有一个共同特征，即使用可用列的聚合和子集。通过聚合，列存储索引的批处理模式处理提供了更大的性能改进。查询中涉及的列越少，意味着加载到内存中的数据就越少，因为查询上下文中只使用了被访问的列。


    当发现适合使用列存储索引的场景时，首先需要考虑几点。由于列存储索引既可以是聚集的，也可以是非聚集的，因此第一个决策是使用哪种类型。聚集列存储索引将表中的所有数据与索引一起存储，这意味着数据库中只出现数据的一份副本。由于是所有数据，表中的所有列都会出现在列存储索引中。对于主要或完全是分析性质的工作负载来说，这很可能是理想的选择。


    或者，列存储索引可以是非聚集的。这提供了限制索引中包含的列数的能力。非聚集列存储索引将依赖于表中已有的聚集行存储索引，这意味着非聚集列存储索引会增加表的总体存储占用空间。

    '
- fmt: 'Non-clustered columnstore indexes have more considerations when creating them,
    so there are a number of guidelines to consider when building them. First, the
    order of the columns in the non-clustered columnstore index does not matter. Each
    column is stored separately from the other columns, and there are no relationships.
    The next thing to remember is that all columns in the table that will be leveraged
    by the columnstore index must appear in the columnstore index. If a column from
    a query does not appear in the non-clustered columnstore index, then the index
    cannot be used in its execution.


    If using SQL Server versions prior to SQL Server 2017, it is important to remember
    that non-clustered columnstore indexes are read-only, and any table or partition
    that has a non-clustered columnstore index built upon it will be placed in a read-only
    state. To modify the table, the non-clustered columnstore index will need to be
    disabled or dropped and then rebuilt or created after the updates are completed.
    This limitation does not affect clustered columnstore indexes and was lifted from
    non-clustered columnstore indexes beginning with SQL Server 2017.


    Non-clustered columnstore indexes are ideal for tables that are primarily transactional
    in nature, but that also support critical analytic queries. As a bonus, the column
    list can be specified for a non-clustered columnstore index, allowing for the
    index to target columns that are to be used for important analytic queries.


    A limitation that affects both types of columnstore indexes is the length of time
    that it takes to create the index. In many cases, it can take four to five times
    longer to create a columnstore index than it does to build a clustered or non-clustered
    index. Therefore, index creation should be scheduled for times when sufficient
    resources are available for their completion. For more information on columnstore
    indexes, see Chapter [2](#338675_4_En_2_Chapter.xhtml).


    Before demonstrating the value in columnstore indexes, it is worth reviewing a
    demonstration of a query against a data warehouse with traditional indexing. In
    Listing [13-30](#338675_4_En_13_Chapter.xhtml#PC30), the query is summarizing
    `SalesQuantity` values by `CalendarQuarter` and `ProductCategoryName`. Executing
    the query does not take a substantial amount of time; Figure [13-46](#338675_4_En_13_Chapter.xhtml#Fig46)
    shows an elapsed time of 4,293 ms (or 4.2 seconds), with a little less than 20,000
    reads on `dbo.FactSales`. The results are reasonable for the current volume of
    records, but consider if the table had 10 or 100 times as many rows. At what point
    would the 4.2 seconds of execution grow outside the acceptable execution time?


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig46_HTML.png)


    A panel with an opened messages tab with 8 lines for 8 tables with different scan
    count, logical reads, physical reads, read-ahead reads, l o b logical reads, and
    l o b physical reads values under the 96 rows affected label. Also exhibited are
    3606 and 4293 milliseconds for C P U and elapsed times under S Q L server execution.


    Figure 13-46


    Statistics I/O results for a clustered index on a fact table


    Note


    Because of the size of the execution plans, they are not being included in the
    columnstore index examples. And since this section is relying on CPU time to demonstrate
    performance, they are run multiple times to ensure that disk-to-memory performance
    is not a factor.


    ```

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    ,COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```


    Listing 13-30: Analytic query that makes use of Traditional Indexing


    To test the performance with a non-clustered columnstore index on `dbo.FactSales`,
    a new index will be added to the table. All columns in `dbo.FactSales` are added
    to the columnstore index, shown in Listing [13-31](#338675_4_En_13_Chapter.xhtml#PC31).
    With the index in place, the performance of the query changes dramatically. From
    a timing perspective, the query completes in 286 ms, as shown in Figure [13-47](#338675_4_En_13_Chapter.xhtml#Fig47),
    which is an improvement of over 15 times the performance without the non-clustered
    columnstore index. Additionally, the number of I/Os dropped from nearly 20,000
    to 2,608.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig47_HTML.png)


    A panel with an opened messages tab with 8 lines for 8 tables with different scan
    count, logical reads, physical reads, read-ahead reads, l o b logical reads, and
    l o b physical reads values under the 96 rows affected label. Also exhibited are
    168 and 286 milliseconds for C P U and elapsed times under S Q L server execution.


    Figure 13-47


    Statistics I/O results for a non-clustered columnstore index


    ```

    USE ContosoRetailDW

    GO

    CREATE NONCLUSTERED COLUMNSTORE INDEX IX_FactSales_CStore ON dbo.FactSales (

    SalesKey, DateKey, channelKey, StoreKey, ProductKey, PromotionKey, CurrencyKey,
    UnitCost, UnitPrice,

    SalesQuantity, ReturnQuantity, ReturnAmount, DiscountQuantity, DiscountAmount,
    TotalCost, SalesAmount,

    ETLLoadID, LoadDate, UpdateDate);

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```


    Listing 13-31: Adding a Non-clustered Columnstore Index


    As workloads are tested, analyzed, and optimized, it is important to consider
    which columns belong in the non-clustered columnstore index. Columns that are
    not the target of analytic queries can be omitted. This saves storage, reduces
    the time spent performing index maintenance, and reduces write times as there
    are less segments and rowgroups that require updating when data is inserted, updated,
    or deleted.


    Next, consider the impact of using a clustered columnstore index on `dbo.FactSales`.
    Since a clustered index was created on the table, the script in Listing [13-32](#338675_4_En_13_Chapter.xhtml#PC32)
    will be used to create a new table called `dbo.FactSales_CCI`, populate it with
    the same data in `dbo.FactSales`, and add the clustered columnstore index to it.


    When using the same aggregate query from the previous examples, the performance
    value of the clustered columnstore is evident. Considering the execution time
    (shown in Figure [13-48](#338675_4_En_13_Chapter.xhtml#Fig48)), it drops further
    to 164 ms, which is more than 26 times faster than the fact table with the clustered
    index. The I/Os are reduced as well with only 1,309 I/Os for the execution. While
    the I/O footprint is similar to the non-clustered columnstore, remember that the
    clustered columnstore is stored only a single time and the values in it can be
    modified.'
