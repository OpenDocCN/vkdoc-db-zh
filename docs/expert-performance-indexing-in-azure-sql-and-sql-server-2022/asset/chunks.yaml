    a clustered index, the non-key columns are stored alongside the key columns. This
    equates to the clustered index determining the layout of the table itself.


    Because it defines the fundamental organization of a table, there may only be
    a single clustered index on any table at one time.'
  trans: '

    ## 为何要建立索引？


    任何企业最重要的资产就是其数据。数据库的存在就是为了存储这些数据，而提供数据的一个关键环节是高效地交付数据。能够快速访问数据可以提升企业从中获取的价值。确保数据访问速度的方式就是使用有效的索引。


    索引为数据赋予了顺序，而这种顺序允许数据被高效地排序、筛选和聚合。这减少了执行这些操作所需的时间和计算资源。


    与索引数据相对的情况是数据存储在无序的堆中。堆就是没有索引的表。没有顺序，`SQL Server`就必须扫描整张表来返回其中的任何数据。对于较大的表，这个过程代价高昂得令人望而却步。例如，要从一个未建立索引、大小为`1
    TB`的表中返回一行数据，就需要读取整整一个太字节的数据来找到被查询的那一行。


    为了说明这一点，考虑一个常用来描述索引的类比——图书馆。图书馆有许多书架的书。在图书馆中，最常见的任务是找书。大多数访客要么想找一本特定的书，要么想找一本与某个非常有限的主题相关的书。


    一个没有图书排序系统的图书馆对大多数访客来说毫无用处。手工一本一本地搜寻数万本书的想法将构成荒谬的工作量。图书馆使用`杜威十进分类法`系统按主题和类型来组织书籍，使用一套详细的数字来标记它们。例如，关于科学的书籍可以在`500–599`的范围内找到。数学书籍则限于`510–519`的范围，而几何学书籍具体在`516`中找到。


    这个分类系统充当了图书馆的索引，使得寻找一本好的几何学书籍的访客能够快速有效地定位它。无需在图书馆里徘徊寻找关于几何学的书，也无需翻阅无关的书籍来找到它们。索引基于主题建立，并符合图书馆访客最常见的搜索模式。


    当搜索的不是主题而是特定作者时会发生什么？如果需要找到关于埃德加·F·科德的书呢？一个有根据的猜测是这些书会在与数据库或计算相关的部分。然而，唯一能确定的方法就是手动搜索大量书籍，最终找到正确的那几本。


    图书馆使用卡片目录或计算机来解决这个问题。这些系统允许按其他标准搜索书籍，例如作者、出版日期、语言或标题。在前面的例子中，可以搜索标题中包含"Edgar Codd"字样的书籍。这比在科学、数学和计算类别的书堆中搜寻并希望成功要高效得多。这个系统提供了`杜威十进系统`之外的二级索引，从而允许访客使用各种不同的标准来搜索书籍。


    这些系统远比在图书馆里徘徊、浏览无穷无尽的书籍高效得多。反过来，一个足够小的图书馆不需要卡片目录、`杜威十进系统`或计算机。一个“小小免费图书馆”可能只包含`10`或`20`本书。在这种情况下，浏览每本书的标题花费的时间很少，比尝试使用一个复杂的系统来组织它们更有效率。


    这个类比旨在不立即深入数据库结构的情况下介绍索引的概念。随着对索引的更详细讨论，图书馆的例子将被用作一种方式，将本书中更技术性的细节锚定在一个植根于日常生活的更简单的例子上。


    ## 主要索引类型


    有多种方式来描述索引及其功能。为了简化关于索引的讨论，它们将被分为三类，本节将对此进行讨论。堆表和聚集索引描述了底层表结构中数据的存储方式。非聚集索引是建立在堆或聚集索引之上的二级索引，它按其他列组织数据，然后引用聚集索引（或堆）以检索额外信息。下面简要描述了每种索引类型及其意义。


    ### 堆表


    正如在图书馆类比中提到的，在“小小免费图书馆”中，可用的书籍经常变化；通常只有一两排短书架的书。在这些情况下，拥有者不会花时间在`杜威十进系统`下整理书籍。相反，书籍在获取时就被放置在书架上。在这种情况下，图书馆中书籍的存储没有顺序。默认情况下，这就是`SQL
    Server`在表中存储数据的方式。没有明确定义的顺序系统，数据会存储在一个称为`堆`的无序结构中。


    在`堆`中，添加的第一行是表中的第一条记录，第二行是表中的第二条记录，第三行是表中的第三条记录，依此类推。`堆`是一个没有在数据上定义显式顺序的表。


    当创建表时没有指定任何聚集索引，其存储结构就称为`堆`。行按照添加的顺序插入到表中。需要通过扫描表中的所有行来读取行，以找到满足查询所需的行。


    可以向表添加聚集索引以强制数据排序并移除其作为`堆`的状态。内存优化表不存储为堆，将在第 8 章中更详细地讨论。


    > 注意

    >

    > 许多人不认为堆是索引。在本文的讨论背景下，它们将被视为索引，因为它们有助于确定数据的位置以及查询将如何访问数据。


    ### 聚集索引


    在图书馆类比中，`杜威十进系统`被用来为图书馆中的所有书籍分配一个编号。这个编号允许对书籍进行排序，并确定一本书在图书馆中的位置。书的**主题**，而非其添加时间，决定了书的位置。这个系统定义了书籍在图书馆中的物理存储方式，并且是查找书籍的主要方法。在表中，提供此功能的索引称为`聚集索引`。


    在`聚集索引`中，选择一个或多个列作为索引的`键列`。`键列`用于排序并确定数据在表中的存储位置。图书馆根据书籍的`杜威十进`编号将书放在书架上，而`聚集索引`则根据索引`键列`的顺序来确定表中行的位置。


    用作`聚集索引`的`键列`是根据访问表记录最频繁的方法来选择的。在一个包含州和省的表中，查找表中行的最常见方法很可能是通过其缩写。在该场景中，使用州/省缩写作为`聚集索引`的`键列`将是一个明智的选择。通常，表中的主键列也将用作`聚集索引`的`键列`。这不是必需的，偶尔会有理由为主键和聚集索引使用不同的列。


    与堆表一样，聚集索引决定了数据在表中的存储位置。在`聚集索引`中，非键列与`键列`一起存储。这相当于`聚集索引`决定了表本身的布局。


    因为它定义了表的基本组织结构，所以任何表上一次只能有一个`聚集索引`。

    '
- fmt: '### Non-clustered Indexes


    In the library analogy, the Dewey Decimal System was the clustered index that
    defined order within the bookshelves based on the subject of each book. Despite
    the usefulness of that system, visitors often want to search for books using other
    criteria, such as author, title, or age level. If the book’s subject matter is
    not known, then the Dewey Decimal System provides no help in locating it.


    `Libraries` solve this problem with computers and card catalogs. These provide
    a place where books can be cross-referenced using other common details, such as
    author or title. These solutions are analogous to `non-clustered indexes` within
    a database.


    Note


    Because heaps provide no data order, `non-clustered indexes` are generally created
    against `clustered indexes` and not on top of heaps.


    `Non-clustered indexes` are secondary indexes that are created on top of an existing
    `clustered index` (or heap). In a `non-clustered index`, columns are selected
    and sorted based on their values. These columns contain a reference to the heap
    or `clustered index` location of the data they reference. This is similar to how
    a card catalog works in a library. The order of books on the shelves is static,
    but additional shortcuts are created so that they can be quickly located using
    other search criteria.


    For example, a table containing states and provinces that is ordered by the state
    name may also contain their country, language, or other details. There are many
    legitimate reasons to search this table based on those other criteria, and a `non-clustered
    index` allows a lengthy territory list to be searched quickly based on other details
    besides the state abbreviation or name.


    Unlike `clustered indexes` and heaps, a table may contain many `non-clustered
    indexes`. While there can technically be as many as 999 `non-clustered indexes`
    defined on a table, it would be challenging to concoct a practical example of
    a table with hundreds of indexes on it. Multiple `non-clustered indexes` allow
    data to be searched in multiple ways, in addition to the `clustered index`. While
    a table can contain many indexes, each one should service a legitimate use case.
    Indexes require storage and maintenance, and therefore creating too many can be
    an unnecessary burden on `SQL Server`.


    ## Other Index Types


    Within the realm of `clustered indexes`, `non-clustered indexes`, and heaps are
    a wide variety of index types, each of which assists in searching for different
    types of data. The library card catalog example thus far focused on the experience
    of a visitor searching for a book, but there are many other scenarios that would
    require different organizational structures in order to resolve.


    Consider the following library information requests:


    *   Report on counts of books by subject across all libraries.

    *   Search for specific text across all books in a library.

    *   Map out the geographic origin of all books in a library.


    While quite useful, a card catalog would not be capable of solving these problems.
    The same is true in `SQL Server`, and therefore a variety of indexes exist to
    solve different data access needs. The following are brief overviews of different
    index types. Later chapters in this book will provide details on their function
    and use.


    ### Columnstore Indexes


    The details associated with a library book, whether stored in a card catalog or
    a computer, are all stored together. A single entry contains everything you ever
    wanted to know about a book. This is effective when the goal is to find a single
    book or a small set of books.


    When trying to understand books at a higher level, this system stops being efficient.
    For example, consider a librarian who would like to count how many books exist
    in a library per subject. Looking up books one at a time would be slow. Even an
    automated process would be sluggish as it would need to sort through all data
    on all books in order to retrieve their subjects and increment the overall counts.


    Solving this challenge would require an alternate way of storing data that maintains
    a list of subjects that contains some basic statistics and links to all books
    within each subject. This solution is analogous to `columnstore indexes`, which
    create a structure that organizes data by column, rather than by row.


    In a `columnstore index`, rows are grouped together and each column’s data compressed
    and stored separately. In a structure like this, queries that require data for
    few columns across many rows can perform efficiently as there is no longer a need
    to read all details of each row. `Columnstore indexes` exist as a solution to
    analytic data requests and assist in reporting, analytics, and data science.


    For the remainder of this book, indexes will be classified as `rowstore` or `columnstore`,
    when applicable. `Rowstore indexes` store all details of a row together sequentially.
    `Rowstore indexes` are ideal for transactional data processing, as is typically
    seen in the day-to-day use of software applications. `Columnstore indexes` are
    built for analytic data processing, which is typically seen in data warehouses,
    reporting, and projects involving data science and machine learning.


    The benefit of this type of index is that only the columns and rows required for
    a query need to be read. In data warehousing scenarios, often less than 15 percent
    of the columns in an index are needed for the results of a query.^([¹](#fn1))


    `Columnstore indexes` may be `clustered` or `non-clustered`. `Clustered columnstore
    indexes` are unordered and include every column in the table. In this case, the
    `columnstore index` becomes the fundamental storage structure for a table. `Non-clustered
    columnstore indexes` target specific columns in a table and will allow for analytics
    to occur over any columns in that index. They are ordered by the underlying order
    of the `clustered rowstore index`.


    `Columnstore indexes` tend to compress very effectively. This is because values
    for a single column will be far more repetitive than values across many different
    columns. Therefore, `columnstore compression` will generally see compression ratios
    that are far greater than standard row or page compression. Consuming less storage
    means that less memory is required when executing queries, ultimately leading
    to faster results.


    Because of their structure, `columnstore indexes` provide significant value for
    data warehousing and other analytic solutions. `Columnstore indexes` will be discussed
    in greater detail later in this book.'
