    第二种场景的另一个区别是创建了 XML 报告文件。该会话对 `–rl` 参数使用了 `ALL` 选项，这包含了表 12-5 中为该参数列出的所有报告。这些报告提供了有关已调优的语句、与语句相关的成本、建议所提供的改进幅度等信息（图
    12-9）。通过这些报告，可以获得决定将哪些建议应用到数据库所需的所有信息。


    ![](img/338675_4_En_12_Fig9_HTML.png)


    一份包含 41 行文本的报告输出，列出了诸如语句成本、事件权重和分析报告下的语句详情等报告。以下是 Adventure Works 2017 下的各种条目。


    图 12-9


    `DTA` 实用程序的示例报告输出


    关于最后两个场景需要记住的一点是，被调优的表和查询是在一个孤立的环境中进行的。表上没有需要考虑的约束或外键关系。在现实世界中，数据库的设计不会是这样，外键关系会影响建议的提供方式。此外，这些场景的负载仅包含两个查询。在构建测试工作负载时，请务必使用能代表环境及其典型查询的样本。


    通过本节提供的 `DTA` 场景，我们为使用索引调优活动的工具奠定了基础。`DTA` 不仅可以识别缺失的索引，而且在给定工作负载的情况下，它还可以帮助确定聚集索引和分区可以在哪些方面辅助性能。当需要快速解决数据库中的性能问题时，`DTA`
    可以提供的物理更改可能极其有用：


    [自动调优 - SQL Server | Microsoft Learn](https://docs.microsoft.com/en-us/sql/relational-databases/automatic-tuning/automatic-tuning%253Fview%253Dsql-server-ver16)


    [启用自动调优 - Azure SQL 数据库 | Microsoft Learn](https://docs.microsoft.com/en-us/azure/azure-sql/database/automatic-tuning-enable%253Fview%253Dazuresql)


    ## 总结


    本章介绍了如何使用 SQL Server 中内置的索引工具。这些工具中的每一个都可以成为你 SQL Server 工具箱的绝佳补充。它们允许快速、高效地做出明智的索引决策，而无需耗费大量的时间和资源。


    关于缺失索引 DMO，索引建议是基于 SQL Server 实例上的现有活动。这些都是真实世界的应用，代表了可以快速、有效地在生产环境中识别、测试和实施性能改进的领域。


    `DTA` 虽然不像缺失索引 DMO 那样容易获取，但它允许以最小的努力对从单个查询到完整工作负载的索引进行调优。调优计划缓存内容的选项允许利用环境中当前正在执行的工作来构建建议，而无需创建测试工作负载。


    # 13. 索引策略


    为数据库建立索引通常被认为是一门艺术，数据库是画布，索引是颜料，共同构成了存储和性能的美丽挂毯。这里添一点色彩，那里加一抹色调，画作便逐渐成形。同样地，在表上建立一个聚集索引，然后再添加几个非聚集索引，就能带来如杰作般出色且极快的性能。索引做得过于抽象或极简可能感觉不错，但由此产生的性能会提醒你，这可能并不实用。


    尽管这个类比色彩丰富，但在设计和应用索引背后，科学多于艺术。仅仅因为几个列可能组合得很好就将它们拉到一起构建索引，其效益往往不如基于成熟模式构建的索引。那些基于久经考验的实践的索引通常是最佳的解决方案。在本章中，将讨论几种常见的索引模式，以帮助识别潜在有用的索引。


    ## 堆表


    在数据库中使用堆表的有效案例很少。对于大多数 DBA 来说，经验法则是数据库中的所有表都应使用聚集索引构建，而不是堆表。虽然这种做法在大多数情况下是正确的，但也存在一些孤立的用例，其中使用堆表是可接受且首选的。本节将探讨其中一个场景，并对其他场景进行概括性讨论。之所以概括，是因为很难对何时使用堆表代替聚集索引做出一概而论的陈述（本节稍后将进行更多解释）。

    '
- fmt: '### Temporary Objects


    堆最适用的场景之一是临时对象，例如临时表和表变量。使用这些对象时，往往在创建时并未考虑为其构建聚集索引。结果就是，临时对象经常被用作堆。


    回想一下你上次创建表变量或临时表的场景。创建对象的语法是否明确创建了`CLUSTERED`索引或具有默认配置的`PRIMARY KEY`？如果没有，那么该临时对象就是作为堆创建的。这本身并不是问题。这在大多数工作负载中很常见，尽管不一定需要改变编码习惯。正如本节后续示例将演示的，使用堆和聚集索引的临时对象在性能上可能没有实质区别。


    本例将介绍一个临时表的简单用例。示例使用`Sales.SalesOrderHeader`表，根据`SalesPersonID`检索若干行。然后将这些行插入一个临时表。该临时表将用于返回所有与临时表中结果匹配的`Sales.SalesOrderDetail`行。将使用两个版本的示例来演示在临时表上使用堆或聚集索引是否改变查询执行计划。


    在第一个示例版本（如清单[13-1](#338675_4_En_13_Chapter.xhtml#PC1)所示）中，临时表使用堆构建。这是创建临时对象最常用的方法。如图[13-1](#338675_4_En_13_Chapter.xhtml#Fig1)中的执行计划所示，当访问临时表（由箭头标识）时，使用表扫描来访问对象中的行。对于堆，此行为是预期的。由于行未排序，无法在不先检查所有行的情况下访问特定行。为了在`Sales.SalesOrderDetail`中找到与临时表中匹配的所有行，执行计划使用了带有索引查找的嵌套循环。


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig1_HTML.png)


    **Figure 13-1**

    堆临时对象的执行计划


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    ```

    **Listing 13-1**

    使用堆的临时对象


    在脚本的第二个版本（如清单[13-2](#338675_4_En_13_Chapter.xhtml#PC2)所示）中，临时表改为在`SalesOrderID`列上创建聚集索引。该索引是两个脚本之间的唯一区别。此差异导致执行计划略有变化。图[13-2](#338675_4_En_13_Chapter.xhtml#Fig2)显示了聚集索引版本的执行计划。两个计划的区别在于，临时表上的操作从表扫描变成了聚集索引扫描。虽然操作不同，但两者完成的工作本质上是相同的。在查询执行期间，访问临时对象中的所有行，并将它们与`Sales.SalesOrderDetail`中的行进行连接。


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig2_HTML.png)


    **Figure 13-2**

    聚集索引临时对象的执行计划


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    ```

    **Listing 13-2**

    使用聚集索引的临时对象


    > **Note**

    > 自 SQL Server 2014 起，表变量可以同时拥有聚集和非聚集索引。要求是在声明变量时创建索引。表变量定义后不允许进行 DDL 操作。


    在本节示例类似的查询中，使用堆和聚集索引的临时表的执行计划几乎相同。如同所有规则，也可能存在性能不同的例外情况。一个使用堆可能影响性能的好例子是任何利用其执行中排序的
    T-SQL 语法。清单[13-3](#338675_4_En_13_Chapter.xhtml#PC3)显示了一个在`WHERE`子句中使用`EXISTS`的具体示例。图[13-3](#338675_4_En_13_Chapter.xhtml#Fig3)显示了该查询的执行计划。在解决`EXISTS`谓词的嵌套循环连接之前，数据必须先排序。在这种情况下，堆的使用阻碍了查询性能，因为堆表强制了排序操作。


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig3_HTML.png)


    **Figure 13-3**

    `EXISTS` 示例执行计划


    对于小数据集，性能差异可能可以忽略。随着数据集大小的增加，看似微小的变化（例如包含排序操作）可能会降低这些查询的性能。


    ```

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    ```

    **Listing 13-3**

    `EXISTS` 示例'
  raw: '### Temporary Objects


    One of the situations in which heaps are most useful is with temporary objects,
    such as temporary tables and table variables. When these objects are used, they
    are often created without considering building a clustered index on them. The
    result is that heaps are often used for temporary tables.


    Consider for a moment the last time you created a table variable or a temporary
    table. Did the syntax for the object specifically create a `CLUSTERED` index or
    a `PRIMARY KEY` with the default configuration? If not, then the temporary object
    was created as a heap. This is in no way a problem. It is common in most workloads,
    though not necessarily a reason to change coding practices. As will be demonstrated
    in the examples in this section, the performance difference between a temporary
    object with a heap and a clustered index can be immaterial.


    For this example, a simple use case for a temporary table will be introduced.
    The example uses the table `Sales.SalesOrderHeader` from which a few rows will
    be retrieved based on a `SalesPersonID`. Those rows will then be inserted into
    a temporary table. The temporary table will be used to return all rows from `Sales.SalesOrderDetail`
    that match the results in the temporary table. Two versions of the example will
    be used to demonstrate how using a heap or a clustered index on the temporary
    table does not change the query execution.


    In the first version of the example, shown in Listing [13-1](#338675_4_En_13_Chapter.xhtml#PC1),
    the temporary table is built using a heap. This is the method that is most often
    used to create temporary objects. As the execution plan in Figure [13-1](#338675_4_En_13_Chapter.xhtml#Fig1)
    shows, when the temporary table is accessed, as identified by the arrow, a table
    scan is used to access the rows in the object. This behavior is expected with
    a heap. Since the rows aren’t ordered, there is no way to access specific rows
    without checking all the rows first. To find all the rows in `Sales.SalesOrderDetail`
    that match those in the temporary table, the execution plan uses a nested loop
    with an index seek.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig1_HTML.png)


    A code of text for query 1 with query cost, relative to the batch, at 100%. Below
    is a flow diagram representing the paths to select at 0% cost from table scan,
    temporary with heap, at 1% cost and clustered index seek, clustered, sales order
    detail, at 99% cost.


    Figure 13-1


    Execution plan for a heap temporary object


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    Listing 13-1

    Temporary Object with a Heap

    ```


    In the second version of the script, shown in Listing [13-2](#338675_4_En_13_Chapter.xhtml#PC2),
    the temporary table is created instead with a clustered index on the `SalesOrderID`
    column. The index is the only difference between the two scripts. This difference
    results in a slight change in the execution plan. Figure [13-2](#338675_4_En_13_Chapter.xhtml#Fig2)
    shows the clustered index version of the execution plan. The difference between
    the two plans is that instead of a table scan, there is a clustered index scan
    against the temporary table. While these are different operations, the work done
    by both is essentially the same. During query execution, all rows in the temporary
    object are accessed while joining them to rows in `Sales.SalesOrderDetail`.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig2_HTML.png)


    A code 2 lines of text for query 1 with query cost, relative to the batch, at
    100%. Below is a flow diagram exhibiting the paths to select at 0% cost from clustered
    index scan, clustered, temporary with clustered 9, at 1% cost and clustered index
    seek, clustered, sales order detail, at 99% cost.


    Figure 13-2


    Execution plan for a clustered temporary object


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    Listing 13-2

    Temporary Object with a Clustered Index

    ```


    Note


    Since SQL Server 2014, table variables can have both clustered and non-clustered
    indexes on them. The requirement is that the indexes are created when the variable
    is declared. DDL operations are not allowed on table variables after they are
    defined.


    In queries similar to the example in this section, the execution plans for temporary
    tables with heaps and clustered indexes are nearly the same. As with all rules,
    there may be exceptions where performance will differ. A good example of when
    using a heap can affect performance is any T-SQL syntax that leverages a sort
    in its execution. Listing [13-3](#338675_4_En_13_Chapter.xhtml#PC3) shows a specific
    example using `EXISTS` in the `WHERE` clause. Figure [13-3](#338675_4_En_13_Chapter.xhtml#Fig3)
    shows the execution plan for the query. Before the nested loop joins to resolve
    the `EXISTS` predicate, the data must first be sorted. In this case, the use of
    a heap has hindered the performance of the query because the heap table forces
    a sort operation.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig3_HTML.png)


    A code of 2 lines of text each for queries 1 and 2 with query cost, relative to
    the batch, at 51% and 49%, respectively. Each has a flow diagram exhibiting the
    paths to their own select at 0% cost from table scan at 1% cost via sort at 2%
    cost and clustered index seek at 97% and clustered index scan at 1% cost and clustered
    index seek at 99% cost.


    Figure 13-3


    EXISTS example execution plan


    With small datasets, the performance difference may be negligible. As the size
    of the dataset increases, seemingly minor changes such as the inclusion of a sort
    operation can reduce the performance of those queries.


    ```

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    Listing 13-3

    EXISTS Example

    ```'
  trans: '

    ### 临时对象


    堆（Heap）最适用的场景之一是临时对象，例如临时表和表变量。使用这些对象时，往往在创建时并未考虑为其构建聚集索引。结果就是，临时对象经常被用作堆。


    回想一下你上次创建表变量或临时表的场景。创建对象的语法是否明确创建了`CLUSTERED`索引或具有默认配置的`PRIMARY KEY`？如果没有，那么该临时对象就是作为堆创建的。这本身并不是问题。这在大多数工作负载中很常见，尽管不一定需要改变编码习惯。正如本节后续示例将演示的，使用堆和聚集索引的临时对象在性能上可能没有实质区别。


    本例将介绍一个临时表的简单用例。示例使用`Sales.SalesOrderHeader`表，根据`SalesPersonID`检索若干行。然后将这些行插入一个临时表。该临时表将用于返回所有与临时表中结果匹配的`Sales.SalesOrderDetail`行。将使用两个版本的示例来演示在临时表上使用堆或聚集索引是否改变查询执行计划。


    在第一个示例版本（如清单 13-1 所示）中，临时表使用堆构建。这是创建临时对象最常用的方法。如图 13-1 中的执行计划所示，当访问临时表（由箭头标识）时，使用表扫描来访问对象中的行。对于堆，此行为是预期的。由于行未排序，无法在不先检查所有行的情况下访问特定行。为了在`Sales.SalesOrderDetail`中找到与临时表中匹配的所有行，执行计划使用了带有索引查找的嵌套循环。


    ![](img/338675_4_En_13_Fig1_HTML.png)


    **图 13-1**

    堆临时对象的执行计划


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithHeap'') IS NOT NULL

    DROP TABLE ##TempWithHeap

    CREATE TABLE ##TempWithHeap

    (

    SalesOrderID INT

    );

    INSERT INTO ##TempWithHeap

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283;

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithHeap t ON t.SalesOrderID = sod.SalesOrderID;

    GO

    ```

    **清单 13-1**

    使用堆的临时对象


    在脚本的第二个版本（如清单 13-2 所示）中，临时表改为在`SalesOrderID`列上创建聚集索引。该索引是两个脚本之间的唯一区别。此差异导致执行计划略有变化。图
    13-2 显示了聚集索引版本的执行计划。两个计划的区别在于，临时表上的操作从表扫描变成了聚集索引扫描。虽然操作不同，但两者完成的工作本质上是相同的。在查询执行期间，访问临时对象中的所有行，并将它们与`Sales.SalesOrderDetail`中的行进行连接。


    ![](img/338675_4_En_13_Fig2_HTML.png)


    **图 13-2**

    聚集索引临时对象的执行计划


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''tempdb..##TempWithClusteredIX'') IS NOT NULL

    DROP TABLE ##TempWithClusteredIX

    CREATE TABLE ##TempWithClusteredIX

    (

    SalesOrderID INT PRIMARY KEY CLUSTERED

    )

    INSERT INTO ##TempWithClusteredIX

    SELECT SalesOrderID

    FROM Sales.SalesOrderHeader

    WHERE SalesPersonID = 283

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    INNER JOIN ##TempWithClusteredIX t ON t.SalesOrderID = sod.SalesOrderID

    GO

    ```

    **清单 13-2**

    使用聚集索引的临时对象


    > **注意**

    > 自 SQL Server 2014 起，表变量可以同时拥有聚集和非聚集索引。要求是在声明变量时创建索引。表变量定义后不允许进行 DDL 操作。


    在本节示例类似的查询中，使用堆和聚集索引的临时表的执行计划几乎相同。如同所有规则，也可能存在性能不同的例外情况。一个使用堆可能影响性能的好例子是任何利用其执行中排序的
    T-SQL 语法。清单 13-3 显示了一个在`WHERE`子句中使用`EXISTS`的具体示例。图 13-3 显示了该查询的执行计划。在解决`EXISTS`谓词的嵌套循环连接之前，数据必须先排序。在这种情况下，堆的使用阻碍了查询性能，因为堆表强制了排序操作。


    ![](img/338675_4_En_13_Fig3_HTML.png)


    **图 13-3**

    `EXISTS` 示例执行计划


    对于小数据集，性能差异可能可以忽略。随着数据集大小的增加，看似微小的变化（例如包含排序操作）可能会降低这些查询的性能。


    ```

    USE AdventureWorks2017

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithHeap t WHERE t.SalesOrderID = sod.SalesOrderID);

    GO

    SELECT sod.* FROM Sales.SalesOrderDetail sod

    WHERE EXISTS (SELECT * FROM ##TempWithClusteredIX t WHERE t.SalesOrderID = sod.SalesOrderID);

    ```

    **清单 13-3**

    `EXISTS` 示例

    '
- fmt: '### Other Heap Scenarios


    Generally, the other scenarios where using heaps makes sense are few and far between.
    The reason using temporary objects makes sense is because of the low frequency
    in which the data will be accessed compared with the amount of time it will take
    to create an organized structure, such as a clustered index, to support the performance.
    This scenario can also carry over the staging tables, since the data may be inserted
    and modified multiple times before being moved to its final destination.


    In high-insert environments, it might seem to make sense to use heaps to avoid
    the overhead of maintaining the B-tree. The trouble with this scenario is that
    the gains on inserts are offset by the need to access the data, which requires
    other non-clustered indexes, which then have sort orders to maintain.


    When confronted with a situation for using heaps on any tables, first consider
    whether clustered indexes can be proven to be a burden on the storage of the data
    before using them. Before looking to the heap, also consider whether newer indexing
    structures such as clustered columnstore indexes or memory-optimized tables provide
    the performance required. Lastly, ensure that the performance gains of a given
    change are meaningful. Researching, testing, and implementing an indexing change
    that results in a 1 percent improvement will only on very rare occasions be worthwhile.


    The main point of this section is to emphasize that heaps are used more often
    in the real world than is often realized. While most best practices rail against
    their use, there are some situations where they are a good fit and others where
    it does not matter whether they are there or not. As the discussion moves into
    clustered indexes, it will become clear why it is usually a good idea to default
    to clustered indexes and use heaps only in situations where either it won’t matter,
    such as most use cases with temporary objects, or where they outperform clustered
    indexes.


    ## Clustered Indexes


    Throughout this book, the value of and preference for using a clustered index
    as the structure for organizing the data pages of a table has been discussed.
    Clustered indexes organize the data in their tables based on their key columns.
    All the data pages for the index are stored logically according to the key columns.
    The benefit of this is optimal access to the data through the key columns.


    New tables should almost always be built with clustered indexes. The question,
    though, when building the tables is what should be selected for the key columns
    in the clustered index. There are a few characteristics that are most often attributed
    to well-defined clustered indexes. These characteristics are:


    *   Static

    *   Narrow

    *   Unique

    *   Ever-increasing


    There are a number of reasons that each of these attributes helps create effective
    clustered indexes.


    ### Static


    First, a clustered index should be static. The key columns defined for the clustered
    index should be expected to be static for the lifetime of the row. By using a
    static value, the position of the row in the index will not change when the row
    is updated. When non-static key columns are used, the position of the row in the
    clustered index can change, which may require the row to be inserted on a different
    page. Also, all non-clustered indexes would need to be modified to change the
    key columns’ values stored in those indexes, since clustered index key columns
    are included in non-clustered indexes. Together, these issues lead to the potential
    for extensive fragmentation in the clustered and non-clustered indexes on a table.


    ### Narrow


    The next attribute that a clustered index should have is that it is narrow. Ideally,
    there should be only a single column for the clustered index key. This column
    should be defined with the smallest data type reasonable for the data being stored
    in that table. Narrow clustered indexes are important because the clustered index
    key for every row is included in all non-clustered indexes associated with the
    table. The wider the clustered index key, the wider all non-clustered indexes
    will be, and the more pages they will require. As discussed in other sections,
    the more pages in an index, the more resources are required to use it. This can
    affect query performance on that table.


    ### Unique


    Clustered indexes should also be unique. Clustered indexes store a single row
    in a specific location in the index; for duplicate rows within the key columns
    of a clustered index, a uniquifier needs to provide the uniqueness required for
    the row. When the uniquifier is added to a row, it is extended by 4 bytes, which
    changes how narrow the clustered index is and results in the same concerns that
    are associated with a non-narrow clustered index. More information about the uniquifier
    can be found in Chapter 2.


    ### Ever-increasing


    Lastly, a well-defined clustered index will be based on an ever-increasing value.
    Using an ever-increasing clustered key causes new rows to be added to the end
    of the clustered index. Placing new rows at the end of the B-tree reduces the
    fragmentation that would likely occur if the rows were inserted in the middle
    of the clustered index.


    ### Access Path


    One additional consideration when selecting the clustered index key columns is
    that they represent the columns that will frequently be used to access rows. Are
    there specific columns or values that will most often be used to retrieve rows
    from the table? If so, these columns are good candidates for the clustering index
    key. Ultimately, queries against the table will perform best when they can access
    data through the path of least resistance. Similarly, write operations will be
    most efficient and least intrusive when rows can be quickly written to the end
    of the index without the need to perform additional background tasks on the fly.


    ## Clustered Index Patterns


    While considering the previous guidelines for selecting clustered index strategies,
    there are a number of patterns that can be used to identify and model clustered
    indexes. The clustered index patterns are:


    *   Identity Sequence

    *   Natural Key

    *   Foreign Key

    *   Multiple Column

    *   Globally Unique Identifier


    In the rest of this section, each of these patterns will be walked through, describing
    each and how to identify when to utilize the pattern.'
