  trans: '

    # 列存储结构


    列存储结构专门用于聚集和非聚集列存储索引类型。列存储结构与传统的行式存储和索引数据方法不同，它采用列式格式。这意味着，列数据不是按行顺序存储每一列的值，而是将列数据分组在一起，并独立于表中其他列的数据进行存储。例如，在图
    2-11 的示例中，没有将四行数据依次存储在一页上，而是存储了三个列“组”。


    ![](img/338675_4_En_2_Fig11_HTML.png)


    一张示意图，展示了两个折角文件图标。每个图标分别有 C 1 到 C 3 项（对应行 1 到 4）以及 R 1 到 R 4 项（对应列 1 到 3）作为各自的记录。在第一个图标的后面和第二个图标的左侧可以看到一个向右的箭头。


    **图 2-11** 行式存储与列式存储


    列存储结构的物理实现并未引入任何新的页面类型，完全依赖于现有页面类型。一个列存储始于一个 `IAM` 页面，如图 2-12 所示。从 `IAM` 页面延伸出包含列存储信息的
    `LOB` 页面。对于存储在列存储中的每一列，都有一个或多个 `segment`。`segment` 包含其所代表列的最多约一百万行数据。一个 `LOB`
    页面可以包含一个或多个 `segment`，并且 `segment` 可以跨多个 `LOB` 页面。


    ![](img/338675_4_En_2_Fig12_HTML.jpg)


    一个分支图，展示了一个标有 I A M 的折角文件图标下方有三个带标签的折角图标。每个图标的头部都标为 L O B 页面，其中第一个和第三个图标的两侧各有
    2 个独立的段标签块作为其记录，而第二个图标则只有一个段标签块。


    **图 2-12** 列存储结构


    在每个 `segment` 内部，都有一个 `hash dictionary`，用于映射构成该列存储 `segment` 的数据。`hash dictionary`
    还包含 `segment` 中数据的最小值和最大值。此信息由 SQL Server 在查询执行期间用于在执行过程中排除 `segment`。


    列存储结构的优势之一是其能够利用压缩。由于列存储结构的每个 `segment` 包含相同类型的数据，SQL Server 有效压缩该数据的可能性更高。


    按列使用 `dictionary encoding` 将相似值压缩到字典中，然后索引对字典的引用。在每个 `segment` 内部，行会被重新排序（即通过
    `Vertipaq` 优化进行优化）。最后，使用类似于 `page compression` 的经典压缩算法来减少重复数据模式的大小。


    `row/page compression` 与列存储压缩之间有几个显著差异：


    1.  虽然 `row` 和 `page` 压缩对于行存储表是可选的，但 `columnstore index compression` 对于所有列存储索引都是必需的。

    2.  `Columnstore compression` 应用于每个可以跨多个页面的 `segment`，这不同于仅限于单个页面的 `page compression`。


    列存储的另一个优点是只返回从列存储请求的列。在堆和聚集 B 树索引中，一行中的每个列值存储在一起。这允许高效访问少量行中的多个列，但对于分析查询来说效率不高，因为分析查询模式通常请求少量列但多行列。列存储索引通过仅从磁盘读取请求的列（`segment`）并将该数据移入内存来解决此问题。因此，如果一个列存储表有二十列，但查询只需要三列，则其余列无需读入内存。


    还有一些特定于列存储索引的额外结构和过程值得简要概述。


    ## 最小日志记录大容量加载数据


    当在单次插入操作中向列存储索引插入超过 102,400 行时，将使用最小日志记录大容量加载过程来比标准插入操作更高效地插入行。这大大减少了写操作所需的计算量。大容量加载对于
    OLAP 表来说是理想的，因为写入通常由不频繁但大型的数据加载过程组成。


    虽然大容量加载无法完全检查插入操作的细节，但它允许插入操作执行得更快，并且使用时对事务日志的影响显著减小。因此，由于事务日志增长较小，事务日志备份也较小。


    ## Delta 存储


    写入列存储索引的代价很高，因为每次更改都需要解压 `segment`、写入更改，然后重新压缩那些 `segment`。当无法进行大容量加载时，写入操作将针对
    `deltastore` 中的 delta `rowgroup` 进行。这些是聚集 B 树，非常适合小批量的插入或更新操作。当从列存储索引读取数据时，`deltastore`
    的内容将与压缩的 `segment` 一起读取，并将结果无缝返回给 SQL Server。


    一个称为 `tuple-mover` 的异步系统进程将定期将 `deltastore` 中的行合并到压缩的 `segment` 中。虽然此过程是自动的且无需用户干预，但可以使用索引维护来影响其行为。


    ## 删除位图


    与需要 `deltastore` 来允许高效插入操作的原因相同，也必须有一种机制来确保删除操作不会导致不必要的等待、锁定或资源消耗。


    当从列存储索引中删除数据时，它会在一个称为 `delete bitmap` 的聚集 B 树结构中被标记为已删除。这种软删除的数据保留在列存储索引中，直到索引维护协助清理它。


    当从包含已删除行的列存储索引中读取数据时，`delete bitmap` 用于识别它们并将其从结果集中排除。


    # 索引特征


    本章第一部分讨论了用于存储索引的物理结构。这里并未明确定义可用索引类型与这些结构之间的清晰界限。本节将讨论 SQL Server 的主要索引类型，以及它们使用的索引结构。对于每种类型，将提供与索引相关的要求和限制。


    ## 堆


    要讨论的第一种索引类型是堆。堆实际上不是一种索引类型。它更像是表上缺乏聚集索引的结果。堆，顾名思义，将使用堆结构来组织表中的页面。


    创建具有堆的表只有一个要求：表上尚未创建聚集索引。如果存在聚集索引，则不会使用堆。堆和聚集索引是互斥的。只要没有聚集索引，一个表上只能有一个堆。堆用于存储索引的数据页，并且只执行一次。


    使用堆时的主要关注点是堆中的数据是无序的。没有列决定其页面上数据的排序顺序。其结果是，如果没有其他支持性的非聚集索引，查询将总是被迫扫描表中的信息。

    '
- fmt: '### Clustered Index


    The second index type is the clustered index. Clustered indexes utilize a B-tree
    for storing data. For all practical purposes, a clustered index is the opposite
    of a heap. When a clustered index is built on a table, the heap is replaced with
    a B-tree structure, organizing the pages according to the key columns of the clustered
    index. The B-tree for a clustered index includes data pages with all data for
    the rows in the table.


    Clustered indexes have a few restrictions when considering the columns for the
    index. The first restriction is that the total length for the key columns cannot
    exceed 900 bytes. Second, the clustering key in a clustered index should be unique.
    If columns in a clustering key are not unique, SQL Server will add a hidden uniquifier
    column to the row when it is stored. The uniquifier is a 4-byte numeric value
    that is added to nonunique clustering keys to enforce uniqueness. The uniquifier
    size is not considered part of the 900-byte limit. While a clustered index key
    does not need to be unique, it will benefit from uniqueness in being able to forgo
    the resources required by the added uniquifier.


    There can be only a single clustered index per table. Since the clustered index
    is stored in the order of the clustering key and the data in the row is stored
    with the key, there can’t be an alternative sort on top of the table in some other
    order. When building a clustered index on an existing table with a heap, be sure
    to have enough space available for a second copy of the data. Until the build
    of the index is complete, both copies of the data will exist.


    As will be discussed in later chapters, it is often preferable to create clustered
    indexes on all tables. This preference is not an absolute, and there are rare
    situations when clustered indexes are not appropriate. While research is required
    to determine which structure is best, choosing to use a clustered index by default
    (instead of a heap) will be correct in nearly all use cases. Those scenarios where
    a heap is preferable are exceptions and should be handled on a case-by-case basis.


    ### Non-clustered Index


    Non-clustered indexes are similar to clustered indexes. They use the B-tree structure
    for storing data. The key columns are limited to 1,700 bytes for SQL Server 2016
    and later and 900 bytes for all previous SQL Server versions.


    Beyond the similarities to clustered indexes, there are some differences. First,
    there can be more than one non-clustered index on a table. There can be up to
    999 non-clustered indexes on a table, each with no more than 16 columns. While
    the limit for non-clustered indexes is quite large, it is generally a best practice
    to only create indexes as needed and not to maintain unused or underused indexes
    as they consume memory and storage resources. In addition, write operations take
    longer as the number of indexes on a table increases as a write operation cannot
    complete until all indexes have been updated.


    Instead of having a leaf level where data is stored in the B-tree, non-clustered
    indexes have page references to the locations in either the heap or clustered
    index on the table where the data is located. The process needed to retrieve columns
    from the clustered index that are not located within the non-clustered index is
    called a key lookup.


    ### Columnstore Index


    Columnstore indexes use the columnstore structure, as the name implies, and can
    be either clustered or non-clustered.


    Some restrictions need to be considered with both types of columnstore indexes.
    The first is that not all data types are available to be used in columnstore indexes.
    The restricted data type list has shrunk in size as new versions of SQL Server
    are released. The following list outlines which data types are not allowed in
    clustered columnstore indexes, by version:


    *All versions (through SQL Server 2022)*: `ntext`, `text`, `image`, `rowversion`,
    `timestamp`, `sql_variant`, `hierarchyid`, `spatial`, `XML`


    *SQL Server 2016 and earlier*: `nvarchar(max)`, `varchar(max)`, `varbinary(max)`


    *SQL Server 2012*: `uniqueidentifier`


    Note that non-clustered columnstore indexes allow the same data types with only
    one important exception: `varchar(max)`, `nvarchar(max)`, and `varbinary(max)`
    are not allowed in any version of SQL Server.


    Columnstore indexes are limited to 1,024 columns. This means that a columnstore
    index cannot be created on a table with more than 1,024 columns. Due to columnstore
    indexes not enforcing data order, they cannot be unique or ordered or contain
    included columns. There can only be one columnstore index per table. This limitation
    is not problematic as clustered columnstore indexes automatically include all
    columns and non-clustered columnstore indexes may contain as many (or few) columns
    as are needed to satisfy their use case.


    For tables that contain many years’ worth of data, partitioning can be a valuable
    way to allow for old data to be easily moved out of the table via partition switching
    or partition truncation.


    When using columnstore indexes, there are some features within SQL Server that
    they cannot be combined with. Since columnstore uses its own compression technology,
    it cannot be combined with row or page compression. Replication and filestream
    may also not be used with columnstore indexes. Computed columns are not allowed
    in columnstore indexes prior to SQL Server 2017\. In SQL Server 2017 and later,
    a clustered columnstore index can contain non-persisted computed columns only.
    Persisted computed columns are not allowed on columnstore indexes, and computed
    columns are not permitted in non-clustered columnstore indexes.


    Lastly, SQL Server 2014 introduced writable clustered columnstore indexes. Non-clustered
    columnstore indexes were still read-only in this version. As a result, there were
    a variety of restrictions that were specific to SQL Server 2014 that are worth
    listing, in case this version is used:


    *   Change tracking cannot be combined with columnstore indexes.

    *   Change data capture cannot be combined with columnstore indexes. SQL Server
    2016 and later allow it with non-clustered columnstore indexes only.

    *   A clustered columnstore index is not accessible in a readable secondary in
    an AlwaysOn Availability Group.

    *   Multiple Active Result Sets (MARS).

    *   Non-clustered columnstore indexes cannot be created on views.


    Note that these restrictions only apply to SQL Server 2014.


    ## Summary


    In this chapter, the components that are used as the building blocks for indexes
    were discussed in detail. This provides the foundation necessary to create indexes
    with predictable behavior.


    This discussion included a detailed look at the different types of pages that
    SQL Server uses to store data in the database and how these pages are arranged
    together into extents. The structures used for organizing pages into logical storage
    were detailed as well as the basics for how each index type is organized in SQL
    Server.


    # 3. Examining Index Contents


    With an understanding of how indexes are stored at the physical and logical levels,
    a deeper view of index storage can be gained by more closely viewing the details
    and contents of an index.


    This deep dive will cross into a set of commands that are rarely used as part
    of day-to-day work and therefore will provide content that is both challenging
    and interesting to learn and test.


    **Warning**


    The tools used in this section are undocumented and unsupported. They do not appear
    in Books Online, and their functionality can change without notice. These tools
    have been around for a long time, and there are many blog posts that describe
    their behavior. When using older versions of SQL Server, it is important to understand
    these tools, since some dynamic management functions (DMFs) may not be available.
    Always test these tools on nonproduction data first and be sure to back up important
    data prior to testing.'
