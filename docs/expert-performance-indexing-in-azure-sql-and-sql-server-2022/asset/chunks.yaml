    通过本节的两个用例，我们可以看到外键模式如何优于身份列模式。然而，在数据库中实现此模式之前需要考虑一些事项。需要回答的主要问题是：行是否最常通过明细表的主键或其与头表的外键关系来检索。并非所有外键都适合此聚簇索引模式；仅当表之间存在头-明细关系时，它才有效。


    在使用外键模式时，对于明确定义的聚簇索引的属性有一些注意事项。关于窄键，此模式不如身份列模式窄。聚簇键由两个基于整数的列组成，而不是单个整数列。当使用 `int`
    数据类型时，这将使聚簇键的大小从 4 字节增加到 8 字节。虽然这不是一个非常大的值，但它会影响表上所有非聚簇索引的大小。在大多数情况下，外键模式下的聚簇键是静态的。某些明细行对应的头行可能偶尔需要更改，例如当两个订单被记录并需要合并运输时。因此，外键模式并非完全静态。键可以更改，但不应频繁更改。如果更改频繁，则应重新考虑使用此聚簇索引模式。最后一个具有注意事项的属性是聚簇键是否始终递增。通常，应该是这样。典型的插入模式是创建头记录和明细记录。在这种情况下，头行被顺序创建和插入，然后是其明细记录。如果写入明细记录有延迟，或者稍后向头行添加更多明细记录，键将不会始终递增。结果，可能会产生额外的碎片和与此聚簇索引模式相关的维护。


    ## 总结


    外键模式并非适用于大多数表的聚簇索引模式。然而，当适用时，它非常有益，可以缓解可能不如其他问题明显的性能问题。在设计聚簇索引时，考虑使用此模式并审查其相关的注意事项以确定是否适合非常重要。

    '
- fmt: '### Multiple Column


    接下来可用于设计聚集索引的模式是多列模式。在此模式中，两个或更多表与另一个表存在关系，从而允许信息之间存在多对多关系。例如，可能有一个存储员工信息的表和另一个包含职位角色的表。为了表示这种关系，会使用第三个表。通过多列模式，不再使用带有`IDENTITY`属性的新列，而是使用关系列本身作为聚集键。


    多列模式与外键模式相似，提供了与先前模式相同的性能增强。在多对多关系表中，通常有一个或另一个列是聚集键的最佳候选。与其他模式一样，此模式也遵循大多数定义良好的聚集索引的属性。该模式是唯一的，且大多是窄和静态的；随着多列模式示例的说明，这些属性将变得明显。


    为了演示多列模式，首先定义一些表及其关系。首先，有存储员工和职位角色信息的表，分别命名为`dbo.Employee`和`dbo.JobRole`。在示例关系中，使用名为`dbo.EmployeeJobRole_ICP`和`dbo.EmployeeJobRole_MCP`的表来表示标识列模式和多列模式（参见清单[13-9](#338675_4_En_13_Chapter.xhtml#PC9)）。示例脚本包含插入语句以提供一些要使用的示例数据。此外，还创建了表的非聚集索引以提供真实场景。


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Employee (

    EmployeeID int IDENTITY(1,1)

    ,EmployeeName varchar(100)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_Employee PRIMARY KEY CLUSTERED (EmployeeID));

    CREATE INDEX IX_Employee_EmployeeName ON dbo.Employee(EmployeeName);

    CREATE TABLE dbo.JobRole (

    JobRoleID int IDENTITY(1,1)

    ,RoleName varchar(25)

    ,FillerData varchar(200)

    ,CONSTRAINT PK_JobRole PRIMARY KEY CLUSTERED (JobRoleID));

    CREATE INDEX IX_JobRole_RoleName ON dbo.JobRole(RoleName);

    CREATE TABLE dbo.EmployeeJobRole_ICP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRole_ICP PRIMARY KEY CLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT UIX_EmployeeJobRole_ICP UNIQUE (EmployeeID, JobRoleID))

    CREATE INDEX IX_EmployeeJobRole_ICP_EmployeeID ON dbo.EmployeeJobRole_ICP(EmployeeID);

    CREATE INDEX IX_EmployeeJobRole_ICP_JobRoleID ON dbo.EmployeeJobRole_ICP(JobRoleID);

    CREATE TABLE dbo.EmployeeJobRole_MCP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRoleID PRIMARY KEY NONCLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT CUIX_EmployeeJobRole_ICP UNIQUE CLUSTERED (EmployeeID, JobRoleID));

    CREATE INDEX IX_EmployeeJobRole_MCP_JobRoleID ON dbo.EmployeeJobRole_MCP(JobRoleID);

    INSERT INTO dbo.Employee (EmployeeName)

    SELECT OBJECT_SCHEMA_NAME(object_id)+''|''+name

    FROM sys.tables;

    INSERT INTO dbo.JobRole (RoleName)

    VALUES (''Cook''),(''Butcher''),(''Candlestick Maker'');

    INSERT INTO dbo.EmployeeJobRole_ICP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    INSERT INTO dbo.EmployeeJobRole_MCP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    Listing 13-9

    Multiple Column Pattern Script

    ```


    针对示例表的第一个测试将查看查询所有三个表以检索员工姓名和职位角色信息。这些查询如清单[13-10](#338675_4_En_13_Chapter.xhtml#PC10)所示，基于`dbo.JobRole`中的`RoleName`检索信息。在代码中，`EmployeeJobRole`表的两个版本使用不同的聚集键创建。这导致执行计划存在巨大差异，如测试查询的结果图[13-10](#338675_4_En_13_Chapter.xhtml#Fig10)和[13-11](#338675_4_En_13_Chapter.xhtml#Fig11)所示。第一个使用应用了标识列模式的表的执行计划比第二个查询的执行计划更复杂，并且成本比另一个计划高61%。第二个计划基于多列模式的聚集键，操作更少，占执行成本的39%。两个计划之间的主要区别在于，使用多列模式允许聚集索引覆盖基于可能经常用于访问表中行的列（本例中是`JobRoleID`列）的表访问。使用其他模式则无法提供此好处，并且代表了一种不太可能使用的数据访问路径，除非可能在需要删除行时。


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig11_HTML.png)


    一个面板，其中打开了执行计划选项卡，查询2有2行文本，占批处理成本的39%。下方是一个流程图，展示了多条路径，即索引查找、工作角色、索引查找、员工工作角色I
    C P和聚集索引查找、员工，成本分别为20%、20%和55%，最终指向成本为0%的端点select。


    Figure 13-11

    多列模式的执行计划


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig10_HTML.png)


    一个面板，其中打开了执行计划选项卡，查询1有2行文本，占批处理成本的61%。下方是一个流程图，展示了多条路径，即索引查找、工作角色、索引查找、员工工作角色I
    C P、键查找、员工工作角色I C P和聚集索引查找、员工，成本分别为11%、11%、16%和36%，最终指向成本为0%的端点select。


    Figure 13-10

    标识列模式的执行计划


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    Listing 13-10

    Script for the Identity Column Pattern

    ```


    虽然第一组测试结果的益处显著，但当查看其他可用方法时，益处就不那么令人印象深刻了。例如，如果不使用`RoleName`作为谓词，而是使用`EmployeeName`作为谓词会怎样？清单[13-11](#338675_4_En_13_Chapter.xhtml#PC11)中的脚本演示了此场景。与上一个测试脚本相反，这次的结果对于两种聚集索引设计没有差异（见图[13-12](#338675_4_En_13_Chapter.xhtml#Fig12)和[13-13](#338675_4_En_13_Chapter.xhtml#Fig13)）。计划相同的原因在于决定优化多列模式中的聚集索引键以偏向`JobRoleID`。当使用`EmployeeID`列访问数据时，非聚集索引承担了大部分工作，并为每个查询创建了良好且相似的计划。这第二次测试的结果并未否定多列模式的使用，但它们确实强调，在使用预期工作负载进行测试后，才应选择引导聚集键的列。'
  raw: '### Multiple Column


    The next pattern that can be used to design clustered indexes is the Multiple
    Column pattern. In this pattern, two or more tables have a relationship to another
    table that allows for many-to-many relationships to exist between the information.
    For instance, there might be a table that stores employee information and another
    that contains job roles. To represent the relationship, a third table is used.
    Through the Multiple Column pattern, instead of using a new column with the `IDENTITY`
    property on it, the columns used for the relationship serve as the clustering
    keys.


    The Multiple Column pattern is similar to the Foreign Key pattern and provides
    many of the same performance enhancements as the previous pattern. There is often
    one column or another in the many-to-many relationship table that is the best
    candidate for the clustering key. Like the other patterns, this one also adheres
    to most of the attributes for a well-defined clustered index. The pattern is unique
    and mostly narrow and static; these properties will be apparent as an example
    of the Multiple Column pattern is illustrated.


    To demonstrate the Multiple Column pattern, begin by defining a few tables and
    their relationships. To start, there are tables that will store information about
    employees and job roles, named `dbo.Employee` and `dbo.JobRole`, respectively.
    Two tables named `dbo.EmployeeJobRole_ICP` and `dbo.EmployeeJobRole_MCP` are used
    to represent the Identity Column and Multiple Column patterns in the example relationships
    (see Listing [13-9](#338675_4_En_13_Chapter.xhtml#PC9)). The example script includes
    insert statements to provide some sample data to use. Also, non-clustered indexes
    are created on the tables to provide a real-world scenario.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Employee (

    EmployeeID int IDENTITY(1,1)

    ,EmployeeName varchar(100)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_Employee PRIMARY KEY CLUSTERED (EmployeeID));

    CREATE INDEX IX_Employee_EmployeeName ON dbo.Employee(EmployeeName);

    CREATE TABLE dbo.JobRole (

    JobRoleID int IDENTITY(1,1)

    ,RoleName varchar(25)

    ,FillerData varchar(200)

    ,CONSTRAINT PK_JobRole PRIMARY KEY CLUSTERED (JobRoleID));

    CREATE INDEX IX_JobRole_RoleName ON dbo.JobRole(RoleName);

    CREATE TABLE dbo.EmployeeJobRole_ICP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRole_ICP PRIMARY KEY CLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT UIX_EmployeeJobRole_ICP UNIQUE (EmployeeID, JobRoleID))

    CREATE INDEX IX_EmployeeJobRole_ICP_EmployeeID ON dbo.EmployeeJobRole_ICP(EmployeeID);

    CREATE INDEX IX_EmployeeJobRole_ICP_JobRoleID ON dbo.EmployeeJobRole_ICP(JobRoleID);

    CREATE TABLE dbo.EmployeeJobRole_MCP (

    EmployeeJobRoleID int IDENTITY(1,1)

    ,EmployeeID int

    ,JobRoleID int

    ,CONSTRAINT PK_EmployeeJobRoleID PRIMARY KEY NONCLUSTERED (EmployeeJobRoleID)

    ,CONSTRAINT CUIX_EmployeeJobRole_ICP UNIQUE CLUSTERED (EmployeeID, JobRoleID));

    CREATE INDEX IX_EmployeeJobRole_MCP_JobRoleID ON dbo.EmployeeJobRole_MCP(JobRoleID);

    INSERT INTO dbo.Employee (EmployeeName)

    SELECT OBJECT_SCHEMA_NAME(object_id)+''|''+name

    FROM sys.tables;

    INSERT INTO dbo.JobRole (RoleName)

    VALUES (''Cook''),(''Butcher''),(''Candlestick Maker'');

    INSERT INTO dbo.EmployeeJobRole_ICP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    INSERT INTO dbo.EmployeeJobRole_MCP (EmployeeID, JobRoleID)

    SELECT EmployeeID, 1 FROM dbo.Employee

    UNION ALL SELECT EmployeeID, 2 FROM dbo.Employee WHERE EmployeeID / 4 = 1

    UNION ALL SELECT EmployeeID, 3 FROM dbo.Employee WHERE EmployeeID / 8 = 1;

    Listing 13-9

    Multiple Column Pattern Script

    ```


    The first test against the example tables will look at querying against all three
    tables to retrieve information on employee names and job roles. These queries,
    shown in Listing [13-10](#338675_4_En_13_Chapter.xhtml#PC10), retrieve information
    based on the `RoleName` from `dbo.JobRole`. In the code, the two versions of the
    `EmployeeJobRole` table are created with different clustering keys. This results
    in a drastic difference in the execution plans, shown in Figures [13-10](#338675_4_En_13_Chapter.xhtml#Fig10)
    and [13-11](#338675_4_En_13_Chapter.xhtml#Fig11), from the test queries. The first
    execution plan using the table with the Identity Column pattern applied to it
    is more complex than the execution plan for the second query and has 61 percent
    of the cost compared with the other plan. The second plan, which has its clustering
    keys based on the Multiple Column pattern, has fewer operations and accounts for
    39 percent of the execution. The main difference between the two plans is that
    using the Multiple Column pattern allows the clustered index to cover table access
    based on a column that is likely to be used to frequently access rows in the table,
    in this case the `JobRoleID` column. Using the other pattern does not provide
    this benefit and represents a data access path that will not likely be used, except
    potentially when needing to delete the row.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig11_HTML.png)


    A panel with an opened execution plan tab with 2 lines of text for query 2 with
    39% cost relative to the batch. Below is a flow diagram exhibiting multiple paths,
    namely, index seek, job role, index seek, employee job role I C P, and clustered
    index seek, employee, at 20%, 20%, and 55% costs, to the endpoint labeled select
    at 0% cost.


    Figure 13-11


    Execution plan for the Multiple Column pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig10_HTML.png)


    A panel with an opened execution plan tab with 2 lines of text for query 1 with
    61% cost relative to the batch. Below is a flow diagram exhibiting multiple paths,
    namely, index seek, job role, index seek, employee job role I C P, key lookup,
    employee job role I C P, and clustered index seek, employee, at 11%, 11%, 16%,
    and 36% costs, to the endpoint labeled select at 0% cost.


    Figure 13-10


    Execution plan for the Identity Column pattern


    ```

    USE AdventureWorks2017

    GO

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_ICP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    SELECT e.EmployeeName, jr.RoleName

    FROM dbo.Employee e

    INNER JOIN dbo.EmployeeJobRole_MCP ejr ON e.EmployeeID = ejr.EmployeeID

    INNER JOIN dbo.JobRole jr ON ejr.JobRoleID = jr.JobRoleID

    WHERE RoleName = ''Candlestick Maker''

    Listing 13-10

    Script for the Identity Column Pattern

    ```


    While the benefits are significant with the first set of test results, they are
    less impressive when looking at some other methods that can be used. For instance,
    what if instead of using `RoleName` as the predicate, `EmployeeName` was used
    as the predicate? The script in Listing [13-11](#338675_4_En_13_Chapter.xhtml#PC11)
    demonstrates this scenario. Contrary to the last test script, the results this
    time are no different than the others for either clustered index design (see Figures
    [13-12](#338675_4_En_13_Chapter.xhtml#Fig12) and [13-13](#338675_4_En_13_Chapter.xhtml#Fig13)).
    The cause of the identical plans is based on the decision to optimize the clustering
    index keys in the Multiple Column pattern to favor the `JobRoleID`. When the `EmployeeID`
    column is used to access the data, the non-clustered index provides most of the
    heavy lifting, and a good, similar plan for each query is created. The results
    of this second test do not discount the use of the Multiple Column pattern, but
    they do highlight that the column to lead the clustering key should be selected
    after performing tests with the expected workload.'
