    ### 行统计信息


    `sys.dm_db_index_physical_stats` 的第二组列是行统计信息列。这些列提供了索引中包含的行的详细信息，如表 5-23 所示。


    表 5-23


    sys.dm_db_index_physical_stats 的行统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_count` | `bigint` | 索引或数据页的总数 |

    | `record_count` | `bigint` | 记录总数 |

    | `ghost_record_count` | `bigint` | 在分配单元中准备由后台清理任务移除的幽灵记录数 |

    | `version_ghost_record_count` | `bigint` | 在分配单元中由未完成的快照隔离事务保留的幽灵记录数 |

    | `min_record_size_in_bytes` | `int` | 最小记录大小（以字节为单位） |

    | `max_record_size_in_bytes` | `int` | 最大记录大小（以字节为单位） |

    | `avg_record_size_in_bytes` | `float` | 平均记录大小（以字节为单位） |

    | `forwarded_record_count` | `bigint` | 堆中指向另一个数据位置的前向指针记录数 |

    | `compressed_page_count` | `bigint` | 压缩页的数量 |


    首先值得关注的列是 `ghost_record_count` 和 `version_ghost_record_count`。这些列提供了在 `sys.dm_db_index_operational_stats`
    中找到的 `ghost_record_count` 的细分信息。


    接下来要检查的列是 `forwarded_record_count`。该列提供了堆中前向记录的数量统计。这也在 `sys.dm_db_index_operational_stats`
    中通过 `forwarded_fetch_count` 列被引用过。在那个 DMF 中，该计数提供了访问前向记录的次数。而在 `sys.dm_db_index_physical_stats`
    中，该计数指的是表中存在的前向记录的数量。


    最后要查看的列是 `compressed_page_count`。压缩页计数提供了索引中所有已被压缩的页的数量。这有助于衡量通过 `PAGE` 级压缩来压缩页的价值。


    ### 碎片统计信息


    该 DMF 中最后一组统计信息是碎片统计信息。毫无疑问，碎片详细信息是大多数人使用 `sys.dm_db_index_physical_stats` 的原因。当在索引中插入或修改行，导致该行不再适合其本应所在的页面时，索引中就会发生碎片。当这种情况发生时，页面会分裂，将一半的数据从一页移动到另一页。由于在分裂的页面之后通常没有连续的可用页面，这些数据会被移动到一个可用的空闲页面。这导致了索引中页面预期连续的位置出现间隙，阻碍了
    SQL Server 在磁盘上读取索引时完成顺序读取。


    有四个列（如表 5-24 所示）提供了分析索引中碎片状态所需的信息。这些列各自有助于提供碎片程度的视图，并帮助确定如何缓解碎片。


    表 5-24


    sys.dm_db_index_physical_stats 的碎片统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | 索引的逻辑碎片或堆在 `IN_ROW_DATA` 分配单元中的范围碎片
    |

    | `fragment_count` | `bigint` | `IN_ROW_DATA` 分配单元叶级中的片段数量 |

    | `avg_fragment_size_in_pages` | `float` | `IN_ROW_DATA` 分配单元叶级中每个片段的平均页数 |

    | `avg_page_space_used_in_percent` | `float` | 所有页面中已用可用数据存储空间的平均百分比 |


    第一个碎片列是 `avg_fragmentation_in_percent`。该列提供了索引的碎片百分比。随着碎片增加，SQL Server 从索引中检索数据所需的物理
    I/O 操作量可能会增加。利用该列，可以构建一个通过重建或重组索引来缓解碎片的流程。碎片非常严重（30% 或更多）的索引可能受益于重建，而碎片较少的索引可能受益于重组。在设计索引维护流程时，考虑表的目的和使用情况非常重要，因为没有可以盲目应用于所有索引的规则。这将在第
    9 章中进一步讨论。


    下一列 `fragment_count` 提供了索引中所有片段的计数。对于索引中创建的每个片段，该列将汇总其页面的计数。


    第三列是 `avg_fragment_size_in_pages`。该列代表每个片段中的平均页数。该值越高，且越接近 `page_count`，SQL Server
    读取数据所需的 I/O 就越少。


    最后一列是 `avg_page_space_used_in_percent`。该列提供了页面上可用空间的使用量。DML 活动少的索引应尽可能接近 100%。如果索引上没有预期的更新，目标应该是使索引尽可能紧凑。


    ### 索引物理统计信息摘要


    查看 `sys.dm_db_index_physical_stats` 的主要目的是帮助指导索引维护。通过此 DMF，可以分析索引各个级别的统计信息。利用这些信息，可以确定索引每个级别所需进行的维护量。无论是需要对索引进行碎片整理、修改填充因子，还是填充索引，`sys.dm_db_index_physical_stats`
    中的信息都可以指导此活动。


    ### 列存储统计信息


    列存储索引使用的结构与典型的 B 树或堆（也称为行存储）截然不同。因此，针对这些索引收集的统计信息存在一些差异，这些差异与底层架构及其访问方式有关。为了提供这些不同方面的可见性，有两个
    DMO 专注于列存储统计信息的物理和操作统计信息。


    ### 列存储物理统计信息


    首先要考虑的元数据是列存储索引上收集的物理统计信息。这些信息可以通过 DMO `sys.dm_db_column_store_row_group_physical_stats`
    访问。该 DMO 在列存储索引中的每个行组对应一行。如果表已分区，则每个分区中的每个行组将有一行。


