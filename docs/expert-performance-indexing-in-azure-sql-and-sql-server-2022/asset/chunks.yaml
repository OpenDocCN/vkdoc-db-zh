- fmt: '### Update Operations


    另一个可能导致碎片化的操作是 `UPDATE` 操作。`UPDATE` 操作导致碎片化主要有两种方式。首先，记录中的数据不再适合它当前所在的页面。其次，索引的键值发生变化，并且新键值的索引位置不在同一页上，或者不适合该记录所在的目标页面。在这两种情况下，都会发生页面拆分，从而导致碎片化。


    为了演示这些情况如何导致碎片化，请考虑在更新中增加记录大小如何导致碎片化。为此，将创建一个新表，并向其中插入一些记录。然后向该表添加一个聚集索引。相关代码见清单
    [11-5](#338675_4_En_11_Chapter.xhtml#PC5)。使用清单 [11-6](#338675_4_En_11_Chapter.xhtml#PC6)
    中的脚本，可以看到聚集索引上没有碎片，如图 [11-5](#338675_4_En_11_Chapter.xhtml#Fig5) 所示。关于这些碎片化结果需要注意的一点是，平均页面空间使用率接近
    90%。因此，记录大小的任何显著增长都可能填满页面上的可用空间。


    ![图 11-5：初始 UPDATE 碎片化结果。表格显示聚集索引的平均碎片化率低于 1%。](images/338675_4_En_11_Chapter/338675_4_En_11_Fig5_HTML.png)


    图 11-5


    初始 UPDATE 碎片化结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UpdateOperations''),NULL,NULL,''DETAILED'');

    ```


    清单 11-6


    查看 UPDATE 索引碎片化


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UpdateOperations'') IS NOT NULL

    DROP TABLE dbo.UpdateOperations;

    CREATE TABLE dbo.UpdateOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UpdateOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UpdateOperations(RowID);

    ```


    清单 11-5


    为 UPDATE 操作创建表


    现在增加索引中某些行的大小。为此，执行清单 [11-7](#338675_4_En_11_Chapter.xhtml#PC7) 中的代码。此代码将每五行的
    `JunkValue` 列从 1000 个字符的值更新为 2000 个字符的值。使用清单 [11-6](#338675_4_En_11_Chapter.xhtml#PC6)
    查看当前索引碎片化情况，通过图 [11-6](#338675_4_En_11_Chapter.xhtml#Fig6) 中的结果可以看到，聚集索引现在碎片化率超过
    99%，平均页面空间使用率降至约 50%。正如这段代码所示，当一行在 `UPDATE` 操作期间大小增加时，存在显著碎片化的可能性。


    ![图 11-6：记录长度增加后的 UPDATE 碎片化结果。平均碎片率增至 99.65%，平均页面空间使用率为 53.61%。](images/338675_4_En_11_Chapter/338675_4_En_11_Fig6_HTML.png)


    图 11-6


    记录长度增加后的 UPDATE 碎片化结果


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    ```


    清单 11-7


    导致碎片化的 UPDATE 操作


    索引可能产生碎片化的第二种方式是通过更改索引的键值。当索引的键值更改时，记录可能需要更改其在索引中的位置。例如，如果索引是基于产品名称构建的，那么将名称从
    Acme Mop 更改为 XYZ Mop 将改变产品名称在索引排序中的位置。更改记录在索引中的位置可能会将其放置在不同的页面上，如果新页面上没有足够的空间，则会发生页面拆分和碎片化。


    为了演示这个概念，请执行清单 [11-8](#338675_4_En_11_Chapter.xhtml#PC8)，然后使用清单 [11-6](#338675_4_En_11_Chapter.xhtml#PC6)
    获取图 [11-7](#338675_4_En_11_Chapter.xhtml#Fig7) 所示的结果。对于新的非聚集索引，目前没有碎片。


    注意


    如果聚集索引的键值经常更改，这可能表明为聚集索引选择的键值不合适。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UpdateOperations(Name) INCLUDE (JunkValue);

    ```


    清单 11-8


    为 UPDATE 操作创建非聚集索引


    ![图 11-7：添加非聚集索引后的 UPDATE 碎片化结果。新增的 3 个非聚集索引没有碎片。](images/338675_4_En_11_Chapter/338675_4_En_11_Fig7_HTML.png)


    图 11-7


    添加非聚集索引后的 UPDATE 碎片化结果


    此时，需要修改一些键值。使用清单 [11-9](#338675_4_En_11_Chapter.xhtml#PC9)，对表执行 `UPDATE` 操作，每九行更新一行。为了模拟更改键值，`UPDATE`
    语句反转了列中的字符。这么少量的活动足以导致大量的碎片化。如图 [11-8](#338675_4_En_11_Chapter.xhtml#Fig8) 的结果所示，非聚集索引从没有碎片变成了超过
    30% 的碎片。


    需要注意的一点是，聚集索引上的碎片没有随着这些更新而改变。并非所有更新都会导致碎片化。只有那些因为记录当前存储的页面上空间不足而导致数据移动的更新才会产生碎片化。


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET Name = REVERSE(Name)

    WHERE RowID % 9 = 1

    ```


    清单 11-9


    用于更改索引键值的 UPDATE 操作


    ![图 11-8：更改索引键值后的 UPDATE 碎片化结果。两个非聚集索引的平均碎片率分别为 29.45% 和 66.67%。](images/338675_4_En_11_Chapter/338675_4_En_11_Fig8_HTML.png)


    图 11-8


    更改索引键值后的 UPDATE 碎片化结果'
  raw: '#### Update Operations


    Another operation that can lead to fragmentation is an `UPDATE` operation. There
    are two main ways in which an `UPDATE` operation will result in fragmentation.
    First, the data in the record no longer fits on the page on which it currently
    resides. Second, the key value for the index changes, and the index location for
    the new key value is not on the same page or doesn’t fit on the page where the
    record is destined. In both scenarios, the page splits, and fragmentation occurs.


    To demonstrate how these situations lead to fragmentation, consider how increasing
    the size of a record in an update can lead to fragmentation. For this, a new table
    will be created, and a number of records will be inserted into it. Then a clustered
    index will be added to the table. The code for this is in Listing [11-5](#338675_4_En_11_Chapter.xhtml#PC5).
    Using the script from Listing [11-6](#338675_4_En_11_Chapter.xhtml#PC6), it can
    be seen that there is no fragmentation on the clustered index, as the results
    in Figure [11-5](#338675_4_En_11_Chapter.xhtml#Fig5) show. One thing to pay attention
    to with these fragmentation results is that the average page space used is almost
    90 percent. Because of this, any significant growth in record size will likely
    fill the available space on the pages.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig5_HTML.png)


    A table has 9 columns and 2 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. The average fragmentation is less than 1%.


    Figure 11-5


    Initial UPDATE fragmentation results


    ```

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.UpdateOperations''),NULL,NULL,''DETAILED'');

    Listing 11-6

    View UPDATE Index Fragmentation

    ```


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.UpdateOperations'') IS NOT NULL

    DROP TABLE dbo.UpdateOperations;

    CREATE TABLE dbo.UpdateOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.UpdateOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.UpdateOperations(RowID);

    Listing 11-5

    Create a Table for UPDATE Operations

    ```


    Now increase the size of some of the rows in the index. To accomplish this, execute
    the code in Listing [11-7](#338675_4_En_11_Chapter.xhtml#PC7). This code will
    update the `JunkValue` column for every five rows from a 1,000-character value
    to a 2,000-character value. Using Listing [11-6](#338675_4_En_11_Chapter.xhtml#PC6)
    to view current index fragmentation, it can be seen that, through the results
    in Figure [11-6](#338675_4_En_11_Chapter.xhtml#Fig6), the clustered index is now
    more than 99 percent fragmented and the average page space used has dropped to
    about 50 percent. As this code demonstrates, when a row increases in size during
    an `UPDATE` operation, the potential exists for significant fragmentation.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig6_HTML.png)


    A table has 9 columns and 6 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. The average fragmentation has increased to 99.65\. Average page space
    used is 53.61%.


    Figure 11-6


    UPDATE fragmentation results after record length increase


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    Listing 11-7

    UPDATE Operation resulting in fragmentation

    ```


    The second way in which an index can incur fragmentation is by changing the key
    values for the index. When the key values for an index change, the record may
    need to change its position in the index. For example, if an index is built on
    the name of the product, then changing the name from Acme Mop to XYZ Mop will
    change where the product name will be placed in the sorting for the index. Changing
    the location of the record in the index may place the record on a different page,
    and if there is not sufficient space on the new page, then a page split and fragmentation
    will occur.


    To demonstrate this concept, execute Listing [11-8](#338675_4_En_11_Chapter.xhtml#PC8)
    and then use Listing [11-6](#338675_4_En_11_Chapter.xhtml#PC6) to obtain the results
    shown in Figure [11-7](#338675_4_En_11_Chapter.xhtml#Fig7). For the new non-clustered
    index, there is currently no fragmentation.


    Note


    If key values for a clustered index change often, that may indicate that the key
    values selected for the clustered index are inappropriate.


    ```

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX IX_Name ON dbo.UpdateOperations(Name) INCLUDE (JunkValue);

    Listing 11-8

    Create a Non-clustered Index for UPDATE Operations

    ```


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig7_HTML.png)


    A table has 9 columns and 5 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. 3 non clustered indexes added with no fragmentation.


    Figure 11-7


    UPDATE fragmentation results after adding a non-clustered index


    At this point, some key values need to be modified. Using Listing [11-9](#338675_4_En_11_Chapter.xhtml#PC9),
    perform `UPDATE` activity on the table and update one out of every nine rows.
    To simulate changing the key values, the `UPDATE` statement reverses the characters
    in the column. This small amount of activity is enough to cause a significant
    amount of fragmentation. As the results in Figure [11-8](#338675_4_En_11_Chapter.xhtml#Fig8)
    illustrate, the non-clustered index went from no fragmentation to more than 30
    percent fragmentation.


    One thing to note is that the fragmentation on the clustered index did not change
    with these updates. Not all updates will result in fragmentation. Only those updates
    that move data around because of space being unavailable on the pages where the
    records are currently stored will result in fragmentation.


    ```

    USE AdventureWorks2017

    GO

    UPDATE dbo.UpdateOperations

    SET Name = REVERSE(Name)

    WHERE RowID % 9 = 1

    Listing 11-9

    UPDATE Operation to Change Index Key Values

    ```


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig8_HTML.png)


    A table has 9 columns and 5 rows. The column headers are index type descending,
    index depth, index level, page count, record count, an average fragment in percent,
    fragment count, average fragment size in pages, and average page space used in
    percent. 2 non clustered indexes have average fragmentation of 29.45% and 66.67%.


    Figure 11-8


    UPDATE fragmentation results after changing index key values'
