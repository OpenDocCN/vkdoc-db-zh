    shown in [Figure 10-1](#338675_4_En_10_Chapter.xhtml#Fig1). This figure shows
    that `PK_MythTwo1`, which is the primary key on the first table, was created as
    a clustered index. Then on the second table, `PK_MythTwo2` was created as a non-clustered
    index.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig1_HTML.png)


    A table has 3 rows and 7 columns labeled table name, name, index i d, type, type
    description, is unique, and is primary key. The row 1 entry, Myth Two 1 of table
    name is highlighted.


    Figure 10-1

    Primary key `sys.indexes` output


    The behavior discussed in this section is important to remember when building
    primary keys and clustered indexes. If there are situations where they need to
    be separated, the primary key will need to be defined after the clustered index
    or as a `NONCLUSTERED` index.


    Whereas a primary key defines a source of truth for uniqueness on a table, the
    clustered index provides a logical sort order for storage purposes. Understanding
    each use case allows for effective indexing in scenarios when the clustered index
    and primary key may not be on the same columns.


    ### Myth 3: Online Index Operations Don’t Block


    One of the advantages of SQL Server Enterprise Edition is the ability to build
    indexes online. During an online index build, the table on which the index is
    being created will still be available for queries and data modifications. This
    feature is extremely useful when a database needs to be accessed and maintenance
    windows are short or nonexistent.


    A common myth with online index rebuilds is that they don’t cause any blocking.
    Like any myth, this one is false. When using an online index operation, there
    is an intent shared lock held on the table for the main portion of the build.
    At the finish, either a shared lock (for a non-clustered index) or a schema modification
    lock (for a clustered index) is held for a short time while the operation swaps
    in the updated index. This differs from an offline index build where the shared
    or schema modification lock is held for the duration of the index build.


    To see this behavior in action, a table will be created, and Extended Events will
    be used to monitor the locks that are applied to the table while creating indexes
    with and without the `ONLINE` option. To start this demo, execute the code in
    [Listing 10-6](#338675_4_En_10_Chapter.xhtml#PC6). This script creates the table
    `dbo.MythThree` and populates it with 10 million records. The last item it returns
    is the `object_id` for the table, which is needed for the subsequent parts of
    the demo. For this example, the `object_id` for `dbo.MythThree` is 624721278.


    **Note**

    The demos for this myth all require SQL Server Enterprise or Developer Edition.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.MythThree

    (

    RowID int NOT NULL

    ,Column1 uniqueidentifier

    );

    WITH L1(z) AS (SELECT 0 UNION ALL SELECT 0)

    , L2(z) AS (SELECT 0 FROM L1 a CROSS JOIN L1 b)

    , L3(z) AS (SELECT 0 FROM L2 a CROSS JOIN L2 b)

    , L4(z) AS (SELECT 0 FROM L3 a CROSS JOIN L3 b)

    , L5(z) AS (SELECT 0 FROM L4 a CROSS JOIN L4 b)

    , L6(z) AS (SELECT TOP 10000000 0 FROM L5 a CROSS JOIN L5 b)

    INSERT INTO dbo.MythThree

    SELECT ROW_NUMBER() OVER (ORDER BY z) AS RowID, NEWID()

    FROM L6;

    GO

    SELECT OBJECT_ID(''dbo.MythThree'')

    GO

    Listing 10-6

    MythThree Table Create Script

    ```


    To monitor those events in this scenario, Extended Events will be used to capture
    the `lock_acquired` and `lock_released` events fired during index creation. Open
    sessions in SSMS for the code in [Listings 10-7](#338675_4_En_10_Chapter.xhtml#PC7)
    and [10-8](#338675_4_En_10_Chapter.xhtml#PC8). Before running, update the `session_id`
    from [Listing 10-8](#338675_4_En_10_Chapter.xhtml#PC8) for the `session_id` in
    [Listing 10-7](#338675_4_En_10_Chapter.xhtml#PC7); for this scenario, the `session_id`
    is `42`. Apply the same update with the `object_id`. After the Extended Events
    session is running, the live view can be used to monitor the locks as they occur.


    ```

    USE AdventureWorks2017;

    GO

    IF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name = ''MythThreeXevents'')

    DROP EVENT SESSION [MythThreeXevents] ON SERVER

    GO

    CREATE EVENT SESSION [MythThreeXevents] ON SERVER

    ADD EVENT sqlserver.lock_acquired(SET collect_database_name=(1)

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278)),

    ADD EVENT sqlserver.lock_released(

    ACTION(sqlserver.sql_text)

    WHERE [sqlserver].[session_id]=(42) AND [object_id]=(624721278))

    ADD TARGET package0.ring_buffer

    GO

    ALTER EVENT SESSION [MythThreeXevents] ON SERVER STATE = START

    GO

    Listing 10-7

    Extended Events Session for Lock Acquired and Released

    ```'
