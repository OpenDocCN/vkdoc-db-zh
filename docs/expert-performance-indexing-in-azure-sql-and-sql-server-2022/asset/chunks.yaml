  trans: '

    ## 缺失索引


    缺失索引动态管理对象（DMOs）是一组管理对象，它们提供来自查询优化器的索引反馈。当查询优化器编译执行计划时，它可以识别出将一组列的统计信息物化为物理索引是否将提升性能。在这些情况下，查询优化器将编译结果并将信息存储在缺失索引
    DMOs 中。


    缺失索引 DMOs 提供了几点好处。首先，缺失索引信息是从查询优化器收集的，无需您执行任何操作。与 `Extended Events` 和其他性能监控工具不同，无需对其进行配置和启用即可收集信息。另一个考虑是，缺失索引信息是基于在
    SQL Server 实例上实际发生的活动。索引建议并非基于您认为可能在生产环境中发生的测试负载，而是基于生产负载本身。随着数据库中数据使用模式的变化，缺失索引的建议也会随之改变。


    尽管缺失索引 DMOs 提供了诸多好处，但在使用它们时，考虑几个注意事项非常重要。缺失索引 DMOs 的局限性可以总结为以下几个类别：


    *   队列大小


    *   分析深度


    *   准确性


    *   索引类型


    缺失索引的队列大小是一个容易被忽视的限制。无论 SQL Server 实例上有多少个数据库，最多只能有 600 个缺失索引组。一旦识别出 600 个缺失索引组，查询优化器将停止报告新的缺失索引建议。它不会去判断一个新的可能缺失索引是否比已报告的项目质量更高；相关信息根本不会被收集。当这种情况发生时，微软建议处理现有的索引建议，以帮助缓解此限制。


    > **注意**

    >

    > 与其他动态管理对象一样，缺失索引 DMOs 中的信息在 SQL Server 重启时会重置，并且每当数据库离线时，该数据库的信息也会被删除。


    在考虑缺失索引的信息时，分析深度是每次审查建议时都需要考虑的一个限制。查询优化器只考虑当前的执行计划以及缺失索引是否会对该执行计划有益。有时，将缺失索引添加到数据库中会导致一个新的执行计划，而这个新计划又会带来新的缺失索引建议。这些建议只是提升执行计划性能的第一步。此限制的另一半是，缺失索引详情不包括测试来确定建议的缺失索引中的列顺序是否最优。在查看缺失索引建议时，需要进行测试以确定正确的列顺序。


    缺失索引建议的第三个限制是其返回统计信息的准确性。关于这个限制，有两点需要考虑。当查询使用不等式谓词时，其成本信息不如使用等式谓词返回的信息有效。此外，可能会返回具有不同成本估算的同一缺失索引建议。如何以及在何处利用缺失索引可能会改变所计算的成本估算。对于每个成本估算，都会记录一个缺失索引建议。


    最后，缺失索引工具在它可以建议的索引类型方面存在限制。主要限制是索引类型，即缺失索引无法建议聚集索引、XML 索引、空间索引或列存储索引。这些建议也不会包含关于何时创建过滤索引的信息。同样地，建议有时可能只包含
    `INCLUDED` 列。当这种情况发生时，需要将其中一个 `INCLUDED` 列指定为键列。


    > **注意**

    >

    > 每当对表进行元数据操作时，该表的缺失索引信息将被删除。例如，当向表中添加一列时，缺失索引信息将被删除。一个不太明显的例子是当表上的索引发生变化时。在这种情况下，缺失索引信息也会被删除。


    正如本书其他地方提到的，仔细权衡一个新索引是否足够有价值以保证其创建，始终是很重要的。盲目遵循这些 DMOs 中的每一个索引建议，将很快导致表被过度索引。在介绍这些
    DMOs 时请牢记这一点，因为它有助于强调一个事实：并非所有索引都是平等的。有些能提供卓越的价值，而另一些的维护成本可能超过其带来的价值。


    ### 解读 DMOs


    有四个 DMOs 可用于返回有关缺失索引的信息。每个 DMO 提供了构建索引所需的部分信息，查询优化器可使用这些索引来提升查询性能。缺失索引相关的 DMOs
    如下：


    *   `sys.dm_db_missing_index_details`

    *   `sys.dm_db_missing_index_columns`

    *   `sys.dm_db_missing_index_group_stats`

    *   `sys.dm_db_missing_index_groups`


    在接下来的四个小节中，将逐一审视每个动态管理对象，并详细介绍它们如何提供有关如何识别缺失索引的信息。

    '
- fmt: '### sys.dm_db_missing_index_details


    动态管理对象 (DMO) `sys.dm_db_missing_index_details` 是一个动态管理视图 (DMV)，用于返回缺失索引的建议列表。该视图中的每一行都提供了一个单独的缺失索引建议。表
    12-1 中的列提供了有关数据库和要创建索引的表的信息，还包括了应构成索引键的列以及索引的包含列。


    表 12-1


    `sys.dm_db_missing_index_details` 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `index_handle` | `int` | 每个缺失索引建议的唯一标识符。这是此 DMV 的键值。 |

    | `database_id` | `smallint` | 标识存在缺失索引的表所在的数据库。 |

    | `object_id` | `int` | 标识缺失索引的表。 |

    | `equality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与了相等谓词。 |

    | `inequality_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列参与了不等谓词。 |

    | `included_columns` | `nvarchar(4000)` | 逗号分隔的列列表，这些列是查询所需的覆盖列。 |

    | `statement` | `nvarchar(4000)` | 缺失索引的表的名称。 |


    `sys.dm_db_missing_index_details` 中有两个列用于标识缺失索引建议中的键列：`equality_columns` 和 `inequality_columns`。当查询计划中存在直接相等比较时，会生成
    `equality_columns`。例如，当查询的过滤条件是 `ColumnA = @Parameter` 时，这就是一个相等谓词。当查询计划中使用任何不等过滤条件时，会生成
    `inequality_columns` 的详细信息，例如使用大于、小于或 `NOT IN` 比较时。


    关于 `included_columns` 信息，当存在不属于过滤条件但可用于允许索引通过单个索引覆盖查询请求的列时，会生成此信息。包含列在第 10 章中有更深入的介绍。使用包含列有助于防止如果创建了缺失索引，查询计划在执行计划中不得不使用键查找。也就是说，首先测试不包含包含列的新索引并衡量由此产生的性能改进是有价值的。缺失索引建议通常包含包含列，但这些额外的包含列（及其相关的维护）可能并非实现足够性能提升所必需的。


    ### sys.dm_db_missing_index_columns


    下一个 DMO 是 `sys.dm_db_missing_index_columns`，它是一个动态管理函数 (DMF)。此函数为 `sys.dm_db_missing_index_details`
    中列出的每个缺失索引返回一个列列表。要使用此 DMF，需要将一个 `index_handle` 作为参数传递给该函数。结果集中的每一行代表 `sys.dm_db_missing_index_details`
    中缺失索引建议的一个列，并重复了 `equality_columns`、`inequality_columns` 和 `included_columns`
    中的信息。表 12-2 列出了 `sys.dm_db_missing_index_columns` 的输出。


    表 12-2


    `sys.dm_db_missing_index_columns` 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `column_id` | `int` | 列的 ID |

    | `column_name` | `sysname` | 表列的名称 |

    | `column_usage` | `varchar(20)` | 描述列在索引中的使用方式 |


    此 DMF 中的主要信息是 `column_usage` 列。对于每一行，此列将返回以下值之一：`EQUALITY`、`INEQUALITY` 或 `INCLUDE`。这些值对应于
    `sys.dm_db_missing_index_details` 中的 `equality_columns`、`inequality_columns` 和
    `included_columns`。根据前者 DMV 中的使用类型，此 DMF 中的使用方式将相同。


    ### sys.dm_db_missing_index_groups


    DMV `sys.dm_db_missing_index_groups` 是下一个缺失索引 DMO。此 DMV 返回一个缺失索引组与缺失索引建议配对的列表。表
    12-3 列出了 `sys.dm_db_missing_index_groups` 的列。尽管此 DMV 支持在缺失索引建议中存在多对多关系的能力，但它们总是以一对一的关系建立。


    表 12-3


    `sys.dm_db_missing_index_groups` 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `index_group_handle` | `int` | 标识一个缺失索引组。此值连接到 `sys.dm_db_missing_index_group_stats`
    中的 `group_handle`。 |

    | `index_handle` | `int` | 标识一个缺失索引句柄。此值连接到 `sys.dm_db_missing_index_details`
    中的 `index_handle`。 |


    ### sys.dm_db_missing_index_group_stats


    最后一个缺失索引 DMO 是 DMV `sys.dm_db_missing_index_group_stats`。此 DMV 中的信息包含有关查询优化器预期如何使用缺失索引（如果已构建）的统计信息。由此，使用表
    12-4 中的列，可以确定哪些缺失索引将提供最大的收益以及索引将被使用的范围。这些信息非常有用，并提供了各种指标，有助于更好地理解为何建议某个索引以及如果实施它可能对性能产生的潜在影响。


    表 12-4


    `sys.dm_db_missing_index_group_stats` 中的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `group_handle` | `int` | 每个缺失索引组的唯一标识符。这是此 DMV 的键值。所有将从使用该缺失索引组中受益的查询都包含在此组中。
    |

    | `unique_compiles` | `bigint` | 将从此缺失索引组受益的执行计划编译和重编译的计数。 |

    | `user_seeks` | `bigint` | 如果缺失索引已构建，用户查询中将发生的查找操作计数。 |

    | `user_scans` | `bigint` | 如果缺失索引已构建，用户查询中将发生的扫描操作计数。 |

    | `last_user_seek` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户查找的日期和时间。 |

    | `last_user_scan` | `datetime` | 如果缺失索引已构建，来自用户查询的最近一次用户扫描的日期和时间。 |

    | `avg_total_user_cost` | `float` | 该组中索引可以降低的用户查询的平均成本。 |

    | `avg_user_impact` | `float` | 如果实施了此缺失索引组，用户查询可能获得的平均百分比收益。 |

    | `system_seeks` | `bigint` | 如果缺失索引已构建，系统查询中将发生的查找操作计数。 |

    | `system_scans` | `bigint` | 如果缺失索引已构建，系统查询中将发生的扫描操作计数。 |

    | `last_system_seek` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统查找的日期和时间。 |

    | `last_system_scan` | `datetime` | 如果缺失索引已构建，来自系统查询的最近一次系统扫描的日期和时间。 |

    | `avg_total_system_cost` | `float` | 该组中索引可以降低的系统查询的平均成本。 |

    | `avg_system_impact` | `float` | 如果实施了此缺失索引组，系统查询可能获得的平均百分比收益。 |'
  raw: '#### sys.dm_db_missing_index_details


    The DMO `sys.dm_db_missing_index_details` is a dynamic management view that returns
    a list of missing index suggestions. Each row in the dynamic management view (DMV)
    provides a single suggested missing index. The columns in Table [12-1](#338675_4_En_12_Chapter.xhtml#Tab1)
    provide information on the database and the table to create the index on. It also
    includes the columns that should comprise the key and the included columns for
    the index.


    Table 12-1


    Columns in sys.dm_db_missing_index_details


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `index_handle` | `int` | Unique identifier for each missing index suggestion.
    This is the key value for this DMV. |

    | `database_id` | `smallint` | Identifies the database where the table with the
    missing index resides. |

    | `object_id` | `int` | Identifies the table where the index is missing. |

    | `equality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to equality predicates. |

    | `inequality_columns` | `nvarchar(4000)` | Comma-separated list of columns that
    contribute to inequality predicates. |

    | `included_columns` | `nvarchar(4000)` | Comma-separated list of columns needed
    as covering columns for the query. |

    | `statement` | `nvarchar(4000)` | Name of the table where the index is missing.
    |


    There are two columns in `sys.dm_db_missing_index_details` that are used to identify
    key columns on missing index suggestions. These are `equality_columns` and `inequality_columns`.
    The `equality_columns` are generated when there is a comparison within the query
    plan that makes a direct equality comparison. For instance, when the filter for
    a query is `ColumnA = @Parameter`, this is an equality predicate. The `inequality_columns`
    details are created when any nonequal filter is used in a query plan. Examples
    of this are when there are greater than, less than, or `NOT IN` comparisons being
    used.


    With regard to the `included_columns` information, this is generated when there
    are columns that are not part of the filter but that would be used to allow the
    index to cover the query request using a single index. Included columns are covered
    in more depth in Chapter [10](#338675_4_En_10_Chapter.xhtml). The use of included
    columns will help prevent the query plan from having to use a key lookup in the
    execution plan if the missing index is created. That being said, it is valuable
    to test a new index without included columns first and measure the resulting performance
    improvement. Missing index suggestions often contain included columns, but those
    additional included columns (and their associated maintenance) may not be needed
    in order to realize sufficient performance gains.


    #### sys.dm_db_missing_index_columns


    The next DMO is `sys.dm_db_missing_index_columns`, which is a dynamic management
    function (DMF). This function returns a list of columns for each missing index
    listed in `sys.dm_db_missing_index_details`. To use the DMF, an `index_handle`
    is passed into the function as a parameter. Each row in the result set represents
    a column in the missing index suggestion from `sys.dm_db_missing_index_details`
    and repeats the information in `equality_columns`, `inequality_columns`, and `included_columns`.
    Table [12-2](#338675_4_En_12_Chapter.xhtml#Tab2) lists the output for `sys.dm_db_missing_index_columns`.


    Table 12-2


    Columns in sys.dm_db_missing_index_columns


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `column_id` | `int` | ID of the column |

    | `column_name` | `sysname` | Name of the table column |

    | `column_usage` | `varchar(20)` | Description of how the column will be used
    in the index |


    The primary information in this DMF is the `column_usage` column. For every row,
    this column will return one of the following values: `EQUALITY`, `INEQUALITY`,
    or `INCLUDE`. These values map to `equality_columns`, `inequality_columns`, and
    `included_columns` in `sys.dm_db_missing_index_details`. Depending on the type
    of usage in the former DMV, the use will be the same for this DMF.


    #### sys.dm_db_missing_index_groups


    The DMV `sys.dm_db_missing_index_groups` is the next missing index DMO. The DMV
    returns a list of missing index groups paired with missing index suggestions.
    Table [12-3](#338675_4_En_12_Chapter.xhtml#Tab3) lists the columns for `sys.dm_db_missing_index_groups`.
    Although this DMV supports the ability for many-to-many relationships within missing
    index suggestions, they are always made in a one-to-one relationship.


    Table 12-3


    Columns in sys.dm_db_missing_index_groups


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `index_group_handle` | `int` | Identifies a missing index group. This value
    joins to `group_handle` in `sys.dm_db_missing_index_group_stats`. |

    | `index_handle` | `int` | Identifies a missing index handle. This value joins
    to `index_handle` in `sys.dm_db_missing_index_details`. |


    #### sys.dm_db_missing_index_group_stats


    The last missing index DMO is the DMV `sys.dm_db_missing_index_group_stats`. The
    information in this DMV contains statistics on how the query optimizer would expect
    to use the missing index if it were built. From this, using the columns in Table
    [12-4](#338675_4_En_12_Chapter.xhtml#Tab4), it can be determined which missing
    indexes would provide the greatest benefit and the scope to which the index will
    be used. This information is exceptionally useful and provides a wide variety
    of metrics that can help better understand why an index is being suggested and
    the potential impact it could have on performance if implemented.


    Table 12-4


    Columns in sys.dm_db_missing_index_group_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `group_handle` | `int` | Unique identifier for each missing index group. This
    is the key value for this DMV. All queries that would benefit from using the missing
    index group are included in this group. |

    | `unique_compiles` | `bigint` | Count of the execution plan compilations and
    recompilations that would benefit from this missing index group. |

    | `user_seeks` | `bigint` | Count of seeks in user queries that would have occurred
    if the missing index had been built. |

    | `user_scans` | `bigint` | Count of scans in user queries that would have occurred
    if the missing index had been built. |

    | `last_user_seek` | `datetime` | Date and time of last user seek from user queries
    that would have occurred if the missing index had been built. |

    | `last_user_scan` | `datetime` | Date and time of last user scan from user queries
    that would have occurred if the missing index had been built. |

    | `avg_total_user_cost` | `float` | Average cost of the user queries that could
    be reduced by the index in the group. |

    | `avg_user_impact` | `float` | Average percentage benefit that user queries could
    experience if this missing index group had been implemented. |

    | `system_seeks` | `bigint` | Count of seeks in system queries that would have
    occurred if the missing index had been built. |

    | `system_scans` | `bigint` | Count of scans in system queries that would have
    occurred if the missing index had been built. |

    | `last_system_seek` | `datetime` | Date and time of last system seek from system
    queries that would have occurred if the missing index had been built. |

    | `last_system_scan` | `datetime` | Date and time of last system scan from system
    queries that would have occurred if the missing index had been built. |

    | `avg_total_system_cost` | `float` | Average cost of the system queries that
    could be reduced by the index in the group. |

    | `avg_system_impact` | `float` | Average percentage benefit that system queries
    could experience if this missing index group had been implemented. |'
