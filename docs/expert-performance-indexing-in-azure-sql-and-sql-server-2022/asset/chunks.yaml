    \ 0, @Sample;\n```\n清单 7-10\n调查几何索引\n\n这些信息对于调整索引以使其更好地工作非常有用。这些细节类似于标准索引可用的统计信息。其中包括索引的每个级别中有多少对象可用。此外，还会返回与提供的查询样本匹配的数据。看到特定数量的相交对象与查询样本匹配，表明给定对象是否会被索引返回。通过将索引中的对象与匹配的对象进行比较，还可以检索索引中未被查询样本返回的对象百分比。所有这些都有助于理解索引满足空间查询要求的程度。"
  raw: '### The Views


    There are two catalog views relevant to spatial indexes: `sys.spatial_indexes`
    and `sys.spatial_index_tessellations`. The `sys.spatial_indexes` view provides
    the type and tessellation scheme as well as basic information about each spatial
    index. The `spatial_index_type` column returned by `sys.spatial_indexes` returns
    a 1 for `GEOMETRY` indexes and a 2 for `GEOGRAPHY` indexes. Listing [7-8](#338675_4_En_7_Chapter.xhtml#PC8)
    is an example query against the view, and Figure [7-7](#338675_4_En_7_Chapter.xhtml#Fig7)
    shows the results.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig7_HTML.png)


    A table has 5 columns and a row. The column headers are name, type descending,
    spatial index type, spatial index type descending, and tessellation scheme. The
    spatial index type descending presents geometry.


    Figure 7-7


    Querying sys.spatial_indexes and results showing the IDX_WIZIP_GEOM index


    ```

    USE AdventureWorks2017

    GO

    SELECT  name,

    type_desc,

    spatial_index_type,

    spatial_index_type_desc,

    tessellation_scheme

    FROM    sys.spatial_indexes;

    Listing 7-8

    Query to Retrieve Metadata About Spatial Indexes

    ```


    `sys.spatial_index_tessellations` can now be queried to see the parameters of
    the index and the tessellation scheme. Listing [7-9](#338675_4_En_7_Chapter.xhtml#PC9)
    is the query, and Figure [7-8](#338675_4_En_7_Chapter.xhtml#Fig8) shows the results.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig8_HTML.png)


    A table has 5 columns and a row. The column headers are tessellation scheme, bounding
    box x max, bounding box x min, bounding box y max, bounding box y min, level 1
    grid descending, level 4 grid descending, and cells per object.


    Figure 7-8


    Querying sys.spatial_index_tessellations and partial results


    ```

    USE AdventureWorks2017

    GO

    SELECT  tessellation_scheme,

    bounding_box_xmax,

    bounding_box_xmin,

    bounding_box_ymax,

    bounding_box_ymin,

    level_1_grid_desc,

    level_2_grid_desc,

    level_3_grid_desc,

    level_4_grid_desc,

    cells_per_object

    FROM    sys.spatial_index_tessellations;

    Listing 7-9

    Query to Retrieve Information About Tessellation

    ```


    Both of these catalog views can be joined on `object_id` to become extremely useful
    for tuning and maintenance tasks. At times, it may prove effective to manipulate
    and recreate indexes as needed when the spatial data dictates a relevant need.


    ### Stored Procedures


    In addition to the catalog views, four stored procedures have been provided internally
    for further analysis of spatial indexes. These stored procedures return a complete
    listing of properties that are set on the indexes. The four procedures and their
    parameters are as follows:


    ```

    sp_help_spatial_GEOMETRY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput''

    [ , [ @query_sample = ] ''query_sample'']

    sp_help_spatial_GEOMETRY_index_xml [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ]''{ 0 | 1 }]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    sp_help_spatial_GEOGRAPHY_index [ @tabname =] ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    sp_help_spatial_GEOGRAPHY_index_xml [@tabname = ''tabname''

    [ , [ @indexname = ] ''indexname'' ]

    [ , [ @verboseoutput = ] ''verboseoutput'' ]

    [ , [ @query_sample = ] ''query_sample'' ]

    [ ,.[ @xml_output = ] ''xml_output'' ]

    ```


    Listing [7-10](#338675_4_En_7_Chapter.xhtml#PC11) shows how to execute these stored
    procedures. The example returns information about the `GEOMETRY` index `IDX_COUNTY_GEOM`
    created earlier in Listing [7-7](#338675_4_En_7_Chapter.xhtml#PC7). Figure [7-9](#338675_4_En_7_Chapter.xhtml#Fig9)
    shows the results.


    ![](images/338675_4_En_7_Chapter/338675_4_En_7_Fig9_HTML.jpg)


    A table has 2 columns and 15 rows. The column headers are prop name and prop value,
    and the total number of object cells in level 0 for the query is selected.


    Figure 7-9


    sp_help_spatial_GEOMETRY_index example and results (results may vary)


    ```

    USE AdventureWorks2017

    GO

    DECLARE @Sample GEOMETRY

    = ''POLYGON((-90.0 -180.0, -90.0 180.0, 90.0 180.0, 90.0 -180.0, -90.0 -180.0))'';

    EXEC sp_help_spatial_GEOMETRY_index ''dbo.tl_2017_us_county'', ''IDX_COUNTY_GEOM'',
    0, @Sample;

    Listing 7-10

    Investigating the Geometry Index

    ```


    This information can be useful for adjusting the index to make it function better.
    These details are similar to the statistics that are available for standard indexes.
    Included are how many objects are available in each of the levels of the index.
    In addition, data is returned that matches the provided query sample. Seeing that
    a particular number of intersecting objects match the query sample shows whether
    a given object will be returned by the index. The percentage of objects in the
    index that are not returned from the query sample can also be retrieved by comparing
    the objects in the index to the ones that match. All of this helps understand
    how well the index is meeting spatial query requirements.'
