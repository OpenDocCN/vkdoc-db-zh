    \ there are `included_columns` values listed. On the fourth missing index suggestion,\
    \ it suggests including the column `OrderDate`. Since it will be one of the key\
    \ columns of the index, it doesn’t need to be included. The other column, from\
    \ the third missing index suggestion, is the `CustomerID` column. While only one\
    \ index needs this column, as an included column, the addition of this column\
    \ would likely be negligible since it is a narrow column. There would be value\
    \ in adding this column to the index, though it may not be required to obtain\
    \ desired performance on the query.\n\nAfter looking at these results and considering\
    \ four missing index suggestions, a single suggestion for one index that can cover\
    \ all four of the missing index items was able to be proposed. If an index is\
    \ built using a DDL statement similar to that in Listing [12-3](#338675_4_En_12_Chapter.xhtml#PC3),\
    \ the result will be an index that solves each of these missing indexes. If the\
    \ queries in Listing [12-1](#338675_4_En_12_Chapter.xhtml#PC1) are executed again,\
    \ the execution plan output will show all of the queries are now using index seeks\
    \ against the new index, shown in Figure [12-3](#338675_4_En_12_Chapter.xhtml#Fig3).\n\
    \n![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig3_HTML.png)\n\nA panel of\
    \ an opened execution plan tab containing 4 sets of 2 lines of text that represent\
    \ 4 different queries with query cost, relative to the batch, at 20% for the first\
    \ and 27% for the rest. Each set has a flow diagram exhibiting its respective\
    \ index seek, nonclustered, sales order header, entry at 100% cost pointing at\
    \ select at 0% cost.\n\nFigure 12-3\n\nExecution plans for queries after missing\
    \ index creation\n\n```\nUSE AdventureWorks2017\nGO\nCREATE NONCLUSTERED INDEX\
    \ missing_index_SalesOrderHeader\nON Sales.SalesOrderHeader([DueDate], [OrderDate])\n\
    INCLUDE ([CustomerID])\nListing 12-3\nIndex from Missing Index DMOs\n```\n\nNote\n\
    \nThere are many negative opinions regarding the value of the Database Engine\
    \ Tuning Advisor. This is a tool that fills a role, and provided a sufficient\
    \ workload is used with the tool, it will return worthwhile recommendations. These\
    \ recommendations provide a better starting point for tuning a database than starting\
    \ with nothing.\n\n## Database Engine Tuning Advisor\n\nThe other indexing tool\
    \ available in SQL Server is the Database Engine Tuning Advisor. This tool allows\
    \ SQL Server to analyze a workload from a file, a table, the plan cache, or the\
    \ Query Store. The output of the DTA can assist in providing recommendations for\
    \ indexing and configuring partitions for the workload. The chief benefit of using\
    \ the tool is that it does not require a deep understanding of the underlying\
    \ databases to make the recommendations.\n\nWhether working with a single query\
    \ or a full day’s workload, the DTA provides index recommendations for the following\
    \ types of objects:\n\n*   Rowstore and columnstore tables for both clustered\
    \ and non-clustered indexes\n\n*   Aligned or nonaligned partitions\n\n*   Views\
    \ that could support indexing\n\nWith the sessions in the DTA, it is possible\
    \ to really focus the recommendations on what is expected from a given environment.\
    \ It is possible to leverage workload based on a specific environment, whether\
    \ transactional or analytical, and set the focus on both reads and writes so that\
    \ index recommendations are provided that align to those needs. It is also possible\
    \ to modify the environment to look for indexing recommendations for changes in\
    \ disk space.\n\nOnce the analysis is completed, the DTA provides a number of\
    \ reports and outputs. This information allows the recommendations to be reviewed\
    \ and to develop an understanding of how it will impact the database.\n\nAlthough\
    \ the DTA has quite a few capabilities, there are also some limitations on the\
    \ tool. The following are some of these limitations:\n\n*   Not able to recommend\
    \ indexes on system tables.\n\n*   Cannot add or drop unique indexes or indexes\
    \ that enforce primary key or unique constraints.\n\n*   May provide variations\
    \ in recommendations on some workloads. The DTA samples data while it executes,\
    \ which will influence the recommendations.\n\n*   Unable to tune trace tables\
    \ on remote servers.\n\n*   Constraints placed on tuning workloads can have a\
    \ negative impact on suggestions if the tuning session exceeds the constraints.\n\
    \n    **Note** As an indexing tool, the DTA can easily be misused. This is often\
    \ due to not providing a representative workload or to taking recommendations\
    \ without proper testing. When using the tool, be sure to validate any change\
    \ that is recommended and test those changes thoroughly before applying them to\
    \ a production environment."
  trans: '

    接下来要查看的是 `included_columns`。在四个建议中的两个，列出了 `included_columns` 值。在第四个缺失索引建议中，它建议包含
    `OrderDate` 列。由于它将成为索引的关键列之一，因此无需被包含。另一个列来自第三个缺失索引建议，即 `CustomerID` 列。虽然只有一个索引需要此列作为包含列，但添加此列的影响可能微乎其微，因为它是一个窄列。将此列添加到索引中会有价值，尽管对于实现查询的预期性能可能并非必需。


    在查看了这些结果并考虑了四个缺失索引建议后，我们能够提出一个单一索引建议，该索引可以覆盖所有四个缺失索引项。如果使用类似于代码清单 12-3 中的 DDL
    语句构建索引，其结果将是一个解决了这些缺失索引问题的索引。如果再次执行代码清单 12-1 中的查询，执行计划输出将显示所有查询现在都使用针对新索引的索引查找，如图
    12-3 所示。


    ![](img/338675_4_En_12_Fig3_HTML.png)


    图 12-3。创建缺失索引后的查询执行计划


    ```

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX missing_index_SalesOrderHeader

    ON Sales.SalesOrderHeader([DueDate], [OrderDate])

    INCLUDE ([CustomerID])

    ```


    `注意`：关于 `数据库引擎优化顾问` 的价值存在许多负面意见。该工具有其适用场景，如果为其提供足够代表性的工作负载，它将返回有价值的建议。这些建议为调优数据库提供了一个比毫无头绪更好的起点。


    ## 数据库引擎优化顾问


    SQL Server 中可用的另一个索引工具是 `数据库引擎优化顾问`。该工具允许 SQL Server 分析来自文件、表、计划缓存或查询存储的工作负载。`DTA`
    的输出可以为工作负载的索引和分区配置提供建议。使用该工具的主要好处是，它不需要深入理解底层数据库即可提出建议。


    无论是处理单个查询还是全天的工作负载，`DTA` 都为以下类型的对象提供索引建议：


    *   用于聚集和非聚集索引的行存储表和列存储表

    *   对齐或非对齐分区

    *   可以支持索引的视图


    通过 `DTA` 中的会话，可以真正将建议重点放在特定环境（无论是事务型还是分析型）的预期上，并同时关注读和写操作，从而提供与这些需求相符的索引建议。还可以修改环境，以查找因磁盘空间变化而产生的索引建议。


    分析完成后，`DTA` 会提供多个报告和输出。这些信息允许审查建议并了解其对数据库的影响。


    尽管 `DTA` 功能相当强大，但该工具也存在一些限制。以下是一些限制：


    *   无法在系统表上推荐索引。

    *   无法添加或删除唯一索引或强制执行主键或唯一约束的索引。

    *   在某些工作负载上可能提供不同的建议。`DTA` 在执行时会采样数据，这将影响建议。

    *   无法对远程服务器上的跟踪表进行调优。

    *   如果调优会话超出限制，对调优工作负载施加的限制可能对建议产生负面影响。


    `注意`：作为一种索引工具，`DTA` 很容易被滥用。这通常是由于未提供代表性工作负载或未经适当测试就采纳建议所致。使用该工具时，请务必验证所建议的任何更改，并在将其应用于生产环境之前彻底测试这些更改。

