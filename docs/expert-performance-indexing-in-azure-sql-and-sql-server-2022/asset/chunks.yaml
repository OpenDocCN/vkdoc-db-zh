    Statistics I/O results for the computed and indexed JSON column


    By leveraging computed columns, JSON data can be easily and efficiently accessed
    within a table. Rather than needing to learn about new indexing technologies to
    gain that efficiency, it is possible to leverage existing features. This makes
    it easier to both adopt and support JSON and efficiently query JSON data.


    ## Index Storage Strategies


    The strategies in the chapter have thus far primarily focused on improving the
    performance of queries using indexes through the key and non-key column design
    of the index. There are other options that can be used in conjunction to column
    selection that can be considered in the design of indexes. These alternative strategies
    all relate to the way in which indexes are stored in the database.


    There are two options available for addressing how an index stores its data. The
    basic premise for both of these options is that the smaller the index, the fewer
    pages that it will contain, and the fewer reads and writes will be required when
    querying the data. The first option available is row compression, and the second
