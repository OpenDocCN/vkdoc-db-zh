- fmt: '# Number of Deadlocks per Second


    In extreme cases, poor indexing and excessive locking/blocking can lead to deadlocks.
    Deadlocks occur in situations where locks have been placed by two or more transactions
    in which the locking order of one of the transactions is prevented from acquiring
    and/or releasing its locks because of the locks of the other transactions. If
    an application does not explicitly retry queries that deadlock, then the result
    can be important transactions never getting executed. This can have profoundly
    negative consequences for an application that manages important user data. There
    are a number of ways to address deadlocking, one of which is to improve indexing.


    To determine whether deadlocks are occurring on the SQL Server instance, review
    the performance counters collected during the monitoring process. The query in
    Listing 16-23 provides an overview of the deadlock rate during the monitoring
    window. The query returns aggregate values for the minimum, average, maximum,
    and standard deviation for the deadlocks on the server.


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    Calculated_Counter_value AS NumberDeadlocks

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Number of Deadlocks/sec'')

    SELECT server_name,

    MIN(NumberDeadlocks) AS MinNumberDeadlocks,

    AVG(NumberDeadlocks) AS AvgNumberDeadlocks,

    MAX(NumberDeadlocks) AS MaxNumberDeadlocks,

    STDEV(NumberDeadlocks) AS StdDevNumberDeadlocks

    FROM CounterSummary

    GROUP BY server_name;

    ```

    **Listing 16-23** Number of Deadlocks Counter Analysis


    In general, a well-tuned database platform should not have deadlocks occurring.
    When they occur, each should be investigated to determine the root cause for the
    deadlock. Before a deadlock can be examined, though, the deadlock first needs
    to be retrieved.


    There are a number of ways in which deadlock information can be collected from
    SQL Server. These include trace flags, SQL Profiler, and event notifications.
    Another method is through Extended Events, using the built-in `system_health`
    session. The query in Listing 16-24 returns a list of all the deadlocks that are
    currently in the `ring_buffer` for that session.


    ```sql

    USE IndexingMethod;

    GO

    WITH deadlock

    AS (SELECT CAST(target_data AS XML) AS target_data

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''system_health''

    AND target_name = ''ring_buffer'')

    SELECT c.value(''(@timestamp)[1]'', ''datetime'') AS event_timestamp,

    c.query(''data/value/deadlock'')

    FROM deadlock d

    CROSS APPLY target_data.nodes(''//RingBufferTarget/event'') AS t(c)

    WHERE c.exist(''.[@name = "xml_deadlock_report"]'') = 1;

    ```

    **Listing 16-24** System-Health Deadlock Query


    When deadlocks have been identified, they are returned in an XML document. For
    most, reading the XML documents is not a natural way to examine a deadlock. Instead,
    it is often preferable to review the deadlock graph that is associated with the
    deadlock, such as the one shown in Figure 16-10. To obtain a deadlock graph for
    any of the deadlocks returned by Listing 16-22, open the deadlock XML document
    in SQL Server Management Studio, and then save the file with an `.xdl` extension.
    When the file is reopened, it will open with the deadlock graph instead of as
    an XML document.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig10_HTML.png)


    *A diagram illustrates deadlock between 2 servers. Server A sends request mode
    U to key lock. The key lock sends owner mode X to server B. Server B sends request
    mode to another key lock. It sends owner mode to server A.*


    **Figure 16-10** Deadlock graph in SQL Server Management Studio


    Once deadlocks are identified, it is important to determine why they occur to
    prevent them from recurring. A common issue that causes deadlocks is the order
    of operations between numerous transactions. This cause is often difficult to
    resolve since it may require rewriting parts of applications. To address deadlocks,
    one of the easiest approaches is to decrease the amount of time in which the transaction
    occurs. Indexing the tables that are accessed is a typical approach that can resolve
    deadlocks in many cases by shrinking the window in which deadlocks can be created.


    # Wait Statistics


    The analysis process for wait statistics is similar to that of performance counters.
    For both sets of data, the information points to areas where resources are potentially
    being taxed, identifying the resources and indicating next steps. A lot of the
    same processes for performance counters apply to wait statistics. One main difference
    between the two sets of information is that wait statistics are looked at as a
    whole, and their value is determined by comparing them to other wait statistics
    on the SQL Server instance.


    Because of this difference, when reviewing wait statistics, there is only a single
    query required for analysis. Before using the wait statistics analysis query,
    provided in Listing 16-25, there are a few aspects to wait statistics analysis
    that should be discussed.


    First, as the list of ignore wait stats shows, there are some wait states that
    accumulate regardless of the activity on the server. For these, there is not any
    value in investigating behavior related to them, either because they are just
    the ticking of CPU time on the server or they are related to internal operations
    that cannot be affected. As such, they are out-of-scope for a discussion of indexing.


    Second, the value in wait statistics is in looking at them in relationship to
    the time that has transpired on the server. While one wait state being higher
    than another is important, without knowing the amount of time that has transpired,
    there is no scale by which to measure the pressure the wait state is having on
    the server. To accommodate for this, the waits from the first set of results in
    the monitoring table are ignored, and the date between them and the last collection
    point is used to calculate the time that has transpired. The length of time that
    a wait state occurred compared to the total time provides the values needed to
    determine the pressure of the wait state on the SQL Server instance.


    **Note** The `pct` columns in the results for Listing 16-25 will be null if there
    is only a single sample in the table `dbo.wait_stats_history`.'
  raw: '#### Number of Deadlocks per Second


    In extreme cases, poor indexing and excessive locking/blocking can lead to deadlocks.
    Deadlocks occur in situations where locks have been placed by two or more transactions
    in which the locking order of one of the transactions is prevented from acquiring
    and/or releasing its locks because of the locks of the other transactions. If
    an application does not explicitly retry queries that deadlock, then the result
    can be important transactions never getting executed. This can have profoundly
    negative consequences for an application that manages important user data. There
    are a number of ways to address deadlocking, one of which is to improve indexing.


    To determine whether deadlocks are occurring on the SQL Server instance, review
    the performance counters collected during the monitoring process. The query in
    Listing [16-23](#338675_4_En_16_Chapter.xhtml#PC23) provides an overview of the
    deadlock rate during the monitoring window. The query returns aggregate values
    for the minimum, average, maximum, and standard deviation for the deadlocks on
    the server.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    Calculated_Counter_value AS NumberDeadlocks

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Number of Deadlocks/sec'')

    SELECT server_name,

    MIN(NumberDeadlocks) AS MinNumberDeadlocks,

    AVG(NumberDeadlocks) AS AvgNumberDeadlocks,

    MAX(NumberDeadlocks) AS MaxNumberDeadlocks,

    STDEV(NumberDeadlocks) AS StdDevNumberDeadlocks

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-23

    Number of Deadlocks Counter Analysis

    ```


    In general, a well-tuned database platform should not have deadlocks occurring.
    When they occur, each should be investigated to determine the root cause for the
    deadlock. Before a deadlock can be examined, though, the deadlock first needs
    to be retrieved. There are a number of ways in which deadlock information can
    be collected from SQL Server. These include trace flags, SQL Profiler, and event
    notifications. Another method is through Extended Events, using the built-in `system_health`
    session. The query in Listing [16-24](#338675_4_En_16_Chapter.xhtml#PC24) returns
    a list of all the deadlocks that are currently in the `ring_buffer` for that session.


    ```

    USE IndexingMethod;

    GO

    WITH deadlock

    AS (SELECT CAST(target_data AS XML) AS target_data

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''system_health''

    AND target_name = ''ring_buffer'')

    SELECT c.value(''(@timestamp)[1]'', ''datetime'') AS event_timestamp,

    c.query(''data/value/deadlock'')

    FROM deadlock d

    CROSS APPLY target_data.nodes(''//RingBufferTarget/event'') AS t(c)

    WHERE c.exist(''.[@name = "xml_deadlock_report"]'') = 1;

    Listing 16-24

    System-Health Deadlock Query

    ```


    When deadlocks have been identified, they are returned in an XML document. For
    most, reading the XML documents is not a natural way to examine a deadlock. Instead,
    it is often preferable to review the deadlock graph that is associated with the
    deadlock, such as the one shown in Figure [16-10](#338675_4_En_16_Chapter.xhtml#Fig10).
    To obtain a deadlock graph for any of the deadlocks returned by Listing [16-22](#338675_4_En_16_Chapter.xhtml#PC22),
    open the deadlock XML document in SQL Server Management Studio, and then save
    the file with an `.xdl` extension. When the file is reopened, it will open with
    the deadlock graph instead of as an XML document.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig10_HTML.png)


    A diagram illustrates deadlock between 2 servers. Server A sends request mode
    U to key lock. The key lock sends owner mode X to server B. Server B sends request
    mode to another key lock. It sends owner mode to server A.


    Figure 16-10


    Deadlock graph in SQL Server Management Studio


    Once deadlocks are identified, it is important to determine why they occur to
    prevent them from recurring. A common issue that causes deadlocks is the order
    of operations between numerous transactions. This cause is often difficult to
    resolve since it may require rewriting parts of applications. To address deadlocks,
    one of the easiest approaches is to decrease the amount of time in which the transaction
    occurs. Indexing the tables that are accessed is a typical approach that can resolve
    deadlocks in many cases by shrinking the window in which deadlocks can be created.


    ### Wait Statistics


    The analysis process for wait statistics is similar to that of performance counters.
    For both sets of data, the information points to areas where resources are potentially
    being taxed, identifying the resources and indicating next steps. A lot of the
    same processes for performance counters apply to wait statistics. One main difference
    between the two sets of information is that wait statistics are looked at as a
    whole, and their value is determined by comparing them to other wait statistics
    on the SQL Server instance.


    Because of this difference, when reviewing wait statistics, there is only a single
    query required for analysis. Before using the wait statistics analysis query,
    provided in Listing [16-25](#338675_4_En_16_Chapter.xhtml#PC25), there are a few
    aspects to wait statistics analysis that should be discussed. First, as the list
    of ignore wait stats shows, there are some wait states that accumulate regardless
    of the activity on the server. For these, there is not any value in investigating
    behavior related to them, either because they are just the ticking of CPU time
    on the server or they are related to internal operations that cannot be affected.
    As such, they are out-of-scope for a discussion of indexing. Second, the value
    in wait statistics is in looking at them in relationship to the time that has
    transpired on the server. While one wait state being higher than another is important,
    without knowing the amount of time that has transpired, there is no scale by which
    to measure the pressure the wait state is having on the server. To accommodate
    for this, the waits from the first set of results in the monitoring table are
    ignored, and the date between them and the last collection point is used to calculate
    the time that has transpired. The length of time that a wait state occurred compared
    to the total time provides the values needed to determine the pressure of the
    wait state on the SQL Server instance.


    Note


    The pct columns in the results for Listing [16-25](#338675_4_En_16_Chapter.xhtml#PC25)
    will be null if there is only a single sample in the table dbo.wait_stats_history.'
  trans: '# 每秒死锁数


    在极端情况下，索引性能低下和过多的锁定/阻塞可能导致死锁。死锁发生的情况是：两个或多个事务放置了锁，其中一个事务的锁定顺序因其他事务的锁而被阻止获取和/或释放其锁。如果应用程序不明确重试发生死锁的查询，其结果可能是重要的事务永远无法执行。对于管理重要用户数据的应用程序来说，这可能产生深远的负面影响。有多种方法可以解决死锁问题，其中之一是改进索引。


    要确定 SQL Server 实例上是否发生死锁，请检查在监控期间收集的性能计数器。清单 16-23 中的查询提供了在监控窗口期内死锁率的概览。该查询返回服务器上死锁的最小值、平均值、最大值和标准差等聚合值。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    Calculated_Counter_value AS NumberDeadlocks

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Number of Deadlocks/sec'')

    SELECT server_name,

    MIN(NumberDeadlocks) AS MinNumberDeadlocks,

    AVG(NumberDeadlocks) AS AvgNumberDeadlocks,

    MAX(NumberDeadlocks) AS MaxNumberDeadlocks,

    STDEV(NumberDeadlocks) AS StdDevNumberDeadlocks

    FROM CounterSummary

    GROUP BY server_name;

    ```

    **清单 16-23** 每秒死锁数计数器分析


    通常，一个经过良好调优的数据库平台不应发生死锁。当死锁发生时，应对每一次死锁进行调查以确定其根本原因。然而，在检查死锁之前，首先需要检索死锁信息。


    有多种方法可以从 SQL Server 收集死锁信息。这些方法包括跟踪标志、SQL Profiler 和事件通知。另一种方法是使用内置的 `system_health`
    会话，通过扩展事件。清单 16-24 中的查询返回当前该会话的 `ring_buffer` 中所有死锁的列表。


    ```sql

    USE IndexingMethod;

    GO

    WITH deadlock

    AS (SELECT CAST(target_data AS XML) AS target_data

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''system_health''

    AND target_name = ''ring_buffer'')

    SELECT c.value(''(@timestamp)[1]'', ''datetime'') AS event_timestamp,

    c.query(''data/value/deadlock'')

    FROM deadlock d

    CROSS APPLY target_data.nodes(''//RingBufferTarget/event'') AS t(c)

    WHERE c.exist(''.[@name = "xml_deadlock_report"]'') = 1;

    ```

    **清单 16-24** 系统运行状况死锁查询


    当识别出死锁时，它们会以 XML 文档的形式返回。对大多数人来说，阅读 XML 文档并不是检查死锁的自然方式。相反，通常更可取的方法是查看与死锁关联的死锁图，例如图
    16-10 中所示的那个。要获取清单 16-22 返回的任何一个死锁的死锁图，请在 SQL Server Management Studio 中打开死锁 XML
    文档，然后将文件保存为 `.xdl` 扩展名。当文件重新打开时，它将显示为死锁图，而不是 XML 文档。


    ![](img/338675_4_En_16_Fig10_HTML.png)


    *该图展示了 2 台服务器之间的死锁。服务器 A 以 U（更新）模式向键锁发送请求。该键锁以 X（排他）模式向服务器 B 发送所有者模式。服务器 B 以请求模式向另一个键锁发送请求。它以所有者模式向服务器
    A 发送请求。*


    **图 16-10** SQL Server Management Studio 中的死锁图


    一旦死锁被识别，重要的是确定它们发生的原因以防止其再次发生。导致死锁的一个常见问题是多个事务之间的操作顺序。这个原因通常难以解决，因为它可能需要重写部分应用程序代码。为了解决死锁，最简单的方法之一是减少事务发生的时间。对访问的表进行索引是一种典型方法，在许多情况下可以通过缩小可能产生死锁的时间窗口来解决死锁。


    # 等待统计


    等待统计的分析过程与性能计数器的分析过程类似。对于这两组数据，信息都指向资源可能正承受压力的区域，识别出这些资源并指出后续步骤。许多适用于性能计数器的流程同样适用于等待统计。这两组信息的一个主要区别在于，等待统计是作为一个整体来审视的，其价值是通过与
    SQL Server 实例上的其他等待统计进行比较来确定的。


    由于这个区别，在查看等待统计时，分析只需要一个查询。在使用清单 16-25 提供的等待统计分析查询之前，有几个关于等待统计分析的方面应该讨论一下。


    首先，正如忽略等待统计列表所显示的那样，有些等待状态无论服务器上的活动如何都会累积。对于这些，调查与其相关的行为没有任何价值，原因要么是它们只是服务器上 CPU
    时间的推移，要么是与无法影响的内部操作有关。因此，它们不在索引讨论的范围内。


    其次，等待统计的价值在于将其与服务器上经过的时间关联起来审视。虽然一个等待状态高于另一个等待状态很重要，但如果没有知道经过的时间量，就没有衡量该等待状态对服务器造成压力的尺度。为了解决这个问题，监控表中第一组结果中的等待会被忽略，并使用它们与最后一个收集点之间的日期来计算经过的时间。等待状态发生的时长与总时间相比，提供了确定该等待状态对
    SQL Server 实例压力所需的数值。


    **注意** 如果表 `dbo.wait_stats_history` 中只有一个样本，清单 16-25 结果中的 `pct` 列将为 null。'
- fmt: '## Listing 16-25 Wait Statistics Analysis Query


    ```sql

    USE IndexingMethod;

    GO

    WITH WaitStats

    AS (SELECT DENSE_RANK() OVER (ORDER BY w.create_date ASC) AS RankID,

    create_date,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms,

    MIN(create_date) OVER () AS min_create_date,

    MAX(create_date) OVER () AS max_create_date

    FROM dbo.wait_stats_history w

    WHERE wait_type NOT IN ( ''BROKER_EVENTHANDLER'', ''BROKER_RECEIVE_WAITFOR'',
    ''BROKER_TASK_STOP'', ''BROKER_TO_FLUSH'', ''BROKER_TRANSMITTER'', ''CHECKPOINT_QUEUE'',
    ''CHKPT'', ''CLR_AUTO_EVENT'', ''CLR_MANUAL_EVENT'', ''CLR_SEMAPHORE'', ''CXCONSUMER'',
    ''DBMIRROR_DBM_EVENT'', ''DBMIRROR_EVENTS_QUEUE'', ''DBMIRROR_WORKER_QUEUE'',
    ''DBMIRRORING_CMD'', ''DIRTY_PAGE_POLL'', ''DISPATCHER_QUEUE_SEMAPHORE'', ''EXECSYNC'',
    ''FSAGENT'', ''FT_IFTS_SCHEDULER_IDLE_WAIT'', ''FT_IFTSHC_MUTEX'', ''HADR_CLUSAPI_CALL'',
    ''HADR_FILESTREAM_IOMGR_IOCOMPLETIO,'', ''HADR_LOGCAPTURE_WAIT'', ''HADR_NOTIFICATION_DEQUEUE'',
    ''HADR_TIMER_TASK'', ''HADR_WORK_QUEUE'', ''KSOURCE_WAKEUP'', ''LAZYWRITER_SLEEP'',
    ''LOGMGR_QUEUE'', ''MEMORY_ALLOCATION_EXT'', ''ONDEMAND_TASK_QUEUE'', ''PARALLEL_REDO_DRAIN_WORKER'',
    ''PARALLEL_REDO_LOG_CACHE'', ''PARALLEL_REDO_TRAN_LIST'', ''PARALLEL_REDO_WORKER_SYNC'',
    ''PARALLEL_REDO_WORKER_WAIT_WORK'', ''PREEMPTIVE_HADR_LEASE_MECHANISM'', ''PREEMPTIVE_SP_SERVER_DIAGNOSTICS'',
    ''PREEMPTIVE_OS_LIBRARYOPS'', ''PREEMPTIVE_OS_COMOPS'', ''PREEMPTIVE_OS_CRYPTOPS'',
    ''PREEMPTIVE_OS_PIPEOPS'', ''PREEMPTIVE_OS_AUTHENTICATIONOPS'', ''PREEMPTIVE_OS_GENERICOPS'',
    ''PREEMPTIVE_OS_VERIFYTRUST'', ''PREEMPTIVE_OS_FILEOPS'', ''PREEMPTIVE_OS_DEVICEOPS'',
    ''PREEMPTIVE_OS_QUERYREGISTRY'', ''PREEMPTIVE_OS_WRITEFILE'', ''PREEMPTIVE_XE_CALLBACKEXECUTE'',
    ''PREEMPTIVE_XE_DISPATCHER'', ''PREEMPTIVE_XE_GETTARGETSTATE'', ''PREEMPTIVE_XE_SESSIONCOMMIT'',
    ''PREEMPTIVE_XE_TARGETINIT'', ''PREEMPTIVE_XE_TARGETFINALIZE'', ''PWAIT_ALL_COMPONENTS_INITIALIZED'',
    ''PWAIT_DIRECTLOGCONSUMER_GETNEXT'', ''PWAIT_EXTENSIBILITY_CLEANUP_TASK'', ''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP'',
    ''QDS_ASYNC_QUEUE'', ''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP'', ''REQUEST_FOR_DEADLOCK_SEARCH'',
    ''RESOURCE_QUEUE'', ''SERVER_IDLE_CHECK'', ''SLEEP_BPOOL_FLUSH'', ''SLEEP_DBSTARTUP'',
    ''SLEEP_DCOMSTARTUP'', ''SLEEP_MASTERDBREADY'', ''SLEEP_MASTERMDREADY'', ''SLEEP_MASTERUPGRADED'',
    ''SLEEP_MSDBSTARTUP'', ''SLEEP_SYSTEMTASK'', ''SLEEP_TASK'', ''SLEEP_TEMPDBSTARTUP'',
    ''SNI_HTTP_ACCEPT'', ''SOS_WORK_DISPATCHER'', ''SP_SERVER_DIAGNOSTICS_SLEEP'',
    ''SQLTRACE_BUFFER_FLUSH'', ''SQLTRACE_INCREMENTAL_FLUSH_SLEEP'', ''SQLTRACE_WAIT_ENTRIES'',
    ''STARTUP_DEPENDENCY_MANAGER'', ''WAIT_FOR_RESULTS'', ''WAITFOR'', ''WAITFOR_TASKSHUTDOW'',
    ''WAIT_XTP_HOST_WAIT'', ''WAIT_XTP_OFFLINE_CKPT_NEW_LOG'', ''WAIT_XTP_CKPT_CLOSE'',
    ''WAIT_XTP_RECOVERY'', ''XE_BUFFERMGR_ALLPROCESSED_EVENT'', ''XE_DISPATCHER_JOI,'',
    ''XE_DISPATCHER_WAIT'', ''XE_LIVE_TARGET_TVF'', ''XE_TIMER_EVENT''))

    SELECT wait_type,

    DATEDIFF(ms, min_create_date, max_create_date) AS total_time_ms,

    SUM(waiting_tasks_count) AS waiting_tasks_count,

    SUM(wait_time_ms) AS wait_time_ms,

    CAST(1\. * SUM(wait_time_ms) / NULLIF(SUM(waiting_tasks_count),0) AS DECIMAL(18,
    3)) AS avg_wait_time_ms,

    CAST(100\. * SUM(wait_time_ms) / NULLIF(DATEDIFF(ms, min_create_date, max_create_date),0)
    AS DECIMAL(18, 3)) AS pct_time_in_wait,

    SUM(signal_wait_time_ms) AS signal_wait_time_ms,

    CAST(100\. * SUM(signal_wait_time_ms) / NULLIF(SUM(wait_time_ms), 0) AS DECIMAL(18,
    3)) AS pct_time_runnable

    FROM WaitStats

    GROUP BY wait_type,

    min_create_date,

    max_create_date

    ORDER BY SUM(wait_time_ms) DESC;

    ```


    该查询包含许多计算，有助于识别特定等待类型何时出现问题。为更好地理解提供的信息，请参见表[16-1](#338675_4_En_16_Chapter.xhtml#Tab1)中的定义。这些计算及其定义将有助于聚焦与等待统计信息相关的性能问题。


    在查看等待统计信息查询的结果（如图[16-11](#338675_4_En_16_Chapter.xhtml#Fig11)所示）时，有两个阈值需要注意。首先，如果任何等待超过总等待时间的`5%`，则可能存在与该等待类型相关的瓶颈，应进行进一步调查。类似地，如果任何等待超过时间的`1%`，应考虑进行进一步分析，但在分析更高等待的项目之后再进行。审查等待统计信息时需要考虑的一点是，如果等待所花费的时间主要是因为`signal_wait_time_ms`，那么首先关注服务器上的`CPU`压力可以更好地解决资源争用问题。


    ![图 16-11](images/338675_4_En_16_Chapter/338675_4_En_16_Fig11_HTML.png)


    *一个包含 8 列和 10 行的表格。列标题为：等待类型、总时间（毫秒）、等待任务数、等待时间（毫秒）、平均等待时间（毫秒）、等待时间百分比、信号等待时间（毫秒）和可运行时间百分比。*


    **图 16-11** 等待统计信息分析输出


    **表 16-1** 等待统计信息查询列定义


    | 选项名称 | 描述 |

    | --- | --- |

    | `wait_type` | 引起等待的等待统计信息 |

    | `total_time_ms` | 查询测量的总时间（毫秒） |

    | `waiting_tasks_count` | 此等待类型的等待次数计数 |

    | `wait_time_ms` | 为此等待类型累计的时间（毫秒）。包括 `signal_wait_time_ms` 所花费的时间 |

    | `avg_wait_time_ms` | 每种等待类型的平均时间（毫秒） |

    | `pct_time_in_wait` | 为此等待类型花费的总时间百分比 |

    | `signal_wait_time_ms` | 等待类型可用且不再等待后、在开始运行前累计的时间（毫秒）。这是在 `RUNNABLE` 状态花费的时间
    |

    | `pct_time_runnable` | 此等待类型在 `RUNNABLE` 状态花费的时间百分比 |


    一旦识别出有问题的等待状态，下一步就是审查该等待及建议的应对措施。由于本章重点介绍更偏向索引相关的等待类型，我们将只关注这些定义。要了解其他等待类型，请查阅
    `sys.dm_os_wait_stats`（Transact SQL）的联机文档主题。'
  raw: '```

    USE IndexingMethod;

    GO

    WITH WaitStats

    AS (SELECT DENSE_RANK() OVER (ORDER BY w.create_date ASC) AS RankID,

    create_date,

    wait_type,

    waiting_tasks_count,

    wait_time_ms,

    max_wait_time_ms,

    signal_wait_time_ms,

    MIN(create_date) OVER () AS min_create_date,

    MAX(create_date) OVER () AS max_create_date

    FROM dbo.wait_stats_history w

    WHERE wait_type NOT IN ( ''BROKER_EVENTHANDLER'', ''BROKER_RECEIVE_WAITFOR'',
    ''BROKER_TASK_STOP'', ''BROKER_TO_FLUSH'', ''BROKER_TRANSMITTER'', ''CHECKPOINT_QUEUE'',
    ''CHKPT'', ''CLR_AUTO_EVENT'', ''CLR_MANUAL_EVENT'', ''CLR_SEMAPHORE'', ''CXCONSUMER'',
    ''DBMIRROR_DBM_EVENT'', ''DBMIRROR_EVENTS_QUEUE'', ''DBMIRROR_WORKER_QUEUE'',
    ''DBMIRRORING_CMD'', ''DIRTY_PAGE_POLL'', ''DISPATCHER_QUEUE_SEMAPHORE'', ''EXECSYNC'',
    ''FSAGENT'', ''FT_IFTS_SCHEDULER_IDLE_WAIT'', ''FT_IFTSHC_MUTEX'', ''HADR_CLUSAPI_CALL'',
    ''HADR_FILESTREAM_IOMGR_IOCOMPLETIO,'', ''HADR_LOGCAPTURE_WAIT'', ''HADR_NOTIFICATION_DEQUEUE'',
    ''HADR_TIMER_TASK'', ''HADR_WORK_QUEUE'', ''KSOURCE_WAKEUP'', ''LAZYWRITER_SLEEP'',
    ''LOGMGR_QUEUE'', ''MEMORY_ALLOCATION_EXT'', ''ONDEMAND_TASK_QUEUE'', ''PARALLEL_REDO_DRAIN_WORKER'',
    ''PARALLEL_REDO_LOG_CACHE'', ''PARALLEL_REDO_TRAN_LIST'', ''PARALLEL_REDO_WORKER_SYNC'',
    ''PARALLEL_REDO_WORKER_WAIT_WORK'', ''PREEMPTIVE_HADR_LEASE_MECHANISM'', ''PREEMPTIVE_SP_SERVER_DIAGNOSTICS'',
    ''PREEMPTIVE_OS_LIBRARYOPS'', ''PREEMPTIVE_OS_COMOPS'', ''PREEMPTIVE_OS_CRYPTOPS'',
    ''PREEMPTIVE_OS_PIPEOPS'', ''PREEMPTIVE_OS_AUTHENTICATIONOPS'', ''PREEMPTIVE_OS_GENERICOPS'',
    ''PREEMPTIVE_OS_VERIFYTRUST'', ''PREEMPTIVE_OS_FILEOPS'', ''PREEMPTIVE_OS_DEVICEOPS'',
    ''PREEMPTIVE_OS_QUERYREGISTRY'', ''PREEMPTIVE_OS_WRITEFILE'', ''PREEMPTIVE_XE_CALLBACKEXECUTE'',
    ''PREEMPTIVE_XE_DISPATCHER'', ''PREEMPTIVE_XE_GETTARGETSTATE'', ''PREEMPTIVE_XE_SESSIONCOMMIT'',
    ''PREEMPTIVE_XE_TARGETINIT'', ''PREEMPTIVE_XE_TARGETFINALIZE'', ''PWAIT_ALL_COMPONENTS_INITIALIZED'',
    ''PWAIT_DIRECTLOGCONSUMER_GETNEXT'', ''PWAIT_EXTENSIBILITY_CLEANUP_TASK'', ''QDS_PERSIST_TASK_MAIN_LOOP_SLEEP'',
    ''QDS_ASYNC_QUEUE'', ''QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP'', ''REQUEST_FOR_DEADLOCK_SEARCH'',
    ''RESOURCE_QUEUE'', ''SERVER_IDLE_CHECK'', ''SLEEP_BPOOL_FLUSH'', ''SLEEP_DBSTARTUP'',
    ''SLEEP_DCOMSTARTUP'', ''SLEEP_MASTERDBREADY'', ''SLEEP_MASTERMDREADY'', ''SLEEP_MASTERUPGRADED'',
    ''SLEEP_MSDBSTARTUP'', ''SLEEP_SYSTEMTASK'', ''SLEEP_TASK'', ''SLEEP_TEMPDBSTARTUP'',
    ''SNI_HTTP_ACCEPT'', ''SOS_WORK_DISPATCHER'', ''SP_SERVER_DIAGNOSTICS_SLEEP'',
    ''SQLTRACE_BUFFER_FLUSH'', ''SQLTRACE_INCREMENTAL_FLUSH_SLEEP'', ''SQLTRACE_WAIT_ENTRIES'',
    ''STARTUP_DEPENDENCY_MANAGER'', ''WAIT_FOR_RESULTS'', ''WAITFOR'', ''WAITFOR_TASKSHUTDOW'',
    ''WAIT_XTP_HOST_WAIT'', ''WAIT_XTP_OFFLINE_CKPT_NEW_LOG'', ''WAIT_XTP_CKPT_CLOSE'',
