    | has_ghost_records | Indicates whether the page has ghost records. |

    | has_version_records | Indicates whether the page has version records |

    | has_persisted_version_records | Indicates whether the page has persisted version
    records |

    | pfs_page_id | Page ID of the PFS page associated with this page |

    | pfs_is_allocated | Indicates whether the PFS page has allocated this page |

    | pfs_alloc_percent | Allocation percentage as indicated by the PFS page |

