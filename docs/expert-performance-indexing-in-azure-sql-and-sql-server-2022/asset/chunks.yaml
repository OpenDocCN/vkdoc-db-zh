- fmt: '# Page I/O Latch


    关于页面I/O闩锁，收集了两组与闩锁相关的数据：页面级闩锁和树页面闩锁。当需要检索索引叶子级别（数据页面）的数据页面时，会发生页面级闩锁。这与树页面闩锁不同，后者发生在索引的所有其他级别。这两个统计数据都是衡量在将数据移入缓冲区时创建的闩锁数量以及任何与延迟相关的时间的指标。每当时间在`page_io_latch_wait_in_ms`或`tree_page_io_latch_wait_in_ms`中累积时，都对应于`PAGEIOLATCH_*`等待类型的等待时间增加。


    为了更好地理解页面I/O闩锁如何发生以及如何收集这些统计数据，将回顾一个会导致这些等待发生的示例。在此演示中，将通过清单[5-34]中的脚本从`Sales.SalesOrderDetail`、`Sales.SalesOrderHeader`和`Production.Product`返回所有数据。在执行脚本之前，将清除缓冲区缓存以强制SQL
    Server从磁盘检索这些页面的数据。请确保仅在清除缓冲区缓存不会影响其他进程的非生产服务器上使用此脚本。


    ```sql

    USE AdventureWorks2017

    GO

    DBCC DROPCLEANBUFFERS

    GO

    SELECT *

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID;

    ```

    **清单 5-34** 生成页面I/O闩锁的T-SQL脚本


    查询完成后，将表和索引的页面复制到缓冲区缓存的过程中会发生许多页面I/O闩锁。要查看页面I/O闩锁，请使用清单[5-35]中的脚本查询`sys.dm_db_index_operational_stats`中的页面I/O闩锁列。结果显示在图[5-25]中，表明示例查询中的所有三个表都存在页面I/O闩锁等待，包括在`Sales.SalesOrderHeader`上发生的整整1毫秒的等待。此处的结果高度依赖于底层存储。因此，这些数字会因数据库使用的存储基础设施而有很大差异，但在相同硬件上重新测试时应保持一致。


    ![images/338675_4_En_5_Chapter/338675_4_En_5_Fig25_HTML.jpg](images/338675_4_En_5_Chapter/338675_4_En_5_Fig25_HTML.jpg)


    *图 5-25 页面I/O闩锁的查询结果。一个包含12行数据的查询表结果的截图。列标题为表名、索引名、页面I/O闩锁等待计数、页面I/O闩锁等待毫秒数和页面I/O平均锁等待毫秒数。*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_io_latch_wait_count

    ,page_io_latch_wait_in_ms

    ,CAST(1. * page_io_latch_wait_in_ms

    / NULLIF(page_io_latch_wait_count ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''Sales.SalesOrderHeader'')

    OR i.object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    OR i.object_id = OBJECT_ID(''Production.Product'')

    ORDER BY 5 DESC;

    ```

    **清单 5-35** 在`sys.dm_db_index_operational_stats`中查询页面I/O闩锁统计信息


    # Page Latch


    数据库中可能发生的另一种与索引相关的闩锁是页面闩锁。页面闩锁涵盖发生在非数据页面上的任何闩锁。页面闩锁包括GAM和SGAM页面的分配以及`DBCC`和备份活动。当页面被不同资源分配时，可能会发生争用，监控页面闩锁可以揭示这种活动。


    对于索引，页面闩锁可能发生的一种常见情况是，由于频繁插入或页面分配，在索引上形成“热点”。为了演示此场景，将在清单536中创建表`dbo.PageLatchDemo`。接下来，使用首选的负载生成工具，执行清单[5-37]中的代码五个会话。为了生成此示例的负载，在SQL
    Server Management Studio中打开五个查询窗口，每个窗口运行一个负载查询的副本。通过此示例，数百行数据将快速插入到同一系列页面中，并且将进行大量页面分配。由于这些插入操作非常接近，将形成“热点”，从而导致页面闩锁争用。


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.PageLatchDemo

    (FillerData)

    SELECT  t.object_id % 2

    FROM sys.tables t;

    GO 5000

    ```

    **清单 5-37** 生成页面闩锁负载的T-SQL脚本


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageLatchDemo'') IS NOT NULL

    DROP TABLE dbo.PageLatchDemo;

    CREATE TABLE dbo.PageLatchDemo

    (

    PageLatchDemoID INT IDENTITY (1,1)

    ,FillerData  bit

    ,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID PRIMARY KEY CLUSTERED  (PageLatchDemoID)

    );

    ```

    **清单 5-36** 生成页面闩锁场景的T-SQL脚本


    要验证页面闩锁争用是否确实发生，请使用清单[5-38]中提供的脚本。结果如图[5-26]所示，显示存在大量页面闩锁及其相关的延迟。在此示例中，每个页面闩锁的延迟超过20毫秒。在更关键的情况下，这些值会高得多，并有助于识别索引何时干扰对表的访问或写入数据。


    ![images/338675_4_En_5_Chapter/338675_4_En_5_Fig26_HTML.png](images/338675_4_En_5_Chapter/338675_4_En_5_Fig26_HTML.png)


    *图 5-26 页面闩锁的查询结果。一个包含一行数据的查询表结果的截图。列标题为表名、索引名、页面闩锁等待计数、页面闩锁等待毫秒数和页面平均锁等待毫秒数。*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_latch_wait_count

    ,page_latch_wait_in_ms

    ,CAST(100. * page_latch_wait_in_ms

    / NULLIF(page_latch_wait_count ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''dbo.PageLatchDemo'');

    ```

    **清单 5-38** 在`sys.dm_db_index_operational_stats`中查询页面闩锁统计信息


    > **注意**

    > 页面I/O和页面闩锁争用高度依赖于硬件。本节中的演示查询结果不会与所示结果完全匹配。'
  raw: '#### Page I/O Latch


    Two sets of latch-related data are collected with respect to page I/O latches:
    page-level latching and tree page latching. Page-level latching occurs when data
    pages at the leaf levels of an index (the data pages) need to be retrieved. This
    differs from tree page latching, which happens at all the other levels of the
    index. Both of these statistics are measures of the number of latches created
    while moving data into the buffer and any time related to delays. Whenever time
    is accumulated in `page_io_latch_wait_in_ms` or `tree_page_io_latch_wait_in_ms`,
    it correlates with increases in wait times for the `PAGEIOLATCH_`* `wait` types.


    To better understand how page I/O latches occur and the statistics can be collected,
    an example will be reviewed that will cause these waits to occur. In this demonstration,
    all data will be returned from `Sales.SalesOrderDetail`, `Sales.SalesOrderHeader`,
    and `Production.Product` via the script in Listing [5-34](#338675_4_En_5_Chapter.xhtml#PC34).
    Before executing the script, the buffer cache will be cleared to force SQL Server
    to retrieve the data for these pages from disk. Be sure to use this script only
    on a nonproduction server where clearing the buffer cache will not impact other
    processes.


    ```

    USE AdventureWorks2017

    GO

    DBCC DROPCLEANBUFFERS

    GO

    SELECT *

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID;

    Listing 5-34

    T-SQL Script to Generate Page I/O Latch

    ```


    When the query completes, a number of page I/O latches will have occurred while
    copying the pages for the tables and indexes into the buffer cache. To review
    the page I/O latches, query against `sys.dm_db_index_operational_stats` on the
    page I/O latch columns using the script in Listing [5-35](#338675_4_En_5_Chapter.xhtml#PC35).
    The results, shown in Figure [5-25](#338675_4_En_5_Chapter.xhtml#Fig25), indicate
    that there were page I/O latch waits on all three of the tables in the example
    query, including a whole 1 millisecond incurred on `Sales.SalesOrderHeader`. The
    results here are highly dependent on the underlying storage. Therefore, these
    numbers will vary greatly depending on the storage infrastructure used by this
    database, but should be consistent when retested against the same hardware.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig25_HTML.jpg)


    A screenshot of the query table results for page input output latch with 12 rows
    of data. The column headers are table name, index name, page i o latch wait count,
    page i o latch wait in m s, and page i o a v g lock wait m s.


    Figure 5-25


    Query results for page I/O latch


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_io_latch_wait_count

    ,page_io_latch_wait_in_ms

    ,CAST(1\. * page_io_latch_wait_in_ms

    / NULLIF(page_io_latch_wait_count ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''Sales.SalesOrderHeader'')

    OR i.object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    OR i.object_id = OBJECT_ID(''Production.Product'')

    ORDER BY 5 DESC;

    Listing 5-35

    Query for Page I/O Latch Statistics in sys.dm_db_index_operational_stats

    ```


    #### Page Latch


    The other kind of latching related to indexes that can occur in databases is page
    latching. Page latching covers any latching that occurs on non-data pages. Page
    latches include allocation of GAM and SGAM pages and `DBCC` and backup activities.
    As pages are allocated by different resources, contention can occur, and monitoring
    page latches can uncover this activity.


    With regard to an index, one common scenario in which page latches can occur is
    when a “hotspot” develops on an index because of frequent inserts or page allocations.
    To demonstrate this scenario, the table `dbo.PageLatchDemo` will be created in
    Listing 536\. Next, using a preferred load generator tool, execute five sessions
    of the code in Listing [5-37](#338675_4_En_5_Chapter.xhtml#PC37). To generate
    the load for this example, five query windows in SQL Server Management Studio
    run a copy of the load query. Through this example, hundreds of rows will be inserted
    quickly into the same series of pages, and numerous page allocations will be made.
    Since these inserts will be so close, a “hotspot” will be created, which will
    lead to page latch contention.


    ```

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.PageLatchDemo

    (FillerData)

    SELECT  t.object_id % 2

    FROM sys.tables t;

    GO 5000

    Listing 5-37

    T-SQL Script to Generate Page Latch Load

    ```


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageLatchDemo'') IS NOT NULL

    DROP TABLE dbo.PageLatchDemo;

    CREATE TABLE dbo.PageLatchDemo

    (

    PageLatchDemoID INT IDENTITY (1,1)

    ,FillerData  bit

    ,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID PRIMARY KEY CLUSTERED  (PageLatchDemoID)

    );

    Listing 5-36

    T-SQL Script to Generate Page Latch Scenario

    ```


    To verify that the page latch contention did occur, use the script provided in
    Listing [5-38](#338675_4_En_5_Chapter.xhtml#PC38). The results, provided in Figure
    [5-26](#338675_4_En_5_Chapter.xhtml#Fig26), show that there were numerous page
    latches and delays associated with them. In this example, the delay per page latch
    was over 20 milliseconds. In more critical situations, these values will be much
    higher and will help identify when an index is interfering with accessing or writing
    data to a table.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig26_HTML.png)


    A screenshot of the query table results for page latch with a row of data. The
    column headers are table name, index name, page latch wait count, page latch wait
    in m s, and page a v g lock wait m s.


    Figure 5-26


    Query results for page latch


    ```

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_latch_wait_count

    ,page_latch_wait_in_ms

    ,CAST(100\. * page_latch_wait_in_ms

    / NULLIF(page_latch_wait_count ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''dbo.PageLatchDemo'');

    Listing 5-38

    Query for Page Latch Statistics in sys.dm_db_index_operational_stat

    ```


    Note


    Page I/O and page latch contentions are highly hardware-dependent. Results for
    the demonstration queries in this section will not identically match the results
    shown.'
  trans: '# Page I/O Latch


    关于页面 I/O 闩锁，收集了两组与闩锁相关的数据：页面级闩锁和树页面闩锁。当需要检索索引叶子级别（数据页面）的数据页面时，会发生页面级闩锁。这与树页面闩锁不同，后者发生在索引的所有其他级别。这两个统计数据都是衡量在将数据移入缓冲区时创建的闩锁数量以及任何与延迟相关的时间的指标。每当时间在`page_io_latch_wait_in_ms`或`tree_page_io_latch_wait_in_ms`中累积时，都对应于`PAGEIOLATCH_*`等待类型的等待时间增加。


    为了更好地理解页面 I/O 闩锁如何发生以及如何收集这些统计数据，将回顾一个会导致这些等待发生的示例。在此演示中，将通过清单[5-34]中的脚本从`Sales.SalesOrderDetail`、`Sales.SalesOrderHeader`和`Production.Product`返回所有数据。在执行脚本之前，将清除缓冲区缓存以强制
    SQL Server 从磁盘检索这些页面的数据。请确保仅在清除缓冲区缓存不会影响其他进程的非生产服务器上使用此脚本。


    ```sql

    USE AdventureWorks2017

    GO

    DBCC DROPCLEANBUFFERS

    GO

    SELECT *

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Sales.SalesOrderHeader soh ON sod.SalesOrderID = soh.SalesOrderID

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID;

    ```

    **清单 5-34** 生成页面 I/O 闩锁的 T-SQL 脚本


    查询完成后，将表和索引的页面复制到缓冲区缓存的过程中会发生许多页面 I/O 闩锁。要查看页面 I/O 闩锁，请使用清单[5-35]中的脚本查询`sys.dm_db_index_operational_stats`中的页面
    I/O 闩锁列。结果显示在图[5-25]中，表明示例查询中的所有三个表都存在页面 I/O 闩锁等待，包括在`Sales.SalesOrderHeader`上发生的整整
    1 毫秒的等待。此处的结果高度依赖于底层存储。因此，这些数字会因数据库使用的存储基础设施而有很大差异，但在相同硬件上重新测试时应保持一致。


    ![images/338675_4_En_5_Chapter/338675_4_En_5_Fig25_HTML.jpg](img/338675_4_En_5_Fig25_HTML.jpg)


    *图 5-25 页面 I/O 闩锁的查询结果。一个包含 12 行数据的查询表结果的截图。列标题为表名、索引名、页面 I/O 闩锁等待计数、页面 I/O 闩锁等待毫秒数和页面
    I/O 平均锁等待毫秒数。*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_io_latch_wait_count

    ,page_io_latch_wait_in_ms

    ,CAST(1. * page_io_latch_wait_in_ms

    / NULLIF(page_io_latch_wait_count ,0) AS decimal(12,2)) AS page_io_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''Sales.SalesOrderHeader'')

    OR i.object_id = OBJECT_ID(''Sales.SalesOrderDetail'')

    OR i.object_id = OBJECT_ID(''Production.Product'')

    ORDER BY 5 DESC;

    ```

    **清单 5-35** 在`sys.dm_db_index_operational_stats`中查询页面 I/O 闩锁统计信息


    # Page Latch


    数据库中可能发生的另一种与索引相关的闩锁是页面闩锁。页面闩锁涵盖发生在非数据页面上的任何闩锁。页面闩锁包括 GAM 和 SGAM 页面的分配以及`DBCC`和备份活动。当页面被不同资源分配时，可能会发生争用，监控页面闩锁可以揭示这种活动。


    对于索引，页面闩锁可能发生的一种常见情况是，由于频繁插入或页面分配，在索引上形成“热点”。为了演示此场景，将在清单 536 中创建表`dbo.PageLatchDemo`。接下来，使用首选的负载生成工具，执行清单[5-37]中的代码五个会话。为了生成此示例的负载，在
    SQL Server Management Studio 中打开五个查询窗口，每个窗口运行一个负载查询的副本。通过此示例，数百行数据将快速插入到同一系列页面中，并且将进行大量页面分配。由于这些插入操作非常接近，将形成“热点”，从而导致页面闩锁争用。


    ```sql

    USE AdventureWorks2017

    GO

    INSERT INTO dbo.PageLatchDemo

    (FillerData)

    SELECT  t.object_id % 2

    FROM sys.tables t;

    GO 5000

    ```

    **清单 5-37** 生成页面闩锁负载的 T-SQL 脚本


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageLatchDemo'') IS NOT NULL

    DROP TABLE dbo.PageLatchDemo;

    CREATE TABLE dbo.PageLatchDemo

    (

    PageLatchDemoID INT IDENTITY (1,1)

    ,FillerData  bit

    ,CONSTRAINT PK_PageLatchDemo_PageLatchDemoID PRIMARY KEY CLUSTERED  (PageLatchDemoID)

    );

    ```

    **清单 5-36** 生成页面闩锁场景的 T-SQL 脚本


    要验证页面闩锁争用是否确实发生，请使用清单[5-38]中提供的脚本。结果如图[5-26]所示，显示存在大量页面闩锁及其相关的延迟。在此示例中，每个页面闩锁的延迟超过
    20 毫秒。在更关键的情况下，这些值会高得多，并有助于识别索引何时干扰对表的访问或写入数据。


    ![images/338675_4_En_5_Chapter/338675_4_En_5_Fig26_HTML.png](img/338675_4_En_5_Fig26_HTML.png)


    *图 5-26 页面闩锁的查询结果。一个包含一行数据的查询表结果的截图。列标题为表名、索引名、页面闩锁等待计数、页面闩锁等待毫秒数和页面平均锁等待毫秒数。*


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_latch_wait_count

    ,page_latch_wait_in_ms

    ,CAST(100. * page_latch_wait_in_ms

    / NULLIF(page_latch_wait_count ,0) AS decimal(12,2)) AS page_avg_lock_wait_ms

    FROM sys.dm_db_index_operational_stats (DB_ID(), NULL, NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id

    WHERE i.object_id = OBJECT_ID(''dbo.PageLatchDemo'');

    ```

    **清单 5-38** 在`sys.dm_db_index_operational_stats`中查询页面闩锁统计信息


    > **注意**

    > 页面 I/O 和页面闩锁争用高度依赖于硬件。本节中的演示查询结果不会与所示结果完全匹配。'
- fmt: '### Page Allocation Cycle


    As a result of the DML activity, leaf and nonleaf pages are allocated or deallocated
    from indexes from time to time. Monitoring page allocations is an important part
    of monitoring an index (see Table 5-17 for options). Through this monitoring,
    it is possible to get a handle on how an index is “breathing” between maintenance
    windows. This activity is the relationship between pages allocated to indexes
    through inserts and page splits and then the removal (or merging) of pages through
    deletes. By monitoring this activity, indexes can be better maintained by understanding
    when it may be useful to adjust the index `FILLFACTOR` value.


    **Table 5-17** Page Allocation Cycle Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `leaf_allocation_count` | `bigint` | Cumulative count of leaf-level page allocations
    in the index or heap |

    | `nonleaf_allocation_count` | `bigint` | Cumulative count of page allocations
    caused by page splits above the leaf level |

    | `leaf_page_merge_count` | `bigint` | Cumulative count of page merges at the
    leaf level |

    | `nonleaf_page_merge_count` | `bigint` | Cumulative count of page merges above
    the leaf level |


    As an example of how page allocation occurs on a table, execute the script in
    Listing 5-39. In this script, the table `dbo.AllocationCycle` is created. Afterward,
    100,000 rows are inserted into the table. Since this is a new table, there is
    no contention on page allocations, and data is added in an orderly fashion. At
    this point, pages have been allocated to the table, and the allocations relate
    specifically to these inserts. This script will run for a minute or more. Ensure
    that Include Actual Execution Plan is not enabled when this is executed as this
    will greatly slow down execution by generating significant amounts of visual plan
    information.


    **Listing 5-39** T-SQL Script to Generate Page Allocations

    ```sql

    USE AdventureWorks2017;

    GO

    SET NOCOUNT ON

    DROP TABLE IF EXISTS dbo.AllocationCycle;

    CREATE TABLE dbo.AllocationCycle (

    ID INT IDENTITY,

    FillerData VARCHAR(1000),

    CreateDate DATETIME,

    CONSTRAINT PK_AllocationCycle PRIMARY KEY CLUSTERED (ID)

    );

    GO

    INSERT INTO dbo.AllocationCycle (FillerData, CreateDate)

    VALUES (NEWID(), GETDATE());

    GO 100000

    ```


    To verify the allocations, the leaf and nonleaf allocation columns `leaf_allocation_count`
    and `nonleaf_allocation_count` from `sys.dm_db_index_operational_stats` can be
    checked. The script in Listing 5-40 shows that there are 758 allocations at the
    leaf level and 3 at the nonleaf level (see Figure 5-27). This is an important
    detail to consider when using these columns: a portion of the pages allocated
    can be insert-related.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig27_HTML.png)

    *A screenshot of the query table results for insert page allocations with a row
    of data. The column headers and values are table name, index name, leaf allocation
    count 758, non-leaf allocation count 3, leaf page merge count 0, and non-leaf
    page merge count 0.*


    **Figure 5-27** Query results for insert page allocations statistics in `sys.dm_db_index_operational_stats`


    **Listing 5-40** Query for Page Allocation Statistics in `sys.dm_db_index_operational_stats`

    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,ios.leaf_allocation_count

    ,ios.nonleaf_allocation_count

    ,ios.leaf_page_merge_count

    ,ios.nonleaf_page_merge_count

    FROM sys.dm_db_index_operational_stats(DB_ID(), OBJECT_ID(''dbo.AllocationCycle''),
    NULL,NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```


    Note: After SQL Server 2014, the behavior for these columns changed so that for
    bulk inserts, only a single page is recorded for the `leaf_allocation_count`.


    With this foundation of index metadata, the discussion can continue with using
    page allocations to monitor for page splits and to identify where modifications
    to the fill factor can be useful. To demonstrate this, page splits will be generated
    on the `dbo.AllocationCycle` table. The script in Listing 5-41 can be used to
    accomplish this. This script increases the length of the `FillerData` column on
    every third row to 1,000 characters.


    **Listing 5-41** T-SQL Script to Increase Page Allocations

    ```sql

    USE AdventureWorks2017;

    GO

    UPDATE  dbo.AllocationCycle

    SET     FillerData = REPLICATE(''x'',1000)

    WHERE   ID % 3 = 1;

    ```


    Once the data is modified, the results from executing the `sys.dm_db_index_operational_stats`
    query in Listing 5-40 change drastically. With the size of the rows expanding,
    the number of pages allocated jumps up to 9,849 with a total of 35 nonleaf pages
    (Figure 5-28). Since the order of the rows hasn’t changed, this activity is related
    to page splits from expanding the sizes of the rows. By monitoring these statistics,
    indexes affected by this pattern of activity can be identified.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig28_HTML.png)

    *A screenshot of the query table results for update page allocations with a row
    of data. The column headers and values are table name, index name, leaf allocation
    count 9849, non-leaf allocation count 35, leaf page merge count 0, and non-leaf
    page merge count 0.*


    **Figure 5-28** Query results for update page allocations'
