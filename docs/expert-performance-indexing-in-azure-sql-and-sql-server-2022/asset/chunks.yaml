    ## Summary


    This chapter walked through using the built-in indexing tools available in SQL
    Server. Each of these tools can be a great addition to your SQL Server tool belt.
    They allow informed indexing decisions to be made quickly and efficiently without
    expending extensive time and resources to do so.


    With regard to the missing index DMOs, the index suggestions are based on existing
    activity on the SQL Server instance. These are real-world applications that represent
    areas where performance improvements can be identified, tested, and implemented
    quickly and effectively in production environments.


    The `DTA`, while not as readily available as the missing index DMOs, allows indexes
    to be tuned from a single query to a full workload with minimal effort. The option
    to tune the contents of the plan cache allows the work currently being done in
    an environment to be leveraged to build recommendations without the need to create
    a test workload.


    # 13. Indexing Strategies


    Indexing databases is often thought of as an art where the database is the canvas
    and the indexes are the paints that come together to form a beautiful tapestry
    of storage and performance. A little color here, a little color there, and paintings
    will take shape. In much the same way, a clustered index on a table and then a
    few non-clustered indexes can result in blazingly fast performance as beautiful
    as any masterpiece. Going a little too abstract or minimalist with indexing might
    feel good, but the resulting performance will be a reminder that it may not be
    practical.


    As colorful as this analogy is, there is more science behind designing and applying
    indexes than there is artistry. A few columns pulled together because they might
    work well together are often less beneficial than an index built upon well-established
    patterns. The indexes that are based on tried-and-true practices are often the
    best solutions. In this chapter, a number of common indexing patterns will be
    discussed to help identify potentially useful indexes.


    ## Heaps


    There are few valid cases for using heaps in databases. The general rule of thumb
    for most DBAs is that all tables in a database should be built with clustered
    indexes instead of heaps. While this practice rings true in most situations, there
    are isolated use cases when using a heap is acceptable and preferred. This section
    looks at one of these scenarios and discusses the others in generalities. The
    reason for being generic is that it is difficult to make blanket statements about
    when to use a heap instead of a clustered index (which will be explained more
    later in the section).'
