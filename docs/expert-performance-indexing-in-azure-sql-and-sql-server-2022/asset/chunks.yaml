- fmt: '## Indexed Views


    在许多情况下，数据库中的数据存储方式并不能完全代表用户需要检索的信息。为了解决这个问题，可以构建查询将用户所需的数据提取到结果集中，以便更轻松地使用。在执行这些活动的过程中，可以对数据进行聚合，以提供用户所需详细程度的结果。


    例如，用户可能希望看到数据库中某个产品在所有订单中的总销售额，但不包含明细项目的信息。在大多数情况下，检索此信息没有问题。然而，在某些情况下，动态执行该聚合可能会在数据库中造成瓶颈。虽然索引有助于简化聚合，但它们有时无法提供所需的成本改进以达到要求的性能。


    解决此问题的一种可能方案是在数据库中的视图上创建索引。可以创建视图来提供所需的摘要和聚合，并使用索引将视图中的信息具体化为聚合形式。对视图建立索引时，查询结果的存储方式与任何表的存储方式大致相同。通过提前存储此信息，使用视图中聚合的查询可以获得更快的响应时间。


    在了解如何实现索引视图之前，让我们首先演练前面概述的检索产品摘要信息的问题。在此示例中，假设需要在产品子类别级别的所有产品的摘要信息。为此提供的查询，如清单
    [13-44](#338675_4_En_13_Chapter.xhtml#PC44)，需要提供 `LineTotal` 和 `OrderQty` 值的 `SUM`
    聚合，以及 `UnitPrice` 的平均值。虽然查询的读取次数看起来并不算特别高（见图 [13-57](#338675_4_En_13_Chapter.xhtml#Fig57)），但对于发布到某些生产环境的查询来说，可能被认为过于显著。如果该查询要非常频繁地执行，情况尤其如此。检查执行计划（见图
    [13-58](#338675_4_En_13_Chapter.xhtml#Fig58)）显示，虽然它并不是特别复杂，但该计划包含多个步骤，不能被视为一个简单的计划。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.ProductSubcategorySummary'') IS NOT NULL

    DROP VIEW dbo.ProductSubcategorySummary;

    SET STATISTICS IO ON;

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    ```

    *Listing 13-44：昂贵的聚合查询*


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig58_HTML.png)

    *图 13-58：昂贵聚合查询的执行计划*


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig57_HTML.png)

    *图 13-57：昂贵聚合查询的 Statistics I/O 结果*


    针对此性能问题的解决方案可以通过为清单 [13-44](#338675_4_En_13_Chapter.xhtml#PC44) 中的查询创建一个视图并向该视图添加索引来找到。向视图添加索引时需要考虑许多事项，例如：


    *   视图中的所有列必须是确定性的。

    *   必须使用 `SCHEMA_BINDING` 视图选项创建视图。

    *   必须将聚集索引创建为唯一索引。

    *   视图中引用的表必须使用两部分命名法。

    *   如果聚合值，则必须包含 `COUNT_BIG()` 函数。

    *   某些聚合（例如 `AVG()`）在索引视图中是不允许的。


    有关创建索引视图的更多注意事项包含在“联机丛书”主题“创建索引视图”([`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?))
    中。


    创建索引视图的第一步是创建底层视图。根据列出的注意事项，清单 [13-44](#338675_4_En_13_Chapter.xhtml#PC44) 中的查询不能直接转换为视图。必须更改查询以移除
    `AVG` 函数并包含 `COUNT_BIG` 函数。虽然此更改从输出中移除了所需的数据元素之一，但该值可以在对视图建立索引后计算。此外，视图定义必须包含
    `WITH SCHEMABINDING` 选项。结果是清单 [13-45](#338675_4_En_13_Chapter.xhtml#PC45) 中的视图定义。最后一步是使用
    `Production.ProductSubcategory` 表中的 `Name` 列在表上创建唯一聚集索引。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE VIEW dbo.ProductSubcategorySummary

    WITH SCHEMABINDING

    AS

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,SUM(sod.UnitPrice) AS TotalUnitPrice

    ,COUNT_BIG(*) AS Occurrences

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name;

    GO

    CREATE UNIQUE CLUSTERED INDEX CLIX_ProductSubcategorySummary

    ON dbo.ProductSubcategorySummary(Name)

    ```

    *Listing 13-45：索引视图定义*


    索引视图就位后，下一步是测试该视图与原始查询相比的性能。在执行清单 [13-46](#338675_4_En_13_Chapter.xhtml#PC46)
    中的代码之前，首先查看第二个查询，该查询使用 `TotalUnitPrice` 和 `Occurrences` 列来生成 `AvgUnitPrice`。虽然
    `AVG` 函数不能包含在索引视图的定义中，但可以用最小的努力实现相同的结果。


    执行清单 [13-46](#338675_4_En_13_Chapter.xhtml#PC46) 中的查询后，可以观察到这些查询的性能比清单 [13-44](#338675_4_En_13_Chapter.xhtml#PC44)
    中的示例有显著提升。不再需要超过 1,200 次读取，而只需 2 次读取（见图 [13-59](#338675_4_En_13_Chapter.xhtml#Fig59)），并且执行计划（图
    [13-60](#338675_4_En_13_Chapter.xhtml#Fig60)）也简单了不少。计划从许多运算符简化为三个。


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    ```

    *Listing 13-46：使用索引视图的查询*


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig60_HTML.png)'
  raw: '## Indexed Views


    In many cases, the way in which data is stored in the database does not fully
    represent the information that the users need to retrieve. To solve this, queries
    can be built to pull the data that users need together into result sets that can
    be more easily consumed. In the process of performing these activities, data can
    be aggregated to provide the results at the level of detail that the users require.


    As an example, users may want to see the total amount sold for a product across
    all orders in a database but without including information on the detail items.
    In most situations, retrieving this information is not an issue. However, in some
    cases, performing that aggregation on the fly can create bottlenecks in the database.
    While indexes can assist in streamlining the aggregations, they sometimes do not
    provide the needed cost improvement to achieve the required performance.


    One possible solution for this issue is to create indexes on a view in the database.
    The view can be created to provide the summary and aggregations that are required,
    and an index can be used to materialize the information in the view into an aggregated
    form. When indexing a view, the results of the query are stored in the database
    in much the same way as any table is stored. By storing this information ahead
    of time, queries that use the aggregations in the view can obtain improved response
    time.


    Before looking at how to implement an indexed view, let’s first walk through the
    problem outlined earlier with retrieving summary information for products. In
    this example, suppose that there is a need for summary information for all products
    at the product subcategory level. The query for this, provided in Listing [13-44](#338675_4_En_13_Chapter.xhtml#PC44),
    would need to provide a sum aggregation of the `LineTotal` and `OrderQty` values
    and then an average of `UnitPrice`. While the number of reads for the query does
    not seem substantially high (see Figure [13-57](#338675_4_En_13_Chapter.xhtml#Fig57)),
    it may be considered too significant for a query to be released into some production
    environments. This is especially true if the query is to be executed very frequently.
    Examining the execution plan, provided in Figure [13-58](#338675_4_En_13_Chapter.xhtml#Fig58),
    shows that while it is not overly complicated, the plan includes a number of steps
    and would not be considered a trivial plan.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.ProductSubcategorySummary'') IS NOT NULL

    DROP VIEW dbo.ProductSubcategorySummary;

    SET STATISTICS IO ON;

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    Listing 13-44

    Expensive Aggregation Query

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig58_HTML.png)


    A panel with an opened execution plan tab with 2 lines of text for query 1 with
    100% cost relative to the batch. Below is a flow diagram exhibiting the multiple
    paths, namely, index scan, nonclustered, product subcategory, clustered index
    scan, clustered, product, and clustered index scan, clustered, sales order detail,
    at 1%, 1%, and 47% costs to select at 0% cost.


    Figure 13-58


    Execution plan for the expensive aggregation


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig57_HTML.png)


    A panel with an opened messages tab with 5 lines for 5 tables with different scan
    count, logical reads, physical reads, read-ahead reads, l o b logical reads, and
    l o b physical reads, among others, values under the 35 rows affected label and
    above the 1 row affected label.


    Figure 13-57


    Statistics I/O results for the expensive aggregation


    A solution for this performance problem can be found through creating a view for
    the query in Listing [13-44](#338675_4_En_13_Chapter.xhtml#PC44) and adding an
    index to the view. There are a number of things to consider when adding indexes
    to views, such as the following:


    *   All columns in the view must be deterministic.


    *   The view must be created using the `SCHEMA_BINDING` view option.


    *   The clustered index must be created as unique.


    *   Tables referenced in the view must use two-part naming.


    *   If aggregating values, the `COUNT_BIG()` function must be included.


    *   Some aggregations, such as `AVG()`, are disallowed in indexed views.


    Additional consideration when creating indexed views is included in the Books
    Online topic “Create Indexed Views” ([`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?)).


    The first step in creating an indexed view is to create the underlying view. Given
    the considerations listed, the query in Listing [13-44](#338675_4_En_13_Chapter.xhtml#PC44)
    cannot be directly turned into a view. The query must be changed to remove the
    `AVG` function and include the `COUNT_BIG` function. While this change removes
    one of the required data elements from the output, that value can be calculated
    after indexing the view. In addition, the view definition must include the `WITH
    SCHEMABINDING` option. The result is the view definition in Listing [13-45](#338675_4_En_13_Chapter.xhtml#PC45).
    The last step is to create a unique clustered index on the table using the `Name`
    column from the `Production.ProductSubcategory` table.


    ```

    USE AdventureWorks2017

    GO

    CREATE VIEW dbo.ProductSubcategorySummary

    WITH SCHEMABINDING

    AS

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,SUM(sod.UnitPrice) AS TotalUnitPrice

    ,COUNT_BIG(*) AS Occurrences

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name;

    GO

    CREATE UNIQUE CLUSTERED INDEX CLIX_ProductSubcategorySummary

    ON dbo.ProductSubcategorySummary(Name)

    Listing 13-45

    Indexed View Definition

    ```


    With the indexed view in place, the next step is to test how the view performs
    compared with the original query. Before executing the code in Listing [13-46](#338675_4_En_13_Chapter.xhtml#PC46),
    first look at the second query that is using the `TotalUnitPrice` and `Occurrences`
    columns to generate `AvgUnitPrice`. While the `AVG` function cannot be included
    in the definitions for indexed views, the same results can be achieved with minimal
    effort.


    After executing the queries in Listing [13-46](#338675_4_En_13_Chapter.xhtml#PC46),
    it can be observed that the queries performed substantially better than in the
    example in Listing [13-44](#338675_4_En_13_Chapter.xhtml#PC44). Instead of more
    than 1,200 reads, there are only 2 reads required (see Figure [13-59](#338675_4_En_13_Chapter.xhtml#Fig59)),
    and the execution plan (Figure [13-60](#338675_4_En_13_Chapter.xhtml#Fig60)) is
    quite a bit simpler. Instead of many operators, the plan was simplified to three.


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    Listing 13-46

    Query that uses an Indexed View

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig60_HTML.png)'
  trans: '

    ## 索引视图


    在许多情况下，数据库中数据的存储方式并不能完全代表用户需要检索的信息。为了解决这个问题，可以构建查询将用户所需的数据提取到结果集中，以便更轻松地使用。在执行这些活动的过程中，可以对数据进行**聚合**，以提供用户所需详细程度的结果。


    例如，用户可能希望看到数据库中某个产品在所有订单中的总销售额，但不包含明细项目的信息。在大多数情况下，检索此信息没有问题。然而，在某些情况下，动态执行该聚合可能会在数据库中造成瓶颈。虽然索引有助于简化聚合，但它们有时无法提供所需的成本改进以达到要求的性能。


    解决此问题的一种可能方案是在数据库中的视图上创建索引。可以创建视图来提供所需的摘要和聚合，并使用索引将视图中的信息**具体化**为聚合形式。对视图建立索引时，查询结果的存储方式与任何表的存储方式大致相同。通过提前存储此信息，使用视图中聚合的查询可以获得更快的响应时间。


    在了解如何实现索引视图之前，让我们首先演练前面概述的检索产品摘要信息的问题。在此示例中，假设需要在产品子类别级别的所有产品的摘要信息。为此提供的查询，如清单
    13-44，需要提供 `LineTotal` 和 `OrderQty` 值的 `SUM` 聚合，以及 `UnitPrice` 的平均值。虽然查询的读取次数看起来并不算特别高（见图
    13-57），但对于发布到某些生产环境的查询来说，可能被认为过于显著。如果该查询要非常频繁地执行，情况尤其如此。检查执行计划（见图 13-58）显示，虽然它并不是特别复杂，但该计划包含多个步骤，不能被视为一个简单的计划。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.ProductSubcategorySummary'') IS NOT NULL

    DROP VIEW dbo.ProductSubcategorySummary;

    SET STATISTICS IO ON;

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    ```

    *清单 13-44：昂贵的聚合查询*


    ![](img/338675_4_En_13_Fig58_HTML.png)

    *图 13-58：昂贵聚合查询的执行计划*


    ![](img/338675_4_En_13_Fig57_HTML.png)

    *图 13-57：昂贵聚合查询的 Statistics I/O 结果*


    针对此性能问题的解决方案可以通过为清单 13-44 中的查询创建一个视图并向该视图添加索引来找到。向视图添加索引时需要考虑许多事项，例如：


    *   视图中的所有列必须是**确定性的**。

    *   必须使用 `SCHEMA_BINDING` 视图选项创建视图。

    *   必须将聚集索引创建为唯一索引。

    *   视图中引用的表必须使用两部分命名法。

    *   如果聚合值，则必须包含 `COUNT_BIG()` 函数。

    *   某些聚合（例如 `AVG()`）在索引视图中是不允许的。


    有关创建索引视图的更多注意事项包含在“联机丛书”主题“创建索引视图”([`https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?`](https://docs.microsoft.com/en-us/sql/relational-databases/views/create-indexed-views?))
    中。


    创建索引视图的第一步是创建底层视图。根据列出的注意事项，清单 13-44 中的查询不能直接转换为视图。必须更改查询以移除 `AVG` 函数并包含 `COUNT_BIG`
    函数。虽然此更改从输出中移除了所需的数据元素之一，但该值可以在对视图建立索引后计算。此外，视图定义必须包含 `WITH SCHEMABINDING` 选项。结果是清单
    13-45 中的视图定义。最后一步是使用 `Production.ProductSubcategory` 表中的 `Name` 列在表上创建唯一聚集索引。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE VIEW dbo.ProductSubcategorySummary

    WITH SCHEMABINDING

    AS

    SELECT psc.Name

    ,SUM(sod.LineTotal) AS SumLineTotal

    ,SUM(sod.OrderQty) AS SumOrderQty

    ,SUM(sod.UnitPrice) AS TotalUnitPrice

    ,COUNT_BIG(*) AS Occurrences

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name;

    GO

    CREATE UNIQUE CLUSTERED INDEX CLIX_ProductSubcategorySummary

    ON dbo.ProductSubcategorySummary(Name)

    ```

    *清单 13-45：索引视图定义*


    索引视图就位后，下一步是测试该视图与原始查询相比的性能。在执行清单 13-46 中的代码之前，首先查看第二个查询，该查询使用 `TotalUnitPrice`
    和 `Occurrences` 列来生成 `AvgUnitPrice`。虽然 `AVG` 函数不能包含在索引视图的定义中，但可以用最小的努力实现相同的结果。


    执行清单 13-46 中的查询后，可以观察到这些查询的性能比清单 13-44 中的示例有显著提升。不再需要超过 1,200 次读取，而只需 2 次读取（见图
    13-59），并且执行计划（图 13-60）也简单了不少。计划从许多运算符简化为三个。


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT psc.Name,

    SUM(sod.LineTotal) AS SumLineTotal,

    SUM(sod.OrderQty) AS SumOrderQty,

    AVG(sod.UnitPrice) AS AvgUnitPrice

    FROM Sales.SalesOrderDetail sod

    INNER JOIN Production.Product p

    ON sod.ProductID = p.ProductID

    INNER JOIN Production.ProductSubcategory psc

    ON p.ProductSubcategoryID = psc.ProductSubcategoryID

    GROUP BY psc.Name

    ORDER BY psc.Name;

    SELECT Name,

    SumLineTotal,

    SumOrderQty,

    TotalUnitPrice / Occurrences AS AvgUnitPrice

    FROM dbo.ProductSubcategorySummary

    ORDER BY Name;

    ```

    *清单 13-46：使用索引视图的查询*


    ![](img/338675_4_En_13_Fig60_HTML.png)

    '
- fmt: 'A panel exhibits an opened execution plan tab with 2 lines of text for queries
    1 and 2 with 50% cost each relative to the batch. Each has a flow diagram exhibiting
    the connection from `clustered index scan`, `view clustered`, `product subcategory
    summary`, at 100% cost to `select` at 0% cost.


    Figure 13-60


    Execution plan for the Indexed View pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig59_HTML.png)


    A panel with an opened messages tab with two similar one-line entries that read
    `table "product subcategory summary"`, scan count 1, logical reads 2, physical
    reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0. Each is
    between `35 rows affected` and `1 row affected` labels.


    Figure 13-59


    Statistics I/O results for the Indexed View pattern


    Another peculiar thing occurred in the execution that can be observed. Both the
    query against the base tables and the query against the view performed identically
    after implementing the `indexed view`. This is one of the added benefits of `indexed
    views`. When `SQL Server` is determining the execution plan for the first query,
    it can deduce that there is an `indexed view` that can cover the same logic as
    the query, even though the calculation for the average column is not the same.


    Note that the cost of `indexed views` is in maintaining their indexes. Whenever
    any underlying value changes in its source tables, the index needs to also be
    updated. The ideal `indexed views` are targeted toward specific use cases and
    do not attempt to re-index an entire table. When `indexed views` become excessively
    complex or begin to contain many different indexes, it is worth considering ways
    to rearchitect the underlying tables to reduce the complexity of the business
    logic that requires them.


    `Indexed views` are an extremely useful tool when multiple tables need to be joined
    together in a single unit to reduce the `I/O` required to join the data at runtime.
    While there are restrictions associated with `indexed views`, there are numerous
    benefits, including the ability to use `indexed views` in situations like the
    one in Listing [13-46](#338675_4_En_13_Chapter.xhtml#PC46). When there are views
    and queries with the same shape that are used frequently, consider whether an
    inclusion of the view can provide the benefit that indexes on the base tables
    do not provide.


    ## Summary


    This chapter focused on how and when to apply indexes to tables in a number of
    situations. Each example demonstrated how to apply a particular index pattern
    to the situation to improve the performance with indexing. The chapter covered
    the limited, yet valid, instances for using heaps. It then went on to identify
    the various options and manners for building `clustered indexes`. With `non-clustered
    indexes`, the example demonstrated the options for adding to your `clustered indexes`
    to add performance on columns outside of the clustering key. The chapter also
    included an example of implementing `columnstore indexes` and discussed when to
    apply this type of index. Overall, these patterns provide the groundwork for identifying
    the types of indexes that are most useful for different types of columns and workloads,
    and they provide the ability to meaningfully compare one indexing solution with
    another.


    # 14. Query Strategies


    In the previous chapter, strategies were discussed to identify potential indexes
    for a wide variety of tables. That is often only half of the story, though. Once
    indexes have been created, performance is expected to improve within a database,
    leading then to the next bottleneck. Unfortunately, coding practices and selectivity
    can negatively influence the application of indexes to queries. Sometimes how
    the database and tables are being accessed will prevent the use of some of the
    most beneficial indexes available.


    Proper indexing provides an efficient set of paths to critical data. Effective
    querying is needed to ensure that data is written and read in ways that follow
    those paths and provides good performance.


    This chapter covers querying strategies where indexes may not be used as expected.
    These scenarios are


    *   `LIKE` comparison


    *   Concatenation


    *   Computed columns


    *   Scalar functions


    *   Data conversions


    In each scenario, the circumstances around them will be discussed along with why
    they don''t perform as expected. For each scenario, mitigation strategies will
    be provided along with some tips on how to use the right index in the right place.
    This chapter will provide the tools needed to recognize situations that will hamper
    the ability to index the database for performance, as well as strategies to resolve
    these challenges.'
