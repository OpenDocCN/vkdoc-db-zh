    the behavior of locations and distances. Listing [7-6](#338675_4_En_7_Chapter.xhtml#PC6)
    shows an example of invoking one of the special methods that have been defined
    to work with spatial information. The query returns the ten counties closest to
    the county of Tulsa in Oklahoma (see Figure [7-4](#338675_4_En_7_Chapter.xhtml#Fig4)).


