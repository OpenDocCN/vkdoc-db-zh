- fmt: '#### Primary XML Index


    Now that we know the cost of our example query without any XML indexes, let’s
    look at what happens when we add a primary XML index. Using the `CREATE INDEX`
    code in Listing 6-3, create the primary XML index. More information on the syntax
    is in Chapter 1. This will create a primary XML index on the `Demographics` column.


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE PRIMARY XML INDEX [PXML_Store_Demographics] ON [Sales].[Store]

    ([Demographics])

    ```

    Listing 6-3

    Primary XML Index on `[Sales].[Store]`


    When the primary XML index is created, all paths, tags, and nodes are indexed.
    For each of these items, a record is created in the XML index that contains that
    item, information on how that item appears in the XML document, and which row
    in the table is associated with the item. This is important because XML indexes
    will often dramatically increase the storage footprint of the underlying table.
    To demonstrate, run the code in Listing 6-4 to view the number of records and
    pages for each index. As the results in Figure 6-2 show, the number of records
    in the primary XML index greatly exceeds the number of records in the table by
    a factor of 13.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig2_HTML.png)

    Figure 6-2

    Physical stats after creating the primary XML index


    ```sql

    USE AdventureWorks2017;

    GO

    SELECT [i].[name]

    ,[i].[index_id]

    ,[IPS].[index_level]

    ,[IPS].[index_type_desc]

    ,[IPS].[fragment_count]

    ,[IPS].[avg_page_space_used_in_percent]

    ,[IPS].[record_count]

    ,[IPS].[page_count]

    FROM [sys].[dm_db_index_physical_stats](DB_ID(N''AdventureWorks2017''), OBJECT_ID(N''Sales.Store''),
    NULL, NULL, ''DETAILED'') AS [IPS]

    INNER JOIN [sys].[indexes] AS [i]

    ON [i].[object_id] = [IPS].[object_id]

    AND [i].[index_id] = [IPS].[index_id]

    WHERE [IPS].[index_type_desc]  ''NONCLUSTERED INDEX''

    ORDER BY [i].[index_id]

    ,[IPS].[index_level];

    ```

    Listing 6-4

    Primary XML Index details on `[Sales].[Store]`


    With the primary XML index in place, the code from Listing 6-2 can be executed
    to demonstrate performance of the new index. Reviewing the execution plan, it
    becomes clear that the execution plan takes on an extremely different pattern,
    as shown in Figure 6-3. Instead of an estimated subtree cost of over 12, it has
    been reduced to 0.1535, and the XML Reader with XPath filter is replaced by a
    clustered index scan of the primary XML index. Under the covers, the query is
    still scanning the table, but it is doing so with much less effort. With larger
    tables, this indexing change will dramatically decrease the duration of the query.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig3_HTML.jpg)

    Figure 6-3

    XML query cost with a primary XML index


    The optimizer can make choices that are more evenly balanced using the primary
    XML index. The `clustered index scan` of the `Sales.Store` table is as high an
    estimated cost as the `clustered index seek` against the recently created XML
    index. This shift in where the work is occurring within the query engine will
    result in improved performance.


    **Caution**

    When a primary XML index is dropped, all secondary XML indexes will be dropped
    as they are dependent on the primary index. No warning will be given for this
    action.


    #### Secondary XML Index


    Secondary XML indexes provide the ability to further improve querying XML data.
    With secondary XML indexes, a choice will be made between the `PATH`, `VALUE`,
    and `PROPERTY` types when building the index. These options determine which elements
    from the primary XML index will be included in the secondary XML index and provide
    performance improvements based on the types of queries that are often run against
    XML documents. For example, if more queries are accessing property elements, then
    the `PROPERTY` type for the secondary XML index would be beneficial.


    Returning to the example query in Listing 6-2, the existing function call is using
    both a path and value. Since this query is first searching for a path to check
    a value and other paths are not being accessed, a secondary XML index will be
    created using `PATH`. The syntax for the `CREATE INDEX` statement is provided
    in Listing 6-5. Note that the `CREATE INDEX` syntax now includes a `USING` statement
    that references the primary XML index and has the `FOR PATH` clause.


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE XML INDEX [SXML_Store_Demographics] ON [Sales].[Store] (Demographics)

    USING XML INDEX [PXML_Store_Demographics]

    FOR PATH;

    ```

    Listing 6-5

    Creating a Secondary Index


    Once the secondary XML index has been created, the example query from Listing
    6-2 will be tested again to see how the execution plan changes. As shown in Figure
    6-4, the execution plan is dramatically improved. The estimated subtree cost has
    been reduced by about half from 0.1535 to 0.0888, and the clustered index scan
    on the primary XML index is replaced with an index seek on the secondary XML index.
    Now the highest-cost item on the query is the clustered index scan on the table’s
    clustered index. Using a secondary XML index has nearly removed the expense associated
    with accessing XML data.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig4_HTML.jpg)

    Figure 6-4

    XML query cost with a secondary XML index


    Note that a secondary XML index may sometimes be nearly as large as the primary
    XML index. This is demonstrated by running the code in Listing 6-4, which shows
    in Figure 6-5 that the same number of records are present in the primary and secondary
    XML indexes. In this case, this is to be expected since all of the data in the
    XML documents are values at XML paths. The advantage of the secondary XML index
    in this case is an ordering based on those paths that allows the XML indexes to
    be more selective.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig5_HTML.png)

    Figure 6-5

    Physical stats after creating the secondary XML index


    Although `sys.dm_db_index_physical_stats` is beneficial for finding information
    needed to maintain all indexes, including XML indexes, there is a system view
    specifically for XML indexing: `sys.xml_indexes`. This view shows all options
    that have been applied to an XML index. Information returned by the view can be
    useful in further maintaining an index by knowing the type and other options set.
    This view is inherited from `sys.indexes` and also returns the columns provided
    in `sys.indexes`. Shown in Figure 6-6, the following additional columns exist:


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig6_HTML.png)'
