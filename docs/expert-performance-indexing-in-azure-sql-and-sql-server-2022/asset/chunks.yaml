  trans: '

    ### 非聚集索引


    在图书馆的类比中，杜威十进制分类法是聚集索引，它根据每本书的主题为书架内的书籍定义了顺序。尽管该系统很有用，但访客经常希望根据其他标准（如作者、书名或年龄层）来搜索书籍。如果不知道书籍的主题，那么杜威十进制分类法就无法帮助定位它。


    `图书馆`通过计算机和卡片目录来解决这个问题。这些提供了一个可以使用其他常见细节（如作者或书名）对书籍进行交叉引用的地方。这些解决方案类似于数据库中的`非聚集索引`。


    注意


    由于堆不提供数据排序，`非聚集索引`通常基于`聚集索引`创建，而不是在堆上创建。


    `非聚集索引`是在现有`聚集索引`（或堆）之上创建的二级索引。在`非聚集索引`中，列根据其值被选定并排序。这些列包含对其所引用数据在堆或`聚集索引`中位置的引用。这类似于图书馆中卡片目录的工作原理。书架上的书籍顺序是静态的，但会创建额外的快捷方式，以便能够使用其他搜索标准快速定位它们。


    例如，一个包含州和省并按州名排序的表，可能还包含其国家、语言或其他详细信息。根据这些其他标准搜索此表有许多合理的理由，而`非聚集索引`允许基于除州缩写或名称之外的其他详细信息快速搜索长长的地区列表。


    与`聚集索引`和堆不同，一个表可以包含许多`非聚集索引`。虽然在技术上一个表最多可以定义 999 个`非聚集索引`，但要构造一个包含数百个索引的表的实际示例会很有挑战性。多个`非聚集索引`允许以多种方式搜索数据，这是`聚集索引`之外的补充。虽然一个表可以包含许多索引，但每个索引都应服务于一个合理的用例。索引需要存储和维护，因此创建过多可能会给`SQL
    Server`带来不必要的负担。


    ## 其他索引类型


    在`聚集索引`、`非聚集索引`和堆的范畴内，存在着多种索引类型，每种类型都有助于搜索不同类型的数据。到目前为止，图书馆卡片目录的例子侧重于访客搜索书籍的体验，但还有许多其他场景需要不同的组织结构来解决。


    考虑以下图书馆信息请求：


    *   报告所有图书馆中按主题分类的书籍数量。

    *   在一个图书馆的所有书籍中搜索特定文本。

    *   绘制一个图书馆所有书籍的地理来源地图。


    虽然非常有用，但卡片目录无法解决这些问题。`SQL Server`中也是如此，因此存在各种索引来满足不同的数据访问需求。以下是不同索引类型的简要概述。本书后续章节将详细介绍它们的功能和用法。


    ### 列存储索引


    与图书馆书籍相关的细节，无论是存储在卡片目录还是计算机中，都是存储在一起的。单个条目包含了关于一本书你可能想了解的所有信息。当目标是查找单本书或一小部分书时，这是有效的。


    当试图在更高层次上理解书籍时，这种系统就不再高效了。例如，考虑一位图书管理员想要统计图书馆中每个主题有多少本书。一本一本地查找书籍会很慢。即使是自动化过程也会很慢，因为它需要遍历所有书籍的所有数据以获取它们的主题并增加总计数。


    解决这个挑战需要一种替代的数据存储方式，该方式维护一个主题列表，其中包含一些基本统计信息和指向每个主题下所有书籍的链接。这个解决方案类似于`列存储索引`，它创建了一种按列而非按行组织数据的结构。


    在`列存储索引`中，行被分组在一起，每个列的数据被压缩并分开存储。在这种结构中，需要跨许多行获取少数几列数据的查询可以高效执行，因为不再需要读取每行的所有细节。`列存储索引`作为分析数据请求的解决方案而存在，有助于报告、分析和数据科学。


    在本书的剩余部分，索引将在适用时分类为`行存储`或`列存储`。`行存储索引`将一行的所有细节顺序地存储在一起。`行存储索引`非常适合事务性数据处理，这在软件应用程序的日常使用中很常见。`列存储索引`是为分析性数据处理构建的，这通常出现在数据仓库、报告以及涉及数据科学和机器学习的项目中。


    此类索引的好处是只需读取查询所需的列和行。在数据仓库场景中，通常只需要索引中少于 15% 的列来生成查询结果。^(¹)


    `列存储索引`可以是`聚集的`或`非聚集的`。`聚集列存储索引`是无序的，包含表中的每一列。在这种情况下，`列存储索引`成为表的基本存储结构。`非聚集列存储索引`针对表中的特定列，并将允许对该索引中的任何列进行分析。它们按照底层`聚集行存储索引`的顺序进行排序。


    `列存储索引`往往能非常有效地压缩。这是因为单个列的值会比跨多个不同列的值重复得多。因此，`列存储压缩`通常会看到远高于标准行或页压缩的压缩率。消耗更少的存储意味着执行查询时需要的内存更少，最终带来更快的结果。


    由于其结构，`列存储索引`为数据仓库和其他分析解决方案提供了重要价值。`列存储索引`将在本书后面更详细地讨论。

    '
- fmt: '## JSON and XML Indexes


    Consider a need to search the table of contents for all books in a library. A
    table of contents provides a hierarchical view of a book. There are chapters that
    outline the main sections for the book, followed by subchapter headings that provide
    additional details for each chapter. This relationship model is similar to how
    XML documents are designed; there are nodes and a relationship between them that
    defines the structure of that information.


    As with the card catalog analogy earlier, it would not be efficient to look through
    every book in the library to find those that contain chapters about Edgar Codd.
    Similarly, finding chapters written by Edgar Codd or that include information
    about him would be a difficult task without some better way to accomplish it.


    One method of solving this problem would be to make a list of every book in the
    library and for each one a list all of its chapters. Within each chapter entry
    could be tags or keywords related to its contents. This provides the same benefit
    that a card catalog provides, but for some less standard and less structured information.
    It doesn’t matter how many chapters a book has or how many subjects are contained
    within each; this chapter list would list as many or as few as exist in each book.


    In a database, this is what `XML indexes` and indexing JavaScript Object Notation
    (JSON) can accomplish.


    For every node in an XML document, an entry is made in the XML index. This information
    is persisted in internal tables that SQL Server can use to determine whether the
    XML document contains the data that is being queried. Similarly with JSON, the
    values to index are materialized with an index on a calculated column.


    Creating and maintaining `XML indexes` can be quite costly. Every time the index
    is updated, it needs to shred all the nodes of the XML document into the XML index.
    The larger the XML document is, the more costly this process will be. However,
    if data in an XML column will be queried often, the cost of creating and maintaining
    an XML index will be offset by removing the need to shred all the XML documents
    at runtime.


    ## Spatial Indexes


    Every library has maps. Some maps cover the oceans; others are for continents,
    countries, states, or cities. Many different kinds of maps can be found in a library,
    of which there could be multiple types that target the same area. There are two
    basic challenges that exist with all maps:


    *   Which maps overlap or include the same locations or information in each?


    *   Which books are published at or take place in a given location?


    Retrieving all maps that contain the city of Minneapolis or retrieving a list
    of all books that were published within 25 miles of Minneapolis would be difficult
    questions to answer without a system built to assist with them.


    Databases traditionally are not built to answer questions like these. Tables represent
    entities, and different entities can be related using joins, but ultimately these
    relationships are one-dimensional in nature. In the physical world, data often
    exists in more than one dimension. Maps are two-dimensional, and buildings and
    floor plans are three-dimensional. To solve this problem, SQL Server provides
    the capabilities for `spatial indexes`.


    `Spatial indexes` dissect the spatial information that is provided into a four-level
    representation of the data. This representation allows SQL Server to plot out
    the spatial information, both geometry and geography. This data structure can
    then be used to determine where rows overlap and the proximity of one point to
    another point.


    There are a few restrictions that exist with `spatial indexes`. The main one is
    that spatial indexes must be created on tables that have primary keys. Without
    a primary key, the spatial index creation will not succeed. Additionally, when
    creating spatial indexes, they are restricted from using parallel processing;
    and only a single spatial index can be built on a table at a time, which impacts
    the speed in which they can be created. Also, spatial indexes cannot be used on
    indexed views. These and other restrictions are covered in Chapter 7.


    Similar to `XML indexes`, `spatial indexes` have up-front and maintenance costs
    associated with their sizes. The benefit is that when spatial data needs to be
    queried, the value of the spatial index can be quickly realized. As with all indexes,
    their primary purpose is to speed up reading data, whereas the cost is in creating
    and maintaining the index. `Spatial indexes` will be discussed in more depth in
    Chapter 7.


    ## Hash and Range Indexes


    As books come into the library, sometimes the frequency in which they are returned
    exceeds the rate in which they are placed back into the stacks. It takes time
    to sort the books and put them where they go. At these times, a librarian is often
    there keeping track of what is returned. For these books, the librarian can often
    remember which books are where in the queue of returned books and get the book
    you want without the use of the card catalog. This is in essence what memory-optimized
    tables do with `hash and range indexes`. The only difference is that with hash
    and range indexes, millions of rows, or books, can be kept in memory without needing
    to rely on disk-based structures to support them.


    A `hash index` allows a memory-optimized table to provide precise point lookups
    of data within the table. Using the library analogy, the index (a.k.a. the librarian)
    can remember exactly where the book is in the table and index each time it is
    needed.


    Alternatively, a `range index` provides memory-optimized tables with the capability
    to efficiently identify ranges of items. For instance, if the index, or librarian,
    needed all the books returned between 8:00 a.m. and 12:00 p.m., the index would
    be able to scan across the rows efficiently instead of accessing rows one by one.


    `Hash and range indexes` are only allowed on memory-optimized tables. The reference
    to remembering where the books are is really what is different about hash and
    range indexes over other index types. Between disk and memory, the structure of
    a clustered index is relatively unchanged. With hash and range indexes, the structure
    is designed specifically for fast memory access and leverages disk solely to support
    transactional consistency and the ability to rebuild the index in memory when
    the database is brought online.


    ## Full-Text Search


    The last scenario to consider is the idea of finding specific terms within books.
    Card catalogs do a great job of providing basic book information such as author,
    title, or subject. The subject of a book isn’t the only keyword you may want to
    use to search for books, though. At the back of many books are keyword indexes
    to help you find other subjects within a book. When this book is completed, there
    will be an index, and it will provide the ability to look up a keyword and identify
    which pages it appears on, if it is in the book at all.


    Consider a library in which every book has a keyword index. If all of those keywords
    were added to their own card catalog, then a visitor would be able to find every
    book in the library that contains a specific keyword. In addition, they would
    know exactly where in each book the keyword is referenced. This is a broad overview
    of what a `full-text index` is and how it works, with the fundamental difference
    that a full-text index in SQL Server will index and search most words, whereas
    an index in a book will only index a smaller set of keywords that are most relevant
    to the reader.'
