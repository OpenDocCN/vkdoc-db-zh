    Listing 13-29

    Foreign Keys Pattern with an Index


    The Foreign Keys pattern is important to keep in mind with building foreign key
    relationships between tables. The purpose of those relationships is to validate
    data, and it is important to be certain that the indexes to support that activity
    are in place. Do not use this pattern as an excuse to remove validation from a
    database; instead, use it as an opportunity to properly index busy tables. If
    the column needs to be queried to validate and constrain the data, it will likely
    be accessed by applications when the data needs to be used for other purposes.


    ## Columnstore Index


    As the sizes of databases have grown, there are more and more situations where
    traditional clustered and non-clustered indexes do not adequately provide the
    performance needed for calculating results. This presents the greatest challenge
    with large data warehouses, and for this problem, the columnstore index was introduced
    in SQL Server 2012. Previous chapters discussed how the columnstore utilizes column-based
    storage vs. row-based storage. This section looks at some guidelines with both
    clustered and non-clustered versions of columnstore indexes and how to recognize
    when to build a columnstore index. After the guidelines, an example implementing
    a columnstore index will be provided.


    ### Note


    The columnstore examples in this section utilize the Microsoft Contoso BI Demo
    Dataset for Retail Industry. This database has a fact table with more than 8 million
    records. It is available for download at `www.microsoft.com/download/en/details.aspx?displaylang=en&id=18279`.


    The key to using columnstore indexes is to be able to properly identify the situations
    where they should be applied. While it could be useful with some OLTP databases
    to use the columnstore index, that is not the target scenario. While the performance
    of the columnstore index could be useful in an OLTP database, the restrictions
    associated with this index type prevent using it in a meaningful way for transactional
    workloads. The columnstore index is primarily useful for data warehouses, where
    aggregations across numerous rows are required and few columns will be returned.
    With the column-wise storage and built-in compression, this index type provides
    a way to get to the data requested as fast as possible without having to load
    columns that are not part of the query. Within a data warehouse, columnstore indexes
    are geared toward fact tables vs. dimension tables. Columnstore indexes prove
    their worth when they are used on large tables. The larger the table, the more
    a columnstore index will be able to improve performance over traditional indexes.
    Additionally, when considering data warehouse queries, one common quality that
    they share is aggregations and subsets of the available columns. Through the aggregations,
    the batch mode processing of columnstore indexes provides greater performance
    improvements. Fewer columns in the queries means less data is loaded into memory,
    as only the columns being accessed are used in the context of the query.


    When a scenario for using a columnstore index is discovered, there are a couple
    of things to first consider. Since columnstore indexes can be both clustered and
    non-clustered, the first decision is which type to use. With clustered columnstore
    indexes, all the data in the table is stored with the index, meaning that only
    one copy of the data appears in the database. Since it is all the data, the results
    in all the columns from the table appear in the columnstore index. For a workload
    that is mostly or entirely analytic in nature, this is likely to be the ideal
    choice.


    Alternatively, a columnstore index can be non-clustered. This provides the ability
    to limit the number of columns that are part of the index. The non-clustered columnstore
    index will rely on a clustered rowstore index being part of the table, which means
    that non-clustered columnstore indexes will increase the overall storage footprint
    of the table.'
