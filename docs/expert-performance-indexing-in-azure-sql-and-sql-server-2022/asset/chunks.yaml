    If indexes are being deployed in an offline state, be sure to select an execution
    window that is during the database maintenance window. Remember even online index
    operations can cause short-lived blocking.


    ## Repeat


    At the beginning of this chapter, the discussion started by looking at the three
    phases of the Indexing Method. The diagram for the process (Figure [17-1](#338675_4_En_17_Chapter.xhtml#Fig1))
    shows the three phases in a loop, with each phase leading to the next. This choice
    in layout was intentional. Indexing is not a fixed-point activity. Once the first
    round of the Indexing Method is completed, it is important to start the next round
    of indexing.


    It can be tempting, when databases are properly tuned, to let the practice of
    indexing slip and to focus on other priorities. Unfortunately, new features are
    often added to applications as frequently as new data is added to the database.
    Both of these events will change the way in which indexes are used by the database
    and the effectiveness of the current state of “good” indexes.


    To maintain the desired performance of a database platform, indexes must be continuously
    reviewed. This is not to say that a full-time resource always needs to be assigned
    to monitoring, analyzing, and implementing indexes. There does, though, need to
    be an acceptance that at some interval an evaluation of the state of indexing
    will be completed.


    ## Summary


    As this chapter showed, the Indexing Method is quite similar to the scientific
    method. Within a database platform, statistics can be collected on indexes in
    order to identify where indexing issues may exist. These statistics can then be
    further used to determine the types of indexes to modify and where. Indexing tools
    such as the Database Engine Tuning Advisor and missing index DMOs can be leveraged
