  trans: '

    ## JSON 和 XML 索引


    假设需要在图书馆的目录中搜索所有书籍。目录提供了书籍的层级视图。书籍有章节来概述主要部分，然后是子章节标题，为每个章节提供额外的细节。这种关系模型类似于 XML
    文档的设计方式；存在节点以及它们之间的关系，这些关系定义了信息的结构。


    与之前卡片目录的类比类似，遍历图书馆中的每一本书来查找包含关于埃德加·科德章节的书是低效的。同样，要找到埃德加·科德撰写的章节或包含他信息的章节，如果没有更好的方法，将是一项艰巨的任务。


    解决这个问题的一种方法是列出图书馆中的每一本书，并为每本书列出其所有章节。每个章节条目中可以包含与其内容相关的标签或关键词。这提供了与卡片目录相同的优点，但针对的是一些不太标准和不太结构化的信息。一本书有多少章节，或者每个章节包含多少主题，这都不重要；这个章节列表会根据每本书实际存在的章节进行列举。


    在数据库中，这正是 `XML 索引` 和对 JavaScript 对象表示法（JSON）进行索引可以实现的功能。


    对于 XML 文档中的每个节点，都会在 XML 索引中创建一个条目。这些信息被持久化存储在 SQL Server 可以用来确定 XML 文档是否包含正在查询的数据的内部表中。对于
    JSON 也是类似的，要索引的值通过计算列上的索引被实体化。


    创建和维护 `XML 索引` 的成本可能相当高。每次更新索引时，它都需要将 XML 文档的所有节点分解（shred）到 XML 索引中。XML 文档越大，这个过程的成本就越高。然而，如果
    XML 列中的数据将被频繁查询，那么创建和维护 XML 索引的成本将被在运行时无需分解所有 XML 文档所带来的好处所抵消。


    ## 空间索引


    每个图书馆都有地图。有些地图覆盖海洋；另一些则覆盖大陆、国家、州或城市。图书馆中可以找到许多不同类型的地图，其中可能有多种类型针对同一区域。所有地图都存在两个基本挑战：


    *   哪些地图重叠或包含相同的位置或信息？


    *   哪些书籍在某个给定位置出版或发生？


    如果没有专门构建的系统来协助，要检索所有包含明尼阿波利斯市的地图，或检索所有在明尼阿波利斯市方圆 25 英里内出版的书籍列表，将是难以回答的问题。


    传统上，数据库并非为回答此类问题而构建。表代表实体，不同的实体可以通过连接（join）关联，但这些关系本质上是一维的。在物理世界中，数据通常存在于多个维度。地图是二维的，建筑物和楼层平面图是三维的。为了解决这个问题，SQL
    Server 提供了 `空间索引` 功能。


    `空间索引` 将提供的空间信息解析为数据的四层表示。这种表示允许 SQL Server 绘制空间信息，包括几何（geometry）和地理（geography）。然后，这个数据结构可以用来确定行之间在哪里重叠以及一个点与另一个点的接近程度。


    `空间索引` 存在一些限制。主要的一个是空间索引必须在具有主键的表上创建。没有主键，空间索引的创建将不会成功。此外，创建空间索引时，它们被限制使用并行处理；并且一次只能在一个表上构建一个空间索引，这影响了它们的创建速度。另外，空间索引不能在索引视图上使用。这些以及其他限制将在第
    7 章中介绍。


    与 `XML 索引` 类似，`空间索引` 有与其大小相关的前期和维护成本。好处在于，当需要查询空间数据时，空间索引的价值可以迅速显现。与所有索引一样，它们的主要目的是加快读取数据的速度，而成本在于创建和维护索引。`空间索引`
    将在第 7 章中更深入地讨论。


    ## 哈希和范围索引


    随着书籍进入图书馆，有时归还书籍的频率超过了将其放回书架的速度。整理书籍并将其放到指定位置需要时间。在这些时候，通常会有一位图书管理员记录归还的书籍。对于这些书籍，图书管理员通常能记住哪些书在归还队列中的位置，并且无需使用卡片目录就能拿到你想要的书。这本质上就是内存优化表使用
    `哈希和范围索引` 所做的事情。唯一的区别是，通过哈希和范围索引，数百万行（或书籍）可以保留在内存中，而无需依赖基于磁盘的结构来支持它们。


    `哈希索引` 允许内存优化表提供表中数据的精确点查询。用图书馆类比，索引（即图书管理员）可以确切记住每次需要时书籍在表和索引中的位置。


    另一方面，`范围索引` 为内存优化表提供了高效识别项目范围的能力。例如，如果索引（或图书管理员）需要所有在上午 8:00 到 12:00 之间归还的书籍，索引将能够高效地扫描行，而不是逐行访问。


    `哈希和范围索引` 只允许在内存优化表上使用。关于记住书籍位置的说法，正是哈希和范围索引与其他索引类型的不同之处。在磁盘和内存之间，聚集索引的结构相对不变。而对于哈希和范围索引，其结构是专门为快速内存访问而设计的，并仅利用磁盘来支持事务一致性以及在数据库上线时在内存中重建索引的能力。


    ## 全文搜索


    最后一个要考虑的场景是在书籍中查找特定术语。卡片目录在提供基本的书籍信息（如作者、标题或主题）方面做得很好。然而，书籍的主题并不是你可能想用来搜索书籍的唯一关键词。许多书籍的末尾都有关键词索引，以帮助你在书中查找其他主题。当这本书完成后，会有一个索引，它将提供查找关键词并识别它出现在哪些页面（如果书中有的话）的能力。


    想象一个图书馆，每本书都有一个关键词索引。如果所有这些关键词都被添加到它们自己的卡片目录中，那么访问者就能找到图书馆中包含特定关键词的每一本书。此外，他们还能准确知道在每本书中哪里引用了这个关键词。这是
    `全文索引` 是什么以及如何工作的一个概述，根本区别在于 SQL Server 中的全文索引将索引和搜索大多数单词，而书中的索引只会索引一小部分对读者最相关的关键词。

    '
- fmt: '## Index Variations


    The discussion thus far has covered different types of indexes and how they can
    help in searching through different types of data. There are a variety of ways
    in which indexes can be created, and each provides slightly different functionality.
    Some not only index data but allow for business rules to be directly enforced
    on the underlying data while potentially improving index performance.


    ### Primary Key


    In the library analogy, Dewey Decimal numbers were a valuable way to organize
    books by subject, allowing for books on a specific topic to be quickly and efficiently
    found. Dewey Decimal numbers are not unique to a book, though, and many books
    may share the same number. The Dewey Decimal number may be viewed as a clustered
    index for books in a library. Similarly, titles, authors, publication date, and
    other details are all repeated across many books.


    To meaningfully manage a library, there must be some unique number that identifies
    each book and is never repeated. In a library, books are uniquely identified by
    their `ISBN` (International Standard Book Number) such that no two books share
    the same `ISBN`.


    In a database, the primary key uniquely identifies a row in the table. No two
    rows in a table are allowed to have the same primary key value. Typically, a primary
    key will be created on a single column, though it can be composed of multiple
    columns when the need arises.


    Because a primary key is a unique value explicitly defined for every row in a
    table, it cannot be `NULL`. In addition, a table may only have a single primary
    key defined on it at a time. To maintain uniqueness, a primary key must be built
    alongside an index, which may be clustered or non-clustered. Primary keys are
    typically built on a table’s clustered index, though rare use cases may necessitate
    separate columns for the primary key and clustered index. More information on
    this is included in Chapter 11.


    ### Unique Index


    There may be more than a single column or set of columns that can be used to uniquely
    identify a row in a table. When the need arises to define multiple ways to uniquely
    identify rows, unique indexes may be used.


    A unique index is a separate entity from a primary key and may be defined as either
    clustered or non-clustered. A table may contain multiple unique indexes, though
    it may still only have one clustered index and one primary key.


    Similar to the primary key, a unique index is constrained so that values may not
    be repeated within the index. It provides a mechanism to uniquely identify rows
    in a table and can be created across a single column or multiple columns.


    One notable difference between a primary key and a unique index is that `NULL`
    is allowed in a unique index, whereas a primary key must be defined on `NOT NULL`
    columns. A `NULL` value is considered a discrete value and therefore may not be
    repeated in the same way that non-`NULL` values may not be repeated.


    ### Included Columns


    Suppose there was a need to find all books in a library written by Douglas Adams
    and how many pages are in each book. The simplest solution is to look up each
    book in the card catalog one by one, locate each book, and check how many pages
    are in it. While simple, this is tedious and relies on a heavily manual process
    to get results.


    An ideal solution would be to either include the page count in the card catalog
    or have a separate list of books with page counts included. Either would provide
    a solution whereby page counts could be quickly retrieved without having to actually
    locate any of the books. When it comes to indexing, including information outside
    of the indexed columns is done through `included columns`.


    When a non-clustered index is built, there is an option to add included columns
    into the index. These columns are stored as unsorted data alongside the key columns
    in the index. Included columns cannot include any columns that have already been
    used in the initial sorted column list of the index.


    In terms of querying, included columns allow users to look up information outside
    the sorted columns. If everything they need for the query is found in the key
    and included columns, the query does not need to access the table’s heap or clustered
    index to return query results. Similar to the card catalog example, included columns
    can significantly improve the performance of a query when a similar column list
    is requested each time.


    ### Partitioned Indexes


    Books that include a lot of data can get fairly large. Consider a dictionary or
    the complete works of William Shakespeare. These are exceptionally large books
    that would be impractical to publish in a single volume. A 20,000-page book is
    simply too large to physically publish. In addition, the ability for a person
    to read (or even simply reference) a book that large would be quite challenging.
    Books can get large enough that the idea of containing them in a single volume
    just isn’t practical. The best example of this is an encyclopedia.


    It is rare that an encyclopedia is contained in a single book. The size of the
    book and the width of the binding would be beyond the ability of anyone to manage.
    Also, the time it takes to find all the subjects in the encyclopedia that start
    with the letter *S* is greatly improved because you can go directly to the S volume
    instead of paging through an enormous book to find where they start.


    This problem isn’t limited to books. Tables and their indexes can get to a point
    where their size makes it difficult to continue to maintain them using a reasonable
    amount of time and resources. Similarly, if the table has millions or billions
    of rows, being able to scan across limited portions of the table vs. the entire
    table can provide significant performance improvements. To solve this problem
    on a table, indexes can be partitioned.


    `Partitioning` can occur on both clustered and non-clustered indexes. It allows
    an index to be split along the values supplied by a function. By doing this, the
    data in the index is physically separated into multiple partitions, while the
    index itself is still a single logical object.


    ### Filtered Indexes


    By default, non-clustered indexes contain one record in them for every row in
    the table for which the index is associated. In most cases, this is ideal and
    provides the index an opportunity to assist in selectivity for any value in the
    column. For the purposes of this discussion, selectivity is a measure of how many
    rows in a table meet a given filter criteria.


    There are situations when including all records in a table in an index is less
    than ideal. For instance, the set of values most often queried may represent a
    small number of rows in a table. In this case, limiting the rows in the index
    will reduce the amount of work a query needs to perform, resulting in an improvement
    in the performance of the query. Another could be where the selectivity of a value
    is low compared with the number of rows in the table. This could be an active
    status or shipped Boolean values; indexing on these values wouldn’t drastically
    improve performance, but filtering to just those records would provide a significant
    opportunity for query improvement.


    To assist in these scenarios, non-clustered indexes can be filtered to reduce
    the number of records they contain. When the index is built, it can be defined
    to include or exclude records based on a simple comparison that reduces the size
    of the index.


    Besides the performance improvements outlined, there are other benefits to using
    filtered indexes. The first improvement is reduced storage cost. Since filtered
    indexes have fewer rows in them (because of the filtering), there will be less
    data in the index, which requires less storage space. Less storage usage also
    means that less memory is consumed when the index is read into memory. Another
    benefit is reduced maintenance cost. Smaller indexes require less time and resources
    to reorganize and rebuild.'
  raw: '## Index Variations


    The discussion thus far has covered different types of indexes and how they can
    help in searching through different types of data. There are a variety of ways
    in which indexes can be created, and each provides slightly different functionality.
    Some not only index data but allow for business rules to be directly enforced
    on the underlying data while potentially improving index performance.


    ### Primary Key


    In the library analogy, Dewey Decimal numbers were a valuable way to organize
    books by subject, allowing for books on a specific topic to be quickly and efficiently
    found. Dewey Decimal numbers are not unique to a book, though, and many books
    may share the same number. The Dewey Decimal number may be viewed as a clustered
    index for books in a library. Similarly, titles, authors, publication date, and
    other details are all repeated across many books.


    To meaningfully manage a library, there must be some unique number that identifies
    each book and is never repeated. In a library, books are uniquely identified by
    their ISBN (International Standard Book Number) such that no two books share the
    same ISBN.


    In a database, the primary key uniquely identifies a row in the table. No two
    rows in a table are allowed to have the same primary key value. Typically, a primary
    key will be created on a single column, though it can be composed of multiple
    columns when the need arises.


    Because a primary key is a unique value explicitly defined for every row in a
    table, it cannot be NULL. In addition, a table may only have a single primary
    key defined on it at a time. To maintain uniqueness, a primary key must be built
    alongside an index, which may be clustered or non-clustered. Primary keys are
    typically built on a table’s clustered index, though rare use cases may necessitate
    separate columns for the primary key and clustered index. More information on
    this is included in Chapter [11](#338675_4_En_11_Chapter.xhtml).


    ### Unique Index


    There may be more than a single column or set of columns that can be used to uniquely
    identify a row in a table. When the need arises to define multiple ways to uniquely
    identify rows, unique indexes may be used.


    A unique index is a separate entity from a primary key and may be defined as either
    clustered or non-clustered. A table may contain multiple unique indexes, though
    it may still only have one clustered index and one primary key.


    Similar to the primary key, a unique index is constrained so that values may not
    be repeated within the index. It provides a mechanism to uniquely identify rows
    in a table and can be created across a single column or multiple columns.


    One notable difference between a primary key and a unique index is that NULL is
    allowed in a unique index, whereas a primary key must be defined on NOT NULL columns.
    A NULL value is considered a discrete value and therefore may not be repeated
    in the same way that non-NULL values may not be repeated.


    ### Included Columns


    Suppose there was a need to find all books in a library written by Douglas Adams
    and how many pages are in each book. The simplest solution is to look up each
    book in the card catalog one by one, locate each book, and check how many pages
    are in it. While simple, this is tedious and relies on a heavily manual process
    to get results.


    An ideal solution would be to either include the page count in the card catalog
    or have a separate list of books with page counts included. Either would provide
    a solution whereby page counts could be quickly retrieved without having to actually
    locate any of the books. When it comes to indexing, including information outside
    of the indexed columns is done through *included columns*.


