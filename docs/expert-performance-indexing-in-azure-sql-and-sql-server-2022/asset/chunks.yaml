  trans: '

    ## 沟通


    在修改任何数据库上的索引时，首要障碍是需要与管理层和数据库用户沟通您打算更改数据库的意图。对数据库的修改常常会引发警觉，尤其是当这些修改是由数据库所支持的应用程序的所有者之外的人员提出时。在应用程序所有者、数据库管理团队与开发团队之间建立并保持开放的沟通渠道，不仅有助于索引处理过程，也对其他共同关注的领域有益。缺乏这种沟通，团队可能会对索引更改措手不及，而这些更改可能会影响到分析未发现的内容，或影响到已计划但尚未发布的功能。


    就沟通而言，基本上有两项内容需要为数据库所有者准备好：索引更改的**影响分析**，以及更改实施后的**状态报告**。这类似于在设计、发布和测试新功能时所遵循的质量保证流程。


    ### 影响分析


    在为数据库索引变更做准备时，强调其对应用程序性能的预期影响非常重要。从历史上看，这有时可能像是一场猜测游戏。当时并没有太多容易获取的信息能够表明索引在何处被使用、如何被使用以及使用频率。


    借助`Monitor`阶段所阐述的流程，您能够自信地理解索引使用情况。您可以确定索引上次使用的时间以及包含了哪些操作。同时，也有信息可用于识别索引将不再被使用或使用频率正在增加的趋势。


    通过`Analyze`阶段，已阐述了可用于识别使用不同索引的执行计划的步骤。请利用这些步骤来识别索引更改将产生影响的位置，然后在索引更改实施前后，对`T-SQL`语句进行样本执行。


    最终，影响分析将对`Implement`阶段内的两个重要角色产生影响。首先，它会向管理者和同事传达索引更改的意图，告知他们所做的变更以供验证，并给予他们反馈的机会。其次，影响分析提供了一份保险策略，以防索引更改产生意外的负面影响。这并不是说糟糕的索引建议就不会带来负面后果，但如果有其他人参与其中且影响被记录在案，则更有可能快速减轻负面影响，甚至可能在该影响在生产环境中显现之前就予以化解。


    > 注意

    >

    > 在我工作过的一个环境中，一些使用频率较低的索引被从数据库中移除了。它们通常每天只被使用一次。但那唯一的一次使用，却是一个无法在没有这些索引的情况下执行的、对业务至关重要的导入过程。如果在移除这些索引之前进行了影响分析，许多棘手的问题本是可以避免的。


    ### 状态报告


    在`Implement`阶段的另一端是状态报告。顾名思义，状态报告是一份向管理者和同事反馈索引实际影响的文档。这份文档无需非常详尽，但需要涵盖一些关键点。状态报告应包含以下信息：


    *   所做的所有索引更改

    *   变更部署的状态

    *   简要的性能评估

    *   关于注意到的任何性能回退的信息

    *   在部署过程中获得的经验教训

    *   遇到问题的摘要


    撰写状态报告时，不要过于陷入细节。成功的索引部署将引导未来更多的`Monitor`和`Analyze`阶段。最终，状态报告需要传达两点。首先，它对索引部署的成功与失败提供了诚实的评估。其次，也是最重要的，它列出了索引更改目前正在实现哪些收益。这一点最为重要，因为它是管理者需要看到的投资回报率（`ROI`），以此来证明在索引上投入的时间和精力是合理的。


    > 注意

    >

    > 我作为顾问所做的最成功的事情之一，就是不断向客户更新我所做索引更改的影响。在我协助的一些团队看来，带有前后性能对比的图表常常像是“自我表扬”，但聘请我来的管理层却发现，这在识别聘请顾问的`ROI`，以及向上级沟通为解决业务性能问题所付出的努力方面，都极其有用。


    ## 部署脚本


    `Analyze`阶段的主要可交付成果是为您环境中数据库规划的索引更改列表。在`Implement`阶段，需要对这些索引进行审查并为部署做准备。作为索引部署准备工作的一部分，需要完成三个步骤：


    1.  准备模式的部署与回滚。

    2.  将索引更改保存到源代码控制中。

    3.  将同行评审结果连同影响分析一起分享。


    ### 准备模式的部署与回滚


    通常，在`Analyze`阶段完成时，您将拥有提议的索引更改列表。该列表在阶段结束时通常还不能直接用于部署。从那时点到执行更改之间，需要将索引更改调整至可用于部署的状态。


    在构建部署脚本时，请务必遵循“无害”（doing no harm）原则。换句话说，构建的脚本应该足够智能，能够多次执行并产生相同的结果。同时，这意味着应有可用的脚本来撤销任何已进行的索引更改。切勿假设表之前的索引状态已存储在源代码控制中。务必检查以确认现有状态是已知的，并开发脚本以便在需要时能回退到该状态。


    部署脚本还需要考虑所使用的`SQL Server`版本。例如，如果您使用的是`Enterprise Edition`，对于需要以新特性重建的索引，请利用`在线索引重建`功能。如果索引适用，`Enterprise
    Edition`还允许对索引进行压缩，这在许多情况下可以节省空间并提升性能。


    同样，请确保部署脚本的编写能最大限度地减少对生产系统的干扰。如果必须进行离线操作，请确保这些操作发生在受影响的应用程序可以接受这种干扰的时间段。对于会锁定表或导致阻塞的操作，也应考虑类似的指导原则。干扰较小的部署不仅对软件应用程序的影响更小，也更不可能对部署脚本所针对的数据库服务器造成运维问题。

    '
- fmt: '#### Save Index Changes to Source Code Repository


    The current state of the indexes on tables should be in a source code repository.
    If they are not, then this iteration through the Implement phase provides the
    perfect opportunity to do so. Source code repositories offer a place to store
    the code, or schema, for a database to allow an organization to determine what
    the index, table, or store procedure schema was at a specific date and time. Source
    code is often well managed from an application perspective. Developers are usually
    quick to choose a tool and leverage it for their applications.


    Source code repositories allow for point in time recovery for the database schema.
    If there are any development teams within an organization, they likely already
    have a desired repository in place. This may be an internal repository like `Perforce`
    or an externally available solution like `GitHub`.


    #### Peer Review with Impact Analysis


    The last thing to do before the Execution step is to seek a peer review of the
    indexing changes. There is nothing worse than working in a vacuum and not understanding
    the entirety of the impact of the changes that are being proposed against the
    applications that use the databases. It is easy to succumb to tunnel vision by
    focusing on the indexing goal and miss the business goals of the current deployment
    or overlook something that was not apparent in the index analysis. This peer review
    is analogous to code review processes that are used by software development teams.
    If your team already has processes in place to peer-review database scripts, then
    this need is already met.


    The best way to avoid these pitfalls is to find a peer to review the indexing
    changes. Bring to the peer the index deployment scripts and the impact analysis,
    and go over the changes. Your peer does not necessarily need to know everything
    about the environment, just a basic understanding of indexing. The aim of the
    peer review is to explain each change. In this dialog, your peer serves as a sounding
    board as you explain the indexing need. This serves a dual role. First, your peer
    will be able to provide feedback on the indexing change. Second, by discussing
    the changes, you may hear yourself describe an indexing change that does not sound
    correct when it is explained.


    In some environments, you may not have a peer that you can turn to review the
    indexes. In these cases, consider going to your manager for the peer review. If
    that is not possible, talk to your manager about leveraging others in your technical
    network. Leverage the forums and social networks to find either a peer or group
    of peers that will be willing to review your changes with you. Using social networks,
    such as `Twitter`, to connect with a technical peer and review some indexing changes
    is much better than not having a peer review at all.


    With the peer review complete, the indexes are ready for the next step in the
    Implement phase: the step where the indexes are applied to the databases.


    Note


    Within the `SQL Server` community, `Twitter` is one of the more active social
    networking tools. Use hashtags `#sql` and `#sqlserver` to find general information
    on `SQL Server`. When looking for answers to questions specifically about `SQL
    Server`, you can use the hashtag `#sqlhelp`. `Twitter` also allows you to add
    people to your conversation by including their Twitter handle in the tweet. For
    instance, the authors of this book are available through the twitter handles `@stratesql`
    and `@edwardpollack`.


    ### Execution


    The last piece of the Implement phase is the execution of the `T-SQL` scripts
    that will apply the indexing changes to the database. These scripts should already
    be prepared through the Deploy Scripts step, and the scope of the changes should
    be well known from the Communication step. Thus, the Execution step should be
    relatively painless as the preparation work is already completed.


    From an execution standpoint, the manner of execution is completely dependent
    on your organization’s change control process. In some environments, there are
    automated processes where scripts can be loaded to a deployment mechanism and
    executed on a schedule. In others, an administrator will simply open `SQL Server
    Management Studio` and execute each script until all the changes are completed.
    Whatever the mechanism, the key is that the indexes get deployed.


    As the deployment progresses, be sure to catalog the changes made and any issues
    that arise during execution. Pay attention to unintended blocking on the databases.
    If indexes are being deployed in an offline state, be sure to select an execution
    window that is during the database maintenance window. Remember even online index
    operations can cause short-lived blocking.


    ## Repeat


    At the beginning of this chapter, the discussion started by looking at the three
    phases of the Indexing Method. The diagram for the process (Figure [17-1](#338675_4_En_17_Chapter.xhtml#Fig1))
    shows the three phases in a loop, with each phase leading to the next. This choice
    in layout was intentional. Indexing is not a fixed-point activity. Once the first
    round of the Indexing Method is completed, it is important to start the next round
    of indexing.


    It can be tempting, when databases are properly tuned, to let the practice of
    indexing slip and to focus on other priorities. Unfortunately, new features are
    often added to applications as frequently as new data is added to the database.
    Both of these events will change the way in which indexes are used by the database
    and the effectiveness of the current state of "good" indexes.


    To maintain the desired performance of a database platform, indexes must be continuously
    reviewed. This is not to say that a full-time resource always needs to be assigned
    to monitoring, analyzing, and implementing indexes. There does, though, need to
    be an acceptance that at some interval an evaluation of the state of indexing
    will be completed.


    ## Summary


    As this chapter showed, the Indexing Method is quite similar to the scientific
    method. Within a database platform, statistics can be collected on indexes in
    order to identify where indexing issues may exist. These statistics can then be
    further used to determine the types of indexes to modify and where. Indexing tools
    such as the `Database Engine Tuning Advisor` and missing index `DMOs` can be leveraged
    to discover "the low-hanging fruit," providing a head start on analysis that may
    not have been found otherwise. By following the phases laid out in the Indexing
    Method, you can build a stable, repeatable indexing process that can help improve
    the performance of your database platform and achieve stable performance over
    time.'
