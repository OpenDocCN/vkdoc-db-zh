- fmt: '#### Hex Rows Print Option


    The next print option available for `DBCC PAGE` is the hex rows print option,
    where `print_option` equals 1. This expands on the previous option by adding into
    the output an entry for every slot on the page and the offset array that describes
    the location of each slot on the page.


    The data section of the page repeats for every row that is on the page and contains
    all metadata and the data associated with that row. For the metadata, the row
    includes the slot number, page offset, record type, and record attributes. This
    information helps define the row and what contributes to the row size (besides
    the size of the data). At the end of the slot is a memory dump of the row. The
    memory dump displays the row in a hex format that, while not easily read by humans,
    contains all the data for the row. For more on the attributes and their definitions,
    see Table [3-12](#338675_4_En_3_Chapter.xhtml#Tab12).


    The offset array is the last section of information included in the hex rows option
    results. The offset array contains two important details for each row in the table.
    The first is the slot number with its hex representation. The second is the byte
    location for the slot on the page. With these two pieces of information, any row
    on the page can be located and returned.


    Table 3-12


    Hex Rows Key Attribute Definitions


    | **Attribute** | **Definition** |

    | --- | --- |

    | Slot | The position of the row on the page. The count is 0 based and starts
    immediately after the page header. |

    | Offset | Physical byte location of the row on the page. |

    | Length | The length of the row on the page. |

    | Record Type | The type of row. Some possible values are `INDEX_RECORD` and `PRIMARY_RECORD`.
    |

    | Record Attributes | List of attributes on the row that contribute to the size
    of the row. These can include the `NULL_BITMAP` and `VARIABLE_COLUMNS` array.
    |

    | Record Size | Size of the row on the page. |

    | Memory Dump | The memory location for the data on the page. For the hex rows
    option, it is limited to the information in that slot. The memory address is provided,
    and afterward a hex dump of the data is stored in the slot. |


    For the hex rows example, the index page (1:279) investigated in the previous
    section will be further reviewed. This time, the hex rows print option will be
    used, which is when a `print_option` of 1 is set in `DBCC PAGE`, as shown in Listing
    [3-17](#338675_4_En_3_Chapter.xhtml#PC17).


    The results for the `DBCC PAGE` command will be lengthier than the previous execution
    since they include the row data with the page header. To focus on the new information,
    the buffer and page header results have been excluded in the sample output in
    Figure [3-11](#338675_4_En_3_Chapter.xhtml#Fig11). In the data section, there
    are two slots shown, slot 0 and slot 1. These slots map to the two index rows
    on the page, which can be verified through the record type of `INDEX_RECORD` for
    each of the rows. The hex data for the rows contains the page and range information
    for the index record, but that isn’t translated with this print option. The last
    section contains the offset table with the slot information for both rows in the
    table. Note that the offset ends with 0 and counts up from the bottom. The rows
    start after the header incrementing up, while the offset array starts at the end
    of the page incrementing backward. In this manner, new rows can be added to the
    table without reorganizing the page.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig11_HTML.jpg)


    A screenshot of D B C C page output. It consists of 5 boxes of data. 1. Displays
    page 1:377. 2 and 3. 2 empty buffer and page header boxes. 4. Data output of slots
    0 and 1. 5. An offset table is displayed where row is offset.


    Figure 3-11


    DBCC PAGE output for the hex rows print option


    ```

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,1)

    Listing 3-17

    DBCC PAGE with the Hex Rows Print Option

    ```


    The hex rows print option includes the page header information but expands on
    it to provide insight into the actual rows on the page. This information can prove
    valuable when attempting to understand a row’s size on the page and why it may
    be larger than expected.


    #### Hex Data Print Option


    The third print option available for `DBCC PAGE` is the hex data print option,
    where `print_option` equals 2. This print option, like the previous one, starts
    with the output from the page header–only print option and adds to it. The information
    added through this option includes the hex output of the data section of the page
    and the offset array. With the data section, the detail is output unformatted—just
    as it appears on the actual page. The output in this format can be useful when
    there is a need to see the page in its raw form.


    To demonstrate the hex data print option, the script in Listing [3-18](#338675_4_En_3_Chapter.xhtml#PC18)
    will be used. In it, the `DBCC PAGE` command is used to retrieve the page from
    `dbo.IndexInternalsFour` that contains the last row. This row contains 25 fives
    in the `FillerData` column.


    ```

    USE Chapter2Internals

    GO

    DBCC TRACEON(3604)

    DBCC PAGE(0,1,377,2)

    Listing 3-18

    DBCC PAGE with the Hex Data Print Option

    ```


    In the results, shown in Figure [3-12](#338675_4_En_3_Chapter.xhtml#Fig12), the
    output contains a large block of characters in the data section. The block contains
    three components. On the far left is page address information, such as `0x0000003BCEBF8000`.
    The page address identifies where on the page the information is located. The
    middle section contains the hex data that is contained in that section of the
    page. The right side of the character block contains the character representation
    of the hex data. For the most part, this data is not legible, except when it comes
    to character data being stored from character data types, such as `char` and `nchar`.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig12_HTML.jpg)


    A screenshot of D B C C page output. It consists of 5 boxes of data. 1. Displays
    page 1:377. 2 and 3. 2 empty buffer and page header boxes. 4. Data output of memory
    dumps in alphanumeric. 5. An offset table is displayed where row is offset.


    Figure 3-12


    DBCC PAGE output for the hex data print option


    Initially, the hex data print option may seem less useful than the other print
    options, and, in many situations, that will be the case. The true value in this
    print option is that `DBCC PAGE` does not try to interpret the page for you. It
    displays the page as is. With the other print options, the output will sometimes
    be reordered to conform to expected slot orders; an example of this is demonstrated
    in Chapter [10](#338675_4_En_10_Chapter.xhtml).'
