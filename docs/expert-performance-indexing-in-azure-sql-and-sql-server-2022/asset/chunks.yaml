  trans: '## 数据转换


    查询可能对索引使用产生负面影响的最后一个领域是，当在 `JOIN` 操作或 `WHERE` 子句中列的数据类型发生变化时。当在上述任一条件中数据类型不匹配时，SQL
    Server 将需要转换其中一个列中的值以匹配另一个列。如果数据转换没有包含在查询语法中，SQL Server 将在后台尝试进行数据转换。


    数据转换可能对查询性能产生负面影响的原因，与标量函数相关的问题类似。如果索引中的一列需要从 `varchar` 转换为 `int`，那么该索引的统计信息将无法用于确定值的频率和位置。例如，数字
    `10` 和字符串 `"10"` 在同一索引中会被排序到完全不同的位置。为了说明数据转换对查询可能产生的影响，首先执行清单 14-12 中的代码。


    ```

    USE AdventureWorks2017

    GO

    SELECT BusinessEntityID

    ,CAST(FirstName as varchar(50)) as FirstName

    ,CAST(MiddleName as varchar(50)) as MiddleName

    ,CAST(LastName as varchar(50)) as LastName

    INTO PersonPerson

    FROM Person.Person;

    CREATE CLUSTERED INDEX IX_PersonPerson_ContactID ON PersonPerson (BusinessEntityID);

    CREATE INDEX IX_PersonContact_FirstName ON PersonPerson(FirstName);

    Listing 14-12

    数据转换设置

    ```


    清单 14-12 将创建一个包含 `varchar` 数据的表。然后，它将向该表添加两个索引，这两个索引将在演示查询中使用。清单 14-13 所示的两个示例查询将用于展示数据转换如何影响索引的性能和利用率。对于这两个查询，都使用了
    `RECOMPILE` 选项，以防止意外的参数嗅探。


    注意

    有关参数嗅探的更多信息，请阅读 Paul White 在 SQLPerformance.com 上的文章《参数嗅探、嵌入和 RECOMPILE 选项》，地址为
    [`http://sqlperformance.com/2013/08/t-sql-queries/parameter-sniffing-embedding-and-the-recompile-options`](http://sqlperformance.com/2013/08/t-sql-queries/parameter-%25C2%25ADsniffing-%25C2%25ADembedding-and-the-recompile-options)。


    第一个 `SELECT` 查询使用了具有 `nvarchar` 数据类型的 `@FirstName` 变量。此数据类型与表 `PersonContact`
    中列的数据类型不匹配，因此必须将表中的列从 `varchar` 转换为 `nvarchar`。该查询的执行计划（图 14-21）显示，查询正在使用非聚集索引上的索引查找来满足查询，并且谓词正在将列中的数据转换为
    `nvarchar`，同时对不在非聚集索引中的列在聚集索引上进行键查找。另请注意，第一个查询的成本占整个批处理（即这两个查询）总成本的 `40%`。


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    DECLARE @FirstName nvarchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    GO

    DECLARE @FirstName varchar(100)

    SET @FirstName = ''Gail'';

    SELECT FirstName, LastName FROM PersonPerson

    WHERE FirstName = @FirstName

    OPTION (RECOMPILE);

    Listing 14-13

    隐式转换查询

    ```


    注意

    执行计划中为运算符显示的附加信息可在 SQL Server Management Studio 的“属性”窗口中找到。“属性”窗口包含了有关用于估计行数和实际行数的列的操作的大量有用信息。


    ![](img/338675_4_En_14_Fig21_HTML.png)


    图 14-21：带有隐式数据转换的执行计划


    图 14-22 执行计划中需要注意的另一个项目是第一个查询的 `SELECT` 操作上包含的警告。SQL Server 2012 及更高版本在包含隐式转换的执行计划中包含详细的警告消息。警告消息显示为一个带有感叹号的黄色三角形。检查该运算符的属性将包含运算符和警告消息的详细信息。这些消息包含有关正在转换的列以及与该问题相关的问题的信息。在此示例中，问题是
    `SeekPlan ConvertIssue`。换句话说，SQL Server 没有关于转换后数据的统计信息来构建一个了解谓词中值频率的执行计划。


    ![](img/338675_4_En_14_Fig22_HTML.png)


    图 14-22：包含隐式转换的警告


    清单 14-13 中的第二个 `SELECT` 查询使用了具有 `varchar` 数据类型的变量。由于此数据类型已经与表中列的数据类型匹配，因此可以使用非聚集索引。如图
    14-23 的执行计划所示，数据类型匹配时，查询优化器可以构建一个计划，该计划知道索引中行的位置，并可以执行查找来获取它们。


    ![](img/338675_4_En_14_Fig23_HTML.png)


    图 14-23：无数据转换的执行计划


    乍一看，第二个执行计划可能显得效率较低，因为它的操作更多、复杂度更高，并且涉及键查找，但事实并非如此。通过查看 `STATISTICS IO` 的逻辑读取次数（如图
    14-24 所示），可以更清晰地了解性能。对于第一个查询，聚集索引扫描产生了 `89 次逻辑读取`。第二个查询在访问两个索引时仅进行了 `18 次读取`。I/O
    的差异归因于扫描聚集索引所需的大量读取，这最终超过了索引查找和键查找的总成本。


    ![](img/338675_4_En_14_Fig24_HTML.png)


    图 14-24：隐式转换查询的 STATISTICS I/O


    在本节中，讨论的重点是隐式数据转换及其对查询性能的负面影响。虽然这些转换可能比显式数据转换更隐蔽，但相同的概念和缓解方法同样适用。由于它们更具意图性，因此应该更少发生。即便如此，在执行数据转换时，也要密切关注所涉及的数据类型，因为它们的更改方式将影响查询性能和索引利用率。'
- fmt: '# Summary


    In this chapter, the structure of queries was examined to understand when they
    can effectively use indexes and when index use is impeded, negatively affecting
    performance. There are times when a specific type of index may not be appropriate
    for a situation, such as searching for values within character strings in large
    tables. In other situations, applying the right type of index or function in the
    right place can have a significant impact on whether the query can use an index
    or not.


    In many of the examples in this chapter, problematic index usage was made clear
    via the use of index scans rather than seeks. In these scenarios, index seeks
    were the ideal index operation. This will not always be the case, and there are
    situations where scans against an index are the optimal operator, such as when
    an entire table (or most of it) needs to be read. It is important to understand
    what type of transactions the environment is geared for and the size of the tables
    that are being accessed.


    The main takeaway from this chapter is that query structure is often as important
    as index structure. The choices made when developing database code can completely
    unravel the work done to properly index a database. Be sure to complement indexing
    strategies with efficient code that leverages them to their maximum potential.


    # 15. Monitoring Indexes


    Throughout this book, many topics have been discussed, such as what indexes are,
    what they do, patterns for building them, and many other aspects for determining
    how a SQL Server database should be indexed. All of that information is necessary
    for the final piece in indexing your databases: analyzing databases to determine
    which indexes are required. The final three chapters in this book will pull together
    the information needed to implement an indexing methodology.


    To start, in this chapter, a general practice will be discussed that can be used
    for monitoring indexes. It will include steps that can be taken to observe the
    behavior of indexes and understand how they impact an environment. This methodology
    can be applied to a single database, to a server, or as an entire SQL Server environment.
    Regardless of the type of operations or business that the database supports, similar
    monitoring processes can be used.


    The main goal behind monitoring indexes is creating the ability to collect, store,
    and report on information about indexes. This information will come from a variety
    of sources. The sources for monitoring should be familiar because they are often
    used with tasks similar to indexing, such as performance tuning. For some sources,
    the information will be collected over time to provide an idea of general trends.
    For other sources, a snapshot at a specific point in time is sufficient. It is
    important to collect some information over time to provide a baseline against
    which to compare performance. This will help in understanding when changes in
    index usage and effectiveness have occurred.


    There are a number of sources from which information will be collected to monitor
    indexes. The sources that will be discussed in this chapter are as follows:


    *   Performance counters

    *   Dynamic management objects

    *   Event tracing


    For each of these sources, the subsequent sections will describe what is to be
    collected and will provide guidance on how to collect this information. By the
    end of the chapter, there will be a framework that is capable of providing the
    information necessary to start the Analyze phase.


    Note


    All monitoring information from this chapter will be collected in a database named
    `IndexingMethod`. The scripts can be run in that database or in another performance
    monitoring database.


    ## Performance Counters


    The first source of monitoring information for indexes is SQL Server performance
    counters. Performance counters are metrics provided by Microsoft to measure the
    rate of events or state of resources within applications and hardware on the server.
    With some of the performance counters, there are general guidelines that can be
    used to indicate when a problem with indexing may exist. For others, changes in
    the rate or level of the performance counter may indicate a need to adjust the
    indexing on a server.


    The primary challenge with using performance counters is that they represent the
    server-level, or SQL Server instance–level, state of the counters. They do not
    indicate at a database or table level where possible indexing issues are occurring.
    This level of detail, though, is acceptable and useful when considering the other
    tools available for monitoring indexes and identifying potential indexing needs.
    One advantage to collecting counter information at this level is that we are forced
    to consider the whole picture and the effect of all the indexes on performance.
    In an isolated situation, a couple of poorly performing indexes on a table might
    be acceptable. However, in conjunction with other tables with poor indexing, the
    aggregate performance may reach a tipping point where index performance needs
    to be addressed. With the server-level statistics provided by performance counters,
    we will be able to identify when this point has been reached.


    There are many performance counters available for both SQL Server and Windows
    Server. From the perspective of indexing, though, many of the performance counters
    can be ignored. The performance counters that are most useful are those that map
    to operations related to how indexes operate or are accessed, such as forwarded
    records and index searches. For a definition of the performance counters that
    are most useful with indexing, see Table 15-1. The reasons for collecting each
    of the counters and how they impact indexing decisions will be discussed in the
    next chapter.


    Table 15-1

    Index-Related Performance Counters


    | Option name | Description |

    | --- | --- |

    | `Access Methods\Forwarded Records/sec` | Number of records per second fetched
    through forwarded record pointers |

    | `Access Methods\FreeSpace Page Fetches/sec` | Number of pages fetched per second
    within allocated pages to an object to insert or modify a record |

    | `Access Methods\FreeSpace Scans/sec` | Number of scans per second initiated
    to search for free space within allocated pages to an object to insert or modify
    a record |

    | `Access Methods\Full Scans/sec` | Number of unrestricted full scans per second.
    These can be either base-table or full-index scans |

    | `Access Methods\Index Searches/sec` | Number of index searches per second. These
    are used to start range scans and single index record fetches and to reposition
    an index |

    | `Access Methods\Page compression attempts/sec` | Number of page compression
    attempts per second using PAGE compression; this will include failed page compressions
    |

    | `Access Methods\Pages compressed/sec` | Number of pages compressed per second
    using PAGE compression |

    | `Access Methods\Page Splits/sec` | Number of page splits per second that occur
    as the result of overflowing index pages |

    | `Buffer Manager\Page Lookups/sec` | Number of requests to find a page in the
    buffer pool |

    | `Locks(*)\Lock Wait Time (ms)` | Total wait time (in milliseconds) for locks
    in the last second |

    | `Locks(*)\Lock Waits/sec` | Number of lock requests per second that required
    the caller to wait |

    | `Locks(*)\Number of Deadlocks/sec` | Number of lock requests per second that
    resulted in a deadlock |

    | `SQL Statistics\Batch Requests/sec` | Number of Transact SQL command batches
    received per second |'
  raw: '## Summary


    In this chapter, the structure of queries was examined to understand when they
    can effectively use indexes and when index use is impeded, negatively affecting
    performance. There are times when a specific type of index may not be appropriate
    for a situation, such as searching for values within character strings in large
    tables. In other situations, applying the right type of index or function in the
    right place can have a significant impact on whether the query can use an index
    or not.


    In many of the examples in this chapter, problematic index usage was made clear
    via the use of index scans rather than seeks. In these scenarios, index seeks
    were the ideal index operation. This will not always be the case, and there are
    situations where scans against an index are the optimal operator, such as when
    an entire table (or most of it) needs to be read. It is important to understand
    what type of transactions the environment is geared for and the size of the tables
    that are being accessed.


    The main takeaway from this chapter is that query structure is often as important
    as index structure. The choices made when developing database code can completely
    unravel the work done to properly index a database. Be sure to complement indexing
    strategies with efficient code that leverages them to their maximum potential.


    # 15. Monitoring Indexes


    Throughout this book, many topics have been discussed, such as what indexes are,
    what they do, patterns for building them, and many other aspects for determining
    how a SQL Server database should be indexed. All of that information is necessary
    for the final piece in indexing your databases: analyzing databases to determine
    which indexes are required. The final three chapters in this book will pull together
    the information needed to implement an indexing methodology.


    To start, in this chapter, a general practice will be discussed that can be used
    for monitoring indexes. It will include steps that can be taken to observe the
    behavior of indexes and understand how they impact an environment. This methodology
    can be applied to a single database, to a server, or as an entire SQL Server environment.
    Regardless of the type of operations or business that the database supports, similar
    monitoring processes can be used.


    The main goal behind monitoring indexes is creating the ability to collect, store,
    and report on information about indexes. This information will come from a variety
    of sources. The sources for monitoring should be familiar because they are often
    used with tasks similar to indexing, such as performance tuning. For some sources,
    the information will be collected over time to provide an idea of general trends.
    For other sources, a snapshot at a specific point in time is sufficient. It is
    important to collect some information over time to provide a baseline against
    which to compare performance. This will help in understanding when changes in
    index usage and effectiveness have occurred.


    There are a number of sources from which information will be collected to monitor
    indexes. The sources that will be discussed in this chapter are as follows:


    *   Performance counters


    *   Dynamic management objects


    *   Event tracing


    For each of these sources, the subsequent sections will describe what is to be
    collected and will provide guidance on how to collect this information. By the
    end of the chapter, there will be a framework that is capable of providing the
    information necessary to start the Analyze phase.


    Note


    All monitoring information from this chapter will be collected in a database named
    `IndexingMethod`. The scripts can be run in that database or in another performance
    monitoring database.


    ## Performance Counters


    The first source of monitoring information for indexes is SQL Server performance
    counters. Performance counters are metrics provided by Microsoft to measure the
    rate of events or state of resources within applications and hardware on the server.
    With some of the performance counters, there are general guidelines that can be
    used to indicate when a problem with indexing may exist. For others, changes in
    the rate or level of the performance counter may indicate a need to adjust the
    indexing on a server.


    The primary challenge with using performance counters is that they represent the
    server-level, or SQL Server instance–level, state of the counters. They do not
    indicate at a database or table level where possible indexing issues are occurring.
    This level of detail, though, is acceptable and useful when considering the other
    tools available for monitoring indexes and identifying potential indexing needs.
    One advantage to collecting counter information at this level is that we are forced
    to consider the whole picture and the effect of all the indexes on performance.
    In an isolated situation, a couple of poorly performing indexes on a table might
    be acceptable. However, in conjunction with other tables with poor indexing, the
    aggregate performance may reach a tipping point where index performance needs
    to be addressed. With the server-level statistics provided by performance counters,
    we will be able to identify when this point has been reached.


    There are many performance counters available for both SQL Server and Windows
    Server. From the perspective of indexing, though, many of the performance counters
    can be ignored. The performance counters that are most useful are those that map
    to operations related to how indexes operate or are accessed, such as forwarded
    records and index searches. For a definition of the performance counters that
    are most useful with indexing, see Table [15-1](#338675_4_En_15_Chapter.xhtml#Tab1).
    The reasons for collecting each of the counters and how they impact indexing decisions
    will be discussed in the next chapter.


    Table 15-1


    Index-Related Performance Counters


    | Option name | Description |

    | --- | --- |

    | Access Methods\Forwarded Records/sec | Number of records per second fetched
    through forwarded record pointers |

    | Access Methods\FreeSpace Page Fetches/sec | Number of pages fetched per second
    within allocated pages to an object to insert or modify a record |

    | Access Methods\FreeSpace Scans/sec | Number of scans per second initiated to
    search for free space within allocated pages to an object to insert or modify
    a record |

    | Access Methods\Full Scans/sec | Number of unrestricted full scans per second.
    These can be either base-table or full-index scans |

    | Access Methods\Index Searches/sec | Number of index searches per second. These
    are used to start range scans and single index record fetches and to reposition
    an index |

    | Access Methods\Page compression attempts/sec | Number of page compression attempts
    per second using PAGE compression; this will include failed page compressions
    |

    | Access Methods\Pages compressed/sec | Number of pages compressed per second
    using PAGE compression |

    | Access Methods\Page Splits/sec | Number of page splits per second that occur
    as the result of overflowing index pages |

    | Buffer Manager\Page Lookups/sec | Number of requests to find a page in the buffer
    pool |

    | Locks(*)\Lock Wait Time (ms) | Total wait time (in milliseconds) for locks in
    the last second |

    | Locks(*)\Lock Waits/sec | Number of lock requests per second that required the
    caller to wait |

    | Locks(*)\Number of Deadlocks/sec | Number of lock requests per second that resulted
