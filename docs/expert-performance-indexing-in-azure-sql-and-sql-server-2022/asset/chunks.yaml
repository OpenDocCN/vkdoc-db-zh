  trans: '

    ### 直方图


    `DBCC SHOW_STATISTICS` 输出的最后一个组件是直方图。直方图提供了查询优化器用于确定基数的统计对象的详细信息。在构建直方图时，SQL Server
    会计算一系列聚合值，这些值基于统计样本或表或视图中的所有行。这些聚合值衡量值出现的频率，并将值分组为不超过 200 个*步骤*。对于每个步骤，都会计算统计列的分布，包括步骤中的行数、步骤的上限值、与上限值匹配的行数、步骤中的唯一行数以及步骤中重复值的平均数量。表
    5-3 列出了与这些聚合值对应的列。有了这些信息，查询优化器就能够估计索引中值范围返回的行数，从而使其能够计算与检索行相关的成本。


    **表 5-3**

    来自 `DBCC SHOW_STATISTICS` 的直方图列


    | 列名 | 描述 |

    | --- | --- |

    | `RANGE_HI_KEY` | 直方图步骤的上限列值。此列值也称为 `键值`。 |

    | `RANGE_ROWS` | 估计列值落在直方图步骤内（不包括上限）的行数。 |

    | `EQ_ROWS` | 估计列值等于直方图步骤上限的行数。 |

    | `DISTINCT_RANGE_ROWS` | 估计直方图步骤内（不包括上限）具有唯一列值的行数。 |

    | `AVG_RANGE_ROWS` | 直方图步骤内（不包括上限）具有重复列值的行的平均数量（当 `DISTINCT_RANGE_ROWS` > 0 时为
    `RANGE_ROWS/DISTINCT_RANGE_ROWS`）。 |


    本示例中的直方图有 163 个步骤。图 5-3（包含直方图中的一些行）展示了 `Sales.SalesOrderDetail` 表中部分步骤的聚合方式。图
    5-3 中的第二项显示 `RANGE_HI_KEY` 值为 43692，这意味着 43660 到 43692 之间的所有 `SalesOrderID` 值都包含在这些估算值中。根据
    `RANGE_ROWS` 值，此系列中有 282 行，其中包含 32 个唯一行。将这些数字转换到 `SalesOrderDetail` 表，意味着有 32
    个不同的 `SalesOrderID` 值，它们之间共有 282 个 `SalesOrderDetailID` 项。最后，对于 `SalesOrderID`
    43692，有 28 个 `SalesOrderDetailID` 项。


    ![](img/338675_4_En_5_Fig3_HTML.jpg)

    *一张包含 10 行 5 列的查询表销售订单详情的截图。表头列分别是 range H I key, range rows, E Q rows, distinct
    range rows 和 A V G range row。10 个 H I key 的范围是 43659 到 44801。*


    **图 5-3**

    `Sales.SalesOrderDetail` 表上索引的直方图示例


    `AVG_RANGE_ROWS` 列中的值非常重要，当统计信息过时时，它可能是导致性能问题的原因。它说明了当检索索引中的任何一个值或值范围时，可以预期有多少行。要检查范围平均值的准确性，请执行清单
    5-3 中的查询，该查询将聚合第二步中的一些值。完成后，结果（如图 5-4 所示）将显示平均值与平均范围行值 8.8125 非常接近。


    ![](img/338675_4_En_5_Fig4_HTML.png)

    *一张显示 3 种条件下平均行数的表格输出截图。*


    **图 5-4**

    `AVG_RANGE_ROWS` 估算验证结果


    ```

    USE AdventureWorks2017

    GO

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43672 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43677;

    SELECT (COUNT(*)*1.)/COUNT(DISTINCT SalesOrderID) AS AverageRows

    FROM Sales.SalesOrderDetail

    WHERE SalesOrderID BETWEEN 43675 AND 43680;

    ```

    **清单 5-3**

    用于检查 `AVG_RANGE_ROWS` 估算的查询


    当索引的统计信息受到质疑时，此直方图是一个非常有价值的工具。如果需要确定为什么查询性能不如预期，或者为什么查询计划错误地估计行数，可以使用直方图来验证这些行为和结果。


    ### 目录视图


    使用 `DBCC SHOW_STATISTICS` 可以提供有关查询优化统计信息的最详细信息。然而，它依赖于用户知道统计信息的存在。虽然默认情况下，每个索引都会为其创建统计信息，但列级统计信息需要通过其他方法来发现。这通过两个目录视图来完成：`sys.stats`
    和 `sys.stats_columns`。


    #### sys.stats


    目录视图 `sys.stats` 为数据库中存在的每个统计信息对象返回一行，无论统计信息是基于索引还是列创建的。表 5-4 提供了 `sys.stats`
    中列的详细信息。


    **表 5-4**

    `sys.stats` 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 这些统计信息所属对象的 ID。 |

    | `name` | `sysname` | 统计信息的名称。此值对于每个 `object_id` 必须是唯一的。 |

    | `stats_id` | `int` | 统计信息的 ID（在对象内唯一）。 |

    | `auto_created` | `bit` | 指示统计信息是否由查询处理器自动创建。 |

    | `user_created` | `bit` | 指示统计信息是否由用户显式创建。 |

    | `no_recompute` | `bit` | 指示统计信息创建时是否使用了 `NORECOMPUTE` 选项。 |

    | `has_filter` | `bit` | 指示统计信息是否基于筛选或行子集聚合。 |

    | `filter_definition` | `nvarchar(max)` | 包含在筛选统计信息中的行子集的表达式。 |

    | `is_temporary` | `bit` | 指示统计信息是否为临时。  SQL Server 2012 中添加。 |

    | `is_incremental` | `bit` | 指示统计信息是否为增量。  SQL Server 2014 中添加。 |

    | `has_persisted_sample` | `bit` | 指示统计信息是否具有持久化的采样率。  SQL Server 2019 中添加。 |

    | `stats_generation_method` | `int` | 标识统计信息生成方法的标志。 SQL Server 2019 中添加。 |

    | `stats_generattion_method_desc` | `varchar(80)` | 标识统计信息生成方法的文本描述。 SQL Server
    2019 中添加。 |


    #### sys.stats_columns


    作为 `sys.stats` 的配套视图，目录视图 `sys.stats_columns` 为统计信息对象中的每一列提供一行。表 5-5 列出了 `sys.stats_columns`
    中的列。


    **表 5-5**

    `sys.stats_columns` 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | int | 此列所属对象的 ID |

    | `stats_id` | int | 此列所属统计信息的 ID |

    | `stats_column_id` | int | 在统计信息列集合中的基于 1 的序号 |

    | `column_id` | int | 来自 `sys.columns` 的列的 ID |

    '
- fmt: '### STATS_DATE


    在评估统计信息准确性时，一个重要的考量因素是统计信息是否已过时。判断统计信息是否过时的常用方法是使用 `STATS_DATE` 函数。该函数提供了统计信息最近一次更新的日期。如清单
    [5-4](#338675_4_En_5_Chapter.xhtml#PC4) 所示，该函数的语法接受一个 `object_id` 和一个 `stats_id`。对于索引而言，`stats_id`
    与 `index_id` 的值相同。


    ```

    STATS_DATE ( object_id , stats_id )

    Listing 5-4

    STATS_DATE 语法

    ```


    虽然 `STATS_DATE` 函数常用于识别过时的统计信息，但这种方法对于此任务并不有效。统计信息的最后更新日期并不一定能反映数据变化的速率。一个数据数年未更新、统计信息是数月前的表，其统计信息可能并未过时；而一个频繁进行插入、更新和删除操作、但其统计信息在前一天更新的表，其统计信息可能已经无法代表索引中的实际值。尽管对于统计信息变化缓慢的索引，该函数可以作为一个通用的检查工具，但鉴于上述例子，使用时应谨慎。


    ### sys.dm_db_stats_properties


    识别统计信息变化率的更好方法是使用 `sys.dm_db_stats_properties` DMO，它提供了一个能反映数据变化情况的指标。这个 DMO 在
    SQL Server 2008 中引入，提供了自上次更新统计信息以来已更改行数的详细信息。如清单 [5-5](#338675_4_En_5_Chapter.xhtml#PC5)
    所示，`sys.dm_db_stats_properties` 的语法接受一个 `object_id` 和一个 `stats_id`。与 `STATS_DATE`
    一样，`stats_id` 与 `index_id` 值相同。表 [5-6](#338675_4_En_5_Chapter.xhtml#Tab6) 列出了
    `sys.dm_db_stats_properties` 中的列。


    表 5-6


    sys.dm_db_stats_properties 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 相关对象的 ID。 |

