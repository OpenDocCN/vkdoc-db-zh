    *包含一行数据的更新页面分配查询表结果截图。列标题和值分别为：表名、索引名、叶子分配计数 9849、非叶子分配计数 35、叶子页面合并计数 0、非叶子页面合并计数
    0。*


    **图 5-28** 更新页面分配的查询结果'
- fmt: '### Compression


    There are two columns in `sys.dm_db_index_operational_stats` that are used for
    monitoring compression. These columns, listed in Table 5-18, count the number
    of attempts that have been made at compressing a page and then the number of successful
    attempts in doing so. The primary value in these columns is providing feedback
    on `PAGE`-level compression. Failures can lead to decisions to remove compression
    because it is usually not practical to have compression enabled when there is
    a high rate of compression failures.


    **Table 5-18**

    **Compression Columns in `sys.dm_db_index_operational_stats`**


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `page_compression_attempt_count` | `bigint` | Number of pages that were evaluated
    for `PAGE`-level compression for specific partitions of a table, index, or indexed
    view. Includes pages that were not compressed because significant savings could
    not be achieved. |

    | `page_compression_success_count` | `bigint` | Number of data pages that were
    compressed by using `PAGE`-level compression for specific partitions of a table,
    index, or indexed view. |


    Page compression can fail when the cost to compress the data exceeds the value
    in uncompressing that data later. This is typically found in data that has low
    patterns of repeating data, such as images. When image data is compressed, it
    often does not receive sufficient benefit from the compression, and SQL Server
    will not store the page as a compressed page. To demonstrate this, execute the
    code in Listing 5-42, which creates a table with page compression enabled and
    inserts a number of images into it.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    CREATE TABLE dbo.PageCompression(

    ProductPhotoID int NOT NULL,

    ThumbNailPhoto varbinary(max) NULL,

    LargePhoto varbinary(max) NULL,

    CONSTRAINT PK_PageCompression PRIMARY KEY CLUSTERED (ProductPhotoID))

    WITH (DATA_COMPRESSION = PAGE);

    INSERT INTO dbo.PageCompression

    SELECT ProductPhotoID

    ,ThumbNailPhoto

    ,LargePhoto

    FROM Production.ProductPhoto;

    ```

    Listing 5-42

    T-SQL Script to Create a Table with Page Compression


    The insert into the table doesn’t fail, but are all the pages compressed? To find
    out, execute the script in Listing 5-43; it returns the `page_compression_attempt_count`
    and `page_compression_success_count` columns. The results in Figure 5-29 show
    that 7 pages were successfully compressed, but 46 pages failed to compress. With
    this ratio of successes to failures for page compression, it is easy to see that
    the value of page compression on the clustered index of `dbo.PageCompression`
    is low.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig29_HTML.png)

    **Figure 5-29**

    Query results for compression


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    as table_name

    ,i.name as index_name

    ,page_compression_attempt_count

    ,page_compression_success_count

    FROM sys.dm_db_index_operational_stats (DB_ID(), OBJECT_ID(''dbo.PageCompression''),
    NULL, NULL) ios

    INNER JOIN sys.indexes i ON i.object_id = ios.object_id AND i.index_id = ios.index_id;

    ```

    Listing 5-43

    Query for Page Compression Attempts in `sys.dm_db_index_operational_stats`


    ### LOB Access


    The next group of columns in `sys.dm_db_index_operational_stats` pertains to large
    objects (LOBs). They provide information on the number of pages fetched and their
    size. There are also columns that measure the amount of LOB data that is pushed
    off and pulled into rows. Table 5-19 lists all these columns and others in this
    group.


    **Table 5-19**

    **LOB Access Columns in `sys.dm_db_index_operational_stats`**


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `lob_fetch_in_pages` | `bigint` | Cumulative count of LOB pages retrieved from
    the `LOB_DATA` allocation unit. These pages contain data that is stored in columns
    of type `text`, `ntext`, `image`, `varchar(max)`, `nvarchar(max)`, `varbinary(max)`,
    and `xml`. |

    | `lob_fetch_in_bytes` | `bigint` | Cumulative count of LOB data bytes retrieved.
    |

    | `lob_orphan_create_count` | `bigint` | Cumulative count of orphan LOB values
    created for bulk operations. |

    | `lob_orphan_insert_count` | `bigint` | Cumulative count of orphan LOB values
    inserted during bulk operations. |

    | `row_overflow_fetch_in_pages` | `bigint` | Cumulative count of row-overflow
    data pages retrieved from the `ROW_OVERFLOW_DATA` allocation unit. |

    | `row_overflow_fetch_in_bytes` | `bigint` | Cumulative count of row-overflow
    data bytes retrieved. |

    | `column_value_push_off_row_count` | `bigint` | Cumulative count of column values
    for LOB data and row-overflow data that is pushed off-row to make an inserted
    or updated row fit within a page. |

    | `column_value_pull_in_row_count` | `bigint` | Cumulative count of column values
    for LOB data and row-overflow data that is pulled in-row. This occurs when an
    update operation frees up space in a record and provides an opportunity to pull
    in one or more off-row values from the `LOB_DATA` or `ROW_OVERFLOW_DATA` allocation
    unit to the `IN_ROW_DATA` allocation unit. |


    The LOB access columns are useful in determining the volume of large object activity
    and when data may be moving from large object to in-row-overflow storage. This
    is relavent when there are performance issues related to retrieving or updating
    LOB data. For example, the column `lob_fetch_in_bytes` measures the bytes from
    LOB columns retrieved by SQL Server for the index.


    The script in Listing 5-44 can be used to demonstrate LOB activity. This does
    not represent all possible activity, but it covers the basics. At the start of
    the script, the table `dbo.LOBAccess` is created with the column `LOBValue`, which
    uses a large object data type. The first operation against the table inserts ten
    rows that are narrow enough that the `LOBValue` values can be stored on the data
    page with the rows. The second operation increases the size of the `LOBValue`
    column, forcing it to expand outside the 8 KB max for a data row. The final operation
    retrieves all rows from the table.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.LOBAccess'') IS NOT NULL

    DROP TABLE dbo.LOBAccess;

    CREATE TABLE dbo.LOBAccess

    (

    ID INT IDENTITY(1,1) PRIMARY KEY CLUSTERED

    ,LOBValue VARCHAR(MAX)

    ,FillerData CHAR(2000) DEFAULT(REPLICATE(''X'',2000))

    ,FillerDate DATETIME DEFAULT(GETDATE())

    );

    INSERT INTO dbo.LOBAccess (LOBValue)

    SELECT TOP 10 ''Short Value''

    FROM Production.ProductPhoto;

    UPDATE dbo.LOBAccess

    SET LOBValue = REPLICATE(''Long Value'',8000);

    SELECT * FROM dbo.LOBAccess;

    ```

    Listing 5-44

    T-SQL Script to Create a Table with LOB Data'
