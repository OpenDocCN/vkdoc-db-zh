- fmt: '### Heap Bloat and Forwarding


    #### 堆膨胀


    As discussed in Chapter [3](#338675_4_En_3_Chapter.xhtml), heaps are collections
    of unordered pages in which data for a table is stored. As new rows are added
    to the table, the heap grows as new pages are allocated. Insert and update operations
    can cause changes to heaps that can require maintenance on the table.


    To begin, bloating within a heap will be reviewed. For heaps, bloating occurs
    when records are deleted from the heap without being reused for new records. As
    discussed in Chapter [10](#338675_4_En_10_Chapter.xhtml), this is not a matter
    of records going to new pages but an overall decline in the number of records
    in the table. The pages will be reused, but when they are not, the pages remain
    allocated, and this can have an impact on performance.


    To demonstrate this activity, the script in Listing [11-16](#338675_4_En_11_Chapter.xhtml#PC16)
    will be used. This script starts with a heap table that has 400 records inserted
    into it. Next, half of the records are deleted, leaving 200 in the table. As shown
    in Figure [11-13](#338675_4_En_11_Chapter.xhtml#Fig13), the record count for the
    table reflects these changes, but in both cases the DMV results show that there
    are 100 pages associated with the table. This is because pages are not removed
    from a heap unless maintenance activities force this to occur. Through the `ALTER
    TABLE` statement on `dbo.HeapTable` with the `REBUILD` option, the table is rebuilt,
    and the excess pages are flushed.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig13_HTML.png)


    3 tables of 5 column headers. They are no column name, index type descending,
    page count, record count, and forwarded record count, along with its corresponding
    values in 6 rows. Record count of 3 table is 400, 200, and 200 respectively.


    Figure 11-13


    Results from deleting from a heap


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.HeapTable'') IS NOT NULL

    DROP TABLE dbo.HeapTable;

    CREATE TABLE dbo.HeapTable

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.HeapTable (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    DELETE FROM dbo.HeapTable

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    ALTER TABLE dbo.HeapTable REBUILD;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(),OBJECT_ID(''dbo.HeapTable''),NULL,NULL,''DETAILED'');

    SET STATISTICS IO ON;

    SELECT COUNT(*) FROM dbo.HeapTable;

    SET STATISTICS IO OFF;

    ```


    Listing 11-16

    Impact of Deletes on Heap Page Allocations


    To help emphasize that the pages are still in the table, Figure [11-14](#338675_4_En_11_Chapter.xhtml#Fig14)
    shows the pages that are read when counting all rows in the table, further demonstrating
    that there are 100 pages being accessed. When considering the impact on performance
    for heaps after a delete, an excessive number of pages in a heap compared with
    the amount of data will increase the amount of effort required by SQL Server to
    execute queries against it. In the case of this demonstration, the `COUNT(*)`
    queries process twice the amount of data that is required.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig14_HTML.png)


    An input output page with 3 rows of data. Each row has a table, heap table, scan
    count 1, logical reads 100, physical reads 0, read-ahead reads 0, and lob logical
    reads 0 except the logical reads of row 3 is 50.


    Figure 11-14


    I/O impact from deletes on a heap


    #### 记录转发


    The other area of consideration for the maintenance of heaps is the volume of
    forwarded records in the table. Forwarded records, discussed in Chapter [3](#338675_4_En_3_Chapter.xhtml),
    are records within a heap that no longer fit in the original location in which
    they were added to the heap. To accommodate the change in the size of the record,
    the record is stored on another page, and the previous record location includes
    a pointer to the new location.


    The impact of this change is an increase in the number of pages in the heap, because
    new pages are added for existing records, and it takes an additional I/O operation
    to go from the first page to the forwarded page when looking up a record. While
    this may not appear to be a significant problem, in aggregate the accumulated
    impact of forwarded records increases the amount of I/O for a system and adds
    to latency in query execution.


    To demonstrate the impact of forwarded records on queries, execute the code in
    Listing [11-17](#338675_4_En_11_Chapter.xhtml#PC17). This script creates a table
    with a heap, runs a number of queries, updates the records to cause forwarding
    of heap records to occur, and then completes by re-executing the previous set
    of queries.


    ```sql

    USE AdventureWorks2017

    GO

    SET NOCOUNT ON

    IF OBJECT_ID(''dbo.ForwardedRecords'') IS NOT NULL

    DROP TABLE dbo.ForwardedRecords;

    CREATE TABLE dbo.ForwardedRecords

    (

    ID INT IDENTITY(1,1)

    ,VALUE VARCHAR(8000)

    );

    CREATE NONCLUSTERED INDEX IX_ForwardedRecords_ID ON dbo.ForwardedRecords(ID);

    INSERT INTO dbo.ForwardedRecords (VALUE)

    SELECT REPLICATE(type, 500)

    FROM sys.objects;

    SET STATISTICS IO ON

    PRINT ''*** No forwarded records''

    SELECT * FROM dbo.ForwardedRecords;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID = 40;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID BETWEEN 40 AND 60;

    SET STATISTICS IO OFF

    UPDATE dbo.ForwardedRecords

    SET VALUE =REPLICATE(VALUE, 16)

    WHERE ID%3 = 1;

    SET STATISTICS IO ON

    PRINT ''*** With forwarded records''

    SELECT * FROM dbo.ForwardedRecords;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID = 40;

    SELECT * FROM dbo.ForwardedRecords

    WHERE ID BETWEEN 40 AND 60;

    SET STATISTICS IO OFF

    ```


    Listing 11-17

    Forwarded Record Impact on Query Performance


    There are three queries from Listing [11-17](#338675_4_En_11_Chapter.xhtml#PC17)
    that are included to demonstrate the impact of forwarded records on heaps:


    *   `SELECT *`: To demonstrate the impact of an index scan

    *   `SELECT *` with equality predicate: To demonstrate the impact on a singleton
    lookup

    *   `SELECT *` with inequality predicate: To demonstrate the impact on a range
    lookup


    For the `SELECT *` query, before the forwarded records are in the heap, the query
    executes with 99 reads, as shown in Figure [11-15](#338675_4_En_11_Chapter.xhtml#Fig15).
    After the forwarded records are introduced, the reads increase to 561. This increase
    is because of the new pages added to the heap to accommodate the increases in
    the row sizes. With the second query, the singleton lookup grows from three reads
    to four reads, which represents the additional read required to go from the original
    location for the record to the forwarding location. In the last query, the range
    query with the lookup executes with 23 reads, but after the forwarded records
    are added to the table, the reads jump to 30 reads.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig15_HTML.png)


    2 input output statistics pages of no forwarded and with forwarded records. Each
    record has three rows with the following data: table, forwarded records, scan
    count, logical reads, and physical reads. 1. The logical reads are 99, 3, 23.
    2. The logical reads are 561, 4, 30.


    Figure 11-15


    I/O statistics for forwarded record queries'
