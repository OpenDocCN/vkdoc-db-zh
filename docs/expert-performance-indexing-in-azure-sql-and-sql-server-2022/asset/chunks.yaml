  trans: '### 缓冲区分配


    在通过索引确定服务器状态时，最终需要查看的领域是缓冲区缓存中的数据页面。这通常不是在考虑索引时会典型查看的区域，但它提供了关于 SQL Server 正将什么数据加载到内存中的丰富信息。它可以为
    SQL Server 实例回答的核心问题是：缓冲区中的数据是否代表了使用该 SQL Server 的应用程序最重要的数据？


    回答这个问题的第一部分是查看内存中每个数据库的页面数量。这可能看起来不重要，但不同数据库所使用的内存量有时会令人惊讶。在为 `MSDB` 数据库中的备份表添加索引之前，这些表将所有备份数据推送到内存中的情况并不少见。如果表中的数据不经常被清理，这可能导致大量对业务应用程序并非关键的数据消耗了不必要的资源。


    对于问题的第二部分，我们需要联系使用该 SQL Server 实例的应用程序所有者和主题专家。如果这些人的回答与缓冲区中的信息不符，这就为我们提供了一个数据库列表，我们可以专注于对这些数据库进行索引优化。


    类似地，许多应用程序都有用于存储错误和处理事件以便日后进行故障排除的日志数据库。当问题出现时，开发人员无需查看日志文件，只需简单地查询数据库并提取他们进行故障排除所需的事件即可。但是，如果这些表没有正确索引或者查询不是
    SARGable 会怎样呢？拥有数百万或数十亿行的日志表可能会被推入内存，将来自业务线应用程序的数据挤出内存，从而损害整个 SQL Server 的性能。如果不检查缓冲区中的数据，就无法知道内存中有什么以及它是否有价值。


    检查内存中的数据是一项相对简单的任务，它利用了动态管理对象 `sys.dm_os_buffer_descriptors`。此 DMO 列出了内存中的每个数据页面并描述了页面上的信息。通过统计每个数据库的每个页面，可以确定分配给该数据库的页面总数和内存大小。使用清单
    16-33 中的查询，我们可以在图 16-13 中看到 `ContosoRetailDW` 数据库在服务器上占用的内存最多，而 `IndexingMethod`
    数据库当前使用了 8.84 MB 的空间。


    ![](img/338675_4_En_16_Fig13_HTML.jpg)

    一个包含 3 列 7 行的表格截图。列标题为数据库名称、缓冲页面计数和缓冲池 M B。Contoso 零售 D W 的数据为 8115 和 63.40。


    图 16-13

    每个数据库查询的缓冲区分配结果


    ```sql

    SELECT LEFT(CASE database_id

    WHEN 32767 THEN ''ResourceDb''

    ELSE DB_NAME(database_id) END, 20) AS Database_Name,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_Pool_MB

    FROM sys.dm_os_buffer_descriptors

    GROUP BY DB_NAME(database_id),

    database_id

    ORDER BY Buffered_Page_Count DESC;

    ```

    清单 16-33

    每个数据库的缓冲区分配


    一旦确定了内存中的数据库，确定数据库中的哪些对象在内存中也是有用的。与查看哪些数据库在内存中的原因相同，识别内存中的对象有助于确定在建立索引时需要重点关注的表和索引。检索每个表和索引的内存使用情况同样使用
    `sys.dm_os_buffer_descriptors`，但需要将行映射到目录视图 `sys.allocation_units` 和 `sys.partitions`
    中的 `allocation_unit_id` 值。


    通过清单 16-34 中的查询，可以返回每个用户表和索引使用的内存量。在图 16-14 的结果中，显示表 FactSales 和 FactOnlineSales
    占用了大量的内存。如果这出乎意料并且这些事实表并不明显，我们肯定想了解更多为什么它们占用如此多内存的原因。这可以引出其他问题，例如：这些数据是什么？为什么它如此之大？该表占用的空间是否影响了其他数据库使用其索引最佳利用内存的能力？在这些情况下，我们需要调查这些表上的索引，因为消耗内存最多的表应该拥有最优化的索引配置。


    ![](img/338675_4_En_16_Fig14_HTML.png)

    一个包含 11 行 5 列的表格，列在结果选项卡下。列标题为名称、名称、类型描述、缓冲页面计数和缓冲 M B。fact sales 的缓冲页面计数和缓冲 M
    B 分别为 18918 和 147.80。


    图 16-14

    每个表/索引查询的缓冲区分配结果


    ```sql

    WITH BufferAllocation

    AS (SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND (au.type = 1 OR au.type = 3)

    UNION ALL

    SELECT object_id,

    index_id,

    allocation_unit_id

    FROM sys.allocation_units AS au

    INNER JOIN sys.partitions AS p ON au.container_id = p.hobt_id

    AND au.type = 2)

    SELECT t.name,

    we.name,

    we.type_desc,

    COUNT(*) AS Buffered_Page_Count,

    CAST(COUNT(*) * 8 / 1024.0 AS NUMERIC(10, 2)) AS Buffer_MB

    FROM sys.tables t

    INNER JOIN BufferAllocation ba ON t.object_id = ba.object_id

    LEFT JOIN sys.indexes we ON ba.object_id = we.object_id

    AND ba.index_id = we.index_id

    INNER JOIN sys.dm_os_buffer_descriptors bd ON ba.allocation_unit_id = bd.allocation_unit_id

    WHERE bd.database_id = DB_ID()

    GROUP BY t.name,

    we.index_id,

    we.name,

    we.type_desc

    ORDER BY Buffered_Page_Count DESC;

    ```

    清单 16-34

    按表/索引的缓冲区分配


    ## 模式发现


    在调查了服务器状态及其索引需求之后，索引分析过程的下一步是研究数据库的模式，以确定是否存在可以解决的与模式相关的索引问题。对于这些问题，主要关注点将放在可以通过目录视图发现的一些关键细节上。'
- fmt: '## Schema Issues: Heaps and Duplicate Indexes


    ### Identify Heaps


    It is often more ideal to utilize clustered indexes on tables as opposed to storing
    tables as heaps. When heaps are preferred, it should be when the use of a clustered
    index has been shown to negatively impact performance as opposed to a heap. When
    investigating heaps, it is best to consider the number of rows and the utilization
    of the heap. When a heap has a low number of rows or is not being used, taking
    the effort to cluster its table will likely have little to no impact on performance.


    To identify heaps, use the catalog views `sys.indexes` and `sys.partitions`. The
    performance information is available in the table `dbo.index_usage_stats_history`.
    It can be used in conjunction to form the query in Listing 16-35, which provides
    the output in Figure 16-15.


    The results show that `dbo.DatabaseLog` has many rows. The next step is to review
    the schema of the table. If there is a primary key already on the table, it’s
    a good candidate for the clustered index key. If not, check for another key column,
    such as a business key. If there is no key column, it may be worthwhile to add
    a surrogate key to the table.


    ```sql

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(we.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(we.object_id))
    AS object_name,

    we.index_id,

    p.rows,

    SUM(h.user_seeks) AS user_seeks,

    SUM(h.user_scans) AS user_scans,

    SUM(h.user_lookups) AS user_lookups,

    SUM(h.user_updates) AS user_updates

    FROM sys.indexes we

    INNER JOIN sys.partitions p ON we.index_id = p.index_id

    AND we.object_id = p.object_id

    LEFT OUTER JOIN IndexingMethod.dbo.index_usage_stats_history h ON p.object_id
    = h.object_id

    AND p.index_id = h.index_id

    WHERE type_desc = ''HEAP''

    GROUP BY we.index_id,

    p.rows,

    we.object_id

    ORDER BY p.rows DESC;

    ```

    **Listing 16-35**

    Query to Identify Heaps


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig15_HTML.png)

    **Figure 16-15**

    Output for query identifying heaps


    ### Duplicate Indexes


    The next schema issue to review is duplicate indexes. Except for very rare edge
    cases, there is no need to have duplicate indexes in a database. They waste space
    and cost resources to maintain without providing any benefit. To determine that
    an index is a duplicate of another, review the key columns and included columns
    of the index. If these values match, the index is considered a duplicate.


    To uncover duplicate indexes, the `sys.indexes` view is used in conjunction with
    the `sys.index_columns` catalog view. Comparing these views to each other using
    the code in Listing 16-36 will provide a list of the indexes that are duplicates.
    The results from the query, displayed in Figure 16-16, show that in the `AdventureWorks2017`
    database, the indexes `AK_Document_rowguid` and `UQ__Document__F73921F7C5112C2E`
    are duplicates.


    When duplicates are found, one of the two indexes should be removed from the database.
    While one of the indexes will have index activity, removing either will shift
    the activity from one to the other. Before removing either index, review the non-column
    properties of the index to make sure important aspects of the index are not lost.
    For instance, if one of the indexes is designated as unique, be sure that the
    index retained still has that property.


    ```sql

    USE AdventureWorks2017;

    GO

    WITH IndexSchema

    AS (SELECT we.object_id,

    we.index_id,

    we.name,

    ISNULL(we.filter_definition, '''') AS filter_definition,

    we.is_unique,

    (

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH('''')

    ) + COALESCE((

    SELECT QUOTENAME(CAST(ic.column_id AS VARCHAR(10)) + CASE

    WHEN ic.is_descending_key = 1 THEN ''-''

    ELSE ''+'' END,

    ''(''

    )

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND we.index_id = ic_key.index_id

    AND ic_key.is_included_column = 0

    WHERE we.object_id = ic.object_id

    AND ic.index_id = 1

    AND ic.is_included_column = 0

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    ''''

    ) + CASE

    WHEN we.is_unique = 1 THEN ''U''

    ELSE '''' END AS index_columns_keys_ids,

    CASE

    WHEN we.index_id IN ( 0, 1 ) THEN ''ALL-COLUMNS''

    ELSE COALESCE((

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    INNER JOIN sys.columns c ON ic.object_id = c.object_id

    AND ic.column_id = c.column_id

    LEFT OUTER JOIN sys.index_columns ic_key ON c.object_id = ic_key.object_id

    AND c.column_id = ic_key.column_id

    AND ic_key.index_id = 1

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND ic.is_included_column = 1

    AND ic_key.index_id IS NULL

    ORDER BY ic.key_ordinal ASC

    FOR XML PATH('''')

    ),

    SPACE(0)

    ) END AS included_columns_ids

    FROM sys.tables t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    INNER JOIN sys.data_spaces ds ON we.data_space_id = ds.data_space_id

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id

    AND we.index_id = ps.index_id)

    SELECT QUOTENAME(DB_NAME()) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(is1.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(is1.object_id))
    AS object_name,

    is1.name AS index_name,

    is2.name AS duplicate_index_name

    FROM IndexSchema is1

    INNER JOIN IndexSchema is2 ON is1.object_id = is2.object_id

    AND is1.index_id <> is2.index_id

    AND is1.index_columns_keys_ids = is2.index_columns_keys_ids

    AND is1.included_columns_ids = is2.included_columns_ids

    AND is1.filter_definition = is2.filter_definition

    AND is1.is_unique = is2.is_unique;

    ```

    **Listing 16-36**

    Query to Identify Duplicate Indexes


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig16_HTML.png)

    **Figure 16-16**

    Output for query identifying duplicate indexes


    Note

    The original inspiration for the overlapping index query is from the blog post
    at `http://sqlblog.com/blogs/paul_nielsen/archive/2008/06/25/find-duplicate-indexes.aspx`
    by Paul Nielsen.'
