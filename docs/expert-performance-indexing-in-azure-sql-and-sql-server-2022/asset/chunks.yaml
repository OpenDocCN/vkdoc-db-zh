  trans: '

    `dbo.Contact` 表目前仅有三个索引。分别是 `ContactID` 列上的聚集索引、`LastName` 上的非聚集索引，以及一个包含 `LastName`、`IsActive`
    和 `EmailAddress` 作为索引数据的 `FirstName` 索引。在这些索引就位后，需要对前文模式中的查询（如清单 13-24 所示）针对该表进行测试。


    关于查询在“包含列”模式与其他模式下的性能表现，有两点关键需要注意。首先，所有查询的执行计划（如图 13-35 所示）都使用了索引查找操作。对于仅按 `FirstName`
    过滤的查询，使用查找操作是预期的；但当附加了对 `LastName` 的过滤条件时，它仍然可以使用。SQL Server 能够做到这一点，是因为在索引查找之下，它会扫描匹配第一个谓词的行范围，然后移除
    `LastName` 值不为 `Cox` 的结果。第二个需要注意的点是每个查询的读取次数，如图 13-34 所示。读取次数从两次增加到了三次。虽然这构成了
    50% 的读取增长，但性能变化并不显著，不足以证明在单一索引已能充分提供所需性能的情况下，创建四个索引是合理的。


    ![](img/338675_4_En_13_Fig35_HTML.png)


    一个面板，其中打开了执行计划选项卡，包含查询 1 到 3 的各 2 行文本，每个查询占批处理成本的 33%。每个查询都有一个流程图，展示了从索引查找（非聚集，Contacts，成本
    100%）到选择（成本 0%）的连接。


    图 13-35

    “包含列”模式的执行计划


