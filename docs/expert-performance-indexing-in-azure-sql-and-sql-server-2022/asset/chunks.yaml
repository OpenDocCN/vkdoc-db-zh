    ### Myth 2: Primary Keys Are Always Clustered


    The next myth that is quite prevalent is the idea that primary keys are always
    clustered. While this is true in many cases, it cannot be assumed that all primary
    keys are also clustered indexes. Earlier in this book, it was discussed how a
    table can have only a single clustered index on it. If a primary key is created
    after the clustered index is built, then the primary key is likely to be created
    as a non-clustered index.


    To illustrate the indexing behavior of primary keys, a script will be used that
    includes building two tables. The first table, named `dbo.MythTwo1`, will be built
    first; then a primary key will be created on the `RowID` column. For the second
    table named `dbo.MythTwo2`, the script will create it and build a clustered index
    before creating the primary key. The code for this is in [Listing 10-5](#338675_4_En_10_Chapter.xhtml#PC5).


    ```

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.MythTwo1

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    ALTER TABLE dbo.MythTwo1

    ADD CONSTRAINT PK_MythTwo1 PRIMARY KEY (RowID);

    GO

    CREATE TABLE dbo.MythTwo2

    (

    RowID int NOT NULL

    ,Column1 nvarchar(128)

    ,Column2 nvarchar(128)

    );

    CREATE CLUSTERED INDEX CL_MythTwo2 ON dbo.MythTwo2 (RowID);

    ALTER TABLE dbo.MythTwo2

    ADD CONSTRAINT PK_MythTwo2 PRIMARY KEY (RowID);

    GO

    SELECT OBJECT_NAME(object_id) AS table_name

    ,name

    ,index_id

    ,type

    ,type_desc

    ,is_unique

    ,is_primary_key

    FROM sys.indexes

    WHERE object_id IN (OBJECT_ID(''dbo.MythTwo1''),OBJECT_ID(''dbo.MythTwo2''));

    Listing 10-5

    Two Ways to Create Primary Keys

    ```


