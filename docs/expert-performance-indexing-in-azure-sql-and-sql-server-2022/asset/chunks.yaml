    Parallel Queries Currently Executing


    ## Extended Events Session for Analyzing Parallel Waits


    The second way is to start an Extended Events session, capture transaction information,
    and then group that information on the available call stack. The session, defined
    in Listing 16-29, retrieves all parallel waits as they occur and groups them by
    their `T-SQL` stack. Before running the script, ensure that the value for the
    `CXPACKET` wait type matches the value in the query; for `SQL Server 2019`, the
    value is `265`. The `T-SQL` stack contains all SQL statements that contribute
    to a final execution point. For example, drilling through an execution stack can
    provide information on a stored procedure that is executing a function that executes
    a single `T-SQL` statement. This provides details that can be used to track where
    the parallel wait is occurring. These statements are grouped using the `histogram`
    target, which allows us to minimize the size of the collection and focus on the
    items causing the most `CXPACKET` waits on the system.


    ```sql

    USE master;

    GO

    SELECT name,

    map_key,

    map_value

    FROM sys.dm_xe_map_values

    WHERE name = ''wait_types''

    AND map_value = ''CXPACKET'';

    GO

    IF EXISTS (

    SELECT *

    FROM sys.server_event_sessions

    WHERE name = ''ex_cxpacket''

    )

    DROP EVENT SESSION ex_cxpacket ON SERVER;

    GO

    CREATE EVENT SESSION [ex_cxpacket]

    ON SERVER

    ADD EVENT sqlos.wait_info

    (ACTION (

    sqlserver.plan_handle,

    sqlserver.tsql_stack)

    WHERE ([wait_type] = (265)

    AND [sqlserver].[is_system] = (0)))

    ADD TARGET package0.histogram

    (SET filtering_event_name = N''sqlos.wait_info'', slots = (2048), source = N''sqlserver.tsql_stack'',
    source_type = (1))

    WITH (STARTUP_STATE = ON);

    GO

    ALTER EVENT SESSION ex_cxpacket ON SERVER STATE = START;

    GO

    ```

    Listing 16-29

    Extended Events Session for `CXPACKET`


    Once the Extended Events session has collected data for a while, the sessions
    with the most waits can be looked at more closely. Listing 16-30 provides a list
    of all the `CXPACKET` waits that have been collected and the statements and query
    plans associated with them. Once we know these, investigate the indexes being
    used to determine which are resulting in low selectivity or unexpected scans.


    ```sql

    WITH XData

    AS (SELECT CAST(target_data AS XML) AS TargetData

    FROM sys.dm_xe_session_targets st

    INNER JOIN sys.dm_xe_sessions s ON s.address = st.event_session_address

    WHERE name = ''ex_cxpacket''

    AND target_name = ''histogram''),

    ParsedEvent

    AS (SELECT c.value(''(@count)[1]'', ''bigint'') AS event_count,

    c.value(''xs:hexBinary(substring((value/frames/frame/@handle)[1],3))'', ''varbinary(255)'')
    AS sql_handle,

    c.value(''(value/frames/frame/@offsetStart)[1]'', ''int'') AS statement_start_offset,

    c.value(''(value/frames/frame/@offsetEnd)[1]'', ''int'') AS statement_end_offset

    FROM XData d

    CROSS APPLY TargetData.nodes(''//Slot'') t(c) )

    SELECT QUOTENAME(DB_NAME(st.dbid)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(st.objectid, st.dbid)) + ''.'' + QUOTENAME(OBJECT_NAME(st.objectid,
    st.dbid)) AS object_name,

    e.event_count,

    SUBSTRING(

    st.text,

    e.statement_start_offset / 2,

    (IIF(e.statement_end_offset = -1, LEN(CONVERT(NVARCHAR(MAX), st.text)) * 2, e.statement_end_offset)

    - e.statement_start_offset

    ) / 2

    ) AS query_text,

    qp.query_plan

    FROM ParsedEvent e

    CROSS APPLY sys.dm_exec_sql_text(e.sql_handle) st

    CROSS APPLY (

    SELECT plan_handle

    FROM sys.dm_exec_query_stats qs

    WHERE e.sql_handle = qs.sql_handle

    GROUP BY plan_handle

    ) x

    CROSS APPLY sys.dm_exec_query_plan(x.plan_handle) qp

    ORDER BY e.event_count DESC;

    ```

    Listing 16-30

    Query to View `CXPACKET` Extended Events Session


    ## Degree of Parallelism Feedback in SQL Server 2022


    `SQL Server 2022` adds a new feature to Intelligent Query Processing (`IQP`) that
    greatly improves how parallelism is used in execution plans: Degree of Parallelism
    Feedback. This is a database-scoped configuration change that allows `SQL Server`
    to automatically adjust the degree of parallelism for individual queries when
    the query optimizer considers the current `DOP` to be suboptimal for a recurring
    query. This is a powerful enhancement that can automatically tune parallelism
    and is especially useful on servers that make heavy use of parallel execution
    plans. The `T-SQL` in Listing 16-31 provides the syntax for enabling `DOP Feedback`
    in `SQL Server 2022+`.


    ```sql

    ALTER DATABASE SCOPED CONFIGURATION SET DOP_FEEDBACK = ON;

    ```

    Listing 16-31

    Query to View `CXPACKET` Extended Events Session


    To validate the current (and default) setting for this feature, the `T-SQL` in
    Listing 16-32 may be used.


    ```sql

    SELECT

    *

    FROM sys.database_scoped_configurations

    WHERE database_scoped_configurations.name = ''DOP_FEEDBACK'';

    ```

    Listing 16-32

    Query to View the Current `DOP Feedback` Setting


    The results in Figure 16-12 validate that `DOP Feedback` is now enabled and that
    the `SQL Server` default for this feature is disabled.


    ![images/338675_4_En_16_Chapter/338675_4_En_16_Fig12_HTML.png](images/338675_4_En_16_Chapter/338675_4_En_16_Fig12_HTML.png)


    A page presents a table of 5 columns and a row under the results tab. Column headers
    with data are configuration i d 37, name D O P feedback, value 1, value for secondary
    is null, and value default 0.


    Figure 16-12

    `DOP_Feedback` configuration details.


    While Degree of Parallelism Feedback cannot solve all issues related to parallelism,
    it can help to automatically correct problems that otherwise would consume valuable
    time and resources. This is especially valuable in scenarios where there is no
    clear indexing or query tuning solution available for a parallelism challenge.'
