    查看 `CXPACKET` 扩展事件会话的查询


    ## SQL Server 2022 中的并行度反馈


    `SQL Server 2022` 为智能查询处理 (`IQP`) 增加了一项新功能，极大地改进了执行计划中并行度的使用方式：并行度反馈。这是一个数据库作用域的配置更改，允许
    `SQL Server` 在查询优化器认为当前 `DOP` 对于重复出现的查询并非最优时，自动为单个查询调整并行度。这是一个强大的增强功能，可以自动调优并行度，对于大量使用并行执行计划的服务器特别有用。代码清单
    16-31 中的 `T-SQL` 提供了在 `SQL Server 2022+` 中启用 `DOP Feedback` 的语法。


    ```sql

    ALTER DATABASE SCOPED CONFIGURATION SET DOP_FEEDBACK = ON;

    ```

    代码清单 16-31

    启用 `DOP Feedback` 的查询


    要验证此功能的当前（及默认）设置，可以使用代码清单 16-32 中的 `T-SQL`。


    ```sql

    SELECT

    *

    FROM sys.database_scoped_configurations

    WHERE database_scoped_configurations.name = ''DOP_FEEDBACK'';

    ```

    代码清单 16-32

    查看当前 `DOP Feedback` 设置的查询


    图 16-12 中的结果验证了 `DOP Feedback` 现已启用，并且 `SQL Server` 默认禁用此功能。


    ![images/338675_4_En_16_Chapter/338675_4_En_16_Fig12_HTML.png](img/338675_4_En_16_Fig12_HTML.png)


    一个页面在“结果”选项卡下呈现了一个包含 5 列和一行的表格。列标题及数据为：configuration i d 37， name D O P feedback，
    value 1， value for secondary 为 null， value default 0。


    图 16-12

    `DOP_Feedback` 配置详情。


    虽然并行度反馈不能解决所有与并行相关的问题，但它可以帮助自动纠正那些原本会消耗宝贵时间和资源的问题。在并行性挑战没有明确的索引或查询调优解决方案可用的情况下，这尤其有价值。

