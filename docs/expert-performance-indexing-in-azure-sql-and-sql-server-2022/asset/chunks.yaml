- fmt: "The overall effect of the forwarded records is an increase in reads. While\
    \ the increase may not be significant on a per-query basis, over time the impact\
    \ adds up. Scans of heaps with forwarded records access more pages, and lookups\
    \ require an extra I/O. Reducing the impact of forwarded records in heaps is an\
    \ important part of maintaining indexes and optimizing performance.\n\n### Columnstore\
    \ Fragmentation\n\nColumnstore indexes operate very differently from standard\
    \ rowstore indexes (clustered, non-clustered, and heaps). An interesting component\
    \ of columnstore indexes is the read-only nature of segments. As discussed in\
    \ Chapter [2](#338675_4_En_2_Chapter.xhtml), small inserts into a columnstore\
    \ index will be processed by the `deltastore` and later asynchronously merged\
    \ into compressed `rowgroups`. In addition, deletes are processed as soft deletes.\
    \ Rows are flagged as deleted, but not immediately removed, resulting in segments\
    \ that contain data that is no longer part of the table.\n\nTo demonstrate each\
    \ of these concepts, execute the code in Listing [11-18](#338675_4_En_11_Chapter.xhtml#PC18)\
    \ to prepare a table with a clustered columnstore index. After the table is built,\
    \ the two sets of rows are inserted. The first set contains 1,000 rows, and the\
    \ index is reorganized to force the rowgroup to compress to columnstore format.\
    \ The second set contains 105,000 rows, which is more than the 102,400 threshold\
    \ that automatically inserts rows directly into compressed rowgroups. Figure [11-16](#338675_4_En_11_Chapter.xhtml#Fig16)\
    \ shows that the inserted records are compressed directly into columnstore format.\n\
    \n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig16_HTML.png)\n\nA table\
    \ has 10 columns and 10 rows. The column headers are `object_id`, the `index_id`,\
    \ `partition_number`, `row_group_id`, `delta_store_hobt_id`, `state`, `state_description`,\
    \ `total_rows`, `deleted_rows`, and `size_in_bytes`. 7 rows have compressed row\
    \ groups.\n\n**Figure 11-16**  \nColumnstore rowgroup result set\n\n**Note** \
    \ \nDepending on your environment, the script in Listing [11-18](#338675_4_En_11_Chapter.xhtml#PC18)\
    \ may take a while to run.\n\n```sql\nUSE ContosoRetailDW\nGO\nIF OBJECT_ID('dbo.FactOnlineSalesCI')\
    \ IS NOT NULL\nDROP TABLE dbo.FactOnlineSalesCI\nCREATE TABLE dbo.FactOnlineSalesCI(\n\
    \    [OnlineSalesKey] [int] NOT NULL,\n    [DateKey] [datetime] NOT NULL,\n  \
    \  [StoreKey] [int] NOT NULL,\n    [ProductKey] [int] NOT NULL,\n    [PromotionKey]\
    \ [int] NOT NULL,\n    [CurrencyKey] [int] NOT NULL,\n    [CustomerKey] [int]\
    \ NOT NULL,\n    [SalesOrderNumber] [nvarchar](20) NOT NULL,\n    [SalesOrderLineNumber]\
    \ [int] NULL,\n    [SalesQuantity] [int] NOT NULL,\n    [SalesAmount] [money]\
    \ NOT NULL,\n    [ReturnQuantity] [int] NOT NULL,\n    [ReturnAmount] [money]\
    \ NULL,\n    [DiscountQuantity] [int] NULL,\n    [DiscountAmount] [money] NULL,\n\
    \    [TotalCost] [money] NOT NULL,\n    [UnitCost] [money] NULL,\n    [UnitPrice]\
    \ [money] NULL,\n    [ETLLoadID] [int] NULL,\n    [LoadDate] [datetime] NULL,\n\
    \    [UpdateDate] [datetime] NULL\n)\nINSERT INTO dbo.FactOnlineSalesCI\nSELECT\
    \ *\nFROM dbo.FactOnlineSales\nCREATE CLUSTERED COLUMNSTORE INDEX FactOnlineSalesCI_CCI\
    \ ON dbo.FactOnlineSalesCI\nDECLARE @we int= 1\nWHILE @we <= 5\nBEGIN\n    INSERT\
    \ INTO dbo.FactOnlineSalesCI\n    SELECT TOP 1000 *\n    FROM dbo.FactOnlineSales\n\
    \    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REORGANIZE\n    WITH (COMPRESS_ALL_ROW_GROUPS\
    \ =ON)\n    SET @we += 1\nEND\nWHILE @we <= 10\nBEGIN\n    INSERT INTO dbo.FactOnlineSalesCI\n\
    \    SELECT TOP 105000 *\n    FROM dbo.FactOnlineSales\n    SET @we += 1\nEND\n\
    SELECT*\nFROM sys.column_store_row_groups\nWHERE object_id=OBJECT_ID('dbo.FactOnlineSalesCI')\n\
    ORDER BY row_group_id DESC\n```\n\n**Listing 11-18**  \nPrepare a Columnstore\
    \ Table\n\nThe piece that is interesting at this point is that the rowgroups created\
    \ are much smaller than the max size for a rowgroup (about 1 million rows). Since\
    \ they are smaller, there may be an opportunity to optimize the number of pages\
    \ that they use by increasing the number of records per rowgroup. This can be\
    \ done by rebuilding the columnstore index. To illustrate the value in rebuilding\
    \ columnstore indexes, execute the code in Listing [11-19](#338675_4_En_11_Chapter.xhtml#PC19).\
    \ This shows that the logical reads before the rebuild are 83,423 over two scan\
    \ operations and then drop to 833 logical reads after the rebuild, shown in Figure\
    \ [11-17](#338675_4_En_11_Chapter.xhtml#Fig17). This is a massive drop in pages\
    \ accessed. When considering the effect of this type of maintenance over large\
    \ fact tables using columnstore indexes, these types of excessive allocations\
    \ of pages will greatly impact performance. Additionally, comparing Figures [11-16](#338675_4_En_11_Chapter.xhtml#Fig16)\
    \ and [11-18](#338675_4_En_11_Chapter.xhtml#Fig18), the table also has far fewer\
    \ rowgroups, from 34 to 14 after the columnstore index rebuild.\n\n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig18_HTML.png)\n\
    \nA table has 10 columns and 10 rows. The column headers are `object_id`, the\
    \ `index_id`, `partition_number`, `row_group_id`, `delta_store_hobt_id`, `state`,\
    \ `state_description`, `total_rows`, `deleted_rows`, and `size_in_bytes`. The\
    \ delta store and state description of all rows is null and compressed respectively.\n\
    \n**Figure 11-18**  \nRowgroup statistics after columnstore index rebuild\n\n\
    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig17_HTML.png)\n\nAn input output\
    \ statistics page illustrates how to rebuild the column store table with the data\
    \ of 1096 rows affected, along with the warning text that reads the join order\
    \ has been enforced because a local join hint is used. The `LOB` logical reads\
    \ drop from 83423 to 833.\n\n**Figure 11-17**  \nI/O statistics for columnstore\
    \ table inserts\n\n```sql\nUSE ContosoRetailDW\nGO\nSET STATISTICS IO ON\nSELECT\
    \ DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nALTER INDEX\
    \ ALL ON dbo.FactOnlineSalesCI REBUILD\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\n\
    GROUP BY DateKey\nSET STATISTICS IO OFF\nSELECT *\nFROM sys.column_store_row_groups\n\
    WHERE object_id = OBJECT_ID('dbo.FactOnlineSalesCI')\nORDER BY row_group_id DESC\n\
    ```\n\n**Listing 11-19**  \nImpact of Inserts on a Columnstore Table\n\nThe next\
    \ type of fragmentation that occurs with columnstore indexes is through delete\
    \ operations. While this is called *fragmentation*, when deletes occur on columnstore\
    \ indexes, the rows are not removed from the indexes. Instead, they are flagged\
    \ as deleted and continue to consume space within rowgroups. Because of this,\
    \ pages allocated to a clustered columnstore index that have all their records\
    \ deleted will still be active within the index.\n\nTo illustrate the impact of\
    \ soft-deleted rows in a columnstore index, the script in Listing [11-20](#338675_4_En_11_Chapter.xhtml#PC20)\
    \ will be used to delete the 2007 data from the table. Another statement will\
    \ then rebuild the columnstore index. Between these operations, an aggregate query\
    \ will be executed to provide an analytic operation to gauge the impact of deletes\
    \ on the I/O of queries.\n\n```sql\nUSE ContosoRetailDW\nGO\nSET STATISTICS IO\
    \ ON\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\n\
    DELETE FROM dbo.FactOnlineSalesCI\nWHERE DateKey <'2008-01-01'\nSELECT DateKey,COUNT(*)\n\
    FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nALTER INDEX ALL ON dbo.FactOnlineSalesCI\
    \ REBUILD\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\n\
    SET STATISTICS IO OFF\n```\n\n**Listing 11-20**  \nDelete Operations on a Clustered\
    \ Columnstore Index"
