- fmt: "### Row Compression\n\nThe first way to reduce the size of an index is by\
    \ reducing the size of the rows within the index. Row compression achieves this\
    \ by altering the way in which data is stored in a row. Row compression can be\
    \ used on heaps, clustered indexes, and non-clustered indexes. There are a few\
    \ things that occur on a row when row compression is enabled. These are as follows:\n\
    \n*   Modification of the metadata for the row.\n*   Fixed-length character data\
    \ is stored in a variable-length format.\n*   Numeric-based data types are stored\
    \ in variable-length format.\n\nWith the metadata changes, the information stored\
    \ for each column is generally reduced compared with a non–row compression record.\
    \ Excessive bits in the row overhead are removed, and the information is streamlined\
    \ to reduce waste. There is an exception to this change, though: some of the changes\
    \ to fixed-length data types may result in a larger row overhead to accommodate\
    \ for the additional information required for data length and offset values.\n\
    \nFor fixed-length character data, white space is removed from the end of values\
    \ in the column. This information is not lost, and the behavior of fixed-length\
    \ data types, such as `char` and `nchar`, is unaffected. The difference is only\
    \ in the manner in which the data is stored. For binary data, trailing zeros on\
    \ the value are removed, similar to white space. Information on the characters\
    \ removed from a column is stored in the row overhead.\n\nNumeric data types are\
    \ the data types that are manipulated the most with row compression. These data\
    \ types are stored in the smallest form possible for the data type. This means\
    \ a column with the `bigint` data type, which typically requires 8 bytes, would\
    \ require only 1 byte if the value stored is between 0 and 255. At the value 256,\
    \ the column would then store it in 2 bytes. This progression continues until\
    \ the need to store the value in 8 bytes is reached. This applies to all numeric-based\
    \ data types, including `smallint`, `int`, `bigint`, `decimal`, `numeric`, `smallmoney`,\
    \ `money`, `float`, `real`, `datetime`, `datetime2`, `datetimeoffset`, and `timestamp`.\n\
    \nTo demonstrate, a table is needed to implement compression, which is provided\
    \ in Listing 13-38. This script creates two tables, `dbo.NoCompression` and `dbo.RowCompression`.\
    \ These tables are used to demonstrate the effect of row compression on the size\
    \ of the table via the clustered index and on query performance.\n\n```sql\nUSE\
    \ AdventureWorks2017\nGO\nIF OBJECT_ID('dbo.NoCompression') IS NOT NULL\nDROP\
    \ TABLE dbo.NoCompression;\nIF OBJECT_ID('dbo.RowCompression') IS NOT NULL\nDROP\
    \ TABLE dbo.RowCompression;\nSELECT SalesOrderID\n,SalesOrderDetailID\n,CarrierTrackingNumber\n\
    ,OrderQty\n,ProductID\n,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n,LineTotal\n\
    ,rowguid\n,ModifiedDate\nINTO dbo.NoCompression\nFROM Sales.SalesOrderDetail;\n\
    SELECT SalesOrderID\n,SalesOrderDetailID\n,CarrierTrackingNumber\n,OrderQty\n\
    ,ProductID\n,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n,LineTotal\n,rowguid\n\
    ,ModifiedDate\nINTO dbo.RowCompression\nFROM Sales.SalesOrderDetail;\n```\n\n\
    *Listing 13-38*  \n*Setup for Row Compression*\n\nImplementation of row compression\
    \ relies on the use of `DATA_COMPRESSION` index options on the `CREATE` or `ALTER\
    \ INDEX` statement. Compression can be used on either clustered or non-clustered\
    \ indexes. For row compression, the `ROW` option is shown in Listing 13-39. In\
    \ this example, a clustered index is added to both of the example tables. The\
    \ impact of using row compression on this table is impressive; there is a reduction\
    \ of more than 35 percent in the number of pages required for the clustered index\
    \ (see Figure 13-53).\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE CLUSTERED\
    \ INDEX CLIX_NoCompression ON dbo.NoCompression\n(SalesOrderID, SalesOrderDetailID);\n\
    CREATE CLUSTERED INDEX CLIX_RowCompression ON dbo.RowCompression\n(SalesOrderID,\
    \ SalesOrderDetailID)\nWITH (DATA_COMPRESSION = ROW);\nSELECT OBJECT_NAME(object_id)\
    \ AS table_name\n,in_row_reserved_page_count\nFROM sys.dm_db_partition_stats\n\
    WHERE object_id IN (OBJECT_ID('dbo.NoCompression'),OBJECT_ID('dbo.RowCompression'));\n\
    ```\n\n*Listing 13-39*  \n*Implementing Row Compression*\n\n![Figure 13-53: A\
    \ table has 2 columns labeled table name and in row reserved page count and 2\
    \ rows labeled 1 and 2. The no compression and row compression entries under the\
    \ first column are accompanied by 1531 and 971 entries under the second, respectively.](images/338675_4_En_13_Chapter/338675_4_En_13_Fig53_HTML.jpg)\n\
    \n*Figure 13-53*  \n*Row compression output*\n\nStorage is not the only place\
    \ where there is an improvement by using row compression; there is also an improvement\
    \ in query performance. To demonstrate this benefit, execute the code in Listing\
    \ 13-40. In this script, two queries are executed against the tables from the\
    \ previous example. While the business rules for the queries are identical, there\
    \ is more than a 36 percent reduction in page reads for the table with row compression.\
    \ Storing an index on less pages means that less pages need to be read into memory\
    \ when retrieving rows to execute queries. By adding compression to the index,\
    \ the resources required for the query are reduced, and performance is improved\
    \ without a change to the query design, as seen in Figure 13-54.\n\n```sql\nUSE\
    \ AdventureWorks2017\nGO\nSET STATISTICS IO, TIME ON\nSELECT SalesOrderID, SalesOrderDetailID,\
    \ CarrierTrackingNumber\nFROM dbo.NoCompression\nWHERE SalesOrderID BETWEEN 51500\
    \ AND 52000;\nSELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber\n\
    FROM dbo.RowCompression\nWHERE SalesOrderID BETWEEN 51500 AND 52000;\n```\n\n\
    *Listing 13-40*  \n*Row Compression Query*\n\n![Figure 13-54: A panel with an\
    \ opened messages tab with a one-line entry each for no compression and row compression\
    \ tables with the scan count at 1 and 1, logical reads at 66 and 42, physical\
    \ reads at 0 and 0, read-ahead reads at 0 and 0, l o b logical reads at 0 and\
    \ 0, and l o b physical reads at 0 and 0. Server execution and server parse and\
    \ compile times under S Q L are also exhibited.](images/338675_4_En_13_Chapter/338675_4_En_13_Fig54_HTML.png)\n\
    \n*Figure 13-54*  \n*Row compression query statistics*\n\nThere are a number of\
    \ things that need to be considered when implementing row compression on an index.\
    \ First, the amount of compression achieved by any use of compression will vary\
    \ depending on the data types used and the data being stored. The improvement\
    \ will, and should be expected to, vary per table and over time. Compression cannot\
    \ be enabled if the maximum possible size of the row exceeds 8,060 bytes (including\
    \ the size of the data and the row overhead). Non-clustered indexes will not inherit\
    \ the compression settings of the clustered index or heap; this must be specified\
    \ when the index is created. However, clustered indexes will inherit the compression\
    \ settings of the heap they are being created on if none is specified.\n\nRow\
    \ compression is a useful mechanism for altering how indexes are stored. It reduces\
    \ the size of rows, which has the dual benefit of improving query performance\
    \ and reducing storage requirements for indexes. The primary concern when implementing\
    \ row compression is the additional overhead associated with its use; this overhead\
    \ manifests as a slight increase in CPU utilization. This is usually offset by\
    \ the reduced I/O required to process the query, as shown in Figure 13-54.\n\n\
    Row compression is an effective way to index OLTP workloads that have many numeric\
    \ data types, as well as string/binary data that tends to contain white space\
    \ within it. Because each row is compressed individually, `UPDATE` operations\
    \ do not become significantly more expensive as only the data for a single row\
    \ needs to be updated for each row updated by an `UPDATE` query."
  raw: '### Row Compression


    The first way to reduce the size of an index is by reducing the size of the rows
    within the index. Row compression achieves this by altering the way in which data
    is stored in a row. Row compression can be used on heaps, clustered indexes, and
    non-clustered indexes. There are a few things that occur on a row when row compression
    is enabled. These are as follows:


    *   Modification of the metadata for the row.


    *   Fixed-length character data is stored in a variable-length format.


    *   Numeric-based data types are stored in variable-length format.


    With the metadata changes, the information stored for each column is generally
    reduced compared with a non–row compression record. Excessive bits in the row
    overhead are removed, and the information is streamlined to reduce waste. There
    is an exception to this change, though: some of the changes to fixed-length data
    types may result in a larger row overhead to accommodate for the additional information
    required for data length and offset values.


    For fixed-length character data, white space is removed from the end of values
    in the column. This information is not lost, and the behavior of fixed-length
    data types, such as `char` and `nchar`, is unaffected. The difference is only
    in the manner in which the data is stored. For binary data, trailing zeros on
    the value are removed, similar to white space. Information on the characters removed
    from a column is stored in the row overhead.


    Numeric data types are the data types that are manipulated the most with row compression.
    These data types are stored in the smallest form possible for the data type. This
    means a column with the `bigint` data type, which typically requires 8 bytes,
    would require only 1 byte if the value stored is between 0 and 255\. At the value
    256, the column would then store it in 2 bytes. This progression continues until
    the need to store the value in 8 bytes is reached. This applies to all numeric-based
    data types, including `smallint`, `int`, `bigint`, `decimal`, `numeric`, `smallmoney`,
    `money`, `float`, `real`, `datetime`, `datetime2`, `datetimeoffset`, and `timestamp`.


    To demonstrate, a table is needed to implement compression, which is provided
    in Listing [13-38](#338675_4_En_13_Chapter.xhtml#PC38). This script creates two
    tables, `dbo.NoCompression` and `dbo.RowCompression`. These tables are used to
    demonstrate the effect of row compression on the size of the table via the clustered
    index and on query performance.


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.NoCompression'') IS NOT NULL

    DROP TABLE dbo.NoCompression;

    IF OBJECT_ID(''dbo.RowCompression'') IS NOT NULL

    DROP TABLE dbo.RowCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.NoCompression

    FROM Sales.SalesOrderDetail;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.RowCompression

    FROM Sales.SalesOrderDetail;

    Listing 13-38

    Setup for Row Compression

    ```


    Implementation of row compression relies on the use of `DATA_COMPRESSION` index
    options on the `CREATE` or `ALTER INDEX` statement. Compression can be used on
    either clustered or non-clustered indexes. For row compression, the `ROW` option
    is shown in Listing [13-39](#338675_4_En_13_Chapter.xhtml#PC39). In this example,
    a clustered index is added to both of the example tables. The impact of using
    row compression on this table is impressive; there is a reduction of more than
    35 percent in the number of pages required for the clustered index (see Figure
    [13-53](#338675_4_En_13_Chapter.xhtml#Fig53)).


    ```

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_NoCompression ON dbo.NoCompression

    (SalesOrderID, SalesOrderDetailID);

    CREATE CLUSTERED INDEX CLIX_RowCompression ON dbo.RowCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = ROW);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.RowCompression''));

    Listing 13-39

    Implementing Row Compression

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig53_HTML.jpg)


    A table has 2 columns labeled table name and in row reserved page count and 2
    rows labeled 1 and 2\. The no compression and row compression entries under the
    first column are accompanied by 1531 and 971 entries under the second, respectively.


    Figure 13-53


    Row compression output


    Storage is not the only place where there is an improvement by using row compression;
    there is also an improvement in query performance. To demonstrate this benefit,
    execute the code in Listing [13-40](#338675_4_En_13_Chapter.xhtml#PC40). In this
    script, two queries are executed against the tables from the previous example.
    While the business rules for the queries are identical, there is more than a 36
    percent reduction in page reads for the table with row compression. Storing an
    index on less pages means that less pages need to be read into memory when retrieving
    rows to execute queries. By adding compression to the index, the resources required
    for the query are reduced, and performance is improved without a change to the
    query design, as seen in Figure [13-54](#338675_4_En_13_Chapter.xhtml#Fig54).


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.NoCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.RowCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    Listing 13-40

    Row Compression Query

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig54_HTML.png)


    A panel with an opened messages tab with a one-line entry each for no compression
    and row compression tables with the scan count at 1 and 1, logical reads at 66
    and 42, physical reads at 0 and 0, read-ahead reads at 0 and 0, l o b logical
    reads at 0 and 0, and l o b physical reads at 0 and 0\. Server execution and server
    parse and compile times under S Q L are also exhibited.


    Figure 13-54


    Row compression query statistics


    There are a number of things that need to be considered when implementing row
    compression on an index. First, the amount of compression achieved by any use
    of compression will vary depending on the data types used and the data being stored.
    The improvement will, and should be expected to, vary per table and over time.
    Compression cannot be enabled if the maximum possible size of the row exceeds
    8,060 bytes (including the size of the data and the row overhead). Non-clustered
    indexes will not inherit the compression settings of the clustered index or heap;
    this must be specified when the index is created. However, clustered indexes will
    inherit the compression settings of the heap they are being created on if none
    is specified.


    Row compression is a useful mechanism for altering how indexes are stored. It
    reduces the size of rows, which has the dual benefit of improving query performance
    and reducing storage requirements for indexes. The primary concern when implementing
    row compression is the additional overhead associated with its use; this overhead
    manifests as a slight increase in CPU utilization. This is usually offset by the
    reduced I/O required to process the query, as shown in Figure [13-54](#338675_4_En_13_Chapter.xhtml#Fig54).


    Row compression is an effective way to index OLTP workloads that have many numeric
    data types, as well as string/binary data that tends to contain white space within
    it. Because each row is compressed individually, UPDATE operations do not become
    significantly more expensive as only the data for a single row needs to be updated
    for each row updated by an UPDATE query.'
  trans: "\n### 行压缩\n\n减少索引大小的第一种方法是减小索引内行的大小。行压缩通过改变数据在行中的存储方式来实现这一点。行压缩可用于堆、聚集索引和非聚集索引。启用行压缩后，行上会发生一些变化，具体如下：\n\
    \n*   修改行的元数据。\n*   定长字符数据以变长格式存储。\n*   基于数字的数据类型以变长格式存储。\n\n通过元数据更改，与未启用行压缩的记录相比，为每个列存储的信息通常会减少。行开销中的多余位被移除，信息被精简以减少浪费。不过，这种更改有一个例外：对某些定长数据类型的更改可能会导致更大的行开销，以适应数据长度和偏移值所需的额外信息。\n\
    \n对于定长字符数据，会移除列中值末尾的空白。这些信息并未丢失，且定长数据类型（如 `char` 和 `nchar`）的行为不受影响。区别仅在于数据的存储方式。对于二进制数据，会移除值末尾的零，类似于移除空白。从列中移除的字符信息存储在行开销中。\n\
    \n数字数据类型是行压缩中操作最多的数据类型。这些数据类型以该类型可能的最小形式存储。这意味着一个定义为 `bigint` 数据类型的列，通常需要 8 字节，但如果存储的值介于\
    \ 0 到 255 之间，则只需 1 字节。当值为 256 时，该列将存储为 2 字节。这个递进过程持续进行，直到需要以 8 字节存储该值。这适用于所有基于数字的数据类型，包括\
    \ `smallint`、`int`、`bigint`、`decimal`、`numeric`、`smallmoney`、`money`、`float`、`real`、`datetime`、`datetime2`、`datetimeoffset`\
    \ 和 `timestamp`。\n\n为了演示，需要一个表来实现压缩，如代码清单 13-38 所示。此脚本创建了两个表：`dbo.NoCompression`\
    \ 和 `dbo.RowCompression`。这些表用于演示行压缩通过聚集索引对表大小以及对查询性能的影响。\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nIF OBJECT_ID('dbo.NoCompression') IS NOT NULL\nDROP TABLE dbo.NoCompression;\n\
    IF OBJECT_ID('dbo.RowCompression') IS NOT NULL\nDROP TABLE dbo.RowCompression;\n\
    SELECT SalesOrderID\n,SalesOrderDetailID\n,CarrierTrackingNumber\n,OrderQty\n\
    ,ProductID\n,SpecialOfferID\n,UnitPrice\n,UnitPriceDiscount\n,LineTotal\n,rowguid\n\
    ,ModifiedDate\nINTO dbo.NoCompression\nFROM Sales.SalesOrderDetail;\nSELECT SalesOrderID\n\
    ,SalesOrderDetailID\n,CarrierTrackingNumber\n,OrderQty\n,ProductID\n,SpecialOfferID\n\
    ,UnitPrice\n,UnitPriceDiscount\n,LineTotal\n,rowguid\n,ModifiedDate\nINTO dbo.RowCompression\n\
    FROM Sales.SalesOrderDetail;\n```\n\n*代码清单 13-38*  \n*行压缩的设置*\n\n行压缩的实现依赖于在 `CREATE`\
    \ 或 `ALTER INDEX` 语句中使用 `DATA_COMPRESSION` 索引选项。压缩可用于聚集索引或非聚集索引。对于行压缩，`ROW` 选项如代码清单\
    \ 13-39 所示。在此示例中，向两个示例表都添加了一个聚集索引。在此表上使用行压缩的影响令人印象深刻；聚集索引所需的页数减少了超过 35%（见图 13-53）。\n\
    \n```sql\nUSE AdventureWorks2017\nGO\nCREATE CLUSTERED INDEX CLIX_NoCompression\
    \ ON dbo.NoCompression\n(SalesOrderID, SalesOrderDetailID);\nCREATE CLUSTERED\
    \ INDEX CLIX_RowCompression ON dbo.RowCompression\n(SalesOrderID, SalesOrderDetailID)\n\
    WITH (DATA_COMPRESSION = ROW);\nSELECT OBJECT_NAME(object_id) AS table_name\n\
    ,in_row_reserved_page_count\nFROM sys.dm_db_partition_stats\nWHERE object_id IN\
    \ (OBJECT_ID('dbo.NoCompression'),OBJECT_ID('dbo.RowCompression'));\n```\n\n*代码清单\
    \ 13-39*  \n*实现行压缩*\n\n![图 13-53：一个表格有两列，分别标记为表名和行内保留页数，以及两行标记为 1 和 2。第一列下的“无压缩”和“行压缩”条目分别在第二列下伴随有\
    \ 1531 和 971 个条目。](img/338675_4_En_13_Fig53_HTML.jpg)\n\n*图 13-53*  \n*行压缩输出结果*\n\
    \n存储并非使用行压缩后唯一得到改善的地方；查询性能也有所提升。为了证明这一优势，请执行代码清单 13-40 中的代码。在此脚本中，针对上一个示例中的表执行了两个查询。虽然查询的业务规则相同，但启用了行压缩的表在页读取方面减少了超过\
    \ 36%。将索引存储在更少的页上意味着在检索行执行查询时，需要读入内存的页更少。通过向索引添加压缩，查询所需的资源减少，性能得到提升，而无需更改查询设计，如图\
    \ 13-54 所示。\n\n```sql\nUSE AdventureWorks2017\nGO\nSET STATISTICS IO, TIME ON\n\
    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber\nFROM dbo.NoCompression\n\
    WHERE SalesOrderID BETWEEN 51500 AND 52000;\nSELECT SalesOrderID, SalesOrderDetailID,\
    \ CarrierTrackingNumber\nFROM dbo.RowCompression\nWHERE SalesOrderID BETWEEN 51500\
    \ AND 52000;\n```\n\n*代码清单 13-40*  \n*行压缩查询*\n\n![图 13-54：一个面板上显示一个打开的“消息”选项卡，其中“无压缩”和“行压缩”表各有一行条目，显示扫描计数为\
    \ 1 和 1，逻辑读取为 66 和 42，物理读取为 0 和 0，预读为 0 和 0，Lob 逻辑读取为 0 和 0，Lob 物理读取为 0 和 0。下方还显示了\
    \ SQL 的服务器执行时间和服务器解析与编译时间。](img/338675_4_En_13_Fig54_HTML.png)\n\n*图 13-54*  \n\
    *行压缩查询统计信息*\n\n在索引上实现行压缩时需要考虑许多因素。首先，任何压缩使用所实现的压缩量将因所使用的数据类型和存储的数据而异。这种改进会且应该因表而异，并随时间而变化。如果行的最大可能大小超过\
    \ 8,060 字节（包括数据大小和行开销），则无法启用压缩。非聚集索引不会继承聚集索引或堆的压缩设置；这必须在创建索引时指定。但是，如果未指定，聚集索引将继承其所在的堆的压缩设置。\n\
    \n行压缩是一种用于更改索引存储方式的有用机制。它减小了行的大小，这具有提高查询性能和减少索引存储需求的双重好处。实现行压缩时的主要关注点是与之相关的额外开销；这种开销表现为\
    \ CPU 利用率略有增加。这通常被处理查询所需的 I/O 减少所抵消，如图 13-54 所示。\n\n对于包含许多数字数据类型以及倾向于包含空白字符的字符串/二进制数据的\
    \ OLTP 工作负载，行压缩是一种有效的索引方式。因为每行都是单独压缩的，`UPDATE` 操作的成本不会显著增加，因为对于 `UPDATE` 查询更新的每一行，只需要更新该行的数据。\n"
- fmt: '# Page Compression


    ## Row Compression


    ## Prefix Compression


    ## Dictionary Compression


    The row compression component of page compression is identical to the row compression
    option. Before compressing a page, each row on the page is first compressed.


    The next step in page compression is accomplished through prefix compression.
    Prefix compression scans through each column and removes similar values and groups
    them into the page header. For example, if multiple values in one column start
    with "`abc`," this value is placed in the page header, and the value is replaced
    in the column with a pointer to the prefix. If another row contains the value
    "`abcd`," a reference to the `abc` value in the page header is included, changing
    the column value to `0d`. This is continued for all values to remove the most
    prevalent patterns and reduce the information stored per row of the column. Prefix
    compression is evaluated separately for each column. Therefore, similar values
    in different columns will not be able to share prefixes.


    The last step in page compression is dictionary compression. Through dictionary
    compression, the values in all columns are checked for repeating values. Continuing
    the previous example, if there are values in two columns across multiple rows
    that match the `0d` value, then that value is placed in the page header, and a
    reference to the value is stored in those columns. This is done across the entire
    page, reducing the repeated prefix-compressed values.


    ## Demonstration


    For a demonstration of the benefits of page compression, the example from the
    row compression section will be expanded upon. To begin, execute the script in
    Listing 13-41. This creates the `dbo.PageCompression` table similar to the tables
    from the previous example.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.PageCompression'') IS NOT NULL

    DROP TABLE dbo.PageCompression;

    SELECT SalesOrderID

    ,SalesOrderDetailID

    ,CarrierTrackingNumber

    ,OrderQty

    ,ProductID

    ,SpecialOfferID

    ,UnitPrice

    ,UnitPriceDiscount

    ,LineTotal

    ,rowguid

    ,ModifiedDate

    INTO dbo.PageCompression

    FROM Sales.SalesOrderDetail;

    Listing 13-41

    Setup for Page Compression

    ```


    Implementing page compression is very similar to row compression. Both use the
    `DATA_COMPRESSION` option, but page compression uses the `PAGE` option. To observe
    the effect of page compression on the tables, execute the code in Listing 13-42.
    In this example, page compression has significantly more impact on the table than
    was observed with row compression. This time, the number of pages used by the
    table decreases by 55 percent, as shown in Figure 13-55.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE CLUSTERED INDEX CLIX_PageCompression ON dbo.PageCompression

    (SalesOrderID, SalesOrderDetailID)

    WITH (DATA_COMPRESSION = PAGE);

    SELECT OBJECT_NAME(object_id) AS table_name

    ,in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.NoCompression''),OBJECT_ID(''dbo.PageCompression''));

    Listing 13-42

    Implementing Page Compression

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig55_HTML.jpg)

    A table has 2 columns labeled table name and in row reserved page count and 2
    rows labeled 1 and 2. The no compression and page compression entries under the
    first column are accompanied by 1531 and 683 entries under the second, respectively.

    Figure 13-55

    Page compression output


    The improvements from page compression are not limited to index storage. These
    improvements carry over to querying the table. Comparing the previous results
    against `dbo.NoCompression` with those against `dbo.PageCompression` (Listing
    13-43) shows that the savings in reads continues with page compression. In this
    case, the reads decreased to 29 (see Figure 13-56), which is more than a 55 percent
    decrease in I/O cost.


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO, TIME ON

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber

    FROM dbo.PageCompression

    WHERE SalesOrderID BETWEEN 51500 AND 52000;

    Listing 13-43

    Page Compression Query

    ```


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig56_HTML.png)

    A panel with an opened messages tab with a one-line entry that reads table quote
    page compression quote, scan count 1, logical reads 29, physical reads 0, read-ahead
    reads 0, l o b logical reads 0, l o b physical reads 0 under the 4569 rows affected
    label. Also exhibited are 0 and 187 milliseconds for C P U and elapsed times under
    S Q L server execution.

    Figure 13-56

    Page compression query statistics


    ## Considerations


    The considerations for page compression are similar in nature to those for row
    compression with the addition of a few items. First, because of the nature in
    which page compression is implemented, there are times when SQL Server will decide
    that the rate of compression for a page is not sufficient to justify the cost
    of compressing the page. In these cases, SQL Server will attempt to compress the
    page but will record a failure of page compression and store the page without
    the benefit of page compression over row compression. It is important to monitor
    the rate at which page compression attempts do not succeed since they can indicate
    when there is low value in using page compression on an index. This is discussed
    further in Chapter 3.


    Next, the CPU cost for page compression is much higher than with row compression
    or without compression. If there are not sufficient CPU resources available, this
    can lead to other performance challenges. Lastly, page compression is not ideal
    for tables and indexes that expect frequent data modifications. Compressing and
    uncompressing a page to modify a single row can have a significant impact on CPU.
    Therefore, tables that are ideal candidates for page compression should not be
    the target of frequent `UPDATE` operations.


    ## Conclusion


    Both row and page compressions can provide substantial cost savings to indexing
    solutions. Consider both when architecting indexing solutions. Doing so will provide
    performance improvements in situations where other options may not have yielded
    the desired results.


    Note

    Additional considerations related to compression can be found in the Books Online
    topic "Data Compression" at `https://docs.microsoft.com/en-us/sql/relational-databases/data-compression/data-compression`.'
  raw: '### Page Compression


    The other method to reduce the size of an index is by using variable-length data
    types and removing repeating values on a page. SQL Server accomplishes this through
    the page compression option on indexes. Like row compression, this compression
    type can be applied to heaps or clustered and non-clustered indexes. There are
    three components of page compression:


    *   Row compression


    *   Prefix compression


    *   Dictionary compression


    The row compression component of page compression is identical to the row compression
    option. Before compressing a page, each row on the page is first compressed.


    The next step in page compression is accomplished through prefix compression.
    Prefix compression scans through each column and removes similar values and groups
    them into the page header. For example, if multiple values in one column start
    with “`abc`,” this value is placed in the page header, and the value is replaced
    in the column with a pointer to the prefix. If another row contains the value
    “`abcd`,” a reference to the `abc` value in the page header is included, changing
    the column value to `0d`. This is continued for all values to remove the most
    prevalent patterns and reduce the information stored per row of the column. Prefix
    compression is evaluated separately for each column. Therefore, similar values
    in different columns will not be able to share prefixes.


    The last step in page compression is dictionary compression. Through dictionary
    compression, the values in all columns are checked for repeating values. Continuing
    the previous example, if there are values in two columns across multiple rows
    that match the `0d` value, then that value is placed in the page header, and a
    reference to the value is stored in those columns. This is done across the entire
    page, reducing the repeated prefix-compressed values.


