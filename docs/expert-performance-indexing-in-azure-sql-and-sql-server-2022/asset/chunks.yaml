  trans: '### 使用 DMO


    既然已经解释了缺失索引 DMO，现在是时候看看如何将它们结合起来使用以提供缺失索引建议了。缺失索引 DMO 的结果被称为“建议”而非“推荐”。这种措辞上的变化不仅是刻意的，而且至关重要。通常，当有人收到同事的索引推荐时，该推荐是经过深思熟虑、可以立即实施的。但对于缺失索引
    DMO 来说则不然；因此，它们被称为“建议”。


    缺失索引 DMO 提供的建议是一个起点，从中可以开始审视和构建新的索引。在查看缺失索引建议时，有两点需要考虑。首先，每个缺失索引建议的变体可能会在结果中多次出现。不建议实现每个变体。应该找出建议中的常见模式。一个能覆盖少数几个建议的索引通常是理想的。其次，当建议涉及多个列时，需要测试列的顺序以确定哪种是最优的。


    为了帮助解释缺失索引 DMO 的工作原理及其相互关系，将提供一个包含几个 SQL 语句的示例。如清单 12-1 所示，这些语句在 `AdventureWorks2017`
    数据库的 `SalesOrderHeader` 表上执行查询。对于每个查询，过滤条件都基于 `DueDate` 或 `OrderDate` 列，或者两者兼有。


    ```sql

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE DueDate = ''2014-07-01 00:00:00.000''

    AND OrderDate = ''2014-06-19 00:00:00.000''

    GO

    SELECT DueDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT DueDate, OrderDate FROM Sales.SalesOrderHeader

    WHERE DueDate Between ''20140701'' AND ''20140731''

    GO

    SELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader

    WHERE OrderDate Between ''20140601'' AND ''20140630''

    AND DueDate Between ''20140701'' AND ''20140731''

    GO

    ```


    清单 12-1

    用于生成缺失索引建议的 SQL 语句


    检查任一示例查询的执行计划都会发现，它们都使用聚集索引扫描来满足查询。图 12-1 显示了第一个查询的执行计划。在此执行计划中，存在针对表聚集索引的索引扫描，以及一个可能有助于消除索引扫描的缺失索引建议。


    ![](img/338675_4_En_12_Fig1_HTML.png)


    图 12-1

    清单 12-1 中第一个查询的执行计划


    要查看此缺失索引建议的更多详细信息，可以双击它以生成索引创建语句。虽然这有帮助，但它并未提供该建议背后的详细信息。这些细节能让人更好地理解为何提供此索引建议，以及描述其潜在影响的详细度量指标。要了解这些细节，需要查看缺失索引
    DMO。查询缺失索引 DMO 的语句将类似于清单 12-2。该查询包含了前面描述的等值列、不等值列和包含列信息。它还包含了之前未描述的两个计算字段：`Impact`
    和 `Score`。


    `Impact` 计算有助于识别那些在多次查询执行中具有最高总体影响的缺失索引建议。它是基于平均影响，将缺失索引上潜在的查找和扫描次数相加来计算的；所得值代表所有可能使用该索引的查询所能带来的总体改进。该值越高，索引能提供的改进就越大。


    `Score` 计算同样有助于识别能提高查询性能的缺失索引建议。`Score` 与 `Impact` 的区别在于包含了平均总用户成本。对于 `Score`
    计算，平均总用户成本乘以 `Impact` 分数再除以 100。在决定是否考虑该缺失索引时，成本值的加入有助于区分昂贵和不昂贵的查询。例如，一个为平均成本值为
    1,000 的查询提供 80% 改进的缺失索引建议，其回报可能优于为一个平均成本值为 1 的查询提供 90% 改进的建议。


    在审查索引建议时，始终要考虑该索引所针对的查询的频率及其查询成本。如果一个查询每月运行一次，可以提升 100,000 倍，这值得吗？同样，如果一个查询每秒运行一次，可以提升
    10%，这值得吗？了解这些查询相关联的工作负载有助于确定答案。


    ```sql

    SELECT

    DB_NAME(database_id) AS database_name

    ,OBJECT_NAME(object_id, database_id) AS table_name

    ,mid.equality_columns

    ,mid.inequality_columns

    ,mid.included_columns

    ,(migs.user_seeks + migs.user_scans) * migs.avg_user_impact AS Impact

    ,migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) AS Score

    ,migs.user_seeks

    ,migs.user_scans

    FROM sys.dm_db_missing_index_details mid

    INNER JOIN sys.dm_db_missing_index_groups mig ON mid.index_handle = mig.index_handle

    INNER JOIN sys.dm_db_missing_index_group_stats migs ON mig.index_group_handle
    = migs.group_handle

    WHERE DB_NAME(database_id) = ''AdventureWorks2017''

    ORDER BY migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks
    + migs.user_scans) DESC

    ```


    清单 12-2

    查询缺失索引 DMO


    图 12-2 显示了执行此查询的一些结果。


    ![](img/338675_4_En_12_Fig2_HTML.png)


    图 12-2

    缺失索引查询的结果


    根据图 12-2 所示的缺失索引查询结果，有几点需要考虑。首先，这些建议之间有很多相似之处。除了一个缺失索引外，每个建议的谓词列都包含 `OrderDate`
    和 `DueDate`。由于列顺序尚未测试，最优列顺序尚不明确。为了满足缺失索引建议，一个可能的索引可以将键列设为 `DueDate` 后跟 `OrderDate`。这种配置将创建一个能满足所有四个缺失索引项的索引。'
- fmt: 'The next item to look at is `included_columns`. For two of the suggestions,
    there are `included_columns` values listed. On the fourth missing index suggestion,
    it suggests including the column `OrderDate`. Since it will be one of the key
    columns of the index, it doesn''t need to be included. The other column, from
    the third missing index suggestion, is the `CustomerID` column. While only one
    index needs this column, as an included column, the addition of this column would
    likely be negligible since it is a narrow column. There would be value in adding
    this column to the index, though it may not be required to obtain desired performance
    on the query.


    After looking at these results and considering four missing index suggestions,
    a single suggestion for one index that can cover all four of the missing index
    items was able to be proposed. If an index is built using a DDL statement similar
    to that in Listing 12-3, the result will be an index that solves each of these
    missing indexes. If the queries in Listing 12-1 are executed again, the execution
    plan output will show all of the queries are now using index seeks against the
    new index, shown in Figure 12-3.


    ![](images/338675_4_En_12_Chapter/338675_4_En_12_Fig3_HTML.png)


    Figure 12-3. Execution plans for queries after missing index creation


    ```

    USE AdventureWorks2017

    GO

    CREATE NONCLUSTERED INDEX missing_index_SalesOrderHeader

    ON Sales.SalesOrderHeader([DueDate], [OrderDate])

    INCLUDE ([CustomerID])

    ```


    `Note`: There are many negative opinions regarding the value of the `Database
    Engine Tuning Advisor`. This is a tool that fills a role, and provided a sufficient
    workload is used with the tool, it will return worthwhile recommendations. These
    recommendations provide a better starting point for tuning a database than starting
    with nothing.


    ## Database Engine Tuning Advisor


    The other indexing tool available in SQL Server is the `Database Engine Tuning
    Advisor`. This tool allows SQL Server to analyze a workload from a file, a table,
    the plan cache, or the Query Store. The output of the `DTA` can assist in providing
    recommendations for indexing and configuring partitions for the workload. The
    chief benefit of using the tool is that it does not require a deep understanding
    of the underlying databases to make the recommendations.


    Whether working with a single query or a full day''s workload, the `DTA` provides
    index recommendations for the following types of objects:


    *   Rowstore and columnstore tables for both clustered and non-clustered indexes

    *   Aligned or nonaligned partitions

    *   Views that could support indexing


    With the sessions in the `DTA`, it is possible to really focus the recommendations
    on what is expected from a given environment. It is possible to leverage workload
    based on a specific environment, whether transactional or analytical, and set
    the focus on both reads and writes so that index recommendations are provided
    that align to those needs. It is also possible to modify the environment to look
    for indexing recommendations for changes in disk space.


    Once the analysis is completed, the `DTA` provides a number of reports and outputs.
    This information allows the recommendations to be reviewed and to develop an understanding
    of how it will impact the database.


    Although the `DTA` has quite a few capabilities, there are also some limitations
    on the tool. The following are some of these limitations:


    *   Not able to recommend indexes on system tables.

    *   Cannot add or drop unique indexes or indexes that enforce primary key or unique
    constraints.

    *   May provide variations in recommendations on some workloads. The `DTA` samples
    data while it executes, which will influence the recommendations.

    *   Unable to tune trace tables on remote servers.

    *   Constraints placed on tuning workloads can have a negative impact on suggestions
    if the tuning session exceeds the constraints.


    `Note`: As an indexing tool, the `DTA` can easily be misused. This is often due
    to not providing a representative workload or to taking recommendations without
    proper testing. When using the tool, be sure to validate any change that is recommended
    and test those changes thoroughly before applying them to a production environment.'
