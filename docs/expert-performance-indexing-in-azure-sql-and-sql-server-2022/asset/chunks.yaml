    the first search attempt.


    For more information on full-text indexes, read Chapter [9](#338675_4_En_9_Chapter.xhtml).


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig6_HTML.png)


    A page presents the output under the execution plan tab. It reads the query, address,
    nested loops, table-valued functions at cost 17%, and clustered index seek at
    cost 83% is mapped to a selected table at cost 0%.


    Figure 14-6


    Execution plan for addresses using CONTAINS


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig5_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    address and the affected rows. The logical reads is 12.


    Figure 14-5


    STATISTICS I/O for addresses using CONTAINS


    There are other potential solutions to this problem, such as the manual creation
    of N-gram tables to manage discrete keywords within a string column. This can
    be an effective way to customize a string search solution when the set of search
    terms is limited and can be maintained in some automated fashion. Demonstrating
    this is out of scope for this book, but it is worth mentioning for scenarios where
    standard indexing and full-text indexing are inadequate to solve a string searching
    challenge.


    ## Concatenation


    Another scenario that can wreak havoc on indexing strategies is the use of concatenation.
    *Concatenation* is when two or more values are appended to one another. When this
    happens in a `WHERE` clause, it can often lead to poor performance that isn’t
    expected.


    To demonstrate this scenario, consider a query for someone with the name Gustavo
    Achong. Searching for this value requires using the `FirstName` and `LastName`
    columns, which are concatenated together with a space between the columns. Listing
    [14-4](#338675_4_En_14_Chapter.xhtml#PC4) shows the query. A script to build an
    index on these columns is also included in the code listing. The execution plan
    generated for this query, shown in Figure [14-8](#338675_4_En_14_Chapter.xhtml#Fig8),
    shows that the new index is used but the operation is a scan instead of a seek,
    which would be more desirable. Even though the leading left edge of the index
    matches the left-side values of the concatenated values, the index is not able
    to determine where to find the values in the index. This results in the index
    using 99 logical reads to return the query results, shown in Figure [14-7](#338675_4_En_14_Chapter.xhtml#Fig7).


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    Listing 14-4

    Query with Concatenation

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig8_HTML.png)


    A screenshot of a page presents the output under the execution plan tab. It reads
    the query, address, index scan on non-clustered index at cost 89%, computes scalar
    at cost 2%, and filter at cost 9%, is mapped to a selected table.


    Figure 14-8


    Execution plan for concatenation


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig7_HTML.png)


    A screenshot of a page presents the output under the messages tab. It reads the
    tables worktable, person and the number of rows affected. Logical reads of the
    table person is 99 which is highlighted.


    Figure 14-7


    STATISTICS I/O for concatenation


    As mentioned, using a scan on the index is not necessarily a bad thing. However,
    using a scan when there are a lot of concurrent users or data modifications occurring
    could lead to contention and latency. When it comes to larger tables with millions
    or more records, this can possibly lead to a lack of scalability for the database.


    It may seem reasonable at first glance to remove the space between the first and
    last names (see Listing [14-5](#338675_4_En_14_Chapter.xhtml#PC5)), since then
    it’s using the two columns from the index we created. The issue with this solution
    is that it doesn’t work. As the execution plan in Figure [14-10](#338675_4_En_14_Chapter.xhtml#Fig10)
    shows, it is nearly identical to the one with the space in the concatenated value
    with the same 99 reads as well (shown in Figure [14-9](#338675_4_En_14_Chapter.xhtml#Fig9)).


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    Listing 14-5

    Concatenation Without Spaces

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig10_HTML.png)


    A screenshot of a page presents the output under the execution plan tab. It reads
    the query, address, index scan on non-clustered index at cost 89%, computes scalar
    at cost 2%, and filter at cost 9%, is mapped to a selected table. The concatenation
    with no space in query.


    Figure 14-10


    Execution plan for concatenation without spaces


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig9_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    person and the affected rows. The logical reads is 99.


    Figure 14-9


    STATISTICS I/O for concatenation without spaces


    Probably the best way to fix issues with concatenated values is to remove the
    need to concatenate. Instead of searching for the value `Gustavo Achong`, search
    for the first name `Gustavo` and the last name `Achong` (see Listing [14-6](#338675_4_En_14_Chapter.xhtml#PC6)).
    When this change is made, the query is then able to use a seek operation on the
    non-clustered index and return the results with only two logical reads (see Figure
    [14-11](#338675_4_En_14_Chapter.xhtml#Fig11)). These results are a significant
    improvement over when the values were concatenated together. See Figure [14-12](#338675_4_En_14_Chapter.xhtml#Fig12)
    for the execution plan.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo''

    AND LastName = ''Achong'';

    Listing 14-6

    Query with Concatenation Removed

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig12_HTML.png)


    A screenshot of input output page presents the output under the execution plan
    tab. It reads the query, address, and execution of index seek of cost 100% on
    a non-clustered index, that is mapped to a selected table of cost 0%.


    Figure 14-12


    Execution plan with concatenation removed


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig11_HTML.png)


    A screenshot of an input output page of messages tab. It reads the table labeled
    person and the affected rows. The logical reads is 2.


    Figure 14-11


    STATISTICS I/O for concatenation removed


    The ideal WHERE clause is composed of simple predicates that can be easily resolved.
    Functions, transformations, combinations, and other attempts to alter data on
    the fly while trying to filter data are more likely to lead to unexpected index
    scans, unwanted contention, and longer-running queries.


    At times, you won’t have the option to remove concatenation from a query. In these
    scenarios, there is another way to resolve index performance issues: the concatenated
    values can be added to the table as a computed column. This solution, along with
    some of its challenges, is discussed in the next section.'
  trans: '

    在部署了全文索引后，搜索名为 Longbrook 的街道的性能与第一次搜索（查询以 710 开头的地址）相似。在图 14-6 的执行计划中，查询没有扫描非聚集索引，而是使用了聚集索引上的查找操作，并通过表值函数查询全文索引。因此，与使用`LIKE`比较时的
    216 次逻辑读取相比，使用全文索引仅需要 12 次逻辑读取（如图 14-5 所示）。读取次数上的差异带来了相比第一次搜索尝试的显著性能提升。


    更多关于全文索引的信息，请阅读第 9 章。


    ![](img/338675_4_En_14_Fig6_HTML.png)


    一个页面在执行计划选项卡下展示了输出结果。它显示查询、地址、嵌套循环、成本为 17%的表值函数以及成本为 83%的聚集索引查找被映射到一个成本为 0%的选定表。


    图 14-6


    使用`CONTAINS`查询地址的执行计划


    ![](img/338675_4_En_14_Fig5_HTML.png)


    一个消息选项卡的输入输出页面截图。它显示了标记为`address`的表以及受影响的行数。逻辑读取数为 12。


    图 14-5


    使用`CONTAINS`查询地址时的`STATISTICS I/O`


    解决此问题还有其他潜在方案，例如手动创建 N-gram 表来管理字符串列中的离散关键字。当搜索词集合有限且能以某种自动化方式维护时，这可以是定制化字符串搜索解决方案的有效方法。演示这一点超出了本书的范围，但在标准索引和全文索引不足以解决字符串搜索挑战的场景中，值得一提。


    ## 字符串连接


    另一个可能严重破坏索引策略的场景是使用字符串连接。`字符串连接`是指将两个或多个值相互追加在一起。当这种情况发生在`WHERE`子句中时，常常会导致意想不到的性能低下。


    为了演示此场景，考虑一个查询名为 Gustavo Achong 的人的请求。搜索这个值需要使用`FirstName`和`LastName`列，这两列之间用空格连接在一起。清单
    14-4 显示了这个查询。代码清单中还包含了在这些列上创建索引的脚本。为该查询生成的执行计划如图 14-8 所示，显示使用了新索引，但操作是扫描而非更理想的查找。即使索引的最左侧前缀与连接值的左侧值相匹配，索引也无法确定在哪里可以找到这些值。这导致索引使用了
    99 次逻辑读取来返回查询结果，如图 14-7 所示。


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    CREATE INDEX IX_PersonContact_FirstNameLastName ON Person.Person (FirstName, LastName)

    GO

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName,'' '',LastName) = ''Gustavo Achong''

    清单 14-4

    使用字符串连接的查询

    ```


    ![](img/338675_4_En_14_Fig8_HTML.png)


    一个页面截图在执行计划选项卡下展示了输出结果。它显示查询、地址、成本为 89%的非聚集索引扫描、成本为 2%的标量计算以及成本为 9%的筛选器被映射到一个选定表。


    图 14-8


    字符串连接的执行计划


    ![](img/338675_4_En_14_Fig7_HTML.png)


    一个页面截图在消息选项卡下展示了输出结果。它显示了表 worktable、person 以及受影响的行数。person 表的逻辑读取数为 99，被高亮显示。


    图 14-7


    字符串连接时的`STATISTICS I/O`


    如前所述，在索引上使用扫描并不一定是坏事。但是，当存在大量并发用户或正在发生数据修改时，使用扫描可能会导致争用和延迟。对于拥有数百万条或更多记录的大型表，这可能会导致数据库缺乏可扩展性。


    乍一看，移除名字和姓氏之间的空格似乎是合理的（参见清单 14-5），因为这样它就可以使用我们创建的索引中的两列。但这个解决方案的问题在于它不起作用。如图 14-10
    所示的执行计划，它几乎与在连接值中包含空格的情况相同，同样有 99 次读取（如图 14-9 所示）。


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE CONCAT(FirstName, LastName)= ''GustavoAchong'';

    清单 14-5

    不带空格的字符串连接

    ```


    ![](img/338675_4_En_14_Fig10_HTML.png)


    一个页面截图在执行计划选项卡下展示了输出结果。它显示查询、地址、成本为 89%的非聚集索引扫描、成本为 2%的标量计算以及成本为 9%的筛选器被映射到一个选定表。查询中是不带空格的连接。


    图 14-10


    不带空格的字符串连接的执行计划


    ![](img/338675_4_En_14_Fig9_HTML.png)


    一个消息选项卡的输入输出页面截图。它显示了标记为`person`的表以及受影响的行数。逻辑读取数为 99。


    图 14-9


    不带空格字符串连接时的`STATISTICS I/O`


    修复字符串连接值问题的最佳方法可能是消除连接的需求。不要搜索值`Gustavo Achong`，而是分别搜索名字`Gustavo`和姓氏`Achong`（参见清单
    14-6）。做出此更改后，查询就能够使用非聚集索引上的查找操作，并且仅需两次逻辑读取即可返回结果（参见图 14-11）。这些结果相比将值连接在一起时有了显著改善。执行计划参见图
    14-12。


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON;

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo''

    AND LastName = ''Achong'';

    清单 14-6

    移除字符串连接后的查询

    ```


    ![](img/338675_4_En_14_Fig12_HTML.png)


    一个输入输出页面截图在执行计划选项卡下展示了输出结果。它显示查询、地址以及成本为 100%的非聚集索引索引查找执行，被映射到一个成本为 0%的选定表。


    图 14-12


    移除字符串连接后的执行计划


    ![](img/338675_4_En_14_Fig11_HTML.png)


    一个消息选项卡的输入输出页面截图。它显示了标记为`person`的表以及受影响的行数。逻辑读取数为 2。


    图 14-11


    移除字符串连接后的`STATISTICS I/O`


    理想的`WHERE`子句由能够轻松解析的简单谓词组成。函数、转换、组合以及其他在尝试筛选数据时动态修改数据的做法，更有可能导致意外的索引扫描、不希望的争用以及运行时间更长的查询。


    有时，你可能无法选择从查询中移除字符串连接。在这些场景中，还有另一种解决索引性能问题的方法：可以将连接后的值作为计算列添加到表中。这个解决方案及其面临的一些挑战将在下一节讨论。

    '
- fmt: '## 计算列


    有时，表中的一列或多列被定义为表达式。这类列被称为*计算列*。当需要一列来保存函数或计算的结果，且该结果会随表中其他列的变化而改变时，计算列就非常有用。与其耗费
    CPU 周期来确保对表的所有修改都包含对所有相关列的更改，不如在查询时更改组件并计算结果。


    请注意，计算列无法利用源列上的索引来加速自身。为了演示这一点，请使用代码清单[14-7](#338675_4_En_14_Chapter.xhtml#PC7)向`Person.Person`表添加两个计算列。第一列将把`FirstName`和`LastName`连接起来，就像在上一节中连接它们一样。第二列将把`BusinessEntityID`乘以`EmailPromotion`；虽然这个计算本身没有内在含义，但它将展示如何将此策略用于其他计算类型。


    ```sql

    USE AdventureWorks2017

    GO

    ALTER TABLE Person.Person

    ADD FirstLastName AS (FirstName + '' '' + LastName)

    ,CalculateValue AS (BusinessEntityID ∗ EmailPromotion);

    Listing 14-7

    Add Computed Columns to Person.Person

    ```


    添加列之后，下一步是测试查询该表。使用代码清单[14-8](#338675_4_En_14_Chapter.xhtml#PC8)执行两个查询。第一个查询类似于上一节中搜索
    Gustavo Achong 时使用的名字和姓氏查询。第二个查询将返回所有`CalculateValue`为 198 的记录。


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName, FirstLastName

    FROM Person.Person

    WHERE FirstLastName = ''Gustavo Achong'';

    SELECT BusinessEntityID, CalculateValue

    FROM Person.Person

    WHERE CalculateValue = 198;

    Listing 14-8

    Computed Column Queries

    ```


    执行两个查询后，图[14-14](#338675_4_En_14_Chapter.xhtml#Fig14)中的执行计划显示，两者都使用了扫描操作来返回查询结果。根据本章前面提到的原因，这些结果并不理想，因为它们可能导致阻塞，并且比查询请求所需的
    I/O 更多。这里的“更多 I/O”是指两个查询的结果都需要通过扫描整个表来读取 I/O，如图[14-13](#338675_4_En_14_Chapter.xhtml#Fig13)所示。


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig14_HTML.png)

    A screenshot of a page presents the output under the execution plan tab. It reads
    the query 1 and 2 separately. 1. Index scan on non-clustered at cost 89%, 2 compute
    scalars at cost 2%, and 9%, is mapped to a selected table. 2. Clustered index
    scan at cost 100%, 2 compute scalars, is mapped to a selected table.

    图 14-14

    计算列执行计划


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig13_HTML.png)

    A screenshot of an input output page of messages tab. It reads 2 tables labeled
    person and the affected rows. The logical reads are 99 and 3858.

    图 14-13

    计算列的 STATISTICS I/O


    计算列的一个索引选项是为计算列本身创建索引，SQL Server 会将其建议为缺失索引，如图[14-14](#338675_4_En_14_Chapter.xhtml#Fig14)所示。正如`FirstLastName`的查询所示，该查询可以使用表上的任何索引。限制在于，它不能比查询本身包含计算列表达式时更好地利用这些索引。为计算列创建索引（如代码清单[14-9](#338675_4_En_14_Chapter.xhtml#PC9)所示）提供了必要的分布和记录信息，允许像代码清单[14-8](#338675_4_En_14_Chapter.xhtml#PC8)中的查询那样的查询使用查找而不是扫描。索引具体化了计算列中的值，允许快速访问数据，从而显著减少了
    I/O（从 99 次读取减少到 5 次，从 3,878 次减少到 2 次），如图[14-15](#338675_4_En_14_Chapter.xhtml#Fig15)所示。图[14-16](#338675_4_En_14_Chapter.xhtml#Fig16)显示了执行计划。


    **注意**


    为计算列创建索引时，该列的表达式必须是确定性的。即每次使用相同变量执行该表达式，都将返回相同的结果。例如，在计算列表达式中使用`GETDATE()`就不是确定性的。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_PersonPerson_FirstLastName ON Person.Person(FirstLastName);

    CREATE INDEX IX_PersonPerson_CalculateValue ON Person.Person(CalculateValue);

    Listing 14-9

    Computed Column Indexes

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig16_HTML.png)

    A page presents the output under the execution plan tab. It reads the query 1
    and 2 with their cost and presents the index seek on non-clustered in both query,
    key lookup on clustered index in query 1, nested loops in query 1. Each scalar
    cost is mapped to a selected table.

    图 14-16

    已索引的计算列执行计划


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig15_HTML.png)

    A screenshot of an input output page of messages tab. It reads 2 tables labeled
    person and the affected rows. The logical reads are 5 and 2.

    图 14-15

    已索引计算列的 STATISTICS I/O


    请注意，为计算列创建索引的成本是，当计算列中使用的任何基础列发生更改时，需要额外进行 I/O 来更新索引。因此，应仅为那些频繁执行（或至关重要）的查询能从中受益的场景保留计算列索引。


    如本节所示，当需要通过表达式来定义表中的值时，计算列非常有用。例如，如果一个应用程序只能发送组合了姓和名的搜索条件，那么计算列可以提供应用程序所需格式的数据。这些列可以利用基础索引来返回结果，但通常无法完全利用这些索引中的统计数据和数据的基础排序，因为列定义中存在表达式。通过对计算列创建索引，可以以应用程序所需的精确格式提供数据，从而实现最佳性能，即使涉及多个列或复杂计算也是如此。'
  raw: '## Computed Columns


    Sometimes one or more columns in a table are defined as an expression. These types
    of columns are referred to as *computed columns*. Computed columns can be useful
    when a column is needed to hold the result of a function or calculation that will
    change over time based on the other columns in the table. Rather than spending
    the CPU cycles to make certain that all modifications to a table always include
    changes to all the related columns, the components can be changed and the results
    computed when queried.


    Note that computed columns cannot leverage the indexes on the source columns for
    the computed column. To demonstrate, add two computed columns to the `Person.Person`
    table using Listing [14-7](#338675_4_En_14_Chapter.xhtml#PC7). The first column
    will concatenate `FirstName` and `LastName` together, as they were concatenated
    in the previous section. The second column will multiply `ContactID` by `EmailPromotion`;
    while this calculation does not have any intrinsic meaning, it will show how this
    strategy can be used with other calculation types.


    ```

    USE AdventureWorks2017

    GO

    ALTER TABLE Person.Person

    ADD FirstLastName AS (FirstName + '' '' + LastName)

    ,CalculateValue AS (BusinessEntityID ∗ EmailPromotion);

    Listing 14-7

    Add Computed Columns to Person.Person

    ```


    With the columns in place, the next step is to test querying the table. Execute
    two queries against the table using Listing [14-8](#338675_4_En_14_Chapter.xhtml#PC8).
    The first query is similar to the first and last name query from the previous
    section (when searching for Gustavo Achong). The second query will return all
    records with the `CalculatedValue` of 198.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName, FirstLastName

    FROM Person.Person

    WHERE FirstLastName = ''Gustavo Achong'';

    SELECT BusinessEntityID, CalculateValue

    FROM Person.Person

    WHERE CalculateValue = 198;

    Listing 14-8

    Computed Column Queries

    ```


    After executing both queries, the execution plans in Figure [14-14](#338675_4_En_14_Chapter.xhtml#Fig14)
    show that both used scan operations to return the query results. These results
    are less than ideal for the same reasons mentioned earlier in this chapter since
    they can lead to blocking and utilize more I/O than should be necessary for the
    query requests. By more I/O, the query results for both require read I/Os from
    scanning the entire table, shown in Figure [14-13](#338675_4_En_14_Chapter.xhtml#Fig13).


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig14_HTML.png)


    A screenshot of a page presents the output under the execution plan tab. It reads
    the query 1 and 2 separately. 1\. Index scan on non-clustered at cost 89%, 2 compute
    scalars at cost 2%, and 9%, is mapped to a selected table. 2\. Clustered index
    scan at cost 100%, 2 compute scalars, is mapped to a selected table.


    Figure 14-14


    Computed column execution plans


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig13_HTML.png)


    A screenshot of an input output page of messages tab. It reads 2 tables labeled
    person and the affected rows. The logical reads are 99 and 3858.


    Figure 14-13


    STATISTICS I/O for computed columns


    An indexing option available for computed columns is to index the computed columns
    themselves, which SQL Server will suggest as missing indexes, as shown in Figure
    [14-14](#338675_4_En_14_Chapter.xhtml#Fig14). As the query for `FirstLastName`
    shows, the query can use any of the indexes on the table. The restriction is that
    it cannot use them any better than if the expression for the computed column was
    in the query itself. Indexing the computed columns, as shown in Listing [14-9](#338675_4_En_14_Chapter.xhtml#PC9),
    provides the necessary distribution and record information to allow queries, such
    as those in Listing [14-8](#338675_4_En_14_Chapter.xhtml#PC8), to use seeks instead
    of scans. The index materializes the values in the computed column, allowing quick
    access to the data, which results in a significant reduction in I/O from 99 to
    5 reads and 3,878 to 2 reads, shown in Figure [14-15](#338675_4_En_14_Chapter.xhtml#Fig15).
    Figure [14-16](#338675_4_En_14_Chapter.xhtml#Fig16) shows the execution plans.


    Note


    When indexing a computed column, the expression for the column must be deterministic.
    Every time the expression executes with the same variables, it will always return
    the same results. As an example, using `GETDATE()` in a computed column expression
    would not be deterministic.


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_PersonPerson_FirstLastName ON Person.Person(FirstLastName);

    CREATE INDEX IX_PersonPerson_CalculateValue ON Person.Person(CalculateValue);

    Listing 14-9

    Computed Column Indexes

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig16_HTML.png)


    A page presents the output under the execution plan tab. It reads the query 1
    and 2 with their cost and presents the index seek on non-clustered in both query,
    key lookup on clustered index in query 1, nested loops in query 1\. Each scalar
    cost is mapped to a selected table.


    Figure 14-16


    Indexed computed column execution plans


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig15_HTML.png)


    A screenshot of an input output page of messages tab. It reads 2 tables labeled
    person and the affected rows. The logical reads are 5 and 2.


    Figure 14-15


    STATISTICS I/O for indexed computed column


    Note that the cost of indexing a computed column is the additional I/O required
    to update the index when any of the underlying columns used in the computed column
    change. Therefore, indexing a computed column should be reserved for scenarios
    where frequently executed (or critically important) queries are benefiting from
    the index.


    As this section demonstrates, computed columns can be extremely useful when expressions
    are needed to define values as part of a table. For example, if an application
    can only send in searches where the first and last names were combined, computed
    columns can provide the data in the format that the application is sending. The
    columns can use underlying indexes to return results but usually can’t fully use
    the statistics and underlying sort of the data in those indexes because of the
    expression in the column definition. By indexing computed columns, data can be
    provided in the exact format needed by an application, allowing for optimal performance,
    even when multiple columns or complex calculations are involved.'
  trans: '

    ## 计算列


    有时，表中的一列或多列被定义为表达式。这类列被称为*计算列*。当需要一列来保存函数或计算的结果，且该结果会随表中其他列的变化而改变时，计算列就非常有用。与其耗费
    CPU 周期来确保对表的所有修改都包含对所有相关列的更改，不如在查询时更改组件并计算结果。


    请注意，计算列无法利用源列上的索引来加速自身。为了演示这一点，请使用代码清单 14-7 向`Person.Person`表添加两个计算列。第一列将把`FirstName`和`LastName`连接起来，就像在上一节中连接它们一样。第二列将把`BusinessEntityID`乘以`EmailPromotion`；虽然这个计算本身没有内在含义，但它将展示如何将此策略用于其他计算类型。


    ```sql

    USE AdventureWorks2017

    GO

    ALTER TABLE Person.Person

    ADD FirstLastName AS (FirstName + '' '' + LastName)

    ,CalculateValue AS (BusinessEntityID ∗ EmailPromotion);

    Listing 14-7

    向 Person.Person 添加计算列

    ```


    添加列之后，下一步是测试查询该表。使用代码清单 14-8 执行两个查询。第一个查询类似于上一节中搜索 Gustavo Achong 时使用的名字和姓氏查询。第二个查询将返回所有`CalculateValue`为
    198 的记录。


    ```sql

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName, FirstLastName

    FROM Person.Person

    WHERE FirstLastName = ''Gustavo Achong'';

    SELECT BusinessEntityID, CalculateValue

    FROM Person.Person

    WHERE CalculateValue = 198;

    Listing 14-8

    计算列查询

    ```


    执行两个查询后，图 14-14 中的执行计划显示，两者都使用了扫描操作来返回查询结果。根据本章前面提到的原因，这些结果并不理想，因为它们可能导致阻塞，并且比查询请求所需的
    I/O 更多。这里的“更多 I/O”是指两个查询的结果都需要通过扫描整个表来读取 I/O，如图 14-13 所示。


    ![](img/338675_4_En_14_Fig14_HTML.png)

    一张页面截图，展示了执行计划选项卡下的输出。它分别读取查询 1 和 2。1. 在非聚集索引上的索引扫描，成本 89%，2 个计算标量操作，成本分别为 2%
    和 9%，映射到一个选定的表。2. 聚集索引扫描，成本 100%，2 个计算标量操作，映射到一个选定的表。

    图 14-14

    计算列执行计划


    ![](img/338675_4_En_14_Fig13_HTML.png)

    一张消息选项卡的输入输出页面截图。它读取标记为 person 的两个表及其影响的行数。逻辑读取次数分别为 99 和 3858。

    图 14-13

    计算列的 STATISTICS I/O


    计算列的一个索引选项是为计算列本身创建索引，SQL Server 会将其建议为缺失索引，如图 14-14 所示。正如`FirstLastName`的查询所示，该查询可以使用表上的任何索引。限制在于，它不能比查询本身包含计算列表达式时更好地利用这些索引。为计算列创建索引（如代码清单
    14-9 所示）提供了必要的分布和记录信息，允许像代码清单 14-8 中的查询那样的查询使用查找而不是扫描。索引具体化了计算列中的值，允许快速访问数据，从而显著减少了
    I/O（从 99 次读取减少到 5 次，从 3,878 次减少到 2 次），如图 14-15 所示。图 14-16 显示了执行计划。


    **注意**


    为计算列创建索引时，该列的表达式必须是确定性的。即每次使用相同变量执行该表达式，都将返回相同的结果。例如，在计算列表达式中使用`GETDATE()`就不是确定性的。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_PersonPerson_FirstLastName ON Person.Person(FirstLastName);

    CREATE INDEX IX_PersonPerson_CalculateValue ON Person.Person(CalculateValue);

    Listing 14-9

    计算列索引

    ```


    ![](img/338675_4_En_14_Fig16_HTML.png)

    一张页面截图，展示了执行计划选项卡下的输出。它读取查询 1 和 2 及其成本，并在两个查询中都展示了非聚集索引上的索引查找，查询 1 中的聚集索引上的键查找，以及查询
    1 中的嵌套循环。每个标量成本都映射到一个选定的表。

    图 14-16

    已索引的计算列执行计划


    ![](img/338675_4_En_14_Fig15_HTML.png)

    一张消息选项卡的输入输出页面截图。它读取标记为 person 的两个表及其影响的行数。逻辑读取次数分别为 5 和 2。

    图 14-15

    已索引计算列的 STATISTICS I/O


    请注意，为计算列创建索引的成本是，当计算列中使用的任何基础列发生更改时，需要额外进行 I/O 来更新索引。因此，应仅为那些频繁执行（或至关重要）的查询能从中受益的场景保留计算列索引。


    如本节所示，当需要通过表达式来定义表中的值时，计算列非常有用。例如，如果一个应用程序只能发送组合了姓和名的搜索条件，那么计算列可以提供应用程序所需格式的数据。这些列可以利用基础索引来返回结果，但通常无法完全利用这些索引中的统计数据和数据的基础排序，因为列定义中存在表达式。通过对计算列创建索引，可以以应用程序所需的精确格式提供数据，从而实现最佳性能，即使涉及多个列或复杂计算也是如此。

    '
- fmt: '## Scalar Functions


    The previous few sections discussed filtering query results by searching within
    column values or by combining values across columns. This section looks at the
    effect of scalar functions used in the `WHERE` clauses of queries. Scalar functions
    provide the ability to transform values to other values that can be more useful
    when querying the database.


    User-defined scalar functions can also be created and used in the `WHERE` clause.
    The trouble with both system and user-defined scalar functions is that if they
    transform a column where an index exists, then SQL Server is no longer able to
    use the index efficiently. Because the values of the calculations are not known
    until runtime, the query optimizer does not have statistics to determine the frequency
    of values in the index or information on where the calculated values are located
    in the index or table.


    To demonstrate the effect of scalar functions on queries, consider the two queries
    in Listing [14-10](#338675_4_En_14_Chapter.xhtml#PC10) that return information
    from `Person.Person`. Both queries will return all rows that have the value `Gustavo`
    in the `FirstName` column. The difference between the two queries is that the
    second query will use the `RTRIM` function in the `WHERE` clause on the `FirstName`
    column.


    ```

    USE AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE FirstName = ''Gustavo'';

    SELECT BusinessEntityID, FirstName, LastName

    FROM Person.Person

    WHERE RTRIM(FirstName) = ''Gustavo'';

    Listing 14-10

    Queries on FirstName Gustavo

    ```


    As the second execution plan in Figure [14-18](#338675_4_En_14_Chapter.xhtml#Fig18)
    shows, when the scalar function is added to the `WHERE` clause, the execution
    plan continues to use the same index that the first plan did, but leverages an
    index scan instead of an index seek. This change increases the I/Os from 2 to
    99 (shown in Figure [14-17](#338675_4_En_14_Chapter.xhtml#Fig17)), which is similar
    to other examples. In this scenario, excluding the scalar function, as in the
    first query, can provide the same results as with the function in place. That
    will not be the case for all queries, but the way to allow indexes to be best
    used is to move the scalar function from the key columns to the parameters of
    a query.


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig18_HTML.png)


    A page presents the output under the execution plan tab. It reads the query 1
    and 2 with their cost and presents the index-seek on non-clustered in query 1
    and index scan on non-clustered at cost 98% in query 2. Each is mapped to a selected
    table at cost of 0% and 2% respectively.

    Figure 14-18

    Execution plans for Gustavo queries


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig17_HTML.png)


    A screenshot of an input output page of messages tab. It reads 2 tables labeled
    person and the affected rows. The logical reads are 2 and 99.

    Figure 14-17

    STATISTICS I/O when a scalar function is used in the WHERE clause


    A good example of how scalar functions can be moved off key columns and into parameters
    is when the functions `MONTH` and `YEAR` are used. Suppose a query needs to return
    all sales orders for the month of December in the year 2001. This could be accomplished
    with the first `SELECT` query in Listing [14-11](#338675_4_En_14_Chapter.xhtml#PC11).
    Using the `MONTH` and `YEAR` functions changes the value of `OrderDate`, though,
    and the index on that column is still used, but with a scan instead of a seek
    (see the first execution plan in Figure [14-20](#338675_4_En_14_Chapter.xhtml#Fig20)).
    This issue can be avoided by changing the query in such a way that, instead of
    using the functions, the filter is applied to a range of values, such as in the
    second `SELECT` statement in Listing [14-11](#338675_4_En_14_Chapter.xhtml#PC11).
    As the second execution shows, the query can return the results with a seek instead
    of a scan, providing a significant reduction in reads, from 73 to 3, as shown
    in Figure [14-19](#338675_4_En_14_Chapter.xhtml#Fig19). The beauty of a fix like
    this is that performance can be greatly improved without any tangible cost.


    ```

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_SalesSalesOrderHeader_OrderDate ON Sales.SalesOrderHeader(OrderDate);

    SET STATISTICS IO ON;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = 12

    AND YEAR(OrderDate) = 2012;

    SELECT SalesOrderID, OrderDate

    FROM Sales.SalesOrderHeader

    WHERE OrderDate BETWEEN ''20121201'' AND ''20121231'';

    SET STATISTICS IO OFF;

    Listing 14-11

    Queries using a value range instead of functions in the WHERE clause

    ```


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig20_HTML.png)


    A page presents the output under the execution plan tab. It reads the query 1
    and 2 with their cost and presents the index scan on non-clustered at cost 97%
    in query 1 and index seek on non-clustered in query 2. Each is mapped to a selected
    table at cost 3% and 0% respectively.

    Figure 14-20

    Execution plans for date queries


    ![](images/338675_4_En_14_Chapter/338675_4_En_14_Fig19_HTML.png)


    A screenshot of an input output page of messages tab. It reads 2 table labeled
    sales order header and the affected rows. The logical reads are 73 and 3.

    Figure 14-19

    STATISTICS I/O when using a value range instead of functions in the WHERE clause


    It will not always be possible to remove scalar functions from the `WHERE` clause
    of queries. One good example of this is if leading spaces were added to a column
    that should not be included when comparing the column values to parameters. In
    such a situation, more creativity will be required to resolve the problem. One
    possible solution is to use a computed column with an index on it, as introduced
    in the previous section.


    The important thing to remember when dealing with scalar functions in the `WHERE`
    clause is that if the function changes the value of a column, any index on the
    column most likely will not be able to be used as efficiently as possible with
    the query. If the table is small and the queries will be infrequent, this may
    not be a significant problem. For larger databases, this can become the cause
    of unexpectedly high numbers of scans on indexes and can lead to issues with blocking
    and deadlocks.'
