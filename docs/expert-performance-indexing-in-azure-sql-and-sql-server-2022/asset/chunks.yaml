- fmt: 'A database table of 2 rows and 9 columns of data. The column headers are `name`,
    `index_id`, `type_desc`, `using_xml_index_id`, `secondary_type`, `secondary_type_desc`,
    `xml_index_type`, `xml_index_type_description`, and `path_id`. A primary and a
    secondary XML indexes are present.


    Figure 6-6


    Results from `sys.xml_indexes` query


    *   `using_xml_index_id`: The parent index for a secondary index. As discussed,
    secondary indexes require a primary index to exist before creation. This column
    will be `NULL` for primary XML indexes and used only for secondary indexes.


    *   `secondary_type`: A flag specifying the type on which a secondary index is
    based. Each secondary index is based on a specific type (`V` = `VALUE`, `P` =
    `PATH`, `R` = `PROPERTY`). For primary XML indexes, this column is `NULL`.


    *   `secondary_type_desc`: A description of the secondary index type. The values
    for the description map to those described in the `secondary_type` column.


    It is important to consider the storage impact of primary and secondary XML indexes
    as the more data that is in the table and the more often that data is modified,
    the more of an impact these indexes will have on write operations. The performance
    improvement of using a secondary XML index needs to be weighed against the time
    taken to maintain it to decide whether (or not) to create the index. Strive to
    strike a balance between hardware resources, storage, index usefulness, number
    of indexes created, and number of times an index may realistically be needed when
    building primary and secondary XML indexes.


    ## Selective XML Indexes


    Introduced in SQL Server 2012, selective XML indexes address a significant problem
    with primary/secondary XML indexes. XML documents can be extremely large. Applying
    an index to the entire document has major performance implications for both creating
    and maintaining the index over time. Also, these excessively large indexes can
    add to the storage woes that are a frequent problem within organizations. When
    an index becomes large, it may not function as well as it did when it was smaller.
    For these reasons, the selective XML index was introduced.


    Selective XML indexes allow an index to be created over a subset of the XML document.
    This makes for smaller, more nimble indexes that are targeted to specific paths
    within the XML. When the index is created, the document is parsed, and the XML
    is shredded. The shredded values are then stored in standard relational storage
    within the database. In addition to the selective XML index, secondary indexes
    can be added based on the nodes within the path that defines the selective XML
    index.


    Selective XML indexes can achieve significant performance benefits over standard
    XML indexes when only a subset of elements is typically needed. However, if queries
    against XML columns are mostly ad hoc that may request any elements from within
    an XML document, then a standard XML index is likely to be more useful. Similarly,
    an XML document with a large number of node paths may benefit more from a standard
    XML index rather than a selective XML index.


    To create a selective XML index, the following criteria must be followed:


    *   The table must have a clustered index that is defined on the primary key.

    *   The primary key size is limited to 128 bytes.

    *   The clustered index key columns are limited to 15 when used with a selective
    XML index.


    The selective XML index will not be used for `query()` or `modify()` methods within
    XQuery statements. It will support `exist()`, `value()`, and `nodes()`. If `query()`
    and `modify()` are used together, it will only assist in a node lookup.


    The script in Listing 6-6 creates a path within a selective XML index. Since only
    annual sales are being accessed in the document, the selective XML index can be
    limited to only that XML path.


    ```

    USE AdventureWorks2017;

    GO

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSales]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'');

    ```


    Listing 6-6

    Script for Creating a Selective XML Index


    After creating the selective XML index, the example query from Listing 6-2 will
    be revisited to see the impact on the execution plan. As shown in Figure 6-7,
    the estimated subtree cost is comparable to having the secondary XML index in
    place, but it’s slightly more expensive with the selective XML index. To understand
    why SQL Server made this choice, the code in Listing 6-4 can be executed to see
    the storage footprint. As Figure 6-8 shows, the selective XML index is substantially
    smaller than the secondary XML index. Instead of potentially accessing 41 pages
    and 9,113 records, the selective XML index is limited to 701 records across 5
    pages, which justifies the extra cost for the clustered index scan on the selective
    XML index.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig8_HTML.png)


    A database table of 9 rows and 8 columns of data. The column headers are `name`,
    `index_id`, `index_level`, `index_type_desc`, `fragment_count`, `avg_page_space_used_in_percent`,
    `record_count`, and `page_count`. 2 selective XML indexes are present.


    Figure 6-8


    Physical stats after creating the selective XML index


