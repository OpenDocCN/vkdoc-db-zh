  trans: '

    ### 数据清理


    尽管监控所需的所有信息对索引分析都是必要的，但这些信息并非需要无限期保留。若没有在合理时间后清理已收集信息的任务，监控流程就不算完整。一个普遍可接受的信息清理计划是：在
    3 天后清除快照信息，在 90 天后清除历史信息。如果需要将历史数据保留更长时间，可以据此进行调整。


    快照信息仅用于准备历史信息，一旦增量创建完成就不再需要。由于 SQL Agent 作业可能出错，且收集点可能与上一次相隔一天，通常 3 天的窗口期能为流程提供所需余地，并适应可能出现的任何问题。


    历史表中的数据比快照信息更为关键，需要保留更长时间。这些信息为索引分析期间的活动提供数据支持。保留此信息的窗口期应与完成索引方法三次或更多次迭代通常所需的时间相匹配。这样，保留的信息可以在流程的几个周期中作为参考。


    安排清理流程时，应至少每天执行一次，并在非核心处理时段进行。这将最小化每次执行时删除的信息量，并减少删除操作与服务器上其他活动可能产生的争用。如代码清单 15-16
    所示的删除脚本涵盖了本节讨论的所有表。


    ```sql

    USE IndexingMethod

    GO

    DECLARE @SnapshotDays INT = 3

    ,@HistoryDays INT = 90

    DELETE FROM dbo.index_usage_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_usage_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.index_operational_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.index_physical_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    DELETE FROM dbo.wait_stats_snapshot

    WHERE create_date < DATEADD(d, -@SnapshotDays, GETDATE())

    DELETE FROM dbo.wait_stats_history

    WHERE create_date < DATEADD(d, -@HistoryDays, GETDATE())

    ```


    代码清单 15-16

    索引监控快照与历史记录清理


    ### 事件追踪


    可以为监控索引收集的最后一套信息是事件追踪。追踪信息收集代表生产活动的 SQL 语句，这些语句可用于索引分析，以根据生产环境中的查询活动及其中存储的数据来识别可能有用的索引。虽然迄今为止收集的统计信息提供了活动对索引的影响以及
    SQL Server 实例上其他资源使用情况的信息，但事件追踪收集的是导致这些统计信息产生活动的原因。对于 SQL Server，有两种方法可用于收集事件追踪数据：


    *   SQL Trace


    *   扩展事件


    为了完整性，两种方法都将讨论。在我看来，在 SQL Server 中应仅使用扩展事件来收集事件追踪数据。这是因为扩展事件与 SQL Server 的集成度很高，有助于防止其在监控时引起性能问题。而且它能检索的详细程度远超
    SQL Trace 的能力。


    #### SQL Trace


    SQL Trace 以及由此衍生的 SQL Profiler 是 SQL Server 最初的追踪工具。它是 DBA 最常用的工具之一，可以轻松收集 SQL
    Server 中的事件。使用 SQL Trace 收集信息时需要注意几个方面。首先，SQL Trace 很可能会收集大量信息，需要为此做好准备。换句话说，服务器和数据库越活跃，追踪（`.trc`）文件就越大。过滤事件有助于确保只返回相关细节。同样，不要在已经使用率很高或专用于数据或事务日志文件的驱动器上收集追踪信息。这样做可能（并且很可能）会影响这些驱动器上的
    I/O 性能。监控的最终目标是提高系统性能；需要尽量减小监控的影响。


    最后，SQL Trace 和 SQL Profiler 在 SQL Server 2012 中已被弃用。这并不意味着这些工具不再起用，但它们计划在未来的 SQL
    Server 版本中移除。尽管 SQL Trace 已被弃用，但在某些场景下，例如为数据库引擎优化顾问构建工作负载时，它仍然是收集追踪信息最方便的工具。


    注意

    建议随时了解 SQL Server 中的已弃用功能。有关已弃用功能的更多信息，请参阅 SQL Docs 的 [`https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022`](https://learn.microsoft.com/en-us/sql/database-engine/deprecated-database-engine-features-in-sql-server-2022)。


    创建 SQL Trace 会话有四个基本步骤：


    1.  构建追踪会话。


    2.  为会话分配事件和列。


    3.  向会话添加筛选器。


    4.  启动 SQL Trace 会话。


    接下来的几页将介绍这些步骤，并描述在 SQL Server 2022 中创建 SQL Trace 会话所使用的组件。该脚本也适用于早期版本的 SQL Server。


    要开始使用 SQL Trace 进行监控，必须首先创建一个追踪会话。会话使用 `sp_trace_create` 存储过程创建。该过程接受多个参数来配置会话如何收集信息。在代码清单
    15-17 所示的示例会话中，SQL Trace 会话将创建文件，当文件大小达到 50 MB 限制时自动滚动更新。限制文件大小是为了便于文件管理。在大多数环境中，复制许多
    50 MB 的文件比复制 1 GB 或更大的文件更容易。如果偏好更大的文件而非大量小文件，可以调整此大小。追踪文件创建在 `c:\temp` 目录下，文件名为
    `IndexingMethod`。如果此文件夹不存在，请务必创建。注意，此名称可以更改为适合监控设置所在服务器和数据库需求的任何名称。


    ```sql

    USE master;

    GO

    DECLARE @rc INT,

    @TraceID INT,

    --Maximum .trc file size in MB

    @maxfilesize BIGINT = 50,

    --File name and path, minus the extension

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'';

    EXEC @rc = sp_trace_create @TraceID OUTPUT, 0, @FileName, @maxfilesize, NULL;

    IF (@rc  0)

    RAISERROR(''Error creating trace file'', 16, 1);

    SELECT *

    FROM sys.traces

    WHERE id = @TraceID;

    ```


    代码清单 15-17

    创建 SQL Trace 会话

    '
- fmt: '在创建了 SQL Trace 会话后，下一步是向会话中添加事件。有两种事件对于索引监控最有价值：`RPC:Completed` 和 `SQL:BatchCompleted`。`RPC:Completed`
    在远程过程调用完成时返回结果；其最佳示例是存储过程的完成。另一个事件 `SQL:BatchCompleted` 在即席（ad hoc）和预准备（prepared）批处理完成时发生。通过这两个事件，将收集服务器上所有已完成的
    SQL 语句。


    要向 SQL Trace 会话添加事件，需使用存储过程 `sp_trace_setevent`。该存储过程添加事件以及从事件中请求的列到跟踪中，每次执行存储过程都会添加一对事件和列。对于两个事件，每个事件有
    15 列，则需要执行该存储过程 30 次。对于示例会话（如清单 [15-18](#338675_4_En_15_Chapter.xhtml#PC18) 所示），每个会话收集以下列：


    *   `ApplicationName`

    *   `ClientProcessID`

    *   `CPU`

    *   `DatabaseID`

    *   `DatabaseName`

    *   `Duration`

    *   `EndTime`

    *   `HostName`

    *   `LoginName`

    *   `NTUserName`

    *   `Reads`

    *   `SPID`

    *   `StartTime`

    *   `TextData`

    *   `Writes`


    事件和列的代码可以在系统目录视图中找到。事件列在视图 `sys.trace_events` 中。可用的列列在 `sys.trace_columns` 中。列视图还包括一个指示符，用于标识是否可以筛选该列的值，这在创建
    SQL Trace 会话的下一步中很有用。


    ```sql

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

    EXEC sp_trace_setevent @TraceID, 10, 17, @on;

    EXEC sp_trace_setevent @TraceID, 10, 18, @on;

    EXEC sp_trace_setevent @TraceID, 10, 3, @on;

    EXEC sp_trace_setevent @TraceID, 10, 35, @on;

    EXEC sp_trace_setevent @TraceID, 10, 6, @on;

    EXEC sp_trace_setevent @TraceID, 10, 8, @on;

    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    ```

    清单 15-18 向 SQL Trace 会话添加事件和列


    下一步是从 SQL Trace 会话中筛选掉不需要的事件。没有必要在每次 SQL Trace 会话中，为所有数据库和所有应用程序一直收集所有语句。事实上，在清单
    [15-19](#338675_4_En_15_Chapter.xhtml#PC19) 中，来自系统数据库（数据库 ID 小于 5）的事件将从会话中移除。用于筛选
    SQL Trace 会话的存储过程是 `sp_trace_setfilter`。该存储过程接受来自 `sys.trace_columns` 的列 ID。可以对事件中未包含的列进行筛选，并且筛选器适用于所有事件。


    ```sql

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    ```

    清单 15-19 向 SQL Trace 会话添加筛选器


    设置 SQL Trace 监控的最后一步是启动跟踪。此任务使用存储过程 `sp_trace_setstatus` 完成，如清单 [15-20](#338675_4_En_15_Chapter.xhtml#PC20)
    所示。通过此过程，可以启动、暂停和停止 SQL Trace 会话。一旦跟踪启动，它将在提供的文件位置开始创建 `.trc` 文件，SQL Trace 监控的配置即告完成。当
    SQL Trace 会话的收集期结束时，将使用状态码 2（而不是 1）的此脚本来终止会话。清单 [15-21](#338675_4_En_15_Chapter.xhtml#PC21)
    提供了此脚本。


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    ```

    清单 15-20 启动 SQL Trace 会话


    > 注意

    > 一些 SQL Server 专家更喜欢不使用数据库引擎优化顾问，因为可能收到无效的建议，他们更倾向于手动分析数据库并确定所需的索引。这种偏见错过了发现容易解决的问题（low-hanging
    fruit）或通过更改聚集索引位置来提高性能的机会。


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    ```

    清单 15-21 停止 SQL Trace 会话


    本节中的 SQL Trace 会话示例相当基础。在任何给定的生产环境中，可能需要设计更智能的进程，该进程在每个跟踪文件中收集指定时间段的信息，而不是使用文件大小来控制文件滚动速率。对
    SQL Trace 收集信息以进行监控索引的这些类型的更改，应该不会影响在本章后面使用 SQL Trace 信息用于预期目的的能力。使用 SQL Trace
    时，还有最后一项需要考虑。跟踪信息不需要像性能计数器和 DMO 信息那样持续收集。相反，SQL Trace 信息通常更适合收集 4-8 小时的时间段，该时间段代表数据库平台上的常规活动日。如果存在已知的性能不佳时间段，则可以专门针对该特定时间段。


    使用 SQL Trace，有可能收集过多信息，这会压倒分析阶段并延迟索引建议。因此，筛选和针对关键时间和事件可以使发现有用信息的任务变得显著更容易完成。'
  raw: 'After creating the SQL Trace session, the next step is to add events to the
    session. There are two events that will collect the information that is of most
    value to index monitoring: RPC:Completed and SQL:BatchCompleted. RPC:Completed
    returns results whenever a remote procedure call completes; the best example of
    this is the completion of a stored procedure. The other event, SQL:BatchCompleted,
    occurs when ad hoc and prepared batches are completed. Between these two events,
    all the completed SQL statements on the server will be collected.


    To add events to the SQL Trace session, the `sp_trace_set` event stored procedure
    is used. The stored procedure adds events and the column requested from the event
    to the trace with each execution of the stored procedure. For two events with
    15 columns each, the stored procedure will need to be executed 30 times. For the
    example session, shown in Listing [15-18](#338675_4_En_15_Chapter.xhtml#PC18),
    the following columns are being collected for each of the sessions:


    *   `ApplicationName`


    *   `ClientProcessID`


    *   `CPU`


    *   `DatabaseID`


    *   `DatabaseName`


    *   `Duration`


    *   `EndTime`


    *   `HostName`


    *   `LoginName`


    *   `NTUserName`


    *   `Reads`


    *   `SPID`


    *   `StartTime`


    *   `TextData`


    *   `Writes`


    The codes for the events and columns can be found in system catalog views. Events
    are listed in view `sys.trace_events`. The columns available are listed in `sys.trace_columns`.
    The columns view also includes an indicator to identify whether the values from
    the column can be filtered, which is useful in the next step in creating SQL Trace
    sessions.


    ```

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

    EXEC sp_trace_setevent @TraceID, 10, 17, @on;

    EXEC sp_trace_setevent @TraceID, 10, 18, @on;

    EXEC sp_trace_setevent @TraceID, 10, 3, @on;

    EXEC sp_trace_setevent @TraceID, 10, 35, @on;

    EXEC sp_trace_setevent @TraceID, 10, 6, @on;

    EXEC sp_trace_setevent @TraceID, 10, 8, @on;

    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    Listing 15-18

    Add Events and Columns to SQL Trace Session

    ```


    The next step is to filter out unneeded events from the SQL Trace session. There
    is no need to collect all statements all the time for all databases and all applications
    with every SQL Trace session. In fact, in Listing [15-19](#338675_4_En_15_Chapter.xhtml#PC19),
    events from the system databases, those with a database ID less than 5, are removed
    from the session. The stored procedure for filtering SQL Trace sessions is `sp_trace_setfilter`.
    The stored procedure accepts the ID for columns from `sys.trace_columns`. Columns
    not included in the events can be filtered, and filters apply to all events.


    ```

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    Listing 15-19

    Add Filters to SQL Trace Session

    ```


    The last step in setting up the monitoring for SQL Trace is to start the trace.
    This task is accomplished using the `sp_trace_setstatus` stored procedure, shown
    in Listing [15-20](#338675_4_En_15_Chapter.xhtml#PC20). Through this procedure,
    SQL Trace sessions can be started, paused, and stopped. Once the trace is started,
    it will start to create .`trc` files in the file location provided, and the configuration
    for SQL Trace monitoring will be complete. When the collection period for the
    SQL Trace session completes, this script will be used with the status code 2 instead
    of 1 to terminate the session. Listing [15-21](#338675_4_En_15_Chapter.xhtml#PC21)
    provides this script.


    ```

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    Listing 15-20

    Start SQL Trace Session

    ```


    Note


    Some SQL Server experts prefer to not use the Database Engine Tuning Advisor due
    to the chance of receiving invalid advice, preferring instead to manually analyze
    the database and determine the indexes needed. This bias misses the opportunity
    to uncover low-hanging fruit or situations where changing the location of the
    clustered index can improve performance.


    ```

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    Listing 15-21

    Stop SQL Trace Session

    ```


    The SQL Trace session example in this section is fairly basic. In any given production
    environment, a more intelligent process may need to be crafted that collects information
    in each trace file for a specified amount of time instead of using a file size
    to control the file rollover rate. These types of changes to collecting information
    from SQL Trace for monitoring indexes should have no impact on the ability to
    use the SQL Trace information for the purposes intended later in this chapter.
    There is one last item to consider when using a SQL Trace. Trace information does
    not need to constantly be gathered, like performance counter and DMO information.
    Instead, the SQL Trace information is often better suited to being collected for
    a 4–8-hour period that represents a regular day of activity on your database platform.
    If there is a known time period when poor performance is experienced, then that
    specific period can be targeted.


    With SQL Trace, it is possible to collect too much information, which can overwhelm
    the analyze phase and delay indexing recommendations. Therefore, filtering and
    targeting key times and events can make uncovering useful information significantly
    easier to accomplish.'
  trans: '

    在创建了 SQL Trace 会话后，下一步是向会话中添加事件。有两种事件对于索引监控最有价值：`RPC:Completed` 和 `SQL:BatchCompleted`。`RPC:Completed`
    在远程过程调用完成时返回结果；其最佳示例是存储过程的完成。另一个事件 `SQL:BatchCompleted` 在即席（ad hoc）和预准备（prepared）批处理完成时发生。通过这两个事件，将收集服务器上所有已完成的
    SQL 语句。


    要向 SQL Trace 会话添加事件，需使用存储过程 `sp_trace_setevent`。该存储过程添加事件以及从事件中请求的列到跟踪中，每次执行存储过程都会添加一对事件和列。对于两个事件，每个事件有
    15 列，则需要执行该存储过程 30 次。对于示例会话（如清单 15-18 所示），每个会话收集以下列：


    *   `ApplicationName`

    *   `ClientProcessID`

    *   `CPU`

    *   `DatabaseID`

    *   `DatabaseName`

    *   `Duration`

    *   `EndTime`

    *   `HostName`

    *   `LoginName`

    *   `NTUserName`

    *   `Reads`

    *   `SPID`

    *   `StartTime`

    *   `TextData`

    *   `Writes`


    事件和列的代码可以在系统目录视图中找到。事件列在视图 `sys.trace_events` 中。可用的列列在 `sys.trace_columns` 中。列视图还包括一个指示符，用于标识是否可以筛选该列的值，这在创建
    SQL Trace 会话的下一步中很有用。


    ```sql

    USE master;

    GO

    DECLARE @on INT = 1,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- RPC:Completed

    EXEC sp_trace_setevent @TraceID, 10, 1, @on;

    EXEC sp_trace_setevent @TraceID, 10, 10, @on;

    EXEC sp_trace_setevent @TraceID, 10, 11, @on;

    EXEC sp_trace_setevent @TraceID, 10, 12, @on;

    EXEC sp_trace_setevent @TraceID, 10, 13, @on;

    EXEC sp_trace_setevent @TraceID, 10, 14, @on;

    EXEC sp_trace_setevent @TraceID, 10, 15, @on;

    EXEC sp_trace_setevent @TraceID, 10, 16, @on;

    EXEC sp_trace_setevent @TraceID, 10, 17, @on;

    EXEC sp_trace_setevent @TraceID, 10, 18, @on;

    EXEC sp_trace_setevent @TraceID, 10, 3, @on;

    EXEC sp_trace_setevent @TraceID, 10, 35, @on;

    EXEC sp_trace_setevent @TraceID, 10, 6, @on;

    EXEC sp_trace_setevent @TraceID, 10, 8, @on;

    EXEC sp_trace_setevent @TraceID, 10, 9, @on;

    --SQL:BatchCompleted

    EXEC sp_trace_setevent @TraceID, 12, 1, @on;

    EXEC sp_trace_setevent @TraceID, 12, 10, @on;

    EXEC sp_trace_setevent @TraceID, 12, 11, @on;

    EXEC sp_trace_setevent @TraceID, 12, 12, @on;

    EXEC sp_trace_setevent @TraceID, 12, 13, @on;

    EXEC sp_trace_setevent @TraceID, 12, 14, @on;

    EXEC sp_trace_setevent @TraceID, 12, 15, @on;

    EXEC sp_trace_setevent @TraceID, 12, 16, @on;

    EXEC sp_trace_setevent @TraceID, 12, 17, @on;

    EXEC sp_trace_setevent @TraceID, 12, 18, @on;

    EXEC sp_trace_setevent @TraceID, 12, 3, @on;

    EXEC sp_trace_setevent @TraceID, 12, 35, @on;

    EXEC sp_trace_setevent @TraceID, 12, 6, @on;

    EXEC sp_trace_setevent @TraceID, 12, 8, @on;

    EXEC sp_trace_setevent @TraceID, 12, 9, @on;

    ```

    清单 15-18 向 SQL Trace 会话添加事件和列


    下一步是从 SQL Trace 会话中筛选掉不需要的事件。没有必要在每次 SQL Trace 会话中，为所有数据库和所有应用程序一直收集所有语句。事实上，在清单
    15-19 中，来自系统数据库（数据库 ID 小于 5）的事件将从会话中移除。用于筛选 SQL Trace 会话的存储过程是 `sp_trace_setfilter`。该存储过程接受来自
    `sys.trace_columns` 的列 ID。可以对事件中未包含的列进行筛选，并且筛选器适用于所有事件。


    ```sql

    USE master;

    GO

    DECLARE @intfilter INT = 5,

    @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    --Remove system databases from output

    EXEC sp_trace_setfilter @TraceID, 3, 0, 4, @intfilter;

    ```

    清单 15-19 向 SQL Trace 会话添加筛选器


    设置 SQL Trace 监控的最后一步是启动跟踪。此任务使用存储过程 `sp_trace_setstatus` 完成，如清单 15-20 所示。通过此过程，可以启动、暂停和停止
    SQL Trace 会话。一旦跟踪启动，它将在提供的文件位置开始创建 `.trc` 文件，SQL Trace 监控的配置即告完成。当 SQL Trace 会话的收集期结束时，将使用状态码
    2（而不是 1）的此脚本来终止会话。清单 15-21 提供了此脚本。


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to start

    EXEC sp_trace_setstatus @TraceID, 1;

    ```

    清单 15-20 启动 SQL Trace 会话


    > 注意

    > 一些 SQL Server 专家更喜欢不使用数据库引擎优化顾问，因为可能收到无效的建议，他们更倾向于手动分析数据库并确定所需的索引。这种偏见错过了发现容易解决的问题（low-hanging
    fruit）或通过更改聚集索引位置来提高性能的机会。


    ```sql

    USE master;

    GO

    DECLARE @FileName NVARCHAR(256) = N''c:\temp\IndexingMethod'',

    @TraceID INT;

    SET @TraceID = (

    SELECT id FROM sys.traces WHERE path LIKE @FileName + ''%''

    );

    -- Set the trace status to stop

    EXEC sp_trace_setstatus @TraceID, 0;

    ```

    清单 15-21 停止 SQL Trace 会话


    本节中的 SQL Trace 会话示例相当基础。在任何给定的生产环境中，可能需要设计更智能的进程，该进程在每个跟踪文件中收集指定时间段的信息，而不是使用文件大小来控制文件滚动速率。对
    SQL Trace 收集信息以进行监控索引的这些类型的更改，应该不会影响在本章后面使用 SQL Trace 信息用于预期目的的能力。使用 SQL Trace
    时，还有最后一项需要考虑。跟踪信息不需要像性能计数器和 DMO 信息那样持续收集。相反，SQL Trace 信息通常更适合收集 4-8 小时的时间段，该时间段代表数据库平台上的常规活动日。如果存在已知的性能不佳时间段，则可以专门针对该特定时间段。


    使用 SQL Trace，有可能收集过多信息，这会压倒分析阶段并延迟索引建议。因此，筛选和针对关键时间和事件可以使发现有用信息的任务变得显著更容易完成。

