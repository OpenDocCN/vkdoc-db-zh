  trans: '# 身份序列


    构建聚集索引最常见的模式是将其与表中配置为始终递增的列配对，该列可以通过使用 `IDENTITY` 属性或 `SEQUENCE` 对象来实现。在此模式中，`IDENTITY`
    列通常也是表的 `PRIMARY KEY`。数据类型通常为整数，包括 `tinyint`、`smallint`、`int` 和 `bigint`。此模式的主要好处在于它实现（并强制）了一个定义良好的聚集索引的所有属性。它是静态的、窄的、唯一的，并且始终递增。在考虑如何访问表中的数据时，大多数情况下，键值将最常用于访问表中的行。


    身份序列模式的一个特点是，用于聚集索引键的列与行中的数据之间没有关系。要实现此模式，要么在表定义中包含具有 `IDENTITY` 属性的列，要么向表中添加一个使用
    `SEQUENCE` 值的列。然后，将此列设置为聚集索引键，并且通常也设置为 `PRIMARY KEY`。


    几乎在所有数据库中都可以找到此模式的示例。使用此模式创建表类似于代码清单 13-4 中的 `CREATE TABLE` 语句。两个表都用于存放水果：插入了两行苹果、一行香蕉和一行葡萄。`Color`
    列本不应是良好的聚簇键，因为它无法标识表中的行。`FruitName` 列本可以标识表中的行，但它在表中不是唯一的，这将需要唯一标识符并导致更大的聚簇键。按照身份序列模式对表进行索引，创建了一个
    `FruitID` 列。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''IndexStrategiesFruit_Identity'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Identity

    CREATE TABLE dbo.IndexStrategiesFruit_Identity

    (

    FruitID int IDENTITY(1,1)

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Idnt PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Identity(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Identity;

    IF OBJECT_ID(''IndexStrategiesFruit_Sequence'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Sequence

    IF OBJECT_ID(''FruitSequence'') IS NOT NULL

    DROP SEQUENCE FruitSequence

    CREATE SEQUENCE FruitSequence AS INTEGER

    START WITH 1;

    CREATE TABLE dbo.IndexStrategiesFruit_Sequence

    (

    FruitID int DEFAULT NEXT VALUE FOR FruitSequence

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Seq PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Sequence(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Sequence;

    ```

    代码清单 13-4: 为身份序列模式创建和填充表


    使用身份序列模式的效果之一是，聚簇键列的值与其所代表的信息无关。在代码清单 13-4 的查询输出中，如图 13-4 所示，值 1 被分配给两个结果集中插入的第一行。然后，值
    2 被分配给下一行，依此类推。随着更多行的添加，`FruitID` 列会递增，并且不需要记录中的任何单条信息来指定信息实例。


    ![](img/338675_4_En_13_Fig4_HTML.jpg)

    图 13-4: 身份序列模式的结果


    注意


    `SEQUENCE` 是在 `SQL Server 2012` 中引入的。通过序列，可以生成升序或降序的数值范围。序列不与任何特定表关联。当数字 `primary
    key` 需要跨多个表设定范围或需要自定义时，序列提供了独特的优势。关于序列的详细讨论超出了本书的范围。'
- fmt: '### Natural Key


    In some cases, using a natural key in the data for the clustering key is as valid
    as adding an identity column to the table to use for the Identity Sequence pattern.
    A natural key is a column within the dataset that can uniquely identify one row
    from all the other rows. The cases where using a natural key is valid can be identified
    when there is a natural key in the data that meets the attributes of a well-defined
    clustering key. When using natural keys for clustering keys, they are less likely
    to be ever-increasing, but they should still be unique, narrow, and static.


    A common example of when a natural key may be used instead of an identity column
    is when looking at tables that contain one- or two-character abbreviations for
    the information they represent. These abbreviations may be for the status of an
    order, the size of a product, or a list of states or provinces. Compared with
    using an `int`, which is 4 bytes, in the Identity Column pattern, using a `char(1)`
    or `char(2)` data type with the Natural Key pattern will result in a clustering
    key that is narrower than the former. Another example is using dates in the `yyyymmdd`
    or timestamp format on date tables. Similarly, a dataset may already include an
    identifying column, such as an invoice ID, purchase order number, or account number.
    Columns such as these that are unique and already generated by an application
    can be used effectively as clustered index columns, assuming they are unique,
    narrow, static, and (maybe) ever-increasing.


    The Natural Key pattern also has the added benefit of providing an easier-to-decipher
    key value. When using the Identity Sequence pattern, there is no inherent meaning
    when the clustering key has a value of `1` or `7`. These values are (intentionally)
    meaningless. With the Natural Key pattern, for example, the abbreviations of `O`
    and `C` represent real information (Opened and Closed, respectively).


    As a simple example of the Natural Key pattern, consider a table that contains
    states and their abbreviations. Also included is the name of the country for the
    states. Listing 13-5 shows the SQL to create and populate the table. The table
    has a `StateAbbreviation` column, which is a `char(2)`. Since this is a narrow,
    unique, and static value for each state, the clustered index is created on the
    column. Next, a few rows are added to the table for the four states that the fictitious
    database requires.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesNatural

    (

    StateAbbreviation char(2)

    ,StateName varchar(25)

    ,Country varchar(25)

    ,CONSTRAINT PK_State_StateAbbreviation PRIMARY KEY CLUSTERED (StateAbbreviation)

    );

    INSERT INTO dbo.IndexStrategiesNatural(StateAbbreviation, StateName, Country)

    VALUES(''MN'',''Minnesota'',''United States'')

    ,(''FL'',''Florida'',''United States'')

    ,(''WI'',''Wisconsin'',''United States'')

    ,(''NH'',''New Hampshire'',''United States'');

    SELECT StateAbbreviation, StateName, Country

    FROM dbo.IndexStrategiesNatural;

    ```


    Listing 13-5

    Creating and Populating a Table for the Natural Key Pattern


    In situations where the natural key matches the Natural Key pattern, the technique
    in Listing 13-5 can be a useful way of selecting the clustering key column. Reviewing
    the contents of `dbo.IndexStrategiesNatural` (shown in Figure 13-5), the four
    rows are in the table, and using `StateAbbreviation` in another table as a foreign
    key value can be useful since the value `MN` has some inherent meaning.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig5_HTML.jpg)


    A table has 3 columns labeled state abbreviation, state name, and country and
    4 rows labeled 1 to 4. The first, second, and third columns have the respective
    entries of FL, MN, NH, and WI, Florida, Minnesota, New Hampshire, and Wisconsin,
    and United States.


    Figure 13-5

    Results for the Natural Key pattern


    This pattern may seem ideal and more worthwhile than the Identity Column pattern—especially
    since the value of the clustering key helps describe the data. However, there
    are a few downsides to using this pattern, which relate to the attributes that
    can make it a well-defined clustering key.


    First, consider the uniqueness of the clustering key. Provided that the use cases
    for the database and table never change, there can be trust that the values will
    remain unique. What happens, though, when the database needs to be used in an
    international context? If states in other countries such as the Netherlands need
    to be included, there is a great potential for data issues. In the Netherlands,
    `FL` is the abbreviation for Flevopolder, and `NH` is the abbreviation for Noord-Holland.
    Sending an order to Florida that should go to Flevopolder can have serious business
    consequences. To retain the uniqueness, something outside of the two-character
    abbreviation would need to be added to the natural key and clustering key.


    Changing the natural key would then affect the narrowness of the clustering key.
    There are two approaches that could be taken to address this problem. The first
    option is to add another column to the natural key, such as the country or some
    other location identifier. The second option is to increase the size of the state
    abbreviation to include a country abbreviation in the same column. With either
    of the solutions, the size of the clustering key will exceed the 4 bytes used
    to maintain a narrow clustering key through the use of an `int` data type and
    the Identity Column pattern.


    Additionally, always consider whether natural keys are truly static. State abbreviations
    can change. While this doesn’t happen often, it has historically occurred. The
    last change in the United States happened in 1987 when state abbreviations were
    all standardized. Similar changes will happen occasionally with nearly all types
    of natural keys. One example is the country of Yugoslavia with its six republics,
    each of which became its own country. Another is the Soviet Union, which evolved
    into the Russian Federation, resulting in the formation of numerous other countries.
    As static as values such as state and country abbreviations may seem, on a grander
    scale there is variance. Also, looking to applications, status codes that represent
    the states of a workflow may be accurate today but could have new and different
    meanings in the future.


    Lastly, sometimes apparent natural keys can be made of data that shouldn’t be
    widely distributed. For years, government identifiers, like Social Security Number,
    were often used for natural keys in databases, especially in healthcare and educational
    systems. While this did an adequate job of identifying an individual, it definitely
    isn’t information that should be easily available to database users. In most modern
    databases, government identifiers now need to be encrypted, which can cause immense
    problems when these types of natural keys are used for clustered indexes and potentially
    as primary keys.


    The Natural Key pattern for selecting what an index does is a valid pattern for
    designing clustered indexes. As the example showed, it can be unique, narrow,
    and static. Carefully examine the current and future applications of the table
    before using a natural key for the clustered index to ensure that it will not
    be impacted by future change.'
