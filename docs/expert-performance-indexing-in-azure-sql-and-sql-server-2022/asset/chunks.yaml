    一旦识别出有问题的等待状态，下一步就是审查该等待及建议的应对措施。由于本章重点介绍更偏向索引相关的等待类型，我们将只关注这些定义。要了解其他等待类型，请查阅
    `sys.dm_os_wait_stats`（Transact SQL）的联机文档主题。'
- fmt: "#### CXPACKET\n\nCXPACKET 等待类型发生在并行查询执行（也称为*并行处理*）出现等待时。并行查询可能遇到 CXPACKET\
    \ 等待的情况主要有两种。第一种是当并行查询中的某个操作符无法执行，因为其他线程已经在调度器上运行。第二种是当并行线程中的某个线程执行时间比其余线程长，而其他线程需要等待这个较慢的线程完成。第一种原因是并行等待中更常见的原因，但它超出了本书的范围，通常与配置设置和查询调优有关。而第二种原因则可以通过索引来解决。通常，解决了导致\
    \ CXPACKET 等待的第二个原因后，第一个并行等待的原因也能得到缓解。\n\n> **注意**\n> \n> 还有第二种并行等待名为 CXCONSUMER，用于标识与并行操作符等待线程向其发送行相关的等待。这通常不是一个可操作的等待，且不在本书的讨论范围内。\n\
    \n解决 CXPACKET 等待的两种常见方法是调整服务器属性 `max degree of parallelism`（最大并行度）和 `cost threshold\
    \ for parallelism`（并行的成本阈值）。与并行等待的第一个原因类似，通过这些服务器属性解决并行问题也超出了本书的范围。使用这两个属性有有效的方法，但这里的重点是索引，而不是限制并行的范围和成本。简单来说，`max\
    \ degree of parallelism` 限制了任何单个查询在并行处理期间可以使用的内核总数。而 `cost threshold for parallelism`\
    \ 则提高了 SQL Server 判定查询可以使用并行的阈值，但不限制并行的范围。\n\n本书讨论的范围是通过索引来缓解 CXPACKET 等待，并可结合查询调优。要解决并行运行的查询的索引问题，我们首先需要识别正在使用并行的查询。有多种方法可以识别参与并行操作的查询和索引。\n\
    \n第一种方法是检查以前执行中使用了并行的执行计划。通过这种方法，可以查询计划缓存以识别包含并行操作符的已创建执行计划。这提供了一个理想的查询列表，这些查询可以被调优以减少\
    \ I/O 消耗或消除对并行的需求。并行查询的需求有时可归因于基础表上的不当索引。例如，在利用扫描的表上执行的并行操作，可以通过一个支持查询中谓词或排序的索引来缓解。清单\
    \ [16-26](#338675_4_En_16_Chapter.xhtml#PC26) 中的查询提供了计划缓存中使用了并行的执行计划列表。\n\n```sql\n\
    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nWITH XMLNAMESPACES (\nDEFAULT\
    \ 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n)\nSELECT COALESCE(\n\
    DB_NAME([p].[dbid]),\n[p].[query_plan].[value]('(//RelOp/OutputList/ColumnReference/@Database)[1]',\
    \ 'nvarchar(128)')\n) AS [database_name],\nIIF([p].[objectid] <> 0,\nCONCAT(\n\
    QUOTENAME(DB_NAME([p].[dbid])),\n'.',\nQUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid],\
    \ [p].[dbid])),\n'.',\nQUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))\n),\n\
    NULL) AS [object_name],\n[cp].[objtype],\n[p].[query_plan],\n[cp].[usecounts]\
    \ AS [use_counts],\n[cp].[plan_handle],\nCAST('' AS XML) AS [sql_text]\nFROM [sys].[dm_exec_cached_plans]\
    \ AS [cp]\nCROSS APPLY [sys].[dm_exec_query_plan]([cp].[plan_handle]) AS [p]\n\
    CROSS APPLY [sys].[dm_exec_sql_text]([cp].[plan_handle]) AS [q]\nWHERE [cp].[cacheobjtype]\
    \ = 'Compiled Plan'\nAND [p].[query_plan].[exist]('//RelOp[@Parallel = \"1\"]')\
    \ = 1\nORDER BY COALESCE(\nDB_NAME([p].[dbid]),\n[p].[query_plan].[value]('(//RelOp/OutputList/ColumnReference/@Database)[1]',\
    \ 'nvarchar(128)')\n),\n[cp].[usecounts] DESC;\n```\n*清单 16-26 计划缓存中使用了并行的执行计划*\n\
    \n> **警告**\n> \n> 本章包含许多针对计划缓存和查询存储执行的查询。这些是通过动态管理对象（DMO）访问的，它们提供了对 SQL Server\
    \ 中执行计划的访问，允许调查服务器上当前和最近的执行活动。虽然这些信息非常有用，但在生产系统上执行此代码时请务必小心。对这些视图执行过于昂贵的查询可能会影响\
    \ SQL Server 的性能。请务必在非生产环境中监控和测试此类查询，然后再在生产环境中使用。\n\n下一种方法与使用计划缓存类似，但使用的是查询存储。前提是该功能已在数据库上启用，`sys.query_store_plan`\
    \ 表中有一个列用于标识并行计划。将它与一些其他 DMO 结合使用，可以提供包含并行操作符的 T-SQL 语句列表。清单 [16-27](#338675_4_En_16_Chapter.xhtml#PC27)\
    \ 提供了一个从查询存储返回并行查询的查询，其中包含该 T-SQL 语句的执行次数。使用查询存储的一个优势是它将结果限制在单个数据库内。\n\n```sql\n\
    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nSELECT IIF([qsq].[object_id]\
    \ <> 0,\nCONCAT(\nQUOTENAME(DB_NAME()),\n'.',\nQUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),\n\
    '.',\nQUOTENAME(OBJECT_NAME([qsq].[object_id]))\n),\nNULL) AS [object_name],\n\
    CAST([qsp].[query_plan] AS XML) AS [query_plan],\n[deqs].[execution_count],\n\
    CAST('' AS XML) AS [sql_text],\n[qsp].[engine_version],\n[qsp].[compatibility_level],\n\
    [qsq].[query_parameterization_type_desc],\n[qsp].[is_forced_plan],\n[deqs].[total_worker_time]\n\
    FROM [sys].[query_store_plan] AS [qsp]\nINNER JOIN [sys].[query_store_query] AS\
    \ [qsq] ON [qsp].[query_id] = [qsq].[query_id]\nINNER JOIN [sys].[query_store_query_text]\
    \ AS [qsqt] ON [qsq].[query_text_id] = [qsqt].[query_text_id]\nINNER JOIN sys.[dm_exec_query_stats]\
    \ AS deqs ON [last_compile_batch_sql_handle] = [deqs].[sql_handle]\nWHERE [qsp].[is_parallel_plan]\
    \ = 1\nORDER BY [deqs].[execution_count] DESC,\n[deqs].[total_worker_time] DESC;\n\
    ```\n*清单 16-27 查询存储中使用了并行的执行计划*\n\n研究并行等待的另一种方法是调查当前正在执行的计划。此信息可在 DMO `sys.dm_os_tasks`\
    \ 中获得，该视图返回当前正在使用多个工作线程的等待；清单 [16-28](#338675_4_En_16_Chapter.xhtml#PC28) 提供了一个用于检索此信息的示例查询。此查询提供了一个当前正在执行的并行计划列表。"
  raw: '#### CXPACKET


    The CXPACKET wait type occurs when there are waits due to parallel query execution,
    otherwise known as *parallelism*. There are two main scenarios where parallel
    queries can experience CXPACKET waits. The first is when an operator in a parallel
    query is unable to execute due to other threads already running on the scheduler.
    The second is when a thread from an operator in a parallel thread takes longer
    to execute than the rest of the threads and the rest need to wait for the slower
    thread to complete. The first cause is the more common cause for parallel waits,
    but it is outside the scope of this book and generally tied to configuration settings
    and query tuning. The second cause, though, can be addressed through indexing.
    Often, by addressing the second reason for CXPACKET waits, the first cause of
    parallel waits can be mitigated as well.


    Note


    There is a second parallelism wait named CXCONSUMER that identifies waits associated
    with parallel operators waiting for threads to send rows to the operator. This
    is generally not an actionable wait and is outside the context of this book.


    Two approaches that are common for addressing CXPACKET waits are to adjust the
    max degree of parallelism and cost threshold for parallelism server properties.
    As with the first cause of parallelism waits, addressing parallelism with these
    server properties is outside the context of the book. There are valid approaches
    for utilizing these two properties, but the focus here is on indexing rather than
    constraining the degree and cost of parallelism. For a simple explanation, the
    max degree of parallelism limits the total number of cores that any single query
    can use during parallel processing. Alternatively, the cost threshold for parallelism
    increases the threshold in which SQL Server determines that a query can use parallelism,
    without limiting the scope of parallelism.


    What is within the context here is mitigating CXPACKET waits through indexing,
    which can be paired with query tuning. To address the indexing for queries running
    in parallel, we need to first identify the queries that are using parallelism.
    There are a number of ways that queries and indexes participating in parallel
    operations can be identified.


    The first method is to examine execution plans that have used parallelism in previous
    executions. For this approach, the plan cache can be queried to identify the execution
    plans that were created that contain parallel operators. This provides an ideal
    list of queries that may be tuned to reduce the I/O consumed or remove the need
    for parallelism. The need for the parallel query can sometimes be attributed to
    improper indexing on the underlying tables. For example, a parallel operation
    on a table that leverages a scan may be alleviated with an index that supports
    the predicates or sorts within the query. The query in Listing [16-26](#338675_4_En_16_Chapter.xhtml#PC26)
    provides a list of execution plans in the plan cache that utilize parallelism.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ) AS [database_name],

    IIF([p].[objectid]  0,

    CONCAT(

    QUOTENAME(DB_NAME([p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))

    ),

    NULL) AS [object_name],

    [cp].[objtype],

    [p].[query_plan],

    [cp].[usecounts] AS [use_counts],

    [cp].[plan_handle],

    CAST('''' AS XML) AS [sql_text]

    FROM [sys].[dm_exec_cached_plans] AS [cp]

    CROSS APPLY [sys].[dm_exec_query_plan]([cp].[plan_handle]) AS [p]

    CROSS APPLY [sys].[dm_exec_sql_text]([cp].[plan_handle]) AS [q]

    WHERE [cp].[cacheobjtype] = ''Compiled Plan''

    AND [p].[query_plan].[exist](''//RelOp[@Parallel = "1"]'') = 1

    ORDER BY COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].[value](''(//RelOp/OutputList/ColumnReference/@Database)[1]'',
    ''nvarchar(128)'')

    ),

    [cp].[usecounts] DESC;

    Listing 16-26

    Execution Plans in the Plan Cache That Utilize Parallelism

    ```


    Warning


    This chapter features a number of queries that are executed against the plan cache
    and Query Store. These are accessed through DMOs that provide access to the execution
    plans in SQL Server, which allows for investigations into current and recent execution
    activity on the server. While this information is extremely useful, take care
    when executing this code on production systems. An overly expensive query against
    these views can impact the performance of your SQL Server. Be sure to monitor
    these types of queries and test them in nonproduction environments before using
    them in a production environment.


    The next method is similar to using the plan cache, but instead uses the Query
    Store. Provided this is running on the database, there is a column in sys.query_store_plan
    that identifies parallel plans. Using this with a few other DMOs provides a list
    of T-SQL statements that have parallel operators. A query that returns parallel
    queries from the Query Store is provided in Listing [16-27](#338675_4_En_16_Chapter.xhtml#PC27),
    which includes a count of the number of executions for the T-SQL statement. One
    advantage to using the Query Store is that it limits the results down to a single
    database.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SELECT IIF([qsq].[object_id]  0,

    CONCAT(

    QUOTENAME(DB_NAME()),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),

    ''.'',

    QUOTENAME(OBJECT_NAME([qsq].[object_id]))

    ),

    NULL) AS [object_name],

    CAST([qsp].[query_plan] AS XML) AS [query_plan],

    [deqs].[execution_count],

    CAST('''' AS XML) AS [sql_text],

    [qsp].[engine_version],

    [qsp].[compatibility_level],

    [qsq].[query_parameterization_type_desc],

    [qsp].[is_forced_plan],

    [deqs].[total_worker_time]

    FROM [sys].[query_store_plan] AS [qsp]

    INNER JOIN [sys].[query_store_query] AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]

    INNER JOIN [sys].[query_store_query_text] AS [qsqt] ON [qsq].[query_text_id] =
    [qsqt].[query_text_id]

    INNER JOIN sys.[dm_exec_query_stats] AS deqs ON [last_compile_batch_sql_handle]
    = [deqs].[sql_handle]

    WHERE [qsp].[is_parallel_plan] = 1

    ORDER BY [deqs].[execution_count] DESC,

    [deqs].[total_worker_time] DESC;

    Listing 16-27

    Execution Plans in the Query Store That Utilize Parallelism

    ```


    Another way to research parallelism waits is to investigate plans that are currently
    executing. This information is available in the DMO sys.dm_os_tasks which returns
    waits that are currently using multiple workers; a sample query to retrieve this
    information is provided in Listing [16-28](#338675_4_En_16_Chapter.xhtml#PC28).
    This query provides a list of currently executing parallel plans.'
  trans: '#### CXPACKET


    CXPACKET 等待类型发生在并行查询执行（也称为*并行处理*）出现等待时。并行查询可能遇到 CXPACKET 等待的情况主要有两种。第一种是当并行查询中的某个操作符无法执行，因为其他线程已经在调度器上运行。第二种是当并行线程中的某个线程执行时间比其余线程长，而其他线程需要等待这个较慢的线程完成。第一种原因是并行等待中更常见的原因，但它超出了本书的范围，通常与配置设置和查询调优有关。而第二种原因则可以通过索引来解决。通常，解决了导致
    CXPACKET 等待的第二个原因后，第一个并行等待的原因也能得到缓解。


    > **注意**

    >

    > 还有第二种并行等待名为 CXCONSUMER，用于标识与并行操作符等待线程向其发送行相关的等待。这通常不是一个可操作的等待，且不在本书的讨论范围内。


    解决 CXPACKET 等待的两种常见方法是调整服务器属性 `max degree of parallelism`（最大并行度）和 `cost threshold
    for parallelism`（并行的成本阈值）。与并行等待的第一个原因类似，通过这些服务器属性解决并行问题也超出了本书的范围。使用这两个属性有有效的方法，但这里的重点是索引，而不是限制并行的范围和成本。简单来说，`max
    degree of parallelism` 限制了任何单个查询在并行处理期间可以使用的内核总数。而 `cost threshold for parallelism`
    则提高了 SQL Server 判定查询可以使用并行的阈值，但不限制并行的范围。


    本书讨论的范围是通过索引来缓解 CXPACKET 等待，并可结合查询调优。要解决并行运行的查询的索引问题，我们首先需要识别正在使用并行的查询。有多种方法可以识别参与并行操作的查询和索引。


    第一种方法是检查以前执行中使用了并行的执行计划。通过这种方法，可以查询计划缓存以识别包含并行操作符的已创建执行计划。这提供了一个理想的查询列表，这些查询可以被调优以减少
    I/O 消耗或消除对并行的需求。并行查询的需求有时可归因于基础表上的不当索引。例如，在利用扫描的表上执行的并行操作，可以通过一个支持查询中谓词或排序的索引来缓解。清单
    16-26 中的查询提供了计划缓存中使用了并行的执行计划列表。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].value[1]'', ''nvarchar(128)'')

    ) AS [database_name],

    IIF([p].[objectid] <> 0,

    CONCAT(

    QUOTENAME(DB_NAME([p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([p].[objectid], [p].[dbid])),

    ''.'',

    QUOTENAME(OBJECT_NAME([p].[objectid], [p].[dbid]))

    ),

    NULL) AS [object_name],

    [cp].[objtype],

    [p].[query_plan],

    [cp].[usecounts] AS [use_counts],

    [cp].[plan_handle],

    CAST('''' AS XML) AS [sql_text]

    FROM [sys].[dm_exec_cached_plans] AS [cp]

    CROSS APPLY [sys].dm_exec_query_plan AS [p]

    CROSS APPLY [sys].dm_exec_sql_text AS [q]

    WHERE [cp].[cacheobjtype] = ''Compiled Plan''

    AND [p].[query_plan].exist = 1

    ORDER BY COALESCE(

    DB_NAME([p].[dbid]),

    [p].[query_plan].value[1]'', ''nvarchar(128)'')

    ),

    [cp].[usecounts] DESC;

    ```

    *清单 16-26 计划缓存中使用了并行的执行计划*


    > **警告**

    >

    > 本章包含许多针对计划缓存和查询存储执行的查询。这些是通过动态管理对象（DMO）访问的，它们提供了对 SQL Server 中执行计划的访问，允许调查服务器上当前和最近的执行活动。虽然这些信息非常有用，但在生产系统上执行此代码时请务必小心。对这些视图执行过于昂贵的查询可能会影响
    SQL Server 的性能。请务必在非生产环境中监控和测试此类查询，然后再在生产环境中使用。


    下一种方法与使用计划缓存类似，但使用的是查询存储。前提是该功能已在数据库上启用，`sys.query_store_plan` 表中有一个列用于标识并行计划。将它与一些其他
    DMO 结合使用，可以提供包含并行操作符的 T-SQL 语句列表。清单 16-27 提供了一个从查询存储返回并行查询的查询，其中包含该 T-SQL 语句的执行次数。使用查询存储的一个优势是它将结果限制在单个数据库内。


    ```sql

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    SELECT IIF([qsq].[object_id] <> 0,

    CONCAT(

    QUOTENAME(DB_NAME()),

    ''.'',

    QUOTENAME(OBJECT_SCHEMA_NAME([qsq].[object_id])),

    ''.'',

    QUOTENAME(OBJECT_NAME([qsq].[object_id]))

    ),

    NULL) AS [object_name],

    CAST([qsp].[query_plan] AS XML) AS [query_plan],

    [deqs].[execution_count],

    CAST('''' AS XML) AS [sql_text],

    [qsp].[engine_version],

    [qsp].[compatibility_level],

    [qsq].[query_parameterization_type_desc],

    [qsp].[is_forced_plan],

    [deqs].[total_worker_time]

    FROM [sys].[query_store_plan] AS [qsp]

    INNER JOIN [sys].[query_store_query] AS [qsq] ON [qsp].[query_id] = [qsq].[query_id]

    INNER JOIN [sys].[query_store_query_text] AS [qsqt] ON [qsq].[query_text_id] =
    [qsqt].[query_text_id]

    INNER JOIN sys.[dm_exec_query_stats] AS deqs ON [last_compile_batch_sql_handle]
    = [deqs].[sql_handle]

    WHERE [qsp].[is_parallel_plan] = 1

    ORDER BY [deqs].[execution_count] DESC,

    [deqs].[total_worker_time] DESC;

    ```

    *清单 16-27 查询存储中使用了并行的执行计划*


    研究并行等待的另一种方法是调查当前正在执行的计划。此信息可在 DMO `sys.dm_os_tasks` 中获得，该视图返回当前正在使用多个工作线程的等待；清单
    16-28 提供了一个用于检索此信息的示例查询。此查询提供了一个当前正在执行的并行计划列表。'
