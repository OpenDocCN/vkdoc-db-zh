  trans: '

    非聚集列存储索引在创建时需要考虑更多因素，因此在构建它们时需要遵循若干准则。首先，非聚集列存储索引中列的顺序并不重要。每一列都与其他列分开存储，且彼此之间不存在关系。其次需要记住的是，表中所有将被列存储索引利用的列都必须出现在该列存储索引中。如果查询中的某个列未出现在非聚集列存储索引中，则该索引在其执行过程中将无法被使用。


    如果使用 SQL Server 2017 之前的版本，则必须牢记非聚集列存储索引是*只读*的，任何构建了非聚集列存储索引的表或分区都将被置于只读状态。若要修改表，则需要禁用或删除该非聚集列存储索引，待更新完成后再重建或重新创建。此限制不影响聚集列存储索引，并且从
    SQL Server 2017 开始，非聚集列存储索引的此项限制已被取消。


    非聚集列存储索引非常适用于本质上以事务为主，但同时也需要支持关键分析查询的表。额外的好处是，可以为非聚集列存储索引指定列列表，从而使索引能够专门针对用于重要分析查询的列。


    影响两种类型列存储索引的一个限制是创建索引所需的时间长度。在许多情况下，创建列存储索引所需的时间可能是构建聚集或非聚集索引的四到五倍。因此，索引创建应安排在资源充足的时间进行。有关列存储索引的更多信息，请参阅第
    2 章。


    在展示列存储索引的价值之前，值得先回顾一个使用传统索引针对数据仓库的查询演示。在清单 13-30 中，该查询按 `CalendarQuarter` 和 `ProductCategoryName`
    汇总 `SalesQuantity` 值。执行该查询并不需要大量时间；图 13-46 显示耗时为 4,293 毫秒（即 4.2 秒），在 `dbo.FactSales`
    上进行了不到 20,000 次读取。对于当前的记录量来说，结果是合理的，但设想一下如果表中的行数增加 10 倍或 100 倍会怎样。在什么情况下，4.2 秒的执行时间会增长到超出可接受的执行时间范围？


    ![](img/338675_4_En_13_Fig46_HTML.png)


    一个面板，其消息选项卡已打开，显示 8 行对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读读取、LOB 逻辑读取和 LOB 物理读取值，标签为“受影响的
    96 行”。此外，在 SQL Server 执行信息下还显示了 CPU 时间 3606 毫秒和总耗时 4293 毫秒。


    图 13-46

    针对事实表上聚集索引的统计 I/O 结果


    注意

    由于执行计划的尺寸较大，它们未包含在列存储索引示例中。并且由于本节依赖 CPU 时间来演示性能，因此会多次运行查询以确保磁盘到内存的性能不是影响因素。


    ```

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    ,COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 13-30: 使用传统索引的分析查询


    为了测试在 `dbo.FactSales` 上使用非聚集列存储索引的性能，将向该表添加一个新索引。`dbo.FactSales` 中的所有列都被添加到该列存储索引中，如清单
    13-31 所示。索引就位后，查询性能发生了显著变化。从时间角度看，查询在 286 毫秒内完成，如图 13-47 所示，相比没有非聚集列存储索引的情况，性能提升了超过
    15 倍。此外，I/O 次数从近 20,000 次下降到 2,608 次。


    ![](img/338675_4_En_13_Fig47_HTML.png)


    一个面板，其消息选项卡已打开，显示 8 行对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读读取、LOB 逻辑读取和 LOB 物理读取值，标签为“受影响的
    96 行”。此外，在 SQL Server 执行信息下还显示了 CPU 时间 168 毫秒和总耗时 286 毫秒。


    图 13-47

    针对非聚集列存储索引的统计 I/O 结果


    ```

    USE ContosoRetailDW

    GO

    CREATE NONCLUSTERED COLUMNSTORE INDEX IX_FactSales_CStore ON dbo.FactSales (

    SalesKey, DateKey, channelKey, StoreKey, ProductKey, PromotionKey, CurrencyKey,
    UnitCost, UnitPrice,

    SalesQuantity, ReturnQuantity, ReturnAmount, DiscountQuantity, DiscountAmount,
    TotalCost, SalesAmount,

    ETLLoadID, LoadDate, UpdateDate);

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SELECT dd.CalendarQuarter

    ,dpc.ProductCategoryName

    , COUNT(*) As TotalRows

    ,SUM(SalesQuantity) AS TotalSales

    FROM dbo.FactSales fs

    INNER JOIN dbo.DimDate dd ON fs.DateKey = dd.Datekey

    INNER JOIN dbo.DimProduct dp ON fs.ProductKey = dp.ProductKey

    INNER JOIN dbo.DimProductSubcategory dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey

    INNER JOIN dbo.DimProductCategory dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey

    GROUP BY dd.CalendarQuarter

    ,dpc.ProductCategoryName;

    ```

    清单 13-31: 添加非聚集列存储索引


    在测试、分析和优化工作负载时，考虑哪些列属于非聚集列存储索引至关重要。非分析查询目标的列可以省略。这可以节省存储空间，减少执行索引维护的时间，并在插入、更新或删除数据时减少需要更新的段和行组数量，从而缩短写入时间。


    接下来，考虑在 `dbo.FactSales` 上使用聚集列存储索引的影响。由于该表上已存在聚集索引，因此将使用清单 13-32 中的脚本创建一个名为 `dbo.FactSales_CCI`
    的新表，用 `dbo.FactSales` 中的相同数据填充它，并向其添加聚集列存储索引。


    使用与前面示例相同的聚合查询，聚集列存储索引的性能价值显而易见。考虑到执行时间（如图 13-48 所示），它进一步下降到 164 毫秒，这比使用聚集索引的事实表快了超过
    26 倍。I/O 也相应减少，执行仅消耗了 1,309 次 I/O。虽然其 I/O 占用与非聚集列存储索引相似，但请记住，聚集列存储索引仅存储一次，并且其中的值可以被修改。

    '
