    ## 图 16-18

    用于识别缺失外键索引的查询输出


    结果选项卡下呈现一个表格页面。列标题依次为：无列名、对象名称、外键名称、外键列和行数。“无列名”下的 `adventure works 2017` 被选中。


    ## 未压缩的索引


    正如本章前文及本书其他部分所讨论的，通常对索引应用某种程度的压缩是有益的。使用行压缩时，索引通常将定长数据存储为变长数据；而页面压缩则会检查数据并减少重复以进行进一步压缩。在许多情况下，通过压缩可以将数据库大小减少到当前大小的
    25%–75%。这种缩减提高了 SQL Server 通过 CPU 可处理的数据量。通常，压缩数据所带来的额外 CPU 成本，远低于处理未压缩数据量所节省的
    CPU 开销。


    在检查数据库中是否存在未压缩的索引时，清单 16-39 中的查询会为每个数据库提供一份列表，包含每个索引的文件组、分区边界、行数和大小。这些信息特别有用，因为它有助于识别最大的索引，而在这些索引上应用压缩可能带来最显著的收益。请审阅该列表并确定哪些索引值得考虑进行压缩，同时请牢记是否存在诸如
    `varchar(max)` 之类的数据类型，它们压缩效果不佳，并可能导致压缩失败，正如本章前面所讨论的。


    ## 清单 16-39

    用于识别未压缩索引的查询


    ```sql

    WITH partitioning

    AS (SELECT dds.data_space_id,

    dds.partition_scheme_id,

    ds.name,

    dds.destination_id AS partition_number,

    CASE

    WHEN prv.value IS NOT NULL THEN

    CONCAT(

    IIF(pf.boundary_value_on_right = 1, ''小于 '', ''大于或等于 ''),

    CAST(prv.value AS VARCHAR(MAX))

    )

    WHEN pf.boundary_value_on_right = 1 THEN ''大于 MAX 边界''

    ELSE ''小于 MIN 边界'' END AS Boundary

    FROM sys.destination_data_spaces AS dds

    INNER JOIN sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id

    INNER JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id

    INNER JOIN sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id

    LEFT OUTER JOIN sys.partition_range_values AS prv ON pf.function_id = prv.function_id

    AND prv.boundary_id = dds.destination_id)

    SELECT S.name AS schema_name,

    T.name AS table_name,

    I.name AS index_name,

    I.index_id,

    P.partition_number,

    P.data_compression_desc,

    I.type_desc,

    IIF(DS.type_desc = ''PARTITION_SCHEME'', PS.name, DS.name) AS file_group,

    PS.Boundary AS partition_boundary,

    DS.type_desc AS data_space_type,

    P.rows,

    CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024. AS DECIMAL(20, 3)) AS
    mb_size

    FROM sys.tables AS T

    INNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id

    INNER JOIN sys.indexes AS I ON T.object_id = I.object_id

    INNER JOIN sys.partitions AS P ON I.object_id = P.object_id

    AND I.index_id = P.index_id

    INNER JOIN sys.dm_db_partition_stats AS dps ON P.object_id = dps.object_id

    AND P.index_id = dps.index_id

    AND P.partition_number = dps.partition_number

    LEFT OUTER JOIN partitioning AS PS ON I.data_space_id = PS.partition_scheme_id

    AND P.partition_number = PS.partition_number

    INNER JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id

    WHERE P.data_compression_desc = ''NONE'';

    GO

    ```


    ## 注意


    数据库引擎优化顾问（DTA）是一个用于确定可添加到数据库的有用索引的好工具。虽然手动为数据库设计索引可能更有成就感，但忽略有用的建议并不可取。应将 DTA
    作为一个起点，用以发现那些若没有该工具可能需要花费数小时才能确定的索引建议。'
- fmt: "## Database Engine Tuning Advisor\n\nThe Database Engine Tuning Advisor (`DTA`)\
    \ was discussed in Chapter [9](#338675_4_En_9_Chapter.xhtml). In that chapter,\
    \ the two modes for using the `DTA` were discussed: the GUI interface and the\
    \ command-line utility. While tuning queries is often a process of reviewing statistics\
    \ and evaluating execution plans, the `DTA` provides a means to accelerate this\
    \ analysis by using the trace files from the monitoring process in the previous\
    \ chapter to identify potentially useful indexing recommendations. This process\
    \ can accomplish the tuning with minimal impact on the production environment\
    \ since all recommendations are derived from analysis on a nonproduction environment.\n\
    \nThe basic process for using the `DTA` index analysis can be broken out into\
    \ five different steps, shown in Figure [16-19](#338675_4_En_16_Chapter.xhtml#Fig19):\n\
    \n1. Collect a workload.\n2. Gather the metadata.\n3. Perform the tuning.\n4.\
    \ Consider recommendations and review.\n5. Deploy changes.\n\nThrough this process,\
    \ we can get a jump start on indexing and begin working with recommendations that\
    \ relate to existing performance issues.\n\n![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig19_HTML.png)\n\
    \nA process flow defines the workload, metadata, and tuning from the production\
    \ are sent to the non-production via the database. Recommendations and deployment\
    \ are sent from the database to production.\nFigure 16-19\nSteps for using the\
    \ `DTA` index analysis\n\nThe first step in the process is to collect a workload.\
    \ If we followed the process in the index monitoring process from the previous\
    \ chapter, this information should already have been collected. There are two\
    \ standard scenarios that workloads should represent. To begin, collect a workload\
    \ that represents a typical day, because even a normal day can have underlying\
    \ performance issues that tuning can help alleviate. Second, gather a workload\
    \ during times where performance problems are known to exist. This will be useful\
    \ for providing recommendations that may be able to be achieved through manual\
    \ tuning.\n\nAfter the workload is collected, the next step is to gather the necessary\
    \ metadata to start the tuning sessions. There are two components to gathering\
    \ metadata. The first is to create an XML input file for the `DTA` session. The\
    \ XML input file contains the production and nonproduction server names and information\
    \ on where the workload is and what type of tuning options to utilize (Listing\
    \ [16-40](#338675_4_En_16_Chapter.xhtml#PC40) shows a sample). For more information\
    \ on tuning options, see Chapter [9](#338675_4_En_9_Chapter.xhtml). The second\
    \ part of this step is the effect on tuning from the first piece. When the tuning\
    \ occurs, SQL Server will gather the schema and statistics for the database from\
    \ the production database(s) and move that information to the nonproduction server.\
    \ While the database won’t have the production data, it will have the information\
    \ necessary to make indexing recommendations.\n\n```\nSTR8-SQL-PRD\nAdventureWorks2017\n\
    c:\\temp\\IndexingMethod.trc\nSTR8-SQL-TEST \nIDX\nNONE\nNONE\n```\nListing 16-40\n\
    Sample XML Input File for `DTA`\n\nNote: We can find more information on the XML\
    \ input file configuration in Books Online at [`https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta%253Fview%253Dsql-server-ver16).\n\
    \nThe next step is the actual execution of the `DTA` tuning session. To run the\
    \ session, execute the `DTA` command using the `-ix` command-line option, shown\
    \ in Listing [16-41](#338675_4_En_16_Chapter.xhtml#PC41). Since all the configuration\
    \ information for the session is located in the XML file, there is no need to\
    \ add any additional parameters.\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\
    \n```\nListing 16-41\n`DTA` Command with XML Input File\n\nAfter the tuning session\
    \ completes, a list of index recommendations will be received. This is not the\
    \ last step in this portion of the process. Before any recommendations from the\
    \ `DTA` can be implemented, they must be reviewed. While using this tool will\
    \ accelerate the index analysis process, all recommendations need to be reviewed\
    \ and vetted to verify that they make sense and do not overload a table with more\
    \ indexes than SQL Server can support for the workload.\n\nThe last step is to\
    \ deploy the indexing recommendations. This step is technically outside the scope\
    \ of this phase of the Indexing Method. At this time, though, we should be familiar\
    \ with the indexing changes that will be implemented. Add these changes to the\
    \ existing list of indexing changes from other analysis, and prepare them for\
    \ implementation, which is discussed in the next chapter."
  raw: "## Database Engine Tuning Advisor\n\nThe Database Engine Tuning Advisor (DTA)\
