  trans: '

    ## 页面分裂


    处理页面上行数据大小超出页面容量的第二种方法是执行页面分裂。页面分裂适用于任何基于 B 树索引结构实现的索引，这包括聚集索引和非聚集索引。在进行页面分裂时，如果某一行被更新到其大小不再适合当前所在的数据页面，`SQL
    Server` 会将该页面上的一半行数据移至一个新页面。然后，`SQL Server` 会尝试再次将该行的数据写入页面。如果此时数据能放入页面，则该页面将被写入。如果不能，该过程将重复进行，直到数据能放入页面为止。


    为了说明页面分裂如何运作，我们将探讨一个导致页面分裂的更新操作。与上一节类似，考虑一个页面编号为 100 的表（见图 4-4）。页面 100 上存储了四行数据，每行大约
    2 KB 大小。假设其中一行（例如第二行）被更新，大小增至 2.5 KB。该页面的数据总量将达到 8.5 KB，超过了可用空间，从而引发页面分裂。为了分裂页面，系统会分配一个编号为
    101 的新页面，并将原页面上的一半行（第三行和第四行）写入新页面。此时，由于页面上有 4 KB 的可用空间，第二行数据就可以写入原页面了。


    ![](img/338675_4_En_4_Fig4_HTML.png)


    该图展示了如何将数据页 100 中第二行的数据更新到另一个数据页 100 中的第二行。第二行的值被加载到数据页 101 的第三行和第四行中。


    图 4-4：页面分裂过程示意图


    以下是一个关于页面分裂如何在表中发生的示例，我们将逐步演示一个强制表上发生页面分裂的场景。首先，将创建表 `dbo.ClusteredPageSplits`，如代码清单
    4-3 所示。将向此表插入 24 行数据，每行长度约为 2 KB。这将导致每页存放四行，为该表分配六个数据页。考虑索引级别 0（即叶级）的信息。由于该表通过聚集索引使用
    B 树，因此还会有一个额外的页面用于索引树结构。在索引级别 1 上有六条记录，引用索引中的六个页面。此信息可从图 4-5 中确认。


    ![](img/338675_4_En_4_Fig5_HTML.png)


    该表有 5 列和 2 行。第 1 至 5 列的标题分别是：object i d、index type description、index level、page
    count 和 record count。表中有 2 条记录，第一行中的 object i d 676197459 被选中。


    图 4-5：页面分裂前 `dbo.ClusteredPageSplits` 的物理状态


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.ClusteredPageSplits

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    ,CONSTRAINT PK_ClusteredPageSplits PRIMARY KEY CLUSTERED (RowId)

    );

    INSERT INTO dbo.ClusteredPageSplits (FillerData)

    SELECT TOP 24 REPLICATE(''X'',2000)

    FROM sys.objects;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    代码清单 4-3：页面分裂场景


    通过更新某些记录使其大小超过页面容量，可以引发表上的页面分裂。这将通过执行一个 `UPDATE` 语句来实现，该语句使用代码清单 4-4 中的脚本，将每隔一行的
    `FillerData` 列长度从 2000 个字符增加到 2500 个字符。每页上结果行的大小将达到 9 KB，与之前的例子一样，这超过了可用的页面大小，从而导致
    `SQL Server` 使用页面分裂来释放页面上的空间。


    调查页面分裂发生后的结果（图 4-6）显示了页面分裂对表的影响。首先，在索引的叶级，页面数量从 6 个增加到了 12 个（索引级别 0）。如前所述，当发生页面分裂时，页面会被对半分裂，并添加一个新页面。由于表中的所有数据页都被更新，所有页面都进行了分裂，导致叶级页面数量翻倍。索引级别
    1 唯一的变化是增加了六个页面来引用索引中的新页面。


    ![](img/338675_4_En_4_Fig6_HTML.png)


    该表有 5 列和 2 行。列标题依次为：object i d, index type description, index level, page count,
    和 record count。第一行中的 object i d 676197459 被选中。


    图 4-6：页面分裂后的物理状态


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.ClusteredPageSplits

    SET FillerData = REPLICATE(''X'',2500)

    WHERE RowId % 2 = 0;

    DECLARE @ObjectID INT = OBJECT_ID(''dbo.ClusteredPageSplits'');

    SELECT object_id, index_type_desc, index_level, page_count, record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), @ObjectID, NULL, NULL, ''DETAILED'');

    ```

    代码清单 4-4：引发页面分裂的脚本


    页面分裂和转寄记录之间有两个值得关注的区别。首先，当页面分裂发生时，数据页上的记录数量并未增加。页面分裂只是移动了记录的位置，以便为逻辑索引顺序中的记录腾出空间。其次是页面分裂不会增加记录数。由于页面分裂已经为记录腾出了空间，因此不需要额外的记录来指向数据存储的位置。


    页面分裂可能导致与转寄记录类似的性能问题。这些性能问题既发生在页面分裂进行时，也发生在其之后。在页面分裂过程中，被分裂的页面在记录被分配到两个页面时需要被独占锁定。这会导致当页面分裂发生时，其他人需要访问除正在更新的行以外的行时产生争用。页面分裂后，索引中数据页的物理顺序通常不再符合其在索引中的逻辑顺序。这会阻碍
    `SQL Server` 执行连续读取的能力，从而减少单次操作可读取的数据量。此外，与使用较少页面获得相同结果相比，查询执行时需要读入内存的页面越多，查询性能就越慢。


    ## 总结


    本章详细地介绍、演示和描述了索引碎片。理解了碎片对索引存储和性能的影响后，第 11 章将探讨解决碎片的问题。在该章中，将提供更深入的方法来识别和解决索引碎片问题。

    '
- fmt: '# 5. Index Metadata and Statistics


    With an understanding of the logical and physical fundamentals of indexes, the
    metadata that describes how indexes function can be discussed. These statistics
    provide insight into how SQL Server manages and uses indexes. It also provides
    the information needed to determine why an index may or may not be selected and
    how it is behaving. This chapter will provide a deeper understanding about where
    and how this information is collected. Some additional `DBCC` commands and dynamic
    management objects (DMOs) that are provided by SQL Server will be presented, as
    well as how that information is generated and can be used.


    There are four domains of information that the statistics in this chapter will
    cover. The first domain is column-level statistics. This provides the query optimizer
    with information on the population of data within a column and, thus, an index.
    The next is index usage statistics. Information here provides insight into whether
    and how an index is being used. The third is operational statistics, which provides
    details about how an index has been used. The last domain of information is physical
    statistics, which provides insight into the physical characteristics of the index
    and how it is distributed within the database.


    Additionally, in this chapter, the metadata and statistics that are available
    for columnstore indexes will be reviewed, as well as the information that is collected.
    This information provides an understanding of what is being stored in columnstore
    indexes and how that might impact the performance of queries against those indexes.


    ## Column-Level Statistics


    Column-level statistics are one of the most important areas within SQL Server
    when it comes to indexes. These statistics provide information on how values are
    distributed across the key column(s) of an index. SQL Server uses this to determine
    the anticipated frequency and distribution of values within an index; this is
    referred to as `cardinality`.


    Through `cardinality`, the query optimizer develops a set of cost-based execution
    plans to find the best execution plan for executing the submitted request. If
    the statistics for an index are incorrect or no longer represent the data in the
    index, then the plan that is created will be less likely to be optimal. It is
    important to understand and be able to interact with statistics to be certain
    that indexes in an environment not only exist but also provide their expected
    benefits.


    Note


    Often, when indexes are rebuilt to “fix” performance issues, the fragmentation
    is usually not the cause of or direct solution to the issue. When rebuilt, indexes
    receive new statistics, and execution plans related to those indexes need to be
    recompiled, either of which is the likely cause of the performance issue vs. any
    index fragmentation.


    There are many ways to interact with statistics within SQL Server. Some of the
    most common mechanisms will be reviewed in the sections that follow. For each
    of these methods, there will be a discussion of what they are, what they provide,
    and the value in using each method.


    ### DBCC SHOW_STATISTICS


    The first and likely most familiar way to interact with statistics is through
    the `DBCC` command `SHOW_STATISTICS`. This command will return the statistics
    for the requested database object, either a table or an indexed view. The information
    returned is a statistics object that includes three different components: the
    header, the histogram, and the density vector. Each provides SQL Server with an
    understanding of the data available in the index.


    Returning the statistics object can be done with the `DBCC` syntax in Listing
    [5-1](#338675_4_En_5_Chapter.xhtml#PC1). This syntax accepts the name of the table
    or indexed view for the statistics, and then the target is returned. The target
    is either the name of the index or the column-level statistics that were created.


    ```sql

    DBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )

    [ WITH [  ]

    ```


    Listing 5-1 `DBCC SHOW_STATISTICS` Syntax


    There are four options that can be included with the `DBCC` command: `NO_INFOMSGS`,
    `STAT_HEADER`, `DENSITY_VECTOR`, and `HISTOGRAM`. Any or all of these options
    can be included in a comma-separated list.


    The option `NO_INFOMSGS` suppresses all informational messages when the `DBCC`
    command is executed. These are error messages generated with severity from 0 to
    10, with 10 being the highest severity. In most cases, since these error messages
    are informational, they are not of value when using this `DBCC` statement.


    The options `STAT_HEADER`, `DENSITY_VECTOR`, and `HISTOGRAM` limit the output
    from the `DBCC` command. If one or more of the options are included, then only
    the statistics components for the items included will be returned. If none of
    these is selected, then all components are included. There is the `STATS_STREAM`
    option that will not be discussed as it is deprecated and may not be included
    in future releases of SQL Server.


    With this `DBCC` command defined, its statistics components can be discussed in
    further detail. Each will be defined, and then an example of their contents from
    the AdventureWorks2017 database will be explored. Listing [5-2](#338675_4_En_5_Chapter.xhtml#PC2)
    provides the results needed for this review.


    ```sql

    USE AdventureWorks2017

    GO

    DBCC SHOW_STATISTICS ( ''Sales.SalesOrderDetail''

    , PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID )

    ```


    Listing 5-2 `DBCC SHOW_STATISTICS` for an Index on the `Sales.SalesOrderDetail`
    Table'
