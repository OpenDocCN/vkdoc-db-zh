    in this chapter, the DMV `sys.dm_os_performance_counters` `will be used`. This
    DMV returns a row for all SQL Server counters for an instance. The values returned
    are the raw values for the counters. Depending on the type of counter, the value
    can be a point in time state value or an ever-accumulating aggregate.


    To begin collecting performance counter information for monitoring, a table will
    need to be created for storing this information. The table definition in Listing
    [15-1](#338675_4_En_15_Chapter.xhtml#PC1) provides for this need. When collecting
    the performance counters, a table will be used that stores the counter name with
    the value and then date-stamps each row to identify when the information was collected.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCounters

    (

    counter_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    Calculated_Counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCounters

    PRIMARY KEY CLUSTERED (counter_id)

    );

    GO

    CREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName

    ON dbo.IndexingCounters (counter_name)

    INCLUDE (create_date, server_name, object_name, Calculated_Counter_value);

    Listing 15-1

    Performance Counter Snapshot Table

    ```


    For the purposes of collecting information for monitoring indexing, the information
    from `sys.dm_os_performance_counters` will be collected and used to calculate
    the appropriate values from the DMV. These would be the same values that are available
    when viewing performance counter information from other tools, such as Performance
    Monitor. There are a few steps required to populate `dbo.IndexingCounters`. The
    DMV contains raw counter values. To calculate these values properly, it is necessary
    to take multiple snapshots of the values in the DMV, separated by a number of
    seconds before calculating the difference in values. In Listing [15-2](#338675_4_En_15_Chapter.xhtml#PC2),
    the counter value is calculated after 10 seconds. Once the time has expired, the
    counters are calculated and inserted into the `dbo.IndexingCounters` tables. This
    script should be scheduled and executed frequently. Ideally, this information
    should be collected every 1–5 minutes, though frequency can be adjusted based
    on the level of index activity in a given environment. Feel free to customize
    the timing of this process to meet the indexing needs of a given database.


    Note


    Performance counter information can be collected more frequently. For instance,
    Performance Monitor defaults to every 15 seconds. For the purposes of index monitoring,
    that frequency is not necessary.


    ```

    USE IndexingMethod;

    GO

    DROP TABLE IF EXISTS #Counters;

    SELECT pc.object_name,

    pc.counter_name

    INTO #Counters

    FROM sys.dm_os_performance_counters pc

    WHERE pc.cntr_type IN ( 272696576, 1073874176 )

    AND (

    pc.object_name LIKE ''%:Access Methods%''

    AND (

    pc.counter_name LIKE ''Forwarded Records/sec%''

    OR pc.counter_name LIKE ''FreeSpace Scans/sec%''

    OR pc.counter_name LIKE ''FreeSpace Page Fetches/sec%''

    OR pc.counter_name LIKE ''Full Scans/sec%''

    OR pc.counter_name LIKE ''Index Searches/sec%''

    OR pc.counter_name LIKE ''Page Splits/sec%''

    OR pc.counter_name LIKE ''Page compression attempts/sec%''

    OR pc.counter_name LIKE ''Pages compressed/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Buffer Manager%''

    AND (

    pc.counter_name LIKE ''Page life expectancy%''

    OR pc.counter_name LIKE ''Page lookups/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Locks%''

    AND (

    pc.counter_name LIKE ''Lock Wait Time (ms)%''

    OR pc.counter_name LIKE ''Lock Waits/sec%''

    OR pc.counter_name LIKE ''Number of Deadlocks/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:SQL Statistics%''

    AND pc.counter_name LIKE ''Batch Requests/sec%''

    )

    GROUP BY pc.object_name,

    pc.counter_name;

    DROP TABLE IF EXISTS #Baseline;

    SELECT GETDATE() AS sample_time,

    pc1.object_name,

    pc1.counter_name,

    pc1.instance_name,

    pc1.cntr_value,

    pc1.cntr_type,

    x.cntr_value AS base_cntr_value

    INTO #Baseline

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) x;

    WAITFOR DELAY ''00:00:15'';

    INSERT INTO dbo.IndexingCounters (

    create_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    Calculated_Counter_value

    )

    SELECT GETDATE(),

    LEFT(pc1.object_name, CHARINDEX('':'', pc1.object_name) - 1),

    SUBSTRING(pc1.object_name, 1 + CHARINDEX('':'', pc1.object_name), LEN(pc1.object_name)),

    pc1.counter_name,

    pc1.instance_name,

    CASE

    WHEN pc1.cntr_type = 65792 THEN pc1.cntr_value

    WHEN pc1.cntr_type = 272696576 THEN

    COALESCE((1\. * pc1.cntr_value - x.cntr_value) / NULLIF(DATEDIFF(s, sample_time,
    GETDATE()), 0), 0)

    WHEN pc1.cntr_type = 537003264 THEN COALESCE((1\. * pc1.cntr_value) / NULLIF(base.cntr_value,
    0), 0)

    WHEN pc1.cntr_type = 1073874176 THEN

    COALESCE(

    (1\. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value - x.base_cntr_value,
    0)

    / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),


    ) END AS real_cntr_value

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value,

    base_cntr_value,

    sample_time

    FROM #Baseline b

    WHERE b.object_name   = pc1.object_name

    AND b.counter_name  = pc1.counter_name

    AND b.instance_name = pc1.instance_name

    ) x

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) base;

    Listing 15-2

    Performance Counter Snapshot Script

    ```


    The first time performance counters are collected for indexes, it will not be
    possible to compare the counters to other reasonable values for a SQL Server database
    instance. As time goes on, though, previous performance counter samples can be
    retained to make comparisons. As part of monitoring, it is important to identify
    periods in which values for the performance counters represent the typical activity
    for your environment. Using that data, it is possible to identify anomalies or
    periods when usage is atypical and requires attention.'
  trans: '

    收集性能计数器的方法有多种。本章的监控将使用动态管理视图 `sys.dm_os_performance_counters`。该视图会为实例的所有 SQL Server
    计数器返回一行。返回的值是计数器的原始值。根据计数器类型，该值可以是时间点的状态值，也可以是持续累积的聚合值。


    为了开始收集用于监控的性能计数器信息，需要创建一个表来存储这些信息。清单 15-1 中的表定义满足此需求。在收集性能计数器时，将使用一个表来存储计数器名称及其值，并为每一行添加日期戳以标识信息的收集时间。


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCounters

    (

    counter_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    Calculated_Counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCounters

    PRIMARY KEY CLUSTERED (counter_id)

    );

    GO

    CREATE NONCLUSTERED INDEX IX_IndexingCounters_CounterName

    ON dbo.IndexingCounters (counter_name)

    INCLUDE (create_date, server_name, object_name, Calculated_Counter_value);

    ```


    清单 15-1

    性能计数器快照表


    为了收集索引监控信息，将从 `sys.dm_os_performance_counters` 收集信息，并用于计算该动态管理视图中的适当值。这些值与从其他工具（如
    `性能监视器`）查看性能计数器信息时可用的值相同。需要几个步骤来填充 `dbo.IndexingCounters`。该动态管理视图包含原始计数器值。为了正确计算这些值，需要对动态管理视图中的值进行多次快照，每次快照间隔数秒，然后计算值之间的差异。在清单
    15-2 中，计数器值在 10 秒后计算。时间一到，计数器值即被计算并插入到 `dbo.IndexingCounters` 表中。此脚本应被计划并频繁执行。理想情况下，应每
    1-5 分钟收集一次此信息，不过频率可以根据特定环境中的索引活动级别进行调整。您可以自定义此过程的时机以满足特定数据库的索引需求。


    注意


    性能计数器信息可以更频繁地收集。例如，`性能监视器` 默认为每 15 秒收集一次。对于索引监控而言，无需如此高的频率。


    ```sql

    USE IndexingMethod;

    GO

    DROP TABLE IF EXISTS #Counters;

    SELECT pc.object_name,

    pc.counter_name

    INTO #Counters

    FROM sys.dm_os_performance_counters pc

    WHERE pc.cntr_type IN ( 272696576, 1073874176 )

    AND (

    pc.object_name LIKE ''%:Access Methods%''

    AND (

    pc.counter_name LIKE ''Forwarded Records/sec%''

    OR pc.counter_name LIKE ''FreeSpace Scans/sec%''

    OR pc.counter_name LIKE ''FreeSpace Page Fetches/sec%''

    OR pc.counter_name LIKE ''Full Scans/sec%''

    OR pc.counter_name LIKE ''Index Searches/sec%''

    OR pc.counter_name LIKE ''Page Splits/sec%''

    OR pc.counter_name LIKE ''Page compression attempts/sec%''

    OR pc.counter_name LIKE ''Pages compressed/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Buffer Manager%''

    AND (

    pc.counter_name LIKE ''Page life expectancy%''

    OR pc.counter_name LIKE ''Page lookups/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:Locks%''

    AND (

    pc.counter_name LIKE ''Lock Wait Time (ms)%''

    OR pc.counter_name LIKE ''Lock Waits/sec%''

    OR pc.counter_name LIKE ''Number of Deadlocks/sec%''

    )

    )

    OR (

    pc.object_name LIKE ''%:SQL Statistics%''

    AND pc.counter_name LIKE ''Batch Requests/sec%''

    )

    GROUP BY pc.object_name,

    pc.counter_name;

    DROP TABLE IF EXISTS #Baseline;

    SELECT GETDATE() AS sample_time,

    pc1.object_name,

    pc1.counter_name,

    pc1.instance_name,

    pc1.cntr_value,

    pc1.cntr_type,

    x.cntr_value AS base_cntr_value

    INTO #Baseline

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) x;

    WAITFOR DELAY ''00:00:15'';

    INSERT INTO dbo.IndexingCounters (

    create_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    Calculated_Counter_value

    )

    SELECT GETDATE(),

    LEFT(pc1.object_name, CHARINDEX('':'', pc1.object_name) - 1),

    SUBSTRING(pc1.object_name, 1 + CHARINDEX('':'', pc1.object_name), LEN(pc1.object_name)),

    pc1.counter_name,

    pc1.instance_name,

    CASE

    WHEN pc1.cntr_type = 65792 THEN pc1.cntr_value

    WHEN pc1.cntr_type = 272696576 THEN

    COALESCE((1. * pc1.cntr_value - x.cntr_value) / NULLIF(DATEDIFF(s, sample_time,
    GETDATE()), 0), 0)

    WHEN pc1.cntr_type = 537003264 THEN COALESCE((1. * pc1.cntr_value) / NULLIF(base.cntr_value,
    0), 0)

    WHEN pc1.cntr_type = 1073874176 THEN

    COALESCE(

    (1. * pc1.cntr_value - x.cntr_value) / NULLIF(base.cntr_value - x.base_cntr_value,
    0)

    / NULLIF(DATEDIFF(s, sample_time, GETDATE()), 0),

    0

    ) END AS real_cntr_value

    FROM sys.dm_os_performance_counters pc1

    INNER JOIN #Counters c ON c.object_name = pc1.object_name

    AND c.counter_name = pc1.counter_name

    OUTER APPLY (

    SELECT cntr_value,

    base_cntr_value,

    sample_time

    FROM #Baseline b

    WHERE b.object_name   = pc1.object_name

    AND b.counter_name  = pc1.counter_name

    AND b.instance_name = pc1.instance_name

    ) x

    OUTER APPLY (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters pc2

    WHERE pc2.cntr_type           = 1073939712

    AND UPPER(pc1.counter_name) = UPPER(pc2.counter_name)

    AND pc1.object_name         = pc2.object_name

    AND pc1.instance_name       = pc2.instance_name

    ) base;

    ```


    清单 15-2

    性能计数器快照脚本


    第一次为索引收集性能计数器时，无法将计数器值与 SQL Server 数据库实例的其他合理值进行比较。但随着时间的推移，可以保留先前的性能计数器样本以进行比较。作为监控的一部分，重要的是识别出性能计数器值代表您环境典型活动的时期。利用这些数据，可以识别异常情况或使用非典型、需要关注的时期。

    '
- fmt: "# 性能计数器与动态管理对象监控\n\n## 建立性能基线表\n\n要存储这些值，请将它们插入到一个类似于清单 [15-3](#338675_4_En_15_Chapter.xhtml#PC3)\
    \ 的表中。此表包含开始日期和结束日期，以指示基线所代表的范围。此外，还有最小值、最大值、平均值和标准差列，用于存储从收集的计数器中获取的值。最小值和最大值将有助于理解性能计数器的变化情况。平均值提供了计数器值在“良好”状态时的概貌。标准差使我们能够了解计数器值的变异性。数值越低，表示计数器值越频繁地聚集在平均值附近。数值越高，则表示计数器值变化更频繁，并且通常更接近最小值和最大值。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCountersBaseline\n\
    (\n    counter_baseline_id INT IDENTITY(1, 1),\n    start_date DATETIME2(0),\n\
    \    end_date DATETIME2(0),\n    server_name VARCHAR(128) NOT NULL,\n    object_name\
    \ VARCHAR(128) NOT NULL,\n    counter_name VARCHAR(128) NOT NULL,\n    instance_name\
    \ VARCHAR(128) NULL,\n    minimum_counter_value FLOAT NULL,\n    maximum_counter_value\
    \ FLOAT NULL,\n    average_counter_value FLOAT NULL,\n    standard_deviation_counter_value\
    \ FLOAT NULL,\n    CONSTRAINT PK_IndexingCountersBaseline\n        PRIMARY KEY\
    \ CLUSTERED (counter_baseline_id)\n);\nGO\n```\n**清单 15-3 性能计数器基线表**\n\n## 填充基线数据\n\
    \n将值填充到 `dbo.IndexingCountersBaseline` 表中的过程有两个步骤。首先，需要从代表典型一周的性能计数器中收集样本。如果没有典型的一周，则选择本周并为其收集样本。收集到典型一周的数据后，下一步是将信息聚合到基线表中。这实质上是总结\
    \ `dbo.IndexingCounters` 表中特定日期范围内的信息。在清单 [15-4](#338675_4_En_15_Chapter.xhtml#PC4)\
    \ 中，数据范围是从 2019 年 8 月 1 日到 8 月 15 日。接下来是验证基线。仅仅因为过去一周的平均值显示每秒转发记录数为 100，并不意味着该值代表了一个良好的基线。应使用服务器和数据库的经验来影响基线中的值。如果最近的趋势低于或高于正常水平，请根据需要调整基线。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nDECLARE @StartDate DATETIME = '20190911',\n\
    \        @EndDate       DATETIME = '20190918';\nINSERT INTO dbo.IndexingCountersBaseline\
    \ (\n    start_date,\n    end_date,\n    server_name,\n    object_name,\n    counter_name,\n\
    \    instance_name,\n    minimum_counter_value,\n    maximum_counter_value,\n\
    \    average_counter_value,\n    standard_deviation_counter_value\n)\nSELECT MIN(create_date),\n\
    \       MAX(create_date),\n       server_name,\n       object_name,\n       counter_name,\n\
    \       instance_name,\n       MIN(Calculated_Counter_value),\n       MAX(Calculated_Counter_value),\n\
    \       AVG(Calculated_Counter_value),\n       STDEV(Calculated_Counter_value)\n\
    FROM dbo.IndexingCounters\nWHERE create_date BETWEEN @StartDate AND @EndDate\n\
    GROUP BY server_name,\n         object_name,\n         counter_name,\n       \
    \  instance_name;\n```\n**清单 15-4 填充计数器基线表**\n\n## 其他收集与查看工具\n\n还有其他方法可以收集和查看\
    \ SQL Server 实例的性能计数器。Windows 应用程序性能监视器可用于实时查看性能计数器，也可用于将性能计数器记录到二进制或文本文件中。命令行实用程序\
    \ `Logman` 可用于与性能监视器交互，以创建数据收集器并根据需要启动和停止它们。此外，`PowerShell` 也可以协助收集性能计数器。\n\n\
    这些替代方案都是收集数据库和索引性能计数器的有效选择。关键在于，如果我们想要监控索引，就必须收集必要的信息，以便了解潜在的索引问题何时可能出现。选择一个最顺手的工具，并立即开始收集这些计数器。\n\
    \n## 动态管理对象\n\n监控索引的一些最佳性能信息包含在动态管理对象（DMO）中。DMO 包含关于索引的逻辑和物理使用情况以及整体物理结构的信息。对于监控而言，有四个\
    \ DMO 可提供有关索引使用情况的信息：`sys.dm_db_index_usage_stats`、`sys.dm_db_index_operational_stats`、`sys.dm_db_index_physical_stats`\
    \ 和 `sys.dm_os_wait_stats`。本节将介绍一个使用这些 DMO 监控索引的过程。\n\n接下来的前三节将讨论 `sys.dm_db_index_*`\
    \ 系列 DMO。第 [5](#338675_4_En_5_Chapter.xhtml) 章定义并演示了这些 DMO 的内容。关于这些 DMO 需要记住的一点是，它们可能会由于服务器上的各种操作（例如重启服务或重新创建索引）而被刷新。第四个\
    \ DMO `sys.dm_os_wait_stats` 与索引监控相关，并提供可在索引分析期间提供帮助的信息。\n\n> **警告**\n>\n> 索引\
    \ DMO 没有行级别的信息来精确指示何时重置了为索引收集的信息。因此，可能存在报告的统计信息略高于或低于实际情况的情况。虽然这应该不会对分析结果产生重大影响，但需要牢记这一点。"
  raw: 'To store these values, insert them into a table similar to the one in Listing
    [15-3](#338675_4_En_15_Chapter.xhtml#PC3). This table has start and end dates
    to indicate the range that the baseline represents. Also, there are minimum, maximum,
    average, and standard deviation columns to store values from the collected counters.
    The minimum and maximum values will allow for an understanding of how the performance
    counters vary. The average value provides an idea of what the counter value will
    be when it is “good.” The standard deviation allows us to understand the variability
    of the counter values. The lower the number, the more frequently the counter values
    cluster around the average value. Higher values indicate that the counter values
    vary more frequently and are often nearer to the minimum and maximum values.


    ```

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.IndexingCountersBaseline

    (

    counter_baseline_id INT IDENTITY(1, 1),

    start_date DATETIME2(0),

    end_date DATETIME2(0),

    server_name VARCHAR(128) NOT NULL,

    object_name VARCHAR(128) NOT NULL,

    counter_name VARCHAR(128) NOT NULL,

    instance_name VARCHAR(128) NULL,

    minimum_counter_value FLOAT NULL,

    maximum_counter_value FLOAT NULL,

    average_counter_value FLOAT NULL,

    standard_deviation_counter_value FLOAT NULL,

    CONSTRAINT PK_IndexingCountersBaseline

    PRIMARY KEY CLUSTERED (counter_baseline_id)

    );

    GO

    Listing 15-3

    Performance Counter Baseline Table

    ```


    When populating the values into `dbo.IndexingCountersBaseline`, there are two
    steps to the process. First, a sample needs to be collected from the performance
    counters that represent a typical week. If there are no typical weeks, pick this
    week and collect samples for it. Once data is collected for a typical week, the
    next step is to aggregate the information into the baseline table. This is a matter
    of summarizing the information in the table `dbo.IndexingCounters` for a range
    of days. In Listing [15-4](#338675_4_En_15_Chapter.xhtml#PC4), the data is from
    August 1 to August 15, 2019\. The next step is to validate the baseline. Just
    because the average for the past week states that the Forwarded Records/sec value
    is at 100 does not mean that value represents a good baseline. Experience with
    servers and databases should be used to influence the values in the baseline.
    Adjust the baseline as needed if there is a recent trend below or above what is
    normal.


    ```

    USE IndexingMethod;

    GO

    DECLARE @StartDate DATETIME = ''20190911'',

    @EndDate       DATETIME = ''20190918'';

    INSERT INTO dbo.IndexingCountersBaseline (

    start_date,

    end_date,

    server_name,

    object_name,

    counter_name,

    instance_name,

    minimum_counter_value,

    maximum_counter_value,

    average_counter_value,

    standard_deviation_counter_value

    )

    SELECT MIN(create_date),

    MAX(create_date),

    server_name,

    object_name,

    counter_name,

    instance_name,

    MIN(Calculated_Counter_value),

    MAX(Calculated_Counter_value),

    AVG(Calculated_Counter_value),

    STDEV(Calculated_Counter_value)

    FROM dbo.IndexingCounters

    WHERE create_date BETWEEN @StartDate AND @EndDate

    GROUP BY server_name,

    object_name,

    counter_name,

    instance_name;

    Listing 15-4

    Populate Counter Baseline Table

    ```


    There are other ways to collect and view performance counters for SQL Server instances.
    Windows application Performance Monitor can be used to view performance counters
    in real time. It can also be used to log performance counters to a binary or text
    file. The command-line utility Logman can be used to interact with Performance
    Monitor to create data collectors and start and stop them as needed. Also, PowerShell
    can assist in the collection of performance counters.


    These alternatives are all valid options for collecting performance counters on
    databases and indexes. The key is that if we want to monitor your indexes, we
    must collect the information necessary to know when potential indexing issues
    may arise. Pick a tool that is most comfortable to use and start collecting these
    counters today.


    ## Dynamic Management Objects


    Some of the best index performance information for monitoring is included in dynamic
    management objects (DMOs). The DMOs contain information on logical and physical
    uses for the indexes and overall physical structure. For monitoring, there are
    four DMOs that provide information on the usage of the indexes: `sys.dm_db_index_usage_stats`,
    `sys.dm_db_index_operational_stats`, `sys.dm_db_index_physical_stats`, and `sys.dm_os_wait_stats`.
    In this section, a process will be introduced to monitor indexes using each of
    these DMOs.


    The first three following sections will discuss the `sys.dm_db_index_`* DMOs.
    Chapter [5](#338675_4_En_5_Chapter.xhtml) defined and demonstrated the contents
    of the DMOs. One thing to remember with these DMOs is that they can be flushed
    through various operations on the server, such as restarting the service or recreating
    the index. The fourth DMO, `sys.dm_os_wait_stats`, relates to index monitoring
    and provides information that can help during index analysis.


    Warning


    The indexing DMOs do not have information at the row level to precisely indicate
    when the information collected for the index has been reset. Because of this,
    there can be situations where the statistics reported can be slightly higher or
    lower than they actually are. While this should not greatly affect the outcome
    during analysis, it is something to keep in mind.'
  trans: "\n# 性能计数器与动态管理对象监控\n\n## 建立性能基线表\n\n要存储这些值，请将它们插入到一个类似于清单 15-3 的表中。此表包含开始日期和结束日期，以指示基线所代表的范围。此外，还有最小值、最大值、平均值和标准差列，用于存储从收集的计数器中获取的值。最小值和最大值将有助于理解性能计数器的变化情况。平均值提供了计数器值在“良好”状态时的概貌。标准差使我们能够了解计数器值的变异性。数值越低，表示计数器值越频繁地聚集在平均值附近。数值越高，则表示计数器值变化更频繁，并且通常更接近最小值和最大值。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nCREATE TABLE dbo.IndexingCountersBaseline\n\
    (\n    counter_baseline_id INT IDENTITY(1, 1),\n    start_date DATETIME2(0),\n\
    \    end_date DATETIME2(0),\n    server_name VARCHAR(128) NOT NULL,\n    object_name\
    \ VARCHAR(128) NOT NULL,\n    counter_name VARCHAR(128) NOT NULL,\n    instance_name\
    \ VARCHAR(128) NULL,\n    minimum_counter_value FLOAT NULL,\n    maximum_counter_value\
    \ FLOAT NULL,\n    average_counter_value FLOAT NULL,\n    standard_deviation_counter_value\
    \ FLOAT NULL,\n    CONSTRAINT PK_IndexingCountersBaseline\n        PRIMARY KEY\
    \ CLUSTERED (counter_baseline_id)\n);\nGO\n```\n**清单 15-3 性能计数器基线表**\n\n## 填充基线数据\n\
    \n将值填充到 `dbo.IndexingCountersBaseline` 表中的过程有两个步骤。首先，需要从代表典型一周的性能计数器中收集样本。如果没有典型的一周，则选择本周并为其收集样本。收集到典型一周的数据后，下一步是将信息聚合到基线表中。这实质上是总结\
    \ `dbo.IndexingCounters` 表中特定日期范围内的信息。在清单 15-4 中，数据范围是从 2019 年 8 月 1 日到 8 月 15\
    \ 日。接下来是验证基线。仅仅因为过去一周的平均值显示每秒转发记录数为 100，并不意味着该值代表了一个良好的基线。应使用服务器和数据库的经验来影响基线中的值。如果最近的趋势低于或高于正常水平，请根据需要调整基线。\n\
    \n```sql\nUSE IndexingMethod;\nGO\nDECLARE @StartDate DATETIME = '20190911',\n\
    \        @EndDate       DATETIME = '20190918';\nINSERT INTO dbo.IndexingCountersBaseline\
    \ (\n    start_date,\n    end_date,\n    server_name,\n    object_name,\n    counter_name,\n\
    \    instance_name,\n    minimum_counter_value,\n    maximum_counter_value,\n\
    \    average_counter_value,\n    standard_deviation_counter_value\n)\nSELECT MIN(create_date),\n\
    \       MAX(create_date),\n       server_name,\n       object_name,\n       counter_name,\n\
    \       instance_name,\n       MIN(Calculated_Counter_value),\n       MAX(Calculated_Counter_value),\n\
    \       AVG(Calculated_Counter_value),\n       STDEV(Calculated_Counter_value)\n\
    FROM dbo.IndexingCounters\nWHERE create_date BETWEEN @StartDate AND @EndDate\n\
    GROUP BY server_name,\n         object_name,\n         counter_name,\n       \
    \  instance_name;\n```\n**清单 15-4 填充计数器基线表**\n\n## 其他收集与查看工具\n\n还有其他方法可以收集和查看\
    \ SQL Server 实例的性能计数器。Windows 应用程序性能监视器可用于实时查看性能计数器，也可用于将性能计数器记录到二进制或文本文件中。命令行实用程序\
    \ `Logman` 可用于与性能监视器交互，以创建数据收集器并根据需要启动和停止它们。此外，`PowerShell` 也可以协助收集性能计数器。\n\n\
    这些替代方案都是收集数据库和索引性能计数器的有效选择。关键在于，如果我们想要监控索引，就必须收集必要的信息，以便了解潜在的索引问题何时可能出现。选择一个最顺手的工具，并立即开始收集这些计数器。\n\
    \n## 动态管理对象\n\n监控索引的一些最佳性能信息包含在动态管理对象（DMO）中。DMO 包含关于索引的逻辑和物理使用情况以及整体物理结构的信息。对于监控而言，有四个\
    \ DMO 可提供有关索引使用情况的信息：`sys.dm_db_index_usage_stats`、`sys.dm_db_index_operational_stats`、`sys.dm_db_index_physical_stats`\
    \ 和 `sys.dm_os_wait_stats`。本节将介绍一个使用这些 DMO 监控索引的过程。\n\n接下来的前三节将讨论 `sys.dm_db_index_*`\
    \ 系列 DMO。第 5 章定义并演示了这些 DMO 的内容。关于这些 DMO 需要记住的一点是，它们可能会由于服务器上的各种操作（例如重启服务或重新创建索引）而被刷新。第四个\
    \ DMO `sys.dm_os_wait_stats` 与索引监控相关，并提供可在索引分析期间提供帮助的信息。\n\n> **警告**\n>\n> 索引\
    \ DMO 没有行级别的信息来精确指示何时重置了为索引收集的信息。因此，可能存在报告的统计信息略高于或低于实际情况的情况。虽然这应该不会对分析结果产生重大影响，但需要牢记这一点。\n"
- fmt: '# Index Usage Stats


    The DMO `sys.dm_db_index_usage_stats` provides information on how indexes are
    being used and when an index was last used. This can be useful when we want to
    track whether indexes are being used and which operations are being executed against
    them.


    The monitoring process for this DMO, which is similar to the other DMOs, consists
    of the following steps:


    1.  Create a table to hold snapshot information.

    2.  Insert the current state of the DMO into the snapshot table.

    3.  Compare the most recent snapshot to the previous snapshot, and insert the
    delta between the rows in the output into a history table.


    To build the process, we’ll first need to create the snapshot and history tables.
    The schema for these tables will be identical and will contain all columns from
    the DMO and a `create_date` column. For consistency with the source DMO, the columns
    for the table will match the schema of the DMO.


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_usage_stats_snapshot

    (

    snapshot_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT NOT NULL,

    object_id INT NOT NULL,

    index_id INT NOT NULL,

    user_seeks BIGINT NOT NULL,

    user_scans BIGINT NOT NULL,

    user_lookups BIGINT NOT NULL,

    user_updates BIGINT NOT NULL,

    last_user_seek DATETIME,

    last_user_scan DATETIME,

    last_user_lookup DATETIME,

    last_user_update DATETIME,

    system_seeks BIGINT NOT NULL,

    system_scans BIGINT NOT NULL,

    system_lookups BIGINT NOT NULL,

    system_updates BIGINT NOT NULL,

    last_system_seek DATETIME,

    last_system_scan DATETIME,

    last_system_lookup DATETIME,

    last_system_update DATETIME,

    CONSTRAINT PK_IndexUsageStatsSnapshot

    PRIMARY KEY CLUSTERED (snapshot_id),

    CONSTRAINT UQ_IndexUsageStatsSnapshot

    UNIQUE (create_date, database_id, object_id, index_id)

    );

    CREATE TABLE dbo.index_usage_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT NOT NULL,

    object_id INT NOT NULL,

    index_id INT NOT NULL,

    user_seeks BIGINT NOT NULL,

    user_scans BIGINT NOT NULL,

    user_lookups BIGINT NOT NULL,

    user_updates BIGINT NOT NULL,

    last_user_seek DATETIME,

    last_user_scan DATETIME,

    last_user_lookup DATETIME,

    last_user_update DATETIME,

    system_seeks BIGINT NOT NULL,

    system_scans BIGINT NOT NULL,

    system_lookups BIGINT NOT NULL,

    system_updates BIGINT NOT NULL,

    last_system_seek DATETIME,

    last_system_scan DATETIME,

    last_system_lookup DATETIME,

    last_system_update DATETIME,

    CONSTRAINT PK_IndexUsageStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexUsageStatsHistory

    UNIQUE (create_date, database_id, object_id, index_id)

    );

    ```

    Listing 15-5 Index Usage Stats Snapshot Tables Stats


    The next component of capturing index usage history stats is collecting the current
    values in `sys.dm_db_index_usage_stats`. Similar to the performance monitor script,
    the collection query needs to be scheduled to run about every 4 hours. The activity
    in a database environment and rate in which indexes are modified should help determine
    the frequency in which the information is captured. Be certain to schedule a snapshot
    prior to any index defragmentation processes to capture information that might
    be lost when indexes are rebuilt.


    ```sql

    USE IndexingMethod;

    GO

    INSERT INTO dbo.index_usage_stats_snapshot

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates,

    last_user_seek,

    last_user_scan,

    last_user_lookup,

    last_user_update,

    system_seeks,

    system_scans,

    system_lookups,

    system_updates,

    last_system_seek,

    last_system_scan,

    last_system_lookup,

    last_system_update

    FROM sys.dm_db_index_usage_stats;

    ```

    Listing 15-6 Index Usage Stats Snapshot Population


    After populating the snapshot for the index usage stats, the delta between the
    most recent and the previous snapshot needs to be inserted into the `index_usage_stats_history`
    table. Since there is no indicator within the rows from `sys.dm_db_index_usage_stats`
    to identify when the stats for the index have been reset, the process for identifying
    when a delta between two entries for an index exists is to remove the row if any
    of the statistics on the index return a negative value. The resulting query implements
    this logic along with removing any rows where no new activity has happened.


    ```sql

    USE IndexingMethod;

    GO

    WITH IndexUsageCTE

    AS (SELECT DENSE_RANK() OVER (ORDER BY create_date DESC) AS HistoryID,

    create_date,

    database_id,

    object_id,

    index_id,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates,

    last_user_seek,

    last_user_scan,

    last_user_lookup,

    last_user_update,

    system_seeks,

    system_scans,

    system_lookups,

    system_updates,

    last_system_seek,

    last_system_scan,

    last_system_lookup,

    last_system_update

    FROM dbo.index_usage_stats_snapshot)

    INSERT INTO dbo.index_usage_stats_history

    SELECT i1.create_date,

    i1.database_id,

    i1.object_id,

    i1.index_id,

    i1.user_seeks - COALESCE(i2.user_seeks, 0),

    i1.user_scans - COALESCE(i2.user_scans, 0),

    i1.user_lookups - COALESCE(i2.user_lookups, 0),

    i1.user_updates - COALESCE(i2.user_updates, 0),

    i1.last_user_seek,

    i1.last_user_scan,

    i1.last_user_lookup,

    i1.last_user_update,

    i1.system_seeks - COALESCE(i2.system_seeks, 0),

    i1.system_scans - COALESCE(i2.system_scans, 0),

    i1.system_lookups - COALESCE(i2.system_lookups, 0),

    i1.system_updates - COALESCE(i2.system_updates, 0),

    i1.last_system_seek,

    i1.last_system_scan,

    i1.last_system_lookup,

    i1.last_system_update

    FROM IndexUsageCTE i1

    LEFT OUTER JOIN IndexUsageCTE i2 ON i1.database_id = i2.database_id

    AND i1.object_id   = i2.object_id

    AND i1.index_id    = i2.index_id

    AND i2.HistoryID   = 2

    --Verify no rows are less than 0

    AND NOT (

    i1.system_seeks - COALESCE(i2.system_seeks, 0)  0

    OR i1.system_scans - COALESCE(i2.system_scans, 0)     > 0

    OR i1.system_lookups - COALESCE(i2.system_lookups, 0) > 0

    OR i1.system_updates - COALESCE(i2.system_updates, 0) > 0

    OR i1.user_seeks - COALESCE(i2.user_seeks, 0)         > 0

    OR i1.user_scans - COALESCE(i2.user_scans, 0)         > 0

    OR i1.user_lookups - COALESCE(i2.user_lookups, 0)     > 0

    OR i1.user_updates - COALESCE(i2.user_updates, 0)     > 0

    );

    GO

    ```

    Listing 15-7 Index Usage Stats Snapshot Population


    # Index Operational Stats


    The DMO `sys.dm_db_index_operational_stats` provides information on the physical
    operations that happen on indexes during plan execution. This information can
    be useful for tracking the physical plan operations that occur when indexes are
    used and the rates for those operations. One of the other things this DMO monitors
    is the success rate for compression.


    The process for monitoring this DMO involves a few simple steps. First, tables
    will be created to store snapshot and history information on the DMO output. Then,
    periodic snapshots of the DMO output are inserted into the snapshot table. After
    the snapshot is retrieved, the delta between the current and previous snapshot
    is inserted into the history table.


    The process utilizes a snapshot and history table that is nearly identical to
    the schema of `sys.dm_db_index_operational_stats`. The chief variance in the schema
    is the addition of a `create_date` column, used to identify when the snapshot
    occurred. The code provides the schema required for the snapshot and history tables.


    **Note**


    The columns `version_generated_inrow`, `version_generated_offrow`, `ghost_version_inrow`,
    `ghost_version_offrow`, `insert_over_ghost_version_inrow`, and `insert_over_ghost_version_offrow`
    are new as of SQL Server 2019. If using this code in previous versions of SQL
    Server, these columns should be removed.'
