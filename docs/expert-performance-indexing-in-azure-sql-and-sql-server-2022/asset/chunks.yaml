  trans: '

    # 外键


    创建聚集索引时最常被忽视的模式之一，是在表的聚集键中使用外键列。外键模式并非适用于所有外键，但它在设计表头信息与相关明细信息之间存在一对多关系时确实有其用途。外键模式包含了构成明确定义的聚集索引键的所有属性。不过，对于其中的一些属性，有几点需要注意。


    实现此模式的方式与标识列模式类似。该模式包含两个表，它们的列都设置了 `IDENTITY` 属性。代码清单 13-6 展示了一个例子。在该示例中，创建了三个表。第一个是表头表，名为
    `dbo.IndexStrategiesHeader`，其聚集索引建立在 `HeaderID` 列上。第二个表是明细表的第一个版本，名为 `dbo.IndexStrategiesDetail_ICP`。该表被设计为表头表的子表，聚集索引使用标识列模式构建，并在
    `HeaderID` 列上建立了一个索引以提高性能。第三个表也是明细表，名为 `dbo.IndexStrategiesDetail_FKP`；此表使用外键模式设计。它没有在具有
    `IDENTITY` 属性的列上建立聚集索引，而是将两列包含在聚集索引中。第一列来自父表 `HeaderID`，第二列是此表的主键 `DetailID`。为了提供示例数据，使用了
    `sys.indexes` 和 `sys.index_columns` 来填充所有表。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesHeader

    (

    HeaderID int IDENTITY(1,1)

    ,FillerData char(250)

    ,CONSTRAINT PK_Header_HeaderID PRIMARY KEY CLUSTERED (HeaderID)

    );

    CREATE TABLE dbo.IndexStrategiesDetail_ICP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_ICP_DetailID PRIMARY KEY CLUSTERED (DetailID)

    ,CONSTRAINT FK_Detail_ICP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    CREATE INDEX IX_Detail_ICP_HeaderID ON dbo.IndexStrategiesDetail_ICP (HeaderID)

    CREATE TABLE dbo.IndexStrategiesDetail_FKP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_FKP_DetailID PRIMARY KEY NONCLUSTERED (DetailID)

    ,CONSTRAINT CLUS_Detail_FKP_HeaderIDDetailID UNIQUE CLUSTERED (HeaderID, DetailID)

    ,CONSTRAINT FK_Detail_FKP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    GO

    INSERT INTO dbo.IndexStrategiesHeader(FillerData)

    SELECT CONVERT(varchar,object_id)+name

    FROM sys.indexes

    INSERT INTO dbo.IndexStrategiesDetail_ICP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    INSERT INTO dbo.IndexStrategiesDetail_FKP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    ```


    代码清单 13-6：为外键模式创建并填充表


    至此，我们使用两种聚集索引模式（标识序列和外键）设计了三个表。此模式的关键在于设计表结构，使其在常见的使用模式下，数据能以最高效的方式返回。在此类场景中，有两种常见的用例。第一种是返回表头以及对应一个表头行的所有明细行。第二种是返回表头中的多行以及明细表中所有相关的行。

    '
- fmt: '# 第十三章：聚簇索引设计模式


    ## 外键模式


    首先将检查从头表返回一行及其所有相关明细行的性能差异。清单 [13-7](#338675_4_En_13_Chapter.xhtml#PC7) 中的代码使用两种聚簇索引模式实现了此用例。正如预期，两个查询返回的数据集是相同的。差异在于两个查询的统计信息和查询计划。请检查在第一个用例中使用
    `STATISTICS IO` 时的统计信息输出，如图 [13-6](#338675_4_En_13_Chapter.xhtml#Fig6) 所示。身份列模式的读取显示为四次读取，而外键模式为两次读取。虽然这些数字很低，但这是一个两倍的差异，如果这些是高度使用的查询，可能会对数据库产生显著影响。然而，通过查看两个查询的执行计划（图
    [13-7](#338675_4_En_13_Chapter.xhtml#Fig7)），可以看到执行上的巨大差异。对于第一个查询，需要对明细表执行索引查找、键查找和嵌套循环。将其与第二个查询进行比较，后者使用聚簇索引查找获取相同的信息。此示例清楚地表明，外键模式能够比身份列模式执行得更好。


    ![图 13-7](images/338675_4_En_13_Chapter/338675_4_En_13_Fig7_HTML.png)

    *一个面板，其中打开了执行计划选项卡，流程图中突出显示了索引查找、键查找和嵌套循环作为身份列模式的组成部分。下方是一个两行文本的查询 2 的流程图，占批处理的
    40% 成本，其中两个聚簇索引查找项中的一个（占 50% 成本）标记为外键模式。*

    **图 13-7 外键模式下针对单个头行的执行计划**


    ![图 13-6](images/338675_4_En_13_Chapter/338675_4_En_13_Fig6_HTML.png)

    *一个面板，其中打开了消息选项卡，在“影响了 1 行”标签下显示文本块。所示文本块中的逻辑读取 4 和逻辑读取 2 分别标记为身份列模式和外键模式。*

    **图 13-6 外键模式下针对单个头行的结果**


    ```sql

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    ```

    *清单 13-7 外键模式下针对单个头行*


    随着第一个用例的成功，现在可以检查第二个用例。在此示例中（如清单 [13-8](#338675_4_En_13_Chapter.xhtml#PC8) 所示），查询将从头表中检索多行，并从明细表中检索与头行中
    `HeaderID` 匹配的数据。同样，使用两种聚簇索引模式的查询返回的数据是相同的，并且两次执行之间存在性能差异。第一个差异体现在 `STATISTICS
    IO` 输出中，如图 [13-8](#338675_4_En_13_Chapter.xhtml#Fig8) 所示。在第一次执行中，头表有 158 次读取，明细表有
    44 次读取。将它们与外键模式下的头表四次读取和明细表八次读取进行比较，很明显外键模式表现更好。外键模式的读取比身份列模式低一个数量级！性能差异的原因可以通过图
    [13-9](#338675_4_En_13_Chapter.xhtml#Fig9) 所示的执行计划来解释。在执行计划中，第一个查询需要在明细表上执行 `clustered
    index scan` 以返回明细行。而使用外键模式的第二个查询不需要此操作，并使用聚簇索引查找。


    ![图 13-9](images/338675_4_En_13_Chapter/338675_4_En_13_Fig9_HTML.png)

    *一个面板，其中打开了执行计划选项卡，查询 1 和查询 2 的流程图分别占批处理的 78% 和 22% 成本。聚簇索引扫描（聚集，索引策略详情 I C P）占
    69% 成本，聚簇索引查找（聚集，索引策略头表）占 24% 成本，分别标记为身份列和外键模式。*

    **图 13-9 外键模式下针对多个头行的执行计划**


    ![图 13-8](images/338675_4_En_13_Chapter/338675_4_En_13_Fig8_HTML.png)

    *一个面板，其中打开了消息选项卡，在“影响了 82 行”标签下显示文本块。所示文本块中的逻辑读取 164 和逻辑读取 8 分别标记为身份列模式和外键模式。*

    **图 13-8 外键模式下针对多个头行的结果**


    ```sql

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID BETWEEN 10 AND 50;

    SELECT ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID BETWEEN 10 AND 50;

    ```

    *清单 13-8 外键模式下针对多个头行*


    ## 实现注意事项


    通过本节的两个用例，我们可以看到外键模式如何优于身份列模式。然而，在数据库中实现此模式之前需要考虑一些事项。需要回答的主要问题是：行是否最常通过明细表的主键或其与头表的外键关系来检索。并非所有外键都适合此聚簇索引模式；仅当表之间存在头-明细关系时，它才有效。


    在使用外键模式时，对于明确定义的聚簇索引的属性有一些注意事项。关于窄键，此模式不如身份列模式窄。聚簇键由两个基于整数的列组成，而不是单个整数列。当使用 `int`
    数据类型时，这将使聚簇键的大小从 4 字节增加到 8 字节。虽然这不是一个非常大的值，但它会影响表上所有非聚簇索引的大小。在大多数情况下，外键模式下的聚簇键是静态的。某些明细行对应的头行可能偶尔需要更改，例如当两个订单被记录并需要合并运输时。因此，外键模式并非完全静态。键可以更改，但不应频繁更改。如果更改频繁，则应重新考虑使用此聚簇索引模式。最后一个具有注意事项的属性是聚簇键是否始终递增。通常，应该是这样。典型的插入模式是创建头记录和明细记录。在这种情况下，头行被顺序创建和插入，然后是其明细记录。如果写入明细记录有延迟，或者稍后向头行添加更多明细记录，键将不会始终递增。结果，可能会产生额外的碎片和与此聚簇索引模式相关的维护。


    ## 总结


    外键模式并非适用于大多数表的聚簇索引模式。然而，当适用时，它非常有益，可以缓解可能不如其他问题明显的性能问题。在设计聚簇索引时，考虑使用此模式并审查其相关的注意事项以确定是否适合非常重要。'
  raw: 'First, the difference in performance for returning one row from the header
    table and all the related detail rows will be examined. The code in Listing [13-7](#338675_4_En_13_Chapter.xhtml#PC7)
    implements this use case using both clustered indexing patterns. As expected,
    the dataset returned by both queries is the same. The difference lies in the statistics
    and query plan for the two queries. Examine the statistics output when `STATISTICS
    IO` is used during the first use case, as shown in Figure [13-6](#338675_4_En_13_Chapter.xhtml#Fig6).
    The reads for the Identity Column pattern show that there were four reads as opposed
    to two reads by the Foreign Key pattern. While these numbers are low, this is
    a twofold difference that could impact a database significantly if these are highly
    utilized queries. The big difference in execution, though, can be seen when reviewing
    the execution plans for the two queries (Figure [13-7](#338675_4_En_13_Chapter.xhtml#Fig7)).
    For the first query, to retrieve the results, an index seek, key lookup, and nested
    loop are required against the detail table. Compare this with the second query,
    which obtains the same information using a clustered index seek. This example
    clearly indicates that the Foreign Key pattern is able to perform better than
    the Identity Column pattern.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig7_HTML.png)


    A panel with an opened execution plan tab with index seek, key lookup, and nested
    loops in the flow diagram highlighted as components of the identity column pattern.
    Below is a flow diagram from 2 lines of text for query 2 at 40% cost relative
    to the batch, where 1 of the 2 clustered index seek items at 50% cost is labeled
    foreign key pattern.


    Figure 13-7


    Execution plans for a single header row on the Foreign Key pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig6_HTML.png)


    A panel with an opened messages tab with blocks of text under the 1 row affected
    labels. The logical reads 4 and logical reads 2 of the exhibited blocks of text
    are labeled identity column pattern and foreign key pattern, respectively.


    Figure 13-6


    Results for a single header row on the Foreign Key pattern


    ```

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    SELECT  ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID = 10

    Listing 13-7

    Single Header Row on the Foreign Key Pattern

    ```


    With the success of the first use case, the second one can now be examined. In
    this example, shown in Listing [13-8](#338675_4_En_13_Chapter.xhtml#PC8), the
    queries will retrieve multiple rows from the header table and the data from the
    detail table that matches the `HeaderID` from the header rows. Again, the data
    returned by the queries using both of the clustered index patterns is the same,
    and there are performance differences between the two executions. The first difference
    is in the `STATISTICS IO` output, shown in Figure [13-8](#338675_4_En_13_Chapter.xhtml#Fig8).
    In the first execution, there are 158 reads on the header table and 44 reads on
    the detail table. Comparing those with the four reads on the header and eight
    reads on the detail for the Foreign Key pattern, it’s clear that the Foreign Key
    pattern performs better. The reads are a magnitude lower for the Foreign Key over
    the Identity Column pattern! The reason for the performance difference can be
    explained through the execution plan shown in Figure [13-9](#338675_4_En_13_Chapter.xhtml#Fig9).
    In the execution plan, the first query requires a `clustered index scan` on the
    detail table to return the rows from the detail table. The second query, using
    the Foreign Key pattern, does not require this and uses a clustered index seek.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig9_HTML.png)


    A panel with an opened execution plan tab with flow diagrams for queries 1 and
    2 at 78% and 22% costs relative to the batch, respectively. The clustered index
    scan, clustered, index strategies detail I C P, at 69% cost and clustered index
    seek, clustered, index strategies header, at 24% cost are marked as identity column
    and foreign key patterns, respectively.


    Figure 13-9


    Execution plans for multiple header rows on the Foreign Key pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig8_HTML.png)


    A panel with an opened messages tab with blocks of text under the 82 rows affected
    labels. The logical reads 164 and logical reads 8 of the exhibited blocks of text
    are labeled identity column pattern and foreign key pattern, respectively.


    Figure 13-8


    Results for multiple header rows on the Foreign Key pattern


    ```

    Use AdventureWorks2017

    GO

    SET STATISTICS IO ON

    SELECT ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_ICP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID BETWEEN 10 AND 50;

    SELECT ish.HeaderID, ish.FillerData, isd.DetailID, isd.FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN dbo.IndexStrategiesDetail_FKP isd ON ish.HeaderID = isd.HeaderID

    WHERE ish.HeaderID BETWEEN 10 AND 50;

    Listing 13-8

    Multiple Header Rows on the Foreign Key Pattern

    ```


    Through the two use cases in this section, we can see how the Foreign Key pattern
    can outperform the Identity Column pattern. However, there are things that need
    to be considered in databases before implementing this pattern. The chief question
    that needs to be answered is whether rows will most often be retrieved going through
    the primary key of the detail table or its foreign key relationship to the header
    table. Not all foreign keys are suited for this clustered index pattern; it is
    valid only when there is a header-todetail relationship between tables.


    There are a few caveats regarding the attributes of a well-defined clustered index
    when using the Foreign Key pattern. In regard to being narrow, the pattern is
    not as narrow as the Identity Column pattern. Instead of a single integer-based
    column, two of them make up the clustering keys. When using the `int` data type,
    this will increase the size of the clustering key from 4 bytes to 8 bytes. While
    not an overly large value, it will impact the size of all non-clustered indexes
    on the table. In most cases, the clustering keys under the Foreign Key pattern
    will be static. There is a chance that the header row for some detail rows will
    need to change from time to time, maybe when two orders are logged and need to
    be merged for shipping. For this reason, the Foreign Key pattern isn’t entirely
    static. The key can change, but it shouldn’t change frequently. If there are frequent
    changes, then reconsider using this clustered index pattern. The last attribute
    that has a caveat is whether the clustering keys are ever-increasing. In general,
    this should be the case. The typical insert pattern is to create a header and
    the detail records. In this situation, the header rows are created and inserted
    sequentially, followed by their detail records. If there is a delay in writing
    the detail records or more detail records are added to a header row at a later
    date, the key won’t be ever-increasing. As a result, there could be additional
    fragmentation and maintenance associated with this clustered index pattern.


    The Foreign Key pattern is not a clustered index pattern that will be applicable
    in most tables. When it is, though, it is quite beneficial and can alleviate performance
    issues that may not be as obvious as other issues. It is important to consider
    using this pattern when designing clustered indexes and to review the caveats
    associated with it to determine whether it is the right fit.'
