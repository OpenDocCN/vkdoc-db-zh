    \ 个`batch requests/sec`对应超过 1 个`page split/sec`的时间段。与其他计数器一样，需要注意通过`PctViolation`显示的计数器超出阈值的时长。\n\
    \n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Page Splits/sec',\
    \ Calculated_Counter_value, NULL)) PageSplits,\n           MAX(IIF(counter_name\
    \ = 'Page Splits/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 20) AS FullRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Page Splits/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(PageSplits) AS MinPageSplits,\n       AVG(PageSplits)\
    \ AS AvgPageSplits,\n       MAX(PageSplits) AS MaxPageSplits,\n       MIN(FullRatio)\
    \ AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n       MAX(FullRatio)\
