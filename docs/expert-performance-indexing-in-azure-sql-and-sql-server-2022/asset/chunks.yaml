  trans: '

    ## 锁等待时间


    某些性能计数器可用于根据其使用情况来确定索引是否存在压力。其中一个计数器是 `锁等待时间 (ms)`。该计数器衡量 SQL Server 为等待对表、索引或页实施锁所花费的时间（以毫秒为单位）。此计数器并没有任何特定的“良好”指导值。一般来说，该值越低越好，但“低”的具体含义完全取决于数据库平台和访问它的应用程序。


    由于没有关于 `锁等待时间 (ms)` 值可接受水平的准则，评估该计数器的最佳方法是将其与基线值进行比较。在这种情况下，收集基线对于监控何时发生与 `锁等待时间`
    相关的索引性能下降变得极其重要。使用清单 16-19 中的查询，将 `锁等待时间 (ms)` 值与可用的基线值进行比较。对于基线值和监控期的值，都提供了计数器值的最小值、最大值、平均值和标准差的聚合。这些聚合有助于提供计数器状态的概况，以及与基线相比它是增加还是减少了。


    ### 清单 16-19

    锁等待时间计数器分析


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Wait Time (ms)'', Calculated_Counter_value, NULL))
    / 1000 LockWaitTime

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Wait Time (ms)''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaitTime) AS MinLockWaitTime,

    AVG(LockWaitTime) AS AvgLockWaitTime,

    MAX(LockWaitTime) AS MaxLockWaitTime,

    STDEV(LockWaitTime) AS StdDevLockWaitTime

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Wait Time (ms)''

    ORDER BY instance_name,

    CounterDate DESC;

    ```


    例如，在图 16-7 中，平均和最大锁等待时间相较于基线值有所下降，这是期望的情况。如果平均锁等待时间相比基线有所增加，则可能需要关注，特别是如果该增加量达到数十毫秒。此外，如果最大值范围有所扩大，这也是需要调查的另一件事。等待获取锁所花费的时间增加得越多，对用户的直接影响就越大。


    ![](img/338675_4_En_16_Fig7_HTML.png)


    页面在结果选项卡下呈现了一个表格，截取了第 1 到 4 行以及第 15 到 18 行两组。列标题包括计数器日期、服务器名称、实例名称、最小锁等待时间、平均锁等待时间、最大锁等待时间、以及标准差锁等待时间。


    **图 16-7**

    锁等待时间计数器分析示例结果


    在调查 `锁等待时间` 时，使用清单 16-20 中的查询来识别哪些索引产生了最多的 `锁等待时间` 非常重要。该信息可在 DMO `sys.dm_db_index_operational_stats`
    或监控表 `dbo.index_operational_stats_history` 中找到。为检查 `锁等待时间` 而需审阅的列是 `row_lock_wait_count`、`row_lock_wait_count`、`row_lock_wait_count`
    和 `page_lock_wait_in_ms`。这些列报告了每个索引的等待次数以及这些等待的时间。正如这些列所表明的，锁存在于行级别和页级别；通常，锁类型之间的变化与索引上的查找和扫描操作相关。


    ### 清单 16-20

    锁等待时间快照查询


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    SUM(row_lock_wait_in_ms) / 1000. AS row_lock_wait_in_sec,

    ISNULL(SUM(row_lock_wait_in_ms) / NULLIF(SUM(row_lock_wait_count), 0) / 1000.,
    0) AS avg_row_lock_wait_in_sec,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    SUM(page_lock_wait_in_ms) / 1000. AS page_lock_wait_in_sec,

    ISNULL(SUM(page_lock_wait_in_ms) / NULLIF(SUM(page_lock_wait_count), 0) / 1000.,
    0) AS avg_page_lock_wait_in_sec

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND database_id <> DB_ID()

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```


    观察快照查询的结果（如图 16-8 所示），有几点需要指出。首先，所有锁都发生在表的页上，而不是行级别。这可能导致更大范围的阻塞，因为被锁定的不仅仅是正在访问的行。此外，平均页锁时间约为
    7 秒。对于大多数环境来说，这是一个过长的锁定时间。基于这些信息，应该对表 `Sales.SalesOrderDetail` 上的聚集索引（`index_id=1`）进行调查。


    ![](img/338675_4_En_16_Fig8_HTML.png)


    一个包含 9 列和 1 行的表格。列标题包括数据库名称、对象名称、索引 id、行锁等待次数、行锁等待秒数、平均行锁等待秒数、页锁等待次数、页锁等待秒数、以及平均页锁等待秒数。


    **图 16-8**

    锁等待时间索引分析示例结果


    当我们需要更深入地研究一个索引及其用法时，下一步是确定哪些执行计划正在使用该索引。然后优化查询或索引以减少锁定。在某些情况下，如果索引对表不关键，更好的做法可能是移除该索引，让其他索引来满足查询需求。

    '
- fmt: '## Lock Waits per Second


    下一个计数器 Lock Waits/sec 的分析方法与 Lock Wait Time (ms) 类似。Lock Waits/sec 计数器测量无法立即满足的锁请求数量。对于这些请求，SQL
    Server 会等待直到行或页可用于锁定，然后才授予锁。与前一个计数器一样，这个计数器也没有关于什么是“好”值的特定准则。对于这些，我们应该参考基线并与之比较，以确定该计数器何时超出了正常的操作边界。


    Lock Waits/sec 的分析包括与 Lock Wait Time (ms) 相同的最小值、最大值、平均值和标准差聚合。这些值针对每个计数器表 `dbo.IndexingCounters`
    和基线表 `dbo.IndexingCountersBaseline` 进行聚合，如清单 [16-21](#338675_4_En_16_Chapter.xhtml#PC21)
    所示。图 [16-9](#338675_4_En_16_Chapter.xhtml#Fig9) 显示了查询的结果。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Waits/sec'', Calculated_Counter_value, NULL)) LockWaits

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Waits/sec''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaits) AS MinLockWait,

    AVG(LockWaits) AS AvgLockWait,

    MAX(LockWaits) AS MaxLockWait,

    STDEV(LockWaits) AS StdDevLockWait

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Waits/sec''

    ORDER BY instance_name,

    CounterDate DESC;

    ```

    清单 16-21 Lock Waits 计数器分析


    有时，如图 [16-9](#338675_4_En_16_Chapter.xhtml#Fig9) 所包含的情况，Lock Wait/sec 并非问题所在，但
    Lock Wait Time(ms) 却存在问题。这些情况指向了长时间的阻塞情况。相反，Lock Wait/sec 对于监控很重要，因为它将指示何时存在大范围的阻塞。阻塞持续时间可能不长，但范围很广；一个长时间的阻塞就可能导致显著的性能问题。


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig9_HTML.png)


    一个页面在结果选项卡下显示了一个表格，被剪切成了两部分。列标题是计数器日期、服务器名称、实例名称、最小锁等待、平均锁等待、最大锁等待时间和标准差锁等待。


    图 16-9 Lock Waits 计数器分析示例结果


    在大范围阻塞的情况下，如 Lock Wait/sec 值较高所指示的那样，分析将需要使用 DMO `sys.dm_db_index_operational_stats`
    来调查索引统计信息。通过监控过程，此信息将存储在表 `dbo.index_operational_stats_history` 中。使用清单 [16-22](#338675_4_En_16_Chapter.xhtml#PC22)
    中的查询，可以确定等待的锁的数量和百分比。与 Lock Wait Time (ms) 一样，此计数器分析也查看行和页级别的统计信息。


    ```sql

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_count) AS row_lock_count,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    ISNULL(SUM(row_lock_wait_count) / NULLIF(SUM(row_lock_count), 0), 0) AS pct_row_lock_wait,

    SUM(page_lock_count) AS page_lock_count,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    ISNULL(SUM(page_lock_wait_count) / NULLIF(SUM(page_lock_count), 0), 0) AS pct_page_lock_wait

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    ```

    清单 16-22 Lock Waits 快照查询


    锁等待百分比高的索引是索引调优的首要目标。通常，当数据库中存在过多的锁等待时，终端用户会感觉到他们的应用程序缓慢，在最坏的情况下，会出现应用程序超时。分析此计数器的目的是识别可以优化的索引，然后调查这些索引被使用的位置。完成此操作后，解决锁产生的原因，并调整索引和查询以减少索引上的锁定。'
  raw: '#### Lock Waits per Second


    The next counter, Lock Waits/sec, has a similar approach for analysis to that
    of Lock Wait Time (ms). With Lock Waits/sec, the counter measures the number of
    lock requests that could not be satisfied immediately. For these requests, SQL
    Server waited until the row or page was available for the lock before granting
    the lock. As with the previous counter, this one does not have any specific guidelines
    on what “good” values are. For these, we should turn to the baseline and compare
    against it to determine when this counter is outside of normal operational boundaries.


    The analysis of Lock Waits/sec includes the same minimum, maximum, average, and
    standard deviation aggregations as used for Lock Wait Time (ms). These values
    are aggregated for both the per-counter table `dbo.IndexingCounters` and the baseline
    table `dbo.IndexingCountersBaseline`, shown in Listing [16-21](#338675_4_En_16_Chapter.xhtml#PC21).
    Figure [16-9](#338675_4_En_16_Chapter.xhtml#Fig9) displays the results from the
    query.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    instance_name,

    MAX(IIF(counter_name = ''Lock Waits/sec'', Calculated_Counter_value, NULL)) LockWaits

    FROM dbo.IndexingCounters

    WHERE counter_name = ''Lock Waits/sec''

    GROUP BY create_date,

    server_name,

    instance_name)

    SELECT CONVERT(VARCHAR(50), MAX(create_date), 101) AS CounterDate,

    server_name,

    instance_name,

    MIN(LockWaits) AS MinLockWait,

    AVG(LockWaits) AS AvgLockWait,

    MAX(LockWaits) AS MaxLockWait,

    STDEV(LockWaits) AS StdDevLockWait

    FROM CounterSummary

    GROUP BY server_name,

    instance_name

    UNION ALL

    SELECT ''Baseline: '' + CONVERT(VARCHAR(50), start_date, 101) + '' --> '' + CONVERT(VARCHAR(50),
    end_date, 101),

    server_name,

    instance_name,

    minimum_counter_value / 1000,

    maximum_counter_value / 1000,

    average_counter_value / 1000,

    standard_deviation_counter_value / 1000

    FROM dbo.IndexingCountersBaseline

    WHERE counter_name = ''Lock Waits/sec''

    ORDER BY instance_name,

    CounterDate DESC;

    Listing 16-21

    Lock Waits Counter Analysis

    ```


    There will be times, such as those included in Figure [16-9](#338675_4_En_16_Chapter.xhtml#Fig9),
    when Lock Wait/sec is not problematic, but there were issues with Lock Wait Time(ms).
    Those cases point to long duration blocking situations. Conversely, Lock Wait/sec
    is important to monitor since it will indicate when there is widespread blocking.
    The blocking may not be long in duration, but it is widespread; a single long
    block can cause significant performance issues.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig9_HTML.png)


    A page presents a table, clipped off into two under the results tab. Column headers
    are counter date, server name, instance name, minimum lock wait, average lock
    wait, max lock wait time, and s t d Dev lock wait.


    Figure 16-9


    Lock Waits counter analysis sample results


    In a situation with widespread blocking, as indicated by high values for Lock
    Wait/sec, the analysis will require investigating the statistics of indexes using
    the DMO `sys.dm_db_index_operational stats`. With the monitoring process, this
    information will be available in the table `dbo.index_operational_stats_history`.
    Using the query in Listing [16-22](#338675_4_En_16_Chapter.xhtml#PC22), the count
    and percentage of locks that wait can be determined. As with Lock Wait Time (ms),
    this counter analysis also looks at statistics at the row and page levels.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    index_id,

    SUM(row_lock_count) AS row_lock_count,

    SUM(row_lock_wait_count) AS row_lock_wait_count,

    ISNULL(SUM(row_lock_wait_count) / NULLIF(SUM(row_lock_count), 0), 0) AS pct_row_lock_wait,

    SUM(page_lock_count) AS page_lock_count,

    SUM(page_lock_wait_count) AS page_lock_wait_count,

    ISNULL(SUM(page_lock_wait_count) / NULLIF(SUM(page_lock_count), 0), 0) AS pct_page_lock_wait

    FROM dbo.index_operational_stats_history oh

    WHERE database_id > 4

    AND (

    row_lock_wait_in_ms > 0

    OR page_lock_wait_in_ms > 0

    )

    GROUP BY database_id,

    object_id,

    index_id;

    Listing 16-22

    Lock Waits Snapshot Query

    ```


    Indexes that have a high percentage of lock waits to locks are prime for index
    tuning. Often, when there are excessive lock waits on a database, the end users
    will see slowness in their applications and, in the worst cases, application timeouts.
    The aim of analyzing this counter is to identify indexes that can be optimized
    and then to investigate where the indexes are being used. Once this is done, address
    the causes for the locks, and tune the indexes and queries to reduce the locking
    on the index.'
