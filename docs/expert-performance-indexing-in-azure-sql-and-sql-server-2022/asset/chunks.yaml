    图 16-17

    识别重叠索引的查询输出


    ### 未索引的外键


    外键对于在数据库中实施约束非常有用。当表之间存在父子关系时，外键提供了一种机制，用于验证子表没有引用不存在的父值。同样，外键确保父值在子值仍在使用时不能被移除（假设没有
    `ON DELETE` 属性）。为了支持这些验证，表之间父值和子值的列需要建立索引。如果其中一方未被索引，SQL Server 就无法通过 Seek 操作来优化该操作，而被迫使用
    Scan 操作来验证值是否存在于相关表中。类似地，如果删除了父行，则需要检查子表中的所有行，以确定是否有行依赖于该值。


    验证外键是否被索引涉及一个与重复索引和重叠索引类似的过程。除了 `sys.indexes` 和 `sys.index_columns` 目录视图外，还使用
    `sys.foreign_key_columns` 视图来提供外键将依赖的索引模板。这些信息在代码清单 16-38 的查询中汇集在一起，在 `AdventureWorks2017`
    数据库上的结果如图 16-18 所示。


    常见的最佳实践是，每个外键都应该被索引。然而，并非每个外键都总是如此。在添加索引之前需要考虑几点。首先，子表中有多少行？如果行数较少，添加索引可能不会带来性能提升。如果列的唯一性相当低，统计信息可能证明扫描每一行是合理的，而不管索引如何。在这些情况下，可以认为如果表的大小很小，索引的成本也很小，添加索引没有什么损失。另一个考虑因素是是否会从表中删除数据，以及需要验证外键的活动何时会发生。对于具有大量列和外键的大表，性能可能会因为需要在表上维护又一个索引而受到影响。这个索引可能很有价值，但它是否足够有价值来证明创建它是合理的？


    虽然这些是为外键创建索引时的良好考虑因素，但在大多数情况下，我们默认会希望为外键创建索引。类似于对聚簇表的建议，为外键创建索引，除非我们有性能文档表明为外键创建索引会对性能产生负面影响。'
- fmt: '## Listing 16-38

    Query to Identify Unindexed Foreign Keys


    ```sql

    WITH cIndexes

    AS (SELECT we.object_id,

    we.name,

    (

    SELECT QUOTENAME(ic.column_id, ''('')

    FROM sys.index_columns ic

    WHERE we.object_id = ic.object_id

    AND we.index_id = ic.index_id

    AND is_included_column = 0

    ORDER BY key_ordinal ASC

    FOR XML PATH('''')

    ) AS indexed_compare

    FROM sys.indexes we),

    cForeignKeys

    AS (SELECT fk.name AS foreign_key_name,

    ''PARENT'' AS foreign_key_type,

    fkc.parent_object_id AS object_id,

    STUFF((

    SELECT '', '' + QUOTENAME(c.name)

    FROM sys.foreign_key_columns ifkc

    INNER JOIN sys.columns c ON ifkc.parent_object_id = c.object_id

    AND ifkc.parent_column_id = c.column_id

    WHERE fk.object_id = ifkc.constraint_object_id

    ORDER BY ifkc.constraint_column_id

    FOR XML PATH('''')

    ),

    1,

    2,

    ''''

    ) AS fk_columns,

    (

    SELECT QUOTENAME(ifkc.parent_column_id, ''('')

    FROM sys.foreign_key_columns ifkc

    WHERE fk.object_id = ifkc.constraint_object_id

    ORDER BY ifkc.constraint_column_id

    FOR XML PATH('''')

    ) AS fk_columns_compare

    FROM sys.foreign_keys fk

    INNER JOIN sys.foreign_key_columns fkc ON fk.object_id = fkc.constraint_object_id

    WHERE fkc.constraint_column_id = 1),

    cRowCount

    AS (SELECT object_id,

    SUM(row_count) AS row_count

    FROM sys.dm_db_partition_stats ps

    WHERE index_id IN ( 1, 0 )

    GROUP BY object_id)

    SELECT QUOTENAME(DB_NAME()),

    QUOTENAME(OBJECT_SCHEMA_NAME(fk.object_id)) + ''.'' + QUOTENAME(OBJECT_NAME(fk.object_id))
    AS ObjectName,

    fk.foreign_key_name,

    fk_columns,

    row_count

    FROM cForeignKeys fk

    INNER JOIN cRowCount rc ON fk.object_id = rc.object_id

    LEFT OUTER JOIN cIndexes we ON fk.object_id = we.object_id

    AND we.indexed_compare LIKE fk.fk_columns_compare + ''%''

    WHERE we.name IS NULL

    ORDER BY row_count DESC,

    OBJECT_NAME(fk.object_id),

    fk.fk_columns;

    ```


    ## Figure 16-18

    Output for query identifying missing foreign key indexes


    A page presents a table under the results tab. Column headers are no column name,
    object name, foreign key name, f k columns, and row count. The adventure works
    2017 under no column name is selected.


    ## Uncompressed Indexes


    As discussed earlier in this chapter and in other parts of the book, it is usually
    beneficial to use some level of compression on indexes. With row compression,
    the indexes generally store fixed-length data as variable length, while page compression
    examines data and reduces duplication to compress further. In many cases, databases
    can be reduced to 25–75 percent of their current size through compression. That
    size reduction increases the amount of data SQL Server can process through the
    CPU. Oftentimes, the additional CPU cost to compress data is more than offset
    by the decrease in CPU effort to process the uncompressed data volume.


    When examining databases for uncompressed indexes, the query in Listing 16-39
    provides a list per database with the filegroup, partition boundary, row count,
    and size for each index. This information is especially useful because it can
    help identify the largest indexes where compression could provide the greatest
    gain. Review the list and determine which indexes to consider compressing, keeping
    in mind whether there are data types, such as `varchar(max)`, that will compress
    poorly and may lead to compression failures, as discussed earlier in this chapter.


    ## Listing 16-39

    Query to Identify Uncompressed Indexes


    ```sql

    WITH partitioning

    AS (SELECT dds.data_space_id,

    dds.partition_scheme_id,

    ds.name,

    dds.destination_id AS partition_number,

    CASE

    WHEN prv.value IS NOT NULL THEN

    CONCAT(

    IIF(pf.boundary_value_on_right = 1, ''Less than '', ''Greater than or equal to
    ''),

    CAST(prv.value AS VARCHAR(MAX))

    )

    WHEN pf.boundary_value_on_right = 1 THEN ''Greater than MAX boundary''

    ELSE ''Less than MIN boundary'' END AS Boundary

    FROM sys.destination_data_spaces AS dds

    INNER JOIN sys.partition_schemes AS ps ON ps.data_space_id = dds.partition_scheme_id

    INNER JOIN sys.partition_functions AS pf ON pf.function_id = ps.function_id

    INNER JOIN sys.data_spaces AS ds ON dds.data_space_id = ds.data_space_id

    LEFT OUTER JOIN sys.partition_range_values AS prv ON pf.function_id = prv.function_id

    AND prv.boundary_id = dds.destination_id)

    SELECT S.name AS schema_name,

    T.name AS table_name,

    I.name AS index_name,

    I.index_id,

    P.partition_number,

    P.data_compression_desc,

    I.type_desc,

    IIF(DS.type_desc = ''PARTITION_SCHEME'', PS.name, DS.name) AS file_group,

    PS.Boundary AS partition_boundary,

    DS.type_desc AS data_space_type,

    P.rows,

    CAST(dps.reserved_page_count * CAST(8 AS FLOAT) / 1024\. AS DECIMAL(20, 3)) AS
    mb_size

    FROM sys.tables AS T

    INNER JOIN sys.schemas AS S ON S.schema_id = T.schema_id

    INNER JOIN sys.indexes AS I ON T.object_id = I.object_id

    INNER JOIN sys.partitions AS P ON I.object_id = P.object_id

    AND I.index_id = P.index_id

    INNER JOIN sys.dm_db_partition_stats AS dps ON P.object_id = dps.object_id

    AND P.index_id = dps.index_id

    AND P.partition_number = dps.partition_number

    LEFT OUTER JOIN partitioning AS PS ON I.data_space_id = PS.partition_scheme_id

    AND P.partition_number = PS.partition_number

    INNER JOIN sys.data_spaces AS DS ON DS.data_space_id = I.data_space_id

    WHERE P.data_compression_desc = ''NONE'';

    GO

    ```


    ## Note


    The DTA is a good tool for determining useful indexes to add to a database. While
    there may be more pride in designing indexes for a database by hand without using
    a tool, it is not practical to ignore useful recommendations. Use the DTA as a
    starting point to discover indexing suggestions that would have taken hours to
    determine without the tool in place.'
