    这些示例已经表明，最左列可用于过滤，而对最右列进行过滤时虽能使用索引，但无法通过查找操作来最优地使用索引。最后的验证是检查索引中既不位于左侧也不位于右侧的列的行为。


    在清单 10-12 中，包含了一个使用索引 `IX_MythFour` 中间列的查询。与之前的示例一样，图 10-6 显示的针对中间列查询的执行计划虽然使用了索引，但也使用了扫描操作。该查询能够使用索引，但由于无法对索引应用有序过滤器，因此无法以最优方式执行。


    ![](img/338675_4_En_10_Fig6_HTML.jpg)


    一个已打开的执行计划选项卡面板，在查询 1 下包含 2 行关于到期日的文本，其查询成本（相对于批处理）为 100%。下方是一个流程图，将索引扫描（非聚集，myth
    four，成本 100%）连接到选择操作（成本 0%）。


    **图 10-6**


    索引中间列的执行计划


    ```sql

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM dbo.MythFour

    WHERE DueDate = ''2011-07-17 00:00:00.000''

    ```


    **清单 10-12**


    使用索引中中间列的查询


    关于多列索引中的列如何被使用的迷思有时可能令人困惑。正如这些示例所示，无论过滤索引的哪一列，查询都可以读取索引，但无法像这样有效地使用索引。要实现这一目标，过滤必须从索引最左侧的列开始。当这不是典型的使用场景时，要么重新排序索引的列，要么在它们对数据库性能至关重要时创建额外的索引。


    ### 迷思 5：聚集索引按物理顺序存储记录


    一个更为普遍存在的迷思是认为聚集索引在磁盘上按物理顺序存储表中的记录。这个迷思似乎主要是由于混淆了存储在页面上的内容与记录在这些页面上的存储位置而产生的。正如第
    2 章所讨论的，数据页和记录之间是有区别的。下面将提供一个演示来消除这个迷思。


    要开始此示例，请执行清单 10-13 中的代码。此代码将创建一个名为 `dbo.MythFive` 的表。然后，它将向该表添加三条记录。脚本的最后部分将使用
    `sys.dm_db_database_page_allocations` 输出该表的页面位置。在此示例中，插入到 `dbo.MythFive` 中的记录所在的页面是页面
    59624，如图 10-7 所示。


    > **注意**

    >

    > 动态管理函数 `sys.dm_db_database_page_allocations` 是 `DBCC IND` 的替代品。此函数在 SQL Server
    2012 中引入，与之前的 DBCC 命令相比，它提供了一个改进的接口来检查数据库中对象的页面分配。


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFive'') IS NOT NULL

    DROP TABLE dbo.MythFive

    CREATE TABLE dbo.MythFive

    (

    RowID int PRIMARY KEY CLUSTERED

    ,TestValue varchar(20) NOT NULL

    );

    GO

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (1, ''FirstRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (3, ''SecondRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (2, ''ThirdRecordAdded'');

    GO

    SELECT database_id, object_id, index_id, extent_page_id, allocated_page_page_id,
    page_type_desc

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.MythFive''),
    1, NULL, ''DETAILED'')

    WHERE page_type_desc IS NOT NULL

    GO

    ```


    **清单 10-13**


    创建并填充 `MythFive` 表


    ![](img/338675_4_En_10_Fig7_HTML.png)


    一个表格有 6 列，分别标记为 database i d、object i d、index i d、extent page i d、allocated page
    page i d 和 page type description，以及 2 行，标记为 1 和 2。


    **图 10-7**


    `sys.dm_db_database_page_allocations` 的输出


    消除这一迷思的证据可以通过 `DBCC PAGE` 命令揭示出来。为此，请使用清单 10-13 中识别的、`page_type_desc` 为 `DATA_PAGE`
    的 `PagePID`。由于此表只有一个数据页，数据将位于该页上。（有关 DBCC 命令的更多信息，请参见第 2 章。）


    在此示例中，清单 10-14 显示了直接查看表中数据所需的 T-SQL。此命令输出大量信息，其中包括一些在此示例中无用的头信息。需要的部分在末尾，即页面的内存转储，如图
    10-8 所示。在内存转储中，记录按其放置在页面上的顺序显示。如从最右列读取的转储所示，记录是按照它们添加到表中的顺序排列的，而不是它们在聚集索引中出现的顺序。


    ![](img/338675_4_En_10_Fig8_HTML.jpg)


    内存转储下的输出展示了一个有 6 列和 12 行条目的表格中的各种数字序列。最后几列中，标记为 first record added 0 的第六和第七行、second
    record added 0 的第八行以及 third record added 的第九和第十行的条目被高亮显示。


    **图 10-8**


    `DBCC PAGE` 输出的页面内容部分


    ```sql

    DBCC TRACEON (3604);

    GO

    DBCC PAGE (AdventureWorks2017, 1, 59624, 2);

    GO

    ```


    **清单 10-14**


    查看 `MythFive` 表中的数据


    基于此证据，很容易辨别聚集索引并不按索引的物理顺序存储记录。如果扩展此示例，将会明显看出页面是按物理顺序排列的，但页面上的行则不是。

