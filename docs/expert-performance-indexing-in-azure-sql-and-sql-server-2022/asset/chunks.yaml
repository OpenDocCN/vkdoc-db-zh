    records inserted. Finally, in the query 5 results, 20,000 records were deleted.
    Interestingly enough, in the results for the last query, the statistics from `CIX_SalesOrderHeaderStats`
    were updated to better reflect the changes in values in the index.


    While `sys.dm_db_stats_properties` doesn’t provide a list of all distinct records
    in a table and the impact that might have on statistics, it does provide details
    that identify the volume of change on an index and the statistics that support
    it. When trying to determine whether an index has statistics that may be out of
    date, this DMO is extremely useful.


    ### sys.dm_db_stats_histogram


    While getting the histogram for statistics can be done with DBCC SHOW_STATISTICS,
    SQL Server 2016 introduced the DMO function sys.dm_db_stats_histogram. This function
    returns output similar to the DBCC command with the added benefit that it can
    be joined with other DMOs to increase the usability of the data. The syntax for
    the function, shown in Listing [5-9](#338675_4_En_5_Chapter.xhtml#PC9), accepts
    an `object_id` and `stats_id` with the columns listed in Table [5-7](#338675_4_En_5_Chapter.xhtml#Tab7)
    returned in the output.


    Table 5-7


    Columns for sys.dm_db_stats_histogram


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the underlying object that the stats belong to.
    |

    | `stats_id` | `int` | ID of the statistics. For indexes, the ID matches the index
    ID. |

    | `step_number` | `int` | Number of steps in the histogram.  Max value is 200.
    |

    | `range_high_key` | sql_variant | Upper-bound column value for a histogram step.
    The column value is also called a *key value*. |

    | `range_rows` | real | Estimated number of rows whose column value falls within
    a histogram step, excluding the upper bound. |

    | `equal_rows` | real | Estimated number of rows whose column value equals the
    upper bound of the histogram step. |

    | `distinct_range_rows` | bigint | Estimated number of rows with a distinct column
    value within a histogram step, excluding the upper bound. |

    | `average_range_rows` | real | Average number of rows with duplicate column values
    in the histogram step, excluding the upper bound (`range_rows/distinct_range_rows
    for distinct_range_rows > 0`). |


    ```

    sys.dm_db_stats_histogram (object_id, stats_id)

    Listing 5-9

    Syntax for sys.dm_db_stats_histogram

    ```


    If sys.stats is combined with sys.dm_db_stats_histogram, as is done in Listing
    [5-10](#338675_4_En_5_Chapter.xhtml#PC10), a histogram for all statistics on Sales.SalesOrderDetail
    can be retrieved. This provides information on all steps and their range values.
    Scroll through the results, shown in Figure [5-7](#338675_4_En_5_Chapter.xhtml#Fig7),
    to rows 163 and 164 to see where the range_high_key value changes from numeric
    to character data with the change between the statistics and steps.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig7_HTML.png)


    A screenshot of query result table of 6 rows and 8 columns. The column headers
    are object I D, stats I D, step number, range high key, range rows, equal rows,
    distinct range rows, and average range rows. The range high key of 163 and 164
    is numerical and alphanumerical data respectively.


    Figure 5-7


    Query results for sys.dm_db_stats_histogram on Sales.SalesOrderDetail


    ```

    USE AdventureWorks2017;

    GO

    SELECT h.object_id,

    h.stats_id,

    h.step_number,

    h.range_high_key,

    h.range_rows,

    h.equal_rows,

    h.distinct_range_rows,

    h.average_range_rows

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_histogram(s.object_id, s.stats_id) h

    WHERE s.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-10

    sys.dm_db_stats_histogram Query for Sales.SalesOrderDetail

    ```


    This new function is an excellent tool to view and inspect histograms. For example,
    if there were multiple indexes and statistics on a column, a query could be written
    that includes just those statistics and filter the range_high_key to only include
    the steps that match the records needed. At that point, the average_range_rows
    are available and provide an understanding of why SQL Server may have chosen one
    index over another.'
  trans: '

    # 准备用于 `sys.dm_db_stats_properties` 审查的表


    `USE AdventureWorks2017`

    `GO`

    `DROP TABLE IF EXISTS dbo.SalesOrderHeaderStats;`

    `SELECT SalesOrderID`

    `,OrderDate`

    `,SalesOrderNumber`

    `INTO dbo.SalesOrderHeaderStats`

    `FROM Sales.SalesOrderHeader`

    `WHERE SalesOrderID <= 63658`

    `CREATE CLUSTERED INDEX CIX_SalesOrderHeaderStats`

    `ON dbo.SalesOrderHeaderStats(SalesOrderID)`

    `CREATE INDEX CIX_SalesOrderHeaderStats_OrderDate`

    `ON dbo.SalesOrderHeaderStats(OrderDate)`

    `CREATE INDEX CIX_SalesOrderHeaderStats_SalesOrderNumber`

    `ON dbo.SalesOrderHeaderStats(SalesOrderNumber)`


    有了可操作的表后，就可以更改表中的数据，并观察这些更改对统计信息的影响。在示例中，将使用五个不同的查询，如代码清单 5-8 所示。第一个查询更新了 `OrderDate`
    列，导致 40 行数据被更改。第二个查询更新了 50 行，其中 `SalesOrderNumber` 被设置为其当前值。第三个查询再次更新 `SalesOrderNumber`
    列，但对相同的 50 行数据进行了值反转。第四个查询向表中插入了 11,465 条记录。最后一个查询从表中删除了前 20,000 条记录。在每个查询之间，执行代码清单
    5-7 中的代码；这样做将提供统计信息详情，如图 5-6 的输出所示。


    ![](img/338675_4_En_5_Fig6_HTML.jpg)


    **图 5-6** 针对 `dbo.SalesOrderHeaderStats` 上的示例查询，`sys.dm_db_stats_properties` 的查询结果


    # 在 dbo.SalesOrderHeaderStats 上的示例 DML 查询


    ```sql

    USE AdventureWorks2017

    GO

    UPDATE dbo.SalesOrderHeaderStats

    set OrderDate = GETDATE()

    WHERE SalesOrderID % 500 = 1

    --执行代码清单 5-7 中的代码

    UPDATE dbo.SalesOrderHeaderStats

    SET SalesOrderNumber = SalesOrderNumber

    WHERE SalesOrderID % 400 = 1

    --执行代码清单 5-7 中的代码

    UPDATE dbo.SalesOrderHeaderStats

    SET SalesOrderNumber = REVERSE(SalesOrderNumber)

    WHERE SalesOrderID % 400 = 1

    --执行代码清单 5-7 中的代码

    SET IDENTITY_INSERT dbo.SalesOrderHeaderStats ON

    INSERT INTO dbo.SalesOrderHeaderStats (SalesOrderID

    ,OrderDate

    ,SalesOrderNumber)

    SELECT SalesOrderID

    ,OrderDate

    ,SalesOrderNumber

    FROM Sales.SalesOrderHeader

    WHERE SalesOrderID > 63658

    SET IDENTITY_INSERT dbo.SalesOrderHeaderStats OFF

    --执行代码清单 5-7 中的代码

    DELETE FROM dbo.SalesOrderHeaderStats

    WHERE SalesOrderID <= 63658

    --执行代码清单 5-7 中的代码

    ```


    回顾图 5-6 中的结果，可以深入了解 `modification_counter` 列是如何填充的。任何插入、更新或删除操作都被视为对索引和统计信息的一次更改。查看查询
    1 的结果，更改的 40 行导致 `CIX_SalesOrderHeaderStats_OrderDate` 的 `modification_counter`
    值增加到 40。类似地，当查询 2 和 3 中更改了 `SalesOrderNumber` 时，每个查询都导致 `modification_counter`
    增加了 50，无论值是否实际发生了变化。增加记录数导致所有三个索引的 `modification_counter` 值都增加了 11,465，这与插入的记录数一致。最后，在查询
    5 的结果中，删除了 20,000 条记录。有趣的是，在最后一个查询的结果中，`CIX_SalesOrderHeaderStats` 的统计信息被更新，以更好地反映索引中值的变化。


    虽然 `sys.dm_db_stats_properties` 不提供表中所有不同记录的列表及其对统计信息可能产生的影响，但它确实提供了详细信息，可用于识别索引及其支持统计信息的变化量。当试图确定索引的统计信息是否可能过时时，这个
    DMO 非常有用。


    ## sys.dm_db_stats_histogram


    虽然可以使用 `DBCC SHOW_STATISTICS` 获取统计信息的直方图，但 SQL Server 2016 引入了 DMO 函数 `sys.dm_db_stats_histogram`。该函数返回与
    `DBCC` 命令类似的输出，其额外优点是可以与其他 DMO 连接，以提高数据的可用性。该函数的语法如代码清单 5-9 所示，它接受一个 `object_id`
    和 `stats_id`，输出中返回的列如表 5-7 所列。


    ### 表 5-7

    `sys.dm_db_stats_histogram` 的列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 统计信息所属基础对象的 ID。 |

    | `stats_id` | `int` | 统计信息的 ID。对于索引，此 ID 与索引 ID 匹配。 |

    | `step_number` | `int` | 直方图中的步骤编号。最大值为 200。 |

    | `range_high_key` | `sql_variant` | 直方图步骤的上限列值。该列值也称为 *键值*。 |

    | `range_rows` | `real` | 列值落在直方图步骤范围内（不包括上限）的估计行数。 |

    | `equal_rows` | `real` | 列值等于直方图步骤上限的估计行数。 |

    | `distinct_range_rows` | `bigint` | 在直方图步骤范围内（不包括上限）具有不同列值的估计行数。 |

    | `average_range_rows` | `real` | 在直方图步骤范围内（不包括上限）具有重复列值的平均行数（当 `distinct_range_rows
    > 0` 时为 `range_rows/distinct_range_rows`）。 |


    ### 代码清单 5-9

    `sys.dm_db_stats_histogram` 的语法


    ```sql

    sys.dm_db_stats_histogram (object_id, stats_id)

    ```


    如果将 `sys.stats` 与 `sys.dm_db_stats_histogram` 结合使用，如代码清单 5-10 所示，则可以检索 `Sales.SalesOrderDetail`
    上所有统计信息的直方图。这提供了所有步骤及其范围值的信息。滚动浏览如图 5-7 所示的结果，到第 163 和 164 行，可以看到 `range_high_key`
    值从数字数据变为字符数据，这与统计信息和步骤之间的变化相对应。


    ![](img/338675_4_En_5_Fig7_HTML.png)


    **图 5-7** 在 `Sales.SalesOrderDetail` 上查询 `sys.dm_db_stats_histogram` 的结果


    ### 代码清单 5-10

    针对 `Sales.SalesOrderDetail` 的 `sys.dm_db_stats_histogram` 查询


    ```sql

    USE AdventureWorks2017;

    GO

    SELECT h.object_id,

    h.stats_id,

    h.step_number,

    h.range_high_key,

    h.range_rows,

    h.equal_rows,

    h.distinct_range_rows,

    h.average_range_rows

    FROM sys.stats s

    CROSS APPLY sys.dm_db_stats_histogram(s.object_id, s.stats_id) h

    WHERE s.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    ```


    这个新函数是查看和检查直方图的绝佳工具。例如，如果一个列上有多个索引和统计信息，可以编写一个查询，仅包含这些统计信息，并筛选 `range_high_key`
    以仅包含匹配所需记录的步骤。此时，`average_range_rows` 是可用的，并有助于理解为什么 SQL Server 可能选择一个索引而非另一个。

