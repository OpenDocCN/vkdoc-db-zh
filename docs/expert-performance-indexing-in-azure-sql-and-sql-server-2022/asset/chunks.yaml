- fmt: 'These examples have shown that the leftmost column can be used for filtering
    and that filtering on the rightmost column can use the index but cannot use it
    optimally with a seek operation. The last validation is to check the behavior
    of columns in an index that are neither on the left nor right side.


    In Listing 10-12, a query is included that uses the middle column in the index
    `IX_MythFour`. As with the previous example, the execution plan for the middle
    column query, shown in Figure 10-6, uses the index but also uses a scan operation.
    The query is able to use the index, but because it was unable to apply an ordered
    filter to the index, it could not be applied in an optimal fashion.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig6_HTML.jpg)


    A panel of an opened execution plan tab contains 2 lines of text for due date
    under query 1 with query cost, relative to the batch, at 100%. Below is a flow
    diagram connecting index scan, nonclustered, myth four, at 100% cost to select
    at 0% cost.


    **Figure 10-6**


    Execution plan for the middle column in an index


    ```sql

    USE AdventureWorks2017

    GO

    SELECT DueDate FROM dbo.MythFour

    WHERE DueDate = ''2011-07-17 00:00:00.000''

    ```


    **Listing 10-12**


    Query Using the Middle Column in the Index


    The myth of how columns in a multicolumn index can be used is one that can sometimes
    be confusing. As the examples showed, queries can read the index regardless of
    which columns of the index are being filtered, but cannot effectively use the
    index like this. To accomplish this goal, filtering must start with columns on
    the leftmost side of the index. When that isn’t the typical use case, either reorder
    the columns of the index or create additional indexes if their use is critical
    to database performance.


    ### Myth 5: Clustered Indexes Store Records in Physical Order


    One of the more pervasive myths commonly held is the idea that a clustered index
    stores the records in a table in their physical order when on disk. This myth
    seems to be primarily driven by confusion between what is stored on a page and
    where records are stored on those pages. As discussed in Chapter 2, there is a
    difference between data pages and records. A demonstration will be provided that
    dispels this myth.


    To begin this example, execute the code in Listing 10-13. This code will create
    a table named `dbo.MythFive`. Then, it will add three records to the table. The
    last part of the script will output, using `sys.dm_db_database_page_allocations`,
    the page location for the table. In this example, the page with the records inserted
    into `dbo.MythFive` is page 59624, as shown in Figure 10-7.


    > **Note**

    >

    > The dynamic management function `sys.dm_db_database_page_allocations` is a replacement
    for `DBCC IND`. This function, introduced in SQL Server 2012, provides an improved
    interface to examining page allocations for objects in a database over its DBCC
    predecessor.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythFive'') IS NOT NULL

    DROP TABLE dbo.MythFive

    CREATE TABLE dbo.MythFive

    (

    RowID int PRIMARY KEY CLUSTERED

    ,TestValue varchar(20) NOT NULL

    );

    GO

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (1, ''FirstRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (3, ''SecondRecordAdded'');

    INSERT INTO dbo.MythFive (RowID, TestValue) VALUES (2, ''ThirdRecordAdded'');

    GO

    SELECT database_id, object_id, index_id, extent_page_id, allocated_page_page_id,
    page_type_desc

    FROM sys.dm_db_database_page_allocations(DB_ID(), OBJECT_ID(''dbo.MythFive''),
    1, NULL, ''DETAILED'')

    WHERE page_type_desc IS NOT NULL

    GO

    ```


    **Listing 10-13**


    Create and Populate the `MythFive` Table


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig7_HTML.png)


    A table has 6 columns labeled database i d, object i d, index i d, extent page
    i d, allocated page page i d, and page type description and 2 rows labeled 1 and
