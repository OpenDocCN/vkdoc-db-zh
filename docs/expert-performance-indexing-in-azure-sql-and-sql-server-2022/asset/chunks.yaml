    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.row_lock_count

    ,ios.row_lock_wait_count

    ,ios.row_lock_wait_in_ms

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    Listing 5-30

    Query for Row Locks in sys.dm_db_index_operational_stats

    ```


    #### Page Lock


    The next set of columns are the page lock columns. The columns in this group have
    similar characteristics to the row lock columns, with the exception that they
    are scoped at the page level instead of the row level. For every page that relates
    to an accessed row, a page lock is acquired. These columns are `page_lock_count`,
    `page_lock_wait_count`, and `page_lock_wait_in_ms`. When monitoring for locking
    contention on an index, it is important to look at both page and row levels to
    identify whether the contention is on the individual rows being accessed or different
    rows accessed on the same page.


    To review the differences, continue with the query from Listing [5-29](#338675_4_En_5_Chapter.xhtml#PC29)
    and retrieve the page lock statistics that were collected in `sys.dm_db_index_operational_stats`
    for the query. This information is available using the script in Listing [5-31](#338675_4_En_5_Chapter.xhtml#PC31).
    The results are a bit different than those for the row locks. For the page locks,
    see Figure [5-22](#338675_4_En_5_Chapter.xhtml#Fig22); there are only two page
    locks on the index `IX_SalesOrderDetail_ProductID`. In addition, there are 44
    page locks on `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`, which did
    not encounter any row locks.


