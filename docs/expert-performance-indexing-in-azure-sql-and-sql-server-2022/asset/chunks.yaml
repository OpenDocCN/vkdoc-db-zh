    ## Statistics Columns


    `sys.dm_db_column_store_row_group_physical_stats` 的统计列提供了列存储索引的大量元数据，有助于理解其结构的构建方式。表
    **5-26** 中定义的统计信息为管理列存储索引提供了必要的洞察。例如，`total_rows` 和 `deleted_rows` 可用于确定行组中仍然有效的部分。在某些情况下，对行组进行激进的修改可能会在表中留下空行组。当行组小于
    `2^(20)` 行时，`state`、`trim_reason` 和 `transition_to_compressed` 信息可以帮助识别行组是如何被压缩的。例如，如果有大量由于
    `BULKLOAD` 而关闭的小行组，重建这些行组或修改加载过程以尝试在每次插入操作中插入更多行可能是有价值的。


    **表 5-26**


    `sys.dm_db_column_store_row_group_physical_stats` 中的统计列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `state` | `tinyint` | 与 `state_desc` 关联的 ID 号。 |

    | `state_desc` | `nvarchar(60)` | 行组状态的描述，可以是 `INVISIBLE`、`OPEN`、`CLOSED`、`COMPRESSED`
    或 `TOMBSTONE`。 |

    | `total_rows` | `bigint` | 行组中行的完整计数，包括任何被标记为删除的行。 |

    | `deleted_rows` | `bigint` | 行组中被标记为要删除的行数。 |

    | `size_in_bytes` | `bigint` | 行组的大小（字节）。 |

    | `trim_reason` | `tinyint` | 与 `trim_reason_desc` 关联的 ID 号。 |

    | `trim_reason_desc` | `nvarchar(60)` | 描述压缩行组行数少于一百万行最大值的原因，可以是 `NO_TRIM`、`BULKLOAD`、`ROERG`、`DICTIONARY
    SIZE`、`MEMORY LIMITATION`、`RESIDUAL ROW GROUP`、`STATS MISMATCH` 或 `SPILLOVER`。
    |

    | `transition_to_compressed_state` | `tinyint` | 与 `transition_to_compressed_state_desc`
    关联的 ID 号。 |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | 描述行组如何从增量存储转换为行组，包括
    `NOT APPLICABLE`、`INDEX BUILD`、`TUPLE MOVER`、`REORG NORMAL`、`REORG FORCED`、`BULKLOAD`
    或 `MERGE`。 |

    | `has_vertipaq_optimization` | `bit` | 布尔值，标识压缩过程中是否使用了 Vertipaq 优化。此功能大大提高了列存储压缩的效率。
    |

    | `generation` | `bigint` | 与此行组关联的行组代。 |

    | `created_time` | `datetime2` | 创建此行组时的时钟时间。 |

    | `closed_time` | `datetime2` | 关闭此行组时的时钟时间。 |


    ## Columnstore Operational Stats


    列存储索引操作统计信息由 DMO `sys.dm_db_column_store_row_group_operational_stats` 提供。此 DMO
    也返回列存储索引中每个行组的一行。如果表已分区，则将返回每个分区的每个行组一行。


    ### Header Columns


    `sys.dm_db_column_store_row_group_operational_stats` 的头列类似于列存储物理统计 DMO 的头列。不同之处在于没有对增量存储的引用。此
    DMO 返回列 `object_id`、`index_id`、`partition_number` 和 `row_group_id`。这些列在表 **5-27**
    中定义。


    **表 5-27**


    `sys.dm_db_column_store_row_group_operational_stats` 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 定义索引的表或视图的 ID |

    | `index_id` | `int` | 索引的 ID |

    | `partition_number` | `int` | 索引或堆内的 1 基分区号 |

    | `row_group_id` | `bigint` | 行组的 ID |


    ### Statistics Columns


    在表 **5-28** 中定义的列中，包含了关于行组扫描次数、删除位图被扫描次数以及列存储分区被扫描次数的详细信息。这些详细信息识别了与索引的其余部分相比，每个行组被访问的频率，以及删除位图被查询的频率，描绘了数据如何写入每个行组。


    此外，还可以测量对行组可访问性产生负面影响的锁和阻塞事务，从而深入了解何时存在需要解决的潜在 I/O 或事务瓶颈。


    **表 5-28**


    `sys.dm_db_column_store_row_group_operational_stats` 中的统计列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `scan_count` | `int` | 自上次 SQL 重启以来扫描行组的次数。 |

    | `delete_buffer_scan_count` | `int` | 使用删除缓冲区确定此行组中已删除行的次数。这包括访问内存中的哈希表和底层的 B
    树。 |

    | `index_scan_count` | `int` | 扫描列存储索引分区的次数。对于分区中的所有行组，此值相同。 |

    | `rowgroup_lock_count` | `bigint` | 自上次 SQL 重启以来，此行组锁请求的累计计数。 |

    | `rowgroup_lock_wait_count` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计次数。 |

    | `rowgroup_lock_wait_in_ms` | `bigint` | 自上次 SQL 重启以来，数据库引擎在此行组锁上等待的累计毫秒数。 |


    ## Summary


    本章广泛介绍了 SQL Server 中与索引相关的统计信息。这些信息为深入了解 SQL Server 中索引这一广泛主题打开了一扇窗口。在接下来的章节中，将利用这些信息，通过查看已捕获的统计数据并使用它们来改进索引创建、使用和维护的各个方面。


    # 6. XML Indexes


    过去几章重点介绍了对通常称为*结构化数据*的索引，其中数据及其存储具有通用的模式和组织。在本章和接下来的几章中，索引的重点将转向非结构化和半结构化数据。对于结构化和非结构化数据，索引的任务都是为了获得检索和操作数据的最佳效率，但表示这些类型的数据的数据类型在数据库中的存储方式存在差异。这些差异决定了索引的实现方式以及查询优化器如何使用索引。


    SQL Server 有一个专门的数据类型来存储最常见的非结构化和半结构化数据类型——XML。本章探讨 SQL Server 为优化 XML 数据提供的索引类型。本章还将展示这些索引对可针对
    XML 数据编写的查询类型的影响（使用 XQuery），以及对优化器所做选择的影响。


    ## XML Data


    可扩展标记语言（XML）在 20 世纪 90 年代开发，并于 1998 年 2 月被万维网联盟采纳为标准。多年来，XML 数据一直存储在数据库中，但在 SQL
    Server 2005 之前，它没有专门的数据类型或访问方法。当引入时，XML 数据类型扩展了 SQL Server 的功能，以适当地管理这种不同的数据结构。随着
    XML 的接受，SQL Server 数据库中 XML 内容的使用和总量有所增长。这种增长是由 XML 为应用程序开发人员提供的优势所推动的。'
  raw: '#### Statistics Columns


    The statistics columns for sys.dm_db_column_store_row_group_physical_stats provide
    extensive metadata for a columnstore index that can assist in understanding how
    its structure has been built. The statistics, defined in Table [5-26](#338675_4_En_5_Chapter.xhtml#Tab26),
    provide insight necessary for managing a columnstore index. For example, total_rows
    and deleted_rows can be used to determine the portion of a rowgroup that is still
    active. In some cases, aggressive modifications on a rowgroup could leave empty
    rowgroups within tables. When rowgroups are smaller than 2^(20) rows, the state,
    trim reason, and transition to compressed information can help identify how rowgroups
    are being compressed. For example, if there are a large number of small rowgroups
    that are being closed due to BULKLOAD, it may be worthwhile to rebuild those rowgroups
    or make modification to the load process to try and insert more rows per insert
    operation.


    Table 5-26


    Stats Columns in sys.dm_db_column_store_row_group_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `state` | `tinyint` | ID number associated with state_desc. |

    | `state_desc` | `nvarchar(60)` | Description of the rowgroup state, which can
    be INVISIBLE, OPEN, CLOSED, COMPRESSED, or TOMBSTONE. |

    | `total_rows` | `bigint` | Full count of rows in the rowgroup including any row
    that has been marked deleted. |

    | `deleted_rows` | `bigint` | Number of rows in the rowgroup marked for deletion.
    |

    | `size_in_bytes` | `bigint` | Size of the rowgroup in bytes. |

    | `trim_reason` | `tinyint` | ID number associated with the trim_reason_desc.
    |

    | `trim_reason_desc` | `nvarchar(60)` | Description of why a COMPRESSED rowgroup
    has less than the million-row maximum of rows, which can be NO_TRIM, BULKLOAD,
    ROERG, DICTIONARY SIZE, MEMORY LIMITATION, RESIDUAL ROW GROUP, STATS MISMATCH,
    or SPILLOVER. |

    | `transition_to_compressed_state` | `tinyint` | ID number associated with the
    transition_to_compressed_state_desc. |

    | `transition_to_compressed_state_desc` | `nvarchar(60)` | Description of how
    the rowgroup transitions from a deltastore to a rowgroup, which includes NOT APPLICABLE,
    INDEX BUILD, TUPLE MOVER, REORG NORMAL, REORG FORCED, BULKLOAD, or MERGE. |

    | `has_vertipaq_optimization` | `bit` | Boolean identifying whether Vertipaq optimization
    was used during compression.  This feature greatly improves the efficiency of
    columnstore compression. |

    | `generation` | `bigint` | Rowgroup generation associated with this rowgroup.
    |

    | `created_time` | `datetime2` | Clock time for when this rowgroup was created.
    |

    | `closed_time` | `datetime2` | Clock time for when this rowgroup was closed.
    |


    ### Columnstore Operational Stats


    Columnstore index operational statistics are provided by the DMO sys.dm_db_column_store_row_group_operational_stats.
    This DMO also returns one row per rowgroup within a columnstore index. If the
    table is partitioned, then a row per rowgroup per partition will be returned.


    #### Header Columns


    The header columns for sys.dm_db_column_store_row_group_operational_stats are
    similar to those of the columnstore physical stats DMO. The exception is that
    there are no references to the deltastore. This DMO returns the columns `object_id`,
    `index_id`, `partition_number`, and `row_group_id`. These columns are defined
    in Table [5-27](#338675_4_En_5_Chapter.xhtml#Tab27).


    Table 5-27


    Header Columns in sys.dm_db_column_store_row_group_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | object_id | int | ID of the table or view on which the index is defined |

    | index_id | int | ID of the index |

    | partition_number | int | 1-based partition number within the index or heap |

    | row_group_id | bigint | ID of the rowgroup |


    #### Statistics Columns


    In these columns, defined in Table [5-28](#338675_4_En_5_Chapter.xhtml#Tab28),
    there are details about the number of scans for the rowgroup, the number of times
    the delete bitmap was scanned, and the number of times the partition for the columnstore
    was scanned. These details identify how frequently each rowgroup is accessed when
    compared with the rest of the index, as well as how often the delete bitmap is
    consulted, painting a picture of how data is written to each rowgroup.


    Additionally, locks and blocking transactions that negatively impact the accessibility
    of the rowgroup can be measured, providing insight into when there are potential
    I/O or transactional bottlenecks that need to be addressed.


    Table 5-28


    Stats Columns in sys.dm_db_column_store_row_group_operational_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | scan_count | int | Number of scans through the rowgroup since the last SQL restart.
    |

    | delete_buffer_scan_count | int | Number of times the delete buffer was used
    to determine deleted rows in this rowgroup. This includes accessing the in-memory
    hashtable and the underlying B-tree. |

    | index_scan_count | int | Number of times the columnstore index partition was
    scanned. This is the same for all rowgroups in the partition. |

    | rowgroup_lock_count | bigint | Cumulative count of lock requests for this rowgroup
    since the last SQL restart. |

    | rowgroup_lock_wait_count | bigint | Cumulative number of times the database
    engine waited on this rowgroup lock since the last SQL restart. |

    | rowgroup_lock_wait_in_ms | bigint | Cumulative number of milliseconds the database
    engine waited on this rowgroup lock since the last SQL restart. |


    ## Summary


    This chapter provided an extensive look at the statistical information available
    in SQL Server that relates to indexes. This information provides a window into
    what will be an extensive journey into indexing in SQL Server. In upcoming chapters,
    this information will be leveraged by looking at the statistics that have been
    captured and using them to improve all aspects of index creation, usage, and maintenance.


    # 6. XML Indexes


    The past couple chapters focused on indexing what is commonly referred to as *structured
    data*, where there is a common schema and organization around the data and its
    storage. In this chapter and the next few chapters, the indexing focus shifts
    to unstructured and semistructured data. With both structured and unstructured
    data, the task of indexing is to gain optimal efficiency for retrieving and manipulating
    it, but the data types that represent these types of data have differences in
    how they are stored in the database. These differences dictate how and why indexing
    is implemented as well as how the indexes are used by the query optimizer.


    SQL Server has a specialized data type for storing the most common type of unstructured
    and semistructured data, XML. This chapter explores the types of indexes offered
    by SQL Server for optimizing XML data. The chapter will also show the impact of
    those indexes on the types of queries that can be written against XML data using
    XQuery and the impact on the choices made by the optimizer.


    ## XML Data


    Extensible Markup Language (XML) was developed during the 1990s and adopted as
    a standard by the World Wide Web Consortium in February 1998. XML data has been
    stored in databases for years, but until SQL Server 2005, it did not have a dedicated
    data type or access methods. When introduced, the XML data type extended the capabilities
    of SQL Server to appropriately manage this different data structure. With the
    acceptance of XML, the use and size of the total XML content within SQL Server
    databases grew. The growth was spurred by the advantages that XML offered application
    developers.'
