    所示。


    表 5-23


    sys.dm_db_index_physical_stats 的行统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `page_count` | `bigint` | 索引或数据页的总数 |

    | `record_count` | `bigint` | 记录总数 |

    | `ghost_record_count` | `bigint` | 在分配单元中准备由后台清理任务移除的幽灵记录数 |

    | `version_ghost_record_count` | `bigint` | 在分配单元中由未完成的快照隔离事务保留的幽灵记录数 |

    | `min_record_size_in_bytes` | `int` | 最小记录大小（以字节为单位） |

    | `max_record_size_in_bytes` | `int` | 最大记录大小（以字节为单位） |

    | `avg_record_size_in_bytes` | `float` | 平均记录大小（以字节为单位） |

    | `forwarded_record_count` | `bigint` | 堆中指向另一个数据位置的前向指针记录数 |

    | `compressed_page_count` | `bigint` | 压缩页的数量 |


    首先值得关注的列是 `ghost_record_count` 和 `version_ghost_record_count`。这些列提供了在 `sys.dm_db_index_operational_stats`
    中找到的 `ghost_record_count` 的细分信息。


    接下来要检查的列是 `forwarded_record_count`。该列提供了堆中前向记录的数量统计。这也在 `sys.dm_db_index_operational_stats`
    中通过 `forwarded_fetch_count` 列被引用过。在那个 DMF 中，该计数提供了访问前向记录的次数。而在 `sys.dm_db_index_physical_stats`
    中，该计数指的是表中存在的前向记录的数量。


    最后要查看的列是 `compressed_page_count`。压缩页计数提供了索引中所有已被压缩的页的数量。这有助于衡量通过 `PAGE` 级压缩来压缩页的价值。


    ### Fragmentation Statistics


    该 DMF 中最后一组统计信息是碎片统计信息。毫无疑问，碎片详细信息是大多数人使用 `sys.dm_db_index_physical_stats` 的原因。当在索引中插入或修改行，导致该行不再适合其本应所在的页面时，索引中就会发生碎片。当这种情况发生时，页面会分裂，将一半的数据从一页移动到另一页。由于在分裂的页面之后通常没有连续的可用页面，这些数据会被移动到一个可用的空闲页面。这导致了索引中页面预期连续的位置出现间隙，阻碍了
    SQL Server 在磁盘上读取索引时完成顺序读取。


    有四个列（如表 [5-24](#338675_4_En_5_Chapter.xhtml#Tab24) 所示）提供了分析索引中碎片状态所需的信息。这些列各自有助于提供碎片程度的视图，并帮助确定如何缓解碎片。


    表 5-24


    sys.dm_db_index_physical_stats 的碎片统计信息列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | 索引的逻辑碎片或堆在 `IN_ROW_DATA` 分配单元中的范围碎片
    |

    | `fragment_count` | `bigint` | `IN_ROW_DATA` 分配单元叶级中的片段数量 |

    | `avg_fragment_size_in_pages` | `float` | `IN_ROW_DATA` 分配单元叶级中每个片段的平均页数 |

    | `avg_page_space_used_in_percent` | `float` | 所有页面中已用可用数据存储空间的平均百分比 |


    第一个碎片列是 `avg_fragmentation_in_percent`。该列提供了索引的碎片百分比。随着碎片增加，SQL Server 从索引中检索数据所需的物理
    I/O 操作量可能会增加。利用该列，可以构建一个通过重建或重组索引来缓解碎片的流程。碎片非常严重（30% 或更多）的索引可能受益于重建，而碎片较少的索引可能受益于重组。在设计索引维护流程时，考虑表的目的和使用情况非常重要，因为没有可以盲目应用于所有索引的规则。这将在第
    [9](#338675_4_En_9_Chapter.xhtml) 章中进一步讨论。


    下一列 `fragment_count` 提供了索引中所有片段的计数。对于索引中创建的每个片段，该列将汇总其页面的计数。


    第三列是 `avg_fragment_size_in_pages`。该列代表每个片段中的平均页数。该值越高，且越接近 `page_count`，SQL Server
    读取数据所需的 I/O 就越少。


    最后一列是 `avg_page_space_used_in_percent`。该列提供了页面上可用空间的使用量。DML 活动少的索引应尽可能接近 100%。如果索引上没有预期的更新，目标应该是使索引尽可能紧凑。


    ### Index Physical Stats Summary


    查看 `sys.dm_db_index_physical_stats` 的主要目的是帮助指导索引维护。通过此 DMF，可以分析索引各个级别的统计信息。利用这些信息，可以确定索引每个级别所需进行的维护量。无论是需要对索引进行碎片整理、修改填充因子，还是填充索引，`sys.dm_db_index_physical_stats`
    中的信息都可以指导此活动。


    ### Columnstore Statistics


    列存储索引使用的结构与典型的 B 树或堆（也称为行存储）截然不同。因此，针对这些索引收集的统计信息存在一些差异，这些差异与底层架构及其访问方式有关。为了提供这些不同方面的可见性，有两个
    DMO 专注于列存储统计信息的物理和操作统计信息。


    ### Columnstore Physical Stats


    首先要考虑的元数据是列存储索引上收集的物理统计信息。这些信息可以通过 DMO `sys.dm_db_column_store_row_group_physical_stats`
    访问。该 DMO 在列存储索引中的每个行组对应一行。如果表已分区，则每个分区中的每个行组将有一行。


    #### Header Columns


    由于每个行组对应一行，每行将包含 `object_id`、`index_id`、`partition_number`、`row_group_id` 和 `delta_store_hobt_id`。这些列在表
    [5-25](#338675_4_En_5_Chapter.xhtml#Tab25) 中有进一步定义。与其他索引类似，`partition_number`
    验证了列存储索引可以被分区。对于未分区的列存储索引，分区号将为 1。


    表 5-25


    sys.dm_db_column_store_row_group_physical_stats 中的 Header Columns


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `object_id` | `int` | 定义索引的表或视图的 ID。 |

    | `index_id` | `int` | 索引的 ID。 |

    | `partition_number` | `int` | 索引或堆中的基于 1 的分区号。 |

    | `row_group_id` | `bigint` | 行组的 ID。 |

    | `delta_store_hobt_id` | `bigint` | 行组 deltastore 的 hobt_id。如果为 NULL，则该行组没有关联的
    deltastore。 |'
  raw: '### Row Statistics


    The second group of columns in `sys.dm_db_index_physical_stats` are the row statistics
    columns. These columns provide details about the rows contained in the index,
    shown in Table [5-23](#338675_4_En_5_Chapter.xhtml#Tab23).


    Table 5-23


    Row Statistics Columns for sys.dm_db_index_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | page_count | `bigint` | Total number of index or data pages |

    | record_count | `bigint` | Total number of records |

    | ghost_record_count | `bigint` | Number of ghost records ready for removal by
    the ghost cleanup task in the allocation unit |

    | version_ghost_record_count | `bigint` | Number of ghost records retained by
    an outstanding snapshot isolation transaction in an allocation unit |

    | min_record_size_in_bytes | `int` | Minimum record size in bytes |

    | max_record_size_in_bytes | `int` | Maximum record size in bytes |

    | avg_record_size_in_bytes | `float` | Average record size in bytes |

    | forwarded_record_count | `bigint` | Number of records in a heap that have forward
    pointers to another data location |

    | compressed_page_count | `bigint` | The number of compressed pages |


    The first items of interest are the columns `ghost_record_count` and `version_ghost_record_count`.
    These columns provide a breakdown of the `ghost_record_count` found in `sys.dm_db_index_operational_stats`.


    The next column to check is `forwarded_record_count`. This column provides an
    accounting to the number of forwarded records in a heap. This was also referenced
    in `sys.dm_db_index_operational_stats` with the `forwarded_fetch_count` column.
    In that DMF, the count provides the number of times that forwarded records were
    accessed. In `sys.dm_db_index_physical_stats`, the count refers to the number
    of forwarded records that exist within the table.


    The last column to look at is `compressed_page_count`. The compressed page count
    provides a count of all the pages in an index that have been compressed. This
    helps provide a measure of value in having pages compressed by `PAGE`-level compression.


    ### Fragmentation Statistics


    The last group of statistics in the DMF are the fragmentation statistics. By far,
    fragmentation details are why most people make use of `sys.dm_db_index_physical_stats`.
    Fragmentation occurs in indexes when rows are inserted or modified in an index
    where the row no longer fits on the page where the index should be placed. When
    this happens, the page is split to move half of the data on one page onto another.
    Since there typically is not a contiguous page available after the page that has
    been split, it gets moved to an available free page. This results in gaps in an
    index where pages are expected to be continuous, preventing SQL Server from completing
    sequential reads while reading an index on disk.


    There are four columns, shown in Table [5-24](#338675_4_En_5_Chapter.xhtml#Tab24),
    that provide the information needed to analyze the state of fragmentation within
    an index. Each of these helps provide a view on the extent of the fragmentation
    and assists in determining how to mitigate the fragmentation.


    Table 5-24


    Fragmentation Statistics Columns for sys.dm_db_index_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `avg_fragmentation_in_percent` | `float` | Logical fragmentation for indexes
    or extent fragmentation for heaps in the `IN_ROW_DATA` allocation unit |

    | `fragment_count` | `bigint` | Number of fragments in the leaf level of an `IN_ROW_DATA`
    allocation unit |

    | `avg_fragment_size_in_pages` | `float` | Average number of pages in one fragment
    in the leaf level of an `IN_ROW_DATA` allocation unit |

    | `avg_page_space_used_in_percent` | `float` | Average percentage of available
    data storage space used in all pages |


    The first fragment column is `avg_fragmentation_in_percent`. This column provides
    a fragmentation percentage for the index. As fragmentation increases, SQL Server
    will likely see an increase in the amount of physical I/Os required to retrieve
    data from an index. Using this column, a process can be built that mitigates fragmentation
    by rebuilding or reorganizing indexes. An index that is very fragmented (30 percent
    or more) may benefit from a rebuild, whereas an index that is less fragmented
    may benefit from reorganization. It is important to consider the purpose and usage
    of a table when designing index maintenance processes as there is no rule that
    can be blindly applied to all indexes. This will be further discussed in Chapter
    [9](#338675_4_En_9_Chapter.xhtml).


    The next column, `fragment_count`, provides a count of all the fragments in an
    index. For each fragment created in an index, this column will summarize a count
    of those pages.


    The third column is `avg_fragment_size_in_pages`. This column represents the average
    number of pages that are in each fragment. The higher this value is and the closer
    it is to `page_count`, the less I/O that SQL Server requires to read the data.


    The last column is `avg_page_space_used_in_percent`. This column provides the
    amount of space available on pages. An index with little DML activity should be
    as close to 100 percent as possible. If there are no updates expected on an index,
    the goal should be to have the index as compacted as possible.


    ### Index Physical Stats Summary


    The primary purpose in looking at `sys.dm_db_index_physical_stats` is to help
    guide index maintenance. Through this DMF, statistics at each level of an index
    can be analyzed. Using this, the appropriate amount of maintenance for each level
    of an index can be identified. Whether the need is to defragment the index, modify
    the fill factor, or pad the index, the information in `sys.dm_db_index_physical_stats`
    can help guide this activity.


    ## Columnstore Statistics


    Columnstore indexes use a structure quite different from the typical B-tree or
    heap (also known as a rowstore). Because of this, there are some differences in
    the statistics collected for these indexes that relate to the underlying architecture
    and how it is accessed. To provide visibility to these different aspects, there
    are two DMOs that focus on the physical and operational statistics for columnstore
    statistics.


    ### Columnstore Physical Stats


    The first set of metadata to consider are the physical statistics being collected
    on columnstore indexes. This information can be accessed through the DMO sys.dm_db_column_store_row_group_physical_stats.
    This DMO has a row per rowgroup within a columnstore index. If a table is partitioned,
    then there will be a row per rowgroup per partition.


    #### Header Columns


    Since there is a row per rowgroup, each row will include `object_id`, `index_id`,
    `partition_number`, `row_group_id`, and `delta_store_hobt_id`. These columns are
    defined further in Table [5-25](#338675_4_En_5_Chapter.xhtml#Tab25). Like other
    indexes, the `partition_number` validates that columnstore indexes can be partitioned.
    For nonpartitioned columnstore indexes, the partition number will be 1.


    Table 5-25


    Header Columns in sys.dm_db_column_store_row_group_physical_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `object_id` | `int` | ID of the table or view on which the index is defined.
    |

    | `index_id` | `int` | ID of the index. |

    | `partition_number` | `int` | 1-based partition number within the index or heap.
    |

    | `row_group_id` | `bigint` | ID of the rowgroup. |

    | `delta_store_hobt_id` | `bigint` | hobt_id of the rowgroup deltastore.  If NULL,
    there is not an associated deltastore for the rowgroup. |'
