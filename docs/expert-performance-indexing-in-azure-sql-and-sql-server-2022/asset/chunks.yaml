  trans: '## 清单 13-12 GUID 模式场景的脚本


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesGUID_ICP (

    RowID int IDENTITY(1,1)

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_ICP PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_UniqueID (

    RowID uniqueidentifier DEFAULT(NEWSEQUENTIALID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_UniqueID PRIMARY KEY CLUSTERED (RowID)

    );

    CREATE TABLE dbo.IndexStrategiesGUID_String (

    RowID varchar(36) DEFAULT(NEWID())

    ,FillerData varchar(1000)

    ,CONSTRAINT PK_IndexStrategiesGUID_String PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.IndexStrategiesGUID_ICP (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_UniqueID (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    INSERT INTO dbo.IndexStrategiesGUID_String (FillerData)

    SELECT TOP (250000) a1.name+a2.name

    FROM sys.all_objects a1 CROSS JOIN sys.all_objects a2

    SELECT OBJECT_NAME(object_ID) as table_name, in_row_used_page_count, in_row_reserved_page_count

    FROM sys.dm_db_partition_stats

    WHERE object_id IN (OBJECT_ID(''dbo.IndexStrategiesGUID_ICP'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_UniqueID'')

    ,OBJECT_ID(''dbo.IndexStrategiesGUID_String''))

    ORDER BY 1

    ```


    图 13-14 展示了此查询的一些输出结果。


    ![](img/338675_4_En_13_Fig14_HTML.jpg)


    一个表格有 3 列，标签分别为 table name、in row used page count 和 in row reserved page count，以及
    3 行，标签为 1 到 3。这 3 行条目，即 index strategies G U I D I C P、string 和 unique i d，分别对应着
    1869 和 1889、2959 和 2977，以及 2250 和 2273 的条目。


    图 13-14


    GUID 模式的页数统计


    ### GUID 模式分析


    与其他场景不同，GUID 模式的使用与标识列模式相似。主要有两个区别。首先，GUID 模式不提供窄聚簇键。对于使用 `uniqueidentifier` 数据类型的聚簇键，其大小的变化需要多出大约
    400 个页面来存储相同的信息（参见图 13-14）。更糟糕的是，当错误地将 GUID 存储在 `varchar` 数据类型中时，表需要多出大约 1100
    个页面。毫无疑问，使用 GUID 模式会导致聚簇索引中浪费大量空间，这些空间也会包含在该表的任何非聚集索引中。GUID 模式的第二个挑战与聚簇索引的递增属性相关。GUID
    不是以有序方式呈现的。下一个值可以大于或小于前一个值，这会导致行在表内的随机放置，从而产生碎片化。有关 GUID 导致索引碎片化的更多信息，请阅读第 10
    章。


    关于明确定义的聚簇键的最后两个属性，GUID 模式表现良好。该值是静态的，预计不会随时间变化。该值也是唯一的。事实上，它应该在整个数据库中是唯一的。尽管 GUID
    模式确实实现了明确定义的聚簇索引的两个属性，但它们并不能缓解该模式前述的问题。在确定如何为表构建聚簇索引时，GUID 模式应该是最后的手段。


    注意


    使用新的 `sp_sequence_get_range` 存储过程结合 `SEQUENCE`，可以成为希望从 `uniqueidentifier` 模式迁移到使用标识列模式进行聚簇索引设计的应用程序的一个有效替代方案。


    ## 非聚集索引


    在前两节中，讨论集中在堆和聚簇索引上，它们用于确定存储数据的主要方法。对于堆，数据是未排序存储的。对于聚簇索引，数据基于一组列进行排序。在几乎所有数据库中，都需要其他方法来访问表中与数据存储顺序不一致的数据。这就是非聚集索引的用武之地。非聚集索引提供了除堆或聚簇索引之外的另一种访问表中数据的方法。


    在本节中，将回顾一些与非聚集索引相关的模式。这些模式将有助于确定何时何地考虑构建非聚集索引。对于每种模式，将讨论其主要组成部分和可能应用的情况。与聚簇索引模式类似，每种非聚集索引模式都将包含场景以展示该模式的益处。将讨论的非聚集索引模式有：


    *   搜索列

    *   索引交集

    *   多列索引

    *   覆盖索引

    *   包含列

    *   筛选索引

    *   外键


    在回顾这些模式之前，有一些适用于所有非聚集索引的指南。这些指南与明确定义的聚簇索引的属性不同。对于那些属性，关键目标之一是尽可能遵守它们。而非聚集索引指南则构成了一些考量因素，这些因素有助于加强索引的合理性，但可能不会排除索引的使用。在设计索引时需要考虑的一些最常见因素如下：


    *   *非聚集索引键列的更改频率如何？* 数据更改越频繁，非聚集索引中的行可能需要更频繁地更改其在索引中的位置。

    *   *该索引能改进哪些频繁执行的查询？* 一个索引能覆盖的查询越多，这些查询执行越频繁，数据库平台的整体运行就越好。

    *   *该索引支持哪些业务需求？* 支持关键业务操作但使用不频繁的索引，有时可能比频繁使用的索引更重要。

    *   *维护索引的时间成本与查询数据的时间成本相比如何？* 可能存在一个点，超过该点后，从索引中获得的性能增益会被创建和整理索引碎片所花费的时间以及所需的空间所抵消。


    正如引言中提到的，索引常常让人感觉像是一门艺术。幸运的是，可以使用科学或统计来证明索引的价值。在回顾每种模式时，我们将考察它们可以应用的场景，并使用一些科学方法（或此处的度量标准）来判断索引是否提供价值。用来评判索引的两个指标将是执行期间的读取操作和执行计划的复杂性。'
- fmt: '## Search Columns


    设计非聚集索引最基本、最常见的模式是基于已定义或预期的搜索模式来构建它们。Search Columns 模式应该是最为人所知的模式，但也经常容易被忽视。


    如果查询将通过名字搜索包含联系人的表，那么就为名字列建立索引。如果地址表将通过城市或州进行搜索，那么就为这些列建立索引。Search Columns 模式的主要目标是减少对聚集索引的扫描，并将这些操作转移到一个非聚集索引上，该索引可以提供更直接的数据访问路径。


    为了演示 Search Columns 模式，将使用本节提到的第一个场景，一个联系人表。为简单起见，示例将使用一个名为 `dbo.Contacts` 的表，该表包含来自
    `AdventureWorks2017` 表 `Person.Person` 的数据（参见清单 [13-13](#338675_4_En_13_Chapter.xhtml#PC13)）。应该有
    19,972 行插入到 `dbo.Contacts` 中，尽管具体数量会根据你的 `AdventureWorks2017` 数据库的新旧程度而有所不同。


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.Contacts (

    ContactID INT IDENTITY(1, 1),

    FirstName NVARCHAR(50),

    LastName NVARCHAR(50),

    IsActive BIT,

    EmailAddress NVARCHAR(50),

    CertificationDate DATETIME,

    FillerData CHAR(1000),

    CONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED (ContactID));

    INSERT INTO dbo.Contacts (

    FirstName,

    LastName,

    IsActive,

    EmailAddress,

    CertificationDate )

    SELECT pp.FirstName,

    pp.LastName,

    IIF(pp.BusinessEntityID / 10 = 1, 1, 0),

    pea.EmailAddress,

    IIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate, NULL)

    FROM Person.Person pp

    INNER JOIN Person.EmailAddress pea

    ON pp.BusinessEntityID = pea.BusinessEntityID;

    Listing 13-13

    Setup for the Search Columns Pattern

    ```


    有了 `dbo.Contacts` 表之后，对它进行的第一次测试是在没有为其构建任何非聚集索引的情况下查询该表。在示例（清单 [13-14](#338675_4_En_13_Chapter.xhtml#PC14)）中，查询搜索名字为
    Catherine 的行。执行查询显示 `dbo.Contacts` 中有 22 行符合标准（参见图 [13-15](#338675_4_En_13_Chapter.xhtml#Fig15)）。为了检索这
    22 行，SQL Server 最终读取了 2,866 页，这是表中的所有页面。并且如图 [13-16](#338675_4_En_13_Chapter.xhtml#Fig16)
    所示，页面读取是对 `dbo.Contacts` 上的 `PK_Contacts` 进行索引扫描的结果。查询的目标是从超过 19,000 行中检索 22 行，因此检查表中的每一页以查找
    `FirstName` 为 Catherine 的行并不是最优的方法，应该避免。


    ![Figure 13-16](images/338675_4_En_13_Chapter/338675_4_En_13_Fig16_HTML.png)

    *图 13-16：没有非聚集索引时 Search Columns 模式的执行计划*


    ![Figure 13-15](images/338675_4_En_13_Chapter/338675_4_En_13_Fig15_HTML.png)

    *图 13-15：没有非聚集索引时 Search Columns 模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-14

    Search Columns Pattern with no Non-clustered Index

    ```


    通过向 `dbo.Contacts` 添加一个非聚集索引，可以相对简单地实现最优地检索所有 Catherine 行的目标。在下一个脚本（清单 [13-15](#338675_4_En_13_Chapter.xhtml#PC15)）中，在
    `FirstName` 列上创建了一个非聚集索引。除了对 `FirstName` 的过滤外，查询还需要返回 `ContactID`。由于非聚集索引包含聚集索引键，`ContactID`
    中的值默认包含在索引中。


    执行清单 [13-15](#338675_4_En_13_Chapter.xhtml#PC15) 中的脚本会带来与在表上添加非聚集索引之前截然不同的性能表现。非聚集索引将查询使用的页数减少到两页（图
    [13-17](#338675_4_En_13_Chapter.xhtml#Fig17)），而不是读取表中的每一页。这里的减少是显著的，并突显了使用非聚集索引在聚集索引键之外的列上提供对表中信息更直接访问的能力和价值。执行计划还有一个变化：执行计划不再扫描
    `PK_Index`，而是对 `IC_Contacts_FirstName` 使用索引查找，如图 [13-18](#338675_4_En_13_Chapter.xhtml#Fig18)
    所示。操作符的改变进一步证明非聚集索引有助于提高查询性能。


    ![Figure 13-18](images/338675_4_En_13_Chapter/338675_4_En_13_Fig18_HTML.png)

    *图 13-18：有非聚集索引时 Search Columns 模式的执行计划*


    ![Figure 13-17](images/338675_4_En_13_Chapter/338675_4_En_13_Fig17_HTML.png)

    *图 13-17：有非聚集索引时 Search Columns 模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstName ON dbo.Contacts (FirstName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-15

    Search Columns Pattern with a Non-clustered Index

    ```


    使用 Search Columns 模式可能是将非聚集索引模式应用于数据库最重要的第一步。它提供了访问数据的替代路径，这可能是从几页与数千页中获取数据的差别。本节中的
    Search Columns 示例展示了在单个列上构建索引。接下来的几个模式将以此为基础进行扩展。'
  raw: '### Search Columns


    The most basic and common pattern for designing non-clustered indexes is to build
    them based on defined or expected search patterns. The Search Columns pattern
    should be the most widely known pattern but also happens to be easily, and often,
    overlooked.


    If queries will be searching tables with contacts in them by first name, then
    index the first name column. If the address table will have searches against it
    by city or state, then index those columns. The primary goal of the Search Columns
    pattern is to reduce scans against the clustered index and move those operations
    to a non-clustered index that can provide a more direct route to the data.


    To demonstrate the Search Columns pattern, the first scenario mentioned in this
    section will be used, a contact table. For simplicity, the examples will use a
    table named `dbo.Contacts` that contains data from the `AdventureWorks2017` table
    `Person.Person` (see Listing [13-13](#338675_4_En_13_Chapter.xhtml#PC13)). There
    should be 19,972 rows inserted into `dbo.Contacts`, though this will vary depending
    on the freshness of your `AdventureWorks2017` database.


    ```

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.Contacts (

    ContactID INT IDENTITY(1, 1),

    FirstName NVARCHAR(50),

    LastName NVARCHAR(50),

    IsActive BIT,

    EmailAddress NVARCHAR(50),

    CertificationDate DATETIME,

    FillerData CHAR(1000),

    CONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED (ContactID));

    INSERT INTO dbo.Contacts (

    FirstName,

    LastName,

    IsActive,

    EmailAddress,

    CertificationDate )

    SELECT pp.FirstName,

    pp.LastName,

    IIF(pp.BusinessEntityID / 10 = 1, 1, 0),

    pea.EmailAddress,

    IIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate, NULL)

    FROM Person.Person pp

    INNER JOIN Person.EmailAddress pea

    ON pp.BusinessEntityID = pea.BusinessEntityID;

    Listing 13-13

    Setup for the Search Columns Pattern

    ```


    With the table `dbo.Contacts` in place, the first test against it is to query
    the table with no non-clustered indexes built on it. In the example, shown in
    Listing [13-14](#338675_4_En_13_Chapter.xhtml#PC14), the query is searching for
    rows with the first name of Catherine. Executing the query shows that there are
    22 rows in `dbo.Contacts` that match the criteria (see Figure [13-15](#338675_4_En_13_Chapter.xhtml#Fig15)).
    To retrieve the 22 rows, SQL Server ended up reading 2,866 pages, which are all
    the pages in the table. And as Figure [13-16](#338675_4_En_13_Chapter.xhtml#Fig16)
    indicates, the page reads were the result of an index scan against `PK_Contacts`
    on `dbo.Contacts`. The aim of the query is to retrieve 22 out of the more than
    19,000 rows, so checking every page in the table for rows with Catherine for `FirstName`
    is not an optimal approach and is one that should be avoided.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig16_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting the
    connection from clustered index scan, clustered, contacts, at 100% cost to select
    at 0% cost.


    Figure 13-16


    Execution plan for the Search Columns pattern without a non-clustered index


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig15_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 2866, physical reads 0, read-ahead
    reads 0, l o b logical reads 0 under the 22 rows affected label and above the
    1 row affected label.


    Figure 13-15


    Statistics I/O results for the Search Columns pattern without a non-clustered
    index


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-14

    Search Columns Pattern with no Non-clustered Index

    ```


    Achieving the aim of retrieving all the rows for Catherine optimally is relatively
    simple by adding a non-clustered index to `dbo.Contacts`. In the next script (Listing
    [13-15](#338675_4_En_13_Chapter.xhtml#PC15)), a non-clustered index is created
    on the `FirstName` column. Besides the filter on `FirstName`, the query needs
    to also return `ContactID`. Since non-clustered indexes include the clustering
    index key, the value in `ContactID` is included in the index by default.


    Executing the script in Listing [13-15](#338675_4_En_13_Chapter.xhtml#PC15) leads
    to substantially different performance than before the non-clustered index was
    added to the table. Instead of reading every page in the table, the non-clustered
    index reduces the number of pages used for the query to two pages (Figure [13-17](#338675_4_En_13_Chapter.xhtml#Fig17)).
    The reduction here is significant and highlights the power and value in using
    non-clustered indexes to provide more direct access to information in your tables
    on columns other than those in the clustered index keys. There is one other change
    in the execution: instead of a scan against `PK_Index`, the execution plan now
    uses an index seek against `IC_Contacts_FirstName`, shown in Figure [13-18](#338675_4_En_13_Chapter.xhtml#Fig18).
    The change in the operator is further proof that the non-clustered index helped
    improve the performance of the query.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig18_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting the
    connection from index seek, nonclustered, contacts, at 100% cost to select at
    0% cost.


    Figure 13-18


    Execution plan for the Search Columns pattern with a non-clustered index


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig17_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 2, physical reads 0, read-ahead reads
    0, l o b logical reads 0, l o b physical reads 0 under the 22 rows affected label
    and above the 1 row affected label.


    Figure 13-17


    Statistics I/O results for the Search Columns pattern with a non-clustered index


    ```

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstName ON dbo.Contacts (FirstName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-15

    Search Columns Pattern with a Non-clustered Index

    ```


    Using the Search Columns pattern is probably the most important first step in
    applying non-clustered indexing patterns to databases. It provides alternative
    paths for accessing data that can be the difference between getting data from
    a couple of pages vs. thousands of pages. The Search Columns example in this section
    shows building an index on a single column. The next few patterns will expand
    on this foundation.'
  trans: '

    ## 搜索列


    设计非聚集索引最基本、最常见的模式是基于已定义或预期的搜索模式来构建它们。搜索列模式应该是最为人所知的模式，但也经常容易被忽视。


    如果查询将通过名字搜索包含联系人的表，那么就为名字列建立索引。如果地址表将通过城市或州进行搜索，那么就为这些列建立索引。搜索列模式的主要目标是减少对聚集索引的扫描，并将这些操作转移到一个非聚集索引上，该索引可以提供更直接的数据访问路径。


    为了演示搜索列模式，将使用本节提到的第一个场景，一个联系人表。为简单起见，示例将使用一个名为 `dbo.Contacts` 的表，该表包含来自 `AdventureWorks2017`
    表 `Person.Person` 的数据（参见清单 13-13）。应该有 19,972 行插入到 `dbo.Contacts` 中，尽管具体数量会根据你的
    `AdventureWorks2017` 数据库的新旧程度而有所不同。


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE TABLE dbo.Contacts (

    ContactID INT IDENTITY(1, 1),

    FirstName NVARCHAR(50),

    LastName NVARCHAR(50),

    IsActive BIT,

    EmailAddress NVARCHAR(50),

    CertificationDate DATETIME,

    FillerData CHAR(1000),

    CONSTRAINT PK_Contacts PRIMARY KEY CLUSTERED (ContactID));

    INSERT INTO dbo.Contacts (

    FirstName,

    LastName,

    IsActive,

    EmailAddress,

    CertificationDate )

    SELECT pp.FirstName,

    pp.LastName,

    IIF(pp.BusinessEntityID / 10 = 1, 1, 0),

    pea.EmailAddress,

    IIF(pp.BusinessEntityID / 10 = 1, pp.ModifiedDate, NULL)

    FROM Person.Person pp

    INNER JOIN Person.EmailAddress pea

    ON pp.BusinessEntityID = pea.BusinessEntityID;

    Listing 13-13

    搜索列模式的设置

    ```


    有了 `dbo.Contacts` 表之后，对它进行的第一次测试是在没有为其构建任何非聚集索引的情况下查询该表。在示例（清单 13-14）中，查询搜索名字为
    Catherine 的行。执行查询显示 `dbo.Contacts` 中有 22 行符合标准（参见图 13-15）。为了检索这 22 行，SQL Server
    最终读取了 2,866 页，这是表中的所有页面。并且如图 13-16 所示，页面读取是对 `dbo.Contacts` 上的 `PK_Contacts` 进行索引扫描的结果。查询的目标是从超过
    19,000 行中检索 22 行，因此检查表中的每一页以查找 `FirstName` 为 Catherine 的行并不是最优的方法，应该避免。


    ![Figure 13-16](img/338675_4_En_13_Fig16_HTML.png)

    *图 13-16：没有非聚集索引时搜索列模式的执行计划*


    ![Figure 13-15](img/338675_4_En_13_Fig15_HTML.png)

    *图 13-15：没有非聚集索引时搜索列模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-14

    没有非聚集索引的搜索列模式

    ```


    通过向 `dbo.Contacts` 添加一个非聚集索引，可以相对简单地实现最优地检索所有 Catherine 行的目标。在下一个脚本（清单 13-15）中，在
    `FirstName` 列上创建了一个非聚集索引。除了对 `FirstName` 的过滤外，查询还需要返回 `ContactID`。由于非聚集索引包含聚集索引键，`ContactID`
    中的值默认包含在索引中。


    执行清单 13-15 中的脚本会带来与在表上添加非聚集索引之前截然不同的性能表现。非聚集索引将查询使用的页数减少到两页（图 13-17），而不是读取表中的每一页。这里的减少是显著的，并突显了使用非聚集索引在聚集索引键之外的列上提供对表中信息更直接访问的能力和价值。执行计划还有一个变化：执行计划不再扫描
    `PK_Index`，而是对 `IC_Contacts_FirstName` 使用索引查找，如图 13-18 所示。操作符的改变进一步证明非聚集索引有助于提高查询性能。


    ![Figure 13-18](img/338675_4_En_13_Fig18_HTML.png)

    *图 13-18：有非聚集索引时搜索列模式的执行计划*


    ![Figure 13-17](img/338675_4_En_13_Fig17_HTML.png)

    *图 13-17：有非聚集索引时搜索列模式的 Statistics I/O 结果*


    ```sql

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_FirstName ON dbo.Contacts (FirstName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine'';

    Listing 13-15

    有非聚集索引的搜索列模式

    ```


    使用搜索列模式可能是将非聚集索引模式应用于数据库最重要的第一步。它提供了访问数据的替代路径，这可能是从几页与数千页中获取数据的差别。本节中的搜索列示例展示了在单个列上构建索引。接下来的几个模式将以此为基础进行扩展。

    '
- fmt: '## Index Intersection


    The aim of the Search Columns pattern is to create an index that will minimize
    the page reads for a query and improve the performance of it. Sometimes, though,
    the queries go beyond the single column example that was demonstrated. Additional
    columns may be part of the predicate or returned in the `SELECT` statement. One
    of the ways to address this is to create non-clustered indexes that include the
    additional columns. When there are indexes that can satisfy each of the predicates
    in the `WHERE` clause, SQL Server can use multiple non-clustered indexes to find
    the rows between both that match on the clustering key. This operation is called
    Index Intersection.


    To demonstrate the Index Intersection pattern, a review will be made of what happens
    when the filtering is expanded to cover multiple columns. The code in Listing
    [13-16](#338675_4_En_13_Chapter.xhtml#PC16) includes the expanded `SELECT` statement
    and `WHERE` clause, expanding the predicate to include rows where `LastName` is
    Cox.


    The change in the query results in a significant change in performance over the
    previous section’s results. With the additional column in the query, there are
    68 pages read to satisfy the query vs. the 2 pages when `LastName` was not included
    (Figure [13-19](#338675_4_En_13_Chapter.xhtml#Fig19)). The increase in pages read
    is because of the change in the execution plan (Figure [13-20](#338675_4_En_13_Chapter.xhtml#Fig20)).
    In this execution plan, an additional two operations are added to the execution
    of the query: a key lookup and a nested loop. These operators are added because
    the index `IX_Contacts_FirstName` cannot provide all of the information needed
    to satisfy the query. SQL Server determines that it is still cheaper to use `IX_Contacts_FirstName`
    and look up the missing information from the clustered index than to scan the
    clustered index. The problem is that for every row that matches on the non-clustered
    index, a lookup has to be done on the clustered index. While key lookups are not
    always a problem, they can potentially drive up the CPU and I/O costs for a query.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig20_HTML.png)

    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting multiple
    paths, namely, index seek, nonclustered, contacts, at 14% cost and key lookup,
    clustered, contacts, at 86% cost to select at 0% cost.

    Figure 13-20

    Execution plan when not taking advantage of the Index Intersection pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig19_HTML.png)

    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 1, logical reads 68, physical reads 0, read-ahead reads
    0, l o b logical reads 0, l o b physical reads 0 between 2 1 row affected labels.

    Figure 13-19

    Statistics I/O results when not taking advantage of the Index Intersection pattern


    ```

    USE AdventureWorks2017;

    GO

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    Listing 13-16

    Query that Does Not Take Advantage of the Index Intersection Pattern


    Leveraging the Index Intersection pattern is one of a few ways that the performance
    of the query in Listing [13-16](#338675_4_En_13_Chapter.xhtml#PC16) can be improved.
    An index intersection occurs when SQL Server can use multiple non-clustered indexes
    on the same table to satisfy the requirements for a query. In the case of the
    query in Listing [13-16](#338675_4_En_13_Chapter.xhtml#PC16), the most direct
    path for finding `FirstName`s was through the index `IX_Contacts_FirstName`. At
    that point, though, to filter and return the `LastName` column, SQL Server used
    the clustered index and performed a lookup on each row, similar to the image on
    the left side of Figure [13-21](#338675_4_En_13_Chapter.xhtml#Fig21). Alternatively,
    if there had been an index for the `LastName` column, SQL Server could have used
    that index with `IX_Contacts_FirstName`. In essence, through the Index Intersection
    pattern, SQL Server is able to perform operations similar to joins between indexes
    on the same table to find rows that overlap between the two, as shown on the right
    of Figure [13-21](#338675_4_En_13_Chapter.xhtml#Fig21).


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig21_HTML.png)

    A diagram with first name index, 22 rows, connected to 6 unlabeled horizontal
    bars atop a downward arrow. On the right is a Venn diagram exhibiting 1 row between
    first name index, 22 rows, and last name index, 99 rows.

    Figure 13-21

    Index seek with a key lookup vs. two index seeks using the Index Intersection
    pattern


    To demonstrate the Index Intersection pattern and have SQL Server use index intersection,
    the next example creates an index on the `LastName` column (Listing [13-17](#338675_4_En_13_Chapter.xhtml#PC17)).
    With the index `IX_Contacts_LastName` created, the results change significantly
    from when the index had not been created. The first change is in the number of
    reads. Instead of the 68 reads that occurred in the previous execution, there
    are now only 5 reads (Figure [13-22](#338675_4_En_13_Chapter.xhtml#Fig22)). The
    cause of the reduction in reads is from SQL Server leveraging index intersection
    in the query plan (Figure [13-23](#338675_4_En_13_Chapter.xhtml#Fig23)). The indexes
    `IX_Contacts_FirstName` and `IX_Contacts_LastName` were used to satisfy the query
    without returning to the clustered index to retrieve data for the query. This
    happened because the two indexes together can satisfy the query completely.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig23_HTML.png)

    A panel with an opened execution plan tab containing 2 lines of text for query
    1 with 100% cost relative to the batch. Below is a flow diagram exhibiting multiple
    paths, namely, index seek, nonclustered, contacts, at 26% cost and index seek,
    nonclustered, contacts, at 27% cost to select at 0% cost.

    Figure 13-23

    Execution plan for the Index Intersection pattern


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig22_HTML.png)

    A panel with an opened messages tab with a one-line entry that reads table quote
    contacts quote, scan count 2, logical reads 5, physical reads 0, read-ahead reads
    0, l o b logical reads 0 between 2 1 row affected labels.

    Figure 13-22

    Statistics I/O results for the Index Intersection pattern


    ```

    USE AdventureWorks2017;

    GO

    CREATE INDEX IX_Contacts_LastName ON dbo.Contacts (LastName);

    SET STATISTICS IO ON;

    SELECT ContactID,

    FirstName,

    LastName

    FROM dbo.Contacts

    WHERE FirstName = ''Catherine''

    AND LastName = ''Cox'';

    ```

    Listing 13-17

    Index Intersection Pattern


    Index intersection is a feature of SQL Server that is used to better satisfy queries
    when more than one non-clustered index from the same table can provide the results
    for the queries. When indexing for index intersection, the aim is to have multiple
    indexes based on the Search Columns pattern that can be used together in numerous
    combinations to allow for a variety of filters. One key thing to remember with
    the Index Intersection pattern is that SQL Server cannot be instructed as to when
    to use index intersection; it will opt to use it when it is appropriate for each
    request, the underlying indexes, and their associated data.'
