    into the index. These columns are stored as unsorted data alongside the key columns
    in the index. Included columns cannot include any columns that have already been
    used in the initial sorted column list of the index.


    In terms of querying, included columns allow users to look up information outside
    the sorted columns. If everything they need for the query is found in the key
    and included columns, the query does not need to access the table’s heap or clustered
    index to return query results. Similar to the card catalog example, included columns
    can significantly improve the performance of a query when a similar column list
    is requested each time.


    ### Partitioned Indexes


    Books that include a lot of data can get fairly large. Consider a dictionary or
    the complete works of William Shakespeare. These are exceptionally large books
    that would be impractical to publish in a single volume. A 20,000-page book is
    simply too large to physically publish. In addition, the ability for a person
    to read (or even simply reference) a book that large would be quite challenging.
    Books can get large enough that the idea of containing them in a single volume
    just isn’t practical. The best example of this is an encyclopedia.


    It is rare that an encyclopedia is contained in a single book. The size of the
    book and the width of the binding would be beyond the ability of anyone to manage.
    Also, the time it takes to find all the subjects in the encyclopedia that start
    with the letter *S* is greatly improved because you can go directly to the S volume
    instead of paging through an enormous book to find where they start.


    This problem isn’t limited to books. Tables and their indexes can get to a point
    where their size makes it difficult to continue to maintain them using a reasonable
