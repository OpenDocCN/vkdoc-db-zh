  trans: '### DBCC EXTENTINFO


    与 `sys.dm_db_database_page_allocations` 类似，`DBCC EXTENTINFO` 提供数据库内区分配的相关信息。此命令用于识别区的分配方式，以及所使用的区是混合区还是统一区。清单
    3-8 展示了使用 `DBCC EXTENTINFO` 的语法。使用该命令时，可以填充四个参数，其定义见表 3-5。


    表 3-5

    DBCC EXTENTINFO 参数


    | **参数** | **描述** |

    | --- | --- |

    | `database_name | database_id` | 指定要检索页面的数据库名称或数据库 ID。如果未提供此参数或其值为零，则默认为当前数据库。
    |

    | `table_name | table_object_id` | 通过提供表名或表的 `object_ID` 来指定输出中要返回哪个表。如果未提供值，输出将包含所有表的结果。
    |

    | `index_name | index_id` | 通过提供索引名称或 `index_ID` 来指定输出中要返回哪个索引。如果值为 -1 或未提供，则输出将包含表上所有索引的结果。
    |

    | `partition_id` | 通过提供分区号来指定输出中要返回索引的哪个分区。如果值为 0 或未提供，则输出将包含索引上所有分区的结果。 |


    ```

    DBCC EXTENTINFO ( {database_name | database_id | 0}

    , {table_name | table_object_id}, { index_name | index_id | -1}

    , { partition_id | 0}

    ```


    清单 3-8

    DBCC EXTENTINFO 语法


    执行 `DBCC EXTENTINFO` 时，会返回一个数据集，其中包含表 3-6 中定义的列。每个区分配在结果中对应一行。由于一个区由八个页面组成，当存在单页分配时（例如使用混合区时），一个区最多可以有八个分配。当使用统一区时，每个区将只有一个分配，并返回一行。


    表 3-6

    DBCC EXTENTINFO 输出列


    | **参数** | **描述** |

    | --- | --- |

    | `file_id` | 页面所在文件的编号。 |

    | `page_id` | 页面的编号。 |

    | `pg_alloc` | 从区分配给对象的页面数。 |

    | `ext_size` | 区的大小。 |

    | `object_id` | 表的对象 ID。 |

    | `index_id` | 与堆或索引关联的索引 ID。 |

    | `partition_number` | 堆或索引的分区号。 |

    | `partition_id` | 堆或索引的分区 ID。 |

    | `iam_chain_type` | 该区所用于的 IAM 链类型。值可以是行内数据、LOB 数据和溢出数据。 |

    | `pfs_bytes` | 字节数组，用于标识可用空间量、是否存在幽灵记录、页面是否为 IAM 页面、是否已分配以及是否属于混合区。 |


    为演示此命令的工作原理，将提供一个示例来说明区的分配方式。在清单 3-9 所示的示例中，将重用上一节中的 `dbo.IndexInternalsOne`。


    ```

    USE Chapter2Internals

    GO

    DBCC EXTENTINFO(0, IndexInternalsOne, -1)

    ```


    清单 3-9

    DBCC EXTENTINFO dbo.IndexInternalsOne


    如图 3-5 所示，`DBCC` 命令的结果显示共有 13 个页面分配给了该表。结果中值得关注的是 `pg_alloc` 和 `ext_size` 列。第一行中，分配了
    9 个页面，包括索引分配映射页面和该区的 8 个页面。第二行中，分配了 4 个页面，这是插入表中的 12 条记录的剩余部分。两行的区大小都应为 8，因为分配的是统一区。


    ![](img/338675_4_En_3_Fig5_HTML.png)


    一张查询表结果的截图，显示 2 行数据。列标题为 file i d、page i d、page allocation、e x t size、object i
    d、index i d、partition number、partition i d、i am chain type 和 p f s bytes。表中的页面分配数为
    9 和 4。


    图 3-5

    针对 dbo.IndexInternalsOne 中页面的 DBCC EXTENTINFO


    在 SQL Server 2016 之前的版本中，行为会有很大不同，因为它会对每个事务使用单页分配，直到填满第一个区。此行为变更是因为跟踪标志 1118 的行为已成为
    SQL Server 的默认行为。


    尽管 `DBCC EXTENTINFO` 提供的详细信息不如 `sys.dm_db_database_page_allocations` 多，但它对于识别分配给表的区非常有用，尤其是在使用
    SQL Server 2012 之前的版本时。'
- fmt: '# DBCC IND


    The next command that can be used to investigate indexes and their associated
    pages is `DBCC IND`. This command returns a list of all pages associated with
    the requested object, which can be scoped to the database, table, or index level,
    similar to `sys.dm_db_database_page_allocations`. Listing [3-10](#338675_4_En_3_Chapter.xhtml#PC10)
    shows the syntax for using `DBCC IND`. When using this command, there are three
    parameters that can be populated, each of which is described in Table [3-7](#338675_4_En_3_Chapter.xhtml#Tab7).


    ## Table 3-7: DBCC IND Parameters


    | **Parameter** | **Description** |

    | --- | --- |

    | `database_name | database_id` | Specifies either the database name or the database
    ID where the page list will be retrieved. This defaults to the current database
    if this parameter is not provided or if zero is used for its value. |

    | `table_name | table_object_id` | Specifies which table to return in the output
    by providing either the table name or the `object_ID` for the table. If no value
    is provided, the output will include results for all tables. |

    | `index_name | index_id` | Specifies which index to return in the output by providing
    either the index name or the `index_ID`. If –1 or no value is provided, the output
    will include results for all indexes on the table. |


    ```

    DBCC IND ( {''dbname'' | dbid}, {''table_name'' | table_object_id},

    {''index_name'' | index_id | -1})

    Listing 3-10

    DBCC IND Syntax

    ```


    For every page that is allocated to the requested objects, `DBCC IND` returns
    one row per page in the resulting dataset; the columns are defined in Table 38.
    Unlike `DBCC EXTENTINFO`, `DBCC IND` does explicitly return the IAM page in the
    results.


    ## Table 3-8: DBCC IND Output Columns


    | **Column** | **Description** |

    | --- | --- |

    | `PageFID` | File number where the page is located. |

    | `PagePID` | Page number for the page. |

    | `IAMFID` | File ID where the IAM page is located. |

    | `IAMPID` | Page ID for the page in the data file. |

    | `ObjectID` | Object ID for the associated table. |

    | `IndexID` | Index ID associated with the heap or index. |

    | `PartitionNumber` | Partition number for the heap or index. |

    | `PartitionID` | Partition ID for the heap or index. |

    | `iam_chain_type` | The type of IAM chain the extent is used for. Values can
    be in-row data, LOB data, and overflow data. |

    | `PageType` | Number identifying the page type. These are listed in Table [3-9](#338675_4_En_3_Chapter.xhtml#Tab9).
    |

    | `IndexLevel` | Level at which the page exists in the page organizational structure.
    The levels are organized from 0 to N, where 0 is the lowest level of the index
    and N is the index root. |

    | `NextPageFID` | File number where the next page at the index level is located.
    |

    | `NextPagePID` | Page number for the next page at the index level. |

    | `PrevPageFID` | File number where the previous page at the index level is located.
    |

    | `PrevPagePID` | Page number for the previous page at the index level. |


    Within the results from `DBCC IND` is the `PageType` column that returns the type
    of page, which can include data, index, GAM, or any other of the page types discussed
    in the previous chapter. Table [3-9](#338675_4_En_3_Chapter.xhtml#Tab9) shows
    a full list of the different page types and their corresponding ID values.


    ## Table 3-9: Page Type Mappings


    | **Page Type** | **Description** |

    | --- | --- |

    | 1 | Data page |

    | 2 | Index page |

    | 3 | Large object page |

    | 4 | Large object page |

    | 8 | Global Allocation Map page |

    | 9 | Shared Global Allocation Map page |

    | 10 | Index Allocation Map page |

    | 11 | Page Free Space page |

    | 13 | Boot page |

    | 15 | File header page |

    | 16 | Differential Changed Map page |

    | 17 | Minimally Logged page |


    The primary benefit of using `DBCC IND` is that it provides a list of all pages
    for a table or index with their locations in the database. This can be used to
    help investigate how indexes behave and where pages are located. Several examples
    will be provided that illustrate how this data can be obtained and used.


    ## DBCC IND Example


    For the first example, the tables created in the last section will be revisited,
    examining the output for each of these, comparing it with the `DBCC EXTENTINFO`
    output. This code example includes `DBCC IND` commands for `IndexInternalsOne`
    and `IndexInternalsTwo`, as shown in Listing [3-11](#338675_4_En_3_Chapter.xhtml#PC11).
    The database ID passed in is 0 for the current database, and the index ID is set
    to –1 to return pages for all indexes.


    ```

    USE Chapter2Internals;

    GO

    DBCC IND (0, ''IndexInternalsOne'',-1);

    Listing 3-11

    DBCC IND Example

    ```


    In the `DBCC EXTENTINFO` example, there were two extent allocations for the table
    `IndexInternalsOne`, as shown in Figure [3-5](#338675_4_En_3_Chapter.xhtml#Fig5).
    These results show 13 pages allocated to the table. The `DBCC IND` results, shown
    in Figure [3-6](#338675_4_En_3_Chapter.xhtml#Fig6), detail all pages that were
    part of two extent allocations.


    In these results, there is a single IAM page and 12 data pages allocated to the
    table. Where `DBCC EXTENTINFO` provided page 312 as the start of the extent allocation,
    containing nine pages, it was not possible to identify where the IAM page was
    based on that limited information. It was in another extent that the results did
    not list, and the results for `DBCC IND` identify it as being on page 235. The
    benefit of using `DBCC IND` for listing the pages of an index is that exact page
    numbers are provided without the need for any guesswork. Also note that the index
    level in the results returns as level 0 with no intermediate levels. Heap structures
    are flat, and therefore the pages are in no particular order.


    ![A screenshot of a query table results of D B C C I N D with 13 rows of data.
    The header columns are page F I D, page P I D, I A M F I D, I A M P I D, object
    I D, index I D, partition number, partition I D, I A M chain type, page type,
    index level, next page F I D, next page P I D, p r e v page F I D, and p r e v
    page P I D. The index level of page P I D 235 is null and for the rest is 0.](images/338675_4_En_3_Chapter/338675_4_En_3_Fig6_HTML.jpg)

    *Figure 3-6: DBCC IND for dbo.IndexInternalsOne*


    ## DBCC IND Clustered Index Example


    The tables in the previous example were organized in a heap structure. For the
    next example, the output from `DBCC IND` will be examined for a table with a clustered
    index. In Listing [3-12](#338675_4_En_3_Chapter.xhtml#PC12), the table `dbo.IndexInternalsThree`
    is created with a clustered index on the `RowID` column. Four rows are then inserted,
    after which `DBCC IND` is used.


    ```

    USE Chapter2Internals

    GO

    CREATE TABLE dbo.IndexInternalsThree

    (

    RowID INT IDENTITY(1,1)

    ,FillerData CHAR(8000)

    ,CONSTRAINT PK_IndexInternalsThree  PRIMARY KEY CLUSTERED (RowID)

    )

    GO

    INSERT INTO dbo.IndexInternalsThree DEFAULT VALUES

    GO 4

    DBCC IND (0, ''IndexInternalsThree'',-1)

    Listing 3-12

    DBCC IND Clustered Index Example

    ```


    Figure [3-7](#338675_4_En_3_Chapter.xhtml#Fig7) shows the results from this example.
    Note the change in how `IndexLevel` is returned as compared with the previous
    example (in Figure [3-6](#338675_4_En_3_Chapter.xhtml#Fig6)).


    ![A screenshot of a query table results of D B C C I N D with 6 rows of data.
    The header columns are page F I D, page P I D, I A M F I D, I A M P I D, object
    I D, index I D, partition number, partition I D, I A M chain type, page type,
    index level, next page F I D, next page P I D, p r e v page F I D, and p r e v
    page P I D. The index level of page P I D 237 and 361 is null and 1 respectively.](images/338675_4_En_3_Chapter/338675_4_En_3_Fig7_HTML.png)

    *Figure 3-7: DBCC IND for dbo.IndexInternalsThree*'
