    将所有部分与本节开头的模板结合起来，创建一个索引碎片整理脚本，其提供的功能与维护计划任务类似。通过能够设置发生碎片整理的大小和碎片级别，此脚本仅对真正需要处理的索引消除碎片，而不是对数据库中的每个索引进行碎片整理。在
