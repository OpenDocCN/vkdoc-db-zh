    ## Introduction


    Indexing is a part of database development that is always relevant. Even as technology
    improves and more automated processes are developed to assist in performance tuning
    and management, understanding effective indexing will always be a key skill as
    data and queries grow in size and complexity.


    ## What Is This Book About?


    This book discusses indexing from all angles, both entry-level and advanced, describing
    how indexes can be used to improve performance against many types of data in SQL
    Server. A full understanding of indexing allows database professionals and developers
    to architect efficient data structures and write efficient code. This directly
    leads to faster queries, less usage of computing resources, and ultimately a savings
    of both time and money.


    *Expert Performance Indexing in Azure SQL and SQL Server 2022* is structured into
    three sections overall:


    *   *Chapters* [*1*](#338675_4_En_1_Chapter.xhtml)*-*[*3*](#338675_4_En_3_Chapter.xhtml):
    Fundamentals of indexing and index structures

    *   *Chapters* [*4*](#338675_4_En_4_Chapter.xhtml)*-*[*9*](#338675_4_En_9_Chapter.xhtml):
    Introduction to indexing different types of data

    *   *Chapters* [*9*](#338675_4_En_9_Chapter.xhtml)*-*[*17*](#338675_4_En_17_Chapter.xhtml):
    Effective strategies for creating, maintaining, and fine-tuning indexes


    The purpose of this book is to provide enough information that database professionals
    at any level can become familiar with the indexing features provided by SQL Server
    2022 and be able to use those features to improve database performance. Each chapter
    discusses a single critical component of indexing in SQL Server, providing enough
    high-level information to be able to quickly make changes to tackle common data
    challenges.


    In addition, advanced features are discussed, allowing for a fuller understanding
    of how indexes are stored and used in SQL Server. This enables the ability to
    manage performance against larger and more complex data including columnstore
    indexes, memory-optimized data, and spatial data.


    ## Acknowledgments


    A huge shout-out to the long list of organizers, speakers, colleagues, and volunteers
    who have supported and advised me over the years and provided opportunities to
    grow personally and professionally.


    Thank you for providing chances to write, speak, and share my perspectives and
    knowledge when I was young and still stumbling through this world. Those first
    (and second… and third…) chances are invaluable!


    To all of you who helped me arrive at where I am today (you know who you are),
    thank you!


    ## About the Authors About the Technical Reviewer


    # 1. Index Fundamentals


    The goal of this book is to help improve SQL database performance through the
    use of indexes. To accomplish this, the purpose and use of indexes will be introduced.
    This will lead to a discussion of how data is stored in indexes, focusing on clustered,
    non-clustered, and columnstore indexes. We will also explore heaps. Indexing is
    a key component in any database, whether it is stored on premises or in Azure
    (or another cloud service).


    This chapter provides the building blocks for understanding the logical design
    of indexes.'
