    针对示例表的第一个测试将查看查询所有三个表以检索员工姓名和职位角色信息。这些查询如清单 13-10 所示，基于`dbo.JobRole`中的`RoleName`检索信息。在代码中，`EmployeeJobRole`表的两个版本使用不同的聚集键创建。这导致执行计划存在巨大差异，如测试查询的结果图
