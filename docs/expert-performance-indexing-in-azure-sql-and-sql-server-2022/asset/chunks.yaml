  trans: "\n## 数据库引擎调优顾问\n\n数据库引擎调优顾问（`DTA`）已在第 9 章中讨论。在那一章里，介绍了使用`DTA`的两种模式：图形界面（GUI）和命令行实用工具。虽然调整查询通常是一个查看统计信息和评估执行计划的过程，但`DTA`提供了一种加速此分析的方法，它利用前一章监控过程中的跟踪文件来识别潜在有用的索引建议。此过程能在对生产环境影响最小的情况下完成调优，因为所有建议都源自非生产环境的分析。\n\
    \n使用`DTA`索引分析的基本过程可以分解为五个不同的步骤，如图 16-19 所示：\n\n1.  收集工作负载。\n2.  收集元数据。\n3.  执行调优。\n\
    4.  考虑建议并进行审查。\n5.  部署变更。\n\n通过这个过程，我们可以在索引方面抢占先机，并着手处理与现有性能问题相关的建议。\n\n![](img/338675_4_En_16_Fig19_HTML.png)\n\
    \n一个流程图定义了来自生产环境的工作负载、元数据和调优通过数据库发送到非生产环境。建议和部署则从数据库发送到生产环境。\n图 16-19\n使用`DTA`索引分析的步骤\n\
    \n该过程的第一步是收集工作负载。如果我们遵循了前一章索引监控过程中的步骤，那么这些信息应该已经被收集了。工作负载应代表两种标准场景。首先，收集一个代表典型一天的工作负载，因为即使是正常的一天也可能存在潜在的性能问题，调优可以帮助缓解这些问题。其次，收集已知存在性能问题时段的工作负载。这将有助于提供可能通过手动调优实现的建议。\n\
    \n收集工作负载后，下一步是收集必要的元数据以开始调优会话。收集元数据包括两个部分。第一部分是为`DTA`会话创建一个 XML 输入文件。XML 输入文件包含生产服务器和非生产服务器的名称，以及工作负载的位置和要使用的调优选项类型（清单\
    \ 16-40 展示了一个示例）。有关调优选项的更多信息，请参见第 9 章。此步骤的第二部分是对调优的影响，源自第一部分。当调优发生时，SQL Server\
    \ 将从生产数据库收集架构和统计信息，并将这些信息移动到非生产服务器。虽然数据库不会有生产数据，但它将拥有做出索引建议所需的信息。\n\n```\nSTR8-SQL-PRD\n\
    AdventureWorks2017\nc:\\temp\\IndexingMethod.trc\nSTR8-SQL-TEST \nIDX\nNONE\n\
    NONE\n```\n清单 16-40\n`DTA`的 XML 输入文件示例\n\n注意：我们可以在 SQL Server 联机丛书中找到有关 XML 输入文件配置的更多信息，网址为[`https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/tools/dta/simple-xml-input-file-sample-dta%253Fview%253Dsql-server-ver16)。\n\
    \n下一步是实际执行`DTA`调优会话。要运行会话，请使用`-ix`命令行选项执行`DTA`命令，如清单 16-41 所示。由于会话的所有配置信息都位于 XML\
    \ 文件中，因此无需添加任何额外参数。\n\n```\ndta -ix \"c:\\temp\\SessionConfig.xml\"\n```\n清单 16-41\n\
    带有 XML 输入文件的`DTA`命令\n\n调优会话完成后，将会收到一个索引建议列表。这并不是此部分流程的最后一步。在实施`DTA`的任何建议之前，必须对其进行审查。虽然使用此工具将加速索引分析过程，但所有建议都需要经过审查和验证，以确保其合理，并且不会使表上的索引超出\
    \ SQL Server 对该工作负载的支持能力。\n\n最后一步是部署索引建议。此步骤从技术上讲超出了索引方法当前阶段的范围。不过，此时我们应该熟悉将要实施的索引变更。将这些变更添加到来自其他分析的现有索引变更列表中，并为实施做好准备，这将在下一章中讨论。\n"
- fmt: "## Unused Indexes\n\nOne of the necessary and potentially dangerous steps\
    \ during index analysis is determining which indexes to remove. Some indexes will\
    \ be removed because of consolidation or because they are duplicates. Often these\
    \ have less risk than when indexes are dropped. The indexes in this other category\
    \ are those that are unused.\n\nThe easiest manner for identifying indexes that\
    \ are not used is to check the list of indexes in each database against the `dbo.index_usage_stats_history`\
    \ table in the `IndexingMethod` database. If there are any unused indexes in the\
    \ database, the query in Listing 16-42 will identify them. One word of caution\
    \ with unused indexes: In this analysis, heaps and clustered indexes are ignored,\
    \ along with any unique indexes and primary keys. Indexes with these properties\
    \ are often related to other business rules, and their removal should be based\
    \ on other factors. Figure 16-20 shows an example of unused indexes in the `AdventureWorks2017`\
    \ database.\n\n![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig20_HTML.png)\n\
    \nFigure 16-20: Output for query identifying missing foreign key indexes\n\n```sql\n\
    SELECT OBJECT_NAME(we.object_id) AS table_name,\n       COALESCE(we.name, SPACE(0))\
    \ AS index_name,\n       ps.partition_number,\n       ps.row_count,\n       CAST((ps.reserved_page_count\
    \ * 8) / 1024\\. AS DECIMAL(12, 2)) AS size_in_mb,\n       COALESCE(ius.user_seeks,\
    \ 0) AS user_seeks,\n       COALESCE(ius.user_scans, 0) AS user_scans,\n     \
    \  COALESCE(ius.user_lookups, 0) AS user_lookups,\n       we.type_desc\nFROM sys.all_objects\
    \ t\nINNER JOIN sys.indexes we ON t.object_id = we.object_id\nINNER JOIN sys.dm_db_partition_stats\
    \ ps ON we.object_id = ps.object_id\n                                       AND\
    \ we.index_id = ps.index_id\nLEFT OUTER JOIN sys.dm_db_index_usage_stats ius ON\
    \ ius.database_id = DB_ID()\n                                               AND\
    \ we.object_id = ius.object_id\n                                             \
    \  AND we.index_id = ius.index_id\nWHERE we.type_desc NOT IN ( 'HEAP', 'CLUSTERED'\
    \ )\n  AND we.is_unique = 0\n  AND we.is_primary_key = 0\n  AND we.is_unique_constraint\
    \ = 0\n  AND COALESCE(ius.user_seeks, 0) <= 0\n  AND COALESCE(ius.user_scans,\
    \ 0) <= 0\n  AND COALESCE(ius.user_lookups, 0) <= 0\nORDER BY OBJECT_NAME(we.object_id),\n\
    \         we.name;\n```\nListing 16-42: Query for Unused Indexes\n\nWhile this\
    \ section did not discuss it, there are two additional scenarios for identifying\
    \ unused indexes. These are lightly used indexes or no longer used indexes. A\
    \ similar process can be used for these situations: instead of looking for indexes\
    \ that have never been used, filter for low usage rates or no use in a period\
    \ of weeks or months. But do not remove these indexes automatically without further\
    \ research and consideration. If the index is lightly used, verify how the index\
    \ is being used before dropping it. It may be used once a day, but that one use\
    \ might be tied to critical processes. Also, with unused indexes, verify that\
    \ the index is not part of a seasonal process. Removing indexes tied to seasonal\
    \ activity can create more of a burden than maintaining them in off-peak times.\
    \ For example, a large or complex monthly report may rely on an index to be able\
    \ to complete in a reasonable amount of time, or using an acceptable amount of\
    \ computing resources (or both).\n\n## Index Plan Usage\n\nIn previous sections\
    \ of this chapter, the concept of checking the plan cache to analyze and investigate\
    \ index usages was discussed. While statistics can show that there was a seek\
    \ or a scan against an index, it does not provide enough detail to indicate which\
    \ columns to add or what caused the index to use a scan rather than a seek. To\
    \ gather this information, the execution plan needs to be consulted. And the place\
    \ where execution plans for your databases are found is the plan cache. In this\
    \ section, for index analysis, we’ll be reviewing two queries that can be used\
    \ to retrieve execution plans from the plan cache.\n\nThe first query is one that\
    \ will be used when there is a need to retrieve all the plans for a specific index.\
    \ Suppose we need to determine what processes, or T-SQL statements, are using\
    \ one of the indexes on a table that is used once or twice a day. For this, we\
    \ can turn to the plan cache with the query in Listing 16-43 and check whether\
    \ the plan for that query is still in the cache. To use the query, replace the\
    \ index name in the variable `@IndexName`, and execute it to return a list of\
    \ plans that use the index. Be cautious if with a database where there are many\
    \ indexes with the same name, since index names need to be unique only on a per-table\
    \ basis. If all indexes are named `IX_1` and `IX_2`, we will need to verify the\
    \ table name in the search to be certain the correct index is identified.\n\n\
    ```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nGO\nDECLARE @IndexName\
    \ sysname = 'PK_SalesOrderHeader_SalesOrderID';\nSET @IndexName = QUOTENAME(@IndexName,\
    \ '[');\nWITH XMLNAMESPACES (\n    DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
    )\n, IndexSearch\nAS (SELECT qp.query_plan,\n           cp.usecounts,\n      \
    \     ix.query('.') AS StmtSimple\n    FROM sys.dm_exec_cached_plans cp\n    \
    \    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp\n        CROSS APPLY\
    \ qp.query_plan.nodes('//StmtSimple') AS p(ix)\n    WHERE query_plan.exist('//Object[@Index\
    \ = sql:variable (\"@IndexName\")]') = 1)\nSELECT StmtSimple.value('StmtSimple[1]/@StatementText',\
    \ 'VARCHAR(4000)') AS sql_text,\n       obj.value('@Database', 'sysname') AS database_name,\n\
    \       obj.value('@Schema', 'sysname') AS schema_name,\n       obj.value('@Table',\
    \ 'sysname') AS table_name,\n       obj.value('@Index', 'sysname') AS index_name,\n\
    \       ixs.query_plan\nFROM IndexSearch ixs\n    CROSS APPLY StmtSimple.nodes('//Object')\
    \ AS o(obj)\nWHERE obj.exist('//Object[@Index = sql:variable(\"@IndexName\")]')\
    \ = 1;\n```\nListing 16-43: Query Plan Cache for Index Usage\n\nAt other times,\
    \ searching for just the name of an index will be too broad of a search of the\
    \ plan cache. In these cases, the query in Listing 16-44 can be used. This query\
    \ adds in the name of a physical operator to the plan cache search. For instance,\
    \ suppose we are investigating `Full Scans/sec` and we know what index is causing\
    \ the spike in the performance counter. Searching for just the index may return\
    \ dozens of execution plans. Alternatively, we could add a search for a particular\
    \ operator, such as an index scan, using the `@op` variable in the query provided.\n\
    \n```sql\nDECLARE @IndexName sysname = 'IX_SalesOrderHeader_SalesPersonID';\n\
    DECLARE @op sysname = 'Index Scan';\n;WITH XMLNAMESPACES (\n    DEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
    )\nSELECT cp.plan_handle,\n       DB_NAME(dbid) + '.' + OBJECT_SCHEMA_NAME(objectid,\
    \ dbid) + '.' + OBJECT_NAME(objectid, dbid) AS database_object,\n       qp.query_plan,\n\
    \       c1.value('@PhysicalOp', 'nvarchar(50)'),\n       c2.value('@Index', 'nvarchar(max)')\n\
    FROM sys.dm_exec_cached_plans cp\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle)\
    \ qp\n    CROSS APPLY query_plan.nodes('//RelOp') r(c1)\n    OUTER APPLY c1.nodes('IndexScan/Object')\
    \ AS o(c2)\nWHERE c2.value('@Index', 'nvarchar(max)') = QUOTENAME(@IndexName,\
    \ '[')\n  AND c1.exist('@PhysicalOp[. = sql:variable(\"@op\")]') = 1;\n```\nListing\
    \ 16-44: Query Plan Cache for Index Usage and Physical Operation\n\nBoth of these\
    \ queries provide mechanisms for investigating indexes in their environment and\
    \ seeing exactly how SQL Server is using them. This information can be easily\
    \ leveraged to identify when problems are occurring and why and then provide a\
    \ path to resolving indexing issues without a lot of the guesswork that many use\
    \ today."
  raw: '## Unused Indexes


    One of the necessary and potentially dangerous steps during index analysis is
    determining which indexes to remove. Some indexes will be removed because of consolidation
    or because they are duplicates. Often these have less risk than when indexes are
    dropped. The indexes in this other category are those that are unused.


    The easiest manner for identifying indexes that are not used is to check the list
    of indexes in each database against the `dbo.index_usage_stats_history` table
    in the `IndexingMethod` database. If there are any unused indexes in the database,
    the query in Listing [16-42](#338675_4_En_16_Chapter.xhtml#PC42) will identify
    them. One word of caution with unused indexes: In this analysis, heaps and clustered
    indexes are ignored, along with any unique indexes and primary keys. Indexes with
    these properties are often related to other business rules, and their removal
    should be based on other factors. Figure [16-20](#338675_4_En_16_Chapter.xhtml#Fig20)
    shows an example of unused indexes in the `AdventureWorks2017` database.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig20_HTML.png)


    A page presents a table under the results tab. Column headers are table name,
    index name, partition number, row count, size in m b, the user seeks, user scans,
    user lookups, and type d e s c. The address under the table name is selected.


    Figure 16-20


    Output for query identifying missing foreign key indexes


    ```

    SELECT OBJECT_NAME(we.object_id) AS table_name,

    COALESCE(we.name, SPACE(0)) AS index_name,

    ps.partition_number,

    ps.row_count,

    CAST((ps.reserved_page_count * 8) / 1024\. AS DECIMAL(12, 2)) AS size_in_mb,

    COALESCE(ius.user_seeks, 0) AS user_seeks,

    COALESCE(ius.user_scans, 0) AS user_scans,

    COALESCE(ius.user_lookups, 0) AS user_lookups,

    we.type_desc

    FROM sys.all_objects t

    INNER JOIN sys.indexes we ON t.object_id = we.object_id

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id

    AND we.index_id = ps.index_id

    LEFT OUTER JOIN sys.dm_db_index_usage_stats ius ON ius.database_id = DB_ID()

    AND we.object_id = ius.object_id

    AND we.index_id = ius.index_id

    WHERE we.type_desc NOT IN ( ''HEAP'', ''CLUSTERED'' )

    AND we.is_unique = 0

    AND we.is_primary_key = 0

    AND we.is_unique_constraint = 0

    AND COALESCE(ius.user_seeks, 0) <= 0

    AND COALESCE(ius.user_scans, 0) <= 0

    AND COALESCE(ius.user_lookups, 0) <= 0

    ORDER BY OBJECT_NAME(we.object_id),

    we.name;

    Listing 16-42

    Query for Unused Indexes

    ```


    While this section did not discuss it, there are two additional scenarios for
    identifying unused indexes. These are lightly used indexes or no longer used indexes.
    A similar process can be used for these situations: instead of looking for indexes
    that have never been used, filter for low usage rates or no use in a period of
    weeks or months. But do not remove these indexes automatically without further
    research and consideration. If the index is lightly used, verify how the index
    is being used before dropping it. It may be used once a day, but that one use
    might be tied to critical processes. Also, with unused indexes, verify that the
    index is not part of a seasonal process. Removing indexes tied to seasonal activity
    can create more of a burden than maintaining them in off-peak times. For example,
    a large or complex monthly report may rely on an index to be able to complete
    in a reasonable amount of time, or using an acceptable amount of computing resources
    (or both).


    ## Index Plan Usage


    In previous sections of this chapter, the concept of checking the plan cache to
    analyze and investigate index usages was discussed. While statistics can show
    that there was a seek or a scan against an index, it does not provide enough detail
    to indicate which columns to add or what caused the index to use a scan rather
    than a seek. To gather this information, the execution plan needs to be consulted.
    And the place where execution plans for your databases are found is the plan cache.
    In this section, for index analysis, we’ll be reviewing two queries that can be
    used to retrieve execution plans from the plan cache.


    The first query is one that will be used when there is a need to retrieve all
    the plans for a specific index. Suppose we need to determine what processes, or
    T-SQL statements, are using one of the indexes on a table that is used once or
    twice a day. For this, we can turn to the plan cache with the query in Listing
    [16-43](#338675_4_En_16_Chapter.xhtml#PC43) and check whether the plan for that
    query is still in the cache. To use the query, replace the index name in the variable
    `@IndexName`, and execute it to return a list of plans that use the index. Be
    cautious if with a database where there are many indexes with the same name, since
    index names need to be unique only on a per-table basis. If all indexes are named
    `IX_1` and `IX_2`, we will need to verify the table name in the search to be certain
    the correct index is identified.


    ```

    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;

    GO

    DECLARE @IndexName sysname = ''PK_SalesOrderHeader_SalesOrderID'';

    SET @IndexName = QUOTENAME(@IndexName, ''['');

    WITH XMLNAMESPACES (

    DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    , IndexSearch

    AS (SELECT qp.query_plan,

    cp.usecounts,

    ix.query(''.'') AS StmtSimple

    FROM sys.dm_exec_cached_plans cp

    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY qp.query_plan.nodes(''//StmtSimple'') AS p(ix)

    WHERE query_plan.exist(''//Object[@Index = sql:variable ("@IndexName")]'') = 1)

    SELECT StmtSimple.value(''StmtSimple[1]/@StatementText'', ''VARCHAR(4000)'') AS
    sql_text,

    obj.value(''@Database'', ''sysname'') AS database_name,

    obj.value(''@Schema'', ''sysname'') AS schema_name,

    obj.value(''@Table'', ''sysname'') AS table_name,

    obj.value(''@Index'', ''sysname'') AS index_name,

    ixs.query_plan

    FROM IndexSearch ixs

    CROSS APPLY StmtSimple.nodes(''//Object'') AS o(obj)

    WHERE obj.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1;

    Listing 16-43

    Query Plan Cache for Index Usage

    ```


    At other times, searching for just the name of an index will be too broad of a
    search of the plan cache. In these cases, the query in Listing [16-44](#338675_4_En_16_Chapter.xhtml#PC44)
    can be used. This query adds in the name of a physical operator to the plan cache
    search. For instance, suppose we are investigating Full Scans/sec and we know
    what index is causing the spike in the performance counter. Searching for just
    the index may return dozens of execution plans. Alternatively, we could add a
    search for a particular operator, such as an index scan, using the `@op` variable
    in the query provided.


    ```

    DECLARE @IndexName sysname = ''IX_SalesOrderHeader_SalesPersonID'';

    DECLARE @op sysname = ''Index Scan'';

    ;WITH XMLNAMESPACES (

    DEFAULT N''http://schemas.microsoft.com/sqlserver/2004/07/showplan''

    )

    SELECT cp.plan_handle,

    DB_NAME(dbid) + ''.'' + OBJECT_SCHEMA_NAME(objectid, dbid) + ''.'' + OBJECT_NAME(objectid,
    dbid) AS database_object,

    qp.query_plan,

    c1.value(''@PhysicalOp'', ''nvarchar(50)''),

    c2.value(''@Index'', ''nvarchar(max)'')

    FROM sys.dm_exec_cached_plans cp

    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle) qp

    CROSS APPLY query_plan.nodes(''//RelOp'') r(c1)

    OUTER APPLY c1.nodes(''IndexScan/Object'') AS o(c2)

    WHERE c2.value(''@Index'', ''nvarchar(max)'') = QUOTENAME(@IndexName, ''['')

    AND c1.exist(''@PhysicalOp[. = sql:variable("@op")]'') = 1;

    Listing 16-44

    Query Plan Cache for Index Usage and Physical Operation

    ```


    Both of these queries provide mechanisms for investigating indexes in their environment
    and seeing exactly how SQL Server is using them. This information can be easily
    leveraged to identify when problems are occurring and why and then provide a path
    to resolving indexing issues without a lot of the guesswork that many use today.'
  trans: "## 未使用的索引\n\n在索引分析过程中，一个必要且可能危险的步骤是确定要删除哪些索引。有些索引会因整合或重复而被移除。通常，这类操作的风险低于直接删除索引。另一类索引则是那些未被使用的索引。\n\
    \n识别未使用索引的最简单方法是，将每个数据库中的索引列表与`IndexingMethod`数据库中的`dbo.index_usage_stats_history`表进行核对。如果数据库中存在任何未使用的索引，清单\
    \ 16-42 中的查询将会识别出它们。关于未使用索引需要提醒一点：在此分析中，堆表、聚集索引以及任何唯一索引和主键都会被忽略。具有这些属性的索引通常与其他业务规则相关，其删除应基于其他因素考虑。图\
    \ 16-20 展示了`AdventureWorks2017`数据库中的一个未使用索引示例。\n\n![](img/338675_4_En_16_Fig20_HTML.png)\n\
    \n图 16-20: 识别缺失外键索引的查询输出结果\n\n```sql\nSELECT OBJECT_NAME(we.object_id) AS table_name,\n\
    \       COALESCE(we.name, SPACE(0)) AS index_name,\n       ps.partition_number,\n\
    \       ps.row_count,\n       CAST((ps.reserved_page_count * 8) / 1024\\. AS DECIMAL(12,\
    \ 2)) AS size_in_mb,\n       COALESCE(ius.user_seeks, 0) AS user_seeks,\n    \
    \   COALESCE(ius.user_scans, 0) AS user_scans,\n       COALESCE(ius.user_lookups,\
    \ 0) AS user_lookups,\n       we.type_desc\nFROM sys.all_objects t\nINNER JOIN\
    \ sys.indexes we ON t.object_id = we.object_id\nINNER JOIN sys.dm_db_partition_stats\
    \ ps ON we.object_id = ps.object_id\n                                       AND\
    \ we.index_id = ps.index_id\nLEFT OUTER JOIN sys.dm_db_index_usage_stats ius ON\
    \ ius.database_id = DB_ID()\n                                               AND\
    \ we.object_id = ius.object_id\n                                             \
    \  AND we.index_id = ius.index_id\nWHERE we.type_desc NOT IN ( 'HEAP', 'CLUSTERED'\
    \ )\n  AND we.is_unique = 0\n  AND we.is_primary_key = 0\n  AND we.is_unique_constraint\
    \ = 0\n  AND COALESCE(ius.user_seeks, 0) <= 0\n  AND COALESCE(ius.user_scans,\
    \ 0) <= 0\n  AND COALESCE(ius.user_lookups, 0) <= 0\nORDER BY OBJECT_NAME(we.object_id),\n\
    \         we.name;\n```\n清单 16-42: 查询未使用索引\n\n尽管本节未作讨论，但还有两种识别未使用索引的额外情况。它们是极少使用的索引和不再使用的索引。对于这些情况，可以采用类似流程：不是查找从未使用过的索引，而是筛选出使用率低的索引，或者在数周或数月内未使用的索引。但在没有进一步研究和考虑的情况下，不要自动删除这些索引。如果索引使用频率很低，在删除前请核实其使用方式。它可能每天只使用一次，但那一次使用可能与关键流程相关。此外，对于未使用的索引，请核实该索引是否属于季节性流程的一部分。删除与季节性活动相关的索引，在非高峰期可能比维护它们带来更大负担。例如，一份庞大或复杂的月度报告可能依赖某个索引才能在合理时间内完成，或使用可接受的计算资源（或两者兼有）。\n\
    \n## 索引的计划使用情况\n\n本章前面几节讨论了检查计划缓存以分析和调查索引使用情况的概念。虽然统计信息可以显示是否有对索引的查找或扫描操作，但它并未提供足够细节来指示应添加哪些列，或是什么原因导致索引使用扫描而非查找。要收集这些信息，需要查阅执行计划。而数据库执行计划所在的位置就是计划缓存。在本节中，针对索引分析，我们将回顾两个可用于从计划缓存中检索执行计划的查询。\n\
    \n第一个查询用于需要检索特定索引的所有相关计划的情况。假设我们需要确定哪些流程或 T-SQL 语句正在使用某个表上的某个索引，而该索引每天只使用一两次。为此，我们可以使用清单\
    \ 16-43 中的查询访问计划缓存，检查该查询的计划是否仍在缓存中。使用该查询时，将变量`@IndexName`中的索引名称替换掉，然后执行它以返回使用该索引的计划列表。请注意，如果数据库中有许多同名索引（因为索引名称只需在表内唯一），则需谨慎处理。如果所有索引都命名为`IX_1`和`IX_2`，我们将在搜索中验证表名，以确保识别出正确的索引。\n\
    \n```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED;\nGO\nDECLARE @IndexName\
    \ sysname = 'PK_SalesOrderHeader_SalesOrderID';\nSET @IndexName = QUOTENAME(@IndexName,\
    \ '[');\nWITH XMLNAMESPACES (\n    DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
    )\n, IndexSearch\nAS (SELECT qp.query_plan,\n           cp.usecounts,\n      \
    \     ix.query('.') AS StmtSimple\n    FROM sys.dm_exec_cached_plans cp\n    \
    \    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp\n        CROSS APPLY\
    \ qp.query_plan.nodes('//StmtSimple') AS p(ix)\n    WHERE query_plan.exist('//Object[@Index\
    \ = sql:variable (\"@IndexName\")]') = 1)\nSELECT StmtSimple.value('StmtSimple[1]/@StatementText',\
    \ 'VARCHAR(4000)') AS sql_text,\n       obj.value('@Database', 'sysname') AS database_name,\n\
    \       obj.value('@Schema', 'sysname') AS schema_name,\n       obj.value('@Table',\
    \ 'sysname') AS table_name,\n       obj.value('@Index', 'sysname') AS index_name,\n\
    \       ixs.query_plan\nFROM IndexSearch ixs\n    CROSS APPLY StmtSimple.nodes('//Object')\
    \ AS o(obj)\nWHERE obj.exist('//Object[@Index = sql:variable(\"@IndexName\")]')\
    \ = 1;\n```\n清单 16-43: 查询计划缓存中的索引使用情况\n\n其他时候，仅按索引名称搜索计划缓存范围可能太广。在这些情况下，可以使用清单\
    \ 16-44 中的查询。该查询在计划缓存搜索中添加了物理运算符名称。例如，假设我们正在调查`Full Scans/sec`，并且我们知道是哪个索引导致了性能计数器的峰值。仅搜索索引可能返回数十个执行计划。或者，我们可以添加对特定运算符（如索引扫描）的搜索，使用提供的查询中的`@op`变量。\n\
    \n```sql\nDECLARE @IndexName sysname = 'IX_SalesOrderHeader_SalesPersonID';\n\
    DECLARE @op sysname = 'Index Scan';\n;WITH XMLNAMESPACES (\n    DEFAULT N'http://schemas.microsoft.com/sqlserver/2004/07/showplan'\n\
    )\nSELECT cp.plan_handle,\n       DB_NAME(dbid) + '.' + OBJECT_SCHEMA_NAME(objectid,\
    \ dbid) + '.' + OBJECT_NAME(objectid, dbid) AS database_object,\n       qp.query_plan,\n\
    \       c1.value('@PhysicalOp', 'nvarchar(50)'),\n       c2.value('@Index', 'nvarchar(max)')\n\
    FROM sys.dm_exec_cached_plans cp\n    CROSS APPLY sys.dm_exec_query_plan(cp.plan_handle)\
    \ qp\n    CROSS APPLY query_plan.nodes('//RelOp') r(c1)\n    OUTER APPLY c1.nodes('IndexScan/Object')\
    \ AS o(c2)\nWHERE c2.value('@Index', 'nvarchar(max)') = QUOTENAME(@IndexName,\
    \ '[')\n  AND c1.exist('@PhysicalOp[. = sql:variable(\"@op\")]') = 1;\n```\n清单\
    \ 16-44: 查询计划缓存中的索引使用情况和物理操作\n\n这两个查询都提供了机制，用于调查其环境中的索引，并查看 SQL Server 具体如何使用它们。这些信息可以轻松地用于识别问题何时发生及原因，从而为解决索引问题提供途径，而无需像现在许多人所做的那样进行大量猜测。"
- fmt: '# Summary


    正如本章所示，从监控索引收集的信息可用于分析索引并识别哪些需要进一步研究。此分析的结果有助于确定要修改的索引类型及位置。诸如数据库引擎优化顾问 (`Database
    Engine Tuning Advisor`) 和缺失索引 `DMO` 之类的索引工具可用于发现“低垂的果实”，为分析提供一个可能无法以其他方式发现的起点。遵循本章概述的索引分析流程，我们可以构建一个稳定、可重复的索引流程，有助于提高数据库平台的性能并随时间推移实现稳定的性能。


    如果本章中多种类型的分析都推荐了特定的索引更改，请优先考虑这些更改，因为它们更有可能带来益处并对性能产生更大的积极影响。


    # 17. 索引方法学


    在本书中，我们讨论了索引是什么、它们的作用、构建它们的模式，以及确定 `SQL Server` 数据库应如何构建索引的许多其他方面。所有这些信息都是数据库索引最后一块拼图所必需的，即管理索引的方法学。为此，需要一个流程来应用这些知识，以确定最适合某个环境并能带来最大性能提升的索引。


    在这最后一章中，将讨论一种可用于构建索引方法学的通用实践。将提供管理索引所需的步骤列表。此方法学可应用于单个数据库、服务器或整个 `SQL Server`
    环境。无论数据库支持的操作或业务类型如何，都可以使用相同的索引构建方法学。


    ## 索引方法


    在开始创建和删除索引之前，首先需要一个流程来分析当前和潜在的索引。此流程需要提供一种方式来观察您的数据库并确定适合它们的索引。正如前几章所提到的，索引应该更像科学而非艺术。正确索引数据库所需的信息是可用的；通过一些研究，可以识别出潜在的索引。类似于科学家使用科学方法来证明理论，数据库管理员和开发人员可以使用索引方法
    (`Indexing Method`) 来证明数据库需要哪些索引。


    本书中使用的索引方法 (`Indexing Method`) 由三个阶段组成：监控 (`Monitor`)、分析 (`Analyze`) 和实施 (`Implement`)（参见图
    17-1）。在每个组成部分中都有若干步骤，完成后有助于为数据库提供适当的索引。在实施 (`Implement`) 阶段完成后，索引方法 (`Indexing
    Method`) 重新启动第一阶段，使索引成为一个持续的迭代过程。


    从监控 (`Monitor`) 阶段开始，主要活动是观察索引。观察包括审查索引的性能和行为（即第 15 章描述的索引概念）。`SQL Server` 将使用它认为最有益的可用索引。通过观察这种行为，您可以识别最常使用的索引以及它们是如何使用的。


    ![](images/338675_4_En_17_Chapter/338675_4_En_17_Fig1_HTML.jpg)


    图 17-1 索引生命周期


    观察之后，索引方法 (`Indexing Method`) 的分析 (`Analyze`) 阶段开始。在分析 (`Analyze`) 阶段（第 16 章详述），上一阶段收集的统计数据用于确定哪些索引最适合数据库。目标是识别需要创建、删除和修改的索引。同时，任何索引更改的影响也将被识别出来。


    索引方法 (`Indexing Method`) 的最后一个阶段是实施 (`Implementation`) 阶段。在此阶段，上一阶段确定的索引被应用（或部署）到数据库中。对于每个数据库和环境，部署过程可能不同。例如，在第三方数据库上部署索引的过程不同于您公司拥有的应用程序。然而，在此阶段，存在适用于所有环境的核心概念；除了实际构建索引之外，您还需要沟通变更计划及变更可能产生的影响。然后，您需要随时间跟踪变更。实施索引不仅仅是执行一个
    `CREATE INDEX` 语句。


    最后一个阶段完成后，索引方法 (`Indexing Method`) 重新从第一阶段开始。这样，索引就是一个持续循环的过程。今天提供最佳性能的索引可能不是明天最理想的索引。主要有两个事件导致需要随时间更改索引。首先是数据使用，应用程序的功能和特性可能随时间变化，因此应用程序的用途也可能改变。其次，数据量和分布可能（并且通常会）随时间变化。随着这些变化，索引可能不再被使用，而其他数据访问路径可能成为必需。数据变化并不是导致索引使用变化的唯一原因；未来
    `SQL Server` 版本或服务包中对查询优化器的更改也可能调整其使用索引的方式。


    现在索引方法 (`Indexing Method`) 的基础知识已经介绍完毕，本章的剩余部分将重点关注实施 (`Implement`) 部分。监控 (`Monitor`)
    和分析 (`Analyze`) 阶段的概念分别在第 15 章和第 16 章中介绍。重要的是，随着您对索引了解更多，将会发现可用于识别索引的新模式。随着您对索引和数据库的了解加深，您会找到其他查看性能和使用统计信息的方法，从而提供更多或更明智的指导。利用本书和您学到的信息，继续扩展您的索引方法学。


    ## 实施


    索引方法 (`Indexing Method`) 的最后阶段是实施 (`Implement`) 阶段。此阶段顾名思义：它实施通过分析 (`Analyze`)
    阶段确定的必要索引更改。虽然此阶段不太复杂，但在实施 (`Implement`) 阶段需要完成一些重要的步骤，这些步骤将有助于建立一个成功的流程。整个流程的目标是改善数据库环境的性能。基于此目标，在实施过程中需要考虑三个关键点：


    *   沟通

    *   源代码控制（例如，通过部署脚本）

    *   执行


    虽然只有最后一步会修改数据库，但其他两点有助于确保变更会被注意到，并且索引方法 (`Indexing Method`) 可以在未来继续使用。'
  raw: '## Summary


    As this chapter showed, the information collected from monitoring indexes can
    be used to analyze indexes and identify which require further research. The results
    from this analysis help to determine what types of indexes to modify and where.
    Indexing tools such as the Database Engine Tuning Advisor and missing index DMOs
    can be leveraged to discover “the low-hanging fruit,” providing a head start on
    analysis that may not have been discovered otherwise. By following the processes
    laid out in this index analysis, we can build a stable, repeatable indexing process
    that can help improve the performance of your database platform and achieve stable
    performance over time.


    If specific indexing changes are recommended by multiple types of analysis in
    this chapter, then prioritize those changes as they are more likely to be beneficial
    and have a greater positive impact on performance.


    # 17. Indexing Methodology


    Throughout this book, we’ve discussed what indexes are, what they do, patterns
    for building them, and many other aspects for determining how a SQL Server database
    should be indexed. All that information is necessary for the last puzzle piece
    in database indexing, which is a methodology for managing indexes. To do this,
    a process is needed for applying that knowledge to determine the indexes that
    are best for an environment and provide the greatest performance gains.


    In this last chapter, a general practice will be discussed that can be used to
    build an indexing methodology. A list of steps necessary to manage indexes will
    be provided. This methodology can be applied to a single database, a server, or
    an entire SQL Server environment. Regardless of the type of operations or business
    the database supports, the same methodology for building indexes can be used.


    ## The Indexing Method


    Before you can begin creating and dropping indexes, a process is first needed
    to analyze current and potential indexes. This process needs to provide a way
    to observe your databases and determine the indexes that are appropriate for them.
    As mentioned in previous chapters, indexing should be more science than an art.
    The information needed to properly index a database is available; through some
    research, potential indexes can be identified. Similar to how scientists use the
    scientific method to prove theories, database administrators and developers can
    use the Indexing Method to prove what indexes a database requires.


    The Indexing Method used in this book is comprised of three phases: Monitor, Analyze,
    and Implement (see Figure [17-1](#338675_4_En_17_Chapter.xhtml#Fig1)). Within
    each component are a number of steps that, when completed, help to provide the
    appropriate indexing for the database. At the completion of the Implement phase,
    the Indexing Method restarts the first phase, making indexing a continuous and
    iterative process.


    When starting with the Monitor phase, the primary activity is to observe the indexes.
    The observations entail reviewing both the performance and the behavior of the
    indexes (i.e., the indexing concepts described in Chapter [15](#338675_4_En_15_Chapter.xhtml)).
    SQL Server will use the indexes that it finds most beneficial from those available.
    By observing this behavior, you can identify the indexes that are most often used
    and how they are used.


    ![](images/338675_4_En_17_Chapter/338675_4_En_17_Fig1_HTML.jpg)


    A cyclic diagram presents three phases: monitor, implement, and analyze.


    Figure 17-1


    The indexing life cycle


    After the observations, the Analyze phase of the Indexing Method begins. In the
    Analyze phase, detailed in Chapter [16](#338675_4_En_16_Chapter.xhtml), the statistics
    collected in the previous phase are used to determine what indexes are best suited
    for the database. The goal is to identify what indexes need to be created, dropped,
    and modified. Along with this, the impacts of any indexing changes are also identified.


    The last phase of the Indexing Method is the Implementation phase. In this phase,
    the indexes from the last phase are applied (or deployed) to the databases. For
    every database and environment, the deployment process may be different. For instance,
    the process for deploying indexes on third-party databases differs from applications
    owned by your company. Within this phase, though, there are core concepts that
    apply to all environments; outside of physically building the indexes, you will
    need to communicate the change plan and possible effects of the change. Then,
    you need to track the changes over time. There is more to implementing indexes
    than executing a `CREATE INDEX` statement.


    After the last phase completes, the Indexing Method begins again with the first
    phase. In this way, indexing is a continuous and circular process. The indexes
    that provide the best performance today may not be the ideal indexes for tomorrow.
    Two events primarily contribute to the need for changing indexes over time. The
    first is data usage, where the functions and features of applications can change
    over time, so the purpose of the application can also change. Second, the data
    population and distribution can, and usually will, change over time. With these
    changes, indexes may shift out of usage, and other data access paths may be required.
    Data changes are not the only things that can cause index usage to change; changes
    to the query optimizer in a future SQL Server version or service pack may adjust
    how indexes are used by it.


    Now that the basics of the Indexing Method are covered, the remainder of this
    chapter will focus on the Implement portion. The concepts for the Monitor and
    Analyze phases are covered in Chapters [15](#338675_4_En_15_Chapter.xhtml) and
    [16](#338675_4_En_16_Chapter.xhtml), respectively. It is important that as you
    learn more about indexes, new patterns will be discovered that can be used to
    identify indexes. As you learn more about indexing and your databases, you will
    find other ways to look at performance and usage statistics that provide more,
    or better informed, guidance. Use this book and the information you learn to continue
    to expand your indexing methodology.


    ## Implement


    The final phase of the Indexing Method is the Implement phase. This phase does
    as the name implies: it implements the indexing changes that were determined as
    necessary through the Analyze phase. While this phase is less complex, there are
    some important steps that need to be completed during the Implement phase that
    will help build out a successful process. The aim of the entire process is to
    improve the performance of a database environment. With this aim, there are three
    key points to consider during implementation:


    *   Communication


    *   Source code control (e.g., via deployment scripts)


    *   Execution


    While the last step is the only one where the database is modified, the other
    two help ensure that the changes will be noticed and that the Indexing Method
    can continue to be used in the future.'
  trans: '

    # 总结


    正如本章所示，从监控索引收集的信息可用于分析索引并识别哪些需要进一步研究。此分析的结果有助于确定要修改的索引类型及位置。诸如数据库引擎优化顾问 (`Database
    Engine Tuning Advisor`) 和缺失索引 `DMO` 之类的索引工具可用于发现“低垂的果实”，为分析提供一个可能无法以其他方式发现的起点。遵循本章概述的索引分析流程，我们可以构建一个稳定、可重复的索引流程，有助于提高数据库平台的性能并随时间推移实现稳定的性能。


    如果本章中多种类型的分析都推荐了特定的索引更改，请优先考虑这些更改，因为它们更有可能带来益处并对性能产生更大的积极影响。


    # 17. 索引方法学


    在本书中，我们讨论了索引是什么、它们的作用、构建它们的模式，以及确定 `SQL Server` 数据库应如何构建索引的许多其他方面。所有这些信息都是数据库索引最后一块拼图所必需的，即管理索引的方法学。为此，需要一个流程来应用这些知识，以确定最适合某个环境并能带来最大性能提升的索引。


    在这最后一章中，将讨论一种可用于构建索引方法学的通用实践。将提供管理索引所需的步骤列表。此方法学可应用于单个数据库、服务器或整个 `SQL Server`
    环境。无论数据库支持的操作或业务类型如何，都可以使用相同的索引构建方法学。


    ## 索引方法


    在开始创建和删除索引之前，首先需要一个流程来分析当前和潜在的索引。此流程需要提供一种方式来观察您的数据库并确定适合它们的索引。正如前几章所提到的，索引应该更像科学而非艺术。正确索引数据库所需的信息是可用的；通过一些研究，可以识别出潜在的索引。类似于科学家使用科学方法来证明理论，数据库管理员和开发人员可以使用索引方法
    (`Indexing Method`) 来证明数据库需要哪些索引。


    本书中使用的索引方法 (`Indexing Method`) 由三个阶段组成：监控 (`Monitor`)、分析 (`Analyze`) 和实施 (`Implement`)（参见图
    17-1）。在每个组成部分中都有若干步骤，完成后有助于为数据库提供适当的索引。在实施 (`Implement`) 阶段完成后，索引方法 (`Indexing
    Method`) 重新启动第一阶段，使索引成为一个持续的迭代过程。


    从监控 (`Monitor`) 阶段开始，主要活动是观察索引。观察包括审查索引的性能和行为（即第 15 章描述的索引概念）。`SQL Server` 将使用它认为最有益的可用索引。通过观察这种行为，您可以识别最常使用的索引以及它们是如何使用的。


    ![](img/338675_4_En_17_Fig1_HTML.jpg)


    图 17-1 索引生命周期


    观察之后，索引方法 (`Indexing Method`) 的分析 (`Analyze`) 阶段开始。在分析 (`Analyze`) 阶段（第 16 章详述），上一阶段收集的统计数据用于确定哪些索引最适合数据库。目标是识别需要创建、删除和修改的索引。同时，任何索引更改的影响也将被识别出来。


    索引方法 (`Indexing Method`) 的最后一个阶段是实施 (`Implementation`) 阶段。在此阶段，上一阶段确定的索引被应用（或部署）到数据库中。对于每个数据库和环境，部署过程可能不同。例如，在第三方数据库上部署索引的过程不同于您公司拥有的应用程序。然而，在此阶段，存在适用于所有环境的核心概念；除了实际构建索引之外，您还需要沟通变更计划及变更可能产生的影响。然后，您需要随时间跟踪变更。实施索引不仅仅是执行一个
    `CREATE INDEX` 语句。


    最后一个阶段完成后，索引方法 (`Indexing Method`) 重新从第一阶段开始。这样，索引就是一个持续循环的过程。今天提供最佳性能的索引可能不是明天最理想的索引。主要有两个事件导致需要随时间更改索引。首先是数据使用，应用程序的功能和特性可能随时间变化，因此应用程序的用途也可能改变。其次，数据量和分布可能（并且通常会）随时间变化。随着这些变化，索引可能不再被使用，而其他数据访问路径可能成为必需。数据变化并不是导致索引使用变化的唯一原因；未来
    `SQL Server` 版本或服务包中对查询优化器的更改也可能调整其使用索引的方式。


    现在索引方法 (`Indexing Method`) 的基础知识已经介绍完毕，本章的剩余部分将重点关注实施 (`Implement`) 部分。监控 (`Monitor`)
    和分析 (`Analyze`) 阶段的概念分别在第 15 章和第 16 章中介绍。重要的是，随着您对索引了解更多，将会发现可用于识别索引的新模式。随着您对索引和数据库的了解加深，您会找到其他查看性能和使用统计信息的方法，从而提供更多或更明智的指导。利用本书和您学到的信息，继续扩展您的索引方法学。


    ## 实施


    索引方法 (`Indexing Method`) 的最后阶段是实施 (`Implement`) 阶段。此阶段顾名思义：它实施通过分析 (`Analyze`)
    阶段确定的必要索引更改。虽然此阶段不太复杂，但在实施 (`Implement`) 阶段需要完成一些重要的步骤，这些步骤将有助于建立一个成功的流程。整个流程的目标是改善数据库环境的性能。基于此目标，在实施过程中需要考虑三个关键点：


    *   沟通

    *   源代码控制（例如，通过部署脚本）

    *   执行


    虽然只有最后一步会修改数据库，但其他两点有助于确保变更会被注意到，并且索引方法 (`Indexing Method`) 可以在未来继续使用。

    '
- fmt: '## Communication


    The first hurdle in modifying the indexes on any database is the need to communicate
    with management and users of the database your intent to change the database.
    Modifications to the database can often raise red flags, especially when they
    are being prescribed by nonowners of the application the database supports. Preparing
    for and implementing open lines of communication between the owners of applications
    and the database administration and development teams will help not only in the
    indexing process but in other areas of mutual interest. Without this communication,
    teams can be blindsided by the indexing changes, which may impact something that
    the analysis did not uncover or a feature that is planned but not yet released.


    When it comes to communication, there are basically two items that need to be
    prepared for the owners of the databases: an impact analysis of the indexing changes
    and a status report of the changes after implementation. This is analogous to
    the quality assurance processes that are followed when new features are architected,
    released, and tested.


    ### Impact Analysis


    When preparing for changes to indexing on a database, it is important to highlight
    the intended changes to application performance. Historically, this may have sometimes
    been a guessing game. There was not a lot of easily accessed information that
    would indicate where an index is being used, how it is being used, and the frequency
    of use.


    With the processes laid out in the `Monitor` phase, you gain the ability to confidently
    understand index usage. You can determine when it was last used and what operations
    were included. There is information that can also be used to identify the trend
    in which an index will no longer be used or is being used more frequently.


    Through the `Analyze` phase, steps were laid out that allow the identification
    of execution plans that are using different indexes. Use these steps to identify
    where an index change will have an impact, and then perform sample executions
    of the `T-SQL` statements before and after the indexing changes are made.


    Ultimately, the impact analysis will impact two important roles within the `Implement`
    phase. First, it will communicate to managers and peers the intent of the indexing
    changes, informing them of the changes to validate what is being done and allowing
    them the chance for feedback. Second, the impact analysis provides an insurance
    policy in case an index change has an unexpected negative impact. This is not
    to say that there will not be negative repercussions to poor indexing recommendations,
    but with others involved and the impact documented, it is more likely that a negative
    impact can be mitigated quickly, possibly even before that impact is realized
    in a production environment.


    Note


    In one environment that I worked in, some lightly used indexes were removed from
    the database. They were generally used once per day. That one time was for a business-critical
    import process that could not perform without them. Had an impact analysis been
    done prior to removing those indexes, a lot of tough questions could have been
    avoided.


    ### Status Report


    On the opposite end of the `Implement` phase is the status report. As the name
    implies, the status report is a document that provides feedback to managers and
    peers about the actual impact of indexes. This document does not need to be extensive,
    but it does need to cover some key points. The status report should cover the
    following information:


    *   All index changes made


    *   Status on deployment of changes


    *   Brief performance review


    *   Information on any regressions noted


    *   What was learned in the deployment process


    *   Summary of issues encountered


    Do not get too mired in the details while writing the status report. A successful
    indexing deployment will lead to additional `Monitor` and `Analyze` phases in
    the future. In the end, the status report needs to communicate two things. First,
    it provides an honest assessment of the successes and failures of the indexing
    deployment. Second, and most importantly, it lists what benefits are now being
    realized by the indexing changes. This is most important because it is the return
    on investment (`ROI`) that managers need to see to be able to justify the time
    and effort spent on indexing.


    Note


    One of the most successful things I did as a consultant was constantly updating
    customers about the impact of indexing changes I’d make. A graph with before and
    after performance often looked like a “self-pat on the back” with some of the
    teams I was assisting, but the management that brought me in found it incredibly
    useful in identifying the `ROI` of bringing in consultants but also communicating
    further up the line the effort being placed in resolving business concerns with
    performance.


    ## Deployment Scripts


    The primary deliverable from the `Analyze` phase is a list of index changes that
    are planned for the databases in your environment. During the `Implement` phase,
    those indexes need to be reviewed and prepared for deployment. As part of preparing
    the indexes for deployment, three steps need to occur:


    1.  Prepare the deployment and rollback of the schema.


    2.  Save index changes to source code control.


    3.  Share results of peer review with impact analysis.


    ### Prepare Deployment and Rollback of Schema


    Usually, at the completion of the `Analyze` phase, you will have a list of the
    index changes that are being proposed. This list typically is not in a state that
    can be used for deployment at the end of the phase. Between that point and the
    execution of the changes, the indexing changes need to be put into a state that
    can be used for their deployment.


    When building the deployment scripts, be sure to observe the idea of “doing no
    harm” to the database. In other words, scripts should be built that are intelligent
    enough that they can be executed multiple times with the identical results. Also,
    this means that scripts should be available to reverse any indexing changes being
    made. Never assume that the previous indexing state of a table is being stored
    in source code control. Check to be certain that the existing state is known,
    and develop scripts to revert to that state if needed.


    The deployment scripts also need to be aware of the edition of `SQL Server` that
    is being used. For instance, if you are using `Enterprise Edition`, leverage `online
    index rebuilds` for indexes that are being rebuilt with new characteristics. If
    appropriate for the index, `Enterprise Edition` also allows for compression on
    the index, which can save space and improve performance in many cases.


    Similarly, ensure that deployment scripts are written to minimize disruption to
    production systems. If offline operations are required, ensure that they occur
    at times when such disruptions are acceptable to the affected application. Similar
    guidance should be considered for operations that will lock tables or cause blocking.
    Deployments that are less disruptive will not only impact software applications
    less, but they are less likely to cause operational problems for the database
    servers that are being targeted with the deployment script.'
