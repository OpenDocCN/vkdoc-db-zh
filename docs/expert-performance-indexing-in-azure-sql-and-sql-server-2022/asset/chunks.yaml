- fmt: '### DBCC EXTENTINFO


    Like `sys.dm_db_database_page_allocations`, `DBCC EXTENTINFO` provides information
    about extent allocations that occur within a database. This identifies how extents
    have been allocated and whether the extents being used are mixed or uniform. Listing
    3-8 shows the syntax for using `DBCC EXTENTINFO`. When using the command, there
    are four parameters that can be populated, which are defined in Table 3-5.


    Table 3-5

    DBCC EXTENTINFO Parameters


    | **Parameter** | **Description** |

    | --- | --- |

    | `database_name | database_id` | Specifies either the database name or the database
    ID where the page will be retrieved. This defaults to the current database if
    this parameter is not provided or if zero is used for its value. |

    | `table_name | table_object_id` | Specifies which table to return in the output
    by providing either the table name or the `object_ID` for the table. If no value
    is provided, the output will include results for all tables. |

    | `index_name | index_id` | Specifies which index to return in the output by providing
    either the index name or the `index_ID`. If –1 or no value is provided, then the
    output will include results for all indexes on the table. |

    | `partition_id` | Specifies which partition of the index to return in the output
    by providing the partition number. If 0 or no value is provided, then the output
    will include results for all partitions on the index. |


    ```

    DBCC EXTENTINFO ( {database_name | database_id | 0}

    , {table_name | table_object_id}, { index_name | index_id | -1}

    , { partition_id | 0}

    ```


    Listing 3-8

    DBCC EXTENTINFO Syntax


    When executing `DBCC EXTENTINFO`, a dataset is returned that includes the columns
    defined in Table 3-6. For every extent allocation, there will be one row in the
    results. Since extents are comprised of eight pages, there can be as many as eight
    allocations for an extent when there are single-page allocations, such as when
    mixed extents are used. When uniform extents are used, there will be only one
    extent allocation and one row returned for the extent.


    Table 3-6

    DBCC EXTENTINFO Output Columns


    | **Parameter** | **Description** |

    | --- | --- |

    | `file_id` | File number for where the page is located. |

    | `page_id` | Page number for the page. |

    | `pg_alloc` | Number of pages allocated from the extent to the object. |

    | `ext_size` | Size of the extent. |

    | `object_id` | Object ID for the table. |

    | `index_id` | Index ID associated with the heap or index. |

    | `partition_number` | Partition number for the heap or index. |

    | `partition_id` | Partition ID for the heap or index. |

    | `iam_chain_type` | The type of IAM chain the extent is used for. Values can
    be in-row data, LOB data, and overflow data. |

    | `pfs_bytes` | Bytes array that identifies the amount of free space, whether
    there are ghost records, whether the page is an IAM page, whether it is allocated,
    and whether it is part of a mixed extent. |


    To demonstrate how this command works, an example will be provided that illustrates
    how extents are allocated. In the example, shown in Listing 3-9, `dbo.IndexInternalsOne`
    will be reused from the last section.


    ```

    USE Chapter2Internals

    GO

    DBCC EXTENTINFO(0, IndexInternalsOne, -1)

    ```


    Listing 3-9

    DBCC EXTENTINFO dbo.IndexInternalsOne


    The results for the `DBCC` command, shown in Figure 3-5, show that there are 13
    total pages allocated to the table. The items of interest in these results are
    the `pg_alloc` and `ext_size` columns. In the first row, the pages allocated are
    nine, accounting for the Index Allocation Map page and the eight pages for the
    extent. In the second row, there are 4 pages allocated, which is the balance of
    the 12 records inserted into the table. Both rows should have 8 for the extent
    size, since uniform extents are allocated.


    ![](images/338675_4_En_3_Chapter/338675_4_En_3_Fig5_HTML.png)


    A screenshot of a query table results of 2 rows of data. The column headers are
    file i d, page i d, page allocation, e x t size, object i d, index i d, partition
    number, partition i d, i am chain type, and p f s bytes. Page allocations are
    9 and 4 in the table.


    Figure 3-5

    DBCC EXTENTINFO for pages in dbo.IndexInternalsOne


    In SQL Server versions prior to SQL Server 2016, the behavior will be quite different
    since it will leverage single-page allocations for each transaction until the
    first extent is filled. This behavior change is due to the behavior of trace flag
    1118 becoming default behavior for SQL Server.


    Though `DBCC EXTENTINFO` doesn’t provide as much detail as `sys.dm_db_database_page_allocations`,
    it can be useful for identifying extents assigned to a table, especially when
    using SQL Server versions prior to SQL Server 2012.'
