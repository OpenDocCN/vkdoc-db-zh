    \ `timestamp` 列，可以跟踪更改。只有发现需要更改的行才会被处理。这意味着必须满足表上存在 `timestamp` 列的要求才能执行增量填充。对于更改极其频繁的数据，这可能不是理想的选择。然而，对于随机且很少更改的数据，增量填充可能是理想的。\n\
    \n## 停止列表\n\n停止列表在管理不进行填充的内容方面极其有用。这可以通过绕过所谓的“干扰词”来提高填充性能。例如，考虑句子 “A dog chewed\
    \ through the fiber going to the SAN causing the disaster recovery plans to be\
    \ used for the SQL Server instance.” 在这个句子中，最应该被索引的有用词是 `fiber`、`SAN`、`disaster`、`recovery`、`SQL`\
    \ 或 `Server`。而 `A`、`the`、`to` 和 `be` 则不是理想的索引词。这些词被认为是干扰词，不属于填充过程的一部分。人们很少搜索介词、副词或其他用于连接想法而非构成想法本身的词语。\n\
    \n使用停止列表对整体填充性能和解析全文索引内容非常有帮助。停止列表的使用也可以特定于语言。例如，法语中的 `la` 会优先于英语中的 `the` 被指定。\n\
    \n要创建自定义停止列表，请使用 `CREATE FULLTEXT STOPLIST` 语句，如清单 9-5 所示。可以使用系统默认的停止列表来预生成所有已被识别为干扰词的词。对于本文档示例，停止列表的名称将是\
    \ `WhitePaperStopList`。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT\
    \ STOPLIST WhitePaperStopList FROM SYSTEM STOPLIST;\nListing 9-5\nCreating a Full-Text\
    \ StopList\n```\n\n要查看停止列表，请使用系统视图 `sys.fulltext_stoplists` 和 `sys.fulltext_stopwords`。`sys.fulltext_stoplists`\
    \ 视图将保存与在 SQL Server 实例上创建的停止列表相关的元数据。确定 `stoplist_id` 以连接到 `sys.fulltext_stopwords`\
    \ 来显示完整的词列表。单独来看，此停止列表并不比系统默认停止列表更好。要向停止列表添加词，请使用 `ALTER FULLTEXT STOPLIST` 语句，如清单\
    \ 9-6 所示，该语句移除了 `Downtime` 一词作为待索引词。\n\n```sql\nUSE AdventureWorks2017\nGO\nALTER\
    \ FULLTEXT STOPLIST WhitePaperStopList ADD 'Downtime' LANGUAGE 1033;\nListing\
    \ 9-6\nModifying a Full-Text StopList\n```\n\n要查看停止列表中的词，请运行清单 9-7 所示的查询。\n\n\
    ```sql\nUSE AdventureWorks2017\nGO\nSELECT  lists.stoplist_id,\n        lists.name,\n\
    \        words.stopword\nFROM    sys.fulltext_stoplists AS lists\nINNER JOIN \
    \   sys.fulltext_stopwords AS words\n    ON lists.stoplist_id = words.stoplist_id\n\
    WHERE   words.language = 'English'\nORDER BY lists.name;\nListing 9-7\nUsing sys.fulltext_stoplists\
    \ to Review StopList Words\n```\n\n查询结果如图 9-1 所示；单词 `Downtime` 已成功添加。\n\n![](img/338675_4_En_9_Fig1_HTML.png)\n\
    \n一张包含 3 列（stoplist id、name 和 stopword）的表格截图。表格有 4 行，编号从 13 到 16。第 4 行的 stopword\
    \ 列下显示有条目 \"downtime\"。\n\n图 9-1\n停止列表的查询结果\n\n## 创建和使用全文索引\n\n在目录、停止列表以及清单 9-1\
    \ 中创建的表上定义的键索引可用之后，可以在该表的 `DOC` 列上创建全文索引。要创建全文索引，请使用 `CREATE FULLTEXT INDEX` 语句（参见清单\
    \ 9-8）。\n\n```sql\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT INDEX ON dbo.SQLServerDocuments\n\
    (\n  DOC\n  TYPE COLUMN DocType\n)\nKEY INDEX PK_SQLServerDocuments\nON WhitePaperCatalog\n\
    WITH STOPLIST = WhitePaperStopList;\nListing 9-8\nCREATE FULLTEXT INDEX Statement\n\
    ```\n\n一旦索引创建完成，由于没有为 `CHANGE_TRACKING` 添加选项，填充将立即开始。目录状态的监控将在本章后面讨论。根据文档的大小，加载可能需要一段时间，因为默认的\
    \ `AUTO` 设置会生效。要查询 `SQLServerDocuments` 表和 `DOC` 列的内容，可以运行 `CONTAINS` 语句来返回特定的词。清单\
    \ 9-9 展示了此类语句的示例。\n\n```sql\nUSE AdventureWorks2017\nGO\nSELECT  ssd.DOC,\n  \
    \      ssd.DocType\nFROM    dbo.SQLServerDocuments AS ssd\nWHERE   CONTAINS (ssd.DOC,\
    \ 'statistic');\nListing 9-9\nUsing CONTAINS to Query for a Specific Word\n```\n\
    \n图 9-2 显示了查询的执行计划。\n\n![](img/338675_4_En_9_Fig2_HTML.jpg)\n\n一个包含 4 个组件及其各自成本百分比的流程图：select\
    \ 和 nested loops 各为 0；Clustered index scan 和 table-valued function 各为 50。\n\n\
    图 9-2\nCONTAINS 和全文索引使用的执行计划\n\n通过使用 `CONTAINS`(ssd.DOC,`'statistic')` 进行搜索，图\
    \ 9-2 中的执行计划显示了在 `FulltextMatch` 上的操作。它还返回文档类型为 `.docx` 的本文档作为此次词搜索的匹配项。\n"
- fmt: "# Full-Text Search Index Catalog Views and Properties\n\nSQL Server provides\
    \ a wealth of information about indexes in general. Performance, configurations,\
    \ usage, and storage can be found within catalog views. As with other index objects,\
    \ full-text indexes require the same attention and detail to maintenance and options\
    \ to ensure they consistently improve performance rather than hinder it.\n\nTable\
    \ 9-2 describes the catalog views available for full-text search.\n\nTable 9-2:\
    \ Full-Text Catalog Views\n\n| Catalog View Name | Description |\n| --- | ---\
    \ |\n| `sys.fulltext_catalogs` | Lists all full-text catalogs and high-level properties.\
    \ |\n| `sys.fulltext_document_types` | Returns a complete list of document types\
    \ that are available for indexing. Each of these document types will be registered\
    \ on the instance of SQL Server. |\n| `sys.fulltext_index_catalog_usages` | |\n\
    | `sys.fulltext_index_columns` | Lists all columns that are indexed. |\n| `sys.fulltext_index_fragments`\
    \ | Lists all details of the full-text index fragments (storage of the inverted\
    \ index data). |\n| `sys.fulltext_indexes` | Lists every full-text index and properties\
    \ set on the indexes. |\n| `sys.fulltext_languages` | Lists all the available\
    \ languages on the instance to full-text indexing. |\n| `sys.fulltext_semantic_language_statistics_database`\
    \ | Lists semantic language statistics databases installed. |\n| `sys.fulltext_semantic_languages`\
    \ | List all of the languages with statistics models registered. |\n| `sys.fulltext_stoplists`\
    \ | Lists every StopList created. |\n| `sys.fulltext_stopwords` | Lists all StopWords\
    \ in the database. |\n| `sys.fulltext_system_stopwords` | Lists the preloaded\
    \ system StopWords. |\n\nFor informational purposes, while reviewing catalogs,\
    \ properties, and status results for population, invoke the `FULLTEXTCATALOGPROPERTY`\
    \ function, as shown in Listing 9-10.\n\n```\nUSE AdventureWorks2017\nGO\nFULLTEXTCATALOGPROPERTY\
    \ ('catalog_name' ,'property')\nListing 9-10\nQuerying Properties from a Full-Text\
    \ Index\n```\n\nThe information returned will provide a wealth of detail on the\
    \ state of the catalog, including population status. The `catalog_name` parameter\
    \ will accept any full-text catalog, and then a listing of properties can be utilized\
    \ to return the specific information needed. Table 9-3 lists the properties that\
    \ can be passed into the function.\n\nTable 9-3: Full-Text Catalog Properties\n\
    \n| Property Name | Description |\n| --- | --- |\n| `AccentSensitivity` | Catalog’s\
    \ current accent sensitivity setting. This returns 0, which means insensitive,\
    \ or 1, which means sensitive. |\n| `IndexSize` | Logical size in megabytes of\
    \ the catalog. |\n| `ItemCount` | The total items that have been indexed in the\
    \ catalog. |\n| `LogSize` | Backward capability property. This returns 0. |\n\
    | `MergeStatus` | Returns 1 if a master merge is in progress; otherwise, it returns\
    \ 0. |\n| `PopulateCompletionAge` | The elapsed time since index population, in\
    \ seconds, measured since 01/01/1990 00:00:00. This will return 0 if population\
    \ has not run yet. |\n| `PopulateStatus` | `PopulateStatus` can return ten different\
    \ values: *0*: Idle. *1*: Full population in progress. *2*: Paused. *3*: The population\
    \ has been throttled. *4*: The population is recovering. *5*: The status is shut\
    \ down. *6*: Incremental population is currently in progress. *7*: The status\
    \ is currently building an index. *8*: The disk is full. *9*: Change tracking.\
    \ |\n| `UniqueKeyCount` | Number of individual full-text index keys in the catalog.\
    \ |\n| `ImportStatus` | Returns 0 when the full-text catalog is not being imported\
    \ and 1 when it is being imported. |\n\nFor example, to show the population status\
    \ of the `WhitePaperCatalog` catalog used earlier, the statement in Listing 9-11\
    \ can be used. The result should be 0 for idle, since the index only has the single\
    \ document and no other queries are running against it.\n\n```\nUSE AdventureWorks2017\n\
    GO\nSELECT FULLTEXTCATALOGPROPERTY('WhitePaperCatalog','PopulateStatus');\nListing\
    \ 9-11\nFULLTEXTCATALOGPROPERTY to Return Population Status of a Catalog\n```\n\
    \nCatalogs and the referencing indexes can be reviewed by querying `sys.fulltext_index_catalog_usages`.\
    \ This catalog view returns all the indexes that have been referenced from it,\
    \ as shown in Listing 9-12.\n\n```\nUSE AdventureWorks2017\nGO\nSELECT  OBJECT_NAME(ficu.object_id)\
    \ [Object Name],\n        ficu.index_id,\n        ficu.fulltext_catalog_id\nFROM\
    \    sys.fulltext_index_catalog_usages AS ficu;\nListing 9-12\nUtilizing sys.fulltext_index_catalog_usages\n\
    ```\n\nFigure 9-3 displays the results, which show `SQLServerDocuments` is using\
    \ a catalog associated with itself, while `JobCandidate`, `ProductReview`, and\
    \ `Document` are using a shared full-text catalog. It is important to note that\
    \ a single catalog can be used across multiple tables.\n\n![](images/338675_4_En_9_Chapter/338675_4_En_9_Fig3_HTML.png)\n\
    \nFigure 9-3: Results from sys.fulltext_index_catalog_usages\n\nFor detailed information\
    \ on all catalogs and settings currently applied to them, query `sys.fulltext_catalogs`.\
    \ This catalog view is helpful in determining the default catalog and property\
    \ status indicators, such as `is_importing` that shows whether the catalog is\
    \ in the process of being imported.\n\nFor a detailed review of the full-text\
    \ indexes in the database, the view `sys.fulltext_indexes` can be used along with\
    \ other catalog views to create a more meaningful result set. Important information\
    \ from this catalog view consists of the full-text catalog name and properties;\
    \ change tracking property, crawl type, and state; and the StopList set to be\
    \ used.\n\nThe query in Listing 9-13 returns a result set of all indexes including\
    \ catalog and StopList information for the index.\n\n```\nUSE AdventureWorks2017\n\
    GO\nSELECT  idx.is_enabled,\n        idx.change_tracking_state,\n        idx.crawl_type_desc,\n\
    \        idx.crawl_end_date [Last Crawl],\n        cat.name,\n        CASE WHEN\
    \ cat.is_accent_sensitivity_on = 0 THEN 'Accent InSensitive'\n             WHEN\
    \ cat.is_accent_sensitivity_on = 1 THEN 'Accent Sensitive'\n        END [Accent\
    \ Sensitivity],\n        lists.name,\n        lists.modify_date [Last Modified\
    \ Date of StopList]\nFROM    sys.fulltext_indexes idx\n        INNER JOIN sys.fulltext_catalogs\
    \ cat\n            ON idx.fulltext_catalog_id = cat.fulltext_catalog_id\n    \
    \    INNER JOIN sys.fulltext_stoplists lists\n            ON idx.stoplist_id =\
    \ lists.stoplist_id;\nListing 9-13\nUsing All the Catalog Views for Full-Text\
    \ Index Information\n```\n\nFigure 9-4 shows the results of the catalog view query.\
    \ This can be extremely useful when tuning full-text catalogs. For instance, if\
    \ the index is out of date, details as to when it was last updated or crawled\
    \ can be returned. Or if a full-text index has been tuned to remove noise by adding\
    \ to the StopList, knowing when that change occurred in relation to the last crawl\
    \ can help identify why performance did not improve.\n\n![](images/338675_4_En_9_Chapter/338675_4_En_9_Fig4_HTML.png)\n\
    \nFigure 9-4: Query results for full-text index information"
  raw: '### Full-Text Search Index Catalog Views and Properties


    SQL Server provides a wealth of information about indexes in general. Performance,
    configurations, usage, and storage can be found within catalog views. As with
    other index objects, full-text indexes require the same attention and detail to
    maintenance and options to ensure they consistently improve performance rather
    than hinder it.


    Table [9-2](#338675_4_En_9_Chapter.xhtml#Tab2) describes the catalog views available
    to full-text search.


    Table 9-2


    Full-Text Catalog Views


    | Catalog View Name | Description |

    | --- | --- |

    | `sys.fulltext_catalogs` | Lists all full-text catalogs and high-level properties.
    |

    | `sys.fulltext_document_types` | Returns a complete list of document types that
    are available for indexing. Each of these document types will be registered on
    the instance of SQL Server. |

    | `sys.fulltext_index_catalog_usages` |   |

    | `sys.fulltext_index_columns` | Lists all columns that are indexed. |

    | `sys.fulltext_index_fragments` | Lists all details of the full-text index fragments
    (storage of the inverted index data). |

    | `sys.fulltext_indexes` | Lists every full-text index and properties set on the
    indexes. |

    | `sys.fulltext_languages` | Lists all the available languages on the instance
    to full-text indexing. |

    | `sys.fulltext_semantic_language_statistics_database` | Lists semantic language
    statistics databases installed. |

    | `sys.fulltext_semantic_languages` | List all of the languages with statistics
    models registered. |

    | `sys.fulltext_stoplists` | Lists every StopList created. |

    | `sys.fulltext_stopwords` | Lists all StopWords in the database. |

    | `sys.fulltext_system_stopwords` | Lists the preloaded system StopWords. |


    For informational purposes, while reviewing catalogs, properties, and status results
    for population, invoke the `FULLTEXTCATALOGPROPERTY` function, as shown in Listing
    [9-10](#338675_4_En_9_Chapter.xhtml#PC10).


    ```

    USE AdventureWorks2017

    GO

    FULLTEXTCATALOGPROPERTY (''catalog_name'' ,''property'')

    Listing 9-10

    Querying Properties from a Full-Text Index

    ```


    The information returned will provide a wealth of detail on the state of the catalog,
    including population status. The `catalog_name` parameter will accept any full-text
    catalog, and then a listing of properties can be utilized to return the specific
    information needed. Table [9-3](#338675_4_En_9_Chapter.xhtml#Tab3) lists the properties
    that can be passed into the function.


    Table 9-3


    Full-Text Catalog Properties


    | Property Name | Description |

    | --- | --- |

    | `AccentSensitivity` | Catalog’s current accent sensitivity setting. This returns
    0, which means insensitive, or 1, which means sensitive. |

    | `IndexSize` | Logical size in megabytes of the catalog. |

    | `ItemCount` | The total items that have been indexed in the catalog. |

    | `LogSize` | Backward capability property. This returns 0. |

    | `MergeStatus` | Returns 1 if a master merge is in progress; otherwise, it returns
    0. |

    | `PopulateCompletionAge` | The elapsed time since index population, in seconds,
    measured since 01/01/1990 00:00:00\. This will return 0 if population has not
    run yet. |

    | `PopulateStatus` | `PopulateStatus` can return ten different values:*0*: Idle.*1*:
    Full population in progress.*2*: Paused.*3*: The population has been throttled.*4*:
    The population is recovering.*5*: The status is shut down.*6*: Incremental population
    is currently in progress.*7*: The status is currently building an index.*8*: The
    disk is full.*9*: Change tracking. |

    | `UniqueKeyCount` | Number of individual full-text index keys in the catalog.
    |

    | `ImportStatus` | Returns 0 when the full-text catalog is not being imported
    and 1 when it is being imported. |


    For example, to show the population status of the `WhitePaperCatalog` catalog
    used earlier, the statement in Listing [9-11](#338675_4_En_9_Chapter.xhtml#PC11)
    can be used. The result should be 0 for idle, since the index only has the single
    document and no other queries are running against it.


    ```

    USE AdventureWorks2017

    GO

    SELECT FULLTEXTCATALOGPROPERTY(''WhitePaperCatalog'',''PopulateStatus'');

    Listing 9-11

    FULLTEXTCATALOGPROPERTY to Return Population Status of a Catalog

    ```


    Catalogs and the referencing indexes can be reviewed by querying `sys.fulltext_index_catalog_usages`.
    This catalog view returns all the indexes that have been referenced from it, as
    shown in Listing [9-12](#338675_4_En_9_Chapter.xhtml#PC12).


    ```

    USE AdventureWorks2017

    GO

    SELECT  OBJECT_NAME(ficu.object_id) [Object Name],

    ficu.index_id,

    ficu.fulltext_catalog_id

    FROM    sys.fulltext_index_catalog_usages AS ficu;

    Listing 9-12

    Utilizing sys.fulltext_index_catalog_usages

    ```


    Figure [9-3](#338675_4_En_9_Chapter.xhtml#Fig3) displays the results, which show
    SQLServerDocuments is using a catalog associated with itself, while JobCandidate,
    ProductReview, and Document are using a shared full-text catalog. It is important
    to note that a single catalog can be used across multiple tables.


    ![](images/338675_4_En_9_Chapter/338675_4_En_9_Fig3_HTML.png)


    A screenshot of a table with 3 columns and 4 rows. The columns are object name,
    index i d, and full-text catalog i d. Rows numbered 1 to 4 have the entries, job
    candidate, product review, document, and S Q L server documents under object name.


    Figure 9-3


    Results from sys.fulltext_index_catalog_usages


    For detailed information on all catalogs and settings currently applied to them,
    query `sys.fulltext_catalogs`. This catalog view is helpful in determining the
    default catalog and property status indicators, such as `is_importing` that shows
    whether the catalog is in the process of being imported.


    For a detailed review of the full-text indexes in the database, the view `sys.fulltext_indexes`
    can be used along with other catalog views to create a more meaningful result
    set. Important information from this catalog view consists of the full-text catalog
    name and properties; change tracking property, crawl type, and state; and the
    StopList set to be used.


    The query in Listing [9-13](#338675_4_En_9_Chapter.xhtml#PC13) returns a result
    set of all indexes including catalog and StopList information for the index.


    ```

    USE AdventureWorks2017

    GO

    SELECT  idx.is_enabled,

    idx.change_tracking_state,

    idx.crawl_type_desc,

    idx.crawl_end_date [Last Crawl],

    cat.name,

    CASE WHEN cat.is_accent_sensitivity_on = 0 THEN ''Accent InSensitive''

    WHEN cat.is_accent_sensitivity_on = 1 THEN ''Accent Sensitive''

    END [Accent Sensitivity],

    lists.name,

    lists.modify_date [Last Modified Date of StopList]

    FROM    sys.fulltext_indexes idx

    INNER JOIN sys.fulltext_catalogs cat

    ON idx.fulltext_catalog_id = cat.fulltext_catalog_id

    INNER JOIN sys.fulltext_stoplists lists

    ON idx.stoplist_id = lists.stoplist_id;

    Listing 9-13

    Using All the Catalog Views for Full-Text Index Information

    ```


    Figure [9-4](#338675_4_En_9_Chapter.xhtml#Fig4) shows the results of the catalog
    view query. This can be extremely useful when tuning full-text catalogs. For instance,
    if the index is out of date, details as to when it was last updated or crawled
    can be returned. Or if a full-text index has been tuned to remove noise by adding
    to the StopList, knowing when that change occurred in relation to the last crawl
    can help identify why performance did not improve.


    ![](images/338675_4_En_9_Chapter/338675_4_En_9_Fig4_HTML.png)


    A screenshot of a table with 8 columns and a row. The columns are namely enabled,
    change tracking state, crawl type, last crawl, name, accent sensitivity, name,
    and last modified date of stop list. It has one entry.


    Figure 9-4


    Query results for full-text index information'
  trans: "\n# 全文搜索索引目录视图与属性\n\nSQL Server 提供了大量关于索引的通用信息。性能、配置、使用情况和存储信息均可在目录视图中找到。与其他索引对象一样，全文索引同样需要细致维护并关注其选项设置，以确保它们能持续提升而非阻碍性能。\n\
    \n表 9-2 描述了可用于全文搜索的目录视图。\n\n表 9-2：全文目录视图\n\n| 目录视图名称 | 描述 |\n| --- | --- |\n|\
    \ `sys.fulltext_catalogs` | 列出所有全文目录及其高级属性。 |\n| `sys.fulltext_document_types`\
    \ | 返回可用于索引的文档类型完整列表。这些文档类型均已在 SQL Server 实例上注册。 |\n| `sys.fulltext_index_column_usages`\
    \ | |\n| `sys.fulltext_index_columns` | 列出所有已索引的列。 |\n| `sys.fulltext_index_fragments`\
    \ | 列出全文索引片段（倒排索引数据的存储）的所有详细信息。 |\n| `sys.fulltext_indexes` | 列出每个全文索引及其设置的属性。\
    \ |\n| `sys.fulltext_languages` | 列出实例上可用于全文索引的所有可用语言。 |\n| `sys.fulltext_semantic_language_statistics_database`\
    \ | 列出已安装的语义语言统计数据库。 |\n| `sys.fulltext_semantic_languages` | 列出所有已注册统计模型的语言。\
    \ |\n| `sys.fulltext_stoplists` | 列出每个已创建的 StopList（停用词列表）。 |\n| `sys.fulltext_stopwords`\
    \ | 列出数据库中的所有 StopWords（停用词）。 |\n| `sys.fulltext_system_stopwords` | 列出预加载的系统\
    \ StopWords（停用词）。 |\n\n出于信息参考目的，在查看目录、属性和填充状态结果时，可以调用 `FULLTEXTCATALOGPROPERTY`\
    \ 函数，如代码清单 9-10 所示。\n\n```\nUSE AdventureWorks2017\nGO\nFULLTEXTCATALOGPROPERTY\
    \ ('catalog_name' ,'property')\n代码清单 9-10\n查询全文索引的属性\n```\n\n返回的信息将提供关于目录状态的丰富细节，包括填充状态。`catalog_name`\
    \ 参数接受任何全文目录，然后可以使用属性列表来返回所需的特定信息。表 9-3 列出了可以传递给该函数的属性。\n\n表 9-3：全文目录属性\n\n| 属性名称\
    \ | 描述 |\n| --- | --- |\n| `AccentSensitivity` | 目录当前的重音敏感性设置。返回 0 表示不敏感，返回 1\
    \ 表示敏感。 |\n| `IndexSize` | 目录的逻辑大小（以 MB 为单位）。 |\n| `ItemCount` | 目录中已索引的总项目数。\
    \ |\n| `LogSize` | 向后兼容属性。返回 0。 |\n| `MergeStatus` | 如果正在进行主合并，则返回 1；否则返回 0。 |\n\
    | `PopulateCompletionAge` | 自上次索引填充以来经过的时间（以秒为单位），从 1990-01-01 00:00:00 开始计算。如果尚未运行填充，则返回\
    \ 0。 |\n| `PopulateStatus` | `PopulateStatus` 可返回十种不同的值：*0*：空闲。*1*：正在进行完全填充。*2*：已暂停。*3*：填充已被节流。*4*：填充正在恢复。*5*：状态已关闭。*6*：正在进行增量填充。*7*：状态当前正在构建索引。*8*：磁盘已满。*9*：更改跟踪。\
    \ |\n| `UniqueKeyCount` | 目录中唯一全文索引键的数量。 |\n| `ImportStatus` | 当全文目录未在导入时返回 0，正在导入时返回\
    \ 1。 |\n\n例如，要显示之前使用的 `WhitePaperCatalog` 目录的填充状态，可以使用代码清单 9-11 中的语句。由于索引仅包含单个文档且没有其他查询针对其运行，结果应为\
    \ 0（空闲）。\n\n```\nUSE AdventureWorks2017\nGO\nSELECT FULLTEXTCATALOGPROPERTY('WhitePaperCatalog','PopulateStatus');\n\
    代码清单 9-11\n使用 FULLTEXTCATALOGPROPERTY 返回目录的填充状态\n```\n\n可以通过查询 `sys.fulltext_index_catalog_usages`\
    \ 来查看目录及其引用的索引。此目录视图返回所有从中引用索引的信息，如代码清单 9-12 所示。\n\n```\nUSE AdventureWorks2017\n\
    GO\nSELECT  OBJECT_NAME(ficu.object_id) [对象名称],\n        ficu.index_id,\n    \
    \    ficu.fulltext_catalog_id\nFROM    sys.fulltext_index_catalog_usages AS ficu;\n\
    代码清单 9-12\n使用 sys.fulltext_index_catalog_usages\n```\n\n图 9-3 展示了结果，显示 `SQLServerDocuments`\
    \ 正在使用与其自身关联的目录，而 `JobCandidate`、`ProductReview` 和 `Document` 正在使用共享的全文目录。需要注意的是，单个目录可被多个表使用。\n\
    \n![](img/338675_4_En_9_Fig3_HTML.png)\n\n图 9-3：sys.fulltext_index_catalog_usages\
    \ 的结果\n\n要获取所有目录及其当前应用设置的详细信息，可查询 `sys.fulltext_catalogs`。此目录视图有助于确定默认目录以及属性状态指示符，例如显示目录是否正在导入过程中的\
    \ `is_importing`。\n\n要详细查看数据库中的全文索引，可以使用视图 `sys.fulltext_indexes` 结合其他目录视图来创建更有意义的结果集。从此目录视图中获取的重要信息包括全文目录名称和属性；更改跟踪属性、爬网类型和状态；以及设置要使用的\
    \ StopList。\n\n代码清单 9-13 中的查询返回一个包含所有索引的结果集，其中包括索引的目录和 StopList 信息。\n\n```\nUSE\
    \ AdventureWorks2017\nGO\nSELECT  idx.is_enabled,\n        idx.change_tracking_state,\n\
    \        idx.crawl_type_desc,\n        idx.crawl_end_date [上次爬网时间],\n        cat.name,\n\
    \        CASE WHEN cat.is_accent_sensitivity_on = 0 THEN '重音不敏感'\n           \
    \  WHEN cat.is_accent_sensitivity_on = 1 THEN '重音敏感'\n        END [重音敏感性],\n \
    \       lists.name,\n        lists.modify_date [StopList 的最后修改日期]\nFROM    sys.fulltext_indexes\
    \ idx\n        INNER JOIN sys.fulltext_catalogs cat\n            ON idx.fulltext_catalog_id\
    \ = cat.fulltext_catalog_id\n        INNER JOIN sys.fulltext_stoplists lists\n\
    \            ON idx.stoplist_id = lists.stoplist_id;\n代码清单 9-13\n使用所有目录视图获取全文索引信息\n\
    ```\n\n图 9-4 显示了目录视图查询的结果。这在调优全文目录时非常有用。例如，如果索引已过时，可以返回有关其上次更新或爬网时间的详细信息。或者，如果全文索引已通过添加到\
    \ StopList 进行调整以消除噪音，了解该更改相对于上次爬网发生的时间有助于识别性能未改善的原因。\n\n![](img/338675_4_En_9_Fig4_HTML.png)\n\
    \n图 9-4：全文索引信息的查询结果\n"
- fmt: '## Summary


    本章概述了如何创建和查询全文索引。能够对大文档和自由格式文本进行过滤和查询，其重要性不亚于使用传统的结构化索引。通过全文索引，不仅可以检查列的内容，还可以检查列中文件的内容，从而使应用程序能够更好地识别与所提交请求在上下文上匹配的文档和其他工件。


    ## 10. 索引的误解与最佳实践


    在前几章中，已经介绍了索引及其结构。在接下来的章节中，将讨论构建索引并确保其按预期运行的策略。本章将破除一些常见的误解，同时为创建有效的索引奠定基础。


    误解会在尝试构建索引时带来不必要的负担。了解与索引相关的误解可以防止使用适得其反的索引策略。本章讨论的索引误解如下：


    *   数据库不需要索引。

    *   主键总是聚集的。

    *   在线索引操作不会阻塞。

    *   任何列都可以在多列索引中进行过滤。

    *   聚集索引按物理顺序存储记录。

    *   索引总是以相同的顺序输出。

    *   填充因子在插入时应用于索引。

    *   从堆表中删除会导致无法恢复的空间。

    *   每个表都应该是堆表，或者每个表都应该有一个聚集索引。


    在审视误解时，也值得一看最佳实践。最佳实践在许多方面看似误解，因为它们是普遍持有的信念。不同之处在于，最佳实践经得起推敲，并且在构建索引时是有用的建议。本章将探讨以下最佳实践：


    *   基于当前工作负载进行索引。

    *   默认情况下在主键上使用聚集索引。

    *   正确设定数据库级别的填充因子。

    *   正确设定索引级别的填充因子。

    *   如果用于过滤，对唯一键和外键列进行索引。

    *   平衡索引数量。


    ### 索引误解


    在构建数据库和索引时遇到的一个问题是处理误解。索引起源于许多不同的地方。有些来自先前版本的 SQL Server 及其工具、功能或限制。其他则来自他人的建议，这些建议基于特定数据库或场景中的条件，但并非普遍适用。


    索引误解的麻烦在于，它们混淆了索引策略。在可以构建索引来解决严重性能问题的情况下，误解有时会阻止考虑正确的方法。在接下来的几节中，将讨论一些关于索引的误解，并提供足够的细节来有效地破除它们。


    #### 误解 1：数据库不需要索引


    通常，在开发的应用程序中，会创建一个或多个数据库来存储应用程序的数据。在许多开发过程中，重点是添加新功能，并期望“性能会自行解决”。一个不幸的结果是，许多数据库在开发和部署时没有构建索引，因为人们认为它们不需要。


    除此之外，还有一些数据库开发人员认为他们的数据库在某种程度上与其他数据库不同。以下是不时听到的一些原因：


    *   “这是一个小数据库，不会有太多数据。”

    *   “这只是一个概念验证，不会存在太久。”

    *   “这不是一个重要应用，所以性能不关键。”

    *   “整个数据库已经可以放入内存；索引只会让它需要更多内存。”

    *   “我将只用这个数据库插入数据；永远不会查看结果。”


    这些原因中的每一个都很容易反驳。在当今的大数据世界中，即使预期很小的数据库在被采用后也可能开始快速成长。此外，数据库大小的小是相对的，每个人都会以不同的方式定义。一个开发者可能认为
    1 GB 很小，而另一个根据其先前经验可能认为 1 TB 很小。任何概念验证或不重要的数据库和应用程序，如果没有人需要或没有人有兴趣为其功能投入资源，就不会被创建。那些提出需求的人很可能期望他们要求的功能能够按预期执行。最后，将数据库放入内存并不意味着它会很快。正如之前讨论的，索引为数据提供了替代访问路径，旨在减少访问数据所需的页面数量。没有这些替代路径，数据访问很可能需要读取和维护内存中表的每一个页面。


    任何特定开发者听到的原因可能不完全是这些，但很可能是类似的。围绕这个误解的核心观点是索引不能帮助数据库表现得更好。打破这个借口的最有力方法之一是展示索引在特定场景下的好处。


    为了演示，考虑清单 [10-1](#338675_4_En_10_Chapter.xhtml#PC1) 中的 T-SQL。此代码示例创建了表 `MythOne`。接下来是一个几乎任何应用程序中都类似的查询。在清单
    [10-2](#338675_4_En_10_Chapter.xhtml#PC2) 的查询输出中，显示该查询产生了 1,496 次读取。


    ```

    Table ''MythOne''. Scan count 1, logical reads 1496, physical reads 0, read-ahead
    reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```

    `Listing 10-2`

    `无索引表的 I/O 统计信息`


    ```

    USE AdventureWorks2017;

    GO

    SELECT * INTO MythOne

    FROM Sales.SalesOrderDetail;

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    ```

    `Listing 10-1`

    `无索引的表`


    有人可能会争辩说 1,496 次输入/输出（I/O）并不多。考虑到某些数据库的大小和当今世界的数据量，这可能是真的。但查询的 I/O 不应该与世界其他地方的性能相比较；它需要与其潜在的
    I/O、应用程序的需求以及部署它的平台进行比较。'
  raw: '## Summary


    This chapter outlined how to create and query a full-text index. The need to be
    able to filter and query on large documents and free-form text is just as important
    as being able to use traditional structured indexes. With full-text indexing,
    not only can the contents of a column be examined, but also the contents of a
    file within a column, allowing applications to better identify documents and other
    artifacts that match contextually with the requests being submitted.


    # 10. Indexing Myths and Best Practices


    In the past few chapters, indexes have been introduced along with how they are
    structured. In the upcoming chapters, strategies will be discussed to build indexes
    and ensure that they behave as expected. In this chapter, some common myths will
    be dispelled while a foundation is built for creating effective indexes.


    Myths result in an unnecessary burden when attempting to build an index. Knowing
    the myths associated with indexes can prevent the use of counterproductive indexing
    strategies. The following are the indexing myths discussed in this chapter:


    *   Databases don’t need indexes.


    *   Primary keys are always clustered.


    *   Online index operations don’t block.


    *   Any column can be filtered in multicolumn indexes.


    *   Clustered indexes store records in physical order.


    *   Indexes always output in the same order.


    *   Fill factor is applied to indexes during inserts.


    *   Deleting from heaps results in unrecoverable space.


    *   Every table should be a heap, or every table should have a clustered index.


    When reviewing myths, it is worthwhile to take a look at best practices. Best
    practices may seem like myths in many ways as they are commonly held beliefs.
    The difference is that best practices stand up to scrutiny and are useful recommendations
    when building indexes. This chapter will examine the following best practices:


    *   Index based on a current workload.


    *   Use clustered indexes on primary keys by default.


    *   Properly target database-level fill factors.


    *   Properly target index-level fill factors.


    *   Index unique and foreign key columns if used for filtering.


    *   Balance index count.


    ## Index Myths


    One of the problems that are encountered when building databases and indexes is
    dealing with myths. Indexing myths originate from many different places. Some
    come from previous versions of SQL Server and its tools, features, or limitations.
    Others come from the advice of others, based on conditions in a specific database
    or scenario that are not universally applicable.


    The trouble with indexing myths is that they cloud the water of indexing strategies.
    In situations where an index can be built to resolve a serious performance issue,
    a myth can sometimes prevent the correct approach from being considered. Throughout
    the next few sections, a number of myths will be discussed regarding indexing,
    with enough detail to effectively dispel them.


    ### Myth 1: Databases Do Not Need Indexes


    Usually, in an application that is being developed, one or more databases are
    created to store data for the application. In many development processes, the
    focus is on adding new features with the expectation that “performance will work
    itself out.” An unfortunate result is that there are many databases that get developed
    and deployed without indexes being built because of the belief that they aren’t
    needed.


    Along with this, there are database developers who believe their databases are
    somehow unique from other databases. The following are some reasons that are heard
    from time to time:


    *   “It’s a small database that won’t get much data.”


    *   “It’s just a proof of concept and won’t be around for long.”


    *   “It’s not an important application, so performance isn’t critical.”


    *   “The whole database already fits into memory; indexes will just make it require
    more memory.”


    *   “I am going to use this database only for inserting data; I will never look
    at the results.”


    Each of these reasons is easy to break down. In today’s world of big data, even
    databases that are expected to be small can start growing quickly as they are
    adopted. Besides that, small in terms of database size is relative and will be
    defined differently by everyone. One developer may believe 1 GB is small, whereas
    another could view 1 TB as small based on their prior experiences. Any proof of
    concept or unimportant database and application would not have been created if
    there wasn’t a need or someone wasn’t interested in expending resources for its
    features. Those same people likely expect that the features they asked for will
    perform as expected. Lastly, fitting a database into memory doesn’t mean it will
    be fast. As was previously discussed, indexes provide alternative access paths
    for data, with the aim of decreasing the number of pages required to access the
    data. Without these alternative routes, data access will likely require reading
    and maintaining every page of a table in memory.


    These reasons may not be the exact ones heard by any given developer, but they
    will likely be similar. The general idea surrounding this myth is that indexes
    do not help the database perform better. One of the strongest ways to break apart
    this excuse is by demonstrating the benefits of indexing against a given scenario.


    To demonstrate, consider the T-SQL in Listing [10-1](#338675_4_En_10_Chapter.xhtml#PC1).
    This code sample creates the table `MythOne`. Next is a query similar to one in
    almost any application. In the output from the query, in Listing [10-2](#338675_4_En_10_Chapter.xhtml#PC2),
    the query is shown as generating 1,496 reads.


    ```

    Table ''MythOne''. Scan count 1, logical reads 1496, physical reads 0, read-ahead
    reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Listing 10-2

    I/O Statistics for the Table with No Index

    ```


    ```

    USE AdventureWorks2017;

    GO

    SELECT * INTO MythOne

    FROM Sales.SalesOrderDetail;

    GO

    SET STATISTICS IO ON

    SET NOCOUNT ON

    GO

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal

    FROM MythOne

    WHERE CarrierTrackingNumber = ''4911-403C-98'';

    GO

    SET STATISTICS IO OFF

    GO

    Listing 10-1

    Table with No Index

    ```


    It could be argued that 1,496 isn’t a lot of input/output (I/O). This might be
    true given the size of some databases and the amount of data in today’s world.
    But the I/O of a query shouldn’t be compared to the performance of the rest of
    the world; it needs to be compared to its potential I/O, the needs of the application,
    and the platform on which it is deployed.'
