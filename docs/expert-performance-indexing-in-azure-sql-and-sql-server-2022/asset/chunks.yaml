    operation. Initially, the records are marked for deletion. When this occurs, the
    records are referred to as being *ghosted*; the rows in this state are counted
    in `leaf_ghost_count`. At regular intervals, a cleanup thread within SQL Server
    will go through and perform the actual delete operation on rows marked as ghosted.
    At that point, the records will be counted in the `leaf_delete_count`. This process
    improves the performance of delete operations since the actual delete of a row
    happens after the transaction is committed. In the event of transaction rollback,
    the ghost flag on a row is all that needs to revert rather than an attempt to
    recreate the row in the table. This activity occurs only at the leaf level; nonleaf
    pages are deleted whenever all the rows associated with the pages have been deleted
    or otherwise removed.'
  trans: '### 头列


    对于通过动态管理函数返回的每一行，都会包含 `database_id`、`object_id`、`index_id` 和 `partition_number`。这些列在表
    5-12 中有进一步定义。正如 `partition_number` 所暗示的，此函数返回结果的粒度是分区级别。对于非分区索引，分区号将为 1。


    表 5-12


    `sys.dm_db_index_operational_stats` 中的头列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 定义表或视图所在的数据库 ID |

    | `object_id` | `int` | 定义索引所在的表或视图的 ID |

    | `index_id` | `int` | 索引的 ID |

    | `partition_number` | `int` | 索引或堆内的分区号（从 1 开始） |

    | `hobt_id` | `bigint` | 用于标识与索引分区关联的堆或 B 树（hobt）的 ID。自 SQL Server 2016 起新增 |


    头列为理解统计信息所适用的索引提供了基础。这将有助于理解返回信息的上下文。此外，它们可用于与目录视图（如 `sys.indexes`）进行联接，以提供索引的名称。


    此函数中的有用信息来自该函数返回的其余列。可以返回的信息提供了对 DML 活动、页面分配周期、数据访问模式、索引争用和磁盘活动的洞察。在以下部分中，将回顾该函数返回的每一列，以及它们如何提供关于索引使用情况的洞察。


    ### DML 活动


    了解索引上的 DML 活动是开始分析索引使用统计信息的理想起点。表 5-13 列出了代表此活动的列。它们提供了受 DML 操作影响的行数的计数。接下来的统计信息与
    `sys.dm_db_index_usage_stats` 中的类似，但在视角上存在一些差异，接下来将讨论这些差异。


    表 5-13


    `sys.dm_db_index_operational_stats` 中的 DML 活动列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `leaf_insert_count` | `bigint` | 插入到叶级的行的累积计数。 |

    | `leaf_delete_count` | `bigint` | 从叶级删除的行的累积计数。 |

    | `leaf_update_count` | `bigint` | 在叶级更新的行的累积计数。 |

    | `leaf_ghost_count` | `bigint` | 在叶级被标记为删除但尚未移除的行的累积计数。 |

    | `nonleaf_insert_count` | `bigint` | 叶级以上的插入操作的累积计数。对于堆，此值始终为 `0`。 |

    | `nonleaf_delete_count` | `bigint` | 叶级以上的删除操作的累积计数。对于堆，此值始终为 `0`。 |

    | `nonleaf_update_count` | `bigint` | 叶级以上的更新操作的累积计数。对于堆，此值始终为 `0`。 |


    在 `sys.dm_db_index_operational_stats` 内部，可以跟踪 DML 活动的两个区域：叶级和非叶级。有关叶级和非叶级页面上 DML
    活动的更多信息，请参见第 4 章。


    这两种数据更改类型之间的区别对于识别索引更改是直接通过 DML 活动发生，还是作为内部索引更改的结果非常重要。当叶级活动导致索引结构发生变化时，就会发生非叶级
    DML 活动，这不是可以通过 `INSERT`、`UPDATE` 或 `DELETE` 语句直接影响的。


    叶级和非叶级的 DML 活动都根据已发生的 DML 操作类型被分解为统计信息。如前所述，DML 活动监视 `INSERT`、`UPDATE` 和 `DELETE`
    活动。对于这些操作中的每一个，`sys.dm_db_index_operational_stats` 中都有一个对应的列。此外，还有一个列用于统计已从叶级
    DML 活动中“虚化”掉的记录。


    在 `DELETE` 操作期间，受语句影响的行会通过两阶段操作被删除。最初，记录被标记为删除。当这种情况发生时，这些记录被称为被 *虚化*；处于此状态的行被计入
    `leaf_ghost_count`。SQL Server 会以固定的时间间隔运行一个清理线程，遍历并执行对标记为虚化的行的实际删除操作。那时，这些记录将被计入
    `leaf_delete_count`。此过程提高了删除操作的性能，因为行的实际删除发生在事务提交之后。如果发生事务回滚，则只需回滚行上的虚化标志，而不必尝试在表中重新创建该行。此活动仅发生在叶级；当与页面关联的所有行都被删除或以其他方式移除时，非叶级页面会被删除。'
- fmt: '# 理解和分析 `sys.dm_db_index_operational_stats`


    While this activity on the DMF is similar to that found in `sys.dm_db_index_usage_stats`,
    there are some stark differences. The first is that the information in `sys.dm_db_index_operational_stats`
    is more granular than that in `sys.dm_db_index_usage_stats`. Operational stats
    report down to the leaf and nonleaf levels, whereas usage stats do not. Along
    with the granularity is the difference in how the counts are tabulated. Usage
    stats count one for every plan that performs the operation on the index, regardless
    of how many rows are affected. Operational stats differ in that the count increments
    for every row that has the DML operation performed. To summarize, usage stats
    aggregate when the index is used, and operational stats aggregate based on how
    much of the index is used.


    ## DML Activity


    The code in Listing 5-24 illustrates how operational stats are tabulated. In the
    listing, 79 rows are added to the table `dbo.Karaoke`. Then 44 rows are deleted
    from the table. This is followed by 35 rows being updated in the table. The last
    query returns operational stats based on the DML activity. Figure 5-17 shows the
    results of the final query.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig17_HTML.png)


    A screenshot of the query table results with a row of data. The column headers
    and values are table name, index name, leaf insert count 79, leaf update count
    35, leaf delete count 0, and leaf ghost count 44.


    **Figure 5-17** DML activity query results (results may vary on your system)


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.Karaoke'') IS NOT NULL

    DROP TABLE dbo.Karaoke;

    CREATE TABLE dbo.Karaoke

    (

    KaraokeID INT

    ,Duet BIT

    ,CONSTRAINT PK_Karaoke_KaraokeID PRIMARY KEY CLUSTERED (KaraokeID)

    );

    INSERT INTO dbo.Karaoke

    SELECT ROW_NUMBER() OVER (ORDER BY t.object_id)

    ,t.object_id % 2

    FROM sys.tables t;

    DELETE FROM dbo.Karaoke

    WHERE  Duet = 0;

    UPDATE dbo.Karaoke

    SET    Duet = 0

    WHERE  Duet = 1;

    SELECT OBJECT_SCHEMA_NAME(ios.object_id) + ''.'' + OBJECT_NAME(ios.object_id)
    AS table_name

    ,i.name AS index_name

    ,ios.leaf_insert_count

    ,ios.leaf_update_count

    ,ios.leaf_delete_count

    ,ios.leaf_ghost_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),NULL,NULL,NULL) ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    WHERE ios.object_id = OBJECT_ID(''dbo.Karaoke'')

    ORDER BY ios.range_scan_count DESC;

    ```

    **Listing 5-24** DML Activity Script


    The value in looking at DML activity in an index is to help understand what is
    happening to the data in an index in detail. For example, if a non-clustered index
    is being updated often, it may be beneficial to look at the columns in the index
    to determine whether the volatility of the columns matches the benefit of the
    index. It is good to review indexes with high amounts of DML activity and consider
    whether the activity matches the understanding of the database platform. An index
    that is written often and rarely (or never) read is a good candidate to consider
    for removal.


    ## SELECT Activity


    After DML activity, the next area of information that can be evaluated is the
    information on `SELECT` activity. The `SELECT` activity columns, shown in Table
    5-14, identify the type of physical operation that was used when queries were
    executed. There are three types of access that SQL Server collects information
    on: range scans, singleton lookups, and forwarded records.


    **Table 5-14** Access Pattern Columns in `sys.dm_db_index_operational_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `range_scan_count` | bigint | Cumulative count of range and table scans on the
    index or heap. |

    | `singleton_lookup_count` | bigint | Cumulative count of single row retrievals
    from the index or heap. |

    | `forwarded_fetch_count` | bigint | Count of rows that were fetched through a
    forwarding record. |


    ### Range Scan


    Range scans occur whenever a range of rows or a table scan is used to access data.
    When considering a range of rows, it can be anywhere from 1 to 1,000 or more rows.
    The number of rows in the range is not material in how SQL Server accesses the
    data. With table scans, the number of rows is also not important, but it is assumed
    that it includes all records in the index. In `sys.dm_db_index_operational_stats`,
    these values are stored in the column `range_scan_count`.


    To see this information collected in `range_scan_count`, execute the code in Listings
    5-13 and 5-15 from the previous section. Before doing this, take the AdventureWorks2017
    database offline and then bring it back online. This will reset the statistics
    returned from the DMOs. In these two code samples, four queries will be executed.
    The first two will result in index seeks in the query plan, shown in Figure 5-9.
    The second two queries result in index scans, as shown in the execution plans
    in Figure 5-11. Running the code in Listing 5-25 will show, as displayed in Figure
    5-18, that all four queries used a range scan to retrieve the data from the table.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig18_HTML.png)


    A screenshot of the query table results for range scan count with a row of data.
    The column headers are table name, index name, and range scan count. The range
    scan count data is 4.


    **Figure 5-18** Query results for `range_scan_count`


    ```sql

    USE AdventureWorks2017

    GO

    SELECT OBJECT_NAME(ios.object_id) AS table_name

    ,i.name AS index_name

    ,ios.range_scan_count

    FROM sys.dm_db_index_operational_stats(DB_ID(),OBJECT_ID(''Sales.SalesOrderDetail''),NULL,NULL)
    ios

    INNER JOIN sys.indexes i

    ON i.object_id = ios.object_id

    AND i.index_id = ios.index_id

    ORDER BY ios.range_scan_count DESC;

    ```

    **Listing 5-25** Query for `range_scan_count` from `sys.dm_db_index_operational_stats`'
