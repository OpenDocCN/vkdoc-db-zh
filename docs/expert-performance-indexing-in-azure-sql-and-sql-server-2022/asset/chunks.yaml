    10-2 中，在默认的 `name` 和 `timestamp` 列基础上，添加了 `object_id`、`mode`、`resource_type` 和
    `sql_text` 列。要添加其他列，请右键单击列标题并选择“选择列”。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE INDEX IX_MythThree_ONLINE ON MythThree (Column1) WITH (ONLINE = ON);

    GO

    CREATE INDEX IX_MythThree ON MythThree (Column1);

    GO

    ```

    清单 10-8

    在非聚集索引创建时进行联机索引操作


    当使用 ONLINE 选项创建索引时，请注意在图 10-2 中，`SCH_S` (`Schema_Shared`) 和 `S` (`Shared`) 锁在毫秒级的时间内被获取和释放。由于这些锁在整个索引创建过程中被获取和释放，其他事务可以继续对该表进行操作。`SCH_S`
    锁确保表的架构不发生更改，而 `S` 锁则阻止来自插入、更新和删除操作的页面。因为这些锁的持有时间非常短，它们使得表在整个索引创建过程中保持可用状态。


    注意

    如果你在扩展事件会话中看不到任何结果，这很可能是由于 `MythThree` 的 `object_id` 与扩展事件会话中跟踪的 `object_id` 不匹配所致。


