- fmt: '### Boot Page


    The boot page is similar to the file header page in that it provides important
    metadata. This page, though, provides information for the database itself rather
    than for the data file. There is one boot page per database, and it is located
    on `page 9` in the first data file for a database (see Figure [2-5](#338675_4_En_2_Chapter.xhtml#Fig5)).
    Some information on the boot page includes


    *   Database version


    *   Create date


    *   Database name


    *   Database ID


    *   Compatibility level


    One important attribute on the boot page is the attribute `dbi_dbccLastKnownGood`.
    This attribute provides the date that the last known `DBCC CHECKDB` completed
    successfully. While database maintenance isn’t within the scope of this book,
    regular consistency checks of a database are critical to ensuring high availability.


    ### Page Free Space Page


    To track whether pages have space available for inserting rows, each data file
    contains Page Free Space (PFS) pages. These pages, which are the second page of
    the data file (see Figure [2-5](#338675_4_En_2_Chapter.xhtml#Fig5)) and located
    every `8,088` pages after that, track the amount of free space in the database.
    Each byte on the PFS page represents one subsequent page in the data file and
    provides basic allocation information regarding the page. This includes the approximate
    amount of free space on the page.


    When the database engine needs to store LOB data or data for heaps, it must locate
    the next available page and determine how full the currently allocated pages are.
    This functionality is provided by PFS pages. Within each byte are flags that identify
    the current amount of space that is being used. `Bits 0–2` determine whether the
    page is in one of the following free space states:


    *   Page is empty.


    *   `1–50` percent full.


    *   `51–80` percent full.


    *   `81–95` percent full.


    *   `96–100` percent full.


    Along with free space, PFS pages also contain bits to identify several other types
    of information for a page. For example, `bit 3` determines whether there are ghost
    records on a page. `Bit 4` identifies whether a page is part of the index allocation
    map, described later in this chapter. `Bit 5` indicates whether the page is part
    of a mixed extent. `Bit 6` identifies whether a page has been allocated.


    Through the additional bits, SQL Server can determine how a page is currently
    being used at a high level. This includes whether the page is currently allocated.
    If it is not, is it available for LOB or heap data? If it is allocated, then the
    PFS page provides details as described earlier in this section.


    Finally, when the ghost cleanup process runs, it does not need to check every
    page in a database for records to clean up. Instead, the PFS page can be checked,
    and only those pages with ghost records need to be managed.


    Note


    The indexes themselves handle free space and page allocation for non-LOB data
    and indexes. The allocation of pages for these structures is determined by the
    definition of the structure.


    ### Global Allocation Map Page


    Similar to the PFS page is the Global Allocation Map (GAM) page. This page determines
    whether an extent has been designated for use as a uniform extent and whether
    the extent is free and available for allocation.


    Each GAM page provides a map of all subsequent extents in its GAM interval. A
    GAM interval consists of the `64,000` extents (`4 GB`) following the GAM page.
    Each bit on the GAM page represents one extent following the GAM page. The first
    GAM page is located on `page 2` of the database file (see Figure [2-5](#338675_4_En_2_Chapter.xhtml#Fig5)).


    To determine whether an extent has been allocated as a uniform extent, SQL Server
    checks the bit on the GAM page that represents the extent. If the extent is allocated,
    then the bit is set to `0`; otherwise, it is set to `1`, and the extent is free
    and available for other purposes.


    ### Shared Global Allocation Map Page


    Nearly identically to the GAM page is the Shared Global Allocation Map (SGAM)
    page. The primary difference between the pages is that the SGAM page determines
    whether an extent is allocated as a mixed extent. Like the GAM page, the SGAM
    page is also used to determine whether pages are available for allocation.


    Each SGAM page provides a map of all subsequent extents in each SGAM interval.
    An SGAM interval consists of the `64,000` extents, or `4 GB`, that follow the
    SGAM page. Each bit on the SGAM page represents one extent following the SGAM
    page. The first SGAM page is located on `page 3`, after the GAM page of the database
    file (see Figure [2-5](#338675_4_En_2_Chapter.xhtml#Fig5)).


    The SGAM pages determine when an extent has been allocated for use as a mixed
    extent. If the extent is allocated for this purpose and has a free page, the bit
    is set to `1`. When it is set to `0`, either the extent is not used as a mixed
    extent, or it is a mixed extent with all pages in use.


    ### Differential Changed Map Page


    The next page is the Differential Changed Map (DCM) page. This page is used to
    determine whether an extent in a GAM interval has changed. When an extent changes,
    a bit value is changed from `0` to `1`. These bits are stored in a bitmap row
    on the DCM page with each bit representing an extent.


    DCM pages are used to track which extents have changed between full database backups.
    Whenever a full database backup occurs, all the bits on the DCM page are reset
    to `0`. The bit then changes back to `1` when a change occurs within the associated
    extent.


    The primary use for DCM pages is to provide a list of extents that have been modified
    for differential backups. This is far more efficient than checking every page
    or extent in the database to see whether it has changed. Instead, the DCM pages
    provide the list of extents to back up.


    The first DCM page is located at `page 6` of the data file. Subsequent DCM pages
    occur for each GAM interval in the data file.


    ### Minimally Logged Page


    Following the DCM page is the Minimally Logged (ML) page, formerly known as the
    Bulk Changed Map page. The ML page is used to indicate when an extent in a GAM
    interval has been modified by a minimally logged operation. Any extent that is
    affected by a minimally logged operation will have its bit value set to `1`, and
    those that have not will be set to `0`. The bits are stored in a bitmap row on
    the ML page with each bit representing an extent in the GAM interval.


    As the former name of ML pages (Bulk Changed Map) implies, these pages are used
    in conjunction with the `BULK_LOGGED` recovery model. When the database uses this
    recovery model, the ML page is used to identify extents that were modified with
    a minimally logged operation since the last transaction log backup. When the transaction
    log backup completes, the bits on the ML page are reset to `0`.


    The first ML page is located at `page 7` of the data file. Subsequent ML pages
    occur for each GAM interval in the data file.


    Note that while there are other ways to accomplish minimally logged operations
    in SQL Server (such as `BCP` or bulk columnstore index inserts), the Minimally
    Logged page only tracks those associated with the `bulk_logged` recovery model.'
