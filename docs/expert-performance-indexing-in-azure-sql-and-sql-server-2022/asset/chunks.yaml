  raw: '### Foreign Keys


    The last non-clustered index pattern is the Foreign Keys pattern. This is the
    only pattern that relates directly to objects in the database design. Foreign
    keys provide a mechanism to constrain values in one table to the values in rows
    in another table. This relationship provides referential integrity that is critical
    in most database deployments. However, foreign keys can sometimes be the cause
    of performance issues in databases without anyone realizing that they are interfering
    with performance.


    Since foreign keys provide a constraint on the values that are possible for a
    column, there is a check that is done when the values need to be validated. There
    are two types of validations that can occur with a foreign key. The first happens
    on the parent table, `dbo.ParentTable`, and the second happens on the child table,
    `dbo.ChildTable` (see Figure [13-41](#338675_4_En_13_Chapter.xhtml#Fig41)). Validations
    occur on `dbo.ParentTable` whenever rows are modified in `dbo.ChildTable`. In
    these cases, the `ParentID` value from `dbo.ChildTable` is validated with a lookup
    of the value in `dbo.ParentTable`. Usually, this does not result in a performance
    issue since `ParentID` in `dbo.ParentTable` will be the primary key in the table
    and also usually the column upon which the table is clustered. The other validations
    occur on `dbo.ChildTable` when there are modifications to `dbo.ParentTable`. For
    instance, if one of the rows in `dbo.ParentTable` were to be deleted, then `dbo.ChildTable`
    would need to be checked to see whether the `ParentID` value is being used in
    that table. This validation is where the Foreign Keys pattern needs to be applied.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig41_HTML.png)


    An illustration has a two 5-tiered columns connected by a diagonally oriented
    arrow. The column on the left has the labels d b o dot parent table, parent i
    d, name, description, and create date, while the column on the right has the labels
    d b o dot child table, child i d, parent i d, name, and description.


    Figure 13-41


    Foreign key relationship


    To demonstrate the Foreign Keys pattern, a couple of tables will be needed for
    the examples. The code in Listing [13-27](#338675_4_En_13_Chapter.xhtml#PC27)
    builds two tables, `dbo.Customer` and `dbo.SalesOrderHeader`. For these tables,
    a foreign key relationship exists between them on the `CustomerID` columns. For
    every `dbo.SalesOrderHeader` row, there is a customer associated with the row.
    Conversely, every row in `dbo.Customer` may relate to one or more rows in `dbo.SalesOrderHeader`.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Customer(

    CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_Customer_CustomerID PRIMARY KEY CLUSTERED (CustomerID)

    );

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int

    ,OrderDate datetime

    ,DueDate datetime

    ,CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_SalesOrderHeader_SalesOrderID

    PRIMARY KEY CLUSTERED (SalesOrderID)

    ,CONSTRAINT GK_SalesOrderHeader_CustomerID_FROM_Customer

    FOREIGN KEY (CustomerID) REFERENCES dbo.Customer(CustomerID)

    );

    INSERT INTO dbo.Customer (CustomerID)

    SELECT CustomerID

    FROM Sales.Customer;

    INSERT INTO dbo.SalesOrderHeader

    (SalesOrderID, OrderDate, DueDate, CustomerID)

    SELECT SalesOrderID, OrderDate, DueDate, CustomerID

    FROM Sales.SalesOrderHeader;

    Listing 13-27

    Setup for the Foreign Keys Pattern

    ```


    In this example, what happens in `dbo.SalesOrderHeader` when a row in `dbo.Customer`
    is modified? To demonstrate activity on `dbo.Customer`, the script in Listing
    [13-28](#338675_4_En_13_Chapter.xhtml#PC28) executes a `DELETE` on the row where
    `CustomerID` equals 701\. This row should have no rows in `dbo.SalesOrderHeader`.
    Even though this is the case, the foreign key does require that a check be made
    to determine whether there are rows in `dbo.SalesOrderHeader` for that `CustomerID`.
    If so, then SQL Server would throw an error on the delete, and the deletion would
    fail. Since there are no rows in `dbo.SalesOrderHeader`, the row in `dbo.Customer`
    can be deleted.


    The execution identifies a couple of potential performance problems with the delete.
    First, with only one row being deleted, there are a total of 4,516 reads (see
    Figure [13-42](#338675_4_En_13_Chapter.xhtml#Fig42)). Of the reads, 3 occur on
    `dbo.Customer`, while 4,513 occur on `dbo.SalesOrderHeader`. The reason for this
    is the `clustered index scan` that had to occur on `dbo.SalesOrderHeader` (shown
    in Figure [13-43](#338675_4_En_13_Chapter.xhtml#Fig43)). The scan occurred because
    the only way to check which rows were using `Customer` equal to 701 was to scan
    all the rows in the table. There is no index that can provide a faster path to
    verifying whether the value was being used.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig43_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    2 with 24% cost relative to the batch. Below is a flow diagram exhibiting multiple
    paths, namely, clustered index delete, customer, at 1% cost and clustered index
    scan, clustered, sales order header, at 99% cost to delete at 0% cost.


    Figure 13-43


    Execution plan for the Foreign Keys pattern with no index


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig42_HTML.png)


    A panel with an opened messages tab with 2 lines of entries for sales order header
    and customer tables with the scan count at 1 and 0, logical reads at 4513 and
    3, physical reads at 0 and 0, read-ahead reads at 0 and 0, l o b logical reads
    at 0 and 0, and l o b physical reads at around 0 and 0 with a pair of 1 row affected
    labels above and below.


    Figure 13-42


    Statistics I/O results for the Foreign Keys pattern with no index


    ```

    USE AdventureWorks2017

    GO

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON;

    DELETE FROM dbo.Customer

    WHERE CustomerID = 701;

    Listing 13-28

    Foreign Keys Pattern with No Index

    ```


    Improving the performance of the `DELETE` on `dbo.Customer` can be done simply
    through the Foreign Keys pattern. An index built on `dbo.SalesOrderHeader` on
    the `CustomerID` column will provide a reference point for validation with the
    next delete operation (see Listing [13-29](#338675_4_En_13_Chapter.xhtml#PC29)).
    Reviewing the execution with the index in place yields quite different results.
    Instead of 4,513 reads on `dbo.SalesOrderHeader`, there are now only two reads
    against that table (see Figure [13-44](#338675_4_En_13_Chapter.xhtml#Fig44)).
    This change is, of course, because of the index that was created on the `CustomerID`
    column (see Figure [13-45](#338675_4_En_13_Chapter.xhtml#Fig45)). Instead of a
    clustered index scan, the delete operation can utilize an index seek on `dbo.SalesOrderHeader`.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig45_HTML.png)


    A panel with an opened execution plan tab containing 2 lines of text for query
    3 with 0% cost relative to the batch. Below is a flow diagram exhibiting multiple
    paths, namely, clustered index delete, customer, at 80% cost and index seek, nonclustered,
    sales order header, at 20% cost to delete at 0% cost.


    Figure 13-45


    Execution plan for the Foreign Keys pattern with an index


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig44_HTML.png)'
