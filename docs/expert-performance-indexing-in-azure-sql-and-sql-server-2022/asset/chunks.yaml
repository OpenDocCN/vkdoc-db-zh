  trans: '

    ## 默认值


    合理应用默认值看似与防止碎片化无关，但在某些场景下，它能对碎片化产生显著影响。此类优化最典型的案例是数据库使用 `uniqueidentifier` 数据类型时。


    大多数情况下，`uniqueidentifier` 值是通过 `NEWID()` 函数生成的。此函数创建一个全局唯一标识符（GUID），理论上在整个地球上都应是唯一的。这对于为行生成唯一标识很有用，但其作用域可能超出了数据库的需求。很多时候，唯一值可能只需要在服务器或表级别保持唯一即可。


    `NEWID()` 函数的主要问题在于，生成 GUID 并非一个顺序过程。如本章开头所示，使用此函数为聚集索引键生成值会导致严重的碎片化。


    `NEWID()` 函数的一个替代方案是 `NEWSEQUENTIALID()` 函数。该函数同样返回 GUID，但其生成值的方式有几点不同。首先，在服务器上由该函数生成的每个
    GUID 都与前一个值顺序相关。第二个区别是，生成的 GUID 值仅在生成它的服务器上是唯一的。如果另一个 SQL Server 实例对同一个表使用此函数生成
    GUID，则可能产生重复值，并且由于作用域是服务器级别，这些值也不会是顺序的。


    考虑到这些限制，如果一个表必须使用 `uniqueidentifier` 数据类型，那么 `NEWSEQUENTIALID()` 函数是 `NEWID()`
    函数的一个绝佳替代方案。它生成的值将是顺序的，所遇到的碎片量将大大减少，频率也更低。


    ## 索引统计信息维护


    在第 3 章中，讨论了收集索引统计信息的相关内容。这些统计信息为查询优化器提供了关键信息，用于编译查询的执行计划。当此信息过时或不准确时，数据库将提供次优或不正确的查询计划。


    在大多数情况下，索引统计信息不需要大量维护。本节将回顾 SQL Server 中可用于创建和更新统计信息的内部流程。同时也会讨论在自动化流程跟不上索引内数据变化速率时，维护统计信息的方法。


    需要注意的是，SQL Server 中的统计信息是对表中数据基数（行数）和值频率的估计。它们并非实时维护，因为实时维护的成本过高。


    ### 自动维护统计信息


    在 SQL Server 中构建和维护统计信息最简单的方法是让 SQL Server 自动完成。有三个数据库属性控制 SQL Server 是否自动构建和维护统计信息：


    *   `AUTO_CREATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS`

    *   `AUTO_UPDATE_STATISTICS_ASYNC`


    默认情况下，前两个属性在数据库中是启用的。最后一个选项默认是禁用的。在大多数场景下，这三个属性都应启用。


    #### 自动创建


    第一个数据库属性是 `AUTO_CREATE_STATISTICS`。此属性指导 SQL Server 自动在没有统计信息的列上创建单列统计信息。从索引的角度看，此属性没有影响。创建索引时，会为索引创建一个统计信息对象。


    #### 自动更新


    接下来的两个属性是 `AUTO_UPDATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS_ASYNC`。从高层次来看，这两个属性非常相似。当超过一个内部阈值时，SQL
    Server 将启动统计信息对象的更新。更新操作旨在使统计信息对象中的值与表中数据的实际基数保持同步。


    触发统计信息更新的阈值可能因表而异。该阈值基于与已更改行数相关的几个计算。对于空表，当向表中添加超过 500 行时，将触发统计信息更新。如果表已有超过 500
    行，那么当修改的行数达到 500 行加上表中总行数的 20% 时，统计信息将被更新。此时，SQL Server 将安排更新统计信息。随着表中行数的增加，20%
    的阈值会相应降低，以适应表中数据量更大时需要更频繁更新统计信息的需求。大约在 50 万行时，该百分比降至约 5%，而对于超过 10 亿行的表，则降至不到 1%。此行为类似于之前通过跟踪标志
    2371 实现的功能，该标志自 SQL Server 2016 起默认开启。


    当统计信息更新发生时，有两种模式：同步和异步。默认情况下，统计信息是同步更新的。这意味着当统计信息被判定为过时并需要更新时，查询优化器会等待统计信息更新完成后，再编译查询的执行计划。这对于数据易变的表非常有用。例如，`TRUNCATE
    TABLE` 操作前后的表统计信息会大不相同。也可以选择通过启用 `AUTO_UPDATE_STATISTICS_ASYNC` 属性来异步更新统计信息。这改变了查询优化器在触发更新统计信息事件时的反应方式。查询优化器不再等待统计信息更新完成，而是基于现有统计信息编译执行计划，并在更新完成后为后续查询使用更新后的统计信息。对于查询量高、数据吞吐量大的数据库，这通常是更新统计信息的首选方式。它避免了事务吞吐量出现偶尔的停顿，查询能够顺畅执行，执行计划在获得改进的信息后随之更新。


    对于之前在旧版 SQL Server 中禁用了 `AUTO_UPDATE_STATISTICS` 的环境，现在考虑启用它并配合 `AUTO_UPDATE_STATISTICS_ASYNC`
    是值得的。过去禁用 `AUTO_UPDATE_STATISTICS` 的最主要原因是担心更新统计信息导致的延迟。有了启用 `AUTO_UPDATE_STATISTICS_ASYNC`
    的选项，这些性能顾虑很可能得以缓解。除非有充分的理由并经过彻底论证，否则不应禁用统计信息的自动更新。

    '
- fmt: "#### 防止自动更新\n\n根据表上的索引情况，有时自动更新索引统计信息弊大于利。例如，对大型表执行自动统计信息更新可能会在统计信息对象更新期间导致性能问题。在这种情况下，现有的统计信息对象可能足够好用，直到下一个维护窗口。同样，通过受控数据加载过程经历大量数据更新的表，最好在数据加载过程结束时更新统计信息，而不是自动进行。\n\
    \n有多种方法可以禁用单个统计信息对象上的 `AUTO_UPDATE_STATISTICS`，而不是在整个数据库范围内禁用：\n\n*   对统计信息对象执行\
    \ `sp_autostats` 系统存储过程\n\n*   在 `UPDATE STATISTICS` 或 `CREATE STATISTICS` 语句上使用\
    \ `NORECOMPUTE` 选项\n\n*   在 `CREATE INDEX` 语句上使用 `STATISTICS_NORECOMPUTE`\n\n\
    这些选项都可用于禁用或启用索引上的 `AUTO_UPDATE_STATISTICS` 选项。在禁用此功能之前，请务必验证统计信息更新是否真正必要。\n\n\
    #### 内存优化表统计信息\n\n在考虑统计信息时，内存优化表是一个统计信息创建和使用方式略有不同的领域。重要的是要理解，无法在内存优化表上自动生成统计信息，并且始终需要完整扫描。此外，内存优化表上的本机编译存储过程仅在存储过程编译或\
    \ SQL Server 重启时检索统计信息。这意味着在考虑统计信息对索引的影响时，内存优化表在安排统计信息对象的维护时机方面需要格外小心。\n\n###\
    \ 手动维护统计信息\n\n有时，用于维护统计信息的自动化流程可能不够好。这通常与数据正在发生变化但不足以触发统计信息更新的情况有关。发生这种情况的一个例子是更新语句改变了表的基数但未影响大量行。例如，如果表中\
    \ 10% 的数据从多个值更改为单个值，那么查询数据的执行计划最终可能不是最优的。在这种情况下，能够手动更新统计信息是有价值的。与索引碎片整理一样，有两种手动维护统计信息的方法：\n\
    \n*   维护计划\n\n*   T-SQL 脚本\n\n在接下来的部分中，将解释每种方法，并提供如何实现它们的演练。\n\n#### 维护计划\n\n\
    在维护计划中，有一个允许进行统计信息维护的任务：更新统计信息任务。使用此任务时，可以配置许多属性来控制其行为（参见图 [11-26](#338675_4_En_11_Chapter.xhtml#Fig26)）：\n\
    \n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig26_HTML.png)\n\n更新统计信息任务属性窗口的屏幕截图，包含连接、数据库、对象、选择、更新和扫描类型。\n\
    \n图 11-26\n\n更新统计信息任务的属性窗口\n\n*   *连接*：任务执行时将连接到的 SQL Server 实例。\n\n*   *数据库*：任务将连接到以进行维护过程的数据库。此属性的选项包括：\n\
    \    *   所有数据库。\n\n    *   所有系统数据库。\n\n    *   所有用户数据库。\n\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \n    *   忽略状态不为在线的数据库。\n\n*   *对象*：确定重建是针对表、视图，还是表和视图。\n\n*   *选择*：指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
    \n*   *更新*：对于每个表，确定是更新所有现有统计信息、仅列统计信息（使用 `WITH COLUMN` 子句），还是仅索引统计信息（使用 `WITH\
    \ INDEX` 子句）。\n\n*   *扫描类型*：在完整扫描索引的所有叶级页面与“抽样”之间进行选择，后者将扫描一定百分比或数量的行来构建统计信息对象。\n\
    \n与之前讨论的维护计划不同，更新统计信息任务没有更深入的控制来帮助确定是否应更新统计信息。一个有用的选项是将统计信息更新限制在指定的日期范围内，这将减少每次执行期间更新的统计信息数量。在大多数情况下，缺少该选项不会造成问题。统计信息更新不像索引更新那样每次更新都需要足够的空间来重建整个索引。然而，能够保留当前的抽样扫描类型会很好，因为这可能会影响性能，并且采用一刀切的方法可能无法达到预期的性能效果。\n\
    \n#### T-SQL 脚本\n\n通过 T-SQL，有几种替代方法可用于更新统计信息：使用存储过程或使用 DDL 语句。每种方法都有其优缺点。在接下来的部分中，将讨论每种方法以及它可能成为一种有价值方法的原因。\n\
    \n##### 存储过程\n\n在 `master` 数据库中，有一个名为 `sp_updatestats` 的系统存储过程，可用于更新数据库中的所有统计信息。由于它是一个系统存储过程，因此可以从任何数据库调用它，以更新调用该过程的数据库中的统计信息。\n\
    \n当执行 `sp_updatestats` 时，它会使用 `ALL` 选项运行 `UPDATE STATISTICS` 语句（下一节将描述）。该存储过程接受一个名为\
    \ `resample` 的参数，如清单 [11-32](#338675_4_En_11_Chapter.xhtml#PC32) 所示。`resample`\
    \ 参数仅接受值 `resample`。如果提供了此值，则存储过程使用 `UPDATE STATISTICS` 的 `RESAMPLE` 选项。否则，存储过程使用\
    \ SQL Server 中的默认抽样算法。\n\n```\nsp_updatestats [ [ @resample = ] 'resample']\n\
    ```\n清单 11-32\n`sp_updatestats` 语法\n\n使用 `sp_updatestats` 的一个好处是，它只会更新那些数据已发生修改的项目的统计信息。会检查用于触发自动统计信息更新的内部计数器，以确保仅更新已更改的统计信息。此外，`resample`\
    \ 选项使用统计信息最近使用的抽样率。\n\n在需要更新统计信息的情况下，`sp_updatestats` 是一个很好的工具，它仅更新那些自上次更新以来可能已过时的统计信息。如果说更新统计信息任务是一张覆盖整个数据库的巨大毯子，那么\
    \ `sp_updatestats` 就是一张恰到好处地覆盖关键部位的被子。"
  raw: "#### Preventing Auto-update\n\nDepending on the indexes on a table, there\
    \ will be times in which automatically updating the indexes will do more harm\
    \ than good. For instance, an automatic statistics update on a large table may\
    \ lead to performance issues while the statistics object is updated. In that situation,\
    \ the existing statistics object may be good enough until the next maintenance\
    \ window. Similarly, a table that is subject to heavy data updates via controlled\
    \ data load processes may be better off having statistics updated at the end of\
    \ the data load process, rather than automatically.\n\nThere are a number of ways\
    \ in which `AUTO_UPDATE_STATISTICS` can be disabled on an individual statistics\
    \ object rather than across the entire database:\n\n*   Executing an `sp_autostats`\
    \ system store procedure on the statistics object\n\n*   Using the `NORECOMPUTE`\
    \ option on the `UPDATE STATISTICS` or `CREATE STATISTICS` statement\n\n*   Using\
    \ `STATISTICS_NORECOMPUTE` on the `CREATE INDEX` statement\n\nEach of these options\
    \ can be used to disable or enable the `AUTO_UPDATE_STATISTICS` option on indexes.\
    \ Before disabling this feature, always be sure to validate that the statistics\
    \ update is truly necessary.\n\n#### Memory-Optimized Table Statistics\n\nWhen\
    \ considering statistics, one area where statistics are created and used a bit\
    \ differently is with memory-optimized tables. It’s important to understand that\
    \ statistics cannot be generated automatically on memory-optimized tables and\
    \ that they always require a full scan. In addition, natively compiled stored\
    \ procedures on memory-optimized tables retrieve statistics only when the stored\
    \ procedure is compiled or when SQL Server restarts. This means that when considering\
    \ the impact of statistics on indexes, memory-optimized tables require additional\
    \ care in timing the maintenance for statistics objects.\n\n### Manually Maintaining\
    \ Statistics\n\nThere will be times when the automated processes for maintaining\
    \ statistics will not be good enough. This is often tied to situations where the\
    \ data is changing but not enough has changed to trigger a statistics update.\
    \ One example of when this can happen is when update statements change the cardinality\
    \ of the table without affecting a large number of rows. For instance, if 10 percent\
    \ of a table was changed from many values to a single value, then the plan for\
    \ querying the data could end up being suboptimal. In situations like this, there\
    \ is value in being able to manually update statistics. As with index fragmentation,\
    \ there are two methods for manually maintaining statistics:\n\n*   Maintenance\
    \ plans\n\n*   T-SQL scripts\n\nIn the next sections, each of these methods will\
    \ be explained alongside walkthroughs of how they can be implemented.\n\n####\
    \ Maintenance Plans\n\nWithin maintenance plans, there is a task that allows statistics\
    \ maintenance: the Update Statistics Task. When using this task, there are a number\
    \ of properties that can be configured to control its behavior (see Figure [11-26](#338675_4_En_11_Chapter.xhtml#Fig26)):\n\
    \n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig26_HTML.png)\n\nA screenshot\
    \ of the properties window of update statistics task with connection, database,\
    \ object, selection, update, and scan type.\n\nFigure 11-26\n\nProperties window\
    \ for Update Statistics Task\n\n*   *Connection*: The SQL Server instance the\
    \ task will connect to when it executes.\n\n*   *Database(s)*: The databases that\
    \ the task will connect to for maintenance processes. The options for this property\
    \ are\n    *   All databases.\n\n    *   All system databases.\n\n    *   All\
    \ user databases.\n\n    *   These specific databases (a list of available databases\
    \ is included, and one must be selected).\n\n    *   Ignore databases where the\
    \ state is not online.\n\n*   *Object*: Determines whether the rebuild will be\
    \ against tables, views, or tables and views.\n\n*   *Selection*: Specifies the\
    \ tables or indexes affected by this task. This is not available when Tables and\
    \ Views is selected in the Object box.\n\n*   *Update*: For each table, determines\
    \ whether all existing statistics, column statistics only (using the `WITH COLUMN`\
    \ clause), or index statistics only (using the `WITH INDEX` clause) are updated.\n\
    \n*   *Scan type*: A choice between a full scan of all leaf-level pages of the\
    \ indexes and “Sample by,” which will scan a percentage or number of rows to build\
    \ the statistics object.\n\nUnlike the maintenance plans previously discussed,\
    \ the Update Statistics Task doesn’t have deeper controls to help determine whether\
    \ the statistics should be updated. A useful option would be to limit the statistics\
    \ updates to a specified date range, which would reduce the number of statistics\
    \ updated during each execution. For the most part, the lack of that option is\
    \ not problematic. Statistics updates are not like indexes where each update requires\
    \ enough space to rebuild the entire index. However, it would be good to be able\
    \ to retain the current sample scan type since that can influence performance\
    \ and may not result in desired performance with a one-size-fits-all approach.\n\
    \n#### T-SQL Scripts\n\nThrough T-SQL, there are a couple of alternative approaches\
    \ for updating statistics: using a stored procedure or using DDL statements. Each\
    \ of these approaches has pros and cons. In the next sections, each will be discussed\
    \ along with why it may be a worthwhile approach.\n\n##### Stored Procedure\n\n\
    Within the master database, there is a system stored procedure named `sp_updatestats`\
    \ that allows for updating all statistics within a database. Since it is a system\
    \ stored procedure, it can be called from any database to update the statistics\
    \ in the database in which it is called from.\n\nWhen `sp_updatestats` is executed,\
    \ it runs the `UPDATE STATISTICS` statement, described in the next section, using\
    \ the `ALL` option. The stored procedure accepts a single parameter named `resample`,\
    \ shown in Listing [11-32](#338675_4_En_11_Chapter.xhtml#PC32). The `resample`\
    \ parameter accepts only the value `resample`. If this value is supplied, then\
    \ the stored procedure uses the `RESAMPLE` option of `UPDATE STATISTICS`. Otherwise,\
    \ the stored procedure uses the default sampling algorithm in SQL Server.\n\n\
    ```\nsp_updatestats [ [ @resample = ] 'resample']\nListing 11-32\nsp_updatestats\
    \ Syntax\n```\n\nOne benefit to using `sp_updatestats` is that it will update\
    \ the statistics only for items in which there have been modifications to the\
    \ data. The internal counter that is used to trigger automatic statistics updates\
    \ is checked to make certain that only statistics that have been changed will\
    \ be updated. Additionally, the resample option uses the most recently used sample\
    \ rate for the statistics.\n\nIn situations where a statistics update is needed,\
    \ the `sp_updatestats` is a great tool for updating statistics on just those that\
    \ have the potential for being out of date since the last update. Where the Update\
    \ Statistics Task is an oversized blanket that smothers the entire database, `sp_updatestats`\
    \ is a comforter that covers just the right places."
