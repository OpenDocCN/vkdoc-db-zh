    这只是一个关于收缩操作可能对索引造成碎片化损害的简单示例。即使在这个例子中也很明显，收缩操作导致了大量碎片。大多数 SQL Server 数据库管理员都会同意，收缩操作在任何数据库上都应该是极其罕见的操作。一些数据库管理员认为，出于任何原因都不应在任何数据库上使用此操作。最常被推荐的准则是，在执行数据库收缩操作时要极其谨慎。最危险的模式是采用一种循环：收缩数据库以回收空间
    -> 导致碎片化 -> 然后通过碎片整理索引来扩展数据库。这构成了对时间和资源的浪费，而这些资源本可以更好地用于解决实际的性能和维护问题。


    关于收缩操作的另一个重要注意事项是，大多数繁忙的生产表会随着时间的推移而增长。如果是这种情况，那么收缩数据库只能为未来的必然增长提供暂时的缓解。因此，收缩操作应仅用于回收的空间量远大于其可能导致的任何碎片的场景。


    ## 碎片化的变体


    传统上，在讨论索引碎片时，主要关注的是聚集索引或非聚集索引内部的碎片化。在评估索引碎片化时，这并不是唯一需要考虑的因素。考虑表或索引是否存在臃肿、转发或分段也是有价值的，这些都是索引碎片化概念的变体。在本节中，将回顾表上可能需要进行碎片化类型维护的另外两个领域：


    *   堆表臃肿与转发


    *   列存储碎片化

