  trans: '### 删除操作


    导致碎片化的第三种操作类型是 `DELETE` 操作。删除操作在性质上有些不同，因为它是在数据库内部产生碎片化。它不是因为页拆分而重定位页，而是可能导致页从索引中被移除。随后，索引页的物理序列中就会出现间隙。由于页不再物理连续，它们就被认为是碎片化的。这一点很重要，因为一旦页从索引中被释放，它们就可以被重新分配给其他索引，从而构成一种更传统的碎片化形式。


    为了演示这种行为，请创建一个表，填充一些记录，然后添加一个聚集索引。完成这些任务的脚本如代码清单 11-10 所示。运行该脚本，然后运行代码清单 11-11
    的脚本来获取聚集索引当前的碎片化情况。结果应与图 11-9 中的匹配。平均碎片化（百分比）列 (`avg_fragmentation_in_percent`)
    显示当前索引中没有碎片化。


    ![图 11-9](img/338675_4_En_11_Fig9_HTML.png)


    *一个表格有 9 列和 2 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。两个聚集索引的平均碎片化均为
    0。*


    **图 11-9** DELETE 操作前的碎片化结果


    ```sql

    代码清单 11-11 查看 DELETE 索引碎片化情况

    USE AdventureWorks2017

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.DeleteOperations''),NULL,NULL,''DETAILED'')

    ```


    ```sql

    代码清单 11-10 创建用于 DELETE 操作的表

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.DeleteOperations'') IS NOT NULL

    DROP TABLE dbo.DeleteOperations;

    CREATE TABLE dbo.DeleteOperations

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.DeleteOperations (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_UsingUniqueidentifier ON dbo.DeleteOperations(RowID);

    ```


    为了演示由 `DELETE` 操作引起的碎片化，将使用代码清单 11-12 中的代码删除表中每隔 50 条记录。和之前一样，将使用代码清单 11-11 来查看索引中碎片化的状态。结果如图
    11-10 所示，表明 `DELETE` 操作导致了大约 13% 的碎片化。对于 `DELETE` 操作，碎片化的产生速度通常不会太快。此外，由于碎片化不是页拆分的结果，页的顺序在物理上不会变得无序。相反，在连续的页之间会出现间隙。但是，留空的页可能会在未来的
    `INSERT` 和 `UPDATE` 事务中被重用，这可能导致页在物理上变得无序。


    ![图 11-10](img/338675_4_En_11_Fig10_HTML.png)


    *一个表格有 9 列和 2 行。列标题为：索引类型描述、索引深度、索引级别、页数、记录数、平均碎片百分比、碎片数、平均碎片大小（页）、平均页空间使用率百分比。平均碎片化为
    12.42%。*


    **图 11-10** DELETE 操作后的碎片化结果


    ```sql

    代码清单 11-12 执行 DELETE 操作

    USE AdventureWorks2017

    GO

    DELETE dbo.DeleteOperations

    WHERE RowID % 100 BETWEEN 1 AND 50

    ```


    请注意，由删除操作产生的碎片化可能不会在执行 `DELETE` 操作后立即显现。当记录要被删除时，它们首先被标记为删除，然后才实际删除记录本身。在标记为删除期间，该记录被视为幽灵记录。在此阶段，记录在逻辑上已被删除，但在物理上仍存在于索引中。在未来的某个时间点，在事务提交并完成
    `CHECKPOINT` 之后，清除幽灵记录进程将物理删除该行。此时，索引中的碎片化将变得可见。'
- fmt: '## Shrink Operations


    The last type of operation that can lead to fragmentation is when databases are
    shrunk. Databases can be shrunk using either `DBCC SHRINKDATABASE` or `DBCC SHRINKFILE`.
    These operations can be used to shrink the size of a database or its files. When
    they are used, the pages at the end of a data file are relocated toward the beginning
    of the data file. For their intended purpose, shrink operations can be effective
    tools.


    Unfortunately, these shrink operations do not consider the nature of the data
    pages that are being moved. To the shrink operation, a data page is a data page.
    The priority of the operation is that pages at the end of the data file find a
    place at the beginning of the data file. As discussed, when the pages of an index
    are not physically stored in order, the index is considered fragmented.


    To demonstrate the fragmentation damage that a shrink operation can cause, a database
    will be created and a shrink performed on it. The code for this appears in Listing
    11-13. In this example, there are two tables: `FirstTable` and `SecondTable`.
    Some records will be inserted into each table. The inserts will alternate back
    and forth with three inserts into `FirstTable` and two inserts into `SecondTable`.
    Through these inserts, there will be alternating bands of pages allocated to the
    two tables. Next, `SecondTable` will be dropped, which will result in unallocated
    data pages between each of the bands of pages for `FirstTable`. Using Listing
    11-14 will show that a small amount of fragmentation exists on `FirstTable`, shown
    in Figure 11-11.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig11_HTML.png)


    Figure 11-11: Fragmentation of FirstTable after inserts


    ```

    Use Fragmentation

    GO

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.FirstTable''),NULL,NULL,''DETAILED'')

    ```


    Listing 11-14: View Index Fragmentation from Shrink


    ```

    USE master

    GO

    IF EXISTS (SELECT * FROM sys.databases WHERE name = ''Fragmentation'')

    DROP DATABASE Fragmentation

    GO

    CREATE DATABASE Fragmentation

    GO

    Use Fragmentation

    GO

    IF OBJECT_ID(''dbo.FirstTable'') IS NOT NULL

    DROP TABLE dbo.FirstTable;

    CREATE TABLE dbo.FirstTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_FirstTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    CREATE TABLE dbo.SecondTable

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    ,CONSTRAINT PK_SecondTable PRIMARY KEY CLUSTERED (RowID)

    );

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.SecondTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    INSERT INTO dbo.FirstTable (Name, JunkValue)

    SELECT TOP 750 name, REPLICATE(''X'', 2000)

    FROM sys.columns

    GO

    IF OBJECT_ID(''dbo.SecondTable'') IS NOT NULL

    DROP TABLE dbo.SecondTable;

    GO

    ```


    Listing 11-13: Shrink Operation Database Preparation


    With the database prepared, the next step is to shrink the database. The purpose
    of this is to recover the space that had been allocated to `SecondTable` and trim
    down the size of the database to only what is needed. To perform the shrink operation,
    use the code in Listing 11-15. When the `SHRINKDATABASE` operation completes,
    Figure 11-12 will show that running the code from Listing 11-14 causes the fragmentation
    for the index to increase from just over 2 percent to more than 35 percent. This
    is a significant change in fragmentation on a database with just a single table.
    Consider the effect of a shrink operation on a database with dozens, hundreds,
    or thousands of indexes.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig12_HTML.png)


    Figure 11-12: Fragmentation of FirstTable after shrink operation


    ```

    DBCC SHRINKDATABASE (Fragmentation)

    ```


    Listing 11-15: Shrink Operation


    This has been a simple example of the damage in terms of fragmentation that a
    shrink operation can have on an index. As was evident even with this example,
    the shrink operation led to a significant amount of fragmentation. Most SQL Server
    database administrators will agree that shrink operations should be an extremely
    rare operation on any database. Some database administrators are also of the opinion
    that this operation should never be used on any database for any reason. The guideline
    that is most often recommended is to be extremely cautious when database shrink
    operations are performed. The most dangerous pattern to adopt is a cycle of shrinking
    a database to recover space, causing fragmentation, and then expanding the database
    through defragmenting the indexes. This constitutes a waste of time and resources
    that could be better spent on real performance and maintenance issues.


    Another important note on shrink operations is that most busy production tables
    will grow over time. If this is the case, then shrinking the database only provides
    temporary relief against inevitable future growth. Because of this, shrink operations
    should be reserved for scenarios when the amount of space recouped is far more
    significant than any fragmentation that may result from it.


    ## Fragmentation Variants


    Traditionally, when index fragmentation is discussed, the primary focus is on
    fragmentation within the clustered or non-clustered index. This is not the only
    consideration to keep in mind when evaluating index fragmentation. It is also
    valuable to consider whether the table or index has bloat, forwarding, or segmentation,
    each of which is a variation on the idea of index fragmentation. In this section,
    these other two areas in which fragmentation-type maintenance can be required
    on tables will be reviewed:


    *   Heap bloat and forwarding


    *   Columnstore fragmentation'
