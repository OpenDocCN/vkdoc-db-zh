    each one.'
  trans: '

    运行这些查询并重建索引后，最终的性能数字将显示出相当显著的提升。执行第一个查询时，聚合查询会产生 659 次逻辑读取，如图 11-19 所示。删除一年的数据后，聚合查询需要
    79,982 次逻辑读取，这比返回行数减少 365 行的原始查询还要多。这是因为管理已删除行需要额外的页面。重建索引后，I/O 降至仅 444 次逻辑读取。


    ![](img/338675_4_En_11_Fig19_HTML.png)


    一个输入输出统计页面展示了如何进行删除操作演示，包括受影响的行数数据以及高亮显示的 `lob 逻辑读取` 数据。5 个查询的 `lob 逻辑读取` 分别为
    370、289、370、79612 和 444。


    图 11-19：删除操作演示的统计 I/O 结果


    通过新增行和删除现有行，有理由考虑列存储索引的维护需求。影响这些索引的问题与传统聚集索引的问题不尽相同，但它们同样重要。


    ### 碎片问题


    这些演示展示了许多索引可能产生碎片的方式，但尚未讨论其重要性。索引内部的碎片可能成为问题，有几个重要原因：


    *   索引 I/O

    *   连续读取


    随着索引碎片的增加，这两个方面都会影响索引的性能表现。在某些最坏的情况下，碎片化程度可能非常严重，以至于查询优化器将在查询计划中停止使用该索引。


    #### 索引 I/O


    I/O 是 SQL Server 中容易出现性能瓶颈的领域。同样，也有多种解决方案可以帮助缓解这些瓶颈。从本章的角度出发，主要关注点将是碎片对 I/O 的影响。


    由于页拆分通常是碎片产生的原因，它们为研究碎片对 I/O 影响提供了一个很好的起点。回顾一下，当发生页拆分时，页面上一半的内容会被移出到另一个页面上。如果原始页面是
    100%满的，那么得到的两个页面都将大约 50%满。本质上，从存储中读取相同数量的信息现在需要两次 I/O，而在页拆分之前只需要一次 I/O。这种 I/O
    的增加会推高读写次数，从而对性能产生负面影响。


    为了验证碎片对 I/O 的影响，将提供另一个碎片示例。这次将构建一个表，填充数据，并进行更新以产生页拆分和碎片。代码清单 11-22 将执行这些操作。脚本的最后一部分将查询
    `sys.dm_db_partition_stats` 以返回为索引保留的页面数。执行代码清单 11-21 中的碎片脚本。这将显示此时索引的碎片率超过 99%。代码清单
    11-21 的结果显示索引使用了 209 个页面。结果见图 11-20。


    ![](img/338675_4_En_11_Fig20_HTML.jpg)


    一个表有 2 列和 1 行数据。列标题是 `name` 和 `in_row_reserved_page_count`。行数据是 `CLUS_IndexIO`
    和 585。


    图 11-20：`CLUS_IndexIO` 的碎片情况


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.IndexIO'') IS NOT NULL

    DROP TABLE dbo.IndexIO;

    CREATE TABLE dbo.IndexIO

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.IndexIO (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_IndexIO ON dbo.IndexIO(RowID);

    UPDATE dbo.IndexIO

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```

    代码清单 11-22：构建索引 I/O 示例的脚本


    ```

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.IndexIO''),NULL,NULL,''DETAILED'')

    ```

    代码清单 11-21：查看 I/O 示例的索引碎片


    从索引中移除碎片会对索引的页面数量产生显著影响吗？正如这个演示将要展示的，减少碎片确实会产生影响。


    此演示的下一步是从索引中移除碎片。为此，执行代码清单 11-23 中的 `ALTER INDEX` 语句，它将消除碎片。在本章的剩余部分，将讨论从索引中移除碎片的机制。此命令的效果是索引中的所有碎片都被移除了。图
    11-21 显示了代码清单 11-23 的结果。它们显示索引使用的页面数从 585 个减少到 417 个。移除碎片的效果令人印象深刻，索引页面数量减少了近
    30%。


    ![](img/338675_4_En_11_Fig21_HTML.jpg)


    一个表有 2 列标题：`name` 和 `in_row_reserved_page_count`，以及其对应的一行数据：`CLUS_IndexIO` 和 417。


    图 11-21：重建操作导致的页面数量


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX CLUS_IndexIO ON dbo.IndexIO REBUILD

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```

    代码清单 11-23：重建索引以移除碎片的脚本


    这证明了碎片会影响索引中的页面数量。索引中的页面越多，为了获取查询所需的数据就需要读取更多的页面。减少页面数量有助于让 SQL Server 数据库在相同的读取次数内处理更多数据，从而提高它们在更少的页面上读取相同信息的速度。


    #### 连续读取


    碎片对性能的另一个负面影响与连续读取有关。在 SQL Server 中，连续读取影响其利用预读操作的能力。预读允许 SQL Server 将预计会使用的页面请求到内存中。SQL
    Server 无需等待为页面生成 I/O 请求，而是可以将大块页面读入内存，预期这些数据页将来会被查询使用。


    如前所述，索引内的碎片是由于索引中物理数据页的连续性中断造成的。每次物理页面出现中断时，I/O 操作都必须改变从 SQL Server 读取数据的位置。这就是碎片如何对连续读取造成阻碍的。


    ### 碎片整理选项


    SQL Server 提供了多种方法来移除或缓解索引中的碎片。每种方法都有其优缺点。在本节中，将回顾这些选项以及使用每种选项的原因。

    '
- fmt: "# 索引维护\n\n## 索引重建\n\n从索引中清除碎片的第一种方法是重建索引。重建索引会创建索引的一个新的、连续副本。当新索引完成后，现有的索引将被删除。索引重建操作通过\
    \ `CREATE INDEX` 或 `ALTER INDEX` 语句完成。通常，碎片率超过 30% 的索引被认为是重建的良好候选者。请注意，在大多数数据库中，30%\
    \ 及以下的碎片水平不会对性能产生大的负面影响。虽然 30% 的碎片是一个很好的起点，但每个数据库和索引都应根据实际情况进行评估，如果性能在低于 30% 的碎片时就显示出更明显的负面影响，则应进行调整。\n\
    \n执行索引重建的主要好处是，生成的新索引具有连续的页面。当索引高度碎片化时，有时解决碎片问题的最好方法就是简单地重新开始并重建索引。重建索引的另一个好处是可以在重建过程中修改索引选项。最后，对于大多数索引，在重建期间可以保持在线状态。\n\
    \n> **注意**\n>\n> 自 SQL Server 2012 起，包含 `varchar(max)`、`nvarchar(max)`、`varbinary(max)`\
    \ 和 `XML` 数据类型的聚集索引可以在线重建。当聚集索引包含以下数据类型时，仍然无法在线重建：`image`、`ntext` 或 `text`。在线重建仅限于\
    \ SQL Server 企业版、开发版和评估版。此外，在线重建需要索引的两倍空间，因为重建完成需要同时存在索引的旧版本和新版本，这对于大表来说可能是个问题。\n\
    \n重建索引的第一个选项是使用 `CREATE INDEX` 语句，如代码清单 11-24 所示。这是通过 `DROP_EXISTING` 索引选项完成的。选择\
    \ `CREATE INDEX` 选项而不是 `ALTER INDEX` 有几个原因：\n\n*   需要更改索引定义，例如需要添加或删除列，或者需要更改列的顺序。\n\
    *   需要将索引从一个文件组移动到另一个文件组。\n*   需要修改索引分区。\n\n```sql\nCREATE [ UNIQUE ] [ CLUSTERED\
    \ | NONCLUSTERED ] INDEX index_name\nON  ( column [ ASC | DESC ] [ ,...n ] )\n\
    [ INCLUDE ( column_name [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n ] ) ]\n[\
    \ ON { partition_scheme_name ( column_name )\n| filegroup_name\n| default\n}\n\
    ]\n[ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | \"NULL\"\
    \ } ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON | OFF }\n| ONLINE = { ON | OFF }\n| RESUMABLE\
    \ = {ON | OF }\n| MAX_DURATION =  [MINUTES]\n```\n代码清单 11-24\n使用 `CREATE INDEX`\
    \ 重建索引\n\n另一个选项是 `ALTER INDEX` 语句，如代码清单 11-25 所示。此选项在语法中使用 `REBUILD` 选项。从概念上讲，这与\
    \ `CREATE INDEX` 语句完成相同的事情，但有以下好处：\n\n*   可以在单条语句中重建表上的多个索引。\n*   可以重建索引的单个分区。\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n\
    [ WITH (  [ ,...n ] ) ]\n| [ PARTITION = partition_number\n[ WITH ( \n[ ,...n\
    \ ] )\n]\n]\n]\n```\n代码清单 11-25\n使用 `ALTER INDEX` 重建索引\n\n索引重建的主要缺点是在重建操作期间索引所需的空间量。数据库中至少应有当前索引大小\
    \ 120% 的可用空间用于重建后的索引。原因是当前索引在重建完成之前不会被删除。在短时间内，索引将在数据库中存在两次。\n\n有两种方法可以减少重建期间索引所需的部分空间。首先，可以使用\
    \ `SORT_IN_TEMPDB` 索引选项来减少中间结果所需的空间量。数据库中仍然需要两个索引副本的空间，但不再需要 20% 的缓冲空间。第二种减少空间需求的方法是在重建之前禁用索引。禁用索引会从索引中删除索引和数据页，同时保留索引元数据。这将允许在索引先前占用的空间内重建索引。请注意，禁用选项仅适用于非聚集索引。\n\
    \n从 SQL Server 2019 开始的一个选项是能够恢复索引构建。在线构建索引时，可以将 `RESUMABLE` 选项设置为 `ON`，并将 `MAX_DURATION`\
    \ 设置为索引构建将运行直到应停止的分钟数。当索引重建停止时，旧索引保持可用，并且重建已完成的部分将被存储，直到重新启动时。此外，如果索引重建在 `RESUMABLE`\
    \ 选项设置为 `ON` 时失败，这将允许重新启动索引重建。如果事务日志空间不足或索引重建被维护或服务重启中断，这可能非常有用。\n\n在发出重建命令之前，务必考虑索引的大小，因为较大的索引需要更多时间和资源来重建。同时确定索引是否自然是写入密集型的，并且无论对其执行多少维护，都注定会严重碎片化。队列、会话数据或中间数据存储表通常会因频繁的写入操作而严重碎片化。如果这些表的大小有限，那么对它们进行重建将带来很少或没有好处。被识别为符合此使用模式的表可以从索引重建过程中排除，从而将维护资源留给其他能从重建操作中受益更多的表。\n\
    \n## 索引重组\n\n索引重建的替代方法是重组索引。这种类型的碎片整理正如其名。索引中的数据页在已分配给索引的页面之间重新排序。重组完成后，索引中页面的物理顺序与页面的逻辑顺序相匹配。当索引碎片不严重时，应重组索引。通常，碎片少于\
    \ 30% 的索引是重组的候选者。与所有最佳实践一样，30% 是一个提供坚实维护起点的指导原则。现实世界的用例将存在需要根据表的类型、使用情况和大小来调整此指导原则的情况。\n\
    \n要重组索引，使用 `ALTER INDEX` 语法（见代码清单 11-26）和 `REORGANIZE` 选项。如果需要，重组选项允许一次重组一个分区。\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n| REORGANIZE\n[ PARTITION =partition_number\
    \ ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n```\n代码清单 11-26\n使用 `ALTER INDEX`\
    \ 进行索引重组\n\n使用 `REORGANIZE` 选项有几个好处。首先，在重组期间，索引保持在线或可供优化器在新执行计划或缓存的执行计划中使用。其次，该过程设计为资源使用最少，这显著降低了在事务期间发生锁定和阻塞问题的机会。\n\
    \n索引重组的缺点是重组只使用已分配给索引的数据页。存在碎片时，分配给一个索引的区段常常与其他索引分配的区段交织在一起。重新排序数据页不会使数据页比当前更连续，但会确保已分配的页面按与数据本身相同的顺序排序。"
  raw: "#### Index Rebuild\n\nThe first method for removing fragmentation from an\
    \ index is to rebuild the index. Rebuilding an index builds a new contiguous copy\
    \ of the index. When the new index is complete, the existing one is dropped. Index\
    \ rebuild operations are accomplished through either a `CREATE INDEX` or `ALTER\
    \ INDEX` statement. Typically, indexes with more than 30 percent fragmentation\
    \ are considered good candidates for index rebuilds. Note that 30 percent and\
    \ lower levels of fragmentation in most databases will not show as a large negative\
    \ impact on performance. While fragmentation of 30 percent is a good starting\
    \ point, each database and index should be reviewed and adjusted if performance\
    \ shows more negative effects with less than 30 percent fragmentation.\n\nThe\
    \ chief benefit of performing an index rebuild is that the resulting new index\
    \ has contiguous pages. When an index is highly fragmented, sometimes the best\
    \ way to resolve the fragmentation is to simply start over with the index and\
    \ rebuild. Another benefit of rebuilding an index is that the index options can\
    \ be modified during the rebuild. Lastly, for most indexes, the index can remain\
    \ online while it is being rebuilt.\n\nNote\n\nSince SQL Server 2012, clustered\
    \ indexes with `varchar(max)`, `nvarchar(max)`, `varbinary(max)`, and `XML` data\
    \ types can be rebuilt online. Clustered indexes still cannot be rebuilt online\
    \ when they contain the following data types: `image`, `ntext`, or `text`. Online\
    \ rebuilds are limited to SQL Server Enterprise, Developer, and Evaluation Editions.\
    \ Additionally, online rebuilds require double the space for the index since both\
    \ the old and new versions of the index need to exist to complete the rebuild,\
    \ which can be a problem with larger tables.\n\nThe first option for rebuilding\
    \ an index is to use the `CREATE INDEX` statement, shown in Listing [11-24](#338675_4_En_11_Chapter.xhtml#PC24).\
    \ This is accomplished using the `DROP_EXISTING` index option. There are a few\
    \ reasons to choose the `CREATE INDEX` option instead of `ALTER INDEX`:\n\n* \
    \  The index definition needs to be changed, such as when the columns need to\
    \ be added or removed or their order needs to change.\n\n*   The index needs to\
    \ be moved from one filegroup to another.\n\n*   The index partitioning needs\
    \ to be modified.\n\n```\nCREATE [ UNIQUE ] [ CLUSTERED | NONCLUSTERED ] INDEX\
    \ index_name\nON  ( column [ ASC | DESC ] [ ,...n ] )\n[ INCLUDE ( column_name\
    \ [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n ] ) ]\n[ ON { partition_scheme_name\
    \ ( column_name )\n| filegroup_name\n| default\n}\n]\n[ FILESTREAM_ON { filestream_filegroup_name\
    \ | partition_scheme_name | \"NULL\" } ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON |\
    \ OFF }\n| ONLINE = { ON | OFF }\n| RESUMABLE = {ON | OF }\n| MAX_DURATION = \
    \ [MINUTES]\nListing 11-24\nIndex Rebuild with CREATE INDEX\n```\n\nThe other\
    \ option is the `ALTER INDEX` statement, shown in Listing [11-25](#338675_4_En_11_Chapter.xhtml#PC25).\
    \ This option utilizes the `REBUILD` option in the syntax. Conceptually, this\
    \ accomplishes the same thing as the `CREATE INDEX` statement but with the following\
    \ benefits:\n\n*   More than one index on a table can be rebuilt in a single statement.\n\
    \n*   A single partition of an index can be rebuilt.\n\n```\nALTER INDEX { index_name\
    \ | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n[ WITH (  [ ,...n ] ) ]\n| [ PARTITION\
    \ = partition_number\n[ WITH ( \n[ ,...n ] )\n]\n]\n]\nListing 11-25\nIndex Rebuild\
    \ with ALTER INDEX\n```\n\nThe primary downside to index rebuilds is the amount\
    \ of space that is required for the index during the rebuild operation. At a minimum,\
    \ there should be 120 percent of the size of the current index available within\
    \ the database for the rebuilt index. The reason for this is that the current\
    \ index will not be dropped until after the rebuild is completed. For a short\
    \ time, the index will exist twice in the database.\n\nThere are two ways to mitigate\
    \ some of the space required for an index during a rebuild. First, the `SORT_IN_TEMPDB`\
    \ index option can be used to reduce the amount of space needed for intermediate\
    \ results. Space will still be needed in the database for two copies of the index,\
    \ but the 20 percent buffer won’t be necessary. The second way to mitigate space\
    \ needs is to disable the index prior to the rebuild. Disabling an index drops\
    \ the index and data pages from an index while retaining the index metadata. This\
    \ will allow a rebuild of the index in the space that the index previously occupied.\
    \ Be aware that the disabling option applies only to non-clustered indexes.\n\n\
    An option starting with SQL Server 2019 is the ability to resume index builds.\
    \ When an index is being built online, the RESUMABLE option can be set to ON and\
    \ the MAX_DURATION to the number of minutes the index build will run until it\
    \ should stop. When the index rebuild stops, the old index remains available,\
    \ and the completed portion of the rebuild is stored until the time when it is\
    \ restarted. Additionally, if an index rebuild fails with the RESUMABLE option\
    \ set to ON, this will allow the index rebuild to be restarted. This can be extremely\
    \ useful if the transaction log runs out of space or the index rebuild is interrupted\
    \ by maintenance or a service restart.\n\nAlways consider the size of an index\
    \ prior to issuing a rebuild command as a larger index will require more time\
    \ and resources to rebuild. Also determine if an index is naturally write-heavy\
    \ and is destined to be fragmented heavily, regardless of how much maintenance\
    \ is run against it. Queues, session data, or intermediary data storage tables\
    \ will often be heavily fragmented due to frequent write operations. If these\
    \ tables are limited in size, then rebuilds against them will provide little to\
    \ no benefit. Tables that are identified as fitting this usage pattern may be\
    \ excluded from index rebuild processes and conserve maintenance resources for\
    \ other tables that would benefit more from a rebuild operation.\n\n#### Index\
    \ Reorganization\n\nAn alternative to an index rebuild is to reorganize an index.\
    \ This type of defragmentation happens just as it sounds. Data pages in the index\
    \ are reordered across the pages already allocated to the index. After the reorganization\
    \ is complete, the physical order of pages in an index matches the logical order\
    \ of pages. Indexes should be reorganized when they are not heavily fragmented.\
    \ In general, indexes fragmented less than 30 percent are reorganization candidates.\
    \ Like all best practices, 30 percent is a guideline that provides a solid starting\
    \ point for maintenance. Real-world use cases will exist that require tweaking\
    \ of this guideline based on the type of table, its usage, and size.\n\nTo reorganize\
    \ an index, the `ALTER INDEX` syntax is used (see Listing [11-26](#338675_4_En_11_Chapter.xhtml#PC26))\
    \ with the `REORGANIZE` option. The reorganization option allows for a single\
    \ partition to be reorganized at a time, if needed.\n\n```\nALTER INDEX { index_name\
    \ | ALL }\nON \n| REORGANIZE\n[ PARTITION =partition_number ]\n[ WITH ( LOB_COMPACTION\
    \ = { ON | OFF } ) ]\nListing 11-26\nIndex Reorganization with ALTER INDEX\n```\n\
    \nThere are a couple of benefits to using the `REORGANIZE` option. First, indexes\
    \ are online or available for use by the optimizer in a new execution plan or\
    \ in cached execution plans for the duration of the reorganization. Second, the\
    \ process is designed around minimal resource usage, which significantly lowers\
    \ the chance that locking and blocking issues will occur during the transaction.\n\
    \nThe downside to index reorganizations is that the reorganization uses only the\
    \ data pages already allocated to the index. With fragmentation, the extents allocated\
    \ to one index can often be intertwined with the extents allocated to other indexes.\
    \ Reordering the data pages won’t make the data pages any more contiguous than\
    \ they currently are, but it will make certain that the pages allocated are sorted\
    \ in the same order as the data itself."
  trans: "\n# 索引维护\n\n## 索引重建\n\n从索引中清除碎片的第一种方法是重建索引。重建索引会创建索引的一个新的、连续副本。当新索引完成后，现有的索引将被删除。索引重建操作通过\
    \ `CREATE INDEX` 或 `ALTER INDEX` 语句完成。通常，碎片率超过 30% 的索引被认为是重建的良好候选者。请注意，在大多数数据库中，30%\
    \ 及以下的碎片水平不会对性能产生大的负面影响。虽然 30% 的碎片是一个很好的起点，但每个数据库和索引都应根据实际情况进行评估，如果性能在低于 30% 的碎片时就显示出更明显的负面影响，则应进行调整。\n\
    \n执行索引重建的主要好处是，生成的新索引具有连续的页面。当索引高度碎片化时，有时解决碎片问题的最好方法就是简单地重新开始并重建索引。重建索引的另一个好处是可以在重建过程中修改索引选项。最后，对于大多数索引，在重建期间可以保持在线状态。\n\
    \n> **注意**\n>\n> 自 SQL Server 2012 起，包含 `varchar(max)`、`nvarchar(max)`、`varbinary(max)`\
    \ 和 `XML` 数据类型的聚集索引可以在线重建。当聚集索引包含以下数据类型时，仍然无法在线重建：`image`、`ntext` 或 `text`。在线重建仅限于\
    \ SQL Server 企业版、开发版和评估版。此外，在线重建需要索引的两倍空间，因为重建完成需要同时存在索引的旧版本和新版本，这对于大表来说可能是个问题。\n\
    \n重建索引的第一个选项是使用 `CREATE INDEX` 语句，如代码清单 11-24 所示。这是通过 `DROP_EXISTING` 索引选项完成的。选择\
    \ `CREATE INDEX` 选项而不是 `ALTER INDEX` 有几个原因：\n\n*   需要更改索引定义，例如需要添加或删除列，或者需要更改列的顺序。\n\
    *   需要将索引从一个文件组移动到另一个文件组。\n*   需要修改索引分区。\n\n```sql\nCREATE [ UNIQUE ] [ CLUSTERED\
    \ | NONCLUSTERED ] INDEX index_name\nON  ( column [ ASC | DESC ] [ ,...n ] )\n\
    [ INCLUDE ( column_name [ ,...n ] ) ]\n[ WHERE  ]\n[ WITH (  [ ,...n ] ) ]\n[\
    \ ON { partition_scheme_name ( column_name )\n| filegroup_name\n| default\n}\n\
    ]\n[ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | \"NULL\"\
    \ } ]\n[ ; ]\n ::=\nDROP_EXISTING = { ON | OFF }\n| ONLINE = { ON | OFF }\n| RESUMABLE\
    \ = {ON | OF }\n| MAX_DURATION =  [MINUTES]\n```\n代码清单 11-24\n使用 `CREATE INDEX`\
    \ 重建索引\n\n另一个选项是 `ALTER INDEX` 语句，如代码清单 11-25 所示。此选项在语法中使用 `REBUILD` 选项。从概念上讲，这与\
    \ `CREATE INDEX` 语句完成相同的事情，但有以下好处：\n\n*   可以在单条语句中重建表上的多个索引。\n*   可以重建索引的单个分区。\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n{ REBUILD\n[ [PARTITION = ALL]\n\
    [ WITH (  [ ,...n ] ) ]\n| [ PARTITION = partition_number\n[ WITH ( \n[ ,...n\
    \ ] )\n]\n]\n]\n```\n代码清单 11-25\n使用 `ALTER INDEX` 重建索引\n\n索引重建的主要缺点是在重建操作期间索引所需的空间量。数据库中至少应有当前索引大小\
    \ 120% 的可用空间用于重建后的索引。原因是当前索引在重建完成之前不会被删除。在短时间内，索引将在数据库中存在两次。\n\n有两种方法可以减少重建期间索引所需的部分空间。首先，可以使用\
    \ `SORT_IN_TEMPDB` 索引选项来减少中间结果所需的空间量。数据库中仍然需要两个索引副本的空间，但不再需要 20% 的缓冲空间。第二种减少空间需求的方法是在重建之前禁用索引。禁用索引会从索引中删除索引和数据页，同时保留索引元数据。这将允许在索引先前占用的空间内重建索引。请注意，禁用选项仅适用于非聚集索引。\n\
    \n从 SQL Server 2019 开始的一个选项是能够恢复索引构建。在线构建索引时，可以将 `RESUMABLE` 选项设置为 `ON`，并将 `MAX_DURATION`\
    \ 设置为索引构建将运行直到应停止的分钟数。当索引重建停止时，旧索引保持可用，并且重建已完成的部分将被存储，直到重新启动时。此外，如果索引重建在 `RESUMABLE`\
    \ 选项设置为 `ON` 时失败，这将允许重新启动索引重建。如果事务日志空间不足或索引重建被维护或服务重启中断，这可能非常有用。\n\n在发出重建命令之前，务必考虑索引的大小，因为较大的索引需要更多时间和资源来重建。同时确定索引是否自然是写入密集型的，并且无论对其执行多少维护，都注定会严重碎片化。队列、会话数据或中间数据存储表通常会因频繁的写入操作而严重碎片化。如果这些表的大小有限，那么对它们进行重建将带来很少或没有好处。被识别为符合此使用模式的表可以从索引重建过程中排除，从而将维护资源留给其他能从重建操作中受益更多的表。\n\
    \n## 索引重组\n\n索引重建的替代方法是重组索引。这种类型的碎片整理正如其名。索引中的数据页在已分配给索引的页面之间重新排序。重组完成后，索引中页面的物理顺序与页面的逻辑顺序相匹配。当索引碎片不严重时，应重组索引。通常，碎片少于\
    \ 30% 的索引是重组的候选者。与所有最佳实践一样，30% 是一个提供坚实维护起点的指导原则。现实世界的用例将存在需要根据表的类型、使用情况和大小来调整此指导原则的情况。\n\
    \n要重组索引，使用 `ALTER INDEX` 语法（见代码清单 11-26）和 `REORGANIZE` 选项。如果需要，重组选项允许一次重组一个分区。\n\
    \n```sql\nALTER INDEX { index_name | ALL }\nON \n| REORGANIZE\n[ PARTITION =partition_number\
    \ ]\n[ WITH ( LOB_COMPACTION = { ON | OFF } ) ]\n```\n代码清单 11-26\n使用 `ALTER INDEX`\
    \ 进行索引重组\n\n使用 `REORGANIZE` 选项有几个好处。首先，在重组期间，索引保持在线或可供优化器在新执行计划或缓存的执行计划中使用。其次，该过程设计为资源使用最少，这显著降低了在事务期间发生锁定和阻塞问题的机会。\n\
    \n索引重组的缺点是重组只使用已分配给索引的数据页。存在碎片时，分配给一个索引的区段常常与其他索引分配的区段交织在一起。重新排序数据页不会使数据页比当前更连续，但会确保已分配的页面按与数据本身相同的顺序排序。\n"
- fmt: "#### Drop and Create\n\n索引碎片整理的第三种方法是简单地删除索引并重新创建。此选项包含在内以求完整，但请注意它并未被广泛实践或建议。有几个原因可以说明为什么删除并创建索引可能是个坏主意。\n\
    \n如果索引是聚集索引，那么在删除聚集索引时，所有其他索引都将需要重建。聚集索引和堆使用不同的结构来标识行和存储数据。表上的非聚集索引需要记录位置信息，因此需要重新创建以获取此信息。\n\
    \n如果索引是主键或唯一索引，则很可能存在对该索引的其他依赖关系。例如，该索引可能在外部键中被引用。该索引可能与业务规则（如唯一性）相关联，即使在维护窗口中也无法从表中移除。\n\
    \n避免此方法的第三个原因是，它需要了解索引上的所有属性。使用其他策略时，索引会保留所有现有的索引属性。而通过重新创建索引，存在某个属性未在索引的DDL中保留的风险，从而导致索引的重要方面丢失。\n\
    \n索引从该表中删除后，它就无法再被使用。这应该是一个显而易见的问题，但在考虑此选项时常常被忽视。索引的目的通常是它带来的性能提升；将其从表中移除也就带走了这些提升。\n\
    \n### 碎片整理策略\n\n本章至此主要讨论了碎片的产生原因、为何它是个问题以及如何从索引中消除碎片。将这些知识应用到任何给定数据库中的索引上是很重要的。在本节中，将提供两种索引碎片整理的方法。\n\
    \n#### 维护计划\n\n第一个可用的自动化选项是通过维护计划进行碎片整理，这提供了快速创建和安排索引维护的机会，这些维护将对索引进行重组或重建。对于每种索引碎片整理类型，维护计划中都有一个可用的任务。\n\
    \n创建维护计划有几种方式。为简洁起见，将假定用户熟悉SQL Server中的维护计划，因此本节将重点介绍与碎片整理索引相关的具体任务。\n\n#####\
    \ 重组索引任务\n\n第一个可用的任务是重组索引任务。此任务提供了上一节中`ALTER INDEX REORGANIZE`语法的封装。配置后，此任务将重组所有符合任务条件的索引。\n\
    \n使用重组索引任务时，需要配置几个属性（参见图[11-22](#338675_4_En_11_Chapter.xhtml#Fig22)）：\n\n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig22_HTML.png)\n\
    \n重组索引任务的属性窗口截图，包含连接、数据库、对象、选择、索引统计信息选项，以及仅优化具有选定碎片和页数的索引。\n\n图 11-22\n\n重组索引任务的属性窗口\n\
    \n*   `Connection`: 任务执行时将连接到的SQL Server实例。\n*   `Database(s)`: 任务将连接到以进行重组的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重组是针对表、视图，还是表和视图。\n*   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
    *   `Compact large objects`: 确定重组是否使用选项`ALTER INDEX LOB_COMPACTION = ON`。\n* \
    \  `Scan type`: 指示你希望SQL Server如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize\
    \ index only if`: 提供通过碎片百分比、页数以及索引在过去7天内是否被使用来限制重组的能力。\n\n索引统计信息选项在SQL Server\
    \ 2016中引入，是对此功能的一个有益补充。在没有数据库管理员主动管理服务器内索引的环境中，这是确保索引得到维护的一个绝佳选项。\n\n##### 重建索引任务\n\
    \n另一个可用的任务是重建索引任务。这提供了`ALTER INDEX REBUILD`语法的封装。配置后，此任务将重建所有符合任务条件的索引。\n\n与重组索引任务类似，重建索引任务在使用前也需要配置多个属性（参见图[11-23](#338675_4_En_11_Chapter.xhtml#Fig23)）：\n\
    \n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig23_HTML.png)\n\n重建索引任务的属性窗口截图，包含连接、数据库、对象、选择、可用空间选项、高级选项、索引统计信息选项以及仅优化索引选项。\n\
    \n图 11-23\n\n重建索引任务的属性窗口\n\n*   `Connection`: 任务执行时将连接到的SQL Server实例。\n*   `Database(s)`:\
    \ 任务将连接到以进行重建的数据库。此属性的选项有：\n    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n\
    \    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重建是针对表、视图，还是表和视图。\n\
    *   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n*   `Default free space\
    \ per page`: 指定重建是否应使用索引上当前的填充因子。\n*   `Change free space per page to`: 允许重建在索引重建时指定新的填充因子。\n\
    *   `Sort results in tempdb`: 确定重建是否使用选项`ALTER INDEX SORT_IN_TEMPDB = ON`。\n*\
    \   `MAXDOP`: 确定重建的最大并行度，这决定了SQL Server可用于重建索引的最大CPU线程数。\n*   `Keep index online\
    \ while re-indexing`: 确定重建是否使用选项`ALTER INDEX ONLINE = ON`。对于无法在线重建的索引，有一个选项可确定是跳过索引还是脱机重建索引。此外，你可以设置“低优先级使用”，以确定阻塞是否会取消索引重建，以及它是自行取消还是取消阻塞者，以及在多长时间后取消。\n\
    *   `Scan type`: 指示你希望SQL Server如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize\
    \ index only if`: 提供通过碎片百分比、页数以及索引在过去7天内是否被使用来限制重建的能力。\n\n与重组任务一样，索引统计信息选项是在SQL\
    \ Server 2016中添加的。类似地，这些更改使重建任务成为没有专用数据库管理资源的环境，或需要保持索引维护简单并避免使用自定义代码来管理此过程的环境的可行选择。"
  raw: "#### Drop and Create\n\nThe third way to defragment an index is to simply\
    \ drop the index and recreate it. This option is included for completeness, but\
    \ note that it is not widely practiced or advised. There are a few reasons that\
    \ illustrate why dropping and creating an index can be a bad idea.\n\nIf the index\
    \ is a clustered index, then all other indexes will need to be rebuilt when the\
    \ clustered index is dropped. Clustered indexes and heaps use different structures\
    \ for identifying rows and storing data. The non-clustered indexes on the table\
    \ will need information on where the record is and will need to be recreated to\
    \ obtain this information.\n\nIf the index is a primary key or unique, there are\
    \ likely other dependencies on the index. For instance, the index may be referenced\
    \ in a foreign key. The index could be tied to a business rule, such as uniqueness,\
    \ that cannot be removed from the table, even in a maintenance window.\n\nThe\
    \ third reason to avoid this method is that it requires knowledge of all properties\
    \ on an index. With the other strategies, the index retains all the existing index\
    \ properties. By having to recreate the index, there is a risk that a property\
    \ may not be retained in the DDL for the index and important aspects of an index\
    \ could be lost.\n\nAfter an index is dropped from that table, it cannot be used.\
    \ This should be an obvious issue, but it is often overlooked when considering\
    \ this option. The purpose of an index is usually the performance improvements\
    \ that it brings; removing it from the table takes those improvements along with\
    \ it.\n\n### Defragmentation Strategies\n\nThis chapter has thus far been about\
    \ how fragmentation occurs, why it is an issue, and how it can be removed from\
    \ indexes. It is important to apply this knowledge to the indexes in any given\
    \ database. In this section, two methods for defragmentation of indexes will be\
    \ provided.\n\n#### Maintenance Plans\n\nThe first automation option available\
    \ is defragmentation through maintenance plans, which offer the opportunity to\
    \ quickly create and schedule maintenance for indexes that will either be reorganized\
    \ or rebuilt. For each of the types of index defragmentation, there is a task\
    \ available in the maintenance plans.\n\nThere are a couple of ways in which maintenance\
    \ plans can be created. For the purposes of brevity, it will be assumed that the\
    \ user is familiar with maintenance plans in SQL Server, and thus this section\
    \ will focus on the specific tasks related to defragmenting indexes.\n\n#####\
    \ Reorganize Index Task\n\nThe first task available is the Reorganize Index Task.\
    \ This task provides a wrapper for the `ALTER INDEX REORGANIZE` syntax from the\
    \ previous section. Once configured, this task will reorganize all indexes that\
    \ match the criteria for the task.\n\nThere are a few properties that need to\
    \ be configured when using the Reorganize Index Task (see Figure [11-22](#338675_4_En_11_Chapter.xhtml#Fig22)):\n\
    \n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig22_HTML.png)\n\nA screenshot\
    \ of the properties window of reorganized index task with connection, database,\
    \ object, selection, index statistics options, and optimized index only with the\
    \ selected fragmentation and page count.\n\nFigure 11-22\n\nProperties window\
    \ for Reorganize Index Task\n\n*   *Connection*: The SQL Server instance the task\
    \ will connect to when it executes.\n\n*   *Database(s)*: The databases the task\
    \ will connect to for reorganizing. The options for this property are\n    * \
    \  All databases.\n\n    *   All system databases.\n\n    *   All user databases.\n\
    \n    *   These specific databases (a list of available databases is included,\
    \ and one must be selected).\n\n    *   Ignore databases where the state is not\
    \ online.\n\n*   *Object*: Determines whether the reorganization will be against\
    \ tables, views, or tables and views.\n\n*   *Selection*: Specifies the tables\
    \ or indexes affected by this task. This is not available when Tables and Views\
    \ is selected in the Object box.\n\n*   *Compact large objects*: Determines whether\
    \ the reorganization uses the option `ALTER INDEX LOB_COMPACTION = ON`.\n\n* \
    \  *Scan type*: Indicates how you want SQL Server to gather the statistics for\
    \ the remaining options. The available options are Fast, Sampled, or Detailed.\n\
    \n*   *Optimize index only if*: Provides ability to limit reorganization by percent\
    \ fragmentation, page count, and whether the index was used in the last 7 days.\n\
    \nThe index stats options were introduced in SQL Server 2016 and are a helpful\
    \ addition to this feature. In environments that do not have database administrators\
    \ actively managing the indexes within a server, this is a great option for ensuring\
    \ indexes are being maintained.\n\n##### Rebuild Index Task\n\nThe other task\
    \ available is the Rebuild Index Task. This provides a wrapper for the `ALTER\
    \ INDEX REBUILD` syntax. Once configured, this task rebuilds all indexes that\
    \ match the criteria for the task.\n\nSimilar to the Reorganize Index Task, the\
    \ Rebuild Index Task has a number of properties that need to be configured before\
    \ using it (see Figure [11-23](#338675_4_En_11_Chapter.xhtml#Fig23)):\n\n![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig23_HTML.png)\n\
    \nA screenshot of the properties window of rebuild index task with connection,\
    \ database, object, selection, free space options, advanced options, index statistics\
    \ options, and optimize index only if options.\n\nFigure 11-23\n\nProperties window\
    \ for Rebuild Index Task\n\n*   *Connection*: The SQL Server instance the task\
    \ will connect to when it executes.\n\n*   *Database(s)*: The databases the task\
    \ will connect to for rebuilding. The options for this property are\n    *   All\
    \ databases.\n\n    *   All system databases.\n\n    *   All user databases.\n\
    \n    *   These specific databases (a list of available databases is included,\
    \ and one must be selected).\n\n    *   Ignore databases where the state is not\
    \ online.\n\n*   *Object*: Determines whether the rebuild will be against tables,\
    \ views, or tables and views.\n\n*   *Selection*: Specifies the tables or indexes\
    \ affected by this task. This is not available when Tables and Views is selected\
    \ in the Object box.\n\n*   *Default free space per page*: Specifies whether the\
    \ rebuild should use the current fill factor on the index.\n\n*   *Change free\
    \ space per page to*: Allows the rebuild to specify a new fill factor when the\
    \ index is rebuilt.\n\n*   *Sort results in tempdb*: Determines whether the rebuild\
    \ uses the option `ALTER INDEX SORT_IN_TEMPDB = ON`.\n\n*   *MAXDOP*: Determines\
    \ the max degree of parallelism for the rebuild, which determines the max number\
    \ of CPU threads SQL Server can use to rebuild the index.\n\n*   *Keep index online\
    \ while re-indexing*: Determines whether the rebuild uses the option `ALTER INDEX\
    \ ONLINE = ON`. For indexes that cannot be rebuilt online, there is an option\
    \ to determine whether to skip or rebuild the index offline. Along with that,\
    \ you can set Low Priority Used to determine if blocking will cancel an index\
    \ rebuild and whether it cancels itself or blockers and after how much time.\n\
    \n*   *Scan type*: Indicates how you want SQL Server to gather the statistics\
    \ for the remaining options. The available options are Fast, Sampled, or Detailed.\n\
    \n*   *Optimize index only if*: Provides ability to limit rebuild by percent fragmentation,\
    \ page count, and whether the index was used in the last 7 days.\n\nLike the reorganization\
    \ task, the index stats options were added in SQL Server 2016\\. In similar fashion,\
    \ these changes make the rebuild task a viable option for environments that do\
    \ not have dedicated database administration resources or where there is a need\
    \ to keep index maintenance simple and avoid custom code to manage the process."
  trans: "#### 删除并重新创建\n\n索引碎片整理的第三种方法是简单地删除索引并重新创建。包含此选项是为了保证完整性，但请注意它并未被广泛实践或推荐。有几个原因可以说明为什么删除并创建索引可能是个坏主意。\n\
    \n如果索引是聚集索引，那么在删除聚集索引时，所有其他索引都将需要重建。聚集索引和堆使用不同的结构来标识行和存储数据。表上的非聚集索引需要记录位置信息，因此需要重新创建以获取此信息。\n\
    \n如果索引是主键或唯一索引，则很可能存在对该索引的其他依赖关系。例如，该索引可能被外键引用。该索引可能与业务规则（如唯一性）相关联，即使在维护窗口中也无法从表中移除。\n\
    \n避免此方法的第三个原因是，它需要了解索引上的所有属性。使用其他策略时，索引会保留所有现有的索引属性。而通过重新创建索引，存在某个属性未在索引的 DDL\
    \ 中保留的风险，从而导致索引的重要方面丢失。\n\n索引从该表中删除后，它就无法再被使用。这应该是一个显而易见的问题，但在考虑此选项时常常被忽视。索引的目的通常是它带来的性能提升；将其从表中移除也就带走了这些提升。\n\
    \n### 碎片整理策略\n\n本章至此主要讨论了碎片的产生原因、为何它是个问题以及如何从索引中消除碎片。将这些知识应用到任何给定数据库中的索引上是很重要的。在本节中，将提供两种索引碎片整理的方法。\n\
    \n#### 维护计划\n\n第一个可用的自动化选项是通过维护计划进行碎片整理，这提供了快速创建和安排索引维护的机会，这些维护将对索引进行重组或重建。对于每种索引碎片整理类型，维护计划中都有一个可用的任务。\n\
    \n创建维护计划有几种方式。为简洁起见，将假定用户熟悉 SQL Server 中的维护计划，因此本节将重点介绍与碎片整理索引相关的具体任务。\n\n#####\
    \ 重组索引任务\n\n第一个可用的任务是重组索引任务。此任务提供了上一节中 `ALTER INDEX REORGANIZE` 语法的封装。配置后，此任务将重组所有符合任务条件的索引。\n\
    \n使用重组索引任务时，需要配置几个属性（参见图 11-22）：\n\n![](img/338675_4_En_11_Fig22_HTML.png)\n\n\
    重组索引任务的属性窗口截图，包含连接、数据库、对象、选择、索引统计信息选项，以及仅优化具有选定碎片和页数的索引。\n\n图 11-22\n\n重组索引任务的属性窗口\n\
    \n*   `Connection`: 任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`: 任务将连接到以进行重组的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重组是针对表、视图，还是表和视图。\n*   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
    *   `Compact large objects`: 确定重组是否使用选项 `ALTER INDEX LOB_COMPACTION = ON`。\n*\
    \   `Scan type`: 指示你希望 SQL Server 如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize\
    \ index only if`: 提供通过碎片百分比、页数以及索引在过去 7 天内是否被使用来限制重组的能力。\n\n索引统计信息选项在 SQL Server\
    \ 2016 中引入，是对此功能的一个有益补充。在没有数据库管理员主动管理服务器内索引的环境中，这是确保索引得到维护的一个绝佳选项。\n\n##### 重建索引任务\n\
    \n另一个可用的任务是重建索引任务。这提供了 `ALTER INDEX REBUILD` 语法的封装。配置后，此任务将重建所有符合任务条件的索引。\n\n\
    与重组索引任务类似，重建索引任务在使用前也需要配置多个属性（参见图 11-23）：\n\n![](img/338675_4_En_11_Fig23_HTML.png)\n\
    \n重建索引任务的属性窗口截图，包含连接、数据库、对象、选择、可用空间选项、高级选项、索引统计信息选项以及仅优化索引选项。\n\n图 11-23\n\n重建索引任务的属性窗口\n\
    \n*   `Connection`: 任务执行时将连接到的 SQL Server 实例。\n*   `Database(s)`: 任务将连接到以进行重建的数据库。此属性的选项有：\n\
    \    *   所有数据库。\n    *   所有系统数据库。\n    *   所有用户数据库。\n    *   这些特定数据库（包含可用数据库列表，必须选择一个）。\n\
    \    *   忽略状态不是联机的数据库。\n*   `Object`: 确定重建是针对表、视图，还是表和视图。\n*   `Selection`: 指定此任务影响的表或索引。当在“对象”框中选择“表和视图”时，此选项不可用。\n\
    *   `Default free space per page`: 指定重建是否应使用索引上当前的填充因子。\n*   `Change free space\
    \ per page to`: 允许重建在索引重建时指定新的填充因子。\n*   `Sort results in tempdb`: 确定重建是否使用选项\
    \ `ALTER INDEX SORT_IN_TEMPDB = ON`。\n*   `MAXDOP`: 确定重建的最大并行度，这决定了 SQL Server\
    \ 可用于重建索引的最大 CPU 线程数。\n*   `Keep index online while re-indexing`: 确定重建是否使用选项 `ALTER\
    \ INDEX ONLINE = ON`。对于无法在线重建的索引，有一个选项可确定是跳过索引还是脱机重建索引。此外，你可以设置“低优先级使用”，以确定阻塞是否会取消索引重建，以及它是自行取消还是取消阻塞者，以及在多长时间后取消。\n\
    *   `Scan type`: 指示你希望 SQL Server 如何收集剩余选项的统计信息。可用选项为“快速”、“采样”或“详细”。\n*   `Optimize\
    \ index only if`: 提供通过碎片百分比、页数以及索引在过去 7 天内是否被使用来限制重建的能力。\n\n与重组任务一样，索引统计信息选项是在\
    \ SQL Server 2016 中添加的。类似地，这些更改使重建任务成为没有专用数据库管理资源的环境，或需要保持索引维护简单并避免使用自定义代码来管理此过程的环境的可行选择。"
- fmt: '## Maintenance Plan Summary


    Maintenance plans offer a way to get started with removing fragmentation from
    indexes right away. The tasks can be configured and scheduled in a matter of minutes.
    Since the addition of enhancements in SQL Server 2016, these are a great choice
    for managing index maintenance. The primary reason to use other options, such
    as T-SQL scripts, is when additional functionality is needed, such as custom logging
    or logic for resuming operations.


    ### T-SQL Scripts


    An alternative approach to defragmenting databases is to use a T-SQL script to
    defragment the indexes intelligently. In this section, the steps necessary to
    defragment all the indexes in a single database will be walked through. The main
    advantage of this choice is the ability to keep everything in a single, refined
    process. The script will pick the indexes that will best benefit from defragmentation,
    determine whether to rebuild or reorganize, and ignore those that would receive
    little or no benefit. In addition, it allows for customizing maintenance based
    on business rules or other logic that is out of scope for maintenance plans.


    To accomplish the filtering, some defragmentation best practices will be applied
    that help determine whether to defragment the index and what method should be
    applied. The guidelines that will be used are the following:


    *   Reorganize indexes with less than 30 percent fragmentation.

    *   Rebuild indexes with 30 percent or more fragmentation.

    *   Ignore indexes that have less than 1,000 pages.

    *   If using Enterprise Edition, use online rebuilds when the data needs to be
    accessible during maintenance.

    *   If the clustered index is being rebuilt, rebuild all indexes in the table.


    **Note** Just because an index is fragmented does not mean that it should always
    be defragmented. When dealing with indexes for small tables, there isn’t a lot
    of benefit in defragmenting the index. For instance, an index having fewer than
    eight pages will fit into one extent, and thus there is no benefit in terms of
    reduced I/O from defragmenting that index. Some Microsoft documentation and SQL
    Server experts recommend not defragmenting tables with fewer than 1,000 pages.
    Whether that value is appropriate for your database is dependent on your database,
    but it is a starting point for building index maintenance strategies.


    There are a few steps that a defragmentation script will perform to intelligently
    defragment the indexes:


    1.  Collect fragmentation data.

    2.  Determine what indexes to defragment.

    3.  Build the defragmentation statement.


    Before starting on the fragmentation steps, a template is needed for the index
    maintenance script. The template, shown in Listing [11-27](#338675_4_En_11_Chapter.xhtml#PC27),
    declares several variables and utilizes a `CURSOR` to loop through each of the
    indexes and perform the necessary index maintenance. The variables are set at
    the `DECLARE` statement with the thresholds defined at the start of this section.
    Also in the template is a `table` variable that is used to store intermediate
    results on the state of fragmentation in the database.


    ```sql

    DECLARE @MaxFragmentation TINYINT=30

    ,@MinimumPages SMALLINT=1000

    ,@SQL nvarchar(max)

    ,@ObjectName NVARCHAR(300)

    ,@IndexName NVARCHAR(300)

    ,@CurrentFragmentation DECIMAL(9, 6)

    DECLARE @FragmentationState TABLE

    (

    SchemaName SYSNAME

    ,TableName SYSNAME

    ,object_id INT

    ,IndexName SYSNAME

    ,index_id INT

    ,page_count BIGINT

    ,avg_fragmentation_in_percent FLOAT

    ,avg_page_space_used_in_percent FLOAT

    ,type_desc VARCHAR(255)

    )

    INSERT INTO @FragmentationState


    DECLARE INDEX_CURSE CURSOR LOCAL FAST_FORWARD FOR


    OPEN INDEX_CURSE

    WHILE 1=1

    BEGIN

    FETCH NEXT FROM INDEX_CURSE INTO @ObjectName, @IndexName

    ,@CurrentFragmentation

    IF @@FETCH_STATUS  0

    BREAK


    EXEC sp_ExecuteSQL @SQL

    END

    CLOSE INDEX_CURSE

    DEALLOCATE INDEX_CURSE

    ```


    Listing 11-27 Index Defragmentation Script Template


    To get started, fragmentation data needs to be collected about the indexes and
    populated into the `table` variable. In the script in Listing [11-28](#338675_4_En_11_Chapter.xhtml#PC28),
    the DMF `sys.dm_db_index_physical_stats` is used with the `SAMPLED` option. This
    option is used to minimize the impact that executing the DMF will have on the
    database. Included in the results are the schema, table, and index names to identify
    the index that is being reported on, along with the `object_id` and `index_id`.
    Statistical columns on the index fragmentation from the DMF are included in the
    columns `page_count`, `avg_fragmentation_in_percent`, and `avg_page_space_used_in_percent`.
    The last column in the results is `has_LOB_column`. This column is the result
    of a correlated subquery that determines whether any of the columns in the index
    are LOB types, which disallow online index rebuilds.


    ```sql

    SELECT

    s.name as SchemaName

    ,t.name as TableName

    ,t.object_id

    ,we.name as IndexName

    ,we.index_id

    ,x.page_count

    ,x.avg_fragmentation_in_percent

    ,x.avg_page_space_used_in_percent

    ,we.type_desc

    FROM sys.dm_db_index_physical_stats(db_id(), NULL, NULL, NULL, ''SAMPLED'') x

    INNER JOIN sys.tables t ON x.object_id = t.object_id

    INNER JOIN sys.schemas s ON t.schema_id = s.schema_id

    INNER JOIN sys.indexes we ON x.object_id = we.object_id AND x.index_id = we.index_id

    WHERE x.index_id > 0

    AND x.avg_fragmentation_in_percent > 0

    AND alloc_unit_type_desc = ''IN_ROW_DATA''

    ```


    Listing 11-28 Script to Collect Fragmentation Data


    The results of the query in Listing [11-28](#338675_4_En_11_Chapter.xhtml#PC28)
    will vary for every reader. In general, the results should be similar to those
    in Figure [11-24](#338675_4_En_11_Chapter.xhtml#Fig24), which include clustered,
    non-clustered, and XML indexes from the `AdventureWorks2017` database.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig24_HTML.png)


    A table has 9 columns and 5 rows. The column headers are scheme name, table name,
    the object i d, index name, index id, page count, average fragmentation in percent,
    average page space used in percent, and type descending. It includes both clustered
    and non-clustered indexes.


    Figure 11-24 Query results for table fragmentation data


    The next step in the defragmentation script is to build the list of indexes that
    need to be defragmented. The list of indexes, created through Listing [11-29](#338675_4_En_11_Chapter.xhtml#PC29),
    is used to populate the cursor. The cursor then loops through each of the indexes
    to perform the defragmentation. One point of interest in the script is that for
    clustered indexes, all underlying indexes will be rebuilt. This is not a requirement
    when defragmenting indexes, but it is an option that should be considered. When
    there are only a few indexes on a table, this may be a worthwhile way to manage
    them. As the count of indexes increases, this may become less appealing. The results
    from this query should look similar to those in Figure [11-25](#338675_4_En_11_Chapter.xhtml#Fig25).


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig25_HTML.png)


    A table has three columns. The headers are no column name, no column name, and
    average fragmentation in percent. The human resource employee pay history is highlighted.


    Figure 11-25 Indexes for rebuild/reorganize operations


    ```sql

    SELECT  QUOTENAME(x.SchemaName)+''.''+QUOTENAME(x.TableName)

    ,CASE WHEN x.type_desc = ''CLUSTERED'' THEN ''ALL''

    ELSE QUOTENAME(x.IndexName) END

    ,x.avg_fragmentation_in_percent

    FROM    @FragmentationState x

    LEFT OUTER JOIN @FragmentationState y ON x.object_id = y.object_id AND y.index_id
    = 1

    WHERE   (

    x.type_desc = ''CLUSTERED''

    AND y.type_desc = ''CLUSTERED''

    )

    OR y.index_id IS NULL

    ORDER BY x.object_id

    ,x.index_id

    ```


    Listing 11-29 Script to Identify Fragmented Indexes'
