    Using the DTA utility is easy. Two scenarios for using this tool will be provided
    that result in different outcomes. In the first scenario, the DTA utility will
    be used to recommend indexing improvements by allowing only non-clustered indexing
    changes. For the second scenario, the DTA utility will be configured to recommend
    any change to indexing that would improve workload performance. In both scenarios,
    the SQL Server plan cache will be used as the workload source. To populate the
    plan cache, execute the script in Listing [12-7](#338675_4_En_12_Chapter.xhtml#PC7).


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.SalesOrderDetail'') IS NOT NULL

    DROP TABLE dbo.SalesOrderDetail;

    SELECT SalesOrderID, SalesOrderDetailID, CarrierTrackingNumber, OrderQty, ProductID,
    SpecialOfferID, UnitPrice, UnitPriceDiscount, LineTotal, rowguid, ModifiedDate

    INTO dbo.SalesOrderDetail

    FROM Sales.SalesOrderDetail;

    CREATE CLUSTERED INDEX CL_SalesOrderDetail ON dbo.SalesOrderDetail(SalesOrderDetailID);

    CREATE NONCLUSTERED INDEX IX_SalesOrderDetail ON dbo.SalesOrderDetail(SalesOrderID);

    GO

    SELECT SalesOrderID, CarrierTrackingNumber

    INTO #temp

    FROM dbo.SalesOrderDetail

    WHERE SalesOrderID = 43660;

    DROP TABLE #temp;

    GO 1000

    SELECT SalesOrderID, OrderQty

    INTO #temp

    FROM dbo.SalesOrderDetail

    WHERE SalesOrderID = 43661;

    DROP TABLE #temp;

    GO 1000

    Listing 12-7

    Scenario Setup

    ```


