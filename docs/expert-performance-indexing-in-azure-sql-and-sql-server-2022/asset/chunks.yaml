  trans: '

    ## JSON 索引


    SQL Server 2016 引入了在 SQL Server 中处理 JSON（JavaScript 对象表示法）数据的能力。JSON 定义了结构化数据的方法，便于应用程序和人员读写。由于其易用性，它在应用程序开发中变得非常流行。


    与 XML 中使用的标签和属性不同，JSON 利用括号、冒号和引号来定义实体-属性关系。例如，清单 13-33 包含一个 XML 文档，定义了 WideWorldImporters
    一名员工的额外信息。相同信息用 JSON 表示则显示在清单 13-34 中。两者比较，JSON 比相同数据表示的 XML 容易阅读和理解得多。


    ```

    {

    "OtherLanguages": ["Polish","Chinese","Japanese"] ,

    "HireDate":"2008-04-19T00:00:00",

    "Title":"Team Member",

    "PrimarySalesTerritory":"Plains",

    "CommissionRate":"0.98"

    }

    清单 13-34

    JSON 示例

    ```


    ```

    Polish

    Chines

    Japanese


    2008-04-19T00:00:00

    Team Member

    Plains

    0.98


    清单 13-33

    XML 示例

    ```


    虽然 SQL Server 可以处理 JSON 数据，但 Microsoft 实现 JSON 的方式与 XML 和空间数据的实现方式略有不同。JSON 数据没有专用的数据类型，而是存储在定义为
    `varchar(max)` 或 `nvarchar(max)` 数据类型的列中。然后可以使用函数 `JSON_VALUE` 或 `JSON_QUERY`
    检索数据中的信息。这种实现方式的优势在于，没有与 JSON 数据关联的特殊索引类型，这就是为什么没有专门章节讨论 JSON 索引。相反，JSON 数据通过利用持久化到索引中的计算列，利用了现有的索引功能。


    在深入探讨如何索引 JSON 数据之前，将展示一个示例，说明 JSON 函数的工作原理及其对性能的影响。首先，从 WideWorldImporters 中的
    `Application.People` 创建表 `dbo.People`，如清单 13-35 所提供。在该表中，将包含一个用于 `HireDate` 的列，该列从
    `CustomFields` 中的 JSON 文档检索 `HireDate`。


    ```

    USE WideWorldImporters;

    GO

    DROP TABLE IF EXISTS dbo.People;

    CREATE TABLE [dbo].[People]

    (

    [PersonID] [INT] NOT NULL,

    [FullName] NVARCHAR NOT NULL,

    [CustomFields] NVARCHAR NULL,

    [HireDate] AS JSON_VALUE([CustomFields], N''$.HireDate''),

    [Junk] VARCHAR NULL,

    CONSTRAINT [PK_People]

    PRIMARY KEY CLUSTERED ([PersonID])

    );

    GO

    INSERT INTO dbo.People

    (

    PersonID,

    FullName,

    CustomFields,

    Junk

    )

    SELECT PersonID,

    FullName,

    CustomFields,

    REPLICATE(''x'', 4000) AS Junk

    FROM Application.People;

    GO

    清单 13-35

    JSON 示例设置

    ```


    当使用清单 13-36 中的代码查询 `dbo.People` 时，将使用计算列从 JSON 数据中返回所需的结果。不幸的是，为了检索这些结果，SQL Server
    需要扫描聚集索引，如图 13-50 所示。此扫描的影响是访问了表中的所有 1,111 行，图 13-49 中的统计输出表明了这一点，并导致查询发生 762
    次读取。


    ![](img/338675_4_En_13_Fig50_HTML.png)

    一个面板，其中打开了执行计划选项卡，显示了查询 1 的两行文本，其成本占批处理的 100%。下方是一个流程图，展示了从聚集索引扫描（聚集，people，成本
    100%）到选择（成本 0%）的连接。

    图 13-50

    计算 JSON 列的执行计划


    ![](img/338675_4_En_13_Fig49_HTML.png)

    一个面板，其中打开了消息选项卡，显示了一行条目，内容为 `table ''people''，扫描计数 1，逻辑读取 742，物理读取 0，页面服务器读取 0，预读读取
    0，页面服务器预读读取 0`，位于“19 行受影响”标签下方和“1 行受影响”标签上方。

    图 13-49

    计算 JSON 列的统计 I/O 结果


    ```

    USE WideWorldImporters;

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL;

    清单 13-36

    查询计算 JSON 列

    ```


    为了减轻计算 JSON 列的性能影响，可以向计算列添加索引，如清单 13-37 所示，然后再次对 `dbo.People` 执行查询。这次性能大大改善。不是
    762 次读取，图 13-51 显示只有 3 次读取。此外，图 13-52 中的执行计划表明使用了在添加的索引上进行的索引查找。


    ```

    USE WideWorldImporters;

    GO

    CREATE INDEX IX_People_HireDate ON dbo.People (HireDate);

    GO

    SET STATISTICS IO ON;

    SELECT PersonID,

    HireDate

    FROM dbo.People

    WHERE HireDate IS NOT NULL

    清单 13-37

    索引并查询 JSON 计算列

    ```


    ![](img/338675_4_En_13_Fig52_HTML.png)

    一个面板，其中打开了执行计划选项卡，显示了查询 1 的两行文本，其成本占批处理的 100%。下方是一个流程图，展示了从聚集索引查找（非聚集，people，成本
    100%）到选择（成本 0%）的连接。

    图 13-52

    计算并索引后的 JSON 列的执行计划


    ![](img/338675_4_En_13_Fig51_HTML.png)

    一个面板，其中打开了消息选项卡，显示了一行条目，内容为 `table ''people''，扫描计数 1，逻辑读取 3，物理读取 1，页面服务器读取 0，预读读取
    1，页面服务器预读读取 0`，位于“19 行受影响”标签下方和“1 行受影响”标签上方。

    图 13-51

    计算并索引后的 JSON 列的统计 I/O 结果


    通过利用计算列，可以轻松高效地访问表中的 JSON 数据。无需学习新的索引技术来获得这种效率，而是可以利用现有功能。这使得采用和支持 JSON 以及高效查询
    JSON 数据变得更加容易。


    ## 索引存储策略


    到目前为止，本章的策略主要侧重于通过索引的键列和非键列设计来提高使用索引的查询性能。在索引设计中，还可以考虑与列选择结合使用的其他选项。这些替代策略都与数据库中索引的存储方式有关。


    有两种选项可用于处理索引如何存储其数据。这两种选项的基本前提是，索引越小，包含的页就越少，查询数据时所需的读写操作也就越少。第一个可用选项是行压缩，第二个是页压缩。这两个选项都有可能显著节省存储空间并提高性能。


    注意

    在 SQL Server 2016 SP1 之前，行和页压缩的使用仅限于 SQL Server 企业版，之后它对所有 SQL Server 版本都可用。

