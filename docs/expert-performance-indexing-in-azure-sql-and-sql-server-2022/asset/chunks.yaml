- fmt: '# 第6章 选择性 XML 索引


    An X M L query page query cost 100%. The selective X M L index at cost of 8% requested,
    returns a set of data. Cached plan size is 32 kilobytes. Estimated operator cost
    is 0\. The degree of parallelism is 1. Estimated subtree cost is 0.0933749\. Estimated
    number of rows is 172.8.


    **图 6-7**

    XML query cost with the selective XML index


    While this provides a much improved opportunity for XML indexing, there is an
    important restriction that should be considered. If queries evolve over time to
    the point where the selective XML index doesn’t cover them, then performance will
    degrade. This differs from typical clustered and non-clustered indexes that index
    the entire contents of each value within a column, rather than a selective portion
    of each value.


    To demonstrate this scenario, another XML element will be added to the query to
    filter on `BusinessType`. `Exist()` will be added to the `WHERE` clause, as shown
    in **清单 [6-7](#338675_4_En_6_Chapter.xhtml#PC7)**， while also dropping the previously
    created primary/secondary XML indexes to prevent them from interfering with the
    output. Generally speaking, when selective XML indexes are used, primary/secondary
    XML indexes would not also be used.


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [SXML_Store_Demographics] ON [Sales].[Store];

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store];

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1

    AND Demographics.exist(''/StoreSurvey/BusinessType[.="OS"]'') = 1

    ```


    **清单 6-7**

    Query on `[Sales].[Store]` for `AnnualSales` and `BusinessType`


    After running the code in **清单 [6-7](#338675_4_En_6_Chapter.xhtml#PC7)**， it can
    be seen that the performance of the query has degraded substantially. The reason
    for this is the inclusion of the `XML Reader` with `XPath` filter, which increases
    the estimated subtree cost, as shown in **图 [6-9](#338675_4_En_6_Chapter.xhtml#Fig9)**.
    This does not perform as poorly as the initial execution of this query, because
    the selective XML index is still assisting with reducing the number of records
    where the entire XML document needs to be scanned with the function. But it is
    a degradation, and with large tables, this could cause a significant performance
    challenge.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig9_HTML.jpg)


    An X M L query page query cost 100%. The selective X M L index at cost of 7% requested,
    returns a set of data. Cached plan size is 40 kilobytes. Estimated operator cost
    is 0\. The degree of parallelism is 1. Estimated subtree cost is 00.108878\. Estimated
    number of rows is 57.1892\. A statement with a website link is attached.


    **图 6-9**

    XML query cost with the selective XML index and XML element not included


    Fortunately, selective XML indexes provide flexibility to tune for issues such
    as this one. Specifically, the `FOR` clause, shown in **清单 [6-8](#338675_4_En_6_Chapter.xhtml#PC8)**，
    can be extended to include multiple XML nodes and paths. In this scenario, `BusinessType`
    is added to the index. As expected, and shown in **图 [6-10](#338675_4_En_6_Chapter.xhtml#Fig10)**，
    the change in the index improves the performance of the query by dropping the
    estimated subtree cost to 0.108\. This is the direct result of the addition of
    a second clustered index scan operation on the selective XML index.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig10_HTML.jpg)


    An X M L query page query cost 100%. The selective X M L index at cost of 0% requested,
    returns a set of data. Cached plan size is 40 kilobytes. Estimated operator cost
    is 0\. The degree of parallelism is 1. Estimated subtree cost is 3.56432\. Estimated
    number of rows is 172.8\. A statement with a webpage link is attached.


    **图 6-10**

    XML query cost with the selective XML index on two elements


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [SEL_XML_Store_Demographics_AnnualSales] ON [Sales].[Store];

    CREATE SELECTIVE XML INDEX [SEL_XML_Store_Demographics_AnnualSalesBusinessType]

    ON [Sales].[Store] (Demographics)

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    FOR (AnnualSales = ''/StoreSurvey/AnnualSales'',

    BusinessType = ''/StoreSurvey/BusinessType'');

    ```


    **清单 6-8**

    Script for Creating a Selective XML Index


    Again, storage impact of extending the index will be reviewed by running the script
    in **清单 [6-4](#338675_4_En_6_Chapter.xhtml#PC4)**. **图 [6-11](#338675_4_En_6_Chapter.xhtml#Fig11)**
    shows that even by increasing the number of elements in the index, the storage
    footprint of the index has not been changed significantly. It’s 701 records across
    6, instead of 5, pages.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig11_HTML.png)


    A database table of 4 rows and 8 columns. The column headers are `name`, `index
    I D`, `index level`, `index type descending order`, `fragment count`, `average
    page space used in percent`, `record count`, and `page count`. 2 selective X M
    L indexes are present in the row.


    **图 6-11**

    Physical stats after creating the selective XML index on two elements


    While selective XML indexes are a more complex way to optimize reads against XML
    documents, the learning curve to get started is not significant. Selective XML
    indexes support more sophisticated XQuery than the examples provided in this chapter,
    allowing for more precision in exactly which segments of an XML document will
    be indexed.


    ## Summary


    This chapter covered the need to be able to search and index the unstructured
    and semistructured data that can be stored within SQL Server. XML indexes provide
    developers and database administrators with the options to improve the performance
    of searches through XML documents. This benefits queries both by filtering data
    and by retrieving it for display. Selective XML indexes offer the opportunity
    to get a more granular and detailed approach to XML indexing. XML indexes can
    require nontrivial amounts of storage; therefore, the space needed to accommodate
    them should be planned up front accordingly.


    # 7. 空间索引


    Spatial data types advance the storage capabilities of SQL Server, allowing data
    that defines shape and location information. Before these enhancements, spatial
    data was often stored as string or numeric values without implicit meaning within
    the database. This required cumbersome conversions and calculations to resolve
    the information into meaningful insights.


    As part of spatial data support, SQL Server introduced the `GEOMETRY` and `GEOGRAPHY`
    data types. These types support planar and geodetic data, respectively. Planar
    data includes lines, points, and polygons on a 2D plane, while geodetic data includes
    similar data, but defined on a geodetic ellipsoid. Geodetic data describes data
    points that are identified on a map of Earth. These two data types can be described
    like this: `GEOMETRY` is a flat representation of the shape described, and `GEOGRAPHY`
    encompasses a rounded global representation.


    Spatial data indexes are unique in how they are created and interpreted. Each
    index is composed of a set of grids. These grids consist of a set of cells, laid
    out similarly to a square spreadsheet. The grids can be up to 16 × 16 and as small
    as 4 × 4\. The cells within the grid contain the values that define the objects
    that define the spatial data being stored. There is a distinct difference between
    the `GEOGRAPHY` and `GEOMETRY` data types in this type of indexing. The `GEOMETRY`
    data type requires a bounding box, which is a limit on the size of the area defined
    by the index. The `GEOGRAPHY` data type does not have a bounding box since it’s
    bound by the size of the planet.


    This chapter will explore spatial indexes, their behaviors, and their use within
    queries to enhance the performance of spatial data.'
