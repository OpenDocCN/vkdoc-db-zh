    SET STATISTICS IO OFF

    SELECT *

    FROM sys.column_store_row_groups

    WHERE object_id = OBJECT_ID(''dbo.FactOnlineSalesCI'')

    ORDER BY row_group_id DESC

    Listing 11-19

    Impact of Inserts on a Columnstore Table

    ```


    The next type of fragmentation that occurs with columnstore indexes is through
    delete operations. While this is called *fragmentation*, when deletes occur on
    columnstore indexes, the rows are not removed from the indexes. Instead, they
    are flagged as deleted and continue to consume space within rowgroups. Because
    of this, pages allocated to a clustered columnstore index that have all their
    records deleted will still be active within the index.


    To illustrate the impact of soft-deleted rows in a columnstore index, the script
    in Listing [11-20](#338675_4_En_11_Chapter.xhtml#PC20) will be used to delete
    the 2007 data from the table. Another statement will then rebuild the columnstore
    index. Between these operations, an aggregate query will be executed to provide
    an analytic operation to gauge the impact of deletes on the I/O of queries.


    ```

    USE ContosoRetailDW

    GO

    SET STATISTICS IO ON

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    DELETE FROM dbo.FactOnlineSalesCI

    WHERE DateKey <''2008-01-01''

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD

    SELECT DateKey,COUNT(*)

    FROM dbo.FactOnlineSalesCI

    GROUP BY DateKey

    SET STATISTICS IO OFF

    Listing 11-20

    Delete Operations on a Clustered Columnstore Index

    ```'
  trans: "转发记录的整体效应是增加了读取次数。虽然单次查询的增加可能并不显著，但长期累积的影响不容忽视。包含转发记录的堆扫描需要访问更多页面，而查找操作则需要额外的\
    \ I/O。减少堆中转发记录的影响，是维护索引和优化性能的重要一环。\n\n### 列存储碎片化\n\n列存储索引的运作方式与标准行存储索引（聚集、非聚集和堆）大相径庭。列存储索引一个有趣的特点是其段的只读性质。正如第\
    \ 2 章所讨论的，对列存储索引的小型插入将由 `deltastore` 处理，随后异步合并到压缩后的 `行组` 中。此外，删除操作以软删除方式处理。行被标记为已删除，但不会立即移除，导致段中包含不再属于表的数据。\n\
    \n为了演示这些概念，请执行清单 11-18 中的代码来准备一个包含聚集列存储索引的表。表创建后，插入两组行。第一组包含 1,000 行，索引被重组以强制该行组压缩为列存储格式。第二组包含\
    \ 105,000 行，超过了 102,400 行的阈值，这会导致行自动直接插入到压缩行组中。图 11-16 显示插入的记录被直接压缩为列存储格式。\n\n\
    ![](img/338675_4_En_11_Fig16_HTML.png)\n\n一个表有 10 列和 10 行。列标题为 `object_id`、`index_id`、`partition_number`、`row_group_id`、`delta_store_hobt_id`、`state`、`state_description`、`total_rows`、`deleted_rows`\
    \ 和 `size_in_bytes`。其中 7 行具有压缩行组。\n\n**图 11-16**  \n列存储行组结果集\n\n**注意**  \n根据您的环境，清单\
    \ 11-18 中的脚本可能需要运行一段时间。\n\n```sql\nUSE ContosoRetailDW\nGO\nIF OBJECT_ID('dbo.FactOnlineSalesCI')\
    \ IS NOT NULL\nDROP TABLE dbo.FactOnlineSalesCI\nCREATE TABLE dbo.FactOnlineSalesCI(\n\
    \    [OnlineSalesKey] [int] NOT NULL,\n    [DateKey] [datetime] NOT NULL,\n  \
    \  [StoreKey] [int] NOT NULL,\n    [ProductKey] [int] NOT NULL,\n    [PromotionKey]\
    \ [int] NOT NULL,\n    [CurrencyKey] [int] NOT NULL,\n    [CustomerKey] [int]\
    \ NOT NULL,\n    [SalesOrderNumber] nvarchar NOT NULL,\n    [SalesOrderLineNumber]\
    \ [int] NULL,\n    [SalesQuantity] [int] NOT NULL,\n    [SalesAmount] [money]\
    \ NOT NULL,\n    [ReturnQuantity] [int] NOT NULL,\n    [ReturnAmount] [money]\
    \ NULL,\n    [DiscountQuantity] [int] NULL,\n    [DiscountAmount] [money] NULL,\n\
    \    [TotalCost] [money] NOT NULL,\n    [UnitCost] [money] NULL,\n    [UnitPrice]\
    \ [money] NULL,\n    [ETLLoadID] [int] NULL,\n    [LoadDate] [datetime] NULL,\n\
    \    [UpdateDate] [datetime] NULL\n)\nINSERT INTO dbo.FactOnlineSalesCI\nSELECT\
    \ *\nFROM dbo.FactOnlineSales\nCREATE CLUSTERED COLUMNSTORE INDEX FactOnlineSalesCI_CCI\
    \ ON dbo.FactOnlineSalesCI\nDECLARE @we int= 1\nWHILE @we <= 5\nBEGIN\n    INSERT\
    \ INTO dbo.FactOnlineSalesCI\n    SELECT TOP 1000 *\n    FROM dbo.FactOnlineSales\n\
    \    ALTER INDEX ALL ON dbo.FactOnlineSalesCI REORGANIZE\n    WITH (COMPRESS_ALL_ROW_GROUPS\
    \ =ON)\n    SET @we += 1\nEND\nWHILE @we <= 10\nBEGIN\n    INSERT INTO dbo.FactOnlineSalesCI\n\
    \    SELECT TOP 105000 *\n    FROM dbo.FactOnlineSales\n    SET @we += 1\nEND\n\
    SELECT*\nFROM sys.column_store_row_groups\nWHERE object_id=OBJECT_ID('dbo.FactOnlineSalesCI')\n\
    ORDER BY row_group_id DESC\n```\n\n**清单 11-18**  \n准备列存储表\n\n此时有趣的一点是，创建的行组远小于行组的最大大小（约\
    \ 100 万行）。由于它们较小，可能有机会通过增加每个行组的记录数来优化它们使用的页数。这可以通过重建列存储索引来完成。为了说明重建列存储索引的价值，请执行清单\
    \ 11-19 中的代码。该代码显示，重建前的逻辑读取次数在两次扫描操作中为 83,423，然后在重建后降至 833 次逻辑读取，如图 11-17 所示。这是访问页面数量的大幅下降。在考虑对使用列存储索引的大型事实表进行此类维护的影响时，这种过度的页面分配将极大地影响性能。此外，对比图\
    \ 11-16 和图 11-18，表的行组数量也从重建列存储索引前的 34 个大幅减少到 14 个。\n\n![](img/338675_4_En_11_Fig18_HTML.png)\n\
    \n一个表有 10 列和 10 行。列标题为 `object_id`、`index_id`、`partition_number`、`row_group_id`、`delta_store_hobt_id`、`state`、`state_description`、`total_rows`、`deleted_rows`\
    \ 和 `size_in_bytes`。所有行的增量存储和状态描述分别为 null 和 compressed。\n\n**图 11-18**  \n列存储索引重建后的行组统计信息\n\
    \n![](img/338675_4_En_11_Fig17_HTML.png)\n\n一个输入输出统计信息页面展示了如何重建列存储表，影响了 1096 行数据，并附有警告文本，提示因为使用了本地联接提示，已强制执行联接顺序。`LOB`\
    \ 逻辑读取从 83423 次下降到 833 次。\n\n**图 11-17**  \n列存储表插入操作的 I/O 统计信息\n\n```sql\nUSE\
    \ ContosoRetailDW\nGO\nSET STATISTICS IO ON\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\n\
    GROUP BY DateKey\nALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD\nSELECT DateKey,COUNT(*)\n\
    FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nSET STATISTICS IO OFF\nSELECT *\n\
    FROM sys.column_store_row_groups\nWHERE object_id = OBJECT_ID('dbo.FactOnlineSalesCI')\n\
    ORDER BY row_group_id DESC\n```\n\n**清单 11-19**  \n插入操作对列存储表的影响\n\n列存储索引发生的另一种类型的碎片化是通过删除操作。虽然这被称为\
    \ *碎片化*，但当在列存储索引上执行删除时，行并未从索引中移除。相反，它们被标记为已删除，并继续在行组内占用空间。因此，分配给聚集列存储索引的页面，即使其所有记录都被删除，仍然会在索引中保持活动状态。\n\
    \n为了说明列存储索引中软删除行的影响，将使用清单 11-20 中的脚本从表中删除 2007 年的数据。然后，另一条语句将重建列存储索引。在这些操作之间，将执行一个聚合查询，以提供分析操作来衡量删除操作对查询\
    \ I/O 的影响。\n\n```sql\nUSE ContosoRetailDW\nGO\nSET STATISTICS IO ON\nSELECT DateKey,COUNT(*)\n\
    FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nDELETE FROM dbo.FactOnlineSalesCI\n\
    WHERE DateKey <'2008-01-01'\nSELECT DateKey,COUNT(*)\nFROM dbo.FactOnlineSalesCI\n\
    GROUP BY DateKey\nALTER INDEX ALL ON dbo.FactOnlineSalesCI REBUILD\nSELECT DateKey,COUNT(*)\n\
    FROM dbo.FactOnlineSalesCI\nGROUP BY DateKey\nSET STATISTICS IO OFF\n```\n\n**清单\
    \ 11-20**  \n对聚集列存储索引的删除操作"
- fmt: 'After running these queries and rebuilding the index, the resulting performance
    numbers will be shown to be quite significant. Executing the first query results
    in 659 logical reads for the aggregate query, as shown in Figure [11-19](#338675_4_En_11_Chapter.xhtml#Fig19).
    Deleting a year of data results in the aggregate query requiring 79,982 logical
    reads, which is an increase from the original query with 365 fewer rows returned.
    This is because of the pages required to manage the deleted rows. After rebuilding,
    the I/O drops to just 444 logical reads.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig19_HTML.png)


    An input output statistics page illustrates how to delete operation demonstration
    with the data of rows affected, along with the highlighted data of `lob logical
    reads`. The `lob logical reads` of 5 queries are 370, 289, 370, 79612, and 444
    respectively.


    Figure 11-19: Statistics I/O results for delete operation demonstration


    Through the addition of new rows and the deletion of existing rows, there are
    reasons to consider the maintenance requirements of columnstore indexes. The issues
    that affect these indexes are not the same as those of traditional clustered indexes,
    but they are significant, nonetheless.


    ### Fragmentation Issues


    These demonstrations have shown a number of ways in which indexes can become fragmented,
    but there hasn’t been a discussion about why this is important. There are a couple
    important reasons fragmentation within indexes can be a problem:


    *   Index I/O

    *   Contiguous reads


    As the fragmentation of an index increases, each of these two areas affects the
    index’s ability to perform well. In some worst-case scenarios, the level of fragmentation
    can be so severe that the query optimizer will stop using the index in query plans.


    #### Index I/O


    I/O is an area of SQL Server where it is easy to have performance bottlenecks.
    Likewise, there are a multitude of solutions to help mitigate these bottlenecks.
    From the perspective of this chapter, the primary focus will be on the effect
    of fragmentation on I/O.


    Since page splits are often the cause of fragmentation, they provide a good place
    to start investigating the effect of fragmentation on I/O. To review, when a page
    split occurs, half of the contents on the page are moved off the page and onto
    another page. If the original page was 100 percent full, then both resulting pages
    would be about 50 percent full. In essence, it will take two I/Os to read the
    same amount of information from storage that required one I/O prior to the page
    split. This increase in I/Os will drive up reads and writes, thus having a negative
    effect on performance.


    To validate the effect of fragmentation on I/O, another fragmentation example
    will be provided. This time a table will be built, populated with data, and updated
    to generate page splits and fragmentation. The code in Listing 11-22 will perform
    these operations. The last portion of the script will query `sys.dm_db_partition_stats`
    to return the number of pages that have been reserved for the index. Execute the
    fragmentation script from Listing [11-21](#338675_4_En_11_Chapter.xhtml#PC21).
    This will show that the index at this point is more than 99 percent fragmented.
    The results from Listing [11-21](#338675_4_En_11_Chapter.xhtml#PC21) shows that
    the index is using 209 pages. See Figure [11-20](#338675_4_En_11_Chapter.xhtml#Fig20)
    for the results.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig20_HTML.jpg)


    A table has 2 columns and a row. The column headers are `name` and `in_row_reserved_page_count`.
    The row data is the `CLUS_IndexIO` and 585.


    Figure 11-20: Fragmentation of `CLUS_IndexIO`


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.IndexIO'') IS NOT NULL

    DROP TABLE dbo.IndexIO;

    CREATE TABLE dbo.IndexIO

    (

    RowID int IDENTITY(1,1)

    ,Name sysname

    ,JunkValue varchar(2000)

    );

    INSERT INTO dbo.IndexIO (Name, JunkValue)

    SELECT name, REPLICATE(''X'', 1000)

    FROM sys.columns

    CREATE CLUSTERED INDEX CLUS_IndexIO ON dbo.IndexIO(RowID);

    UPDATE dbo.IndexIO

    SET JunkValue = REPLICATE(''X'', 2000)

    WHERE RowID % 5 = 1

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```

    Listing 11-22: Script to Build the Index I/O Example


    ```

    SELECT index_type_desc

    ,index_depth

    ,index_level

    ,page_count

    ,record_count

    ,CAST(avg_fragmentation_in_percent as DECIMAL(6,2)) as avg_fragmentation_in_percent

    ,fragment_count

    ,avg_fragment_size_in_pages

    ,CAST(avg_page_space_used_in_percent as DECIMAL(6,2)) as avg_page_space_used_in_percent

    FROM sys.dm_db_index_physical_stats(DB_ID(),OBJECT_ID(''dbo.IndexIO''),NULL,NULL,''DETAILED'')

    ```

    Listing 11-21: View Index Fragmentation for the I/O Example


    Would removing the fragmentation from the index have a noticeable impact on the
    number of pages in the index? As this demo will demonstrate, reducing fragmentation
    does have an impact.


    The next step in this demonstration is to remove the fragmentation from the index.
    To accomplish this, execute the `ALTER INDEX` statement in Listing [11-23](#338675_4_En_11_Chapter.xhtml#PC23),
    which eliminates the fragmentation. In the rest of the chapter, the mechanics
    of removing fragmentation from an index will be discussed. The effect of this
    command is that all the fragmentation has been removed from the index. Figure
    [11-21](#338675_4_En_11_Chapter.xhtml#Fig21) shows the results from Listing [11-23](#338675_4_En_11_Chapter.xhtml#PC23).
    They show that the number of pages that the index is using dropped from 585 to
    417. The effect of removing the fragmentation is an impressive reduction of almost
    30 percent in pages in the index.


    ![](images/338675_4_En_11_Chapter/338675_4_En_11_Fig21_HTML.jpg)


    A table has 2 column headers, `name` and `in_row_reserved_page_count`, along with
    its corresponding data in a row: the `CLUS_IndexIO` and 417.


    Figure 11-21: Page count resulting from rebuild operations


    ```

    USE AdventureWorks2017

    GO

    ALTER INDEX CLUS_IndexIO ON dbo.IndexIO REBUILD

    SELECT we.name, ps.in_row_reserved_page_count

    FROM sys.indexes we

    INNER JOIN sys.dm_db_partition_stats ps ON we.object_id = ps.object_id AND we.index_id
    = ps.index_id

    WHERE we.name = ''CLUS_IndexIO''

    ```

    Listing 11-23: Script to Rebuild an Index to Remove Fragmentation


    This proves that fragmentation can influence the number of pages in an index.
    More pages in an index result in the need to read more pages to get the data that
    is needed by a query. Reducing the count of pages can help with allowing SQL Server
    databases to process more data in the same number of reads, hence improving the
    speed at which they read the same information across fewer pages.


    #### Contiguous Reads


    The other negative effect that fragmentation can have on performance relates to
    contiguous reads. Within SQL Server, contiguous reads affect its ability to utilize
    readahead operations. Read-ahead allows SQL Server to request pages into memory
    that are expected to be used. Rather than waiting for an I/O request to be generated
    for the page, SQL Server can read large blocks of pages into memory with the expectation
    that the data pages will be used by the query in the future.


    As previously discussed, fragmentation within an index occurs because of breaks
    in the continuity of physical data pages in an index. Each time there is a break
    in the physical pages, I/O operations must change the place in which data is being
    read from SQL Server. This is how fragmentation creates a hindrance in contiguous
    reads.


    ### Defragmentation Options


    SQL Server offers a number of ways in which fragmentation can be removed or mitigated
    within an index. Each of the methods has pros and cons associated with using it.
    In this section, these options will be reviewed alongside the reasons for using
    each one.'
