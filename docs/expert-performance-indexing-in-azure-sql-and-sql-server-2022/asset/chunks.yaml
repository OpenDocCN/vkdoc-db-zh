- fmt: '## Why Build Indexes?


    The most important asset any business owns is its data. Databases exist to store
    that data, and a key piece in providing data is delivering it efficiently. Being
    able to access data quickly improves the value that the business gains from it.
    The way to ensure speedy access to data is through the use of effective indexing.


    Indexes apply order to data, and that order allows data to be efficiently sorted,
    filtered, and aggregated. This reduces the time and computing resources required
    to perform these operations.


    The alternative to indexed data is a scenario where it is stored in unordered
    heaps. A heap is just a table without an index. Without order, `SQL Server` must
    scan the entire table to return any data from it. With larger tables, this process
    is prohibitively expensive. For example, to return one row from an unindexed table
    that is `1 TB` in size would require reading the entire terabyte of data to find
    the single row that was queried for.


    To illustrate this, consider an analogy that is often used to describe indexes—a
    library. Libraries contain many shelves of books. In a library, the most common
    task that is performed is finding a book. Most visitors want either a specific
    book or one that is related to a very limited topic.


    A library with no system for ordering books would be useless to most visitors.
    The idea of searching through tens of thousands of books by hand one at a time
    would constitute an absurd amount of work. Libraries use the `Dewey Decimal Classification`
    system to organize books by topic and type, using a detailed set of numbers to
    label them. For example, books about science would be found in the range of `500–599`.
    Mathematics books are limited to the range `510–519`, and geometry would be found
    specifically in `516`.


    This classification system acts as an index for the library, allowing a visitor
    looking for a good book on geometry to be able to locate it quickly and efficiently.
    There is no need to wander around the library looking for books about geometry
    and no need to read through irrelevant books to find them. The index exists on
    subject and aligns with the most common search patterns for visitors at a library.


    What happens when a search is made for a specific author, rather than a topic?
    What if there is a need to locate books about Edgar F. Codd? An educated guess
    could be made that these books would be in a section related to databases or computing.
    The only way to know for certain, though, would be to manually search through
    a whole lot of books to eventually find the correct ones.


    Libraries solve this using a card catalog or computer. These systems allow for
    books to be searched by other criteria, such as author, publish date, language,
    or title. In the preceding example, a search could be made for a book containing
    a title with the words "Edgar Codd" in it. This is far more efficient than searching
    through stacks of books on science, mathematics, and computing while hoping for
    success. This system provides secondary indexes, in addition to the `Dewey Decimal
    System`, thus allowing visitors to search for books using a variety of different
    criteria.


    These systems are far more efficient than the alternative of wandering around
    the library, scanning through endless books. Alternatively, a small enough library
    does not require a card catalog, the `Dewey Decimal System`, or a computer. A
    Little Free Library may contain `10` or `20` books. In this case, scanning the
    titles of each book takes very little time and is more efficient than trying to
    use a complex system to organize them.


    This analogy is intended to introduce the concept of indexing without an immediate
    dive into database structures. As indexing is discussed in more detail, the library
    example will be referenced as a way to anchor the more technical details in this
    book to a simpler example rooted in everyday life.


    ## Major Index Types


    There are a variety of ways to describe indexes and their function. To simplify
    a discussion of indexes, they will be divided into three categories that will
    be discussed in this section. Heaps and clustered indexes describe how data in
    the underlying table structure is stored. Non-clustered indexes are secondary
    indexes built on top of heaps or clustered indexes that organize data by other
    columns and then reference the clustered index (or heap) to retrieve additional
    information. The following provides a brief description of each index type and
    its significance.


    ### Heap Tables


    As mentioned in the library analogy, in a Little Free Library, the books available
    change often; usually there are only one or two short shelves of books. In these
    cases, the owner doesn’t spend time organizing the books under the `Dewey Decimal
    System`. Instead, the books are placed on the shelves as they are acquired. In
    this case, there is no order to how the books are stored in the library. By default,
    this is how `SQL Server` stores data in tables. With no explicit system of order
    defined, data is stored in an unordered structure called a `heap`.


    In a `heap`, the first row added is the first record in the table, the second
    row is the second record in the table, the third row is the third record in the
    table, and so on. A `heap` is a table with no explicit order defined on its data.


    When a table is created without any clustered index, its storage structure is
    called a `heap`. Rows are inserted into the table in the order in which they are
    added. Rows are read by scanning all rows in the table in order to find the ones
    that are needed to satisfy a query.


    A clustered index may be added to a table to enforce a data order and remove its
    status as a `heap`. Memory-optimized tables are not stored as heaps and are discussed
    in more detail in Chapter [8](#338675_4_En_8_Chapter.xhtml).


    Note


    Many people do not consider heaps to be indexes. In the context of this discussion,
    they will be treated as indexes since they assist in determining where data is
    located and how it will be accessed by queries.


    ### Clustered Indexes


    In the library analogy, the `Dewey Decimal System` was used to assign a number
    to all books in the library. This number allowed books to be sorted and determined
    where a book was located in the library. The subject of the book, not when it
    is added, determines the location of the book. This system defines how books are
    physically stored in the library and is the primary method of searching for books.
    In a table, the index that provides this functionality is called a `clustered
    index`.


    In a `clustered index`, one or more columns are selected as the `key columns`
    for the index. `Key columns` are used to sort and determine where to store data
    in the table. Whereas a library places books on the shelves based on their `Dewey
    Decimal` number, a `clustered index` determines the location of rows in a table
    based on the order of the `key columns` of the index.


    The columns used as the `key columns` for a `clustered index` are selected based
    on the most frequently used method for accessing the records in the table. In
    a table with states and provinces, the most common method of finding a row in
    the table would likely be through its abbreviation. In that scenario, using the
    state/province abbreviation as the `key column` for the `clustered index` would
    be a sensible choice. Oftentimes, the primary key columns in a table will also
    serve as the `clustered index` `key columns`. This is not required, and occasionally
    there are reasons to have different columns used for the primary key and clustered
    index.


    As with heaps, clustered indexes determine where data is stored in a table. In
    a `clustered index`, the non-key columns are stored alongside the `key columns`.
    This equates to the `clustered index` determining the layout of the table itself.


    Because it defines the fundamental organization of a table, there may only be
    a single `clustered index` on any table at one time.'
