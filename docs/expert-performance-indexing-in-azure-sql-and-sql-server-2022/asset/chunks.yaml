    ```\n清单 7-8\n检索空间索引元数据的查询\n\n现在可以查询 `sys.spatial_index_tessellations` 来查看索引的参数和细分方案。清单\
    \ [7-9](#338675_4_En_7_Chapter.xhtml#PC9) 是查询语句，图 [7-8](#338675_4_En_7_Chapter.xhtml#Fig8)\
