- fmt: "### Creating a Full-Text Catalog\n\nUsing AdventureWorks2017, a table will\
    \ be prepared that will be used for full-text searching. Using the `varbinary(max)`\
    \ data type allows the import of most document types and images. In Listing `9-1`,\
    \ the `CREATE TABLE` and `INSERT` statements prepare the objects needed to create\
    \ a full-text search index.\n\n```\nUSE AdventureWorks2017\nGO\nDROP TABLE IF\
    \ EXISTS dbo.SQLServerDocuments;\nCREATE TABLE dbo.SQLServerDocuments (\nSQLServerDocumentsID\
    \ INT IDENTITY(1, 1),\nDocType VARCHAR(6),\nDOC VARBINARY(MAX),\nCONSTRAINT PK_SQLServerDocuments\
    \ PRIMARY KEY CLUSTERED\n(SQLServerDocumentsID)\n);\nGO\nDECLARE @worddoc VARBINARY(MAX);\n\
    SELECT  @worddoc = CAST(bulkcolumn AS VARBINARY(MAX))\nFROM    OPENROWSET(BULK\
    \ 'c:\\temp\\Optimizing Your Query Plans with the SQL Server 2014 Cardinality\
    \ Estimator.docx', SINGLE_BLOB) AS x;\nINSERT  INTO dbo.SQLServerDocuments\n(DocType,\
    \ DOC)\nVALUES  ('docx', @worddoc);\nGO\nListing 9-1\nCREATE TABLE and INSERT\
    \ Statements Used with Full-Text Search\n```\n\nWhen creating an FTS index, a\
    \ full-text catalog must first be created. Since SQL Server 2008, the catalog\
    \ is contained in the database as a definition. The catalog itself is a virtual\
    \ object and greatly enhances performance by eliminating I/O bottlenecks. A catalog\
    \ contains all of the properties that are searchable.\n\nThe catalog is the link\
    \ to the full-text index. Before getting started, let’s review the syntax for\
    \ `CREATE FULLTEXT CATALOG`, which is shown in Listing `9-2`.\n\n```\nUSE AdventureWorks2017\n\
    GO\nCREATE FULLTEXT CATALOG \nWITH \nAS DEFAULT\nAUTHORIZATION \nACCENT_SENSITIVITY\
    \ = ;\nListing 9-2\nThe CREATE FULLTEXT CATALOG Syntax\n```\n\nThe first option\
    \ that should be considered in the creation of a catalog is the `AS DEFAULT` setting.\
    \ Commonly, full-text indexes are created without thought of the catalog to which\
    \ they should be applied. If the catalog is omitted during index creation, the\
    \ catalog that has been set as the default will be used.\n\nAuthorization and\
    \ accent sensitivity are specific in the `CREATE` command. When omitting the authorization\
    \ option, ownership will fall under `dbo`. This is the same for most objects in\
    \ SQL Server when ownership is not declared. It is recommended that ownership\
    \ is assigned for managing security and grouping objects under the proper areas.\
    \ When specifying a user for ownership, a username must be specified that matches\
    \ one of the following:\n*   The name of the user running the statement\n*   The\
    \ name of a user that the user executing the command has impersonate permissions\
    \ for\n*   The database owner or system administrator\n\nAccent sensitivity dictates\
    \ whether the catalog will be accent sensitive or insensitive. For example, with\
    \ accent insensitive, the words “piñata” and “pinata” will be treated as the same\
    \ words. Be sure to research whether accent sensitivity should be on or off prior\
    \ to the creation of the catalog. If this option is changed, the full-text indexes\
    \ on the catalog must be rebuilt.\n\nFor creating a full-text catalog on the white\
    \ paper, execute the statement in Listing `9-3`. For this catalog, the default\
    \ options will be used for the syntax, which sets accent sensitivity to the collation\
    \ of the table.\n\n```\nUSE AdventureWorks2017\nGO\nCREATE FULLTEXT CATALOG WhitePaperCatalog\
    \ AS DEFAULT;\nListing 9-3\nCreating a New Full-Text Catalog\n```\n\n### Creating\
    \ a Full-Text Index\n\nWith the catalog created and the decision made for how\
    \ to handle catalogs, accent sensitivity, and ownership, consideration can be\
    \ made as to how to configure and create the full-text index. The most critical\
    \ of these decisions is the requirement of a key index.\n\n#### Syntax\n\nThe\
    \ syntax in Listing `9-4` is used to create the full-text index. Table `9-1` describes\
    \ the different options available.\n\nTable 9-1\nFull-Text Index Options\n\n|\
    \ Option Name | Description |\n| --- | --- |\n| `TYPE COLUMN` | Specifies the\
    \ name of the column that holds the document type for documents loaded in BLOB\
    \ types, such as `.doc`, `.pdf`, and `.xls`. This option is used only for `varbinary`,\
    \ `varbinary(max)`, and `image` data types. If this option is specified on any\
    \ other data type, the `CREATE FULLTEXT INDEX` statement will throw an error.\
    \ |\n| `LANGUAGE` | Alters the default language that is used for the index with\
    \ the following variations and options:• The language can be specified as string,\
    \ integer, or hexadecimal.• If a language is specified, the language is used when\
    \ a query is run using the index.• When a language is specified as a string value,\
    \ the `syslanguages` system table must correspond to the language.• If a double-byte\
    \ value is used, it is converted to hexadecimal at creation time.• Word breakers\
    \ and stemmers for the specific language must be enabled, or a SQL Server error\
    \ will be generated.• Non-BLOB and non-XML columns containing multiple languages\
    \ should follow the 0 `×` 0 neutral language setting.• For BLOB and XML types,\
    \ language types in the documents themselves will be used. For example, a Word\
    \ document with a language type of Russian or LCID 1049 will force the same setting\
    \ in the index. Use `sys.fulltext_languages` to review all the language types\
    \ and LCID codings available. |\n| `KEY INDEX` | Every full-text index requires\
    \ an adjoining unique, single-key, non-null column to be designated. Specify the\
    \ column in the same table using this option. |\n| `FULLTEXT_CATALOG_NAME` | If\
    \ the full-text index is not to be created using the default catalog, specify\
    \ the catalog name using this option. |\n| `CHANGE_TRACKING` | Determines how\
    \ and when an index is populated. Options are `MANUAL`, `AUTO`, and `OFF [NO_POPULATION]`.\
    \ The `MANUAL` setting requires `ALTER FULLTEXT INDEX ... START UPDATE POPULATION`\
    \ to be executed before the index is populated. The `AUTO` setting populates the\
    \ index at creation time and automatically updates based on changes that are made\
    \ ongoing. This is the default setting if `CHANGE_TRACKING` is omitted in the\
    \ `CREATE` statement. The `OFF [NO_POPULATION]` setting is used to completely\
    \ turn population off for the index, and SQL Server will not retain a list of\
    \ changes. The index is populated upon creation one time unless the `NO_POPULATION`\
    \ is specified. |\n| `STOPLIST` | Specifies a StopList that will prevent certain\
    \ words from being indexed. `OFF`, `SYSTEM`, and a custom StopList are available\
    \ options. The `OFF` setting will not use a StopList and will have more overhead\
    \ on performance of population of the index. The `SYSTEM` is the default StopList\
    \ already created. A user-created StopList is a StopList that was created and\
    \ can be used in association with a given full-text index. |\n| `SEARCH PROPERTY\
    \ LIST` | Specifies the search property list to associate with the full-text index.\
    \ Property lists allow greater control of full-text search by allowing differentiation\
    \ of search between properties of a document, such as title or tags. |\n\n```\n\
    USE AdventureWorks2017\nGO\nCREATE FULLTEXT INDEX ON \n()\nKEY INDEX \nON \nWITH\
    \ \nCHANGE_TRACKING = ;\nListing 9-4\nCREATE FULLTEXT INDEX Syntax\n```\n\nIn\
    \ most other `CREATE INDEX` statements, the basic syntax and options are alike\
    \ with slight modifications. With FTS index creation, there is a completely different\
    \ set of options and considerations. The initial `CREATE FULLTEXT INDEX` is the\
    \ same as any `CREATE INDEX`, with the given table required and then the column\
    \ to index. After this, the other options are not typical to normal index creation."
