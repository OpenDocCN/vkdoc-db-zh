  raw: '#### Full Scans per Second


    Through the performance counter Full Scans/sec, the number of full scans on clustered
    and nonclustered indexes and heaps is measured. Within execution plans, this counter
    is triggered during index scans and table scans. The higher the rate in which
    full scans are performed, the more likely that there can be performance issues
    related to full scans. From a performance perspective, this can impact the Page
    Life Expectancy value as data is churned in memory, and there may be I/O contention
    as queries need to wait for data to be brought into memory.


    Using the query in Listing [16-7](#338675_4_En_16_Chapter.xhtml#PC7), the current
    state of Full Scans/sec can be analyzed for the current monitoring window. As
    with the previous counters, it is important to consider the relationship between
    this counter and the Batch Requests/sec counter. When the ratio of Full Scans/sec
    to Batch Requests/sec exceeds one for every thousand, there may be an issue with
    Full Scans/sec that merits further review.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value, NULL)) FullScans,

    MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 1000) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Full Scans/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FullScans) AS MinFullScans,

    AVG(FullScans) AS AvgFullScans,

    MAX(FullScans) AS MaxFullScans,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1\. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-7

    Full Scans Counter Analysis

    ```


    Before demonstrating how to examine the underlying causes for high Full Scans/sec
    counter values, some example statistics will be set up. Listing [16-8](#338675_4_En_16_Chapter.xhtml#PC8)
    will provide plenty of full scans that can be collected through the monitoring
    process detailed in the previous section. Be certain to execute the scripts that
    collect the monitoring information after executing the example script.


    ```

    USE AdventureWorks2017

    GO

    SET NOCOUNT ON

    EXEC (''SELECT * INTO #temp FROM Sales.SalesOrderHeader'')

    GO 1000

    Listing 16-8

    Full Scans Example Query

    ```


    The primary goal is to identify which indexes the Full Scans/sec counter is being
    affected by. Once the indexes are identified, they need to be analyzed to determine
    whether they are the proper indexes for that operation or whether there are other
    performance tuning tactics required to reduce the use of the index in a full-scan
    operation. The DMO to use for investigating full scans is `sys.dm_db_index_usage_stats`
    from the monitoring tables; from the monitoring, this is stored in the `dbo.index_usage_stats_history`
    table.


    The indexes can be identified using the query shown in Listing [16-9](#338675_4_En_16_Chapter.xhtml#PC9).
    The snapshot results exclude any indexes with no rows in them. Those indexes are
    still being used for full scans, but mitigating the scans on those indexes would
    not greatly impact performance. To sort the results, the number of scans on the
    indexes is multiplied by the number of rows in the table. Sorting in this manner
    weighs the output to put focus on those indexes that might not have a high impact
    on reducing the Full Scans/sec value but will provide the greatest improvement
    to index performance.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_scans) AS user_scans,

    SUM(uh.user_seeks) AS user_seeks,

    x.record_count

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id

    ) x

    WHERE uh.database_id > 4

    AND uh.database_id  DB_ID()

    AND OBJECT_NAME(uh.object_id, uh.database_id) IS NOT NULL

    AND x.RankID = 1

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    ORDER BY SUM(uh.user_scans) * x.record_count DESC;

    GO

    Listing 16-9

    Full Scans Snapshot Query

    ```


    The results of the Full Scans snapshot query will look similar to the output in
    Figure [16-3](#338675_4_En_16_Chapter.xhtml#Fig3). With this output, the next
    step is to identify which indexes require further analysis. The purpose of the
    current analysis is to identify problem indexes for later analysis. Once identified,
    the next step is to determine where they are being used and how to mitigate full
    scans in those places, which is demonstrated later in this chapter in the “Index
    Plan Usage” section.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig3_HTML.png)


    A table is listed under the results tab has 6 columns and 7 row. Column headers
    are database name, object name, index i d, user scans, user seeks, and record
    count. Adventure works 2017 under the database name is selected.


    Figure 16-3


    Full Scans snapshot query results'
  trans: "\n## 每秒完整扫描次数\n\n通过性能计数器 `Full Scans/sec`，可以测量在聚集索引、非聚集索引和堆上执行的完整扫描次数。在执行计划中，此计数器在索引扫描和表扫描期间触发。执行完整扫描的速率越高，发生与完整扫描相关的性能问题的可能性就越大。从性能角度来看，这会影响\
    \ `Page Life Expectancy` 值，因为数据在内存中被换入换出，并且可能存在 I/O 争用，因为查询需要等待数据被加载到内存中。\n\n\
    使用清单 16-7 中的查询，可以分析当前监控窗口内 `Full Scans/sec` 的状态。与之前的计数器一样，考虑此计数器与 `Batch Requests/sec`\
    \ 计数器之间的关系非常重要。当 `Full Scans/sec` 与 `Batch Requests/sec` 的比率超过千分之一时，可能存在需要进一步审查的\
    \ `Full Scans/sec` 问题。\n\n```sql\nUSE IndexingMethod;\nGO\nWITH CounterSummary\n\
    AS (SELECT create_date,\n           server_name,\n           MAX(IIF(counter_name\
    \ = 'Full Scans/sec', Calculated_Counter_value, NULL)) FullScans,\n          \
    \ MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value, NULL))\n\
    \           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 1000) AS FullRatio\n    FROM dbo.IndexingCounters\n    WHERE counter_name\
    \ IN ( 'Full Scans/sec', 'Batch Requests/sec' )\n    GROUP BY create_date,\n \
    \            server_name)\nSELECT server_name,\n       MIN(FullScans) AS MinFullScans,\n\
    \       AVG(FullScans) AS AvgFullScans,\n       MAX(FullScans) AS MaxFullScans,\n\
    \       MIN(FullRatio) AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n\
    \       MAX(FullRatio) AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio\
    \ > 1, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\n清单 16-7 完整扫描计数器分析\n\n在演示如何检查高 `Full Scans/sec` 计数器值的根本原因之前，将设置一些示例统计信息。清单\
    \ 16-8 将提供大量的完整扫描，这些扫描可以通过前一节详述的监控过程收集。执行示例脚本后，请务必执行收集监控信息的脚本。\n\n```sql\nUSE\
    \ AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC ('SELECT * INTO #temp FROM Sales.SalesOrderHeader')\n\
    GO 1000\n```\n清单 16-8 完整扫描示例查询\n\n主要目标是识别 `Full Scans/sec` 计数器受哪些索引影响。一旦识别出索引，就需要对其进行分析，以确定它们是否适合该操作，或者是否需要其他性能调整策略来减少在完整扫描操作中使用该索引。用于调查完整扫描的\
    \ DMO 是监控表中的 `sys.dm_db_index_usage_stats`；在监控中，这存储在 `dbo.index_usage_stats_history`\
    \ 表中。\n\n可以使用清单 16-9 中所示的查询来识别索引。快照结果排除了没有任何行的索引。这些索引仍用于完整扫描，但减轻这些索引上的扫描不会对性能产生重大影响。为了对结果排序，索引上的扫描次数乘以表中的行数。通过这种方式排序，输出会侧重于那些可能对降低\
    \ `Full Scans/sec` 值影响不大，但将为索引性能提供最大改进的索引。\n\n```sql\nUSE IndexingMethod;\nGO\n\
    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n          AND ph.object_id =\
    \ uh.object_id\n          AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id\
    \ > 4\n      AND uh.database_id <> DB_ID()\n      AND OBJECT_NAME(uh.object_id,\
    \ uh.database_id) IS NOT NULL\n      AND x.RankID = 1\nGROUP BY uh.database_id,\n\
    \         uh.object_id,\n         uh.index_id,\n         x.record_count\nORDER\
    \ BY SUM(uh.user_scans) * x.record_count DESC;\nGO\n```\n清单 16-9 完整扫描快照查询\n\n\
    完整扫描快照查询的结果将类似于图 16-3 中的输出。有了这个输出，下一步是确定哪些索引需要进一步分析。当前分析的目的是识别出待后续分析的问题索引。一旦识别出来，下一步就是确定它们在哪里被使用，以及如何在这些地方减少完整扫描，这将在本章后面的“索引计划使用”部分进行演示。\n\
    \n![完整扫描快照查询结果](img/338675_4_En_16_Fig3_HTML.png)\n\n结果选项卡下列出了一个具有 6 列 7 行的表格。列标题为数据库名称、对象名称、索引\
    \ ID、用户扫描次数、用户查找次数和记录数。数据库名称下选择了 Adventure Works 2017。\n\n图 16-3 完整扫描快照查询结果\n"
- fmt: "## Index Searches per Second\n\n### Index Searches per Second\n\nThe alternative\
    \ to scanning indexes is to perform seeks against them. The performance counter\
    \ `Index Searches/sec` provides reporting on the rate of index seeks on a SQL\
    \ Server instance. This can include operations such as range scans and key lookups.\
    \ In most environments, it is preferable to see high `Index Searches/sec` counter\
    \ values. Along those lines, the higher this performance counter is in relationship\
    \ to `Full Scans/sec`, the better.\n\nThe analysis of `Index Searches/sec` will\
    \ begin with reviewing the performance counter information collected over time\
    \ (shown in Listing 16-10). The ratio of `Index Searches/sec` to `Full Scans/sec`\
    \ is one of the metrics that can be used to evaluate whether `Index Searches/sec`\
    \ is indicating a potential indexing issue. The guideline for evaluating the ratio\
    \ between the two counters is to look for 1,000 `Index Searches/sec` for every\
    \ 1 `Full Scans/sec`. The analysis query provides this calculation, along with\
    \ determining the amount of time in which the counter values exceeded this ratio,\
    \ through the column `PctViolation`.\n\n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\n\
    AS (SELECT create_date,\n           server_name,\n           MAX(IIF(counter_name\
    \ = 'Index Searches/sec', Calculated_Counter_value, NULL)) IndexSearches,\n  \
    \         MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 1000) AS SearchToScanRatio\n    FROM dbo.IndexingCounters\n   \
    \ WHERE counter_name IN ( 'Index Searches/sec', 'Full Scans/sec' )\n    GROUP\
    \ BY create_date,\n             server_name)\nSELECT server_name,\n       MIN(IndexSearches)\
    \ AS MinIndexSearches,\n       AVG(IndexSearches) AS AvgIndexSearches,\n     \
    \  MAX(IndexSearches) AS MaxIndexSearches,\n       MIN(SearchToScanRatio) AS MinSearchToScanRatio,\n\
    \       AVG(SearchToScanRatio) AS AvgSearchToScanRatio,\n       MAX(SearchToScanRatio)\
    \ AS MaxSearchToScanRatio,\n       FORMAT(1. * SUM(IIF(SearchToScanRatio > 1,\
    \ 1, NULL)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY\
    \ server_name;\n```\nListing 16-10\nIndex Searches Counter Analysis\n\nIf the\
    \ analysis indicates an issue with index searches, the next step is to verify\
    \ that the analysis for `Full Scans/sec` in the previous section was completed.\
    \ That analysis will provide the most insight into which indexes have many full\
    \ scans, which would contribute to high ratios for `Index Searches/sec`.\n\nTo\
    \ help demonstrate how to examine the `Index Searches/sec` counter values, the\
    \ query in Listing 16-11 will be executed. This query will provide some full scans\
    \ that can be collected through the monitoring process detailed in the previous\
    \ section. Be certain to execute the scripts that collect the monitoring information\
    \ after running the example script.\n\n```\nUSE AdventureWorks2017\nGO\nSET NOCOUNT\
    \ ON\nEXEC('SELECT SOH.SalesOrderID, SOD.SalesOrderDetailID\n      INTO #temp\n\
    \      FROM Sales.SalesOrderHeader SOH\n      INNER JOIN Sales.SalesOrderDetail\
    \ SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n      WHERE SOH.SalesOrderID = 43659')\n\
    GO 1000\n```\nListing 16-11\nFull Scans Example Query\n\nOnce that analysis is\
    \ complete, we can begin to identify where there are issues with the ratios of\
    \ scans to seeks at the index level. Using the query in Listing 16-12, indexes\
    \ with a high ratio of scans to seeks can be identified. Similar to the performance\
    \ counter guideline of 1,000 seeks to every 1 scan, the query returns results\
    \ for those indexes with fewer than 1,000 seeks for every scan. Since full-scan\
    \ issues should have been identified in the previous section, the analysis also\
    \ removes any indexes that do not have seeks against them.\n\n```\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
    \ 0) AS SeekScanRatio,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \ < DB_ID()\n  AND x.RankID = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n\
    \         uh.object_id,\n         uh.index_id,\n         x.record_count\nHAVING\
    \ 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) < 1000\n   AND 1. *\
    \ SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) > 0\nORDER BY 1. * SUM(uh.user_seeks)\
    \ / NULLIF(SUM(uh.user_scans), 0) DESC,\n         SUM(uh.user_scans) DESC;\nGO\n\
    ```\nListing 16-12\nIndex Searches Snapshot Query\n\nViewing the results of the\
    \ snapshot query, shown in Figure 16-4, there is just a single index identified\
    \ where the seek-to-scan ratio is close to 1. This is the case since in the previous\
    \ section about 1,000 scans were executed against `Sales.SalesOrderHeader`, but\
    \ none against `Sales.SalesOrderDetail`, even though both of these tables and\
    \ their indexes were accessed in Listing 16-11. The advantage of considering `Index\
    \ Searches` in conjunction with `Full Scans` is they help to offset the severity\
    \ by identifying the frequency in which more desirable activity is occurring.\n\
    \n![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig4_HTML.png)\n\nA table is\
    \ listed under the results tab has 7 columns and a row. Column headers are database\
    \ name, object name, the index i d, user scans, the user seeks, seek-scan ratio,\
    \ and record count. The index i d is 1, user scans 1005, user seeks is 1002, and\
    \ seek scan ratio is 0.99701.\n\nFigure 16-4\nIndex search snapshot query sample\
    \ results\n\nWhen delving into further analysis, there are a few things to consider\
    \ that might indicate an issue with the indexes identified. First is the current\
    \ seek vs. scan behavior new to the index; in other words, has the variance been\
    \ on a common trend that has slowly been getting worse? If the change is sudden,\
    \ there could be a plan that is no longer using the index as it once did, maybe\
    \ because of a coding change or bad parameter sniffing. Second is when the change\
    \ has been gradual; look at increased data volumes and whether a query or feature\
    \ within the database is being used more than it was previously. This can also\
    \ hint at changes in how people are using the database and its applications, which\
    \ is sometimes gradual until it reaches the point where indexing, and the performance\
    \ the indexes support, suffers."
  raw: '#### Index Searches per Second


    The alternative to scanning indexes is to perform seeks against them. The performance
    counter Index Searches/sec provides reporting on the rate of index seeks on a
    SQL Server instance. This can include operations such as range scans and key lookups.
    In most environments, it is preferable to see high Index Searches/sec counter
    values. Along those lines, the higher this performance counter is in relationship
    to Full Scans/sec, the better.


    The analysis of Index Searches/sec will begin with reviewing the performance counter
    information collected over time (shown in Listing [16-10](#338675_4_En_16_Chapter.xhtml#PC10)).
    The ratio of Index Searches/sec to Full Scans/sec is one of the metrics that can
    be used to evaluate whether Index Searches/sec is indicating a potential indexing
    issue. The guideline for evaluating the ratio between the two counters is to look
    for 1,000 Index Searches/sec for every 1 Full Scans/sec. The analysis query provides
    this calculation, along with determining the amount of time in which the counter
    values exceeded this ratio, through the column `PctViolation`.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Index Searches/sec'', Calculated_Counter_value, NULL))
    IndexSearches,

    MAX(IIF(counter_name = ''Index Searches/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Full Scans/sec'', Calculated_Counter_value,
    NULL)), 0) * 1000) AS SearchToScanRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Index Searches/sec'', ''Full Scans/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(IndexSearches) AS MinIndexSearches,

    AVG(IndexSearches) AS AvgIndexSearches,

    MAX(IndexSearches) AS MaxIndexSearches,

    MIN(SearchToScanRatio) AS MinSearchToScanRatio,

    AVG(SearchToScanRatio) AS AvgSearchToScanRatio,

    MAX(SearchToScanRatio) AS MaxSearchToScanRatio,

    FORMAT(1\. * SUM(IIF(SearchToScanRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'') AS
    PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-10

    Index Searches Counter Analysis

    ```


    If the analysis indicates an issue with index searches, the next step is to verify
    that the analysis for Full Scans/sec in the previous section was completed. That
    analysis will provide the most insight into which indexes have many full scans,
    which would contribute to high ratios for Index Searches/sec.


    To help demonstrate how to examine the Index Searches/sec counter values, the
    query in Listing [16-11](#338675_4_En_16_Chapter.xhtml#PC11) will be executed.
    This query will provide some full scans that can be collected through the monitoring
    process detailed in the previous section. Be certain to execute the scripts that
    collect the monitoring information after running the example script.


    ```

    USE AdventureWorks2017

    GO

    SET NOCOUNT ON

    EXEC(''SELECT SOH.SalesOrderID, SOD.SalesOrderDetailID

    INTO #temp

    FROM Sales.SalesOrderHeader SOH

    INNER JOIN Sales.SalesOrderDetail SOD ON SOH.SalesOrderID = SOD.SalesOrderID

    WHERE SOH.SalesOrderID = 43659'')

    GO 1000

    Listing 16-11

    Full Scans Example Query

    ```


    Once that analysis is complete, we can begin to identify where there are issues
    with the ratios of scans to seeks at the index level. Using the query in Listing
    [16-12](#338675_4_En_16_Chapter.xhtml#PC12), indexes with a high ratio of scans
    to seeks can be identified. Similar to the performance counter guideline of 1,000
    seeks to every 1 scan, the query returns results for those indexes with fewer
    than 1,000 seeks for every scan. Since full-scan issues should have been identified
    in the previous section, the analysis also removes any indexes that do not have
    seeks against them.


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id, uh.database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id)) AS ObjectName,

    uh.index_id,

    SUM(uh.user_scans) AS user_scans,

    SUM(uh.user_seeks) AS user_seeks,

    1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) AS SeekScanRatio,

    x.record_count

    FROM dbo.index_usage_stats_history uh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    ph.record_count

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = uh.database_id

    AND ph.object_id = uh.object_id

    AND ph.index_id = uh.index_id

    ) x

    WHERE uh.database_id > 4

    AND uh.database_id  DB_ID()

    AND x.RankID = 1

    AND x.record_count > 0

    GROUP BY uh.database_id,

    uh.object_id,

    uh.index_id,

    x.record_count

    HAVING 1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0)  0

    ORDER BY 1\. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) DESC,

    SUM(uh.user_scans) DESC;

    GO

    Listing 16-12

    Index Searches Snapshot Query

    ```


    Viewing the results of the snapshot query, shown in Figure [16-4](#338675_4_En_16_Chapter.xhtml#Fig4),
    there is just a single index identified where the seek-to-scan ratio is close
    to 1. This is the case since in the previous section about 1,000 scans were executed
    against Sales.SalesOrderHeader, but none against Sales.SalesOrderDetail, even
    though both of these tables and their indexes were accessed in Listing [16-11](#338675_4_En_16_Chapter.xhtml#PC11).
    The advantage of considering Index Searches in conjunction with Full Scans is
    they help to offset the severity by identifying the frequency in which more desirable
    activity is occurring.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig4_HTML.png)


    A table is listed under the results tab has 7 columns and a row. Column headers
    are database name, object name, the index i d, user scans, the user seeks, seek-scan
    ratio, and record count. The index i d is 1, user scans 1005, user seeks is 1002,
    and seek scan ratio is 0.99701.


    Figure 16-4


    Index search snapshot query sample results


    When delving into further analysis, there are a few things to consider that might
    indicate an issue with the indexes identified. First is the current seek vs. scan
    behavior new to the index; in other words, has the variance been on a common trend
    that has slowly been getting worse? If the change is sudden, there could be a
    plan that is no longer using the index as it once did, maybe because of a coding
    change or bad parameter sniffing. Second is when the change has been gradual;
    look at increased data volumes and whether a query or feature within the database
    is being used more than it was previously. This can also hint at changes in how
    people are using the database and its applications, which is sometimes gradual
    until it reaches the point where indexing, and the performance the indexes support,
    suffers.'
  trans: "## 每秒索引搜索次数\n\n### 每秒索引搜索次数\n\n与扫描索引相对的替代方法是对索引执行查找操作。性能计数器 `索引搜索/秒` 用于报告\
    \ SQL Server 实例上索引查找的速率。这可以包括范围扫描和键查找等操作。在大多数环境中，我们更希望看到较高的 `索引搜索/秒` 计数器值。因此，该性能计数器相对于\
    \ `全扫描/秒` 的比值越高越好。\n\n对 `索引搜索/秒` 的分析将从审查一段时间内收集的性能计数器信息开始（如清单 16-10 所示）。`索引搜索/秒`\
    \ 与 `全扫描/秒` 的比值是可用于评估 `索引搜索/秒` 是否表明存在潜在索引问题的指标之一。评估这两个计数器之间比值的指导原则是，每出现 1 次 `全扫描/秒`，应寻找\
    \ 1,000 次 `索引搜索/秒`。分析查询提供了此计算，并通过 `PctViolation` 列确定了计数器值超过此比值的时间量。\n\n```\nUSE\
    \ IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n        \
    \   server_name,\n           MAX(IIF(counter_name = 'Index Searches/sec', Calculated_Counter_value,\
    \ NULL)) IndexSearches,\n           MAX(IIF(counter_name = 'Index Searches/sec',\
    \ Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Full Scans/sec', Calculated_Counter_value, NULL)), 0) * 1000) AS SearchToScanRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Index Searches/sec',\
    \ 'Full Scans/sec' )\n    GROUP BY create_date,\n             server_name)\nSELECT\
    \ server_name,\n       MIN(IndexSearches) AS MinIndexSearches,\n       AVG(IndexSearches)\
    \ AS AvgIndexSearches,\n       MAX(IndexSearches) AS MaxIndexSearches,\n     \
    \  MIN(SearchToScanRatio) AS MinSearchToScanRatio,\n       AVG(SearchToScanRatio)\
    \ AS AvgSearchToScanRatio,\n       MAX(SearchToScanRatio) AS MaxSearchToScanRatio,\n\
    \       FORMAT(1. * SUM(IIF(SearchToScanRatio > 1, 1, NULL)) / COUNT(*), '0.00%')\
    \ AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n清单 16-10\n\
    索引搜索计数器分析\n\n如果分析表明索引搜索存在问题，下一步是验证是否已完成上一节中关于 `全扫描/秒` 的分析。该分析将提供哪些索引存在大量全扫描的最深入信息，这些全扫描会导致\
    \ `索引搜索/秒` 的比值偏高。\n\n为了帮助演示如何检查 `索引搜索/秒` 计数器值，将执行清单 16-11 中的查询。该查询将提供一些可以通过上一节详述的监控过程收集到的全扫描。运行示例脚本后，请务必执行收集监控信息的脚本。\n\
    \n```\nUSE AdventureWorks2017\nGO\nSET NOCOUNT ON\nEXEC('SELECT SOH.SalesOrderID,\
    \ SOD.SalesOrderDetailID\n      INTO #temp\n      FROM Sales.SalesOrderHeader\
    \ SOH\n      INNER JOIN Sales.SalesOrderDetail SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n\
    \      WHERE SOH.SalesOrderID = 43659')\nGO 1000\n```\n清单 16-11\n全扫描示例查询\n\n一旦该分析完成，我们就可以开始识别索引级别上扫描与查找比值存在问题的具体位置。使用清单\
    \ 16-12 中的查询，可以识别出扫描与查找比值偏高的索引。与每 1 次扫描对应 1,000 次查找的性能计数器指导原则类似，该查询返回那些查找次数与扫描次数之比低于\
    \ 1,000 的索引结果。由于全扫描问题应该已在上一节中被识别，该分析也排除了没有任何查找的索引。\n\n```\nUSE IndexingMethod;\n\
    GO\nSELECT QUOTENAME(DB_NAME(uh.database_id)) AS database_name,\n       QUOTENAME(OBJECT_SCHEMA_NAME(uh.object_id,\
    \ uh.database_id)) + '.'\n       + QUOTENAME(OBJECT_NAME(uh.object_id, uh.database_id))\
    \ AS ObjectName,\n       uh.index_id,\n       SUM(uh.user_scans) AS user_scans,\n\
    \       SUM(uh.user_seeks) AS user_seeks,\n       1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans),\
    \ 0) AS SeekScanRatio,\n       x.record_count\nFROM dbo.index_usage_stats_history\
    \ uh\nCROSS APPLY (\n    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC)\
    \ AS RankID,\n           ph.record_count\n    FROM dbo.index_physical_stats_history\
    \ ph\n    WHERE ph.database_id = uh.database_id\n      AND ph.object_id = uh.object_id\n\
    \      AND ph.index_id = uh.index_id\n) x\nWHERE uh.database_id > 4\n  AND uh.database_id\
    \ < DB_ID()\n  AND x.RankID = 1\n  AND x.record_count > 0\nGROUP BY uh.database_id,\n\
    \         uh.object_id,\n         uh.index_id,\n         x.record_count\nHAVING\
    \ 1. * SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) < 1000\n   AND 1. *\
    \ SUM(uh.user_seeks) / NULLIF(SUM(uh.user_scans), 0) > 0\nORDER BY 1. * SUM(uh.user_seeks)\
    \ / NULLIF(SUM(uh.user_scans), 0) DESC,\n         SUM(uh.user_scans) DESC;\nGO\n\
    ```\n清单 16-12\n索引搜索快照查询\n\n查看快照查询的结果（如图 16-4 所示），只识别出一个索引，其查找与扫描的比值接近 1。出现这种情况是因为在上一节中，大约有\
    \ 1,000 次扫描是针对 `Sales.SalesOrderHeader` 执行的，而针对 `Sales.SalesOrderDetail` 则没有扫描，尽管在清单\
    \ 16-11 中访问了这两个表及其索引。将 `索引搜索` 与 `全扫描` 结合考虑的优势在于，它们通过识别更理想活动发生的频率，有助于抵消问题的严重性。\n\
    \n![](img/338675_4_En_16_Fig4_HTML.png)\n\n结果选项卡下列出的表格有 7 列和一行数据。列标题分别是数据库名称、对象名称、索引\
    \ ID、用户扫描数、用户查找数、查找扫描比和记录数。索引 ID 为 1，用户扫描数为 1005，用户查找数为 1002，查找扫描比为 0.99701。\n\
    \n图 16-4\n索引搜索快照查询示例结果\n\n在进行深入分析时，有几点需要考虑，它们可能表明已识别出的索引存在问题。首先是当前索引表现出的查找与扫描行为与之前相比有何新变化；换句话说，这种差异是否一直沿着一个逐渐恶化的共同趋势发展？如果变化是突然的，可能是某个执行计划不再像以前那样使用该索引，也许是由于代码更改或不良的参数嗅探。其次是当变化是渐进性的；查看数据量是否增加，以及数据库中的某个查询或功能是否比以前使用得更频繁。这也可能暗示人们使用数据库及其应用程序的方式发生了变化，这种情况有时是渐进的，直到达到一定程度，导致索引及其支持的性能受到影响。"
- fmt: "## Page Splits per Second\n\n类似于聚簇索引是堆的“对立面”，页面拆分是转发记录的对立面。关于页面拆分的深入讨论包含在第2章中。不过就本章而言，页面拆分发生在聚簇或非聚簇索引需要在索引页的排序中腾出空间，以便将数据放置到其正确位置时。页面拆分可能非常消耗资源，因为单个页面被分成两个或更多页面，并且涉及锁定，以及潜在的阻塞。页面拆分越频繁，索引越容易遭受阻塞，性能也会受到影响。此外，页面拆分引起的碎片会减少单次操作中可以执行的读取大小。\n\
    \n为了开始分析页面拆分的性能计数器，需要使用计数器`Page Splits/sec`。清单16-13中的查询提供了一种汇总页面拆分活动的方法。该查询包括性能计数器的最小、最大和平均级别。还包括`Page\
    \ Splits/sec`与`Batch Requests/sec`的比率。在识别SQL Server实例上是否存在页面拆分问题时，经验法则是寻找每20个`batch\
    \ requests/sec`对应超过1个`page split/sec`的时间段。与其他计数器一样，需要注意通过`PctViolation`显示的计数器超出阈值的时长。\n\
    \n```\nUSE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n\
    \           server_name,\n           MAX(IIF(counter_name = 'Page Splits/sec',\
    \ Calculated_Counter_value, NULL)) PageSplits,\n           MAX(IIF(counter_name\
    \ = 'Page Splits/sec', Calculated_Counter_value, NULL))\n           / (NULLIF(MAX(IIF(counter_name\
    \ = 'Batch Requests/sec', Calculated_Counter_value, NULL)), 0) * 20) AS FullRatio\n\
    \    FROM dbo.IndexingCounters\n    WHERE counter_name IN ( 'Page Splits/sec',\
    \ 'Batch Requests/sec' )\n    GROUP BY create_date,\n             server_name)\n\
    SELECT server_name,\n       MIN(PageSplits) AS MinPageSplits,\n       AVG(PageSplits)\
    \ AS AvgPageSplits,\n       MAX(PageSplits) AS MaxPageSplits,\n       MIN(FullRatio)\
    \ AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n       MAX(FullRatio)\
    \ AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*),\
    \ '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP BY server_name;\n```\n\
    **清单 16-13** 页面拆分计数器分析\n\n为了确定受页面拆分影响的索引，需要考虑几个值。其中一些值来自`sys.dm_db_index_operational_stats`或来自索引监控过程的`dbo.index_operational_stats_history`。这些列报告索引上发生的每次页面分配，无论是来自B树末尾的插入还是中间的页面拆分。由于此分析只关心属于页面拆分的操作，因此接下来的两个列提供了是否发生由页面拆分引起的碎片的信息。为了确定碎片，监控表`dbo.index_physical_stats_history`中包含了来自`sys.dm_db_index_physical_stats`的列`avg_fragmentation_in_percent`。对于平均碎片，会返回两个值。第一个是报告给索引的最后一个碎片值；第二个是收集的所有碎片值的平均值。参见清单16-14。\n\
    \n```\nUSE IndexingMethod;\nGO\nSELECT QUOTENAME(DB_NAME(database_id)) AS database_name,\n\
    \       QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + '.' + QUOTENAME(OBJECT_NAME(object_id,\
    \ database_id)) AS ObjectName,\n       SUM(leaf_allocation_count) AS leaf_insert_count,\n\
    \       SUM(nonleaf_allocation_count) AS nonleaf_allocation_count,\n       MAX(IIF(RankID\
    \ = 1, x.avg_fragmentation_in_percent, NULL)) AS last_fragmenation,\n       AVG(x.avg_fragmentation_in_percent)\
    \ AS average_fragmenation\nFROM dbo.index_operational_stats_history oh\nCROSS\
    \ APPLY (SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,\n\
    \                    CAST(ph.avg_fragmentation_in_percent AS DECIMAL(6, 3)) AS\
    \ avg_fragmentation_in_percent\n             FROM dbo.index_physical_stats_history\
    \ ph\n             WHERE ph.database_id = oh.database_id\n               AND ph.object_id\
    \ = oh.object_id\n               AND ph.index_id = oh.index_id\n            )\
    \ x\nWHERE database_id > 4\n  AND database_id != DB_ID()\n  AND oh.index_id !=\
    \ 0\n  AND (\n      leaf_allocation_count > 0\n      OR nonleaf_allocation_count\
    \ > 0\n     )\nGROUP BY object_id,\n         database_id\nORDER BY leaf_insert_count\
    \ DESC;\n```\n**清单 16-14** 页面拆分快照查询\n\n以这种方式调查页面拆分提供了一种查看分配次数并将该信息与碎片配对的方法。一个具有低碎片和高`leaf_insert_count`的表，例如图16-5所示的`dbo.IndexingCounters`表，从页面拆分的角度来看并不令人担忧。另一方面，`dbo.index_operational_stats_history`确实显示了大量的碎片和`leaf_insert_count`。值得进一步研究该索引。虽然清单16-14中的脚本通常不会显示`IndexingMethod`数据库的索引结果，但该脚本已根据清单中的内容进行了修改，以提供一些可供检查的结果。\n\
    \n![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig5_HTML.png)\n\n**图 16-5**\
    \ 页面拆分快照查询示例结果\n\n一个包含6列8行的表格。列标题为数据库名称、对象名称、叶子插入计数、非叶子分配计数、上次碎片和平均碎片。在数据库名称下选择的是`IndexingMethod`。\n\
    \n在确定了需要进一步分析的索引后，下一步是缓解。有多种方法可以缓解索引上的页面拆分。首先是审查索引的碎片历史。如果需要定期重建索引，首先可以做的就是降低索引上的`fill\
    \ factor`。降低填充因子会增加重建索引后页面上的剩余空间，这将减少页面拆分的可能性。减少碎片的第二种策略是考虑索引中的列。这些列是否高度易变且值变化剧烈？例如，基于`create_date`的索引不太可能频繁发生页面拆分。但基于`update_date`的索引则容易产生碎片。如果索引的使用率不足以证明其存在是合理的，那么完全删除它可能是值得的。或者，在多列索引中，将易变列移动到索引的右侧或将它们添加为包含列。缓解页面拆分的第三种方法可以是识别索引的使用位置。最后一种缓解索引页面拆分的方法是审查索引使用的数据类型。在某些情况下，可变数据类型可能比固定长度数据类型更合适。"
  raw: '#### Page Splits per Second


    Similar to how clustered indexes are the “opposite” of heaps, page splits are
    the opposite of forwarded records. An in-depth discussion of page splits is included
    in Chapter [2](#338675_4_En_2_Chapter.xhtml). For the purposes of this chapter,
    though, page splits occur when a clustered or nonclustered index needs to make
    room in the ordering of the pages of the index to place data into its proper position.
    Page splits can be resource-intensive because the single page is divided into
    two or more pages and involves locking and, potentially, blocking. The more frequent
    the page splits, the more likely that indexes will incur blocking and performance
    will suffer. Also, the fragmentation caused by page splits reduces the size of
    reads that can be performed in single operations.


    To begin analyzing the performance counters for page splits, the counter Page
    Splits/sec is utilized. The query in Listing [16-13](#338675_4_En_16_Chapter.xhtml#PC13)
    provides a method for summarizing page split activity. The query includes the
    minimum, maximum, and average levels of the performance counter. A ratio of Page
    Splits/sec to Batch Requests/sec is also included. When identifying whether there
    are issues with page splits on a SQL Server instance, the general rule of thumb
    is to look for times in which there is more than one page split/sec for every
    20 batch requests/sec. As with the other counters, pay attention to the amount
    of time, through `PctViolation`, that the counter exceeded the threshold.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL)) PageSplits,

    MAX(IIF(counter_name = ''Page Splits/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 20) AS FullRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''Page Splits/sec'', ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(PageSplits) AS MinPageSplits,

    AVG(PageSplits) AS AvgPageSplits,

    MAX(PageSplits) AS MaxPageSplits,

    MIN(FullRatio) AS MinFullRatio,

    AVG(FullRatio) AS AvgFullRatio,

    MAX(FullRatio) AS MaxFullRatio,

    FORMAT(1\. * SUM(IIF(FullRatio > 1, 1, 0)) / COUNT(*), ''0.00%'') AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-13

    Page Splits Counter Analysis

    ```


    To determine the indexes that are being affected by page splits, a few values
    should be considered. A couple of the values come from `sys.dm_db_index_operational_stats`
    or `dbo.index_operational_stats_history` from the index monitoring process. These
    columns report each page allocation that occurs on an index, whether from inserts
    at the end of the B-tree or page splits in the middle of it. Since for this analysis,
    we care only about operations that are part of page splits, the next two columns
    provide information on whether fragmentation from page splits is occurring. To
    determine fragmentation, the column `avg_fragmentation_in_percent` from `sys.dm_db_index_physical_stats`
    is included in the monitoring table `dbo.index_physical_stats_history`. For the
    average fragmentation, there are two values returned. The first is the last fragmentation
    value reported for the index; the second is the average of all the fragmentation
    values collected. See Listing [16-14](#338675_4_En_16_Chapter.xhtml#PC14).


    ```

    USE IndexingMethod;

    GO

    SELECT QUOTENAME(DB_NAME(database_id)) AS database_name,

    QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.'' + QUOTENAME(OBJECT_NAME(object_id,
    database_id)) AS ObjectName,

    SUM(leaf_allocation_count) AS leaf_insert_count,

    SUM(nonleaf_allocation_count) AS nonleaf_allocation_count,

    MAX(IIF(RankID = 1, x.avg_fragmentation_in_percent, NULL)) AS last_fragmenation,

    AVG(x.avg_fragmentation_in_percent) AS average_fragmenation

    FROM dbo.index_operational_stats_history oh

    CROSS APPLY (

    SELECT DENSE_RANK() OVER (ORDER BY ph.create_date DESC) AS RankID,

    CAST(ph.avg_fragmentation_in_percent AS DECIMAL(6, 3)) AS avg_fragmentation_in_percent

    FROM dbo.index_physical_stats_history ph

    WHERE ph.database_id = oh.database_id

    AND ph.object_id = oh.object_id

    AND ph.index_id = oh.index_id

    ) x

    WHERE database_id > 4

    AND database_id  DB_ID()

    AND oh.index_id  0

    AND (

    leaf_allocation_count > 0

    OR nonleaf_allocation_count > 0

    )

    GROUP BY object_id,

    database_id

    ORDER BY leaf_insert_count DESC;

    Listing 16-14

    Page Splits Snapshot Query

    ```


    Investigating page splits in this manner provides a way to see the number of allocations
    and pairs that information with fragmentation. A table with low fragmentation
    and a high `leaf_insert_count`, such as the table `dbo.IndexingCounters` shown
    in Figure [16-5](#338675_4_En_16_Chapter.xhtml#Fig5), is not a concern from a
    page split perspective. On the other hand, `dbo.index_operational_stats_history`
    does show a high amount of fragmentation and `leaf_insert_count`. It would be
    worthwhile to investigate that index further. While the scripting in Listing [16-14](#338675_4_En_16_Chapter.xhtml#PC14)
    doesn’t typically show index results for the IndexingMethod database, the script
    was modified from what is in the listing to provide some results to examine.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig5_HTML.png)


    A table with 6 columns and 8 rows. Column headers are database name, object name,
    leaf insert count, non-leaf allocation count, last fragmentation, and average
    fragmentation. The indexing method under the database name is selected.


    Figure 16-5


    Page Split snapshot query sample results


    With the indexes requiring further analysis identified, the next step is mitigation.
    There are a number of ways to mitigate page splits on indexes. The first is to
    review the fragmentation history for the index. If the index needs to be rebuilt
    on a regular basis, one of the first things that can be done is to decrease the
    fill factor on the index. Reducing the fill factor will increase the space remaining
    on pages after rebuilding indexes, which will reduce the likelihood for page splits.
    The second strategy for reducing fragmentation is to consider the columns in the
    index. Are the columns highly volatile and do the values change dramatically?
    For instance, an index on `create_date` would likely not incur frequent page splits.
    But one on `update_date` would be prone to fragmentation. If the usage rates for
    the index do not justify the index, it might be worthwhile to remove it altogether.
    Or, in multicolumn indexes, move the volatile columns to the right side of the
    index or add them as included columns. A third approach to mitigating page splits
    can be to identify where the index is being used. One final approach to mitigating
    page splits on indexes is to review the data types being used by the index. In
    some cases, a variable data type might be better suited to being a fixed-length
    data type.'
  trans: "\n## 每秒页面拆分数\n\n类似于聚簇索引是堆的“对立面”，页面拆分是转发记录的对立面。关于页面拆分的深入讨论包含在第 2 章中。不过就本章而言，页面拆分发生在聚簇或非聚簇索引需要在索引页的排序中腾出空间，以便将数据放置到其正确位置时。页面拆分可能非常消耗资源，因为单个页面被分成两个或更多页面，并且涉及锁定，以及潜在的阻塞。页面拆分越频繁，索引越容易遭受阻塞，性能也会受到影响。此外，页面拆分引起的碎片会减少单次操作中可以执行的读取大小。\n\
