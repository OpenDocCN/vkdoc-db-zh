    the schema required for the snapshot and history tables.


    Note


    The columns version_generated_inrow, version_generated_offrow, ghost_version_inrow,
    ghost_version_offrow, insert_over_ghost_version_inrow, and insert_over_ghost_version_offrow
    are new as of SQL Server 2019\. If using this code in previous versions of SQL
    Server, these columns should be removed.'
  trans: '

    # 索引使用统计信息


    动态管理对象 `sys.dm_db_index_usage_stats` 提供了关于索引如何被使用以及索引最后被使用的时间的信息。当我们想要跟踪索引是否正在被使用以及针对它们执行了哪些操作时，这会非常有用。


    对这个 DMO 的监控过程（与其他 DMO 类似）包括以下步骤：


    1.  创建一个表来保存快照信息。

    2.  将 DMO 的当前状态插入快照表。

    3.  将最新的快照与前一个快照进行比较，并将行之间的差异量插入输出的历史表中。


    要构建这个过程，我们首先需要创建快照表和历史表。这些表的结构将与 DMO 的架构相同，并包含 DMO 的所有列以及一个 `create_date` 列。为了与源
    DMO 保持一致，表中的列将匹配 DMO 的架构。


    ```sql

    USE IndexingMethod;

    GO

    CREATE TABLE dbo.index_usage_stats_snapshot

    (

    snapshot_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT NOT NULL,

    object_id INT NOT NULL,

    index_id INT NOT NULL,

    user_seeks BIGINT NOT NULL,

    user_scans BIGINT NOT NULL,

    user_lookups BIGINT NOT NULL,

    user_updates BIGINT NOT NULL,

    last_user_seek DATETIME,

    last_user_scan DATETIME,

    last_user_lookup DATETIME,

    last_user_update DATETIME,

    system_seeks BIGINT NOT NULL,

    system_scans BIGINT NOT NULL,

    system_lookups BIGINT NOT NULL,

    system_updates BIGINT NOT NULL,

    last_system_seek DATETIME,

    last_system_scan DATETIME,

    last_system_lookup DATETIME,

    last_system_update DATETIME,

    CONSTRAINT PK_IndexUsageStatsSnapshot

    PRIMARY KEY CLUSTERED (snapshot_id),

    CONSTRAINT UQ_IndexUsageStatsSnapshot

    UNIQUE (create_date, database_id, object_id, index_id)

    );

    CREATE TABLE dbo.index_usage_stats_history

    (

    history_id INT IDENTITY(1, 1),

    create_date DATETIME2(0),

    database_id SMALLINT NOT NULL,

    object_id INT NOT NULL,

    index_id INT NOT NULL,

    user_seeks BIGINT NOT NULL,

    user_scans BIGINT NOT NULL,

    user_lookups BIGINT NOT NULL,

    user_updates BIGINT NOT NULL,

    last_user_seek DATETIME,

    last_user_scan DATETIME,

    last_user_lookup DATETIME,

    last_user_update DATETIME,

    system_seeks BIGINT NOT NULL,

    system_scans BIGINT NOT NULL,

    system_lookups BIGINT NOT NULL,

    system_updates BIGINT NOT NULL,

    last_system_seek DATETIME,

    last_system_scan DATETIME,

    last_system_lookup DATETIME,

    last_system_update DATETIME,

    CONSTRAINT PK_IndexUsageStatsHistory

    PRIMARY KEY CLUSTERED (history_id),

    CONSTRAINT UQ_IndexUsageStatsHistory

    UNIQUE (create_date, database_id, object_id, index_id)

    );

    ```

    清单 15-5 索引使用统计信息快照表统计信息


    捕获索引使用历史统计信息的下一个组件是收集 `sys.dm_db_index_usage_stats` 中的当前值。与性能监视器脚本类似，收集查询需要安排为大约每
    4 小时运行一次。数据库环境的活动量以及索引被修改的频率应有助于确定捕获信息的频率。务必在任何索引碎片整理过程之前安排一次快照，以捕获在索引重建时可能丢失的信息。


    ```sql

    USE IndexingMethod;

    GO

    INSERT INTO dbo.index_usage_stats_snapshot

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates,

    last_user_seek,

    last_user_scan,

    last_user_lookup,

    last_user_update,

    system_seeks,

    system_scans,

    system_lookups,

    system_updates,

    last_system_seek,

    last_system_scan,

    last_system_lookup,

    last_system_update

    FROM sys.dm_db_index_usage_stats;

    ```

    清单 15-6 索引使用统计信息快照填充


    填充索引使用统计信息的快照后，需要将最新快照和前一个快照之间的差异量插入到 `index_usage_stats_history` 表中。由于 `sys.dm_db_index_usage_stats`
    的行中没有指示符来标识索引统计信息何时被重置，因此识别两个索引条目之间是否存在差异的过程是：如果索引上的任何统计信息返回负值，则删除该行。生成的查询实现了此逻辑，并同时删除了没有任何新活动发生的行。


    ```sql

    USE IndexingMethod;

    GO

    WITH IndexUsageCTE

    AS (SELECT DENSE_RANK() OVER (ORDER BY create_date DESC) AS HistoryID,

    create_date,

    database_id,

    object_id,

    index_id,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates,

    last_user_seek,

    last_user_scan,

    last_user_lookup,

    last_user_update,

    system_seeks,

    system_scans,

    system_lookups,

    system_updates,

    last_system_seek,

    last_system_scan,

    last_system_lookup,

    last_system_update

    FROM dbo.index_usage_stats_snapshot)

    INSERT INTO dbo.index_usage_stats_history

    SELECT i1.create_date,

    i1.database_id,

    i1.object_id,

    i1.index_id,

    i1.user_seeks - COALESCE(i2.user_seeks, 0),

    i1.user_scans - COALESCE(i2.user_scans, 0),

    i1.user_lookups - COALESCE(i2.user_lookups, 0),

    i1.user_updates - COALESCE(i2.user_updates, 0),

    i1.last_user_seek,

    i1.last_user_scan,

    i1.last_user_lookup,

    i1.last_user_update,

    i1.system_seeks - COALESCE(i2.system_seeks, 0),

    i1.system_scans - COALESCE(i2.system_scans, 0),

    i1.system_lookups - COALESCE(i2.system_lookups, 0),

    i1.system_updates - COALESCE(i2.system_updates, 0),

    i1.last_system_seek,

    i1.last_system_scan,

    i1.last_system_lookup,

    i1.last_system_update

    FROM IndexUsageCTE i1

    LEFT OUTER JOIN IndexUsageCTE i2 ON i1.database_id = i2.database_id

    AND i1.object_id   = i2.object_id

    AND i1.index_id    = i2.index_id

    AND i2.HistoryID   = 2

    --验证没有行小于 0

    AND NOT (

    i1.system_seeks - COALESCE(i2.system_seeks, 0)  < 0

    OR i1.system_scans - COALESCE(i2.system_scans, 0)     < 0

    OR i1.system_lookups - COALESCE(i2.system_lookups, 0) < 0

    OR i1.system_updates - COALESCE(i2.system_updates, 0) < 0

    OR i1.user_seeks - COALESCE(i2.user_seeks, 0)         < 0

    OR i1.user_scans - COALESCE(i2.user_scans, 0)         < 0

    OR i1.user_lookups - COALESCE(i2.user_lookups, 0)     < 0

    OR i1.user_updates - COALESCE(i2.user_updates, 0)     < 0

    );

    GO

    ```

    清单 15-7 索引使用统计信息快照填充


    # 索引操作统计信息


    动态管理对象 `sys.dm_db_index_operational_stats` 提供了在查询计划执行期间发生在索引上的物理操作的信息。这些信息可用于跟踪索引被使用时发生的物理计划操作及其操作速率。该
    DMO 监控的其他内容之一是压缩的成功率。


    监控此 DMO 的过程涉及几个简单的步骤。首先，将创建表来存储 DMO 输出的快照和历史信息。然后，定期将 DMO 输出的快照插入快照表。检索快照后，当前快照与前一个快照之间的差异量将被插入历史表。


    该过程使用一个与 `sys.dm_db_index_operational_stats` 架构几乎相同的快照表和历史表。架构的主要差异是添加了一个 `create_date`
    列，用于标识快照发生的时间。以下代码提供了快照表和历史表所需的架构。


    **注意**


    列 `version_generated_inrow`、`version_generated_offrow`、`ghost_version_inrow`、`ghost_version_offrow`、`insert_over_ghost_version_inrow`
    和 `insert_over_ghost_version_offrow` 是 SQL Server 2019 中新增的。如果在之前版本的 SQL Server
    中使用此代码，应删除这些列。

