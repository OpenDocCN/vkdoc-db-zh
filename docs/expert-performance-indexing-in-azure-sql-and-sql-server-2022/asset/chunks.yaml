    order, the size of a product, or a list of states or provinces. Compared with
    using an `int`, which is 4 bytes, in the Identity Column pattern, using a `char(1)`
    or `char(2)` data type with the Natural Key pattern will result in a clustering
    key that is narrower than the former. Another example is using dates in the yyyymmdd
    or timestamp format on date tables. Similarly, a dataset may already include an
    identifying column, such as an invoice ID, purchase order number, or account number.
    Columns such as these that are unique and already generated by an application
    can be used effectively as clustered index columns, assuming they are unique,
    narrow, static, and (maybe) ever-increasing.


    The Natural Key pattern also has the added benefit of providing an easier-todecipher
    key value. When using the Identity Sequence pattern, there is no inherent meaning
    when the clustering key has a value of 1 or 7\. These values are (intentionally)
    meaningless. With the Natural Key pattern, for example, the abbreviations of *O*
    and *C* represent real information (Opened and Closed, respectively).


    As a simple example of the Natural Key pattern, consider a table that contains
    states and their abbreviations. Also included is the name of the country for the
    states. Listing [13-5](#338675_4_En_13_Chapter.xhtml#PC5) shows the SQL to create
    and populate the table. The table has a `StateAbbreviation` column, which is a
    `char(2)`. Since this is a narrow, unique, and static value for each state, the
    clustered index is created on the column. Next, a few rows are added to the table
    for the four states that the fictitious database requires.


    ```

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesNatural

    (

    StateAbbreviation char(2)

    ,StateName varchar(25)

    ,Country varchar(25)

    ,CONSTRAINT PK_State_StateAbbreviation PRIMARY KEY CLUSTERED (StateAbbreviation)

    );

    INSERT INTO dbo.IndexStrategiesNatural(StateAbbreviation, StateName, Country)

    VALUES(''MN'',''Minnesota'',''United States'')

    ,(''FL'',''Florida'',''United States'')

    ,(''WI'',''Wisconsin'',''United States'')

    ,(''NH'',''New Hampshire'',''United States'');

    SELECT StateAbbreviation, StateName, Country

    FROM dbo.IndexStrategiesNatural;

    Listing 13-5

    Creating and Populating a Table for the Natural Key Pattern

    ```


    In situations where the natural key matches the Natural Key pattern, the technique
    in Listing [13-5](#338675_4_En_13_Chapter.xhtml#PC5) can be a useful way of selecting
    the clustering key column. Reviewing the contents of `dbo.IndexStrategiesNatural`
    (shown in Figure [13-5](#338675_4_En_13_Chapter.xhtml#Fig5)), the four rows are
    in the table, and using `StateAbbreviation` in another table as a foreign key
    value can be useful since the value `MN` has some inherent meaning.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig5_HTML.jpg)


    A table has 3 columns labeled state abbreviation, state name, and country and
    4 rows labeled 1 to 4\. The first, second, and third columns have the respective
    entries of F L, M N, N H, and W I, Florida, Minnesota, New Hampshire, and Wisconsin,
    and United States.


    Figure 13-5


    Results for the Natural Key pattern


    This pattern may seem ideal and more worthwhile than the Identity Column pattern—especially
    since the value of the clustering key helps describe the data. However, there
    are a few downsides to using this pattern, which relate to the attributes that
    can make it a well-defined clustering key.


    First, consider the uniqueness of the clustering key. Provided that the use cases
    for the database and table never change, there can be trust that the values will
    remain unique. What happens, though, when the database needs to be used in an
    international context? If states in other countries such as the Netherlands need
    to be included, there is a great potential for data issues. In the Netherlands,
    FL is the abbreviation for Flevopolder, and NH is the abbreviation for Noord-Holland.
    Sending an order to Florida that should go to Flevopolder can have serious business
    consequences. To retain the uniqueness, something outside of the two-character
    abbreviation would need to be added to the natural key and clustering key.


    Changing the natural key would then affect the narrowness of the clustering key.
    There are two approaches that could be taken to address this problem. The first
    option is to add another column to the natural key, such as the country or some
    other location identifier. The second option is to increase the size of the state
    abbreviation to include a country abbreviation in the same column. With either
    of the solutions, the size of the clustering key will exceed the 4 bytes used
    to maintain a narrow clustering key through the use of an `int` data type and
    the Identity Column pattern.


    Additionally, always consider whether natural keys are truly static. State abbreviations
    can change. While this doesn’t happen often, it has historically occurred. The
    last change in the United States happened in 1987 when state abbreviations were
    all standardized. Similar changes will happen occasionally with nearly all types
    of natural keys. One example is the country of Yugoslavia with its six republics,
    each of which became its own country. Another is the Soviet Union, which evolved
    into the Russian Federation, resulting in the formation of numerous other countries.
    As static as values such as state and country abbreviations may seem, on a grander
    scale there is variance. Also, looking to applications, status codes that represent
    the states of a workflow may be accurate today but could have new and different
    meanings in the future.


    Lastly, sometimes apparent natural keys can be made of data that shouldn’t be
    widely distributed. For years, government identifiers, like Social Security Number,
    were often used for natural keys in databases, especially in healthcare and educational
    systems. While this did an adequate job of identifying an individual, it definitely
    isn’t information that should be easily available to database users. In most modern
    databases, government identifiers now need to be encrypted, which can cause immense
    problems when these types of natural keys are used for clustered indexes and potentially
    as primary keys.


    The Natural Key pattern for selecting what an index does is a valid pattern for
    designing clustered indexes. As the example showed, it can be unique, narrow,
    and static. Carefully examine the current and future applications of the table
    before using a natural key for the clustered index to ensure that it will not
    be impacted by future change.'
  trans: '### 自然键


    在某些情况下，将数据中的自然键用作聚集键，与向表中添加一个标识列来使用“标识序列”模式一样有效。自然键是数据集中能够唯一标识一行与其他所有行不同的列。当数据中存在一个满足明确定义的聚集键属性的自然键时，就可以认定使用自然键是有效的。当使用自然键作为聚集键时，它们不太可能永远递增，但仍然应该是唯一的、窄的且静态的。


    一个常见的例子是，当查看那些包含其所代表信息的单字符或双字符缩写的表时，可能会使用自然键而不是标识列。这些缩写可能代表订单状态、产品尺寸，或者州/省列表。与在“标识列”模式中使用
    4 字节的`int`类型相比，在“自然键”模式中使用`char(1)`或`char(2)`数据类型会产生一个比前者更窄的聚集键。另一个例子是在日期表上使用`yyyymmdd`或时间戳格式的日期。同样，一个数据集可能已经包含了一个标识列，例如发票
    ID、采购订单号或账号。像这样的列是唯一的，并且已经由应用程序生成，如果它们是唯一的、窄的、静态的并且（可能）递增的，就可以有效地用作聚集索引列。


    “自然键”模式还有一个额外的好处，就是提供了更易于解读的键值。当使用“标识序列”模式时，聚集键的值为`1`或`7`并没有内在含义。这些值是（有意地）无意义的。而在“自然键”模式中，例如，缩写`O`和`C`代表真实信息（分别是“已开启”和“已关闭”）。


    作为“自然键”模式的一个简单示例，考虑一个包含州及其缩写的表。表中还包括了这些州所在的国家名称。清单 13-5 展示了创建和填充该表的 SQL。该表有一个`StateAbbreviation`列，其数据类型是`char(2)`。由于对于每个州来说，这是一个窄的、唯一的、静态的值，因此在该列上创建了聚集索引。接下来，为这个虚构数据库所需的四个州向表中添加了几行数据。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesNatural

    (

    StateAbbreviation char(2)

    ,StateName varchar(25)

    ,Country varchar(25)

    ,CONSTRAINT PK_State_StateAbbreviation PRIMARY KEY CLUSTERED (StateAbbreviation)

    );

    INSERT INTO dbo.IndexStrategiesNatural(StateAbbreviation, StateName, Country)

    VALUES(''MN'',''Minnesota'',''United States'')

    ,(''FL'',''Florida'',''United States'')

    ,(''WI'',''Wisconsin'',''United States'')

    ,(''NH'',''New Hampshire'',''United States'');

    SELECT StateAbbreviation, StateName, Country

    FROM dbo.IndexStrategiesNatural;

    ```


    清单 13-5

    为“自然键”模式创建和填充表


    在自然键匹配“自然键”模式的情况下，清单 13-5 中的技术可以是选择聚集键列的一个有用方法。回顾`dbo.IndexStrategiesNatural`的内容（如图
    13-5 所示），表中存在四行数据，在另一个表中使用`StateAbbreviation`作为外键值会很有用，因为值`MN`具有一些固有的含义。


    ![](img/338675_4_En_13_Fig5_HTML.jpg)


    一个表有 3 列，分别标记为州缩写、州名和国家，以及 4 行标记为 1 到 4。第一列、第二列和第三列分别有条目：FL、MN、NH 和 WI；Florida、Minnesota、New
    Hampshire 和 Wisconsin；以及 United States。


    图 13-5

    “自然键”模式的结果


    这种模式可能看起来很理想，比“标识列”模式更有价值——特别是因为聚集键的值有助于描述数据。然而，使用这种模式也有一些缺点，这与那些能使其成为明确定义的聚集键的属性相关。


    首先，考虑聚集键的唯一性。假设数据库和表的使用场景永不改变，我们可以相信这些值将保持唯一。但是，当数据库需要在国际环境中使用时会发生什么？如果需要包含其他国家（如荷兰）的州，就存在很大的数据问题风险。在荷兰，`FL`是弗莱福兰省的缩写，`NH`是北荷兰省的缩写。将一个本该发往弗莱福兰省的订单发送到佛罗里达州可能会产生严重的业务后果。为了保持唯一性，就需要在自然键和聚集键中添加除双字符缩写之外的其他信息。


    更改自然键会影响到聚集键的“窄度”。有两种方法可以解决这个问题。第一个选项是向自然键添加另一列，例如国家或其他位置标识符。第二个选项是增加州缩写的大小，以便在同一列中包含国家缩写。无论采用哪种解决方案，聚集键的大小都将超过
    4 字节，而通过使用`int`数据类型和“标识列”模式来保持聚集键的窄度只需要 4 字节。


    此外，要始终考虑自然键是否真正静态。州缩写可能会改变。虽然这种情况不常发生，但历史上确实发生过。美国最后一次此类更改发生在 1987 年，当时所有州缩写都被标准化了。几乎所有的自然键类型都会偶尔发生类似的变化。一个例子是南斯拉夫及其六个共和国，每个共和国后来都成为了独立的国家。另一个是苏联，它演变成俄罗斯联邦，导致许多其他国家的形成。尽管像州和国家缩写这样的值看起来是静态的，但在更大的范围内存在着变化。此外，从应用程序的角度来看，代表工作流状态的状态代码今天可能是准确的，但未来可能会有新的、不同的含义。


    最后，有时表面的自然键可能由不应广泛分发的数据组成。多年来，政府标识符，如社会安全号码，经常被用作数据库中的自然键，尤其是在医疗和教育系统中。虽然这在识别个人方面做得很好，但这绝对不是应该轻易提供给数据库用户的信息。在大多数现代数据库中，政府标识符现在需要加密，当这类自然键被用作聚集索引并可能作为主键时，会引起巨大的问题。


    为索引选择列而采用的“自然键”模式是设计聚集索引的一种有效模式。正如示例所示，它可以是唯一的、窄的且静态的。在将自然键用于聚集索引之前，请仔细检查表的当前和未来应用，以确保它不会受到未来变更的影响。'
- fmt: '# Foreign Key


    One of the most often overlooked patterns for creating clustered indexes is to
    use a foreign key column in the clustering keys for the table. The Foreign Key
    pattern is not appropriate for all foreign keys but does have its use in designs
    where there is a one-to-many relationship between information in a header table
    and the related detail information. The Foreign Key pattern contains all the attributes
    that are part of a welldefined clustering key. There are, though, a few caveats
    with a few of the attributes.


    Implementing this pattern is similar to the way the Identity Column pattern is
    implemented. The pattern contains two tables that have columns with the `IDENTITY`
    property set on them. Listing 13-6 shows an example. In the example, there are
    three tables created. The first is the header table, named `dbo.IndexStrategiesHeader`,
    with a clustered index built on the `HeaderID` column. The next table is the first
    version of the detail table, named `dbo.IndexStrategiesDetail_ICP`. The table
    is designed as a child to the header table, the clustered index is built using
    the Identity Column pattern, and an index on the `HeaderID` column is used to
    improve performance. The third table is also a detail table, named `dbo.IndexStrategiesDetail_FKP`;
    this table is designed using the Foreign Key pattern. Instead of clustering the
    table on the column with the `IDENTITY` property, the clustered index includes
    two columns. The first column is the column from the parent table, `HeaderID`,
    and the second is the primary key for this table, `DetailID`. To provide sample
    data, `sys.indexes` and `sys.index_columns` are used to populate all the tables.


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.IndexStrategiesHeader

    (

    HeaderID int IDENTITY(1,1)

    ,FillerData char(250)

    ,CONSTRAINT PK_Header_HeaderID PRIMARY KEY CLUSTERED (HeaderID)

    );

    CREATE TABLE dbo.IndexStrategiesDetail_ICP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_ICP_DetailID PRIMARY KEY CLUSTERED (DetailID)

    ,CONSTRAINT FK_Detail_ICP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    CREATE INDEX IX_Detail_ICP_HeaderID ON dbo.IndexStrategiesDetail_ICP (HeaderID)

    CREATE TABLE dbo.IndexStrategiesDetail_FKP

    (

    DetailID int IDENTITY(1,1)

    ,HeaderID int

    ,FillerData char(500)

    ,CONSTRAINT PK_Detail_FKP_DetailID PRIMARY KEY NONCLUSTERED (DetailID)

    ,CONSTRAINT CLUS_Detail_FKP_HeaderIDDetailID UNIQUE CLUSTERED (HeaderID, DetailID)

    ,CONSTRAINT FK_Detail_FKP_HeaderID FOREIGN KEY (HeaderID) REFERENCES IndexStrategiesHeader(HeaderID)

    );

    GO

    INSERT INTO dbo.IndexStrategiesHeader(FillerData)

    SELECT CONVERT(varchar,object_id)+name

    FROM sys.indexes

    INSERT INTO dbo.IndexStrategiesDetail_ICP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    INSERT INTO dbo.IndexStrategiesDetail_FKP

    SELECT ish.HeaderID, CONVERT(varchar,ic.index_column_id)+''-''+FillerData

    FROM dbo.IndexStrategiesHeader ish

    INNER JOIN sys.indexes i ON ish.FillerData = CONVERT(varchar,i.object_id)+i.name

    INNER JOIN sys.index_columns ic ON i.object_id = ic.object_id AND i.index_id =
    ic.index_id

    ```


    Listing 13-6: Creating and Populating Tables for the Foreign Key Pattern


    At this point, there are three tables designed using the two clustered index patterns,
    Identity Sequence and Foreign Key. The key to this pattern is to design the table
    so that in their common usage patterns the data will be returned as efficiently
    as possible. There are two use cases that are common in this type of scenario.
    The first is returning the header and all the detail rows for one row in the header
    table. The second is to return multiple rows from the header table and all the
    related rows from the detail table.'
