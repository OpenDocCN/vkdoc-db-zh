- fmt: '### Myth 6: Indexes Always Output Rows in the Same Order


    One of the more common myths that pertain to indexes is that they guarantee the
    output order of results from queries. This is not correct, and worse, it provides
    an invalid rationale toward writing inaccurate queries. As previously described
    in this book, the purpose of indexes is to provide an efficient access path to
    data. That purpose does not guarantee the order in which the data will be returned.
    The trouble with this myth is that, oftentimes, SQL Server will appear to maintain
    order when queries are executed under similar conditions, but when those conditions
    change, the execution plans change, and the results are returned in the order
    that the data is processed vs. the order that the end user might expect.


    To explore this myth, it is necessary to look at how conditions can change on
    a query that is using a clustered index. In Listing 10-15, there is a single query,
    executed twice, for the `Sales.SalesOrderHeader` and `Sales.SalesOrderDetail`
    tables that is performing a simple aggregation. This is something that might appear
    in many types of queries in SQL Server.


    ```sql

    USE AdventureWorks2017

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1000)

    GO

    SELECT soh.SalesOrderID, COUNT(*) AS DetailRows

    FROM Sales.SalesOrderHeader soh

    INNER JOIN Sales.SalesOrderDetail sod ON soh.SalesOrderID = sod.SalesOrderID

    GROUP BY soh.SalesOrderID;

    GO

    DBCC FREEPROCCACHE

    DBCC SETCPUWEIGHT(1)

    GO

    ```

    Listing 10-15

    Unordered Results with a Clustered Index


    The conditions in which the two queries are executed vary a bit. The first query
    is running under the standard SQL Server cost model and generates an execution
    that performs a pair of index scans and a stream aggregation to return the results,
    shown in Figure 10-9. The results from the query, provided in Figure 10-10, provide
    support that SQL Server will return data in the desired output, provided that
    the `SaleOrderID` column is the column that the user wants sorted.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig10_HTML.png)


    A table has 2 columns labeled sales order i d and detail rows and 10 rows labeled
    1 to 10\. The first entry, 43697, under the first column is highlighted, while
    the entries under the second column are all 1.


    Figure 10-10

    Results from the default aggregation execution plan


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig9_HTML.jpg)


    A panel of 2 lines of text for sales order-related items under query 1 with query
    cost, relative to the batch, at 1%. Below are 2 flow diagrams exhibiting the paths
    from clustered index scans at higher costs compared to the select-labeled endpoints
    at 0% cost each.


    Figure 10-9

    Default aggregation execution plan


    But what happens if the conditions on the SQL Server change, but the desired business
    rules do not? The second query executed in Listing 10-15 is the same query, but
    with a change in conditions. For this example, the `DBCC` command `SETCPUWEIGHT`
    is leveraged to change the cost of the execution plan. That change in cost results
    in the use of the parallel execution plan, shown in Figure 10-11. A side effect
    of the parallel plan is a change in the order in which the results of the query
    are returned, shown in Figure 10-12. While the results appear to still be ordered
    and the logic of the query hasn’t changed, the first records returned are different.
    This occurs because one of the parallel threads returned its results faster than
    the others.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig12_HTML.png)


    A table has 10 rows and 2 columns labeled sales order i d and detail rows. The
    first entry, 43659 in the first column is highlighted.


    Figure 10-12

    Aggregation execution plan with parallelism results


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig11_HTML.png)


    A panel of 2 lines of text for sales order-related items under query 1 with undiscernible
    query cost relative to the batch. Below is a flow diagram exhibiting 2 paths from
    clustered index scans at higher costs compared to the select-labeled endpoint
    at 0% cost.


    Figure 10-11

    Aggregation execution plan with parallelism


    Warning


    Do not use `DBCC SETCPUWEIGHT` in production code to control parallelism or for
    any other reason. This `DBCC` command is strictly available to control environmental
    variables within SQL Server to test and validate execution plans.


    The second condition to consider is when business rules change for a query. For
    instance, maybe a set of results wasn’t originally filtered, but after a change
    to the application, the query may change to using a different set of indexes.
    This can also result in a change in the order of the results, such as when a query
    changes from using a clustered index to a non-clustered index.


    To demonstrate this change in behavior, execute the code in Listing 10-16. This
    code runs two queries. Both queries return `SalesOrderID`, `CustomerID`, and `Status`.
    For the purposes of the example, the business rule dictates that the results must
    be sorted by `SalesOrderID`. In this case, the results from the first query are
    sorted as the business rule states, shown at the top of Figure 10-13. But in the
    second query, when the logic changes to request fewer rows by adding a filter,
    the results are no longer ordered, shown at the bottom of Figure 10-13. The cause
    of the change comes from a change in the indexes that SQL Server is using to execute
    the query. The change in indexes drives the results to be processed, as well as
    how they are ordered, in the way those indexes sort the data.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig13_HTML.jpg)


    Two tables under the results tab have 3 columns labeled sales order i d, customer
    i d, and status and 10 and 3 observable rows, respectively. The first entries,
    namely, 43659 and 51193, under the first column of the two tables are highlighted.


    Figure 10-13

    Query results demonstrating effect of filtering on order


    ```sql

    USE AdventureWorks2017

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    GO

    SELECT SalesOrderID, CustomerID, Status

    FROM Sales.SalesOrderHeader soh

    WHERE CustomerID IN (11020, 11021, 11022)

    GO

    ```

    Listing 10-16

    Unordered Results with a Non-clustered Index


    In these examples, a handful of scenarios were reviewed in which different SQL
    Server conditions can change how results are returned for a query. While an index
    might provide results from the query in the order desired this time, there is
    no guarantee that this will not change. It is important to not rely on indexes
    to enforce ordering. If order is required for a result set, always use the `ORDER
    BY` clause to ensure that the correct order is applied to a given result set.'
