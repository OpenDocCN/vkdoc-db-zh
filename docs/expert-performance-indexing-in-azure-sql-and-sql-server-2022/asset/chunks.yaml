    一个面板中打开了“消息”选项卡，显示了 8 行数据，对应 8 个表，包含不同的扫描计数、逻辑读取、物理读取、预读取、LOB 逻辑读取和 LOB 物理读取等值，位于“96
    行受影响”标签下。此外，在“SQL Server 执行时间”下还显示了 107 毫秒和 164 毫秒，分别对应 CPU 时间和已用时间。


    图 13-48


    聚集列存储索引的统计信息 I/O 结果


    ```sql

    USE ContosoRetailDW

    GO

    IF OBJECT_ID(''dbo.FactSales_CCI'') IS NOT NULL

    DROP TABLE FactSales_CCI

    CREATE TABLE dbo.FactSales_CCI(

    SalesKey int NOT NULL,

    DateKey datetime NOT NULL,

    channelKey int NOT NULL,

    StoreKey int NOT NULL,

    ProductKey int NOT NULL,

    PromotionKey int NOT NULL,

    CurrencyKey int NOT NULL,

