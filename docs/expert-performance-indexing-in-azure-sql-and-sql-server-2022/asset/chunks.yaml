    ### Using the DTA Utility


    The GUI isn’t the only way to use the DTA within a SQL Server environment. The
    other method is through the command line with the DTA utility. What the DTA utility
    lacks in an interactive interface, it makes up for with the flexibility to leverage
    the utility in scripts and automation.


    The syntax for using the DTA utility, shown in Listing [12-6](#338675_4_En_12_Chapter.xhtml#PC6),
    includes a number of arguments. These arguments, defined in Table [12-5](#338675_4_En_12_Chapter.xhtml#Tab5),
    allow the DTA utility to contain the same features and flexibility of the GUI.
    Instead of clicking through many screens, the configuration information is passed
    in through these arguments.


