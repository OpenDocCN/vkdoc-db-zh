  trans: '

    # DBCC IND


    下一个可用于调查索引及其关联页的命令是 `DBCC IND`。该命令返回与请求对象相关的所有页的列表，其范围可以限定在数据库、表或索引级别，类似于 `sys.dm_db_database_page_allocations`。清单
    3-10 显示了使用 `DBCC IND` 的语法。使用此命令时，可以填充三个参数，每个参数的描述见表 3-7。


    ## 表 3-7: DBCC IND 参数


    | **参数** | **描述** |

    | --- | --- |

    | `database_name | database_id` | 指定要检索页列表的数据库名称或数据库 ID。如果未提供此参数或其值使用零，则默认为当前数据库。
    |

    | `table_name | table_object_id` | 通过提供表名称或表的 `object_ID` 来指定在输出中返回哪个表。如果未提供值，输出将包含所有表的结果。
    |

    | `index_name | index_id` | 通过提供索引名称或 `index_ID` 来指定在输出中返回哪个索引。如果提供 -1 或未提供值，输出将包含表上所有索引的结果。
    |


    ```

    DBCC IND ( {''dbname'' | dbid}, {''table_name'' | table_object_id},

    {''index_name'' | index_id | -1})

    清单 3-10

    DBCC IAM 语法

    ```


    对于分配给请求对象的每一页，`DBCC IND` 在结果数据集中每页返回一行；列的定义见表 38。与 `DBCC EXTENTINFO` 不同，`DBCC
    IND` 会在结果中明确返回 IAM 页。


    ## 表 3-8: DBCC IND 输出列


    | **列** | **描述** |

    | --- | --- |

    | `PageFID` | 页所在的文件号。 |

    | `PagePID` | 该页的页码。 |

    | `IAMFID` | IAM 页所在的文件 ID。 |

    | `IAMPID` | 数据文件中该页的页 ID。 |

    | `ObjectID` | 关联表的对象 ID。 |

    | `IndexID` | 与堆或索引关联的索引 ID。 |

    | `PartitionNumber` | 堆或索引的分区号。 |

    | `PartitionID` | 堆或索引的分区 ID。 |

    | `iam_chain_type` | 该区用于的 IAM 链类型。值可以是行内数据、LOB 数据和溢出数据。 |

    | `PageType` | 标识页类型的编号。这些类型列在表 3-9 中。 |

    | `IndexLevel` | 页在页组织结构中所处的级别。级别从 0 到 N 组织，其中 0 是索引的最低级别，N 是索引根级别。 |

    | `NextPageFID` | 该索引级别上下一页所在的文件号。 |

    | `NextPagePID` | 该索引级别上下一页的页码。 |

    | `PrevPageFID` | 该索引级别上上一页所在的文件号。 |

    | `PrevPagePID` | 该索引级别上上一页的页码。 |


    在 `DBCC IND` 的结果中，`PageType` 列返回页的类型，可以包括数据页、索引页、GAM 或上一章讨论的任何其他页类型。表 3-9 显示了不同页类型及其对应
    ID 值的完整列表。


    ## 表 3-9: 页类型映射


    | **页类型** | **描述** |

    | --- | --- |

    | 1 | 数据页 |

    | 2 | 索引页 |

    | 3 | 大型对象页 |

    | 4 | 大型对象页 |

    | 8 | 全局分配映射页 |

    | 9 | 共享全局分配映射页 |

    | 10 | 索引分配映射页 |

    | 11 | 页可用空间页 |

    | 13 | 引导页 |

    | 15 | 文件头页 |

    | 16 | 差异更改映射页 |

    | 17 | 最小日志记录页 |


    使用 `DBCC IND` 的主要优点是，它提供了表或索引的所有页的列表及其在数据库中的位置。这可用于帮助调查索引的行为以及页的位置。将提供几个示例来说明如何获取和使用这些数据。


    ## DBCC IND 示例


    在第一个示例中，将重新审视上一节中创建的表，检查每个表的输出，并将其与 `DBCC EXTENTINFO` 的输出进行比较。此代码示例包含针对 `IndexInternalsOne`
    和 `IndexInternalsTwo` 的 `DBCC IND` 命令，如清单 3-11 所示。传入的数据库 ID 为 0（表示当前数据库），索引 ID
    设置为 -1 以返回所有索引的页。


    ```

    USE Chapter2Internals;

    GO

    DBCC IND (0, ''IndexInternalsOne'',-1);

    清单 3-11

    DBCC IND 示例

    ```


    在 `DBCC EXTENTINFO` 示例中，表 `IndexInternalsOne` 有两个区分配，如图 3-5 所示。这些结果显示有 13 个页分配给了该表。如图
    3-6 所示的 `DBCC IND` 结果，详细列出了构成两个区分配的所有页。


    在这些结果中，有一个 IAM 页和 12 个分配给该表的数据页。`DBCC EXTENTINFO` 提供了区分配开始的页 312，包含九个页，但仅凭这些有限信息无法确定
    IAM 页的位置。它在结果未列出的另一个区中，而 `DBCC IND` 的结果将其标识为页 235。使用 `DBCC IND` 列出索引页的好处是，它提供了确切的页码，无需任何猜测。还要注意，结果中的索引级别返回为第
    0 级，没有中间级别。堆结构是扁平的，因此页的排列没有特定顺序。


    ![一个包含 13 行数据的 D B C C I N D 查询表结果截图。标题列为 page F I D、page P I D、I A M F I D、I
    A M P I D、object I D、index I D、partition number、partition I D、I A M chain type、page
    type、index level、next page F I D、next page P I D、p r e v page F I D 和 p r e v
    page P I D。页 P I D 235 的索引级别为空，其余为 0。](img/338675_4_En_3_Fig6_HTML.jpg)

    *图 3-6: dbo.IndexInternalsOne 的 DBCC IND 结果*


    ## DBCC IND 聚集索引示例


    上一个示例中的表是以堆结构组织的。在下一个示例中，将检查具有聚集索引的表的 `DBCC IND` 输出。在清单 3-12 中，创建了表 `dbo.IndexInternalsThree`，并在
    `RowID` 列上有一个聚集索引。然后插入四行，之后使用 `DBCC IND`。


    ```

    USE Chapter2Internals

    GO

    CREATE TABLE dbo.IndexInternalsThree

    (

    RowID INT IDENTITY(1,1)

    ,FillerData CHAR(8000)

    ,CONSTRAINT PK_IndexInternalsThree  PRIMARY KEY CLUSTERED (RowID)

    )

    GO

    INSERT INTO dbo.IndexInternalsThree DEFAULT VALUES

    GO 4

    DBCC IND (0, ''IndexInternalsThree'',-1)

    清单 3-12

    DBCC IND 聚集索引示例

    ```


    图 3-7 显示了此示例的结果。请注意与之前示例（见图 3-6）相比，`IndexLevel` 的返回方式发生了变化。


    ![一个包含 6 行数据的 D B C C I N D 查询表结果截图。标题列为 page F I D、page P I D、I A M F I D、I A
    M P I D、object I D、index I D、partition number、partition I D、I A M chain type、page
    type、index level、next page F I D、next page P I D、p r e v page F I D 和 p r e v
    page P I D。页 P I D 237 和 361 的索引级别分别为 null 和 1。](img/338675_4_En_3_Fig7_HTML.png)

