    ## 外键


    最后一个非聚集索引模式是外键模式。这是唯一直接与数据库设计中的对象相关联的模式。外键提供了一种机制，用于将一个表中的值约束为另一个表中的行值。这种关系提供了在大多数数据库部署中至关重要的引用完整性。然而，外键有时会成为数据库中性能问题的根源，而无人意识到它们正在干扰性能。


    由于外键对列的可能值提供了约束，因此在需要验证值时会进行一次检查。外键可能涉及两种类型的验证。第一种发生在父表 `dbo.ParentTable` 上，第二种发生在子表
    `dbo.ChildTable` 上（见图 13-41）。每当在 `dbo.ChildTable` 中修改行时，就会在 `dbo.ParentTable`
    上进行验证。在这些情况下，会通过查找 `dbo.ParentTable` 中的值来验证来自 `dbo.ChildTable` 的 `ParentID` 值。通常，这不会导致性能问题，因为
    `dbo.ParentTable` 中的 `ParentID` 将是表的主键，并且通常是表进行聚集的列。另一种验证发生在 `dbo.ParentTable`
    被修改时，此时会在 `dbo.ChildTable` 上进行。例如，如果要删除 `dbo.ParentTable` 中的某一行，则需要检查 `dbo.ChildTable`
    以查看该 `ParentID` 值是否正在该表中使用。这种验证正是需要应用外键模式的地方。


    ![](img/338675_4_En_13_Fig41_HTML.png)


    一幅图示包含两个五列的表格，由一个对角线方向的箭头连接。左侧的表格标签为 d b o 点 parent table, parent i d, name, description,
    和 create date，右侧的表格标签为 d b o 点 child table, child i d, parent i d, name, 和 description。


    图 13-41：外键关系


    为了演示外键模式，示例中将需要几个表。清单 13-27 中的代码创建了两个表：`dbo.Customer` 和 `dbo.SalesOrderHeader`。在这两个表之间，在
    `CustomerID` 列上存在外键关系。对于每个 `dbo.SalesOrderHeader` 行，都有一个与该行关联的客户。反之，`dbo.Customer`
    中的每一行可能与 `dbo.SalesOrderHeader` 中的一个或多个行相关。


    ```sql

    USE AdventureWorks2017

    GO

    CREATE TABLE dbo.Customer(

    CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_Customer_CustomerID PRIMARY KEY CLUSTERED (CustomerID)

    );

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int

    ,OrderDate datetime

    ,DueDate datetime

    ,CustomerID int

    ,FillterData char(1000)

    ,CONSTRAINT PK_SalesOrderHeader_SalesOrderID

    PRIMARY KEY CLUSTERED (SalesOrderID)

    ,CONSTRAINT GK_SalesOrderHeader_CustomerID_FROM_Customer

    FOREIGN KEY (CustomerID) REFERENCES dbo.Customer(CustomerID)

    );

    INSERT INTO dbo.Customer (CustomerID)

    SELECT CustomerID

    FROM Sales.Customer;

    INSERT INTO dbo.SalesOrderHeader

    (SalesOrderID, OrderDate, DueDate, CustomerID)

    SELECT SalesOrderID, OrderDate, DueDate, CustomerID

    FROM Sales.SalesOrderHeader;

    ```


    清单 13-27：外键模式的设置


    在此示例中，当 `dbo.Customer` 中的一行被修改时，`dbo.SalesOrderHeader` 中会发生什么？为了演示在 `dbo.Customer`
    上的操作，清单 13-28 中的脚本在 `CustomerID` 等于 701 的行上执行 `DELETE`。该行在 `dbo.SalesOrderHeader`
    中应该没有对应的行。即便如此，外键仍要求进行检查以确定 `dbo.SalesOrderHeader` 中是否有使用该 `CustomerID` 的行。如果有，SQL
    Server 将在删除时抛出错误，删除操作将失败。由于 `dbo.SalesOrderHeader` 中没有行，因此可以删除 `dbo.Customer`
    中的该行。


    执行过程指出了删除操作可能存在的几个性能问题。首先，虽然只删除了一行，但总共产生了 4,516 次读取（见图 13-42）。在这些读取中，有 3 次发生在
    `dbo.Customer` 上，而有 4,513 次发生在 `dbo.SalesOrderHeader` 上。造成这种情况的原因是必须在 `dbo.SalesOrderHeader`
    上进行 `聚集索引扫描`（如图 13-43 所示）。之所以进行扫描，是因为检查哪些行使用了 `Customer` 等于 701 的唯一方法是扫描表中的所有行。没有索引可以提供更快的路径来验证该值是否被使用。


    ![](img/338675_4_En_13_Fig43_HTML.png)


    一个面板中打开了执行计划选项卡，包含查询 2 的两行文本，占批处理总成本的 24%。下方是一个流程图，展示了多条路径：聚集索引删除，customer，占成本
    1%；聚集索引扫描，clustered，sales order header，占成本 99%；删除占成本 0%。


    图 13-43：无索引时外键模式的执行计划


    ![](img/338675_4_En_13_Fig42_HTML.png)


    一个面板中打开了消息选项卡，包含 sales order header 和 customer 表的两行条目，扫描计数分别为 1 和 0，逻辑读取分别为 4513
    和 3，物理读取分别为 0 和 0，预读取分别为 0 和 0，L O B 逻辑读取分别为 0 和 0，L O B 物理读取大约为 0 和 0，上下各有一行“1
    row affected”标签。


    图 13-42：无索引时外键模式的统计信息 I/O 结果


    ```sql

    USE AdventureWorks2017

    GO

    SELECT MAX(c.CustomerID)

    FROM dbo.Customer c

    LEFT OUTER JOIN dbo.SalesOrderHeader soh ON c.CustomerID = soh.CustomerID

    WHERE soh.CustomerID IS NULL;

    SET STATISTICS IO ON;

    DELETE FROM dbo.Customer

    WHERE CustomerID = 701;

    ```


    清单 13-28：无索引的外键模式


    通过外键模式可以简单地提高在 `dbo.Customer` 上执行 `DELETE` 的性能。在 `dbo.SalesOrderHeader` 的 `CustomerID`
    列上建立一个索引，将为下一次删除操作的验证提供一个参考点（见清单 13-29）。审查带索引情况下的执行情况，结果大不相同。在 `dbo.SalesOrderHeader`
    上的读取次数从 4,513 次减少到仅有 2 次（见图 13-44）。这一变化当然是由于在 `CustomerID` 列上创建了索引（见图 13-45）。删除操作不再进行聚集索引扫描，而是可以利用在
    `dbo.SalesOrderHeader` 上的索引查找。


    ![](img/338675_4_En_13_Fig45_HTML.png)


    一个面板中打开了执行计划选项卡，包含查询 3 的两行文本，占批处理总成本的 0%。下方是一个流程图，展示了多条路径：聚集索引删除，customer，占成本
    80%；索引查找，非聚集，sales order header，占成本 20%；删除占成本 0%。


    图 13-45：带索引时外键模式的执行计划


    ![](img/338675_4_En_13_Fig44_HTML.png)


    一个面板中打开了消息选项卡，包含 sales order header 和 customer 表的两行条目，扫描计数分别为 1 和 0，逻辑读取分别为 2
    和 3，物理读取分别为 0 和 0，预读取分别为 0 和 0，L O B 逻辑读取分别为 0 和 0，L O B 物理读取分别为 0 和 0，上下各有一行“1
    row affected”标签。


    图 13-44：带索引时外键模式的统计信息 I/O 结果

