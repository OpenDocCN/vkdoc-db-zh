    Listing 13-11

    Script for the Multiple Column Pattern

    ```


    There are various ways in which the Multiple Column pattern can be implemented.
    The key columns in the clustered index can be reversed, which would change the
    execution plans generated for the test scripts. While this pattern can be beneficial,
    be cautious when using it and fully understand the workload expected before using
    it.


    To wrap up the Multiple Column pattern, the attributes of a well-defined clustered
    index will be reviewed. First, the values are static. If there were to be a change,
    it would likely be deleting a record and inserting a new one. This is still effectively
    an update. To mitigate this risk, attempt to lead the clustered index with the
    value least likely to change or have variations in population. The second is whether
    the clustering key is narrow. In this example, the key was mostly narrow. It was
    comprised of two 4-byte columns. If using larger columns or more than two columns,
    carefully consider if this is the right approach. The next attribute is whether
    the values are unique. They are in this scenario and should be in any scenario
    in the real world. If not, then this pattern is naturally disqualified. Like with
    the other non–Identity Column patterns, this pattern does not provide an ever-increasing
    clustering key.


    As a final note, fact tables in data warehouses often succumb to the temptation
    to use the Multiple Column pattern. In these cases, all the dimension keys in
    the fact table are placed in the clustered index. The aim in doing this is to
    enforce uniqueness on the fact rows. The effect is the creation of an extremely
    wide clustering key, which is then added to all the non-clustered indexes on the
    table. Most likely, each of the dimension columns in the clustered key will have
    a separate index on the fact table. As a result, these indexes waste a lot of
    space and, because of their size, perform much worse than if the uniqueness on
    the fact table were constrained by a non-clustered unique index. For data warehouse
    or other OLAP-type tables, columnstore indexes can provide an optimal data structure.
    Before architecting a complex clustered rowstore index, consider testing a columnstore
    index first. Columnstore indexes will be discussed in further detail later in
    this chapter.


    ### Globally Unique Identifier


    The last and without a doubt the least beneficial (and least popular) pattern
    for selecting a clustered index column is to use a globally unique identifier,
    also known as a GUID. The GUID pattern involves using a uniquely generated value
    to provide a unique value for each row in a table. This value is not integer-based
    and is often chosen because it can be generated at any location (within the topology
    of an application) and has a guarantee that it will be unique. The problem this
    pattern solves is the need to be able to generate new unique values while disconnecting
    from the source that typically controls the list of unique values. Unfortunately,
    the GUID pattern often creates as many challenges as it solves.


    There are two main methods for generating GUID values. The first is through the
    `NEWID()` function. This function generates a 16-byte hexadecimal value that is
    partially based on the MAC address of the computer creating it at the time. Each
    value generated is unique and can start with any value from 0 to 9 or a to f.
    The next value created can be either ahead of or after the previous value in a
    sort. There is no guarantee that the next value is ever-increasing. The second
    option for generating a GUID is through `NEWSEQUENTIALID()`. This function also
    creates a 16-byte hexadecimal value. Unlike the other function, `NEWSEQUENTIALID()`
    creates new values that are greater than the previous value generated since the
    computer was last started. The last point is important in that when the server
    restarts, it is possible that new values with `NEWSEQUENTIALID()` will be less
    than the value created before the restart. The logic for `NEWSEQUENTIALID()` ensures
    sequential values only from the time in which the server is started.


    As discussed, using the GUID pattern does not provide for an ever-increasing value.
    With either `NEWID()` or `NEWSEQUENTIALID()`, there is no guarantee that the next
    value will always be greater than the last value. Along with that, it does not
    provide a narrow index. When storing a GUID as a `uniqueidentifier`, it requires
    16 bytes of storage. This is the size of four `int`s or two `bigint`s. Comparatively,
    the GUID is quite large, and that value will be used in all non-clustered indexes
    on the table. The space used for the GUID pattern can sometimes be worse than
    this, though. In some cases, when the GUID pattern is poorly implemented, the
    GUID value is stored as characters that require 36 bytes to store or 72 bytes
    if using a Unicode data type.


    Even with the failings of the GUID pattern, it does achieve some of the other
    attributes of a well-defined clustering key. First, the value is unique. With
    both the `NEWID()` and `NEWSEQUENTIALID()` functions, the values generated for
    the GUID value are unique. The value is also static since the GUID value generated
    has no business meaning and therefore has no reason to change.


    To demonstrate the impact of using the GUID pattern, its use on a table with a
    comparison with other implementations will be examined. In this scenario, shown
    in Listing 13-12, there are three tables. Table `dbo.IndexStrategiesGUID_ICP`
    is designed using the Identity Column pattern. Table `dbo.IndexStrategiesGUID_UniqueID`
    is built with the GUID pattern using a `uniqueidentifier`, as best practices dictate.
    The last script contains table `dbo.IndexStrategiesGUID_String`, which uses a
    `varchar(36)` to store the GUID value. The last method is not the proper way to
    implement the GUID pattern, and the analysis will help highlight that. With all
    three tables built, insert statements will populate 250,000 rows to each table.
    The final statement in the scenario retrieves the number of pages used by each
    of the tables.'
