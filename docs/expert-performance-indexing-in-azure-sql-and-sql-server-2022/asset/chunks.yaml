  trans: '

    ## 误区 8：从堆中删除数据会导致空间无法恢复


    堆是 SQL Server 中一种有趣的结构。在第二章中，曾简要提及它更像是一组用于存储数据的页面集合，而非严格意义上的索引。下一章将涉及的一项索引维护任务是从堆表中回收空间。正如将在下一章深入讨论的，当行从堆中删除时，与这些行关联的页面并不会被移除。这通常被称为堆内的
    `bloat`（膨胀）。


    关于堆膨胀概念的一个有趣的副作用是，人们误以为膨胀的空间永远不会被重用。这种空间会一直保留在堆中，除非重建堆，否则无法回收。幸运的是，对于堆和数据库管理员来说，情况并非如此。当数据从堆中移除后，该数据原先占用的空间会被释放，可供表未来的插入操作使用。


    为了演示其工作原理，我们将使用清单 10-19 中的代码构建一个表。此演示创建一个名为 `MythEight` 的堆，并插入 400 条记录，这产生了 100
    个数据页。此页数可以通过图 10-16 中第一个结果集的 `page_count` 列进行验证。脚本的下一部分会删除先前插入堆中的每隔一行。通常，这应使每页保留的行数减半，如图
    10-16 中第二个结果集所示。脚本的最后一部分向 `MythEight` 表插入 200 行，使行数恢复到 400 条，并重用了那些先前已被删除数据的页面。图
    10-16 最后一个结果集中页数略有增长，但大多数新行都适应了已分配的空间。


    ![](img/338675_4_En_10_Fig16_HTML.jpg)

    *三个表，每表 5 列，列名分别为：无列名、索引类型描述、页数、记录数、转发记录数，以及一行标记为 1。这三个表在第一、第二和第五列下有相同的值（MythEight
    被高亮显示、HEAP、0），但在第三列和第四列下的条目不同。*


    图 10-16 堆重用查询结果


    ```

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''dbo.MythEight'') IS NOT NULL

    DROP TABLE dbo.MythEight;

    CREATE TABLE dbo.MythEight

    (

    RowId INT IDENTITY(1,1)

    ,FillerData VARCHAR(2500)

    );

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 400 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    DELETE FROM dbo.MythEight

    WHERE RowId % 2 = 0;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    INSERT INTO dbo.MythEight (FillerData)

    SELECT TOP 200 REPLICATE(''X'',2000)

    FROM sys.objects;

    SELECT OBJECT_NAME(object_id), index_type_desc, page_count, record_count, forwarded_record_count

    FROM sys.dm_db_index_physical_stats (DB_ID(), OBJECT_ID(''dbo.MythEight''), NULL,
    NULL, ''DETAILED'');

    ```

    清单 10-19 重用 `MythEight` 堆中已分配的空间


    正如该误区的演示所示，堆中先前保存数据的空间会被释放，供表重新使用。对于有大量数据持续写入的堆，没有必要特别监控页面重用的情况，因此该误区可以被认为是不准确的。而对于那些删除了大量数据且无意替换的堆，可以使用
    `ALTER TABLE ... REBUILD` 来回收空间。该语句的语法和影响将在下一章讨论。


    ## 误区 9：每个表都应该使用堆/聚集索引


    最后一个误区涉及两个方面。一方面，有些人会建议所有表都应该建为堆。另一方面，另一些人则会建议在所有表上创建聚集索引。问题在于，这种观点忽略了每种结构为表带来的潜在益处。它脱离了实际存储的数据及其使用方式，仅仅围绕数据库中数据存储方式，进行一种教条式的争论。


    反对使用聚集索引的一些论点如下：


    *   碎片化通过额外的 I/O 操作对性能产生负面影响。

    *   当触发页拆分时，修改单条记录可能会影响聚集索引中的多条记录。

    *   过多的键查找会通过额外的 I/O 操作对性能产生负面影响。


    当然，也存在一些反对使用堆的常见论点：


    *   过多的转发记录会通过额外的 I/O 操作对性能产生负面影响。

    *   移除转发记录需要重建整个表。

    *   需要非聚集索引来实现高效的筛选数据访问。

    *   当数据被移除时，堆不会自动释放页面。


    在决定使用聚集索引还是堆时，两者各自的负面影响并非唯一需要考虑的因素。在特定情况下，其中一种的表现会优于另一种。


    例如，在以下情况下，聚集索引表现最佳：


    *   表具有唯一的、单调递增的键列。

    *   查询将访问表中的数据范围。

    *   表中的记录将被高速插入和删除。


    另一方面，堆在以下一些情况中是理想选择：


    *   表中的数据仅会使用有限的时间，其中索引创建时间超过了对数据的查询时间。

    *   键值会频繁更改，这反过来会改变记录在索引中的位置。

    *   大量记录正在被插入到暂存表中。

    *   主键是非升序值，例如唯一标识符。


    尽管本节并未包含证明该误区为何错误的演示，但重要的是要记住，堆和聚集索引都是可用的，并且应该被恰当地使用。选择哪种类型的索引是一个测试问题，而不是一个教条问题。


    对于那些属于“聚集索引万能派”的人，可以参考《Fast Track Data Warehouse Architecture》白皮书 (`https://msdn.microsoft.com/en-us/library/hh918452.aspx`)。该白皮书阐述了堆可能带来的一些显著性能提升，以及这些提升效果消失的临界点。它有助于展示
    I/O 系统技术（如闪存和基于缓存的设备）的变化如何改变关于堆和聚集索引的模式与实践。这有助于提倡不时验证误区和最佳实践的观点。请注意，前述文章是为 SQL
    Server 2012 编写的，并强调了最佳实践是如何随时间演变的。

    '
- fmt: '## Index Best Practices


    Similar to myths are the indexing best practices. A best practice should be considered
    the default recommendation that can be applied when there isn’t enough information
    available to validate proceeding in another direction. Best practices are not
    the only option and are a place to start from when working with any technology.


    When using best practices provided by someone else, such as those appearing in
    this chapter, it is important to validate them against your data workloads first.
    Always take them with a grain of salt. Best practices can be trusted to provide
    worthwhile guidance, but details may need to be considered when choosing and fine-tuning
    a solution. Exceptions will always exist. While solutions should never be architected
    based on exceptions, understanding that exceptions will occasionally appear allows
    for a balance between accepting best practices and building data structures to
    handle unusual use cases.


    Given the preceding precautions, there are several best practices that can be
    considered when working with indexes. This section will review these best practices
    and discuss what they are and what they mean.


    ### Index to the Current Workload


    The most important aspect of indexing your databases is to index based on the
    current workload against that database. Consider reads, writes, availability,
    and contention when evaluating the variables that define a workload. Focus first
    on current database usage and then on future growth. Past usage can provide helpful
    guidance, but do not assume that future performance will always mimic past performance.


    The indexing that is built for today will likely not be the indexing that will
    be needed in databases in the future. For this reason, the first best practice
    is to regularly review, analyze, and implement changes to the indexes in your
    environment. Realize that regardless of how similar two databases are, if the
    data in the databases and users are not the same, then the indexing for the two
    databases may need to be different. A detailed analysis of monitoring and index
    usage patterns can be found in Chapters [15](#338675_4_En_15_Chapter.xhtml) and
    [16](#338675_4_En_16_Chapter.xhtml).


    ### Use Clustered Indexes on Primary Keys by Default


    A reliable best practice is to use clustered indexes on primary keys by default.
    This may seem to run contrary to the ninth myth presented in this chapter. Myth
    9 discussed whether to choose clustered indexes or heaps as a matter of doctrine.
    Whether the database was built with one or the other, the myth would have you
    believe that if your table design doesn’t match the myth, it should be changed
    regardless of the situation. This best practice recommends using clustered indexes
    on primary keys as a starting point.


    By clustering the primary key of a table by default, there is an increased likelihood
    that the indexing choice will be appropriate for the table. As stated earlier
    in this chapter, clustered indexes control how the data in a table is logically
    stored. Primary keys are often built on a column that utilizes the identity property
    that increments as each new record is added to the table. Those primary keys that
    are not identity columns are often set on columns that are numeric, increasing,
    and predictable. Choosing a clustered index for the primary key will provide the
    most efficient method to access this type of data.


    If a table with a clustered primary key is providing suboptimal performance, then
    perform a more detailed review of the table to determine why this is the case.
    It may be an exception to the rule, or it may be indicative of another problem,
    such as the following:


    *   The workload could benefit from a non-clustered index.

    *   The table stores analytic data and could benefit from a columnstore index,
    instead of rowstore.

    *   Statistics are stale.


    ### Specify Fill Factors


    The fill factor controls the amount of free space left on the data pages of an
    index after an index is built or defragmented. This free space is made available
    to allow for records on the page to expand, reducing the risk that the change
    in record size may result in a page split. This is an extremely useful property
    of indexes to use for index maintenance. Modifying the fill factor can mitigate
    the risk of fragmentation. A more thorough discussion of fill factor is presented
    in Chapter [8](#338675_4_En_8_Chapter.xhtml). For the purposes of this best practice,
    the primary concern is with the ability to set the fill factor at the database
    and index levels as needed.


    #### Database-Level Fill Factor


    One of the database properties in `SQL Server` is the option to set a default
    fill factor for indexes. This setting is a `SQL Server`–wide setting and can be
    altered in the properties of `SQL Server` on the Database Properties page. By
    default, this value is set to zero, which equates to 100. Do not modify the default
    fill factor to anything other than 0 or 100, which has the same impact. Doing
    so will change the fill factor for every index in the database to the new value.
    This will add the specified amount of free space to all indexes the next time
    indexes are created, rebuilt, or reorganized.


    On the surface, this may seem like a good idea, but this will blindly increase
    the size of all indexes by the specified amount. The increased size of the indexes
    will require more I/O to perform the same work as before the change. In addition,
    storage space will be consumed as indexes are rebuilt. For many indexes, making
    this change would result in a needless waste of resources.


    #### Index-Level Fill Factor


    At the index level, the fill factor should be modified for indexes that are frequently
    becoming heavily fragmented. Decreasing the fill factor will increase the amount
    of free space in the index and provide additional space to compensate for the
    changes in record length leading to fragmentation. Managing the fill factor at
    the index level is appropriate since it provides the ability to tune the index
    precisely to the needs of the database.


    Some experimentation may be needed to become confident adjusting the fill factor
    on indexes, but with time a direct correlation can be drawn between adjusting
    the fill factor and less frequent fragmentation.'
