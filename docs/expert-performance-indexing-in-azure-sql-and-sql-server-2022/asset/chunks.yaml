  raw: '## JSON Indexing


    SQL Server 2016 introduced the ability to process JSON (JavaScript Object Notation)
    data within SQL Server. JSON defines methods of structuring data that are easy
    for both applications and people to read and write. Due to this ease, it has become
    very popular within application development.


    Instead of tags and attributes that are used in XML, JSON leverages brackets,
    colons, and quotes to define entity-attribute relationships. As an example, Listing
    [13-33](#338675_4_En_13_Chapter.xhtml#PC33) contains an XML document that defines
    extra information regarding an employee of WideWorldImporters. That same information
    represented by JSON is shown in Listing [13-34](#338675_4_En_13_Chapter.xhtml#PC34).
    Comparing the two, the JSON is quite a bit easier to read and understand than
    the same data represented as XML.


    ```

    {

    "OtherLanguages": ["Polish","Chinese","Japanese"] ,

    "HireDate":"2008-04-19T00:00:00",

    "Title":"Team Member",

    "PrimarySalesTerritory":"Plains",

    "CommissionRate":"0.98"

    }

    Listing 13-34

    JSON Example

    ```


    ```


    Polish

    Chines

    Japanese


    2008-04-19T00:00:00

    Team Member

    Plains

    0.98


    Listing 13-33

    XML Example

    ```


    While SQL Server can process JSON data, Microsoft implemented JSON a bit differently
    than how XML and spatial were implemented. Instead of a dedicated data type, JSON
    data is stored in columns defined with the data types varchar(max) or nvarchar(max).
    The information within the data can then be retrieved using the function JSON_VALUE
    or JSON_QUERY. The advantage of this implementation is that there are no special
    indexing types associated with JSON data, which is why there is not a chapter
    dedicated to JSON indexing. Instead, JSON data takes advantage of existing indexing
    capabilities by using computed columns persisted through indexes.


    Before diving into how to index JSON data, an example will be shown of how the
    JSON functions work and their effect on performance. To begin, create the table
    dbo.People from Application.People in WideWorldImporters, provided in Listing
    [13-35](#338675_4_En_13_Chapter.xhtml#PC35). In that table, a column will be included
    for HireDate that retrieves the HireDate from the JSON document in CustomFields.


    ```

    USE WideWorldImporters;

    GO

    DROP TABLE IF EXISTS dbo.People;

    CREATE TABLE [dbo].[People]

    (

    [PersonID] [INT] NOT NULL,

    [FullName] [NVARCHAR](50) NOT NULL,

    [CustomFields] [NVARCHAR](MAX) NULL,

    [HireDate] AS JSON_VALUE([CustomFields], N''$.HireDate''),

    [Junk] [VARCHAR](4000) NULL,

    CONSTRAINT [PK_People]

    PRIMARY KEY CLUSTERED ([PersonID])

    );

    GO

    INSERT INTO dbo.People

    (

    PersonID,

    FullName,

    CustomFields,

    Junk

    )

    SELECT PersonID,

    FullName,

    CustomFields,

    REPLICATE(''x'', 4000) AS Junk

    FROM Application.People;

    GO

    Listing 13-35

    JSON Example Setup

    ```


    When dbo.People is queried using the code in Listing [13-36](#338675_4_En_13_Chapter.xhtml#PC36),
    the desired results will be returned from the JSON data using the computed column.
    Unfortunately, to retrieve these results, SQL Server needed to scan the clustered
    index, as shown in Figure [13-50](#338675_4_En_13_Chapter.xhtml#Fig50). The impact
    of this scan is that all 1,111 rows in the table are accessed, which the statistics
    output in Figure [13-49](#338675_4_En_13_Chapter.xhtml#Fig49) indicates and leads
    to 762 reads for the query.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig50_HTML.png)


    A panel with an opened execution plan tab with 2 lines of text for query 1 with
    100% cost relative to the batch. Below is a flow diagram exhibiting the connection
    from clustered index scan, clustered, people, at 100% to select at 0% cost.


    Figure 13-50


    Execution plan for the computed JSON column


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig49_HTML.png)


    A panel with an opened messages tab with a one-line entry that reads table quote
    people quote, scan count 1, logical reads 742, physical reads 0, page server reads
    0, read-ahead reads 0, page server read-ahead reads 0 under the 19 rows affected
