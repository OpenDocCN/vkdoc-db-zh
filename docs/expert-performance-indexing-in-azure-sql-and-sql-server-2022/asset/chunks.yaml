  trans: '

    ## 索引的变体


    至此，我们已经讨论了不同类型的索引以及它们如何帮助搜索不同类型的数据。创建索引的方式多种多样，每种方式提供的功能略有不同。有些索引不仅能对数据进行索引，还允许在底层数据上直接强制执行业务规则，同时可能提升索引性能。


    ### 主键


    在图书馆的类比中，杜威十进分类法是一种按主题组织书籍的宝贵方法，可以快速高效地找到特定主题的书籍。然而，杜威十进分类号并非一本书所独有，许多书可能共享同一个编号。杜威十进分类号可以看作是图书馆中书籍的聚集索引。同样，书名、作者、出版日期等细节在许多书籍中也会重复出现。


    为了有意义的管理图书馆，必须有一个唯一的编号来标识每一本书，且永不重复。在图书馆中，书籍通过其`ISBN`（国际标准书号）来唯一标识，使得没有两本书共享相同的`ISBN`。


    在数据库中，主键唯一标识表中的一行。表中不允许有两行拥有相同的主键值。通常，主键会创建在单个列上，但在需要时也可以由多个列组成。


    因为主键是为表中每一行明确定义的唯一值，所以它不能为`NULL`。此外，一张表一次只能定义一个主键。为了维持唯一性，主键必须与索引一同构建，该索引可以是聚集的或非聚集的。主键通常建立在表的聚集索引上，但在罕见的使用场景中，可能需要将主键和聚集索引放在不同的列上。更多关于此的信息包含在第
    11 章中。


    ### 唯一索引


    可能有不止一个列或列组合可以用来唯一标识表中的一行。当需要定义多种唯一标识行的方式时，可以使用唯一索引。


    唯一索引与主键是不同的实体，可以定义为聚集索引或非聚集索引。一张表可以包含多个唯一索引，但它仍然只能有一个聚集索引和一个主键。


    与主键类似，唯一索引受到约束，其内部值不能重复。它提供了一种唯一标识表中行的机制，可以创建在单个列或多个列上。


    主键和唯一索引的一个显著区别是，唯一索引允许`NULL`值，而主键必须定义在`NOT NULL`列上。`NULL`值被视为一个离散值，因此不能像非`NULL`值那样重复出现。


    ### 包含列


    假设有一个需求：在图书馆中找到所有 Douglas Adams 写的书，并查看每本书的页数。最简单的解决方案是逐个在卡片目录中查找每本书，定位到每本书，然后检查其页数。虽然简单，但这很繁琐，并且依赖于一个高度手动的过程来获取结果。


    理想的解决方案要么是在卡片目录中包含页数信息，要么有一个单独的包含页数的书籍列表。这两种方案都能提供一个解决方案，使得无需实际定位任何书籍就能快速检索页数。在索引方面，通过`包含列`来添加索引列之外的信息。


    当构建非聚集索引时，可以选择将包含列添加到索引中。这些列作为未排序的数据与索引中的键列一起存储。包含列不能包含任何已在索引初始排序列列表中使用的列。


    在查询方面，允许用户通过包含列来查找排序列之外的信息。如果查询所需的一切信息都能在键列和包含列中找到，那么查询就不需要访问表的堆或聚集索引来返回结果。与卡片目录的例子类似，当每次请求类似的列列表时，包含列可以显著提高查询性能。


    ### 分区索引


    包含大量数据的书籍可能会变得相当庞大。想想字典或莎士比亚全集。这些都是异常庞大的书籍，出版成单卷本是不切实际的。一本 20,000 页的书在物理上根本无法出版。此外，一个人阅读（或者仅仅是查阅）如此大部头的书也将是相当有挑战性的。书籍可能会大到将它们包含在单一卷中变得不切实际。最好的例子就是百科全书。


    百科全书很少只包含在一本书中。书的尺寸和装订的宽度会超出任何人的处理能力。另外，在百科全书中找到所有以字母*S*开头的主题所需的时间也大大减少，因为你可以直接去
    S 卷，而不需要翻阅一本巨大的书来查找它们的起始位置。


    这个问题不仅限于书籍。表及其索引也可能达到某个程度，使得其大小导致使用合理的时间和资源来继续维护它们变得困难。同样地，如果一个表有数百万或数十亿行，能够扫描表的有限部分而非整个表，可以提供显著的性能提升。为了解决表上的这个问题，索引可以进行分区。


    `分区`可以应用于聚集索引和非聚集索引。它允许索引沿着函数提供的值进行拆分。通过这样做，索引中的数据在物理上被分离成多个分区，而索引本身仍然是一个单一的逻辑对象。


    ### 过滤索引


    默认情况下，非聚集索引包含其关联表中每一行的一条记录。在大多数情况下，这是理想的，它为索引提供了协助提高列中任何值的选择性的机会。为了本次讨论的目的，选择性是衡量表中满足给定过滤条件的行数的一个指标。


    在某些情况下，将表中所有记录都包含在索引中并不是最佳选择。例如，最常查询的值集合可能只代表表中少数行。在这种情况下，限制索引中的行数将减少查询需要执行的工作量，从而提高查询性能。另一种情况是某个值的选择性相对于表中的行数较低。这可能是活动状态或已发货的布尔值；在这些值上建立索引不会显著提高性能，但将其过滤到仅这些记录将为查询改进提供显著的机会。


    为了协助这些场景，可以对非聚集索引进行过滤以减少其包含的记录数量。在构建索引时，可以定义一个基于简单比较的条件来包含或排除记录，从而减小索引的大小。


    除了上述的性能改进外，使用过滤索引还有其他好处。第一个改进是降低存储成本。由于过滤索引包含的行更少（因为过滤），索引中的数据量会更少，从而需要更少的存储空间。更少的存储使用也意味着当索引读入内存时消耗的内存更少。另一个好处是降低维护成本。较小的索引需要更少的时间和资源来进行重组和重建。

    '
- fmt: '## Compression and Indexing


    Today’s libraries have a lot of books in them. As the number of books increases,
    there is a point where it becomes more difficult to manage the library with the
    existing staff and resources. Because of this, there are a number of ways that
    libraries find to store books, or the information within them, to allow better
    management without increasing the resources required to maintain the library.
    As an example, books can be stored electronically. This reduces the space consumed
    by physical books in the library while allowing for a streamlined checkout/return
    process.

    Similarly, indexes can reach the point of becoming difficult to manage when they
    become too large. Also, the time required to access the records can increase beyond
    acceptable levels. There are two types of compression available in SQL Server:
    `row-level` and `page-level` compression.

    With `row-level compression`, an index compresses each record at the row level.
    When `row-level compression` is enabled, a number of changes are made to each
    record. The metadata for the row is stored in an alternative format that decreases
    the amount of information stored in each column. The main changes to the records
    are numerical data changes from fixed to variable length and blank spaces at the
    end of fixed-length string data types that are not stored. Another change is that
    null or zero values do not require any space to be stored. This incurs some overhead
    to manage the compressed data. Therefore, blindly applying `row-level compression`
    to tables is not an optimal decision, and care must be taken to target rows that
    will compress well.

    `Page-level compression` applies compression across all rows stored on a page,
    instead of compressing each row individually. When `page-level compression` is
    enabled, similarities between string values in columns are identified and compressed.
    This will be discussed in detail in Chapter [13](#338675_4_En_13_Chapter.xhtml).

    With both `row-level` and `page-level` compressions, there are some important
    details to consider. Compressing a record takes additional CPU time. Although
    the row will take up less storage and memory (when read), the CPU is the primary
    resource used to manage the compression task before it can be stored. Depending
    on the content of the table that is to be compressed, the effectiveness of that
    compression will vary.


    ## Index Data Definition Language


    Similar to the richness in types and variations of indexes available in SQL Server,
    there is also a rich data definition language (`DDL`) that surrounds building
    indexes. In this section, the `DDL` for building indexes will be examined. First,
    the `CREATE` statement and its options will be discussed and paired with the concepts
    discussed previously in this chapter.

    For the sake of brevity, the backward compatibility features of the index `DDL`
    will not be explored. The details of which syntax is available in each version
    of SQL Server are thoroughly documented in [Microsoft’s Create Index documentation](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql).
    This book is written using syntax compatible with SQL Server 2022\. While most
    of the Transact-SQL (`T-SQL`) included will work in any modern version of SQL
    Server, there is value in verifying and testing those details before attempting
    to release new code to a production environment.

    More specific indexing implementations, such as `XML`, `spatial`, and `full-text`
    indexes, will be explored in later chapters of this book.


    ### Creating an Index


    Before an index can exist within your database, it must first be created. This
    is accomplished with the `CREATE INDEX` syntax shown in Listing [1-1](#338675_4_En_1_Chapter.xhtml#PC1).
    As the syntax illustrates, most of the index types and variations previously discussed
    are available through the basic syntax.

    ```sql

    CREATE [ UNIQUE ] [ CLUSTERED | NONCLUSTERED ] INDEX index_name

    ON <object> ( column [ ASC | DESC ] [ ,...n ] )

    [ INCLUDE ( column_name [ ,...n ] ) ]

    [ WHERE <filter_predicate> ]

    [ WITH ( <relational_index_option> [ ,...n ] ) ]

    [ ON { partition_scheme_name ( column_name )

    | filegroup_name

    | default

    }

    ]

    [ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | "NULL" }
    ]

    [ ; ]

    -- Listing 1-1

    -- CREATE INDEX Syntax

    ```

    The choice between `CLUSTERED` and `NONCLUSTERED` indexing determines whether
    an index will be built as one of those two basic types. Excluding either of these
    types will default the index to `nonclustered`.

    The `UNIQUE` keyword determines if index values must be unique or not. Including
    it within the `CREATE INDEX` syntax will make the index unique. The syntax for
    creating an index as a primary key will be included later in this chapter.

    The `<object>` option determines the base object over which the index will be
    built. The syntax allows for indexes to be created on either tables or views.
    The specification of the object can include the database name and schema name,
    if needed.

    After specifying the object for the index, the sorted columns of an index are
    listed in the order by which they will be sorted and used by the index. These
    columns are referred to as the `key columns`. Each column can appear in the index
    only a single time. By default, the columns will be sorted in the index in ascending
    order, but descending order can be specified if needed. An index can include up
    to 32 columns as part of the index key with a total size not to exceed 1,700 bytes.
    Prior to SQL Server 2016, it was limited to 16 columns and 900 bytes.

    As an option, `included` columns can be specified on any `nonclustered` index,
    which are added after the key columns for the index. `Included` columns are not
    sorted; therefore, a sort order cannot be specified when adding `included` columns
    to an index. Between the key and non-key columns, there can be up to 1,023 columns
    in an index. The size restriction on the key columns does not affect `included`
    columns.

    If an index will be filtered, the filter definition is specified next. The filtering
    criteria are added to an index using a `WHERE` clause. The `WHERE` clause can
    use any of the following comparisons: `IS` , `IS NOT` , `=` , `<>` , `!=` , `>`
    , `>=` , `!>` , `<` , `<=` , and `!<`. A filtered index cannot use comparisons
    against a `computed` column, a user-defined type (`UDT`) column, a `spatial` data
    type column, or a `HierarchyID` data type column.

    Many options are available when creating an index. In Listing [1-1](#338675_4_En_1_Chapter.xhtml#PC1),
    there is a segment for adding index options, noted by the tag `<relational_index_option>`.
    These index options control how indexes are created and how they will function
    in a variety of scenarios. Listing [1-2](#338675_4_En_1_Chapter.xhtml#PC2) provides
    the `DDL` for the options available for `CREATE INDEX`.

    ```sql

    PAD_INDEX = { ON | OFF }

    | FILLFACTOR = fillfactor

    | SORT_IN_TEMPDB = { ON | OFF }

    | IGNORE_DUP_KEY = { ON | OFF }

    | STATISTICS_NORECOMPUTE = { ON | OFF }

    | STATISTICS_INCREMENTAL = { ON | OFF }

    | DROP_EXISTING = { ON | OFF }

    | ONLINE = { ON | OFF }

    | RESUMABLE = {ON | OF }

    | MAX_DURATION = <time> [MINUTES]

    | ALLOW_ROW_LOCKS = { ON | OFF }

    | ALLOW_PAGE_LOCKS = { ON | OFF }

    | MAXDOP = max_degree_of_parallelism

    | DATA_COMPRESSION = { NONE | ROW | PAGE}

    [ ON PARTITIONS ( { <partition_number> | <range> }

    [ , ...n ] ) ]

    -- Listing 1-2

    -- CREATE INDEX Options

    ```'
  raw: '## Compression and Indexing


    Today’s libraries have a lot of books in them. As the number of books increases,
    there is a point where it becomes more difficult to manage the library with the
    existing staff and resources. Because of this, there are a number of ways that
    libraries find to store books, or the information within them, to allow better
    management without increasing the resources required to maintain the library.
    As an example, books can be stored electronically. This reduces the space consumed
    by physical books in the library while allowing for a streamlined checkout/return
    process.


    Similarly, indexes can reach the point of becoming difficult to manage when they
    become too large. Also, the time required to access the records can increase beyond
    acceptable levels. There are two types of compression available in SQL Server:
    row-level and page-level compression.


    With *row-level compression*, an index compresses each record at the row level.
    When row-level compression is enabled, a number of changes are made to each record.
    The metadata for the row is stored in an alternative format that decreases the
    amount of information stored in each column. The main changes to the records are
    numerical data changes from fixed to variable length and blank spaces at the end
    of fixed-length string data types that are not stored. Another change is that
    null or zero values do not require any space to be stored. This incurs some overhead
    to manage the compressed data. Therefore, blindly applying row-level compression
    to tables is not an optimal decision, and care must be taken to target rows that
    will compress well.


    *Page-level compression* applies compression across all rows stored on a page,
    instead of compressing each row individually. When page-level compression is enabled,
    similarities between string values in columns are identified and compressed. This
    will be discussed in detail in Chapter [13](#338675_4_En_13_Chapter.xhtml).


    With both row-level and page-level compressions, there are some important details
    to consider. Compressing a record takes additional CPU time. Although the row
    will take up less storage and memory (when read), the CPU is the primary resource
    used to manage the compression task before it can be stored. Depending on the
    content of the table that is to be compressed, the effectiveness of that compression
    will vary.


    ## Index Data Definition Language


    Similar to the richness in types and variations of indexes available in SQL Server,
    there is also a rich data definition language (DDL) that surrounds building indexes.
    In this section, the DDL for building indexes will be examined. First, the `CREATE`
    statement and its options will be discussed and paired with the concepts discussed
    previously in this chapter.


    For the sake of brevity, the backward compatibility features of the index DDL
    will not be explored. The details of which syntax is available in each version
    of SQL Server are thoroughly documented in [Microsoft’s Create Index documentation](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql).
    This book is written using syntax compatible with SQL Server 2022\. While most
    of the Transact-SQL (T-SQL) included will work in any modern version of SQL Server,
    there is value in verifying and testing those details before attempting to release
    new code to a production environment.


    More specific indexing implementations, such as XML, spatial, and full-text indexes,
    will be explored in later chapters of this book.


    ### Creating an Index


    Before an index can exist within your database, it must first be created. This
    is accomplished with the `CREATE INDEX` syntax shown in Listing [1-1](#338675_4_En_1_Chapter.xhtml#PC1).
    As the syntax illustrates, most of the index types and variations previously discussed
    are available through the basic syntax.


    ```

    CREATE [ UNIQUE ] [ CLUSTERED | NONCLUSTERED ] INDEX index_name

    ON  ( column [ ASC | DESC ] [ ,...n ] )

    [ INCLUDE ( column_name [ ,...n ] ) ]

    [ WHERE  ]

    [ WITH (  [ ,...n ] ) ]

    [ ON { partition_scheme_name ( column_name )

    | filegroup_name

    | default

    }

    ]

    [ FILESTREAM_ON { filestream_filegroup_name | partition_scheme_name | "NULL" }
    ]

    [ ; ]

    Listing 1-1

    CREATE INDEX Syntax

    ```


    The choice between `CLUSTERED` and `NONCLUSTERED` indexing determines whether
    an index will be built as one of those two basic types. Excluding either of these
    types will default the index to non-clustered.


    The `UNIQUE` keyword determines if index values must be unique or not. Including
    it within the `CREATE INDEX` syntax will make the index unique. The syntax for
    creating an index as a primary key will be included later in this chapter.


    The `<object>` option determines the base object over which the index will be
    built. The syntax allows for indexes to be created on either tables or views.
    The specification of the object can include the database name and schema name,
    if needed.


    After specifying the object for the index, the sorted columns of an index are
    listed in the order by which they will be sorted and used by the index. These
    columns are referred to as the *key columns*. Each column can appear in the index
    only a single time. By default, the columns will be sorted in the index in ascending
    order, but descending order can be specified if needed. An index can include up
    to 32 columns as part of the index key with a total size not to exceed 1,700 bytes.
    Prior to SQL Server 2016, it was limited to 16 columns and 900 bytes.


    As an option, `included` columns can be specified on any non-clustered index,
    which are added after the key columns for the index. `Included` columns are not
    sorted; therefore, a sort order cannot be specified when adding `included` columns
    to an index. Between the key and non-key columns, there can be up to 1,023 columns
    in an index. The size restriction on the key columns does not affect `included`
    columns.


    If an index will be filtered, the filter definition is specified next. The filtering
    criteria are added to an index using a `WHERE` clause. The `WHERE` clause can
    use any of the following comparisons: `IS` , `IS NOT` , `=` , `<>` , `!=` , `>`
    , `>=` , `!>` , `<` , `<=` , and `!<`. A filtered index cannot use comparisons
    against a `computed` column, a user-defined type (`UDT`) column, a `spatial` data
    type column, or a `HierarchyID` data type column.


    Many options are available when creating an index. In Listing [1-1](#338675_4_En_1_Chapter.xhtml#PC1),
    there is a segment for adding index options, noted by the tag `<relational_index_option>`.
    These index options control how indexes are created and how they will function
    in a variety of scenarios. Listing [1-2](#338675_4_En_1_Chapter.xhtml#PC2) provides
    the DDL for the options available for CREATE INDEX.


    ```

    PAD_INDEX = { ON | OFF }

    | FILLFACTOR = fillfactor

    | SORT_IN_TEMPDB = { ON | OFF }

    | IGNORE_DUP_KEY = { ON | OFF }

    | STATISTICS_NORECOMPUTE = { ON | OFF }

    | STATISTICS_INCREMENTAL = { ON | OFF }

    | DROP_EXISTING = { ON | OFF }

    | ONLINE = { ON | OFF }

    | RESUMABLE = {ON | OF }

    | MAX_DURATION =  [MINUTES]

    | ALLOW_ROW_LOCKS = { ON | OFF }

    | ALLOW_PAGE_LOCKS = { ON | OFF }

    | MAXDOP = max_degree_of_parallelism

    | DATA_COMPRESSION = { NONE | ROW | PAGE}

    [ ON PARTITIONS ( {  |  }

    [ , ...n ] ) ]

    Listing 1-2

    CREATE INDEX Options

    ```'
