    ### Index Operational Stats Summary


    This section discussed the statistics available in the DMO `sys.dm_db_index_operational_stats`.
    While it is not a DMO that is widely used, it does provide extensive low-level
    detail regarding indexes that can be leveraged to dig more deeply into index behavior.
    From the columns on DML and `SELECT` activity to locking contention to compression,
    the columns in this DMO provide a wealth of information.


    ## Index Physical Statistics


    The last area of statistics that SQL Server collects are index physical stats.
    These statistics report information about the current structure of the index along
    with the physical effect of insert, update, and delete operations on indexes.
    These statistics are collected in the DMO `sys.dm_db_index_physical_stats`.


    Like `sys.dm_db_index_operational_stats`, `sys.dm_db_index_physical_stats` is
    a dynamic management function. To use the DMF, parameters need to be supplied
    when it is used. Listing [5-46](#338675_4_En_5_Chapter.xhtml#PC46) details the
    parameters for this DMF.


    ```

    sys.dm_db_index_physical_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | NULL | 0 | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    , { mode | NULL | DEFAULT }

    )

    ```


    Listing 5-46: Parameters for `sys.dm_db_index_physical_stats`


    The `mode` parameter for `sys.dm_db_index_physical_stats` accepts one of five
    values: `DEFAULT`, `NULL`, `LIMITED`, `SAMPLED`, or `DETAILED`. `DEFAULT`, `NULL`,
    and `LIMITED` are in effect the same value and will be described together. Table
    [5-21](#338675_4_En_5_Chapter.xhtml#Tab21) lists the parameter values.


    Note


    The DMF `sys.dm_db_index_physical_stats` can accept the use of the Transact-SQL
    functions `DB_ID()` and `OBJECT_ID()`. These functions can be used for the parameters
    `database_id` and `object_id`, respectively.


    Table 5-21: Values for the `mode` parameter in `sys.dm_db_index_physical_stats`


    | Value Name | Description |

    | --- | --- |

    | LIMITED | The fastest mode that scans the smallest number of pages. For an index,
    only the parent-level pages of the B-tree are scanned. In a heap, only the associated
    PFS and IAM pages are examined. |

    | SAMPLED | This mode returns statistics based on a 1 percent sample of all the
    pages in the index or heap. If the index or heap has fewer than 10,000 pages,
    DETAILED mode is used instead of SAMPLED. |

    | DETAILED | This mode scans all pages, both leaf and nonleaf, of an index and
    returns all statistics. |


    When executed, there are three areas of information that are reported from the
    DMF: header columns, row statistics, and fragmentation statistics. One word of
    caution: This DMF gathers the information that it reports as it is executed. If
    a system is heavily used, this DMF can interfere with production workloads.


    ### Header Columns


    The first set of columns returned from `sys.dm_db_index_physical_stats` are the
    header columns. These columns provide metadata and descriptive information around
    the types of information that are included in that row of the results. The header
    columns are listed in Table [5-22](#338675_4_En_5_Chapter.xhtml#Tab22). The most
    important information to pay attention to when looking at the header columns are
    the `alloc_unit_type_desc` and `index_level`. These two columns provide information
    on what type of data is being reported on and where in the index the statistics
    are originating from.


    Table 5-22: Header Columns for `sys.dm_db_index_physical_stats`


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | Database ID of the table or view |

    | `object_id` | `int` | Object ID of the table or view that the index is on |

    | `index_id` | `int` | Index ID of an index |

    | `partition_number` | `int` | 1-based partition number within the owning object:
    a table, view, or index |

    | `index_type_desc` | `nvarchar(60)` | Description of the index type |

    | `hobt_id` | `bigint` | Heap or B-tree ID of the index or partition |

    | `alloc_unit_type_desc` | `nvarchar(60)` | Description of the allocation unit
    type |

    | `index_depth` | `tinyint` | Number of index levels |

    | `index_level` | `tinyint` | Current level of the index |'
