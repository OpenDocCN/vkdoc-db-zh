    Beyond extent-level details, this DMF can be used to investigate indexes at the
    page level to understand all pages allocated to the table and how they relate
    to other pages in an index. Using the script in Listing [3-5](#338675_4_En_3_Chapter.xhtml#PC5),
    it can be seen that the extent starting on page 232 includes the allocated pages
