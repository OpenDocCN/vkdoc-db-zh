    清单 8-3

    创建和查询内存优化表的输出


    ### 索引概述


    虽然可以讨论内存优化表的更多细节，但本概述旨在提供其中一些最基本的方面。本章的其余部分将探讨内存优化表的索引。虽然内存优化表完全位于内存中，但仍然需要索引。内存驻留并不能阻止查找特定数据或筛选结果集的需要。索引提供了一种通向数据的路径机制，无论数据驻留在何处。


    为了支持内存优化表的索引，SQL Server 支持两种索引选项：哈希索引和范围索引。每个内存优化表最多可以支持八个索引。如果定义了主键，它将由两种索引类型之一支持，并成为允许的索引之一。如果未定义主键，则必须在创建表时至少定义一个索引。此外，内存优化表不允许在创建后更改索引。因此，对于内存优化表，所有索引都需要在创建时预先定义。


    本章的剩余部分将重点介绍哈希索引和范围索引，并考虑如何以及何时在内存优化表上构建每种索引。


    > 注意

    > 内存优化表的索引操作是非日志记录活动，因为它们仅发生在内存中，对存储在表中的数据状态没有影响。'
  raw: '## Memory-Optimized Tables Overview


    Before diving into the indexing options for memory-optimized tables, it is important
    to review the basics of memory-optimized tables. A memory-optimized table is a
    table type introduced in SQL Server 2014\. Unlike traditional tables and their
    indexes, memory-optimized tables reside entirely in memory. They are supported
    through disk structures but are not reliant on them for transactional processing.
    This differs from traditional tables, where the table is based on disk storage
    and typically only a portion of the table and its indexes reside in the buffer
    pool at any given time.


    The value provided by memory-optimized tables are the performance gains provided
    for highly transactional workloads. By managing the entire table in memory, transactions
    do not need to wait for data to be written to the buffer pool. In addition, memory-optimized
    tables eliminate locking and latching, which improves OLTP workloads by eliminating
    the classic contention experienced by traditional tables.


    The implementation of memory-optimized tables results in a few changes to the
    way in which tables are architected in SQL Server. Since the tables are now memory-resident,
    they are structured in a manner that is optimal for accessing the data in memory
    vs. retrieving a subset of the data from disk. For this reason, memory-optimized
    tables use hash and range indexes instead of B-trees for storing data. In addition,
    the tables do not need to read data from disk to the buffer pool like a traditional
    table, removing the need for latching between disk and memory structures.


    To create memory-optimized tables in a database, there are prerequisites that
    need to be prepared within a database. To begin, a filegroup dedicated to memory-optimized
    data needs to be added to the database with a file to support memory-optimized
    tables. Additionally, the database should have the property `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    enabled. This property ensures that transactions against memory-optimized tables
    are executed under SNAPSHOT isolation. In Listing [8-1](#338675_4_En_8_Chapter.xhtml#PC1),
    the database `MemOptIndexing` is prepared using these settings.


    ```

    USE master

    GO

    IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

    DROP DATABASE MemOptIndexing

    GO

    CREATE DATABASE MemOptIndexing

    GO

    ALTER DATABASE MemOptIndexing

    ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

    --This file location may change in your environment

    ALTER DATABASE MemOptIndexing

    ADD FILE (name=''memoryOptimizedData'',

    filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

    TO FILEGROUP memoryOptimizedFG

    ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

    GO

    Listing 8-1

    Preparing a Database for Memory-Optimized Tables

    ```


    Note


    The file location for the filestream indicated in Listing [8-1](#338675_4_En_8_Chapter.xhtml#PC1)
    may need to change to fit a given environment.


    The code in Listing [8-2](#338675_4_En_8_Chapter.xhtml#PC2) shows how to create
    a memory-optimized table. In this code example, the table `dbo.SalesOrderHeader`
    is created. There are two items of note in the table schema. First, the option
    that creates the table as a memory-optimized table is the `MEMORY_OPTIMIZED=ON`
    option. The second is the inclusion of a `NONCLUSTERED HASH` index on the table
    to index the data within memory. Other than those items, the table is much like
    any other table created in SQL Server.


    ```

    USE MemOptIndexing

    GO

    IF OBJECT_ID(''dbo.SalesOrderHeader'') IS NOT NULL

    DROP TABLE dbo.SalesOrderHeader

    CREATE TABLE dbo.SalesOrderHeader(

    SalesOrderID int NOT NULL,

    OrderDate datetime,

    DueDate datetime,

    ShipDate datetime,

    [Status] tinyint,

    CONSTRAINT IX_SalesOrderHeader_Hash PRIMARY KEY

    NONCLUSTERED HASH (SalesOrderID)

    WITH (BUCKET_COUNT = 35000))

    WITH (MEMORY_OPTIMIZED = ON)

    IF  OBJECT_ID(''tempdb..#tempHeader'') IS NOT NULL

    DROP TABLE #tempHeader

    SELECT SalesOrderID

    ,OrderDate

    ,DueDate

    ,ShipDate

    ,[Status]

    INTO #tempHeader

    FROM AdventureWorks2017.sales.SalesOrderHeader

    INSERT INTO dbo.SalesOrderHeader

    SELECT SalesOrderID

    ,OrderDate

    ,DueDate

    ,ShipDate

    ,[Status]

    FROM #tempHeader

    SET STATISTICS IO ON

    SET STATISTICS TIME ON

    PRINT ''Memory Optimized Table''

    SELECT *

    FROM dbo.SalesOrderHeader

    ORDER BY SalesOrderID

    PRINT ''Traditional Table''

    SELECT *

    FROM AdventureWorks2017.sales.SalesOrderHeader

    ORDER BY SalesOrderID

    SET STATISTICS IO OFF

    SET STATISTICS TIME OFF

    Listing 8-2

    Create a Memory-Optimized Table

    ```


    The additional code in Listing [8-2](#338675_4_En_8_Chapter.xhtml#PC2) inserts
    data into `MemOptIndexing.dbo.SalesOrderHeader` and queries that same data. To
    demonstrate the impact of querying data in a memory-optimized table, a similar
    query against `AdventureWorks2017.sales.SalesOrderHeader` is included. Examining
    the results, shown in Listing [8-3](#338675_4_En_8_Chapter.xhtml#PC3), provides
    a few insights into memory-optimized tables. There is no I/O impact from the memory-optimized
    table. While the `AdventureWorks2017.sales.SalesOrderHeader` query requires 689
    reads, there are no reads for `MemOptIndexing.dbo.SalesOrderHeader`. In addition,
    the amount of CPU time for `MemOptIndexing.dbo.SalesOrderHeader` is much lower,
    at 16 ms, than the CPU time for the query against `AdventureWorks2017.sales.SalesOrderHeader`,
    which is 78 ms.


    ```

    (31465 row(s) affected)

    (31465 row(s) affected)

    Memory Optimized Table

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    (31465 row(s) affected)

    SQL Server Execution Times:

    CPU time = 16 ms,  elapsed time = 310 ms.

    Traditional Table

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    (31465 row(s) affected)

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    SQL Server Execution Times:

    CPU time = 78 ms,  elapsed time = 785 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    Listing 8-3

    Output from Creating and Querying a Memory-Optimized Table

    ```


    While there are many more details of memory-optimized tables that can be discussed,
    this overview is intended to provide some of the most basic aspects. The rest
    of this chapter will examine indexing of memory-optimized tables. While memory-optimized
    tables are completely in memory, indexes are still required. Being in-memory doesn’t
    prevent the need to find specific data or filter result sets. Indexes provide
    the mechanism for providing a path to data, regardless of where it resides.


    To support indexing of memory-optimized tables, SQL Server supports two indexing
    options. These are hash and range indexes. Each memory-optimized table can support
    up to eight indexes. If a primary key is defined, this will be supported by one
    of the two index types and be one of the allowed indexes. If there is no primary
    key defined, the table must be created with at least one index. Additionally,
    memory-optimized tables do not allow indexing changes after creation. Therefore,
    all indexes need to be defined up front for a memory-optimized table when it is
    created.


    The remainder of this chapter will focus on the hash and range indexes with considerations
    for how and when to build each of them against memory-optimized tables.


    Note


    Index operations for memory-optimized tables are non-logged activities since they
    occur only within memory and have no impact on the state of the data stored in
    the table.'
  trans: '## 内存优化表概述


    ### 概述


    在深入探讨内存优化表的索引选项之前，有必要回顾一下内存优化表的基础知识。内存优化表是 SQL Server 2014 引入的一种表类型。与传统的表及其索引不同，内存优化表完全驻留在内存中。它们通过磁盘结构得到支持，但不依赖这些结构进行事务处理。这与传统表形成对比，传统表基于磁盘存储，在任何给定时间，通常只有一部分表及其索引驻留在缓冲池中。


    内存优化表提供的价值在于其为高度事务性工作负载带来的性能提升。通过将整个表管理在内存中，事务无需等待数据写入缓冲池。此外，内存优化表消除了锁定和闩锁，通过消除传统表所面临的经典争用问题，从而改善了
    OLTP 工作负载。


    内存优化表的实现导致在 SQL Server 中设计表的方式发生了一些变化。由于表现在是内存驻留的，它们被构建成一种对访问内存中数据最优的结构，这与从磁盘检索数据子集的方式不同。因此，内存优化表使用哈希索引和范围索引来存储数据，而不是
    B 树。此外，这些表不需要像传统表那样将数据从磁盘读取到缓冲池，从而消除了磁盘和内存结构之间对闩锁的需求。


    ### 创建前提条件


    要在数据库中创建内存优化表，需要在数据库内准备好一些先决条件。首先，需要向数据库添加一个专门用于内存优化数据的文件组，并包含一个支持内存优化表的文件。此外，数据库应启用属性
    `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`。此属性确保针对内存优化表的事务在 SNAPSHOT 隔离级别下执行。在清单 [8-1]
    中，数据库 `MemOptIndexing` 使用这些设置进行准备。


    ```sql

    USE master

    GO

    IF EXISTS(SELECT * FROM sys.databases WHERE name = ''MemOptIndexing'')

    DROP DATABASE MemOptIndexing

    GO

    CREATE DATABASE MemOptIndexing

    GO

    ALTER DATABASE MemOptIndexing

    ADD FILEGROUP memoryOptimizedFG CONTAINS MEMORY_OPTIMIZED_DATA

    --This file location may change in your environment

    ALTER DATABASE MemOptIndexing

    ADD FILE (name=''memoryOptimizedData'',

    filename= ''C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER\MSSQL\DATA\memoryOptimizedData'')

    TO FILEGROUP memoryOptimizedFG

    ALTER DATABASE MemOptIndexing SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=ON

    GO

    ```

