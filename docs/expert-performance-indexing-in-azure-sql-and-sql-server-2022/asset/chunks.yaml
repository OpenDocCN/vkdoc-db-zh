- fmt: '### System Columns


    `sys.dm_db_index_usage_stats` 中的最后一组列是系统列。系统列返回的信息与用户列大致相同，但仅包括与后台进程相关的活动。每当 SQL
    Server 中触发一个非用户进程时（例如自动统计信息更新），该活动都将通过这些列进行跟踪。表 [5-10](#338675_4_En_5_Chapter.xhtml#Tab10)
    列出了这些系统列。


    表 5-10


    `sys.dm_db_index_usage_stats` 中的系统列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | 系统查询执行的查找次数 |

    | `system_scans` | `bigint` | 系统查询执行的扫描次数 |

    | `system_lookups` | `bigint` | 系统查询执行的查找次数 |

    | `system_updates` | `bigint` | 系统查询执行的更新次数 |

    | `last_system_seek` | `datetime` | 上次系统查找的时间 |

    | `last_system_scan` | `datetime` | 上次系统扫描的时间 |

    | `last_system_lookup` | `datetime` | 上次系统查找的时间 |

    | `last_system_update` | `datetime` | 上次系统更新的时间 |


    对于大多数常见用法，这些列可以忽略。然而，理解它们的聚合方式是有价值的。要查看示例，请执行清单 [5-21](#338675_4_En_5_Chapter.xhtml#PC21)
    中的代码，该代码可能运行长达 1 分钟。这将更改 `SalesOrderDetail` 表中的大部分行。由于超过 20% 的行已更改，将触发自动统计信息更新。统计信息更新与用户活动没有直接关系，而是后台（即系统）进程。


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    Listing 5-21

    Update for Sales.SalesOrderDetail

    ```


    更新完成后，运行清单 [5-22](#338675_4_En_5_Chapter.xhtml#PC22) 中的 T-SQL 语句。这将从 `sys.stats`
    和 `sys.dm_db_index_usage_stats` 的系统列返回结果，如图 [5-16](#338675_4_En_5_Chapter.xhtml#Fig16)
    所示。其中包含 `system_scans` 列，该列显示 `Sales.SalesOrderDetail` 上已发生三次系统扫描。这些扫描与统计信息更新有关，其中一次发生在
    `UnitPriceDiscount` 列上。查看统计信息创建的时间可以显示更新顺序：先是 `CarrierTrackingNumber`，然后是 `SalesOrderDetailId`，接着是
    `ModifiedDate`，最后是 `UnitPriceDiscount`。


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig16_HTML.jpg)


    两个查询表结果的截图。1. 8 行 5 列。列标题为 object i d、name、auto created、no column name 和 stats
    column names。2. 3 行 10 列。列标题为 table name、index name、system seeks、system scans、system
    lookups、system updates、last system seek、last system scan、last system lookup 和
    last system update。


    图 5-16


    `sys.stats` 和 `sys.dm_db_index_usage_stats` 系统列查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT S.object_id,

    S.name,

    S.auto_created,

    STATS_DATE(S.object_id, S.stats_id),

    X.stats_column_names

    FROM sys.stats S

    CROSS APPLY

    (

    SELECT STRING_AGG(C.name, '','') AS stats_column_names

    FROM sys.stats_columns SC

    INNER JOIN sys.columns C

    ON C.object_id = SC.object_id

    AND C.column_id = SC.column_id

    WHERE S.object_id = SC.object_id

    AND S.stats_id = SC.stats_id

    ) X

    WHERE S.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    SELECT OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.system_seeks

    ,ius.system_scans

    ,ius.system_lookups

    ,ius.system_updates

    ,ius.last_system_seek

    ,ius.last_system_scan

    ,ius.last_system_lookup

    ,ius.last_system_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-22

    Query for System Columns in sys.dm_db_index_usage_stats

    ```


    从实用性的角度来看，这些列对于用户应用程序通常并不重要，但确实有助于更全面地了解所有 SQL Server 函数的索引使用情况。


    ### Index Usage Stats Summary


    本节讨论了在 DMV `sys.dm_db_index_usage_stats` 中找到的统计信息。此 DMV 提供了关于数据库中索引如何以及是否正在使用的极其有用的统计信息。通过长期监视这些统计信息，可以了解哪些索引提供了最大的价值。使用这些列来改进索引性能的策略将在第
    [9](#338675_4_En_9_Chapter.xhtml) 章讨论。


    ## Index Operational Statistics


    第三个需要考虑的统计信息区域是索引操作统计信息。这些统计信息通过 DMO `sys.dm_db_index_operational_stats` 提供给用户。从高层次来看，此
    DMO 提供了有关索引上发生的 I/O、锁定、闩锁和访问方法的详细信息。通过这些信息，可以识别可能遇到性能问题的索引。一旦识别出来，就有可能了解导致这些性能问题的原因。本节旨在帮助理解
    DMO 中提供的统计信息以及如何使用这些统计信息调查索引。


    与 `sys.dm_db_index_usage_stats` 不同，`sys.dm_db_index_operational_stats` 是一个动态管理函数（DMF）。因此，它在使用时需要提供参数。表
    [5-11](#338675_4_En_5_Chapter.xhtml#Tab11) 详细说明了此 DMF 的参数。


    表 5-11


    `sys.dm_db_index_operational_stats` 的参数


    | 参数名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 索引所在数据库的 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有数据库的索引信息。可以在此参数中使用函数
    `DB_ID`。 |

    | `object_id` | `int` | 应为其返回信息的表或视图的对象 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回数据库中所有表或视图的索引详细信息。
    |

    | `index_id` | `int` | 应为其返回信息的索引的索引 ID。提供值 `-1`、`NULL` 或 `DEFAULT` 将返回表或视图上所有索引的详细信息。
    |

    | `partition_number` | `int` | 应为其返回索引信息的分区号。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有分区的详细信息。
    |


    通过这些参数，可以广泛或窄地聚焦于索引统计信息。这种灵活性很有用，因为 `sys.dm_db_index_operational_stats` 不允许使用
    `CROSS APPLY` 或 `OUTER APPLY` 运算符。将参数传递给 DMF 时，其语法如清单 [5-23](#338675_4_En_5_Chapter.xhtml#PC23)
    所定义。


    ```

    sys.dm_db_index_operational_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | 0 | NULL | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    )

    Listing 5-23

    Index Operational Stats Syntax

    ```


    注意


    DMF `sys.dm_db_index_operational_stats` 可以接受使用 Transact-SQL 函数 `DB_ID()` 和 `OBJECT_ID()`。这些函数可分别用于参数
    `database_id` 和 `object_id`。'
  raw: '### System Columns


    The last set of columns in `sys.dm_db_index_usage_stats` are the system columns.
    System columns return the same general information as the user columns, except
    that they only include activity related to background processes. Whenever a non-user
    process triggers within SQL Server, such as an automatic statistics update, that
    activity will be tracked through these columns. Table [5-10](#338675_4_En_5_Chapter.xhtml#Tab10)
    lists the system columns.


    Table 5-10


    System Columns in sys.dm_db_index_usage_stats


    | Column Name | Data Type | Description |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | Number of seeks by system queries |

    | `system_scans` | `bigint` | Number of scans by system queries |

    | `system_lookups` | `bigint` | Number of lookups by system queries |

    | `system_updates` | `bigint` | Number of updates by system queries |

    | `last_system_seek` | `datetime` | Time of last system seek |

    | `last_system_scan` | `datetime` | Time of last system scan |

    | `last_system_lookup` | `datetime` | Time of last system lookup |

    | `last_system_update` | `datetime` | Time of last system update |


    For most common usage, these columns can be ignored. It is valuable, though, to
    understand how they are aggregated. To see an example, execute the code in Listing [5-21](#338675_4_En_5_Chapter.xhtml#PC21),
    which may run for up to 1 minute. This will change a majority of the rows in the
    `SalesOrderDetail` table. Since more than 20 percent of the rows have changed,
    an automatic statistics update will be triggered. The statistics update is not
    directly related to user activity and is instead a background (a.k.a. system)
    process.


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    Listing 5-21

    Update for Sales.SalesOrderDetail

    ```


    After the update has completed, run the T-SQL statements in Listing [5-22](#338675_4_En_5_Chapter.xhtml#PC22).
    This will return results from sys.stats and the system columns from sys.dm_db_index_usage_stats,
    shown in Figure [5-16](#338675_4_En_5_Chapter.xhtml#Fig16). Within these is the
    `system_scans` column that shows three system scans have occurred on Sales.SalesOrderDetail.
    These related to statistics updates, one of which occurred on the UnitPriceDiscount
    column. Looking at the times when the statistics were created shows the updates
    on CarrierTrackingNumber, then SalesOrderDetailId, ModifiedDate, and finally UnitPriceDiscount.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig16_HTML.jpg)


    A screenshot of 2 query tables results. 1\. 8 rows and 5 columns. The column headers
    are object i d, name, auto created, no column name, and stats column names. 2\.
    3 rows and 10 columns. The column headers are table name, index name, system seeks,
    system scans, system lookups, system updates, last system seek, last system scan,
    last system lookup and last system update.


    Figure 5-16


    sys.stats and sys.dm_db_index_usage_stats system columns query results


    ```

    USE AdventureWorks2017

    GO

    SELECT S.object_id,

    S.name,

    S.auto_created,

    STATS_DATE(S.object_id, S.stats_id),

    X.stats_column_names

    FROM sys.stats S

    CROSS APPLY

    (

    SELECT STRING_AGG(C.name, '','') AS stats_column_names

    FROM sys.stats_columns SC

    INNER JOIN sys.columns C

    ON C.object_id = SC.object_id

    AND C.column_id = SC.column_id

    WHERE S.object_id = SC.object_id

    AND S.stats_id = SC.stats_id

    ) X

    WHERE S.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    SELECT OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.system_seeks

    ,ius.system_scans

    ,ius.system_lookups

    ,ius.system_updates

    ,ius.last_system_seek

    ,ius.last_system_scan

    ,ius.last_system_lookup

    ,ius.last_system_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-22

    Query for System Columns in sys.dm_db_index_usage_stats

    ```


    From a usefulness perspective, these columns are not typically significant with
    respect to a user application, but do allow for a fuller picture of index usage
    across all SQL Server functions.


    ### Index Usage Stats Summary


    In this section, the statistics found in DMV `sys.dm_db_index_usage_stats` were
    discussed. This DMV provides extremely useful statistics about how and if indexes
    are being used in a database. By monitoring these statistics over the long run,
    it is possible to understand which indexes are providing the most value. Strategies
    for using these columns to improve indexing performance will be discussed in Chapter
    [9](#338675_4_En_9_Chapter.xhtml).


    ## Index Operational Statistics


    The third area of statistics to consider are index operational stats. These statistics
    are presented to users through the DMO `sys.dm_db_index_operational_stats`. From
    a high level, this DMO provides detailed information on I/O, locking, latching,
    and access methods that occur on indexes. Through this information, indexes that
    may be encountering performance issues can be identified. Once identified, it
    is possible to learn what is causing those performance issues. This section provides
    an understanding of the statistics provided in the DMO and how to investigate
    indexes using these statistics.


    Unlike sys.dm_db_index_usage_stats, `sys.dm_db_index_operational_stats` is a dynamic
    management function (DMF). Because of this, it requires parameters to be supplied
    when it is used. Table [5-11](#338675_4_En_5_Chapter.xhtml#Tab11) details the
    parameters for this DMF.


    Table 5-11


    Parameters for sys.dm_db_index_operational_stats


    | Parameter Name | Data Type | Description |

    | --- | --- | --- |

    | `database_id` | `smallint` | ID of the database where the indexes reside. Providing
    the value `0`, `NULL`, or `DEFAULT` will return index information for all databases.
    The function `DB_ID` can be used in this parameter. |

    | `object_id` | `int` | Object ID of the table or view for which information should
    be returned. Providing the value `0`, `NULL`, or `DEFAULT` will return index details
    for all tables or views in the database. |

    | `index_id` | `int` | Index ID of the index for which information should be returned.
    Providing the value `-1`, `NULL`, or `DEFAULT` will return details for all indexes
    on the table or view. |

    | `partition_number` | `int` | Partition number for which index information should
    be returned. Providing the value `0`, `NULL`, or `DEFAULT` will return details
    for all partitions. |


    Through the parameters, statistics on indexes can be as widely or narrowly focused
    as necessary. This flexibility is useful since `sys.dm_db_index_operational_stats`
    does not allow the use of the `CROSS APPLY` or `OUTER APPLY` operator. When passing
    the parameters into the DMF, the syntax for doing so is defined in Listing [5-23](#338675_4_En_5_Chapter.xhtml#PC23).


    ```

    sys.dm_db_index_operational_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | 0 | NULL | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    )

    Listing 5-23

    Index Operational Stats Syntax

    ```


    Note


    The DMF `sys.dm_db_index_operational stats` can accept the use of the Transact-SQL
    functions `DB_ID()` and `OBJECT_ID()`. These functions can be used for the parameters
    `database_id` and `object_id`, respectively.'
  trans: '

    ### 系统列


    `sys.dm_db_index_usage_stats` 中的最后一列组是系统列。系统列返回的信息与用户列大致相同，但仅包括与后台进程相关的活动。每当 SQL
    Server 中触发一个非用户进程时（例如自动统计信息更新），该活动都将通过这些列进行跟踪。表 5-10 列出了这些系统列。


    表 5-10


    `sys.dm_db_index_usage_stats` 中的系统列


    | 列名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `system_seeks` | `bigint` | 系统查询执行的查找次数 |

    | `system_scans` | `bigint` | 系统查询执行的扫描次数 |

    | `system_lookups` | `bigint` | 系统查询执行的查找次数 |

    | `system_updates` | `bigint` | 系统查询执行的更新次数 |

    | `last_system_seek` | `datetime` | 上次系统查找的时间 |

    | `last_system_scan` | `datetime` | 上次系统扫描的时间 |

    | `last_system_lookup` | `datetime` | 上次系统查找的时间 |

    | `last_system_update` | `datetime` | 上次系统更新的时间 |


    对于大多数常见用法，这些列可以忽略。然而，理解它们的聚合方式是有价值的。要查看示例，请执行清单 5-21 中的代码，该代码可能运行长达 1 分钟。这将更改
    `SalesOrderDetail` 表中的大部分行。由于超过 20% 的行已更改，将触发自动统计信息更新。统计信息更新与用户活动没有直接关系，而是后台（即系统）进程。


    ```

    USE AdventureWorks2017

    GO

    UPDATE Sales.SalesOrderDetail

    SET UnitPriceDiscount = 0.01

    WHERE UnitPriceDiscount = 0.00;

    Listing 5-21

    Update for Sales.SalesOrderDetail

    ```


    更新完成后，运行清单 5-22 中的 T-SQL 语句。这将从 `sys.stats` 和 `sys.dm_db_index_usage_stats` 的系统列返回结果，如图
    5-16 所示。其中包含 `system_scans` 列，该列显示 `Sales.SalesOrderDetail` 上已发生三次系统扫描。这些扫描与统计信息更新有关，其中一次发生在
    `UnitPriceDiscount` 列上。查看统计信息创建的时间可以显示更新顺序：先是 `CarrierTrackingNumber`，然后是 `SalesOrderDetailId`，接着是
    `ModifiedDate`，最后是 `UnitPriceDiscount`。


    ![](img/338675_4_En_5_Fig16_HTML.jpg)


    两个查询表结果的截图。1. 8 行 5 列。列标题为 object i d、name、auto created、no column name 和 stats
    column names。2. 3 行 10 列。列标题为 table name、index name、system seeks、system scans、system
    lookups、system updates、last system seek、last system scan、last system lookup 和
    last system update。


    图 5-16


    `sys.stats` 和 `sys.dm_db_index_usage_stats` 系统列查询结果


    ```

    USE AdventureWorks2017

    GO

    SELECT S.object_id,

    S.name,

    S.auto_created,

    STATS_DATE(S.object_id, S.stats_id),

    X.stats_column_names

    FROM sys.stats S

    CROSS APPLY

    (

    SELECT STRING_AGG(C.name, '','') AS stats_column_names

    FROM sys.stats_columns SC

    INNER JOIN sys.columns C

    ON C.object_id = SC.object_id

    AND C.column_id = SC.column_id

    WHERE S.object_id = SC.object_id

    AND S.stats_id = SC.stats_id

    ) X

    WHERE S.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    SELECT OBJECT_NAME(i.object_id) AS table_name

    ,i.name AS index_name

    ,ius.system_seeks

    ,ius.system_scans

    ,ius.system_lookups

    ,ius.system_updates

    ,ius.last_system_seek

    ,ius.last_system_scan

    ,ius.last_system_lookup

    ,ius.last_system_update

    FROM sys.indexes i

    INNER JOIN sys.dm_db_index_usage_stats ius

    ON i.object_id = ius.object_id

    AND i.index_id = ius.index_id

    AND ius.database_id = DB_ID()

    WHERE ius.object_id = OBJECT_ID(''Sales.SalesOrderDetail'');

    Listing 5-22

    Query for System Columns in sys.dm_db_index_usage_stats

    ```


    从实用性的角度来看，这些列对于用户应用程序通常并不重要，但确实有助于更全面地了解所有 SQL Server 函数的索引使用情况。


    ### 索引使用统计信息摘要


    本节讨论了在 DMV `sys.dm_db_index_usage_stats` 中找到的统计信息。此 DMV 提供了关于数据库中索引如何以及是否正在使用的极其有用的统计信息。通过长期监视这些统计信息，可以了解哪些索引提供了最大的价值。使用这些列来改进索引性能的策略将在第
    9 章讨论。


    ## 索引操作统计信息


    第三个需要考虑的统计信息区域是索引操作统计信息。这些统计信息通过 DMO `sys.dm_db_index_operational_stats` 提供给用户。从高层次来看，此
    DMO 提供了有关索引上发生的 I/O、锁定、闩锁和访问方法的详细信息。通过这些信息，可以识别可能遇到性能问题的索引。一旦识别出来，就有可能了解导致这些性能问题的原因。本节旨在帮助理解
    DMO 中提供的统计信息以及如何使用这些统计信息调查索引。


    与 `sys.dm_db_index_usage_stats` 不同，`sys.dm_db_index_operational_stats` 是一个动态管理函数（DMF）。因此，它在使用时需要提供参数。表
    5-11 详细说明了此 DMF 的参数。


    表 5-11


    `sys.dm_db_index_operational_stats` 的参数


    | 参数名 | 数据类型 | 描述 |

    | --- | --- | --- |

    | `database_id` | `smallint` | 索引所在数据库的 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有数据库的索引信息。可以在此参数中使用函数
    `DB_ID`。 |

    | `object_id` | `int` | 应为其返回信息的表或视图的对象 ID。提供值 `0`、`NULL` 或 `DEFAULT` 将返回数据库中所有表或视图的索引详细信息。
    |

    | `index_id` | `int` | 应为其返回信息的索引的索引 ID。提供值 `-1`、`NULL` 或 `DEFAULT` 将返回表或视图上所有索引的详细信息。
    |

    | `partition_number` | `int` | 应为其返回索引信息的分区号。提供值 `0`、`NULL` 或 `DEFAULT` 将返回所有分区的详细信息。
    |


    通过这些参数，可以广泛或窄地聚焦于索引统计信息。这种灵活性很有用，因为 `sys.dm_db_index_operational_stats` 不允许使用
    `CROSS APPLY` 或 `OUTER APPLY` 运算符。将参数传递给 DMF 时，其语法如清单 5-23 所定义。


    ```

    sys.dm_db_index_operational_stats (

    { database_id | NULL | 0 | DEFAULT }

    , { object_id | NULL | 0 | DEFAULT }

    , { index_id | 0 | NULL | -1 | DEFAULT }

    , { partition_number | NULL | 0 | DEFAULT }

    )

    Listing 5-23

    Index Operational Stats Syntax

    ```


    注意


    DMF `sys.dm_db_index_operational_stats` 可以接受使用 Transact-SQL 函数 `DB_ID()` 和 `OBJECT_ID()`。这些函数可分别用于参数
    `database_id` 和 `object_id`。

