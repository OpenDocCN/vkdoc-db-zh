    CONSTRAINT UQ_IndexOperationalStatsHistory

    UNIQUE (create_date, database_id, object_id, index_id, partition_number)

    );

    Listing 15-8

    Index Operational Stats Snapshot Tables Stats

    ```


    With the tables in place, the next step is to capture a current snapshot of the
    information in `sys.dm_db_index_operational_stats`. The information can be populated
    using the script in Listing [15-9](#338675_4_En_15_Chapter.xhtml#PC9). Since the
    Indexing Method is geared toward capturing information on indexing for all databases
    on the server, the values for the parameters for `sys.dm_db_index_operational_stats`
    are set to `NULL`. This will return results for all partitions of all indexes
    on all tables in all databases on the server. If there is a need to limit the
    list of databases, tables, or indexes, then filters may be added to reduce the
    amount of index metrics to collect.


    Like the index usage stats, this information should be captured about every 4
    hours, with one of the scheduled points being before the index maintenance on
    the server.


    ```

    USE IndexingMethod;

    GO

    TRUNCATE TABLE dbo.index_operational_stats_snapshot

    INSERT INTO dbo.index_operational_stats_snapshot

    SELECT GETDATE(),

    database_id,

    object_id,

    index_id,

    partition_number,

    hobt_id,

    leaf_insert_count,

    leaf_delete_count,

    leaf_update_count,

    leaf_ghost_count,

    nonleaf_insert_count,

    nonleaf_delete_count,

    nonleaf_update_count,

    leaf_allocation_count,

    nonleaf_allocation_count,

    leaf_page_merge_count,

    nonleaf_page_merge_count,

    range_scan_count,

    singleton_lookup_count,

    forwarded_fetch_count,

    lob_fetch_in_pages,

    lob_fetch_in_bytes,

    lob_orphan_create_count,

    lob_orphan_insert_count,

    row_overflow_fetch_in_pages,

    row_overflow_fetch_in_bytes,

    column_value_push_off_row_count,

    column_value_pull_in_row_count,

    row_lock_count,

    row_lock_wait_count,

    row_lock_wait_in_ms,

    page_lock_count,

    page_lock_wait_count,

    page_lock_wait_in_ms,

    index_lock_promotion_attempt_count,

    index_lock_promotion_count,

    page_latch_wait_count,

    page_latch_wait_in_ms,

    page_io_latch_wait_count,

    page_io_latch_wait_in_ms,

    tree_page_latch_wait_count,

    tree_page_latch_wait_in_ms,

    tree_page_io_latch_wait_count,

    tree_page_io_latch_wait_in_ms,

    page_compression_attempt_count,

    page_compression_success_count,

    version_generated_inrow,

    version_generated_offrow,

    ghost_version_inrow,

    ghost_version_offrow,

    insert_over_ghost_version_inrow,

    insert_over_ghost_version_offrow

    FROM sys.dm_db_index_operational_stats(NULL, NULL, NULL, NULL)

    WHERE database_id > 4;

    Listing 15-9

    Index Operational Stats Snapshot Population

    ```


    The next step after populating the snapshot is populating the history table. As
    before, the purpose of the history table is to store statistics on the deltas
    between two snapshots. The deltas provide information on which operations occurred,
    and they also help to timebox those operations so that, if needed, more focus
    can be placed on those during core vs. noncore hours. The business rule identifying
    when the statistics have been reset is similar to index usage stats: if any of
    the statistics on the index return a negative value, the row from the previous
    snapshot will be ignored. Also, any rows that return all zero values will not
    be included. Listing [15-10](#338675_4_En_15_Chapter.xhtml#PC10) shows the code
    used to generate the history delta.'
