  trans: '

    ### 启动页


    启动页类似于文件头页，它提供重要的元数据。不过，此页面提供的是关于数据库本身的信息，而非数据文件的信息。每个数据库有一个启动页，它位于数据库第一个数据文件的`第
    9 页`（参见图 2-5）。启动页上的一些信息包括：


    *   数据库版本

    *   创建日期

    *   数据库名称

    *   数据库 ID

    *   兼容性级别


    启动页上的一个重要属性是 `dbi_dbccLastKnownGood`。此属性提供了已知最后一次 `DBCC CHECKDB` 成功完成的日期。虽然数据库维护不在本书讨论范围内，但定期对数据库进行一致性检查对于确保高可用性至关重要。


    ### 页空间页


    为了跟踪页面是否有空间可用于插入行，每个数据文件都包含页空间页。这些页面是数据文件的第二页（参见图 2-5），之后每隔 `8,088` 页出现一个，用于跟踪数据库中的空闲空间量。PFS
    页上的每个字节代表数据文件中的一个后续页面，并提供有关该页面的基本分配信息。这包括页面上大约的空闲空间量。


    当数据库引擎需要存储 LOB 数据或堆数据时，它必须找到下一个可用页面并确定当前已分配页面的使用程度。此功能由 PFS 页面提供。每个字节内的位标识当前已使用的空间量。`位
    0–2` 确定页面是否处于以下空闲空间状态之一：


    *   页面为空。

    *   已使用 `1–50`%。

    *   已使用 `51–80`%。

    *   已使用 `81–95`%。

    *   已使用 `96–100`%。


    除了空闲空间，PFS 页面还包含位来标识页面的其他几种信息类型。例如，`位 3` 确定页面上是否存在幽灵记录。`位 4` 标识页面是否是索引分配映射的一部分（本章稍后描述）。`位
    5` 指示页面是否属于混合区。`位 6` 标识页面是否已分配。


    通过这些附加位，SQL Server 可以在较高层面确定页面的当前使用情况。这包括页面是否已分配。如果尚未分配，是否可用于 LOB 或堆数据？如果已分配，则
    PFS 页面提供如本节前面所述的详细信息。


    最后，当幽灵清理进程运行时，它无需检查数据库中的每个页面是否有记录需要清理。相反，可以检查 PFS 页面，只需要管理那些包含幽灵记录的页面。


    > 注意

    >

    > 索引本身处理非 LOB 数据和索引的空闲空间及页面分配。这些结构的页面分配由结构的定义决定。


    ### 全局分配映射页


    与 PFS 页面类似的是全局分配映射页。此页面确定一个区是否已被指定用作统一区，以及该区是否空闲且可用于分配。


    每个 GAM 页提供其 GAM 间隔内所有后续区的映射。一个 GAM 间隔由 GAM 页之后的 `64,000` 个区（`4 GB`）组成。GAM 页上的每个位代表
    GAM 页之后的一个区。第一个 GAM 页位于数据库文件的`第 2 页`（参见图 2-5）。


    为了确定一个区是否已分配为统一区，SQL Server 检查 GAM 页上代表该区的位。如果该区已分配，则该位设置为 `0`；否则，设置为 `1`，表示该区空闲且可用于其他目的。


    ### 共享全局分配映射页


    与 GAM 页几乎相同的是共享全局分配映射页。页面之间的主要区别在于，SGAM 页确定一个区是否被分配为混合区。与 GAM 页一样，SGAM 页也用于确定页面是否可用于分配。


    每个 SGAM 页提供每个 SGAM 间隔内所有后续区的映射。一个 SGAM 间隔由 SGAM 页之后的 `64,000` 个区（即 `4 GB`）组成。SGAM
    页上的每个位代表 SGAM 页之后的一个区。第一个 SGAM 页位于 GAM 页之后，数据库文件的`第 3 页`（参见图 2-5）。


    SGAM 页确定一个区何时被分配用作混合区。如果该区为此目的而分配并且有可用页面，则该位设置为 `1`。当设置为 `0` 时，表示该区未用作混合区，或者是所有页面都在使用的混合区。


    ### 差异更改映射页


    下一页是差异更改映射页。此页面用于确定 GAM 间隔中的某个区是否已更改。当一个区发生变化时，一个位值从 `0` 更改为 `1`。这些位存储在 DCM 页的一个位图行中，每个位代表一个区。


    DCM 页用于跟踪在完整数据库备份之间哪些区发生了更改。每当进行完整数据库备份时，DCM 页上的所有位都会重置为 `0`。然后，当关联的区中发生更改时，该位会更改回
    `1`。


    DCM 页的主要用途是为差异备份提供已修改区的列表。这比检查数据库中的每个页面或区以查看其是否已更改要高效得多。相反，DCM 页提供了需要备份的区的列表。


    第一个 DCM 页位于数据文件的`第 6 页`。后续的 DCM 页对应数据文件中的每个 GAM 间隔出现。


    ### 最小日志页


    DCM 页之后是最小日志页，以前称为批量更改映射页。ML 页用于指示 GAM 间隔中的某个区是否已被最小日志操作修改。任何受最小日志操作影响的区，其位值将设置为
    `1`，未受影响的则设置为 `0`。这些位存储在 ML 页的一个位图行中，每个位代表 GAM 间隔中的一个区。


    正如 ML 页的旧名称（批量更改映射）所暗示的，这些页面与 `BULK_LOGGED` 恢复模型结合使用。当数据库使用此恢复模型时，ML 页用于标识自上次事务日志备份以来通过最小日志操作修改的区。当事务日志备份完成时，ML
    页上的位将重置为 `0`。


    第一个 ML 页位于数据文件的`第 7 页`。后续的 ML 页对应数据文件中的每个 GAM 间隔出现。


    请注意，虽然在 SQL Server 中还有其他方法可以执行最小日志操作（例如 `BCP` 或批量列存储索引插入），但最小日志页仅跟踪与 `bulk_logged`
    恢复模型相关联的那些操作。

    '
- fmt: '### Index Allocation Map Page


    Most of the pages discussed so far provide information about whether there is
    data on the pages they cover. In addition to understanding if a page is open and
    available, SQL Server needs to know whether the information on a page is associated
    to a specific table or index. The pages that provide this information are the
    Index Allocation Map (IAM) pages.


    Every table or index first starts with an IAM page. This page indicates which
    extents within a GAM interval are associated with the table or index. If a table
    or index crosses more than one GAM interval, there will be more than one IAM page
    for the table or index.


    There are four types of pages that an IAM page associates with a table or index.
    These are data, index, large object, and small-large object pages. A bitmap row
    is used on the IAM page to associate a page to a table or index.


    Also located on the IAM page is an IAM header row. The IAM header provides the
    sequence number of IAM pages for a table or index, the starting page for the GAM
    interval that the IAM page is associated with, and a single-page allocation array.
    This is used when less than an extent has been allocated to a table or index.


    The IAM page provides a map through which all the pages of a table or index come
    together. This page is used when all extents for a table or index need to be located.


    ### Data Page


    Data pages are the most prevalent type of pages in any database and are used to
    store the data in a database’s tables. Except for LOB data types, all data for
    a record is located on data pages. LOB data types are stored on large object pages,
    discussed later in this section.


    ### Index Page


    Similar to data pages are index pages. These pages provide information on the
    structure of indexes and where data pages are located. For clustered indexes,
    the index pages build a hierarchy of pages that are used to navigate the clustered
    index’s binary tree structure. For non-clustered indexes, index pages perform
    the same function but are also used to store the key values that comprise the
    index.


    To build the hierarchy of pages within an index, the data contained in an index
    page provides a mapping of key values and page addresses. The key value is the
    key value from the index that the first sorted row on the child table contains,
    and the page address identifies where this is found.


    Index pages are constructed similarly to other page types in that they have a
    page header that contains all the standard information, such as page type, allocation
    unit, partition ID, and allocation status. The row offset array contains pointers
    to where the index data rows are located on the page. The index data rows contain
    two pieces of information: the key value and a page address.


    Index pages provide a map of how all data pages in an index are linked together,
    and therefore play an outsize role in understanding data storage in SQL Server.


    ### Large Object Page


    The limit for data on a single page is 8 KB. The maximum size, though, for some
    data types can be as high as 2 GB. Therefore, for these data types, another storage
    mechanism is required to store them: the large object page type.


    The data types that can utilize LOB pages include `text`, `ntext`, `image`, `nvarchar(max)`,
    `varchar(max)`, `varbinary(max)`, and `xml`. When the data for one of these data
    types is stored on a data page, the LOB page will be used if the size of the row
    exceeds 8 KB. In these cases, the column will contain references to the LOB pages
    required for the data and store them on LOB pages instead (see Figure [2-6](#338675_4_En_2_Chapter.xhtml#Fig6)).


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig6_HTML.png)


    A diagram of 2 dog-eared file icons labeled data page and L OB page, respectively,
    on the header section. The former''s lone record labeled L O B ref within row
    1 is linked to the latter''s lone record labeled L O B row.


    Figure 2-6


    Data page link to the LOB page


    Note


    SQL Server 2022 includes System Page Latch Concurrency Enhancements that allow
    for concurrent GAM and SGAM updates, which will greatly reduce contention in scenarios
    when workloads generate heavy updates to GAM or SGAM pages.


    ### Organizing Pages


    So far, the low-level components that make up the internals for indexing have
    been reviewed. While the low-level structures that comprise indexing internals
    are important, their context is only meaningful when applied to the organization
    and storage of data within a database.


    The organizational structures in SQL Server are


    *   Heap


    *   B-tree


    *   Columnstore


    These structures map to specific index types that will be discussed later in this
    chapter. In this section, the ways to organize pages will be examined in order
    to build that understanding.


    Note


    In the structures for organizing indexes, the levels of the index that contain
    index pages are considered `nonleaf` levels. When referencing levels that contain
    data pages, the levels are called `leaf levels`.


    ### Heap Structure


    The default structure for organizing pages is called a `heap`. Heaps occur when
    a B-tree structure, discussed in the next section, is not used to organize the
    data pages in a table. Conceptually, a heap can be envisioned to be a pile of
    data pages in no particular order, as shown in Figure [2-7](#338675_4_En_2_Chapter.xhtml#Fig7).
    In this example, the only way to retrieve all of the “Madison” records is to check
    each page to see whether “Madison” is on the page.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig7_HTML.jpg)


    A diagram of a stack of six dog-eared file icons. Each has a different name within
    quotations as its header. The names labeled are Sarah, Nikolai, Dysin, Aspen,
    and Madison.


    Figure 2-7


    Heap pile example


    From an internals perspective, though, heaps are more than a pile of pages. While
    unsorted, heaps have a few key components that organize the pages for easy access.
    All heaps start with an IAM page, shown in Figure [2-8](#338675_4_En_2_Chapter.xhtml#Fig8).
    IAM pages map out which extents and single-page allocations within a GAM interval
    are associated with an index. For a heap, the IAM page is the only mechanism for
    associating data pages and extents to a heap. The heap structure does not enforce
    any sort of ordering on the pages that are associated with the heap. The first
    page available in a heap is the first page found in the database file for the
    heap.


    ![](images/338675_4_En_2_Chapter/338675_4_En_2_Fig8_HTML.jpg)


    A branching diagram of 3 dog-eared file icons labeled Madison, Dysin, and Nikolai
    under a dog-eared file icon labeled I A M, which connects to another dog-eared
    file icon labeled I A M with branches for 3 dog-eared file icons labeled Sarah,
    Aspen, and Tasha.


    Figure 2-8


    Heap structure


    The IAM page lists all the data pages associated with the heap. The data pages
    for the heap store the rows for the table, with the use of LOB pages as needed.
    When the IAM page has no more pages available to allocate in the GAM interval,
    a new IAM page is allocated to the heap, and the next set of pages and their corresponding
    rows are added to the heap, as detailed in Figure [2-1](#338675_4_En_2_Chapter.xhtml#Fig1).
    In this image, a heap structure is flat. From top to bottom, there is only ever
    one level from the IAM pages to the data pages of the structure.


    While a heap provides a mechanism for organizing pages, it does not relate to
    an index type. A heap structure is used when a table does not have a clustered
    index. When a heap stores rows in a table, the rows are inserted without an enforced
    order. Therefore, a heap does not guarantee that rows will be returned in any
    particular order, and code should never assume an order, even an arbitrary one.'
