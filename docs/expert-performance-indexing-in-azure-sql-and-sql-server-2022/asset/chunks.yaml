- fmt: '#### FreeSpace Scans and Page Fetches per Second


    The performance counter `FreeSpace Scans/sec` is another counter related to heaps.
    This counter represents the activity that happens when records are being inserted
    into a table with a heap. During inserts into heaps, there can be activity on
    the `GAM`, `SGAM`, and `PFS` pages. If the rate of inserts is high enough, contention
    can occur on these pages. Analyzing the values of the `FreeSpace Scans/sec` and
    `FreeSpace Page Fetches/sec` counters provides an opportunity to keep track of
    this activity and determine when the volume of activity is increasing and when
    heaps may need to be analyzed further. Used in conjunction, `FreeSpace Scans/sec`
    and `FreeSpace Page Fetches/sec` counters indicate the frequency and volume of
    scan activity on heaps, respectively.


    As with forwarded records, this metric only applies to heaps and will not provide
    useful insight in environments that do not use heaps for data storage.


    ##### Analyzing the FreeSpace Scans/sec Counter


    Listing 16-5 provides the query to analyze the `FreeSpace Scans/sec` counter.
    It provides a snapshot of `FreeSpace Scans` activity on the SQL Server instance.
    The query provides aggregations of the counter with minimum, average, and maximum
    values. Similar to the previous counter, this counter also follows recommended
    guidelines of one `FreeSpace Scans/sec` for every ten `Batch Requests`. The `PctViolation`
    column measures the percentage of time that the counter exceeds the guideline.


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))
    FreeSpaceScans,

    MAX(IIF(counter_name = ''FreeSpace Page Fetches/sec'', Calculated_Counter_value,
    NULL)) FreeSpacePageFetches,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''FreeSpace Scans/sec'', ''FreeSpace Page Fetches/sec'',
    ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FreeSpaceScans) AS MinFreeSpaceScans,

    AVG(FreeSpaceScans) AS AvgFreeSpaceScans,

    MAX(FreeSpaceScans) AS MaxFreeSpaceScans,

    MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,

    AVG(FreeSpacePageFetches) AS AvgFreeSpacePageFetches,

    MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```


    Listing 16-5: FreeSpace Scans Counter Analysis


    ##### Identifying Heaps with High Insert Rates


    When the `FreeSpace Scans/sec` number is high, the analysis will focus on determining
    which heaps in the databases have the highest rate of inserts. To identify the
    tables with the highest inserts on heaps, use the information in the monitoring
    tables from `sys.dm_db_index_operational_stats`. The column with the information
    on inserts is `leaf_insert_count`. The query in Listing 16-6 provides a list of
    the heaps in the monitoring table `dbo.index_operational_stats_history` with the
    most indexes.


    ```sql

    USE IndexingMethod

    GO

    SELECT

    QUOTENAME(DB_NAME(database_id)) AS database_name

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName

    , SUM(leaf_insert_count) AS leaf_insert_count

    , SUM(leaf_allocation_count) AS leaf_allocation_count

    FROM dbo.index_operational_stats_history

    WHERE index_id = 0

    AND database_id > 4

    and QUOTENAME(OBJECT_NAME(object_id, database_id)) IS NOT NULL

    GROUP BY object_id, database_id

    ORDER BY leaf_insert_count DESC

    ```


    Listing 16-6: FreeSpace Scans Snapshot Query


    ##### Example Results and Mitigation


    Reviewing the table in the demonstration script in Listing 16-3 with the `FreeSpace
    Scans` snapshot query yields the results in Figure 16-2. As this example shows,
    there were thousands of inserts into the heap. While only a single table is shown
    in the results, the tables that appear at the top of this list are going to be
    the ones most often contributing to `FreeSpace Scans/sec`.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig2_HTML.png)


    Figure 16-2: FreeSpace Scans per second snapshot query results


    Once the contributing heaps are identified, the best method for mitigating this
    issue is to create a clustered index on the tables with the most inserts. Since
    the counter is based on scans of free space on the `GAM`, `SGAM`, and `PFS` pages,
    building clustered indexes on the heap tables will move the allocation of pages
    to `IAM` pages, which are dedicated to each clustered index, as compared to heaps
    where they will compete for page allocations with other heaps.'
  raw: '#### FreeSpace Scans and Page Fetches per Second


    The performance counter FreeSpace Scans/sec is another counter related to heaps.
    This counter represents the activity that happens when records are being inserted
    into a table with a heap. During inserts into heaps, there can be activity on
    the GAM, SGAM, and PFS pages. If the rate of inserts is high enough, contention
    can occur on these pages. Analyzing the values of the FreeSpace Scans/sec and
    FreeSpace Page Fetches/sec counters provides an opportunity to keep track of this
    activity and determine when the volume of activity is increasing and when heaps
    may need to be analyzed further. Used in conjunction, FreeSpace Scans/sec and
    FreeSpace Page Fetches/sec counters indicate the frequency and volume of scan
    activity on heaps, respectively.


    As with forwarded records, this metric only applies to heaps and will not provide
    useful insight in environments that do not use heaps for data storage.


    Listing [16-5](#338675_4_En_16_Chapter.xhtml#PC5) provides the query to analyze
    the FreeSpace Scans/sec counter. It provides a snapshot of FreeSpace Scans activity
    on the SQL Server instance. The query provides aggregations of the counter with
    minimum, average, and maximum values. Similar to the previous counter, this counter
    also follows recommended guidelines of one FreeSpace Scans/sec for every ten Batch
    Requests. The `PctViolation` column measures the percentage of time that the counter
    exceeds the guideline.


    ```

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))
    FreeSpaceScans,

    MAX(IIF(counter_name = ''FreeSpace Page Fetches/sec'', Calculated_Counter_value,
    NULL)) FreeSpacePageFetches,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''FreeSpace Scans/sec'', ''FreeSpace Page Fetches/sec'',
    ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FreeSpaceScans) AS MinFreeSpaceScans,

    AVG(FreeSpaceScans) AS AvgFreeSpaceScans,

    MAX(FreeSpaceScans) AS MaxFreeSpaceScans,

    MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,

    AVG(FreeSpacePageFetches) AS AvgFreeSpacePageFetches,

    MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1\. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    Listing 16-5

    FreeSpace Scans Counter Analysis

    ```


    When the FreeSpace Scans/sec number is high, the analysis will focus on determining
    which heaps in the databases have the highest rate of inserts. To identify the
    tables with the highest inserts on heaps, use the information in the monitoring
    tables from `sys.dm_db_index_operational_stats`. The column with the information
    on inserts is `leaf_insert_count`. The query in Listing [16-6](#338675_4_En_16_Chapter.xhtml#PC6)
    provides a list of the heaps in the monitoring table `dbo.index_operational_stats_history`
    with the most indexes.


    ```

    USE IndexingMethod

    GO

    SELECT

    QUOTENAME(DB_NAME(database_id)) AS database_name

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName

    , SUM(leaf_insert_count) AS leaf_insert_count

    , SUM(leaf_allocation_count) AS leaf_allocation_count

    FROM dbo.index_operational_stats_history

    WHERE index_id = 0

    AND database_id > 4

    and QUOTENAME(OBJECT_NAME(object_id, database_id)) IS NOT NULL

    GROUP BY object_id, database_id

    ORDER BY leaf_insert_count DESC

    Listing 16-6

    FreeSpace Scans Snapshot Query

    ```


    Reviewing the table in the demonstration script in Listing [16-3](#338675_4_En_16_Chapter.xhtml#PC3)
    with the FreeSpace Scans snapshot query yields the results in Figure [16-2](#338675_4_En_16_Chapter.xhtml#Fig2).
    As this example shows, there were thousands of inserts into the heap. While only
    a single table is shown in the results, the tables that appear at the top of this
    list are going to be the ones most often contributing to FreeSpace Scans/sec.


    ![](images/338675_4_En_16_Chapter/338675_4_En_16_Fig2_HTML.png)


    A table with 4 column and 2 row. The column headers are database name, object
    name, leaf insert count, and leaf allocation count.


    Figure 16-2


    FreeSpace Scans per second snapshot query results


    Once the contributing heaps are identified, the best method for mitigating this
    issue is to create a clustered index on the tables with the most inserts. Since
    the counter is based on scans of free space on the GAM, SGAM, and PFS pages, building
    clustered indexes on the heap tables will move the allocation of pages to IAM
    pages, which are dedicated to each clustered index, as compared to heaps where
    they will compete for page allocations with other heaps.'
  trans: '#### 每秒空闲空间扫描与页面获取次数


    性能计数器 `FreeSpace Scans/sec` 是另一个与堆表相关的计数器。此计数器表示当记录被插入到堆表中时发生的活动。在向堆表执行插入操作时，可能会在
    `GAM`、`SGAM` 和 `PFS` 页面上产生活动。如果插入速率足够高，这些页面上就可能发生争用。分析 `FreeSpace Scans/sec` 和
    `FreeSpace Page Fetches/sec` 计数器的值，提供了一个跟踪此活动并确定活动量何时增加以及堆表何时可能需要进一步分析的机会。结合使用时，`FreeSpace
    Scans/sec` 和 `FreeSpace Page Fetches/sec` 计数器分别指示了堆表上扫描活动的频率和数量。


    与转发改的记录一样，此指标仅适用于堆表，在不使用堆表存储数据的环境中不会提供有用的洞察。


    ##### 分析 FreeSpace Scans/sec 计数器


    清单 16-5 提供了分析 `FreeSpace Scans/sec` 计数器的查询。它提供了 SQL Server 实例上 `FreeSpace Scans`
    活动的快照。该查询提供了该计数器的最小值、平均值和最大值聚合。与前一个计数器类似，该计数器也遵循推荐的准则，即每十个 `Batch Requests/sec`
    对应一个 `FreeSpace Scans/sec`。`PctViolation` 列衡量了计数器超出准则的时间百分比。


    ```sql

    USE IndexingMethod;

    GO

    WITH CounterSummary

    AS (SELECT create_date,

    server_name,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))
    FreeSpaceScans,

    MAX(IIF(counter_name = ''FreeSpace Page Fetches/sec'', Calculated_Counter_value,
    NULL)) FreeSpacePageFetches,

    MAX(IIF(counter_name = ''FreeSpace Scans/sec'', Calculated_Counter_value, NULL))

    / (NULLIF(MAX(IIF(counter_name = ''Batch Requests/sec'', Calculated_Counter_value,
    NULL)), 0) * 10) AS ForwardedRecordRatio

    FROM dbo.IndexingCounters

    WHERE counter_name IN ( ''FreeSpace Scans/sec'', ''FreeSpace Page Fetches/sec'',
    ''Batch Requests/sec'' )

    GROUP BY create_date,

    server_name)

    SELECT server_name,

    MIN(FreeSpaceScans) AS MinFreeSpaceScans,

    AVG(FreeSpaceScans) AS AvgFreeSpaceScans,

    MAX(FreeSpaceScans) AS MaxFreeSpaceScans,

    MIN(FreeSpacePageFetches) AS MinFreeSpacePageFetches,

    AVG(FreeSpacePageFetches) AS AvgFreeSpacePageFetches,

    MAX(FreeSpacePageFetches) AS MaxFreeSpacePageFetches,

    MIN(ForwardedRecordRatio) AS MinForwardedRecordRatio,

    AVG(ForwardedRecordRatio) AS AvgForwardedRecordRatio,

    MAX(ForwardedRecordRatio) AS MaxForwardedRecordRatio,

    FORMAT(1. * SUM(IIF(ForwardedRecordRatio > 1, 1, NULL)) / COUNT(*), ''0.00%'')
    AS PctViolation

    FROM CounterSummary

    GROUP BY server_name;

    ```


    清单 16-5：空闲空间扫描计数器分析


    ##### 识别具有高插入率的堆表


    当 `FreeSpace Scans/sec` 数值较高时，分析将侧重于确定数据库中哪些堆表具有最高的插入速率。要识别堆表上插入最多的表，请使用来自 `sys.dm_db_index_operational_stats`
    的监控表中的信息。包含插入信息的列是 `leaf_insert_count`。清单 16-6 中的查询提供了监控表 `dbo.index_operational_stats_history`
    中索引最多的堆表列表。


    ```sql

    USE IndexingMethod

    GO

    SELECT

    QUOTENAME(DB_NAME(database_id)) AS database_name

    ,QUOTENAME(OBJECT_SCHEMA_NAME(object_id, database_id)) + ''.''

    + QUOTENAME(OBJECT_NAME(object_id, database_id)) AS ObjectName

    , SUM(leaf_insert_count) AS leaf_insert_count

    , SUM(leaf_allocation_count) AS leaf_allocation_count

    FROM dbo.index_operational_stats_history

    WHERE index_id = 0

    AND database_id > 4

    and QUOTENAME(OBJECT_NAME(object_id, database_id)) IS NOT NULL

    GROUP BY object_id, database_id

    ORDER BY leaf_insert_count DESC

    ```


    清单 16-6：空闲空间扫描快照查询


    ##### 示例结果与缓解措施


    回顾清单 16-3 演示脚本中的表格并结合 `FreeSpace Scans` 快照查询，得到图 16-2 所示的结果。如本示例所示，对堆表进行了数千次插入。虽然结果中只显示了一个表，但出现在此列表顶部的表将是最常导致
    `FreeSpace Scans/sec` 的表。


    ![](img/338675_4_En_16_Fig2_HTML.png)


    图 16-2：每秒空闲空间扫描快照查询结果


    一旦识别出导致问题的堆表，缓解此问题的最佳方法是在插入最多的表上创建聚集索引。由于该计数器基于对 `GAM`、`SGAM` 和 `PFS` 页面上空闲空间的扫描，在堆表上构建聚集索引会将页面分配转移到
    `IAM` 页面，这些页面专用于每个聚集索引，而堆表则会与其他堆表竞争页面分配。'
- fmt: "## Full Scans per Second\n\n通过性能计数器 `Full Scans/sec`，可以测量在聚集索引、非聚集索引和堆上执行的完整扫描次数。在执行计划中，此计数器在索引扫描和表扫描期间触发。执行完整扫描的速率越高，发生与完整扫描相关的性能问题的可能性就越大。从性能角度来看，这会影响\
    \ `Page Life Expectancy` 值，因为数据在内存中被换入换出，并且可能存在 I/O 争用，因为查询需要等待数据被加载到内存中。\n\n\
    使用清单 [16-7](#338675_4_En_16_Chapter.xhtml#PC7) 中的查询，可以分析当前监控窗口内 `Full Scans/sec`\
    \ 的状态。与之前的计数器一样，考虑此计数器与 `Batch Requests/sec` 计数器之间的关系非常重要。当 `Full Scans/sec` 与\
    \ `Batch Requests/sec` 的比率超过千分之一时，可能存在需要进一步审查的 `Full Scans/sec` 问题。\n\n```sql\n\
    USE IndexingMethod;\nGO\nWITH CounterSummary\nAS (SELECT create_date,\n      \
    \     server_name,\n           MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value,\
    \ NULL)) FullScans,\n           MAX(IIF(counter_name = 'Full Scans/sec', Calculated_Counter_value,\
    \ NULL))\n           / (NULLIF(MAX(IIF(counter_name = 'Batch Requests/sec', Calculated_Counter_value,\
    \ NULL)), 0) * 1000) AS FullRatio\n    FROM dbo.IndexingCounters\n    WHERE counter_name\
    \ IN ( 'Full Scans/sec', 'Batch Requests/sec' )\n    GROUP BY create_date,\n \
    \            server_name)\nSELECT server_name,\n       MIN(FullScans) AS MinFullScans,\n\
    \       AVG(FullScans) AS AvgFullScans,\n       MAX(FullScans) AS MaxFullScans,\n\
    \       MIN(FullRatio) AS MinFullRatio,\n       AVG(FullRatio) AS AvgFullRatio,\n\
    \       MAX(FullRatio) AS MaxFullRatio,\n       FORMAT(1. * SUM(IIF(FullRatio\
    \ > 1, 1, 0)) / COUNT(*), '0.00%') AS PctViolation\nFROM CounterSummary\nGROUP\
    \ BY server_name;\n```\nListing 16-7 Full Scans Counter Analysis\n\n在演示如何检查高 `Full\
    \ Scans/sec` 计数器值的根本原因之前，将设置一些示例统计信息。清单 [16-8](#338675_4_En_16_Chapter.xhtml#PC8)\
    \ 将提供大量的完整扫描，这些扫描可以通过前一节详述的监控过程收集。执行示例脚本后，请务必执行收集监控信息的脚本。\n\n```sql\nUSE AdventureWorks2017\n\
    GO\nSET NOCOUNT ON\nEXEC ('SELECT * INTO #temp FROM Sales.SalesOrderHeader')\n\
    GO 1000\n```\nListing 16-8 Full Scans Example Query\n\n主要目标是识别 `Full Scans/sec`\
    \ 计数器受哪些索引影响。一旦识别出索引，就需要对其进行分析，以确定它们是否适合该操作，或者是否需要其他性能调整策略来减少在完整扫描操作中使用该索引。用于调查完整扫描的\
    \ DMO 是监控表中的 `sys.dm_db_index_usage_stats`；在监控中，这存储在 `dbo.index_usage_stats_history`\
    \ 表中。\n\n可以使用清单 [16-9](#338675_4_En_16_Chapter.xhtml#PC9) 中所示的查询来识别索引。快照结果排除了没有任何行的索引。这些索引仍用于完整扫描，但减轻这些索引上的扫描不会对性能产生重大影响。为了对结果排序，索引上的扫描次数乘以表中的行数。通过这种方式排序，输出会侧重于那些可能对降低\
