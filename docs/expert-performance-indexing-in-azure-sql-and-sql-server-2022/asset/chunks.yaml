    正如本节代码所演示的，使用 T-SQL 脚本可能比使用维护计划任务复杂得多。这种复杂性的优点在于，一旦脚本完成，它可以被包装在存储过程中，并在任何 SQL
    Server 实例上使用。此脚本旨在作为使用 T-SQL 脚本实现自动化碎片整理的第一步。它没有考虑分区表，也没有在重建或重组索引之前检查索引是否正在被使用。优点在于，脚本化解决方案可以智能地决定如何及何时整理索引碎片，而不是像“开卡车”一样粗放地对一组数据库进行重新索引。


    此外，自定义 T-SQL 解决方案可以允许对数据库、表或索引进行自定义的维护或忽略。当管理员对应用程序的工作方式有深入了解，并且知道哪些索引需要特殊维护（或根本不需要）时，这非常有帮助。


