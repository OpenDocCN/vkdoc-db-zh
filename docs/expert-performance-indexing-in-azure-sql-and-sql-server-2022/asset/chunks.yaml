    on `FirstName` with the columns `LastName`, `IsActive`, and `EmailAddress` included
    as data on the index. With these indexes in place, the queries from the previous
    patterns, shown in Listing 13-24, need to be tested against the table.


    There are two key points to pay attention to regarding how the queries perform
    with the Included Columns pattern vs. with the other patterns. First, all execution
    plans for the queries, shown in Figure 13-35, are using index seek operations.
    The seek operation is expected for the query that is just filtering on `FirstName`,
    but it can also be used when there is an additional filter on `LastName`. SQL
    Server can do this because underneath the index seek, it is performing a range
    scan of the rows that match the first predicate and then removing the `LastName`
    results that don''t have the value of `Cox`. The second item to note is the number
