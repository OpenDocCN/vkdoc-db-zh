    and that filtering on the rightmost column can use the index but cannot use it
    optimally with a seek operation. The last validation is to check the behavior
    of columns in an index that are neither on the left nor right side. In Listing
    [10-12](#338675_4_En_10_Chapter.xhtml#PC12), a query is included that uses the
    middle column in the index `IX_MythFour`. As with the previous example, the execution
    plan for the middle column query, shown in Figure [10-6](#338675_4_En_10_Chapter.xhtml#Fig6),
    uses the index but also uses a scan operation. The query is able to use the index,
    but because it was unable to apply an ordered filter to the index, it could not
    be applied in an optimal fashion.


    ![](images/338675_4_En_10_Chapter/338675_4_En_10_Fig6_HTML.jpg)


