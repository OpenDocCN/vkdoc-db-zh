  trans: '

    ### 其他堆表场景


    通常，其他适合使用堆表的场景相对较少且罕见。使用临时对象之所以合理，是因为与其相比，创建有组织的结构（如聚集索引）来支持性能所需的时间，数据被访问的频率较低。此场景也可应用于暂存表，因为数据在移动到最终目的地之前可能被多次插入和修改。


    在高插入量的环境中，使用堆表以避免维护 B 树的开销看似合理。此场景的问题在于，插入带来的收益会被访问数据的需求所抵消——访问数据需要其他非聚集索引，而这些索引又需要维护其排序顺序。


    当面临需要在任何表上使用堆表的情况时，首先应考虑能否证明聚集索引是数据存储的负担，然后再决定是否使用它们。在考虑堆表之前，也应考虑更新的索引结构（如聚集列存储索引或内存优化表）是否能提供所需的性能。最后，要确保特定更改带来的性能提升是有意义的。研究、测试和实施仅带来
    1%性能提升的索引更改，在极少数情况下才是值得的。


    本节的要点在于强调，堆表在现实世界中的使用比通常意识到的更为频繁。尽管大多数最佳实践都反对使用它们，但在某些情况下它们是合适的选择，而在其他情况下，它们是否存在并不重要。随着讨论深入到聚集索引，将会清楚为何通常默认使用聚集索引是好主意，而仅在无关紧要（例如大多数临时对象的用例）或堆表性能优于聚集索引的情况下才使用堆表。


    ## 聚集索引


    本书通篇讨论了使用聚集索引作为表数据页组织结构的价值和偏好。聚集索引根据其键列组织表中的数据。索引的所有数据页都根据键列逻辑存储。这样做的好处是通过键列实现对数据的最优访问。


    新表几乎总是应该建立聚集索引。不过，在构建表时，问题是应为聚集索引的键列选择什么。通常，定义良好的聚集索引具备以下几个特征：


    *   静态

    *   窄

    *   唯一

    *   递增


    这些属性中的每一个都有助于创建有效的聚集索引，原因如下。


    ### 静态


    首先，聚集索引应该是静态的。为聚集索引定义的键列应在行的生命周期内保持静态。使用静态值时，行在索引中的位置在行更新时不会改变。当使用非静态键列时，行在聚集索引中的位置可能会改变，这可能需要将行插入到不同的页面上。此外，所有非聚集索引都需要修改以更改其中存储的键列值，因为聚集索引键列包含在非聚集索引中。这些问题共同导致表上聚集索引和非聚集索引存在大量碎片的可能性。


    ### 窄


    聚集索引应具备的下一个属性是窄。理想情况下，聚集索引键应只包含单个列。该列应使用针对表中存储数据而言合理且最小的数据类型。窄的聚集索引很重要，因为每行的聚集索引键都包含在与该表关联的所有非聚集索引中。聚集索引键越宽，所有非聚集索引就越宽，它们所需的页面就越多。正如其他章节所讨论的，索引中的页面越多，使用它所需的资源就越多。这可能会影响该表上的查询性能。


    ### 唯一


    聚集索引也应该是唯一的。聚集索引在索引中的特定位置存储单行；对于聚集索引键列中的重复行，需要一个唯一值来提供行所需的唯一性。当向行添加唯一值时，它会扩展 4
    个字节，这会改变聚集索引的宽度，并导致与非窄聚集索引相关的相同问题。关于唯一值的更多信息可以在第 2 章中找到。


    ### 递增


    最后，定义良好的聚集索引将基于一个递增的值。使用递增的聚集键会使新行添加到聚集索引的末尾。将新行放置在 B 树的末尾，可以减少如果行插入到聚集索引中间可能发生的碎片。


    ### 访问路径


    选择聚集索引键列时的另一个考虑是，它们应代表经常用于访问行的列。是否有特定的列或值最常用于从表中检索行？如果有，这些列是聚集索引键的良好候选。最终，当查询能够通过阻力最小的路径访问数据时，其性能将达到最佳。同样，当行可以快速写入索引末尾而无需立即执行额外的后台任务时，写操作将最有效且干扰最小。


    ## 聚集索引模式


    在考虑上述选择聚集索引策略的指南时，有一些模式可用于识别和建模聚集索引。聚集索引模式包括：


    *   标识序列

    *   自然键

    *   外键

    *   多列

    *   全局唯一标识符


    在本节的剩余部分，将逐一介绍这些模式，描述每种模式以及如何识别何时使用该模式。

    '
- fmt: '# Identity Sequence


    The most frequent pattern for building a clustered index is to pair it with a
    column on a table that has been configured to be ever-increasing using either
    the `IDENTITY` property or the `SEQUENCE` object. In this pattern, the `IDENTITY`
    column is often also the `PRIMARY KEY` on the table. The data type is usually
    an integer, which includes `tinyint`, `smallint`, `int`, and `bigint`. The primary
    benefit of this pattern is that it achieves (and enforces) all of the attributes
    of a well-defined clustered index. It is static, narrow, unique, and ever-increasing.
    When considering how data in the table will be accessed, in most cases the key
    value will most often be used to access rows in the table.


    One distinction of the Identity Sequence pattern is that the column used for the
    clustered index key has no relationship between the data in the row and the clustered
    index key. To implement the pattern, either a column is included in the table
    definition that has the `IDENTITY` property or a column is added to the table
    that uses `SEQUENCE` values. This column is then set as the clustered index key
    and often the `PRIMARY KEY` as well.


    Examples of this pattern can be found in nearly all databases. Creating a table
    with this pattern would look similar to the `CREATE TABLE` statements in Listing
    13-4. Both tables are built to contain fruit: two apple rows, a banana row, and
    a grape row are inserted. The `Color` column would not have been a good clustering
    key since it does not identify the rows in the table. The `FruitName` column could
    have identified the rows in the table, except it is not unique across the table,
    which would have required the uniquifier and lead to a larger clustering key.
    Indexing the table to the Identity Sequence pattern, a `FruitID` column is created.


    ```sql

    USE AdventureWorks2017

    GO

    IF OBJECT_ID(''IndexStrategiesFruit_Identity'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Identity

    CREATE TABLE dbo.IndexStrategiesFruit_Identity

    (

    FruitID int IDENTITY(1,1)

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Idnt PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Identity(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Identity;

    IF OBJECT_ID(''IndexStrategiesFruit_Sequence'') IS NOT NULL

    DROP TABLE IndexStrategiesFruit_Sequence

    IF OBJECT_ID(''FruitSequence'') IS NOT NULL

    DROP SEQUENCE FruitSequence

    CREATE SEQUENCE FruitSequence AS INTEGER

    START WITH 1;

    CREATE TABLE dbo.IndexStrategiesFruit_Sequence

    (

    FruitID int DEFAULT NEXT VALUE FOR FruitSequence

    ,FruitName varchar(25)

    ,Color varchar(10)

    ,CONSTRAINT PK_Fruit_FruitID_Seq PRIMARY KEY CLUSTERED (FruitID)

    );

    INSERT INTO dbo.IndexStrategiesFruit_Sequence(FruitName, Color)

    VALUES(''Apple'',''Red''),(''Banana'',''Yellow''),(''Apple'',''Green''),(''Grape'',''Green'');

    SELECT FruitID, FruitName, Color

    FROM dbo.IndexStrategiesFruit_Sequence;

    ```

    Listing 13-4: Creating and Populating Tables for the Identity Sequence Pattern


    One of the effects of using the Identity Sequence pattern is that the value for
    the clustering key column has no relationship to the information that it represents.
    In the query output from Listing 13-4, shown in Figure 13-4, the value of 1 is
    assigned to the first row inserted for both result sets. Then, a value of 2 is
    assigned for the next row and so on. As more rows are added, the `FruitID` column
    increments and does not require any single piece of information in the record
    in order to designate the instance of information.


    ![](images/338675_4_En_13_Chapter/338675_4_En_13_Fig4_HTML.jpg)

    Figure 13-4: Results for the Identity Sequence pattern


    Note


    `SEQUENCE` was introduced in `SQL Server 2012`. Through sequences, ranges of numeric
    values can be generated, which are either ascending or descending. A sequence
    is not associated with any specific table. Sequences provide distinct benefits
    when a numeric `primary key` needs to be scoped across multiple tables or when
    customization is required. A detailed discussion of sequences is outside the context
    of this book.'
