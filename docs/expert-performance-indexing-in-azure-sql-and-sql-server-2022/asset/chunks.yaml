    ### Cautions


    Although the XML data type sounds like a perfect fit for every instance of XML,
    some considerations should be evaluated when designing a column in SQL Server
    that will be storing XML. One of the most critical is that XML content should
    be well-formed. This ensures that the XML data type and features provided to utilize
    the data most efficiently are used to their full advantage. XML columns are stored
    as binary large objects, more commonly known as BLOBs. This storage means that
    runtime querying of this content is resource-intensive and slow in most cases.
    With any task that involves data retrieval, efficiency of that retrieval will
    be of concern. In SQL Server, indexing is paramount to how efficient or inefficient
    this can be. A complete lack of indexing or too many indexes will affect any data
    manipulation task. The XML data type is no exception to this guidance. XML indexing
    is unique compared with the other indexing methods in SQL Server.


    ## XML Indexes


    XML indexes fall into two main categories: primary/secondary and selective XML
    indexes. The main difference between these index types is how much of the XML
    data is included within the index. For primary/secondary indexes, all paths, nodes,
    and values are included in the index. This works well when it is unknown what
    portions of the XML will be most accessed. Alternatively, if only a limited portion
    of the XML will be accessed, then a selective XML index can provide better performance
    since the volume of data indexed is reduced. The next two sections will fully
    explore these categories of XML indexes.


    ### Primary/Secondary XML Indexes


    As the name implies, there are two types of indexes that fall under primary/secondary
    XML indexes: primary and secondary indexes. These two index types provide an indexing
    relationship within the XML documents similar to the relationship between clustered
    and non-clustered indexes. When implementing XML indexes, some basic rules apply
    to each:


    *   Only one primary XML index can exist on a column, though multiple primary
    XML indexes can exist on a table.


    *   Primary XML indexes cannot exist without a clustered index on the primary
    key of the table that the XML column is in. This clustered index is required for
    partitioning the table, and the XML index can use the same partitioning scheme
    and functioning.


    *   Primary XML indexes include all paths, tags, and values of the XML content.


    *   A secondary XML index cannot exist without a primary XML index.


    *   A secondary XML index extends the primary index including paths, values, and
    properties.


    To demonstrate primary/secondary XML indexes, the table [Sales].[Store] within
    the AdventureWorks2017 database will be used. This table has an existing primary
    XML index on [Demographics] that will need to be dropped using the code in Listing
    [6-1](#338675_4_En_6_Chapter.xhtml#PC1).


    ```

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    Listing 6-1

    Drop the Existing Primary XML Index on [Sales].[Store]

    ```


    It is useful to first benchmark the cost to execute an example query against this
    table. In the query in Listing [6-2](#338675_4_En_6_Chapter.xhtml#PC2), [Sales].[Store]
    will be queried for the stores with annual sales equal to $1,500,000. For a query
    returning less than 200 records, the cost is 12.751, shown in Figure [6-1](#338675_4_En_6_Chapter.xhtml#Fig1),
    which is quite expensive. This is due to the XML Reader with XPath filter, which
    had to shred the entire XML document for all rows to find the requested records,
    which is a slow and resource-intensive process.


    ![](images/338675_4_En_6_Chapter/338675_4_En_6_Fig1_HTML.jpg)


    An X M L query page. The records requested in the query, returns a set of data.
    Cached plan size is 32 kilobytes. The degree of parallelism is 1\. Estimated subtree
    cost is 12.751\. Estimated number of rows is 630.9.


    Figure 6-1


    XML query cost with no XML indexes


    ```

    USE AdventureWorks2017;

    GO

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    Listing 6-2

    Query on [Sales].[Store] for AnnualSales

    ```


    Note


    This chapter will use comparisons of estimated subtree cost vs. logical reads
    to demonstrate the value of XML indexes. While most analysis in this book focuses
    on reducing I/O through the use of indexes, parsing XML is generally a computationally
    expensive operation, hence a focus on query cost. Statistics time can also be
    used to roughly compare CPU measurements.


    This query approach is costly, yet efficient with a small amount of data in the
    table. However, in real life, tables can become quite large, surpassing the point
    where scanning through multiple XML documents is efficient. For example, imagine
    a point-of-sale system that stores receipt information in XML documents for each
    sale. With this amount of data volume, performance would begin to suffer quickly.'
  trans: '

    ### 优势


    引入 `XML` 数据类型使得在 `SQL Server` 数据库中能够充分发挥 `XML` 存储的能力。这包括能够根据针对 `XML` 本身编写的查询来检索
    `XML` 内容。`XML` 为开发者提供的最强大支持在于它既是基于文本的，同时从本质上讲也是**自描述的**。基于文本意味着 `XML` 可以轻松地从一个应用程序传递到另一个应用程序，不受底层操作系统或编程语言的限制。`XML`
    的自描述特性意味着，它不需要像数据库中定义列和表那样预先定义结构。相反，`XML` 的元素和属性会描述它们自身。`XML` 被称为**半结构化**数据，因为通常会有一个模板来定义预期的结构，以帮助验证任何给定的
    `XML` 集合是否**格式良好**。


    在使用 `SQL Server` 处理大量 `XML` 时，对 `XML` 建立索引可能是有益的。`XML` 索引的最大好处体现在存储了大量 `XML` 数据但只需要检索其中一小部分子集的场景中。在这些情况下，`XML`
    索引可以确保快速读取一小部分 `XML` 数据，而无需缓慢地扫描整个文档。


    ### 注意事项


    尽管 `XML` 数据类型听起来是每种 `XML` 实例的完美选择，但在设计 `SQL Server` 中用于存储 `XML` 的列时，仍需评估一些注意事项。最关键的一点是
    `XML` 内容应该是**格式良好**的。这确保了 `XML` 数据类型以及为最有效利用数据而提供的功能能够充分发挥优势。`XML` 列以二进制大对象（更常见的名称是
    `BLOB`）的形式存储。这种存储方式意味着在大多数情况下，对该内容进行运行时查询是资源密集型且缓慢的。对于任何涉及数据检索的任务，检索的效率都是需要关注的问题。在
    `SQL Server` 中，索引对于效率的高低至关重要。完全缺乏索引或索引过多都会影响任何数据操作任务。`XML` 数据类型也不例外。`XML` 索引与
    `SQL Server` 中的其他索引方法相比是独特的。


    # XML 索引


    `XML` 索引主要分为两大类：主/辅助 `XML` 索引和选择性 `XML` 索引。这些索引类型之间的主要区别在于索引中包含的 `XML` 数据量。对于主/辅助索引，所有路径、节点和值都包含在索引中。当不清楚
    `XML` 的哪些部分会被最频繁访问时，这种方式很有效。反之，如果只会访问 `XML` 的有限部分，那么选择性 `XML` 索引可以提供更好的性能，因为被索引的数据量减少了。接下来的两节将全面探讨这两类
    `XML` 索引。


    ## 主/辅助 XML 索引


    顾名思义，主/辅助 `XML` 索引下包含两种索引类型：主索引和辅助索引。这两种索引类型在 `XML` 文档内提供的索引关系类似于聚集索引和非聚集索引之间的关系。在实现
    `XML` 索引时，一些基本规则适用于每种类型：


    *   一个列上只能存在一个主 `XML` 索引，但一个表上可以存在多个主 `XML` 索引。

    *   主 `XML` 索引不能存在于没有聚集索引的表的主键上（该表包含 `XML` 列）。此聚集索引是表分区所必需的，而 `XML` 索引可以使用相同的分区方案和功能。

    *   主 `XML` 索引包含 `XML` 内容的所有路径、标签和值。

    *   没有主 `XML` 索引，就无法存在辅助 `XML` 索引。

    *   辅助 `XML` 索引扩展了主索引，包含了路径、值和属性。


    为了演示主/辅助 `XML` 索引，将使用 `AdventureWorks2017` 数据库中的 `[Sales].[Store]` 表。该表在 `[Demographics]`
    列上已存在一个主 `XML` 索引，需要使用清单 6-1 中的代码将其删除。


    ```sql

    USE AdventureWorks2017;

    GO

    DROP INDEX IF EXISTS [PXML_Store_Demographics] ON [Sales].[Store]

    ```


    清单 6-1

    删除 [Sales].[Store] 上现有的主 XML 索引


    首先对针对该表的示例查询进行成本基准测试是有用的。在清单 6-2 的查询中，将在 `[Sales].[Store]` 表中查询年销售额等于 1,500,000
    美元的商店。对于一个返回不到 200 条记录的查询，其成本为 12.751（如图 6-1 所示），这是相当高的。这是由于 `XML` Reader 带有 `XPath`
    过滤器，它必须为所有行解构整个 `XML` 文档以查找请求的记录，这是一个缓慢且资源密集型的过程。


    ```

    A X M L query page. The records requested in the query, returns a set of data.
    Cached plan size is 32 kilobytes. The degree of parallelism is 1\. Estimated subtree
    cost is 12.751\. Estimated number of rows is 630.9.

    ```


    图 6-1

    无 XML 索引时的 XML 查询成本


    ```sql

    USE AdventureWorks2017;

    GO

    WITH XMLNAMESPACES

    (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/adventure-works/StoreSurvey'')

    SELECT BusinessEntityID, Name, Demographics

    FROM [Sales].[Store]

    WHERE Demographics.exist(''/StoreSurvey/AnnualSales[.=1500000]'') = 1;

    ```


    清单 6-2

    针对年销售额查询 [Sales].[Store]


    **注意**

    本章将使用估计子树成本与逻辑读取的比较来展示 `XML` 索引的价值。虽然本书中的大多数分析都侧重于通过使用索引来减少 I/O，但解析 `XML` 通常是一个计算成本高昂的操作，因此重点关注查询成本。也可以使用统计时间来大致比较
    CPU 测量值。


    这种查询方法成本高昂，但在表中数据量较少时是高效的。然而，在现实生活中，表可能会变得非常大，超过扫描多个 `XML` 文档仍然高效的临界点。例如，想象一个销售点系统，它将每次销售的收据信息存储为
    `XML` 文档。面对这样的数据量，性能将很快开始下降。

