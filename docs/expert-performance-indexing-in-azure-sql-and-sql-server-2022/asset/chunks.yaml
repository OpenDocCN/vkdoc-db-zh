    plans to find the best execution plan for executing the submitted request. If
    the statistics for an index are incorrect or no longer represent the data in the
    index, then the plan that is created will be less likely to be optimal. It is
    important to understand and be able to interact with statistics to be certain
    that indexes in an environment not only exist but also provide their expected
    benefits.


    Note


    Often, when indexes are rebuilt to “fix” performance issues, the fragmentation
    is usually not the cause of or direct solution to the issue. When rebuilt, indexes
    receive new statistics, and execution plans related to those indexes need to be
    recompiled, either of which is the likely cause of the performance issue vs. any
    index fragmentation.


    There are many ways to interact with statistics within SQL Server. Some of the
    most common mechanisms will be reviewed in the sections that follow. For each
    of these methods, there will be a discussion of what they are, what they provide,
    and the value in using each method.


    ### DBCC SHOW_STATISTICS


    The first and likely most familiar way to interact with statistics is through
    the `DBCC` command `SHOW_STATISTICS`. This command will return the statistics
    for the requested database object, either a table or an indexed view. The information
    returned is a statistics object that includes three different components: the
    header, the histogram, and the density vector. Each provides SQL Server with an
    understanding of the data available in the index.


    Returning the statistics object can be done with the `DBCC` syntax in Listing
    [5-1](#338675_4_En_5_Chapter.xhtml#PC1). This syntax accepts the name of the table
    or indexed view for the statistics, and then the target is returned. The target
    is either the name of the index or the column-level statistics that were created.


    ```

    DBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )

    [ WITH [  ]

    Listing 5-1

    DBCC SHOW_STATISTICS Syntax

    ```


    There are four options that can be included with the `DBCC` command: `NO_INFOMSGS`,
    `STAT_HEADER`, `DENSITY_VECTOR`, and `HISTOGRAM`. Any or all of these options
    can be included in a comma-separated list.


    The option `NO_INFOMSGS` suppresses all informational messages when the `DBCC`
    command is executed. These are error messages generated with severity from 0 to
    10, with 10 being the highest severity. In most cases, since these error messages
    are informational, they are not of value when using this `DBCC` statement.


    The options `STAT_HEADER`, `DENSITY_VECTOR`, and `HISTOGRAM` limit the output
    from the `DBCC` command. If one or more of the options are included, then only
    the statistics components for the items included will be returned. If none of
    these is selected, then all components are included. There is the STATS_STREAM
    option that will not be discussed as it is deprecated and may not be included
    in future releases of SQL Server.


    With this `DBCC` command defined, its statistics components can be discussed in
    further detail. Each will be defined, and then an example of their contents from
    the AdventureWorks2017 database will be explored. Listing [5-2](#338675_4_En_5_Chapter.xhtml#PC2)
    provides the results needed for this review.


    ```

    USE AdventureWorks2017

    GO

    DBCC SHOW_STATISTICS ( ''Sales.SalesOrderDetail''

    , PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID )

    Listing 5-2

    DBCC SHOW_STATISTICS for an Index on the Sales.SalesOrderDetail Table

    ```'
  trans: '

    # 5. 索引元数据与统计信息


    在理解了索引的逻辑和物理基础之后，现在可以讨论描述索引运作方式的元数据。这些统计信息有助于深入了解 SQL Server 如何管理和使用索引。它还提供了所需的信息，用于确定一个索引可能被选择或不被选择的原因，以及它的运行状况。本章将更深入地介绍这些信息在何处以及如何被收集。还将介绍
    SQL Server 提供的一些附加 `DBCC` 命令和动态管理对象（DMO），以及这些信息是如何生成和使用的。


    本章涵盖的统计信息将涉及四个信息领域。第一个领域是列级统计信息。它为查询优化器提供列（以及索引）中数据分布情况的信息。接下来是索引使用统计信息。这里的信息有助于了解一个索引是否被使用以及如何被使用。第三个是操作统计信息，它提供了索引使用方式的详细信息。最后一个信息领域是物理统计信息，它提供了索引物理特征及其在数据库内分布情况的洞察。


    此外，本章还将回顾列存储索引可用的元数据和统计信息，以及收集到的信息。这些信息有助于理解存储在列存储索引中的内容，以及这可能如何影响针对这些索引的查询性能。


    ## 列级统计信息


    列级统计信息是 SQL Server 中与索引相关的最重要领域之一。这些统计信息提供了值在索引的键列上如何分布的信息。SQL Server 利用它来确定索引中值的预期频率和分布；这被称为
    `基数`。


    通过 `基数`，查询优化器开发一系列基于成本的执行计划，以找到执行已提交请求的最佳执行计划。如果索引的统计信息不正确或不再代表索引中的数据，那么所创建的计划就不太可能是最优的。理解并与统计信息进行交互非常重要，以确保环境中的索引不仅存在，而且能提供其预期的效益。


    > 注意

    >

    > 通常，当为“修复”性能问题而重建索引时，碎片通常不是问题的原因或直接解决方案。重建时，索引会获得新的统计信息，并且与这些索引相关的执行计划需要重新编译，这两者中的任何一个都可能是性能问题的原因，而不是索引碎片。


    在 SQL Server 中，有许多与统计信息交互的方法。接下来的章节将回顾一些最常见的机制。对于每种方法，都将讨论其是什么、提供什么以及使用每种方法的价值。


    ### DBCC SHOW_STATISTICS


    与统计信息交互的第一种，也可能是最熟悉的方式是通过 `DBCC` 命令 `SHOW_STATISTICS`。此命令将返回所请求数据库对象（表或索引视图）的统计信息。返回的信息是一个统计对象，包含三个不同的组成部分：头信息、直方图和密度向量。每个部分都为
    SQL Server 提供了对索引中可用数据的理解。


    可以使用清单 5-1 中的 `DBCC` 语法返回统计对象。此语法接受表或索引视图的名称作为统计信息的来源，然后返回目标信息。目标可以是索引的名称，也可以是创建的列级统计信息的名称。


    ```sql

    DBCC SHOW_STATISTICS ( table_or_indexed_view_name , target )

    [ WITH [  ]

    ```


    清单 5-1 `DBCC SHOW_STATISTICS` 语法


    `DBCC` 命令可以包含四个选项：`NO_INFOMSGS`、`STAT_HEADER`、`DENSITY_VECTOR` 和 `HISTOGRAM`。这些选项中的任何一个或全部都可以包含在逗号分隔的列表中。


    选项 `NO_INFOMSGS` 会在执行 `DBCC` 命令时抑制所有信息性消息。这些是严重级别从 0 到 10 的错误消息，其中 10 为最高严重级别。在大多数情况下，由于这些错误消息是信息性的，在使用此
    `DBCC` 语句时它们没有价值。


    选项 `STAT_HEADER`、`DENSITY_VECTOR` 和 `HISTOGRAM` 会限制 `DBCC` 命令的输出。如果包含一个或多个选项，则仅返回所包含项的统计信息组件。如果未选择其中任何一个，则包含所有组件。还有一个
    `STATS_STREAM` 选项，这里不作讨论，因为它已弃用，并且可能不会包含在 SQL Server 的未来版本中。


    定义了此 `DBCC` 命令后，可以更详细地讨论其统计信息组件。将对每个组件进行定义，然后我们将探讨来自 AdventureWorks2017 数据库的内容示例。清单
    5-2 提供了本次回顾所需的结果。


    ```sql

    USE AdventureWorks2017

    GO

    DBCC SHOW_STATISTICS ( ''Sales.SalesOrderDetail''

    , PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID )

    ```


    清单 5-2 针对 `Sales.SalesOrderDetail` 表上索引的 `DBCC SHOW_STATISTICS`

    '
- fmt: '### Stats Header


    The stats header is the metadata portion of the statistics object. These columns,
    listed in Table 5-1, are primarily informational. They provide the number of rows
    that were considered when building the statistics and how those rows were selected
    through filtering. Table 5-1 also includes information on when the statistics
    were last updated, which can be useful when investigating potential issues with
    statistics quality.


    Table 5-1: Stats Header Columns from `DBCC SHOW_STATISTICS`


    | Column Name | Description |

    | --- | --- |

    | `Name` | Name of the statistics object. For index statistics, this is the same
    name as the index. |

    | `Updated` | Date and time that the statistics were last updated. |

    | `Rows` | Total number of rows in the table or indexed view when the statistics
    were last updated. For filtered statistics or indexes, the count pertains to the
    number of rows that matched the filter criteria. |

    | `Rows Sampled` | Count of rows sampled for statistics calculations. Histogram
    and density values are estimates when the `Rows Sampled` value is less than the
    value in `Rows`. |

    | `Steps` | Number of steps in the histogram. Each step spans a range of column
    values followed by an upper-bound column value. The histogram steps are defined
    on the first key column in the statistics. The maximum number of steps is 200.
    |

    | `Density` | Calculated as 1/*distinct values* for all values in the first key
    column of the statistics object, excluding the histogram boundary values. As of
    SQL Server 2008, this value is no longer used by the query optimizer, but is provided
    for information purposes and backward compatibility. |

    | `Average Key Length` | Average number of bytes per value for all key columns
    in the statistics object. |

    | `String Index` | Indicates whether the statistics object contains string summary
    statistics to improve the cardinality estimates for query predicates that use
    the `LIKE` operator. |

    | `Filter Expression` | When populated, this is the predicate for the subset of
    table rows included in the statistics object. |

    | `Unfiltered Rows` | Total number of rows in the table before applying the filter
    expression. If `Filter Expression` is `NULL`, `Unfiltered Rows` is equal to `Rows`.
    |

    | `Persisted Sample Percent` | Added in SQL Server 2016, shows the sample percentage
    to use for updates to the statistics. If zero, then there is no sample percentage
    set for the statistics. |


    Reviewing the stats header information for `PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID`
    on `Sales.SalesOrderDetail`, shown in Figure 5-1, there are a number of items
    of interest. Since the `Rows` and `Rows Sampled` values are the same, these statistics
    are not based on estimates. The statistics were last updated on October 27, 2017
    (though this value will likely differ in another copy of this database). There
    are 163 steps, out of a possible maximum of 200 steps, in the statistics histogram.
    The number of steps is equal to ranges. In this case, 163 steps mean there are
    163 ranges of values, each with an upper bound provided in the statistics. The
    upper-bound value defines the maximum value within the range. If step 1 had an
    upper-bound value of 42, then step 1 would cover values 0–42. The next step would
    then start with 43 and include values up through its upper bound. Note the lack
    of a filter expression and unfiltered rows; neither the index nor statistics are
    filtering out rows. Lastly, the `Persisted Sample Percent` is set to 0, which
    means all rows were sampled for the statistics, which can be confirmed by comparing
    `Rows` with `Rows Sampled`.


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig1_HTML.png)


    Figure 5-1: Stats header for an index on the `Sales.SalesOrderDetail` table


    ### Density Vector


    The next component of the statistics object is the density vector. The density
    vector describes the columns within a statistics object. There is a row for each
    key value in the statistics or index object. For instance, if there are two columns
    in an index named `SaleOrderID` and `SalesOrderDetailID`, there will be two rows
    in the density vector. The density vector will have a row for `SaleOrderID` and
    a row for `SaleOrderID` and `SalesOrderDetailID`, shown in Figure 5-2. There are
    three pieces of information available for the density vector: the density, average
    length, and columns included in the vector (column names detailed in Table 5-2).


    ![](images/338675_4_En_5_Chapter/338675_4_En_5_Fig2_HTML.png)


    Figure 5-2: Sample of the density vector for an index on the `Sales.SalesOrderDetail`
    table


    The value of the density vector is that it helps the query optimizer adjust cardinality
    for multiple column statistics objects. As discussed in the next section, the
    ranges within the histogram are based solely on the first column of the statistics
    object, and the density provides an adjustment between when single- or multicolumn
    queries are executed. While the focus for updating statistics is often on changes
    in the histogram, the density vector provides a valuable means to adjust ranges
    in the histogram to adjust for differences in the distribution of data beyond
    the first column of the index.


    Table 5-2: Density Vector Columns from `DBCC SHOW_STATISTICS`


    | Column Name | Description |

    | --- | --- |

    | `All Density` | Returns the density for each prefix of columns in the statistics
    object, one row per density. The density is calculated as 1/*distinct column values*.
    The closer the density is to 1, the more uniform the values are in the columns.
    |

    | `Average Length` | Average length, in bytes, to store the column values for
    each level of the density vector. |

    | `Columns` | Names of columns in each density vector level. |'
