  \ 12-9.** 示例解决方案*\n\n打开 `App.xml.cs` 文件，并注意在约第 25 行处引用了先前创建的移动服务。这是在下载 zip 文件之前自动注入到应用程序中的，因此你可以按原样运行应用程序而无需任何代码修改。\n\
  \n\n\n`MainPage.xaml` 文件包含了项目的用户界面，正如你将在项目运行时看到的，它提供了输入和保存待办事项的方法。如果你打开 `MainPage.xaml`\
  \ 文件，你会看到 `ToDoItem` 是一个包含三个属性的简单类。在本章后面部分，你将看到这些属性与图 12-6 步骤 2 中创建的表的列相对应。\n\n\
  在 `MainPage.xaml` 文件中向下滚动，你将看到插入新的 `ToDo` 项目到表中以及查询和检索表中所有项目所需的全部代码。\n\n继续并按 `F5`\
