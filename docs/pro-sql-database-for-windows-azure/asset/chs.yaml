  \ 12-10 所示。\n\n**图 12-10.** 运行项目\n\n当点击**保存**按钮时发生了什么？一个简单的 REST 调用被发送到 Windows\
  \ Azure；它访问了 Windows Azure 移动服务（通过 `App.xml.cs` 文件中的移动服务引用）并将数据保存到 SQL 数据库实例中。\n\
  \n如果你是在 Windows 8 上运行此程序，你需要返回 Windows 8 的开始菜单才能回到 Visual Studio 停止调试。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 196](img/index-251_1.png)\n\n![图片 197](img/index-251_2.png)\n\n**第 12 章 ■\
  \ Windows Azure 移动服务**\n\n**数据**\n\n门户中的**数据**选项卡简单地列出了可用的 Windows Azure 移动服务正在使用的表。\n\
  \n图 12-11 显示了本章前面示例中使用的表。三列分别显示了表名、表上的索引数量以及每个表中的记录数。\n\n**图 12-11.** 运行项目\n\n移动服务的表非常灵活，以至于你可以简单地定义一个没有任何列的表（尽管在表创建时，系统会自动为你创建一个\
  \ `id` 列）。当数据最初插入到表中时，服务会自动创建相应的列。然而，要使此功能正常工作，必须将**启用动态架构**选项设置为**开**。此选项可以在**配置**选项卡上找到（见图\
  \ 12-11），它位于**数据**选项卡右侧三个选项卡处。\n\n虽然**数据**页面表面上很简单，但在处理表时还有很多很多可用的功能。点击门户中的表名将带你进入一系列页面，允许你浏览数据、处理列、在表上定义安全权限，以及在任何\
  \ CRUD（创建、读取、更新、删除）操作期间执行额外操作。以下各节详细介绍了四个选项卡。\n\n**浏览**\n\n**浏览**选项卡（图 12-12）只是让你浏览所选表中的数据。你可以通过在左侧导航栏中选择表来切换表。如果数据量超过页面大小，你可以使用前进和后退箭头在多个数据页面之间导航。\n\
  \n**图 12-12.** 浏览选项卡\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片\
  \ 198](img/index-252_1.png)\n\n**第 12 章 ■ Windows Azure 移动服务**\n\n**列**\n\n**列**选项卡（图\
  \ 12-13）允许你管理表中的列。可以添加或删除列。列一旦创建，其数据类型便无法更改。要删除列，请选择除索引列之外的任何列，然后点击门户底部的**删除**按钮。添加列有两种方式——第一种，通过删除并重新创建表（不推荐，因为会丢失数据）；第二种，通过从应用程序发送包含新属性的插入请求来实现。为此，必须启用**动态架构**。\n\
  \n**图 12-13.** 列选项卡\n\n\n# 索引配置\n\n此选项卡还允许您在表上定义索引。默认情况下，会在 `id` 列上放置索引，但可以向索引添加列以提高查询性能。要将列添加到索引，请选择该列并单击\
  \ `Set as Index`。经常在查询中用于排序或过滤的列应包含在索引中。注意不要向索引添加过多列；这可能会对性能产生不利影响。有许多可用的工具，包括 `SQL\
  \ Server Management Studio`，它们允许您检查访问数据库的查询，以帮助确定表中的哪些列对添加到索引有益。\n\n# 权限\n\n“权限”选项卡提供了定义谁具有插入、更新和删除权限的能力。如图\
  \ 12-14 所示，有四个选项：\n\n![Image 199](img/index-253_1.png)\n\n*图 12-14. 权限选项卡*\n\n*\
  \   **所有人：** 接受针对该表的任何操作请求。使用此选项，您的数据对所有人完全开放。\n*   **任何拥有应用程序密钥的人：** 执行操作需要应用程序密钥。应用程序密钥随应用程序分发。由于此密钥不是安全分发的，因此不能视为安全令牌。为了保护移动服务数据的访问，您必须先对用户进行身份验证，然后才能访问。\n\
  *   **仅限经过身份验证的用户：** 只有经过身份验证的用户才被允许执行操作。在此预览版中，`Windows 8` 应用客户端通过 `Live Connect`\
  \ 进行身份验证。\n\n可以使用脚本根据经过身份验证的用户进一步限制对表的访问。\n\n*   **仅限脚本和管理员：** 该操作需要服务主密钥，这将操作限制为仅注册的脚本或管理员帐户。\n\
  \n根据数据的类型和敏感性，建议谨慎使用“所有人”选项。\n\n如果存在需要保护且性质敏感的数据，则应使用第二或第三个选项作为最佳实践。对用户进行身份验证应是防止访问敏感数据的常规做法。\n\
  \n![Image 200](img/index-254_1.png)\n\n![Image 201](img/index-254_2.png)\n\n# 脚本\n\
  \n“脚本”选项卡（图 12-15）提供了创建 `scriptlets` 的能力，这些服务端自定义逻辑将在每次操作（插入、更新、删除和读取）时运行。`Scriptlets`\
  \ 是您可以注册以执行的 `JavaScript` 代码片段。\n\n函数的名称必须与所选操作匹配，但删除操作除外，其必须命名为 `del`。\n\n*图 12-15.\
  \ 脚本选项卡*\n\n这些脚本允许将业务逻辑注入到表操作中。例如，可以在此处基于提供的 `user` 对象的 `userId` 值进行客户端身份验证。\n\n\
  ## 高级设置\n\n我们已经从数据的角度讨论了移动服务，但还有其他一些项目需要重点介绍，以便对 `Windows Azure Mobile Services`\
  \ 有一个完整的了解。我们将在本节重点介绍的三个设置选项卡来自主页的移动服务，可以在图 12-16: 推送、标识和缩放中看到。\n\n*图 12-16. 移动服务选项卡*\n\
  \n### 推送\n\n使用 `Windows Azure Mobile Services`，您可以通过 `Windows Push Notification\
  \ Service (WNS)` 向 `Windows Store` 应用程序发送推送通知。向您的应用程序发送推送通知需要您首先配置移动服务以与 `WNS` 协同工作。这可以通过简单地在“推送”选项卡中输入客户端密钥和包\
  \ `SID` 值来完成，如图 12-17 所示。\n\n![Image 202](img/index-255_1.png)\n\n*图 12-17. 推送通知设置*\n\
  \n当您在 `Windows Push Notification & Live Connect` 页面（地址为 [`appdev.microsoft.com/StorePortals/en-us/`](https://appdev.microsoft.com/StorePortals/en-us/)）注册您的应用程序时，`WNS`\
  \ 会提供这些值。\n\n启用推送通知首先要求您为 `Windows Store` 注册您的应用程序，在注册过程中，您将获得客户端密钥和包 `SID`。此时，您的应用程序已配置为与\
  \ `WNS` 协同工作。\n\n### 标识\n\n`Windows Azure Mobile Services` 与许多不同的社交媒体、第三方和 `Microsoft`\
  \ 应用程序集成，使得从您的应用程序内部轻松验证用户变得简单。这种集成通过许多身份提供商得到支持。目前，移动服务支持以下身份提供商：\n\n*   `Microsoft`\n\
  *   `Facebook`\n*   `Twitter`\n*   `Google`\n\n图 12-18 显示了为 `Windows Azure Mobile\
  \ Services` 配置 `Microsoft` 帐户、`Facebook` 和 `Twitter` 所需的信息。要启用身份验证，您首先需要向上述某个身份提供商注册您的应用程序以获得必要的\
  \ `ID` 或密钥以及密钥，然后使用该信息在此设置窗口中配置应用程序以与该提供商协同工作。\n\n![Image 203](img/index-256_1.png)\n\
  \n*图 12-18. 身份提供商设置*\n\n您还需要将身份验证代码添加到您的应用程序中，以处理用户登录过程。当移动服务对用户登录进行身份验证时，`user`\
  \ 对象上的 `userid` 属性的值将被设置为唯一标识用户的值。然后，此值可用于授权对数据的访问。\n\n### 缩放\n\n“缩放”选项卡是您为应用程序定义可用资源的地方。扩展您的移动服务就像在共享和保留资源模式之间切换，并设置移动服务的实例数量以及这些实例的大小一样简单，如图\
  \ 12-19 所示。\n\n![Image 204](img/index-257_1.png)\n\n*图 12-19. 移动服务缩放设置*\n\n默认情况下，移动服务设置为共享模式，这意味着您的所有实例都在共享环境中运行，与其他移动服务共址。内存和\
  \ `CPU` 等资源在移动服务之间共享。\n\n切换到保留模式意味着您的移动服务拥有专用于您的移动服务的资源，包括内存、`CPU` 和带宽。其他移动服务无法使用专用于您的移动服务的资源。\n\
  \n在 `Windows Azure Mobile Services` 中，您还可以扩展服务使用的 `Windows Azure SQL Database` 实例。将移动服务模式设置为保留意味着您同一区域中的所有移动服务都在保留模式下运行。\n\
  \n> **注意** 本章只是简要涉及了配置选项卡，因为其重点是用作 `Windows Azure Mobile Services` 数据存储的 `SQL` 数据库。有关如何配置推送通知或提供商集成的更多信息，请访问\
  \ [www.windowsazure.com/en-us/develop/mobile/](http://www.windowsazure.com/en-us/develop/mobile/)。\n\
  \n# 总结\n\n虽然截至本书付印时 `Windows Azure Mobile Services` 仍处于预览阶段，但应该显而易见的是，此功能非常令人兴奋，并且真正为\
  \ `Windows Azure` “锦上添花”。本章说明了从 `Windows Store` 应用程序在 `Windows Azure SQL Database`\
  \ 中存储和检索数据是多么容易。\n\n\n本章我们首先创建了 Windows Azure 移动服务，然后将该服务配置为使用 Windows Azure SQL\
  \ 数据库作为数据存储。接着，我们下载了示例应用程序，您看到了使用 Windows Azure 移动服务读写数据是多么容易，以及如何为 Windows 应用商店创建应用程序。\n\
  \n最后，我们简要了解了应用程序中可以使用的一些配置设置，例如与 Facebook 和 Twitter 的社交媒体集成，以及与 Microsoft 和 Google\
  \ 等其他提供商的应用程序集成。我们还探讨了扩展移动服务这一至关重要的方面，以及执行此操作是多么容易。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 205](img/index-259_1.png)\n\n## 附录 A\n\n### SQL 数据库管理门户\n\n本附录向您介绍由 Microsoft\
  \ 构建的在线 SQL 数据库管理门户。它是一个基于 Web 的应用程序，允许您设计、管理和监视 SQL 数据库实例。尽管当前版本的门户不支持 `SQL Server\
  \ Management Studio` 的所有功能，但它提供了一些 SQL 数据库独有的有趣功能。\n\n## 启动管理门户\n\n您可以从 Windows\
  \ Azure 管理门户启动 SQL 数据库管理门户（`SDMP`）。打开浏览器并导航到 [`https://manage.windowsazure.com`](https://manage.windowsazure.com)，然后使用您的\
  \ Live ID 登录。登录后，单击左侧的 \"SQL 数据库\"，然后从可用数据库列表中单击您的数据库。这将显示数据库仪表板，如图 A-1 所示。要启动管理门户，请单击底部的\
  \ `管理` 图标。\n\n*图 A-1. Windows Azure 管理门户中的 SQL 数据库仪表板*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 206](img/index-260_1.png)\n\n附录 A ■ SQL 数据库管理门户\n\n■ **注意** 您也可以直接在浏览器中输入\
  \ [`https://sqldatabasename.database.windows.net`](https://sqldatabasename.database.windows.net)\
  \ 来访问 `SDMP`，其中 `sqldatabasename` 是您的 SQL 数据库的服务器名称。\n\n将打开一个新网页，提示您登录 SQL 数据库服务器。如果您是从\
  \ Windows Azure 管理门户点击进入的，数据库名称将自动填写且为只读。如果您直接在浏览器中键入了 URL，则需要手动输入数据库名称。输入用户名和密码；然后单击\
  \ `登录`（图 A-2）。\n\n*图 A-2. SQL 数据库管理门户登录屏幕*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 207](img/index-261_1.png)\n\n附录 A ■ SQL 数据库管理门户\n\n登录后，您将看到一个类似于图 A-3\
  \ 的页面，默认显示数据库实例的管理摘要页面，提供有关数据库实例的一般信息，例如可用空间、当前连接数等。您还可以访问设计页面，这是门户的一个部分，允许您管理表、视图和存储过程。管理功能和设计功能将在下面解释。\n\
  \n*图 A-3. 管理摘要屏幕*\n\n## 管理功能\n\n门户的管理部分允许您管理联合、监视当前查询性能、运行 `T-SQL` 查询并可选地查看其执行计划。第\
  \ 10 章详细介绍了联合，因此本附录将重点介绍其他管理功能。\n\n### 运行 T-SQL 语句\n\n让我们首先运行一个 `T-SQL` 语句，看看可用的选项。在管理摘要页面上，单击页面顶部的\
  \ `新建查询` 图标。这将打开一个新的查询窗口。您可以根据需要打开任意多个窗口来运行多个查询，就像在 `SQL Server Management Studio`\
  \ 中一样。键入并执行以下语句（单击 `运行` 图标执行它）：\n\n\n\n# 附录 A SQL 数据库管理门户\n\n## 查询执行\n\n`SELECT\
  \ * FROM sys.tables`\n\n运行此查询将返回当前数据库中的表列表。查询窗口及其结果如图 A-4 所示。输出显示一个网格，其中包含作为列的字段和每个表对应的一行。如果需要，右侧会出现滚动条。在查询窗口和结果区域之间，提供了两个链接：`消息`\
  \ 和 `结果`。默认选择的是 `结果` 链接（其上方有一个小的向下箭头）。点击 `消息` 将显示与查询相关的任何消息，包括错误消息。与 SQL Server\
  \ Management Studio 中一样，如果发现错误，默认将显示 `消息` 窗口而不是 `结果` 窗口。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 208](img/index-262_1.jpg)\n![Image 209](img/index-262_2.png)\n\n附录 A ■\
  \ SQL 数据库管理门户\n\n**图 A-4.** 查询窗口和结果区域\n\n■ **注意** 您可以使用屏幕中间、查询窗口和结果区域之间的分隔条，根据需要调整可见区域。\n\
  \n请注意，您也可以从同一窗口运行多个查询。例如，执行以下批处理：\n\n```\nSELECT * FROM sys.tables\n\nSELECT * FROM\
  \ sys.procedures\n```\n\n您可能会注意到，页面的结果区域只显示表列表，就像图 A-4 中一样。但是，如果您点击 `行` 汇总（图 A-5），您将看到一个下拉列表，其中包含完整的结果集列表，每个结果集对应批处理中的一条语句。如果您点击第二项（假设您的数据库有存储过程），您将看到批处理中第二条语句的结果集。您可能还会注意到下拉列表中的一个视觉提示，指示批处理中每条语句返回的记录相对数量。因为第二条语句返回了\
  \ 6 行，总共批处理中有 21 行，所以列表中的第二项包含一个填充了大约该项长度 25% 的条形。\n\n**图 A-5.** 切换结果视图\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 210](img/index-263_1.jpg)\n\n附录 A ■ SQL 数据库管理门户\n\n### 查看执行计划\n\n您也可以从同一查询窗口查看估计执行计划或实际执行计划。`实际计划`\
  \ 和 `估计计划` 图标位于您之前点击的 `运行` 图标旁边。使用之前输入的两条 T-SQL 语句，点击 `实际计划` 图标。执行完成后，您会注意到 `结果`\
  \ 旁边出现一个 `查询计划` 链接。点击此链接；您将看到如图 A-6 所示的执行计划。\n\n**图 A-6.** 查看实际执行计划\n\n左侧的 `排序依据`\
  \ 图标允许您精确定位哪些运算符消耗的资源最多。默认情况下，执行计划以图形方式显示，突出显示消耗最多 CPU 和 I/O 资源的运算符。\n\n您可以点击左侧的\
  \ `CPU` 或 `IO` 图标来分别显示消耗最多 CPU 或 I/O 资源的运算符。\n\n左侧的 `查找依据` 图标允许您突出显示执行警告、索引扫描或索引查找。请注意，表扫描不能存在，因为\
  \ SQL 数据库不支持堆表。您还可以使用左下角的垂直条轻松放大或缩小。这样做当您放大到足够程度时，会更改图标的显示方式，如图 A-7 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 211](img/index-264_1.jpg)\n![Image 212](img/index-264_2.jpg)\n\n附录 A ■\
  \ SQL 数据库管理门户\n\n**图 A-7.** 放大实际执行计划\n\n如果您从批处理中切换活动语句（如前面图 A-5 所示），将显示第二条语句的执行计划。您也可以通过点击执行计划窗口右上角的相应图标，以网格或树状结构显示执行计划。\n\
  \n### 监控当前查询性能\n\n要查看数据库上最近执行的语句，请在左侧面板中选择数据库名称（在我的示例中为 `EnzoLog2`）。这将带您返回到类似图 A-3\
  \ 的页面，在顶部选择 `查询性能`。将出现一个类似图 A-8 的页面，显示最近针对数据库执行的语句列表及其摘要性能指标。请注意，这些指标显示的是平均值，而不是当前值。例如，第二列显示\
  \ `CPU 毫秒/秒`，这是会话期间 CPU 消耗（以毫秒为单位）的平均值，以秒表示。\n\n**图 A-8.** 最近针对您的数据库执行的 T-SQL 语句\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 213](img/index-265_1.jpg)\n\
  \n附录 A ■ SQL 数据库管理门户\n\n如果您点击其中一条语句，您将看到详细的性能指标。默认情况下，页面显示 `查询计划详情`，包括持续时间、CPU、读取、写入和计划指标（参见图\
  \ A-9）。您也可以通过点击 `查询计划` 查看图形执行计划。\n\n**图 A-9.** 特定 T-SQL 语句的性能详情\n\n## 设计功能\n\n门户的设计部分允许您管理数据库对象，包括表、视图和存储过程。正如您将看到的，设计部分提供了许多高级图形化选项，包括创建索引和外键的能力。\n\
  \n### 设计表\n\n要访问设计部分，请点击门户左下角的 `设计`。请注意，结果页面的顶部显示三个标题：`表`、`视图` 和 `存储过程`。默认选择 `表`\
  \ 标题，页面显示现有表的列表，如图 A-10 所示。使用此页面底部的图标，您可以创建新表或删除选定的现有表。您还可以通过在搜索框中键入字符来过滤表列表。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 214](img/index-266_1.png)\n\
  \n附录 A ■ SQL 数据库管理门户\n\n**图 A-10.** SQL 数据库实例中的表列表\n\n用于创建新表的页面与用于编辑现有表的页面相同。您很快就会看到如何编辑表，但让我们先看看\
  \ `依赖关系` 功能。\n\n如果您将鼠标悬停在表列表上，会自动出现两个图标（`编辑` 和 `依赖关系`）。`编辑` 图标看起来像一支小铅笔。另一个图标是 `依赖关系`\
  \ 图标。\n\n如果您点击某个表的 `依赖关系` 图标，将显示一个新页面，以图形格式显示其对象依赖关系，如图 A-11 所示，这是我 `DOCS` 表的情况。该图显示，一个名为\
  \ `v_Documents` 的视图依赖于我的 `DOCS` 表。从这个视图中，我可以通过点击它们的 `编辑` 图标直接编辑这些对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
