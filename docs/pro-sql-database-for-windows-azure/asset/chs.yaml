  ### 引言


  Windows Azure SQL Database，正式名称为 SQL Azure，大约在五年前出现。当时，人们对它知之甚少，但微软已经开始大量谈论 Azure
  平台。大多数人认为 SQL Azure 是另一个 NoSQL 产品，而实际上它从来都不是。那时，它能处理的最大数据库是 1GB，并没有多少人认真对待它。从那时起，Windows
  Azure SQL Database 已经发展成为一个基于久经验证的 SQL Server 技术、企业就绪的 PaaS（平台即服务）产品。




  云计算已不再是炒作的概念。如今，基于云的解决方案正逐渐成为常态，而非可有可无或边缘化的选择。Windows Azure 云平台（包括 Windows Azure
  SQL Database）带来的益处，使企业能够以较低的购置成本快速创建和扩展解决方案，同时提供高可用性和互操作性。SQL 开发人员和数据库管理员可以利用现有技能和知识，扩展其本地解决方案，并加快云开发速度。本书涵盖了核心的
  Windows Azure SQL Database 概念、实践与方法，旨在为您的宝贵数据做好准备，迎接向云端及 Windows Azure SQL Database
  的迁移之旅。


  由于 Windows Azure SQL Database 更新迅速，本书撰写时讨论的部分服务可能仍处于预览版状态，到您阅读时可能会有所变化。不过，我们已尽力为您提供最新的信息。更新信息可查阅我们的博客、Windows
  Azure 博客 (http://blogs.msdn.com/b/windowsazure/) 以及至关重要的 Windows Azure 主页 (http://www.windowsazure.com/)，您可以在那里找到功能特性、定价、开发者信息等更多内容。


  我们希望，在阅读本书后，您能对 Windows Azure SQL Database 有更好的理解和认识。无论您是刚刚起步还是“经验丰富的老手”，每一章都包含了一些场景和信息，我们希望它们在您设计和构建
  Windows Azure 项目时能有所帮助和裨益。书中还提供了大量源代码，用于各章节中给出的示例。


  ## 本书面向的读者


  *《Windows Azure 专业 SQL 数据库（第 2 版）》* 面向那些希望即时访问功能完备的 SQL Server 数据库环境，而无需费心处理和管理物理基础设施的开发人员和数据库管理员。


  ## 本书的组织结构


  *《Windows Azure 专业 SQL 数据库》* 旨在引导您从对 SQL Database 几乎一无所知，到能够为其配置和部署以供生产应用程序使用。本书确实假设您对数据库和
  SQL 有基本的了解。在此基础之上，本书将带您从入门开始，逐步深入到性能调优以及使用其他 Azure 数据服务。


