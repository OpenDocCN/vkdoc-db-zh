  \ 5-2）。\n\n**图 5-2.** 包含数据的完成窗体\n\n从这些示例中，你可以看到，连接和查询 SQL 数据库与连接本地 SQL Server 实例并无不同。本章末尾将讨论一些指导原则和最佳实践，以帮助你为迁移到\
  \ SQL 数据库做好准备。\n\n到目前为止，我们已经讨论了使用`ADO.NET`和`ODBC`进行连接，以及它们各自的不同选项，因此让我们继续讨论，谈谈使用`sqlcmd`实用工具。\n\
  \n### sqlcmd\n如果你使用 SQL Server 已有相当长的时间，很可能你已经使用过`sqlcmd`实用工具。该实用工具允许你通过命令提示符输入和执行`T-SQL`语句及其他对象。你也可以通过`sqlcmd`模式下的查询编辑器、Windows\
  \ 脚本文件或 SQL Server 代理作业来使用`sqlcmd`实用工具。\n\n本节将讨论如何使用`sqlcmd`实用工具连接到 SQL 数据库实例并针对该数据库执行查询。本节假设你对`sqlcmd`有一定了解。该实用工具有许多选项或参数，但本节仅讨论连接到\
  \ SQL 数据库所必需的那些选项。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 72](img/index-115_1.png)\n\
