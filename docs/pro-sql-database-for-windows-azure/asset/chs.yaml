  *   `DECLARE CURSOR`\n*   `OPEN`\n*   `WITH` (*公用表表达式*)\n*   `DELETE`\n*   `OPTION`\
  \ *子句*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 部分支持的 T-SQL 语句\n\
  \n表 `B-2` 列出了您可以在 Windows Azure SQL 数据库中使用的部分支持的 T-SQL 语句。“部分支持”意味着您可以使用这些语句，但其语法存在一些变化（或限制）。表格后提供了示例。\n\
  \n### 表 B-2. 部分支持的 T-SQL 语句\n\n*   `ALTER AUTHORIZATION`\n*   `CREATE SPATIAL INDEX`\n\
  *   `DROP TRIGGER`\n*   `ALTER DATABASE`\n*   `CREATE SYNONYM`\n*   `DISABLE TRIGGER`\n\
  *   `ALTER FUNCTION`\n*   `CREATE TABLE`\n*   `ENABLE TRIGGER`\n*   `ALTER INDEX`\n\
  *   `CREATE TRIGGER`\n*   `EXECUTE`\n*   `ALTER LOGIN`\n*   `CREATE TYPE`\n*   `EXECUTE\
  \ AS`\n*   `ALTER PROCEDURE`\n*   `CREATE USER`\n*   `EXECUTE AS` *子句*\n*   `ALTER\
  \ TABLE`\n*   `CREATE VIEW`\n*   `GRANT` *数据库权限*\n*   `ALTER TRIGGER`\n*   `DENY`\
  \ *数据库权限*\n*   `GRANT` *数据库主体权限*\n*   `ALTER USER`\n*   `DENY` *数据库主体权限*\n*   `GRANT`\
  \ *类型权限*\n*   `ALTER VIEW`\n*   `DENY` *类型权限*\n*   `INSERT`\n\n\n\n# 附录 B：Windows\
  \ Azure SQL 数据库快速参考\n\n`CREATE DATABASE`\n`DISABLE TRIGGER`\n`REVOKE` `数据库权限`\n\
  `CREATE FUNCTION`\n`DROP DATABASE`\n`REVOKE` `数据库主体权限`\n`CREATE INDEX`\n`DROP INDEX`\n\
  `REVOKE` `类型权限`\n`CREATE LOGIN`\n`DROP TABLE`\n`USE`\n`CREATE PROCEDURE`\n\n例如，当您在\
  \ Windows Azure SQL 数据库中创建或修改存储过程时，`FOR REPLICATION` 和 `ENCRYPTION` 选项不受支持。因此，以下语句无效：\n\
  \n```\nCREATE PROCEDURE GetUsers\nWITH ENCRYPTION\nFOR REPLICATION\nAS\nSET NOCOUNT\
  \ ON;\nSELECT Title, Name, Intro\nFROM Users\nGO\n```\n\n然而，以下语句有效：\n\n```\nCREATE\
  \ PROCEDURE GetUsers\nWITH RECOMPILE, EXECUTE AS CALLER\nAS\nSET NOCOUNT ON;\nSELECT\
  \ Title, Name, Intro\nFROM Users\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nWindows Azure SQL 数据库的 `CREATE`/`ALTER TABLE` 语法稍微复杂一些，因为有几个不受支持的选项：\n- `ON` `关键字`\
  \ { `分区架构` | `文件组`} (例如 `ON PRIMARY`)\n- `TEXTIMAGE_ON`\n- `FILESTREAM_ON`\n- `<`\
  \ `列定义`>`\n    - `FILESTREAM`\n    - `NOT FOR REPLICATION`\n    - `ROWGUIDCOL`\n\
  \    - `SPARSE`\n- `<` `数据类型`>`\n    - `CONTENT`\n    - `DOCUMENT`\n    - `xml_schema_collection`\n\
  - `<` `列约束`>`\n    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n- `<`\
  \ `列集定义`>\n- `<` `表约束`>`\n    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n\
  - `<` `索引选项`>`\n    - `PAD_INDEX`\n    - `FILLFACTOR`\n    - `ON PARTITIONS`\n \
  \   - `DATA_COMPRESSION`\n    - `ALLOW_ROW_LOCKS`\n    - `ALLOW_PAGE_LOCKS`\n- `<`\
  \ `表选项`>`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n尽管这个列表可能给人留下功能缺失很多的印象，但请记住，列表中的大多数项目之所以存在，是因为它们与操作系统或硬件相关，在\
  \ Windows Azure SQL 数据库环境中不适用。例如，以下 `CREATE TABLE` 语句无效：\n\n```\nCREATE TABLE [dbo].Users\
  \ NOT FOR REPLICATION NOT NULL,\n    [Name] nvarchar NULL,\n    [NTUserName] nvarchar\
  \ NULL,\n    [Domain] nvarchar NOT NULL,\n    [Intro] nvarchar NULL,\n    [Title]\
  \ nvarchar NOT NULL,\n    [State] nvarchar NOT NULL,\n    [Country] nvarchar NULL,\n\
  \    [PWD] varbinary NULL,\n    [rowguid] [uniqueidentifier] NULL,\n    PRIMARY\
  \ KEY CLUSTERED\n    (\n        [ID] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF,\n           IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
  \ = ON)\n    ON [PRIMARY]\n) ON [PRIMARY]\n```\n\n此语法无效的原因有几个。`IDENTITY` 列上的 `NOT\
  \ FOR REPLICATION` 子句不受支持。两个 `ON PRIMARY` 子句、`ALLOW_ROW_LOCKS` 子句或 `ALLOW_PAGE_LOCKS`\
  \ 子句也不受支持。例如，`ON PRIMARY` 子句指定了表和主键索引放置在哪个文件组上。\n\n由于在 Windows Azure SQL 数据库中无法创建文件组（因为无法访问驱动器系统），因此支持此语句没有意义。\n\
  \n然而，以下语法有效：\n\n```\nCREATE TABLE [dbo].Users NOT NULL,\n    [Name] nvarchar NULL,\n\
  \    [NTUserName] nvarchar NULL,\n    [Domain] nvarchar NOT NULL,\n    [Intro] nvarchar\
  \ NULL,\n    [Title] nvarchar NOT NULL,\n    [State] nvarchar NOT NULL,\n    [Country]\
  \ nvarchar NULL,\n    [PWD] varbinary NULL,\n    [rowguid] [uniqueidentifier] NULL,\n\
  \    PRIMARY KEY CLUSTERED\n    (\n        [ID] ASC\n    )WITH (STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF)\n)\n```\n\n有关具体支持和不支持内容的详细信息，请访问\n[`msdn.microsoft.com/en-us/library/ee336267.aspx`](http://msdn.microsoft.com/en-us/library/ee336267.aspx)。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 不支持的 T-SQL 语句\n\n不受支持的\
  \ T-SQL 语句列表很长，但这并不像看起来那么负面。在大多数情况下，不受支持的语句与操作系统或硬件相关，在 Windows Azure SQL 数据库环境中不适用。\n\
