  \   `ROLLBACK TRANSACTION`\n*   `CATCH` (`TRY...CATCH`)\n*   `DROP VIEW`\n*   `ROLLBACK\
  \ WORK`\n*   `CEILING`\n*   `END` (`BEGIN...END`)\n*   `SAVE TRANSACTION`\n*   `CHECKSUM`\n\
  *   `EXCEPT` 和 `INTERSECT`\n*   `SELECT @` *局部变量*\n*   `CLOSE`\n*   `FETCH`\n* \
  \  `SELECT` *子句*\n*   `COALESCE`\n*   `FOR` *子句* (XML 和 BROWSE)\n*   `SET @` *局部变量*\n\
  *   `COLUMNPROPERTY`\n*   `FROM`\n*   `SWITCHOFFSET`\n*   `COMMIT TRANSACTION`\n\
  *   `GO`\n*   `TERTIARY_WEIGHTS`\n*   `COMMIT WORK`\n*   `GOTO`\n*   `THROW`\n*\
  \   `CONTEXT_INFO`\n*   `GRANT` *对象权限*\n*   `TODATETIMEOFFSET`\n*   `CONTINUE`\n\
  *   `GRANT` *架构权限*\n*   `TOP`\n*   `CONVERT`\n*   `GROUP BY`\n*   `TRIGGER_NESTLEVEL`\n\
