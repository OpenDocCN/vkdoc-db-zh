  \ 云服务，单击 `staging`，然后单击底部菜单上的 `delete` 按钮。\n\n## 本章小结\n\n本章向您展示了如何创建一个连接到 SQL Database\
  \ 实例的简单 ASP.NET 应用程序。这需要一些配置步骤，包括在云中创建 Windows Azure 服务以及安装名为 Windows Azure Tools\
