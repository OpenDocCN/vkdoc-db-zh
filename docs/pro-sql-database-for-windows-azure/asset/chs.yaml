- '# 第 2 章 ■ 设计考虑因素


  #### 只读分片


  分片可以通过多种方式实现。例如，你可以创建一个**只读分片（`ROS`）**。虽然该分片的数据来源于一个接受读写操作的数据库，但其记录对于使用者而言是只读的。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 25](img/index-40_1.jpg)


  图 2-8 展示了一个分片拓扑结构的示例，它由一个用于存储数据的本地 `SQL Server`（具有读写权限）组成。然后数据通过 `SQL Data Sync
  Framework`（或其他方法）复制到实际的分片中，这些分片是云中其他的 `SQL Database` 实例。消费应用程序随后连接到该分片（位于一个 `SQL
  Database` 实例中），根据需要读取信息。


  **图 2-8.** 只读分片拓扑结构


  在一种场景中，每个 `SQL Database` 实例都包含完全相同的数据副本（镜像分片），因此消费者可以连接到其中一个 `SQL Database` 实例（例如，使用
  `轮询` 机制来分散负载）。这可能是较简单的实现方式，因为所有记录都被盲目地复制到分片中的所有数据库中。但请记住，`SQL Database` 不支持分布式事务；你可能需要一个补偿机制，以防某些事务提交而另一些没有。


  `ROS` 的另一种实现方式是使用 `水平分区` 来同步数据。在水平分区中，应用规则来确定哪个数据库包含哪些数据。例如，可以实现 `SQL Data Sync`
  服务，将 `美国` 的销售数据分区到一个 `SQL Database` 实例，而将 `欧洲` 的销售数据分区到另一个实例。在这种实现中，要么消费者知道水平分区规则，并知道要连接到哪个数据库（通过根据客户输入应用决策规则），要么它通过必要时应用
  `WHERE` 子句（按国家筛选）连接到云中的所有数据库，从而避免运行基于既定规则选择正确数据库的决策引擎的成本。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 26](img/index-41_1.jpg)


  '
- '# 第 2 章 ■ 设计考虑因素


  #### 读写分片


  在**读写分片（`RWS`）** 中，所有数据库都被认为是可读写的。在这种情况下，你不需要使用采用 `SQL Data Sync Framework` 的复制拓扑结构，因为在分片内每个记录只有一个副本。


  图 2-9 展示了一个 `RWS` 拓扑结构。


  **图 2-9.** 多主分片拓扑结构


  虽然 `RWS` 消除了数据库间数据同步的复杂性，但消费者需要负责将所有 `CRUD` 操作定向到适当的云数据库。这需要特殊的考虑和先进的开发技术来实现，如前所述，除非你使用
  `SQL Database 联合`。


  ### 卸载


  在**卸载**模式中，主要消费者代表一个拥有自有数据库的现有现场应用程序；但其数据的一个子集（或整个数据库）通过 `SQL Data Sync`（或其他机制）复制到云数据库中。这样，即使主数据库无法访问，次要消费者也可以使用卸载的数据。


  你可以通过两种方式实现卸载模式，如图 2-10 所示。主数据库可以是本地 `SQL Server` 数据库，也可以是云数据库。例如，一个遗留应用程序可以使用本地
  `SQL Server` 数据库来满足其核心需求。然后使用 `SQL Data Sync` 将相关数据或汇总数据复制到云数据库中。


  最后，诸如便携设备和 `PDA` 之类的次要消费者可以通过连接到云作为其数据源来显示实时的汇总数据。请注意，如果使用 `SQL Data Sync` 服务，你可以选择进行双向数据同步。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 27](img/index-42_1.jpg)


  '
- '# 第 2 章 ■ 设计考虑因素


  **图 2-10.** 卸载模式


  ### 聚合


  **聚合**模式最简单的形式是提供一种机制，将来自多个数据提供者的数据收集到一个 `SQL Database` 实例中。这些数据提供者可以地理上分散且彼此不知情，但他们必须共享对模式的共同理解，以便在聚合后数据仍然有意义。


  图 2-11 中展示的聚合模式使用了直接连接模式。你可以使用聚合模式来提供一个公共信息库，例如从不同国家收集的人口统计信息或全球变暖指标。该模式的关键在于定义一个所有提供者都能使用、所有消费者都能理解的共同模式的能力。因为
  `SQL Database` 支持 `XML` 数据类型，你也可以将某些列存储为 `XML`，这是一种为每个客户提供存储略有不同信息的机制。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 28](img/index-43_1.jpg)


  ![图片 29](img/index-43_2.jpg)


  '
- '# 第 2 章 ■ 设计考虑因素


  **图 2-11.** 聚合模式


  ### 镜像


  如图 2-12 所示的**镜像**模式是卸载模式的一种变体，其中次要消费者可以是一个外部实体。此外，该模式意味着存在双向复制拓扑，以便任一数据库中的更改都能复制回另一个数据库。这种模式允许一种*无共享*的集成，即任一消费者都无权直接连接到另一个消费者。


  **图 2-12.** 镜像模式


