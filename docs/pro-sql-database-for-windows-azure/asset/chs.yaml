  \ *解决方案资源管理器中的项目*\n    \n    这是一个相当详细的示例，但让我们讨论一些连接到 Windows Azure SQL 数据库时与应用程序相关的最佳实践。\n\
  \n    ### 最佳实践\n\n\n\n# 为云开发应用程序的注意事项\n\n## 连接安全与实现\n\n首先，我们来谈谈为云开发应用程序时需要考虑的一些事项。本章大部分内容都在讨论如何连接到\
  \ SQL Database，但在开始编码之前，你首先应该考虑的是你的连接。\n\n首要任务是保护你的连接字符串，使其免受注入攻击和中间人攻击。.NET Framework\
  \ 提供了一个简单的类，用于创建和管理 `SqlConnection` 类使用的连接字符串内容，这就是 `SqlConnectionStringBuilder`\
  \ 类。\n\n以下示例展示了如何使用此类。首先定义四个静态变量来保存用户名、密码、数据库名称和服务器：\n\n```csharp\nprivate static\
  \ string userName = \"SQLScott@server\";\nprivate static string userPassword = \"\
  password\";\nprivate static string dataSource = \"tcp:server.database.windows.net\"\
  ;\nprivate static string dbName = \"AdventureWorks2012\";\n```\n\n然后修改 `GetConString`\
  \ 方法，以使用 `SqlConnectionStringBuilder` 类动态构建连接字符串：\n\n```csharp\nstring GetConString(int\
  \ connType)\n{\n    if (connType == 1)\n    SqlConnectionStringBuilder connstr =\
  \ new SqlConnectionStringBuilder();\n    connstr.DataSource = dataSource;\n    connstr.InitialCatalog\
  \ = dbName;\n    connstr.Encrypt = true;\n    connstr.TrustServerCertificate = false;\n\
  \    connstr.UserID = userName;\n    connstr.Password = userPassword;\n    return\
  \ connstr.ToString();\n    ...\n}\n```\n\n因此，在连接到 SQL Database 实例时，请考虑以下几点：\n\n\
  - 使用 `SqlConnectionStringBuilder` 类以避免注入攻击。此类有助于防止用户 ID 和密码被窥探并用于攻击。\n- 虽然所有 SQL\
  \ Database 流量都通过端口 443 加密传输，但请务必将 `Encrypt` 参数设置为 `True`，并将 `TrustServerCertificate`\
  \ 设置为 `False`，以确保连接正确加密，避免任何中间人攻击。\n- 尽可能使用 MARS（多活动结果集）以减少访问数据库的次数。\n- 使用连接池以通过减少必须打开新数据库连接的次数来提高代码效率和应用程序性能。Windows\
  \ Azure SQL Database 会自动终止空闲超过 30 分钟的连接。最佳实践是设计应用程序，使其连接晚打开、早关闭。\n\n最后，我们来讨论一些连接限制。\n\
  \n### 瞬态故障处理应用程序块\n\n瞬态故障处理应用程序块提供了一组可重用组件，用于向应用程序中添加重试逻辑。这些组件可与许多 Windows Azure\
  \ 服务（如 SQL Database、存储、服务总线和缓存）一起使用。这些组件通过向应用程序添加强大的瞬态故障处理逻辑，提供了应用程序所需的弹性。\n\n瞬态故障是由于某些临时条件（如网络连接问题或服务不可靠）而发生的错误。在大多数情况下，只需等待一小段时间然后重试操作，即可成功完成操作。\n\
  \n这就是瞬态故障处理应用程序块的用武之地。瞬态故障处理应用程序块（以下简称 `TFHAB`）是 Microsoft 企业库的一部分。它是 Microsoft\
  \ 模式与实践小组和 Windows Azure 客户顾问团队紧密合作的成果。\n\n`TFHAB` 通过使用检测策略来识别所有已知的瞬态错误条件，使开发人员能够基于内置的重试策略轻松定义重试策略。\n\
  \n`TFHAB` 包含三种内置重试策略，开发人员可以利用它们在应用程序中实现一致的重试行为。这三种内置重试策略基于时间间隔：\n\n- **固定**：在重试之间等待固定的时间。\n\
  - **增量**：每次重试后，等待时间增加 1。\n- **指数退避**：在重试之间，等待时间呈指数增长。\n\n你稍后将看到每种策略的示例。\n\n####\
  \ 将瞬态故障处理应用程序块添加到你的项目中\n\n`TFHAB` 是一个 NuGet 包，通过 Visual Studio 中的包管理器控制台添加。但是，在使用包管理器控制台之前，需要安装\
  \ NuGet。打开浏览器并导航到 NuGet 网站：`http://nuget.org/`。在主页上，单击“安装 NuGet”按钮。NuGet 支持 Visual\
  \ Studio 2010 和 2012。\n\n安装 NuGet 后，打开 Visual Studio 并创建一个新的 Windows 窗体应用程序。项目创建后，从\
  \ Visual Studio 的“工具”菜单中，选择“库包管理器”>“包管理器控制台”。\n\n在控制台窗口中，键入以下命令（如图 5-15 所示）以安装瞬态故障处理应用程序块：\n\
  \n```\nInstall-Package EnterpriseLibrary.WindowsAzure.TransientFaultHandling\n```\n\
  \n键入安装命令后按 Enter。相应的程序集和引用将被添加到你的项目中。安装完成后，在解决方案资源管理器中展开“引用”节点，你将看到项目中添加了超过六个新的\
  \ `Microsoft.Practices` 引用。\n\n**图 5-15.** 在包管理器控制台中添加 `TFHAB`\n\n### 使用瞬态故障处理应用程序块\n\
  \n安装 `TFHAB` 后，首先需要向代码中添加几条指令：\n\n```csharp\nusing Microsoft.Practices.EnterpriseLibrary.WindowsAzure.TransientFaultHandling.SqlAzure;\n\
  using Microsoft.TransientFaultHandling;\n```\n\n这些指令与任何其他指令一样，它们允许使用命名空间中的类型。接下来要做的是定义重试策略。此策略简单地定义了重试命令的次数、重试之间的等待时间长度以及若干退避时间。设置起来实际上非常简单，只需一行代码：\n\
  \n```csharp\nRetryPolicy myretrypolicy = new RetryPolicy<SqlAzureTransientErrorDetectionStrategy>(3,\
  \ TimeSpan.FromSeconds(3));\n```\n\n`RetryPolicy` 构造函数有五个重载，如图 5-16 所示，但最常用的重载接受两个参数：重试次数和重试之间的等待时间。\n\
  \n**图 5-16.** 重试策略构造函数\n\n此示例简单地将尝试次数定义为三，并将重试间隔设置为三秒。定义重试策略后，可以通过 `ReliableSqlConnection`\
  \ 类将其应用于连接。此类提供了一种可靠地打开连接并执行命令的方法。\n\n`ReliableSqlConnection` 类也有三个重载：连接字符串、应用于连接的已定义重试策略，以及可选的命令。\n\
  \n向 Button2 添加以下代码，该代码使用 `ReliableSqlConnection` 类并将重试策略应用于连接和命令：\n\n```csharp\n\
  using (ReliableSqlConnection cnn = new ReliableSqlConnection(connString, myretrypolicy,\
  \ myretrypolicy))\n{\n    try\n    {\n        cnn.Open();\n        using (var cmd\
  \ = cnn.CreateCommand())\n        {\n            cmd.CommandText = \"SELECT * FROM\
  \ HumanResources.Employee\";\n            using (var rdr = cnn.ExecuteCommand<IDataReader>(cmd))\n\
  \            {\n                //\n            }\n        }\n    }\n    catch (Exception\
  \ ex)\n    {\n        MessageBox.Show(ex.Message.ToString());\n    }\n}\n```\n\n\
  \n# 第 6 章 SQL 报告\n\n## 总结\n\n本章首先讨论了部署应用程序的不同因素，例如将应用程序保留在本地或在 Azure 中托管。我们还从数据库端介绍了应用程序迁移，提供了将数据库迁移到云端时需要考虑的一些想法和概念，例如要移动多少数据。\n\
  \n接着我们讨论了连接和查询 SQL 数据库实例的不同编程方法，为每种方法提供了示例，包括 ADO.NET 和 ODBC。\n\n然后，我们探讨了通过 WCF\
  \ 数据服务访问 SQL 数据库实例的方法。鉴于当今不仅来自 Microsoft，整个业界都对 SOA 架构有强烈重视，对 WCF 数据服务的讨论为您的 SQL\
  \ 数据库实例提供了服务层的坚实基础。\n\n最后，我们讨论了一些关键的最佳实践，例如在应用程序中实现重试策略，这可以极大地改善最终用户体验，并为基于云的应用程序增添所需的弹性。\n\
  \n除了重试，我们还讨论了其他最佳实践，包括连接池和使用`SqlConnectionStringBuilder`类。对所有应用程序开发（无论其是否基于云）而言，一个重要的组成部分是故障处理和重试逻辑的实现。本章花了些篇幅介绍重试逻辑，因为它对基于云的应用程序至关重要。如果实现了所有这些最佳实践，将有助于确保应用程序运行良好。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## SQL 报告概述\n\nSQL 报告是一个基于经过验证的\
  \ SQL Server Reporting Services 构建的云端报告平台。简而言之，SQL 报告就是作为高可用云服务运行的 SQL Server Reporting\
  \ Services。\n\n这意味着几件事情。首先，您不需要安装自己的 Reporting Services 实例，也不需要维护这些实例（例如应用更新）。其次，作为\
  \ SQL 数据库平台的一部分，SQL 报告可以利用 Azure 平台的优势，为您的报告服务提供高可用性和可扩展性。第三，您可以使用与当前用于构建本地报告相同的熟悉工具来构建报告。最后，开发人员可以将报告作为基于\
  \ Windows Azure 解决方案的集成部分交付。\n\n在本地环境中，配置一个新的 SQL Server Reporting Services 服务器通常需要多长时间？即使您有一台备用服务器，将该服务器添加到您的\
  \ SQL Server 环境通常也需要几个小时。如果能在几分钟内配置一个新的报告服务器会怎样？现在，借助 SQL 报告，您可以在享受 Azure 平台优势（让\
  \ Microsoft 管理物理管理）的同时做到这一点。\n\n使用 SQL 报告，您可以快速轻松地配置和部署报告解决方案，同时利用 Windows Azure\
  \ 平台的企业级可用性、可扩展性和安全性。\n\n通过介绍这些内容后，了解 SQL 报告的架构将有助于您了解 SQL Database 中报告的工作原理。\n\n\
  ## 架构\n\nSQL 报告服务的架构内置了负载均衡和高可用性。图 6-1 展示了 SQL 报告架构的不同组件，我们将对此进行讨论。\n\n*图 6-1. SQL\
  \ 报告服务 架构*\n\n每个 SQL 报告报告都通过服务端点访问，并引用特定报告。请注意，这与访问本地报告服务器没有什么不同，只是在这种情况下，您访问的是服务端点而不是物理机器。\n\
  \n请求通过负载均衡器路由，该均衡器将请求进一步路由到架构中的两个应用层：\n\n- 报告服务网关\n- 报告服务节点\n\n#### 网关\n\nReporting\
  \ Services 网关处理所有智能元数据路由。例如，网关实现了智能路由，这意味着当报告请求进入时，每个请求都会被处理并发送到处理该请求的最佳可用报告服务器。这增强了系统可用性的安全性和控制。例如，如果一个报告（请求）导致特定节点故障，网关可以智能地停止向该特定\
  \ Reporting Services 节点路由请求。\n\n#### 节点\n\n\n这些节点是实际的报表服务器。它们被描述为**多租户**的，意味着每个节点拥有自己的\
  \ `catalog` 和 `tempDBs`（源自 SQL Database）。节点构建在 SQL Database 之上；因此，用于 SQL Reporting\
  \ 的**数据层**是 SQL Database。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  # 第 6 章 ■ SQL REPoRTing\n\n值得注意的是，网关所提供的服务与 SQL Database 智能元数据路由层的工作方式非常相似；事实上，SQL\
  \ Reporting 架构中复现了其中一些设计模式。\n\n### 功能比较\n\n在进入本章的“动手实践”部分之前，先重点介绍 SQL Server Reporting\
  \ Services 和 SQL Reporting 之间的一些异同点将非常有益（参见表 6-1）。\n\n**表 6-1.** SQL Server Reporting\
  \ Services 与 SQL Reporting 功能比较\n\n| 类别 | SQL Server Reporting Services | SQL Reporting\
  \ |\n| :--- | :--- | :--- |\n| 工具 | 商业智能开发工作室 (BIDS) | 商业智能开发工作室 (BIDS) |\n| 数据源\
  \ | 内置或可自定义的数据源 | SQL Database 实例 |\n| 报表管理 | 本机模式使用报表管理器，SharePoint 应用程序页面。 | Windows\
  \ Azure 管理门户。 |\n| 报表查看 | 可在浏览器、通过 Windows 窗体和 ASP.NET 的报表查看器中查看报表。 | 可在浏览器、通过 Windows\
  \ 窗体、ASP.NET 和 SharePoint 的报表查看器中查看报表。 |\n| 报表呈现 | 可将报表显示并呈现为不同格式。 | 可将报表显示并呈现为不同格式。\
  \ |\n| 订阅 | 可创建订阅并计划投递。 | |\n| 可扩展性 | 用于数据、处理、呈现、投递和安全性的自定义扩展 | 此版本不支持任何扩展。 |\n\
  | 安全模型 | Windows 身份验证及其他支持的身份验证 | SQL Database 用户名和密码身份验证 |\n\nSQL Server Reporting\
  \ Services 和 SQL Reporting 都具备通过角色分配向报表及相关项目应用权限的能力。\n\n表 6-1 中的列表是一个简要的功能比较；此外，以下\
  \ SQL Server Reporting Services 功能目前在 SQL Reporting 中不受支持：\n\n-   创建订阅或安排报表快照。\n\
  -   创建 SMDL 报表模型。\n-   使用 Report Builder 1.0、2.0 或 3.0 创建报表。但是，您可以使用 3.0 版本创建报表，然后通过将其添加到\
  \ BIDS 中来部署报表。\n-   不支持 SharePoint 集成模式。支持本机模式。\n\n需要注意的是，报表管理器不可用，但 SQL Database\
  \ Reporting 门户提供了类似功能。\n\n是时候开始“动手实践”了，因此本章的剩余部分将讨论如何创建 SQL Reporting 服务器并将报表部署到该服务器。本章使用适用于\
  \ Windows Azure SQL Database 的完整 AdventureWorks 数据库。该数据库及其安装说明可在此处找到：\n\n[`msftdbprodsamples.codeplex.com/releases/view/3704`](http://msftdbprodsamples.codeplex.com/releases/view/3704)\n\
