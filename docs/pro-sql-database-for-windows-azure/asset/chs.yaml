  \n本节讨论了连接和查询 SQL 数据库的不同机制，包括`ADO.NET`、`ODBC`和`sqlcmd`的示例。你可以看到连接过程与你当前连接和查询本地数据库的方式非常相似。然而，考虑到整个行业向`SOA`架构的推动，让我们将讨论提升到一个新的水平，看看如何使用服务，特别是`WCF\
  \ 数据服务`，来连接到我们的 Azure 数据库。\n\n### WCF 数据服务\n`WCF 数据服务`（以前称为`ADO.NET 数据服务`）是支持创建和使用`OData`服务的工具。`OData`（开放数据协议）是一种新的数据共享标准，允许在不同系统之间更广泛地共享数据。在它被称为`WCF\
  \ 数据服务`之前，`ADO.NET 数据服务`是最早支持`OData`的 Microsoft 技术之一，随 Visual Studio 2008 `SP1`推出。Microsoft\
  \ 已经在 SQL Server 2008 R2、Windows Azure Storage 等产品中扩展了对`OData`的支持。本节将讨论如何使用`WCF\
  \ 数据服务`连接和查询你的 SQL 数据库实例。\n\n#### 创建数据服务\n首先，你需要创建一个数据服务。请按照以下步骤操作：\n\n1.  启动 Visual\
  \ Studio（为安全起见，以管理员身份运行 Visual Studio），并创建一个新的 C#\n\n\n\n1. 首先，在 Visual Studio 中创建一个新的\
  \ ASP.NET Web 应用程序（在“新建项目”对话框中，从已安装的模板列表中选择“Web”选项），并将其命名为`WCFDataServiceWebApp`。（您可以将数据服务承载在多种不同的环境中，但本示例使用\
  \ Web 应用程序。）\n\n2. 在关系型数据库之上创建数据服务的下一个步骤是定义用于驱动数据服务层的模型。最佳方法是使用 ADO.NET Entity Framework，它允许您将实体模型公开为数据服务。为此，您需要向\
  \ Web 项目添加一个新项。右键单击 Web 项目并选择“新建项”。在“添加新项”对话框中，从“类别”列表中选择“数据”，然后从“模板”列表中选择“ADO.NET\
  \ 实体数据模型”。将模型命名为`AW.edmx`，然后单击“确定”。\n\n3. 在“数据模型向导”的第一步中，选择“从数据库生成”选项，然后单击“下一步”。\n\
  \n4. 下一步是“选择您的数据连接”。单击“新建连接”按钮，并创建到`AdventureWorks2012` SQL 数据库实例的连接。在连接对话框中单击“确定”。\n\
  \n5. 回到“实体数据模型向导”中，选择“是的，在连接字符串中包含敏感数据”选项。将实体连接设置保存为`AdventureWorks2012Entities`，然后单击“下一步”。\n\
  \n6. 向导的下一步是“选择数据库对象”页面。选择`Person.Person`表。注意用于复数化或单数化生成对象名称的选项。如果保留此选项为勾选状态，它将在后续步骤中生效。保持其勾选状态，并单击“完成”。\n\
  \n7. Entity Framework 会查看您选择的所有表，并在您即将公开为数据服务的存储架构之上创建一个概念模型。在 Visual Studio 中，您应该会看到\
