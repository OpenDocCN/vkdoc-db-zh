- "# SQL 数据库登录与用户管理入门\n\n#### 创建新登录名\n\n要创建新的登录名，必须连接到 `master` 数据库。连接后，使用 `CREATE\
  \ LOGIN` 命令创建登录名。\n\n连接到 `master` 数据库（使用管理员账户或任何被授予 `loginmanager` 角色的账户），并运行以下命令：\n\
  \n```sql\nCREATE LOGIN test WITH PASSWORD = 'T3stPwd001'\n```\n\n此时，应该有一个名为 `test`\
  \ 的新登录名可用。但直到创建用户后才能实际登录。要验证登录名是否已创建，请运行以下命令：\n\n```sql\nselect * from sys.sql_logins\n\
  ```\n\n*图 1-12. 从 `master` 数据库查看 SQL 登录名*\n\n如果尝试在用户数据库中创建登录账户，会收到错误。登录名必须在 `master`\
  \ 数据库中创建。\n\n*图 1-13. 在用户数据库中创建登录名时的错误*\n\n如果密码复杂度不够，会收到类似这样的错误信息。\n\n*图 1-14. 密码复杂度不足时的错误*\n\
  \n`Note`：在云环境中运行时，选择强密码至关重要，即使你的数据库仅用于开发或测试。强密码和防火墙规则是抵御数据库攻击的重要安全防线。第 3 章将深入探讨安全性。\n\
  \n#### 创建新用户\n\n现在可以为测试登录名创建用户账户。为此，使用管理员账户连接到一个用户数据库（如果此登录名需要能够连接到 `master` 数据库，也可以在那里创建用户），并运行以下命令：\n\
  \n```sql\nCREATE USER test FROM LOGIN test\n```\n\n如果未先创建登录账户就尝试创建用户，会收到类似这样的消息。\n\
  \n*图 1-15. 未先创建登录账户就创建用户时的错误*\n\n`Note`：不能创建与管理员登录名同名的用户。这是因为管理员登录名已映射到用户 `dbo`。你可以在图\
  \ 1-8 的属性窗格中找到管理员登录名。\n\n### 分配访问权限\n\n至此，已在 `master` 数据库中创建了登录账户，在用户数据库中创建了用户账户。但此用户账户尚未被分配任何访问权限。\n\
  \n要允许 `test` 账户对所选的用户数据库拥有无限制访问权限，需要将该用户添加到 `db_owner` 角色组：\n\n```sql\nEXEC sp_addrolemember\
  \ 'db_owner', 'test'\n```\n\n现在，你已准备好使用 `test` 账户来创建表、视图、存储过程等。\n\n`Note`：在 SQL\
  \ Server 中，用户账户会自动分配到 `public` 角色。然而，在 SQL Database 中，出于增强安全性的考虑，`public` 角色不能分配给用户账户。因此，必须授予特定的访问权限才能使用用户账户。\n\
  \n## SQL Database 计费理解\n\nSQL Database 采用按需付费模式，费用包括基于每日消耗的数据库数量和大小的月度费用，以及基于实际带宽使用量的费用。使用\
  \ SQL Database，你只需为实际使用量付费；因此，一个 7GB 的数据库实例会比 8GB 的实例便宜。并且正如你所料，每 GB 空间的使用成本随着数据库规模的增大而降低。因此，一个\
  \ 100GB 的数据库实例比两个 50GB 的实例更便宜。此外，在撰写本文时，当 SQL Database 实例的消费应用程序部署为 Windows Azure\
  \ 应用程序或服务，并且与数据库属于同一地理区域时，带宽费用将被免除。\n\n要从计费角度查看当前的带宽消耗和已配置的数据库，可以运行以下命令：\n\n```sql\n\
  SELECT * FROM sys.database_usage -- databases defined\nSELECT * FROM sys.bandwidth_usage\
  \ -- bandwidth\n```\n\n第一条语句返回特定类型（Web 或 Business 版）每日可用的数据库数量。此信息用于计算月度费用。第二条语句显示每个数据库的每小时消耗明细。\n\
  \n请注意，此数据库中存储的信息可保留一段时间，但最终会被微软清除。你应该能在此表中查看最近三个月的数据。\n\n*图 1-16. 每小时带宽消耗*\n\n图\
  \ 1-16 显示了返回带宽消耗的语句的示例输出。该语句返回以下信息：\n*   `time`：带宽适用的小时。例如，查看 2011 年 12 月 22 日凌晨\
  \ 1 点到 2 点之间的汇总。\n*   `database_name`：提供汇总信息的数据库。\n*   `direction`：数据移动方向。`Egress`\
  \ 表示出站数据，`Ingress` 表示入站数据。\n*   `class`：如果数据是从 Windows Azure 外部的应用程序（例如 SQL Server\
  \ Management Studio 应用程序）传输的，则为 `External`。如果数据是从 Windows Azure 内部传输的，则此列包含 `Internal`。\n\
  *   `time_period`：数据传输的时间窗口。\n*   `quantity`：传输的数据量，以千字节（KB）为单位。\n\n请访问 [`www.microsoft.com/windowsazure`](http://www.microsoft.com/windowsazure)\
  \ 获取最新的定价信息。\n\n## SQL Database 的限制\n\n正如你所见，创建数据库和用户需要手动编写脚本和切换数据库连接。\n\nSQL Server\
  \ 和 SQL Database 之间的根本差异在于云计算的基本设计原则，必须仔细权衡性能、易用性和可扩展性。用户数据库可能位于不同物理服务器上的事实带来了自然的限制。此外，针对\
  \ SQL Database 设计应用程序和服务需要你对这些限制有深刻的理解。\n\n### 安全性\n\n第 3 章将深入介绍安全性，但以下列表总结了在部署\
  \ SQL Database 实例之前需要考虑的重要安全事项。从安全角度来看，你需要考虑以下约束：\n\n*   `Encryption`：尽管 SQL Database\
  \ 使用 SSL 进行数据传输，但它不支持 SQL Server 中可用的数据加密功能。不过，SQL Database 提供了对哈希函数的支持。\n*   `SSPI\
  \ authentication`：SQL Database 仅支持数据库登录。因此，不支持使用安全支持提供程序接口（SSPI）的网络登录。\n*   `Connection\
  \ constraints`：在某些情况下，数据库连接会因以下原因之一而关闭：\n    *   资源使用过度\n    *   长时间运行的查询\n\n\n"
- "# 长时间运行的单一事务\n- 空闲连接\n- 因服务器故障导致的故障转移\n\n## 不允许使用的用户名\n出于安全原因，某些用户名无法创建：\n- `sa`\n\
  - `admin`\n- `administrator`\n- `guest`\n- `root`\n\n## 登录名\n在某些情况下，你可能需要在登录名后附加服务器名称才能成功登录，格式如下：`[loginName]@[servername]`。因此，请避免在登录名中使用\
  \ at 符号 (`@`)。\n\n## TCP 端口 1433\n仅允许使用 TCP 端口 `1433`。无法为 SQL 数据库定义其他侦听端口。\n\n####\
  \ 备份\n备份你的 SQL 数据库实例与备份传统的 SQL Server 数据库有些不同。你无法以传统方式备份 SQL 数据库实例，也无法在 SQL 数据库中还原\
  \ SQL Server 数据库。但是，你可以在导出/导入数据之前，创建 SQL 数据库实例的事务一致性克隆。关于备份，你可以期待以下内容：\n\n- **备份/还原操作。**\
  \ 这些操作不可用。此外，你无法附加或分离 SQL 数据库实例。\n- **克隆操作。** 你可以使用 `CREATE DATABASE` 语句将 SQL 数据库实例克隆到另一个实例中。\n\
  - **日志文件。** 你无法访问数据库日志文件，也无法创建日志备份。\n- **导出/导入数据。** 你可以使用导入和导出功能执行这些操作。\n- **还原。**\
  \ 你可以使用“时间点还原”功能。\n\n#### 对象\nSQL Server 中的某些对象在 SQL 数据库中不可用。如果你的应用程序严重依赖这些功能，可能会在使用\
  \ SQL 数据库时遇到困难，并且你可能需要重新考虑应用程序设计以适应这些限制。以下是目前适用于 SQL 数据库的一些限制：\n\n- **CLR。** SQL\
  \ 数据库中不提供 .NET CLR。因此，你无法创建扩展存储过程或扩展函数。\n- **系统函数。** SQL 数据库支持许多系统函数，包括聚合函数和排名函数。但是，SQL\
  \ 数据库不支持 RowSet 函数，包括：\n  - `OPENQUERY`\n  - `OPENXML`\n  - `OPENROWSET`\n  - `OPENDATASOURCE`\n\
  - **系统存储过程。** SQL 数据库仅提供一小部分系统存储过程，分为以下几类：\n  - 目录存储过程\n  - 数据库引擎存储过程\n  - 安全存储过程\n\
  - **系统表。** 所有系统表均不可用。\n- **系统视图。** 提供一部分系统视图；你可以从 master 数据库访问其中一些，从用户数据库访问另一些。以下是一些可用的系统视图（完整列表请参阅\
  \ SQL 数据库的在线 MSDN 库）：\n  - `sys.sql_logins`\n  - `sys.views`\n  - `sys.databases`\n\
  \  - `sys.columns`\n  - `sys.objects`\n- **堆表。** SQL 数据库不允许使用堆表。所有表都必须具有聚集索引。\n\n\
  #### 其他\n除了上述限制之外，SQL Server 提供的其他组件和选项在 SQL 数据库中不可用。在大多数情况下，这些限制不会影响你的应用程序设计，但最好记住它们：\n\
  \n- **最大数据库数量。** 你最多只能创建一百五十个用户数据库。\n- **分布式事务。** 虽然支持 SQL 事务，但不支持跨 SQL 数据库实例的分布式事务。\n\
  - **排序规则。** SQL 数据库在列和数据库级别支持排序规则，或在执行时使用表达式。服务器级别的排序规则无法更改，并设置为 `SQL_LATIN1_GENERAL_CP1_CI_AS`。在数据库级别设置后，无法使用\
  \ `ALTER DATABASE` 命令更改排序规则。\n- **英语。** SQL 数据库仅支持英语。\n- **数据库大小。** 你只能创建特定大小的数据库，如前所述。\n\
  - **基于行版本控制的隔离级别。** `READ_COMMITTED_SNAPSHOT` 和 `ALLOW_SNAPSHOT_ISOLATION` 选项在数据库级别设置，且无法更改。\n\
  - **数据库文件放置。** 你无法选择数据库文件的物理部署方式；也无法控制文件组。这由 Microsoft 数据中心自动处理以实现最佳性能。\n- **跟踪标志。**\
  \ 跟踪标志不可用。\n- **SQL Server 配置选项。** 所有常规 SQL Server 选项均不可用，包括 CPU 和 I/O 亲和性。\n- **Service\
  \ Broker。** Service Broker 不可用。\n- **全局临时表。** 全局临时表不可用。但是，你可以使用局部临时表。\n- **SQL Server\
  \ Agent。** SQL Server Agent 不可用。\n\n#### 驱动程序和协议\n你还应该知道，访问 SQL 数据库只能使用特定的库执行。如果你的编程栈中不使用\
  \ ADO.NET，这可能相关。例如，旧版本的 Delphi 无法连接到 SQL 数据库。以下是支持的数据库的摘要：\n\n- **TDS 版本 7.3 或更高版本。**\
  \ 不支持使用低于 7.3 版本的 TDS 的任何客户端。\n- **驱动程序和库。** 允许使用以下驱动程序和库：\n  - .NET Framework Data\
  \ Provider for SQL Server（来自 .NET 3.5 SP1）\n  - SQL Server 2008 Native Client ODBC\
  \ 驱动程序或更高版本\n  - SQL Server 2008 driver for PHP 版本 1.1 或更高版本\n\n"
- '# 总结

  本章通过提供云计算的高层次介绍以及 Microsoft 如何交付其云产品，重点对 SQL 数据库进行了快速概览。你还了解了创建 Azure 账户的主要步骤以及如何开始使用
  SQL 数据库。你了解了 SQL 数据库平台的一些重要限制，但请记住，Microsoft 每隔几个月就会发布其云数据库的新版本；因此，其中一些限制将随着时间的推移而解除。


