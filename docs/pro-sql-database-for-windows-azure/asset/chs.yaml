  \n## 创建 Windows Azure 项目\n\n让我们在 Visual Studio 中创建一个简单的 Windows Azure 应用程序来显示数据库用户列表。Windows\
  \ Azure 项目是使用特殊项目模板“Cloud”创建的 ASP.NET 应用程序。创建云项目时，还可以使用其他项目类型，本节稍后将进行讨论。虽然你可以先创建一个与常规\
  \ ASP.NET 应用程序相同的项目，然后再将其转换为云项目，但直接从云项目开始更简单，可以避免额外的转换步骤。\n\n### 配置开发环境\n\n你必须首先在你的开发环境中安装\
  \ Windows Azure 工具，才能开发 Windows Azure ASP.NET 应用程序。你必须运行 Windows Server 2008 或更高版本，或\
  \ Windows Vista 或更高版本。Windows Azure 工具在你的机器上提供了一个运行时环境，允许你开发和测试 Windows Azure 项目。它基本上运行一个用于开发的本地云。安装后，你会看到一个新的项目类型：Cloud。在\
  \ Visual Studio 中创建项目时，你可以选择 Cloud 项目类型；首次执行此操作时，会提供安装 Windows Azure 工具的选项。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 126](img/index-173_1.png)\n\
  \n第 8 章 ■ Windows Azure 与 ASP.NET\n\n**注意**\n\n■\n\n如果你需要下载 Windows Azure 工具，请访问\
