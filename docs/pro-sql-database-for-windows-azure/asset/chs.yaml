  \n## 定价\n\n从 2012 年 8 月 1 日开始，SQL Reporting 的用户需要为其使用付费。SQL Reporting 的使用是按每个报表实例（报表服务器）的每个时钟小时计费，对于配置\
  \ SQL Reporting 服务器的每个时钟小时，至少收取一个报表实例的费用，即使没有部署任何报表。\n\n每个报表实例的价格为每小时 0.88 美元。此费用涵盖每个时钟小时最多\
  \ 200 个报表。在每个时钟小时内生成超过 200 个报表时，将额外计费一个报表实例小时（费用为 0.88 美元）（针对每额外 200 个报表块）。\n\n\
  # 小结\n\n在本章中，您首先了解了 Windows Azure SQL Reporting 是什么以及这个基于云的报表解决方案提供的诸多优势。接着讨论了 SQL\
  \ Reporting 的架构，以及该架构如何提供基于云的报表解决方案所需的高可用性和可扩展性。\n\n理解本地 SQL Server Reporting Services\
  \ 与 SQL Reporting 之间的功能差异也很重要，因此我们花了一些时间讨论这些差异以及它们可能如何影响报表开发。\n\n最后，本章讨论了配置新的 SQL\
  \ Reporting 服务器、创建和部署报表，以及 SQL Reporting 中托管报表的安全性。在开发报表时，许多功能在本地开发工具和管理门户之间是共享的，例如定义文件夹和数据源以及应用权限。这为报表开发提供了极大的灵活性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 7 章 ■ SQL Data Sync\n\n\
  当我为本书第一版撰写本章时，SQL Data Sync 还是 SQL Azure Labs 的一部分，称为 SQL Azure Data Sync Services。不久之后，它便从\
  \ SQL Azure Labs 中移出，一直处于 CTP（社区技术预览版）状态，并在 Windows Azure Management Portal 中提供。自那时起，SQL\
  \ Data Sync Services（或 DSS）已获得了巨大的发展势头和认可，到您阅读本书时，它将结束 CTP 阶段，进入全面正式发布。\n\n这里需要一些背景介绍。2009\
  \ 年 11 月，在洛杉矶举行的微软专业开发者大会（PDC）上，微软宣布了 Huron 项目，该项目允许在云中实现数据库同步功能。\n\n如果您一直关注有关 Huron\
  \ 的宣传和博客文章，您会知道微软一直将其及相关的数据库同步功能标榜为“无摩擦的”，意味着易于设置和维护。\n\n微软开发 Huron 的目标是消除数据库之间数据共享所伴随的许多典型复杂性和特殊性，例如可扩展性和配置。除了这些目标，微软还希望包含用户友好的工具，让管理员能够轻松配置和同步其数据。\n\
  \n2010 年 6 月，在新奥尔良 Tech-Ed 大会开始时，微软宣布公开预览 Huron 项目的一部分——SQL Azure 数据同步服务。这是微软提供的解决方案，使用户能够轻松高效地在数据库之间共享数据，而不受数据库位置或连接性的限制。共享数据仅仅是开始：微软还设想包含数据协作，为用户和开发人员提供使用和处理数据的能力，无论数据位于何处。\n\
  \n2012 年 5 月，微软正式实施了一种新的方法来对 Windows Azure 中的服务进行命名和品牌推广，包括 SQL Azure Data Sync\
  \ Services。因此，SQL Azure Data Sync Services 现在称为 SQL Data Sync。\n\n本章将完全专注于 SQL Data\
  \ Sync 的功能和特性。首先进行简要概述，然后向您展示如何通过设置和配置 Data Sync 服务来开始使用。接着，您将通过几个在不同场景和情况下使用 SQL\
  \ Data Sync 的示例进行学习。在此过程中，您还将看到一些模式和最佳实践，以帮助确保对 Data Sync Service 有扎实的理解。\n\n##\
  \ 理解 SQL Data Sync\n\nSQL Data Sync 提供两个或多个数据库之间的双向同步。表面上看，它就这么简单；但即使在幕后，它也没有复杂多少。无需编写一行代码，您就可以快速轻松地将您的\
  \ SQL Database 配置为与位于任何 Microsoft Azure 数据中心的其他 SQL Database 实例同步，甚至与本地 SQL Server\
  \ 同步。\n\n### 为何需要？\n\n为什么 SQL Database 实例之间的数据同步能力很重要？这是一个合理的问题。让我们探讨几个答案。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 104](img/index-148_1.png)\n\n首先，您可能是 SQL Server 复制的粉丝，但它并不是最容易设置和配置的功能。诚然，事务复制提供实时更新，但设置和维护事务复制并非易事。\n\
  \n其次，虽然 SQL Data Sync 不提供实时更新，但它确实允许您将数据扩展到最靠近用户的地点，而*无需* 大费周章。数据同步服务可让您在数据库之间无缝移动数据更改。它确保适当的更改不仅传播到当前数据中心的所有其他数据库，也传播到其他数据中心的数据库。\n\
  \n\n# 第 7 章 ■ SQL 数据同步\n\nSQL 数据同步是 Windows Azure 的一部分并在 Windows Azure 中运行，因此它可以利用\
  \ Web 工作角色和辅助工作角色。SQL 数据同步的一个关键组件是使用了 **Microsoft 同步框架**，这是一个 .NET Framework 中提供的同步平台。重要的是，所有这些同步功能都是为你提供的；同步\
  \ SQL 数据库实例时，你不需要运行任何应用程序或执行任何安装。但是，如果你需要将 SQL 数据库与本地数据库同步，则必须安装**客户端同步代理**（Client\
  \ Sync Agent），以便每个本地 SQL Server 数据库都可以注册并添加到同步组中。\n\n通过提供多个 SQL 数据库实例和 SQL Server\
  \ 之间的同步灵活性，你可以根据你的需求和业务要求创建自定义且灵活的同步组。\n\n## 基本场景\n\n每个 SQL 数据库同步环境都包含一个单一的中心数据库（`hub`）以及一个或多个成员数据库（`members`），或称为辐条（`spokes`），如图\
  \ 7-1 所示。中心是同步组中的核心数据库。辐条是与中心同步的成员数据库。设置同步包括在同步组中创建和定义同步组，指定中心数据库，然后将成员数据库分配给该中心。\n\
  \n**图 7-1.** 同步场景\n\n让我们谈谈初始同步，因为理解这个过程以及发生的变化会很有帮助。初始同步发生时，这是一个两步过程：\n\n1.  中心数据库架构被复制到成员数据库。\n\
  2.  数据从中心数据库复制到成员数据库。\n\n这看起来可能很简单，但我们来讨论一下这两个步骤中会发生什么。首先，你不需要自己生成目标（成员）数据库架构。在第一步中，Data\
  \ Sync 服务会为你完成（针对你指定要同步的表）。作为此过程的一部分，外键约束**不会**被复制。这是因为截至目前，Data Sync 服务中尚未构建完整的架构同步能力。\n\
  \n由于外键没有被复制，你可能会想，在成员处输入了可能破坏同步回中心的数据时会发生什么。答案是你可以控制数据应用的顺序，这有助于确保应用的更改不会影响任何外键约束。在初始同步期间，中心和成员数据库都会进行更改以有效跟踪数据更改。你将在本章后面的示例中看到此行为。\n\
  \n下一步是在所有成员数据库配置完成后进行数据同步。成员的配置在初始同步期间进行。数据同步就像按照配置中指定的顺序将数据从中心复制到成员一样简单。由于成员数据库上没有外键，因此表不需要按特定顺序同步。但是，将表按照数据同步发生时更改应用的顺序添加是一个好习惯。这有助于确保更改以不影响任何外键约束的方式应用。\n\
  \n## 常见的同步场景\n\n许多企业中的一个常见需求是在不同位置之间分发数据。这些位置可能在地理上接近，也可能分散在全球不同地区。无论办公室位于何处，在位置之间共享、整合或迁移数据都是必要的常态。\n\
  \n随着云计算变得更加主流，移动、分发和同步这些数据的能力变得更加关键。在云计算中，数据同步通常分为以下四类：\n\n-   将数据从本地数据突发到云中\n-\
  \   将来自多个位置的数据聚合到单个中心位置\n-   将数据从云备份到本地\n-   数据地理分布\n\n前两种场景侧重于本地应用程序可以利用和利用云来轻松扩展其本地基础设施并利用云环境的情况。例如，一家公司可能需要额外的计算能力但没有本地资源。通过将数据突发到云中，它可以轻松利用现成的云资源。\n\
  \n数据聚合是许多企业中常见的场景，其中来自两个或多个卫星位置或合作伙伴企业的数据需要被拉取到单个中心位置。在当今的此类场景中，你通常会看到涉及 BizTalk\
  \ 或 SQL Server Integration Services 的解决方案。\n\n最后两种场景侧重于基于云的应用程序需求。常见情况包括需要将云数据的“备份”提供到本地位置。更常见的是需要地理分发数据，将数据移动到需要访问它的用户附近。\n\
  \n然而，无论何种场景，Windows Azure SQL Data Sync 都提供了企业所需的数据同步和数据迁移解决方案。易于配置、快速部署、服务的可扩展性和可用性以及强大的功能使\
  \ SQL Data Sync 成为所有这四种常见场景的可行解决方案。\n\n## 架构\n\n了解 SQL Data Sync 的架构将有助于理解 SQL 数据库中的报告工作原理。\n\
  \n图 7-2 显示了 SQL Data Sync 的基本架构。\n\n![Image 105](img/index-150_1.png)\n\n**图 7-2.**\
  \ SQL Data Sync 服务架构\n\nSQL Data Sync 包含四个主要组件：\n\n-   SQL Data Sync 服务\n-   Windows\
  \ Azure SQL 数据库\n-   Windows Azure 存储\n-   Data Sync 代理\n\nWindows Azure 管理门户是 SQL\
  \ Data Sync 服务的用户界面。该服务负责执行同步、与 Windows Azure SQL 数据库和 Windows Azure Blob 存储通信，以及处理来自\
  \ Data Sync 代理和 Windows Azure 管理门户的传入请求。\n\nWindows Azure Blob 存储用于临时存储包含上传数据更改的批处理文件。\n\
  \n该架构中的关键是 SQL Data Sync 服务本身。它是同步过程的核心。SQL Data Sync 服务与架构中的所有其他组件通信，并管理数据执行所有任务的流程。\n\
  \n该架构背后的基本思想和概念如下：\n\n-   Data Sync 构建在 Windows Azure 公共平台上。\n-   你可以在 Windows Azure\
  \ 平台上快速轻松地配置同步组并执行同步。\n\n与 SQL Reporting 一样，SQL Data Sync 管理在新的预览门户中尚不可用，因此本章将使用现有\
  \ Silverlight 门户中的 SQL Data Sync 进行说明。\n\n## 配置同步\n\n现在你已经熟悉了 Data Sync 服务工作原理的基础，让我们深入研究并为\
  \ SQL Data Sync 配置一个新的同步，以便同步两个数据库。此示例同步了与第 6 章中使用的相同的 Windows Azure SQL 数据库的 `AdventureWorks`\
  \ 数据库。你可以在此处找到该数据库和安装说明：\n\n[`msftdbprodsamples.codeplex.com/releases/view/3704`](http://msftdbprodsamples.codeplex.com/releases/view/3704)\n\
  \n\n### 配置 SQL 数据同步服务器\n\n此数据库将成为枢纽数据库。此外，本示例将使用两个成员数据库；一个位于本地，另一个是 SQL Database。我的第二个\
  \ SQL Database 将位于第二个区域以说明区域同步，但如果您正在逐步执行本示例，请随意将第二个 SQL Database 放在同一区域。\n\n使用您的\
  \ `LiveID` 登录到门户 [`windows.azure.com`](https://windows.azure.com)。首要任务是配置数据同步服务器。\n\
  \n导航窗格分为两个部分。下部包含管理门户中可用的组件和服务。顶部部分显示链接到您 `LiveID` 的可用订阅列表，或如图 7-3 所示的用于入门的有用链接。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 106](img/index-152_1.jpg)\n\
  \n**图 7-3.** 导航窗格中的数据同步选项\n\n请按照以下步骤配置数据同步服务器：\n\n1.  在导航窗格中选择**数据同步**选项，然后选择您希望在其中配置和设置\
  \ SQL 数据同步的订阅。根据所选选项，顶部的菜单栏和门户中心的列表项部分会发生变化。当您选择订阅时，菜单栏和列表项部分中的唯一选项就是配置新的数据同步服务器。\n\
  2.  要配置新的数据同步服务器，只需单击菜单栏上的按钮或列表项部分中的链接。任一选项都将显示**配置**对话框。首先您会看到**使用条款**。勾选“我同意上述使用条款声明”复选框，然后单击**下一步**。\n\
  3.  **配置**对话框的下一步要求您选择要在其中配置数据同步服务器的**订阅**。是的，您已经在导航窗格中选择了订阅，但如果您改变主意想选择不同的订阅，可以在此处进行，而无需重新开始。选择订阅并单击**下一步**。\n\
  4.  最后，选择您希望在其中配置服务器的区域。通常，您会希望将此服务器配置在您的枢纽数据库所在的位置，以限制数据流量。选择区域并单击**完成**。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 107](img/index-153_1.png)\n\n配置过程只需几秒钟。但是，您会注意到您不会获得一个真正的服务器名称，而是一个逻辑服务器，您可以在其中配置数据同步。例如，如果您在美国中北部配置服务器，您的数据同步服务器将被列为“美国中北部”。\n\
  \n### 创建同步组\n\n下一步是创建并配置一个*同步组*。同步组是为相互同步而配置的 SQL Database 实例和 SQL Server 数据库的集合。同步组包含单个*枢纽*数据库和一个或多个*成员*数据库。枢纽数据库必须是\
  \ SQL Database 实例。\n\n在导航窗格的顶部区域，展开列出您的新数据同步服务器的节点。在该节点下，您将看到两个子节点，分别标记为**同步组**和**成员数据库**。选择**同步组**节点，如图\
  \ 7-4 所示，有多个用于创建同步组的选项。\n\n**图 7-4.** 创建同步组\n\n如果您对 SQL 数据同步不熟悉，**SQL 数据同步入门**下的两个选项提供了创建不同同步组类型的分步演练。第一个选项创建一个本地到\
  \ SQL Database 的同步组。第二个选项在多个 SQL Database 实例之间创建同步组。\n\n但请注意，还有第三个选项。在功能区的**同步组**部分中，有一个名为**创建**的可用按钮。本章中的示例将使用该按钮。请继续并单击该按钮。您不会得到一个分步演练，而是会看到整个模板以供配置，如图\
  \ 7-5 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 108](img/index-154_1.png)\n\
  \n**图 7-5.** 创建同步组\n\n这个“模板”非常易于浏览。蓝色部分是您添加“云”或 SQL Database 实例的地方，黄色部分是您添加本地 SQL\
  \ Server 数据库的地方。右侧部分用于同步组配置，例如定义同步计划、您希望同步的数据以及冲突解决策略。再次强调，请记住，所有这些操作都无需编写一行代码即可完成。\n\
  \n无论您是使用其中一个演练选项，还是决定从空白模板开始创建同步组，您都需要为同步组命名。名称无所谓，但要让它有意义。稍后我们将讨论最佳实践，信不信由您，同步组的命名很重要。\n\
  \n## 定义枢纽和成员数据库\n\n第一步是定义枢纽数据库。为此，只需单击标有“单击以添加 Windows Azure SQL 数据库作为同步枢纽”的中心图标。是的，很明显。单击该图标会弹出如图\
  \ 7-6 所示的**将数据库添加到同步组**对话框。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 109](img/index-155_1.png)\n\n**图 7-6.** 添加枢纽\n\n在**将数据库添加到同步组**对话框中，输入枢纽数据库的服务器名称、数据库名称和凭据，然后单击**添加**。对于此示例，您应使用\
  \ `AdventureWorks2012` 数据库。\n\n请注意，现在同步组中的图标显示了数据库名称和服务器名称。它还包含两个至关重要的信息。首先，它显示“未部署”。这意味着尽管我们已将此数据库标记为枢纽，但我们实际上尚未为同步预配该数据库。\n\
  \n其次，图标显示一个小绿圈，表示数据同步服务可以成功连接到 SQL Database 实例并与其通信。\n\n**注意：** 如果无法与 SQL Database\
  \ 实例通信，图标将显示一个红色 X。如果出现这种情况，您应该检查防火墙规则以确保已为您的 `IP 地址`添加规则，或者检查凭据以确保输入正确。\n\n下一步是预配成员数据库。我们将首先通过单击标有“单击以添加\
  \ Windows Azure SQL 数据库”的图标来预配 SQL Database 成员。同样，很明显。这将弹出一个类似于枢纽的对话框。输入成员数据库的服务器名称、数据库名称和凭据。\n\
  \n但是，此对话框包含一个用于设置**同步方向**的额外配置。同步方向只是指定数据同步的方向。有三个选项：\n\n-   **双向：** 枢纽和成员之间双向同步数据。\n\
  -   **同步到枢纽：** 数据仅从成员同步到枢纽。\n-   **从枢纽同步：** 数据仅从枢纽同步到成员。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 110](img/index-156_1.png)\n\n默认是**双向**，这也是本示例将使用的选项。单击**测试**以测试连接并确保所有输入的信息正确；然后单击**添加**。请注意，成员图标现在看起来类似于枢纽图标，表明它也正在等待预配。\n\
  \n\n\n下一步是配置本地成员。这需要多几个步骤，但仍然相当容易。单击“同步组”模板黄色部分中标签为“单击以添加 SQL Server 数据库”的图标。这将打开与之前相同的对话框，但提供了一些不同的选项。\n\
  \n此前已说明，为了与本地 SQL Server 数据库同步，有必要在本地环境中的计算机上安装客户端代理（更多信息请参阅“数据同步最佳实践”部分）。此代理是一个\
  \ Windows 服务，它位于 SQL Server 数据库和 SQL 数据库中心之间，实现基于 HTTPS 的双向通信。\n\n图 7-7 显示了此对话框。然而，这次界面是一个多步向导，引导您完成客户端代理的安装和注册。\n\
  \n**图 7-7.** 将本地数据库添加到同步组\n\n如果您是首次安装客户端代理并注册一个新的本地数据库，则应在“添加数据库”对话框中选择的选项是“向同步组添加新的\
  \ SQL Server 数据库”。如果之前已安装客户端代理并注册过 SQL Server 数据库，则可以选择第一个选项。选择添加新数据库的选项，将“同步方向”设置为“双向”，然后单击“下一步”。\n\
  \n在对话框的下一步中，您决定是安装新代理还是使用现有代理。这一步很简单。如前所述，如果已安装客户端代理，则可以通过该代理注册本地数据库。但是，在此示例中，代理先前并未安装，因此此处选择的选项是安装新代理。选择该选项并单击“下一步”。\n\
  \n“将数据库添加到同步组”对话框的这一步是您开始安装和配置代理及本地数据库的地方，这本身也是一个多步过程。“安装新代理”对话框列出了安装和配置客户端代理所需的步骤（参见图\
  \ 7-8）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 111](img/index-157_1.png)\n\
  \n第 7 章 ■ SQL 数据同步\n\n**图 7-8.** 安装客户端代理\n\n首先，单击下载按钮。这将带您到一个可以下载客户端同步代理的网站。\n\n\
  下载名为 `SQLDataSyncAgent-Preview-ENU.msi` 的文件并运行安装程序。客户端代理的安装包括三个简单步骤：\n\n```\n1.\
  \ 同意许可协议。\n2. 输入您希望运行该服务所用的账户。\n3. 选择安装文件夹。\n```\n\n如前所述，用于配置客户端代理的账户必须能够通过您网络的代理访问网络以到达数据同步服务。输入适当的信息，接受默认的安装文件夹，然后单击安装。\n\
  \n安装完成后，您会发现列出了一项新的 Windows 服务，名为 `Microsoft SQL Data Sync`。如果安装成功，服务状态将显示为“正在运行”。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 112](img/index-158_1.png)\n\
  \n第 7 章 ■ SQL 数据同步\n\n在客户端代理中还有几件事要做，但首先我们需要返回到管理门户。\n\n在“安装新代理”对话框中，在步骤 2 中输入一个代理名称。虽然此代理的名称不如同步组名称关键，但为其指定一个有意义的名称仍然会很有帮助。\n\
  \n输入代理名称后，单击生成代理密钥按钮。系统将生成一个密钥并显示在对话框中（附带一个复制按钮）。单击复制按钮将密钥复制到剪贴板。\n\n先不要单击下一步。接下来要做的是启动\
  \ `SQL 数据同步代理`，可以在开始菜单中找到它。启动后，首先要做的是输入刚刚复制到剪贴板的配置密钥。\n\n单击提交代理密钥按钮，并在代理密钥对话框中输入该密钥。单击确定。\n\
  \n密钥注册后，下一步是单击 Ping 同步服务按钮，以确保客户端代理可以与数据同步服务通信。如果客户端代理可以成功 ping 通数据同步服务，将显示一个对话框通知您。\n\
  \n接下来，单击注册按钮以注册一个本地 SQL Server。可以使用 Windows 身份验证或 SQL 身份验证注册 SQL Server。此示例使用的是\
  \ Windows 身份验证。输入服务器名称和数据库名称；然后单击测试连接按钮以确保客户端代理可以连接到所选数据库。\n\n在连接测试对话框中单击确定，然后在图\
  \ 7-9 所示的 SQL Server 注册对话框中单击保存。\n\n**图 7-9.** 已配置的同步客户端\n\n最后，返回到管理门户，并在“安装新代理”对话框中单击下一步。该对话框现在显示一个先决条件检查，并包含下一步的信息。在步骤\
  \ 2 部分单击获取数据库列表按钮。这将与数据同步代理通信，并返回已注册数据库的列表以填充步骤 3 的下拉列表，如图 7-10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 113](img/index-159_1.png)\n\n![Image 114](img/index-159_2.png)\n\n第 7\
  \ 章 ■ SQL 数据同步\n\n**图 7-10.** 选择您的本地 SQL Server 数据库\n\n在步骤 3 中，从数据库下拉列表中选择数据库，然后单击完成。您的同步组模板现在应该如图\
  \ 7-11 所示。\n\n**图 7-11.** 已配置的同步组\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 115](img/index-160_1.png)\n\n第 7 章 ■ SQL 数据同步\n\n数据库已注册但尚未配置，下一步是配置同步组以定义要同步的数据和冲突解决策略。\n\
  \n### 选择要同步的表\n\n自本书上一版以来，SQL 数据同步已进行了重大增强，包括如何定义同步数据集。在同步组窗口的“配置”部分，单击编辑数据集按钮，这将显示“定义数据集”对话框。该对话框功能强大，因为您不仅可以选择要同步的表，还可以选择每个表的列。此外，可以对数据集应用行筛选以同步特定数据。在此示例中，将说明这些功能中的每一项。\n\
  \n当您滚动浏览表列表时，会注意到有些表显示为红色。您还应该注意到对话框顶部有一个明显的红色警告，说明某些表不符合架构要求。\n\n显示为红色的表无法选择用于同步。此示例将选择两个可用于同步的表：`HumanResources.Employee`\
  \ 和 `Person.BusinessEntity`。当您选择 `HumanResources.Employee` 表时，您会注意到即使表本身不是红色（可以用于同步），但某些列是红色的。这意味着这些列无法选择且不可用于同步。您可以在图\
  \ 7-12 中看到这一点。\n\n**图 7-12.** 选定的要同步的表和列，以及两个无法选择的列\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 116](img/index-161_1.png)\n\n第 7 章 ■ SQL 数据同步\n\n### 应用筛选器\n\n\n\n# 第\
  \ 7 章 ■ SQL 数据同步\n\n## 已选择表和列\n\n此时，数据集可能已经完整，但本示例将应用一个筛选器。应用筛选器非常简单。如图 7-13，c 所示，单击要筛选的列旁边的\
  \ `筛选` 复选框，然后在 `行筛选` 部分中应用行筛选条件。本示例中，选择了 `Person.BusinessEntity` 表的 `BusinessEntityID`\
  \ 列。在筛选器 `值` 字段中输入 `10000`，以筛选所有 `BusinessentityID` 大于 `10,000` 的 Person。\n\n***图\
  \ 7-13.** 行筛选*\n\n查询中心数据库中的 `Person.BusinessEntity` 表，将显示在创建数据库期间添加的 ID `1` 到 `20777`。由于对此同步组应用了筛选器，因此只有\
  \ `BusinessEntityID` 大于 `10,000` 的行才会同步到成员数据库。\n\n### 应用冲突解决策略\n\n同步组的配置几乎完成。下一步是设置冲突解决策略。当同步组内两个或多个数据库中的相同数据在同步之间被更改时，就会发生数据冲突。在\
  \ SQL 数据同步的当前版本中，您可以在两种解决策略之间选择：中心胜出和客户端胜出。\n\n• **中心胜出：** 保留首先写入中心的行更改。随后尝试写入中心同一行的操作将被忽略。首次写入中心的更改将传播到所有成员数据库。\n\
  \n• **客户端胜出：** 成员数据库中的每个行更改都会写入中心，覆盖先前对同一行的更改。最后一次写入中心的更改随后将传播到所有成员数据库。\n\n无论采用哪种策略，只要发生冲突，其中一行更改会被保留，而其他行则会丢失。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 117](img/index-162_1.jpg)\n\
  \n### 设置同步计划\n\n数据同步可以安排为最短 5 分钟，最长 1 个月。默认为 30 分钟，但本示例不会等待调度程序启动。出于本示例的目的，我们将手动执行同步。因此，取消选中\
  \ `启用` 复选框以禁用自动同步。\n\n同步组的完整配置应如图 7-14。\n\n***图 7-14.** 完整的同步组配置*\n\n配置完成；现在是部署和配置的时候了。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 118](img/index-163_1.jpg)\n\
  \n![图片 119](img/index-163_2.png)\n\n### 部署同步组\n\n配置数据库和部署同步组就像单击功能区上的 `部署` 按钮一样简单。\n\
  \n图 7-15 显示在部署过程中，每个数据库的状态将设置为 `正在配置`。一旦每个数据库准备就绪，其状态将设置为 `就绪`。\n\n***图 7-15.**\
  \ 数据库配置*\n\n本地数据库很可能会在其他两个数据库之前完成配置，这时是查看在配置过程中应用了哪些更改的好时机。图 7-16 显示了对本地数据库所做的更改。\n\
  \n***图 7-16.** 本地数据库中选定的表*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n除了数据表（`HumanResources.Employee` 和 `Person.BusinessEntity`）之外，SQL 数据同步在两个数据库中创建了六个新表，即系统同步表：\n\
  \n• `schema_info`：跟踪成员架构信息。\n\n• `scope_config` / `scope_info`：同步框架使用它们来确定正在同步哪些表、筛选器等。参与同步的每个数据库都包含这些表，并且至少包含一个范围（如果它们正在被同步）。\n\
  \n• `<table>_dss_tracking`：跟踪相关用户表的更改。\n\n• `provision_marker`：内部用作更改跟踪机制一部分的元数据表。\n\
  \n每个关系都有自己的范围——因此需要范围表。例如，中心到成员 1 的关系有一个范围，而中心到成员 2 的关系有它自己的、不同的范围。就像同步组一样，这些范围定义了要在成员之间共享的数据；多个范围组成一个同步组。范围不公开，以简化数据同步服务的管理。\n\
  \n在本示例中，创建了四个表，但请记住，同步中包含的每个表都会创建一个跟踪表。例如，如果您在同步中包含了 `Docs` 和 `UserDocs` 表，您还会看到\
  \ `Docs_tracking` 和 `UserDocs_tracking` 表。每个跟踪表负责存储其对应表的更改。\n\n此外还添加了 *触发器*（未在图\
  \ 7-16，a 中显示）。触发器被添加到每个基表，当发生更改时更新跟踪表。一些存储过程也被添加到每个数据库；数据同步服务使用它们来高效地获取和应用更改。\n\n\
  ### 调试和日志查看器\n\n到现在您应该已经意识到，同步组的两个成员都已正确配置，但中心没有。中心数据库的图标变为红色，并显示一条错误消息，指出配置失败。为什么？\n\
  \n有一种很好的方法可以找出发生了什么，那就是通过日志查看器。在工具栏上，单击 `日志查看器` 按钮。图 7-17 显示了不同类型信息显示的列表，包括错误。要查看错误的详细信息，请单击\
  \ `消息` 列末尾的 [复制] 链接，这会将错误消息的内容复制到剪贴板。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 120](img/index-165_1.png)\n\n***图 7-17.** 选定的表*\n\n打开记事本并粘贴剪贴板的内容，这将揭示即使在定义数据集时\
  \ `HumanResources.Employee` 表的 `OrganizationLevel` 列不是红色的，SQL 数据同步也无法同步该列，因为“它要么是计算列，要么是\
  \ UNION 运算符的结果”。确实，该列是一个计算列。\n\n幸运的是，这很容易修复。返回到同步组窗口，然后单击 `编辑数据集` 按钮。选择 `HumanResources.Employee`\
  \ 表并取消选中 `OrganizationLevel` 列。单击工具栏上的 `部署` 按钮以重新配置所有数据库。这次部署将会成功并启动初始同步。\n\n###\
  \ 查看同步的数据\n\n要验证同步是否成功，请跳转到 SQL Server Management Studio 并打开一个连接到本地成员数据库 `AW2012`\
  \ 的查询窗口。键入以下查询：\n\n```\nSELECT * FROM Person.BusinessEntity\n```\n\n图 7-18 显示确实所有大于\
  \ `10,000` 的行都已同步到成员数据库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![图片 121](img/index-166_1.png)\n\n***图 7-18.** 数据验证*\n\n### 编辑数据和重新同步\n\n现在让我们编辑一些数据并重新同步，然后通过重新查询数据来验证更改是否已进行。\n\
  \n返回到 SQL Server Management Studio 并打开一个连接到本地成员数据库 `AW2012` 的查询窗口。键入以下查询：\n\n```\n\
  UPDATE HumanResources.Employee SET Job Title = 'Head Geek' WHERE BusinessEntityID\
  \ = 1\n```\n\n打开另一个连接到 SQL 数据库成员实例的查询窗口并执行以下查询：\n\n```\nUPDATE HumanResources.Employee\
  \ SET Job Title = 'VP of Techy Stuff' WHERE BusinessEntityID = 2\n```\n\n不要等待计划的同步启动，而是单击工具栏上的\
  \ `立即同步` 按钮。同步应该只需要几秒钟，此时您应该能够查询 `HumanResources`。\n\n\n\n### 测试冲突解决\n\n在本例中，冲突解决设置为\
  \ `Hub Wins`。为进行快速测试，将冲突解决更改为 `Client Wins` 并部署更改。部署完成后，返回 SQL Server Management\
  \ Studio 并在本地数据库上执行以下查询：\n\n```sql\nUPDATE HumanResources.Employee SET JobTitle\
  \ = 'Chief Executive Officer' WHERE BusinessEntityID = 1\n```\n\n等待 1 分钟，然后在 SQL\
  \ Database 成员实例上执行以下查询：\n\n```sql\nUPDATE HumanResources.Employee SET JobTitle =\
  \ 'Chief Head Officer' WHERE BusinessEntityID = 1\n```\n\n手动重新同步；这应该只需要几秒钟。同步完成后，查询\
  \ `hub database` 和本地成员数据库中的 `HumanResources.Employee` 表。`BusinessEntityID` 为 1 的记录，其\
  \ `Title` 列的值在三个位置现在都应为 `\"Chief Head Officer\"`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ SQL 数据同步\n\n遵循 `Client Wins` 规则，最后一次写入 `hub` 的操作覆盖了之前的更改（“Chief Executive\
  \ Officer”），然后将“Chief Head Officer”传播到所有成员数据库。\n\n## 数据同步限制\n\n虽然 SQL Data Sync\
  \ 功能相当齐全且非常灵活，但在预发布版本中仍存在一些限制。以下是 SQL Data Sync 当前限制的列表：\n\n- 每个订阅的最大 SQL Data Sync\
  \ 服务器数：1\n- 任何数据库可所属的最大同步组数：5\n- 每个表的筛选器：最多 12 个（如果其中一个位于主键列上，则可选 13 个）\n- 数据库、表、架构和列名称：每个名称\
  \ 50 个字符\n- 一个同步组中的表数：100\n- 同步组中一个表的列数：1000\n\n如果你查询 `HumanResources.Employee`\
  \ 表，你会发现它包含从 1 到 290 的 `BusinessEntityID`，远低于 10,000 的筛选器。即使 `hub database` 上存在\
  \ PK/FK 约束，为什么 `HumanResources.Employee` 表中小于 10,000 的记录被同步了？\n\n答案是当前的筛选是针对单个表进行的。在此示例中，筛选器需要应用于两个表。实际上，筛选器应设置为记录小于\
  \ 10,000，并应用于两个表。\n\n此外，在某些情况下，这 *可能* 意味着需要对数据库架构进行反规范化，以便你要筛选的值在每个表中都可用。\n\n源表上的现有触发器、`CHECK`\
  \ 约束和 XML 类型列上的索引不会被预置。\n\n索引仅为选择要同步的列创建。\n\n## 数据同步最佳实践\n\n自本书上一版发布以来，我们学到了很多，因此本节将重点介绍过去几年中学到的最佳实践。我们将讨论有助于\
  \ SQL Data Sync 设计和规划阶段的主题。关键是要记住，SQL Data Sync 是一个全局解决方案，允许你在全球范围内移动数据。\n\n###\
  \ 设计考虑因素\n\n- **避免同步循环：** 当同步组内存在循环引用时，会导致同步循环，使得一个数据库中的每个更改都在同步组内的数据库中循环且无休止地复制。同步循环会降低性能并显著增加成本。可以通过避免数据库或表之间、或两个同步组之间存在循环引用来避免同步循环。\n\
  - **本地到云场景：** 将 `hub database` 靠近同步组数据库流量最集中的地方，以最小化延迟。\n- **云到云场景：** 当同步组中的所有数据库都在同一个数据中心时，`hub\
  \ database` 也应位于同一数据中心。当同步组中的数据库位于不同数据中心时，`hub database` 应位于大部分流量发生的数据中心。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ SQL 数据同步\n\n### 初始同步\n\n- SQL Data Sync 将预填充的行视为数据冲突。尽可能从空的 `destination\
  \ database` 开始。\n- 为提高性能，仅在测试时使用自动预置功能。对于生产环境，应使用架构预置目标数据库。\n- 视图和存储过程不会在 `destination\
  \ database` 上创建。你可以使用 SQL Server Management Studio 或 SQL Server Data Tools 中的“生成脚本”向导来部署这些对象。\n\
  \n### 安全性\n\n- 使用具有网络服务访问权限的最低特权帐户安装 `client agent`。\n- 将 `client agent` 安装在与本地\
  \ SQL Server 不同的计算机上。\n- 数据库不应注册到多个 `client agent`，以避免在删除同步组时遇到挑战。\n\n### 同步计划\n\
  \n这里没有要点，但有几点注意事项。良好的做法是安排同步，使得每次同步都有时间完成。如果一次同步尝试在前一次同步完成之前执行，第二次同步尝试甚至不会开始。日志或管理门户不会提供同步未发生的指示。\n\
  \n例如，如果同步计划设置为每五分钟一次，但完成一个同步组需要六分钟，那么你的同步实际上将每十分钟发生一次，而不是每五分钟一次。\n\n目前，SQL Data\
  \ Sync 是免费提供的。但是，离开任何数据中心的数据会产生数据传输费用。入站数据传输（ingress）是免费的，但出站数据（egress）会产生费用。因此，需要注意每张表需要刷新数据的频率。\n\
  \n# 总结\n\n尽管 SQL Data Sync 尚未正式发布，但本章详细介绍了其发布时可以预期的功能。\n\n本章首先概述了 SQL Data Sync，包括为什么需要它以及一个基本场景。随后，本章大部分内容侧重于构建一个\
  \ SQL Data Sync 示例，说明如何创建、配置和管理同步组。\n\n最后，用几页篇幅介绍了 SQL Data Sync 安全性、设计最佳实践、考虑因素和限制。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 8 章\n\n## Windows Azure\
  \ 与 ASP.NET\n\n本章将引导你完成创建 Windows Azure 应用程序并将其部署到云中的步骤。到现在为止，你知道无法在 Windows Azure\
  \ 中创建 WinForms 应用程序。但是，你可以创建一个在本地 IIS 中运行并连接到 SQL Database 的 ASP.NET 应用程序，或者构建一个作为云项目运行的\
  \ ASP.NET 应用程序，然后完全在云中运行。本章将展示如何在 ASP.NET 中构建一个可以部署到云中的小型 Web 应用程序，并实现第 2 章中讨论的\
  \ Direct Connection 模式。\n\n在 Microsoft 云中发布的应用程序被称为 *cloud service*，即使它是一个网站。因此，你需要首先创建一个新的\
  \ Windows Azure 云服务来托管该网站。\n\n## 创建云服务\n\n首先，你需要设置一个 Windows Azure 云服务，以便稍后部署 Windows\
