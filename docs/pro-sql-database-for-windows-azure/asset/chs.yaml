- '# 设计注意事项

  为了将 Azure 平台的云计算用于不仅仅是简单的托管，你必须探索可用于设计解决方案的广泛选项。除了理解本章介绍的设计选项外，你还需要牢固掌握云计算当前的不足之处，这可能会影响你的设计选择。


  ## 设计因素

  在审查各种设计模式之前，让我们从影响设计选择的一些机会和限制开始。请记住，尽管本书主要关注 SQL 数据库，但本章的许多概念普遍适用于 Azure 开发。


  ### 异地存储

  如第 1 章所述，Azure 平台提供四种不同的存储模型：Blob、表、队列和 SQL 数据库。在 SQL 数据库中存储数据类似于在 SQL Server 中存储数据。你所需要做的就是发出
  T-SQL 语句，并检查 SQL 数据库特有的语法限制，然后就可以开始了！


  使用 T-SQL 在 SQL 数据库中存储数据的能力提供了独特的机会。在许多情况下，你可以轻松扩展或移植某些类型的应用程序到 SQL 数据库中，而无需（或只需有限）修改。这种可移植性使你可以实施直接依赖
  SQL 数据库存储的解决方案，或者使用本地数据库同时透明地使用 SQL 数据库来满足额外的存储需求（例如报表）。


  但是，请记住，你可存储在单个 SQL 数据库实例中的数据量是有限制的。


  '
- '# 第 2 章：设计注意事项


  ## SQL 数据库版本与分区


  目前，SQL 数据库支持两种版本：Web 版（1GB 或 5GB）和商业版（从 10GB 到 150GB）。因此，如果你的应用程序需要存储超过 150GB 的数据，或者你的数据库能从多线程数据访问层中受益，你就需要考虑通过一种称为*分片*的分区形式，将数据拆分到多个数据库中。你将在本章后面以及本书的更详细内容中学习有关分片的知识。


  ### 高可用性


  在设计应用程序时，软件开发人员和架构师通常关注高可用性要求。SQL 数据库采用了一个非常精密的拓扑结构，以最大限度地实现工作负载重分布、透明性和恢复。图 2-1
  展示了 SQL 数据库的高级实现，暗示了后端基础设施必须有多先进。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 18](img/index-30_1.jpg)


  ### 图 2-1：SQL 数据库拓扑结构


  图 2-1 显示，连接通过负载均衡器建立，该均衡器决定哪个网关应处理连接请求。网关充当防火墙的角色，检查请求、执行身份验证和授权服务，并将数据包转发到实际的 SQL
  数据库实例。由于数据库可以动态移动以确保资源分配公平，网关可能会更改目标端点。这个过程在很大程度上是透明的。


  此外，每个 SQL 数据库实例都在不同的服务器上复制了两份以实现冗余。在后台，一个复制拓扑结构确保 SQL 数据库实例始终存在于另外两台物理服务器上。


  这两个额外的副本对使用者完全透明，且无法访问。


  **注意：** SQL 数据库在任何给定月份提供 99.9% 的可用性。有关服务级别协议的具体条款，请查看以下链接：[`www.windowsazure.com/en-us/support/legal/sla/`](https://www.windowsazure.com/en-us/support/legal/sla/)。


  ### 性能


  你所编写的应用程序的性能可能受两方面因素影响：节流以及你如何设计应用程序。微软实施了 `performance throttling` 以防止一个客户的程序影响他人。（这是一个好的功能，并不像听起来那么糟糕。）应用程序设计是你掌控的部分。


  #### 节流


  SQL 数据库运行在多租户环境中，这意味着你的数据库实例与其他公司的数据库共享服务器资源。因此，SQL 数据库平台实现了一种节流算法，以防止大型查询影响其他用户的性能。如果你的应用程序发出一个可能影响其他数据库的大型查询，你的数据库连接将被终止。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  此外，为了保护宝贵资源并控制可用性，SQL 数据库会自动断开空闲会话。会话超时设置为 30 分钟。当你为 SQL 数据库进行设计时，你的应用程序应考虑自动会话恢复。这也意味着你在开发阶段的性能测试变得更加关键。


  但请注意，高 CPU 活动不会像其他资源一样被节流。当检测到高 CPU 活动时，SQL 数据库不会丢失数据库连接，而是会限制你的 CPU 带宽，但允许你的 T-SQL
  操作继续执行。这意味着某些语句可能需要更长时间才能执行。


  出现以下任何情况都将终止你的数据库连接：


  *   **锁消耗：** 如果你的应用程序消耗了超过 100 万个锁，你将收到错误代码 40550。监视 `sys.dm_tran_locks` 管理视图可提供锁的状态。

  *   **未提交的事务：** 一个锁定内部资源超过 20 秒的事务将被终止，并返回错误代码 40549。

  *   **日志文件大小：** 如果单个事务的日志文件大小超过 1GB，连接将被终止，并返回错误代码 50552。

  *   **TempDB：** 如果你运行大型事务、大型命令批处理或消耗超过 5GB 空间的大型排序操作，会话将被终止，并返回错误代码 40551。

  *   **内存：** 如果你的语句在超过 20 秒的时间内消耗了超过 16MB 的内存，你的会话将被终止，并返回错误代码 40553。

  *   **数据库大小：** 如果数据库超过其配置的最大大小，任何更新或插入数据的尝试都将失败，并返回错误代码 40544。你可以通过删除索引、清理表或使用 `ALTER
  DATABASE` 语句增加数据库大小来解决此错误。

  *   **空闲连接：** 任何空闲超过 30 分钟的连接将被终止。这种情况下不会返回错误。

  *   **事务：** 持续超过 24 小时的事务将被终止，并返回错误代码 40549。

  *   **拒绝服务攻击：** 如果某个特定 IP 地址的许多登录尝试失败，则来自该 IP 地址的任何连接尝试都将在一段时间内失败，以保护 SQL 数据库服务。不会返回错误代码。

  *   **网络问题：** 如果网络问题是会话终止的根源，你不会从 SQL 数据库收到特定的错误代码；但是，你可能会收到套接字错误。

  *   **故障转移：** 当 SQL 数据库正在将你的数据库故障转移到另一个节点时，你的活动会话将被断开。你可能会收到套接字异常或一个通用错误，提示你应该重试操作。

  *   **高活动性：** 托管你的数据库的服务器如果遇到巨大压力或超出其操作边界（例如太多繁忙的工作线程），SQL 数据库可能会断开会话，并返回错误代码 40501。


  一些附加条件，称为瞬态错误，也可能导致你的会话被终止。你的代码应考虑到这些错误，并在发生时重试操作。以下是你的代码可能需要处理的常见错误的部分列表：


  *   **错误 20：** 你尝试连接的 SQL Server 实例不支持加密。

  *   **错误 64：** 与服务器建立了成功连接，但随后在登录过程中发生错误：`provider: TCP Provider, error: 0 - The
  specified network name is no longer available.`。

  *   **错误 233：** 由于登录前初始化过程中的错误，客户端无法建立连接。可能的原因包括：客户端尝试连接到不支持的 SQL Server 版本；服务器太忙无法接受新连接；或者服务器上存在资源限制（内存不足或达到最大允许连接数）：`provider:
  TCP Provider, error: 0 - An existing connection was forcibly closed by the remote
  host.`。

  *   **错误 10053：** 从服务器接收结果时发生传输级错误。已建立的连接被主机中的软件中止。

  *   **错误 10054：** 向服务器发送请求时发生传输级错误：`provider: TCP Provider, error: 0 - An existing
  connection was forcibly closed by the remote host.`。

  *   **错误 10060：** 在建立与 SQL Server 的连接时发生网络相关错误或特定于实例的错误。未找到服务器或无法访问服务器。请验证实例名称是否正确以及
  SQL Server 是否配置为允许远程连接：`provider: TCP Provider, error: 0 - A connection attempt
  failed because the connected party did not properly respond after a period of time,
  or established connection failed because connected host has failed to respond.`。


  '
- '# 处理瞬态错误及 SQL 数据库的应用设计


  为了解决前面提到的大多数错误，微软发布了 `Trans 错误处理应用程序块`。该框架旨在处理包括 `SQL 数据库` 在内的各种云服务的瞬态错误。框架还提供了不同的重试策略，包括
  `增量`、`固定间隔` 和 `指数退避` 等选项。更多信息请访问微软 Azure 企业库集成包：[`msdn.microsoft.com/en-us/library/hh680934(v=PandP.50).aspx`](http://msdn.microsoft.com/en-us/library/hh680934(v=PandP.50).aspx)。


  ### 注意

  在 `SQL 数据库` 的语境下，`限制连接` 通常意味着终止数据库连接。无论 `限制连接` 的原因是什么，其结果通常相同：丢失数据库连接。


  ## 应用设计考量


  在考虑如何设计应用以充分利用 `SQL 数据库` 时，你需要评估以下几项：


  - **数据库往返操作。** 在你的应用中执行特定功能需要多少次往返操作？更多的数据库往返操作意味着应用速度更慢，尤其是当连接是通过互联网链路建立并采用 `SSL`
  加密时。

  - **缓存。** 你可以通过在客户端机器上缓存资源或将临时数据存储在更靠近消费者的地方来改善响应时间。

  - **属性延迟加载。** 除了减少往返操作外，仅加载执行必需功能所绝对必要的数据也至关重要。延迟加载在这方面能提供显著帮助。

  - **异步用户界面。** 当等待不可避免时，提供响应式的用户界面会有所帮助。多线程技术有助于提供更响应迅速的应用。

  - **分片。** `分片` 是一种将你的数据跨多个数据库拆分的方式，其目标是尽可能对你的应用代码透明，从而提升性能。联合（Federation）是 `SQL
  数据库` 中可用的分片技术。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 19](img/index-33_1.jpg)


  ## 第 2 章 ■ 设计考量


  对于依赖远程存储的云计算解决方案，为性能而设计应用变得尤为重要。关于这些主题及更多信息，请参阅第 9 章。


  ### 数据同步


  与 `SQL 数据库` 同步数据主要有两种方式：`Microsoft Sync Framework`（同步框架）和 `SQL Data Sync`（数据同步）服务。`Microsoft
  Sync Framework` 提供了包括数据库在内的多个数据存储之间的双向数据同步能力。`SQL Data Sync` 使用了 `Microsoft Sync
  Framework`，该框架不仅限于数据库同步；你还可以使用该框架在不同平台和网络间同步文件。


  具体到 `SQL 数据库`，你可以使用 `Microsoft Sync Framework` 通过保持本地数据库与 `SQL 数据库` 实例同步，为你的应用提供离线模式。并且因为该框架可以与多个端点同步数据，你可以设计一个分片（稍后详述），其中所有数据库实例都能透明地保持其数据同步。


  `SQL Data Sync` 服务为本地 `SQL Server` 数据库与 `SQL 数据库` 之间，或 `SQL 数据库` 实例之间，提供了一个更简单的同步模型。由于此服务在云端运行，因此非常适合同步云数据库，而无需在本地安装和配置服务。


  ### 直接连接与服务化连接


  你也可以考虑开发 `Azure` 服务，将数据库连接保持在本地网络，然后使用 `SOAP` 或 `REST` 消息将数据发送回客户端。如果你的 `Azure`
  服务与你的 `SQL 数据库` 实例部署在同一区域，那么数据库连接将从同一数据中心建立，性能会快得多。


  然而，使用 `SOAP` 或 `REST` 将数据发送回消费者未必能提高性能；你现在发送回的是 `XML` 而非原始数据包，这意味着更大的带宽占用。最后，你可以考虑编写存储过程，让部分业务逻辑尽可能靠近数据。


  图 2-2 展示了应用获取存储在 `SQL 数据库` 实例中数据的两种不同方式。


  可以直接从应用建立到数据库的直接连接，在这种情况下，应用发出 `T-SQL` 语句来检索数据。或者，可以通过在 `Windows Azure` 上创建和部署自定义的
  `SOAP` 或 `REST` 服务来实现服务化连接，这些服务再与数据库通信。在这种情况下，应用通过部署在 `Azure` 中的 Web 服务请求数据。


  ***图 2-2.** 数据连接选项*


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图片 20](img/index-34_1.jpg)


  ## 第 2 章 ■ 设计考量


  请记住，你可以设计一个应用同时使用这两种连接方式。你可能会确定你的应用在归档数据时需要直接连接，而在执行更复杂的功能时使用服务。


  一般来说，你应该尝试使用服务化连接，以便利用连接池和集中缓存，否则这些功能可能难以或无法实现。连接池和缓存是有助于避免 `限制连接` 情况的性能技术。


  ### 注意

  本章大部分内容提供了直接连接示意图；然而，许多介绍的模式在先通过服务化连接到 `Windows Azure` 服务的情况下，同样适用。


  ## 定价


  托管环境的定价通常不被视为标准应用设计中的一个因素。然而，在云计算（包括 `Azure`）的情况下，你需要记住，应用的性能和整体设计直接影响你的月度成本。


  例如，每次部署和使用 `Azure` 服务时，你都会产生网络和处理费用。尽管如此，在撰写本文时，同一地理位置内的 `Windows Azure` 应用或服务与
  `SQL 数据库` 实例之间的数据流量是免费的。


  定价可能会影响你短期的应用设计选择，但你应该记住，`Microsoft` 可能随时更改其定价策略。因此，尽管定价是一个重要的考量因素（尤其对于预算有限的项目），但设计的长期生命力应比短期的财务收益更为重要。


  如果你正在设计一个运行在 `Azure` 环境中的应用，并且依赖该应用产生收入，你必须确保你的定价模型能够覆盖由此产生的运营成本。例如，如果你打算对应用使用收费，那么你的应用应该从一开始就设计为具备计费能力。


  与定价相关的另一个因素是，你的 `SQL 数据库` 实例成本包含月度费用和使用费。月度费用是按比例计算的，因此如果你在下午 1 点创建一个数据库并在当天下午 2
  点删除它，你将被收取一部分月度费用加上使用费。使用费严格限于带宽消耗：CPU 利用率、`I/O` 消耗以及数据库的内存占用量都不是使用费的考虑因素（见图 2-3）。


  然而，如前所述，如果你的数据库活动达到特定阈值，你的数据库连接可能会被 `限制连接`。


  ***图 2-3.** 定价与资源限制*


  总之，你可以考虑将某些 CPU 密集型活动（在合理范围内）转移到 `SQL 数据库` 实例上执行而不产生额外费用。例如，你可以在存储过程中执行使用大数据集的复杂联接，并仅将一些汇总行返回给消费者，以此作为最小化使用费的一种方式。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


