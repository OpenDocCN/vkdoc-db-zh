  \n## 总结\n\n\n# 附录 B：Windows Azure SQL 数据库快速参考\n\n在阅读本附录时，您肯定注意到了，该管理门户在设计时充分考虑了简洁性和可扩展性。您已经看到管理表、视图和存储过程是多么容易，以及如何在执行语句的同时，监控数据库实例中最近执行语句的性能指标。SMDP\
  \ 将继续快速发展；因此，您可以预期其行为会随时间出现差异，并增加新功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSQL Azure 支持 T-SQL。如果您正在阅读本书，那么您可能已经熟悉 SQL Server T-SQL 语法。然而，并非您所了解和喜爱的 SQL Server\
  \ 所有功能都在 Windows Azure SQL 数据库中得到支持。例如，许多 T-SQL 语句与硬件或操作系统/服务器相关，例如创建证书或创建备份设备。本附录提供了截至\
  \ Service Update 4 时，Windows Azure SQL 数据库当前支持的语法快速参考。\n\n> **注意：** 您可以在 [`http://msdn.microsoft.com/en-us/library/ee336281.aspx`](http://msdn.microsoft.com/en-us/library/ee336281.aspx)\
  \ 找到描述 Windows Azure SQL 数据库支持的 T-SQL 功能的完整列表和参考。\n\n## 支持的 T-SQL 语句\n\n表 `B-1`\
  \ 列出了您可以在 Windows Azure SQL 数据库中使用的支持的 T-SQL 语句。这些语句可以按照您当前所知的用法使用，没有任何限制。\n\n###\
  \ 表 B-1. 完全支持的 T-SQL 语句\n\n*   `ALTER ROLE`\n*   `DENY` *对象权限*\n*   `ORDER BY` *子句*\n\
  *   `ALTER SCHEMA`\n*   `DENY` *架构权限*\n*   `OUTPUT` *子句*\n*   `ALTER VIEW`\n*  \
  \ `DROP LOGIN`\n*   `OVER` *子句*\n*   `APPLOCK_MODE`\n*   `DROP PROCEDURE`\n*   `PRINT`\n\
  *   `APPLOCK_TEST`\n*   `DROP ROLE`\n*   `RAISERROR`\n*   `BEGIN_TRANSACTION`\n\
  *   `DROP SCHEMA`\n*   `RETURN`\n*   `BEGIN...END`\n*   `DROP STATISTICS`\n*   `REVERT`\n\
  *   `BINARY_CHECKSUM`\n*   `DROP SYNONYM`\n*   `REVOKE` *对象权限*\n*   `BREAK`\n* \
