- "# 第 1 章 ■ SQL 数据库入门\n\n## 发现 Microsoft Azure 平台\n\n让我们来了解 Microsoft Azure 平台的三大主要组件：Windows\
  \ Azure、Cloud Services 和 Windows Azure SQL Database。这三者都提供独特的功能，可构成构建高度可扩展和安全解决方案所需的完整服务阵列：\n\
  \n• **Windows Azure。** 一套虚拟的 Microsoft 操作系统集合，可在云端运行您的 Web 应用程序和服务。例如，您可以创建一个将美元转换为欧元的\
  \ Web 服务；然后，可以将其部署到 Windows Azure Web Site 上，并根据需要进行扩展。请注意，Windows Azure 可以运行 `.NET`\
  \ 应用程序以及其他平台，包括 PHP。\n\n• **Cloud Services。** 一组提供核心功能的服务，例如用于访问控制的联合身份验证，以及用于基于消息的发布者/订阅者拓扑的服务总线。\n\
  \n• **SQL Database。** Microsoft 基于 Microsoft SQL Server 2012 的面向云计算的事务型数据库产品。例如，您可以使用\
  \ SQL Database 将客户数据库存储在云中，并使用部署在 Windows Azure 中的服务来使用客户数据。\n\nMicrosoft 还已经发布或即将发布其他值得注意的服务，包括缓存服务、高性能计算\
  \ (HPC) 以及用于 Azure 的 Apache Hadoop。随着时间的推移，可能会发布更多服务，提供更多利用云计算承诺的方式。\n\n图 1-1 展示了一个简化的公司环境连接到\
  \ Microsoft Azure 平台并使用各种 Azure 服务的示意图。此图被极度简化，但它传达了一个重要的信息：Microsoft Azure 旨在为\
  \ Web 应用程序、服务、消息传递和数据存储安全地扩展公司环境。\n\n***图 1-1.** Microsoft Azure 平台概览*\n\n### 为什么选择\
  \ Microsoft Azure？\n\n一个经常被问到的基本问题是，“为什么？”首先，谁对在 Windows Azure 中开发应用程序感兴趣？要回答这个问题，让我们看一下\
  \ Web 平台的演变。\n\n大约 20 年前，当公共互联网还是电子公告板系统（BBS）、Gopher 服务和 500 美元的 9600 波特调制解调器的时代，人们的问题是：“互联网作为一项技术会持续下去吗？”这个问题已经有了答案，但自那时以来，许多新概念已经发展起来，包括网站、托管中心和\
  \ SaaS。\n\n这种演变依赖于一个共同的主题：*解耦*。BBS 将公共信息与图书馆解耦；网站将用户界面与计算机解耦；托管中心将硬件与公司自身的基础设施解耦；而\
  \ SaaS 则将复杂的应用程序与公司计算机解耦。\n\nMicrosoft Azure 上的云计算是计算灵活性的一种自然演进，其中实际的物理存储和实现细节与软件解决方案解耦。例如，在\
  \ Windows Azure 中部署服务不需要了解运行服务的机器或任何核心服务（`IIS`版本、操作系统补丁等）。您可能永远不会知道哪台机器在运行您的软件。\n\
  \n您通过逻辑名称连接到 Windows Azure 服务器，而连接到 SQL Database 实例需要一个互联网地址而不是实际的服务器名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n将机器与数据和服务分离的能力本身非常强大。Microsoft 的 Azure 环境允许多种业务场景蓬勃发展，包括以下这些：\n\n• **季节性应用程序。**\
  \ 开发倾向于随时间增长和收缩的网站或服务提供了潜在的节省机会，因为云计算采用按使用付费的模式。\n\n• **短生命周期。** 开发原型或生命周期短的应用程序也很有吸引力，例如活动注册网站。您还可以为远程团队构建开发和测试环境。\n\
  \n• **分离存储。** 某些应用程序需要将存储保存在安全位置，但可能不需要频繁访问，或者可能需要高可用性。设计或修改应用程序，使数据既存储在本地，也存储在\
  \ SQL Database（或其他数据存储格式）中，可能是有意义的。\n\n• **小公司和独立软件供应商 (ISV)。** 无法承担启动业务所需的大型复杂基础设施的小公司可以利用\
  \ Microsoft Azure 的财务和固有基础设施优势。独立软件供应商（ISV）也可以从云计算中受益。例如，ISV 可以使用 SQL Database 存储应用程序日志，或集中来自多个分散位置的报告功能。\n\
  \n有关使用 Azure 平台的设计模式和应用程序场景的更多信息，请参见第 2 章。\n\n### 关于地理位置\n\n为了提供高可用性，Microsoft 建立了区域数据中心运营，允许客户选择地理上分散的服务。当您创建\
  \ Azure 服务器时，您需要指定服务器应在哪个地理位置进行配置。此功能称为 *Windows Azure 地理位置*。\n\n最初，为了提升性能，选择公司所在的地理位置可能很诱人。然而，如果\
  \ Azure 服务的可用性比响应时间更重要，您可能需要选择另一个位置。\n\n选择地理位置时，请确保考虑以下因素：\n\n• **性能。** 当您的数据离用户更近时，网络延迟可能会显著降低，从而改善客户体验。\n\
  \n• **灾难恢复。** 如果确保云平台的可用性很重要，您可能希望将服务和数据分散到多个区域。\n\n• **法律因素。** 考虑将存储在云中的信息类型，并确保您不受可能阻止您选择远程地理位置的特定法规和命令的约束。\n\
  \n在撰写本文时，您可以从以下地理位置中选择一个，每个位置都由一个区域数据中心提供支持：\n\n• 东亚\n\n• 美国东部\n\n• 美国中北部\n\n• 北欧\n\
  \n• 美国中南部\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 3](img/index-11_1.png)\n\
  \n• 东南亚\n\n• 西欧\n\n• 美国西部\n\n\n\n此外，您可以创建一个*关联组*，以便将某些 Azure 服务保持在一起。这样的组会在部署到 Microsoft\
  \ Azure 平台的 Windows 和数据服务之间建立地理依赖关系。如果 Microsoft 因合规原因需要将某个服务迁移到另一个地理位置，相关服务很可能也会随之迁移。例如，如果您开发了一个依赖于\
  \ `SQL Database` 实例的 Azure 服务，您可能希望确保它们两者位于同一地理位置，并且属于同一个*关联组*。\n\n可用的地理位置会随着时间的推移而增加。因此，您可能需要定期重新评估服务是否部署在最合适的地理位置。请记住，将服务迁移到其他地理位置可能非常耗时。\n\
  \n### 在 Azure 中存储数据\n\n正如您所想象的那样，云计算的核心是以简单且可扩展的方式存储数据。Microsoft Azure 平台提供了多种您可以从中选择的存储模型。本节总结了在\
  \ Azure 中存储数据的四种方式；其中三种方法被认为是 Azure 服务的一部分。\n\n图 1-2 概述了存储选项和可用的访问方法。Windows Azure\
  \ 提供的存储选项集称为 *Windows Azure 存储*，包括 Blob、表和队列。可以使用 `HTTP/S` 调用直接从企业环境访问 *Windows\
  \ Azure 存储*，这为接入 Microsoft Azure 平台提供了一个简单的接口。除了使用 *Windows Azure 存储* 外，消费者还可以使用\
  \ `ADO.NET` 或 `ODBC` 直接向 `SQL Database` 实例发出请求，因为 `SQL Database` 支持 `SQL Server`\
  \ 使用的表格数据流 (`TDS`) 协议。因此，连接到 `SQL Server` 数据库的应用程序和服务可以同样轻松地连接到 `SQL Database`。\n\
  \n**图 1-2.** Microsoft Azure 数据存储访问\n\n以下是四种存储类型的更多详细信息：\n\n*   **Windows Azure\
  \ 存储。** Windows Azure 存储提供三种针对特定需求量身定制的不同存储模型：\n    *   **表。** 一种命名的键值对存储，允许您存储海量数据。这种存储模型包括自动负载均衡和故障转移。之所以称为表，是因为您可以在每一行中存储多个值。然而，这不是一种事务性存储机制；无法进行索引或表连接。此外，表中定义的列存在存储限制。例如，字符串数据类型限制为\
  \ `64KB`。\n    *   **Blob。** 用于存储文件的接口，根据您创建的 Blob 类型，存储上限为 `200GB` 或 `1TB`。您可以通过表示状态传递\
  \ (`REST`) 调用，使用直接的 `HTTP` 请求轻松访问 Blob。\n    *   **队列。** 一种高可用性机制，用于存储供其他应用程序或服务使用的消息。队列的典型用途是发送\
  \ XML 消息。队列存在某些限制，但您也可以通过 `REST` 访问队列。\n*   **SQL Database。** `SQL Database` 是一个事务性数据库，通过\
  \ `ADO.NET` 或其他提供程序提供熟悉的数据访问方式，并允许您使用标准 `T-SQL` 语句操作数据。`SQL Database` 中的数据库实例有两种版本：`Web`\
  \ 版和 `Business` 版。`Web` 版提供两种最大数据库大小：`1GB` 和 `5GB`。`Business` 版提供以下最大数据库大小：`10,\
  \ 20, 30, 40, 50, 100 和 150GB`。\n\n表 1-1 总结了 Azure 平台中这些可用数据存储选项的当前特性。\n\n**表 1-1.**\
  \ Azure 存储摘要\n\n| 存储模式 | 最大大小 | 访问方式 | 格式 | 是否关系型 |\n| :--- | :--- | :--- | :---\
  \ | :--- |\n| 表 | 不适用 | `ADO.NET`/`REST` | 行和列 | 否 |\n| 页 Blob | `1TB` | `REST`\
  \ | 文件 | 否 |\n| 块 Blob | `200GB` | `REST` | 文件 | 否 |\n| 队列 | `64KB*` | `REST` |\
  \ 字符串 | 否 |\n| SQL Database | `150GB` | `ADO.NET` | 行和列 | 是 |\n\n** 推荐限制*\n\n##\
  \ SQL Database 入门\n\n如您所见，`SQL Database` 是一个基于 `SQL Server` 技术的关系数据库引擎。它支持 `SQL\
  \ Server` 的许多功能，包括表、主键、存储过程、视图等等。本节提供一个简短的入门指南，帮助您开始使用 `SQL Database`。您将了解如何注册 Azure、如何创建数据库和账户，以及如何登录。\n\
  \n### 注册 Azure\n\n要注册 Windows Azure，请访问 Windows Azure 网站上的定价页面：`http://www.windowsazure.com/en-us/pricing/purchase-options/`。图\
  \ 1-3 显示了撰写本文时的一些可用选项。\n\n**图 1-3.** 选择 Windows Azure 方案\n\n从该页面，您可以选择最符合您个人情况和需求的方案。选择首选方案后，点击\
  \ `购买`，并按照屏幕上的说明操作。完成后，您将收到一封包含配置 Windows Azure 平台说明的电子邮件。\n\n要访问 Azure 门户，请打开您的\
  \ Web 浏览器并输入以下 URL：`http://windows.azure.com`。Azure 门户允许您部署、管理和查看服务的运行状况。\n\n###\
  \ 创建 SQL Database 实例\n\n您需要做的第一件事是创建一个新的 `SQL Database` 服务器。`SQL Database` 服务器的名称将成为一个完全限定的互联网地址，也是在其中创建数据库实例的逻辑名称。创建\
  \ `SQL Database` 服务器时，会自动配置 `master` 数据库。此数据库是只读的，包含您数据库的配置和安全信息。然后，您可以创建用户数据库。您可以使用\
  \ Windows Azure 管理门户，也可以使用 `SQL Server Management Studio` 针对 `master` 数据库执行 `T-SQL`\
  \ 语句。\n\n#### 使用 Windows Azure 管理门户\n\n创建数据库的一种方法是通过 Windows Azure 管理门户。在导航窗格（页面左侧）中选择\
  \ `SQL Databases` 选项卡将列出您所有现有的 `SQL Database` 实例及其关联的服务器。可以通过门户以两种方式之一完成数据库的创建。首先，在显示数据库实例列表的情况下，点击门户页面左下角菜单栏中的\
  \ `新建` 按钮，然后选择 `SQL Database` ➤ `快速创建`。其次，您可以选择在门户页面顶部（`Databases` 选项卡旁边）选择 `Servers`\
  \ 选项卡，从服务器列表中选择相应的服务器名称，选择 `Databases` 选项卡，然后点击底部菜单栏上的 `添加`。图 1-4 显示了管理门户，其中创建了几个订阅和\
  \ `SQL Database` 实例。\n\n**图 1-4.** SQL Database 实例\n\n通过 `快速创建` 选项创建 `SQL Database`\
  \ 实例，您可以通过指定数据库名称以及要在其中创建新数据库实例的订阅和服务器来快速创建数据库。如果您正在某个订阅中创建新数据库，而该订阅中尚未创建任何服务器，系统还将要求您为将要配置的新服务器提供管理员用户名和密码。通过\
  \ `快速创建` 选项创建数据库会创建一个 `1GB Web 版` 数据库实例。\n\n\n\n"
- '# 第 1 章 SQL 数据库入门


  ## 通过服务器选项卡创建数据库


  通过 Servers 选项卡创建数据库的过程略有不同，它会弹出“新建 SQL 数据库-自定义创建”对话框，如图 1-5 所示。在“自定义创建”对话框中，除了输入数据库名称外，您还可以选择数据库版本（Web
  或 Business），并指定数据库的大小及其排序规则。在“自定义创建”对话框中输入适当的信息后，单击“确定”。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 6](img/index-15_1.png)


  ***图 1-5. 创建 SQL 数据库实例***


  对于数据库大小，如果 1GB 或 5GB 对您来说足够，可以选择 Web 版本。如果需要创建更大的数据库，请选择 Business 版本，该版本允许您选择 10GB
  到 150GB 之间的大小。


  > **注意** 月费会根据数据库大小而变化。请参阅本章后面的附加信息以及 Microsoft 网站上的完整定价信息：[www.microsoft.com/azure.](http://www.microsoft.com/azure)


  ## 使用 T-SQL 命令创建数据库


  使用 T-SQL 命令创建新数据库非常简单。由于 SQL 数据库中的数据库实例由 Microsoft 管理，因此只有少数几个选项可供您使用。此外，您必须连接到`master`数据库才能创建新数据库。


  要使用 SQL Server Management Studio 创建新数据库，请使用管理员帐户（或任何具有`dbmanager`角色的用户）登录，并运行以下
  T-SQL 命令：


  ```

  CREATE DATABASE TextDB (MAXSIZE = 10 GB)

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 7](img/index-16_1.png)


  如前所述，Web 版本的数据库大小可以是 1GB 或 5GB，Business 版本的大小可以是 10GB–150GB。如果未定义`MAXSIZE`参数，则数据库大小将设置为
  1GB。


  ### 配置防火墙


  SQL Database 代表您实现了一个防火墙。这是有助于保护数据库的一项优势。实际上，默认的防火墙规则是*任何人*都无法连接到新创建的 SQL 数据库服务器。您可以随时使用管理门户配置防火墙规则，即使未定义防火墙规则也可以创建数据库。默认情况下不允许任何连接是一种良好的安全实践，因为它会迫使您仔细考虑要允许哪些
  IP 地址进入。


  请按照以下步骤为需要访问 SQL 数据库服务器的计算机添加 IP 地址（或 IP 范围）：


  1.  在 Windows Azure 管理门户中，选择左侧导航栏中的“SQL 数据库”选项卡。

  2.  在“列表项”部分上方选择“服务器”选项卡。

  3.  选择要添加防火墙规则的服务器名称。

  4.  在“列表项”部分顶部选择“配置”选项卡。

  5.  在“允许的 IP 地址”部分，输入规则名称以及起始和结束 IP 地址，如图 1-6 所示。单击“保存”。


  ***图 1-6. 防火墙设置***


  6.  此外，如果您有需要访问 SQL 数据库服务器的 Windows Azure 服务，请在“允许的服务”部分为“Windows Azure 服务”选择“是”。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 8](img/index-17_1.jpg)


  如果出于某种原因防火墙规则配置不正确，您将看到相应的错误消息。


  图 1-7 显示了如果防火墙规则不允许您连接，使用 SQL Server Management Studio 时会收到的错误消息。错误消息看起来像是登录失败，但其描述清楚地表明具有给定
  IP 地址的客户端不允许访问服务器。


  ***图 1-7. 防火墙错误***


  > **注意** 创建防火墙规则时，您可能需要等待几分钟才能使规则生效。


  您还可以直接使用 T-SQL 查看和编辑防火墙设置，方法是使用管理员帐户连接到`master`数据库并使用以下对象：

  * `sys.firewall_rules`

  * `sp_set_firewall_rule`

  * `sp_delete_firewall_rule`


  现在您已经配置好了 SQL 数据库实例，可以开始进行有趣的操作了！


  ### 使用 SQL Server Management Studio 连接


  请按照以下步骤使用 SQL Server Management Studio 连接到您的 SQL 数据库实例：


  1.  您需要获取 SQL 数据库服务器的完全限定服务器名称。图 1-8 显示了管理门户上的服务器信息。完全限定的服务器名称位于右侧的“属性”窗格中。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 9](img/index-18_1.png)


  ***图 1-8. 获取 SQL 数据库服务器的服务器名称***


  > **注意** 本示例使用 SQL Server 2008 SP1 Management Studio。虽然您可以使用此版本连接和管理 SQL 数据库实例，但使用
  SQL Server 2008 R2 和 SQL Server 2012 版本可以获得额外功能，例如使用对象浏览器查看数据库对象。


  2.  启动 SQL Server Management Studio。在登录屏幕中单击“取消”按钮。

  > **注意** 如果您使用的是 SQL Server 2008 R2 或更高版本的 SQL Server Management Studio，可以使用第一个登录窗口登录。但是，如果使用的是早期版本的
  SQL Server Management Studio，则需要在第一个登录窗口中单击“取消”。本节提供的说明适用于所有版本。


  3.  单击“新建查询”按钮，或按`Ctrl + N`。将打开一个新的登录屏幕（参见图 1-9）。

  在此窗口中，输入以下信息：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 10](img/index-19_1.png)


  ***图 1-9. 登录到 SQL 数据库服务器***


  *   **服务器名称。** 输入完全限定的服务器名称。

  *   **身份验证。** 选择“SQL Server 身份验证”。

  *   **登录名。** 键入管理员用户名（之前创建的）。

  *   **密码。** 键入管理员帐户的密码。


  4.  默认情况下，单击“连接”会针对`master`数据库进行身份验证。如果要连接到另一个数据库实例，请单击“选项”，并在“连接到数据库”字段中键入所需的数据库名称，如图
  1-10 所示。请注意，不能选择数据库名称；必须键入数据库名称。为了增强安全性，您还可以选中“加密连接”选项；尽管 SQL 数据库中的所有连接都是加密的，但此选项将强制立即建立加密连接，并绕过可能被中间人攻击利用的与
  SQL 数据库的协商阶段。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 11](img/index-20_1.png)


  ***图 1-10. 连接到`master`以外的特定数据库实例***


  5.  准备就绪后，单击“连接”。将打开一个新的查询窗口，您可以针对 SQL 数据库实例执行 T-SQL 命令。


  > **注意** `USE`命令无法在 SQL 数据库中切换数据库上下文。因为数据库可能物理上位于任何服务器上，所以切换数据库的唯一实用方法是重新连接。


  图 1-11 显示了连接到 SQL 数据库中`master`的查询窗口，其中已执行了一个简单的命令。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![图 12](img/index-21_1.png)


  ***图 1-11. 在 SQL 数据库实例上运行简单的 T-SQL 命令***


