  \ IDE 中显示。如您所见，ADO.NET 数据服务模板已为您生成了数据服务的初始框架。\n\n    ### 将服务连接到模型\n    \n    现在，您需要将数据服务连接到数据模型，以便服务知道从何处获取数据。您知道在哪里进行此操作，因为在代码中可以看到它指示了输入该信息的位置。因此，将行：\n\
