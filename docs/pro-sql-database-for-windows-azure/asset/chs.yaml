  \n# 第 9 章 ■ 高性能设计\n\n本章重点介绍几个关键主题，可以帮助您设计高性能的应用程序，这些程序从 SQL Database 和 SQL Server\
  \ 数据库中使用数据。本章采用的方法构建一个简单但有效的 WinForms 应用程序，用于使用本地和云中存储的数据。您将首先探讨一些通用概念，然后快速进入设计和开发一个分片库，该库从多个数据库读取数据。\n\
  \n最后，您将看到如何使用任务并行库为分片库添加多线程，以及使用企业库（正式名称为缓存应用程序块）添加缓存。\n\n## 通用性能概念\n\n在深入细节之前，让我们讨论一些与性能相关的概念。您首先应该知道的是，实现高性能是困难的。尽管确保应用程序达到可接受的性能水平很重要，但高级性能调优需要仔细规划，并且只有在需求驱动您认为高性能是必要时，才应将其作为设计目标。例如，如果您预计您的应用程序将被数千并发用户使用，那么您可能需要使用缓存甚至多线程。另一方面，某些高性能技术可能使代码难以阅读和维护，在这种情况下，知识转移可能很困难。\n\
  \n### 频繁交互 vs. 大块交互\n\n\n\n与 SQL 数据库建立的加密网络连接会导致应用程序运行变慢，并可能显著影响您的应用程序设计。对于每次数据库调用都打开一个数据库连接、每次更新都执行一次往返（即*聊天式*应用程序）的应用程序，其性能会低于在单次调用中加载多个对象的数据并批量发送更改（*块状*应用程序）的应用程序。`LINQ\
  \ to SQL` 和 `Entity Framework` 是数据访问层，它们提供了对批量操作（对象上下文上的 `SaveChanges` 方法）使用的良好控制。\n\
  \n例如，如果您设计了一个包含大量业务规则的数据访问层，您的代码可能会执行许多次到数据库的往返，以加载执行业务规则所需的数据。如果是这种情况，您可以将某些数据密集型业务规则在存储过程中（靠近数据）实现，和/或使用缓存来避免不必要的往返。\n\
  \n### 延迟加载\n\n另一方面，尽管从性能角度来看减少往返次数是好的，但您应该只加载所需的数据，原因有二：加载的数据越多，如果数据在其所在数据中心之外被消耗，您为\
  \ SQL 数据库服务支付的费用就越高；并且加载超过必要的数据会减慢您的应用程序速度。因此，您可能需要考虑使用*延迟加载*机制，通过该机制，对象的某些属性仅在必要时才被加载。`LINQ\
  \ to SQL` 和 `Entity Framework 4.0` 支持延迟加载（通过使用 `DeferredLoadingEnabled` 属性）。\n\n\
  虽然延迟加载最小化了加载的数据量，但它可能会产生更频繁聊天的应用程序。重要的是要在使用批量数据传输和最小化运行应用程序功能所需的数据量之间取得适当的平衡。\n\n\
  ### 缓存\n\n另一种用于最小化往返次数的重要技术是*缓存*。如果您的部分数据不经常更改，您的应用程序（或服务）可以使用缓存来避免不必要的往返。这也可能影响您的数据库设计选择。例如，如果您有一个存储州列表的表，该表可能长时间保持不变，这使其成为缓存的绝佳候选。\n\
  \n缓存可以在内存中或磁盘上（例如，在本地数据库中）执行。您有几个选项：\n\n• **ASP.NET 缓存。** ASP.NET 提供了一个缓存对象，具有良好的缓存功能。但是，ASP.NET\
  \ 缓存与 IIS 绑定。重启 IIS 会清除 ASP.NET 缓存，除非您已采取必要步骤来持久化缓存。\n• **Windows Server AppFabric。**\
  \ AppFabric 提供了一个下一代分布式缓存（以前称为 Velocity）。该缓存可以在多台计算机上运行，并通过 .NET API 提供。此缓存库仅适用于本地环境，不能在\
  \ Windows Azure 中使用。\n• **Windows Azure 缓存服务。** 此缓存服务是 Windows Server AppFabric\
  \ 缓存的一个子集。Azure 不支持其中一些方法。Azure 缓存服务仅适用于存储 IIS 会话状态，或其他键总是预先已知的键值对存储需求。但是，Azure\
  \ 缓存可以在本地实例上运行，这种方法利用了 memcache 协议。\n• **Enterprise Library。** Enterprise Library\
  \ 提供了一组由 Microsoft 在公共许可下提供的应用程序块。Enterprise Library 包含一个不依赖于 ASP.NET 的缓存机制。此缓存机制在\
  \ .NET 4.0 中原生提供，可在 `System.Runtime.Caching` 命名空间下找到。\n\n### 异步用户界面\n\n最终，性能是影响用户体验的一种度量，并且可以通过提供高响应性的用户界面在一定程度上进行控制。一个在加载数据时变得无响应的\
  \ Windows 应用程序，或一个在所有数据检索完毕之前不会加载的网页，会被认为是缓慢的。因此，使用多线程技术进行开发可能对于为用户提供更好的体验变得更加重要。\n\
  \n对于 Web 开发，您应考虑使用异步控件（如 AJAX），以便更好地控制部分页面加载。对于 Windows 开发，您可能需要使用多线程用户界面开发方法。\n\
  \n要在 WinForms 中实现高响应性应用程序，请使用 `Invoke` 方法（如下例第 3 行所示）在 UI 线程上刷新用户界面：\n\n```csharp\n\
  void OnPassCompleted()\n{\n    this.Invoke(new EventHandler(UpdateProgressBar),\
  \ null);\n}\n\nprivate void UpdateProgressBar(object o, System.EventArgs e)\n{\n\
  \    if (progressBarTest.Value < progressBarTest.Maximum)\n    {\n        progressBarTest.Value++;\n\
  \    }\n}\n```\n\n在此示例中，`OnPassCompleted` 是主窗体接收的自定义事件，然后调用 `Invoke` 方法刷新进度条。对 `Invoke`\
  \ 的调用强制进度条刷新在 UI 线程上执行，这与引发 `OnPassCompleted` 事件的线程不同。\n\n### 并行处理\n\n除了异步用户界面之外，您的代码可能需要在多个处理器上执行。两个主要场景可能导致您为应用程序选择并行处理：\n\
  \n• **大量计算。** 您的应用程序是 CPU 密集型的，特别是如果计算可以相互独立。高级图形或复杂数学计算是 CPU 密集型操作的例子。\n• **大量等待。**\
  \ 您的应用程序需要在每次调用之间等待，并且创建并行线程和聚合结果的成本微不足道。数据库分片就是一个例子：并行调用五个数据库大约比串行调用五个数据库快五倍。\n\
  \n编写并行进程有两个选择。如果可以，您应该使用任务并行库（`TPL`），因为它更简单：\n\n• **任务并行库。** `TPL` 是一个较新的库，由 Microsoft\
  \ 作为 .NET 4.0 的一部分提供。它允许您快速轻松地利用多个 CPU。您可以在 `System.Threading.Tasks` 下找到 `TPL`。\n\
  • **线程。** 使用 `System.Threading` 命名空间以传统方式管理线程为您提供了最大的灵活性。\n\n### 分片\n\n分片提供了另一种机制，通过该机制，您的代码几乎可以透明地针对任意数量的数据库进行读写操作。本章后面，您将使用第\
  \ 2 章中描述的读写分片（`RWS`）设计模式创建一个水平分区分片（`HPS`），并采用轮询访问方法。水平分区意味着所有数据库具有相同的模式，并且给定记录可以写入属于该分片的任何数据库。从性能角度来看，并行从多个数据库读取以搜索记录会产生更高的性能；但是，如果您需要执行更新回正确的数据库，您的代码必须保留线索。最后，使用分片需要并行处理以获得最佳性能。在第\
  \ 10 章中，您将探索*联合*，这是 SQL 数据库的一项功能，提供了构建数据库分片的内置能力。\n\n#### 编码策略总结\n\n表 9-1 pr 总结了迄今为止讨论的关于在针对\
  \ SQL 数据库实例开发时考虑到性能的一些可用编码策略的概念。\n\n\n\n# 表 9-1. 旨在提升性能的编码策略\n\n**技术** | **说明**\n\
  --- | ---\n批量数据加载/更改 | 通过使用支持批量加载数据的数据访问库（例如 `Entity Framework`），最小化往返次数。\n延迟加载\
  \ | 允许您创建某些属性仅在首次调用时才加载的对象，以最小化加载不必要数据（并提升性能）。`Entity Framework` 4.0 支持此功能。\n缓存\
  \ | 允许您将某些不常更改的对象保存在内存中。微软提供的缓存应用程序块也提供此功能，以及过期和清理配置设置。\n异步用户界面 | 严格来说并非一项性能改进技术，但允许用户在代码执行长时间运行的事务时继续使用应用程序，从而提供更好的用户体验。\n\
  并行处理 | 允许您在多个处理器上运行代码以获得最佳性能。尽管复杂，但此技术可提供显著的性能优势。\n分片 | 允许您将数据存储在多个数据库中，以优化读取并将查询负载分散到多个数据库服务器上。\n\
  \n由于分片被视为一项较新的技术，本章剩余部分将重点介绍如何使用缓存和并行处理构建一个高性能系统（HPS），以提升性能和可扩展性。\n\n## 构建分片\n\n\
  让我们构建一个分片库，供需要尽可能快速、透明地针对多个 SQL 数据库实例加载和更新数据的应用程序使用。我们正在构建的分片使用一组数据库作为其底层存储；但是，数据之间没有关联性。一条记录可能位于任何数据库中；该方法在添加数据时采用轮询插入机制。为了构建一个高效的分片库，您规定了以下分片要求：\n\
  \n1.  添加新数据库应简单且对客户端代码透明。\n2.  添加新数据库不应对性能产生负面影响。\n3.  该库应能与 `SQL Server`、`SQL Database`\
  \ 或两者一起使用。\n4.  该库应能选择性地缓存结果以供快速检索。\n5.  该库应支持批量或选择性读写。\n6.  该库返回的数据应能被接受作为控件的数据源。\n\
  \n从技术角度来看，这些要求有非常具体的影响。表 9-2 概述了哪些技术满足了哪些要求。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 144](img/index-190_1.png)\n\n第 9 章 ■ 高性能设计\n\n# 表 9-2. 用于构建分片的技术\n\n**技术**\
  \ | **要求** | **说明**\n--- | --- | ---\n配置文件 | 配置文件存储构成分片的数据库列表，使分片定义对代码透明。\n多线程 |\
  \ 使用 `TPL`（任务并行库）让库能够生成多个线程以利用多 CPU 计算机，允许并行执行 `SQL` 语句，从而提升性能。\n`SqlClient` | 使用\
  \ `SqlCommand` 对象允许分片连接到 `SQL Database` 和 `SQL Server` 数据库。\n缓存 | 缓存允许库临时存储结果，以避免不必要的往返。\n\
  面包屑 | 库为返回的每条记录创建一个虚拟列，用于存储标识该记录来源数据库的面包屑，这支持选择性写入。\n`DataTable` | 库返回一个 `DataTable`\
  \ 对象，该对象可以轻松绑定到对象并用作数据源。\n\n### 设计分片库对象\n\n该库直接接受来自客户端应用程序的请求，可以被视为一个 `API`。请注意，您正在使用扩展方法使此\
  \ `API` 与现有的 `SqlCommand` 类融为一体；这反过来又最小化了客户端的代码量，并使应用程序更易于阅读。\n\n图 9-1 展示了该库在典型应用程序设计中的位置。它还展示了该库如何向客户端应用程序隐藏并行处理和缓存的复杂性。最后，分片库抽象了客户端代码，使其不必直接处理多个数据库。\n\
  \n# 图 9-1. 分片库对象图\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■\
  \ 高性能设计\n\n提供了一个示例应用程序来演示如何使用分片库。尽管您将在以下部分构建的应用程序非常简单，但它使用了分片的所有功能作为参考。\n\n**注意**\n\
  ■\n[请访问 http://EnzoSqlShard.Codeplex.com](http://EnzoSqlShard.Codeplex.com) 获取最新的分片库。此分片库作为一个开源项目提供。该项目还包含一个理解\
  \ SQL 数据库联合（federations）的库版本。\n\n### 管理数据库连接\n\n本节介绍了创建此分片时需要做出的一些编码决策。因为分片库需要能够连接到多个数据库，客户端有两种选择来提供此列表：它可以在每次调用库时提供要使用的连接列表，或者它可以预加载库一个连接对象列表，该列表随后在内存中保留供所有未来调用使用。\n\
  \n分片库声明了以下属性来保存预加载的连接对象列表。`ShardConnections` 属性被声明为 `static`，以便可以轻松地在多次调用中使用；客户端应用程序只需要设置一次此属性：\n\
  \n```csharp\npublic static List<SqlConnection> ShardConnections {get;set;}\n```\n\
  \n此外，向 `SqlConnection` 添加了一个扩展方法，以提供唯一标识连接字符串的 `GUID` 值。连接 `GUID` 对于分片至关重要；它为分片返回的每条记录提供了一个面包屑。这个面包屑稍后将被分片用于确定，例如，在执行更新语句时应使用哪个数据库。\n\
  \n以下代码展示了如何计算连接 `GUID`。它使用了 `SqlConnectionStringBuilder` 辅助类和另一个名为 `GetHash()` 的字符串扩展方法（在第\
  \ 8 行）。此扩展方法返回一个 `SHA-256` 哈希值。请注意，如果连接字符串未指定默认数据库（`Initial Catalog`），则假定用户连接到 `master`\
  \ 数据库。此假设对于 `SQL Database` 是正确的，但对于 `SQL Server` 可能不成立：\n\n```csharp\n1. public\
  \ static string ConnectionGuid(this SqlConnection connection)\n2. {\n3.     SqlConnectionStringBuilder\
  \ cb = new SqlConnectionStringBuilder(connection.ConnectionString);\n4.     string\
  \ connUID =\n5.         ((cb.UserID != null) ? cb.UserID : \"SSPI\") + \"#\" +\n\
  6.         cb.DataSource + \"#\" +\n7.         ((cb.InitialCatalog != null) ? cb.InitialCatalog\
  \ : \"master\");\n8.     string connHash = connUID.GetHash().ToString();\n9.   \
  \  return connHash;\n10. }\n```\n\n作为参考，这里是返回字符串哈希值的扩展方法。从技术上讲，您可以使用字符串的原生 `GetHashCode()`\
  \ 方法。但是，内置的 `GetHashCode` 方法会根据使用的操作系统（32 位或 64 位）和 .NET 版本而有所不同。在这种情况下，您创建了一个简单的\
  \ `GetHash()` 方法，该方法对给定输入始终返回相同的值。字符串值首先使用 `UTF-8` 转换为字节数组（在第 3 行）。然后在第 4 行计算哈希值。第\
  \ 5 行将哈希值作为字符串值返回：\n\n```csharp\n1. public static string GetHash(this string val)\n\
  2. {\n3.     byte[] buf = System.Text.UTF8Encoding.UTF8.GetBytes(val);\n4.     byte[]\
  \ res = System.Security.Cryptography.SHA256.Create().ComputeHash(buf);\n5.     return\
  \ BitConverter.ToString(res).Replace(\"-\", \"\");\n6. }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 145](img/index-192_1.png)\n\n第 9 章 ■ 高性能设计\n\n\n\n# 通过应用程序和库管理连接\n\n默认情况下，应用程序代码通过应用程序配置文件加载初始的连接集。在当前设计中，加载连接是应用程序的责任。此示例应用程序在启动时读取配置文件，并添加配置文件中`ConfigurationStrings`包含单词\
  \ *SHARD* 的每个条目：\n\n1. `foreach ( System.Configuration.ConnectionStringSettings\
  \ connStr in System.Configuration.ConfigurationManager.ConnectionStrings)`\n2. `if\
  \ (connStr.Name.ToUpper().StartsWith(\"SHARD\"))`\n3. `Shard.ShardConnections.Add(new\
  \ SqlConnection(connStr.ConnectionString));`\n\n应用程序也可以基于用户输入添加连接。以下代码展示了应用程序如何向分片添加一个新连接：\n\
  \n```csharp\nShard.ShardConnections.Add(new SqlConnection(\"connection string here\"\
  ));\n```\n\n运行测试应用程序时，您可以通过在“分片连接”选项卡上单击“添加连接”来向分片添加一个连接。此连接的 GUID 值会自动计算并显示。图 9-2\
  \ 显示了允许您手动添加连接的屏幕，而图 9-3 显示了分片中定义的所有连接。\n\n**图 9-2. 向分片添加自定义连接**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 146](img/index-193_1.png)\n\n第 9 章 ■ 为高性能而设计\n\n**图 9-3. 查看分片连接**\n\n\
  ### 读取分片\n\n既然您已经了解了应用程序和库中如何处理连接字符串，您需要知道分片如何处理跨多个数据库的 `SELECT` 操作。最简单的形式是，库针对先前定义的连接列表执行\
  \ `SELECT` 操作。\n\n客户端应用程序调用 `ExecuteShardQuery`，该方法接着遍历 `SqlConnection` 对象列表（见图\
  \ 9-4）。如果您查看代码，可以看到首先创建了每个连接对象的副本；这是为了避免客户端代码多次调用此方法时发生任何潜在冲突（一个连接一次只能进行一次调用）。然后，对于每个连接，代码调用\
  \ `ExecuteSingleQuery`，这是分片库中调用数据库的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 147](img/index-194_1.png)\n\n第 9 章 ■ 为高性能而设计\n\n**图 9-4. 从分片读取**\n\n`ExecuteShardQuery`\
  \ 方法设计为使用 TPL 多次并行调用 `ExecuteSingleQuery` 方法。TPL 提供了许多有用的方法来轻松处理并行处理，而无需管理线程。分片库使用\
  \ `Parallel.ForEach`，它允许代码并发执行一个匿名方法，并根据计算机的硬件配置自动调整线程数。因此，如果您有足够的连接可以遍历，CPU 越多，以下代码执行得越快。但请注意，您需要锁定数据对象（第\
  \ 5 行），它是一个 `DataTable`，因为它可能被其他执行线程访问。最后，`DataTable` 对象上的 `Merge` 方法将来自不同连接的结果集连接起来。循环执行后，结果数据对象包含从分片检索到的记录列表，顺序不保证：\n\
  \n```csharp\n1. Parallel.ForEach(connections,\n2. delegate(SqlConnection c)\n3.\
  \ {\n4. DataTable dt = ExecuteSingleQuery(command, c, exceptions);\n5. lock (data)\n\
  6. data.Merge(dt, true, MissingSchemaAction.Add);\n7. }\n8. );\n```\n\n以下代码是实际示例应用程序的简化版本。（为清晰起见，移除了计算执行时间和执行异常处理的代码。）第\
  \ 4 行设置要执行的命令文本，例如一个 `SELECT` 语句，第 5 行针对分片执行它。代码没有调用 `ExecuteReader`，而是调用 `ExecuteShardQuery`\
  \ 来使用分片。第 7 行将结果的 `DataTable` 绑定并显示分片返回的记录：\n\n```csharp\n1. SqlCommand cmd = new\
  \ SqlCommand();\n2. DataTable dataRes = new DataTable();\n3.\n4. cmd.CommandText\
  \ = this.textBox1.Text;\n5. dataRes = cmd.ExecuteShardQuery();\n6.\n7. dataGridView2.DataSource\
  \ = dataRes;\n```\n\n图 9-5 显示了此代码的结果。`SELECT` 语句旨在返回数据库对象名称和类型。针对分片执行该语句符合预期。但是，请注意，显示中添加了一个额外的列：`__guidDB__`。这是前面介绍的\
  \ GUID 列的名称。这个列对于读取没有太大帮助，但它支持更新和删除，正如您稍后将看到的。\n\n**图 9-5. 显示分片返回的记录**\n\n只要每个连接的连接字符串中有一个关键参数不同，提供的\
  \ GUID 对于每个数据库连接就是唯一的。它由前面描述的 `ExecuteSingleQuery` 方法添加。在此方法中，在所有其他列之前添加了一个数据列，该列携带\
  \ GUID。在以下代码摘录中，第 3 行创建了类型为 `string` 的数据列，第 4 行将其默认值设置为连接的 GUID。第 7 行用查询结果以及添加的\
  \ GUID 列填充数据表。以下是添加此 GUID 的逻辑：\n\n```csharp\n1. // 为此组记录添加连接 GUID\n2. // 这有助于我们识别哪一行来自哪个连接\n\
  3. DataColumn col = dt.Columns.Add(_GUID_, typeof(string));\n4. col.DefaultValue\
  \ = connection.ConnectionGuid();\n5.\n6. // 获取数据\n7. da.Fill(dt);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 149](img/index-196_1.png)\n\n第 9 章 ■ 为高性能而设计\n\n### 缓存\n\n为了最小化到源数据库的往返次数，分片库提供了一个可选的缓存机制。该库中使用的缓存技术提供基本功能，并且可以扩展以处理更复杂的场景。该库的目标是在每次请求时缓存每个数据库后端的整个\
  \ `DataTable`。\n\n图 9-6 显示了缓存方法的逻辑决策树。重要的是要注意，该库根据每个参数、参数值、每个 SQL 语句和数据库的 GUID 计算一个缓存键。\n\
  \n**图 9-6. 缓存逻辑**\n\n当您连接到 SQL 数据库时，缓存的效果是可见的。考虑到第一次连接到 SQL 数据库实例最多需要 250 毫秒，内存访问速度要快得多。随着分片中记录数量的增加和数据库数量的增加，缓存的重要性也随之增加。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 9 章 ■ 为高性能而设计\n\n该库提供的缓存还提供了一个生存时间（TTL）机制，该机制实现绝对过期或滑动过期方案。绝对过期在未来特定时间自动重置缓存，而滑动设置在缓存项在过期前被使用时移动过期时间。\n\
  \n以下代码展示了缓存是如何实现的。第 1 行创建了一个 `CacheItemPolicy`，用于定义缓存的行为。第 3 行实现了滑动窗口缓存，第 5 行实现了绝对方法：\n\
  \n```csharp\n1. CacheItemPolicy cip = new CacheItemPolicy();\n2. if (UseSlidingWindow)\n\
  3. cip.SlidingExpiration = defaultTTL;\n4. else\n5. cip.AbsoluteExpiration = new\
  \ DateTimeOffset(System.DateTime.Now.Add(defaultTTL));\n6. MemoryCache.Default.Add(cacheKey,\
  \ dt, cip);\n```\n\n\n### 缓存优化技术\n\n你可以通过多种方式增强这种缓存技术。例如，当缓存中存储的 `DataTable` 对象包含大量行时，可以对其进行压缩。压缩算法往往会增加延迟，但整体性能的提升可能值得这点轻微的延迟。\n\
  \n另一种增强缓存存储的方法是创建不同的缓存容器，以便在更细粒度的层面上控制哪个容器保存哪种数据。这样，你可以为每个容器控制不同的设置；或者你可能决定始终压缩一个缓存容器，但不压缩另一个。\n\
  \n最后，本库中提供的缓存不是分布式的；它是运行该库的机器本地的。如果你需要开发一个更健壮的缓存，可以考虑研究一下 `Windows Server AppFabric`；其缓存技术提供了企业级的功能。\n\
  \n> **注意**\n>\n> 有关 `Windows Server AppFabric` 的更多信息，请访问 [`msdn.microsoft.com/appfabric`](http://msdn.microsoft.com/appfabric)。\n\
  \n### 在分片中更新和删除记录\n\n现在，你已经准备好了解如何通过分片进行更新和删除操作。针对分片中数据库的更新和删除操作，可以针对给定数据库中的记录执行，也可以针对所有数据库执行。从高层次来看，以下是一些指导原则，可用于决定采用哪种方法：\n\
  \n*   **在单个数据库中更新或删除记录。** 当你已经知道要使用的数据库 GUID 时，可以在数据库中更新或删除一个或多个记录。当你使用分片检索记录时就是这种情况，因为返回的所有记录都提供了数据库\
  \ GUID。\n*   **跨数据库更新或删除记录。** 一般来说，当你不知道记录位于哪个数据库中，或者需要评估所有记录时，你会在分片中跨数据库更新或删除记录。\n\
  \n要在单个数据库中更新或删除记录，你必须提供一个包含要使用的数据库 GUID 的命令参数。以下是更新分片中单个记录的代码。在第 1 到 7 行，代码创建了一个命令对象，该对象调用一个需要两个参数的存储过程。在第\
  \ 9 行，代码添加了要使用的数据库 GUID。这个额外的参数在调用请求的数据库之前，会被分片库移除：\n\n```csharp\ncmd.CommandText\
  \ = \"sproc_update_user\";\ncmd.CommandType = CommandType.StoredProcedure;\ncmd.Parameters.Add(new\
  \ SqlParameter(\"@id\", SqlDbType.Int));\ncmd.Parameters[\"@id\"].Value = int.Parse(labelIDVal.Text);\n\
  cmd.Parameters.Add(new SqlParameter(\"@name\", SqlDbType.NVarChar, 20));\ncmd.Parameters[\"\
  @name\"].Value = textBoxUser.Text;\ncmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_,\
  \ labelGUID.Text));\nExecuteShardNonQuery(cmd);\n```\n\n请注意，调用存储过程并不是此代码运行所必需的。唯一需要的是使用一个\
  \ `SqlCommand` 对象；SQL 代码很可能是内联 SQL。在分片环境中使用存储过程和内联 SQL 各有利弊。正如你可能已经知道的，使用内联 SQL\
  \ 可能会引入安全威胁，例如 SQL 注入；而存储过程通常要快得多，因为它们是预编译的。但是，请记住，使用存储过程会引入一个新的复杂性级别，因为你需要确保存储过程在所有分片数据库中都是相同的。\n\
  \n从分片中删除记录几乎是相同的。在第 1 到 5 行，使用所需的存储过程参数创建命令对象。在第 7 行，代码添加了要使用的数据库 GUID：\n\n```csharp\n\
  cmd.CommandText = \"sproc_delete_user\";\ncmd.CommandType = CommandType.StoredProcedure;\n\
  cmd.Parameters.Add(new SqlParameter(\"@id\", SqlDbType.Int));\ncmd.Parameters[\"\
  @id\"].Value = int.Parse(labelIDVal.Text);\ncmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_,\
  \ labelGUID.Text));\nExecuteShardNonQuery(cmd);\n```\n\n> **注意** `ExecuteShardNonQuery`\
  \ 方法的行为根据其 `database GUID` 参数而不同。如果没有 `database GUID` 参数，它会对所有数据库执行查询。如果有一个带有值的\
  \ `database GUID` 参数，它会对指定的数据库执行查询。如果包含一个值为 `NULL` 的 `database GUID` 参数，它会使用轮询（round-robin）方式对分片中的下一个数据库执行查询。你很快就会在分片中添加记录时看到如何使用轮询调用。\n\
  \n图 9-7 显示了示例应用程序正在更新分片中的一条记录。当你单击 “Reload Grid” 时，会对分片发出一条 `SELECT` 语句，该语句返回每条记录的数据库\
  \ GUID。然后，当你选择特定记录（通过选择整行）时，记录详细信息会加载到屏幕的右侧区域，同时加载记录的数据库 GUID。此时，可以更新或删除该记录。如果运行此示例程序，请确保按照\
  \ “Introductions” 选项卡中的配置步骤操作。\n\n![Image 150](img/index-199_1.png)\n\n*图 9-7. 示例应用程序更新分片中的一条记录*\n\
  \n因为记录正在被更新或删除，所以客户端代码会清除缓存，以强制未来的 `SELECT` 语句从分片中的数据库获取记录。分片库提供了一个 `ResetCache`\
  \ 方法，正是用于此目的。\n\n你可以通过同时对缓存中的记录执行相同的更新或删除操作来改进此逻辑。\n\n在分片中跨数据库更新或删除记录甚至更简单。以下代码使用\
  \ `SqlCommand` 对象执行一条内联 SQL 语句。因为没有提供数据库 GUID，所以该语句会在分片中的所有数据库上执行。当你执行跨数据库的更新或删除时，正确设置并行标志很重要，如第\
  \ 1 行所示：\n\n```csharp\nPYN.EnzoAzureLib.Shard.UseParallel = checkBoxParallel.Checked;\n\
  cmd.CommandText = \"UPDATE TestUsers2 SET LastUpdated = GETDATE()\";\ncmd.CommandType\
  \ = CommandType.Text;\nExecuteShardNonQuery(cmd);\n```\n\n### 向分片中添加记录\n\n你会看到向分片数据库添加记录是多么容易。从性能角度来看，当分片中所有数据库的记录数量大致相等时，此分片效果最佳；这是因为并行处理是在没有任何确定性逻辑的情况下执行的。因此，记录在分片中分布得越散开，速度就越快。你可以通过两种方式向分片中添加记录：\n\
  \n*   **在单个数据库中。** 如果你是首次加载分片，你可能会决定将某些记录加载到特定的数据库中。或者，如果硬件更优越，你可能决定在一个数据库中加载比其他数据库更多的记录。\n\
  *   **跨数据库。** 通常，你在加载记录时不指定数据库。分片库使用轮询机制加载记录。\n\n在特定数据库中添加记录与在数据库中更新或删除记录没有什么不同；你只需要创建一个\
  \ `SqlCommand` 对象，设置 `INSERT` 语句，并添加一个指示要使用的数据库 GUID 的 `SqlParameter`。\n\n在分片中跨数据库添加一条或多条记录需要稍微不同的方法。轮询逻辑会存储上次用于在分片中插入记录的数据库。分片库提供了两种方法来执行插入：\n\
  \n*   `ExecuteShardNonQuery`。正如你之前看到的，此方法扩展了 `SqlCommand` 对象，并在没有提供 GUID 的情况下，使用轮询方式对分片中的下一个数据库执行语句。\n\
  \n`parameter` 为 `NULL`。此约定用于让分片库知晓，它应将内部数据库指针移动到分片中的下一个数据库，以供下一轮轮询调用使用。\n\n`ExecuteParallelRoundRobinLoad`。此方法扩展了\
  \ `List<SqlCommand>` 并提供了一种创建 `SqlCommand` 对象集合的机制。每个 `SqlCommand` 对象都包含一个待执行的 `INSERT`\
  \ 语句。此方法添加一个 `NULL` 数据库 `GUID` 并调用 `ExecuteShardNonQuery` 以执行所有支持轮询的语句。这种构造通过将 `INSERT`\
  \ 语句均匀分布在所有数据库上，简化了快速加载分片的过程。\n\n以下代码展示了客户端如何准备调用 `ExecuteParallelRoundRobinLoad`。第\
  \ 1 行创建了一个 `SqlCommand` 对象的集合。然后，在第 3 行，外层循环针对 `userName` 数组（这是一个要添加到分片的名称列表）中的每个值执行。第\
  \ 5 至 16 行，为每个要 `INSERT` 的名称创建一个 `SqlCommand` 对象并将其添加到集合中。第 22 行实际调用了 `ExecuteParallelRoundRobinLoad`。最后，在第\
  \ 23 行，如果一切顺利，库的缓存将被清除：\n\n```\nList<SqlCommand> commands = new List<SqlCommand>();\n\
  \nforeach (string name in userName)\n{\n    if (name != null && name.Trim().Length\
  \ > 0)\n    {\n        SqlCommand cmdToAdd = new SqlCommand();\n        cmdToAdd.CommandText\
  \ = \"sproc_add_user\";\n        cmdToAdd.CommandType = CommandType.StoredProcedure;\n\
  \n        cmdToAdd.Parameters.Add(\n            new SqlParameter(\"name\", SqlDbType.NVarChar,\
  \ 20));\n        cmdToAdd.Parameters[\"name\"].Value = name;\n\n        commands.Add(cmdToAdd);\n\
  \    }\n}\n\n// 进行调用！\nif (commands.Count > 0)\n{\n    commands.ExecuteParallelRoundRobinLoad();\n\
  \    Shard.ResetCache();\n}\n```\n\n**请注意**，对 `ExecuteParallelRoundRobinLoad` 的调用与你目前所见的所有其他方法在两点上有所不同：第一，无需添加数据库\
  \ `GUID` 参数；它会自动创建一个值为 `NULL` 的此参数。第二，此方法是在 `List<SqlCommand>` 对象上执行，而非 `SqlCommand`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 151](img/index-201_1.png)\n\
  \n## 第 9 章 ■ 高性能设计\n\n图 9-8 显示了示例应用程序中创建要加载到分片中的名称数组的屏幕。如前所述，使用轮询方式向分片添加了六个名称。\n\
  \n***图 9-8.** 示例应用程序使用轮询添加记录*\n\n## 管理分片\n\n创建了分片并达到能够运行查询和添加数据的阶段后，你就可以开始考虑更高级别的问题：如何处理异常、管理性能、控制事务等等。\n\
  \n### 异常管理\n\n到目前为止，你已经了解了示例分片库的基本原理。你看到了如何通过库提供的各种方法来选择、插入、更新和删除记录。让我们讨论一下如何管理分片可能抛出的异常。\n\
  \n当前的库不处理回滚，但它可能会抛出你的代码需要捕获的异常。在前面的例子（图 9-8）中，除了 Jim Nastic 之外的所有记录都被插入了：该名称对于 `SqlParameter`\
  \ 对象来说太长了（因此它抛出了一个“值将被截断”的异常）。\n\n库通过 `TPL` 提供的 `AggregateException` 类处理异常；该类保存一个异常集合。这是必要的，因为库并行执行数据库调用。因此，可能同时发生多个异常。你需要聚合这些异常并将它们返回给客户端以进行进一步处理。\n\
  \n例如，分片库的 `ExecuteSingleNonQuery` 方法接受一个 `ConcurrentQueue<Exception>` 参数，该参数表示存储异常的对象。此对象是线程安全的，这意味着所有运行的线程都可以安全地向其中添加新异常，而不会遇到并发问题。以下代码显示，如果在\
  \ `ExecuteSingleNonQuery` 方法中检测到异常，代码会在第 14 行将异常添加到队列中。\n\n另外，作为约定，如果未提供队列，则会重新抛出异常（第\
  \ 16 行）：\n```\nprivate static long ExecuteSingleNonQuery(\n    SqlCommand command,\n\
  \    SqlConnection connectionToUse,\n    System.Collections.Concurrent.ConcurrentQueue<Exception>\
  \ exceptions\n)\n{\n    try\n    {\n        // . . .\n    }\n    catch (Exception\
  \ ex)\n    {\n        if (exceptions != null)\n            exceptions.Enqueue(ex);\n\
  \        else\n            throw;\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 第 9 章 ■ 高性能设计\n\n以下代码展示了 `ExecuteShardNonQuery` 方法，该方法调用刚刚描述的 `ExecuteSingleNonQuery`\
  \ 方法。第 1 行创建了异常队列 (`ConcurrentQueue`)，它作为变量传递给 `ExecuteSingleNonQuery`。在并行执行数据库调用完成后，代码检查异常队列是否为空。如果非空，则抛出一个\
  \ `AggregateException`，其中包含存储在异常队列中的异常集合（第 13 和 14 行）：\n```\nvar exceptions = new\
  \ System.Collections.Concurrent.ConcurrentQueue<Exception>();\n\nParallel.ForEach(connections,\
  \ delegate(SqlConnection c)\n{\n    long rowsAffected = ExecuteSingleNonQuery(command,\
  \ c, exceptions);\n\n    lock (alock)\n    {\n        res += rowsAffected;\n   \
  \ }\n});\n\nif (!exceptions.IsEmpty)\n    throw new AggregateException(exceptions);\n\
  ```\n\n如你所见，管理异常可能有些棘手。然而，这些异常辅助类提供了一种良好的机制来存储异常并返回可供客户端代码使用的异常集合。\n\n### 性能管理\n\
  \n到目前为止，你已经了解了分片库的工作原理以及如何在代码中使用它。但重要的是要记住你为什么要经历所有这些麻烦——毕竟，创建分片库并非易事。这个分片库做了一件重要的事情：它允许客户端应用程序在水平方向上扩展数据库的部分（或全部），旨在提高性能、可扩展性或两者兼得。\n\
  \n这意味着什么？它意味着分片库可以帮助应用程序在更多用户使用应用程序时（可扩展性）保持其性能特征在某种程度上保持一致，或者它可以帮助应用程序在给定负载下运行得更快（性能）。如果你幸运的话，分片库也许能同时实现这两点。然而，没有适当的规划，这不会发生。分片库本身只是一个分配器，在这个意义上，它将调用分散到多个数据库。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 152](img/index-203_1.png)\n\
  \n### 第 9 章 ■ 高性能设计\n\n分片不一定能提高性能；在某些情况下，分片会损害性能和可扩展性。原因在于分片强加了一个原本不会存在的开销。图 9-9\
  \ 显示了标准 `ADO.NET` 调用选择记录与从分片获取相同记录时的最佳和最坏情况之间的差异。在最佳情况下，假定所有记录分布在三个不同的数据库中；分片能够并发访问所有三个数据库，聚合三个结果集，并对数据进行过滤和/或排序。分片还必须管理以下所有事项，这会消耗处理时间：\n\
  \n• 连接到底层数据库的循环\n\n• 获取数据的循环\n\n• 数据聚合、排序和过滤\n\n# 第 9 章 ■ 高性能设计\n\n在最坏的情况下，所有这些操作都无法并行执行，而需要串行执行。如果`TPL`检测到只有单个处理器可用，就可能出现这种情况。最终，你可能会遇到混合了最坏和最好情况的场景，其中部分调用可以并行进行，但并非全部。\n\
  \n**图 9-9.** 数据访问开销对比\n\n现在所有的警告都已说明，让我们看一个分片有意义并可能同时提升性能和可扩展性的场景。设想一个`DOCS`表仅包含两条记录。该表包含一些代表文档元数据的字段，例如`Title`和`Author\
  \ ID`。然而，此表还包含一个大型字段：一个名为`Document`的`varbinary`列，用于保存 PDF 文件。每个 PDF 文件大小为几兆字节。\n\
  \n图 9-10 展示了该表的输出。由于此数据库加载于 SQL 数据库中，`SELECT * FROM DOCS`语句会在 SSL 加密连接上返回几兆字节的数据。执行此语句平均耗时约\
  \ 2.5 秒，即每条记录大约 1.25 秒。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![Image 153](img/index-204_1.png)\n\n![Image 154](img/index-204_2.png)\n\n**图 9-10.**\
  \ 包含文档的示例表（位于同一数据库中）\n\n两条记录均来自同一数据库；你可以通过查看数据库 GUID 看出，两者非常相似。但是，如果你将第二条记录移动到另一个\
  \ SQL 数据库实例，平均执行时间会下降到大约 1.8 秒。图 9-11 显示了相同语句执行 1.4 秒后的结果（你可以看到数据库 GUID 现在不同了）。这仅是第一次结果执行时间的一半。\n\
  \n**图 9-11.** 包含文档的示例表（位于两个数据库中）\n\n你可以更快地执行此语句，因为几乎全部时间都花在了返回`Document`字段上。图 9-12\
  \ 告诉你，针对两个数据库返回除`Document`字段外的所有字段，仅需 103 毫秒。这表明，即使存在 201\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 155](img/index-205_1.png)\n\n毫秒的处理开销，使用分片也能带来性能优势；然而，情况并非总是如此。务必仔细评估你的数据库设计，以确定哪些表（如果有的话）可以利用并行执行。\n\
  \n**图 9-12.** 从`SELECT`中排除`Document`字段\n\n### 处理部分分片\n\n请注意，构建分片并非全有或全无的方法。你可以轻松地为一组表创建部分分片。\n\
  \n根据你的代码结构，你可能需要也可能不需要构建理解分片的逻辑，这取决于你需要访问哪些表。分片逻辑最好构建在数据访问层（`DAL`）中，这样表的物理组织就与业务对象的组织分离开来。\n\
  \n例如，你可以设计一个直接使用业务对象的应用程序。这些业务对象又使用命令对象，这些命令对象是专门例程，足够智能，可以通过调用执行对象将数据加载到内存结构中。图\
  \ 9-13 显示了`Authors`对象调用两个命令对象，它们从两个独立的库加载数据：标准的`ADO.NET`库和本章构建的分片库。确定调用哪个库的复杂性被推迟到尽可能低的层级，从而保护应用程序和业务对象免受数据库结构变化的影响。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 156](img/index-206_1.png)\n\
  \n**图 9-13.** 实现部分分片的示例应用程序设计\n\n### 管理事务一致性\n\n由于 SQL 数据库不支持分布式事务，因此 SQL 数据库的分片库不提供事务一致性。但你应该仔细审视你的事务需求以及这对你的应用程序设计意味着什么。\n\
  \n你可以通过修改`ExecuteShardNonQuery`和`ExecuteParallelRoundRobinLoad`方法，在本章描述的分片库中添加事务功能。为此，你需要为所有连接对象添加一个独立的事务上下文，并在最后一次执行结束时循环提交它们。如果发生任何异常，必须回滚所有更改。\n\
  \n> **注意** 如前所述，分片库是一个开源项目，可能会随着时间演进。请查看最新版本以了解支持哪些功能。\n\n### 管理外键约束\n\n在分片数据库中另一个值得考虑的有趣问题与外键约束相关。你可能很快会意识到，无论使用哪种分片方法，维护引用完整性都可能具有挑战性。\n\
  \n为了维护关系完整性，需要考虑以下问题：\n\n*   **数据重复。** 因为你不知道哪些记录在分片中的哪个位置，所以父表需要在每个数据库中重复。例如，一个包含州列表（`Florida`、`Illinois`\
  \ 等）的表可能需要在所有数据库中复制。\n*   **标识值。** 在一个数据库中添加的记录无法轻易复制到其他数据库。因此，使用标识值作为主键可能很困难，因为无法保证分片中所有数据库的值都相同。例如，`Florida`的`StateID`值在一个数据库中可能是\
  \ 10，在另一个数据库中可能是 11。\n\n关于数据重复，你可以选择将父表视为开销并在各数据库间复制它们，从而维护强引用完整性（`RI`）；或者通过分片父表来牺牲数据库中的`RI`。如果你决定分片父表，则无法再在数据库中强制执行`RI`；但你仍然可以通过向`DataTable`对象添加`RI`约束来在代码中强制执行`RI`。你可以通过在`DataTable`的`ParentRelations`集合中创建一个`DataRelation`对象来实现。例如，以下代码向`DOCS`和`AUTHORS`\
  \ `DataTable`对象添加了`RI`：\n\n```csharp\n1. SqlCommand cmd1 = new SqlCommand(\"SELECT\
  \ * FROM Authors\");\n2. SqlCommand cmd2 = new SqlCommand(\"SELECT * FROM Docs\"\
  );\n3. DataTable authors = ExecuteShardQuery(cmd1);\n4. DataTable docs = ExecuteShardQuery(cmd2);\n\
  5. DataRelation dr = new DataRelation(\"RI\",\n6.     authors.Columns[\"authorId\"\
  ],\n7.     docs.Columns[\"authorId\"]);\n8. docs.ParentRelations.Add(dr);\n```\n\
  \n标识值的问题在于，每条记录都会创建一个自动标识。但由于表分布在多个数据库中，随着时间的推移，无法保证值相同。为了解决这个问题，你需要创建不依赖于标识值，而是依赖于代码的`RI`规则。在存储州的表的例子中，你创建一个`StateCode`列（例如，`Florida`存储为`FL`），并将该列用作主键以及在你的`RI`规则中。这确保了分片中的所有数据库使用相同的值来维护完整性。\n\
  \n## 设计多租户系统\n\n本章构建的分片库旨在使用轮询机制访问数据。新数据可以存储在任何底层数据库中，并使用临时面包屑来记忆哪个数据库包含哪些数据。这对于某些应用程序效果很好，但对于需要隔离客户记录的企业应用程序来说，可能难以使用。让我们回顾另一个高性能设计：多租户系统中客户数据的架构分离架构。\n\
  \n\n### 基于模式的安全与数据隔离\n\n基于模式的安全与数据隔离已在第 3 章中描述。您了解到基于模式的隔离提供了一个良好的安全模型，用于保护客户数据免受同一数据库中其他租户的影响，以及如何为此模型正确配置访问控制。\n\
  \n### 设计此系统时必须考虑以下几点\n\n*   `服务账户`。为了利用每个客户的连接池，您需要确保连接字符串使用服务账户。服务账户是一种用户不知道的、仅供系统使用的登录名。每个客户将拥有自己的服务账户。\n\
  *   `登录数据库`。您还需要创建一个包含每个客户应使用的连接字符串的中央数据库。或者，您可以将客户连接字符串存储在配置文件中；然而，将此设置保存在数据库中更便于维护。\n\
  *   `客户 ID`。需要为每个客户创建一个客户 ID；然后需要将该客户 ID 存储在内存中（通常在会话状态中），以便系统能够根据客户 ID 检索连接字符串。\n\
  \n#### 处理客户请求的工作流程\n\n图 9-14 展示了系统在读取或更改数据时如何处理特定客户的请求。此工作流程假设客户已经登录并已通过应用程序身份验证；身份验证过程负责将客户\
  \ ID 存储在内存中（对于 ASP.NET 应用程序，客户 ID 可以存储在应用程序缓存或会话状态中）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 157](img/index-208_1.png)\n\n第 9 章 ■ 高性能设计\n\n*图 9-14. 在基于模式的多租户架构中用于获取数据的逻辑*\n\
  \n当发出数据库请求时，系统从本地缓存获取客户 ID (1)，并使用该客户 ID 从登录数据库检索客户连接字符串 (2)。然后，系统将客户的连接字符串保存在其内部缓存中\
  \ (3) 供后续请求使用。数据库连接字符串包含要使用的服务账户以及分配给客户的数据库。然后系统连接到数据库 (4)。由于服务账户具有指向客户模式的默认模式，系统会自动针对正确的模式发出\
  \ T-SQL 命令 (5)。系统随后可以返回客户数据并关闭连接 (6)。\n\n#### 连接池碎片化问题\n\n您应该知道，一个分布在多个数据库上、每个客户拥有一个服务账户的多租户系统，在大型系统中可能会产生`连接池碎片化`问题。这是因为将为每个客户创建一个连接池。此外，如果您使用多个负载均衡的中间层服务器，每个服务器将维护自己的一套连接池。因此，您应通过监控数据库连接，在多个客户之间仔细测试您的系统，以避免在针对\
  \ SQL 数据库实例建立过多连接时可能出现的限制情况。如果您使用 SQL 数据库联合（Federations）而不是模式容器方法，您将不会遇到`连接池碎片化`问题，因为所有数据库连接都是使用相同的服务账户针对单个数据库（根数据库）建立的，无论客户\
  \ ID 如何。\n\n### 对客户模式的维护操作\n\n对客户模式执行维护操作可能具有挑战性。您的应用程序将需要阻止客户连接，直到模式维护任务完成。例如，如果您想将客户迁移到另一个数据库，可以按照以下步骤操作：\n\
  \n1.  将客户置于维护模式以避免数据更改（通过您的应用程序）。\n2.  创建客户模式的备份副本（您可以使用免费的`Enzo Backup`工具来备份特定模式，网址为\
  \ [`www.bluesyntax.net/`](http://www.bluesyntax.net/)）；或者，您可以使用`CREATE DATABASE\
  \ . . . AS COPY OF . . .`创建数据库的完整副本；但是，此方法需要删除所有其他不应迁移到新数据库的客户模式容器。\n3.  如果您使用了工具备份模式，则将模式容器还原到新数据库。\n\
  4.  更改登录数据库中的连接字符串，使其指向新数据库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 9 章 ■ 高性能设计\n\n正如您将在第 10 章中看到的，联合（Federations）通过提供内联的`SPLIT`操作解决了这个问题，该操作允许您在没有任何停机时间的情况下重新配置分片。\n\
  \n## 创建垂直分区分片\n\n本章大部分内容讨论了水平分区分片（HPS），但熟悉垂直分区分片（VPSs）也很重要。VPS 将应用程序数据库模式存储在多个数据库中；本质上，应用程序数据库被拆分，使得分片中没有数据库持有完整的模式。\n\
  \n让我们考虑一个由两个表组成的简单应用程序数据库：`用户`和`销售`。`用户`表包含几千条记录，而`销售`表包含几百万条记录。您可以设计一个包含两个数据库的\
  \ VPS：第一个数据库包含`用户`表，第二个包含`销售`表。\n\n这种类型的分片使得隔离某些任务的处理能力需求变得容易，而不影响其他数据库。例如，您可以使用`用户`表处理用户的登录请求，同时使用`销售`表进行\
  \ CPU 密集型的计算过程或运行长时间的报告。\n\n您也可以通过跨多个数据库拆分一个表来构建 VPS。例如，`销售`表可能存储大型二进制字段（如文档）。在这种情况下，您可以拆分`销售`表，将常用字段存储在一个数据库中，而包含文档的字段存储在另一个数据库中。\n\
  \nVPS 确实带来了其自身的一系列挑战，例如在数据库之间保持强参照完整性（RI）的困难，以及在 SQL 数据库的情况下确保事务一致性。这些考虑只是为了在您考虑\
  \ VPS 时揭示某些设计问题。根据您的数据库设计，VPS 可能运行良好，并且可能比 HPS 更易于实现。\n\n## 用于 Windows Azure 的大数据与\
  \ Hadoop\n\n尽管本书是关于 SQL 数据库的，但您应该知道微软正在引入 Windows Azure 的 Hadoop，这是一项大数据计划，在 Azure\
  \ 云上提供 Apache Hadoop 框架。\n\nHadoop 是一种分布式计算模型，允许您将处理需求可靠地扩展到大量机器上，用于处理结构化和非结构化数据。使用\
  \ Hadoop 时，您需要实现软件逻辑来使用开源子项目（如 Hadoop 分布式文件系统和 Hadoop MapReduce）来分发计算需求。Hadoop 网络中的每台机器为大规模分布式计算需求提供本地计算和存储。\n\
  \n在撰写本文时，Windows Azure 的 Hadoop 仅通过邀请提供，且信息有限。如果您有大量数据需要分析，并且需要一个大规模扩展的环境，请查看微软提供的\
  \ Hadoop 服务。\n\n# 总结\n\n正如您所见，如果需要扩展数据库设计或希望开发高性能系统，使用 SQL 数据库构建数据库可能很复杂。本章向您介绍了分片库的设计和实现，该库为您提供了必要的构建模块，以试验灵活且可扩展的架构。\n\
  \n\n\n你已经了解了如何在数据访问层中使用缓存，以及如何通过并行处理 SQL 语句来提升应用程序的性能。你还探索了更高级的主题，例如引用完整性与异常管理。本章为你提供了必要的基础知识，以便你能够创建自己的分片，并针对\
  \ `SQL Database` 构建高性能应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 10 章\n\n## 联邦\n\n任何云计算平台的一个主要原则是弹性，允许系统突破其当前设计的某些限制进行扩展。借助联邦，`SQL Database`\
  \ 实现了这一承诺；它是一种技术，你的 `SQL Database` 实例可以利用它，随着时间的推移根据规模或性能瓶颈进行扩展。\n\n你可能对这项技术应如何工作抱有某些预期，其中之一很可能是对你的应用程序透明。你可能期望，如果要使用联邦，现有应用程序无需进行任何代码更改。像任何其他事物一样，像联邦这样颠覆性的功能也伴随着某些妥协。考虑到这是微软应对数据库层横向扩展的首次尝试，在你能够获益之前，需要考虑某些限制。本章将帮助你理解联邦解决了哪些问题，以及如何最好地利用这一特性。\n\
  \n### 联邦介绍\n\n迄今为止，开发人员和管理员能够在不引入重大代码更改的情况下，提升需要同时读写访问的数据库的性能和可扩展性的唯一实用方法，就是在同一台服务器上增加更多内存、CPU\
  \ 或磁盘。这被称为“纵向扩展”。`SQL Database` 平台引入了联邦功能，旨在解决传统数据库服务器的可扩展性问题；它提供了一种通过向数据库添加更多服务器来实现数据库“横向扩展”的方式。\n\
  \n### 联邦与分片\n\n在数据库领域，分片是一个通用术语，描述了将高度相关的数据分布在多台物理机器上的做法。因此，分片是大型数据库用来利用多台机器的计算能力，实现横向扩展架构的一种方式。联邦是\
  \ `SQL Database` 对分片概念的具体实现。为了说明联邦在整个图景中的位置，我将概述可用的各种扩展模型。\n\n下述扩展模型围绕 **数据域** 的概念构建，数据域是分片中使用的主要数据隔离单元。例如，在大多数商业应用程序中，数据域是客户。在天文学中，数据域可以是星系或行星。在金融领域，它可能是财政年度。\n\
  \n- **纵向扩展**。如前所述，纵向扩展架构涉及为承载数据的机器增加更多资源。纵向扩展架构的根本问题在于，在某个时间点，为服务器增加更多资源并不会带来更好的性能，因为应用程序的设计并未考虑到所有可用资源，并且收益递减规律开始适用。所有数据域实例都存储在同一个数据库中，每个查询都需要包含其使用的数据域（例如，搜索特定客户\
  \ ID 时使用 `WHERE` 子句）。这是大多数系统采用的架构。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 10 章 ■ 联邦**\n\n- **线性分片**。在线性分片架构中，应用程序被设计为将每个数据域实例拆分到其自己的数据库中。因此，在以客户驱动的数据域情况下，每个客户都有自己的数据库。在此模型中，查询不需要根据数据域进行过滤，因为连接字符串已经将查询指向了正确的客户数据。\n\
  这种方法的主要缺点是管理员需要管理与客户数量一样多的数据库。在 `SQL Database` 中，这也可能意味着额外的运营成本。\n\n- **压缩分片**。压缩分片类似于线性分片，因为数据域实例是隔离的。然而，隔离是通过数据库中的架构容器执行的，而不是数据库本身。在此模型中，每个数据域是一个数据库架构，并且可以使用多个数据库来存储这些架构。通常，此模型减少了使用的物理数据库数量，并因此可能降低一些运营成本。\n\
  \n- **联邦**。联邦是分片压缩的一种形式。最初，数据存储在单个数据库中（纵向扩展）；然而，管理员可以将数据拆分到两个或多个数据库（压缩分片）中，其中每个数据库包含一组数据域实例。\n\
  理论上，可以通过联邦将每个数据域实例拆分到其自己的数据库中来实现线性分片，尽管在实践中这可能不切实际。因此，联邦是一种分片架构，允许管理员根据其数据库的实际使用模式实现不同程度的压缩，并实现最优的成本/效益实施。正如你稍后将看到的，联邦也更加灵活，因为管理员可以实现多个数据域，而这是其他模型无法做到的。总之，联邦数据库可以实现一个或多个数据域，每个数据域都是其自己的分片，具有自己的压缩方式。\n\
  \n### 为何使用联邦？\n\n让我们从理解为什么一些应用程序被设计（或重新设计）为使用联邦开始。如前所述，联邦解决了两个常见问题：`SQL Database`\
  \ 中的存储空间和随时间推移的性能问题。\n\n如你所知，`SQL Database` 的大小限制为 150GB 数据。如果你的数据库增长超出此空间限制，你该怎么办？你的选择很简单：截断部分数据（或归档旧记录）或者使用联邦。\n\
  \n由于联邦允许你跨多个数据库拆分表，因此你可以将数据分布在多个 150GB 的数据库中，从而在 `SQL Database` 中获得 TB 级的存储容量。例如，你的数据库可能有一个名为\
  \ `PurchaseHistory` 的表，其中包含数亿条记录，占所有存储需求的 90%。你可以将这个表跨多个服务器进行联邦，而保持所有其他表不变。如果你的\
  \ `PurchaseHistory` 表增长到 1TB 大小，你将需要七个 150GB 的 `SQL Database` 实例来存储该表（称为联邦成员），外加包含所有其他表的原始数据库（称为根数据库）。\n\
  \n联邦的一个强大功能是，你可以随着存储需求的增加，随时间添加更多数据库。因此，如果你的表增长到 1.1TB，只需再添加一个 150GB 的数据库。\n\n采用联邦的另一个重要驱动因素是数据库性能。当你的应用程序用户数量增长时，数据库工作负载通常会增加。随着时间的推移，需要处理的记录更多，并且由于用户更多，数据库通常会经历请求的增加。在某个时间点，工作负载增加得如此之大，以至于你的应用程序可能会经历减速，甚至受到\
  \ `SQL Database` 的限制。联邦在某些情况下可以帮助你实现更高的性能，因为你不是在单个数据库中处理所有请求，而是将某些请求本质上分发到多个数据库，每个数据库都有自己分配的\
  \ CPU、内存、I/O 和 `TempDB`。换句话说，联邦自然地增加了你的计算资源，因为你的数据存储在几乎毫无共同点的共享服务器上。\n\n### 联邦概述\n\
  \n\n\n让我们更深入地探讨联合技术，并探索其工作原理。首先，你需要学习描述联合组件的术语。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 10 章 ■ 联合\n\n## 联合组件\n\n*   `联合根`。联合根是创建所有联合的 SQL Database 实例。它是你最初创建的数据库。此数据库将保存未联合的表，例如你的配置表或其他不需要联合的表。\n\
  \n*   `联合`。联合是一组共享公共数据子集（即数据域）的逻辑表组。例如，你的数据库可能存储客户记录、购买历史记录、地址、潜在客户信息等。这些数据集中的每一个都可能成为联合的候选对象。联合在联合根中创建。\n\
  \n*   `联合成员`。联合成员是一个物理数据库，保存联合的全部或部分记录。一个联合有一个或多个联合成员。例如，如果你创建了一个 PurchaseHistory\
  \ 联合，你的购买历史记录可能存储在两个数据库中；这两个数据库将被称为联合成员。初始时，你的第一个联合成员的大小将与根数据库相同，或者与执行 `SPLIT` 操作时被拆分的联合成员大小相同。联合成员的大小可以单独调整。虽然你可以在联合成员内的表之间强制执行引用完整性，但不能在联合成员之外强制执行引用完整性。\n\
  \n*   `联合键`。联合键是联合中用于分区数据的数据域；例如，它可以是客户 ID。每个联合都有一个联合键，每个联合成员保存该键的一组值。例如，所有小于 500\
  \ 的客户 ID 存储在第一个联合成员中，而大于或等于 500 的客户 ID 存储在另一个成员中。联合键用于在不同数据库之间拆分记录。联合键有特殊要求：它只能是\
  \ `int`、`bigint`、`uniqueidentifier` 或 `varbinary(n)` 类型。\n\n*   `原子单元`。原子单元代表一个数据域实例（即联合键的值）。例如，如果你的联合键是\
  \ `customerId`，那么针对给定客户 ID 的每一组记录就是一个原子单元。当你发出数据库请求时，可以指定在整个联合成员上执行语句，或者将语句的作用范围限制在给定的原子单元（例如\
  \ `customerId=10`），这会自动将记录过滤到单个客户。\n\n*   `引用表`。虽然联合包含分布在多个联合成员中的表，但它也可以包含用作引用表的表。这些表存储在联合成员中，但它们不是联合的。引用表不会在联合成员之间自动维护。开发人员负责确保这些表在联合成员之间保持同步。\n\
  \n## 创建联合\n\n让我们通过一个例子来了解如何创建你的第一个联合。图 10-1 展示了创建第一个联合时发生的过程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 158](img/index-213_1.png)\n\n**图 10-1.** 创建第一个联合的过程\n\n### 步骤 1：创建数据库\n\
  \n在步骤 1 中，你使用 SQL Database 中 master 数据库的常规 `CREATE DATABASE` 语句来创建一个数据库：\n\n```sql\n\
  // 创建一个 1GB 的数据库。这很快将成为我们的根数据库。\n// 运行此语句前请确保已连接到 master。\nCREATE DATABASE EnzoLog2\n\
  ```\n\n### 步骤 2：创建联合\n\n在步骤 2 中，你创建你的第一个联合。让我们称这个联合为 PurchaseHistory，并选择一个 `BigInt`\
  \ 作为分区键，该键将基于 `purchaseId` 进行分区。连接到你的新数据库并运行 `CREATE FEDERATION` 语句，如下所示：\n\n\n\
  # 第十章 ■ 联合\n\n// 在运行此语句前连接到你的新数据库\n\n`CREATE FEDERATION PurchaseHistory (purchaseId\
  \ BigInt RANGE)`\n\n`注意` 请记住，除了根数据库之外，你创建的每个新联合成员都将被计费。\n\n`CREATE FEDERATION` 语句会创建另一个数据库；这是你的第一个联合成员。联合成员拥有随机的数据库名称。连接到联合的唯一方式是发出\
  \ `USE` 命令。现在我们有了第一个联合成员，我们需要构建联合的模式（表、存储过程等）。这很重要，因为当我们创建额外的联合成员时，将使用此联合成员的模式。\n\
  \n如果你尝试联合一个已存在的表，你需要将此操作视为数据迁移工作；实际上，你不能简单地联合一个已存在于根数据库中的表。你首先需要创建联合成员、表本身，然后使用另一个工具（如\
  \ SQL Server Integration Services）将数据从根数据库迁移到联合成员。此时，你就可以开始拆分位于联合成员中的表了。\n\n那么，让我们连接到第一个联合成员并创建一个\
  \ `Purchase` 表。注意 `USE FEDERATION` 命令需要联合键的值；它使用此值作为提示来找到正确的联合成员。因为这是我们的第一个联合成员，你可以为\
  \ `purchaseId` 使用任何值；目前所有可能的 `purchaseId` 值都指向同一个联合成员。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```sql\n// 连接到联合成员\n// FILTERING=OFF 意味着我们正在使用此联合成员中的所有原子单元\nUSE FEDERATION PurchaseHistory\
  \ (purchaseId = 0) WITH FILTERING=OFF, RESET\n\n// 在 purchaseId 联合键上创建一个联合表\nCREATE\
  \ TABLE Purchases (\n    pid bigint NOT NULL primary key, -- 此记录的唯一标识符\n    amount\
  \ decimal(10, 2) NOT NULL, -- 购买金额\n    storeId int NOT NULL -- 进行购买的商店\n)\nFEDERATED\
  \ ON (purchaseId = pid)\n```\n\n让我们在此联合成员中创建更多对象。首先创建一个引用表，其中包含商店列表，以及一个返回给定商店总销售额的存储过程：\n\
  \n```sql\n// 创建一个名为 StoreLocations 的引用表\nCREATE TABLE StoreLocations (\n    storeId\
  \ int NOT NULL primary key,\n    storeName nvarchar(20) NOT NULL,\n    zipCode nvarchar(10)\
  \ NOT NULL\n)\n```\n\n让我们也添加一个存储过程和一个外键引用：\n\n```sql\n// 创建一个返回特定邮政编码购买记录的存储过程\n\
  CREATE PROC GetPurchasesByZipCode(@zipCode nvarchar(10))\nAS\nSELECT * FROM Purchases\
  \ P JOIN StoreLocations S\nON P.storeId = S.storeId\nWHERE S.zipCode = @zipCode\n\
  \n// 现在添加外键\nALTER TABLE Purchases\nADD CONSTRAINT fk_storeId\nFOREIGN KEY (storeId)\
  \ REFERENCES StoreLocations (storeId)\n```\n\n最后，但同样重要的是，让我们在表中插入一些记录。你很快就会看到拆分操作将如何重新分配我们的记录。\n\
  \n```sql\nINSERT INTO StoreLocations VALUES (1, 'Boca Raton', '33498' )\nINSERT\
  \ INTO StoreLocations VALUES (2, 'Orlando', '32801' )\nINSERT INTO Purchases VALUES\
  \ (100, 25.0, 1)\nINSERT INTO Purchases VALUES (200, 75.0, 2)\nINSERT INTO Purchases\
  \ VALUES (300, 50.0, 1)\nINSERT INTO Purchases VALUES (500, 100.0, 2)\nINSERT INTO\
  \ Purchases VALUES (600, 12.0, 1)\n```\n\n此时，`PurchaseHistory` 是一个包含单个数据库的分片（在某些方面是一个纵向扩展的分片）。联合允许你通过进一步拆分分片来管理压缩程度。想象一下，我们需要拆分记录，使得\
  \ `Purchases` 表分布在两个数据库上，如图 10-1 的步骤 3 所示。通过连接到根数据库并使用 `ALTER FEDERATION` 命令来拆分联合，如下所示：\n\
  \n```sql\n// 连接到根数据库\nUSE FEDERATION ROOT WITH RESET\n\n// 修改联合以发出拆分命令\nALTER FEDERATION\
  \ PurchaseHistory SPLIT AT (purchaseId = 500)\n```\n\n`ALTER FEDERATION` 语句是异步执行的，并且是一个在线操作。在拆分进行期间，你可以正常访问你的联合成员。一旦拆分完成，你的联合将包含两个联合成员，并且将具有事务一致性。因为拆分会创建两个新的联合成员，复制所有对象和记录，然后删除原始联合成员，所以在拆分操作结束时，你的应用程序可能会遇到连接中断。如果是这种情况，你只需要重新连接。要获取对联合执行的任何操作的状态，请检查根数据库中的\
  \ `dm_federation_operations` 视图。如果没有返回记录，则表示你之前启动的拆分操作已完成：\n\n```sql\n// 查询拆分操作的状态\n\
  SELECT * FROM sys.dm_federation_operations\n```\n\n拆分操作将所有对象从原始联合成员复制过来，包括存储过程、引用表及其数据以及外键。\n\
  \n让我们分别看看两个联合成员中的数据。\n\n```sql\n// 连接到第一个联合成员\nUSE FEDERATION PurchaseHistory (purchaseId\
  \ = 0) WITH FILTERING=OFF, RESET\n// 获取一些数据；将返回三条记录\nSELECT * FROM Purchases P JOIN\
  \ StoreLocations S ON P.storeId = S.storeId\n\n// 现在连接到第二个联合成员\nUSE FEDERATION PurchaseHistory\
  \ (purchaseId = 500) WITH FILTERING=OFF, RESET\n// 获取一些数据；将返回两条记录\nSELECT * FROM\
  \ Purchases P JOIN StoreLocations S ON P.storeId = S.storeId\n\n// 你也可以执行存储过程\n\
  EXEC GetPurchasesByZipCode '33498'\n```\n\n现在我们有两个联合成员，你可能需要更新一条记录。但是你的记录在哪个联合中？你的应用程序不需要了解底层的实现细节。它只需要知道你想要更新的原子单元的值。让我们将\
  \ `purchaseId=100` 的金额更新为另一个值：\n\n```sql\n// 连接到包含 purchaseId=100 的联合成员\nUSE FEDERATION\
  \ PurchaseHistory (purchaseId = 100) WITH FILTERING=OFF, RESET\n// 获取一些数据；将返回三条记录\n\
  UPDATE Purchases SET amount = 17.25 WHERE pid = 100\n```\n\n这里使用的 `WHERE` 子句可能会给你一种处理纵向扩展架构的印象，因为它是唯一需要此类子句的可扩展性模型。这是因为我们用\
  \ `FILTERING=OFF` 指定了连接，这允许查询访问当前联合成员中的所有原子单元。或者，你可以告诉 SQL Database 你希望处理特定的原子单元，给你一种除了要更改的记录外没有其他记录的印象。以下语句是更新记录的首选方法。注意\
  \ `FILTERING=ON` 的使用。\n\n```sql\n// 连接到第一个联合成员\n// FILTERING=ON 是可选的；它是默认设置。\nUSE\
  \ FEDERATION PurchaseHistory (purchaseId = 100) WITH FILTERING=ON, RESET\n// 获取一些数据；将返回三条记录\n\
  UPDATE Purchases SET amount = 17.25\n```\n\n你可以将相同的逻辑应用于在联合成员中添加或删除记录。如果你想删除多个原子单元，你需要使用\
  \ `FILTERING=OFF` 选项，以便你的语句可以影响多条记录。此外，如果你尝试插入的原子单元的键超出当前联合成员分区键的范围，`INSERT` 语句将失败。\n\
  \n### 创建更多联合\n\n到目前为止，我们创建了一个联合，并将记录拆分为两个，从而创建了两个联合成员。\n\n\n但是，我们创建的联邦仅对历史购买记录有意义，因为它的分区键是\
  \ `purchaseId`。正如本章引言所讨论的，联邦的主要优势之一是能够定义多个数据域并分别管理每个域的压缩。如果我们还有一个跟踪客户访问记录的大表怎么办？\n\
  \n没问题！我们可以根据需要创建任意多个联邦，并将一组表放置其中。让我们创建另一个名为 `CustomerVisits` 的联邦：\n\n```\n// 连接回根数据库\n\
  USE FEDERATION ROOT WITH RESET\n\n// 创建一个新联邦\nCREATE FEDERATION CustomerVisits (visitId\
  \ BigInt RANGE)\n\n// 连接到我们的第一个联邦成员\nUSE FEDERATION CustomerVisits (visitId=0) WITH\
  \ FILTERING=OFF, RESET\n\n// 然后让我们创建一个包含几条记录的表\nCREATE TABLE CustomerVisits (\n\
  \    vId bigint NOT NULL PRIMARY KEY,\n    dateOfVisit dateTime NOT NULL,\n    storeId\
  \ int NOT NULL\n) FEDERATED ON (visitId = vid)\n\nINSERT INTO CustomerVisits VALUES\
  \ (1, getdate(), 1)\nINSERT INTO CustomerVisits VALUES (2, getdate(), 2)\nINSERT\
  \ INTO CustomerVisits VALUES (3, getdate(), 2)\nINSERT INTO CustomerVisits VALUES\
  \ (4, getdate(), 1)\nINSERT INTO CustomerVisits VALUES (5, getdate(), 1)\n```\n\n\
  我们现在总共有两个联邦和三个联邦成员，如图 10-2 所示。\n\n![Image 159](img/index-217_1.png)\n\n# 第 10 章\
  \ ■ 联邦\n\n**图 10-2.** 创建多个联邦\n\n> **注意：** 到目前为止，你创建联邦键时使用的都是 `Bigint` 值。但是，你不能在联邦表上使用\
  \ `IDENTITY` 列，因此你的应用程序需要为联邦表生成下一个主键值。虽然使用 `Uniqueidentifier` 有点麻烦，但它很受欢迎，因为不需要维护生成下一个标识符的逻辑。\n\
  \n## 管理联邦\n\n到目前为止，你已经了解了如何创建联邦、拆分联邦成员以及向联邦表添加记录。你可能想知道有哪些工具可以查看你的联邦及其成员，以及如何判断你的联邦是否已准备好进行拆分。\n\
  \n要管理你的联邦，请转到 SQL 数据库管理门户。首先登录你常用的 Windows Azure 管理门户 (`http://manage.windowsazure.com`)\
  \ 来访问此门户。在 SQL 数据库下找到你新创建的数据库，然后单击屏幕底部的 `Manage` 按钮，如图 10-3 所示。\n\n![Image 160](img/index-218_1.png)\n\
  ![Image 161](img/index-218_2.jpg)\n\n# 第 10 章 ■ 联邦\n\n**图 10-3.** 管理你的 SQL 数据库实例\n\
  \n单击 `Manage` 图标将打开另一个窗口，要求你登录到所选的数据库服务器。在该屏幕上，你还可以指定数据库的名称（在我的示例中是 `EnzoLog2`）。登录后，你就进入了\
  \ SQL 数据库管理门户，如图 10-4 所示。\n\n**图 10-4.** 查看数据库属性\n\n你会注意到你的联邦显示在右侧；在图 10-4 中可以看到\
  \ `CustomerVisits` 和 `PurchaseHistory`。让我们点击 `PurchaseHistory`。其下方的 `Drop Federation`\
  \ 按钮变为可用状态，允许你通过单击一次删除整个联邦。删除联邦将删除所有联邦成员。在此屏幕上，你还可以通过单击顶部的 `New` 按钮创建新联邦，或者通过单击\
  \ `Query Performance` 查看查询性能。但请注意，显示的性能信息仅适用于根数据库，因为这是我们当前正在查看的。\n\n要查看联邦的详细信息，请单击其右侧的箭头。例如，如果你点击查看\
  \ `PurchaseHistory` 的详细信息，屏幕将如图 10-5 所示。你可以浏览每个联邦成员，或者单击它们以显示带有其他选项的窗口。例如，你可以通过单击\
  \ `Resize` 并指定目标大小，轻松地在此屏幕上调整单个联邦成员的大小。你还可以通过选择 `Split` 并提供联邦成员将被拆分时的联邦键值，轻松地在此屏幕上执行拆分操作。\n\
  \n![Image 162](img/index-219_1.jpg)\n\n# 第 10 章 ■ 联邦\n\n**图 10-5.** 查看一个联邦及其联邦成员\n\
  \n## 高级考虑因素\n\n从前述示例中可以看出，联邦为需要扩展到单个 SQL 数据库实例能力之外的云应用程序提供了一种重要的可扩展性模型。然而，在决定采用此功能之前，有一些挑战和考虑因素值得讨论。\n\
  \n### 限制\n\n让我们回顾一下在采用联邦之前你应该了解的一些最重要的限制。\n\n*   **无法合并。** 你可能已经注意到缺乏合并能力。一旦你拆分了联邦成员，在当前版本的\
  \ SQL 数据库中无法将其合并回去。虽然这是一个缺点，但未来版本的联邦可能会支持此功能。\n\n*   **独立的架构。** 如前所述，一旦创建了联邦成员，其架构定义就与同一联邦中的所有其他成员独立。在我们之前的示例中，你可以连接到其中一个联邦成员并删除一个表，或添加一列，甚至更改一个存储过程。由于目前没有防护措施，很容易出现联邦成员之间架构略有不同的情况。这可能会对你的代码产生一些影响。因此，如果你更新了某个联邦成员的架构，请记住对所有其他联邦成员进行相同的更改。\n\
  \n*   **有限的工具支持。** 目前，市场上大多数工具都不支持联邦数据库，包括 Microsoft 提供的一些工具。尽管这种情况很可能会随着时间的推移而改变，但你不能将数据同步服务、Azure\
  \ 报告服务或数据库 `COPY` 操作用于联邦成员。\n\n*   **不支持扇出。** 另一个重要限制是缺乏对跨联邦成员查询的支持。换句话说，你不能发出一个将跨越或扇出多个联邦成员的请求，更不用说多个联邦了。如果你想获取销售总额，通常会运行这个简单的语句：\n\
  \n```\nSELECT SUM(amount) FROM purchases\n```\n\n由于 SQL 数据库无法针对多个联邦成员执行此语句，你需要在每个联邦成员上运行此查询，并在你的代码中执行最终的求和操作。\n\
  \n> **注意：** 在多个数据库上执行相同的查询称为扇出操作。在你的代码中实现扇出操作并不难，尽管你应该使用多个线程来执行扇出查询以提高获取操作的性能。\n\
  \n还有许多其他适用于联邦的限制可能会影响你的设计或采用联邦的能力，例如不支持索引视图、缺乏对 `timestamp` 和 `rowversion` 数据类型的支持等等。\n\
  \n> **注意：** 如果你计划将联邦用于你的应用程序，应该花些时间在 Msdn 上查阅所有已记录的限制。使用 Bing 搜索“Federation Guidelines\
  \ and Limitations”。\n\n### 分片库\n\n\n\n之前讨论的一些关于扇出查询的限制，可以通过自行编码逻辑或使用已解决该问题的开源库来解决。\n\
  \n重要的是，你可以使用前面章节讨论过的 `Enzo Sharding` 库。最新版本支持联邦功能，允许你轻松地跨多个联邦成员执行语句，并使用多线程操作以获得更快的结果。你可以使用该库内置的扇出操作来跨数据库执行架构变更、返回单个结果集或跨联邦成员执行简单聚合。\n\
  \n使用最新版本的库，你可以执行一种名为 `D-SQL` 的分布式查询，其语法扩展自 `T-SQL`。\n\n该库会自动检测语法，并在指定的联邦成员上执行内部查询。\n\
  \n由于这是一个 .NET 库，你无法在代码之外使用此命令结构。以下是一个 `D-SQL` 查询示例，它会获取所有 `PurchaseHistory` 记录，而不考虑联邦成员的数量：\n\
  ```\nSELECT * USING (SELECT * FROM Purchases) FEDERATED ON (PurchaseHistory)\n```\n\
  内部语句是在 `PurchaseHistory` 联邦上执行的查询；一个统一的数据集被返回给调用代码。以下是执行其他请求的几种 `D-SQL` 变体：\n```\n\
  -- 在所有联邦成员中查找最大金额\nSELECT MAX(amount) USING (SELECT MAX(amount) FROM Purchases)\n\
  FEDERATED ON (PurchaseHistory)\n```\n```\n-- 查找邮编为 33498 的所有销售额总和\nSELECT SUM(amount)\
  \ USING (SELECT SUM(amount) FROM Purchases P\nINNER JOIN StoreLocations S ON P.storeid\
  \ = S.storeid\nWHERE S.zipcode = '33498' )\nFEDERATED ON (PurchaseHistory)\n```\n\
  ```\n-- 在所有联邦成员上执行存储过程并返回所有记录\nSELECT * USING (EXEC GetPurchasesByZipCode '33498'\
  \ ) FEDERATED ON (PurchaseHistory)\n```\n```\n-- 在同一联邦上执行 JOIN 以排除某些记录\nSELECT *\
  \ USING (SELECT * FROM CustomerVisits) FEDERATED ON (CustomerVisits)\nWHERE storeid\
  \ IN (SELECT DISTINCT storeid FROM Purchases WHERE amount >= 100)\nFEDERATED ON\
  \ (PurchaseHistory)\n```\n该库提供了额外的功能，例如基于原子单元值的缓存、排序和记录过滤。\n\n由于这是一个开源项目，欢迎你剖析代码，并根据自己的需求实现该库的定制版本。\n\
  \n`注意`：要了解更多关于 `Enzo sharding` 库的信息，请访问 `http://enzosqlshard.codeplex.com`。你将能够下载该开源库和一个入门示例应用程序。\n\
  \n## 总结\n\nSQL Database 提供了一个名为\"联邦\"的独特功能，承诺在数据库层实现弹性，让你能够快速高效地扩展数据库层。虽然此功能的首个版本存在一些限制，但显然许多开发者将被吸引去评估此功能，并可能采用它来解决其可扩展性需求。\n\
  \n## `第 11 章` `性能调优`\n\n对于在云中运行的数据库，为高性能进行设计变得更加重要，因为开发目标往往是最小化往返次数和返回的数据量。本章概述了\
  \ SQL Database 中一些最常见的调优和故障排除技术。请记住，性能调优是一个非常复杂的主题；因此，本章只能介绍部分选定的技术。\n\n所介绍的技术与\
  \ SQL Server 中可用的技术类似，尽管其中一些工具在 SQL Database 中不受支持。在此过程中，你将通过几个示例来了解如何提高 SQL 语句的性能以及进行调优所需的步骤。\n\
  \n## SQL Database 的不同之处\n\n\n\n## 方法与工具\n\n由于 SQL 数据库运行在托管的共享基础设施上，因此了解哪些调优方法可用、哪些不可用至关重要。表\
  \ 11-1 概述了一些开发人员和数据库管理员（DBA）在调优数据库系统时传统上使用的关键方法。这里使用\"*系统*\"一词是合适的，因为有时你需要调优数据库服务器，而在其他情况下，你需要调优实际的数据库代码，甚至解决数据库设计问题。\n\
  \n### 表 11-1. 典型的调优方法与工具\n\n| 方法或工具 | 是否可用？ | 说明 |\n| :--- | :--- | :--- |\n| `SQL\
  \ Profiler` | 否 | 使用服务器端跟踪的工具不受支持，例如大多数审计工具、`SQL Profiler` 和数据库引擎优化顾问。 |\n| 执行计划\
  \ | 是 | SQL Server Management Studio (`SSMS`) 可以针对 SQL 数据库显示实际执行计划。本章稍后将对此进行介绍。\
  \ |\n| `Perfmon` | 否 | 任何通常用于性能调优的 Windows 监视工具均不可用。 |\n| `DMVs` | 部分可用 | 少数动态管理视图\
  \ (`DMVs`) 是可用的，并能提供关于正在运行的会话和先前执行的语句的深刻见解。 |\n| 库度量标准 | 是 | `ADO.NET` 提供库级别的统计信息，为开发人员提供额外的洞察，例如从使用者角度出发的总处理时间和传输的字节数。\
  \ |\n\n该表列出了一些你可能熟悉的调优方法和工具，并指明了哪些可用于 SQL 数据库。表中不受支持的工具（例如 `SQL Profiler` 和 `Perfmon`）通常是在\
  \ SQL Server 等环境中由 DBA 和系统管理员使用的那些工具。\n\n## 编码影响\n\n由于你无法访问 SQL 数据库的服务器端配置设置（如磁盘配置、内存分配、CPU\
  \ 亲和性等），因此需要更加注重 SQL 语句的质量——并且，比以往任何时候都更需要注重你的网络流量。实际上，你的代码生成的网络往返次数和返回的数据包数量会对性能产生影响，因为当客户端应用程序直接连接时，到\
  \ SQL 数据库的连接是一个远程链路（意味着它很远），并且通信是加密的。\n\n你的性能调优工作应包括以下方面：\n\n*   **连接池。** 由于建立新连接本身就需要多次网络往返，并且可能影响应用程序的性能，因此你应确保在可能的情况下通过使用服务层来正确池化连接，并使用服务帐户，这样你的连接字符串就不会改变。此外，如果你建立了过多的连接，SQL\
  \ 数据库将对你进行限制。此行为由第 3 章简要讨论的拒绝服务 (`DoS`) 功能控制。\n*   **数据包计数。** 由于返回数据所需的时间比你可能习惯的要长，因此你需要关注生成过多数据包的\
  \ SQL 代码。例如，Print 语句会产生不必要的额外网络流量，应尽可能从你的 `T-SQL` 中移除。\n*   **索引。** 你可能从第 2 章还记得，如果\
  \ SQL 数据库检测到你的语句消耗了过多资源，它可能会限制你的连接。因此，在为性能进行调优时，适当的索引变得至关重要。\n*   **数据库设计。** 当然，某些数据库设计在性能上优于其他设计。高度规范化的设计提高了数据质量，但规范化程度较低的数据库通常会提高性能。在针对\
  \ SQL 数据库进行开发时，理解这种权衡也很重要。\n*   **并行数据访问。** 如果你的代码访问多个数据库（例如在分片环境中），你可能需要在代码中引入多线程，或者调整当前的并行处理方法以避免不必要的锁。\n\
  \n## 调优技术\n\n让我们深入探讨性能调优的具体细节，同时牢记你迄今为止学到的知识。本节首先探讨数据库调优功能，然后沿技术栈向上，一直到实际进行 SQL\
  \ 调用的客户端库。\n\n## 动态管理视图\n\nSQL 数据库提供了一些方便的系统视图，称为动态管理视图 (`DMVs`)，这些视图在 SQL Server\
  \ 中也可用。SQL 数据库公开了 `DMVs` 的一个子集，但所有与查询执行相关的视图都是可用的。\n\nSQL 数据库支持表 11-2 中列出的 `DMVs`。\n\
  \n### 表 11-2. 用于性能调优的动态管理视图\n\n| DMV | 说明 |\n| :--- | :--- |\n| `sys.dm_exec_connections`\
  \ | 部分支持。返回在 SQL 数据库中建立的连接列表。注意，一些有用的列（如 `client_net_address`，返回客户端计算机的 MAC 地址）不可用。\
  \ |\n| `sys.dm_exec_query_plan` | 完全支持。返回 SQL 查询或批处理的 XML 执行计划。 |\n| `sys.dm_exec_query_stats`\
  \ | 完全支持。返回缓存查询计划的聚合性能信息。 |\n| `sys.dm_exec_requests` | 完全支持。返回有关 SQL 数据库正在执行的语句的信息。\
  \ |\n| `sys.dm_exec_sessions` | 部分支持。返回当前打开的会话以及有关该会话的性能信息。但是，它不返回最后登录信息，例如 `last_successful_logon`\
  \ 列。 |\n| `sys.dm_exec_sql_text` | 完全支持。返回 SQL 批处理的文本。 |\n| `sys.dm_exec_text_query_plan`\
  \ | 完全支持。以文本格式返回 SQL 查询或批处理的执行计划。 |\n\n**注意：** 虽然连接到主数据库时可以查询其中一些视图，但除非你连接到你的应用程序正在使用的数据库，否则它们不会返回你想要的信息。\n\
  \n此外，用户必须具有 `VieW DataBaSe State` 权限才能查看数据库上所有正在执行的会话；否则，用户只能看到当前会话。\n\n如果你正在查找\
  \ SQL 语句的性能指标，并且可以将该语句隔离到唯一的数据库连接，或者该语句已不再执行，那么 `dm_exec_sessions` `DMV` 适合你。这是提供性能指标（如\
  \ CPU 时间和持续时间）的系统视图之一。但是，此 `DMV` 会在通过同一连接执行的所有语句上累积性能指标。因此，为了测试数据库查询并仅检索该查询的性能指标，你需要建立两个连接：一个用于执行查询，另一个用于读取性能指标，以免干扰\
  \ SQL 数据库已收集的性能数据。\n\n**注意：** 你需要使用相同的登录名建立两个连接，否则无法检索你尝试调优的 SQL 语句的性能指标。\n\n例如，建立一个到\
  \ SQL 数据库的连接，并运行以下 SQL 查询：\n```sql\nSELECT TOP 50 * FROM sys.indexes\n```\n记下你的会话\
  \ ID；可以在 Microsoft SQL Server Management Studio 的状态栏中找到它。你也可以在“查询”选项卡的括号内找到它。例如，在图\
  \ 11-1 中，会话 ID 是 144：你可以在选定的选项卡和底部的状态栏中看到它。\n\n### 图 11-1. 捕获语句的性能指标\n\n\n\n# 第\
  \ 11 章 ■ 性能调优\n\n接下来，打开另一个查询窗口，这将在 SQL 数据库中建立一个新的连接。运行以下查询（参见图 11-1），并确保指定要调查的会话\
  \ ID：\n\n```\nSELECT\n    login_time,\n    host_name,\n    program_name,\n    host_process_id,\n\
  \    cpu_time,\n    memory_usage,\n    total_elapsed_time,\n    reads,\n    writes,\n\
  \    logical_reads,\n    row_count,\n    original_login_name\nFROM sys.dm_exec_sessions\n\
  WHERE session_id = 176 // 替换为你的 session_id\n```\n\n此语句返回你之前 SQL 语句的重要性能指标，如表 11-3\
  \ 所述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 表 11-3. `sys.dm_exec_sessions`\
  \ 中的部分列\n\n| `指标` | 值 | 说明 |\n|----------|-------|---------|\n| `login_time` | 2010-04-22\
  \ 16:43:30.557 | 会话的登录时间。请注意，通过连接池，会话可以随时间重用。此时间代表最后一次成功登录。 |\n| `host_name` | DEVDSK01\
  \ | 建立到 SQL 数据库连接的计算机名称。 |\n| `program_name` | SSMS | 在客户端工作站上执行该语句的应用程序名称。 |\n\
  | `host_process_id` | | 在客户端工作站上执行该语句的 Windows 进程 ID（PID）。你可以在 Windows 的任务管理器中查看应用程序的\
  \ PID。 |\n| `cpu_time` | | 自连接建立以来，SQL 语句消耗的 CPU 时间（以毫秒为单位）。 |\n| `memory_usage`\
  \ | | 连接迄今为止消耗的 8KB 字节数。 |\n| `total_elapsed_time` | | 语句的持续时间（以毫秒为单位）。这包括执行语句的时间和将数据返回到客户端机器所需的时间。\
  \ |\n| `reads` | | 物理读取次数。 |\n| `writes` | | 物理写入次数。 |\n| `logical_reads` | | 逻辑读取次数。\
  \ |\n| `row_count` | | 返回的行数。 |\n| `original_login_name` | MyTestLogin | 成功连接的用户的登录名。\
  \ |\n\n此时，你需要了解一个对于性能调优非常重要的点。`cpu_time` 或许是你能用来确定 SQL 数据库中语句执行时长的最佳指标。`total_elapsed_time`\
  \ 可能会产生误导。经过时间代表 SQL 数据库（或 SQL Server）获取数据并将所有数据返回给客户端所需的时间。因此，如果你的客户端显示数据速度慢，SQL\
  \ 数据库会减慢速度以匹配客户端的速度；这种减慢是 TCP（传输控制协议）编程的函数，与 SQL 数据库无关。因此，`total_elapsed_time` 显示的是执行语句以及客户端完成数据获取所需的总时间。`total_elapsed_time`\
  \ 与 SQL Profiler 返回的持续时间度量相同；请注意，如果你发送的是包含多个请求的批处理，`total_elapsed_time` 是所有单独执行时间的总和。\n\
  \n## 连接池\n\n本章前面提到，连接池是性能的一个重要考虑因素。虽然在数据库编程领域这一说法通常是准确的，但对于 SQL 数据库来说，它变得至关重要。\n\
  \n设计不佳的应用程序可能会创建过多的连接请求，最终可能淹没 SQL 数据库。\n\n如果建立了过多的连接请求，你的连接可能会被**限制**，这意味着在一段时间内你将无法再连接。\n\
  \n你应该知道，如果连接字符串的任何部分发生更改（即使是很小的更改），例如应用程序名称或登录 ID（UID），连接池都会受到影响。即使你更改连接字符串参数的顺序，也会创建一个新的连接池。例如，如果你有一个执行三个数据库操作的应用程序\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 164](img/index-227_1.jpg)\n\
  \n![Image 165](img/index-227_2.png)\n\n![Image 166](img/index-227_3.png)\n\n第 11\
  \ 章 ■ 性能调优\n\n\n\n### 使用相同的连接字符串\n\noperations，并且这些操作使用以下连接字符串，分别创建了三个连接池，因此在同一个\
  \ SQL 数据库中建立了三个不同的数据库连接：`Server=XYZ;Initial Catalog=DB1;UID=hroggero;PWD=123456`\n\
  \n`Server=XYZ;Initial Catalog=DB1;PWD=123456;UID=hroggero`\n\n`Server=XYZ;Initial\
  \ Catalog=DB1;UID=hroggero;PWD=123456;Application Name=MyApp`\n\n要确保使用相同的数据库连接，必须确保这三个操作使用完全相同的连接字符串：\n\
  \n`Server=XYZ;Initial Catalog=DB1;UID=hroggero;PWD=123456`\n\n`Server=XYZ;Initial\
  \ Catalog=DB1;UID=hroggero;PWD=123456`\n\n`Server=XYZ;Initial Catalog=DB1;UID=hroggero;PWD=123456`\n\
  \n要测量给定数据库上打开的数据库连接数，可以使用 `sys.dm_exec_connections` 管理视图。每个不同的数据库连接都会返回一行；行数越少越好！\n\
  \n### 使用 SSMS 执行计划\n\n有时你需要深入了解 SQL 数据库如何获取数据，然后利用这些信息来改进性能。在 SQL Server 中，你还可以使用执行计划来观察底层硬件更改（例如更改内存配置）的影响。虽然你无法控制\
  \ SQL 数据库的配置设置，但执行计划对于查看索引的影响以及了解正在使用哪些物理运算符仍然非常有用。\n\nSQL 语句中使用逻辑运算符（如 `LEFT JOIN`），而物理运算符则告诉你\
  \ SQL 数据库正在使用哪种技术来解决给定的逻辑操作或获取额外数据。SQL 数据库用于表示 `JOIN` 操作的最常见物理运算符如表 11-4. 所示。\n\n\
  **表 11-4.** 物理 `JOIN` 运算符\n\n| 运算符 | SSMS 符号 | 说明 |\n| :--- | :--- | :--- |\n| 嵌套循环\
  \ |  | 在 SQL 数据库中执行循环以检索数据。对于表 1 中符合`WHERE`子句的每条记录，在表 2 中查找匹配记录。在大型记录集上，循环的成本可能很高。\
  \ |\n| 哈希匹配 |  | 为参与`JOIN`的每个表中的每条记录计算哈希值，并比较哈希值是否相等。 |\n| 合并 |  | 合并运算符通常是最快的运算符，因为它们利用数据存储或检索的顺序，对涉及的表执行单次扫描。\
  \ |\n\n你可以给 SQL 数据库某些提示来使用特定的物理运算符，但通常不建议这样做。你有三种适当的方法来影响 SQL 数据库选择有效的物理运算符：\n\n\
  *   **审查你的 `WHERE` 子句。** 这也许是性能调整中最被忽视的方面。当你有选择时，对行数最多的表应用 `WHERE` 子句会为索引提供新的机会。\n\
  *   **优化你的数据库设计。** 高度规范化的数据库迫使你创建更多的 `JOIN` 语句。当然，`JOIN` 语句越多，你需要做的调整就越多。虽然你不一定要将表设计成第一范式，但对某些表进行反规范化可以提供性能优势。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 167](img/index-228_1.png)\n\
  \n第 11 章 ■ 性能调整\n\n*   **创建更好的索引。** 拥有良好的索引策略非常重要。列的顺序和列的数量会对 SQL 数据库产生巨大影响。本章稍后将回顾索引。\n\
  \n■ **注意** 要运行以下示例，你需要执行本书下载页面上提供的 `tuning.sql` 脚本。它创建了几个带有测试数据的示例表。运行此脚本时，请确保选择了一个用户数据库。\n\
  \n为了显示选择了哪些物理 `JOIN` 运算符，执行计划提供了对正在处理的数据量以及某些操作的相对成本的洞察。例如，执行以下 SQL 语句（在运行 `tuning.sql`\
  \ 脚本后）：\n\n```sql\nSELECT T.Name, T.UserType\nFROM TestUsers T INNER JOIN TestUserType\
  \ UT\n```\n\n\n# 第 11 章 - 性能调优\n\nON `T.UserType` = `UT.UserType`\n\nWHERE `T.AgeGroup`\
  \ > 0 AND `UT.UserTypeKey` = 'Manager'\n\n此语句返回 25 行。要查看执行计划，你需要在运行语句前请求它。\n\n只需在\
  \ SQL Server Management Studio 中按下`Ctrl + M`，或从菜单中选择`查询 ➤ 包含实际执行计划`，然后重新运行 SQL 语句。现在你应该能看到一个`执行计划`选项卡。点击该选项卡，即可看到与图\
  \ 11-2 所示类似的输出。\n\n**图 11-2.** 未经调优的示例执行计划\n\n为了完全理解前面的执行计划，让我们回顾一下执行计划中常见的其他符号。表\
  \ 11-5 展示了 SSMS 提供的一些具有明确性能影响的符号。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 168](img/index-229_1.png)\n\n![Image 169](img/index-229_2.png)\n\n![Image\
  \ 170](img/index-229_3.png)\n\n![Image 171](img/index-229_4.png)\n\n![Image 172](img/index-229_5.png)\n\
  \n![Image 173](img/index-229_6.png)\n\n**表 11-5.** 查找、索引扫描和索引查找操作符\n\n| 操作符 | SSMS\
  \ 符号 | 说明 |\n| :--- | :--- | :--- |\n| 查找 | ![Image](img/...) | 当语句返回数千行且每一行都需要一次查找时，查找操作的代价可能很高。如果确定查找代价高昂，请考虑创建覆盖索引。\
  \ |\n| 索引扫描 | ![Image](img/...) | 索引或聚集索引扫描可能是一件坏事，也可能不是。*扫描*意味着 SQL 数据库按顺序读取索引中的所有记录。如果只返回被扫描记录的一小部分，那么扫描对性能是不利的，这种情况下就需要索引。但如果你想返回表中的所有记录，则扫描是必要的。\
  \ |\n| 索引查找 | ![Image](img/...) | 索引或聚集索引*查找*意味着可以快速找到与查询匹配的第一条记录，而无需扫描。 |\n\n执行计划还可以显示许多其他具有特定含义的符号，包括查询正在使用多个处理器等提示。\n\
  \n由于基础表上未定义任何索引（除了必需的聚集索引），且图 11-2 中的执行计划显示了两个聚集索引扫描（在这种情况下等同于表扫描），因此你存在潜在的性能问题。`INNER\
  \ JOIN`逻辑操作符是使用`哈希匹配`物理操作符执行的。你可以看到一条更粗的线进入哈希匹配操作符；将光标悬停在这条线上会显示`JOIN`操作消耗了 50 条记录（见图\
  \ 11-3）。此外，你可以看到两个表都使用了聚集索引扫描来获取数据。最后，请注意哈希匹配操作消耗了整个语句 73%的资源；这意味着`JOIN`记录比读取数据花费了更多时间。\n\
  \n**图 11-3.** 验证`JOIN`操作符消耗了多少条记录\n\n总而言之，你一直在处理的语句存在三个潜在问题：\n\n- **索引扫描。** 两个表都执行了索引扫描，可能导致不必要的读取。\n\
  - **繁重的操作符处理。** `哈希匹配`操作消耗了大部分处理时间。\n- **读取的记录数多于返回的记录数。** 从图 11-3 可以看出，该语句处理了 50\
  \ 条记录，但只返回了 25 条。这可能暗示你读取了比实际需要更多的记录。然而，这本身并不总是问题——只是需要留意。\n\n> **注意：** 对于熟悉堆表的用户，SQL\
  \ 数据库不允许使用堆表。如果你打算向表中插入记录，则必须在该表上定义聚集索引。\n\n你很快就会看到索引如何帮助你调优此语句。但在结束执行计划这个话题之前，熟悉另外几点很重要：\n\
  \n- **相对查询成本。** 注意图 11-2 中窗口顶部附近显示的查询成本。这是与作为一批执行的所有其他语句相比的相对度量。在此示例中，该值为 100%，因为它是唯一的语句。然而，你应该知道，这个值可能会产生误导。它是由\
  \ SQL Server Management Studio 根据估计成本动态计算的，而非实际成本。因此，这个值很少准确。\n- **高级调用。** 某些操作，如\
  \ XML 调用和在 SQL 语句中使用函数，在执行计划中通常被错误表示；因此，SQL 数据库（甚至 SQL Server）可能为这些操作返回 1%的成本，而实际成本可能高得多。这可能会在调优\
  \ SQL 语句时将你引向错误的方向。\n- **丢弃输出。** 如前所述，持续时间（由`sys.dm_exec_sessions`测量）包括显示时间，这适用于\
  \ SQL Server Management Studio。为了最小化显示数据所需的时间，你可以通过检查`查询 ➤ 查询选项`中的必要设置来禁用输出。相同的选项出现在两个地方：`网格结果`和`文本结果`。图\
  \ 11-4 展示了如何禁用`网格`显示的输出。\n\n**图 11-4.** 在 SQL Server Management Studio 中禁用输出\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 175](img/index-231_1.png)\n\
  \n### 使用管理门户查看执行计划\n\n你还应注意，SQL 数据库管理门户允许你查看执行计划；但是，表示逻辑操作的符号和提供的功能有所不同。\n\n例如，显示区域会根据缩放级别而变化，缩小时会显示简化视图，使你能够非常快速地发现问题区域。图\
  \ 11-5 显示，T-SQL 语句在其`索引查找`操作上消耗了最多的资源（总成本）。\n\n**图 11-5.** 使用 SQL 数据库管理门户查看执行计划\n\
  \n你可能已经意识到，`索引查找`符号与 SSMS 显示的不同。尽管这些符号非常简洁且很大程度上是自描述的，但在调优某些 T-SQL 操作时可能会觉得更困难一些，因为有些符号被简化了。例如，`非聚集索引查找`和`聚集索引查找`操作在管理门户中被合并为一个符号。然而，如果你放大足够多，你会看到符号下方有该操作的描述，清楚地标识出所表示的操作，如图\
  \ 11-7 所示。\n\n点击其中一个符号将提供额外的详细信息，如图 11-6 所示，与你在 SSMS 中看到的类似。点击`查看更多`按钮将显示有关该操作的大量信息。要关闭详细窗口，只需点击执行计划区域中的空白区域即可。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 176](img/index-232_1.png)\n\
  \n**图 11-6.** 查看操作详情\n\n你会发现 SQL 数据库的管理门户包含一些有趣的选项，例如能够按总资源消耗、CPU 或 I/O 对批处理语句进行排序。你还可以通过选择左侧的相应图标快速定位某些操作，如警告和扫描。你还可以通过点击右上角的图标，将执行计划的显示切换为简单列表或嵌套列表，而无需重新运行\
  \ T-SQL。\n\n\n# 第 11 章：性能调优\n\n## 通过管理门户查看查询性能\n\n语句。图 11-7 显示了与图 11-5 相同的执行计划，按\
  \ CPU 排序并完全放大；它显示`聚簇索引扫描`是服务器上消耗 CPU 资源最多的操作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 177](img/index-233_1.jpg)\n![Image 178](img/index-233_2.png)\n\n**图 11-7.**\
  \ 按 CPU 排序执行计划\n\n管理门户上另一个便捷的界面是`查询性能`摘要页面。要访问此页面，只需单击数据库并选择`查询性能`。您将看到一个查询列表，其中包含一些重要指标，如`CPU\
  \ 毫秒/秒`、`持续时间 毫秒/秒`等，如图 11-8 所示。您可以通过单击列标题对列表进行排序。\n\n**图 11-8.** 查询性能摘要屏幕\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 179](img/index-234_1.png)\n\n如果您点击某个查询，将会出现另一个显示更多详细信息的屏幕，如图 11-9 所示；这些指标主要来自`sys.dm_exec_query_stats`动态管理视图。\n\
  \n**图 11-9.** 查询性能详细信息屏幕\n\n如果您以前使用过`sys.dm_exec_query_stats`视图，您会知道它包含重要的性能指标，但不会为您存储这些信息；此视图仅显示当前信息。因此，请务必在遇到性能问题后不久（几分钟内）检查`查询性能`屏幕。\n\
  \n# 索引\n\n创建正确的索引可能很复杂；要完全理解索引并微调数据库查询可能需要很长时间。关于索引要记住的最重要的事情之一是，其主要目的是帮助`SQL 数据库`快速找到所需的数据。与`SSMS`类似，`SQL\
  \ 数据库管理门户`在检测到缺失索引时会提供提示。虽然这些提示可能很有用，但理解索引背后的逻辑仍然很重要，这样您才能优化数据库的性能。\n\n索引就像包含主表子集的较小表。权衡之处在于，索引会消耗空间，并且必须在主数据更改时由`SQL\
  \ 数据库`引擎进行维护，这在某些情况下可能会影响性能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n让我们快速回顾一下创建索引的简化语法：\n\n```\nCREATE INDEX [index_name] ON [table_name]\n(col1,\
  \ col2...)\nINCLUDE (col3, col4...)\n```\n\n尽管创建索引很简单，但重要的是要验证`SQL 数据库`是否正在使用它，以及它是否达到了预期效果。继续前面的例子（来自图\
  \ 11-2），您可以在`TestUsers`表上创建一个索引。但首先，让我们退一步，回顾一下关于该表和您希望优化的语句的几个要点。\n\n重要的是要认识到，索引第一部分中包含的列在索引中搜索数据和连接表时被用作键。并且由于允许多个列作为键的一部分，它们的顺序绝对至关重要！有时，您会选择`WHERE`子句中首先包含的列，然后是`JOIN`部分中的列。然而，您可能会发现，有时最好从`JOIN`列开始；这取决于您的语句和手头的数据。您需要尝试两种方法来确定哪种方法适合您。接下来是`CREATE\
  \ INDEX`命令的`INCLUDE`部分中的列；这些列出现在这里只有一个原因：它们有助于避免为`SELECT`子句所需的数据而对主表进行查找。\n\n执行查找并不总是性能问题，但如果您在大批量记录中进行查找操作，它可能会成为问题。\n\
  \n\n\n■ ## **注意** 一个包含服务查询所需所有列的索引被称为 `覆盖索引`。\n\n如果你分析之前的 `SELECT` 查询，你会得到 `TestUsers`\
  \ 表中属于以下列表的列（按在索引中出现的顺序排列）：\n\n• `WHERE`：包含来自 `TestUsers` 的 `AgeGroup` 字段。\n\n•\
  \ `JOIN`：包含来自 `TestUsers` 的 `UserType` 字段。\n\n• `SELECT`：包含 `Name` 和 `UserType`\
  \ 字段。`UserType` 列已是 `JOIN` 子句的一部分；无需重复计算。\n\n让我们首先创建一个如下所示的索引：\n\n```\nCREATE INDEX\
  \ idx_testusers_001 ON TestUsers\n(AgeGroup, UserType)\nINCLUDE (Name)\n```\n\n\
  现在运行该语句，会得到如图 11-10 所示的执行计划。这是一个比图 11-2 b 更好的计划，因为 SQL 数据库正在执行索引查找而不是索引扫描。使用索引查找意味着\
  \ SQL 数据库能够非常快速地定位语句所需的第一条记录。然而，你仍然在 `TestUserType` 表上有一个索引扫描。让我们来修复它。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 180](img/index-236_1.png)\n\n![Image 181](img/index-236_2.png)\n\n# 第\
  \ 11 章 ■ 性能调优\n\n**图 11-10.** 在 `TestUsers` 表上添加索引的效果\n\n为了消除 `TestUserType` 上的索引扫描，你可以按照之前的指导方针添加另一个索引。因为\
  \ `SELECT` 子句中不需要任何列，所以你可以省略 `INCLUDE` 部分。索引如下：\n\n```\nCREATE INDEX idx_testusertype_001\
  \ ON TestUserType\n(UserTypeKey, UserType)\n```\n\n■ ## **注意** 尽管影响很小，但在生产系统中添加新索引存在风险。某些例程，特别是批处理程序，通常依赖于数据的正确排序来计算累计总和或执行特定任务。如果为了运行查询而优先使用某个索引，则有可能使用新索引，这可能会改变数据返回的顺序。如果你的所有语句都包含\
  \ `ORDER BY` 子句，那么这个问题就不会影响你。但是，如果你的某些程序依赖于记录的自然顺序，请务必小心！另外，请记住，添加索引会因增加开销而对性能产生负面影响。\n\
  \n你的执行计划现在应该如图 11-11 所示。请注意，物理运算符已更改为循环。还要注意，查询的成本已经从 `JOIN` 运算符转移：计划中最高的相对成本（76%）花费在从\
  \ `TestUserType` 索引读取数据上。\n\n**图 11-11.** 索引对物理运算符的影响\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 182](img/index-237_1.png)\n\n第 11 章 ■ 性能调优\n\n但是调优练习还没有结束。如果你将光标悬停在 `TestUserType_001`\
  \ 索引上，你会看到该循环在该索引上执行了 50 次查找（索引查找）（在图 11-12 中查找 `执行次数`）！这并不理想，但可能比没有索引要好，因为 SQL\
  \ 数据库选择了这个新的执行计划。\n\n**图 11-12.** 操作的执行次数\n\n为了减少查找次数，你可以通过创建新索引来更改字段的顺序。让我们运行这个语句：\n\
  \n```\nCREATE INDEX idx_testusers_002 ON TestUsers\n(UserType, AgeGroup) INCLUDE\
  \ (Name)\n```\n\n■ ## **注意** 你可以更改之前创建的索引，而不是创建新的索引。然而，在对数据库性能问题进行故障排除时，了解 SQL 数据库查询引擎的行为非常重要；SQL\
  \ 数据库会选择它认为最有效的索引。所以，尽管去创建——根据需要创建任意多的索引，直到你得到一个良好的执行计划，然后在完成后清理掉不必要的索引。\n\n如果你再次运行该语句，你会看到一个接近图\
  \ 11-13 的结果。执行计划现在是均衡的了。\n\n\n# 第 11 章 ■ 性能调优\n\n两张表的数据搜索几乎完全相同（`49%`），两者都有查找操作；执行次数均为`1`；循环操作的成本极低（`2%`），因为实际上并未发生真正的循环。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 183](img/index-238_1.png)\n\
  \n## 图 11-13. 良好的执行计划\n\n如果你注意`实际行数`的值，你会发现这条语句只从基础表中获取了`25`条记录，而非`50`条；这随着时间的推移减少了磁盘读取。\n\
  \n最后但同样重要的是，如果你从设计的角度审视这个`SELECT`语句，你可能会问`UserTypeKey`值是否应该是唯一的。表模式在该字段上并未定义唯一索引，但它是否应该有？是否只允许存在一种`Manager`用户类型？如果答案是肯定的，那么你就知道`TestUserType`表对于`Manager`用户类型将始终只返回单条记录，这种情况下，你或许可以完全移除`JOIN`，并直接在`TestUsers`表上应用`WHERE`子句：\n\
  \n```sql\nSELECT T.Name, T.UserType\nFROM TestUsers T\nWHERE T.AgeGroup > 0 AND\
  \ T.UserType = 1\n```\n\n这条语句不仅简单得多，而且执行计划变得非常直接，这意味着 SQL Database 无需花费太多时间进行优化即可处理该请求。这一变更意味着你将过滤操作从一个记录很少的表（`TestUserType`中只有`3`条）移动到了一个记录很多的表（`TestUsers`中有`100`条）。无论何时你有这样的移动选项，你都应该执行它。这样，SQL\
  \ Database 消耗的资源要少得多。当然，这种移动并非总是可行，但你需要知道在开始调优之前，拥有一个合理的数据库设计的重要性。\n\n**注意**\n性能调优可能很有趣。然而，如果你不为自己设定性能目标，可能会陷入永远调优的困境。\n\
  \n### 索引视图\n\n当你绝对需要`JOIN`数据，而传统索引无法提供你所追求的性能时，索引视图是一个绝佳的替代方案。索引视图的行为类似于表；其覆盖的数据被具体化到磁盘上，以便快速检索。在急于使用索引视图之前，请理解它们存在某些限制，并且由于其特性，你可能会在常规的`Insert`、`Delete`和`Update`语句中遭受性能损失。\n\
  \n以上述语句为例，让我们看看如何创建一个索引视图来支持`JOIN`操作。\n\n首先，创建一个包含你想要调优的语句的视图。确保你在`SELECT`子句中包含了所有需要的列：\n\
  \n```sql\nCREATE VIEW vTestUsersType WITH SCHEMABINDING AS\nSELECT T.Name, T.UserType,\
  \ T.AgeGroup, UT.UserTypeKey\nFROM dbo.TestUsers T INNER JOIN dbo.TestUserType UT\
  \ ON\nT.UserType = UT.UserType\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 184](img/index-239_1.png)\n\n## 图 11-14. 索引视图示例\n\n接下来，在该视图上创建唯一的聚集索引：\n\n\
  ```sql\nCREATE UNIQUE CLUSTERED INDEX IDX_VIEW_TestUsers\nON vTestUsersType\n(UserTypeKey,\
  \ AgeGroup, Name, UserType)\n```\n\n大功告成。当你再次运行该语句时，你会看到一个如图 11-14 所示的漂亮执行计划。\n\n\
  由于该视图包含了所有必要的列，并且聚集索引包含了视图的所有列，你便获得了除缓存之外最快的数据检索技术。\n\n## 存储过程\n\n你已经看到了多种调优语句和改进执行计划的方法。然而，请记住，你还可以使用存储过程。\n\
  \n如果你需要执行涉及大量数据的逻辑，存储过程可以给你带来优势。因为你知道在 SQL Database 中返回大量数据会导致性能问题，你可以将需要数据的业务逻辑放入存储过程中，并让该过程返回一个状态码。由于不按\
  \ CPU 时间收费，这便成了一个经济实惠的选择。\n\n存储过程也可以作为一种安全工具，允许你通过一个过程代理对基础表的调用，而永不允许直接访问这些表。\n\n\
  想象一下，你需要计算某个商品的成本；然而，为了计算成本，你必须循环获取某些值并执行高级操作。你可以从应用程序中调用并在应用程序代码中计算成本，如下所示：\n\n\
  ```csharp\nfloat cost = 0.0; // 总成本\nint id = 15; // 产品类别\nstring sql = \"SELECT\
  \ * FROM category WHERE catergoryId = \" + id.ToString();\nSqlConnection conn =\
  \ new SqlConnection(connString);\nSqlCommand cmd = new SqlCommand(sql, conn);\n\
  cmd.CommandType = CommandType.Text;\nconn.Open();\nSqlDataReader dr = cmd.ExecuteReader();\n\
  try\n{\n    while (dr.Read())\n    {\n        cost += 0.25 * ...; // 计算逻辑在此\n  \
  \  }\n}\nfinally\n{\n    dr.Close();\n    conn.Close();\n}\n```\n\n或者，你可以在存储过程中计算成本，并将之前的代码改为调用该存储过程：\n\
  \n```csharp\nfloat cost = 0.0; // 总成本\nint id = 15; // 产品类别\nstring sql = \"proc_CalculateCost\"\
  ;\nSqlConnection conn = new SqlConnection(connString);\nSqlCommand cmd = new SqlCommand(sql,\
  \ conn);\ncmd.Parameters.Add(new SqlParameter(\"categoryId\", SqlDbType.Float);\n\
  cmd.Parameters[0].Value = id;\ncmd.CommandType = CommandType.StoredProcedure;\n\
  conn.Open();\nSqlDataReader dr = cmd.ExecuteReader();\ntry\n{\n    if (dr.Read())\n\
  \        cost = (float)dr[0];\n}\nfinally\n{\n    dr.Close();\n    conn.Close();\n\
  }\n```\n\n存储过程的代码大致如下：\n\n```sql\nCREATE PROC proc_CalculateCost\n    @categoryId\
  \ int\nAS\n    DECLARE @i int\n    DECLARE @cost float\n    SET @cost = 0.0\n  \
  \  SET @i = (SELECT count(*) FROM category WHERE ID = @categoryId)\n    WHILE (@i\
  \ > 0)\n    BEGIN\n        SET @cost = @cost + 0.25*(SELECT Min(dollars) FROM ...)\n\
  \        SET @i = @i - 1\n    END\n    SELECT @cost\n```\n\n调用存储过程的优势在于，你无需通过互联网获取必要的记录来计算成本数值。存储过程在数据所在的位置运行，在此情况下仅返回一个值。\n\
  \n## 提供程序统计信息\n\n让我们看看 ADO.NET 库的性能指标，以便从性能角度获取该库的观点。该库不返回 CPU 指标或任何其他 SQL Database\
  \ 指标；然而，当你在调优应用程序时，它可以提供额外的洞察，例如告诉你到数据库的往返次数和传输的数据包数量。\n\n如前所述，数据库调用返回的数据包数量变得越来越重要，因为它会影响应用程序的整体响应时间。如果你将针对普通\
  \ `SQL Server` 安装运行一条 `SQL` 语句所返回的数据包数量，与针对 `SQL Database` 运行相同语句所返回的数据包数量进行比较，很可能会发现针对\
  \ `SQL Database` 返回的数据包更多，因为数据使用 `SSL` 进行了加密。这在大多数情况下可能不是大问题，但如果你返回大型记录集，或者每条记录包含大型列（例如存储\
  \ `PDF` 文档的 `varbinary` 列），则会严重影响应用程序的性能。\n\n获取 ADO.NET 库的性能指标相当简单，但需要编码。在 `SqlConnection`\
  \ 对象上使用的方法是 `ResetStatistics()` 和 `RetrieveStatistics()`。此外，请记住 `EnableStatistics`\
  \ 属性需要设置为 `true`。一些最值得查看的有趣指标是 `BuffersReceived` 和 `BytesReceived`；它们指示已产生的网络流量大小。\n\
  \n你还可以从 CodePlex 下载一个名为 Enzo SQL Baseline 的开源项目，它提供了 SQL\n\n\n数据库与提供程序统计指标（[`EnzoSQLBaseline.CodePlex.Com`](http://EnzoSQLBaseline.CodePlex.Com)）。该工具允许你并排比较多次执行结果，并查看哪次运行最为高效。图\
  \ 11-15 显示，最近一次执行通过网络返回了 624 字节。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 185](img/index-242_1.png)\n\n## 第 11 章 ■ 性能调优\n\n***图 11-15.** 在 Enzo SQL\
  \ Baseline 中查看性能指标*\n\n■ **注意** 若你想查看使用 `ADO.NET` 提供程序统计信息的代码示例，请访问\n\n[`msdn.microsoft.com/en-us/library/7h2ahss8.aspx`](http://msdn.microsoft.com/en-us/library/7h2ahss8.aspx)。\n\
  \n### 应用程序设计\n\n最后但同样重要的是，设计选择会对应用程序的响应时间产生显著影响。某些编码技术可能对性能产生负面影响，例如过多的往返通信。尽管在本地数据库上运行应用程序时，这可能并不明显，但在针对\
  \ SQL Database 运行时，可能会变得无法接受。\n\n以下编码选择可能会影响应用程序的性能：\n\n-   **过于频繁的设计。** 如前所述，过于频繁的应用程序会使用过多的数据库往返通信，从而造成显著的性能下降。过于频繁设计的一个例子包括：创建一个编程循环，反复调用数据库来执行\
  \ SQL 语句。\n-   **规范化。** 人们普遍认为，虽然高度规范化的数据库减少了数据重复，但由于需要包含大量的 `JOIN` 操作，通常也会导致性能下降。因此，过度的规范化可能成为性能问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 11 章 ■ 性能调优\n\n-   **连接释放。**\
  \ 一般来说，应尽可能晚地打开数据库连接，并尽快显式关闭它。当你有大量连接请求时，这样做能提高你快速重用池中数据库连接的几率。实际上，连接在关闭时即从池中释放。如果你未能足够快地释放连接，可能会造成连接请求排队等待，直到池中有连接可用；或者如果等待时间过长，连接请求会超时。\n\
  -   **共享数据库帐户。** 由于 SQL Database 要求数据库登录，你需要使用共享的数据库帐户来检索数据，而不是使用每个用户独立的登录帐户。使用每个用户独立的登录帐户会禁止使用连接池，并可能显著降低性能，甚至因资源调控而导致数据库无法使用。\n\
  \n还有许多其他应用程序设计考虑因素，但此处列出的几点对于针对 SQL Database 编程最为适用。欲了解更多信息，请阅读 Microsoft 模式与实践部门的以下章节：\n\
  \n[`msdn.microsoft.com/en-us/library/ff647768.aspx`](http://msdn.microsoft.com/en-us/library/ff647768.aspx)。\n\
  \n# 小结\n\n本章概述了一些可用于解决 SQL Database 性能问题的最重要调优技术。正如你所看到的，故障排除和调优语句可能很复杂，需要使用各种工具和方法来获得期望的结果。你了解了几个动态管理视图和执行计划，快速浏览了索引，并简要提及了由\
  \ `ADO.NET` 库提供的统计信息。\n\n你还了解了一些可能影响应用程序性能的设计考量。\n\n你可以在 Microsoft 网站上发现更多技术和概念：\n\
  \n[`msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx`](http://msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx)。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## **第 12 章**\n\n## **Windows\
  \ Azure 移动服务**\n\n自本书第一版于 2010 年发布以来，SQL Azure OData 服务已被移除。这并非坏事。OData 依然存在，你仍然可以搭建一个\
  \ WCF 数据服务并通过 OData 协议进行通信。\n\n事实上，如果你使用 `WCF Data Services`，那么你很可能就是在使用 `OData`。`WCF\
  \ Data Services` 支持 `OData` 协议，该协议允许你将数据作为资源可通过 `URI` 定址的源公开。`OData` 允许你从多种来源公开数据，范围从\
  \ Microsoft Excel 到网站，而不仅仅是关系数据库。\n\n创建公开 `OData` 源的数据服务实际上归结为三个简单的基本步骤：\n1.  **定义模型：**\
  \ `WCF Data Services` 原生支持基于 `ADO.NET Entity Framework` 的模型。\n2.  **创建数据服务：** 定义一个继承自\
  \ `DataService` 类的数据服务。\n3.  **配置数据服务：** 配置对资源（如表）和服务操作的访问权限，并定义服务范围的行为。`WCF Data\
  \ Services` 默认禁用对实体容器所公开资源的访问。\n\n然而，本章内容并非关于 `WCF Data Services` 或 `OData`。Windows\
  \ Azure SQL Database（又名 SQL Azure）并不像在 SQL Azure 实验室的 OData 服务时期那样原生支持 `OData`。相反，在\
  \ 2012 年 8 月下旬，微软发布了（预览版）Windows Azure 移动服务。\n\nWindows Azure 移动服务专为让开发者能够快速、轻松地将客户端应用程序连接到运行在\
  \ Windows Azure 上的云后端而设计，无论客户端运行在何种平台（如 Windows 8 设备、Android 平板电脑或 iOS）。\n\nWindows\
  \ Azure 移动服务的妙处在于，它通过为构建丰富的客户端体验提供基础，使你能够极其快速地启动和运行。正如你将在本章中看到的，Windows Azure 移动服务允许你非常快速地连接你的应用程序。\n\
  \n■ **注意** 请注意，此处的描述基于预览版的 Windows Azure 移动服务，意味着在撰写本文时它尚未正式发布，一些细节在实际发布时可能会有所变化。\n\
  \n## 入门\n\n要使用 Windows Azure 移动服务，你需要一个 Windows Azure 帐户。第 1 章解释了如何注册帐户，因此此处不再赘述。使用\
  \ Windows Azure 移动服务非常简单，只需导航到 Windows Azure 管理门户 [`manage.WindowsAzure.com`](https://manage.WindowsAzure.com)。一旦你使用\
  \ Live ID 登录，你会在导航窗格中注意到一个名为“移动服务”的新选项卡，如图 12-1 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 186](img/index-245_1.jpg)\n\n## 第 12 章 ■ Windows Azure 移动服务\n\n***图 12-1.**\
  \ 导航窗格上的移动服务选项*\n\n创建一个新的 Windows Azure 移动服务非常简单：在导航窗格中选择“移动服务”选项卡，选择门户底部的“新建”按钮，最后选择“创建”以调出“新建移动服务”向导，如图\
  \ 12-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 187](img/index-246_1.png)\n\
  \n## 第 12 章 ■ Windows Azure 移动服务\n\n***图 12-2.** “新建移动服务”向导的第 1 页*\n\n“新建移动服务”向导的第一页要求你提供服务的名称。如你所见，服务名称实际上就是应用程序将要访问的\
  \ `URL`。你不需要指定完整的 `URL`，只需提供名称。\n\n如图 12-2 所示，我只需提供一个名称。服务将为我补全 `URL` 的剩余部分。\n\n\
  \n\n# 第 12 章：Windows Azure 移动服务\n\n## 选择数据库\n\n接下来，你需要选择是使用现有的 Windows Azure SQL\
  \ 数据库实例，还是创建一个新的数据库实例。在此示例中，我选择了创建新数据库。因此，我选择了`新建 SQL 数据库`选项，并指定了希望数据库创建的区域。\n\n\
  ### 指定数据库设置\n\n`新建移动服务`向导的第二页要求你为新数据库命名。在此情况下，由于我选择了在美国东部区域创建数据库，该对话框搜索并发现我在该区域有一个\
  \ SQL 数据库服务器，并将其列在`服务器`下拉列表中。我只需填写登录名和密码，如图 12-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 188](img/index-247_1.png)\n\n![Image 189](img/index-247_2.png)\n\n***图\
  \ 12-3.** 新建移动服务向导的第 2 页*\n\n你可以选择`配置高级数据库设置`选项（如图 12-3 所示），该选项将显示“高级数据库设置”页面，你可以在其中选择数据库`版本`（Web\
  \ 版或商业版）、数据库大小和排序规则。如果你倾向于接受默认的高级设置，即 1GB Web 版数据库和 `SQL_Latin1_General_CP1_CI_AS`\
  \ 排序规则设置，只需在“高级数据库设置”页面上点击`确定`（对勾）。\n\n### 预配移动服务\n\n在“指定数据库设置”页面填写完所有信息后，点击`确定`。随后，将在\
  \ Windows Azure 上预配一个新的 Windows Azure 移动服务，在 Windows Azure SQL 数据库中创建一个新的数据存储（因此需要在向导中输入数据库信息），该存储允许你保存应用程序所需的任何类型的数据。接下来，它将创建一系列\
  \ REST 服务终结点，应用程序可调用这些终结点来执行保存数据、执行推送通知和安全登录等任务。\n\n移动服务的创建过程只需片刻，完成后，新服务将列在门户中，如图\
  \ 12-4 所示。该服务现在已运行于 Windows Azure 中，并可供使用。图 12-4 显示了移动服务名称和状态列，但在右侧第四列是服务的 URL。\n\
  \n点击此 URL 将打开一个新的浏览器标签页，显示页面提示 Windows Azure 移动服务已启动并正在运行。\n\n***图 12-4.** 在门户中选择新的移动服务*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 190](img/index-248_1.png)\n\
  \n## 开始使用服务\n\n创建服务仅仅是个开始，但正如前面提到的，它确实不会变得太难。下一步是创建一个与该服务通信的应用程序，幸运的是，我们为此也不需要做太多工作。\n\
  \n回到 Windows Azure 管理门户，点击图 12-4 中突出显示的服务名称，这将带我们进入预览门户中常见的熟悉仪表板。该仪表板提供了一种快速入门体验，在你使用其他\
  \ Windows Azure 服务（如网站和数据库）时也会看到。\n\n点击服务名称链接将带您进入快速入门的`入门`页面，如图 12-5 所示。此页面提供了两个简单的演练示例；一个向你展示如何将现有应用程序连接到移动服务，另一个则引导你如何从头开始创建新的应用程序。如图\
  \ 12-5 所示，此示例将使用`创建新的 Windows Store 应用`选项。\n\n***图 12-5.** 创建新的 Windows 8 应用程序*\n\
  \n### 连接现有应用程序\n\n如果你已有现成的应用程序，连接它真的没那么难。选择`连接现有的 Windows Store 应用`选项，系统会要求你选择开发语言，然后只需将几行代码复制并粘贴到现有应用程序中；这样做即可访问移动服务\
  \ SDK 来执行上述任务（保存数据、推送通知等）。\n\n### 创建新应用程序\n\n对于本练习，请选择`创建新的 Windows Store 应用`，它提供了一个三步演练来构建新应用程序。步骤\
  \ 1 要求你下载 Visual Studio 和移动服务 SDK。如果你尚未下载 Visual Studio，该链接将带你转到相应的页面下载 Visual Studio\
  \ 2012 Express。如果你已安装 Visual Studio 2012，请点击第二个链接，它将安装移动服务 SDK。\n\n## 创建表\n\n一旦所有合适的工具安装完毕，下一步就是创建必要的表。表可以在任何时候添加，本章稍后将对此进行介绍。表用于存储你的移动服务应用程序所需的数据。你可以创建任意数量的表，这些表将存储在\
  \ Windows Azure SQL 数据库中，即在移动服务预配期间指定的数据库实例中（在我们的 ScottsToDoList 示例中，这是图 12-3 所示的\
  \ `MyMobileToDoList` 数据库实例）。尽管使用 SQL 数据库作为数据存储，但这些表可以拥有的架构实际上相当灵活。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
