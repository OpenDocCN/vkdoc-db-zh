- '# 第 3 章


  ### 安全性


  与大多数公司的其他系统相比，数据库环境可能是安全性方面最薄弱的环节，但银行等少数行业除外。原因是数据库被认为完全位于内部网络边界内，而内部网络被认为是安全的，通常无法从互联网直接访问。


  随着`SQL 数据库`和大多数数据库即服务解决方案的出现，对数据库安全性的关注上升到了首位，主要有两个原因：您不再直接控制您的数据，并且数据可以直接从互联网访问。因此，充分利用`SQL
  数据库`的所有功能并了解其局限性变得尤为重要。


  ## 概述


  在深入探讨`SQL 数据库`的具体细节之前，让我们先看一个通用的安全框架，以评估数据库即服务可能对您产生的影响。以下讨论基于保密性、完整性和可用性（`CIA`）所封装的基本安全原则。这被称为`CIA
  三元组`，是最被广泛接受的安全分类形式之一。`SQL 数据库`与传统的`SQL Server`安装相比，有其不同的优缺点，因此回顾`CIA 三元组`的每个领域，以了解如何应对其劣势并利用其优势，至关重要。


  ### 保密性


  *保密性*是确保数据只能由授权用户访问的能力。它旨在保护您的数据免受窥探或无意泄露，通过使用多种技术实现，包括：


  - **加密**。创建*密文*（加密信息），该密文可通过共享密钥或证书解密。

  - **哈希处理**。生成无法解密的密文（通常用于密码存储）。

  - **访问控制**。基于上下文信息控制对数据的访问。

  - **身份验证**。控制谁可以访问数据库以及用户可以访问数据库中的哪些对象。

  - **防火墙**。使用技术将网络连接限制在已知机器的列表内。


  `SQL 数据库`提供了一些新功能，例如防火墙（如前所述）；然而，它目前尚不支持原生数据加密（例如透明数据加密 [`TDE`] 和字段级加密），这使得对其他保密技术的强调更为重要。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  另一方面，`SQL Server`不提供原生防火墙（尽管可以使用`Windows`原生防火墙或购买第三方数据库防火墙），但它提供了强大的加密功能。最后，`SQL
  Server`和`SQL 数据库`都提供了哈希功能。


  由于`SQL 数据库`不提供原生加密，您的代码需要完成所有繁重的工作。别担心！在本章中，您将看到如何使用`C#`实现哈希和加密，以及如何将密文存储在`SQL 数据库`（或就此而言，`SQL
  Server`）中。


  ### 完整性


  数据*完整性*是指确保信息只能由授权用户修改，并在必要时可以撤销损坏的目标。数据的完整性可能以多种方式受到威胁，例如恶意的`SQL 注入`攻击，或无意中在表上执行`TRUNCATE`语句，从而擦除所有记录。


  一般来说，您可以在数据库中实施以下完整性措施：


  - **授权**。控制谁可以更改什么数据。

  - **备份**。创建事务一致的数据库快照，以便从中恢复数据。

  - **基于角色的访问**。为公司中的不同角色（例如开发人员和支持人员）提供最低限度的访问权限。

  - **审计**。跟踪数据库访问和数据更改，为取证分析提供审计跟踪。


  从完整性角度来看，`SQL 数据库`尚未提供与`SQL Server`相同的功能。




  '
- "# 第三章 ■ 安全性\n\n数据库提供了强大的授权功能和基于角色的安全机制，类似于 SQL Server 2012。然而，截至本文撰写时，传统的数据库备份和活动审计功能尚不可用。微软正在为\
  \ SQL 数据库构建新的备份机制，超越了当前可用的 `BCP`（大容量复制程序）操作。有关如何在 SQL 数据库中备份数据的更多信息，请参见第四章。\n\n\
  ### 可用性\n\n*可用性* 确保服务正常运行时间，以便在需要时可以访问数据。设计高可用系统可能非常复杂，需要多个领域的高级知识，包括磁盘配置、系统管理、灾难恢复地点等。以下是高可用性涉及的一些技术：\n\
  \n-   **冗余磁盘**。允许你从磁盘主轴故障中恢复。通常涉及 `RAID` 配置。\n-   **冗余网络**。允许你在多个网络组件（如网卡或路由器）故障时幸存。\n\
  -   **冗余服务**。允许你在安全和数据库等服务中断时幸存。例如使用微软 `集群服务`。\n-   **冗余硬件**。允许你在机器硬件（如 `CPU` 或内存芯片）故障时幸存。\n\
  -   **可扩展性**。在负载下以近乎恒定的速度提供信息。\n-   **DoS 防护**。防止成功的拒绝服务 (`DoS`) 攻击，否则会妨碍数据可用性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 35](img/index-52_1.png)\n\
  \n除了确保基础设施组件的冗余外，你还需要了解业务的恢复目标，以确定如何最好地实施可用性要求。\n\nSQL 数据库提供了一个独特的平台，因为所有上述领域都是自动提供的。SQL\
  \ 数据库通过其服务级别协议 (`SLA`) 提供每月 99.9% 的可用性保证。为了实现这种高可用性，SQL 数据库会为每个你创建的用户数据库透明地维护两个额外的备用数据库。如果你的任何一个用户数据库发生问题，两个备用数据库之一会在几秒钟内接管；你甚至可能注意不到故障转移过程。SQL\
  \ 数据库还提供对 `DoS` 攻击的自动处理。\n\nSQL 数据库使用图 3-1 所示的架构完成故障转移。你与一个代理交互，该代理将你的请求定向到你当前的数据库。你无法访问备用数据库。\n\
  \n**图 3-1.** SQL 数据库的备用数据库架构\n\n■ **注意** 在可用性方面，SQL 数据库开箱即用的表现远超 SQL Server；SQL\
  \ 数据库构建在一个可扩展且高可用的平台上，无需配置或调优。SQL 数据库中不提供任何典型的 SQL Server 配置设置（例如 `CPU 亲和性`、`复制`、`日志传送`\
  \ 等）。\n\n让我们以一个需要部署具有高可用性要求的新应用程序的项目为例。\n\n在传统的 SQL Server 安装中需要规划的以下项目，在 SQL 数据库中会自动为你提供：\n\
  \n-   **群集 SQL Server 实例**。安装和配置微软 `集群服务` 以及主动/主动或主动/被动配置中的 SQL Server 实例。\n-  \
  \ **RAID 配置**。购买新磁盘和硬件来安装和配置 `RAID 10`（或 `RAID 0+1`）磁盘阵列（用于磁盘冗余和性能）。\n-   **灾难恢复服务器**。在灾难恢复站点购买类似硬件并进行配置。\n\
  -   **复制拓扑**。根据你的需要，使用日志传送、复制、磁盘级复制或其他技术创建一种将数据从主站点传输到辅助站点的机制。\n-   **数据库调优**。在大型系统中，为高性能调优\
  \ SQL Server 可能非常困难，涉及 `CPU`、内存、`I/O` 亲和性、并行度以及许多其他考虑因素。\n-   **测试**。每年计划和执行一次灾难恢复计划，以确保其按预期工作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 36](img/index-53_1.jpg)\n\
  \n当然，你还必须考虑所有这些活动相关的成本、规划和执行此类项目所需的时间，以及实施高可用数据库环境所需的专业资源。\n\n至此，你可以看到，尽管 SQL 数据库在安全性的某些领域提供选项较少，但在其他方面表现出色，特别是其可用性模型，这是\
  \ CIA 三要素之一。部署一个高可用的 SQL 数据库数据库是快速且极其简单的。\n\n## 保护你的数据\n\n让我们深入探讨一些具体细节和代码示例，展示如何在\
  \ SQL 数据库中保护你的数据。你可能需要保护数据库中包含敏感信息（如社会安全号码或信用卡号）的特定列。某些医疗应用程序存储患者数据，可能需要接受合规性审查，因此也可能需要加密。如前所述，并非所有安全机制目前都可用，因此本节重点介绍\
  \ SQL 数据库提供的功能以及缓解缺失功能的方法。关于数据加密，由于 SQL 数据库不提供任何加密功能，你将看到如何在项目中实现自己的安全类来简化数据加密。\n\
  \n■ **注意** 以下示例使用名为 `Security.sql` 的数据库脚本和名为 `SQLAzureSecurity.sln` 的 Visual Studio\
  \ 2008 项目。如果你还没有 Windows Azure 账户，可以在本地 SQL Server 数据库上运行 SQL 脚本。\n\n本章使用几个类和方法来演示如何使用加密、哈希和其他技术。图\
  \ 3-2 显示了使用的对象。`Encryption` 类执行实际加密并返回一个 `CipherText` 结构；`UserProperties` 类使用来自\
  \ `Extensions` 类的扩展方法和 `Util` 类中的辅助方法。`CDatabase` 类返回数据库连接字符串。\n\n**图 3-2.** 示例中使用的对象模型\n\
  \n### 加密\n\n如前所述，数据加密不可用。为什么？因为 SQL 数据库不支持 X.509 证书。证书对于许多加密相关功能是必需的，例如透明数据加密 (`TDE`)、列级加密以及某些\
  \ `T-SQL` 命令，如 `FOR ENCRYPTION` 和 `SIGNBYCERT`。\n\n然而，SQL 数据库要求其通信使用 `SSL` 加密。这意味着你的敏感数据在客户端和\
  \ SQL 数据库实例之间始终是安全传输的。你无需做任何事情来启用 `SSL` 加密；这是 SQL 数据库强制要求并自动执行的。如果应用程序尝试连接到 SQL\
  \ 数据库，而该应用程序不支持 `SSL`，则连接请求将失败。\n\n但 `SSL` 不加密静态数据；它只加密传输中的数据。当数据存储在 SQL 数据库中时，如何保护它？由于\
  \ SQL 数据库本身不支持加密，你必须在应用程序代码中加密和解密数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`Security.sql` 脚本包含以下 `T-SQL` 语句：\n\n```sql\nCREATE TABLE UserProperties\n(\n\
  \    ID int identity(1,1) PRIMARY KEY, -- 记录的标识\n    PropertyName nvarchar(255)\
  \ NOT NULL, -- 属性名称\n    Value varbinary(max) NOT NULL, -- 加密后的值\n    Vector binary(16)\
  \ NOT NULL, -- 加密值的向量\n    LastUpdated datetime NOT NULL, -- 最后修改日期\n    Token binary(32)\
  \ NOT NULL -- 记录哈希值\n)\n```\n\n\n\n#### 加密实现\n\n#### 加密算法描述\n\n每个记录包含一个可用作搜索键的属性名（第\
  \ 4 行）和一个加密值（第 5 行）。\n\n该值本身是二进制数据类型，这使其非常适合加密。为了增强安全性，使用了一个向量；该列将在后文解释。`Token`\
  \ 和 `LastUpdated` 列将在讨论哈希时涉及。\n\n以下 C# 代码展示了如何使用高级加密标准（AES）算法加密字符串值；你可以轻松地为三重数据加密标准（3DES）或其他算法添加支持。它使用共享密钥创建密文并返回一个字节数组。该字节数组随后存储在数据库的\
  \ `Value` 列中：\n\n#### 加密代码实现\n\n```csharp\n/// <summary>\n/// 存储加密值及其关联向量的结果结构\n\
  /// </summary>\npublic struct CipherText\n{\n    public byte[] cipher;\n    public\
  \ byte[] vector;\n}\n\n/// <summary>\n/// 封装加密和解密值背后复杂性的加密类\n/// </summary>\npublic\
  \ class Encryption\n{\n    private byte[] _SECRET_KEY_ = new byte[] { 160, 225,\
  \ 229, 3,\n        148, 219, 67, 89, 247, 133, 213, 26, 129, 160, 235, 41,\n   \
  \     42, 177, 202, 251, 38, 56, 232, 90, 54, 88, 158, 169,\n        200, 24, 19,\
  \ 27 };\n\n    /// <summary>\n    /// 使用 AES 加密\n    /// </summary>\n    /// <param\
  \ name=\"value\">要加密的字符串</param>\n    public CipherText EncryptAES(string value)\n\
  \    {\n        // 准备变量...\n        byte[] buffer = UTF8Encoding.UTF8.GetBytes(value);\n\
  \        CipherText ct = new CipherText();\n        System.Security.Cryptography.Aes\
  \ aes = null;\n        ICryptoTransform transform = null;\n\n        // 创建 AES 对象\n\
  \        aes = System.Security.Cryptography.Aes.Create();\n        aes.GenerateIV();\n\
  \        aes.Key = _SECRET_KEY_;\n\n        // 创建加密对象\n        transform = aes.CreateEncryptor();\n\
  \n        // 加密并将结果存储在结构中\n        ct.cipher = transform.TransformFinalBlock(buffer,\
  \ 0, buffer.Length);\n        // 保存使用的向量以备后用\n        ct.vector = aes.IV;\n\n  \
  \      return ct;\n    }\n}\n```\n\n`CipherText` 结构（第 5 行）用作返回值。每个加密的字节数组都附带其初始化向量，这是一种防止对数据库进行字典攻击的安全机制。`Encryption`\
  \ 类包含一个 `EncryptAES` 方法，该方法执行字符串值的实际加密；此方法返回 `CipherText`。\n\n因为 AES 需要一个密钥，你在第\
  \ 17 行以字节数组的形式创建了一个。密钥必须为 32 字节长。你可以轻松地使用 .NET 提供的 `Aes` 类的 `GenerateKey` 方法生成自己的密钥。\n\
  \n在第 29 行，你使用 UTF-8 编码将字符串值转换为其字节表示。这种编码方案非常实用，因为它会根据输入值自动在 ASCII 和 Unicode 之间进行选择。\n\
  \n你在第 31 行声明 `Aes` 对象，并在第 35 行使用 `Aes` 类的静态 `Create()` 方法实例化它。此方法在第 36 行自动创建向量，并设置前面讨论的私钥。\n\
  \n在第 40 行，你使用 `CreateEncryptor()` 方法创建一个加密对象。调用其 `TransformFinalBlock()` 方法即可完成加密，并输出一个长度可变的字节数组，你将其存储在第\
  \ 43 行的 `CipherText` 结构实例中。你同时保存了先前生成的向量，并在第 47 行返回该结构。\n\n很简单，对吧？现在你只需将 `CipherText`\
  \ 内容存储在 `UserProperties` 表中。但在执行此操作之前，让我们讨论一下哈希。\n\n> **注意** 此示例使用 AES，但 .NET Framework\
  \ 还提供了其他算法。由于你还使用了初始化向量，即使输入相同，重复运行相同的代码也会产生不同的输出。这使得加密值更难破解。提供的 Visual Studio 解决方案包含了解密数据的其他方法。\n\
  \n### 哈希\n\n哈希远没有你目前看到的那么复杂。虽然你可以将迄今为止加密的值存储在数据库中，但在此示例中，你对行中的所有列（ID 值除外）进行哈希处理，以确保它们未被更改。为什么？答案回到前面讨论的\
  \ CIA 三元组的完整性问题。你需要一种方法来判断数据是否在你的代码之外被修改。加密你的秘密值使得三元组的机密性方面几乎不可能被打破，但有人仍然可以更新 `PropertyName`\
  \ 列——或者更糟，更新 `Value` 列。哈希不能防止数据被修改，但你可以检测它是否在未经你授权的情况下被更改。\n\n#### 哈希工具方法\n\n为了简化代码，首先创建几个扩展方法。扩展方法是一种便捷的方式，即使你没有原始源代码，也可以扩展类（或数据类型）可用的方法。以下是如何在\
  \ `string` 和 `DateTime` 数据类型上声明扩展方法：\n\n```csharp\npublic static class Extensions\n\
  {\n    public static byte[] GetBytes(this string value)\n    {\n        byte[] buffer\
  \ = UTF8Encoding.UTF8.GetBytes(value);\n        return buffer;\n    }\n\n    public\
  \ static byte[] GetBytes(this DateTime value)\n    {\n        return value.ToString().GetBytes();\n\
  \    }\n}\n```\n\n此代码向 `string` 和 `DateTime` 数据类型添加了一个 `GetBytes()` 方法。你还需要创建一个实用工具类，允许你基于字节数组集合创建哈希值。以下代码展示了该类：\n\
  \n```csharp\npublic class Util\n{\n    /// <summary>\n    /// 基于字节数组数组计算哈希值\n  \
  \  /// </summary>\n    /// <param name=\"bytes\">字节数组数组</param>\n    public static\
  \ byte[] ComputeHash(params byte[][] bytes)\n    {\n        SHA256 sha = SHA256Managed.Create();\n\
  \        MemoryStream ms = new MemoryStream();\n\n        for (int i = 0; i < bytes.Length;\
  \ i++)\n            ms.Write(bytes[i], 0, bytes[i].Length);\n\n        ms.Flush();\n\
  \        ms.Position = 0;\n\n        return sha.ComputeHash(ms);\n    }\n}\n```\n\
  \n这个 `Util` 类很快就会派上用场。注意第 7 行将变量声明为 `params byte[][]`；这意味着传递给此方法的每个参数都必须是一个字节数组。你声明了一个内存流，在第\
  \ 13 行循环遍历每个字节数组变量并将其附加到内存流中。最后，在第 18 行返回内存流的计算哈希值。你很快就会看到如何调用此方法。\n\n#### 使用哈希\n\
  \n接下来是 `UserProperties` 类，它在下面的示例中，并实际调用 SQL 数据库实例。它有两个输入参数：要保存的属性名称及其存储在 `CipherText`\
  \ 结构中的加密值。在第 13 行，你从另一个类中检索连接字符串，并在第 15 行打开数据库连接。然后你创建命令对象，指定调用一个存储过程。存储过程的代码将在本节后面提供。哈希值在第\
  \ 39 行创建；如你所见，你通过将每个存储过程参数作为字节数组传递来调用刚刚回顾的 `ComputeHash` 方法。这就是你同时使用前面创建的扩展方法和哈希方法的地方。计算出哈希结果后，你在第\
  \ 45 行将其传递给最后一个存储过程参数：\n\n```csharp\nusing System.Data.SqlDbType;\npublic class\
  \ UserProperties\n{\n\n    /// <summary>\n    /// 在 SQL Azure 数据库中保存属性值\n    ///\
  \ </summary>\n\n\n\n## **第 3 章：安全**\n\n正如所承诺的，以下是存储过程的代码。创建存储过程是因为它能让你从访问控制的角度提供额外的安全性。正如你稍后将看到的，你会创建一个包含表的架构，以及一个单独的架构用于存放访问这些表的存储过程。这提供了对数据库安全性的更强控制。本章稍后将回顾架构。\n\
  \n```sql\nIF (Exists(SELECT * FROM sys.sysobjects WHERE Name = 'proc_SaveProperty'\
  \ AND Type = 'P')) DROP PROC proc_SaveProperty\nGO\n\n-- SELECT * FROM UserProperties\n\
  \nCREATE PROC proc_SaveProperty\n    @name nvarchar(255),\n    @value varbinary(max),\n\
  \    @vector binary(16),\n    @lastUpdated datetime,\n    @hash binary(32)\nAS\n\
  IF (Exists(SELECT * FROM UserProperties WHERE PropertyName = @name))\nBEGIN\n  \
  \  UPDATE UserProperties SET\n        Value = @value,\n        Vector = @vector,\n\
  \        LastUpdated = @lastUpdated,\n        Token = @hash\n    WHERE\n       \
  \ PropertyName = @name\nEND\nELSE\nBEGIN\n    INSERT INTO UserProperties\n     \
  \   (PropertyName, Value, Vector, LastUpdated, Token)\n    VALUES (\n        @name,\n\
  \        @value,\n        @vector,\n        @lastUpdated,\n        @hash )\nEND\n\
  ```\n\n这个存储过程根据属性名执行更新或插入操作。注意使用了 `varbinary(max)`；因为不知道加密值会有多长，所以允许存储大型但可变长度的二进制对象。然而，向量\
  \ (`vector`) 的长度始终为 16 字节，哈希 (`hash`) 为 32 字节。\n\n![图片 37](img/index-59_1.png)\n\
  \n### 运行保存方法\n\n在 `UserProperties` 类上运行 `Save()` 方法会在 `UserProperties` 表中创建一条记录。\n\
  \n以下代码展示了如何调用 `Save` 方法：\n\n```csharp\n/// <param name=\"propertyName\">属性名称</param>\n\
  /// <param name=\"ct\">要保存的 CipherText 结构</param>\npublic static void Save(string\
  \ propertyName, CipherText ct)\n{\n    using (SqlConnection sqlConn =\n        new\
  \ SqlConnection(CDatabase.ConnectionString))\n    {\n        sqlConn.Open();\n\n\
  \        using (SqlCommand sqlCmd = new SqlCommand())\n        {\n            DateTime\
  \ dateUpdated = DateTime.Now;\n\n            sqlCmd.Connection = sqlConn;\n    \
  \        sqlCmd.CommandType = System.Data.CommandType.StoredProcedure;\n       \
  \     sqlCmd.CommandText = \"proc_SaveProperty\";\n            sqlCmd.Parameters.Add(\"\
  name\", NVarChar, 255);\n            sqlCmd.Parameters.Add(\"value\", VarBinary,\
  \ int.MaxValue);\n            sqlCmd.Parameters.Add(\"vector\", VarBinary, 16);\n\
  \            sqlCmd.Parameters.Add(\"lastUpdated\", DateTime);\n            sqlCmd.Parameters.Add(\"\
  hash\", VarBinary, 32);\n            sqlCmd.Parameters[0].Value = propertyName;\n\
  \            sqlCmd.Parameters[1].Value = ct.cipher;\n            sqlCmd.Parameters[2].Value\
  \ = ct.vector;\n            sqlCmd.Parameters[3].Value = dateUpdated;\n\n      \
  \      // 计算此记录的哈希值...\n            // 我们传递应该被哈希处理的值列表\n            // 如果数据库中这些值中的任何一个发生更改，\n\
  \            // 重新计算哈希值将产生不同的结果\n            byte[] hash = Util.ComputeHash(\n \
  \               propertyName.GetBytes(),\n                ct.cipher,\n         \
  \       ct.vector,\n                dateUpdated.GetBytes());\n\n            sqlCmd.Parameters[4].Value\
  \ = hash;\n\n            int res = sqlCmd.ExecuteNonQuery();\n        }\n\n    \
  \    sqlConn.Close();\n    }\n}\n```\n\n```csharp\nclass Program\n{\n    static\
  \ void Main(string[] args)\n    {\n        // 声明加密对象并加密我们的秘密值\n        Encryption\
  \ e = new Encryption();\n        CipherText ct = e.EncryptAES(\"secret value goes\
  \ here...\");\n\n        UserProperties.Save(\"MySecret\", ct);\n    }\n}\n```\n\
  \n### 表格内容\n\n**图 3-3** 显示了运行程序后表中的内容。`Value` 列是你的加密值，`Vector` 是存储过程中 `@vector`\
  \ 变量的值，而 `Token` 列是作为 `@hash` 变量传递的计算所得哈希值。\n\n> **图 3-3.** 包含加密值、哈希值和向量的记录\n\n\
  最后但同样重要的是，你应该知道 SQL Server 和 SQL Database 都原生支持哈希处理。直到最近，对哈希处理的支持还仅限于 MD5 和 SHA-1\
  \ 算法。然而，SQL Database 和 SQL Server 2012\n\n\n\n# 第三章 ■ 安全性\n\n现在支持强度为 256 位和 512\
  \ 位的哈希。因此，你可以使用 `HASHBYTES` 命令来创建之前在 C# 中生成的 `Token` 值。以下是一个如何在 SQL 中计算 SHA-256\
  \ 哈希的快速示例：\n```sql\nSELECT HASHBYTES('sha2_256', 'MySecret')\n```\n`HASHBYTES()`\
  \ 的输出也是一个字节数组：\n```\n0x49562CFC3B17139EA01C480B9C86A2DDACB38FF1B2E9DB1BF66BAB7A4E3F1FB5\n\
  ```\n你可以更改之前创建的存储过程，在其中执行哈希函数，而不是使用 C# 代码。然而，出于性能原因，将哈希算法保留在 C# 中可能是有意义的，因为这是一个\
  \ CPU 密集型操作。如果你的应用程序持续计算哈希，你可能希望将哈希保留在 C# 中，以节省数据库 CPU 周期用于其他任务。如果你决定使用 T-SQL 对值进行哈希处理，你可能希望先将字符串转换为\
  \ Unicode；如果你最终在 C# 中使用哈希函数，这将有助于生成可比较的哈希值（因为 C# 中的字符串默认是 Unicode）。要在 SQL Database\
  \ 或 SQL Server 中将 `MySecret` 字符串作为 Unicode 进行哈希处理，请在 T-SQL 中使用 `N` 转换器，如下所示：\n```sql\n\
  SELECT HASHBYTES('sha2_256', N'MySecret')\n```\n到目前为止，你已经看到了一种为保密性而加密敏感信息、为增强完整性而对记录的特定列进行哈希处理，以及为高可用性而在\
  \ Azure 中部署的方法。如你所见，开发加密和哈希例程可能非常复杂，并且需要对编程语言有很强的掌握。你可能会发现创建一个通用的加密库（如前面示例所示）是有益的，这样可以在不同项目中重用。\n\
  \n### 证书\n\n如前所述，SQL Database 不支持 X.509 证书，尽管你可以在 Windows Azure 中部署 X.509 证书。你的客户端代码（托管在公司的网络或\
  \ Windows Azure 中）可以使用证书来加密和解密值。使用证书意味着你正在使用公钥/私钥对进行加密。公钥用于加密数据，私钥用于解密数据。\n\n**注意：**\
  \ 有关如何在 Windows Azure 中部署 X.509 证书的更多信息，请访问 MSDN 博客 [`blogs.msdn.com/jnak`](http://blogs.msdn.com/jnak)\
  \ 并查看 2010 年 1 月的存档。Jim Nakashima 的博客文章包含详细说明。\n\n你可以使用 `MakeCert.exe` 实用工具轻松创建自签名证书，该工具可在\
  \ Windows SDK 中找到。要在你的机器上创建证书，请在命令行运行以下命令。你需要以管理员身份执行此语句，否则命令将失败：\n```cmd\nmakecert\
  \ -ss root -pe -r -n \"CN=BlueSyntaxTest\" -sky Exchange -sr LocalMachine\n```\n\
  以下是用于创建此证书的选项的简要概述：\n\n*   `-ss root` 将证书存储在根证书存储中。\n*   `-pe` 将私钥标记为可导出。\n*   `-r`\
  \ 创建自签名证书（意味着它不是由像 Thawte 这样的根证书颁发机构 (CA) 签发的）。\n*   `-n \"CN=...\"` 指定证书的主题名称。\n\
  *   `-sky Exchange` 指定证书用于加密。\n*   `-sr LocalMachine` 指定证书存储位置为 LocalMachine。\n\n\
  ![Image 38](img/index-61_1.png)\n\n**注意：** 确保以管理员身份运行此语句，否则你会看到类似这样的错误：`Error:Save\
  \ encoded certificate to store failed => 0x5 (5)`。\n\n要验证你的证书是否已正确安装，请打开 `mmc.exe`。选择\
  \ **文件** ➤ **添加/删除管理单元**。然后，选择 **证书**，单击 **添加**，选择 **计算机账户**，然后单击 **确定**。展开左侧的树状图以查看\
  \ **受信任的根证书颁发机构** 下的证书。图 3-4 显示了使用前面的命令创建的 `BlueSyntaxTest` 证书。\n\n*图 3-4. 在你的机器上查看证书*\n\
  \n现在你已经安装了证书，你可以通过代码搜索并定位它。通常，证书通过其唯一标识符（*指纹*）或其*通用名称* (CN) 来搜索。要查看证书的指纹，请双击证书，选择\
  \ **详细信息** 选项卡，向下滚动直到看到 **指纹** 属性，如图 3-5 所示。\n\n![Image 39](img/index-62_1.png)\n\
  \n*图 3-5. 获取证书的指纹*\n\n你可以选择指纹并将其复制到字符串变量中。以下代码展示了你之前看到的 `Encryption` 类中的一个新的私有变量和一个新的方法。第\
  \ 1 行包含如图 3-5 所示的指纹，第 13 行打开 `LocalMachine` 上的根证书存储，第 17 行通过搜索指纹实例化一个 X.509 对象。注意，`Find`\
  \ 方法返回一个集合；你感兴趣的是第一个证书，因为只有一个证书会匹配此指纹。在第 24 行，你创建 RSA 加密对象，并在第 27 行调用其 `Encrypt`\
  \ 方法。因为使用 RSA 加密会自动包含一个向量，所以无需跟踪它，因此 `CipherText` 向量变量被设置为 0：\n```csharp\n1. private\
  \ string _THUMBPRINT_ =\n2. \"01 71 11 17 0a b4 96 7b ca 1f f3 e5 bc 0f 68 9d c6\
  \ c0 3b 7b\";\n3.\n4. /// <summary>\n5. /// 使用自签名证书加密字符串值\n6. /// </summary>\n7.\
  \ /// <param name=\"value\">要加密的值</param>\n8. /// <returns></returns>\n9. public\
  \ CipherText EncryptByCert(string value)\n10. {\n11. byte[] buffer = UTF8Encoding.UTF8.GetBytes(value);\n\
  12.\n13. X509Store store = new X509Store(StoreName.Root,\n14. StoreLocation.LocalMachine);\n\
  15. store.Open(OpenFlags.ReadOnly);\n16.\n17. X509Certificate2 x509 =\n18. store.Certificates.Find(\n\
  19. X509FindType.FindByThumbprint,\n20. _THUMBPRINT_, true)[0];\n21.\n22. store.Close();\n\
  23.\n24. RSACryptoServiceProvider rsaEncrypt = null;\n25. rsaEncrypt = (RSACryptoServiceProvider)x509.PublicKey.Key;\n\
  26.\n27. byte[] encryptedBytes = rsaEncrypt.Encrypt(buffer, false);\n28.\n29. CipherText\
  \ ct = new CipherText();\n30. ct.cipher = encryptedBytes;\n31. ct.vector = new byte[]\
  \ {0, 0, 0, 0, 0, 0, 0, 0, 0,\n32. 0, 0, 0, 0, 0, 0, 0};\n33.\n34. return ct;\n\
  35. }\n```\n解密代码如下所示，与前面的示例非常相似。你在 RSA 对象上调用 `Decrypt` 而不是 `Encrypt`：\n```csharp\n\
  1. public string DecryptByCert(CipherText ct)\n2. {\n3. X509Store store = new X509Store(StoreName.Root,\n\
  4. StoreLocation.LocalMachine);\n5. store.Open(OpenFlags.ReadOnly);\n6.\n7. X509Certificate2\
  \ x509 =\n8. store.Certificates.Find(\n9. X509FindType.FindByThumbprint,\n10. _THUMBPRINT_,\
  \ true)[0];\n11. store.Close();\n12.\n13. RSACryptoServiceProvider rsaEncrypt =\
  \ null;\n14. rsaEncrypt = (RSACryptoServiceProvider)x509.PrivateKey;\n15.\n16. byte[]\
  \ bytes = rsaEncrypt.Decrypt(ct.cipher, false);\n17.\n18. return UTF8Encoding.UTF8.GetString(bytes);\n\
  19. }\n```\n以下代码调用 RSA 加密例程并按前述方式将其结果保存到 `UserProperties` 表中。该表现在包含两条记录。请注意，使用证书加密方法时，密文的长度要大得多：\n\
  ```csharp\n1. class Program\n2. {\n3. static void Main(string[] args)\n4. {\n5.\
  \ // 声明加密对象并加密我们的秘密值\n6. Encryption e = new Encryption();\n7. CipherText ct = e.EncryptAES(\"\
  secret value goes here...\");\n8. CipherText ct2 = e.EncryptByCert(\"another secret!!!\"\
  );\n9.\n10. UserProperties.Save(\"MySecret\", ct);\n11. UserProperties.Save(\"MySecret2\"\
  , ct2);\n12.\n13. }\n14. }\n```\n\n## 访问控制\n\n\n\n到目前为止，你已经花费了大量时间对值进行加密和哈希处理，以增强机密性和完整性。然而，CIA\
  \ 三元组的另一个重要方面是访问控制。本节将回顾访问控制的两个子类别：身份验证（也称为 `AUTHN`）和授权（`AUTHZ`）。\n\n## 身份验证 (`AUTHN`)\n\
  \n`AUTHN` 是一个验证你确实是你所声称的那个人的过程。在 SQL Server 中，`AUTHN` 过程通过两种机制之一完成：网络凭据（通过安全支持提供程序接口\
  \ [`SSPI`] 上的 Kerberos 身份验证处理）或 SQL Server 凭据。连接字符串必须指定正在使用哪种 `AUTHN`。当你使用 SQL Server\
  \ `AUTHN` 时，必须在尝试连接之前提供密码，这可以由运行时的用户提供，也可以在配置文件中提供。\n\n在考虑 SQL Database 的 `AUTHN`\
  \ 时，请记住以下几点：\n\n*   **无网络身份验证**。由于 SQL Database 不在你的网络上，因此网络 `AUTHN` 不可用。这进一步意味着你必须始终使用\
  \ SQL `AUTHN`，并且必须在你的应用程序中存储密码（最好在配置文件中）。你可能希望加密存储密码。尽管你可以使用 `aspnet_regiis.exe`\
  \ 实用程序在 Windows 中加密配置文件的部分内容，但此选项在 Windows Azure 中使用默认提供程序时不可用。但是，你可以使用自定义配置提供程序\
  \ `PKCS12`（可在 MSDN Code Gallery 上找到）来加密 Web 配置文件的部分内容。有关如何使用此自定义提供程序的更多信息，请访问 [`tinyurl.com/9ta8m5u`](http://tinyurl.com/9ta8m5u)。\n\
  *   **强密码**。SQL Database 要求使用强密码。此选项无法禁用，这是一件好事。强密码必须至少有八个字符长；必须组合字母、数字和符号；并且不能是字典中的单词。\n\
  *   **登录名限制**。某些登录名不可用，例如 `sa`、`admin` 和 `guest`。无法创建这些登录名。你还应避免在登录名中使用 `@` 符号；该符号用于分隔用户名和机器名，有时可能需要。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 安全\n\n## 授权 (`AUTHZ`)\n\
  \n授权使你能够在通过身份验证后控制谁可以执行哪些操作。在开发周期早期定义良好的 `AUTHZ` 模型非常重要，因为更改访问控制策略可能相对困难。\n\n一般来说，一个强大的\
  \ `AUTHZ` 模型定义了哪些用户可以访问数据库中的哪些对象。在 SQL Database 和 SQL Server 中，这通常通过定义登录、用户、架构和权限之间的关系来实现。\n\
  \n#### 创建登录和用户\n\n登录帐户用于管理 SQL Database 中的身份验证；它是一个服务器级别的实体。如果你知道一个登录帐户及其密码，就可以登录。用户是一个数据库实体，用于访问控制。用户决定了你可以访问哪些对象以及可以执行哪些操作。每个登录可以映射到每个数据库（包括\
  \ `master`）中的 0 个或 1 个用户。\n\n在 SQL Database 中，你必须连接到 `master` 数据库才能管理你的登录。部分支持 `CREATE\
  \ LOGIN` T-SQL 语句。另外，请记住创建登录时必须使用强密码。\n\nSQL Database 提供了两个新角色：\n\n*   **`LoginManager`**。授予用户在\
  \ `master` 数据库中创建新登录的能力。\n*   **`DBManager`**。授予用户从 `master` 数据库创建新数据库的能力。\n\n首先，让我们在\
  \ `master` 数据库中创建一个登录帐户：\n\n```sql\nCREATE LOGIN MyTestLogin WITH PASSWORD='MyT3stL0gin'\n\
  GO\n```\n\n你可以选择授予此登录访问 `master` 的权限。以下代码显示了如何授予该登录访问 `master` 数据库的权限，并在 `master`\
  \ 数据库中授予 `LoginManager` 角色。如果你的意图仅是授予此登录访问用户数据库的权限，则可以跳过此步骤。\n\n```sql\nCREATE USER\
  \ MyTestLoginUser FROM LOGIN MyTestLogin\nGO\nEXEC sp_addrolemember 'loginmanager',\
  \ MyTestLoginUser\nGO\n```\n\n在大多数情况下，你会希望在 `master` 中创建登录帐户，在用户数据库中创建用户。以下代码显示了如何在用户数据库中创建具有读取权限的用户。你必须首先连接到用户数据库，否则下面的语句将失败。\n\
  \n```sql\nCREATE USER MyTestLoginUser FROM LOGIN MyTestLogin\nGO\nEXEC sp_addrolemember\
  \ 'db_datareader', MyTestLoginUser\nGO\n```\n\n现在，`MyTestLogin` 帐户可以连接到你的用户数据库。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 40](img/index-66_1.png)\n\
  \n第 3 章 ■ 安全\n\n最后，你应该注意，SQL Database 管理员帐户始终作为用户添加到每个新的 SQL Database 实例中，并且默认是\
  \ `dbo`。这意味着你不需要为管理员帐户创建用户。如果你尝试这样做，将会收到一条错误消息，指出用户已存在。例如，如果我的管理员登录帐户是 `'hroggero'`，则以下命令将失败，因为用户已自动创建并映射到\
  \ `dbo`：\n\n```sql\nCREATE USER hroggero WITH LOGIN hroggero\n```\n\n```\nMsg 15007,\
  \ Level 16, State 1, Line 1\n'hroggero' is not a valid login or you do not have\
  \ permission.\n```\n\n## 架构\n\n`架构` 是包含数据库对象的容器；架构驻留在数据库内部。架构是数据库对象三部分命名约定的一部分；它们被视为命名空间。架构中的每个对象都必须具有唯一的名称。\n\
  \n默认情况下，当你使用 `dbo` 登录连接时，创建的对象由 `DBO` 架构拥有。例如，之前显示的 `UserProperties` 表的 `CREATE\
  \ TABLE` 语句使用 `DBO` 作为架构所有者（对于 `DBO`，`schema_id` 始终为 1）。参见图 3-6.\n\n***图 3-6.**\
  \ 查看对象的架构所有权*\n\n目前，新用户 `MyTestLoginUser` 无法从此表中读取。尝试对 `UserProperties` 执行 `SELECT`\
  \ 语句会返回 `SELECT` 权限被拒绝的错误。因此，你有一个选择：你可以授予该用户帐户对该表的 `SELECT` 权限，将用户分配到适当的角色，或者为该用户创建一个架构并将\
  \ `SELECT` 权限分配给该架构。\n\n通常，通过角色管理访问权限比直接通过用户管理容易得多。但是，如果你希望对访问权限进行更精细的控制，则应考虑使用基于架构的安全性。要正确执行此操作，你需要将\
  \ `UserProperties` 表的所有权更改为新架构（不是 `DBO`），然后将访问权限分配给该架构。\n\n要创建新架构，你必须连接到 `MyTestLoginUser`\
  \ 已创建的所需用户数据库。然后运行以下语句：\n\n```sql\nCREATE SCHEMA MyReadOnlySchema AUTHORIZATION\
  \ DBO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 41](img/index-67_1.png)\n\
  \n![Image 42](img/index-67_2.png)\n\n第 3 章 ■ 安全\n\n此时，已创建一个架构；它由 `DBO` 拥有。你现在需要将\
  \ `UserProperties` 表的所有权更改为 `MyReadOnlySchema`：\n\n```sql\nALTER SCHEMA MyReadOnlySchema\
  \ TRANSFER DBO.UserProperties\n```\n\n该表现在属于该架构，如图 3-7. 所示。\n\n***图 3-7.** 查看新的架构所有者*\n\
  \n然而，你还没有完成。`MyTestLoginUser` 无法再看到该表。对该表执行 `SELECT` 语句会返回 `Invalid object name`\
  \ 消息，如图 3-8 所示。\n\n***图 3-8.** 当用户看不到对象时的错误*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 43](img/index-68_1.png)\n\n第 3 章 ■ 安全\n\n\n\n`MyTestLoginUser` 的默认架构为\
  \ `DBO`，如图 3-9. 所示。用户的默认架构是指在 T-SQL 语句中未明确指定时所使用的架构。为简化开发人员操作，可将默认架构更改为 `MyReadOnlySchema`，这样便无需在\
  \ T-SQL 语句中进行指定。\n\n**图 3-9.** 登录名的架构所有者\n\n要更改用户的默认架构，需要执行以下语句：\n\n```sql\nALTER\
  \ USER MyTestLoginUser WITH DEFAULT_SCHEMA = MyReadOnlySchema\n```\n\n现在该用户已将 `MyReadOnlySchema`\
  \ 设为其默认架构，它可以直接查看该架构所拥有的对象，而无需指定对象所有者。不过，访问权限尚未设置。让我们为 `MyTestLoginUser` 授予 `SELECT`\
  \ 权限：\n\n```sql\nGRANT SELECT ON SCHEMA :: MyReadOnlySchema TO MyTestLoginUser\n\
  ```\n\n以下语句现在对 `MyTestLoginUser` 账户再次生效：\n\n```sql\nSELECT * FROM UserProperties\n\
  ```\n\n为何要如此麻烦？因为创建自己的架构是一种通过向架构而非直接向对象授予权限来管理访问控制的绝佳方式。在某种程度上，架构可以用作一个组，就像 Windows\
  \ 组一样，可以对其授予或拒绝权限。\n\n图 3-10 展示了如何为了获得更大的灵活性和控制力而转换安全模型。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 44](img/index-69_1.jpg)\n\n![Image 45](img/index-69_2.png)\n\n第 3 章 ■\
  \ 安全性\n\n**图 3-10.** 迈向基于架构的安全模型\n\n#### 架构分离\n\n前面介绍的架构安全模型是实现多租户模型的基础，该模型使用架构分离作为分片机制。从存储角度来看，多租户系统是一个数据库集合，它以某种方式托管多个客户，使得每个客户在安全和管理方面都是隔离的。\n\
  \n虽然你可以通过为每个客户创建一个数据库来构建多租户系统，但你也可以为每个客户创建一个架构容器，并将客户安置在更少的数据库中。本章讨论的架构安全模型允许你安全地将客户安置在同一数据库中，并通过为每个客户使用不同的登录名和用户来保持强大的安全边界，其中每个用户只被授予访问特定架构的权限。\n\
  \n在图 3-11, 中，我正在一个名为 `DB1` 的现有数据库中创建一个新的客户容器。由于该数据库存储了其他客户，而我的目标是确保强大的安全隔离，因此我首先在\
  \ `master` 中为我的客户（在此示例中称为 `C3`）创建一个新的登录名 (`L3`)。\n\n**图 3-11.** 为客户创建新的架构容器\n\n\
  然后我连接到 `DB1` 并创建架构容器 (`S3`)，客户数据将存储在其中。一旦创建了架构容器，我就可以在 `S3` 中创建所有必要的对象，例如表、视图和存储过程。\n\
  \n接下来，我为登录账户 `L3` 创建一个用户 (`U3`)。我确保将 `U3` 的默认架构从 `DBO` 更改为 `S3`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 3 章 ■ 安全性\n\n最后，我授予 `U3` 所有必要的访问权限。至此，我在现有数据库中创建了一个新的架构，并实现了与其他客户的强大安全隔离。\n\n\
  你可以在第 9 章中了解更多关于此分片模型的信息。\n\n## SQL 数据库防火墙\n\nSQL 数据库自带防火墙，你可以直接从 SQL 数据库门户进行配置，如第\
  \ 1 章所述。你也可以通过 T-SQL 查看和更改防火墙规则。让我们快速浏览一下可用的 SQL 语句。\n\n**注意** 你需要连接到 `master` 数据库才能查看或更改防火墙规则。必须先通过\
  \ SQL 数据库门户向防火墙添加至少一条连接规则，才能建立连接。\n\n要查看当前的防火墙规则，请执行此语句：\n\n```sql\nSELECT * FROM\
  \ sys.firewall_rules\n```\n\n你可以看到每条规则都有一个名称；该名称用作唯一键。`sp_set_firewall_rule` 命令允许你添加新规则。\n\
  \n新规则可能需要几分钟才能生效。例如，以下语句添加了一个名为 `NewRule` 的新规则。注意第一个参数必须是 Unicode 字符串：\n\n```sql\n\
  sp_set_firewall_rule N'NewRule', '192.168.1.1', '192.168.1.10'\n```\n\n要删除规则，请运行以下语句：\n\
  \n```sql\nsp_delete_firewall_rule N'NewRule'\n```\n\n## 内部防火墙\n\n一些组织使用内部防火墙，通过高级规则控制对互联网的网络访问。\n\
  \n由于从内部网络连接到 SQL 数据库需要开放“TCP 1433 出站”端口，如果你的公司使用内部防火墙，你可能需要申请开放此端口。出于安全原因，你的网络管理员可能会要求提供\
  \ SQL 数据库的 IP 范围，以便仅针对特定目标开放端口。\n\n不幸的是，将连接限制为某个 IP 范围可能会在以后出现问题，因为 SQL 数据库的 IP\
  \ 范围可能会随时间变化。因此，你应该将端口开放给任何 (ANY) IP 目标。\n\n## 合规性\n\n尽管从风险管理角度看，云计算给组织带来了新的挑战，但微软的云数据中心根据其当地法规接受了多项审计和评估。为了促进其合规性审计和评估，微软成立了运营合规团队，为其运营设计了一个通用的合规框架。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 安全性\n\n据微软称，其部分云计算基础设施符合多项法规，包括\
  \ PCI、《健康保险流通与责任法案》(HIPAA) 和《萨班斯-奥克斯利法案》。它还获得了多项认证，包括\n\n-   ISO/IEC 27001:2005\n\
  -   SAS 70 Type I 和 II\n\n微软最近以技术预览版形式发布了信任服务框架。尽管该服务处于早期阶段，但它提供了一种跨组织安全交换敏感数据的标准化机制。欲了解更多信息，请查看\
  \ SQL Azure Labs 网站 [(www.sqlazurelabs.com](http://www.sqlazurelabs.com))。\n\n**注意**\
  \ 有关微软合规计划的更多信息，[请访问 www.globalfoundationservices.com](http://www.globalfoundationservices.com)。\n\
  \n## 总结\n\n云中的安全性是一个复杂的话题，需要仔细分析你的需求和设计方案。本章介绍了 CIA 三要素（机密性、完整性、可用性）的基础知识，并根据这三个方面对安全选项进行了分类。\n\
  \n你还回顾了如何在 Visual Studio 应用程序中规划强大的加密和哈希处理。最后，请记住，架构分离可能非常有用，应在开发周期早期实施。\n\n至此，你应该了解了可用于保护\
  \ SQL 数据库中数据的多种选项，并意识到 SQL 数据库平台的一些限制。然而，请记住，随着微软为其 SQL 数据库平台提供更多更新，其中一些限制很可能在未来某个时候被移除或缓解。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 4 章\n\n## 数据迁移与备份策略\n\n\
  当公司谈论他们对 Azure 技术（特别是 Azure 的 SQL 部分）的研究或经验时，他们最常关注的问题（除了安全性之外）有两个：将本地数据库和数据迁移到云端，以及备份策略。在\
  \ Azure 出现之前，数据库都是本地托管的（现在仍然如此）：它们被容纳在公司内部或数据中心里。迁移到 Azure 平台和 SQL Azure 意味着将全部或部分数据移至云端并在那里存储。\n\
  \n\n# 第 4 章 ■ 数据迁移与备份策略\n\n第 3 章详细讨论了在云端存储宝贵数据时涉及的安全问题、注意事项以及最佳实践。将数据迁移到云端是一个重大决策，你不应也绝不能轻率决定。但在你决定使用`SQL\
  \ Azure`之后，问题就变成了：如何将数据上传到云端？虽然将本地数据库无缝迁移到`SQL Azure`是理想情况，但实际操作并不像你想象的那样简单直接。你确实有几个可行的选择，但必须考虑数据迁移之外的因素，例如数据传输可能产生的成本。\n\
  \n数据进入云端后，还会引发更多关于备份策略的问题——这些策略在本地数据库中很常见。在`SQL Azure`中，备份设备以及数据库备份与还原的概念已不复存在。尽管这听起来令人惊讶，但请记住，微软在幕后管理着所有硬件。目前，这里不存在驱动器、设备等概念。\n\
  \n本章将讨论将数据库和数据迁移到云端所涉及的不同迁移工具、策略和概念。你会看到展示这些工具使用方法的示例。在本章最后，我们将用一两页的篇幅探讨备份策略以及有助于提供`SQL\
  \ Database`备份功能的工具。\n\n## 将数据库和数据迁移到 SQL Azure\n\n假设你想将一个或多个应用程序及其数据库迁移到云端。这是一个很好的想法。很可能，你与无数考虑将应用程序迁入云端的人属于同一类：你不想从头开始。你更愿意将现有应用程序迁移到云端，但不确定必要的步骤或可用的技术。本节讨论微软提供的三种工具，它们是`SQL\
  \ Server`的一部分：\n*   `导入/导出服务`\n*   `生成和发布脚本向导`\n*   `bcp` 实用工具\n\n除了这三种工具，我们还将简要提及\
  \ CodePlex 上一个名为`SQL Azure 迁移向导`的免费实用工具，它提供了一个向导驱动的界面，指导你将数据库和数据迁移到`SQL Azure`。\n\
  \n本章的示例使用`SQL Server 2012`，可从微软的`MSDN`站点获取。这些示例也适用于`SQL Server 2008`，尽管某些界面可能略有不同。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n这些示例中使用的数据库是`AWMini`，它是`AdventureWorks`数据库的一个精简版本。\n\
  可从本书的`APress`站点下载此数据库。\n\n### 导入/导出服务\n\n2012 年，微软以`导入/导出`服务的形式发布了一项强大的功能，用于将本地数据库迁移到`SQL\
  \ Azure`。要理解这项服务及其工作原理，首先需要了解`数据层应用程序框架`，通常简称为`DAC Fx`。\n\n#### 数据层应用程序框架\n\n`DAC\
  \ Fx`是在`SQL Server 2008 R2`中作为`应用程序和多服务器管理`服务的一部分引入的，旨在高效且主动地管理数据库环境。它的设计考虑了扩展性，旨在提供一种有效的方法来管理数据库架构在不同环境（例如从开发到测试，以及从测试到生产）之间的部署。\n\
  \n`DAC Fx`是一套旨在改进`SQL Server`数据库架构的开发、部署和管理的工具、API 和服务。在大多数环境中，`DBA`创建并维护一系列`T-SQL`脚本，用于创建或修改数据库对象，例如表和存储过程。问题在于，在许多情况下，`DBA`需要维护多套脚本：一套用于初始创建，另一套用于将数据库从一个版本更新到另一个版本的更新和修改。再加上这些脚本的多个版本，就形成了一个复杂的维护场景。\n\
  \n这正是`DAC Fx`的用武之地。`SQL Server 2008 R2`引入了`BACPAC`的概念，无需构建和维护`T-SQL`脚本集。`DAC`（数据层应用程序）是一个包含应用程序所使用的所有数据库对象的实体。其目的是为创建、部署和管理对象提供一个单一单元，而不是单独管理每个对象。\n\
  \n当`DAC`准备好部署时，会被构建成一个`DAC`包，或称`DACPAC`。这个包是一个包含`DAC`定义的文件，实际上就是一个包含多个`XML`文件的压缩文件。\n\
  \n然而，这些`DACPAC`只包含架构，不包含数据。这就是新版本`DAC Fx`的用武之地。2.0 版本现在同时支持数据和架构，可以将表数据与架构一起导出到一个名为`.bacpac`的新文件格式中。使用`DAC\
  \ Fx`，你现在可以从现有数据库中提取`BACPAC`，并将其部署到不同的`SQL Server`环境，包括……没错，`SQL Azure`。\n\n需要注意的是，`SQL\
  \ Server 2012`附带`DAC Fx` 2.0 版本，并支持导出到`BACPAC`。接下来的两节将指导你如何使用`SQL Server 2012`创建和部署`BACPAC`。你将看到如何在`Windows\
  \ Azure 管理门户`中使用`导入/导出`服务来导入和导出`SQL Azure`数据库。\n\n#### 使用 SQL Server 2012 通过 BACPAC\
  \ 部署到 SQL Azure\n\n对于尚未升级到`SQL Server 2012`的用户，下一节将解决这个问题。但本节将使用`SQL Server 2012`。首先，你将看到如何将本地数据库直接部署到`SQL\
  \ Azure`，然后如何使用内置的导入和导出功能，通过`SQL Server 2012`的`BACPAC`进行迁移。\n\n请记住，本节的所有示例都假设你的数据库是`Azure\
  \ 就绪`的，即你的本地`SQL Server`数据库已准备好迁移到`SQL Azure`。例如，如果你下载完整的`AdventureWorks`数据库（例如`SQL\
  \ Server 2008 R2`版本），然后尝试完成本节中的示例，由于其中包含`Windows Azure SQL Database`不支持的对象（例如原生加密和`全文搜索`），这些示例将会失败。本章的“`生成和发布脚本向导`”一节解释了如何通过采取适当的修改和更改，将本地数据库转换为`Azure\
  \ 就绪`。更重要的是，它还解释了为什么需要这些更改。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 46](img/index-74_1.png)\n\n这些示例使用的数据库名为`AWMini`，它是`AdventureWorks`数据库的一个精简版本。可从本书的`APress`下载页面下载此数据库。此数据库已安装为`Azure\
  \ 就绪`状态，因此你可以顺利完成这些示例。\n\n从本书的`APress`站点下载`AWMini.zip`文件并解压缩`.sql`文件。在`SQL Server\
  \ Management Studio`（适用于`SQL Server 2012`）中打开该`.sql`文件，并连接到你的本地`SQL`实例。运行该`.sql`文件，它将创建`AWMini`数据库。脚本运行完成后，刷新数据库列表，你将在数据库列表中看到新的`AWMini`数据库。\n\
  \n##### 直接部署到 SQL Azure\n\n`SQL Server 2012`使得将本地数据库迁移到`SQL Azure`变得极其简单。在`SQL Server\
  \ 2012`之前，迁移选项需要许多步骤，有些繁琐，并且不太符合`DAC`的整体思路，原因很简单：`DACPAC`不迁移数据。随着`SQL Server 2012`和`DAC\
  \ Fx` 2.0 的发布，这一切都改变了。直接部署到`SQL Azure`就像一个三步向导一样简单。\n\n\n# 第 4 章 ■ 数据迁移与备份策略\n\n\
  ## 图 4-1. \"将数据库部署到 SQL Azure\" 菜单选项\n\n如果尚未打开，请打开 `SQL Server 2012` 的 `SQL Server\
  \ Management Studio`。在 **对象资源管理器** 中，展开服务器的 `数据库` 节点，并右键单击 `AWMini` 数据库。从上下文菜单中选择\
  \ `任务 ➤ 部署到 SQL Azure 数据库`，这将启动数据库部署向导（参见图 4-1）。\n\n在 `部署数据库` 向导中，在 `简介` 页面上单击 `下一步`。在向导的\
  \ `部署设置` 页面上，您需要指定数据库将要迁移到的目标 `SQL Azure` 服务器的连接信息。单击 `连接` 按钮，这将弹出熟悉的 `连接到服务器` 对话框。输入\
  \ `SQL Azure` 服务器名称（格式为 `server.windows.database.net`），以及 `SQL Azure` 服务器的用户名和密码，然后单击\
  \ `连接`。\n\n接下来，为数据库输入一个名称（参见图 4-2）。正如向导所述，这是一个**新建**数据库，而非现有数据库的名称。根据您本地数据库的大小，选择所需的\
  \ `版本`（`Web` 或 `Business`），然后选择所需的数据库大小。向导会自动为您填入 `临时文件名`，因此没有理由更改它。但是请注意，向导创建的是\
  \ `BACPAC`，而不是 `DACPAC`。这意味着您的数据也将被迁移。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 47](img/index-75_1.png)\n\n## 图 4-2. DAC 部署设置\n\n单击 `下一步`，将显示向导的 `摘要` 页面。此页面包含一些重要信息，而不仅仅是“您在向导中选择的选项”。请注意，在摘要的\
  \ `源` 部分下，它列出了 `源数据库大小`，然后告知您您的源数据库可能大于上一向导页面选择的数据库大小。这并非需要恐慌的事情，但这是一个关键信息，提醒您务必确保所选版本和数据库大小足够大。\n\
  \n在 `摘要` 页面上单击 `完成`，以开始部署和迁移。在图 4-3 中，您可以看到迁移过程中采取的步骤，包括创建目标数据库、创建并验证部署计划，然后通过将\
  \ `BACPAC` 应用于目标数据库来执行该计划。部署完成后，单击 `关闭`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 48](img/index-76_1.png)\n\n## 图 4-3. DAC 执行结果\n\n这个过程相当快。`AWMini` 数据库包含 10\
  \ 个表，总共约 200,000 条记录，在我的系统上迁移用了不到一分钟。根据您的网络连接情况，您的结果可能会有所不同（抱歉听起来像广告），但即使是更大的数据库，如完整的\
  \ `AdventureWorks` 数据库，也没有花更长多少时间。\n\n此选项是一种无中断迁移，用于将您的 `SQL Server` 数据库部署到 `SQL\
  \ Azure`。这意味着一旦您单击 `完成`，部署就开始了。然而，图 4-2 中 `临时文件名` 指定的 `BACPAC` 文件在迁移完成后**仍将存在**。根据数据库的大小，`DAC`\
  \ 文件 (`.bacpac`) 可能相当大。即使是 `AWMini` 数据库，文件大小也有 5.5 MB。很棒的一点是，如果您有一个可以打开大型 `XML`\
  \ 文件的程序（并且有足够的内存），您可以查看 `BACPAC` 的结构。\n\n此时的 `BACPAC` 文件可以被归档、删除或用于其他导入服务。在这个简单的例子中，`BACPAC`\
  \ 存储在本地。然而，最佳实践指出，如果您要将数据库导入多个服务器或多次导入，您会希望将 `BACPAC` 存储在 `Windows Azure` 存储中。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n\n![Image 49](img/index-77_1.png)\n\
  \n# 第 4 章 ■ 数据迁移与备份策略\n\n##### 使用 SQL Server 2012 通过 BACPAC 导出和导入到 SQL Azure\n\n\
  如前所述，`将数据库部署到 SQL Azure` 是一个无法中途停止的选项。一旦你点击 `完成`，便无法回头。而且，你必须等待部署完成才能访问 BACPAC。好消息是，SQL\
  \ Server 2012 并没有止步于直接部署到 SQL Azure，通过一个额外的菜单选项，你可以将本地数据库直接导出到 BACPAC，而无需直接部署到 SQL\
  \ Azure。通过此菜单选项，你在部署到 SQL Azure 之前可以灵活处理你的 BACPAC，例如将其复制到另一台电脑，或使用 `导入` 选项将 DAC\
  \ 包导入到多个 SQL Azure 服务器。本节将首先讨论导出选项。\n\n###### DAC 导出\n\n要创建 DACPAC，请右键单击 `AWMini`\
  \ 数据库，然后从上下文菜单中选择 `任务 ➤ 导出数据-tier 应用程序`（参见图 4-4），这将启动 DAC 导出向导。\n\n**图 4-4.** 导出\
  \ DAC 菜单选项\n\n在向导的“简介”页面上单击 `下一步`。在“导出设置”页面（参见图 4-5）中，你有两个选项：`保存到本地磁盘` 和 `保存到 Windows\
  \ Azure`。选择 `保存到本地磁盘` 选项，然后单击 `浏览` 按钮以选择文件名和位置来保存 BACPAC 文件。单击 `下一步`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 50](img/index-78_1.png)\n\n**图 4-5.** DAC 导出设置\n\n在“摘要”页面上，检查指定的设置，然后单击\
  \ `下一步`。然后，`AWMini` 数据库将以 BACPAC 格式导出到你在向导的“导出设置”页面中指定的文件。图 4-6 显示了 DAC 框架构建 BACPAC\
  \ 所采取的步骤。实际上，这是前一个示例直接部署到 SQL Azure 所经历过程的前半部分。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 51](img/index-79_1.png)\n\n**图 4-6.** DAC 导出结果\n\n应该指出的是，即使数据库并非为 SQL\
  \ Database 准备的，前几个步骤也会在每次导出时执行。在尚未为 SQL Database 准备好的数据库上导出到 BACPAC 将会在“验证数据包的架构模型”步骤失败。你将看到的典型错误是“[MS-Description]\
  \ 作为数据包 (DACPAC) 的一部分使用时不支持”和“全文目录：`[CatalogName]` 作为数据包 (DACPAC) 的一部分使用时不支持”。关键是要检查错误，进行更正，然后重新运行导出。\n\
  \n你可以看到，首先从数据库中提取了架构，包括引用，然后执行了验证数据库是否已为 SQL Database 准备好的重要步骤。一旦架构导出并完成所有验证，数据便会被导出。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 52](img/index-80_1.png)\n\
  \n导出成功完成后，单击 `关闭`。此时，你拥有一个可以导入到一个或多个 SQL Azure 服务器的 BACPAC。当然，你不能同时导入到多个 SQL Azure\
  \ 服务器，但与 `将数据库部署到 SQL Azure` 选项不同，利用导出和导入功能，你可以多次导入 BACPAC，而无需再次重新运行导出步骤。现在是时候将该\
  \ DAC 包 (BACPAC) 导入到 SQL Azure 了。\n\n###### DAC 导入\n\n在 SQL Server Management Studio\
  \ 中连接到你的 SQL Azure 服务器，在“对象资源管理器”窗口中，右键单击“数据库”节点，然后从上下文菜单中选择 `导入 Data-tier 应用程序`（参见图\
  \ 4-7），这将启动“导入 Data-tier 应用程序向导”。\n\n**图 4-7.** DAC 导入选项菜单\n\n在向导的“简介”页面上单击 `下一步`。在向导的“导入设置”页面（如图\
  \ 4-8 所示）中，请注意你有两个选项：`从本地磁盘导入` 和 `从 Windows Azure 导入`。我们将 DAC 文件保存到了本地目录，因此选择 `从本地磁盘导入`\
  \ 选项，浏览到你在上一步导出的 DAC 包 (BACPAC) 的位置，然后单击 `下一步`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 53](img/index-81_1.png)\n\n**图 4-8.** DAC 导入设置\n\n向导的下一步，“数据库设置”，如图 4-9\
  \ 所示，应该看起来很熟悉，因为你之前在图 4-2 的“部署数据库向导”的“部署设置”页面中见过它。这里你需要再次连接到你的 SQL Azure 服务器，然后选择新的\
  \ SQL Azure 数据库版本和大小。完成此操作后，单击 `下一步`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 54](img/index-82_1.png)\n\n**图 4-9.** 指定新的数据库实例选项\n\n再次出现“摘要”页面，如果一切正常，请单击\
  \ `下一步` 执行导入。\n\n在图 4-10 中，你可以看到 DAC Fx 为将 DAC 包 (BACPAC) 部署到 SQL Azure 所采取的步骤，这是前一个示例直接部署到\
  \ SQL Azure 所经历过程的后半部分。DAC Fx 首先创建了数据库，然后创建了一个部署计划，该计划会查看当前的 DAC 包并确定如何将其部署到新数据库。然后，它会为每个表创建架构并导入数据。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 55](img/index-83_1.png)\n\
  \n**图 4-10.** BACPAC 导入操作成功\n\n当然，虽然 `将数据库部署到 SQL Azure` 和 `导入/导出 DAC` 选项都能完成相同的任务，但\
  \ `导入/导出 DAC` 选项为你提供了更多的控制和灵活性，例如能够将 DACPAC 部署到多个目标而无需重新导出。然而，如果你需要快速将本地数据库迁移到 SQL\
  \ Azure，`将数据库部署到 SQL Azure` 是一个绝佳的选择。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 导入/导出服务\n\n到目前为止，重点一直放在客户端；从 SQL Server 导入和导出到 BACPAC。导入/导出服务旨在直接在 Windows\
  \ Azure SQL Database 和 Windows Azure BLOB 存储之间进行导入和导出。此服务自 2012 年 1 月下旬起已可用于生产环境，并且是免费的。无需注册，无需输入代码。直接使用即可。怎么用？导入/导出服务直接内置于\
  \ Windows Azure 管理门户中，通过下方功能区栏上的两个按钮：`导入` 和 `导出`。\n\n### 导入\n\n在本节中，你将 BACPAC 文件上传到\
  \ BLOB 存储，然后使用导入/导出服务将其导入到一个全新的 SQL Database 实例中。第一步是将 `AWMini.bacpac` 上传到 Windows\
  \ Azure BLOB 存储。如果你尚未创建 Windows Azure 存储帐户，请在左侧导航窗格中选择 `存储` 选项卡，然后从下方的 `新建` 菜单中选择\
  \ `新建 ➤ 存储 ➤ 快速创建`。在 URL 字段中键入存储帐户的名称，选择区域和订阅，然后单击 `创建存储帐户`。\n\n存储帐户创建后，在门户中选择该帐户名称；然后选择\
  \ `容器` 选项卡。在下方菜单栏上，选择 `添加容器` 以创建一个用于上传 BACPAC 的容器。在“新建 Blob 容器”对话框中，输入容器的名称（我将其称为\
  \ `bacpac`），然后单击复选（`确定`）按钮。\n\n\n\n# 第 4 章：数据迁移与备份策略\n\n## 导入\n\n下一步是将 AWMini BACPAC\
  \ 文件上传到存储账户和容器中。目前此选项在**Windows Azure 管理门户**中不可用，但有几种工具可以帮助你完成此操作。在 CodePlex 上有一个名为**Azure\
  \ 存储浏览器**（`http://azurestorageexplorer.codeplex.com/`）的项目，这是一个用于查看和管理 Windows Azure\
  \ 存储（包括 Blob、表和队列）的实用程序。RedGate 也有一款名为**Cloud Storage Studio**（`http://www.cerebrata.com/Products/CloudStorageStudio/`）的工具，它提供了丰富的功能来管理你的\
  \ Windows Azure 存储。互联网上还有其他一些工具，但这两款是最受欢迎的。\n\n这两款工具中的任意一款都能让你快速轻松地将`AWMini.bacpac`文件上传到你的\
  \ Blob 容器中。\n\n将 BACPAC 文件上传到 Blob 存储后，请使用与你的 Windows Azure 订阅关联的 Windows Live ID\
  \ 登录到 Windows Azure 管理门户（`https://manage.windowsazure.com`）。登录门户后，在左侧导航窗格中选择`SQL\
  \ 数据库`节点。如果你有任何 SQL 数据库实例，门户的下部区域将显示`导入`和`导出`按钮，如图 4-11 所示。否则，只会显示一个`导入`按钮。\n\n\
  ![Image 56](img/index-85_1.png)\n\n`图 4-11.` Windows Azure 管理门户中的导入和导出按钮\n\n单击`导入`按钮，这将打开`导入数据库`对话框。在此对话框中，你首先需要在`Bacpac\
  \ URL`字段中选择黑色的文件夹图标，这将打开`浏览云存储`对话框，如图 4-12 所示。在此对话框的左侧，展开存储账户名称并选择 BACPAC 文件所在的容器。然后从列表中选择`AWMini.bacpac`并点击`打开`。\n\
  \n![Image 57](img/index-86_1.png)\n\n`图 4-12.` 浏览云存储对话框\n\n返回到`导入数据库`对话框，为导入过程中将创建的新数据库输入一个名称。我将其命名为`AWMini2`，以便与上一个示例中创建的数据库区分开。\n\
  \n接下来，选择你将在其中创建数据库并导入 BACPAC 的订阅，然后选择将在其上创建新数据库的服务器。\n\n> **注意：** 存储账户和 Windows\
  \ Azure SQL 数据库实例必须位于同一地理区域；否则，你将收到一条警告，指出数据库和资源不在同一区域，你将无法导入 BACPAC。此限制是为了确保在导入/导出过程中不会产生任何出站传输费用。\n\
  \n最后，输入访问 Windows Azure SQL 数据库服务器的`登录`名和密码。此时`导入数据库`对话框应如图 4-13 所示。如果你想指定新数据库的`版本`和`最大大小`，请勾选`配置高级数据库设置`复选框。如果留空此复选框，导入过程将创建一个\
  \ 1 GB 的`Web 版`数据库。因此，如果你的数据库大于 1 GB，应选择此选项并为导入过程选择合适的数据库大小。\n\n![Image 58](img/index-87_1.png)\n\
  \n`图 4-13.` 已填写完毕的导入数据库对话框\n\n准备就绪后，单击`导入数据库`对话框上的勾选（`确定`）按钮以开始导入过程。对话框会消失，但导入过程确实在进行中，你可以通过观察下方菜单栏的状态来验证。导入成功后，新的状态将显示在下方菜单栏中，表明导入已成功。\n\
  \n## 导出\n\n导出 Windows Azure SQL 数据库实例的过程与导入过程类似。在 Windows Azure 管理门户中，在左侧导航窗格中选择`SQL\
  \ 数据库`节点，然后从数据库列表中选择一个数据库。之前图 4-11 中所示的`导出`按钮现在将可见。单击`导出`按钮将打开`导出数据库`对话框，如图 4-14\
  \ 所示。\n\n![Image 59](img/index-88_1.png)\n\n`图 4-14.` 导出数据库对话框\n\n在`导出数据库`对话框中，`文件名`和`订阅`字段将自动为你填充。但是，你可以自由提供不同的文件名，也可以选择不同的订阅。\n\
  \n选择用于创建 BACPAC 文件的 Blob 存储`账户`和`容器`。但如前所述，如果存储账户和数据库位于不同区域，你将收到警告消息，并且不允许执行导出过程。\n\
  \n输入适当的信息后，单击勾选（`确定`）按钮，这将启动导出过程。与导入过程一样，你可以通过观察下方菜单栏的状态来验证数据库的导出。导出成功后，新的状态将显示在下方菜单栏中，表明导出已成功。然后，你可以使用最初将\
  \ BACPAC 文件上传到 Blob 存储时使用的相同工具来验证导出是否确实成功。\n\n## 生成和发布脚本向导\n\n**生成和发布脚本向导**用于为 SQL\
  \ Server 数据库和/或所选数据库内的相关对象创建 T-SQL 脚本。你可能已经使用过此向导，因此本节不会逐步讲解；相反，本节简要重点介绍向导中的几个步骤，并指出与\
  \ SQL Azure 高效协作所需的选项。\n\nSQL Server 2012 和 SQL Server 2008 R2 具备为 SQL Azure 环境编写本地数据库脚本的能力。\n\
  \nSQL Server 2012/2008 R2 与 SQL Server 2008（在对象脚本编写方面）的区别之一是向导的`高级脚本编写选项`对话框中的一个设置。你可以为脚本编写数据库对象的目标\
  \ SQL Server 版本设置两个属性：`脚本编写为的服务器版本`和`脚本编写为的数据库引擎类型`。`脚本编写为的服务器版本`选项列出了生成和发布脚本向导支持的\
  \ SQL Server 版本，范围从 SQL Server 2000 到 SQL Server 2012。\n\n`脚本编写为的数据库引擎类型`属性有两个选项可供选择：`独立实例`和`SQL\
  \ Azure 数据库`。`SQL Azure 数据库`选项仅适用于 SQL Server 2012 和 2008 R2 服务器版本。例如，如果你将`脚本编写为的服务器版本`设置为\
  \ SQL Server 2008（非 R2），然后将`脚本编写为的数据库引擎类型`属性设置为`SQL Azure 数据库`，则`脚本编写为的服务器版本`属性值会自动更改为\
  \ SQL Server 2012/2008 R2。\n\n生成和发布脚本向导在为 SQL Azure 适当地编写对象脚本方面做得非常出色。\n\n\n## 生成和发布脚本向导\n\
  \n该向导会检查不支持的语法和数据类型，并检查每个表上的主键。因此，以下示例将出于几个原因将 `SQL for Server Version` 设置为 `SQL\
  \ Server 2008`（非 R2 版）。首先，并非所有人都在使用 `SQL Server 2012/2008 R2`，因此没有为 `SQL Azure`\
  \ 编写脚本的选项。其次，本练习将向您展示为在 `SQL Azure` 中运行脚本需要执行哪些步骤。\n\n本节将使用的数据库是您可从 CodePlex 获取的可靠\
  \ `AdventureWorks` 数据库：\n\n[`msftdbprodsamples.codeplex.com/releases/view/55330`](http://msftdbprodsamples.codeplex.com/releases/view/55330)\n\
  \n此数据库下载是专为 `SQL Server 2012` 设计的 `.mdf` 文件。我们将使用适用于 `SQL Server 2012` 的 `SQL Server\
  \ Management Studio` 进行操作，因此请启动它并附加下载的数据库。\n\n### 启动向导\n\n要在 `SQL Server Management\
  \ Studio` (`SSMS`) 中启动 `生成和发布脚本向导`，请打开 `对象资源管理器` 并展开 `数据库` 节点。选择 `AdventureWorks2012`\
  \ 数据库，右键单击它，然后从上下文菜单中选择 `生成脚本`。\n\n在适用于 `SQL Server 2012` 的向导的“简介”页面上，系统会告知您必须遵循四个步骤才能完成此向导：\n\
  \n1.  选择数据库对象。\n2.  指定编写脚本或发布的对象。\n3.  查看选择内容。\n4.  生成脚本。\n\n接下来的章节将逐步讲解这些步骤。\n\n\
  ### 选择目标对象\n\n要选择目标数据库对象，请遵循以下步骤：\n\n1.  在 `生成和发布脚本向导` 的“简介”页面上，单击 `下一步`。\n2.  在\
  \ `选择对象` 页面（参见 `图 4-15`），选择 `选择特定的数据库对象` 选项，因为就本示例而言，您只需选择少数几个对象进行迁移。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 60](img/index-90_1.png)\n\n***图 4-15.** 选择要迁移为脚本形式的对象*\n\n3.  在 `图 4-15`\
  \ 中的对象列表中，展开 `表` 和 `XML 架构集合` 节点，并选择以下对象：\n    *   **表：** `Person.Person`\n    *\
  \   **用户定义数据类型：** `Name`，`NameStyle`\n    *   **XML 架构集合：** `IndividualSurveySchemaCollection`\n\
  \    *   **架构：** `Person`\n4.  在 `选择对象` 页面上单击 `下一步`。\n5.  在 `设置脚本编写对象` 页面上，选择 `图\
  \ 4-16` 中所示的 `保存到新查询窗口` 选项，然后单击 `高级` 按钮。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 61](img/index-91_1.png)\n\n***图 4-16.** 脚本编写选项*\n\n### 设置高级选项\n\n单击 `高级`\
  \ 按钮将打开如 `图 4-17` 所示的 `高级脚本编写选项` 对话框。请遵循以下步骤为此示例的脚本设置高级选项：\n\n1.  在 `高级脚本编写选项` 对话框中，设置以下选项：\n\
  \    *   `将 UDDT 转换为基类型`：`True`\n    *   `编写扩展属性的脚本`：`False`\n    *   `编写登录名的脚本`：`False`\n\
  \    *   `编写 USE DATABASE 语句的脚本`：`False`\n    *   `要编写脚本的数据类型`：`架构`\n    *   `为服务器版本编写脚本`：`SQL\
  \ Server 2012`\n    *   `为数据库引擎类型编写脚本`：`独立实例`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 62](img/index-92_1.png)\n\n***图 4-17.** 高级脚本编写选项对话框*\n\n您还可以将 `Script DROP\
  \ and CREATE` 选项设置为 `Script DROP and CREATE`，如 `图 4-17` 所示，但对于 `SQL Azure` 并非必需此选项。\n\
  \n2.  在 `高级脚本编写选项` 对话框中单击 `确定`，然后在 `生成脚本` 向导中单击 `下一步`。\n3.  在向导的 `摘要` 页面上，查看您的选择，然后单击\
  \ `下一步`。系统将生成 `T-SQL` 脚本，并带您进入 `保存或发布脚本` 页面。\n\n\n4. 点击 **完成**。此时你的脚本已完成，并在 SSMS\
  \ 的查询窗口中显示。\n\n### 审查生成的脚本\n\n打开你创建的文件，让我们快速查看一下生成的 T-SQL。下面的代码片段展示了创建一个 XML 架构集合和一张表的过程。为了节省本章篇幅，大部分\
  \ XML 架构集合以及部分约束的创建被省略了，但你的脚本会显示完整的 `CREATE` 语句。此外，除了你告诉脚本生成向导忽略的部分，以下 T-SQL 看起来与你日常处理的其他对象创建\
  \ T-SQL 类似：\n\n```sql\n/****** Object: Schema [Person] Script Date: 4/22/2012 3:38:28\
  \ PM ******/\n\nCREATE SCHEMA [Person]\n\nGO\n\n/****** Object: XmlSchemaCollection\
  \ [Person].[IndividualSurveySchemaCollection] Script Date: 4/22/2012 3:38:28 PM\
  \ ******/\n\nCREATE XML SCHEMA COLLECTION [Person].[IndividualSurveySchemaCollection]\n\
  \nAS N'<xsd:schema xmlns:xsd=\" [`www.w3.org/2001/XMLSchema`](http://www.w3.org/2001/XMLSchema)\"\
  \n\n...\n\n</xsd:schema>'\n\nGO\n\n/****** Object: UserDefinedDataType [dbo].[Name]\
  \ Script Date: 4/22/2012 3:38:28 PM ******/\n\nCREATE TYPE [dbo].[Name] FROM nvarchar\
  \ NULL\n\nGO\n\n/****** Object: UserDefinedDataType [dbo].[NameStyle] Script Date:\
  \ 4/22/2012 3:38:28 PM ******/\n\nCREATE TYPE [dbo].[NameStyle] FROM [bit] NOT NULL\n\
  \nGO\n\n/****** Object: Table [Person].[Person] Script Date: 4/22/2012 3:38:28 PM\
  \ ******/\n\nSET ANSI_NULLS ON\n\nGO\n\nSET QUOTED_IDENTIFIER ON\n\nGO\n\nCREATE\
  \ TABLE [Person].Person NOT NULL,\n\n[NameStyle] [bit] NOT NULL,\n\n[Title] nvarchar\
  \ NULL,\n\n[FirstName] nvarchar NOT NULL,\n\n[MiddleName] nvarchar NULL,\n\n[LastName]\
  \ nvarchar NOT NULL,\n\n[Suffix] nvarchar NULL,\n\n[EmailPromotion] [int] NOT NULL,\n\
  \n[AdditionalContactInfo] xml NULL,\n\n[Demographics] xml NULL,\n\n[rowguid] [uniqueidentifier]\
  \ ROWGUIDCOL NOT NULL,\n\n[ModifiedDate] [datetime] NOT NULL,\n\nCONSTRAINT [PK_Person_BusinessEntityID]\
  \ PRIMARY KEY CLUSTERED\n\n(\n\n[BusinessEntityID] ASC\n\n)WITH (PAD_INDEX = OFF,\
  \ STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
  \ = ON) ON [PRIMARY]\n\n) ON [PRIMARY] TEXTIMAGE_ON [PRIMARY]\n\nGO\n\nALTER TABLE\
  \ [Person].[Person] ADD CONSTRAINT [DF_Person_NameStyle] DEFAULT ((0)) FOR [NameStyle]\n\
  \nGO\n\nALTER TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_EmailPromotion]\
  \ DEFAULT ((0)) FOR\n\n[EmailPromotion]\n\nGO\n\nALTER TABLE [Person].[Person] ADD\
  \ CONSTRAINT [DF_Person_rowguid] DEFAULT (newid()) FOR [rowguid]\n\nGO\n\nALTER\
  \ TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_ModifiedDate] DEFAULT (getdate())\
  \ FOR\n\n[ModifiedDate]\n\nGO\n```\n\n注意，脚本启用了多个选项，如 `ANSI_NULLS` 和 `ANSI_PADDING`。然后它创建了\
  \ `Person` 表。该表有一个 `rowguid` 列，使用 `uniqueidentifier` 数据类型。`rowguid` 列还有一个默认值，该默认值使用\
  \ `newid()` 函数来自动生成新的 GUID。此表在 `PRIMARY` 文件组上创建，随后通过 `WITH` 子句设置了几个表选项。\n\n### 修复脚本\n\
  \n因为你选择为 SQL Server 2012 生成脚本，所以脚本中包含了一些 SQL Azure 不支持的语法和语句。图 4-18 显示了如果你尝试按生成的原样运行该脚本会看到的一些错误。\n\
  \n**图 4-18.** SQL Azure 执行错误\n\n在此示例中，你只生成了一张表、几个 UDT 和一个 XML 索引的脚本。如果你为更多对象生成脚本，你还会看到类似如下错误：\n\
  \n*   关键字或语句选项 'pad_index' 在此版本的 SQL Server 中不受支持。\n*   关键字或语句选项 'allow_row_locks'\
  \ 在此版本的 SQL Server 中不受支持。\n\n\n*   关键字或语句选项 `textimage_on` 在当前版本的 SQL Server 中不支持。\n\
  *   `ROW GUID COLUMN` 在当前版本的 SQL Server 中不支持。\n*   `文件组引用与分区方案` 在当前版本的 SQL Server\
  \ 中不支持。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 4 章 ■ 数据迁移与备份策略\n\
  \n你可能还会遇到的另一个情况是 SQL Azure 不支持 `堆表`。堆表是指没有聚集索引的表。SQL Azure 目前只支持聚集表。\n\n那么问题就变成了，为了使脚本能在\
  \ SQL Azure 上运行，需要做哪些更改？\n\n为了让脚本在 SQL Azure 下运行，你需要进行一些修改。具体操作如下：\n1.  删除所有 `SET\
  \ ANSI_NULLS ON` 实例。\n2.  删除所有 `ON [PRIMARY]` 实例。\n3.  删除所有 `TEXTIMAGE_ON [PRIMARY]`\
  \ 实例。\n4.  删除以下所有实例：\n    *   `PAD_INDEX = OFF`\n    *   `ALLOW_ROW_LOCKS = ON`\n\
  \    *   `ALLOW_PAGE_LOCKS = ON`\n5.  在 `Person` 表中，修改 `rowguid` 列，移除 `ROWGUIDCOL`\
  \ 关键字。\n6.  为任何堆表添加聚集索引。\n\n## 附录 B\n\n详细讨论了进行这些更改的必要性。现在，这里给出一个简要说明：\n\n*   `ON\
  \ [PRIMARY]` 不需要，因为正如你在第 1 章和第 2 章所学，SQL Azure 隐藏了所有硬件特定的访问和信息。没有 `PRIMARY` 或文件组的概念，因为磁盘空间由\
  \ Microsoft 处理，因此不需要此选项。\n*   根据 SQL Server 联机丛书 (BOL)，你可以移除包含表选项的整个 `WITH` 子句。但是，你真正需要移除的表选项只有第\
  \ 4 步列出的那些（`PAD_INDEX`、`ALLOW_ROW_LOCKS` 和 `ALLOW_PAGE_LOCKS`）。\n*   尽管这个表没有使用，但\
  \ `NEWSEQUENTIALID()` 函数在 SQL Azure 中不受支持，因为 SQL Azure 中没有 `CLR` 支持，因此所有基于 `CLR`\
  \ 的类型都不支持。`NEWSEQUENTIALID()` 的返回值就是其中之一。此外，`ENCRYPTION` 选项也不受支持，因为 SQL Azure 整体上还不支持加密。\n\
  *   SQL Azure 不支持 `堆表`。因此，你需要通过添加聚集索引将任何堆表更改为聚集表。（有趣的是，如果你一次执行一条语句，你实际上可以*创建*堆表。但是，任何向该表的插入操作都会失败。）SQL\
  \ Azure 文档建议的事项之一（如前所列）是将 `Convert UDDTs to Base Types` 属性设置为 `True`。这是因为 SQL Azure\
  \ 不支持用户定义类型。\n\n在对你的 SQL 脚本进行上述修改后，它应该如下所示：\n\n```sql\n/****** Object: Schema [Person]\
  \ Script Date: 4/22/2012 3:38:28 PM ******/\n\nCREATE SCHEMA [Person]\n\nGO\n\n\
  /****** Object: UserDefinedDataType [dbo].[Name] Script Date: 4/22/2012 3:38:28\
  \ PM ******/\n\nCREATE TYPE [dbo].[Name] FROM nvarchar NULL\n\nGO\n\n/****** Object:\
  \ UserDefinedDataType [dbo].[NameStyle] Script Date: 4/22/2012 3:38:28 PM ******/\n\
  \nCREATE TYPE [dbo].[NameStyle] FROM [bit] NOT NULL\n\nGO\n\n/****** Object: Table\
  \ [Person].[Person] Script Date: 4/22/2012 3:38:28 PM ******/\n\nSET ANSI_NULLS\
  \ ON\n\nGO\n\nSET QUOTED_IDENTIFIER ON\n\nGO\n\nCREATE TABLE [Person].Person NOT\
  \ NULL,\n\n[NameStyle] [bit] NOT NULL,\n\n[Title] nvarchar NULL,\n\n[FirstName]\
  \ nvarchar NOT NULL,\n\n[MiddleName] nvarchar NULL,\n\n[LastName] nvarchar NOT NULL,\n\
  \n[Suffix] nvarchar NULL,\n\n[EmailPromotion] [int] NOT NULL,\n\n[AdditionalContactInfo]\
  \ [xml] NULL,\n\n[Demographics] [xml] NULL,\n\n[rowguid] [uniqueidentifier] NOT\
  \ NULL,\n\n[ModifiedDate] [datetime] NOT NULL,\n\nCONSTRAINT [PK_Person_BusinessEntityID]\
  \ PRIMARY KEY CLUSTERED\n\n(\n\n[BusinessEntityID] ASC\n\n)WITH (STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF)\n\n)\n\nGO\n\nALTER TABLE [Person].[Person] ADD CONSTRAINT\
  \ [DF_Person_NameStyle] DEFAULT ((0)) FOR [NameStyle]\n\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 4 章 ■ 数据迁移与备份策略\n\n\n# ALTER TABLE [Person].[Person] 约束添加\n\n```sql\nALTER\
  \ TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_EmailPromotion] DEFAULT ((0))\
  \ FOR [EmailPromotion]\nGO\n\nALTER TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_rowguid]\
  \ DEFAULT (newid()) FOR [rowguid]\nGO\n\nALTER TABLE [Person].[Person] ADD CONSTRAINT\
  \ [DF_Person_ModifiedDate] DEFAULT (getdate()) FOR [ModifiedDate]\nGO\n```\n\n#\
  \ 在 Azure 数据库中执行脚本\n\n现在您已经进行了必要的修正，可以开始在 SQL Azure 数据库中创建对象了。\n\n## 连接到 Azure 数据库并执行脚本\n\
  \n您还没有可以运行脚本的 SQL Azure 数据库，那么现在就创建一个：\n\n1.  连接到您的 SQL Azure 实例（如果需要可参考第 1 章），确保连接到\
  \ `master` 数据库。\n2.  打开一个新的查询窗口，使用第 1 章讨论的语法创建您的 SQL Azure 数据库。将其命名为 `AWMini`，因为本章所有示例都使用此名称。\n\
  3.  切换到生成的脚本。此查询窗口当前连接到您的本地 SQL 实例，因此您需要将其更改为您的 SQL Azure 实例和刚刚创建的数据库。在脚本中任意位置右键单击，然后从上下文菜单中选择“连接”\
  \ -> “更改连接”。\n4.  在“连接到数据库引擎”对话框中，输入您 SQL Azure 实例的信息，并在“连接属性”选项卡上输入您刚创建的数据库名称。\n\
  5.  单击“连接”。\n\n您现在拥有了脚本、一个数据库以及到该数据库的连接。单击“执行”按钮。您的脚本应该运行并在您的 SQL Azure 数据库中创建表、存储过程和数据。\n\
  \nSQL Server “生成和发布脚本向导”是开始理解迁移到 SQL Azure 所需进行的更改的绝佳方式。以此为基础，让我们讨论另一个选项：`bcp` 实用程序。\n\
  \n## bcp 实用程序\n\n`bcp` 实用程序提供在 Microsoft SQL Server 实例之间进行大容量复制的功能。此实用程序随 SQL Server\
  \ 安装，不需要了解或理解 T-SQL 语法。如果您不熟悉 `bcp` 实用程序，请不要将其功能与 SQL Server 中的导入/导出向导混淆或关联。尽管 `bcp`\
  \ 文档将 `bcp` 所做的事情称为“大容量复制”，但请注意，您不能使用单个语句将数据从源 `bcp` 到目标。您必须首先将数据 `bcp` 导出到源；然后，才能将数据\
  \ `bcp` 导入到目标。\n\n`bcp` 实用程序是移动数据的绝佳方式。由于它不处理模式（即模式必须已存在），因此 `bcp` 实用程序是迁移数据的非常快速的方法。例如，您需要用本地数据库的数据刷新\
  \ SQL 数据库，`bcp` 选项就是完成此任务的绝佳解决方案。\n\n**注意**：`bcp` 实用程序非常灵活且强大，您可以对其应用许多选项。本节不深入探讨所有\
  \ `bcp` 选项或深入研究该实用程序的多种用途。您可以在 SQL Server 联机丛书或 Microsoft MSDN 网站上找到相关信息：[`msdn.microsoft.com/en-us/library/ms162802.aspx`](http://msdn.microsoft.com/en-us/library/ms162802.aspx)。\n\
  \n本节介绍如何使用 `bcp` 实用程序从本地数据库导出数据并将数据导入到您的 SQL Azure 数据库。它还讨论了为 SQL Azure 使用 `bcp`\
  \ 实用程序时应注意的一些事项。\n\n### 调用 bcp\n\n`bcp` 实用程序没有 GUI；它是一个由命令提示符驱动的实用程序。但不要被此吓倒，特别是考虑到您使用它的目的。它非常灵活，可能看起来有点令人不知所措，但它非常简单。`bcp`\
  \ 实用程序的基本语法如下：\n\n```bash\nbcp table direction filename - servername - username\
  \ - password\n```\n\n其中：\n\n- `table` 是基于 `direction` 参数的源表或目标表。\n- `direction`\
  \ 是 `in` 或 `out`，具体取决于您是将数据复制到数据库还是从数据库复制出来。\n- `filename` 是您要将数据复制到或从的文件名。\n- `servername`\
  \ 是您要将数据复制到或从的服务器名称。\n- `username` 是用于连接到本地或 SQL Azure 数据库的用户名。\n- `password` 是与用户名关联的密码。\n\
  \n让我们开始从源数据库导出数据。\n\n### 导出数据\n\n首先从本地 SQL 实例复制数据。打开命令提示符，键入图 4-19 所示的命令。为您自己的服务器名称和生成的\
  \ `bcp` 文件的目标目录输入值。在此示例中，我使用了 `-T` 参数，告诉 `bcp` 实用程序使用集成安全性通过可信连接连接到我的本地实例。\n\n**图\
  \ 4-19. 使用 `bcp` 导出数据**\n\n在此示例中，您对 `direction` 参数使用了 `out` 关键字。这是因为您正在将数据从 SQL\
  \ Server **复制出来**。\n\n`-n` 参数执行大容量复制操作，使用数据的本机数据库数据类型。`-q` 参数在 `bcp` 实用程序与 SQL Server\
  \ 实例之间的连接中执行 `SET QUOTED_IDENTIFIERS ON` 语句。\n\n键入命令后，按 Enter 执行 `bcp` 实用程序。在短短几毫秒内，超过\
  \ 71,000 行数据被导出并复制到 `user.dat` 文件（见图 4-20）。\n\n**图 4-20. `bcp` 导出命令的输出**\n\n###\
  \ 导入数据\n\n下一步是将数据复制到云中——具体来说，是复制到您的 SQL Azure `AWMini` 数据库。将数据复制**到**数据库的语法与复制数据**出来**的语法非常相似。您使用\
  \ `in` 关键字并指定 SQL Azure 数据库的服务器名称和凭据，如图 4-21 所示。\n\n**图 4-21. `bcp` 导入期间的 `uniqueidentifier`\
  \ 数据类型错误**\n\n键入命令后，按 Enter 执行 `bcp` 实用程序。注意图 4-22 中，导入全部 71,320 行数据几乎没有花费任何时间。\n\
  \n**图 4-22. 成功的 `bcp` 导入**\n\n如果您曾经收到错误，提示遇到意外的文件结尾（EOF），此错误并非 SQL Azure 特有；`bcp`\
  \ 实用程序对 `uniqueidentifier` 数据类型的列存在问题。您可以在互联网上找到许多关于此问题的帖子和博客。\n\n解决方案是从 SQL Azure\
  \ 表中删除 `rowguid` 列。很酷的是，您不需要重新导出数据。您可以简单地重新执行 `bcp` 导入命令，然后将 `rowguid` 列添加回表中。\n\
  \n如前所述，SQL Server BOL（联机丛书）充满了关于如何使用 `bcp` 实用程序的信息。本节简要介绍了如何使用此实用程序将数据从本地 SQL Server\
  \ 实例移动到 SQL Azure。`bcp` 实用程序是一种移动数据的大容量复制方法。它缺乏 SSIS 将数据从一种数据类型转换为另一种数据类型的能力，也缺乏\
  \ SSIS 的工作流组件。但如果您感兴趣的只是将数据从一个表移动到一个类似的目标表，`bcp` 是您最好的朋友。\n\n# SQL Azure 迁移向导\n\n\
  到目前为止，本章讨论的工具都是由 Microsoft 提供的。然而，有一个出色的第三方实用程序可用，它是专门为迁移到 SQL Azure 而构建的。该实用程序就是\
  \ SQL Azure 迁移向导，它值得一些应得的关注。\n\n\n`SQL Azure 迁移向导`的目标是帮助您将本地的 `SQL Server 2005/2008`\
  \ 数据库迁移到 `SQL Azure`。此工具采用向导驱动，非常易于使用。它将逐步引导您完成所有必需的步骤，使得迁移过程简单且几乎无缝。\n\n您可以在 Codeplex\
  \ 上找到 `SQL Azure 迁移向导`：[`sqlazuremw.codeplex.com/`](http://sqlazuremw.codeplex.com/)。\n\
  \n请注意，尽管这个巧妙的实用工具可以迁移 2005、2008 和 2012 版本的数据库，但它运行的最低要求是 `SQL Server 2008 R2`。\n\
  \n## SQL Azure 备份策略\n\n您的数据虽然已在云端，但事情远不止于此。数据库管理员在处理本地数据存储时触手可及的许多功能，在云端还不存在。这句话的关键词是\
  \ `还不存在`。\n\n### 复制数据库\n\n`数据库复制`功能允许您创建源数据库的单个副本。您可以通过向 `CREATE DATABASE` 语句添加一个新参数来实现：`AS\
  \ COPY OF`。作为复习，`CREATE DATABASE` 的语法如下：\n\n```\nCREATE DATABASE MyDatabase (MAXSIZE=\
  \ 10 GB, EDITION= 'Business')\n```\n\n要创建源数据库的副本，语法现在变为：\n\n```\nCREATE DATABASE\
  \ MyDatabase AS COPY OF [source_server_name].source_database_name\n```\n\n因此，如果您想创建\
  \ `AWMini` 数据库的副本，语法是：\n\n```\nCREATE DATABASE AWMini2 AS COPY OF servername.AWMini\n\
  ```\n\n图 4-23 显示了执行上述语句的情况。有趣的是请注意“消息”窗口中的信息。当您执行带有 `AS COPY OF` 参数的 `CREATE DATABASE`\
  \ 语句时，您会立即收到“命令已成功完成”的消息。这是否意味着复制完成得如此之快？\n\n不是的。此消息意味着复制已`开始`。您还可以在图 4-23 中看到 `AWMini2`\
  \ 数据库已经列在数据库列表中；但这并不意味着数据库复制已经完成。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 68](img/index-101_1.png)\n\n![Image 69](img/index-101_2.png)\n\n**图 4-23.**\
  \ 复制数据库\n\n### 确定复制何时完成\n\n那么问题来了，您如何知道复制何时完成？答案是 Microsoft 创建了一个新的数据管理视图（DMV）来返回数据库复制操作的详细信息。这个\
  \ DMV 叫做 `sys.dm_database_copies`，它返回大量关于数据库复制状态的信息，例如数据库复制过程何时开始和完成、已复制的字节百分比、错误代码等。此外，Microsoft\
  \ 修改了 `sys.databases` 表中的 `state` 和 `state_desc` 列，以提供有关新数据库状态的详细信息。\n\n图 4-24 显示了数据库复制的进度。该语句查看\
  \ `sys.dm_database_copies` DMV 并检查复制状态，报告复制的开始日期和时间、完成百分比以及状态更新的日期和时间（在 `modify_date`\
  \ 列中）。任何复制错误都显示在 `error_code` 和 `error_description` 列中。一旦复制完成，表中与该复制对应的特定行将从表中移除。\n\
  \n**图 4-24.** 检查数据库复制状态\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  #### 自动化数据库复制\n\n您可以通过本地 `SQL Agent` 作业和 `SSIS` 包（如本章前面所述）来调度数据库复制。只要 `Execute SQL`\
  \ 任务的连接信息指向 `SQL Azure` 数据库，该作业就可以像普通的本地 SQL 作业一样进行调度。\n\n尽管这可能不是最理想的解决方案，但它确实是一个选项，并且确实提供了您所需的调度功能。此解决方案的关键是在重新创建之前先删除复制的数据库。\n\
  \n#### 维护备份历史记录\n\n`数据库复制`功能可以让您创建数据库的即时备份，但它不提供创建备份历史记录的方法。换句话说，您无法追加备份并创建多天的备份记录。\n\
  \n然而，您确实有几个选择。\n\n如果您只关心备份当天的数据，可以删除当前的备份副本并重新复制数据库。这是一个可行的选项，并且不需要太多维护。\n\n另一方面，如果您想要一个备份历史记录，这样做就有点棘手了。许多公司（如果不是大多数的话）希望保留一周的备份。这些公司每晚备份数据库，并保留七天的备份，以便可以选择恢复到前一晚备份之前的状态。要使用`数据库复制`功能实现这一点，您必须创建源数据库的七个副本——您有七个备份副本数据库。\n\
  \n这个策略可行，但请记住，您需要为这七个额外的数据库付费。这里的关键是，如果您使用 `SQL Azure`，仔细审视您的备份计划至关重要。\n\n### 使用导入/导出功能进行备份\n\
  \n虽然 `AS COPY OF` 功能很好，但您现在需要为额外的数据库付费。许多公司现在正在考虑使用的备份和恢复解决方案是本章开头讨论的 `导入/导出服务`。将数据库备份存储在\
  \ `Windows Azure BLOB 存储`中，其成本肯定远低于第二个数据库的成本，此外，您还可以拥有数据库的多个备份。当然，这两者都不提供您在本地习惯使用的\
  \ `事务` 和 `差异` 备份解决方案，但 `导入/导出服务` 和 `DAC 框架` 为您提供了更大的灵活性。\n\n### 第三方备份产品\n\n目前市场上有两款非常好的产品，为\
  \ `SQL Azure` 提供出色的备份和恢复功能：\n\n- `Enzo Backup for SQL Azure`\n- `Cloud Services`\n\
  \n#### Enzo 备份\n\n由 `Blue Syntax` 公司开发的 `Enzo Backup for SQL Azure` 是一款本地 Windows\
  \ 应用程序，允许您对 `SQL Azure` 数据库执行备份和恢复请求。该工具的灵活性体现在几个方面。首先，您可以备份到 `BLOB 存储`或本地文件系统，并从中恢复。备份会自动压缩，并包含\
  \ `架构` 和数据。其次，您可以备份整个数据库或特定的 `架构`。您还可以恢复特定的 `架构` 或该 `架构` 或数据库中的特定表。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n备份具有事务一致性，就像 `CREATE DATABASE` 命令的 `AS COPY OF` 功能一样。\n\n`Enzo Backup` 工具还允许您在\
  \ `Azure 平台`中调度备份作业运行。备份完全在云端执行和运行，使用的是 `云代理`。该代理有多种大小（与 `Windows Azure 托管服务`的大小相匹配），允许您决定希望备份执行的速度。有关\
  \ `Enzo Backup for SQL Azure` 工具的更多信息可以在这里找到：\n\n[`www.BlueSyntax.net/backup.aspx`](http://www.BlueSyntax.net/backup.aspx)\n\
  \n#### 云服务\n\n\n# 第五章 SQL 数据库编程\n\n## 章节摘要\n\n在本章中，我们探讨了将数据库架构及相关数据迁移到 `SQL Azure`\
  \ 的各种选项。你了解到每种方法都有其优缺点；例如，`SQL Server` 脚本生成向导会生成架构和数据的脚本，但 `SSIS` 和 `bcp` 实用程序则不会。你还了解到，如果你使用\
  \ `SQL Server 2008 R2` 或 `SQL Server 2012`，可以选择为 `SQL Azure` 生成脚本，该功能会生成可在 `SQL\
  \ Azure` 环境中直接执行的对象脚本。\n\n我们还讨论了 `SQL Azure Copy` 功能，它允许你创建 `SQL Azure` 数据库的副本用于备份目的。\n\
  \n将数据库置于 `SQL Azure` 后，我们现在可以专注于如何为 `SQL Azure` 编程应用程序，这是本章的主题。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n前面的章节为本书的其余部分奠定了基础。你已经了解了 `Windows Azure SQL Database` 的概览，学习了云计算设计选项，并逐步完成了 `Azure`\
  \ 账户的设置。你阅读了关于 `SQL Database` 安全性的内容，包括安全合规性和加密主题；并且在上一章中，你学习了数据迁移（如何将数据放入云端）和备份策略——这些都是数据库管理员（DBA）喜欢听到的内容。\n\
  \n从本章开始，本书的其余部分将专注于使用 `SQL Database` 进行开发。本章将探讨使用各种微软技术为 `SQL Database` 编程，包括 `ODBC`、`ADO.NET`、`LINQ`\
  \ 等。\n\n本章还讨论了当你开始设计和构建与 `SQL Database` 协同工作的新应用程序，或考虑将现有应用程序迁移到 `SQL Database`\
  \ 时的开发注意事项。\n\n你应该开始意识到，`SQL Database` 实际上与你本地的 `SQL Server` 实例并没有*那么*不同。上一章详细讨论了\
  \ `SQL Database` 中的一些 `T-SQL` 差异，但也提到微软正在持续增加功能和特性；因此，差异正在以非常快的速度缩小（这让本书的写作成为一个有趣的挑战，但这是另一个故事了）。开发应用程序的关键不在于将应用程序指向你的云数据库版本，而在于开发应用程序的方法和访问云数据库的设计考量。简单地将数据库迁移到云端并将应用程序指向该实例可能会导致灾难性的结果，例如应用程序性能下降和产生不必要的金钱成本。\n\
  \n本章首先专注于应用程序设计方法，以充分利用 `SQL Database` 应用程序开发。本章其余部分讨论了访问 `SQL Database` 实例的各种技术，向你展示如何使用这些技术连接和检索数据。你将学习正确使用每种技术的场合，因为有很多技术可供选择。本章末尾提供了一个简单、最佳实践的讨论：在远程部署到\
  \ `SQL Database` 之前先在本地进行测试，以确保成功的应用程序部署。\n\n本章还将用一些篇幅讨论应用程序开发最佳实践，以帮助解决前面章节中提到的许多问题，例如节流（`throttling`）和延迟（`latency`），所有这些问题都会影响任何类型的应用程序，无论其托管在本地还是在云端。\n\
  \n## 应用程序部署因素\n\n## 重新部署应用程序\n\n正如第 4 章所述，您可以利用该章的信息将整个数据库推送到 `SQL Database`。但这样做对吗？\n\
  \n第 2 章详细讨论了为云环境设计和发布应用程序的各个方面，包括存储、高可用性、安全性和性能等主题。每个方面都很重要（尤其是性能），在考虑将应用程序迁移到云端时都应讨论。除了安全性，性能是公司对云计算关注的首要问题之一。\n\
  \n公司最不希望看到的事情之一，就是决定将关键应用程序迁移到云端后，却发现其性能不如本地版本的应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 ■ 使用 `SQL Database` 编程\n\n不要认为将本地应用程序迁移到云端会自动导致安全问题和性能损失——事实并非如此。通过规划和正确的方法，您可以非常成功地将应用程序部署到云端。本次讨论以及第\
  \ 2 章的目的，是让您在部署前进行思考和规划，从而采取正确的方法。问题是，什么是正确的方法？\n\n本次讨论实际上关乎两件事。首先，在决定将应用程序迁移到云端时，是移动整个应用程序（即数据库和应用程序）还是只移动一部分？其次，无论您是移动全部还是部分数据库，您是同时移动应用程序，还是将其保留在本地？不要忘记，使用\
  \ `SQL Database` 并不意味着您必须自动将应用程序迁移到 `Azure` 平台。\n\n您可以将数据库移到云端，同时仍将应用程序托管在本地。与所有事物一样，您有选择。让我们讨论托管\
  \ `SQL Database` 应用程序的不同方式。\n\n### 本地托管应用程序\n\n`On-premises` 意味着您的应用程序托管在本地，而不是在\
  \ `Windows Azure` 中，但您的数据库位于 `SQL Database` 实例中。您的应用程序代码使用客户端库访问一个或多个 `SQL Database`\
  \ 实例。一些公司不愿将业务逻辑或特定于应用程序的逻辑置于其企业数据中心之外，而本地托管选项提供了将数据存放在云端同时将应用程序逻辑保留在本地的能力。\n\n\
  虽然这是一个可行的选择，但它也有相关的限制。例如，仅支持以下客户端库：\n- .NET Framework 3.5 SP1 Data Provider for\
  \ SQL Server (`System.Data.SqlClient`) 或更高版本\n- Entity Framework 3.5 SP1 或更高版本\n\
  - SQL Server 2008 R2 Native Client ODBC 驱动程序\n- SQL Server 2008 Native Client Driver（支持但功能较少）\n\
  - SQL Server 2008 Driver for PHP 1.1 版或更高版本\n\n如果您的应用程序使用 `OLE DB`，则必须更改为使用此处列出的客户端库之一。\n\
  \n与将应用程序保留在本地相关的最大考虑因素是成本。每次您在 `SQL Database` 和本地应用程序之间移动数据时，都会有相应的入站数据传输成本（在本书出版时，美国和欧洲为每\
  \ GB $0.05 - $0.12，所有其他地区为每 GB $0.12 - $0.19）。如果您使用 `Azure Storage`，则还有使用该存储的成本（目前为每\
  \ GB $0.037 – $0.093）。同样，这是按 GB 计算的，因此成本很低。一个昂贵模式的例子是每天多次同步大量数据。但请记住，即使同步一个 50GB\
  \ 的数据库，成本也低于几美元。\n\n这些成本和限制不应阻止您为应用程序使用本地托管解决方案。然而，让我们看看 `Azure` 托管解决方案提供了什么。\n\n\
  ### Azure 托管应用程序\n\n`Azure-hosted` 意味着您的应用程序代码托管在 `Windows Azure` 中，而您的数据库位于 `SQL\
  \ Database` 中。\n\n您的应用程序仍然可以使用相同的客户端库来访问 `SQL Database` 中的一个或多个数据库。目前大多数公司正在将现有的\
  \ `ASP.NET` 应用程序发布到 `Windows Azure` 并访问 `SQL Database`。然而，您不仅限于 Web 应用程序：您也可以使用\
  \ `Windows` 桌面应用程序或 `Silverlight` 应用程序，通过 `Entity Framework` 和 `WCF` (`Windows Communication\
  \ Foundation`) Data Services 客户端来访问 `SQL Database`。再次强调，您有丰富的选择。\n\n使用 `Azure` 托管解决方案的好处是能够最小化对\
  \ `SQL Database` 实例请求的网络延迟。同样重要的是，您削减了在 `SQL Database` 和应用程序之间移动数据的成本。只要您的 `Windows\
  \ Azure` 和 `SQL Database` 位于同一子区域，两者之间的带宽使用是免费的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 5 章 ■ 使用 `SQL Database` 编程\n\n通过将应用程序和数据库都放在 `Azure` 中，您还可以获得应用程序与数据库之间事务处理更高效的好处，因为这样做最小化了两者之间的网络延迟。\n\
  \n但您会产生计算成本，目前为每小时 $0.12。`Compute hours` 是您的应用程序部署到 `Windows Azure` 的时间。即使您的应用程序未处于运行状态，您也会被计费。按小时计费，不足一小时的部分按整小时计算。在开发和测试应用程序时，您应该删除未使用的计算实例。因此，这里的关键是`在远程部署前在本地进行测试`。\n\
  \n### 如何选择？\n\n是否将应用程序迁移到云端或将其保留在本地，完全由您决定，这不应仅仅由您刚刚在最后两节中读到的内容来决定。决策并非如此简单。您需要考虑其他几个因素，例如成本、数据流量和带宽，然后基于对此信息的分析做出决定。例如，对于一个网络流量很少的小公司来说，由于计算成本，在\
  \ `Azure` 中托管应用程序可能不是一个明智的决定。然而，同一个公司可以将其数据库保留在 `Azure` 中，同时将应用程序保留在本地，因为数据传输成本极小，并且仍然可以获得\
  \ `SQL Database`（故障转移、高可用性等）的好处。\n\n在许多公司中，最初的目标并非采用“全有或全无”的方法。公司会花一些时间审视其数据库和应用程序，决定哪些功能适合放入云端，并对此进行测试。他们首先测试性能，以确保应用程序在生产环境中部署到\
  \ `Windows Azure` 时，其性能与本地解决方案相当。思路是将重要事项放在首位，以确保 `Azure` 部署成功。如果有必要，可以逐步推出您的应用程序，并在部署前在本地进行测试。\n\
  \n是部署全部还是部分数据库和应用程序，由您决定。第 2 章详细讨论了这个问题，本章不再赘述，只希望您在做出决定前，应审视所有事实。\n\n## 连接到 SQL\
  \ Database\n\n开发与 `SQL Database` 一起工作的应用程序并非什么特别复杂或神秘的科学技术，但它需要知道预期的情况以及您可以使用的功能。您之前已经了解到并非所有客户端库都与\
  \ `SQL Database` 兼容，并看到了支持的库。附录 B 将花一些时间讨论 `SQL Database` 中存在的 `T-SQL` 功能。即使在本书编写过程中，随着\
  \ `Microsoft` 不断添加功能，支持的功能列表也在变化。本章重点从客户端应用程序的角度进行阐述。\n\n# 第 5 章 ■ 使用 SQL 数据库进行编程\n\
  \n本节将探讨使用多种技术连接和查询 `SQL 数据库` 实例，包括 `ADO.NET`、`ODBC` 和 `WCF 数据服务`。您之前已详细了解了迁移到 `Azure`\
  \ 平台的正确方法。您必须考虑许多事项，包括以下内容：\n\n-   `SQL 数据库` 仅通过 `TCP 端口 1433` 提供。\n-   `SQL 数据库`\
  \ 当前不支持 `OLE DB`。\n-   `SQL 数据库` 仅支持 `SQL Server` 身份验证。不支持 `Windows 身份验证`。\n-  \
  \ 连接到 `SQL 数据库` 时，必须在连接字符串中指定目标数据库。否则，您将连接到 `master` 数据库。\n-   `SQL 数据库` 不支持分布式事务（影响多个资源的事务，例如通过分片涉及的表或不同数据库）。\n\
  -   您必须确保 `SQL 数据库` 防火墙已配置为接受连接。\n-   您必须确定应用程序中任何嵌入（内联）的 `T-SQL` 是否受 `SQL 数据库`\
  \ 支持。\n-   连接到 `SQL 数据库` 时，必须使用登录名格式 `<login>@<server>`，因为某些工具实现 `表格数据流 (TDS)` 的方式不同。\n\
  \n此列表中的大多数项目都是自解释的，但让我们讨论其中几个。首先，强烈建议您阅读 `附录 B`，其中讨论了支持和不支持的 `T-SQL` 语法。此外，如果您有任何内联或嵌入的\
  \ `T-SQL` 代码，您需要检查您的应用程序，确保 `T-SQL` 满足 `附录 B` 中列出的要求。查看受支持 `T-SQL` 语法的在线帮助以获取最新的语法也可能对您有益。\n\
  \n其次，虽然不支持分布式事务，但 `第 10 章` 讨论了一种称为分片和 `SQL 联邦` 的技术，可用于显著提高性能。分片是根据条件（如地理位置）在多个数据库之间水平分区数据的概念，然后使用诸如\
  \ `ADO.NET 任务并行库 (TPL)` 之类的技术为您的应用程序添加并行性和并发性。`SQL 联邦` 将相同的概念应用于 `SQL 数据库`，在数据库级别应用分区，内置于\
  \ `SQL 数据库` 中。这些主题也在 `第 2 章` 中向您介绍过。\n\n第三，仔细考虑 `OLE DB`。`SQL 数据库` 当前不支持通过 `OLE\
  \ DB` 连接，但支持 `OLE DB` 已在 `Microsoft` 的计划中。然而，正如您在 `第 3 章` 中学到的，您可以使用 `SSIS` 通过 `OLE\
  \ DB` 进行连接。但是，不建议您尝试使用 `OLE DB`——请等到它得到完全支持。\n\n让我们开始一些编码。接下来的几节将展示如何使用不同的库（如 `ADO.NET`、`ODBC`、`sqlcmd`\
  \ 实用工具和 `WCF 数据服务`）连接到 `SQL 数据库` 以查询 `SQL 数据库`。\n\n本章中的示例将对 `SQL Server 2012` 和\
  \ `Windows Azure SQL 数据库` 使用 `AdventureWorks2012` 数据库。适用于 `SQL Server 2012` 的本地\
  \ `AdventureWorks` 数据库版本可以在此处找到：\n\n[`msftdbprodsamples.codeplex.com/releases/view/93587`](http://msftdbprodsamples.codeplex.com/releases/view/93587)\n\
  \n下载名为 `AdventureWorks2012_Database.zip` 的文件。`Windows Azure SQL 数据库` 版本可以在此处找到：\n\
  \n[`msftdbprodsamples.codeplex.com/releases/view/37304`](http://msftdbprodsamples.codeplex.com/releases/view/37304)\n\
  \n用于为 `SQL 数据库` 安装数据库的说明包含在下载文件以及下载页面中。您需要安装这两个数据库才能完成本章中的示例。\n\n### ADO.NET\n\n\
  `Microsoft` 通过为 `ADO.NET`、`Java` 和 `PHP` 等多个客户端库提供必要的连接字符串，使得将应用程序连接到 `SQL 数据库`\
  \ 实例变得非常容易，如 `图 5-1` 所示。您可以通过在 `导航` 窗格中选择 `SQL 数据库` 选项，选择适当的数据库，然后在 `仪表板` 页面上单击\
  \ `显示连接字符串` 按钮，在 `Windows Azure 管理门户` 中找到连接信息。\n\n将 `ADO.NET` 连接复制到剪贴板。您很快就会用到它。\n\
  \n![Image 70](img/index-108_1.png)\n\n*图 5-1. 连接字符串*\n\n#### 建立连接\n\n让我们首先看看如何使用\
  \ `ADO.NET` 连接到 `SQL 数据库` 实例。启动 `Visual Studio 2010` 实例，并创建一个新的 `C#` `Windows 窗体`\
  \ 应用程序。然后，按照以下步骤操作：\n\n1.  在 `Form1` 上放置一个按钮，然后双击新按钮以查看其 `Click` 事件。\n\n2.  在向单击事件放置任何代码之前，您需要声明以使用适当的\
  \ `SqlConnection` 类：\n\n```\nusing System.Data.SqlClient;\n```\n\n3.  接下来，让我们添加一个方法来获取连接字符串。为了演示连接到\
  \ `SQL 数据库` 与本地数据库的区别，让我们首先连接到本地数据库副本。然后，您将更改连接字符串以连接到 `SQL 数据库` 实例。在单击事件下方，添加一个名为\
  \ `GetConString` 的新方法，该方法返回本地 `SQL Server` 实例的连接字符串。如果您有命名实例，请确保正确输入服务器名称（使用转义字符）。需要编写的代码如下：\n\
  \n```\nstring GetConString()\n{\n    return \"Server=server;Database=AdventureWorks2012;User\
  \ ID=sa;Password=password;\";\n}\n```\n\n4.  回到按钮的单击事件，并添加以下代码。此代码调用您之前添加的 `GetConString`\
  \ 方法，返回连接字符串，建立并打开到本地数据库的连接，然后关闭连接：\n\n```\nprivate void button1_Click(object sender,\
  \ EventArgs e)\n{\n    string connStr = GetConString();\n\n    using (SqlConnection\
  \ conn = new SqlConnection(connStr))\n    {\n        try\n        {\n          \
  \  conn.Open();\n            MessageBox.Show(\"连接已建立。\");\n        }\n        catch\
  \ (SqlException ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n\
  \        }\n        finally\n        {\n            conn.Close();\n        }\n \
  \   }\n}\n```\n\n5.  运行应用程序，并单击窗体上的按钮。您应该会看到一个消息框显示“连接已建立。”\n\n现在，让我们将这个简单的应用程序更改为连接到\
  \ `SQL 数据库`。您希望返回 `ADO.NET` 连接字符串，而不是本地数据库的连接字符串。继续如下：\n\n6.  回到您的 `Visual Studio`\
  \ 项目中，在 `GetConString` 方法中粘贴您之前从 `Windows Azure 管理门户` 复制的 `SQL 数据库` `ADO.NET` 连接字符串，如下面的代码所示。确保在连接字符串中输入正确的密码：\n\
  \n```\nstring GetConString()\n{\n    return \"Server=tcp:servername.database.windows.net;Database=AdventureWorks2012;\
  \ UserID=username@servername;Password=password; Trusted_Connection=False;Encrypt=True;Connection\
  \ Timeout=30\";\n}\n```\n\n7.  在运行应用程序之前，请确保您的 `Azure` 防火墙设置是最新的（通过 `SQL 数据库服务器管理`\
  \ 页面）。然后运行应用程序并单击窗体上的按钮。如果一切配置正确，您应该会看到一个消息框显示“连接已建立。”\n\n\n诚然，这是一个非常简单的例子，但它说明了将现有应用程序指向\
  \ SQL Database 是多么容易。需要注意的问题在于你的应用程序包含什么。如前所述，如果你有任何内联 T-SQL，至少需要确保其语法得到 SQL Database\
  \ 的支持。通常情况下它是兼容的，但检查并`测试`始终是最稳妥的做法。\n\n即使你已连接到 SQL Database，这会影响你的数据访问代码吗？接下来的两节将讨论连接到\
  \ SQL Azure 时使用数据读取器和数据集。\n\n#### 使用数据读取器\n\n随着你对 SQL Database 越来越熟悉，你会发现除了可能需要修改内联\
  \ T-SQL 外，几乎不需要对应用程序代码做太多改动。这一切的美妙之处在于，你正在使用一种久经考验且值得信赖的数据访问技术——ADO.NET。因此，实际上没有改变什么。让我们修改应用程序和点击事件代码来说明这一点。请按以下步骤操作：\n\
  \n1.  向窗体添加一个新的列表框。\n\n2.  在点击事件中，添加以下代码片段中**粗体**显示的代码。这段新代码使用 `SqlDataReader` 类对\
  \ SQL Database 实例执行一个简单的 `SELECT` 命令，然后遍历 `SqlDataReader` 来填充列表框：\n\n```\nprivate\
  \ void button1_Click(object sender, EventArgs e)\n{\n    string connStr = GetConString();\n\
  \    using (SqlConnection conn = new SqlConnection(connStr))\n    {\n        SqlCommand\
  \ cmd = new SqlCommand(\"SELECT FirstName, LastName FROM Person.Person\", conn);\n\
  \        conn.Open();\n        SqlDataReader rdr = cmd.ExecuteReader();\n      \
  \  try\n        {\n            while (rdr.Read())\n            {\n             \
  \   listBox1.Items.Add(rdr[0].ToString());\n            }\n            rdr.Close();\n\
  \        }\n        catch (SqlException ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n\
  \        }\n    }\n}\n```\n\n3.  运行应用程序，点击窗体上的按钮。几秒钟内，列表框就会填满来自 Users 表的姓名。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 5 章 ■ 使用 SQL 数据库编程\n\n关键在于，你可以用本地连接字符串替换它，并且仍然有效。这是因为你使用\
  \ ADO.NET 来处理连接，而它并不关心数据库在哪里。接下来，让我们把这个例子再推进一步，看看如何使用数据集。\n\n#### 使用数据集\n\n在上一个例子中，你发现使用\
  \ `SqlDataReader` 查询 SQL Database 实例时语法没有差异。这个例子使用 `SqlCommand` 类和 `SqlDataAdapter`\
  \ 来查询 SQL Database 并填充数据集。步骤如下：\n\n1.  在按钮的点击事件中，用以下代码替换现有代码：\n\n```\nusing (SqlConnection\
  \ conn = new SqlConnection(connStr))\n{\n    try\n    {\n        using (SqlCommand\
  \ cmd = new SqlCommand())\n        {\n            conn.Open();\n            SqlDataAdapter\
  \ da = new SqlDataAdapter();\n            cmd.CommandText = \"SELECT FirstName,\
  \ LastName FROM Person.Person\";\n            cmd.Connection = conn;\n         \
  \   cmd.CommandType = CommandType.Text;\n            da.SelectCommand = cmd;\n \
  \           DataSet ds = new DataSet(\"Person\");\n            da.Fill(ds);\n  \
  \          listBox1.DataSource = ds.Tables[0];\n            listBox1.DisplayMember\
  \ = \"FirstName\";\n        }\n    }\n    catch (SqlException ex)\n    {\n     \
  \   MessageBox.Show(ex.Message.ToString());\n    }\n}\n```\n\n这段代码创建了一个新连接，使用与上一个示例相同的连接信息，然后创建了一个新的\
  \ `SqlCommand` 实例。设置好 `SqlCommand` 的连接、文本和类型后，使用实例化的 `SqlDataAdapter` 来执行它。创建一个新的数据集并从\
  \ `SqlDataAdapter` 填充，然后将其应用到列表框的数据源属性。\n\n2.  运行应用程序，点击窗体上的按钮。同样，列表框会填满来自 SQL Database\
  \ 实例中 Users 表的姓名。同样，你可以将连接字符串更改指向本地数据库，代码也能正常工作。\n\n那么，什么样的代码会*不*工作呢？假设你的应用程序包含如下代码，该代码创建了一个没有聚集索引的表：\n\
  \n```\nusing (SqlConnection conn = new SqlConnection(connStr))\n{\n    try\n   \
  \ {\n        using (SqlCommand cmd = new SqlCommand())\n        {\n            //\
  \ 代码不完整，但原文如此\n        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n# 第 5 章：使用 SQL 数据库编程\n\n### ODBC\n\n这里的内容虽然并非惊天动地或具有革命性，但让我们通过一个示例来了解 ODBC\
  \ 连接如何工作，并展示您的 ODBC 类仍能像您习惯的那样正常工作。请遵循以下步骤：\n\n1.  以正确的方式操作，创建一个枚举来处理您正在使用的连接类型。\n\
  2.  如以下代码片段所示，修改 `GetConString` 方法以接受一个参数。该参数允许您指定连接类型，以便返回正确的连接字符串（ADO.NET 或 ODBC）。请务必使用您正确的密码、用户名和服务器名称以及正确的服务器。如果将\
  \ `ADO_NET` 值传入此方法，则返回 ADO.NET 连接字符串；否则返回 ODBC 连接字符串：\n\n    ```csharp\n    enum\
  \ ConnType\n    {\n        ADO_NET = 1,\n        ODBC = 2\n    }\n\n    string GetConString(ConnType\
  \ connType)\n    {\n        if (connType == ConnType.ADO_NET)\n            return\
  \ \"Server=tcp: *servername*.database.windows.net;Database=AdventureWorks2012; User\
  \ ID= *username*@ *servername*;Password= *password*;Trusted_Connection=False;Encrypt=True;\"\
  ;\n        else\n            return \"Driver={SQL Server Native Client 10.0};Server=tcp:\
  \ *servername*.database.windows.net;Database=AdventureWorks2012;Uid= *username*@servername;Pwd=\
  \ *password*;Encrypt=yes;\";\n    }\n    ```\n\n3.  将以下声明添加到项目中：\n    `using System.Data.Odbc;`\n\
  \n4.  在窗体上放置第二个按钮以及一个 `DataGridView`。在其点击事件中，添加以下代码。这段代码与 ADO.NET 示例中的代码类似，但它使用的是\
  \ `Odbc` 数据类而非 `Sql` 数据类。为了清晰起见，请将这个新按钮的 `Text` 属性更改为“ODBC”，以便您区分此按钮和第一个按钮。\n  \
  \  注意代码中将值“ODBC”传递给 `GetConString` 方法，从而返回 ODBC 连接字符串：\n\n    ```csharp\n    string\
  \ connStr = GetConString(ConnType.ODBC);\n    using (OdbcConnection conn = new OdbcConnection(connStr))\n\
  \    {\n        try\n        {\n            conn.Open();\n            OdbcDataAdapter\
  \ da = new OdbcDataAdapter();\n            OdbcCommand cmd = new OdbcCommand(\"\
  SELECT FirstName, LastName FROM Person.Person\", conn);\n            cmd.CommandType\
  \ = CommandType.Text;\n            da.SelectCommand = cmd;\n            DataSet\
  \ ds = new DataSet(\"Person\");\n            da.Fill(ds);\n            listBox1.DataSource\
  \ = ds.Tables[0];\n            dataGridView1.DataSource = ds.Tables[0];\n      \
  \      listBox1.DisplayMember = \"FirstName\";\n        }\n        catch (OdbcException\
  \ ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n        }\n\
  \    }\n    ```\n\n5.  在运行项目之前，您需要修改第一个按钮背后的代码，以传递适当的 `Enum` 并返回正确的连接字符串。在 `Button1`\
  \ 背后代码的开头添加以下行：\n    `string connStr = GetConString(ConnType.ADO_NET );`\n\n尽管此代码完全有效，并且可以在您本地的\
  \ SQL Server 实例上成功运行，但当针对 SQL Database 实例执行时，它却无法工作。为什么？请继续将按钮点击事件中的代码替换为此代码，并运行应用程序。您将在消息框中收到的错误表明：不支持没有聚集索引的\
