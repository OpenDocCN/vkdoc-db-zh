- fmt: '# Chapter 7 ■ SQL Data SynC


    ## The table and columns have been selected


    At this point the dataset could be complete, but for this example a filter will
    be applied. Applying a filter is quite easy. As shown in Figure [7-13, c](#index_split_001.html#p161)lick
    the `Filter` checkbox next to the column you want to filter on and apply the row
    filtering criteria in the `Row Filtering` section. In this example the `BusinessEntityID`
    column of the `Person.BusinessEntity` table has been selected. Enter a value of
    `10000` in the filter `Value` field to filter all Persons with an `BusinessentityID`
    greater than `10,000`.


    ***Figure 7-13.** Row filtering*


    Querying the `Person.BusinessEntity` table in the hub database will reveal IDs
    `1` to `20777`, which were added during the creation of the database. Because
    of the filter applied to this sync group, only rows with `BusinessEntityID` greater
    than `10,000` will be synchronized to the member databases.


    ## Applying Conflict Resolution


    Configuring the sync group is almost complete. The next step is to set the Conflict
    Resolution. A data conflict occurs whenever the same data in two or more databases
    within a sync group is changed between synchronizations. In the current release
    of SQL Data Sync you can select between two resolution policies: Hub Wins and
    Client Wins.


    • **Hub Wins:** The first row change written to the hub is kept. Subsequent attempts
    to write to the same row in the hub are ignored. The first write to the hub is
    propagated out to all member databases.


    • **Client Wins:** Each row change in a member database is written to the hub,
    overwriting prior changes to the same row. The last write to the hub is then propagated
    out to all member databases.


    No matter which policy you adopt, one of the changed rows is kept and the others
    are lost whenever a conflict arises.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 117](index-162_1.jpg)


    ## Setting the Sync Schedule


    Data synchronization can be scheduled from a minimum of 5 minutes to a maximum
    of 1 month. The default is 30 minutes, but this example won’t wait for the scheduler
    to pick it up. For the purposes of this example, we’ll do the synchronization
    manually. Thus, disable the automatic synchronization by unchecking the `Enabled`
    check box.


    The complete configuration of the sync group should look like Figure [7-14.](#index_split_001.html#p162)


    ***Figure 7-14.** The complete sync group configuration*


    The configuration is done; it is now time to deploy and provision.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 118](index-163_1.jpg)


    ![Image 119](index-163_2.png)


    ## Deploying the Sync Group


    Provisioning the databases and deploying the sync group is as easy as clicking
    the `Deploy` button on the ribbon.


    Figure [7-15 sho](#index_split_001.html#p163)ws that each database will be set
    to a status of `Provisioning` during the deployment process. Once each database
    is ready to go, its status will be set to `Ready`.


    ***Figure 7-15.** Database provisioning*


    The on-premises database will more than likely finish provisioning before the
    other two, and then would be a good time to look at what changes were applied
    during the provisioning process. Figure [7-16 sho](#index_split_001.html#p163)ws
    the changes made to the on-premises database.


    ***Figure 7-16.** Selected tables in the on-premises database*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Along with the data tables (`HumanResources.Employee` and `Person.BusinessEntity`),
    SQL Data Sync created six new tables, system synchronization tables, in both databases:


    • `schema_info`: Tracks member schema information.


    • `scope_config` / `scope_info`: Used by the Sync Framework to determine what
    tables, filters, and so on are being synchronized. Each database that is participating
    in a sync includes these tables and includes at least one scope (if they’re being
    synchronized).


    • `<table>_dss_tracking`: Tracks changes to the related user table.


    • `provision_marker`: A metadata table used internally as part of the change-tracking
    mechanism.


    Each relationship has its own scope—thus the need for the scope tables. For example,
    the hub-to-Member1 relationship has a scope, and the hub-to-Member2 relationship
    has its own, different scope. Just like sync groups, these scopes define the data
    to be shared among members; multiple scopes make up a sync group. Scopes aren’t
    exposed, in order to simplify management of the Data Sync Service.


    In this example, four tables were created, but keep in mind that a tracking table
    is created for each table included in the sync. For example, had you included
    the `Docs` and `UserDocs` tables in the sync, you would also see `Docs_tracking`
    and `UserDocs_tracking` tables. Each tracking table is responsible for storing
    the changes for its respective table.


    Also added, but not shown in Figure [7-16, ar](#index_split_001.html#p163)e *triggers*.
    A trigger is added to each base table that updates the tracking table when a change
    occurs. Some stored procedures are also added to each database; the Data Sync
    Service uses them to get and apply changes efficiently.


    ## Debugging and the Log Viewer


    By now you will have realized that both members of the sync group provisioned
    correctly, but the hub did not. The icon for the hub database turned red, with
    an error message stating that the provision failed. Why?


    There is a wonderful way to find out what happened, and that is through the Log
    Viewer. On the toolbar, click the `Log Viewer` button. Figure [7-17 sho](#index_split_001.html#p165)ws
    a list of different types of information display, including Errors. To view the
    detail of the error, click the [copy] link at the end of the `Message` column,
    which will copy the contents of the error message to the Clipboard.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 120](index-165_1.png)


    ***Figure 7-17.** Selected tables*


    Open Notepad and copy the contents of the Clipboard, which will reveal that even
    though the `OrganizationLevel` column of the `HumanResources.Employee` table was
    not red when defining our dataset, SQL Data Sync cannot sync that column because
    “it is either a computed column or is the result of a UNION operator.” Well, indeed
    that column is a computed column.


    Luckily, this is easy enough to fix. Go back into the Sync Group window, and click
    the `Edit Dataset` button. Select the `HumanResources.Employee` table and uncheck
    the `OrganizationLevel` column. Click the `Deploy` button on the toolbar to re-provision
    all the databases. This time the deployment will succeed and launch the initial
    synchronization.


    ## Looking at the Synchronized Data


    To validate that the synchronization was successful, jump over to SQL Server Management
    Studio and open a query window to the on-premises member database `AW2012`. Type
    in the following query:


    ```

    SELECT * FROM Person.BusinessEntity

    ```


    Figure [7-18 sho](#index_split_001.html#p166)ws that indeed all rows greater than
    `10,000` were synchronized to the member databases.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 121](index-166_1.png)


    ***Figure 7-18.** Data validation*


    ## Editing Data and Resynchronizing


    Now let’s edit some data and resynchronize, and then validate that the changes
    were made by requerying the data.


    Go back to SQL Server Management Studio and open a query window to the on-premises
    member database `AW2012`. Type in the following query:


    ```

    UPDATE HumanResources.Employee SET Job Title = ''Head Geek'' WHERE BusinessEntityID
    = 1

    ```


    Open up another query window connected to the SQL Database member instance and
    execute the following query:


    ```

    UPDATE HumanResources.Employee SET Job Title = ''VP of Techy Stuff'' WHERE BusinessEntityID
    = 2

    ```


    Instead of waiting for the scheduled sync to pick up, click the `Sync Now` button
    on the toolbar. The synchronization should only take a few seconds, at which point
    you should be able to query the `HumanResources`.'
