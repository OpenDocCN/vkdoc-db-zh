    1\. In the Advanced Scripting Options dialog, set the following options:


    •


    **Convert UDDTs to Base Types:** True


    •


    **Script Extended Properties:** False


    •


    **Script Logins:** False


    •


    **Script USE DATABASE:** False


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 62](index-92_1.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    •


    **Types of data to script:** Schema


    •


    **Script for Server Version:** SQL Server 2012


    •


    **Script for the database engine type:** Stand-Alone Instance


    ***Figure 4-17.** The Advanced Scripting Options dialog*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    You can also set the Script DROP and CREATE option to Script DROP and CREATE,
    as


    shown in Figure [4-17](#index_split_001.html#p92), but that option isn’t required
    for SQL Azure.


    2\. Click OK in the Advanced Scripting Options dialog, and then click Next in
    the Generate Scripts wizard.


    3\. On the wizard’s Summary page, review your selections, and then click Next.
    The T-SQL


    script is generated, and you’re taken to the Save or Publish Scripts page.'
  trans: "\n# 生成和发布脚本向导\n\n该向导会检查不支持的语法和数据类型，并检查每个表上的主键。因此，以下示例将出于几个原因将 `SQL for Server\
    \ Version` 设置为 `SQL Server 2008`（非 R2 版）。首先，并非所有人都在使用 `SQL Server 2012/2008 R2`，因此没有为\
    \ `SQL Azure` 编写脚本的选项。其次，本练习将向您展示为在 `SQL Azure` 中运行脚本需要执行哪些步骤。\n\n本节将使用的数据库是您可从\
    \ CodePlex 获取的可靠 `AdventureWorks` 数据库：\n\n[`msftdbprodsamples.codeplex.com/releases/view/55330`](http://msftdbprodsamples.codeplex.com/releases/view/55330)\n\
    \n此数据库下载是专为 `SQL Server 2012` 设计的 `.mdf` 文件。我们将使用适用于 `SQL Server 2012` 的 `SQL\
    \ Server Management Studio` 进行操作，因此请启动它并附加下载的数据库。\n\n## 启动向导\n\n要在 `SQL Server\
    \ Management Studio` (`SSMS`) 中启动 `生成和发布脚本向导`，请打开 `对象资源管理器` 并展开 `数据库` 节点。选择 `AdventureWorks2012`\
    \ 数据库，右键单击它，然后从上下文菜单中选择 `生成脚本`。\n\n在适用于 `SQL Server 2012` 的向导的“简介”页面上，系统会告知您必须遵循四个步骤才能完成此向导：\n\
    \n1.  选择数据库对象。\n2.  指定编写脚本或发布的对象。\n3.  查看选择内容。\n4.  生成脚本。\n\n接下来的章节将逐步讲解这些步骤。\n\
    \n## 选择目标对象\n\n要选择目标数据库对象，请遵循以下步骤：\n\n1.  在 `生成和发布脚本向导` 的“简介”页面上，单击 `下一步`。\n2.\
    \  在 `选择对象` 页面（参见 `图 4-15`），选择 `选择特定的数据库对象` 选项，因为就本示例而言，您只需选择少数几个对象进行迁移。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图片 60](img/index-90_1.png)\n\n***图 4-15.** 选择要迁移为脚本形式的对象*\n\n3.  在 `图 4-15`\
    \ 中的对象列表中，展开 `表` 和 `XML 架构集合` 节点，并选择以下对象：\n    *   **表：** `Person.Person`\n  \
    \  *   **用户定义数据类型：** `Name`，`NameStyle`\n    *   **XML 架构集合：** `IndividualSurveySchemaCollection`\n\
    \    *   **架构：** `Person`\n4.  在 `选择对象` 页面上单击 `下一步`。\n5.  在 `设置脚本编写对象` 页面上，选择\
    \ `图 4-16` 中所示的 `保存到新查询窗口` 选项，然后单击 `高级` 按钮。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图片 61](img/index-91_1.png)\n\n***图 4-16.** 脚本编写选项*\n\n## 设置高级选项\n\n单击 `高级`\
    \ 按钮将打开如 `图 4-17` 所示的 `高级脚本编写选项` 对话框。请遵循以下步骤为此示例的脚本设置高级选项：\n\n1.  在 `高级脚本编写选项`\
    \ 对话框中，设置以下选项：\n    *   `将 UDDT 转换为基类型`：`True`\n    *   `编写扩展属性的脚本`：`False`\n\
    \    *   `编写登录名的脚本`：`False`\n    *   `编写 USE DATABASE 语句的脚本`：`False`\n    *  \
    \ `要编写脚本的数据类型`：`架构`\n    *   `为服务器版本编写脚本`：`SQL Server 2012`\n    *   `为数据库引擎类型编写脚本`：`独立实例`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 62](img/index-92_1.png)\n\
    \n***图 4-17.** 高级脚本编写选项对话框*\n\n您还可以将 `Script DROP and CREATE` 选项设置为 `Script DROP\
    \ and CREATE`，如 `图 4-17` 所示，但对于 `SQL Azure` 并非必需此选项。\n\n2.  在 `高级脚本编写选项` 对话框中单击\
    \ `确定`，然后在 `生成脚本` 向导中单击 `下一步`。\n3.  在向导的 `摘要` 页面上，查看您的选择，然后单击 `下一步`。系统将生成 `T-SQL`\
    \ 脚本，并带您进入 `保存或发布脚本` 页面。\n"
- fmt: '4. 点击 Finish。此时你的脚本已完成，并在 SSMS 的查询窗口中显示。


    ## 审查生成的脚本


    打开你创建的文件，让我们快速查看一下生成的 T-SQL。下面的代码片段展示了创建一个 XML 架构集合和一张表的过程。为了节省本章篇幅，大部分 XML 架构集合以及部分约束的创建被省略了，但你的脚本会显示完整的
    `CREATE` 语句。此外，除了你告诉脚本生成向导忽略的部分，以下 T-SQL 看起来与你日常处理的其他对象创建 T-SQL 类似：


    ```sql

    /****** Object: Schema [Person] Script Date: 4/22/2012 3:38:28 PM ******/


    CREATE SCHEMA [Person]


    GO


    /****** Object: XmlSchemaCollection [Person].[IndividualSurveySchemaCollection]
    Script Date: 4/22/2012 3:38:28 PM ******/


    CREATE XML SCHEMA COLLECTION [Person].[IndividualSurveySchemaCollection]


    AS N''<xsd:schema xmlns:xsd=" [http://www.w3.org/2001/XMLSchema](http://www.w3.org/2001/XMLSchema)"


    ...


    </xsd:schema>''


    GO


    /****** Object: UserDefinedDataType [dbo].[Name] Script Date: 4/22/2012 3:38:28
    PM ******/


    CREATE TYPE [dbo].[Name] FROM [nvarchar](50) NULL


    GO


    /****** Object: UserDefinedDataType [dbo].[NameStyle] Script Date: 4/22/2012 3:38:28
    PM ******/


    CREATE TYPE [dbo].[NameStyle] FROM [bit] NOT NULL


    GO


    /****** Object: Table [Person].[Person] Script Date: 4/22/2012 3:38:28 PM ******/


    SET ANSI_NULLS ON


    GO


    SET QUOTED_IDENTIFIER ON


    GO


    CREATE TABLE [Person].[Person](


    [BusinessEntityID] [int] NOT NULL,


    [PersonType] [nchar](2) NOT NULL,


    [NameStyle] [bit] NOT NULL,


    [Title] [nvarchar](8) NULL,


    [FirstName] [nvarchar](50) NOT NULL,


    [MiddleName] [nvarchar](50) NULL,


    [LastName] [nvarchar](50) NOT NULL,


    [Suffix] [nvarchar](10) NULL,


    [EmailPromotion] [int] NOT NULL,


    [AdditionalContactInfo] [xml](CONTENT [Person].[AdditionalContactInfoSchemaCollection])
    NULL,


    [Demographics] [xml](CONTENT [Person].[IndividualSurveySchemaCollection]) NULL,


    [rowguid] [uniqueidentifier] ROWGUIDCOL NOT NULL,


    [ModifiedDate] [datetime] NOT NULL,


    CONSTRAINT [PK_Person_BusinessEntityID] PRIMARY KEY CLUSTERED


    (


    [BusinessEntityID] ASC


    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS
    = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY]


    ) ON [PRIMARY] TEXTIMAGE_ON [PRIMARY]


    GO


    ALTER TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_NameStyle] DEFAULT ((0))
    FOR [NameStyle]


    GO


    ALTER TABLE [Person].[Person] ADD CONSTRAINT [DF_Person_EmailPromotion] DEFAULT
    ((0)) FOR


    [EmailPromotion]


