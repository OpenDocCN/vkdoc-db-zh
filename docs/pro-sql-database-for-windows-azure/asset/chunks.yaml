    \ B-4 列出了截至服务更新 4，当前 Windows Azure SQL Database 支持的这些数据类型。\n\n`表 B-4. Windows\
    \ Azure SQL Database 支持的数据类型`\n\n| `数值型` | `日期和时间` | `字符串` | `Unicode` | `二进制字符串`\
