    ## View Execution Plans


    You can also view either an estimated execution plan or the actual plan from the
    same query window. The `Actual Plan` and `Estimated Plan` icons are next to the
    `Run` icon you clicked previously. With the same two T-SQL statements entered
    previously, click the `Actual Plan` icon. When the execution is finished, you
    will notice a `Query Plan` link next to `Results`. Click on this link; you will
    see the execution plan shown in Figure [A-6](#index_split_002.html#p263).


    **Figure A-6.** Viewing the actual execution plan


    The `Sort By` icons on the left allow you to pinpoint which operators consume
    the most resources. By default, the execution plan shows a graphical display highlighting
    the operators that consume the most CPU and I/O resources.


    You can click on the `CPU` or `IO` icon on the left to show the operators that
    consume the most CPU or I/O resources, respectively.


    The `Find By` icons on the left allow you to highlight execution warnings, index
    scans, or index seeks. Note that table scans cannot exist, because SQL Database
    does not support heap tables. You can also zoom in or out easily using the vertical
    bar on the bottom left. Doing so changes the display of the icons when you zoom
    in enough, as shown in Figure [A-7](#index_split_002.html#p264).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 211](index-264_1.jpg)

    ![Image 212](index-264_2.jpg)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    **Figure A-7.** Zooming in on the Actual execution plan


    If you switch the active statement from the batch (as previously shown in Figure
    [A-5](#index_split_002.html#p262)), the execution plan for the second statement
    will be displayed. You can also display the execution plan in a grid or a tree
    by clicking the appropriate icon on the top right of the execution plan window.


    ## Monitor Current Query Performance


    To view the statements recently executed on your database, select the database
    name on the left panel (`EnzoLog2` in my example). This will bring you back to
    a page similar to Figure [A-3](#index_split_002.html#p261)., where you choose
    `Query Performance` on the top. A page similar to Figure [A-8](#index_split_002.html#p264)
    will appear, showing the list of recent statements that were executed against
    the database with summary performance metrics. Note that these metrics show averages,
    not the current values. For example, the second column displays `CPU ms/sec`,
    which is an average of CPU consumption in millisecond over the duration of the
    session, expressed in seconds.


    **Figure A-8.** Recent T-SQL statements executed against your database


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 213](index-265_1.jpg)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    If you click on one of the statements, you will see detailed performance metrics.
    By default the page shows you the `Query Plan Details`, including duration, CPU,
    read, write and plan metrics (see Figure [A-9](#index_split_002.html#p265)). You
    can also view the graphical execution plan by clicking on `Query Plan`.


    **Figure A-9.** Performance details for a specific T-SQL statement


    ## Design Features


    The design section of the portal allows you to manage database objects, including
    tables, views, and stored procedures. As you will see, the design section offers
    many advanced graphical options, including the ability to create indexes and foreign
    keys.


    ### Designing Tables


    To access the design section, click `Design` at the bottom left of the portal.
    Notice that the top section of the resulting page shows you three headers: `Tables`,
    `Views`, and `Stored Procedures`. By default the `Tables` header is selected,
    and the page shows you the list of existing tables, as seen in Figure [A-10](#index_split_002.html#p266).
    Using the icons on the bottom of this page you can create a new table or drop
    a selected existing table. You can also filter the list of tables by typing characters
    in the search box.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 214](index-266_1.png)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    **Figure A-10.** List of tables in a SQL Database instance


    The page used to create a new table is identical to the one used to edit an existing
    table. You’ll see how to edit a table shortly, but let’s look at the `Dependencies`
    feature first.


    Two icons (`Edit` and `Dependencies`) automatically appear if you move your mouse
    over the list of tables. The `Edit` icon looks like a small pencil. The other
    icon is the `Dependencies` icon.


    If you click on the `Dependencies` icon for a table, a new page will be displayed,
    showing its object dependencies in a graphical format, as seen for my `DOCS` table
    in Figure [A-11](#index_split_002.html#p267). The graph shows me that a view called
    `v_Documents` depends on my `DOCS` table. From this view I can directly edit these
    objects by clicking on their `Edit` icons.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 215](index-267_1.png)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    **Figure A-11.** A dependencies graph


    Clicking on the `Edit` icon on the `DOCS` table opens the table-editing page,
    which offers a graphical interface for changing the table definition, as shown
    in Figure [A-12](#index_split_002.html#p268). From this page you can add, edit,
    and delete table columns.


    You can also change which fields are part of the Primary Key and whether fields
    are required. After making changes, click the `Save` icon on top.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 216](index-268_1.png)

    ![Image 217](index-268_2.png)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    **Figure A-12.** The table design page


    Click on the `Indexes and Keys` header to view, add, and delete indexes and foreign
    keys associated with the table.'
