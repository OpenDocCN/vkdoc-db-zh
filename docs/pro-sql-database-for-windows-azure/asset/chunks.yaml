  trans: "\n# SQL 数据库登录与用户管理入门\n\n## 创建新登录名\n\n要创建新的登录名，必须连接到 `master` 数据库。连接后，使用\
    \ `CREATE LOGIN` 命令创建登录名。\n\n连接到 `master` 数据库（使用管理员账户或任何被授予 `loginmanager` 角色的账户），并运行以下命令：\n\
    \n```sql\nCREATE LOGIN test WITH PASSWORD = 'T3stPwd001'\n```\n\n此时，应该有一个名为 `test`\
    \ 的新登录名可用。但直到创建用户后才能实际登录。要验证登录名是否已创建，请运行以下命令：\n\n```sql\nselect * from sys.sql_logins\n\
    ```\n\n*图 1-12. 从 `master` 数据库查看 SQL 登录名*\n\n如果尝试在用户数据库中创建登录账户，会收到错误。登录名必须在 `master`\
    \ 数据库中创建。\n\n*图 1-13. 在用户数据库中创建登录名时的错误*\n\n如果密码复杂度不够，会收到类似这样的错误信息。\n\n*图 1-14.\
    \ 密码复杂度不足时的错误*\n\n`Note`：在云环境中运行时，选择强密码至关重要，即使你的数据库仅用于开发或测试。强密码和防火墙规则是抵御数据库攻击的重要安全防线。第\
    \ 3 章将深入探讨安全性。\n\n## 创建新用户\n\n现在可以为测试登录名创建用户账户。为此，使用管理员账户连接到一个用户数据库（如果此登录名需要能够连接到\
    \ `master` 数据库，也可以在那里创建用户），并运行以下命令：\n\n```sql\nCREATE USER test FROM LOGIN test\n\
    ```\n\n如果未先创建登录账户就尝试创建用户，会收到类似这样的消息。\n\n*图 1-15. 未先创建登录账户就创建用户时的错误*\n\n`Note`：不能创建与管理员登录名同名的用户。这是因为管理员登录名已映射到用户\
    \ `dbo`。你可以在图 1-8 的属性窗格中找到管理员登录名。\n\n## 分配访问权限\n\n至此，已在 `master` 数据库中创建了登录账户，在用户数据库中创建了用户账户。但此用户账户尚未被分配任何访问权限。\n\
    \n要允许 `test` 账户对所选的用户数据库拥有无限制访问权限，需要将该用户添加到 `db_owner` 角色组：\n\n```sql\nEXEC sp_addrolemember\
    \ 'db_owner', 'test'\n```\n\n现在，你已准备好使用 `test` 账户来创建表、视图、存储过程等。\n\n`Note`：在 SQL\
    \ Server 中，用户账户会自动分配到 `public` 角色。然而，在 SQL Database 中，出于增强安全性的考虑，`public` 角色不能分配给用户账户。因此，必须授予特定的访问权限才能使用用户账户。\n\
    \n## SQL Database 计费理解\n\nSQL Database 采用按需付费模式，费用包括基于每日消耗的数据库数量和大小的月度费用，以及基于实际带宽使用量的费用。使用\
    \ SQL Database，你只需为实际使用量付费；因此，一个 7GB 的数据库实例会比 8GB 的实例便宜。并且正如你所料，每 GB 空间的使用成本随着数据库规模的增大而降低。因此，一个\
    \ 100GB 的数据库实例比两个 50GB 的实例更便宜。此外，在撰写本文时，当 SQL Database 实例的消费应用程序部署为 Windows Azure\
    \ 应用程序或服务，并且与数据库属于同一地理区域时，带宽费用将被免除。\n\n要从计费角度查看当前的带宽消耗和已配置的数据库，可以运行以下命令：\n\n```sql\n\
    SELECT * FROM sys.database_usage -- databases defined\nSELECT * FROM sys.bandwidth_usage\
    \ -- bandwidth\n```\n\n第一条语句返回特定类型（Web 或 Business 版）每日可用的数据库数量。此信息用于计算月度费用。第二条语句显示每个数据库的每小时消耗明细。\n\
    \n请注意，此数据库中存储的信息可保留一段时间，但最终会被微软清除。你应该能在此表中查看最近三个月的数据。\n\n*图 1-16. 每小时带宽消耗*\n\n\
    图 1-16 显示了返回带宽消耗的语句的示例输出。该语句返回以下信息：\n*   `time`：带宽适用的小时。例如，查看 2011 年 12 月 22 日凌晨\
    \ 1 点到 2 点之间的汇总。\n*   `database_name`：提供汇总信息的数据库。\n*   `direction`：数据移动方向。`Egress`\
    \ 表示出站数据，`Ingress` 表示入站数据。\n*   `class`：如果数据是从 Windows Azure 外部的应用程序（例如 SQL Server\
    \ Management Studio 应用程序）传输的，则为 `External`。如果数据是从 Windows Azure 内部传输的，则此列包含 `Internal`。\n\
    *   `time_period`：数据传输的时间窗口。\n*   `quantity`：传输的数据量，以千字节（KB）为单位。\n\n请访问 [`www.microsoft.com/windowsazure`](http://www.microsoft.com/windowsazure)\
    \ 获取最新的定价信息。\n\n## SQL Database 的限制\n\n正如你所见，创建数据库和用户需要手动编写脚本和切换数据库连接。\n\nSQL\
    \ Server 和 SQL Database 之间的根本差异在于云计算的基本设计原则，必须仔细权衡性能、易用性和可扩展性。用户数据库可能位于不同物理服务器上的事实带来了自然的限制。此外，针对\
    \ SQL Database 设计应用程序和服务需要你对这些限制有深刻的理解。\n\n### 安全性\n\n第 3 章将深入介绍安全性，但以下列表总结了在部署\
    \ SQL Database 实例之前需要考虑的重要安全事项。从安全角度来看，你需要考虑以下约束：\n\n*   `Encryption`：尽管 SQL Database\
    \ 使用 SSL 进行数据传输，但它不支持 SQL Server 中可用的数据加密功能。不过，SQL Database 提供了对哈希函数的支持。\n*  \
    \ `SSPI authentication`：SQL Database 仅支持数据库登录。因此，不支持使用安全支持提供程序接口（SSPI）的网络登录。\n\
    *   `Connection constraints`：在某些情况下，数据库连接会因以下原因之一而关闭：\n    *   资源使用过度\n    * \
    \  长时间运行的查询\n"
- fmt: "```markdown\n# Long-running single transaction\n- Idle connection\n- Failover\
    \ due to server failure\n\n## Disallowed user names\nCertain user names can’t\
    \ be created, for security reasons:\n- `sa`\n- `admin`\n- `administrator`\n- `guest`\n\
    - `root`\n\n## Login name\nIn certain cases, you may need to append the server\
    \ name to the login name to correctly log in, in this format: `[loginName]@[servername]`.\
    \ So, avoid using the arrobas character (`@`) in login names.\n\n## TCP port 1433\n\
    Only TCP Port `1433` is allowed. It isn’t possible to define another listening\
    \ port for SQL Database.\n\n# Backups\nBacking up your SQL Database instance is\
    \ somewhat different from backing up traditional SQL Server databases. You can’t\
    \ back up a SQL Database instances in the traditional sense, nor can you restore\
    \ a SQL Server database in SQL Database. You do, however, have the ability to\
    \ create a transactionally consistent clone of a SQL Database instance before\
    \ you export/import your data. You can expect the following regarding backups:\n\
    \n- **Backup/Restore operations.** These operations aren’t available. In addition,\
    \ you may not attach or detach a SQL Database instance.\n- **Clone operations.**\
    \ You may create a clone of a SQL Database instance into another one using the\
    \ `CREATE DATABASE` statement.\n- **Log files.** You can’t access the database\
    \ log files, nor can you create a log backup.\n- **Export/Import data.** You can\
    \ perform these operations using the Import and Export feature.\n- **Restore.**\
    \ You can use the Point in Time Restore feature.\n\n# Objects\nCertain objects\
    \ available in SQL Server aren’t available in SQL Database. If your applications\
    \ depend heavily on these features, you may have difficulty using SQL Database,\
    \ and you may need to rethink your application design to accommodate these limitations.\
    \ The following are some of the limitations that currently apply to SQL Database:\n\
    \n- **CLR.** The.NET CLR isn’t available in SQL Database. As a result, you can’t\
    \ create extended stored procedures or extended functions.\n- **System functions.**\
    \ SQL Database supports many system functions, including Aggregate functions and\
    \ Ranking functions. However, SQL Database doesn’t support RowSet functions, including\
    \ these:\n  - `OPENQUERY`\n  - `OPENXML`\n  - `OPENROWSET`\n  - `OPENDATASOURCE`\n\
    - **System stored procedures.** Only a small subset of system stored procedures\
    \ are available in SQL Database, in the following categories:\n  - Catalog stored\
    \ procedures\n  - Database engine stored procedures\n  - Security stored procedures\n\
    - **System tables.** None of the system tables are available.\n- **System views.**\
    \ A subset of system views is available; you can access some of them from the\
    \ master database and others from user databases. The following are some of the\
    \ system views available (for a complete list, refer to the online MSDN library\
    \ for SQL Database):\n  - `sys.sql_logins`\n  - `sys.views`\n  - `sys.databases`\n\
    \  - `sys.columns`\n  - `sys.objects`\n- **Heap tables.** SQL Database doesn’t\
    \ allow the use of heap tables. All tables must have a clustered index.\n\n# Miscellaneous\n\
    In addition to the limitations outlined so far, additional components and options\
    \ offered by SQL Server aren’t available in SQL Database. For the most part, these\
    \ limitations shouldn’t affect your application designs, but they’re good to keep\
    \ in mind:\n\n- **Maximum number of databases.** You can create no more than one\
    \ hundred and fifty user databases.\n- **Distributed transactions.** Although\
    \ SQL transactions are supported, distributed transactions aren’t supported across\
    \ SQL Database instances.\n- **Collation.** SQL Database supports collation at\
    \ the column and database levels, or using an expression at execution time. Server-level\
    \ collations can’t be changed and are set to `SQL_LATIN1_GENERAL_CP1_CI_AS`. Once\
    \ set at the database level, the collation cannot be changed using the `ALTER\
    \ DATABASE` command.\n- **English language.** SQL Database only supports the English\
    \ language.\n- **Database size.** You can only create databases of specific sizes,\
    \ as outlined previously.\n- **Row Versioning-Based Isolation Levels.** `READ_COMMITTED_SNAPSHOT`\
    \ and `ALLOW_SNAPSHOT_ISOLATION` options are set at the database level, and cannot\
    \ be changed.\n- **Database file placement.** You can’t choose how the database\
    \ files are deployed physically; you can’t control filegroups, either. This is\
    \ handled automatically by the Microsoft data center for optimum performance.\n\
    - **Trace flags.** Trace flags aren’t available.\n- **SQL Server configuration\
    \ options.** None of the general SQL Server options are available, including CPU\
    \ and I/O affinity.\n- **Service Broker.** The Service Broker isn’t available.\n\
    - **Global temporary tables.** The global temporary tables aren’t available. However,\
    \ you can use local temporary tables.\n- **SQL Server Agent.** The SQL Server\
    \ Agent isn’t available.\n\n# Drivers and Protocols\nYou should also know that\
    \ accessing SQL Database can only be performed using specific libraries. This\
    \ may be relevant if you don’t use ADO.NET in your programming stack. For example,\
    \ older versions of Delphi can’t connect to SQL Database. Here is a summary of\
    \ the supported data libraries:\n\n- **TDS version 7.3 or higher.** Any client\
    \ using a TDS version prior to 7.3 isn’t supported.\n- **Drivers and libraries.**\
    \ The following drivers and libraries are allowed:\n  - .NET Framework Data Provider\
    \ for SQL Server from .NET 3.5 SP1\n  - SQL Server 2008 Native Client ODBC driver\
    \ or higher\n  - SQL Server 2008 driver for PHP version 1.1 or higher\n\n# Summary\n\
    This chapter focused on a fast-track overview of SQL Database by providing a high-level\
    \ introduction to cloud computing and how Microsoft is delivering its cloud offering.\
    \ You also learned the major steps involved in creating an Azure account and how\
    \ to get started with SQL Database. You saw some important limitations of the\
    \ SQL Database platform, but keep in mind that Microsoft is releasing new versions\
    \ of its cloud database every few months; as a result, some of these limitations\
    \ will be lifted over time.\n\n# Chapter 2\n# Design Considerations\nIn order\
    \ to use cloud computing with the Azure platform for more than simple hosting,\
    \ you must explore the vast array of options available for designing solutions.\
    \ In addition to understanding the design options presented in this chapter, you\
    \ need a strong grasp of cloud computing’s current shortcomings, which may affect\
    \ your design choices.\n\n## Design Factors\nBefore reviewing various design patterns,\
    \ let’s start with some opportunities and limitations that impact your design\
    \ choices. Keep in mind that although this book focuses primarily on SQL Database,\
    \ many of the concepts in this chapter apply to Azure development in general.\n\
    \n## Offsite Storage\nAs introduced in Chapter 1, the Azure platform offers four\
    \ distinct storage models: Blob, Table, Queue, and SQL Database. Storing data\
    \ in SQL Database is similar to storing data in SQL Server. All you need to do\
    \ is issue T-SQL statements and review some of the limitations of the syntax specific\
    \ to SQL Database, and off you go!\n\nThe ability to store data in SQL Database\
    \ using T-SQL offers unique opportunities. In many cases, you can easily extend\
    \ or port certain types of applications in SQL Database with no (or limited) modifications.\
    \ This portability allows you either to implement solutions that directly depend\
    \ on SQL Database for storage, or to use a local database while using SQL Database\
    \ transparently for additional storage requirements (such as reporting).\n\nHowever,\
    \ keep in mind that you’re limited to the amount of data you can store in a single\
    \ SQL Database instance.\n```"
