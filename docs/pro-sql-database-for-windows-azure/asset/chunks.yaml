    ## CHAPTER 6 ■ SQL REPoRTing


    2.  In the `Data Source Properties` dialog, you define the type of the connection
    and the connection properties. Select the `Embedded connection` option, and then
    click the `Type` down arrow. You read earlier that beginning with SQL Server 2008
    R2 a SQL Database–specific provider was included, and this is where you find it,
    along with other data source types. As shown in Figure 6-8, select the new data
    provider for SQL Database, called `Microsoft SQL Azure` (what else are they going
    to call it?).


    ### `Figure 6-8.` The Data Source Properties dialog


    When you select this provider, the `Connection String` text box defaults to


    ```

    Encrypt=True;TrustServerCertificate=False

    ```


    These two parameters and associated values are defaulted for you. It’s recommended
    that you not change them. The `Encrypt` parameter indicates that SQL Server will
    use SSL encryption for all data sent between the server and client if the server
    has a cert installed. The `TrustServerCertificate` property tells the transport
    layer to use SSL to encrypt the channel and bypass walking the cert chain to validate
    trust. When both `Encrypt` and `TrustServerCertificate` are set to `True`, the
    encryption level specified *on the server* is used even if the value of the `Encrypt`
    parameter in this connection string is set to `False`.


    However, even with this default string set, you still need to add the SQL Database
    connection information.


    3.  Click the `Edit` button to open the `Connection Properties` dialog, shown
    in Figure 6-9. Enter your SQL Database instance name, username, and password.
    You should know by now that you can’t use Windows Authentication with SQL Database,
    so make sure you enter the SQL Database account username and password.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 94](index-137_1.png)


    ## CHAPTER 6 ■ SQL REPoRTing


    ### `Figure 6-9.` The Connection Properties dialog


    4.  Select (or type in) the database you want to pull the data from, and then
    click `Test Connection` to ensure that all your settings are correct.


    5.  Click `OK` to close this dialog and return to the `Data Source Properties`
    dialog. It should now look like Figure 6-10, which shows the appropriate connection
    type and connection string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 95](index-138_1.png)


    ## CHAPTER 6 ■ SQL REPoRTing


    ### `Figure 6-10.` Completed Data Source Properties dialog


    Granted, these steps are no different than those for connecting to a local database.
    But although the steps are the same, some of the key selection components are
    different, such as those in Figures 6-8 and 6-9, where you select the specific
    `Microsoft SQL Azure` provider and the SQL Database–specific connection information.


    Your data source definition also allows you to specify the credentials with which
    to connect to your data source.


    Selecting `Credentials` at left in the `Data Source Properties` dialog shows you
    four options:


    *   Windows Authentication (integrated security)

    *   Prompt for credentials

    *   Use this user name and password

    *   Do not use credentials


    Obviously, you need to use credentials, so not specifying credentials isn’t the
    option you want. And integrated security isn’t available with Azure, so that won’t
    work either. You can either prompt for credentials or specify a username and password.
    The default value is to prompt for credentials; if you leave that setting, the
    report prompts you to enter a username and password every time you run the report.


    6.  Best practice says that in a production environment, you should use integrated
    security. But because that isn’t an option with SQL Database, select the `Specify
    a user name and password` option, and enter the username and password of an account
    that has access to the appropriate database.'
