- fmt: '# CHAPTER 2 ■ Design Considerations


    ## Read-Only Shards


    Shards can be implemented in multiple ways. For example, you can create a read-only
    shard (`ROS`). Although the shard is fed from a database that accepts read/write
    operations, its records are read-only for consumers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 25](index-40_1.jpg)


    Figure 2-8 shows an example of a shard topology that consists of a local `SQL
    Server` to store its data with read and write access. The data is then replicated
    using the `SQL Data Sync Framework` (or other method) to the actual shards, which
    are additional `SQL Database` instances in the cloud. The consuming application
    then connects to the shard (in a `SQL Database` instance) to read the information
    as needed.


    **Figure 2-8.** Read-only shard topology


    In one scenario, the `SQL Database` instances each contain the exact same copy
    of the data (a mirror shard), so the consumer can connect to one of the `SQL Database`
    instances (using a `round-robin` mechanism to spread the load, for example). This
    is perhaps the simpler implementation because all the records are copied to all
    the databases in the shard blindly. However, keep in mind that `SQL Database`
    doesn’t support distributed transactions; you may need to have a compensating
    mechanism in case some transactions commit and others don’t.


    Another implementation of the `ROS` consists of synchronizing the data using `horizontal
    partitioning`. In a horizontal partition, rules are applied to determine which
    database contains which data. For example, the `SQL Data Sync` service can be
    implemented to partition the data for `US` sales to one `SQL Database` instance
    and `European` sales to another. In this implementation, either the consumer knows
    about the horizontal partition and knows which database to connect to (by applying
    decision rules based on customer input), or it connects to all databases in the
    cloud by applying a `WHERE` clause on the country if necessary, avoiding the cost
    of running the decision engine that selects the correct database based on the
    established rules.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 26](index-41_1.jpg)


    # CHAPTER 2 ■ Design Considerations


    ## Read-Write Shards


    In a read-write shard (`RWS`), all databases are considered read/write. In this
    case, you don’t need to use a replication topology that uses the `SQL Data Sync
    Framework`, because there is a single copy of each record within the shard.


    Figure 2-9 shows an `RWS` topology.


    **Figure 2-9.** Multimaster shard topology


    Although an `RWS` removes the complexity of synchronizing data between databases,
    the consumer is responsible for directing all `CRUD` operations to the appropriate
    cloud database. This requires special considerations and advanced development
    techniques to accomplish, as previously discussed, unless you use `SQL Database
    Federations`.


    ## Offloading


    In the offloading pattern, the primary consumer represents an existing onsite
    application with its own database; but a subset of its data (or the entire database)
    is replicated to a cloud database using `SQL Data Sync` (or another mechanism).
    The offloaded data can then be used by secondary consumers even if the primary
    database isn’t accessible.


    You can implement the offloading pattern in two ways, as shown in Figure 2-10.
    The primary database can be either the local `SQL Server` database or the cloud
    database. For example, a legacy application can use a local `SQL Server` database
    for its core needs. `SQL Data Sync` is then used to copy relevant or summary data
    in a cloud database.


    Finally, secondary consumers such as portable devices and `PDAs` can display live
    summary data by connecting to the cloud for their data source. Note that if you
    use the `SQL Data Sync` service, you can choose to have bidirectional synchronization
    of data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 27](index-42_1.jpg)


    # CHAPTER 2 ■ Design Considerations


    **Figure 2-10.** Offloading patterns


    ## Aggregation


    In its simplest form, the aggregation pattern provides a mechanism to collect
    data from multiple data providers into a `SQL Database` instance. The data providers
    can be geographically dispersed and not know about each other, but they must share
    a common knowledge of the schema so that, when aggregated, the data is still meaningful.


    The aggregation patterns shown in Figure 2-11 use the direct connection pattern.
    You can use an aggregation pattern to provide a common repository of information,
    such as demographic information or global warming metrics collected from different
    countries. The key in this pattern is the ability to define a common schema that
    can be used by all providers and understood by the consumers. Because `SQL Database`
    supports `XML` data types, you can also store certain columns in `XML`, an option
    that provides a mechanism to store slightly different information per customer.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 28](index-43_1.jpg)


    ![Image 29](index-43_2.jpg)


    # CHAPTER 2 ■ Design Considerations


    **Figure 2-11.** Aggregation patterns


    ## Mirroring


    The mirror pattern, shown in Figure 2-12, is a variation of the offloading pattern
    where the secondary consumer can be an external entity. In addition, this pattern
    implies that a two-way replication topology exists, so that changes in either
    database are replicated back to the other database. This pattern allows a *shared
    nothing* integration, in which neither consumer has the authority to connect to
    the other consumer directly.


    **Figure 2-12.** Mirror pattern


    ## Combining Patterns


    The previous design patterns provide the necessary basis to build systems with
    `SQL Database`. Some of these patterns can be used as is, but you’re very likely
    to combine patterns to deliver improved solutions. This section describes some
    useful combinations.


    ### Transparent Branching + RWS


    Figure 2-13 shows the transparent branching and the read-write shard patterns
    combined. This pattern can be used to offload, into the cloud, storage of historical
    data that an existing `Enterprise Resource Planning (ERP)` application generates.
    In this example, the shard provides a way to ensure high throughput by using asynchronous
    `round-robin` calls into `SQL Database` instances.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 30](index-44_1.jpg)


    # CHAPTER 2 ■ Design Considerations


    **Figure 2-13.** Transparent branching + RWS patterns


    This pattern offers the following advantages:


    - **Transparent data transfer.** In this case, the transparent branching pattern
    copies an existing application’s data into cloud databases without changing a
    single line of code in the existing application.

    - **High performance.** To ensure high performance and throughput, the `round-robin`
    shard pattern is used along with asynchronous calls into the cloud.

    - **Scalable.** When using a shard, it’s very simple to expand it by adding a
    new `SQL Database` instance into the cloud. If implemented correctly, the shard
    automatically detects the new database and storage capacity, and throughput automatically
    increases.


    ### Cascading Aggregation'
