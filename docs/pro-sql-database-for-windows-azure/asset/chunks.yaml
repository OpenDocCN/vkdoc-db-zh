    \ FEDERATION` 语句会创建另一个数据库；这是你的第一个联合成员。联合成员拥有随机的数据库名称。连接到联合的唯一方式是发出 `USE` 命令。现在我们有了第一个联合成员，我们需要构建联合的模式（表、存储过程等）。这很重要，因为当我们创建额外的联合成员时，将使用此联合成员的模式。\n\
    \n如果你尝试联合一个已存在的表，你需要将此操作视为数据迁移工作；实际上，你不能简单地联合一个已存在于根数据库中的表。你首先需要创建联合成员、表本身，然后使用另一个工具（如\
    \ SQL Server Integration Services）将数据从根数据库迁移到联合成员。此时，你就可以开始拆分位于联合成员中的表了。\n\n那么，让我们连接到第一个联合成员并创建一个\
    \ `Purchase` 表。注意 `USE FEDERATION` 命令需要联合键的值；它使用此值作为提示来找到正确的联合成员。因为这是我们的第一个联合成员，你可以为\
    \ `purchaseId` 使用任何值；目前所有可能的 `purchaseId` 值都指向同一个联合成员。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\n// 连接到联合成员\n// FILTERING=OFF 意味着我们正在使用此联合成员中的所有原子单元\nUSE FEDERATION\
    \ PurchaseHistory (purchaseId = 0) WITH FILTERING=OFF, RESET\n\n// 在 purchaseId\
    \ 联合键上创建一个联合表\nCREATE TABLE Purchases (\n    pid bigint NOT NULL primary key,\
    \ -- 此记录的唯一标识符\n    amount decimal(10, 2) NOT NULL, -- 购买金额\n    storeId int NOT\
    \ NULL -- 进行购买的商店\n)\nFEDERATED ON (purchaseId = pid)\n```\n\n让我们在此联合成员中创建更多对象。首先创建一个引用表，其中包含商店列表，以及一个返回给定商店总销售额的存储过程：\n\
    \n```sql\n// 创建一个名为 StoreLocations 的引用表\nCREATE TABLE StoreLocations (\n    storeId\
    \ int NOT NULL primary key,\n    storeName nvarchar(20) NOT NULL,\n    zipCode\
    \ nvarchar(10) NOT NULL\n)\n```\n\n让我们也添加一个存储过程和一个外键引用：\n\n```sql\n// 创建一个返回特定邮政编码购买记录的存储过程\n\
    CREATE PROC GetPurchasesByZipCode(@zipCode nvarchar(10))\nAS\nSELECT * FROM Purchases\
    \ P JOIN StoreLocations S\nON P.storeId = S.storeId\nWHERE S.zipCode = @zipCode\n\
    \n// 现在添加外键\nALTER TABLE Purchases\nADD CONSTRAINT fk_storeId\nFOREIGN KEY (storeId)\
    \ REFERENCES StoreLocations (storeId)\n```\n\n最后，但同样重要的是，让我们在表中插入一些记录。你很快就会看到拆分操作将如何重新分配我们的记录。\n\
    \n```sql\nINSERT INTO StoreLocations VALUES (1, 'Boca Raton', '33498' )\nINSERT\
    \ INTO StoreLocations VALUES (2, 'Orlando', '32801' )\nINSERT INTO Purchases VALUES\
    \ (100, 25.0, 1)\nINSERT INTO Purchases VALUES (200, 75.0, 2)\nINSERT INTO Purchases\
    \ VALUES (300, 50.0, 1)\nINSERT INTO Purchases VALUES (500, 100.0, 2)\nINSERT\
    \ INTO Purchases VALUES (600, 12.0, 1)\n```\n\n此时，`PurchaseHistory` 是一个包含单个数据库的分片（在某些方面是一个纵向扩展的分片）。联合允许你通过进一步拆分分片来管理压缩程度。想象一下，我们需要拆分记录，使得\
    \ `Purchases` 表分布在两个数据库上，如图 10-1 的步骤 3 所示。通过连接到根数据库并使用 `ALTER FEDERATION` 命令来拆分联合，如下所示：\n\
    \n```sql\n// 连接到根数据库\nUSE FEDERATION ROOT WITH RESET\n\n// 修改联合以发出拆分命令\nALTER\
    \ FEDERATION PurchaseHistory SPLIT AT (purchaseId = 500)\n```\n\n`ALTER FEDERATION`\
    \ 语句是异步执行的，并且是一个在线操作。在拆分进行期间，你可以正常访问你的联合成员。一旦拆分完成，你的联合将包含两个联合成员，并且将具有事务一致性。因为拆分会创建两个新的联合成员，复制所有对象和记录，然后删除原始联合成员，所以在拆分操作结束时，你的应用程序可能会遇到连接中断。如果是这种情况，你只需要重新连接。要获取对联合执行的任何操作的状态，请检查根数据库中的\
    \ `dm_federation_operations` 视图。如果没有返回记录，则表示你之前启动的拆分操作已完成：\n\n```sql\n// 查询拆分操作的状态\n\
    SELECT * FROM sys.dm_federation_operations\n```\n\n拆分操作将所有对象从原始联合成员复制过来，包括存储过程、引用表及其数据以及外键。\n\
    \n让我们分别看看两个联合成员中的数据。\n\n```sql\n// 连接到第一个联合成员\nUSE FEDERATION PurchaseHistory\
    \ (purchaseId = 0) WITH FILTERING=OFF, RESET\n// 获取一些数据；将返回三条记录\nSELECT * FROM\
    \ Purchases P JOIN StoreLocations S ON P.storeId = S.storeId\n\n// 现在连接到第二个联合成员\n\
    USE FEDERATION PurchaseHistory (purchaseId = 500) WITH FILTERING=OFF, RESET\n\
    // 获取一些数据；将返回两条记录\nSELECT * FROM Purchases P JOIN StoreLocations S ON P.storeId\
    \ = S.storeId\n\n// 你也可以执行存储过程\nEXEC GetPurchasesByZipCode '33498'\n```\n\n现在我们有两个联合成员，你可能需要更新一条记录。但是你的记录在哪个联合中？你的应用程序不需要了解底层的实现细节。它只需要知道你想要更新的原子单元的值。让我们将\
    \ `purchaseId=100` 的金额更新为另一个值：\n\n```sql\n// 连接到包含 purchaseId=100 的联合成员\nUSE FEDERATION\
    \ PurchaseHistory (purchaseId = 100) WITH FILTERING=OFF, RESET\n// 获取一些数据；将返回三条记录\n\
    UPDATE Purchases SET amount = 17.25 WHERE pid = 100\n```\n\n这里使用的 `WHERE` 子句可能会给你一种处理纵向扩展架构的印象，因为它是唯一需要此类子句的可扩展性模型。这是因为我们用\
    \ `FILTERING=OFF` 指定了连接，这允许查询访问当前联合成员中的所有原子单元。或者，你可以告诉 SQL Database 你希望处理特定的原子单元，给你一种除了要更改的记录外没有其他记录的印象。以下语句是更新记录的首选方法。注意\
    \ `FILTERING=ON` 的使用。\n\n```sql\n// 连接到第一个联合成员\n// FILTERING=ON 是可选的；它是默认设置。\n\
    USE FEDERATION PurchaseHistory (purchaseId = 100) WITH FILTERING=ON, RESET\n//\
    \ 获取一些数据；将返回三条记录\nUPDATE Purchases SET amount = 17.25\n```\n\n你可以将相同的逻辑应用于在联合成员中添加或删除记录。如果你想删除多个原子单元，你需要使用\
    \ `FILTERING=OFF` 选项，以便你的语句可以影响多条记录。此外，如果你尝试插入的原子单元的键超出当前联合成员分区键的范围，`INSERT` 语句将失败。\n\
    \n## 创建更多联合\n\n到目前为止，我们创建了一个联合，并将记录拆分为两个，从而创建了两个联合成员。"
- fmt: "However, the federation we created only makes sense for historical purchases\
    \ because its partition key is on `purchaseId`. As discussed in the introduction\
    \ to this chapter, one of the major benefits of Federations is the ability to\
    \ define multiple data domains and manage the compression of each domain separately.\
    \ What if we also have a large table that tracks customer visits?\n\nNo problem!\
    \ We can create as many federations as we need and place a collection of tables\
    \ inside them. Let’s create another federation called `CustomerVisits`:\n\n```\n\
    // Connect back to the root database\nUSE FEDERATION ROOT WITH RESET\n\n// Create\
    \ a new federation\nCREATE FEDERATION CustomerVisits (visitId BigInt RANGE)\n\n\
    // Connect to our first federation member\nUSE FEDERATION CustomerVisits (visitId=0)\
    \ WITH FILTERING=OFF, RESET\n\n// And let's create a table with a few records\n\
    CREATE TABLE CustomerVisits (\n    vId bigint NOT NULL PRIMARY KEY,\n    dateOfVisit\
    \ dateTime NOT NULL,\n    storeId int NOT NULL\n) FEDERATED ON (visitId = vid)\n\
    \nINSERT INTO CustomerVisits VALUES (1, getdate(), 1)\nINSERT INTO CustomerVisits\
    \ VALUES (2, getdate(), 2)\nINSERT INTO CustomerVisits VALUES (3, getdate(), 2)\n\
    INSERT INTO CustomerVisits VALUES (4, getdate(), 1)\nINSERT INTO CustomerVisits\
    \ VALUES (5, getdate(), 1)\n```\n\nWe now have two federations and three federation\
    \ members in total, as shown in Figure 10-2.\n\n![Image 159](index-217_1.png)\n\
    \n# CHAPTER 10 ■ FEdERATions\n\n**Figure 10-2.** Creating multiple federations\n\
    \n> **Note:** So far you have created federation keys with a `Bigint` value. However,\
    \ you cannot use an `IDENTITY` column on a federated table, so your application\
    \ will need to generate the next primary key value for your federated tables.\
    \ Although the use of a `Uniqueidentifier` is a bit more cumbersome, it is popular\
    \ because no logic needs to be maintained to create the next identifier.\n\n##\
    \ Managing Federations\n\nSo far you have seen how to create federations, split\
    \ federation members, and add records to federated tables. You may wonder what\
    \ tools exist to view your federations and their members, and how to tell whether\
    \ your federations are ready for a split.\n\nTo manage your federations, turn\
    \ to the SQL Database Management Portal. You access this portal by first logging\
    \ into your usual Windows Azure Management Portal (`http://manage.windowsazure.com`).\
    \ Find your newly created database under SQL Database and click the `Manage` button\
    \ at the bottom of the screen as seen in Figure 10-3.\n\n![Image 160](index-218_1.png)\n\
    ![Image 161](index-218_2.jpg)\n\n# CHAPTER 10 ■ FEdERATions\n\n**Figure 10-3.**\
    \ Managing your SQL Database instance\n\nClicking on the `Manage` icon brings\
    \ up another window, asking you to log in to the database server you selected.\
    \ On that screen you can also specify the name of your database (`EnzoLog2` in\
    \ my example). Once logged in, you are in the SQL Database Management Portal,\
    \ as shown in Figure 10-4.\n\n**Figure 10-4.** Viewing the properties of your\
    \ database\n\nYou will notice that your federations are showing up on the right;\
    \ both `CustomerVisits` and `PurchaseHistory` can be seen in Figure 10-4. Let’s\
    \ click on `PurchaseHistory`. The `Drop Federation` button right underneath it\
    \ becomes enabled, allowing you to drop the entire federation with a single click.\
    \ Dropping a federation will drop all the federation members. From this screen\
    \ you can also create a new federation by clicking the `New` button on top, or\
    \ you can also view the performance of your queries by clicking `Query Performance`.\
    \ Note, however, that the performance information shown will only apply to the\
    \ root database because that’s what we are looking at right now.\n\nTo view the\
    \ details of a federation, click the arrow to its right. If you click to view\
    \ the details of `PurchaseHistory`, for example, the screen will look like Figure\
    \ 10-5. You can browse on top of each federation member, or click on them to see\
    \ a window showing additional options. For example, you can resize individual\
    \ federation members from this screen easily by clicking on `Resize` and specifying\
    \ a target size. You can also perform a split operation from this screen easily\
    \ by selecting `Split` and providing a value for the federation key at which the\
    \ federation member will be split.\n\n![Image 162](index-219_1.jpg)\n\n# CHAPTER\
    \ 10 ■ FEdERATions\n\n**Figure 10-5.** Viewing a federation and its federation\
    \ members\n\n## Advanced Considerations\n\nAs you can see from the previous examples,\
    \ Federations offer an important scalability model for cloud applications that\
    \ need to scale beyond the capabilities of a single SQL Database instance. There\
    \ are, however, certain challenges and considerations that are worth discussing\
    \ before you decide to adopt this feature.\n\n### Limitations\n\nLet’s review\
    \ some of the most important limitations you should be aware of before adopting\
    \ Federations.\n\n*   **No Merging.** You may have noticed the lack of merging\
    \ capability. Once you split a federation member, you cannot merge it back in\
    \ the current version of SQL Database. Although this is a shortcoming, future\
    \ versions of Federations will likely support this capability.\n\n*   **Independent\
    \ Schemas.** As hinted previously, once a federation member has been created,\
    \ its schema definition is independent from all the others in the same federation.\
    \ In our previous example, you could connect to one of the federation members\
    \ and drop a table, or add a column, or even change a stored procedure. Because\
    \ there are no safeguards at this time, it is relatively easy to have federation\
    \ members that have slightly different schemas. This could have some implications\
    \ in your code, for example. So if you make an update to the schema of a federation\
    \ member, remember to make the same changes to all the other federation members.\n\
    \n*   **Limited Tool Support.** For the time being, most tools available on the\
    \ market do not support federated databases, including some of the tools provided\
    \ by Microsoft. Although this is very likely to change over time, you cannot use\
    \ Data Sync services, Azure Reporting Services, or the database `COPY` operation\
    \ with a federated member.\n\n*   **No Fan-Out.** Another important limitation\
    \ is the lack of support for cross-federation member queries. In other words,\
    \ you cannot issue a request that will span, or fan-out, multiple federation members,\
    \ let alone multiple federations. If you want to obtain the total sum of your\
    \ sales, you would normally run this simple statement:\n\n```\nSELECT SUM(amount)\
    \ FROM purchases\n```\n\nBecause this statement cannot be executed against multiple\
    \ federation members by SQL Database, you will need to run this query on every\
    \ federation member, and perform the final sum operation in your code.\n\n> **Note:**\
    \ Executing the same query across multiple databases is called a fan-out operation.\
    \ Fan-out operations are not hard to implement in your code, although you should\
    \ execute fan-out queries using multiple threads to improve the performance of\
    \ your fetch operation.\n\nThere are many more limitations that apply to Federations\
    \ that may impact your design or your ability to adopt Federations, such as no\
    \ support for indexed views, lack of support for the `timestamp` and `rowversion`\
    \ data types, and more.\n\n> **Note:** If you are planning to use Federations\
    \ for your application, you should spend some time reviewing all the documented\
    \ limitations on Msdn. Search for \"Federation Guidelines and Limitations\" using\
    \ Bing.\n\n## Sharding Library"
  raw: 'However, the federation we created only makes sense for historical purchases
    because its partition key is on purchaseId. As discussed in the introduction to
    this chapter, one of the major benefits of Federations is the ability to define
    multiple data domains and manage the compression of each domain separately. What
    if we also have a large table that tracks customer visits?


    No problem! We can create as many federations as we need and place a collection
    of tables inside them. Let’s create another federation called CustomerVisits:


    // Connect back to the root database


    USE FEDERATION ROOT WITH RESET


    // Create a new federation


    CREATE FEDERATION CustomerVisits (visitId BigInt RANGE)


    // Connect to our first federation member


    USE FEDERATION CustomerVisits (visitId=0) WITH FILTERING=OFF, RESET


    // And let''s create a table with a few records


    CREATE TABLE CustomerVisits (


    vId bigint NOT NULL PRIMARY KEY,


    dateOfVisit dateTime NOT NULL,


    storeId int NOT NULL)


    FEDERATED ON (visitId = vid)


    INSERT INTO CustomerVisits VALUES (1, getdate(), 1)


    INSERT INTO CustomerVisits VALUES (2, getdate(), 2)


    INSERT INTO CustomerVisits VALUES (3, getdate(), 2)


    INSERT INTO CustomerVisits VALUES (4, getdate(), 1)


    INSERT INTO CustomerVisits VALUES (5, getdate(), 1)


    We now have two federations and three federation members in total, as shown in
    Figure [10-2](#index_split_002.html#p217).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 159](index-217_1.png)


    CHAPTER 10 ■ FEdERATions


    ***Figure 10-2.** Creating multiple federations*


    ■ **Note** so far you have created federation keys with a Bigint value. However,
    you cannot use an idEnTiTY column on a federated table, so your application will
    need to generate the next primary key value for your federated tables. Although
    the use of a Uniqueidentifier is a bit more cumbersome, it is popular because
    no logic needs to be maintained to create the next identifier.


    Managing Federations


    So far you have seen how to create federations, split federation members, and
    add records to federated tables. You may wonder what tools exist to view your
    federations and their members, and how to tell whether your federations are ready
    for a split.


    To manage your federations, turn to the SQL Database Management Portal. You access
    this portal by first logging into your usual Windows Azure Management Portal ([http://manage.windowsazure.com](http://manage.windowsazure.com)).
    Find your newly created database under SQL Database and click the Manage button
    at the bottom of the screen as seen in Figure [10-3.](#index_split_002.html#p218)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 160](index-218_1.png)


    ![Image 161](index-218_2.jpg)


    CHAPTER 10 ■ FEdERATions


    ***Figure 10-3.** Managing your SQL Database instance*


    Clicking on the Manage icon brings up another window, asking you to log in to
    the database server you selected.


    On that screen you can also specify the name of your database (EnzoLog2 in my
    example). Once logged in, you are in the SQL Database Management Portal, as shown
    in Figure [10-4](#index_split_002.html#p218).


    ***Figure 10-4.** Viewing the properties of your database*


    You will notice that your federations are showing up on the right; both CustomerVisits
    and PurchaseHistory can be seen in Figure [10-4](#index_split_002.html#p218).
    Let’s click on PurchaseHistory. The Drop Federation button right underneath it
    becomes enabled, allowing you to drop the entire federation with a single click.
    Dropping a federation will drop all the federation members. From this screen you
    can also create a new federation by clicking the New button on top, or you can
    also view the performance of your queries by clicking Query Performance. Note,
    however, that the performance information shown will only apply to the root database
    because that’s what we are looking at right now.


    To view the details of a federation, click the arrow to its right. If you click
    to view the details of PurchaseHistory, for example, the screen will look like
    Figure [10-5](#index_split_002.html#p219). You can browse on top of each federation
    member, or click on them to see a window showing additional options. For example,
    you can resize individual federation members from this 215


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 162](index-219_1.jpg)


    CHAPTER 10 ■ FEdERATions


    screen easily by clicking on Resize and specifying a target size. You can also
    perform a split operation from this screen easily by selecting Split and providing
    a value for the federation key at which the federation member will be split.


    ***Figure 10-5.** Viewing a federation and its federation members*


    Advanced Considerations


    As you can see from the previous examples, Federations offer an important scalability
    model for cloud applications that need to scale beyond the capabilities of a single
    SQL Database instance. There are, however, certain challenges and considerations
    that are worth discussing before you decide to adopt this feature.


    Limitations


    Let’s review some of the most important limitations you should be aware of before
    adopting Federations.


    • **No Merging.** You may have noticed the lack of merging capability. Once you
    split a federation member, you cannot merge it back in the current version of
    SQL Database. Although this is a shortcoming, future versions of Federations will
    likely support this capability.


    • **Independent Schemas.** As hinted previously, once a federation member has
    been created, its schema definition is independent from all the others in the
    same federation. In our previous example, you could connect to one of the federation
    members and drop a table, or add a column, or even change a stored procedure.
    Because there are no safeguards at this time, it is relatively easy to have federation
    members that have slightly different schemas. This could have some implications
    in your code, for example. So if you make an update to the schema of a federation
    member, remember to make the same changes to all the other federation members.


    • **Limited Tool Support.** For the time being, most tools available on the market
    do not support federated databases, including some of the tools provided by Microsoft.
    Although this is very likely to change over time, you cannot use Data Sync services,
    Azure Reporting Services, or the database COPY operation with a federated member.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ FEdERATions


    • **No Fan-Out.** Another important limitation is the lack of support for cross-federation
    member queries. In other words, you cannot issue a request that will span, or
    fan-out, multiple federation members, let alone multiple federations. If you want
    to obtain the total sum of your sales, you would normally run this simple statement:


    SELECT SUM(amount) FROM purchases


    • Because this statement cannot be executed against multiple federation members
    by SQL


    Database, you will need to run this query on every federation member, and perform
    the final sum operation in your code.


    ■ **Note** Executing the same query across multiple databases is called a fan-out
    operation. Fan-out operations are not hard to implement in your code, although
    you should execute fan-out queries using multiple threads to improve the performance
    of your fetch operation.


    There are many more limitations that apply to Federations that may impact your
    design or your ability to adopt Federations, such as no support for indexed views,
    lack of support for the timestamp and rowversion data types, and more.


    ■ **Note** if you are planning to use Federations for your application, you should
    spend some time reviewing al the documented limitations on Msdn. search for Federation
    Guidelines and Limitations using Bing.


