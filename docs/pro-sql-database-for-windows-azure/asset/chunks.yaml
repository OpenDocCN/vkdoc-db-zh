  trans: '

    # 第 12 章：Windows Azure 移动服务


    ## 选择数据库


    接下来，你需要选择是使用现有的 Windows Azure SQL 数据库实例，还是创建一个新的数据库实例。在此示例中，我选择了创建新数据库。因此，我选择了`新建
    SQL 数据库`选项，并指定了希望数据库创建的区域。


    ## 指定数据库设置


    `新建移动服务`向导的第二页要求你为新数据库命名。在此情况下，由于我选择了在美国东部区域创建数据库，该对话框搜索并发现我在该区域有一个 SQL 数据库服务器，并将其列在`服务器`下拉列表中。我只需填写登录名和密码，如图
    12-3 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 188](img/index-247_1.png)


    ![Image 189](img/index-247_2.png)


    ***图 12-3.** 新建移动服务向导的第 2 页*


    你可以选择`配置高级数据库设置`选项（如图 12-3 所示），该选项将显示“高级数据库设置”页面，你可以在其中选择数据库`版本`（Web 版或商业版）、数据库大小和排序规则。如果你倾向于接受默认的高级设置，即
    1GB Web 版数据库和 `SQL_Latin1_General_CP1_CI_AS` 排序规则设置，只需在“高级数据库设置”页面上点击`确定`（对勾）。


    ## 预配移动服务


    在“指定数据库设置”页面填写完所有信息后，点击`确定`。随后，将在 Windows Azure 上预配一个新的 Windows Azure 移动服务，在 Windows
    Azure SQL 数据库中创建一个新的数据存储（因此需要在向导中输入数据库信息），该存储允许你保存应用程序所需的任何类型的数据。接下来，它将创建一系列 REST
    服务终结点，应用程序可调用这些终结点来执行保存数据、执行推送通知和安全登录等任务。


    移动服务的创建过程只需片刻，完成后，新服务将列在门户中，如图 12-4 所示。该服务现在已运行于 Windows Azure 中，并可供使用。图 12-4
    显示了移动服务名称和状态列，但在右侧第四列是服务的 URL。


    点击此 URL 将打开一个新的浏览器标签页，显示页面提示 Windows Azure 移动服务已启动并正在运行。


    ***图 12-4.** 在门户中选择新的移动服务*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 190](img/index-248_1.png)


    ## 开始使用服务


    创建服务仅仅是个开始，但正如前面提到的，它确实不会变得太难。下一步是创建一个与该服务通信的应用程序，幸运的是，我们为此也不需要做太多工作。


    回到 Windows Azure 管理门户，点击图 12-4 中突出显示的服务名称，这将带我们进入预览门户中常见的熟悉仪表板。该仪表板提供了一种快速入门体验，在你使用其他
    Windows Azure 服务（如网站和数据库）时也会看到。


    点击服务名称链接将带您进入快速入门的`入门`页面，如图 12-5 所示。此页面提供了两个简单的演练示例；一个向你展示如何将现有应用程序连接到移动服务，另一个则引导你如何从头开始创建新的应用程序。如图
    12-5 所示，此示例将使用`创建新的 Windows Store 应用`选项。


    ***图 12-5.** 创建新的 Windows 8 应用程序*


    ## 连接现有应用程序


    如果你已有现成的应用程序，连接它真的没那么难。选择`连接现有的 Windows Store 应用`选项，系统会要求你选择开发语言，然后只需将几行代码复制并粘贴到现有应用程序中；这样做即可访问移动服务
    SDK 来执行上述任务（保存数据、推送通知等）。


    ## 创建新应用程序


    对于本练习，请选择`创建新的 Windows Store 应用`，它提供了一个三步演练来构建新应用程序。步骤 1 要求你下载 Visual Studio 和移动服务
    SDK。如果你尚未下载 Visual Studio，该链接将带你转到相应的页面下载 Visual Studio 2012 Express。如果你已安装 Visual
    Studio 2012，请点击第二个链接，它将安装移动服务 SDK。


    ## 创建表


    一旦所有合适的工具安装完毕，下一步就是创建必要的表。表可以在任何时候添加，本章稍后将对此进行介绍。表用于存储你的移动服务应用程序所需的数据。你可以创建任意数量的表，这些表将存储在
    Windows Azure SQL 数据库中，即在移动服务预配期间指定的数据库实例中（在我们的 ScottsToDoList 示例中，这是图 12-3 所示的
    `MyMobileToDoList` 数据库实例）。尽管使用 SQL 数据库作为数据存储，但这些表可以拥有的架构实际上相当灵活。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 191](img/index-249_1.png)


    ![Image 192](img/index-249_2.png)


    ![Image 193](img/index-249_3.png)


    在本教程中，新应用程序将为我们创建相应的表和架构，因此只需点击`创建 TodoItem 表`按钮。几秒钟内，表就会被创建，并且如图 12-6 所示，页面会通知我们表确实已创建。


    ***图 12-6.** 创建支撑表*


    ## 下载示例应用程序


    第三步是`下载应用程序`。是的，你没看错，下载应用程序。本教程将下载一个完整的、可立即使用的示例应用程序，该应用程序将与刚刚创建的移动服务配合工作，且无需修改任何代码。


    选择语言（如图 12-7 所示，本例中我们选择 `C#`），然后点击`下载`按钮，这将下载一个包含启动项目的 zip 文件。


    ***图 12-7.** 下载 C# 的 Visual Studio 解决方案*


    将 zip 文件保存到本地硬盘驱动器，然后解压缩。如图 12-8 所示，下载的 zip 文件包含一个完整的 Visual Studio 解决方案。


    ***图 12-8.** 下载并解压后的 C# 项目目录*


    通过双击解决方案文件打开解决方案，并打开`解决方案资源管理器`窗口。在解决方案资源管理器中（图 12-9），你应该会注意到两个文件：`App.xaml` 和
    `MainPage.xaml`。这两个页面都包含为开发人员自动提供的存根代码。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 194](img/index-250_1.png)


    ![Image 195](img/index-250_2.jpg)


    ***图 12-9.** 示例解决方案*


    打开 `App.xml.cs` 文件，并注意在约第 25 行处引用了先前创建的移动服务。这是在下载 zip 文件之前自动注入到应用程序中的，因此你可以按原样运行应用程序而无需任何代码修改。

