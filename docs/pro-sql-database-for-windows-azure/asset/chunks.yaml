- fmt: '# Chapter 11 - Performance Tuning


    ON `T.UserType` = `UT.UserType`


    WHERE `T.AgeGroup` > 0 AND `UT.UserTypeKey` = ''Manager''


    This statement returns 25 rows. To view the execution plan, you need to request
    it before running the statement.


    Either press `Ctrl + M` or choose `Query ➤ Include Actual Execution Plan` from
    the menu in SQL Server Management Studio, and re-run the SQL statement. You should
    now see an `Execution Plan` tab. Click the tab to see output similar to that shown
    in Figure 11-2.


    **Figure 11-2.** Sample execution plan, not tuned


    In order to fully understand the previous execution plan, let’s review additional
    symbols often seen in execution plans. Table 11-5 shows a few symbols provided
    by SSMS that have clear performance implications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 168](index-229_1.png)


    ![Image 169](index-229_2.png)


    ![Image 170](index-229_3.png)


    ![Image 171](index-229_4.png)


    ![Image 172](index-229_5.png)


    ![Image 173](index-229_6.png)


    **Table 11-5.** Lookup, index scan, and index seek operators


    | Operator | SSMS Symbols | Comment |

    | :--- | :--- | :--- |

    | Lookup | ![Image](...) | Lookups can be costly when the statement returns thousands
    of rows and a lookup is needed for every row. If you determine that the lookup
    is costly, consider creating a covering index. |

    | Index scan | ![Image](...) | An index or clustered index scan may or may not
    be a bad thing. *Scanning* means that SQL Database reads all the records sequentially
    in the index. Scanning isn’t good for performance if you return a fraction of
    the records being scanned, in which case an index is needed. But if you want to
    return all the records from a table, a scan is necessary. |

    | Index seek | ![Image](...) | An index or clustered index *seek* means the first
    record matching the query is found quickly, without scanning. |


    Execution plans can show many other symbols that have very specific meanings,
    including hints that a query is using multiple processors, and so on.


    Because no indexes are defined on the underlying tables (outside of the required
    clustered index) and the execution plan in Figure 11-2 shows two clustered index
    scans (which are equivalent to table scans in this case), you have a potential
    performance problem. The `INNER JOIN` logical operator is executed with a `hash
    match` physical operator. You can see a thicker line coming into the hash match;
    hovering your cursor on this line shows you that 50 records are being consumed
    by the `JOIN` operation (see Figure 11-3). Also, you can see that a clustered
    index scan is being used to fetch data for both tables. Finally, note that the
    hash match operation consumes 73% of resources of the entire statement; this means
    it takes more time to `JOIN` the records than to read the data.


    **Figure 11-3.** Verifying how many records are being consumed by a `JOIN` operator


    In summary, the statement you’ve been working with has three potential issues:


    - **Index scans.** An index scan is performed on both tables, likely causing more
    reads than necessary.

    - **Heavy operator processing.** The `hash match` operation is consuming most
    of the processing time.

    - **More reads than records returned.** As you can see from Figure 11-3, the statement
    is processing 50 records but returning only 25. This may be a hint that you’re
    reading more records than necessary. However, this isn’t always a problem in itself—just
    something to keep an eye on.


    > **Note:** For those familiar with heap tables, SQL Database doesn’t allow them.
    If you intend to insert records into a table, a clustered index must be defined
    on the table.


    You’ll see shortly how indexing can help you tune this statement. But before leaving
    the topic of execution plans, it’s important to be familiar with a few more points:


    - **Relative query cost.** Notice in Figure 11-2, shown earlier, that near the
    top of the window, a query cost is displayed. This is a relative measure compared
    to all the other statements being executed as a batch. In this example, the value
    is 100% because it’s the only statement. You should know, however, that this value
    can be misleading. It’s calculated dynamically by SQL Server Management Studio
    based on estimated costs, not actual costs. As a result, this value is rarely
    accurate.

    - **Advanced calls.** Certain operations, such as XML calls and using functions
    in your SQL statements, are usually misrepresented in an execution plan; as such,
    SQL Database (and even SQL Server) may return 1% as a cost for those operations,
    when the actual cost can be much higher. This may lead you down the wrong path
    when tuning your SQL statements.

    - **Discarding output.** As discussed previously, the duration (as measured by
    `sys.dm_exec_sessions`) includes display time, and that applies to SQL Server
    Management Studio. To minimize the time it takes to display the data, you can
    disable the output by checking the necessary settings in `Query ➤ Query Options`.
    The same option appears in two places: in the `Grid Results` and `Text Results`.
    Figure 11-4 shows how to disable the output from the `Grid` display.


    **Figure 11-4.** Disabling output in SQL Server Management Studio


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 175](index-231_1.png)


    # Execution Plans with the Management Portal


    You should also note that the SQL Database Management Portal allows you to view
    execution plans; however, the symbols representing the logical operations and
    the functionality provided are different.


    For example, the display area changes depending on the zoom level, showing a simplified
    view when zooming out and allowing you to see problem areas very quickly. Figure
    11-5 shows that the T-SQL statement consumes the most resources (total cost) on
    its `Index Seek` operation.


    **Figure 11-5.** Viewing an execution plan with the SQL Database management portal


    You probably realized that the `Index Seek` symbol is different from the one shown
    by SSMS. Although the symbols are very sleek and largely self-describing, you
    may find it a bit more difficult to tune certain T-SQL operations, because some
    of the symbols are simplified. For example the `Non-Clustered Index Seek` and
    the `Clustered Index Seek` operations are combined into a single symbol in the
    management portal. Nevertheless, if you zoom enough you will see a description
    of the operation under the symbol, clearly identifying which operation is being
    represented as will be seen in Figure 11-7.


    Clicking on one of the symbols will give you additional details, as shown in Figure
    11-6, similar to what you can see in SSMS. Clicking on the `View More` button
    will display extensive information about the operation. To close the detailed
    window, simply click in an empty area in the execution plan area.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 176](index-232_1.png)


    **Figure 11-6.** Viewing operation details


    You will find that the management portal for SQL Database includes some interesting
    options, such as the ability to sort batch statements by total resource consumption,
    CPU, or I/O. You can also quickly locate certain operations, such as warnings
    and scans, by selecting the appropriate icon on the left side. And you can also
    switch the display of the execution plan to a simple list or a nested list by
    clicking on the top right icons without rerunning the T-SQL.'
