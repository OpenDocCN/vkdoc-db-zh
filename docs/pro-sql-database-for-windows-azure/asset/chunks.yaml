    ## 创建数据集


    创建数据源后，现在需要为报告添加数据集。每个数据源可以创建一个或多个数据集。每个数据集指定您希望在报告中使用的数据源字段。数据集还包含（除其他事项外）用于获取数据的查询以及用于筛选数据的任何查询参数。


    7.  在“报告数据”窗口中，右键单击“数据集”节点，然后从上下文菜单中选择“添加数据集”。这样将打开“数据集属性”窗口，如图 6-11 所示。

    8.  “数据集属性”窗口的“查询”页面允许您执行两个主要操作：指定此数据集所基于的数据源，以及指定查询类型和关联的查询。对于本示例，请基于您之前创建的数据源。查询类型是“文本”，这意味着您在“查询”字段中键入一条
    `T-SQL` 语句。


    对于此示例，将连接四个表以返回联系信息，例如姓名和地址，因此请输入如图 6-11 所示的 `SELECT` 语句。数据集的“名称”默认为 `DataSet1`，对于本示例来说可以接受。单击“确定”。


    **图 6-11.** `Dataset Properties` 对话框


    您的数据集无需执行其他操作；您已准备好定义和布局报告。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 97](index-140_1.png)


    ## 第6章 SQL Reporting


    ### 创建报告设计


    报告处于“设计”视图中后，您现在可以开始进行布局。在本示例中，您不需要做任何花哨或广泛的事情，只需一些简单的内容来演示与 SQL Database 的连接性。请按照以下步骤操作：


    1.  从“工具箱”中，将一个文本框和一个表格拖到“报告设计器”窗口。将文本框移动到报告顶部：它是报告标题。将文本框中的文本更改为 `My First SQL
    Azure Report`。

    2.  您放在报告上的表格有三列，但您需要五列。右键单击任何现有列，然后从上下文菜单中选择“插入列”➤“右侧”，以添加一列。再添加一列，总共五列。

    3.  从“报告数据”窗口中，将 `First Name`、`Last Name`、`Address Line 1`、`City` 和 `State` 列从数据集拖到表格中的列，如图
    6-12 所示。


    **图 6-12.** 报告设计视图


    4.  您的简单报告已完成——它并不复杂或美观，但它是功能性的。您现在可以测试报告：为此，选择“预览”选项卡。您将看到如图 6-13 所示的结果。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 98](index-141_1.png)


    ### 第6章 SQL Reporting


    **图 6-13.** 报告预览视图


    图 6-13 显示了您的工作成果，展示了 SQL Database 实例中多个表中的 `First Name`、`Last Name`、`Address Line
    1`、`City` 和 `State` 数据。如果您的报告看起来像这样，那么恭喜您——您刚刚创建了一个查询 SQL Database 的报告。然而，本章节的强大之处现在来自于部署报告。


    ### 部署报告


    要部署报告，请按照以下步骤操作：


    1.  回到 Windows Azure 管理门户，在导航窗格中选择“报告”选项，然后选择之前创建的报告服务器。

    2.  从门户的“服务器信息”部分突出显示并复制“Web 服务 URL”。

    3.  回到 SSDT，右键单击报告解决方案，然后从上下文菜单中选择“属性”。

    4.  在“属性页”对话框中，您唯一需要输入的是 `TargetServerURL`，如图 6-14 所示。另请注意 `TargetReportFolder`
    的名称，在本例中为 `AzureReport`——您的 Visual Studio 解决方案的名称。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 99](index-142_1.png)


    ![Image 100](index-142_2.png)'
