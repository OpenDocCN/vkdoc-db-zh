    use the Windows Azure Management Portal or issue a T-SQL statement against the
    master database using SQL Server Management Studio.


    Using the Windows Azure Management Portal


    One way to create a database is to do so from the Windows Azure Management Portal.
    Selecting the SQL Databases tab in the Navigation pane (left side of the page)
    will list all of your existing SQL Database instances and the server they are
    associated with. Creating a database can be accomplished in the portal in either
    of two ways. First, with the list of database instances displayed, click the New
    button in the lower-left corner of the portal page in the lower menu bar, and
    then select SQL Database ➤ Quick Create. Second, you can optionally select the
    Servers tab on the top of the portal page (next to the Databases tab), select
    the appropriate server name from the list of servers, select the Databases tab,
    and then click Add on the lower menu bar. Figure [1-4 sho](#index_split_000.html#p14)ws
    the management portal with a few subscriptions and SQL Database instances created.


