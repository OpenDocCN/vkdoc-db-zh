    created with a special project template: Cloud. Other project types are available
    when creating cloud projects and are discussed later in this section. Although
    you can create the same project as a regular ASP.NET application first and convert
    it to a cloud project later, it is easier to start with a cloud project right
    away to avoid additional conversion steps.


