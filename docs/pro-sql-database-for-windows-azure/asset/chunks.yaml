    ### Application Design


    Last, but certainly not least, design choices can have a significant impact on
    application response time. Certain coding techniques can negatively affect performance,
    such as excessive roundtrips. Although this may not be noticeable when you’re
    running the application against a local database, it may turn out to be unacceptable
    when you’re running against SQL Database.


    The following coding choices may impact your application’s performance:


    - **Chatty design.** As previously mentioned, a chatty application uses excessive
    roundtrips to the database and creates a significant slowdown. An example of a
    chatty design includes creating a programmatic loop that makes a call to a database
    to execute a SQL statement over and over again.


    - **Normalization.** It’s widely accepted that although a highly normalized database
    reduces data duplication, it also generally decreases performance due to the number
    of `JOIN`s that must be included. As a result, excessive normalization can become
    a performance issue.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 11 ■ performance tuning


    - **Connection release.** Generally speaking, you should open a database connection
    as late as possible and close it explicitly as soon as possible. Doing so improves
    your chances of quickly reusing a database connection from the pool when you have
    a large number of connections being made. Indeed, connections are released in
    the pool when they are closed. If you do not release your connections quickly
    enough, you could create a condition in which connection requests are queued until
    connections become available in the pool, or connection requests time out if the
    wait is too long.


    - **Shared database account.** Because SQL Database requires a database login,
    you need to use a shared database account to retrieve data instead of using a
    per-user login. Using a per-user login prohibits the use of connection pooling
    and can degrade performance significantly, or even render your database unusable
    due to throttling.


    There are many other application design considerations, but the ones listed here
    apply the most to programming against SQL Database. For more information, read
    the following chapter from Microsoft’s Patterns and Practices:


    [http://msdn.microsoft.com/en-us/library/ff647768.aspx.](http://msdn.microsoft.com/en-us/library/ff647768.aspx)


    ### Summary


    This chapter provided an overview of some of the most important tuning techniques
    that are available to help you address SQL Database performance issues. As you’ve
    seen, troubleshooting and tuning statements can be complex and require various
    tools and methods to obtain the desired outcome. You saw a few dynamic management
    views and execution plans, took a quick tour of indexing, and briefly touched
    on the statistics provided by the `ADO.NET` library.


    You also learned about some design considerations that can affect application
    performance.


    You can discover additional techniques and concepts on Microsoft’s web site at


    [http://msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx](http://msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## **Chapter 12**


    ## **Windows Azure Mobile Services**


    Since the release of the first edition of this book 2010 the SQL Azure OData service
    has been removed. That’s not a bad thing. OData is still around, and you can still
    prop up a WCF data service and communicate via the OData protocol.


    In fact, if you use `WCF Data Services`, you might very well be using `OData`.
    `WCF Data Services` supports the `OData` protocol, which allows you to expose
    your data as a feed with resources that are addressable by `URI`s. `OData` allows
    you to expose data from a variety of sources, ranging from Microsoft Excel to
    websites, not just relational databases.


    Creating a data service that exposes an `OData` feed really boils down to three
    simple and basic steps:

    1.  **Define the model:** `WCF Data Services` natively supports models that are
    based on the `ADO.NET Entity Framework`.

    2.  **Create the data service:** Define a data service which exposes a class that
    inherits from the `DataService` class.

    3.  **Configure the data service:** Configure access to resources (such as tables)
    and service operations, and define service-wide behavior. `WCF Data Services`
    disables access to resources that are exposed by the entity container by default.


    However, this chapter is not about `WCF Data Services` or `OData`. Windows Azure
    SQL Database (AKA SQL Azure) doesn’t natively support `OData`, as it did during
    the SQL Azure lab days of the OData service. Instead, in late August 2012, Microsoft
    released (in Preview) the Windows Azure Mobile Services.


    Windows Azure Mobile Services is designed specifically to allow developers to
    quickly and easily connect their client applications to a cloud-based backend
    running on Windows Azure, regardless of the platform the client is running on
    (such as Windows 8 device, Android table, or iOS).


    The beauty of Windows Azure Mobile Services is that it enables you to get up and
    running extremely quickly by providing a foundation for building a rich client
    experience. As you will see in this chapter, Windows Azure Mobile Services allows
    you to connect your application very quickly.


    ■ **Note** Keep in mind that the description here is based on Windows Azure Mobile
    Services in Preview, meaning that it is not in production at the time of this
    writing, and some details may change when it is actually released.


    ### Getting Started


    To use Windows Azure Mobile Services, you will need a Windows Azure account. Chapter
    1 explains how to sign up for an account, so that process won’t be explained here.
    Working with Windows Azure Mobile Services is as simple as navigating to the Windows
    Azure Portal a[t https://manage.WindowsAzure.com. O](https://manage.WindowsAzure.com)nce
    you log in with your Live ID, you’ll notice a new tab on the Navigation pane called
    Mobile Services, as shown in Figure [12-1.](#index_split_002.html#p245)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 186](index-245_1.jpg)


    ## Chapter 12 ■ Windows Azure Mobile Services


    ***Figure 12-1.** The Mobile Services option on the Navigation pane*


    Creating a new Windows Azure Mobile Services service is as simple as selecting
    the Mobile Services tab in the Navigation pane, selecting the New button at the
    bottom of the portal, and finally selecting Create to bring up the New Mobile
    Service wizard, shown in Figure [12-2](#index_split_002.html#p246).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 187](index-246_1.png)


    ## Chapter 12 ■ Windows Azure Mobile Services


    ***Figure 12-2.** Page 1 of the New Mobile Service wizard*


    The first page of the New Mobile Service wizard asks you to provide a name for
    the service. The service name, as you can see, is actually a `URL` that the application
    will access. You don’t need to specify the entire `URL`, just the name.


    As you can see in Figure [12-2](#index_split_002.html#p246), I simply supplied
    a name. The service will append the remainder of the `URL` for me.'
