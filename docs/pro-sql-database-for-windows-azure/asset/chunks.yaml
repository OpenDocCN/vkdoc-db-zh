  trans: "\n# 第 6 章 SQL Reporting\n\n**图 6-14.** 解决方案属性页\n\n5. 在`属性`页面上点击确定。\n6. 在`解决方案资源管理器`中右键单击解决方案，然后从上下文菜单中选择`部署`。\n\
    \   几秒钟后，系统将提示您输入`Reporting Services 登录`信息。这是您在预配服务器时输入的管理员用户名和密码。\n7. 报表部署完成后，返回到`Windows\
    \ Azure 管理门户`并点击功能区上的`刷新`按钮。您的报表随后将显示在门户的`项目列表`部分，如图 6-15 所示。\n\n**图 6-15.** 在管理门户中显示的报表\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n8. 打开浏览器，并导航至 `https://[servername].reporting.windows.net/reportserver/AzureReport/Report1`。\n\
    9. 您应该会看到`SQL Reporting Service Home`文件夹和列出的`AzureReport`文件夹。在`AzureReport`文件夹中就是您新创建的报表。要查看报表，请点击该报表链接。\n\
    \n您刚刚完成了一个简单示例，创建了一个从`SQL Database`提取数据的报表。然而，在我们结束关于`SQL Reporting`的讨论之前，我们还需要谈谈安全性。\n\
    \n## 安全性\n\n本节包含一些关于管理您的`SQL Reporting`服务器和报表安全性的指导原则与最佳实践。\n\n-   将报表嵌入应用程序时，请确保到报表服务器的连接字符串的安全。\n\
    -   由于报表只能使用`SQL Database`实例作为数据源，因此推荐为报表提供对共享数据源的访问方式是创建和部署共享数据源到报表服务器上的一个文件夹。在报表服务器上存储每个共享数据源的凭据。\n\
    -   默认情况下，报表项继承基于报表文件夹权限的安全性。因此，您部署报表项到的文件夹至关重要。通过向文件夹分配特定权限，您可以中断文件夹层次结构中的权限继承。\n\
    \n`SQL Reporting`不仅需要用户名和密码来访问报表，还需要一个`URL`。这三部分信息是报表服务器帐户的`URL`、用户名和密码。不过，您可以在`管理门户`中创建用户，并为他们分配授予权限的角色。然后，您可以将这些用户名和密码提供给报表阅读者。\n\
    \n创建新用户时，您可以将它们分配到`项目`角色，并可选择分配到`系统`角色。\n\n## 角色\n\n作为创建新用户的一部分，您还需要将它们分配到一个`项目`角色，以及可选地分配到一个`系统`角色。这些`项目`角色和`系统`角色类似于本机模式报表服务器上可用的角色：\n\
    \n-   **项目角色**：`浏览器`、`内容管理器`、`我的报告`、`发布者`和`报表生成器`。\n-   **系统角色**：`系统管理员`和`系统用户`。\n\
    \n`角色`是一个有助于按功能或目标进行组织的概念。角色代表一个或多个执行一项或多项需要特定权限的职能或任务的人员。对于`SQL Reporting`，前述角色有助于确定哪些用户可以执行特定功能，例如查看或编辑报表、发布报表、创建和管理其他用户以及管理数据库对象。\n\
    \n例如，`浏览器`角色可以运行报表、订阅报表并浏览文件夹结构。\n`我的报告`角色可以管理工作区来存储和使用报表及其他项目。\n\n需要注意的是，这些角色并非特定于`Windows\
    \ Azure SQL Database`，而是特定于底层的`SQL Server Reporting`服务。有关这些角色的更多信息可以在这里找到：[`msdn.microsoft.com/library/ms157363.aspx(v=SQL.105)`](http://msdn.microsoft.com/library/ms157363.aspx(v=SQL.105)\n\
    \n![Image 101](img/index-144_1.png)\n\n按照以下步骤创建用户并为其分配角色：\n```\nif (condVar >\
    \ someVal) {console.log(\"xxx\")}\n```\n"
- fmt: "# CHAPTER 6 ■ SQL Reporting\n\n## Using the Management Portal\n\n1.  In the\
    \ Management Portal for SQL Reporting, click the **Manage** button on the ribbon.\
    \ This will display the **Manage Users** dialog shown in Figure 6-16.\n\n    **Figure\
    \ 6-16.** The Manage Users dialog\n\n2.  To add a user, click the **Create User**\
    \ button to open the **Create User** dialog, as seen in Figure 6-17.\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n    ![Image 102](index-145_1.png)\n\n    ![Image 103](index-145_2.png)\n\n \
    \   **Figure 6-17.** The Create User dialog\n\n3.  In the **Create User** dialog,\
    \ enter a username and password. Select an **Item** role and an optional **System**\
    \ role. Click **OK**.\n4.  Click **OK** on the **Manager Users** dialog.\n\nEven\
    \ though both **My Reports** and **Report Builder** are listed in the **Item**\
    \ role drop-down list on the **Create User** dialog, they are not available nor\
    \ supported in SQL Reporting. However, depending on role assignments, users can\
    \ perform different tasks on the server. By granting users the **Browser** role,\
    \ you give those users permission to read reports. You can assign users to multiple\
    \ roles, and via the combination of roles and permission create users who have\
    \ the appropriate permissions for our reporting environment.\n\nExcept for provisioning\
    \ the Report Server and managing users, the majority of this chapter has used\
    \ tools such as SQL Server Data Tools to create and deploy reports. However, a\
    \ lot of what you did in this chapter can also be done through the Management\
    \ Portal, which provides additional functionality. Figure 6-18 shows the ribbon\
    \ in the Management Portal when a SQL Reporting server is selected. Notice that\
    \ you can create a shared data source, create and set permissions on a folder,\
    \ upload a report, and look at server usage statistics. Server statistics provides\
    \ the ability to look at the overall usage of SQL Reporting over a given time\
    \ span. By default it will show you the usage over a single day, but you can also\
    \ view usage data over a 2-day period, 1-week period, 1-month period, and 3-month\
    \ period.\n\n**Figure 6-18.** The Management Portal ribbon\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nAlso from the ribbon, you have the ability to look at the report execution log.\
    \ You are not limited to a time span with this option. You can simply select start\
    \ and end dates for which you want to view. The execution report can be saved\
    \ locally.\n\n## Pricing\n\nStarting August 1, 2012, users of SQL Reporting are\
    \ billed for using it. SQL Reporting use is charged for each clock hour of a reporting\
    \ instance (reporting server), a minimum of one reporting instance for each clock\
    \ hour that a SQL Reporting server is provisioned, even if no reports are deployed.\n\
    \nThe price per reporting instance is $0.88 per hour per reporting instance. This\
    \ charge covers up to 200 reports each clock hour. For each clock hour during\
    \ which more than 200 reports are generated, another Reporting Instance Hour at\
    \ $0.88 will be billed (for each additional block of 200 reports).\n\n## Summary\n\
    \nIn this chapter you first learned what Windows Azure SQL Reporting is and the\
    \ many benefits this cloud-based reporting solution provides. This chapter then\
    \ discussed the architecture of SQL Reporting and how this architecture provides\
    \ the high availability and scalability needed in a cloud-based reporting solution.\n\
    \nIt's also important to understand the functional differences between on-premises\
    \ SQL Server Reporting Services and SQL Reporting, so we spent some time discussing\
    \ these differences and how they might impact report development.\n\nLastly, this\
    \ chapter discussed provisioning a new SQL Reporting server, creating and deploying\
    \ a report, and the security around hosting reports in SQL Reporting. Much of\
    \ the functionality is shared between on-premises development tools and the Management\
    \ Portal when developing reports, such as defining folders and data sources and\
    \ applying permissions. This provides great flexibility in report development.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# Chapter 7 ■ SQL Data Sync\n\
    \nWhen I first wrote this chapter for the first edition of this book, SQL Data\
    \ Sync was part of SQL Azure Labs and called SQL Azure Data Sync Services. Not\
    \ too much later it was moved out of the SQL Azure Labs and has been in CTP (Community\
    \ Technology Preview) and available in the Windows Azure Management Portal. Since\
    \ that time, SQL Data Sync Services, or DSS, has been gaining tremendous momentum\
    \ and acceptance and by the time you read this, will be out of CTP and in full\
    \ general availability.\n\nA bit of background is due. In November 2009, at the\
    \ Microsoft Professional Developers Conference (PDC) in Los Angeles, Microsoft\
    \ announced Project Huron, which allows database synchronization capabilities\
    \ in the cloud.\n\nIf you've been following the hype and keeping up with the blog\
    \ posts regarding Huron, you know that Microsoft has been billing it and associated\
    \ database sync functionality as “friction free,” meaning easy to set up and maintain.\n\
    \nMicrosoft's goal with Huron was to eliminate many of the emblematic complexities\
    \ and idiosyncrasies that are associated with data sharing between databases,\
    \ such as scalability and configuration. Along with these goals, Microsoft also\
    \ wanted to include user-friendly tools that let administrators easily configure\
    \ and synchronize their data.\n\nIn June 2010, at the start of Tech-Ed in New\
    \ Orleans, Microsoft announced the public preview availability of the Data Sync\
    \ Service for SQL Azure, part of the Huron project. This is Microsoft's solution\
    \ to allow users to easily and efficiently share data between databases without\
    \ regard to database locations or connectivity. Sharing data is only the beginning:\
    \ Microsoft also has visions of including data collaboration, providing users\
    \ and developers the ability to use and work on data regardless of the data's\
    \ location.\n\nIn May 2012, Microsoft formally implemented a new approach to the\
    \ naming and branding of the services in Windows Azure, including SQL Azure Data\
    \ Sync Services. As such, SQL Azure Data Sync Services is now called SQL Data\
    \ Sync.\n\nThis chapter focuses entirely on the capabilities and features of SQL\
    \ Data Sync. It begins with a brief overview and then shows you how to get started\
    \ by setting up and configuring the Data Sync service. You will then work through\
    \ several examples of using SQL Data Sync in different scenarios and situations.\
    \ You also see some patterns and best practices along the way to help ensure a\
    \ solid understanding of the Data Sync Service.\n\n## Understanding SQL Data Sync\n\
    \nSQL Data Sync provides bidirectional synchronization between two or more databases.\
    \ On the surface, it's as simple as that; but even behind the scenes, it doesn't\
    \ get much more complicated. With zero lines of code, you can quickly and easily\
    \ configure your SQL Database to be synchronized with other SQL Database instances\
    \ in any of the Microsoft Azure data centers or even with on-premises SQL Server.\n\
    \n## Why the Need?\n\nWhy is the ability to sync data between SQL Database instances\
    \ important? That's a fair question to ask. Let's explore a couple of answers.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 104](index-148_1.png)\n\
    \nFirst, you may be a fan of SQL Server replication, but it isn't the easiest\
    \ feature to set up and configure. Granted, transactional replication gives you\
    \ real-time updates, but setting up and maintaining transactional replication\
    \ isn't a cake walk.\n\nSecond, although SQL Data Sync doesn't give you real-time\
    \ updates, it does allow you to extend your data to the location closest to your\
    \ users *without* a lot of headaches. The Data Sync service lets you move data\
    \ changes between databases seamlessly. It ensures that the appropriate changes\
    \ are proliferated to all the other databases in the current data center as well\
    \ as other databases in other data centers."
