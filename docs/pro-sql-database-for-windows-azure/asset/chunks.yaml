    try\n{\n    while (dr.Read())\n    {\n        cost += 0.25 * ...; // calculation\
    \ logic goes here\n    }\n}\nfinally\n{\n    dr.Close();\n    conn.Close();\n\
    }\n```\n\nOr you can calculate the cost in a stored procedure and change the previous\
