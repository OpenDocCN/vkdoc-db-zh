    ## Blob Data Stores


    *Blobs* are files that can be stored in Windows Azure. What is interesting about
    blobs is that they can be easily accessed through REST, there is no limit to the
    number of blobs that can be created, and each blob can contain as much as 200GB
    of data for block blobs and 1TB of data for page blobs. As a result, blobs can
    be used as a backup and transfer mechanism between consumers.


    A system can dump SQL Database tables to files using the Bulk Copy Program (`BCP`),
    possibly compressing and/or encrypting the files beforehand, and store the blobs
    in Windows Azure.


    ### Edge Data Caching


    The chapter briefly mentioned caching earlier, but you should remember that caching
    may yield the most important performance gains in your application design. You
    can cache relatively static tables in memory, save them as blobs (or a form of
    in-memory storage) so that other caching systems use the same cache, and create
    a mechanism to refresh your data cache using queues in Azure.


