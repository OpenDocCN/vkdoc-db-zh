    \            listBox1.DataSource = ds.Tables[0];\n            dataGridView1.DataSource\
    \ = ds.Tables[0];\n            listBox1.DisplayMember = \"FirstName\";\n     \
    \   }\n        catch (OdbcException ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n\
    \        }\n    }\n    ```\n\n5.  在运行项目之前，您需要修改第一个按钮背后的代码，以传递适当的 `Enum` 并返回正确的连接字符串。在\
