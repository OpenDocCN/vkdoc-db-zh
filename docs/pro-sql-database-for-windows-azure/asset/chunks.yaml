  trans: '

    `SQL Azure 迁移向导`的目标是帮助您将本地的 `SQL Server 2005/2008` 数据库迁移到 `SQL Azure`。此工具采用向导驱动，非常易于使用。它将逐步引导您完成所有必需的步骤，使得迁移过程简单且几乎无缝。


    您可以在 Codeplex 上找到 `SQL Azure 迁移向导`：[`sqlazuremw.codeplex.com/`](http://sqlazuremw.codeplex.com/)。


    请注意，尽管这个巧妙的实用工具可以迁移 2005、2008 和 2012 版本的数据库，但它运行的最低要求是 `SQL Server 2008 R2`。


    ## SQL Azure 备份策略


    您的数据虽然已在云端，但事情远不止于此。数据库管理员在处理本地数据存储时触手可及的许多功能，在云端还不存在。这句话的关键词是 `还不存在`。


    ### 复制数据库


    `数据库复制`功能允许您创建源数据库的单个副本。您可以通过向 `CREATE DATABASE` 语句添加一个新参数来实现：`AS COPY OF`。作为复习，`CREATE
    DATABASE` 的语法如下：


    ```

    CREATE DATABASE MyDatabase (MAXSIZE= 10 GB, EDITION= ''Business'')

    ```


    要创建源数据库的副本，语法现在变为：


    ```

    CREATE DATABASE MyDatabase AS COPY OF [source_server_name].source_database_name

    ```


    因此，如果您想创建 `AWMini` 数据库的副本，语法是：


    ```

    CREATE DATABASE AWMini2 AS COPY OF servername.AWMini

    ```


    图 4-23 显示了执行上述语句的情况。有趣的是请注意“消息”窗口中的信息。当您执行带有 `AS COPY OF` 参数的 `CREATE DATABASE`
    语句时，您会立即收到“命令已成功完成”的消息。这是否意味着复制完成得如此之快？


    不是的。此消息意味着复制已`开始`。您还可以在图 4-23 中看到 `AWMini2` 数据库已经列在数据库列表中；但这并不意味着数据库复制已经完成。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 68](img/index-101_1.png)


    ![Image 69](img/index-101_2.png)


    **图 4-23.** 复制数据库


    ### 确定复制何时完成


    那么问题来了，您如何知道复制何时完成？答案是 Microsoft 创建了一个新的数据管理视图（DMV）来返回数据库复制操作的详细信息。这个 DMV 叫做 `sys.dm_database_copies`，它返回大量关于数据库复制状态的信息，例如数据库复制过程何时开始和完成、已复制的字节百分比、错误代码等。此外，Microsoft
    修改了 `sys.databases` 表中的 `state` 和 `state_desc` 列，以提供有关新数据库状态的详细信息。


    图 4-24 显示了数据库复制的进度。该语句查看 `sys.dm_database_copies` DMV 并检查复制状态，报告复制的开始日期和时间、完成百分比以及状态更新的日期和时间（在
    `modify_date` 列中）。任何复制错误都显示在 `error_code` 和 `error_description` 列中。一旦复制完成，表中与该复制对应的特定行将从表中移除。


    **图 4-24.** 检查数据库复制状态


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 自动化数据库复制


    您可以通过本地 `SQL Agent` 作业和 `SSIS` 包（如本章前面所述）来调度数据库复制。只要 `Execute SQL` 任务的连接信息指向 `SQL
    Azure` 数据库，该作业就可以像普通的本地 SQL 作业一样进行调度。


    尽管这可能不是最理想的解决方案，但它确实是一个选项，并且确实提供了您所需的调度功能。此解决方案的关键是在重新创建之前先删除复制的数据库。


    ### 维护备份历史记录


    `数据库复制`功能可以让您创建数据库的即时备份，但它不提供创建备份历史记录的方法。换句话说，您无法追加备份并创建多天的备份记录。


    然而，您确实有几个选择。


    如果您只关心备份当天的数据，可以删除当前的备份副本并重新复制数据库。这是一个可行的选项，并且不需要太多维护。


    另一方面，如果您想要一个备份历史记录，这样做就有点棘手了。许多公司（如果不是大多数的话）希望保留一周的备份。这些公司每晚备份数据库，并保留七天的备份，以便可以选择恢复到前一晚备份之前的状态。要使用`数据库复制`功能实现这一点，您必须创建源数据库的七个副本——您有七个备份副本数据库。


    这个策略可行，但请记住，您需要为这七个额外的数据库付费。这里的关键是，如果您使用 `SQL Azure`，仔细审视您的备份计划至关重要。


    ### 使用导入/导出功能进行备份


    虽然 `AS COPY OF` 功能很好，但您现在需要为额外的数据库付费。许多公司现在正在考虑使用的备份和恢复解决方案是本章开头讨论的 `导入/导出服务`。将数据库备份存储在
    `Windows Azure BLOB 存储`中，其成本肯定远低于第二个数据库的成本，此外，您还可以拥有数据库的多个备份。当然，这两者都不提供您在本地习惯使用的
    `事务` 和 `差异` 备份解决方案，但 `导入/导出服务` 和 `DAC 框架` 为您提供了更大的灵活性。


    ## 第三方备份产品


    目前市场上有两款非常好的产品，为 `SQL Azure` 提供出色的备份和恢复功能：


    - `Enzo Backup for SQL Azure`

    - `Cloud Services`


    ### Enzo 备份


    由 `Blue Syntax` 公司开发的 `Enzo Backup for SQL Azure` 是一款本地 Windows 应用程序，允许您对 `SQL
    Azure` 数据库执行备份和恢复请求。该工具的灵活性体现在几个方面。首先，您可以备份到 `BLOB 存储`或本地文件系统，并从中恢复。备份会自动压缩，并包含
    `架构` 和数据。其次，您可以备份整个数据库或特定的 `架构`。您还可以恢复特定的 `架构` 或该 `架构` 或数据库中的特定表。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    备份具有事务一致性，就像 `CREATE DATABASE` 命令的 `AS COPY OF` 功能一样。


    `Enzo Backup` 工具还允许您在 `Azure 平台`中调度备份作业运行。备份完全在云端执行和运行，使用的是 `云代理`。该代理有多种大小（与 `Windows
    Azure 托管服务`的大小相匹配），允许您决定希望备份执行的速度。有关 `Enzo Backup for SQL Azure` 工具的更多信息可以在这里找到：


    [`www.BlueSyntax.net/backup.aspx`](http://www.BlueSyntax.net/backup.aspx)


    ### 云服务

