    Data Sync Limitations


    While SQL Data Sync is quite functional and very flexible, there are some limitations
    in the pre-release version. The following is a list of the current limitations
    for SQL Data Sync.


    • Maximum number of SQL Data Sync Servers per subscription: 1


    • Maximum number of sync groups any database can belong to: 5


    • Filters per table: Up to 12 (optionally 13 if one is on the primary key column)


    • Database, table, schema, and column names: 50 characters per name


    • Tables in a sync group: 100


    • Columns in a table in a sync group: 1000


    If you query the HumanResources.Employee table, you’ll notice that it contains
    BusinessEntityID 1 to 290, well below the filter of 10,000. Even though there
    is a PK/FK constraint on the hub database, why were records less than 10,000 synchronized
    in the HumanResources.Employee table?


    The answer is that currently filtering is on individual tables. In this example
    the filter would need to be applied to both tables. In all reality, the filter
    would be for records less than 10,000 and applied to both tables.


    Additionally, in some cases this *might* mean denormalizing the schema of your
    database so that the value on which you want to filter is available in each table.


    Existing triggers on source tables, CHECK constraints, and indexes on XML-type
    columns are not provisioned.


    Indexes are created only for the columns selected to be synchronized.


    Data Sync Best Practices


    A lot has been learned since the last release of this book, so this section will
    focus on best practices learned over the last couple of years. We will discuss
    topics that will help in the design and planning phase for SQL Data Sync. The
    key is to keep in mind that SQL Data Sync is a global solution, allowing you to
    move data around the world.


    Design Considerations


    • **Avoid synchronization loops:** A synchronization loop results when there are
    circular references within a sync group so that each change in one database is
    replicated through the databases in the sync group circularly and endlessly. Sync
    loops degrade performance and significantly increase costs. Synchronization loops
    can be avoided by not including circular references within a database or table,
    or between two sync groups.


    • **On-premises-to-cloud scenario:** Keep your hub database close to the greatest
    concentration of the sync group’s database traffic to minimize latency.


    • **Cloud-to-cloud scenario:** When all the databases in a sync group are in the
    same data center, the hub database should also be located in the same data center.
    When databases in a sync group are in different data centers, the hub database
    should be located in the data center where the majority of the traffic takes place.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ SQL Data SynC


    Initial Synchronization


    • SQL Data Sync treats prepopulated rows as data conflicts. Whenever possible,
    start with an empty destination database.


    • To increase performance, use the auto-provisioning capability only for testing.
    For production, pre-provision the destination databases with the schema.


    • Views and Stored Procedures are not created on the destination database. You
    can use the Generate Scripts wizard in SQL Server Management Studio or SQL Server
    Data Tools to deploy these objects.


    Security


    • Install the client agent using the least privileged account with network service
    access.


    • Install the client agent on a computer separate from the on-premises SQL Server.


    • Databases should not be registered with more than one client agent to avoid
    any challenges with deleting sync groups.


    Sync Schedule


    No bullet points here but a few words of caution. It is good practice to schedule
    synchronizations such that each synchronization has time to complete. If one synchronization
    tries to execute before the prior one completes, the second sync attempt won’t
    even start. There is no indication via the logs or management portal that the
    sync did not take place.


    For example, if the sync schedule is set for every five minutes but it takes the
    group six minutes to complete then your synchronizations will only happen every
    10 minutes, not every 5.


    Currently, SQL Data Sync is offered without a charge. Yet, there are data transfer
    charges for data that leaves any data center. Inbound data transfer (ingress)
    is free, but there are charges for outbound data (egress). Thus, be cognizant
    of how frequently data needs to be refreshed per table.


    Summary


    Although SQL Data Sync is yet to be officially released, this chapter has provided
    a detailed walkthrough of the functionality you can expect to see when it’s released.


    The chapter began with an overview of SQL Data Sync, including why it is needed
    and a basic scenario of SQL


    Data Sync. From there, the majority of the chapter focused on building a SQL Data
    Sync example, illustrating how to create, configure, and manage a sync group.


    Lastly, a few pages were spent on SQL Data Sync security and design best practices,
    considerations, and limitations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 8**


    **Windows Azure and ASP.NET**


    This chapter walks you through the steps of creating a Windows Azure application
    and deploying it in the cloud. By now, you know you can’t create WinForms applications
    in Windows Azure. However, you can create an ASP.NET application that runs locally
    in IIS and connects to SQL Database, or build an ASP.NET application that runs
    as a cloud project which can then run entirely in the cloud. This chapter will
    show you how to build a small web application in ASP.NET that can be deployed
    in the cloud, and implements the Direct Connection pattern discussed in Chapter
    2.


    An application published in the Microsoft cloud is referred to as a *cloud service*,
    even if it’s a web site. So, you first need to create a new Windows Azure cloud
    service to host the web site.


    Creating a Cloud Service


    First, you need to set up a Windows Azure cloud service so you can deploy a Windows
    Azure application later. Each Windows Azure service created in the cloud is mapped
    to a virtual machine. In most cases you do not need to have control over the Virtual
    Machine (VM) itself; you can simply deploy your applications and configure certain
    parameters. However, you can also perform advanced tasks such as running startup
    scripts and establishing a remote connection to the VM.


    To create your Windows Azure cloud service, follow these steps:


    1\. Open Internet Explorer, and go to [http://manage.windowsazure.com](http://manage.windowsazure.com).
    You’re prompted to sign in with your Windows Live account.'
