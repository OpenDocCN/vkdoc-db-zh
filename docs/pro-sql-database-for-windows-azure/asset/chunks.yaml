- fmt: 'You saw how to use caching in a data access layer and how parallel processing
    of SQL statements can increase performance of your applications. You also explored
    more advanced topics, such as referential integrity and exception management.
    This chapter provides you with the necessary background to create your own shard
    and create high-performing applications against `SQL Database`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 10


    ## Federations


    One of the major tenets of any cloud computing platform is elasticity, allowing
    systems to scale beyond certain limits of their current designs. With Federations,
    `SQL Database` delivers on that promise; it is a technology your `SQL Database`
    instances can use to scale over time based on size or performance bottlenecks.


    You may have certain expectations about how this technology should work, one of
    which is likely to be transparency to your applications. You may expect that no
    code changes should be necessary to your existing applications if you were to
    use Federations. Like anything else, radical features like Federations come with
    certain compromises. Considering that this is the first incarnation of Microsoft’s
    answer to scaling out the database tier, you will need to account for certain
    limitations before you can reap the benefits. This chapter will help you understand
    what problems Federations answer and how to best leverage this feature.


    ### Introducing Federations


    Until now, the only practical way developers and administrators could improve
    the performance and scalability of a database that needs both read and write access,
    without introducing significant code changes, was to add more memory, more CPU,
    or more disks on the same server. This is referred to as “scaling up.” The Federation
    feature was introduced on the `SQL Database` platform with the intent of solving
    the scalability issues of traditional database servers; it provides a way to “scale
    out” a database by adding more servers to your database.


    ### Federations versus Sharding


    In the database world, sharding is a general term describing the distribution
    of highly related data across multiple physical machines. As a result, sharding
    is the implementation of a scale-out architecture used by large databases in order
    to harness the computing power of multiple machines. Federations are `SQL Database`’s
    implementation of the sharding concept. To explain where Federation fits in the
    big picture, I’ll outline the various scaling models available.


    The scaling models described below are architected around the concept of a `data
    domain`, which is the primary unit of data segregation used in a shard. For example,
    in most commercial applications the data domain is the customer. In astronomy
    the data domain could be a galaxy, or a planet. In finance, it could be the fiscal
    year.


    - **Scale Up**. As described previously, scale-up architecture involves adding
    more resources to a machine holding data. The fundamental issue with scale-up
    architecture is that at some point adding more resources on a server doesn’t yield
    better performance, because the application is not designed to account for all
    the available resources, and the law of diminishing returns applies. All the data
    domain instances are stored in the same database, and every query needs to include
    the data domain it is using (such as a `WHERE` clause when searching for a specific
    customer ID). This is the architecture used by most systems.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 10 ■ FEdERATions**


    - **Linear Shard**. In a linear shard architecture, the application is designed
    to split every data domain instance into its own database. So in the case of a
    customer-driven data domain, each customer has its own database. In this model,
    queries do not need to filter on the data domain, since the connection string
    already points the query to the correct customer data.

    The major drawback of this approach is that administrators are managing as many
    databases as there are customers. In `SQL Database`, this can also mean additional
    operating expenses.


    - **Compressed Shard**. A compressed shard is similar to a linear shard in the
    sense that data domain instances are isolated. However, the isolation is performed
    by schema containers in the database, instead of the database itself. In this
    model, each data domain is a database schema, and multiple databases could be
    used to store the schemas. Typically this model reduces the number of physical
    databases used and could reduce some operating expenses as a result.


    - **Federation**. A federation is a form of shard compression. At first the data
    is stored in a single database (scale up); however, administrators can split the
    data into two or more databases (compressed shard) in which each database contains
    a collection of data domain instances.

    One could in theory achieve a linear shard with Federations by splitting each
    data domain instance into its own database, although in practice this would probably
    not be practical. As a result, Federation is a sharding architecture allowing
    administrators to implement degrees of compression based on actual usage patterns
    of their database and achieve an optimum cost/benefit implementation. As you will
    see later, Federations are also more flexible because an administrator can implement
    multiple data domains, which is not possible with the other models. In summary,
    a federated database can implement one or more data domains, each of which is
    its own shard with its own compression.


    ### Why Use Federations?


    Let’s start by understanding why some applications are designed (or redesigned)
    to use Federations. As hinted previously, Federations solve two common problems:
    storage space in `SQL Database` and performance over time.


    As you know, `SQL Database` is limited in size to 150GB of data. What do you do
    if your database grows beyond this space limitation? Your choices are simple:
    truncate some of the data (or archive old records) or use Federations.


    Because Federations allows you to split tables across multiple databases, you
    could spread your data across multiple 150GB databases, giving you terabytes of
    storage capacity in `SQL Database`. For example, your database may have a table
    called `PurchaseHistory` with hundreds of millions of records in it and representing
    90% of all storage needs. You could federate this table across multiple servers,
    and leave all the other tables unchanged. If your `PurchaseHistory` table were
    to grow to 1TB in size, you would need seven `SQL Database` instances of 150GB
    each to store that table (called federation members), plus the original database
    containing all the other tables (called the root database).


    A great feature of Federations is that you can add more databases over time as
    your storage needs increase. So if your table grows to 1.1TB, just add another
    150GB database.


    Another important driver for adoption of Federations is database performance.
    When the number of users grows in your application, the database workload typically
    increases. There are more records to process over time, and because you have more
    users, the database will typically experience an increase in requests. At some
    point, the workload increases so much that your application may experience slowdowns,
    and even throttling from `SQL Database`. Federations can help you achieve higher
    performance, in certain cases, because instead of processing all the requests
    in a single database, you are essentially distributing certain requests to multiple
    databases, each with its own allocation of CPU, memory, I/O, and `TempDB`. In
    other words, Federations increase your computational resources naturally because
    your data is stored on servers that share virtually nothing in common.


    ### Federations Overview'
