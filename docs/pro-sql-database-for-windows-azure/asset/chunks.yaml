    \n![Image 136](index-179_1.png)\n\n## CHAPTER 8 ■ Windows Azure And ASP.NET\n\n\
    5.  Go back to the `Default.aspx` page, and change the `SqlDataSource` settings\
    \ as follows by adding the `ConnectionString` and the `SelectCommand` settings\
    \ manually.\n    ```xml\n    <asp:SqlDataSource ID=\"SqlDataSource1\" runat=\"\
    server\"\n        ConnectionString=\"<%$ ConnectionStrings:Connection1 %>\"\n\
    \        SelectCommand=\"SELECT uid, name FROM sys.sysusers ORDER BY 1\" >\n \
