    Deployment and Configuration Files


    You probably noticed that there are multiple configuration files in your solution.
    You can find a Web.Config file in your project, along with two additional files
    underneath: Web.Debug.Config and a Web.Release.Config. These two additional files
    allow you to perform transformations to your Web.Conf file depending on the build
    configuration. You can use this feature when you want to modify the connection
