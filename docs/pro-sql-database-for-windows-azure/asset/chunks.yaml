  trans: "\n*   关键字或语句选项 `textimage_on` 在当前版本的 SQL Server 中不支持。\n*   `ROW GUID COLUMN`\
    \ 在当前版本的 SQL Server 中不支持。\n*   `文件组引用与分区方案` 在当前版本的 SQL Server 中不支持。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 4 章 ■ 数据迁移与备份策略\n\n你可能还会遇到的另一个情况是 SQL Azure 不支持 `堆表`。堆表是指没有聚集索引的表。SQL Azure\
    \ 目前只支持聚集表。\n\n那么问题就变成了，为了使脚本能在 SQL Azure 上运行，需要做哪些更改？\n\n为了让脚本在 SQL Azure 下运行，你需要进行一些修改。具体操作如下：\n\
    1.  删除所有 `SET ANSI_NULLS ON` 实例。\n2.  删除所有 `ON [PRIMARY]` 实例。\n3.  删除所有 `TEXTIMAGE_ON\
    \ [PRIMARY]` 实例。\n4.  删除以下所有实例：\n    *   `PAD_INDEX = OFF`\n    *   `ALLOW_ROW_LOCKS\
    \ = ON`\n    *   `ALLOW_PAGE_LOCKS = ON`\n5.  在 `Person` 表中，修改 `rowguid` 列，移除\
    \ `ROWGUIDCOL` 关键字。\n6.  为任何堆表添加聚集索引。\n\n## 附录 B\n\n详细讨论了进行这些更改的必要性。现在，这里给出一个简要说明：\n\
    \n*   `ON [PRIMARY]` 不需要，因为正如你在第 1 章和第 2 章所学，SQL Azure 隐藏了所有硬件特定的访问和信息。没有 `PRIMARY`\
    \ 或文件组的概念，因为磁盘空间由 Microsoft 处理，因此不需要此选项。\n*   根据 SQL Server 联机丛书 (BOL)，你可以移除包含表选项的整个\
    \ `WITH` 子句。但是，你真正需要移除的表选项只有第 4 步列出的那些（`PAD_INDEX`、`ALLOW_ROW_LOCKS` 和 `ALLOW_PAGE_LOCKS`）。\n\
    *   尽管这个表没有使用，但 `NEWSEQUENTIALID()` 函数在 SQL Azure 中不受支持，因为 SQL Azure 中没有 `CLR`\
    \ 支持，因此所有基于 `CLR` 的类型都不支持。`NEWSEQUENTIALID()` 的返回值就是其中之一。此外，`ENCRYPTION` 选项也不受支持，因为\
    \ SQL Azure 整体上还不支持加密。\n*   SQL Azure 不支持 `堆表`。因此，你需要通过添加聚集索引将任何堆表更改为聚集表。（有趣的是，如果你一次执行一条语句，你实际上可以*创建*堆表。但是，任何向该表的插入操作都会失败。）SQL\
    \ Azure 文档建议的事项之一（如前所列）是将 `Convert UDDTs to Base Types` 属性设置为 `True`。这是因为 SQL\
    \ Azure 不支持用户定义类型。\n\n在对你的 SQL 脚本进行上述修改后，它应该如下所示：\n\n```sql\n/****** Object: Schema\
    \ [Person] Script Date: 4/22/2012 3:38:28 PM ******/\n\nCREATE SCHEMA [Person]\n\
    \nGO\n\n/****** Object: UserDefinedDataType [dbo].[Name] Script Date: 4/22/2012\
    \ 3:38:28 PM ******/\n\nCREATE TYPE [dbo].[Name] FROM nvarchar NULL\n\nGO\n\n\
    /****** Object: UserDefinedDataType [dbo].[NameStyle] Script Date: 4/22/2012 3:38:28\
    \ PM ******/\n\nCREATE TYPE [dbo].[NameStyle] FROM [bit] NOT NULL\n\nGO\n\n/******\
    \ Object: Table [Person].[Person] Script Date: 4/22/2012 3:38:28 PM ******/\n\n\
    SET ANSI_NULLS ON\n\nGO\n\nSET QUOTED_IDENTIFIER ON\n\nGO\n\nCREATE TABLE [Person].Person\
    \ NOT NULL,\n\n[NameStyle] [bit] NOT NULL,\n\n[Title] nvarchar NULL,\n\n[FirstName]\
    \ nvarchar NOT NULL,\n\n[MiddleName] nvarchar NULL,\n\n[LastName] nvarchar NOT\
    \ NULL,\n\n[Suffix] nvarchar NULL,\n\n[EmailPromotion] [int] NOT NULL,\n\n[AdditionalContactInfo]\
    \ [xml] NULL,\n\n[Demographics] [xml] NULL,\n\n[rowguid] [uniqueidentifier] NOT\
    \ NULL,\n\n[ModifiedDate] [datetime] NOT NULL,\n\nCONSTRAINT [PK_Person_BusinessEntityID]\
    \ PRIMARY KEY CLUSTERED\n\n(\n\n[BusinessEntityID] ASC\n\n)WITH (STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF)\n\n)\n\nGO\n\nALTER TABLE [Person].[Person] ADD\
    \ CONSTRAINT [DF_Person_NameStyle] DEFAULT ((0)) FOR [NameStyle]\n\nGO\n```\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 4 章 ■ 数据迁移与备份策略\n"
