    ## Figure 2-14. Aggregation + MMS patterns


    For example, this pattern can be used to collect information from multiple SQL
    Database instances into a single one used by a third party to monitor overall
    performance. A Windows Azure worker process can run a performance view provided
    by SQL Database and store the data into another database. Although the SQL Database
    instances being monitored for performance may have a totally different schema,
    the output of SQL Database’s performance data management view (DMV) is consistent.
    For example, the monitoring service can call `sys.dm_exec_connections` to monitor
