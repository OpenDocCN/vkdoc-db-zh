- fmt: 'The goal of the `SQL Azure Migration Wizard` is to help you migrate your local
    `SQL Server 2005/2008` databases into `SQL Azure`. This utility is wizard-driven,
    making it very easy to use. It walks you step by step through all that is required,
    so migration is simple and nearly seamless.


    You can find the `SQL Azure Migration Wizard` on Codeplex at [http://sqlazuremw.codeplex.com/](http://sqlazuremw.codeplex.com/).


    Note that although this nifty utility migrates 2005, 2008, and 2012 databases,
    it requires a minimum of `SQL Server 2008 R2` to run.


    ## SQL Azure Backup Strategies


    Your data is in the cloud, but it really doesn’t stop there. Much of the functionality
    that DBAs have at their fingertips when dealing with local data stores doesn’t
    exist in the cloud yet. The operative word in that sentence is `yet`.


    ### Copying a Database


    The `Database Copy` feature allows you to create a single copy of a source database.
    You do so by adding a new argument to the `CREATE DATABASE` statement: `AS COPY
    OF`. As a refresher, the syntax for `CREATE DATABASE` is as follows:


    ```

    CREATE DATABASE MyDatabase (MAXSIZE= 10 GB, EDITION= ''Business'')

    ```


    To create a copy of a source database, the syntax now becomes:


    ```

    CREATE DATABASE MyDatabase AS COPY OF [source_server_name].source_database_name

    ```


    Thus, if you want to create a copy of your `AWMini` database, the syntax is:


    ```

    CREATE DATABASE AWMini2 AS COPY OF servername.AWMini

    ```


    Figure 4-23 shows the execution of the previous statement. The interesting thing
    to note is the message in the Messages window. When you execute the `CREATE DATABASE`
    statement with the `AS COPY OF` argument, you immediately get the “Command(s)
    completed successfully” message. Does this mean the copy finished that quickly?


    No. This message means the copy has `started`. You can also see in Figure 4-23
    that the `AWMini2` database is already listed in the list of databases; however,
    that doesn’t mean the database copy has completed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 68](index-101_1.png)


    ![Image 69](index-101_2.png)


    **Figure 4-23.** Copying a database


    ### Knowing When a Copy Is Complete


    The question then becomes, how do you know when the copy is finished? The answer
    is that Microsoft created a new data management view (DMV) to return the details
    of the database copy operation. This DMV is called `sys.dm_database_copies`, and
    it returns a great deal of information about the status of the database copy,
    such as when the database copy process started and completed, the percentage of
    bytes that have been copied, error codes, and more. In addition, Microsoft modified
    the `state` and `state_desc` columns in the `sys.databases` table to provide detailed
    information about the status of the new database.


    Figure 4-24 shows the progress of the database copy. The statement looks at the
    `sys.dm_database_copies` DMV and checks the status of the copy, reporting the
    start date and time, and percent complete of the copy process, and the date and
    time the status was updated (in the `modify_date` column). Any copy errors are
    shown in the `error_code` and `error_description` columns. Once the copy is complete,
    the specific row in the table for the copy is removed from the table.


    **Figure 4-24.** Checking the database copy status


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Automating a Database Copy


    You can schedule a database copy via an on-premises `SQL Agent` job and an `SSIS`
    package (as discussed earlier in this chapter). The job can be scheduled like
    a normal on-premises SQL job, as long as the connection information for the `Execute
    SQL` task points to the `SQL Azure` database.


    Although this may not be the most favorable solution, it’s certainly an option,
    and it does provide the scheduling capabilities you’re looking for. The key for
    this solution is to first delete the copy database before you re-create it.


    ### Maintaining a Backup History


    The `Database Copy` functionality lets you create an instant backup of your database,
    but it doesn’t provide a way to create a backup history. In other words, you can’t
    append to the backup and create multiple days’ worth of backups.


    You do have several options, however.


    If all you care about is backing up the current day’s data, you can delete the
    current backup copy and recopy the database. This is a viable option and doesn’t
    require a lot of maintenance.


    If, on the other hand, you want a backup history, doing so is a bit trickier.
    Many, if not most, companies like to keep a week’s worth of backups. These companies
    back up their databases each night and keep seven days’ worth of backups so they
    have the option to restore past the previous night’s backup. To do this with the
    `Database Copy` functionality, you must create seven copies of the source database—you
    have seven backup copy databases.


    This strategy works, but keep in mind that you’re billed for those additional
    seven databases. The key here is that if you’re using `SQL Azure`, a look at your
    backup plan is critical.


    ### Backing Up Using the Import/Export Features


    While the `AS COPY OF` feature is nice, you are now paying the cost for an additional
    database. What many companies are now looking at for a backup and restore solution
    is the `Import/Export Services` discussed at the beginning of this chapter. Storing
    database backups in `Windows Azure BLOB storage` is certainly much cheaper than
    the cost of a second database, and in addition you can have multiple backups of
    your database. Now, granted, neither of these give you the `Transactional` and
    `Differential` backup solutions that you are used to on-premises, but the `Import/Export
    service` and `DAC framework` give you a lot more flexibility.


    ## Third-Party Backup Products


    Currently on the market there are two very good products that provide excellent
    backup and restore capabilities for `SQL Azure`:


    - `Enzo Backup for SQL Azure`

    - `Cloud Services`


    ### Enzo Backup


    `Enzo Backup for SQL Azure`, by a company called `Blue Syntax`, is a local Windows
    application that lets you execute backup and restore requests for your `SQL Azure`
    database. The flexibility for this tool comes in several ways. First, you can
    back up and restore to and from `BLOB storage` or your local file system. Backups
    are automatically compressed and include both `schema` and data. Second, you can
    back up an entire database or a specific `schema`. You can also restore a specific
    `schema` or a specific table within that `schema` or database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The backups are transactionally consistent, just like the `AS COPY OF` feature
    of the `CREATE DATABASE` command.


    The `Enzo Backup` tool also allows you to schedule backup jobs to run in the `Azure
    platform` as well. Backups are performed and run entirely in the cloud using a
    `cloud agent`. The agent has multiple sizes (matching the `Windows Azure Hosted
    Services` sizes), allowing you determine how quickly you want your backup to execute.
    More information on the `Enzo Backup for SQL Azure` tool can be found here:


    [http://www.BlueSyntax.net/backup.aspx](http://www.BlueSyntax.net/backup.aspx)


    ### Cloud Services'
