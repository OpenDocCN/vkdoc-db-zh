    in the index. Be careful not to add too many columns to the index; this can be
    detrimental to performance. There are many tools available, including SQL Server
    Management Studio, that allow you to examine queries that are hitting the database
    to help determine which columns in the table would be beneficial to add to the
    index.


    Permissions


    The Permissions tab provides the ability to define who has Insert, Update, and
    Delete permissions. As shown in Figure [12-14](#index_split_002.html#p253), there
    are four options:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 199](index-253_1.png)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    ***Figure 12-14.** The Permissions tab*


    **Everyone:** Any request for the operation against the table is accepted. With
    this option, your data is wide open to everyone.


    **Anybody with the Application Key:** The application key is required to perform
    the operation. The application key is distributed with the application. Because
    this key is not securely distributed, it cannot be considered a security token.
    To secure access to your mobile service data, you must instead authenticate users
    before accessing.


    **Only Authenticated Users:** Only authenticated users are permitted to perform
    the operation. In this preview release, Windows 8 app clients are authenticated
    by Live Connect.


    Scripts can be used to further restrict access to tables based on an authenticated
    user.


    **Only Scripts and Admins:** The operation requires the service master key, which
    limits the operation only to registered scripts or to administrator accounts.


    Depending on the type and sensitivity of the data , it is recommended that the
    Everyone option be used sparingly.


    If there is data that needs protecting and is of sensitive nature, the second
    or third option should be used as a best practice. Authenticating users should
    be a practice to prevent access to sensitive data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 200](index-254_1.png)


    ![Image 201](index-254_2.png)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    Script


    The Script tab (Figure [12-15](#index_split_002.html#p254)) provides the ability
    to create *scriptlets*, server-side custom logic that will run on each operation
    (Insert, Update, Delete, and Read). Scriptlets are pieces of JavaScript code you
    can register to be executed.


    The name of the function must match the operation selected, except for Delete
    operations, which must be named del.


    ***Figure 12-15.** The Script tab*


    These scripts allow the injection of business logic into table operations. For
    example, client authentication can take place here based on the userIdvalue of
    the supplied userobject.


    Advanced Settings


    We have talked about Mobile Services from the Data point of view, but there are
    a few other items that need to be highlighted to give Windows Azure Mobile Services
    a complete preview. The three settings tabs that we will highlight in this section
    come from the main page of the Mobile Service and can be seen in Figure [12-16:
    P](#index_split_002.html#p254)ush, Identity, and Scale.


    ***Figure 12-16.** Mobile Services tabs*


    Push


    With Windows Azure Mobile Services you can send push notifications to your Windows
    Store application by using the Windows Push Notification Service (WNS). Sending
    push notifications to your application requires that you first configure your
    mobile service to work with WNS. This is accomplished by simply entering the Client
    Secret and Package SID values in the Push tab, as shown in Figure [12-17](#index_split_002.html#p255).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 202](index-255_1.png)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    ***Figure 12-17.** Push notification settings*


    These values are provided by WNS when you register your app on the Windows Push
    Notification & Live Connect page at


    [https://appdev.microsoft.com/StorePortals/en-us/](https://appdev.microsoft.com/StorePortals/en-us/)


    Enabling Push notifications requires first that you register your application
    for the Windows Store, at which point during the registration process you will
    be given the Client Secret and Package SID. At that point your application is
    now configured to work with WNS.


    Identity


    Windows Azure Mobile Services integrates with a number of different social media,
    third-party, and Microsoft applications to make it easy to authenticate users
    from within your application. The integration is supported through a number of
    identity providers. Currently, Mobile Services supports the following identity
    providers:


    • Microsoft


    • Facebook


    • Twitter


    • Google


    Figure [12-18](#index_split_002.html#p256) shows the information necessary to
    configure a Microsoft account, Facebook, and Twitter for Windows Azure Mobile
    Services. To enable authentication, you will first need to register your application
    with one of the above-mentioned identity providers to obtain the necessary ID
    or key and secret and then use that information in this settings window to configure
    the application to work with that provider.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 203](index-256_1.png)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    ***Figure 12-18.** Identity Provider settings*


    You will also need to add authentication code to your application to handle the
    process of users logging in. When a user login is authenticated by Mobile Services,
    the value of the userid property on the user object is set to a value that uniquely
    identifies the user. This value can then be used to authorize access to data.


    Scale


    The Scale tab is where you define the resources available to your application.
    Scaling your mobile service is as simple as switching between Shared and Reserved
    resource mode and setting the number of instances of the mobile service and the
    size of those instances, as shown in Figure [12-19](#index_split_002.html#p257).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 204](index-257_1.png)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    ***Figure 12-19.** Mobile Service Scale settings*


    By default, the mobile service is set to Shared mode, which means that all of
    your instances are running in a shared environment, co-located with other mobile
    services. Resources such as memory and CPU are shared among the mobile services.


    Switching to Reserved mode means that your mobile services have dedicated resources
    available to your mobile service, including memory, CPU, and bandwidth. Other
    mobile services cannot use the resources dedicated to your mobile service.


    In Windows Azure Mobile Services, you can also scale the Windows Azure SQL Database
    instances used by the service. Setting the Mobile Service Mode to Reserved means
    that all of your mobile services in the same region run in Reserved mode.


    ■ **Note** this chapter has touched on the configuration tabs lightly simply because
    its focus was on SQl database used as a data store for Windows Azure Mobile Services.
    For further information on how to configure push notifications or provider integration,
    visit [www.windowsazure.com/en-us/develop/mobile/](http://www.windowsazure.com/en-us/develop/mobile/).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ChAPter 12 ■ WindoWS Azure Mobile ServiCeS


    Summary


    While Windows Azure Mobile Services is still in Preview as this book goes to press,
    it should be obvious that this feature is quite exciting and really puts the “cherry
    on top” for Windows Azure. This chapter illustrated how easy it is to store and
    retrieve data in a Windows Azure SQL Database from a Windows Store application.'
  trans: '# 索引配置


    此选项卡还允许您在表上定义索引。默认情况下，会在 `id` 列上放置索引，但可以向索引添加列以提高查询性能。要将列添加到索引，请选择该列并单击 `Set as
    Index`。经常在查询中用于排序或过滤的列应包含在索引中。注意不要向索引添加过多列；这可能会对性能产生不利影响。有许多可用的工具，包括 `SQL Server
    Management Studio`，它们允许您检查访问数据库的查询，以帮助确定表中的哪些列对添加到索引有益。


    # 权限


    “权限”选项卡提供了定义谁具有插入、更新和删除权限的能力。如图 12-14 所示，有四个选项：


    ![Image 199](img/index-253_1.png)


    *图 12-14. 权限选项卡*


    *   **所有人：** 接受针对该表的任何操作请求。使用此选项，您的数据对所有人完全开放。

    *   **任何拥有应用程序密钥的人：** 执行操作需要应用程序密钥。应用程序密钥随应用程序分发。由于此密钥不是安全分发的，因此不能视为安全令牌。为了保护移动服务数据的访问，您必须先对用户进行身份验证，然后才能访问。

    *   **仅限经过身份验证的用户：** 只有经过身份验证的用户才被允许执行操作。在此预览版中，`Windows 8` 应用客户端通过 `Live Connect`
    进行身份验证。


    可以使用脚本根据经过身份验证的用户进一步限制对表的访问。


    *   **仅限脚本和管理员：** 该操作需要服务主密钥，这将操作限制为仅注册的脚本或管理员帐户。


    根据数据的类型和敏感性，建议谨慎使用“所有人”选项。


    如果存在需要保护且性质敏感的数据，则应使用第二或第三个选项作为最佳实践。对用户进行身份验证应是防止访问敏感数据的常规做法。


    ![Image 200](img/index-254_1.png)


    ![Image 201](img/index-254_2.png)


    # 脚本


    “脚本”选项卡（图 12-15）提供了创建 `scriptlets` 的能力，这些服务端自定义逻辑将在每次操作（插入、更新、删除和读取）时运行。`Scriptlets`
    是您可以注册以执行的 `JavaScript` 代码片段。


    函数的名称必须与所选操作匹配，但删除操作除外，其必须命名为 `del`。


    *图 12-15. 脚本选项卡*


    这些脚本允许将业务逻辑注入到表操作中。例如，可以在此处基于提供的 `user` 对象的 `userId` 值进行客户端身份验证。


    # 高级设置


    我们已经从数据的角度讨论了移动服务，但还有其他一些项目需要重点介绍，以便对 `Windows Azure Mobile Services` 有一个完整的了解。我们将在本节重点介绍的三个设置选项卡来自主页的移动服务，可以在图
    12-16: 推送、标识和缩放中看到。


    *图 12-16. 移动服务选项卡*


    ## 推送


    使用 `Windows Azure Mobile Services`，您可以通过 `Windows Push Notification Service (WNS)`
    向 `Windows Store` 应用程序发送推送通知。向您的应用程序发送推送通知需要您首先配置移动服务以与 `WNS` 协同工作。这可以通过简单地在“推送”选项卡中输入客户端密钥和包
    `SID` 值来完成，如图 12-17 所示。


    ![Image 202](img/index-255_1.png)


    *图 12-17. 推送通知设置*


    当您在 `Windows Push Notification & Live Connect` 页面（地址为 [`appdev.microsoft.com/StorePortals/en-us/`](https://appdev.microsoft.com/StorePortals/en-us/)）注册您的应用程序时，`WNS`
    会提供这些值。


    启用推送通知首先要求您为 `Windows Store` 注册您的应用程序，在注册过程中，您将获得客户端密钥和包 `SID`。此时，您的应用程序已配置为与
    `WNS` 协同工作。


    ## 标识


    `Windows Azure Mobile Services` 与许多不同的社交媒体、第三方和 `Microsoft` 应用程序集成，使得从您的应用程序内部轻松验证用户变得简单。这种集成通过许多身份提供商得到支持。目前，移动服务支持以下身份提供商：


    *   `Microsoft`

    *   `Facebook`

    *   `Twitter`

    *   `Google`


    图 12-18 显示了为 `Windows Azure Mobile Services` 配置 `Microsoft` 帐户、`Facebook` 和 `Twitter`
    所需的信息。要启用身份验证，您首先需要向上述某个身份提供商注册您的应用程序以获得必要的 `ID` 或密钥以及密钥，然后使用该信息在此设置窗口中配置应用程序以与该提供商协同工作。


    ![Image 203](img/index-256_1.png)


    *图 12-18. 身份提供商设置*


    您还需要将身份验证代码添加到您的应用程序中，以处理用户登录过程。当移动服务对用户登录进行身份验证时，`user` 对象上的 `userid` 属性的值将被设置为唯一标识用户的值。然后，此值可用于授权对数据的访问。


    ## 缩放


    “缩放”选项卡是您为应用程序定义可用资源的地方。扩展您的移动服务就像在共享和保留资源模式之间切换，并设置移动服务的实例数量以及这些实例的大小一样简单，如图
    12-19 所示。


    ![Image 204](img/index-257_1.png)


    *图 12-19. 移动服务缩放设置*


    默认情况下，移动服务设置为共享模式，这意味着您的所有实例都在共享环境中运行，与其他移动服务共址。内存和 `CPU` 等资源在移动服务之间共享。


    切换到保留模式意味着您的移动服务拥有专用于您的移动服务的资源，包括内存、`CPU` 和带宽。其他移动服务无法使用专用于您的移动服务的资源。


    在 `Windows Azure Mobile Services` 中，您还可以扩展服务使用的 `Windows Azure SQL Database` 实例。将移动服务模式设置为保留意味着您同一区域中的所有移动服务都在保留模式下运行。


    > **注意** 本章只是简要涉及了配置选项卡，因为其重点是用作 `Windows Azure Mobile Services` 数据存储的 `SQL` 数据库。有关如何配置推送通知或提供商集成的更多信息，请访问
    [www.windowsazure.com/en-us/develop/mobile/](http://www.windowsazure.com/en-us/develop/mobile/)。


    # 总结


    虽然截至本书付印时 `Windows Azure Mobile Services` 仍处于预览阶段，但应该显而易见的是，此功能非常令人兴奋，并且真正为 `Windows
    Azure` “锦上添花”。本章说明了从 `Windows Store` 应用程序在 `Windows Azure SQL Database` 中存储和检索数据是多么容易。'
- fmt: 'We began this chapter by creating a Windows Azure mobile service and then
    configured that service to use a Windows Azure SQL Database as the data store.
    We then downloaded the sample application, and you saw how easy it is to read
    and write data using Windows Azure Mobile Services, as well as to create an application
    for the Windows Store.


    Lastly, we took a brief look at some of the configuration settings that can be
    used within your application, such as social media integration with Facebook and
    Twitter, and with applications from other providers, such as Microsoft and Google.
    We also looked at the all-important aspect of scaling your mobile service and
    how easy it is to do that.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 205](index-259_1.png)


    ## Appendix A


    ### SQL Database Management Portal


    This appendix introduces you to the online SQL Database Management Portal built
    by Microsoft. It is a web-based application that allows you to design, manage,
    and monitor your SQL Database instances. Although the current version of the portal
    does not support all the functions of `SQL Server Management Studio`, the portal
    offers some interesting capabilities unique to SQL Database.


    #### Launching the Management Portal


    You can launch the SQL Database Management Portal (`SDMP`) from the Windows Azure
    Management Portal. Open a browser and navigate to [`https://manage.windowsazure.com`](https://manage.windowsazure.com),
    and then log in with your Live ID. Once logged in, click SQL Databases on the
    left and click on your database from the list of available databases. This brings
    up the database dashboard, as seen in Figure A-1. To launch the management portal,
    click the `Manage` icon at the bottom.


    *Figure A-1. SQL Database dashboard in Windows Azure Management Portal*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 206](index-260_1.png)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    ■ **Note** You can also access the `SDMP` directly from a browser by typing [`https://sqldatabasename.database.windows.net`](https://sqldatabasename.database.windows.net),
    where `sqldatabasename` is the server name of your SQL database.


    A new web page opens up that prompts you to log in to your SQL Database server.
    If you clicked through the Windows Azure Management Portal, the database name
    will be automatically filled and read-only. If you typed the URL directly in a
    browser, you will need to enter the database name manually. Enter a user name
    and password; then click `Log on` (Figure A-2).


    *Figure A-2. SQL Database Manage Portal login screen*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 207](index-261_1.png)


    Appendix A ■ SQL dAtAbASe MAnAgeMent portAL


    Once logged on, you will see a page similar to Figure A-3, which defaults to the
    administration summary page of the database instance, giving you general information
    about your database instance such as its free space, current connections, and
    more. You can also access the design page, a section of the portal that allows
    you to manage tables, views, and stored procedures. The administration and design
    features are explained next.


    *Figure A-3. Administration Summary screen*


    #### Administration Features


    The administration section of the portal allows you to manage your federations,
    monitor current query performance, and run `T-SQL` queries and optionally view
    their execution plans. Chapter 10 covered federations at length, so this appendix
    will focus on the other administration features.


    ##### Run T-SQL Statements


    Let’s first run a `T-SQL` statement and look at the options available to us. From
    the administration Summary page, click the `New Query` icon on top of the page.
    This opens up a new query window. You can open as many windows as needed to run
    multiple queries as you would in `SQL Server Management Studio`. Type and execute
    the following statement (click the `Run` icon to execute it):'
