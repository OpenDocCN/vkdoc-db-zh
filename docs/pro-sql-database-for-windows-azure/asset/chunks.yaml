- fmt: '# Appendix A: SQL Database Management Portal


    The page does not allow you to edit existing indexes. [Figure A-13](#index_split_002.html#p268)
    shows you the clustered index on the `DOCS` table, which has no foreign key defined.


    **Figure A-13. Editing indexes and foreign keys**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 218](index-269_1.jpg)


    To add an index, click the **Add an Index** icon. A panel will be displayed, and
    check boxes will become available next to each column in the table. Specify the
    name of the index and select the table columns that belong to it. You can also
    choose **Advanced Options**, which will show index settings to automatically rebuild
    indexes. Choose the **ONLINE** option, specify a filter for the index (as shown
    in [Figure A-14](#index_split_002.html#p269)), and then click the **Save** button
    in the panel to create the index.


    **Figure A-14. Creating an Index**


    To add a foreign key, click **Add a Foreign Key Relationship**, which is the icon
    you see toward the right in [Figure A-13](#index_split_002.html#p268). A new panel
    will be displayed, allowing you to select specific operations, including **On
    Delete** and **On Update** settings, as shown in [Figure A-15](#index_split_002.html#p270).
    Click on **Select a Reference Table** to display the list of available tables.
    Then select the reference table by clicking on its name. Next click the **Select
    a Reference column** to choose which column is used as a reference. Once the reference
    table and the column have been selected, the available columns to choose from
    in the source table (`DOCS`) are adjusted to those that match the data type of
    the reference column. Select the source columns that will be used (as shown in
    [Figure A-16](#index_split_002.html#p270)), and then click the **Save** button
    in the panel.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 219](index-270_1.png)


    ![Image 220](index-270_2.png)


    **Figure A-15. Creating a foreign key**


    **Figure A-16. Selecting the source and reference fields**


    To delete an index or a foreign key constraint, click the **Delete** icon (shown
    as an X) on the right side of the object.


    You can also view and edit the data stored in a selected table by clicking the
    **Data** header (see [Figure A-17](#index_split_002.html#p271)). This page shows
    you the top 200 records of the table by default. Clicking the **All Rows** link
    will display all the rows in the table. You can add a row (by choosing **Add Row**)
    or delete the selected row (using **Delete Row**).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 221](index-271_1.png)


    ![Image 222](index-271_2.png)


    **Figure A-17. Viewing table data**


    Clicking a specific column value will also allow you to edit the column. For example,
    [Figure A-18](#index_split_002.html#p271) shows you that I am editing the `DownloadPrice`
    value of the first row to $19.99.


    **Figure A-18. Editing a Column**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 223](index-272_1.png)


    A new icon—it resembles a pencil—on the left side of the row allows me to undo
    my edits, and the box on top of the table list shows the new value entered (you
    can edit the value in the column field directly, or in the text box area on top).


    Clicking the up/down arrow on the right of the text box expands or collapses the
    text area (see [Figure A-18](#index_split_002.html#p271)).


    Clicking the **Null** icon sets the value to Null. Clicking the **Revert Cell**
    icon resets your changes back to the original value. To save your changes, click
    the **Save** icon at the top of the screen. Note that you will not be able to
    edit all data types; for example, binary columns cannot be edited.


    ## Designing Views


    To manage your views, click the **Views** header from the default design page
    (shown earlier in [Figure A-10](#index_split_002.html#p266)). You will see a list
    of existing views. You can delete a view by selecting the view and then clicking
    **Drop View** at the bottom.


    Browsing the list with the mouse will also display the **Edit** and **Dependencies**
    icons discussed previously. You can also filter the list of views by typing characters
    in the **Search** box on top.


    Let’s create a view. Click the **New view** icon at the bottom of the list. A
    new page allows you to specify the name of the view, its schema (you can change
    the default schema by clicking on it and selecting from a list of available schemas,
    if any are available in the database), and the T-SQL of the view in the middle
    of the page. [Figure A-19](#index_split_002.html#p272) shows you that I am creating
    a view called `v_DBO_Tables` in the `dbo` schema. Click the **Save** icon on top
    to create the view.


    **Figure A-19. Creating a view**


    Once the view has been created, the page will display two new headers: **Design**
    and **Data**. The **Design** header allows you to edit the current view, and the
    **Data** header displays the list of records returned by the view, similar to
    the **Data** page for tables shown in [Figure A-17](#index_split_002.html#p271).
    The difference, however, is that the output of the view is read-only, so you cannot
    change the data returned by the view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 224](index-273_1.png)


    ## Designing Stored Procedures


    To manage your stored procedures, choose **Stored Procedures** from the design
    page shown in [Figure A-10](#index_split_002.html#p266). The list of stored procedures
    is displayed, and the features available on this page are identical to those explained
    for the views.


    To create a new stored procedure, choose **New Stored Procedure** at the bottom
    of the list. A new page allows you to select the schema of the stored procedure,
    specify its name, add parameters, and enter the T-SQL of the stored procedure.
    To add a parameter, click the **Add Parameter** icon and specify the parameter
    name, its type (and size), its default value, and whether the parameter is an
    output (see [Figure A-20](#index_split_003.html#p273)). Click the **Save** icon
    to create the stored procedure.


    **Figure A-20. Creating a stored procedure**


    If an error occurs, a panel will appear on top of the area you are currently working
    on; you can expand the message to view the details of the error, as shown in [Figure
    A-21](#index_split_003.html#p274). In this example the field `author_id` referenced
    in the T-SQL code does not exist, preventing the T-SQL from compiling.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 225](index-274_1.png)


    ![Image 226](index-274_2.jpg)


    **Figure A-21. An error message in the portal**


    Once the stored procedure has been created, you can execute it to view the output.
    Click the **Data** header to view the page where you can execute the stored procedure.
    If your stored procedure has parameters, a list of input parameters will be displayed,
    and you can specify an input (in the **In Value** column). The other columns in
    the list of input parameters are for informational purposes only and cannot be
    modified. These additional columns show you which parameters are output parameters,
    what their default values are, and their data types. Once you have specified the
    input parameters click the **Run** button on top. The output of the stored procedure,
    along with the input parameters specified, will look like [Figure A-22](#index_split_003.html#p274).
    If multiple result sets are returned by the stored procedure you can select one
    using the drop-down immediately below the **Results** link as shown in [Figure
    A-5](#index_split_002.html#p262) earlier.


    **Figure A-22. Executing a stored procedure**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


