  trans: '# 附录 A：SQL 数据库管理门户


    该页面不允许您编辑现有索引。图 A-13 向您展示了 `DOCS` 表上的聚集索引，该索引未定义外键。


    **图 A-13. 编辑索引和外键**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 218](img/index-269_1.jpg)


    要添加索引，请点击 **添加索引** 图标。将显示一个面板，并且表中每列旁边的复选框将变为可用。指定索引的名称并选择属于它的表列。您还可以选择 **高级选项**，这将显示自动重建索引的设置。选择
    **联机** 选项，为索引指定一个筛选器（如图 A-14 所示），然后点击面板中的 **保存** 按钮以创建索引。


    **图 A-14. 创建索引**


    要添加外键，请点击 **添加外键关系**，即您在图 A-13 右侧看到的图标。将显示一个新面板，允许您选择特定操作，包括 **删除时** 和 **更新时**
    设置，如图 A-15 所示。点击 **选择引用表** 以显示可用表的列表。然后通过点击其名称来选择引用表。接下来点击 **选择引用列** 以选择用作引用的列。一旦引用表和列被选定，源表
    (`DOCS`) 中可供选择的列将根据与引用列数据类型匹配的列进行调整。选择将使用的源列（如图 A-16 所示），然后点击面板中的 **保存** 按钮。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 219](img/index-270_1.png)


    ![图片 220](img/index-270_2.png)


    **图 A-15. 创建外键**


    **图 A-16. 选择源字段和引用字段**


    要删除索引或外键约束，请点击对象右侧的 **删除** 图标（显示为 X）。


    您还可以通过点击 **数据** 标题（参见图 A-17）来查看和编辑所选表中存储的数据。默认情况下，此页面显示表的前 200 条记录。点击 **所有行**
    链接将显示表中的所有行。您可以添加一行（通过选择 **添加行**）或删除选定行（使用 **删除行**）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 221](img/index-271_1.png)


    ![图片 222](img/index-271_2.png)


    **图 A-17. 查看表数据**


    点击特定列值也将允许您编辑该列。例如，图 A-18 向您展示我正在将第一行的 `DownloadPrice` 值编辑为 19.99 美元。


    **图 A-18. 编辑列**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 223](img/index-272_1.png)


    行左侧的一个新图标——类似于铅笔——允许我撤销我的编辑，而表列表顶部的框显示了输入的新值（您可以直接在列字段中编辑该值，或在顶部的文本框区域中编辑）。


    点击文本框右侧的向上/向下箭头可展开或折叠文本区域（参见图 A-18）。


    点击 **空值** 图标可将值设置为 Null。点击 **还原单元格** 图标可将您的更改重置回原始值。要保存更改，请点击屏幕顶部的 **保存** 图标。请注意，您无法编辑所有数据类型；例如，二进制列无法编辑。


    ## 设计视图


    要管理视图，请从默认设计页面（先前在图 A-10 中显示）点击 **视图** 标题。您将看到现有视图的列表。您可以通过选择视图然后点击底部的 **删除视图**
    来删除视图。


    用鼠标浏览列表也会显示先前讨论过的 **编辑** 和 **依赖关系** 图标。您还可以通过在顶部的 **搜索** 框中键入字符来过滤视图列表。


    让我们创建一个视图。点击列表底部的 **新建视图** 图标。一个新页面允许您指定视图的名称、其架构（如果数据库中有可用的架构，您可以通过点击它并从可用架构列表中选择来更改默认架构），以及页面中间的视图
    T-SQL。图 A-19 向您展示我正在 `dbo` 架构中创建一个名为 `v_DBO_Tables` 的视图。点击顶部的 **保存** 图标以创建视图。


    **图 A-19. 创建视图**


    视图创建后，页面将显示两个新标题：**设计** 和 **数据**。**设计** 标题允许您编辑当前视图，而 **数据** 标题显示视图返回的记录列表，类似于图
    A-17 中所示的表的 **数据** 页面。然而，不同之处在于视图的输出是只读的，因此您无法更改视图返回的数据。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 224](img/index-273_1.png)


    ## 设计存储过程


    要管理存储过程，请从图 A-10 所示的设计页面中选择 **存储过程**。将显示存储过程列表，此页面上的可用功能与视图所解释的功能相同。


    要创建新的存储过程，请选择列表底部的 **新建存储过程**。一个新页面允许您选择存储过程的架构、指定其名称、添加参数以及输入存储过程的 T-SQL。要添加参数，请点击
    **添加参数** 图标并指定参数名称、其类型（和大小）、其默认值以及参数是否为输出参数（参见图 A-20）。点击 **保存** 图标以创建存储过程。


    **图 A-20. 创建存储过程**


    如果发生错误，将显示一个面板在您当前工作区域的顶部；您可以展开消息以查看错误详情，如图 A-21 所示。在此示例中，T-SQL 代码中引用的字段 `author_id`
    不存在，导致 T-SQL 无法编译。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 225](img/index-274_1.png)


    ![图片 226](img/index-274_2.jpg)


    **图 A-21. 门户中的错误消息**


    存储过程创建后，您可以执行它以查看输出。点击 **数据** 标题以查看可执行存储过程的页面。如果您的存储过程有参数，将显示一个输入参数列表，您可以指定一个输入（在
    **输入值** 列中）。输入参数列表中的其他列仅供参考，无法修改。这些附加列向您显示哪些参数是输出参数、它们的默认值是什么以及它们的数据类型。指定输入参数后，点击顶部的
    **运行** 按钮。存储过程的输出以及指定的输入参数将如图 A-22 所示。如果存储过程返回多个结果集，您可以使用 **结果** 链接正下方的下拉列表选择一个，如前面图
    A-5 所示。


    **图 A-22. 执行存储过程**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 总结'
- fmt: '# Appendix B: Windows Azure SQL Database Quick Reference


    As you surely noticed while reading this appendix, the management portal is designed
    with simplicity and expansion in mind. You saw how easy it is to manage tables,
    views, and stored procedures, and how to execute statements while monitoring performance
    metrics from recently executed statements in your database instance. The SMDP
    will continue to evolve rapidly; as a result, you can expect differences in behavior
    and additional features over time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    SQL Azure supports T-SQL. Chances are that you’re already familiar with SQL Server
    T-SQL syntax if you’re reading this book. However, not everything you know and
    love about SQL Server is supported yet in Windows Azure SQL Database. For example,
    many of the T-SQL statements are hardware-related or OS/server-related, such as
    creating certificates or creating backup devices. This appendix provides a quick
    reference to the syntax that is currently supported in Windows Azure SQL Database
    as of Service Update 4.


    > **Note:** You can find a complete list and reference that describes T-SQL features
    supported in Windows Azure SQL Database at [`http://msdn.microsoft.com/en-us/library/ee336281.aspx`](http://msdn.microsoft.com/en-us/library/ee336281.aspx).


    ## Supported T-SQL Statements


    Table `B-1` lists the supported T-SQL statements that you can use in Windows Azure
    SQL Database. These statements can be used as exactly as you currently know them
    without any limitations.


    ### Table B-1. Fully Supported T-SQL Statements


    *   `ALTER ROLE`

    *   `DENY` *Object Permissions*

    *   `ORDER BY` *Clause*

    *   `ALTER SCHEMA`

    *   `DENY` *Schema Permissions*

    *   `OUTPUT` *Clause*

    *   `ALTER VIEW`

    *   `DROP LOGIN`

    *   `OVER` *Clause*

    *   `APPLOCK_MODE`

    *   `DROP PROCEDURE`

    *   `PRINT`

    *   `APPLOCK_TEST`

    *   `DROP ROLE`

