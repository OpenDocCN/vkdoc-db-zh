    \ `购买`，并按照屏幕上的说明操作。完成后，您将收到一封包含配置 Windows Azure 平台说明的电子邮件。\n\n要访问 Azure 门户，请打开您的\
    \ Web 浏览器并输入以下 URL：`http://windows.azure.com`。Azure 门户允许您部署、管理和查看服务的运行状况。\n\n\
    ### 创建 SQL Database 实例\n\n您需要做的第一件事是创建一个新的 `SQL Database` 服务器。`SQL Database` 服务器的名称将成为一个完全限定的互联网地址，也是在其中创建数据库实例的逻辑名称。创建\
    \ `SQL Database` 服务器时，会自动配置 `master` 数据库。此数据库是只读的，包含您数据库的配置和安全信息。然后，您可以创建用户数据库。您可以使用\
    \ Windows Azure 管理门户，也可以使用 `SQL Server Management Studio` 针对 `master` 数据库执行 `T-SQL`\
    \ 语句。\n\n#### 使用 Windows Azure 管理门户\n\n创建数据库的一种方法是通过 Windows Azure 管理门户。在导航窗格（页面左侧）中选择\
    \ `SQL Databases` 选项卡将列出您所有现有的 `SQL Database` 实例及其关联的服务器。可以通过门户以两种方式之一完成数据库的创建。首先，在显示数据库实例列表的情况下，点击门户页面左下角菜单栏中的\
    \ `新建` 按钮，然后选择 `SQL Database` ➤ `快速创建`。其次，您可以选择在门户页面顶部（`Databases` 选项卡旁边）选择 `Servers`\
    \ 选项卡，从服务器列表中选择相应的服务器名称，选择 `Databases` 选项卡，然后点击底部菜单栏上的 `添加`。图 1-4 显示了管理门户，其中创建了几个订阅和\
    \ `SQL Database` 实例。\n\n**图 1-4.** SQL Database 实例\n\n通过 `快速创建` 选项创建 `SQL Database`\
    \ 实例，您可以通过指定数据库名称以及要在其中创建新数据库实例的订阅和服务器来快速创建数据库。如果您正在某个订阅中创建新数据库，而该订阅中尚未创建任何服务器，系统还将要求您为将要配置的新服务器提供管理员用户名和密码。通过\
    \ `快速创建` 选项创建数据库会创建一个 `1GB Web 版` 数据库实例。\n"
