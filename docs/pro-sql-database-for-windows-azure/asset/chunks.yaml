    # Chapter 1 ■ GettinG Started with SQL databaSe


    ## Discovering the Microsoft Azure Platform


    Let’s discover three major components of the Microsoft Azure platform: Windows
    Azure, Cloud Services, and Windows Azure SQL Database. All three offer unique
    capabilities that provide a complete array of services needed to build highly
    scalable and secure solutions:


    • **Windows Azure.** A collection of virtual Microsoft operating systems that
    can run your web applications and services in the cloud. For example, you can
    create a web service that converts US dollars to Euros; then, you can deploy the
    service on Windows Azure Web Site and allow it to scale as needed. Note that Windows
    Azure can run `.NET` applications and other platforms, as well, including PHP.


    • **Cloud Services.** A set of services that provide core capabilities such as
    federated identity for access control, and a service bus for a messaging-based
    subscriber/publisher topology.


    • **SQL Database.** Microsoft’s transactional database offering for cloud computing
    based on Microsoft SQL Server 2012\. For example, you can store your customer
    database in the cloud using SQL Database and consume customer data using services
    deployed in Windows Azure.


    Microsoft also released, or will be releasing, additional services worth noting,
    including a Caching Service, High Performance Computing (HPC) and Apache Hadoop
    for Azure. Additional services are likely to be released over time, offering additional
    ways to leverage the promises of cloud computing.


    Figure [1-1 sho](#index_split_000.html#p9)ws a simplified corporate environment
    connecting to the Microsoft Azure platform and consuming various Azure services.
    This diagram is overly simplified, but it conveys an important message: Microsoft
    Azure is designed to extend a corporate environment securely for web applications,
    services, messaging, and data stores.


    ***Figure 1-1.** Microsoft Azure platform overview*


    ## Why Microsoft Azure?


    One fundamental question that’s frequently asked is, “Why?” Who’s interested in
    developing applications in Windows Azure in the first place? To answer this question,
    let’s look at the evolution of web platforms.


    About 20 years ago, when the public Internet was all about bulletin board systems
    (BBBs), Gopher services, and $500 9600-baud modems, the question was, “Will the
    Internet stick as a technology?” That question has been answered, but many new
    concepts have grown since then, including web sites, hosting centers, and SaaS.


    This evolution relies on a common theme: *decoupling*. BBSs decoupled public information
    from libraries; web sites decoupled user interfaces from computers; hosting centers
    decoupled hardware from a company’s own infrastructure; and SaaS decoupled complex
    applications from corporate computers.


    Cloud computing on Microsoft Azure is a natural evolution of computing flexibility
    in which the actual physical storage and implementation details are decoupled
    from the software solution. For example, deploying services in Windows Azure doesn’t
    require any knowledge of the machine running the service or any of the core services
    (`IIS` version, operating system patches, and so on). You may never know which
    machine is running your software.


    You connect to a Windows Azure server through logical names, and connecting to
    a SQL Database instance requires an Internet address instead of an actual server
    name.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The ability to disassociate machines from data and services is very powerful in
    itself. Microsoft’s Azure environment allows multiple business scenarios to flourish,
    including these:


    • **Seasonal applications.** Developing web sites or services that have a tendency
    to grow and contract over time provides potential savings opportunities because
    cloud computing uses a pay-as-you-use model.


    • **Short life span.** Development of prototypes or applications with short lifespans
    is also attractive, such as event-registration sites. You can also build development
    and test environments for remote teams.


    • **Split storage.** Certain applications need to keep storage in a safe location
    but may not require frequent access, or may require high availability. Designing
    or modifying an application so that the data is stored locally and in SQL Database
    (or other data-storage formats) may make sense.


    • **Small companies and ISVs.** Smaller companies that can’t afford large and
    complex infrastructure to start their business can take advantage of the financial
    and inherent infrastructure benefits of Microsoft Azure. Independent software
    vendors (ISVs) can also benefit from cloud computing. For example, an ISV can
    use SQL Database to store application logs or centralize reporting features from
    multiple disconnected locations.


    See Chapter 2 for more information about design patterns and application scenarios
    that use the Azure platform.


    ## About Geographic Locations


    In order to provide high availability, Microsoft established regional data-center
    operations that allow customers to select geographically dispersed services. When
    you create your Azure servers, you need to specify which geographic location the
    servers should be provisioned in. This feature is called *Windows Azure geolocation*.


    Initially, it may be tempting to choose your company’s geographic location for
    improved performance. However, if the availability of your Azure services is more
    important than response time, you may need to pick another location.


    When selecting a geographic location, make sure to consider the following:


    • **Performance.** When your data is closer to your users, network latency may
    be noticeably lower, improving customer experience.


    • **Disaster recovery.** If ensuring the availability of your cloud platform is
    important, you may want to disperse your services and data across multiple regions.


    • **Legal factors.** Consider the type of information that will be stored in the
    cloud, and ensure that you aren’t bound by specific regulations and mandates that
    may prevent you from selecting remote geographic locations.


    At the time of this writing, you can select from one of the following geographic
    locations, each of which is supported by a regional data center:


    • East Asia


    • East US


    • North Central US


    • North Europe


    • South Central US


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 3](index-11_1.png)


    • Southeast Asia


    • West Europe


    • West US'
  raw: 'SaaS, PaaS, and IaaS are considered the fundamental building blocks of cloud
    computing. Other acronyms are being manufactured to depict new flavors of cloud
    computing, such as desktop as a service (DaaS), hardware as a service (HaaS),
    and even research as a service (RaaS). Pretty soon, the entire alphabet will be
    consumed in describing the many flavors of services that can be created in the
    cloud.


    More recently private cloud offerings are starting to emerge. A private cloud
    offers a key advantage over public cloud offerings because it allows corporations
    to keep their data onsite. This allows certain companies to take advantage of
    cloud computing without the risk associated with storing data on the Internet.
    However, private cloud offerings offer fewer benefits than public cloud hosting
    in other areas. For example, the promise to pay for only what you use no longer
    applies to private cloud offerings.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 2](index-9_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    Discovering the Microsoft Azure Platform


    Let’s discover three major components of the Microsoft Azure platform: Windows
    Azure, Cloud Services, and Windows Azure SQL Database. All three offer unique
    capabilities that provide a complete array of services needed to build highly
    scalable and secure solutions:


    • **Windows Azure.** A collection of virtual Microsoft operating systems that
    can run your web applications and services in the cloud. For example, you can
    create a web service that converts US dollars to Euros; then, you can deploy the
    service on Windows Azure Web Site and allow it to scale as needed. Note that Windows
    Azure can run. NET applications and other platforms, as well, including PHP.


    • **Cloud Services.** A set of services that provide core capabilities such as
    federated identity for access control, and a service bus for a messaging-based
    subscriber/publisher topology.


    • **SQL Database.** Microsoft’s transactional database offering for cloud computing
    based on Microsoft SQL Server 2012\. For example, you can store your customer
    database in the cloud using SQL Database and consume customer data using services
    deployed in Windows Azure.


    Microsoft also released, or will be releasing, additional services worth noting,
    including a Caching Service, High Performance Computing (HPC) and Apache Hadoop
    for Azure. Additional services are likely to be released over time, offering additional
    ways to leverage the promises of cloud computing.


    Figure [1-1 sho](#index_split_000.html#p9)ws a simplified corporate environment
    connecting to the Microsoft Azure platform and consuming various Azure services.
    This diagram is overly simplified, but it conveys an important message: Microsoft
    Azure is designed to extend a corporate environment securely for web applications,
    services, messaging, and data stores.


    ***Figure 1-1.** Microsoft Azure platform overview*


    Why Microsoft Azure?


    One fundamental question that’s frequently asked is, “Why?” Who’s interested in
    developing applications in Windows Azure in the first place? To answer this question,
    let’s look at the evolution of web platforms.


    About 20 years ago, when the public Internet was all about bulletin board systems
    (BBBs), Gopher services, and $500 9600-baud modems, the question was, “Will the
    Internet stick as a technology?” That question has been answered, but many new
    concepts have grown since then, including web sites, hosting centers, and SaaS.


    This evolution relies on a common theme: *decoupling*. BBSs decoupled public information
    from libraries; web sites decoupled user interfaces from computers; hosting centers
    decoupled hardware from a company’s own infrastructure; and SaaS decoupled complex
    applications from corporate computers.


    Cloud computing on Microsoft Azure is a natural evolution of computing flexibility
    in which the actual physical storage and implementation details are decoupled
    from the software solution. For example, deploying services in Windows Azure doesn’t
    require any knowledge of the machine running the service or any of the core services
    (IIS version, operating system patches, and so on). You may never know which machine
    is running your software.


    You connect to a Windows Azure server through logical names, and connecting to
    a SQL Database instance requires an Internet address instead of an actual server
    name.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 1 ■ GettinG Started with SQL databaSe


    The ability to disassociate machines from data and services is very powerful in
    itself. Microsoft’s Azure environment allows multiple business scenarios to flourish,
    including these:


    • **Seasonal applications.** Developing web sites or services that have a tendency
    to grow and contract over time provides potential savings opportunities because
    cloud computing uses a pay-as-you-use model.


    • **Short life span.** Development of prototypes or applications with short lifespans
    is also attractive, such as event-registration sites. You can also build development
    and test environments for remote teams.


    • **Split storage.** Certain applications need to keep storage in a safe location
    but may not require frequent access, or may require high availability. Designing
    or modifying an application so that the data is stored locally and in SQL Database
    (or other data-storage formats) may make sense.


    • **Small companies and ISVs.** Smaller companies that can’t afford large and
    complex infrastructure to start their business can take advantage of the financial
    and inherent infrastructure benefits of Microsoft Azure. Independent software
    vendors (ISVs) can also benefit from cloud computing. For example, an ISV can
    use SQL Database to store application logs or centralize reporting features from
    multiple disconnected locations.


    See Chapter 2 for more information about design patterns and application scenarios
    that use the Azure platform.


    About Geographic Locations


    In order to provide high availability, Microsoft established regional data-center
    operations that allow customers to select geographically dispersed services. When
    you create your Azure servers, you need to specify which geographic location the
    servers should be provisioned in. This feature is called *Windows Azure geolocation*.


    Initially, it may be tempting to choose your company’s geographic location for
    improved performance. However, if the availability of your Azure services is more
    important than response time, you may need to pick another location.


    When selecting a geographic location, make sure to consider the following:


    • **Performance.** When your data is closer to your users, network latency may
    be noticeably lower, improving customer experience.


    • **Disaster recovery.** If ensuring the availability of your cloud platform is
    important, you may want to disperse your services and data across multiple regions.


    • **Legal factors.** Consider the type of information that will be stored in the
    cloud, and ensure that you aren’t bound by specific regulations and mandates that
    may prevent you from


    selecting remote geographic locations.


    At the time of this writing, you can select from one of the following geographic
    locations, each of which is supported by a regional data center:


    • East Asia


    • East US


    • North Central US


    • North Europe


    • South Central US


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 3](index-11_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    • Southeast Asia


    • West Europe


    • West US'
