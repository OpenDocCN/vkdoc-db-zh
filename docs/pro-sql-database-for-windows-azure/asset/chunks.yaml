- fmt: '■ ## **Note** an index that contains all the columns needed to serve a query
    is called a `covering index`.


    If you dissect the previous `SELECT` query, you obtain the columns in the following
    list (in order of placement in the index) that belong to the `TestUsers` table:


    • `WHERE`. Contains the `AgeGroup` field from `TestUsers`.


    • `JOIN`. Contains the `UserType` field from `TestUsers`.


    • `SELECT`. Contains the `Name` and `UserType` fields. The `UserType` column is
    already part of the `JOIN` clause; there is no need to count it twice.


    Let’s begin by creating an index that looks like this:


    ```

    CREATE INDEX idx_testusers_001 ON TestUsers

    (AgeGroup, UserType)

    INCLUDE (Name)

    ```


    Running the statement now yields the execution plan shown in Figure [11-10](#index_split_002.html#p236).
    This is a better plan than the one in Figure [11-2 b](#index_split_002.html#p228)ecause
    SQL Database is performing an index seek instead of an index scan. Using an index
    seek means SQL Database is able to locate the first record needed by the statement
    very quickly. However, you still have an index scan on the `TestUserType` table.
    Let’s fix that.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 180](index-236_1.png)


    ![Image 181](index-236_2.png)


    # Chapter 11 ■ performanCe tuning


    **Figure 11-10.** Effect of adding an index on the `TestUsers` table


    To remove the index scan on `TestUserType`, you add another index following the
    previous guidelines. Because no columns are needed in the `SELECT` clause, you
    can leave the `INCLUDE` section alone. Here’s the index:


    ```

    CREATE INDEX idx_testusertype_001 ON TestUserType

    (UserTypeKey, UserType)

    ```


    ■ ## **Note** although it’s minimal, there is a risk associated with adding new
    indexes in production systems. Certain routines, especially batch programs, typically
    depend on data being properly ordered to calculate running sums or carry out specific
    tasks. if an index is favored over another to run a query, it’s possible for the
    new index to be used, which has the potential to change the order in which the
