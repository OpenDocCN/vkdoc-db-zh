    - **SaaS：软件即服务。** 这种交付平台通常是以网络应用程序的形式出现，通过互联网提供，需付费。这种模式已经存在几年了。`Microsoft Office
    365` 和 `Google Apps` 是 SaaS 产品的例子。

    - **PaaS：平台即服务。** 这种服务提供一个计算平台，便于其他服务的使用和部署，并满足云计算的一般期望，如可扩展性和按需付费。`Windows Azure
