    \ SQL Database 运行。\n\n我们已经讨论了使用 ADO.NET 连接以及我们在 ADO.NET 中拥有的不同选项，现在让我们继续探讨另一种连接选项，ODBC。\n"
- fmt: "# Chapter 5 ■ Programming with SQL Database\n\n## 6. Run the project and click\
    \ the ODBC button\nRun the project, and click the `ODBC` button. As in the previous\
    \ example, the list box populates with the names from the `Person.Person` table.\
    \ The grid also populates with the same set of names (see Figure [5-2](#index_split_001.html#p114)).\n\
    \n**Figure 5-2.** Finished form with data\n\nFrom these examples, you can see\
    \ that connecting to and querying SQL Database is no different from connecting\
    \ to a local instance of SQL Server. The end of this chapter discusses some guidelines\
    \ and best practices to help you prepare for your move to SQL Database.\n\nSo\
    \ far we have discussed connecting with `ADO.NET` and `ODBC` along with the different\
    \ options we have with each, so let’s continue the discussion and talk about using\
    \ the `sqlcmd` utility.\n\n## sqlcmd\nIf you’ve worked with SQL Server for any\
    \ length of time, chances are you’ve worked with the `sqlcmd` utility. This utility\
    \ lets you enter and execute `T-SQL` statements and other objects via a command\
    \ prompt. You can also use the `sqlcmd` utility via the Query Editor in `sqlcmd`\
    \ mode, in a Windows script file, or via a SQL Server Agent job.\n\nThis section\
    \ discusses how to use the `sqlcmd` utility to connect to a SQL Database instance\
    \ and execute queries against that database. This section assumes that you have\
    \ some familiarity with `sqlcmd`. This utility has many options, or parameters,\
    \ but this section only discusses those necessary to connect to SQL Database.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 72](index-115_1.png)\n\
    \n## Chapter 5 ■ Programming with SQL Database\n\n> **Note:** SQL Database doesn’t\
    \ support the `-z` or `-Z` option for changing user passwords. You need to use\
    \ `ALTER LOGIN` after connecting to the `master` database in order to change a\
    \ password.\n\nTo use the `sqlcmd` utility, you first open a command prompt. At\
    \ the command prompt, you need to provide the options and values necessary to\
    \ connect to the SQL Database instance. As a minimum, the command syntax is the\
    \ following:\n```\nsqlcmd -U login -P password -S server -d database\n```\nThe\
    \ parameters are nearly self-explanatory, but here they are, just in case:\n\n\
    *   `-U` is the user login ID.\n*   `-P` is the user-specified password. Passwords\
    \ are case sensitive.\n*   `-S` specifies the instance of SQL Server to which\
    \ to connect.\n\nOptionally, you can provide a database name via the `-d` parameter.\
    \ Thus, the `sqlcmd` syntax looks something like the following:\n```\nsqlcmd -U\
    \ providerlogin@server -P ProviderPassword -S ProviderServer -d database\n```\n\
    Let’s put this syntax to use. Follow these steps:\n\nAt the command prompt, use\
    \ the `sqlcmd` syntax and type in your connection information, as shown in Figure\
    \ [5-3.](#index_split_001.html#p115) (In the figure, the server name and password\
    \ are hidden.) Press Enter.\n\n**Figure 5-3.** Connecting via sqlcmd\n\nWhen the\
    \ `sqlcmd` utility connects, you’re presented with the `sqlcmd` prompt `1>`, at\
    \ which point you can begin typing in and executing `T-SQL` commands. The command\
    \ to execute any `T-SQL` statement is `GO`. For example, in Figure [5-4](#index_split_001.html#p116),\
    \ the following `SELECT` statement is entered and executed: `SELECT FirstName,\
    \ LastName FROM Person.Person`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 73](index-116_1.png)\n\n![Image 74](index-116_2.png)\n\n## Chapter 5\
    \ ■ Programming with SQL Database\n\n**Figure 5-4.** Executing a SELECT\n\nPress\
    \ the Enter key on line `1>` to create a new line and execute the `SELECT` query.\
    \ Type `GO` on line `2>` and press Enter to execute all statements since the last\
    \ `GO` statement (see Figure [5-4](#index_split_001.html#p116)). Figure [5-5](#index_split_001.html#p116)\
    \ shows the results of the `sqlcmd` query entered. As you can see, executing a\
    \ query isn’t difficult.\n\n**Figure 5-5.** Sqlcmd query results\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 75](index-117_1.png)\n\n![Image 76](index-117_2.png)\n\n## Chapter 5\
    \ ■ Programming with SQL Database\n\nLet’s work through another example in which\
    \ you create a table and add data. Here are the steps:\n\n1.  After the previous\
    \ query is finished, you’re back at the `1>` prompt. Type in the statement shown\
    \ in Figure [5-6](#index_split_001.html#p117).\n    **Figure 5-6.** Creating a\
    \ table\n2.  Press Enter, type `GO` on line `2>`, and press Enter again, to execute\
    \ the `CREATE` statement.\n3.  When the `T-SQL` command that you execute is the\
    \ type that doesn’t return data, the `sqlcmd` utility doesn’t give you back a\
    \ message but takes you to the `1>` prompt. However, you can verify that a statement\
    \ executed successfully by going into SQL Server Management Studio (`SSMS`), connecting\
    \ to your SQL Database instance, and expanding the `Tables` node of your chosen\
    \ database. Figure [5-7](#index_split_001.html#p117) shows the results from doing\
    \ that—you can see that the table was indeed created.\n    **Figure 5-7.** The\
    \ new table viewed in SSMS\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 77](index-118_1.png)\n\n![Image 78](index-118_2.png)\n\n## Chapter 5\
    \ ■ Programming with SQL Database\n\nThe table you created is called `Test`, and\
    \ it has two columns: an `ID` column that is the primary key (clustered index),\
    \ and `Col1`, an `nvarchar` column. The table is simple, but it’s good enough\
    \ to demonstrate functionality.\n\n> **Note:** You know from earlier in the chapter\
    \ that the `ID` column must be a primary key clustered index, or you won’t be\
    \ able to add data to the table.\n\n4.  Add some data to the table by going back\
    \ to the command window and typing in the `INSERT` statements shown in Figure\
    \ [5-8](#index_split_001.html#p118). The great thing about the `sqlcmd` utility\
    \ is that you can enter in as many commands as you want and not execute them until\
    \ you type `GO`. Here you use two `INSERT` statements that add two records to\
    \ the table you created in the previous step.\n    **Figure 5-8.** Inserting rows\
    \ via sqlcmd\n5.  Type `GO` on line `3>`, and press Enter. Although the `sqlcmd`\
    \ utility tells you `1 rows affected`, you can query this new table in `SSMS`\
    \ and see the two new rows that were added, as shown in Figure [5-9](#index_split_001.html#p118).\n\
    \    **Figure 5-9.** Viewing results via SSMS\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 5 ■ Programming with SQL Database\n\nAs you can see, using the `sqlcmd`\
    \ utility is straightforward. Just remember that it doesn’t work with SQL Database\
    \ if you’re trying to use heap tables. All tables must have a primary key. Also,\
    \ as mentioned earlier, the `-z` and `-Z` parameters don’t work.\n\nThis section\
    \ has discussed the different mechanisms for connecting to and querying SQL Database,\
    \ including examples for `ADO.NET`, `ODBC`, and `sqlcmd`. You can see that the\
    \ connection process is quite similar to the way you currently connect to and\
    \ query an on-premises database. However, given the overall industry push to an\
    \ `SOA` architecture, let’s take the discussion to the next level and look at\
    \ using services, specifically `WCF Data Services`, to connect to our Azure database.\n\
    \n## WCF Data Services\n`WCF Data Services`, formerly known as `ADO.NET Data Services`,\
    \ is the tool that enables the creation and consumption of `OData` services. `OData`,\
    \ the Open Data Protocol, is a new data-sharing standard that allows for greater\
