    \ ID=test@yourServer;\n                          Password=yourPasswordHere;\n\
    \                          Trusted_Connection=False;Encrypt=True;\"/>\n    </connectionStrings>\n\
    \    ```\n    > **注意**\n    >\n    > 确保将用户 ID 指定为`<用户名>@<服务器名>`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图片 136](img/index-179_1.png)\n\n## 第 8 章 ■ Windows Azure 与 ASP.NET\n\n5. \
    \ 回到`Default.aspx`页面，通过手动添加`ConnectionString`和`SelectCommand`设置来更改`SqlDataSource`设置，如下所示。\n\
    \    ```xml\n    <asp:SqlDataSource ID=\"SqlDataSource1\" runat=\"server\"\n \
    \       ConnectionString=\"<%$ ConnectionStrings:Connection1 %>\"\n        SelectCommand=\"\
    SELECT uid, name FROM sys.sysusers ORDER BY 1\" >\n    </asp:SqlDataSource>\n\
    \    ```\n6.  运行该项目应产生与图 8-14 所示类似的输出。\n\n**图 8-14.** 在本地运行解决方案并从 SQL 数据库获取数据\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 137](img/index-180_1.png)\n\
    \n## 第 8 章 ■ Windows Azure 与 ASP.NET\n\n到目前为止，您是在本地计算机上运行此项目。虽然需要 Windows Azure\
    \ 工具，但此项目并未使用任何 Windows Azure 存储选项；它直接连接到一个实时的 SQL 数据库实例。\n\n> **注意**\n>\n> 本章假设您已按照第\
    \ 1 章的讨论正确配置了 SQL 数据库防火墙。此外，从 Windows Azure 服务进行连接需要您在防火墙配置中设置“允许 Microsoft 服务访问此服务器”选项。如果您收到连接错误，提示不允许从特定\
    \ IP 地址连接，请参阅第 1 章获取有关正确设置 SQL 数据库防火墙的详细信息。\n\n### 部署和配置文件\n\n您可能已经注意到，您的解决方案中有多个配置文件。您可以在项目中找到一个`Web.Config`文件，以及其下的两个附加文件：`Web.Debug.Config`和`Web.Release.Config`。这两个附加文件允许您根据构建配置对`Web.Config`文件执行转换。当您希望在针对`发布`构建时修改连接字符串以指向生产数据库时，可以使用此功能。有关`Web.Config`转换的更多信息，请访问此链接：[`go.microsoft.com/fwlink/?LinkId=125889`](http://go.microsoft.com/fwlink/?LinkId=125889)。\n\
    \n您可能还注意到 Web 角色本身也有配置文件。之前创建的项目包含三个配置文件：\n\n-   `ServiceDefinition.csdef`。允许您控制服务本身的定义，例如应用程序将侦听的\
    \ HTTP 端点。\n-   `ServiceConfiguration.Local.cscfg`。选择`本地`部署模式时打包的配置文件。\n-   `ServiceConfiguration.Cloud.cscfg`。选择`云`部署模式时打包的配置文件。\n\
    \n虽然`web.config`构建模式使用转换来更改`web.config`文件，但`ServiceConfiguration.cscfg`不会；它根据所选的部署模式使用`本地`或`云`版本。图\
    \ 8-15 sho 示了在打包项目时如何应用`发布`构建配置转换和`云`服务配置文件。\n\n**图 8-15.** 选择部署和构建配置设置\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图片 138](img/index-181_1.png)\n\n## 第 8 章 ■ Windows Azure 与 ASP.NET\n\n`ServiceConfiguration.cscfg`文件允许您提供代码可以读取的服务级设置。因为您的代码可以读取此文件，所以您可以将数据库连接字符串放在此配置文件中，而不是`web.config`文件中。如果您的目标是能够通过\
    \ Windows Azure 管理门户轻松更改连接字符串，那么将连接字符串放在`ServiceConfiguration.cscfg`中可能是有意义的。实际上，当您将连接字符串放在`web.config`文件中时，每次想要更改连接字符串都需要重新部署应用程序到\
    \ Azure。\n\n本章创建的项目包含一个简单的部署模型，如图 8-16 所示。无论您构建`发布`还是`调试`配置，数据库连接字符串都是相同的，因为您没有使用\
    \ Web 配置转换。\n\n**图 8-16.** 使用单个数据库的简单部署场景\n\n您可能希望创建一个 Web 配置转换，允许您使用`调试`构建配置指向暂存数据库，并使用`发布`构建配置指向生产数据库。如果操作正确，部署选项将如图\
    \ 8-17 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 139](img/index-182_1.png)\n\
    \n![图片 140](img/index-182_2.png)\n\n## 第 8 章 ■ Windows Azure 与 ASP.NET\n\n**图\
    \ 8-17.** 使用暂存和生产数据库的部署场景\n"
- fmt: "# CHAPTER 8 ■ WINDOWS AZURE AND ASP.NET\n\nYou can also use code to override\
    \ the database connection string altogether if you detect that you are running\
    \ locally or in the cloud, so that you always point to a local database during\
    \ development (regardless of the build configuration) but use the production database\
    \ when deploying a release build with a cloud service configuration as shown in\
    \ Figure [8-18](#index_split_002.html#p182).\n\n*Figure 8-18. Deployment scenario\
    \ using a local database for development*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nAs you can see from the above discussion, you can configure your deployment\
    \ strategy in many ways. You should establish the deployment model ahead of time\
    \ so that you do not end up pointing to the wrong database when you are developing.\n\
    \n**Note**\nFor more information about the Azure configuration files, read the\
    \ following MSDN link:\n[http://msdn.microsoft.com/en-us/library/windowsazure/ee405486.aspx](http://msdn.microsoft.com/en-us/library/windowsazure/ee405486.aspx)\n\
    \n## Deploying an ASP.NET Application in Windows Azure\n\nYou’re almost there.\
    \ In this section, you walk through the steps of deploying the ASP.NET application\
    \ in the cloud. You can publish an application directly from Visual Studio or\
    \ package deployment files and deploy them manually. Because publishing directly\
    \ from Visual Studio requires the creation of certificates and may require changing\
    \ firewall settings, I’ll show you the manual deployment steps to make things\
    \ simpler to follow.\n\n1.  You need to package your project. Right-click `AzureExample`\
    \ (the cloud project), and click `Package`. This action opens the dialog box seen\
    \ previously in Figure [8-15](#index_split_001.html#p180). Select your `Build`\
    \ and `Service` configuration and click `Package`. Once the package is created\
    \ successfully, Windows Explorer opens where the deployment files are located.\
    \ You will need these files shortly, so do not close that window.\n2.  Open Internet\
    \ Explorer, navigate to the [Azure Management Portal](http://manage.windowsazure.com),\
    \ and log in using your Live ID.\n3.  When you’ve logged in, the Internet Explorer\
    \ window shows you the home page for your Azure account. Click on `Cloud Services`.\n\
    4.  You should see the page shown in Figure [8-1a](#index_split_001.html#p170)\
    \ at the beginning of this chapter. Click the `AzureExample` service and then\
    \ click the `Staging` link. You now see the staging dashboard of the `AzureExample`\
    \ service.\n5.  Click `Upload`. Deploying in staging creates a temporary service\
    \ that you can use to test before promoting to the final public URL. This way,\
    \ you can test that your application is working as desired before deploying it\
    \ in production.\n6.  You now see the `Upload a package` dialog box (see Figure\
    \ [8-19](#index_split_002.html#p184)) with the following fields:\n    *   **Deployment\
    \ Name**. Under `Service Deployment Name`, you need to enter a label for your\
    \ service. Type `TEST001`, for example. To avoid a warning about our test deployment,\
    \ check the option at the bottom of the screen (`Deploy even if one or more roles\
    \ contain a single instance`). You can click the question mark to learn more about\
    \ this warning.\n    *   **Package**. This is the package that Visual Studio built\
    \ for you. It’s the file with extension `.cspkg` in the Windows Explorer window.\
    \ Clicking `Browse` opens an `Open` form. You may find it easier to copy the entire\
    \ path from the Windows Explorer window and paste it in the `Open` form. Select\
    \ the package file, and click `Open`.\n    *   **Configuration** . This is the\
    \ configuration file of your cloud service project with a `.cscfg` extension.\
    \ Again, click `Browse` and select the configuration file from the `Open` form.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 141](index-184_1.png)\n\
    \n![Image 142](index-184_2.png)\n\n*Figure 8-19. Windows Azure deployment dialog\
    \ box*\n\n7.  When the information provided looks like Figure [8-19](#index_split_002.html#p184),\
    \ click `OK`. Doing so first copies the appropriate files to the cloud and creates\
    \ the virtual machine in which your project will be deployed (see Figure [8-20](#index_split_002.html#p184)).\
    \ After it’s deployed, your service starts running immediately and you start incurring\
    \ charges.\n\n*Figure 8-20. Azure management interface showing a package being\
    \ deployed*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 143](index-185_1.png)\n\
    \nTo check that your website is running, you may first need to refresh your screen.\
    \ Click the `Site URL` link located on the right side of the screen, which is\
    \ the area that lists the properties of the deployment. Clicking the link opens\
    \ another browser and runs your web application in the cloud (see Figure [8-21](#index_split_002.html#p185)).\n\
    \n*Figure 8-21. Running the web application in the cloud*\n\n**Note**\nAs mentioned\
    \ previously, you’re now paying for this Windows Azure service. To remove this\
    \ service and stop accruing charges, select the `AzureExample` cloud service,\
    \ click on `staging`, and click on the `delete` button on the bottom menu.\n\n\
    ## Summary\n\nThis chapter showed you how to create a simple ASP.NET application\
    \ that connects to a SQL Database instance. This requires a few configuration\
    \ steps, including the creation of a Windows Azure service in the cloud and the\
    \ installation of a Visual Studio extension called the Windows Azure Tools.\n\n\
    While this chapter focused primarily on deploying an ASP.NET application in the\
    \ cloud, you can very easily deploy ASP.NET projects on your enterprise IIS servers\
    \ and configure the connection string to connect to a SQL Database instance. This\
    \ gives you multiple deployment options to consider, although you must keep in\
    \ mind that each deployment option has a different cost structure. Data transfer\
    \ between Windows Azure and SQL Database is free within the same region, but you\
    \ pay for compute time in Windows Azure.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 9 ■ DESIGNING FOR HIGH PERFORMANCE\n\nThis chapter focuses on a few\
    \ key topics that can help you design high-performance applications that consume\
    \ data in SQL Database and SQL Server databases. The approach used in this chapter\
    \ builds a simple but effective WinForms application that consumes data stored\
    \ both on premises and in the cloud. You’ll first explore a few general concepts\
    \ and then quickly go into the design and development of a shard library that\
    \ reads data from multiple databases.\n\nFinally, you’ll see how to add multithreading\
    \ to the shard library using the Task Parallel Library (TPL) and caching using\
    \ the Enterprise Library (formally known as the caching application block).\n\n\
    ## General Performance Concepts\n\nBefore diving into the details, let’s discuss\
    \ a few concepts related to performance. The first thing you should know is that\
    \ achieving high performance is difficult. Although making sure applications perform\
    \ to acceptable levels is important, advanced performance tuning requires careful\
    \ planning and should be included as a design goal only if requirements drive\
    \ you to believe that high performance is necessary. For example, if you expect\
    \ your application to be used by thousands of concurrent users, then you may need\
    \ to use caching and even multithreading. On the other hand, certain high-performance\
    \ techniques can make code difficult to read and maintain, and in such cases knowledge\
    \ transfer may be difficult.\n\n## Chatty vs. Chunky"
