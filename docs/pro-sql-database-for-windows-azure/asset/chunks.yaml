    Summary


    This chapter showed you how to create a simple ASP.NET application that connects
    to a SQL Database instance. This requires a few configuration steps, including
    the creation of a Windows Azure service in the cloud and the installation of a
    Visual Studio extension called the Windows Azure Tools.


    While this chapter focused primarily on deploying an ASP.NET application in the
    cloud, you can very easily deploy ASP.NET projects on your enterprise IIS servers
    and configure the connection string to connect to a SQL Database instance. This
    gives you multiple deployment options to consider, although you must keep in mind
    that each deployment option has a different cost structure. Data transfer between
    Windows Azure and SQL Database is free within the same region, but you pay for
