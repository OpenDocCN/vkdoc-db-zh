  trans: "\n6. 要更改名称，请选择`WebRole1`并按下`F2`键，或点击`Edit`链接。要查看`Edit`链接，请将鼠标悬停在`WebRole1`服务列表项上；您会看到右侧出现两个图标。第一个图标（带铅笔的）允许您编辑名称，第二个图标用于移除此\
