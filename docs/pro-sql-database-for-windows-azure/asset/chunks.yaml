    Now that you’ve made the necessary corrections, you’re ready to create your objects
    in a SQL Azure database.


    Executing the Script Against an Azure Database


    You don’t have a SQL Azure database to run the script against, so let’s create
    one now: 1\. Connect to your SQL Azure instance (refer to Chapter 1 for reference
    if needed), making sure you’re connecting to the master database.


    2\. Open a new query window, and use the syntax discussed in Chapter 1 to create
    your SQL


    Azure database. Name it AWMini, because this is the name the examples use throughout


    this chapter.


    3\. Click over to the generated script. This query window is currently connected
    to your local SQL instance, so you need to change it to your SQL Azure instance
    and the database


    you just created. Right-click anywhere in the script, and select Connection ➤
    Change


    Connection from the context menu.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    4\. In the Connect to Database Engine dialog, enter the information for your SQL
    Azure instance, and enter the name of the database you just created on the Connection
    Properties tab.


    5\. Click Connect.


    You now have your script, a database, and a connection to that database. Click
    the Execute button. Your script should run and create the tables, procedures,
    and data in your SQL Azure Database.


    The SQL Server Generate and Publish Script wizard is a great way to start understanding
    the required changes that need to be made when migrating to SQL Azure. With this
    foundation, let’s discuss one of the other options, the bcp utility.


    The bcp Utility


    The bcp utility provides bulk copying of data between instances of Microsoft SQL
    Server. This utility is installed with SQL Server and requires no knowledge or
    understanding of T-SQL syntax. If you aren’t familiar with the bcp utility, don’t
    confuse or associate its functionality with that of the Import/Export Wizard in
    SQL Server. Although the bcp documentation refers to what bcp does as a “bulk
    copy,” be aware that you can’t bcp data from a source into a destination with
    a single statement. You must first bcp the data out of the source; then, you can
    bcp the data in to the destination.


    The bcp utility is a great way to move data. Since it doesn’t do schema (that
    is, the schema must already exist), the bcp utility is a very quick way of migrating
    data. For example, you need to refresh your SQL Database with data from an on-premises
    database, the bcp option is a great solution to do that.


    **Note**


    ■


    the bcp utility is very flexible and powerful, and you can apply a lot of options
    to it. this section doesn’t go into the entire range of bcp options or dive deep
    into the many uses of the utility. You can find that information in the SQL Server
    Books online or on the Microsoft MSDn web site a[t http://msdn.microsoft.com/en-us/library/ms162802.aspx.](http://msdn.microsoft.com/en-us/library/ms162802.aspx)


    This section describes how to use the bcp utility to export data from a local
    database and import the data into your SQL Azure database. It also discusses some
    things you should watch out for when using the bcp utility for SQL Azure.


    Invoking bcp


    The bcp utility has no GUI; it’s a command prompt–driven utility. But don’t let
    that intimidate you, especially given what you’re using it for. It’s very flexible
    and can seem a bit overwhelming, but it’s quite simple. The basic syntax for the
    bcp utility is as follows:


    bcp *table direction filename* - *servername* - *username* - *password* where:


    • *table* is the source or destination table based on the direction parameter.


    • *direction* is in or out, depending on whether you’re copying data into the
    database or out of the database.


    • *filename* is the filename you’re copying data to or from.


    • *servername* is the name of the server you’re copying data to or from.


    • *username* is the username used to connect to either the local or SQL Azure
    database.


    • *password* is the password associated with the username.


    Let’s get started by exporting the data from your source database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 64](index-98_1.png)


    ![Image 65](index-98_2.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    Exporting the Data


    Begin by copying data out of your local SQL instance. Open a command prompt, and
    type the command shown in Figure [4-19\. E](#index_split_001.html#p98)nter your
    own values for the server name, and the target directory for the resulting bcp
    file. In this example I used the -T parameter to tell the bcp utility to connect
    to my local instance with a trusted connection using integrated security.


    ***Figure 4-19.** Using bcpto export data*


    Notice that in this example you’re using the out keyword for the direction parameter.
    That’s because you’re copying data *out* of SQL Server.


    The -n parameter performs the bulk-copy operation, using the native database data
    types of the data. The -q parameter executes the SET QUOTED_IDENTIFIERS ON statement
    in the connection between the bcp utility and your SQL Server instance.


    After you type in the command, press Enter to execute the bcp utility. In mere
    milliseconds, over 71,000 rows are exported and copied to the user.dat file (see
    Figure [4-20](#index_split_001.html#p98)).


    ***Figure 4-20.** Output from the bcp export command*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 66](index-99_1.png)


    ![Image 67](index-99_2.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    Importing the Data


    The next step is to copy the data into the cloud—specifically, to your SQL Azure
    AWMini database. The syntax for copying *into* a database is very similar to the
    syntax for copying data *out*. You use the in keyword and specify the server name
    and credentials for your SQL Azure database, as shown in Figure [4-21.](#index_split_001.html#p99)


    ***Figure 4-21.** Uniqueidentifier data type error during bcp import*


    After you type in the command, press Enter to execute the bcp utility. Notice
    in Figure [4-22 th](#index_split_001.html#p99)at importing all 71,320 rows took
    no time at all.


    ***Figure 4-22.** Successful bcp import*


    If you ever receive an error stating that an unexpected end-of-file (EOF) was
    encountered, this error isn’t specific to SQL Azure; the bcp utility has issues
    with columns of the uniqueidentifier data type. You can find posts and blogs all
    over the Internet about this problem.


    The solution is to drop the rowguid column from the table in the SQL Azure table.
    The cool thing is that you don’t need to re-export the data. You can simply re-execute
    the bcp import command and then put the rowguid column back on the table.


    As stated earlier, SQL Server BOL is full of information about how to use the
    bcp utility. This section is a brief introductory look at how to use this utility
    to move data from your local SQL Server instance to SQL Azure. The bcp utility
    is a bulk-copy method of moving data. It lacks SSIS’s ability to convert data
    from one data type to another, and SSIS’s workflow components. But if all you’re
    interested in is moving data from one table to a similar destination table, bcp
    is your best friend.


