    # 文档大纲


    故障排除要困难得多。在单一的 `SQL 数据库`上定位问题根源可能就很困难。当您有 1000 个 `SQL 数据库`时，该如何处理？此外，还有一些思维模式的转变需要适应，比如拥抱故障并在系统中构建补偿机制。`SQL
    Database`客户们最感棘手的问题之一，是他们必须从 `纵向扩展` 转向 `横向扩展`。这之所以困难，是因为在盒子世界里 `纵向扩展` 曾是首选模式，而
    `横向扩展` 则要棘手得多。还有很多新东西需要处理，比如 `多租户`。我该如何承载 1000 个客户？哪些部分需要保持隔离，哪些部分可以共享？如何计费？如何计算
    `销售成本` 并确保其足够低！


    这些都不是简单的问题。为了有效地解决它们，您需要理解您所运行平台的能力。它能帮您解决哪些问题，哪些问题需要您自己处理？作者 Scott Klein 和 Herve
    Roggero 出色地带您深入了解了 `Windows Azure SQL Database` 的方方面面。从编程模型到迁移策略，从安全性到横向扩展。无论您是专注于使用
    `WCF` 和 `OData` 等最新高级接口，还是深入研究性能调优的细节，本书都涵盖了您需要了解的关于 `SQL Database` 的一切知识。


    Rick Negrin

    首席项目经理

    `Windows Azure SQL Database`


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 228](img/index-304_1.jpg)


    ![Image 229](img/index-304_2.jpg)


    ## 关于作者


    **Scott Klein** 是微软的 `Windows Azure` 技术布道师，专注于 `Windows Azure SQL Database`（前身为
    `SQL Azure`）及相关的云就绪数据服务。他的 `SQL Server` 职业生涯始于 4.2 版本，并在其超过 20 年的职业生涯中与每一个后续版本都有合作。在加入微软之前，他曾是
    `SQL Server` MVP，随后成为首批四位 `SQL Azure` MVP 之一。Scott 是多本由 Wrox 和 Apress 出版书籍的作者或合著者，包括本书。Scott
    会在任何能让人倾听的地方谈论 `Windows Azure SQL Database`。您可以通过 `SQLScott@live.com` 联系 Scott，并在
    `http://www.scottlklein.com` 阅读他的一些随想。


    **Herve Roggero**，`Windows Azure` MVP，是 Blue Syntax Consulting 公司的创始人，该公司专注于云计算产品和服务。Herve
    的经验涵盖软件开发、架构、数据库管理以及在全球性公司和初创公司担任高级管理职务。Herve 持有多个认证，包括 `MCDBA`、`MCSE` 和 `MCSD`。他还拥有印第安纳大学的工商管理硕士学位。Herve
    是 Apress 出版社的《Pro SQL Database for Windows Azure》一书的合著者。欲了解更多信息，请访问 [www.bluesyntax.net](http://www.bluesyntax.net)。


    xix


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 230](img/index-305_1.jpg)


    ## 关于技术审校


    **Thomas LaRock** 是一位经验丰富的 IT 专业人士，拥有超过十年的技术和管理经验。目前担任 Confio Software 的技术布道师，Thomas
    在他的职业生涯中历经多个职位，包括程序员、分析师和 DBA。Thomas 拥有华盛顿州立大学的数学 `硕士` 学位，并且是可用性专业人士协会的成员。Thomas
    目前服务于 `SQL Server` 专业人士协会 (`PASS`) 的董事会，并且也是一位 `SQL Server` MVP。Thomas 还在 `http://thomaslarock.com`
    上写博客，并且是《DBA Survivor: Become a Rock Star DBA》（[`dbasurvivor.com`](http://dbasurvivor.com)）一书的作者。


    xxi


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 致谢


    本书的存在得益于少数人的勤勉与耐心，我们对此深表感激。


    首先，感谢 Apress 的 Jonathan Gennick 允许我们进行第二版的创作，并成为本书相关想法和观点的一个绝佳讨论对象。其次，感谢 Apress
    的 Kevin Shea 和 Chris Nelson 让我们保持正轨，审阅我们的工作，修正我们的语法，使得本书的撰写过程相当愉快。


    特别感谢技术编辑 Tom LaRock，感谢他细致入微的工作，确保我们的示例确实有效，并且我们分享的信息对读者来说清晰而全面。如果您有机会见到 Tom LaRock，请务必感谢他，并抓住机会与他聊聊
    `SQL Server`。您会庆幸自己这么做了。


    我们无法用言语充分感谢微软那些优秀人士对许多章节提供的见解和反馈。因此，特别感谢 Rick Negin、Mike Morrison、Ariel Netz 和
    Barclay Hill。能与充满工作热情的人共事是一种荣幸。我们也再次感谢 Rick Negrin 为本书撰写了前言。


    若无家人的爱与支持，此生便无值得之事。因此，Scott 要向他的妻子 Lynelle 和他的孩子们致以深切的谢意，感谢他们无尽的爱、支持、理解和巨大的耐心。在专业方面，Scott
    也要感谢几位同事的见解、观点和建议。


    感谢 Cory Fowler、Brady Gaster 和 Wenming Yi！


    xxiii


    [www.it-ebooks.info](http://www.it-ebooks.info/)

