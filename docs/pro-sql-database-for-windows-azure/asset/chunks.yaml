    在最坏的情况下，所有这些操作都无法并行执行，而需要串行执行。如果`TPL`检测到只有单个处理器可用，就可能出现这种情况。最终，你可能会遇到混合了最坏和最好情况的场景，其中部分调用可以并行进行，但并非全部。


    **图 9-9.** 数据访问开销对比


    现在所有的警告都已说明，让我们看一个分片有意义并可能同时提升性能和可扩展性的场景。设想一个`DOCS`表仅包含两条记录。该表包含一些代表文档元数据的字段，例如`Title`和`Author
    ID`。然而，此表还包含一个大型字段：一个名为`Document`的`varbinary`列，用于保存 PDF 文件。每个 PDF 文件大小为几兆字节。


    图 9-10 展示了该表的输出。由于此数据库加载于 SQL 数据库中，`SELECT * FROM DOCS`语句会在 SSL 加密连接上返回几兆字节的数据。执行此语句平均耗时约
    2.5 秒，即每条记录大约 1.25 秒。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 153](img/index-204_1.png)


    ![Image 154](img/index-204_2.png)


    **图 9-10.** 包含文档的示例表（位于同一数据库中）


    两条记录均来自同一数据库；你可以通过查看数据库 GUID 看出，两者非常相似。但是，如果你将第二条记录移动到另一个 SQL 数据库实例，平均执行时间会下降到大约
    1.8 秒。图 9-11 显示了相同语句执行 1.4 秒后的结果（你可以看到数据库 GUID 现在不同了）。这仅是第一次结果执行时间的一半。


    **图 9-11.** 包含文档的示例表（位于两个数据库中）


    你可以更快地执行此语句，因为几乎全部时间都花在了返回`Document`字段上。图 9-12 告诉你，针对两个数据库返回除`Document`字段外的所有字段，仅需
    103 毫秒。这表明，即使存在 201


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 155](img/index-205_1.png)


    毫秒的处理开销，使用分片也能带来性能优势；然而，情况并非总是如此。务必仔细评估你的数据库设计，以确定哪些表（如果有的话）可以利用并行执行。


    **图 9-12.** 从`SELECT`中排除`Document`字段


    ## 处理部分分片


    请注意，构建分片并非全有或全无的方法。你可以轻松地为一组表创建部分分片。


    根据你的代码结构，你可能需要也可能不需要构建理解分片的逻辑，这取决于你需要访问哪些表。分片逻辑最好构建在数据访问层（`DAL`）中，这样表的物理组织就与业务对象的组织分离开来。


    例如，你可以设计一个直接使用业务对象的应用程序。这些业务对象又使用命令对象，这些命令对象是专门例程，足够智能，可以通过调用执行对象将数据加载到内存结构中。图
    9-13 显示了`Authors`对象调用两个命令对象，它们从两个独立的库加载数据：标准的`ADO.NET`库和本章构建的分片库。确定调用哪个库的复杂性被推迟到尽可能低的层级，从而保护应用程序和业务对象免受数据库结构变化的影响。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 156](img/index-206_1.png)


    **图 9-13.** 实现部分分片的示例应用程序设计


    ## 管理事务一致性


    由于 SQL 数据库不支持分布式事务，因此 SQL 数据库的分片库不提供事务一致性。但你应该仔细审视你的事务需求以及这对你的应用程序设计意味着什么。


    你可以通过修改`ExecuteShardNonQuery`和`ExecuteParallelRoundRobinLoad`方法，在本章描述的分片库中添加事务功能。为此，你需要为所有连接对象添加一个独立的事务上下文，并在最后一次执行结束时循环提交它们。如果发生任何异常，必须回滚所有更改。


    > **注意** 如前所述，分片库是一个开源项目，可能会随着时间演进。请查看最新版本以了解支持哪些功能。


    ## 管理外键约束


    在分片数据库中另一个值得考虑的有趣问题与外键约束相关。你可能很快会意识到，无论使用哪种分片方法，维护引用完整性都可能具有挑战性。


    为了维护关系完整性，需要考虑以下问题：


    *   **数据重复。** 因为你不知道哪些记录在分片中的哪个位置，所以父表需要在每个数据库中重复。例如，一个包含州列表（`Florida`、`Illinois`
    等）的表可能需要在所有数据库中复制。

    *   **标识值。** 在一个数据库中添加的记录无法轻易复制到其他数据库。因此，使用标识值作为主键可能很困难，因为无法保证分片中所有数据库的值都相同。例如，`Florida`的`StateID`值在一个数据库中可能是
    10，在另一个数据库中可能是 11。


    关于数据重复，你可以选择将父表视为开销并在各数据库间复制它们，从而维护强引用完整性（`RI`）；或者通过分片父表来牺牲数据库中的`RI`。如果你决定分片父表，则无法再在数据库中强制执行`RI`；但你仍然可以通过向`DataTable`对象添加`RI`约束来在代码中强制执行`RI`。你可以通过在`DataTable`的`ParentRelations`集合中创建一个`DataRelation`对象来实现。例如，以下代码向`DOCS`和`AUTHORS`
    `DataTable`对象添加了`RI`：


    ```csharp

    1. SqlCommand cmd1 = new SqlCommand("SELECT * FROM Authors");

    2. SqlCommand cmd2 = new SqlCommand("SELECT * FROM Docs");

    3. DataTable authors = ExecuteShardQuery(cmd1);

    4. DataTable docs = ExecuteShardQuery(cmd2);

    5. DataRelation dr = new DataRelation("RI",

    6.     authors.Columns["authorId"],

    7.     docs.Columns["authorId"]);

    8. docs.ParentRelations.Add(dr);

    ```


    标识值的问题在于，每条记录都会创建一个自动标识。但由于表分布在多个数据库中，随着时间的推移，无法保证值相同。为了解决这个问题，你需要创建不依赖于标识值，而是依赖于代码的`RI`规则。在存储州的表的例子中，你创建一个`StateCode`列（例如，`Florida`存储为`FL`），并将该列用作主键以及在你的`RI`规则中。这确保了分片中的所有数据库使用相同的值来维护完整性。


    ## 设计多租户系统


    本章构建的分片库旨在使用轮询机制访问数据。新数据可以存储在任何底层数据库中，并使用临时面包屑来记忆哪个数据库包含哪些数据。这对于某些应用程序效果很好，但对于需要隔离客户记录的企业应用程序来说，可能难以使用。让我们回顾另一个高性能设计：多租户系统中客户数据的架构分离架构。'
- fmt: '# Schema-based security and data isolation


    Schema-based security and data isolation were described in Chapter 3. You learned
    that schema-based isolation provides a good security model to protect customer
    data from other tenants in the same database and how to properly configure access
    control for this model.


    ## To design this system we must consider the following points


    *   `Service Account`. In order to leverage connection pooling for each customer
    you will need to make sure your connection strings use service accounts. A service
    account is a login that users do not know about and is used only by the system.
    Each customer will have its own service account.

    *   `Login Database`. You will also need to create a central database containing
    the connection string each customer should use. Alternatively, you could store
    customer connection strings in a configuration file; however, keeping this setting
    in a database makes it easier for maintenance.

    *   `Customer ID`. A customer ID needs to be created for each customer; the customer
    ID then needs to be stored in memory (usually in the Session state) so that the
    system can retrieve the connection string given the Customer ID.


    ### Workflow for processing a customer request


    Figure 9-14 shows how the system can process a request for a specific customer
    when reading or changing data. This workflow assumes that the customer has already
    logged in and is authenticated with the application; the authentication process
    is responsible for storing the Customer ID in memory (the Customer ID could be
    stored in the application cache or the session state for an ASP.NET application).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 157](index-208_1.png)


    Chapter 9 ■ Designing for high performanCe


    *Figure 9-14. Logic used to fetch data in a multitenant, schema-based architecture*


    When the database request is issued, the cost fetches the Customer ID from the
    local cache (1) and uses the Customer ID to retrieve the customer connection string
    from the login database (2). The system then saves the connection string for the
    customer in its internal cache (3) for future requests. The database connection
    string contains the service account to use along with the database assigned to
    the customer. The system then connects to the database (4). Because the service
    account has a default schema pointing to the customer schema the system issues
    the T-SQL command against the correct schema automatically (5). The system can
    then return the customer data and close the connection (6).


    ### Connection Pooling Fragmentation problem


    You should know that a multitenant system distributed over multiple databases
    with a service account for each customer can create a `Connection Pooling Fragmentation`
    problem for large systems. That’s because a connection pool will be created for
    each customer. In addition if you use multiple load-balanced middle-tier servers,
    each server will hold its own set of connection pools. As a result you should
    carefully test your system across multiple customers by monitoring your database
    connections to avoid possible throttling conditions when too many connections
    are established against a SQL Database instance. If you use SQL Database Federations
    instead of the schema container approach, you will not experience the `Connection
    Pooling Fragmentation` issue because all database connections are established
    against a single database (the root database) using the same service account,
    regardless of the Customer ID.


    ### Maintenance operations on a customer schema


    Performing maintenance operations on a customer schema can be a challenge. Your
    application will need to prevent customers from connecting until the schema maintenance
    task is completed. For example, if you want to move a customer to another database
    you can follow these steps:


    1.  Place the customer in maintenance mode to avoid data changes (through your
    application).

    2.  Create a backup copy of the customer schema (you can use the free `Enzo Backup`
    tool to back up a specific schema at [http://www.bluesyntax.net/](http://www.bluesyntax.net/));
    alternatively you can create a complete copy of the database using the `CREATE
    DATABASE . . . AS COPY OF . . .`; however, this method requires removing all the
    other customers’ schema containers that are not supposed to move to the new database.

    3.  Restore the schema container to a new database if you used a tool to back
    up the schema.

    4.  Change the connection string in the login database to point to the new database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Designing for high performanCe


    As you will see in Chapter 10, Federations solve this issue by providing an inline
    `SPLIT` operation that allows you to reconfigure your shard without any downtime.


    # Creating Vertical Partition Shards


    The majority of this chapter discussed the HPS, but it’s important to also be
    familiar with vertical partition shards (VPSs). A VPS stores an application database
    schema across multiple databases; in essence, the application database is split
    in such a way that no database in the shard holds the complete schema.


    Let’s consider a simple application database that is made of two tables: `Users`
    and `Sales`. The `Users` table contains a few thousand records, and the `Sales`
    table contains a few million records. You can design a VPS with two databases:
    the first contains the `Users` table, and the second contains the `Sales` table.


    This type of shard makes it easy to isolate the processing power needs of certain
    tasks without affecting the other database. For example, you can use the `Users`
    table to process login requests from users while at the same time using the `Sales`
    table for a CPU-intensive calculation process or to run long reports.


    You can also build a VPS by splitting a table across multiple databases. For example,
    the `Sales` table may store large binary fields (such as documents). In this case,
    you can split the `Sales` table such that common fields are stored in one database,
    and the field containing documents is stored in another database.


    A VPS does bring it own set of challenges, such as the difficulty of keeping strong
    RI between databases and, in the case of SQL Database, ensuring transaction consistency.
    These considerations are only meant to bring certain design issues to the surface
    when you’re thinking about a VPS. Depending on your database design, a VPS may
    work very well and may be simpler to implement than an HPS.


    # Big Data with Hadoop for Windows Azure


    Although this book is about SQL Database, you should know that Microsoft is introducing
    Hadoop for Windows Azure, a big data initiative that offers the Apache Hadoop
    framework on the Azure cloud.


    Hadoop is a distributed computing model allowing you to scale your processing
    needs to a very large number of machines reliably for both structured and unstructured
    data. When working with Hadoop, you implement software logic to distribute your
    computing needs using open source subprojects, such as the Hadoop Distributed
    File System and the Hadoop MapReduce. Each machine in the Hadoop network offers
    local compute and storage for massively distributed computational needs.


    At the time of this writing, Hadoop for Windows Azure is only available by invitation,
    and limited information is available. If you have large amounts of data to analyze
    and need a massively scaled out environment, take a look at Microsoft’s offering
    for Hadoop.


    # Summary


    As you’ve seen, building databases with SQL Database can be complex if you need
    to scale your database design or if you’re looking to develop a high-performance
    system. This chapter introduced you to the design and implementation of a shard
    library that gives you the necessary building blocks to experiment with a flexible
    and scalable architecture.'
