  trans: "\n但是，我们创建的联邦仅对历史购买记录有意义，因为它的分区键是 `purchaseId`。正如本章引言所讨论的，联邦的主要优势之一是能够定义多个数据域并分别管理每个域的压缩。如果我们还有一个跟踪客户访问记录的大表怎么办？\n\
    \n没问题！我们可以根据需要创建任意多个联邦，并将一组表放置其中。让我们创建另一个名为 `CustomerVisits` 的联邦：\n\n```\n// 连接回根数据库\n\
    USE FEDERATION ROOT WITH RESET\n\n// 创建一个新联邦\nCREATE FEDERATION CustomerVisits\
    \ (visitId BigInt RANGE)\n\n// 连接到我们的第一个联邦成员\nUSE FEDERATION CustomerVisits (visitId=0)\
    \ WITH FILTERING=OFF, RESET\n\n// 然后让我们创建一个包含几条记录的表\nCREATE TABLE CustomerVisits\
    \ (\n    vId bigint NOT NULL PRIMARY KEY,\n    dateOfVisit dateTime NOT NULL,\n\
    \    storeId int NOT NULL\n) FEDERATED ON (visitId = vid)\n\nINSERT INTO CustomerVisits\
    \ VALUES (1, getdate(), 1)\nINSERT INTO CustomerVisits VALUES (2, getdate(), 2)\n\
    INSERT INTO CustomerVisits VALUES (3, getdate(), 2)\nINSERT INTO CustomerVisits\
    \ VALUES (4, getdate(), 1)\nINSERT INTO CustomerVisits VALUES (5, getdate(), 1)\n\
    ```\n\n我们现在总共有两个联邦和三个联邦成员，如图 10-2 所示。\n\n![Image 159](img/index-217_1.png)\n\n\
    # 第 10 章 ■ 联邦\n\n**图 10-2.** 创建多个联邦\n\n> **注意：** 到目前为止，你创建联邦键时使用的都是 `Bigint` 值。但是，你不能在联邦表上使用\
    \ `IDENTITY` 列，因此你的应用程序需要为联邦表生成下一个主键值。虽然使用 `Uniqueidentifier` 有点麻烦，但它很受欢迎，因为不需要维护生成下一个标识符的逻辑。\n\
    \n## 管理联邦\n\n到目前为止，你已经了解了如何创建联邦、拆分联邦成员以及向联邦表添加记录。你可能想知道有哪些工具可以查看你的联邦及其成员，以及如何判断你的联邦是否已准备好进行拆分。\n\
    \n要管理你的联邦，请转到 SQL 数据库管理门户。首先登录你常用的 Windows Azure 管理门户 (`http://manage.windowsazure.com`)\
    \ 来访问此门户。在 SQL 数据库下找到你新创建的数据库，然后单击屏幕底部的 `Manage` 按钮，如图 10-3 所示。\n\n![Image 160](img/index-218_1.png)\n\
    ![Image 161](img/index-218_2.jpg)\n\n# 第 10 章 ■ 联邦\n\n**图 10-3.** 管理你的 SQL 数据库实例\n\
    \n单击 `Manage` 图标将打开另一个窗口，要求你登录到所选的数据库服务器。在该屏幕上，你还可以指定数据库的名称（在我的示例中是 `EnzoLog2`）。登录后，你就进入了\
    \ SQL 数据库管理门户，如图 10-4 所示。\n\n**图 10-4.** 查看数据库属性\n\n你会注意到你的联邦显示在右侧；在图 10-4 中可以看到\
    \ `CustomerVisits` 和 `PurchaseHistory`。让我们点击 `PurchaseHistory`。其下方的 `Drop Federation`\
    \ 按钮变为可用状态，允许你通过单击一次删除整个联邦。删除联邦将删除所有联邦成员。在此屏幕上，你还可以通过单击顶部的 `New` 按钮创建新联邦，或者通过单击\
    \ `Query Performance` 查看查询性能。但请注意，显示的性能信息仅适用于根数据库，因为这是我们当前正在查看的。\n\n要查看联邦的详细信息，请单击其右侧的箭头。例如，如果你点击查看\
    \ `PurchaseHistory` 的详细信息，屏幕将如图 10-5 所示。你可以浏览每个联邦成员，或者单击它们以显示带有其他选项的窗口。例如，你可以通过单击\
    \ `Resize` 并指定目标大小，轻松地在此屏幕上调整单个联邦成员的大小。你还可以通过选择 `Split` 并提供联邦成员将被拆分时的联邦键值，轻松地在此屏幕上执行拆分操作。\n\
    \n![Image 162](img/index-219_1.jpg)\n\n# 第 10 章 ■ 联邦\n\n**图 10-5.** 查看一个联邦及其联邦成员\n\
    \n## 高级考虑因素\n\n从前述示例中可以看出，联邦为需要扩展到单个 SQL 数据库实例能力之外的云应用程序提供了一种重要的可扩展性模型。然而，在决定采用此功能之前，有一些挑战和考虑因素值得讨论。\n\
    \n### 限制\n\n让我们回顾一下在采用联邦之前你应该了解的一些最重要的限制。\n\n*   **无法合并。** 你可能已经注意到缺乏合并能力。一旦你拆分了联邦成员，在当前版本的\
    \ SQL 数据库中无法将其合并回去。虽然这是一个缺点，但未来版本的联邦可能会支持此功能。\n\n*   **独立的架构。** 如前所述，一旦创建了联邦成员，其架构定义就与同一联邦中的所有其他成员独立。在我们之前的示例中，你可以连接到其中一个联邦成员并删除一个表，或添加一列，甚至更改一个存储过程。由于目前没有防护措施，很容易出现联邦成员之间架构略有不同的情况。这可能会对你的代码产生一些影响。因此，如果你更新了某个联邦成员的架构，请记住对所有其他联邦成员进行相同的更改。\n\
    \n*   **有限的工具支持。** 目前，市场上大多数工具都不支持联邦数据库，包括 Microsoft 提供的一些工具。尽管这种情况很可能会随着时间的推移而改变，但你不能将数据同步服务、Azure\
    \ 报告服务或数据库 `COPY` 操作用于联邦成员。\n\n*   **不支持扇出。** 另一个重要限制是缺乏对跨联邦成员查询的支持。换句话说，你不能发出一个将跨越或扇出多个联邦成员的请求，更不用说多个联邦了。如果你想获取销售总额，通常会运行这个简单的语句：\n\
    \n```\nSELECT SUM(amount) FROM purchases\n```\n\n由于 SQL 数据库无法针对多个联邦成员执行此语句，你需要在每个联邦成员上运行此查询，并在你的代码中执行最终的求和操作。\n\
    \n> **注意：** 在多个数据库上执行相同的查询称为扇出操作。在你的代码中实现扇出操作并不难，尽管你应该使用多个线程来执行扇出查询以提高获取操作的性能。\n\
    \n还有许多其他适用于联邦的限制可能会影响你的设计或采用联邦的能力，例如不支持索引视图、缺乏对 `timestamp` 和 `rowversion` 数据类型的支持等等。\n\
    \n> **注意：** 如果你计划将联邦用于你的应用程序，应该花些时间在 Msdn 上查阅所有已记录的限制。使用 Bing 搜索“Federation Guidelines\
    \ and Limitations”。\n\n## 分片库\n"
- fmt: 'Some of the limitations discussed previously related to fan-out queries can
    be resolved by coding the logic yourself, or by using open source libraries that
    have solved this problem for you.


    Of importance is that you can use the `Enzo Sharding` library discussed in previous
    chapters. The latest release supports Federations and allows you to execute statements
    across multiple federation members easily, using multithreaded operations for
    faster results. You can use the built-in fan-out operation of the library to perform
    schema changes across your databases, return a single result set, or execute simple
    aggregations across federation members.


    With the latest library you can execute a distributed query, called `D-SQL`, using
    a syntax that extends `T-SQL`.


    The library detects the syntax automatically and executes the inner query across
    the federation members specified.


    Because this is a .NET library, you cannot use this command structure outside
    of your code. Here is an example of a `D-SQL` query that fetches all the `PurchaseHistory`
    records, regardless of the number of federation members:

    ```

    SELECT * USING (SELECT * FROM Purchases) FEDERATED ON (PurchaseHistory)

    ```


    The inner statement is the query being executed across the `PurchaseHistory` federation;
    a single data set is returned to the calling code. Here are a few other variations
    of `D-SQL` that perform other requests:

    ```

    -- finds the maximum amount across all federation members

    SELECT MAX(amount) USING (SELECT MAX(amount) FROM Purchases)

    FEDERATED ON (PurchaseHistory)

    ```

    ```

    -- finds the sum of all sales for zipcode 33498

    SELECT SUM(amount) USING (SELECT SUM(amount) FROM Purchases P

    INNER JOIN StoreLocations S ON P.storeid = S.storeid

    WHERE S.zipcode = ''33498'' )

    FEDERATED ON (PurchaseHistory)

    ```

    ```

    -- Executes a stored procedure across all federation members and returns all the
    records

    SELECT * USING (EXEC GetPurchasesByZipCode ''33498'' ) FEDERATED ON (PurchaseHistory)

    ```

    ```

    -- Performs a JOIN across the same federation to exclude certain records

    SELECT * USING (SELECT * FROM CustomerVisits) FEDERATED ON (CustomerVisits)

    WHERE storeid IN (SELECT DISTINCT storeid FROM Purchases WHERE amount >= 100)

    FEDERATED ON (PurchaseHistory)

    ```


    The library offers additional features, like caching, sorting, and filtering records
    based on atomic unit values.


    Because it''s an open source project, you are welcome to dissect the code and
    implement your own version of the library for your own needs.


    `Note`: To learn more about the `Enzo sharding` library, visit `http://enzosqlshard.codeplex.com`.
    You will be able to download the open-source library and a sample application
    to get you started.


    ## Summary


    SQL Database offers a unique feature, called Federations, that promises elasticity
    at the database layer, giving you the option to scale your database tier quickly
    and efficiently. While the first release of this feature has a few limitations
    it is clear that many developers will be compelled to evaluate this feature and
    possibly adopt it to address their scalability needs.


    ## `Chapter 11` `Performance Tuning`


    Designing for high performance becomes more important with a database that runs
    in the cloud because development objectives tend to minimize roundtrips and the
    amount of data being returned. This chapter provides an overview of some of the
    most common tuning and troubleshooting techniques available in SQL Database. Keep
    in mind that performance tuning is a very complex topic; as a result, this chapter
    can introduce only selected techniques.


    The techniques presented are similar to the ones available in SQL Server, although
    some of the tools aren''t supported in SQL Database. Along the way, you will walk
    through a few examples of how to improve the performance of a SQL statement and
    the steps required to tune it.


    ### What''s Different with SQL Database'
