    为了消除 `TestUserType` 上的索引扫描，你可以按照之前的指导方针添加另一个索引。因为 `SELECT` 子句中不需要任何列，所以你可以省略 `INCLUDE`
    部分。索引如下：


    ```

    CREATE INDEX idx_testusertype_001 ON TestUserType

    (UserTypeKey, UserType)

    ```


    ■ ## **注意** 尽管影响很小，但在生产系统中添加新索引存在风险。某些例程，特别是批处理程序，通常依赖于数据的正确排序来计算累计总和或执行特定任务。如果为了运行查询而优先使用某个索引，则有可能使用新索引，这可能会改变数据返回的顺序。如果你的所有语句都包含
    `ORDER BY` 子句，那么这个问题就不会影响你。但是，如果你的某些程序依赖于记录的自然顺序，请务必小心！另外，请记住，添加索引会因增加开销而对性能产生负面影响。


