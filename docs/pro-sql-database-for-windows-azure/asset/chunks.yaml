  trans: '# 第 4 章 ■ 数据迁移与备份策略


    第 3 章详细讨论了在云端存储宝贵数据时涉及的安全问题、注意事项以及最佳实践。将数据迁移到云端是一个重大决策，你不应也绝不能轻率决定。但在你决定使用`SQL
    Azure`之后，问题就变成了：如何将数据上传到云端？虽然将本地数据库无缝迁移到`SQL Azure`是理想情况，但实际操作并不像你想象的那样简单直接。你确实有几个可行的选择，但必须考虑数据迁移之外的因素，例如数据传输可能产生的成本。


    数据进入云端后，还会引发更多关于备份策略的问题——这些策略在本地数据库中很常见。在`SQL Azure`中，备份设备以及数据库备份与还原的概念已不复存在。尽管这听起来令人惊讶，但请记住，微软在幕后管理着所有硬件。目前，这里不存在驱动器、设备等概念。


    本章将讨论将数据库和数据迁移到云端所涉及的不同迁移工具、策略和概念。你会看到展示这些工具使用方法的示例。在本章最后，我们将用一两页的篇幅探讨备份策略以及有助于提供`SQL
    Database`备份功能的工具。


    ## 将数据库和数据迁移到 SQL Azure


    假设你想将一个或多个应用程序及其数据库迁移到云端。这是一个很好的想法。很可能，你与无数考虑将应用程序迁入云端的人属于同一类：你不想从头开始。你更愿意将现有应用程序迁移到云端，但不确定必要的步骤或可用的技术。本节讨论微软提供的三种工具，它们是`SQL
    Server`的一部分：

    *   `导入/导出服务`

    *   `生成和发布脚本向导`

    *   `bcp` 实用工具


    除了这三种工具，我们还将简要提及 CodePlex 上一个名为`SQL Azure 迁移向导`的免费实用工具，它提供了一个向导驱动的界面，指导你将数据库和数据迁移到`SQL
    Azure`。


    本章的示例使用`SQL Server 2012`，可从微软的`MSDN`站点获取。这些示例也适用于`SQL Server 2008`，尽管某些界面可能略有不同。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    这些示例中使用的数据库是`AWMini`，它是`AdventureWorks`数据库的一个精简版本。

    可从本书的`APress`站点下载此数据库。


    ## 导入/导出服务


    2012 年，微软以`导入/导出`服务的形式发布了一项强大的功能，用于将本地数据库迁移到`SQL Azure`。要理解这项服务及其工作原理，首先需要了解`数据层应用程序框架`，通常简称为`DAC
    Fx`。


    ### 数据层应用程序框架


    `DAC Fx`是在`SQL Server 2008 R2`中作为`应用程序和多服务器管理`服务的一部分引入的，旨在高效且主动地管理数据库环境。它的设计考虑了扩展性，旨在提供一种有效的方法来管理数据库架构在不同环境（例如从开发到测试，以及从测试到生产）之间的部署。


    `DAC Fx`是一套旨在改进`SQL Server`数据库架构的开发、部署和管理的工具、API 和服务。在大多数环境中，`DBA`创建并维护一系列`T-SQL`脚本，用于创建或修改数据库对象，例如表和存储过程。问题在于，在许多情况下，`DBA`需要维护多套脚本：一套用于初始创建，另一套用于将数据库从一个版本更新到另一个版本的更新和修改。再加上这些脚本的多个版本，就形成了一个复杂的维护场景。


    这正是`DAC Fx`的用武之地。`SQL Server 2008 R2`引入了`BACPAC`的概念，无需构建和维护`T-SQL`脚本集。`DAC`（数据层应用程序）是一个包含应用程序所使用的所有数据库对象的实体。其目的是为创建、部署和管理对象提供一个单一单元，而不是单独管理每个对象。


    当`DAC`准备好部署时，会被构建成一个`DAC`包，或称`DACPAC`。这个包是一个包含`DAC`定义的文件，实际上就是一个包含多个`XML`文件的压缩文件。


    然而，这些`DACPAC`只包含架构，不包含数据。这就是新版本`DAC Fx`的用武之地。2.0 版本现在同时支持数据和架构，可以将表数据与架构一起导出到一个名为`.bacpac`的新文件格式中。使用`DAC
    Fx`，你现在可以从现有数据库中提取`BACPAC`，并将其部署到不同的`SQL Server`环境，包括……没错，`SQL Azure`。


    需要注意的是，`SQL Server 2012`附带`DAC Fx` 2.0 版本，并支持导出到`BACPAC`。接下来的两节将指导你如何使用`SQL Server
    2012`创建和部署`BACPAC`。你将看到如何在`Windows Azure 管理门户`中使用`导入/导出`服务来导入和导出`SQL Azure`数据库。


    ### 使用 SQL Server 2012 通过 BACPAC 部署到 SQL Azure


    对于尚未升级到`SQL Server 2012`的用户，下一节将解决这个问题。但本节将使用`SQL Server 2012`。首先，你将看到如何将本地数据库直接部署到`SQL
    Azure`，然后如何使用内置的导入和导出功能，通过`SQL Server 2012`的`BACPAC`进行迁移。


    请记住，本节的所有示例都假设你的数据库是`Azure 就绪`的，即你的本地`SQL Server`数据库已准备好迁移到`SQL Azure`。例如，如果你下载完整的`AdventureWorks`数据库（例如`SQL
    Server 2008 R2`版本），然后尝试完成本节中的示例，由于其中包含`Windows Azure SQL Database`不支持的对象（例如原生加密和`全文搜索`），这些示例将会失败。本章的“`生成和发布脚本向导`”一节解释了如何通过采取适当的修改和更改，将本地数据库转换为`Azure
    就绪`。更重要的是，它还解释了为什么需要这些更改。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 46](img/index-74_1.png)


    这些示例使用的数据库名为`AWMini`，它是`AdventureWorks`数据库的一个精简版本。可从本书的`APress`下载页面下载此数据库。此数据库已安装为`Azure
    就绪`状态，因此你可以顺利完成这些示例。


    从本书的`APress`站点下载`AWMini.zip`文件并解压缩`.sql`文件。在`SQL Server Management Studio`（适用于`SQL
    Server 2012`）中打开该`.sql`文件，并连接到你的本地`SQL`实例。运行该`.sql`文件，它将创建`AWMini`数据库。脚本运行完成后，刷新数据库列表，你将在数据库列表中看到新的`AWMini`数据库。


    ## 直接部署到 SQL Azure


    `SQL Server 2012`使得将本地数据库迁移到`SQL Azure`变得极其简单。在`SQL Server 2012`之前，迁移选项需要许多步骤，有些繁琐，并且不太符合`DAC`的整体思路，原因很简单：`DACPAC`不迁移数据。随着`SQL
    Server 2012`和`DAC Fx` 2.0 的发布，这一切都改变了。直接部署到`SQL Azure`就像一个三步向导一样简单。'
- fmt: '# Chapter 4 ■ Data Migration and Backup Strategies


    ## Figure 4-1. The Deploy Database to SQL Azure menu option


    If it’s not already open, open `SQL Server Management Studio` for `SQL Server
    2012`. In `Object Explorer`, expand the `Databases` node for your server and right-click
    the `AWMini` database. From the context menu, select `Tasks ➤ Deploy Database
    to SQL Azure`, which will start the database deployment wizard (see [Figure 4-1](#index_split_000.html#p74)).


    In the `Deploy Database` wizard, click `Next` on the `Introduction` page. On the
    `Deployment Settings` page of the wizard, you need to specify the connection information
    for the target `SQL Azure` server to which the database will be migrated. Click
    the `Connect` button, which will bring up the familiar `Connect to Server` dialog.
    Enter the `SQL Azure` server name (in the format `server.windows.database.net`),
    along with the username and password for the `SQL Azure` server, and then click
    `Connect`.


    Next, enter a name for the database (see [Figure 4-2](#index_split_000.html#p75)).
    As the wizard states, this is a NEW database, not the name of an existing one.
    Based on the size of your on-premises database, select the `Edition` needed (`Web`
    or `Business`) and then the size of the database needed. The wizard will automatically
    fill in the `Temporary file name` for you, so there is no reason to change that.
    However, notice that the wizard is creating a `BACPAC`, not a `DACPAC`. This means
    that your data will be migrated as well.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 47](index-75_1.png)


    ## Figure 4-2. DAC deployment settings


    Click `Next`, which will then display the `Summary` page of the wizard. This contains
    some important information, not just “here are the options you selected in the
    wizard.” Notice that under the `Source` section of the summary, it lists the `Source
    Database Size`, and then informs you that your source database might be larger
    than the size of the database selected on the previous wizard page. This isn’t
    anything to panic about, but it is a critical piece of information to inform you
    to be sure that the edition and size of the database you selected will be large
    enough.


    Click `Finish` on the `Summary` page to begin the deployment and migration. In
    [Figure 4-3](#index_split_000.html#p76) you can see the steps it takes during
    the migration process, including creating the target database, creating and verifying
    a deployment plan, and then executing that plan by applying the `BACPAC` against
    the target database. Once the deployment is completed, click `Close`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 48](index-76_1.png)


    ## Figure 4-3. DAC execution results


    This process is quite fast. The `AWMini` database contains 10 tables with a total
    of about 200,000 records, and on my system migrating it took less than a minute.
    Your results may vary (my apologies for sounding like a commercial) depending
    on your Internet connection, but even larger databases, such as the full `AdventureWorks`
    database, didn’t take much longer.


    This option is a no-stop migration for deploying your `SQL Server` database to
    `SQL Azure`. This means that once you click `Finish`, the deployment begins. Yet,
    the `BACPAC` file specified in the `Temporary File Name` in [Figure 4-2](#index_split_000.html#p75)
    will still exist once the migration completes. Depending on the size of the database,
    the `DAC` file (`.bacpac`) could be quite large. Even for the `AWMini` database
    the file size was 5.5 MB. The great thing is that if you have a program that can
    open a large `XML` file (and enough memory), you can look to see the structure
    of the `BACPAC`.


    The `BACPAC` file at this point can be archived, deleted, or used for other import
    services. In this simple example, the `BACPAC` was stored locally. However, best
    practices state that if you will be importing the database to multiple servers
    or multiple times, you’ll want to store the `BACPAC` in `Windows Azure` storage.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
