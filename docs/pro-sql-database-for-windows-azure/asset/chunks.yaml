    # Introduction


    Windows Azure SQL Database, formally known as SQL Azure, appeared on the scene
    about five years ago. At the time, little was known about it, but Microsoft was
    beginning to talk quite a bit about the Azure platform. Most people thought that
    SQL Azure was another NoSQL offering, while in reality it was, and is, nothing
    of the sort. At that time, the largest database it could handle was 1GB, and no
    one was really taking it seriously. Since that time, Windows Azure SQL Database
    has grown into an enterprise-ready PaaS (Platform as a Service) offering based
    on the proven SQL Server technology.'
