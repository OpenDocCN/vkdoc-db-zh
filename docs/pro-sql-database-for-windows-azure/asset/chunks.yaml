    \ </summary>\n"
- fmt: "## CHAPTER 3: Security\n\nAs promised, following is the code for the stored\
    \ procedure. You create a stored procedure because it allows you to provide additional\
    \ security from an access-control standpoint. As you see later, you create a schema\
    \ that contains the tables and a separate schema for the stored procedures that\
    \ access the tables. This provides greater control over your database security.\
    \ You’ll review schemas later in this chapter.\n\n```sql\nIF (Exists(SELECT *\
    \ FROM sys.sysobjects WHERE Name = 'proc_SaveProperty' AND Type = 'P')) DROP PROC\
    \ proc_SaveProperty\nGO\n\n-- SELECT * FROM UserProperties\n\nCREATE PROC proc_SaveProperty\n\
    \    @name nvarchar(255),\n    @value varbinary(max),\n    @vector binary(16),\n\
    \    @lastUpdated datetime,\n    @hash binary(32)\nAS\nIF (Exists(SELECT * FROM\
    \ UserProperties WHERE PropertyName = @name))\nBEGIN\n    UPDATE UserProperties\
    \ SET\n        Value = @value,\n        Vector = @vector,\n        LastUpdated\
    \ = @lastUpdated,\n        Token = @hash\n    WHERE\n        PropertyName = @name\n\
    END\nELSE\nBEGIN\n    INSERT INTO UserProperties\n        (PropertyName, Value,\
    \ Vector, LastUpdated, Token)\n    VALUES (\n        @name,\n        @value,\n\
    \        @vector,\n        @lastUpdated,\n        @hash )\nEND\n```\n\nThis stored\
    \ procedure performs both updates and inserts depending on the property name.\
    \ Note the use of `varbinary(max)`; because you don’t know how long the encrypted\
    \ value will be, you allow large but variable binary objects to be stored. However,\
    \ the vector is always 16 bytes in length and the hash 32.\n\n![Image 37](index-59_1.png)\n\
    \n### Running the Save Method\n\nRunning the `Save()` method on the `UserProperties`\
    \ class creates a record in the `UserProperties` table.\n\nThe following code\
    \ shows how to call the `Save` method:\n\n```csharp\n/// <param name=\"propertyName\"\
    >The property name</param>\n/// <param name=\"ct\">The CipherText structure to\
    \ save</param>\npublic static void Save(string propertyName, CipherText ct)\n\
    {\n    using (SqlConnection sqlConn =\n        new SqlConnection(CDatabase.ConnectionString))\n\
    \    {\n        sqlConn.Open();\n\n        using (SqlCommand sqlCmd = new SqlCommand())\n\
    \        {\n            DateTime dateUpdated = DateTime.Now;\n\n            sqlCmd.Connection\
    \ = sqlConn;\n            sqlCmd.CommandType = System.Data.CommandType.StoredProcedure;\n\
    \            sqlCmd.CommandText = \"proc_SaveProperty\";\n            sqlCmd.Parameters.Add(\"\
    name\", NVarChar, 255);\n            sqlCmd.Parameters.Add(\"value\", VarBinary,\
    \ int.MaxValue);\n            sqlCmd.Parameters.Add(\"vector\", VarBinary, 16);\n\
    \            sqlCmd.Parameters.Add(\"lastUpdated\", DateTime);\n            sqlCmd.Parameters.Add(\"\
    hash\", VarBinary, 32);\n            sqlCmd.Parameters[0].Value = propertyName;\n\
    \            sqlCmd.Parameters[1].Value = ct.cipher;\n            sqlCmd.Parameters[2].Value\
    \ = ct.vector;\n            sqlCmd.Parameters[3].Value = dateUpdated;\n\n    \
    \        // Calculate the hash of this record...\n            // We pass the list\
    \ of values that should be hashed\n            // If any of these values changes\
    \ in the database,\n            // recalculating the hash would yield a different\
    \ result\n            byte[] hash = Util.ComputeHash(\n                propertyName.GetBytes(),\n\
    \                ct.cipher,\n                ct.vector,\n                dateUpdated.GetBytes());\n\
    \n            sqlCmd.Parameters[4].Value = hash;\n\n            int res = sqlCmd.ExecuteNonQuery();\n\
    \        }\n\n        sqlConn.Close();\n    }\n}\n```\n\n```csharp\nclass Program\n\
    {\n    static void Main(string[] args)\n    {\n        // Declare the encryption\
    \ object and encrypt our secret value\n        Encryption e = new Encryption();\n\
    \        CipherText ct = e.EncryptAES(\"secret value goes here...\");\n\n    \
    \    UserProperties.Save(\"MySecret\", ct);\n    }\n}\n```\n\n### Table Content\n\
