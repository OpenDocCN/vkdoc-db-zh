    Managing Performance


    So far, you’ve seen how the shard library works and how you can use it in your
    code. But it’s important to keep in mind why you go through all this trouble—after
    all, there is nothing trivial in creating a shard library. This shard library
    does something important: it allows a client application to grow parts (or all)
    of a database horizontally, with the intention of improving performance, scalability,
    or both.


    What does this mean? It means the shard library can help an application keep its
    performance characteristics in a somewhat consistent manner as more users use
    the application (scalability), or it can help an application perform faster under
    a given load (performance). If you’re lucky, the shard library may be able to
    achieve both. However, this won’t happen without proper planning. The shard library
    by itself is only a splitter, in the sense that it spreads calls to multiple databases.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 152](index-203_1.png)


    Chapter 9 ■ Designing for high performanCe


    Shards don’t necessarily help performance; in certain cases, a shard hurts both
    performance and scalability. The reason is that a shard imposes an overhead that
    wouldn’t otherwise exist. Figure [9-9 sho](#index_split_002.html#p203)ws the difference
    between a standard ADO.NET call selecting records and best-case and worst-case
    scenarios when fetching the same records from a shard. In the best case, all records
    are assumed to be split in three distinct databases; the shard is able to concurrently
    access all three databases, aggregate the three resultsets, and filter and/or
    sort the data. The shard must then manage all of the following, which consumes
    processing time:


    • Loops for connecting to the underlying databases


    • Loops for fetching the data


    • Data aggregation, sorting and filtering'
  trans: "`parameter` 为 `NULL`。此约定用于让分片库知晓，它应将内部数据库指针移动到分片中的下一个数据库，以供下一轮轮询调用使用。\n\n\
    `ExecuteParallelRoundRobinLoad`。此方法扩展了 `List<SqlCommand>` 并提供了一种创建 `SqlCommand`\
    \ 对象集合的机制。每个 `SqlCommand` 对象都包含一个待执行的 `INSERT` 语句。此方法添加一个 `NULL` 数据库 `GUID` 并调用\
    \ `ExecuteShardNonQuery` 以执行所有支持轮询的语句。这种构造通过将 `INSERT` 语句均匀分布在所有数据库上，简化了快速加载分片的过程。\n\
    \n以下代码展示了客户端如何准备调用 `ExecuteParallelRoundRobinLoad`。第 1 行创建了一个 `SqlCommand` 对象的集合。然后，在第\
    \ 3 行，外层循环针对 `userName` 数组（这是一个要添加到分片的名称列表）中的每个值执行。第 5 至 16 行，为每个要 `INSERT` 的名称创建一个\
    \ `SqlCommand` 对象并将其添加到集合中。第 22 行实际调用了 `ExecuteParallelRoundRobinLoad`。最后，在第 23\
    \ 行，如果一切顺利，库的缓存将被清除：\n\n```\nList<SqlCommand> commands = new List<SqlCommand>();\n\
    \nforeach (string name in userName)\n{\n    if (name != null && name.Trim().Length\
    \ > 0)\n    {\n        SqlCommand cmdToAdd = new SqlCommand();\n        cmdToAdd.CommandText\
    \ = \"sproc_add_user\";\n        cmdToAdd.CommandType = CommandType.StoredProcedure;\n\
    \n        cmdToAdd.Parameters.Add(\n            new SqlParameter(\"name\", SqlDbType.NVarChar,\
    \ 20));\n        cmdToAdd.Parameters[\"name\"].Value = name;\n\n        commands.Add(cmdToAdd);\n\
    \    }\n}\n\n// 进行调用！\nif (commands.Count > 0)\n{\n    commands.ExecuteParallelRoundRobinLoad();\n\
    \    Shard.ResetCache();\n}\n```\n\n**请注意**，对 `ExecuteParallelRoundRobinLoad`\
    \ 的调用与你目前所见的所有其他方法在两点上有所不同：第一，无需添加数据库 `GUID` 参数；它会自动创建一个值为 `NULL` 的此参数。第二，此方法是在\
    \ `List<SqlCommand>` 对象上执行，而非 `SqlCommand`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图片 151](img/index-201_1.png)\n\n## 第 9 章 ■ 高性能设计\n\n图 9-8 显示了示例应用程序中创建要加载到分片中的名称数组的屏幕。如前所述，使用轮询方式向分片添加了六个名称。\n\
    \n***图 9-8.** 示例应用程序使用轮询添加记录*\n\n## 管理分片\n\n创建了分片并达到能够运行查询和添加数据的阶段后，你就可以开始考虑更高级别的问题：如何处理异常、管理性能、控制事务等等。\n\
    \n### 异常管理\n\n到目前为止，你已经了解了示例分片库的基本原理。你看到了如何通过库提供的各种方法来选择、插入、更新和删除记录。让我们讨论一下如何管理分片可能抛出的异常。\n\
    \n当前的库不处理回滚，但它可能会抛出你的代码需要捕获的异常。在前面的例子（图 9-8）中，除了 Jim Nastic 之外的所有记录都被插入了：该名称对于\
    \ `SqlParameter` 对象来说太长了（因此它抛出了一个“值将被截断”的异常）。\n\n库通过 `TPL` 提供的 `AggregateException`\
    \ 类处理异常；该类保存一个异常集合。这是必要的，因为库并行执行数据库调用。因此，可能同时发生多个异常。你需要聚合这些异常并将它们返回给客户端以进行进一步处理。\n\
    \n例如，分片库的 `ExecuteSingleNonQuery` 方法接受一个 `ConcurrentQueue<Exception>` 参数，该参数表示存储异常的对象。此对象是线程安全的，这意味着所有运行的线程都可以安全地向其中添加新异常，而不会遇到并发问题。以下代码显示，如果在\
    \ `ExecuteSingleNonQuery` 方法中检测到异常，代码会在第 14 行将异常添加到队列中。\n\n另外，作为约定，如果未提供队列，则会重新抛出异常（第\
    \ 16 行）：\n```\nprivate static long ExecuteSingleNonQuery(\n    SqlCommand command,\n\
    \    SqlConnection connectionToUse,\n    System.Collections.Concurrent.ConcurrentQueue<Exception>\
    \ exceptions\n)\n{\n    try\n    {\n        // . . .\n    }\n    catch (Exception\
    \ ex)\n    {\n        if (exceptions != null)\n            exceptions.Enqueue(ex);\n\
    \        else\n            throw;\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 第 9 章 ■ 高性能设计\n\n以下代码展示了 `ExecuteShardNonQuery` 方法，该方法调用刚刚描述的 `ExecuteSingleNonQuery`\
    \ 方法。第 1 行创建了异常队列 (`ConcurrentQueue`)，它作为变量传递给 `ExecuteSingleNonQuery`。在并行执行数据库调用完成后，代码检查异常队列是否为空。如果非空，则抛出一个\
    \ `AggregateException`，其中包含存储在异常队列中的异常集合（第 13 和 14 行）：\n```\nvar exceptions =\
    \ new System.Collections.Concurrent.ConcurrentQueue<Exception>();\n\nParallel.ForEach(connections,\
    \ delegate(SqlConnection c)\n{\n    long rowsAffected = ExecuteSingleNonQuery(command,\
    \ c, exceptions);\n\n    lock (alock)\n    {\n        res += rowsAffected;\n \
    \   }\n});\n\nif (!exceptions.IsEmpty)\n    throw new AggregateException(exceptions);\n\
    ```\n\n如你所见，管理异常可能有些棘手。然而，这些异常辅助类提供了一种良好的机制来存储异常并返回可供客户端代码使用的异常集合。\n\n### 性能管理\n\
    \n到目前为止，你已经了解了分片库的工作原理以及如何在代码中使用它。但重要的是要记住你为什么要经历所有这些麻烦——毕竟，创建分片库并非易事。这个分片库做了一件重要的事情：它允许客户端应用程序在水平方向上扩展数据库的部分（或全部），旨在提高性能、可扩展性或两者兼得。\n\
    \n这意味着什么？它意味着分片库可以帮助应用程序在更多用户使用应用程序时（可扩展性）保持其性能特征在某种程度上保持一致，或者它可以帮助应用程序在给定负载下运行得更快（性能）。如果你幸运的话，分片库也许能同时实现这两点。然而，没有适当的规划，这不会发生。分片库本身只是一个分配器，在这个意义上，它将调用分散到多个数据库。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 152](img/index-203_1.png)\n\
    \n### 第 9 章 ■ 高性能设计\n\n分片不一定能提高性能；在某些情况下，分片会损害性能和可扩展性。原因在于分片强加了一个原本不会存在的开销。图 9-9\
    \ 显示了标准 `ADO.NET` 调用选择记录与从分片获取相同记录时的最佳和最坏情况之间的差异。在最佳情况下，假定所有记录分布在三个不同的数据库中；分片能够并发访问所有三个数据库，聚合三个结果集，并对数据进行过滤和/或排序。分片还必须管理以下所有事项，这会消耗处理时间：\n\
    \n• 连接到底层数据库的循环\n\n• 获取数据的循环\n\n• 数据聚合、排序和过滤"
- fmt: '# Chapter 9 ■ Designing for high performanCe


    In the worst case, all these operations can’t be executed in parallel and require
    serial execution. This may be the case if the `TPL` detects that only a single
    processor is available. Finally, you may end up in a situation that mixes worst-and
    best-case scenarios, where some of the calls can be made in parallel, but not
    all.


    **Figure 9-9.** Data access overhead comparison


    Now that all the warnings are laid out, let’s look at a scenario for which a shard
    makes sense and probably improves both performance and scalability. Imagine a
    `DOCS` table that contains only two records. The table contains a few fields that
    represent document metadata, such as `Title` and `Author ID`. However, this table
    also contains a large field: a `varbinary` column called `Document` that holds
    a PDF file. Each PDF file is a few megabytes in size.


    Figure 9-10 shows the output of the table. Because this database is loaded in
    SQL Database, the `SELECT * FROM DOCS` statement returns a few megabytes of data
    on an SSL encrypted link. The execution of this statement takes about 2.5 seconds
    on average, or roughly 1.25 seconds per record.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 153](index-204_1.png)


    ![Image 154](index-204_2.png)


    **Figure 9-10.** Sample table containing documents in one database


    Both records come from the database; you can see this by looking at the database
    GUID, which is similar for both records. However, if you move the second record
    to another SQL Database instance, the average execution time drops to about 1.8
    seconds. Figure 9-11 shows the result of the same statement that executed in 1.4
    seconds (you can see that the database GUIDs are now different). This is half
    the execution time of the first result.


    **Figure 9-11.** Sample table containing documents in two databases


    You can execute this statement much more quickly because almost the entire time
    is spent returning the `Document` field. Figure 9-12 tells you that returning
    all the fields against both databases without the `Document` field takes only
    103 milliseconds. This shows that using a shard can provide performance benefits
    even if there is a 201


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 155](index-205_1.png)


    processing overhead; however, this may not always be the case. Be sure to carefully
    evaluate your database design to determine which tables, if any, can take advantage
    of parallel execution.


    **Figure 9-12.** Excluding the `Document` field from the `SELECT`


    ## Working with Partial Shards


    Note that building a shard isn’t an all-or-nothing approach. You can easily create
    a partial shard for a set of tables.


    Depending on how your code is structured, you may or may not need to build logic
    that understands sharding, depending on which tables you need to access. Sharding
    logic is best built in a data access layer (`DAL`), where the physical organization
    of tables is separated from the organization of business objects.


    For example, you can design an application that consumes business objects directly.
    These business objects in turn consume command objects, which are specialized
    routines smart enough to load data in memory structures by calling execution objects.
    Figure 9-13 shows the `Authors` object calling two command objects that load data
    from two separate libraries: the standard `ADO.NET` library and the shard library
    built in this chapter. The complexity of determining which library to call is
    deferred to the lowest level possible, protecting the application and business
    objects from database structural changes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 156](index-206_1.png)


    **Figure 9-13.** Example application design implementing a partial shard


    ## Managing Transaction Consistency


    Because distributed transactions aren’t supported in SQL Database, shard libraries
    for SQL Database don’t offer transactional consistency. But you should look carefully
    at your transactional needs and what this means to your application design.


    You can add transactional capabilities in the shard library described in this
    chapter by changing the `ExecuteShardNonQuery` and `ExecuteParallelRoundRobinLoad`
    methods. To do so, you need to add a separate transaction context to all connection
    objects and commit them in a loop at the end of the last execution. If any exception
    occurs, you must roll back all the changes.


    > **Note** as mentioned earlier, the shard library is an open-source project and
    is likely to evolve over time. Check for the latest release to see which features
    are supported.


    ## Managing Foreign Key Constraints


    Another interesting issue to consider in shard databases is related to foreign
    key constraints. You may quickly realize that maintaining referential integrity
    can be challenging regardless of the sharding approach you use.


    To maintain relational integrity, the following concerns apply:


    *   **Data duplication.** Because you don’t know which records are where in the
    shard, the parent tables need to be duplicated in every database. For example,
    a table that contains the list of states (`Florida`, `Illinois`, and so on) may
    need to be replicated across all databases.

    *   **Identity values.** Adding records in one database can’t be easily replicated
    across to other databases. Thus, using an identity value as the primary key may
    be difficult because you aren’t guaranteed to have the same value in all databases
    in the shard. For example, the `StateID` value for `Florida` may be 10 in one
    database and 11 in another.


    When it comes to data duplication, you can either treat the parent tables as overhead
    and duplicate them across databases, allowing you to maintain strong referential
    integrity (`RI`), or sacrifice `RI` in the database by sharding the parent tables
    as well. If you decide to shard parent tables, you can no longer enforce `RI`
    in the database; but you may still be able to enforce `RI` in your code by adding
    `RI` constraints to your `DataTable` objects. You can do so by creating a `DataRelation`
    object in the `DataTable`’s `ParentRelations` collection. For example, the following
    code adds `RI` to the `DOCS` and `AUTHORS` `DataTable` objects:


    ```csharp

    1. SqlCommand cmd1 = new SqlCommand("SELECT * FROM Authors");

    2. SqlCommand cmd2 = new SqlCommand("SELECT * FROM Docs");

    3. DataTable authors = ExecuteShardQuery(cmd1);

    4. DataTable docs = ExecuteShardQuery(cmd2);

    5. DataRelation dr = new DataRelation("RI",

    6.     authors.Columns["authorId"],

    7.     docs.Columns["authorId"]);

    8. docs.ParentRelations.Add(dr);

    ```


    The issue with identity values lies in the fact that an automatic identity is
    created for each record. But because the tables are split across databases, you
    aren’t guaranteed to have the same values over time. To solve this issue, you
    need to create `RI` rules that depend not on identity values, but on codes. In
    the case of the table that stores states, you create a `StateCode` column (which
    stores `FL` for `Florida`, for example) and use that column as your primary key
    and in your `RI` rules. This ensures that all databases in the shard use the same
    values to maintain integrity.


    ## Designing a Multitenant System


    The shard library built in this chapter is designed to access data using a round-robin
    mechanism. New data could be stored in any underlying database and a breadcrumb
    is used to temporarily remember which database contains which data. This works
    well for certain applications but may prove difficult to use for business applications
    where customer records need to be isolated. Let’s review another HPS: a schema-separation
    architecture for customer data in a multitenant system.'
