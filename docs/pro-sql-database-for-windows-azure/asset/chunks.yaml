    在 `MainPage.xaml` 文件中向下滚动，你将看到插入新的 `ToDo` 项目到表中以及查询和检索表中所有项目所需的全部代码。


    继续并按 `F5` 运行应用程序。当应用程序加载后，你会在左侧看到**插入一个 TodoItem**，右侧看到**查询和更新数据**。输入一个待办事项并选择**保存**。几秒钟内，该项目将出现在页面右侧（无需点击**刷新**），如图
    12-10 所示。


    **图 12-10.** 运行项目


    当点击**保存**按钮时发生了什么？一个简单的 REST 调用被发送到 Windows Azure；它访问了 Windows Azure 移动服务（通过 `App.xml.cs`
    文件中的移动服务引用）并将数据保存到 SQL 数据库实例中。


    如果你是在 Windows 8 上运行此程序，你需要返回 Windows 8 的开始菜单才能回到 Visual Studio 停止调试。


