  raw: 'Creating a database through the Servers tab is a bit different, in that it
    brings up the New SQL Database-Custom Create dialog box, as shown in Figure [1-5\.
    I](#index_split_000.html#p15)n the Custom Create dialog, in addition to entering
    a database name, you also have the option of selecting a database edition (Web
    or Business) and specifying the size of your database and its database collation.
    Once you have entered the appropriate information in the Custom Create dialog,
    click OK.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 6](index-15_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    ***Figure 1-5.** Creating a SQL Database instance*


    For database sizes, you can choose the Web edition if 1GB or a 5GB is sufficient
    for you. If you need to create larger databases, choose the Business edition,
    which lets you select a size between 10GB and 150GB.


    ■ **Note** the monthly fee varies, depending on the size of the database. See
    the additional information later in this chapter and the complete pricing information
    on Microsoft’s web site: [www.microsoft.com/azure.](http://www.microsoft.com/azure)


    Using a T-SQL Command


    Creating a new database using a T-SQL command is straightforward. Because a database
    instance in SQL Database is managed by Microsoft, only a few options are available
    to you. In addition, you must be connected to the master database to create new
    databases.


    To create a new database using SQL Server Management Studio, log in using the
    administrator account (or any user with the dbmanager role), and run the following
    T-SQL command:


    CREATE DATABASE TextDB (MAXSIZE = 10 GB)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 7](index-16_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    As previously discussed, the size of the database can be 1GB or 5GB for Web edition,
    or 10GB–150GB for Business. If the MAXSIZE parameter isn’t defined, the size of
    the database is set to 1 GB.


    Configuring the Firewall


    SQL Database implements a firewall on your behalf. That’s a benefit that helps
    protect your database. Indeed, the default firewall rule is that *no one* can
    connect to a newly created SQL Database server. You can use the management portal
    to configure your firewall rules at any time and create databases even if no firewall
    rules are defined. Allowing no connections by default is a good security practice,
    because it forces you to think through what IP addresses you wish to allow in.


    Follow these steps to add an IP address (or IP range) for a computer that needs
    access to the SQL Database server:


    1\. In the Windows Azure Management Portal, select the SQL Databases tab in the
    left


    navigation bar.


    2\. Select the Servers tab above the List Items section.


    3\. Select the server name you want to add the firewall rule to.


    4\. Select the Configure tab on the top of the List Items section.


    5\. In the Allowed IP Addresses section, enter a rule name and the Start and End
    IP addresses as shown in Figure [1-6](#index_split_000.html#p16). Click Save.


    ***Figure 1-6.** Firewall settings*


    6\. Additionally, if you have Windows Azure services that need access to your
    SQL Database server, select Yes for the Windows Azure Services option in the in
    the Allowed Services section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 8](index-17_1.jpg)


    Chapter 1 ■ GettinG Started with SQL databaSe


    If for some reason the firewall rules aren’t correctly configured, you will see
    an error message saying so.


    Figure [1-7 sho](#index_split_000.html#p17)ws the error message you get using
    SQL Server Management Studio if the firewall rules don’t allow you to connect.
    The error message looks like a login failure, but the description of the error
    clearly indicates that the client with the given IP address isn’t allowed to access
    the server.


    ***Figure 1-7.** Firewall error*


    ■ **Note** when you’re creating a firewall rule, you may need to wait a few minutes
    for the rule to take effect.


    You can also view and edit firewall settings directly using T-SQL, by connecting
    to the master database with the administrator account and using the following
    objects:


    • sys.firewall_rules


    • sp_set_firewall_rule


    • sp_delete_firewall_rule


    Now that you’ve configured your SQL Database instance, the fun can begin!


    Connecting with SQL Server Management Studio


    Follow these steps to connect to your SQL Database instance using SQL Server Management
    Studio: 1\. You need to obtain the fully qualified server name of the SQL Database
    server. Figure [1-8](#index_split_000.html#p18)


    shows the server information on the management portal. The fully qualified server
    name is located in the Properties pane on the right.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 9](index-18_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    ***Figure 1-8.** Obtaining the server name of your SQL Database server*


    ■ **Note** this example uses SQL Server 2008 Sp1 Management Studio. although you
    can connect to and manage SQL


