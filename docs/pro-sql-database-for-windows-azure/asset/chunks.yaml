    显然，您需要使用凭据，因此“不使用凭据”不是您想要的选项。而且 Azure 不支持集成安全性，所以那也不可行。您可以选择提示输入凭据或指定用户名和密码。默认值是提示输入凭据；如果您保留该设置，报表将在每次运行报表时提示您输入用户名和密码。


