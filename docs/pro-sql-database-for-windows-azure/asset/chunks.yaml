- fmt: 'The default schema of `MyTestLoginUser` is `DBO`, as shown in Figure [3-9.](#index_split_000.html#p68)
    The default schema of a user is the schema that’s used if none is specified in
    a T-SQL statement. To make it easier on developers, change the default schema
    to `MyReadOnlySchema`, so it doesn’t have to be specified in T-SQL statements.


    **Figure 3-9.** Schema owner of a login


    To change the user’s default schema, you need to execute this statement:


    ```sql

    ALTER USER MyTestLoginUser WITH DEFAULT_SCHEMA = MyReadOnlySchema

    ```


    Now that the user has `MyReadOnlySchema` as its default schema, it can see the
    objects owned by that schema directly, without having to specify the object owner.
    However, you haven’t set the access rights yet. Let’s grant `SELECT` rights to
    `MyTestLoginUser`:


    ```sql

    GRANT SELECT ON SCHEMA :: MyReadOnlySchema TO MyTestLoginUser

    ```


    The following statement works again for the `MyTestLoginUser` account:


    ```sql

    SELECT * FROM UserProperties

    ```


    Why did you go through all this trouble? Because creating your own schemas is
    a great way to manage access control by granting rights to schemas instead of
    objects directly. In a way, schemas can be used as a group, like a Windows Group,
    on which rights are granted or denied.


    Figure [3-10](#index_split_000.html#p69) shows how you’ve switched the security
    model around for greater flexibility and control.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 44](index-69_1.jpg)


    ![Image 45](index-69_2.png)


    CHAPTER 3 ■ SECuRiTy


    **Figure 3-10.** Moving to a security model through schemas


    ## Schema Separation


    The schema security model presented previously is the foundation for implementing
    a multitenant model using schema separation as a sharding mechanism. From a storage
    standpoint, a multitenant system is a collection of databases that hosts multiple
    customers in such a way that each customer is isolated from a security and management
    standpoint.


    Although you can create a multitenant system by creating a database for each customer,
    you can also create a schema container for each customer and co-locate customers
    in fewer databases. The schema security model discussed in this chapter allows
    you to securely co-locate customers in the same database and keep strong security
    boundaries by using different logins and users for each customer, where each user
    is only given access to a specific schema.


    In Figure [3-11,](#index_split_000.html#p69) I am creating a new customer container
    in an existing database, called `DB1`. Because the database stores other customers
    and my objective is to ensure strong security isolation, I first create a new
    login (`L3`) for my customer in `master` (the customer is called `C3` in this
    example).


    **Figure 3-11.** Creating a new schema container for a customer


    Then I connect to `DB1` and create the schema container (`S3`), in which the customer
    data will be stored. Once the schema container is created I can create all the
    necessary objects in `S3`, such as tables, views, and stored procedures.


    Next I create a user (`U3`) for the login account `L3`. I make sure to change
    the default schema of `U3` from `DBO` to `S3`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ SECuRiTy


    Finally I grant `U3` all the necessary access rights. At this point I have a newly
    created schema with strong security isolation from other customers in an existing
    database.


    You can learn more about this sharding model in Chapter 9.


    ## SQL Database Firewall


    SQL Database comes with its own firewall, which you can configure directly from
    the SQL Database portal, as previously covered in Chapter 1. You can also view
    and change firewall rules in T-SQL. Let’s take a quick look at the available SQL
    statements.


    **Note** you need to be connected to the `master` database to view or change firewall
    rules. At least one connection rule must be added to the firewall through the
    SQL Database portal before a connection can be made.


    To view the current firewall rules, execute this statement:


    ```sql

    SELECT * FROM sys.firewall_rules

    ```


    You can see that each rule has a name; the name is used as a unique key. The `sp_set_firewall_rule`
    command allows you to add a new rule.


    It may take a few minutes for the new rules to take effect. For example, the following
    statement adds a new rule called `NewRule`. Notice that the first parameter must
    be a Unicode string:


    ```sql

    sp_set_firewall_rule N''NewRule'', ''192.168.1.1'', ''192.168.1.10''

    ```


    To delete a rule, run the following statement:


    ```sql

    sp_delete_firewall_rule N''NewRule''

    ```


    ## Internal Firewalls


    Some organizations control network access with advanced rules for connecting to
    the Internet using internal firewalls.


    Because connecting to SQL Database from your internal network requires opening
    port “TCP 1433 out,” if your company uses an internal firewall you may need to
    request this port to be open. For security reasons your network administrator
    may request the IP Range of SQL Database so that the port is only open for specific
    destinations.


    Unfortunately, restricting the connection to an IP Range may become an issue at
    a later time because SQL Database IP Ranges may change over time. As a result
    you should open the port to ANY IP destination.


    ## Compliance


    Although cloud computing creates new challenges for organizations from a risk-management
    standpoint, Microsoft’s cloud data centers undergo multiple audits and assessments
    based on their local regulations. In order to facilitate its compliance audits
    and assessment, Microsoft created the Operational Compliance team, which designed
    a common compliance framework for its operations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ SECuRiTy


    According to Microsoft, parts of its cloud computing infrastructure are compliant
    with multiple regulations including PCI, Health Insurance Portability and Accountability
    Act (HIPAA), and Sarbanes-Oxley. It also has achieved numerous certifications,
    including


    -   ISO/IEC 27001:2005

    -   SAS 70 Type I and II


    Microsoft recently announced a Trust Services framework as a technology preview.
    Although this service is in its early stage it offers a standard mechanism for
    securing the exchange of sensitive data across organizations. For more information
    check the SQL Azure Labs website [(www.sqlazurelabs.com](http://www.sqlazurelabs.com)).


    **Note** For more information about Microsoft’s compliance initiatives, [visit
    www.globalfoundationservices.com](http://www.globalfoundationservices.com).


    ## Summary


    Security in the cloud is a complex topic and involves careful analysis of your
    requirements and design options. This chapter covered the basics of the CIA triad
    and classified security options in terms of confidentiality, integrity, and availability.


    You also reviewed how to plan for strong encryption and hashing in your Visual
    Studio applications. Finally, keep in mind that schema separation can be very
    useful and should be implemented early in your development cycles.


    By now, you should understand the many options available to you in order to secure
    you data in SQL Database and be aware of some of the limitations of the SQL Database
    platform. Keep in mind, however, that some of those limitations are likely to
    be either removed or mitigated at some point in the future as Microsoft provides
    additional updates to its SQL Database platform.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 4


    ## Data Migration and Backup Strategies


    When companies talk about their research into or experiences with the Azure technology—specifically
    the SQL side of Azure—two of their most frequent concerns (aside from security)
    are migrating local databases and data into the cloud, and backup strategies.
    Until Azure came around, databases were housed locally (and they still are): they’re
    contained within the walls of the company or in a data center. Moving to the Azure
    platform and SQL Azure means moving all or a portion of your data into the cloud
    and storing it there.'
