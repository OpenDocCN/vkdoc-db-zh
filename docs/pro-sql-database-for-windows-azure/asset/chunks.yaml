    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# Foreword\n\nMy journey\
    \ from `box software` engineer to cloud service engineer began over four years\
    \ ago when I moved into the SQL cloud team at Microsoft. I would like to say it\
    \ was my brilliant foresight that led me to make the jump, but the truth is it\
    \ was a fortuitous accident resulting from a group reorganization. I couldn’t\
    \ be more thankful for the opportunity, as working on `Windows SQL Azure` has\
    \ been the most interesting and exciting project of my career.\n\nThe journey\
    \ to build a relational database as a service was not a straightforward one. We\
    \ tried several different incarnations and had to back out from a couple of dead\
    \ ends before we landed on the service you see today.\n\nWe also went through\
    \ several iterations on the value proposition. What are we building? What is it\
    \ good for? How does it help customers? There were a lot of naysayers who said\
    \ a `SQL` relational database had no place in the cloud.\n\nSome thought cloud\
    \ was just a fad and not really any different from what people already did. We\
    \ believed differently.\n\nWe knew you could have the benefits of a relational\
    \ database system (a well understood model and programming `APIs`, and an existing\
    \ rich tooling ecosystem) and combine them with the best of a cloud service (high\
    \ availability, easy and fast provisioning, drastically reduced management, and\
    \ a pay as you go model).\n\nClearly it is resonating with customers. We are seeing\
    \ adoption from all sorts of usage scenarios. Some are well known scenarios of\
    \ simple web sites, departmental enterprise applications. Others are net new scenarios\
    \ like the one we call `data hub`, which is about sharing between islands of data,\
    \ such as a company and its outlet sites, a company and its vendors/suppliers\
    \ or between multiple companies that are collaborating. Our most common scenario\
    \ is a mixture of old and new, the `SaaS` Line of Business application. This includes\
    \ cloud-only companies as well as existing `box software` vendors who are moving\
    \ their software to the cloud. Moving to an `SaaS` is a huge advantage for these\
    \ companies. It allows them to streamline the sales cycle, focus their resources\
    \ on their core competency, and easily extend their global market reach.\n\nHowever,\
    \ running a cloud service is not the same as building `box software`. While the\
    \ business logic of the applications is pretty straightforward to get up and running,\
    \ especially if you have existing code from an on-prem application; keeping it\
    \ running well in the cloud is not easy. Security is something that goes beyond\
    \ compliant algorithms and best practices for your customer. You are on the hook\
    \ to prevent, or least identify and stop, malicious attacks on your system. You\
    \ have to make sure you isolate one tenant from another. Availability and performance\
    \ are things customers take for granted and they are your responsibility. Where\
    \ there is a problem, you get the call at that wakes you out of bed."
