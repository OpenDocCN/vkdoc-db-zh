    (


    [ID] ASC


    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF,


    IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)


    ON [PRIMARY]


    ) ON [PRIMARY]


    This syntax is invalid for several reasons. The NOT FOR REPLICATION clause on
    the IDENTITY column isn’t supported. Nor are the two ON PRIMARY clauses, the ALLOW_ROW_LOCKS
    clause, or the ALLOW_PAGE_LOCKS clause. For example, the ON PRIMARY clause specifies
    which filegroup the table and the index for the primary key are placed on.


    Since it is not possible to create filegroups in Windows Azure SQL Database due
    to no drive system access, it makes no sense to support this statement.


    However, the following syntax *is* valid:


    CREATE TABLE [dbo].[Users](


    [ID] [int] IDENTITY(1,1) NOT NULL,


    [Name] [nvarchar](50) NULL,


    [NTUserName] [nvarchar](128) NULL,


    [Domain] [nvarchar](50) NOT NULL,


    [Intro] [nvarchar](100) NULL,


    [Title] [nvarchar](50) NOT NULL,


    [State] [nvarchar](10) NOT NULL,


    [Country] [nvarchar](100) NULL,


    [PWD] [varbinary](100) NULL,


    [rowguid] [uniqueidentifier] NULL,


    PRIMARY KEY CLUSTERED


    (


    [ID] ASC


    )WITH (STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF))


    For detailed information about exactly what is supported and what isn’t, visit


    [http://msdn.microsoft.com/en-us/library/ee336267.aspx.](http://msdn.microsoft.com/en-us/library/ee336267.aspx)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    AppenDix B ■ WinDoWS Azure SQL DATABASe Quick reference


    Unsupported T-SQL Statements


    The list of unsupported T-SQL statements is long, but that isn’t as negative a
    thing as it may appear. In most cases, unsupported statements are operating-system
    or hardware-related, and they don’t apply in the Windows Azure SQL


    Database environment.'
  trans: "\n## 附录 B：Windows Azure SQL 数据库快速参考\n\n`CREATE DATABASE`\n`DISABLE TRIGGER`\n\
    `REVOKE` `数据库权限`\n`CREATE FUNCTION`\n`DROP DATABASE`\n`REVOKE` `数据库主体权限`\n`CREATE\
    \ INDEX`\n`DROP INDEX`\n`REVOKE` `类型权限`\n`CREATE LOGIN`\n`DROP TABLE`\n`USE`\n\
    `CREATE PROCEDURE`\n\n例如，当您在 Windows Azure SQL 数据库中创建或修改存储过程时，`FOR REPLICATION`\
    \ 和 `ENCRYPTION` 选项不受支持。因此，以下语句无效：\n\n```\nCREATE PROCEDURE GetUsers\nWITH ENCRYPTION\n\
    FOR REPLICATION\nAS\nSET NOCOUNT ON;\nSELECT Title, Name, Intro\nFROM Users\n\
    GO\n```\n\n然而，以下语句有效：\n\n```\nCREATE PROCEDURE GetUsers\nWITH RECOMPILE, EXECUTE\
    \ AS CALLER\nAS\nSET NOCOUNT ON;\nSELECT Title, Name, Intro\nFROM Users\nGO\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nWindows Azure SQL 数据库的\
    \ `CREATE`/`ALTER TABLE` 语法稍微复杂一些，因为有几个不受支持的选项：\n- `ON` `关键字` { `分区架构` | `文件组`}\
    \ (例如 `ON PRIMARY`)\n- `TEXTIMAGE_ON`\n- `FILESTREAM_ON`\n- `<` `列定义`>`\n    -\
    \ `FILESTREAM`\n    - `NOT FOR REPLICATION`\n    - `ROWGUIDCOL`\n    - `SPARSE`\n\
    - `<` `数据类型`>`\n    - `CONTENT`\n    - `DOCUMENT`\n    - `xml_schema_collection`\n\
    - `<` `列约束`>`\n    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n-\
    \ `<` `列集定义`>\n- `<` `表约束`>`\n    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n\
    - `<` `索引选项`>`\n    - `PAD_INDEX`\n    - `FILLFACTOR`\n    - `ON PARTITIONS`\n\
    \    - `DATA_COMPRESSION`\n    - `ALLOW_ROW_LOCKS`\n    - `ALLOW_PAGE_LOCKS`\n\
    - `<` `表选项`>`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n尽管这个列表可能给人留下功能缺失很多的印象，但请记住，列表中的大多数项目之所以存在，是因为它们与操作系统或硬件相关，在\
    \ Windows Azure SQL 数据库环境中不适用。例如，以下 `CREATE TABLE` 语句无效：\n\n```\nCREATE TABLE\
    \ [dbo].Users NOT FOR REPLICATION NOT NULL,\n    [Name] nvarchar NULL,\n    [NTUserName]\
    \ nvarchar NULL,\n    [Domain] nvarchar NOT NULL,\n    [Intro] nvarchar NULL,\n\
    \    [Title] nvarchar NOT NULL,\n    [State] nvarchar NOT NULL,\n    [Country]\
    \ nvarchar NULL,\n    [PWD] varbinary NULL,\n    [rowguid] [uniqueidentifier]\
    \ NULL,\n    PRIMARY KEY CLUSTERED\n    (\n        [ID] ASC\n    )WITH (PAD_INDEX\
    \ = OFF, STATISTICS_NORECOMPUTE = OFF,\n           IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS\
    \ = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\n) ON [PRIMARY]\n```\n\n此语法无效的原因有几个。`IDENTITY`\
    \ 列上的 `NOT FOR REPLICATION` 子句不受支持。两个 `ON PRIMARY` 子句、`ALLOW_ROW_LOCKS` 子句或 `ALLOW_PAGE_LOCKS`\
    \ 子句也不受支持。例如，`ON PRIMARY` 子句指定了表和主键索引放置在哪个文件组上。\n\n由于在 Windows Azure SQL 数据库中无法创建文件组（因为无法访问驱动器系统），因此支持此语句没有意义。\n\
    \n然而，以下语法有效：\n\n```\nCREATE TABLE [dbo].Users NOT NULL,\n    [Name] nvarchar NULL,\n\
    \    [NTUserName] nvarchar NULL,\n    [Domain] nvarchar NOT NULL,\n    [Intro]\
    \ nvarchar NULL,\n    [Title] nvarchar NOT NULL,\n    [State] nvarchar NOT NULL,\n\
    \    [Country] nvarchar NULL,\n    [PWD] varbinary NULL,\n    [rowguid] [uniqueidentifier]\
    \ NULL,\n    PRIMARY KEY CLUSTERED\n    (\n        [ID] ASC\n    )WITH (STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF)\n)\n```\n\n有关具体支持和不支持内容的详细信息，请访问\n[`msdn.microsoft.com/en-us/library/ee336267.aspx`](http://msdn.microsoft.com/en-us/library/ee336267.aspx)。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 不支持的 T-SQL 语句\n\n不受支持的\
    \ T-SQL 语句列表很长，但这并不像看起来那么负面。在大多数情况下，不受支持的语句与操作系统或硬件相关，在 Windows Azure SQL 数据库环境中不适用。\n"
- fmt: "# Appendix B: Windows Azure SQL Database Quick Reference\n\nBecause there\
    \ are so many unsupported statements, this appendix doesn’t list them all. You\
    \ can find a complete list at [http://msdn.microsoft.com/en-us/library/ee336253.aspx](http://msdn.microsoft.com/en-us/library/ee336253.aspx).\
    \ Table B-3 provides a shorter list, highlighting some unsupported statements\
    \ that you should particularly be aware of.\n\n`Table B-3. Unsupported T-SQL Statements`\n\
    \n*   `BACKUP CERTIFICATE`\n*   `DBCC CHECKTABLE`\n*   `BACKUP MASTER KEY`\n*\
    \   `DBCC DBREINDEX`\n*   `BACKUP SERVICE MASTER KEY`\n*   `DBCC DROPCLEANBUFFERS`\n\
