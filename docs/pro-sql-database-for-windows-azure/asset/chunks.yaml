    If you click the second item, assuming your database has stored procedures, you
    will see the result set for the second statement in the batch. You may also notice
    a visual cue in the drop-down list, indicating the relative number of records
    returned by each statement in the batch. Because the second statement returned
    6 rows out of a total of 21 in the batch, the second item in the list contains
    a bar filled at about 25% of the length of the item.


    **Figure A-5.** Switching the Results view


