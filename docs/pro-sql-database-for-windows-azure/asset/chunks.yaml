    \ DEFAULT`\n*   `OPENQUERY`\n*   `CREATE/DROP/ALTER FULLTEXT (CATALOG, INDEX,\
    \ STOPLIST)`\n*   `OPENXML`\n*   `CREATE/DROP/ALTER PARTITION FUNCTION`\n*   `RECONFIGURE`\n\
    *   `CREATE/DROP/ALTER QUEUE`\n*   `RESTORE`\n*   `CREATE/DROP/ALTER RESOURCE\
    \ POOL`\n*   `SELECT INTO` *Clause*\n*   `CREATE/DROP/ALTER SERVICE`\n*   `SET\
    \ ANSI_DEFAULTS`\n*   `CREATE/DROP/ALTER XML SCHEMA COLLECTION`\n*   `SET ANSI_NULLS`\n\
    *   `DBCC CHECKALLOC`\n*   `SET ANSI PADDING_OFF`\n*   `DBCC CHECKDB`\n*   `SET\
    \ OFFSETS`\n*   `DBCC CHECKIDENT`\n*   `WITH XML NAMESPACES`\n\n## Supported Data\
    \ Types\n\nIf you’ve been following Windows Azure SQL Database since its initial\
    \ release to the public, you realize that Microsoft has come a long way in supporting\
    \ much of the functionality and many of the data types found in your local, on-premises\
    \ instance of SQL Server. Table B-4 lists those data types currently supported\
    \ in Windows Azure SQL Database as of Service Update 4.\n\n`Table B-4. Windows\
    \ Azure SQL Database Supported Data Types`\n\n| `Numeric` | `Date and Time` |\
    \ `Character String` | `Unicode` | `Binary String` | `Spatial` | `Other` |\n|\
    \ :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| `bigint` | `date` | `char`\
    \ | `nchar` | `binary` | `geography` | `cursor` |\n| `bit` | `datetime2` | `varchar`\
    \ | `nvarchar` | `varbinary` | `geometry` | `hierarchyid` |\n| `decimal` | `datetime`\
    \ | `text` | `ntext` | `image` | | `sql_variant` |\n| `int` | `datetimeoffset`\
    \ | | | | | `table` |\n| `money` | `smalldatetime` | | | | | `timestamp` |\n|\
    \ `numeric` | `time` | | | | | `uniqueidentifier` |\n| `smallint` | `xml` | |\
    \ | | | |\n| `smallmoney` | | | | | | |\n| `tinyint` | | | | | | |\n| `float`\
    \ | | | | | | |\n| `real` | | | | | | |\n\nFor a complete list of supported methods\
    \ for the `geography`, `geometry`, `hierarchyid`, and `xml` data types, go to\
    \ [http://msdn.microsoft.com/en-us/library/ee336233.aspx](http://msdn.microsoft.com/en-us/library/ee336233.aspx).\n\
    \n## Index\n\n*   **A**\n    *   `bcp` utility, [92](#index_split_001.html#p97)\n\
    \    *   `bcp` import, [94](#index_split_001.html#p99)\n    *   `bcp` export output,\
    \ [93](#index_split_001.html#p98)\n    *   Advanced encryption standard (`AES`),\
    \ [49](#index_split_000.html#p54)\n    *   ASP.NET\n        *   deployment in\
    \ Windows Azure dialog box, [180](#index_split_002.html#p184)\n        *   management\
    \ interface, [180](#index_split_002.html#p184)\n        *   package fields, [179](#index_split_002.html#p183)\n\
    \        *   steps, [179](#index_split_002.html#p183)\n        *   web application,\
    \ [181](#index_split_002.html#p185)\n    *   `AUTHN` process, [59](#index_split_000.html#p64)\n\
    \    *   Automation, copy, [97](#index_split_001.html#p102)\n*   **B**\n    *\
    \   `BACPAC` import operation, [78](#index_split_000.html#p83)\n    *   `bacpac`,\
    \ [68](#index_split_000.html#p73)\n    *   Backup strategies, SQL Azure, [67](#index_split_000.html#p72),\
    \ [95](#index_split_001.html#p100)\n    *   Blue syntax, [97](#index_split_001.html#p102)\n\
    \    *   Cloud services, [98](#index_split_001.html#p103)\n*   **C**\n    *  \
    \ Data migration, [67](#index_split_000.html#p72)\n    *   Data export, [93](#index_split_001.html#p98)\n\
    \    *   Database and data to SQL Azure, [67](#index_split_000.html#p72)\n   \
    \ *   `DAC` deployment, [70](#index_split_000.html#p75)\n    *   `DAC` execution\
    \ results, [71](#index_split_000.html#p76)\n    *   `DAC` export, [72](#index_split_000.html#p77)\n\
    \    *   `DAC` import, [75](#index_split_000.html#p80)\n    *   `DAC` Fx, [68](#index_split_000.html#p73)\n\
    \    *   Data-tier application framework, [68](#index_split_000.html#p73)\n  \
    \  *   Deploy to SQL Azure, [69](#index_split_000.html#p74)"
