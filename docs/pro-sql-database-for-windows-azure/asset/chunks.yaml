    \ 这些操作不可用。此外，你无法附加或分离 SQL 数据库实例。\n- **克隆操作。** 你可以使用 `CREATE DATABASE` 语句将 SQL\
    \ 数据库实例克隆到另一个实例中。\n- **日志文件。** 你无法访问数据库日志文件，也无法创建日志备份。\n- **导出/导入数据。** 你可以使用导入和导出功能执行这些操作。\n\
    - **还原。** 你可以使用“时间点还原”功能。\n\n# 对象\nSQL Server 中的某些对象在 SQL 数据库中不可用。如果你的应用程序严重依赖这些功能，可能会在使用\
    \ SQL 数据库时遇到困难，并且你可能需要重新考虑应用程序设计以适应这些限制。以下是目前适用于 SQL 数据库的一些限制：\n\n- **CLR。** SQL\
    \ 数据库中不提供 .NET CLR。因此，你无法创建扩展存储过程或扩展函数。\n- **系统函数。** SQL 数据库支持许多系统函数，包括聚合函数和排名函数。但是，SQL\
    \ 数据库不支持 RowSet 函数，包括：\n  - `OPENQUERY`\n  - `OPENXML`\n  - `OPENROWSET`\n  -\
    \ `OPENDATASOURCE`\n- **系统存储过程。** SQL 数据库仅提供一小部分系统存储过程，分为以下几类：\n  - 目录存储过程\n \
    \ - 数据库引擎存储过程\n  - 安全存储过程\n- **系统表。** 所有系统表均不可用。\n- **系统视图。** 提供一部分系统视图；你可以从 master\
    \ 数据库访问其中一些，从用户数据库访问另一些。以下是一些可用的系统视图（完整列表请参阅 SQL 数据库的在线 MSDN 库）：\n  - `sys.sql_logins`\n\
    \  - `sys.views`\n  - `sys.databases`\n  - `sys.columns`\n  - `sys.objects`\n\
    - **堆表。** SQL 数据库不允许使用堆表。所有表都必须具有聚集索引。\n\n# 其他\n除了上述限制之外，SQL Server 提供的其他组件和选项在\
    \ SQL 数据库中不可用。在大多数情况下，这些限制不会影响你的应用程序设计，但最好记住它们：\n\n- **最大数据库数量。** 你最多只能创建一百五十个用户数据库。\n\
    - **分布式事务。** 虽然支持 SQL 事务，但不支持跨 SQL 数据库实例的分布式事务。\n- **排序规则。** SQL 数据库在列和数据库级别支持排序规则，或在执行时使用表达式。服务器级别的排序规则无法更改，并设置为\
    \ `SQL_LATIN1_GENERAL_CP1_CI_AS`。在数据库级别设置后，无法使用 `ALTER DATABASE` 命令更改排序规则。\n-\
    \ **英语。** SQL 数据库仅支持英语。\n- **数据库大小。** 你只能创建特定大小的数据库，如前所述。\n- **基于行版本控制的隔离级别。**\
    \ `READ_COMMITTED_SNAPSHOT` 和 `ALLOW_SNAPSHOT_ISOLATION` 选项在数据库级别设置，且无法更改。\n-\
    \ **数据库文件放置。** 你无法选择数据库文件的物理部署方式；也无法控制文件组。这由 Microsoft 数据中心自动处理以实现最佳性能。\n- **跟踪标志。**\
    \ 跟踪标志不可用。\n- **SQL Server 配置选项。** 所有常规 SQL Server 选项均不可用，包括 CPU 和 I/O 亲和性。\n\
    - **Service Broker。** Service Broker 不可用。\n- **全局临时表。** 全局临时表不可用。但是，你可以使用局部临时表。\n\
    - **SQL Server Agent。** SQL Server Agent 不可用。\n\n# 驱动程序和协议\n你还应该知道，访问 SQL 数据库只能使用特定的库执行。如果你的编程栈中不使用\
    \ ADO.NET，这可能相关。例如，旧版本的 Delphi 无法连接到 SQL 数据库。以下是支持的数据库的摘要：\n\n- **TDS 版本 7.3 或更高版本。**\
    \ 不支持使用低于 7.3 版本的 TDS 的任何客户端。\n- **驱动程序和库。** 允许使用以下驱动程序和库：\n  - .NET Framework\
    \ Data Provider for SQL Server（来自 .NET 3.5 SP1）\n  - SQL Server 2008 Native Client\
    \ ODBC 驱动程序或更高版本\n  - SQL Server 2008 driver for PHP 版本 1.1 或更高版本\n\n# 总结\n本章通过提供云计算的高层次介绍以及\
    \ Microsoft 如何交付其云产品，重点对 SQL 数据库进行了快速概览。你还了解了创建 Azure 账户的主要步骤以及如何开始使用 SQL 数据库。你了解了\
    \ SQL 数据库平台的一些重要限制，但请记住，Microsoft 每隔几个月就会发布其云数据库的新版本；因此，其中一些限制将随着时间的推移而解除。\n\n\
    # 第 2 章\n# 设计注意事项\n为了将 Azure 平台的云计算用于不仅仅是简单的托管，你必须探索可用于设计解决方案的广泛选项。除了理解本章介绍的设计选项外，你还需要牢固掌握云计算当前的不足之处，这可能会影响你的设计选择。\n\
    \n## 设计因素\n在审查各种设计模式之前，让我们从影响设计选择的一些机会和限制开始。请记住，尽管本书主要关注 SQL 数据库，但本章的许多概念普遍适用于\
    \ Azure 开发。\n\n## 异地存储\n如第 1 章所述，Azure 平台提供四种不同的存储模型：Blob、表、队列和 SQL 数据库。在 SQL\
    \ 数据库中存储数据类似于在 SQL Server 中存储数据。你所需要做的就是发出 T-SQL 语句，并检查 SQL 数据库特有的语法限制，然后就可以开始了！\n\
    \n使用 T-SQL 在 SQL 数据库中存储数据的能力提供了独特的机会。在许多情况下，你可以轻松扩展或移植某些类型的应用程序到 SQL 数据库中，而无需（或只需有限）修改。这种可移植性使你可以实施直接依赖\
    \ SQL 数据库存储的解决方案，或者使用本地数据库同时透明地使用 SQL 数据库来满足额外的存储需求（例如报表）。\n\n但是，请记住，你可存储在单个 SQL\
    \ 数据库实例中的数据量是有限制的。"
- fmt: '# Chapter 2: Design Considerations


    ## SQL Database Editions and Partitioning


    At the moment, SQL Database supports two editions: Web (1GB or 5GB) and Business
    (from 10GB to 150GB). So, if your application needs to store more than 150GB of
    data, or if your database can benefit from a multithreaded data access layer,
    you need to consider splitting your data across multiple databases through a form
    of partitioning called a *shard*. You’ll learn about shards later in this chapter
    and in more detail throughout this book.


    ## High Availability


    When designing applications, software developers and architects are usually concerned
    about high-availability requirements. SQL Database uses a very elaborate topology
    that maximizes workload redistribution, transparency, and recovery. Figure [2-1](#index_split_000.html#p30)
    shows a high-level implementation of SQL Database that gives a hint about how
    advanced the backend infrastructure must be.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 18](index-30_1.jpg)


    ### Figure 2-1: SQL Database Topology


    Figure [2-1](#index_split_000.html#p30) illustrates that connections are made
    through a load balancer that determines which gateway should process the connection
    request. The gateway acts as a firewall by inspecting the request, performing
    authentication and authorization services, and forwarding the packets to an actual
    SQL Database instance. Because databases can be moved dynamically to ensure fair
    resource allocation, the gateway may alter the destination endpoint. The process
    is mostly transparent.


    In addition, each SQL Database instance is replicated twice on different servers
    for redundancy. Behind the scenes, a replication topology ensures that a SQL Database
    instance exists on two other physical servers at all times.


    These two additional copies are totally transparent to consumers and can’t be
    accessed.


    **Note:** SQL Database offers 99.9% availability in any given month. For specific
    terms related to the Service Level Agreement, check the following link: [https://www.windowsazure.com/en-us/support/legal/sla/.](https://www.windowsazure.com/en-us/support/legal/sla/)


    ## Performance


    The performance of applications you write can be affected by two things: throttling
    and how you design the application. Microsoft has put `performance throttling`
    in place to prevent one client’s applications from impacting another. (It’s a
    good feature, not nearly so bad as it may sound.) Application design is something
    you control.


    ### Throttling


    SQL Database runs in a multitenant environment, which implies that your database
    instances share server resources with databases from other companies. As a result,
    the SQL Database platform has implemented a throttling algorithm that prevents
    large queries from affecting performance for other users. If your application
    issues a large query that could potentially affect other databases, your database
    connection is terminated.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    In addition, to preserve valuable resources and control availability, SQL Database
    disconnects idle sessions automatically. The session timeout is set to 30 minutes.
    When you’re designing for SQL Database, your application should account for automatic
    session recovery. This also means that performance testing in your development
    phase becomes more critical.


    Note, however, that high CPU activity is not throttled like other resources. Instead
    of losing connection to the database when high CPU activity is detected, SQL Database
    will limit your CPU bandwidth but allow the execution of your T-SQL operation.
    This means that certain statements may take longer to execute.


    Any of the following conditions will terminate your database connection:


    *   **Lock Consumption:** If your application consumes more than 1 million locks,
    you will get error code 40550. Monitoring the `sys.dm_tran_locks` management view
    provides the state of your locks.

    *   **Uncommitted Transactions:** A transaction locking internal resources for
    more than 20 seconds will be terminated with error code 40549.

    *   **Log File Size:** If the log file for a single transaction exceeds 1GB in
    size, the connection will be terminated with error code 50552.

    *   **TempDB:** If you run large transactions, or large batches of commands, or
    a large sorting operation consuming more than 5GB of space, the session will be
    terminated with error code 40551.

    *   **Memory:** If your statements consume more than 16MB of memory for over 20
    seconds, your session will be terminated with error code 40553.

    *   **Database Size:** If the database exceeds its configured maximum size, any
    attempt to update or insert data will fail with error code 40544. You can resolve
    this error by dropping indexes, purging tables, or increasing the size of the
    database using the `ALTER DATABASE` statement.

    *   **Idle Connections:** Any connection staying idle for more than 30 minutes
    will be terminated. No error is returned in this case.

    *   **Transactions:** Transactions lasting more than 24 hours will be terminated
    with error code 40549.

    *   **Denial-of-Service Attacks:** If many login attempts fail from a specific
    IP address, any attempt to connect from that IP address will fail for a period
    of time in order to protect the SQL Database service. No error code is returned.

    *   **Network Problems:** If a network problem is the source of a terminated session,
    you will not receive a specific error code from SQL Database; however, you may
    receive Socket errors.

    *   **Failover:** When SQL Database is in the midst of failing your database over
    to another node, your active sessions will be disconnected. You may receive a
    Socket exception or a generic error indicating that you should retry your operation.

    *   **High Activity:** If the server hosting your database experiences significant
    stress or exceeds its operating boundaries, such as too many busy workers, SQL
    Database might disconnect the sessions with error code 40501.


    Additional conditions, called transient errors, may cause your session to be terminated
    as well. Your code should account for these errors and retry the operation when
    they occur. Here is a partial list of common errors your code may need to account
    for:


    *   **Error 20:** The instance of SQL Server you attempt to connect to does not
    support encryption.

    *   **Error 64:** A connection was successfully established with the server, but
    then an error occurred during the login process: `provider: TCP Provider, error:
    0 - The specified network name is no longer available.`

    *   **Error 233:** The client was unable to establish a connection because of
    an error during the initialization process before login. Possible causes include
    the following: the client tried to connect to an unsupported version of SQL Server;
    the server was too busy to accept new connections; or there was a resource limitation
    (insufficient memory or maximum allowed connections) on the server: `provider:
    TCP Provider, error: 0 - An existing connection was forcibly closed by the remote
    host.`

    *   **Error 10053:** A transport-level error has occurred when receiving results
    from the server. An established connection was aborted by the software in your
    host machine.

    *   **Error 10054:** A transport-level error has occurred when sending the request
    to the server: `provider: TCP Provider, error: 0 - An existing connection was
    forcibly closed by the remote host.`

    *   **Error 10060:** A network-related or instance-specific error occurred while
    establishing a connection to SQL Server. The server was not found or was not accessible.
    Verify that the instance name is correct and that SQL Server is configured to
    allow remote connections: `provider: TCP Provider, error: 0 - A connection attempt
    failed because the connected party did not properly respond after a period of
    time, or established connection failed because connected host has failed to respond.`'
