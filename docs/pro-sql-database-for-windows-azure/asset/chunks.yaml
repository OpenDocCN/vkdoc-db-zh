    \n![Image 183](index-238_1.png)\n\n## Figure 11-13. Well-balanced execution plan\n\
    \nIf you pay attention to the `Actual Number of Rows` value, you see that this\
    \ statement fetches only `25` records from the underlying table, instead of `50`;\
    \ this reduces disk reads over time.\n\nLast but not least, if you were to look\
    \ at the `SELECT` statement from a design standpoint, you could ask whether the\
    \ `UserTypeKey` value should be unique. The table schema doesn’t carry a unique\
    \ index on that field, but should it? Can there be only one `Manager` user type?\
    \ If the answer is yes, then you know the `TestUserType` table will always return\
    \ a single record for a `Manager` user type, in which case you may be able to\
    \ remove the `JOIN` entirely and apply the `WHERE` clause on the `TestUsers` table\
    \ directly:\n\n```sql\nSELECT T.Name, T.UserType\nFROM TestUsers T\nWHERE T.AgeGroup\
    \ > 0 AND T.UserType = 1\n```\n\nNot only is this statement much simpler, but\
    \ the execution plan becomes trivial, meaning that SQL Database can serve this\
    \ request without spending much time optimizing it. This change means you’re moving\
    \ the filter from a table with few records (only `3` in `TestUserType`) to a table\
    \ with many records (`100` in `TestUsers`). And whenever you have the option to\
    \ make such a move, you should. SQL Database spends far fewer resources this way.\
    \ Of course, such a move isn’t always possible, but you need to know the importance\
    \ of having a proper database design before you begin tuning.\n\n**Note**\nPerformance\
    \ tuning can be fun. however, you may end up tuning forever if you don’t set yourself\
    \ performance objectives.\n\n## Indexed Views\n\nIndexed views are an excellent\
    \ alternative when you absolutely need to `JOIN` data, and traditional indexing\
    \ doesn’t yield the performance you’re looking for. Indexed views behave like\
    \ tables; the data covered is materialized to disk so it can be retrieved quickly.\
    \ Before jumping on indexed views, understand that they have certain limitations\
    \ and that due to their nature, you may incur a performance hit through the usual\
    \ `Insert`, `Delete`, and `Update` statements.\n\nTaking the previous statement\
    \ as an example, let’s see how to create an indexed view to support the `JOIN`\
    \ operation.\n\nFirst, create a view that contains the statement you want to tune.\
    \ Make sure you include all the columns you need in the `SELECT` clause:\n\n```sql\n\
    CREATE VIEW vTestUsersType WITH SCHEMABINDING AS\nSELECT T.Name, T.UserType, T.AgeGroup,\
    \ UT.UserTypeKey\nFROM dbo.TestUsers T INNER JOIN dbo.TestUserType UT ON\nT.UserType\
    \ = UT.UserType\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
    \ 184](index-239_1.png)\n\n## Figure 11-14. Indexed view example\n\nNext, create\
    \ a unique clustered index on the view:\n\n```sql\nCREATE UNIQUE CLUSTERED INDEX\
    \ IDX_VIEW_TestUsers\nON vTestUsersType\n(UserTypeKey, AgeGroup, Name, UserType)\n\
    ```\n\nEt voilà. When you run the statement again, you see a beautiful execution\
    \ plan like the one in Figure 11-14.\n\nBecause the view contains all the necessary\
    \ columns, and the clustered index contains all the columns of the view, you obtain\
    \ the fastest possible data-retrieval technique, next to caching.\n\n## Stored\
    \ Procedures\n\nYou’ve seen various ways to tune your statements and improve execution\
    \ plans. However, keep in mind that you also have stored procedures at your disposal.\n\
    \nStored procedures can give you an edge if you need to execute logic that requires\
