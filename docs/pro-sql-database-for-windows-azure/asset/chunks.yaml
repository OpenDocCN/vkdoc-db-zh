- fmt: "*   Keyword or statement option `textimage_on` is not supported in this version\
    \ of SQL Server.\n*   `ROW GUID COLUMN` is not supported in this version of SQL\
    \ Server.\n*   `Filegroup reference and partitioning scheme` is not supported\
    \ in this version of SQL Server.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 4 ■ Data Migration anD BaCkup StrategieS\n\nAnother item you might\
    \ run into is that SQL Azure doesn’t support `heap tables`. A heap table is one\
    \ without a clustered index. SQL Azure currently supports only clustered tables.\n\
    \nThe question then becomes, what changes need to be made in order to make the\
    \ script runnable for SQL Azure?\n\nYou need to make some changes for your script\
    \ to run under SQL Azure. Here’s what to do:\n1.  Delete all instances of `SET\
    \ ANSI_NULLS ON`.\n2.  Delete all instances of `ON [PRIMARY]`.\n3.  Delete all\
    \ instances of `TEXTIMAGE_ON [PRIMARY]`.\n4.  Delete all instances of the following:\n\
    \    *   `PAD_INDEX = OFF`\n    *   `ALLOW_ROW_LOCKS = ON`\n    *   `ALLOW_PAGE_LOCKS\
    \ = ON`\n5.  In the `Person` table, modify the `rowguid` column, removing the\
    \ `ROWGUIDCOL` keyword.\n6.  Add a clustered index to any heap tables.\n\n## Appendix\
    \ B\n\ndiscusses the need for these changes in detail. For now, here’s a quick\
    \ explanation:\n\n*   `ON [PRIMARY]` isn’t needed because, as you learned in Chapters\
    \ 1 and 2, SQL Azure hides all hardware-specific access and information. There\
    \ is no concept of `PRIMARY` or file groups, because disk space is handled by\
    \ Microsoft, so this option isn’t required.\n*   According to SQL Server Books\
    \ Online (BOL) you can remove the entire `WITH` clause that contains the table\
    \ options. However, the only table options you really need to remove are those\
    \ listed in step 4 (`PAD_INDEX`, `ALLOW_ROW_LOCKS`, and `ALLOW_PAGE_LOCKS`).\n\
    *   Even though this table didn’t use it, the `NEWSEQUENTIALID()` function isn’t\
    \ supported in SQL Azure, because there is no `CLR` support in SQL Azure, and\
    \ thus all `CLR`-based types aren’t supported. The `NEWSEQUENTIALID()` return\
    \ value is one of those types. Also, the `ENCRYPTION` option isn’t supported because\
    \ SQL Azure as a whole doesn’t yet support encryption.\n*   SQL Azure doesn’t\
    \ support `heap tables`. Thus, you need to change any heap table into a clustered\
    \ table by adding a clustered index. (Interestingly, if you execute one statement\
    \ at a time, you can, in fact, *create* a heap table. However, any inserts into\
    \ that table fail.) One of the things the SQL Azure documentation suggests, and\
    \ which is listed earlier, is to set the `Convert UDDTs to Base Types` property\
    \ to `True`. This is because user-defined types aren’t supported in SQL Azure.\n\
    \nAfter you make the changes just described to your SQL script, it should look\
    \ like the following:\n\n```sql\n/****** Object: Schema [Person] Script Date:\
    \ 4/22/2012 3:38:28 PM ******/\n\nCREATE SCHEMA [Person]\n\nGO\n\n/****** Object:\
    \ UserDefinedDataType [dbo].[Name] Script Date: 4/22/2012 3:38:28 PM ******/\n\
    \nCREATE TYPE [dbo].[Name] FROM [nvarchar](50) NULL\n\nGO\n\n/****** Object: UserDefinedDataType\
    \ [dbo].[NameStyle] Script Date: 4/22/2012 3:38:28 PM ******/\n\nCREATE TYPE [dbo].[NameStyle]\
    \ FROM [bit] NOT NULL\n\nGO\n\n/****** Object: Table [Person].[Person] Script\
    \ Date: 4/22/2012 3:38:28 PM ******/\n\nSET ANSI_NULLS ON\n\nGO\n\nSET QUOTED_IDENTIFIER\
    \ ON\n\nGO\n\nCREATE TABLE [Person].[Person](\n\n[BusinessEntityID] [int] NOT\
    \ NULL,\n\n[PersonType] [nchar](2) NOT NULL,\n\n[NameStyle] [bit] NOT NULL,\n\n\
    [Title] [nvarchar](8) NULL,\n\n[FirstName] [nvarchar](50) NOT NULL,\n\n[MiddleName]\
    \ [nvarchar](50) NULL,\n\n[LastName] [nvarchar](50) NOT NULL,\n\n[Suffix] [nvarchar](10)\
    \ NULL,\n\n[EmailPromotion] [int] NOT NULL,\n\n[AdditionalContactInfo] [xml] NULL,\n\
    \n[Demographics] [xml] NULL,\n\n[rowguid] [uniqueidentifier] NOT NULL,\n\n[ModifiedDate]\
    \ [datetime] NOT NULL,\n\nCONSTRAINT [PK_Person_BusinessEntityID] PRIMARY KEY\
    \ CLUSTERED\n\n(\n\n[BusinessEntityID] ASC\n\n)WITH (STATISTICS_NORECOMPUTE =\
    \ OFF, IGNORE_DUP_KEY = OFF)\n\n)\n\nGO\n\nALTER TABLE [Person].[Person] ADD CONSTRAINT\
    \ [DF_Person_NameStyle] DEFAULT ((0)) FOR [NameStyle]\n\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 4 ■ Data Migration anD BaCkup StrategieS"
