    ## Indexing


    Creating the right indexes can be complex; it can take a long time to fully understand
    indexing and fine-tune database queries. One of the most important things to remember
    with indexing is that its primary purpose is to help `SQL Database` find the data
    it needs quickly. Like `SSMS`, the `SQL Database Management Portal` offers hints
    when a missing index is detected. While these hints can be useful, it is still
    important to understand the logic behind indexing so that you can optimize the
    performance of your database.


    Indexes are like smaller tables that contain a subset of the primary table. The
    tradeoff is that indexes consume space and must be maintained by the `SQL Database`
    engine as the primary data changes, which can impact performance under certain
    scenarios.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Let’s quickly review a simplified syntax to create an index:


    ```

    CREATE INDEX [index_name] ON [table_name]

    (col1, col2...)

    INCLUDE (col3, col4...)

    ```


    Although creating an index is simple, it’s important to verify that it’s being
    used by `SQL Database` and that it has the desired effect. To continue the previous
    example (from Figure [11-2](#index_split_002.html#p228)), you can create an index
    on the `TestUsers` table. But first, let’s back up and review a few things about
    the table and the statement you wish to optimize.


    It’s important to realize that the columns included in the first part of the index
    are used as a key when searching for data in the index and when joining tables.
    And because it’s acceptable to have multiple columns as part of the key, their
    order is absolutely critical! At times, you pick the columns that are included
    in the `WHERE` clause first and then those that are part of the `JOIN`. You may
    find, however, that sometimes it’s best to start with the `JOIN` columns; this
    depends on your statement and the data at hand. You will need to try both approaches
    to determine which one works for you. Next come the columns in the `INCLUDE` section
    of the `CREATE INDEX` command; these columns are here for only one reason: they
    help avoid a lookup into the primary table for data that is needed by the `SELECT`
    clause.


    Performing lookups isn’t always a performance issue, but it can become an issue
    if you have a lookup operation in a large batch of records.'
