    Reading Using the Shard


    Now that you’ve reviewed how connection strings are handled in the application
    and the library, you need to know how the shard handles a SELECT operation against
    multiple databases. In its simplest form, the library executes the SELECT operation
    against the list of connections defined previously.


    The client application calls ExecuteShardQuery, which in turn loops over the list
    of SqlConnection objects (see Figure [9-4](#index_split_002.html#p194)). If you
    look at the code, you can see that a copy of each connection object is made first;
    this is to avoid any potential collisions if the client code makes a call to this
    method multiple times (a connection can only make one call at a time). Then, for
    each connection, the code calls ExecuteSingleQuery, which is the method in the
    shard library that makes the call to the database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 147](index-194_1.png)


    Chapter 9 ■ Designing for high performanCe


    ***Figure 9-4.** Reading from the shard*


    The ExecuteShardQuery method is designed to call the ExecuteSingleQuery method
    multiple times in parallel using the TPL. The TPL provides many useful methods
    to easily handle parallel processing without having to manage threads. The shard
    library uses Parallel.ForEach, which is a construct that allows the code to execute
    an anonymous method multiple times concurrently, and automatically adjusts the
    number of threads depending on your computer’s hardware configuration. So, the
    more CPUs you have, the faster the following code executes, if you have enough
    connections to loop through. Note, however, that you need to lock the data object
    (line 5), which is a DataTable, because it could be accessed by other executing
    threads. Finally, the Merge method on the DataTable object concatenates resultsets
    from the various connections. After the loop has executed, the resulting data
    object has the list of records retrieved from the shard, in no guaranteed order:


    1\. Parallel.ForEach(connections,


    2\. delegate(SqlConnection c)


    3\. {


    4\. DataTable dt = ExecuteSingleQuery(command, c, exceptions);


    5\. lock (data)


    6\. data.Merge(dt, true, MissingSchemaAction.Add);


    7\. }


    8\. );


    The following code is a simplified version of the actual sample application. (For
    clarity, some code that calculates execution time and performs exception handling
    has been removed.) Line 4 sets the command text to be executed, such as a SELECT
    statement, and line 5 executes it against the shard. Instead of calling ExecuteReader,
    the code 191


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 148](index-195_1.png)


    Chapter 9 ■ Designing for high performanCe


    calls ExecuteShardQuery to use the shard. Line 7 binds the resulting DataTable
    and displays the records returned by the shard:


    1\. SqlCommand cmd = new SqlCommand();


    2\. DataTable dataRes = new DataTable();


    3.


    4\. cmd.CommandText = this.textBox1.Text;


    5\. dataRes = cmd.ExecuteShardQuery();


    6.


    7\. dataGridView2.DataSource = dataRes;


    Figure [9-5 sho](#index_split_002.html#p195)ws the outcome of this code. The SELECT
    statement is designed to return database object names and types. Executing the
    statement against the shard performs as expected. However, notice that an extra
    column has been added to the display: __guidDB__. This is the name of the GUID
    column introduced previously. This column doesn’t help much for reading, but it
    enables updates and deletes, as you will see later.


    ***Figure 9-5.** Showing records returned by the shard*


    The GUID provided is unique for each database connection, as long as one of the
    key parameters is different in the connection string of each connection. It’s
    added by the ExecuteSingleQuery method described previously. Within this method,
    a column is added in front of all the others, which carries the GUID. In the following
