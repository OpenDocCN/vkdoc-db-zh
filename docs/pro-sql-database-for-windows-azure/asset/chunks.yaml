    # 在 Azure 数据库中执行脚本


    现在您已经进行了必要的修正，可以开始在 SQL Azure 数据库中创建对象了。


    ## 连接到 Azure 数据库并执行脚本


    您还没有可以运行脚本的 SQL Azure 数据库，那么现在就创建一个：


    1.  连接到您的 SQL Azure 实例（如果需要可参考第 1 章），确保连接到 `master` 数据库。

    2.  打开一个新的查询窗口，使用第 1 章讨论的语法创建您的 SQL Azure 数据库。将其命名为 `AWMini`，因为本章所有示例都使用此名称。

    3.  切换到生成的脚本。此查询窗口当前连接到您的本地 SQL 实例，因此您需要将其更改为您的 SQL Azure 实例和刚刚创建的数据库。在脚本中任意位置右键单击，然后从上下文菜单中选择“连接”
    -> “更改连接”。

    4.  在“连接到数据库引擎”对话框中，输入您 SQL Azure 实例的信息，并在“连接属性”选项卡上输入您刚创建的数据库名称。

    5.  单击“连接”。


    您现在拥有了脚本、一个数据库以及到该数据库的连接。单击“执行”按钮。您的脚本应该运行并在您的 SQL Azure 数据库中创建表、存储过程和数据。


    SQL Server “生成和发布脚本向导”是开始理解迁移到 SQL Azure 所需进行的更改的绝佳方式。以此为基础，让我们讨论另一个选项：`bcp` 实用程序。


    # bcp 实用程序


    `bcp` 实用程序提供在 Microsoft SQL Server 实例之间进行大容量复制的功能。此实用程序随 SQL Server 安装，不需要了解或理解
    T-SQL 语法。如果您不熟悉 `bcp` 实用程序，请不要将其功能与 SQL Server 中的导入/导出向导混淆或关联。尽管 `bcp` 文档将 `bcp`
    所做的事情称为“大容量复制”，但请注意，您不能使用单个语句将数据从源 `bcp` 到目标。您必须首先将数据 `bcp` 导出到源；然后，才能将数据 `bcp`
    导入到目标。


    `bcp` 实用程序是移动数据的绝佳方式。由于它不处理模式（即模式必须已存在），因此 `bcp` 实用程序是迁移数据的非常快速的方法。例如，您需要用本地数据库的数据刷新
    SQL 数据库，`bcp` 选项就是完成此任务的绝佳解决方案。


    **注意**：`bcp` 实用程序非常灵活且强大，您可以对其应用许多选项。本节不深入探讨所有 `bcp` 选项或深入研究该实用程序的多种用途。您可以在 SQL
    Server 联机丛书或 Microsoft MSDN 网站上找到相关信息：[http://msdn.microsoft.com/en-us/library/ms162802.aspx](http://msdn.microsoft.com/en-us/library/ms162802.aspx)。


    本节介绍如何使用 `bcp` 实用程序从本地数据库导出数据并将数据导入到您的 SQL Azure 数据库。它还讨论了为 SQL Azure 使用 `bcp`
    实用程序时应注意的一些事项。


    ## 调用 bcp


    `bcp` 实用程序没有 GUI；它是一个由命令提示符驱动的实用程序。但不要被此吓倒，特别是考虑到您使用它的目的。它非常灵活，可能看起来有点令人不知所措，但它非常简单。`bcp`
    实用程序的基本语法如下：


    ```bash

    bcp table direction filename - servername - username - password

    ```


    其中：


    - `table` 是基于 `direction` 参数的源表或目标表。

    - `direction` 是 `in` 或 `out`，具体取决于您是将数据复制到数据库还是从数据库复制出来。

    - `filename` 是您要将数据复制到或从的文件名。

    - `servername` 是您要将数据复制到或从的服务器名称。

    - `username` 是用于连接到本地或 SQL Azure 数据库的用户名。

    - `password` 是与用户名关联的密码。


    让我们开始从源数据库导出数据。


    ## 导出数据


    首先从本地 SQL 实例复制数据。打开命令提示符，键入图 4-19 所示的命令。为您自己的服务器名称和生成的 `bcp` 文件的目标目录输入值。在此示例中，我使用了
    `-T` 参数，告诉 `bcp` 实用程序使用集成安全性通过可信连接连接到我的本地实例。


    **图 4-19. 使用 `bcp` 导出数据**


    在此示例中，您对 `direction` 参数使用了 `out` 关键字。这是因为您正在将数据从 SQL Server **复制出来**。


    `-n` 参数执行大容量复制操作，使用数据的本机数据库数据类型。`-q` 参数在 `bcp` 实用程序与 SQL Server 实例之间的连接中执行 `SET
    QUOTED_IDENTIFIERS ON` 语句。


    键入命令后，按 Enter 执行 `bcp` 实用程序。在短短几毫秒内，超过 71,000 行数据被导出并复制到 `user.dat` 文件（见图 4-20）。


    **图 4-20. `bcp` 导出命令的输出**


    ## 导入数据


    下一步是将数据复制到云中——具体来说，是复制到您的 SQL Azure `AWMini` 数据库。将数据复制**到**数据库的语法与复制数据**出来**的语法非常相似。您使用
    `in` 关键字并指定 SQL Azure 数据库的服务器名称和凭据，如图 4-21 所示。


    **图 4-21. `bcp` 导入期间的 `uniqueidentifier` 数据类型错误**


    键入命令后，按 Enter 执行 `bcp` 实用程序。注意图 4-22 中，导入全部 71,320 行数据几乎没有花费任何时间。


    **图 4-22. 成功的 `bcp` 导入**


    如果您曾经收到错误，提示遇到意外的文件结尾（EOF），此错误并非 SQL Azure 特有；`bcp` 实用程序对 `uniqueidentifier` 数据类型的列存在问题。您可以在互联网上找到许多关于此问题的帖子和博客。


    解决方案是从 SQL Azure 表中删除 `rowguid` 列。很酷的是，您不需要重新导出数据。您可以简单地重新执行 `bcp` 导入命令，然后将 `rowguid`
    列添加回表中。


    如前所述，SQL Server BOL（联机丛书）充满了关于如何使用 `bcp` 实用程序的信息。本节简要介绍了如何使用此实用程序将数据从本地 SQL Server
    实例移动到 SQL Azure。`bcp` 实用程序是一种移动数据的大容量复制方法。它缺乏 SSIS 将数据从一种数据类型转换为另一种数据类型的能力，也缺乏
    SSIS 的工作流组件。但如果您感兴趣的只是将数据从一个表移动到一个类似的目标表，`bcp` 是您最好的朋友。


    # SQL Azure 迁移向导


    到目前为止，本章讨论的工具都是由 Microsoft 提供的。然而，有一个出色的第三方实用程序可用，它是专门为迁移到 SQL Azure 而构建的。该实用程序就是
    SQL Azure 迁移向导，它值得一些应得的关注。'
