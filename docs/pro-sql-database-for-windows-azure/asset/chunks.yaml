    If you’ve worked with SQL Server for any length of time, chances are you’ve worked
    with the sqlcmd utility. This utility lets you enter and execute T-SQL statements
    and other objects via a command prompt. You can also use the sqlcmd utility via
    the Query Editor in sqlcmd mode, in a Windows script file, or via a SQL Server
    Agent job.


