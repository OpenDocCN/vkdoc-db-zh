    \ others. This section discusses how to use `WCF Data Services` to connect to\
    \ and query your SQL Database instance.\n\n### Creating a Data Service\nFirst\
    \ you need to create a data service. Follow these steps:\n\n1.  Fire up Visual\
    \ Studio (to be safe, run Visual Studio as Administrator) and create a new C#"
