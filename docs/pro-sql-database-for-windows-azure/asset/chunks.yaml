    • **Mirrors.** An exact replica of a primary database (or a large portion of the
    primary database that is of interest). Databases in a mirror configuration obtain
    their data at roughly the same time using a synchronization mechanism like SQL
    Data Sync. For example, a mirror shard made of two databases, each of which has
    the Sales table, has the same number of records in each table at all times. Read
