- fmt: "# SQL Database 登录与用户管理入门\n\n## 创建新登录\n\n要创建新的登录名，必须连接到 `master` 数据库。连接后，使用\
    \ `CREATE LOGIN` 命令创建登录名。\n\n连接到 `master` 数据库（使用管理员账户或任何被授予 `loginmanager` 角色的账户），并运行以下命令：\n\
    \n```sql\nCREATE LOGIN test WITH PASSWORD = 'T3stPwd001'\n```\n\n此时，应该有一个名为 `test`\
    \ 的新登录名可用。但直到创建用户后才能实际登录。要验证登录名是否已创建，请运行以下命令：\n\n```sql\nselect * from sys.sql_logins\n\
    ```\n\n*图 1-12. 从 `master` 数据库查看 SQL 登录名*\n\n如果尝试在用户数据库中创建登录账户，会收到错误。登录名必须在 `master`\
    \ 数据库中创建。\n\n*图 1-13. 在用户数据库中创建登录名时的错误*\n\n如果密码复杂度不够，会收到类似这样的错误信息。\n\n*图 1-14.\
    \ 密码复杂度不足时的错误*\n\n`Note`：在云环境中运行时，选择强密码至关重要，即使你的数据库仅用于开发或测试。强密码和防火墙规则是抵御数据库攻击的重要安全防线。第\
    \ 3 章将深入探讨安全性。\n\n## 创建新用户\n\n现在可以为测试登录名创建用户账户。为此，使用管理员账户连接到一个用户数据库（如果此登录名需要能够连接到\
    \ `master` 数据库，也可以在那里创建用户），并运行以下命令：\n\n```sql\nCREATE USER test FROM LOGIN test\n\
    ```\n\n如果未先创建登录账户就尝试创建用户，会收到类似这样的消息。\n\n*图 1-15. 未先创建登录账户就创建用户时的错误*\n\n`Note`：不能创建与管理员登录名同名的用户。这是因为管理员登录名已映射到用户\
    \ `dbo`。你可以在图 1-8 的属性窗格中找到管理员登录名。\n\n## 分配访问权限\n\n至此，已在 `master` 数据库中创建了登录账户，在用户数据库中创建了用户账户。但此用户账户尚未被分配任何访问权限。\n\
    \n要允许 `test` 账户对所选的用户数据库拥有无限制访问权限，需要将该用户添加到 `db_owner` 角色组：\n\n```sql\nEXEC sp_addrolemember\
    \ 'db_owner', 'test'\n```\n\n现在，你已准备好使用 `test` 账户来创建表、视图、存储过程等。\n\n`Note`：在 SQL\
    \ Server 中，用户账户会自动分配到 `public` 角色。然而，在 SQL Database 中，出于增强安全性的考虑，`public` 角色不能分配给用户账户。因此，必须授予特定的访问权限才能使用用户账户。\n\
    \n## SQL Database 计费理解\n\nSQL Database 采用按需付费模式，费用包括基于每日消耗的数据库数量和大小的月度费用，以及基于实际带宽使用量的费用。使用\
    \ SQL Database，你只需为实际使用量付费；因此，一个 7GB 的数据库实例会比 8GB 的实例便宜。并且正如你所料，每 GB 空间的使用成本随着数据库规模的增大而降低。因此，一个\
    \ 100GB 的数据库实例比两个 50GB 的实例更便宜。此外，在撰写本文时，当 SQL Database 实例的消费应用程序部署为 Windows Azure\
    \ 应用程序或服务，并且与数据库属于同一地理区域时，带宽费用将被免除。\n\n要从计费角度查看当前的带宽消耗和已配置的数据库，可以运行以下命令：\n\n```sql\n\
    SELECT * FROM sys.database_usage -- databases defined\nSELECT * FROM sys.bandwidth_usage\
    \ -- bandwidth\n```\n\n第一条语句返回特定类型（Web 或 Business 版）每日可用的数据库数量。此信息用于计算月度费用。第二条语句显示每个数据库的每小时消耗明细。\n\
    \n请注意，此数据库中存储的信息可保留一段时间，但最终会被微软清除。你应该能在此表中查看最近三个月的数据。\n\n*图 1-16. 每小时带宽消耗*\n\n\
    图 1-16 显示了返回带宽消耗的语句的示例输出。该语句返回以下信息：\n*   `time`：带宽适用的小时。例如，查看 2011 年 12 月 22 日凌晨\
    \ 1 点到 2 点之间的汇总。\n*   `database_name`：提供汇总信息的数据库。\n*   `direction`：数据移动方向。`Egress`\
    \ 表示出站数据，`Ingress` 表示入站数据。\n*   `class`：如果数据是从 Windows Azure 外部的应用程序（例如 SQL Server\
    \ Management Studio 应用程序）传输的，则为 `External`。如果数据是从 Windows Azure 内部传输的，则此列包含 `Internal`。\n\
    *   `time_period`：数据传输的时间窗口。\n*   `quantity`：传输的数据量，以千字节（KB）为单位。\n\n请访问 [http://www.microsoft.com/windowsazure](http://www.microsoft.com/windowsazure)\
    \ 获取最新的定价信息。\n\n## SQL Database 的限制\n\n正如你所见，创建数据库和用户需要手动编写脚本和切换数据库连接。\n\nSQL\
    \ Server 和 SQL Database 之间的根本差异在于云计算的基本设计原则，必须仔细权衡性能、易用性和可扩展性。用户数据库可能位于不同物理服务器上的事实带来了自然的限制。此外，针对\
    \ SQL Database 设计应用程序和服务需要你对这些限制有深刻的理解。\n\n### 安全性\n\n第 3 章将深入介绍安全性，但以下列表总结了在部署\
    \ SQL Database 实例之前需要考虑的重要安全事项。从安全角度来看，你需要考虑以下约束：\n\n*   `Encryption`：尽管 SQL Database\
    \ 使用 SSL 进行数据传输，但它不支持 SQL Server 中可用的数据加密功能。不过，SQL Database 提供了对哈希函数的支持。\n*  \
    \ `SSPI authentication`：SQL Database 仅支持数据库登录。因此，不支持使用安全支持提供程序接口（SSPI）的网络登录。\n\
    *   `Connection constraints`：在某些情况下，数据库连接会因以下原因之一而关闭：\n    *   资源使用过度\n    * \
    \  长时间运行的查询"
  raw: 'With SQL Database, the process of creating logins and users is mostly identical
    to that in SQL Server, although certain limitations apply. To create a new login,
    you must be connected to the master database. When you’re connected, you create
    a login using the CREATE LOGIN command. Then, you need to create a user account
    in the user database and assign access rights to that account.


    Creating a New Login


    Connect to the master database using the administrator account (or any account
    with the loginmanager role granted), and run the following command:


    CREATE LOGIN test WITH PASSWORD = ''T3stPwd001''


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 13](index-22_1.jpg)


    ![Image 14](index-22_2.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    At this point, you should have a new login available called test. However, you
    can’t log in until a user has been created. To verify that your login has been
    created, run the following command, for which the output is shown in Figure [1-12:](#index_split_000.html#p22)


    select * from sys.sql_logins


    ***Figure 1-12.** Viewing a SQL login from the master database*


    If you attempt to create the login account in a user database, you receive the
    error shown in Figure [1-13\. T](#index_split_000.html#p22)he login must be created
    in the master database.


    ***Figure 1-13.** Error when creating a login in a user database*


    If your password isn’t complex enough, you receive an error message similar to
    the one shown in Figure [1-14.](#index_split_000.html#p23)


    Password complexity can’t be turned off.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 15](index-23_1.png)


    ![Image 16](index-23_2.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    ***Figure 1-14.** Error when your password isn’t complex enough*


    ■ **Note** Selecting a strong password is critical when you’re running in a cloud
    environment, even if your database is used for development or test purposes. Strong
    passwords and firewall rules are important security defenses against attacks to
    your database. Chapter 3 reviews security in depth.


    Creating a New User


    You can now create a user account for your test login. To do so, connect to a
    user database using the administrator account (you can also create a user in the
    master database if this login should be able to connect to it), and run the following
    command:


    CREATE USER test FROM LOGIN test


    If you attempt to create a user without first creating the login account, you
    receive a message similar to the one shown in Figure [1-15.](#index_split_000.html#p23)


    ***Figure 1-15.** Error when creating a user without creating the login account
    first* 17


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 1 ■ GettinG Started with SQL databaSe


    ■ **Note** You cannot create a user with the same name as the administrator login.
    that’s because the administrator login is already mapped to user dbo. You can
    find the administrator login in the properties pane in Figure [1-8.](#index_split_000.html#p18)


    Assigning Access Rights


    So far, you’ve created the login account in the master database and the user account
    in the user database. But this user account hasn’t been assigned any access rights.


    To allow the test account to have unlimited access to the selected user database,
    you need to assign the user to the db_owner group :


    EXEC sp_addrolemember ''db_owner'', ''test''


    At this point, you’re ready to use the test account to create tables, views, stored
    procedures, and more.


    ■ **Note** in SQL Server, user accounts are automatically assigned to the public
    role. however, in SQL database the public role can’t be assigned to user accounts
    for enhanced security. as a result, specific access rights must be granted in
    order to use a user account.


    Understanding Billing for SQL Database


    SQL Database is a pay-as-you-go model, which includes a monthly fee based on the
    cumulative number and size of your databases consumed daily, and a usage fee based
    on actual bandwidth usage. With SQL Database you pay for what you use; so a 7GB
    database instance will be cheaper than an 8GB database instance. And as you might
    expect, the cost per GB of space used goes down with larger database sizes. So
    it is cheaper to have one 100GB database instance than two 50GB database instances.
    Also, as of this writing, when the consuming application of a SQL


    Database instance is deployed as a Windows Azure application or service, and it
    belongs to the same geographic region as the database, the bandwidth fee is waived.


    To view your current bandwidth consumption and the databases you’ve provisioned
    from a billing standpoint, you can run the following commands:


    SELECT * FROM sys.database_usage -- databases defined


    SELECT * FROM sys.bandwidth_usage -- bandwidth


    The first statement returns the number of databases available per day of a specific
    type: Web or Business edition. This information is used to calculate your monthly
    fee. The second statement shows a breakdown of hourly consumption per database.


    Note that information stored in this database is available for a period of time,
    but is eventually purged by Microsoft. You should be able to view up to three
    months of data in this table.


    Figure [1-16 sho](#index_split_000.html#p25)ws a sample output of the statement
    returning bandwidth consumption. This statement returns the following information:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](index-25_1.png)


    Chapter 1 ■ GettinG Started with SQL databaSe


    ***Figure 1-16.** Hourly bandwidth consumption*


    • **time.** The hour for which the bandwidth applies. In this case, you’re looking
    at a summary between the hours of 1 AM and 2 AM on December 22, 2011.


    • **database_name.** The database for which the summary is available.


    • **direction.** The direction of data movement. Egress shows outbound data, and
    Ingress shows inbound data.


    • **class.** External if the data was transferred from an application external
    to Windows Azure (from a SQL Server Management Studio application, for example).
    If the data was transferred from Windows Azure, this column contains Internal.


    • **time_period.** The time window in which the data was transferred.


    • **quantity.** The amount of data transferred, in kilobytes (KB).


    Visit [http://www.microsoft.com/windowsazure for up-t](http://www.microsoft.com/windowsazure)o-date
    pricing information.


    Limitations in SQL Database


    As you’ve seen so far, creating databases and users requires manual scripting
    and switching database connections.


    The fundamental differences between SQL Server and SQL Database lie in the basic
    design principles of cloud computing, in which performance, ease of use, and scalability
    must be carefully balanced. The fact that user databases can be located on different
    physical servers imposes natural limitations. In addition, designing applications
    and services against SQL Database requires you to have a strong understanding
    of these limitations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 1 ■ GettinG Started with SQL databaSe


    Security


    Chapter 3 covers security in depth, but the following list summarizes important
    security considerations before you deploy your SQL Database instances. From a
    security standpoint, you need to consider the following constraints:


    • **Encryption.** Although SQL Database uses SSL for data transfers, it doesn’t
    support the data-encryption functions available in SQL Server. However, SQL Database
    provides support for hashing functions.


    • **SSPI authentication.** SQL Database only supports database logins. As a result,
    network logins using Security Support Provider Interface (SSPI) aren’t supported.


    • **Connection constraints.** In certain cases, the database connection is closed
    for one of the following reasons:


    •


    Excessive resource usage


    •


    Long-running query


