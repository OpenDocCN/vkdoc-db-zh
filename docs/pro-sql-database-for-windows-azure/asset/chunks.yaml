    # CHAPTER 6 ■ SQL REPoRTing


    It is important to note that the services that the Gateway provides are very similar
    to the way the SQL Database intelligent metadata routing tier operates; in fact,
    some of the design patterns have been replicated in the SQL Reporting architecture.


    ## Feature Comparison


    Before we get to the “hands-on” portion of the chapter it will be very beneficial
    to highlight some of the similarities and differences between SQL Server Reporting
    Services and SQL Reporting (see Table 6-1).


    **Table 6-1.** SQL Server Reporting Services and SQL Reporting Feature Comparison


    | Category | SQL Server Reporting Services | SQL Reporting |

    | :--- | :--- | :--- |

    | Tooling | Business Intelligence Development Studio (BIDS) | Business Intelligence
    Development Studio (BIDS) |

    | Data Sources | Built-in or customizable data sources | SQL Database Instance
    |

    | Report Management | Report Manager for native mode, SharePoint application pages.
    | Windows Azure Management Portal. |

    | Report Viewing | Reports can be viewed in browsers, Report Viewer via Windows
    Forms and ASP.NET. | Reports can be viewed in browsers, Report Viewer via Windows
    Forms, and ASP.NET and SharePoint. |

    | Report Rendering | Can display and render reports to different formats. | Can
    display and render reports to different formats. |

    | Subscriptions | Can create subscriptions and schedule deliveries. | |

    | Extensibility | Custom extensions for data, processing, rendering, delivery,
    and security | No extensions are supported in this release. |

    | Security Model | Windows authentication and other supported authentications
    | SQL Database username and password authentication |


    Both SQL Server Reporting Services and SQL Reporting share the ability to apply
    permissions to reports and report-related items via role assignments.


    The list in Table 6-1 is a brief feature comparison; in addition, the following
    SQL Server Reporting Services features are not currently supported in SQL Reporting:


    -   Creating subscriptions or schedule report snapshots.

    -   Creating SMDL report models.

    -   Creating reports from Report Builder version 1.0, 2.0, or 3.0. However, you
    can create reports using version 3.0 and then deploy the reports by adding them
    to BIDS.

    -   SharePoint integrated mode is not supported. Native mode is supported.


    It should be noted that Report Manager is not available, but the SQL Database
    Reporting portal provides similar features.


    It is time to get “hands-on,” so the rest of the chapter discusses how to create
    a SQL Reporting Server and deploy a report to that server. This chapter uses the
    full AdventureWorks database for Windows Azure SQL Database. This database, and
    instructions for installing it, can be found here:


    [http://msftdbprodsamples.codeplex.com/releases/view/3704](http://msftdbprodsamples.codeplex.com/releases/view/3704)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


