- fmt: '![Image 49](index-77_1.png)


    # Chapter 4 ■ Data Migration and Backup Strategies


    ## Exporting and Importing to SQL Azure via a BACPAC using SQL Server 2012


    As stated earlier, `Deploy Your Database to SQL Azure` is a no-stop option. Once
    you click `Finish`, there is no going back. Also, you have to wait until the deployment
    is complete to get access to the BACPAC. The great news is that SQL Server 2012
    didn’t stop with just deploying directly to SQL Azure, but through an additional
    menu option you can export your on-premises database directly to a BACPAC without
    deploying directly to SQL Azure. Via this menu option, you have flexibility regarding
    your BACPAC prior to deploying to SQL Azure, such as copying it to another PC
    or using the `Import` option to import the DAC package to multiple SQL Azure servers.
    This section will begin by discussing the Export option.


    ### DAC Export


    To create a DACPAC, right-click the `AWMini` database and select `Tasks ➤ Export
    Data-Tier Application` from the context menu (see Figure 4-4), which will start
    the DAC export wizard.


    **Figure 4-4.** The Export DAC menu option


    Click `Next` on the Introduction page of the wizard. In the Export Settings page
    (see Figure 4-5), you have two options; `Save to Local Disk` and `Save to Windows
    Azure`. Select the `Save to Local Disk` option and click the `Browse` button to
    select a file name and location to save the BACPAC file. Click `Next`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](index-78_1.png)


    **Figure 4-5.** DAC export settings


    On the Summary page, review the specified settings and click `Next`. The `AWMini`
    database will then be exported in a BACPAC format to the file you specified in
    the Export Settings page of the wizard. Figure 4-6 shows the steps the DAC framework
    took to construct the BACPAC. In fact, this is the first half of the process that
    the previous example took to deploy directly to SQL Azure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 51](index-79_1.png)


    **Figure 4-6.** DAC export results


    It should be noted that the first few steps are performed for every export, even
    if the database isn’t SQL Database-ready. Exporting to a BACPAC on a database
    that isn’t SQL Database-ready will fail on the step “Validating schema model for
    data package.” Typical errors you will see will be “[MS-Description] is not supported
    when used as part of a data package (DACPAC),” and “Full-text Catalog: `[CatalogName]`
    is not supported when used as part of a data package (DACPAC).” The key is to
    review the errors, correct them, and rerun the export.


    You can see that the schema was first extracted from the database including references,
    and then the all-important steps of validating that the database is SQL Database-ready
    were performed. Once the schema is exported and all the validation completed,
    the data is then exported.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](index-80_1.png)


    Once the export has completed successfully, click `Close`. At this point, you
    have a BACPAC that you can then import to one or multiple SQL Azure servers. Granted,
    you can’t import to multiple SQL Azure servers simultaneously, but unlike the
    `Deploy Database to SQL Azure` option, with the Export and Import functionality,
    you can import the BACPAC multiple times without rerunning the export step again.
    It’s now time to import that DAC package (BACPAC) to SQL Azure.


    ### DAC Import


    Connect to your SQL Azure server in SQL Server Management Studio, and in the Object
    Explorer window right-click the Databases node and select `Import Data-Tier Application`
    from the context menu (see Figure 4-7), which will start the Import Data-Tier
    Application Wizard.


    **Figure 4-7.** DAC Import menu option


    Click `Next` on the Introduction page of the wizard. In the Import Settings page
    of the wizard, shown in Figure 4-8, notice that you have two options; `Import
    from Local Disk` and `Import from Windows Azure`. We saved our DAC file to a local
    directory, so select the `Import from Local Disk` option, browse to the location
    of the DAC package (BACPAC) that you exported in the previous step, and then click
    `Next`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-81_1.png)


    **Figure 4-8.** DAC import settings


    The next step of the wizard, Database Settings, shown in Figure 4-9, should look
    familiar because you saw it earlier as the Deployment Settings page of the Deploy
    Database wizard in Figure 4-2. Here again you need to connect to your SQL Azure
    server, and then select the new SQL Azure database edition and size. Once you
    have done that, click `Next`.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 54](index-82_1.png)


    **Figure 4-9.** Specifying the new database instance options


    Again you are presented with the Summary page, and if everything looks good, click
    `Next` to execute the Import.


    In Figure 4-10 you can see the steps that were taken by the DAC Fx to deploy the
    DAC package (BACPAC) to SQL Azure, which is the last half of the process that
    the previous example took to deploy directly to SQL Azure. The DAC Fx first created
    the database and then created a deployment plan, which looks at the current DAC
    package and determines how it is going to deploy the package to the new database.
    It then creates the schema and imports the data for each table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](index-83_1.png)


    **Figure 4-10.** Successful BACPAC import operation


    Granted, while both the `Deploy Database to SQL Azure` and the `Import/Export
    DAC` options accomplish the same tasks, the `Import/Export DAC` option gives you
    more control and flexibility, such as the ability to deploy the DACPAC to multiple
    destinations without the need of re-exporting. However, `Deploy Database to SQL
    Azure` is a wonderful option if you need to quickly get your on-premises database
    to SQL Azure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## The Import/Export Service


    Up until now, the focus has been on the client side; importing and exporting from
    SQL Server to a BACPAC. The Import/Export service is designed to import and export
    directly between Windows Azure SQL Database and Windows Azure BLOB storage. This
    service has been available in production since late January 2012 and is free of
    charge. No sign-ups, no codes to enter. Just go use it. How? The Import/Export
    service is built directly into the Windows Azure Management Portal via two buttons
    on the lower Ribbon bar: `Import` and `Export`.


    ### Import


    In this section, you will upload the BACPAC file to BLOB storage and then import
    it into an entirely new SQL Database instance using the Import/Export service.
    The first step is to upload the `AWMini.bacpac` to Windows Azure BLOB storage.
    If you haven’t created a Windows Azure storage account, select the `Storage` tab
    in the left navigation pane, and then select `New ➤ Storage ➤ Quick Create` from
    the lower `New` menu. Type in the name of the Storage account into the URL field,
    select the Region and Subscription, and click `Create Storage Account`.


    With the storage account created, select the account name in the portal; then
    select the `Containers` tab. On the lower menu bar, select `Add Container` to
    create a container in which to upload the BACPAC. In the New Blob Container dialog,
    enter a name for the container (I called mine `bacpac`), and then click the check
    (`OK`) button.'
