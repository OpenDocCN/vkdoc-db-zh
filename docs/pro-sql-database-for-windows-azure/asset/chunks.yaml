    ## 方法与工具


    由于 SQL 数据库运行在托管的共享基础设施上，因此了解哪些调优方法可用、哪些不可用至关重要。表 11-1 概述了一些开发人员和数据库管理员（DBA）在调优数据库系统时传统上使用的关键方法。这里使用"*系统*"一词是合适的，因为有时你需要调优数据库服务器，而在其他情况下，你需要调优实际的数据库代码，甚至解决数据库设计问题。


    ### 表 11-1. 典型的调优方法与工具


    | 方法或工具 | 是否可用？ | 说明 |

    | :--- | :--- | :--- |

    | `SQL Profiler` | 否 | 使用服务器端跟踪的工具不受支持，例如大多数审计工具、`SQL Profiler` 和数据库引擎优化顾问。 |

    | 执行计划 | 是 | SQL Server Management Studio (`SSMS`) 可以针对 SQL 数据库显示实际执行计划。本章稍后将对此进行介绍。
    |

    | `Perfmon` | 否 | 任何通常用于性能调优的 Windows 监视工具均不可用。 |

    | `DMVs` | 部分可用 | 少数动态管理视图 (`DMVs`) 是可用的，并能提供关于正在运行的会话和先前执行的语句的深刻见解。 |

    | 库度量标准 | 是 | `ADO.NET` 提供库级别的统计信息，为开发人员提供额外的洞察，例如从使用者角度出发的总处理时间和传输的字节数。 |


    该表列出了一些你可能熟悉的调优方法和工具，并指明了哪些可用于 SQL 数据库。表中不受支持的工具（例如 `SQL Profiler` 和 `Perfmon`）通常是在
    SQL Server 等环境中由 DBA 和系统管理员使用的那些工具。


    ## 编码影响


    由于你无法访问 SQL 数据库的服务器端配置设置（如磁盘配置、内存分配、CPU 亲和性等），因此需要更加注重 SQL 语句的质量——并且，比以往任何时候都更需要注重你的网络流量。实际上，你的代码生成的网络往返次数和返回的数据包数量会对性能产生影响，因为当客户端应用程序直接连接时，到
    SQL 数据库的连接是一个远程链路（意味着它很远），并且通信是加密的。


    你的性能调优工作应包括以下方面：


    *   **连接池。** 由于建立新连接本身就需要多次网络往返，并且可能影响应用程序的性能，因此你应确保在可能的情况下通过使用服务层来正确池化连接，并使用服务帐户，这样你的连接字符串就不会改变。此外，如果你建立了过多的连接，SQL
    数据库将对你进行限制。此行为由第 3 章简要讨论的拒绝服务 (`DoS`) 功能控制。

    *   **数据包计数。** 由于返回数据所需的时间比你可能习惯的要长，因此你需要关注生成过多数据包的 SQL 代码。例如，Print 语句会产生不必要的额外网络流量，应尽可能从你的
    `T-SQL` 中移除。

    *   **索引。** 你可能从第 2 章还记得，如果 SQL 数据库检测到你的语句消耗了过多资源，它可能会限制你的连接。因此，在为性能进行调优时，适当的索引变得至关重要。

    *   **数据库设计。** 当然，某些数据库设计在性能上优于其他设计。高度规范化的设计提高了数据质量，但规范化程度较低的数据库通常会提高性能。在针对 SQL
    数据库进行开发时，理解这种权衡也很重要。

    *   **并行数据访问。** 如果你的代码访问多个数据库（例如在分片环境中），你可能需要在代码中引入多线程，或者调整当前的并行处理方法以避免不必要的锁。


    ## 调优技术


    让我们深入探讨性能调优的具体细节，同时牢记你迄今为止学到的知识。本节首先探讨数据库调优功能，然后沿技术栈向上，一直到实际进行 SQL 调用的客户端库。


    ## 动态管理视图


    SQL 数据库提供了一些方便的系统视图，称为动态管理视图 (`DMVs`)，这些视图在 SQL Server 中也可用。SQL 数据库公开了 `DMVs`
    的一个子集，但所有与查询执行相关的视图都是可用的。


    SQL 数据库支持表 11-2 中列出的 `DMVs`。


    ### 表 11-2. 用于性能调优的动态管理视图


    | DMV | 说明 |

    | :--- | :--- |

    | `sys.dm_exec_connections` | 部分支持。返回在 SQL 数据库中建立的连接列表。注意，一些有用的列（如 `client_net_address`，返回客户端计算机的
    MAC 地址）不可用。 |

    | `sys.dm_exec_query_plan` | 完全支持。返回 SQL 查询或批处理的 XML 执行计划。 |

    | `sys.dm_exec_query_stats` | 完全支持。返回缓存查询计划的聚合性能信息。 |

    | `sys.dm_exec_requests` | 完全支持。返回有关 SQL 数据库正在执行的语句的信息。 |

    | `sys.dm_exec_sessions` | 部分支持。返回当前打开的会话以及有关该会话的性能信息。但是，它不返回最后登录信息，例如 `last_successful_logon`
    列。 |

    | `sys.dm_exec_sql_text` | 完全支持。返回 SQL 批处理的文本。 |

    | `sys.dm_exec_text_query_plan` | 完全支持。以文本格式返回 SQL 查询或批处理的执行计划。 |


    **注意：** 虽然连接到主数据库时可以查询其中一些视图，但除非你连接到你的应用程序正在使用的数据库，否则它们不会返回你想要的信息。


    此外，用户必须具有 `VieW DataBaSe State` 权限才能查看数据库上所有正在执行的会话；否则，用户只能看到当前会话。


    如果你正在查找 SQL 语句的性能指标，并且可以将该语句隔离到唯一的数据库连接，或者该语句已不再执行，那么 `dm_exec_sessions` `DMV`
    适合你。这是提供性能指标（如 CPU 时间和持续时间）的系统视图之一。但是，此 `DMV` 会在通过同一连接执行的所有语句上累积性能指标。因此，为了测试数据库查询并仅检索该查询的性能指标，你需要建立两个连接：一个用于执行查询，另一个用于读取性能指标，以免干扰
    SQL 数据库已收集的性能数据。


    **注意：** 你需要使用相同的登录名建立两个连接，否则无法检索你尝试调优的 SQL 语句的性能指标。


    例如，建立一个到 SQL 数据库的连接，并运行以下 SQL 查询：

    ```sql

    SELECT TOP 50 * FROM sys.indexes

    ```

    记下你的会话 ID；可以在 Microsoft SQL Server Management Studio 的状态栏中找到它。你也可以在“查询”选项卡的括号内找到它。例如，在图
    11-1 中，会话 ID 是 144：你可以在选定的选项卡和底部的状态栏中看到它。


    ### 图 11-1. 捕获语句的性能指标

