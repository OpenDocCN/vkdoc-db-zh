    **Data**


    The **Data** tab in the portal simply lists the tables that the available Windows
    Azure Mobile Services are using.


    Figure [12-11](#index_split_002.html#p251) shows the table used in the example
    earlier in the chapter. The three columns show the table name, the number of indexes
    on the table, and the number of records in each table.


    **Figure 12-11.** Running the project


    Mobile Services tables are quite flexible, so much so that you can simply define
    a table without any columns (although when the table is created, an `id` column
    is automatically created for you). When data is initially inserted into the table
    the service creates the appropriate columns automatically. However, for this functionality
    to work, the **Enable Dynamic Schema** option must be set to **On**. This option
    can be found on the **Configure** tab (see Figure [12-11),](#index_split_002.html#p251)
    three tabs to the right of the **Data** tab.


    While on the surface the **Data** page is simple, there is much, much more that
    is available when working with tables. Clicking the table name in the portal will
    take you to a series of pages that allow you to browse the data, work with the
    columns, define security permissions on the table, and perform additional operations
    during any CRUD (Create, Read, Update, and Delete) operations. The following sections
    detail each of the four tabs.


    **Browse**


    The **Browse** tab (Figure [12-12](#index_split_002.html#p251)) simply lets you
    browse data in the selected tables. You can switch between tables by selecting
    the table in the left navigation bar. If the amount of data exceeds the size of
    the page, you can use the forward and back arrows to navigate between multiple
    data pages.


    **Figure 12-12.** The Browse tab


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 198](index-252_1.png)


    **ChAPter 12 ■ WindoWS Azure Mobile ServiCeS**


    **Columns**


    The **Columns** tab (Figure [12-13) allo](#index_split_002.html#p252)ws you to
    manage columns in the table. Columns can be added or deleted. Once a column is
    created, its data type cannot be changed. To delete a column, select any column
    other than the indexed column and click the **Delete** button at the bottom of
    the portal. Columns can be added in either of two ways—first, by dropping and
    re-creating the table (not recommended, because of the loss of data), or second,
    by sending from the application an insert request that includes the new property.
    To do this, **Dynamic Schema** must be enabled.


    **Figure 12-13.** The Columns tab'
