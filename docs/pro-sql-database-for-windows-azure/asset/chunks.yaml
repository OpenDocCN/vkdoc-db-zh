- fmt: 'The next step is to provision the on-premises member. This requires a few
    more steps but is still fairly easy. Click the icon in the yellow section of the
    Sync Group template labeled "Click to add a SQL Server database." This brings
    up the same dialog as before but with a few different options.


    Previously it was stated that in order to synchronize with an on-premises SQL
    Server database it is necessary to install a client agent on a computer in the
    local environment (see the "Data Sync Best Practices" section for more information).
    This agent is a Windows server that sits between the SQL Server database and the
    SQL Database hub, enabling bidirectional HTTPS-based communication.


    Figure 7-7 shows this dialog. This time, however, the interface is a multi-step
    wizard that walks you through the installation and registration of the client
    agent.


    **Figure 7-7.** Adding an on-premises database to the sync group


    If you are installing the client agent for the first time and registering a new
    on-premises database, the option to select on the Add Database dialog is "Add
    a new SQL Server database to the sync group." Had the client agent been installed
    and a SQL Server database been registered previously, the first option could have
    been selected. Select the option for adding a new database, set the Sync direction
    to Bi-Directional, and click Next.


    In the next step of the dialog you decide whether to install a new agent or use
    an existing agent. This step is straightforward. As stated previously, had the
    client agent already been installed, the on-premises database could be registered
    via that agent. However, in this example the agent has not been installed previously,
    so the option to select here is to install a new agent. Select that option and
    click Next.


    This next step of the Add Database to Sync Group dialog is where you begin installing
    and configuring the agent and on-premises database, which is itself a multi-step
    process. The Install a New Agent dialog lists the steps needed in order to install
    and configure the client agent (see Figure 7-8).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 111](index-157_1.png)


    Chapter 7 ■ SQL Data Sync


    **Figure 7-8.** Installing the client agent


    First, click the Download button. This will take you to a web site where you can
    download the client sync agent.


    Download the file called `SQLDataSyncAgent-Preview-ENU.msi` and run the install.
    The installation of the client agent consists of three easy steps:


    ```

    1. Agree to the license agreement.

    2. Enter the account you want to run the service under.

    3. Select the installation folder.

    ```


    As explained earlier, the account used in configuring the client agent must have
    network access to reach the Data Sync service through your network''s proxy. Enter
    the appropriate information, accept the default installation folder, and click
    Install.


    Once it is installed you will find a new Windows service listed, called `Microsoft
    SQL Data Sync`. If it installed successfully, the service status will be Running.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 112](index-158_1.png)


    Chapter 7 ■ SQL Data Sync


    There are still a few more things to do in the client agent, but first we need
    to go back to the Management Portal.


    In the Install a New Agent dialog, enter an Agent Name in Step 2. While the name
    of this agent is not as critical as the Sync Group name, giving it a meaningful
    name will still be helpful.


    Once the Agent Name has been entered, click the Generate Agent Key button. A key
    will be generated and displayed in the dialog (along with a Copy button). Click
    the Copy button to copy the key to the Clipboard.


    Don''t click Next yet. The next thing to do is launch the `SQL Data Sync Agent`,
    which can be found in the Start menu. Once it is launched, the first thing to
    do is to enter the configuration key that was just copied to the Clipboard.


    Click the Submit Agent Key button and enter the key in the Agent Key dialog. Click
    OK.


    Once the key is registered, the next step is to click the Ping Sync Service button
    to make sure that the client agent can communicate with the Data Sync Service.
    If the client agent can successfully ping the Data Sync service, a dialog will
    be displayed informing you so.


    Next, click the Register button to register an on-premises SQL Server. A SQL Server
    can be registered using Windows or SQL authentication. This example is using Windows
    Authentication. Enter the server name and database name; then click the Test Connection
    button to ensure that the client agent can connect to the selected database.


    Click OK on the connection test dialog, and then click Save on the SQL Server
    registration dialog shown in Figure 7-9.


    **Figure 7-9.** A configured Sync client


    Finally, go back to the Management Portal and click Next on the Install a New
    Agent dialog. The dialog now displays a Prerequisite check with information for
    the next steps. Click the Get Database List button in the Step 2 section. This
    will communicate with the Data Sync agent and return a list of registered databases
    that populate the Step 3 drop-down list, as shown in Figure 7-10.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 113](index-159_1.png)


    ![Image 114](index-159_2.png)


    Chapter 7 ■ SQL Data Sync


    **Figure 7-10.** Select your on-premises SQL Server database


    In Step 3, select the database from the dropdown list of databases and click Finish.
    Your Sync Group template should now look like Figure 7-11.


    **Figure 7-11.** The configured sync group


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 115](index-160_1.png)


    Chapter 7 ■ SQL Data Sync


    With the database registered, but not provisioned, the next step is to configure
    the sync group to define the data to be synchronized and the Conflict Resolution
    policy.


    ## Selecting Tables to be Synchronized


    Significant enhancements have been made to SQL Data Sync since the last edition
    of this book, including how the sync dataset is defined. In the Configuration
    section of the Sync Group window, click the Edit Dataset button, which will display
    the Define Dataset dialog. This dialog is quite powerful, in that you can select
    not only the tables to be synchronized, but also the columns of each table. Additionally,
    row filtering can be applied to the dataset to synchronize specific data. In this
    example each of these features will be illustrated.


    As you scroll through the list of tables you will notice that some are red. You
    should also notice a nice red warning at the top of the dialog stating the some
    of the tables do not meet schema requirements.


    Tables that appear in red cannot be selected for synchronization. This example
    will select two tables that are OK for synchronization; `HumanResources.Employee`
    and `Person.BusinessEntity`. As you select the `HumanResources.Employee` table,
    you''ll notice that even though the table itself is not red (OK for synchronization),
    some of the columns are red. That means that those columns cannot be selected
    and are not available for synchronization. You can see this in Figure 7-12.


    **Figure 7-12.** Selected tables and columns to be synchronized, and two columns
    that cannot be selected


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 116](index-161_1.png)


    Chapter 7 ■ SQL Data Sync


    ## Applying a Filter'
