- fmt: '# Chapter 4: Data Migration and Backup Strategies


    ## Import


    The next step is to upload the AWMini BACPAC into the storage account and container.
    Currently this option is not available in the Windows Azure Management Portal,
    but there are several tools that can help you do this. On CodePlex is a project
    called Azure Storage Explorer (`http://azurestorageexplorer.codeplex.com/`), a
    utility for viewing and managing Windows Azure storage (BLOBs, tables, and queues).
    RedGate also has a utility called Cloud Storage Studio (`http://www.cerebrata.com/Products/CloudStorageStudio/`),
    which provides a rich set of functionality for managing your Windows Azure storage.
    There are a few more out on the Internet, but these two are the most popular.


    Either of these two tools will allow you to quickly and easily upload the `AWMini.bacpac`
    to your BLOB container.


    Once the BACPAC is uploaded into BLOB storage, log into the Windows Azure Management
    Portal at [`https://manage.windowsazure.com`](https://manage.windowsazure.com)
    with the Windows Live ID that is associated with your Windows Azure subscription.
    Once logged in to the portal, select the `SQL Databases` node in the left navigation
    pane. If you have any SQL Database instances, the lower section of the portal
    will display `Import` and `Export` buttons, as shown in Figure 4-11. Otherwise,
    only an `Import` button will be visible.


    ![Image 56](index-85_1.png)


    `Figure 4-11.` The Import and Export buttons in Windows Azure Management Portal


    Click the `Import` button, which brings up the `Import Database` dialog. In this
    dialog you first need to select the black folder icon in the `Bacpac URL` field,
    which will bring up the `Browse Cloud Storage` dialog, shown in Figure 4-12. On
    the left side of this dialog, expand the storage account name and select the container
    in which the BACPAC resides. Then select `AWMini.bacpac` from the list and click
    `Open`.


    ![Image 57](index-86_1.png)


    `Figure 4-12.` The Browse Cloud Storage dialog


    Back in the `Import Database` dialog, enter a name for the new database that will
    be created during the import process. I called mine `AWMini2` so it doesn’t conflict
    with the database created in the previous example.


    Next, select the subscription where you will be creating the database and into
    which you will import the BACPAC, and then select the server on which the new
    database will be created.


    > **Note:** The storage account and Windows Azure SQL Database instance must be
    in the same geographical region; otherwise you will receive a warning stating
    that the Database and resource are not in the same region and you will not be
    able to import the BACPAC. This limitation exists to ensure that no outbound transfer
    costs will be incurred during the import/export process.


    Finally, enter the `Login` name and password to the Windows Azure SQL Database
    server. The `Import Database` dialog should now look like Figure 4-13. If you
    want to specify the new database `Edition` and `Max size`, check the `Configure
    Advanced Database Settings` box. If you leave the checkbox blank, the import process
    will create a 1 GB `Web Edition` database. Therefore, if your database is larger
    than 1 GB, you should select this option and select the appropriate database size
    for the Import process.


    ![Image 58](index-87_1.png)


    `Figure 4-13.` The completed Import Database dialog


    When ready, click the check (`OK`) button on the `Import Database` dialog to begin
    the import process. The dialog will go away, but the import process is indeed
    happening and you can verify this by watching the status of the lower menu bar.
    Once the import is successful, the new status will display in the lower menu bar,
    indicating that the import has succeeded.


    ## Export


    Exporting a Windows Azure SQL Database instance is similar to the Import process.
    In the Windows Azure Management Portal, select the `SQL Databases` node in the
    left navigation pane, and then select a database from the list of databases. The
    `Export` button, shown in Figure 4-11 earlier, will now be visible. Clicking the
    `Export` button will bring up the `Export Database` dialog, shown in Figure 4-14.


    ![Image 59](index-88_1.png)


    `Figure 4-14.` The Export Database dialog


    In the `Export Database` dialog, the `Filename` and `Subscription` fields will
    automatically be populated for you. However, you are free to provide a different
    file name, as well as select a different subscription.


    Select the Blob Storage `Account` and `container` in which to create the BACPAC.
    However, as noted earlier, if the storage account and database are in different
    regions, you will receive a warning message and will not be allowed to execute
    the Export process.


    Once you have entered the appropriate information, click the check (`OK`) button,
    which will initiate the Export process. Just as you did in the Import process,
    you can verify the Export of the database by watching the status of the lower
    menu bar. Once the export is successful, the new status will display in the lower
    menu bar, indicating that the export has succeeded. You can then use the same
    tool you used to upload the BACPAC initially into BLOB storage to verify that
    the export did indeed succeed.


    ## Generate and Publish Scripts Wizard


    The Generate and Publish Scripts Wizard is used to create T-SQL scripts for SQL
    Server databases and/or related objects within the selected database. You have
    probably used this wizard, so this section doesn’t walk through it step by step;
    instead, the section briefly highlights a few steps in the wizard and points out
    the options necessary to work effectively with SQL Azure.


    SQL Server 2012 and SQL Server 2008 R2 come with the ability to script an on-premises
    database for the SQL Azure environment.


    One of the differences between SQL Server 2012/2008 R2 and SQL Server 2008 (pertaining
    to object scripting) is a setting in the `Advanced Scripting Options` dialog of
    the wizard. There are two properties you can set for the version of SQL Server
    for which you’re scripting database objects: `Script for Server Version` and `Script
    for the Database Engine Type`. The `Script for Server Version` option lists the
    version of SQL Server that the Generate and Publish Scripts Wizard supports, which
    ranges from SQL Server 2000 to SQL Server 2012.


    The `Script for the Database Engine Type` property has two options you can choose
    from: `Stand-Alone Instance` and `SQL Azure Database`. The `SQL Azure Database`
    option only works with the SQL Server 2012 and 2008 R2 Server versions. For example,
    if you set the `Script for Server version` to SQL Server 2008 (non R2) and then
    set the `Script for the Database Engine Type` property to `SQL Azure Database`,
    the `Script for Server version` property value automatically changes to SQL Server
    2012/2008 R2.


    The Generate and Publish Scripts Wizard does a really nice job of appropriately
    scripting objects for SQL Azure.'
