- fmt: '# Chapter 12: Windows Azure Mobile Services


    ## Selecting a Database


    Next you need to select either to use an existing Windows Azure SQL Database instance
    or create a new database instance. In this example, I selected to create a new
    database. Thus, I selected the option `Create a New SQL Database` and specified
    the region in which I want the database created.


    ## Specifying Database Settings


    The second page of the `New Mobile Service` wizard asks you to name the new database.
    In this case, because I selected to create my database in the East US region,
    the dialog searched and found that I have a SQL Database server in that region
    and listed it in the `Server` drop-down for me. I simply need to fill in the login
    name and password, as shown in Figure [12-3.](#index_split_002.html#p247)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 188](index-247_1.png)


    ![Image 189](index-247_2.png)


    ***Figure 12-3.** Page 2 of the New Mobile Service wizard*


    You can optionally select the `Configure Advanced Database Settings` option (as
    shown in Figure [12-3](#index_split_002.html#p247)), which displays the Advanced
    Database Settings page where you can select the database `Edition` (Web or Business),
    database size, and collation. If you prefer to accept the default advanced settings,
    namely a 1GB Web Edition database with the `SQL_Latin1_General_CP1_CI_AS` collation
    setting, simply click `OK` (the check mark) on the Advanced Database Settings
    page.


    ## Provisioning the Mobile Service


    Once the information is filled in on the Specify Database Settings page, click
    `OK`. A new Windows Azure Mobile Service is then provisioned on Windows Azure,
    creating a new data store in Windows Azure SQL Database (thus the need to enter
    database information in the wizard), which allows you to save any type of data
    you need for your application. Next it will create a number of REST service endpoints
    that the application can call to perform tasks such as saving data, performing
    push notifications, and securely logging in.


    The Mobile Services creation process takes only a moment, and once it is complete
    the new service will be listed in the portal, as shown in Figure [12-4](#index_split_002.html#p247).
    The service is now running in Windows Azure and is ready for use. Figure [12-4](#index_split_002.html#p247)
    shows the mobile service name and the status columns, but off to the right in
    the fourth column is the URL to the service.


    Clicking this URL opens a new browser tab with a page stating that the Windows
    Azure Mobile Service is up and running.


    ***Figure 12-4.** Selecting the new Mobile Service in the portal*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 190](index-248_1.png)


    ## Getting Started with the Service


    Creating the service is just the beginning, but as was mentioned earlier, it really
    doesn’t get much more difficult. The next step is to create an application to
    communicate with this service, and luckily, we don’t need to do much for that,
    either.


    Back in the Windows Azure Management Portal, click the service Name, highlighted
    in Figure [12-4](#index_split_002.html#p247), which will take us to the familiar
    Dashboard that is common in the Preview portal. This Dashboard provides a quick-start
    experience that you also see when working with the other Windows Azure services
    such as Web sites and Database.


    Clicking the service Name link takes you to the quick-start `Get Started` page,
    shown in Figure [12-5](#index_split_002.html#p248). On this page are provided
    two easy walkthrough examples; one which shows you how to connect an existing
    application to the mobile service, and another which walks you through how to
    create a new application from scratch. As shown in Figure [12-5](#index_split_002.html#p248),
    this example will be using the `Create a New Windows Store App` option.


    ***Figure 12-5.** Create a new Windows 8 Application*


    ## Connecting an Existing Application


    If you already have an existing application, connecting to it really isn’t that
    difficult. Selecting the `Connect an Existing Windows Store App` option simply
    asks you to select your development language, and you then just copy and paste
    a few lines of code into the existing application; doing this provides access
    to the Mobile Services SDK to perform the tasks mentioned above (save data, push
    notifications, and so on).


    ## Creating a New Application


    For this exercise, select `Create a new Windows Store App`, which provides a three-step
    walkthrough of building a new application. Step 1 asks you to download Visual
    Studio and the Mobile Services SDK. If you haven’t downloaded Visual Studio yet,
    the link will take you to the appropriate page to download Visual Studio 2012
    Express. If you already have Visual Studio 2012 installed, click the second link,
    which will install the Mobile Services SDK.


    ## Creating Tables


    Once all the appropriate tools are installed, the next step is to create the necessary
    tables. Tables can be added at any time, and this chapter will cover that later
    on. Tables are used to store data that your Mobile Services application needs.
    You can create any number of tables, which will be stored in Windows Azure SQL
    Database in the database instance specified during the provisioning of the mobile
    service (in our ScottsToDoList example, this is the `MyMobileToDoList` database
    instance shown in Figure [12-3](#index_split_002.html#p247)). Even though SQL
    Database is used as the data store, the schema that these tables can have is really
    quite flexible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 191](index-249_1.png)


    ![Image 192](index-249_2.png)


    ![Image 193](index-249_3.png)


    In this tutorial the new application will create the appropriate table and schema
    for us, so simply click the `Create TodoItem Table` button. Within a matter of
    seconds the table will be created and, as shown in Figure [12-6](#index_split_002.html#p249),
    the page will let us know that the table is indeed created.


    ***Figure 12-6.** Creating the supporting table*


    ## Downloading the Sample Application


    The third step is to `Download the application`. Yes, you read it right, download
    the app. This tutorial will download an entire ready-to-go sample application
    that will work with the mobile service just created and with no code modifications.


    Select the language (as shown in Figure [12-7](#index_split_002.html#p249), in
    this example we’re choosing `C#`) and click the `Download` button, which will
    download a zip file containing a starter project.


    ***Figure 12-7.** Downloading the Visual Studio solution for C#*


    Save the zip file to your local hard drive and then unzip it. As shown in Figure
    [12-8](#index_split_002.html#p249), the zip file that was downloaded contains
    an entire Visual Studio Solution.


    ***Figure 12-8.** The downloaded and extracted C# project directory*


    Open the solution by double-clicking the solution file and open the `Solution
    Explorer` window. In Solution Explorer (Figure [12-9](#index_split_002.html#p250))
    you should notice two files: `App.xaml` and `MainPage.xaml`. Both of these pages
    contain stub code automatically provided for the developer.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 194](index-250_1.png)


    ![Image 195](index-250_2.jpg)


    ***Figure 12-9.** The sample solution*


    Open the `App.xml.cs` file and notice at about line 25 the reference to the Mobile
    Services service created earlier. This was automatically injected into the application
    prior to downloading the zip file, so that you can run the application as is without
    any code modifications.'
