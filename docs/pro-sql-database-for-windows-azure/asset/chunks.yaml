  raw: 'Database does deliver strong authorization capabilities and role-based security,
    similar to SQL Server 2012\. However, traditional database backups and activity
    auditing aren’t available as of this writing. Microsoft is building new backup
    mechanisms for SQL Database, above and beyond the BCP (Bulk Copy Program) operations
    available now. See Chapter 4 for more information about how to back up your data
    in SQL Database.


    Availability


    *Availability* ensures service uptime so your data can be accessed when it’s needed.
    Designing highly available systems can be very complex and requires advanced knowledge
    in multiple areas including disk configuration, system administration, disaster-recovery
    locations, and more. The following are some of the technologies involved in high
    availability:


    • **Redundant disks**. Allows you to recover from the loss of a disk spindle.
    Usually involves a RAID configuration.


    • **Redundant networks**. Allows you to survive the loss of multiple network components,
    such as a network card or a router.


    • **Redundant services**. Allows you to survive the interruption of services such
    as security and databases. An example is the use of Microsoft Cluster Service.


    • **Redundant hardware**. Allows you to survive the loss of machine hardware,
    such as a CPU or a memory chip.


    • **Scalability**. Delivers information at near constant speed under load.


    • **DoS prevention**. Prevents successful denial of service (DoS) attacks that
    would otherwise prevent data availability.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 35](index-52_1.png)


    CHAPTER 3 ■ SECuRiTy


    In addition to ensuring redundancy of infrastructure components, you need to understand
    the recovery objectives of your business to determine how to best implement your
    availability requirements.


    SQL Database offers a unique platform because all the areas just listed are automatically
    provided for. SQL


    Database offers a 99.9% monthly availability guarantee through its service-level
    agreement (SLA). In order to deliver this high availability, SQL Database transparently
    keeps two additional standby databases for each user database you create. If anything
    happens to one of your user databases, one of the two standby databases takes
    over within a few seconds; you may not even notice the failover process. SQL Database
    also provides automatic handling of DoS attacks.


    SQL Database accomplishes failover using the architecture shown in Figure [3-1](#index_split_000.html#p52).
    You interact with a proxy that directs your request to whichever of your databases
    is current. The standby databases aren’t accessible to you.


    ***Figure 3-1.** SQL Database’s standby database architecture*


    ■ **Note** in terms of availability, SQL Database far surpasses SQL Server out
    of the box; SQL Database is built on a scalable and highly available platform
    that doesn’t require configuration or tuning. None of the typical SQL Server configuration
    settings are available in SQL Database (such as CPu Affinity, Replication, Log
    Shipping, and so on).


    Let’s take an example of a project that needs to deploy a new application with
    high availability requirements.


    The following items would need to be planned for in a traditional SQL Server installation
    but are provided to you automatically with SQL Database:


    • **Clustered SQL Server instance**. Install and configure Microsoft Cluster Service
    and SQL


    Server instances in an active/active or active/passive configuration.


    • **RAID configuration**. Purchase new disks and hardware to install and configure
    a RAID 10


    (or RAID 0+1) disk array (for disk redundancy and performance).


    • **Disaster-recovery server**. Purchase similar hardware and configure it at
    a disaster-recovery site.


    • **Replication topology**. Create a mechanism to transfer the data from the primary
    site to the secondary site using log shipping, replication, disk-level replication,
    or another technique, depending on your needs.


    • **Database tuning**. In larger systems, tuning SQL Server for high performance
    can be very difficult and involves CPU, memory, I/O affinitization, degree of
    parallelism, and many other considerations.


    • **Testing**. Plan and execute a disaster-recovery plan once a year, to make
    sure it’s working as intended.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 36](index-53_1.jpg)


    CHAPTER 3 ■ SECuRiTy


    And of course, you must consider the costs associated with all these activities,
    the time it takes to plan and execute such a project, and the specialized resources
    needed to implement a highly available database environment.


    By now, you can see that although SQL Database offers fewer options in certain
    areas of security, it excels in others, especially its availability model, which
    is one of the CIA triad components. Deploying a highly available SQL


    Database database is quick and extremely simple.


    Securing Your Data


    Let’s dive into some specifics and code examples to show how to secure your data
    in SQL Database. You may need to secure specific columns in your database that
    contain sensitive information, such as Social Security numbers or credit card
    numbers. Certain medical applications store patient data, which can fall under
    compliance review, and as such may need to be encrypted as well. As hinted previously,
    not all security mechanisms are currently available, so this section focuses on
    what SQL Database provides and on ways to mitigate the missing features. Regarding
    data encryption, because SQL Database provides none, you’ll see how to implement
    your own security classes to simplify data encryption in your projects.


    ■ **Note** The examples that follow use a database script called Security.sql
    and a Visual Studio 2008 project called SQLAzureSecurity.sln. you can run the
    SQL script on your local SQL Server database if you don’t have a Windows Azure
    account yet.


    This chapter uses a few classes and methods to demonstrate how to use encryption,
    hashing, and other techniques. Figure [3-2 sho](#index_split_000.html#p53)ws the
    objects being used. The Encryption class performs the actual encryption and returns
    a CipherText structure; the UserProperties class uses extension methods from the
    Extensions class and a helper method in the Util class. The CDatabase class returns
    the database connection string.


    ***Figure 3-2.** Object model used in the examples*


    Encryption


    As mentioned previously, data encryption isn’t available. Why? Because SQL Database
    doesn’t support X.509


    certificates. Certificates are necessary for many encryption-related features,
    such as Transparent Data Encryption (TDE), column-level encryption, and certain
    T-SQL commands, such as FOR ENCRYPTION and SIGNBYCERT.


    However, SQL Database requires the use of SSL encryption for its communication.
    This means your sensitive data is always transmitted safely between your clients
    and your SQL Database instance. There is nothing you need to do to enable SSL
    encryption; it’s required and automatically enforced by SQL Database. If an application
    tries to connect to SQL Database and the application doesn’t support SSL, the
    connection request fails.


    But SSL doesn’t encrypt data at rest; it only encrypts data in transit. How can
    you protect your data when it’s stored in SQL Database? Because SQL Database doesn’t
    support encryption natively, you must encrypt and decrypt your data in the application
    code.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ SECuRiTy


    The Security.sql script contains the following T-SQL statement:


    1\. CREATE TABLE UserProperties


    2\. (


    3\. ID int identity(1,1) PRIMARY KEY, -- identity of the record


    4\. PropertyName nvarchar(255) NOT NULL, -- name of the property


    5\. Value varbinary(max) NOT NULL, -- encrypted value


    6\. Vector binary(16) NOT NULL, -- vector of encrypted value


    7\. LastUpdated datetime NOT NULL, -- date of last modification


    8\. Token binary(32) NOT NULL -- record hash


    9\. )'
  trans: "\n# 第三章 ■ 安全性\n\n数据库提供了强大的授权功能和基于角色的安全机制，类似于 SQL Server 2012。然而，截至本文撰写时，传统的数据库备份和活动审计功能尚不可用。微软正在为\
    \ SQL 数据库构建新的备份机制，超越了当前可用的 `BCP`（大容量复制程序）操作。有关如何在 SQL 数据库中备份数据的更多信息，请参见第四章。\n\n\
    ## 可用性\n\n*可用性* 确保服务正常运行时间，以便在需要时可以访问数据。设计高可用系统可能非常复杂，需要多个领域的高级知识，包括磁盘配置、系统管理、灾难恢复地点等。以下是高可用性涉及的一些技术：\n\
    \n-   **冗余磁盘**。允许你从磁盘主轴故障中恢复。通常涉及 `RAID` 配置。\n-   **冗余网络**。允许你在多个网络组件（如网卡或路由器）故障时幸存。\n\
    -   **冗余服务**。允许你在安全和数据库等服务中断时幸存。例如使用微软 `集群服务`。\n-   **冗余硬件**。允许你在机器硬件（如 `CPU`\
    \ 或内存芯片）故障时幸存。\n-   **可扩展性**。在负载下以近乎恒定的速度提供信息。\n-   **DoS 防护**。防止成功的拒绝服务 (`DoS`)\
    \ 攻击，否则会妨碍数据可用性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 35](img/index-52_1.png)\n\
    \n除了确保基础设施组件的冗余外，你还需要了解业务的恢复目标，以确定如何最好地实施可用性要求。\n\nSQL 数据库提供了一个独特的平台，因为所有上述领域都是自动提供的。SQL\
    \ 数据库通过其服务级别协议 (`SLA`) 提供每月 99.9% 的可用性保证。为了实现这种高可用性，SQL 数据库会为每个你创建的用户数据库透明地维护两个额外的备用数据库。如果你的任何一个用户数据库发生问题，两个备用数据库之一会在几秒钟内接管；你甚至可能注意不到故障转移过程。SQL\
    \ 数据库还提供对 `DoS` 攻击的自动处理。\n\nSQL 数据库使用图 3-1 所示的架构完成故障转移。你与一个代理交互，该代理将你的请求定向到你当前的数据库。你无法访问备用数据库。\n\
    \n**图 3-1.** SQL 数据库的备用数据库架构\n\n■ **注意** 在可用性方面，SQL 数据库开箱即用的表现远超 SQL Server；SQL\
    \ 数据库构建在一个可扩展且高可用的平台上，无需配置或调优。SQL 数据库中不提供任何典型的 SQL Server 配置设置（例如 `CPU 亲和性`、`复制`、`日志传送`\
    \ 等）。\n\n让我们以一个需要部署具有高可用性要求的新应用程序的项目为例。\n\n在传统的 SQL Server 安装中需要规划的以下项目，在 SQL\
    \ 数据库中会自动为你提供：\n\n-   **群集 SQL Server 实例**。安装和配置微软 `集群服务` 以及主动/主动或主动/被动配置中的 SQL\
    \ Server 实例。\n-   **RAID 配置**。购买新磁盘和硬件来安装和配置 `RAID 10`（或 `RAID 0+1`）磁盘阵列（用于磁盘冗余和性能）。\n\
    -   **灾难恢复服务器**。在灾难恢复站点购买类似硬件并进行配置。\n-   **复制拓扑**。根据你的需要，使用日志传送、复制、磁盘级复制或其他技术创建一种将数据从主站点传输到辅助站点的机制。\n\
    -   **数据库调优**。在大型系统中，为高性能调优 SQL Server 可能非常困难，涉及 `CPU`、内存、`I/O` 亲和性、并行度以及许多其他考虑因素。\n\
    -   **测试**。每年计划和执行一次灾难恢复计划，以确保其按预期工作。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图 36](img/index-53_1.jpg)\n\n当然，你还必须考虑所有这些活动相关的成本、规划和执行此类项目所需的时间，以及实施高可用数据库环境所需的专业资源。\n\
    \n至此，你可以看到，尽管 SQL 数据库在安全性的某些领域提供选项较少，但在其他方面表现出色，特别是其可用性模型，这是 CIA 三要素之一。部署一个高可用的\
    \ SQL 数据库数据库是快速且极其简单的。\n\n## 保护你的数据\n\n让我们深入探讨一些具体细节和代码示例，展示如何在 SQL 数据库中保护你的数据。你可能需要保护数据库中包含敏感信息（如社会安全号码或信用卡号）的特定列。某些医疗应用程序存储患者数据，可能需要接受合规性审查，因此也可能需要加密。如前所述，并非所有安全机制目前都可用，因此本节重点介绍\
    \ SQL 数据库提供的功能以及缓解缺失功能的方法。关于数据加密，由于 SQL 数据库不提供任何加密功能，你将看到如何在项目中实现自己的安全类来简化数据加密。\n\
    \n■ **注意** 以下示例使用名为 `Security.sql` 的数据库脚本和名为 `SQLAzureSecurity.sln` 的 Visual Studio\
    \ 2008 项目。如果你还没有 Windows Azure 账户，可以在本地 SQL Server 数据库上运行 SQL 脚本。\n\n本章使用几个类和方法来演示如何使用加密、哈希和其他技术。图\
    \ 3-2 显示了使用的对象。`Encryption` 类执行实际加密并返回一个 `CipherText` 结构；`UserProperties` 类使用来自\
    \ `Extensions` 类的扩展方法和 `Util` 类中的辅助方法。`CDatabase` 类返回数据库连接字符串。\n\n**图 3-2.** 示例中使用的对象模型\n\
    \n### 加密\n\n如前所述，数据加密不可用。为什么？因为 SQL 数据库不支持 X.509 证书。证书对于许多加密相关功能是必需的，例如透明数据加密\
    \ (`TDE`)、列级加密以及某些 `T-SQL` 命令，如 `FOR ENCRYPTION` 和 `SIGNBYCERT`。\n\n然而，SQL 数据库要求其通信使用\
    \ `SSL` 加密。这意味着你的敏感数据在客户端和 SQL 数据库实例之间始终是安全传输的。你无需做任何事情来启用 `SSL` 加密；这是 SQL 数据库强制要求并自动执行的。如果应用程序尝试连接到\
    \ SQL 数据库，而该应用程序不支持 `SSL`，则连接请求将失败。\n\n但 `SSL` 不加密静态数据；它只加密传输中的数据。当数据存储在 SQL 数据库中时，如何保护它？由于\
    \ SQL 数据库本身不支持加密，你必须在应用程序代码中加密和解密数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Security.sql` 脚本包含以下 `T-SQL` 语句：\n\n```sql\nCREATE TABLE UserProperties\n(\n\
    \    ID int identity(1,1) PRIMARY KEY, -- 记录的标识\n    PropertyName nvarchar(255)\
    \ NOT NULL, -- 属性名称\n    Value varbinary(max) NOT NULL, -- 加密后的值\n    Vector binary(16)\
    \ NOT NULL, -- 加密值的向量\n    LastUpdated datetime NOT NULL, -- 最后修改日期\n    Token\
    \ binary(32) NOT NULL -- 记录哈希值\n)\n```\n"
- fmt: "# 加密实现\n\n## 加密算法描述\n\n每个记录包含一个可用作搜索键的属性名（第 4 行）和一个加密值（第 5 行）。\n\n该值本身是二进制数据类型，这使其非常适合加密。为了增强安全性，使用了一个向量；该列将在后文解释。`Token`\
    \ 和 `LastUpdated` 列将在讨论哈希时涉及。\n\n以下 C# 代码展示了如何使用高级加密标准（AES）算法加密字符串值；你可以轻松地为三重数据加密标准（3DES）或其他算法添加支持。它使用共享密钥创建密文并返回一个字节数组。该字节数组随后存储在数据库的\
    \ `Value` 列中：\n\n## 加密代码实现\n\n```csharp\n/// <summary>\n/// A result structure\
    \ that stores the encrypted value\n/// and its associated vector\n/// </summary>\n\
    public struct CipherText\n{\n    public byte[] cipher;\n    public byte[] vector;\n\
    }\n\n/// <summary>\n/// The encryption class that encapsulates the complexity\
    \ behind encrypting\n/// and decrypting values\n/// </summary>\npublic class Encryption\n\
    {\n    private byte[] _SECRET_KEY_ = new byte[] { 160, 225, 229, 3,\n        148,\
    \ 219, 67, 89, 247, 133, 213, 26, 129, 160, 235, 41,\n        42, 177, 202, 251,\
    \ 38, 56, 232, 90, 54, 88, 158, 169,\n        200, 24, 19, 27 };\n\n    /// <summary>\n\
    \    /// Encrypt using AES\n    /// </summary>\n    /// <param name=\"value\"\
    >The string to encrypt</param>\n    public CipherText EncryptAES(string value)\n\
    \    {\n        // Prepare variables...\n        byte[] buffer = UTF8Encoding.UTF8.GetBytes(value);\n\
    \        CipherText ct = new CipherText();\n        System.Security.Cryptography.Aes\
    \ aes = null;\n        ICryptoTransform transform = null;\n\n        // Create\
    \ the AES object\n        aes = System.Security.Cryptography.Aes.Create();\n \
    \       aes.GenerateIV();\n        aes.Key = _SECRET_KEY_;\n\n        // Create\
    \ the encryption object\n        transform = aes.CreateEncryptor();\n\n      \
    \  // Encrypt and store the result in the structure\n        ct.cipher = transform.TransformFinalBlock(buffer,\
    \ 0, buffer.Length);\n        // Save the vector used for future use\n       \
    \ ct.vector = aes.IV;\n\n        return ct;\n    }\n}\n```\n\n`CipherText` 结构（第\
    \ 5 行）用作返回值。每个加密的字节数组都附带其初始化向量，这是一种防止对数据库进行字典攻击的安全机制。`Encryption` 类包含一个 `EncryptAES`\
    \ 方法，该方法执行字符串值的实际加密；此方法返回 `CipherText`。\n\n因为 AES 需要一个密钥，你在第 17 行以字节数组的形式创建了一个。密钥必须为\
    \ 32 字节长。你可以轻松地使用 .NET 提供的 `Aes` 类的 `GenerateKey` 方法生成自己的密钥。\n\n在第 29 行，你使用 UTF-8\
    \ 编码将字符串值转换为其字节表示。这种编码方案非常实用，因为它会根据输入值自动在 ASCII 和 Unicode 之间进行选择。\n\n你在第 31 行声明\
    \ `Aes` 对象，并在第 35 行使用 `Aes` 类的静态 `Create()` 方法实例化它。此方法在第 36 行自动创建向量，并设置前面讨论的私钥。\n\
    \n在第 40 行，你使用 `CreateEncryptor()` 方法创建一个加密对象。调用其 `TransformFinalBlock()` 方法即可完成加密，并输出一个长度可变的字节数组，你将其存储在第\
    \ 43 行的 `CipherText` 结构实例中。你同时保存了先前生成的向量，并在第 47 行返回该结构。\n\n很简单，对吧？现在你只需将 `CipherText`\
    \ 内容存储在 `UserProperties` 表中。但在执行此操作之前，让我们讨论一下哈希。\n\n> **注意** 此示例使用 AES，但 .NET\
    \ Framework 还提供了其他算法。由于你还使用了初始化向量，即使输入相同，重复运行相同的代码也会产生不同的输出。这使得加密值更难破解。提供的 Visual\
    \ Studio 解决方案包含了解密数据的其他方法。\n\n# 哈希\n\n哈希远没有你目前看到的那么复杂。虽然你可以将迄今为止加密的值存储在数据库中，但在此示例中，你对行中的所有列（ID\
    \ 值除外）进行哈希处理，以确保它们未被更改。为什么？答案回到前面讨论的 CIA 三元组的完整性问题。你需要一种方法来判断数据是否在你的代码之外被修改。加密你的秘密值使得三元组的机密性方面几乎不可能被打破，但有人仍然可以更新\
    \ `PropertyName` 列——或者更糟，更新 `Value` 列。哈希不能防止数据被修改，但你可以检测它是否在未经你授权的情况下被更改。\n\n\
    ## 哈希工具方法\n\n为了简化代码，首先创建几个扩展方法。扩展方法是一种便捷的方式，即使你没有原始源代码，也可以扩展类（或数据类型）可用的方法。以下是如何在\
    \ `string` 和 `DateTime` 数据类型上声明扩展方法：\n\n```csharp\npublic static class Extensions\n\
    {\n    public static byte[] GetBytes(this string value)\n    {\n        byte[]\
    \ buffer = UTF8Encoding.UTF8.GetBytes(value);\n        return buffer;\n    }\n\
    \n    public static byte[] GetBytes(this DateTime value)\n    {\n        return\
    \ value.ToString().GetBytes();\n    }\n}\n```\n\n此代码向 `string` 和 `DateTime` 数据类型添加了一个\
    \ `GetBytes()` 方法。你还需要创建一个实用工具类，允许你基于字节数组集合创建哈希值。以下代码展示了该类：\n\n```csharp\npublic\
