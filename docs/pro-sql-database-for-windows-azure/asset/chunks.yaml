  trans: '# 第 4 章：数据迁移与备份策略


    ## 导入


    下一步是将 AWMini BACPAC 文件上传到存储账户和容器中。目前此选项在**Windows Azure 管理门户**中不可用，但有几种工具可以帮助你完成此操作。在
    CodePlex 上有一个名为**Azure 存储浏览器**（`http://azurestorageexplorer.codeplex.com/`）的项目，这是一个用于查看和管理
    Windows Azure 存储（包括 Blob、表和队列）的实用程序。RedGate 也有一款名为**Cloud Storage Studio**（`http://www.cerebrata.com/Products/CloudStorageStudio/`）的工具，它提供了丰富的功能来管理你的
    Windows Azure 存储。互联网上还有其他一些工具，但这两款是最受欢迎的。


    这两款工具中的任意一款都能让你快速轻松地将`AWMini.bacpac`文件上传到你的 Blob 容器中。


    将 BACPAC 文件上传到 Blob 存储后，请使用与你的 Windows Azure 订阅关联的 Windows Live ID 登录到 Windows
    Azure 管理门户（`https://manage.windowsazure.com`）。登录门户后，在左侧导航窗格中选择`SQL 数据库`节点。如果你有任何
    SQL 数据库实例，门户的下部区域将显示`导入`和`导出`按钮，如图 4-11 所示。否则，只会显示一个`导入`按钮。


    ![Image 56](img/index-85_1.png)


    `图 4-11.` Windows Azure 管理门户中的导入和导出按钮


    单击`导入`按钮，这将打开`导入数据库`对话框。在此对话框中，你首先需要在`Bacpac URL`字段中选择黑色的文件夹图标，这将打开`浏览云存储`对话框，如图
    4-12 所示。在此对话框的左侧，展开存储账户名称并选择 BACPAC 文件所在的容器。然后从列表中选择`AWMini.bacpac`并点击`打开`。


    ![Image 57](img/index-86_1.png)


    `图 4-12.` 浏览云存储对话框


    返回到`导入数据库`对话框，为导入过程中将创建的新数据库输入一个名称。我将其命名为`AWMini2`，以便与上一个示例中创建的数据库区分开。


    接下来，选择你将在其中创建数据库并导入 BACPAC 的订阅，然后选择将在其上创建新数据库的服务器。


    > **注意：** 存储账户和 Windows Azure SQL 数据库实例必须位于同一地理区域；否则，你将收到一条警告，指出数据库和资源不在同一区域，你将无法导入
    BACPAC。此限制是为了确保在导入/导出过程中不会产生任何出站传输费用。


    最后，输入访问 Windows Azure SQL 数据库服务器的`登录`名和密码。此时`导入数据库`对话框应如图 4-13 所示。如果你想指定新数据库的`版本`和`最大大小`，请勾选`配置高级数据库设置`复选框。如果留空此复选框，导入过程将创建一个
    1 GB 的`Web 版`数据库。因此，如果你的数据库大于 1 GB，应选择此选项并为导入过程选择合适的数据库大小。


    ![Image 58](img/index-87_1.png)


    `图 4-13.` 已填写完毕的导入数据库对话框


    准备就绪后，单击`导入数据库`对话框上的勾选（`确定`）按钮以开始导入过程。对话框会消失，但导入过程确实在进行中，你可以通过观察下方菜单栏的状态来验证。导入成功后，新的状态将显示在下方菜单栏中，表明导入已成功。


    ## 导出


    导出 Windows Azure SQL 数据库实例的过程与导入过程类似。在 Windows Azure 管理门户中，在左侧导航窗格中选择`SQL 数据库`节点，然后从数据库列表中选择一个数据库。之前图
    4-11 中所示的`导出`按钮现在将可见。单击`导出`按钮将打开`导出数据库`对话框，如图 4-14 所示。


    ![Image 59](img/index-88_1.png)


    `图 4-14.` 导出数据库对话框


    在`导出数据库`对话框中，`文件名`和`订阅`字段将自动为你填充。但是，你可以自由提供不同的文件名，也可以选择不同的订阅。


    选择用于创建 BACPAC 文件的 Blob 存储`账户`和`容器`。但如前所述，如果存储账户和数据库位于不同区域，你将收到警告消息，并且不允许执行导出过程。


    输入适当的信息后，单击勾选（`确定`）按钮，这将启动导出过程。与导入过程一样，你可以通过观察下方菜单栏的状态来验证数据库的导出。导出成功后，新的状态将显示在下方菜单栏中，表明导出已成功。然后，你可以使用最初将
    BACPAC 文件上传到 Blob 存储时使用的相同工具来验证导出是否确实成功。


    ## 生成和发布脚本向导


    **生成和发布脚本向导**用于为 SQL Server 数据库和/或所选数据库内的相关对象创建 T-SQL 脚本。你可能已经使用过此向导，因此本节不会逐步讲解；相反，本节简要重点介绍向导中的几个步骤，并指出与
    SQL Azure 高效协作所需的选项。


    SQL Server 2012 和 SQL Server 2008 R2 具备为 SQL Azure 环境编写本地数据库脚本的能力。


    SQL Server 2012/2008 R2 与 SQL Server 2008（在对象脚本编写方面）的区别之一是向导的`高级脚本编写选项`对话框中的一个设置。你可以为脚本编写数据库对象的目标
    SQL Server 版本设置两个属性：`脚本编写为的服务器版本`和`脚本编写为的数据库引擎类型`。`脚本编写为的服务器版本`选项列出了生成和发布脚本向导支持的
    SQL Server 版本，范围从 SQL Server 2000 到 SQL Server 2012。


    `脚本编写为的数据库引擎类型`属性有两个选项可供选择：`独立实例`和`SQL Azure 数据库`。`SQL Azure 数据库`选项仅适用于 SQL Server
    2012 和 2008 R2 服务器版本。例如，如果你将`脚本编写为的服务器版本`设置为 SQL Server 2008（非 R2），然后将`脚本编写为的数据库引擎类型`属性设置为`SQL
    Azure 数据库`，则`脚本编写为的服务器版本`属性值会自动更改为 SQL Server 2012/2008 R2。


    生成和发布脚本向导在为 SQL Azure 适当地编写对象脚本方面做得非常出色。'
- fmt: "# Generate and Publish Scripts Wizard\n\nThe wizard checks for unsupported\
    \ syntax and data types, and it checks for primary keys on each table. Thus, the\
    \ following example will set `SQL for Server Version` to `SQL Server 2008` (non\
    \ R2) for several reasons. First, many people aren’t using `SQL Server 2012/2008\
    \ R2` and therefore don’t have the option to script for `SQL Azure`. Second, this\
    \ exercise shows you what steps are needed to get a script ready to run in `SQL\
    \ Azure`.\n\nThe database that will be used in this section is the trusty `AdventureWorks`\
    \ database you can get from CodePlex:\n\n[http://msftdbprodsamples.codeplex.com/releases/view/55330](http://msftdbprodsamples.codeplex.com/releases/view/55330)\n\
    \nThis database download is an `.mdf` specifically for `SQL Server 2012`. We will\
    \ be using `SQL Server Management Studio` for `SQL Server 2012` to do our work,\
    \ so fire it up and attach the download database.\n\n## Starting the Wizard\n\n\
    To start the `Generate and Publish Scripts Wizard` in `SQL Server Management Studio`\
    \ (`SSMS`), open `Object Explorer` and expand the `Databases` node. Select the\
    \ `AdventureWorks2012` database, right-click it, and then select `Generate Scripts`\
    \ from the context menu.\n\nOn the wizard’s Introduction page for `SQL Server\
    \ 2012`, you’re informed that you must follow four steps to complete this wizard:\n\
    \n1.  Select database objects.\n2.  Specify scripting or publishing objects.\n\
    3.  Review selections.\n4.  Generate scripts.\n\nThe following sections work through\
    \ these steps.\n\n## Choosing Target Objects\n\nTo select your target database\
    \ objects, follow these steps:\n\n1.  On the Introduction page of the `Generate\
    \ and Publish Scripts Wizard`, click `Next`.\n2.  On the `Choose Objects` page\
    \ (see `Figure 4-15`), select the `Select Specific Database Objects` option, because\
    \ for the purposes of this example, you simply want to select a few objects to\
    \ migrate.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 60](index-90_1.png)\n\
    \n***Figure 4-15.** Choosing objects to migrate into script form*\n\n3.  In the\
    \ list of objects in `Figure 4-15`, expand the `Tables` and `XML Schemas Collection`\
    \ nodes, and select the following objects:\n    *   **Tables:** `Person.Person`\n\
    \    *   **User-Defined Data Types:** `Name`, `NameStyle`\n    *   **XML Schema\
    \ Collections:** `IndividualSurveySchemaCollection`\n    *   **Schemas:** `Person`\n\
    4.  Click `Next` on the `Choose Objects` page.\n5.  On the `Set Scripting Objects`\
    \ page, select the `Save to New Query Window` option shown in `Figure 4-16`, and\
    \ then click the `Advanced` button.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 61](index-91_1.png)\n\n***Figure 4-16.** Scripting options*\n\n## Setting\
    \ Advanced Options\n\nClicking the `Advanced` button brings up the `Advanced Scripting\
    \ Options` dialog shown in `Figure 4-17`. Follow these steps to set the advanced\
    \ options for this example’s script:\n\n1.  In the `Advanced Scripting Options`\
    \ dialog, set the following options:\n    *   `Convert UDDTs to Base Types`: `True`\n\
    \    *   `Script Extended Properties`: `False`\n    *   `Script Logins`: `False`\n\
    \    *   `Script USE DATABASE`: `False`\n    *   `Types of data to script`: `Schema`\n\
    \    *   `Script for Server Version`: `SQL Server 2012`\n    *   `Script for the\
    \ database engine type`: `Stand-Alone Instance`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 62](index-92_1.png)\n\n***Figure 4-17.** The Advanced Scripting Options\
    \ dialog*\n\nYou can also set the `Script DROP and CREATE` option to `Script DROP\
    \ and CREATE`, as shown in `Figure 4-17`, but that option isn’t required for `SQL\
    \ Azure`.\n\n2.  Click `OK` in the `Advanced Scripting Options` dialog, and then\
    \ click `Next` in the `Generate Scripts` wizard.\n3.  On the wizard’s `Summary`\
    \ page, review your selections, and then click `Next`. The `T-SQL` script is generated,\
    \ and you’re taken to the `Save or Publish Scripts` page."
