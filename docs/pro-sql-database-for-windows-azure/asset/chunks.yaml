- fmt: '## Methods and Tools


    Because a SQL Database runs on a hosted and shared infrastructure, it’s important
    to understand which tuning methods are available and which aren’t. Table 11-1
    outlines some of the key methods traditionally used by developers and DBAs in
    tuning a database system. The term *system* is appropriate here because at times
    you need to tune the database server, and in other instances you need to tune
    the actual database code or even address database design issues.


    ### Table 11-1. Typical tuning methods and tools


    | Method or Tool | Available? | Comments |

    | :--- | :--- | :--- |

    | `SQL Profiler` | No | Tools using server-side traces, such as most auditing
    tools, `SQL Profiler`, and the Database Engine Tuning Advisor, aren’t supported.
    |

    | Execution plan | Yes | SQL Server Management Studio (`SSMS`) can display actual
    execution plans against a SQL Database. You’ll review this later in the chapter.
    |

    | `Perfmon` | No | Any Windows monitoring tool that is typically used for performance
    tuning is unavailable. |

    | `DMVs` | Limited | A few dynamic management views (`DMVs`) are available and
    provide insightful information about running sessions and statements previously
    executed. |

    | Library metrics | Yes | `ADO.NET` provides library-level statistics that offer
    additional insight to developers, such as the total processing time from the consumer
    standpoint and bytes transferred. |


    The table lists some tuning methods and tools that you may be familiar with. It
    also indicates which are available for use with SQL Database. The unsupported
    tools listed in the table (such as `SQL Profiler` and `Perfmon`) are typically
    those that are—say, in a SQL Server environment—used by DBAs and system administrators.


    ## Coding Implications


    Because you have no access to the server-side configuration settings of SQL Database,
    such as disk configuration, memory allocation, CPU affinity, and so forth, you
    need to place more emphasis on the quality of your SQL statements—and, now more
    than ever, your network traffic. Indeed, the number of network roundtrips your
    code generates and the number of packets returned have an impact on performance
    because the connection to SQL Database is a far link (meaning that it’s far away)
    when connecting directly with client applications, and the communication is encrypted.


    Your performance-tuning exercise should include the following areas:


    *   **Connection pooling.** Because establishing a new connection requires multiple
    network roundtrips by itself and can affect your application’s performance, you
    should ensure that your connections are pooled properly by using a service layer
    when possible and a service account so that your connection string doesn’t change.
    In addition, SQL Database will throttle you if you establish too many connections.
    This behavior is controlled by the denial of service (`DoS`) feature briefly discussed
    in Chapter 3.

    *   **Packet count.** Because the time spent to return data is greater than you
    may be used to, you need to pay attention to SQL code that generates too many
    packets. For example, Print statements generate more network traffic than necessary
    and should be removed from your `T-SQL` if at all possible.

    *   **Indexing.** You may remember from Chapter 2 that SQL Database may throttle
    your connection if it detects that your statement is consuming too many resources.
    As a result, proper indexing becomes critical when tuning for performance.

    *   **Database design.** Of course, certain database designs are better than others
    for performance. A heavily normalized design improves data quality, but a loosely
    normalized database typically improves performance. Understanding this tradeoff
    is also important when you’re developing against SQL Database.

    *   **Parallel Data Access.** If your code accesses multiple databases, in a shard
    environment, for example, you may need to introduce multithreading to your code
    or tune your current parallelism approach to avoid unnecessary locks.


    ## Tuning Techniques


    Let’s dive into the specifics of performance tuning, keeping in mind what you’ve
    learned so far. This section starts by looking at database tuning capabilities
    and then moves up the stack, all the way to the client library making the actual
    SQL call.


    ## Dynamic Management Views


    SQL Database provides a few handy system views called dynamic management views
    (`DMVs`) that are also available in SQL Server. SQL Database exposes a subset
    of the `DMVs`, but all those related to query execution are available.


    SQL Database supports the `DMVs` listed in Table 11-2.


    ### Table 11-2. Dynamic management views used for performance tuning


    | DMV | Comments |

    | :--- | :--- |

    | `sys.dm_exec_connections` | Partially supported. Returns the list of connections
    established in SQL Database. Note that some of the interesting columns, such as
    `client_net_address` (returning the client machine’s MAC address), aren’t available.
    |

    | `sys.dm_exec_query_plan` | Fully supported. Returns the XML execution plan of
    a SQL query or a batch. |

    | `sys.dm_exec_query_stats` | Fully supported. Returns aggregate performance information
    for cached query plans. |

    | `sys.dm_exec_requests` | Fully supported. Returns information about the statements
    being executed by SQL Database. |

    | `sys.dm_exec_sessions` | Partially supported. Returns the current session opened
    along with performance information about that session. However, it doesn’t return
    last-login information, such as the `last_successful_logon` column. |

    | `sys.dm_exec_sql_text` | Fully supported. Returns the text of a SQL batch. |

    | `sys.dm_exec_text_query_plan` | Fully supported. Returns the execution plan
    in text format for a SQL query or batch. |


    **Note:** although queries against some of these views can run when you’re connected
    to the master database, they don’t return the information you’re looking for unless
    you connect to the database that your application is running against.


    also, a user must have `VieW DataBaSe State` permission to see all executing sessions
    on the database; otherwise, the user sees only the current session.


    If you’re looking for performance metrics for a SQL statement and you can isolate
    the statement to a unique database connection, or the statement is no longer executing,
    the `dm_exec_sessions` `DMV` is for you. This is one of the system views that
    provides performance metrics such as CPU time and duration. However, this `DMV`
    accumulates the performance metrics over all the statements executed through the
    same connection. So, in order to test a database query and retrieve performance
    metrics of that query alone, you need to establish two connections: one to execute
    the query, and another to read the performance metrics so as not to interfere
    with the performance data that SQL Database has collected.


    **Note:** You need to establish two connections using the same login name, or
    you can’t retrieve the performance metrics of the SQL statement you’re trying
    to tune.


    For example, establish a connection to SQL Database, and run the following SQL
    query:

    ```sql

    SELECT TOP 50 * FROM sys.indexes

    ```

    Note your session ID; it’s found on the status bar in Microsoft SQL Server Management
    Studio. You can also find it on the Query tab, in parentheses. For example, in
    Figure 11-1, the session ID is 144: you can see it both on the selected tab and
    in the status bar at the bottom.


    ### Figure 11-1. Capturing a statement’s performance metrics'
