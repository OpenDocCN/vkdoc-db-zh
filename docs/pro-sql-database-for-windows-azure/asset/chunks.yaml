    \ 72](img/index-115_1.png)\n\n# 第 5 章 ■ 使用 SQL 数据库编程\n\n> **注意：** SQL 数据库不支持用于更改用户密码的`-z`或`-Z`选项。你需要先连接到`master`数据库，然后使用`ALTER\
