- fmt: "## 附录 B：Windows Azure SQL 数据库快速参考\n\n`CREATE DATABASE`\n`DISABLE TRIGGER`\n\
    `REVOKE` `Database Permissions`\n`CREATE FUNCTION`\n`DROP DATABASE`\n`REVOKE`\
    \ `Database Principal Permission`\n`CREATE INDEX`\n`DROP INDEX`\n`REVOKE` `Type\
    \ Permissions`\n`CREATE LOGIN`\n`DROP TABLE`\n`USE`\n`CREATE PROCEDURE`\n\n例如，当您在\
    \ Windows Azure SQL 数据库中创建或修改存储过程时，`FOR REPLICATION` 和 `ENCRYPTION` 选项不受支持。因此，以下语句无效：\n\
    \n```\nCREATE PROCEDURE GetUsers\nWITH ENCRYPTION\nFOR REPLICATION\nAS\nSET NOCOUNT\
    \ ON;\nSELECT Title, Name, Intro\nFROM Users\nGO\n```\n\n然而，以下语句有效：\n\n```\nCREATE\
    \ PROCEDURE GetUsers\nWITH RECOMPILE, EXECUTE AS CALLER\nAS\nSET NOCOUNT ON;\n\
    SELECT Title, Name, Intro\nFROM Users\nGO\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nWindows Azure SQL 数据库的 `CREATE`/`ALTER TABLE` 语法稍微复杂一些，因为有几个不受支持的选项：\n- `ON`\
    \ `keyword` { `partition_schema` | `filegroup`} (例如 `ON PRIMARY`)\n- `TEXTIMAGE_ON`\n\
    - `FILESTREAM_ON`\n- `<` `column_definition`>`\n    - `FILESTREAM`\n    - `NOT\
    \ FOR REPLICATION`\n    - `ROWGUIDCOL`\n    - `SPARSE`\n- `<` `data_type`>`\n\
    \    - `CONTENT`\n    - `DOCUMENT`\n    - `xml_schema_collection`\n- `<` `column_constraint`>`\n\
    \    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n- `<` `column_set_definition`>\n\
    - `<` `table_constraint`>`\n    - `FILLFACTOR`\n    - `ON`\n    - `NOT FOR REPLICATION`\n\
    - `<` `index_option`>`\n    - `PAD_INDEX`\n    - `FILLFACTOR`\n    - `ON PARTITIONS`\n\
    \    - `DATA_COMPRESSION`\n    - `ALLOW_ROW_LOCKS`\n    - `ALLOW_PAGE_LOCKS`\n\
    - `<` `table_option`>`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    尽管这个列表可能给人留下功能缺失很多的印象，但请记住，列表中的大多数项目之所以存在，是因为它们与操作系统或硬件相关，在 Windows Azure SQL\
    \ 数据库环境中不适用。例如，以下 `CREATE TABLE` 语句无效：\n\n```\nCREATE TABLE [dbo].[Users](\n \
    \   [ID] [int] IDENTITY(1,1) NOT FOR REPLICATION NOT NULL,\n    [Name] [nvarchar](50)\
    \ NULL,\n    [NTUserName] [nvarchar](128) NULL,\n    [Domain] [nvarchar](50) NOT\
    \ NULL,\n    [Intro] [nvarchar](100) NULL,\n    [Title] [nvarchar](50) NOT NULL,\n\
    \    [State] [nvarchar](10) NOT NULL,\n    [Country] [nvarchar](100) NULL,\n \
    \   [PWD] [varbinary](100) NULL,\n    [rowguid] [uniqueidentifier] NULL,\n   \
    \ PRIMARY KEY CLUSTERED\n    (\n        [ID] ASC\n    )WITH (PAD_INDEX = OFF,\
    \ STATISTICS_NORECOMPUTE = OFF,\n           IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS\
    \ = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\n) ON [PRIMARY]\n```\n\n此语法无效的原因有几个。`IDENTITY`\
    \ 列上的 `NOT FOR REPLICATION` 子句不受支持。两个 `ON PRIMARY` 子句、`ALLOW_ROW_LOCKS` 子句或 `ALLOW_PAGE_LOCKS`\
    \ 子句也不受支持。例如，`ON PRIMARY` 子句指定了表和主键索引放置在哪个文件组上。\n\n由于在 Windows Azure SQL 数据库中无法创建文件组（因为无法访问驱动器系统），因此支持此语句没有意义。\n\
    \n然而，以下语法有效：\n\n```\nCREATE TABLE [dbo].[Users](\n    [ID] [int] IDENTITY(1,1)\
    \ NOT NULL,\n    [Name] [nvarchar](50) NULL,\n    [NTUserName] [nvarchar](128)\
    \ NULL,\n    [Domain] [nvarchar](50) NOT NULL,\n    [Intro] [nvarchar](100) NULL,\n\
    \    [Title] [nvarchar](50) NOT NULL,\n    [State] [nvarchar](10) NOT NULL,\n\
    \    [Country] [nvarchar](100) NULL,\n    [PWD] [varbinary](100) NULL,\n    [rowguid]\
    \ [uniqueidentifier] NULL,\n    PRIMARY KEY CLUSTERED\n    (\n        [ID] ASC\n\
    \    )WITH (STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF)\n)\n```\n\n有关具体支持和不支持内容的详细信息，请访问\n\
    [http://msdn.microsoft.com/en-us/library/ee336267.aspx](http://msdn.microsoft.com/en-us/library/ee336267.aspx)。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 不支持的 T-SQL 语句\n\n不受支持的\
    \ T-SQL 语句列表很长，但这并不像看起来那么负面。在大多数情况下，不受支持的语句与操作系统或硬件相关，在 Windows Azure SQL 数据库环境中不适用。"
