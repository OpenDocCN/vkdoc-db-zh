  trans: "\n# 第 8 章 ■ WINDOWS AZURE 与 ASP.NET\n\n如果您检测到自己正在本地或云中运行，也可以使用代码完全覆盖数据库连接字符串，这样在开发过程中（无论构建配置如何）始终指向本地数据库，但在部署带有云服务配置的发布版本时，则使用生产数据库，如图\
    \ 8-18 所示。\n\n*图 8-18. 使用本地数据库进行开发的部署场景*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n从以上讨论中可以看出，您可以通过多种方式配置部署策略。您应该提前确定部署模型，以免在开发时指向了错误的数据库。\n\n**注意**\n有关 Azure\
    \ 配置文件的更多信息，请阅读以下 MSDN 链接：\n[`msdn.microsoft.com/en-us/library/windowsazure/ee405486.aspx`](http://msdn.microsoft.com/en-us/library/windowsazure/ee405486.aspx)\n\
    \n## 在 Windows Azure 中部署 ASP.NET 应用程序\n\n马上就要完成了。本节将逐步介绍在云中部署 ASP.NET 应用程序的步骤。您可以直接从\
    \ Visual Studio 发布应用程序，或者打包部署文件并手动部署。由于直接从 Visual Studio 发布需要创建证书，并且可能需要更改防火墙设置，我将向您展示手动部署步骤，以使过程更易于遵循。\n\
    \n1.  您需要打包您的项目。右键单击 `AzureExample`（云项目），然后单击 `Package`。此操作将打开之前在图 8-15 中看到的对话框。选择您的\
    \ `Build` 和 `Service` 配置，然后单击 `Package`。一旦包成功创建，Windows 资源管理器将打开并显示部署文件所在的位置。您很快会需要这些文件，请不要关闭该窗口。\n\
    2.  打开 Internet Explorer，导航到 [Azure 管理门户](http://manage.windowsazure.com)，并使用您的\
    \ Live ID 登录。\n3.  登录后，Internet Explorer 窗口将显示您 Azure 账户的主页。单击 `Cloud Services`。\n\
    4.  您应该会看到本章开头图 8-1a 所示的页面。单击 `AzureExample` 服务，然后单击 `Staging` 链接。现在您将看到 `AzureExample`\
    \ 服务的过渡环境仪表板。\n5.  单击 `Upload`。在过渡环境中部署会创建一个临时服务，您可以在将其提升到最终公共 URL 之前用于测试。这样，您可以在将应用程序部署到生产环境之前，测试其是否按预期工作。\n\
    6.  现在您会看到 `Upload a package` 对话框（见图 8-19），其中包含以下字段：\n    *   **部署名称**。在 `Service\
    \ Deployment Name` 下，您需要输入服务的标签。例如，键入 `TEST001`。为避免关于测试部署的警告，请勾选屏幕底部的选项（`Deploy\
    \ even if one or more roles contain a single instance`）。您可以单击问号了解更多关于此警告的信息。\n\
    \    *   **包**。这是 Visual Studio 为您构建的包。它是 Windows 资源管理器窗口中扩展名为 `.cspkg` 的文件。单击\
    \ `Browse` 会打开一个 `Open` 表单。您可能会发现，从 Windows 资源管理器窗口复制整个路径并粘贴到 `Open` 表单中更容易。选择包文件，然后单击\
    \ `Open`。\n    *   **配置**。这是您的云服务项目的配置文件，扩展名为 `.cscfg`。同样，单击 `Browse` 并从 `Open`\
    \ 表单中选择配置文件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 141](img/index-184_1.png)\n\
    \n![Image 142](img/index-184_2.png)\n\n*图 8-19. Windows Azure 部署对话框*\n\n7.  当提供的信息如图\
    \ 8-19 所示时，单击 `OK`。这样做会首先将相应的文件复制到云中，并创建将部署您的项目的虚拟机（见图 8-20）。部署完成后，您的服务将立即开始运行，您也开始产生费用。\n\
    \n*图 8-20. 显示正在部署包的 Azure 管理界面*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 143](img/index-185_1.png)\n\n要检查您的网站是否正在运行，您可能首先需要刷新屏幕。单击位于屏幕右侧的 `Site\
    \ URL` 链接，该区域列出了部署的属性。单击该链接将打开另一个浏览器并在云中运行您的 Web 应用程序（见图 8-21）。\n\n*图 8-21. 在云中运行\
    \ Web 应用程序*\n\n**注意**\n如前所述，您现在正在为这项 Windows Azure 服务付费。要删除此服务并停止产生费用，请选择 `AzureExample`\
    \ 云服务，单击 `staging`，然后单击底部菜单上的 `delete` 按钮。\n\n## 本章小结\n\n本章向您展示了如何创建一个连接到 SQL\
    \ Database 实例的简单 ASP.NET 应用程序。这需要一些配置步骤，包括在云中创建 Windows Azure 服务以及安装名为 Windows\
    \ Azure Tools 的 Visual Studio 扩展。\n\n虽然本章主要关注在云中部署 ASP.NET 应用程序，但您也可以非常轻松地将 ASP.NET\
    \ 项目部署到您的企业 IIS 服务器上，并配置连接字符串以连接到 SQL Database 实例。这为您提供了多种部署选项可供考虑，尽管您必须记住，每个部署选项都有不同的成本结构。Windows\
    \ Azure 和 SQL Database 之间的数据传输在同一区域内是免费的，但您需要为 Windows Azure 中的计算时间付费。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 9 章 ■ 高性能设计\n\n本章重点介绍几个关键主题，可以帮助您设计高性能的应用程序，这些程序从 SQL Database 和 SQL Server\
    \ 数据库中使用数据。本章采用的方法构建一个简单但有效的 WinForms 应用程序，用于使用本地和云中存储的数据。您将首先探讨一些通用概念，然后快速进入设计和开发一个分片库，该库从多个数据库读取数据。\n\
    \n最后，您将看到如何使用任务并行库为分片库添加多线程，以及使用企业库（正式名称为缓存应用程序块）添加缓存。\n\n## 通用性能概念\n\n在深入细节之前，让我们讨论一些与性能相关的概念。您首先应该知道的是，实现高性能是困难的。尽管确保应用程序达到可接受的性能水平很重要，但高级性能调优需要仔细规划，并且只有在需求驱动您认为高性能是必要时，才应将其作为设计目标。例如，如果您预计您的应用程序将被数千并发用户使用，那么您可能需要使用缓存甚至多线程。另一方面，某些高性能技术可能使代码难以阅读和维护，在这种情况下，知识转移可能很困难。\n\
    \n## 频繁交互 vs. 大块交互\n"
- fmt: "The encrypted network connection to SQL Database yields slower applications\
    \ and may impact your application design significantly. An application that opens\
    \ a database connection for every database call and performs a roundtrip for every\
    \ update (that is, a *chatty* application) performs slower than an application\
    \ that loads data for multiple objects in a single call and sends changes in bulk\
    \ (a *chunky* application). `LINQ to SQL` and the `Entity Framework` are data\
    \ access layers that provide good control over the use of bulk operations (the\
    \ `SaveChanges` method on the object context).\n\nFor example, if you design a\
    \ data access layer that contains a lot of business rules, your code may perform\
    \ many roundtrips to the database to load the data needed to execute the business\
    \ rules. If this is the case, you can implement certain data-intensive business\
    \ rules in stored procedures (close to the data) and/or use caching to avoid unnecessary\
    \ roundtrips.\n\n## Lazy Loading\n\nOn the other hand, although it’s good to have\
    \ fewer roundtrips from a performance standpoint, you should load only the data\
    \ you need, for two reasons: the more data you load, the more you pay for the\
    \ SQL Database service if the data is consumed outside of the data center where\
    \ it resides; and loading more data than necessary can slow down your applications.\
    \ So, you may want to consider using a *lazy loading* mechanism, by which certain\
    \ properties of your objects are loaded only when necessary. `LINQ to SQL` and\
    \ the `Entity Framework 4.0` support lazy loading (through the use of the `DeferredLoadingEnabled`\
    \ property).\n\nAlthough lazy loading minimizes the amount of data loaded, it\
    \ can create chattier applications. It’s important to strike the right balance\
    \ between using bulk data transfers and minimizing the amount of data needed to\
    \ run an application function.\n\n## Caching\n\nAnother important technique used\
    \ to minimize roundtrips is *caching*. Your application (or service) may use caching\
    \ to avoid unnecessary roundtrips if some of your data doesn’t change often. This\
    \ may also impact your database design choices. For example, if you have a table\
    \ that stores a list of states, the table will probably remain unchanged for a\
    \ long time, which makes it a great candidate for caching.\n\nCaching can be performed\
    \ in memory or on disk (in a local database, for example). You have a few options:\n\
    \n• **ASP.NET caching.** ASP.NET offers a cache object that provides good caching\
    \ capabilities. However, ASP.NET caching is tied to IIS. Restarting IIS clears\
    \ the ASP.NET cache unless you’ve taken the necessary steps to persist the cache.\n\
    • **Windows Server AppFabric.** The AppFabric offers a next-generation distributed\
    \ cache (previously known as Velocity). This cache can run on multiple computers\
    \ and is made available through a .NET API. This caching library is only available\
    \ on premise and cannot be used in Windows Azure.\n• **Windows Azure Caching Service.**\
    \ This caching service is a subset of Windows Server AppFabric caching. Some of\
    \ the methods are not supported in Azure. The Azure Caching Service is only practical\
    \ for storing IIS session state, or for other key-value pair storage needs in\
    \ which the key is always known in advance. However the Azure cache can run on\
    \ local instances, a method that leverages the memcache protocol.\n• **Enterprise\
    \ Library.** The Enterprise Library offers a collection of application blocks\
    \ that Microsoft makes available under public license. The Enterprise Library\
    \ contains a cache mechanism that doesn’t depend on ASP.NET. This caching mechanism\
    \ is provided natively in .NET 4.0 and can be found under the `System.Runtime.Caching`\
    \ namespace.\n\n## Asynchronous User Interface\n\nUltimately, performance is a\
    \ measure that impacts the user experience and can be controlled to a certain\
    \ degree by offering highly responsive user interfaces. A Windows application\
    \ that becomes unresponsive while loading data, or a web page that doesn’t load\
    \ until all the data has been retrieved, is perceived as slow. As a result, developing\
    \ with multithreading techniques may become more important to provide a better\
    \ experience to your users.\n\nFor web development, you should consider using\
    \ asynchronous controls (such as AJAX) that give you more control over partial\
    \ page loading. For Windows development, you may need to use a multithreaded user\
    \ interface development approach.\n\nTo implement a highly responsive application\
    \ in WinForms, use the `Invoke` method, shown on line 3 of the following example,\
    \ to refresh your user interface on the UI thread:\n\n```csharp\nvoid OnPassCompleted()\n\
    {\n    this.Invoke(new EventHandler(UpdateProgressBar), null);\n}\n\nprivate void\
    \ UpdateProgressBar(object o, System.EventArgs e)\n{\n    if (progressBarTest.Value\
    \ < progressBarTest.Maximum)\n    {\n        progressBarTest.Value++;\n    }\n\
    }\n```\n\nIn this example, `OnPassCompleted` is a custom event received by the\
    \ main form, which then calls the `Invoke` method to refresh a progress bar. The\
    \ call to `Invoke` forces the execution of the progress bar refresh on the UI\
    \ thread, which is different from the thread on which the `OnPassCompleted` event\
    \ was raised.\n\n## Parallel Processing\n\nIn addition to asynchronous user interfaces,\
    \ your code may need to execute on multiple processors. Two primary scenarios\
    \ can lead you to choose parallel processing for your application:\n\n• **Many\
    \ calculations.** Your application is CPU-intensive, especially if computations\
    \ can be independent from each other. Advanced graphics or complex mathematical\
    \ computations are examples of CPU-intensive operations.\n• **Many waits.** Your\
    \ application needs to wait between each call, and the cost of creating parallel\
    \ threads and aggregating results is insignificant. Database shards are an example:\
    \ calling five databases in parallel is roughly five times faster than calling\
    \ five databases serially.\n\nTwo choices are available to write parallel processes.\
    \ If you can, you should use the Task Parallel Library (`TPL`), because it’s easier:\n\
    \n• **Task Parallel Library.** The `TPL` is a newer library that Microsoft is\
    \ providing as part of .NET 4.0. It allows you to take advantage of multiple CPUs\
    \ quickly and easily. You can find the `TPL` under `System.Threading.Tasks`.\n\
    • **Threads.** Managing threads the old-fashioned way using the `System.Threading`\
    \ namespace gives you the most flexibility.\n\n## Shards\n\nShards offer another\
    \ mechanism by which your code can read and write data against any number of databases\
    \ almost transparently. Later in this chapter, you’ll create a horizontal partition\
    \ shard (`HPS`) using the read-write shard (`RWS`) design pattern as described\
    \ in Chapter 2, with the round-robin access method. A horizontal partition implies\
    \ that all the databases have identical schema and that a given record can be\
    \ written in any database that belongs to the shard. From a performance standpoint,\
    \ reading from multiple databases in parallel to search for records yields greater\
    \ performance; however, your code must keep breadcrumbs if you need to perform\
    \ updates back to the correct database. Finally, using a shard requires parallel\
    \ processing for optimum performance. In Chapter 10 you will explore *federations*,\
    \ a SQL Database feature providing built-in capabilities to build database shards.\n\
    \n### Coding Strategies Summary\n\nTable [9-1 pr](#index_split_002.html#p189)ovides\
    \ a summary of the concepts discussed so far regarding some of the coding strategies\
    \ available to you when you develop against a SQL Database instance with performance\
    \ in mind."
