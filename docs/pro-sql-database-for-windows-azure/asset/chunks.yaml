    ![Image 49](img/index-77_1.png)


    # 第 4 章 ■ 数据迁移与备份策略


    ## 使用 SQL Server 2012 通过 BACPAC 导出和导入到 SQL Azure


    如前所述，`将数据库部署到 SQL Azure` 是一个无法中途停止的选项。一旦你点击 `完成`，便无法回头。而且，你必须等待部署完成才能访问 BACPAC。好消息是，SQL
    Server 2012 并没有止步于直接部署到 SQL Azure，通过一个额外的菜单选项，你可以将本地数据库直接导出到 BACPAC，而无需直接部署到 SQL
    Azure。通过此菜单选项，你在部署到 SQL Azure 之前可以灵活处理你的 BACPAC，例如将其复制到另一台电脑，或使用 `导入` 选项将 DAC
    包导入到多个 SQL Azure 服务器。本节将首先讨论导出选项。


    ### DAC 导出


    要创建 DACPAC，请右键单击 `AWMini` 数据库，然后从上下文菜单中选择 `任务 ➤ 导出数据-tier 应用程序`（参见图 4-4），这将启动
    DAC 导出向导。


    **图 4-4.** 导出 DAC 菜单选项


    在向导的“简介”页面上单击 `下一步`。在“导出设置”页面（参见图 4-5）中，你有两个选项：`保存到本地磁盘` 和 `保存到 Windows Azure`。选择
    `保存到本地磁盘` 选项，然后单击 `浏览` 按钮以选择文件名和位置来保存 BACPAC 文件。单击 `下一步`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](img/index-78_1.png)


    **图 4-5.** DAC 导出设置


    在“摘要”页面上，检查指定的设置，然后单击 `下一步`。然后，`AWMini` 数据库将以 BACPAC 格式导出到你在向导的“导出设置”页面中指定的文件。图
    4-6 显示了 DAC 框架构建 BACPAC 所采取的步骤。实际上，这是前一个示例直接部署到 SQL Azure 所经历过程的前半部分。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 51](img/index-79_1.png)


    **图 4-6.** DAC 导出结果


    应该指出的是，即使数据库并非为 SQL Database 准备的，前几个步骤也会在每次导出时执行。在尚未为 SQL Database 准备好的数据库上导出到
    BACPAC 将会在“验证数据包的架构模型”步骤失败。你将看到的典型错误是“[MS-Description] 作为数据包 (DACPAC) 的一部分使用时不支持”和“全文目录：`[CatalogName]`
    作为数据包 (DACPAC) 的一部分使用时不支持”。关键是要检查错误，进行更正，然后重新运行导出。


    你可以看到，首先从数据库中提取了架构，包括引用，然后执行了验证数据库是否已为 SQL Database 准备好的重要步骤。一旦架构导出并完成所有验证，数据便会被导出。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](img/index-80_1.png)


    导出成功完成后，单击 `关闭`。此时，你拥有一个可以导入到一个或多个 SQL Azure 服务器的 BACPAC。当然，你不能同时导入到多个 SQL Azure
    服务器，但与 `将数据库部署到 SQL Azure` 选项不同，利用导出和导入功能，你可以多次导入 BACPAC，而无需再次重新运行导出步骤。现在是时候将该
    DAC 包 (BACPAC) 导入到 SQL Azure 了。


    ### DAC 导入


    在 SQL Server Management Studio 中连接到你的 SQL Azure 服务器，在“对象资源管理器”窗口中，右键单击“数据库”节点，然后从上下文菜单中选择
    `导入 Data-tier 应用程序`（参见图 4-7），这将启动“导入 Data-tier 应用程序向导”。


    **图 4-7.** DAC 导入选项菜单


    在向导的“简介”页面上单击 `下一步`。在向导的“导入设置”页面（如图 4-8 所示）中，请注意你有两个选项：`从本地磁盘导入` 和 `从 Windows
    Azure 导入`。我们将 DAC 文件保存到了本地目录，因此选择 `从本地磁盘导入` 选项，浏览到你在上一步导出的 DAC 包 (BACPAC) 的位置，然后单击
    `下一步`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](img/index-81_1.png)


    **图 4-8.** DAC 导入设置


    向导的下一步，“数据库设置”，如图 4-9 所示，应该看起来很熟悉，因为你之前在图 4-2 的“部署数据库向导”的“部署设置”页面中见过它。这里你需要再次连接到你的
    SQL Azure 服务器，然后选择新的 SQL Azure 数据库版本和大小。完成此操作后，单击 `下一步`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 54](img/index-82_1.png)


    **图 4-9.** 指定新的数据库实例选项


    再次出现“摘要”页面，如果一切正常，请单击 `下一步` 执行导入。


    在图 4-10 中，你可以看到 DAC Fx 为将 DAC 包 (BACPAC) 部署到 SQL Azure 所采取的步骤，这是前一个示例直接部署到 SQL
    Azure 所经历过程的后半部分。DAC Fx 首先创建了数据库，然后创建了一个部署计划，该计划会查看当前的 DAC 包并确定如何将其部署到新数据库。然后，它会为每个表创建架构并导入数据。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](img/index-83_1.png)


    **图 4-10.** BACPAC 导入操作成功


    当然，虽然 `将数据库部署到 SQL Azure` 和 `导入/导出 DAC` 选项都能完成相同的任务，但 `导入/导出 DAC` 选项为你提供了更多的控制和灵活性，例如能够将
    DACPAC 部署到多个目标而无需重新导出。然而，如果你需要快速将本地数据库迁移到 SQL Azure，`将数据库部署到 SQL Azure` 是一个绝佳的选择。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 导入/导出服务


    到目前为止，重点一直放在客户端；从 SQL Server 导入和导出到 BACPAC。导入/导出服务旨在直接在 Windows Azure SQL Database
    和 Windows Azure BLOB 存储之间进行导入和导出。此服务自 2012 年 1 月下旬起已可用于生产环境，并且是免费的。无需注册，无需输入代码。直接使用即可。怎么用？导入/导出服务直接内置于
    Windows Azure 管理门户中，通过下方功能区栏上的两个按钮：`导入` 和 `导出`。


    ### 导入


    在本节中，你将 BACPAC 文件上传到 BLOB 存储，然后使用导入/导出服务将其导入到一个全新的 SQL Database 实例中。第一步是将 `AWMini.bacpac`
    上传到 Windows Azure BLOB 存储。如果你尚未创建 Windows Azure 存储帐户，请在左侧导航窗格中选择 `存储` 选项卡，然后从下方的
    `新建` 菜单中选择 `新建 ➤ 存储 ➤ 快速创建`。在 URL 字段中键入存储帐户的名称，选择区域和订阅，然后单击 `创建存储帐户`。


    存储帐户创建后，在门户中选择该帐户名称；然后选择 `容器` 选项卡。在下方菜单栏上，选择 `添加容器` 以创建一个用于上传 BACPAC 的容器。在“新建
    Blob 容器”对话框中，输入容器的名称（我将其称为 `bacpac`），然后单击复选（`确定`）按钮。


