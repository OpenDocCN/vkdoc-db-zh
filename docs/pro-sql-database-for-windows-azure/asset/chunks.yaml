  trans: '

    本章我们首先创建了 Windows Azure 移动服务，然后将该服务配置为使用 Windows Azure SQL 数据库作为数据存储。接着，我们下载了示例应用程序，您看到了使用
    Windows Azure 移动服务读写数据是多么容易，以及如何为 Windows 应用商店创建应用程序。


    最后，我们简要了解了应用程序中可以使用的一些配置设置，例如与 Facebook 和 Twitter 的社交媒体集成，以及与 Microsoft 和 Google
    等其他提供商的应用程序集成。我们还探讨了扩展移动服务这一至关重要的方面，以及执行此操作是多么容易。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 205](img/index-259_1.png)


    ## 附录 A


    ### SQL 数据库管理门户


    本附录向您介绍由 Microsoft 构建的在线 SQL 数据库管理门户。它是一个基于 Web 的应用程序，允许您设计、管理和监视 SQL 数据库实例。尽管当前版本的门户不支持
    `SQL Server Management Studio` 的所有功能，但它提供了一些 SQL 数据库独有的有趣功能。


    #### 启动管理门户


    您可以从 Windows Azure 管理门户启动 SQL 数据库管理门户（`SDMP`）。打开浏览器并导航到 [`https://manage.windowsazure.com`](https://manage.windowsazure.com)，然后使用您的
    Live ID 登录。登录后，单击左侧的 "SQL 数据库"，然后从可用数据库列表中单击您的数据库。这将显示数据库仪表板，如图 A-1 所示。要启动管理门户，请单击底部的
    `管理` 图标。


    *图 A-1. Windows Azure 管理门户中的 SQL 数据库仪表板*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 206](img/index-260_1.png)


    附录 A ■ SQL 数据库管理门户


    ■ **注意** 您也可以直接在浏览器中输入 [`https://sqldatabasename.database.windows.net`](https://sqldatabasename.database.windows.net)
    来访问 `SDMP`，其中 `sqldatabasename` 是您的 SQL 数据库的服务器名称。


    将打开一个新网页，提示您登录 SQL 数据库服务器。如果您是从 Windows Azure 管理门户点击进入的，数据库名称将自动填写且为只读。如果您直接在浏览器中键入了
    URL，则需要手动输入数据库名称。输入用户名和密码；然后单击 `登录`（图 A-2）。


    *图 A-2. SQL 数据库管理门户登录屏幕*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 207](img/index-261_1.png)


    附录 A ■ SQL 数据库管理门户


    登录后，您将看到一个类似于图 A-3 的页面，默认显示数据库实例的管理摘要页面，提供有关数据库实例的一般信息，例如可用空间、当前连接数等。您还可以访问设计页面，这是门户的一个部分，允许您管理表、视图和存储过程。管理功能和设计功能将在下面解释。


    *图 A-3. 管理摘要屏幕*


    #### 管理功能


