  trans: "\n# 第 11 章 ■ 性能调优\n\n接下来，打开另一个查询窗口，这将在 SQL 数据库中建立一个新的连接。运行以下查询（参见图 11-1），并确保指定要调查的会话\
    \ ID：\n\n```\nSELECT\n    login_time,\n    host_name,\n    program_name,\n   \
    \ host_process_id,\n    cpu_time,\n    memory_usage,\n    total_elapsed_time,\n\
    \    reads,\n    writes,\n    logical_reads,\n    row_count,\n    original_login_name\n\
    FROM sys.dm_exec_sessions\nWHERE session_id = 176 // 替换为你的 session_id\n```\n\n\
    此语句返回你之前 SQL 语句的重要性能指标，如表 11-3 所述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 表 11-3. `sys.dm_exec_sessions` 中的部分列\n\n| `指标` | 值 | 说明 |\n|----------|-------|---------|\n\
    | `login_time` | 2010-04-22 16:43:30.557 | 会话的登录时间。请注意，通过连接池，会话可以随时间重用。此时间代表最后一次成功登录。\
    \ |\n| `host_name` | DEVDSK01 | 建立到 SQL 数据库连接的计算机名称。 |\n| `program_name` | SSMS\
    \ | 在客户端工作站上执行该语句的应用程序名称。 |\n| `host_process_id` | | 在客户端工作站上执行该语句的 Windows 进程\
    \ ID（PID）。你可以在 Windows 的任务管理器中查看应用程序的 PID。 |\n| `cpu_time` | | 自连接建立以来，SQL 语句消耗的\
    \ CPU 时间（以毫秒为单位）。 |\n| `memory_usage` | | 连接迄今为止消耗的 8KB 字节数。 |\n| `total_elapsed_time`\
    \ | | 语句的持续时间（以毫秒为单位）。这包括执行语句的时间和将数据返回到客户端机器所需的时间。 |\n| `reads` | | 物理读取次数。 |\n\
    | `writes` | | 物理写入次数。 |\n| `logical_reads` | | 逻辑读取次数。 |\n| `row_count` | | 返回的行数。\
    \ |\n| `original_login_name` | MyTestLogin | 成功连接的用户的登录名。 |\n\n此时，你需要了解一个对于性能调优非常重要的点。`cpu_time`\
    \ 或许是你能用来确定 SQL 数据库中语句执行时长的最佳指标。`total_elapsed_time` 可能会产生误导。经过时间代表 SQL 数据库（或\
    \ SQL Server）获取数据并将所有数据返回给客户端所需的时间。因此，如果你的客户端显示数据速度慢，SQL 数据库会减慢速度以匹配客户端的速度；这种减慢是\
    \ TCP（传输控制协议）编程的函数，与 SQL 数据库无关。因此，`total_elapsed_time` 显示的是执行语句以及客户端完成数据获取所需的总时间。`total_elapsed_time`\
    \ 与 SQL Profiler 返回的持续时间度量相同；请注意，如果你发送的是包含多个请求的批处理，`total_elapsed_time` 是所有单独执行时间的总和。\n\
    \n## 连接池\n\n本章前面提到，连接池是性能的一个重要考虑因素。虽然在数据库编程领域这一说法通常是准确的，但对于 SQL 数据库来说，它变得至关重要。\n\
    \n设计不佳的应用程序可能会创建过多的连接请求，最终可能淹没 SQL 数据库。\n\n如果建立了过多的连接请求，你的连接可能会被**限制**，这意味着在一段时间内你将无法再连接。\n\
