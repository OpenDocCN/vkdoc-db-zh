  trans: "\n# 附录 B：Windows Azure SQL Database 快速参考\n\n由于存在太多不支持的语句，本附录无法将它们全部列出。你可以在\
    \ [`msdn.microsoft.com/en-us/library/ee336253.aspx`](http://msdn.microsoft.com/en-us/library/ee336253.aspx)\
    \ 找到完整的列表。表 B-3 提供了一个较短的列表，重点列出了一些你尤其需要注意的不支持语句。\n\n`表 B-3. 不支持的 T-SQL 语句`\n\n\
    *   `BACKUP CERTIFICATE`\n*   `DBCC CHECKTABLE`\n*   `BACKUP MASTER KEY`\n*  \
    \ `DBCC DBREINDEX`\n*   `BACKUP SERVICE MASTER KEY`\n*   `DBCC DROPCLEANBUFFERS`\n\
