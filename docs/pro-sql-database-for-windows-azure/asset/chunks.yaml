  trans: '# 第 2 章 ■ 设计注意事项


    系统使用透明分支模式来更新`SQL 数据库`实例中的共享记录。然而此时，边缘缓存并未感知到数据的变化。在特定的时间间隔（例如每 10 分钟），`Windows
    Azure`中的一个工作进程会获取这些变更并将其存储在 Blob 中。该工作进程可能会对数据应用逻辑并解决可能存在的冲突。随后，Blob 会被创建（或替换）为应加载的最新缓存信息。边缘缓存通过以特定间隔（例如每
    5 分钟）加载 Blob 来刷新其内部数据，并用最新的缓存替换其内部内容。如果所有边缘缓存都配置为运行于公共原子钟，则所有缓存几乎会在同一时间更新。


    *图 2-17. 共享边缘数据缓存*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 数据加密


    您可以在两种环境中加密数据：本地或通过服务在`Windows Azure`中进行。如前所述，`SQL 数据库`目前不支持加密（尽管支持哈希处理）。如果您需要加密社会安全号码或电话号码，应考虑在何处进行加密是合理的。


    一般来说，除非您的应用程序运行在私钥可能面临风险的公共环境中，否则应考虑在数据通过互联网传输之前在本地进行加密。但如果您需要在`Windows Azure`中解密，或者需要在不共享密钥的多个消费者之间加密和解密数据，那么您可能需要在将数据存储到`SQL
    数据库`之前，先在`Windows Azure`中对其进行加密。


    ## SaaS 应用程序与联合


    设计 SaaS 应用程序通常需要使用多个数据库，以扩展数据存储和性能。为了构建可靠的 SaaS 解决方案，开发者通常会开发一个自定义框架，提供应用程序所需的连接路由逻辑，以确定它应连接到哪个数据库。


    如果您正在构建 SaaS 应用程序，应研究使用联合（Federations），这是`SQL 数据库`的一项功能。


    联合通过使用管理`SQL`命令将数据分布到多个数据库中，有助于提高可扩展性。我将在第 11 章更详细地探讨联合，包括其工作原理和当前的一些限制。


    ## 总结


    本章回顾了许多分布式计算所特有的设计概念，而云计算正是这些概念的天然试验场。请记住，设计云应用程序可以像从本地应用程序连接到`SQL 数据库`实例一样简单，也可以根据需要（使用分布式边缘缓存和分片）构建企业级系统的复杂设计。


    本章提供了在设计应用程序时应考虑的多个参数，每个参数都可能显著影响您的最终设计，例如性能、计费、安全性、存储选项和限流。在做出最终选择之前，您应考虑创建两个或多个基于云的设计方案，并与其他设计师一起审查，讨论其优缺点。如果有时间，还可以构建概念验证来验证您的假设并衡量解决方案的有效性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 3 章


    ## 安全性


    与大多数公司的其他系统相比，数据库环境可能是安全性方面最薄弱的环节，但银行等少数行业除外。原因是数据库被认为完全位于内部网络边界内，而内部网络被认为是安全的，通常无法从互联网直接访问。


    随着`SQL 数据库`和大多数数据库即服务解决方案的出现，对数据库安全性的关注上升到了首位，主要有两个原因：您不再直接控制您的数据，并且数据可以直接从互联网访问。因此，充分利用`SQL
    数据库`的所有功能并了解其局限性变得尤为重要。


    ## 概述


    在深入探讨`SQL 数据库`的具体细节之前，让我们先看一个通用的安全框架，以评估数据库即服务可能对您产生的影响。以下讨论基于保密性、完整性和可用性（`CIA`）所封装的基本安全原则。这被称为`CIA
    三元组`，是最被广泛接受的安全分类形式之一。`SQL 数据库`与传统的`SQL Server`安装相比，有其不同的优缺点，因此回顾`CIA 三元组`的每个领域，以了解如何应对其劣势并利用其优势，至关重要。


    ## 保密性


    *保密性*是确保数据只能由授权用户访问的能力。它旨在保护您的数据免受窥探或无意泄露，通过使用多种技术实现，包括：


    - **加密**。创建*密文*（加密信息），该密文可通过共享密钥或证书解密。

    - **哈希处理**。生成无法解密的密文（通常用于密码存储）。

    - **访问控制**。基于上下文信息控制对数据的访问。

    - **身份验证**。控制谁可以访问数据库以及用户可以访问数据库中的哪些对象。

    - **防火墙**。使用技术将网络连接限制在已知机器的列表内。


    `SQL 数据库`提供了一些新功能，例如防火墙（如前所述）；然而，它目前尚不支持原生数据加密（例如透明数据加密 [`TDE`] 和字段级加密），这使得对其他保密技术的强调更为重要。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    另一方面，`SQL Server`不提供原生防火墙（尽管可以使用`Windows`原生防火墙或购买第三方数据库防火墙），但它提供了强大的加密功能。最后，`SQL
    Server`和`SQL 数据库`都提供了哈希功能。


    由于`SQL 数据库`不提供原生加密，您的代码需要完成所有繁重的工作。别担心！在本章中，您将看到如何使用`C#`实现哈希和加密，以及如何将密文存储在`SQL
    数据库`（或就此而言，`SQL Server`）中。


    ## 完整性


    数据*完整性*是指确保信息只能由授权用户修改，并在必要时可以撤销损坏的目标。数据的完整性可能以多种方式受到威胁，例如恶意的`SQL 注入`攻击，或无意中在表上执行`TRUNCATE`语句，从而擦除所有记录。


    一般来说，您可以在数据库中实施以下完整性措施：


    - **授权**。控制谁可以更改什么数据。

    - **备份**。创建事务一致的数据库快照，以便从中恢复数据。

    - **基于角色的访问**。为公司中的不同角色（例如开发人员和支持人员）提供最低限度的访问权限。

    - **审计**。跟踪数据库访问和数据更改，为取证分析提供审计跟踪。


    从完整性角度来看，`SQL 数据库`尚未提供与`SQL Server`相同的功能。

    '
- fmt: "# CHAPTER 3 ■ SECURITY\n\nDatabase does deliver strong authorization capabilities\
    \ and role-based security, similar to SQL Server 2012. However, traditional database\
    \ backups and activity auditing aren’t available as of this writing. Microsoft\
    \ is building new backup mechanisms for SQL Database, above and beyond the `BCP`\
    \ (Bulk Copy Program) operations available now. See Chapter 4 for more information\
    \ about how to back up your data in SQL Database.\n\n## Availability\n\n*Availability*\
    \ ensures service uptime so your data can be accessed when it’s needed. Designing\
    \ highly available systems can be very complex and requires advanced knowledge\
    \ in multiple areas including disk configuration, system administration, disaster-recovery\
    \ locations, and more. The following are some of the technologies involved in\
    \ high availability:\n\n- **Redundant disks**. Allows you to recover from the\
    \ loss of a disk spindle. Usually involves a `RAID` configuration.\n- **Redundant\
    \ networks**. Allows you to survive the loss of multiple network components, such\
    \ as a network card or a router.\n- **Redundant services**. Allows you to survive\
    \ the interruption of services such as security and databases. An example is the\
    \ use of Microsoft `Cluster Service`.\n- **Redundant hardware**. Allows you to\
    \ survive the loss of machine hardware, such as a `CPU` or a memory chip.\n- **Scalability**.\
    \ Delivers information at near constant speed under load.\n- **DoS prevention**.\
    \ Prevents successful denial of service (`DoS`) attacks that would otherwise prevent\
    \ data availability.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
    \ 35](index-52_1.png)\n\nIn addition to ensuring redundancy of infrastructure\
    \ components, you need to understand the recovery objectives of your business\
    \ to determine how to best implement your availability requirements.\n\nSQL Database\
    \ offers a unique platform because all the areas just listed are automatically\
    \ provided for. SQL Database offers a 99.9% monthly availability guarantee through\
    \ its service-level agreement (`SLA`). In order to deliver this high availability,\
    \ SQL Database transparently keeps two additional standby databases for each user\
    \ database you create. If anything happens to one of your user databases, one\
    \ of the two standby databases takes over within a few seconds; you may not even\
    \ notice the failover process. SQL Database also provides automatic handling of\
    \ `DoS` attacks.\n\nSQL Database accomplishes failover using the architecture\
    \ shown in Figure 3-1. You interact with a proxy that directs your request to\
    \ whichever of your databases is current. the standby databases aren’t accessible\
    \ to you.\n\n**Figure 3-1.** SQL Database’s standby database architecture\n\n\
    ■ **Note** in terms of availability, SQL Database far surpasses SQL Server out\
    \ of the box; SQL Database is built on a scalable and highly available platform\
    \ that doesn’t require configuration or tuning. None of the typical SQL Server\
    \ configuration settings are available in SQL Database (such as `CPU Affinity`,\
    \ `Replication`, `Log Shipping`, and so on).\n\nLet’s take an example of a project\
    \ that needs to deploy a new application with high availability requirements.\n\
    \nThe following items would need to be planned for in a traditional SQL Server\
    \ installation but are provided to you automatically with SQL Database:\n\n- **Clustered\
    \ SQL Server instance**. Install and configure Microsoft `Cluster Service` and\
    \ SQL Server instances in an active/active or active/passive configuration.\n\
    - **RAID configuration**. Purchase new disks and hardware to install and configure\
    \ a `RAID 10` (or `RAID 0+1`) disk array (for disk redundancy and performance).\n\
    - **Disaster-recovery server**. Purchase similar hardware and configure it at\
    \ a disaster-recovery site.\n- **Replication topology**. Create a mechanism to\
    \ transfer the data from the primary site to the secondary site using log shipping,\
    \ replication, disk-level replication, or another technique, depending on your\
    \ needs.\n- **Database tuning**. In larger systems, tuning SQL Server for high\
    \ performance can be very difficult and involves `CPU`, memory, `I/O` affinitization,\
    \ degree of parallelism, and many other considerations.\n- **Testing**. Plan and\
    \ execute a disaster-recovery plan once a year, to make sure it’s working as intended.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 36](index-53_1.jpg)\n\
    \nAnd of course, you must consider the costs associated with all these activities,\
    \ the time it takes to plan and execute such a project, and the specialized resources\
    \ needed to implement a highly available database environment.\n\nBy now, you\
    \ can see that although SQL Database offers fewer options in certain areas of\
    \ security, it excels in others, especially its availability model, which is one\
    \ of the CIA triad components. Deploying a highly available SQL Database database\
    \ is quick and extremely simple.\n\n## Securing Your Data\n\nLet’s dive into some\
    \ specifics and code examples to show how to secure your data in SQL Database.\
    \ You may need to secure specific columns in your database that contain sensitive\
    \ information, such as Social Security numbers or credit card numbers. Certain\
    \ medical applications store patient data, which can fall under compliance review,\
    \ and as such may need to be encrypted as well. As hinted previously, not all\
    \ security mechanisms are currently available, so this section focuses on what\
    \ SQL Database provides and on ways to mitigate the missing features. Regarding\
    \ data encryption, because SQL Database provides none, you’ll see how to implement\
    \ your own security classes to simplify data encryption in your projects.\n\n\
    ■ **Note** The examples that follow use a database script called `Security.sql`\
    \ and a Visual Studio 2008 project called `SQLAzureSecurity.sln`. you can run\
    \ the SQL script on your local SQL Server database if you don’t have a Windows\
    \ Azure account yet.\n\nThis chapter uses a few classes and methods to demonstrate\
    \ how to use encryption, hashing, and other techniques. Figure 3-2 shows the objects\
    \ being used. The `Encryption` class performs the actual encryption and returns\
    \ a `CipherText` structure; the `UserProperties` class uses extension methods\
    \ from the `Extensions` class and a helper method in the `Util` class. The `CDatabase`\
    \ class returns the database connection string.\n\n**Figure 3-2.** Object model\
    \ used in the examples\n\n### Encryption\n\nAs mentioned previously, data encryption\
    \ isn’t available. Why? Because SQL Database doesn’t support X.509 certificates.\
    \ Certificates are necessary for many encryption-related features, such as Transparent\
    \ Data Encryption (`TDE`), column-level encryption, and certain `T-SQL` commands,\
