- fmt: 'So far, you’ve spent a lot of time encrypting and hashing values for increased
    confidentiality and integrity. However, another important aspect of the CIA triad
    is access control. This section reviews two subcategories of access control: authentication
    (also referred to as `AUTHN`) and authorization (`AUTHZ`).


    ## Authentication (`AUTHN`)


    `AUTHN` is a process that verifies you’re indeed who you say you are. In SQL Server,
    the `AUTHN` process is done through one of two mechanisms: network credentials
    (which are handled through Kerberos authentication over the Security Support Provider
    Interface [`SSPI`]) or SQL Server credentials. Connection strings must specify
    which `AUTHN` is being used. And when you use SQL Server `AUTHN`, a password must
    be provided before attempting to connect, either by a user at runtime or in a
    configuration file.


    Keep the following items in mind when you’re considering `AUTHN` with SQL Database:


    *   **No network authentication**. Because SQL Database isn’t on your network,
    network `AUTHN` isn’t available. This further means you must use SQL `AUTHN` at
    all times and that you must store passwords in your applications (in configuration
    files, preferably). You may want to store your passwords encrypted. Although you
    can encrypt sections of your configuration files in Windows using the `aspnet_regiis.exe`
    utility, this option isn’t available in Windows Azure using the default providers.
    However, you can encrypt sections of your web configuration file using a custom
    configuration provider: `PKCS12` (found on the MSDN Code Gallery). For more information
    on how to use this custom provider, visit [http://tinyurl.com/9ta8m5u](http://tinyurl.com/9ta8m5u).

    *   **Strong passwords**. SQL Database requires the use of strong passwords. This
    option can’t be disabled, which is a good thing. A strong password must be at
    least eight characters long; must combine letters, numbers, and symbols; and can’t
    be a word found in a dictionary.

    *   **Login name limitations**. Certain login names aren’t available, such as
    `sa`, `admin`, and `guest`. These logins can’t be created. You should also refrain
    from using the `@` symbol in your login names; this symbol is used to separate
    a user name from a machine name, which may be needed at times.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ SECuRiTy


    ## Authorization (`AUTHZ`)


    Authorization gives you the ability to control who can perform which actions after
    being authenticated. It’s important to define a good `AUTHZ` model early in your
    development cycle, because changing access-control strategy can be relatively
    difficult.


    Generally speaking, a strong `AUTHZ` model defines which users can access which
    objects in the database. This is typically performed in SQL Database and SQL Server
    by defining relationships between logins, users, schemas, and rights.


    ### Creating Logins and Users


    A login account is used to manage authentication in SQL Database; it is a server-level
    entity. If you know a login account with its password, you can log in. A user
    is a database entity and is used for access control. The user determines which
    objects you can access and what actions you can perform. Each login can map to
    0 or 1 user in each database, including `master`.


    In SQL Database, you must be connected to the `master` database to manage your
    logins. The `CREATE LOGIN` T-SQL statement is partially supported. Also, remember
    that you must use a strong password when creating logins.


    SQL Database offers two new roles:


    *   **`LoginManager`**. Grants a user the ability to create new logins in the
    `master` database.

    *   **`DBManager`**. Grants a user the ability to create new databases from the
    `master` database.


    First let’s create a login account in the `master` database:


    ```sql

    CREATE LOGIN MyTestLogin WITH PASSWORD=''MyT3stL0gin''

    GO

    ```


    You can optionally grant this login access to `master`. The following code shows
    how to give that login access to the `master` database and grant the `LoginManager`
    role in the `master` database. If your intention is to only grant this login access
    to the user database, you can skip this step.


    ```sql

    CREATE USER MyTestLoginUser FROM LOGIN MyTestLogin

    GO

    EXEC sp_addrolemember ''loginmanager'', MyTestLoginUser

    GO

    ```


    In most cases you will want to create the login account in `master` and the user
    in the user database. The following code shows how to create the user in a user
    database with read rights. You must first connect to the user database or the
    statement below will fail.


    ```sql

    CREATE USER MyTestLoginUser FROM LOGIN MyTestLogin

    GO

    EXEC sp_addrolemember ''db_datareader'', MyTestLoginUser

    GO

    ```


    Now the `MyTestLogin` account can connect to your user database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 40](index-66_1.png)


    CHAPTER 3 ■ SECuRiTy


    Finally, you should note that the SQL Database admin account is always added as
    a user in every new SQL Database instance and is the `dbo` by default. This means
    that you do not need to create a user for the admin account. If you try to do
    so, you will receive an error saying the user already exists. For example, if
    my admin login account is `''hroggero''`, the following command will fail because
    the user is already created automatically and mapped to `dbo`:


    ```sql

    CREATE USER hroggero WITH LOGIN hroggero

    ```


    ```

    Msg 15007, Level 16, State 1, Line 1

    ''hroggero'' is not a valid login or you do not have permission.

    ```


    ### Schemas


    A `schema` is a container that holds database objects; schemas reside inside a
    database. Schemas are part of the three-part naming convention of database objects;
    they’re considered namespaces. Each object in a schema must have a unique name.


    By default, objects created are owned by the `DBO` schema when you connect with
    the `dbo` login. For example, the `CREATE TABLE` statement showed previously for
    the `UserProperties` table uses `DBO` as the schema owner (`schema_id` is always
    1 for `DBO`). See Figure [3-6.](#index_split_000.html#p66)


    ***Figure 3-6.** Viewing an object’s schema ownership*


    Right now, the new user `MyTestLoginUser` can’t read from this table. Attempting
    to issue a `SELECT` statement against `UserProperties` returns a `SELECT` permission
    denied error. So, you have a choice: you can either give that user account `SELECT`
    permission on that table, assign the user to the appropriate role, or create a
    schema for that user and assign the `SELECT` permission to the schema.


    It’s usually much easier to manage access rights through roles instead of users
    directly. However, if you want finer control over access rights, you should consider
    using schema-driven security. To do this properly, you need to change the ownership
    of the `UserProperties` table to a new schema (other than `DBO`) and then assign
    access rights to the schema.


    To create a new schema, you must be connected to the desired user database where
    `MyTestLoginUser` has been created. Then run the following statement:


    ```sql

    CREATE SCHEMA MyReadOnlySchema AUTHORIZATION DBO

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 41](index-67_1.png)


    ![Image 42](index-67_2.png)


    CHAPTER 3 ■ SECuRiTy


    At this point, a schema has been created; it’s owned by `DBO`. You now need to
    change the ownership of the `UserProperties` table to `MyReadOnlySchema`:


    ```sql

    ALTER SCHEMA MyReadOnlySchema TRANSFER DBO.UserProperties

    ```


    The table now belongs to the schema, as shown in Figure [3-7.](#index_split_000.html#p67)


    ***Figure 3-7.** Viewing the new schema owner*


    However, you aren’t done just yet. `MyTestLoginUser` can no longer see the table.
    Issuing a `SELECT` statement on the table returns an `Invalid object name` message,
    as shown in Figure [3-8](#index_split_000.html#p67).


    ***Figure 3-8.** Error when the user can’t see an object*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 43](index-68_1.png)


