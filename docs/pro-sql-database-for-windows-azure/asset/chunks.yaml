  trans: "\n与 SQL 数据库建立的加密网络连接会导致应用程序运行变慢，并可能显著影响您的应用程序设计。对于每次数据库调用都打开一个数据库连接、每次更新都执行一次往返（即*聊天式*应用程序）的应用程序，其性能会低于在单次调用中加载多个对象的数据并批量发送更改（*块状*应用程序）的应用程序。`LINQ\
    \ to SQL` 和 `Entity Framework` 是数据访问层，它们提供了对批量操作（对象上下文上的 `SaveChanges` 方法）使用的良好控制。\n\
    \n例如，如果您设计了一个包含大量业务规则的数据访问层，您的代码可能会执行许多次到数据库的往返，以加载执行业务规则所需的数据。如果是这种情况，您可以将某些数据密集型业务规则在存储过程中（靠近数据）实现，和/或使用缓存来避免不必要的往返。\n\
    \n## 延迟加载\n\n另一方面，尽管从性能角度来看减少往返次数是好的，但您应该只加载所需的数据，原因有二：加载的数据越多，如果数据在其所在数据中心之外被消耗，您为\
    \ SQL 数据库服务支付的费用就越高；并且加载超过必要的数据会减慢您的应用程序速度。因此，您可能需要考虑使用*延迟加载*机制，通过该机制，对象的某些属性仅在必要时才被加载。`LINQ\
    \ to SQL` 和 `Entity Framework 4.0` 支持延迟加载（通过使用 `DeferredLoadingEnabled` 属性）。\n\
    \n虽然延迟加载最小化了加载的数据量，但它可能会产生更频繁聊天的应用程序。重要的是要在使用批量数据传输和最小化运行应用程序功能所需的数据量之间取得适当的平衡。\n\
    \n## 缓存\n\n另一种用于最小化往返次数的重要技术是*缓存*。如果您的部分数据不经常更改，您的应用程序（或服务）可以使用缓存来避免不必要的往返。这也可能影响您的数据库设计选择。例如，如果您有一个存储州列表的表，该表可能长时间保持不变，这使其成为缓存的绝佳候选。\n\
    \n缓存可以在内存中或磁盘上（例如，在本地数据库中）执行。您有几个选项：\n\n• **ASP.NET 缓存。** ASP.NET 提供了一个缓存对象，具有良好的缓存功能。但是，ASP.NET\
    \ 缓存与 IIS 绑定。重启 IIS 会清除 ASP.NET 缓存，除非您已采取必要步骤来持久化缓存。\n• **Windows Server AppFabric。**\
    \ AppFabric 提供了一个下一代分布式缓存（以前称为 Velocity）。该缓存可以在多台计算机上运行，并通过 .NET API 提供。此缓存库仅适用于本地环境，不能在\
    \ Windows Azure 中使用。\n• **Windows Azure 缓存服务。** 此缓存服务是 Windows Server AppFabric\
    \ 缓存的一个子集。Azure 不支持其中一些方法。Azure 缓存服务仅适用于存储 IIS 会话状态，或其他键总是预先已知的键值对存储需求。但是，Azure\
    \ 缓存可以在本地实例上运行，这种方法利用了 memcache 协议。\n• **Enterprise Library。** Enterprise Library\
    \ 提供了一组由 Microsoft 在公共许可下提供的应用程序块。Enterprise Library 包含一个不依赖于 ASP.NET 的缓存机制。此缓存机制在\
    \ .NET 4.0 中原生提供，可在 `System.Runtime.Caching` 命名空间下找到。\n\n## 异步用户界面\n\n最终，性能是影响用户体验的一种度量，并且可以通过提供高响应性的用户界面在一定程度上进行控制。一个在加载数据时变得无响应的\
    \ Windows 应用程序，或一个在所有数据检索完毕之前不会加载的网页，会被认为是缓慢的。因此，使用多线程技术进行开发可能对于为用户提供更好的体验变得更加重要。\n\
    \n对于 Web 开发，您应考虑使用异步控件（如 AJAX），以便更好地控制部分页面加载。对于 Windows 开发，您可能需要使用多线程用户界面开发方法。\n\
    \n要在 WinForms 中实现高响应性应用程序，请使用 `Invoke` 方法（如下例第 3 行所示）在 UI 线程上刷新用户界面：\n\n```csharp\n\
    void OnPassCompleted()\n{\n    this.Invoke(new EventHandler(UpdateProgressBar),\
    \ null);\n}\n\nprivate void UpdateProgressBar(object o, System.EventArgs e)\n\
    {\n    if (progressBarTest.Value < progressBarTest.Maximum)\n    {\n        progressBarTest.Value++;\n\
    \    }\n}\n```\n\n在此示例中，`OnPassCompleted` 是主窗体接收的自定义事件，然后调用 `Invoke` 方法刷新进度条。对\
    \ `Invoke` 的调用强制进度条刷新在 UI 线程上执行，这与引发 `OnPassCompleted` 事件的线程不同。\n\n## 并行处理\n\n\
    除了异步用户界面之外，您的代码可能需要在多个处理器上执行。两个主要场景可能导致您为应用程序选择并行处理：\n\n• **大量计算。** 您的应用程序是 CPU\
    \ 密集型的，特别是如果计算可以相互独立。高级图形或复杂数学计算是 CPU 密集型操作的例子。\n• **大量等待。** 您的应用程序需要在每次调用之间等待，并且创建并行线程和聚合结果的成本微不足道。数据库分片就是一个例子：并行调用五个数据库大约比串行调用五个数据库快五倍。\n\
    \n编写并行进程有两个选择。如果可以，您应该使用任务并行库（`TPL`），因为它更简单：\n\n• **任务并行库。** `TPL` 是一个较新的库，由 Microsoft\
    \ 作为 .NET 4.0 的一部分提供。它允许您快速轻松地利用多个 CPU。您可以在 `System.Threading.Tasks` 下找到 `TPL`。\n\
    • **线程。** 使用 `System.Threading` 命名空间以传统方式管理线程为您提供了最大的灵活性。\n\n## 分片\n\n分片提供了另一种机制，通过该机制，您的代码几乎可以透明地针对任意数量的数据库进行读写操作。本章后面，您将使用第\
    \ 2 章中描述的读写分片（`RWS`）设计模式创建一个水平分区分片（`HPS`），并采用轮询访问方法。水平分区意味着所有数据库具有相同的模式，并且给定记录可以写入属于该分片的任何数据库。从性能角度来看，并行从多个数据库读取以搜索记录会产生更高的性能；但是，如果您需要执行更新回正确的数据库，您的代码必须保留线索。最后，使用分片需要并行处理以获得最佳性能。在第\
    \ 10 章中，您将探索*联合*，这是 SQL 数据库的一项功能，提供了构建数据库分片的内置能力。\n\n### 编码策略总结\n\n表 9-1 pr 总结了迄今为止讨论的关于在针对\
    \ SQL 数据库实例开发时考虑到性能的一些可用编码策略的概念。\n"
- fmt: '# Table 9-1. Coding Strategies to Design for Performance


    **Technique** | **Comments**

    --- | ---

    Bulk data loading/changing | Minimizes roundtrips by using a data access library
    that supports loading data in bulk, such as the `Entity Framework`.

    Lazy loading | Allows you to create objects for which certain properties are loaded
    only when first called, to minimize loading unnecessary data (and improve performance).
    The `Entity Framework` 4.0 supports this.

    Caching | Lets you to keep in memory certain objects that don’t change frequently.
    The caching application blocks provided by Microsoft offer this capability as
    well as expiration and scavenging configuration settings.

    Asynchronous user interface | Not technically a performance-improvement technique,
    but allows users to use the application while your code is performing a long-running
    transaction and thus provides a better user experience.

    Parallel processing | Allows you to run code on multiple processors for optimum
    performance. Although complex, this technique can provide significant performance
    advantages.

    Shards | Lets you to store data in multiple databases to optimize reads and spread
    the load of queries over multiple database servers.


    Because shards are considered a newer technology, the remainder of this chapter
    focuses on building an HPS using caching and parallel processing in order to improve
    performance and scalability.


    ## Building a Shard


    Let’s build a shard library that can be used by applications that need to load
    and update data against multiple SQL Database instances as quickly and transparently
    as possible. The shard we are building uses a collection of databases as its underlying
    storage; however, there is no data affinity. A record could be located in any
    database; the approach uses a round-robin insert mechanism when adding data. For
    the purpose of building an efficient shard library, you stipulate the following
    requirements for the shard:


    1.  Adding new databases should be simple and transparent to the client code.

    2.  Adding new databases shouldn’t affect performance negatively.

    3.  The library should function with `SQL Server`, `SQL Database`, or both.

    4.  The library should optionally cache results for fast retrieval.

    5.  The library should support mass or selective reads and writes.

    6.  Data returned by the library should be accepted as a data source for controls.


    These requirements have very specific implications from a technology standpoint.
    Table 9-2 outlines which requirements are met by which technology.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 144](index-190_1.png)


    Chapter 9 ■ Designing for high performanCe


    # Table 9-2. Technologies Used to Build the Shard


    **Technology** | **Requirement** | **Comment**

    --- | --- | ---

    Configuration file | The configuration file stores the list of databases that
    make up the shard, keeping the shard definition transparent to the code.

    Multithreading | Using the `TPL` lets the library spawn multiple threads to use
    computers with multiple CPUs, allowing parallel execution of `SQL` statements
    and thus improving performance.

    `SqlClient` | Using `SqlCommand` objects allows the shard to connect to both `SQL
    Database` and `SQL Server` databases.

    Caching | Caching lets the library store results temporarily to avoid unnecessary
    roundtrips.

    Breadcrumbs | The library creates a virtual column for each record returned that
    stores a breadcrumb identifying the database a record it came from, which supports
    selective writes.

    `DataTable` | The library returns a `DataTable` object that can be bound to objects
    easily and serve as a data source.


    ## Designing the Shard Library Object


    The library accepts requests directly from client applications and can be viewed
    as an `API`. Note that you’re using extension methods to make this `API` blend
    in with the existing `SqlCommand` class; this in turn minimizes the amount of
    code on the client and makes the application easier to read.


    Figure 9-1 shows where the library fits in a typical application design. It also
    shows how the library hides the complexity of parallel processing and caching
    from the client application. Finally, the shard library abstracts the client code
    from dealing directly with multiple databases.


    # Figure 9-1. Shard library object diagram


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Designing for high performanCe


    A sample application is provided to demonstrate how to use the shard library.
    Although the application you’ll build in the following sections is very simple,
    it uses all the features of the shard for reference.


    **Note**

    ■

    [Check http://EnzoSqlShard.Codeplex.com](http://EnzoSqlShard.Codeplex.com) for
    the latest shard library. this shard library is made available as an open source
    project. this project also contains a version of the library that understands
    sQL Database federations.


    ## Managing Database Connections


    This section walks through a few coding decisions that are necessary when creating
    this shard. Because the shard library needs to be able to connect to multiple
    databases, the client has two options to provide this list: it can provide the
    list of connections to use whenever it makes a call to the library, or it can
    preload the library with a list of connection objects that are then kept in memory
    for all future calls.


    The shard library declares the following property to hold the list of preloaded
    connection objects. The `ShardConnections` property is declared as `static` so
    it can be used across multiple calls easily; the client application only needs
    to set this property once:


    ```csharp

    public static List<SqlConnection> ShardConnections {get;set;}

    ```


    In addition, an extension method is added to `SqlConnection` to provide a `GUID`
    value that uniquely identifies a connection string. The connection `GUID` is critical
    for the shard; it provides a breadcrumb for every record returned by the shard.
    This breadcrumb is later used by the shard to determine, for example, which database
    to use when performing an update statement.


    The following code shows how a connection `GUID` is calculated. It uses the `SqlConnectionStringBuilder`
    helper class and another extension method on strings called `GetHash()` (on line
    8). This extension method returns an `SHA-256` hash value. Note that if the connection
    string doesn’t specify a default database (`Initial Catalog`), you assume the
    user is connected to the `master` database. This assumption is correct for `SQL
    Database`, but it may not hold true for `SQL Server`:


    ```csharp

    1. public static string ConnectionGuid(this SqlConnection connection)

    2. {

    3.     SqlConnectionStringBuilder cb = new SqlConnectionStringBuilder(connection.ConnectionString);

    4.     string connUID =

    5.         ((cb.UserID != null) ? cb.UserID : "SSPI") + "#" +

    6.         cb.DataSource + "#" +

    7.         ((cb.InitialCatalog != null) ? cb.InitialCatalog : "master");

    8.     string connHash = connUID.GetHash().ToString();

    9.     return connHash;

    10. }

    ```


    For reference, here is the extension method that returns a hash value for a string.
    Technically, you could use the string’s native `GetHashCode()` method. However,
    the built-in `GetHashCode` method varies based on the operating system used (32-bit
    or 64-bit) and the version of `.NET`. In this case, you create a simple `GetHash()`
    method that consistently returns the same value for a given input. The string
    value is first turned into an array of bytes using `UTF-8` (on line 3). The hash
    value is then computed on line 4. Line 5 returns the hash as a string value:


    ```csharp

    1. public static string GetHash(this string val)

    2. {

    3.     byte[] buf = System.Text.UTF8Encoding.UTF8.GetBytes(val);

    4.     byte[] res = System.Security.Cryptography.SHA256.Create().ComputeHash(buf);

    5.     return BitConverter.ToString(res).Replace("-", "");

    6. }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 145](index-192_1.png)


    Chapter 9 ■ Designing for high performanCe'
