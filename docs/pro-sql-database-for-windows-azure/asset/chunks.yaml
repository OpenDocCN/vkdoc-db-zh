    # 第 4 章 ■ 数据迁移与备份策略


    ## 图 4-1. "将数据库部署到 SQL Azure" 菜单选项


    如果尚未打开，请打开 `SQL Server 2012` 的 `SQL Server Management Studio`。在 **对象资源管理器** 中，展开服务器的
    `数据库` 节点，并右键单击 `AWMini` 数据库。从上下文菜单中选择 `任务 ➤ 部署到 SQL Azure 数据库`，这将启动数据库部署向导（参见图
    4-1）。


    在 `部署数据库` 向导中，在 `简介` 页面上单击 `下一步`。在向导的 `部署设置` 页面上，您需要指定数据库将要迁移到的目标 `SQL Azure`
    服务器的连接信息。单击 `连接` 按钮，这将弹出熟悉的 `连接到服务器` 对话框。输入 `SQL Azure` 服务器名称（格式为 `server.windows.database.net`），以及
    `SQL Azure` 服务器的用户名和密码，然后单击 `连接`。


    接下来，为数据库输入一个名称（参见图 4-2）。正如向导所述，这是一个**新建**数据库，而非现有数据库的名称。根据您本地数据库的大小，选择所需的 `版本`（`Web`
    或 `Business`），然后选择所需的数据库大小。向导会自动为您填入 `临时文件名`，因此没有理由更改它。但是请注意，向导创建的是 `BACPAC`，而不是
    `DACPAC`。这意味着您的数据也将被迁移。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 47](img/index-75_1.png)


    ## 图 4-2. DAC 部署设置


    单击 `下一步`，将显示向导的 `摘要` 页面。此页面包含一些重要信息，而不仅仅是“您在向导中选择的选项”。请注意，在摘要的 `源` 部分下，它列出了 `源数据库大小`，然后告知您您的源数据库可能大于上一向导页面选择的数据库大小。这并非需要恐慌的事情，但这是一个关键信息，提醒您务必确保所选版本和数据库大小足够大。


    在 `摘要` 页面上单击 `完成`，以开始部署和迁移。在图 4-3 中，您可以看到迁移过程中采取的步骤，包括创建目标数据库、创建并验证部署计划，然后通过将
    `BACPAC` 应用于目标数据库来执行该计划。部署完成后，单击 `关闭`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 48](img/index-76_1.png)


    ## 图 4-3. DAC 执行结果


    这个过程相当快。`AWMini` 数据库包含 10 个表，总共约 200,000 条记录，在我的系统上迁移用了不到一分钟。根据您的网络连接情况，您的结果可能会有所不同（抱歉听起来像广告），但即使是更大的数据库，如完整的
    `AdventureWorks` 数据库，也没有花更长多少时间。


    此选项是一种无中断迁移，用于将您的 `SQL Server` 数据库部署到 `SQL Azure`。这意味着一旦您单击 `完成`，部署就开始了。然而，图 4-2
    中 `临时文件名` 指定的 `BACPAC` 文件在迁移完成后**仍将存在**。根据数据库的大小，`DAC` 文件 (`.bacpac`) 可能相当大。即使是
    `AWMini` 数据库，文件大小也有 5.5 MB。很棒的一点是，如果您有一个可以打开大型 `XML` 文件的程序（并且有足够的内存），您可以查看 `BACPAC`
    的结构。


    此时的 `BACPAC` 文件可以被归档、删除或用于其他导入服务。在这个简单的例子中，`BACPAC` 存储在本地。然而，最佳实践指出，如果您要将数据库导入多个服务器或多次导入，您会希望将
    `BACPAC` 存储在 `Windows Azure` 存储中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)

