    2\. The next step in creating a data service on top of a relational database is
    to define a model used to drive your data service tier. The best way to do that
    is to use the ADO.NET Entity Framework, which allows you to expose your entity
    model as a data service. And to do


    that, you need to add a new item to your web project. Right-click the web project
    and select New Item. In the Add New Item dialog, select Data from the Categories
    list, and then select ADO.NET Entity Data Model from the Templates list. Give
    the model the name AW.


    edmx, and click OK.


    3\. In the first step of the Data Model Wizard, select the Generate from Database
    option, and click Next.


    4\. The next step is Choose Your Data Connection. Click the New Connection button,
    and create a connection to the AdventureWorks2012 SQL Database instance. Click
    OK in the


    connection dialog.


    5\. Back in the Entity Data Model Wizard, select the “Yes, include the sensitive


    data in the connection string” option. Save the entity connection settings as


    AdventureWorks2012Entities, and then click Next.


    6\. The next step of the wizard is the Choose Your Database Objects page. Select
    the Person.


    Person table. Note the option to pluralize or singularize generated objects names.
    If you leave this option checked, it comes into play later. Leave it checked,
    and click Finish.


    7\. The Entity Framework looks at all the tables you selected and creates a conceptual
    model on top of the storage schema that you can soon expose as a data service.
    In Visual Studio, you should see the Entity Framework Model Designer with a graphical
    representation of the table you selected, called *entities*. Close the Model Designer—you
    don’t need it for this example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 79](index-120_1.png)


    Chapter 5 ■ programming with SQL DatabaSe


    8\. What you need to do now is create the data service on top of your data model.
    In Solution Explorer right-click the web application and select Add; then select
    New Item. In the Add New Item dialog, select the Web category, and then scroll
    down the list of templates and select the WCF Data Service template. Enter a name
    of AWDataService and then click Add, as shown in Figure [5-10](#index_split_001.html#p120).


    ***Figure 5-10.** Adding a WCF Data Service to the Solution*


    When the ADO.NET Data Service is added to your project, the associated .cs file
    will automatically be displayed in the IDE. As you can see, the ADO.NET Data Service
    template has generated for you the beginnings of your data service.


    Connecting the Service to the Model


    Now you need to wire up your data service to your data model so that the service
    knows where to get its data. You know where to do this, because as you can see
    in the code it tells you where to enter that information. Thus, change the line:


    public class AWDataService : DataService< /* TODO: put your data source class
    name here */ > To:


    public class AWDataService : DataService< AdventureWorks2012Entities >


    Wiring up your data service to the model is as simple as that. Believe it or not,
    you’re ready to test your service.


    However, let’s finish what you need to do on this page. By default, the WCF Data
    Service is secured. The WCF Data Service needs to be told explicitly which data
    you want to see. The instructions in the code tell you this, as you can see in
    code in the InitializeService method. Some examples are even provided in the comments
    to help you out.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 80](index-121_1.png)


    Chapter 5 ■ programming with SQL DatabaSe


    For your example, you don’t want to restrict anything, so you really want to unlock
    all the entities and explicitly define access rights to the entity sets. You do
    this by adding the following code to the InitializeService method.


    This code sets the access rule for the specified entities to All, providing authorization
    to read, write, delete, and update data for the specified entity set:


    // This method is called only once to initialize service-wide policies.


    public static void InitializeService(DataServiceConfiguration config)


    {


    // TODO: set rules to indicate which entity sets and service operations are visible,
    updatable, etc.


    // Examples:


    config.SetEntitySetAccessRule("People", EntitySetRights.All);


    config.DataServiceBehavior.MaxProtocolVersion = DataServiceProtocolVersion.V2;


    }


    If you don’t feel like specifying each entity one by one, you can optionally specify
    all the entities with a single line, as follows:


    config.SetEntitySetAccessRule("*", EntitySetRights.All);


    This line assumes that you want to specify the same rights to all the entities.
    That’s not recommended, but it will do for this example. In a production environment
    you will want to be more specific about the rights you specify for each entity.


    There are other EntitySetRights options, such as AllRead, AllWrite, None, ReadSingle,
    and WriteAppend. This chapter won’t cover them all, but you can read about them
    here:


    [http://msdn.microsoft.com/en-us/library/system.data.services.entitysetrights.aspx](http://msdn.microsoft.com/en-us/library/system.data.services.entitysetrights.aspx)


    So far, you’ve created your Web application, added your data model, and added
    your WCF Data Service. Right now your Solution Explorer should look like Figure
    [5-11](#index_split_001.html#p121).


