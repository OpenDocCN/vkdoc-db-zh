    ## Query Execution


    `SELECT * FROM sys.tables`


    Running this query returns the list of tables currently found in your database.
    The query window and its result are shown in Figure [A-4](#index_split_002.html#p262).
    The output shows you a grid containing the fields as columns and a row for each
    table. A scrollbar shows up on the right if needed. Between the query window and
    results area, two links are provided: `Messages` and `Results`. The `Results`
    link is selected by default (it has a little downward arrow on top of it). Clicking
    on `Messages` will show you any associated message for the query, including any
    error messages. As in the SQL Server Management Studio, if an error is found,
    the `Messages` window would be shown by default instead of the `Results` window.


