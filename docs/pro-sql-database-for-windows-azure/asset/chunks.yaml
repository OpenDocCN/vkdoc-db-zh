    SaaS、PaaS 和 IaaS 被视为云计算的基本构建块。其他缩略词也正被创造出来，以描述云计算的新形态，例如桌面即服务（DaaS）、硬件即服务（HaaS），甚至研究即服务（RaaS）。很快，整个字母表都将被用来描述能在云中创建的各种服务形态。


    最近，私有云服务开始出现。与公有云服务相比，私有云提供了一个关键优势，因为它允许公司将数据保留在本地。这使得某些公司能够利用云计算的优势，而无需承担将数据存储在互联网上的相关风险。然而，私有云服务在其他方面提供的益处少于公有云托管。例如，按使用付费的承诺不再适用于私有云服务。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 2](img/index-9_1.png)


    # 第 1 章 ■ SQL 数据库入门


    ## 发现 Microsoft Azure 平台


    让我们来了解 Microsoft Azure 平台的三大主要组件：Windows Azure、Cloud Services 和 Windows Azure
    SQL Database。这三者都提供独特的功能，可构成构建高度可扩展和安全解决方案所需的完整服务阵列：


    • **Windows Azure。** 一套虚拟的 Microsoft 操作系统集合，可在云端运行您的 Web 应用程序和服务。例如，您可以创建一个将美元转换为欧元的
    Web 服务；然后，可以将其部署到 Windows Azure Web Site 上，并根据需要进行扩展。请注意，Windows Azure 可以运行 `.NET`
    应用程序以及其他平台，包括 PHP。


    • **Cloud Services。** 一组提供核心功能的服务，例如用于访问控制的联合身份验证，以及用于基于消息的发布者/订阅者拓扑的服务总线。


    • **SQL Database。** Microsoft 基于 Microsoft SQL Server 2012 的面向云计算的事务型数据库产品。例如，您可以使用
    SQL Database 将客户数据库存储在云中，并使用部署在 Windows Azure 中的服务来使用客户数据。


    Microsoft 还已经发布或即将发布其他值得注意的服务，包括缓存服务、高性能计算 (HPC) 以及用于 Azure 的 Apache Hadoop。随着时间的推移，可能会发布更多服务，提供更多利用云计算承诺的方式。


    图 1-1 展示了一个简化的公司环境连接到 Microsoft Azure 平台并使用各种 Azure 服务的示意图。此图被极度简化，但它传达了一个重要的信息：Microsoft
    Azure 旨在为 Web 应用程序、服务、消息传递和数据存储安全地扩展公司环境。


    ***图 1-1.** Microsoft Azure 平台概览*


    ## 为什么选择 Microsoft Azure？


    一个经常被问到的基本问题是，“为什么？”首先，谁对在 Windows Azure 中开发应用程序感兴趣？要回答这个问题，让我们看一下 Web 平台的演变。


    大约 20 年前，当公共互联网还是电子公告板系统（BBS）、Gopher 服务和 500 美元的 9600 波特调制解调器的时代，人们的问题是：“互联网作为一项技术会持续下去吗？”这个问题已经有了答案，但自那时以来，许多新概念已经发展起来，包括网站、托管中心和
    SaaS。


    这种演变依赖于一个共同的主题：*解耦*。BBS 将公共信息与图书馆解耦；网站将用户界面与计算机解耦；托管中心将硬件与公司自身的基础设施解耦；而 SaaS 则将复杂的应用程序与公司计算机解耦。


    Microsoft Azure 上的云计算是计算灵活性的一种自然演进，其中实际的物理存储和实现细节与软件解决方案解耦。例如，在 Windows Azure
    中部署服务不需要了解运行服务的机器或任何核心服务（`IIS`版本、操作系统补丁等）。您可能永远不会知道哪台机器在运行您的软件。


    您通过逻辑名称连接到 Windows Azure 服务器，而连接到 SQL Database 实例需要一个互联网地址而不是实际的服务器名称。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    将机器与数据和服务分离的能力本身非常强大。Microsoft 的 Azure 环境允许多种业务场景蓬勃发展，包括以下这些：


    • **季节性应用程序。** 开发倾向于随时间增长和收缩的网站或服务提供了潜在的节省机会，因为云计算采用按使用付费的模式。


    • **短生命周期。** 开发原型或生命周期短的应用程序也很有吸引力，例如活动注册网站。您还可以为远程团队构建开发和测试环境。


    • **分离存储。** 某些应用程序需要将存储保存在安全位置，但可能不需要频繁访问，或者可能需要高可用性。设计或修改应用程序，使数据既存储在本地，也存储在
    SQL Database（或其他数据存储格式）中，可能是有意义的。


    • **小公司和独立软件供应商 (ISV)。** 无法承担启动业务所需的大型复杂基础设施的小公司可以利用 Microsoft Azure 的财务和固有基础设施优势。独立软件供应商（ISV）也可以从云计算中受益。例如，ISV
    可以使用 SQL Database 存储应用程序日志，或集中来自多个分散位置的报告功能。


    有关使用 Azure 平台的设计模式和应用程序场景的更多信息，请参见第 2 章。


    ## 关于地理位置


    为了提供高可用性，Microsoft 建立了区域数据中心运营，允许客户选择地理上分散的服务。当您创建 Azure 服务器时，您需要指定服务器应在哪个地理位置进行配置。此功能称为
    *Windows Azure 地理位置*。


    最初，为了提升性能，选择公司所在的地理位置可能很诱人。然而，如果 Azure 服务的可用性比响应时间更重要，您可能需要选择另一个位置。


    选择地理位置时，请确保考虑以下因素：


    • **性能。** 当您的数据离用户更近时，网络延迟可能会显著降低，从而改善客户体验。


    • **灾难恢复。** 如果确保云平台的可用性很重要，您可能希望将服务和数据分散到多个区域。


    • **法律因素。** 考虑将存储在云中的信息类型，并确保您不受可能阻止您选择远程地理位置的特定法规和命令的约束。


    在撰写本文时，您可以从以下地理位置中选择一个，每个位置都由一个区域数据中心提供支持：


    • 东亚


    • 美国东部


    • 美国中北部


    • 北欧


    • 美国中南部


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 3](img/index-11_1.png)


    • 东南亚


    • 西欧


    • 美国西部

