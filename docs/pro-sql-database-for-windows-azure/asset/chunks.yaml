    -   **过于频繁的设计。** 如前所述，过于频繁的应用程序会使用过多的数据库往返通信，从而造成显著的性能下降。过于频繁设计的一个例子包括：创建一个编程循环，反复调用数据库来执行
    SQL 语句。

    -   **规范化。** 人们普遍认为，虽然高度规范化的数据库减少了数据重复，但由于需要包含大量的 `JOIN` 操作，通常也会导致性能下降。因此，过度的规范化可能成为性能问题。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 11 章 ■ 性能调优


    -   **连接释放。** 一般来说，应尽可能晚地打开数据库连接，并尽快显式关闭它。当你有大量连接请求时，这样做能提高你快速重用池中数据库连接的几率。实际上，连接在关闭时即从池中释放。如果你未能足够快地释放连接，可能会造成连接请求排队等待，直到池中有连接可用；或者如果等待时间过长，连接请求会超时。

    -   **共享数据库帐户。** 由于 SQL Database 要求数据库登录，你需要使用共享的数据库帐户来检索数据，而不是使用每个用户独立的登录帐户。使用每个用户独立的登录帐户会禁止使用连接池，并可能显著降低性能，甚至因资源调控而导致数据库无法使用。


    还有许多其他应用程序设计考虑因素，但此处列出的几点对于针对 SQL Database 编程最为适用。欲了解更多信息，请阅读 Microsoft 模式与实践部门的以下章节：


    [`msdn.microsoft.com/en-us/library/ff647768.aspx`](http://msdn.microsoft.com/en-us/library/ff647768.aspx)。


    ### 小结


    本章概述了一些可用于解决 SQL Database 性能问题的最重要调优技术。正如你所看到的，故障排除和调优语句可能很复杂，需要使用各种工具和方法来获得期望的结果。你了解了几个动态管理视图和执行计划，快速浏览了索引，并简要提及了由
    `ADO.NET` 库提供的统计信息。


    你还了解了一些可能影响应用程序性能的设计考量。


    你可以在 Microsoft 网站上发现更多技术和概念：


    [`msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx`](http://msdn.microsoft.com/en-us/library/ms190610(v=sql.105).aspx)。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## **第 12 章**


    ## **Windows Azure 移动服务**


    自本书第一版于 2010 年发布以来，SQL Azure OData 服务已被移除。这并非坏事。OData 依然存在，你仍然可以搭建一个 WCF 数据服务并通过
    OData 协议进行通信。


    事实上，如果你使用 `WCF Data Services`，那么你很可能就是在使用 `OData`。`WCF Data Services` 支持 `OData`
    协议，该协议允许你将数据作为资源可通过 `URI` 定址的源公开。`OData` 允许你从多种来源公开数据，范围从 Microsoft Excel 到网站，而不仅仅是关系数据库。


    创建公开 `OData` 源的数据服务实际上归结为三个简单的基本步骤：

    1.  **定义模型：** `WCF Data Services` 原生支持基于 `ADO.NET Entity Framework` 的模型。

    2.  **创建数据服务：** 定义一个继承自 `DataService` 类的数据服务。

    3.  **配置数据服务：** 配置对资源（如表）和服务操作的访问权限，并定义服务范围的行为。`WCF Data Services` 默认禁用对实体容器所公开资源的访问。


    然而，本章内容并非关于 `WCF Data Services` 或 `OData`。Windows Azure SQL Database（又名 SQL Azure）并不像在
    SQL Azure 实验室的 OData 服务时期那样原生支持 `OData`。相反，在 2012 年 8 月下旬，微软发布了（预览版）Windows Azure
    移动服务。


    Windows Azure 移动服务专为让开发者能够快速、轻松地将客户端应用程序连接到运行在 Windows Azure 上的云后端而设计，无论客户端运行在何种平台（如
    Windows 8 设备、Android 平板电脑或 iOS）。


    Windows Azure 移动服务的妙处在于，它通过为构建丰富的客户端体验提供基础，使你能够极其快速地启动和运行。正如你将在本章中看到的，Windows
    Azure 移动服务允许你非常快速地连接你的应用程序。


    ■ **注意** 请注意，此处的描述基于预览版的 Windows Azure 移动服务，意味着在撰写本文时它尚未正式发布，一些细节在实际发布时可能会有所变化。


    ### 入门


    要使用 Windows Azure 移动服务，你需要一个 Windows Azure 帐户。第 1 章解释了如何注册帐户，因此此处不再赘述。使用 Windows
    Azure 移动服务非常简单，只需导航到 Windows Azure 管理门户 [`manage.WindowsAzure.com`](https://manage.WindowsAzure.com)。一旦你使用
    Live ID 登录，你会在导航窗格中注意到一个名为“移动服务”的新选项卡，如图 12-1 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 186](img/index-245_1.jpg)


    ## 第 12 章 ■ Windows Azure 移动服务


    ***图 12-1.** 导航窗格上的移动服务选项*


    创建一个新的 Windows Azure 移动服务非常简单：在导航窗格中选择“移动服务”选项卡，选择门户底部的“新建”按钮，最后选择“创建”以调出“新建移动服务”向导，如图
    12-2 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 187](img/index-246_1.png)


    ## 第 12 章 ■ Windows Azure 移动服务


    ***图 12-2.** “新建移动服务”向导的第 1 页*


    “新建移动服务”向导的第一页要求你提供服务的名称。如你所见，服务名称实际上就是应用程序将要访问的 `URL`。你不需要指定完整的 `URL`，只需提供名称。


    如图 12-2 所示，我只需提供一个名称。服务将为我补全 `URL` 的剩余部分。

