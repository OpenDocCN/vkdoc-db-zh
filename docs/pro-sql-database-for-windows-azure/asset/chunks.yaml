    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 104](img/index-148_1.png)\n\
    \n首先，您可能是 SQL Server 复制的粉丝，但它并不是最容易设置和配置的功能。诚然，事务复制提供实时更新，但设置和维护事务复制并非易事。\n\n\
    其次，虽然 SQL Data Sync 不提供实时更新，但它确实允许您将数据扩展到最靠近用户的地点，而*无需* 大费周章。数据同步服务可让您在数据库之间无缝移动数据更改。它确保适当的更改不仅传播到当前数据中心的所有其他数据库，也传播到其他数据中心的数据库。\n"
- fmt: '# Chapter 7 ■ SQL Data Sync


    SQL Data Sync 是 Windows Azure 的一部分并在 Windows Azure 中运行，因此它可以利用 Web 工作角色和辅助工作角色。SQL
    Data Sync 的一个关键组件是使用了 Microsoft Sync Framework，这是一个 .NET Framework 中提供的同步平台。重要的是，所有这些同步功能都是为你提供的；同步
    SQL Database 实例时，你不需要运行任何应用程序或执行任何安装。但是，如果你需要将 SQL Database 与本地数据库同步，则必须安装客户端同步代理（Client
    Sync Agent），以便每个本地 SQL Server 数据库都可以注册并添加到同步组中。


    通过提供多个 SQL Database 实例和 SQL Server 之间的同步灵活性，你可以根据你的需求和业务要求创建自定义且灵活的同步组。


    ## 基本场景


    每个 SQL Database 同步环境都包含一个单一的中心数据库（`hub`）以及一个或多个成员数据库（`members`），或称为辐条（`spokes`），如图
    7-1 所示。中心是同步组中的核心数据库。辐条是与中心同步的成员数据库。设置同步包括在同步组中创建和定义同步组，指定中心数据库，然后将成员数据库分配给该中心。


    **图 7-1.** 同步场景


    让我们谈谈初始同步，因为理解这个过程以及发生的变化会很有帮助。初始同步发生时，这是一个两步过程：


    1.  中心数据库架构被复制到成员数据库。

    2.  数据从中心数据库复制到成员数据库。


    这看起来可能很简单，但我们来讨论一下这两个步骤中会发生什么。首先，你不需要自己生成目标（成员）数据库架构。在第一步中，Data Sync 服务会为你完成（针对你指定要同步的表）。作为此过程的一部分，外键约束**不会**被复制。这是因为截至目前，Data
    Sync 服务中尚未构建完整的架构同步能力。


    由于外键没有被复制，你可能会想，在成员处输入了可能破坏同步回中心的数据时会发生什么。答案是你可以控制数据应用的顺序，这有助于确保应用的更改不会影响任何外键约束。在初始同步期间，中心和成员数据库都会进行更改以有效跟踪数据更改。你将在本章后面的示例中看到此行为。


    下一步是在所有成员数据库配置完成后进行数据同步。成员的配置在初始同步期间进行。数据同步就像按照配置中指定的顺序将数据从中心复制到成员一样简单。由于成员数据库上没有外键，因此表不需要按特定顺序同步。但是，将表按照数据同步发生时更改应用的顺序添加是一个好习惯。这有助于确保更改以不影响任何外键约束的方式应用。


    ## 常见的同步场景


    许多企业中的一个常见需求是在不同位置之间分发数据。这些位置可能在地理上接近，也可能分散在全球不同地区。无论办公室位于何处，在位置之间共享、整合或迁移数据都是必要的常态。


    随着云计算变得更加主流，移动、分发和同步这些数据的能力变得更加关键。在云计算中，数据同步通常分为以下四类：


    -   将数据从本地数据突发到云中

    -   将来自多个位置的数据聚合到单个中心位置

    -   将数据从云备份到本地

    -   数据地理分布


    前两种场景侧重于本地应用程序可以利用和利用云来轻松扩展其本地基础设施并利用云环境的情况。例如，一家公司可能需要额外的计算能力但没有本地资源。通过将数据突发到云中，它可以轻松利用现成的云资源。


    数据聚合是许多企业中常见的场景，其中来自两个或多个卫星位置或合作伙伴企业的数据需要被拉取到单个中心位置。在当今的此类场景中，你通常会看到涉及 BizTalk
    或 SQL Server Integration Services 的解决方案。


    最后两种场景侧重于基于云的应用程序需求。常见情况包括需要将云数据的“备份”提供到本地位置。更常见的是需要地理分发数据，将数据移动到需要访问它的用户附近。


    然而，无论何种场景，Windows Azure SQL Data Sync 都提供了企业所需的数据同步和数据迁移解决方案。易于配置、快速部署、服务的可扩展性和可用性以及强大的功能使
    SQL Data Sync 成为所有这四种常见场景的可行解决方案。


    ## 架构


    了解 SQL Data Sync 的架构将有助于理解 SQL Database 中的报告工作原理。


    图 7-2 显示了 SQL Data Sync 的基本架构。


    ![Image 105](index-150_1.png)


    **图 7-2.** SQL Data Sync 服务架构


    SQL Data Sync 包含四个主要组件：


    -   SQL Data Sync 服务

    -   Windows Azure SQL Database

    -   Windows Azure Storage

    -   Data Sync Agent


    Windows Azure 管理门户是 SQL Data Sync 服务的用户界面。该服务负责执行同步、与 Windows Azure SQL Database
    和 Windows Azure Blob 存储通信，以及处理来自 Data Sync 代理和 Windows Azure 管理门户的传入请求。


    Windows Azure Blob 存储用于临时存储包含上传数据更改的批处理文件。


    该架构中的关键是 SQL Data Sync 服务本身。它是同步过程的核心。SQL Data Sync 服务与架构中的所有其他组件通信，并管理数据执行所有任务的流程。


    该架构背后的基本思想和概念如下：


    -   Data Sync 构建在 Windows Azure 公共平台上。

    -   你可以在 Windows Azure 平台上快速轻松地配置同步组并执行同步。


    与 SQL Reporting 一样，SQL Data Sync 管理在新的预览门户中尚不可用，因此本章将使用现有 Silverlight 门户中的 SQL
    Data Sync 进行说明。


    ## 配置同步


    现在你已经熟悉了 Data Sync 服务工作原理的基础，让我们深入研究并为 SQL Data Sync 配置一个新的同步，以便同步两个数据库。此示例同步了与第
    6 章中使用的相同的 Windows Azure SQL Database 的 `AdventureWorks` 数据库。你可以在此处找到该数据库和安装说明：


    [http://msftdbprodsamples.codeplex.com/releases/view/3704](http://msftdbprodsamples.codeplex.com/releases/view/3704)'
  raw: 'SQL Data Sync is part of Windows Azure and runs in Windows Azure, so it can
    take advantage of the web and worker roles. A key component of SQL Data Sync is
    its use of the Microsoft Sync Framework, a synchronization platform provided in
    the .NET Framework. The great thing is that all this synchronization functionality
    is provided for you; there is no application you need to run or installation you
    need to perform when synchronizing SQL Database instances. However, if you need
    to sync to a database on-premises with SQL Database, a Client Sync Agent must
    be installed to allow each on-premises SQL Server database to be registered and
    then added to a sync group.


    By providing the synchronization flexibility between multiple SQL Database instances
    and SQL Server, you can create custom and flexible sync groups that are tailored
    to your needs and business requirements.


    The Basic Scenario


    Every SQL Database synchronization environment includes a single database *hub*
    and has one or more database *members*, or *spokes*, as shown in Figure [7-1](#index_split_001.html#p148).
    The hub is the central database in a synchronization group. A spoke is a member
    database which synchronizes with the hub. Setting up synchronization includes
    creating and defining a synchronization group in which you specify the hub database
    and then assigning the database members to that hub.


    ***Figure 7-1.** Data Sync scenarios*


    Let’s talk about the initial synchronization for a minute, because it’s helpful
    to understand the process and changes that take place. When the initial sync takes
    place, it’s a two-step process:


    1\. The hub database schema is copied to the member database(s).


    2\. The data is copied from the hub database to the member database(s).


    This may seem simple, but let’s discuss what happens during these two steps. First,
    you don’t have to generate the target (member) database schemas yourself. During
    the first step, the Data Sync service does that for you (for the tables you specify
    to sync). As part of this process, foreign key constraints are *not* copied. This
    is because a full schema synchronization capability hasn’t been built into the
    Data Sync service as of yet.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ SQL Data SynC


    Because foreign keys aren’t copied, you may be wondering what happens in the scenario
    where data is entered at the member that could potentially break synchronization
    back to the hub. The answer is that you can control the order in which data is
    applied, and this helps make certain the changes that are applied don’t affect
    any foreign key constraints. During the initial sync, changes are made to both
    the hub and member databases to effectively track data changes. You’ll see this
    behavior in the example later in this chapter.


    The next step in the process is the data synchronization that takes place after
    all the member databases are provisioned. Provisioning of the members takes place
    during the initial sync. Data synchronization is as simple as copying the data
    from hub to member in the order specified in the configuration. Because there
    are no foreign keys on the member databases, there is no particular order in which
    the tables need to be synchronized. However, it’s a good practice to add the tables
    in the order in which the changes will be applied when a data sync occurs. This
    helps you ensure that the changes are applied in a way that doesn’t affect any
    foreign-key constraints.


    Common Data Sync Scenarios


    A common requirement in many businesses is the need to distribute data among different
    locations. These locations could be located geographically close or spread out
    globally in different parts of the world. Regardless of where offices are located,
    the need to share, consolidate, or migrate data between locations is a necessary
    commonplace.


    As the move toward cloud computing becomes more mainstream, the ability to move,
    distribute, and synchronize that data becomes more critical. In cloud computing,
    data synchronization typically falls into one of four categories:


    • Bursting data from on-premises data into the cloud


    • Aggregating data from multiple locations into a single, central location


    • Backing data up from the cloud to on-premises


    • Data geo-distribution


    The first two scenarios focus on situations where on-premises applications can
    leverage and utilize the cloud to easily expand their on-premises infrastructure
    and take advantage of the cloud environment. For example, a company may have the
    need of additional computational power but doesn’t have the on-premises resources.
    By bursting the data into the cloud it can easily take advantage of the readily
    available cloud resources.


    Data aggregation is a common scenario among many businesses, in which data from
    two or more satellite locations or partner businesses need to be pulled into a
    single, central location. In scenarios like this today you will typically see
    solutions involving BizTalk or SQL Server Integration Services.


    The last two scenarios focus on cloud-based application requirements. Common situations
    include the need to provide a “backup” of cloud data to an on-premises location.
    Yet more commonly seen is the need to distribute data geographically, moving data
    closer to the users who need access to it.


    Regardless of the scenario, however, Windows Azure SQL Data Sync provides the
    data synchronization and data migration solutions needed by businesses. The ease
    and speed of configuration, scalability and availability of the service, and powerful
    features make SQL Data Sync a viable solution for all four of these common scenarios.


    Architecture


    It will be helpful to look at the architecture of SQL Data Sync to get a feel
    for how reporting works in SQL Database.


    Figure [7-2 sho](#index_split_001.html#p150)ws the basic architecture of SQL Data
    Sync.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 105](index-150_1.png)


    Chapter 7 ■ SQL Data SynC


    ***Figure 7-2.** SQL Data Sync service architecture*


    SQL Data Sync comprises four main components:


    • SQL Data Sync service


    • Windows Azure SQL Database


    • Windows Azure Storage


    • Data Sync Agent


    The Windows Azure Administration portal is the user interface to the SQL Data
    Sync service. This service is responsible for executing the synchronization, communication
    with the Windows Azure SQL Database and Windows Azure Blob storage, and handling
    receiving incoming requests from the Data Sync agent and the Windows Azure Administration
    portal.


    Windows Azure Blob storage is used for the temporary storage of batch files containing
    the uploaded data changes.


    The key in the architecture is the SQL Data Sync service itself. It is the heart
    of the synchronization process. The SQL Data Sync service communicates with all
    the other components in the architecture and manages the flow of data execution
    of all tasks.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 7 ■ SQL Data SynC


    The basic idea and concept behind this architecture is the following:


    • Data Sync is built on the Windows Azure public platform.


    • You can configure a sync group and perform a sync quickly and easily on the
    Windows Azure Platform.


    As with SQL Reporting, SQL Data Sync management is not yet available in the new
    Preview portal, so this chapter will illustrate using SQL Data Sync in the existing
    Silverlight portal.


    Configuring Synchronization


    Now that you’re familiar with the foundation of how the Data Sync service works,
    let’s dive in and configure a new sync for SQL Data Sync, in order to sync two
    databases. This example synchronizes the same AdventureWorks database for Windows
    Azure SQL Database used in Chapter 6\. You can find this database and instructions
    for installing it here:


    [http://msftdbprodsamples.codeplex.com/releases/view/3704](http://msftdbprodsamples.codeplex.com/releases/view/3704)'
  trans: '# 第 7 章 ■ SQL 数据同步


    SQL 数据同步是 Windows Azure 的一部分并在 Windows Azure 中运行，因此它可以利用 Web 工作角色和辅助工作角色。SQL 数据同步的一个关键组件是使用了
    **Microsoft 同步框架**，这是一个 .NET Framework 中提供的同步平台。重要的是，所有这些同步功能都是为你提供的；同步 SQL 数据库实例时，你不需要运行任何应用程序或执行任何安装。但是，如果你需要将
    SQL 数据库与本地数据库同步，则必须安装**客户端同步代理**（Client Sync Agent），以便每个本地 SQL Server 数据库都可以注册并添加到同步组中。


    通过提供多个 SQL 数据库实例和 SQL Server 之间的同步灵活性，你可以根据你的需求和业务要求创建自定义且灵活的同步组。


    ## 基本场景


    每个 SQL 数据库同步环境都包含一个单一的中心数据库（`hub`）以及一个或多个成员数据库（`members`），或称为辐条（`spokes`），如图 7-1
    所示。中心是同步组中的核心数据库。辐条是与中心同步的成员数据库。设置同步包括在同步组中创建和定义同步组，指定中心数据库，然后将成员数据库分配给该中心。


    **图 7-1.** 同步场景


    让我们谈谈初始同步，因为理解这个过程以及发生的变化会很有帮助。初始同步发生时，这是一个两步过程：


    1.  中心数据库架构被复制到成员数据库。

    2.  数据从中心数据库复制到成员数据库。


    这看起来可能很简单，但我们来讨论一下这两个步骤中会发生什么。首先，你不需要自己生成目标（成员）数据库架构。在第一步中，Data Sync 服务会为你完成（针对你指定要同步的表）。作为此过程的一部分，外键约束**不会**被复制。这是因为截至目前，Data
    Sync 服务中尚未构建完整的架构同步能力。


    由于外键没有被复制，你可能会想，在成员处输入了可能破坏同步回中心的数据时会发生什么。答案是你可以控制数据应用的顺序，这有助于确保应用的更改不会影响任何外键约束。在初始同步期间，中心和成员数据库都会进行更改以有效跟踪数据更改。你将在本章后面的示例中看到此行为。


    下一步是在所有成员数据库配置完成后进行数据同步。成员的配置在初始同步期间进行。数据同步就像按照配置中指定的顺序将数据从中心复制到成员一样简单。由于成员数据库上没有外键，因此表不需要按特定顺序同步。但是，将表按照数据同步发生时更改应用的顺序添加是一个好习惯。这有助于确保更改以不影响任何外键约束的方式应用。


    ## 常见的同步场景


    许多企业中的一个常见需求是在不同位置之间分发数据。这些位置可能在地理上接近，也可能分散在全球不同地区。无论办公室位于何处，在位置之间共享、整合或迁移数据都是必要的常态。


    随着云计算变得更加主流，移动、分发和同步这些数据的能力变得更加关键。在云计算中，数据同步通常分为以下四类：


    -   将数据从本地数据突发到云中

    -   将来自多个位置的数据聚合到单个中心位置

    -   将数据从云备份到本地

    -   数据地理分布


    前两种场景侧重于本地应用程序可以利用和利用云来轻松扩展其本地基础设施并利用云环境的情况。例如，一家公司可能需要额外的计算能力但没有本地资源。通过将数据突发到云中，它可以轻松利用现成的云资源。


    数据聚合是许多企业中常见的场景，其中来自两个或多个卫星位置或合作伙伴企业的数据需要被拉取到单个中心位置。在当今的此类场景中，你通常会看到涉及 BizTalk
    或 SQL Server Integration Services 的解决方案。


    最后两种场景侧重于基于云的应用程序需求。常见情况包括需要将云数据的“备份”提供到本地位置。更常见的是需要地理分发数据，将数据移动到需要访问它的用户附近。


    然而，无论何种场景，Windows Azure SQL Data Sync 都提供了企业所需的数据同步和数据迁移解决方案。易于配置、快速部署、服务的可扩展性和可用性以及强大的功能使
    SQL Data Sync 成为所有这四种常见场景的可行解决方案。


    ## 架构


    了解 SQL Data Sync 的架构将有助于理解 SQL 数据库中的报告工作原理。


    图 7-2 显示了 SQL Data Sync 的基本架构。


    ![Image 105](img/index-150_1.png)


    **图 7-2.** SQL Data Sync 服务架构


    SQL Data Sync 包含四个主要组件：


    -   SQL Data Sync 服务

    -   Windows Azure SQL 数据库

    -   Windows Azure 存储

    -   Data Sync 代理


    Windows Azure 管理门户是 SQL Data Sync 服务的用户界面。该服务负责执行同步、与 Windows Azure SQL 数据库和 Windows
    Azure Blob 存储通信，以及处理来自 Data Sync 代理和 Windows Azure 管理门户的传入请求。


    Windows Azure Blob 存储用于临时存储包含上传数据更改的批处理文件。


    该架构中的关键是 SQL Data Sync 服务本身。它是同步过程的核心。SQL Data Sync 服务与架构中的所有其他组件通信，并管理数据执行所有任务的流程。


    该架构背后的基本思想和概念如下：


    -   Data Sync 构建在 Windows Azure 公共平台上。

    -   你可以在 Windows Azure 平台上快速轻松地配置同步组并执行同步。


    与 SQL Reporting 一样，SQL Data Sync 管理在新的预览门户中尚不可用，因此本章将使用现有 Silverlight 门户中的 SQL
    Data Sync 进行说明。


    ## 配置同步


    现在你已经熟悉了 Data Sync 服务工作原理的基础，让我们深入研究并为 SQL Data Sync 配置一个新的同步，以便同步两个数据库。此示例同步了与第
    6 章中使用的相同的 Windows Azure SQL 数据库的 `AdventureWorks` 数据库。你可以在此处找到该数据库和安装说明：


    [`msftdbprodsamples.codeplex.com/releases/view/3704`](http://msftdbprodsamples.codeplex.com/releases/view/3704)'
- fmt: '# Provision a SQL Data Sync Server


    This database will be the hub database. Additionally, this example will utilize
    two member databases; one located on-premises and another SQL Database. My second
    SQL Database will be located in a second region to illustrate regional synchronization,
    but if you are walking through this example feel free to put the second SQL Database
    in the same region.


    Log in to the portal with your `LiveID` at [https://windows.azure.com](https://windows.azure.com).
    The first task is to provision a Data Sync server.


    The Navigation pane is broken into two sections. The lower section contains the
    components and services available in the Management Portal. The top section shows
    either a list of available subscriptions linked to your `LiveID`, or helpful links
    to get started as shown in Figure 7-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 106](index-152_1.jpg)


    **Figure 7-3.** The Data Sync option in the Navigation pane


    Follow these steps to provision the Data Sync server:


    1.  Select the **Data Sync** option in the Navigation pane, and then select the
    subscription in which you would like to provision and configure SQL Data Sync.
    The menu bar along the top and the list item section in the center of the portal
    will change based on the options selected. When you select the subscription, the
    only option on the menu bar and in the list item section is to provision a new
    Data Sync server.

    2.  To provision a new Data Sync server, simply click either the button on the
    menu bar or the link in the list item section. Either option will display the
    **Provision** dialog. First you’ll see the **Terms of Use**. Click the “I agree
    to the Terms of Use statement above” check box and click **Next**.

    3.  The next step of the **Provision** dialog asks you to select the **Subscription**
    in which you want to provision the Data Sync server. Yes, you selected the subscription
    in the Navigation pane but in case you change your mind and want to select a different
    subscription, you can do it here instead of starting over. Select the subscription
    and click **Next**.

    4.  Lastly, select the region in which you want to provision the server. Typically
    you’ll want to provision this server wherever your hub database is to limit the
    amount of data traffic. Select the region and click **Finish**.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 107](index-153_1.png)


    The provisioning process takes only a few seconds. However, you’ll notice that
    you don’t get a server name per se, but a logical server in which you can configure
    your data synchronization. For example, if you provision your server in North
    Central US, your Data Sync server is listed as “North Central US.”


    # Creating a Sync Group


    The next step is to create and configure a *sync group*. A sync group is a collection
    of SQL Database instances and SQL Server databases that are configured for mutual
    synchronization. A sync group contains a single *hub* database and one or more
    *member* databases. The hub database must be a SQL Database instance.


    In the top section of the navigation pane, expand the node that lists your new
    Data Sync server. Underneath that node you will see two subnodes, labeled **Sync
    Groups** and **Member Databases**. Select the **Sync Groups** node, and as shown
    in Figure 7-4 there are several options for creating a sync group.


    **Figure 7-4.** Creating a sync group


    If you are new to SQL Data Sync, the two options under **Getting Started with
    SQL Data Sync** provide a step-by-step walkthrough of creating different sync
    groups types. The first option creates an on-premises–to–SQL Database sync group.
    The second option creates a sync group between multiple SQL Database instances.


    Notice, however, that there is a third option. In the **Sync Group** section of
    the ribbon is an enabled button called **Create**. The example in this chapter
    will use that button. Go ahead and click that button. Instead of providing a step-by-step
    walkthrough, you are presented with the entire template to configure, as shown
    in Figure 7-5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 108](index-154_1.png)


    **Figure 7-5.** Creating a Sync Group


    This “template” is quite easy to navigate through. The blue section is where you
    add “cloud” or SQL Database instances and the yellow section is where you add
    on-premises SQL Server databases. The section on the right is for Sync Group configuration
    such as defining the sync schedule, the data you want to synchronize, and the
    conflict resolution policy. Again, keep in mind that all of this is accomplished
    without writing a single line of code.


    Whether you use one of the walkthrough options or simply decide to work from a
    blank template to create your sync group, either way you need to name the sync
    group. It doesn’t matter what you call it, but make it meaningful. Later on we’ll
    discuss best practices and believe it or not, what you name your sync group is
    important.


    ## Defining the Hub and Member Databases


    The first step is to define the hub database. To do so, simply click the center
    icon labeled “Click to add a Windows Azure SQL Database as the Sync Hub.” Yeah,
    pretty obvious. Clicking that icon brings up the **Add Database to Sync Group**
    dialog shown in Figure 7-6.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 109](index-155_1.png)


    **Figure 7-6.** Adding the hub


    In the **Add Database to Sync Group** dialog, enter the server name, database
    name, and credentials for the hub database, and then click **Add**. For this example,
    you should use the `AdventureWorks2012` database.


    Notice now that the icon in the sync group now displays the database name and
    server name. It also contains two vital pieces of information. First, it says
    “Not Deployed.” This means that even though we have marked this database as the
    hub, we actually haven’t provisioned the database for synchronization.


    Second, the icon shows a small, green circle, indicating that the Data Sync service
    can successfully connect to and communicate with the SQL Database instance.


    **Note:** the icon will display a red X if it cannot communicate with the SQL
    Database instance. If this is the case, you should either look at the Firewall
    rules to ensure that a rule has been added for your `Ip address`, or check the
    credentials to ensure they were entered correctly.


    The next step is to provision the member databases. We’ll first provision the
    SQL Database member by clicking the icon labeled “Click to add a Windows Azure
    SQL Database.” Again, pretty obvious. This brings up a dialog similar to the one
    for the hub. Enter the server name, database name, and credentials for the member
    database.


    This dialog, however, contains an additional configuration for setting the **Sync
    Direction**. Sync Direction simply specifies which direction the data is being
    synchronized. There are three options:


    -   **Bi-Directional:** Data is synchronized in both directions between hub and
    member.

    -   **Sync to the Hub:** Data is synchronized from the member to the hub only.

    -   **Sync from the Hub:** Data is synchronized to the member from the hub only.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 110](index-156_1.png)


    The default is **Bi-Directional**, and that is the option this example will use.
    Click **Test** to test the connection and make sure all the information entered
    is correct; then click **Add**. Notice that the member icon now looks similar
    to the Hub icon, indicating that it also is awaiting provisioning.'
