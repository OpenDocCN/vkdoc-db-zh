    \    \n    **第 5 章 ■ 使用 SQL 数据库编程**\n    \n    对于您的示例，您不想限制任何内容，因此您确实希望解锁所有实体并显式定义对实体集的访问权限。您可以通过向`InitializeService`方法添加以下代码来实现此目的。\n\
