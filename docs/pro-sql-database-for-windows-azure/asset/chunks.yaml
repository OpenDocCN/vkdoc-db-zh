    ADO.NET, so let’s move on to the other connection option, ODBC.


    ODBC


    There is nothing earth-shattering or truly groundbreaking here, but let’s walk
    though an example to see how ODBC


    connections work and illustrate that your ODBC classes still work as you’re used
    to. Follow these steps: 1.


    Do this the proper way and create an enumeration to handle the type of connection
    you’re using.


    2.


    Modify the GetConString method as shown in the following snippet to take a parameter.


    The parameter lets you specify the connection type so you can return the correct
    type of connection string (either ADO.NET or ODBC). Be sure to use your correct
    password,


    username, and server name with the correct server. If the value of ADO_NET is
    passed into this method, the ADO.NET connection string is returned; otherwise
    the ODBC connection string is returned:


    enum ConnType


    {


    ADO_NET = 1,


    ODBC = 2


    }


    string GetConString(ConnType connType)


    {


    if (connType == ConnType.ADO_NET)


    return "Server=tcp: *servername*.database.windows.net;Database=AdventureWorks2012;
    User ID= *username*@ *servername*;Password= *password*;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    Trusted_Connection=False;Encrypt=True;";


    else


    return "Driver={SQL Server Native Client


    10.0};Server=tcp: *servername*.database.windows.net;


    Database=AdventureWorks2012;Uid= *username*@servername;Pwd= *password*;Encrypt=yes;";


    }


    3\. Add the following declaration to the project:


    using System.Data.Odbc;


    4\. Place a second button on the form, along with a DataGridView. In its click
    event, add the following code. This code is just like the code from the ADO.NET
    example, but it uses the Odbc data classes versus the Sql data classes. For clarity,
    change the Text property of this new button to “ODBC” so you know the difference
    between this button and the first.


    Notice in the code that the value “ODBC” is passed in the GetConString method,
    returning the ODBC connection string:


    string connStr = GetConString(ConnType.ODBC);


    using (OdbcConnection conn = new OdbcConnection(connStr))


    {


    try


    {


    conn.Open();


    OdbcDataAdapter da = new OdbcDataAdapter();


    OdbcCommand cmd = new OdbcCommand("SELECT FirstName, LastName FROM Person.


    Person", conn);


    cmd.CommandType = CommandType.Text;


    da.SelectCommand = cmd;


    DataSet ds = new DataSet("Person");


    da.Fill(ds);


    listBox1.DataSource = ds.Tables[0];


    dataGridView1.DataSource = ds.Tables[0];


    listBox1.DisplayMember = "FirstName";


    }


    catch (OdbcException ex)


    {


    MessageBox.Show(ex.Message.ToString());


    }


    }


    5\. Before the project is run, you need to modify the code behind the first button
    to pass the appropriate Enum and return the appropriate connection string. Add
    the following line to the beginning of the code behind Button1:


    string connStr = GetConString(ConnType.ADO_NET );


