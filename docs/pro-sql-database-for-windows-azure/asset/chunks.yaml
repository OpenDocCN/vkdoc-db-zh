    # 引言


    Windows Azure SQL Database，正式名称为 SQL Azure，大约在五年前出现。当时，人们对它知之甚少，但微软已经开始大量谈论 Azure
    平台。大多数人认为 SQL Azure 是另一个 NoSQL 产品，而实际上它从来都不是。那时，它能处理的最大数据库是 1GB，并没有多少人认真对待它。从那时起，Windows
    Azure SQL Database 已经发展成为一个基于久经验证的 SQL Server 技术、企业就绪的 PaaS（平台即服务）产品。

    '
- fmt: 'Cloud computing is not hype anymore. Today, cloud-based solutions are becoming
    the norm rather than an afterthought or sitting on the fringe. The benefits of
    the Windows Azure cloud platform, including Windows Azure SQL Database, allow
    businesses to rapidly create and scale solutions with low acquisition costs, yet
    provide high availability and interoperability. SQL developers and DBAs can use
    existing skills and knowledge to extend their on-premises solutions and quicken
    cloud development time. This book covers the fundamental Windows Azure SQL Database
    concepts, practices, and approaches your valuable data needs as it prepares for
    the journey to the cloud and Windows Azure SQL Database.


    Because of the rapid pace at which Windows Azure SQL Database is updated, some
    of the services discussed in this book are in Preview as we write and may change
    somewhat by the time you read this. However, we have tried our best to bring you
    the most up-to-date information. Updated information can be found at our blogs,
    the Windows Azure blog (http://blogs.msdn.com/b/windowsazure/), and the all-important
    Windows Azure home page (http://www.windowsazure.com/) where you can find features,
    pricing, developer information, and much more.


    Our hope is that after reading this book you have a better understanding of, and
    appreciation for, Windows Azure SQL Database. Whether you are just getting started
    with it or are a “seasoned veteran,” each chapter contains scenarios and information
    that we hope you will find helpful and beneficial as you design and build Windows
    Azure projects. There also is a plethora of source code that is used in chapters
    where examples are given.


    ## Who This Book Is For


    *Pro SQL Database for Windows Azure, 2nd Edition* is aimed at developers and database
    administrators who want instant access to a fully-capable SQL Server database
    environment without the pain of sorting out and managing the physical infrastructure.


    ## How This Book Is Structured


    *Pro SQL Database for Windows Azure* is designed to take you from knowing almost
    nothing at all about SQL Database to being able to configure and deploy it for
    use by production applications. The book does assume a knowledge of databases
    in general, and of SQL in general. From that base, the book takes you from the
    point of getting started through performance tuning and the use of other Azure
    Data Services.


    xxv


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### ■ IntroduCtIon


    Chapters in the book are as follows:


    Chapter 1 *, Getting Started with SQL Database,* helps you create your first database
    in the cloud.


    Chapter 2 *, Design Considerations,* discusses design issues you should think
    about when creating an application to run against a database that is cloud-based
    instead of one hosted in your own data center.


    Chapter 3 *, Security,* covers the all-important issue of securing your data in
    a scenario in which it is accessed across the public Internet.


    Chapter 4 *, Data Migration and Backup Strategies,* helps you move data efficiently
    into and out of SQL Database. It also covers backup strategies to protect yourself
    in the event of your database being lost or damaged.


    Chapter 5 *, Programming with SQL Database,* covers the differences between using
    SQL Database from on-premises applications and from Azure-hosted applications.


    Chapter 6 *, SQL Reporting,* shows how to create cloud-based reports.


    Chapter 7 *, SQL Data Sync,* Covers replication between multiple SQL Database
    instances, and between SQL Database in the cloud and SQL Server within your data
    center.


    Chapter 8 *, Windows Azure and ASP.NET,* provides an example and guidance for
    building ASP.NET applications backed by Windows Azure and SQL Database.


    Chapter 9 *, Designing for High Performance,* covers topics and features such
    as sharding, lazy loading, caching, and others that are important in building
    highly performant applications.'
