    ## 缓存


    为了最小化到源数据库的往返次数，分片库提供了一个可选的缓存机制。该库中使用的缓存技术提供基本功能，并且可以扩展以处理更复杂的场景。该库的目标是在每次请求时缓存每个数据库后端的整个
    `DataTable`。


    图 [9-6](#index_split_002.html#p196) 显示了缓存方法的逻辑决策树。重要的是要注意，该库根据每个参数、参数值、每个SQL语句和数据库的GUID计算一个缓存键。


    **图 9-6. 缓存逻辑**


    当您连接到SQL数据库时，缓存的效果是可见的。考虑到第一次连接到SQL数据库实例最多需要250毫秒，内存访问速度要快得多。随着分片中记录数量的增加和数据库数量的增加，缓存的重要性也随之增加。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 9 章 ■ 为高性能而设计


    该库提供的缓存还提供了一个生存时间（TTL）机制，该机制实现绝对过期或滑动过期方案。绝对过期在未来特定时间自动重置缓存，而滑动设置在缓存项在过期前被使用时移动过期时间。


    以下代码展示了缓存是如何实现的。第1行创建了一个 `CacheItemPolicy`，用于定义缓存的行为。第3行实现了滑动窗口缓存，第5行实现了绝对方法：


    ```csharp

    1. CacheItemPolicy cip = new CacheItemPolicy();

    2. if (UseSlidingWindow)

    3. cip.SlidingExpiration = defaultTTL;

    4. else

    5. cip.AbsoluteExpiration = new DateTimeOffset(System.DateTime.Now.Add(defaultTTL));

    6. MemoryCache.Default.Add(cacheKey, dt, cip);

    ```'
