    Chapter 9 ■ Designing for high performanCe


    Caching


    To minimize roundtrips to the source databases, the shard library provides an
    optional caching mechanism. The caching technique used in this library offers
    basic capabilities and can be extended to address more complex scenarios. The
    objective of this library is to cache the entire DataTable of each database backend
    whenever requested.


    Figure [9-6 sho](#index_split_002.html#p196)ws the logical decision tree of the
    caching approach. It’s important to note that this library calculates a cache
    key based on each parameter, the parameter value, each SQL statement, and the
    database’s GUID.


    ***Figure 9-6.** Caching logic*


    The effect of the cache is visible when you connect to SQL Database. Considering
    that connecting to a SQL


    Database instance takes up to 250 milliseconds the first time, memory access is
    significantly faster. The importance of the cache increases as the number of records
    increases and the number of databases increases in the shard.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Designing for high performanCe


    The cache provided by this library also provides a time-to-live (TTL) mechanism
    that implements either an absolute expiration or a sliding expiration scheme.
    An absolute expiration resets the cache automatically at a specific time in the
    future, whereas the sliding setting moves the expiration time if the cache items
    are used before expiring.


    The following code shows how the caching is implemented. Line 1 creates a CacheItemPolicy
    used to define the behavior of the cache. Line 3 implements the sliding window
    cache, and line 5 implements the absolute approach: 1\. CacheItemPolicy cip =
    new CacheItemPolicy();


    2\. if (UseSlidingWindow)


    3\. cip.SlidingExpiration = defaultTTL;


    4\. else


    5\. cip.AbsoluteExpiration = new DateTimeOffset(System.DateTime.Now.Add(defaultTTL));
    6. MemoryCache.Default.Add(cacheKey, dt, cip);'
