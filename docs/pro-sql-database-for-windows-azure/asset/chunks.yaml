  trans: "\n诚然，这是一个非常简单的例子，但它说明了将现有应用程序指向 SQL Database 是多么容易。需要注意的问题在于你的应用程序包含什么。如前所述，如果你有任何内联\
    \ T-SQL，至少需要确保其语法得到 SQL Database 的支持。通常情况下它是兼容的，但检查并`测试`始终是最稳妥的做法。\n\n即使你已连接到\
    \ SQL Database，这会影响你的数据访问代码吗？接下来的两节将讨论连接到 SQL Azure 时使用数据读取器和数据集。\n\n## 使用数据读取器\n\
    \n随着你对 SQL Database 越来越熟悉，你会发现除了可能需要修改内联 T-SQL 外，几乎不需要对应用程序代码做太多改动。这一切的美妙之处在于，你正在使用一种久经考验且值得信赖的数据访问技术——ADO.NET。因此，实际上没有改变什么。让我们修改应用程序和点击事件代码来说明这一点。请按以下步骤操作：\n\
    \n1.  向窗体添加一个新的列表框。\n\n2.  在点击事件中，添加以下代码片段中**粗体**显示的代码。这段新代码使用 `SqlDataReader`\
    \ 类对 SQL Database 实例执行一个简单的 `SELECT` 命令，然后遍历 `SqlDataReader` 来填充列表框：\n\n```\n\
    private void button1_Click(object sender, EventArgs e)\n{\n    string connStr\
    \ = GetConString();\n    using (SqlConnection conn = new SqlConnection(connStr))\n\
    \    {\n        SqlCommand cmd = new SqlCommand(\"SELECT FirstName, LastName FROM\
    \ Person.Person\", conn);\n        conn.Open();\n        SqlDataReader rdr = cmd.ExecuteReader();\n\
    \        try\n        {\n            while (rdr.Read())\n            {\n     \
    \           listBox1.Items.Add(rdr[0].ToString());\n            }\n          \
    \  rdr.Close();\n        }\n        catch (SqlException ex)\n        {\n     \
    \       MessageBox.Show(ex.Message.ToString());\n        }\n    }\n}\n```\n\n\
    3.  运行应用程序，点击窗体上的按钮。几秒钟内，列表框就会填满来自 Users 表的姓名。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 5 章 ■ 使用 SQL 数据库编程\n\n关键在于，你可以用本地连接字符串替换它，并且仍然有效。这是因为你使用 ADO.NET 来处理连接，而它并不关心数据库在哪里。接下来，让我们把这个例子再推进一步，看看如何使用数据集。\n\
    \n## 使用数据集\n\n在上一个例子中，你发现使用 `SqlDataReader` 查询 SQL Database 实例时语法没有差异。这个例子使用 `SqlCommand`\
    \ 类和 `SqlDataAdapter` 来查询 SQL Database 并填充数据集。步骤如下：\n\n1.  在按钮的点击事件中，用以下代码替换现有代码：\n\
    \n```\nusing (SqlConnection conn = new SqlConnection(connStr))\n{\n    try\n \
    \   {\n        using (SqlCommand cmd = new SqlCommand())\n        {\n        \
    \    conn.Open();\n            SqlDataAdapter da = new SqlDataAdapter();\n   \
    \         cmd.CommandText = \"SELECT FirstName, LastName FROM Person.Person\"\
    ;\n            cmd.Connection = conn;\n            cmd.CommandType = CommandType.Text;\n\
    \            da.SelectCommand = cmd;\n            DataSet ds = new DataSet(\"\
    Person\");\n            da.Fill(ds);\n            listBox1.DataSource = ds.Tables[0];\n\
    \            listBox1.DisplayMember = \"FirstName\";\n        }\n    }\n    catch\
    \ (SqlException ex)\n    {\n        MessageBox.Show(ex.Message.ToString());\n\
    \    }\n}\n```\n\n这段代码创建了一个新连接，使用与上一个示例相同的连接信息，然后创建了一个新的 `SqlCommand` 实例。设置好 `SqlCommand`\
    \ 的连接、文本和类型后，使用实例化的 `SqlDataAdapter` 来执行它。创建一个新的数据集并从 `SqlDataAdapter` 填充，然后将其应用到列表框的数据源属性。\n\
    \n2.  运行应用程序，点击窗体上的按钮。同样，列表框会填满来自 SQL Database 实例中 Users 表的姓名。同样，你可以将连接字符串更改指向本地数据库，代码也能正常工作。\n\
    \n那么，什么样的代码会*不*工作呢？假设你的应用程序包含如下代码，该代码创建了一个没有聚集索引的表：\n\n```\nusing (SqlConnection\
    \ conn = new SqlConnection(connStr))\n{\n    try\n    {\n        using (SqlCommand\
    \ cmd = new SqlCommand())\n        {\n            // 代码不完整，但原文如此\n        }\n\
    \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# Chapter 5: Programming with SQL Database\n\n## ODBC\n\nThere is nothing\
    \ earth-shattering or truly groundbreaking here, but let’s walk though an example\
    \ to see how ODBC connections work and illustrate that your ODBC classes still\
    \ work as you’re used to. Follow these steps:\n\n1.  Do this the proper way and\
    \ create an enumeration to handle the type of connection you’re using.\n2.  Modify\
    \ the `GetConString` method as shown in the following snippet to take a parameter.\
    \ The parameter lets you specify the connection type so you can return the correct\
    \ type of connection string (either ADO.NET or ODBC). Be sure to use your correct\
    \ password, username, and server name with the correct server. If the value of\
    \ `ADO_NET` is passed into this method, the ADO.NET connection string is returned;\
    \ otherwise the ODBC connection string is returned:\n\n    ```csharp\n    enum\
    \ ConnType\n    {\n        ADO_NET = 1,\n        ODBC = 2\n    }\n\n    string\
    \ GetConString(ConnType connType)\n    {\n        if (connType == ConnType.ADO_NET)\n\
    \            return \"Server=tcp: *servername*.database.windows.net;Database=AdventureWorks2012;\
    \ User ID= *username*@ *servername*;Password= *password*;Trusted_Connection=False;Encrypt=True;\"\
    ;\n        else\n            return \"Driver={SQL Server Native Client 10.0};Server=tcp:\
    \ *servername*.database.windows.net;Database=AdventureWorks2012;Uid= *username*@servername;Pwd=\
    \ *password*;Encrypt=yes;\";\n    }\n    ```\n\n3.  Add the following declaration\
    \ to the project:\n    `using System.Data.Odbc;`\n\n4.  Place a second button\
    \ on the form, along with a `DataGridView`. In its click event, add the following\
    \ code. This code is just like the code from the ADO.NET example, but it uses\
    \ the `Odbc` data classes versus the `Sql` data classes. For clarity, change the\
    \ `Text` property of this new button to “ODBC” so you know the difference between\
    \ this button and the first.\n    Notice in the code that the value “ODBC” is\
    \ passed in the `GetConString` method, returning the ODBC connection string:\n\
    \n    ```csharp\n    string connStr = GetConString(ConnType.ODBC);\n    using\
    \ (OdbcConnection conn = new OdbcConnection(connStr))\n    {\n        try\n  \
    \      {\n            conn.Open();\n            OdbcDataAdapter da = new OdbcDataAdapter();\n\
    \            OdbcCommand cmd = new OdbcCommand(\"SELECT FirstName, LastName FROM\
    \ Person.Person\", conn);\n            cmd.CommandType = CommandType.Text;\n \
    \           da.SelectCommand = cmd;\n            DataSet ds = new DataSet(\"Person\"\
    );\n            da.Fill(ds);\n            listBox1.DataSource = ds.Tables[0];\n\
    \            dataGridView1.DataSource = ds.Tables[0];\n            listBox1.DisplayMember\
    \ = \"FirstName\";\n        }\n        catch (OdbcException ex)\n        {\n \
    \           MessageBox.Show(ex.Message.ToString());\n        }\n    }\n    ```\n\
    \n5.  Before the project is run, you need to modify the code behind the first\
    \ button to pass the appropriate `Enum` and return the appropriate connection\
    \ string. Add the following line to the beginning of the code behind `Button1`:\n\
    \    `string connStr = GetConString(ConnType.ADO_NET );`\n\nAlthough this code\
    \ is certainly valid and runs successfully against your local SQL Server instance,\
    \ it doesn’t work when executing against your SQL Database instance. Why? Go ahead\
    \ and replace the code in the button’s click event with this code, and run the\
    \ application. The error you’ll get in the message box states that SQL Database\
    \ tables without a clustered index aren’t supported. If you step through the code,\
    \ you find out that the table is indeed created, but the error comes from trying\
    \ to insert data into the table. You need to go through your application and look\
    \ for these sorts of things, to ensure that the application will run successfully\
    \ against SQL Database.\n\nWe have discussed connecting with ADO.NET and the different\
    \ options we have with ADO.NET, so let’s move on to the other connection option,\
    \ ODBC."
