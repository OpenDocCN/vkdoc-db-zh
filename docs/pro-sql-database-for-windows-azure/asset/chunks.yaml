    \ as the `@hash` variable.\n\n> **Figure 3-3.** Record with the encrypted value,\
    \ a hash, and a vector\n\nLast but not least, you should know that SQL Server\
    \ and SQL Database both support hashing natively. Support for hashing was until\
    \ recently limited to the MD5 and SHA-1 algorithms. However SQL Database and SQL\
    \ Server 2012"
