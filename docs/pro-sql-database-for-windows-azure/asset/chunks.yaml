    Creating a SQL Database instance via the Quick Create option lets you quickly
    create a database by specifying the database name, and the subscription and server
    in which to create the new database instance. If you are creating a new database
    in a subscription in which no server has been created, you will also be asked
    to provide an administrator user name and password for the new server that will
    be provisioned. Creating a database through the Quick Create option creates a
    1GB Web Edition database instance.'
  trans: "\n此外，您可以创建一个*关联组*，以便将某些 Azure 服务保持在一起。这样的组会在部署到 Microsoft Azure 平台的 Windows\
    \ 和数据服务之间建立地理依赖关系。如果 Microsoft 因合规原因需要将某个服务迁移到另一个地理位置，相关服务很可能也会随之迁移。例如，如果您开发了一个依赖于\
    \ `SQL Database` 实例的 Azure 服务，您可能希望确保它们两者位于同一地理位置，并且属于同一个*关联组*。\n\n可用的地理位置会随着时间的推移而增加。因此，您可能需要定期重新评估服务是否部署在最合适的地理位置。请记住，将服务迁移到其他地理位置可能非常耗时。\n\
    \n## 在 Azure 中存储数据\n\n正如您所想象的那样，云计算的核心是以简单且可扩展的方式存储数据。Microsoft Azure 平台提供了多种您可以从中选择的存储模型。本节总结了在\
    \ Azure 中存储数据的四种方式；其中三种方法被认为是 Azure 服务的一部分。\n\n图 1-2 概述了存储选项和可用的访问方法。Windows Azure\
    \ 提供的存储选项集称为 *Windows Azure 存储*，包括 Blob、表和队列。可以使用 `HTTP/S` 调用直接从企业环境访问 *Windows\
    \ Azure 存储*，这为接入 Microsoft Azure 平台提供了一个简单的接口。除了使用 *Windows Azure 存储* 外，消费者还可以使用\
    \ `ADO.NET` 或 `ODBC` 直接向 `SQL Database` 实例发出请求，因为 `SQL Database` 支持 `SQL Server`\
    \ 使用的表格数据流 (`TDS`) 协议。因此，连接到 `SQL Server` 数据库的应用程序和服务可以同样轻松地连接到 `SQL Database`。\n\
    \n**图 1-2.** Microsoft Azure 数据存储访问\n\n以下是四种存储类型的更多详细信息：\n\n*   **Windows Azure\
    \ 存储。** Windows Azure 存储提供三种针对特定需求量身定制的不同存储模型：\n    *   **表。** 一种命名的键值对存储，允许您存储海量数据。这种存储模型包括自动负载均衡和故障转移。之所以称为表，是因为您可以在每一行中存储多个值。然而，这不是一种事务性存储机制；无法进行索引或表连接。此外，表中定义的列存在存储限制。例如，字符串数据类型限制为\
    \ `64KB`。\n    *   **Blob。** 用于存储文件的接口，根据您创建的 Blob 类型，存储上限为 `200GB` 或 `1TB`。您可以通过表示状态传递\
    \ (`REST`) 调用，使用直接的 `HTTP` 请求轻松访问 Blob。\n    *   **队列。** 一种高可用性机制，用于存储供其他应用程序或服务使用的消息。队列的典型用途是发送\
    \ XML 消息。队列存在某些限制，但您也可以通过 `REST` 访问队列。\n*   **SQL Database。** `SQL Database` 是一个事务性数据库，通过\
    \ `ADO.NET` 或其他提供程序提供熟悉的数据访问方式，并允许您使用标准 `T-SQL` 语句操作数据。`SQL Database` 中的数据库实例有两种版本：`Web`\
    \ 版和 `Business` 版。`Web` 版提供两种最大数据库大小：`1GB` 和 `5GB`。`Business` 版提供以下最大数据库大小：`10,\
    \ 20, 30, 40, 50, 100 和 150GB`。\n\n表 1-1 总结了 Azure 平台中这些可用数据存储选项的当前特性。\n\n**表\
    \ 1-1.** Azure 存储摘要\n\n| 存储模式 | 最大大小 | 访问方式 | 格式 | 是否关系型 |\n| :--- | :--- | :---\
    \ | :--- | :--- |\n| 表 | 不适用 | `ADO.NET`/`REST` | 行和列 | 否 |\n| 页 Blob | `1TB`\
    \ | `REST` | 文件 | 否 |\n| 块 Blob | `200GB` | `REST` | 文件 | 否 |\n| 队列 | `64KB*`\
    \ | `REST` | 字符串 | 否 |\n| SQL Database | `150GB` | `ADO.NET` | 行和列 | 是 |\n\n**\
    \ 推荐限制*\n\n## SQL Database 入门\n\n如您所见，`SQL Database` 是一个基于 `SQL Server` 技术的关系数据库引擎。它支持\
    \ `SQL Server` 的许多功能，包括表、主键、存储过程、视图等等。本节提供一个简短的入门指南，帮助您开始使用 `SQL Database`。您将了解如何注册\
    \ Azure、如何创建数据库和账户，以及如何登录。\n\n### 注册 Azure\n\n要注册 Windows Azure，请访问 Windows Azure\
    \ 网站上的定价页面：`http://www.windowsazure.com/en-us/pricing/purchase-options/`。图 1-3\
