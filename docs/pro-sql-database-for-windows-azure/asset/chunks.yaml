    到目前为止，你已经花费了大量时间对值进行加密和哈希处理，以增强机密性和完整性。然而，CIA 三元组的另一个重要方面是访问控制。本节将回顾访问控制的两个子类别：身份验证（也称为
    `AUTHN`）和授权（`AUTHZ`）。


    ## 身份验证 (`AUTHN`)


    `AUTHN` 是一个验证你确实是你所声称的那个人的过程。在 SQL Server 中，`AUTHN` 过程通过两种机制之一完成：网络凭据（通过安全支持提供程序接口
    [`SSPI`] 上的 Kerberos 身份验证处理）或 SQL Server 凭据。连接字符串必须指定正在使用哪种 `AUTHN`。当你使用 SQL Server
    `AUTHN` 时，必须在尝试连接之前提供密码，这可以由运行时的用户提供，也可以在配置文件中提供。


    在考虑 SQL Database 的 `AUTHN` 时，请记住以下几点：


    *   **无网络身份验证**。由于 SQL Database 不在你的网络上，因此网络 `AUTHN` 不可用。这进一步意味着你必须始终使用 SQL `AUTHN`，并且必须在你的应用程序中存储密码（最好在配置文件中）。你可能希望加密存储密码。尽管你可以使用
    `aspnet_regiis.exe` 实用程序在 Windows 中加密配置文件的部分内容，但此选项在 Windows Azure 中使用默认提供程序时不可用。但是，你可以使用自定义配置提供程序
    `PKCS12`（可在 MSDN Code Gallery 上找到）来加密 Web 配置文件的部分内容。有关如何使用此自定义提供程序的更多信息，请访问 [`tinyurl.com/9ta8m5u`](http://tinyurl.com/9ta8m5u)。

    *   **强密码**。SQL Database 要求使用强密码。此选项无法禁用，这是一件好事。强密码必须至少有八个字符长；必须组合字母、数字和符号；并且不能是字典中的单词。

    *   **登录名限制**。某些登录名不可用，例如 `sa`、`admin` 和 `guest`。无法创建这些登录名。你还应避免在登录名中使用 `@` 符号；该符号用于分隔用户名和机器名，有时可能需要。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 3 章 ■ 安全


    ## 授权 (`AUTHZ`)


    授权使你能够在通过身份验证后控制谁可以执行哪些操作。在开发周期早期定义良好的 `AUTHZ` 模型非常重要，因为更改访问控制策略可能相对困难。


    一般来说，一个强大的 `AUTHZ` 模型定义了哪些用户可以访问数据库中的哪些对象。在 SQL Database 和 SQL Server 中，这通常通过定义登录、用户、架构和权限之间的关系来实现。


    ### 创建登录和用户


    登录帐户用于管理 SQL Database 中的身份验证；它是一个服务器级别的实体。如果你知道一个登录帐户及其密码，就可以登录。用户是一个数据库实体，用于访问控制。用户决定了你可以访问哪些对象以及可以执行哪些操作。每个登录可以映射到每个数据库（包括
    `master`）中的 0 个或 1 个用户。


    在 SQL Database 中，你必须连接到 `master` 数据库才能管理你的登录。部分支持 `CREATE LOGIN` T-SQL 语句。另外，请记住创建登录时必须使用强密码。


    SQL Database 提供了两个新角色：


    *   **`LoginManager`**。授予用户在 `master` 数据库中创建新登录的能力。

    *   **`DBManager`**。授予用户从 `master` 数据库创建新数据库的能力。


    首先，让我们在 `master` 数据库中创建一个登录帐户：


    ```sql

    CREATE LOGIN MyTestLogin WITH PASSWORD=''MyT3stL0gin''

    GO

    ```


    你可以选择授予此登录访问 `master` 的权限。以下代码显示了如何授予该登录访问 `master` 数据库的权限，并在 `master` 数据库中授予
    `LoginManager` 角色。如果你的意图仅是授予此登录访问用户数据库的权限，则可以跳过此步骤。


    ```sql

    CREATE USER MyTestLoginUser FROM LOGIN MyTestLogin

    GO

    EXEC sp_addrolemember ''loginmanager'', MyTestLoginUser

    GO

    ```


    在大多数情况下，你会希望在 `master` 中创建登录帐户，在用户数据库中创建用户。以下代码显示了如何在用户数据库中创建具有读取权限的用户。你必须首先连接到用户数据库，否则下面的语句将失败。


    ```sql

    CREATE USER MyTestLoginUser FROM LOGIN MyTestLogin

    GO

    EXEC sp_addrolemember ''db_datareader'', MyTestLoginUser

    GO

    ```


    现在，`MyTestLogin` 帐户可以连接到你的用户数据库。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 40](img/index-66_1.png)


    第 3 章 ■ 安全


    最后，你应该注意，SQL Database 管理员帐户始终作为用户添加到每个新的 SQL Database 实例中，并且默认是 `dbo`。这意味着你不需要为管理员帐户创建用户。如果你尝试这样做，将会收到一条错误消息，指出用户已存在。例如，如果我的管理员登录帐户是
    `''hroggero''`，则以下命令将失败，因为用户已自动创建并映射到 `dbo`：


    ```sql

    CREATE USER hroggero WITH LOGIN hroggero

    ```


    ```

    Msg 15007, Level 16, State 1, Line 1

    ''hroggero'' is not a valid login or you do not have permission.

    ```


    ### 架构


    `架构` 是包含数据库对象的容器；架构驻留在数据库内部。架构是数据库对象三部分命名约定的一部分；它们被视为命名空间。架构中的每个对象都必须具有唯一的名称。


    默认情况下，当你使用 `dbo` 登录连接时，创建的对象由 `DBO` 架构拥有。例如，之前显示的 `UserProperties` 表的 `CREATE
    TABLE` 语句使用 `DBO` 作为架构所有者（对于 `DBO`，`schema_id` 始终为 1）。参见图 3-6.


    ***图 3-6.** 查看对象的架构所有权*


    目前，新用户 `MyTestLoginUser` 无法从此表中读取。尝试对 `UserProperties` 执行 `SELECT` 语句会返回 `SELECT`
    权限被拒绝的错误。因此，你有一个选择：你可以授予该用户帐户对该表的 `SELECT` 权限，将用户分配到适当的角色，或者为该用户创建一个架构并将 `SELECT`
    权限分配给该架构。


    通常，通过角色管理访问权限比直接通过用户管理容易得多。但是，如果你希望对访问权限进行更精细的控制，则应考虑使用基于架构的安全性。要正确执行此操作，你需要将
    `UserProperties` 表的所有权更改为新架构（不是 `DBO`），然后将访问权限分配给该架构。


    要创建新架构，你必须连接到 `MyTestLoginUser` 已创建的所需用户数据库。然后运行以下语句：


    ```sql

    CREATE SCHEMA MyReadOnlySchema AUTHORIZATION DBO

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 41](img/index-67_1.png)


    ![Image 42](img/index-67_2.png)


    第 3 章 ■ 安全


    此时，已创建一个架构；它由 `DBO` 拥有。你现在需要将 `UserProperties` 表的所有权更改为 `MyReadOnlySchema`：


    ```sql

    ALTER SCHEMA MyReadOnlySchema TRANSFER DBO.UserProperties

    ```


    该表现在属于该架构，如图 3-7. 所示。


    ***图 3-7.** 查看新的架构所有者*


    然而，你还没有完成。`MyTestLoginUser` 无法再看到该表。对该表执行 `SELECT` 语句会返回 `Invalid object name`
    消息，如图 3-8 所示。


    ***图 3-8.** 当用户看不到对象时的错误*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 43](img/index-68_1.png)


    第 3 章 ■ 安全

