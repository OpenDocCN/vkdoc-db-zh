    CHAPTER 6 ■ SQL REPoRTing


    With your data source created, you now need to add a dataset for the report. For
    each data source, you can create one or more datasets. Each dataset specifies
    the fields from the data source that you would like to use in the report. The
    dataset also contains, among other things, the query used to get the data and
    any query parameters to filter the data.


    7\. In the Report Data window, right-click the Datasets node, and select Add Dataset
    from the context menu. Doing so opens the Dataset Properties window, shown in
    Figure [6-11.](#index_split_001.html#p139)


    8\. The Query page of the Dataset Properties window allows you to do two primary
    things: specify the data source on which this dataset is based, and specify the
    query type and associated query. For this example, base your dataset on the data
    source you created


    earlier. The query type is Text, meaning that you type a T-SQL statement in the
    Query field.


    For this example, four tables will be joined to return contact information, such
    as name and address, so enter the SELECT statement shown in Figure [6-11](#index_split_001.html#p139).
    The Name of the dataset defaults to DataSet1, which is fine for this example.
    Click OK.


    ***Figure 6-11.** The Dataset Properties dialog*


    There is nothing else you need to do for your dataset; you’re ready to define
    and lay out your report.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 97](index-140_1.png)


    CHAPTER 6 ■ SQL REPoRTing


    Creating the Report Design


    With your report in Design view, you can now start laying it out. In this example
    you don’t do anything flashy or extensive, just something simple to demonstrate
    your connectivity to SQL Database. Follow these steps: 1\. From the Toolbox, drag
    a text box and table onto the Report Designer window. Move the text box to the
    top of the report: it’s the report title. Change the text in the text box to My
    First SQL Azure Report.


    2\. The table you placed on the report has three columns, but you need five. Right-click
    any of the existing columns, and select Insert Column ➤ Right from the context
    menu to add an additional column. Add one more column for a total of five.


    3\. From the Report Data window, drag the First Name, Last Name, Address Line
    1, City, and State columns from the dataset to the columns in the table, as shown
    in Figure [6-12](#index_split_001.html#p140).


    ***Figure 6-12.** Report Design view*


    4\. Your simple report is finished—it isn’t complex or pretty, but it’s functional.
    You’re now ready to test the report: to do that, select the Preview tab. You’ll
    see the result shown in Figure [6-13.](#index_split_001.html#p141)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 98](index-141_1.png)


    CHAPTER 6 ■ SQL REPoRTing


    ***Figure 6-13.** Report Preview view*


    Figure [6-13](#index_split_001.html#p141) shows the results of your labors, displaying
    the First Name, Last Name, Address Line 1, City, and State data from several tables
    in your SQL Database instance. If your report looks like this, congratulations
    are in order—you just created a report that queries a SQL Database. However, the
    power of this chapter now comes from deploying the report.


    Deploying the Report


    To deploy a report, follow these steps:


    1\. Back in the Windows Azure Management Portal, select the Reporting option in
    the


    Navigation pane, and then select the report server created earlier.


    2\. Highlight and copy the Web service URL from the Server Information section
    of the portal.


    3\. Back in SSDT, right-click the report solution, and select Properties from
    the context menu.


    4\. In the Property Pages dialog, the only thing you need to enter is the TargetServerURL,
    shown in Figure [6-14](#index_split_001.html#p142). Notice also the name of the
    TargetReportFolder, which in this case is AzureReport—the name of your Visual
    Studio solution.


