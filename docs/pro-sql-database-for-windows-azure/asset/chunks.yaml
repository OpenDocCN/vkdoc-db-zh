    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-81_1.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    ***Figure 4-8.** DAC import settings*


    The next step of the wizard, Database Settings, shown in Figure [4-9](#index_split_000.html#p82),
    should look familiar because you saw it earlier as the Deployment Settings page
    of the Deploy Database wizard in Figure [4-2. H](#index_split_000.html#p75)ere
    again you need to connect to your SQL Azure server, and then select the new SQL
    Azure database edition and size. Once you have done that, click Next.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 54](index-82_1.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    ***Figure 4-9.** Specifying the new database instance options*


    Again you are presented with the Summary page, and if everything looks good, click
    Next to execute the Import.


    In Figure [4-10](#index_split_000.html#p83) you can see the steps that were taken
    by the DAC Fx to deploy the DAC package (BACPAC) to SQL Azure, which is the last
    half of the process that the previous example took to deploy directly to SQL Azure.
    The DAC Fx first created the database and then created a deployment plan, which
    looks at the current DAC package and determines how it is going to deploy the
    package to the new database. It then creates the schema and imports the data for
    each table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](index-83_1.png)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    ***Figure 4-10.** Successful BACPAC import operation*


    Granted, while both the Deploy Database to SQL Azure and the Import/Export DAC
    options accomplish the same tasks, the Import/Export DAC option gives you more
    control and flexibility, such as the ability to deploy the DACPAC to multiple
    destinations without the need of re-exporting. However, Deploy Database to SQL
    Azure is a wonderful option if you need to quickly get your on-premises database
    to SQL Azure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 4 ■ Data Migration anD BaCkup StrategieS


    The Import/Export Service


    Up until now, the focus has been on the client side; importing and exporting from
    SQL Server to a BACPAC. The Import/Export service is designed to import and export
    directly between Windows Azure SQL Database and Windows Azure BLOB storage. This
    service has been available in production since late January 2012 and is free of
    charge. No sign-ups, no codes to enter. Just go use it. How? The Import/Export
    service is built directly into the Windows Azure Management Portal via two buttons
    on the lower Ribbon bar: Import and Export.


    Import


    In this section, you will upload the BACPAC file to BLOB storage and then import
    it into an entirely new SQL


    Database instance using the Import/Export service. The first step is to upload
    the AWMini.bacpac to Windows Azure BLOB storage. If you haven’t created a Windows
    Azure storage account, select the Storage tab in the left navigation pane, and
    then select New ➤ Storage ➤ Quick Create from the lower New menu. Type in the
    name of the Storage account into the URL field, select the Region and Subscription,
    and click Create Storage Account.


    With the storage account created, select the account name in the portal; then
    select the Containers tab. On the lower menu bar, select Add Container to create
    a container in which to upload the BACPAC. In the New Blob Container dialog, enter
    a name for the container (I called mine bacpac), and then click the check (OK)
    button.'
