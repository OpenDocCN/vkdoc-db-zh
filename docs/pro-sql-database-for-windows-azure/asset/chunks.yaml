    **Chapter 9**


    **Designing for High Performance**


    This chapter focuses on a few key topics that can help you design high-performance
    applications that consume data in SQL Database and SQL Server databases. The approach
    used in this chapter builds a simple but effective WinForms application that consumes
    data stored both on premises and in the cloud. You’ll first explore a few general
    concepts and then quickly go into the design and development of a shard library
    that reads data from multiple databases.


    Finally, you’ll see how to add multithreading to the shard library using the Task
    Parallel Library (TPL) and caching using the Enterprise Library (formally known
    as the caching application block).


    General Performance Concepts


    Before diving into the details, let’s discuss a few concepts related to performance.
    The first thing you should know is that achieving high performance is difficult.
    Although making sure applications perform to acceptable levels is important, advanced
    performance tuning requires careful planning and should be included as a design
    goal only if requirements drive you to believe that high performance is necessary.
    For example, if you expect your application to be used by thousands of concurrent
    users, then you may need to use caching and even multithreading. On the other
    hand, certain high-performance techniques can make code difficult to read and
    maintain, and in such cases knowledge transfer may be difficult.


