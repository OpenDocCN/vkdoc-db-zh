- fmt: "## 缓存优化技术\n\n你可以通过多种方式增强这种缓存技术。例如，当缓存中存储的 `DataTable` 对象包含大量行时，可以对其进行压缩。压缩算法往往会增加延迟，但整体性能的提升可能值得这点轻微的延迟。\n\
    \n另一种增强缓存存储的方法是创建不同的缓存容器，以便在更细粒度的层面上控制哪个容器保存哪种数据。这样，你可以为每个容器控制不同的设置；或者你可能决定始终压缩一个缓存容器，但不压缩另一个。\n\
    \n最后，本库中提供的缓存不是分布式的；它是运行该库的机器本地的。如果你需要开发一个更健壮的缓存，可以考虑研究一下 `Windows Server AppFabric`；其缓存技术提供了企业级的功能。\n\
    \n> **注意**\n> \n> 有关 `Windows Server AppFabric` 的更多信息，请访问 [http://msdn.microsoft.com/appfabric](http://msdn.microsoft.com/appfabric)。\n\
    \n## 在分片中更新和删除记录\n\n现在，你已经准备好了解如何通过分片进行更新和删除操作。针对分片中数据库的更新和删除操作，可以针对给定数据库中的记录执行，也可以针对所有数据库执行。从高层次来看，以下是一些指导原则，可用于决定采用哪种方法：\n\
    \n*   **在单个数据库中更新或删除记录。** 当你已经知道要使用的数据库 GUID 时，可以在数据库中更新或删除一个或多个记录。当你使用分片检索记录时就是这种情况，因为返回的所有记录都提供了数据库\
    \ GUID。\n*   **跨数据库更新或删除记录。** 一般来说，当你不知道记录位于哪个数据库中，或者需要评估所有记录时，你会在分片中跨数据库更新或删除记录。\n\
    \n要在单个数据库中更新或删除记录，你必须提供一个包含要使用的数据库 GUID 的命令参数。以下是更新分片中单个记录的代码。在第 1 到 7 行，代码创建了一个命令对象，该对象调用一个需要两个参数的存储过程。在第\
    \ 9 行，代码添加了要使用的数据库 GUID。这个额外的参数在调用请求的数据库之前，会被分片库移除：\n\n```csharp\ncmd.CommandText\
    \ = \"sproc_update_user\";\ncmd.CommandType = CommandType.StoredProcedure;\ncmd.Parameters.Add(new\
    \ SqlParameter(\"@id\", SqlDbType.Int));\ncmd.Parameters[\"@id\"].Value = int.Parse(labelIDVal.Text);\n\
    cmd.Parameters.Add(new SqlParameter(\"@name\", SqlDbType.NVarChar, 20));\ncmd.Parameters[\"\
    @name\"].Value = textBoxUser.Text;\ncmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_,\
    \ labelGUID.Text));\nExecuteShardNonQuery(cmd);\n```\n\n请注意，调用存储过程并不是此代码运行所必需的。唯一需要的是使用一个\
    \ `SqlCommand` 对象；SQL 代码很可能是内联 SQL。在分片环境中使用存储过程和内联 SQL 各有利弊。正如你可能已经知道的，使用内联 SQL\
    \ 可能会引入安全威胁，例如 SQL 注入；而存储过程通常要快得多，因为它们是预编译的。但是，请记住，使用存储过程会引入一个新的复杂性级别，因为你需要确保存储过程在所有分片数据库中都是相同的。\n\
    \n从分片中删除记录几乎是相同的。在第 1 到 5 行，使用所需的存储过程参数创建命令对象。在第 7 行，代码添加了要使用的数据库 GUID：\n\n```csharp\n\
    cmd.CommandText = \"sproc_delete_user\";\ncmd.CommandType = CommandType.StoredProcedure;\n\
    cmd.Parameters.Add(new SqlParameter(\"@id\", SqlDbType.Int));\ncmd.Parameters[\"\
    @id\"].Value = int.Parse(labelIDVal.Text);\ncmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_,\
    \ labelGUID.Text));\nExecuteShardNonQuery(cmd);\n```\n\n> **注意** `ExecuteShardNonQuery`\
    \ 方法的行为根据其 `database GUID` 参数而不同。如果没有 `database GUID` 参数，它会对所有数据库执行查询。如果有一个带有值的\
    \ `database GUID` 参数，它会对指定的数据库执行查询。如果包含一个值为 `NULL` 的 `database GUID` 参数，它会使用轮询（round-robin）方式对分片中的下一个数据库执行查询。你很快就会在分片中添加记录时看到如何使用轮询调用。\n\
    \n图 9-7 显示了示例应用程序正在更新分片中的一条记录。当你单击 “Reload Grid” 时，会对分片发出一条 `SELECT` 语句，该语句返回每条记录的数据库\
    \ GUID。然后，当你选择特定记录（通过选择整行）时，记录详细信息会加载到屏幕的右侧区域，同时加载记录的数据库 GUID。此时，可以更新或删除该记录。如果运行此示例程序，请确保按照\
    \ “Introductions” 选项卡中的配置步骤操作。\n\n![Image 150](index-199_1.png)\n\n*图 9-7. 示例应用程序更新分片中的一条记录*\n\
    \n因为记录正在被更新或删除，所以客户端代码会清除缓存，以强制未来的 `SELECT` 语句从分片中的数据库获取记录。分片库提供了一个 `ResetCache`\
    \ 方法，正是用于此目的。\n\n你可以通过同时对缓存中的记录执行相同的更新或删除操作来改进此逻辑。\n\n在分片中跨数据库更新或删除记录甚至更简单。以下代码使用\
    \ `SqlCommand` 对象执行一条内联 SQL 语句。因为没有提供数据库 GUID，所以该语句会在分片中的所有数据库上执行。当你执行跨数据库的更新或删除时，正确设置并行标志很重要，如第\
    \ 1 行所示：\n\n```csharp\nPYN.EnzoAzureLib.Shard.UseParallel = checkBoxParallel.Checked;\n\
    cmd.CommandText = \"UPDATE TestUsers2 SET LastUpdated = GETDATE()\";\ncmd.CommandType\
    \ = CommandType.Text;\nExecuteShardNonQuery(cmd);\n```\n\n## 向分片中添加记录\n\n你会看到向分片数据库添加记录是多么容易。从性能角度来看，当分片中所有数据库的记录数量大致相等时，此分片效果最佳；这是因为并行处理是在没有任何确定性逻辑的情况下执行的。因此，记录在分片中分布得越散开，速度就越快。你可以通过两种方式向分片中添加记录：\n\
    \n*   **在单个数据库中。** 如果你是首次加载分片，你可能会决定将某些记录加载到特定的数据库中。或者，如果硬件更优越，你可能决定在一个数据库中加载比其他数据库更多的记录。\n\
    *   **跨数据库。** 通常，你在加载记录时不指定数据库。分片库使用轮询机制加载记录。\n\n在特定数据库中添加记录与在数据库中更新或删除记录没有什么不同；你只需要创建一个\
    \ `SqlCommand` 对象，设置 `INSERT` 语句，并添加一个指示要使用的数据库 GUID 的 `SqlParameter`。\n\n在分片中跨数据库添加一条或多条记录需要稍微不同的方法。轮询逻辑会存储上次用于在分片中插入记录的数据库。分片库提供了两种方法来执行插入：\n\
    \n*   `ExecuteShardNonQuery`。正如你之前看到的，此方法扩展了 `SqlCommand` 对象，并在没有提供 GUID 的情况下，使用轮询方式对分片中的下一个数据库执行语句。"
  raw: 'You can enhance this caching technique in multiple ways. For example, the
    DataTable object stored in the cache can be compressed when it contains many rows.
    Compression algorithms tend to increase latency, but the overall performance benefits
    may be worth a slight delay.


    Another way to enhance this caching storage is to create different cache containers,
    so you can control at a more granular level which container holds which kind of
    data. Doing so lets you control a different setting per container, for example;
    or you may decide to always compress one cache container but not another.


    Finally, the cache provided in this library isn’t distributed; it’s local to the
    machine running the library. If you need to develop a more robust cache, consider
    looking into the Windows Server AppFabric; its caching technology provides enterprise-level
    capabilities.


    **Note**


    ■


    for more information about the Windows server appfabric , visit [http://msdn.microsoft.com/appfabric.](http://msdn.microsoft.com/appfabric)


    Updating and Deleting Records in the Shard


    At this point, you’re ready to see how updates and deletes take place through
    the shard. Updates and deletes against the databases in the shard can be performed
    either for records in a given database or against all databases. At a high level,
    here are some guidelines you can use to decide on an approach:


    • **Update or delete records in a single database.** You update or delete one
    or more records in a database when you already know the database GUID to use.
    This is the case when you use the shard to retrieve records, because the database
    GUID is provided for all records returned.


    • **Update or delete records across databases.** Generally speaking, you update
    or delete records across databases in the shard whenever you don’t know which
    database a record is in, or when all records need to be evaluated.


    To update or delete records in a single database, you must provide a command parameter
    that contains the database GUID to use. Here’s the code that updates a single
    record in the shard. On lines 1 through 7, the code creates a command object that
    calls a stored procedure that requires two parameters. On line 9, the code adds
    the database GUID to use. This extra parameter is removed by the shard library
    before making the call to the requested database: 1\. cmd.CommandText = "sproc_update_user";


    2\. cmd.CommandType = CommandType.StoredProcedure;


    3.


    4\. cmd.Parameters.Add(new SqlParameter("@id", SqlDbType.Int));


    5\. cmd.Parameters["@id"].Value = int.Parse(labelIDVal.Text);


    6\. cmd.Parameters.Add(new SqlParameter("@name", SqlDbType.NVarChar, 20));


    7\. cmd.Parameters["@name"].Value = textBoxUser.Text;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 9 ■ Designing for high performanCe


    8.


    9\. cmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_, labelGUID.Text));
    10.


    11\. ExecuteShardNonQuery (cmd);


    Note that calling a stored procedure isn’t required for this code to run. All
    that is required is that a SqlCommand object be used; the SQL code may very well
    be inline SQL. There are pros and cons of using stored procedures and inline SQL
    in a sharding environment. As you may already know, using inline SQL can introduce
    security threats, such as SQL injection; and stored procedures are typically much
    faster because they are precompiled. However, keep in mind that using stored procedures
    introduces a new level of complexity because you will need to make sure your stored
    procedures are identical across all your shard databases.


    Deleting a record from the shard is virtually identical. The command object is
    created with the required stored procedure parameters in lines 1 through 5\. On
    line 7, the code adds the database GUID to use: 1. cmd.CommandText = "sproc_delete_user";


    2\. cmd.CommandType = CommandType.StoredProcedure;


    3.


    4\. cmd.Parameters.Add(new SqlParameter("@id", SqlDbType.Int));


    5\. cmd.Parameters["@id"].Value = int.Parse(labelIDVal.Text);


    6.


    7\. cmd.Parameters.Add(new SqlParameter(PYN.EnzoAzureLib.Shard._GUID_, labelGUID.Text));
    8.


    9\. ExecuteShardNonQuery (cmd);


    ■ **Note** the ExecuteShardNonQuery method behaves differently depending on its
    database gUiD parameter. if it has no gUiD parameter, it executes the query against
    all databases. if it has a database gUiD parameter with a value, it executes the
    query against the specified database. if it contains a database gUiD parameter
    with a NULL value, it executes the query against the next database in the shard
    using round-robin. You will see how to use round-robin calls when adding records
    in the shard shortly.


    Figure [9-7 sho](#index_split_002.html#p199)ws the sample application updating
    a record from the shard. When you click Reload Grid, a SELECT


    statement is issued against the shard, which returns the database GUID for each
    record. Then, when you select a specific record (by selecting the entire row),
    the record details are loaded in the right section of the screen, along with the
    record’s database GUID. At this point, the record can be updated or deleted. If
    you run this sample program, make sure to follow the configuration steps found
    in the Introductions tab.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 150](index-199_1.png)


    Chapter 9 ■ Designing for high performanCe


    ***Figure 9-7.** Sample application updating a record in the shard*


    Because records are being updated or deleted, the client code clears the cache
