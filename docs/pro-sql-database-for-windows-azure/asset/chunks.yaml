- fmt: "In addition, you can create an *affinity group* that lets you keep certain\
    \ Azure services together. Such a group creates a geographic dependency between\
    \ Windows and data services deployed in the Microsoft Azure platform. If Microsoft\
    \ is required to move a service to another geolocation for regulatory reasons,\
    \ the related services are likely to move along. For example, if you develop an\
    \ Azure service that depends on a `SQL Database` instance, you may want to ensure\
    \ that they both reside in the same geolocation and that they belong to the same\
    \ *affinity group*.\n\nAdditional locations will be added over time. As a result,\
    \ you may need to reevaluate on a regular basis whether a service is deployed\
    \ in the most appropriate geographic location. Keep in mind that moving services\
    \ to other geographic locations can be time consuming.\n\n## Storing Data in Azure\n\
    \nAs you can imagine, cloud computing is all about storing data in a simple yet\
    \ scalable manner. The Microsoft Azure platform offers a variety of storage models\
    \ that you can choose from. This section summarizes the four ways you can store\
    \ your data in Azure; three of these approaches are considered part of the Azure\
    \ services.\n\nFigure 1-2 provides an overview of the storage options and the\
    \ available access methods. The set of storage options provided by Windows Azure\
    \ is referred to as *Windows Azure storage*, which includes blobs, tables, and\
    \ queues. *Windows Azure storage* can be accessed directly from a corporate environment\
    \ using `HTTP/S` calls, providing a simple hook into the Microsoft Azure platform.\
    \ In addition to using *Windows Azure storage*, consumers can make requests directly\
    \ to a `SQL Database` instance using `ADO.NET` or `ODBC`, because `SQL Database`\
    \ supports the Tabular Data Stream (`TDS`) protocol that `SQL Server` uses. As\
    \ a result, applications and services connecting to a `SQL Server` database can\
    \ just as easily connect to `SQL Database`.\n\n**Figure 1-2.** Microsoft Azure\
    \ data storage access\n\nFollowing are further details of the four storage types:\n\
    \n*   **Windows Azure Storage.** The Windows Azure Storage offers three distinct\
    \ storage models that are tailored to specific needs:\n    *   **Table.** A named\
    \ value-pair storage that allows you to store very large amounts of data. This\
    \ storage model includes automatic load balancing and fail-over. It’s called a\
    \ table because you can store multiple values in each row. However, this isn’t\
    \ a transactional storage mechanism; no indexing or table joins are possible.\
    \ Also, the columns defined in a table have storage limitations. For example,\
    \ a string data type is limited to `64KB`.\n    *   **Blobs.** An interface to\
    \ store files, with a maximum limit of `200GB` or `1TB` of storage depending on\
    \ the type of blob you create. You can easily access blobs using a straight `HTTP`\
    \ request through a Representational State Transfer (`REST`) call.\n    *   **Queue.**\
    \ A highly available mechanism for storing messages for consumption by other applications\
    \ or services. A typical usage of queues is to send XML messages. Certain limitations\
    \ apply to queues, but you can access queues through `REST`, as well.\n*   **SQL\
    \ Database.** `SQL Database` is a transactional database that provides familiar\
    \ data access through `ADO.NET` or other providers and gives you the ability to\
    \ manipulate the data using standard `T-SQL` statements. Database instances in\
    \ `SQL Database` come in two editions: `Web` and `Business`. The `Web` edition\
    \ offers two maximum database sizes: `1GB` and `5GB`. The `Business` edition offers\
    \ the following maximum database sizes: `10, 20, 30, 40, 50, 100 and 150GB`.\n\
    \nTable 1-1 summarizes the current characteristics of these data-storage options\
    \ available in the Azure platform.\n\n**Table 1-1.** Storage Summary in Azure\n\
    \n| Storage Mode | Maximum Size | Access | Format | Relational |\n| :--- | :---\
    \ | :--- | :--- | :--- |\n| Table | N/A | `ADO.NET`/`REST` | Rows and columns\
    \ | No |\n| Page Blob | `1TB` | `REST` | File | No |\n| Block Blob | `200GB` |\
    \ `REST` | File | No |\n| Queue | `64KB*` | `REST` | String | No |\n| SQL Database\
    \ | `150GB` | `ADO.NET` | Rows and columns | Yes |\n\n** Recommended limit*\n\n\
    ## SQL Database Primer\n\nAs you’ve seen, `SQL Database` is a relational database\
    \ engine based on `SQL Server` technology. It supports many of the features of\
    \ `SQL Server` including tables, primary keys, stored procedures, views, and much\
    \ more. This section gives a brief primer to get you started using `SQL Database`.\
    \ You’ll see how to register for Azure, how to create a database and then an account,\
    \ and how to log in.\n\n### Registering for Azure\n\nTo register for Windows Azure,\
    \ visit the Pricing page on the Windows Azure web site: `http://www.windowsazure.com/en-us/pricing/purchase-options/`.\
    \ Figure 1-3 shows some of the available options available at the time of this\
    \ writing.\n\n**Figure 1-3.** Choosing a Windows Azure plan\n\nFrom this page,\
    \ you can pick the offer that best fits your profile and needs. After you’ve chosen\
    \ your preferred plan, click `Purchase`, and follow the onscreen instructions.\
    \ When this is complete, you’ll receive an e-mail with instructions for configuring\
    \ your Windows Azure platform.\n\nTo access the Azure portal, open your web browser\
    \ and enter the following URL: `http://windows.azure.com`. The Azure portal allows\
    \ you to deploy, manage and view the health status of your services.\n\n### Creating\
    \ a SQL Database Instance\n\nThe first thing you need to do is to create a new\
    \ `SQL Database` server. The name of the `SQL Database` server becomes a fully\
    \ qualified Internet address, and a logical name under which database instances\
    \ are created. When the `SQL Database` server is created, the `master` database\
    \ is provisioned automatically. This database is read-only and contains configuration\
    \ and security information for your databases. You can then create your user databases.\
    \ You can either use the Windows Azure Management Portal or issue a `T-SQL` statement\
    \ against the `master` database using `SQL Server Management Studio`.\n\n####\
    \ Using the Windows Azure Management Portal\n\nOne way to create a database is\
    \ to do so from the Windows Azure Management Portal. Selecting the `SQL Databases`\
    \ tab in the Navigation pane (left side of the page) will list all of your existing\
    \ `SQL Database` instances and the server they are associated with. Creating a\
    \ database can be accomplished in the portal in either of two ways. First, with\
    \ the list of database instances displayed, click the `New` button in the lower-left\
    \ corner of the portal page in the lower menu bar, and then select `SQL Database`\
    \ ➤ `Quick Create`. Second, you can optionally select the `Servers` tab on the\
    \ top of the portal page (next to the `Databases` tab), select the appropriate\
    \ server name from the list of servers, select the `Databases` tab, and then click\
    \ `Add` on the lower menu bar. Figure 1-4 shows the management portal with a few\
    \ subscriptions and `SQL Database` instances created.\n\n**Figure 1-4.** SQL Database\
    \ instances\n\nCreating a `SQL Database` instance via the `Quick Create` option\
    \ lets you quickly create a database by specifying the database name, and the\
    \ subscription and server in which to create the new database instance. If you\
    \ are creating a new database in a subscription in which no server has been created,\
    \ you will also be asked to provide an administrator user name and password for\
    \ the new server that will be provisioned. Creating a database through the `Quick\
    \ Create` option creates a `1GB Web Edition` database instance."
