    **Chapter 1**


    **Getting Started with SQL Database**


    Born only a few years ago, cloud computing is capturing the imagination of startups
    and large corporations alike. In its simplest form, cloud computing is an evolution
    of traditional hosting models; as such, it isn’t necessarily a new technology.
    Rather, it’s a new concept that offers new opportunities and challenges not found
    in existing business models. Much as agile programming provided a new software
    development paradigm, cloud computing provides a new delivery model for Internet-based
    solutions. And when it comes to relational data, Microsoft delivers the only cloud
    database available today: Windows Azure SQL Database.


    Introduction to Cloud Computing


    Let’s begin with what cloud computing has to offer compared to traditional hosting
    services. The following capabilities are generally expected from large cloud-computing
    providers:


    • **Automatic and unlimited scalability.** The promise that if your service needs
    more resources, more resources will be provisioned automatically or with limited
    effort. For example, if you deploy a web service, and you experience a sudden
    surge in processing needs, your services will automatically expand to additional
    servers to handle the temporary surge and contract to fewer servers during off-peak
    activity.


    • **Unassisted deployment.** The promise that if you need to deploy additional
    services or databases, you don’t have to call anyone or open a service ticket.
    The cloud service provider will give you the necessary tools to perform self-service.


    • **Built-in failover.** The promise that if one of your servers fails, no one
    will ever notice. For example, if the server on which your service is installed
    crashes, a new server immediately takes over.


    • **Grow as you need; pay for what you use.** The promise that you only pay for
    the resources you use. For example, if your service experiences a sudden surge
    in processing needs for a day, but it scales down to its usual usage for the rest
    of the month, you’re only charged marginally more than usual for the temporary
    surge.


    Cloud providers deliver on those promises in different ways. For example, the
    promise for automated and unlimited scalability comes in different flavors depending
    on the service being considered. A Web Service layer will be easier to scale than
    a database layer. And scaling a Web Service layer with Amazon will be different
    than with Microsoft. As a result, understanding how cloud providers implement
    these capabilities can be important in your application design choices and support
    operations.


    The fact that each cloud provider implements its services differently has another,
    more subtle implication.


    Switching cloud providers can be very difficult. If you design your application
    in a way that takes advantage of Amazon-specific services, adapting your application
    for the Azure platform may be very difficult. As a result, you 1


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 1 ■ GettinG Started with SQL databaSe


    should choose your cloud service provider carefully before adopting a cloud strategy
    to avoid costly application rewrites in the future.


    Who Is Doing What in the Cloud?


    Smaller companies, including startups, are building services that can run in the
    cloud, whereas larger companies are investing in building cloud-enabled infrastructure.
    Some corporations are building consulting services and offering to assist customers
    implement cloud-enabled solutions; others, like Microsoft, are investing in the
    core infrastructure and services that make the cloud a reality.


    Microsoft has traditionally been a software provider, but the company has slowly
    moved closer to hardware solutions over the years. In the late 1990s, Microsoft
    engaged with Unisys, HP, Dell, and other hardware manufacturers to provide highly
    available Windows-based platforms (Windows Data Center Edition). At the same time,
    Microsoft invested significant resources to build its Microsoft Systems Architecture
    (MSA). This program was designed to help corporations plan, deploy, and manage
    Microsoft-based IT architecture. These initiatives, along with many others, helped
    Microsoft develop strong knowledge capital around highly available and scalable
    architectures, which is a prerequisite for building cloud computing platforms.


    Amazon entered the cloud computing space with its Elastic Compute Cloud (EC2)
    services in 2005\. A few years later, Google and IBM joined forces to enter this
    market, and Microsoft announced many of its cloud computing plans during 2009,
    including the Azure platform. As part of its Azure platform, Microsoft delivered
    a very unique component in its cloud computing offering: a transactional database
    called Windows Azure SQL Database (also called SQL


    Database for simplicity, and previously called SQL Azure).


    Typical Cloud Services


    Generally speaking, cloud computing comes in one of three flavors:


    • **SaaS: software as a service.** This delivery platform is usually in the form
    of web applications that are made available on the Internet for a fee. This model
    has been around for a few years.


    Microsoft Office 365 and Google Apps are examples of SaaS offerings.


    • **PaaS: platform as a service.** This service offers a computing platform that
    facilitates the use and deployment of other services and meets the general expectations
    of cloud computing, such as scalability and pay-as-you-go. Windows Azure SQL Database
    and Amazon S3 (Simple Storage Service) are examples of PaaS offerings.


    • **IaaS: infrastructure as a service.** This offering provides the necessary
    infrastructure that offers the scalability typically associated with cloud computing,
    such as Windows Azure and Amazon EC2 (Elastic Compute), but falls short of delivering
    cloud services that applications can use directly.'
