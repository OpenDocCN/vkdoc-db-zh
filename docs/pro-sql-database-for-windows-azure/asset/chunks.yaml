    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 137](index-180_1.png)\n\
    \n## CHAPTER 8 ■ Windows Azure And ASP.NET\n\nSo far, you’re running this project\
    \ on the local machine. Although the Windows Azure Tools are required, this project\
    \ doesn’t use any of the Windows Azure storage options; it connects directly to\
    \ a live SQL Database instance.\n\n> **Note**\n>\n> This chapter assumes you’ve\
    \ configured the SQL database firewall correctly as discussed in Chapter 1. Also,\
    \ connecting from a Windows Azure service requires you to set the “Allow Microsoft\
    \ services access to this server” option in the firewall configuration. If you\
    \ get a connection error stating that you aren’t allowed to connect from a specific\
    \ IP address, see Chapter 1 for detailed information about correctly setting up\
    \ the SQL database firewall.\n\n### Deployment and Configuration Files\n\nYou\
    \ probably noticed that there are multiple configuration files in your solution.\
    \ You can find a `Web.Config` file in your project, along with two additional\
    \ files underneath: `Web.Debug.Config` and a `Web.Release.Config`. These two additional\
    \ files allow you to perform transformations to your `Web.Config` file depending\
    \ on the build configuration. You can use this feature when you want to modify\
    \ the connection string to point to a production database when you target a `Release`\
    \ build. For more information about `Web.Config` transformations visit this link:\
    \ [http://go.microsoft.com/fwlink/?LinkId=125889](http://go.microsoft.com/fwlink/?LinkId=125889).\n\
    \nYou also probably noticed that the web role itself has configuration files.\
    \ The project created previously has three configuration files:\n\n-   `ServiceDefinition.csdef`.\
    \ Lets you control the definition of the service itself, such as the HTTP endpoint\
    \ the application will be listening on.\n-   `ServiceConfiguration.Local.cscfg`.\
    \ The configuration file being packaged when choosing the `Local` deployment mode.\n\
    -   `ServiceConfiguration.Cloud.cscfg`. The configuration file being packaged\
    \ when choosing the `Cloud` deployment mode.\n\nAlthough the `web.config` build\
    \ mode changes the `web.config` file using transformations, the `ServiceConfiguration.cscfg`\
    \ does not; it uses the `Local` or the `Cloud` version depending on the deployment\
    \ mode selected. Figure [8-15 sho](#index_split_001.html#p180)ws how to apply\
    \ the `Release` build configuration transformation and the `Cloud` service configuration\
    \ file when packaging the project.\n\n**Figure 8-15.** Selecting the deployment\
    \ and build configuration settings\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 138](index-181_1.png)\n\n## CHAPTER 8 ■ Windows Azure And ASP.NET\n\n\
    The `ServiceConfiguration.cscfg` file allows you to provide service-level settings\
    \ that your code can read. Because your code can read this file, you could place\
    \ the database connection string in this configuration file rather than in the\
