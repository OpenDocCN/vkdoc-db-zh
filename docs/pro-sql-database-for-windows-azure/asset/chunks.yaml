- fmt: '# CHAPTER 2 ■ DESIGN CONSIDERATIONS


    system uses the transparent branching pattern to update shared records in a `SQL
    Database` instance. At this point, however, the edge caches aren’t aware of the
    change in data. At a specific interval (every 10 minutes, for example), a worker
    process in `Windows Azure` picks up the changes and stores them in blobs. The
    worker may decide to apply logic to the data and resolve conflicts, if any. Blobs
    are then created (or replaced) with the latest cache information that should be
    loaded. The edge cache refreshes its internal data by loading the blobs at specific
    intervals (every 5 minutes, for example) and replaces its internal content with
    the latest cache. If all edge caches are configured to run against a public atomic
    clock, all the caches are updated virtually at the same time.


    *Figure 2-17. Shared edge data caching*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Data Encryption


    You can encrypt your data in two environments: onsite or in `Windows Azure` using
    a service. `SQL Database`, as previously mentioned, doesn’t support encryption
    at this time (although hashing is supported). If you need to encrypt Social Security
    numbers or phone numbers, you should consider where encryption makes sense.


    Generally speaking, unless your application runs in a public environment where
    your private keys can be at risk, you should consider encrypting onsite before
    the data goes over the Internet. But if you need a way to decrypt in `Windows
    Azure`, or you need to encrypt and decrypt data across consumers that don’t share
    keys, you probably need to encrypt your data in `Windows Azure` before storing
    it in `SQL Database`.


    ## SaaS Applications and Federations


    Designing SaaS applications typically requires the use of multiple databases in
    order to scale both data storage and performance. In order to build a solid SaaS
    solution, developers typically develop a custom framework that provides the connection
    routing logic needed by an application to determine which database it should connect
    to.


    If you are building a SaaS application, you should investigate the use of Federations,
    a feature of `SQL Database`.


    Federations help with scalability by distributing data across multiple databases
    by using administrative `SQL` commands. I will review Federations in greater detail
    in Chapter 11, including how the feature works and some of its current limitations.


    ## Summary


    This chapter reviewed many design concepts that are unique to distributed computing
    and for which cloud computing is a natural playground. Remember that designing
    cloud applications can be as simple as connecting to a `SQL Database` instance
    from your onsite applications or as complex as necessary (with distributed edge
    caches and shards) for enterprise-wide systems.


    The chapter provided multiple parameters that you should consider when designing
    your application, each of which can significantly impact your final design, such
    as performance, billing, security, storage options, and throttling. You should
    consider creating two or more cloud-based designs and reviewing them with other
    designers to discuss pros and cons before making your final selection. And if
    you have the time, build a proof-of-concept to validate your assumptions and measure
    how effective the solution will be.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 3


    ## Security


    Compared to other systems in most corporations, database environments are probably
    the weakest point when it comes to security, with a few exceptions such as the
    banking sector. The reason is that databases are considered well within the boundaries
    of internal networks, which are considered secured and usually inaccessible directly
    from the Internet.


    With the advent of `SQL Database` and most Database as a Service solutions, the
    focus on database security rises all the way to the top for two primary reasons:
    you’re no longer in control of your data, and the data can be directly accessed
    from the Internet. As a result, it becomes even more important to take advantage
    of all the capabilities of `SQL Database` and understand its limitations.


    ## Overview


    Before diving into the specifics of `SQL Database`, let’s look at a general security
    framework to assess how Database as a Service can impact you. The following discussion
    is based on the basic security principles encapsulated by confidentiality, integrity,
    and availability (`CIA`). This is referred to as the `CIA triad` and is one of
    the most accepted forms of security categorization. `SQL Database` has different
    strengths and weaknesses than traditional `SQL Server` installations, so it is
    important to review each area of the `CIA triad` to understand how to deal with
    its weaknesses and to leverage its strengths.


    ## Confidentiality


    *Confidentiality* is the ability to ensure that data can be accessed only by authorized
    users. It’s about protecting your data from prying eyes or from inadvertent leakage,
    and it’s achieved by using multiple technologies, including the following:


    - **Encryption**. Creates a *ciphertext* (encrypted information) that can be decrypted
    through the use of a shared key or a certificate.

    - **Hashing**. Generates a ciphertext that can’t be decrypted (typically used
    for password storage).

    - **Access control**. Controls access to data based on contextual information.

    - **Authentication**. Controls who can access the database and which objects in
    the database a user can access.

    - **Firewall**. Uses technology to limit network connectivity to a list of known
    machines.


    `SQL Database` offers new features, such as a firewall (as previously discussed);
    however, it doesn’t yet support data encryption natively (such as Transparent
    Data Encryption [`TDE`] and field-level encryption), which places more emphasis
    on the other confidentiality techniques.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `SQL Server`, on the other hand, doesn’t provide a native firewall (although it’s
    possible to use `Windows`’ native firewall or purchase after-market database firewalls),
    but it offers strong encryption capabilities. Finally, both `SQL Server` and `SQL
    Database` offer hashing capabilities.


    Because `SQL Database` doesn’t provide native encryption, your code needs to do
    all the hard work. Not to worry! In this chapter, you see how to implement hashing
    and encryption using `C#` and how to store the ciphertext in `SQL Database` (or
    `SQL Server`, for that matter).


    ## Integrity


    Data *integrity* refers to the objective of ensuring that information is modified
    only by authorized users, and that damage can be undone if necessary. Integrity
    of data can be compromised in multiple ways, such as a malicious `SQL Injection`
    attack or the unintentional execution of a `TRUNCATE` statement on a table, wiping
    out all the records.


    Generally speaking, you can implement the following integrity measures in a database:


    - **Authorization**. Controls who can change what data.

    - **Backup**. Creates a transactionally consistent database snapshot from which
    data can be recovered.

    - **Roles-based access**. Provides the minimum access rights to different roles
    in a company, such as developers and support.

    - **Auditing**. Tracks database access and data changes to provide an audit trail
    for forensic analysis.


    From an integrity standpoint, `SQL Database` doesn’t yet provide the same capabilities
    as `SQL Server`.'
