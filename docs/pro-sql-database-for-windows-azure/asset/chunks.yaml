- fmt: "# 为云开发应用程序的注意事项\n\n## 连接安全与实现\n\n首先，我们来谈谈为云开发应用程序时需要考虑的一些事项。本章大部分内容都在讨论如何连接到\
    \ SQL Database，但在开始编码之前，你首先应该考虑的是你的连接。\n\n首要任务是保护你的连接字符串，使其免受注入攻击和中间人攻击。.NET Framework\
    \ 提供了一个简单的类，用于创建和管理 `SqlConnection` 类使用的连接字符串内容，这就是 `SqlConnectionStringBuilder`\
    \ 类。\n\n以下示例展示了如何使用此类。首先定义四个静态变量来保存用户名、密码、数据库名称和服务器：\n\n```csharp\nprivate static\
    \ string userName = \"SQLScott@server\";\nprivate static string userPassword =\
    \ \"password\";\nprivate static string dataSource = \"tcp:server.database.windows.net\"\
    ;\nprivate static string dbName = \"AdventureWorks2012\";\n```\n\n然后修改 `GetConString`\
    \ 方法，以使用 `SqlConnectionStringBuilder` 类动态构建连接字符串：\n\n```csharp\nstring GetConString(int\
    \ connType)\n{\n    if (connType == 1)\n    SqlConnectionStringBuilder connstr\
    \ = new SqlConnectionStringBuilder();\n    connstr.DataSource = dataSource;\n\
    \    connstr.InitialCatalog = dbName;\n    connstr.Encrypt = true;\n    connstr.TrustServerCertificate\
    \ = false;\n    connstr.UserID = userName;\n    connstr.Password = userPassword;\n\
    \    return connstr.ToString();\n    ...\n}\n```\n\n因此，在连接到 SQL Database 实例时，请考虑以下几点：\n\
    \n- 使用 `SqlConnectionStringBuilder` 类以避免注入攻击。此类有助于防止用户 ID 和密码被窥探并用于攻击。\n- 虽然所有\
    \ SQL Database 流量都通过端口 443 加密传输，但请务必将 `Encrypt` 参数设置为 `True`，并将 `TrustServerCertificate`\
    \ 设置为 `False`，以确保连接正确加密，避免任何中间人攻击。\n- 尽可能使用 MARS（多活动结果集）以减少访问数据库的次数。\n- 使用连接池以通过减少必须打开新数据库连接的次数来提高代码效率和应用程序性能。Windows\
    \ Azure SQL Database 会自动终止空闲超过 30 分钟的连接。最佳实践是设计应用程序，使其连接晚打开、早关闭。\n\n最后，我们来讨论一些连接限制。\n\
    \n## 瞬态故障处理应用程序块\n\n瞬态故障处理应用程序块提供了一组可重用组件，用于向应用程序中添加重试逻辑。这些组件可与许多 Windows Azure\
    \ 服务（如 SQL Database、存储、服务总线和缓存）一起使用。这些组件通过向应用程序添加强大的瞬态故障处理逻辑，提供了应用程序所需的弹性。\n\n\
    瞬态故障是由于某些临时条件（如网络连接问题或服务不可靠）而发生的错误。在大多数情况下，只需等待一小段时间然后重试操作，即可成功完成操作。\n\n这就是瞬态故障处理应用程序块的用武之地。瞬态故障处理应用程序块（以下简称\
    \ `TFHAB`）是 Microsoft 企业库的一部分。它是 Microsoft 模式与实践小组和 Windows Azure 客户顾问团队紧密合作的成果。\n\
    \n`TFHAB` 通过使用检测策略来识别所有已知的瞬态错误条件，使开发人员能够基于内置的重试策略轻松定义重试策略。\n\n`TFHAB` 包含三种内置重试策略，开发人员可以利用它们在应用程序中实现一致的重试行为。这三种内置重试策略基于时间间隔：\n\
    \n- **固定**：在重试之间等待固定的时间。\n- **增量**：每次重试后，等待时间增加 1。\n- **指数退避**：在重试之间，等待时间呈指数增长。\n\
    \n你稍后将看到每种策略的示例。\n\n## 将瞬态故障处理应用程序块添加到你的项目中\n\n`TFHAB` 是一个 NuGet 包，通过 Visual Studio\
    \ 中的包管理器控制台添加。但是，在使用包管理器控制台之前，需要安装 NuGet。打开浏览器并导航到 NuGet 网站：`http://nuget.org/`。在主页上，单击“安装\
    \ NuGet”按钮。NuGet 支持 Visual Studio 2010 和 2012。\n\n安装 NuGet 后，打开 Visual Studio\
    \ 并创建一个新的 Windows 窗体应用程序。项目创建后，从 Visual Studio 的“工具”菜单中，选择“库包管理器”>“包管理器控制台”。\n\
    \n在控制台窗口中，键入以下命令（如图 5-15 所示）以安装瞬态故障处理应用程序块：\n\n```\nInstall-Package EnterpriseLibrary.WindowsAzure.TransientFaultHandling\n\
    ```\n\n键入安装命令后按 Enter。相应的程序集和引用将被添加到你的项目中。安装完成后，在解决方案资源管理器中展开“引用”节点，你将看到项目中添加了超过六个新的\
    \ `Microsoft.Practices` 引用。\n\n**图 5-15.** 在包管理器控制台中添加 `TFHAB`\n\n## 使用瞬态故障处理应用程序块\n\
    \n安装 `TFHAB` 后，首先需要向代码中添加几条指令：\n\n```csharp\nusing Microsoft.Practices.EnterpriseLibrary.WindowsAzure.TransientFaultHandling.SqlAzure;\n\
    using Microsoft.TransientFaultHandling;\n```\n\n这些指令与任何其他指令一样，它们允许使用命名空间中的类型。接下来要做的是定义重试策略。此策略简单地定义了重试命令的次数、重试之间的等待时间长度以及若干退避时间。设置起来实际上非常简单，只需一行代码：\n\
    \n```csharp\nRetryPolicy myretrypolicy = new RetryPolicy<SqlAzureTransientErrorDetectionStrategy>(3,\
    \ TimeSpan.FromSeconds(3));\n```\n\n`RetryPolicy` 构造函数有五个重载，如图 5-16 所示，但最常用的重载接受两个参数：重试次数和重试之间的等待时间。\n\
    \n**图 5-16.** 重试策略构造函数\n\n此示例简单地将尝试次数定义为三，并将重试间隔设置为三秒。定义重试策略后，可以通过 `ReliableSqlConnection`\
    \ 类将其应用于连接。此类提供了一种可靠地打开连接并执行命令的方法。\n\n`ReliableSqlConnection` 类也有三个重载：连接字符串、应用于连接的已定义重试策略，以及可选的命令。\n\
    \n向 Button2 添加以下代码，该代码使用 `ReliableSqlConnection` 类并将重试策略应用于连接和命令：\n\n```csharp\n\
    using (ReliableSqlConnection cnn = new ReliableSqlConnection(connString, myretrypolicy,\
    \ myretrypolicy))\n{\n    try\n    {\n        cnn.Open();\n        using (var\
    \ cmd = cnn.CreateCommand())\n        {\n            cmd.CommandText = \"SELECT\
    \ * FROM HumanResources.Employee\";\n            using (var rdr = cnn.ExecuteCommand<IDataReader>(cmd))\n\
    \            {\n                //\n            }\n        }\n    }\n    catch\
    \ (Exception ex)\n    {\n        MessageBox.Show(ex.Message.ToString());\n   \
    \ }\n}\n```"
  raw: 'Let’s spend a few minutes talking about some things you should consider when
    developing applications for the cloud. We’ve spent a large portion of this chapter
    discussing how to connect to SQL Database, but even before you start coding, the
    very first thing you should consider is your connection. First and foremost, secure
    your connection string from injection attacks and man-in-the-middle attacks. The
    .NET Framework provides a simple class in which to create and manage the contents
    of connection strings used by the SqlConnection class. This is the SqlConnectionStringBuilder
    class.


    The following example illustrates how to use this class. I first define four static
    variables to hold the username, password, database name and server:


    private static string userName = "SQLScott@ *server*";


    private static string userPassword = *password*;


    private static string dataSource = "tcp: *server*.database.windows.net"; private
    static string dbName = "AdventureWorks2012";


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    I then modify my GetConString method to use the SqlConnectionStringBuilder class
    to dynamically build my connection string:


    string GetConString(int connType)


    {


    if (connType == 1)


    SqlConnectionStringBuilder connstr = new SqlConnectionStringBuilder();


    connstr.DataSource = dataSource;


    connstr.InitialCatalog = dbName;


    connstr.Encrypt = true;


    connstr.TrustServerCertificate = false;


    connstr.UserID = userName;


    connstr.Password = userPassword;


    return connstr.ToString();


    ...


    }


    Thus, consider the following when connecting to a SQL Database instance.


    • Use the SqlConnectionStringBuilder class to avoid injection attacks. This class
    helps protect the user ID and password from being seen and then used in an attack.


    • While all SQL Database traffic is encrypted and sent over port 443, be sure
    to set the Encrypt parameter to True and the TrustServerCertificate to False to
    ensure a properly encrypted connection to avoid any man-in-the-middle attacks.


    • Use MARS (Multiple Active Results Sets) whenever possible to reduce the number
    of trips to the database.


    • Use connection pooling to provide improved code efficiency and application performance
    by reducing the number of times a new database connection must be opened. Windows
    Azure


    SQL Database automatically terminates connections that have been idle for 30 minutes
    or longer. The best practice is to design your application such that connections
    are opened late and closed early.


    Lastly, let’s discuss some connection constraints.


    Transient Fault Handling Application Block


    The Transient Fault Handling Application Block provides a set of reusable components
    for adding retry logic into your applications. These components can be used with
    the many of the Windows Azure services such as SQL Database, Storage, Service
    Bus, and Caching. These components provide the resiliency applications needed
    in applications by adding robust transient fault handling logic into applications.


    Transient faults are errors that occur due to some type of temporary condition
    such as network connectivity issues or unreliable service. In most cases, simply
    waiting for a brief period of time and then retrying the operation results in
    a successful operation.


    This is where the Transient Fault Handling Application Block comes in. The Transient
    Fault Handling Application Block (we’ll call it TFHAB from here to save space.
    . . and typing) is part of Microsoft’s Enterprise Library. It is the result of
    some great collaboration between the Microsoft Patterns & Practices group and
    the Windows Azure Customer Advisory team.


    The TFHAB works by using detection strategies to identify all known transient
    error conditions, making it easy for developers to define retry policies based
    on the built-in retry strategies.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 84](index-126_1.jpg)


    Chapter 5 ■ programming with SQL DatabaSe


    The TFHAB includes three built-in retry strategies which developers can utilize
    to implement a consistent retry behavior within their applications. The three
    built-in retry strategies are based on intervals:


    • **Fixed**: Wait a fixed number of time between retries.


    • **Incremental**: Increment the wait time by 1 between each retry.


    • **Exponential back-off**: Exponentially increment the wait time between each
    retry.


    You’ll see an example of each of these shortly.


    Adding the Transient Fault Handling Application Block to Your Project


    The TFHAB is a NuGet package that is added through the Package Manager Console
    in Visual Studio. However, before you can use the Package Manager Console, you
    need to install NuGet. Open a browser and navigate to the NuGet web site at


    [http://nuget.org/](http://nuget.org/). On the main home page, click the Install
    NuGet button. NuGet supports Visual Studio 2010 and 2012.


    Once NuGet is installed, open Visual Studio and create a new WinForms application.
    Once the project is created, from the Tools menu in Visual Studio, select Library
    Package Manager ➤ Package Manager Console.


    In the console window type the following command, as shown in Figure [5-15, t](#index_split_001.html#p126)o
    install the Transient Fault Handling Application Block:


    Install-Package EnterpriseLibrary.WindowsAzure.TransientFaultHandling


    ***Figure 5-15.** Adding the TFHAB in Package Manager Console*


    Press Enter once you have typed in in the Install command. The appropriate assemblies
    and references will be added to your project. Once the install is done, expand
    the References node in Solution Explorer and you will see over six new Microsft.Practices
    references added to your project.


    Using the Transient Fault Handling Application Block


    With the TFHAB installed, the first thing that needs to be done is to add a couple
    of directives to the code: using Microsoft.Practices.EnterpriseLibrary.WindowsAzure.TransientFaultHandling.SqlAzure
    using Microsoft.TransientFaultHandling


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 85](index-127_1.jpg)


    Chapter 5 ■ programming with SQL DatabaSe


    These directives are like any other directive in that they allow the use of types
    in a namespace. The next thing to do is to define the retry policy. This policy
    simply defines the number of times to retry the command and the length of time
    to wait between the number of retries, as well as several backoff times. Setting
    this is actually quite easy; a single line of code:


    RetryPolicy myretrypolicy = new RetryPolicy<SqlAzureTransientErrorDetectionStrategy>
    (3, TimeSpan.FromSeconds(3));


    The RetryPolicy constructor has five overloads, as shown in Figure [5-16, b](#index_split_001.html#p127)ut
    the most commonly used overload takes two parameters; the count of retries and
    the wait time between retries.


    ***Figure 5-16.** Retry policy constructors*


    This example simply defines the number of tries as three and sets the retry interval
    at three seconds. With the retry policy defined it can be applied to the connection
    through the ReliableSqlConnection class. This class provides a way to reliably
    open a connection and execute commands through the policy just defined.


    The ReliableSqlConnection class also has three overloads: the connection string,
    the defined retry policy to the connection, and optionally the command.


    Add to Button2 the following code, which uses the ReliableSqlConnection class
    and applies the retry policy to both the connection and the command:


    using (ReliableSqlConnection cnn = new ReliableSqlConnection(connString, myretrypolicy,
    myretrypolicy))


    {


    try


    {


    cnn.Open();


    using (var cmd = cnn.CreateCommand())


    {


    cmd.CommandText = "SELECT * FROM HumanResources.Employee";


    using (var rdr = cnn.ExecuteCommand<IDataReader>(cmd))


    {


    //


    }


    }


    }


    catch (Exception ex)


    {


    MessageBox.Show(ex.Message.ToString());


    }


    }


