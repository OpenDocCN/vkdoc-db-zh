- fmt: '# Chapter 5 Programming with SQL Database


    ## Summary


    在本章中，我们讨论了将数据库架构及相关数据迁移到`SQL Azure`的各种选项。你了解到每种方法都有其优缺点；例如，`SQL Server`脚本生成向导会生成架构和数据的脚本，但`SSIS`和`bcp`实用程序不会。你还了解到，如果你使用`SQL
    Server 2008 R2`或`SQL Server 2012`，可以选择为`SQL Azure`生成脚本，该功能会生成可在`SQL Azure`环境中直接执行的对象脚本。


    我们还讨论了`SQL Azure Copy`功能，它允许你创建`SQL Azure`数据库的副本用于备份目的。


    将数据库置于`SQL Azure`后，我们现在可以专注于如何为`SQL Azure`编程应用程序，这是第5章的主题。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    前面的章节为本书的其余部分奠定了基础。你已经了解了`Windows Azure SQL Database`的概览，学习了云计算设计选项，并逐步完成了`Azure`账户的设置。你阅读了关于`SQL
    Database`安全性的内容，包括安全合规性和加密主题；并且在上一章中，你学习了数据迁移（如何将数据放入云端）和备份策略——这些都是数据库管理员（DBA）喜欢听到的内容。


    从本章开始，本书的其余部分将专注于使用`SQL Database`进行开发。本章将探讨使用各种微软技术为`SQL Database`编程，包括`ODBC`、`ADO.NET`、`LINQ`等。


    本章还讨论了当你开始设计和构建与`SQL Database`协同工作的新应用程序，或考虑将现有应用程序迁移到`SQL Database`时的开发注意事项。


    你应该开始意识到，`SQL Database`实际上与你本地的`SQL Server`实例并没有*那么*不同。上一章详细讨论了`SQL Database`中的一些`T-SQL`差异，但也提到微软正在持续增加功能和特性；因此，差异正在以非常快的速度缩小（这让本书的写作成为一个有趣的挑战，但这是另一个故事了）。开发应用程序的关键不在于将应用程序指向你的云数据库版本，而在于开发应用程序的方法和访问云数据库的设计考量。简单地将数据库迁移到云端并将应用程序指向该实例可能会导致灾难性的结果，例如应用程序性能下降和产生不必要的金钱成本。


    本章首先专注于应用程序设计方法，以充分利用`SQL Database`应用程序开发。本章其余部分讨论了访问`SQL Database`实例的各种技术，向你展示如何使用这些技术连接和检索数据。你将学习正确使用每种技术的场合，因为有很多技术可供选择。本章末尾提供了一个简单、最佳实践的讨论：在远程部署到`SQL
    Database`之前先在本地进行测试，以确保成功的应用程序部署。


    本章还将用一些篇幅讨论应用程序开发最佳实践，以帮助解决前面章节中提到的许多问题，例如节流（`throttling`）和延迟（`latency`），所有这些问题都会影响任何类型的应用程序，无论其托管在本地还是在云端。


    ## Application Deployment Factors'
  raw: 'Red Gate is known for their SQL Server tools. They continue to create great
    products, and Cloud Services doesn’t disappoint. Cloud Services is a suite of
    tools that help manage your cloud applications. As part of this suite of tools
    is the ability to back up your SQL Database. You can schedule backups to Windows
    Azure BLOB storage as well as restore the backup to a new database or an existing
    SQL Database. More information on Red Gate’s Cloud Services can be found here:


    [http://cloudservices.red-gate.com/](http://cloudservices.red-gate.com/)


    Summary


    In this chapter we discussed the various options for migrating your database schema
    and associated data to SQL


    Azure. You learned that there are pros and cons to each method; for example, the
    SQL Server script-generation wizard will script the schema as well as the data,
    but SSIS and the bcp utility do not. You also learned that if you use SQL


    Server 2008 R2 or SQL Server 2012, you have the option to script for SQL Azure,
    which scripts the objects ready for execution in the SQL Azure environment.


    We also discussed the SQL Azure Copy feature, which allows you to make a copy
    of your SQL Azure database for backup purposes.


    With your database in SQL Azure, we can now focus on how to program applications
    for SQL Azure, the topic of Chapter 5.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 5**


    **Programming with SQL Database**


    The chapters previous to this one have laid the foundation for the rest of the
    book. You’ve seen an overview of Windows Azure SQL Database, learned about cloud
    computing design options, and walked through setting up your Azure account. You’ve
    read about SQL Database security, including security compliance and encryption
    topics; and you spent the last chapter learning about data migration (how to get
    your data into the cloud) and backup strategies—the types of things a DBA likes
    to hear.


    Starting with this chapter, the rest of the book focuses on developing with SQL
    Database. This chapter looks at using various Microsoft technologies to program
    for SQL Database, including ODBC, ADO.NET, LINQ, and others.


    This chapter also discusses development considerations as you start to design
    and build new applications to work with SQL Database or consider moving existing
    applications to SQL Database.


    You should begin getting the picture that SQL Database really isn’t *that* different
    from your local SQL Server instances. The last chapter talked at length about
    some of the T-SQL differences in SQL Database but also said that Microsoft is
    continually adding features and functionality; so, the differences gap is closing
    at a very rapid pace (which has made writing this book a fun challenge, but that’s
    another story). The key to developing applications isn’t pointing your application
    to your cloud version of the database, but rather your approach to developing
    the application and design considerations for accessing your cloud database. Simply
    moving a database to the cloud and pointing your application to that instance
    can have disastrous results, such as degraded application performance and unwanted
    monetary costs.


    This chapter first focuses on application design approaches to get the most from
    SQL Database application development. The rest of the chapter discusses various
    technologies for accessing your SQL Database instance, showing you how to use
    those technologies to connect to and retrieve data. You learn the right place
    to use each of the technologies, because there are many technologies to choose
    from. The end of this chapter provides a simple, best-practice discussion of testing
    locally before deploying remotely to ensure a successful SQL Database application
    deployment.


    This chapter will also spend a few pages on application development best practices
    to help solve many of the issues noted in earlier chapters, such as throttling
    and latency, all of which affect any type of application whether hosted on-premises
    or in the cloud.


    Application Deployment Factors'
  trans: '# 第五章 SQL 数据库编程


    ## 章节摘要


    在本章中，我们探讨了将数据库架构及相关数据迁移到 `SQL Azure` 的各种选项。你了解到每种方法都有其优缺点；例如，`SQL Server` 脚本生成向导会生成架构和数据的脚本，但
    `SSIS` 和 `bcp` 实用程序则不会。你还了解到，如果你使用 `SQL Server 2008 R2` 或 `SQL Server 2012`，可以选择为
    `SQL Azure` 生成脚本，该功能会生成可在 `SQL Azure` 环境中直接执行的对象脚本。


    我们还讨论了 `SQL Azure Copy` 功能，它允许你创建 `SQL Azure` 数据库的副本用于备份目的。


    将数据库置于 `SQL Azure` 后，我们现在可以专注于如何为 `SQL Azure` 编程应用程序，这是本章的主题。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    前面的章节为本书的其余部分奠定了基础。你已经了解了 `Windows Azure SQL Database` 的概览，学习了云计算设计选项，并逐步完成了 `Azure`
    账户的设置。你阅读了关于 `SQL Database` 安全性的内容，包括安全合规性和加密主题；并且在上一章中，你学习了数据迁移（如何将数据放入云端）和备份策略——这些都是数据库管理员（DBA）喜欢听到的内容。


    从本章开始，本书的其余部分将专注于使用 `SQL Database` 进行开发。本章将探讨使用各种微软技术为 `SQL Database` 编程，包括 `ODBC`、`ADO.NET`、`LINQ`
    等。


    本章还讨论了当你开始设计和构建与 `SQL Database` 协同工作的新应用程序，或考虑将现有应用程序迁移到 `SQL Database` 时的开发注意事项。


    你应该开始意识到，`SQL Database` 实际上与你本地的 `SQL Server` 实例并没有*那么*不同。上一章详细讨论了 `SQL Database`
    中的一些 `T-SQL` 差异，但也提到微软正在持续增加功能和特性；因此，差异正在以非常快的速度缩小（这让本书的写作成为一个有趣的挑战，但这是另一个故事了）。开发应用程序的关键不在于将应用程序指向你的云数据库版本，而在于开发应用程序的方法和访问云数据库的设计考量。简单地将数据库迁移到云端并将应用程序指向该实例可能会导致灾难性的结果，例如应用程序性能下降和产生不必要的金钱成本。


    本章首先专注于应用程序设计方法，以充分利用 `SQL Database` 应用程序开发。本章其余部分讨论了访问 `SQL Database` 实例的各种技术，向你展示如何使用这些技术连接和检索数据。你将学习正确使用每种技术的场合，因为有很多技术可供选择。本章末尾提供了一个简单、最佳实践的讨论：在远程部署到
    `SQL Database` 之前先在本地进行测试，以确保成功的应用程序部署。


    本章还将用一些篇幅讨论应用程序开发最佳实践，以帮助解决前面章节中提到的许多问题，例如节流（`throttling`）和延迟（`latency`），所有这些问题都会影响任何类型的应用程序，无论其托管在本地还是在云端。


    ## 应用程序部署因素'
- fmt: '## 重新部署应用程序


    正如第4章所述，您可以利用该章的信息将整个数据库推送到 `SQL Database`。但这样做对吗？


    第2章详细讨论了为云环境设计和发布应用程序的各个方面，包括存储、高可用性、安全性和性能等主题。每个方面都很重要（尤其是性能），在考虑将应用程序迁移到云端时都应讨论。除了安全性，性能是公司对云计算关注的首要问题之一。


    公司最不希望看到的事情之一，就是决定将关键应用程序迁移到云端后，却发现其性能不如本地版本的应用程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第5章 ■ 使用 `SQL Database` 编程


    不要认为将本地应用程序迁移到云端会自动导致安全问题和性能损失——事实并非如此。通过规划和正确的方法，您可以非常成功地将应用程序部署到云端。本次讨论以及第2章的目的，是让您在部署前进行思考和规划，从而采取正确的方法。问题是，什么是正确的方法？


    本次讨论实际上关乎两件事。首先，在决定将应用程序迁移到云端时，是移动整个应用程序（即数据库和应用程序）还是只移动一部分？其次，无论您是移动全部还是部分数据库，您是同时移动应用程序，还是将其保留在本地？不要忘记，使用
    `SQL Database` 并不意味着您必须自动将应用程序迁移到 `Azure` 平台。


    您可以将数据库移到云端，同时仍将应用程序托管在本地。与所有事物一样，您有选择。让我们讨论托管 `SQL Database` 应用程序的不同方式。


    ### 本地托管应用程序


    `On-premises` 意味着您的应用程序托管在本地，而不是在 `Windows Azure` 中，但您的数据库位于 `SQL Database` 实例中。您的应用程序代码使用客户端库访问一个或多个
    `SQL Database` 实例。一些公司不愿将业务逻辑或特定于应用程序的逻辑置于其企业数据中心之外，而本地托管选项提供了将数据存放在云端同时将应用程序逻辑保留在本地的能力。


    虽然这是一个可行的选择，但它也有相关的限制。例如，仅支持以下客户端库：

    - .NET Framework 3.5 SP1 Data Provider for SQL Server (`System.Data.SqlClient`)
    或更高版本

    - Entity Framework 3.5 SP1 或更高版本

    - SQL Server 2008 R2 Native Client ODBC 驱动程序

    - SQL Server 2008 Native Client Driver（支持但功能较少）

    - SQL Server 2008 Driver for PHP 1.1 版或更高版本


    如果您的应用程序使用 `OLE DB`，则必须更改为使用此处列出的客户端库之一。


    与将应用程序保留在本地相关的最大考虑因素是成本。每次您在 `SQL Database` 和本地应用程序之间移动数据时，都会有相应的入站数据传输成本（在本书出版时，美国和欧洲为每GB
    $0.05 - $0.12，所有其他地区为每GB $0.12 - $0.19）。如果您使用 `Azure Storage`，则还有使用该存储的成本（目前为每GB
    $0.037 – $0.093）。同样，这是按GB计算的，因此成本很低。一个昂贵模式的例子是每天多次同步大量数据。但请记住，即使同步一个50GB的数据库，成本也低于几美元。


    这些成本和限制不应阻止您为应用程序使用本地托管解决方案。然而，让我们看看 `Azure` 托管解决方案提供了什么。


    ### Azure 托管应用程序


    `Azure-hosted` 意味着您的应用程序代码托管在 `Windows Azure` 中，而您的数据库位于 `SQL Database` 中。


    您的应用程序仍然可以使用相同的客户端库来访问 `SQL Database` 中的一个或多个数据库。目前大多数公司正在将现有的 `ASP.NET` 应用程序发布到
    `Windows Azure` 并访问 `SQL Database`。然而，您不仅限于Web应用程序：您也可以使用 `Windows` 桌面应用程序或 `Silverlight`
    应用程序，通过 `Entity Framework` 和 `WCF` (`Windows Communication Foundation`) Data Services
    客户端来访问 `SQL Database`。再次强调，您有丰富的选择。


    使用 `Azure` 托管解决方案的好处是能够最小化对 `SQL Database` 实例请求的网络延迟。同样重要的是，您削减了在 `SQL Database`
    和应用程序之间移动数据的成本。只要您的 `Windows Azure` 和 `SQL Database` 位于同一子区域，两者之间的带宽使用是免费的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第5章 ■ 使用 `SQL Database` 编程


    通过将应用程序和数据库都放在 `Azure` 中，您还可以获得应用程序与数据库之间事务处理更高效的好处，因为这样做最小化了两者之间的网络延迟。


    但您会产生计算成本，目前为每小时 $0.12。`Compute hours` 是您的应用程序部署到 `Windows Azure` 的时间。即使您的应用程序未处于运行状态，您也会被计费。按小时计费，不足一小时的部分按整小时计算。在开发和测试应用程序时，您应该删除未使用的计算实例。因此，这里的关键是`在远程部署前在本地进行测试`。


    ### 如何选择？


    是否将应用程序迁移到云端或将其保留在本地，完全由您决定，这不应仅仅由您刚刚在最后两节中读到的内容来决定。决策并非如此简单。您需要考虑其他几个因素，例如成本、数据流量和带宽，然后基于对此信息的分析做出决定。例如，对于一个网络流量很少的小公司来说，由于计算成本，在
    `Azure` 中托管应用程序可能不是一个明智的决定。然而，同一个公司可以将其数据库保留在 `Azure` 中，同时将应用程序保留在本地，因为数据传输成本极小，并且仍然可以获得
    `SQL Database`（故障转移、高可用性等）的好处。


    在许多公司中，最初的目标并非采用“全有或全无”的方法。公司会花一些时间审视其数据库和应用程序，决定哪些功能适合放入云端，并对此进行测试。他们首先测试性能，以确保应用程序在生产环境中部署到
    `Windows Azure` 时，其性能与本地解决方案相当。思路是将重要事项放在首位，以确保 `Azure` 部署成功。如果有必要，可以逐步推出您的应用程序，并在部署前在本地进行测试。


    是部署全部还是部分数据库和应用程序，由您决定。第2章详细讨论了这个问题，本章不再赘述，只希望您在做出决定前，应审视所有事实。


    ### 连接到 SQL Database


    开发与 `SQL Database` 一起工作的应用程序并非 rocket science（特别复杂或神秘的科学技术），但它需要知道预期的情况以及您可以使用的功能。您之前已经了解到并非所有客户端库都与
    `SQL Database` 兼容，并看到了支持的库。附录B将花一些时间讨论 `SQL Database` 中存在的 `T-SQL` 功能。即使在本书编写过程中，随着
    `Microsoft` 不断添加功能，支持的功能列表也在变化。本章重点从客户端应用程序的角度进行阐述。'
  raw: 'As stated earlier, you could use the information from Chapter 4 to push your
    *entire* database to SQL Database. But is that the right thing to do?


    Chapter 2 discussed at length the design aspects of architecting and publishing
    applications for the cloud, including topics such as storage, high availability,
    security, and performance. Each of those aspects is important (especially performance)
    and should be discussed when you’re considering moving applications to the cloud.
    In addition to security, performance is one of the primary items of concern that
    companies have about cloud computing.


    One of the last things a company wants to do is decide to take a critical application
    and move it to the cloud, only to find that it doesn’t perform as well as the
    on-premises version of the app.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    Don’t get the idea that moving an on-premises application to the cloud automatically
    results in security issues and a loss of performance—that isn’t the case. With
    planning and the right approach, you can achieve a very successful application
    deployment into the cloud. The purpose of this discussion, and of Chapter 2, is
    to get you to think and plan before you deploy, so you take the right approach.
    The question is, what is that right approach?


    This discussion is really about two things. First, when deciding to move an application
    to the cloud, do you move the entire application (that is, the database and the
    app) or just a portion? Second, regardless of whether you move all or a portion
    of the database, do you also move the application, or do you keep the application
    on-premises? Let’s not forget that using SQL Database doesn’t mean you automatically
    have to move your application to the Azure platform.


    You can move your database to the cloud and still host your application on-premises.
    As with everything, you have options. Let’s discuss the different ways of hosting
    your SQL Database application.


    On-Premises Application


    *On-premises* means your application is hosted locally and not in Windows Azure,
    but your database is in a SQL


    Database instance. Your application code uses client libraries to access one or
    more SQL Database instances. Some companies are reluctant to put business logic
    or application-specific logic outside of their corporate data center, and the
    on-premises option provides the ability to house the data in the cloud while keeping
    the application logic local.


    Although this is a viable option, limitations are associated with it. For example,
    only the following client libraries are supported:


    • .NET Framework 3.5 SP1 Data Provider for SQL Server (System.Data.SqlClient)
    or later


    • Entity Framework 3.5 SP1 or later


    • SQL Server 2008 R2 Native Client ODBC driver


    • SQL Server 2008 Native Client Driver (supported, but with less functionality)


    • SQL Server 2008 Driver for PHP version 1.1 or later


    If your application uses OLE DB, you have to change it to use one of the client
    libraries listed here instead.


    The biggest consideration related to keeping your application on-premises is the
    cost. Any time you move data between SQL Database and your on-premises application,
    there is an associated cost for inbound data transfers (at the time this book
    went to press, $0.05 - $0.12 per GB for US and Europe, $0.12 - $0.19 for all other
    areas). If you’re using Azure Storage, there is also the cost of using that storage
    (currently, $0.037 – $0.093 per GB). Again, this is per GB, so the cost is low.
    An example of an expensive pattern is synchronizing large amounts of data multiple
    times per day. But keep in mind that synching even a 50GB database costs less
    than a few dollars.


    These costs and limitations shouldn’t deter you from using an on-premises solution
    for your application.


    However, let’s look at what an Azure-hosted solution provides.


    Azure-Hosted Application


    *Azure-hosted* means that your application code is hosted in Windows Azure and
    your database is in SQL Database.


    Your application can still use the same client libraries to access the database
    or databases in SQL Database. Most companies right now are taking existing ASP.NET
    applications and publishing them to Windows Azure and accessing SQL Database.
    However, you aren’t limited to just web apps: you can use a Windows desktop app
    or Silverlight app that uses the Entity Framework and the WCF (Windows Communication
    Foundation) Data Services client to access SQL Database as well. Again, you have
    plenty of options.


    The benefit of using an Azure-hosted solution is the ability to minimize network
    latency of requests to the SQL


    Database instance. Just as important is the fact that you’re cutting the costs
    of data movement between SQL Database and the application. As long as your Windows
    Azure and SQL Database are in the same subregion, bandwidth usage between SQL
    Database and Windows Azure is free.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    By putting both your application and database in Azure, you also get the benefit
    of more efficient transactions between your app and the database, because doing
    so minimizes the network latency between your application and the database.


    But you incur the compute cost, which is currently $0.12 per hour. *Compute hours*
    is the time your application is deployed to Windows Azure. Even if your application
    isn’t in a running state, you’re being billed. Billing is per hour, and partial
    hours are billed as full hours. When developing and testing your application,
    you should remove the compute instances that aren’t being used. Thus, the key
    here is *to test locally before deploying remotely*.


    Which to Choose?


    The decision whether to move your application to the cloud or keep it local is
    entirely up to you, and it shouldn’t be determined solely by what you’ve just
    read in the last two sections. The decision isn’t that cut-and-dried. You need
    to look at several other factors, such as costs, data traffic, and bandwidth,
    and then base your decision on the analysis of this information. For example,
    it may not be a sound decision for a small company with little web traffic to
    host an application in Azure, because of the compute costs. However, that same
    company can keep its database in Azure while keeping the application on-premises
    because the data-transfer costs are minimal, and still gain the benefits of SQL
    Database (failover, high availability, and so on).


    In many companies, the initial goal isn’t an all-or-nothing approach. The companies
    spend some time looking at their databases and applications, decide what functionality
    makes sense to put in the cloud, and test functionality on that. They test for
    performance foremost, to ensure that when the app is deployed to Winodws Azure
    in production, performance is in the same ballpark as their on-premises solution.
    The thought is to keep the important things up front to ensure a successful Azure
    deployment. Roll your application out in pieces, if necessary, and test locally
    prior to deployment.


    Whether you deploy all or part of your database and application is for you to
    decide. Chapter 2 discussed the issue at length, and this chapter doesn’t rehash
    it except to say that before you make a decision, you should look at all the facts.


    Connecting to SQL Database


    Developing applications that work with SQL Database isn’t rocket science, but
    it requires knowing what to expect and what functionality you have to work with.
    You read earlier that not all client libraries work with SQL Database and saw
    the libraries that are supported. Appendix B will spend some time discussing what
    T-SQL functionality exists in SQL Database. Even as this book is being written,
    the list of supported features changes as Microsoft continues to add functionality.
    This chapter focuses on a client application’s perspective.'
  trans: '## 重新部署应用程序


    正如第 4 章所述，您可以利用该章的信息将整个数据库推送到 `SQL Database`。但这样做对吗？


    第 2 章详细讨论了为云环境设计和发布应用程序的各个方面，包括存储、高可用性、安全性和性能等主题。每个方面都很重要（尤其是性能），在考虑将应用程序迁移到云端时都应讨论。除了安全性，性能是公司对云计算关注的首要问题之一。


    公司最不希望看到的事情之一，就是决定将关键应用程序迁移到云端后，却发现其性能不如本地版本的应用程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 5 章 ■ 使用 `SQL Database` 编程


    不要认为将本地应用程序迁移到云端会自动导致安全问题和性能损失——事实并非如此。通过规划和正确的方法，您可以非常成功地将应用程序部署到云端。本次讨论以及第 2
    章的目的，是让您在部署前进行思考和规划，从而采取正确的方法。问题是，什么是正确的方法？


    本次讨论实际上关乎两件事。首先，在决定将应用程序迁移到云端时，是移动整个应用程序（即数据库和应用程序）还是只移动一部分？其次，无论您是移动全部还是部分数据库，您是同时移动应用程序，还是将其保留在本地？不要忘记，使用
    `SQL Database` 并不意味着您必须自动将应用程序迁移到 `Azure` 平台。


    您可以将数据库移到云端，同时仍将应用程序托管在本地。与所有事物一样，您有选择。让我们讨论托管 `SQL Database` 应用程序的不同方式。


    ### 本地托管应用程序


    `On-premises` 意味着您的应用程序托管在本地，而不是在 `Windows Azure` 中，但您的数据库位于 `SQL Database` 实例中。您的应用程序代码使用客户端库访问一个或多个
    `SQL Database` 实例。一些公司不愿将业务逻辑或特定于应用程序的逻辑置于其企业数据中心之外，而本地托管选项提供了将数据存放在云端同时将应用程序逻辑保留在本地的能力。


    虽然这是一个可行的选择，但它也有相关的限制。例如，仅支持以下客户端库：

    - .NET Framework 3.5 SP1 Data Provider for SQL Server (`System.Data.SqlClient`)
    或更高版本

    - Entity Framework 3.5 SP1 或更高版本

    - SQL Server 2008 R2 Native Client ODBC 驱动程序

    - SQL Server 2008 Native Client Driver（支持但功能较少）

    - SQL Server 2008 Driver for PHP 1.1 版或更高版本


    如果您的应用程序使用 `OLE DB`，则必须更改为使用此处列出的客户端库之一。


    与将应用程序保留在本地相关的最大考虑因素是成本。每次您在 `SQL Database` 和本地应用程序之间移动数据时，都会有相应的入站数据传输成本（在本书出版时，美国和欧洲为每
    GB $0.05 - $0.12，所有其他地区为每 GB $0.12 - $0.19）。如果您使用 `Azure Storage`，则还有使用该存储的成本（目前为每
    GB $0.037 – $0.093）。同样，这是按 GB 计算的，因此成本很低。一个昂贵模式的例子是每天多次同步大量数据。但请记住，即使同步一个 50GB
    的数据库，成本也低于几美元。


    这些成本和限制不应阻止您为应用程序使用本地托管解决方案。然而，让我们看看 `Azure` 托管解决方案提供了什么。


    ### Azure 托管应用程序


    `Azure-hosted` 意味着您的应用程序代码托管在 `Windows Azure` 中，而您的数据库位于 `SQL Database` 中。


    您的应用程序仍然可以使用相同的客户端库来访问 `SQL Database` 中的一个或多个数据库。目前大多数公司正在将现有的 `ASP.NET` 应用程序发布到
    `Windows Azure` 并访问 `SQL Database`。然而，您不仅限于 Web 应用程序：您也可以使用 `Windows` 桌面应用程序或
    `Silverlight` 应用程序，通过 `Entity Framework` 和 `WCF` (`Windows Communication Foundation`)
    Data Services 客户端来访问 `SQL Database`。再次强调，您有丰富的选择。


    使用 `Azure` 托管解决方案的好处是能够最小化对 `SQL Database` 实例请求的网络延迟。同样重要的是，您削减了在 `SQL Database`
    和应用程序之间移动数据的成本。只要您的 `Windows Azure` 和 `SQL Database` 位于同一子区域，两者之间的带宽使用是免费的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 5 章 ■ 使用 `SQL Database` 编程


    通过将应用程序和数据库都放在 `Azure` 中，您还可以获得应用程序与数据库之间事务处理更高效的好处，因为这样做最小化了两者之间的网络延迟。


    但您会产生计算成本，目前为每小时 $0.12。`Compute hours` 是您的应用程序部署到 `Windows Azure` 的时间。即使您的应用程序未处于运行状态，您也会被计费。按小时计费，不足一小时的部分按整小时计算。在开发和测试应用程序时，您应该删除未使用的计算实例。因此，这里的关键是`在远程部署前在本地进行测试`。


    ### 如何选择？


    是否将应用程序迁移到云端或将其保留在本地，完全由您决定，这不应仅仅由您刚刚在最后两节中读到的内容来决定。决策并非如此简单。您需要考虑其他几个因素，例如成本、数据流量和带宽，然后基于对此信息的分析做出决定。例如，对于一个网络流量很少的小公司来说，由于计算成本，在
    `Azure` 中托管应用程序可能不是一个明智的决定。然而，同一个公司可以将其数据库保留在 `Azure` 中，同时将应用程序保留在本地，因为数据传输成本极小，并且仍然可以获得
    `SQL Database`（故障转移、高可用性等）的好处。


    在许多公司中，最初的目标并非采用“全有或全无”的方法。公司会花一些时间审视其数据库和应用程序，决定哪些功能适合放入云端，并对此进行测试。他们首先测试性能，以确保应用程序在生产环境中部署到
    `Windows Azure` 时，其性能与本地解决方案相当。思路是将重要事项放在首位，以确保 `Azure` 部署成功。如果有必要，可以逐步推出您的应用程序，并在部署前在本地进行测试。


    是部署全部还是部分数据库和应用程序，由您决定。第 2 章详细讨论了这个问题，本章不再赘述，只希望您在做出决定前，应审视所有事实。


    ### 连接到 SQL Database


    开发与 `SQL Database` 一起工作的应用程序并非什么特别复杂或神秘的科学技术，但它需要知道预期的情况以及您可以使用的功能。您之前已经了解到并非所有客户端库都与
    `SQL Database` 兼容，并看到了支持的库。附录 B 将花一些时间讨论 `SQL Database` 中存在的 `T-SQL` 功能。即使在本书编写过程中，随着
    `Microsoft` 不断添加功能，支持的功能列表也在变化。本章重点从客户端应用程序的角度进行阐述。'
- fmt: "# Chapter 5 ■ programming with SQL DatabaSe\n\nThis section looks at using\
    \ several technologies to connect to and query a `SQL Database` instance, including\
    \ `ADO.NET`, `ODBC`, and `WCF Data Services`. You read at length earlier about\
    \ taking the right approach to move to the `Azure` platform. You must consider\
    \ many things, including the following:\n\n- `SQL Database` is only available\
    \ via `TCP port 1433`.\n- `SQL Database` doesn’t currently support `OLE DB`.\n\
    - `SQL Database` only supports `SQL Server` authentication. `Windows Authentication`\
    \ isn’t supported.\n- When connecting to `SQL Database`, you must specify the\
    \ target database in the connection string. Otherwise, you’re connecting to the\
    \ `master` database.\n- Distributed transactions (transactions that affect multiple\
    \ resources, such as tables, or different databases via sharding) aren’t supported\
    \ in `SQL Database`.\n- You must ensure that your `SQL Database` firewall is configured\
    \ to accept connections.\n- You must determine whether any embedded (in-line)\
    \ `T-SQL` in your application is supported by `SQL Database`.\n- You must use\
    \ the login name format `<login>@<server>` when connecting to `SQL Database`,\
    \ because some tools implement `Tabular Data Stream (TDS)` differently.\n\nMost\
    \ of the items in this list are self-explanatory, but let’s talk about a couple\
    \ of them. First, it’s highly recommended that you read `Appendix B`, which discusses\
    \ the `T-SQL` syntax that is and isn’t supported. Also, if you have any inline\
    \ or embedded `T-SQL` code, you need to go through your app and make sure the\
    \ `T-SQL` meets the requirements listed in `Appendix B`. It also may behoove you\
    \ look at the online help for supported `T-SQL` syntax to get the latest up-to-date\
    \ syntax.\n\nSecond, although distributed transactions aren’t supported, `Chapter\
    \ 10` discusses a technique called sharding and `SQL Federation` that you can\
    \ use to improve performance dramatically. Sharding is the concept of horizontally\
    \ partitioning your data among several databases based on criteria (such as geolocation)\
    \ and then using a technology such as the `ADO.NET Task Parallel Library (TPL)`\
    \ to add parallelism and concurrency to your application. `SQL Federation` applies\
    \ this same concept to `SQL Database` by applying partitioning at the database\
    \ level, built in to the `SQL Database`. These topics were also introduced to\
    \ you in `Chapter 2`.\n\nThird, think carefully about `OLE DB`. `SQL Database`\
    \ currently doesn’t support connecting via `OLE DB`, but supporting `OLE DB` is\
    \ on `Microsoft`’s radar. However, as you learned in `Chapter 3`, you can connect\
    \ using `OLE DB` using `SSIS`. It isn’t recommended, though, that you try to work\
    \ in `OLE DB`—wait until it’s fully supported.\n\nLet’s get to some coding. The\
    \ next few sections show you how to connect to `SQL Database` using different\
    \ libraries such as `ADO.NET`, `ODBC`, the `sqlcmd` utility, and `WCF Data Services`\
    \ to query `SQL Database`.\n\nThe examples in the chapter will use the `AdventureWorks2012`\
    \ database for both `SQL Server 2012` and `Windows Azure SQL Database`. The on-premises\
    \ version of the `AdventureWorks` database for `SQL Server 2012` can be found\
    \ here:\n\n[http://msftdbprodsamples.codeplex.com/releases/view/93587](http://msftdbprodsamples.codeplex.com/releases/view/93587)\n\
    \nDownload the file called `AdventureWorks2012_Database.zip`. The `Windows Azure\
    \ SQL Database` version can be found here:\n\n[http://msftdbprodsamples.codeplex.com/releases/view/37304](http://msftdbprodsamples.codeplex.com/releases/view/37304)\n\
    \nInstructions for installing the database for `SQL Database` are included in\
    \ the download file as well as on the download page. You will need to install\
    \ both of these to work through the examples in this chapter.\n\n## ADO.NET\n\n\
    `Microsoft` makes it very easy to connect an application to a `SQL Database` instance,\
    \ by providing the necessary connection strings for a number of client libraries\
    \ such as `ADO.NET`, `Java` and `PHP`, as shown in `Figure 5-1`. You can find\
    \ the connection information in the `Windows Azure Management Portal` by selecting\
    \ the `SQL Databases` option in the `Navigation` pane, selecting the appropriate\
    \ database, and then clicking the `Show Connection Strings` button on the `Dashboard`\
    \ page.\n\nCopy the `ADO.NET` connection to the clipboard. You’ll be using this\
    \ shortly.\n\n![Image 70](index-108_1.png)\n\n*Figure 5-1. Connection strings*\n\
    \n### Making the Connection\n\nLet’s first look at how to connect to a `SQL Database`\
    \ instance using `ADO.NET`. Fire up an instance of `Visual Studio 2010`, and create\
    \ a new `C#` `Windows Forms` application. Then, follow these steps:\n\n1.  Place\
    \ a button on `Form1`, and double-click the new button to view its `Click` event.\n\
    \n2.  Before you place any code in the click event you’ll need to declaration\
    \ to use the appropriate `SqlConnection` class:\n\n```\nusing System.Data.SqlClient;\n\
    ```\n\n3.  Next, let’s add a method to get a connection string. To demonstrate\
    \ connecting to `SQL Database` versus a local database, let’s first connect to\
    \ a local copy of the database. Then, you will change the connection string to\
    \ connect to a `SQL Database` instance. Below the click event, add a new method\
    \ called `GetConString` that returns the connection string for your local instance\
    \ of `SQL Server`. If you have a named instance, be sure to enter the server name\
    \ correctly (using the escape character). Here’s the code to write:\n\n```\nstring\
    \ GetConString()\n{\n    return \"Server=server;Database=AdventureWorks2012;User\
    \ ID=sa;Password=password;\";\n}\n```\n\n4.  Go back to the button’s click event,\
    \ and add the following code. This code calls the `GetConString` method you previously\
    \ added, returns the connection string, establishes and opens a connection to\
    \ the local database, and then closes the connection:\n\n```\nprivate void button1_Click(object\
    \ sender, EventArgs e)\n{\n    string connStr = GetConString();\n\n    using (SqlConnection\
    \ conn = new SqlConnection(connStr))\n    {\n        try\n        {\n        \
    \    conn.Open();\n            MessageBox.Show(\"Connection made.\");\n      \
    \  }\n        catch (SqlException ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n\
    \        }\n        finally\n        {\n            conn.Close();\n        }\n\
    \    }\n}\n```\n\n5.  Run the application, and click the button on the form. You\
    \ should get a message box that says “Connection Made.”\n\nNow, let’s change this\
    \ simple application to connect to `SQL Database`. Instead of returning the connection\
    \ string to your local database, you want to return the `ADO.NET` connection string.\
    \ Continue as follows:\n\n6.  Back in your `Visual Studio` project, paste in the\
    \ connection string you copied form the `Windows Azure Management Portal` earlier\
    \ in the `GetConString` method with the `SQL Database` `ADO.NET` connection string,\
    \ as shown in the following code. Be sure to enter your correct password into\
    \ the connection string:\n\n```\nstring GetConString()\n{\n    return \"Server=tcp:servername.database.windows.net;Database=AdventureWorks2012;\
    \ UserID=username@servername;Password=password; Trusted_Connection=False;Encrypt=True;Connection\
    \ Timeout=30\";\n}\n```\n\n7.  Before you run the application, make sure your\
    \ `Azure` firewall settings are up to date (via the `SQL Database Server Administration`\
    \ page ). Then run the application and click the button on the form. If everything\
    \ is configured correctly, you should get a message box that says “Connection\
    \ Made.”"
  raw: 'This section looks at using several technologies to connect to and query a
    SQL Database instance, including ADO.NET, ODBC, and WCF Data Services. You read
    at length earlier about taking the right approach to move to the Azure platform.
    You must consider many things, including the following:


    • SQL Database is only available via TCP port 1433.


    • SQL Database doesn’t currently support OLE DB.


    • SQL Database only supports SQL Server authentication. Windows Authentication
    isn’t supported.


    • When connecting to SQL Database, you must specify the target database in the
    connection string. Otherwise, you’re connecting to the *master* database.


    • Distributed transactions (transactions that affect multiple resources, such
    as tables, or different databases via sharding) aren’t supported in SQL Database.


    • You must ensure that your SQL Database firewall is configured to accept connections.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    • You must determine whether any embedded (in-line) T-SQL in your application
    is supported by SQL Database.


    • You must use the login name format < *login*>@< *server*> when connecting to
    SQL Database, because some tools implement Tabular Data Stream (TDS) differently.


    Most of the items in this list are self-explanatory, but let’s talk about a couple
    of them. First, it’s highly recommended that you read Appendix B, which discusses
    the T-SQL syntax that is and isn’t supported. Also, if you have any inline or
    embedded T-SQL code, you need to go through your app and make sure the T-SQL meets
    the requirements listed in Appendix B. It also may behoove you look at the online
    help for supported T-SQL syntax to get the latest up-to-date syntax.


    Second, although distributed transactions aren’t supported, Chapter 10 discusses
    a technique called *sharding* and SQL Federation that you can use to improve performance
    dramatically. Sharding is the concept of horizontally partitioning your data among
    several databases based on criteria (such as geolocation) and then using a technology
    such as the ADO.NET Task Parallel Library (TPL) to add parallelism and concurrency
    to your application. SQL


    Federation applies this same concept to SQL Database by applying partitioning
    at the database level, built in to the SQL Database. These topics were also introduced
    to you in Chapter 2.


    Third, think carefully about OLE DB. SQL Database currently doesn’t support connecting
    via OLE DB, but supporting OLE DB is on Microsoft’s radar. However, as you learned
    in Chapter 3, you can connect using OLE DB


    using SSIS. It isn’t recommended, though, that you try to work in OLE DB—wait
    until it’s fully supported.


    Let’s get to some coding. The next few sections show you how to connect to SQL
    Database using different libraries such as ADO.NET, ODBC, the sqlcmd utility,
    and WCF Data Services to query SQL Database.


    The examples in the chapter will use the AdventureWorks2012 database for both
    SQL Server 2012 and Windows Azure SQL Database. The on-premises version of the
    AdventureWorks database for SQL Server 2012 can be found here:


    [http://msftdbprodsamples.codeplex.com/releases/view/93587](http://msftdbprodsamples.codeplex.com/releases/view/93587)


    Download the file called AdventureWorks2012_Database.zip. The Windows Azure SQL
    Database version can be found here:


    [http://msftdbprodsamples.codeplex.com/releases/view/37304](http://msftdbprodsamples.codeplex.com/releases/view/37304)


    Instructions for installing the database for SQL Database are included in the
    download file as well as on the download page. You will need to install both of
    these to work through the examples in this chapter.


    ADO.NET


    Microsoft makes it very easy to connect an application to a SQL Database instance,
    by providing the necessary connection strings for a number of client libraries
    such as ADO.NET, Java and PHP, as shown in Figure [5-1](#index_split_001.html#p108).
    You can find the connection information in the Windows Azure Management Portal
    by selecting the SQL Databases option in the Navigation pane, selecting the appropriate
    database, and then clicking the Show Connection Strings button on the Dashboard
    page.


    Copy the ADO.NET connection to the clipboard. You’ll be using this shortly.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 70](index-108_1.png)


    Chapter 5 ■ programming with SQL DatabaSe


    ***Figure 5-1.** Connection strings*


    Making the Connection


    Let’s first look at how to connect to a SQL Database instance using ADO.NET. Fire
    up an instance of Visual Studio 2010, and create a new C# Windows Forms application.
    Then, follow these steps:


    1\. Place a button on Form1, and double-click the new button to view its Click
    event.


    2\. Before you place any code in the click event you’ll need to declaration to
    use the appropriate SQLConnection class:


    using System.Data.SqlClient;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    3\. Next, let’s add a method to get a connection string. To demonstrate connecting
    to SQL


    Database versus a local database, let’s first connect to a local copy of the database.
    Then, you will change the connection string to connect to a SQL Database instance.
    Below the click event, add a new method called GetConString that returns the connection
    string for your local instance of SQL Server. If you have a named instance, be
    sure to enter the server name correctly (using the escape character). Here’s the
    code to write:


    string GetConString()


    {


    return "Server= *server*;Database=AdventureWorks2012;User ID=sa;Password= *password*;";


    }


    4\. Go back to the button’s click event, and add the following code. This code
    calls the GetConString method you previously added, returns the connection string,
    establishes


    and opens a connection to the local database, and then closes the connection:


    private void button1_Click(object sender, EventArgs e)


    {


    string connStr = GetConString();


    using (SqlConnection conn = new SqlConnection(connStr))


    {


    try


    {


    conn.Open();


    MessageBox.Show("Connection made.");


    }


    catch (SqlException ex)


    {


    MessageBox.Show(ex.Message.ToString());


    }


    finally


    {


    conn.Close();


    }


    }


    }


    5\. Run the application, and click the button on the form. You should get a message
    box that says “Connection Made.”


    Now, let’s change this simple application to connect to SQL Database. Instead
    of returning the connection string to your local database, you want to return
    the ADO.NET connection string. Continue as follows: 6. Back in your Visual Studio
    project, paste in the connection string you copied form the Windows Azure Management
    Portal earlier in the GetConString method with the SQL


    Database ADO.NET connection string, as shown in the following code. Be sure to
    enter


    your correct password into the connection string:


    string GetConString()


    {


    return "Server=tcp: *servername*.database.windows.net;Database=AdventureWorks2012;
    UserID= *username*@ *servername*;Password= *password*;


    Trusted_Connection=False;Encrypt=True;Connection Timeout=30";


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 5 ■ programming with SQL DatabaSe


    7\. Before you run the application, make sure your Azure firewall settings are
    up to date (via the SQL Database Server Administration page ). Then run the application
    and click the button on the form. If everything is configured correctly, you should
    get a message box that says


    “Connection Made.”'
  trans: "# 第 5 章 ■ 使用 SQL 数据库进行编程\n\n本节将探讨使用多种技术连接和查询 `SQL 数据库` 实例，包括 `ADO.NET`、`ODBC`\
    \ 和 `WCF 数据服务`。您之前已详细了解了迁移到 `Azure` 平台的正确方法。您必须考虑许多事项，包括以下内容：\n\n-   `SQL 数据库`\
    \ 仅通过 `TCP 端口 1433` 提供。\n-   `SQL 数据库` 当前不支持 `OLE DB`。\n-   `SQL 数据库` 仅支持 `SQL\
    \ Server` 身份验证。不支持 `Windows 身份验证`。\n-   连接到 `SQL 数据库` 时，必须在连接字符串中指定目标数据库。否则，您将连接到\
    \ `master` 数据库。\n-   `SQL 数据库` 不支持分布式事务（影响多个资源的事务，例如通过分片涉及的表或不同数据库）。\n-   您必须确保\
    \ `SQL 数据库` 防火墙已配置为接受连接。\n-   您必须确定应用程序中任何嵌入（内联）的 `T-SQL` 是否受 `SQL 数据库` 支持。\n\
    -   连接到 `SQL 数据库` 时，必须使用登录名格式 `<login>@<server>`，因为某些工具实现 `表格数据流 (TDS)` 的方式不同。\n\
    \n此列表中的大多数项目都是自解释的，但让我们讨论其中几个。首先，强烈建议您阅读 `附录 B`，其中讨论了支持和不支持的 `T-SQL` 语法。此外，如果您有任何内联或嵌入的\
    \ `T-SQL` 代码，您需要检查您的应用程序，确保 `T-SQL` 满足 `附录 B` 中列出的要求。查看受支持 `T-SQL` 语法的在线帮助以获取最新的语法也可能对您有益。\n\
    \n其次，虽然不支持分布式事务，但 `第 10 章` 讨论了一种称为分片和 `SQL 联邦` 的技术，可用于显著提高性能。分片是根据条件（如地理位置）在多个数据库之间水平分区数据的概念，然后使用诸如\
    \ `ADO.NET 任务并行库 (TPL)` 之类的技术为您的应用程序添加并行性和并发性。`SQL 联邦` 将相同的概念应用于 `SQL 数据库`，在数据库级别应用分区，内置于\
    \ `SQL 数据库` 中。这些主题也在 `第 2 章` 中向您介绍过。\n\n第三，仔细考虑 `OLE DB`。`SQL 数据库` 当前不支持通过 `OLE\
    \ DB` 连接，但支持 `OLE DB` 已在 `Microsoft` 的计划中。然而，正如您在 `第 3 章` 中学到的，您可以使用 `SSIS` 通过\
    \ `OLE DB` 进行连接。但是，不建议您尝试使用 `OLE DB`——请等到它得到完全支持。\n\n让我们开始一些编码。接下来的几节将展示如何使用不同的库（如\
    \ `ADO.NET`、`ODBC`、`sqlcmd` 实用工具和 `WCF 数据服务`）连接到 `SQL 数据库` 以查询 `SQL 数据库`。\n\n\
    本章中的示例将对 `SQL Server 2012` 和 `Windows Azure SQL 数据库` 使用 `AdventureWorks2012` 数据库。适用于\
    \ `SQL Server 2012` 的本地 `AdventureWorks` 数据库版本可以在此处找到：\n\n[`msftdbprodsamples.codeplex.com/releases/view/93587`](http://msftdbprodsamples.codeplex.com/releases/view/93587)\n\
    \n下载名为 `AdventureWorks2012_Database.zip` 的文件。`Windows Azure SQL 数据库` 版本可以在此处找到：\n\
    \n[`msftdbprodsamples.codeplex.com/releases/view/37304`](http://msftdbprodsamples.codeplex.com/releases/view/37304)\n\
    \n用于为 `SQL 数据库` 安装数据库的说明包含在下载文件以及下载页面中。您需要安装这两个数据库才能完成本章中的示例。\n\n## ADO.NET\n\n\
    `Microsoft` 通过为 `ADO.NET`、`Java` 和 `PHP` 等多个客户端库提供必要的连接字符串，使得将应用程序连接到 `SQL 数据库`\
    \ 实例变得非常容易，如 `图 5-1` 所示。您可以通过在 `导航` 窗格中选择 `SQL 数据库` 选项，选择适当的数据库，然后在 `仪表板` 页面上单击\
    \ `显示连接字符串` 按钮，在 `Windows Azure 管理门户` 中找到连接信息。\n\n将 `ADO.NET` 连接复制到剪贴板。您很快就会用到它。\n\
    \n![Image 70](img/index-108_1.png)\n\n*图 5-1. 连接字符串*\n\n### 建立连接\n\n让我们首先看看如何使用\
    \ `ADO.NET` 连接到 `SQL 数据库` 实例。启动 `Visual Studio 2010` 实例，并创建一个新的 `C#` `Windows\
    \ 窗体` 应用程序。然后，按照以下步骤操作：\n\n1.  在 `Form1` 上放置一个按钮，然后双击新按钮以查看其 `Click` 事件。\n\n2.\
    \  在向单击事件放置任何代码之前，您需要声明以使用适当的 `SqlConnection` 类：\n\n```\nusing System.Data.SqlClient;\n\
    ```\n\n3.  接下来，让我们添加一个方法来获取连接字符串。为了演示连接到 `SQL 数据库` 与本地数据库的区别，让我们首先连接到本地数据库副本。然后，您将更改连接字符串以连接到\
    \ `SQL 数据库` 实例。在单击事件下方，添加一个名为 `GetConString` 的新方法，该方法返回本地 `SQL Server` 实例的连接字符串。如果您有命名实例，请确保正确输入服务器名称（使用转义字符）。需要编写的代码如下：\n\
    \n```\nstring GetConString()\n{\n    return \"Server=server;Database=AdventureWorks2012;User\
    \ ID=sa;Password=password;\";\n}\n```\n\n4.  回到按钮的单击事件，并添加以下代码。此代码调用您之前添加的 `GetConString`\
    \ 方法，返回连接字符串，建立并打开到本地数据库的连接，然后关闭连接：\n\n```\nprivate void button1_Click(object\
    \ sender, EventArgs e)\n{\n    string connStr = GetConString();\n\n    using (SqlConnection\
    \ conn = new SqlConnection(connStr))\n    {\n        try\n        {\n        \
    \    conn.Open();\n            MessageBox.Show(\"连接已建立。\");\n        }\n     \
    \   catch (SqlException ex)\n        {\n            MessageBox.Show(ex.Message.ToString());\n\
    \        }\n        finally\n        {\n            conn.Close();\n        }\n\
    \    }\n}\n```\n\n5.  运行应用程序，并单击窗体上的按钮。您应该会看到一个消息框显示“连接已建立。”\n\n现在，让我们将这个简单的应用程序更改为连接到\
    \ `SQL 数据库`。您希望返回 `ADO.NET` 连接字符串，而不是本地数据库的连接字符串。继续如下：\n\n6.  回到您的 `Visual Studio`\
    \ 项目中，在 `GetConString` 方法中粘贴您之前从 `Windows Azure 管理门户` 复制的 `SQL 数据库` `ADO.NET`\
    \ 连接字符串，如下面的代码所示。确保在连接字符串中输入正确的密码：\n\n```\nstring GetConString()\n{\n    return\
    \ \"Server=tcp:servername.database.windows.net;Database=AdventureWorks2012; UserID=username@servername;Password=password;\
    \ Trusted_Connection=False;Encrypt=True;Connection Timeout=30\";\n}\n```\n\n7.\
    \  在运行应用程序之前，请确保您的 `Azure` 防火墙设置是最新的（通过 `SQL 数据库服务器管理` 页面）。然后运行应用程序并单击窗体上的按钮。如果一切配置正确，您应该会看到一个消息框显示“连接已建立。”"
- fmt: "Granted, this is a very simple example, but it illustrates how easy it is\
    \ to take an existing application and point it to SQL Database. The caveat is\
    \ what your application contains. As mentioned earlier, if you have any inline\
    \ T-SQL, at a minimum you need to ensure that its syntax is supported by SQL Database.\
    \ The likelihood is that it is, but it’s always safest to check and `test`.\n\n\
    Even though you’ve connected to SQL Database, does that affect your data-access\
    \ code? The next two sections discuss using a data reader and a dataset when connecting\
    \ to SQL Azure.\n\n## Using a Data Reader\n\nAs you become more and more familiar\
    \ with SQL Database, you’ll find that you don’t need to make a lot of changes\
    \ to your application code except possibly any inline T-SQL. The beauty of all\
    \ this is that you’re using a proven and trusted data-access technology, ADO.NET.\
    \ Thus, nothing really changes. Let’s modify the application and click-event code\
    \ to illustrate this. Follow these steps:\n\n1. Add a new list box to the form.\n\
    \n2. In the click event, add the code in bold in the following snippet. This new\
    \ code uses the `SqlDataReader` class to execute a simple `SELECT` command against\
    \ the SQL Database instance and then iterate over the `SqlDataReader` to populate\
    \ the list box:\n\n```\nprivate void button1_Click(object sender, EventArgs e)\n\
    {\n    string connStr = GetConString();\n    using (SqlConnection conn = new SqlConnection(connStr))\n\
    \    {\n        SqlCommand cmd = new SqlCommand(\"SELECT FirstName, LastName FROM\
    \ Person.Person\", conn);\n        conn.Open();\n        SqlDataReader rdr = cmd.ExecuteReader();\n\
    \        try\n        {\n            while (rdr.Read())\n            {\n     \
    \           listBox1.Items.Add(rdr[0].ToString());\n            }\n          \
    \  rdr.Close();\n        }\n        catch (SqlException ex)\n        {\n     \
    \       MessageBox.Show(ex.Message.ToString());\n        }\n    }\n}\n```\n\n\
    3. Run the application, and click the button on the form. Within a few seconds,\
    \ the list box populates with names from the Users table.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# Chapter 5 ■ Programming with SQL Database\n\nThe key is that you can replace\
    \ the connection string with your local connection string, and it still works.\
    \ This is because you’re using ADO.NET to handle the connection, and it doesn’t\
    \ care where the database is. Next, let’s take this example one step further and\
    \ look at how you use datasets.\n\n## Using a Dataset\n\nIn the last example,\
    \ you found that there is no difference in syntax when using a `SqlDataReader`\
    \ to query a SQL Database instance. This example uses the `SqlCommand` class and\
    \ the `SqlDataAdapter` to query SQL Database and populate a dataset. Here are\
    \ the steps:\n\n1. In the button’s click event, replace the existing code with\
    \ the following:\n\n```\nusing (SqlConnection conn = new SqlConnection(connStr))\n\
    {\n    try\n    {\n        using (SqlCommand cmd = new SqlCommand())\n       \
    \ {\n            conn.Open();\n            SqlDataAdapter da = new SqlDataAdapter();\n\
    \            cmd.CommandText = \"SELECT FirstName, LastName FROM Person.Person\"\
    ;\n            cmd.Connection = conn;\n            cmd.CommandType = CommandType.Text;\n\
    \            da.SelectCommand = cmd;\n            DataSet ds = new DataSet(\"\
    Person\");\n            da.Fill(ds);\n            listBox1.DataSource = ds.Tables[0];\n\
    \            listBox1.DisplayMember = \"FirstName\";\n        }\n    }\n    catch\
    \ (SqlException ex)\n    {\n        MessageBox.Show(ex.Message.ToString());\n\
    \    }\n}\n```\n\nThis code creates a new connection, using the same connection\
    \ information as the previous example, and then creates a new `SqlCommand` instance.\
    \ The connection, text, and type of the `SqlCommand` are set and then executed\
    \ using the instantiated `SqlDataAdapter`. A new dataset is created and filled\
    \ from the `SqlDataAdapter`, which is then applied to the datasource property\
    \ of the list box.\n\n2. Run the application, and click the button on the form.\
    \ Again, the list box is populated with the names from the Users table in the\
    \ SQL Database instance. Again, you could change the connection string to point\
    \ to your local database and the code would work fine.\n\nSo, when would code\
    \ like this `not` work? Suppose your application had code such as the following,\
    \ which creates a table without a clustered index:\n\n```\nusing (SqlConnection\
    \ conn = new SqlConnection(connStr))\n{\n    try\n    {\n        using (SqlCommand\
    \ cmd = new SqlCommand())\n        {\n            // 代码不完整，但原文如此\n        }\n\
    \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
