    The CipherText structure (line 5) is used as a return value. Each encrypted byte
    array comes with its initialization vector, which is a security mechanism that
    prevents dictionary attacks on your database. The Encryption class contains an
    EncryptAES method that performs the actual encryption of a string value; this
    method returns CipherText.


    Because AES requires a secret key, you created one in the form of a byte array
    on line 17\. The secret key must be 32 bytes in length. You can easily generate
    your own by using the GenerateKey method provided by the Aes class provided by
    .NET.


