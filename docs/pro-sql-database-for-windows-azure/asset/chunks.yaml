    \ T-SQL 语句\n*   部分支持的 T-SQL 语句\n*   不支持的 T-SQL 语句\n*   支持的数据类型\n\n## 索引\n\n* \
    \  索引\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 前言\n\n我从`盒装软件`工程师转变为云服务工程师的旅程始于四年多前，当时我转到了微软的\
    \ SQL 云团队。我想说，是我卓越的远见让我做出了这个转变，但事实是，这源于一次团队重组带来的幸运意外。我对此机会感激不尽，因为参与`Windows SQL\
    \ Azure`项目是我职业生涯中最有趣、最激动人心的项目。\n\n构建关系数据库即服务的旅程并非一帆风顺。我们尝试了几种不同的方案，在最终呈现出您今天所见的服务之前，不得不从几个死胡同中退出。\n\
    \n我们还在价值主张上进行了多次迭代。我们在构建什么？它有什么用？它如何帮助客户？曾有很多反对者认为，`SQL`关系数据库在云中没有立足之地。\n\n有些人认为云只是一时的风潮，与人们已经做的没什么不同。而我们的信念不同。\n\
    \n我们知道，您可以兼得关系数据库系统（一个易于理解的模型和编程`API`，以及现有的丰富工具生态系统）和云服务最佳特性（高可用性、轻松快速的配置、大幅减少的管理以及按需付费模式）的优势。\n\
    \n显然，这引起了客户的共鸣。我们看到它被用于各种使用场景。有些是众所周知的场景，如简单的网站、部门级企业应用程序。另一些则是全新的场景，例如我们称之为`数据枢纽`的场景，它涉及数据孤岛之间的共享，比如公司与其分支机构、公司与其供应商/合作伙伴，或者多个协作公司之间。我们最常见的场景是新旧混合的`SaaS`业务线应用程序。这包括纯云公司以及正在将其软件迁移到云端的现有`盒装软件`供应商。对于这些公司来说，迁移到`SaaS`是一个巨大的优势。它使他们能够简化销售周期，将资源集中在核心能力上，并轻松扩展其全球市场覆盖范围。\n\
    \n然而，运行云服务与构建`盒装软件`不同。虽然应用程序的业务逻辑很容易就能启动和运行，特别是如果您有来自本地应用程序的现有代码；但要使其在云中良好运行并不容易。安全性不仅仅是为您的客户采用合规的算法和最佳实践。您有责任防止或至少识别和阻止对系统的恶意攻击。您必须确保将一个租户与另一个租户隔离。可用性和性能是客户视为理所当然的事情，而它们则是您的责任。一旦出现问题，您就会接到电话，将您从睡梦中叫醒。\n"
- fmt: '# Document Outline


    Troubleshooting is much harder. Root-causing an issue on a single `SQL database`
    can be difficult. How do you do it when you have 1000 `SQL databases`? There are
    also model shifts to absorb, like embracing failure and building compensation
    into your system. One of the hardest ones `SQL Database` customers struggle with
    is the notion that they have to `scale out` instead of `scaling up`. This is hard
    because `scale up` was the preferred pattern in the box world and `scaling out`
    is a lot harder. There is also a lot of new stuff to deal with, like `multi-tenancy`.
    How do I host 1000 customers? Which parts stay isolated and which parts are shared?
    How do I do billing? How do I measure `COGS` (and make sure they are low enough!).


    These are not trivial problems. In order to tackle them efficiently you need to
    understand the capabilities of the platform you are running on. Which of the problems
    can it help you to solve and for which ones are you on your own? Authors Scott
    Klein and Herve Roggero have done a great job walking you through the ins and
    outs of `Windows Azure SQL Database`. From Programming Model to Migration Strategies,
    Security to Scale out. Whether you are focused on using the latest high-level
    interfaces like `WCF` and `OData` or diving into the details of performance, tuning
    the book covers everything you need to know about `SQL Database`.


    Rick Negrin

    Lead Program Manager

    `Windows Azure SQL Database`


    xvii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 228](index-304_1.jpg)


    ![Image 229](index-304_2.jpg)


    ## About the Authors


    **Scott Klein** is a `Windows Azure` Technical Evangelist for Microsoft focusing
    on `Windows Azure SQL Database` (formally known as `SQL Azure`) and related cloud-ready
    data services. He started his career in `SQL Server` with version 4.2 and has
    worked with every version since then during his 20+ year career. Prior to joining
    Microsoft he was a `SQL Server` MVP and then became one of the first four `SQL
    Azure` MVPs. Scott is the author or coauthor of several books for both Wrox and
    Apress, including this one. Scott can be found talking about `Windows Azure SQL
    Database` wherever he can get people to listen to him. You can reach Scott at
    `SQLScott@live.com` and read some of his musings at `http://www.scottlklein.com`.


    **Herve Roggero**, `Windows Azure` MVP, is the founder of Blue Syntax Consulting,
    a company specializing in cloud computing products and services. Herve’s experience
    includes software development, architecture, database administration and senior
    management with both global corporations and startup companies. Herve holds multiple
    certifications, including `MCDBA`, `MCSE`, and `MCSD`. He also holds a Master’s
    degree in Business Administration from Indiana University. Herve is the co-author
    of *Pro SQL Database for Windows Azure* from Apress. For more information, visit
    [www.bluesyntax.net](http://www.bluesyntax.net).


    xix


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 230](index-305_1.jpg)


    ## About the Technical Reviewer


    **Thomas LaRock** is a seasoned IT professional with over a decade of technical
    and management experience. Currently serving as a Technical Evangelist for Confio
    Software, Thomas has progressed through several roles in his career, including
    programmer, analyst, and DBA. Thomas holds an `MS` degree in Mathematics from
    Washington State University and is a member of the Usability Professionals’ Association.
    Thomas currently serves on the Board of Directors for the Professional Association
    for `SQL Server` (`PASS`), and is also a `SQL Server` MVP. Thomas can also be
    found blogging at `http://thomaslarock.com` and is the author of *DBA Survivor:
    Become a Rock Star DBA* ([http://dbasurvivor.com](http://dbasurvivor.com)).


    xxi


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Acknowledgments


    This book exists because of the diligence and patience of a handful of individuals
    to whom we are extremely grateful.


    First, to Jonathan Gennick at Apress for letting us do a second edition and being
    a wonderful sounding board for ideas and thoughts regarding this book. Second,
    to Kevin Shea of Apress and Chris Nelson for keeping us on track, reviewing our
    work, correcting our grammar, and making the writing of this book quite a delightful
    process.


    A very special thanks to Tom LaRock, the technical editor, for his meticulous
    and detailed work ensuring that our examples actually work and that the message
    we are sharing is clear and thorough for the readers. If you ever have an opportunity
    to meet Tom LaRock, be sure to thank him, and take the opportunity to talk `SQL
    Server` with him. You will be glad you did.


    We can’t thank the fine individuals at Microsoft enough for their insight and
    feedback on many of these chapters. So, a huge thank you to Rick Negin, Mike Morrison,
    Ariel Netz, and Barclay Hill. It is a pleasure to associate with individuals who
    have a passion in what they do. We also thank Rick Negrin again for contributing
    the Foreword for this book.


    Nothing in this life is worth doing without the love and support of family. Thus,
    Scott would like to profoundly express thanks to his wife, Lynelle, and his children
    for their endless love, support, understanding, and LOADS of patience. Professionally,
    Scott would also like to thank a few of his co-workers for their thoughts, insight,
    and advice.


    Cory Fowler, Brady Gaster, and Wenming Yi, thank you!


    xxiii


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
