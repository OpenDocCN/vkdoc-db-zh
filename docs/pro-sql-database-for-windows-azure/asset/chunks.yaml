    ## Summary


    本章首先讨论了部署应用程序的不同因素，例如将应用程序保留在本地或在Azure中托管。我们还从数据库端介绍了应用程序迁移，提供了将数据库迁移到云端时需要考虑的一些想法和概念，例如要移动多少数据。


    接着我们讨论了连接和查询SQL数据库实例的不同编程方法，为每种方法提供了示例，包括ADO.NET和ODBC。


    然后，我们探讨了通过WCF数据服务访问SQL数据库实例的方法。鉴于当今不仅来自Microsoft，整个业界都对SOA架构有强烈重视，对WCF数据服务的讨论为您的SQL数据库实例提供了服务层的坚实基础。


    最后，我们讨论了一些关键的最佳实践，例如在应用程序中实现重试策略，这可以极大地改善最终用户体验，并为基于云的应用程序增添所需的弹性。


    除了重试，我们还讨论了其他最佳实践，包括连接池和使用`SqlConnectionStringBuilder`类。对所有应用程序开发（无论其是否基于云）而言，一个重要的组成部分是故障处理和重试逻辑的实现。本章花了些篇幅介绍重试逻辑，因为它对基于云的应用程序至关重要。如果实现了所有这些最佳实践，将有助于确保应用程序运行良好。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## SQL Reporting Overview


    SQL Reporting是一个基于经过验证的SQL Server Reporting Services构建的云端报告平台。简而言之，SQL Reporting就是作为高可用云服务运行的SQL
    Server Reporting Services。


    这意味着几件事情。首先，您不需要安装自己的Reporting Services实例，也不需要维护这些实例（例如应用更新）。其次，作为SQL数据库平台的一部分，SQL
    Reporting可以利用Azure平台的优势，为您的报告服务提供高可用性和可扩展性。第三，您可以使用与当前用于构建本地报告相同的熟悉工具来构建报告。最后，开发人员可以将报告作为基于Windows
    Azure解决方案的集成部分交付。


    在本地环境中，配置一个新的SQL Server Reporting Services服务器通常需要多长时间？即使您有一台备用服务器，将该服务器添加到您的SQL
    Server环境通常也需要几个小时。如果能在几分钟内配置一个新的报告服务器会怎样？现在，借助SQL Reporting，您可以在享受Azure平台优势（让Microsoft管理物理管理）的同时做到这一点。


    使用SQL Reporting，您可以快速轻松地配置和部署报告解决方案，同时利用Windows Azure平台的企业级可用性、可扩展性和安全性。


    通过介绍这些内容后，了解SQL Reporting的架构将有助于您了解SQL Database中报告的工作原理。


    ## Architecture


    SQL Reporting Services的架构内置了负载均衡和高可用性。图6-1展示了SQL报告架构的不同组件，我们将对此进行讨论。


    *图 6-1. SQL Reporting Services 架构*


    每个SQL Reporting报告都通过服务端点访问，并引用特定报告。请注意，这与访问本地报告服务器没有什么不同，只是在这种情况下，您访问的是服务端点而不是物理机器。


    请求通过负载均衡器路由，该均衡器将请求进一步路由到架构中的两个应用层：


    - 报告服务网关

    - 报告服务节点


    ### Gateway


    Reporting Services网关处理所有智能元数据路由。例如，网关实现了智能路由，这意味着当报告请求进入时，每个请求都会被处理并发送到处理该请求的最佳可用报告服务器。这增强了系统可用性的安全性和控制。例如，如果一个报告（请求）导致特定节点故障，网关可以智能地停止向该特定Reporting
    Services节点路由请求。


    ### Nodes'
