    \ fails.\n\nBut `SSL` doesn’t encrypt data at rest; it only encrypts data in transit.\
    \ How can you protect your data when it’s stored in SQL Database? Because SQL\
    \ Database doesn’t support encryption natively, you must encrypt and decrypt your\
