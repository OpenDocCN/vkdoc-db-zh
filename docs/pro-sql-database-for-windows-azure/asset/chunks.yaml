- fmt: 'Let’s dive a little deeper into Federations and explore how this technology
    works. The first thing you need to do is learn the terminology that describes
    the components of Federations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 10 ■ FEDERATIONS


    ## Federation Components


    *   `Federation Root`. The federation root is the SQL Database instance from which
    all federations are created. It is the original database you created. This database
    will hold the tables that are not federated, which could be your configuration
    tables, or other tables that do not need to be federated.


    *   `Federation`. A federation is a logical group of tables that share a common
    subset of data: the data domain. For example, your database may be storing customer
    records, purchase history records, addresses, customer leads, and so on. Each
    one of these data sets could be a candidate for federation. A federation is created
    in the federation root.


    *   `Federation Member`. A federation member is a physical database holding all
    or some of the records of a federation. A federation has one or more federation
    members. For example, if you created a PurchaseHistory federation, you may have
    your purchase history records stored across two databases; these two databases
    would be called federation members. Your first federation members will be the
    same size as your root database initially, or the size of the federation member
    being split during a `SPLIT` operation. The size of a federation member can be
    changed on an individual basis. Although you can enforce referential integrity
    between tables within a federation member, you cannot enforce referential integrity
    outside of a federation member.


    *   `Federation Key`. The federation key is the data domain of a federation used
    to partition your data; for example, it could be the customer ID. Each federation
    has a federation key, and each federation member holds a set of values of the
    key. For example, all customer IDs less than 500 are stored by the first federation
    member, and customer IDs greater than or equal to 500 in another one. The federation
    key is used to split records across different databases. The federation key has
    special requirements: it can only be an `int`, `bigint`, `uniqueidentifier`, or
    a `varbinary(n)`.


    *   `Atomic Unit`. An atomic unit (AU) represents a data domain instance (the
    value of a federation key). For example, if your federation key is `customerId`,
    each set of records for a given customer ID is an AU. When you issue database
    requests, you can specify to execute the statement across the entire federation
    member, or limit the scope of the statement to a given AU (for example, `customerId=10`),
    which automatically filters the records to a single customer.


    *   `Reference Table`. Although a federation contains tables that are split across
    multiple federation members, it can also contain tables that are used as reference
    tables. These tables are stored in federation members, but they are not federated.
    Reference tables are not maintained automatically across federation members. Developers
    are responsible for making sure these tables are kept in sync across federation
    members.


    ## Creating a Federation


    Let’s walk through an example of how you would create your first federation. Figure
    10-1 shows the process taking place when you create your first federation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 158](index-213_1.png)


    **Figure 10-1.** Process to create the first federation


    ### Step 1: Create the Database


    In Step 1, you create a database using the regular `CREATE DATABASE` statement
    from the master database in SQL Database:


    ```sql

    // Create a 1GB database. This will become our root database shortly.

    // Make sure you connect to master before running this statement.

    CREATE DATABASE EnzoLog2

    ```


    ### Step 2: Create the Federation


    In Step 2, you create your first federation. Let’s call this federation PurchaseHistory
    and pick a `BigInt` for the partition key, which will be partitioned on `purchaseId`.
    Connect to your new database and run the `CREATE FEDERATION` statement as follows:'
  raw: 'Let’s dive a little deeper into Federations and explore how this technology
    works. The first thing you need to do is learn the terminology that describes
    the components of Federations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ FEdERATions


    • **Federation Root**. The federation root is the SQL Database instance from which
    all federations are created. It is the original database you created. This database
    will hold the tables that are not federated, which could be your configuration
    tables, or other tables that do not need to be federated.


    • **Federation.** A federation is a logical group of tables that share a common
    subset of data: the data domain. For example, your database may be storing customer
    records, purchase history records, addresses, customer leads, and so on. Each
    one of these data sets could be a candidate for federation. A federation is created
    in the federation root.


    • **Federation Member**. A federation member is a physical database holding all
    or some of the records of a federation. A federation has one or more federation
    members. For example, if you created a PurchaseHistory federation, you may have
    your purchase history records stored across two databases; these two databases
    would be called federation members. Your first federation members will be the
    same size as your root database initially, or the size of the federation member
    being split during a SPLIT operation. The size of a federation member can be changed
    on an individual basis. Although you can enforce referential integrity between
    tables within a federation member, you cannot enforce referential integrity outside
    of a federation member.


    • **Federation Key**. The federation key is the data domain of a federation used
    to partition your data; for example, it could be the customer ID. Each federation
    has a federation key, and each federation member holds a set of values of the
    key. For example, all customer IDs less than 500 are stored by the first federation
    member, and customer IDs greater than or equal to 500


    in another one. The federation key is used to split records across different databases.
    The federation key has special requirements: it can only be an int, bigint, uniqueidentifier,
    or a varbinary(n).


    • **Atomic Unit**. An atomic unit (AU) represents a data domain instance (the
    value of a federation key). For example, if your federation key is customerId,
    each set of records for a given customer ID is an AU. When you issue database
    requests, you can specify to execute the statement across the entire federation
    member, or limit the scope of the statement to a given AU (for example, customerId=10),
    which automatically filters the records to a single customer.


    • **Reference Table**. Although a federation contains tables that are split across
    multiple federation members, it can also contain tables that are used as reference
    tables. These tables are stored in federation members, but they are not federated.
    Reference tables are not maintained automatically across federation members. Developers
    are responsible for making sure these tables are kept in sync across federation
    members.


    Let’s walk through an example of how you would create your first federation. Figure
    [10-1](#index_split_002.html#p213) shows the process taking place when you create
    your first federation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 158](index-213_1.png)


    CHAPTER 10 ■ FEdERATions


    ***Figure 10-1.** Process to create the first federation*


    In Step 1, you create a database using the regular CREATE DATABASE statement from
    the master database in SQL


    Database:


    // Create a 1GB database. This will become our root database shortly.


    // Make sure you connect to master before running this statement.


    CREATE DATABASE EnzoLog2


    In Step 2, you create your first federation. Let’s call this federation PurchaseHistory
    and pick a BigInt for the partition key, which will be partitioned on purchaseId.
    Connect to your new database and run the CREATE


    FEDERATION statement as follows:'
  trans: '

    让我们更深入地探讨联合技术，并探索其工作原理。首先，你需要学习描述联合组件的术语。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 10 章 ■ 联合


    ## 联合组件


    *   `联合根`。联合根是创建所有联合的 SQL Database 实例。它是你最初创建的数据库。此数据库将保存未联合的表，例如你的配置表或其他不需要联合的表。


    *   `联合`。联合是一组共享公共数据子集（即数据域）的逻辑表组。例如，你的数据库可能存储客户记录、购买历史记录、地址、潜在客户信息等。这些数据集中的每一个都可能成为联合的候选对象。联合在联合根中创建。


    *   `联合成员`。联合成员是一个物理数据库，保存联合的全部或部分记录。一个联合有一个或多个联合成员。例如，如果你创建了一个 PurchaseHistory
    联合，你的购买历史记录可能存储在两个数据库中；这两个数据库将被称为联合成员。初始时，你的第一个联合成员的大小将与根数据库相同，或者与执行 `SPLIT` 操作时被拆分的联合成员大小相同。联合成员的大小可以单独调整。虽然你可以在联合成员内的表之间强制执行引用完整性，但不能在联合成员之外强制执行引用完整性。


    *   `联合键`。联合键是联合中用于分区数据的数据域；例如，它可以是客户 ID。每个联合都有一个联合键，每个联合成员保存该键的一组值。例如，所有小于 500
    的客户 ID 存储在第一个联合成员中，而大于或等于 500 的客户 ID 存储在另一个成员中。联合键用于在不同数据库之间拆分记录。联合键有特殊要求：它只能是
    `int`、`bigint`、`uniqueidentifier` 或 `varbinary(n)` 类型。


    *   `原子单元`。原子单元代表一个数据域实例（即联合键的值）。例如，如果你的联合键是 `customerId`，那么针对给定客户 ID 的每一组记录就是一个原子单元。当你发出数据库请求时，可以指定在整个联合成员上执行语句，或者将语句的作用范围限制在给定的原子单元（例如
    `customerId=10`），这会自动将记录过滤到单个客户。


    *   `引用表`。虽然联合包含分布在多个联合成员中的表，但它也可以包含用作引用表的表。这些表存储在联合成员中，但它们不是联合的。引用表不会在联合成员之间自动维护。开发人员负责确保这些表在联合成员之间保持同步。


    ## 创建联合


    让我们通过一个例子来了解如何创建你的第一个联合。图 10-1 展示了创建第一个联合时发生的过程。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 158](img/index-213_1.png)


    **图 10-1.** 创建第一个联合的过程


    ### 步骤 1：创建数据库


    在步骤 1 中，你使用 SQL Database 中 master 数据库的常规 `CREATE DATABASE` 语句来创建一个数据库：


    ```sql

    // 创建一个 1GB 的数据库。这很快将成为我们的根数据库。

    // 运行此语句前请确保已连接到 master。

    CREATE DATABASE EnzoLog2

    ```


    ### 步骤 2：创建联合


    在步骤 2 中，你创建你的第一个联合。让我们称这个联合为 PurchaseHistory，并选择一个 `BigInt` 作为分区键，该键将基于 `purchaseId`
    进行分区。连接到你的新数据库并运行 `CREATE FEDERATION` 语句，如下所示：

    '
- fmt: "# CHAPTER 10 ■ FEdERATions\n\n// Connect to your new database before running\
    \ this statement\n\n`CREATE FEDERATION PurchaseHistory (purchaseId BigInt RANGE)`\n\
    \n`Note` Keep in mind that you will be charged for every new federation member\
    \ you create, in addition to the root database.\n\nThe `CREATE FEDERATION` statement\
    \ creates another database; it is your first federation member. Federation members\
    \ have random database names. The only way to connect to the federation is to\
    \ issue the `USE` command. Now that we have our first federation member, we need\
    \ to build the schema (tables, stored procedures, and so on) of the federation.\
    \ This is important because the schema of this federation member will be used\
    \ when we create additional federation members.\n\nIf you are trying to federate\
    \ an existing table, you will need to treat this operation as a data migration\
    \ effort; indeed you cannot simply federate a table that already exists in the\
    \ root database. You would first need to create the federation member, the table\
    \ itself, and then use another tool (like SQL Server Integration Services) to\
    \ migrate the data from the root database to the federation member. At that point,\
    \ you can start splitting the table located in the federation member.\n\nSo let’s\
    \ connect to the first federation member and create a `Purchase` table. Notice\
    \ that the `USE FEDERATION` command requires a value for the federation key; it\
    \ uses this value as a hint to find the correct federation member. Because this\
    \ is our first federation member, you can use any value for `purchaseId`; all\
    \ possible values for `purchaseId` currently point to the same federation member.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\n// Connect to the\
    \ federation member\n// FILTERING=OFF means that we are working with all the atomic\
    \ units in\n// this federation member\nUSE FEDERATION PurchaseHistory (purchaseId\
    \ = 0) WITH FILTERING=OFF, RESET\n\n// Create a federated table on the purchaseId\
    \ federation key\nCREATE TABLE Purchases (\n    pid bigint NOT NULL primary key,\
    \ -- unique identifier for this record\n    amount decimal(10, 2) NOT NULL, --\
    \ the amount of the purchase\n    storeId int NOT NULL -- the store where the\
    \ purchase was made\n)\nFEDERATED ON (purchaseId = pid)\n```\n\nLet’s create additional\
    \ objects in this federation member. First let’s create a reference table, which\
    \ contains the list of stores, and a stored procedure that returns the total sales\
    \ amount for a given store:\n\n```sql\n// Create a reference table called StoreLocations\n\
    CREATE TABLE StoreLocations (\n    storeId int NOT NULL primary key,\n    storeName\
    \ nvarchar(20) NOT NULL,\n    zipCode nvarchar(10) NOT NULL\n)\n```\n\nLet’s also\
    \ add a stored procedure and a foreign key reference:\n\n```sql\n// Create a stored\
    \ procedure that returns purchases made in a zip code\nCREATE PROC GetPurchasesByZipCode(@zipCode\
    \ nvarchar(10))\nAS\nSELECT * FROM Purchases P JOIN StoreLocations S\nON P.storeId\
    \ = S.storeId\nWHERE S.zipCode = @zipCode\n\n// Let's add the foreign key now.\n\
    ALTER TABLE Purchases\nADD CONSTRAINT fk_storeId\nFOREIGN KEY (storeId) REFERENCES\
    \ StoreLocations (storeId)\n```\n\nLast, but not least, let’s add a few records\
    \ in our tables. You will see how the split operation will redistribute our records\
    \ shortly.\n\n```sql\nINSERT INTO StoreLocations VALUES (1, 'Boca Raton', '33498'\
    \ )\nINSERT INTO StoreLocations VALUES (2, 'Orlando', '32801' )\nINSERT INTO Purchases\
    \ VALUES (100, 25.0, 1)\nINSERT INTO Purchases VALUES (200, 75.0, 2)\nINSERT INTO\
    \ Purchases VALUES (300, 50.0, 1)\nINSERT INTO Purchases VALUES (500, 100.0, 2)\n\
    INSERT INTO Purchases VALUES (600, 12.0, 1)\n```\n\nAt this point, the `PurchaseHistory`\
    \ is a shard with a single database in it (a scale-up shard in some ways). Federations\
    \ allow you to manage the degree of compression by splitting shards further. Imagine\
    \ that we need to split our records so that the `Purchases` table is split over\
    \ two databases, as illustrated in Step 3 of Figure [10-1](#index_split_002.html#p213).\
    \ You split the federation by connecting to the ROOT database and using the `ALTER\
    \ FEDERATION` command as shown here:\n\n```sql\n// Connect to the root database\n\
    USE FEDERATION ROOT WITH RESET\n\n// Alter the federation to issue the split command\n\
    ALTER FEDERATION PurchaseHistory SPLIT AT (purchaseId = 500)\n```\n\nThe `ALTER\
    \ FEDERATION` statement takes place asynchronously and is an online operation.\
    \ While the split is taking place you can access your federation members normally.\
    \ Once the split is completed your federation will contain two federation members\
    \ and will be transactionally consistent. Because the split creates two new federation\
    \ members, copies all the objects and records, and drops the original federation\
    \ member, your application may experience a connection drop at the end of the\
    \ split operation. If this is the case you simply need to reconnect. To obtain\
    \ the status of any operation performed on the federation, check out the `dm_federation_operations`\
    \ view in the root database. If no records are returned, the split operation you\
    \ started earlier is completed:\n\n```sql\n// Query the status of the split operation\n\
    SELECT * FROM sys.dm_federation_operations\n```\n\nThe split operation copied\
    \ all the objects from the original federation member, including the stored procedure,\
    \ the reference table and its data, and the foreign key.\n\nLet’s take a look\
    \ at our data in both federation members, one at a time.\n\n```sql\n// Connect\
    \ to the first federation member\nUSE FEDERATION PurchaseHistory (purchaseId =\
    \ 0) WITH FILTERING=OFF, RESET\n// Get some data; three records will come back\n\
    SELECT * FROM Purchases P JOIN StoreLocations S ON P.storeId = S.storeId\n\n//\
    \ Now let's connect to the second federation member\nUSE FEDERATION PurchaseHistory\
    \ (purchaseId = 500) WITH FILTERING=OFF, RESET\n// Get some data; two records\
    \ will come back\nSELECT * FROM Purchases P JOIN StoreLocations S ON P.storeId\
    \ = S.storeId\n\n// You can also execute the stored procedure\nEXEC GetPurchasesByZipCode\
    \ '33498'\n```\n\nNow that we have two federation members, you may need to update\
    \ a record. But which federation contains your record? Your application does not\
    \ need to know about the low-level implementation details. It just needs to know\
    \ the value of the atomic unit you want to update. Let’s update `purchaseId=100`\
    \ to another amount:\n\n```sql\n// Connect to the federation member containing\
    \ purchaseId=100\nUSE FEDERATION PurchaseHistory (purchaseId = 100) WITH FILTERING=OFF,\
    \ RESET\n// Get some data; three records will come back\nUPDATE Purchases SET\
    \ amount = 17.25 WHERE pid = 100\n```\n\nThe `WHERE` clause used here may give\
    \ you the impression that you are dealing with scale-up architecture, since it\
    \ is the only scalability model requiring such a clause. That’s because we specified\
    \ the connection with `FILTERING=OFF`, which allows the query to access all the\
    \ atomic units in the current federation member. Alternatively, you can tell SQL\
    \ Database that you want to work with a specific atomic unit, giving you the impression\
    \ you have no other record than the one you want to change. The following statements\
    \ are the preferred approach to update your records. Note the use of `FILTERING=ON`.\n\
    \n```sql\n// Connect to the first federation member\n// FILTERING=ON is optional;\
    \ it is the default setting.\nUSE FEDERATION PurchaseHistory (purchaseId = 100)\
    \ WITH FILTERING=ON, RESET\n// Get some data; three records will come back\nUPDATE\
    \ Purchases SET amount = 17.25\n```\n\nYou can apply the same logic to add or\
    \ delete records in the federation member. If you want to delete multiple atomic\
    \ units you need to use the `FILTERING=OFF` option so that your statement can\
    \ affect multiple records. Also, the `INSERT` statement will fail if you are trying\
    \ to insert an atomic unit for which the key falls outside of the current federation\
    \ member partition key range.\n\n## Creating More Federations\n\nSo far we have\
    \ created a single federation and split the records in two in order to create\
    \ two federation members."
