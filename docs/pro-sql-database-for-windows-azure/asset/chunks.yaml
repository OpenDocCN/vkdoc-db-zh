    Execution Plans with SSMS


    Sometimes you need to dig deeper and understand how SQL Database fetches data,
    and then use that information to improve performance. In SQL Server, you can also
    use execution plans to observe the impact of changes to the underlying hardware,
    such as changing memory configuration. Although you have no control over configuration
    settings with SQL Database, execution plans can still be very useful to see the
    impact of your indexes and to view which physical operators are being used.


    Whereas logical operators are used in a SQL statement, such as LEFT JOIN, *physical
    operators* tell you which technique SQL Database is using to solve a given logical
    operation or to fetch additional data. The most common physical operators SQL
    Database uses to represent JOIN operations are listed in Table [11-4.](#index_split_002.html#p227)


    ***Table 11-4.** Physical* JOIN *operators*


    **Operator**


    **SSMS Symbol**


    **Comment**


    Nested loop


    A loop is performed in SQL Database to retrieve data. For each


    record in Table 1 matching the WHERE clause, find the matching


    records in Table 2\. On large recordsets, loops can be costly.


    Hash match


    A hash is calculated for each record in each table participating


    in a JOIN, and the hashes are compared for equality.


    Merge


    Merge operators are usually the fastest operators because


    they perform a single pass of the tables involved by taking


    advantage of the order in which the data is stored or retrieved.


    You can give SQL Database certain hints to use a specific physical operator, but
    using them isn’t generally recommended. You have three proper ways to influence
    SQL Database to select an effective physical operator:


    • **Review your** WHERE **clause.** This is perhaps the most overlooked aspect
    of performance tuning.


    When you have the choice, applying the WHERE clause on the tables that have the
    most rows gives you new opportunities for indexing.


    • **Optimize your database design.** Highly normalized databases force you to
    create more JOIN


    statements. And of course, the more JOIN statements, the more tuning you need
    to do. While you shouldn’t necessarily plan to have tables at first normal form,
    denormalizing certain tables can offer performance benefits.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 167](index-228_1.png)


    Chapter 11 ■ performanCe tuning


    • **Create better indexes.** Having a good indexing strategy is important. The
    order of your columns and the number of columns can make a world of difference
    for SQL Database. This chapter reviews indexing shortly.


    ■ **Note** to run the following examples, you need to execute the tuning.sql script
    available on the book’s download page. it creates a few sample tables with test
    data. make sure to select a user database when running this script.


    To show which physical JOIN operators have been selected, execution plans provide
    insights into the volume of data being worked on and the relative cost of certain
    operations. For example, execute the following SQL statement (after running the
    tuning.sql script):


    SELECT T.Name, T.UserType


    FROM TestUsers T INNER JOIN TestUserType UT'
