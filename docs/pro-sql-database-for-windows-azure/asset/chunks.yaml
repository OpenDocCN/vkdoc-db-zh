    \ a performance problem in SQL Database, you can place the business logic that\
    \ needs the data in a stored procedure, and have the procedure return a status\
    \ code. Because you aren’t charged for CPU time, this becomes an affordable option.\n\
    \nStored procedures can also be a security tool, allowing you to proxy the calls\
    \ to underlying tables through a procedure and never allowing direct access to\
    \ the tables.\n\nImagine that you need to calculate the cost of an item; however,\
    \ in order to calculate the cost, you must loop to obtain certain values and perform\
    \ advanced operations. You can make a call from your application and calculate\
