    ## 读取分片


    既然您已经了解了应用程序和库中如何处理连接字符串，您需要知道分片如何处理跨多个数据库的 `SELECT` 操作。最简单的形式是，库针对先前定义的连接列表执行
    `SELECT` 操作。


    客户端应用程序调用 `ExecuteShardQuery`，该方法接着遍历 `SqlConnection` 对象列表（见图 [9-4](#index_split_002.html#p194)）。如果您查看代码，可以看到首先创建了每个连接对象的副本；这是为了避免客户端代码多次调用此方法时发生任何潜在冲突（一个连接一次只能进行一次调用）。然后，对于每个连接，代码调用
    `ExecuteSingleQuery`，这是分片库中调用数据库的方法。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 147](index-194_1.png)


    第 9 章 ■ 为高性能而设计


    **图 9-4. 从分片读取**


    `ExecuteShardQuery` 方法设计为使用 TPL 多次并行调用 `ExecuteSingleQuery` 方法。TPL 提供了许多有用的方法来轻松处理并行处理，而无需管理线程。分片库使用
    `Parallel.ForEach`，它允许代码并发执行一个匿名方法，并根据计算机的硬件配置自动调整线程数。因此，如果您有足够的连接可以遍历，CPU 越多，以下代码执行得越快。但请注意，您需要锁定数据对象（第5行），它是一个
    `DataTable`，因为它可能被其他执行线程访问。最后，`DataTable` 对象上的 `Merge` 方法将来自不同连接的结果集连接起来。循环执行后，结果数据对象包含从分片检索到的记录列表，顺序不保证：


    ```csharp

    1. Parallel.ForEach(connections,

    2. delegate(SqlConnection c)

    3. {

    4. DataTable dt = ExecuteSingleQuery(command, c, exceptions);

    5. lock (data)

    6. data.Merge(dt, true, MissingSchemaAction.Add);

    7. }

    8. );

    ```


    以下代码是实际示例应用程序的简化版本。（为清晰起见，移除了计算执行时间和执行异常处理的代码。）第4行设置要执行的命令文本，例如一个 `SELECT` 语句，第5行针对分片执行它。代码没有调用
    `ExecuteReader`，而是调用 `ExecuteShardQuery` 来使用分片。第7行将结果的 `DataTable` 绑定并显示分片返回的记录：


    ```csharp

    1. SqlCommand cmd = new SqlCommand();

    2. DataTable dataRes = new DataTable();

    3.

    4. cmd.CommandText = this.textBox1.Text;

    5. dataRes = cmd.ExecuteShardQuery();

    6.

    7. dataGridView2.DataSource = dataRes;

    ```


    图 [9-5](#index_split_002.html#p195) 显示了此代码的结果。`SELECT` 语句旨在返回数据库对象名称和类型。针对分片执行该语句符合预期。但是，请注意，显示中添加了一个额外的列：`__guidDB__`。这是前面介绍的GUID列的名称。这个列对于读取没有太大帮助，但它支持更新和删除，正如您稍后将看到的。


    **图 9-5. 显示分片返回的记录**


    只要每个连接的连接字符串中有一个关键参数不同，提供的GUID对于每个数据库连接就是唯一的。它由前面描述的 `ExecuteSingleQuery` 方法添加。在此方法中，在所有其他列之前添加了一个数据列，该列携带GUID。在以下代码摘录中，第3行创建了类型为
