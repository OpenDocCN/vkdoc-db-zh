    Creating a SQL Database Instance


    This first thing you need to do is to create a new SQL Database server. The name
    of the SQL Database server becomes a fully qualified Internet address, and a logical
    name under which database instances are created. When the SQL


    Database server is created, the master database is provisioned automatically.
    This database is read-only and contains configuration and security information
    for your databases. You can then create your user databases. You can either 7


