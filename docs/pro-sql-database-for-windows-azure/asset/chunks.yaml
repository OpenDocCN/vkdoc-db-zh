    # 基于模式的安全与数据隔离


    基于模式的安全与数据隔离已在第 3 章中描述。您了解到基于模式的隔离提供了一个良好的安全模型，用于保护客户数据免受同一数据库中其他租户的影响，以及如何为此模型正确配置访问控制。


    ## 设计此系统时必须考虑以下几点


    *   `服务账户`。为了利用每个客户的连接池，您需要确保连接字符串使用服务账户。服务账户是一种用户不知道的、仅供系统使用的登录名。每个客户将拥有自己的服务账户。

    *   `登录数据库`。您还需要创建一个包含每个客户应使用的连接字符串的中央数据库。或者，您可以将客户连接字符串存储在配置文件中；然而，将此设置保存在数据库中更便于维护。

    *   `客户 ID`。需要为每个客户创建一个客户 ID；然后需要将该客户 ID 存储在内存中（通常在会话状态中），以便系统能够根据客户 ID 检索连接字符串。


    ### 处理客户请求的工作流程


    图 9-14 展示了系统在读取或更改数据时如何处理特定客户的请求。此工作流程假设客户已经登录并已通过应用程序身份验证；身份验证过程负责将客户 ID 存储在内存中（对于
    ASP.NET 应用程序，客户 ID 可以存储在应用程序缓存或会话状态中）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 157](img/index-208_1.png)


    第 9 章 ■ 高性能设计


    *图 9-14. 在基于模式的多租户架构中用于获取数据的逻辑*


    当发出数据库请求时，系统从本地缓存获取客户 ID (1)，并使用该客户 ID 从登录数据库检索客户连接字符串 (2)。然后，系统将客户的连接字符串保存在其内部缓存中
    (3) 供后续请求使用。数据库连接字符串包含要使用的服务账户以及分配给客户的数据库。然后系统连接到数据库 (4)。由于服务账户具有指向客户模式的默认模式，系统会自动针对正确的模式发出
    T-SQL 命令 (5)。系统随后可以返回客户数据并关闭连接 (6)。


    ### 连接池碎片化问题


    您应该知道，一个分布在多个数据库上、每个客户拥有一个服务账户的多租户系统，在大型系统中可能会产生`连接池碎片化`问题。这是因为将为每个客户创建一个连接池。此外，如果您使用多个负载均衡的中间层服务器，每个服务器将维护自己的一套连接池。因此，您应通过监控数据库连接，在多个客户之间仔细测试您的系统，以避免在针对
    SQL 数据库实例建立过多连接时可能出现的限制情况。如果您使用 SQL 数据库联合（Federations）而不是模式容器方法，您将不会遇到`连接池碎片化`问题，因为所有数据库连接都是使用相同的服务账户针对单个数据库（根数据库）建立的，无论客户
    ID 如何。


    ### 对客户模式的维护操作


    对客户模式执行维护操作可能具有挑战性。您的应用程序将需要阻止客户连接，直到模式维护任务完成。例如，如果您想将客户迁移到另一个数据库，可以按照以下步骤操作：


    1.  将客户置于维护模式以避免数据更改（通过您的应用程序）。

    2.  创建客户模式的备份副本（您可以使用免费的`Enzo Backup`工具来备份特定模式，网址为 [`www.bluesyntax.net/`](http://www.bluesyntax.net/)）；或者，您可以使用`CREATE
    DATABASE . . . AS COPY OF . . .`创建数据库的完整副本；但是，此方法需要删除所有其他不应迁移到新数据库的客户模式容器。

    3.  如果您使用了工具备份模式，则将模式容器还原到新数据库。

    4.  更改登录数据库中的连接字符串，使其指向新数据库。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 9 章 ■ 高性能设计


    正如您将在第 10 章中看到的，联合（Federations）通过提供内联的`SPLIT`操作解决了这个问题，该操作允许您在没有任何停机时间的情况下重新配置分片。


    # 创建垂直分区分片


    本章大部分内容讨论了水平分区分片（HPS），但熟悉垂直分区分片（VPSs）也很重要。VPS 将应用程序数据库模式存储在多个数据库中；本质上，应用程序数据库被拆分，使得分片中没有数据库持有完整的模式。


    让我们考虑一个由两个表组成的简单应用程序数据库：`用户`和`销售`。`用户`表包含几千条记录，而`销售`表包含几百万条记录。您可以设计一个包含两个数据库的
    VPS：第一个数据库包含`用户`表，第二个包含`销售`表。


    这种类型的分片使得隔离某些任务的处理能力需求变得容易，而不影响其他数据库。例如，您可以使用`用户`表处理用户的登录请求，同时使用`销售`表进行 CPU 密集型的计算过程或运行长时间的报告。


    您也可以通过跨多个数据库拆分一个表来构建 VPS。例如，`销售`表可能存储大型二进制字段（如文档）。在这种情况下，您可以拆分`销售`表，将常用字段存储在一个数据库中，而包含文档的字段存储在另一个数据库中。


    VPS 确实带来了其自身的一系列挑战，例如在数据库之间保持强参照完整性（RI）的困难，以及在 SQL 数据库的情况下确保事务一致性。这些考虑只是为了在您考虑
    VPS 时揭示某些设计问题。根据您的数据库设计，VPS 可能运行良好，并且可能比 HPS 更易于实现。


    # 用于 Windows Azure 的大数据与 Hadoop


    尽管本书是关于 SQL 数据库的，但您应该知道微软正在引入 Windows Azure 的 Hadoop，这是一项大数据计划，在 Azure 云上提供 Apache
    Hadoop 框架。


    Hadoop 是一种分布式计算模型，允许您将处理需求可靠地扩展到大量机器上，用于处理结构化和非结构化数据。使用 Hadoop 时，您需要实现软件逻辑来使用开源子项目（如
    Hadoop 分布式文件系统和 Hadoop MapReduce）来分发计算需求。Hadoop 网络中的每台机器为大规模分布式计算需求提供本地计算和存储。


    在撰写本文时，Windows Azure 的 Hadoop 仅通过邀请提供，且信息有限。如果您有大量数据需要分析，并且需要一个大规模扩展的环境，请查看微软提供的
    Hadoop 服务。


    # 总结


    正如您所见，如果需要扩展数据库设计或希望开发高性能系统，使用 SQL 数据库构建数据库可能很复杂。本章向您介绍了分片库的设计和实现，该库为您提供了必要的构建模块，以试验灵活且可扩展的架构。

