    \ );`\n\n尽管此代码完全有效，并且可以在您本地的 SQL Server 实例上成功运行，但当针对 SQL Database 实例执行时，它却无法工作。为什么？请继续将按钮点击事件中的代码替换为此代码，并运行应用程序。您将在消息框中收到的错误表明：不支持没有聚集索引的\
