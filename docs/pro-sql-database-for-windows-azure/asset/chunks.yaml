    # 附录 A SQL 数据库管理门户


    ## 查询执行


    `SELECT * FROM sys.tables`


    运行此查询将返回当前数据库中的表列表。查询窗口及其结果如图 A-4 所示。输出显示一个网格，其中包含作为列的字段和每个表对应的一行。如果需要，右侧会出现滚动条。在查询窗口和结果区域之间，提供了两个链接：`消息`
    和 `结果`。默认选择的是 `结果` 链接（其上方有一个小的向下箭头）。点击 `消息` 将显示与查询相关的任何消息，包括错误消息。与 SQL Server
    Management Studio 中一样，如果发现错误，默认将显示 `消息` 窗口而不是 `结果` 窗口。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 208](img/index-262_1.jpg)

    ![Image 209](img/index-262_2.png)


    附录 A ■ SQL 数据库管理门户


    **图 A-4.** 查询窗口和结果区域


    ■ **注意** 您可以使用屏幕中间、查询窗口和结果区域之间的分隔条，根据需要调整可见区域。


    请注意，您也可以从同一窗口运行多个查询。例如，执行以下批处理：


    ```

    SELECT * FROM sys.tables


    SELECT * FROM sys.procedures

    ```


    您可能会注意到，页面的结果区域只显示表列表，就像图 A-4 中一样。但是，如果您点击 `行` 汇总（图 A-5），您将看到一个下拉列表，其中包含完整的结果集列表，每个结果集对应批处理中的一条语句。如果您点击第二项（假设您的数据库有存储过程），您将看到批处理中第二条语句的结果集。您可能还会注意到下拉列表中的一个视觉提示，指示批处理中每条语句返回的记录相对数量。因为第二条语句返回了
    6 行，总共批处理中有 21 行，所以列表中的第二项包含一个填充了大约该项长度 25% 的条形。


    **图 A-5.** 切换结果视图


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 210](img/index-263_1.jpg)


    附录 A ■ SQL 数据库管理门户


    ## 查看执行计划


    您也可以从同一查询窗口查看估计执行计划或实际执行计划。`实际计划` 和 `估计计划` 图标位于您之前点击的 `运行` 图标旁边。使用之前输入的两条 T-SQL
    语句，点击 `实际计划` 图标。执行完成后，您会注意到 `结果` 旁边出现一个 `查询计划` 链接。点击此链接；您将看到如图 A-6 所示的执行计划。


    **图 A-6.** 查看实际执行计划


    左侧的 `排序依据` 图标允许您精确定位哪些运算符消耗的资源最多。默认情况下，执行计划以图形方式显示，突出显示消耗最多 CPU 和 I/O 资源的运算符。


    您可以点击左侧的 `CPU` 或 `IO` 图标来分别显示消耗最多 CPU 或 I/O 资源的运算符。


    左侧的 `查找依据` 图标允许您突出显示执行警告、索引扫描或索引查找。请注意，表扫描不能存在，因为 SQL 数据库不支持堆表。您还可以使用左下角的垂直条轻松放大或缩小。这样做当您放大到足够程度时，会更改图标的显示方式，如图
    A-7 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 211](img/index-264_1.jpg)

    ![Image 212](img/index-264_2.jpg)


    附录 A ■ SQL 数据库管理门户


    **图 A-7.** 放大实际执行计划


    如果您从批处理中切换活动语句（如前面图 A-5 所示），将显示第二条语句的执行计划。您也可以通过点击执行计划窗口右上角的相应图标，以网格或树状结构显示执行计划。


    ## 监控当前查询性能


    要查看数据库上最近执行的语句，请在左侧面板中选择数据库名称（在我的示例中为 `EnzoLog2`）。这将带您返回到类似图 A-3 的页面，在顶部选择 `查询性能`。将出现一个类似图
    A-8 的页面，显示最近针对数据库执行的语句列表及其摘要性能指标。请注意，这些指标显示的是平均值，而不是当前值。例如，第二列显示 `CPU 毫秒/秒`，这是会话期间
    CPU 消耗（以毫秒为单位）的平均值，以秒表示。


    **图 A-8.** 最近针对您的数据库执行的 T-SQL 语句


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 213](img/index-265_1.jpg)


    附录 A ■ SQL 数据库管理门户


    如果您点击其中一条语句，您将看到详细的性能指标。默认情况下，页面显示 `查询计划详情`，包括持续时间、CPU、读取、写入和计划指标（参见图 A-9）。您也可以通过点击
    `查询计划` 查看图形执行计划。


    **图 A-9.** 特定 T-SQL 语句的性能详情


    ## 设计功能


    门户的设计部分允许您管理数据库对象，包括表、视图和存储过程。正如您将看到的，设计部分提供了许多高级图形化选项，包括创建索引和外键的能力。


    ### 设计表


    要访问设计部分，请点击门户左下角的 `设计`。请注意，结果页面的顶部显示三个标题：`表`、`视图` 和 `存储过程`。默认选择 `表` 标题，页面显示现有表的列表，如图
    A-10 所示。使用此页面底部的图标，您可以创建新表或删除选定的现有表。您还可以通过在搜索框中键入字符来过滤表列表。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 214](img/index-266_1.png)


    附录 A ■ SQL 数据库管理门户


    **图 A-10.** SQL 数据库实例中的表列表


    用于创建新表的页面与用于编辑现有表的页面相同。您很快就会看到如何编辑表，但让我们先看看 `依赖关系` 功能。


    如果您将鼠标悬停在表列表上，会自动出现两个图标（`编辑` 和 `依赖关系`）。`编辑` 图标看起来像一支小铅笔。另一个图标是 `依赖关系` 图标。


    如果您点击某个表的 `依赖关系` 图标，将显示一个新页面，以图形格式显示其对象依赖关系，如图 A-11 所示，这是我 `DOCS` 表的情况。该图显示，一个名为
    `v_Documents` 的视图依赖于我的 `DOCS` 表。从这个视图中，我可以通过点击它们的 `编辑` 图标直接编辑这些对象。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 215](img/index-267_1.png)


    附录 A ■ SQL 数据库管理门户


    **图 A-11.** 依赖关系图


    点击 `DOCS` 表上的 `编辑` 图标会打开表编辑页面，该页面提供了一个用于更改表定义的图形界面，如图 A-12 所示。从这个页面，您可以添加、编辑和删除表列。


    您还可以更改哪些字段是主键的一部分，以及字段是否为必需。进行更改后，点击顶部的 `保存` 图标。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


