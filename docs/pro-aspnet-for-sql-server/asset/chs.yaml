  \               }\n                return _location;\n            }\n          \
  \  set { _location = value; }\n        }\n    }\n}\n```\n\n`Event` 对象通常保存来自数据库的属性。由于加载数据通常是一项繁琐的任务，这项工作已通过第\
  \ 7 章介绍的 `DomainObject` 更新版本设置为自动进行。\n\n##### 修订后的 DomainObject\n\n用于 .NET 用户组网站的修订版\
  \ `DomainObject` 与第 7 章中使用的版本非常相似，但存在一些差异。其中一个显著差异在于主键始终被假定与名为 `ID` 的列对齐。在第 7 章中，`ID`\
  \ 只是一个数字，而更新后的 `DomainObject` 使用了一种名为 `DomainKey` 的新类型，它可以保存主键值，该值可以是以下类型之一：`Int16`、`Int32`、`Int64`\
  \ 或 `GUID`。\n\n当从 `DataSet` 或 `IDataReader` 中提取名为 `ID` 的列时，它被视为主键值，并设置在 `DomainKey`\
  \ 属性上。清单 10-8 展示了 `DomainKey` 类。\n\n### 清单 10-8. DomainKey.cs\n\n```csharp\nnamespace\
  \ DotnetUserGroup.DataAccess.Common\n{\n    [DataContract]\n    public class DomainKey\
  \ : IComparable<DomainKey>\n    {\n        public DomainKey(object keyValue)\n \
  \       {\n            Value = keyValue;\n        }\n\n        private object _keyValue;\n\
  \        [DataMember(Name = \"Value\", Order = 1)]\n        public object Value\n\
  \        {\n            get { return _keyValue; }\n            set\n           \
  \ {\n                // check in the order which is most likely\n              \
  \  if (value is Int32 ||\n                    value is Guid ||\n               \
  \     value is Int64 ||\n                    value is Int16)\n                {\n\
  \                    _keyValue = value;\n                }\n                else\n\
  \                {\n                    throw new Exception(\"Type not supported\
  \ as a DomainKey: \" +\n                        value.GetType());\n            \
  \    }\n            }\n        }\n\n        public static DomainKey Default\n  \
  \      {\n            get\n            {\n                DomainKey defaultKey =\
  \ new DomainKey(-1);\n                return defaultKey;\n            }\n      \
  \  }\n\n        #region \" Comparison Methods \"\n        public int CompareTo(DomainKey\
  \ other)\n        {\n            return Value.ToString().CompareTo(other.Value.ToString());\n\
  \        }\n\n        public override int GetHashCode()\n        {\n           \
  \ return Value.GetHashCode();\n        }\n\n        public override bool Equals(object\
  \ obj)\n        {\n            if (obj != null && obj is DomainKey)\n          \
  \  {\n                DomainKey other = (DomainKey) obj;\n                return\
  \ Equals(other);\n            }\n            return false;\n        }\n\n      \
  \  public bool Equals(DomainKey other)\n        {\n            if (other != null\
  \ && Value.Equals(other.Value))\n            {\n                return true;\n \
  \           }\n            return false;\n        }\n        #endregion\n    }\n\
  }\n```\n\n`DomainKey` 的主要目的是抽象主键的类型。`EventProvider` 的一个实现可以使用 `long` 值（由 SQL 实现使用），而未来的实现可能会使用\
  \ `Guid` 值，这在数据分布在多个数据库中且无法正确维护顺序标识键时更为合适。当主键类型在未来的实现中从 `long` 更改为 `Guid` 时，`EventProvider`\
  \ 无需更改。然而，`Event` 类确实引用了关联的 `Sponsor`、`Speaker` 和 `Location`，这些也设置了使用 `long` 值的主键。如果调整其中一个实现以使用\
  \ `Guid` 值，则需要对存储过程和表结构进行一些调整。\n\n`DomainKey` 的另一个特性是实现了 `IComparable<DomainKey>`\
  \ 接口，这使得键可以在集合中唯一标识，以及其他用途。它还可以通过使用主键值而不是默认比较（后者可能不准确）来唯一标识一条记录与另一条记录。`DomainObject`\
  \ 对 `ID` 属性使用 `DomainKey` 类型，然后使用 `DomainKey` 提供的比较来比较 `DomainObject` 的实例。`DomainObject`\
  \ 类使用的比较方法如清单 10-9 所示。\n\n### 清单 10-9. DomainObject 比较方法\n\n```csharp\npublic int\
  \ CompareTo(Object obj)\n{\n    int result = 0;\n    DomainObject<T> otherDomainObject\
  \ = obj as DomainObject<T>;\n    if (otherDomainObject != null)\n    {\n       \
  \ result = ID.CompareTo(otherDomainObject.ID);\n        if (result == 0)\n     \
  \   {\n            result = Created.CompareTo(otherDomainObject.Created);\n    \
  \        if (result == 0)\n            {\n                result = Modified.CompareTo(otherDomainObject.Modified);\n\
  \            }\n        }\n    }\n    return result;\n}\n\npublic override int GetHashCode()\n\
  {\n    return ID.GetHashCode();\n}\n\npublic override bool Equals(object obj)\n\
  {\n    DomainObject<T> domainObject = obj as DomainObject<T>;\n    if (domainObject\
  \ != null)\n    {\n        if (ID.Equals(domainObject.ID))\n        {\n        \
  \    return true;\n        }\n    }\n    return false;\n}\n```\n\n\n\n现在，任何继承自 `DomainObject`\
  \ 的对象都可以与另一个对象进行比较，以判断它们是否是同一对象，例如同一个 `Event` 或 `Speaker`。主键值自动成为比较的一部分，而 `Created`\
  \ 和 `Modified` 值则是另一部分。一个 `Speaker` 对象的旧副本不会与新副本匹配，而一个 `Speaker` 记录加载到两个 `Speaker`\
  \ 对象中时，它们则会如预期般匹配。此功能为任何使用本网站数据访问层所定义的约定构建的类自动提供。由于本网站创建的每个表都使用 `ID`、`Created` 和\
  \ `Modified` 列，加载过程将按计划填充 `DomainObject` 实例中的相应属性。\n\n同时，其余的数据加载过程与第 7 章所述相同。加载方法可以接受\
  \ `DataRow` 或 `IDataReader` 来填充 `DomainObject`。完整代码列表请参阅本章的可下载示例。\n\n## DOMAINOBJECT\
  \ 与泛型\n\n之所以在修订版的 `DomainObject` 中使用泛型，是为了解决继承与反射结合时出现的问题。在某些情况下，即使数据列与对象属性的名称和类型匹配，也会抛出\
  \ `TargetException`。我最终通过 NHibernate 项目的主要开发者 Ayende Rahien 发现，他在处理继承与反射时也遇到了类似问题。我通过将\
  \ `DomainObject` 改为泛型类型来绕过 `TargetException` 问题，该泛型要求所有继承类必须是 `DomainObject<T>`\
  \ 的形式，其中 `T` 是一个 `DomainObject`。当 `Location` 继承自 `DomainObject<Location>` 时，它满足了泛型条件，并克服了反射的问题。\n\
  \n#### 管理关系\n\n回到第 10 章清单 10-7 中的 `Event` 类，你可能已经注意到其中存在表示关系的属性。具体来说，名为 `Speaker`、`Sponsor`\
  \ 和 `Location` 的属性，其值并非随 `Event` 对象的“获取”存储过程一同载入。对于 `Location` 属性，其实际值最初被留空（null），并在需要时加载。这就是之前介绍过的“延迟加载”技术。当访问\
  \ `Location` 属性时，“getter”方法会检查该变量是否已定义，如果没有，它将尝试从 `LocationProvider` 获取值，如清单 10-10\
  \ 所示。\n\n**清单 10-10.** *Location 属性的 Getter*\n```csharp\nprivate Location _location;\n\
  \n[DataMember(Name = \"Location\",Order = 1)]\npublic Location Location\n{\n   \
  \ get\n    {\n        if (_location == null)\n        {\n            // 延迟加载位置\n\
  \            EventSection section = new EventSection();\n            _location =\
  \ LocationManager.GetProvider(section.LocationProvider).GetLocation(this);\n   \
  \     }\n        return _location;\n    }\n    set { _location = value; }\n}\n```\n\
  \n当使用 `Location` 属性时，值是通过 `LocationManager` 类加载的，但并非直接使用默认提供程序来获取位置，而是通过 `EventSection`\
  \ 类来确定要使用的提供程序名称。稍后我们将探讨自定义配置如何辅助管理由不同提供程序处理的对象间关系。\n\n#### 使用位置\n\n用于管理关系的 `EventProvider`\
  \ 的另一个特性是清单 10-11 所示的 `ILocationConsumer` 接口。\n\n**清单 10-11.** *ILocationConsumer\
  \ 接口*\n```csharp\nnamespace DotnetUserGroup.DataAccess.Locations\n{\n    public\
  \ interface ILocationConsumer\n    {\n        bool IsUsingLocation(Location location);\n\
  \    }\n}\n```\n\n`ILocationConsumer` 接口用于保护 `Location` 在仍在被使用时不被删除。一个 `Sponsor`\
  \ 可以关联一个 `Location`，一个 `Event` 也可以。如果某个 `Sponsor` 或 `Event` 正在使用一个 `Location`，则该\
  \ `Location` 不应被删除。每个与位置有关系的提供程序都实现了 `ILocationConsumer` 接口。\n\n\n\n当对某个 `Location`\
  \ 调用删除方法时，`LocationManager` 会检查是否有任何提供程序实现正在使用该 `Location`。清单 10-12 展示了 `IsLocationInUse`\
  \ 方法，该方法会检查所有实现了 `ILocationConsumer` 接口的实现。\n\n### 清单 10-12. `IsLocationInUse` 方法\n\
  \n```csharp\npublic static bool IsLocationInUse(Location location)\n{\n    foreach\
  \ (ILocationConsumer locationConsumer in GetLocationConsumers())\n    {\n      \
  \  if (locationConsumer.IsUsingLocation(location))\n        {\n            return\
  \ true;\n        }\n    }\n    return false;\n}\n```\n\n`IsLocationInUse` 方法调用了集合中每个实例上的\
  \ `IsUsingLocation` 方法，该方法由 `ILocationConsumer` 接口定义。清单 10-13 所示的 `GetLocationConsumers`\
  \ 方法负责创建这个集合。\n\n### 清单 10-13. `GetLocationConsumers` 方法\n\n```csharp\nprivate static\
  \ ILocationConsumer[] GetLocationConsumers()\n{\n    List<ILocationConsumer> locationConsumers\
  \ =\n        new List<ILocationConsumer>();\n\n    foreach (ProviderBase provider\
  \ in\n        AssemblyHelper.GetMatchedProviders(typeof(ILocationConsumer)))\n \
  \   {\n        ILocationConsumer locationConsumer = provider as ILocationConsumer;\n\
  \        if (locationConsumer != null)\n        {\n            locationConsumers.Add(locationConsumer);\n\
  \        }\n    }\n    return locationConsumers.ToArray();\n}\n```\n\n`GetLocationConsumers`\
  \ 方法只是从 `AssemblyHelper` 类获取一个针对 `ILocationConsumer` 接口的所有匹配提供程序的集合。`AssemblyHelper`\
  \ 类是一个实用工具类，用于发现所有匹配给定类型的已配置提供程序，这样其他接口，例如 `ISpeakerConsumer` 和 `ISponsorConsumer`，也能以相同的方式使用。\n\
  \n清单 10-14 展示了 `AssemblyHelper` 类。\n\n### 清单 10-14. `AssemblyHelper.cs`\n\n```csharp\n\
  namespace DotnetUserGroup.DataAccess.Common\n{\n    public class AssemblyHelper\n\
  \    {\n        public static Type[] GetMatchedTypes(Assembly assembly, Type searchType)\n\
  \        {\n            List<Type> types = new List<Type>();\n            Module[]\
  \ modules = assembly.GetLoadedModules();\n\n            foreach (Module module in\
  \ modules)\n            {\n                foreach (Type type in module.GetTypes())\n\
  \                {\n                    if (type.IsClass &&\n                  \
  \      !type.IsAbstract &&\n                        searchType.IsAssignableFrom(type))\n\
  \                    {\n                        types.Add(type);\n             \
  \       }\n                }\n            }\n            return types.ToArray();\n\
  \        }\n\n        public static ProviderBase[] GetMatchedProviders(Type searchType)\n\
  \        {\n            List<ProviderBase> providers = new List<ProviderBase>();\n\
  \            DugConfiguration sectionGroup = DugConfiguration.GetConfiguration();\n\
  \n            foreach (ProviderConfigurationSection section in\n               \
  \ sectionGroup.ProviderSections)\n            {\n                foreach (ProviderSettings\
  \ settings in section.Providers)\n                {\n                    // The\
  \ assembly should be in \\bin or GAC\n                    Type providerType = Type.GetType(settings.Type,\
  \ false);\n                    Assembly providerAssembly = providerType.Assembly;\n\
  \n                    if (providerType.IsClass &&\n                        !providerType.IsAbstract\
  \ &&\n                        searchType.IsAssignableFrom(providerType))\n     \
  \               {\n                        ProviderBase provider =\n           \
  \                 Activator.CreateInstance(providerType) as ProviderBase;\n    \
  \                    if (provider != null)\n                        {\n        \
  \                    provider.Initialize(settings.Name, settings.Parameters);\n\
  \                            providers.Add(provider);\n                        }\n\
  \                    }\n                }\n            }\n            return providers.ToArray();\n\
  \        }\n    }\n}\n```\n\n`AssemblyHelper` 类不仅仅是返回实现了 `ILocationConsumer` 接口的类型。它还会实例化已配置的提供程序并返回这些实例，以便可以调用\
  \ `IsUsingLocation` 方法。所检查的程序集都来自 `DugConfiguration`，这是所有提供程序自定义配置的根。我们在第 5 章和第\
  \ 9 章简要介绍了自定义配置，接下来将更深入地介绍它们。\n\n#### 自定义配置\n\n将所有组件连接在一起的关键纽带是配置。虽然每个提供程序都设计为独立工作，但它们之间存在需要维护的关系。这些关系的性质仅通过配置即可更改，无需重建和重新部署您的应用程序。例如，您可能希望使用\
  \ SQL\n\n\n\n### 代码清单 10-15. *SpeakerSection.cs*\n\n```csharp\nnamespace DotnetUserGroup.DataAccess.Speakers\n\
  {\n    public class SpeakerSection : ProviderConfigurationSection\n    {\n     \
  \   [ConfigurationProperty(\"providers\")]\n        public override ProviderSettingsCollection\
  \ Providers\n        {\n            get { return (ProviderSettingsCollection)base[\"\
  providers\"]; }\n        }\n\n        [StringValidator(MinLength = 1)]\n       \
  \ [ConfigurationProperty(\"defaultProvider\", DefaultValue = \"SqlSpeakerProvider\"\
  )]\n        public override string DefaultProvider\n        {\n            get {\
  \ return (string)base[\"defaultProvider\"]; }\n            set { base[\"defaultProvider\"\
  ] = value; }\n        }\n    }\n}\n```\n\n最初是为每个提供程序提供了实现，但之后配置了一个新的 `SpeakerProvider`\
  \ 实现，该实现与一个现有的演讲者数据库集成。所需要的只是包含继承自抽象 `SpeakerProvider` 类的那个类的程序集，以及更新配置以指向新的类和程序集。然后，该更改会通过相应的提供程序节进行配置。\n\
  \n每个自定义提供程序都定义了一个继承自标准类 `ConfigurationSection` 的配置节。代码清单 10-15 展示了 `SpeakerSection`\
  \ 类。\n\n第 9 章中的自定义配置只是简单地为几个配置值定义了一个占位符。在代码清单 10-15 中，提供程序节定义了一个名为 `Providers` 的属性（它指向\
  \ `ProviderSettingsCollection`），以及一个名为 `DefaultProvider` 的属性（它指向当未提供名称时应使用的提供程序）。这应该会让你想起标准的\
  \ ASP.NET 提供程序，因为它的实现方式是相同的。\n\n`Providers` 属性使用 `ConfigurationProperty` 特性来指向配置中的相关元素。`ProviderSettingsCollection`\
  \ 是一个标准类型，它会自动处理 `providers` 节内的配置。代码清单 10-16 展示了一个演讲者节的配置示例。\n\n### 代码清单 10-16.\
  \ *配置节示例*\n\n```xml\n<speakers defaultProvider=\"SqlSpeakerProvider\">\n  <providers>\n\
  \    <clear />\n    <add name=\"SqlSpeakerProvider\"\n         connectionStringName=\"\
  dug\"\n         type=\"DotnetUserGroup.DataAccess.Speakers.SqlSpeakerProvider, DotnetUserGroup.DataAccess\"\
  \ />\n  </providers>\n</speakers>\n```\n\n你可以看到，由于 `ConfigurationProperty` 特性，`providers`\
  \ 元素与 `SpeakerSection` 类中的 `Providers` 属性相对应。在 `providers` 节内，你可以 `clear`（清除）、`add`（添加）或\
  \ `remove`（移除）提供程序定义，这些定义必须包含 `name`（名称）和 `type`（类型）属性，以及提供程序实现所需的任何其他值。\n\n#####\
  \ 配置分组\n\n每个提供程序节看起来都差不多，并且每个都将是 `dotnetUserGroup` 元素的子元素，该元素与继承自标准 `ConfigurationSectionGroup`\
  \ 类的 `DugConfiguration` 类相关联。这个节组包含了所有的配置，并将它们与配置文件的其余部分清晰地隔离开来。这种层次结构有助于保持配置的条理清晰。代码清单\
  \ 10-17 展示了这个层次结构的一般结构。\n\n### 代码清单 10-17. *配置层次结构*\n\n```xml\n<dotnetUserGroup>\n\
  \  <events />\n  <jobs />\n  <jobContacts />\n  <locations />\n  <speakers />\n\
  \  <sponsors />\n</dotnetUserGroup>\n```\n\n在代码清单 10-14 所示的 `AssemblyHelper` 类中，`DugConfiguration`\
  \ 类上的 `ProviderSections` 属性被用来遍历所有的提供程序，以获取与目标类型匹配的实例。代码清单 10-18 展示了 `ProviderSections`\
  \ 属性是如何定义的。\n\n### 代码清单 10-18. *ProviderSections 属性*\n\n```csharp\nprivate List<ProviderConfigurationSection>\
  \ _providerSections = null;\npublic ProviderConfigurationSection[] ProviderSections\n\
  {\n    get\n    {\n        if (_providerSections == null)\n        {\n         \
  \   _providerSections = new List<ProviderConfigurationSection>();\n            _providerSections.Add(EventSection);\n\
  \            _providerSections.Add(JobContactSection);\n            _providerSections.Add(JobSection);\n\
  \            _providerSections.Add(LocationSection);\n```\n\n\n\n# ProviderSections\
  \ 属性中引用的节在 DugConfiguration 中也被定义为属性\n\n`ProviderSections` 属性中引用的节也在 `DugConfiguration`\
  \ 中被定义为属性，如代码清单 10-19 所示。\n\n## 代码清单 10-19. 用于各节的属性\n\n```csharp\n[ConfigurationProperty(\"\
  events\")]\npublic EventSection EventSection\n{\n    get {\n        return Sections[\"\
  events\"] as EventSection;\n    }\n}\n\n[ConfigurationProperty(\"jobContacts\")]\n\
  public JobContactSection JobContactSection\n{\n    get {\n        return Sections[\"\
  jobContacts\"] as JobContactSection;\n    }\n}\n\n[ConfigurationProperty(\"jobs\"\
  )]\npublic JobSection JobSection\n{\n    get {\n        return Sections[\"jobs\"\
  ] as JobSection;\n    }\n}\n\n[ConfigurationProperty(\"locations\")]\npublic LocationSection\
  \ LocationSection\n{\n    get {\n        return Sections[\"locations\"] as LocationSection;\n\
  \    }\n}\n\n[ConfigurationProperty(\"speakers\")]\npublic SpeakerSection SpeakerSection\n\
  {\n    get {\n        return Sections[\"speakers\"] as SpeakerSection;\n    }\n\
  }\n\n[ConfigurationProperty(\"sponsors\")]\npublic SponsorSection SponsorSection\n\
  {\n    get {\n        return Sections[\"sponsors\"] as SponsorSection;\n    }\n\
  }\n```\n\n你可能已经注意到，`ProviderSections` 属性返回的是一个 `ProviderConfigurationSection` 类的数组，而不是\
  \ `ConfigurationSection` 类。这是一个自定义类，它使得将所有提供程序配置节组合在一起成为可能。\n\n`ProviderConfigurationSection`\
  \ 类定义了两个抽象属性：`Providers` 和 `DefaultProvider`。代码清单 10-15 中显示的 `SpeakerSection` 类继承自该类。这个抽象类的定义见代码清单\
  \ 10-20。\n\n## 代码清单 10-20. ProviderConfigurationSection.cs\n\n```csharp\nnamespace\
  \ DotnetUserGroup.DataAccess.Common\n{\n    public abstract class ProviderConfigurationSection\
  \ : ConfigurationSection\n    {\n        public abstract ProviderSettingsCollection\
  \ Providers { get; }\n        public abstract string DefaultProvider { get; set;\
  \ }\n    }\n}\n```\n\n##### 声明自定义配置\n\n为了使用自定义配置，必须先声明它。声明自定义配置节必须在配置文件的开头进行，紧接在\
  \ `Configuration` 开始元素之后。代码清单 10-21 展示了示例应用程序的节组和子节的声明。\n\n#### 代码清单 10-21. 配置声明\n\
  \n```xml\n<configSections>\n    <sectionGroup name=\"dotnetUserGroup\"\n       \
  \ type=\"DotnetUserGroup.DataAccess.Common.DugConfiguration, DotnetUserGroup.DataAccess\"\
  >\n        <section name=\"events\"\n            type=\"DotnetUserGroup.DataAccess.Events.EventSection,\
  \ DotnetUserGroup.DataAccess\" />\n        <section name=\"jobs\"\n            type=\"\
  DotnetUserGroup.DataAccess.Jobs.JobSection, DotnetUserGroup.DataAccess\" />\n  \
  \      <section name=\"jobContacts\"\n            type=\"DotnetUserGroup.DataAccess.JobContacts.JobContactSection,\
  \ DotnetUserGroup.DataAccess\" />\n        <section name=\"locations\"\n       \
  \     type=\"DotnetUserGroup.DataAccess.Locations.LocationSection, DotnetUserGroup.DataAccess\"\
  \ />\n        <section name=\"speakers\"\n            type=\"DotnetUserGroup.DataAccess.Speakers.SpeakerSection,\
  \ DotnetUserGroup.DataAccess\" />\n        <section name=\"sponsors\"\n        \
  \    type=\"DotnetUserGroup.DataAccess.Sponsors.SponsorSection, DotnetUserGroup.DataAccess\"\
  \ />\n    </sectionGroup>\n</configSections>\n```\n\n###### 配置提供程序\n\n构建好自定义配置类并声明了自定义节后，就可以添加提供程序配置了。代码清单\
  \ 10-22 显示了指向示例应用程序所有标准 SQL 提供程序的提供程序配置。\n\n#### 代码清单 10-22. 提供程序配置\n\n```xml\n\
  <dotnetUserGroup>\n    <events defaultProvider=\"SqlEventProvider\"\n        locationProvider=\"\
  SqlLocationProvider\"\n        speakerProvider=\"SqlSpeakerProvider\"\n        sponsorProvider=\"\
  SqlSponsorProvider\">\n        <providers>\n            <clear />\n            <add\
  \ name=\"SqlEventProvider\"\n                connectionStringName=\"dug\"\n    \
  \            type=\"DotnetUserGroup.DataAccess.Events.SqlEventProvider, DotnetUserGroup.DataAccess\"\
  \ />\n        </providers>\n    </events>\n    <jobs defaultProvider=\"SqlJobProvider\"\
  >\n        <providers>\n            <clear />\n```\n\n\n\n# 第 10 章：一个示例应用程序\n\n\
  在`providers`元素内添加的提供程序设置是必需的，因为与标准的 ASP.NET 提供程序不同，这些设置并未在`Machine.config`文件中预定义（该文件在第\
  \ 1 章的清单 1-4 中已介绍）。不过，有些值是可选的。当默认值符合你的意图时，每种情况下的`defaultProvider`属性都是可选的。\n\n```xml\n\
  <add name=\"SqlJobProvider\"\n     connectionStringName=\"dug\"\n     type=\"DotnetUserGroup.DataAccess.Jobs.SqlJobProvider,\
