  \ 值设为 `true`，这将导致数据在后续的事件生命周期中绑定。\n\n## 创建 PersonRow\n\n`PersonListingControl` 的主要内容是\
  \ `PersonRow` 项的集合。这是一个简单的控件，它利用提供给它的数据绑定到它创建的控件上。\n\n`PersonRow` 继承自 `WebControl`，并实现了\
  \ `IDataItemContainer` 和 `INamingContainer` 接口。请记住，`INamingContainer` 接口没有方法，因为它仅仅是一个用于管理命名容器层次结构的标记接口。\n\
  \n`IDataItemContainer` 实现了三个只读属性，如清单 4-36 所示。\n\n### 清单 4-36. `IDataItemContainer`\
  \ 成员\n\n```csharp\n#region \" IDataItemContainer Members \"\npublic object DataItem\n\
  {\n    get\n    {\n        return Data;\n    }\n}\npublic int DataItemIndex\n{\n\
  \    get\n    {\n        return _itemIndex;\n    }\n}\npublic int DisplayIndex\n\
  {\n    get\n    {\n        return _itemIndex;\n    }\n}\n#endregion\n```\n\n当 `PersonRow`\
  \ 被构造时，这些值作为参数传入。数据存储在一个成员变量中，通过 `Data` 属性访问。构造函数和 `Data` 属性如清单 4-37 所示。\n\n###\
  \ 清单 4-37. `PersonRow` 构造函数和 `Data` 属性\n\n```csharp\npublic PersonRow(int itemIndex,\
  \ object o)\n    : base(HtmlTextWriterTag.Div)\n{\n    _data = o;\n    _itemIndex\
  \ = itemIndex;\n}\npublic virtual object Data\n{\n    get\n    {\n        return\
  \ _data;\n    }\n}\n```\n\n这里传入的数据可能为空值，因此在调用 `CreateChildControls` 方法时，应妥善处理这种情况。如果有数据，可以使用清单\
  \ 4-38 中的代码，通过 `DataBinder` 从数据对象加载值。\n\n### 清单 4-38. 数据绑定代码\n\n```csharp\nif (Data\
  \ != null)\n{\n    DateTime dateValue;\n    DateTime.TryParse(DataBinder.GetPropertyValue(Data,\
  \ birthDateField, \"\"),\n                      out dateValue);\n    FirstName =\
  \ DataBinder.GetPropertyValue(Data, firstNameField, null);\n    LastName = DataBinder.GetPropertyValue(Data,\
  \ lastNameField, null);\n    BirthDate = dateValue;\n    City = DataBinder.GetPropertyValue(Data,\
