  \ 8-15 的模板，其中包含了调用 `MarkDirty` 方法。如果所有代码都是手动编写的，那个简单的调用可能是一个乏味的细节。而在这里，调用 `MarkDirty`\
  \ 是自动的，因此每次属性值更改时都能可靠地调用它。此示例来自标准模板，但您可以将其更改为检查新值是否与当前值不同，并仅在适当时调用 `MarkDirty`。如果您现在想这样做，可以将标准模板复制到您自己的模板目录，并调整此模板使其类似于清单\
  \ 8-16。\n\n8601Ch08CMP2 8/24/07 3:57 PM Page 245\n\n第 8 章 ■ 生成的数据访问层\n\n**245**\n\
