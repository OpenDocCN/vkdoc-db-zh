- "# 第 1 章 入门\n\n性能始终是一个问题。本书将向你展示如何优化 ASP.NET 2.0 应用程序对 SQL Server 数据库的访问。你可以利用 ASP.NET\
  \ 2.0 与 SQL Server 的紧密集成，来实现其他技术无法达到的性能水平。你将详细探究 ASP.NET 2.0 与 SQL Server 之间的中间地带，以及如何加以利用。\n\
  \n本书通过专业代码演示所有概念，因此你需要做的第一件事就是设置你的开发环境。我将在过程中涵盖相关问题。\n\n本章涵盖以下内容：\n\n- 准备你的环境\n\
  - 管理提供程序服务\n- 配置提供程序\n- 创建用户和角色\n\n## 准备你的环境\n\n我通常运行多个 Microsoft Virtual PC 环境，并根据需要在它们之间切换。当我最初设置我的初始虚拟环境时，我会创建所需数量的环境。\n\
  \n其中一个将作为我的主要开发环境。这很有帮助，因为我会在创建初始环境后立即保留其备份映像。当我尝试测试测试版或第三方插件时，我的环境可能会被\"弄脏\"。因为卸载过程可能无法完全清理\
  \ Windows 安装，所以虚拟环境就派上用场了。\n\n例如，在一次本地用户组会议上，演示者正在展示一个与 Visual Studio 集成的工具。我没有在当前开发环境中安装该工具，而是克隆了一个新的环境来试用该工具。之后，我关闭并删除了该环境，为其他环境腾出空间。我的主要环境完全不受影响。\n\
  \n我还会在虚拟环境中创建两个驱动器。`C:` 盘存放操作系统，而 `D:` 盘存放我的数据。这些驱动器由虚拟硬盘表示。\n\n如果我决定克隆我的数据驱动器，我可以根据需要将其用于另一个系统。因为我通常使用源代码控制来开发每个项目，所以我可以从一个全新的环境开始，拉取当前项目的版本，然后再次开始开发。\n\
  \n为了进一步利用虚拟化，你还可以为开发环境创建一个虚拟硬盘安装，并将文件设置为只读。然后，你可以创建一个新的虚拟映像，该映像使用只读副本作为基础映像，同时将所有更改保留在辅助映像上。当你被要求创建新的虚拟硬盘时，可以选择\
  \ `差异` 选项，如图 1-1 所示。\n\n**图 1-1.** 创建差异虚拟硬盘\n\n差异映像允许你在开始使用全新的环境进行开发时，保持基础映像不受影响。这可以节省硬盘空间，因为空间可能会很快被占满；一个典型的虚拟映像可以增长到\
  \ 20 GB，还不包括数据映像。而且，由于你可以让多个虚拟映像使用同一个基础映像，你的环境可以快速根据你的工作需求准备就绪。\n\n有一次，我的同事需要在第二天开始一个短期的\
  \ .NET 1.1 项目。她只安装了 Visual Studio 2005，因此面临一个通常需要几个小时才能完成的漫长安装过程。但因为我已经为 .NET 1.1\
  \ 和 .NET 2.0 开发准备好了虚拟映像，我在 20 分钟内就让她准备就绪了。最长时间的等待是复制映像文件从文件服务器上。在她完成这个短期项目后，她就能够移除这个临时环境了。\n\
  \n\n能够使用这些预构建的环境节省了大量时间。我能够尝试各种工具和技术，如果必须处理 Alpha 和 Beta 测试版软件与我的主要开发环境混杂在一起所带来的后果，我将没有机会进行这些尝试。\n\
  \n#### 项目组织\n\n对于每个环境，我将所有项目都放在 `D:\\Projects` 目录下。并且我明确地将解决方案文件放在每个项目的根目录。我曾见过一些团队仅在创建项目时才附带创建解决方案文件，但这削弱了当你在解决方案中妥善管理项目时所能获得的优势。\n\
  \n对于一个典型的 Web 项目，我从一个空白解决方案中的 ASP.NET 网站开始。然后我添加一个类库，并将其命名为 `ClassLibrary`。我将尽可能多的网站代码放入这个类库中，原因我稍后会讲到。接着，我将该类库作为引用关联到网站，解决方案会将此记录为一个依赖项。这非常有用，因为新的\
  \ ASP.NET 2.0\n\n![Image 2](img/index-11_1.jpg)\n\n![Image 3](img/index-11_2.png)\n\
  \n8601Ch01CMP2 8/22/07 7:56 PM Page 3\n\nC H A P T E R 1 ■ G E T T I N G S TA RT\
  \ E D\n\n**3**\n\n网站项目模型不包含用于维护文件和依赖项清单的项目文件。我添加了一个名为 `Database` 的数据库项目，其中包含我所有的数据库脚本，用于创建表和存储过程，以及准备数据库支持数据的脚本。（数据库项目需要\
  \ Visual Studio 2005 专业版。）最后，我创建一个名为 `Solution Items` 的解决方案文件夹，并添加一个名为 `README.txt`\
  \ 的文本文件，该文件提供项目的基本信息，例如名称、描述、要求、依赖项以及构建和部署说明。\n\n所有这些工作的结果就是如图 1-2 所示的解决方案结构。\n\n\
  **图 1-2.** *典型的解决方案环境*\n\n当你首次设置空白解决方案并向其中添加第一个项目或网站时，你可能会发现解决方案消失了。这是 Visual Studio\
  \ 的一个默认设置，你可以更改它。从 `工具` 菜单中选择 `选项`，然后点击 `项目和解决方案` 项，如图 1-3 所示。\n\n**图 1-3.** *设置“始终显示解决方案”选项*\n\
  \n![Image 4](img/index-12_1.jpg)\n\n8601Ch01CMP2 8/22/07 7:56 PM Page 4\n\n**4**\n\
  \nC H A P T E R 1 ■ G E T T I N G S TA RT E D\n\n这个示例解决方案将成为本书所有示例的模板。对所有项目使用相同的基本结构为构建自动化提供了一致的基础。它也使得你开发的每个应用程序的所有内容都保持在相同位置。能够轻松地在解决方案中搜索对数据库表的引用，然后获取该表的创建脚本和任何使用该表的存储过程，这非常方便。大多数开发人员只是在数据库中编写并保存他们的表数据定义语言（DDL）和存储过程，并使用数据库内的工具进行移动，从不将它们保存为可以在\
  \ Visual Studio 项目中进行版本控制的脚本。这种常见做法未能充分利用 Visual Studio 2005 的一大优势，并使得从头重新创建数据库对象更加困难。因此，由于需要进行大量额外工作，为了改进应用程序而进行数据库更新的变更往往被避免。当你的环境允许你以非常敏捷的方式工作时，你才能承担那些否则可能不会尝试的任务。\n\
  \n## 公共文件夹\n\n当你从事多个项目时，你会积累对多个项目都有用的工具、模板和脚本。将它们放入一个由你用源代码管理的公共文件夹中是很有帮助的，这样多个团队中的开发人员在工作中就可以利用它们。借助图\
  \ 1-2 中的解决方案布局，将一个 MSBuild 脚本和 CMD 脚本放入一个新项目以提供构建自动化是轻而易举的事。你将在本书中使用以下文件夹来存放工具、模板和脚本（见图\
  \ 1-4）：\n- `D:\\Projects\\Common\\Tools`\n- `D:\\Projects\\Common\\Templates`\n\
  - `D:\\Projects\\Common\\Scripts`\n\n**图 1-4.** *用于工具、脚本和模板的文件夹*\n\n![Image 5](img/index-13_1.jpg)\n\
  \n8601Ch01CMP2 8/22/07 7:56 PM Page 5\n\nC H A P T E R 1 ■ G E T T I N G S TA RT\
  \ E D\n\n**5**\n\n为了便于针对这些文件夹编写脚本，让我们为这些位置添加一些系统环境变量（见图 1-5）：\n- `DevTools = D:\\\
  Projects\\Common\\Tools`\n- `DevTemplates = D:\\Projects\\Common\\Templates`\n-\
  \ `DevScripts = D:\\Projects\\Common\\Scripts`\n\n**图 1-5.** *用于开发的*\n\n环境变量\n\n\
  你将在本书中基于这些文件夹和变量进行构建，以增强你的通用开发环境。\n\n#### 数据源配置\n\n数据源是将 ASP.NET 2.0 Web 应用程序连接到数据的机制。\n\
  \n对于 ASP.NET 应用程序，数据通常存储在 SQL Server 数据库中。要连接到数据源，你需要使用一个连接字符串，该字符串设置了连接到数据库的各种选项。连接字符串有很多可用的选项。对于最基本的连接字符串，你需要数据库的位置和访问数据库的身份验证详细信息。以下是一个此类连接字符串的示例：\n\
  \n```\nserver=localhost;database=Products;uid=webuser;pwd=webpw\n```\n\n请注意，这包含了\
  \ `server`、`database`、`uid` 和 `pwd` 参数，它们提供了访问本地计算机上 `Products` 数据库所需的一切。这种形式对于\
  \ ASP.NET 开发人员来说应该非常熟悉。不过，还有其他替代方法，我将稍后解释。\n\n8601Ch01CMP2 8/22/07 7:56 PM Page\
  \ 6\n\n**6**\n\nC H A P T E R 1 ■ G E T T I N G S TA RT E D\n\n### 混合模式身份验证\n\n\
  使用 SQL Server，你可以选择允许 Windows 身份验证、SQL Server 身份验证或两者。\n\n在安装 SQL Server 时会提示你做出此选择。当数据库托管在无法访问\
  \ Windows 域的远程服务器上时，SQL Server 账户很有用。当你的用户和数据库服务器都在域上运行时，Windows 身份验证在开发过程中很有帮助。对于开发和暂存数据库，你可以为数据库开发人员和\
  \ Web 开发人员等组授予不同级别的访问权限，然后根据情况将人员放入这些组中。对于生产数据库，你使用一个不与整个开发团队共享的用户账户，以便只有那些应该有访问权限的有限用户才能访问。与这些数据库配合使用的应用程序只需更新连接字符串即可更改身份验证模式。\n\
  \n在 ASP.NET 应用程序中，数据源在 `Web.config` 文件的一个名为 `connectionStrings` 的节中配置。每个连接字符串都使用名称、连接字符串和提供程序名称添加到此节中，例如：\n\
  \n```xml\n<connectionStrings>\n  <add name=\"SampleDatabase\" connectionString=\"\
  ...\"\n       providerName=\"System.Data.SqlClient\" />\n</connectionStrings>\n\
  ```\n\n在团队环境中，你很可能会使用源代码管理系统。你会将 `Web.config` 文件放入源代码管理中，以便团队的每个成员都有相同的配置。然而，共享一个受源代码管理的配置文件可能会带来一些问题。\n\
  \n首先，可能会使用一组通用的身份验证值。使用 Windows 用户账户（例如，某个团队成员的账户）会将密码暴露给整个团队——这是不良做法，特别是如果密码策略要求定期更新的话。\n\
  \n\n另一种方法是使用团队共享的 SQL Server 帐户。这种方式比使用共享的 Windows 帐户更好，但下面的选项是最佳实践。每个项目都应配置一个受信任的连接字符串，以便使用当前用户的帐户连接数据库——例如：\n\
  `server=localhost;Trusted_Connection=yes;database=Products;` 此方式不提供 `uid` 和 `pwd`\
  \ 参数，而是使用 Windows 身份验证来访问数据库。所有开发者使用相同的连接字符串，但通过各自的帐户单独访问数据库。\n\n受信任的连接让你能够控制谁有权访问数据库中的哪些内容。当使用一个普遍共享的用户帐户时，每个人都能访问所有内容，无法实现独立的权限管理。而通过这种方式，你可以为\
  \ Web 开发团队设置创建和修改存储过程的权限，同时不给予他们直接修改表或数据的权限。同时，你可以让你的数据库团队负责管理对表和存储过程的变更。如果你确实有业务分析师或管理人员需要访问数据库，你可以给予他们足够的权限来完成所需的工作，但不会引发数据库问题。\n\
  \n一个额外的好处是，你的 Web 团队可以专注于他们的职责范围，无需为数据库内部发生的事情负责。这也给了数据库团队更改数据库结构的自由，同时通过更新的存储过程为\
  \ Web 团队提供相同的公共接口——接收相同的参数并返回相同的结果列。请记住，有时一些团队成员会同时兼任 Web 和数据库团队的职责。这完全没问题。团队中的一些资深成员可能对系统的每个部分都有足够程度的精通来承担这些责任。但并非每个团队成员都准备好承担那种级别的责任。将后一类开发者隔离在他们所能管理的范围内，会让他们和项目负责人更加安心，因为他们知道项目掌握在合适的人手中。\n\
  \n#### 代码与数据库分离\n\n在一个最近的项目中，我负责处理数据库的变更，同时从头开始开发新的网站。难点在于，这个网站是作为多个在线商店的前端构建的，并且每个商店都有独特的数据库结构。这带来了真正的挑战。我计划只构建一个购物车和订单管理组件，但必须与不同的数据库协同工作，同时尽量减少将数据与各种前端集成的工作量。\n\
  \n为了让同一个前端能够与这些多个后端协同工作，我通过为每个数据库使用一组名称相同、参数集相同的存储过程，创建了一个清晰的集成点。这些存储过程每个都返回相同的列或输出参数。在内部，每个过程会以不同的方式连接名称不同的表，并从与下一个数据库不同的位置收集列数据，但最终会返回前端可以轻松解释并显示给客户的数据。要运行一个使用不同数据库的在线商店，只需要实现这些存储过程即可。无需对网站进行任何编码更改。\n\
  \n另一个额外的好处是，我的团队成员精通 T-SQL，并且对每个数据库都非常熟悉。通过让她专注于那个领域，她的工作效率非常高，完成新网站上线所需的集成工作比我自己做要快得多。在她处理那些变更时，我就能专注于前端的变更请求以及性能优化。\n\
  \n作为使用一组存储过程作为可靠集成层的替代方案，你可以考虑使用一组 Web 服务（Windows Communication Foundation，即 WCF）作为面向服务的架构（SOA）。我确信那也能行，但当数据库本身已经允许广泛的平台与之通信时，你其实已经拥有了一个跨平台的方法。它可能没有使用可扩展标记语言（XML）或\
  \ Web 服务互操作性组织（WSI）规范，但 SQL Server 确实可以通过开放数据库连接（ODBC）连接与 .NET、PHP、Java、Delphi 以及一系列语言和平台协同工作。\n\
  \n而且，使用这些语言和平台的开发者已经具备一定的 SQL 基础能力，因此他们可以直接采用这种方法，而无需接触一行 C# 或 Visual Basic (VB)\
  \ 代码。\n\n#### 管理提供程序服务\n\n提供程序模型是在 ASP.NET 2.0 中引入的。对于 Web 应用程序，它就像 Web 浏览器的插件。ASP.NET\
  \ 提供程序包括 `Membership`、`Roles` 和 `Profile` 提供程序。这些提供程序中的每一个都有 SQL Server 实现，以及其他实现。默认情况下，SQL\
  \ Server 实现已为 ASP.NET 网站预先配置好。然而，你必须在数据库中用资源来支持这些实现。要准备这些资源，你将使用 `aspnet_regsql.exe`\
  \ 实用工具。\n\nVisual Studio 2005 命令提示符便于从控制台访问此实用工具。该实用工具本身位于 .NET 2.0 系统目录中，该目录包含在为\
  \ Visual Studio 2005 命令提示符使用的特殊命令行所定义的路径中。\n\n该实用工具可以在没有参数的情况下运行以启动向导模式，这是一种可视化模式。尽管名为“向导模式”，但它远不如功能强大的命令行模式，后者提供了更多选项。\n\
  \n首先，可视化模式会为所有提供程序启用支持。如果只想启用 `Profile` 或 `Membership` 提供程序，你可以通过命令行仅请求这些功能，而不添加对\
  \ `Roles` 提供程序的支持（你可能使用自定义提供程序实现它，或者根本不实现）。使用以下命令获取可用选项的完整列表：`aspnet_regsql.exe\
  \ -?`\n\n该实用工具支持的可用服务包括 `Membership`、`Role manager`、`Profiles`、`Personalization`\
  \ 和 `SQL Web event provider`。每一个都可以有选择性地在数据库中注册。\n\n#### 使用命令行\n\n大多数情况下，当我使用可用提供程序处理网站时，我只使用\
  \ `Membership`、`Roles` 和 `Personalization` 支持，而关闭其他功能。要仅添加所需的服务，请使用下面的 `Add Provider\
  \ Services.cmd` 脚本，见清单 1-1。\n\n**清单 1-1.** `Add Provider Services.cmd`\n```cmd\n\
  @echo off\n\nset REGSQL=\"%windir%\\Microsoft.NET\\Framework\\v2.0.50727\\aspnet_regsql.exe\"\
  \n\nset DSN=\"Data Source=.\\SQLEXPRESS;Initial Catalog=Chapter01;Integrated Security=True\"\
  \n\n%REGSQL% -C %DSN% -A mrpc\n\npause\n```\n\n此脚本可以放在项目的根目录下，与解决方案文件一起，以便在开发过程中轻松使用。它首先设置实用工具的位置，然后设置用于承载这些功能的数据源。最后，执行命令以在数据库中添加对\
  \ `Membership` 和 `Roles` 提供程序的支持。\n\n`–C` 开关指定连接字符串，而 `–A` 指定你想要添加到数据库的服务列表。要添加所有服务，只需指定\
  \ `all` 即可。脚本执行只需很短时间。完成后，你会看到所选数据库中将出现新的表和存储过程。\n\n仅添加将要使用的服务是一种极简主义的实践。功能如果有可用，往往就会被用到，因此通过不提供你计划之外的服务，你可以省去监管它们的麻烦。\n\
  \n\n"
- '# 第 1 章 ■ 入门指南


  在开发具有这些功能的网站时，您偶尔会希望重置一切并从头开始。为此，您可以使用脚本来移除提供程序服务。但是，如果表中存在数据，该实用程序不允许移除这些服务。为了帮助完成此操作，您必须按照正确的顺序删除数据，因为表之间存在外键约束。


  为此，请使用清单 1-2 中名为`WipeProviderData.sql`的以下脚本。


  **清单 1-2.** *WipeProviderData.sql*


  ```

  --

  -- WipeProviderData.sql

  --

  -- 清除提供程序服务表中的数据，以便移除服务

  -- （并重新添加）

  --

  -- SELECT name FROM sysobjects WHERE type = ''U'' and name like ''aspnet_%''

  --


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_WebEvent_Events'')

  BEGIN

  delete from dbo.aspnet_WebEvent_Events

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_PersonalizationAllUsers'')

  BEGIN

  delete from dbo.aspnet_PersonalizationAllUsers

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_PersonalizationPerUser'')

  BEGIN

  delete from dbo.aspnet_PersonalizationPerUser

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Membership'')

  BEGIN

  delete from dbo.aspnet_Membership

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Profile'')

  BEGIN

  delete from dbo.aspnet_Profile

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_UsersInRoles'')

  BEGIN

  delete from dbo.aspnet_UsersInRoles

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Users'')

  BEGIN

  delete from dbo.aspnet_Users

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Roles'')

  BEGIN

  delete from dbo.aspnet_Roles

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Paths'')

  BEGIN

  delete from dbo.aspnet_Paths

  END

  GO


  IF EXISTS (SELECT * FROM sysobjects WHERE type = ''U'' AND

  name = ''aspnet_Applications'')

  BEGIN

  delete from dbo.aspnet_Applications

  END

  GO

  ```


  您可以将此脚本放入您的脚本文件夹`D:\Projects\Common\Scripts`中，以便在多个项目中使用。当您想要使用它时，将其加载到 SQL Server
  Management Studio 中，并在您想要清除的数据库上下文中运行它。然后，您可以运行清单 1-3 所示的移除脚本`Remove Provider Services.cmd`。


  **清单 1-3.** *Remove Provider Services.cmd*


  ```

  @echo off

  set REGSQL="%windir%\Microsoft.NET\Framework\v2.0.50727\aspnet_regsql.exe"

  set DSN="Data Source=.\SQLEXPRESS;Initial Catalog=Chapter01;Integrated Security=True"

  %REGSQL% -C %DSN% -R mrpc

  Pause

  ```


  此脚本与`Add Provider Services.cmd`相同，只是命令行开关从`-A`简单地更改为`-R`，后者指定要移除服务。数据清除后，此脚本将成功运行。


  #### 混合与匹配提供程序


  由于提供程序的性质，可以将这些提供程序服务部署到网站其余部分所使用的同一数据库，或完全不同的数据库。甚至可以为每个单独的提供程序将服务部署到单独的数据库。这样做可能有很好的理由。在一种情况下，您可能正在运行一个连接到庞大数据库的网站，该数据库需要偶尔下线进行维护。这样做时，可能完全没必要让提供程序服务也一起下线。您可能还会发现，通过在不同的硬件上托管提供程序服务，可以获得更好的性能。


  您的配置选项远不止于此，这将在下一节中解释。


  ###### 配置提供程序



  当你使用 Visual Studio 2005 首次创建一个新的 ASP.NET 2.0 网站时，它已经预配置好以使用一组默认设置。这些默认设置在 `Machine.config`
  文件中定义，该文件是 .NET 2.0 安装的一部分。通常它位于 `C:\WINDOWS\Microsoft.NET\Framework\v2.0.50727\CONFIG`，或者位于你计算机上安装
  .NET 2.0 的任何位置。


  提供程序配置的默认设置靠近文件底部，在 `system.web` 节中，如清单 1-4 所示。


  **清单 1-4.** Machine.config 中的 system.web


  ```xml

  <system.web>


  <processModel autoConfig="true"/>


  <httpHandlers />


  <membership>


  <providers>


  <add name="AspNetSqlMembershipProvider"


  type="System.Web.Security.SqlMembershipProvider, System.Web, Version=2.0.0.0, Culture=neutral,
  PublicKeyToken=b03f5f7f11d50a3a"


  connectionStringName="LocalSqlServer"


  enablePasswordRetrieval="false"


  enablePasswordReset="true"


  requiresQuestionAndAnswer="true"


  applicationName="/"


  requiresUniqueEmail="false"


  passwordFormat="Hashed"


  maxInvalidPasswordAttempts="5"


  minRequiredPasswordLength="7"


  minRequiredNonalphanumericCharacters="1"


  passwordAttemptWindow="10"


  passwordStrengthRegularExpression="" />


  </providers>


  </membership>


  <profile>


  <providers>


  <add name="AspNetSqlProfileProvider"


  connectionStringName="LocalSqlServer" applicationName="/"


  type="System.Web.Profile.SqlProfileProvider, System.Web, Version=2.0.0.0, Culture=neutral,
  PublicKeyToken=b03f5f7f11d50a3a" />


  </providers>


  </profile>


  <roleManager>


  <providers>


  <add name="AspNetSqlRoleProvider"


  connectionStringName="LocalSqlServer" applicationName="/"


  type="System.Web.Security.SqlRoleProvider, System.Web, Version=2.0.0.0, Culture=neutral,
  PublicKeyToken=b03f5f7f11d50a3a" />


  <add name="AspNetWindowsTokenRoleProvider" applicationName="/"


  type="System.Web.Security.WindowsTokenRoleProvider, System.Web, Version=2.0.0.0,
  Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a" />


  </providers>


  </roleManager>


  </system.web>

  ```


  同时还定义了一个名为 `LocalSqlServer` 的默认连接字符串，它会在 `App_Data` 文件夹中寻找一个名为 `aspnetdb.mdf` 的文件（见清单
  1-5）。


  **清单 1-5.** Machine.config 中的 connectionStrings


  ```xml

  <connectionStrings>


  <add name="LocalSqlServer"


  connectionString="data source=.\SQLEXPRESS;Integrated Security=SSPI;AttachDBFilename=|DataDirectory|aspnetdb.mdf;User
  Instance=true"


  providerName="System.Data.SqlClient"/>


  </connectionStrings>

  ```


  默认的 `LocalSqlServer` 连接被 `system.web` 节中的成员资格、角色和配置文件提供程序配置所引用。数据源指定了该数据库存在于 `DATA_DIRECTORY`
  中。对于 ASP.NET 2.0 网站，这个 `DATA_DIRECTORY` 就是 `App_Data` 文件夹。如果你创建一个新网站并开始使用成员资格和配置文件服务，这个
  SQL Express 数据库将自动在 `App_Data` 文件夹中为你创建。


  但是，如果你安装的是 SQL Server 的标准版或专业版，此过程将会失败，因为它需要 SQL Express。这个默认配置在未针对部署环境进行调整时可能非常方便，但也可能存在危险。


  对于每个提供程序配置，父块都包含针对各自提供程序实现的多个属性。并且在该块内，你可以添加、移除甚至清除提供程序实现。在你新网站的 `Web.config` 文件中，你需要清除由
  `Machine.config` 设置的默认值，并根据你的具体需求进行自定义。


  接下来，你将配置一个新网站以使用成员资格、角色和配置文件提供程序的 SQL 实现。在配置这些之前，你必须准备好数据源。


  假设你有一个示例网站，它将与一个名为 `Sample` 的数据库一起工作，并且该数据库已按照上一节所述准备好提供程序服务，请使用清单 1-6 中的配置。


  **清单 1-6.** 自定义 Web.config


  ```xml

  <connectionStrings>


  <add name="sampledb"


  connectionString="Data Source=.\SQLEXPRESS;Initial Catalog=Sample; Integrated Security=True"


  providerName="System.Data.SqlClient"/>


  </connectionStrings>

  ```


  在开发过程中，我使用受信任的数据库连接并连接到本地计算机。现在你已经准备好使用 SQL 实现来配置提供程序了。并且因为 `Machine.config` 中的默认设置已经使用了
  SQL 实现，让我们从它们开始，然后进行调整。


  #### 成员资格配置


  首先，你将组织配置块以使其更具可读性。在开发过程中你会经常查看它，因此使其易于一眼看懂将节省你的时间。将每个属性放在单独的行上，并缩进属性以使它们对齐。然后将
  `name`、`applicationName` 和 `connectionStringName` 作为前几个属性。这些是关键值。


  接下来，你希望确保这是此网站唯一的成员资格提供程序。


  在 `membership` 块中的 `add` 元素之前添加 `clear` 元素，以告知 ASP.NET 运行时清除所有预配置的设置。然后向 `membership`
  元素添加一个名为 `defaultProvider` 的属性，并将其设置为与新添加的提供程序配置的 `name` 相同的值。清单 1-7 展示了成员资格配置。表
  1-1 涵盖了可用的各种设置。


  **清单 1-7.** 成员资格配置


  ```xml

  <membership defaultProvider="Chapter01SqlMembershipProvider">


  <providers>


  <clear/>


  <add


  name="Chapter01SqlMembershipProvider"


  applicationName="/chapter01"


  connectionStringName="chapter01db"


  enablePasswordRetrieval="true"


  enablePasswordReset="true"


  requiresQuestionAndAnswer="true"


  requiresUniqueEmail="false"


  passwordFormat="Clear"


  maxInvalidPasswordAttempts="5"


  minRequiredPasswordLength="7"


  minRequiredNonalphanumericCharacters="0"


  passwordAttemptWindow="10"


  passwordStrengthRegularExpression=""


  type="System.Web.Security.SqlMembershipProvider, System.Web, Version=2.0.0.0, Culture=neutral,
  PublicKeyToken=b03f5f7f11d50a3a"


  />


  </providers>


  </membership>

  ```


  **表 1-1.** 成员资格配置设置


  | **设置** | **描述** |

  | :--- | :--- |

  | `name` | 指定由 `membership` 元素引用的配置名称。 |

  | `applicationName` | 定义用作成员资格数据库中范围的应用程序名称。 |

  | `connectionStringName` | 指定此提供程序要使用的连接字符串。 |

  | `enablePasswordRetrieval` | 指定此提供程序是否允许密码检索。 |

  | `enablePasswordReset` | 指定此提供程序是否可以重置用户密码（启用 = `true`）。 |

  | `requiresQuestionAndAnswer` | 指定密码重置和检索是否需要密码提示问题和答案。 |

  | `requiresUniqueEmail` | 指定此提供程序是否要求每个用户具有唯一的电子邮件地址。 |

  | `passwordFormat` | 指定密码格式，例如 `cleared`（明文）、`hashed`（哈希，默认）和 `encrypted`（加密）。 |

  | `maxInvalidPasswordAttempts` | 指定在用户账户被锁定之前允许的失败登录尝试次数。 |

  | `minRequiredPasswordLength` | 指定密码所需的最小字符数。 |

  | `minRequiredNonalphanumericCharacters` | 指定密码中必须包含的特殊字符数量。 |

  | `passwordAttemptWindow` | 跟踪失败尝试的时间窗口（以分钟为单位）。 |

  | `passwordStrengthRegularExpression` | 用于检查密码字符串是否符合所需密码强度的正则表达式。 |


  #### 角色配置




  现在，你将对角色提供程序（Roles provider）进行大致相同的操作。这个配置块名为 `roleManager`，除了 `defaultProvider`
  属性外，它还有一个名为 `enabled` 的属性，允许你开启或关闭它。之后，你可以通过 `Roles.Enabled` 属性在代码中轻松访问 `enabled`
  设置。默认情况下，此值设置为 `false`，因此，即使你已经配置了提供程序，也必须显式设置此值以添加对角色的支持。请参见代码清单 1-8 中的角色配置。


  '
- "# 第 1 章：入门\n\n**代码清单 1-8.** *角色配置*\n```xml\n<roleManager defaultProvider=\"Chapter01SqlRoleProvider\"\
  \ enabled=\"true\">\n    <providers>\n        <clear/>\n        <add\n         \
  \   name=\"Chapter01SqlRoleProvider\"\n            connectionStringName=\"chapter01db\"\
  \n            applicationName=\"/chapter01\"\n            type=\"System.Web.Security.SqlRoleProvider,\
  \ System.Web, Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a\"\
  \n        />\n    </providers>\n</roleManager>\n```\n\n## 配置文件（Profile）配置\n\n最后，你可以添加对配置文件（Profile）提供程序的支持。与前面两个提供程序配置一样，你需要将\
  \ `defaultProvider` 属性设置为与新添加的配置相匹配，并添加 `clear` 元素以确保这是唯一配置的提供程序。配置文件提供程序配置的独特功能是能够定义自定义属性。\n\
  \n在代码清单 1-9 所示的示例配置中，定义了一些自定义属性：`FirstName`、`LastName` 和 `BirthDate`。我稍后会解释这些属性；表\
  \ 1-2 列出了配置文件配置设置。\n\n**代码清单 1-9.** *配置文件配置*\n```xml\n<profile defaultProvider=\"\
  Chapter01SqlProfileProvider\" automaticSaveEnabled=\"true\" enabled=\"true\">\n\
  \    <providers>\n        <clear/>\n        <add\n            name=\"Chapter01SqlProfileProvider\"\
  \n            applicationName=\"/chapter01\"\n            connectionStringName=\"\
  chapter01db\"\n            type=\"System.Web.Profile.SqlProfileProvider, System.Web,\
  \ Version=2.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a\"/>\n    </providers>\n\
  \    <properties>\n        <add name=\"FirstName\" type=\"String\" allowAnonymous=\"\
  true\" />\n        <add name=\"LastName\" type=\"String\" allowAnonymous=\"true\"\
  \ />\n        <add name=\"BirthDate\" type=\"DateTime\" allowAnonymous=\"true\"\
  \ />\n    </properties>\n</profile>\n```\n\n**表 1-2.** *配置文件配置设置*\n\n**设置** | **描述**\n\
  ---|---\n`name` | 指定 profile 元素引用的配置名称。\n`applicationName` | 定义在配置文件数据库中用作范围的应用程序名称。\n\
  `connectionStringName` | 指定此提供程序要使用的连接字符串。\n\n你可以在末尾附近看到那些自定义属性。配置文件提供程序允许你管理绑定到\
  \ ASP.NET 用户的属性。你可以定义任何可以序列化的属性。在三个示例中，`String` 和 `DateTime` 对象都可以轻松序列化以存储在 SQL\
  \ Server 数据库中。然而，属性可以比这些常见的基元类型复杂得多。也许你有一个名为 `Employee` 的业务对象，它包含诸如 `Title`、`Name`、`Department`\
  \ 和 `Office` 之类的属性。与其配置所有这些属性，你可以直接将 `Employee` 对象指定为一个属性。\n\n然后，通过在你的后台代码类或位于 `App_Code`\
  \ 文件夹中的类里编写代码，你可以通过 `Profile.Employee` 访问此属性。多亏了作为 ASP.NET 运行时一部分的动态编译器，这些属性在 Visual\
  \ Studio 中立即可用，并支持 IntelliSense。这听起来真的很强大，不是吗？确实如此。\n\n然而，如果你将许多复杂对象设置为配置文件属性，你可能会很快陷入困境。当你需要向\
  \ `Employee` 对象添加或删除属性，但数据库中已经保存了许多该对象的序列化版本时，会发生什么？你将如何升级它们？\n\n当 ASP.NET 2.0 首次发布时，我看到各种示例展示了如何创建一个名为\
  \ `ShoppingBasket` 的对象，将名为 `Items` 的对象添加到 `ShoppingBasket` 中，并将 `ShoppingBasket`\
  \ 设置为配置文件属性。我立刻意识到这不会是我愿意尝试的做法。在 .NET 2.0 发布的前一年，我正在构建一个商业网站来管理包含商品项和客户订单的购物篮，而我从未使用过配置文件属性。我仍然有我的\
  \ `ShoppingBasket` 对象，它包含许多 `Item` 对象，但我管理了与这些对象一起使用的表和存储过程，这样我就可以轻松地为它们添加新属性并管理变更。如果\
  \ `Item` 开始时只有一个名为 `Price` 的价格值，而后来我需要添加另外几个，如 `SalesPrice` 和 `SeasonalPrice`，添加它们很容易。为了将它们与当前网站用户关联起来，我使用了以下技术。\n\
  \n对于这个特定网站，我需要同时处理匿名用户和已认证用户。当用户首次访问该网站时，会获得一个令牌以在页面间导航时标识他。这是一个匿名用户令牌。用户创建账户后，该匿名令牌将被删除，用户将被迁移到一个已认证用户令牌。已认证用户是使用成员资格（Membership）提供程序的会员。为了无缝处理匿名和已认证用户，我需要一种方法来唯一标识这些用户。不幸的是，没有像\
  \ `Profile.UserID` 这样的默认值。有一个 `Profile.UserName` 属性，但它仅对已认证用户可用。所以我最终创建了一个包装属性，无论用户是匿名还是已认证，都提供一个\
  \ `Guid` 值。\n\n## 匿名配置文件\n\n要使用配置文件上的属性，必须首先启用匿名配置文件。`system.web` 中名为 `anonymousIdentification`\
  \ 的元素可以被启用以开启此功能。\n\n在 `App_Code` 文件夹中，我创建了一个名为 `Utility` 的类，并添加了代码清单 1-10 中的属性。\n\
  \n**代码清单 1-10.** *实用工具方法*\n```csharp\npublic static bool IsUserAuthenticated\n{\n\
  \    get\n    {\n        return HttpContext.Current.User.Identity.IsAuthenticated;\n\
  \    }\n}\n\npublic static Guid UserID\n{\n    get\n    {\n        if (IsUserAuthenticated)\n\
  \        {\n            return (Guid)Membership.GetUser().ProviderUserKey;\n   \
  \     }\n        else\n        {\n            Guid userId = new Guid(HttpContext.Current.Request.AnonymousID.Substring(0,\
  \ 36));\n            return userId;\n        }\n    }\n}\n```\n\n每当我需要当前用户的唯一标识符时，我会通过\
  \ `Utility.UserID` 来访问它。但随后我必须处理从匿名用户到已认证用户的过渡。\n\n为此，我在 `Global.asax` 中添加了一个名为\
  \ `Profile_OnMigrateAnonymous` 的方法，如代码清单 1-11 所示。\n\n**代码清单 1-11.** *Profile_OnMigrateAnonymous*\n\
  ```csharp\npublic void Profile_OnMigrateAnonymous(object sender, ProfileMigrateEventArgs\
  \ args)\n{\n    Guid anonID = new Guid(args.AnonymousID);\n    Guid authId = (Guid)Membership.GetUser().ProviderUserKey;\n\
  \n    // 将匿名用户资源迁移到已认证用户\n\n    // 删除匿名用户。\n    Membership.DeleteUser(args.AnonymousID,\
  \ true);\n}\n```\n\n以购物篮为例，我只需将匿名用户购物篮中的商品项添加到已认证用户的购物篮中，然后删除匿名账户及其所有关联数据。\n\n我曾考虑在配置文件属性中添加一个名为\
  \ `UserID` 的 `Guid` 属性，但 ASP.NET 运行时的动态编译器仅在后台代码文件中有效。它在位于 `App_Code` 目录中的 `Utility`\
  \ 类中不起作用，而我大部分代码都放在那里。所以上述技术是当时唯一的选择。\n\n#### 创建用户和角色\n\n\n\n当你在 Visual Studio 中处理网站时，可以使用**网站管理工具**来创建用户和角色。但此实用程序并非**微软互联网信息服务\
  \ (IIS)** 的内置功能。要管理用户和角色，你必须亲自动手——要么通过谨慎调用存储过程在数据库中操作，要么创建一个界面来安全地使用**成员资格 API**。我选择创建几个用户控件，可以轻松地将它们放入任何网站中。\n\
  \n两个主要控件 `UserManager.ascx` 和 `RolesManager.ascx` 负责处理用户和角色的管理。这些控件被包含在另一个名为 `MembersControl.ascx`\
  \ 的用户控件中。\n\n这个控件在三种视图之间切换，用于创建新用户、编辑现有用户以及编辑角色。清单 1-12 到 1-17 提供了这些控件的完整源代码。\n\n\
