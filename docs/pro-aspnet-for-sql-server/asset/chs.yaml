- "# 第 2 章 ■ 数据模型选择\n\n我首先担心的是，你会立刻在应用层、直接在页面中使用内联 SQL。虽然创建这样的 SQL 很容易，但日后要对其进行更改以适应变化却并非易事。除非数据库永不改变，或者你完全理解刚刚生成的一切，否则这最终会给你带来麻烦。很容易想象`Person`表最终会增加更多列（例如，用于中间名首字母和性别）。如果表最初只有一个`Name`列，后来被拆分成`First\
  \ Name`和`Last Name`，那么你就需要对代码清单 2-7 中所示的 SQL 进行一些修改；否则，该 SQL 将失效。\n\n代码清单 2-7 中的`SqlDataSource`在其智能标记上有一个`Refresh\
  \ Schema`（刷新架构）命令，但它实际上并不像你期望的那么强大。将`Last Name`改为`Surname`会在刷新架构时导致错误。而为`Middle\
  \ Initial`（中间名首字母）添加新列并不会将该新列添加到`Select`（选择）和其他命令中。要进行这些调整，你必须选择智能标记上的另一个选项：`Reconfigure\
  \ Datasource`（重新配置数据源）。而这样做会带来一些`GridView`方面的问题，例如重置你可能已经进行了大量定制的列，而你不希望这些列被自动生成的更改所改变。考虑到所有这些因素，最好将这种快速但粗糙的数据绑定方式仅用于原型设计新想法，而当项目度过早期阶段后，应调整为使用更具可维护性、架构上更合理的方法。幸运的是，通过使用`SqlDataSource`的内联查询创建的快速原型，在原型开始转变为实际应用程序时，可以被`ObjectDataSource`替代。`ObjectDataSource`生成的列只需与`SqlDataSource`的列相匹配，而你的`GridView`则可以保持不变。\n\
  \n## 非简单数据示例\n\n在现实世界的 application 中，简单的示例只能带你走这么远，很快你就需要同时处理多个表。将来自多个表的数据添加到`GridView`或其他数据绑定控件中进行显示和编辑，就进入了非简单示例的范畴。\n\
  \n在示例`Person`数据库中，`Person`表通过`LocationId`与`Location`表存在关系。而在`Location`表中，`City`和`Country`的值定义了个人居住的位置。当显示数据库中所有人员的`GridView`时，显示城市和国家而不是`LocationId`会直观得多。前面展示的`chpt02_GetAllPeople`存储过程将这些值汇集在一起，因此从应用程序的角度来看，可以像使用数据库中单个表那样使用它们。不幸的是，你不能像拖放表那样，从“服务器资源管理器”窗口将存储过程拖放到\
  \ Web 窗体的设计界面上。相反，你必须从“工具箱”中拖放一个`GridView`并为其配置数据源。当配置为`SqlDataSource`时，可以选择存储过程，但数据源向导不会提供`Insert`（插入）、`Update`（更新）和`Delete`（删除）命令作为选项。仍然可以实现前面章节中单表示例的所有功能，但要提供`GridView`所需的所有功能，仅靠一个用类型化\
  \ DataSet 配置的存储过程是不够的。如何实现这一点的详细示例将在第 3 章中介绍。\n\n##### 类型化 DataSet\n\n从代码清单 2-6\
  \ 中的基本存储过程开始，你可以构建一个自定义的类型化 DataSet。你只需转到你准备用作数据访问层的类库项目，并向其中添加一个名为`PersonDataSet.xsd`的\
  \ DataSet。然后添加一个 TableAdapter，并按照向导提供的步骤添加此处定义的现有存储过程。接着，将`DataTable`和`TableAdapter`重命名为更用户友好的名称，例如`People`和`PeopleTableAdapter`，以使随类型化\
  \ DataSet 生成的代码更好地模拟它所要表示的对象。图 2-4 展示了`People`类型化 DataSet 的样子，图 2-5 展示了`FillAllPeople`方法的属性。\n\
  \n**图 2-4.** People 类型化数据集\n\n**图 2-5.** FillAllPeople 属性\n\n此类型化 DataSet 被定义为类库的一部分。将网站设置为使用此类库作为依赖项，然后运行网站的生成操作，以确保网站当前使用的程序集中包含这个新创建的类型化\
  \ DataSet。依赖项编译后，它会自动复制到网站的`bin`目录中，并准备好在 Web 窗体中使用。只需在设计界面上拖放一个`GridView`控件。然后使用智能标记选择一个数据源。选择一个新的`ObjectDataSource`。可用选项将显示之前命名的`PeopleTableAdapter`。将选择方法设置为`GetAllPeople`方法。设置好`ObjectDataSource`后，你可以返回到`GridView`，打开智能标记以启用分页和排序。现在，通过在“解决方案资源管理器”中右键单击页面并选择`View\
  \ in Browser`（在浏览器中查看）来测试该页面。\n\n你可能会惊喜地发现，页面加载时间合理，并且提供了你期望的排序和分页功能。类型化 DataSet\
  \ 在减小`ViewState`大小方面也做得非常出色。难怪我刚刚描述的方法受到`MSDN`文档的强烈推荐。然而，这个解决方案并非所有场景下的唯一选择，甚至不是最佳选择。接下来你将探索一些替代方案。\n\
  \n## 僵化的类型化 DataSet\n\n当在 XML 架构定义（`XSD`）设计器上构建类型化 DataSet 时，它会从数据库读取所有架构信息，并硬编码所有列的名称以及类型和确切大小。将`VARCHAR(10)`更改为`VARCHAR(11)`可能会破坏类型化\
  \ DataSet。一旦插入了一条长度为 11 个字符的记录，并且类型化 DataSet 遇到此数据时，由于大小限制，它将抛出异常。如果不小心，这个问题可能直到被推入生产环境并在最糟糕的时间被发现时才会被注意到。为了防范此问题，可以在属性面板中手动调整类型化\
  \ DataSet 中已更新的列定义。\n\n##### 非类型化 DataSet\n\n上一节中使用的类型化 DataSet 是使用`XSD`文件构建的，该文件定义了`DataTable`和`TableAdapter`的各种属性。这是一个相当僵化的模型，因为`XSD`文件主要通过使用\
  \ Visual Studio 和可视化的类型化 DataSet 设计器进行编辑。\n\n它也将数据库架构锁定，而这在项目的生命周期中很可能会发生变化。使用更灵活的选项会很有帮助。\n\
  \n类型化 DataSet 使用的存储过程可以直接运行，以获取相同的列，这些列将在运行时生成兼容的`DataSet`。列定义可以仅由存储过程来定义，而不必由类型化\
  \ DataSet 和存储过程重复定义。\n\n\n\n在同一个类库中，创建一个名为 `PersonDomain` 的类，并开始使用本章前面定义的代码片段填充代码。首先，添加对\
  \ `Database` 对象的引用，然后在构造函数中添加对该引用的初始化（参见代码清单 2-8）。\n\n**代码清单 2-8.** *数据库初始化*\n```csharp\n\
  /// <summary>\n/// 用作数据库连接的全局连接\n/// </summary>\nprivate Database db;\n\npublic\
  \ PersonDomain()\n{\n    db = DatabaseFactory.CreateDatabase(\"chpt02\");\n}\n```\n\
  \n接下来，添加代码清单 2-9 中的方法，该方法调用与类型化 `DataSet` 相同的存储过程。\n\n**代码清单 2-9.** *GetAllPeopleDataSet*\n\
  ```csharp\n[DataObjectMethod(DataObjectMethodType.Select)]\npublic DataSet GetAllPeopleDataSet()\n\
  {\n    DataSet ds = new DataSet();\n    using (DbCommand dbCmd =\n        db.GetStoredProcCommand(\"\
  chpt02_GetAllPeople\"))\n    {\n        ds = db.ExecuteDataSet(dbCmd);\n    }\n\
  \    // 返回结果\n    return ds;\n}\n```\n\n![图片 11](img/index-60_1.png)\n\n8601Ch02.qxd\
  \ 8/29/07 5:00 PM Page 52\n\n**52**\n\n第 2 章 ■ 数据模型选择\n\n代码清单 2-9 中的简单方法调用了 `chpt02_GetAllPeople`\
  \ 存储过程，并返回生成的 `DataSet`，其列与类型化 `DataSet` 的列完全相同。该方法还包含 `DataObjectMethod` 属性，该属性指示关联的方法充当\
