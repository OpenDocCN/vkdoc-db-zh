  \    };\n```\n\n`PersonListingControl` 和 `ObjectDataSource` 都有一个名为 `EnablePaging`\
  \ 的属性，用于控制 `Select` 方法的行为。如果启用了分页，则需要 `StartRowIndex` 和 `MaximumRows` 的值，并将它们传递给已声明的\
  \ `DataObjectMethod`。如果未启用分页，则使用不包含这些参数的方法。然而，`ObjectDataSource` 和 `PersonListingControl`\
  \ 的 `EnablePaging` 值不必相同。如果 `ObjectDataSource` 启用了分页而 `PersonListingControl` 没有，它仍将使用接受分页参数的方法。\n\
  \n当处于这种混合模式时，应设置这些值以允许将所有数据返回给控件。代码清单 4-26 显示了设置这些值的代码。\n\n## 代码清单 4-26：混合模式下的选择参数\n\
  \n```csharp\nif (dataSourceView.CanPage)\n{\n    selectArguments.AddSupportedCapabilities(DataSourceCapabilities.None);\n\
  \    selectArguments.StartRowIndex = 0;\n    selectArguments.MaximumRows = Int16.MaxValue;\n\
