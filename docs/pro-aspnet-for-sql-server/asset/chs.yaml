  \   {\n            // 当没有内容可显示时隐藏该控件\n            Visible = false;\n        }\n\
  \    }\n}\n```\n\n## 你最糟糕的敌人\n\n我曾经与一位开发人员共事，他在一次页面请求中无意间访问了数据库数百次。这些查询导致页面加载时间非常长。他没有意识到，在代码循环中调用某些方法会不断重新加载他之前已经请求过的数据。只需将同一请求早期的数据保存下来，供同一请求的后续部分使用，你就可以在不使用\
  \ ASP.NET 缓存系统的情况下加快应用程序的速度。\n\n\n\n对单个页面请求进行数百次数据库调用的一个副作用是，每个查询的响应速度会异常缓慢，这种延迟会迅速累积。这就像高峰时段的交通堵塞，但对于数据库而言，这一切都发生在几秒钟内，当你期望页面在一秒内加载完成时，这种延迟就非常明显。使用你最近从数据库请求的数据可以分散你的查询，减少查询“交通堵塞”的频率。\n\
  \n当你加载数据并在后续使用时，事件顺序非常重要。当与母版页一起使用时，你可能期望母版页上的 `Load` 事件首先运行，但实际上，页面上的 `Load` 事件会先触发，然后是母版页的，接着是页面上所有用户控件的\
  \ `Load` 事件。我曾使用此技术结合自定义的 `SiteMap`，通过 `Url` 与这些对象的关联，将页面的当前对象加载到当前上下文中。\n\n这个 `Url`\
  \ 可能不对应一个产品，但当它确实对应一个产品时，我可以填充该项，所有用户控件都可以检查并使用它（如果可用）。为了集中所有这些逻辑，你可以将填充这些上下文项的代码放在母版页的\
  \ `Init` 事件处理程序中，这样它就在页面的 `Load` 事件之前执行了。\n\n## 你应该跳过性能调优吗？\n\n你不应该过早地优化系统，因为在早期你并不知道什么需要调优。重要的是先在调优前进行测量，调优后再次测量，以便展示差异。\n\
  \n经过几次迭代，你会开始在代码中发现显现的模式，这些模式会向你展示常见的性能问题，这些问题希望有一个通用的解决方案，你可以在整个代码中一致地应用。在应用程序完成之前尝试进行调优，可能会引入问题，从而延迟项目的完成，却无法增加可衡量的价值。\n\
  \n.NET 内部还有一些特性可以解决常见的低效编码技术，它们会自动启用以加速你的应用程序。通过使用你通常的编码技术，你会发现那些看起来低效的做法实际上性能相当好。但如果你试图预先调优应用程序，你就无法获得那种自动优化的好处，并且会为项目投入更多的时间和精力。\n\
  \n## 性能调优：字符串拼接\n\n关于调优的一个常见走廊辩论是关于字符串拼接。你应该使用 `+` 操作符将字符串相加，还是使用 `StringBuilder`\
  \ 来追加字符串？冲突在于，直接用 `+` 操作符相加字符串比使用 `StringBuilder` 更简单、更快，但 `StringBuilder` 的性能更好。能迅速结束这场辩论的是有人指出，一旦代码被编译，无论哪种方式，最终都会被优化为使用\
  \ `StringBuilder`。而这仅仅是 .NET 内置的众多性能增强机制之一，你无需改变当前的编码习惯即可享用。一个好的经验法则是记住，编程代码是给人看的，机器码是给机器看的。让编译器做它的工作吧。\n\
  \n当你完成构成应用程序的各个组件时，你将能够分析实际性能并识别瓶颈。有时性能调优可能只是对存储过程的一个简单的一行调整，或是对数据访问层代码的几行修改。使用常规技术构建应用程序，可以让你尽可能高效，同时让低效之处在接近完成时逐渐显现。慢慢地，随着你越来越得心应手，你会开始形成一些模式，从一开始就构建出性能更佳的应用程序。\n\
  \n#### 缓存选项\n\n说到缓存，有令人眼花缭乱的选项可供选择。`Cache` 对象不仅仅是持有一个对象集合以供快速访问。整个缓存系统包含一套丰富的功能，可用于不同的场景。ASP.NET\
  \ 中的缓存主要分为两大类：输出缓存和数据缓存。\n\n##### 输出缓存\n\n使用输出缓存，你是在用户界面层工作。你缓存的是页面或用户控件的输出。（缓存用户控件的输出被称为\
  \ `fragment` 缓存。可以将用户控件视为生成页面的一部分，或“一个片段”。）配置为输出缓存的页面或用户控件将在第一次请求时正常运行，之后每次后续请求在缓存过期前，都将返回与首次将内容放入缓存的请求相同的输出。从缓存中提取内容可以避免代码隐藏中的服务器端处理，包括所有数据绑定和数据库查询。\n\
  \n虽然输出缓存有一些主要好处，但它有点像是一种“蛮力”方法，而不是一个针对性的解决方案，后者可以考虑被消费数据的性质。一个页面或用户控件可以缓存许多数据片段，这些片段都有独特的依赖关系，当这些数据被分组显示时，会引发许多问题。通过正确组合此处介绍的技术，应该可以最大限度地减少其缺点。\n\
  \n### 页面缓存\n\n在最高层级，你将缓存整个页面的输出，包括页面内包含的所有控件。启用此类缓存的声明方式是在页面中放置一个包含所需设置的指令。\n\n\
  清单 6-6 中的示例将缓存页面的输出，`Duration` 为 60 秒，并且对于任何参数都是唯一的。当使用通配符 (`*`) 时，`VaryByParam`\
  \ 属性将导致输出缓存在任何查询字符串参数不同时生成新的输出。你也可以使用分号分隔的名称列表来指定特定的一个或多个查询字符串。\n\n**清单 6-6.** `启用输出缓存`\n\
  \n```aspx\n<%@ OutputCache Duration=\"60\" VaryByParam=\"*\" %>\n```\n\n输出缓存的一个吸引人的特点是，它不仅在返回缓存响应时不必从数据库拉取数据，而且也不必触发任何页面事件，因为它使用的是首次请求（将输出记录到缓存）的输出。因此，它不仅减少了数据库负载，还降低了处理器使用率。\n\
  \n输出缓存也可以在代码隐藏中以编程方式设置，如清单 6-7 所示，尽管这种方法不如声明式方法优雅。它确实让你可以选择使用逻辑来设置过期时间，如果你想根据服务器负载调整缓存，这可能会派上用场。\n\
  \n**清单 6-7.** `以编程方式设置页面进行输出缓存`\n\n```csharp\nprotected void Page_Load(object sender,\
  \ EventArgs e)\n{\n    Response.Cache.SetCacheability(HttpCacheability.Public);\n\
  \    if (IsPeakLoadTime())\n    {\n        // 在高峰负载期间缓存十分钟\n        Response.Cache.SetExpires(DateTime.Now.AddMinutes(10));\n\
  \    }\n    else\n    {\n        // 在正常流量期间缓存两分钟\n        Response.Cache.SetExpires(DateTime.Now.AddMinutes(2));\n\
  \    }\n    Response.Cache.SetValidUntilExpires(true);\n    Product currentProduct\
  \ = Context.Items[\"CurrentProduct\"] as Product;\n    if (currentProduct != null)\n\
  \    {\n        Label1.Text = currentProduct.Name;\n    }\n    else\n    {\n   \
  \     // 当没有内容可显示时隐藏控件\n        Visible = false;\n    }\n}\n```\n\n### 输出缓存的问题\n\
  \n\n\n一个采用预编译程序集部署的网站，从请求处理的角度来看，已经实现了大量的性能优化。应用程序中较慢的活动通常仍然是从数据库提取数据。通过使用高效的缓存依赖项，您可以确保缓存中的数据始终是最新的，但输出缓存声明并不具备了解缓存依赖项何时变更所需的全部丰富性和细节。如果您为了确保显示的数据是最新的而对数据访问层所做的所有优化努力，可能会因为输出缓存将缓存输出保留过久而付诸东流。因此，您可能会发现输出缓存通常不是一个现实的选择。\n\
  \n## 片段缓存\n\n您不必缓存整个页面，而是可以缓存各个部分，其中一些部分需要比其他部分更频繁地更新。在用户控件中使用输出缓存被称为**片段缓存**。放置在页面上的每个用户控件都可以有不同的输出缓存设置。考虑一个产品详情页面，它展示产品照片以及关于产品的各种细节。我曾使用片段缓存，通过五六个用户控件来显示产品页面的几个部分。其中一些用户控件被缓存，而另一些则没有。某些细节不会经常改变，例如产品照片、描述、尺寸、颜色和供应商关联。但其他细节，如定价和可用状态，可能会更频繁地变化。每个用户控件都根据其显示内容声明了特定的输出缓存设置。产品页面是这些用户控件的组合体，在流量高峰期它的性能表现非常出色。\n\
  \n您可以结合使用页面缓存和片段缓存，但显然，页面上设置的 `Duration` 必须比启用了输出缓存的用户控件的持续时间短。您可以将页面的持续时间设置为 10\
  \ 秒，而一个包含很少更改数据的用户控件的缓存时间可以设置为 3,600 秒。\n\n## 缓存后替换\n\n另一个输出缓存功能是**缓存后替换**，它允许页面使用输出缓存，同时允许页面的某一部分在每次请求时更新。这可以通过\
  \ `Substitution` 控件以声明方式实现。该技术有一个限制：`Substitution` 控件不能在启用了输出缓存的用户控件或母版页中使用，因此您无法将此技术与片段缓存结合使用，至少不能直接结合。您必须改为缓存整个页面，并在需要每次请求都获取新内容的位置使用\
  \ `Substitution` 控件。\n\n`Substitution` 控件的工作方式与典型的 ASP.NET 控件不同。像 `Label` 这样的典型控件允许您设置\
  \ `Text` 属性，控件会连同其他属性（如 `Font-Bold` 和 `CssClass`）一起用于显示。而对于 `Substitution` 控件，您需要提供一个像\
  \ `Literal` 控件那样直接显示的字符串。这是通过 `MethodName` 属性实现的，该属性引用代码隐藏文件中的一个静态方法，该方法以 `HttpContext`\
  \ 对象作为唯一参数并返回字符串。由于控件上的其他属性，此字符串不经处理或装饰直接显示。\n\n第 6 章 ■ 缓存\n\n在产品详情页的情况下，您会将整个页面设置为使用输出缓存，而用于组装页面的每个用户控件则不使用缓存。对于需要更新的某些细节，您会使用一个\
  \ `Substitution` 控件。\n\n在清单 6-8 和 6-9 中，`Label` 控件只会在页面的输出缓存过期时更新，而 `Substitution`\
  \ 控件的值在每次请求时都是最新的。\n\n### 清单 6-8. Substitution 控件标记\n\n```xml\n<asp:Label ID=\"\
  lblProductName\" runat=\"server\" Text=\"\"></asp:Label><br />\n<asp:Label ID=\"\
  lblProductNumber\" runat=\"server\" Text=\"\"></asp:Label><br />\n<asp:Substitution\
  \ ID=\"subPrice\" runat=\"server\" MethodName=\"GetPrice\" /><br />\n```\n\n\n\n\
  ## 带有 Postcache 替换的片段缓存\n\n<asp:Substitution ID=\"subAvailability\" runat=\"server\"\
