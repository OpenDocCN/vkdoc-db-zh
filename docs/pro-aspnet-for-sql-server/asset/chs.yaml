  \ `SubCommander` 的命令行工具完成的，它处理多个命令以生成代码和数据库脚本。`generate` 命令识别许多参数。最重要的参数与 `/config`\
  \ 和 `/out` 开关一起使用。清单 8-14 展示了一个用于生成数据访问层代码的示例命令。\n\n```console\nsonic.exe /config\
  \ Website\\Web.config /out Website\\App_Code\\Generated\n```\n生成的类可以包含在你的项目中，项目可以是一个网站或一个类库。最初，`SubSonic`\
  \ 创建时，它专门用于 ASP.NET 2.0 网站，因为它利用了构建提供程序（Build Provider）模型，而该模型仅适用于网站。为了扩展生成代码的适用范围，增加了将类生成到源文件的功能。将代码生成限制在网站内，阻止了数据访问层作为其他类型应用程序（如桌面和控制台应用程序）的依赖项被使用。一些开发人员也对数据访问层随着数据库变化而动态变化感到不适。\n\
  > **注意** 有关 `code generate` 命令参数的完整文档以及演练视频，请参阅 `SubSonic` 网站 (http://www.subsonicproject.com)。\n\
  \n### SubSonic 模板\n`SubSonic` 中的模板系统镜像了 ASP.NET 使用的模板系统。文件的格式看起来很像 `.aspx` 标记文件，但它不是生成\
  \ HTML，而是为你的数据访问层生成代码。图 8-4 展示了一个用于生成类的示例模板。\n\n\n\n.NET 框架本身并不提供处理这些模板文件的基础设施，除非作为\
  \ ASP.NET 运行时的一部分。为了让这些模板能在 SubSonic 中用于代码生成，该项目创建了一个解析器和代码处理器。它读取嵌入在程序集中的模板文件，进行解析、处理，生成输出代码，然后保存到源文件中。所有用于生成可工作代码的模板代码都包含在源代码下载中，以便您可以根据需要进行调整。如果您不想使用嵌入式模板，也可以为自己的模板指定一个替代位置。`/templateDirectory`\
  \ 参数用于覆盖标准模板处理。为了使用“外部世界”的值处理模板，一些占位符在解析和处理模板时被替换。在图 8-3 中，您可以看到 `providerName`\
  \ 和 `tableName` 变量被设置为 `#PROVIDER#` 和 `#TABLE#`，这些是占位符，会在模板处理的早期步骤中被替换。这些变量在模板生成代码的其余部分中被使用。\n\
  \n模拟 .aspx 模板处理的优势在于，它不仅支持占位符替换，还支持循环。清单 8-15 展示了类模板中的一个循环，用于生成与数据库表列匹配的所有属性。\n\n\
