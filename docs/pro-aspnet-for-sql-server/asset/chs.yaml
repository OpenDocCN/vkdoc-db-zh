- "# 使用 SQL 提供程序\n\n在开发包含这些提供程序配置的网站时，您可能会发现需要在工作站的本地数据库副本与办公室服务器上的远程数据库之间进行切换。您可以配置每一个数据库连接，并将提供程序配置所使用的名称切换为您想要激活的那个。我通常使用本地数据库副本进行工作，这样可以避免他人直接修改服务器上的数据库对我造成干扰。您可能会维护一个所有开发人员共用的过渡数据库，用于测试集成构建。当您在本地副本上完成一组功能后，可以将数据库更改部署到该过渡数据库，重新配置您的网站以连接过渡数据库，然后运行测试以验证您的更改是否与他人可能已做的更改正确集成，之后再将您的更改签入源代码控制。\n\
  \n##### 创建密码策略\n\n为一个新网站配置 `SqlMembershipProvider` 时，您必须选择密码的处理方式。这是使用 `MembershipProvider`\
  \ 的第一个障碍，因为默认的密码策略有些严格。它要求密码至少七个字符，并且至少包含一个非字母数字字符。像 `aspnet9` 这样的密码是不允许的，但 `aspnet9!`\
  \ 则可以。在开发过程中，我经常创建新账户并登录，因此简化这个要求（至少在开发期间）是我的首要步骤之一。根据您的公共网站所需的安全级别，您可以放宽密码策略，不要求非字母数字字符，并可能将所需长度降至六个字符。或者，您可以配置一个正则表达式来验证新密码。表\
  \ 5-2 展示了一些您可以使用的示例正则表达式。\n\n**表 5-2.** 密码正则表达式\n\n`^.{7,10}$`\n密码可以包含任何字符，长度为七到十个字符。\n\
  \n`^[a-zA-Z]\\w{7,14}$`\n密码必须仅为字母，长度为七到十四个字符。\n\n`^(?=.*\\d).{7,12}$`\n密码必须包含至少一个数字字符，长度为七到十二个字符。\n\
  \n`^(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).{7,15}$`\n密码必须至少包含一个大写字母、一个小写字母和一个数字。其长度必须为七到十五个字符。\n\
  \n当然，您可以使用更严格的正则表达式要求，但应将其与用户能接受的程度相平衡。如果它只是一个关于您梦幻橄榄球联盟的在线讨论论坛，您可以采用宽松的密码策略。但如果是一个通过\
  \ SSL 保护的、管理银行账户的网站，您应该倾向于使用最后一个示例。\n\n**注意** 您可以在 `http://regexlib.com/` 上在线获取更多正则表达式示例。搜索\
  \ `password`，您将得到一个密码正则表达式列表。\n\n## SqlRoleProvider\n\n`SqlRoleProvider` 是 `RoleProvider`\
  \ 的一个实现，它提供了一种对用户进行分组的方法。如果您正在使用 `SqlMembershipProvider`，则并非必须启用 `RoleProvider`。并且如果两者都启用，您甚至可以选择不同类型的提供程序。您可以将网站配置为使用\
  \ `Active Directory 成员资格提供程序` 和 `SqlRoleProvider`，它将通过提供程序接口按预期工作。\n\n`SqlRoleProvider`\
  \ 的功能相当简单，但对于大多数网站来说非常必要。用户与角色相关联，角色可以以各种方式用于授予或拒绝访问权限，以及定制网站的行为。\n\n##### 按角色控制访问\n\
  \n在网站使用了 `SqlMembershipProvider` 和 `SqlRoleProvider` 之后，您可能希望保护它。要完全锁定网站，您可以拒绝所有匿名用户的访问。在\
  \ ASP.NET 中，您可以在 `Web.config` 文件中使用 `authorization` 元素来实现。该元素包含 `deny` 或 `allow`\
  \ 元素，这些元素指定了您的身份验证要求，无论是基于角色、用户，还是已验证或匿名用户。清单 5-1 展示了如何锁定网站，使得只有经过身份验证的用户才能进入。\n\
  \n**清单 5-1.** 仅允许经过身份验证的用户\n\n```xml\n<authorization>\n  <deny users=\"?\"/>\n</authorization>\n\
  ```\n\n问号代表匿名用户。默认的身份验证是允许所有用户，无论其登录状态如何，如清单 5-2 所示。\n\n**清单 5-2.** 允许所有用户\n\n```xml\n\
  <authorization>\n  <allow users=\"*\" />\n</authorization>\n```\n\n您也可以组合使用这些指令，首先允许某些用户（可能通过角色），然后拒绝所有其他用户。您的访问控制规则还可以限制在特定位置。清单\
  \ 5-3 展示了一个必须放在主 `system.web` 配置部分之外的配置，因为 `location` 块不能被 `system.web` 节包含。通常，您将在主\
  \ `system.web` 配置中设置全局访问设置，然后紧接着添加额外的、限制性更强的规则。\n\n**清单 5-3.** 仅允许管理员用户\n\n```xml\n\
  <location path=\"Admin\">\n  <system.web>\n    <authorization>\n      <allow roles=\"\
  Admin\"/>\n      <deny users=\"*\"/>\n    </authorization>\n  </system.web>\n</location>\n\
  ```\n\n## 注意，并非所有内容都被保护！\n\n当添加授权要求以防止匿名账户访问您的页面时，您可能并未保护所有内容。您实际上只保护了映射到 .NET 运行时运行的\
  \ ASP.NET 资源。扩展名为 `.aspx`、`.asmx` 和 `.ashx` 等文件被映射到 .NET 运行时，但图片和文本文件则不然。那些不由 .NET\
  \ 运行时管理的文件也不受此授权机制的保护。通常，您的关键数据位于网页上，但如果您的 ASP.NET 应用程序生成包含关键数据的图片或其他文档到磁盘，请记住这一点。\n\
  \n然而，当您使用 Visual Studio 2005 时，您会发现所有资源都根据配置受到保护。这是因为开发 Web 服务器提供的所有内容都通过 .NET 运行时运行，它遵循\
  \ `Web.config` 中的设置。如果您确实希望保护您的文件，您可以选择将文件类型的扩展名专门映射到 .NET 运行时，或者为应用程序扩展部分中未专门映射的每个文件设置通配符应用程序映射。后一个选项可能会增加服务器的负载，因为\
  \ IIS 更适合提供静态图像文件，因此如果您希望保护生成的 Excel 文档，最好将 `.xls` 扩展名映射到 .NET 运行时。您可以复制 `.aspx`\
  \ 扩展名的映射。它引用以 `aspnet_isapi.dll` 结尾的 .NET 2.0 安装文件夹。\n\n授权机制有一个例外，那就是登录页面。必须允许此页面，以便表单身份验证可以授予用户访问权限。默认的身份验证模式是\
  \ `Windows`，但要使用 `SqlMembershipProvider` 和 `Login` 控件，您必须将其更改为 `Forms` 模式。您可以决定使用不同的页面，但\
  \ `Login.aspx` 是默认的。您还可以将超时时间从默认的 30 分钟更改为大约 2 周（20,160 分钟），并将其设置为使用可滑动过期，这样只要用户在两周内返回网站，她就保持登录状态。如清单\
  \ 5-4 所示的这个配置，对于门户或购物网站非常有用。\n\n**清单 5-4.** 登录页面配置\n\n<authentication mode=\"Forms\"\
  >\n\n<forms loginUrl=\"Login.aspx\"\n\nname=\".ASPXFORMSAUTH\"\n\ntimeout=\"20160\"\
  \n\nslidingExpiration=\"true\"/>\n\n</authentication>\n\n用户成功登录账户后，会被分配一个令牌，该令牌以\
  \ Cookie 的形式保存在客户端。此 Cookie 即被称为表单身份验证令牌。在清单 5-4 中，Cookie 名称为 `.ASPXFORMSAUTH`（这是默认名称）。该令牌是客户端与后端会员系统之间的连接纽带。\n\
  \n##### 按角色控制行为\n\n作为网站的管理员，你可能会将自己添加到一个名为 `Admin` 的角色中。在清单 5-5 中，可以看到如何使用 `Admin`\
  \ 角色来限制只有属于 `Admin` 角色的用户才能访问管理区域。当你登录网站时，可以显示指向管理区域的链接，而普通用户则看不到该链接。你只需检查当前用户是否在\
  \ `Admin` 角色中，并据此设置超链接的 `Visible` 属性。\n\n**清单 5-5.** 设置 AdminHyperLink 的可见性\n\n\
  ```\nprotected void Page_Load(object sender, EventArgs e)\n{\n    AdminHyperLink.Visible\
  \ = Roles.IsUserInRole(User.Identity.Name, \"Admin\");\n}\n```\n\n你可以更进一步利用这个机制。例如，在一个电商网站中，当客户首次购买时，你可能会将其添加到\
  \ `Customer` 角色，这将开始在其账户页面上显示订单历史和货运追踪等内容。如果你的电商网站与为网站提供产品的多个供应商合作，你可以将他们添加到 `Vendor`\
  \ 角色，并授权他们访问以更新库存数据和预计发货时间。\n\n请记住，所有角色信息都与你的应用程序数据一起存储在数据库中。虽然最好使用 `RoleProvider`\
  \ 来与此数据交互，但你也可以使用底层存储过程来与会员数据交互。对于电商网站，你可能希望每月运行一次报告，查找过去三个月内购买商品总额超过 1000 美元的所有用户。然后，你可以使用\
  \ `aspnet_UsersInRoles_AddUsersToRoles` 存储过程将他们添加到 `PreferredCustomer` 角色，使其有资格享受折扣和特别优惠。当订单进来时，你会记录订单的商品、数量和价格，但将处理工作留到当天晚些时候批量处理。那时，你可以验证用户是否在\
  \ `PreferredCustomer` 角色中，并使用 `aspnet_UsersInRole_IsUserInRole` 存储过程给予他折扣。回到网站上，该用户将开始在主页上看到其他人无法看到的特别优惠（希望能赢得用户的忠诚度），这一切都基于用户与特权角色的关联。\n\
  \n拥有这些可访问的存储过程的另一个优势是，许多平台都可以与 SQL Server 协同工作。你的公共网站可能运行的是 ASP.NET，但你的订单履行流程可能使用另一种无法直接使用\
  \ .NET 框架的语言或平台来实现。在关于面向服务架构（SOA）作为整合不同平台的手段的诸多讨论中，我认为数据库本身已经是一个极好的集成点。几年前我在构建一个网站时，团队中有几位开发人员使用另一个软件平台开发桌面应用程序，用于处理供应商申请和订单履行流程。我使用数据库作为在不同平台之间安全传递数据的方式。\n\
  \n由于存储过程对其他平台同样可用，我不必为让他们适应我正在构建的系统而做任何额外的工作。\n\n## SqlProfileProvider\n\nASP.NET\
  \ 配置文件提供程序向用户账户添加了额外的属性。我们在第 1 章中提到过这一点。`SqlProfileProvider` 的有趣之处在于，它不要求你必须同时使用\
  \ `MembershipProvider` 的实现。这似乎没什么意义，因为如果你可以自定义用户账户，却无法登录并恢复你的偏好设置。但这并不是 ASP.NET\
  \ 身份验证的工作方式。会员提供程序实际上只是表单身份验证之上的一个层，而表单身份验证已经存在好几年了。事实上，你可以直接使用表单身份验证完全实现一个会员系统，并且它与\
  \ `SqlProfileProvider` 兼容。你甚至可以在 `Web.config` 文件中存储用户名和密码，如清单 5-6 所示。\n\n**清单 5-6.**\
  \ Web.config 中的用户名和密码\n\n```\n<authentication mode=\"Forms\">\n  <forms loginUrl=\"\
  Login.aspx\"\n         name=\".ASPXFORMSAUTH\"\n         slidingExpiration=\"true\"\
  >\n    <credentials passwordFormat=\"Clear\">\n      <user name=\"admin\" password=\"\
  easy12guess\"/>\n      <user name=\"user\" password=\"abc123\"/>\n    </credentials>\n\
  \  </forms>\n</authentication>\n```\n\n这一切或许可以解释为什么会员、角色和配置文件接口似乎混杂在一起，有如此多的地方可以收集关于用户的必要信息。`MembershipUser`\
  \ 对象使用自 .NET 1.0 以来就存在的 `User` 对象。但是，尽管你可以在不使用 `MembershipProvider` 的情况下使用 `SqlProfileProvider`，但几乎没有理由这样做。\n\
  \n在使用 `SqlProfileProvider` 后，你需要做一个选择。你可以选择允许任何访问你网站的用户匿名维护其配置文件，或者不允许。这是一个常见功能，但有一些值得考虑的问题。\n\
  \n**注意：** 请记住，已经配置了默认提供程序，你在配置网站时需要先清除它们。否则，你会遇到意外行为。虽然可以配置和使用多个提供程序实现，但这并不常见。在配置网站时，以\
  \ `clear` 指令开始你的提供程序配置应该是第一步。\n\n## 为什么需要匿名配置文件？\n\n匿名配置文件可以像已验证的配置文件一样，存储与配置文件相关的自定义设置。即使重启\
  \ Web 浏览器，这些设置也会跟随用户。也许你希望允许新用户在要求她创建账户之前就使用你的网站。电商网站上的一个常见功能是允许用户匿名将商品添加到她的购物篮中，在她选择购买这些商品后，在结账过程中为她创建一个账户，这样她以后就可以返回、登录并访问她的订单状态或使用之前的账户信息下新订单。\n\
  \n越来越多的网站还提供一些小功能来定制其内容以适应用户，但这些微小的偏好设置并不值得用户在另一个网站上再创建一个账户。一个例子是 CNN 网站上的字体大小调整按钮，它允许你增大或减小页面上的文本大小（见图\
  \ 5-1）。当你在几天后返回时，CNN 网站会记住你的偏好。这个单一设置本可以单独保存为一个 Cookie，但当设置配置文件属性如此容易时，你就可以依赖匿名配置文件了。\n\
  \n**图 5-1.** CNN.com 的字体大小调整\n\n\n您还可以利用匿名配置文件来跟踪用户行为，将其操作记录至数据库。每当用户返回网站时，系统将记录此次访问。当用户深入浏览某个栏目并查看具体文章时，您也可以记录该细节。后续可分析所有这些数据，从而掌握访问网站的用户画像。或许您之后会将用户细分为七个群体，将长期用户分配到其中一个群体，并开始主动调整网站的功能、内容和广告以适应这些群体。\n\
  \n##### 配置匿名配置文件\n\n匿名配置文件默认未启用，因此您需要将该设置添加到配置中（参见清单 5-7）。\n\n**清单 5-7.** 启用匿名配置文件\n\
  \n```\n<anonymousIdentification\n    enabled=\"true\"\n    cookieName=\".ASPXANONYMOUS\"\
  \n    cookieTimeout=\"144000\"\n    cookieSlidingExpiration=\"true\"/>\n```\n\n\
  此配置为匿名会话设置了 100 天的超时时间，并启用滑动过期。如果打算启用匿名配置文件，您需要权衡其利弊。虽然让成千上万的匿名配置文件用户在考虑是否购买商品时使用您的商务网站将商品添加到购物篮系统会带来好处，但让所有这些匿名配置文件占用数据库空间也会产生成本。\n\
  \n##### 管理匿名配置文件\n\n如果将超时时间设置为四周并启用滑动过期窗口，您可以认为四周内没有任何活动的匿名账户已不活跃，因为用户将无法重新连接到该配置文件。识别出这些非活动配置文件后，您可以从系统中清除它们。如果某些配置文件未存储重要数据，甚至可以更早清除部分配置文件。您会发现搜索引擎和其他自动化程序生成了大量匿名会话。这类匿名配置文件将构成数据库中配置文件的很大一部分。\n\
  \n您可以编写查询来识别数据库中的配置文件，并编写脚本来清除这些配置文件，但幸运的是，`Membership API` 已预见到此需求，因此您无需完成所有这些工作。\n\
  \n清单 5-8 展示了 `Web Form` 上一个按钮的事件处理程序。它可以放置在网站管理部分某个页面的后台代码中。当您想要清除非活动配置文件时，可以使其执行以下代码行。\n\
  \n**清单 5-8.** 使用 `Button1` 删除非活动配置文件\n\n```\nprotected void Button1_Click(object\
  \ sender, EventArgs e)\n{\n    ProfileManager.DeleteInactiveProfiles(\n        ProfileAuthenticationOption.Anonymous,\n\
  \        DateTime.Now.AddMonths(-1));\n}\n```\n\n此代码删除过去一个月内没有任何活动的所有匿名配置文件。`ProfileAuthenticationOption`\
  \ 枚举还包括 `Authenticated` 或 `All` 值，以便您能够删除任何配置文件。这仍然是手动过程。最好安排脚本在每晚运行，以维持一个滚动窗口，持续删除所有非活动配置文件。当\
  \ `MembershipProvider` 以 `SQL Server` 为后端时，您可以利用 `SqlMembershipProvider` 调用的存储过程\
  \ `aspnet_Profile_DeleteInactiveProfiles`。您必须传入应用程序名称、配置文件选项以及配置文件处于活动状态以来的日期。配置文件选项\
  \ `0` 表示匿名，`1` 表示已认证，`2` 表示两种配置文件类型。清单 5-9 展示了删除非活动配置文件的代码。\n\n**清单 5-9.** 使用 T-SQL\
  \ 删除非活动配置文件\n\n```\nDECLARE @PurgeDate DATETIME\nSET @PurgeDate = DATEADD(DAY, -60,\
  \ GETDATE())\nEXEC aspnet_Profile_DeleteInactiveProfiles 'appName', 0, @PurgeDate\n\
  ```\n\n将此脚本设置为每晚运行，应能保持您的数据库清除不必要的配置文件数据。脚本设置为回溯 60 天，但 14 天可能更合适。\n\n\n\n8601Ch05CMP3\
  \ 8/27/07 8:05 AM Page 121\n\n"
- "# 第 5 章 ■ SQL 提供程序\n\n121\n\n## 匿名与认证配置文件的差异\n\n匿名会话的超时设置可以与认证会话的超时设置不同，但这并非唯一的区别。正如第一章所讨论的，可以设定自定义属性要求使用已认证的配置文件。将匿名配置文件属性保持在最低限度，有助于减小数据库中匿名配置文件数据的大小。用于记录字体大小和配置文件组的自定义属性如清单\
  \ 5-10 所示。\n\n### 清单 5-10. 自定义配置文件属性\n\n```\n<properties>\n<add name=\"FontSize\"\
  \ type=\"String\" allowAnonymous=\"true\" defaultValue=\"10\" />\n<add name=\"ProfileGroup\"\
  \ type=\"String\" allowAnonymous=\"false\" />\n</properties>\n```\n\n## 从匿名迁移到认证\n\
  \n当用户创建账户或登录您的网站时，该用户将随身携带其匿名配置文件。对应的 Cookie 仍会设置在其浏览器中，与该匿名配置文件关联的值也仍会存在于您的数据库中。我通常希望做的是移除该\
  \ Cookie，并向前复制所有合理的值。\n\n在第一章中，我解释了如何使用来自已认证或匿名配置文件的 Guid 值来管理与购物篮的关联。但是，当用户确实从不同的计算机访问站点，向匿名篮中添加商品，然后在购买时最终登录，我并不希望丢失匿名篮中放置的商品。为了将这些篮中商品转移到已认证的账户，我处理了\
  \ `Profile_MigrateAnonymous` 事件，这是 `Global.asax` 中的一个全局应用程序事件。\n\n但我并非盲目地用匿名篮替换已认证篮。有必要通过添加商品来合并篮子。如果用户前一天在家登录该账户并向篮中添加了几件商品，然后第二天在工作时又向一个全新的匿名篮中添加了更多商品，该用户实际上会有两个篮子。登录时，`Profile_MigrateAnonymous`\
  \ 事件触发，我只是简单地将匿名篮中的商品添加到已认证篮中，并显示合并后的篮子。\n\n另一种选择是，要么完全忽略匿名篮中的商品，要么用匿名篮替换已认证篮。将商品从匿名篮移动到已认证篮是理想的选择。\n\
  \n有时，您的配置文件可能包含无法用这种方式处理的数据。字体大小偏好的简单示例展示了当您首次创建配置文件时选择了一个大小，而当您从另一台计算机登录时，您可能不希望仅用匿名值覆盖已认证的配置文件值。例外情况可能是，如果已认证的值被设为默认值，而匿名值不是默认值。在这种情况下，为了保持用户在继续使用网站时的一些一致性，接收该值可能是有帮助的。清单\
  \ 5-11 中的代码在 `Global.asax` 中处理 `Profile_MigrateAnonymous` 事件以迁移 `FontSize` 属性，然后删除匿名配置文件的所有痕迹。\n\
  \n![Image 19](img/index-129_1.png)\n\n8601Ch05CMP3 8/27/07 8:05 AM Page 122\n\n\
  122\n\n第 5 章 ■ SQL 提供程序\n\n### 清单 5-11. 迁移匿名配置文件\n\n```\nvoid Profile_MigrateAnonymous(object\
  \ sender, ProfileMigrateEventArgs e)\n{\n    ProfileCommon anonymousProfile = Profile.GetProfile(e.AnonymousID);\n\
  \    string defaultFontSize = \"10\";\n    if (defaultFontSize.Equals(Profile.FontSize)\
  \ &&\n        !defaultFontSize.Equals(anonymousProfile.FontSize))\n    {\n     \
  \   Profile.FontSize = anonymousProfile.FontSize;\n    }\n    // 删除匿名用户、配置文件和 Cookie\n\
  \    Membership.DeleteUser(e.AnonymousID, true);\n    ProfileManager.DeleteProfile(e.AnonymousID);\n\
  \    AnonymousIdentificationModule.ClearAnonymousIdentifier();\n}\n```\n\n\n\n代码清单\
  \ 5-11 的最后几行清理了数据库，使其不会被那些匿名账户弄得杂乱不堪。我已观察到，留下匿名 cookie 标识符会导致每次页面请求时都触发`Profile_MigrateAnonymous`事件。因此，移除匿名配置文件不仅能使数据库保持整洁，还能防止这个事件被不必要地触发。\n\
  \n##### 创建用户\n\n使用`Membership`API 创建账户的控件是`CreateUserWizard`。它高度可定制。除了定制，你甚至可以完全接管流程，使用你自己的\
  \ Web 窗体，并只与`Membership`API 交互来创建用户。这涉及更多工作，而考虑到我们追求生产力的目标，你可能希望避免这样做。与其从头开始创建你自己的控件，不如简单地向`CreateUserWizard`添加一个步骤。\n\
  \n对于你的配置文件，你希望允许用户为网站选择一个主要兴趣，以及用户偏好的字体大小（如代码清单 5-10 中自定义属性`ProfileGroup`和`FontSize`所定义）。匿名用户不允许使用`ProfileGroup`。要定制`CreateUserWizard`，你首先需要向该向导添加一个步骤（参见图\
  \ 5-2）。\n\n### 图 5-2. 向向导添加一个步骤\n\n对于此定制，你希望将你的向导步骤放在三步序列的开始。你的步骤将询问用户对于自定义配置文件属性的偏好。第二步将询问所有必需的配置文件信息，最后一步将显示新用户配置文件已创建的确认信息。使用代码清单\
  \ 5-12 中的标记来创建定制控件。\n\n### 代码清单 5-12. 定制后的 CreateUserWizard\n\n```aspx\n<%@ Control\
  \ Language=\"C#\" AutoEventWireup=\"true\"\nCodeFile=\"CreateCustomUserControl.ascx.cs\"\
  \nInherits=\"Controls_CreateCustomUserControl\" %>\n\n<asp:CreateUserWizard ID=\"\
  CreateUserWizard1\" runat=\"server\"\nOnCreatedUser=\"CreateUserWizard1_CreatedUser\"\
  \nContinueDestinationPageUrl=\"~/Default.aspx\">\n    <WizardSteps>\n        <asp:WizardStep\
  \ runat=\"server\" Title=\"Primary Interest\">\n            <b>选择您的主要兴趣:</b><br\
  \ />\n            <asp:RadioButtonList ID=\"rblPrimaryInterest\" runat=\"server\"\
  >\n                <asp:ListItem Selected=\"True\" Value=\"1\">体育</asp:ListItem>\n\
  \                <asp:ListItem Value=\"2\">政治</asp:ListItem>\n                <asp:ListItem\
  \ Value=\"3\">天气</asp:ListItem>\n                <asp:ListItem Value=\"4\">商业</asp:ListItem>\n\
  \                <asp:ListItem Value=\"5\">娱乐</asp:ListItem>\n            </asp:RadioButtonList>\n\
  \            <p>\n                请在下方选择您认为最易阅读的字体大小。\n            </p>\n      \
  \      <table><tr><td>\n                <b>示例大小:</b>\n                <div style=\"\
  font-size: 10px;\">小号字体</div>\n                <div style=\"font-size: 12px;\">常规字体</div>\n\
  \                <div style=\"font-size: 14px;\">大号字体</div>\n            </td><td>\n\
  \                <asp:RadioButtonList ID=\"rblFontSize\" runat=\"server\">\n   \
  \                 <asp:ListItem Value=\"10\">小</asp:ListItem>\n                \
  \    <asp:ListItem Selected=\"True\" Value=\"12\">常规</asp:ListItem>\n          \
  \          <asp:ListItem Value=\"14\">大</asp:ListItem>\n                </asp:RadioButtonList>\n\
  \            </td></tr></table>\n        </asp:WizardStep>\n        <asp:CreateUserWizardStep\
  \ runat=\"server\">\n        </asp:CreateUserWizardStep>\n        <asp:CompleteWizardStep\
  \ runat=\"server\">\n        </asp:CompleteWizardStep>\n    </WizardSteps>\n</asp:CreateUserWizard>\n\
  ```\n\n持有你想要使用的值的控件位于单选按钮列表`rblPrimaryInterest`和`rblFontSize`中。当`CreatedUser`事件触发时，你将获取它们的值（参见代码清单\
  \ 5-13）。\n\n### 代码清单 5-13. CreatedUser 事件处理器\n\n```csharp\nprotected void CreateUserWizard1_CreatedUser(object\
  \ sender, EventArgs e)\n{\n    Profile.FontSize = rblFontSize.SelectedValue;\n \
  \   Profile.ProfileGroup = rblPrimaryInterest.SelectedValue;\n}\n```\n\n现在，你可以使用`ProfileGroup`的值来向用户展示更符合其需求的内容，并以他们偏好的字体大小显示。但你可能想要直接获取这些数据。这可能有些棘手。\n\
  \n## 动态配置文件和作为 BLOB 的配置文件\n\n要获取配置文件数据之所以棘手，有两个原因。首先，数据以一种无法通过简单数据库查询直接访问的格式进行序列化。其次，你无法创建一个命令行实用程序来读取配置文件数据并将其作为计划作业在夜间运行以执行用户分析任务，因为你需要\
  \ ASP.NET 动态编译器来生成用户配置文件。\n\n关于数据序列化，示例属性将存储在`aspnet_Profile`表的`PropertyNames`和`PropertyValues`列中，如表\
  \ 5-3 所示。\n\n### 表 5-3. 序列化的配置文件属性\n\n| PropertyNames | PropertyValues |\n| ---\
  \ | --- |\n| `FontSize:S:0:2:ProfileGroup:S:2:1:` | |\n\n在`PropertyNames`中，它以冒号分隔列出了名称、类型、起始索引和长度。在`PropertyValues`中，你可以使用`PropertyNames`推导出\
  \ 14 是`FontSize`，3 是`ProfileGroup`。这种结构是为了优化大小以及单配置文件访问而设计的，并非用于聚合分析。如果你想处理这些数据，你将需要编写一个相当复杂的存储过程。另一种方法是依赖.NET\
  \ 类，它们已经能够反序列化这些数据。\n\n这就引出了处理这些数据棘手的第二个原因。ASP.NET 动态编译器使用一个构建提供程序，该提供程序读取`Web.config`文件中的设置并在内存中生成`Profile`对象。这就是为什么在\
  \ Visual Studio 中你能看到自定义属性的智能感知支持。目前，这个动态编译器不适用于类库。而如果你将代码放在网站的`App_Code`文件夹中，你会发现你同样无法访问这些动态值。\n\
  \n这让我们回到了使用 ASP.NET 运行时通过配置文件来访问这些值，你可以在 Web 窗体内使用它们。为了获得可用的数据，你只需遍历每个已认证的账户，并生成一个包含所有配置文件数据的逗号分隔值（CSV）导出文件，这些数据你可以像人们多年来使用\
  \ CSV 文件那样进行解析和使用。代码清单 5-14 包含将配置文件数据导出为 CSV 下载的代码。\n\n### 代码清单 5-14. 配置文件导出器\n\n\
  ```csharp\nusing System;\nusing System.Web.Profile;\nusing System.Web.UI;\n\npublic\
  \ partial class ProfilesExporter : Page\n{\n    protected void Page_Load(object\
  \ sender, EventArgs e)\n    {\n        Response.AddHeader(\"content-disposition\"\
  ,\n            \"attachment; filename=CustomProfiles.csv\");\n        Response.ContentType\
  \ = \"text/csv\";\n\n        ProfileInfoCollection profiles =\n            ProfileManager.GetAllProfiles(\n\
  \                ProfileAuthenticationOption.Authenticated);\n\n        foreach\
  \ (ProfileInfo profile in profiles)\n        {\n            ProfileCommon pc = Profile.GetProfile(profile.UserName);\n\
  \            Response.Write(String.Format(\"{0},{1},{2}\\n\", pc.UserName, pc.FontSize,\
  \ pc.ProfileGroup));\n        }\n        Response.End();\n    }\n}\n```\n\n请注意，代码清单\
  \ 5-14 中的代码添加了`content-disposition`头，它强制下载并定义了一个以`.csv`扩展名结尾的文件名。如果没有这个头，文件很可能会尝试使用`ProfilesExporter.aspx`作为文件名。你可以修改文件名以包含时间戳，这样就能将其与每日更新的数据副本区分开来。\n\
  \n有了这个 CSV 数据，你将能更轻松地进行分析。除了导出到 CSV 文件，你还可以调整这个 Web 窗体，将数据插回到你为数据分析目的而创建的数据库表中。这里使用的方法是为了快速运行而构建的。相比之下，读写数据会减慢数据库速度并延长导出运行时间。\n\
  \n\n\n`SqlProfileProvider`所使用的 BLOB 存储机制导致许多开发者创建了自己的替代方案。我的做法是创建自己的一组表，并以用于标识用户的`Guid`作为键。你也可以使用由郝昆（Hao\
  \ Kung）创建的`SqlTableProfileProvider`。他是微软 ASP.NET 团队的工程师之一。他整合了一个提供程序实现来解决 BLOB 问题。在\
  \ Windows Live (`http://www.live.com`) 上快速搜索 `SqlTableProfileProvider` 就能直接找到下载页面。\n\
  \n8601Ch05CMP3 8/27/07 8:05 AM Page 126\n\n126\n\n"
- "# 第 5 章 ■ SQL 提供程序\n\n## 使用由提供程序驱动的 ASP.NET 控件\n\n现在，你已经为网站配置了用户登录所需的所有成员功能。`Login`控件可以轻松处理这一点。这个过程充满了安全性，建立在多年的遗留技术之上。尽管`Membership`\
  \ API 和提供程序模型对 ASP.NET 来说是新的，但验证用户身份和维护用户会话的机制从 ASP.NET 诞生之初就已存在。当用户成功登录你的网站时，她会获得一个令牌，该令牌作为\
  \ Cookie 存储在她的 Web 浏览器中。这个令牌就像一把钥匙，让她能够访问网站的受保护区域和定制区域。\n\n身份验证令牌是一个加密的`FormsAuthenticationTicket`，它保存着用户名、会话过期时间以及其他数据，包括自定义用户数据。\n\
  \n在下面的场景中，我将展示如何利用这些自定义用户数据来提高已验证会话的安全性，并演示 ASP.NET 中身份验证系统的灵活性。\n\n在这个示例场景中，你正在使用一个银行网站，并在工作时查看你的余额。你被短暂叫走，但没想到锁定电脑。一位不诚实的同事偷偷使用你的电脑，复制了用于验证你与银行会话的\
  \ Cookie。这个 Cookie 至少不是包含你账号的明文值（否则任何时间都能访问你的账户），而是一个加密的`FormsAuthenticationTicket`形式，其中包含过期时间和令牌颁发日期。这意味着这位不诚实的同事只有有限的时间可以使用该\
  \ Cookie。\n\n对于采用滑动过期的会话，这位同事所能做的是将 Cookie 放入浏览器，这将不断更新过期时间。但它不会改变的是保存在服务器上的最后登录日期。如果你的银行网站非常安全，该网站可能会在允许你执行任何真正重要的操作（例如安排付款或转账到他人账户）之前检查你的最后登录时间。在网站允许你进行这些操作之前，它可以检查你是否在交易发生的几分钟内登录过，如果你没有，则要求你提供密码。即使你已经通过验证，你也可以重新登录，这样做会重置最后登录时间。这个要求将阻止你的同事完成此类操作，因为他只有\
  \ Cookie，只能对你的账户进行基本访问。但要让该同事获得执行交易的访问权限，只需等你回到电脑前并再次登录银行网站即可。如果在令牌中存储你的 IP 地址，以便网站可以验证你最近是从那台计算机登录的，这将会很有帮助。这正是你要使用自定义用户数据的地方。\n\
  \n登录过程可以调整，以便将远程地址作为用户数据插入到`FormsAuthenticationTicket`中。只需将`Login`控件拖放到 Web 窗体的设计界面。然后为`Authenticate`事件创建一个处理程序。清单\
  \ 5-15 中的代码处理该事件，并将用户的远程地址插入到票据中，该地址可用于在用户每次返回网站时验证其位置。\n\n\n\n### 第 5 章：SQL 提供程序\n\
  \n## 清单 5-15：登录认证事件处理器\n\n```csharp\nprotected void Login1_Authenticate(object sender,\
  \ System.Web.UI.WebControls.AuthenticateEventArgs e)\n{\n    if (Membership.ValidateUser(Login1.UserName,\
  \ Login1.Password))\n    {\n        e.Authenticated = true;\n        string username\
  \ = Login1.UserName;\n        bool persist = Login1.RememberMeSet;\n        int\
  \ timeout = GetLoginTimeout();\n        string userData = \"remoteAddress=\" + Request.UserHostAddress;\n\
  \        FormsAuthenticationTicket ticket = new FormsAuthenticationTicket(1, username,\
  \ DateTime.Now, DateTime.Now.AddMinutes(timeout), persist, userData);\n        string\
  \ encTicket = FormsAuthentication.Encrypt(ticket);\n        HttpCookie cookie =\
  \ new HttpCookie(FormsAuthentication.FormsCookieName, encTicket);\n        cookie.Expires\
  \ = ticket.Expiration;\n        Response.Cookies.Add(cookie);\n        Response.Redirect(FormsAuthentication.GetRedirectUrl(username,\
  \ persist), true);\n    }\n    else\n    {\n        e.Authenticated = false;\n \
  \   }\n}\n```\n\n为了获取为用户会话配置的超时时间，我创建了一个方法，用于从 `Web.config` 中读取配置的值，如清单 5-16 所示。\n\
  \n## 清单 5-16：GetLoginTimeout 方法\n\n```csharp\nprivate int GetLoginTimeout()\n{\n\
  \    AuthenticationSection authSection = ConfigurationManager.GetSection(\"system.web/authentication\"\
  ) as AuthenticationSection;\n    if (authSection != null && authSection.Forms !=\
  \ null)\n    {\n        return authSection.Forms.Timeout.Minutes;\n    }\n    //\
  \ 返回默认值\n    return 30;\n}\n```\n\n现在票据中有了这个值，你可以在用户即将执行比典型页面请求更关键的操作（例如进行银行转账或更改密码）时进行检查。清单\
  \ 5-17 中的方法会检查远程地址。\n\n## 清单 5-17：IsRemoteAddressMatched 方法\n\n```csharp\nprivate\
  \ bool IsRemoteAddressMatched()\n{\n    if (User.Identity.IsAuthenticated)\n   \
  \ {\n        FormsIdentity identity = User.Identity as FormsIdentity;\n        if\
  \ (identity != null)\n        {\n            string prefix = \"remoteAddress=\"\
  ;\n            if (!String.IsNullOrEmpty(identity.Ticket.UserData) && identity.Ticket.UserData.IndexOf(prefix)\
  \ == 0)\n            {\n                string remoteAddress = identity.Ticket.UserData.Substring(prefix.Length);\n\
  \                return Request.UserHostAddress.Equals(remoteAddress);\n       \
  \     }\n        }\n    }\n    return false;\n}\n```\n\n清单 5-17 中的方法从用户身份中提取票据，然后获取远程地址的值。最后，它将存储的值与页面请求中的实际值进行比较。这个额外的检查有助于增强安全性。\n\
  \n然而，你可以更进一步。也许你想让用户选择将其当前位置保存为可信位置，以便当他来自该位置时，安全性可以放宽。例如，如果他出差并从酒店房间登录，登录过程可能会要求他提供不仅仅是用户名和密码。它可能会要求提供社会安全号码的后四位数字和家庭邮政编码。通过授权可信位置，你将能够记录和分析从新添加位置发生的交易。这种方法得到了增强，因为家庭宽带连接倾向于在较长时间内保持相同的\
  \ IP 地址，因此这个远程地址不会经常改变。\n\n### 通过 IP 地址确定物理位置\n\n存在一些称为 `GeoIP` 的服务，它们可以告诉你 IP 地址的物理位置。允许用户从可信的物理位置（而不仅仅是一个\
  \ IP 地址）在其账户上执行某些操作，可以增强安全性，同时也使用户更方便。如果你的用户在芝加哥生活和工作，当你知道她是从该位置登录时，可以授予她更高信任级别。然而，如果她下午\
  \ 1:00 在芝加哥登录，而有人在下午 1:40 从洛杉矶登录，你可以假设发生了意外情况，将账户标记为待审查，并提醒用户注意这一不明活动。\n\n`GeoIP`\
  \ 试图为每个 IP 地址确定一个物理位置，但它并不总是准确的——就像你不能总是在电话簿中查到某人的电话号码一样。你也可以使用按国家分配的 IP 地址块。例如，韩国的\
  \ IP 地址范围从 `210.220.128.0` 到 `210.223.255.255`。即使你无法确定用户是否在芝加哥，你也可以确定该用户是从韩国、中国、俄罗斯还是其他国家访问网站。\n\
  \n### 在 Web 场中使用共享的机器密钥\n\n当将多个 Web 服务器放入一个场中以分担高流量网站的负载时，有必要使用机器密钥设置，该设置通常对服务器是唯一的。此配置设置包括验证密钥和解密密钥，用于哈希处理和解密。表单身份验证令牌使用这些值，如果机器密钥在服务器之间不一致，当用户会话在服务器之间跳跃时，你将遇到身份验证问题。使用粘性会话可以部分避免此问题，但在用户离开较长时间后，他可能会失去与负载均衡器的粘性会话，并访问具有不同机器密钥值（这些值将不兼容）的不同服务器。\n\
  \n其他数据也受机器密钥保护，例如 `ViewState`，它被加密以防止篡改。如果用户使页面空闲很长时间，然后导致 `PostBack`，该用户可能会因为这种跨服务器不兼容性而遇到异常。\n\
  \n机器密钥在 `Web.config` 文件中配置，并且必须生成。尽管 Microsoft 不提供生成这些值的实用工具，但 MSDN 文档解释了如何操作。可以在诸如代码项目网站（The\
  \ Code Project）之类的网站上找到多个执行此操作的实用工具，该网站有一个实用工具，恰当地命名为 ASP.NET `machineKey 生成器`。\n\
  \n#### 构建 SQL 相册提供程序\n\n除了标准提供程序之外，你还可以创建自己的自定义提供程序以满足特定需求。在构建自己的提供程序时，你可以让它与标准提供程序的接口交互，以实现无缝集成。创建自己的自定义提供程序允许多种实现。对于内部应用程序，可能不需要不止一种实现，至少最初是这样。\n\
  \n你可以构建一个由多个应用程序使用的组件。如果你使用提供程序模型来构建它，你就允许多种实现。此组件可以与自定义订单履行系统交互。后来，你的公司可能会购买一个处理相同功能的订单履行系统套件。你不必将应用程序与这个新套件紧密耦合，而是可以为其创建一个提供程序实现。将应用程序迁移到它只需调整配置即可。\n\
  \n相同的场景可以应用于组件的内部版本。自定义提供程序的第一次实现可能与一组复杂的底层依赖项交互。也许你有一座难以维护的遗留代码山，但你和你的团队正在清理它以提高可维护性。之后，随着代码库的重构，你可以创建一个使用更新系统的新实现。构建在提供程序之上的应用程序不必更改。\n\
  \n对程序集进行版本控制也可以实现类似的解决方案。提供程序的不同之处在于，你不是直接针对实现或版本编译应用程序。相反，你将提供程序用作一个抽象层，它将使用配置来实例化所需的程序集。这样做还可以避免将一个程序集直接绑定到另一个程序集的特定版本。\n\
  \n\n### 第 5 章：SQL 提供程序\n\n##### 提供程序要求\n\n一个提供程序由三个核心部分组成：抽象提供程序、至少一个提供程序实现，以及用于加载该实现的配置。对于一个从头开始构建的自定义提供程序，你需要额外的代码来加载配置并让你能够访问提供程序实现。如果你是要实现某个现有提供程序（例如\
  \ `MembershipProvider`）的自定义实现，那么你可以使用已有的加载机制，只需创建你的提供程序实现类即可。\n\n开始使用一个新提供程序时，首先要实现的两个类是配置类和提供程序集合类。为了便于加载提供程序，有一整套基础设施来支持这个过程。使用以下类可以加速创建提供程序的过程。\n\
  \n##### 配置节类\n\n如果你查看 `Machine.config` 文件中对成员资格的引用，你会看到一个引用 `MembershipSection`\
  \ 类型的节定义，`MemerbershipProvider` 使用这个类来读取其配置。这个类继承自 `ConfigurationSection` 类，你将使用它来创建你自己的\
  \ `PhotoAlbumSection` 类，从代码清单 5-18 开始。\n\n**代码清单 5-18.** *PhotoAlbumSection.cs*\n\
  \n```csharp\nusing System.Configuration;\n\nnamespace Chapter04.PhotoAlbumProvider\n\
  {\n    public class PhotoAlbumSection : ConfigurationSection\n    {\n        [ConfigurationProperty(\"\
  providers\")]\n        public ProviderSettingsCollection Providers\n        {\n\
  \            get { return (ProviderSettingsCollection)base[\"providers\"]; }\n \
  \       }\n\n        [StringValidator(MinLength = 1)]\n        [ConfigurationProperty(\"\
  defaultProvider\", DefaultValue = \"SqlPhotoAlbumProvider\")]\n        public string\
  \ DefaultProvider\n        {\n            get { return (string)base[\"defaultProvider\"\
  ]; }\n            set { base[\"defaultProvider\"] = value; }\n        }\n    }\n\
  }\n```\n\n`Providers` 属性加载 providers 子元素，而 `DefaultProvider` 属性加载 `defaultProperty`\
  \ 属性的值。此时实际上不需要做太多工作，因为提供程序基础设施处理了很大一部分工作。\n\n仅为 `ProviderSettingsCollection` 类型创建一个属性，就足以使这个\
  \ `AlbumSection` 类像标准提供程序那样，充当一个提供程序配置节。标准提供程序在配置的 `providers` 元素内包含 `add`、`remove`\
  \ 和 `clear` 指令。`Providers` 属性会自动处理这些配置元素。\n\n##### 提供程序集合类\n\n因为你可以配置一个提供程序的多个实例，所以你会希望有一个集合来容纳它们。为此，你将创建一个名为\
  \ `PhotoAlbumProviderCollection` 的类，它将继承 `ProviderCollection` 并重写其行为以使用 `PhotoAlbumProvider`\
  \ 类型，而不是泛型的 `Provider` 类型。该类如代码清单 5-19 所示。\n\n**代码清单 5-19.** *PhotoAlbumProviderCollection.cs*\n\
  \n```csharp\nusing System;\nusing System.Configuration.Provider;\n\nnamespace Chapter04.PhotoAlbumProvider\n\
  {\n    public class PhotoAlbumProviderCollection : ProviderCollection\n    {\n \
  \       public new PhotoAlbumProvider this[string name]\n        {\n           \
  \ get { return (PhotoAlbumProvider)base[name]; }\n        }\n\n        public override\
  \ void Add(ProviderBase provider)\n        {\n            if (provider == null)\n\
  \                throw new ArgumentNullException(\"provider\");\n            if\
  \ (!(provider is PhotoAlbumProvider))\n                throw new ArgumentException(\"\
  Invalid provider type\", \"provider\");\n            base.Add(provider);\n     \
  \   }\n    }\n}\n```\n\n有了你自己定制的提供程序基础设施，你就准备好开始定义 `PhotoAlbumProvider` 了。\n\n#####\
  \ 抽象提供程序类\n\n\n"
- "# 抽象提供程序\n\n抽象提供程序是直接继承 `ProviderBase` 类的类，所有提供程序都构建于该基类之上。这个基类为所有提供程序定义了基本的支持规范，包括\
  \ `Name` 和 `Description` 属性，以及 `Initialize` 方法（该方法在提供程序首次加载到应用程序中时被调用）。这些属性和方法都使用\
  \ `virtual` 特性声明，因此你可以重写它们，但通常你只需重写 `Initialize` 方法。\n\n在抽象提供程序中，你可以保持 `Initialize`\
  \ 方法不变，留给具体的提供程序实现去处理，但你可能希望为提供程序的所有实现添加一个或多个通用属性，例如一个 `Enabled` 属性。你应该在抽象提供程序中完成这个操作。\n\
  \n现在，你要开始添加抽象属性和方法声明，以定义你的服务契约，所有实现都必须履行这个契约。对于 `PhotoAlbumProvider`，这些声明包括插入、更改和删除与相册和照片相关的数据的方法。\n\
  \n## 清单 5-20. `PhotoAlbumProvider.cs`\n\n```csharp\nusing System;\nusing System.Collections.Generic;\n\
  using System.Configuration.Provider;\n\nnamespace Chapter04.PhotoAlbumProvider\n\
  {\n    /// <summary>\n    /// Photo Album Provider\n    /// </summary>\n    public\
  \ abstract class PhotoAlbumProvider : ProviderBase\n    {\n        #region \" Abstract\
  \ Methods \"\n\n        /// <summary>\n        /// Gets albums for a user\n    \
  \    /// </summary>\n        public abstract List<Album> GetAlbums(string userName);\n\
  \n        /// <summary>\n        /// Gets photos for an album\n        /// </summary>\n\
  \        public abstract List<Photo> GetPhotosByAlbum(Album album);\n\n        ///\
  \ <summary>\n        /// Creates an album\n        /// </summary>\n        public\
  \ abstract Album AlbumInsert(string userName, string albumName, bool active, bool\
  \ shared);\n\n        /// <summary>\n        /// Creates a photo\n        /// </summary>\n\
  \        public abstract Photo PhotoInsert(Album album, string photoName, DateTime\
  \ photoDate, String regularUrl, int regularWidth, int regularHeight, String thumbnailUrl,\
  \ int thumbnailWidth, int thumbnailHeight, bool active, bool shared);\n\n      \
  \  /// <summary>\n        /// Updates an album\n        /// </summary>\n       \
  \ public abstract void AlbumUpdate(Album album);\n\n        /// <summary>\n    \
  \    /// Updates a photo\n        /// </summary>\n        public abstract void PhotoUpdate(Photo\
  \ photo);\n\n        /// <summary>\n        /// Deletes an album\n        /// </summary>\n\
  \        public abstract void AlbumDeletePermanent(Album album);\n\n        ///\
  \ <summary>\n        /// Deletes album permanently\n        /// </summary>\n   \
  \     public abstract void PhotoDeletePermanent(Photo photo);\n\n        /// <summary>\n\
  \        /// Moves an album\n        /// </summary>\n        public abstract void\
  \ AlbumMove(Album album, string sourceUserName, string destinationUserName);\n\n\
  \        /// <summary>\n        /// Moves a photo\n        /// </summary>\n    \
  \    public abstract void PhotoMove(Photo photo, Album sourceAlbum, Album destinationAlbum);\n\
  \n        #endregion\n    }\n}\n```\n\n`PhotoAlbumProvider` 中的抽象方法定义了提供程序将支持的完整范围。\n\
  \n##### 提供程序实现\n\n对于提供程序的具体实现，你可能需要读取更多的配置设置。一个 SQL 实现肯定会使用一个名为 `connectionStringName`\
  \ 的配置属性，就像 `SqlMembershipProvider` 和 `SqlProfileProvider` 那样。当你准备初始化提供程序时，你需要验证将要使用的数据。首先检查\
  \ `config` 参数是否为 null，如果是则抛出 `ArgumentNullException` 异常。然后确保 `Name` 和 `Description`\
  \ 这些核心属性已经设置，以便 `ProviderBase` 可以使用它们。描述可能未定义，因此你可以在未定义时为其赋予一个默认值。然后，你需要调用基类上的 `Initialize`\
  \ 方法，在本例中基类是 `PhotoAlbumProvider`。这最终会调用 `ProviderBase` 中的 `Initialize` 方法，该方法将为\
  \ `Name` 和 `Description` 属性加载这些配置值。\n\n\n\n接下来，你将仅处理与此实现相关的配置值，即 `connectionStringName`\
  \ 属性。同样，你需要确保该属性已定义，并且它与连接字符串配置中的某个连接字符串相关联。如果一切就绪，你可以用它来初始化在整个类中使用的数据库连接。最后，你需要检查是否已处理所有配置属性，并且没有意外包含额外的属性。当你使用每个配置值时，将其从集合中移除，这样最终应该一个不剩。如果确实发现仍有属性残留，你可以抛出一个异常，提示提供了无法识别的属性。这看起来可能有点严格，但它能帮助你发现配置中拼写错误的属性，否则可能被忽略，从而导致提供程序出现无法解释的行为。清单\
  \ 5-21 展示了 SQL 实现是如何初始化的。\n\n### 清单 5-21. `SqlPhotoAlbumProvider.cs` 的初始化方法\n\n\
  ```\npublic override void Initialize(string name, NameValueCollection config)\n\
  {\n    if (config == null)\n    {\n        throw new ArgumentNullException(\"config\"\
  );\n    }\n    if (String.IsNullOrEmpty(name))\n    {\n        name = \"SqlPhotoAlbumProvider\"\
  ;\n    }\n    if (String.IsNullOrEmpty(config[\"description\"]))\n    {\n      \
  \  config.Remove(\"description\");\n        config.Add(\"description\", \"SQL Photo\
  \ Album Provider\");\n    }\n    base.Initialize(name, config);\n    if (config[\"\
  connectionStringName\"] == null)\n    {\n        throw new ProviderException(\"\
  Required attribute missing: connectionStringName\");\n    }\n    connStringName\
  \ = config[\"connectionStringName\"].ToString();\n    config.Remove(\"connectionStringName\"\
  );\n    if (WebConfigurationManager.ConnectionStrings[connStringName] == null)\n\
  \    {\n        throw new ProviderException(\"Missing connection string\");\n  \
  \  }\n    db = DatabaseFactory.CreateDatabase(connStringName);\n    if (config.Count\
  \ > 0)\n    {\n        string attr = config.GetKey(0);\n        if (!String.IsNullOrEmpty(attr))\n\
  \        {\n            throw new ProviderException(\"Unrecognized attribute: \"\
  \ + attr);\n        }\n    }\n}\n```\n\n有关此代码的完整清单，请参考附录 A。\n\n##### 提供程序服务类\n\n\
  现在，你可以将所有这些部分组合在一起了。提供程序服务读取配置节，加载提供程序，并设置默认提供程序。正是在这里，提供程序与简单的程序集版本控制区分开来。该类最初是配置中的一个简单字符串，然后被实例化为一个类的实例。在你处理实现和配置问题以及梳理细节时，这可能也是你会花时间设置断点的地方。\n\
  \n这里需要记住的一个重要细节是，提供程序应该只初始化一次；否则，它将抛出异常。并且你需要以一种线程安全的方式来完成此操作。为了满足这些要求，你将使 `PhotoAlbumService`\
  \ 类成为一个单例——这意味着默认构造函数是私有的，并且一个名为 `Instance` 的静态属性返回唯一的实例。\n\n在这个属性中，提供程序将被加载，同时使用\
  \ `lock` 语句来确保线程安全（参见清单 5-22）。\n\n### 清单 5-22. `PhotoAlbumService.cs`\n\n```\nusing\
  \ System.Configuration.Provider;\nusing System.Web.Configuration;\n\nnamespace Chapter04.PhotoAlbumProvider\n\
  {\n    public class PhotoAlbumService\n    {\n        private static PhotoAlbumProvider\
  \ _defaultProvider = null;\n        private static PhotoAlbumProviderCollection\
  \ _providers = null;\n        private static object _lock = new object();\n\n  \
  \      private PhotoAlbumService() {}\n\n        public PhotoAlbumProvider DefaultProvider\n\
  \        {\n            get { return _defaultProvider; }\n        }\n\n        public\
  \ PhotoAlbumProvider GetProvider(string name)\n        {\n            return _providers[name];\n\
  \        }\n\n        public static PhotoAlbumProvider Instance\n        {\n   \
  \         get\n            {\n                LoadProviders();\n               \
  \ return _defaultProvider;\n            }\n        }\n\n        private static void\
  \ LoadProviders()\n        {\n            // 加载提供程序的代码，但文本在此处结束。\n        }\n  \
  \  }\n}\n```\n\n\n\n// 如果提供程序已加载，避免获取锁\n\n```csharp\nif (_defaultProvider == null)\n\
  {\n    lock (_lock)\n    {\n        // 再次检查，确保 _defaultProvider 仍为 null\n      \
  \  if (_defaultProvider == null)\n        {\n            // 获取 <PhotoAlbumSection>\
  \ 配置节的引用\n            PhotoAlbumSection section = (PhotoAlbumSection)\n        \
  \        WebConfigurationManager.GetSection(\"photoAlbumService\");\n\n        \
  \    // 此处只需一个提供程序\n            //_defaultProvider = (PhotoAlbumProvider)\n    \
  \        //    ProvidersHelper.InstantiateProvider\n            //        (section.Providers[0],\
  \ typeof(PhotoAlbumProvider));\n\n            _providers = new PhotoAlbumProviderCollection();\n\
  \            ProvidersHelper.InstantiateProviders(\n                section.Providers,\
  \ _providers,\n                typeof(PhotoAlbumProvider));\n            _defaultProvider\
  \ = _providers[section.DefaultProvider];\n\n            if (_defaultProvider ==\
  \ null)\n                throw new ProviderException\n                    (\"无法加载默认的\
  \ PhotoAlbumProvider\");\n        }\n    }\n}\n```\n\n你可以看到，大部分工作是在 `LoadProviders`\
  \ 方法中完成的。`photoAlbumService` 配置节被加载到 `PhotoAlbumSection` 对象中。然后，准备 `PhotoAlbumProviderCollection`\
  \ 来容纳所有的提供程序实现。接着，你就会看到那行有趣的、使用了 `ProvidersHelper` 类的 `InstantiateProviders` 方法的代码。如果你曾大量使用反射进行开发，你会欣赏这行代码的简洁性。但它具体做了什么？如果你深入探究其内部机制，会发现它最终使用了\
  \ `System.Activator` 类的 `CreateInstance` 方法。该方法会根据配置设置来实例化指定类的一个实例。\n\n这就是从头开始创建一个自定义提供程序的全部内容。只需搭建好一点基础架构，你就可以开始着手处理手头任务的“真正代码”了。\n\
  \n##### 单元测试\n\n在构建你自己的自定义提供程序时，为了增强和加速开发过程，使用单元测试是极其有益的。提供程序是一种服务契约，而单元测试旨在验证预期的功能。这两者本就相辅相成。\n\
  \n对于 `PhotoAlbumProvider`，我从一开始就使用单元测试来检查每个新方法和实现的功能是否正确。运行测试能立即识别出破坏性变更，无论是由于 C#\
  \ 代码中的逻辑错误还是存储过程的功能异常。当我选择完全重写实现时，通过针对提供程序接口运行单元测试，我能够在片刻之间彻底测试我的更改。如果我有多个提供程序实现，我还可以对所有实现运行相同的测试，以确保兼容性。\n\
  \n有关 `PhotoAlbumProvider` 的完整源代码清单，包括单元测试类以及创建表和存储过程的所有 SQL 脚本，请参考附录 A。\n\n## 最终成品\n\
  \n随着 `SqlPhotoAlbumProvider` 的完成，你现在可以将一个网站配置为使用它，并开始展示那些相册和照片了。你只需将程序集放入网站的 `bin`\
  \ 文件夹中，并配置 `Web.config` 文件以包含配置信息。清单 5-23 展示了一个示例配置。\n\n**清单 5-23.** `PhotoAlbumProvider`\
  \ 的 `Web.config`\n\n```xml\n<?xml version=\"1.0\"?>\n<configuration>\n  <configSections>\n\
  \    <section name=\"photoAlbumService\"\n             type=\"Chapter04.PhotoAlbumProvider.PhotoAlbumSection,\
  \ Chapter04.PhotoAlbumProvider\"/>\n  </configSections>\n\n  <!-- 其他配置 -->\n\n \
  \ <photoAlbumService defaultProvider=\"SqlPhotoAlbumProvider\">\n    <providers>\n\
  \      <clear/>\n      <add name=\"SqlPhotoAlbumProvider\"\n           connectionStringName=\"\
  chpt4\"\n           type=\"Chapter04.PhotoAlbumProvider.SqlPhotoAlbumProvider, Chapter04.PhotoAlbumProvider\"\
  />\n    </providers>\n  </photoAlbumService>\n</configuration>\n```\n\n\n\n### 第\
  \ 5 章：SQL 提供程序\n\n当几个 Web 窗体与`PhotoAlbumProvider`连接起来后，照片库很快就搭建完成了，如`图 5-3`所示。为了填充一些示例照片，我还创建了一个导入例程，该例程通过\
  \ Flickr 的标签拉取照片，以预填充几个示例相册。（所有源代码请参见附录 A。）\n\n![Image 20](img/index-146_1.jpg)\n\
  \n`图 5-3.` 最终成品\n\n#### 构建 SQL 站点地图提供程序\n\n如果你仔细观察`图 5-3`中`PhotoAlbumProvider`的最终成品，你会在顶部看到一个熟悉的元素。它是一个面包屑导航轨迹，这是\
  \ ASP.NET 的一项标准功能。\n\n遗憾的是，面包屑导航的唯一实现是基于 XML 的。为了使其与新的照片库协同工作，你需要一个 SQL 实现，该实现能够即时适应照片库的变化。自然地，你希望能够浏览不同的照片库，因此利用\
  \ ASP.NET 中与`SiteMapProvider`协同工作的导航控件是有意义的。\n\n这一次，事情会稍微容易一些，因为有几个细节对你有利。首先，`SiteMapProvider`已经为你处理了配置加载。其次，你可以选择扩展现有的`SiteMapProvider`实现之一，或者从抽象的`SiteMapProvider`类开始实现。由于\
  \ MSDN 上有一个很好的示例展示了如何从基类构建实现，我以此为基础开始，并根据我的需求进行了调整。\n\n> **注意** MSDN 上有大量关于示例代码和架构解释的内容。随着微软识别出需要更多关注的领域，这些内容一直在持续改进。在.NET\
  \ 2.0 准备发布期间，我见证了文档的不断扩充。我发现每次重返 MSDN 时，都能发现以前没有的新内容。它现在还包含一个 Wiki，这样像我们这样的开发者就可以为\
  \ MSDN 贡献内容，以更好地完善整个文档和平台。如果你现在去看，你会看到大多数页面都允许你切换到不同版本的框架，如.NET 1.1、2.0、3.0 和 3.5。\n\
  \n站点地图是一种层次结构，它必须有一个唯一的父节点，并且每个节点必须有一个唯一的 URL。重要的是，在生成用于存储网站层次结构数据的数据库时，必须遵循这些规则；否则，站点地图将无法工作。\n\
  \n### SiteMap 要求\n\n`SiteMap`像一棵树一样工作，并符合以下要求。首先，必须有一个根节点。从那里开始，每个节点必须有一个最终指向根节点的父节点。最后，每个节点必须有一个唯一的\
  \ URL。唯一 URL 的要求可能有些棘手，因为你可能允许一个叶子节点出现在网站的多个区域中，例如一个皮革椅子的产品。显示皮革家具的页面会指向这把椅子，显示椅子的页面同样会指向它。面包屑导航只能指向一个父节点，因此\
  \ URL 必须以某种方式是唯一的，即使它在概念上可能存在于两个不同的父节点下。\n\n### 实现 SiteMapProvider\n\n有了一个可工作的示例后，我开始调整它以适应我的数据库要求。这些要求非常简单，可以通过单个表轻松处理，如`表\
  \ 5-4`所示。\n\n`表 5-4.` `sm_SiteMapNodes`表\n\n- `ID`: `Bigint` (主键)\n- `ParentID`:\
  \ `Bigint`\n- `Url`: `Nvarchar(150)`\n- `Title`: `Nvarchar(50)`\n- `Depth`: `Int`\n\
  - `Creation`: `Datetime`\n- `Modified`: `Datetime`\n\n为了加载`SiteMap`，我硬编码了主页和主相册页面，然后读取了`PhotoAlbumProvider`使用的表。用于填充`SiteMap`的脚本如`清单\
  \ 5-24`所示。\n\n`清单 5-24.` `sm_RepopulateSiteMapNodes.sql`\n\n\n\n"
