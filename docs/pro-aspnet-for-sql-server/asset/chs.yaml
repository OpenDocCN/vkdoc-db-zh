  \ 实现被创建为独立于标准 SQL 实现的程序集，以便可以单独部署。标准 SQL 提供程序的类库项目甚至不需要包含 LINQ 所需的任何引用，例如`System.Data.Query`，因为新提供程序在运行时加载，并且\
  \ LINQ 所需的命名空间可以从全局程序集缓存（GAC）中访问。\n\n将 LINQ 特定的细节隔离到 LINQ 提供程序类库中非常方便，特别是因为 LINQ\
  \ 是一项如此新的技术。即使 Visual Studio 2008 发布，你仍然可以为标准 SQL 提供程序定位.NET 2.0 或.NET 3.0 运行时，同时可以构建一个新的\
  \ LINQ 提供程序来定位.NET 3.5 运行时，并充分利用 Visual Studio 2008 中可用的所有新的动态语言特性。\n\n##### 实现\
  \ WCF 提供程序\n\n另一个提供程序实现可以使用 Windows 通信基础（WCF）来构建。WCF 是 Web 服务规范的实现，这些规范在过去几年中已经显著成熟。Web\
  \ 服务规范始于 SOAP。\n\n\n以及提供跨平台互操作性的 `.asmx` Web 服务，支持诸如 `.NET`、`Java`、`Python` 和 `Ruby`\
  \ 等多种平台。但业界开始着手定义诸多细节，以通过 `WS-*` 规范使 Web 服务成为一种功能完备的协议，用于将应用程序作为服务进行分发。其中一些规范涉及请求路由，而另一些则处理安全机制。微软推出了\
  \ Web Service Extensions (`WSE`)，它为这些不断变化的规范增添了功能，直到它们变得相对稳定。随后，微软发布了搭载 `WCF` 的\
  \ `.NET 3.0`。`WCF` 是对用于 Web 服务的 `WS-*` 规范的丰富实现，但其目的不仅限于使 `.NET` 应用程序与其他平台良好集成。\n\
  \n`WCF` 最终将取代 `.NET remoting` 和 `COM`。\n\n`WCF` 将为我们提供其他技术无法实现的高度灵活性。`WCF` 服务可以自托管在使用该服务的应用程序内部，也可以运行在该应用程序之外的同一服务器或远程服务器上。更改可以通过配置完全实现。通过为提供程序创建\
  \ `WCF` 实现，我们将可以选择将数据访问层移动到在本地或远程单独服务器上运行的服务中，从而有效地分配进入应用程序的负载和流量。\n\n使用 `WCF` 的另一个好处是，你可以提供一个丰富的应用层，供多个应用程序同时使用。考虑一个管理工资系统的提供程序，它需要能被多个应用程序访问。如果你有三个使用该提供程序的独立网站，由于它们运行在不同的运行时中，你无法自动地在网站间共享缓存功能。但如果你使用\
  \ `WCF` 实现该提供程序，并将这三个网站都指向这个共享服务，你将受益于拥有一个数据中心化的缓存点，因为你可以控制数据的保存和删除位置，并在确定数据已更改时将其从缓存中移除。\n\
  \n有了共享服务，你实际上可以采取更积极的缓存策略，因为你完全控制着数据的进出。这很类似于使用存储过程作为看守者，但你可以访问 `.NET` 运行时的全部功能。并且，你可以不使用\
  \ `ASP.NET` 缓存，而是简单地持有自己的数据集合，随着数据变化保持其更新，并从内部集合返回所请求的数据，而无需每次查询数据库。\n\n###### WCF\
  \ 服务要求\n\n运行 `WCF` 服务需要客户端和服务端。这比仅仅设置一组可以自动相互通信的类要多一些工作。为了让客户端能够工作，服务必须托管并准备就绪。服务还需要位于通过配置设定的已知位置。对于\
  \ `WCF` 提供程序，我们将创建一个新的 `EventProvider`，并在开发期间使用名为 `netTcpBinding` 的绑定，将服务设置为在本地端口上的控制台应用程序内运行。客户端配置如清单\
  \ 10-28 所示。\n\n**清单 10-28.** WCF 客户端配置\n\n```xml\n<system.serviceModel>\n  <client>\n\
  \    <endpoint\n      address = \"net.tcp://localhost:8002/EventService/\"\n   \
  \   binding = \"netTcpBinding\"\n      contract = \"DotnetUserGroup.DataAccess.WcfProviders.Events.IEventService\"\
  \n    />\n  </client>\n</system.serviceModel>\n```\n\n客户端将使用 `netTcpBinding` 在同一台机器的\
  \ `8002 端口` 上查找服务。然后，在控制台应用程序中，服务将使用清单 10-29 中的配置。\n\n**清单 10-29.** WCF 服务配置\n\n\
  ```xml\n<system.serviceModel>\n  <services>\n```\n\n\n\n# 第 10 章 ■ 示例应用程序\n\n######\
  \ 托管服务\n\n`service` 元素定义了实现由 `contract` 属性定义的接口 `IEventService` 的具体类 `EventService`。该接口被显式定义，因为它用于生成描述\
  \ Web 服务的 WSDL 文件。如果未定义该接口，则它不是 Web 服务的一部分。显然，创建一个接口类比自己创建 WSDL 文件要容易得多，但您确实需要用特性装饰该接口以协助生成\
  \ WSDL 输出。清单 10-30 展示了 `IEventService` 接口。\n\n`清单 10-30.` `IEventService 接口`\n\n\
  ```csharp\n[ServiceContract(Namespace = \"http://dug/events/\")]\n[ServiceKnownType(typeof(DomainKey))]\n\
  [ServiceKnownType(typeof(Event))]\n[ServiceKnownType(typeof(Location))]\n[ServiceKnownType(typeof(Speaker))]\n\
  public interface IEventService\n{\n    [OperationContract]\n    Event GetNewEvent();\n\
  \n    [OperationContract]\n    Event GetEvent(DomainKey key);\n\n    [OperationContract]\n\
  \    EventCollection GetAllEvents();\n\n    [OperationContract]\n    EventCollection\
  \ GetEventsByDate(DateTime targetDate);\n\n    [OperationContract]\n    DomainKey\
  \ SaveEvent(Event evt);\n\n    [OperationContract]\n    void DeleteEvent(Event evt);\n\
  \n    [OperationContract]\n    bool IsUsingLocation(Location location);\n}\n`\n\n\
  您应该注意的第一个特性是 `ServiceKnownType`。通过添加这些特性，WSDL 输出将生成定义这些对象所需的数据，以便它们可以通过服务传递。通过显式声明这些类型，服务将能够安全地传递这些对象。然后，每个旨在成为服务一部分的方法都用\
  \ `OperationContract` 特性进行标记。\n\n对于 WFC 实际的实现工作，我们将简单地使用标准的 SQL 提供程序，它将调用现有的存储过程。WCF\
  \ 提供程序将充当桥梁，使提供程序能够分发到远程服务器。但在我们调用服务之前，需要让控制台应用程序启动服务宿主。\n\n托管服务可以在任何类型的应用程序中完成。它可以是一个网站、控制台应用程序，甚至是一个\
  \ Windows 服务。它只需要使用服务接口的具体实现来启动一个服务宿主。对于事件实现，我们将使用清单 10-31 所示的 `EventServiceHost`\
  \ 类，它运行一个单例并提供启动和停止服务的方法。\n\n`清单 10-31.` `EventServiceHost.cs`\n\n```csharp\nnamespace\
  \ DotnetUserGroup.DataAccess.WcfProviders.Events\n{\n    public class EventServiceHost\n\
  \    {\n        private static readonly EventServiceHost _instance = new EventServiceHost();\n\
  \        private ServiceHost host;\n\n        public EventServiceHost()\n      \
  \  {\n        }\n\n        public static EventServiceHost Instance\n        {\n\
  \            get\n            {\n                return _instance;\n           \
  \ }\n        }\n\n        public void StartEventService()\n        {\n         \
  \   Trace.WriteLine(\"Internal Hosting: StartEventService\");\n            host\
  \ = new ServiceHost(typeof(EventService));\n            host.Open();\n        }\n\
  \n        public void StopEventService()\n        {\n            Trace.WriteLine(\"\
  Internal Hosting: StopEventService\");\n            if (host != null)\n        \
  \    {\n                host.Close();\n                host = null;\n          \
  \  }\n        }\n    }\n}\n`\n\n有了现成的服务配置，控制台应用程序可以使用 `EventServiceHost` 类来运行服务宿主。清单\
  \ 10-32 展示了这个控制台应用程序。\n\n`清单 10-32.` `Program.cs`\n\n```csharp\nnamespace ConsoleApplication\n\
  {\n    class Program\n    {\n        static void Main(string[] args)\n        {\n\
  \            EventServiceHost.Instance.StartEventService();\n            Console.WriteLine(\"\
  Running...\");\n            Console.WriteLine(\"[ Press Enter to End ]\");\n   \
  \         Console.ReadLine();\n```\n\n\n\n# WCF 服务托管与数据契约配置\n\n```csharp\nEventServiceHost.Instance.StopEventService();\n\
  }\n}\n}\n```\n\n在开发过程中，使用控制台应用程序来托管服务非常方便，因为您可以轻松地启动和停止控制台应用程序以进行更改。\n\n当准备好将服务部署到生产环境后，您可以通过网站或\
  \ Windows 服务来运行该服务。\n\n###### 定义数据契约\n\n除了定义服务所处理的操作外，还必须定义服务传递的数据对象。`DataContract`\
  \ 用于标记对象以供 WCF 服务使用。在清单 10-7 中，您可能已经注意到 `Event` 类上的 `DataContract` 和 `DataMember`\
  \ 特性。将对象标记为 `DataContract` 很像将其标记为 `Serializable`。实际上，您也可以传递标记为 `Serializable` 的对象，但现在更推荐将类标记为\
  \ `DataContract`。\n\n在服务中使用的每一位数据都必须准备好，以便能够安全地在服务中传递。`Event` 类必须标记为 `DataContract`，它引用的每个类（例如\
  \ `Location` 和 `DomainKey` 类）也同样需要标记。\n\n###### 配置提供程序\n\n新的 WCF 提供程序的配置现在分为两部分：客户端和服务端。客户端将是应用程序（例如网站），它使用\
  \ WCF 提供程序与服务进行通信。然后服务将使用 `EventProvider` 的 SQL 实现来执行服务操作。清单 10-33 显示了客户端配置，清单 10-34\
  \ 显示了服务配置。\n\n**清单 10-33. 客户端配置**\n\n```xml\n<events defaultProvider=\"SqlEventProvider\"\
  \n  locationProvider=\"SqlLocationProvider\"\n  speakerProvider=\"SqlSpeakerProvider\"\
  \n  sponsorProvider=\"SqlSponsorProvider\">\n  <providers>\n    <clear />\n    <add\
  \ name=\"WcfEventProvider\"\n         type=\"DotnetUserGroup.DataAccess.WcfProviders.Events.WcfEventProvider,\
  \ DotnetUserGroup.DataAccess.WcfProviders\" />\n  </providers>\n</events>\n```\n\
  \n**清单 10-34. 服务配置**\n\n```xml\n<events defaultProvider=\"SqlEventProvider\"\n \
  \ locationProvider=\"SqlLocationProvider\"\n  speakerProvider=\"SqlSpeakerProvider\"\
  \n  sponsorProvider=\"SqlSponsorProvider\">\n  <providers>\n    <clear />\n    <add\
  \ name=\"SqlEventProvider\" connectionStringName=\"dug\"\n         type=\"DotnetUserGroup.DataAccess.Events.SqlEventProvider,\
  \ DotnetUserGroup.DataAccess\" />\n  </providers>\n</events>\n```\n\n#### 使用提供程序\n\
  \n将数据连接到网站意味着将提供程序连接到页面和控件。\n\n正如我多次提到的，`ObjectDataSource` 将充当连接这两个部分的桥梁。但还需要一个额外的步骤，因为\
  \ `ObjectDataSource` 要求其用于填充数据绑定控件数据项的类型具有默认构造函数。\n\n由于提供程序的初始化没有默认构造函数，因此我们需要创建一个代理类。\n\
  \n最合理的做法是创建一个简单的类，它只包含与提供程序相同的方法，并将该类标记为 `DataObject`。`DataObject` 在第 7 章中有更详细的介绍。然后，返回数据的方法可以标记为\
  \ `Select` 类型的 `DataObjectMethod`。清单 10-35 展示了 `EventDataObject`。\n\n**清单 10-35.\
  \ EventDataObject.cs**\n\n```csharp\nnamespace DotnetUserGroup.DataAccess.Events\n\
