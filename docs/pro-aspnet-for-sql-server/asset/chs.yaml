  \ `CodeCompileUnit` 中以生成类。\nASP.NET 对页面和用户控件使用模板，这些内容主要由 HTML 以及特定于 ASP.NET 控件的特殊指令组成。如果不这样做，你就必须像早期\
  \ Web 开发那样，从源文件中拼凑所有的 HTML。\n前面章节中从 XML 文件生成所有字段只需要大约 100 行 `CodeDom` 代码。这相当不错，但它也只定义了字段和属性。\n\
