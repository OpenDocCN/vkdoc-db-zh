  \ `PageIndex`。\n\n##### 连接分页器事件\n\n分页器控件触发回发事件以设置新的 `PageIndex` 值。通常，附加事件是相当自动的。因为这是一个自定义数据绑定控件，所以需要初始化控件、附加事件，然后将其添加到\
