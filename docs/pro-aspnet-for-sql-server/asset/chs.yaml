  \n`build.proj` 脚本还包含一个菜单，当使用 `RunBuild.cmd` 脚本时会显示该菜单，如清单 9-14 所示。\n\n`清单 9-14.`\
  \ `RunBuild.cmd`\n\n```\n%windir%\\Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe\
  \ build.proj ➥\n/t:PromptForTarget /p:Configuration=Release;Interactive=True\npause\n\
  ```\n\n菜单显示的七个选项是您所期望的典型构建选项。\n\n当 `deploy.proj` 调用主构建脚本时，配置被设置为 `Release`，这将导致\
  \ `Build` 目标为 Web 部署项目运行构建，生成输出到 `Release` 文件夹。然后，`deploy.proj` 脚本使用 `Release` 文件夹来准备选定的环境。\n\
  \n\n\n最后，可以将准备好的输出目录中的内容打包成一个 zip 文件。相比于处理一大堆散文件，将 zip 文件移动到目标环境会更加容易。这可以通过`Zip`任务完成，它是\
  \ MSBuild 社区任务的一部分。首先，你需要在默认的`PropertyGroup`中定义 zip 文件的名称，如**清单 9-15**所示。\n\n**清单\
  \ 9-15.** 定义`ZipFilename`\n\n```xml\n<ZipFilename>$(MSBuildProjectDirectory)\\Deployments\\\
  $(Configuration).zip</ZipFilename>\n```\n\n然后，可以将`Zip`任务添加到`PrepEnvironment`目标的末尾。`Zip`任务的声明如**清单\
  \ 9-16**所示。\n\n**清单 9-16.** `Zip`声明\n\n```xml\n<CreateItem Include=\"$(DestinationDeploymentDir)\\\
  **\\*.*\">\n    <Output ItemName=\"ZipFiles\" TaskParameter=\"Include\"/>\n</CreateItem>\n\
  \n<Zip Files=\"@(ZipFiles)\"\n     ZipFileName=\"$(ZipFilename)\"\n     WorkingDirectory=\"\
  $(DestinationDeploymentDir)\" />\n```\n\n最终会得到一个包含网站所有文件的 zip 包，其中包含了修改后的配置文件。如果\
  \ Web 服务器位于远程托管设施，你可以将此 zip 文件上传到服务器，并在原地解压，无需任何额外工作。\n\n## 通用文件夹补充\n\n本章中的 MSBuild\
  \ 脚本在你的项目中具有很高的可复用性。使用它们可以减少你在每个项目上进行的手动工作，并能捕获构建项目所需的详细信息。这些脚本可以放置在你的`Scripts`子文件夹下的`Common`文件夹中，以便在你的项目中引用（`D:\\\
  Projects\\Common\\Scripts\\MSBuild`）。\n\n## 数据库部署\n\n随着你的 Web 应用程序的每个版本被推送到各个环境，数据库可能需要进行一些更新，以确保应用程序正常运行。也许某个表中增加了一列，或者定义了一个新的存储过程。如果更新后的网站调用了该存储过程，那么在新的应用程序版本投入使用前，数据库必须先更新。要将数据库结构更新到当前版本，可能只需要创建一些`alter`语句。我将向你展示如何创建这些更新脚本，以及如何以最小的工作量部署它们。\n\
  \n##### 生成变更脚本\n\nSQL Server Management Studio 可以帮助创建变更脚本。一旦你创建了所有表并填充了数据，就可以使用`alter`语句来更改结构。你可以在查询窗口中手动操作，也可以使用\
  \ SQL Server Management Studio 进行可视化操作。要修改表，只需在对象资源管理器中右键单击该表，然后从上下文菜单中选择`修改`。表编辑器将显示所有列。进行你的更改，完成后，可以单击`生成更改脚本`按钮。\n\
  \n将一个列从`varchar(25)`调整为`varchar(50)`会生成一个脚本，该脚本将创建一个具有修订后表定义的新临时表，然后将所有数据从现有表复制进去。接着，它会删除现有表，并将临时表重命名为刚刚删除的表的名称。这些步骤都在一个事务内完成，一旦所有步骤成功完成，事务就会提交。对于数据量较大的情况，这个更新操作可能需要一段时间才能完成。与你手动编写`alter`语句相比，这个生成的脚本也相当大。**清单\
  \ 9-17**所示的脚本可以实现等效的结果。\n\n**清单 9-17.** Alter 脚本\n\n```sql\nBEGIN TRANSACTION\n\
  GO\nALTER TABLE chpt09_Names\nALTER COLUMN [Name] varchar(50) NOT NULL\nGO\nCOMMIT\n\
  ```\n\n> **注意：** 修改存储过程并非必要，因为你可以安全地删除并重新创建它们，而不会丢失任何数据。\n\n修改表的过程仍然在事务中执行，但不需要复制表的内容。因此，这个简单的语句可能比生成的脚本运行得快得多。即使你打算手动编写自己的语句，参考生成的脚本也是有帮助的。你可能对表进行的另一项调整是添加索引。**清单\
  \ 9-17**中更新的表有一个名为`Name`的列。如果该列有一个索引，可能会加快对该表的查询速度。\n\n使用 Management Studio 在编辑表时，通过`管理索引和键`按钮，也可以可视化地添加索引。添加索引后，你可以生成更改脚本，复制创建索引的部分，并在你的自定义脚本中使用它。结果将如**清单\
  \ 9-18**所示。\n\n**清单 9-18.** 索引创建脚本\n\n```sql\nBEGIN TRANSACTION\nGO\nCREATE NONCLUSTERED\
  \ INDEX IX_chpt09_Names ON dbo.chpt09_Names (\n    Name\n) WITH(\n    STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF,\n    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\
  \ ON [PRIMARY]\nGO\nCOMMIT\n```\n\n同样，大量的数据会导致创建索引需要一段时间。\n\n在完成一个发布周期时，你可能会将变更脚本添加到你的数据库项目中，作为下一次部署的一部分运行。这些更新脚本可以放置在解决方案的数据库项目中一个名为`Change\
  \ Scripts`的文件夹里。在每个发布周期开始时，你可能希望将这些脚本中的更改合并到数据库的创建脚本中，并随着新的更改开始使用一组新的更新脚本。这样做将减少从头开始准备新环境的复杂性。如何管理更新脚本取决于你发布版本的频率以及每个发布版本所需更改的程度。\n\
  \n### 使用脚本模板\n\nSQL Server Management Studio 提供了一个模板集合，你可以用来创建脚本以修改现有数据库并执行各种与数据库相关的任务。你可以通过打开模板资源管理器来查看这些模板。双击模板将在新的查询窗口中打开它。要用实际值替换模板中的所有参数，你可以从“查询”菜单中单击`为模板参数指定值`。\n\
  \n##### 自动化数据库更新\n\n如果你有访问权限，变更脚本可以直接在目标数据库上手动运行。你可以直接从你的计算机访问，或者将脚本上传到数据库服务器，通过远程桌面连接到服务器，并使用本地安装的\
  \ Management Studio 副本来运行脚本。对于更改集有限且不频繁的更新，你可能会发现这种手动流程就足够了。但如果更改很多，而你又没有完全掌握所有情况，你可能希望由一个精心设计的自动化流程来控制这些更改，该流程已在\
  \ QA 和测试环境中成功运行。在生产环境中重复那个受控且经过验证的流程将确保部署更加可靠。\n\n### 使用 MSBuild 和 ExecuteDDL\n\n\
  `ExecuteDDL`任务是 MSBuild 社区任务的一部分，可用于运行脚本以执行数据库更新。脚本创建后，可以从一个 MSBuild 脚本中引用，该脚本将在每个环境中用于更新数据库。\n\
  \n**清单 9-19**展示了`db.proj`的内容，这是一个 MSBuild 脚本，它为四个环境（开发、QA、测试和生产）运行两个更新脚本。\n\n**清单\
  \ 9-19.** `db.proj`\n\n```xml\n<Project DefaultTargets=\"RunScripts\">\n    <Import\
  \ Project=\"$(MSBuildExtensionsPath)\\MSBuildCommunityTasks\\...\" />\n```\n\n\n\
  # MSBuild 项目配置与数据库部署脚本\n\n## 项目配置\n\n```xml\n<PropertyGroup>\n  <Environment Condition=\"\
  \ '$(Environment)' == '' \">Development</Environment>\n  <Interactive Condition=\"\
  '$(Interactive)' == ''\">False</Interactive>\n</PropertyGroup>\n\n<PropertyGroup\
  \ Condition=\" '$(Environment)' == 'Development' \">\n  <ConnectionString>Data Source=.\\\
  SQLEXPRESS;Initial Catalog=Chapter09;Integrated Security=True</ConnectionString>\n\
  </PropertyGroup>\n\n<PropertyGroup Condition=\" '$(Environment)' == 'QA' \">\n \
  \ <ConnectionString>Data Source=QADB\\SQL2005;Initial Catalog=Chapter09;Integrated\
  \ Security=True</ConnectionString>\n</PropertyGroup>\n\n<PropertyGroup Condition=\"\
  \ '$(Environment)' == 'Staging' \">\n  <ConnectionString>Data Source=StagingDB\\\
  SQL2005;Initial Catalog=Chapter09;Integrated Security=True</ConnectionString>\n\
  </PropertyGroup>\n\n<PropertyGroup Condition=\" '$(Environment)' == 'Production'\
  \ \">\n  <ConnectionString>Data Source=ProductionDB\\SQL2005;Initial Catalog=Chapter09;Integrated\
  \ Security=True</ConnectionString>\n</PropertyGroup>\n```\n\n## 执行目标\n\n```xml\n\
  <Target Name=\"RunScripts\">\n  <ExecuteDDL Files=\"Database\\Change Scripts\\Update1.sql\"\
  \ ConnectionString=\"$(ConnectionString)\" Condition=\" Exists('Database\\Change\
  \ Scripts\\Update1.sql') \" />\n  <ExecuteDDL Files=\"Database\\Change Scripts\\\
  Update2.sql\" ConnectionString=\"$(ConnectionString)\" Condition=\" Exists('Database\\\
  Change Scripts\\Update2.sql') \" />\n</Target>\n```\n\n## 交互式目标选择\n\n```xml\n<Target\
  \ Name=\"PromptForTarget\" Condition=\"'$(Interactive)' == 'True'\">\n  <Message\
  \ Text=\"Select an Environment: \"></Message>\n  <Message Text=\"1) Development\"\
  \ Importance=\"high\"></Message>\n  <Message Text=\"2) QA\" Importance=\"high\"\
  ></Message>\n  <Message Text=\"3) Staging\" Importance=\"high\"></Message>\n  <Message\
  \ Text=\"4) Production\" Importance=\"high\"></Message>\n  <Prompt Text=\" Enter\
  \ a target:\">\n    <Output TaskParameter=\"UserInput\" PropertyName=\"SelectedTarget\"\
  />\n  </Prompt>\n  <Message Text=\"Selected target is $(SelectedTarget)\"></Message>\n\
  \  <MSBuild Targets=\"RunScripts\" Projects=\"db.proj\" Properties=\"Environment=Development\"\
  \ Condition=\"'$(SelectedTarget)' == '1'\"></MSBuild>\n  <MSBuild Targets=\"RunScripts\"\
  \ Projects=\"db.proj\" Properties=\"Environment=QA\" Condition=\"'$(SelectedTarget)'\
  \ == '2'\"></MSBuild>\n  <MSBuild Targets=\"RunScripts\" Projects=\"db.proj\" Properties=\"\
  Environment=Staging\" Condition=\"'$(SelectedTarget)' == '3'\"></MSBuild>\n  <MSBuild\
  \ Targets=\"RunScripts\" Projects=\"db.proj\" Properties=\"Environment=Production\"\
  \ Condition=\"'$(SelectedTarget)' == '4'\"></MSBuild>\n</Target>\n</Project>\n```\n\
  \n要运行 `db.proj` 脚本，可以使用如清单 9-20 所示的 `RunDb.cmd`。\n\n**清单 9-20.** `RunDb.cmd`\n```\n\
  %windir%\\Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe db.proj /t:PromptForTarget\
  \ /p:Configuration=Release;Interactive=True\nPause\n```\n\n运行脚本时，它将显示一个菜单，提供四个受支持环境的选择。选择控制\
  \ `ConnectionString` 属性的值，该值由 `ExecuteDDL` 任务使用。成功运行此 MSBuild 脚本的结果如图 9-6 所示。\n\n\
  **图 9-6.** 成功运行 `db.proj`\n\n## 使用嵌入式脚本\n\n数据库更新可以直接集成到您的应用程序中，方法是将脚本与其余数据访问层一起嵌入到程序集中。最初使用应用程序时，可以初始化数据库，应用程序的未来版本可以使用嵌入的脚本更新现有的数据库架构。这一切都将是自动且透明的。\n\
  \n升级网站可能就像复制新程序集一样简单，这会自动重启工作进程。数据库更新将自动应用。\n\n此类功能不是 ASP.NET 的自动特性，但可以使用应用程序中可用的构建块来实现。对于以下示例，您将创建一个表来保存名称。初始化脚本将创建一个用于跟踪数据库架构的架构版本表。然后将有一系列更新脚本。每个版本都可以添加额外的更新脚本。\n\
  \n### 初始化数据库\n\n首先，像在数据库项目中通常做的那样创建架构版本表。此表包含一个名称和一个整数作为版本。每个更新成功执行后，版本将设置为下一个版本。清单\
  \ 9-21 显示了架构版本表的创建脚本。\n\n**清单 9-21.** `chpt09_SchemaVersions.sql`\n```sql\nIF EXISTS\
  \ (\n  SELECT * FROM sysobjects WHERE type = 'U' AND name = 'chpt09_SchemaVersions')\
  \ BEGIN\n  DROP Table chpt09_SchemaVersions\nEND\nGO\nCREATE TABLE [dbo].chpt09_SchemaVersions\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n  [Version] [smallint] NOT NULL,\n\
  \  CONSTRAINT [PK_chpt09_SchemaVersions] PRIMARY KEY CLUSTERED ([Name] ASC)WITH\
  \ (PAD_INDEX = OFF, IGNORE_DUP_KEY = OFF) ON [PRIMARY]\n) ON [PRIMARY]\nGO\n```\n\
  \n`Name` 列是主键。对于嵌入式脚本，将只有一个名为 `names` 的架构。此结构可以支持任意数量的其他架构，这些架构都可以独立进行版本控制。将数据库中保存的所有数据分解为不同的命名架构将有助于隔离更新，从而简化更新脚本。\n\
  \n该架构表使用两个存储过程来获取和设置架构版本。清单 9-22 显示了设置命名架构版本的脚本。\n\n**清单 9-22.** `chpt09_SetSchemaVersion.sql`\n\
  ```sql\nIF EXISTS (\n  SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt09_SetSchemaVersion')\
  \ BEGIN\n  DROP Procedure chpt09_SetSchemaVersion\nEND\nGO\nCREATE Procedure dbo.chpt09_SetSchemaVersion\n\
  (\n  @Name nvarchar(20),\n  @Version smallint\n)\nAS\nIF NOT EXISTS (\n  SELECT\
  \ * FROM chpt09_SchemaVersions WHERE Name = @Name\n)\nBEGIN\n  INSERT into chpt09_SchemaVersions\
  \ ([Name],Version) values (@Name, @Version)\nEND\nELSE\nBEGIN\n  UPDATE chpt09_SchemaVersions\
  \ SET Version = @Version WHERE [Name] = @Name\nEND\nGO\nGRANT EXEC ON chpt09_SetSchemaVersion\
  \ TO PUBLIC\nGO\n```\n\n设置版本是一个简单的过程，要么插入，要么更新架构版本表。获取架构版本需要一个类似的过程。获取命名架构版本的脚本如清单\
  \ 9-23 所示。\n\n**清单 9-23.** `chpt09_GetSchemaVersion.sql`\n```sql\nIF EXISTS (\n\
  \  SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt09_GetSchemaVersion')\
  \ BEGIN\n  DROP Procedure chpt09_GetSchemaVersion\nEND\nGO\nCREATE Procedure dbo.chpt09_GetSchemaVersion\n\
  (\n  @Name nvarchar(20),\n  @Version smallint OUTPUT\n)\nAS\nIF EXISTS (\n  SELECT\
  \ * FROM chpt09_SchemaVersions WHERE Name = @Name\n)\nBEGIN\n  SET @Version = (SELECT\
  \ Version FROM chpt09_SchemaVersions WHERE Name = @Name)\nEND\nELSE\nBEGIN\n  SET\
  \ @Version = 0\nEND\nGO\nGRANT EXEC ON chpt09_GetSchemaVersion TO PUBLIC\nGO\n```\n\
  \n命名架构的版本作为输出参数返回。如果命名架构不存在，则版本默认为 0；否则返回实际值。\n\n### 更新数据库\n\n有了架构表和存储过程后，您可以将脚本作为嵌入式脚本复制到类库中。只需在类库中创建一个名为\
  \ `Scripts` 的文件夹。要添加新的 SQL 脚本，您需要将其作为简单的文本文件添加，但可以将扩展名设置为 `.sql`。\n\n当打开`.sql`文件时，它将被视为\
  \ SQL 脚本。对于第一个脚本，你需要创建`SchemaVersion`表和两个用于获取和设置版本号的存储过程。定义这些资源的三个脚本内容将按顺序放置在一个名为`init.sql`的脚本中。第一个脚本是建表脚本，它将被修改以移除开头检查模式表是否存在的部分。这里需要采取额外的预防措施：如果该表已存在，并且此初始化脚本被运行，你希望它在尝试创建第一个表时立即失败。\n\
  \n为了确保此脚本被包含在程序集中，你需要通过如图 9-7 所示的属性面板将其“生成操作”设置为“嵌入的资源”。此设置使其作为资源流在程序集中可用。（稍后你将作为资源流加载该脚本。）**图\
  \ 9-7.** *作为嵌入资源的`init.sql`*\n\n接下来，你将创建一些示例脚本，这些脚本将作为更新运行以测试更新例程的功能。这些脚本将放置在类库的`Scripts`文件夹中，并设置为嵌入资源。它们将被命名为`NamesUpdate.00.sql`、`NamesUpdate.01.sql`和`NamesUpdate.02.sql`。第一个脚本定义`names`表和存储过程。第二个脚本添加三个名字，第三个脚本再添加一个名字。这些脚本可以轻松地调整表列、添加或删除索引，或执行任何你希望它们完成的操作。\n\
  \n关于这些嵌入脚本有两个重要细节。首先，所有命令后都使用`GO`语句分隔。这样做是为了使命令可以作为独立的 SQL 命令，通过企业库中的数据访问块来运行，就像你在前面章节中对存储过程所做的那样。其次，更新脚本应始终将数据库版本设置为下一个数字。这在所有其他命令成功运行后在末尾完成。然而，顺序并非严格必要，因为这些命令将作为一个事务分组执行，因此如果任何命令失败，更新脚本中的所有更改都将被撤销。清单\
  \ 9-24 展示了`NamesUpdate.01.sql`。\n\n**清单 9-24.** *NamesUpdate.01.sql*\n\n```sql\n\
  -- update 1 (add stooges to names table)\nEXEC chpt09_SaveName 'Larry'\nGO\nEXEC\
  \ chpt09_SaveName 'Moe'\nGO\nEXEC chpt09_SaveName 'Curly'\nGO\n-- be sure to update\
  \ the names schema version\nEXEC chpt09_SetSchemaVersion 'names', 2\nGO\n```\n\n\
  每个名字都使用由第一个更新脚本`NamesUpdate.00.sql`（此处未展示，参见代码下载）创建的`chpt09_SaveName`存储过程添加。你可以看到每个命令如何以`GO`语句结束，最后一个语句将`names`模式的模式版本设置为\
  \ 2。\n\n### 运行脚本\n\n嵌入在程序集中的脚本现在已准备好使用一个名为`DatabaseManager`的类来加载和运行。该类与更新脚本位于同一个类库中，其默认命名空间设置为`Chapter09`——这是在加载脚本作为资源流时的一个重要细节。文件夹结构也很重要，应如图\
  \ 9-8 所示。\n\n为了引用脚本，你将使用一个前缀，类似于命名空间。这个前缀在`DatabaseManager`类中定义为常量，如清单 9-25 所示。\n\
  \n**图 9-8.** *类库结构*\n\n**清单 9-25.** *ScriptsPrefix 常量*\n\n```csharp\nprivate const\
  \ string ScriptsPrefix = \"Chapter09.Database.Scripts.\";\n```\n\n脚本前缀使用默认命名空间和文件夹结构来定义嵌入脚本的路径。现在你已经准备好构建初始化和更新例程，这始于清单\
  \ 9-26 所示的`InitializeDatabase`方法。\n\n**清单 9-26.** *InitializeDatabase 方法*\n\n###\
  \ 第 9 章：部署\n\n```csharp\npublic void InitializeDatabase()\n{\n    if (IsAutoUpdatesEnabled())\n\
  \    {\n        bool success = true;\n        if (!IsInitialized())\n        {\n\
  \            List<string> initCommands = GetSqlCommands(ScriptsPrefix + \"init.sql\"\
  );\n            success = RunSqlCommands(initCommands);\n        }\n        if (success)\n\
  \        {\n            UpdateDatabase();\n        }\n    }\n}\n```\n\n`InitializeDatabase`\
  \ 方法首先检查自动更新功能是否启用。这基于一个名为 `EnableAutoUpdates` 的配置设置。该值必须设置为 `true`，初始化过程才会运行。接下来，将加载并运行名为\
  \ `init.sql` 的脚本中的命令。如果脚本执行成功（即未抛出异常），则继续运行清单 9-27 所示的 `UpdateDatabase` 方法。\n\n\
  ## 清单 9-27：UpdateDatabase 方法\n\n```csharp\nprivate void UpdateDatabase()\n{\n  \
  \  int version = GetSchemaVersion(\"names\");\n    if (version == 0)\n    {\n  \
  \      List<string> commands = GetSqlCommands(ScriptsPrefix + \"NamesUpdate.00.sql\"\
  );\n        if (RunSqlCommands(commands))\n        {\n            version = GetSchemaVersion(\"\
  names\");\n        }\n    }\n    if (version == 1)\n    {\n        List<string>\
  \ commands = GetSqlCommands(ScriptsPrefix + \"NamesUpdate.01.sql\");\n        if\
  \ (RunSqlCommands(commands))\n        {\n            version = GetSchemaVersion(\"\
  names\");\n        }\n    }\n    if (version == 2)\n    {\n        List<string>\
  \ commands = GetSqlCommands(ScriptsPrefix + \"NamesUpdate.02.sql\");\n        if\
  \ (RunSqlCommands(commands))\n        {\n            version = GetSchemaVersion(\"\
  names\");\n        }\n    }\n}\n```\n\n`UpdateDatabase` 方法获取 `names` 架构的初始版本。如果未定义，它将默认为\
  \ `0`，这将导致运行第一个脚本。第一个脚本完成后，版本应重置为 `1`，然后下一个脚本将运行，遵循相同的模式。如果这是此更新过程的首次运行，所有三个更新脚本都将运行。你可以看到，在方法的末尾再添加一个块来引用新的更新脚本将是轻而易举的事情。\n\
  \n有几个私有方法，`GetSqlCommands` 和 `RunSqlCommands`，使这个更新过程得以运作。第一个方法如清单 9-28 所示。\n\n\
  ## 清单 9-28：GetSqlCommands 方法\n\n```csharp\npublic List<string> GetSqlCommands(string\
  \ scriptName)\n{\n    List<string> commands = new List<string>();\n    Type type\
  \ = GetType();\n    Stream stream = type.Assembly.GetManifestResourceStream(scriptName);\n\
  \    if (stream != null)\n    {\n        StringBuilder sb = new StringBuilder();\n\
  \        StreamReader sr = new StreamReader(stream);\n        string line = null;\n\
  \        while (sr.Peek() >= 0)\n        {\n            line = sr.ReadLine();\n\
  \            if (!CommandDelimiter.Equals(line))\n            {\n              \
  \  sb.AppendLine(line);\n            }\n            else\n            {\n      \
  \          commands.Add(sb.ToString());\n                sb = new StringBuilder();\n\
  \            }\n        }\n        if (!String.IsNullOrEmpty(sb.ToString()))\n \
  \       {\n            commands.Add(sb.ToString());\n        }\n    }\n    return\
  \ commands;\n}\n```\n\n`GetSqlCommands` 方法使用 `Assembly` 类上的 `GetManifestResourceStream`\
  \ 方法加载资源流。然后，它使用 `StreamReader` 逐行迭代，查找命令分隔符，该分隔符被定义为名为 `CommandDelimiter` 的常量。它被设置为标准的\
  \ `GO` 语句。每一行不匹配分隔符的内容都被添加到 `StringBuilder` 变量中。当遇到分隔符行时，`StringBuilder` 的值被添加到命令集合中，该集合最终传递给清单\
  \ 9-29 所示的 `RunSqlCommands` 方法。\n\n## 清单 9-29：RunSqlCommands 方法\n\n```csharp\nprivate\
  \ bool RunSqlCommands(List<string> commands)\n{\n    bool success = true;\n    using\
  \ (DbConnection connection = db.CreateConnection())\n    {\n        connection.Open();\n\
  \        DbTransaction transaction = connection.BeginTransaction();\n        try\n\
  \        {\n            foreach (string command in commands)\n            {\n  \
  \              using (DbCommand dbCmd = db.GetSqlStringCommand(command))\n     \
  \           {\n                    db.ExecuteNonQuery(dbCmd, transaction);\n   \
  \             }\n            }\n            transaction.Commit();\n        }\n \
  \       catch (Exception ex)\n        {\n            success = false;\n        \
  \    Trace.WriteLine(ex.Message);\n            // 回滚事务\n            transaction.Rollback();\n\
  \        }\n        connection.Close();\n    }\n    return success;\n}\n```\n\n\n\
  在 `RunSqlCommands` 方法中，传入的命令会在事务内逐条执行。如果任何一条命令失败，整个事务都将被回滚，并且指示命令是否成功执行的返回值将被设置为\
  \ `false`。\n\n**提示** 在开发用于更新数据库的嵌入式脚本时，你可以利用命令在事务中运行这一事实来防止脚本被提交。当你在更新脚本中添加语句时，可以在末尾放置一条无效语句以确保更改会被回滚；这样，你就可以继续处理脚本，而无需将数据库恢复到执行更新之前的状态。一旦你对更新脚本感到满意，就可以移除这个故意设置的错误。\n\
  \n确保数据库更新在每次应用程序更新时都到位的最后一步是，在每次应用程序启动时调用 `InitializeDatabase` 方法。对于网站，这可以通过在 `Global.asax`\
  \ 文件中使用 `Application_Start` 方法来完成（参见清单 9-30）。\n\n### 清单 9-30. Application_Start\
  \ 调用 InitializeDatabase\n```csharp\nvoid Application_Start(object sender, EventArgs\
  \ e)\n{\n    DatabaseManager dbm = new DatabaseManager();\n    dbm.InitializeDatabase();\n\
  }\n```\n\n现在，每次网站更新时，它都会运行 `InitializeDatabase` 方法，这将确保你的数据库架构是最新的。\n\n##### 自定义配置节\n\
  \n在前面的章节中，你在数据访问层中硬编码了连接字符串名称。如果你继续在数据访问层中硬编码此值，并构建与不同数据集一起工作的模块化组件，你可能会在每个组件中硬编码相同的值，这样你就不必为每个组件维护连接字符串配置。但是，假设你只有一个数据库连接是有问题的。它迫使你将所有数据放在同一个数据库中。\n\
  \n或者，你可以为每个组件使用唯一的连接字符串名称，这将要求你为每个组件维护一个连接字符串。这种方法提供了一些灵活性，但在配置中重复了多个连接字符串。另一种方法是，为每个组件使用指示要使用的连接字符串名称的应用程序设置。本章前面创建的与名称数据库一起工作的类库可以使用名为\
  \ `NamesDatabase` 的应用程序设置，该设置与要使用的连接字符串名称相匹配。这需要为每个组件完成。这可能是一种合理的方法。\n\n最后一种方法是创建自定义配置，允许你按自己想要的方式在选择的结构中设置值。这是通过利用现有的\
  \ `ConfigurationSectionGroup` 和 `ConfigurationSection` 类来完成的。在第 5 章中，你创建了使用自定义 `ConfigurationSection`\
  \ 的提供程序。通过提供程序基类，一些额外的工作已为你完成。在这里，你将构建一个自定义配置，手动读取全部内容，并在前面章节创建的 `DatabaseManager`\
  \ 类中使用它。\n\n你将构建一些类，这些类提供对将用于 `DatabaseManager` 的连接字符串名称的访问。一个类将代表配置组，而另一个将代表节。第三个类将是一个以编程方式加载配置的实用工具。\n\
  \n### 清单 9-31. Chapter09SectionGroup\n第一个类是 `Chapter09SectionGroup`，它继承自 `ConfigurationSectionGroup`\
  \ 并定义了一个属性。\n```csharp\nusing System.Configuration;\n\nnamespace Chapter09.Configuration\n\
  {\n    public class Chapter09SectionGroup : ConfigurationSectionGroup\n    {\n \
  \       [ConfigurationProperty(\"chapter09Group\")]\n        public Chapter09Section\
  \ Chapter09Section\n        {\n            get\n            {\n                return\
  \ (Chapter09Section)Sections[\"chapter09\"];\n            }\n        }\n    }\n\
  }\n```\n\n名为 `Chapter09Section` 的属性通过访问从基类继承的 `Sections` 属性，返回一个同名的类。\n\n### 清单\
  \ 9-32. Chapter09Section\n`Chapter09Section` 如下所示。\n```csharp\nusing System.Configuration;\n\
  \nnamespace Chapter09.Configuration\n{\n    public class Chapter09Section : ConfigurationSection\n\
  \    {\n        [ConfigurationProperty(\"connectionStringName\", DefaultValue =\
  \ \"chapter09\", IsRequired = true), StringValidator(MinLength = 1, MaxLength =\
  \ 50)]\n        public string ConnectionStringName\n        {\n            get\n\
  \            {\n                return (string) this[\"connectionStringName\"];\n\
  \            }\n            set\n            {\n                this[\"connectionStringName\"\
  ] = value;\n            }\n        }\n\n        [ConfigurationProperty(\"enableAutoUpdates\"\
  , DefaultValue = \"True\", IsRequired = false)]\n        public bool EnableAutoUpdates\n\
  \        {\n            get\n            {\n                bool enabled;\n    \
  \            bool.TryParse(this[\"enableAutoUpdates\"].ToString(), out enabled);\n\
  \                return enabled;\n            }\n            set\n            {\n\
  \                this[\"enableAutoUpdates\"] = value;\n            }\n        }\n\
  \    }\n}\n```\n\n`Chapter09Section` 类访问配置中的 `connectionStringName` 和 `enableAutoUpdates`\
  \ 属性。访问这些值的属性使用控制属性行为的特性进行装饰。`EnableAutoUpdates` 属性不是必需的，这允许在配置中未指定该值。当未指定时，将使用默认值。`ConnectionStringName`\
  \ 属性是必需的，如果在配置中未定义该属性时访问它，将导致异常。\n\n### 清单 9-33. Chapter09Configuration\n要加载此配置，你将使用一个名为\
  \ `Chapter09Configuration` 的实用工具类，如下所示。\n```csharp\nusing System.Configuration;\n\
  using System.Web;\nusing System.Web.Configuration;\n\nnamespace Chapter09.Configuration\n\
  {\n    public class Chapter09Configuration\n    {\n        public static Chapter09SectionGroup\
  \ GetConfig()\n        {\n            System.Configuration.Configuration config;\n\
  \            HttpContext context = HttpContext.Current;\n\n            if (context\
  \ != null)\n            {\n                string path = \"~\";\n              \
  \  config = WebConfigurationManager.OpenWebConfiguration(path);\n            }\n\
  \            else\n            {\n                config = ConfigurationManager.OpenExeConfiguration(ConfigurationUserLevel.None);\n\
  \            }\n\n            Chapter09SectionGroup chapter09Config =\n        \
  \        (Chapter09SectionGroup)config.SectionGroups[\"chapter09Group\"];\n    \
  \        return chapter09Config;\n        }\n    }\n}\n```\n\n`Chapter09Configuration`\
  \ 类有一个静态方法，该方法从 `GetConfig` 方法返回 `Chapter09SectionGroup` 类。此方法适用于网站以及控制台和桌面应用程序等其他应用程序。如你所见，它根据\
  \ `HttpContext` 的值使用 `WebConfigurationManager` 或 `ConfigurationManager`，该值在网站内运行方法时定义。配置加载后，它使用\
  \ `SectionGroups` 集合返回名为 `chapter09Group` 的组，该组与 `Chapter09SectionGroup` 类对应。为了使这些类与名称对应，有必要在配置文件中配置自定义节。此定义如清单\
  \ 9-34 所示。\n\n### 清单 9-34. 自定义节定义\n```xml\n<configSections>\n  <sectionGroup name=\"\
  chapter09Group\"\n                type=\"Chapter09.Configuration.Chapter09SectionGroup,\
  \ Chapter09\">\n    <section name=\"chapter09\"\n             type=\"Chapter09.Configuration.Chapter09Section,\
  \ Chapter09\"/>\n  </sectionGroup>\n</configSections>\n```\n\n名称和类型由自定义节定义，其中节包含在组中。自定义配置的其余部分如清单\
  \ 9-35 所示。\n\n### 清单 9-35. 自定义配置\n```xml\n<chapter09Group>\n  <chapter09 connectionStringName=\"\
  chpt09\" enableAutoUpdates=\"True\"/>\n</chapter09Group>\n```\n\n\n\n由于 `enableAutoUpdates`\
  \ 属性是可选的，如果你想使用默认值（设置为 `True`），可以省略它。现在，你可以根据需要配置任意多个连接字符串，并通过这个自定义配置节指向你选择的那个，同时启用或禁用这个自动更新功能。\n\
  \n对数据库更新过程的一个潜在改进是，为更新过程定义一个独立的连接字符串名称，使其与数据访问层的其余部分分开。更新脚本需要普通 Web 应用程序所不需要的权限，因此，与其为整个应用程序提升权限，不如定义一个具有必要权限的特殊连接。这将提高应用程序的安全性。为了进一步改进，你可以在部署过程中启用这个特殊连接的用户账户，并在完成后将其禁用。这样做将确保无法运行更新，并阻断对拥有提升权限的账户的访问。\n\
  \n#### 总结\n\n在本章中，我介绍了网站和数据库的部署，以及如何利用自定义配置。通过简化部署和配置流程，你可以更轻松地为应用程序推送更多更新，并且由于脚本将人为错误最小化，每次部署的风险也更低。能够及时推送更新将非常有助于适应生产环境的性能需求。本章涵盖的自动化任务也将解放你更多的时间，让你能够专注于性能改进，而不是忙于推送文件这类繁琐工作。\n\
  \n8601Ch10CMP3 8/25/07 1:09 PM Page 289\n\nC H A P T E R 1 0\n\n示例应用程序\n\n现在，你可以将本书中涉及的多个部分组合起来，创建一个灵活且高性能的应用程序。你的目标是构建一个模块化的应用程序，从一个清晰的数据访问层开始，每个业务对象都根据其所在领域的数据以及对象之间的关系明确定义。\n\
  \n本章涵盖以下内容：\n\n- 理解性能和可扩展性\n- 创建数据库\n- 创建数据访问提供程序\n- 管理关系\n- 使用自定义配置\n- 实现 LINQ\
  \ 提供程序\n- 实现 WCF 提供程序\n\n在之前的所有章节中，创建高性能应用程序的一个隐含原则是：良好的设计和灵活性比过早优化你的应用程序更为重要。除非你有一个成品在实际负载下运行，否则你不会真正知道会在哪里遇到性能问题。而且，负载可能会随着时间的推移以意想不到的方式发生变化。如果你在开发周期中过早地开始优化性能，你可能会将自己锁定在一个无法扩展的方法上。\n\
  \n### 理解性能与可扩展性\n\n区分性能和可扩展性很重要。两者相关，但并非同一回事。随着你的网站使用量越来越大，它将需要处理越来越多的请求，并且需要在不增加每个请求成本的情况下做到这一点。如果你从\
  \ 1,000 名用户开始，每个请求都在一秒内处理完毕，那么当你达到 100,000 名用户时，你会希望保持这种服务水平。如果你一开始就有一个性能极佳的网站，你可能永远不会有扩展性问题。但是，可能会出现每个请求的成本开始增加的临界点，那时你需要应用本章中的方法，以恢复到让最初那\
  \ 1,000 名用户满意的服务水平。\n\n在第 6 章中，我提到过，你常常可能成为自己最大的敌人，因为你过于频繁地访问数据库，以至于本质上造成了针对数据库的磁盘读取交通堵塞。\n\
  \n289\n\n8601Ch10CMP3 8/25/07 1:09 PM Page 290\n\n290\n\nC H A P T E R 1 0 ■ 一 个\
  \ 示 例 应 用 程 序\n\n频繁的读取也会在网络上造成交通堵塞，这会使处理请求的时间加倍甚至三倍。这种高负载场景会导致每个请求的成本急剧增加。对于计算机来说，一秒钟可能漫长无比。而且，当你的网站在正常负载下接收到的许多请求都能在不到一秒的时间内处理完毕时，你可以想象，将缓存超时设置为五秒，即使用户可能看不到性能上的任何变化，也会影响应用程序的可扩展性。你消除了对数据库的调用，同时也节省了处理器上的时钟周期。设置缓存超时是极好的第一步，将使你受益匪浅。\n\
  \n一个典型的网站每天可能收到 5,000 到 100,000 次页面请求。\n\n一天有 86,400 秒，从表 10-1 中你可以看到页面请求通常是如何分布的。\n\
  \n**表 10-1.** 请求之间的间隔时间\n\n| 每日请求数 | 请求间隔时间 |\n| :--- | :--- |\n| 5,000 | 16.78\
  \ 秒 |\n| 100,000 | 0.86 秒 |\n| 500,000 | 0.17 秒 |\n\n表 10-1 是对网站流量的过度简化表示，但它说明了性能和可扩展性之间的区别。当一个网站每天只有\
  \ 5,000 次点击时，解决可扩展性问题并不重要，特别是当单个请求耗时不到一秒时。如果一个网站每天有 100,000 次点击，请求之间的平均间隔时间降至一秒以下，但请求之间的间隔时间仍然超过半秒。请求之间仍然有一点时间，因此你不会有并发请求。100,000\
  \ 次点击与 5,000 次点击之间的差异代表了一个巨大的窗口期，我假设大多数网站，尤其是内联网 Web 应用程序，都属于这个范围。而当一个网站达到 500,000\
  \ 次或更多点击时，可扩展性就成了一个主要问题。当你的 Web 应用程序流量达到这种频率时，你将需要探索如何通过某种方式来分散负载。\n\n##### 并发请求\n\
  \n性能与可扩展性的交汇点出现在并发请求数量开始增加每个请求的成本时。如果当前正在处理十个请求，并且每个请求都锁定了数据库中的一个常用表——哪怕只是片刻——这些请求可能会被延迟，它们的成本也会增加。但如果每个请求都能高效地访问数据库，而不干扰其他请求，你将获得你想要的可扩展性。\n\
  \n你的网站上一个频繁请求的页面可能没有明确地锁定一个表。它可能是在更新过程中间接锁定了一个你没有预料到的索引。我们通常期望索引能提高性能，但有时它们会产生相反的效果。当你遇到并发问题时，你可以咨询你的\
  \ DBA 以确定什么资源被锁定了。如果涉及索引，你可能需要使用不同类型的索引或完全删除该索引，这样你的并发问题就会消失。你也可以保留索引，但批量更新它，使其不会发生得如此频繁。\n\
  \n8601Ch10CMP3 8/25/07 1:09 PM Page 291\n\nC H A P T E R 1 0 ■ 一 个 示 例 应 用 程 序\n\
  \n291\n\n■**注意** 越来越多的服务器，甚至个人电脑，都配备了多个处理器。购买配备双核或四核处理器、能处理大量并发请求的新服务器已很常见。应尽可能利用这些强大的新功能，使你的应用程序和用户受益。你还需要确保不会因为将辅助工作卸载到其他服务器（例如处理已提交的订单）而在进程外处理不必要的任务时浪费处理能力。\n\
  \n##### 瓶颈\n\n\n\n# 第 10 章：示例应用程序\n\n如果在排查性能瓶颈时，你总是关注那些常见的“嫌疑对象”，可能就会忽略其他真正构成瓶颈、真正制约可扩展性的区域。多年前有一份报告对比了\
  \ Linux 上 Apache 网络服务器与 Windows NT 上 IIS 的可扩展性。报告显示，在高负载情况下 IIS 能够处理更多的请求。许多开发者质疑该报告的准确性，因为当时\
  \ Apache 是最流行、最高效的网络服务器，而 IIS 则被视为新入局者，且曾饱受各种问题困扰。事实证明，瓶颈与网络服务器关系不大。Apache 的问题根源在于\
  \ Linux 内部使用的锁定机制只允许有限数量的并发网络连接进入 Apache 服务器，而 Windows NT 采用线程模型，允许更多并发请求进入 IIS。因此，无论你如何配置\
  \ Apache 服务器，都不可能让它比 IIS 更快。因为它根本就不是最薄弱的环节。\n\n同样地，你可能会发现你的网站并非应用程序中最薄弱的环节。问题可能出在数据库，甚至可能是网络。网络设备的质量可能是罪魁祸首，或者服务器之间的网络线缆质量不佳。我曾经有一台电脑，使用了一张\
  \ 15 美元购买的网卡。我本可以购买 100 美元的网卡，但当时我认为两者标称速度相同，看不出区别。我用了便宜的网卡，大多数时候工作正常，但当我尝试通过网络传输多个大文件时，网卡就失效并丢失了连接。事实证明，更贵的网卡性能更优；因为它有更多缓冲区，能够处理将大量大文件复制到远程计算机的那种负载。那次经历让我明白，有时我可以通过更换一个\
  \ 15 美元的硬件来加速应用程序，而不是购买一台新的、价值 10,000 美元的服务器，却让真正的瓶颈依然存在。\n\n要找到你的瓶颈，你需要测量系统每个部分的性能。你可能会惊喜地发现，有时最简单的调整就能提升性能。\n\
  \n## 流量激增\n\n表 10-1 中显示的请求平均间隔时间并不能真实反映流量模式。没有任何保证能让发往你网络服务器的请求如此均匀地间隔开。实际上，绝大多数网络流量看起来像一条钟形曲线。如果你的网站主要由邻近时区的人使用（通常情况如此），那么使用\
  \ 24 小时制来看，你的大部分流量肯定会出现在白天。在美国，当东海岸是早上 6 点时，你网站的流量就会开始增加；当西海岸晚上 10 点过后，流量开始下降。而通常在中午时分，你会看到流量达到峰值，具体取决于你网站提供的内容。像新闻网站这样的站点，在午餐时间人们查看新闻头条时，流量会急剧飙升。\n\
  \n鉴于这些流量激增，你不能假设一个一天总共获得 10 万次点击的网站，在可扩展性成为问题之前，有 0.86 秒的时间来处理每个请求。由于规律性的流量激增或你的某些操作，你的网络服务器可能在一天中的几个关键时间点不堪重负。如果你运营一个资讯类网站，并向数百万读者发送电子邮件通讯，那么在通讯发出后的几小时甚至几天内，你可能会突然迎来一波流量高峰。像\
  \ Digg (`www.digg.com`) 和 Slashdot (`http://slashdot.org`) 这样的网站拥有数百万读者，这些读者都被引导至其首页展示的头条新闻。这导致那些被\
  \ Digg 和 Slashdot 链接到的、毫无防备的网站，在极短时间内获得巨大的流量。这种效应被称为 ***Slashdot 效应***，以让那些未准备好应对流量激增的网站下线而闻名。最近，Digg\
  \ 变得极其流行，因此你的网站也可能受到 ***Digg 效应*** 的冲击。你可能只是发布了一篇有趣的博客文章或照片，而足够多的 Digg 用户认为它有价值。这种事情的发生确实毫无预警。\n\
  \n## 应对 Digg 效应\n\n我的网站曾两次被 Slashdot 和 Digg 冲击，通过针对最初的流量激增做出一些调整，我得以安然度过风暴。在这两个案例中，内容都托管在\
  \ Apache 网络服务器上，我只是简单地调整了配置，以应对我的中等性能服务器上新增的负载。内容本身已经准备就绪，因为它们被设置为静态内容，Apache 可以直接从内存中提供服务，类似于\
  \ ASP.NET 的输出缓存。对于 Apache 网络服务器而言，瓶颈是由我允许创建的、用于处理请求的子进程数量所导致的。对于 IIS 来说，这不是问题，因为\
  \ IIS 是完全线程化的，现代的 Apache 2.0 安装也是如此，至少能够根据传入请求数量进行扩展。但是，如果每个请求多次访问数据库，你可能会发现瓶颈并非网络服务器。\n\
  \n这些遭遇流量巨大激增的时刻，需要一个应急响应计划。\n\n我记得 9/11 袭击的那个悲惨日子，当时所有人都拼命寻找他们能找到的任何新闻，想了解正在发生什么。我当时浏览的网站之一是\
  \ CNN.com。我看到该网站在当天早些时候还是我们常见的完整版面，首页布满繁忙的链接和广告，后来就只剩下几个链接和一个头条。他们显然在努力应对这股流量激增，这无疑是他们以前从未经历过的。他们成功地保持了网站的在线状态，并将关键新闻传递给了读者。\n\
  \n有些时候，你知道流量会激增。在超级碗期间，NFL 网站承受着巨大的负载。运营该网站的人可以全年为此做准备，通常会为当年的超级碗设立一个专门的网站，在比赛前和比赛期间将所有流量引导至此。当橄榄球迷们一边在电视屏幕上观看比赛，一边从网站上获取最新统计数据时，该网站的流量会非常密集。交互式应用程序会展示球场示意图，并提供比赛的所有细节，持续更新。每次网络应用程序访问服务器，都会获取有关...\n\
  \n\n\n球所在的线段、哪方控球以及当前是第几档进攻。这些通常都是基于 Adobe Flash 的应用程序，它们能够访问网页服务器之外的不同来源，并能处理经过优化以降低整体带宽需求的数据流。发送\
  \ 4KB 的数据流肯定比让用户每更新一次就刷新 50KB 的页面要好得多。通过采用另一种更高效的通信方案来管理数据流，高负载就能得到更有效的管理。\n\n#####\
  \ 分配流量\n\n流量可以进行分配，这样即使你每天有 50 万次点击，也可以将它们分散到五台服务器上，从而有效地使每台服务器每天处理 10 万次点击。这种网站集群（web\
  \ farm）方法相当普遍，并得到负载均衡硬件的支持。你甚至可以利用这样一个事实：通过域名系统（DNS），一个主机名可以关联多个 IP 地址。当一个网站的主机名配置了多个\
  \ IP 地址时，网络浏览器会循环使用每个 IP 地址。这种技术被称为 `Round Robin DNS`（循环 DNS）。像 `www.cnn.com` 和\
  \ `www.microsoft.com` 这样的网站，就为其网站地址配置了多个 IP 地址，以便从负载分配中获益。图 10-1 显示了在 `www.cnn.com`\
  \ 和 `www.microsoft.com` 上运行 `nslookup` 实用程序的结果。你可以看到这两个网站都有多个 IP 地址。\n\n**图 10-1.**\
  \ `Round Robin DNS`\n\n由多台服务器组成、连接到一个共同的数据库服务器的网站集群，可以有效地分配处理负载。结合良好的数据缓存策略，网站集群还可以减轻数据库的负载。\n\
  \n除了仅通过 DNS 进行逻辑分配外，你还可以将硬件分布到多个物理网络。你可以在几个主要城市的托管设施中放置服务器，这些设施接入互联网的主要骨干网，这将保证所有用户都能可靠、快速地访问你的网站。我住在密尔沃基，记得\
  \ 1998 年有几次，在安装新线路时，密尔沃基和芝加哥之间的主干线被切断了。当时，还没有像现在这样通往麦迪逊和明尼阿波利斯等其他地点的冗余线路。我们接到客户的电话，说他们无法访问我们为他们托管的网站，尽管这些网站是在线的，甚至从城市内的不同地点也可以访问。如果这些网站被托管在多个托管设施中，可能只有极小一部分用户无法访问，或者根本不受影响。\n\
  \n##### 分配内容\n\n虽然分配网站流量可以提供访问速度和可靠性，但你也可以通过分配你发布的内容来获得类似的益处。网站上的大量带宽可能用于图像和其他静态媒体。没有理由让所有这些内容都来自同一个网络服务器。你可以将包含所有动态页面的\
  \ ASP.NET 网站部署在一台服务器上，而将所有媒体部署在另一台服务器上，或者将媒体分布在多台服务器上。这样，生成动态页面的服务器就能被释放出来，专注于处理个性化内容。\n\
  \n多年来，苹果、微软、`Amazon.com` 和 Facebook 都使用了将媒体分散到庞大网络服务器群上的服务，这使他们能够应对因定期发布新产品和服务而出现的流量高峰。\n\
  \n### 托管在 AKAMAI 上\n\n多年来，主要网站使用的流行内容分发网络一直是 `Akamai` (`www.akamai.com`)。它提供的主要服务一直是图像缓存，尽管后来也扩展到了动态和个性化内容。如果你查看\
  \ `images.apple.com`，你会看到在主机名下面，内容是由 `Akamai` 托管的。\n\n将内容分配到单独网站的一个有用之处在于，你可以充分利用\
  \ HTTP 提供的传输机制，例如过期头（这是响应内容之前的众多头信息之一）。当你使用输出缓存时，会设置过期头。如果用户在过期时间内返回到该页面，该用户的网络浏览器可能直接从本地浏览器缓存中读取内容。\n\
  \n当大量用户位于使用过期头来保存你网站内容的缓存代理后面时，客户端缓存会得到进一步增强，这样你就不必为每个请求提供服务。像 AOL 这样的大型互联网服务提供商（ISP）曾使用大型代理来减少其网络上的带宽，从而惠及用户并降低成本。在大多数用户使用拨号调制解调器、带宽有限的时候，减少带宽是\
  \ AOL 的一个主要关注点。最近，Google 推出了他们的网络加速器服务，本质上是一个缓存大量内容的巨型代理。然而，它无法缓存动态内容，这包括所有未启用输出缓存而生成的\
  \ ASP.NET 网站。\n\n如果你的网站有大量的静态内容，比如图像、样式表和 JavaScript，你将从客户端缓存中获益匪浅，尽管这些好处并不是绝对的。事实上，在\
  \ ASP.NET 网站上放置此类内容可能会妨碍它获得尽可能多的缓存，因为 ASP.NET 网站上的每一段内容都与构成匿名和认证会话的 Cookie 相关联。缓存代理将不得不假设，用户从你网站拉取的、带有\
  \ Cookie 的静态内容对该用户来说必须是唯一的。这样，代理就不会为你网站每个页面使用的、用于所有共享代理后面用户的那个 35KB 的页头图形进行缓存。你可以做的是，将你的静态内容放置到一个未配置为\
  \ ASP.NET 网站的子域上，这样就完全不涉及 Cookie。你需要确保，如果你的主网站运行在 `www.acme.com`，而你的图片运行在 `images.acme.com`，你的\
  \ Cookie 不要被笼统地设置为来自 `acme.com`，否则会导致 Cookie 与图片相关联。\n\n当你的静态内容符合大多数代理遵循的标准后，你将开始通过利用你直接控制范围之外的资源，真正从内容分发中受益。然而，你需要小心处理静态内容。我从一位\
  \ Yahoo!开发者的演讲中了解到代理在处理 Cookie 时遇到的问题，他解释说，他们对静态图片采用一次性使用策略。图片发布后就不能更改。相反，他们必须将更新后的图片发布到一个新的\
  \ URL，并将他们的页面指向它。这种方法旨在确保无论客户端缓存多么激进，他们的用户都能获得正确的图片。对于再次成为现代 Web 应用关键部分的 JavaScript，也可以采用同样的方法。\n\
  \n### 使用静态文件开发\n\n\n\n在开发过程中为静态文件重命名并不是一个现实的选项。我倾向于在脚本引用末尾添加一个唯一的查询字符串（`script.js?20070707`），以确保当它被部署到测试环境的暂存服务器时，质量保证团队能够获取到最新版本的脚本。这省去了我需要对不断变化的文件名进行版本控制的麻烦，同时也使应用程序与最新版本保持一致。当网站发布给用户时，我可以重命名脚本文件，加入一个任意的唯一版本号，以确保在新网站上线当天，用户不会使用到旧版本的脚本。我发现对于样式表，有时也有必要这样做，尤其是在\
  \ Internet Explorer 中，它非常不情愿替换其本地缓存的项目。\n\n## 分布式服务\n\n你还可以将网站的动态内容拆分到多个子域名中。CNN.com\
  \ 可以将其网站拆分为多个子域名，例如 `weather.cnn.com`、`politics.cnn.com`、`entertainment.cnn.com`\
  \ 和 `sports.cnn.com`。Google 已经将其服务拆分到诸如 `maps.google.com`、`mail.google.com` 和 `news.google.com`\
  \ 等站点。通过将每个服务设置为以更独立的方式运行，你将获得在单一庞大网站中无法实现的灵活性。每个子域名都将专用于特定的服务。\n\n将服务拆分到不同的服务器上后，你将能够独立管理每个网站。如果负责地图网站的开发团队准备好发布新版本，该团队可以这样做，而无需担心它会如何影响邮件和新闻网站（因为它们与地图网站是解耦的）。\n\
  \nGoogle 的邮件和新闻网站可能拥有自己的服务器和发布计划，它们之间的依赖性极低。然后，每个网站可以通过使用其单点登录功能作为一个整体运作，该功能统一了所有\
  \ Google 网站，很像你可以使用 `ASP.NET Membership Provider` 为你自己的网站所做的那样。\n\n如果你能将你的网站拆分成多个部分，并将它们分布在多个服务器上，同时分解开发和发布计划，那么你就可以将一个笨重的网站塑造成多个从技术和项目管理角度都更易于管理的网站。随着某项服务的流量增加，你可以向承载该服务的\
  \ Web 集群中添加更多 Web 服务器以提升整体性能。你的服务也可以跨服务器重叠。表 10-2 展示了一个为大型公司服务、跨多个子域名拆分的企业内部网站。这些服务按人力资源（HR）、工时表（TS）、应付账款（A/P）、应收账款（A/R）和合同（C）分组。\n\
  \n**表 10-2.** *重叠服务*\n\n| **服务器** | **HR** | **TS** | **A/P** | **A/R** | **C**\
  \ |\n| :--- | :---: | :---: | :---: | :---: | :---: |\n| Web01 | X | | | | X |\n\
  | Web02 | | X | | | X |\n| Web03 | | | X | | |\n| Web04 | | | | X | |\n| Web05 |\
  \ X | | X | | |\n| Web06 | | X | | X | |\n| Web07 | X | | | X | |\n| Web08 | | X\
  \ | X | | |\n| Web09 | X | X | | | |\n| Web10 | | | X | | X |\n\nWeb 集群中有十台服务器，服务可以分布在它们中的每一台上。然而，为了降低维护成本，服务只被放置在足够多的服务器上以提供所需的服务水平。那些流量大得多且需要更多资源的应用程序，例如\
  \ A/P 和 A/R，各自被放置在五台服务器上。这些服务也分布在不同的服务器上，因此没有 A/P 服务托管在 A/R 服务器上。与此同时，使用较少的应用程序，如合同、人力资源和工时表，则分散在十台服务器上以确保均匀分布。对这十台服务器的流量可以通过\
  \ `Round Robin DNS` 或负载均衡路由器来管理。\n\n## 分布式后端\n\n上一节的方法拆分了前端流量，但由于瓶颈通常在数据库，你需要考虑拆分各种数据分组，以便运行多个数据库服务器。对于上一节的企业内部网示例，拆分可以轻松地沿着五项服务进行：人力资源、工时表、应付账款、应收账款和合同。最初，当你着手创建分布式后端时，你可以在物理分布数据库之前很久就先进行逻辑规划。`SQL\
  \ Server` 可以采用单一逻辑数据库，其中每个表和存储过程都经过精心管理，以确保它们不会随时间推移而变得相互依赖；或者你可以在同一物理服务器上运行多个逻辑数据库。之后，随着公司发展到单一物理服务器不够用时，你可以将一个或多个数据库移动到第二台服务器上，以实现后端的物理分布。表\
  \ 10-3 显示了一个拥有单一数据库服务器的小型公司的初始配置。\n\n**表 10-3.** *小型公司配置*\n\n| **主机名** | **数据库名称**\
  \ | **服务** | **数据库** |\n| :--- | :--- | :--- | :--- |\n| `hrdb.acme.com` | HR |\
  \ Human Resources | `DB1` |\n| `tsdb.acme.com` | TS | Timesheets | `DB1` |\n| `apdb.acme.com`\
  \ | AP | Accounts Payable | `DB1` |\n| `ardb.acme.com` | AR | Accounts Receivable\
  \ | `DB1` |\n| `contactsdb.acme.com` | Contracts | Contracts | `DB1` |\n\n表 10-3\
  \ 显示了处理企业内部网站所有服务的五个数据库的配置。一家小型公司只需要一个数据库，因此每个主机名都指向 `DB1` 数据库，其内部 IP 地址可能是 `10.10.1.101`。每个主机名都指向该\
  \ IP 地址。稍后，当数据库被分布到独立的物理服务器时，数据将被迁移，DNS 记录将被更新，而应用程序配置只要使用了这些主机名配置，就保持不变。\n\n清单\
  \ 10-1 显示了 `AP` 数据库的连接字符串。\n\n**清单 10-1.** *AP 数据库连接字符串*\n`Data Source=apdb.acme.com;Initial\
  \ Catalog=AP;Integrated Security=True`\n\n当公司成长并且应用程序性能需要提升时，你可以将负载最大的数据库移动到新的数据库服务器上，这台服务器的硬件性能可能比公司规模较小、预算较少时创建的初始数据库服务器强大得多。现在，你可能不再只是基本的\
  \ `RAID` 和双处理器服务器，而是升级到配备四处理器服务器的 `SAN`，它可以处理你排名前两位的数据库。这个更新后的配置如表 10-4 所示。\n\n\
  **表 10-4.** *成长中公司配置*\n\n| **主机名** | **数据库名称** | **服务** | **数据库** |\n| :--- | :---\
  \ | :--- | :--- |\n| `hrdb.acme.com` | HR | Human Resources | `DB1` |\n| `tsdb.acme.com`\
  \ | TS | Timesheets | `DB1` |\n| `apdb.acme.com` | AP | Accounts Payable | `DB2`\
  \ |\n| `ardb.acme.com` | AR | Accounts Receivable | `DB2` |\n| `contactsdb.acme.com`\
  \ | Contracts | Contracts | `DB1` |\n\n在 A/P 和 A/R 服务的数据库被移动后，`apdb.acme.com` 和\
  \ `ardb.acme.com` 的 DNS 记录可以指向新服务器的 IP 地址 `10.10.1.102`。更改为新 IP 不会立即生效，因为 `DNS`\
  \ 记录通常有一个 30 分钟或一小时的“生存时间”设置。要使更改立即生效，你需要在应用程序服务器上清除 `DNS` 缓存，强制它们获取最新的 `DNS` 信息，并开始将正确的请求路由到相应的数据库。在过渡期间的一段时间内，你可能希望将\
  \ A/P 和 A/R 数据库设置为`只读`，并在迁移后让它们在线运行一段时间。\n\n## 可扩展性规划\n\n\n\n本章至此介绍的所有建议，意味着当您开始遇到成长性痛点时，有多个选项可供选择。不幸的是，在了解如何提高应用程序的可扩展性与实际能够做到之间，存在着巨大的鸿沟。尽管您肯定不希望立即着手让自己的小网站能支撑\
  \ 10 亿用户，但您也不应忽视您的软件应具备足够的灵活性，以适应不断变化的需求。\n\n## 构建灵活的 Web 应用程序\n\n通读本书，您已经深入研究了\
  \ `ASP.NET` 环境中协助我们构建快速网站的技术和特性。现在，您将致力于将这一切整合为一个灵活的 Web 应用程序，它易于构建，也易于适应变化的需求。随着网站负载的增加，软件设计将允许您更换需要新方案的组件，而无需迫使整个系统做出改变。但您需要确保能够以最小的努力起步。如果永远无法获得第一个用户，就永远不可能获得百万用户，因此您将从一些简单的基线需求开始。\n\
  \n### 初步设计考虑因素\n\n首先，您需要将业务对象拆分成若干组，并使用自定义提供程序模型进行管理。每个业务分组都将独立管理，而业务对象之间的关系将通过系统设计来处理。您还将为未来的提供程序创建原型，以确保当需要以多种方式分发应用程序时，您已做好准备，无需进行大量返工。\n\
  \n构建高度可扩展的系统在硬件和时间方面可能成本高昂，而且因为您无法预知应用程序的哪个部分将来需要关注，所以最佳策略是简单地准备好适应，而不是将所有时间和精力投入到一个可能永远不会出现的问题上。让性能问题随着时间的推移自然显现。您可以确保自己已为此做好准备。\n\
  \n> **注意** 最好主动收集影响应用程序的所有指标，从每小时的请求数到系统中每台服务器的内存、磁盘和处理器使用率。当您看到数字发生变化时，应该能够解释这些变化并根据需要做出调整。这些指标应能让您看到趋势，从而能够未雨绸缪，并在必要时采取适当措施。如果网站的访问量具有季节性，例如在特定月份出现更高的流量峰值，您应该使用去年同月的数字，结合您在整个年度中看到的渐进式变化，来预测该流量增长。您的目标应该是让应用程序的容量始终保持在预计使用量之上。\n\
  \n#### 示例应用程序\n\n本章的示例应用程序将是一个 `.NET` 用户组的网站。该网站将展示即将举行的会议信息，包括演讲者和赞助商的详细信息。它还将提供职位列表功能。其中一些项目之间存在关联关系，例如地点将与每个活动、每个职位以及每个赞助商相关联。与地点对象的关联是一种必须管理的依赖关系，例如，如果一个地点同时关联到一个活动和一个职位，那么在删除该地点时，不能连带删除关联的职位。\n\
  \n##### 创建数据库\n\n我们将像前面章节那样创建数据库：通过构建一个数据库项目，其中包含用于定义表、存储过程和约束脚本的脚本。数据库中的对象将如表 10-5\
  \ 所示。\n\n**表 10-5.** 数据库中的对象\n\n| 表 | 对象 |\n| :--- | :--- |\n| `dug_Events` | `Event`\
  \ |\n| `dug_Jobs` | `Job` |\n| `dug_JobContacts` | `JobContact` |\n| `dug_Locations`\
  \ | `Location` |\n| `dug_Speakers` | `Speaker` |\n| `dug_Sponsors` | `Sponsor` |\n\
  \n\n\n每张表都将共享相同的基本结构：主键被定义为一个名为 `ID` 的 `bigint` 类型字段，以及名为 `Created` 和 `Modified`\
  \ 的 `DateTime` 值字段，这些字段会在记录创建和更新时自动设置。主键被设置为一个标识值，在创建新记录时会自动递增。另一种做法是，主键可以根据表的内容具体命名，例如\
  \ `EventID`，这是一种常见的实践。遗憾的是，这种做法使得以通用方式处理所有记录变得困难，而这正是我们下一节将要采用的方式。\n\n## 按日期分区\n\
  \n由于数据库中的每条记录都设置了 `Created` 和 `Modified` 日期，因此可以基于这些值对数据库进行分区。主分区可以包含所有在最近三个月内有修改日期的记录，而其他所有记录则属于另一个分区，该分区实际上充当了数据的归档。最初，这种分区方案可能不是必需的，甚至可能永远都不需要。但对于一个向数据库生成大量记录的高流量网站来说，这种方法将是一个有用的选择。\n\
  \n像 Digg 这样的网站可以使用几个分区。一个可以用于当前周，另一个用于最近三个月，还有一个用于超过最近三个月的所有内容。因为用户通常阅读和互动的是最新内容页面，所以第一个分区的访问频率最高，需要最快的物理数据访问速度。另外两个分区对速度的要求相对较低，但需要大量的存储空间。由于性能要求不高，归档分区的成本将显著降低；而主分区的空间需求被最小化，其成本也将低于一个需要高性能的大规模存储系统。\n\
  \n8601Ch10CMP3 8/25/07 1:09 PM Page 300\n\n**300**\n\n第 10 章 ■ 示例应用程序\n\n## 获取、保存和删除\n\
  \n数据操作方法将遵循第 7 章介绍的获取、保存和删除方法。每个为 `Event` 获取数据的存储过程都将返回相同的列，因此可以为每个存储过程一致地创建一个 `Event`\
  \ 实例。对于 `Event`，我们将使用以下存储过程：`dug_GetEvent.sql`、`dug_GetAllEvents.sql` 和 `dug_GetEventsByDate.sql`。代码清单\
  \ 10-2 显示了 `dug_GetEvent.sql`，它返回与给定键匹配的单条记录。\n\n### 代码清单 10-2. dug_GetEvent.sql\n\
  \n```sql\nIF EXISTS (SELECT * FROM sysobjects WHERE type = 'P' AND name = 'dug_GetEvent')\
  \ BEGIN\n    DROP Procedure dug_GetEvent\nEND\nGO\n\nCREATE Procedure dbo.dug_GetEvent\n\
  (\n    @EventID bigint\n)\nAS\n    SELECT\n        ID, Title, Description, MeetingDate,\
  \ Created, Modified\n    FROM dug_Events\n    WHERE ID = @EventID\nGO\n\nGRANT EXEC\
  \ ON dug_GetEvent TO PUBLIC\nGO\n```\n\n访问网站的用户大多会对即将发生的事件感兴趣，因此，除了提供访问特定事件或所有事件的功能外，我们还将创建一个名为\
  \ `dug_GetEventsByDate` 的存储过程，该过程返回从现在到作为参数传入的目标日期之间的所有事件。使用这个简单的存储过程代表了“设计时性能”而非“优化时性能”，因为这种需求在设计阶段很容易被预见到。显然，如果数据库中最终有\
  \ 1000 个事件，并且大多数是过去的事件，那么获取所有记录然后只显示未来几个月的事件将会产生不必要的开销。此存储过程如代码清单 10-3 所示。\n\n###\
  \ 代码清单 10-3. dug_GetEventsByDate.sql\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
  \ WHERE type = 'P' AND name = 'dug_GetEvent') BEGIN\n    DROP Procedure dug_GetEvent\n\
  END\nGO\n\n8601Ch10CMP3 8/25/07 1:09 PM Page 301\n\n第 10 章 ■ 示例应用程序\n\n**301**\n\
  \nCREATE Procedure dbo.dug_GetEvent\n(\n    @EventID bigint\n)\nAS\n    SELECT\n\
  \        ID, Title, Description, MeetingDate, Created, Modified\n    FROM dug_Events\n\
  \    WHERE ID = @EventID\nGO\n\nGRANT EXEC ON dug_GetEvent TO PUBLIC\nGO\n```\n\n\
  \n\n并且由于 `dug_GetEventsByDate` 存储过程使用 `MeetingDate` 列作为过滤条件，如果表变得很大，它就成为索引的合理候选——但当数据库只有少量记录时，这并非绝对必要。你可能可以轻松地多年不用为\
  \ `MeetingDate` 列建立索引。请记住，维护索引也会增加数据库的负载，因此，向表中添加的索引越少，给系统带来的额外开销就越小。\n\n保存事件（Event）记录的脚本\
  \ `dug_SaveEvent.sql`，接收与事件相关的所有值，以及 `OldEventID`（如果事件已存在于数据库中且正在被更新，则此值会被定义），和一个名为\
  \ `EventID` 的输出参数。无论保存过程中执行的是更新还是插入语句，`EventID` 都会被设置。代码清单 10-4 展示了这个保存过程。\n\n**代码清单\
  \ 10-4.** `dug_SaveEvent.sql`\n\n```\nIF EXISTS (SELECT * FROM sysobjects WHERE\
  \ type = 'P' AND name = 'dug_SaveEvent')\nBEGIN\n    DROP Procedure dug_SaveEvent\n\
  END\nGO\n\nCREATE Procedure dbo.dug_SaveEvent\n(\n    @Title nvarchar(50),\n   \
  \ @Description text,\n    @MeetingDate datetime,\n    @SpeakerID bigint,\n    @SponsorID\
  \ bigint,\n    @LocationID bigint,\n    @OldEventID bigint,\n    @EventID bigint\
  \ OUTPUT\n)\nAS\nBEGIN\n    IF (@OldEventID < 0)\n    BEGIN\n        INSERT INTO\
  \ dug_Events\n            (Title, Description, MeetingDate, SpeakerID,\n       \
  \      SponsorID, LocationID, Created, Modified)\n        VALUES (\n           \
  \ @Title,\n            @Description,\n            @MeetingDate,\n            @SpeakerID,\n\
  \            @SponsorID,\n            @LocationID,\n            GETDATE(),\n   \
  \         GETDATE()\n        )\n\n        SELECT @EventID = @@IDENTITY\n    END\n\
  \    ELSE\n    BEGIN\n        UPDATE dug_Events\n        SET\n            Title\
  \ = @Title,\n            Description = @Description,\n            MeetingDate =\
  \ @MeetingDate,\n            SpeakerID = @SpeakerID,\n            SponsorID = @SponsorID,\n\
  \            LocationID = @LocationID,\n            Modified = GETDATE()\n     \
  \   WHERE\n            ID = @OldEventID\n\n        SET @EventID = @OldEventID\n\
  \    END\nEND\nGO\n\nGRANT EXEC ON dug_SaveEvent TO PUBLIC\nGO\n```\n\n你可以看到，事件记录保存了指向\
  \ `Speaker`（演讲者）、`Sponsor`（赞助商）和 `Location`（地点）表的外键引用。除了各自的 ID 值外键引用外，`Speaker`、`Sponsor`\
  \ 和 `Location` 的具体数据并不作为事件保存过程的一部分被保存。这些数据集合之间的边界得以维持，以确保易于维护。只要 ID 值保持不变（这将保留与事件记录的关系），`Sponsor`\
  \ 表中存储的值可以被完全更改。\n\n最后，删除过程很简单。只需要提供事件的 ID 值即可删除该记录，如代码清单 10-5 所示。\n\n**代码清单 10-5.**\
  \ `dug_DeleteEvent.sql`\n\n```\nIF EXISTS (SELECT * FROM sysobjects WHERE type =\
  \ 'P'\n    AND name = 'dug_DeleteEvent')\nBEGIN\n    DROP Procedure dug_DeleteEvent\n\
  END\nGO\n\nCREATE Procedure dbo.dug_DeleteEvent\n(\n    @EventID bigint\n)\nAS\n\
  DELETE FROM dug_Events\nWHERE ID = @EventID\nGO\n\nGRANT EXEC ON dug_DeleteEvent\
  \ TO PUBLIC\nGO\n```\n\n`Speaker`、`Sponsor` 和 `Location` 的其他表也以类似方式管理，但由于数据的独特性存在一些差异。稍后我将详细介绍\
  \ `Location` 表如何被多个其他表用作依赖项。\n\n#### 创建数据访问提供程序\n\n我们示例网站的模块化设计鼓励我们使用提供程序模型，正如你在第\
  \ 5 章看到的，这很容易实现。我们将为 .NET 用户组网站使用的每组数据创建一个 SQL 提供程序，供初始网站上线时使用。\n\n之后，随着网站的发展和需要进一步扩展，可以按需创建和部署新的提供程序。我们稍后将创建的一个提供程序使用\
  \ LINQ，它可能比使用企业库和 ADO.NET 更快。我们还将创建一个 WCF 提供程序，它将允许我们以分布式方式配置数据库后端，从而分散数据库负载。\n\n\
  ##### EventProvider 对象\n\n目前，我们将专注于 `EventProvider`，如代码清单 10-6 所示。\n\n\n\n### 清单\
