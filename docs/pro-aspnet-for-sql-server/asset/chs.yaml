  \ = 0;\n    }\n}\n```\n\n#### 保护管理区域\n\n将用户和角色管理控件放入名为`Admin`的文件夹后，可以通过要求`Admin`角色中的经过身份验证的用户来保护它。在`Web.config`的末尾，你可以为`Admin`路径创建一个`location`配置，并允许`Admin`角色中的成员（见清单\
  \ 1-18）。\n\n**清单 1-18.** 使用`Web.config`保护管理区域\n\n```xml\n<?xml version=\"1.0\"?>\n\
  <configuration>\n    <!-- 其他配置设置 -->\n    <location path=\"Admin\">\n        <system.web>\n\
  \            <authorization>\n                <allow roles=\"Admin\"/>\n       \
  \         <deny users=\"*\"/>\n            </authorization>\n        </system.web>\n\
  \    </location>\n</configuration>\n```\n\n#### 创建管理员用户\n\n管理区域准备好后，你自然需要管理员用户，以便登录此区域并使用控件。这有点像是第\
  \ 22 条军规的场景。但正如你可以使用`成员资格` API 来管理用户和角色一样，使用这些控件你也可以以编程方式创建用户和角色。为了自动确保你的网站拥有必要的管理员用户，你可以将完成所有这些工作的代码添加到网站`Global.asax`文件中的`Application_Start`事件处理程序中。我首先检查三个默认角色是否存在，并添加每一个不存在的角色。然后，如果没有用户，我让方法添加默认的管理员用户，如清单\
  \ 1-19 所示。\n\n**清单 1-19.** 添加角色和用户\n\n```csharp\npublic void Application_Start(object\
  \ sender, EventArgs e)\n{\n    if (Roles.Enabled)\n    {\n        String[] requiredRoles\
  \ = { \"Admin\", \"Users\", \"Editors\" };\n        foreach (String role in requiredRoles)\n\
  \        {\n            if (!Roles.RoleExists(role))\n            {\n          \
  \      Roles.CreateRole(role);\n            }\n        }\n\n        string[] users\
  \ = Roles.GetUsersInRole(\"Admin\");\n        if (users.Length == 0)\n        {\n\
  \            // 创建管理员用户\n            MembershipCreateStatus status;\n          \
  \  Membership.CreateUser(\"admin\", \"CHANGE_ME\", \"admin@localhost\",\n      \
  \          \"Favorite color?\", \"green\", true, out status);\n            if (MembershipCreateStatus.Success.Equals(status))\n\
  \            {\n                Roles.AddUserToRole(\"admin\", \"Admin\");\n   \
  \         }\n            else\n            {\n                LogMessage(\"无法创建管理员用户:\
  \ \" + status, true);\n            }\n        }\n    }\n}\n```\n\n#### 总结\n\n本章介绍了如何为处理\
  \ ASP.NET 网站准备环境，以及如何配置数据库连接。你学习了如何配置和管理提供程序服务，包括以编程方式添加用户和角色，以便新网站在部署后可以立即被管理。\n\
  \n"
- "# 第 2 章 数据模型选择\n\nASP.NET 2.0 数据模型允许使用多种方法将数据从数据库获取到 Web 窗体。三种主要方法是`数据集`、`数据读取器`和`数据对象`。本章将回顾这些选项以及企业库的一部分——数据访问应用程序块。\n\
  \n本章涵盖以下内容：\n\n- 数据访问应用程序块\n- 数据访问代码片段\n- 示例人员数据库\n- 性能和`ViewState`考虑\n- 类型化`数据集`\n\
  - 非类型化`数据集`\n- `数据读取器`\n- 子集和范围排序\n\n在.NET 中处理数据并非只有一种方法。有许多不同且有时相互交织的方法，这给你带来了看似压倒性的选择。虽然你可能仅使用可用功能的有限子集就能应付，但你会发现，随着你对选项了解的加深，你可以提出更简化的方法，减少完成工作所需的工作量。这很快就会转化为更高的生产力和更少的维护代码。\n\
  \n尽管记录在 Microsoft 开发者网络（MSDN）上的巧妙示例提供了一些惊人的解决方案，但它们实际上是简单的示例。本章将通过向工作流程中引入一个挑战并展示如何克服它，来深入探讨超越简单示例的内容。\n\
  \n#### 数据访问应用程序块\n\nMicrosoft 模式与实践小组提供了一组称为应用程序块的模块，为开发人员提供额外的工具来与.NET 框架一起工作。其中一个模块是数据访问应用程序块，它提供了一组方法，整合了你通常需要做的与数据库交互的工作。这种抽象层简化了原本可能很繁琐的任务。\n\
  \n![图片 6](img/index-46_1.jpg)\n\n\n#### 数据访问应用程序块\n\n数据访问应用程序块的目标之一是为开发者提供一个不依赖于底层数据库的接口。使用此模块的软件无需修改\
  \ C#代码即可同时支持 SQL Server、SQL Server CE 以及 Oracle。该模块还会自动处理许多如果您仅使用 ADO.NET 就必须手动完成的常见任务，例如打开和关闭每个数据库连接。诸如此类的各种任务都会自动处理。\n\
  \n###### 配置\n\n除了这个替代接口，企业库还包含配置工具，可以为您修改 Web 配置文件。对于数据访问应用程序块，这样的配置工具并非必需，因为您唯一需要配置的就是用于连接数据库的连接字符串。不过，配置工具可以设置一个默认连接字符串，当代码中未显式指定时使用。\n\
  \n## 核心对象\n\n数据访问应用程序块的核心是 `Database` 对象，它抽象掉了.NET 框架中与数据库通信相关的大部分复杂性。\n\n您通过 `Database`\
  \ 对象运行数据库命令，使用来自 `System.Data.Common` 命名空间的 `DbCommand` 来执行所有操作——从查询、插入、更新、删除，到调用存储过程以执行更复杂的任务。\n\
  \n本书大部分示例都使用了数据访问应用程序块。它是一个易于使用的接口，如果您选择手动构建数据访问层，则应使用它。\n\n## 安装与构建\n\n要使用企业库，您需要从微软模式与实践网站下载。运行安装程序时，您可能希望更改安装目录，将其放置在您的公共文件夹中，例如\
  \ `D:\\Projects\\Common\\Microsoft Enterprise Library 3.1\\`。作为安装程序的一部分，您可以选择安装并编译源代码。您可以将源代码放在同一文件夹中，如图\
  \ 2-1 所示。从源代码构建时，会生成未签名的程序集，因此如果您计划将程序集部署到全局程序集缓存（GAC）或与强签名的项目一起使用，则需要更新项目以使用您自己的密钥。否则，您可以直接使用\
  \ `bin` 文件夹中由微软签名的程序集。\n\n**图 2-1.** 位于公共目录中的企业库 3.1\n\n企业库由所有应用程序块的多个程序集组成。您不需要引用每一个程序集来仅使用单个模块。\n\
  \n对于数据访问应用程序块，您只需要三个程序集：`Microsoft.Practices.EnterpriseLibrary.Common.dll`、`Microsoft.Practices.ObjectBuilder.dll`\
  \ 和 `Microsoft.Practices.EnterpriseLibrary.Data.dll`。\n\n当我构建我的数据访问层时，我使用类库来构建，而不是将所有代码放在\
  \ ASP.NET 网站项目的 `App_Code` 文件夹中。这样做允许它被多个网站以及控制台和桌面应用程序用作依赖项。这也使得对数据层进行版本控制和运行单元测试变得容易。如果它构建在\
  \ `App_Code` 文件夹内，则无法在外部使用，这使得版本控制和单元测试变得困难。\n\n## 指导自动化工具\n\n企业库只是模式与实践团队的一个产品。该团队还为\
  \ Visual Studio 生产了指导自动化扩展，它使用模板和配方来构建符合其建议的应用程序。在 WCF 和 Web 服务软件工厂中，包含了数据访问指导包，它可以为您的数据访问层生成代码。\n\
  \n每当您开始开发一个应用程序时，您肯定不希望因为设置数据库（包括各种表、存储过程、索引和约束）的所有繁琐工作而减慢速度，然后还要花费大量时间编写数据库与应用程序前端之间的中间层。为了加速创建所有这些代码的过程，您可以使用代码片段。这是\
  \ Visual Studio 2005（和 Visual Studio 2008）的一项强大功能，允许您快速选择模板并填写占位符，从而避免手动编写每一行代码（通常是样板代码）。代码片段还可以帮助您避免因拼写错误导致的编码错误。\n\
  \n#### 数据访问代码片段\n\n我创建了五个代码片段来协助编写使用数据访问应用程序块的代码。除了向类中添加代码行外，代码片段还可以指定新代码块所需的命名空间语句。命名空间导入仅在\
  \ VB 代码中有效，但如果 Visual Studio 能够找到相应的程序集，引用将会生效。如果您在添加以下代码片段之一之前，先将必要的程序集引用添加到项目中，Visual\
  \ Studio 将自动将 `using` 语句添加到您的类中。\n\n我的数据访问代码片段集合如下：\n\n- 数据访问类型\n- 数据库创建\n- DataSet\
  \ 方法\n- DataReader 方法\n- Nonquery 方法\n\n这些片段的代码如清单 2-1 至 2-5 所示。\n\n### 清单 2-1.\
  \ 数据访问类型\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<CodeSnippets xmlns=\"\
  http://schemas.microsoft.com/VisualStudio/2005/CodeSnippet\">\n  <CodeSnippet Format=\"\
  1.0.0\">\n    <Header>\n      <Title>1 Type Declarations</Title>\n      <Shortcut>da1</Shortcut>\n\
  \      <Description>Data Access Types</Description>\n      <Author>Brennan Stehling</Author>\n\
  \      <SnippetTypes>\n        <SnippetType>Expansion</SnippetType>\n      </SnippetTypes>\n\
  \    </Header>\n    <Snippet>\n      <References>\n        <Reference>\n       \
  \   <Assembly>Microsoft.Practices.EnterpriseLibrary.Common.dll</Assembly>\n    \
  \    </Reference>\n        <Reference>\n          <Assembly>Microsoft.Practices.EnterpriseLibrary.Data.dll</Assembly>\n\
  \        </Reference>\n        <Reference>\n          <Assembly>Microsoft.Practices.ObjectBuilder.dll</Assembly>\n\
  \        </Reference>\n      </References>\n      <Imports>\n        <Import>\n\
  \          <Namespace>System.Data</Namespace>\n        </Import>\n        <Import>\n\
  \          <Namespace>System.Data.Common</Namespace>\n        </Import>\n      \
  \  <Import>\n          <Namespace>Microsoft.Practices.EnterpriseLibrary.Data</Namespace>\n\
  \        </Import>\n      </Imports>\n      <Code Language=\"CSharp\" Kind=\"type\
  \ decl\" Delimiter=\"$\">private Database db;\n      </Code>\n    </Snippet>\n \
  \ </CodeSnippet>\n</CodeSnippets>\n```\n\n数据访问类型片段仅仅声明了一个用于数据访问方法中 `Database` 对象的引用。这个初始代码片段指定了所有代码片段所需的导入和引用。虽然\
  \ C#不像 VB 那样自动包含导入，但我仍然包含了它们，期望未来版本的 Visual Studio 能够利用它们。\n\n### 清单 2-2. 数据库创建\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<CodeSnippets xmlns=\"http://schemas.microsoft.com/VisualStudio/2005/CodeSnippet\"\
  >\n  <CodeSnippet Format=\"1.0.0\">\n    <Header>\n      <Title>2 Database Creation</Title>\n\
  \      <Shortcut>da2</Shortcut>\n      <Description>Data Access Database Creation</Description>\n\
  \      <Author>Brennan Stehling</Author>\n    </Header>\n    <Snippet>\n      <Imports>\n\
  \        <Import>\n          <Namespace>Microsoft.Practices.EnterpriseLibrary.Data</Namespace>\n\
  \        </Import>\n      </Imports>\n      <Declarations>\n        <Literal Editable=\"\
  true\">\n          <ID>connectionStringName</ID>\n          <ToolTip>Connection\
  \ String Name</ToolTip>\n          <Default>db</Default>\n          <Function>\n\
  \          </Function>\n        </Literal>\n      </Declarations>\n      <Code Language=\"\
  CSharp\" Kind=\"method body\">\n        <![CDATA[\ndb = DatabaseFactory.CreateDatabase(\"\
  $connectionStringName$\");\n        ]]>\n      </Code>\n    </Snippet>\n  </CodeSnippet>\n\
  </CodeSnippets>\n```\n\n\n"
