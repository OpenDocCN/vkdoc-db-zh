  \ `EventProvider`，并实现所有抽象方法即可。也许一切都如你所愿，只是某个提供程序中存在一些微小的细节问题。你可以为该提供程序创建一个新的实现，并配置你的应用程序来使用它，而让其余的标准提供程序保持不变。因为它们都基于基提供程序类所定义的抽象接口工作，新的实现将与现有提供程序无缝协作。利用本书提供的源代码，你可以将现有类作为起点。\n\
  \n新的提供程序可能与标准 SQL 提供程序非常相似，但存在一些差异，例如添加了标准实现中未包含的数据缓存功能。\n\n.NET 用户组网站的设计方案是在用户控件上使用输出缓存，以减轻数据库负载，而非将缓存职责放入数据访问层。诸如活动列表之类的内容不会频繁更改，因此没有必要总是从提供程序获取最新数据来呈现页面。然而，你可能有不同的需求，可能希望创建一个新的提供程序，将缓存功能纳入数据访问层。你可以创建一个新的\
  \ `EventProvider` 实现，命名为 `SqlCachedEventProvider`，并在你的应用程序中使用它。\n\n## 实现一个 LINQ\
  \ 提供程序\n\n除了使用 ADO.NET 和 Enterprise Library 外，我们现在也可以开始使用 LINQ，它目前还处于 CTP（社区技术预览版）阶段。.NET\
  \ 3.5 运行时和 Visual Studio 2008 的最终版本计划于 2008 年 2 月发布。当 LINQ 最终发布时，它将改变我们处理数据的方式。LINQ，即语言集成查询，是一种语言扩展，将动态语言特性引入了\
  \ C#。它使我们能够使用类似于 SQL 的语法来查询对象。假设你有一个大型的 `Event` 对象集合，并希望获取未来六个月内将在某个特定地点举行的活动列表。LINQ\
  \ 查询可以直接从 C# 中为你获取该结果，而无需数据库参与。\n\nLINQ 中与数据库交互的部分被称为 DLINQ。你可以使用 DLINQ 查询数据库中的表，或获取存储过程调用的结果。为了实现提供程序的目的，我们将使用\
  \ LINQ 创建一个 `EventProvider` 实现，它调用与标准 SQL 实现相同的存储过程。\n\n为了快速开始创建 `EventProvider`\
  \ 的 LINQ 实现，我使用包含所有表和存储过程的数据库，通过 `Blinq` 生成了一个网站。你会从第 8 章回忆起 `Blinq`。我从生成的网站中提取了所需的部分，并调整了一些细节。例如，我知道每一个从活动表中获取数据的存储过程都返回相同的列集合，但\
