  \ \" Data Methods \"\n\n        public Event GetNewEvent()\n        {\n        \
  \    return Provider.GetNewEvent();\n        }\n\n        [DataObjectMethod(DataObjectMethodType.Select)]\n\
  \        public Event GetEvent(DomainKey key)\n        {\n            return Provider.GetEvent(key);\n\
  \        }\n\n        [DataObjectMethod(DataObjectMethodType.Select)]\n        public\
  \ EventCollection GetAllEvents()\n        {\n            return Provider.GetAllEvents();\n\
  \        }\n\n        [DataObjectMethod(DataObjectMethodType.Select)]\n        public\
  \ EventCollection GetEventsByDate(DateTime targetDate)\n        {\n```\n\n\n\n```markdown\n\
  return `Provider.GetEventsByDate(targetDate)`;\n\n}\n\n[DataObjectMethod(DataObjectMethodType.Update)]\n\
  \npublic `DomainKey` `SaveEvent(Event evt)`\n\n{\n\nreturn `Provider.SaveEvent(evt)`;\n\
  \n}\n\n[DataObjectMethod(DataObjectMethodType.Delete)]\n\npublic void `DeleteEvent(Event\
  \ evt)`\n\n{\n\n`Provider.DeleteEvent(evt)`;\n\n}\n\npublic bool `IsUsingLocation(Location\
  \ location)`\n\n{\n\nreturn `Provider.IsUsingLocation(location)`;\n\n}\n\n#endregion\n\
  \n#region \" Provider Properties \"\n\npublic `EventProvider` `Provider`\n\n{\n\n\
  get\n\n{\n\nreturn `EventManager.GetProvider(ProviderName)`;\n\n}\n\n}\n\nprivate\
  \ string `_providerName` = `String.Empty`;\n\npublic string `ProviderName`\n\n{\n\
  \nget\n\n{\n\nreturn `_providerName`;\n\n}\n\nset\n\n{\n\n`_providerName` = value;\n\
  \n}\n\n}\n\n#endregion\n\n}\n\n}\n```\n\n`EventDataObject` 使用一个名为 `Provider` 的属性，该属性仅仅是一个包装器，用于获取\
  \ `EventManager`，而 `EventManager` 会返回命名的提供程序。由于默认构造函数将与 `ObjectDataSource` 一起使用，从\
  \ `ProviderName` 属性返回的值将始终为 null。当 `EventManager` 接收到 null 值时，它会假定默认的提供程序是合适的，这样\
  \ `EventDataObject` 就能够正常运作。如果你想使用默认提供程序之外的其他提供程序，你就必须以编程方式实例化 `EventDataObject`\
  \ 并设置其 `ProviderName` 属性，或者直接使用 `EventManager` 来获取你想要的提供程序。\n\n最后，我们可以声明 `ObjectDataSource`\
  \ 并将其绑定到数据绑定控件，例如 `Repeater`。清单 10-36 展示了用户控件中的事件列表。\n\n### `清单 10-36.` `EventListingControl.ascx`\n\
