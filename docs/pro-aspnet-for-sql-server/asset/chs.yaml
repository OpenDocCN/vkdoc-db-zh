  \n![图 26](img/index-192_1.png)\n\n一旦测试系统就位，你可以使用 MSBuild 脚本来运行测试，而无需启动 Visual Studio\
  \ 2005（参见图 6-6）。如果你当前的工作依赖于其他几个项目，你可以同步这些依赖项目的源代码，然后运行 MSBuild 脚本来构建和测试它们。这种自动化将为你节省时间，并在你开始在项目中进行更改之前识别出依赖项的问题。\n\
  \n### 图 6-6. 进行单元测试的 MSBuild\n\n## 缓存带来的问题\n\n除非你设计并通过规划、培训和代码审查来强制执行一个缓存策略，否则在使用缓存时会出现意外问题。你可能决定将“所有放入缓存的数据使用不超过五分钟的绝对过期时间”作为一项策略。你可能还决定不使用输出缓存，而是专注于使用依赖项通知的数据缓存，以确保应用程序使用的数据始终是最新的。通过制定明确的策略并通过代码审查强制执行，将更容易控制局面。\n\
  \n有几件事需要注意。使用数据缓存时，你可能会在后台代码中使用静态引用轻松持有缓存项，这将导致它永远不会消失。我发现，在处理缓存数据时，最好避免使用静态引用。为了解决这个问题，我创建了包装方法，作为获取数据的访问点。包装器首先在缓存中检查是否存在缓存项，如果存在则返回它。如果不存在，它就从数据库中提取数据，将其放入缓存，然后返回。我从不假设该项已经在缓存中。\n\
  \n对于输出缓存，你可能会将 `VaryByParam` 设置为 `*`，认为这样可以确保不同的 URL 会得到不同的结果。对于产品页面，你希望 `Product.aspx?ProductID=808`\
  \ 显示的结果与 `Product.aspx?ProductID=429` 不同。这个 `VaryByParam` 设置可以确保它按预期工作，但如果你的网站被设置为显示多种语言的内容，第一个访问该页面的用户将为其语言缓存内容。在输出缓存保存原始请求的期间内，下一个具有不同语言首选项访问该页面的用户，将看到第一个用户的语言首选项。为了解决这种情况，你可以检查\
  \ `Accept-Language` 头部，作为唯一标识页面内容的一部分。清单 6-40 显示了在语言是关注点时，用于输出缓存的设置。\n\n### 清单 6-40.\
  \ 用于语言的 `VaryByHeader`\n\n```aspx\n<%@ OutputCache Duration=\"300\" VaryByParam=\"\
  *\"\n    VaryByHeader=\"Accept-Language\" %>\n```\n\n##### 性能策略\n\n制定一个全面的性能优化方案是必要的。仅仅缓存数据库查询结果并不能确保你的应用程序表现良好。如果某些查询非常慢，你将继续遇到性能问题。在应用程序最慢的地方，你可以尝试加快查询速度。\n\
  \n\n\n在某个场景下，你可能有一个偶尔运行的查询，但它返回结果所需的时间却长得令人痛苦。在另一个场景下，你有一个速度中等偏慢的查询，但它需要使用不同参数运行多次，这很快就会累积起来并拖慢你的应用程序。在这两种情况下，你都可以选择优化查询本身，或者更改它所查询的数据结构。\n\
  \n一个查询可能运行很长时间，因为它需要跨多个表进行连接（join），即使已经存在索引来协助表连接操作。如果数据量巨大，你可能需要扫描非常多的行才能匹配连接条件。这种性能损耗很难通过重写查询来避免，但可以尝试重构数据结构来解决。\n\
  \n###### 数据仓库\n\n数据库设计师会尽力拆分数据，使其完全规范化。这样做减少了存储数据所需的空间，但同时也让查询变得更加复杂。以产品数据库为例，假设有\
  \ 50,000 个产品，与产品相关的所有数据分布在十张表中，你将需要连接许多表才能获取所需数据。而且有些产品可能对客户并不可见（不可购买），因此数据库中存在额外的数据，这增加了全表扫描的成本。\n\
  \n在这种情况下，你可以尝试创建一个**反规范化表**来存放产品数据，从而避免表连接操作。当填充这个反规范化表时，还可以将其限制为仅包含活跃产品，以减少其大小。一个简单的\
  \ `SELECT * FROM MYTABLE` 会比任何连接查询都快得多。\n\n为了实现这一点，你仍然需要偶尔刷新仓库表。也许你可以在一天中的非高峰时段进行几次，或者在一天中使用率最低的时段只执行一次。你甚至可以选择将数据库分布在不同的物理机器上，并通过远程查询来填充仓库。这样做可以让供应商全天处理其产品的数据，而不会影响公共数据库的性能。\n\
  \n我曾对一个产品数据库实施了所有这些操作，并将仓库表的所有内容加载到一个 `DataSet` 中，然后将其放入缓存。当我发现这些数据只占用不到 10 MB 的空间，而服务器总内存远超过\
  \ 2 GB 时，我考虑过将所有产品数据保存在内存中。一旦 `DataSet` 在内存中，我所需要做的就是使用 `DataView` 对象的 `RowFilter`\
  \ 属性对其进行查询（参见代码清单 6-41）。\n\n**代码清单 6-41.** *使用 RowFilter 与 ProductID*\n\n```\npublic\
  \ DataTable GetProductByID(DataSet productDs, int productId)\n{\n    DataView dv\
  \ = new DataView(productDs.Tables[0]);\n    dv.RowFilter = \"ProductID = \" + productId;\n\
  \    return dv.ToTable();\n}\n```\n\n此示例接收一个已包含所有产品的 `DataSet`，然后利用带有 `RowFilter`\
  \ 的 `DataView` 创建一个新的、仅包含匹配行的 `DataTable`。然后，你可以像使用 `DataSet` 一样，在任何数据绑定控件中使用这个\
  \ `DataTable`。\n\n随着 .NET 2.0 的发布，`DataSet` 的性能通过改进的索引实现得到了显著提升。因此，这项技术运行得非常快。`RowFilter`\
  \ 属性可以接受任何在 SQL 查询的普通 `WHERE` 子句中使用的字符串。\n\n我还发现，加载仓库表中的所有行，比通过规范化表上的连接查询来加载单个产品更快。如果需要让产品数据保持更高的时效性，允许\
  \ `DataSet` 更频繁地从缓存中过期而不显著影响性能，可能是合理的。\n\n产品也属于一个分类层级结构中。一组根类别包含子类别，依此类推，直到最终到达产品。我将这个结构扁平化，并将其放入另一个仓库表中以便快速访问。对于这个表，我包含了许多计算字段，例如产品数量、类别的开始和结束日期（因为有些类别是季节性的）。这些额外的列通过使其易于访问而无需查询数据库，辅助了\
  \ `RowFilter` 的使用。我发现，每当有新的查询需求需要新的条件时，我可以简单地在仓库表中添加一列，而不必放弃这个运行效果极佳的仓库策略。\n\n##\
  \ 惰性加载\n\n并非所有的产品详情都被放入仓库表中。当存在一对多关系时，这是无法做到的。我也不想加载并非立即需要的数据。当用户通过产品分类层级深入网站时，他们只看到每个产品的摘要数据，例如名称和价格。加载详细数据可以推迟到必要时进行，我通过利用对象模型实现了这一点。\n\
  \n我通常做的是，将数据库中的 `DataSet` 形式的数据转换为业务对象，例如一个具有 `Name`（名称）、`Price`（价格）和 `VendorName`（供应商名称）等属性的\
  \ `Product` 对象。这些属性是在对象构造时始终加载的属性类型。我称填入这些属性的数据为**摘要数据**。其他属性，如 `Colors`（颜色）、`Features`（特性）和\
  \ `Dimensions`（尺寸），是详细数据，不会在类别页面上显示，因此在 `Product` 对象首次构造时不会加载。但是，当访问该属性时（初始值为 `null`），就会查询数据库以获取必要数据并返回。这被称为**惰性加载**，代码清单\
  \ 6-42 展示了一个示例。\n\n**代码清单 6-42.** *惰性加载示例*\n\n```\nprivate ColorsCollection _colors\
  \ = null;\n\npublic ColorsCollection Colors\n{\n    get\n    {\n        if (_colors\
  \ == null)\n        {\n            _colors = GetColors(ProductID);\n        }\n\
  \        return _colors;\n    }\n}\n```\n\n随后对 `Colors` 属性的每一次请求，数据都将已经存在并立即返回。这一切都基于一个假设：摘要数据的使用频率将远高于通过惰性加载获取的详细数据。在网站类别页面列出摘要数据的情况下，这将成立。\n\
  \n单个 `Product` 对象可以被放入缓存中有限的时间，这将自动保留由成员变量持有的详细数据。这种做法减少了整个产品对数据库的访问次数。然而，这可能并不完全符合你的期望。就像输出缓存会缓存整个页面的数据（无论任何单个数据缓存的超时设置）一样，只要父对象保留在缓存中，它也会一直保留数据。与其将数据作为成员变量保存，它可以使用数据缓存，并在每次需要时简单地请求数据，并期望数据会在适当的时间内被缓存。对于这种情况，你有很多可用的选择。\n\
  \n## 本章小结\n\n在本章中，你了解了使用 `System.Web.Caching` 进行缓存的各种选项以及其他替代方案。你还学习了因依赖项更改而使缓存失效的技术，以及缓存存在的几个问题。最后，你探索了一些技术和策略，以充分利用混合和匹配可用功能，从而从系统中挤出最佳的性能。\n\
  \n\n\n尽管 Visual Studio 内置了许多强大工具来辅助将数据绑定到应用程序，你仍然需要手动构建数据访问层的部分内容。手动构建的数据访问层能为你在布局表结构、存储过程以及将数据从数据库传输到应用程序并返回的代码层方面提供最大的灵活性。当你直接与数据访问层打交道时，你将深入了解系统的所有细微差别。你也将能够深入思考系统将如何运作。\n\
  \n### 本章内容\n\n本章涵盖以下内容：\n- 使用 `DataSet`、内联 SQL 和存储过程\n- 使用 `DataObject` 和 `对象数据源`\n\
  - 构建数据库\n- 构建数据访问层\n- 构建网站\n\n在构建数据访问层时，你的设计决策会影响性能。如果你足够幸运，可以改变数据库中数据的构建方式，甚至更好，你可以从头开始。你的设计决策将产生或好或坏的影响。目前，随着\
  \ WCF 和 LINQ 引入 .NET 平台，我们的选择正以新的方式扩展。这些选项超越了已变得司空见惯的典型 ADO.NET 和 `DataSet` 模型。然而，这些新技术极具吸引力，足以突破本章所审视的设计框架。\n\
  \n本章的示例应用程序是一个用于存储和标记你喜爱链接的网站。我将向你展示应用程序的每个部分是如何构建的，并解释过程中做出的决策。\n\n#### 使用数据集、内联\
  \ SQL 和存储过程\n\n传统方法是使用内联 SQL 或存储过程，用查询结果填充 `DataSet`，然后将该数据绑定到用户界面上的数据绑定控件。此过程可用于快速构建一个功能相当丰富的丰富界面。\n\
  \n然而，人们往往只考虑构建第一个版本应用程序所需的时间成本。但随后下一个版本就会到来。随着现实世界的变化，应用程序和数据库的需求也会随之改变。历史表明，回头维护应用程序占据了开发者\
  \ 80% 的工作量。\n\n你可以在 Visual Studio 中打开 `服务器资源管理器`，将一个表拖放到 `Web 窗体` 的设计界面上，就能自动生成支持选择、更新、删除、分页和排序的完整功能的\
  \ `GridView` 和关联的 `SqlDataSource`。但是，当需要哪怕是最微小的改动时，会发生什么？如果你在数据库表中添加一个新列，并想在 `GridView`\
  \ 上显示它，该怎么办？你确定会正确更新 `SqlDataSource` 中的所有命令吗？如果你的查询涉及连接两个或更多表，又会怎样？你如何处理删除和更新命令？这正是所有向导工具将你置之不顾的地方，也是你开始亲自动手、花更多时间在白板和白板笔上的时候。如果你已经通过这些易于使用的向导走到这一步，那么制定一个功能计划来应对新的功能需求将变得困难。\n\
  \n##### 数据集\n\n`DataSet` 是一个我们已经非常熟悉的对象。它是 .NET 中用于传输数据的主要对象。它有两种主要形式：类型化（XSD）和非类型化。你在第\
  \ 2 章中了解了它们的区别，该章揭示了类型化 `DataSet` 的刚性本质，使其在数据库发生变化时难以维护。因此我们转而使用非类型化 `DataSet`。实际上，`DataSet`\
  \ 被用作一个华丽的**数据传输对象（DTO）**，它被神奇地绑定到控件上，而无需真正考虑每列的数据类型。这种自动数据绑定使我们能够通过向导快速构建原型应用程序。但这种非类型化的数据分组以及所有自动生成的方法可能会让必须将其用作数据访问层的开发者感到困惑。我们将在后续章节中探讨这些困难。\n\
  \n### 编译时与运行时支持\n\n非类型化 `DataSet` 的内容由填充它的查询定义。如果一个名为 `BirthDate` 的列今天是 `DateTime`\
  \ 类型，但明天它更新为返回一个 `VARCHAR(15)`，非类型化 `DataSet` 会自动接收更改后的列而不会报错。但如果你在代码中将该值强制转换为 `DateTime`，你将面临运行时发生\
  \ `InvalidCastException` 异常的风险。最好在编译时捕获此错误，以便在修改应用程序时处理它。当然，你也会测试应用程序的运行时行为是否正常，但由于数据库实际上与应用程序是断开的，查询返回的类型可能在最糟糕的时候发生变化。\n\
  \n另一位不知道你的应用程序正在查询某个表的数据库管理员，可能会调整该表，将一个 `int` 列更改为 `bigint`，因为自动递增的值即将达到 16 位整数的最大值。此类更改虽不幸，但确实会发生。\n\
  \n考虑一个表，其主键值设置为 `int` 类型，并且也是一个 `IDENTITY` 列，每创建一个新记录就递增 1。你可能已将该列强制转换为 `Int16`，但是一旦它超过\
  \ 32,767，你将收到运行时异常，因为它现在至少需要是 `Int32` 类型。如果你只是用数据库中的几条记录测试应用程序，你不会遇到这个运行时异常。而当这个问题最终发生时，它就像一个定时炸弹，会在应用程序发布到实际环境一段时间后出现。\n\
  \n当这个运行时错误发生时，它将如何被记录并报告给开发团队？如果错误发生在用户界面层，错误似乎指向绑定问题，而不是数据库深处真正的原因。你可以想象，诊断这类问题会消耗你的开发时间，因为你可能会在系统自己的那一侧（使用着一个尚未达到麻烦阈值的数据库副本）原地打转，寻找问题所在。\n\
  \n与其使用乐于传递任何放入其中的数据的非类型化 `DataSet`，你可以手动将数据加载到业务对象中，其属性设置为用户界面层预期的精确类型。当应用程序编译时，它会确保这些类型正确对齐。当数据库中发生破坏这种隐式约定的更改时，可以在问题源头处理和记录错误，从而使你能够更好地修复它。一条记录着“在加载\
  \ `Person` 对象时第 151 行类型不匹配”的错误消息将准确定位问题，以便你检查该行代码的预期类型和数据库查询实际返回的类型。\n\n### 重构\n\
  \n\n\n非类型化的值也会使应用程序的重构变得困难。你无法简单地在`DataSet`中右键单击一个属性并选择“查找所有引用”。`DataSet`中的值是通过名称或数字索引作为`DataRow`或`DataRowView`来访问的，这无法通过自动代码分析追踪回源对象。一个泛型的`DataRow`可以属于任何`DataSet`，而由\
  \ Visual Studio 和第三方插件提供的重构功能将无法协助你进行全解决方案范围的更改。要进行全局更改，你必须诉诸于搜索和替换，但这样做是有问题的。\n\
  \n当你的应用程序需要修订，并且你想更新一个查询使其更具描述性时，你可能会添加一个名为`VendorName`的新列，将`Name`重命名为`CustomerName`，并移除`Name`列。突然之间，所有对`Name`的引用都失效了，并将导致运行时异常。因此，你必须找到所有对`Name`的引用并更正它们。每次进行这样的更改时，你都必须运行搜索，并确保`row[\"\
  Name\"]`实际引用的是你刚刚更改的同一查询结果。你可能很容易就有许多包含名为`Name`列的查询。全局搜索和替换会破坏那些引用。\n\n相反，如果你使用的是自定义业务对象，你可以安全地使用重构工具在解决方案范围内重命名属性。为了访问应用程序范围之外的引用，你还可以使用`Obsolete`属性标记旧属性，并附上使用新属性的说明，同时保持现有功能。这项技术将在本章后面介绍。\n\
  \n### 调试\n\n你可能会期望使用`DataSet`进行调试会得到很好的支持。令人惊讶的是，调试支持的缺乏是使用`DataSet`的一个显著缺点。在图 7-1\
  \ 中，你可以看到如何获取`DataSet`中第一个`DataTable`的第一个`DataRow`的值。要获取下一个`DataRow`，你必须更改索引值。\n\
  \n至少你可以查看该行中各列的值，但这些值是通过索引而不是列名访问的。当你访问同一行数据，该行被附加到 Web 窗体上的数据绑定控件（例如`Repeater`）时，你将通过`e.Item.DataItem`访问该行，这是一个`DataRowView`。正如你从图\
  \ 7-2 中看到的，监视窗口的帮助比图 7-1 更小。你无法直接导航到这些值，并且几乎无法通过查看监视窗口来推断类型。\n\n这种糟糕的调试体验将减少你用于创建和维护应用程序的时间。当数据在数据访问层立即移入业务对象并传递回应用程序时，你将能够以更有用的方式从调试器访问数据。图\
  \ 7-1 和 7-2 中使用的相同数据在图 7-3 中被放入一个`FavoriteLink`对象中。`FavoriteLink`是网站将使用的一个关键对象，我们将在本章后面构建这个网站。\n\
  \n图 7-3 中显示的值显然更具可读性，并且你确切地知道你正在处理什么。使用业务对象显然比`DataSet`提供了更好的调试体验。至少用户界面层恢复了编译时支持，而类型安全问题被隔离在数据访问层深处。当你通过将`row[\"\
  Url\"]`转换为`String`来在`FavoriteLink`对象中设置`Url`属性时，你会在靠近拉取数据的查询的地方进行此操作。任何由此产生的异常都将显示堆栈跟踪，指向此查询和行号（如果你随程序集一起部署了程序调试数据库（PDB）文件）。稍后你将看到如何完全避免`InvalidCastException`。\n\
  \n■**注意** 如果在编译类库时创建的 PDB 文件随程序集一起部署，异常可以提供更详细的堆栈跟踪。诸如异常发生的确切行号等有用细节将帮助你追踪和修复错误。PDB\
  \ 文件是在调试和发布配置下创建的。\n\n像任何其他普通对象一样，`FavoriteLink`对象也更易于重构。你可以在代码中找到对`Url`属性的所有引用，无论它在解决方案中的何处使用。不幸的是，如果你以声明方式将`Url`属性绑定到数据绑定控件，重构搜索将不会找到该引用。\n\
  \n最后，在调试时，你可以更轻松地使用`FavoriteLink`对象，如图 7-3 所示。这甚至包括在属性访问器中设置断点，这在观察哪些值被绑定到数据绑定控件时将非常有用。\n\
  \n##### 内联 SQL\n\n一个需要避免的诱惑是直接将你的 SQL 语句写入代码中。尽管你创建的与数据库通信的代码确实会与查询和其他数据库命令紧密绑定，但这并不是创建或维护软件最有效的方式。\n\
  \n#### 维护注意事项\n\n将 SQL 直接放入代码中的一个问题是，当这些查询更改时，会导致额外的维护工作。你最终会为自己增加更多工作并增加出错的机会。例如，你最基本的查询可能开始时如清单\
  \ 7-1 所示。\n\n```sql\nSELECT * FROM Production.Product WHERE ProductID = 1\n```\n\
  \n你可以看到它开始时是一个可读的查询，但随着查询变长，它开始看起来更像清单 7-2。\n\n```sql\nSELECT \n    p.ProductID,\
  \ p.[Name], p.ProductNumber,\n    p.Color, p.ListPrice, \n    p.SellStartDate, p.SellEndDate,\
  \ \n    p.DiscontinuedDate \nFROM Production.Product AS p \nJOIN Production.ProductProductPhoto\
  \ AS ppp \nON ppp.ProductID = p.ProductID \nWHERE ppp.ProductPhotoID != 1;\n```\n\
  \n清单 7-2 中的查询显然是一个维护噩梦。当你进行微小的更改时，你会在代码中内联进行，并尽力确保将查询仔细地包裹在`String`的引号内。但你放弃了很多东西。\n\
  \n如果清单 7-2 中的查询是作为独立的 SQL 脚本维护的，你可以使用诸如 SQL Server Management Studio 或带有数据库项目的 Visual\
  \ Studio 之类的工具来提供语法着色以及其他一些丰富的功能。第三方工具也可提供实时智能感知支持，并在你处理 SQL 时提供列和表名的列表。内联查询无法利用所有这些支持。\n\
  \n#### 安全注意事项\n\n\n\n使用内联 SQL 的另一个问题是 SQL 注入攻击的风险。这种风险常被忽视，但它确实是一个非常实际的问题。在清单 7-1\
  \ 中，`ProductID` 被硬编码到了 `String` 中，但你可能从 URL 的查询字符串（如 `Product.aspx?ProductID=1`）中获取该值。如果用于查询数据库的\
  \ `String` 类似于清单 7-3，那么这种内联查询很容易被利用。\n\n**清单 7-3.** 可被利用的内联查询\n\n```java\npublic\
  \ String GetProductQuery(String productId)\n{\n    return \"SELECT * FROM Production.Product\
  \ WHERE ProductID = \" + productId;\n}\n```\n\n攻击者只需要调整查询字符串，添加一个结束当前查询并开始另一条命令（例如\
  \ `UPDATE` 或 `DELETE` 命令）的语句。一个足智多谋的攻击者可以通过查询你的数据库架构来发现所有表并复制数据，从而获取所有数据，而你可能对此一无所知。在问题得到纠正之前，攻击者可以随时返回重复该查询，危害你的数据。\n\
  \n防范 SQL 注入攻击的第一步是永远不要相信来自用户的数据。数据应始终被验证。如果你期望 `ProductID` 是一个整数，可以使用清单 7-4 中的代码更安全地组装查询。\n\
  \n**清单 7-4.** 验证传入数据\n\n```java\nint productId = 0;\nString sql = \"\";\n\nif (int.TryParse(Request.QueryString[\"\
  ProductID\"], out productId))\n{\n    sql = GetProductQuery(productId);\n}\nelse\n\
  {\n    // handle the failed attempt\n}\n```\n\n更糟糕的是，如果你的应用程序将异常信息直接显示给潜在的攻击者，这将会给攻击者提供有助于修改查询的信息。当你捕获异常时，你应该记录错误并抛出一个不包含任何可能帮助攻击者的信息的新异常。用户不需要知道那个级别的详细信息。用户也不需要向你通知异常的详细信息，因为你总是可以查看错误日志来获取详情。你也应该监控该错误日志，因为它可能会显示危害你数据库的尝试。\n\
  \n超越验证所有传入数据的下一步是使用参数化查询将值绑定到数据库命令。当值通过类型限制被专门绑定到查询中的占位符（更不用说参数的正确顺序）时，这使得攻击者组装功能性攻击变得困难得多。参数化查询还会转义诸如引号和通配符之类的字符，从而消除了注入一个会关闭你的查询并启动另一个查询的字符串的可能性。清单\
  \ 7-5 展示了一个参数化查询。\n\n**清单 7-5.** 参数绑定\n\n```csharp\npublic DataSet GetProduct(int\
  \ productId)\n{\n    DataSet ds;\n    try\n    {\n        String sql = \"SELECT\
  \ * FROM Production.Product \" +\n                     \"WHERE ProductID = @ProductID\"\
  ;\n        using (DbCommand dbCmd = db.GetSqlStringCommand(sql))\n        {\n  \
  \          db.AddInParameter(dbCmd, \"@ProductID\",\n                          \
  \   DbType.Int32, productId);\n            ds = db.ExecuteDataSet(dbCmd);\n    \
  \    }\n    }\n    catch (Exception ex)\n    {\n        // handle exception\n  \
  \      throw;\n    }\n    return ds;\n}\n```\n\n当 `ProductID` 在用户界面层被验证后，你可以采取适当的操作，例如向用户显示有意义的验证消息。这样做可以防止垃圾数据进入数据库。\n\
  \n还可以采取另一步来进一步保护数据，但这无法通过内联 SQL 完成。当所有与数据库的交互都通过存储过程而不是内联 SQL 完成时，你可以锁定对表的访问，并特别允许特定用户访问存储过程。\n\
  \n##### 存储过程\n\n存储过程可用于扩展你的应用程序，并在你的用户界面和底层数据之间提供一个干净灵活的桥梁。通过阻止对表的访问，你使存储过程成为访问数据库的唯一入口点。当所有数据都通过一个可以包含编程逻辑的存储过程层时，你将拥有极大的灵活性。\n\
  \n作为你的公共接口的存储过程成为你数据访问层不可或缺的一部分。事实上，如果你有五个应用程序使用你的数据库，并且你想记录每次从 `Production.Product`\
  \ 表中删除记录的操作，那么用于删除这些记录的存储过程可以被更新以处理日志记录。你不需要将该变更纳入五个应用程序中的每一个。而且，如果你选择调整数据库的结构，例如进一步规范化结构，在许多情况下，存储过程仍然可以使用相同的参数并在结构变更后返回相同的输出。\n\
  \n你还可以将一些开发人员可能认为是业务逻辑的内容封装在存储过程中。通常，将业务逻辑深埋在存储过程中并不是一个好主意。存储过程通常用 T-SQL 创建，对于试图避免用\
  \ T-SQL 编写任何内容的普通开发者来说，它不像 C# 代码那样具有表现力和可测试性。那些对 T-SQL 很熟悉的开发者可能不同意将业务逻辑放入存储过程的可行性。\n\
  \n有时业务逻辑已经与数据库结构紧密绑定。例如，确定产品是否在销售以及销售价格的逻辑可能被认为是业务逻辑。但是将产品表连接到销售计划表和定价表是结构性逻辑。如果我在销售期间运行一个名为\
  \ `GetProduct` 的存储过程，它会给我折扣价。在其他任何时间运行它，它会给我常规价格。将此类逻辑封装在存储过程中非常有吸引力，因为它提供了诸多优势。它向你的应用程序隐藏了数据库的结构，并提供了你所需的数据。而且，如果数据库最初创建时没有销售功能，存储过程让你有机会推出这样的功能，而无需同时更新你的应用程序代码。\n\
  \n我们将职责分配给 T-SQL 与应用程序其余部分之间的界限，是我们有时会跨越的。\n\n因为你可以识别哪些存储过程已存在，所以你可以准确识别哪些命令正在访问数据库。你还可以直接访问所有这些命令。\n\
  \n如果你因任何原因决定重组表，你可以编写一组脚本来调整表并更新存储过程以执行变更。如果你有查询分散在五个应用程序中，你将不得不查看每个应用程序，以了解每个查询在各自应用程序源代码中是如何工作的。如果一个查询是以复杂的方式组装的，你可能很难确认你的更新不会导致破坏性变更。展望未来，我们将利用存储过程提供的所有优势。\n\
  \n## 使用 DataObjects 和 ObjectDataSource\n\n我们再次回到 `DataObjects` 和 `ObjectDataSource`，它们在第二章中作为我们数据模型选择的一部分被简要介绍过。在所有选择中，这两个最值得关注，因为它们提供了极大的灵活性。这些功能旨在无缝协作，并提供丰富的工具支持，使开发人员能够对数据层进行大量控制。这些组件为我们提供了一种智能的方式，将应用程序插入数据源。\n\
  \n在应用程序插入数据源后，数据将以我们选择的任何形式通过管道流动。\n\n\n\n### 第 7 章：手动数据访问层\n\n作为创建数据访问层的开发人员，您将创建标记有\
  \ `DataObject` 属性的类，其方法标记有 `DataObjectMethodType` 属性，这些属性指明了该方法将为 `ObjectDataSource`\
  \ 提供什么。表 7-1 列出了 `DataObectMethodType` 的各个值。\n\n## 表 7-1. DataObjectMethodType 枚举\n\
  \n*   `Insert`\n    表示执行插入操作的方法\n*   `Update`\n    表示执行更新操作的方法\n*   `Delete`\n \
  \   表示执行删除操作的方法\n*   `Select`\n    表示检索数据的方法\n*   `Fill`\n    表示填充 `DataSet` 的方法\n\
  \n![图 30](img/index-205_1.jpg)\n\n当使用数据访问层的开发人员将 `ObjectDataSource` 拖到设计界面上时，向导面板将首先引导开发人员选择任何标记为\
  \ `DataObject` 的类，然后为所选类选择带有 `DataObjectMethodType` 属性的方法。它向开发人员显示返回类型和参数，以及方法名——方法名应足够明确以表明其功能（见图\
  \ 7-4）。\n\n## 图 7-4. ObjectDataSource 向导方法选择\n\n通过引导开发人员找到正确的对象和方法，您可以大大简化他们的工作，同时鼓励他们使用正确的方法。翻查源代码并猜测该使用哪些类和方法会花费更多时间，并且如果他们选择错误，可能会引入问题。更糟糕的是，他们可能会放弃并绕过数据访问层直接访问数据库。通过鼓励开发团队使用\
  \ `ObjectDataSource` 和正确构建的数据访问层，他们将习惯于以这种方式使用设计界面来构建应用程序，并期望数据库开发人员为他们提供实现应用程序功能所需的类和方法。建立了这种关系后，随着应用程序开发人员开始依赖数据库开发人员，您可以开始规范沟通。\n\
  \n## 设计契约\n\n当应用程序开发人员显示一组关于产品的数据时，他们将使用像 `GridView` 这样的数据绑定控件。而当开发人员使用 `ObjectDatasSource`\
  \ 通过您创建的数据访问层将数据绑定到该 `GridView` 时，他们将选择一个符合需求的类和方法。当选择一个名为 `ProductDomain` 的对象，它有一个名为\
  \ `GetAllProducts` 的方法并返回 `ProductCollection` 时，开发人员会认为这是正确的选择。但这些名称不应仅仅表示与产品有关。名称和对象代表了数据访问层正在维护的、供任何使用它的应用程序使用的**设计契约**。这些对象和方法如何收集数据并返回并非设计契约的一部分细节，但有哪些方法可用以及它们返回什么则很重要。违反契约将导致运行时异常。\n\
  \n另一个同样返回 `ProductCollection` 的、名为 `GetProductsByCategory` 的方法应包含与 `GetAllProducts`\
  \ 方法返回的相同的列。`ProductDomain` 类上的方法可以设置为 `public` 或 `private`。将它们设为 `private` 会明确地将其排除在设计契约之外。对于\
  \ `public` 方法，您可以使用 `DataObjectMethodType` 来标记它们，以定义该方法的预期用途。在使用了返回 `ProductCollection`\
  \ 的方法后，开发人员应能够使用 `ProductDomain` 类上的其他方法，而不必担心数据与预期不同。\n\n随着应用程序开发人员需要数据访问层提供功能，设计契约将进行协商以纳入所需内容以及何时提供。并且在新功能发布后，未经适当通知应用程序开发人员，不得更改契约。\n\
  \n## 数据契约\n\n在开发人员将其应用程序通过隐含的设计契约接入您的数据层后，还存在另一个协议。设计契约定义了数据流经的管道，但传递的消息必须用**数据契约**来定义。如果\
  \ `ProductCollection` 持有的 `Product` 对象具有名为 `ProductName`、`ProductNumber` 和 `Price`\
  \ 的属性，则必须维护该数据契约。一旦数据绑定设置完成，日后更改该名称即使不是不可能，也会非常困难。\n\n数据契约包括字段的名称及其类型。如果 `ProductName`\
  \ 是 `String` 类型而 `Price` 是 `Decimal` 类型，那么对于数据访问层的未来版本，它应始终保持如此。数据绑定将使用这些名称进行声明，并期望绑定首次声明时定义的类型。更改数据契约将需要更新应用程序以防止运行时异常。\n\
  \n当然，有时数据契约必须更改，正如数据本身也会变化一样。在这样做时，您应首先将版本号递增到下一个重要的值。然后，您应生成文档解释任何破坏性更改，以及开发人员应如何调整其应用程序以适应新的数据契约。您还可以在过渡期内提供帮助，此时旧的数据契约会被维护，并设定一个明确的结束日期。\n\
  \n在一个简单的场景中，您从一个 `Person` 对象开始，它有一个 `Name` 属性代表一个人的全名。后来，由于需求变更，`Name` 被拆分为名为 `FirstName`、`MiddleInitial`\
  \ 和 `LastName` 的属性。您可以通过添加新属性同时保留旧属性来启动一个过渡期。清单 7-6 显示了一个标记为 `Obsolete` 的方法。\n\n\
  ## 清单 7-6. 拆分 Name 属性\n\n```csharp\n/// <summary>\n/// 期望格式如 \"John Q Public\" 或\
  \ \"John Public\" 的名称\n/// </summary>\n[Obsolete(\"请使用 FirstName, MiddleInitial\
  \ 和 LastName\")]\npublic string Name\n{\n    get\n    {\n        if (String.IsNullOrEmpty(MiddleInitial))\n\
  \        {\n            return FirstName + \" \" + LastName;\n        }\n      \
  \  return FirstName + \" \" + MiddleInitial + \" \" + LastName;\n    }\n    set\n\
  \    {\n        string[] parts = value.Split(\" \".ToCharArray()[0]);\n        FirstName\
  \ = parts[0];\n        if (parts.Length > 2)\n        {\n            MiddleInitial\
  \ = parts[1];\n            LastName = parts[2];\n        }\n        else if (parts.Length\
  \ > 1)\n        {\n            MiddleInitial = String.Empty;\n            LastName\
  \ = parts[1];\n        }\n    }\n}\n```\n\n在清单 7-6 中，`Name` 属性包装了新引入的属性，以维护现有的数据契约，同时为开发人员提供开始迁移其应用程序的选择。为了帮助开发人员，在\
  \ `Name` 属性上放置了 `Obsolete` 属性，以便在他们的代码编译时显示警告。警告包含一条有用的信息，说明现在应使用哪些属性。\n\n也许您的数据访问层初始版本为\
  \ 1.2.0.8。当您应用这些过渡性更改时，将版本设置为 1.2.1.0 并发布给开发人员。过渡期结束后，您可以将版本号更显著地提升，比如到 1.3.0.0\
  \ 甚至 2.0.0.0，这应该能促使开发人员意识到已经发生了重大更改。如果开发人员只看到非常小的版本号增加，他们可能会认为这只是一个次要的错误修复版本，并在没有适当评估和考虑更改的情况下开始使用它。\n\
  \n\n## 测试设计与数据契约\n\n由于无法完全利用编译时支持来避免运行时异常，因此必须对应用程序进行测试。自然，这是添加自动化测试的良好位置。这些测试将确认从数据源检索的数据包含具有正确类型的预期字段。\n\
  \n这些测试可以在两个不同层次上完成。直接在数据访问层之上，可以有一组单元测试来确保返回预期数据；一个测试数据库会被填充特定数据，数据访问层和测试使用这些数据来返回一致的结果。\n\
  \n数据访问层通过这些测试后，下一步是包含集成测试，这些测试将考虑通过数据绑定使用的数据。\n\n测试代码相当容易。测试网页上的数据绑定则不那么容易。此步骤现在需要加载每个页面，并检查每个值是否看起来正确且不会引发异常。诸如\
  \ Microsoft Visual Studio Team System 之类的工具提供了创建和运行此类测试的工具。或者，您可以使用 OpenQA 的 Selenium，它为网页提供跨浏览器和跨平台的测试功能。\n\
  \n在这些集成测试中，您加载页面并验证预期值是否出现在页面上。\n\n#### 构建数据库\n\n每当我构建应用程序时，我总是从数据库开始。这是一种自下而上的方法。\n\
  \n我知道我将管理哪些数据以及需要对数据执行哪些操作，因此我首先规划数据库将存储什么、数据之间的关系将如何工作以及应用程序将如何与之交互。通过将工作范围仅限于数据库，工作可以更快地推进，而不会被界面或其他辅助细节分心。数据库功能完成后，构建应用程序的前端就容易得多。\n\
  \n在本章中，您将构建一个社交书签网站，该网站保存链接并具有用于浏览链接的标签系统。个人资料将直接与标准的 `ASP.NET Membership User`\
  \ 帐户集成，以便您可以利用 `ASP.NET` 中所有其他可用的用户帐户管理功能。\n\n##### 创建数据库结构\n\n数据结构将保存链接和标签，以及与\
  \ `Membership User` 的关联。它将采用完全规范化的方式进行分解，以减少存储需求并优化数据访问速度。我的假设是许多用户将使用该应用程序，并且不同用户会保存相同的链接并使用相同的标签，因此我希望仅存储一次这些公共数据，并仅保留与该数据的关系。\n\
  \n图 7-5 列出了数据库结构。它显示了核心部分是 `FavoriteLinks` 表，周围环绕着所有相关数据。\n\n![图片 31](img/index-209_1.png)\n\
  \n**图 7-5.** 数据库结构\n\n#### 整合数据\n\n由于许多用户会存储相同的 URL 和标题作为其链接的一部分，因此这些数据保存在与 `FavoriteLinks`\
  \ 表分离的表中。当用户存储 `http://youtube.com/` 的链接时，保存过程将在 `LinkUrls` 表中创建一个新记录。下一个保存相同链接的用户将简单地指向现有记录。对于链接使用的任何标题，`LinkTitles`\
  \ 表也是如此。这样，数据库中将存储尽可能少的数据。\n\n减少数据重复还降低了全表扫描以及表范围扫描的成本。在接下来的存储过程中，努力确保数据被清除任何未使用的数据，并且数据库尽可能小。当链接或标签不再被任何用户使用时，它将从数据库中删除。\n\
  \n#### 管理关系\n\n数据并非存在于真空中。在普通数据库中，表之间可能存在许多关系。关系类型可分为三组：\n\n*   `一对一`\n*   `一对多`\n\
  *   `多对多`\n\n`一对一` 关系乍看之下可能不是特别有用，但请考虑如何拆分数据。您可以将关于用户最常访问的数据信息保存在一个表中，而将额外的详细信息保存在另一个表中。我将第一个表称为摘要表，第二个表称为详细信息表。而且我可能拥有多个详细信息表。在\
  \ `FavoriteLinks` 数据库中，`Membership User` 记录与单个收藏链接配置文件具有关系。这并非为了规范化数据，而是为了按用途对数据进行分组。一个包含\
  \ 30 列的表在硬盘扫描每条记录方面将难以查询，更不用说读取和维护索引了。通过拆分数据，您可以增强性能。\n\n当数据被拆分时，您还有机会考虑对数据进行分区以获得进一步的性能提升。\n\
  \n您需要仔细地将数据分组到表中，以在应用程序所需的所有查询中创建尽可能少的连接。理想情况下，您在从详细信息表访问相关记录后，将使用其主键直接访问详细信息表。\n\
  \n下一种关系是 `一对多`。对于 `FavoriteLinks` 数据库，存在多个 `一对多` 关系。`Profile` 表中的一条记录可以有多个指向 `FavoriteLinks`\
  \ 表的引用。子记录在每个实例中指回父记录以允许多个关系。这些子对父的引用是通过外键完成的，这要求将子记录中的一列与父记录的主键配对。这意味着访问索引列，这有助于加快利用这些关系的查询速度。令人惊讶的是，我遇到过未正式使用外键的数据库。关系存在，但向数据库添加外键约束的额外步骤并未完成。我确信创建此类数据库的开发人员在准备首次发布应用程序时，不想处理外键约束的麻烦。一个简单的脚本来添加和移除约束本可以消除这个问题。\n\
  \n我还发现，当开发数据库中没有外键约束时，关系可能会变得有点混乱。当父记录被删除时，您可能会留下子记录，这些记录会随着时间的推移而累积，并用垃圾数据填满您的数据库。当我使用新数据库或维护现有数据库时，我在开发存储过程时会保留外键约束，以确保我尊重这些关系。调整存储过程以采取必要步骤满足约束要求是非常简单的。\n\
  \n最后，逻辑上存在 `多对多` 关系，但不应直接用两个表表示。有必要将此类关系拆分为三个表，中间的表充当两个 `一对多` 关系之间的链接。在当前数据库中，`FavoriteLinks`\
  \ 数据库与 `TagTokens` 表具有 `多对多` 关系，该关系通过 `LinkTags` 表组织。对于这种关系，同一个标签可以放在许多链接上，而一个链接可以拥有许多标签。我选择将中间的表称为\
  \ `LinkTags`。中间表取相关表的部分内容是有用的。\n\n这种结构使得轻松识别这些“桥梁”表，并一目了然地显示关系。\n\n## 创建与修改时间\n\n\
  ## 表设计：维护创建与修改时间戳\n\n每当从零开始创建数据库时，我喜欢在每个表的末尾添加 `created` 和 `modified` 字段，并在每次插入和更新时维护它们。掌握这些细节的访问权限有很多好处。首先，在数据库使用了很长时间后，你可以查看表中某些行有多“老”。这使你有机会清除或归档那些久未被访问的旧数据。你还可以根据\
  \ `Created` 或 `Modified` 值对旧数据进行逻辑分区。当一个表变得非常大时，你可能只访问最近创建或修改的数据。在数据被分区后，你可以在查询中仅扫描该子集，而无需对整个表进行全表扫描。\n\
  \n> **注意**：分区属于数据库管理员的职责范围，本书不深入讨论。在考虑数据的逻辑分组时，与你的 DBA 讨论分区策略会很有用，以确定根据你的数据库结构和可用硬件可以采取哪些措施。\n\
  \n## 关于空值（Null）的处理\n\n如何处理空值（`null`）的决定对某些开发团队来说是一个敏感问题。\n\n有些人倾向于完全不允许空值，只使用已知的默认值；而另一些人则认为真正的空值应该被保留为\
  \ `null`。争论的焦点将取决于你能否将默认值的定义传达给数据库的所有用户——这即使不是不可能，也通常是困难的。同时，空值是众所周知的存在，并且会迫使应用程序开发人员迟早处理它。然而，当你能够阻止空值从数据库中输出时，你就降低了数据访问层的复杂性。\n\
  \n当一个列可能返回空值时，使用该值需要额外的步骤来检查该值是否可以安全地转换为不允许空值的类型（如 `int` 或 `DateTime`）。这个额外的空值检查会对性能产生影响。传统的方法是检查该值是否匹配\
  \ `DBNull.Value`，如果不是空值则进行转换。清单 7-7 展示了传统的做法。\n\n**清单 7-7. 传统的空值处理代码**\n```\nDateTime\
  \ birthDate;\n\nif (!DBNull.Value.Equals(row[\"BirthDate\"]) && row[\"BirthDate\"\
  ] is DateTime)\n{\n    birthDate = (DateTime)row[\"BirthDate\"];\n}\n```\n\n或者，你可以通过为\
  \ `DateTime` 和 `int` 使用可空类型来简化这段代码，这样你就可以直接使用 `as` 运算符进行转换（见清单 7-8）。\n\n**清单 7-8.\
  \ 简化的空值处理代码**\n```\nDateTime? birthDate;\n\nbirthDate = row[\"BirthDate\"] as DateTime?;\n\
  ```\n\n清单 7-8 中的简化代码结合了可空类型和 `as` 运算符，允许将空值赋值，而不会有 `NullReferencesException` 或 `InvalidCastException`\
  \ 的风险。`as` 运算符首先测试转换是否有效，然后再完成转换。检查是否匹配 `DBNull.Value` 或使用 `as` 运算符是没有必要的。\n\n如果你选择使用默认值，你可以使用在整个应用程序中明确定义的默认值。对于\
  \ `String` 来说，自然的选择是 `String.Empty`，而像 `int` 和 `DateTime` 这样的类型没有明显的默认值。通常，数值默认是正数，特别是当它被用作从\
  \ 0 开始递增的标识值的主键时。在这种情况下，`-1` 是一个明确的选择。\n\n对于 `DateTime`，你可能想使用 `DateTime.MinValue`，但\
  \ SQL Server 不允许在数据库中为 `DateTime` 类型使用该值，因为它将日期限制为大于 1753 年 1 月 1 日。你将需要使用一个替代值。在微软内部，使用的是\
  \ 1754 年 1 月 1 日的值，在大多数情况下这是一个合理的默认值。\n\n## 表 7-2. 建议的默认值\n\n| 类型        | 默认值 \
  \          |\n|-------------|------------------|\n| 字符串      | `String.Empty`  \
  \ |\n| 日期时间    | `1/1/1754`       |\n\n将这些值设置为数据访问层中的常量后，它们就可以在应用程序的其余部分进行检查。如果将来您选择更改默认值，只需更新这些常量，即可在整个应用程序中反映更改。当数据访问层和数据库都设置为识别相同的默认值时，您可以通过存储过程妥善处理它们。这样，即使不允许存储过程返回\
  \ null 值，您仍然可以在数据库中设置 null。\n\n### 防止空值\n\n假设您确实有一个包含 `DateTime` 类型列 `BirthDate`\
  \ 的表，并且该列允许 null 值。返回此值的存储过程可以使用 `COALESCE` 函数将 null 值转换为默认日期值。代码清单 7-9 展示了如何使用\
  \ `COALESCE` 函数。\n\n**代码清单 7-9. 为 Null 值返回默认日期**\n\n```sql\nSELECT\n    COALESCE(\n\
  \        BirthDate,\n        Convert(DateTime, '1/1/1754')\n    ) AS BirthDate\n\
  FROM chpt07_Nullable\n```\n\n当向系统发送默认值时，我们也可以将默认值转换为 null 进行存储。代码清单 7-10 展示了此检查与转换过程。\n\
  \n**代码清单 7-10. 将默认日期转换为 Null**\n\n```sql\nDECLARE @DefaultDate DateTime\nSET @DefaultDate\
  \ = Convert(DateTime, '1/1/1754')\nDECLARE @BirthDate DateTime\nSET @BirthDate =\
  \ Convert(DateTime, '1/1/1754')\nIF (@BirthDate = @DefaultDate)\nBEGIN\n    SET\
  \ @BirthDate = NULL\nEND\n```\n\n通过在存储过程中处理默认值转换，您能获得比 `CLR` 代码更好的性能，并避免了检查类型是否为\
  \ `DBNull.Value` 以及进行类型转换的开销。\n\n### COALESCE 与 ISNULL\n\n`COALESCE` 函数是一个标准 SQL\
  \ 函数，而 `ISNULL` 是 SQL Server 提供的专有函数。`ISNULL` 函数通常可以与 `COALESCE` 函数互换使用，并且可能提供更好的性能。您需要运行自己的测试来收集指标，以确定您的具体查询从哪个函数中获益更多，因为在特定条件下，其中一个可能比另一个更快。\n\
  \n对于 FavoriteLinks 数据库，我选择不在表级别允许 null 值。对于这个小型应用程序，可以合理地确保在整个应用程序中遵循默认值。应用程序还将使用验证来确保不会向数据访问层发送空字符串，这本身就能防止\
  \ null 值进入系统。\n\n#### 使用数据库项目\n\n为了构建数据库，我使用了 Visual Studio 2005 专业版中的一个功能——数据库项目。每个表和存储过程脚本都经过独特的组织和源代码控制，这使得跨应用程序版本管理数据库变更更加容易。\n\
  \n#### 管理脚本\n\nFavoriteLinks 数据库包含六个表，如图 7-5 所示。除了这些表之外，还有多个脚本文件，其中包含应用程序所需的所有访问这些表的存储过程脚本。还有用于添加和删除维护表间关系的约束的脚本。所有这些脚本都被组织到文件夹中的组里。\n\
  \n数据库项目的一个隐藏功能是智能依赖关系分析，当您选择多个脚本并运行它们时，此分析会透明地执行。Visual Studio 会检查所选的脚本，并根据依赖关系，以正确的顺序运行它们，以确保脚本成功运行。如果您碰巧在一个表脚本中定义了一个外键，该外键引用了按字母顺序排在其后的另一个表，那么在运行脚本时，运行顺序将会被调整。\n\
  \n\n除了外键约束，存储过程还可以引用其他存储过程。选择并运行所有存储过程也有助于确定执行顺序，并能避免因使用了尚未定义的资源而产生的警告。我发现，如果我对所有存储过程做了多处修改，在完成修改后选择并运行所有存储过程是很有帮助的。\n\
  \n## 规划存储过程\n\n对于“收藏链接”网站，用户将存储多个链接以及标签和其他相关数据。为了实现此功能，存储过程将涵盖所有访问功能，包括获取、保存和清除数据。尽管六张表之间的关系很复杂，但构建在表结构之上的层并不必直接反映这种复杂性。从存储过程开始，抽象层将使数据更易于使用。\n\
  \n##### 获取数据\n\n要构建的第一组存储过程是从数据库获取数据的那些。主要数据是链接，因此我们将详细查看这些。其中，核心过程将是获取与某个配置文件相关的所有链接的过程，如\
  \ `代码清单 7-11` 所示。\n\n`代码清单 7-11.` `chpt07_GetFavoriteLinksByProfileID.sql`\n```\n\
  CREATE Procedure dbo.chpt07_GetFavoriteLinksByProfileID\n(\n    @ProfileID int\n\
  )\nAS\nSELECT\n    fl.FavoriteLinkID AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n\
  \    fl.Rating,\n    fl.Note,\n    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks\
  \ AS fl\nJOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles\
  \ AS lt ON lt.LinkTitleID = fl.LinkTitleId\nWHERE fl.ProfileID = @ProfileID\nORDER\
  \ BY fl.Created DESC\nGO\n```\n\n我们将把这个存储过程与下一个最常用的存储过程进行比较，如 `代码清单 7-12` 所示。\n\n\
  `代码清单 7-12.` `chpt07_GetFavoriteLinksByTag.sql`\n```\nCREATE Procedure dbo.chpt07_GetFavoriteLinksByTag\n\
  (\n    @ProfileID bigint,\n    @Token nvarchar(30)\n)\nAS\nSELECT\n    fl.FavoriteLinkID\
  \ AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n    fl.Rating,\n    fl.Note,\n\
  \    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks AS fl\nJOIN chpt07_LinkUrls\
  \ AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles AS lt ON lt.LinkTitleID\
  \ = fl.LinkTitleId\nJOIN chpt07_LinkTags AS lt2 ON lt2.FavoriteLinkID = fl.FavoriteLinkID\n\
  JOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt2.TagTokenID\nWHERE fl.ProfileID\
  \ = @ProfileID AND tt.Token = @Token\nORDER BY fl.Created DESC\nGO\n```\n\n在这两个存储过程中，结果集是相同的。使结果集相同是刻意为之，以保持它们彼此兼容。稍后在数据访问层中，同一个业务对象将保存来自\
  \ FavoriteLinks 数据库的数据，并且将需要这些值。这些存储过程之间的唯一区别在于传入的参数以及它们筛选结果的方式。在 `chpt07_GetFavoriteLinksByProfileID`\
  \ 中，`@ProfileID` 用于访问保存到指定配置文件的所有链接。在 `chpt07_GetFavoriteLinksByTag` 中，再次提供了 `@ProfileID`，同时还有\
  \ `@Token` 参数，以将结果范围限制为匹配的标签。除此之外，用于整合所有数据的一系列连接操作保持一致。还有其他筛选收藏链接列表的标准，它们都通过使用不同的参数返回相同的列。\n\
  \n## 优化内容与方法\n\n提高数据访问层的性能需要知道优化什么以及如何去做。通过简单地将“获取”查询放入一组有限的存储过程中，你可以让 SQL Server\
  \ 专注于最频繁运行的查询并调整其查询计划。而且，由于你查询数据库的次数多于保存或删除数据的次数，你可以将大部分精力用于优化从数据库获取数据的过程。随着时间的推移，你可以对这组有限的存储过程进行性能分析，并根据需要进一步优化它们。\n\
  \n\n"
- "# 第七章：手动数据访问层\n\n## 保存数据\n\n接下来，用于通过插入或更新来保存链接的存储过程提出了一个更具挑战性的要求。该过程不仅要保存链接的核心详细信息，还必须获取\
  \ `Title` 和 `Url` 值，将它们存储到辅助表中，同时避免为相同的值创建重复记录。表的设计允许一条 `Favorite Link` 记录指向其他 `Favorite\
  \ Link` 记录已在使用的同一个 `Url` 记录。\n\n所有协调此操作的工作都将在 `chpt07_SaveFavoriteLink` 存储过程中进行管理。首先，该存储过程将接收保存数据所需的所有参数，如代码清单\
  \ 7-13 所示。\n\n**代码清单 7-13.** `chpt07_SaveFavoriteLink` 的参数\n\n```sql\nCREATE Procedure\
  \ dbo.chpt07_SaveFavoriteLink\n(\n    @ProfileID bigint,\n    @Url nvarchar(250),\n\
  \    @Title nvarchar(150),\n    @Keeper bit,\n    @Rating smallint,\n    @Note nvarchar(500),\n\
  \    @Created datetime,\n    @Modified datetime,\n    @OldFavoriteLinkID bigint,\n\
  \    @FavoriteLinkID bigint OUTPUT\n)\n```\n\n处理保存过程的第一步是将 `Url` 和 `Title` 值保存到辅助表，并取回\
  \ `ID` 值以用于外键引用。代码清单 7-14 展示了如何开始。\n\n**代码清单 7-14.** 保存 Title 和 Url 值\n\n```sql\n\
  DECLARE @LinkUrlID int\nDECLARE @LinkTitleID int\nEXEC chpt07_SaveLinkUrl @Url,\
  \ @LinkUrlID OUTPUT\nEXEC chpt07_SaveLinkTitle @Title, @LinkTitleID OUTPUT\n```\n\
  \n在 `LinkUrlID` 和 `LinkTitleID` 的值设置好之后，就可以保存主记录了。因为这是一个保存例程，该过程可能是插入一个新记录，也可能是更新一个记录。在决定是插入还是更新之前，必须检查\
  \ `@OldFavoriteLinkID` 的值。如果该值为正数，则表示保存操作意在更新一个已知的现有记录。此外，如果 `@OldFavoriteLinkID`\
  \ 值为负数（意味着未定义），则应检查是否已存在具有相同 `Url` 和 `Title` 值的 `Favorite Link` 记录。代码清单 7-15 中的代码处理这项工作。\n\
  \n**代码清单 7-15.** 检查现有记录\n\n```sql\nIF (@OldFavoriteLinkID < 0 AND EXISTS (\n   \
  \ SELECT * FROM chpt07_FavoriteLinks\n    WHERE LinkUrlID = @LinkUrlID AND ProfileID\
  \ = @ProfileID\n))\nBEGIN\n    SET @OldFavoriteLinkID =\n        (SELECT FavoriteLinkID\
  \ FROM chpt07_FavoriteLinks\n         WHERE LinkUrlID = @LinkUrlID AND ProfileID\
  \ = @ProfileID)\nEND\n```\n\n最后，我们应该能够根据 `@OldFavoriteLinkID` 的值是否指向指定配置文件的一个现有记录来决定执行插入还是更新。如果记录确实存在，则执行插入。否则，执行更新，如代码清单\
  \ 7-16 所示。\n\n**代码清单 7-16.** 通过插入或更新进行保存\n\n```sql\nIF EXISTS (SELECT * FROM chpt07_FavoriteLinks\n\
  \    WHERE FavoriteLinkID = @OldFavoriteLinkID\n    AND ProfileID = @ProfileID)\n\
  BEGIN\n    UPDATE chpt07_FavoriteLinks\n    SET\n        LinkUrlID = @LinkUrlID,\n\
  \        LinkTitleID = @LinkTitleID,\n        Keeper = @Keeper,\n        Rating\
  \ = @Rating,\n        Note = @Note,\n        Modified = GETDATE()\n    WHERE\n \
  \       FavoriteLinkID = @OldFavoriteLinkID AND\n        ProfileID = @ProfileID\n\
  \    SET @FavoriteLinkID = @OldFavoriteLinkID\nEND\nELSE\nBEGIN\n    INSERT INTO\
  \ chpt07_FavoriteLinks\n        (ProfileID, LinkUrlID, LinkTitleID, Keeper,\n  \
  \      Rating, Note, Created, Modified)\n    VALUES (\n        @ProfileID,\n   \
  \     @LinkUrlID,\n        @LinkTitleID,\n        @Keeper,\n        @Rating,\n \
  \       @Note,\n        @Created,\n        @Modified\n    )\n    SELECT @FavoriteLinkID\
  \ = @@IDENTITY\nEND\nGO\n```\n\n在任何一种情况下，`@FavoriteLinkID` 的值都会被设置为受影响记录的标识，该值作为一个输出参数提供给存储过程的调用者。\n\
  \n## 删除数据\n\n\n\n## 删除数据\n\n存储过程处理的最后一项主要工作是删除数据。对于 `FavoriteLinks` 数据库而言，移除对 `TagToken`\
  \ 记录的引用（即从 `Favorite Link` 记录中删除标签关联）很容易，但这并非一个简单的 `DELETE` 语句就能搞定。要删除所有不再被引用的 `TagToken`\
  \ 记录，必须完成几个步骤，从代码清单 7-17 开始。\n\n### 代码清单 7-17. RemoveLinkTag 存储过程的第一步\n\n```sql\n\
  CREATE Procedure dbo.chpt07_RemoveLinkTag\n(\n@FavoriteLinkID bigint,\n@Token nvarchar(30)\n\
  )\nAS\nDECLARE @LinkTagID bigint\nSET @LinkTagID = (\nSELECT TOP 1 lt.LinkTagID\n\
  FROM chpt07_LinkTags AS lt\nJOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt.TagTokenID\n\
  WHERE lt.FavoriteLinkID = @FavoriteLinkID AND tt.Token = @Token\n)\nDELETE FROM\
  \ chpt07_LinkTags WHERE LinkTagID = @LinkTagID\n```\n\n这第一步接收 `@FavoriteLinkID`\
  \ 和 `@Token` 参数，并获取 `@LinkTagID` 的值。一旦获知该 ID，就可以删除该记录。现在，我们需要检查 `@Token` 值是否被任何其他记录引用，如代码清单\
  \ 7-18 所示。\n\n### 代码清单 7-18. 统计令牌引用次数\n\n```sql\nDECLARE @TokenCount int\nSET @TokenCount\
  \ = (\nSELECT COUNT(*)\nFROM chpt07_LinkTags AS lt\nJOIN chpt07_TagTokens AS tt\
  \ ON tt.TagTokenID = lt.TagTokenID\nWHERE tt.Token = @Token\n)\n```\n\n8601Ch07CMP2\
  \ 8/24/07 12:23 PM Page 214 **214** 第 7 章 ■ 手动数据访问层\n\n如果计数为零，说明没有记录引用它，那么该记录就可以在最后一步安全删除，如代码清单\
  \ 7-19 所示。\n\n### 代码清单 7-19. 删除令牌记录\n\n```sql\nIF (@TokenCount = 0)\nBEGIN\nDELETE\
  \ FROM chpt07_TagTokens WHERE Token = @Token\nEND\n```\n\n这个过程将保持数据库尽可能小，这将有助于维持使用此数据的查询的性能。一个更复杂的场景是彻底清除某个配置文件的所有收藏链接，这涉及到按正确顺序删除\
  \ `Tags`、`Tokens`、`Titles` 和 `Urls` 的记录，以遵守外键约束。对于这个序列，我们将把过程分解为多个存储过程以使其更易于管理。表\
  \ 7-3 列出了这些存储过程。\n\n### 表 7-3. 清除存储过程\n\n| 存储过程 | 描述 |\n|------------------|-------------|\n\
  | chpt07_PurgeProfile | 清除配置文件 |\n| chpt07_PurgeFavoriteLinksByProfileID | 清除收藏链接，包括标题和\
  \ URL |\n| chpt07_PurgeLinkTagsByProfileID | 清除链接标签和令牌 |\n\n从高层次来看，脚本从配置文件开始这个过程，执行存储过程来清除收藏链接，该存储过程进而执行存储过程来清除标签。它像级联一样工作，所有子引用在父记录被删除之前移除，因此不会违反外键约束。这可能是一个棘手的过程，因为如果父记录指向某个子记录，你就无法删除该子记录。你必须在删除父记录之前创建一个子记录列表，以便之后可以删除子记录。\n\
  \n我们将从底层开始，深入分析由 `chpt07_PurgeLinkTagsByProfileID` 存储过程处理的链接标签，从代码清单 7-20 开始。\n\n\
  ### 代码清单 7-20. chpt07_PurgeLinkTagsByProfileID 的第一步\n\n```sql\nCREATE Procedure\
  \ dbo.chpt07_PurgeLinkTagsByProfileID\n(\n@ProfileID int\n)\nAS\nIF EXISTS (\nSELECT\
  \ * FROM chpt07_LinkTags AS lt\nJOIN chpt07_FavoriteLinks AS fl ON fl.FavoriteLinkID\
  \ = lt.FavoriteLinkID\nWHERE fl.ProfileID = @ProfileID\n)\nBEGIN\n```\n\n8601Ch07CMP2\
  \ 8/24/07 12:23 PM Page 215 第 7 章 ■ 手动数据访问层 **215**\n\n这第一步在开始序列之前检查是否存在任何链接标签。因为清除链接标签的工作需要一点设置，这一步有助于避免额外的工作。接下来，会组装要清除的记录列表。代码清单\
  \ 7-21 中的代码展示了清除例程。\n\n### 代码清单 7-21. 组装令牌清除列表\n\n```sql\nDECLARE @TagTokensToPurge\
  \ TABLE\n(\nID int IDENTITY,\nTagTokenID bigint,\n[Count] int\n)\n\nINSERT INTO\
  \ @TagTokensToPurge (TagTokenID, [Count])\nSELECT tt.TagTokenID, COUNT(*) AS [Count]\n\
  FROM chpt07_TagTokens AS tt\n```\n\n\n\n\n\n```sql\nJOIN chpt07_LinkTags AS lt ON\
  \ lt.TagTokenID = tt.TagTokenID\nJOIN chpt07_FavoriteLinks AS fl ON fl.FavoriteLinkID\
  \ = lt.FavoriteLinkID\nWHERE tt.TagTokenID in (\n    SELECT DISTINCT tt2.TagTokenID\n\
  \    FROM chpt07_LinkTags AS lt2\n    JOIN chpt07_TagTokens AS tt2 ON tt2.TagTokenID\
  \ = lt2.TagTokenID\n    JOIN chpt07_FavoriteLinks AS fl2 ON fl2.FavoriteLinkID =\
  \ lt2.FavoriteLinkID\n    WHERE fl2.ProfileID = @ProfileID\n)\nGROUP BY tt.TagTokenID\n\
  HAVING COUNT(*) = 1\n```\n\n为了保存列表，需要声明一个表变量并用查询填充它。这个表变量保存`TagTokenID`及其被引用次数的计数。在清单\
  \ 7-22 中，链接标签最终被删除。\n\n### 清单 7-22. 删除链接标签记录\n\n```sql\nDELETE FROM chpt07_LinkTags\
  \ WHERE LinkTagID IN\n(\n    SELECT lt.LinkTagID FROM chpt07_LinkTags AS lt\n  \
  \  JOIN chpt07_FavoriteLinks AS fl ON fl.FavoriteLinkID = lt.FavoriteLinkID\n  \
  \  WHERE fl.ProfileID = @ProfileID\n)\n```\n\n随着`chpt07_LinkTags`中的父记录被移除，现在可以删除`chpt07_TagTokens`表中的子记录了，如清单\
  \ 7-23 所示。\n\n### 清单 7-23. 删除令牌记录\n\n```sql\nDELETE FROM chpt07_TagTokens WHERE\
  \ TagTokenID IN\n(SELECT TagTokenID FROM @TagTokensToPurge)\n```\n\n一半的依赖关系现已妥善清除。现在必须清除标题和\
  \ URL。这项工作由名为`chpt07_PurgeFavoriteLinksByProfileID`的存储过程完成，其起始部分如清单 7-24 所示。\n\n\
  ### 清单 7-24. chpt07_PurgeFavoriteLinksByProfileID 中的第一步\n\n```sql\nCREATE Procedure\
  \ dbo.chpt07_PurgeFavoriteLinksByProfileID\n(\n    @ProfileID bigint\n)\nAS\nSET\
  \ NOCOUNT ON\nIF EXISTS\n    (SELECT * FROM chpt07_FavoriteLinks WHERE ProfileID\
  \ = @ProfileID) BEGIN\n    EXEC chpt07_PurgeLinkTagsByProfileID @ProfileID\n   \
  \ ...\n```\n\n第一步是检查是否有工作要做，因此使用`@ProfileID`查找任何现有记录。如果有，则执行先前用于清除链接标签的存储过程。下一步是组装要清除的\
  \ URL 列表，如清单 7-25 所示。\n\n### 清单 7-25. 组装 URL 清除列表\n\n```sql\nDECLARE @LinkUrlsToPurge\
  \ TABLE\n(\n    ID int IDENTITY,\n    LinkUrlID bigint,\n    [Count] int\n)\nINSERT\
  \ INTO @LinkUrlsToPurge (LinkUrlID, [Count])\nSELECT lu.LinkUrlID, COUNT(*) AS [Count]\n\
  FROM chpt07_LinkUrls AS lu\nJOIN chpt07_FavoriteLinks AS fl ON fl.LinkUrlID = lu.LinkUrlID\n\
  WHERE lu.LinkUrlID in (\n    SELECT DISTINCT LinkUrlID FROM chpt07_FavoriteLinks\n\
  \    WHERE ProfileID = @ProfileID\n)\nGROUP BY lu.LinkUrlID\nHAVING COUNT(*) = 1\n\
  ```\n\n同样，使用一个表变量来保存记录列表。这次它保存的是`LinkUrlID`。\n\n此步骤在清单 7-26 中针对标题重复进行。\n\n### 清单\
  \ 7-26. 组装标题清除列表\n\n```sql\nDECLARE @LinkTitlesToPurge TABLE\n(\n    ID int IDENTITY,\n\
  \    LinkTitleID bigint,\n    [Count] int\n)\nINSERT INTO @LinkTitlesToPurge (LinkTitleID,\
  \ [Count])\nSELECT lt.LinkTitleID, COUNT(*) AS [Count]\nFROM chpt07_LinkTitles AS\
  \ lt\nJOIN chpt07_FavoriteLinks AS fl ON fl.LinkTitleID = lt.LinkTitleID\nWHERE\
  \ lt.LinkTitleID in (\n    SELECT DISTINCT LinkTitleID FROM chpt07_FavoriteLinks\n\
  \    WHERE ProfileID = @ProfileID\n)\nGROUP BY lt.LinkTitleID\nHAVING COUNT(*) =\
  \ 1\n```\n\nURL 和标题的清除列表只保存具有单一引用的记录。因为即将被删除的记录正是持有引用的记录，所以最后一步就是简单地删除所有父记录和清除列表中的所有项目，如清单\
  \ 7-27 所示。\n\n### 清单 7-27. 清除收藏链接的最后一步\n\n```sql\nDELETE FROM chpt07_FavoriteLinks\
  \ WHERE ProfileID = @ProfileID\nDELETE FROM chpt07_LinkUrls WHERE LinkUrlID IN\n\
  (SELECT LinkUrlID FROM @LinkUrlsToPurge)\nDELETE FROM chpt07_LinkTitles WHERE LinkTitleID\
  \ IN\n(SELECT LinkTitleID FROM @LinkTitlesToPurge)\n```\n\n所有用于获取、保存和删除数据的存储过程就位后，我们就可以开始构建数据访问层了，它将使用所有这些存储过程。\n\
  \n#### 数据访问层\n\n虽然存储过程是数据访问层的关键元素，但许多人认为真正的数据访问层始于 C# 代码开始的地方。在许多情况下，这是正确的。当使用类型化数据集（Typed\
  \ DataSets）自动将表适配器绑定到数据库中的表时，情况就是如此。但本章所做的工作直接将 C# 代码与存储过程耦合在一起，以旨在提升性能的方式分配工作。\n\
  \n为了创建一个能与数据绑定良好协作的数据访问层，我们将创建一个具有默认构造函数的域对象，以便可以用`ObjectDataSource`声明式地实例化它。我们还将创建一个表示收藏链接的业务对象。这个对象将封装数据访问层的内部工作原理，仅向应用层暴露数据。通过隐藏实现细节，使得更新未来的版本更加容易。它使得可以重新设计实现，而无需应用程序的其余部分进行更新。\n\
  \n### 常用文件夹补充\n\n获取、保存和删除的存储过程将随不同的值被经常重用。你可以从可下载的代码示例中取一组这样的存储过程，为自己创建模板，并将它们添加到你的模板文件夹（`D:\\\
  Projects\\Common\\Templates\\ Data Access Layer`）中的 Common 文件夹中。从这些模板开始，应该可以在构建数据访问层时节省你的时间。\n\
  \n### 创建类库\n\n数据访问层应该是可复用的，实现这一点的第一步是将其放在一个类库中。另一种方法是直接在你的应用程序中包含数据访问层。在网站项目的案例中，你会将类放在`App_Code`文件夹中。这样做不允许其他项目将这些类用作依赖项。我们的目标是将数据访问层视为一个内部发布版本，供多个应用程序使用，即使它最初仅由单个网站使用。这样做不需要太多额外的努力，并有助于保持应用程序和数据访问层的优先级分离。\n\
  \n该项目的组织结构应该已经包括数据库项目作为解决方案的一部分。现在可以向解决方案添加一个类库来保存数据访问库。\n\n我倾向于给项目起通用的名称，因此数据库项目命名为`Database`，而类库就简单地称为`ClassLibrary`。这简化了将在第\
  \ 8 章中介绍的脚本编写，因为几乎相同的 MSBuild 脚本可以用在多个解决方案中，只需进行最小的调整。自然，随着`ClassLibrary`项目承担大量的功能，它可以被拆分为多个类库。通过正确使用命名空间，应该可以很容易地将命名空间重新分配到多个类库中，而对使用这些库的应用程序影响最小。实际上，在类库的属性面板中，`Default\
  \ Namespace`的值应设置为应用程序的名称，而类应添加到项目中的文件夹中。对于本章，`Default Namespace`的值是`Chapter07`，而数据访问层的所有代码将放入一个名为`Domain`的文件夹中。创建新类时自动设置的命名空间将是`Chapter07.Domain`。\n\
  \n### 关注点分离\n\n\n\n为了保持数据访问层的模块化特性，组建一个团队专门负责数据层开发，而另一个团队负责应用程序开发，可能会很有帮助。应用程序开发者可以处理业务逻辑方面的需求，同时向数据团队请求必要的功能。这种清晰的分离有助于确保应用程序特有的细节不会被固化到数据访问层中。当应用程序需要一个新功能时，数据团队可以考虑如何在不损害数据访问层完整性的情况下，最好地提供该功能。之后，当包含数据访问层的类库被多个应用程序使用时，该库不应包含应用程序特有的细节，否则下一个应用程序将无法提供这些细节，从而使其更难以被复用。\n\
  \n## 创建数据访问方法\n\n使用企业库中的**数据访问应用程序块**，结合第 2 章介绍的代码片段，可以轻松创建数据访问方法。我们将从类库和一个名为 `Domain`\
  \ 的文件夹开始。在该文件夹中，我们将创建一个名为 `FavoriteLinkDomain` 的类。在准备好第 2 章的代码片段后，我们将使用第一个数据访问代码片段（快捷方式为\
  \ `datypes`）来创建一个新变量。你可以按 Ctrl+K, Ctrl+X 键序列打开代码片段选择器并导航到第一个片段，也可以使用快捷方式，输入 `datypes`\
  \ 然后按两次 Tab 键来立即插入该片段。第一个代码片段只是声明一个对 `Database` 对象的引用，该对象将在类的其余部分中使用。\n\n接下来，我们需要在默认构造函数中实例化\
  \ `Database` 对象。第二个代码片段完成这项工作，其快捷方式定义为 `dacreation`。为域类创建默认构造函数，并将此代码片段插入其中。此片段包含一个连接字符串名称的占位符。目前，我们将它设置为\
  \ `FavoriteLinks`，使其如清单 7-28 所示。\n\n**清单 7-28.** `FavoriteLinkDomain` 的默认构造函数\n\
  ```csharp\npublic FavoriteLinkDomain()\n{\n    db = DatabaseFactory.CreateDatabase(\"\
  FavoriteLinks\");\n}\n```\n\n### 数据库配置\n\n一个简单的应用程序可能只有一个数据库连接。在此类应用程序中，可以将数据访问层配置为使用默认数据库连接，作为企业库配置的一部分。在第\
  \ 8 章，自定义配置将比在数据访问层中硬编码连接字符串名称提供更大的灵活性。\n\n下一步是创建从数据库获取数据的方法。**获取 DataSet 方法**片段将创建一个方法，该方法调用存储过程并用结果构造一个\
  \ `DataSet`。此片段的快捷方式是 `dagetds`。清单 7-29 展示了其中一个获取方法。\n\n**清单 7-29.** 获取最近收藏链接的方法\n\
  ```csharp\npublic DataSet GetRecentFavoriteLinksByProfileID(\n    long profileId,\
  \ int startDaysBack, int endDaysBack)\n{\n    DataSet ds;\n    try\n    {\n    \
  \    using (DbCommand dbCmd = db.GetStoredProcCommand(\n            \"chpt07_GetRecentFavoriteLinksByProfileID\"\
  ))\n        {\n            db.AddInParameter(dbCmd, \"@ProfileID\",\n          \
  \      DbType.Int64, profileId);\n            db.AddInParameter(dbCmd, \"@StartDaysBack\"\
  ,\n                DbType.Int32, startDaysBack);\n            db.AddInParameter(dbCmd,\
  \ \"@EndDaysBack\",\n                DbType.Int32, endDaysBack);\n            ds\
  \ = db.ExecuteDataSet(dbCmd);\n        }\n    }\n    catch (Exception ex)\n    {\n\
  \        throw GetException(\n            \"Error in GetRecentFavoriteLinksByProfileID\"\
  , ex);\n    }\n    //返回结果\n    return ds;\n}\n```\n\n此方法接收三个参数，并用结果填充 `DataSet`。对于此示例项目，还有其他几个获取方法，你可以在本章的可下载代码中找到。\n\
  \n作为使用存储过程结果填充 `DataSet` 的替代方法，你也可以使用返回 `IDataReader` 的片段。此片段的快捷方式是 `dagetdr`。它看起来与\
  \ `DataSet` 方法相同，但返回的是 `IDataReader` 而不是 `DataSet`。\n\n保存方法的工作方式与获取方法不同。它们不是填充 `DataSet`\
  \ 或 `IDataReader`，而是简单地执行一个非查询并返回一个可选的输出参数。用于非查询方法的代码片段快捷方式是 `danonquery`。清单 7-30\
  \ 展示了一个保存方法。\n\n**清单 7-30.** 保存收藏链接的方法\n```csharp\npublic long SaveFavoriteLink(\n\
  \    long profileId, string url, string title,\n    bool keeper, int rating, string\
  \ note, string tags,\n    DateTime created, DateTime modified, long oldFavoriteLinkId)\n\
  {\n    long favoriteLinkId;\n    try\n    {\n        using (DbCommand dbCmd =\n\
  \            db.GetStoredProcCommand(\"chpt07_SaveFavoriteLink\"))\n        {\n\
  \            db.AddInParameter(dbCmd, \"@ProfileID\",\n                DbType.Int64,\
  \ profileId);\n            db.AddInParameter(dbCmd, \"@Url\",\n                DbType.String,\
  \ url);\n            db.AddInParameter(dbCmd, \"@Title\",\n                DbType.String,\
  \ title);\n            db.AddInParameter(dbCmd, \"@Keeper\",\n                DbType.Boolean,\
  \ keeper);\n            db.AddInParameter(dbCmd, \"@Rating\",\n                DbType.Int16,\
  \ rating);\n            db.AddInParameter(dbCmd, \"@Note\",\n                DbType.String,\
  \ note);\n            db.AddInParameter(dbCmd, \"@Created\",\n                DbType.DateTime,\
  \ created);\n            db.AddInParameter(dbCmd, \"@Modified\",\n             \
  \   DbType.DateTime, modified);\n            db.AddInParameter(dbCmd, \"@OldFavoriteLinkID\"\
  , DbType.Int64, oldFavoriteLinkId);\n            db.AddOutParameter(dbCmd, \"@FavoriteLinkID\"\
  ,\n                DbType.Int64, 0);\n            db.ExecuteNonQuery(dbCmd);\n \
  \           object obj = db.GetParameterValue(dbCmd, \"@FavoriteLinkID\");\n   \
  \         favoriteLinkId = (long)obj;\n        }\n    }\n    catch (Exception ex)\n\
  \    {\n        throw GetException(\"Error in SaveFavoriteLink\", ex);\n    }\n\
  \    SaveLinkTags(favoriteLinkId, tags);\n    return favoriteLinkId;\n}\n```\n\n\
  用于删除或清除数据的方法也使用非查询片段来调用存储过程，以执行删除数据所需的必要工作。\n\n这些获取、保存和移除数据的方法都处理的是原始数据。这些原始数据直接绑定到存储过程，存储过程充当数据访问层与数据库中基础表之间的代理。在这些方法之上，用户界面层使用的对象应该以对应用程序所有者和长期维护此软件的开发人员有意义的方式来表示数据。\n\
  \n## 处理异常\n\n在这些数据访问方法中，对数据库的调用总是包裹在 `try...catch` 块中。我加入这个额外保护层有两个主要原因。首先，我希望能够在我知道如何处理问题的数据访问层内部处理该问题。其次，我想在数据访问层中捕获任何可能向用户暴露数据库信息的异常。这样做可以阻止可能导致安全漏洞的问题。然而，添加\
  \ `try...catch` 块可能会降低性能。做出这个选择时已经考虑到了这一点。性能损失应该是微小的。\n\n为了避免进入此 `try...catch` 块的性能影响，我仍然可以使用缓存。如果数据库查询要请求的数据已经在缓存中，则可以避免调用数据库以及异常处理。如果你选择完全去掉\
  \ `try...catch` 块，可以将其剥离，只保留用于 `DbCommand` 资源管理的 `using` 子句。你可能会发现，为性能所做的权衡并不显著到足以放弃紧密异常处理所提供的稳定性和安全性。\n\
  \n## 创建业务对象\n\n\n\n在开发应用程序时，您会希望传递符合业务逻辑的对象。像 `Customer` 这样的业务对象具有诸如 `FirstName`、`LastName`、`CurrentOrder`\
  \ 和 `LastOrder` 等属性。这个业务对象完整实现了对象的三个部分：数据、行为和关系。`Customer` 拥有姓氏和名字，并与他的当前订单及上次订单存在关联。`Customer`\
  \ 也可以完成他的 `CurrentOrder`。这些都是应用程序所有者理解并通过精心设计的业务对象传达给开发团队的流程。您无需将数据分散地存储在直接映射关系型数据库结构的\
  \ `DataSet` 中，而是有机会真正地为应用程序表示现实世界的对象。除了恰当地表示现实世界的对象之外，您还可以将这些业务对象背后的数据访问层完全封装起来，这为您提供了使用延迟加载等技术的机会，从而在保持统一公共接口的同时提升性能。\n\
  \n“收藏链接”网站的核心业务对象是 `FavoriteLink` 对象。作为一个业务对象，它持有链接的各种属性，如 `Title`、`Url`、`Rating`、`Note`\
  \ 和 `Tags`。这些属性中的每一个都由调用存储过程返回的列填充。映射这些值可能是一项相当繁重的工作，尤其是在应用程序的早期阶段，当您仍在调整列和属性时。更新映射可能非常耗时。\n\
  \n## 加载数据\n\n反对手动创建自有数据访问层的最有力论据之一，可能是将数据从数据库映射到对象所需的工作量。自对象与关系型数据库结合使用以来，对象/关系映射就一直是一个普遍问题。这些通常不兼容的系统之间的阻抗失衡要求您理解两端是如何构建的，以便利用这种理解将它们映射到一起。\n\
  \n实现 O/R 映射的一种方法是创建配置文件，显式设置每个数据列与对象属性之间的映射。流行的 O/R 映射工具如 `NHibernate` 使用了大量定义所有映射的\
  \ XML 配置。许多人认为这是满足 O/R 映射需求的强大解决方案。但我认为这是一个额外且不必要的层。\n\n为了简化 O/R 映射工作，我创建了一个基类，该基类通过匹配可写属性的名称和类型，自动将数据列映射到属性。\n\
  \n由数据访问层填充的每个业务对象都继承此基类。一个加载方法接受 `DataRow`，而另一个接受 `IDataReader` 对象来设置属性。通过反射，基类将来自查询的列与业务对象中的属性进行比较。我称此基类为\
  \ `DomainObject`。它始终提供的核心属性是 `ID`、`Created` 和 `Modified`。当我向存储过程添加新列，并向业务对象添加新属性时，这些值会自动加载到对象中，无需任何额外工作。（请参阅代码下载中的\
  \ `DomainObject` 类。）我确保 `DomainObject` 可以与 `DataSet` 或 `IDataReader` 协同工作，因为两者在不同场景下都有其价值。我始终希望保持在它们之间切换的灵活性。例如，我可以在数据访问层深处缓存\
  \ `DataSet`，因为它持有数据，而 `IDataReader` 只是一个数据枚举器，只能使用一次。但 `IDataReader` 更快，因此如果我不缓存数据，就可以利用\
  \ `IDataReader` 的速度优势。\n\n当从数据库提取数据并且代码循环处理结果时，我们会将 `DataRow` 或 `IDataReader` 传递给业务对象的加载方法，以准备将其发送回应用程序层。这些对象被保存在一个\
  \ `FavoriteLinkCollection` 对象中，如代码清单 7-31 所示。\n\n### 代码清单 7-31. FavoriteLinkCollection\
  \ 对象\n```csharp\nusing System.Collections.Generic;\n\nnamespace Chapter07.Domain\n\
  {\n    /// <summary>\n    /// FavoriteLink 对象的集合\n    /// </summary>\n    public\
  \ class FavoriteLinkCollection : List<FavoriteLink>\n    {\n    }\n}\n```\n\n请注意，`FavoriteLinkCollection`\
  \ 对象只是继承自泛型集合 `List<FavoriteLink>`，这为我们提供了一个简洁的对象，便于后续扩展。它也是使用 `FavoriteLink` 业务对象进行强类型化的。可以使用\
  \ `DataSet` 来填充 `FavoriteLinkCollection`，如代码清单 7-32 所示。\n\n### 代码清单 7-32. 使用 DataRow\
  \ 加载\n```csharp\nprivate void AddToFavoriteLinkCollection(\n    FavoriteLinkCollection\
  \ collection, DataSet ds)\n{\n    if (ds.Tables.Count > 0)\n    {\n        foreach\
  \ (DataRow row in ds.Tables[0].Rows)\n        {\n            FavoriteLink fl = new\
  \ FavoriteLink(row);\n            collection.Add(fl);\n        }\n    }\n}\n```\n\
  \n`FavoriteLink` 对象的一个构造函数简单地接受一个 `DataRow`，并在内部调用 `DomainObject` 定义的加载方法。或者，也可以使用\
  \ `IDataReader` 以获得可能更好的性能，如代码清单 7-33 所示。\n\n### 代码清单 7-33. 使用 IDataReader 加载\n\
  ```csharp\nprivate void AddToFavoriteLinkCollection(\n    FavoriteLinkCollection\
  \ collection, IDataReader dr)\n{\n    while (dr.Read())\n    {\n        FavoriteLink\
  \ fl = new FavoriteLink(dr);\n        collection.Add(fl);\n    }\n}\n```\n\n`FavoriteLink`\
  \ 对象还包含一个接受 `IDataReader` 的构造函数，该构造函数被传递给加载方法。在 `DataSet` 和 `IDataReader` 的情况下，用于填充\
  \ `FavoriteLink` 的列应该是相同的，尤其是在它们调用相同的存储过程时。\n\n## 调整数据加载\n\n由于使用反射会产生性能损耗，在用反射加载数据与直接将数据转换到业务对象属性之间存在明显的性能差异。如果您知道一个名为\
  \ `Title` 的数据列是 `String` 类型，您可以简单地通过直接转换对象来设置属性，如代码清单 7-34 所示。\n\n### 代码清单 7-34.\
  \ 将数据值直接转换到属性\n```csharp\nthis.Rating = (int)row[\"Rating\"];\n```\n\n如果该列是 `int`\
  \ 类型且值不为 null，这将会奏效——但这从来都不是一个保证。\n\n由于数据库是断开连接的，并且可以独立于应用程序进行更新，数据库的更改可能是一个潜在问题。使用反射的方法创建了匹配名称和类型的映射。每次使用映射设置属性值时，都会检查数据列是否为\
  \ null 值，这种检查消除了类型转换错误的风险。这种保护确实是有代价的。幸运的是，这种代价已经被最小化了。\n\n`FavoriteLink` 对象通过设置一个静态枚举值，能够在反射和直接转换模式之间切换。此设置允许测试两种模式的性能。此数据访问层的单元测试包括加载测试，用于测量加载大量\
  \ `FavoriteLink` 对象所需的时间，然后显示两种模式的平均时间。这些加载测试包含在本章的代码下载中。\n\n这些加载测试在运行大量项目时显示，反射的开销对将数据加载到\
  \ `FavoriteLink` 对象中的时间没有显著影响。\n\n\n\n性能已经过优化，旨在最小化反射的开销。通过反射创建的映射在首个对象加载时即已生成。这些映射会在每个新实例中复用，从而在获取收益的同时，几乎消除了性能损耗。\n\
  \n但是，如果您希望利用直接将数据列转换为属性（而不使用反射）的优势，可以将加载方法标记为 `virtual`，以便您能够重写它们。\n\n#### 构建网站\n\
  \n数据访问层准备就绪后，我们现在可以开始组装网站。数据将通过与用户控件中持有的数据绑定控件相关联的 `ObjectDataSources` 引入网站。用户控件可以放置在任何页面上，按需布置。页面也将为网站使用一个统一的母版页。\n\
  \n为网站创建的用户控件将成为网站的构建块，这些构建块将直接与数据访问层交互。用户控件随后可以向父容器公开属性、方法和事件，以提供丰富的用户界面层功能。\n\n\
  您可能会选择从大型页面开始构建网站，但很快您就会遇到包含 2000 行代码隐藏文件的页面，这些页面难以组织和维护。从单个页面开始是原型化新界面的好方法，但最终您会希望将页面的各个部分拆分到用户控件中，以利于维护，并利用将页面不同部分解耦到定义明确的容器中的优势。\n\
  \n最终，您可以选择将用户控件转换为服务器控件，后者可以纯粹作为一个程序集来部署。这种转换使得该控件能够作为依赖项在众多网站中轻松使用。创建和维护服务器控件需要更多工作，因此从一开始创建一个通常不是最佳的第一步。随着用户控件的成熟，它可能最终会成为一个很好的转换候选。目前，如果您想在多个网站中使用一个用户控件，您必须将\
  \ `.ascx` 标记文件连同其代码隐藏文件或代码隐藏的编译程序集一起复制到每个网站中。如果一个用户控件将在许多网站中有用，那么采取额外步骤将其转换为服务器控件将是可取的。\n\
  \n随着时间的推移，您可能会拥有一套用户控件和服务器控件，就像 Visual Studio 工具箱中的所有标准控件一样。这可能会催生一组类似于登录控件的数据绑定控件，这些登录控件直接与成员资格提供程序系统集成。\n\
  \n以下示例页面和用户控件正是基于这样的目标而设计。\n\n##### 连接数据访问层\n\n由于数据访问层是同一解决方案内的一个类库，可以通过使用项目引用将其关联到网站。因为\
  \ ASP.NET 网站没有项目文件，所以引用由解决方案存储。连接字符串名称设置为 `FavoriteLinks`，因此 `Web.config` 文件应包含一个同名的连接字符串。\n\
  \n对于简单的网站，使用硬编码的字符串作为连接字符串名称可能就足够了，但随着网站的发展和创建的组件越来越多，协调所有硬编码的字符串将变得困难。\n\n随着网站变得越来越复杂，您可以实现自定义配置节，为每个组件定义设置，例如连接字符串名称。\n\
  \n然后，您可以通过使用自定义配置来调整组件的连接字符串名称。创建自定义配置将在第 9 章介绍。本章的示例项目使用了一个自定义节来定义数据库连接。\n\n#####\
  \ 创建用户控件\n\n\n\n用户控件可用于封装至少一个数据绑定控件及其关联的 `ObjectDataSource`。在此独立容器中处理数据，使得处理数据及数据绑定控件所需的功能更为容易。此容器可公开属性和事件，以便与父容器进行通信。\n\
  \n### 属性\n\n为了显示链接，我们将创建 `LinksControl` 用户控件，该控件公开了一些属性，父控件应设置这些属性以协助绑定数据。`ObjectDataSource`\
  \ 使用的属性是 `StartDaysBack` 和 `EndDaysBack`，它们存储 `int` 值。这些属性如清单 7-35 所示。\n\n**清单 7-35.**\
  \ `LinksControl` 属性\n\n```csharp\nprivate int _startDaysBack = 7;\n\n[Browsable(true),\
  \ DefaultValue(7), Category(\"Links\")]\npublic int StartDaysBack\n{\n    get {\
  \ return _startDaysBack; }\n    set { _startDaysBack = value; }\n}\n\nprivate int\
  \ _endDaysBack = 0;\n\n[Browsable(true), DefaultValue(0), Category(\"Links\")]\n\
  public int EndDaysBack\n{\n    get { return _endDaysBack; }\n    set { _endDaysBack\
  \ = value; }\n}\n```\n\n这些是常规属性，其成员变量用于存储 `int` 值；然而，装饰这些属性的特性是用户控件特有的。`Browsable`\
  \ 特性使得在设计界面上选中用户控件时，该属性会显示在属性窗口中。`Category` 特性将这两个属性归入“链接”类别，使它们一起显示在属性窗口中。最后，`DefaultValue`\
  \ 特性指定了默认值。当属性值与默认值不匹配时，此特性会使属性窗口中的值以粗体显示。这些额外特性有助于使用该用户控件的开发人员，并在将数据引入应用程序时进一步封装数据。\n\
  \n设置这些属性后，`ObjectDataSource` 会使用它们的值作为清单 7-36 中由 `ObjectDataSource` 定义的参数。\n\n**清单\
  \ 7-36.** `LinksControls` ObjectDataSource1\n\n```xml\n<asp:ObjectDataSource ID=\"\
  ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"original_{0}\"\
  \n    TypeName=\"Chapter07.Domain.FavoriteLinkDomain\"\n    SelectMethod=\"GetRecentFavoriteLinkCollection\"\
  \n    OnSelecting=\"ObjectDataSource1_Selecting\">\n    <SelectParameters>\n   \
  \     <asp:Parameter DefaultValue=\"0\"\n            Name=\"profileId\" Type=\"\
  Int32\" />\n        <asp:Parameter DefaultValue=\"7\"\n            Name=\"startDaysBack\"\
  \ Type=\"Int32\" />\n        <asp:Parameter DefaultValue=\"0\"\n            Name=\"\
  endDaysBack\" Type=\"Int32\" />\n    </SelectParameters>\n</asp:ObjectDataSource>\n\
  ```\n\n可以看到 `startDaysBack` 和 `endDaysBack` 参数，它们是通过清单 7-37 所示的 `ObjectDataSource1_Selecting`\
  \ 事件处理程序设置的。\n\n**清单 7-37.** `ObjectDataSource1_Selecting`\n\n```csharp\nprotected\
  \ void ObjectDataSource1_Selecting(\n    object sender, ObjectDataSourceSelectingEventArgs\
  \ e)\n{\n    e.InputParameters[\"profileId\"] = Utility.GetProfile().ProfileID;\n\
  \    e.InputParameters[\"startDaysBack\"] = StartDaysBack;\n    e.InputParameters[\"\
  endDaysBack\"] = EndDaysBack;\n}\n```\n\n剩下要做的就是将数据绑定到数据绑定控件，即清单 7-38 所示的 `Repeater`\
  \ 控件。\n\n**清单 7-38.** `Repeater` 控件\n\n```xml\n<asp:Repeater ID=\"rptLinks\" runat=\"\
  server\"\n    DataSourceID=\"ObjectDataSource1\"\n    OnItemDataBound=\"rptLinks_ItemDataBound\"\
  >\n    <HeaderTemplate>\n        <div id=\"divLinks\">\n            <h3 class=\"\
  Title\" id=\"h3Title\" runat=\"server\">\n                <asp:Literal ID=\"ltTitle\"\
  \ runat=\"server\"\n                    Text=\"Title\"></asp:Literal>\n        \
  \    </h3>\n            <ul class=\"Links\">\n    </HeaderTemplate>\n    <ItemTemplate>\n\
  \        <li>\n            <asp:HyperLink ID=\"hl1\" runat=\"server\"\n        \
  \        Text='<%# Bind(\"Title\") %>'\n                NavigateUrl='<%# Bind(\"\
  Url\") %>'></asp:HyperLink>\n            <span class=\"Rating\">\n             \
  \   (<asp:Literal ID=\"lt1\" runat=\"server\"\n                    Text='<%# Bind(\"\
  Rating\") %>'>1</asp:Literal>)\n            </span>\n        </li>\n    </ItemTemplate>\n\
  \    <FooterTemplate>\n            </ul>\n            <br style=\"clear: left;\"\
  \ />\n        </div>\n    </FooterTemplate>\n</asp:Repeater>\n```\n\n第 7 章 ■ 手动数据访问层\n\
  **228**\n\n\n\n通过将网站内容拆分为更小的用户控件，并通过属性来控制它们，你可以获得极大的灵活性。这些属性的值可以传递到数据访问层，从而允许你重复使用同一个用户控件，同时在显示时获得不同的结果。以这种方式使用用户控件，实质上是将其功能参数化，并以更易于管理的方式将其与数据访问层对齐。\n\
  \n## 事件\n\n当订阅的事件发生时，用户控件也可以使用事件将信息传回父控件。另一个名为 `TagCloudControl` 的用户控件会显示一个带有一组链接的标签云。当用户点击\
  \ `TagCloudControl` 中的一个链接时，它会引发一个事件，父页面使用该事件来更改另一个名为 `TaggedLinksControl` 的用户控件所显示的内容。以这种方式使用事件进一步封装了用户控件的内部结构，使其更具可重用性。\n\
  \n`TagCloudControl` 声明了一个名为 `TagSelected` 的事件，每当标签云中的链接被点击时就会引发该事件。该事件及引发事件的方法如清单\
  \ 7-39 所示。\n\n`清单 7-39.` `TagSelected 事件`\n\n```csharp\npublic event EventHandler<TagCloudEventArgs>\
  \ TagSelected;\n\n[Category(\"Tags\")]\nprotected virtual void OnTagSelected(TagCloudEventArgs\
  \ e)\n{\n    if (TagSelected != null)\n    {\n        TagSelected(this, e);\n  \
  \  }\n}\n```\n\n`EventHandler` 使用了一个名为 `TagCloudEventArgs` 的控件 `EventArgs` 实现，该实现包含一个名为\
  \ `Token` 的属性，该属性对事件订阅者可用。当事件引发时，此值可以设置为 `TaggedLinksControl` 中的 `Token` 属性。`TaggedLinksControl`\
  \ 的工作方式与 `LinksControl` 类似，但它使用 `Token` 属性通过 `Token` 属性获取链接列表。\n\n**注意** 用户控件可以在每个使用它们的页面中声明，但也可以在\
  \ `Web.config` 文件的 `pages/controls` 部分声明，以便在整个网站中使用一致的标签前缀来引用用户控件。通常，当你将用户控件拖到设计界面时，生成的声明会将标签前缀设置为\
  \ `uc1` 或 `uc2` 等。之后，如果将某个控件从用户控件转换为服务器控件，网站中只需在一个地方调整引用。\n\n##### 创建页面\n\n现在，将用户控件组合到页面上并连接它们的属性和事件可能是最简单的步骤。由于母版页已经创建，此页面只需保存用户控件以列出链接和标签云。我们可以创建一个名为\
  \ `Home.aspx` 的新页面，并将用户控件拖到设计界面上。最终结果将如清单 7-40 所示。\n\n`清单 7-40.` `Home.aspx`\n\n\
  ```aspx\n<%@ Page Language=\"C#\" MasterPageFile=\"~/FavoriteLink.master\"\n   \
  \ AutoEventWireup=\"true\"\n    CodeFile=\"Home.aspx.cs\"\n    Inherits=\"Home\"\
  \n    Title=\"Favorite Link: Home\" %>\n\n<asp:Content ID=\"Content1\" runat=\"\
  server\"\n    ContentPlaceHolderID=\"MainContentPlaceHolder\">\n    <div id=\"HomeContent\"\
  >\n        <div class=\"tagCloud\" style=\"float: right; width: 150px;\">\n    \
  \        <h3 class=\"Title\">标签</h3>\n            <fl:TagCloudControl ID=\"tagCloud\"\
  \ runat=\"server\"\n                OnTagSelected=\"tagCloud_OnTagSelected\" />\n\
  \        </div>\n        <div id=\"Links\">\n            <fl:TaggedLinksControl\n\
  \                ID=\"taggedLinks\" runat=\"server\"\n                Visible=\"\
  false\" />\n            <fl:LinksControl\n                ID=\"lcToday\" runat=\"\
  server\"\n                Title=\"今天\"\n                EndDaysBack=\"0\"\n    \
  \            StartDaysBack=\"1\"\n                TitleVisible=\"true\" />\n   \
  \         <fl:LinksControl\n                ID=\"lcThisWeek\" runat=\"server\"\n\
  \                Title=\"本周\"\n                EndDaysBack=\"1\"\n             \
  \   StartDaysBack=\"7\"\n                TitleVisible=\"true\" />\n            <fl:LinksControl\n\
  \                ID=\"lcThisMonth\" runat=\"server\"\n                Title=\"本月\"\
  \n                EndDaysBack=\"8\"\n                StartDaysBack=\"31\"\n    \
  \            TitleVisible=\"true\" />\n        </div>\n    </div>\n</asp:Content>\n\
  ```\n\n每个用户控件都没有在页面顶部声明用户控件引用，因为它们已经在 `Web.config` 文件的 `pages` 部分预先声明了，如清单 7-41\
  \ 所示。\n\n`清单 7-41.` `用户控件配置`\n\n```xml\n<pages>\n    <controls>\n        <add tagPrefix=\"\
  fl\" tagName=\"HeaderNavigation\"\n            src=\"~/Controls/HeaderNavigation.ascx\"\
  />\n        <add tagPrefix=\"fl\" tagName=\"LinksControl\"\n            src=\"~/Controls/LinksControl.ascx\"\
  />\n        <add tagPrefix=\"fl\" tagName=\"LoginControl\"\n            src=\"~/Controls/LoginControl.ascx\"\
  />\n        <add tagPrefix=\"fl\" tagName=\"TagCloudControl\"\n            src=\"\
  ~/Controls/TagCloudControl.ascx\"/>\n        <add tagPrefix=\"fl\" tagName=\"TaggedLinksControl\"\
  \n            src=\"~/Controls/TaggedLinksControl.ascx\"/>\n    </controls>\n</pages>\n\
  ```\n\n每个用户控件都被赋予 `fl` 作为其 `tagPrefix`，你可以在 `Home.aspx` 中看到。这个细节稍微清理了页面，并为声明每个用户控件创建了一致的方式。\n\
  \n这个主页面将 `LinksControl` 列出了三次，分别显示今天、本周和本月添加的链接。`TagCloudControl` 列出了与用户添加的链接相关的标签。当链接被点击时，`Token`\
  \ 属性由 `tagCloud_OnTagSelected` 事件处理程序捕获，如清单 7-42 所示。\n\n`清单 7-42.` `tagCloud_OnTagSelected`\n\
  \n```csharp\nprotected void tagCloud_OnTagSelected(object sender, TagCloudEventArgs\
  \ e)\n{\n    lcToday.Visible = false;\n    lcThisWeek.Visible = false;\n    lcThisMonth.Visible\
  \ = false;\n    taggedLinks.Visible = true;\n    taggedLinks.Title = \"标记为 \" +\
  \ e.Token;\n    taggedLinks.Token = e.Token;\n}\n```\n\n这几行代码就是调整页面上所有用户控件所需的全部内容。它们所有的独立细节都已完全封装并在内部管理。现在可以在架构的各个层面提升此网站的性能。一些调整可以在表上进行，并与对存储过程的必要修改相协调。另一些调整可以通过在数据访问层引入缓存来完成。在应用层，用户控件和页面可以使用额外的技术，例如数据或输出缓存。每一层都是完全独立和封装的，因此在实施优化时，下一层不需要修改。\n\
  \n#### 总结\n\n本章介绍了手动创建数据访问层时需要考虑的步骤和选择。你了解了手动构建此层需要额外的工作，以便利用它所提供的性能增强。最后，你通过使用\
  \ `ObjectDataSource` 和用户控件将数据访问层连接到一个功能网站，这种方式在最大限度地减少维护的同时，也留下了大量无需对应用程序进行重大返工即可优化性能的空间。\n\
  \n"
- "# 生成的数据访问层\n\n没有多少开发人员愿意碰数据访问层。大多数开发人员更喜欢坚持使用他们最喜欢的语言，例如 C#，并避免使用他们很少使用的语言，例如 T-SQL。\n\
  \n这是可以理解的。开发人员使用一种语言越多，他建立的专业知识和信心水平就越高。因此，如果你足够幸运，团队中有一位精通 T-SQL 的熟练数据库开发人员，你肯定会尽可能多地利用他的技能。\n\
  \n然而，这类程序员是稀缺的。为应对这种情况，你可以寻找生成数据访问层的方法，从而大大减少你不得不离开首选语言 C# 所需的时间。\n\n本章涵盖以下内容：\n\
  *   代码生成\n*   SubSonic\n*   Blinq\n\n\n\n在讨论数据访问层时，常用的术语是 `CRUD`，代表创建（Create）、读取（Read）、更新（Update）和删除（Delete）。数据访问层大部分是样板代码。如果你认为这意味着对于每个表，你只需要创建对应的\
  \ SQL 语句，那么你可以通过扫描数据库并构建执行所有 `CRUD` 任务的类来自动生成此类代码。如果你想添加智能功能，比如关系处理，你可以在代码生成过程中读取外键约束以推断关系，并将面向对象的功能内建到生成的代码中。本章介绍的工具能以一种优雅的方式为我们完成所有这些工作，而不会像类型化数据集那样让人感觉不适。\n\
  \n#### 代码生成\n\n代码生成是一个古老的概念。如果你追溯到软件开发的起点，你会看到源文件如何被编译成汇编代码，当时的开发人员认为编译器生成的代码效率远不如手写的汇编指令。但使用编译器的好处在于，它能以显著缩短的开发周期来实现源代码的意图。如今，我们已经超越了这个初始阶段，深入到了代码生成的领域。我们在集成开发环境（IDE）中用选择的语言编写代码，代码被转换为中间语言（IL），最终由即时编译器将其转换为机器码。在过去几十年里，编译过程不断改进，引入了开发者甚至还未意识到但一直在持续受益的优化。我们已经接纳了代码生成，并且正在寻找新的方法来利用它进一步加速我们的开发周期，同时生成比我们自己开发更高效的代码。\n\
  \n当你使用 `ASP.NET` 时，你已经在利用代码生成：每个页面和用户控件都会为各自的后台代码生成一个分部类到内存中。标记页面上放置的每个控件的变量引用都会被放入这个分部类中，而你则在后台代码文件中定义分部类的其余部分。你可能还记得\
  \ `ASP.NET 1.1` 中那个警告你不要直接修改的已生成代码区域。该区域的代码现在被安全地生成到隐藏的分部类中。实现这一点的代码生成归功于随 `ASP.NET\
  \ 2.0` 引入的构建提供程序。\n\n**注意** 如果你构建的不是网站项目，而是 Web 应用程序项目，那么你仍然在使用旧的 `ASP.NET 1.1`\
  \ 模型，代码是直接生成到后台代码文件中的。Web 应用程序项目无法利用构建提供程序，因为它需要仅对网站可用的动态编译器。从技术上讲，Web 应用程序项目是一个类库，无法访问此功能。\n\
  \n#### 构建提供程序\n\n构建提供程序是一种代码生成器，它将构建结果放入内存，以便运行时可以访问。Visual Studio 也能够运行构建提供程序，并使生成的代码立即可用，而无需编译项目。构建提供程序为所有常见文件类型（如\
  \ `.aspx`、`.ascx`、`.asmx` 等）进行了预配置。在所有网站都继承的基础 `Web.config` 文件中，你会找到一个名为 `buildProviders`\
  \ 的配置元素，它列出了所有映射的提供程序。特别是，`.aspx` 扩展名被映射到名为 `PageBuildProvider` 的提供程序，而 `.xsd` 被映射到\
  \ `XsdBuildProvider`，后者创建类型化数据集。\n\n你可以实现自己的构建提供程序，并将其与你选择的扩展名关联。清单 8-1 展示了如何为所有扩展名为\
  \ `.xyz` 的文件映射一个构建提供程序。\n\n### 清单 8-1. 用于 .xyz 文件的构建提供程序\n\n```xml\n<buildProviders>\n\
  \    <add extension=\".xyz\" type=\"Chapter08.BuildProviders.XyzBuildProviders\"\
  \ />\n</buildProviders>\n```\n\n当 `ASP.NET` 编译器遇到扩展名为 `.xyz` 的文件时，它将使用配置的构建提供程序将代码生成到内存中，以便网站中的页面和控件可以使用，同时也提供智能感知支持。图\
  \ 8-1 显示了生成类的智能感知外观。\n\n![Image 32](img/index-239_1.png)\n\n### 图 8-1. 生成类的智能感知\n\
  \n`BuildProvider` 类（位于 `System.Web.Compilation` 命名空间中）包含一个名为 `GenerateCode` 的方法，你必须重写此方法才能将生成的代码注入到网站中。清单\
  \ 8-2 展示了 `GenerateCode` 方法的一个实现。\n\n### 清单 8-2. GenerateCode 方法\n\n```csharp\n\
  public override void GenerateCode(AssemblyBuilder assemblyBuilder)\n{\n    assemblyBuilder.AddCodeCompileUnit(this,\n\
  \        new CodeSnippetCompileUnit(GetGeneratedCode()));\n}\n```\n\n包含 `GenerateCode`\
  \ 方法的示例类名为 `XyzBuildProviders`，它继承自 `BuildProvider` 类。你可能想做的第一个任务是读取源文件的内容。要读取文件，你可以调用返回\
  \ `Stream` 的 `OpenStream`，或者返回 `Reader` 的 `OpenReader`。清单 8-3 向你展示了如何将源文件内容作为字符串获取。\n\
  \n### 清单 8-3. GetContents 方法\n\n```csharp\nprivate string GetContents()\n{\n   \
  \ TextReader reader = OpenReader();\n    string contents = reader.ReadToEnd();\n\
  \    reader.Close();\n    return contents;\n}\n```\n\n源文件的内容可以很容易地是 `XML` 或你选择的自定义文件格式，你可以在构建生成代码时解析和使用它。在这个例子中，源文件中只有一行，它将用作类的注释。\n\
  \n你可能还想知道源文件的名称。也许对于每个源文件，你想生成一个单独的类，并且源文件的文件名将被重用为生成类的名称。在这种情况下，你可以使用从基类 `BuildProvider`\
  \ 继承的 `VirtualPath` 属性。对于网站，源文件必须位于 `App_Code` 文件夹中，因此一个典型的值类似于 `/AppCode/SomeFile.xyz`。清单\
  \ 8-4 展示了如何从该值中提取类名。\n\n### 清单 8-4. GetClassName 方法\n\n```csharp\nprivate string\
  \ GetClassName()\n{\n    int startIndex = VirtualPath.LastIndexOf(\"/\") + 1;\n\
  \    int length = VirtualPath.IndexOf(\".\") - startIndex;\n    string className\
