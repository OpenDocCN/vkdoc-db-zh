- "# 第三章：数据库管理\n\n## 索引管理\n\n### 检查与创建索引\n\n```sql\nIF NOT EXISTS (SELECT * FROM sysindexes\
  \ AS i JOIN sysobjects AS o on i.id = o.id WHERE o.name = 'chpt03_Location' and\
  \ i.name = 'IX_chpt03_Location_Country')\nBEGIN\n    PRINT 'Adding index IX_chpt03_Location_Country'\n\
  \    CREATE NONCLUSTERED INDEX IX_chpt03_Location_Country ON dbo.chpt03_Location\n\
  \    (\n        Country\n    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY\
  \ = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\nEND\nGO\n\
  ```\n\n```sql\nIF NOT EXISTS (SELECT * FROM sysindexes AS i JOIN sysobjects AS o\
  \ on i.id = o.id WHERE o.name = 'chpt03_Person' and i.name = 'IX_chpt03_Person_BirthDate')\n\
  BEGIN\n    PRINT 'Adding index IX_chpt03_Person_BirthDate'\n    CREATE NONCLUSTERED\
  \ INDEX IX_chpt03_Person_BirthDate ON dbo.chpt03_Person\n    (\n        BirthDate\n\
  \    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS\
  \ = ON, ALLOW_PAGE_LOCKS = ON)\n    ON [PRIMARY]\nEND\nGO\n```\n\n索引被轻松管理后，就该着手处理外键约束了。对于这类约束，同样没有现成的模板来在删除前检查现有约束。清单\
  \ 3-8 中的脚本移除了 `Person` 和 `Location` 表之间的单个外键。\n\n## 索引碎片整理\n\n随着时间的推移，索引可能会产生碎片。有碎片的索引扫描起来比新创建的索引更耗时，因此有必要偶尔使用\
  \ `REORGANIZE` 命令来清理索引。该命令不会完全刷新索引，但能提升性能。`REBUILD` 命令可用于完全刷新索引。这些任务最好留给您的数据库管理员（DBA）。当您开始注意到性能下降时，可以考虑使用这种调优技术。\n\
  \n### 清单 3-8. `RemoveConstraints.sql`\n\n```sql\nIF EXISTS (SELECT * FROM dbo.sysobjects\
  \ WHERE id = object_id(N'[dbo].[FK_chpt03_Person_chpt03_Location]') and OBJECTPROPERTY(id,\
  \ N'IsForeignKey') = 1)\n    ALTER TABLE [dbo].[chpt03_Person]\n    DROP CONSTRAINT\
  \ FK_chpt03_Person_chpt03_Location\n```\n\n然后，运行清单 3-9 中的约束来添加回约束。\n\n### 清单 3-9.\
  \ `AddConstraints.sql`\n\n```sql\nALTER TABLE [dbo].[chpt03_Person] WITH CHECK ADD\
  \ CONSTRAINT [FK_chpt03_Person_chpt03_Location] FOREIGN KEY([LocationId]) REFERENCES\
  \ [dbo].[chpt03_Location] ([LocationId])\n```\n\n现在，每当表需要因更改而重新调整时，这个障碍就能轻松移除。如果您想添加列，可以更新表脚本，移除约束，运行表脚本，然后再添加回约束。\n\
  \n#### 性能考量\n\n在介绍下一个示例之前，有一些事项需要考虑。在性能方面，有许多因素需要考量。要调优使用数据库的慢速应用程序，可以采取一些基本步骤，例如为表添加索引以及仅提取必要的数据。索引有助于更快地组装结果，而提取更少的数据则会减少传输的数据量。在结果集非常大的情况下，省略一些列会累积成可测量的差异。还可以进行许多其他更改来增强性能，但前两点是“唾手可得的果实”，通常能带来最大的收益。\n\
  \n当您将所有数据从数据库提取到 Web 应用程序以在 Web 窗体上显示后，数据绑定值将被序列化到 `ViewState` 中。如果数据量非常大，结果将是一个非常大的文件，网站用户将不得不下载它。\n\
  \n对于一个仅显示 100 行中的 10 行的 `GridView`，`ViewState` 仍然可以容纳所有 100 行的数据。虽然在开发过程中，当您与 Web\
  \ 服务器在同一台计算机上工作时，具有如此大数据集的页面加载速度会很快，但对于远程访问网站的用户来说，这将会慢得令人痛苦。根据经验，网页大小必须小于 100 KB，最好小于\
  \ 50 KB。\n\n我曾经参与过一个网站项目，该网站使用了一个动态导航菜单，其 `ViewState` 和 `PostBack` 事件覆盖了网站层级的多个级别。它包含大量链接，这增加了\
  \ `ViewState` 的大小。典型的网页接近 300 KB，其中超过 90% 的页面内容是 `ViewState`。最初的开发者在他的笔记本电脑上工作，从未意识到这个问题，因为一切总是很快。他从不检查页面大小，也不关心从远程服务器加载页面需要多长时间。这类问题应该及早发现，那时更容易修复。\n\
  \n您可以随意调优表和查询，但如果页面是 300 KB，而您的许多用户仍在使用拨号上网甚至低端宽带速度，他们会发现您的网站很慢。相比之下，大多数主流新闻网站和信息门户的页面大小都在\
  \ 30 KB 以下。在接下来的示例中，我们将通过一个简单的策略来解决 `ViewState` 问题。\n\n**注意：** 数据传输时间只是导致网页加载缓慢的一个方面。包含许多行和单元格的大表格会增加网页的渲染时间。如果加载页面数据所需的时间不到一秒，渲染一个复杂表格可能仍然需要几秒钟。\n\
  \n更有效的方法是要求数据库仅返回将要显示的项目范围，而不是让数据库返回所有可能的项目。当仅显示十行时，从数据库向 Web 应用程序传输数千行数据是浪费的。\n\
  \n幸运的是，我们可以只请求该子集，但我们需要一个新的存储过程来实现这个新目标。清单 3-10 展示了创建这个特殊存储过程的脚本。\n\n### 清单 3-10.\
  \ `chpt03_GetPeopleSubSetSorted.sql`\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
  \ WHERE type = 'P' AND name = 'chpt03_GetPeopleSubSetSorted')\nBEGIN\n    DROP Procedure\
  \ chpt03_GetPeopleSubSetSorted\nEND\nGO\n\nCREATE Procedure dbo.chpt03_GetPeopleSubSetSorted\n\
  (\n    @sortExpression nvarchar(50),\n    @startRowIndex int,\n    @maximumRows\
  \ int\n)\nAS\nIF LEN(@sortExpression) = 0\n    SET @sortExpression = 'PersonId'\n\
  \n-- 重置为基于 1 的索引\nSET @startRowIndex = @startRowIndex + 1\n\n-- 构建 sql\nDECLARE\
  \ @sql nvarchar(4000)\nSET @sql = 'SELECT PersonId,FirstName,LastName,BirthDate,City,Country\
  \ FROM\n(SELECT p.PersonId,p.FirstName,p.LastName,p.BirthDate,l.City,l.Country,\n\
  ROW_NUMBER() over(ORDER BY ' + @sortExpression + ') AS RowNum\nFROM chpt03_Person\
  \ AS p\nJOIN chpt03_Location AS l on l.LocationId = p.LocationId\n) AS People\n\
  WHERE RowNum between ' + CONVERT(nvarchar(10), @startRowIndex) + ' and (' + CONVERT(nvarchar(10),\
  \ @startRowIndex) + ' + ' + CONVERT(nvarchar(10), @maximumRows) + ') - 1'\n\n--\
  \ 执行 SQL 查询\nEXEC sp_executesql @sql\nGO\n\nGRANT EXEC ON chpt03_GetPeopleSubSetSorted\
  \ TO PUBLIC\nGO\n```\n\n## 添加到公共文件夹\n\n清单 3-10 中的存储过程是一种技术，您可以多次应用它来减少数据库负载，同时加速应用程序层。此脚本可以放置在您\
  \ `Scripts` 子文件夹下的 `Common` 文件夹中，供未来项目引用（`D:\\Projects\\Common\\Scripts\\Database`）。\n\
  \n这个新的存储过程中发生了很多事情。它不返回 `Person` 表中的每一项。而是使用输入参数 `@startRowIndex` 和 `@maximumRows`\
  \ 来定义要返回的项目范围。它还使用 `@sortExpression` 输入参数来提供排序功能。\n\nSQL Server 2005 引入了新的 `Row_Number`\
  \ 函数。给定选择的顺序，`Row_Number` 函数为每一行分配一个行号。此行号用于限制返回项的范围。\n\n\n但 `@startRowIndex` 和\
  \ `@maximumRows` 这两个值必须有所来源。此信息由 `ObjectDataSource` 提供。当在 `ObjectDataSource` 上启用分页时，`SelectMethod`\
  \ 必须引用一个具有这些参数的方法。我们必须向 `PersonDomain` 类添加这样一个方法。清单 3-11 展示了使用这些附加参数的示例方法。\n\n###\
  \ 清单 3-11. GetPeopleSubSetSortedDataSet 方法\n\n```\n[DataObjectMethod(DataObjectMethodType.Select)]\n\
  public DataSet GetPeopleSubSetSortedDataSet(int? startRowIndex, int? maximumRows)\n\
  {\n    return GetPeopleSubSetSortedDataSet(null, startRowIndex, maximumRows);\n\
  }\n\n[DataObjectMethod(DataObjectMethodType.Select)]\npublic DataSet GetPeopleSubSetSortedDataSet(\n\
  \    string sortExpression, int? startRowIndex, int? maximumRows)\n{\n    DataSet\
  \ ds = new DataSet();\n\n    if (String.IsNullOrEmpty(sortExpression))\n    {\n\
  \        sortExpression = \"\";\n    }\n\n    if (!startRowIndex.HasValue)\n   \
  \ {\n        startRowIndex = 0;\n    }\n\n    if (!maximumRows.HasValue)\n    {\n\
  \        maximumRows = 0;\n    }\n\n    using (DbCommand dbCmd = db.GetStoredProcCommand(\"\
  chpt03_GetPeopleSubSetSorted\"))\n    {\n        db.AddInParameter(dbCmd, \"@sortExpression\"\
  , DbType.String, sortExpression);\n        db.AddInParameter(dbCmd, \"@startRowIndex\"\
  , DbType.Int64, startRowIndex);\n        db.AddInParameter(dbCmd, \"@maximumRows\"\
  , DbType.Int64, maximumRows);\n        ds = db.ExecuteDataSet(dbCmd);\n    }\n\n\
  \    //返回结果\n    return ds;\n}\n```\n\n在清单 3-11 中，有两个同名方法。区别在于第二个方法有额外的 `sortExpression`\
  \ 参数。你可能会认出这是一种方法重载技术。根据 `ObjectDataSource` 是否支持排序，将使用此参数。第一个方法简单地以 `null` 值作为 `sortExpression`\
  \ 调用第二个方法，从而引向清单 3-10 中的 `chpt03_GetPeopleSubSetSorted` 存储过程。\n\n除了到目前为止我们一直在使用的\
  \ `SelectMethod` 属性外，`ObjectDataSource` 还有另一个属性，我们将使用它来使解决方案更高效地工作。这个名为 `SelectCountMethod`\
  \ 的属性用于告诉数据绑定控件数据源返回的总项数。此值来自另一个存储过程。清单 3-12 展示了此存储过程。\n\n### 清单 3-12. chpt03_GetPeopleRowCount.sql\n\
  \n```\nIF EXISTS (SELECT * FROM sysobjects WHERE type = 'P' AND\nname = 'chpt03_GetPeopleRowCount')\n\
  BEGIN\n    DROP Procedure chpt03_GetPeopleRowCount\nEND\nGO\n\nCREATE Procedure\
  \ dbo.chpt03_GetPeopleRowCount\n(\n    @Count int OUTPUT\n)\nAS\n    SET @Count\
  \ = (SELECT COUNT(*) AS [Count] FROM chpt03_Person)\nGO\n\nGRANT EXEC ON chpt03_GetPeopleRowCount\
  \ TO PUBLIC\nGO\n```\n\n此过程计算 `Person` 表中的所有记录，并在清单 3-13 所示的方法中使用。\n\n### 清单 3-13.\
  \ GetPeopleRowCount 方法\n\n```\npublic long? GetPeopleRowCount()\n{\n    long? count\
  \ = 0;\n\n    using (DbCommand dbCmd = db.GetStoredProcCommand(\"chpt03_GetPeopleRowCount\"\
  ))\n    {\n        db.AddOutParameter(dbCmd, \"@Count\", DbType.Int64, 0);\n   \
  \     db.ExecuteNonQuery(dbCmd);\n        count = (long)db.GetParameterValue(dbCmd,\
  \ \"@Count\");\n    }\n\n    return count;\n}\n```\n\n最后，清单 3-14 中的 `ObjectDataSource`\
  \ 将所有内容整合在一起，以便数据绑定控件可以使用。\n\n### 清单 3-14. ObjectDataSource1\n\n```\n<asp:ObjectDataSource\
  \ ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
  original_{0}\"\n    TypeName=\"Chapter02.PersonDomain\"\n    SelectMethod=\"GetPeopleSubSetSortedDataSet\"\
  \n    SelectCountMethod=\"GetPeopleRowCount\"\n    EnablePaging=\"True\"\n    SortParameterName=\"\
  sortExpression\">\n</asp:ObjectDataSource>\n```\n\n有了这个 `ObjectDataSource`，你可以快速高效地分页浏览数千行数据。它还减少了从数据库移动到\
  \ Web 应用程序的数据量。\n\n## 稳定性考虑\n\n应用程序和数据库之间的联系常常被视为理所当然。因此，它没有得到足够的保护，也没有被视为真正的集成点。尽管我们希望数据库查询能像循环遍历内存中的对象数组一样可靠，但它并非如此。数据库的断开连接特性之一，是能够独立于另一方更改应用程序或数据库，尽管我们尽最大努力保持它们的兼容性，但很容易在不正确调整另一方的情况下更改一方。\n\
  \n对于类型化数据集，架构非常严格。单个列的最轻微更改都会导致应用程序中断。更改列名将导致非类型化数据集产生非预期行为。当应用程序和数据库之间的关系被视为集成点时，方法和假设就会改变。这种改变将允许采取额外的步骤来确保集成的稳定性。\n\
  \n在本章后面，你将看到处理数据的选项是什么，以及你可以做些什么来确保这条重要链接保持可靠。\n\n## 隔离更改\n\n任何软件项目的主要目标都应该是尽量减少维护量。当多个应用程序使用的数据库发生更改时，更新所有应用程序可能会产生大量工作。\n\
  \n但是，更改可以隔离到一个瓶颈点，所有应用程序都共享对此的依赖。考虑将你的类型化数据集和域类放在一个类库中，这将创建一个供所有应用程序使用的程序集。当数据库架构更改时，可以更新类库并将其部署到每个应用程序。在\
  \ `VARCHAR` 长度增长的情况下，它很容易被 .NET 吸收，因为 `String` 对象不关心大小，并且如果此类库突然开始返回更长的 `String`\
  \ 值，也不会抛出异常。可能仍需要进行调整，例如验证控件属性，但这种方法通过将更改隔离到单个点，避免了在每个应用程序中更新类型化数据集引用。而且，通过这个单一的数据库访问点，我们有了测试类库的绝佳机会，以确保数据库中的更改已与代码同步。\n\
  \n## 数据的单元测试\n\n不是每次更改都进行手动测试，而是可以使用单元测试，它可以自动运行一整套测试。这些测试可以确认每个存储过程和域方法都按照要求执行，并在某些内容确实中断时给你早期警告。早期警告让你有机会在破坏性更改后不久纠正问题，从而更容易识别和修复它。如果问题直到应用程序准备部署时才被注意到，识别原因将相当困难，这将使纠正变得更加困难。\n\
  \n.NET 最流行的单元测试框架是 NUnit。这是一个简单的框架，通过在类和方法上放置属性来表明它们是测试套件的一部分。NUnit 测试运行器将加载程序集，查找这些属性，并动态构建要运行的测试集合。在每个测试中，你将调用数据库，并使用\
  \ `Assert` 语句检查返回值，这些语句将成功或失败。当测试套件在所有测试中都成功时，指示灯全为绿色。但当测试失败时，它会亮红灯。\n\n当单元测试就位并且测试套件全面覆盖你的代码库后，每个开发者都可以在将更改提交到源代码管理系统之前运行测试。\n\
  \n\n\n这样做可以将损坏的代码排除在源代码控制系统之外，否则这些损坏的代码会随着其他开发者拉取更新而蔓延到他们的系统中。但即使运行了测试，多个开发者的变更组合也可能破坏单元测试。为了防止这种情况，你可以设置一个构建服务器，定期从源代码控制中拉取更新、构建项目并运行测试。这通常被称为**持续集成**。\n\
  \n#### 持续集成\n\n过去几年中最流行的持续集成解决方案一直是 `CruiseControl.NET`。它与 `NUnit` 等单元测试框架以及广泛的源代码控制系统兼容。它可以配置为每五分钟检查一次源代码控制系统是否有更新。当有更新时，`CruiseControl.NET`\
  \ 会启动构建和测试过程。构建和测试的结果会通过构建报告记录下来，开发者可以通过电子邮件立即获得结果。\n\n`CruiseControl.NET` 还有一个系统托盘应用程序，它与构建服务器保持联系，向开发者报告变更情况。当构建成功时，该应用程序会从系统托盘弹出一个通知气泡。当构建失败时，它会显示一个通知告知坏消息。`CruiseControl.NET`\
  \ 还拥有一个网站，该网站显示每个已配置的项目及其所有构建报告列表。当构建失败时，你可以查看最新的构建报告，以确切了解问题所在。\n\n它不仅会显示为最新构建而更改的文件，还会显示代码出错的具体行号。这些细节使得确定是谁破坏了构建以及是什么更改导致了破坏变得容易得多。自动化构建报告失败的一个附带好处是，它大大减少了针对个人的指责，开发者可以直接主动去修复自己的问题。我多次看到构建失败是因为一个文件遗漏了，没有与其他更改一起提交到源代码控制中。提交那个缺失的文件可以快速修复构建，大家就能恢复正常工作了。鉴于此类情况，最好提交你的更改并请求构建服务器立即运行构建，这样你就能确保在你的更改被包含后、但在你下班回家前，构建能成功运行。你最不希望发生的事情就是因为没有在最新更改中包含一个文件而被叫回公司。\n\
  \n接下来的章节将涵盖单元测试和持续集成的具体示例。它们将成为你日常工作流程的常规组成部分。\n\n#### 总结\n\n本章介绍了数据库管理流程，从在数据库项目中组织脚本，到创建用于管理存储过程、索引和约束的脚本。\n\
  \n最后回顾了可用于确保应用层与数据库持续良好协作的自动化测试技术。\n\n`8601Ch04CMP3 8/25/07 1:07 PM Page 73`\n\n\
  ## 第 4 章 数据绑定控件\n\n`ASP.NET 2.0` 提供了许多有用的控件，这使得处理数据变得非常容易。微软提供的许多示例展示了如何仅需很少甚至无需代码就能快速组装一个数据驱动的网站。但有时，现实世界的需求会将你推出这个安全区，要求一个更复杂的解决方案。这些解决方案仍然可以是优雅的，并且只需很少的代码即可工作。你只需要更深入地了解如何利用现有控件，以及如何更复杂地组合使用这些控件。一旦你将你的方法分解成协同工作的小型组件，你就可以用可管理的组件来处理更复杂的需求。\n\
  \n本章涵盖以下内容：\n\n• `DetailsView` 控件\n\n• `FormView` 控件\n\n• `GridView` 控件\n\n• 编辑和验证字段\n\
  \n• 绑定输入参数\n\n• 嵌入用户控件\n\n• 创建数据绑定控件\n\n\n\n"
- "# 数据绑定控件\n\n迄今为止最常用的数据绑定控件是 `GridView` 控件。这是一个非常强大的控件，能够展示数据，并提供丰富的数据控件应有的添加、更新和删除功能。除了这个控件，还有其他几个数据绑定控件，它们提供与\
  \ `GridView` 相同的显示和编辑功能，但实现方式不同。让我们首先看看那些其他控件。\n\n#### DetailsView\n\n`DetailsView`\
  \ 控件一次显示一条记录。与 `GridView` 控件一样，它具有添加、更新和删除功能。它还具备分页功能。相比之下，`GridView` 以表格形式显示数据，因此可以一次查看多条记录。当字段数量多到不适合在表格视图中合理显示时，`DetailsView`\
  \ 就很有用。\n\n这使得它更适合用于编辑。\n\n让我们将 `DetailsView` 控件与上一章中使用的人员和位置数据结合使用。第一个示例在清单 4-1\
  \ 中。\n\n**73**\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 74\n\n**74**\n\n第 4 章 ■ 数据绑定控件\n\
  \n**清单 4-1.** `DetailsView` 示例\n\n```xml\n<asp:DetailsView ID=\"DetailsView1\" runat=\"\
  server\"\n    DataSourceID=\"ObjectDataSource1\" AllowPaging=\"True\"\n    AutoGenerateRows=\"\
  False\" DataKeyNames=\"PersonId\">\n    <Fields>\n        <asp:BoundField DataField=\"\
  FirstName\"\n            HeaderText=\"First Name\" SortExpression=\"FirstName\"\
  \ />\n        <asp:BoundField DataField=\"LastName\"\n            HeaderText=\"\
  Last Name\" SortExpression=\"LastName\" />\n        <asp:BoundField DataField=\"\
  BirthDate\"\n            HeaderText=\"Birth Date\" SortExpression=\"BirthDate\"\n\
  \            DataFormatString=\"{0:MM/dd/yyyy}\" HtmlEncode=\"False\" />\n     \
  \   <asp:BoundField DataField=\"City\"\n            HeaderText=\"City\" SortExpression=\"\
  City\" />\n        <asp:BoundField DataField=\"Country\"\n            HeaderText=\"\
  Country\" SortExpression=\"Country\" />\n        <asp:CommandField ShowDeleteButton=\"\
  True\"\n            ShowEditButton=\"True\" ShowInsertButton=\"True\" />\n    </Fields>\n\
  </asp:DetailsView>\n```\n\n这里选择的列包括名字、姓氏、出生日期、城市和国家。这些字段中的每一个都是可自动编辑的，并且每条记录都可以被删除。你甚至可以添加一条新记录。通过启用分页，你可以跳转到每一条记录。这完全符合你对这样一个数据编辑控件的期望。在本章剩余部分的高级示例中，我将再次回到\
  \ `DetailsView` 控件。\n\n#### FormView\n\n`FormView` 控件乍看起来很像 `DetailsView`，但它没有那么死板。它可能最初是两列布局，但它是一个模板控件，可以完全更改。\n\
  \n你可以选择将名字、姓氏和出生日期列分组在一个块中，将城市和国家列分组在另一个块中。当你查看代码时，你会看到各种模板，包括 `ItemTemplate`（它以只读模式显示数据）；你还会看到所有带有\
  \ `Bind` 方法调用的 `Label` 控件，用于从 `DataSource` 填充每个 `Label`。一个示例 `FormView` 如清单 4-2\
  \ 所示。\n\n**清单 4-2.** `FormView` 示例\n\n```xml\n<asp:FormView ID=\"FormView1\" runat=\"\
  server\"\n    AllowPaging=\"True\" DataKeyNames=\"PersonId\"\n    DataSourceID=\"\
  ObjectDataSource1\">\n    <EditItemTemplate>\n        PersonId:\n        <asp:Label\
  \ ID=\"PersonIdLabel1\" runat=\"server\"\n            Text='<%# Eval(\"PersonId\"\
  ) %>'></asp:Label><br />\n        FirstName:\n        <asp:TextBox ID=\"FirstNameTextBox\"\
  \ runat=\"server\"\n            Text='<%# Bind(\"FirstName\") %>'>\n        </asp:TextBox><br\
  \ />\n        LastName:\n        <asp:TextBox ID=\"LastNameTextBox\" runat=\"server\"\
  \n            Text='<%# Bind(\"LastName\") %>'>\n        </asp:TextBox><br />\n\
  \        BirthDate:\n        <asp:TextBox ID=\"BirthDateTextBox\" runat=\"server\"\
  \n            Text='<%# Bind(\"BirthDate\") %>'>\n        </asp:TextBox><br />\n\
  \        City:\n        <asp:TextBox ID=\"CityTextBox\" runat=\"server\"\n     \
  \       Text='<%# Bind(\"City\") %>'>\n        </asp:TextBox><br />\n        Country:\n\
  \        <asp:TextBox ID=\"CountryTextBox\" runat=\"server\"\n            Text='<%#\
  \ Bind(\"Country\") %>'>\n        </asp:TextBox><br />\n        <asp:LinkButton\
  \ ID=\"UpdateButton\" runat=\"server\"\n            CausesValidation=\"True\" CommandName=\"\
  Update\" Text=\"Update\">\n        </asp:LinkButton>\n    </EditItemTemplate>\n\
  </asp:FormView>\n```\n\n\n\n<asp:LinkButton `ID=\"UpdateCancelButton\"` `runat=\"\
  server\"`\n`CausesValidation=\"False\"` `CommandName=\"Cancel\"` `Text=\"取消\"`>\n\
  </asp:LinkButton>\n</EditItemTemplate>\n\n<InsertItemTemplate>\n\n名字:\n<asp:TextBox\
  \ `ID=\"FirstNameTextBox\"` `runat=\"server\"`\n`Text='<%# Bind(\"FirstName\") %>'>\n\
  </asp:TextBox><br />\n\n姓氏:\n<asp:TextBox `ID=\"LastNameTextBox\"` `runat=\"server\"\
  `\n`Text='<%# Bind(\"LastName\") %>'>\n</asp:TextBox><br />\n\n出生日期:\n<asp:TextBox\
  \ `ID=\"BirthDateTextBox\"` `runat=\"server\"`\n`Text='<%# Bind(\"BirthDate\") %>'>\n\
  </asp:TextBox><br />\n\n城市:\n<asp:TextBox `ID=\"CityTextBox\"` `runat=\"server\"\
  `\n`Text='<%# Bind(\"City\") %>'>\n</asp:TextBox><br />\n\n国家:\n<asp:TextBox `ID=\"\
  CountryTextBox\"` `runat=\"server\"`\n`Text='<%# Bind(\"Country\") %>'>\n</asp:TextBox><br\
  \ />\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 76\n\n**76**\n\n**第 4 章** ■ **数据绑定控件**\n\
  \n<asp:LinkButton `ID=\"InsertButton\"` `runat=\"server\"`\n`CausesValidation=\"\
  True\"` `CommandName=\"Insert\"` `Text=\"插入\"`>\n</asp:LinkButton>\n\n<asp:LinkButton\
  \ `ID=\"InsertCancelButton\"` `runat=\"server\"`\n`CausesValidation=\"False\"` `CommandName=\"\
  Cancel\"` `Text=\"取消\"`>\n</asp:LinkButton>\n</InsertItemTemplate>\n\n<ItemTemplate>\n\
  \n名字:\n<asp:Label `ID=\"FirstNameLabel\"` `runat=\"server\"`\n`Text='<%# Bind(\"\
  FirstName\") %>'`></asp:Label><br /> 姓氏:\n<asp:Label `ID=\"LastNameLabel\"` `runat=\"\
  server\"`\n`Text='<%# Bind(\"LastName\") %>'`></asp:Label><br /> 出生日期:\n<asp:Label\
  \ `ID=\"BirthDateLabel\"` `runat=\"server\"`\n`Text='<%# Bind(\"BirthDate\") %>'`></asp:Label><br\
  \ /> 城市:\n<asp:Label `ID=\"CityLabel\"` `runat=\"server\"`\n`Text='<%# Bind(\"City\"\
  ) %>'`></asp:Label><br /> 国家:\n<asp:Label `ID=\"CountryLabel\"` `runat=\"server\"\
  `\n`Text='<%# Bind(\"Country\") %>'`></asp:Label><br />\n\n<asp:LinkButton `ID=\"\
  EditButton\"` `runat=\"server\"`\n`CausesValidation=\"False\"` `CommandName=\"Edit\"\
  ` `Text=\"编辑\"`>\n</asp:LinkButton>\n\n<asp:LinkButton `ID=\"DeleteButton\"` `runat=\"\
  server\"`\n`CausesValidation=\"False\"` `CommandName=\"Delete\"` `Text=\"删除\"`>\n\
  </asp:LinkButton>\n\n<asp:LinkButton `ID=\"NewButton\"` `runat=\"server\"`\n`CausesValidation=\"\
  False\"` `CommandName=\"New\"` `Text=\"新建\"`>\n</asp:LinkButton>\n</ItemTemplate>\n\
  </asp:FormView>\n\n`FormView` 的自由格式特性使其能够实现与 `DetailsView` 截然不同的布局，同时仍为你提供添加、编辑和删除数据的相同功能。\n\
  \n#### GridView\n\n现在介绍所有数据绑定控件的元老：`GridView` 控件。无论它列出的是你支票账户的交易记录，还是通讯录中的联系人，这个控件几乎无处不在。虽然它以表格形式列出数据，并允许你添加、编辑和删除记录，但它还允许你对数据进行排序。这使它成为一种强大且便捷的查看数据的方式，让你能以最有用的方式查看数据。清单\
  \ 4-3 展示了一个 `GridView` 控件的例子。\n\n![图 13](img/index-84_1.png)\n\n8601Ch04CMP3 8/25/07\
  \ 1:07 PM Page 77\n\n**第 4 章** ■ **数据绑定控件**\n\n**77**\n\n**清单 4-3.** `GridView`\
  \ 示例\n\n```\n<asp:GridView ID=\"GridView1\" runat=\"server\" AllowPaging=\"True\"\
  \ AllowSorting=\"True\"\n    AutoGenerateColumns=\"False\" DataKeyNames=\"PersonId\"\
  \n    DataSourceID=\"ObjectDataSource1\">\n    <Columns>\n        <asp:BoundField\
  \ DataField=\"FirstName\"\n            HeaderText=\"名字\" SortExpression=\"FirstName\"\
  \ />\n        <asp:BoundField DataField=\"LastName\"\n            HeaderText=\"\
  姓氏\" SortExpression=\"LastName\" />\n        <asp:BoundField DataField=\"City\"\n\
  \            HeaderText=\"城市\" SortExpression=\"City\" />\n        <asp:BoundField\
  \ DataField=\"BirthDate\"\n            HeaderText=\"出生日期\" HtmlEncode=\"False\"\n\
  \            SortExpression=\"BirthDate\" />\n        <asp:BoundField DataField=\"\
  Country\"\n            HeaderText=\"国家\" SortExpression=\"Country\" />\n       \
  \ <asp:CommandField ShowDeleteButton=\"True\" ShowEditButton=\"True\" />\n    </Columns>\n\
  </asp:GridView>\n```\n\n`GridView` 和 `DetailsView` 所使用的 `BoundField` 的编辑功能相当有限。对于字符串以及日期字段，将使用\
  \ `TextBox` 控件进行编辑。对于像 `City` 和 `Country` 这样的字段，它将允许输入任何值。如果能使用识别数据类型的编辑器，将是一个改进。这个缺点将在下一节中解决。\n\
  \n#### 编辑与验证字段\n\n\n\n虽然前面的控件确实允许你修改它们显示的数据，但它们并未为各种数据类型提供强大的智能功能。例如，日期编辑功能会让你使用常规的\
  \ `TextBox` 控件来编辑日期。输入一个非日期格式的字符串将导致回发事件抛出异常，如图 4-1 所示。\n\n**图 4-1.** 保存日期值时出现的\
  \ FormatException\n\n![Image 14](img/index-85_1.jpg)\n\n## 第 4 章 - 数据绑定控件\n\n你甚至可能输入一个看起来像有效日期的值，例如\
  \ 6 月 31 日，但 6 月没有 31 日，因此也会失败。最佳做法是防止该错误发生并避免异常。为此，可以用 `TemplateField` 替换 `BoundField`。这可以通过在\
  \ `GridView` 的**智能标记**上点击**编辑列**链接（如图 4-2 所示）打开的**字段**面板中，将 `BoundField` 转换为 `TemplateField`\
  \ 来实现。\n\n**图 4-2.** 字段编辑器\n\n一旦你拥有了 `TemplateField`，它将以用于只读模式的 `Label` 和用于编辑模式的\
  \ `TextBox` 开始，并分别放置在 `ItemTemplate` 和 `EditTemplate` 中。一个示例如清单 4-4 所示。\n\n**清单\
  \ 4-4.** 包含 TemplateField 的 GridView\n\n```asp\n<asp:GridView ID=\"GridView1\" runat=\"\
  server\"\n    AllowPaging=\"True\" AllowSorting=\"True\"\n    AutoGenerateColumns=\"\
  False\" DataKeyNames=\"PersonId\"\n    DataSourceID=\"ObjectDataSource1\">\n   \
  \ <Columns>\n        <asp:BoundField DataField=\"FirstName\"\n            HeaderText=\"\
  First Name\" SortExpression=\"FirstName\" />\n        <asp:BoundField DataField=\"\
  LastName\"\n            HeaderText=\"Last Name\" SortExpression=\"LastName\" />\n\
  \        <asp:BoundField DataField=\"City\" HeaderText=\"City\" SortExpression=\"\
  City\" />\n        <asp:TemplateField HeaderText=\"Birth Date\" SortExpression=\"\
  BirthDate\">\n            <EditItemTemplate>\n                <asp:TextBox ID=\"\
  TextBox1\" runat=\"server\"\n                    Text='<%# Bind(\"BirthDate\") %>'></asp:TextBox>\n\
  \            </EditItemTemplate>\n            <ItemTemplate>\n                <asp:Label\
  \ ID=\"Label1\" runat=\"server\"\n                    Text='<%# Bind(\"BirthDate\"\
  ) %>'></asp:Label>\n            </ItemTemplate>\n        </asp:TemplateField>\n\
  \        <asp:BoundField DataField=\"Country\"\n            HeaderText=\"Country\"\
  \ SortExpression=\"Country\" />\n        <asp:CommandField ShowDeleteButton=\"True\"\
  \ ShowEditButton=\"True\" />\n    </Columns>\n</asp:GridView>\n```\n\n新的 `TemplateField`\
  \ 最初并未阻止无效日期的问题，但它将允许你添加验证控件来检查该值。可以在 `GridView` 上方放置一个 `ValidationSummary` 控件，以显示任何指示无效值的验证器的\
  \ `ErrorMessage` 属性，但这必须在每个编辑日期的地方重复设置。它也使得 `GridView` 的定义相当臃肿。因此，你将创建一个名为 `DateEditor`\
  \ 的简单用户控件。该用户控件将由一个 `TextBox` 以及一个 `CustomValidator` 和一个 `RegularExpressionValidator`\
  \ 组成。`DateEditor` 如清单 4-5 所示。\n\n**清单 4-5.** DateEditor\n\n```asp\n<%@ Control Language=\"\
  C#\" AutoEventWireup=\"true\"\n    CodeFile=\"DateEditor.ascx.cs\" Inherits=\"DateEditor\"\
  \ %>\n<asp:TextBox ID=\"TextBox1\" runat=\"server\"></asp:TextBox>\n<asp:CustomValidator\
  \ ID=\"cvDate\" runat=\"server\"\n    ControlToValidate=\"TextBox1\" Display=\"\
  Dynamic\"\n    EnableClientScript=\"False\" ErrorMessage=\"Date is invalid\"\n \
  \   OnServerValidate=\"cvDate_ServerValidate\">\n</asp:CustomValidator>\n<asp:RegularExpressionValidator\
  \ ID=\"revDate\" runat=\"server\"\n    ControlToValidate=\"TextBox1\"\n    Display=\"\
  Dynamic\" ErrorMessage=\"Date format is invalid. [MM/dd/yyyy]\"\n    ValidationExpression=\"\
  ^\\d\\d*\\/\\d\\d*\\/\\d\\d\\d\\d$\">\n</asp:RegularExpressionValidator>\n```\n\n\
  在后台代码中，你为 `CustomValidator` 添加了一些辅助代码，以验证该值是否确实是一个有效日期，并通过一个属性使该值可用于将要包含 `DateEditor`\
  \ 的 `TemplateField`（参见清单 4-6）。\n\n**清单 4-6.** DateEditor 后台代码\n\n```csharp\nusing\
  \ System;\nusing System.Web.UI;\nusing System.Web.UI.WebControls;\n\npublic partial\
  \ class DateEditor : UserControl\n{\n    protected void Page_Load(object sender,\
  \ EventArgs e)\n    {\n    }\n}\n```\n\n\n## 第 4 章 ■ 数据绑定控件\n\n```csharp\npublic\
  \ DateTime Date\n{\n    get\n    {\n        DateTime tmpDate = DateTime.MinValue;\n\
  \        DateTime.TryParse(TextBox1.Text, out tmpDate);\n        return tmpDate;\n\
  \    }\n    set\n    {\n        TextBox1.Text = value.ToString(\"MM/dd/yyyy\");\n\
  \    }\n}\n\nprotected void cvDate_ServerValidate(object source,\n    ServerValidateEventArgs\
  \ args)\n{\n    DateTime tmpDate;\n    if (!DateTime.TryParse(TextBox1.Text, out\
  \ tmpDate))\n    {\n        args.IsValid = false;\n        return;\n    }\n\n  \
  \  // 这些是数据库约束\n    DateTime minDate = new DateTime(1753, 1, 1);\n    DateTime maxDate\
  \ = new DateTime(9999, 12, 31);\n    if (tmpDate < minDate || tmpDate > maxDate)\n\
  \    {\n        args.IsValid = false;\n        return;\n    }\n}\n```\n\n代码隐藏文件仔细检查`TextBox`的值，以确保永远不会返回无效值。在`CustomValidator`的`ServerValidate`事件处理程序中，它使用`DateTime`对象的`TryParse`方法来检查`TextBox`的`Text`属性是否不仅看起来像日期，而且确实是一个有效的日期。它不会允许\
  \ 6 月 31 日通过。然后，在`Date`属性中，会执行相同的检查，以防止无效日期通过。回到`GridView`中，`DateEditor`被放置在`EditTemplate`中，其`Date`属性绑定到`出生日期`字段（见清单\
  \ 4-7）。\n\n`清单 4-7.` `DateEditor`\n\n```xml\n<EditItemTemplate>\n    <chpt04:DateEditor\
  \ ID=\"DateEditor1\" runat=\"server\"\n        Date='<%# Bind(\"BirthDate\") %>'\
  \ />\n</EditItemTemplate>\n```\n\n现在，当输入无效日期时，会显示一个有用的错误提示，而不是抛出异常。\n\n更好的是，`DateEditor`可以在整个网站中的任何地方使用，因此所有地方都使用了一致的验证检查，这将带来更好的界面和更少的工作量。\n\
  \n#### 绑定输入参数\n\n数据源可以配置输入参数，以便以多种方式筛选数据。输入参数可以来自`TextBox`或`DropDownList`等控件，也可以来自查询字符串值。配置`ObjectDataSource`和`SqlDataSource`的向导将检测数据源何时需要输入参数，并呈现这些选项。你可以绑定这些参数，也可以选择以编程方式处理它们。\n\
  \n### 通过控件绑定输入参数\n\n使用输入参数的最简单示例是将它们绑定到`TextBox`或`DropDownList`等控件。使用示例数据库时，你将首先将姓氏列表绑定到`DropDownList`。然后，`GridView`将获取`DropDownList`的`SelectedValue`，并获取所有姓氏匹配的人员。此示例可以在不编写任何代码隐藏文件代码的情况下完成。这只是拖放控件的问题。清单\
  \ 4-8 显示了代码。\n\n`清单 4-8.` `InputParameterExample.aspx`\n\n```xml\n<b>选择姓氏: </b>\n\
  <asp:DropDownList ID=\"DropDownList1\" runat=\"server\" AutoPostBack=\"True\"\n\
  \    DataSourceID=\"ObjectDataSource1\" DataTextField=\"LastName\">\n</asp:DropDownList>\n\
  \n<asp:ObjectDataSource ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
  original_{0}\"\n    SelectMethod=\"GetLastNames\" TypeName=\"Chapter04.PersonDomain\"\
  >\n</asp:ObjectDataSource>\n\n<asp:GridView ID=\"GridView1\" runat=\"server\" AllowPaging=\"\
  True\"\n    AllowSorting=\"True\" DataSourceID=\"ObjectDataSource2\">\n</asp:GridView>\n\
  \n<asp:ObjectDataSource ID=\"ObjectDataSource2\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
  original_{0}\"\n    SelectMethod=\"GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\"\
  >\n    <SelectParameters>\n        <asp:ControlParameter ControlID=\"DropDownList1\"\
  \n            Name=\"lastName\" PropertyName=\"SelectedValue\"\n            Type=\"\
  String\" />\n    </SelectParameters>\n</asp:ObjectDataSource>\n```\n\n重要的部分在接近底部的`SelectParameters`，它定义了`ControlParameter`来自`DropDownList1`，并设置了`lastName`输入参数。\n\
  \n### 以编程方式绑定输入参数\n\n\n有时你无法直接从某个控件获取值。可能是因为数据源尚未绑定到该控件，或者在将值设置为输入参数前需要仔细验证以避免异常。在这些情况下，你可以暂时不定义\
  \ `ControlParameter`，而只保留 `Name` 和 `Type` 属性，让输入参数保持未定义状态。`ObjectDataSource` 有一个名为\
  \ `Selecting` 的事件，你可以在该事件中通过编程方式设置输入参数。清单 4-9 展示了一个声明输入参数的示例。\n\n### 清单 4-9. `InputParameterExample2.aspx`\n\
  \n```xml\n<b>选择姓氏: </b>\n<asp:DropDownList ID=\"DropDownList1\" runat=\"server\"\
  \ AutoPostBack=\"True\"\n    DataSourceID=\"ObjectDataSource1\" DataTextField=\"\
  LastName\">\n</asp:DropDownList>\n<asp:GridView ID=\"GridView1\" runat=\"server\"\
  \ AllowPaging=\"True\"\n    AllowSorting=\"True\" DataSourceID=\"ObjectDataSource2\"\
  >\n</asp:GridView>\n<asp:ObjectDataSource ID=\"ObjectDataSource1\" runat=\"server\"\
  \n    OldValuesParameterFormatString=\"original_{0}\"\n    SelectMethod=\"GetLastNames\"\
  \n    TypeName=\"Chapter04.PersonDomain\">\n</asp:ObjectDataSource>\n<asp:ObjectDataSource\
  \ ID=\"ObjectDataSource2\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
  original_{0}\"\n    SelectMethod=\"GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\"\
  \n    OnSelecting=\"ObjectDataSource2_Selecting\">\n    <SelectParameters>\n   \
  \     <asp:Parameter Name=\"lastName\" Type=\"String\" />\n    </SelectParameters>\n\
  </asp:ObjectDataSource>\n```\n\n注意，这里指定了 `OnSelecting` 事件处理程序，并且 `SelectParameters`\
  \ 中定义的 `lastName` 参数没有与任何控件关联。该参数的值是在后台代码文件中设置的。清单 4-10 展示了 `Selecting` 事件的一个事件处理程序。\n\
  \n### 清单 4-10. Selecting 事件处理程序\n\n```csharp\nprotected void ObjectDataSource2_Selecting(object\
  \ sender, ObjectDataSourceSelectingEventArgs e)\n{\n    e.InputParameters[\"lastName\"\
  ] = DropDownList1.SelectedValue;\n}\n```\n\n如果这个输入参数需要的是日期，且值来自一个 `TextBox`，你可以检查该值以确保它确实是一个有效的日期，并且只在值有效时才设置输入参数。输入参数也可能是一个更复杂的类型，比如业务对象，你可以在\
  \ `Selecting` 事件处理程序中构造它。这个简单的处理程序为你提供了多种选择。\n\n##### 绑定用户控件\n\n我经常看到一些非常庞大的页面，模板部分堆砌了大量标记，后台代码也很多，因为页面没有被分解成用户控件。用户控件只是页面的一个片段，当用于封装页面的某一部分时非常有用。它不仅能隔离一部分标记，还能隔离事件和行为。用户控件可以在一个页面上多次使用，也可以跨多个页面使用。这是实现网站代码重用的绝佳方式。\n\
  \n初次尝试绑定到用户控件时可能会有些棘手。是应该尝试从查询字符串读取值，还是以某种方式遍历控件层次结构来找到定义输入参数所需控件以执行其 `DataBind`\
  \ 函数？处理这个问题的最佳方式是像对待其他控件（如 `TextBox`）一样对待用户控件，直接在用户控件上设置属性。首先，你需要一个用户控件，如清单 4-11\
  \ 所示。\n\n### 清单 4-11. `PersonListingControl.ascx`\n\n```xml\n<%@ Control Language=\"\
  C#\" AutoEventWireup=\"true\"\n    CodeFile=\"PersonListingControl.ascx.cs\"\n \
  \   Inherits=\"Controls_PersonListingControl\" %>\n<asp:GridView ID=\"GridView1\"\
  \ runat=\"server\" AllowPaging=\"True\"\n    AllowSorting=\"True\" DataSourceID=\"\
  ObjectDataSource1\">\n</asp:GridView>\n<asp:ObjectDataSource ID=\"ObjectDataSource1\"\
  \ runat=\"server\"\n    OldValuesParameterFormatString=\"original_{0}\"\n    SelectMethod=\"\
  GetPeopleByLastName\"\n    TypeName=\"Chapter04.PersonDomain\"\n    OnSelecting=\"\
  ObjectDataSource1_Selecting\">\n    <SelectParameters>\n        <asp:Parameter Name=\"\
  lastName\" Type=\"String\" />\n    </SelectParameters>\n</asp:ObjectDataSource>\n\
  ```\n\n这个例子包含了像前面例子中一样的 `GridView`，但它被放在一个用户控件中。它还有一个 `ObjectDataSource`，其中定义了一个\
  \ `lastName` 输入参数，并指定了 `Selecting` 事件处理程序。父页面需要传递 `lastName` 参数的值，你将通过属性声明来实现（参见清单\
  \ 4-12）。\n\n### 清单 4-12. `PersonListing.aspx.cs` 后台代码\n\n```csharp\nprotected void\
  \ ObjectDataSource1_Selecting(\n    object sender, ObjectDataSourceSelectingEventArgs\
  \ e)\n{\n    e.InputParameters[\"lastName\"] = LastName;\n}\n\nprivate string _lastName\
  \ = String.Empty;\npublic string LastName\n{\n    get\n    {\n        return _lastName;\n\
  \    }\n    set\n    {\n        _lastName = value;\n        ObjectDataSource1.DataBind();\n\
  \    }\n}\n```\n\n`LastName` 属性保存了在 `Selecting` 事件处理程序中使用的值。并且当 `LastName` 属性被设置时，你可以看到它调用了\
  \ `ObjectDataSource1` 的 `DataBind` 方法，立即将数据绑定到 `GridView`。如果不调用 `DataBind`，`GridView`\
  \ 可能根本不会被绑定，因为它不会像 `ObjectDataSource` 配置了控件属性那样自动触发绑定。在设置值时立即调用它是合理的，但也可以在用户控件的\
  \ `PreRender` 事件中调用，甚至让包含此控件的页面调用用户控件上的 `DataBind` 方法。一旦值已知就立即绑定数据，可以确保数据总是被绑定。\n\
  \n当有多个属性用于设置多个输入参数时，最好将数据绑定推迟到稍后的事件（如 `PreRender` 事件），以便在 `Selecting` 事件运行之前设置好所有属性。\n\
  \n#### 嵌入数据绑定控件\n\n对于更复杂的数据层次结构，你可能会希望将一个用户控件嵌入到另一个用户控件中，就像前面的例子将用户控件嵌入到页面并通过属性传递值来绑定数据一样。也许你正在显示一个报告，并且每个部分都有相关的子部分。创建一个用户控件来代表主部分，其中包含另一个代表子部分的用户控件，是将代码分解为负责各自数据绑定的独立片段的绝佳方式。\n\
