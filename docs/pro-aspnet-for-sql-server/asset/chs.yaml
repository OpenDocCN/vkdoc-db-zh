  \ http://www.springframework.net。）\n\n**部分类**\n\n\n"
- "# 第 8 章：生成的数据访问层\n\n通过**部分类**可以开放类的可扩展性。当大部分代码是生成的时候，此功能非常有用。生成的文件可以与手动编辑的文件保持分离，这样在重新生成代码更新时，你的修改就不会丢失。\n\
  \n`SubSonic`生成器创建的每个类都被标记为部分类。如果你想为生成的类添加功能，可以创建一个新的部分类来添加额外的方法和属性。假设你有一个名为`Person`的表，其中包含`FirstName`和`LastName`字段。当使用`SubSonic`生成`Person`类时，你将获得这些表列的属性。你可以创建一个部分类来添加一个名为`FullName`的属性，如**代码清单\
  \ 8-17**所示。\n\n**代码清单 8-17.** `FullName` 属性\n\n```csharp\nnamespace Chapter08.SubSonicDAL\n\
  {\n    public partial class Person : ActiveRecord<Person>\n    {\n        /// <summary>\n\
  \        /// FirstName 和 LastName 组合\n        /// </summary>\n        public string\
  \ FullName {\n            get {\n                return this.FirstName + \" \" +\
  \ this.LastName;\n            }\n        }\n    }\n}\n```\n\n由于`FirstName`和`LastName`属性已经定义，尽管它们定义在另一个源文件中，你仍可以将它们作为同一类的一部分来访问。你还可以添加一个方法来提供`SubSonic`原生未提供的行为。一个标准的方法是`FetchByID`方法，它接受目标表的主键。该方法只是简单地查询数据库中的单条记录。`FetchByID`方法定义在`PersonController`类中。\n\
  \n你可以做的是，使用几乎相同的方法签名向该类添加缓存行为。你不是只传入`ID`参数，而是添加一个名为`cached`的布尔值。当它为`true`时，将使用缓存，如**代码清单\
  \ 8-18**所示。\n\n**代码清单 8-18.** 带缓存的 `FetchByID`\n\n```csharp\nnamespace Chapter08.SubSonicDAL\n\
  {\n    public partial class PersonController\n    {\n        public PersonCollection\
  \ FetchByID(object ID, bool cached)\n        {\n            if (!cached)\n     \
  \       {\n                return FetchByID(ID);\n            }\n            string\
  \ cacheKey = (typeof(Person)).ToString() + \"-\" + ID;\n            Cache cache\
  \ = HttpRuntime.Cache;\n            if (cache[cacheKey] != null) {\n           \
  \     return cache[cacheKey] as PersonCollection;\n            }\n            PersonCollection\
  \ coll = new PersonCollection().Where(Person.Columns.ID, ID).Load();\n         \
  \   cache.Insert(cacheKey, coll, null,\n                DateTime.Now.AddMinutes(5),\
  \ TimeSpan.Zero);\n            return coll;\n        }\n    }\n}\n```\n\n以这种方式缓存`Person`记录可能会消除应用程序中的一个瓶颈，但你也需要确保当`Person`记录更新时，它能从缓存中被移除。**代码清单\
  \ 8-19**中的`ClearCachedItem`方法负责从缓存中移除该项目。\n\n**代码清单 8-19.** `ClearCachedItem` 方法\n\
  \n```csharp\npublic void ClearCachedItem(object ID)\n{\n    string cacheKey = (typeof(Person)).ToString()\
  \ + \"-\" + ID;\n    Cache cache = HttpRuntime.Cache;\n    cache.Remove(cacheKey);\n\
  }\n```\n\n每次你调用`Insert`和`Update`方法时，都可以确保调用`ClearCachedItem`方法。以这种方式添加功能是优化使用此数据访问层的应用程序的绝佳方式。\n\
  \n#### 查询工具\n\n`SubSonic`使用一个内置的查询工具，该工具生成用于在数据库中获取、保存和删除数据的 SQL。这个查询工具在`LINQ`技术作为社区技术预览版发布之前很久就开发出来了，但它有相当多的共通之处。\n\
  \n该查询工具使用一个名为`Query`的类。它通过一系列来自许多方法的调用来构建，这些调用逐步完善查询。其目标是使`C#`代码看起来很像用 SQL 编写的查询。**代码清单\
  \ 8-20**显示了一个示例方法，它通过`LocationID`加载所有`Person`记录。\n\n**代码清单 8-20.** `FetchPersonsByLocationID`\
  \ 方法\n\n```csharp\npublic PersonCollection FetchPersonsByLocationID(object LocationID)\n\
  {\n    return new PersonCollection().\n        Where(Person.Columns.LocationID,\
  \ LocationID).\n        OrderByAsc(Person.Columns.LastName).Load();\n}\n```\n\n\
  关于`FetchPersonsByLocationID`方法有几个重要的细节。第一个细节是该方法是完全类型安全的。使用类型化`DataSet`的一个强烈理由是为了类型安全，但是由于`SubSonic`生成的代码直接基于数据库，它会自动创建类型感知的代码。在此方法中，对`Where`方法的调用可以使用字面字符串，但这里使用的是为`LocationID`列定义的常量。\n\
  \n第二个细节是查询完全由查询工具使用带有`LocationID`列的`Person`表透明地构建。在`C#`中编写此查询非常容易，并可以根据需要轻松添加其他细化条件。最终生成的查询构建了一个参数化查询，当查询被重复使用时，`SQL\
  \ Server`能够很好地优化它。\n\n#### 脚手架\n\n生成的数据访问层最后一个主要优点是能够将*脚手架*系统自动连接到生成的代码。*脚手架*是一组接口，你无需编写一行代码就可以使用它们向数据库添加示例数据。许多开发人员发现这非常有用，特别是当脚手架能智能处理表之间的关系时。`SubSonic`包含一个自动脚手架系统，其灵感来源于在`Ruby\
  \ on Rails`（一个基于`Ruby`脚本语言的流行 Web 框架）上完成的工作。`SubSonic`实际上借鉴了`Ruby on Rails`的几个概念。\n\
  \n对于`SubSonic`，你可以使用`SubSonicCentral`网站中的`AutoScaffold`页面，这是可下载源代码的一部分。你可以将此页面及其依赖项复制到你自己网站的管理部分，它将为你提供数据库的界面。图\
  \ 8-5 显示了编辑`Person`表的`AutoScaffold`页面。\n\n**图 8-5.** `AutoScaffold` 页面\n\n虽然`AutoScaffold`页面不会完美，但作为你应用程序的唯一编辑器，它确实以极小的工作量提供了对数据的自动访问。并且当你更新数据库并重新生成数据访问层时，`AutoScaffold`页面将自动调整以匹配更改。你无需付出任何努力来保持其最新。\n\
  \n除了简单地将编辑器封装在表周围，`AutoScaffold`系统还能感知关系。`Person`表有一个指向`Location`表的外键引用。这个简单的引用足以让`AutoScaffold`页面在编辑`Person`记录时提供一个下拉列表来选择位置。图\
  \ 8-6 显示了处于编辑模式的`Person`记录。\n\n**图 8-6.** 编辑带位置引用的 `Person` 记录\n\n凭借`SubSonic`提供的所有功能，你应该能够快速启动并运行。`SubSonic`实现的生成的数据访问层和开发体验与类型化`DataSet`提供的截然不同，后者虽然也生成大量代码，但极其僵化且难以随数据库变更而更新。当你开始构建应用程序并发生变更时，你应该能够轻松适应。当你向数据库添加新列时，只需运行生成命令即可更新你的数据访问层。并且借助部分类和代码生成模板，你可以轻松修改代码生成过程以满足你的独特需求。\n\
  \n**Blinq**\n\n"
- "# 8 生成数据访问层\n\n## 常用文件夹补充\n\n像 `SubSonic` 和 `Blinq` 这样的工具，即使不用于整个数据访问层，也可以纯粹利用它们的脚手架功能。你可以将这些工具放在\
  \ `Tools` 文件夹中的 `Common` 文件夹中（例如 `D:\\Projects\\Common\\Tools\\Code Generators`）。`Blinq`\
  \ 会被安装到 `Program Files` 文件夹，而 `SubSonic` 的工具和程序集可以解压到一个文件夹中，供活动项目引用。\n\n由于项目引用了\
  \ `LINQ`，它应该在运行时生成优化的查询，因为 `LINQ` 已经过精细调整以与 `SQL Server` 协同工作。只要数据库有 `LINQ` 提供程序实现，`LINQ`\
  \ 也可以与其他数据库一起工作。`LINQ` 中专门查询数据库的部分是 `DLINQ`，而 `XLINQ` 用于查询 `XML`。请参阅 `MSDN` 文档以获取关于\
  \ `LINQ` 技术的完整介绍和入门。在这里，我将重点介绍如何使用 `Blinq`，它提供了哪些功能，以及如何利用它来构建真实的应用程序。\n\n首先，你需要从\
  \ `ASP.NET` 网站（`http://www.asp.net`）下载 `Blinq`。它位于沙盒部分。它需要 `LINQ` 支持，因此你需要 `LINQ\
  \ CTP` 或 `Visual Studio 2008` 的预览版（代号 `Orcas`）。一旦安装了 `Blinq`，你就可以运行清单 8-21 中的命令来生成一个\
  \ `Blinq` 驱动的网站。\n\n**清单 8-21.** `Blinq` 生成命令\n```\n\"C:\\Program Files\\Microsoft\
  \ ASP.NET\\Blinq\\blinq.exe\" /l:cs /server:.\\SQLEXPRESS /database:Chapter08 /namespace:Chapter08.BlinqDAL\
  \ /t:$(BlinqTmpDir) /f\n```\n\n`Blinq` 工具可以通过 `/l` 开关生成 `C#` 或 `VB` 的代码。值可以是 `cs`\
  \ 或 `vb`，默认输出语言是 `C#`。`/server` 和 `/database` 开关指定服务器和数据库，并假设使用受信任的连接。清单 8-21 中的命令连接到本地\
  \ `SQL Express` 数据库和 `Chapter08` 数据库。`/namespace` 开关定义了生成代码将放置的命名空间。`/t` 开关指定了所有文件将被创建的目标目录。文件开关\
  \ `/f` 会在命令再次运行时强制替换现有文件。\n\n以下示例使用的示例数据库与 `SubSonic` 示例使用的结构相同。它只包含一个 `Person`\
  \ 表和一个 `Location` 表，它们之间有一个外键引用。运行 `Blinq` 工具创建的文件如图 8-7 所示。\n\n图 8-8 展示了该网站，其特点是一个类似于\
  \ `SubSonic` 项目的脚手架系统。\n\n再次说明，你可能不希望最终用户使用此界面，但你可以在开发应用程序时使用它来输入初始样本数据。你希望从这个生成的网站中获取的是放在\
  \ `App_Code` 文件夹中的代码，以及提供数据访问的页面中的标记。\n\n页面本身几乎没有代码。所有操作都是通过带有数据绑定控件和 `ObjectDataSource`\
  \ 引用的标记声明完成的。这些页面在你处理自定义页面时可以作为很好的参考。清单 8-22 显示了用于 `Person` 表的 `ObjectDataSource`\
  \ 声明。\n\n![Image 38](img/index-255_1.jpg)\n\n![Image 39](img/index-255_2.jpg)\n\n\
  **图 8-7.** `Blinq` 生成的文件\n\n**图 8-8.** `Blinq` 生成的网站\n\n**清单 8-22.** 用于 `Person`\
  \ 的 `ObjectDataSource`\n```\n<asp:ObjectDataSource ID=\"PersonsDataSource\" runat=\"\
  server\"\n    TypeName=\"Chapter08.BlinqDAL.Person\"\n    DataObjectTypeName=\"\
  Chapter08.BlinqDAL.Person\"\n    OldValuesParameterFormatString=\"original_{0}\"\
  \n    ConflictDetection=\"CompareAllValues\"\n    SelectMethod=\"GetPerson\"\n \
  \   InsertMethod=\"Insert\"\n    UpdateMethod=\"Update\"\n    DeleteMethod=\"Delete\"\
  \n    EnableCaching=\"True\">\n    <SelectParameters>\n        <asp:QueryStringParameter\
  \ QueryStringField=\"ID\"\n            Name=\"ID\"\n            ConvertEmptyStringToNull=\"\
  False\">\n        </asp:QueryStringParameter>\n    </SelectParameters>\n</asp:ObjectDataSource>\n\
  ```\n\n`Blinq` 在 `Chapter08.BlinqDAL` 命名空间中创建的 `Person` 类包括 `GetPerson`、`Insert`、`Update`\
  \ 和 `Delete` 方法。用于查询数据库中单个记录的 `ID` 值被设置为从查询字符串中提取。\n\n`Blinq` 生成的代码放置在网站的 `App_Code`\
  \ 文件夹中的两个源文件 `Chapter08.cs` 和 `StaticMethods.cs` 中。第一个源文件的名称来自数据库的名称。你可以将这些文件提取到一个类库中，以便从中心点作为依赖项重用它们。`Blinq`\
  \ 如此有趣的原因在于它用于处理数据的代码是多么简单和切中要害。清单 8-23 显示了 `Person` 类中的 `GetPerson` 方法。\n\n**清单\
  \ 8-23.** `GetPerson` 方法\n```\npublic static Person GetPerson(Int64 ID) {\n    Chapter08\
  \ db = Chapter08.CreateDataContext();\n    return db.Persons.Where(x=>x.ID == ID).FirstOrDefault();\n\
  }\n```\n\n查询只有一行。另一端没有存储过程。`LINQ` 系统创建所有必要的 `SQL`，并使用它来获取数据并填充 `Person` 对象。\n\n\
  就这样！`LINQ` 查询简单地将 `ID` 列与传入该方法的 `ID` 值进行匹配。另一个方法 `GetPersonsByLocation` 稍微复杂一些，因为它处理\
  \ `Person` 和 `Location` 表之间的关系。如清单 8-24 所示。\n\n**清单 8-24.** `GetPersonsByLocation`\
  \ 方法\n```\npublic static IQueryable<Person> GetPersonsByLocation(Int64 ID) {\n \
  \   Chapter08 db = Chapter08.CreateDataContext();\n    return db.Locations.Where(x=>x.ID\
  \ == ID).SelectMany(x=>x.Persons);\n}\n```\n\n`GetPersonsByLocation` 查询获取一个 `Location`\
  \ 的 `ID`，然后从中选择多个 `Person` 记录。正如你所看到的，这里发生了一些查询链式调用。随着你在工作中越来越多地使用 `LINQ`，这将成为一种熟悉的编码风格。一个查询的结果可以通过另一个查询进行传递，以过滤最终结果。虽然你可能认为这个查询效率低下，但你会惊喜地发现，`LINQ`\
  \ 运行时环境的内部机制处理了一些优化，从而加快了你的查询速度，同时让你编写的代码对你来说更具可读性。\n\n在第 10 章中，我将通过一系列例子更深入地探讨\
  \ `LINQ`，这些例子将更详细地解释这里发生的事情。\n\n#### 总结\n\n在本章中，你了解了如何使用构建提供程序以及几个强大的实用程序来生成代码，这些实用程序会生成新的源文件。你现在应该已经了解了如何充分利用自动生成的数据访问层，节省通常编写所有代码所需的时间，同时仍然保留通过模板和部分类扩展生成代码的能力。\n\
  \n"
