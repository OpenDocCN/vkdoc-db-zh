  ## 第 6 章 ■ 缓存


  对于典型的访问，用户可能访问几个页面并在不到 10 分钟内离开。也许他们正在查看你网站上某个产品的价格或订单状态。他们希望快速获取信息然后离开。一旦他们离开，你希望有一种方法来清理他们使用的内存，以便其他用户可用。这正是缓存填补实际需求的地方。


  还有一种情况是，特定数据集被许多用户同时使用。也许一个热门产品刚刚开始销售。每次对产品页面的访问都会触发一系列查询数据库以显示页面的操作。数据实际上并不经常变化，但在一秒钟内，你可能有
  20 个用户访问该页面并运行相同的查询来加载页面。这会给数据库带来负载，导致越来越多的 I/O 延迟，因为数据库在短时间内执行大量工作。它还填满了数据库服务器和
  Web 服务器之间的网络连接，如果网络没有足够的容量来处理带宽，这可能成为瓶颈。如果产品页面或查询被包装了缓存机制，即使它只使用五秒钟的超时，你也可以显著提高页面性能，并减少数据库服务器和网络的负载。这是缓存解决的另一个实际问题。


  ## WEB 与数据库服务器的通信




  '
- "# 第六章：缓存\n\n当开发环境中本地数据库与 Visual Studio 启动的开发 Web 服务器位于同一台机器上时，Web 服务器与数据库服务器之间的通信很容易被忽视。这可能会给你一个错误的印象，即部署后数据访问层同样会如此迅速。\n\
  \n调整查询，只从表中提取必要的列而非所有列，就是一种轻松减少 Web 服务器与数据库服务器之间带宽消耗的示例。\n\n数据库上的查询量突然激增，即使是相同的查询，也可能导致数据库性能急剧下降。这可能是因为这些查询涉及跨多个表的连接，而这些表恰好位于物理磁盘的不同部分。SQL\
  \ Server 2005 会尝试通过将最近使用的数据和索引保留在内存中来进行补偿，但这些理想的自动优化并不保证会发生。最好将这些查询的结果保存在 Web 服务器上，以便数据库能够处理其他查询。\n\
  \n## 缓存的替代方案\n\n使用 ASP.NET 缓存并不总是提升性能的正确解决方案。放入缓存的数据越多，它可能变得越复杂。并且缓存中的更多数据可能会将你希望保留其中以增强性能的项目挤出去。一些数据可以通过其他开销更低的方式存储，例如使用应用程序状态、`Session`，甚至\
  \ `ViewState`。\n\n虽然下文描述的技术有时是合适的解决方案，但它们也存在一些问题。要么它们在内存不足时没有自动释放对象的方式，要么它们保留数据的时间不够长，从而无法发挥作用。即便如此，你可以将这些技术相互结合并与缓存结合使用，以提供一个更全面的解决方案，让你在获得所有好处的同时将负面影响降至最低。\n\
  \n###### 应用程序状态\n\n应用程序状态是一个全局资源，每个用户和请求都可以访问。你可以用它来保存需要快速访问的对象。你可以使用 `Global.asax`\
  \ 中的 `Application_Start` 事件将项目放入此集合，以便项目在应用程序首次启动时立即可用。列表 6-1 展示了如何使用网站根目录下的 `Global.asax`\
  \ 文件将数据存储到应用程序状态中。其余代码可以放在 `App_Code` 文件夹的工具类中。列表 6-2 展示了 `GetApplicationState`\
  \ 方法，该方法由 `Global.asax` 中的方法调用。\n\n**列表 6-1.** 在 `Global.asax` 中将数据加载到应用程序状态\n\n\
  ```csharp\nvoid Application_Start(object sender, EventArgs e)\n{\n    HttpContext.Current.Application[\"\
  ApplicationState\"] = GetApplicationState();\n}\n\nvoid Application_End(object sender,\
  \ EventArgs e)\n{\n    HttpContext.Current.Application[\"ApplicationState\"] = null;\n\
  }\n```\n\n**列表 6-2.** `App_Code\\Utility.cs` 中的 `GetApplicationState` 方法\n\n```csharp\n\
  public static DataSet GetApplicationState()\n{\n    return HttpContext.Current.Application[\"\
  Global Data\"] as DataSet;\n}\n```\n\n无需任何额外工作，放入应用程序状态的数据将不会被更新。如果外部事件需要更新这些数据，可以使用处理程序重新加载数据。列表\
  \ 6-3 展示了一个可以调用来重新加载应用程序状态的处理程序（`.ashx`）。\n\n**列表 6-3.** `ApplicationStateHandler.ashx`\n\
  \n```csharp\n<%@ WebHandler Language=\"C#\" Class=\"ApplicationStateHandler\" %>\n\
  using System.Web;\nusing Chapter06.ClassLibrary;\n\npublic class ApplicationStateHandler\
  \ : IHttpHandler {\n    public void ProcessRequest (HttpContext context) {\n   \
  \     context.Response.ContentType = \"text/plain\";\n        string action = context.Request.QueryString[\"\
  action\"];\n        if (\"ReloadApplicationState\".Equals(action))\n        {\n\
  \            context.Response.Write(\"Reloading Application State\\n\");\n     \
  \       Domain.LoadApplicationState();\n            context.Response.Write(\"Done.\"\
  );\n        }\n        else\n        {\n            context.Response.Write(\"Action\
  \ unknown: \" + action);\n        }\n    }\n\n    public bool IsReusable {\n   \
  \     get {\n            return false;\n        }\n    }\n}\n```\n\n应用程序状态可以像任何集合一样保存多个项目，因此可以存储各种各样的数据，以供任何请求需要时使用。\n\
  \n## Session\n\n`Session` 为单个用户保存数据，其时间窗口为滑动的 20 分钟。在 `Global.asax` 中，你可以使用 `Session_Start`\
  \ 和 `Session_End` 事件处理程序来管理 `Session` 的生命周期，这是另一个可以保存任何类型对象的集合。随着用户使用网站，你可以随时间向其添加数据。加载\
  \ `Session` 的一个好时机是在用户登录网站后立即进行。它可以保存与该用户相关的所有数据，你预计用户在访问期间最终会从数据库请求这些数据。\n\n##\
  \ ViewState\n\n`ViewState` 进一步将其保存的数据范围限制为仅当前页面，只要页面维持着回发周期。当数据绑定到 `GridView` 时，由于它使用\
  \ `ViewState` 来绘制 `GridView`，因此在回发时不必访问数据库。你还可以将额外的项目放入 `ViewState` 中，这些项目不附加到页面元素，但你可以在回发时访问它们。不过，这仅限于可以序列化以用于\
  \ `ViewState` 的对象。\n\n###### 当前上下文\n\n你还可以在当前上下文中保存数据，其范围仅限于当前请求。你可以存储数据，然后在整个请求过程中由任何控件共享。考虑一下，如果你代码隐藏中的\
  \ `Page_Load` 在上下文中填充了对象，那么该页面中包含的所有用户控件随后都将能够使用它，而不必去数据库获取数据。对于产品详情页，你可能会将页面的部分内容拆分为用户控件以简化维护，但如果一个页面包含五个用户控件，你可能会为了一个请求分别访问数据库五次来获取产品详情。使用当前上下文将显著减少数据库负载。列表\
  \ 6-4 展示了如何将数据加载到当前上下文中。列表 6-5 展示了页面上的每个用户控件或任何控件如何访问放置在当前上下文中的数据。\n\n**列表 6-4.**\
  \ 在 `Page_Load` 方法中将产品加载到当前上下文\n\n```csharp\nusing System;\nusing System.Web.UI;\n\
  \npublic partial class _Default : Page\n{\n    protected void Page_Load(object sender,\
  \ EventArgs e)\n    {\n        Context.Items[\"CurrentProduct\"] = GetProduct();\n\
  \    }\n\n    private Product GetProduct()\n    {\n        Product product = new\
  \ Product(\"Product 1\");\n        return product;\n    }\n}\n```\n\n**列表 6-5.**\
  \ 在用户控件中使用当前上下文访问产品\n\n```csharp\nusing System;\nusing System.Web.UI;\n\npublic\
  \ partial class Controls_ProductControl : UserControl\n{\n    protected void Page_Load(object\
  \ sender, EventArgs e)\n    {\n        Product currentProduct = Context.Items[\"\
