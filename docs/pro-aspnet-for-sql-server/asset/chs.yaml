  你可以看到 `SetUp` 方法创建了域对象并获取了原始价格。`TearDown` 方法使用原始价格恢复价格。对于运行的每个测试，`SetUp` 方法首先运行，测试完成后，`TearDown`\
  \ 方法运行。一个测试不会影响下一个测试。\n\n## 清单 6-35. Test101_Caching_Off_Test 方法\n\n在每个测试中，都会检查特定场景是否符合预期。每个假设都通过\
  \ `Assert` 调用进行检查，该调用将被计为整个测试套件的一个通过或失败。清单 6-35 中的测试检查了缓存未开启时的正确行为。\n\n```csharp\n\
  /// <summary>\n/// 测试系统在缓存关闭时是否正常工作\n/// </summary>\n[Test]\npublic void Test101_Caching_Off_Test()\n\
