- "# 第 9 章 部署\n\n值得注意的是，一些项目文件本身也是 MSBuild 脚本。类库的项目文件就是一个 MSBuild 脚本，你可以在其中列出（Listing\
  \ 9-2）所示的 `BeforeBuild` 和 `AfterBuild` **目标**（target）中放置**任务**（task）。这些目标最初是被注释掉的，但你可以取消注释。然后，你可以在其中放置任意想要的任务，让它们在构建过程之前或之后运行。\n\
  \n**Listing 9-2.** `BeforeBuild` 和 `AfterBuild` 目标\n\n```xml\n<Target Name=\"BeforeBuild\"\
  >\n    <Message Text=\"### BeforeBuild ###\" Importance=\"high\"></Message>\n</Target>\n\
  <Target Name=\"AfterBuild\">\n    <Message Text=\"### AfterBuild ###\" Importance=\"\
  high\"></Message>\n</Target>\n```\n\n你还可以使用 `PreBuildEvent` 和 `PostBuildEvent` **属性**，它们的工作方式更像是一系列命令的批处理文件。这些属性默认是空的，但你可以调用命令行。示例（Listing\
  \ 9-3）运行 MSBuild 实用程序，其参数指定了解决方案目录中的一个脚本。\n\n**Listing 9-3.** `PreBuildEvent` 和\
  \ `PostBuildEvent` 属性\n\n```xml\n<PropertyGroup>\n    <PreBuildEvent>%25windir%25\\\
  Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe ➥\n        \"$(SolutionDir)build.proj\"\
  \ /t:PreBuild /p:Configuration=$(ConfigurationName)\n    </PreBuildEvent>\n    <PostBuildEvent>%25windir%25\\\
  Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe ➥\n        \"$(SolutionDir)build.proj\"\
  \ /t:PostBuild /p:Configuration=$(ConfigurationName)\n    </PostBuildEvent>\n</PropertyGroup>\n\
  ```\n\n在独立管理各个项目的细节之后，你可以在解决方案级别创建一个构建脚本，该脚本将简单地使用项目文件，调用 `Build` **目标**。\n\n这是通过\
  \ `MSBuild` 目标完成的。对于标准的解决方案布局——即解决方案文件位于根文件夹中，项目位于子文件夹中——通常会在根文件夹中放置一个名为 `build.proj`\
  \ 的文件，用于协调自动化流程。\n\n主要的构建脚本 `build.proj` 将主要处理构建过程，但它也可以清理项目，运行单元测试和其他自动化任务。示例（Listing\
  \ 9-4）展示了一个脚本，它使用来自 MSBuild Community Tasks 项目的 `Prompt` **任务**，在打印一系列选项后获取用户的响应。这样做使得构建脚本能够与用户进行交互。\n\
  \n**Listing 9-4.** 主构建脚本示例 (`build.proj`)\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<Project DefaultTargets=\"Build\">\n    <PropertyGroup>\n        <NoWarn\
  \ Condition=\"'$(NoWarn)'!=''\">$(NoWarn),</NoWarn>\n        <NoWarn>$(NoWarn)MSB4078</NoWarn>\n\
  \        <Configuration Condition=\" '$(Configuration)' == '' \">Release</Configuration>\n\
  \        <ApplicationName>Chapter09</ApplicationName>\n        <ApplicationVersion>v1.0</ApplicationVersion>\n\
  \        <Interactive Condition=\"'$(Interactive)' == ''\">False</Interactive>\n\
  \    </PropertyGroup>\n    <Import Project=\"$(MSBuildExtensionsPath)\\MSBuildCommunityTasks\\\
  \ ➥\n        MSBuild.Community.Tasks.Targets\" />\n    <Target Name=\"Clean\">\n\
  \        <Message Text=\"Running Clean Target...\" Importance=\"high\"></Message>\n\
  \        <MSBuild Projects=\"ClassLibrary\\ClassLibrary.csproj\"\n            Targets=\"\
  Clean\" ContinueOnError=\"false\"></MSBuild>\n    </Target>\n    <Target Name=\"\
  PreBuild\">\n        <Message Text=\"No PreBuild Tasks\"></Message>\n    </Target>\n\
  \    <Target Name=\"Build\">\n        <Message Text=\"Running Build Target...\"\
  \ Importance=\"high\"></Message>\n        <MSBuild Projects=\"ClassLibrary\\ClassLibrary.csproj\"\
  \n            Targets=\"Build\" ContinueOnError=\"false\"></MSBuild>\n    </Target>\n\
  \    <Target Name=\"PostBuild\">\n        <Message Text=\"No PostBuild Tasks\"></Message>\n\
  \    </Target>\n    <Target Name=\"RunTests\" DependsOnTargets=\"Build\">\n    \
  \    <Message Text=\"No Tests Tasks\"></Message>\n    </Target>\n    <Target Name=\"\
  Rebuild\" DependsOnTargets=\"Clean;PreBuild;Build;PostBuild\">\n        <Message\
  \ Text=\"Full Rebuild Successful!\" Importance=\"high\"></Message>\n    </Target>\n\
  \    <Target Name=\"FullBuild\"\n        DependsOnTargets=\"Clean;PreBuild;Build;PostBuild;RunTests\"\
  >\n        <Message Text=\"Full Build Successful!\" Importance=\"high\"></Message>\n\
  \    </Target>\n    <Target Name=\"PromptForTarget\" Condition=\"'$(Interactive)'\
  \ == 'True'\">\n        <Message Text=\" \"></Message>\n        <Message Text=\"\
  1) Clean\" Importance=\"high\"></Message>\n        <Message Text=\"2) PreBuild\"\
  \ Importance=\"high\"></Message>\n        <Message Text=\"3) Build\" Importance=\"\
  high\"></Message>\n        <Message Text=\"4) PostBuild\" Importance=\"high\"></Message>\n\
  \        <Message Text=\"5) RunTests\" Importance=\"high\"></Message>\n        <Message\
  \ Text=\"6) Rebuild\" Importance=\"high\"></Message>\n        <Message Text=\"7)\
  \ FullBuild\" Importance=\"high\"></Message>\n        <Prompt Text=\" Enter a target:\"\
  >\n            <Output TaskParameter=\"UserInput\" PropertyName=\"SelectedTarget\"\
  />\n        </Prompt>\n        <Message Text=\"Selected target is $(SelectedTarget)\"\
  \ Importance=\"high\">\n        </Message>\n        <MSBuild Targets=\"Clean\"\n\
  \            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)' == '1'\"></MSBuild>\n\
  \        <MSBuild Targets=\"PreBuild\"\n            Projects=\"build.proj\" Condition=\"\
  '$(SelectedTarget)' == '2'\"></MSBuild>\n        <MSBuild Targets=\"Build\"\n  \
  \          Projects=\"build.proj\" Condition=\"'$(SelectedTarget)' == '3'\"></MSBuild>\n\
  \        <MSBuild Targets=\"PostBuild\"\n            Projects=\"build.proj\" Condition=\"\
  '$(SelectedTarget)' == '4'\"></MSBuild>\n        <MSBuild Targets=\"RunTests\"\n\
  \            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)' == '5'\"></MSBuild>\n\
  \        <MSBuild Targets=\"Rebuild\"\n            Projects=\"build.proj\" Condition=\"\
  '$(SelectedTarget)' == '6'\"></MSBuild>\n        <MSBuild Targets=\"FullBuild\"\n\
  \            Projects=\"build.proj\" Condition=\"'$(SelectedTarget)' == '7'\"></MSBuild>\n\
  \    </Target>\n</Project>\n```\n\n你不能简单地双击一个 MSBuild 脚本来运行它，因此创建一个可以在 Windows 资源管理器中点击的脚本会很有帮助，例如示例（Listing\
  \ 9-5）所示的 `RunBuild.cmd`。\n\n**Listing 9-5.** `RunBuild.cmd`\n\n```cmd\n%windir%\\\
  Microsoft.NET\\Framework\\v2.0.50727\\MSBuild.exe build.proj ➥\n    /t:PromptForTarget\
  \ /p:Configuration=Release;Interactive=True\nPause\n```\n\nMSBuild 实用程序接受多个参数。具体来说，`/t`\
  \ 开关指定了一个以分号分隔的**目标**列表，而 `/p` 开关指定了脚本将能使用的一系列**属性**。示例（Listing 9-5）中的命令调用了一个名为\
  \ `PromptForTarget` 的目标，并将 `Configuration` 属性设置为 `Release`，将 `Interactive` 属性设置为\
  \ `True`。你可以通过在 Visual Studio 命令提示符下运行 `MSBuild \\?` 来获取 MSBuild 命令行选项的完整列表。\n\n\
  #### 部署网站\n\n将网站从开发环境移动到服务器可以通过多种方式完成。\n\n最常用的方式一直是 `xcopy` 命令：一个标准的 Windows 命令行实用程序，它有许多开关，让你可以极大地控制复制过程。示例（Listing\
  \ 9-6）显示了一个简单的命令，它将所有文件从源目录复制到目标目录。如果目标文件夹中已经存在文件，它只会在源文件较新时才替换目标文件。\n\n**Listing\
  \ 9-6.** 使用 `xcopy`\n\n```cmd\nxcopy /E/D/Y \"D:\\SourceDir\" \"\\\\Server1\\DestinationDir\"\
  \n```\n\n虽然使用 `xcopy` 有时可以完成任务，但你可能并不总是想盲目地复制文件。`xcopy` 命令无法确保在每次部署时删除旧文件，也不会为目的地环境调整配置。要处理这些需求，你可以利用\
  \ Web 部署项目。\n\n##### 网站部署项目\n\n\n\n使用 ASP.NET 2.0 网站模型创建的 Web 应用程序不使用类库那样的项目文件。这个新模型使得许多新功能成为可能，例如页面级编译，但它也取消了我们在.NET\
  \ 1.1 项目中有的一些功能。没有项目文件，就无法在生成前后自动运行操作，也无法以相同的方式管理引用和资源。`Web.config`文件处理部分细节，但并非全部。在解决方案中管理\
  \ ASP.NET 网站有助于管理依赖关系以及与解决方案中其他项目的关系，但最终你需要一种方法来生成网站并为其部署做准备。这正是 Web 部署项目的用武之地。\n\
  \nWeb 部署项目是 Visual Studio 的一个扩展，必须作为加载项安装。加载项安装就绪后，你可以在解决方案资源管理器中右键单击一个网站，然后单击**创建\
  \ Web 部署项目**选项，这将创建一个新项目，其中包含一个 Visual Studio 可以通过一组向导进行管理的单一`MSBuild`脚本。\n\n###\
  \ 获取 Web 部署项目的途径\n\nWeb 部署项目可以在 ASP.NET 网站(http://www.asp.net)上找到。点击顶部的**下载**链接，找到\
  \ Web 部署项目部分。这将带你到可以下载安装程序的页面。\n\n![Image 40](img/index-265_1.jpg)\n\n**262** 第\
  \ 9 章 ■ 部署\n\n##### 自动化配置更改\n\nWeb 部署项目最有用的功能是能够根据目标配置修改`Web.config`文件的内容。这是按节进行的。项目文件是一个`MSBuild`脚本，它运行一系列任务，读取你设置的参数。图\
  \ 9-1 显示了插入这些设置的对话框窗口。\n\n**图 9-1.** *配置节替换* 替换节设置对于每个配置都是唯一的。Visual Studio 中的标准项目最初只有**Debug**和**Release**配置。你可以为你的每个目标环境创建新的配置，例如\
  \ QA（质量保证）、Staging（预演）和 Production（生产）。这些独特的环境在连接字符串以及可能的其他设置上肯定有不同的值。\n\n你的替换节的源文件必须存在于正在修改的网站之下。原始的`Web.config`文件不会被更改。更新后的`Web.config`文件副本与网站的所有其他文件一起放置在输出目录中。要创建新配置，你可以从**配置管理器**中选择**新建**选项，如图\
  \ 9-2 所示。\n\n定义好所有配置后，你可以打开 Web 部署项目的**属性页**。你可以从 Web 部署项目的上下文菜单打开**属性页**。左侧的**部署**选项卡是配置节替换选项所在的位置。对于**Production**配置，你可以在网站中创建一个名为`Config`的文件夹，并在该文件夹中放置一个名为`ConnectionStrings.Production.config`的文件。然后，你可以在**属性页**中勾选复选框以启用配置节替换，并使用清单\
  \ 9-7 中所示的设置。\n\n![Image 41](img/index-266_1.jpg)\n\n第 9 章 ■ 部署 **263**\n\n**图 9-2.**\
  \ *创建新配置*\n\n**清单 9-7.** *生产环境连接字符串设置*\n```\nconnectionStrings=Config\\ConnectionStrings.Production.config;\n\
  ```\n你可以将配置文件放在网站中任何你喜欢的位置。虽然你可以使用任何你喜欢的文件扩展名，但最好使用标准的`.config`扩展名，因为它是一个受保护的扩展名：它被特别阻止，因此\
  \ Web 服务器不会将其提供给用户。保存替换节的文件内容应只包含单个节，如清单 9-8 所示。\n\n**清单 9-8.** *ConnectionStrings.Production.config*\n\
  ```xml\n<?xml version=\"1.0\"?>\n<connectionStrings>\n  <add name=\"chpt09\" connectionString=\"\
  Data Source=ProductionDB\\SQL2005;\n       Initial Catalog=Chapter09;Integrated\
  \ Security=True\"\n       providerName=\"System.Data.SqlClient\" />\n</connectionStrings>\n\
  ```\n当 Web 部署项目使用**Production**配置编译时，它将使用清单 9-8 中的内容替换`connectionStrings`节。构建完成后，你可以通过查看\
  \ Web 部署项目目录下的**Production**文件夹来确认它已被替换。它会像典型项目一样为每个配置创建一个文件夹。\n\n![Image 42](img/index-267_1.jpg)\n\
  \n**264** 第 9 章 ■ 部署\n\n另一个有用的选项是`configSource`属性，这是所有.NET 应用程序配置文件的一个功能，它允许你引用外部文件来获取节的内容。\n\
  \n这可以通过勾选文本框下方的第二个选项自动完成，如图 9-3 所示。\n\n**图 9-3.** *使用外部配置源文件* 将连接字符串设置放在`Web.config`文件之外的一个单独文件中，对于生产环境，可以让你安全地隔离连接字符串，这样你每次部署时都可以在旧副本上放置一个新的`Web.config`文件，而不会覆盖外部文件。这样做可以让你锁定`Config`文件夹，使得只有有限的用户组可以读取和修改这些文件。你可以给予运行网站工作进程的用户（通常是**Network\
  \ Service**）读取配置文件的权限，同时允许本地管理员修改这些文件。\n\n##### 构建后部署\n\nWeb 部署项目的一个缺点是，每次你想用调整后的配置创建新部署时都必须重新构建。将应用程序从\
  \ QA 移到预演，最后移到生产环境，需要为每个环境构建一次。更好的方法是构建一次，将文件放入一个放置位置，然后从那里生成你的环境特定输出。幸运的是，处理配置节替换的任务可以在\
  \ Web 部署项目之外使用，跳过每次都需要执行的构建过程。\n\n你想要用于构建后部署的任务称为`ReplaceConfigSections`。它是一个自定义的`MSBuild`任务，包含在\
  \ Web 部署项目的程序集中，位于一个名为`Microsoft.WebDeployment.Tasks.dll`的程序集中。你可以创建一个自定义的`MSBuild`脚本，并使用`UsingTask`指令包含此自定义任务。一个简单的示例如清单\
  \ 9-9 所示。这个例子看起来非常像 Web 部署项目的项目文件内容。\n\n**清单 9-9.** *构建后配置节替换*\n```xml\n<Project\
  \ DefaultTargets=\"Build\">\n  <UsingTask\n    TaskName=\"ReplaceConfigSections\"\
  \n    AssemblyFile=\"$(MSBuildExtensionsPath)\\Microsoft\\WebDeployment\\v8.0\\\n\
  \                  Microsoft.WebDeployment.Tasks.dll\"/>\n  <PropertyGroup>\n  \
  \  <DeploymentDir>$(MSBuildProjectDirectory)\\Website_deploy\\$(Configuration)\n\
  \                   </DeploymentDir>\n    <WDTargetDir>$(DeploymentDir)</WDTargetDir>\n\
  \    <ValidateWebConfigReplacement>false</ValidateWebConfigReplacement>\n    <UseExternalWebConfigReplacementFile>false\n\
  ```\n\n\n### `列表 9-10.` `多个替换节`\n\n```\n</UseExternalWebConfigReplacementFile>\n\
  \n</PropertyGroup>\n\n<ItemGroup Condition=\" '$(Configuration)' == 'Release' \"\
  >\n\n<WebConfigReplacementFiles Include=\"Config\\ConnectionStrings.Release.config\"\
  >\n\n<Section>connectionStrings</Section>\n\n</WebConfigReplacementFiles>\n\n</ItemGroup>\n\
  \n<Target Name=\"Build\">\n\n<ReplaceConfigSections\n\nRootPath=\"$(WDTargetDir)\"\
  \n\nWebConfigReplacementFiles=\"@(WebConfigReplacementFiles)\"\n\nUseExternalWebConfigReplacementFile=\"\
  $(UseExternalWebConfigReplacementFile)\"\n\nValidateSectionElements=\"$(ValidateWebConfigReplacement)\"\
  \n\n/>\n\n</Target>\n\n</Project>\n```\n\n`列表 9-9`定义了一个替换，用于`Release`配置中的`connectionStrings`节。属性`RootPath`、`WebConfigReplacementsFiles`、`UseExternalWebConfigReplacementFile`和`ValidateSectionElements`都由`PropertyGroup`和`ItemGroup`元素设置。`WebConfigReplacementsFiles`属性是一个项目集合。此示例只定义了一个节，但可以通过简单地复制现有的`ItemGroup`定义来向该集合添加更多，如`列表\
  \ 9-10`所示。\n\n```\n<ItemGroup Condition=\" '$(Configuration)' == 'Release' \">\n\
  \n<WebConfigReplacementFiles Include=\"Config\\AppSettings.Release.config\">\n\n\
  <Section>appSettings</Section>\n\n</WebConfigReplacementFiles>\n\n<WebConfigReplacementFiles\
  \ Include=\"Config\\ConnectionStrings.Release.config\">\n\n<Section>connectionStrings</Section>\n\
  \n</WebConfigReplacementFiles>\n\n<WebConfigReplacementFiles Include=\"Config\\\
  Compilation.Release.config\">\n\n<Section>compilation</Section>\n\n</WebConfigReplacementFiles>\n\
  \n</ItemGroup>\n```\n\n为了管理这些预配置部署文件的创建，您可以创建一个名为`deploy`的第二个 MSBuild 脚本来处理这些`PostBuild`任务。您可能希望将编译工作留给`build.proj`脚本，而部署工作由另一个名为`deploy.proj`的脚本处理。当项目的输出准备好时，部署脚本将使用构建脚本确保已编译`Release`版本。然后，它将该构建的输出复制到\
  \ Web 部署项目可以使用替换节设置调整`Web.config`的位置。`列表 9-11`中的完整脚本处理这些任务。\n\n### `列表 9-11.` `deploy.proj`\n\
  \n```\n<Project DefaultTargets=\"Build\"\n\n>\n\n<UsingTask\n\nTaskName=\"ReplaceConfigSections\"\
  \n\nAssemblyFile=\"$(MSBuildExtensionsPath)\\Microsoft\\WebDeployment\\v8.0\\ ➥\n\
  \nMicrosoft.WebDeployment.Tasks.dll\"/>\n\n<Import Project=\"$(MSBuildExtensionsPath)\\\
  MSBuildCommunityTasks\\ ➥\n\nMSBuild.Community.Tasks.Targets\" />\n\n<PropertyGroup>\n\
  \n< Environment Condition=\" '$( Environment)' == '' \">QA</ Environment >\n\n<Interactive\
  \ Condition=\"'$(Interactive)' == ''\">False</Interactive>\n\n<WebDeploymentDir>Website_deploy</WebDeploymentDir>\n\
  \n<SourceDeploymentDir>$(WebDeploymentDir)\\Release</SourceDeploymentDir>\n\n<DestinationDeploymentDir>$(MSBuildProjectDirectory)\\\
  Deployments\\ ➥\n\n$(Environment)</DestinationDeploymentDir>\n\n<!-- 替换设置 -->\n\n\
  <WDTargetDir>$(WebDeploymentDir)\\$(Environment)</WDTargetDir>\n\n<ValidateWebConfigReplacement>false</ValidateWebConfigReplacement>\n\
  \n</PropertyGroup>\n\n<PropertyGroup Condition=\" '$( Environment)' == '' \">\n\n\
  <UseExternalWebConfigReplacementFile>false</UseExternalWebConfigReplacementFile>\n\
  \n</PropertyGroup>\n\n<PropertyGroup Condition=\" '$( Environment)' == 'QA' \">\n\
  \n<UseExternalWebConfigReplacementFile>false</UseExternalWebConfigReplacementFile>\n\
  \n</PropertyGroup>\n\n<PropertyGroup Condition=\" '$( Environment)' == 'Staging'\
  \ \">\n\n<UseExternalWebConfigReplacementFile>false</UseExternalWebConfigReplacementFile>\n\
  \n</PropertyGroup>\n\n<PropertyGroup Condition=\" '$( Environment)' == 'Production'\
  \ \">\n\n<UseExternalWebConfigReplacementFile>true</UseExternalWebConfigReplacementFile>\n\
  \n</PropertyGroup>\n\n<ItemGroup Condition=\" '$( Environment)' == 'QA' \">\n\n\
  <WebConfigReplacementFiles Include=\"Config\\ConnectionStrings.QA.config\">\n\n\n\
  ```xml\n<Project>\n  <ItemGroup Condition=\" '$(Environment)' == 'Staging' \">\n\
  \    <WebConfigReplacementFiles Include=\"Config\\ConnectionStrings.Staging.config\"\
  >\n      <Section>connectionStrings</Section>\n    </WebConfigReplacementFiles>\n\
  \  </ItemGroup>\n\n  <ItemGroup Condition=\" '$(Environment)' == 'Production' \"\
  >\n    <WebConfigReplacementFiles Include=\"Config\\ConnectionStrings.Production.config\"\
  >\n      <Section>connectionStrings</Section>\n    </WebConfigReplacementFiles>\n\
  \  </ItemGroup>\n\n  <Target Name=\"Build\" Condition=\" !Exists('$(WebDeploymentDir)\\\
  Release') \">\n    <MSBuild Projects=\"build.proj\" Targets=\"Build\"\n        \
  \     Properties=\"Configuration=Release\"></MSBuild>\n  </Target>\n\n  <Target\
  \ Name=\"InitDeployment\" DependsOnTargets=\"Build\">\n    <Delete Files=\"$(DestinationDeploymentDir)\\\
  **\\*.*\"\n            Condition=\" Exists('$(DestinationDeploymentDir)') \"></Delete>\n\
  \    <MakeDir Directories=\"$(DestinationDeploymentDir)\"\n             Condition=\"\
  \ !Exists('$(DestinationDeploymentDir)') \"></MakeDir>\n    <CreateItem Include=\"\
  $(SourceDeploymentDir)\\**\\*.*\">\n      <Output ItemName=\"WebsiteFiles\" TaskParameter=\"\
  Include\"/>\n    </CreateItem>\n    <Copy SourceFiles=\"@(WebsiteFiles)\"\n    \
  \      DestinationFiles=\"@(WebsiteFiles->'$(DestinationDeploymentDir)\\%(RecursiveDir)%(Filename)%(Extension)')\"\
  \n          SkipUnchangedFiles=\"true\"></Copy>\n  </Target>\n\n  <Target Name=\"\
  PrepDeployment\" DependsOnTargets=\"InitDeployment\">\n    <ReplaceConfigSections\n\
  \      RootPath=\"$(DestinationDeploymentDir)\"\n      WebConfigReplacementFiles=\"\
  @(WebConfigReplacementFiles)\"\n      UseExternalConfigSource=\"$(UseExternalWebConfigReplacementFile)\"\
  \n      ValidateSectionElements=\"$(ValidateWebConfigReplacement)\" />\n    <Message\
  \ Text=\"See Output: $(DestinationDeploymentDir)\"></Message>\n  </Target>\n\n \
  \ <Target Name=\"PromptForTarget\" Condition=\"'$(Interactive)' == 'True'\">\n \
  \   <Message Text=\"Select an Environment: \"></Message>\n    <Message Text=\"1)\
  \ QA\" Importance=\"high\"></Message>\n    <Message Text=\"2) Staging\" Importance=\"\
  high\"></Message>\n    <Message Text=\"3) Production\" Importance=\"high\"></Message>\n\
  \    <Prompt Text=\" Enter a target:\">\n      <Output TaskParameter=\"UserInput\"\
  \ PropertyName=\"SelectedTarget\"/>\n    </Prompt>\n    <Message Text=\"Selected\
  \ target is $(SelectedTarget)\"></Message>\n    <MSBuild Targets=\"PrepDeployment\"\
  \n             Projects=\"deploy.proj\"\n             Properties=\"Environment=QA\"\
  \n             Condition=\"'$(SelectedTarget)' == '1'\"></MSBuild>\n    <MSBuild\
  \ Targets=\"PrepDeployment\"\n             Projects=\"deploy.proj\"\n          \
  \   Properties=\"Environment=Staging\"\n             Condition=\"'$(SelectedTarget)'\
  \ == '2'\"></MSBuild>\n    <MSBuild Targets=\"PrepDeployment\"\n             Projects=\"\
  deploy.proj\"\n             Properties=\"Environment=Production\"\n            \
  \ Condition=\"'$(SelectedTarget)' == '3'\"></MSBuild>\n  </Target>\n</Project>\n\
  ```\n\n清单 9-11 中的脚本支持三种环境：`QA`、`Staging`（预演）和`Production`（生产）。可以通过 `RunDeploy.cmd`\
  \ 运行它，该命令显示在清单 9-12 中。\n\n### 清单 9-12. RunDeploy.cmd\n\n```\n%windir%\\Microsoft.NET\\\
  Framework\\v2.0.50727\\MSBuild.exe deploy.proj /t:PromptForTarget /p:Environment=QA;Interactive=True\n\
  \npause\n```\n\n在 Windows 资源管理器中双击 `RunDeploy.cmd` 时，它将运行脚本，显示三种环境选项。你可以输入其中一个，然后它将执行任务来准备该环境。每次选择只是在调用\
  \ `PrepDeployment` 目标时为 `Environment` 属性指定了不同的值。\n\n在 `PrepDeployment` 目标运行之前，它会先运行\
  \ `InitDeployment`，后者通过 `DependsOnTarget` 属性设置为依赖项。`InitDeployment` 目标将预编译网站的内容复制到所选环境的目标目录。但在它运行之前，它也依赖于\
  \ `Build` 目标，而 `Build` 目标仅在预编译部署目录不存在时才运行。这可以防止被多次构建。`Build` 目标调用 `build.proj` 脚本，该脚本显示在清单\
  \ 9-13 中。\n\n### 清单 9-13. build.proj\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
