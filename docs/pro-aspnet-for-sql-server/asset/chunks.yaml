    With all the stored procedures in place to get, save, and delete the data, we
    can start on the data access layer, which uses all the stored procedures.


    **The Data Access Layer**


    Although the stored procedures are a critical element of the data access layer,
    many consider the real data access layer to start where the C# code begins. In
    many cases, that is true. This is the case when Typed DataSets are used to automatically
    bind table adapters to the tables in the database. But the work done in this chapter
    directly marries the C# code to the stored procedures to distribute the work in
    a way that is designed to enhance performance.


    To create a data access layer that works well with data binding, we will create
    a domain object that has a default constructor so that it can be instantiated
    declaratively with an


    8601Ch07CMP2 8/24/07 12:23 PM Page 218


    **218**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    ObjectDataSource. We will also create a business object that represents a favorite
    link. This object will encapsulate the inner workings of the data access layer
    and just expose the data to the application layer. By hiding the implementation
    details, updating future releases is easier.


    It makes it possible to rework the implementation without requiring the rest of
    the application to be updated.


    **COMMON FOLDER ADDITIONS**


    The get, save, and delete stored procedures are going to be commonly reused with
    different values. You could take a set of these stored procedures from the downloadable
    code samples and create templates for yourself and add them to your Common folder
    in the Templates folder (D:\Projects\Common\Templates\ Data Access Layer). Starting
    with these templates should save you time when putting together your data access
    layers.


    Creating the Class Library


    The data access layer should be reusable, and the first step to making it so is
    placing it in a class library. The alternative is to include the data access layer
    directly within your application.


    In the case of a Website Project, you would place the classes in the App_Code
    folder. Doing so does not allow any other projects to use those classes as a dependency.
    Our goal will be to treat the data access layer as an internal release that is
    used by multiple applications even if it is initially going to be used by only
    a single website. Doing so does not require much additional effort and helps keep
    the priorities of the application and the data access layer separate.


    The organization of this project should already include the Database Project as
    a part of a solution. Now a class library can be added to the solution to hold
    onto the Data Access Library.


    I prefer to give the projects generic names, so the Database Project is named
    Database, and the class library is simply called ClassLibrary. This simplifies
    the scripting that will be covered in Chapter 8 because a nearly identical MSBuild
    script can be used across multiple solutions with minimal adjustments. Naturally,
    as the ClassLibrary project takes on a significant number of features, it can
    be broken into multiple class libraries. With proper use of namespaces, it should
    be simple enough to redistribute the namespaces across multiple class libraries
    with minimal impact on the applications using the libraries. In fact, in the properties
    panel for the class library, the value for the Default Namespace should be set
    to the name of the application, and classes should be added to folders within
    the project. For this chapter, the value of the Default Namespace is Chapter07,
    while all of the code for the data access layer will go into a folder called Domain.
    The namespace automatically set when creating new classes will be Chapter07.Domain.


