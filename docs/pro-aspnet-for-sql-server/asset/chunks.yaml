- fmt: 'Because the `enableAutoUpdates` attribute is optional, you can leave it off
    if you want to use the default value, which is set to `True`. Now you can configure
    as many connection strings as you like and point to the one you choose with this
    custom configuration section while enabling and disabling this automatic update
    feature.


    A potential enhancement for the database update process is to define a separate
    connection string name for the update process, which is separate from the rest
    of the data access layer. The update scripts will need privileges that a normal
    web application does not need, so instead of escalating the rights for the entire
    application, you can define a special connection with the necessary permissions.
    This will improve the security of your application. To improve it further, you
    can enable the user account for this special connection just during the deployment
    process and disable it once you have completed. Doing so will ensure it is not
    possible to run the updates and block access to the account with the increased
    privileges.


    ## Summary


    In this chapter, I covered deploying websites and databases, and how to make use
    of custom configurations. By streamlining the deployment and configuration processes,
    you make it possible to push out more updates for your applications with a lower
    risk for each deployment because human error has been minimized by the scripts.
    Being able to push out timely updates will be very helpful to adapt to the performance
    needs of your production environment. The automation tasks covered in this chapter
    will also free up more of your time to spend on performance improvements instead
    of the busy work of pushing around files.


