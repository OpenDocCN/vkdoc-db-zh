    ## User Control Implementation


    `TypeName="Chapter04.PersonDomain"></asp:ObjectDataSource>` What is interesting
    here is that the `Country` property on the user control can be bound to the `Country`
    value just like the `Label` control, which is a standard ASP.NET control. When
    the data is bound to `Repeater1`, it automatically sets the `Country` property
    on `CityListingControl1`.


    And this all happens without any additional code in the code-behind. Listing 4-14
    shows the city listing control.


    **Listing 4-14.** *CityListingControl.ascx*


    ```xml

    <%@ Control Language="C#" AutoEventWireup="true"


    CodeFile="CityListingControl.ascx.cs" Inherits="Controls_CityListingControl" %>


    <asp:Repeater ID="Repeater1" runat="server" DataSourceID="ObjectDataSource1">


    <HeaderTemplate>


    <ul>


    </HeaderTemplate>


    <ItemTemplate>


    <li>


    <asp:Label ID="Label1" runat="server"


    Text=''<%# Bind("City") %>''></asp:Label><br />


    </li>


    </ItemTemplate>


    FooterTemplate>


    </ul>


    </FooterTemplate>


    </asp:Repeater>


    <asp:ObjectDataSource ID="ObjectDataSource1" runat="server"


    OldValuesParameterFormatString="original_{0}"


    SelectMethod="GetCitiesByCountry"


    TypeName="Chapter04.PersonDomain"


    OnSelecting="ObjectDataSource1_Selecting">


    <SelectParameters>


    <asp:Parameter Name="country" Type="String" />


    </SelectParameters>


    </asp:ObjectDataSource>

    ```


    This user control also makes use of a `Repeater` to list all of the data in a
    bulleted list. In this case, it is all of the cities in the selected country.
    In the code-behind, shown in Listing 4-15, a little bit of code is put in place
    to wire together the parent user control to bind the data.


    **Listing 4-15.** *CityListingControl.ascx.cs*


    ```csharp

    protected void ObjectDataSource1_Selecting(


    object sender, System.Web.UI.WebControls.ObjectDataSourceSelectingEventArgs e)


    {


    e.InputParameters["country"] = Country;


    }


    private string _country;


    public string Country


    {


    get {


    return _country;


    }


    set {


    _country = value;


    ObjectDataSource1.DataBind();


    }


    }

    ```


    You could theoretically go many levels deeper, perhaps listing the people who
    live in each city by following this same pattern of passing properties into the
    user control to be bound as an input parameter. And doing so completely encapsulates
    the behavior of each user control.


    ### Beware of Recursive Data Binding


    Be sure to bind just the `ObjectDataSource` and not the entire user control when
    the properties are set.


    Rebinding the user control will cause an infinite recursive loop on the property
    as the user control repeatedly binds the data over and over.


    ## ViewState and Databinding


    When working with databinding, you will be using `ViewState` extensively as a
    part of the postback model. All of the data that is bound to a control, such as
    a `GridView`, is held in `ViewState`.


    By default, the data is serialized to a string, encrypted, and included in the
    page as a hidden input field. When a postback occurs, the value from the hidden
    field is decrypted and deserialized. The postback process then attempts to reset
    the control values with this data. By using the `ViewState` to redraw a databound
    control, you avoid going back to the database to get all of the necessary data.
    On a typical page, you may have several databound controls that will make use
    of this `ViewState`. In the case of a `GridView`, you could click one of the pager
    links to change the selected index, which will cause new data to be pulled from
    the database. While that happens, the other databound controls will simply use
    the `ViewState` data to redraw themselves. It is a pretty efficient model if you
    compare it to other solutions that would need to rebind all of the data from the
    database with each page request.


    However, using `ViewState` does mean that when a page displays a large set of
    data, the `ViewState` data held in the hidden input field is also large. It is
    also a duplication of the displayed data held inside of an encrypted string to
    preserve the integrity of the data. So while you reduce the number of trips to
    the database during postbacks, you cause the page load time to increase, which
    may be just as much of a performance penalty for users who have a limited-bandwidth
    connection to your web application. Such users could be using a modem or mobile
    connection that does not offer high-speed access. They could also be sharing a
    high-speed connection with everyone in their office, which degrades the speed
    of their access.


    In any case, you want to make your page load times as fast as possible by reducing
    the size of the page. When `ViewState` becomes large, you will want to consider
    ways to reduce the size.


    ### Page Size and Load Time


    Jakob Nielsen, a leader in web usability, notes on his website that a user connected
    to the Internet with a modem will take ten seconds to load a page that is just
    34 KB (http://www.useit.com/alertbox/sizelimits.html). For a Cable/DSL connection,
    it would take one second to load a 100KB page. It is easy for a data-heavy page
    to go well beyond 100 KB, so high-speed users may still wait two to five seconds
    for your pages to load. Cutting the `ViewState` could save a few seconds for those
    high-speed users and much more for any user on a slower connection. Of course
    these delays are extended by the time to prepare and start sending a response
    to a user.


    ## Session and ViewState


    You can change how `ViewState` is persisted to avoid placing all of this extra
    data in the page.


    ASP.NET 2.0 introduced the option to store `ViewState` in the `Session` instead
    of the hidden input field. You just have to override the `PageStatePersister`
    property to return either the `HiddenFieldPagePersister`, which is the default,
    or the `SessionPageStatePersister`. An example is shown in Listing 4-16.


    **Listing 4-16.** *PageStatePersister Set to Use the Session*


    ```csharp

    protected override PageStatePersister PageStatePersister


    {


    get


    {


    return new SessionPageStatePersister(Page);


    }


    }

    ```


    The implementation for `SessionPageStatePersister` places a `Guid` value into
    the hidden input field in place of all the encrypted data and places the actual
    data into the user’s `Session`.


    When a postback occurs, the `Guid` value is used to look up that data. This data
    is limited to a rotating queue that holds only the last ten pages of data. And
    while this reduces the page size, the limitation of placing it in the `Session`
    presents a few problems.


    The clear problem is that if the data is removed from the `Session`, a postback
    will throw an exception. This can happen if the user’s `Session` expires after
    the default time-out of 20 minutes. When a user’s `Session` expires, the `Session`
    is abandoned on the server along with the server-side `ViewState`. If a user steps
    away for that time period, returns, and then clicks a button causing a postback,
    that user will see the exception. You may consider bumping up the `Session` time-out
    to eight hours, but doing so will cause more memory to be used on the server.


    If you retain the `Session` state for all users who visit your website in that
    eight-hour period, you may struggle with the amount of memory that is required.


    Users could also open two browser windows while using your web application. They
    click around in one window for a while and then move to the other window and click
    some more, causing postbacks as they do so. If they go beyond the ten-click limit
    and return to the other window and cause a postback, they will get the state exception.
    Fortunately, this feature can be enabled on a page-by-page basis. If your website
    has a limited set of data-intensive pages, you could set them to use the `SessionPageStatePersister`
    while the rest of the pages use the default functionality.'
