    A Sample Application


    Now you can put together several of the pieces covered throughout this book to
    create a flexible and high-performance application. Your goal will be to build
    a modular application that starts with a clean data access layer and has each
    business object clearly defined in terms of its data contained within each domain
    as well as the relationships between the objects.


    This chapter covers the following:


    - Understanding performance and scalability

    - Creating the database

    - Creating data access providers

    - Managing relationships

    - Using custom configuration

    - Implementing a LINQ provider

    - Implementing a WCF provider


    In all of the previous chapters, the implicit rule for creating a high-performance
    application has been that good design and flexibility are more important than
    prematurely optimizing your application. Until you have a finished product that
    is put under an actual load, you will not really know where you will experience
    performance problems. And load can change over time in unexpected ways. If you
    start to optimize for performance too soon in the development cycle, you may lock
    yourself into an approach that just does not scale.


    ### Understanding Performance and Scalability


    It is important to distinguish between performance and scalability. The two are
    related but not one in the same. As your website becomes more heavily used, it
    will need to handle more and more requests, and it will need to do so without
    the cost of each request increasing. If you start out with 1,000 users, and each
    request is handled in under a second, you will want that level of service to be
    maintained when you reach 100,000 users. If you start out with a website that
    already has great performance, you may never have a scaling problem. But there
    could come a point when the cost per request does start to increase, and you will
    need to apply the approaches in this chapter to get you back to the level of service
    that kept those initial 1,000 users happy.


    In Chapter 6, I mentioned how you can often be your own worst enemy by hitting
    the database so often that you essentially cause a traffic jam of disk reads against
    the database.


