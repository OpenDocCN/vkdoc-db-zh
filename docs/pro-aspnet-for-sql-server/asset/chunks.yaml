    You can tune your tables and queries all you like, but if the page is 300 KB and
    many of your users are still using dial-up or even low-end broadband speeds, they
    will find that your website is slow. In contrast, most major news sites and information
    portals are under 30 KB. In the following examples, the ViewState issue will be
    addressed and resolved with a simple strategy.


    ■**Note** The time to transfer data is just one aspect of a slow web page. Large
    tables with many rows and cells add to the rendering time for a web page. If it
    takes less than a second to load the data for a page, it can still take a few
    more seconds for the web page to render a complex table.


    It would be much more efficient to ask that the database return only the range
    of items that will be displayed, rather than have the database return all possible
    items. When only ten rows are shown, it is wasteful to transfer thousands of rows
    from the database to the web application.


    Fortunately, we can request just that subset, but we will need a new stored procedure
