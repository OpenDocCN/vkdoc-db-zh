- fmt: "Finally, the contents of the prepared output directory can be wrapped up into\
    \ a zip file, which can be moved to the destination environments more easily than\
    \ a large set of files. This can be done with the `Zip` task, which is a part\
    \ of the MSBuild Community Tasks. First you need to define the name of the zip\
    \ file in the default `PropertyGroup`, as shown in Listing 9-15.\n\n**Listing\
    \ 9-15.** `ZipFilename` Defined\n\n```xml\n<ZipFilename>$(MSBuildProjectDirectory)\\\
    Deployments\\$(Configuration).zip</ZipFilename>\n```\n\nThen the `Zip` task can\
    \ be added to the end of the `PrepEnvironment` target. The `Zip` task declaration\
    \ is shown in Listing 9-16.\n\n**Listing 9-16.** `Zip` Declaration\n\n```xml\n\
    <CreateItem Include=\"$(DestinationDeploymentDir)\\**\\*.*\">\n    <Output ItemName=\"\
    ZipFiles\" TaskParameter=\"Include\"/>\n</CreateItem>\n\n<Zip Files=\"@(ZipFiles)\"\
    \n     ZipFileName=\"$(ZipFilename)\"\n     WorkingDirectory=\"$(DestinationDeploymentDir)\"\
    \ />\n```\n\nThe result is a zip file containing all of the files for the website\
    \ with the modified configuration file. If the web server is located at a remote\
    \ hosting facility, you can upload the zip file to the server and unzip it in\
    \ place without any additional work needed.\n\n## COMMON FOLDER ADDITIONS\n\n\
    The MSBuild scripts in this chapter are very reusable in your projects. Using\
    \ them will cut down on the manual work you do with each project and will capture\
    \ the details that you must know to build a project. These scripts can be placed\
    \ in your `Common` folder in the `Scripts` subfolder to be referenced in your\
    \ projects (`D:\\Projects\\Common\\Scripts\\MSBuild`).\n\n## Deploying the Database\n\
    \nAs each release of your web application is pushed to the various environments,\
    \ there may be updates to the database that are necessary for the application\
    \ to work properly. Perhaps an additional column was added to a table or a new\
    \ stored procedure was defined. If the updated website calls that stored procedure,\
    \ the database must be updated before the new application version is put into\
    \ use. All you may need to do to bring the database structure up to the current\
    \ version is create a few `alter` statements. I will show you what it takes to\
    \ create those update scripts and how they can be deployed with minimal effort.\n\
    \n### Generating Change Scripts\n\nSQL Server Management Studio can assist with\
    \ creating change scripts. Once you have created all of your tables and populated\
    \ them with data, you can change the structure with `alter` statements. You can\
    \ do so manually in a query window or visually with SQL Server Management Studio.\
    \ To change a table, simply right-click the table in the Object Explorer and select\
    \ `Modify` from the context menu. The table editor will show all of the columns.\
    \ Make your changes, and when you are done, you can click the `Generate Change\
    \ Script` button.\n\nAdjusting a column from `varchar(25)` to `varchar(50)` will\
    \ generate a script that will create a new temporary table with the revised table\
    \ definition and then copy all of the data from the existing table into it. Then\
    \ it will drop the existing table and rename the temporary table to the name of\
    \ the table that was just dropped. These steps are all done inside of a transaction\
    \ that is committed once all of the steps have completed successfully. For a significant\
    \ amount of data, this update can take a while to complete. This script is also\
    \ pretty large compared to what it could be if you were to simply write the `alter`\
    \ statements manually. The equivalent result can be achieved with the script shown\
    \ in Listing 9-17.\n\n**Listing 9-17.** Alter Script\n\n```sql\nBEGIN TRANSACTION\n\
