    Connecting the data to the website means connecting the providers to the pages
    and controls.


    As I have covered frequently, the ObjectDataSource will act as a bridge to bring
    these two parts together. But there is one additional step required because an
    ObjectDataSource requires a default constructor on the type it uses to populate
    the databound control with data items.


    Because the providers are initialized without a default constructor, we will need
    to create a proxy class.


