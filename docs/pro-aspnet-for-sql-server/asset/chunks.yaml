    290


    C H A P T E R 1 0 ■ A S A M P L E A P P L I C AT I O N


    The frequent reads cause a traffic jam on the network as well, which doubles and
    triples the time to process a request. Such a high-load scenario causes the cost
    of each request to increase dramatically. For a computer, a second can be an eternity.
    And when many of the requests that come into your website are processed in well
    under a single second during normal load, you can imagine that setting a caching
    time-out to five seconds would affect the scalability of your application, even
    if a user may not see any change in performance. You eliminate calls to the database
    while also saving clock cycles on your processor. Setting a caching time-out is
    a great first step that will take you a long way.


    A typical website can get anywhere between 5,000 and 100,000 page requests in
    a day.


    With 86,400 seconds in a 24-hour period, you can see in Table 10-1 how page requests
    can generally be spread apart.


    **Table 10-1.** Time Between Requests


    | Requests per Day | Time Between Requests |

    | :--- | :--- |

    | 5,000 | 16.78 seconds |

    | 100,000 | 0.86 seconds |

    | 500,000 | 0.17 seconds |


    Table 10-1 is an overly simplistic representation of website traffic, but it illustrates
    the difference between performance and scalability. When a website is getting
    only 5,000 hits in a day, it is not important to address scalability, especially
    when a single request takes less than a second. If a website gets 100,000 hits
    in a day, the average time between requests drops below one second, but the time
    between requests is still over half a second. You still have a little time between
    requests, so you will not have concurrent requests. The difference between 100,000
    hits and 5,000 hits represents a huge window, and I assume most sites, especially
    intranet web applications, fall into this range. Now, when a website reaches 500,000
    hits or more, scalability becomes a major issue. When traffic to your web application
    reaches this frequency, you will want to explore your options to spread the load
    somehow.


    ### Concurrent Requests


    The intersection where performance meets scalability occurs when the number of
    concurrent requests starts to increase the cost per request. If ten requests are
    currently being processed, and each of them locks a commonly used table in the
    database—even for just a moment—the requests may be delayed and their cost increased.
    But if each request can access the database efficiently, without interfering with
    the other requests, you will have the scalability that you want.


    A frequently requested page on your website may not explicitly be locking a table.
    It may instead be indirectly locking an index during an update that you did not
    anticipate. We typically expect indexes to improve performance, but sometimes
    they can have the opposite effect. When you come across concurrency issues, you
    may be able to consult your DBA to determine what resource is being locked. If
    an index is involved, you may need to use a different type of index or drop the
    index entirely so that your concurrency problems go away. You may also be able
