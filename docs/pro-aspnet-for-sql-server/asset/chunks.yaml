    The first attribute that you should notice is the ServiceKnownType. By adding
    these attributes, the WSDL output will generate the data necessary to define these
    objects so they can be passed through the service. By explicitly declaring these
    types, the service will be able to pass these objects around safely. Then each
    method that is meant to be a part of the service is marked with the OperationContract
    attribute.


