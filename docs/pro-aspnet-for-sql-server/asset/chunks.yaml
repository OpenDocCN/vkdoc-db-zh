    \ [chpt02_Person] SET [FirstName] = @FirstName, [LastName] = @LastName, [BirthDate]\
    \ = @BirthDate, [LocationId] = @LocationId WHERE [PersonId] = @PersonId\">\n \
    \       <InsertParameters>\n            <asp:Parameter Name=\"FirstName\" Type=\"\
    String\" />\n            <asp:Parameter Name=\"LastName\" Type=\"String\" />\n\
    \            <asp:Parameter Name=\"BirthDate\" Type=\"DateTime\" />\n        \
    \    <asp:Parameter Name=\"LocationId\" Type=\"Int64\" />\n        </InsertParameters>\n\
    \        <UpdateParameters>\n            <asp:Parameter Name=\"FirstName\" Type=\"\
    String\" />\n            <asp:Parameter Name=\"LastName\" Type=\"String\" />\n\
    \            <asp:Parameter Name=\"BirthDate\" Type=\"DateTime\" />\n        \
    \    <asp:Parameter Name=\"LocationId\" Type=\"Int64\" />\n            <asp:Parameter\
    \ Name=\"PersonId\" Type=\"Int64\" />\n        </UpdateParameters>\n        <DeleteParameters>\n\
    \            <asp:Parameter Name=\"PersonId\" Type=\"Int64\" />\n        </DeleteParameters>\n\
    \    </asp:SqlDataSource>\n</asp:Content>\n```\n\n## 48\n"
- fmt: '# CHAPTER 2 ■ DATA MODEL CHOICES


    The first concern I always have is that instantly you have inline SQL, right in
    the application layer, directly in a page. And as easy as that SQL was to create,
    it is not that easy to update it for changes later, which will eventually trip
    you up unless the database never changes or you understand everything that has
    just been generated. It is easy to imagine that the `Person` table would eventually
    have more columns (for example, for the middle initial and gender). And if the
    table started with just a `Name` column and was split into `First Name` and `Last
    Name`, you would need to make some changes to the SQL shown in Listing 2-7; otherwise,
    that SQL would be invalid.


    The `SqlDataSource` in Listing 2-7 has a `Refresh Schema` command on the Smart
    Tag, but it really is not as capable as you might hope. Changing `Last Name` to
    `Surname` will cause an error when you refresh the schema. And adding a new column
    for the `Middle Initial` will not add the new column to the `Select` and other
    commands. To make those adjustments, you have to choose the other option on the
    Smart Tag, `Reconfigure Datasource`. And when this is done, there are consequences
    with the `GridView`, such as resetting the columns that you may have already customized
    considerably and will not want changed by the automatically generated changes.
    With all of this in mind, it is best to leave this quick-and-dirty way of data
    binding to prototyping new ideas and adjust to use a more maintainable and architecturally
    sound approach as a project moves past the early stages. Fortunately, the fast
    prototypes created with an inline query by using an `SqlDataSource` can be replaced
    with an `ObjectDataSource` later, as the prototype starts to become the actual
    application. The columns produced by the `ObjectDataSource` simply have to match
    the columns from the `SqlDataSource`, while your `GridView` can remain unchanged.


    ## Nontrivial Data Examples


    In real-world applications, the trivial examples get you only so far, and soon
    you are required to work with more than one table at a time. Adding data from
    more than one table to be shown as well as edited in a `GridView` or other databound
    control enters into the space of the nontrivial example.


    In the sample `Person` database, the `Person` table has a relationship with the
    `Location` table through the `LocationId`. And in the `Location` table, the `City`
    and `Country` values define the location where the person lives. When displaying
    a `GridView` of all the people in the database, it will be much more intuitive
    to show the city and country instead of the `LocationId`. The `chpt02_GetAllPeople`
    stored procedure shown previously pulls these values together so they can be used
    as if they were in just a single table in the database from the application’s
    point of view. Unfortunately, you cannot drag a stored procedure from the Server
    Explorer window onto the design surface of a Web Form as you can with the tables.
    Instead, you must drag a `GridView` from the Toolbox and configure it with a datasource.
    When configured as an `SqlDataSource`, the stored procedure can be selected, but
    the `Insert`, `Update`, and `Delete` commands will not be offered as options in
    the datasource wizard. It is still possible to get all the features of the single
    table example in the previous sections, but providing all the features that a
    `GridView` needs will require more than just this one stored procedure configured
    with a Typed DataSet. An example of how to do this is covered in detail in Chapter
    3.


    ## Typed DataSet


    Starting with the basic stored procedure in Listing 2-6, you can build a customized
    Typed DataSet. You simply go to the class library project you have prepared to
    act as your data access layer and add a DataSet to it called `PersonDataSet.xsd`.
    Then add a TableAdapter and follow the steps provided by the wizard to add the
    existing stored procedure defined here. You then rename the `DataTable` and `TableAdapter`
    to more user-friendly names such as `People` and `PeopleTableAdapter` in an attempt
    to make the code that is generated with the Typed DataSet better resemble the
    object it is meant to represent. Figure 2-4 shows what the `People` Typed DataSet
    looks like, and Figure 2-5 shows the properties from the `FillAllPeople` method.


    **Figure 2-4.** People Typed DataSet


    **Figure 2-5.** FillAllPeople properties


    This Typed DataSet is defined as a part of a class library. With the website set
    to use this class library as a dependency, run the build for the website to ensure
    that the current assemblies used by the website have this newly created Typed
    DataSet. After the dependency is compiled, it is copied automatically into the
    `bin` directory of the website and is ready to be used in a Web Form. Simply drag
    a `GridView` control onto the design surface. Then use the Smart Tag to choose
    a datasource. Select a new `ObjectDataSource`. The available options will show
    the `PeopleTableAdapter` as it was named earlier. Set the select method to the
    `GetAllPeople` method. After the `ObjectDataSource` is set, you can return to
    the `GridView` and open the Smart Tag to enable paging and sorting. Now try out
    the page by right-clicking the page in the Solution Explorer and selecting `View
    in Browser`.


    You may be pleasantly surprised that the page loads in a reasonable time and provides
    the sorting and paging functionality that you expect. The Typed DataSet also does
    a great job of cutting down the size of the `ViewState`. It is no wonder that
    the approach I’ve just described is strongly encouraged by `MSDN` documentation.
    However, this solution is not the only option or even the best option for all
    scenarios. Next you will explore a few alternatives.


    ## RIGID TYPED DATASETS


    When a Typed DataSet is put together on the XML Schema Definition (`XSD`) designer,
    it reads in all the schema information from the database and hard-codes the names
    of all the columns as well as the types and exact sizes. Changing a `VARCHAR(10)`
    to `VARCHAR(11)` can break the Typed DataSet. As soon as a record that is 11 characters
    long is inserted into the data and the Typed DataSet comes across this data, it
    will throw an exception due to the size constraint. If you are not careful, this
    problem could go unnoticed until it is pushed into a production environment and
    discovered at the worst time. To head off the problem, the updated column definition
    can be adjusted in the Typed DataSet manually in the Properties panel.


    ## Nontyped DataSet


    The Typed DataSet used in the previous section was built with an `XSD` file, which
    defines the various properties of the `DataTable`s and `TableAdapter`s. This is
    a fairly rigid model because the `XSD` file is edited primarily by using Visual
    Studio and the visual Typed DataSet Designer.


    It also locks in the database schema, which will most likely change over the life
    of a project. It can be helpful to use a more flexible option.


    The stored procedure used by the Typed DataSet can be run directly to get the
    same columns that will generate a compatible `DataSet` at runtime. Instead of
    the columns redundantly being defined by the Typed DataSet and the stored procedure,
    they can be defined by just the stored procedure.'
