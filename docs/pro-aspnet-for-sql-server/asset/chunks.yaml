    data as the other two options, but unfortunately you will discover that the paging
    functionality does not work with the DataReader in its current form. Some changes
    must be made to allow for paging as well as sorting.


    **DataObject**


    These examples are all using the new DataObject introduced with .NET 2.0\. With
    a Typed DataSet, the generated classes are marked as DataObjects and each of the
    methods are marked as one of the enumerations of DataObjectMethodType. One useful
    point about the DataObject and how databound controls work is that you can return
    a Typed DataSet, Nontyped DataSet, a DataReader, or a collection of Person objects
    as long as the column names or properties give the databound controls the values
    and types it is configured to use.


    8601Ch02.qxd 8/29/07 5:00 PM Page 54


    **54**


    C H A P T E R 2 ■ D ATA M O D E L C H O I C E S


    In fact, you can change the PersonDomain method returning a DataSet to return
    a collection of Person objects with properties called FirstName, LastName, BirthDate,
    City, and Country as they are defined by the stored procedure. The GridView will
    happily bind those properties just as easily as it would named columns on the
    DataSet.


    **What’s the Downside?**


    Each of the approaches discussed in this chapter has a common shortcoming. Every
    time the page is displayed, the full set of data is pulled from the database—even
    if only ten rows are sent to the web client. When the database server is on the
    same machine as the web server, this is not a major issue. However, if the database
    server is on a different machine, especially when there is a very large amount
    of data, the time to transfer all that data will be a critical concern. Cutting
    down on the data moved from the database to the application is one of the optimizations
    we will explore in the next chapter.


    **Summary**


    This chapter covered the various choices available in the .NET framework for working
