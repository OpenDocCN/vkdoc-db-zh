    C H A P T E R 4 ■ D ATA B O U N D C O N T R O L S


    This limited set of values should be quite small when they are persisted. You
    may notice the value in the hidden input field where ViewState is placed normally
    is not empty even though you may have disabled ViewState for the entire page.
    The reason it is not empty is that ControlState is using the same space as ViewState
    with hopefully much less space. Loading the ControlState is shown in Listing 4-46.


    **Listing 4-46.** *LoadControlState Method*


    protected override void LoadControlState(object savedState)


    {


    _pageIndex = 0;


    object[] objArray = savedState as object[];


    if (objArray != null)


    {


    InitializePagerControls();


    base.LoadControlState(objArray[0]);


    if (objArray[1] != null)


    {


    _pageIndex = (int) objArray[1];


    }


    if (objArray[2] != null)


    {


    _totalRowsCount = (int)objArray[2];


    }


    if (objArray[3] != null)


    {


    _itemCount = (int)objArray[3];


    }


    if (objArray[4] != null)


    {


    _previousLinkButton.CommandArgument = (string)objArray[4];


    }


    if (objArray[5] != null)


    {


    _nextLinkButton.CommandArgument = (string)objArray[5];


    }


    }


    else


    {


    base.LoadControlState(null);


    }


    }


