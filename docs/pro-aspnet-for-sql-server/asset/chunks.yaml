    \n数据库更新可以直接集成到您的应用程序中，方法是将脚本与其余数据访问层一起嵌入到程序集中。最初使用应用程序时，可以初始化数据库，应用程序的未来版本可以使用嵌入的脚本更新现有的数据库架构。这一切都将是自动且透明的。\n\
    \n升级网站可能就像复制新程序集一样简单，这会自动重启工作进程。数据库更新将自动应用。\n\n此类功能不是 ASP.NET 的自动特性，但可以使用应用程序中可用的构建块来实现。对于以下示例，您将创建一个表来保存名称。初始化脚本将创建一个用于跟踪数据库架构的架构版本表。然后将有一系列更新脚本。每个版本都可以添加额外的更新脚本。\n\
    \n### 初始化数据库\n\n首先，像在数据库项目中通常做的那样创建架构版本表。此表包含一个名称和一个整数作为版本。每个更新成功执行后，版本将设置为下一个版本。清单\
    \ 9-21 显示了架构版本表的创建脚本。\n\n**清单 9-21.** `chpt09_SchemaVersions.sql`\n```sql\nIF\
    \ EXISTS (\n  SELECT * FROM sysobjects WHERE type = 'U' AND name = 'chpt09_SchemaVersions')\
    \ BEGIN\n  DROP Table chpt09_SchemaVersions\nEND\nGO\nCREATE TABLE [dbo].chpt09_SchemaVersions\
    \ COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n  [Version] [smallint] NOT NULL,\n\
    \  CONSTRAINT [PK_chpt09_SchemaVersions] PRIMARY KEY CLUSTERED ([Name] ASC)WITH\
    \ (PAD_INDEX = OFF, IGNORE_DUP_KEY = OFF) ON [PRIMARY]\n) ON [PRIMARY]\nGO\n```\n\
    \n`Name` 列是主键。对于嵌入式脚本，将只有一个名为 `names` 的架构。此结构可以支持任意数量的其他架构，这些架构都可以独立进行版本控制。将数据库中保存的所有数据分解为不同的命名架构将有助于隔离更新，从而简化更新脚本。\n\
    \n该架构表使用两个存储过程来获取和设置架构版本。清单 9-22 显示了设置命名架构版本的脚本。\n\n**清单 9-22.** `chpt09_SetSchemaVersion.sql`\n\
    ```sql\nIF EXISTS (\n  SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt09_SetSchemaVersion')\
    \ BEGIN\n  DROP Procedure chpt09_SetSchemaVersion\nEND\nGO\nCREATE Procedure dbo.chpt09_SetSchemaVersion\n\
    (\n  @Name nvarchar(20),\n  @Version smallint\n)\nAS\nIF NOT EXISTS (\n  SELECT\
    \ * FROM chpt09_SchemaVersions WHERE Name = @Name\n)\nBEGIN\n  INSERT into chpt09_SchemaVersions\
    \ ([Name],Version) values (@Name, @Version)\nEND\nELSE\nBEGIN\n  UPDATE chpt09_SchemaVersions\
    \ SET Version = @Version WHERE [Name] = @Name\nEND\nGO\nGRANT EXEC ON chpt09_SetSchemaVersion\
    \ TO PUBLIC\nGO\n```\n\n设置版本是一个简单的过程，要么插入，要么更新架构版本表。获取架构版本需要一个类似的过程。获取命名架构版本的脚本如清单\
    \ 9-23 所示。\n\n**清单 9-23.** `chpt09_GetSchemaVersion.sql`\n```sql\nIF EXISTS (\n\
    \  SELECT * FROM sysobjects WHERE type = 'P' AND name = 'chpt09_GetSchemaVersion')\
    \ BEGIN\n  DROP Procedure chpt09_GetSchemaVersion\nEND\nGO\nCREATE Procedure dbo.chpt09_GetSchemaVersion\n\
    (\n  @Name nvarchar(20),\n  @Version smallint OUTPUT\n)\nAS\nIF EXISTS (\n  SELECT\
    \ * FROM chpt09_SchemaVersions WHERE Name = @Name\n)\nBEGIN\n  SET @Version =\
    \ (SELECT Version FROM chpt09_SchemaVersions WHERE Name = @Name)\nEND\nELSE\n\
    BEGIN\n  SET @Version = 0\nEND\nGO\nGRANT EXEC ON chpt09_GetSchemaVersion TO PUBLIC\n\
    GO\n```\n\n命名架构的版本作为输出参数返回。如果命名架构不存在，则版本默认为 0；否则返回实际值。\n\n### 更新数据库\n\n有了架构表和存储过程后，您可以将脚本作为嵌入式脚本复制到类库中。只需在类库中创建一个名为\
    \ `Scripts` 的文件夹。要添加新的 SQL 脚本，您需要将其作为简单的文本文件添加，但可以将扩展名设置为 `.sql`。"
- fmt: '当打开`.sql`文件时，它将被视为SQL脚本。对于第一个脚本，你需要创建`SchemaVersion`表和两个用于获取和设置版本号的存储过程。定义这些资源的三个脚本内容将按顺序放置在一个名为`init.sql`的脚本中。第一个脚本是建表脚本，它将被修改以移除开头检查模式表是否存在的部分。这里需要采取额外的预防措施：如果该表已存在，并且此初始化脚本被运行，你希望它在尝试创建第一个表时立即失败。


    为了确保此脚本被包含在程序集中，你需要通过如图9-7所示的属性面板将其“生成操作”设置为“嵌入的资源”。此设置使其作为资源流在程序集中可用。（稍后你将作为资源流加载该脚本。）**图9-7.**
    *作为嵌入资源的`init.sql`*


    接下来，你将创建一些示例脚本，这些脚本将作为更新运行以测试更新例程的功能。这些脚本将放置在类库的`Scripts`文件夹中，并设置为嵌入资源。它们将被命名为`NamesUpdate.00.sql`、`NamesUpdate.01.sql`和`NamesUpdate.02.sql`。第一个脚本定义`names`表和存储过程。第二个脚本添加三个名字，第三个脚本再添加一个名字。这些脚本可以轻松地调整表列、添加或删除索引，或执行任何你希望它们完成的操作。


    关于这些嵌入脚本有两个重要细节。首先，所有命令后都使用`GO`语句分隔。这样做是为了使命令可以作为独立的SQL命令，通过企业库中的数据访问块来运行，就像你在前面章节中对存储过程所做的那样。其次，更新脚本应始终将数据库版本设置为下一个数字。这在所有其他命令成功运行后在末尾完成。然而，顺序并非严格必要，因为这些命令将作为一个事务分组执行，因此如果任何命令失败，更新脚本中的所有更改都将被撤销。清单9-24展示了`NamesUpdate.01.sql`。


    **清单9-24.** *NamesUpdate.01.sql*


    ```sql

    -- update 1 (add stooges to names table)

    EXEC chpt09_SaveName ''Larry''

    GO

    EXEC chpt09_SaveName ''Moe''

    GO

    EXEC chpt09_SaveName ''Curly''

    GO

    -- be sure to update the names schema version

    EXEC chpt09_SetSchemaVersion ''names'', 2

    GO

    ```


    每个名字都使用由第一个更新脚本`NamesUpdate.00.sql`（此处未展示，参见代码下载）创建的`chpt09_SaveName`存储过程添加。你可以看到每个命令如何以`GO`语句结束，最后一个语句将`names`模式的模式版本设置为2。


    ### 运行脚本


    嵌入在程序集中的脚本现在已准备好使用一个名为`DatabaseManager`的类来加载和运行。该类与更新脚本位于同一个类库中，其默认命名空间设置为`Chapter09`——这是在加载脚本作为资源流时的一个重要细节。文件夹结构也很重要，应如图9-8所示。


    为了引用脚本，你将使用一个前缀，类似于命名空间。这个前缀在`DatabaseManager`类中定义为常量，如清单9-25所示。


    **图9-8.** *类库结构*


    **清单9-25.** *ScriptsPrefix常量*


    ```csharp

    private const string ScriptsPrefix = "Chapter09.Database.Scripts.";

    ```


    脚本前缀使用默认命名空间和文件夹结构来定义嵌入脚本的路径。现在你已经准备好构建初始化和更新例程，这始于清单9-26所示的`InitializeDatabase`方法。


