    C H A P T E R 6 ■ C A C H I N G


    Once a testing system is in place, you can use an MSBuild script to run the tests
    without firing up Visual Studio 2005 (see Figure 6-6). If your current work relies
    on several other projects, you can sync up the source code for the dependency
    projects and run the MSBuild scripts to build and test them. This automation will
    save you time and identify problems with the dependencies before you start making
    changes in your project.


    **Figure 6-6.** *MSBuild with unit testing*


    **Problems with Caching**


    Unexpected problems come up when you make use of caching, unless you have devised
    a caching policy that you enforce through planning, training, and code reviews.
    You may decide as a policy that all data placed in the cache will use an absolute
    expiration no greater than five minutes. You may also decide that you will not
    make use of output caching and instead focus on data caching with dependency notifications
    to ensure the data used by the application is always current. By setting a clear
    policy and enforcing it with code reviews, it will be easier to keep things under
    control.


    There are a few things to keep an eye on. When using data caching, you could easily
    hold cached items with a static reference in a code-behind that will cause it
    to never go away. I find it is best to avoid static references when working with
    cached data. To cope with it, I create wrapper methods that act as the access
    points where I get the data. The wrapper first checks for the cached item in the
    cache and returns it if it exists. If not, it pulls the data from the database,
    places it in the cache, and returns it. I never assume that the item is already
    in the cache.


    With output caching, you will likely set the VaryByParam to *, thinking that will
    ensure that different URLs will get different results. For a product page, you
    want Product.


    aspx?ProductID=808 to show a different result from Product.aspx?ProductID=429\.
    This VaryByParam setting will make sure it works that way, but if you have a website
    that has been set to show content in multiple languages, the first user to hit
    the page will cache the content for his language. The next person who hits the
    page, with a different language preference, will see the language preference of
    the first user for the duration that the output cache holds the original request.
    To account for this situation, you can check the Accept-Language header as a part
    of uniquely identifying the contents of a page. Listing 6-40 shows the settings
    to use for output caching when language is a concern.


    8601Ch06CMP2 8/24/07 12:13 PM Page 187


    C H A P T E R 6 ■ C A C H I N G


    **187**


    **Listing 6-40.** *VaryByHeader for Language*


    <%@ OutputCache Duration="300" VaryByParam="*"


    VaryByHeader="Accept-Language" %>


    **Performance Strategies**


    It will be necessary to develop a comprehensive approach to performance. Simply
    caching the results from the database will not ensure your application performs
    well. If several of the queries are very slow, you will continue to experience
    performance problems. Wherever your application is slowest, you can try to speed
    up the queries.'
  trans: "\n本次测试的运行方式与绝对过期测试非常相似，但输出窗口中打印的信息显示，缓存项被移除并非因为过期，而是由于依赖项发生了变更。除此之外，两者的断言逻辑是相同的。\n\
    \n清单 6-38 中的测试涉及通知机制。更新价格与获取更新后值之间的时间间隔非常短，但足以让通知机制将缓存项从缓存中移除。\n\n### 清单 6-38.\
    \ `Test104_Caching_Notification_Test` 方法\n\n```csharp\n/// <summary>\n/// 测试系统在使用通知模式时是否正常工作\n\
    /// </summary>\n[Test]\npublic void Test104_Caching_Notification_Test()\n{\n \
