    AdminHyperLink.Visible = Roles.IsUserInRole(User.Identity.Name, "Admin");


    }


    You can take this even further. In the case of a commerce site, when a customer
    makes a first purchase, you may add him to a role of Customer, which will start
    showing content on his account page for order history and shipment tracking. And
    if your commerce site works with multiple vendors who supply the products for
    the website, you may add them to a Vendor role and grant them access to update
    inventory data and projected ship times.


    Keep in mind that all the role information is stored in the database along with
    your application data. Although it is best to use the RoleProvider to interact
    with this data, you can use the underlying stored procedures to interact with
    the membership data. For a commerce site, you may want to run a monthly report
    to find all users who have purchased more than $1,000 in merchandise in the last
    three months. You can then use the aspnet_UsersInRoles_


    AddUsersToRoles stored procedure to add them to a PreferredCustomer role that
    makes them eligible for discounts and special offers. And as orders come in, you
    will record the items, quantities, and prices for the order but leave the processing
    to be handled as a batch later in the day. At that point, you can verify that
    a user is in the PreferredCustomer role and give him his discount by using the
    aspnet_UsersInRole_IsUserInRole stored procedure. Back on the website, the user
    will start to see special offers on the home page that are not available to everyone
    else (hopefully winning the user’s loyalty), which is all keyed on the user’s
    association with the privileged role.


    Another advantage of having these stored procedures accessible is that many platforms
    work with SQL Server. Your public website may run ASP.NET, but your fulfillment
    process may


    8601Ch05CMP3 8/27/07 8:05 AM Page 118


    **118**


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    be implemented with a different language or platform that cannot use the .NET
    framework directly. With all the talk about server-oriented architecture (SOA)
    as a means to integrate diverse platforms, I feel that the database is already
    an excellent integration point. When I was building a website a couple of years
    back, I had a few developers on the team who produced desktop applications with
    another software platform that handled vendor applications and the fulfillment
    process. I used the database as a way to safely pass data between platforms.


    With the stored procedures equally available to the other platform, I did not
    have to do any additional work for them to adapt to what I was building.


    **The SqlProfileProvider**


    The ASP.NET Profile provider adds additional properties to a user account. We
    touched on this in Chapter 1\. What is interesting about the SqlProfileProvider
    is that it does not require you to also use an implementation of the MembershipProvider.
    That would seem to make little sense, if you could customize a user account but
    then could not log in to it and restore your preferences. But that is not exactly
    how ASP.NET authentication works. The Membership provider is actually just a layer
    above forms authentication, which has been around for several years. In fact,
    you can completely implement a membership system with forms authentication directly,
    which is compatible with the SqlProfileProvider. You can even store usernames
    and passwords in your Web.config file, as shown in Listing 5-6.


    **Listing 5-6.** *Usernames and Passwords in Web.config*


    <authentication mode="Forms">


    <forms loginUrl="Login.aspx"


    name=".ASPXFORMSAUTH"


    slidingExpiration="true">


    <credentials passwordFormat="Clear">


    <user name="admin" password="easy12guess"/>


    <user name="user" password="abc123"/>


    </credentials>


    </forms>


    </authentication>


    This all may explain why the Membership, Roles, and Profile interfaces seem mixed
    up, with so many places to gather the necessary information about your users.
    The MembershipUser object uses the User object, which has been around since .NET
    1.0\. But although you can use SqlProfileProvider without the MembershipProvider,
    there is little reason to do so.


    After you are using the SqlProfileProvider, you have a choice to make. You can
    choose to allow anyone who comes to your website to maintain a profile anonymously
    or not. This is a common feature, but there are some concerns worth considering.


    ■**Note** Remember that there are already default providers configured that you
    will need to clear when configuring your website. Otherwise, you will experience
    unexpected behavior. Although you can configure and use multiple implementations
    of a provider, it is not common. Starting your provider configuration with a clear
    directive should be the first step in configuring your website.


    ![Image 18](index-126_1.png)


    8601Ch05CMP3 8/27/07 8:05 AM Page 119


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    **119**


    **Why Anonymous Profiles?**


    An anonymous profile can store customization settings associated to a profile
    just as an authenticated profile can. These settings will stay with the user even
    after the web browser has been restarted. Perhaps you want to allow a new user
    to use your website before requiring her to create an account. A common feature
    on commerce sites allows a user to add products to her basket anonymously, and
    after she chooses to purchase the items, it creates an account for her during
    the checkout process so she can return later, log in, and access her order status
    or make a new order with the previous account information.


    More and more websites are also offering small ways to customize their content
    to suit their users, but these minor preferences are not really worth the effort
    to create yet another account on another website. One example is the font-resizing
    buttons on the CNN website that allow you to increase or decrease the size of
    the text on the page (see Figure 5-1). The CNN site remembers your preference
    when you return days later. This single setting could be saved alone as a cookie,
    but when it is so easy to set properties on a profile, you can rely on the anonymous
    profile.


    **Figure 5-1.** *CNN.com font resizing*'
