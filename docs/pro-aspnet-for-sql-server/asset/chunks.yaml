    and 3 is the ProfileGroup. This construct is designed for size optimization and
    for single-profile access and not for aggregate analysis. If you want to work
    with this data, you will need to write a rather complex stored procedure. The
    alternative is to rely on the .NET classes, which are already capable of deserializing
    this data.


    That leads us to the second reason that working with this data is tricky. The
    ASP.NET


    dynamic compiler uses a build provider that reads the settings in the Web.config
    file and generates the Profile object in memory. This is how you can see IntelliSense
    support for your custom properties in Visual Studio. Currently this dynamic compiler
    does not work for class libraries. And if you place code in the App_Code folder
    of your website, you will find you cannot access these dynamic values either.


    8601Ch05CMP3 8/27/07 8:05 AM Page 125


    C H A P T E R 5 ■ S Q L P R OV I D E R S


    **125**


    This leads us back to using the ASP.NET runtime to access these values through
    the profiles, which you can use from within a Web Form. To get usable data, you
    will simply go over every authenticated account and generate a comma-separated
    values (CSV) export file with all the profile data that you can parse and use,
    as people have been doing with CSV files for years. Listing 5-14 includes the
    code to export the profile data as a CSV download.


    **Listing 5-14.** *Profiles Exporter*


    using System;


    using System.Web.Profile;


    using System.Web.UI;


    public partial class ProfilesExporter : Page


    {


    protected void Page_Load(object sender, EventArgs e)


    {


    Response.AddHeader("content-disposition",


    "attachment; filename=CustomProfiles.csv");


    Response.ContentType = "text/csv";


    ProfileInfoCollection profiles =


    ProfileManager.GetAllProfiles(


    ProfileAuthenticationOption.Authenticated);


    foreach (ProfileInfo profile in profiles)


    {


    ProfileCommon pc = Profile.GetProfile(profile.UserName); Response.Write(String.Format("{0},{1},{2}\n",
    pc.UserName, pc.FontSize, pc.ProfileGroup));


    }


    Response.End();


    }


    }


    Notice that the code in Listing 5-14 adds the content-disposition header, which
    forces a download and defines a filename ending with the .csv extension. Without
    this header, the file will likely try to use ProfilesExporter.aspx as the filename.
    You could change the filename to include a timestamp so you can distinguish it
    from newer copies of the data from day to day.


    With this CSV data, you will be able to do your analysis more easily.


    Instead of exporting to a CSV file, you could adjust this Web Form to insert the
    data back into the database with tables you have created for the purpose of data
    analysis. The approach used here is built to run quickly. In contrast, reading
    and writing data will slow down the database and extend the time to run the export.'
  trans: "\n代码清单 5-11 的最后几行清理了数据库，使其不会被那些匿名账户弄得杂乱不堪。我已观察到，留下匿名 cookie 标识符会导致每次页面请求时都触发`Profile_MigrateAnonymous`事件。因此，移除匿名配置文件不仅能使数据库保持整洁，还能防止这个事件被不必要地触发。\n\
    \n## 创建用户\n\n使用`Membership`API 创建账户的控件是`CreateUserWizard`。它高度可定制。除了定制，你甚至可以完全接管流程，使用你自己的\
    \ Web 窗体，并只与`Membership`API 交互来创建用户。这涉及更多工作，而考虑到我们追求生产力的目标，你可能希望避免这样做。与其从头开始创建你自己的控件，不如简单地向`CreateUserWizard`添加一个步骤。\n\
    \n对于你的配置文件，你希望允许用户为网站选择一个主要兴趣，以及用户偏好的字体大小（如代码清单 5-10 中自定义属性`ProfileGroup`和`FontSize`所定义）。匿名用户不允许使用`ProfileGroup`。要定制`CreateUserWizard`，你首先需要向该向导添加一个步骤（参见图\
    \ 5-2）。\n\n### 图 5-2. 向向导添加一个步骤\n\n对于此定制，你希望将你的向导步骤放在三步序列的开始。你的步骤将询问用户对于自定义配置文件属性的偏好。第二步将询问所有必需的配置文件信息，最后一步将显示新用户配置文件已创建的确认信息。使用代码清单\
    \ 5-12 中的标记来创建定制控件。\n\n### 代码清单 5-12. 定制后的 CreateUserWizard\n\n```aspx\n<%@ Control\
    \ Language=\"C#\" AutoEventWireup=\"true\"\nCodeFile=\"CreateCustomUserControl.ascx.cs\"\
    \nInherits=\"Controls_CreateCustomUserControl\" %>\n\n<asp:CreateUserWizard ID=\"\
    CreateUserWizard1\" runat=\"server\"\nOnCreatedUser=\"CreateUserWizard1_CreatedUser\"\
    \nContinueDestinationPageUrl=\"~/Default.aspx\">\n    <WizardSteps>\n        <asp:WizardStep\
    \ runat=\"server\" Title=\"Primary Interest\">\n            <b>选择您的主要兴趣:</b><br\
    \ />\n            <asp:RadioButtonList ID=\"rblPrimaryInterest\" runat=\"server\"\
    >\n                <asp:ListItem Selected=\"True\" Value=\"1\">体育</asp:ListItem>\n\
    \                <asp:ListItem Value=\"2\">政治</asp:ListItem>\n               \
    \ <asp:ListItem Value=\"3\">天气</asp:ListItem>\n                <asp:ListItem Value=\"\
    4\">商业</asp:ListItem>\n                <asp:ListItem Value=\"5\">娱乐</asp:ListItem>\n\
    \            </asp:RadioButtonList>\n            <p>\n                请在下方选择您认为最易阅读的字体大小。\n\
    \            </p>\n            <table><tr><td>\n                <b>示例大小:</b>\n\
    \                <div style=\"font-size: 10px;\">小号字体</div>\n                <div\
    \ style=\"font-size: 12px;\">常规字体</div>\n                <div style=\"font-size:\
    \ 14px;\">大号字体</div>\n            </td><td>\n                <asp:RadioButtonList\
    \ ID=\"rblFontSize\" runat=\"server\">\n                    <asp:ListItem Value=\"\
    10\">小</asp:ListItem>\n                    <asp:ListItem Selected=\"True\" Value=\"\
    12\">常规</asp:ListItem>\n                    <asp:ListItem Value=\"14\">大</asp:ListItem>\n\
    \                </asp:RadioButtonList>\n            </td></tr></table>\n    \
    \    </asp:WizardStep>\n        <asp:CreateUserWizardStep runat=\"server\">\n\
    \        </asp:CreateUserWizardStep>\n        <asp:CompleteWizardStep runat=\"\
    server\">\n        </asp:CompleteWizardStep>\n    </WizardSteps>\n</asp:CreateUserWizard>\n\
    ```\n\n持有你想要使用的值的控件位于单选按钮列表`rblPrimaryInterest`和`rblFontSize`中。当`CreatedUser`事件触发时，你将获取它们的值（参见代码清单\
    \ 5-13）。\n\n### 代码清单 5-13. CreatedUser 事件处理器\n\n```csharp\nprotected void CreateUserWizard1_CreatedUser(object\
    \ sender, EventArgs e)\n{\n    Profile.FontSize = rblFontSize.SelectedValue;\n\
    \    Profile.ProfileGroup = rblPrimaryInterest.SelectedValue;\n}\n```\n\n现在，你可以使用`ProfileGroup`的值来向用户展示更符合其需求的内容，并以他们偏好的字体大小显示。但你可能想要直接获取这些数据。这可能有些棘手。\n\
    \n## 动态配置文件和作为 BLOB 的配置文件\n\n要获取配置文件数据之所以棘手，有两个原因。首先，数据以一种无法通过简单数据库查询直接访问的格式进行序列化。其次，你无法创建一个命令行实用程序来读取配置文件数据并将其作为计划作业在夜间运行以执行用户分析任务，因为你需要\
    \ ASP.NET 动态编译器来生成用户配置文件。\n\n关于数据序列化，示例属性将存储在`aspnet_Profile`表的`PropertyNames`和`PropertyValues`列中，如表\
    \ 5-3 所示。\n\n### 表 5-3. 序列化的配置文件属性\n\n| PropertyNames | PropertyValues |\n| ---\
    \ | --- |\n| `FontSize:S:0:2:ProfileGroup:S:2:1:` | |\n\n在`PropertyNames`中，它以冒号分隔列出了名称、类型、起始索引和长度。在`PropertyValues`中，你可以使用`PropertyNames`推导出\
    \ 14 是`FontSize`，3 是`ProfileGroup`。这种结构是为了优化大小以及单配置文件访问而设计的，并非用于聚合分析。如果你想处理这些数据，你将需要编写一个相当复杂的存储过程。另一种方法是依赖.NET\
    \ 类，它们已经能够反序列化这些数据。\n\n这就引出了处理这些数据棘手的第二个原因。ASP.NET 动态编译器使用一个构建提供程序，该提供程序读取`Web.config`文件中的设置并在内存中生成`Profile`对象。这就是为什么在\
    \ Visual Studio 中你能看到自定义属性的智能感知支持。目前，这个动态编译器不适用于类库。而如果你将代码放在网站的`App_Code`文件夹中，你会发现你同样无法访问这些动态值。\n\
    \n这让我们回到了使用 ASP.NET 运行时通过配置文件来访问这些值，你可以在 Web 窗体内使用它们。为了获得可用的数据，你只需遍历每个已认证的账户，并生成一个包含所有配置文件数据的逗号分隔值（CSV）导出文件，这些数据你可以像人们多年来使用\
    \ CSV 文件那样进行解析和使用。代码清单 5-14 包含将配置文件数据导出为 CSV 下载的代码。\n\n### 代码清单 5-14. 配置文件导出器\n\
    \n```csharp\nusing System;\nusing System.Web.Profile;\nusing System.Web.UI;\n\n\
    public partial class ProfilesExporter : Page\n{\n    protected void Page_Load(object\
    \ sender, EventArgs e)\n    {\n        Response.AddHeader(\"content-disposition\"\
    ,\n            \"attachment; filename=CustomProfiles.csv\");\n        Response.ContentType\
    \ = \"text/csv\";\n\n        ProfileInfoCollection profiles =\n            ProfileManager.GetAllProfiles(\n\
    \                ProfileAuthenticationOption.Authenticated);\n\n        foreach\
    \ (ProfileInfo profile in profiles)\n        {\n            ProfileCommon pc =\
    \ Profile.GetProfile(profile.UserName);\n            Response.Write(String.Format(\"\
    {0},{1},{2}\\n\", pc.UserName, pc.FontSize, pc.ProfileGroup));\n        }\n  \
    \      Response.End();\n    }\n}\n```\n\n请注意，代码清单 5-14 中的代码添加了`content-disposition`头，它强制下载并定义了一个以`.csv`扩展名结尾的文件名。如果没有这个头，文件很可能会尝试使用`ProfilesExporter.aspx`作为文件名。你可以修改文件名以包含时间戳，这样就能将其与每日更新的数据副本区分开来。\n\
    \n有了这个 CSV 数据，你将能更轻松地进行分析。除了导出到 CSV 文件，你还可以调整这个 Web 窗体，将数据插回到你为数据分析目的而创建的数据库表中。这里使用的方法是为了快速运行而构建的。相比之下，读写数据会减慢数据库速度并延长导出运行时间。\n"
