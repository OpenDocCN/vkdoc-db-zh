    \n`PersonListingControl` 的主要内容是 `PersonRow` 项的集合。这是一个简单的控件，它利用提供给它的数据绑定到它创建的控件上。\n\
    \n`PersonRow` 继承自 `WebControl`，并实现了 `IDataItemContainer` 和 `INamingContainer`\
    \ 接口。请记住，`INamingContainer` 接口没有方法，因为它仅仅是一个用于管理命名容器层次结构的标记接口。\n\n`IDataItemContainer`\
    \ 实现了三个只读属性，如清单 4-36 所示。\n\n### 清单 4-36. `IDataItemContainer` 成员\n\n```csharp\n\
    #region \" IDataItemContainer Members \"\npublic object DataItem\n{\n    get\n\
    \    {\n        return Data;\n    }\n}\npublic int DataItemIndex\n{\n    get\n\
    \    {\n        return _itemIndex;\n    }\n}\npublic int DisplayIndex\n{\n   \
    \ get\n    {\n        return _itemIndex;\n    }\n}\n#endregion\n```\n\n当 `PersonRow`\
    \ 被构造时，这些值作为参数传入。数据存储在一个成员变量中，通过 `Data` 属性访问。构造函数和 `Data` 属性如清单 4-37 所示。\n\n###\
    \ 清单 4-37. `PersonRow` 构造函数和 `Data` 属性\n\n```csharp\npublic PersonRow(int itemIndex,\
    \ object o)\n    : base(HtmlTextWriterTag.Div)\n{\n    _data = o;\n    _itemIndex\
    \ = itemIndex;\n}\npublic virtual object Data\n{\n    get\n    {\n        return\
    \ _data;\n    }\n}\n```\n\n这里传入的数据可能为空值，因此在调用 `CreateChildControls` 方法时，应妥善处理这种情况。如果有数据，可以使用清单\
    \ 4-38 中的代码，通过 `DataBinder` 从数据对象加载值。\n\n### 清单 4-38. 数据绑定代码\n\n```csharp\nif\
    \ (Data != null)\n{\n    DateTime dateValue;\n    DateTime.TryParse(DataBinder.GetPropertyValue(Data,\
    \ birthDateField, \"\"),\n                      out dateValue);\n    FirstName\
    \ = DataBinder.GetPropertyValue(Data, firstNameField, null);\n    LastName = DataBinder.GetPropertyValue(Data,\
    \ lastNameField, null);\n    BirthDate = dateValue;\n    City = DataBinder.GetPropertyValue(Data,\
    \ cityField, null);\n    Country = DataBinder.GetPropertyValue(Data, countryField,\
    \ null);\n}\n```\n\n你会注意到这里没有代码来检查数据是 `DataSet`、`IDataReader` 还是自定义业务对象。`DataBinder`\
    \ 使用反射从对象中获取值并将其设置在属性上。`FirstName` 属性接收与 `firstNameField` 关联的值，这是一个字符串，应该与数据对象上的某个属性匹配。默认情况下，`firstNameField`\
    \ 的字符串值是 `FirstName`，这与该控件使用的存储过程返回的某一列相匹配。并且作为一个良好的数据绑定控件，如果你无法将字段名与数据源匹配，可以通过一系列属性调整这个字符串。`FirstName`\
    \ 数据字段属性如清单 4-39 所示。\n\n### 清单 4-39. `FirstName` 数据字段属性\n\n```csharp\nprivate\
    \ string _dataFirstNameField = \"FirstName\";\n[Browsable(true), Category(\"Data\"\
    ), Description(\"First Name Data Field\"),\n DefaultValue(\"FirstName\")]\npublic\
    \ string DataFirstNameField\n{\n    get\n    {\n        EnsureChildControls();\n\
    \        return _dataFirstNameField;\n    }\n    set\n    {\n        EnsureChildControls();\n\
    \        _dataFirstNameField = value;\n    }\n}\n```\n\n`DataFirstNameField` 属性实际上是由\
    \ `PersonListingControl` 定义的，以简化控件的配置。当 `PersonRow` 创建子控件时，一个名为 `CaptureSettings`\
    \ 的方法会从 `PersonListingControl` 获取这些值。`CaptureSettings` 方法如清单 4-40 所示。\n\n### 清单\
    \ 4-40. `CaptureSettings` 方法\n\n```csharp\n/// <summary>\n/// 如果父级是 PersonListingControl，则从中获取设置\n\
    /// </summary>\nprivate void CaptureSettings()\n{\n    PersonListingControl parent\
    \ = Parent as PersonListingControl;\n    if (parent != null)\n    {\n        personFormat\
    \ = parent.PersonFormat;\n        firstNameField = parent.DataFirstNameField;\n\
    \        lastNameField = parent.DataLastNameField;\n        birthDateField = parent.DataBirthDateField;\n\
    \        birthDateFormat = parent.DataBirthDateFormat;\n        cityField = parent.DataCityField;\n\
    \        countryField = parent.DataCountryField;\n    }\n}\n```\n\n当调用 `DataBinder`\
    \ 时，它从数据对象中提取的数据首先被设置在 `FirstName` 属性上。这个属性是成员变量的访问器，而不是某个控件的 `Text` 属性。`PersonRow`\
