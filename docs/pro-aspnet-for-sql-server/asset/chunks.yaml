    Why Use SqlDependency?


    There are clear limitations of SqlDependency when compared to SqlCacheDependency,
    which manages items in the cache for you. But if you want to ensure that items
    are not ejected from the cache, you can manage your own collection and use the
    OnChange event to remove items from the collection to keep it current. You will
    have to understand that items placed in your managed collection will take up memory
    until you remove those items. You already know the cache will manage memory usage
    and eject items from the cache when it determines memory space needs to be cleared
    for new items. Depending on your needs, you may decide to make this trade-off.


    To enhance the use of the SqlDependency, it will be necessary to get the parameters
    used in the originating query into the OnChange event handler. This can be done
    with an anonymous method that is created as a delegate. The inline block of code
    will have access to the parameters of the enclosing method, so it will not be
    necessary to make use of the Guid value on the SqlDependency. In Listing 6-21,
    a method is given an integer value named productId, which is used as a parameter
    passed to a stored procedure that retrieves a product from the database.


