    .config extension because it is a protected extension: it is specifically blocked
    so that the web server will not serve it up to a user. The contents of the file
    holding the replacement section should just contain the single section, as is
    shown in Listing 9-8.


    **Listing 9-8.** *ConnectionStrings.Production.config*


    <?xml version="1.0"?>


