- fmt: "# Abstract Provider\n\nThe abstract provider is the class that directly inherits\
    \ the `ProviderBase` class, which all providers are built on. This base class\
    \ defines a baseline of support for all providers, with properties for `Name`\
    \ and `Description` as well as the `Initialize` method, which is called when a\
    \ provider is first loaded into an application. The properties and the method\
    \ are all declared by using the `virtual` attribute so you can override them,\
    \ but typically you just override the `Initialize` method.\n\nIn the abstract\
    \ provider, you could leave the `Initialize` method untouched and leave it up\
    \ to the provider implementation to do so, but you may want to add one or more\
    \ universally available properties for all implementations of the provider, such\
    \ as an `Enabled` property. You would do so in the abstract provider.\n\nNow you\
    \ want to start adding abstract property and method declarations to define your\
    \ service contract, which all implementations must fulfill. For the `PhotoAlbumProvider`,\
    \ these declarations include methods to insert, change, and delete data related\
    \ to albums and photos.\n\n## Listing 5-20. `PhotoAlbumProvider.cs`\n\n```csharp\n\
    using System;\nusing System.Collections.Generic;\nusing System.Configuration.Provider;\n\
    \nnamespace Chapter04.PhotoAlbumProvider\n{\n    /// <summary>\n    /// Photo\
    \ Album Provider\n    /// </summary>\n    public abstract class PhotoAlbumProvider\
    \ : ProviderBase\n    {\n        #region \" Abstract Methods \"\n\n        ///\
    \ <summary>\n        /// Gets albums for a user\n        /// </summary>\n    \
    \    public abstract List<Album> GetAlbums(string userName);\n\n        /// <summary>\n\
    \        /// Gets photos for an album\n        /// </summary>\n        public\
    \ abstract List<Photo> GetPhotosByAlbum(Album album);\n\n        /// <summary>\n\
    \        /// Creates an album\n        /// </summary>\n        public abstract\
    \ Album AlbumInsert(string userName, string albumName, bool active, bool shared);\n\
    \n        /// <summary>\n        /// Creates a photo\n        /// </summary>\n\
    \        public abstract Photo PhotoInsert(Album album, string photoName, DateTime\
    \ photoDate, String regularUrl, int regularWidth, int regularHeight, String thumbnailUrl,\
    \ int thumbnailWidth, int thumbnailHeight, bool active, bool shared);\n\n    \
    \    /// <summary>\n        /// Updates an album\n        /// </summary>\n   \
    \     public abstract void AlbumUpdate(Album album);\n\n        /// <summary>\n\
    \        /// Updates a photo\n        /// </summary>\n        public abstract\
    \ void PhotoUpdate(Photo photo);\n\n        /// <summary>\n        /// Deletes\
    \ an album\n        /// </summary>\n        public abstract void AlbumDeletePermanent(Album\
    \ album);\n\n        /// <summary>\n        /// Deletes album permanently\n  \
    \      /// </summary>\n        public abstract void PhotoDeletePermanent(Photo\
    \ photo);\n\n        /// <summary>\n        /// Moves an album\n        /// </summary>\n\
    \        public abstract void AlbumMove(Album album, string sourceUserName, string\
    \ destinationUserName);\n\n        /// <summary>\n        /// Moves a photo\n\
    \        /// </summary>\n        public abstract void PhotoMove(Photo photo, Album\
    \ sourceAlbum, Album destinationAlbum);\n\n        #endregion\n    }\n}\n```\n\
    \nThe abstract methods in `PhotoAlbumProvider` define the entire scope of what\
    \ the provider will support.\n\n# The Provider Implementation\n\nFor the concrete\
    \ implementation of the provider, you will likely want to read in more configuration\
    \ settings. A SQL implementation will surely use a configuration attribute called\
    \ `connectionStringName`, just as `SqlMembershipProvider` and `SqlProfileProvider`\
    \ do. As you prepare to initialize the provider, you will want to validate the\
    \ data that you are going to use. First check that the `config` parameter is not\
    \ null and throw an `ArgumentNullException` if it is. Then make sure the core\
    \ properties of `Name` and `Description` are in place so that `ProviderBase` can\
    \ use them. The description may not be defined, so you can give it a default value\
    \ when it is not. Then you want to call the `Initialize` method on the base class,\
    \ which is the `PhotoAlbumProvider` in this case. It will eventually lead to the\
    \ `Initialize` method in `ProviderBase`, which will load these configuration values\
    \ for the `Name` and `Description` properties."
