    files like class libraries. This new model made many new features possible, such
    as page-level compilation, but it also eliminated a few features we had with .NET
    1.1 projects. Without a project file, you cannot run actions automatically before
    and after builds, and you also cannot manage references and resources in the same
    way. The Web.config file handles some details, but not everything. Managing ASP.NET
    websites inside of a solution helps manage dependencies and relationships with
    other projects in the solution, but ultimately you need a way to build a website
    and prepare it for deployment. This is where Web Deployment Projects come in.


    Web Deployment Projects are an extension to Visual Studio that must be installed
