    integration. They will become a regular part of your daily routine.


    **Summary**


    This chapter covered database management processes, from organizing the scripts
    in Database Projects to creating the scripts for managing stored procedures, indexes,
    and constraints.


    It concluded with a review of automated testing techniques that can be used to
    ensure that the application layer continues to work well with the database.


    8601Ch04CMP3 8/25/07 1:07 PM Page 73


    C H A P T E R 4


    Databound Controls


    **T**here are many useful controls available in ASP.NET 2.0, which makes it very
    easy to work with data. Many of the examples provided by Microsoft show how you
    can quickly assemble a data-driven website with little or no code. But sometimes
    the real-world requirements push you beyond this safe space and demand a more
    complex solution. The solutions can still be elegant and work with very little
    code. You just need a deeper understanding of what you can do with the available
    controls and what you do with a more complex combination of these controls. And
    once you break up your approach into smaller components that work together, you
    can handle the more complicated requirements with manageable components.


    This chapter covers the following:


    • The DetailsView control


    • The FormView control


    • The GridView control


    • Editing and validating fields


    • Binding input parameters


    • Embedding user controls


    • Creating a databound control'
  trans: '

    这样做可以将损坏的代码排除在源代码控制系统之外，否则这些损坏的代码会随着其他开发者拉取更新而蔓延到他们的系统中。但即使运行了测试，多个开发者的变更组合也可能破坏单元测试。为了防止这种情况，你可以设置一个构建服务器，定期从源代码控制中拉取更新、构建项目并运行测试。这通常被称为**持续集成**。


    ## 持续集成


    过去几年中最流行的持续集成解决方案一直是 `CruiseControl.NET`。它与 `NUnit` 等单元测试框架以及广泛的源代码控制系统兼容。它可以配置为每五分钟检查一次源代码控制系统是否有更新。当有更新时，`CruiseControl.NET`
    会启动构建和测试过程。构建和测试的结果会通过构建报告记录下来，开发者可以通过电子邮件立即获得结果。


    `CruiseControl.NET` 还有一个系统托盘应用程序，它与构建服务器保持联系，向开发者报告变更情况。当构建成功时，该应用程序会从系统托盘弹出一个通知气泡。当构建失败时，它会显示一个通知告知坏消息。`CruiseControl.NET`
    还拥有一个网站，该网站显示每个已配置的项目及其所有构建报告列表。当构建失败时，你可以查看最新的构建报告，以确切了解问题所在。


    它不仅会显示为最新构建而更改的文件，还会显示代码出错的具体行号。这些细节使得确定是谁破坏了构建以及是什么更改导致了破坏变得容易得多。自动化构建报告失败的一个附带好处是，它大大减少了针对个人的指责，开发者可以直接主动去修复自己的问题。我多次看到构建失败是因为一个文件遗漏了，没有与其他更改一起提交到源代码控制中。提交那个缺失的文件可以快速修复构建，大家就能恢复正常工作了。鉴于此类情况，最好提交你的更改并请求构建服务器立即运行构建，这样你就能确保在你的更改被包含后、但在你下班回家前，构建能成功运行。你最不希望发生的事情就是因为没有在最新更改中包含一个文件而被叫回公司。


    接下来的章节将涵盖单元测试和持续集成的具体示例。它们将成为你日常工作流程的常规组成部分。


    ## 总结


    本章介绍了数据库管理流程，从在数据库项目中组织脚本，到创建用于管理存储过程、索引和约束的脚本。


    最后回顾了可用于确保应用层与数据库持续良好协作的自动化测试技术。


    `8601Ch04CMP3 8/25/07 1:07 PM Page 73`


    ## 第 4 章 数据绑定控件


    `ASP.NET 2.0` 提供了许多有用的控件，这使得处理数据变得非常容易。微软提供的许多示例展示了如何仅需很少甚至无需代码就能快速组装一个数据驱动的网站。但有时，现实世界的需求会将你推出这个安全区，要求一个更复杂的解决方案。这些解决方案仍然可以是优雅的，并且只需很少的代码即可工作。你只需要更深入地了解如何利用现有控件，以及如何更复杂地组合使用这些控件。一旦你将你的方法分解成协同工作的小型组件，你就可以用可管理的组件来处理更复杂的需求。


    本章涵盖以下内容：


    • `DetailsView` 控件


    • `FormView` 控件


    • `GridView` 控件


    • 编辑和验证字段


    • 绑定输入参数


    • 嵌入用户控件


    • 创建数据绑定控件

