  trans: "\n并且由于 `dug_GetEventsByDate` 存储过程使用 `MeetingDate` 列作为过滤条件，如果表变得很大，它就成为索引的合理候选——但当数据库只有少量记录时，这并非绝对必要。你可能可以轻松地多年不用为\
    \ `MeetingDate` 列建立索引。请记住，维护索引也会增加数据库的负载，因此，向表中添加的索引越少，给系统带来的额外开销就越小。\n\n保存事件（Event）记录的脚本\
    \ `dug_SaveEvent.sql`，接收与事件相关的所有值，以及 `OldEventID`（如果事件已存在于数据库中且正在被更新，则此值会被定义），和一个名为\
    \ `EventID` 的输出参数。无论保存过程中执行的是更新还是插入语句，`EventID` 都会被设置。代码清单 10-4 展示了这个保存过程。\n\n\
    **代码清单 10-4.** `dug_SaveEvent.sql`\n\n```\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'dug_SaveEvent')\nBEGIN\n    DROP Procedure dug_SaveEvent\n\
    END\nGO\n\nCREATE Procedure dbo.dug_SaveEvent\n(\n    @Title nvarchar(50),\n \
    \   @Description text,\n    @MeetingDate datetime,\n    @SpeakerID bigint,\n \
    \   @SponsorID bigint,\n    @LocationID bigint,\n    @OldEventID bigint,\n   \
    \ @EventID bigint OUTPUT\n)\nAS\nBEGIN\n    IF (@OldEventID < 0)\n    BEGIN\n\
    \        INSERT INTO dug_Events\n            (Title, Description, MeetingDate,\
    \ SpeakerID,\n             SponsorID, LocationID, Created, Modified)\n       \
    \ VALUES (\n            @Title,\n            @Description,\n            @MeetingDate,\n\
    \            @SpeakerID,\n            @SponsorID,\n            @LocationID,\n\
    \            GETDATE(),\n            GETDATE()\n        )\n\n        SELECT @EventID\
    \ = @@IDENTITY\n    END\n    ELSE\n    BEGIN\n        UPDATE dug_Events\n    \
    \    SET\n            Title = @Title,\n            Description = @Description,\n\
    \            MeetingDate = @MeetingDate,\n            SpeakerID = @SpeakerID,\n\
    \            SponsorID = @SponsorID,\n            LocationID = @LocationID,\n\
    \            Modified = GETDATE()\n        WHERE\n            ID = @OldEventID\n\
    \n        SET @EventID = @OldEventID\n    END\nEND\nGO\n\nGRANT EXEC ON dug_SaveEvent\
    \ TO PUBLIC\nGO\n```\n\n你可以看到，事件记录保存了指向 `Speaker`（演讲者）、`Sponsor`（赞助商）和 `Location`（地点）表的外键引用。除了各自的\
    \ ID 值外键引用外，`Speaker`、`Sponsor` 和 `Location` 的具体数据并不作为事件保存过程的一部分被保存。这些数据集合之间的边界得以维持，以确保易于维护。只要\
    \ ID 值保持不变（这将保留与事件记录的关系），`Sponsor` 表中存储的值可以被完全更改。\n\n最后，删除过程很简单。只需要提供事件的 ID 值即可删除该记录，如代码清单\
    \ 10-5 所示。\n\n**代码清单 10-5.** `dug_DeleteEvent.sql`\n\n```\nIF EXISTS (SELECT *\
    \ FROM sysobjects WHERE type = 'P'\n    AND name = 'dug_DeleteEvent')\nBEGIN\n\
    \    DROP Procedure dug_DeleteEvent\nEND\nGO\n\nCREATE Procedure dbo.dug_DeleteEvent\n\
    (\n    @EventID bigint\n)\nAS\nDELETE FROM dug_Events\nWHERE ID = @EventID\nGO\n\
    \nGRANT EXEC ON dug_DeleteEvent TO PUBLIC\nGO\n```\n\n`Speaker`、`Sponsor` 和 `Location`\
    \ 的其他表也以类似方式管理，但由于数据的独特性存在一些差异。稍后我将详细介绍 `Location` 表如何被多个其他表用作依赖项。\n\n## 创建数据访问提供程序\n\
    \n我们示例网站的模块化设计鼓励我们使用提供程序模型，正如你在第 5 章看到的，这很容易实现。我们将为 .NET 用户组网站使用的每组数据创建一个 SQL\
    \ 提供程序，供初始网站上线时使用。\n\n之后，随着网站的发展和需要进一步扩展，可以按需创建和部署新的提供程序。我们稍后将创建的一个提供程序使用 LINQ，它可能比使用企业库和\
    \ ADO.NET 更快。我们还将创建一个 WCF 提供程序，它将允许我们以分布式方式配置数据库后端，从而分散数据库负载。\n\n### EventProvider\
    \ 对象\n\n目前，我们将专注于 `EventProvider`，如代码清单 10-6 所示。\n"
- fmt: "### Listing 10-6. EventProvider.cs\n\n```csharp\nnamespace DotnetUserGroup.DataAccess.Events\n\
    {\n    public abstract class EventProvider : ProviderBase, ILocationConsumer\n\
    \    {\n        #region \" Provider Methods \"\n        public abstract Event\
    \ GetNewEvent();\n        public abstract Event GetEvent(DomainKey key);\n   \
    \     public abstract EventCollection GetAllEvents();\n        public abstract\
    \ EventCollection GetEventsByDate(DateTime targetDate);\n        public abstract\
    \ DomainKey SaveEvent(Event evt);\n        public abstract void DeleteEvent(Event\
    \ evt);\n        public abstract bool IsUsingLocation(Location location);\n  \
    \      #endregion\n    }\n}\n```\n\nAs covered in Chapter 5, the provider inherits\
    \ from the `ProviderBase` class and declares all the operations as abstract methods.\
    \ The `EventProvider` primarily works with the `Event` object, which holds onto\
    \ each of the database values that are returned by the “get” procedures covered\
    \ in the previous section. The `Event` class is shown in Listing 10-7.\n\n###\
    \ Listing 10-7. Event.cs\n\n```csharp\nnamespace DotnetUserGroup.DataAccess.Events\n\
    {\n    [DataContract]\n    public class Event : DomainObject<Event>\n    {\n \
    \       protected internal Event() { }\n\n        public Event(DataRow row)\n\
    \        {\n            Load(row);\n        }\n\n        public Event(IDataReader\
    \ dr)\n        {\n            Load(dr);\n        }\n\n        public static Event\
    \ CreateNewEvent()\n        {\n            Event evt = new Event();\n        \
    \    evt.ID.Value = (long) -1;\n            return evt;\n        }\n\n       \
    \ private string _title;\n        [DataMember(Name = \"Title\", Order = 1)]\n\
    \        public string Title\n        {\n            get { return _title; }\n\
    \            set { _title = value; }\n        }\n\n        private string _description;\n\
    \        [DataMember(Name = \"Description\", Order = 1)]\n        public string\
    \ Description\n        {\n            get { return _description; }\n         \
    \   set { _description = value; }\n        }\n\n        private DateTime _meetingDate\
    \ = DefaultDateTime;\n        [DataMember(Name = \"MeetingDate\", Order = 1)]\n\
    \        public DateTime MeetingDate\n        {\n            get { return _meetingDate;\
    \ }\n            set { _meetingDate = value; }\n        }\n\n        private Speaker\
    \ _speaker;\n        [DataMember(Name = \"Speaker\", Order = 1)]\n        public\
    \ Speaker Speaker\n        {\n            get\n            {\n               \
    \ if (_speaker == null)\n                {\n                    // lazy load the\
    \ speaker\n                    EventSection section = new EventSection();\n  \
    \                  _speaker = SpeakerManager.GetProvider(section.SpeakerProvider).GetSpeaker(this);\n\
    \                }\n                return _speaker;\n            }\n        \
    \    set { _speaker = value; }\n        }\n\n        private Sponsor _sponsor;\n\
    \        [DataMember(Name = \"Sponsor\", Order = 1)]\n        public Sponsor Sponsor\n\
    \        {\n            get\n            {\n                if (_sponsor == null)\n\
    \                {\n                    // lazy load the sponsor\n           \
    \         EventSection section = new EventSection();\n                    _sponsor\
    \ = SponsorManager.GetProvider(section.SponsorProvider).GetSponsor(this);\n  \
    \              }\n                return _sponsor;\n            }\n          \
    \  set { _sponsor = value; }\n        }\n\n        private Location _location;\n\
    \        [DataMember(Name = \"Location\", Order = 1)]\n        public Location\
    \ Location\n        {\n            get\n            {\n                if (_location\
    \ == null)\n                {\n                    // lazy load the location\n\
    \                    EventSection section = new EventSection();\n            \
    \        _location = LocationManager.GetProvider(section.LocationProvider).GetLocation(this);\n\
    \                }\n                return _location;\n            }\n       \
    \     set { _location = value; }\n        }\n    }\n}\n```\n\nThe `Event` object\
    \ generally holds onto properties that come from the database. Because loading\
    \ the data is typically a tedious task, this work has been set to work automatically\
    \ via an updated version of the `DomainObject` covered in Chapter 7.\n\n## Revised\
    \ DomainObject\n\nThe revised `DomainObject` used for the .NET user group website\
    \ is a lot like the one used in Chapter 7, with a few differences. One difference\
    \ in particular is how the primary key is always assumed to line up with a column\
    \ named `ID`. In Chapter 7, the `ID` was simply a number, whereas the updated\
    \ `DomainObject` uses a new type called `DomainKey`, which can hold onto primary\
    \ key values that could be one of the following types: `Int16`, `Int32`, `Int64`,\
    \ or `GUID`.\n\nWhen a column named `ID` is pulled from the `DataSet` or `IDataReader`,\
    \ it is assumed to be the primary key value and is set on the `DomainKey` property.\
    \ Listing 10-8 shows the `DomainKey` class.\n\n### Listing 10-8. DomainKey.cs\n\
    \n```csharp\nnamespace DotnetUserGroup.DataAccess.Common\n{\n    [DataContract]\n\
    \    public class DomainKey : IComparable<DomainKey>\n    {\n        public DomainKey(object\
    \ keyValue)\n        {\n            Value = keyValue;\n        }\n\n        private\
    \ object _keyValue;\n        [DataMember(Name = \"Value\", Order = 1)]\n     \
    \   public object Value\n        {\n            get { return _keyValue; }\n  \
    \          set\n            {\n                // check in the order which is\
    \ most likely\n                if (value is Int32 ||\n                    value\
    \ is Guid ||\n                    value is Int64 ||\n                    value\
    \ is Int16)\n                {\n                    _keyValue = value;\n     \
    \           }\n                else\n                {\n                    throw\
    \ new Exception(\"Type not supported as a DomainKey: \" +\n                  \
    \      value.GetType());\n                }\n            }\n        }\n\n    \
    \    public static DomainKey Default\n        {\n            get\n           \
    \ {\n                DomainKey defaultKey = new DomainKey(-1);\n             \
    \   return defaultKey;\n            }\n        }\n\n        #region \" Comparison\
    \ Methods \"\n        public int CompareTo(DomainKey other)\n        {\n     \
    \       return Value.ToString().CompareTo(other.Value.ToString());\n        }\n\
    \n        public override int GetHashCode()\n        {\n            return Value.GetHashCode();\n\
    \        }\n\n        public override bool Equals(object obj)\n        {\n   \
    \         if (obj != null && obj is DomainKey)\n            {\n              \
    \  DomainKey other = (DomainKey) obj;\n                return Equals(other);\n\
    \            }\n            return false;\n        }\n\n        public bool Equals(DomainKey\
    \ other)\n        {\n            if (other != null && Value.Equals(other.Value))\n\
    \            {\n                return true;\n            }\n            return\
    \ false;\n        }\n        #endregion\n    }\n}\n```\n\nThe primary purpose\
    \ of the `DomainKey` is to abstract away the type of the primary key. One implementation\
    \ of the `EventProvider` could use the `long` value, which is used by the SQL\
    \ implementation, while a future implementation may use a `Guid` value, which\
    \ is more appropriate when data is spread across multiple databases and a sequential\
    \ identity key cannot be maintained properly. The `EventProvider` will not have\
    \ to change when the type of the primary key is changed from a `long` to a `Guid`\
    \ in the future implementation. However, the `Event` class does reference the\
    \ associated `Sponsor`, `Speaker`, and `Location`, which are also set up with\
    \ primary keys that are using `long` values. If one of these implementations is\
    \ adjusted to use a `Guid` value, it will require some adjustments to the stored\
    \ procedures and table structures.\n\nAnother feature of the `DomainKey` is the\
    \ implementation of the `IComparable<DomainKey>` interface, which allows the key\
    \ to be uniquely identified within a collection, among other uses. It can also\
    \ uniquely identify one record to another by using the primary key value instead\
    \ of the default comparison, which will not be accurate. The `DomainObject` uses\
    \ the `DomainKey` type for the `ID` property then uses the comparison provided\
    \ by the `DomainKey` to also compare instances of the `DomainObject`. The comparison\
    \ methods used by the `DomainObject` class are shown in Listing 10-9.\n\n### Listing\
    \ 10-9. DomainObject Comparison Methods\n\n```csharp\npublic int CompareTo(Object\
    \ obj)\n{\n    int result = 0;\n    DomainObject<T> otherDomainObject = obj as\
    \ DomainObject<T>;\n    if (otherDomainObject != null)\n    {\n        result\
    \ = ID.CompareTo(otherDomainObject.ID);\n        if (result == 0)\n        {\n\
    \            result = Created.CompareTo(otherDomainObject.Created);\n        \
    \    if (result == 0)\n            {\n                result = Modified.CompareTo(otherDomainObject.Modified);\n\
    \            }\n        }\n    }\n    return result;\n}\n\npublic override int\
    \ GetHashCode()\n{\n    return ID.GetHashCode();\n}\n\npublic override bool Equals(object\
    \ obj)\n{\n    DomainObject<T> domainObject = obj as DomainObject<T>;\n    if\
    \ (domainObject != null)\n    {\n        if (ID.Equals(domainObject.ID))\n   \
    \     {\n            return true;\n        }\n    }\n    return false;\n}\n```"
