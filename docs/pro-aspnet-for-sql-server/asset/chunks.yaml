    **Binding Input Parameters**


    Datasources can be configured with input parameters to filter data in multiple
    ways. Input parameters could come from controls like a TextBox or DropDownList
    as well as query string values. The wizard for configuring an ObjectDataSource
    and a SqlDataSource will detect when the datasource requires input parameters
    and will present these options. You can bind these parameters or choose to handle
    them programmatically.


    **Binding Input Parameters with a Control**


    The simplest example of working with input parameters is to bind them to a control
    such as a TextBox or a DropDownList. With the sample database, you will start
    by binding a list of last names to a DropDownList. Then a GridView will take the
    SelectedValue from the DropDownList and get all people where the last names are
    a match. This example can be done without writing any code in the code-behind
    file. It is just a matter of dragging and dropping the controls. Listing 4-8 shows
    the code.


    **Listing 4-8.** *InputParameterExample.aspx*


    <b>Select Last Name: </b>


    <asp:DropDownList ID="DropDownList1" runat="server" AutoPostBack="True"


    DataSourceID="ObjectDataSource1" DataTextField="LastName">


    </asp:DropDownList>


    <asp:ObjectDataSource ID="ObjectDataSource1" runat="server"


    OldValuesParameterFormatString="original_{0}"


    SelectMethod="GetLastNames" TypeName="Chapter04.PersonDomain">


    </asp:ObjectDataSource>


    <asp:GridView ID="GridView1" runat="server" AllowPaging="True"


    AllowSorting="True" DataSourceID="ObjectDataSource2">


    </asp:GridView>


    <asp:ObjectDataSource ID="ObjectDataSource2" runat="server"


    OldValuesParameterFormatString="original_{0}"


    SelectMethod="GetPeopleByLastName"


    TypeName="Chapter04.PersonDomain">


    <SelectParameters>


    <asp:ControlParameter ControlID="DropDownList1"


    Name="lastName" PropertyName="SelectedValue"


    Type="String" />


    </SelectParameters>


    </asp:ObjectDataSource>


    The important part is near the bottom with the SelectParameters, which defines
    that the ControlParameter comes from the DropDownList1 and sets the lastName input
    parameter.


