    Now when the website is compiled along with the build provider, it will generate
    a new class named Person with all of the fields shown previously in Listing 8-7\.
    After the build has run successfully, you can open the Object Browser and see
    the newly generated class. Figure 8-2 shows the Person class with all of the generated
    fields and properties.


    **Figure 8-2.** *Object Browser with generated Person class* The original source
    file is ten lines of XML, and the resulting class that it generates is over 60
    lines of code that I did not have to write. You can take this further: instead
    of having the XML file define the fields directly, the XML data could instead
    point to a table or stored procedure in the database that would provide all of
    the necessary details to generate all of these fields and properties. Several
    of the popular data access layer projects do just that. SubSonic and Blinq, which
    are covered later in this chapter, both read the schema from the database and
    generate classes based on what it finds. I will show you what these two projects
    offer. But first, consider how you would generate all of this code. Although you
    would be able to do it very quickly with CodeDom alone, you should consider templating.


    **Templating**


    While CodeDom gives you a structured way to generate code, using CodeDom can be
    tedious and difficult to maintain. CodeDom also feels unnatural. As developers,
    we are more comfortable with code that looks like code, not the derivative form
    that CodeDom uses to describe the pieces that make up the code. When you skim
    over a set of methods that use CodeDom to generate the code, you see references
    to CodeTypeDeclaration and CodeMemberProperty. When there is a lot of CodeDom
    code, it can be hard to follow and piece it together in your mind.


    So when there is a lot of code to be generated, it helps to place sections of
    code into template files that can be read in a form that is as close to the actual
    code as possible. When the code is generated, the process will read these templates
    and load the resulting string into a CodeCompileUnit to generate the classes.


    ASP.NET makes use of templates for pages and user controls that are made up of
    largely HTML content along with special directives specific to ASP.NET for controls.
    If it was not done this way, you would have to piece together all of the HTML
    from a source file as was done in the early days of web development.


    ![Image 34](index-246_1.jpg)


    8601Ch08CMP2 8/24/07 3:57 PM Page 242


    **242**


    C H A P T E R 8 ■ G E N E R AT E D D ATA A C C E S S L AY E R


    Generating all of the fields from the XML file in the previous section only required
    about 100 lines of CodeDom code. That is pretty good, but it also only defined
    the fields and properties.


    Creating methods that call the stored procedures, potentially with several input
    parameters, would require a great deal more work with CodeDom. And as you have
    seen how a call into a stored procedure is very much boilerplate code, especially
    with the Enterprise Library, you can get a lot of value out of templating.


    The first code generator I will review is SubSonic, which includes a rich templating
    system.


    **SubSonic**


    SubSonic is an open source project, partially hosted on CodePlex, that has become
    popular because of the many compelling features it provides. Recently, SubSonic
    is in its 2.0 release, which added support for the Enterprise Library as well
    as the ability to generate code for more than one database. Visit http://www.subsonicproject.com
    for more details. Here, I will focus on how it uses a template to generate the
    code and how it reads in details from the database to generate the code.


    ■**Note** CodePlex (http://www.codeplex.com) is the newest code repository provided
    by Microsoft. It features Team System as the source control and work item tracking
    system. A free Team System–enabled version of Visual Studio is available for use
    with CodePlex. CodePlex also supports a basic bridge for TortoiseSVN, a Subversion
    client that integrates with Windows Explorer.


    You will want to download the SubSonic project files for this section and place
    them into the common tools folder as shown in Figure 8-3\. You will be referencing
    the command-line tool from this location as well as the SubSonic assembly. You
    will also need the SQL Server SDK installed if you want to compile the SubSonic
    project.


    **Figure 8-3.** *SubSonic Tools directory*


    ![Image 35](index-247_1.png)


    8601Ch08CMP2 8/24/07 3:57 PM Page 243


    C H A P T E R 8 ■ G E N E R AT E D D ATA A C C E S S L AY E R


    **243**


    Running SubSonic is done with the command-line tool called SubCommander, which
    processes multiple commands to generate both code and database scripts. The generate
    command recognizes many parameters. The most important parameters are used with
    the


    /config and /out switches. Listing 8-14 shows a sample command used to generate
    the code for a data access layer.


    **Listing 8-14.** *Running SubSonic*


    sonic.exe /config Website\Web.config \out Website\App_Code\Generated The resulting
    classes can be included with your project, which could be a website or a class
    library. Originally, when SubSonic was created, it worked exclusively with ASP.NET
    2.0


    websites because it leveraged the Build Provider model, which only works with
    websites. To extend the reach of the generated code, the ability to generate the
    classes to source files was added. Limiting the code generation to the website
    prevented the data access layer from being used as a dependency for other types
    of applications such as desktop and console applications. Several developers also
    did not feel comfortable with the data access layer dynamically changing as the
    database changed.


    ■**Note** See the SubSonic website (http://www.subsonicproject.com) for the full
    documentation covering the code generate command parameters as well as walkthrough
    videos.


    **SubSonic Templating**


    The templating system in SubSonic mirrors the templating system used by ASP.NET.
    The format of the files looks much like the .aspx markup files, but instead of
    generating HTML, it generates code for your data access layer. Figure 8-4 shows
    a sample template that is used to generate a class.


    **Figure 8-4.** *SubSonic class template*


