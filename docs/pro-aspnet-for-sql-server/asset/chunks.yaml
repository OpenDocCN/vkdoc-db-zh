    N''IsForeignKey'') = 1)


    ALTER TABLE [dbo].[chpt03_Person]


    DROP CONSTRAINT FK_chpt03_Person_chpt03_Location


    And then to add the constraint back, the constraint in Listing 3-9 is run.


    **Listing 3-9.** *AddConstraints.sql*


    ALTER TABLE [dbo].[chpt03_Person] WITH CHECK ADD


    CONSTRAINT [FK_chpt03_Person_chpt03_Location] FOREIGN KEY([LocationId]) REFERENCES
    [dbo].[chpt03_Location] ([LocationId])


    Now that roadblock is easily removed whenever the tables need to be readjusted
    for a change to the tables. If you want to add a column, you can update the table
    script, remove the constraints, run the table script, and add the constraints
    back.


    **Performance Considerations**


    Before I get to the next example, there are some considerations to review. Where
    performance is concerned, there are many factors to consider. To tune a slow application
    using a database, there are a few basic steps you can take such as adding indexes
    to your tables and pulling only the necessary data. The indexing will help assemble
    the results more quickly, while pulling less data will reduce the amount of data
    transferred. In the case of very large result sets, leaving off some columns will
    add up to a measurable difference. There are many other changes that can be made
    to enhance performance, but these first two are the low-hanging fruit that will
    typically give the most benefit.


    After you have pulled all data from the database into the web application to display
    on the Web Form, the databound values will be serialized to ViewState. With a
    very large amount of data, the result will be a very large file that the users
    of the website will have to download.


    For a GridView that is showing only 10 of 100 rows, the ViewState can still hold
    all the data for all 100 rows. And although the pages with such large sets of
    data will load quickly during development while you are working on the same computer
    as the web server, it will be painfully slow for a user accessing the website
    remotely. As a rule of thumb, the web page must be under 100 KB, if not under
    50 KB.


    I once worked on a website using a dynamic navigational menu that had ViewState
    and PostBack events covering several levels of the website hierarchy. It included
    a large number of links, which added to the size of the ViewState. The typical
    web page was nearly 300 KB, with over 90 percent of the page content being the
    ViewState. The original developer never knew about this problem as he worked on
    his laptop, and everything was always fast. He never checked the page size or
    how long it took to move from page to page from a remote server.


    This sort of problem should be caught early, when it is easier to fix.


