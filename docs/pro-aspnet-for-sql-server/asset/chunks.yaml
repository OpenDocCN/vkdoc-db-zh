    The service element defines the concrete class, EventService, that implements
    the interface, IEventService, defined by the contract attribute. The interface
    is defined explicitly because it is used to generate the WSDL file that describes
    the web service. If it is not defined, the interface is not a part of the web
    service. It is clearly much easier to create an interface class than to create
    the WSDL file yourself, but you do need to decorate the interface with attributes
    to assist with generating the WSDL output. Listing 10-30 shows the IEventService
    interface.


    **Listing 10-30.** *IEventService Interface*


