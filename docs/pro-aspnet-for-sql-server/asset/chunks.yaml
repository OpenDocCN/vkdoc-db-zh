    **Deploying the Website**


    Moving a website from your development environment to a server can be done in
    many ways.


    The most prescribed way of doing so has been the xcopy command: a standard Windows
    utility for the command line that has many switches, giving you a great deal of
    control over the copying process. Listing 9-6 shows a simple command that copies
    all of the files from the source directory to the destination directory. If there
    are already files in the destination folder, it will only replace the destination
    file if the source file is more current.


    **Listing 9-6.** *Using xcopy*


    xcopy /E/D/Y "D:\SourceDir" "\\Server1\DestinationDir"


    While using xcopy may get the job done some of the time, you may not always want
    to blindly copy files forward. The xcopy command does nothing to ensure that old
    files are removed with each deployment. It also does not adjust the configuration
    for the destination environment. To handle these requirements, you can make use
    of Web Deployment Projects.


