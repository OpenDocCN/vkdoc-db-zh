    Using Embedded Scripts


    Database updates can be integrated directly within your application by embedding
    scripts right in the assembly with the rest of your data access layer. Initially
    when the application is used, the database can be initialized, and future releases
    of the application can update the existing database schema with the embedded scripts.
    This will all be done automatically and transparently.


    Upgrading a website can be as simple as copying the new assemblies into place,
    which automatically restarts the worker process. The database updates will be
    applied automatically.


    Such functionality is not an automatic feature of ASP.NET but can be implemented
    with the building blocks that are available in the application. For the following
    examples, you will


