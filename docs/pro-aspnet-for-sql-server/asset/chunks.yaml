  trans: "\n# 第 7 章：手动数据访问层\n\n作为创建数据访问层的开发人员，您将创建标记有 `DataObject` 属性的类，其方法标记有 `DataObjectMethodType`\
    \ 属性，这些属性指明了该方法将为 `ObjectDataSource` 提供什么。表 7-1 列出了 `DataObectMethodType` 的各个值。\n\
    \n## 表 7-1. DataObjectMethodType 枚举\n\n*   `Insert`\n    表示执行插入操作的方法\n*   `Update`\n\
    \    表示执行更新操作的方法\n*   `Delete`\n    表示执行删除操作的方法\n*   `Select`\n    表示检索数据的方法\n\
    *   `Fill`\n    表示填充 `DataSet` 的方法\n\n![图 30](img/index-205_1.jpg)\n\n当使用数据访问层的开发人员将\
    \ `ObjectDataSource` 拖到设计界面上时，向导面板将首先引导开发人员选择任何标记为 `DataObject` 的类，然后为所选类选择带有\
    \ `DataObjectMethodType` 属性的方法。它向开发人员显示返回类型和参数，以及方法名——方法名应足够明确以表明其功能（见图 7-4）。\n\
    \n## 图 7-4. ObjectDataSource 向导方法选择\n\n通过引导开发人员找到正确的对象和方法，您可以大大简化他们的工作，同时鼓励他们使用正确的方法。翻查源代码并猜测该使用哪些类和方法会花费更多时间，并且如果他们选择错误，可能会引入问题。更糟糕的是，他们可能会放弃并绕过数据访问层直接访问数据库。通过鼓励开发团队使用\
    \ `ObjectDataSource` 和正确构建的数据访问层，他们将习惯于以这种方式使用设计界面来构建应用程序，并期望数据库开发人员为他们提供实现应用程序功能所需的类和方法。建立了这种关系后，随着应用程序开发人员开始依赖数据库开发人员，您可以开始规范沟通。\n\
    \n## 设计契约\n\n当应用程序开发人员显示一组关于产品的数据时，他们将使用像 `GridView` 这样的数据绑定控件。而当开发人员使用 `ObjectDatasSource`\
    \ 通过您创建的数据访问层将数据绑定到该 `GridView` 时，他们将选择一个符合需求的类和方法。当选择一个名为 `ProductDomain` 的对象，它有一个名为\
    \ `GetAllProducts` 的方法并返回 `ProductCollection` 时，开发人员会认为这是正确的选择。但这些名称不应仅仅表示与产品有关。名称和对象代表了数据访问层正在维护的、供任何使用它的应用程序使用的**设计契约**。这些对象和方法如何收集数据并返回并非设计契约的一部分细节，但有哪些方法可用以及它们返回什么则很重要。违反契约将导致运行时异常。\n\
    \n另一个同样返回 `ProductCollection` 的、名为 `GetProductsByCategory` 的方法应包含与 `GetAllProducts`\
    \ 方法返回的相同的列。`ProductDomain` 类上的方法可以设置为 `public` 或 `private`。将它们设为 `private` 会明确地将其排除在设计契约之外。对于\
    \ `public` 方法，您可以使用 `DataObjectMethodType` 来标记它们，以定义该方法的预期用途。在使用了返回 `ProductCollection`\
    \ 的方法后，开发人员应能够使用 `ProductDomain` 类上的其他方法，而不必担心数据与预期不同。\n\n随着应用程序开发人员需要数据访问层提供功能，设计契约将进行协商以纳入所需内容以及何时提供。并且在新功能发布后，未经适当通知应用程序开发人员，不得更改契约。\n\
    \n## 数据契约\n\n在开发人员将其应用程序通过隐含的设计契约接入您的数据层后，还存在另一个协议。设计契约定义了数据流经的管道，但传递的消息必须用**数据契约**来定义。如果\
    \ `ProductCollection` 持有的 `Product` 对象具有名为 `ProductName`、`ProductNumber` 和 `Price`\
    \ 的属性，则必须维护该数据契约。一旦数据绑定设置完成，日后更改该名称即使不是不可能，也会非常困难。\n\n数据契约包括字段的名称及其类型。如果 `ProductName`\
    \ 是 `String` 类型而 `Price` 是 `Decimal` 类型，那么对于数据访问层的未来版本，它应始终保持如此。数据绑定将使用这些名称进行声明，并期望绑定首次声明时定义的类型。更改数据契约将需要更新应用程序以防止运行时异常。\n\
    \n当然，有时数据契约必须更改，正如数据本身也会变化一样。在这样做时，您应首先将版本号递增到下一个重要的值。然后，您应生成文档解释任何破坏性更改，以及开发人员应如何调整其应用程序以适应新的数据契约。您还可以在过渡期内提供帮助，此时旧的数据契约会被维护，并设定一个明确的结束日期。\n\
    \n在一个简单的场景中，您从一个 `Person` 对象开始，它有一个 `Name` 属性代表一个人的全名。后来，由于需求变更，`Name` 被拆分为名为\
    \ `FirstName`、`MiddleInitial` 和 `LastName` 的属性。您可以通过添加新属性同时保留旧属性来启动一个过渡期。清单 7-6\
    \ 显示了一个标记为 `Obsolete` 的方法。\n\n## 清单 7-6. 拆分 Name 属性\n\n```csharp\n/// <summary>\n\
    /// 期望格式如 \"John Q Public\" 或 \"John Public\" 的名称\n/// </summary>\n[Obsolete(\"\
    请使用 FirstName, MiddleInitial 和 LastName\")]\npublic string Name\n{\n    get\n\
    \    {\n        if (String.IsNullOrEmpty(MiddleInitial))\n        {\n        \
    \    return FirstName + \" \" + LastName;\n        }\n        return FirstName\
    \ + \" \" + MiddleInitial + \" \" + LastName;\n    }\n    set\n    {\n       \
    \ string[] parts = value.Split(\" \".ToCharArray()[0]);\n        FirstName = parts[0];\n\
    \        if (parts.Length > 2)\n        {\n            MiddleInitial = parts[1];\n\
    \            LastName = parts[2];\n        }\n        else if (parts.Length >\
    \ 1)\n        {\n            MiddleInitial = String.Empty;\n            LastName\
    \ = parts[1];\n        }\n    }\n}\n```\n\n在清单 7-6 中，`Name` 属性包装了新引入的属性，以维护现有的数据契约，同时为开发人员提供开始迁移其应用程序的选择。为了帮助开发人员，在\
    \ `Name` 属性上放置了 `Obsolete` 属性，以便在他们的代码编译时显示警告。警告包含一条有用的信息，说明现在应使用哪些属性。\n\n也许您的数据访问层初始版本为\
    \ 1.2.0.8。当您应用这些过渡性更改时，将版本设置为 1.2.1.0 并发布给开发人员。过渡期结束后，您可以将版本号更显著地提升，比如到 1.3.0.0\
    \ 甚至 2.0.0.0，这应该能促使开发人员意识到已经发生了重大更改。如果开发人员只看到非常小的版本号增加，他们可能会认为这只是一个次要的错误修复版本，并在没有适当评估和考虑更改的情况下开始使用它。\n"
- fmt: '## Testing the Design and Data Contracts


    Because you cannot fully leverage compile-time support to ensure that runtime
    exceptions are avoided, you must test your application. Naturally, this is a good
    place to add automated tests. These tests would confirm that the data retrieved
    from the datasource includes the expected fields with the proper types.


    These tests can be done at two separate levels. Directly on top of the data access
    layer, a set of unit tests can ensure that the expected data is returned; a test
    database is populated with specific data that the data access layer and the tests
    use to return a consistent result.


    After the data access layer passes those tests, the next step is to include integration
    tests that account for the data being used through data binding.


    Testing code is fairly easy. Testing data binding on a web page is not so easy.
    This step now requires loading up each page and checking that each value looks
    right and does not cause an exception. Tools such as Microsoft Visual Studio Team
    System offer tools to create and run such tests. Alternatively, you can use Selenium
    from OpenQA, which offers cross-browser and cross-platform testing functionality
    for web pages.


    In these integration tests, you load up the page and verify that the expected
    values appear on the page.


    ## Building the Database


    Whenever I build an application, I always start with the database. It is a bottom-up
    approach.


    I know what data I will be managing and what I will need to do with the data,
    so I first plan what the database will hold, how relationships among the data
    will work, and how the application will interact with it. By keeping the scope
    of the work limited to just the database, the work progresses more quickly without
    any distractions about the interfaces or other ancillary details. After the database
    functionality is completed, building the front end of the application is much
    easier.


    In this chapter, you will build a social bookmarking website that holds onto links
    and features a tagging system for browsing the links. The profiles will be directly
    integrated with the standard `ASP.NET Membership User` accounts so that you can
    leverage all the other features available to `ASP.NET` for managing user accounts.


    ## Creating the Database Structure


    The data structure will hold onto the links and tags and the association to the
    `Membership User`. It will be broken up in a fully normalized way to reduce the
    storage requirements as well as optimize the speed of access to the data. My assumption
    is that many users will use the application and that different users will save
    the same links and use the same tags, so I will want to store that common data
    only once and hold onto just the relationships to that data.


    Figure 7-5 lists the database structure. It shows the central piece is the `FavoriteLinks`
    table with all the related data around it.


    ![Image 31](index-209_1.png)


    **Figure 7-5.** Database structure


    ## Consolidating the Data


    Because many users will store the same URL and title as a part of their links,
    that data is held in tables separate from the `FavoriteLinks` table. When a user
    stores a link for `http://youtube.com/`, the save procedure will create a new
    record in the `LinkUrls` table. The next user to save the same link will simply
    point to the existing record. The same is true for the `LinkTitles` table for
    any titles used with the links. This way, the least amount of data possible will
    be stored in the database.


    Reducing the duplication of data also cuts down on the cost of a full table scan
    as well as a range scan of the tables. In the stored procedures to follow, efforts
    are made to ensure that the data is pruned of any unused data and that the database
    is as small as possible. When a link or a tag is no longer used by any user, it
    will be removed from the database.


    ## Managing Relationships


    Data does not live in a vacuum. There will likely be many relationships between
    the tables in the average database. The kinds of relationships can be broken down
    into three groupings:


    * `one-to-one`

    * `one-to-many`

    * `many-to-many`


    A `one-to-one` relationship may not be terribly useful at first glance, but consider
    how you could break up the data. You could hold information about the most accessed
    data about a user in one table and hold the extra details in another. I call the
    first table the summary table and the second one the detail table. And I may have
    multiple detail tables. In the `FavoriteLinks` database, the `Membership User`
    record has a relationship with a single Favorite Link profile. This was not an
    effort to normalize the data but to keep the data grouped by use. A table with
    30 columns will be difficult to query in terms of the hard drives scanning each
    record, not to mention reading and maintaining the indexing. By breaking up the
    data, you can enhance performance.


    When it is broken up, you also have the opportunity to consider partitioning the
    data for further performance gains.


    You will want to carefully group your data among the tables to create the least
    number of joins possible across all the queries necessary for your application.
    Ideally, you would be accessing the detail tables directly with their primary
    key after you have accessed the related record from the detail table.


    The next kind of relationship is `one-to-many`. For the `FavoriteLinks` database,
    there are several `one-to-many` relationships. A record in the `Profile` table
    can have many references to the `FavoriteLinks` table. The child record points
    back to the parent in each instance to allow for multiple relationships. These
    child-to-parent references are done with foreign keys, which require the pairing
    of one column from the child record to the primary key of the parent record. This
    implies access to an indexed column, which helps speed queries that make use of
    these relationships. Surprisingly, I have come across databases that did not formally
    use foreign keys. The relationships were there, but the extra step to add foreign
    key constraints to the database was not put forth. I am sure the developers who
    created such databases did not want to bother themselves with having to cope with
    foreign key constraints as they prepared their applications for the first release.
    A simple script to add and remove the constraints would have eliminated that problem.


    I also find that when there are no foreign key constraints in a development database,
    the relationships can get a bit sloppy. You may have child records left behind
    when parent records are deleted, which adds up over time and fills your database
    with garbage data. When I work with a new database or maintain an existing one,
    I keep the foreign key constraints in place as I develop the stored procedures
    to ensure that I respect those relationships. It is simple enough to adjust a
    stored procedure to take the necessary steps to satisfy the requirements of a
    constraint.


    Finally, there are `many-to-many` relationships logically, but they should not
    be represented directly with two tables. It is necessary to break such relationships
    into three tables, with the table in the middle acting as the link between two
    `one-to-many` relationships. In the current database, the `FavoriteLinks` database
    has a `many-to-many` relationship with the `TagTokens` table, which is organized
    with the `LinkTags` table. For this relationship, the same tag can be placed on
    the many links, and a single link can have many tags. I chose to call the table
    in the middle `LinkTags`. It is useful for the table in the middle to take parts
    of the related tables.


    This structure makes it easy to identify these "bridge" tables and to show the
    relationships at a glance.


    ## Created and Modified'
