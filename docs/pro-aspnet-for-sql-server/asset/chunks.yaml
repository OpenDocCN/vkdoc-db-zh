    C H A P T E R 3 ■ D ATA B A S E M A N A G E M E N T


    With this ObjectDataSource, you can page through thousands of rows quickly and
    efficiently. It also reduces the amount of data moved from the database to the
    web application.


    **Stability Considerations**


    The link between the application and the database is often taken for granted.
    As a result, it is not given enough protection nor treated as a true integration
    point. As much as we would like a database query to be as reliable as looping
    over an array of objects in memory, it is not. Part of the disconnected nature
    of the database is the ability to change the application or database independently
    of the other, and despite our best efforts to keep them compatible, it is easy
    to change one without adjusting the other properly.


    With a Typed DataSet, the schema is very strict. The slightest change on a single
    column will cause the application to break. Changing the name of a column will
    cause unwanted behavior on a Nontyped DataSet. When the relationship between the
    application and the database is treated as an integration point, the approach
    and assumptions change. And that change will allow for additional steps to be
    taken to ensure the stability of the integration.


    Later in this chapter, you will see what the options are for working with the
    data and what you can do to ensure that this important link stays reliable.


    **ISOLATING CHANGES**


    A primary goal of any software project should be to minimize the amount of maintenance.
    When a database used by several applications changes, it can generate a great
    deal of work to update all of the applications.


    But the changes could be isolated to a choke point, where all applications share
    a dependency. Consider placing your Typed DataSets and domain classes in a class
    library, which creates an assembly to be used by all the applications. When the
    database schema changes, the class library can be updated and deployed to each
    of the applications. In the case of a growing VARCHAR, it is easily absorbed into
    .NET because the String object is not concerned with the size and will not throw
    an exception if this class library suddenly starts returning longer String values.
    There may still be adjustments to be made, such as validation control properties,
    but this approach avoids updating a Typed DataSet reference in each application
    by isolating the change to a single point. And with this single point of access
    to the database, we have the perfect opportunity to test the class library to
    ensure that the changes in the database have been synchronized with the code.


    **Unit Tests for Data**


    Instead of manually testing every change each time a change is made, you can use
    unit tests, which can run a whole suite of tests automatically. These tests can
    confirm that each stored procedure and domain method do as they are requested
    and can give you an early warning when something does break. The early warning
    gives you the opportunity to correct the problem soon after the breaking change
    is made so you can more easily identify and fix it. If a problem were to go unnoticed
    until the application was being prepared for deployment, identifying the cause
    would be quite difficult, which would make it harder to make a correction.


    The most popular unit-testing framework for .NET is NUnit. It is a simple framework
    used by placing attributes on classes and methods to indicate that they are part
    of a test suite. The


    8601Ch03CMP2 8/22/07 8:05 PM Page 71


    C H A P T E R 3 ■ D ATA B A S E M A N A G E M E N T


    **71**


    NUnit test runner will load an assembly, look for these attributes, and dynamically
    build a collection of tests to be run. In each test you will make calls into the
    database and check the return values with Assert statements, which will be either
    succeed or fail. When a test suite succeeds in all tests, the indicators are all
    green. But when a test fails, it is lit up in red.


    After unit tests are in place and the test suite comprehensively covers your code
    base, each developer can run the tests prior to committing changes to the source-control
    system.'
