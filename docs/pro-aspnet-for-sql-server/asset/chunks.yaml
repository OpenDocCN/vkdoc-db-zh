    cost does not have a significant impact on the time to load the data into the
    FavoriteLink objects.'
  trans: "\n在开发应用程序时，您会希望传递符合业务逻辑的对象。像 `Customer` 这样的业务对象具有诸如 `FirstName`、`LastName`、`CurrentOrder`\
    \ 和 `LastOrder` 等属性。这个业务对象完整实现了对象的三个部分：数据、行为和关系。`Customer` 拥有姓氏和名字，并与他的当前订单及上次订单存在关联。`Customer`\
    \ 也可以完成他的 `CurrentOrder`。这些都是应用程序所有者理解并通过精心设计的业务对象传达给开发团队的流程。您无需将数据分散地存储在直接映射关系型数据库结构的\
    \ `DataSet` 中，而是有机会真正地为应用程序表示现实世界的对象。除了恰当地表示现实世界的对象之外，您还可以将这些业务对象背后的数据访问层完全封装起来，这为您提供了使用延迟加载等技术的机会，从而在保持统一公共接口的同时提升性能。\n\
    \n“收藏链接”网站的核心业务对象是 `FavoriteLink` 对象。作为一个业务对象，它持有链接的各种属性，如 `Title`、`Url`、`Rating`、`Note`\
    \ 和 `Tags`。这些属性中的每一个都由调用存储过程返回的列填充。映射这些值可能是一项相当繁重的工作，尤其是在应用程序的早期阶段，当您仍在调整列和属性时。更新映射可能非常耗时。\n\
    \n## 加载数据\n\n反对手动创建自有数据访问层的最有力论据之一，可能是将数据从数据库映射到对象所需的工作量。自对象与关系型数据库结合使用以来，对象/关系映射就一直是一个普遍问题。这些通常不兼容的系统之间的阻抗失衡要求您理解两端是如何构建的，以便利用这种理解将它们映射到一起。\n\
    \n实现 O/R 映射的一种方法是创建配置文件，显式设置每个数据列与对象属性之间的映射。流行的 O/R 映射工具如 `NHibernate` 使用了大量定义所有映射的\
    \ XML 配置。许多人认为这是满足 O/R 映射需求的强大解决方案。但我认为这是一个额外且不必要的层。\n\n为了简化 O/R 映射工作，我创建了一个基类，该基类通过匹配可写属性的名称和类型，自动将数据列映射到属性。\n\
    \n由数据访问层填充的每个业务对象都继承此基类。一个加载方法接受 `DataRow`，而另一个接受 `IDataReader` 对象来设置属性。通过反射，基类将来自查询的列与业务对象中的属性进行比较。我称此基类为\
    \ `DomainObject`。它始终提供的核心属性是 `ID`、`Created` 和 `Modified`。当我向存储过程添加新列，并向业务对象添加新属性时，这些值会自动加载到对象中，无需任何额外工作。（请参阅代码下载中的\
    \ `DomainObject` 类。）我确保 `DomainObject` 可以与 `DataSet` 或 `IDataReader` 协同工作，因为两者在不同场景下都有其价值。我始终希望保持在它们之间切换的灵活性。例如，我可以在数据访问层深处缓存\
    \ `DataSet`，因为它持有数据，而 `IDataReader` 只是一个数据枚举器，只能使用一次。但 `IDataReader` 更快，因此如果我不缓存数据，就可以利用\
    \ `IDataReader` 的速度优势。\n\n当从数据库提取数据并且代码循环处理结果时，我们会将 `DataRow` 或 `IDataReader`\
    \ 传递给业务对象的加载方法，以准备将其发送回应用程序层。这些对象被保存在一个 `FavoriteLinkCollection` 对象中，如代码清单 7-31\
    \ 所示。\n\n### 代码清单 7-31. FavoriteLinkCollection 对象\n```csharp\nusing System.Collections.Generic;\n\
    \nnamespace Chapter07.Domain\n{\n    /// <summary>\n    /// FavoriteLink 对象的集合\n\
    \    /// </summary>\n    public class FavoriteLinkCollection : List<FavoriteLink>\n\
    \    {\n    }\n}\n```\n\n请注意，`FavoriteLinkCollection` 对象只是继承自泛型集合 `List<FavoriteLink>`，这为我们提供了一个简洁的对象，便于后续扩展。它也是使用\
    \ `FavoriteLink` 业务对象进行强类型化的。可以使用 `DataSet` 来填充 `FavoriteLinkCollection`，如代码清单\
    \ 7-32 所示。\n\n### 代码清单 7-32. 使用 DataRow 加载\n```csharp\nprivate void AddToFavoriteLinkCollection(\n\
    \    FavoriteLinkCollection collection, DataSet ds)\n{\n    if (ds.Tables.Count\
    \ > 0)\n    {\n        foreach (DataRow row in ds.Tables[0].Rows)\n        {\n\
    \            FavoriteLink fl = new FavoriteLink(row);\n            collection.Add(fl);\n\
    \        }\n    }\n}\n```\n\n`FavoriteLink` 对象的一个构造函数简单地接受一个 `DataRow`，并在内部调用\
    \ `DomainObject` 定义的加载方法。或者，也可以使用 `IDataReader` 以获得可能更好的性能，如代码清单 7-33 所示。\n\n\
    ### 代码清单 7-33. 使用 IDataReader 加载\n```csharp\nprivate void AddToFavoriteLinkCollection(\n\
    \    FavoriteLinkCollection collection, IDataReader dr)\n{\n    while (dr.Read())\n\
    \    {\n        FavoriteLink fl = new FavoriteLink(dr);\n        collection.Add(fl);\n\
    \    }\n}\n```\n\n`FavoriteLink` 对象还包含一个接受 `IDataReader` 的构造函数，该构造函数被传递给加载方法。在\
    \ `DataSet` 和 `IDataReader` 的情况下，用于填充 `FavoriteLink` 的列应该是相同的，尤其是在它们调用相同的存储过程时。\n\
    \n## 调整数据加载\n\n由于使用反射会产生性能损耗，在用反射加载数据与直接将数据转换到业务对象属性之间存在明显的性能差异。如果您知道一个名为 `Title`\
    \ 的数据列是 `String` 类型，您可以简单地通过直接转换对象来设置属性，如代码清单 7-34 所示。\n\n### 代码清单 7-34. 将数据值直接转换到属性\n\
    ```csharp\nthis.Rating = (int)row[\"Rating\"];\n```\n\n如果该列是 `int` 类型且值不为 null，这将会奏效——但这从来都不是一个保证。\n\
    \n由于数据库是断开连接的，并且可以独立于应用程序进行更新，数据库的更改可能是一个潜在问题。使用反射的方法创建了匹配名称和类型的映射。每次使用映射设置属性值时，都会检查数据列是否为\
    \ null 值，这种检查消除了类型转换错误的风险。这种保护确实是有代价的。幸运的是，这种代价已经被最小化了。\n\n`FavoriteLink` 对象通过设置一个静态枚举值，能够在反射和直接转换模式之间切换。此设置允许测试两种模式的性能。此数据访问层的单元测试包括加载测试，用于测量加载大量\
    \ `FavoriteLink` 对象所需的时间，然后显示两种模式的平均时间。这些加载测试包含在本章的代码下载中。\n\n这些加载测试在运行大量项目时显示，反射的开销对将数据加载到\
    \ `FavoriteLink` 对象中的时间没有显著影响。\n"
- fmt: 'The performance has been refined to minimize the cost of reflection. The mappings
    created by using reflection are created once when the first object is loaded.
    The mappings are reused for every new instance so that the performance penalty
    is nearly eliminated while the benefits are gained.


    However, if you want to take advantage of directly casting the data columns to
    properties without using reflection, the load methods are marked as `virtual`
    so you can override them.


    ## Building the Website


    With the data access layer ready to use, we can now start assembling the website.
    The data will be brought into the website by using `ObjectDataSources` that are
    associated with databound controls held in user controls. The user controls can
    be placed on any page, wherever they are needed. The pages will also use a single
    master page for the website.


    The user controls created for the website will become the building blocks for
    the website, and these building blocks will interface directly with the data access
    layer. A user control may then expose properties, methods, and events to the parent
    container to provide rich functionality for the user interface layer.


    You may choose to start building the website with just large pages, but you will
    soon have pages with 2,000-line code-behind files, which are hard to organize
    and maintain. Starting with just a page is a good way to prototype a new interface,
    but ultimately you will want to break out the sections of a page into the user
    controls for maintainability and to take advantage of decoupling the various sections
    of a page into well-defined containers.


    Ultimately, you may choose to convert a user control into a server control, which
    can be deployed purely as an assembly. This conversion makes the control work
    well as a dependency on many websites with minimal effort. A server control requires
    more work to create and maintain, so creating one from the start is not normally
    the best first step. As a user control matures, it may eventually be a good candidate
    for conversion. Currently, if you want to use a user control across multiple websites,
    you have to copy the `.ascx` markup file to each website along with either the
    code-behind file or a compiled assembly for the code-behind. If a user control
    will be useful across many websites, it will be desirable to take the extra step
    to make it into a server control.


    Over time you may have a suite of user controls and server controls, much like
    all of the standard controls in the Toolbox in Visual Studio. This may lead to
    a set of databound controls much like the Login controls, which integrate directly
    with the Membership provider system.


    The following sample pages and user controls are designed with such a goal in
    mind.


    ## Connecting the Data Access Layer


    Because the data access layer is a class library within the same solution, it
    can be associated to the website by using a project reference. Because an ASP.NET
    website does not have a project file, the reference is stored by the solution
    instead. The connection string name is set to `FavoriteLinks`, so the `Web.config`
    file should include a connection string with the same name.


    Using a hard-coded string for the connection string name may be sufficient when
    a website is simple, but as it grows and more components are created, coordinating
    all the hard-coded strings will become difficult.


    As your website becomes more complex, you can implement custom configuration sections
    that define settings for each of your components, such as the connection string
    name.


    Then you can adjust the connection string name of a component by using the custom
    configuration. Creating a custom configuration is covered in Chapter 9. The sample
    project for this chapter uses a custom section to define the database connection.


    ## Creating User Controls'
