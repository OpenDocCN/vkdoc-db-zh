- fmt: "If you keep track of the keys you use to place items into the cache, you can\
    \ use them to call the `Remove` method on the cache to manually remove the items.\
    \ And when you call the `Insert` method when an item already exists by the same\
    \ key, you actually cause the existing item to be removed as you add the new item.\
    \ Perhaps as users log into your website you load up their data and place it into\
    \ the cache using a key such as `UserData-JSmith`, and when their session expires\
    \ or when they log out, you proactively ask the cache to remove such keys as you\
    \ will not be using them again until they return. The data does not have to be\
    \ in the cache when you request it to be removed, but because you would know the\
    \ username, it will be possible to assemble the key used to place the data into\
    \ the cache. If the data stored for this user is significant, this approach may\
    \ help make space for other items to remain in the cache longer, improving performance.\n\
    \n# SQL Cache Dependencies\n\nData can be automatically removed from the cache\
    \ when the data in the database changes by attaching dependencies to the cached\
    \ items. A dependency will override the expiration or sliding window for the cached\
    \ items immediately once a database change has been detected.\n\n# Using the SqlDependency\
    \ and SqlCacheDependency\n\nThere are a couple of ways to tie a dependency to\
    \ a cached item to inform you when the data has changed. The `SqlDependency` is\
    \ the baseline mechanism that communicates with SQL Server to monitor the database\
    \ for changes. (Note that `SqlDependency` is not the same as `SqlCacheDependency`.)\
    \ Table 6-3 shows the members of the `SqlDependency` object.\n\n**Table 6-3.**\
    \ `SqlDependency` Members\n\n**Name** | **Type** | **Description**\n--- | ---\
    \ | ---\n`Id` | `Guid` | Read-only property\n`HasChanges` | `Boolean` | Read-only\
    \ property\n`OnChange` | Event | Event\n\nThe `Id` and `HasChanges` properties\
    \ are the only properties on the `SqlDependency` object, and they are read-only.\
    \ The `OnChange` event is raised when a dependency change occurs that gives you\
    \ access to the `Id` and `HasChanges` properties on the `SqlDependency` object.\
    \ Because the `Id` property is created with a random `Guid` value, it is not terribly\
    \ useful.\n\n**Listing 6-20.** The `OnChange` Handler Method\n\n```\nvoid OnChangeHandler(object\
    \ sender, SqlNotificationEventArgs e)\n{\n    SqlDependency sqlDependency = (SqlDependency)\
    \ sender;\n    // sqlDependency.Id is a random Guid\n}\n```\n\nshows an `OnChange`\
    \ event handler. Because you cannot use the `Id` property to identify the key\
    \ used to place the changed item into the cache or the item itself, you may choose\
    \ to just use the `SqlCacheDependency` object instead, which does provide these\
    \ useful details.\n\n## Why Use SqlDependency?\n\nThere are clear limitations\
    \ of `SqlDependency` when compared to `SqlCacheDependency`, which manages items\
    \ in the cache for you. But if you want to ensure that items are not ejected from\
    \ the cache, you can manage your own collection and use the `OnChange` event to\
    \ remove items from the collection to keep it current. You will have to understand\
    \ that items placed in your managed collection will take up memory until you remove\
    \ those items. You already know the cache will manage memory usage and eject items\
    \ from the cache when it determines memory space needs to be cleared for new items.\
    \ Depending on your needs, you may decide to make this trade-off.\n\nTo enhance\
    \ the use of the `SqlDependency`, it will be necessary to get the parameters used\
    \ in the originating query into the `OnChange` event handler. This can be done\
    \ with an anonymous method that is created as a delegate. The inline block of\
    \ code will have access to the parameters of the enclosing method, so it will\
    \ not be necessary to make use of the `Guid` value on the `SqlDependency`.\n\n\
    In Listing 6-21, a method is given an integer value named `productId`, which is\
    \ used as a parameter passed to a stored procedure that retrieves a product from\
    \ the database. This integer value is used as the index value for the managed\
    \ collection.\n\n**Listing 6-21.** Anonymous Method with a Delegate\n\n```\nSqlDependency\
    \ sqlDependency = new SqlDependency(sqlCmd);\nOnChangeEventHandler onChangeHandler\
    \ =\n    delegate(object sender, SqlNotificationEventArgs e)\n    {\n        dataItems.Remove(productId);\n\
    \    };\nsqlDependency.OnChange += onChangeHandler;\n```\n\nNotice how the signature\
    \ of the delegate matches the required signature of the `OnChange` event. The\
    \ block of code also directly references the `productId` even though this event\
    \ may not fire until long after the enclosing method has passed. This is a powerful\
    \ technique that can be used for just a single query parameter or many.\n\nTo\
    \ construct the `SqlDependency` requires a standard `SqlCommand` object. Because\
    \ you are using the Data Access Application Block, you have a `DbCommand` instead.\
    \ Conveniently, it can be cast as a `SqlCommand` and used to construct the `SqlDependency`.\n\
    \nYou can also add more `SqlCommand` objects to the `SqlDependency` with the `AddCommandDependency`\
    \ method. Listing 6-22 shows how many commands are added to the same `SqlDependency`.\n\
    \n**Listing 6-22.** Multiple `SqlCommand` Dependencies\n\n```\nSqlDependency sqlDependency\
    \ = new SqlDependency();\nsqlDependency.AddCommandDependency(productSqlCmd);\n\
    sqlDependency.AddCommandDependency(pricingSqlCmd);\nsqlDependency.AddCommandDependency(inventorySqlCmd);\n\
    OnChangeEventHandler onChangeHandler =\n    delegate(object sender, SqlNotificationEventArgs\
    \ e)\n    {\n        dataItems.Remove(productId);\n    };\nsqlDependency.OnChange\
    \ += onChangeHandler;\n```\n\nIf the data among the three commands in Listing\
    \ 6-22 actually do invalidate each other, it does make sense to bind them together\
    \ in this way. However, you may never have a reason to do this. If the pricing\
    \ data changes, it most likely will not require you to get updated product and\
    \ inventory data, but the option is there if you need it.\n\n## Using the SqlCacheDependency\n\
    \nThe `SqlCacheDependency` makes use of the `SqlDependency` to remove data from\
    \ the cache when a dependency changes. It derives from the `CacheDependency` base\
    \ class, which is one of the parameters used when inserting an item into the cache.\
    \ Table 6-4 shows the `SqlCacheDependency` constructors.\n\n**Table 6-4.** `SqlCacheDependency`\
    \ Constructors\n\n**Parameters** | **Callback Mechanism**\n--- | ---\n`String\
    \ dbName`, `String tableName` | Polling\n`SqlCommand sqlCmd` | Notifications\n\
    \n### Polling\n\nWhen a `SqlCacheDependency` is created with a database and table\
    \ name, it will monitor the table for changes. Monitoring the table is done with\
    \ the polling features that are available with SQL Server 2000 and 2005. The way\
    \ polling works is by attaching a trigger to the table to be monitored that is\
    \ fired with each `insert`, `update`, and `delete` statement. The trigger increments\
    \ a number in a status table for this source table to indicate that the table\
    \ has been changed.\n\nWhen a table is being monitored, this status table is polled\
    \ for that number to check whether it has changed.\n\n### Enabling Polling for\
    \ a Table\n\nPolling is enabled using the `aspnet_regsql.exe` utility. I use the\
    \ script in Listing 6-23 to enable the `Production.Product` table in the AdventureWorks\
    \ sample database. First the services to manage dependencies must be enabled and\
    \ then the specific table must be enabled.\n\n**Listing 6-23.** Add SQL Cache\
    \ Dependencies.cmd\n\n```\n@echo off\nset REGSQL=\"%windir%\\Microsoft.NET\\Framework\\\
    v2.0.50727\\aspnet_regsql.exe\"\nset DATABASE=AdventureWorks\nset DSN=\"Data Source=.\\\
    SQLEXPRESS;Initial Catalog=%DATABASE%;Integrated Security=True\"\necho Registering\
    \ dependencies\n%REGSQL% -C %DSN% -ed\necho Registering Production.Product table\n\
    %REGSQL% -C %DSN% -et -t Production.Product\nPause\n```"
