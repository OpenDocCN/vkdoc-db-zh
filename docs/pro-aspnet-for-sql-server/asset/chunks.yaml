  trans: "\n# 生成的数据访问层\n\n清单 8-5 中生成的代码仅仅是一个返回给调用方的字符串，用于创建一个新的 `CodeSnippetCompileUnit`\
    \ 类。目前，你只需知道这个类读取代码的字符串值，并将其传递给 `AssemblyBuilder` 类，该类将代码生成到内存中。\n\n**注意：** .NET\
    \ 平台目前正在进行一个新的动态语言运行时 (DLR) 的开发。它将支持诸如 IronPython 和 IronRuby 之类的语言，你随后可以在生产环境中选择使用它们作为\
    \ C# 和 VB 之外的编程语言。许多开发者认为这是一个极好的消息，因为他们觉得这些语言能用更少的代码做更多的事情。随着这些技术逐渐成熟并成为 .NET\
    \ 平台的核心部分，未来几年这个领域值得关注。\n\n## CodeDom 命名空间\n\n为 .NET 平台生成代码可通过 `CodeDom` 命名空间（具体指\
    \ `System.CodeDom`）方便地获得支持。该命名空间将代码表示为一个文档对象模型，可以像操作 XML 一样轻松地操作它。你可以以一种语言中立的方式创建新的类，并向它们添加字段、属性和方法，然后将其生成到诸如\
    \ C# 和 VB 等受支持的语言中。\n\n在清单 8-5 中，代码是作为字符串组装的。你可以使用 `CodeDom` 完成完全相同的工作，这将为你提供更好的结构。通过将代码组装为跨越多行的带引号的字符串，你必须小心地在每个语句末尾添加分号并关闭每个代码块。当使用\
    \ `CodeDom` 以编程方式组装代码时，这些顾虑就消失了。\n\n从一个名为 `AbcBuildProvider` 的新自定义构建提供程序开始，你将定义一种使用\
    \ `.abc` 扩展名的文件的 XML 文件格式。`Web.config` 文件的编译部分现在包含了额外的构建提供程序，如清单 8-6 所示。\n\n###\
    \ 清单 8-6. 为 .abc 文件添加构建提供程序\n\n```xml\n<compilation debug=\"true\">\n  <buildProviders>\n\
    \    <add extension=\".abc\" type=\"Chapter08.BuildProviders.AbcBuildProvider\"\
    />\n    <add extension=\".xyz\" type=\"Chapter08.BuildProviders.XyzBuildProvider\"\
    />\n  </buildProviders>\n</compilation>\n```\n\n新的文件格式将定义一个自定义数据类，构建提供程序将使用每个源文件中定义的字段列表来生成该类。清单\
    \ 8-7 显示了一个示例文件。\n\n### 清单 8-7. Person.abc\n\n```xml\n<?xml version=\"1.0\"?>\n\
    <dataClass>\n  <fields>\n    <add name=\"FirstName\" type=\"System.String\"/>\n\
    \    <add name=\"LastName\" type=\"System.String\"/>\n    <add name=\"BirthDate\"\
    \ type=\"System.DateTime\"/>\n    <add name=\"Location\" type=\"System.String\"\
    />\n  </fields>\n</dataClass>\n```\n\n与 `XyzBuildProvider` 类似，这个新的构建提供程序将使用源生成的类的名称。示例文件\
    \ `Person.abc` 将创建一个名为 `Person` 的类，其包含一组由文件定义的字段和属性。当构建提供程序和网站被编译后，`Person` 类应该对网站可用。\n\
    \n从也为之前的构建提供程序创建的 `GetGeneratedCode` 方法开始，你将调整它以返回一个 `CodeCompileUnit` 而不是字符串，让它将源文件解析为\
    \ XML 流，并处理在 `fields` 元素内定义的每一个字段。清单 8-8 显示了新方法。\n\n### 清单 8-8. AbcBuildProvider\
    \ 的 GetGeneratedCode 方法\n\n```csharp\nprivate CodeCompileUnit GetGeneratedCode()\n\
    {\n    CodeCompileUnit code = new CodeCompileUnit();\n    CodeNamespace ns = new\
    \ CodeNamespace(GetNamespace());\n    CodeNamespaceImport import = new CodeNamespaceImport(\"\
    System\");\n    ns.Imports.Add(import);\n    code.Namespaces.Add(ns);\n\n    string\
    \ className = GetClassName();\n    CodeTypeDeclaration generatedClass =\n    \
    \    new CodeTypeDeclaration(className);\n    generatedClass.IsPartial = true;\n\
    \    ns.Types.Add(generatedClass);\n\n    XmlDocument document = new XmlDocument();\n\
    \    using (Stream stream = OpenStream())\n    {\n        document.Load(stream);\n\
    \        XmlNode rootNode = document.SelectSingleNode(RootPath);\n        if (rootNode\
    \ != null)\n        {\n            ProcessFieldNodes(generatedClass, rootNode);\n\
    \        }\n    }\n    return code;\n}\n```\n\n新的 `GetGeneratedCode` 方法中引用了几种新类型。像\
    \ `CodeNamespace`、`CodeNamespaceImport` 和 `CodeTypeDeclaration` 这样的类型都是 `CodeCompileUnit`\
    \ 的组成部分，用于创建生成的类。`CodeNamespace` 类型是包裹生成类的命名空间。为 `System` 添加了一个 `CodeNamespaceImport`\
    \ 到该命名空间中。你可以根据需要添加其他的导入，就像在 Visual Studio 中编辑源文件时一样。最后，`CodeTypeDeclaration`\
    \ 用于 `generatedClass` 的实例，该实例将保存在清单 8-9 所示的 `ProcessFieldNodes` 方法中定义的字段。\n\n\
    ### 清单 8-9. ProcessFieldNodes 方法\n\n```csharp\nprivate void ProcessFieldNodes(\n\
    \    CodeTypeDeclaration generatedClass, XmlNode rootNode)\n{\n    XmlNodeList\
    \ fieldNodes = rootNode.SelectNodes(FieldsAddPath);\n    foreach (XmlNode addFieldNode\
    \ in fieldNodes)\n    {\n        XmlNode nameNode = addFieldNode.SelectSingleNode(\"\
    @name\");\n        XmlNode typeNode = addFieldNode.SelectSingleNode(\"@type\"\
    );\n        string propertyName = nameNode.Value;\n        string fieldName =\
    \ GetFieldName(propertyName);\n        Type fieldType = Type.GetType(typeNode.Value);\n\
    \n        // private field\n        CodeMemberField field = new CodeMemberField(fieldType,\
    \ fieldName);\n        generatedClass.Members.Add(field);\n\n        AttachProperty(generatedClass,\
    \ propertyName, fieldName, fieldType);\n    }\n}\n```\n\n`ProcessFieldNodes` 方法首先遍历\
    \ XML 源文件中根节点下的所有字段节点。你需要访问的两个节点是 `add` 元素中名为 `name` 和 `type` 的属性。这些引用是通过诸如 `@name`\
    \ 和 `@type` 这样的 XPath 引用来完成的。在 `AbcBuildProvider` 的顶部定义了两个常量来帮助遍历这个 XML 文档。这些\
    \ XPath 常量如清单 8-10 所示。\n\n### 清单 8-10. XPath 常量\n\n```csharp\npublic const string\
    \ RootPath = \"/dataClass\";\npublic const string FieldsAddPath = \"fields/add\"\
    ;\n```\n\n第一个 XPath 常量 `RootPath` 访问第一个 XML 节点，然后允许第二个 XPath 常量 `FieldsAddPath`\
    \ 访问所有保存我们想要使用的属性的 `add` 元素。在清单 8-9 中，读取了这两个节点，稍后用于设置 `propertyName`、`fieldName`\
    \ 和 `fieldType` 变量的值。然后创建一个新的 `CodeMemberField` 实例并将其添加到 `generatedClass` 的 `Members`\
    \ 列表中。这些都是私有成员变量，通过清单 8-11 所示的 `AttachedProperty` 方法定义的属性来访问。\n\n### 清单 8-11.\
    \ AttachProperty 方法\n\n```csharp\nprivate static void AttachProperty(\n    CodeTypeDeclaration\
    \ generatedClass,\n    string propertyName,\n    string fieldName,\n    Type fieldType)\n\
    {\n    // public property\n    CodeMemberProperty prop = new CodeMemberProperty();\n\
    \    prop.Name = propertyName;\n    prop.Type = new CodeTypeReference(fieldType);\n\
    \    prop.Attributes = MemberAttributes.Public;\n\n    CodeFieldReferenceExpression\
    \ fieldRef;\n    fieldRef = new CodeFieldReferenceExpression();\n    fieldRef.TargetObject\
    \ = new CodeThisReferenceExpression();\n    fieldRef.FieldName = fieldName;\n\n\
    \    // property getter\n    CodeMethodReturnStatement ret;\n    ret = new CodeMethodReturnStatement(fieldRef);\n\
    \    prop.GetStatements.Add(ret);\n\n    // property setter\n    CodeAssignStatement\
    \ assign = new CodeAssignStatement();\n    assign.Left = fieldRef;\n    assign.Right\
    \ = new CodePropertySetValueReferenceExpression();\n    prop.SetStatements.Add(assign);\n\
    \n    generatedClass.Members.Add(prop);\n}\n```\n"
- fmt: "The `AttachProperty` method takes in the variables necessary to refer back\
    \ to the related private member variable that the property will access. The property\
    \ is created using the `CodeMemberProperty` type along with `CodeFieldReferenceExpression`,\
    \ `CodeMethodReturnStatement`, and `CodeAssignStatement` classes. This method\
    \ first creates the instance of the property, creates the reference to the field,\
    \ and then adds the getter and setter statements to the property.\nAt the end,\
    \ the property is added to the `Members` collection of the `generatedClass`.\n\
    That is it for the heavy lifting. There are a few small private methods that help\
    \ out the process.\n\n### GetNamespace Method\nThe `GetNamespace` method gets\
    \ the string value from the configuration.\n```\nprivate string GetNamespace()\n\
    {\n    string ns = ConfigurationManager.AppSettings[\"AbcNamespace\"];\n    if\
    \ (String.IsNullOrEmpty(ns))\n    {\n        ns = \"Abc\";\n    }\n    return\
    \ ns;\n}\n```\nThe setting for the `AbcNamespace` should be added to the website\
    \ with the value of `Chapter08.Website`; otherwise it will default to `Abc`.\n\
    \n### GetFieldName Method\nThe `GetFieldName` method converts a property name\
    \ to field name using the naming conventions followed in all of the previous code\
    \ samples with a preceding underscore before the field name.\n```\nprivate string\
    \ GetFieldName(string propertyName)\n{\n    return \"_\" +\n           propertyName.Substring(0,\
    \ 1).ToLower() +\n           propertyName.Substring(1);\n}\n```\nNow when the\
    \ website is compiled along with the build provider, it will generate a new class\
    \ named `Person` with all of the fields shown previously in Listing 8-7. After\
    \ the build has run successfully, you can open the Object Browser and see the\
    \ newly generated class. Figure 8-2 shows the `Person` class with all of the generated\
    \ fields and properties.\nThe original source file is ten lines of XML, and the\
    \ resulting class that it generates is over 60 lines of code that I did not have\
    \ to write. You can take this further: instead of having the XML file define the\
    \ fields directly, the XML data could instead point to a table or stored procedure\
    \ in the database that would provide all of the necessary details to generate\
    \ all of these fields and properties. Several of the popular data access layer\
    \ projects do just that. `SubSonic` and `Blinq`, which are covered later in this\
    \ chapter, both read the schema from the database and generate classes based on\
    \ what it finds. I will show you what these two projects offer. But first, consider\
    \ how you would generate all of this code. Although you would be able to do it\
    \ very quickly with `CodeDom` alone, you should consider templating.\n\n## Templating\n\
    While `CodeDom` gives you a structured way to generate code, using `CodeDom` can\
    \ be tedious and difficult to maintain. `CodeDom` also feels unnatural. As developers,\
    \ we are more comfortable with code that looks like code, not the derivative form\
    \ that `CodeDom` uses to describe the pieces that make up the code. When you skim\
    \ over a set of methods that use `CodeDom` to generate the code, you see references\
    \ to `CodeTypeDeclaration` and `CodeMemberProperty`. When there is a lot of `CodeDom`\
    \ code, it can be hard to follow and piece it together in your mind.\nSo when\
    \ there is a lot of code to be generated, it helps to place sections of code into\
    \ template files that can be read in a form that is as close to the actual code\
    \ as possible. When the code is generated, the process will read these templates\
    \ and load the resulting string into a `CodeCompileUnit` to generate the classes.\n\
    ASP.NET makes use of templates for pages and user controls that are made up of\
    \ largely HTML content along with special directives specific to ASP.NET for controls.\
    \ If it was not done this way, you would have to piece together all of the HTML\
    \ from a source file as was done in the early days of web development.\nGenerating\
    \ all of the fields from the XML file in the previous section only required about\
    \ 100 lines of `CodeDom` code. That is pretty good, but it also only defined the\
    \ fields and properties.\nCreating methods that call the stored procedures, potentially\
    \ with several input parameters, would require a great deal more work with `CodeDom`.\
    \ And as you have seen how a call into a stored procedure is very much boilerplate\
    \ code, especially with the Enterprise Library, you can get a lot of value out\
    \ of templating.\nThe first code generator I will review is `SubSonic`, which\
    \ includes a rich templating system.\n\n### SubSonic\n`SubSonic` is an open source\
    \ project, partially hosted on CodePlex, that has become popular because of the\
    \ many compelling features it provides. Recently, `SubSonic` is in its 2.0 release,\
    \ which added support for the Enterprise Library as well as the ability to generate\
    \ code for more than one database. Visit http://www.subsonicproject.com for more\
    \ details. Here, I will focus on how it uses a template to generate the code and\
    \ how it reads in details from the database to generate the code.\n> **Note**\
    \ CodePlex (http://www.codeplex.com) is the newest code repository provided by\
    \ Microsoft. It features Team System as the source control and work item tracking\
    \ system. A free Team System–enabled version of Visual Studio is available for\
    \ use with CodePlex. CodePlex also supports a basic bridge for TortoiseSVN, a\
    \ Subversion client that integrates with Windows Explorer.\nYou will want to download\
    \ the `SubSonic` project files for this section and place them into the common\
    \ tools folder as shown in Figure 8-3. You will be referencing the command-line\
    \ tool from this location as well as the `SubSonic` assembly. You will also need\
    \ the SQL Server SDK installed if you want to compile the `SubSonic` project.\n\
    Running `SubSonic` is done with the command-line tool called `SubCommander`, which\
    \ processes multiple commands to generate both code and database scripts. The\
    \ `generate` command recognizes many parameters. The most important parameters\
    \ are used with the `/config` and `/out` switches. Listing 8-14 shows a sample\
    \ command used to generate the code for a data access layer.\n\n```console\nsonic.exe\
    \ /config Website\\Web.config /out Website\\App_Code\\Generated\n```\nThe resulting\
    \ classes can be included with your project, which could be a website or a class\
    \ library. Originally, when `SubSonic` was created, it worked exclusively with\
    \ ASP.NET 2.0 websites because it leveraged the Build Provider model, which only\
    \ works with websites. To extend the reach of the generated code, the ability\
    \ to generate the classes to source files was added. Limiting the code generation\
    \ to the website prevented the data access layer from being used as a dependency\
    \ for other types of applications such as desktop and console applications. Several\
    \ developers also did not feel comfortable with the data access layer dynamically\
    \ changing as the database changed.\n> **Note** See the `SubSonic` website (http://www.subsonicproject.com)\
    \ for the full documentation covering the `code generate` command parameters as\
    \ well as walkthrough videos.\n\n### SubSonic Templating\nThe templating system\
    \ in `SubSonic` mirrors the templating system used by ASP.NET. The format of the\
    \ files looks much like the `.aspx` markup files, but instead of generating HTML,\
    \ it generates code for your data access layer. Figure 8-4 shows a sample template\
    \ that is used to generate a class."
