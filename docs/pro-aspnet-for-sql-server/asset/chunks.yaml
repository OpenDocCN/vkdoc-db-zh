    ## 清单 5-26. SiteMapProvider 上的抽象方法


    ```csharp

    public abstract SiteMapNode FindSiteMapNode(string rawUrl);

    public abstract SiteMapNodeCollection GetChildNodes(SiteMapNode node);

    public abstract SiteMapNode GetParentNode(SiteMapNode node);

    protected abstract SiteMapNode GetRootNodeCore();

    ```


    实现这些方法并没有什么特别困难的。真正的工作在于从数据库加载数据并保持其最新。这项工作始于清单 5-27 中的 `Initialize` 方法。

    '
- fmt: "# Listing 5-27. Initialize Method for SqlSiteMapProvider\n\n```csharp\npublic\
    \ override void Initialize(string name, NameValueCollection attributes)\n{\n \
    \   lock (this)\n    {\n        base.Initialize(name, attributes);\n        connStringName\
    \ = attributes[\"connectionStringName\"].ToString();\n        db = DatabaseFactory.CreateDatabase(connStringName);\n\
    \        siteMapNodes = new List<DictionaryEntry>();\n        childParentRelationship\
    \ = new List<DictionaryEntry>();\n        EnsureSiteMapLoaded();\n    }\n}\n```\n\
    \nThe initial infrastructure is prepared here and then the `EnsureSiteMapLoaded`\
    \ method is called. This method is actually called at multiple points throughout\
    \ the class in the event that the `SiteMap` data is updated and has to be reloaded.\
    \ Let’s take a look at this method in Listing 5-28.\n\n# Listing 5-28. EnsureSiteMapLoaded\
    \ Method in SqlSiteMapProvider\n\n```csharp\nprivate void EnsureSiteMapLoaded()\n\
    {\n    if (rootNode == null)\n    {\n        // Build the site map in memory.\n\
    \        LoadSiteMapFromDatabase();\n    }\n}\n```\n\nThe `rootNode` is required\
    \ for the `SiteMap` to work, so setting it to `null` causes the data to be reloaded\
    \ the next time this method is called. I created a mechanism to automatically\
    \ reset the `rootNode` back to `null` when the data is updated.\n\nThe `SiteMap`\
    \ data is loaded from that single table by using a single query. Ultimately, this\
    \ data is loaded from the database and placed into the cache mechanism with a\
    \ one-hour window to live, with the `CachedItemRemovedCallback` attached. When\
    \ it is removed from the cache, it clears the `rootNode`, forcing it to get fresh\
    \ data on the next pass. There are many ways that the cache can be manipulated\
    \ to invalidate a cached item. For the moment, this uses a very simplistic solution.\n\
    \nThe first way the `SiteMap` data will be reset is via the simple one-hour time-out\
    \ period, which is helpful to clear up memory when a cached item is not used.\
    \ I also assumed that I am able to control the `SiteMap` when a change is made\
    \ to the photo album database. What I created was a helper class for the `SqlSiteMapProvider`,\
    \ which removes the item from the cache.\n\n8601Ch05CMP3 8/27/07 8:05 AM Page\
    \ 145\n\n## C H A P T E R 5 ■ SQL PROVIDERS\n\n**145**\n\nThis raises the `CachedItemRemoved`\
    \ event and clears the `rootNode`. In the code for the website, every time an\
    \ album is added or removed, the code also calls this helper class to remove the\
    \ cached item as well as repopulate the `SiteMap` with the new data.\n\nThis is\
    \ not a very elegant approach, but it is functional. In the next chapter, you\
    \ will learn techniques to manage cached data in far more efficient ways without\
    \ resorting to manual calls to clear the data.\n\n## COMMON FOLDER ADDITIONS\n\
    \nThe custom `SiteMap` provider will be useful for many websites because the standard\
    \ XML provider is not typically sufficient. This sample could be placed in your\
    \ `Common` folder under the `Templates` folder (`D:\\Projects\\Common\\Templates\\\
    Provider Model`). The provider model will also be something that you will want\
    \ to implement in future projects, so you may want to also include the Photo Album\
    \ provider, which is available with the sample code download for the book (in\
    \ the Source Code area of the Apress website, http://www.apress.com).\n\n## Summary\n\
    \nThis chapter covered the three major ASP.NET SQL providers and how to adjust\
    \ their behavior to suit your needs. You implemented a provider from the ground\
    \ up and integrated it with a custom implementation of a standard SQL provider.\
    \ The topics covered in this chapter showed how your application can use providers\
    \ as pluggable components. These components are completely interchangeable by\
    \ design, giving you the flexibility necessary to rework whatever part of your\
    \ application that you determine needs to be reworked. This chapter also showed\
    \ you how the interface layer will automatically work with multiple provider implementations\
    \ if you simply adjust the configuration.\n\n8601Ch06CMP2 8/24/07 12:13 PM Page\
    \ 147\n\n# C H A P T E R 6\n\n# Caching\n\nPerhaps the best way to speed up your\
    \ applications is to implement a targeted caching strategy. As you profile an\
    \ application for performance, you will typically find that the time to pull data\
    \ from the database is the most significant delay during a page request cycle.\
    \ And the less data you have to pull from the database, the faster your application\
    \ will perform. The caching mechanisms built into ASP.NET give you a great deal\
    \ of options when it comes to caching, building on a sound foundation with .NET\
    \ 1.1 with additional features in .NET 2.0.\n\nCaching is handled in ASP.NET with\
    \ the `Cache` object, which is a part of the `System.Web.Caching` namespace. And\
    \ despite the fact that it is in the `System.Web` assembly, it can easily be used\
    \ in any .NET application including console and desktop applications. You can\
    \ reference the assembly just like any other. And with an ASP.NET website, the\
    \ `Cache` object can be used in a class library to create a reusable data access\
    \ layer.\n\nThis chapter covers the following:\n\n- Alternatives to caching\n\
    - Caching options\n- Problems with caching\n- Invalidating a cache\n- Performance\
    \ strategies\n\nThe focus of caching in this chapter is on ASP.NET largely due\
    \ to the stateless nature of HTTP. Many strategies and technologies have been\
    \ created to overcome the stateless nature of the request-and-response cycle such\
    \ as cookies and sessions, but the fact remains that websites work in a detached\
    \ mode. In contrast, a desktop application can load data and keep it in memory\
    \ reliably with constant access to it. A desktop application also has a single\
    \ user, which allows the application to take up all resources for that single\
    \ user. These factors reduce the need for desktop applications to use the same\
    \ caching techniques employed in web applications.\n\nWith a website, you could\
    \ be servicing many sessions that hold data for each user, each session taking\
    \ up a memory footprint. If you were to load data into each user’s session that\
    \ takes up 3 MB of space and had 1,000 concurrent sessions, you would already\
    \ be at 3 GB of memory. By default, a session will be kept active until it times\
    \ out after 20 minutes of inactivity. While it not uncommon for a server to have\
    \ 4 GB of memory or more, it is not reasonable to take up that much space. It\
    \ would be better to allow data to drop out of memory when space is needed, such\
    \ as when a peak traffic period occurs, as they do with websites, and suddenly\
    \ there are 5,000 active sessions.\n\n**147**\n\n8601Ch06CMP2 8/24/07 12:13 PM\
    \ Page 148\n\n**148**\n\n## C H A P T E R 6 ■ CACHING\n\nFor a typical visit,\
    \ users may hit a few pages and be gone in less than 10 minutes. Perhaps they\
