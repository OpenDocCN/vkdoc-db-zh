  trans: "\n以及提供跨平台互操作性的 `.asmx` Web 服务，支持诸如 `.NET`、`Java`、`Python` 和 `Ruby` 等多种平台。但业界开始着手定义诸多细节，以通过\
    \ `WS-*` 规范使 Web 服务成为一种功能完备的协议，用于将应用程序作为服务进行分发。其中一些规范涉及请求路由，而另一些则处理安全机制。微软推出了\
    \ Web Service Extensions (`WSE`)，它为这些不断变化的规范增添了功能，直到它们变得相对稳定。随后，微软发布了搭载 `WCF`\
    \ 的 `.NET 3.0`。`WCF` 是对用于 Web 服务的 `WS-*` 规范的丰富实现，但其目的不仅限于使 `.NET` 应用程序与其他平台良好集成。\n\
    \n`WCF` 最终将取代 `.NET remoting` 和 `COM`。\n\n`WCF` 将为我们提供其他技术无法实现的高度灵活性。`WCF` 服务可以自托管在使用该服务的应用程序内部，也可以运行在该应用程序之外的同一服务器或远程服务器上。更改可以通过配置完全实现。通过为提供程序创建\
    \ `WCF` 实现，我们将可以选择将数据访问层移动到在本地或远程单独服务器上运行的服务中，从而有效地分配进入应用程序的负载和流量。\n\n使用 `WCF`\
    \ 的另一个好处是，你可以提供一个丰富的应用层，供多个应用程序同时使用。考虑一个管理工资系统的提供程序，它需要能被多个应用程序访问。如果你有三个使用该提供程序的独立网站，由于它们运行在不同的运行时中，你无法自动地在网站间共享缓存功能。但如果你使用\
    \ `WCF` 实现该提供程序，并将这三个网站都指向这个共享服务，你将受益于拥有一个数据中心化的缓存点，因为你可以控制数据的保存和删除位置，并在确定数据已更改时将其从缓存中移除。\n\
    \n有了共享服务，你实际上可以采取更积极的缓存策略，因为你完全控制着数据的进出。这很类似于使用存储过程作为看守者，但你可以访问 `.NET` 运行时的全部功能。并且，你可以不使用\
    \ `ASP.NET` 缓存，而是简单地持有自己的数据集合，随着数据变化保持其更新，并从内部集合返回所请求的数据，而无需每次查询数据库。\n\n## WCF\
    \ 服务要求\n\n运行 `WCF` 服务需要客户端和服务端。这比仅仅设置一组可以自动相互通信的类要多一些工作。为了让客户端能够工作，服务必须托管并准备就绪。服务还需要位于通过配置设定的已知位置。对于\
    \ `WCF` 提供程序，我们将创建一个新的 `EventProvider`，并在开发期间使用名为 `netTcpBinding` 的绑定，将服务设置为在本地端口上的控制台应用程序内运行。客户端配置如清单\
    \ 10-28 所示。\n\n**清单 10-28.** WCF 客户端配置\n\n```xml\n<system.serviceModel>\n  <client>\n\
    \    <endpoint\n      address = \"net.tcp://localhost:8002/EventService/\"\n \
    \     binding = \"netTcpBinding\"\n      contract = \"DotnetUserGroup.DataAccess.WcfProviders.Events.IEventService\"\
    \n    />\n  </client>\n</system.serviceModel>\n```\n\n客户端将使用 `netTcpBinding` 在同一台机器的\
    \ `8002 端口` 上查找服务。然后，在控制台应用程序中，服务将使用清单 10-29 中的配置。\n\n**清单 10-29.** WCF 服务配置\n\
    \n```xml\n<system.serviceModel>\n  <services>\n```\n"
- fmt: "# CHAPTER 10 ■ A SAMPLE APPLICATION\n\n## Hosting the Service\n\nThe service\
    \ element defines the concrete class, `EventService`, that implements the interface,\
    \ `IEventService`, defined by the `contract` attribute. The interface is defined\
    \ explicitly because it is used to generate the WSDL file that describes the web\
    \ service. If it is not defined, the interface is not a part of the web service.\
    \ It is clearly much easier to create an interface class than to create the WSDL\
    \ file yourself, but you do need to decorate the interface with attributes to\
    \ assist with generating the WSDL output. Listing 10-30 shows the `IEventService`\
    \ interface.\n\n`Listing 10-30.` `IEventService Interface`\n\n```csharp\n[ServiceContract(Namespace\
    \ = \"http://dug/events/\")]\n[ServiceKnownType(typeof(DomainKey))]\n[ServiceKnownType(typeof(Event))]\n\
    [ServiceKnownType(typeof(Location))]\n[ServiceKnownType(typeof(Speaker))]\npublic\
    \ interface IEventService\n{\n    [OperationContract]\n    Event GetNewEvent();\n\
    \n    [OperationContract]\n    Event GetEvent(DomainKey key);\n\n    [OperationContract]\n\
    \    EventCollection GetAllEvents();\n\n    [OperationContract]\n    EventCollection\
    \ GetEventsByDate(DateTime targetDate);\n\n    [OperationContract]\n    DomainKey\
    \ SaveEvent(Event evt);\n\n    [OperationContract]\n    void DeleteEvent(Event\
    \ evt);\n\n    [OperationContract]\n    bool IsUsingLocation(Location location);\n\
    }\n```\n\nThe first attribute that you should notice is the `ServiceKnownType`.\
    \ By adding these attributes, the WSDL output will generate the data necessary\
    \ to define these objects so they can be passed through the service. By explicitly\
    \ declaring these types, the service will be able to pass these objects around\
    \ safely. Then each method that is meant to be a part of the service is marked\
    \ with the `OperationContract` attribute.\n\nFor the actual work of the WFC implementation,\
    \ we will simply use the standard SQL provider, which will call the existing stored\
    \ procedures. The WCF provider will act as a bridge to make the provider distributable\
    \ to a remote server. But before we can call the service, we need to have the\
    \ console application start up the service host.\n\nHosting a service can be done\
    \ in any type of application. It could be a website, console application, or even\
    \ a Windows service. It simply needs to start up a service host by using the concrete\
    \ implementation of the service interface. For the event implementation, we will\
    \ use the `EventServiceHost` class shown in Listing 10-31, which runs a singleton\
