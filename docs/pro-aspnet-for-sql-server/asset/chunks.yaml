  trans: "\n8601Ch05CMP3 8/27/07 8:05 AM Page 121\n\n# 第 5 章 ■ SQL 提供程序\n\n121\n\n\
    ## 匿名与认证配置文件的差异\n\n匿名会话的超时设置可以与认证会话的超时设置不同，但这并非唯一的区别。正如第一章所讨论的，可以设定自定义属性要求使用已认证的配置文件。将匿名配置文件属性保持在最低限度，有助于减小数据库中匿名配置文件数据的大小。用于记录字体大小和配置文件组的自定义属性如清单\
    \ 5-10 所示。\n\n### 清单 5-10. 自定义配置文件属性\n\n```\n<properties>\n<add name=\"FontSize\"\
    \ type=\"String\" allowAnonymous=\"true\" defaultValue=\"10\" />\n<add name=\"\
    ProfileGroup\" type=\"String\" allowAnonymous=\"false\" />\n</properties>\n```\n\
    \n## 从匿名迁移到认证\n\n当用户创建账户或登录您的网站时，该用户将随身携带其匿名配置文件。对应的 Cookie 仍会设置在其浏览器中，与该匿名配置文件关联的值也仍会存在于您的数据库中。我通常希望做的是移除该\
    \ Cookie，并向前复制所有合理的值。\n\n在第一章中，我解释了如何使用来自已认证或匿名配置文件的 Guid 值来管理与购物篮的关联。但是，当用户确实从不同的计算机访问站点，向匿名篮中添加商品，然后在购买时最终登录，我并不希望丢失匿名篮中放置的商品。为了将这些篮中商品转移到已认证的账户，我处理了\
    \ `Profile_MigrateAnonymous` 事件，这是 `Global.asax` 中的一个全局应用程序事件。\n\n但我并非盲目地用匿名篮替换已认证篮。有必要通过添加商品来合并篮子。如果用户前一天在家登录该账户并向篮中添加了几件商品，然后第二天在工作时又向一个全新的匿名篮中添加了更多商品，该用户实际上会有两个篮子。登录时，`Profile_MigrateAnonymous`\
    \ 事件触发，我只是简单地将匿名篮中的商品添加到已认证篮中，并显示合并后的篮子。\n\n另一种选择是，要么完全忽略匿名篮中的商品，要么用匿名篮替换已认证篮。将商品从匿名篮移动到已认证篮是理想的选择。\n\
    \n有时，您的配置文件可能包含无法用这种方式处理的数据。字体大小偏好的简单示例展示了当您首次创建配置文件时选择了一个大小，而当您从另一台计算机登录时，您可能不希望仅用匿名值覆盖已认证的配置文件值。例外情况可能是，如果已认证的值被设为默认值，而匿名值不是默认值。在这种情况下，为了保持用户在继续使用网站时的一些一致性，接收该值可能是有帮助的。清单\
    \ 5-11 中的代码在 `Global.asax` 中处理 `Profile_MigrateAnonymous` 事件以迁移 `FontSize` 属性，然后删除匿名配置文件的所有痕迹。\n\
    \n![Image 19](img/index-129_1.png)\n\n8601Ch05CMP3 8/27/07 8:05 AM Page 122\n\n\
    122\n\n第 5 章 ■ SQL 提供程序\n\n### 清单 5-11. 迁移匿名配置文件\n\n```\nvoid Profile_MigrateAnonymous(object\
    \ sender, ProfileMigrateEventArgs e)\n{\n    ProfileCommon anonymousProfile =\
    \ Profile.GetProfile(e.AnonymousID);\n    string defaultFontSize = \"10\";\n \
    \   if (defaultFontSize.Equals(Profile.FontSize) &&\n        !defaultFontSize.Equals(anonymousProfile.FontSize))\n\
    \    {\n        Profile.FontSize = anonymousProfile.FontSize;\n    }\n    // 删除匿名用户、配置文件和\
    \ Cookie\n    Membership.DeleteUser(e.AnonymousID, true);\n    ProfileManager.DeleteProfile(e.AnonymousID);\n\
    \    AnonymousIdentificationModule.ClearAnonymousIdentifier();\n}\n```\n"
- fmt: "The last few lines of Listing 5-11 clean up the database so it is not cluttered\
    \ with those anonymous accounts. I have seen how leaving the anonymous cookie\
    \ identifier causes the `Profile_MigrateAnonymous` event to fire with each page\
    \ request. So not only does removing the anonymous profile keep the database clean,\
    \ it also prevents this event from firing unnecessarily.\n\n## Creating a User\n\
    \nThe control to create accounts with the `Membership` API is the `CreateUserWizard`.\
    \ It is highly customizable. Beyond customization, you can even completely take\
    \ over the process with your own Web Form and just work with the `Membership`\
    \ API to create users. That involves more work, which you want to avoid with our\
    \ goal of productivity in mind. Instead of starting from scratch with your own\
    \ control, you will simply add a step to the `CreateUserWizard`.\n\nFor your profile,\
    \ you want to allow the user to select a primary interest for the website and\
    \ also the user’s preferred font size (as defined in the custom properties as\
    \ `ProfileGroup` and `FontSize` in Listing 5-10). The `ProfileGroup` is not allowed\
    \ for an anonymous user. To customize the `CreateUserWizard`, you first add a\
    \ step to the wizard (see Figure 5-2).\n\n### Figure 5-2. Add a step to the wizard.\n\
    \nFor this customization, you want to place your wizard step at the start of the\
    \ three-step sequence. Your step will ask for the user’s preferences on the custom\
    \ profile properties. The second step will ask for all the required profile information,\
    \ and the last step will show the confirmation that the new user profile has been\
    \ created. Use the markup in Listing 5-12 for the customized control.\n\n### Listing\
    \ 5-12. Customed CreateUserWizard\n\n```aspx\n<%@ Control Language=\"C#\" AutoEventWireup=\"\
    true\"\nCodeFile=\"CreateCustomUserControl.ascx.cs\"\nInherits=\"Controls_CreateCustomUserControl\"\
    \ %>\n\n<asp:CreateUserWizard ID=\"CreateUserWizard1\" runat=\"server\"\nOnCreatedUser=\"\
    CreateUserWizard1_CreatedUser\"\nContinueDestinationPageUrl=\"~/Default.aspx\"\
    >\n    <WizardSteps>\n        <asp:WizardStep runat=\"server\" Title=\"Primary\
    \ Interest\">\n            <b>Select your primary interest:</b><br />\n      \
    \      <asp:RadioButtonList ID=\"rblPrimaryInterest\" runat=\"server\">\n    \
    \            <asp:ListItem Selected=\"True\" Value=\"1\">Sports</asp:ListItem>\n\
    \                <asp:ListItem Value=\"2\">Politics</asp:ListItem>\n         \
    \       <asp:ListItem Value=\"3\">Weather</asp:ListItem>\n                <asp:ListItem\
    \ Value=\"4\">Business</asp:ListItem>\n                <asp:ListItem Value=\"\
    5\">Entertainment</asp:ListItem>\n            </asp:RadioButtonList>\n       \
    \     <p>\n                Please choose the font size below that you feel is\
    \ most readable.\n            </p>\n            <table><tr><td>\n            \
    \    <b>Sample Sizes:</b>\n                <div style=\"font-size: 10px;\">Small\
    \ Font Size</div>\n                <div style=\"font-size: 12px;\">Regular Font\
    \ Size</div>\n                <div style=\"font-size: 14px;\">Large Font Size</div>\n\
    \            </td><td>\n                <asp:RadioButtonList ID=\"rblFontSize\"\
    \ runat=\"server\">\n                    <asp:ListItem Value=\"10\">Small</asp:ListItem>\n\
    \                    <asp:ListItem Selected=\"True\" Value=\"12\">Regular</asp:ListItem>\n\
    \                    <asp:ListItem Value=\"14\">Large</asp:ListItem>\n       \
    \         </asp:RadioButtonList>\n            </td></tr></table>\n        </asp:WizardStep>\n\
    \        <asp:CreateUserWizardStep runat=\"server\">\n        </asp:CreateUserWizardStep>\n\
    \        <asp:CompleteWizardStep runat=\"server\">\n        </asp:CompleteWizardStep>\n\
    \    </WizardSteps>\n</asp:CreateUserWizard>\n```\n\nThe controls holding the\
    \ values you want to use are in the radio button lists, `rblPrimaryInterest` and\
    \ `rblFontSize`. You will take their values when the `CreatedUser` event is fired\
    \ (see Listing 5-13).\n\n### Listing 5-13. CreatedUser Event Handler\n\n```csharp\n\
    protected void CreateUserWizard1_CreatedUser(object sender, EventArgs e)\n{\n\
    \    Profile.FontSize = rblFontSize.SelectedValue;\n    Profile.ProfileGroup =\
    \ rblPrimaryInterest.SelectedValue;\n}\n```\n\nYou can now use the `ProfileGroup`\
    \ value to show the users content that serves them better and do so with their\
    \ preferred font size. But you may want to get at this data directly. That can\
    \ be tricky.\n\n## Dynamic Profiles and Profiles as BLOBs\n\nIt is tricky to get\
    \ at profile data for two reasons. First, the data is serialized in a format that\
    \ is not directly accessible via a simple database query. Second, you cannot create\
    \ a command-line utility to read profile data that you can run as a scheduled\
    \ job on a nightly basis to perform analysis tasks on your users because you need\
    \ the ASP.NET dynamic compiler to generate the user profile.\n\nIn the case of\
    \ the data serialization, the sample properties will be stored in the `aspnet_Profile`\
    \ table in the `PropertyNames` and `PropertyValues` columns, as you can see in\
    \ Table 5-3.\n\n### Table 5-3. Serialized Profile Properties\n\n| PropertyNames\
    \ | PropertyValues |\n| --- | --- |\n| `FontSize:S:0:2:ProfileGroup:S:2:1:` |\
    \ |\n\nIn `PropertyNames`, it lists the name, type, starting index, and length\
    \ separated by a colon. In `PropertyValues`, you can use `PropertyNames` to derive\
    \ that 14 is the `FontSize` and 3 is the `ProfileGroup`. This construct is designed\
    \ for size optimization and for single-profile access and not for aggregate analysis.\
    \ If you want to work with this data, you will need to write a rather complex\
    \ stored procedure. The alternative is to rely to the .NET classes, which are\
    \ already capable of deserializing this data.\n\nThat leads us to the second reason\
    \ that working with this data is tricky. The ASP.NET dynamic compiler uses a build\
    \ provider that reads the settings in the `Web.config` file and generates the\
    \ `Profile` object in memory. This is how you can see IntelliSense support for\
    \ your custom properties in Visual Studio. Currently this dynamic compiler does\
    \ not work for class libraries. And if you place code in the `App_Code` folder\
    \ of your website, you will find you cannot access these dynamic values either.\n\
    \nThis leads us back to using the ASP.NET runtime to access these values through\
    \ the profiles, which you can use from within a Web Form. To get usable data,\
    \ you will simply go over every authenticated account and generate a comma-separated\
    \ values (CSV) export file with all the profile data that you can parse and use,\
    \ as people have been doing with CSV files for years. Listing 5-14 includes the\
    \ code to export the profile data as a CSV download.\n\n### Listing 5-14. Profiles\
    \ Exporter\n\n```csharp\nusing System;\nusing System.Web.Profile;\nusing System.Web.UI;\n\
    \npublic partial class ProfilesExporter : Page\n{\n    protected void Page_Load(object\
    \ sender, EventArgs e)\n    {\n        Response.AddHeader(\"content-disposition\"\
    ,\n            \"attachment; filename=CustomProfiles.csv\");\n        Response.ContentType\
    \ = \"text/csv\";\n\n        ProfileInfoCollection profiles =\n            ProfileManager.GetAllProfiles(\n\
    \                ProfileAuthenticationOption.Authenticated);\n\n        foreach\
    \ (ProfileInfo profile in profiles)\n        {\n            ProfileCommon pc =\
    \ Profile.GetProfile(profile.UserName);\n            Response.Write(String.Format(\"\
    {0},{1},{2}\\n\", pc.UserName, pc.FontSize, pc.ProfileGroup));\n        }\n  \
    \      Response.End();\n    }\n}\n```\n\nNotice that the code in Listing 5-14\
    \ adds the `content-disposition` header, which forces a download and defines a\
    \ filename ending with the `.csv` extension. Without this header, the file will\
    \ likely try to use `ProfilesExporter.aspx` as the filename. You could change\
    \ the filename to include a timestamp so you can distinguish it from newer copies\
    \ of the data from day to day.\n\nWith this CSV data, you will be able to do your\
    \ analysis more easily. Instead of exporting to a CSV file, you could adjust this\
    \ Web Form to insert the data back into the database with tables you have created\
    \ for the purpose of data analysis. The approach used here is built to run quickly.\
    \ In contrast, reading and writing data will slow down the database and extend\
    \ the time to run the export."
