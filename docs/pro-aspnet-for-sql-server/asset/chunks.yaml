    any of the references required by LINQ, such as System.Data.Query, because the
    new provider is loaded at runtime and the necessary namespaces for LINQ are accessible
    from the global assembly cache (GAC).


    It is convenient to isolate the LINQ-specific details to the LINQ provider class
    library, especially when LINQ is such a new technology. Even when Visual Studio
    2008 is out, you can still target the .NET 2.0 or .NET 3.0 runtimes for the standard
    SQL providers, while a new LINQ


    provider can be built to target the .NET 3.5 runtime and fully leverage all the
    new dynamic language features that will be available with Visual Studio 2008.


