- fmt: "```sql\nJOIN chpt07_LinkTags AS lt ON lt.TagTokenID = tt.TagTokenID\nJOIN\
    \ chpt07_FavoriteLinks AS fl ON fl.FavoriteLinkID = lt.FavoriteLinkID\nWHERE tt.TagTokenID\
    \ in (\n    SELECT DISTINCT tt2.TagTokenID\n    FROM chpt07_LinkTags AS lt2\n\
    \    JOIN chpt07_TagTokens AS tt2 ON tt2.TagTokenID = lt2.TagTokenID\n    JOIN\
    \ chpt07_FavoriteLinks AS fl2 ON fl2.FavoriteLinkID = lt2.FavoriteLinkID\n   \
    \ WHERE fl2.ProfileID = @ProfileID\n)\nGROUP BY tt.TagTokenID\nHAVING COUNT(*)\
    \ = 1\n```\n\n为了保存列表，需要声明一个表变量并用查询填充它。这个表变量保存`TagTokenID`及其被引用次数的计数。在清单 7-22 中，链接标签最终被删除。\n\
    \n### 清单 7-22. 删除链接标签记录\n\n```sql\nDELETE FROM chpt07_LinkTags WHERE LinkTagID\
    \ IN\n(\n    SELECT lt.LinkTagID FROM chpt07_LinkTags AS lt\n    JOIN chpt07_FavoriteLinks\
    \ AS fl ON fl.FavoriteLinkID = lt.FavoriteLinkID\n    WHERE fl.ProfileID = @ProfileID\n\
    )\n```\n\n随着`chpt07_LinkTags`中的父记录被移除，现在可以删除`chpt07_TagTokens`表中的子记录了，如清单 7-23\
    \ 所示。\n\n### 清单 7-23. 删除令牌记录\n\n```sql\nDELETE FROM chpt07_TagTokens WHERE TagTokenID\
    \ IN\n(SELECT TagTokenID FROM @TagTokensToPurge)\n```\n\n一半的依赖关系现已妥善清除。现在必须清除标题和\
    \ URL。这项工作由名为`chpt07_PurgeFavoriteLinksByProfileID`的存储过程完成，其起始部分如清单 7-24 所示。\n\
    \n### 清单 7-24. chpt07_PurgeFavoriteLinksByProfileID 中的第一步\n\n```sql\nCREATE Procedure\
    \ dbo.chpt07_PurgeFavoriteLinksByProfileID\n(\n    @ProfileID bigint\n)\nAS\n\
    SET NOCOUNT ON\nIF EXISTS\n    (SELECT * FROM chpt07_FavoriteLinks WHERE ProfileID\
    \ = @ProfileID) BEGIN\n    EXEC chpt07_PurgeLinkTagsByProfileID @ProfileID\n \
    \   ...\n```\n\n第一步是检查是否有工作要做，因此使用`@ProfileID`查找任何现有记录。如果有，则执行先前用于清除链接标签的存储过程。下一步是组装要清除的\
    \ URL 列表，如清单 7-25 所示。\n\n### 清单 7-25. 组装 URL 清除列表\n\n```sql\nDECLARE @LinkUrlsToPurge\
    \ TABLE\n(\n    ID int IDENTITY,\n    LinkUrlID bigint,\n    [Count] int\n)\n\
    INSERT INTO @LinkUrlsToPurge (LinkUrlID, [Count])\nSELECT lu.LinkUrlID, COUNT(*)\
    \ AS [Count]\nFROM chpt07_LinkUrls AS lu\nJOIN chpt07_FavoriteLinks AS fl ON fl.LinkUrlID\
    \ = lu.LinkUrlID\nWHERE lu.LinkUrlID in (\n    SELECT DISTINCT LinkUrlID FROM\
    \ chpt07_FavoriteLinks\n    WHERE ProfileID = @ProfileID\n)\nGROUP BY lu.LinkUrlID\n\
    HAVING COUNT(*) = 1\n```\n\n同样，使用一个表变量来保存记录列表。这次它保存的是`LinkUrlID`。\n\n此步骤在清单 7-26\
    \ 中针对标题重复进行。\n\n### 清单 7-26. 组装标题清除列表\n\n```sql\nDECLARE @LinkTitlesToPurge TABLE\n\
    (\n    ID int IDENTITY,\n    LinkTitleID bigint,\n    [Count] int\n)\nINSERT INTO\
    \ @LinkTitlesToPurge (LinkTitleID, [Count])\nSELECT lt.LinkTitleID, COUNT(*) AS\
    \ [Count]\nFROM chpt07_LinkTitles AS lt\nJOIN chpt07_FavoriteLinks AS fl ON fl.LinkTitleID\
    \ = lt.LinkTitleID\nWHERE lt.LinkTitleID in (\n    SELECT DISTINCT LinkTitleID\
    \ FROM chpt07_FavoriteLinks\n    WHERE ProfileID = @ProfileID\n)\nGROUP BY lt.LinkTitleID\n\
    HAVING COUNT(*) = 1\n```\n\nURL 和标题的清除列表只保存具有单一引用的记录。因为即将被删除的记录正是持有引用的记录，所以最后一步就是简单地删除所有父记录和清除列表中的所有项目，如清单\
    \ 7-27 所示。\n\n### 清单 7-27. 清除收藏链接的最后一步\n\n```sql\nDELETE FROM chpt07_FavoriteLinks\
    \ WHERE ProfileID = @ProfileID\nDELETE FROM chpt07_LinkUrls WHERE LinkUrlID IN\n\
    (SELECT LinkUrlID FROM @LinkUrlsToPurge)\nDELETE FROM chpt07_LinkTitles WHERE\
    \ LinkTitleID IN\n(SELECT LinkTitleID FROM @LinkTitlesToPurge)\n```\n\n所有用于获取、保存和删除数据的存储过程就位后，我们就可以开始构建数据访问层了，它将使用所有这些存储过程。\n\
    \n## 数据访问层\n\n虽然存储过程是数据访问层的关键元素，但许多人认为真正的数据访问层始于 C# 代码开始的地方。在许多情况下，这是正确的。当使用类型化数据集（Typed\
    \ DataSets）自动将表适配器绑定到数据库中的表时，情况就是如此。但本章所做的工作直接将 C# 代码与存储过程耦合在一起，以旨在提升性能的方式分配工作。\n\
    \n为了创建一个能与数据绑定良好协作的数据访问层，我们将创建一个具有默认构造函数的域对象，以便可以用`ObjectDataSource`声明式地实例化它。我们还将创建一个表示收藏链接的业务对象。这个对象将封装数据访问层的内部工作原理，仅向应用层暴露数据。通过隐藏实现细节，使得更新未来的版本更加容易。它使得可以重新设计实现，而无需应用程序的其余部分进行更新。\n\
    \n### 常用文件夹补充\n\n获取、保存和删除的存储过程将随不同的值被经常重用。你可以从可下载的代码示例中取一组这样的存储过程，为自己创建模板，并将它们添加到你的模板文件夹（`D:\\\
    Projects\\Common\\Templates\\ Data Access Layer`）中的 Common 文件夹中。从这些模板开始，应该可以在构建数据访问层时节省你的时间。\n\
    \n### 创建类库\n\n数据访问层应该是可复用的，实现这一点的第一步是将其放在一个类库中。另一种方法是直接在你的应用程序中包含数据访问层。在网站项目的案例中，你会将类放在`App_Code`文件夹中。这样做不允许其他项目将这些类用作依赖项。我们的目标是将数据访问层视为一个内部发布版本，供多个应用程序使用，即使它最初仅由单个网站使用。这样做不需要太多额外的努力，并有助于保持应用程序和数据访问层的优先级分离。\n\
    \n该项目的组织结构应该已经包括数据库项目作为解决方案的一部分。现在可以向解决方案添加一个类库来保存数据访问库。\n\n我倾向于给项目起通用的名称，因此数据库项目命名为`Database`，而类库就简单地称为`ClassLibrary`。这简化了将在第\
    \ 8 章中介绍的脚本编写，因为几乎相同的 MSBuild 脚本可以用在多个解决方案中，只需进行最小的调整。自然，随着`ClassLibrary`项目承担大量的功能，它可以被拆分为多个类库。通过正确使用命名空间，应该可以很容易地将命名空间重新分配到多个类库中，而对使用这些库的应用程序影响最小。实际上，在类库的属性面板中，`Default\
    \ Namespace`的值应设置为应用程序的名称，而类应添加到项目中的文件夹中。对于本章，`Default Namespace`的值是`Chapter07`，而数据访问层的所有代码将放入一个名为`Domain`的文件夹中。创建新类时自动设置的命名空间将是`Chapter07.Domain`。\n\
    \n### 关注点分离"
