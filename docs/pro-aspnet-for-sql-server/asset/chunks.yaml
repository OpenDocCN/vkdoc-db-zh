    \n然而，你可以更进一步。也许你想让用户选择将其当前位置保存为可信位置，以便当他来自该位置时，安全性可以放宽。例如，如果他出差并从酒店房间登录，登录过程可能会要求他提供不仅仅是用户名和密码。它可能会要求提供社会安全号码的后四位数字和家庭邮政编码。通过授权可信位置，你将能够记录和分析从新添加位置发生的交易。这种方法得到了增强，因为家庭宽带连接倾向于在较长时间内保持相同的\
