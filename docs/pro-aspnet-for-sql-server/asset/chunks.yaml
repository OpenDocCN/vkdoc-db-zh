    After the indexes are easily managed, it is time to move on to the foreign key
    constraints.


    In the case of these constraints, there also is no starter template that checks
    for existing constraints before dropping them. The script in Listing 3-8 removes
    the single foreign key between the Person and Location tables.


    **DEFRAGGING INDEXES**


    Over time indexes can become fragmented. A fragmented index will take longer to
    scan than a freshly created index, so it is necessary to occasionally use the
    REORGANIZE command to clean up indexes. That command does not fully refresh an
    index but does improve performance. The REBUILD command can be used to fully refresh
    the index. These tasks are best left to your database administrator (DBA). As
    you start to notice performance degradation, you can consider this tuning technique.


