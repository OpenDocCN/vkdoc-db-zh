    {\n    public class SpeakerSection : ProviderConfigurationSection\n    {\n   \
    \     [ConfigurationProperty(\"providers\")]\n        public override ProviderSettingsCollection\
    \ Providers\n        {\n            get { return (ProviderSettingsCollection)base[\"\
    providers\"]; }\n        }\n\n        [StringValidator(MinLength = 1)]\n     \
    \   [ConfigurationProperty(\"defaultProvider\", DefaultValue = \"SqlSpeakerProvider\"\
    )]\n        public override string DefaultProvider\n        {\n            get\
    \ { return (string)base[\"defaultProvider\"]; }\n            set { base[\"defaultProvider\"\
    ] = value; }\n        }\n    }\n}\n```\n\n最初是为每个提供程序提供了实现，但之后配置了一个新的 `SpeakerProvider`\
    \ 实现，该实现与一个现有的演讲者数据库集成。所需要的只是包含继承自抽象 `SpeakerProvider` 类的那个类的程序集，以及更新配置以指向新的类和程序集。然后，该更改会通过相应的提供程序节进行配置。\n\
    \n每个自定义提供程序都定义了一个继承自标准类 `ConfigurationSection` 的配置节。代码清单 10-15 展示了 `SpeakerSection`\
    \ 类。\n\n第 9 章中的自定义配置只是简单地为几个配置值定义了一个占位符。在代码清单 10-15 中，提供程序节定义了一个名为 `Providers`\
    \ 的属性（它指向 `ProviderSettingsCollection`），以及一个名为 `DefaultProvider` 的属性（它指向当未提供名称时应使用的提供程序）。这应该会让你想起标准的\
    \ ASP.NET 提供程序，因为它的实现方式是相同的。\n\n`Providers` 属性使用 `ConfigurationProperty` 特性来指向配置中的相关元素。`ProviderSettingsCollection`\
    \ 是一个标准类型，它会自动处理 `providers` 节内的配置。代码清单 10-16 展示了一个演讲者节的配置示例。\n\n### 代码清单 10-16.\
    \ *配置节示例*\n\n```xml\n<speakers defaultProvider=\"SqlSpeakerProvider\">\n  <providers>\n\
    \    <clear />\n    <add name=\"SqlSpeakerProvider\"\n         connectionStringName=\"\
    dug\"\n         type=\"DotnetUserGroup.DataAccess.Speakers.SqlSpeakerProvider,\
    \ DotnetUserGroup.DataAccess\" />\n  </providers>\n</speakers>\n```\n\n你可以看到，由于\
    \ `ConfigurationProperty` 特性，`providers` 元素与 `SpeakerSection` 类中的 `Providers`\
    \ 属性相对应。在 `providers` 节内，你可以 `clear`（清除）、`add`（添加）或 `remove`（移除）提供程序定义，这些定义必须包含\
    \ `name`（名称）和 `type`（类型）属性，以及提供程序实现所需的任何其他值。\n\n### 配置分组\n\n每个提供程序节看起来都差不多，并且每个都将是\
    \ `dotnetUserGroup` 元素的子元素，该元素与继承自标准 `ConfigurationSectionGroup` 类的 `DugConfiguration`\
    \ 类相关联。这个节组包含了所有的配置，并将它们与配置文件的其余部分清晰地隔离开来。这种层次结构有助于保持配置的条理清晰。代码清单 10-17 展示了这个层次结构的一般结构。\n\
    \n### 代码清单 10-17. *配置层次结构*\n\n```xml\n<dotnetUserGroup>\n  <events />\n  <jobs\
    \ />\n  <jobContacts />\n  <locations />\n  <speakers />\n  <sponsors />\n</dotnetUserGroup>\n\
    ```\n\n在代码清单 10-14 所示的 `AssemblyHelper` 类中，`DugConfiguration` 类上的 `ProviderSections`\
    \ 属性被用来遍历所有的提供程序，以获取与目标类型匹配的实例。代码清单 10-18 展示了 `ProviderSections` 属性是如何定义的。\n\n\
    ### 代码清单 10-18. *ProviderSections 属性*\n\n```csharp\nprivate List<ProviderConfigurationSection>\
    \ _providerSections = null;\npublic ProviderConfigurationSection[] ProviderSections\n\
    {\n    get\n    {\n        if (_providerSections == null)\n        {\n       \
    \     _providerSections = new List<ProviderConfigurationSection>();\n        \
    \    _providerSections.Add(EventSection);\n            _providerSections.Add(JobContactSection);\n\
    \            _providerSections.Add(JobSection);\n            _providerSections.Add(LocationSection);\n\
    ```\n"
- fmt: "# The sections referenced in the ProviderSections property are also defined\
    \ as properties in the DugConfiguration\n\nThe sections referenced in the `ProviderSections`\
    \ property are also defined as properties in the `DugConfiguration`, as shown\
    \ in Listing 10-19.\n\n## Listing 10-19. Properties for Sections\n\n```csharp\n\
    [ConfigurationProperty(\"events\")]\npublic EventSection EventSection\n{\n   \
    \ get {\n        return Sections[\"events\"] as EventSection;\n    }\n}\n\n[ConfigurationProperty(\"\
    jobContacts\")]\npublic JobContactSection JobContactSection\n{\n    get {\n  \
    \      return Sections[\"jobContacts\"] as JobContactSection;\n    }\n}\n\n[ConfigurationProperty(\"\
    jobs\")]\npublic JobSection JobSection\n{\n    get {\n        return Sections[\"\
    jobs\"] as JobSection;\n    }\n}\n\n[ConfigurationProperty(\"locations\")]\npublic\
    \ LocationSection LocationSection\n{\n    get {\n        return Sections[\"locations\"\
    ] as LocationSection;\n    }\n}\n\n[ConfigurationProperty(\"speakers\")]\npublic\
    \ SpeakerSection SpeakerSection\n{\n    get {\n        return Sections[\"speakers\"\
    ] as SpeakerSection;\n    }\n}\n\n[ConfigurationProperty(\"sponsors\")]\npublic\
    \ SponsorSection SponsorSection\n{\n    get {\n        return Sections[\"sponsors\"\
    ] as SponsorSection;\n    }\n}\n```\n\nYou may have noticed that the `ProviderSections`\
    \ property returns an array of `ProviderConfigurationSection` classes instead\
    \ of `ConfigurationSection` classes. This is a custom class that makes it possible\
    \ to group all the provider configuration sections together.\n\nThe `ProviderConfigurationSection`\
    \ class defines two abstract properties: `Providers` and `DefaultProvider`. The\
    \ `SpeakerSection` class shown in Listing 10-15 inherits from this class. See\
    \ Listing 10-20 for this abstract class.\n\n## Listing 10-20. ProviderConfigurationSection.cs\n\
    \n```csharp\nnamespace DotnetUserGroup.DataAccess.Common\n{\n    public abstract\
    \ class ProviderConfigurationSection : ConfigurationSection\n    {\n        public\
    \ abstract ProviderSettingsCollection Providers { get; }\n        public abstract\
    \ string DefaultProvider { get; set; }\n    }\n}\n```\n\n### Declaring the Custom\
    \ Configuration\n\nIn order to use the custom configuration, it must be declared.\
    \ Declaring custom configuration sections must be done at the beginning of a configuration\
    \ file, right after the opening `Configuration` element. Listing 10-21 shows the\
    \ declaration of the section group and subsections for the sample application.\n\
    \n#### Listing 10-21. Configuration Declaration\n\n```xml\n<configSections>\n\
    \    <sectionGroup name=\"dotnetUserGroup\"\n        type=\"DotnetUserGroup.DataAccess.Common.DugConfiguration,\
    \ DotnetUserGroup.DataAccess\">\n        <section name=\"events\"\n          \
    \  type=\"DotnetUserGroup.DataAccess.Events.EventSection, DotnetUserGroup.DataAccess\"\
    \ />\n        <section name=\"jobs\"\n            type=\"DotnetUserGroup.DataAccess.Jobs.JobSection,\
    \ DotnetUserGroup.DataAccess\" />\n        <section name=\"jobContacts\"\n   \
    \         type=\"DotnetUserGroup.DataAccess.JobContacts.JobContactSection, DotnetUserGroup.DataAccess\"\
    \ />\n        <section name=\"locations\"\n            type=\"DotnetUserGroup.DataAccess.Locations.LocationSection,\
    \ DotnetUserGroup.DataAccess\" />\n        <section name=\"speakers\"\n      \
    \      type=\"DotnetUserGroup.DataAccess.Speakers.SpeakerSection, DotnetUserGroup.DataAccess\"\
    \ />\n        <section name=\"sponsors\"\n            type=\"DotnetUserGroup.DataAccess.Sponsors.SponsorSection,\
    \ DotnetUserGroup.DataAccess\" />\n    </sectionGroup>\n</configSections>\n```\n\
    \n### Configuring the Providers\n\nWith the custom configuration classes built\
    \ and the custom sections declared, the provider configuration can be added. Listing\
    \ 10-22 shows the provider configuration that points to all the standard SQL providers\
    \ for the sample application.\n\n#### Listing 10-22. Provider Configuration\n\n\
    ```xml\n<dotnetUserGroup>\n    <events defaultProvider=\"SqlEventProvider\"\n\
    \        locationProvider=\"SqlLocationProvider\"\n        speakerProvider=\"\
    SqlSpeakerProvider\"\n        sponsorProvider=\"SqlSponsorProvider\">\n      \
    \  <providers>\n            <clear />\n            <add name=\"SqlEventProvider\"\
    \n                connectionStringName=\"dug\"\n                type=\"DotnetUserGroup.DataAccess.Events.SqlEventProvider,\
    \ DotnetUserGroup.DataAccess\" />\n        </providers>\n    </events>\n    <jobs\
    \ defaultProvider=\"SqlJobProvider\">\n        <providers>\n            <clear\
    \ />\n```"
