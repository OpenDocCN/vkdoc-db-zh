  trans: '

    一个采用预编译程序集部署的网站，从请求处理的角度来看，已经实现了大量的性能优化。应用程序中较慢的活动通常仍然是从数据库提取数据。通过使用高效的缓存依赖项，您可以确保缓存中的数据始终是最新的，但输出缓存声明并不具备了解缓存依赖项何时变更所需的全部丰富性和细节。如果您为了确保显示的数据是最新的而对数据访问层所做的所有优化努力，可能会因为输出缓存将缓存输出保留过久而付诸东流。因此，您可能会发现输出缓存通常不是一个现实的选择。


    ## 片段缓存


    您不必缓存整个页面，而是可以缓存各个部分，其中一些部分需要比其他部分更频繁地更新。在用户控件中使用输出缓存被称为**片段缓存**。放置在页面上的每个用户控件都可以有不同的输出缓存设置。考虑一个产品详情页面，它展示产品照片以及关于产品的各种细节。我曾使用片段缓存，通过五六个用户控件来显示产品页面的几个部分。其中一些用户控件被缓存，而另一些则没有。某些细节不会经常改变，例如产品照片、描述、尺寸、颜色和供应商关联。但其他细节，如定价和可用状态，可能会更频繁地变化。每个用户控件都根据其显示内容声明了特定的输出缓存设置。产品页面是这些用户控件的组合体，在流量高峰期它的性能表现非常出色。


    您可以结合使用页面缓存和片段缓存，但显然，页面上设置的 `Duration` 必须比启用了输出缓存的用户控件的持续时间短。您可以将页面的持续时间设置为 10
    秒，而一个包含很少更改数据的用户控件的缓存时间可以设置为 3,600 秒。


    ## 缓存后替换


    另一个输出缓存功能是**缓存后替换**，它允许页面使用输出缓存，同时允许页面的某一部分在每次请求时更新。这可以通过 `Substitution` 控件以声明方式实现。该技术有一个限制：`Substitution`
    控件不能在启用了输出缓存的用户控件或母版页中使用，因此您无法将此技术与片段缓存结合使用，至少不能直接结合。您必须改为缓存整个页面，并在需要每次请求都获取新内容的位置使用
    `Substitution` 控件。


    `Substitution` 控件的工作方式与典型的 ASP.NET 控件不同。像 `Label` 这样的典型控件允许您设置 `Text` 属性，控件会连同其他属性（如
    `Font-Bold` 和 `CssClass`）一起用于显示。而对于 `Substitution` 控件，您需要提供一个像 `Literal` 控件那样直接显示的字符串。这是通过
    `MethodName` 属性实现的，该属性引用代码隐藏文件中的一个静态方法，该方法以 `HttpContext` 对象作为唯一参数并返回字符串。由于控件上的其他属性，此字符串不经处理或装饰直接显示。


    第 6 章 ■ 缓存


    在产品详情页的情况下，您会将整个页面设置为使用输出缓存，而用于组装页面的每个用户控件则不使用缓存。对于需要更新的某些细节，您会使用一个 `Substitution`
    控件。


    在清单 6-8 和 6-9 中，`Label` 控件只会在页面的输出缓存过期时更新，而 `Substitution` 控件的值在每次请求时都是最新的。


    ### 清单 6-8. Substitution 控件标记


    ```xml

    <asp:Label ID="lblProductName" runat="server" Text=""></asp:Label><br />

    <asp:Label ID="lblProductNumber" runat="server" Text=""></asp:Label><br />

    <asp:Substitution ID="subPrice" runat="server" MethodName="GetPrice" /><br />

    ```

    '
- fmt: "## Fragment Caching with Postcache Substitution\n\n<asp:Substitution ID=\"\
    subAvailability\" runat=\"server\" MethodName=\"GetAvailability\" />\n\n**Listing\
    \ 6-9.** `Substitution Control Code-Behind`\n```csharp\nprivate static string\
    \ GetPrice(HttpContext context)\n{\n    Product product = GetProduct(context);\n\
    \    return product.Price.ToString(\"C\");\n}\n\nprivate static string GetAvailability(HttpContext\
    \ context)\n{\n    Product product = GetProduct(context);\n    return product.Availability;\n\
    }\n```\n\nIf all you are doing is returning a small bit of text, this would be\
    \ sufficient, but if you instead want to return anything more, you will have to\
    \ somehow generate all of the content to be returned from this method. Creating\
    \ a string full of markup is what you try to avoid with ASP.NET development because\
    \ of all of the helpful visual tools. The way the `Substitution` control works\
    \ does not give you a direct way to stay in that visual mode. But this can be\
    \ done indirectly.\n\nWith the page set for output caching, you can set a user\
    \ control to hold a `Substitution` control, which then loads another user control\
    \ that holds the content to return through the `Substitution` method. To simplify\
    \ this process, I created the `SubstitutionFragment` class (see **Listing 6-10**)\
    \ and placed it in the `App_Code` folder.\n\n**Listing 6-10.** `SubstitutionFragment\
    \ Class`\n```csharp\nusing System.IO;\nusing System.Text;\nusing System.Web;\n\
    using System.Web.UI;\n\npublic abstract class SubstitutionFragment : UserControl\n\
    {\n    public abstract void BindToContext();\n\n    private HttpContext _currentContext;\n\
