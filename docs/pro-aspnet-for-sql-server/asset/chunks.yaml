    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **209**'
  trans: "## 表 7-2. 建议的默认值\n\n| 类型        | 默认值           |\n|-------------|------------------|\n\
    | 字符串      | `String.Empty`   |\n| 日期时间    | `1/1/1754`       |\n\n将这些值设置为数据访问层中的常量后，它们就可以在应用程序的其余部分进行检查。如果将来您选择更改默认值，只需更新这些常量，即可在整个应用程序中反映更改。当数据访问层和数据库都设置为识别相同的默认值时，您可以通过存储过程妥善处理它们。这样，即使不允许存储过程返回\
    \ null 值，您仍然可以在数据库中设置 null。\n\n### 防止空值\n\n假设您确实有一个包含 `DateTime` 类型列 `BirthDate`\
    \ 的表，并且该列允许 null 值。返回此值的存储过程可以使用 `COALESCE` 函数将 null 值转换为默认日期值。代码清单 7-9 展示了如何使用\
    \ `COALESCE` 函数。\n\n**代码清单 7-9. 为 Null 值返回默认日期**\n\n```sql\nSELECT\n    COALESCE(\n\
    \        BirthDate,\n        Convert(DateTime, '1/1/1754')\n    ) AS BirthDate\n\
    FROM chpt07_Nullable\n```\n\n当向系统发送默认值时，我们也可以将默认值转换为 null 进行存储。代码清单 7-10 展示了此检查与转换过程。\n\
    \n**代码清单 7-10. 将默认日期转换为 Null**\n\n```sql\nDECLARE @DefaultDate DateTime\nSET @DefaultDate\
    \ = Convert(DateTime, '1/1/1754')\nDECLARE @BirthDate DateTime\nSET @BirthDate\
    \ = Convert(DateTime, '1/1/1754')\nIF (@BirthDate = @DefaultDate)\nBEGIN\n   \
    \ SET @BirthDate = NULL\nEND\n```\n\n通过在存储过程中处理默认值转换，您能获得比 `CLR` 代码更好的性能，并避免了检查类型是否为\
    \ `DBNull.Value` 以及进行类型转换的开销。\n\n### COALESCE 与 ISNULL\n\n`COALESCE` 函数是一个标准 SQL\
    \ 函数，而 `ISNULL` 是 SQL Server 提供的专有函数。`ISNULL` 函数通常可以与 `COALESCE` 函数互换使用，并且可能提供更好的性能。您需要运行自己的测试来收集指标，以确定您的具体查询从哪个函数中获益更多，因为在特定条件下，其中一个可能比另一个更快。\n\
    \n对于 FavoriteLinks 数据库，我选择不在表级别允许 null 值。对于这个小型应用程序，可以合理地确保在整个应用程序中遵循默认值。应用程序还将使用验证来确保不会向数据访问层发送空字符串，这本身就能防止\
    \ null 值进入系统。\n\n### 使用数据库项目\n\n为了构建数据库，我使用了 Visual Studio 2005 专业版中的一个功能——数据库项目。每个表和存储过程脚本都经过独特的组织和源代码控制，这使得跨应用程序版本管理数据库变更更加容易。\n\
    \n#### 管理脚本\n\nFavoriteLinks 数据库包含六个表，如图 7-5 所示。除了这些表之外，还有多个脚本文件，其中包含应用程序所需的所有访问这些表的存储过程脚本。还有用于添加和删除维护表间关系的约束的脚本。所有这些脚本都被组织到文件夹中的组里。\n\
    \n数据库项目的一个隐藏功能是智能依赖关系分析，当您选择多个脚本并运行它们时，此分析会透明地执行。Visual Studio 会检查所选的脚本，并根据依赖关系，以正确的顺序运行它们，以确保脚本成功运行。如果您碰巧在一个表脚本中定义了一个外键，该外键引用了按字母顺序排在其后的另一个表，那么在运行脚本时，运行顺序将会被调整。"
- fmt: "Beyond foreign key constraints, stored procedures can also refer to other\
    \ stored procedures. Selecting and running all of them will also help you with\
    \ the order and will prevent the warnings you get from using a resource that has\
    \ not been defined yet. I find that if I make several changes to all the stored\
    \ procedures, selecting and running all of them is helpful after I am finished\
    \ making the changes.\n\n## Planning the Stored Procedures\n\nFor the Favorite\
    \ Links website, a user will store multiple links along with tags and other related\
    \ data. To provide for this functionality, the stored procedures will cover all\
    \ access functions from getting, saving, and purging the data. And although the\
    \ relationships between the six tables are complex, the layer built on top of\
    \ the table structure does not have to directly reflect that complexity. Beginning\
    \ with the stored procedures, the abstraction will start to make the data easier\
    \ to consume.\n\n### Getting Data\n\nThe first set of stored procedures to construct\
    \ is the one to get the data from the database. The primary data will be the links,\
    \ so we will look at those in detail. Among these, the central procedure will\
    \ be the one getting all links related to a profile, as shown in `Listing 7-11`.\n\
    \n`Listing 7-11.` `chpt07_GetFavoriteLinksByProfileID.sql`\n```\nCREATE Procedure\
    \ dbo.chpt07_GetFavoriteLinksByProfileID\n(\n    @ProfileID int\n)\nAS\nSELECT\n\
    \    fl.FavoriteLinkID AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n  \
    \  fl.Rating,\n    fl.Note,\n    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks\
    \ AS fl\nJOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles\
    \ AS lt ON lt.LinkTitleID = fl.LinkTitleId\nWHERE fl.ProfileID = @ProfileID\n\
    ORDER BY fl.Created DESC\nGO\n```\n\nWe will compare this stored procedure to\
    \ the next most used stored procedure, shown in `Listing 7-12`.\n\n`Listing 7-12.`\
    \ `chpt07_GetFavoriteLinksByTag.sql`\n```\nCREATE Procedure dbo.chpt07_GetFavoriteLinksByTag\n\
    (\n    @ProfileID bigint,\n    @Token nvarchar(30)\n)\nAS\nSELECT\n    fl.FavoriteLinkID\
    \ AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n    fl.Rating,\n    fl.Note,\n\
    \    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks AS fl\nJOIN chpt07_LinkUrls\
    \ AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles AS lt ON lt.LinkTitleID\
    \ = fl.LinkTitleId\nJOIN chpt07_LinkTags AS lt2 ON lt2.FavoriteLinkID = fl.FavoriteLinkID\n\
    JOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt2.TagTokenID\nWHERE fl.ProfileID\
    \ = @ProfileID AND tt.Token = @Token\nORDER BY fl.Created DESC\nGO\n```\n\nIn\
    \ both of the stored procedures, the result set is identical. Making the result\
    \ sets identical is done intentionally to keep them compatible with each other.\
    \ Later in the data access layer, the same business object will hold the data\
    \ for the FavoriteLinks database and will require these values. The only differences\
    \ in these stored procedures are the incoming parameters and how they filter the\
    \ results. In `chpt07_GetFavoriteLinksByProfileID`, the `@ProfileID` is used to\
    \ access all the links saved to the specified profile. In `chpt07_GetFavoriteLinksByTag`,\
    \ the `@ProfileID` is provided again along with the `@Token` parameter to limit\
    \ the scope of the result to the matching tags. The series of joins used to bring\
    \ together all the data remains consistent otherwise. There are other criteria\
    \ for filtering the list of favorite links, which all return the same columns\
    \ by using different parameters.\n\n## WHAT TO OPTIMIZE AND HOW\n\nImproving the\
    \ performance of a data access layer requires knowing what to optimize and how\
    \ to go about doing it. By simply placing the \"get\" queries into a limited set\
    \ of stored procedures, you allow SQL Server to focus on and tune the query plans\
    \ for the queries that run most frequently. And because you query the database\
    \ more than you save or remove data, you can spend most of your effort optimizing\
    \ the process of getting data from the database. Over time, you can profile the\
    \ performance of your limited set of stored procedures and further optimize them\
    \ as needed."
  raw: 'Beyond foreign key constraints, stored procedures can also refer to other
    stored procedures. Selecting and running all of them will also help you with the
    order and will prevent the warnings you get from using a resource that has not
    been defined yet. I find that if I make several changes to all the stored procedures,
    selecting and running all of them is helpful after I am finished making the changes.


    Planning the Stored Procedures


    For the Favorite Links website, a user will store multiple links along with tags
    and other related data. To provide for this functionality, the stored procedures
    will cover all access functions from getting, saving, and purging the data. And
    although the relationships between the six tables are complex, the layer built
    on top of the table structure does not have to directly reflect that complexity.
    Beginning with the stored procedures, the abstraction will start to make the data
    easier to consume.


    **Getting Data**


    The first set of stored procedures to construct is the one to get the data from
    the database. The primary data will be the links, so we will look at those in
    detail. Among these, the central procedure will be the one getting all links related
    to a profile, as shown in Listing 7-11.


    **Listing 7-11.** *chpt07_GetFavoriteLinksByProfileID.sql* CREATE Procedure dbo.chpt07_GetFavoriteLinksByProfileID


    (


    @ProfileID int


    )


    AS


    SELECT


    fl.FavoriteLinkID AS ID,


    lt.Title,


    lu.Url,


    fl.Keeper,


    fl.Rating,


    fl.Note,


    fl.Created,


    fl.Modified


    FROM chpt07_FavoriteLinks AS fl


    JOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID


    JOIN chpt07_LinkTitles AS lt ON lt.LinkTitleID = fl.LinkTitleId WHERE fl.ProfileID
    = @ProfileID


    ORDER BY fl.Created DESC


    GO


    We will compare this stored procedure to the next most used stored procedure,
    shown in Listing 7-12.


    8601Ch07CMP2 8/24/07 12:23 PM Page 210


    **210**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **Listing 7-12.** *chpt07_GetFavoriteLinksByTag.sql* CREATE Procedure dbo.chpt07_GetFavoriteLinksByTag


    (


    @ProfileID bigint,


    @Token nvarchar(30)


    )


    AS


    SELECT


    fl.FavoriteLinkID AS ID,


    lt.Title,


    lu.Url,


    fl.Keeper,


    fl.Rating,


    fl.Note,


    fl.Created,


    fl.Modified


    FROM chpt07_FavoriteLinks AS fl


    JOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID


    JOIN chpt07_LinkTitles AS lt ON lt.LinkTitleID = fl.LinkTitleId JOIN chpt07_LinkTags
    AS lt2 ON lt2.FavoriteLinkID = fl.FavoriteLinkID


    JOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt2.TagTokenID


    WHERE fl.ProfileID = @ProfileID AND tt.Token = @Token


    ORDER BY fl.Created DESC


    GO


    In both of the stored procedures, the result set is identical. Making the result
    sets identical is done intentionally to keep them compatible with each other.
    Later in the data access layer, the same business object will hold the data for
    the FavoriteLinks database and will require these values. The only differences
    in these stored procedures are the incoming parameters and how they filter the
    results. In chpt07_GetFavoriteLinksByProfileID, the ProfileID is used to access
    all the links saved to the specified profile. In chpt07_GetFavoriteLinksByTag,
    the ProfileID is provided again along with the Token parameter to limit the scope
    of the result to the matching tags. The series of joins used to bring together
    all the data remains consistent otherwise. There are other criteria for filtering
    the list of favorite links, which all return the same columns by using different
    parameters.


    **WHAT TO OPTIMIZE AND HOW**


    Improving the performance of a data access layer requires knowing what to optimize
    and how to go about doing it. By simply placing the “get” queries into a limited
    set of stored procedures, you allow SQL Server to focus on and tune the query
    plans for the queries that run most frequently. And because you query the database
    more than you save or remove data, you can spend most of your effort optimizing
    the process of getting data from the database. Over time, you can profile the
    performance of your limited set of stored procedures and further optimize them
    as needed.'
  trans: "\n除了外键约束，存储过程还可以引用其他存储过程。选择并运行所有存储过程也有助于确定执行顺序，并能避免因使用了尚未定义的资源而产生的警告。我发现，如果我对所有存储过程做了多处修改，在完成修改后选择并运行所有存储过程是很有帮助的。\n\
    \n## 规划存储过程\n\n对于“收藏链接”网站，用户将存储多个链接以及标签和其他相关数据。为了实现此功能，存储过程将涵盖所有访问功能，包括获取、保存和清除数据。尽管六张表之间的关系很复杂，但构建在表结构之上的层并不必直接反映这种复杂性。从存储过程开始，抽象层将使数据更易于使用。\n\
    \n### 获取数据\n\n要构建的第一组存储过程是从数据库获取数据的那些。主要数据是链接，因此我们将详细查看这些。其中，核心过程将是获取与某个配置文件相关的所有链接的过程，如\
    \ `代码清单 7-11` 所示。\n\n`代码清单 7-11.` `chpt07_GetFavoriteLinksByProfileID.sql`\n```\n\
    CREATE Procedure dbo.chpt07_GetFavoriteLinksByProfileID\n(\n    @ProfileID int\n\
    )\nAS\nSELECT\n    fl.FavoriteLinkID AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n\
    \    fl.Rating,\n    fl.Note,\n    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks\
    \ AS fl\nJOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles\
    \ AS lt ON lt.LinkTitleID = fl.LinkTitleId\nWHERE fl.ProfileID = @ProfileID\n\
    ORDER BY fl.Created DESC\nGO\n```\n\n我们将把这个存储过程与下一个最常用的存储过程进行比较，如 `代码清单 7-12`\
    \ 所示。\n\n`代码清单 7-12.` `chpt07_GetFavoriteLinksByTag.sql`\n```\nCREATE Procedure\
    \ dbo.chpt07_GetFavoriteLinksByTag\n(\n    @ProfileID bigint,\n    @Token nvarchar(30)\n\
    )\nAS\nSELECT\n    fl.FavoriteLinkID AS ID,\n    lt.Title,\n    lu.Url,\n    fl.Keeper,\n\
    \    fl.Rating,\n    fl.Note,\n    fl.Created,\n    fl.Modified\nFROM chpt07_FavoriteLinks\
    \ AS fl\nJOIN chpt07_LinkUrls AS lu ON lu.LinkUrlId = fl.LinkUrlID\nJOIN chpt07_LinkTitles\
    \ AS lt ON lt.LinkTitleID = fl.LinkTitleId\nJOIN chpt07_LinkTags AS lt2 ON lt2.FavoriteLinkID\
    \ = fl.FavoriteLinkID\nJOIN chpt07_TagTokens AS tt ON tt.TagTokenID = lt2.TagTokenID\n\
    WHERE fl.ProfileID = @ProfileID AND tt.Token = @Token\nORDER BY fl.Created DESC\n\
    GO\n```\n\n在这两个存储过程中，结果集是相同的。使结果集相同是刻意为之，以保持它们彼此兼容。稍后在数据访问层中，同一个业务对象将保存来自 FavoriteLinks\
    \ 数据库的数据，并且将需要这些值。这些存储过程之间的唯一区别在于传入的参数以及它们筛选结果的方式。在 `chpt07_GetFavoriteLinksByProfileID`\
    \ 中，`@ProfileID` 用于访问保存到指定配置文件的所有链接。在 `chpt07_GetFavoriteLinksByTag` 中，再次提供了 `@ProfileID`，同时还有\
    \ `@Token` 参数，以将结果范围限制为匹配的标签。除此之外，用于整合所有数据的一系列连接操作保持一致。还有其他筛选收藏链接列表的标准，它们都通过使用不同的参数返回相同的列。\n\
    \n## 优化内容与方法\n\n提高数据访问层的性能需要知道优化什么以及如何去做。通过简单地将“获取”查询放入一组有限的存储过程中，你可以让 SQL Server\
    \ 专注于最频繁运行的查询并调整其查询计划。而且，由于你查询数据库的次数多于保存或删除数据的次数，你可以将大部分精力用于优化从数据库获取数据的过程。随着时间的推移，你可以对这组有限的存储过程进行性能分析，并根据需要进一步优化它们。\n"
- fmt: "# Chapter 7: Manual Data Access Layer\n\n## Saving Data\n\nNext, the stored\
    \ procedures that are used to save links either with an insert or an update present\
    \ a more challenging requirement. Not only does the procedure save the core details\
    \ of the link, but it must take the `Title` and `Url` values and store them off\
    \ to the secondary tables while not creating duplicate records of the same values.\
    \ The design of the tables allows for a `Favorite Link` record to point to the\
    \ same `Url` record that other `Favorite Link` records are already using.\n\n\
    All the work to coordinate this will be managed in the `chpt07_SaveFavoriteLink`\
    \ stored procedure. Starting out the stored procedure will take in all the parameters\
    \ needed to save the data, as shown in Listing 7-13.\n\n**Listing 7-13.** Parameters\
    \ for `chpt07_SaveFavoriteLink`\n\n```sql\nCREATE Procedure dbo.chpt07_SaveFavoriteLink\n\
    (\n    @ProfileID bigint,\n    @Url nvarchar(250),\n    @Title nvarchar(150),\n\
    \    @Keeper bit,\n    @Rating smallint,\n    @Note nvarchar(500),\n    @Created\
    \ datetime,\n    @Modified datetime,\n    @OldFavoriteLinkID bigint,\n    @FavoriteLinkID\
    \ bigint OUTPUT\n)\n```\n\nThe first step in handling the save process is to save\
    \ the `Url` and `Title` values to the secondary tables and get back the `ID` values\
    \ to use for the foreign key references. Listing 7-14 shows where to get started.\n\
    \n**Listing 7-14.** Saving the Title and Url Values\n\n```sql\nDECLARE @LinkUrlID\
    \ int\nDECLARE @LinkTitleID int\nEXEC chpt07_SaveLinkUrl @Url, @LinkUrlID OUTPUT\n\
    EXEC chpt07_SaveLinkTitle @Title, @LinkTitleID OUTPUT\n```\n\nAfter the values\
    \ for `LinkUrlID` and `LinkTitleID` are set, it will be possible to save the main\
    \ record. Because this is a save routine, the procedure could be inserting a new\
    \ record or updating a new record. Before the decision between insert and update\
    \ is possible, the value for the `@OldFavoriteLinkID` must be checked. If the\
    \ value is positive, the save operation is meant to update an existing known record.\
    \ Also, if the `@OldFavoriteLinkID` value is negative, meaning it is not defined,\
    \ a check should be made for a `Favorite Link` record that already has the same\
    \ `Url` and `Title` values. The code in Listing 7-15 handles this work.\n\n**Listing\
    \ 7-15.** Checking an Existing Record\n\n```sql\nIF (@OldFavoriteLinkID < 0 AND\
    \ EXISTS (\n    SELECT * FROM chpt07_FavoriteLinks\n    WHERE LinkUrlID = @LinkUrlID\
    \ AND ProfileID = @ProfileID\n))\nBEGIN\n    SET @OldFavoriteLinkID =\n      \
    \  (SELECT FavoriteLinkID FROM chpt07_FavoriteLinks\n         WHERE LinkUrlID\
    \ = @LinkUrlID AND ProfileID = @ProfileID)\nEND\n```\n\nFinally, we should be\
    \ able to key the insert or update decision on whether the value of `@OldFavoriteLinkID`\
    \ points to an existing record for the specified profile. If a record does exist,\
    \ an insert is done. Otherwise, an update is done, as shown in Listing 7-16.\n\
    \n**Listing 7-16.** Saving with Insert or Update\n\n```sql\nIF EXISTS (SELECT\
    \ * FROM chpt07_FavoriteLinks\n    WHERE FavoriteLinkID = @OldFavoriteLinkID\n\
    \    AND ProfileID = @ProfileID)\nBEGIN\n    UPDATE chpt07_FavoriteLinks\n   \
    \ SET\n        LinkUrlID = @LinkUrlID,\n        LinkTitleID = @LinkTitleID,\n\
    \        Keeper = @Keeper,\n        Rating = @Rating,\n        Note = @Note,\n\
    \        Modified = GETDATE()\n    WHERE\n        FavoriteLinkID = @OldFavoriteLinkID\
    \ AND\n        ProfileID = @ProfileID\n    SET @FavoriteLinkID = @OldFavoriteLinkID\n\
    END\nELSE\nBEGIN\n    INSERT INTO chpt07_FavoriteLinks\n        (ProfileID, LinkUrlID,\
    \ LinkTitleID, Keeper,\n        Rating, Note, Created, Modified)\n    VALUES (\n\
    \        @ProfileID,\n        @LinkUrlID,\n        @LinkTitleID,\n        @Keeper,\n\
    \        @Rating,\n        @Note,\n        @Created,\n        @Modified\n    )\n\
    \    SELECT @FavoriteLinkID = @@IDENTITY\nEND\nGO\n```\n\nIn either case, the\
    \ value of `@FavoriteLinkID` is set with the identity of the affected record,\
    \ which is made available to the caller of the stored procedure as an output parameter.\n\
    \n## Deleting Data"
