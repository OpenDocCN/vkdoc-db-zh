    ## 小结


    在本章中，你了解了 ASP.NET 所有可用的数据绑定选项。你研究了几种标准控件，将它们与一系列用户控件结合使用，并最终创建了自己的自定义数据绑定控件。有了这些选择，你现在可以决定哪些数据绑定控件适合你的需求，并且通过选择正确的控件以及
    `ViewState` 的最佳设置，你可以构建一个更高效的表现层。


    # 第五章


    ## SQL 提供程序


    ASP.NET 2.0 的灵活性在很大程度上归功于提供程序模型的可插拔架构，它将 SQL Server、提供程序的 SQL 实现以及许多 ASP.NET 控件完美地连接起来。这些提供程序以及使用它们的控件不仅高度可配置，而且如果你选择根据独特需求从头开始构建自己的提供程序，它们也是完全可替换的。通过利用可用功能，让你的
    ASP.NET 网站完全按照你需要的方式运行是相当容易的，这些功能为你提供了丰富的功能基础，让你能够带着一整套技巧开始上手。


    本章涵盖以下内容：


    *   `SqlMembershipProvider`

    *   `SqlRoleProvider`

    *   `SqlProfileProvider`

    *   构建 SQL 相册提供程序

    *   构建 SQL 站点地图提供程序


    ASP.NET 2.0 中的 SQL 提供程序通过将领域模型与用户界面组件配对，为平台提供了极大的灵活性，这些组件可以以高度模块化的方式与其他领域和组件拼接在一起。ASP.NET
    2.0 引入的大多数新控件都由提供程序支持，这些提供程序提供了超越 SQL Server 的多种实现。如果你想实现自己的提供程序，框架中有功能可以帮助你以最小的努力开始。你甚至可以设计自己的
    SQL'
- fmt: '# CHAPTER 5 ■ SQL PROVIDERS


    provider that is represented in a Web Form with your own controls. I have found
    the combination of SQL providers and controls to be a powerful combination when
    building modular websites.


    The providers supplied with ASP.NET were created to address common tasks that
    were carried out over and over with custom code in classic ASP and ASP.NET 1.1.
    Such common tasks are managing users and roles and creating the controls to allow
    these users to create accounts, log in and out, change and retrieve their passwords,
    and customize the user accounts. As far back as classic ASP, it has been possible
    to use forms authentication and the database to create all the controls that are
    offered with ASP.NET 2.0, but you first had to design your database schema and
    then build all the controls to handle all the tasks users need to do with their
    accounts. Without a common implementation, developers were left to build their
    own from the ground up, which took time but also did not offer nearly as much
    of the rich, highly customized functionality that the ASP.NET 2.0 controls offer.


    8601Ch05CMP3 8/27/07 8:05 AM Page 112


    From the database to the user interface, there are ways to quickly deploy, customize,
    mix and match, and completely replace the implementations while still maintaining
    a level of compatibility with other standard components within the system. When
    you can master all the nuances available with these components, you will be able
    to produce a website that has all the expected features of a modern website, even
    if there are unique requirements that were not anticipated by the ASP.NET 2.0
    design. It was created with extensibility in mind.


    In this chapter, I will walk through the basics of setting up the three most used
    providers and will show you their flexibility. I will then show you how to implement
    your own provider, including one provider completely from the ground up that seamlessly
    integrates with the ASP.NET 2.0 providers and controls.


    ## The SqlMembershipProvider


    The most used SQL provider has to be `SqlMembershipProvider`, which manages users
    for your website. In the first chapter, you added membership services to the database
    by using the `aspnet_resql.exe` utility. With those tables, views, and stored
    procedures as well as configuration settings in place, you are able to use various
    controls that use the `Membership` API to manipulate the data held in your SQL
    Server. The ones of interest here are the `Login` controls shown in Table 5-1.


    **Table 5-1.** `Login` Controls


    | Control | Description |

    | :--- | :--- |

    | `Login` | Displays the login form and handles authentication |

    | `LoginView` | Displays content by using one of two templates for authenticated
    or anonymous users |

    | `LoginStatus` | Displays a login link when the user is anonymous, and a logout
    link when the user is authenticated |

    | `LoginName` | Displays the user’s login name |

    | `PasswordRecovery` | Displays a form to recover a lost password |

    | `CreateUserWizard` | Displays a sequence of steps used to create a new user
    account |

    | `ChangePassword` | Displays a form to allow a user to change her password |


    The controls in Table 5-1 are all configured with the settings in the `Web.config`
    file as well as properties on the controls themselves. The defaults are generally
    reasonable, but if you have requirements that differ from the defaults, it is
    not difficult to alter the behavior to meet your needs.


    The `SqlMembershipProvider` is just one of two providers that Microsoft released
    with ASP.NET 2.0, with the other being the Active Directory implementation. `SqlMembershipProvider`
    conforms to the required interface of the base class of `MembershipProvider` and
    accurately carries out the equivalent work that the SQL implementation does. And
    as the names suggest, one uses a directory, while the other uses a database to
    manage users. This common interface is what the ASP.NET controls use to carry
    out the same behavior regardless of the underlying implementation.


    8601Ch05CMP3 8/27/07 8:05 AM Page 113


    ### INTERFACE OR ABSTRACT?


    The base classes used by provider implementations are really abstract classes
    that first inherit from the `ProviderBase` class, which adds the base methods
    and properties common among all provider implementations. The methods and properties
    defined by a `MembershipProvider` that must be implemented are marked with the
    `abstract` attribute. Common functionality between providers could be implemented
    within the abstract base classes just as the `ProviderBase` sets the `Name` and
    `Description` properties in the `Initialize` method. You use this base class to
    define required methods but also to make it easier for a developer to implement
    his own implementation.


    Although both the Active Directory and SQL implementations handle the required
    methods of the `MembershipProvider` base class, they have several unique configuration
    settings related to their implementations. For example, the Active Directory implementation
    has an attribute called `attributeMapEmail`, which is not used by the SQL implementation.
    The ability to use unique configuration settings will come in handy when you need
    to create a custom implementation that has requirements going well beyond what
    was anticipated with these two implementations.


    ## Using XML Implementations


    Another alternative to a SQL implementation is XML. You can serialize a `DataSet`
    to disk as an XML file and load it as you need it. When you create a custom SQL
    provider, you have to create the tables and stored procedures, which takes more
    than just programmatically building a `DataSet` in memory and serializing it out
    to disk as an XML file. In this way, you can build a quick prototype of a custom
    provider, and after you have controls using it through the provider interface,
    you can implement a SQL implementation for better scalability. Because the XML
    implementation is compatible as a provider implementation, it can still be used
    during development even after you have a SQL implementation. The XML version can
    come in handy when you are disconnected from the database, voluntarily or otherwise.
    Switching between the XML and SQL provider is just a matter of changing the `defaultProvider`
    attribute in the configuration.


    > **Note:** The XML implementation of the Membership provider will not automatically
    have all the same users that are held by using the SQL implementation, but you
    will be able to switch between the XML and SQL configurations during development
    by creating a set of sample users to suit your needs. In Chapter 1, the example
    in Listing 1-19 shows how users and roles can also be created automatically when
    the application is started.


    ## Setting the Database Connection


    Connecting the `SqlMembershipProvider` to the database is done with the `connectionStringName`
    configuration attribute. Notice that this is a name and not a connection string.
    In .NET 1.1 it was common to set the connection string as just another setting
    in `appSettings`. With .NET 2.0 configuration files, the `connectionStrings` element
    represents database connections with a name and a `connectionString` attribute.
    The formalized construct separates connection string settings from other general
    settings for an application that makes it possible to reach these values programmatically.
    In the `SqlMembershipProvider` configuration, the `connectionStringName` refers
    to the `name` attribute of a connection string, binding the provider implementation
    to that database.


    You will discover that you can set multiple connection strings for different database
    catalogs in your database server and configure each of your provider implementations
    with a separate database. You could choose to isolate all the ASP.NET-generated
    resources in a database separate from your application tables for a clear separation
    and for ease of maintenance.


