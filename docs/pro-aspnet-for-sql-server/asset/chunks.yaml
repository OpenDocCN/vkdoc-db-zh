    Name\"]`实际引用的是你刚刚更改的同一查询结果。你可能很容易就有许多包含名为`Name`列的查询。全局搜索和替换会破坏那些引用。\n\n相反，如果你使用的是自定义业务对象，你可以安全地使用重构工具在解决方案范围内重命名属性。为了访问应用程序范围之外的引用，你还可以使用`Obsolete`属性标记旧属性，并附上使用新属性的说明，同时保持现有功能。这项技术将在本章后面介绍。\n\
    \n### 调试\n\n你可能会期望使用`DataSet`进行调试会得到很好的支持。令人惊讶的是，调试支持的缺乏是使用`DataSet`的一个显著缺点。在图\
    \ 7-1 中，你可以看到如何获取`DataSet`中第一个`DataTable`的第一个`DataRow`的值。要获取下一个`DataRow`，你必须更改索引值。\n\
    \n至少你可以查看该行中各列的值，但这些值是通过索引而不是列名访问的。当你访问同一行数据，该行被附加到 Web 窗体上的数据绑定控件（例如`Repeater`）时，你将通过`e.Item.DataItem`访问该行，这是一个`DataRowView`。正如你从图\
    \ 7-2 中看到的，监视窗口的帮助比图 7-1 更小。你无法直接导航到这些值，并且几乎无法通过查看监视窗口来推断类型。\n\n这种糟糕的调试体验将减少你用于创建和维护应用程序的时间。当数据在数据访问层立即移入业务对象并传递回应用程序时，你将能够以更有用的方式从调试器访问数据。图\
    \ 7-1 和 7-2 中使用的相同数据在图 7-3 中被放入一个`FavoriteLink`对象中。`FavoriteLink`是网站将使用的一个关键对象，我们将在本章后面构建这个网站。\n\
    \n图 7-3 中显示的值显然更具可读性，并且你确切地知道你正在处理什么。使用业务对象显然比`DataSet`提供了更好的调试体验。至少用户界面层恢复了编译时支持，而类型安全问题被隔离在数据访问层深处。当你通过将`row[\"\
    Url\"]`转换为`String`来在`FavoriteLink`对象中设置`Url`属性时，你会在靠近拉取数据的查询的地方进行此操作。任何由此产生的异常都将显示堆栈跟踪，指向此查询和行号（如果你随程序集一起部署了程序调试数据库（PDB）文件）。稍后你将看到如何完全避免`InvalidCastException`。\n\
    \n■**注意** 如果在编译类库时创建的 PDB 文件随程序集一起部署，异常可以提供更详细的堆栈跟踪。诸如异常发生的确切行号等有用细节将帮助你追踪和修复错误。PDB\
    \ 文件是在调试和发布配置下创建的。\n\n像任何其他普通对象一样，`FavoriteLink`对象也更易于重构。你可以在代码中找到对`Url`属性的所有引用，无论它在解决方案中的何处使用。不幸的是，如果你以声明方式将`Url`属性绑定到数据绑定控件，重构搜索将不会找到该引用。\n\
    \n最后，在调试时，你可以更轻松地使用`FavoriteLink`对象，如图 7-3 所示。这甚至包括在属性访问器中设置断点，这在观察哪些值被绑定到数据绑定控件时将非常有用。\n\
    \n### 内联 SQL\n\n一个需要避免的诱惑是直接将你的 SQL 语句写入代码中。尽管你创建的与数据库通信的代码确实会与查询和其他数据库命令紧密绑定，但这并不是创建或维护软件最有效的方式。\n\
    \n#### 维护注意事项\n\n将 SQL 直接放入代码中的一个问题是，当这些查询更改时，会导致额外的维护工作。你最终会为自己增加更多工作并增加出错的机会。例如，你最基本的查询可能开始时如清单\
    \ 7-1 所示。\n\n```sql\nSELECT * FROM Production.Product WHERE ProductID = 1\n```\n\
    \n你可以看到它开始时是一个可读的查询，但随着查询变长，它开始看起来更像清单 7-2。\n\n```sql\nSELECT \n    p.ProductID,\
    \ p.[Name], p.ProductNumber,\n    p.Color, p.ListPrice, \n    p.SellStartDate,\
    \ p.SellEndDate, \n    p.DiscontinuedDate \nFROM Production.Product AS p \nJOIN\
    \ Production.ProductProductPhoto AS ppp \nON ppp.ProductID = p.ProductID \nWHERE\
    \ ppp.ProductPhotoID != 1;\n```\n\n清单 7-2 中的查询显然是一个维护噩梦。当你进行微小的更改时，你会在代码中内联进行，并尽力确保将查询仔细地包裹在`String`的引号内。但你放弃了很多东西。\n\
    \n如果清单 7-2 中的查询是作为独立的 SQL 脚本维护的，你可以使用诸如 SQL Server Management Studio 或带有数据库项目的\
    \ Visual Studio 之类的工具来提供语法着色以及其他一些丰富的功能。第三方工具也可提供实时智能感知支持，并在你处理 SQL 时提供列和表名的列表。内联查询无法利用所有这些支持。\n\
    \n#### 安全注意事项\n"
- fmt: "Another problem with using inline SQL is the risk of SQL injection attacks.\
    \ This risk is often not considered but it is a very real problem. In Listing\
    \ 7-1, the `ProductID` is hard-coded into the `String`, but you may be getting\
    \ the value from a Query String with a URL such as `Product.aspx?ProductID=1`.\
    \ This inline query can be easily exploited if the `String` to query the database\
    \ looks like Listing 7-3.\n\n**Listing 7-3.** Exploitable Inline Query\n\n```java\n\
    public String GetProductQuery(String productId)\n{\n    return \"SELECT * FROM\
    \ Production.Product WHERE ProductID = \" + productId;\n}\n```\n\nAn attacker\
    \ will need to only adjust the query string with a statement that ends the query\
    \ and starts another command, such as an update or a delete command. A resourceful\
    \ attacker could gain access to all your data by querying your schema to discover\
    \ all the tables and copying the data without you ever knowing. And until the\
    \ problem is corrected, the attacker can return anytime to repeat that query and\
    \ compromise your data.\n\nProtecting against a SQL injection attack starts by\
    \ never trusting data coming from the user. Data should always be validated. If\
    \ you expect the `ProductID` to be an integer, you could use the code in Listing\
    \ 7-4 to more safely assemble the query.\n\n**Listing 7-4.** Validating Incoming\
    \ Data\n\n```java\nint productId = 0;\nString sql = \"\";\n\nif (int.TryParse(Request.QueryString[\"\
    ProductID\"], out productId))\n{\n    sql = GetProductQuery(productId);\n}\nelse\n\
    {\n    // handle the failed attempt\n}\n```\n\nTo make matters worse, if your\
    \ application shows the message from the exception directly to a potential attacker,\
    \ it will give that attacker information that can help in modifying the query.\
    \ When you catch an exception, you should log the error and throw a new exception\
    \ without any information that would help an attacker. A user does not need to\
    \ know that level of detail. The user does not need to notify you about the details\
    \ of the exception, because you can always look into the error log for the details.\
    \ You also should monitor that error log because it may show attempts to compromise\
    \ your database.\n\nThe next step beyond validating all incoming data is to use\
    \ parameterized queries to bind values to database commands. When values are specifically\
    \ bound to placeholders in a query with type restrictions, not to mention the\
    \ proper ordering of parameters, it makes it much more difficult for an attacker\
    \ to assemble a functional attack. A parameterized query will also escape out\
    \ characters such as quotes and wildcard characters, which eliminates the possibility\
    \ of injecting a string that will close your query and start another. Listing\
    \ 7-5 shows a parameterized query.\n\n**Listing 7-5.** Parameter Binding\n\n```csharp\n\
    public DataSet GetProduct(int productId)\n{\n    DataSet ds;\n    try\n    {\n\
    \        String sql = \"SELECT * FROM Production.Product \" +\n              \
    \       \"WHERE ProductID = @ProductID\";\n        using (DbCommand dbCmd = db.GetSqlStringCommand(sql))\n\
    \        {\n            db.AddInParameter(dbCmd, \"@ProductID\",\n           \
    \                  DbType.Int32, productId);\n            ds = db.ExecuteDataSet(dbCmd);\n\
    \        }\n    }\n    catch (Exception ex)\n    {\n        // handle exception\n\
    \        throw;\n    }\n    return ds;\n}\n```\n\nWhen `ProductID` is validated\
    \ at the user interface layer, you can take proper action such as showing a validation\
    \ message that is meaningful to the user. Doing so will prevent garbage data from\
    \ getting to the database.\n\nAnother step can be taken to further protect the\
    \ data, but it cannot be done with inline SQL. When all interactions with the\
    \ database are done through stored procedures instead of inline SQL, you can lock\
    \ down access to the tables and specifically allow access to stored procedures\
    \ for particular users.\n\n## Stored Procedures\n\nStored procedures can be used\
    \ to extend your application and provide a clean and flexible bridge between your\
    \ user interface and the underlying data. By blocking access to the tables, you\
    \ make the stored procedures the only entry point to the database. When all data\
    \ passes through a stored procedure layer, which can include programming logic,\
    \ you have a great deal of flexibility.\n\nStored procedures working as your public\
    \ interface become an integral part of your data access layer. In fact, if you\
    \ have five applications using your database and want to log each time a record\
    \ is deleted from the `Production.Product` table, the stored procedure used to\
    \ delete those records can be updated to handle the logging. It is not necessary\
    \ to incorporate that change in each of the five applications. And if you choose\
    \ to adjust the structure of your database, perhaps further normalizing the structure,\
    \ the stored procedures can still use the same parameters and return the same\
    \ output after the structural change in many cases.\n\nYou can also encapsulate\
    \ what some developers may consider to be business logic in stored procedures.\
    \ Generally, it is not a good idea to bury business logic in a stored procedure.\
    \ A stored procedure, typically created in T-SQL, is not as expressive and testable\
    \ as C# code for the average developer who tries to avoid writing anything in\
    \ T-SQL. Those developers who are comfortable with T-SQL may disagree about the\
    \ viability of placing business logic into stored procedures.\n\nSometimes the\
    \ business logic is already tightly bound to the structure of the database. For\
    \ example, the logic to determine whether a product is on sale, and for what price,\
    \ may be considered business logic. But joining the product table to the sales\
    \ schedule and pricing tables is structural logic. If I run a stored procedure\
    \ named `GetProduct` during a sale, it would give me the discounted price. Running\
    \ it at any other time would give me the regular price. Encapsulating that sort\
    \ of logic in the stored procedure is compelling because of the advantages it\
    \ offers. It hides the structure of the database from your application and gives\
    \ you the data you need. And if the database was first created without a sales\
    \ feature, the stored procedure gives you the opportunity to roll out such a feature\
    \ without also updating your application code.\n\nThe responsibilities we assign\
    \ to T-SQL vs. the rest of your application will be a line we cross from time\
    \ to time.\n\nBecause you can identify which stored procedures are in place, you\
    \ can identify exactly which commands are hitting the database. You also have\
    \ direct access to all these commands.\n\nIf you decided to restructure the tables\
    \ for any reason, you can put together a set of scripts to adjust the tables and\
    \ update the stored procedures to carry out the change. If you had queries spread\
    \ across five applications, you would have to look into each application to see\
    \ how each of the queries was working in the source code of each application.\
    \ If a query is being assembled in a complex way, you may have a difficult time\
    \ confirming that your updates will not cause breaking changes. Going forward,\
    \ we will leverage all the advantages that stored procedures offer.\n\n## Using\
    \ DataObjects and the ObjectDataSource\n\nWe come back to `DataObjects` and the\
    \ `ObjectDataSource`, which were covered briefly in Chapter 2 as a part of our\
    \ data model choices. From all those choices, these two deserve the most attention\
    \ because of the flexibility they provide. These features were designed to work\
    \ seamlessly together with rich tool support to give the developer a great deal\
    \ of control over the data layer. These pieces give us an intelligent way to plug\
    \ the application into the datasource.\n\nAfter the application is plugged into\
    \ the datasource, the data flows over a pipeline in whatever form we choose."
  raw: 'Another problem with using inline SQL is the risk of SQL injection attacks.
    This risk is often not considered but it is a very real problem. In Listing 7-1,
    the ProductID is hard-coded into the String, but you may be getting the value
    from a Query String with a URL such as Product.aspx?ProductID=1\. This inline
    query can be easily exploited if the String to query the database looks like Listing
    7-3.


    8601Ch07CMP2 8/24/07 12:23 PM Page 197


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **197**


    **Listing 7-3.** *Exploitable Inline Query*


    public String GetProductQuery(String productId)


    {


    return "SELECT * FROM Production.Product WHERE ProductID = " + productId;


    }


    An attacker will need to only adjust the query string with a statement that ends
    the query and starts another command, such as an update or a delete command. A
    resourceful attacker could gain access to all your data by querying your schema
    to discover all the tables and copying the data without you ever knowing. And
    until the problem is corrected, the attacker can return anytime to repeat that
    query and compromise your data.


    Protecting against a SQL injection attack starts by never trusting data coming
    from the user. Data should always be validated. If you expect the ProductID to
    be an integer, you could use the code in Listing 7-4 to more safely assemble the
    query.


    **Listing 7-4.** *Validating Incoming Data*


    int productId = 0;


    String sql = "";


    if (int.TryParse(Request.QueryString["ProductID"], out productId))


    {


    sql = GetProductQuery(productId);


    }


    else


    {


    // handle the failed attempt


    }


    To make matters worse, if your application shows the message from the exception
    directly to a potential attacker, it will give that attacker information that
    can help in modifying the query. When you catch an exception, you should log the
    error and throw a new exception without any information that would help an attacker.
    A user does not need to know that level of detail. The user does not need to notify
    you about the details of the exception, because you can always look into the error
    log for the details. You also should monitor that error log because it may show
    attempts to compromise your database.


    The next step beyond validating all incoming data is to use parameterized queries
    to bind values to database commands. When values are specifically bound to placeholders
    in a query with type restrictions, not to mention the proper ordering of parameters,
    it makes it much more difficult for an attacker to assemble a functional attack.
    A parameterized query will also escape out characters such as quotes and wildcard
    characters, which eliminates the possibility of injecting a string that will close
    your query and start another. Listing 7-5 shows a parameterized query.


    8601Ch07CMP2 8/24/07 12:23 PM Page 198


    **198**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **Listing 7-5.** *Parameter Binding*


    public DataSet GetProduct(int productId)


    {


    DataSet ds;


    try


    {


    String sql = "SELECT * FROM Production.Product " +


    "WHERE ProductID = @ProductID";


    using (DbCommand dbCmd = db.GetSqlStringCommand(sql))


    {


    db.AddInParameter(dbCmd, "@ProductID",


    DbType.Int32, productId);


    ds = db.ExecuteDataSet(dbCmd);


    }


    }


    catch (Exception ex)


    {


    // handle exception


    throw;


    }


    return ds;


    }


    When ProductID is validated at the user interface layer, you can take proper action
    such as showing a validation message that is meaningful to the user. Doing so
    will prevent garbage data from getting to the database.


    Another step can be taken to further protect the data, but it cannot be done with
    inline SQL. When all interactions with the database are done through stored procedures
    instead of inline SQL, you can lock down access to the tables and specifically
    allow access to stored procedures for particular users.


    **Stored Procedures**


    Stored procedures can be used to extend your application and provide a clean and
    flexible bridge between your user interface and the underlying data. By blocking
    access to the tables, you make the stored procedures the only entry point to the
    database. When all data passes through a stored procedure layer, which can include
    programming logic, you have a great deal of flexibility.


    Stored procedures working as your public interface become an integral part of
    your data access layer. In fact, if you have five applications using your database
    and want to log each time a record is deleted from the Production.Product table,
    the stored procedure used to delete those records can be updated to handle the
    logging. It is not necessary to incorporate that change in each of the five applications.
    And if you choose to adjust the structure of your database, perhaps further normalizing
    the structure, the stored procedures can still use the same parameters and return
    the same output after the structural change in many cases.


    You can also encapsulate what some developers may consider to be business logic
    in stored procedures. Generally, it is not a good idea to bury business logic
    in a stored procedure.


    8601Ch07CMP2 8/24/07 12:23 PM Page 199


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    **199**


    A stored procedure, typically created in T-SQL, is not as expressive and testable
    as C# code for the average developer who tries to avoid writing anything in T-SQL.
    Those developers who are comfortable with T-SQL may disagree about the viability
    of placing business logic into stored procedures.


    Sometimes the business logic is already tightly bound to the structure of the
    database. For example, the logic to determine whether a product is on sale, and
    for what price, may be considered business logic. But joining the product table
    to the sales schedule and pricing tables is structural logic. If I run a stored
    procedure named GetProduct during a sale, it would give me the discounted price.
    Running it at any other time would give me the regular price. Encapsulating that
    sort of logic in the stored procedure is compelling because of the advantages
    it offers. It hides the structure of the database from your application and gives
    you the data you need. And if the database was first created without a sales feature,
    the stored procedure gives you the opportunity to roll out such a feature without
    also updating your application code.


    The responsibilities we assign to T-SQL vs. the rest of your application will
    be a line we cross from time to time.


    Because you can identify which stored procedures are in place, you can identify
    exactly which commands are hitting the database. You also have direct access to
    all these commands.


    If you decided to restructure the tables for any reason, you can put together
    a set of scripts to adjust the tables and update the stored procedures to carry
    out the change. If you had queries spread across five applications, you would
    have to look into each application to see how each of the queries was working
    in the source code of each application. If a query is being assembled in a complex
    way, you may have a difficult time confirming that your updates will not cause
    breaking changes. Going forward, we will leverage all the advantages that stored
    procedures offer.


    **Using DataObjects and the ObjectDataSource**


    We come back to DataObjects and the ObjectDataSource, which were covered briefly
    in Chapter 2 as a part of our data model choices. From all those choices, these
    two deserve the most attention because of the flexibility they provide. These
    features were designed to work seamlessly together with rich tool support to give
    the developer a great deal of control over the data layer. These pieces give us
    an intelligent way to plug the application into the datasource.


    After the application is plugged into the datasource, the data flows over a pipeline
    in whatever form we choose.'
  trans: "\n使用内联 SQL 的另一个问题是 SQL 注入攻击的风险。这种风险常被忽视，但它确实是一个非常实际的问题。在清单 7-1 中，`ProductID`\
    \ 被硬编码到了 `String` 中，但你可能从 URL 的查询字符串（如 `Product.aspx?ProductID=1`）中获取该值。如果用于查询数据库的\
    \ `String` 类似于清单 7-3，那么这种内联查询很容易被利用。\n\n**清单 7-3.** 可被利用的内联查询\n\n```java\npublic\
    \ String GetProductQuery(String productId)\n{\n    return \"SELECT * FROM Production.Product\
    \ WHERE ProductID = \" + productId;\n}\n```\n\n攻击者只需要调整查询字符串，添加一个结束当前查询并开始另一条命令（例如\
    \ `UPDATE` 或 `DELETE` 命令）的语句。一个足智多谋的攻击者可以通过查询你的数据库架构来发现所有表并复制数据，从而获取所有数据，而你可能对此一无所知。在问题得到纠正之前，攻击者可以随时返回重复该查询，危害你的数据。\n\
    \n防范 SQL 注入攻击的第一步是永远不要相信来自用户的数据。数据应始终被验证。如果你期望 `ProductID` 是一个整数，可以使用清单 7-4 中的代码更安全地组装查询。\n\
    \n**清单 7-4.** 验证传入数据\n\n```java\nint productId = 0;\nString sql = \"\";\n\nif\
    \ (int.TryParse(Request.QueryString[\"ProductID\"], out productId))\n{\n    sql\
    \ = GetProductQuery(productId);\n}\nelse\n{\n    // handle the failed attempt\n\
    }\n```\n\n更糟糕的是，如果你的应用程序将异常信息直接显示给潜在的攻击者，这将会给攻击者提供有助于修改查询的信息。当你捕获异常时，你应该记录错误并抛出一个不包含任何可能帮助攻击者的信息的新异常。用户不需要知道那个级别的详细信息。用户也不需要向你通知异常的详细信息，因为你总是可以查看错误日志来获取详情。你也应该监控该错误日志，因为它可能会显示危害你数据库的尝试。\n\
    \n超越验证所有传入数据的下一步是使用参数化查询将值绑定到数据库命令。当值通过类型限制被专门绑定到查询中的占位符（更不用说参数的正确顺序）时，这使得攻击者组装功能性攻击变得困难得多。参数化查询还会转义诸如引号和通配符之类的字符，从而消除了注入一个会关闭你的查询并启动另一个查询的字符串的可能性。清单\
    \ 7-5 展示了一个参数化查询。\n\n**清单 7-5.** 参数绑定\n\n```csharp\npublic DataSet GetProduct(int\
    \ productId)\n{\n    DataSet ds;\n    try\n    {\n        String sql = \"SELECT\
    \ * FROM Production.Product \" +\n                     \"WHERE ProductID = @ProductID\"\
    ;\n        using (DbCommand dbCmd = db.GetSqlStringCommand(sql))\n        {\n\
    \            db.AddInParameter(dbCmd, \"@ProductID\",\n                      \
    \       DbType.Int32, productId);\n            ds = db.ExecuteDataSet(dbCmd);\n\
    \        }\n    }\n    catch (Exception ex)\n    {\n        // handle exception\n\
    \        throw;\n    }\n    return ds;\n}\n```\n\n当 `ProductID` 在用户界面层被验证后，你可以采取适当的操作，例如向用户显示有意义的验证消息。这样做可以防止垃圾数据进入数据库。\n\
    \n还可以采取另一步来进一步保护数据，但这无法通过内联 SQL 完成。当所有与数据库的交互都通过存储过程而不是内联 SQL 完成时，你可以锁定对表的访问，并特别允许特定用户访问存储过程。\n\
    \n## 存储过程\n\n存储过程可用于扩展你的应用程序，并在你的用户界面和底层数据之间提供一个干净灵活的桥梁。通过阻止对表的访问，你使存储过程成为访问数据库的唯一入口点。当所有数据都通过一个可以包含编程逻辑的存储过程层时，你将拥有极大的灵活性。\n\
    \n作为你的公共接口的存储过程成为你数据访问层不可或缺的一部分。事实上，如果你有五个应用程序使用你的数据库，并且你想记录每次从 `Production.Product`\
    \ 表中删除记录的操作，那么用于删除这些记录的存储过程可以被更新以处理日志记录。你不需要将该变更纳入五个应用程序中的每一个。而且，如果你选择调整数据库的结构，例如进一步规范化结构，在许多情况下，存储过程仍然可以使用相同的参数并在结构变更后返回相同的输出。\n\
    \n你还可以将一些开发人员可能认为是业务逻辑的内容封装在存储过程中。通常，将业务逻辑深埋在存储过程中并不是一个好主意。存储过程通常用 T-SQL 创建，对于试图避免用\
    \ T-SQL 编写任何内容的普通开发者来说，它不像 C# 代码那样具有表现力和可测试性。那些对 T-SQL 很熟悉的开发者可能不同意将业务逻辑放入存储过程的可行性。\n\
    \n有时业务逻辑已经与数据库结构紧密绑定。例如，确定产品是否在销售以及销售价格的逻辑可能被认为是业务逻辑。但是将产品表连接到销售计划表和定价表是结构性逻辑。如果我在销售期间运行一个名为\
    \ `GetProduct` 的存储过程，它会给我折扣价。在其他任何时间运行它，它会给我常规价格。将此类逻辑封装在存储过程中非常有吸引力，因为它提供了诸多优势。它向你的应用程序隐藏了数据库的结构，并提供了你所需的数据。而且，如果数据库最初创建时没有销售功能，存储过程让你有机会推出这样的功能，而无需同时更新你的应用程序代码。\n\
    \n我们将职责分配给 T-SQL 与应用程序其余部分之间的界限，是我们有时会跨越的。\n\n因为你可以识别哪些存储过程已存在，所以你可以准确识别哪些命令正在访问数据库。你还可以直接访问所有这些命令。\n\
    \n如果你因任何原因决定重组表，你可以编写一组脚本来调整表并更新存储过程以执行变更。如果你有查询分散在五个应用程序中，你将不得不查看每个应用程序，以了解每个查询在各自应用程序源代码中是如何工作的。如果一个查询是以复杂的方式组装的，你可能很难确认你的更新不会导致破坏性变更。展望未来，我们将利用存储过程提供的所有优势。\n\
    \n## 使用 DataObjects 和 ObjectDataSource\n\n我们再次回到 `DataObjects` 和 `ObjectDataSource`，它们在第二章中作为我们数据模型选择的一部分被简要介绍过。在所有选择中，这两个最值得关注，因为它们提供了极大的灵活性。这些功能旨在无缝协作，并提供丰富的工具支持，使开发人员能够对数据层进行大量控制。这些组件为我们提供了一种智能的方式，将应用程序插入数据源。\n\
    \n在应用程序插入数据源后，数据将以我们选择的任何形式通过管道流动。\n"
- fmt: "# Chapter 7: Manual Data Access Layer\n\nAs the developer creating the data\
    \ access layer, you will create classes marked with a `DataObject` attribute with\
    \ methods marked with `DataObjectMethodType` attributes, which indicates what\
    \ the method will provide for an `ObjectDataSource`. Table 7-1 shows each of the\
    \ values of a `DataObectMethodType`.\n\n## Table 7-1. DataObjectMethodType Enumeration\n\
    \n*   `Insert`\n    Represents a method that performs an insert operation\n* \
    \  `Update`\n    Represents a method that performs an update operation\n*   `Delete`\n\
    \    Represents a method that performs a delete operation\n*   `Select`\n    Represents\
    \ a method that retrieves data\n*   `Fill`\n    Represents a method that fills\
    \ a `DataSet`\n\n![Image 30](index-205_1.jpg)\n\nWhen the developer using the\
    \ data access layer drags an `ObjectDataSource` onto the design surface, a wizard\
    \ panel will point the developer at these methods by first allowing him to select\
    \ any class marked as a `DataObject` and then methods with the `DataObjectMethodType`\
    \ attribute for the selected class. It shows the developer the return type and\
    \ the parameters, along with the method name, which should be explicit enough\
    \ to indicate what it is doing (see Figure 7-4).\n\n## Figure 7-4. ObjectDataSource\
    \ wizard method selection\n\nBy directing developers to the right objects and\
    \ methods, you make their jobs much easier while encouraging them to use the right\
    \ methods. Digging through the source code and guessing at which classes and methods\
    \ to use would take more time and potentially introduce problems if they make\
    \ the wrong choice. Even worse, they may give up and bypass the data access layer\
    \ and directly access the database. By encouraging the development team to use\
    \ the `ObjectDataSource` and the properly built data access layer, they will become\
    \ accustomed to building the application by using the design surface in this way\
    \ and expect the database developers to provide them with the classes and methods\
    \ they need to implement features for the application. With this relationship\
    \ established, and as the application developers begin to rely on the database\
    \ developers, you can start to formalize communication.\n\n## Design Contract\n\
    \nWhen the application developer is displaying a set of data about products, the\
    \ developer will use a databound control such as a `GridView`. And when the developer\
    \ uses an `ObjectDatasSource` to bind the data to that `GridView` by using the\
    \ data access layer you created, the developer will select a class and method\
    \ that suit his needs. When selecting an object named `ProductDomain`, which has\
    \ a method named `GetAllProducts` and which returns `ProductCollection`, the developer\
    \ will assume that is the right choice. But these names should do more than just\
    \ indicate some relation to products. The names and objects represent a Design\
    \ Contract that the data access layer is maintaining for use by any application\
    \ that will use it. How these objects and methods go about gathering the data\
    \ and returning it is not a detail that is a part of the Design Contract, but\
    \ what methods are available and what they return is important. A violation of\
    \ the contract will cause runtime exceptions.\n\nAnother method named `GetProductsByCategory`\
    \ that also returns `ProductCollection` should include the same columns that the\
    \ `GetAllProducts` methods return. The methods on the `ProductDomain` class could\
    \ be set as `public` or `private`. Making them `private` specifically excludes\
    \ them from the Design Contract. And for the `public` methods, you can mark them\
    \ with a `DataObjectMethodType`, which defines the intended use of the method.\
    \ After the developer has used a method that returns `ProductCollection`, she\
    \ should be able to use the other methods on the `ProductDomain` class without\
    \ concern about the data being different than expected.\n\nAs the application\
    \ developers require functionality from the data access layer, the Design Contract\
    \ will be negotiated to include what is needed and when it will be provided. And\
    \ after the new features have been published, the contract cannot be changed without\
    \ giving the application developers proper notice of the change.\n\n## Data Contract\n\
    \nAfter a developer has plugged his application into your data layer with the\
    \ implied Design Contract, there is also another agreement in place. The Design\
    \ Contract defines the pipeline that the data flows through, but the messages\
    \ flying around must be defined with a Data Contract. If `ProductCollection` holds\
    \ onto `Product` objects that have properties named `ProductName`, `ProductNumber`,\
    \ and `Price`, that Data Contract must be maintained. After the data binding is\
    \ in place, it can be difficult, if not impossible, to change that name later\
    \ without breaking the applications using it.\n\nThe Data Contract includes the\
    \ name of the fields as well as their type. If the `ProductName` is a `String`\
    \ and the `Price` is a `Decimal`, it should always be that way for future versions\
    \ of the data access layer. The data bindings will be declared with those names,\
    \ expecting the types that were defined when the bindings were first declared.\
    \ Changing the Data Contract will require the applications to be updated to prevent\
    \ runtime exceptions.\n\nOf course, there will be times when the Data Contract\
    \ has to change, just as the data itself also changes. When doing so, you should\
    \ first increment the version number up to the next significant value. You should\
    \ then produce documentation explaining any breaking changes and how the developers\
    \ should adapt their applications to the new Data Contract. You can also help\
    \ them out with a transitional period, when the old Data Contract is maintained\
    \ with a defined end date.\n\nIn a simple scenario, you start with a `Person`\
    \ object that has a `Name` property representing a person’s full name. Later,\
    \ because of a change in requirements, the `Name` is broken into properties called\
    \ `FirstName`, `MiddleInitial`, and `LastName`. You can start a transitional period\
    \ by adding the new properties while keeping the old property in place. Listing\
    \ 7-6 shows a method marked as `Obsolete`.\n\n## Listing 7-6. Breaking Up the\
    \ Name Property\n\n```csharp\n/// <summary>\n/// Expects a name formatted like\
    \ \"John Q Public\" or \"John Public\"\n/// </summary>\n[Obsolete(\"Use FirstName,\
    \ MiddleInitial and LastName\")]\npublic string Name\n{\n    get\n    {\n    \
    \    if (String.IsNullOrEmpty(MiddleInitial))\n        {\n            return FirstName\
    \ + \" \" + LastName;\n        }\n        return FirstName + \" \" + MiddleInitial\
    \ + \" \" + LastName;\n    }\n    set\n    {\n        string[] parts = value.Split(\"\
    \ \".ToCharArray()[0]);\n        FirstName = parts[0];\n        if (parts.Length\
    \ > 2)\n        {\n            MiddleInitial = parts[1];\n            LastName\
    \ = parts[2];\n        }\n        else if (parts.Length > 1)\n        {\n    \
    \        MiddleInitial = String.Empty;\n            LastName = parts[1];\n   \
    \     }\n    }\n}\n```\n\nIn Listing 7-6, the `Name` property wraps the newly\
    \ introduced properties to maintain the existing Data Contract while giving the\
    \ developers the option to start transitioning their applications. To assist the\
    \ developers, the `Obsolete` attribute has been placed on the `Name` property\
    \ to display a warning when their code is compiled. The warning includes a useful\
    \ message explaining which properties should now be used.\n\nPerhaps your data\
    \ access layer starts out at version 1.2.0.8. When you apply these transitional\
    \ changes, you set the version to 1.2.1.0 and release it to the developers. After\
    \ the transitional period ends, you can bump the version more significantly to\
    \ a value such as 1.3.0.0 or even 2.0.0.0, which should prompt the developers\
    \ to recognize that a significant change has been made. If the developers see\
    \ only a very minor version number increase, they may assume that it is only a\
    \ minor bug fix release and start using it without properly evaluating and considering\
    \ the changes."
