    problem has to be resolved in the PersonListingControl.


    The PersonListingControl has access to the data through the DataSourceID so that
    it can always retrieve the data if it needs it. When ViewState is disabled, a
    set of values must be persisted as ControlState. These values include the PageIndex,
    TotalRowsCount, ItemCount, and CommandArgument values for the pager links.


    Earlier you looked at the CreateChildControls method for the PersonListingControl
    in Listing 4-22, which used the _itemCount member variable to re-create the right
    number of items when the dataBinding value was false. This is one of the values
    the that will be persisted using ControlState. Listing 4-45 shows the SaveControlState
    method.


    **Listing 4-45.** *SaveControlState Method*


    protected override object SaveControlState()


    {


    object[] state = new object[6];


    state[0] = base.SaveControlState();


    state[1] = _pageIndex;


    state[2] = _totalRowsCount;


    state[3] = _itemCount;


    state[4] = _previousLinkButton.CommandArgument;


    state[5] = _nextLinkButton.CommandArgument;


    return state;


    }


