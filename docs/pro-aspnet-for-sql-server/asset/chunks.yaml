    return new SessionPageStatePersister(Page);


    }


    }


    The implementation for SessionPageStatePersister places a Guid value into the
    hidden input field in place of all the encrypted data and places the actual data
    into the user’s Session.


    When a postback occurs, the Guid value is used to look up that data. This data
    is limited to a rotating queue that holds only the last ten pages of data. And
    while this reduces the page size, the limitation of placing it in the Session
    presents a few problems.


    The clear problem is that if the data is removed from the Session, a postback
    will throw an exception. This can happen if the user’s Session expires after the
    default time-out of 20 minutes. When a user’s Session expires, the Session is
    abandoned on the server along with the server-side ViewState. If a user steps
    away for that time period, returns, and then clicks a button causing a postback,
    that user will see the exception. You may consider bumping up the Session time-out
    to eight hours, but doing so will cause more memory to be used on the server.


    If you retain the Session state for all users who visit your website in that eight-hour
    period, you may struggle with the amount of memory that is required.


    Users could also open two browser windows while using your web application. They
    click around in one window for a while and then move to the other window and click
    some more, causing postbacks as they do so. If they go beyond the ten-click limit
    and return to the other window and cause a postback, they will get the state exception.
    Fortunately, this feature can be enabled on a page-by-page basis. If your website
    has a limited set of data-intensive pages, you could set them to use the SessionPageStatePersister
    while the rest of the pages use the default functionality.'
  trans: '# 第四章：数据绑定控件


    ## 用户控件的实现


    `TypeName="Chapter04.PersonDomain"></asp:ObjectDataSource>` 这里有趣的是，用户控件上的 `Country`
    属性可以像 `Label` 控件（一个标准的 ASP.NET 控件）一样，绑定到 `Country` 值。当数据绑定到 `Repeater1` 时，它会自动设置
    `CityListingControl1` 上的 `Country` 属性。


    这一切都无需在代码后置文件中添加任何额外代码。清单 4-14 展示了城市列表控件。


    **清单 4-14.** *CityListingControl.ascx*


    ```xml

    <%@ Control Language="C#" AutoEventWireup="true"


    CodeFile="CityListingControl.ascx.cs" Inherits="Controls_CityListingControl" %>


    <asp:Repeater ID="Repeater1" runat="server" DataSourceID="ObjectDataSource1">


    <HeaderTemplate>


    <ul>


    </HeaderTemplate>


    <ItemTemplate>


    <li>


    <asp:Label ID="Label1" runat="server"


    Text=''<%# Bind("City") %>''></asp:Label><br />


    </li>


    </ItemTemplate>


    FooterTemplate>


    </ul>


    </FooterTemplate>


    </asp:Repeater>


    <asp:ObjectDataSource ID="ObjectDataSource1" runat="server"


    OldValuesParameterFormatString="original_{0}"


    SelectMethod="GetCitiesByCountry"


    TypeName="Chapter04.PersonDomain"


    OnSelecting="ObjectDataSource1_Selecting">


    <SelectParameters>


    <asp:Parameter Name="country" Type="String" />


    </SelectParameters>


    </asp:ObjectDataSource>

    ```


    该用户控件同样利用 `Repeater` 来以项目符号列表的形式列出所有数据。在此情况下，列出的就是所选国家内的所有城市。在代码后置文件中，如清单 4-15
    所示，添加了一小段代码将父用户控件连接起来以绑定数据。


    **清单 4-15.** *CityListingControl.ascx.cs*


    ```csharp

    protected void ObjectDataSource1_Selecting(


    object sender, System.Web.UI.WebControls.ObjectDataSourceSelectingEventArgs e)


    {


    e.InputParameters["country"] = Country;


    }


    private string _country;


    public string Country


    {


    get {


    return _country;


    }


    set {


    _country = value;


    ObjectDataSource1.DataBind();


    }


    }

    ```


    理论上，你可以按照这种将属性传入用户控件作为输入参数进行绑定的模式，继续深入多个层级，比如列出居住在每个城市中的人员。这样做完全封装了每个用户控件的行为。


    ### 注意递归数据绑定


    当属性被设置时，请确保只绑定 `ObjectDataSource`，而不是整个用户控件。


    重新绑定用户控件会导致属性上出现无限递归循环，因为用户控件会反复、多次地绑定数据。


    ## 视图状态与数据绑定


    在使用数据绑定时，`ViewState` 作为回发模型的一部分将被广泛使用。所有绑定到控件（如 `GridView`）的数据都保存在 `ViewState`
    中。


    默认情况下，数据会被序列化为字符串，进行加密，并作为隐藏输入字段包含在页面中。当发生回发时，来自隐藏字段的值会被解密和反序列化。然后，回发过程会尝试使用这些数据来重置控件的值。通过使用
    `ViewState` 来重绘数据绑定控件，你可以避免返回数据库重新获取所有必要的数据。在一个典型的页面上，你可能会有几个数据绑定控件会使用此 `ViewState`。以
    `GridView` 为例，你可以单击其中一个分页链接来更改选中的索引，这将导致从数据库中提取新数据。在此期间，其他数据绑定控件将仅使用 `ViewState`
    数据来重绘自身。如果你将它与其他需要在每次页面请求时都从数据库重新绑定所有数据的解决方案相比，这是一个相当高效的模型。


    然而，使用 `ViewState` 确实意味着当页面显示大量数据时，保存在隐藏输入字段中的 `ViewState` 数据也会很大。它也是对显示数据的一种复制，保存在一个加密字符串中以维护数据的完整性。因此，虽然你在回发期间减少了访问数据库的次数，但也增加了页面的加载时间，这对于那些通过有限带宽连接到你的
    Web 应用程序的用户来说，可能同样是一种性能损失。这类用户可能使用调制解调器或移动网络连接，无法提供高速访问。他们也可能与办公室里的所有人共享一个高速连接，这会降低他们的访问速度。


    无论如何，你应该通过减少页面的大小，使页面加载时间尽可能快。当 `ViewState` 变大时，你需要考虑减小其大小的方法。


    ### 页面大小与加载时间


    Web 可用性领域的权威 Jakob Nielsen 在他的网站上指出，使用调制解调器连接互联网的用户需要十秒钟来加载一个仅 34 KB 的页面 (http://www.useit.com/alertbox/sizelimits.html)。对于有线电视/DSL
    连接，加载一个 100KB 的页面需要一秒钟。一个数据密集型的页面很容易超过 100 KB，因此高速用户可能仍然需要等待两到五秒让你的页面加载完成。削减 `ViewState`
    可以为高速用户节省几秒钟，而对于连接速度较慢的用户来说节省的时间会更多。当然，这些延迟还会因为准备和开始向用户发送响应的时间而延长。


    ## 会话与视图状态


    你可以更改 `ViewState` 的持久化方式，以避免将所有这些额外数据放在页面中。


    ASP.NET 2.0 引入了将 `ViewState` 存储在 `Session` 中而非隐藏输入字段中的选项。你只需重写 `PageStatePersister`
    属性，返回默认的 `HiddenFieldPagePersister` 或 `SessionPageStatePersister`。清单 4-16 展示了一个例子。


    **清单 4-16.** *将 PageStatePersister 设置为使用 Session*


    ```csharp

    protected override PageStatePersister PageStatePersister


    {


    get


    {


    return new SessionPageStatePersister(Page);


    }


    }

    ```


    `SessionPageStatePersister` 的实现将一个 `Guid` 值放入隐藏输入字段以替代所有加密数据，并将实际数据放入用户的 `Session`
    中。


    当发生回发时，`Guid` 值用于查找该数据。此数据被限制在一个循环队列中，该队列仅保存最近十个页面的数据。虽然这减少了页面大小，但将其置于 `Session`
    中的限制也带来了一些问题。


    明显的问题是，如果数据从 `Session` 中移除，回发将引发异常。如果用户的 `Session` 在默认的 20 分钟超时后过期，就可能发生这种情况。当用户的
    `Session` 过期时，服务器端的 `ViewState` 会随 `Session` 一起被放弃。如果用户离开一段时间后返回，并单击一个按钮导致回发，该用户将看到异常。你可以考虑将会话超时时间延长至八小时，但这样做会导致服务器上使用更多的内存。


    如果你为八小时内访问网站的所有用户保留 `Session` 状态，你可能会因所需的内存量而感到困扰。


    用户也可能在使用你的 Web 应用程序时打开两个浏览器窗口。他们在一个窗口中点击一段时间，然后切换到另一个窗口继续点击，从而导致回发。如果他们超出了十次点击的限制并返回另一个窗口引发回发，他们将会遇到状态异常。幸运的是，这个功能可以按页面启用。如果你的网站只有有限几个数据密集型页面，你可以设置它们使用
    `SessionPageStatePersister`，而其余页面则使用默认功能。'
- fmt: "# C H A P T E R 4 ■ D A T A B O U N D C O N T R O L S\n\nYou could also implement\
    \ your own custom `PageStatePersister` that works much like the `SessionPageStatePersister`,\
    \ but instead of limiting the data to ten items, older data could be stored to\
    \ the database in case it is needed. A scheduled job could purge this data nightly.\n\
    \n## Paging\n\nThe size of the `ViewState` can also be reduced using paging. Consider\
    \ a `GridView` that has 1,000 total items with the page size set to 10 items.\
    \ Only the data for those 10 items will be persisted in `ViewState` instead of\
    \ the data for all 1,000 items. When paging is combined with the subset selection\
    \ technique covered in the last chapter, you can ensure that only the 10 rows\
    \ that are shown are pulled from the database, which will reduce the load on the\
    \ database. You will learn more about the benefits of paging later when you get\
    \ into building a custom databound control in the section “Creating a Databound\
    \ Control.”\n\n## Disabling ViewState\n\nAnother way to reduce page size is to\
    \ disable `ViewState`. You can do so with an entire page or at the control level\
    \ with the `EnableViewState` property. If you disable `ViewState` for the page,\
    \ that decision will have an impact on every control included on the page. Each\
    \ control will not be able to override that setting, so the impact would be universal\
    \ and possibly damaging for controls that require `ViewState`. The same is true\
    \ for any control that holds other controls below it. The setting impacts all\
    \ controls below it.\n\nDue to the fact that you cannot enable `ViewState` for\
    \ a control if the `ViewState` has been disabled for the entire page, you will\
    \ want to identify individual controls that do not need it. A navigational control\
    \ included on each page, perhaps as a part of the master page, would make for\
    \ an ideal candidate. If it simply contains markup and a few `HyperLink` controls\
    \ that have the `NavigateUrl` set declaratively, the value will be available during\
    \ a postback when `ViewState` is disabled.\n\nFor a custom user control, you may\
    \ also design its behavior to work with and without `ViewState`. Listing 4-17\
    \ shows how this can be done.\n\n**Listing 4-17.** Working With and Without `ViewState`\n\
    ```\nif (! IsPostBack)\n{\n    GridView1.DataSource = GetDataSource();\n    GridView1.DataBind();\n\
    }\nelse if (! IsViewStateEnabled)\n{\n    GridView1.DataSource = GetDataSource();\n\
    \    GridView1.DataBind();\n}\n```\n\nThe datasource for the `GridView` is set\
    \ on the first page load when it is not a postback and when it is a postback with\
    \ `ViewState` disabled. Doing it this way will load the `GridView` data when the\
    \ control needs it. However, this approach is pretty manual. It is better to simply\
    \ use a declared `ObjectDataSource` reference. Doing so will allow the `GridView`\
    \ to automatically detect when `ViewState` is disabled and bind using the `ObjectDataSource`\
    \ when it needs data.\n\n## ControlState vs. ViewState\n\nBecause some pieces\
    \ of data are critical to the functionality of a control, it is necessary to retain\
    \ access to those details when `ViewState` is enabled. Controls such as the `GridView`\
    \ are smart enough to work with and without `ViewState`, but they still need to\
    \ retain the current state of the control related to position when paging is enabled.\
    \ The data for each of the columns can be pulled from the database with each postback,\
    \ but the database will not know that the fourth page of the `GridView` was selected.\
    \ This value is retained by the `SelectedItem` property that is persisted with\
    \ `ControlState`, a variation of `ViewState`.\n\n`ControlState` was introduced\
    \ with ASP.NET 2.0. It is not an automatic feature like `ViewState`. You must\
    \ implement it yourself and register with the `Page` to persist the data.\n\n\
    Listing 4-18 shows how to save `ControlState`.\n\n**Listing 4-18.** SaveControlState\n\
    ```\nprotected override object SaveControlState()\n{\n    Pair state = new Pair();\n\
    \    state.First = base.SaveControlState();\n    state.Second = _controlStateData;\n\
    \    return state;\n}\n```\n\n`ControlState` and `ViewState` are often persisted\
    \ using the `Pair` and `Triplet` types from the `System.Web.UI` namespace. They\
    \ are simply tiny arrays that hold onto your data. You could also use an array\
    \ of objects that can be serialized, which means it is best to stick to types\
    \ like `string`, `int`, and `DateTime`. You want to use the least amount of data\
    \ to persist the necessary state. Using the `Pair` type is a good first layer\
    \ that will hold the `ControlState` of the base class in the `First` property\
    \ and the state of the current instance in the `Second` property. If you have\
    \ many values to persist, the value stored in the `Second` property could be the\
    \ array of many objects. This hierarchy of this state will then be unfolded when\
    \ it is loaded, as shown in Listing 4-19.\n\n**Listing 4-19.** LoadControlState\n\
    ```\nprotected override void LoadControlState(object savedState)\n{\n    Pair\
    \ pair = savedState as Pair;\n    if (pair != null)\n    {\n        base.LoadControlState(pair.First);\n\
    \        _controlStateData = (string)pair.Second;\n    }\n    else\n    {\n  \
    \      base.LoadControlState(null);\n    }\n}\n```\n\nThe state is cast as a `Pair`\
    \ type and used to load the `ControlState` of the base class with the `First`\
    \ property and then the state of the current instance with the `Second` property.\
    \ With these values defined, it is necessary to tell the `Page` that `ControlState`\
    \ is required for this control. This must be done during the `Init` event before\
    \ the events to load `ControlState` are fired later in the event life cycle, as\
    \ shown in Listing 4-20.\n\n**Listing 4-20.** Requiring ControlState\n```\nprotected\
    \ void Page_Init(object sender, EventArgs e)\n{\n    Page.RegisterRequiresControlState(this);\n\
    }\n```\n\nThe preceding examples for `ControlState` simply persist a single `string`\
    \ variable. Many times you should not have much data to persist. The event ordering\
    \ will cause `ControlState` to be persisted and loaded between the `Init` and\
    \ `Load` events so that the persisted data will be available when your `Load`\
    \ event is fired. Later the `PreRender` event will fire where most databound controls\
    \ actually load the data. It is important to know when this data is available\
    \ to your page or control.\n\nGiven the option to persist state in the `Session`\
    \ or in `ControlState`, it should be noted that not all state has to be persisted.\
    \ Some data can be lost safely because the input fields that were using them are\
    \ already persisting the data, such as a `TextBox`. The value from the form will\
    \ always be set in the `Text` property. However, the `TextChanged` event will\
    \ now fire with each postback because the control cannot compare whether or not\
    \ the value actually changed.\n\nIf your control does handle this event, you will\
    \ not be affected by `ViewState` being disabled.\n\nOther controls such as the\
    \ `ListBox` and `RadioButtonList` may be populated declaratively instead of binding\
    \ them to a datasource. These will work like the `TextBox` in that they can give\
    \ you the currently selected value properly and redraw themselves with all of\
    \ the available selections with the declared values. And again, the events triggered\
    \ when a selection changes will not work as they would with `ViewState` enabled.\
    \ In either situation, you can still get the value the user has set and take action\
    \ as needed.\n\n## Creating a Databound Control\n\nIn order to deepen your understanding\
    \ of how databound controls work, you will learn how to create a control that\
    \ will be bound to an `ObjectDataSource`. You will be able to do more with this\
    \ control than you can with standard controls such as the `GridView` and `DetailsView`\
    \ because you will have the full source code, which you can modify and walk with\
    \ the debugger. You can also see directly what the consequences are for those\
    \ modifications."
