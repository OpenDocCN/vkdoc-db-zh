    **GridView**


    Now for the granddaddy of all databound controls: the GridView control. Whether
    it lists transactions from your checking account or lists contacts in your address
    book, this control is used nearly everywhere. And while it lists data in a tabular
    format and allows you to add, edit, and delete records, it also allows you to
    sort the data. This makes it a powerful and easy means of looking at data in a
    way that is most useful to you. Listing 4-3 shows an example of the GridView control.


    ![Image 13](index-84_1.png)


