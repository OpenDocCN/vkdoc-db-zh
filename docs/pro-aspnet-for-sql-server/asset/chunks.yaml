    \ which is a free tool that runs as an add-in to `Visual Studio 2005` to run and\
    \ debug tests created with `NUnit` (see Figure 6-5).\n\n**Figure 6-5.** UnitRun\
    \ with NUnit tests\n\nEach of the tests shown in Figure 6-5 check the various\
    \ caching scenarios supported by the data access layer created for use in this\
    \ chapter. These scenarios include no caching (`Off`), absolute expiration, polling,\
    \ notifications with `SqlCacheDependency`, and notifications with `SqlDependency`.\n\
    \nThese tests are not strictly unit tests. They cross the line to integration\
    \ tests because they are doing much more than a single unit of work and interact\
