    \ 属性使用。\n\n### TotalRowsCount Property\n\n**代码清单 4-29.** `TotalRowsCount` 属性\n\
    \n```csharp\nprivate int _totalRowsCount = 0;\n[Browsable(false)]\npublic virtual\
    \ int TotalRowsCount\n{\n    get\n    {\n        if (_totalRowsCount == 0)\n \
    \       {\n            _totalRowsCount = GetTotalRowCount();\n        }\n    \
    \    return _totalRowsCount;\n    }\n}\n```\n\n`TotalRowsCount` 属性与 `PageSize`\
    \ 属性一起用于计算 `MaxIndex` 属性的值，如代码清单 4-30 所示。\n\n### MaxIndex Property\n\n**代码清单 4-30.**\
    \ `MaxIndex` 属性\n\n```csharp\nprivate int _maxIndex = 0;\n[Browsable(false)]\n\
    public virtual int MaxIndex\n{\n    get\n    {\n        if (_maxIndex == 0)\n\
    \        {\n            double maxIndexDbl = (TotalRowsCount/PageSize) - 1;\n\
    \            _maxIndex = (int)maxIndexDbl;\n            if (maxIndexDbl > _maxIndex)\n\
    \            {\n                _maxIndex++;\n            }\n        }\n     \
    \   return _maxIndex;\n    }\n}\n```\n\n为了控制分页，`PersonListingControl` 使用分页器控件通过回发事件移动到下一页和上一页。这些分页器控件是使用\
    \ `LinkButton` 控件创建的链接，其 `CommandArgument` 值设置为目标 `PageIndex`。\n\n### Wiring the\
    \ Pager Events\n\n分页器控件触发回发事件以设置新的 `PageIndex` 值。通常，附加事件是相当自动的。因为这是一个自定义数据绑定控件，所以需要初始化控件、附加事件，然后将其添加到\
    \ `Controls` 集合中，以便在触发回发事件时将其包括在内。事件序列按此顺序发生：`Init`、`PagePreLoad`、`Load` 和 `RaisePostBackEvent`。在\
    \ `Init` 和 `PagePreLoad` 事件之间，`ControlState` 和 `ViewState` 被加载。分页器控件必须在加载状态和 `RaisePostBackEvent`\
    \ 之前初始化并添加到 `Controls` 集合中。为确保这一点，这些控件可以在 `CreateChildControls` 中通过调用 `CreatePagerControls`\
    \ 方法进行初始化。\n\n控件只需要初始化一次，而每次运行 `CreateChildControls` 时都需要将控件重新添加到 `Controls` 集合中。`CreatePagerControls`\
    \ 方法如代码清单 4-31 所示。\n\n### CreatePagerControls Method\n\n**代码清单 4-31.** `CreatePagerControls`\
    \ 方法\n\n```csharp\nprivate void CreatePagerControls()\n{\n    InitializePagerControls();\n\
    \    Controls.Add(_previousLinkButton);\n    Controls.Add(new LiteralControl(\"\
    \ \"));\n    Controls.Add(_nextLinkButton);\n    Controls.Add(new LiteralControl(\"\
    \ \"));\n}\n```\n\n设置控件属性和附加事件的工作由 `InitializePagerControls` 方法处理，该方法中有一个检查以确保它只运行一次。此方法的代码如代码清单\
    \ 4-32 所示。\n\n### InitializePagerControls\n\n**代码清单 4-32.** `InitializePagerControls`\n\
    \n```csharp\nprivate void InitializePagerControls()\n{\n    if (_controlsInitialized)\n\
    \    {\n        return;\n    }\n    if (_nextLinkButton == null)\n    {\n    \
    \    _nextLinkButton = new LinkButton();\n        _nextLinkButton.ID = \"lbNext\"\
    ;\n        _nextLinkButton.Text = \"Next\";\n        _nextLinkButton.CssClass\
    \ = \"btn\";\n        _nextLinkButton.CommandName = SetPageIndexCommandName;\n\
    \        _nextLinkButton.Click += new EventHandler(PagerButton_Click);\n    }\n\
    \    if (_previousLinkButton == null)\n    {\n        _previousLinkButton = new\
