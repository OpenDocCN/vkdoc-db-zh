- fmt: "# Chapter 10: A Sample Application\n\nThe provider settings added within the\
    \ `providers` element are required because, unlike the standard ASP.NET providers,\
    \ these settings are not predefined in the `Machine.config` file (covered in Chapter\
    \ 1, in Listing 1-4). But some values are optional. The `defaultProvider` attribute\
    \ is optional in each case when the default is what you intend.\n\n```xml\n<add\
    \ name=\"SqlJobProvider\"\n     connectionStringName=\"dug\"\n     type=\"DotnetUserGroup.DataAccess.Jobs.SqlJobProvider,\
    \ DotnetUserGroup.DataAccess\" />\n</providers>\n</jobs>\n\n<jobContacts defaultProvider=\"\
    SqlJobContactProvider\">\n  <providers>\n    <clear />\n    <add name=\"SqlJobContactProvider\"\
    \n         connectionStringName=\"dug\"\n         type=\"DotnetUserGroup.DataAccess.JobContacts.SqlJobContactProvider,\
    \ DotnetUserGroup.DataAccess\" />\n  </providers>\n</jobContacts>\n\n<locations\
    \ defaultProvider=\"SqlLocationProvider\">\n  <providers>\n    <clear />\n   \
    \ <add name=\"SqlLocationProvider\"\n         connectionStringName=\"dug\"\n \
    \        type=\"DotnetUserGroup.DataAccess.Locations.SqlLocationProvider, DotnetUserGroup.DataAccess\"\
    \ />\n  </providers>\n</locations>\n\n<speakers defaultProvider=\"SqlSpeakerProvider\"\
    >\n  <providers>\n    <clear />\n    <add name=\"SqlSpeakerProvider\"\n      \
    \   connectionStringName=\"dug\"\n         type=\"DotnetUserGroup.DataAccess.Speakers.SqlSpeakerProvider,\
    \ DotnetUserGroup.DataAccess\" />\n  </providers>\n</speakers>\n\n<sponsors defaultProvider=\"\
    SqlSponsorProvider\">\n  <providers>\n    <clear />\n    <add name=\"SqlSponsorProvider\"\
    \n         connectionStringName=\"dug\"\n         type=\"DotnetUserGroup.DataAccess.Sponsors.SqlSponsorProvider,\
    \ DotnetUserGroup.DataAccess\" />\n  </providers>\n</sponsors>\n</dotnetUserGroup>\n\
    ```\n\nIn Listing 10-15, the `SpeakerSection` defined the `DefaultProvider` property\
    \ with an attribute for the `DefaultValue` set to `SqlSpeakerProvider`. The `EventSection`\
    \ class, shown in Listing 10-23, defines additional properties for the providers\
    \ it should use when populating the values for the `Speaker`, `Sponsor`, and `Location`\
    \ properties in the `Event` class. The `ConfigurationProperty` attribute has the\
    \ `IsRequired` value explicitly set to `false`, which happens to be the default\
    \ value, so that you can leave this additional information out of the configuration\
    \ if you want to use the default settings. When you access the properties from\
    \ the `EventSection` class, it will return a value whether or not you have defined\
    \ it in the configuration file.\n\n**Listing 10-23.** `EventSection.cs`\n\n```csharp\n\
    namespace DotnetUserGroup.DataAccess.Events\n{\n    public class EventSection\
    \ : ProviderConfigurationSection\n    {\n        [ConfigurationProperty(\"providers\"\
    )]\n        public override ProviderSettingsCollection Providers\n        {\n\
    \            get { return (ProviderSettingsCollection)base[\"providers\"]; }\n\
    \        }\n\n        [StringValidator(MinLength = 1)]\n        [ConfigurationProperty(\"\
    defaultProvider\",\n            DefaultValue = \"SqlEventProvider\")]\n      \
    \  public override string DefaultProvider\n        {\n            get { return\
    \ (string)base[\"defaultProvider\"]; }\n            set { base[\"defaultProvider\"\
    ] = value; }\n        }\n\n        [StringValidator(MinLength = 1)]\n        [ConfigurationProperty(\"\
    speakerProvider\",\n            DefaultValue = \"SqlSpeakerProvider\",\n     \
    \       IsRequired = false)]\n        public string SpeakerProvider\n        {\n\
    \            get { return (string)base[\"speakerProvider\"]; }\n            set\
    \ { base[\"speakerProvider\"] = value; }\n        }\n\n        [StringValidator(MinLength\
    \ = 1)]\n        [ConfigurationProperty(\"sponsorProvider\",\n            DefaultValue\
    \ = \"SqlSponsorProvider\",\n            IsRequired = false)]\n        public\
    \ string SponsorProvider\n        {\n            get { return (string)base[\"\
    sponsorProvider\"]; }\n            set { base[\"sponsorProvider\"] = value; }\n\
    \        }\n\n        [StringValidator(MinLength = 1)]\n        [ConfigurationProperty(\"\
    locationProvider\",\n            DefaultValue = \"SqlLocationProvider\",\n   \
    \         IsRequired = false)]\n        public string LocationProvider\n     \
    \   {\n            get { return (string)base[\"locationProvider\"]; }\n      \
    \      set { base[\"locationProvider\"] = value; }\n        }\n    }\n}\n```\n\
    \n## Creating New Providers"
