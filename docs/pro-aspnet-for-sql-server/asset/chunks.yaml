- fmt: "Each of the tables will share the same basic structure with the primary key\
    \ defined as a bigint named `ID` as well as `DateTime` values named `Created`\
    \ and `Modified`, which are set as records are created and updated. The primary\
    \ key is set as an identity value that will automatically be incremented as new\
    \ records are created. Alternatively, the primary key could be named specifically\
    \ for the table, such as `EventID`, which is a popular practice. Unfortunately,\
    \ that practice makes it hard to work all records in a generic way, which we will\
    \ be doing in the next section.\n\n## PARTITIONING BY DATE\n\nWith the `Created`\
    \ and `Modified` dates set for each record in the database, it will be possible\
    \ to partition the database on these values. The primary partition can include\
    \ all records that have a modified date within the last three months, while everything\
    \ else will belong to another partition that effectively represents an archive\
    \ for the data. Initially, this partitioning scheme will not be necessary and\
    \ may never become necessary. But for a high-traffic website that generates a\
    \ great number of records to the database, this approach would be a helpful option.\n\
    \nA site such as Digg could use a few partitions. One could be for the current\
    \ week, another for the last three months, and another for everything beyond the\
    \ most recent three months. Because users generally read and interact on the newest\
    \ content pages, the first partition will be accessed most frequently and will\
    \ require the fastest physical access to the data. The other two partitions will\
    \ have more modest requirements for speed but will need a great deal of space.\
    \ With modest performance requirements, the archive partitions will cost significantly\
    \ less, and the primary partition, with the space requirements minimized, will\
    \ also cost less than a massive storage system with high-performance requirements.\n\
    \n8601Ch10CMP3 8/25/07 1:09 PM Page 300\n\n**300**\n\nC H A P T E R 1 0 ■ A S\
    \ A M P L E A P P L I C AT I O N\n\n## Get, Save, and Delete\n\nThe data manipulation\
    \ methods will follow the get, save, and delete approach covered in Chapter 7.\
    \ Each stored procedure that gets the data for an `Event` will return the same\
    \ columns, so an instance of an `Event` can be created consistently with each\
    \ stored procedure. For an `Event`, we will be using the following stored procedures:\
    \ `dug_GetEvent.sql`, `dug_GetAllEvents.sql`, and `dug_GetEventsByDate.sql`. Listing\
    \ 10-2 shows `dug_GetEvent.sql`, which returns a single record that matches the\
    \ given key.\n\n### Listing 10-2. dug_GetEvent.sql\n\n```sql\nIF EXISTS (SELECT\
    \ * FROM sysobjects WHERE type = 'P' AND name = 'dug_GetEvent') BEGIN\n    DROP\
    \ Procedure dug_GetEvent\nEND\nGO\n\nCREATE Procedure dbo.dug_GetEvent\n(\n  \
    \  @EventID bigint\n)\nAS\n    SELECT\n        ID, Title, Description, MeetingDate,\
    \ Created, Modified\n    FROM dug_Events\n    WHERE ID = @EventID\nGO\n\nGRANT\
    \ EXEC ON dug_GetEvent TO PUBLIC\nGO\n```\n\nUsers who visit the website will\
    \ mostly be interested in upcoming events, so instead of just providing access\
    \ to a specific event or all events, we will create a stored procedure called\
    \ `dug_GetEventsByDate` that returns all events between now and the target date\
    \ that is passed in as a parameter. Using this simple stored procedure represents\
    \ \"performance by design\" versus \"performance by optimization\" because the\
    \ need is easily anticipated during the design phase. Clearly, if there are eventually\
    \ 1,000 events in the database and most are for past events, there will be unnecessary\
    \ overhead involved in getting all records and then displaying only the events\
    \ for the coming months. This stored procedure is shown in Listing 10-3.\n\n###\
    \ Listing 10-3. dug_GetEventsByDate.sql\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'dug_GetEvent') BEGIN\n    DROP Procedure dug_GetEvent\n\
    END\nGO\n\n8601Ch10CMP3 8/25/07 1:09 PM Page 301\n\nC H A P T E R 1 0 ■ A S A\
    \ M P L E A P P L I C AT I O N\n\n**301**\n\nCREATE Procedure dbo.dug_GetEvent\n\
    (\n    @EventID bigint\n)\nAS\n    SELECT\n        ID, Title, Description, MeetingDate,\
    \ Created, Modified\n    FROM dug_Events\n    WHERE ID = @EventID\nGO\n\nGRANT\
    \ EXEC ON dug_GetEvent TO PUBLIC\nGO\n```"
