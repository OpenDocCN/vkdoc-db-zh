    \n    decimal newPrice1 = price1 + 0.01m;\n    domain.SetListPrice(newPrice1,\
    \ productId);\n\n    // 线程休眠足够长的时间以允许通知机制生效\n    Thread.Sleep(200);\n\n    //\
    \ 获取产品的第二个副本\n    Console.WriteLine(\"Getting price2\");\n    DataSet productDs2\
    \ = domain.GetProductByID(productId, mode);\n    Assert.IsNotNull(productDs2,\
    \ \"productDs2 cannot be null\");\n    decimal price2 = GetPrice(productDs2);\n\
    \n    Console.WriteLine(\"Getting price3\");\n    DataSet productDs3 = domain.GetProductByID(productId,\
    \ mode);\n    Assert.IsNotNull(productDs3, \"productDs3 cannot be null\");\n \
    \   decimal price3 = GetPrice(productDs3);\n\n    Assert.AreNotEqual(price1, price2,\n\
    \        \"price1 and price2 should not match due to the SqlDependency\");\n \
    \   Assert.AreEqual(newPrice1, price2,\n        \"newPrice1 and price2 should\
    \ match due to the SqlDependency\");\n    Assert.AreEqual(newPrice1, price3,\n\
    \        \"newPrice1 and price3 should match\");\n\n    domain.CompleteCachingMode(mode);\n\
    }\n```\n\n这最后一个测试的工作方式与其他通知测试非常相似，区别在于其内部使用了一个自定义集合来保存产品数据的副本，而不是依赖缓存。当所有这些测试都无误通过时，就确认了缓存系统和数据库都在正常工作。这一小组测试至少提供了整个应用程序所必需的基础支持。一些团队将“所有单元测试必须通过后才能将更改提交到源代码控制系统”作为一项要求。这可以作为防止破坏性更改的保障措施。\n\
    \n![图 26](img/index-192_1.png)\n\n一旦测试系统就位，你可以使用 MSBuild 脚本来运行测试，而无需启动 Visual\
    \ Studio 2005（参见图 6-6）。如果你当前的工作依赖于其他几个项目，你可以同步这些依赖项目的源代码，然后运行 MSBuild 脚本来构建和测试它们。这种自动化将为你节省时间，并在你开始在项目中进行更改之前识别出依赖项的问题。\n\
    \n### 图 6-6. 进行单元测试的 MSBuild\n\n## 缓存带来的问题\n\n除非你设计并通过规划、培训和代码审查来强制执行一个缓存策略，否则在使用缓存时会出现意外问题。你可能决定将“所有放入缓存的数据使用不超过五分钟的绝对过期时间”作为一项策略。你可能还决定不使用输出缓存，而是专注于使用依赖项通知的数据缓存，以确保应用程序使用的数据始终是最新的。通过制定明确的策略并通过代码审查强制执行，将更容易控制局面。\n\
    \n有几件事需要注意。使用数据缓存时，你可能会在后台代码中使用静态引用轻松持有缓存项，这将导致它永远不会消失。我发现，在处理缓存数据时，最好避免使用静态引用。为了解决这个问题，我创建了包装方法，作为获取数据的访问点。包装器首先在缓存中检查是否存在缓存项，如果存在则返回它。如果不存在，它就从数据库中提取数据，将其放入缓存，然后返回。我从不假设该项已经在缓存中。\n\
    \n对于输出缓存，你可能会将 `VaryByParam` 设置为 `*`，认为这样可以确保不同的 URL 会得到不同的结果。对于产品页面，你希望 `Product.aspx?ProductID=808`\
    \ 显示的结果与 `Product.aspx?ProductID=429` 不同。这个 `VaryByParam` 设置可以确保它按预期工作，但如果你的网站被设置为显示多种语言的内容，第一个访问该页面的用户将为其语言缓存内容。在输出缓存保存原始请求的期间内，下一个具有不同语言首选项访问该页面的用户，将看到第一个用户的语言首选项。为了解决这种情况，你可以检查\
    \ `Accept-Language` 头部，作为唯一标识页面内容的一部分。清单 6-40 显示了在语言是关注点时，用于输出缓存的设置。\n\n### 清单\
    \ 6-40. 用于语言的 `VaryByHeader`\n\n```aspx\n<%@ OutputCache Duration=\"300\" VaryByParam=\"\
    *\"\n    VaryByHeader=\"Accept-Language\" %>\n```\n\n## 性能策略\n\n制定一个全面的性能优化方案是必要的。仅仅缓存数据库查询结果并不能确保你的应用程序表现良好。如果某些查询非常慢，你将继续遇到性能问题。在应用程序最慢的地方，你可以尝试加快查询速度。\n"
- fmt: "In one scenario, you may have a query that is run occasionally, but it takes\
    \ a painfully long time to return the results. In another scenario, you have a\
    \ moderately slow query, but it needs to run multiple times with different parameters,\
    \ which quickly adds up and slows down your application. In both cases, you have\
    \ the choice of optimizing the query itself or changing the structure of the data\
    \ that it is querying.\n\nA query may run a long time because it has the join\
    \ across multiple tables, even if there are indexes in place to assist with the\
    \ table joins. If there is a great deal of data, you may be scanning across a\
    \ great many rows to match your join criteria. This performance hit is hard to\
    \ avoid by rewriting the query, but it is possible to instead restructure the\
    \ data.\n\n## Data Warehousing\n\nDatabase designers will do their best to break\
    \ up data so that it is fully normalized. Doing so reduces the required storage\
    \ to hold your data, but at the same time it requires your queries to be more\
    \ complicated. Consider a product database again. If you have 50,000 products\
    \ and all of the data related to the products is spread across ten tables, you\
    \ will need to join across many tables to get to the data you need. And some products\
    \ may not even be visible for purchase by customers, so you have extra data in\
    \ the database, which adds to the cost of a full table scan.\n\nIn this scenario,\
    \ you may be able to create a denormalized table to hold your product data so\
    \ that it is not necessary to join tables. When the denormalized table is populated,\
    \ it can also be limited to the active products to reduce the size. A simple `SELECT\
    \ * FROM MYTABLE` is a great deal faster than any join.\n\nTo make this work,\
    \ you still need to refresh the warehouse table occasionally. Perhaps you can\
    \ do it during off-peak time periods a few times a day, or just do it once a day\
    \ during the slowest usage period. You may even choose to spread the databases\
    \ across separate physical machines and populate the warehouse with a remote query.\
    \ Doing so will allow your vendors to work on the data for their products throughout\
    \ the day without impacting the performance of the publicly used database.\n\n\
    I did all of this with a product database and pulled all of the contents of the\
    \ warehouse table into a `DataSet` that I then dropped into the cache. I considered\
    \ holding all of the products in memory when I discovered that the data only took\
    \ up less than 10 MB of space while the server had well over 2 GB of total memory.\
    \ Once I had the `DataSet` in memory, all I had to do was query it with the `RowFilter`\
    \ property on the `DataView` object (see Listing 6-41).\n\n**Listing 6-41.** *Using\
    \ RowFilter with ProductID*\n\n```\npublic DataTable GetProductByID(DataSet productDs,\
    \ int productId)\n{\n    DataView dv = new DataView(productDs.Tables[0]);\n  \
    \  dv.RowFilter = \"ProductID = \" + productId;\n    return dv.ToTable();\n}\n\
    ```\n\nThis sample takes a `DataSet` that already has all of the products and\
    \ then makes use of a `DataView` with a `RowFilter` to create a new `DataTable`\
    \ with just the matching rows. You can then use this `DataTable` with any databound\
    \ control just as you would with a `DataSet`.\n\nWith .NET 2.0, the performance\
    \ of `DataSets` improved dramatically with a revised indexing implementation.\
    \ As a result, this technique was run very quickly. The `RowFilter` property can\
    \ take any string that you would use in a normal `WHERE` class in a SQL query.\n\
    \nWhat I also discovered was that loading every row from the warehouse table was\
    \ faster than loading a single product using a query with joins with the normalized\
    \ tables. If I had to keep the product data more current, it may have been reasonable\
    \ to allow the `DataSet` to fall out of the cache more frequently without compromising\
    \ the performance significantly.\n\nThe products also fit into a hierarchy of\
    \ categories. A set of root categories held subcategories and so on until they\
    \ reached products. I flattened this structure and placed it into another warehouse\
    \ table for fast access. In the case of this table, I included many calculated\
    \ fields such as the number of products and the start and end dates for the categories,\
    \ as some categories were seasonal. These extra columns assisted with the `RowFilter`\
    \ by making them easy to access without querying the database. I found that each\
    \ time I had a new requirement to query the database for new criteria, I could\
    \ simply add a column to the warehouse table instead of breaking out of the warehouse\
    \ strategy, which was working extremely well.\n\n## Lazy Loading\n\nNot every\
    \ product detail was placed in the warehouse table. When there were one-to-many\
    \ relationships, it was not possible to do so. I also did not want to load data\
    \ that was not immediately necessary. As users dig into the website through the\
    \ hierarchy of product categories, they only see summary data about each product\
    \ such as the name and price. Loading the detail data can be deferred until it\
    \ is necessary, and I did so by leveraging the object model.\n\nWhat I typically\
    \ do is translate the data from the database in `DataSet` form into a business\
    \ object such a `Product` that has properties such as `Name`, `Price`, and `VendorName`.\
    \ These are the sort of properties that are always loaded when the object is constructed.\
    \ I call the data that goes into these properties *summary data*. Other properties\
    \ such as `Colors`, `Features`, and `Dimensions` are detail data that is not shown\
    \ on category pages and not loaded into the `Product` object when it is first\
    \ constructed. But when the property is accessed, starting with the null value,\
    \ the database is then queried for the necessary data and returned. This is called\
    \ *lazy loading*, and Listing 6-42 shows an example of this.\n\n**Listing 6-42.**\
    \ *Lazy Loading Example*\n\n```\nprivate ColorsCollection _colors = null;\n\n\
    public ColorsCollection Colors\n{\n    get\n    {\n        if (_colors == null)\n\
    \        {\n            _colors = GetColors(ProductID);\n        }\n        return\
    \ _colors;\n    }\n}\n```\n\nEvery subsequent request for the `Colors` property\
    \ will have the data already and will return immediately. This all works on the\
    \ assumption that the summary data will be used far more often than the detail\
    \ data that is pulled in via lazy loading. In the case of a website listing summary\
    \ data on the category pages, this will be true.\n\nThe individual `Product` object\
    \ can be placed in the cache for a limited time, which will automatically hold\
    \ onto the detail data held by the member variables. This detail reduces the number\
    \ of hits on the database for the entire product. However, this may not be exactly\
    \ what you want. In the same way the output cache will cache data for the entire\
    \ page regardless of any individual data caching time-out, this will also hold\
    \ onto the data as long as the parent object is held in the cache. Instead of\
    \ holding onto the data as a member variable, it could use data caching and simply\
    \ request the data each time and expect that the data will be cached for the appropriate\
    \ amount of time. You have many available options with this scenario.\n\n## Summary\n\
    \nIn this chapter, you saw the various options of caching with `System.Web.Caching`\
    \ and other alternatives. You also learned the techniques used to invalidate the\
    \ cache due to changed dependencies as well as several problems with caching.\
    \ Finally, you explored a few techniques and strategies to make the most out of\
    \ mixing and matching the available features to squeeze the best possible performance\
    \ out of the system."
  raw: 'In one scenario, you may have a query that is run occasionally, but it takes
    a painfully long time to return the results. In another scenario, you have a moderately
    slow query, but it needs to run multiple times with different parameters, which
    quickly adds up and slows down your application. In both cases, you have the choice
    of optimizing the query itself or changing the structure of the data that it is
    querying.


    A query may run a long time because it has the join across multiple tables, even
    if there are indexes in place to assist with the table joins. If there is a great
    deal of data, you may be scanning across a great many rows to match your join
    criteria. This performance hit is hard to avoid by rewriting the query, but it
    is possible to instead restructure the data.


    **Data Warehousing**


    Database designers will do their best to break up data so that it is fully normalized.
    Doing so reduces the required storage to hold your data, but at the same time
    it requires your queries to be more complicated. Consider a product database again.
    If you have 50,000 products and all of the data related to the products is spread
    across ten tables, you will need to join across many tables to get to the data
    you need. And some products may not even be visible for purchase by customers,
    so you have extra data in the database, which adds to the cost of a full table
    scan.


    In this scenario, you may be able to create a denormalized table to hold your
    product data so that it is not necessary to join tables. When the denormalized
    table is populated, it can also be limited to the active products to reduce the
    size. A simple SELECT * FROM MYTABLE is a great deal faster than any join.


    To make this work, you still need to refresh the warehouse table occasionally.
    Perhaps you can do it during off-peak time periods a few times a day, or just
    do it once a day during the slowest usage period. You may even choose to spread
    the databases across separate physical machines and populate the warehouse with
    a remote query. Doing so will allow your vendors to work on the data for their
    products throughout the day without impacting the performance of the publicly
    used database.


    I did all of this with a product database and pulled all of the contents of the
    warehouse table into a DataSet that I then dropped into the cache. I considered
    holding all of the products in memory when I discovered that the data only took
    up less than 10 MB of space while the server had well over 2 GB of total memory.
    Once I had the DataSet in memory, all I had to do was query it with the RowFilter
    property on the DataView object (see Listing 6-41).


    8601Ch06CMP2 8/24/07 12:13 PM Page 188


    **188**


    C H A P T E R 6 ■ C A C H I N G


    **Listing 6-41.** *Using RowFilter with ProductID*


    public DataTable GetProductByID(DataSet productDs, int productId)


    {


    DataView dv = new DataView(productDs.Tables[0]);


    dv.RowFilter = "ProductID = " + productId;


    return dv.ToTable();


    }


    This sample takes a DataSet that already has all of the products and then makes
    use of a DataView with a RowFilter to create a new DataTable with just the matching
    rows. You can then use this DataTable with any databound control just as you would
    with a DataSet.


    With .NET 2.0, the performance of DataSets improved dramatically with a revised
    indexing implementation. As a result, this technique was run very quickly. The
    RowFilter property can take any string that you would use in a normal WHERE class
    in a SQL query.


    What I also discovered was that loading every row from the warehouse table was
    faster than loading a single product using a query with joins with the normalized
    tables. If I had to keep the product data more current, it may have been reasonable
    to allow the DataSet to fall out of the cache more frequently without compromising
    the performance significantly.


    The products also fit into a hierarchy of categories. A set of root categories
    held subcate-gories and so on until they reached products. I flattened this structure
    and placed it into another warehouse table for fast access. In the case of this
    table, I included many calculated fields such as the number of products and the
    start and end dates for the categories, as some categories were seasonal. These
    extra columns assisted with the RowFilter by making them easy to access without
    querying the database. I found that each time I had a new requirement to query
    the database for new criteria, I could simply add a column to the warehouse table
    instead of breaking out of the warehouse strategy, which was working extremely
    well.


    **Lazy Loading**


    Not every product detail was placed in the warehouse table. When there were one-to-many
    relationships, it was not possible to do so. I also did not want to load data
    that was not immediately necessary. As users dig into the website through the
    hierarchy of product categories, they only see summary data about each product
    such as the name and price. Loading the detail data can be deferred until it is
    necessary, and I did so by leveraging the object model.


    What I typically do is translate the data from the database in DataSet form into
    a business object such a Product that has properties such as Name, Price, and
    VendorName. These are the sort of properties that are always loaded when the object
    is constructed. I call the data that goes into these properties *summary data*.
    Other properties such as Colors, Features, and Dimensions are detail data that
    is not shown on category pages and not loaded into the Product object when it
    is first constructed. But when the property is accessed, starting with the null
    value, the database is then queried for the necessary data and returned. This
    is called *lazy loading*, and Listing 6-42 shows an example of this.


    8601Ch06CMP2 8/24/07 12:13 PM Page 189


    C H A P T E R 6 ■ C A C H I N G


    **189**


    **Listing 6-42.** *Lazy Loading Example*


    private ColorsCollection _colors = null;


    public ColorsCollection Colors


    {


    get


    {


    if (_colors == null)


    {


    _colors = GetColors(ProductID);


    }


    return _colors;


    }


    }


    Every subsequent request for the Colors property will have the data already and
    will return immediately. This all works on the assumption that the summary data
    will be used far more often than the detail data that is pulled in via lazy loading.
    In the case of a website listing summary data on the category pages, this will
    be true.


    The individual Product object can be placed in the cache for a limited time, which
    will automatically hold onto the detail data held by the member variables. This
    detail reduces the number of hits on the database for the entire product. However,
    this may not be exactly what you want. In the same way the output cache will cache
    data for the entire page regardless of any individual data caching time-out, this
    will also hold onto the data as long as the parent object is held in the cache.
    Instead of holding onto the data as a member variable, it could use data caching
    and simply request the data each time and expect that the data will be cached
    for the appropriate amount of time. You have many available options with this
    scenario.


    **Summary**


    In this chapter, you saw the various options of caching with System.Web.Caching
    and other alternatives. You also learned the techniques used to invalidate the
    cache due to changed dependencies as well as several problems with caching. Finally,
    you explored a few techniques and strategies to make the most out of mixing and
    matching the available features to squeeze the best possible performance out of
    the system.


    8601Ch07CMP2 8/24/07 12:23 PM Page 191


    C H A P T E R 7


    Manual Data Access Layer'
  trans: "\n在某个场景下，你可能有一个偶尔运行的查询，但它返回结果所需的时间却长得令人痛苦。在另一个场景下，你有一个速度中等偏慢的查询，但它需要使用不同参数运行多次，这很快就会累积起来并拖慢你的应用程序。在这两种情况下，你都可以选择优化查询本身，或者更改它所查询的数据结构。\n\
    \n一个查询可能运行很长时间，因为它需要跨多个表进行连接（join），即使已经存在索引来协助表连接操作。如果数据量巨大，你可能需要扫描非常多的行才能匹配连接条件。这种性能损耗很难通过重写查询来避免，但可以尝试重构数据结构来解决。\n\
    \n## 数据仓库\n\n数据库设计师会尽力拆分数据，使其完全规范化。这样做减少了存储数据所需的空间，但同时也让查询变得更加复杂。以产品数据库为例，假设有\
    \ 50,000 个产品，与产品相关的所有数据分布在十张表中，你将需要连接许多表才能获取所需数据。而且有些产品可能对客户并不可见（不可购买），因此数据库中存在额外的数据，这增加了全表扫描的成本。\n\
    \n在这种情况下，你可以尝试创建一个**反规范化表**来存放产品数据，从而避免表连接操作。当填充这个反规范化表时，还可以将其限制为仅包含活跃产品，以减少其大小。一个简单的\
    \ `SELECT * FROM MYTABLE` 会比任何连接查询都快得多。\n\n为了实现这一点，你仍然需要偶尔刷新仓库表。也许你可以在一天中的非高峰时段进行几次，或者在一天中使用率最低的时段只执行一次。你甚至可以选择将数据库分布在不同的物理机器上，并通过远程查询来填充仓库。这样做可以让供应商全天处理其产品的数据，而不会影响公共数据库的性能。\n\
    \n我曾对一个产品数据库实施了所有这些操作，并将仓库表的所有内容加载到一个 `DataSet` 中，然后将其放入缓存。当我发现这些数据只占用不到 10 MB\
    \ 的空间，而服务器总内存远超过 2 GB 时，我考虑过将所有产品数据保存在内存中。一旦 `DataSet` 在内存中，我所需要做的就是使用 `DataView`\
    \ 对象的 `RowFilter` 属性对其进行查询（参见代码清单 6-41）。\n\n**代码清单 6-41.** *使用 RowFilter 与 ProductID*\n\
    \n```\npublic DataTable GetProductByID(DataSet productDs, int productId)\n{\n\
    \    DataView dv = new DataView(productDs.Tables[0]);\n    dv.RowFilter = \"ProductID\
    \ = \" + productId;\n    return dv.ToTable();\n}\n```\n\n此示例接收一个已包含所有产品的 `DataSet`，然后利用带有\
    \ `RowFilter` 的 `DataView` 创建一个新的、仅包含匹配行的 `DataTable`。然后，你可以像使用 `DataSet` 一样，在任何数据绑定控件中使用这个\
    \ `DataTable`。\n\n随着 .NET 2.0 的发布，`DataSet` 的性能通过改进的索引实现得到了显著提升。因此，这项技术运行得非常快。`RowFilter`\
    \ 属性可以接受任何在 SQL 查询的普通 `WHERE` 子句中使用的字符串。\n\n我还发现，加载仓库表中的所有行，比通过规范化表上的连接查询来加载单个产品更快。如果需要让产品数据保持更高的时效性，允许\
    \ `DataSet` 更频繁地从缓存中过期而不显著影响性能，可能是合理的。\n\n产品也属于一个分类层级结构中。一组根类别包含子类别，依此类推，直到最终到达产品。我将这个结构扁平化，并将其放入另一个仓库表中以便快速访问。对于这个表，我包含了许多计算字段，例如产品数量、类别的开始和结束日期（因为有些类别是季节性的）。这些额外的列通过使其易于访问而无需查询数据库，辅助了\
    \ `RowFilter` 的使用。我发现，每当有新的查询需求需要新的条件时，我可以简单地在仓库表中添加一列，而不必放弃这个运行效果极佳的仓库策略。\n\n\
    ## 惰性加载\n\n并非所有的产品详情都被放入仓库表中。当存在一对多关系时，这是无法做到的。我也不想加载并非立即需要的数据。当用户通过产品分类层级深入网站时，他们只看到每个产品的摘要数据，例如名称和价格。加载详细数据可以推迟到必要时进行，我通过利用对象模型实现了这一点。\n\
    \n我通常做的是，将数据库中的 `DataSet` 形式的数据转换为业务对象，例如一个具有 `Name`（名称）、`Price`（价格）和 `VendorName`（供应商名称）等属性的\
    \ `Product` 对象。这些属性是在对象构造时始终加载的属性类型。我称填入这些属性的数据为**摘要数据**。其他属性，如 `Colors`（颜色）、`Features`（特性）和\
    \ `Dimensions`（尺寸），是详细数据，不会在类别页面上显示，因此在 `Product` 对象首次构造时不会加载。但是，当访问该属性时（初始值为\
    \ `null`），就会查询数据库以获取必要数据并返回。这被称为**惰性加载**，代码清单 6-42 展示了一个示例。\n\n**代码清单 6-42.**\
    \ *惰性加载示例*\n\n```\nprivate ColorsCollection _colors = null;\n\npublic ColorsCollection\
    \ Colors\n{\n    get\n    {\n        if (_colors == null)\n        {\n       \
    \     _colors = GetColors(ProductID);\n        }\n        return _colors;\n  \
    \  }\n}\n```\n\n随后对 `Colors` 属性的每一次请求，数据都将已经存在并立即返回。这一切都基于一个假设：摘要数据的使用频率将远高于通过惰性加载获取的详细数据。在网站类别页面列出摘要数据的情况下，这将成立。\n\
    \n单个 `Product` 对象可以被放入缓存中有限的时间，这将自动保留由成员变量持有的详细数据。这种做法减少了整个产品对数据库的访问次数。然而，这可能并不完全符合你的期望。就像输出缓存会缓存整个页面的数据（无论任何单个数据缓存的超时设置）一样，只要父对象保留在缓存中，它也会一直保留数据。与其将数据作为成员变量保存，它可以使用数据缓存，并在每次需要时简单地请求数据，并期望数据会在适当的时间内被缓存。对于这种情况，你有很多可用的选择。\n\
    \n## 本章小结\n\n在本章中，你了解了使用 `System.Web.Caching` 进行缓存的各种选项以及其他替代方案。你还学习了因依赖项更改而使缓存失效的技术，以及缓存存在的几个问题。最后，你探索了一些技术和策略，以充分利用混合和匹配可用功能，从而从系统中挤出最佳的性能。\n"
- fmt: 'Although there are many powerful tools built into Visual Studio to assist
    with binding data to your application, you will still manually build portions
    of your data access layer. A manual data access layer will give you the greatest
    flexibility in laying out the table structure, the stored procedures, and the
    layer of code to carry the data from the database to your application and back.
    As you work directly with your data access layer, you will become intimately aware
    of all the nuances of your system. You will also be able to put a good deal of
    thought into how the system will behave.


    ### This Chapter Covers


    This chapter covers the following:

    - Using `DataSet`s, inline SQL, and stored procedures

    - Using `DataObject`s and the `ObjectDataSource`

    - Building the database

    - Building the data access layer

    - Building the website


    When building a data access layer, you can make design decisions that affect performance.
    If you are fortunate, you can make changes to the way data is structured in the
    database, and even better, you could be starting from scratch. Your design decisions
    will have an impact for better or worse. Currently, our options are expanding
    in new ways with the introduction of WCF and LINQ to the .NET platform. These
    options push beyond the typical ADO.NET and `DataSet` model, which has become
    commonplace. Yet these new technologies are compelling enough to break into the
    designs reviewed in this chapter.


    The sample application for this chapter is a website used to store and tag your
    favorite links. I will show you how every part of the application is built and
    explain the decisions made along the way.


    ## Using DataSets, Inline SQL, and Stored Procedures


    The traditional approach has been to use either inline SQL or stored procedures
    to fill a `DataSet` with query results and to bind that data to a databound control
    on the user interface. This process can be used to quickly throw together a rich
    interface that is actually quite functional.


    However, too often the only cost that is considered is the time to build the first
    version of the application. But then the next version comes around. As the real
    world changes, the requirements for the application and the database also change.
    Going back and maintaining an application has historically shown to take up 80
    percent of developers’ workload.


    You can open the `Server Explorer` in Visual Studio, drop a table onto the design
    surface of a `Web Form`, and automatically generate the `GridView` and associated
    `SqlDataSource` with full support for selecting, updating, deleting, paging, and
    sorting. But what happens when even the smallest change is required? What if you
    add a new column to the database table and want to show it on the `GridView`?
    Are you certain that you will properly update all the commands in the `SqlDataSource`?
    Now what happens if your query joins two or more tables? How do you handle the
    delete and update commands? This is where all the wizard tools leave you to your
    own devices and where you start to get your hands dirty and spend more time with
    a white-board and dry-erase marker. And if you have gotten to this point with
    the easy-to-use wizards, it will be difficult to form a functional plan to address
    the new feature requirements.


    ## DataSets


    The `DataSet` is an object we have come to know well. It is the primary object
    used to push data around in .NET. It comes in two major flavors: Typed (XSD) and
    Nontyped. You looked at their differences in Chapter 2, which exposed the rigid
    nature of a Typed `DataSet` that makes it a difficult animal to maintain as the
    database changes. So we fall back to the Nontyped `DataSet`. In practice, a `DataSet`
    is used as a glorified data transfer object (DTO), which is magically bound to
    a control without any real regard for the data type for each column. This automatic
    data binding is what allows us to build fast prototype applications by using the
    wizards. But this nontyped grouping of data with all of the automatically generated
    methods can confuse the developer, who must use it as a data access layer. We
    will get into these difficulties in the following sections.


    ### Compile-Time and Runtime Support


    The content of a Nontyped `DataSet` is defined from the query that populates it.
    If a column called `BirthDate` is a `DateTime` today but it updates to return
    a `VARCHAR(15)` tomorrow, the Nontyped `DataSet` will hold the changed column
    automatically without complaint. But if you are casting that value to a `DateTime`
    in your code, you will risk an `InvalidCastException`, which will happen at runtime.
    It is preferable to catch this at compile time, so you can take care of it while
    you are making changes to the application. Of course, you will be testing your
    application for the proper runtime behavior, but because the database is really
    disconnected from the application, the type coming back from a query could change
    at the worst time.


    Another database administrator who is not aware that your application is querying
    a table may adjust it to change an `int` column to `bigint` because the auto-incrementing
    values are about to reach the maximum value for 16-bit integers. Such changes
    are unfortunate, but they do happen.


    Consider a table that has a primary key value set as `int`, which is also an `IDENTITY`
    column incremented by 1 each time a new record is created. You may be casting
    the column as an `Int16`, but once it goes beyond 32,767, you will get a runtime
    exception because it will now need to be at least an `Int32`. If you are just
    testing the application with a few records in the database, you will not reach
    this runtime exception. And when this problem does finally happen, it will be
    when the application has been out in the wild for a while like a time bomb.


    And when this runtime error happens, how will it be logged and reported back to
    the development team? If the error happens on the user interface layer, the error
    will seem to indicate a binding problem instead of the real cause for the problem
    deep in the database. You can imagine that diagnosing this sort of problem will
    chew up your development time as you spin your wheels looking for the problem
    on your side of the system, which is using a different copy of the database that
    has not reached that troublesome threshold.


    Instead of using a Nontyped `DataSet` that happily passes along any data dropped
    into it, you can manually load data into a business object with properties set
    to the exact type you intend the user interface layer to use. When the application
    is compiled, it will ensure that these types line up properly. When a change happens
    in the database that breaks this implicit agreement, the error can be handled
    and logged at the source of the problem so you are better able to fix it. A logged
    error message that states, “Type mismatch at Line 151 while loading `Person` object”
    will pinpoint the issue so that you can check that line of code for what it is
    expecting and which type the database query is actually returning.


    ### Refactoring'
