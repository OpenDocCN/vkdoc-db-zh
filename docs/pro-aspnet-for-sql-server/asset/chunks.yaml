    right from the start.


    **Caching Options**


    There is a dizzying array of options available when it comes to caching. The Cache
    object does not simply hold onto a collection of objects so they are available
    for fast access. The entire caching system includes a rich set of features that
    can be used in different scenarios. Primarily caching in ASP.NET breaks down into
    two groupings: output caching and data caching.


    **Output Caching**


    With output caching, you are working at the user interface level. You are caching
    the output of either a page or a user control. (Caching the output of a user control
    is known as *fragment* *caching*. Think of a user control as generating part of,
    or *a fragment of*, a page.) A page or user control configured for output caching
    will run normally for the first request and every subsequent request until it
    expires from the cache, and it will return the same output as the request that
    placed the content into the cache. Pulling the content from the cache prevents
    server-side processing in the code-behind, which includes all data binding and
    database queries.


    While there are some major benefits to output caching, it is a bit of a brute-force
    approach as opposed to a targeted solution, which can take into account the nature
    of the data that is being consumed. A page or user control can cache many pieces
    of data that all have unique dependencies, which raises many questions when the
    data is grouped together for display. With the right combination of the techniques
    covered here, it should be possible to minimize the downside.


    8601Ch06CMP2 8/24/07 12:13 PM Page 154


    **154**


    C H A P T E R 6 ■ C A C H I N G


    Page Caching


    At the highest level you will cache the output of an entire page, including all
    controls held within the page. The declarative way to enable such caching is to
    place a directive in the page with the desired settings.


    The example in Listing 6-6 will cache the output of the page for a Duration of
    60 seconds and will be unique for any parameter. The VaryByParam attribute will
    cause the output cache to produce a fresh output if any of the query string parameters
    are different when the wildcard (*) is used. You can also specify a specific query
    string or strings with a semicolon-delimited list of names.


    **Listing 6-6.** *Enabled Output Caching*


    <%@ OutputCache Duration="60" VaryByParam="*" %> One of the appealing features
    about output caching is that not only does it not have to pull data from the database
    when it returns a cached response, it also does not have to fire any page events
    because the output from the first request that recorded the output to the cache
    is used. So not only does it reduce database load, it also reduces processor usage.


    The output cache can also be set programmatically in the code-behind, as shown
    in Listing 6-7, although this approach is not as elegant as the declarative approach.
    It does give you the option to use logic to set your expiration time, which could
    come in handy if you want to adapt the cache based on server load.


    **Listing 6-7.** *Programmatically Setting a Page for Output Cache* protected
    void Page_Load(object sender, EventArgs e)


    {


    Response.Cache.SetCacheability(HttpCacheability.Public); if (IsPeakLoadTime())


    {


    // cache for ten minutes during peak load time


    Response.Cache.SetExpires(DateTime.Now.AddMinutes(10));


    }


    else


    {


    // cache for two minutes during normal traffic periods


    Response.Cache.SetExpires(DateTime.Now.AddMinutes(2));


    }


    Response.Cache.SetValidUntilExpires(true);


    Product currentProduct = Context.Items["CurrentProduct"] as Product; if (currentProduct
    != null)


    {


    Label1.Text = currentProduct.Name;


    }


    else


    {


    // hide the control when there is nothing to display


