    **Planning for Scalability**'
  trans: '

    在开发过程中为静态文件重命名并不是一个现实的选项。我倾向于在脚本引用末尾添加一个唯一的查询字符串（`script.js?20070707`），以确保当它被部署到测试环境的暂存服务器时，质量保证团队能够获取到最新版本的脚本。这省去了我需要对不断变化的文件名进行版本控制的麻烦，同时也使应用程序与最新版本保持一致。当网站发布给用户时，我可以重命名脚本文件，加入一个任意的唯一版本号，以确保在新网站上线当天，用户不会使用到旧版本的脚本。我发现对于样式表，有时也有必要这样做，尤其是在
    Internet Explorer 中，它非常不情愿替换其本地缓存的项目。


    ## 分布式服务


    你还可以将网站的动态内容拆分到多个子域名中。CNN.com 可以将其网站拆分为多个子域名，例如 `weather.cnn.com`、`politics.cnn.com`、`entertainment.cnn.com`
    和 `sports.cnn.com`。Google 已经将其服务拆分到诸如 `maps.google.com`、`mail.google.com` 和 `news.google.com`
    等站点。通过将每个服务设置为以更独立的方式运行，你将获得在单一庞大网站中无法实现的灵活性。每个子域名都将专用于特定的服务。


    将服务拆分到不同的服务器上后，你将能够独立管理每个网站。如果负责地图网站的开发团队准备好发布新版本，该团队可以这样做，而无需担心它会如何影响邮件和新闻网站（因为它们与地图网站是解耦的）。


    Google 的邮件和新闻网站可能拥有自己的服务器和发布计划，它们之间的依赖性极低。然后，每个网站可以通过使用其单点登录功能作为一个整体运作，该功能统一了所有
    Google 网站，很像你可以使用 `ASP.NET Membership Provider` 为你自己的网站所做的那样。


    如果你能将你的网站拆分成多个部分，并将它们分布在多个服务器上，同时分解开发和发布计划，那么你就可以将一个笨重的网站塑造成多个从技术和项目管理角度都更易于管理的网站。随着某项服务的流量增加，你可以向承载该服务的
    Web 集群中添加更多 Web 服务器以提升整体性能。你的服务也可以跨服务器重叠。表 10-2 展示了一个为大型公司服务、跨多个子域名拆分的企业内部网站。这些服务按人力资源（HR）、工时表（TS）、应付账款（A/P）、应收账款（A/R）和合同（C）分组。


    **表 10-2.** *重叠服务*


    | **服务器** | **HR** | **TS** | **A/P** | **A/R** | **C** |

    | :--- | :---: | :---: | :---: | :---: | :---: |

    | Web01 | X | | | | X |

    | Web02 | | X | | | X |

    | Web03 | | | X | | |

    | Web04 | | | | X | |

    | Web05 | X | | X | | |

    | Web06 | | X | | X | |

    | Web07 | X | | | X | |

    | Web08 | | X | X | | |

    | Web09 | X | X | | | |

    | Web10 | | | X | | X |


    Web 集群中有十台服务器，服务可以分布在它们中的每一台上。然而，为了降低维护成本，服务只被放置在足够多的服务器上以提供所需的服务水平。那些流量大得多且需要更多资源的应用程序，例如
    A/P 和 A/R，各自被放置在五台服务器上。这些服务也分布在不同的服务器上，因此没有 A/P 服务托管在 A/R 服务器上。与此同时，使用较少的应用程序，如合同、人力资源和工时表，则分散在十台服务器上以确保均匀分布。对这十台服务器的流量可以通过
    `Round Robin DNS` 或负载均衡路由器来管理。


    ## 分布式后端


    上一节的方法拆分了前端流量，但由于瓶颈通常在数据库，你需要考虑拆分各种数据分组，以便运行多个数据库服务器。对于上一节的企业内部网示例，拆分可以轻松地沿着五项服务进行：人力资源、工时表、应付账款、应收账款和合同。最初，当你着手创建分布式后端时，你可以在物理分布数据库之前很久就先进行逻辑规划。`SQL
    Server` 可以采用单一逻辑数据库，其中每个表和存储过程都经过精心管理，以确保它们不会随时间推移而变得相互依赖；或者你可以在同一物理服务器上运行多个逻辑数据库。之后，随着公司发展到单一物理服务器不够用时，你可以将一个或多个数据库移动到第二台服务器上，以实现后端的物理分布。表
    10-3 显示了一个拥有单一数据库服务器的小型公司的初始配置。


    **表 10-3.** *小型公司配置*


    | **主机名** | **数据库名称** | **服务** | **数据库** |

    | :--- | :--- | :--- | :--- |

    | `hrdb.acme.com` | HR | Human Resources | `DB1` |

    | `tsdb.acme.com` | TS | Timesheets | `DB1` |

    | `apdb.acme.com` | AP | Accounts Payable | `DB1` |

    | `ardb.acme.com` | AR | Accounts Receivable | `DB1` |

    | `contactsdb.acme.com` | Contracts | Contracts | `DB1` |


    表 10-3 显示了处理企业内部网站所有服务的五个数据库的配置。一家小型公司只需要一个数据库，因此每个主机名都指向 `DB1` 数据库，其内部 IP 地址可能是
    `10.10.1.101`。每个主机名都指向该 IP 地址。稍后，当数据库被分布到独立的物理服务器时，数据将被迁移，DNS 记录将被更新，而应用程序配置只要使用了这些主机名配置，就保持不变。


    清单 10-1 显示了 `AP` 数据库的连接字符串。


    **清单 10-1.** *AP 数据库连接字符串*

    `Data Source=apdb.acme.com;Initial Catalog=AP;Integrated Security=True`


    当公司成长并且应用程序性能需要提升时，你可以将负载最大的数据库移动到新的数据库服务器上，这台服务器的硬件性能可能比公司规模较小、预算较少时创建的初始数据库服务器强大得多。现在，你可能不再只是基本的
    `RAID` 和双处理器服务器，而是升级到配备四处理器服务器的 `SAN`，它可以处理你排名前两位的数据库。这个更新后的配置如表 10-4 所示。


    **表 10-4.** *成长中公司配置*


    | **主机名** | **数据库名称** | **服务** | **数据库** |

    | :--- | :--- | :--- | :--- |

    | `hrdb.acme.com` | HR | Human Resources | `DB1` |

    | `tsdb.acme.com` | TS | Timesheets | `DB1` |

    | `apdb.acme.com` | AP | Accounts Payable | `DB2` |

    | `ardb.acme.com` | AR | Accounts Receivable | `DB2` |

    | `contactsdb.acme.com` | Contracts | Contracts | `DB1` |


    在 A/P 和 A/R 服务的数据库被移动后，`apdb.acme.com` 和 `ardb.acme.com` 的 DNS 记录可以指向新服务器的 IP
    地址 `10.10.1.102`。更改为新 IP 不会立即生效，因为 `DNS` 记录通常有一个 30 分钟或一小时的“生存时间”设置。要使更改立即生效，你需要在应用程序服务器上清除
    `DNS` 缓存，强制它们获取最新的 `DNS` 信息，并开始将正确的请求路由到相应的数据库。在过渡期间的一段时间内，你可能希望将 A/P 和 A/R 数据库设置为`只读`，并在迁移后让它们在线运行一段时间。


