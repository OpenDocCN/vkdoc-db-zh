    exception because it will now need to be at least an Int32\. If you are just testing
    the application with a few records in the database, you will not reach this runtime
    exception. And when this problem does finally happen, it will be when the application
    has been out in the wild for a while like a time bomb.


    And when this runtime error happens, how will it be logged and reported back to
    the development team? If the error happens on the user interface layer, the error
    will seem to indicate a binding problem instead of the real cause for the problem
    deep in the database. You can imagine that diagnosing this sort of problem will
    chew up your development time as you spin your wheels looking for the problem
    on your side of the system, which is using a different copy of the database that
    has not reached that troublesome threshold.


    Instead of using a Nontyped DataSet that happily passes along any data dropped
    into it, you can manually load data into a business object with properties set
    to the exact type you intend the user interface layer to use. When the application
    is compiled, it will ensure that these types line up properly. When a change happens
    in the database that breaks this implicit agreement, the error can be handled
    and logged at the source of the problem so you are better able to fix it. A logged
    error message that states, “Type mismatch at Line 151 while loading Person object”
    will pinpoint the issue so that you can check that line of code for what it is
    expecting and which type the database query is actually returning.


    Refactoring'
  trans: '

    尽管 Visual Studio 内置了许多强大工具来辅助将数据绑定到应用程序，你仍然需要手动构建数据访问层的部分内容。手动构建的数据访问层能为你在布局表结构、存储过程以及将数据从数据库传输到应用程序并返回的代码层方面提供最大的灵活性。当你直接与数据访问层打交道时，你将深入了解系统的所有细微差别。你也将能够深入思考系统将如何运作。


    ### 本章内容


    本章涵盖以下内容：

    - 使用 `DataSet`、内联 SQL 和存储过程

    - 使用 `DataObject` 和 `对象数据源`

    - 构建数据库

    - 构建数据访问层

    - 构建网站


    在构建数据访问层时，你的设计决策会影响性能。如果你足够幸运，可以改变数据库中数据的构建方式，甚至更好，你可以从头开始。你的设计决策将产生或好或坏的影响。目前，随着
    WCF 和 LINQ 引入 .NET 平台，我们的选择正以新的方式扩展。这些选项超越了已变得司空见惯的典型 ADO.NET 和 `DataSet` 模型。然而，这些新技术极具吸引力，足以突破本章所审视的设计框架。


    本章的示例应用程序是一个用于存储和标记你喜爱链接的网站。我将向你展示应用程序的每个部分是如何构建的，并解释过程中做出的决策。


    ## 使用数据集、内联 SQL 和存储过程


    传统方法是使用内联 SQL 或存储过程，用查询结果填充 `DataSet`，然后将该数据绑定到用户界面上的数据绑定控件。此过程可用于快速构建一个功能相当丰富的丰富界面。


    然而，人们往往只考虑构建第一个版本应用程序所需的时间成本。但随后下一个版本就会到来。随着现实世界的变化，应用程序和数据库的需求也会随之改变。历史表明，回头维护应用程序占据了开发者
    80% 的工作量。


    你可以在 Visual Studio 中打开 `服务器资源管理器`，将一个表拖放到 `Web 窗体` 的设计界面上，就能自动生成支持选择、更新、删除、分页和排序的完整功能的
    `GridView` 和关联的 `SqlDataSource`。但是，当需要哪怕是最微小的改动时，会发生什么？如果你在数据库表中添加一个新列，并想在 `GridView`
    上显示它，该怎么办？你确定会正确更新 `SqlDataSource` 中的所有命令吗？如果你的查询涉及连接两个或更多表，又会怎样？你如何处理删除和更新命令？这正是所有向导工具将你置之不顾的地方，也是你开始亲自动手、花更多时间在白板和白板笔上的时候。如果你已经通过这些易于使用的向导走到这一步，那么制定一个功能计划来应对新的功能需求将变得困难。


    ## 数据集


    `DataSet` 是一个我们已经非常熟悉的对象。它是 .NET 中用于传输数据的主要对象。它有两种主要形式：类型化（XSD）和非类型化。你在第 2 章中了解了它们的区别，该章揭示了类型化
    `DataSet` 的刚性本质，使其在数据库发生变化时难以维护。因此我们转而使用非类型化 `DataSet`。实际上，`DataSet` 被用作一个华丽的**数据传输对象（DTO）**，它被神奇地绑定到控件上，而无需真正考虑每列的数据类型。这种自动数据绑定使我们能够通过向导快速构建原型应用程序。但这种非类型化的数据分组以及所有自动生成的方法可能会让必须将其用作数据访问层的开发者感到困惑。我们将在后续章节中探讨这些困难。


    ### 编译时与运行时支持


    非类型化 `DataSet` 的内容由填充它的查询定义。如果一个名为 `BirthDate` 的列今天是 `DateTime` 类型，但明天它更新为返回一个
    `VARCHAR(15)`，非类型化 `DataSet` 会自动接收更改后的列而不会报错。但如果你在代码中将该值强制转换为 `DateTime`，你将面临运行时发生
    `InvalidCastException` 异常的风险。最好在编译时捕获此错误，以便在修改应用程序时处理它。当然，你也会测试应用程序的运行时行为是否正常，但由于数据库实际上与应用程序是断开的，查询返回的类型可能在最糟糕的时候发生变化。


    另一位不知道你的应用程序正在查询某个表的数据库管理员，可能会调整该表，将一个 `int` 列更改为 `bigint`，因为自动递增的值即将达到 16 位整数的最大值。此类更改虽不幸，但确实会发生。


    考虑一个表，其主键值设置为 `int` 类型，并且也是一个 `IDENTITY` 列，每创建一个新记录就递增 1。你可能已将该列强制转换为 `Int16`，但是一旦它超过
    32,767，你将收到运行时异常，因为它现在至少需要是 `Int32` 类型。如果你只是用数据库中的几条记录测试应用程序，你不会遇到这个运行时异常。而当这个问题最终发生时，它就像一个定时炸弹，会在应用程序发布到实际环境一段时间后出现。


    当这个运行时错误发生时，它将如何被记录并报告给开发团队？如果错误发生在用户界面层，错误似乎指向绑定问题，而不是数据库深处真正的原因。你可以想象，诊断这类问题会消耗你的开发时间，因为你可能会在系统自己的那一侧（使用着一个尚未达到麻烦阈值的数据库副本）原地打转，寻找问题所在。


    与其使用乐于传递任何放入其中的数据的非类型化 `DataSet`，你可以手动将数据加载到业务对象中，其属性设置为用户界面层预期的精确类型。当应用程序编译时，它会确保这些类型正确对齐。当数据库中发生破坏这种隐式约定的更改时，可以在问题源头处理和记录错误，从而使你能够更好地修复它。一条记录着“在加载
    `Person` 对象时第 151 行类型不匹配”的错误消息将准确定位问题，以便你检查该行代码的预期类型和数据库查询实际返回的类型。


    ### 重构

    '
- fmt: "非类型化的值也使得重构应用程序变得困难。你不能简单地在`DataSet`中右键单击一个属性并选择“查找所有引用”。`DataSet`中的值是通过名称或数字索引作为`DataRow`或`DataRowView`来访问的，这无法通过自动代码分析追踪回源对象。一个泛型的`DataRow`可以属于任何`DataSet`，而由Visual\
    \ Studio和第三方插件提供的重构功能将无法协助你进行全解决方案范围的更改。要进行全局更改，你必须诉诸于搜索和替换，但这样做是有问题的。\n\n当你的应用程序需要修订，并且你想更新一个查询使其更具描述性时，你可能会添加一个名为`VendorName`的新列，将`Name`重命名为`CustomerName`，并移除`Name`列。突然之间，所有对`Name`的引用都失效了，并将导致运行时异常。因此，你必须找到所有对`Name`的引用并更正它们。每次进行这样的更改时，你都必须运行搜索，并确保`row[\"\
    Name\"]`实际引用的是你刚刚更改的同一查询结果。你可能很容易就有许多包含名为`Name`列的查询。全局搜索和替换会破坏那些引用。\n\n相反，如果你使用的是自定义业务对象，你可以安全地使用重构工具在解决方案范围内重命名属性。为了访问应用程序范围之外的引用，你还可以使用`Obsolete`属性标记旧属性，并附上使用新属性的说明，同时保持现有功能。这项技术将在本章后面介绍。\n\
    \n### 调试\n\n你可能会期望使用`DataSet`进行调试会得到很好的支持。令人惊讶的是，调试支持的缺乏是使用`DataSet`的一个显著缺点。在图7-1中，你可以看到如何获取`DataSet`中第一个`DataTable`的第一个`DataRow`的值。要获取下一个`DataRow`，你必须更改索引值。\n\
    \n至少你可以查看该行中各列的值，但这些值是通过索引而不是列名访问的。当你访问同一行数据，该行被附加到Web窗体上的数据绑定控件（例如`Repeater`）时，你将通过`e.Item.DataItem`访问该行，这是一个`DataRowView`。正如你从图7-2中看到的，监视窗口的帮助比图7-1更小。你无法直接导航到这些值，并且几乎无法通过查看监视窗口来推断类型。\n\
    \n这种糟糕的调试体验将减少你用于创建和维护应用程序的时间。当数据在数据访问层立即移入业务对象并传递回应用程序时，你将能够以更有用的方式从调试器访问数据。图7-1和7-2中使用的相同数据在图7-3中被放入一个`FavoriteLink`对象中。`FavoriteLink`是网站将使用的一个关键对象，我们将在本章后面构建这个网站。\n\
    \n图7-3中显示的值显然更具可读性，并且你确切地知道你正在处理什么。使用业务对象显然比`DataSet`提供了更好的调试体验。至少用户界面层恢复了编译时支持，而类型安全问题被隔离在数据访问层深处。当你通过将`row[\"\
    Url\"]`转换为`String`来在`FavoriteLink`对象中设置`Url`属性时，你会在靠近拉取数据的查询的地方进行此操作。任何由此产生的异常都将显示堆栈跟踪，指向此查询和行号（如果你随程序集一起部署了程序调试数据库（PDB）文件）。稍后你将看到如何完全避免`InvalidCastException`。\n\
    \n■**注意** 如果在编译类库时创建的PDB文件随程序集一起部署，异常可以提供更详细的堆栈跟踪。诸如异常发生的确切行号等有用细节将帮助你追踪和修复错误。PDB文件是在调试和发布配置下创建的。\n\
    \n像任何其他普通对象一样，`FavoriteLink`对象也更易于重构。你可以在代码中找到对`Url`属性的所有引用，无论它在解决方案中的何处使用。不幸的是，如果你以声明方式将`Url`属性绑定到数据绑定控件，重构搜索将不会找到该引用。\n\
    \n最后，在调试时，你可以更轻松地使用`FavoriteLink`对象，如图7-3所示。这甚至包括在属性访问器中设置断点，这在观察哪些值被绑定到数据绑定控件时将非常有用。\n\
    \n### 内联SQL\n\n一个需要避免的诱惑是直接将你的SQL语句写入代码中。尽管你创建的与数据库通信的代码确实会与查询和其他数据库命令紧密绑定，但这并不是创建或维护软件最有效的方式。\n\
    \n#### 维护注意事项\n\n将SQL直接放入代码中的一个问题是，当这些查询更改时，会导致额外的维护工作。你最终会为自己增加更多工作并增加出错的机会。例如，你最基本的查询可能开始时如清单7-1所示。\n\
    \n```sql\nSELECT * FROM Production.Product WHERE ProductID = 1\n```\n\n你可以看到它开始时是一个可读的查询，但随着查询变长，它开始看起来更像清单7-2。\n\
    \n```sql\nSELECT \n    p.ProductID, p.[Name], p.ProductNumber,\n    p.Color, p.ListPrice,\
    \ \n    p.SellStartDate, p.SellEndDate, \n    p.DiscontinuedDate \nFROM Production.Product\
    \ AS p \nJOIN Production.ProductProductPhoto AS ppp \nON ppp.ProductID = p.ProductID\
    \ \nWHERE ppp.ProductPhotoID != 1;\n```\n\n清单7-2中的查询显然是一个维护噩梦。当你进行微小的更改时，你会在代码中内联进行，并尽力确保将查询仔细地包裹在`String`的引号内。但你放弃了很多东西。\n\
    \n如果清单7-2中的查询是作为独立的SQL脚本维护的，你可以使用诸如SQL Server Management Studio或带有数据库项目的Visual\
    \ Studio之类的工具来提供语法着色以及其他一些丰富的功能。第三方工具也可提供实时智能感知支持，并在你处理SQL时提供列和表名的列表。内联查询无法利用所有这些支持。\n\
    \n#### 安全注意事项"
  raw: 'A nontyped value also makes it hard to refactor the application. You cannot
    simply right-click on a property in a DataSet and select Find All References.
    Values from a DataSet are accessed as a DataRow or DataRowView by using an index
    by name or number, which cannot be tracked back to the source object through automatic
    code analysis. A generic DataRow could belong to any DataSet, and the refactoring
    features provided by Visual Studio and third-party add-ins will not assist you
    in making solution-wide changes. To make changes globally, you must resort to
    a search-and-replace, but doing so is problematic.


    When your application is revised and you want to update a query to make it more
    descriptive, you may add another column called VendorName, rename Name to CustomerName,
    and eliminate the Name column. Suddenly all references to Name are now invalid
    and will cause runtime exceptions, so you must find all references to Name and
    correct them. Each time a change like this is made, you must run your searches
    and be sure that row["Name"] actually refers to the same query result you have
    just changed. You could easily have many queries with a column named Name. A global
    search-and-replace would break those references.


    If you instead are using custom business objects, you can safely use refactoring
    tools to rename properties for the scope of a solution. To reach references beyond
    the scope of the application, you can also mark an older property with the Obsolete
    attribute and a note to use the new property while maintaining existing functionality.
    This technique is covered later in this chapter.


    ![Image 27](index-199_1.png)


    ![Image 28](index-199_2.png)


