  trans: "\n为了保持数据访问层的模块化特性，组建一个团队专门负责数据层开发，而另一个团队负责应用程序开发，可能会很有帮助。应用程序开发者可以处理业务逻辑方面的需求，同时向数据团队请求必要的功能。这种清晰的分离有助于确保应用程序特有的细节不会被固化到数据访问层中。当应用程序需要一个新功能时，数据团队可以考虑如何在不损害数据访问层完整性的情况下，最好地提供该功能。之后，当包含数据访问层的类库被多个应用程序使用时，该库不应包含应用程序特有的细节，否则下一个应用程序将无法提供这些细节，从而使其更难以被复用。\n\
    \n## 创建数据访问方法\n\n使用企业库中的**数据访问应用程序块**，结合第 2 章介绍的代码片段，可以轻松创建数据访问方法。我们将从类库和一个名为\
    \ `Domain` 的文件夹开始。在该文件夹中，我们将创建一个名为 `FavoriteLinkDomain` 的类。在准备好第 2 章的代码片段后，我们将使用第一个数据访问代码片段（快捷方式为\
    \ `datypes`）来创建一个新变量。你可以按 Ctrl+K, Ctrl+X 键序列打开代码片段选择器并导航到第一个片段，也可以使用快捷方式，输入 `datypes`\
    \ 然后按两次 Tab 键来立即插入该片段。第一个代码片段只是声明一个对 `Database` 对象的引用，该对象将在类的其余部分中使用。\n\n接下来，我们需要在默认构造函数中实例化\
    \ `Database` 对象。第二个代码片段完成这项工作，其快捷方式定义为 `dacreation`。为域类创建默认构造函数，并将此代码片段插入其中。此片段包含一个连接字符串名称的占位符。目前，我们将它设置为\
    \ `FavoriteLinks`，使其如清单 7-28 所示。\n\n**清单 7-28.** `FavoriteLinkDomain` 的默认构造函数\n\
    ```csharp\npublic FavoriteLinkDomain()\n{\n    db = DatabaseFactory.CreateDatabase(\"\
    FavoriteLinks\");\n}\n```\n\n### 数据库配置\n\n一个简单的应用程序可能只有一个数据库连接。在此类应用程序中，可以将数据访问层配置为使用默认数据库连接，作为企业库配置的一部分。在第\
    \ 8 章，自定义配置将比在数据访问层中硬编码连接字符串名称提供更大的灵活性。\n\n下一步是创建从数据库获取数据的方法。**获取 DataSet 方法**片段将创建一个方法，该方法调用存储过程并用结果构造一个\
    \ `DataSet`。此片段的快捷方式是 `dagetds`。清单 7-29 展示了其中一个获取方法。\n\n**清单 7-29.** 获取最近收藏链接的方法\n\
    ```csharp\npublic DataSet GetRecentFavoriteLinksByProfileID(\n    long profileId,\
    \ int startDaysBack, int endDaysBack)\n{\n    DataSet ds;\n    try\n    {\n  \
    \      using (DbCommand dbCmd = db.GetStoredProcCommand(\n            \"chpt07_GetRecentFavoriteLinksByProfileID\"\
    ))\n        {\n            db.AddInParameter(dbCmd, \"@ProfileID\",\n        \
    \        DbType.Int64, profileId);\n            db.AddInParameter(dbCmd, \"@StartDaysBack\"\
    ,\n                DbType.Int32, startDaysBack);\n            db.AddInParameter(dbCmd,\
    \ \"@EndDaysBack\",\n                DbType.Int32, endDaysBack);\n           \
    \ ds = db.ExecuteDataSet(dbCmd);\n        }\n    }\n    catch (Exception ex)\n\
    \    {\n        throw GetException(\n            \"Error in GetRecentFavoriteLinksByProfileID\"\
    , ex);\n    }\n    //返回结果\n    return ds;\n}\n```\n\n此方法接收三个参数，并用结果填充 `DataSet`。对于此示例项目，还有其他几个获取方法，你可以在本章的可下载代码中找到。\n\
    \n作为使用存储过程结果填充 `DataSet` 的替代方法，你也可以使用返回 `IDataReader` 的片段。此片段的快捷方式是 `dagetdr`。它看起来与\
    \ `DataSet` 方法相同，但返回的是 `IDataReader` 而不是 `DataSet`。\n\n保存方法的工作方式与获取方法不同。它们不是填充\
    \ `DataSet` 或 `IDataReader`，而是简单地执行一个非查询并返回一个可选的输出参数。用于非查询方法的代码片段快捷方式是 `danonquery`。清单\
    \ 7-30 展示了一个保存方法。\n\n**清单 7-30.** 保存收藏链接的方法\n```csharp\npublic long SaveFavoriteLink(\n\
    \    long profileId, string url, string title,\n    bool keeper, int rating, string\
    \ note, string tags,\n    DateTime created, DateTime modified, long oldFavoriteLinkId)\n\
    {\n    long favoriteLinkId;\n    try\n    {\n        using (DbCommand dbCmd =\n\
    \            db.GetStoredProcCommand(\"chpt07_SaveFavoriteLink\"))\n        {\n\
    \            db.AddInParameter(dbCmd, \"@ProfileID\",\n                DbType.Int64,\
    \ profileId);\n            db.AddInParameter(dbCmd, \"@Url\",\n              \
    \  DbType.String, url);\n            db.AddInParameter(dbCmd, \"@Title\",\n  \
    \              DbType.String, title);\n            db.AddInParameter(dbCmd, \"\
    @Keeper\",\n                DbType.Boolean, keeper);\n            db.AddInParameter(dbCmd,\
    \ \"@Rating\",\n                DbType.Int16, rating);\n            db.AddInParameter(dbCmd,\
    \ \"@Note\",\n                DbType.String, note);\n            db.AddInParameter(dbCmd,\
    \ \"@Created\",\n                DbType.DateTime, created);\n            db.AddInParameter(dbCmd,\
    \ \"@Modified\",\n                DbType.DateTime, modified);\n            db.AddInParameter(dbCmd,\
    \ \"@OldFavoriteLinkID\", DbType.Int64, oldFavoriteLinkId);\n            db.AddOutParameter(dbCmd,\
    \ \"@FavoriteLinkID\",\n                DbType.Int64, 0);\n            db.ExecuteNonQuery(dbCmd);\n\
    \            object obj = db.GetParameterValue(dbCmd, \"@FavoriteLinkID\");\n\
    \            favoriteLinkId = (long)obj;\n        }\n    }\n    catch (Exception\
    \ ex)\n    {\n        throw GetException(\"Error in SaveFavoriteLink\", ex);\n\
    \    }\n    SaveLinkTags(favoriteLinkId, tags);\n    return favoriteLinkId;\n\
    }\n```\n\n用于删除或清除数据的方法也使用非查询片段来调用存储过程，以执行删除数据所需的必要工作。\n\n这些获取、保存和移除数据的方法都处理的是原始数据。这些原始数据直接绑定到存储过程，存储过程充当数据访问层与数据库中基础表之间的代理。在这些方法之上，用户界面层使用的对象应该以对应用程序所有者和长期维护此软件的开发人员有意义的方式来表示数据。\n\
    \n## 处理异常\n\n在这些数据访问方法中，对数据库的调用总是包裹在 `try...catch` 块中。我加入这个额外保护层有两个主要原因。首先，我希望能够在我知道如何处理问题的数据访问层内部处理该问题。其次，我想在数据访问层中捕获任何可能向用户暴露数据库信息的异常。这样做可以阻止可能导致安全漏洞的问题。然而，添加\
    \ `try...catch` 块可能会降低性能。做出这个选择时已经考虑到了这一点。性能损失应该是微小的。\n\n为了避免进入此 `try...catch`\
    \ 块的性能影响，我仍然可以使用缓存。如果数据库查询要请求的数据已经在缓存中，则可以避免调用数据库以及异常处理。如果你选择完全去掉 `try...catch`\
    \ 块，可以将其剥离，只保留用于 `DbCommand` 资源管理的 `using` 子句。你可能会发现，为性能所做的权衡并不显著到足以放弃紧密异常处理所提供的稳定性和安全性。\n\
    \n## 创建业务对象\n"
- fmt: "When you work with your application, you will want to pass around objects\
    \ that make sense to your business. A business object such as a `Customer` has\
    \ properties such as `FirstName`, `LastName`, `CurrentOrder`, and `LastOrder`.\
    \ This business object fully implements the three parts of an object: data, behavior,\
    \ and relationships. A `Customer` has a first and last name and a relationship\
    \ to his current and last order. A `Customer` can also complete his `CurrentOrder`.\
    \ These are all processes that an application owner understands and conveys to\
    \ the development team through carefully designed business objects. Instead of\
    \ having disjointed blobs of data held in a `DataSet` that directly mirrors the\
    \ structure of your relational database, you have the opportunity to truly represent\
    \ the real-world objects for the application. In addition to properly representing\
    \ the real-world objects, you can also fully encapsulate the data access layer\
    \ behind these business objects, which gives you the opportunity to use techniques\
    \ such as lazy loading to boost performance while maintaining a consistent public\
    \ interface.\n\nThe central business object of the Favorite Links website is the\
    \ `FavoriteLink` object. As a business object, it holds onto the various properties\
    \ of a link such as the `Title`, `Url`, `Rating`, `Note`, and `Tags`. Each of\
    \ these properties is populated by columns returned from calls to stored procedures.\
    \ Mapping these values can be a considerable amount of work, especially in the\
    \ early stages of your application, when you are still adjusting the columns and\
    \ properties. Updating the mappings can be time-consuming.\n\n## Loading Data\n\
    \nPerhaps the strongest argument against manually creating your own data access\
    \ layer is the amount of work necessary to map the data from the database to the\
    \ objects. Object/Relational (O/R) mapping has been a common problem since objects\
    \ have been used in combination with relational databases. The impedance mismatch\
    \ between these generally incompatible systems requires you to understand how\
    \ both ends are constructed so that you can use that understanding to map them\
    \ together.\n\nOne approach to O/R mapping has been to create configuration files\
    \ that explicitly set the mapping between every data column and object property.\
    \ Popular O/R mapping tools such as `NHibernate` use extensive XML configuration\
    \ that defines all the mappings. Many consider this to be a powerful solution\
    \ to the O/R mapping requirement. I find that it is an extra, unnecessary layer.\n\
    \nTo facilitate the O/R mapping work, I created a base class that automatically\
    \ maps data columns to properties by matching up the names and types for properties\
    \ that are writable.\n\nEvery business object populated by the data access layer\
    \ inherits this base class. One load method takes a `DataRow` while another takes\
    \ an `IDataReader` object to set the properties. With reflection, the base class\
    \ compares the columns coming from the query with the properties in the business\
    \ object. I call this base class `DomainObject`. The core properties it always\
    \ provides are `ID`, `Created`, and `Modified`. As I add new columns to the stored\
    \ procedures, and new properties to the business objects, the values are automatically\
    \ loaded into the objects without any additional effort. (See the code downloads\
    \ for the `DomainObject` class.) I made sure that `DomainObject` would work with\
    \ either a `DataSet` or an `IDataReader` because both are worthwhile in different\
    \ scenarios. I always want to maintain the flexibility of switching between them.\
    \ For example, I can cache a `DataSet` deep in the data access layer because it\
    \ is holding onto the data, while an `IDataReader` is just a data enumerator that\
    \ can be used only once. But `IDataReader` is faster, so if I do not cache the\
    \ data, I can leverage the speed of the `IDataReader`.\n\nWhen data is pulled\
    \ from the database and the code loops over the results, we will pass the `DataRow`\
    \ or `IDataReader` into the load method of the business object to prepare it to\
    \ be sent back to the application layer. These objects are held in a `FavoriteLinkCollection`\
    \ object, which is shown in Listing 7-31.\n\n### Listing 7-31. FavoriteLinkCollection\
    \ Object\n```csharp\nusing System.Collections.Generic;\n\nnamespace Chapter07.Domain\n\
    {\n    /// <summary>\n    /// Collection of FavoriteLink objects\n    /// </summary>\n\
    \    public class FavoriteLinkCollection : List<FavoriteLink>\n    {\n    }\n\
    }\n```\n\nNotice that the `FavoriteLinkCollection` object simply inherits from\
    \ the generic collection `List<FavoriteLink>`, which gives us a clean object that\
    \ can be extended later. It is also strongly typed with the `FavoriteLink` business\
    \ object. A `DataSet` can be used to populate a `FavoriteLinkCollection`, as shown\
    \ in Listing 7-32.\n\n### Listing 7-32. Loading with DataRow\n```csharp\nprivate\
    \ void AddToFavoriteLinkCollection(\n    FavoriteLinkCollection collection, DataSet\
    \ ds)\n{\n    if (ds.Tables.Count > 0)\n    {\n        foreach (DataRow row in\
    \ ds.Tables[0].Rows)\n        {\n            FavoriteLink fl = new FavoriteLink(row);\n\
    \            collection.Add(fl);\n        }\n    }\n}\n```\n\nA constructor for\
    \ the `FavoriteLink` object simply takes a `DataRow` and internally calls the\
    \ load method defined by the `DomainObject`. Alternatively, an `IDataReader` could\
    \ be used for potentially better performance, as shown in Listing 7-33.\n\n###\
    \ Listing 7-33. Loading with IDataReader\n```csharp\nprivate void AddToFavoriteLinkCollection(\n\
    \    FavoriteLinkCollection collection, IDataReader dr)\n{\n    while (dr.Read())\n\
    \    {\n        FavoriteLink fl = new FavoriteLink(dr);\n        collection.Add(fl);\n\
    \    }\n}\n```\n\nThe `FavoriteLink` object also includes a constructor that takes\
    \ an `IDataReader`, which is passed along to the load method. In the case of the\
    \ `DataSet` and the `IDataReader`, the columns used to populate `FavoriteLink`\
    \ should be identical, especially when they call the same stored procedures.\n\
    \n## Tuning the Data Load\n\nBecause of the performance hit that is incurred,\
    \ when using reflection there is a clear performance difference from using it\
    \ to load data vs. directly casting the data to the properties of the business\
    \ object. If you know a data column named `Title` is a `String`, you can simply\
    \ set the property while directly casting the object, as shown in Listing 7-34.\n\
    \n### Listing 7-34. Directly Casting a Data Value to a Property\n```csharp\nthis.Rating\
    \ = (int)row[\"Rating\"];\n```\n\nIf the column is an `int` and the value is not\
    \ null, this will work—but that is never a guarantee.\n\nBecause the database\
    \ is disconnected and can be updated separately from the application, changes\
    \ to the database can be a potential problem. The approach using reflection creates\
    \ mappings that match the names and types. Every time the mappings are used to\
    \ set the property values, the data column is always checked for a null value,\
    \ and this check eliminates the risk of casting the type incorrectly. This protection\
    \ does come at a cost. Fortunately, that cost has been minimized.\n\nThe `FavoriteLink`\
    \ object features the ability to switch between the reflection and direct casting\
    \ modes by setting a static enum value. This setting allows for testing the performance\
    \ of both modes. The unit tests for this data access layer include load tests\
    \ that measure the time it takes to load a large set of `FavoriteLink` objects\
    \ and then display the average time for both modes. These load tests are included\
    \ with the code downloads for this chapter.\n\nThese load tests, when run with\
    \ a high number of items, showed that the reflection cost does not have a significant\
    \ impact on the time to load the data into the `FavoriteLink` objects."
