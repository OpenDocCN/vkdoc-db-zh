    C H A P T E R 4 ■ D ATA B O U N D C O N T R O L S


    **89**


    **Disabling ViewState**


    Another way to reduce page size is to disable ViewState. You can do so with an
    entire page or at the control level with the EnableViewState property. If you
    disable ViewState for the page, that decision will have an impact on every control
    included on the page. Each control will not be able to override that setting,
    so the impact would be universal and possibly damaging for controls that require
    ViewState. The same is true for any control that holds other controls below it.
    The setting impacts all controls below it.


    Due to the fact that you cannot enable ViewState for a control if the ViewState
    has been disabled for the entire page, you will want to identify individual controls
    that do not need it. A navigational control included on each page, perhaps as
    a part of the master page, would make for an ideal candidate. If it simply contains
    markup and a few HyperLink controls that have the NavigateUrl set declaratively,
    the value will be available during a postback when ViewState is disabled.


    For a custom user control, you may also design its behavior to work with and without
    ViewState. Listing 4-17 shows how this can be done.


    **Listing 4-17.** *Working With and Without ViewState* if (! IsPostBack)


    {


    GridView1.DataSource = GetDataSource();


    GridView1.DataBind();


    }


    else if (! IsViewStateEnabled)


    {


    GridView1.DataSource = GetDataSource();


    GridView1.DataBind();


    }


    The datasource for the GridView is set on the first page load when it is not a
    postback and when it is a postback with ViewState disabled. Doing it this way
    will load the GridView data when the control needs it. However, this approach
    is pretty manual. It is better to simply use a declared ObjectDataSource reference.
    Doing so will allow the GridView to automatically detect when ViewState is disabled
    and bind using the ObjectDataSource when it needs data.


    **ControlState vs. ViewState**


    Because some pieces of data are critical to the functionality of a control, it
    is necessary to retain access to those details when ViewState is enabled. Controls
    such as the GridView are smart enough to work with and without ViewState, but
    they still need to retain the current state of the control related to position
    when paging is enabled. The data for each of the columns can be pulled from the
    database with each postback, but the database will not know that the fourth page
    of the GridView was selected. This value is retained by the SelectedItem property
    that is persisted with ControlState, a variation of ViewState.


    ControlState was introduced with ASP.NET 2.0\. It is not an automatic feature
    like ViewState. You must implement it yourself and register with the Page to persist
    the data.


    Listing 4-18 shows how to save ControlState.


    8601Ch04CMP3 8/25/07 1:07 PM Page 90


    **90**


    C H A P T E R 4 ■ D ATA B O U N D C O N T R O L S


    **Listing 4-18.** *SaveControlState*


    protected override object SaveControlState()


    {


    Pair state = new Pair();


    state.First = base.SaveControlState();


    state.Second = _controlStateData;


    return state;


    }


    ControlState and ViewState are often persisted using the Pair and Triplet types
    from the System.Web.UI namespace. They are simply tiny arrays that hold onto your
    data. You could also use an array of objects that can be serialized, which means
    it is best to stick to types like string, int, and DateTime. You want to use the
    least amount of data to persist the necessary state. Using the Pair type is a
    good first layer that will hold the ControlState of the base class in the First
    property and the state of the current instance in the Second property. If you
    have many values to persist, the value stored in the Second property could be
    the array of many objects. This hierarchy of this state will then be unfolded
    when it is loaded, as shown in Listing 4-19.


    **Listing 4-19.** *LoadControlState*


    protected override void LoadControlState(object savedState)


    {


    Pair pair = savedState as Pair;


    if (pair != null)


    {


    base.LoadControlState(pair.First);


    _controlStateData = (string)pair.Second;


    }


    else


    {


    base.LoadControlState(null);


    }


    }


    The state is cast as a Pair type and used to load the ControlState of the base
    class with the First property and then the state of the current instance with
    the Second property. With these values defined, it is necessary to tell the Page
    that ControlState is required for this control. This must be done during the Init
    event before the events to load ControlState are fired later in the event life
    cycle, as shown in Listing 4-20.


    **Listing 4-20.** *Requiring ControlState*


    protected void Page_Init(object sender, EventArgs e)


    {


    Page.RegisterRequiresControlState(this);


    }


    8601Ch04CMP3 8/25/07 1:07 PM Page 91


    C H A P T E R 4 ■ D ATA B O U N D C O N T R O L S


    **91**


    The preceding examples for ControlState simply persist a single string variable.
    Many times you should not have much data to persist. The event ordering will cause
    ControlState to be persisted and loaded between the Init and Load events so that
    the persisted data will be available when your Load event is fired. Later the
    PreRender event will fire where most databound controls actually load the data.
    It is important to know when this data is available to your page or control.


    Given the option to persist state in the Session or in ControlState, it should
    be noted that not all state has to be persisted. Some data can be lost safely
    because the input fields that were using them are already persisting the data,
    such as a TextBox. The value from the form will always be set in the Text property.
    However, the TextChanged event will now fire with each postback because the control
    cannot compare whether or not the value actually changed.


    If your control does handle this event, you will not be affected by ViewState
    being disabled.


    Other controls such as the ListBox and RadioButtonList may be populated declaratively
    instead of binding them to a datasource. These will work like the TextBox in that
    they can give you the currently selected value properly and redraw themselves
    with all of the available selections with the declared values. And again, the
    events triggered when a selection changes will not work as they would with ViewState
    enabled. In either situation, you can still get the value the user has set and
    take action as needed.


    **Creating a Databound Control**


    In order to deepen your understanding of how databound controls work, you will
    learn how to create a control that will be bound to an ObjectDataSource. You will
    be able to do more with this control than you can with standard controls such
    as the GridView and DetailsView because you will have the full source code, which
    you can modify and walk with the debugger. You can also see directly what the
    consequences are for those modifications.'
  trans: "\n# 第四章 ■ 数据绑定控件\n\n你也可以实现自己的自定义 `PageStatePersister`，其工作方式与 `SessionPageStatePersister`\
    \ 类似，但不是将数据限制为十项，而是可以将较旧的数据存储到数据库中以备需要。可以通过计划任务在每晚清除这些数据。\n\n## 分页\n\n也可以通过分页来减小\
    \ `ViewState` 的大小。考虑一个总共有 1,000 项、页面大小设置为 10 项的 `GridView`。只有这 10 项的数据会持久化到 `ViewState`\
    \ 中，而不是全部 1,000 项的数据。当分页与上一章介绍的子集选择技术结合使用时，可以确保仅从数据库中提取显示的 10 行数据，从而减轻数据库负载。稍后在“创建数据绑定控件”一节中构建自定义数据绑定控件时，你将了解更多关于分页优势的内容。\n\
    \n## 禁用 ViewState\n\n另一种减小页面大小的方法是禁用 `ViewState`。你可以对整个页面进行禁用，也可以通过 `EnableViewState`\
    \ 属性在控件级别进行禁用。如果你为页面禁用 `ViewState`，该决定将影响页面上包含的每个控件。每个控件都无法覆盖该设置，因此影响是全局性的，并且对于需要\
    \ `ViewState` 的控件来说可能具有破坏性。对于任何包含下级控件的控件也是如此。该设置会影响其下的所有控件。\n\n由于如果整个页面的 `ViewState`\
    \ 被禁用，就无法为某个控件启用 `ViewState`，因此你需要识别出那些不需要它的单个控件。每个页面上都包含的导航控件（可能作为母版页的一部分）就是一个理想的候选者。如果它只包含标记和一些以声明方式设置了\
    \ `NavigateUrl` 的 `HyperLink` 控件，那么即使在 `ViewState` 被禁用时，该值在回发期间也将可用。\n\n对于自定义用户控件，你也可以将其设计为在有和没有\
    \ `ViewState` 的情况下都能工作。清单 4-17 展示了如何做到这一点。\n\n**清单 4-17.** 在有和没有 `ViewState` 的情况下工作\n\
    ```\nif (! IsPostBack)\n{\n    GridView1.DataSource = GetDataSource();\n    GridView1.DataBind();\n\
    }\nelse if (! IsViewStateEnabled)\n{\n    GridView1.DataSource = GetDataSource();\n\
    \    GridView1.DataBind();\n}\n```\n\n`GridView` 的数据源在首次页面加载（非回发时）以及当 `ViewState`\
    \ 被禁用的回发时设置。这样做将在控件需要数据时加载 `GridView` 数据。然而，这种方法相当手动。最好简单地使用声明的 `ObjectDataSource`\
    \ 引用。这样做将允许 `GridView` 自动检测 `ViewState` 何时被禁用，并在需要数据时使用 `ObjectDataSource` 进行绑定。\n\
    \n## ControlState 与 ViewState\n\n因为某些数据对于控件的功能至关重要，所以即使在 `ViewState` 启用时，也需要保留对这些细节的访问权限。像\
    \ `GridView` 这样的控件足够智能，可以在有和没有 `ViewState` 的情况下工作，但当启用分页时，它们仍然需要保留与位置相关的控件当前状态。每次回发时都可以从数据库提取各列的数据，但数据库不会知道选择了\
    \ `GridView` 的第四页。这个值通过 `SelectedItem` 属性保留，该属性与 `ControlState`（`ViewState` 的一种变体）一起持久化。\n\
    \n`ControlState` 随 ASP.NET 2.0 引入。它不像 `ViewState` 那样是自动特性。你必须自己实现它，并向 `Page` 注册以持久化数据。\n\
    \n清单 4-18 展示了如何保存 `ControlState`。\n\n**清单 4-18.** SaveControlState\n```\nprotected\
    \ override object SaveControlState()\n{\n    Pair state = new Pair();\n    state.First\
    \ = base.SaveControlState();\n    state.Second = _controlStateData;\n    return\
    \ state;\n}\n```\n\n`ControlState` 和 `ViewState` 通常使用 `System.Web.UI` 命名空间中的 `Pair`\
    \ 和 `Triplet` 类型进行持久化。它们只是保存数据的简单小型数组。你也可以使用可序列化的对象数组，这意味着最好坚持使用 `string`、`int`\
    \ 和 `DateTime` 等类型。你需要使用最少的数据来持久化必要的状态。使用 `Pair` 类型是一个很好的第一层，它将基类的 `ControlState`\
    \ 存储在 `First` 属性中，将当前实例的状态存储在 `Second` 属性中。如果你有许多值需要持久化，存储在 `Second` 属性中的值可以是许多对象的数组。然后，在加载时将展开此状态的层次结构，如清单\
    \ 4-19 所示。\n\n**清单 4-19.** LoadControlState\n```\nprotected override void LoadControlState(object\
    \ savedState)\n{\n    Pair pair = savedState as Pair;\n    if (pair != null)\n\
    \    {\n        base.LoadControlState(pair.First);\n        _controlStateData\
    \ = (string)pair.Second;\n    }\n    else\n    {\n        base.LoadControlState(null);\n\
    \    }\n}\n```\n\n状态被强制转换为 `Pair` 类型，并用于使用 `First` 属性加载基类的 `ControlState`，然后使用\
    \ `Second` 属性加载当前实例的状态。定义了这些值后，需要告诉 `Page` 该控件需要 `ControlState`。这必须在 `Init` 事件期间完成，在事件生命周期的后期触发加载\
    \ `ControlState` 的事件之前，如清单 4-20 所示。\n\n**清单 4-20.** 要求 ControlState\n```\nprotected\
    \ void Page_Init(object sender, EventArgs e)\n{\n    Page.RegisterRequiresControlState(this);\n\
    }\n```\n\n前面关于 `ControlState` 的示例只是持久化了一个 `string` 变量。很多时候你不应该有太多数据需要持久化。事件排序将导致\
    \ `ControlState` 在 `Init` 和 `Load` 事件之间持久化和加载，因此当你的 `Load` 事件触发时，持久化的数据将是可用的。稍后将触发\
    \ `PreRender` 事件，大多数数据绑定控件实际上在此处加载数据。了解这些数据何时对你的页面或控件可用非常重要。\n\n考虑到可以选择将会话状态持久化在\
    \ `Session` 或 `ControlState` 中，应该注意并非所有状态都必须持久化。一些数据可以安全丢失，因为使用它们的输入字段已经在持久化数据，例如\
    \ `TextBox`。来自表单的值将始终在 `Text` 属性中设置。然而，`TextChanged` 事件现在每次回发都会触发，因为控件无法比较值是否确实发生了变化。\n\
    \n如果你的控件确实处理此事件，那么 `ViewState` 被禁用将不会影响你。\n\n其他控件，如 `ListBox` 和 `RadioButtonList`，可能是以声明方式填充的，而不是绑定到数据源。这些控件的工作方式与\
    \ `TextBox` 类似，它们可以正确地向你提供当前选定的值，并使用声明的值用所有可用选项重绘自身。同样，当选择改变时触发的事件将不像启用 `ViewState`\
    \ 时那样工作。无论哪种情况，你仍然可以获取用户设置的值并根据需要采取行动。\n\n## 创建数据绑定控件\n\n为了加深你对数据绑定控件工作原理的理解，你将学习如何创建一个将绑定到\
    \ `ObjectDataSource` 的控件。你将能够使用这个控件做比标准控件（如 `GridView` 和 `DetailsView`）更多的事情，因为你将拥有完整的源代码，可以修改并使用调试器跟踪。你还可以直接看到那些修改带来的后果。\n"
- fmt: "This new control, called the `PersonListingControl`, will take in several\
    \ fields related to people and locations and display them in one of two formats.\
    \ It will also offer optional paging support that is coordinated with the datasource,\
    \ which is defined declaratively with the `DataSourceID` property on the control.\
    \ It will also work with and without `ViewState` enabled.\n\nThis control will\
    \ implement a great deal of functionality with very rich controls such as the\
    \ `GridView`.\n\n## WHY CREATE A CUSTOM DATABOUND CONTROL?\n\nThe purpose of this\
    \ databound control is purely as a learning tool. You would be hard pressed to\
    \ come up with many scenarios where you cannot use the existing databound controls,\
    \ from the `GridView` to the `Repeater`, to serve your needs. What you cannot\
    \ do with those controls is walk them with the debugger to see exactly what is\
    \ happening internally and experiment with various tests to see how you can improve\
    \ on the process. Because this databound control also inherits from `CompositeDataBoundControl`,\
    \ it will behave like the standard databound controls.\n\nHowever, you could use\
    \ this example as a basis for creating a practical solution that is closely customized\
    \ to your application to leverage every advantage available to you. You may not\
    \ see a great deal of improved performance just by converting a user control to\
    \ a server control. With this example to get you started, you may be able to compare\
    \ the two and measure the difference.\n\n8601Ch04CMP3 8/25/07 1:07 PM Page 92\n\
    \n92\n\n# CHAPTER 4 ■ DATA BOUND CONTROLS\n\nWhen you dig into the code for this\
    \ control, you will start to see all of the facilities that are available to a\
    \ control through the use of abstract classes. Just a few years ago, creating\
    \ controls was quite difficult. In ASP.NET 2.0, it became much easier with the\
    \ `CompositeControl` and `CompositeDataBoundControl`, which are base classes that\
    \ the standard ASP.NET controls are built on. You can also use these base classes,\
    \ which automatically provide you with rich Design Time support as well as extensive\
    \ runtime functionality.\n\nBoth of these base classes include a method called\
    \ `CreateChildControls`, which takes no parameters and does not return anything.\
    \ The control hierarchy is created in this method, which is called automatically\
    \ as a part of the event life cycle. In the `CompositeControl` you could override\
    \ the behavior of this method, but in the `CompositeDataBoundControl` this method\
    \ has already been implemented. Instead, there is an abstract method by the same\
    \ name that takes a couple of parameters and has a result type. Because it is\
    \ an abstract method, it must be implemented in the inheriting class. The example\
    \ method signature is shown in Listing 4-21.\n\n### Listing 4-21. `CreateChildControls`\
    \ for `CompositeDataBoundControl`\n```\nprotected override int CreateChildControls(IEnumerable\
    \ dataSource, bool dataBinding)\n{\n    // code\n}\n```\n\nThe `CreateChildControls`\
    \ method is the core of the databound control. The overall control is created\
    \ by initializing controls and adding them to the `Controls` collection. The `Controls`\
    \ property is the accessor for this collection. When the `dataBinding` parameter\
    \ is true, the `dataSource` value should be holding onto data that can be enumerated\
    \ over while creating a collection of controls that are added to the `Controls`\
    \ collection.\n\nThis may make you wonder why the `dataBinding` parameter would\
    \ ever be false. You may also wonder why it returns an integer. When a postback\
    \ occurs, the `ViewState` must be applied to the control hierarchy constructed\
    \ when the control was first created. This means there must be the same number\
    \ of rows, but because you are not going to have access to the actual data at\
    \ this time, you have to create the skeleton of the previous hierarchy that will\
    \ match the data in `ViewState`. There must be the same number of items in the\
    \ `Controls` collection as there were before in order for the `ViewState` to be\
    \ applied successfully."
  raw: 'This new control, called the PersonListingControl, will take in several fields
    related to people and locations and display them in one of two formats. It will
    also offer optional paging support that is coordinated with the datasource, which
    is defined declaratively with the DataSourceID property on the control. It will
    also work with and without ViewState enabled.


    This control will implement a great deal of functionality with very rich controls
    such as the GridView.


    **WHY CREATE A CUSTOM DATABOUND CONTROL?**


    The purpose of this databound control is purely as a learning tool. You would
    be hard pressed to come up with many scenarios where you cannot use the existing
    databound controls, from the GridView to the Repeater, to serve your needs. What
    you cannot do with those controls is walk them with the debugger to see exactly
    what is happening internally and experiment with various tests to see how you
    can improve on the process. Because this databound control also inherits from
    CompositeDataBoundControl, it will behave like the standard databound controls.


    However, you could use this example as a basis for creating a practical solution
    that is closely customized to your application to leverage every advantage available
    to you. You may not see a great deal of improved performance just by converting
    a user control to a server control. With this example to get you started, you
    may be able to compare the two and measure the difference.


