    \    [Creation] [datetime] NOT NULL,\n    [Modified] [datetime] NOT NULL,\n  \
    \  CONSTRAINT [PK_sm_SiteMapNodes] PRIMARY KEY CLUSTERED\n    (\n        [ID]\
    \ ASC\n    )WITH (PAD_INDEX = OFF, IGNORE_DUP_KEY = OFF) ON [PRIMARY]\n) ON [PRIMARY]\n\
    GO\n\nGRANT SELECT ON sm_SiteMapNodes TO PUBLIC\nGO\n```\n\n## 存储过程脚本\n\n### 清单\
    \ A-28. `sm_GetSiteMapNodes.sql`\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'sm_GetSiteMapNodes')\nBEGIN\n    DROP Procedure\
    \ sm_GetSiteMapNodes\nEND\nGO\n\nCREATE Procedure dbo.sm_GetSiteMapNodes\nAS\n\
    SELECT c.ID, c.ParentID, c.Url, c.Title, c.Depth, p.Url AS ParentUrl\nFROM sm_SiteMapNodes\
    \ AS c\nLEFT OUTER JOIN sm_SiteMapNodes AS p ON p.ID = c.ParentID\nORDER BY c.Depth,\
    \ c.ParentID\nGO\n\nGRANT EXEC ON sm_GetSiteMapNodes TO PUBLIC\nGO\n```\n\n###\
    \ 清单 A-29. `sm_InsertSiteMapNode.sql`\n\n```sql\nIF EXISTS (SELECT * FROM sysobjects\
    \ WHERE type = 'P' AND name = 'sm_InsertSiteMapNode')\nBEGIN\n    DROP Procedure\
    \ sm_InsertSiteMapNode\nEND\nGO\n\nCREATE Procedure dbo.sm_InsertSiteMapNode\n\
    (\n    @ParentID bigint,\n    @Url nvarchar(150),\n    @Title nvarchar(50),\n\
    \    @Depth int,\n    @ID bigint OUTPUT\n)\nAS\nIF NOT EXISTS (SELECT * FROM sm_SiteMapNodes\
    \ WHERE Url = @Url)\nBEGIN\n    INSERT INTO sm_SiteMapNodes (ParentID, Url, Title,\
    \ Depth, Creation, Modified)\n    VALUES (\n        @ParentID,\n        @Url,\n\
    \        @Title,\n        @Depth,\n        GETDATE(),\n        GETDATE()\n   \
    \ )\n    SET @ID = @@IDENTITY\nEND\nELSE\nBEGIN\n    SET @ID = (SELECT ID FROM\
    \ sm_SiteMapNodes WHERE Url = @Url)\nEND\nGO\n\nGRANT EXEC ON sm_InsertSiteMapNode\
    \ TO PUBLIC\nGO\n```\n"
