    **222**


    C H A P T E R 7 ■ M A N U A L D ATA A C C E S S L AY E R


    Handling Exceptions


    In these data access methods, the call into the database is always wrapped with
    a try...catch block. I have two main reasons for including this extra layer of
    protection. First, I want to be able to handle the problem within the data access
    layer, where I know how to handle the problem. Second, I want to trap in the data
    access layer any exception that may expose information about the database to a
    user. Doing so will head off problems that could lead to a security hole. However,
    the addition of the try...catch block can reduce performance. This choice was
    made with that fact in mind. The performance penalty should be minimal.


    To avoid the performance hit of entering this try...catch block, I can still use
    caching. If the data to be requested by the database query is already in the cache,
    the call to the database can be avoided along with the exception handling. And
    if you choose to lose the try...catch block completely, you can strip it off and
    just leave the using clause for resource management of the DbCommand. You may
    find that the trade-off for performance is not significant enough to give up the
    stability and security that the close exception handling offers.


