- fmt: "User controls can be used to encapsulate at least one databound control and\
    \ the associated `ObjectDataSource`. Working with the data in this isolated container\
    \ makes it easier to handle the data and the features required of the databound\
    \ control. This container can expose properties and events to communicate with\
    \ the parent container.\n\n### Properties\n\nTo display the links, we will create\
    \ the `LinksControl` user control, which exposes a few properties that the parent\
    \ control should set to assist with binding the data. The properties used by the\
    \ `ObjectDataSource` are `StartDaysBack` and `EndDaysBack`, which hold `int` values.\
    \ These properties are shown in Listing 7-35.\n\n**Listing 7-35.** `LinksControl`\
    \ Properties\n\n```csharp\nprivate int _startDaysBack = 7;\n\n[Browsable(true),\
    \ DefaultValue(7), Category(\"Links\")]\npublic int StartDaysBack\n{\n    get\
    \ { return _startDaysBack; }\n    set { _startDaysBack = value; }\n}\n\nprivate\
    \ int _endDaysBack = 0;\n\n[Browsable(true), DefaultValue(0), Category(\"Links\"\
    )]\npublic int EndDaysBack\n{\n    get { return _endDaysBack; }\n    set { _endDaysBack\
    \ = value; }\n}\n```\n\nThese are regular properties with member variables that\
    \ hold onto the `int` values; however, the attributes decorating the properties\
    \ are specific to user controls. The `Browsable` attribute allows the property\
    \ to show up in the Properties window when the user control is selected in the\
    \ design surface. The `Category` attribute places these two properties into the\
    \ Links category so they show up together in the Properties window. Finally, the\
    \ `DefaultValue` attribute indicates the default value. This attribute causes\
    \ the value in the Properties window to show up as bold when the value does not\
    \ match the default value. These additional features assist the developer using\
    \ the user control and further encapsulate the data as it is brought into the\
    \ application.\n\nWith these properties set, the `ObjectDataSource` uses their\
    \ values for parameters defined by the `ObjectDataSource` in Listing 7-36.\n\n\
    **Listing 7-36.** `LinksControls` ObjectDataSource1\n\n```xml\n<asp:ObjectDataSource\
    \ ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    TypeName=\"Chapter07.Domain.FavoriteLinkDomain\"\n    SelectMethod=\"\
    GetRecentFavoriteLinkCollection\"\n    OnSelecting=\"ObjectDataSource1_Selecting\"\
    >\n    <SelectParameters>\n        <asp:Parameter DefaultValue=\"0\"\n       \
    \     Name=\"profileId\" Type=\"Int32\" />\n        <asp:Parameter DefaultValue=\"\
    7\"\n            Name=\"startDaysBack\" Type=\"Int32\" />\n        <asp:Parameter\
    \ DefaultValue=\"0\"\n            Name=\"endDaysBack\" Type=\"Int32\" />\n   \
    \ </SelectParameters>\n</asp:ObjectDataSource>\n```\n\nYou can see the `startDaysBack`\
    \ and `endDaysBack` parameters, which are set with the `ObjectDataSource1_Selecting`\
    \ event handler shown in Listing 7-37.\n\n**Listing 7-37.** `ObjectDataSource1_Selecting`\n\
    \n```csharp\nprotected void ObjectDataSource1_Selecting(\n    object sender, ObjectDataSourceSelectingEventArgs\
    \ e)\n{\n    e.InputParameters[\"profileId\"] = Utility.GetProfile().ProfileID;\n\
    \    e.InputParameters[\"startDaysBack\"] = StartDaysBack;\n    e.InputParameters[\"\
    endDaysBack\"] = EndDaysBack;\n}\n```\n\nAll that is left is to bind the data\
    \ to the databound control, which is a `Repeater` control shown in Listing 7-38.\n\
    \n**Listing 7-38.** `Repeater` Control\n\n```xml\n<asp:Repeater ID=\"rptLinks\"\
    \ runat=\"server\"\n    DataSourceID=\"ObjectDataSource1\"\n    OnItemDataBound=\"\
    rptLinks_ItemDataBound\">\n    <HeaderTemplate>\n        <div id=\"divLinks\"\
    >\n            <h3 class=\"Title\" id=\"h3Title\" runat=\"server\">\n        \
    \        <asp:Literal ID=\"ltTitle\" runat=\"server\"\n                    Text=\"\
    Title\"></asp:Literal>\n            </h3>\n            <ul class=\"Links\">\n\
    \    </HeaderTemplate>\n    <ItemTemplate>\n        <li>\n            <asp:HyperLink\
    \ ID=\"hl1\" runat=\"server\"\n                Text='<%# Bind(\"Title\") %>'\n\
    \                NavigateUrl='<%# Bind(\"Url\") %>'></asp:HyperLink>\n       \
    \     <span class=\"Rating\">\n                (<asp:Literal ID=\"lt1\" runat=\"\
    server\"\n                    Text='<%# Bind(\"Rating\") %>'>1</asp:Literal>)\n\
    \            </span>\n        </li>\n    </ItemTemplate>\n    <FooterTemplate>\n\
    \            </ul>\n            <br style=\"clear: left;\" />\n        </div>\n\
    \    </FooterTemplate>\n</asp:Repeater>\n```\n\nC H A P T E R 7 ■ M A N U A L\
    \ D A T A A C C E S S L A Y E R\n**228**"
