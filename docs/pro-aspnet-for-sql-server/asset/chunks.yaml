    To control paging, the PersonListingControl uses pager controls to move to the
    next and previous page using postback events. These pager controls are links created
    using LinkButton controls that have the CommandArgument value set to the targeted
    PageIndex.


    **Wiring the Pager Events**


    The pager controls fire postback events in order to set the new PageIndex value.
    Typically, attaching an event is fairly automatic. Because this is a custom databound
    control, it is necessary to initialize the control, attach the event, and then
    add it to the Controls collection so that when the postback events are fired,
    it is included. The sequence of events happens in this order: Init, PagePreLoad,
    Load, and RaisePostBackEvent. Between the Init and PagePreLoad events, the ControlState
    and ViewState are loaded. The pager controls must be initialized and added to
    the Controls collection prior to loading states and the RaisePostBackEvent. To
    ensure this is done, these controls can be initialized in CreateChildControls
    with the call to the CreatePagerControls method.


    A control only needs to be initialized once, while each time CreateChildControls
    is run the controls need to be added back to the Controls collection. The CreatePagerControls
    method is shown in Listing 4-31.


    **Listing 4-31.** *CreatePagerControls Method*


    private void CreatePagerControls()


    {


