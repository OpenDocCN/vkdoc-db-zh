- fmt: "# CHAPTER 6 ■ CACHING\n\nThe rule of thumb to follow is to create a query\
    \ that has a limited scope. It makes perfectly good sense that you cannot include\
    \ the average `ListPrice` from the `Production.Product` table in the `AdventureWorks`\
    \ database because it would require monitoring all rows in the table.\n\nYou will\
    \ also want to consider that monitoring a table with query notifications will\
    \ degrade the performance of table updates. And if the data that is being monitored\
    \ is updated frequently by multiple applications, it may be best to choose another\
    \ way to ensure data in the cache is kept current, as the notifications will negate\
    \ the value of caching the data. You may not be able to cache the frequently updated\
    \ data, but instead limit the caching to the data that does not change frequently.\
    \ Doing so will at least reduce the overall load on the system, as less data is\
    \ being pushed around.\n\nDue to all of the special cases that are not supported,\
    \ it is necessary to verify that each query is valid. If a query is not valid,\
    \ a notification will immediately fire the `OnChange` event, which will remove\
    \ the item from the cache.\n\n## Troubleshooting Query Notifications\n\nNotifications\
    \ can be a black box, much like the cache itself. Knowing what is happening and\
    \ how changes to the code base will affect the actual performance of the cache\
    \ and notifications should be carefully monitored to ensure these black boxes\
    \ are functioning as expected. There are tools that you can use to take a peek\
    \ into the black boxes to monitor activity.\n\n## Troubleshooting with the SQL\
    \ Server Profiler\n\nThe `SQL Server Profiler` for `SQL Server 2005` can be used\
    \ to see what is happening as queries are sent into the system and how the notifications\
    \ system responds by tracing the internals of the system. Unfortunately, `SQL\
    \ Express Management Studio` does not include the profiler, so you will need to\
    \ use the full version. Most of the examples so far use `SQL Express` because\
    \ I personally prefer to just run `SQL Express` on my development system and only\
    \ install `SQL Server 2005` on another system that I use as needed. I have found\
    \ that `SQL Express` does not tie up resources as much as `SQL Server 2005`. When\
    \ it comes to tracing, I simply deploy my changes to the other computer (Virtual\
    \ PC) and run a trace to get the information I need.\n\nNormally, I only need\
    \ to run traces when I cannot diagnose a problem by other means, such as watching\
    \ the monitor utility covered earlier in the chapter.\n\nTo capture information\
    \ specific to notifications, it is necessary to create a custom template in the\
    \ profile. Start the `SQL Server Profiler` and click the `New Template` icon.\
    \ Then click the `Events Selection` tab to get a listing of all of the available\
    \ events (see Figure 6-2). For notifications, you are interested in the `Broker`\
    \ and `Query Notifications` events. Click the check box in the leftmost column\
    \ to enable all of the events for those two event groupings. Return to the `General`\
    \ table and enter `Notifications` as the name of the new template and save it.\n\
    \nNow start a new trace by clicking the `New Trace` icon. Select the newly created\
    \ `Notifications` template and click the `Run` button (see Figure 6-3).\n\n![Image\
    \ 22](index-183_1.jpg)\n\n![Image 23](index-183_2.png)\n\n**Figure 6-2.** Custom\
    \ tracing template for notifications\n\n**Figure 6-3.** Running the notifications\
    \ trace\n\n![Image 24](index-184_1.png)\n\nOnce the trace has started, you can\
    \ launch your application and watch the events as they happen. Figure 6-4 shows\
    \ a trace of a functioning notification system. The broker and query notification\
    \ systems are showing the right sequence of events in the trace, and the application\
    \ is behaving as it should. If it were failing, you may see the broker starting\
    \ and ending a “conversation” immediately. This will indicate that the query notification\
    \ rejected your query.\n\nPerhaps it had an aggregate function or another SQL\
    \ feature it could not support. You can update the query you are testing by trimming\
    \ it down and restarting this sequence to identify which part of the query is\
    \ being rejected.\n\n**Figure 6-4.** Watching the trace\n\nYou do not have to\
    \ stop the trace, but it is helpful to pause it and click the `Clear` button,\
    \ which is directly to the left of the `Play` button. Click `play` before launching\
    \ your application again to resume watching the trace.\n\nOnce you have your application\
    \ working as you like, you can save the trace to a file to use as a comparison\
    \ later if you ever need to compare behavior. Simply save the trace from the `File`\
    \ menu. Later, you can open the saved trace file in the profiler alongside another\
    \ freshly created trace.\n\n## Troubleshooting via Unit Tests\n\nFor a more automated\
    \ approach to testing notifications and the caching system in general, you can\
    \ make use of unit tests. If you expect that a notification will force a dependency\
    \ change, you can check that a change in the data does raise the event to remove\
