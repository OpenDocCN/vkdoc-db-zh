  trans: "\n`PersonRow` 使用 `LiteralControl` 而非 `Label` 控件，具体原因在于它能为页面生成更少的标记代码。这减小了页面体积，并缩短了用户的页面加载时间。一个名为\
    \ `ListView` 的新控件将随 `.NET 3.5`（于 2008 年初发布）一同推出。它将允许开发者精确选择呈现给 Web 浏览器的标记，其重点在于将样式处理卸载到一个外部样式表，该样式表在每次访问网站时仅需加载一次。这种减小的总体尺寸将加速页面请求，并使你的应用程序运行更快。\n\
    \n这些 `LiteralControl` 充当容器，在稍后的 `PreRender` 事件中当 `Text` 值最终被设置时更新，如**清单 4-42**所示。\n\
    \n**第 4 章 ■ 数据绑定控件**\n\n**105**\n\n**清单 4-42.** *在 `OnPreRender` 方法中设置 `Text`\
    \ 属性*\n```\nprotected override void OnPreRender(EventArgs e)\n{\n    base.OnPreRender(e);\n\
    \    if (String.IsNullOrEmpty(CssClass))\n    {\n        CssClass = \"personRow\"\
    ;\n    }\n    ltFirstName.Text = FirstName;\n    ltLastName.Text = LastName;\n\
    \    ltBirthDate.Text = BirthDate.ToString(birthDateFormat);\n    ltCity.Text\
    \ = City;\n    ltCountry.Text = Country;\n}\n```\n\n进行这种分离是为了解决一些与 `ViewState`\
    \ 相关的问题，这将在下一节中解释。\n\n## 手动持久化 ViewState\n\n自定义控件可能不会按你希望的方式持久化状态。为了克服这个缺点，可以手动处理\
    \ `ViewState`。这是通过重写 `SaveViewState` 和 `LoadViewState` 方法来实现的。`SaveViewState`\
    \ 方法如**清单 4-43**所示。\n\n**清单 4-43.** *`SaveViewState` 方法*\n```\nprotected override\
    \ object SaveViewState()\n{\n    Pair state = new Pair();\n    object baseState\
    \ = base.SaveViewState();\n    object[] objArray = new object[5];\n    objArray[0]\
    \ = _firstName;\n    objArray[1] = _lastName;\n    objArray[2] = _birthDate;\n\
    \    objArray[3] = _city;\n    objArray[4] = _country;\n    state.First = baseState;\n\
    \    state.Second = objArray;\n    return state;\n}\n```\n\n状态的结构完全是任意的。它实际上与本章前面展示的\
    \ `ControlState` 的工作原理相同。对于少量数据，仅使用 `Pair` 或 `Triplet` 类型可能是合理的。因为这里有五个值需要序列化，我选择使用一个对象数组，并将其设置为成员变量的值。\n\
    \n接下来，状态必须在下次页面请求时重新加载到页面中。`LoadViewState` 方法如**清单 4-44**所示。\n\n**第 4 章 ■ 数据绑定控件**\n\
    \n**106**\n\n**清单 4-44.** *`LoadViewState` 方法*\n```\nprotected override void LoadViewState(object\
    \ state)\n{\n    if (state != null && state is Pair)\n    {\n        Pair pair\
    \ = (Pair)state;\n        base.LoadViewState(pair.First);\n        object[] objArray\
    \ = (object[])pair.Second;\n        if (objArray[0] != null)\n        {\n    \
    \        _firstName = (string)objArray[0];\n        }\n        if (objArray[1]\
    \ != null)\n        {\n            _lastName = (string)objArray[1];\n        }\n\
    \        if (objArray[2] != null)\n        {\n            _birthDate = (DateTime)objArray[2];\n\
    \        }\n        if (objArray[3] != null)\n        {\n            _city = (string)objArray[3];\n\
    \        }\n        if (objArray[4] != null)\n        {\n            _country\
    \ = (string)objArray[4];\n        }\n    }\n    else\n    {\n        base.LoadViewState(null);\n\
    \    }\n}\n```\n\n`LoadViewState` 方法执行与 `SaveViewState` 相反的操作，它将对象强制转换为 `Pair`\
    \ 以访问 `Second` 属性，即之前设置的对象数组。\n\n有了这些方法，五个成员变量将安全地存储到 `ViewState` 中，并在回发请求期间、`Load`\
    \ 事件之前重新加载。\n\n这引出了为什么 `LiteralControl` 的 `Text` 属性没有在 `CreateChildControls` 方法中设置，而是设置在\
    \ `OnPreRender` 方法中的原因。用于为 `PersonRow` 持久化数据的 `ViewState` 在调用 `CreateChildControls`\
    \ 时不可用。但这些值在运行 `OnPreRender` 方法时是可用的。\n\n![图片 16](img/index-114_1.png)\n\n**第\
    \ 4 章 ■ 数据绑定控件**\n\n**107**\n\n## 无 ViewState 工作\n\n为了减小页面大小，开发者可能会选择在数据绑定控件上禁用\
    \ `ViewState`。如果控件不处理这种情况，控件将无法按预期工作。它不会像首次页面加载时那样显示数据，而是显示空行。需要注意的是，这个数据绑定控件可能是页面上列出的多个控件之一，并且回发事件可能由页面上的任何控件引发。在创建这个控件时，我使用了一个测试页面，该页面有一个未附加到事件处理程序的按钮（参见图\
    \ 4-4）。它只是简单地引发一个回发。\n\n**图 4-4.** *“无操作”按钮*\n\n当我第一次关闭 `ViewState` 时，它如预期那样失效了，因为它专门使用\
    \ `ViewState` 访问器来保存数据。预计它会失效。确保这些数据保留在原地的一个选项是使用 `ControlState`，但这样做只会将问题转移到另一个地方，并且不允许使用该控件的开发者通过禁用\
    \ `ViewState` 来调整其页面大小。相反，这个问题必须在 `PersonListingControl` 中解决。\n\n`PersonListingControl`\
    \ 通过 `DataSourceID` 访问数据，因此如果需要，它可以随时检索数据。当 `ViewState` 被禁用时，必须将一组值作为 `ControlState`\
    \ 持久化。这些值包括分页器链接的 `PageIndex`、`TotalRowsCount`、`ItemCount` 和 `CommandArgument`\
    \ 值。\n\n之前你在**清单 4-22**中查看了 `PersonListingControl` 的 `CreateChildControls` 方法，该方法在\
    \ `dataBinding` 值为 `false` 时使用 `_itemCount` 成员变量重新创建正确数量的项。这是将使用 `ControlState`\
    \ 持久化的值之一。**清单 4-45**展示了 `SaveControlState` 方法。\n\n**第 4 章 ■ 数据绑定控件**\n\n**108**\n\
    \n**清单 4-45.** *`SaveControlState` 方法*\n```\nprotected override object SaveControlState()\n\
    {\n    object[] state = new object[6];\n    state[0] = base.SaveControlState();\n\
    \    state[1] = _pageIndex;\n    state[2] = _totalRowsCount;\n    state[3] = _itemCount;\n\
    \    state[4] = _previousLinkButton.CommandArgument;\n    state[5] = _nextLinkButton.CommandArgument;\n\
    \    return state;\n}\n```\n\n这组有限的值在持久化时应该非常小。你可能会注意到，通常放置 `ViewState` 的隐藏输入字段中的值并非空，即使你可能已经为整个页面禁用了\
    \ `ViewState`。它不为空的原因是 `ControlState` 与 `ViewState` 使用相同的空间，但希望占用的空间要少得多。加载 `ControlState`\
    \ 的方法如**清单 4-46**所示。\n\n**清单 4-46.** *`LoadControlState` 方法*\n```\nprotected override\
    \ void LoadControlState(object savedState)\n{\n    _pageIndex = 0;\n    object[]\
    \ objArray = savedState as object[];\n    if (objArray != null)\n    {\n     \
    \   InitializePagerControls();\n        base.LoadControlState(objArray[0]);\n\
    \        if (objArray[1] != null)\n        {\n            _pageIndex = (int) objArray[1];\n\
    \        }\n        if (objArray[2] != null)\n        {\n            _totalRowsCount\
    \ = (int)objArray[2];\n        }\n        if (objArray[3] != null)\n        {\n\
    \            _itemCount = (int)objArray[3];\n        }\n        if (objArray[4]\
    \ != null)\n        {\n            _previousLinkButton.CommandArgument = (string)objArray[4];\n\
    \        }\n        if (objArray[5] != null)\n        {\n            _nextLinkButton.CommandArgument\
    \ = (string)objArray[5];\n        }\n    }\n    else\n    {\n        base.LoadControlState(null);\n\
    \    }\n}\n```\n\n当我实现这些方法后，一切都开始像禁用 `ViewState` 之前那样正常工作。我知道我绝对没有做任何事情来持久化 `PersonRow`\
