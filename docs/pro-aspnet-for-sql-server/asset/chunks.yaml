    **DOMAINOBJECT AND GENERICS**


    Generics were used for the revised DomainObject because of a problem combining
    inheritance and reflection. A TargetException was thrown in certain scenarios
    even though the names and types for the data columns and object properties matched.
    I eventually discovered through Ayende Rahien, a lead developer on the NHibernate
    project, that he also had a similar problem with inheritance and reflection. I
    got passed the problem with the TargetException by making the DomainObject into
    a generic type that required all inheriting classes to be a DomainObject<T>, where
    T is a DomainObject. When Location inherits from DomainObject<Location>, it meets
    the generics criteria and overcomes the problem with reflection.


    **Managing Relationships**


    Back in Listing 10-7 for the Event class, you may have noticed that there are
    properties representing relationships. Specifically, the properties named Speaker,
    Sponsor, and Location are values that are not pulled in with the “get” stored
    procedures for the Event object. For the Location property, the actual value is
    left as null initially and loaded as needed. This is the


    “lazy loading” technique covered previously. When the Location property is accessed,
    the “getter” will check whether the variable is defined and if it is not, it will
    attempt to get the value from the LocationProvider, as shown in Listing 10-10.


