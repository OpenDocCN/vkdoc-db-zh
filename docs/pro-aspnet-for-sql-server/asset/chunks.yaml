    You can see that the bulk of the work is done in the LoadProviders method. The
    photoAlbumService configuration section is loaded into the PhotoAlbumSection object.
    Then the PhotoAlbumProviderCollection is prepared to hold all provider implementations.
    And then you get to the interesting line of code that uses the InstantiateProviders
    method from the ProvidersHelper class. If you have ever done much work with reflection,
