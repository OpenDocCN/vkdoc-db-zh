    SortExpression="BirthDate" />


    <asp:BoundField DataField="Country"


    HeaderText="Country" SortExpression="Country" />


    <asp:CommandField ShowDeleteButton="True" ShowEditButton="True" />


    </Columns>


    </asp:GridView>


    The editing functionality of the BoundField used by the GridView and the DetailsView
    is pretty limited. Fields will be edited with a TextBox control for strings as
    well as dates. And in the case of the City and Country fields, it will allow for
    any value. It would be an improvement to use an editor that recognized data types.
    This shortcoming will be addressed in the following section.


