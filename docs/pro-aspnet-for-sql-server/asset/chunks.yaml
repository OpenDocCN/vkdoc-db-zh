    \n**清单 6-15.** 使用缓存索引添加项\n`Cache[\"Product-129\"] = product;`\n\n**清单 6-16.**\
    \ 使用缓存索引获取项\n`Product product = Cache[\"Product-129\"] as Product;`\n\n## 遍历缓存\n\
    \n你可以使用 `Cache` 对象遍历缓存条目。出于监控目的，你可能希望按类型分别记录缓存中的项数，以便更好地微调缓存提供的性能。你也可以按特定类型清除缓存中的所有项，如清单\
    \ 6-17 所示。\n\n**清单 6-17.** 按类型清除缓存项\n\n```\nprivate static int PurgeCacheItemsByType(Type\
    \ type)\n{\n    Cache cache = HttpRuntime.Cache;\n    List<String> keys = new\
    \ List<string>();\n\n    foreach (DictionaryEntry entry in cache)\n    {\n   \
    \     if (entry.Value != null &&\n            entry.Value.GetType().Equals(type))\n\
    \        {\n            keys.Add((string)entry.Key);\n        }\n    }\n\n   \
    \ foreach (string key in keys)\n    {\n        cache.Remove(key);\n    }\n\n \
    \   return keys.Count;\n}\n```\n\n尽管清单 6-17 中的示例在某些特定情况下可能有用，但通常最好允许缓存根据插入项时提供的参数来管理数据。\n\
    \n## 参数\n\n缓存利用多个参数来控制其行为，特别是针对要添加的项。用于将项放入缓存的参数构成了一个策略，规定了应如何处理数据。有些数据可以分配更高的优先级，这将增加其在被请求时可用的可能性。但你也可能有一些数据，缓存它们仅仅是为了方便地减少数据库负载。你可以给它分配较低的优先级。下文将讨论这些参数，并解释如何使用它们来影响放入缓存的数据的处理方式。\n\
    \n### `CacheItemPriority`\n\n缓存使用优先级来决定在需要清理空间以释放内存或其他原因需要自动移除时，可以移除哪些项。表 6-1\
    \ 显示了 `CacheItemPriority` 的各种值。\n\n**表 6-1.** `CacheItemPriority` 值\n\n| 值 | 描述\
    \ |\n| :--- | :--- |\n| `AboveNormal` | 略高于正常值的值，意味着在释放内存空间等情况下被移除的可能性较低。 |\n\
    | `BelowNormal` | 略低于正常值的值，意味着在释放内存空间等情况下被移除的可能性较高。 |\n| `Default` | 与 `Normal`\
    \ 相同 |\n| `High` | 一个使关联项最不可能在其他项之前被移除的值 |\n| `Low` | 一个使关联项最有可能在其他项之前被移除的值 |\n\
    | `Normal` | 中等优先级，用作默认值 |\n| `NotRemovable` | 一个在自动清除项以释放空间时阻止缓存移除该项的值 |\n\n\
    ### `CacheItemRemovedCallback`\n\n`CacheRemovedCallback` 属性引用一个方法，该方法将在项从缓存中移除时被调用。此方法提供用于将项放入缓存的键、对象本身，以及一个\
    \ `CacheItemRemovedReason`，它指示项被移除的原因（见表 6-2）。通常，项被移除是因为超时期限已到，项正好过期，但也存在其他移除项的原因。\n\
    \n**表 6-2.** `CacheItemRemovedReason` 值\n\n| 值 | 描述 |\n| :--- | :--- |\n| `DependencyChanged`\
    \ | 与项关联的缓存依赖项已更改。 |\n| `Expired` | 超时期限已结束。 |\n| `Removed` | |\n"
- fmt: '# CACHING


    ## Underused


    The item was removed by request by either the `Remove` or `Insert` method.


    The item was removed to clear space.


    You may find that items are being removed due to the `Underused` reason, even
    though you keep placing them back into the cache. This can be frustrating when
    you know you have only a few small items in the cache and it keeps kicking them
    out. It is tempting to raise the priority or to just set the priority to `NotRemovable`.
    But if everything in the cache is set to `NotRemovable`, you lose the advantage
    that the priority gives you. Instead, you can try adjusting your cache settings.


    For the cache settings in the `Web.config` file, there are two values that will
    matter the most when it comes to removing items from the cache with the `Underused`
    reason: `privateBytesLimit` and `percentagePhysicalMemoryUsedLimit`. By default,
    there is no limit for `privateBytesLimit`, and `percentagePhysicalMemoryUsedLimit`
    will be at 89 percent of total physical memory. Knowing that 89 percent is already
    a very high value, you may want to simply add more physical memory to the server
    to improve caching. But if your server is shared by multiple applications, you
    could set the `privateBytesLimit` to a restrictive setting for some of the applications
    to free up more space for the ones that need it most.


    ![Image 21](index-169_1.png)


    Finding the right cache settings can be tricky. The cache is managed using your
    custom settings along with a set of heuristics that are hard to predict. To get
    a better idea of how your settings will perform, you can test your configuration
    settings with a simulation.


    ## Cache Simulation


    It can be hard to understand how the cache will work with the various parameters
    described in the previous section. To visualize what it is actually doing, I have
    created a simulation.


    Because the cache system can be used outside of a web application, you can create
    a simple console application that reads in data from the database and places it
    in the cache. To simulate the load of an active web server, I have set it to run
    a thread that adds several new items into the cache every few seconds. As activity
    occurs, it is reported immediately to the console with coloring to indicate the
    type of activity, such as adding an item being added to or removed from the cache.
    I set the simulation to use two variables: the time-out between new additions
    and the number of additions to make at each interval.


    The simulations I have run use the sample database from Microsoft called `AdventureWorks`,
    which is an example of a commerce database full of products and ordering data.
    (The database can be downloaded from the Microsoft website.) The simulation starts
    by reading in a list of all of the products and then placing all of the keys into
    a collection to be used for randomly adding items to the cache at each interval.


    This simulation also behaves differently based on the cache settings. When I set
    the `privateBytesLimit` to an unreasonably low value, I find that items are removed
    more frequently due to the `Underused` reason. But as I raise that value or return
    it to the default, I start to see more items reach the time-out. That causes more
    to be removed from the cache with the `Expired` reason, which is preferable to
    the `Underused` reason.


    You can rework this simulation for each of your applications as you work to find
    an optimal compromise between memory and performance. This simulation software
    reports the results at the end, along with the current cache settings and the
    duration so you can document the results (see `Figure 6-1`). This documentation
    will help justify the purchase of additional memory if that is what the test shows.
    See the code download for this chapter for the complete source code for the simulation.


    `Figure 6-1.` Cache simulation


    ## COMMON FOLDER ADDITIONS


    The cache simulation can be adjusted to scenarios matching your application. It
    can be a helpful tool to add to your Common folder in the Tools subfolder (`D:\Projects\Common\Tools\Cache
    Simulation`). The full source for the simulator can be downloaded with the sample
    code for this book.


    ## Invalidating Cached Data


    Cached data can be invalidated in multiple ways. Primarily, a time-out is set
    to force a cached item to expire after a specified point in time. Alternatively,
    you can set a sliding window for a moving expiration. After a period of inactivity,
    the sliding window will allow the cached item to be removed from the cache. The
    settings for absolute expiration and sliding expiration are mutually exclusive.
    Also in this section, I talk about cache dependencies, which you can use to invalidate
    items when dependent items change, and about manually removing items from the
    cache.


    ### Absolute Expiration


    My preference has always been to set an absolute time-out on items in the cache.
    I know that just having an item cached for ten seconds will help improve performance
    during peak load periods. But setting the time-out to five minutes or more at
    least ensures that if I were to change values in the database, the content displayed
    on the website would be updated within the five-minute period. `Listing 6-18`
    shows an example using absolution expiration.


    `Listing 6-18.` Absolute Expiration


    ```

    DataSet data = GetItem(3491);

    string cacheKey = "Item-3491";

    DateTime expiration = DateTime.Now.AddMinutes(5);

    Cache.Insert(cacheKey, data, null, expiration,

    Cache.NoSlidingExpiration, CacheItemPriority.Normal, null);

    ```


    ### Sliding Expiration


    Sliding expiration causes the item to stay in the cache as long as the item is
    accessed within the specified window. For data that does not change often but
    does get hit frequently, this is a good choice. But theoretically, there is no
    limit to how long an item could be in the cache if the item is frequently accessed.
    This could represent a problem that first arises through some unexplained behavior
    when data does not appear to change after it has been updated in the database.
    It is generally a good practice to set up a cache dependency with an item when
    sliding expiration is used. `Listing 6-19` shows an example using sliding expiration.


    `Listing 6-19.` Sliding Expiration


    ```

    DataSet data = GetItem(3491);

    string cacheKey = "Item-3491";

    TimeSpan slidingWindow = TimeSpan.FromSeconds(30);

    Cache.Insert(cacheKey, data, null, Cache.NoAbsoluteExpiration, slidingWindow,
    CacheItemPriority.Normal, null);

    ```


    ### Cache Dependency


    To quickly remove an item from the cache before the absolute expiration or when
    the period for the sliding expiration has passed, you can make use of a cache
    dependency. There are multiple implementations of cache dependencies. You could
    have an item in the cache bound to a file, and when the file is updated the cached
    item would be removed from the cache. You can also implement your own cache dependency
    by creating a class that inherits the `CacheDependency` class. A `SqlCacheDependency`
    is one of these implementations that can alert your application when data has
    changed in the database. This implementation will be covered shortly.


    ### Manual Removal'
