    C H A P T E R 6


    Caching


    **P**erhaps the best way to speed up your applications is to implement a targeted
    caching strategy. As you profile an application for performance, you will typically
    find that the time to pull data from the database is the most significant delay
    during a page request cycle. And the less data you have to pull from the database,
    the faster your application will perform. The caching mechanisms built into ASP.NET
    give you a great deal of options when it comes to caching, building on a sound
    foundation with .NET 1.1 with additional features in .NET 2.0.


    Caching is handled in ASP.NET with the Cache object, which is a part of the System.Web.


    Caching namespace. And despite the fact that it is in the System.Web assembly,
    it can easily be used in any .NET application including console and desktop applications.
    You can reference the assembly just like any other. And with an ASP.NET website,
    the Cache object can be used in a class library to create a reusable data access
    layer.


    This chapter covers the following:


    • Alternatives to caching


    • Caching options


    • Problems with caching


    • Invalidating a cache


    • Performance strategies


    The focus of caching in this chapter is on ASP.NET largely due to the stateless
    nature of HTTP. Many strategies and technologies have been created to overcome
    the stateless nature of the request-and-response cycle such as cookies and sessions,
    but the fact remains that websites work in a detached mode. In contrast, a desktop
    application can load data and keep it in memory reliably with constant access
    to it. A desktop application also has a single user, which allows the application
    to take up all resources for that single user. These factors reduce the need for
    desktop applications to use the same caching techniques employed in web applications.


    With a website, you could be servicing many sessions that hold data for each user,
    each session taking up a memory footprint. If you were to load data into each
    user’s session that takes up 3 MB of space and had 1,000 concurrent sessions,
    you would already be at 3 GB of memory. By default, a session will be kept active
    until it times out after 20 minutes of inactivity. While it not uncommon for a
    server to have 4 GB of memory or more, it is not reasonable to take up that much
    space. It would be better to allow data to drop out of memory when space is needed,
    such as when a peak traffic period occurs, as they do with websites, and suddenly
    there are 5,000 active sessions.


    **147**


    8601Ch06CMP2 8/24/07 12:13 PM Page 148


    **148**


    C H A P T E R 6 ■ C A C H I N G


    For a typical visit, users may hit a few pages and be gone in less than 10 minutes.
    Perhaps they are checking your website for some prices on a product or the status
    of an order. They want to get at it quickly and then leave. Once they do leave,
    you want to have a way to clear up the memory they were using so it is available
    for other users. This is where caching fills a real need.


    There is also the scenario where a particular set of data is used by many users
    simultaneously. Perhaps a popular product just went on sale. Each hit on the product
    page generates a series of queries to the database to display the page. The data
    does not really change all that often, but in a second you may have 20 users hit
    the page and run the same queries to load the page. This generates load on the
    database, causing more and more I/O delay as the database does a great deal of
    work in a short time frame. It also fills the network connection between the database
    server and the web server, which could be a bottleneck if the network does not
    have sufficient capacity to handle the bandwidth. If the product page or the queries
    were wrapped with a caching mechanism, even if it used just a five-second time-out,
    you could dramatically improve the performance of the page and reduce the load
    on the database server and network. This is another real issue that caching addresses.


