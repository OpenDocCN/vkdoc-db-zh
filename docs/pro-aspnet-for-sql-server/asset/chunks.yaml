    \ GridView\n\n现在介绍所有数据绑定控件的元老：`GridView` 控件。无论它列出的是你支票账户的交易记录，还是通讯录中的联系人，这个控件几乎无处不在。虽然它以表格形式列出数据，并允许你添加、编辑和删除记录，但它还允许你对数据进行排序。这使它成为一种强大且便捷的查看数据的方式，让你能以最有用的方式查看数据。清单\
