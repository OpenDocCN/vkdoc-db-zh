    **291**


    ■**Note** More and more servers, and even personal computers, are coming out with
    multiple processors.


    It is not uncommon to purchase a new server with dual or quad core processors
    that can handle a great number of concurrent requests. These great new capabilities
    should be exploited as much as possible to the benefit of your application and
    your users. You also want to make sure you are not wasting processing power with
    unnecessary tasks by offloading ancillary work to other servers whenever the work
    can be handled out of process, such as processing an order after it has been submitted.


