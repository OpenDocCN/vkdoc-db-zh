- fmt: "Now any object that inherits from the `DomainObject` can be compared against\
    \ another to determine whether they are the same object, such as the same `Event`\
    \ or `Speaker`. The primary key value is automatically one part of the comparison,\
    \ while the `Created` and `Modified` values are another part. An old copy of a\
    \ `Speaker` object will not match a new copy, whereas a `Speaker` record loaded\
    \ into two `Speaker` objects will match as they should. This feature is provided\
    \ automatically for any class built by using the conventions defined for the data\
    \ access layer used by this website. Because each table created for this website\
    \ uses the `ID`, `Created`, and `Modified` columns, the loading procedure will\
    \ populate their respective properties in the `DomainObject` instances as planned.\n\
    \nMeanwhile, the rest of the data-loading process happens as it did in Chapter\
    \ 7. The load methods can take either a `DataRow` or an `IDataReader` to populate\
    \ the `DomainObject`. Refer to the downloadable samples for this chapter for the\
    \ full code listing.\n\n## DOMAINOBJECT AND GENERICS\n\nGenerics were used for\
    \ the revised `DomainObject` because of a problem combining inheritance and reflection.\
    \ A `TargetException` was thrown in certain scenarios even though the names and\
    \ types for the data columns and object properties matched. I eventually discovered\
    \ through Ayende Rahien, a lead developer on the NHibernate project, that he also\
    \ had a similar problem with inheritance and reflection. I got passed the problem\
    \ with the `TargetException` by making the `DomainObject` into a generic type\
    \ that required all inheriting classes to be a `DomainObject<T>`, where `T` is\
    \ a `DomainObject`. When `Location` inherits from `DomainObject<Location>`, it\
    \ meets the generics criteria and overcomes the problem with reflection.\n\n##\
    \ Managing Relationships\n\nBack in Listing 10-7 for the `Event` class, you may\
    \ have noticed that there are properties representing relationships. Specifically,\
    \ the properties named `Speaker`, `Sponsor`, and `Location` are values that are\
    \ not pulled in with the “get” stored procedures for the `Event` object. For the\
    \ `Location` property, the actual value is left as null initially and loaded as\
    \ needed. This is the “lazy loading” technique covered previously. When the `Location`\
    \ property is accessed, the “getter” will check whether the variable is defined\
    \ and if it is not, it will attempt to get the value from the `LocationProvider`,\
    \ as shown in Listing 10-10.\n\n**Listing 10-10.** *Getter for Location Property*\n\
    ```csharp\nprivate Location _location;\n\n[DataMember(Name = \"Location\",Order\
    \ = 1)]\npublic Location Location\n{\n    get\n    {\n        if (_location ==\
    \ null)\n        {\n            // lazy load the location\n            EventSection\
    \ section = new EventSection();\n            _location = LocationManager.GetProvider(section.LocationProvider).GetLocation(this);\n\
    \        }\n        return _location;\n    }\n    set { _location = value; }\n\
    }\n```\n\nWhen the `Location` property is used, the value is loaded by using the\
    \ `LocationManager` class, but instead of just using the default provider to get\
    \ a location, the `EventSection` class is used to determine the name of the provider\
    \ to use. Later we will get into how custom configurations assist with the relationships\
    \ between objects managed by different providers.\n\n## Using Locations\n\nAnother\
    \ feature of the `EventProvider` that is used to manage relationships is the `ILocationConsumer`\
    \ interface shown in Listing 10-11.\n\n**Listing 10-11.** *ILocationConsumer Interface*\n\
    ```csharp\nnamespace DotnetUserGroup.DataAccess.Locations\n{\n    public interface\
    \ ILocationConsumer\n    {\n        bool IsUsingLocation(Location location);\n\
    \    }\n}\n```\n\nThe `ILocationConsumer` interface is used to protect a `Location`\
    \ from being deleted when it is still being used. A `Sponsor` can be associated\
    \ with a `Location`, and so can an `Event`. If a `Sponsor` or an `Event` is using\
    \ a `Location`, it should not be deleted. Each provider that has a relationship\
    \ with locations implements the `ILocationConsumer` interface."
