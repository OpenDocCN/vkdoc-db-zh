    \            domain = null;\n        }\n\n        private decimal GetPrice(DataSet\
    \ ds)\n        {\n            // verify there is data\n            Assert.IsTrue(ds.Tables.Count\
    \ > 0, \"DataSet must be populated\");\n            Assert.IsNotNull(ds.Tables[0],\
    \ \"Table must be populated\");\n            Assert.IsTrue(ds.Tables[0].Rows.Count\
    \ > 0, \"Row must be populated\");\n            DataRow row = ds.Tables[0].Rows[0];\n\
    \            decimal price = (decimal)row[\"ListPrice\"];\n            return\
    \ price;\n        }\n        #endregion\n\n        // Test Methods //\n    }\n\
    }\n```\n\nYou can see the `SetUp` method creates the domain object and gets the\
    \ original price. The `TearDown` method restores the price using the original\
