  trans: "\n用户控件可用于封装至少一个数据绑定控件及其关联的 `ObjectDataSource`。在此独立容器中处理数据，使得处理数据及数据绑定控件所需的功能更为容易。此容器可公开属性和事件，以便与父容器进行通信。\n\
    \n### 属性\n\n为了显示链接，我们将创建 `LinksControl` 用户控件，该控件公开了一些属性，父控件应设置这些属性以协助绑定数据。`ObjectDataSource`\
    \ 使用的属性是 `StartDaysBack` 和 `EndDaysBack`，它们存储 `int` 值。这些属性如清单 7-35 所示。\n\n**清单\
    \ 7-35.** `LinksControl` 属性\n\n```csharp\nprivate int _startDaysBack = 7;\n\n\
    [Browsable(true), DefaultValue(7), Category(\"Links\")]\npublic int StartDaysBack\n\
    {\n    get { return _startDaysBack; }\n    set { _startDaysBack = value; }\n}\n\
    \nprivate int _endDaysBack = 0;\n\n[Browsable(true), DefaultValue(0), Category(\"\
    Links\")]\npublic int EndDaysBack\n{\n    get { return _endDaysBack; }\n    set\
    \ { _endDaysBack = value; }\n}\n```\n\n这些是常规属性，其成员变量用于存储 `int` 值；然而，装饰这些属性的特性是用户控件特有的。`Browsable`\
    \ 特性使得在设计界面上选中用户控件时，该属性会显示在属性窗口中。`Category` 特性将这两个属性归入“链接”类别，使它们一起显示在属性窗口中。最后，`DefaultValue`\
    \ 特性指定了默认值。当属性值与默认值不匹配时，此特性会使属性窗口中的值以粗体显示。这些额外特性有助于使用该用户控件的开发人员，并在将数据引入应用程序时进一步封装数据。\n\
    \n设置这些属性后，`ObjectDataSource` 会使用它们的值作为清单 7-36 中由 `ObjectDataSource` 定义的参数。\n\n\
    **清单 7-36.** `LinksControls` ObjectDataSource1\n\n```xml\n<asp:ObjectDataSource\
    \ ID=\"ObjectDataSource1\" runat=\"server\"\n    OldValuesParameterFormatString=\"\
    original_{0}\"\n    TypeName=\"Chapter07.Domain.FavoriteLinkDomain\"\n    SelectMethod=\"\
    GetRecentFavoriteLinkCollection\"\n    OnSelecting=\"ObjectDataSource1_Selecting\"\
    >\n    <SelectParameters>\n        <asp:Parameter DefaultValue=\"0\"\n       \
    \     Name=\"profileId\" Type=\"Int32\" />\n        <asp:Parameter DefaultValue=\"\
    7\"\n            Name=\"startDaysBack\" Type=\"Int32\" />\n        <asp:Parameter\
    \ DefaultValue=\"0\"\n            Name=\"endDaysBack\" Type=\"Int32\" />\n   \
    \ </SelectParameters>\n</asp:ObjectDataSource>\n```\n\n可以看到 `startDaysBack` 和\
    \ `endDaysBack` 参数，它们是通过清单 7-37 所示的 `ObjectDataSource1_Selecting` 事件处理程序设置的。\n\
    \n**清单 7-37.** `ObjectDataSource1_Selecting`\n\n```csharp\nprotected void ObjectDataSource1_Selecting(\n\
    \    object sender, ObjectDataSourceSelectingEventArgs e)\n{\n    e.InputParameters[\"\
    profileId\"] = Utility.GetProfile().ProfileID;\n    e.InputParameters[\"startDaysBack\"\
    ] = StartDaysBack;\n    e.InputParameters[\"endDaysBack\"] = EndDaysBack;\n}\n\
    ```\n\n剩下要做的就是将数据绑定到数据绑定控件，即清单 7-38 所示的 `Repeater` 控件。\n\n**清单 7-38.** `Repeater`\
    \ 控件\n\n```xml\n<asp:Repeater ID=\"rptLinks\" runat=\"server\"\n    DataSourceID=\"\
    ObjectDataSource1\"\n    OnItemDataBound=\"rptLinks_ItemDataBound\">\n    <HeaderTemplate>\n\
    \        <div id=\"divLinks\">\n            <h3 class=\"Title\" id=\"h3Title\"\
    \ runat=\"server\">\n                <asp:Literal ID=\"ltTitle\" runat=\"server\"\
    \n                    Text=\"Title\"></asp:Literal>\n            </h3>\n     \
    \       <ul class=\"Links\">\n    </HeaderTemplate>\n    <ItemTemplate>\n    \
    \    <li>\n            <asp:HyperLink ID=\"hl1\" runat=\"server\"\n          \
    \      Text='<%# Bind(\"Title\") %>'\n                NavigateUrl='<%# Bind(\"\
    Url\") %>'></asp:HyperLink>\n            <span class=\"Rating\">\n           \
    \     (<asp:Literal ID=\"lt1\" runat=\"server\"\n                    Text='<%#\
    \ Bind(\"Rating\") %>'>1</asp:Literal>)\n            </span>\n        </li>\n\
    \    </ItemTemplate>\n    <FooterTemplate>\n            </ul>\n            <br\
    \ style=\"clear: left;\" />\n        </div>\n    </FooterTemplate>\n</asp:Repeater>\n\
    ```\n\n第 7 章 ■ 手动数据访问层\n**228**\n"
- fmt: "By breaking up the content of the website into smaller user controls and controlling\
    \ them through properties, you get a great deal of flexibility. The values from\
    \ these properties can be relayed to the data access layer, which allows you to\
    \ use the same user control multiple times while getting different results when\
    \ they are displayed. Using user controls in this way essentially parameterizes\
    \ their functionality and lines them up with the data access layer in a way that\
    \ is much easier to manage.\n\n## Events\n\nEvents can also be used by a user\
    \ control to relay information back to the parent control when a subscribed event\
    \ occurs. Another user control called `TagCloudControl` displays a tag cloud with\
    \ a set of links. When a user clicks on a link in the `TagCloudControl`, it raises\
    \ an event that the parent page uses to change the content displayed by another\
    \ user control called `TaggedLinksControl`. Using events in this way further encapsulates\
    \ the internals of the user control, making it more reusable.\n\nThe `TagCloudControl`\
    \ declares one event named `TagSelected`, which is raised whenever one of the\
    \ links in the tag cloud is clicked. The event and the method to raise the event\
    \ are shown in Listing 7-39.\n\n`Listing 7-39.` `TagSelected Event`\n\n```csharp\n\
    public event EventHandler<TagCloudEventArgs> TagSelected;\n\n[Category(\"Tags\"\
    )]\nprotected virtual void OnTagSelected(TagCloudEventArgs e)\n{\n    if (TagSelected\
    \ != null)\n    {\n        TagSelected(this, e);\n    }\n}\n```\n\nThe `EventHandler`\
    \ uses a control `EventArgs` implementation named `TagCloudEventArgs`, which includes\
    \ a property named `Token` that is made available to the event subscriber. When\
    \ the event is raised, this value can be set as the `Token` property in the `TaggedLinksControl`.\
    \ The `TaggedLinksControl` works much like the `LinksControl` but it uses the\
    \ `Token` property to get the list of links using the `Token` property.\n\n**Note**\
    \ User controls can be declared in each page that uses them, but they can also\
    \ be declared in the `pages/controls` section of the `Web.config` file so that\
    \ the user controls can be referenced with a consistent tag prefix throughout\
    \ the website. Normally, when you drag a user control onto the design surface,\
    \ the generated declaration sets the tag prefix as `uc1` or `uc2`, etc. Later,\
    \ if a control is converted from a user control to a server control, there will\
    \ be a single place in the website to adjust the reference.\n\n## Creating the\
    \ Pages\n\nCombining the user controls together on a page and wiring up their\
    \ properties and events may now be the easiest step. With a master page already\
    \ created, this page will just hold onto the user controls to list the links and\
    \ the tag cloud. We can create a new page called `Home.aspx` and drag the user\
    \ controls onto the design surface. The end result will look like Listing 7-40.\n\
    \n`Listing 7-40.` `Home.aspx`\n\n```aspx\n<%@ Page Language=\"C#\" MasterPageFile=\"\
    ~/FavoriteLink.master\"\n    AutoEventWireup=\"true\"\n    CodeFile=\"Home.aspx.cs\"\
    \n    Inherits=\"Home\"\n    Title=\"Favorite Link: Home\" %>\n\n<asp:Content\
    \ ID=\"Content1\" runat=\"server\"\n    ContentPlaceHolderID=\"MainContentPlaceHolder\"\
    >\n    <div id=\"HomeContent\">\n        <div class=\"tagCloud\" style=\"float:\
    \ right; width: 150px;\">\n            <h3 class=\"Title\">Tags</h3>\n       \
    \     <fl:TagCloudControl ID=\"tagCloud\" runat=\"server\"\n                OnTagSelected=\"\
    tagCloud_OnTagSelected\" />\n        </div>\n        <div id=\"Links\">\n    \
    \        <fl:TaggedLinksControl\n                ID=\"taggedLinks\" runat=\"server\"\
    \n                Visible=\"false\" />\n            <fl:LinksControl\n       \
    \         ID=\"lcToday\" runat=\"server\"\n                Title=\"Today\"\n \
    \               EndDaysBack=\"0\"\n                StartDaysBack=\"1\"\n     \
    \           TitleVisible=\"true\" />\n            <fl:LinksControl\n         \
    \       ID=\"lcThisWeek\" runat=\"server\"\n                Title=\"This Week\"\
    \n                EndDaysBack=\"1\"\n                StartDaysBack=\"7\"\n   \
    \             TitleVisible=\"true\" />\n            <fl:LinksControl\n       \
    \         ID=\"lcThisMonth\" runat=\"server\"\n                Title=\"This Month\"\
    \n                EndDaysBack=\"8\"\n                StartDaysBack=\"31\"\n  \
    \              TitleVisible=\"true\" />\n        </div>\n    </div>\n</asp:Content>\n\
    ```\n\nEach of the user controls does not declare the user control references\
    \ at the top of the page because they have been predeclared in the `Web.config`\
    \ file in the `pages` section, shown in Listing 7-41.\n\n`Listing 7-41.` `User\
    \ Control Configuration`\n\n```xml\n<pages>\n    <controls>\n        <add tagPrefix=\"\
    fl\" tagName=\"HeaderNavigation\"\n            src=\"~/Controls/HeaderNavigation.ascx\"\
    />\n        <add tagPrefix=\"fl\" tagName=\"LinksControl\"\n            src=\"\
    ~/Controls/LinksControl.ascx\"/>\n        <add tagPrefix=\"fl\" tagName=\"LoginControl\"\
    \n            src=\"~/Controls/LoginControl.ascx\"/>\n        <add tagPrefix=\"\
    fl\" tagName=\"TagCloudControl\"\n            src=\"~/Controls/TagCloudControl.ascx\"\
    />\n        <add tagPrefix=\"fl\" tagName=\"TaggedLinksControl\"\n           \
    \ src=\"~/Controls/TaggedLinksControl.ascx\"/>\n    </controls>\n</pages>\n```\n\
    \nEach user control is given `fl` as the `tagPrefix`, which you can see in `Home.aspx`.\
    \ This detail cleans up the page a bit and creates a consistent way of declaring\
    \ each user control.\n\nThis main page lists the `LinksControl` three separate\
    \ times to show links that were added today, this week, and this month. The `TagCloudControl`\
    \ lists the tags associated with links added by the user. When the links are clicked,\
    \ the `Token` property is captured by the `tagCloud_OnTagSelected` event handler,\
    \ as shown in Listing 7-42.\n\n`Listing 7-42.` `tagCloud_OnTagSelected`\n\n```csharp\n\
    protected void tagCloud_OnTagSelected(object sender, TagCloudEventArgs e)\n{\n\
    \    lcToday.Visible = false;\n    lcThisWeek.Visible = false;\n    lcThisMonth.Visible\
    \ = false;\n    taggedLinks.Visible = true;\n    taggedLinks.Title = \"Tagged\
    \ with \" + e.Token;\n    taggedLinks.Token = e.Token;\n}\n```\n\nThese few lines\
    \ of code are all that is needed to instrument all of the user controls on the\
    \ page. All of their independent details are fully encapsulated and managed internally.\
    \ Enhancing the performance of this website can now be done at various levels\
    \ within the layers of the architecture. Some adjustments could be done with the\
    \ tables and coordinated with the necessary changes to the stored procedures.\
    \ Other adjustments could be done in the data access layer by introducing caching.\
    \ And at the application layer, the user controls and pages could use additional\
    \ techniques such as data or output caching. Each layer is fully independent and\
    \ encapsulated so that the next layer will not need modification when optimizations\
    \ are implemented.\n\n## Summary\n\nThis chapter covered the steps and choices\
    \ to consider when manually creating a data access layer. You looked at how manually\
    \ building this layer requires extra work in order to leverage the performance\
    \ enhancements it offers. Finally, you connected the data access layer to a functional\
    \ website by using the `ObjectDataSource` and user controls in a way that minimizes\
    \ maintenance while leaving plenty of places to optimize performance without requiring\
    \ major rework of the application.\n\n# Generated Data Access Layer\n\nNot many\
    \ developers like to touch the data access layer. Most developers prefer to stick\
    \ to their favorite languages, such as C#, and avoid the languages they use rarely,\
    \ such as T-SQL.\n\nThis is understandable. A developer builds up a level of expertise\
    \ and confidence with a language the more he uses it. So if you are lucky enough\
    \ to have a skilled database developer on your team with deep knowledge of T-SQL,\
    \ you surely leverage his skills as much as possible.\n\nHowever, these types\
    \ of programmers are a rare breed. To cope with the situation, you can seek out\
    \ ways to generate the data access layer and greatly reduce the time you will\
    \ need to spend away from the language of choice, C#.\n\nThis chapter covers the\
    \ following:\n*   Code generation\n*   SubSonic\n*   Blinq"
