    C H A P T E R 1 ■ G E T T I N G S TA RT E D


    **MIXED-MODE AUTHENTICATION**


    With SQL Server, you can choose to allow for Windows authentication, SQL Server
    authentication, or both.


    This choice is presented to you when SQL Server is installed. SQL Server accounts
    are useful when the database is hosted on a remote server without access to the
    Windows domain. Windows authentication is helpful during development, when your
    users and the database server are running on the domain. For development and staging
    databases, you may grant different levels of access to groups such as database
    developers and web developers and then place people in those groups accordingly.
    For the production databases, you use a user account that is not shared with the
    entire development team so that only those limited users who should have access,
    do. The applications working with these databases just need the connection string
    updated to change authentication modes.


    In an ASP.NET application, datasources are configured in the Web.config file in
    a section named connectionStrings. Each connection string is added to this section
    with a name, connection string, and provider name—for example:


    <connectionStrings>


    <add name="SampleDatabase" connectionString="..."


    providerName="System.Data.SqlClient" />


    </connectionStrings>


    In a team environment, you’ll likely use a source-control system. You’ll place
    your Web.config file into source control so that each member of the team has the
    same configuration. However, sharing a source-controlled configuration file can
    present some problems.


    For starters, a common set of authentication values may be used. Using a Windows
    user account (for example, of one of the team members) exposes the password to
    the whole team—which is bad practice, especially if the password policy requires
    routine updates.'
