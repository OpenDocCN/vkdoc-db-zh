    cause the performance of the database to drop dramatically. This can be caused
    by the fact that the query joins across multiple tables that happen to be located
    in different parts of the physical disk. SQL Server 2005 will attempt to com-pensate
    by keeping recently used data and indexes in memory, but these desired automatic
    optimizations are not guaranteed. It is best to save the results of those queries
    on the web server to allow the database to service other queries.


    **Alternatives to Caching**


    Using the ASP.NET cache is not always the right solution to boost performance.
    The more data you place in the cache, the more complex it can become. And more
    data in the cache may push out items you want to have in there to enhance performance.
    Some data can be stored by other means that require less overhead, such as using
    application state, Session, or even ViewState.


    While the techniques described in the following text are sometimes appropriate
    solutions, they do also have some problems. Either they hold onto objects without
    an automatic way to release them when memory is in short supply or they do not
    hold onto the data long enough to be useful. Even so, you can combine the techniques
    with each other and with caching to provide a more comprehensive solution that
    gives you all of the benefits with a minimal downside.


