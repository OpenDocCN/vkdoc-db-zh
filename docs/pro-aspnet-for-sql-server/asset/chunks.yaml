    **SQL Cache Dependencies**


    Data can be automatically removed from the cache when the data in the database
    changes by attaching dependencies to the cached items. A dependency will override
    the expiration or sliding window for the cached items immediately once a database
    change has been detected.


    **Using the SqlDependency and SqlCacheDependency**


    There are a couple of ways to tie a dependency to a cached item to inform you
    when the data has changed. The SqlDependency is the baseline mechanism that communicates
    with SQL Server to monitor the database for changes. (Note that SqlDependency
    is not the same as Sql**Cache**Dependency.) Table 6-3 shows the members of the
