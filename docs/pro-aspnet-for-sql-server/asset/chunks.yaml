    # CHAPTER 5 ■ SQL PROVIDERS


    ## Using the Provider-Powered ASP.NET Controls


    Now you have configured your website with all the membership features your users
    will need to log in to your website. The `Login` control handles that easily.
    This process is rich with security, built on years of legacy technologies. Although
    the `Membership` API and provider model are new to ASP.NET, the mechanisms to
    authenticate and maintain a session with a user has been with ASP.NET from the
    beginning. When the user logs in to your website successfully, she is given a
    token that is stored with her web browser as a cookie. This token acts as a key
    that gets her into the protected and customized areas of your website.


    The authentication token is an encrypted `FormsAuthenticationTicket`, which holds
    the name of the user, the session expiration time, and other data including custom
    user data.


    In the following scenario, I will show how this custom user data can be used to
    improve the security of an authenticated session and to demonstrate the flexibility
    of the authentication systems in ASP.NET.


    For this example scenario, you are working with a banking website and you are
    checking on your balance while you are at work. You get called away briefly and
    do not think to lock your computer. A dishonest coworker sneaks onto your computer
    and copies the cookie used to authenticate your session with the bank. This cookie
    at least is not a plain-text value with your account number, which would allow
    access your account anytime. Instead it is an encrypted form of `FormsAuthenticationTicket`,
    which holds the expiration time and the date the token was issued. That means
    this dishonest coworker has a limited time to use that cookie.


    What the coworker can do with a sliding expiration is place the cookie into a
    browser, which will keep updating the expiration time. What it does not change
    is the last login date, which is held on the server. If your banking website is
    really secure, the site may check your last login time prior to allowing you to
    do anything really important, such as scheduling a pay-ment or transferring money
    to another person’s account. Before the website allows you to do that, it could
    check that you had logged in within a few minutes of the transaction and request
    that you provide your password if you have not. You can log in even if you already
    are authenticated, and doing so will reset the last login time. This requirement
    will stop your coworker from completing those sorts of actions because he has
    only the cookie, which allows basic access to your account. But all it would take
    to grant the coworker access to make that transaction would be to wait for you
    to return to your computer and log in to the banking website again. What would
    be helpful would be to store your IP address in the token so the website can verify
    that you logged in recently and from that computer. This is where you will use
    the custom user data.


    The login process can be adjusted to insert the remote address into the `FormsAuthenticationTicket`
    as user data. Simply drop the `Login` control onto the design surface of a Web
    Form. Then create a handler for the `Authenticate` event. The code in Listing
    5-15 handles that event and inserts the remote address of the user into the ticket,
    which can be used to verify the user’s location each time that user returns to
    the website.'
