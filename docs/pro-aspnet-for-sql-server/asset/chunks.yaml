    \ 10-15 中显示的 `SpeakerSection` 类继承自该类。这个抽象类的定义见代码清单 10-20。\n\n## 代码清单 10-20. ProviderConfigurationSection.cs\n\
    \n```csharp\nnamespace DotnetUserGroup.DataAccess.Common\n{\n    public abstract\
