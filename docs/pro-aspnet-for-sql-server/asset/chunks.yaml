    **USE A SHARED MACHINE KEY FOR WEB FARMS**


    When placing multiple web servers into a farm to distribute the load for a high-traffic
    website, it is necessary to use the machine key setting, which is typically unique
    to a server. This configuration setting includes the validation and decryption
    keys, which are used for hashing and decryption. The forms authentication token
    uses these values, and if the machine key is not identical across the servers,
    you will experience authentication problems as user sessions hop from server to
    server. This can be partially avoided with sticky sessions, but after a user leaves
    for an extended period, he may lose his sticky session with the load balancer
    and hit a different server with different machine key values that will be incompatible.


