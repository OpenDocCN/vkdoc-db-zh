- fmt: '# CHAPTER 5 ■ SQL PROVIDERS


    ## Listing 5-25. sm_InsertSiteMapNode.sql


    ```sql

    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''P''

    AND name = ''sm_RepopulateSiteMapNodes'')

    BEGIN

    DROP Procedure sm_RepopulateSiteMapNodes

    END

    GO


    CREATE Procedure dbo.sm_RepopulateSiteMapNodes

    AS

    SET NOCOUNT ON


    DECLARE @RootNodeID bigint

    DECLARE @AlbumsNodeID bigint


    -- reset the table

    --TRUNCATE TABLE sm_SiteMapNodes

    --DBCC CHECKIDENT (sm_SiteMapNodes, RESEED, 0)

    DELETE FROM sm_SiteMapNodes


    EXEC sm_InsertSiteMapNode -1, ''Default.aspx'', ''Home'', 0, @RootNodeID OUTPUT

    EXEC sm_InsertSiteMapNode @RootNodeID, ''Albums/Default.aspx'', ''Albums'', 1,
    @AlbumsNodeID OUTPUT


    DECLARE @Albums TABLE

    (

    ID int IDENTITY,

    AlbumID bigint,

    [Name] varchar(50),

    UserName nvarchar(256)

    )


    INSERT INTO @Albums (AlbumID, [Name], UserName)

    SELECT ID, [Name], UserName

    FROM pap_Albums

    WHERE IsActive = 1


    DECLARE @CurID int

    DECLARE @MaxID int

    DECLARE @AlbumID bigint

    DECLARE @AlbumNodeID bigint

    DECLARE @Name varchar(50)

    DECLARE @UserName nvarchar(256)

    DECLARE @Url nvarchar(150)


    SET @MaxID = ( SELECT MAX(ID) FROM @Albums )

    SET @CurID = 1


    WHILE (@CurID <= @MaxID)

    BEGIN

    SET @AlbumID = ( SELECT AlbumID FROM @Albums WHERE ID = @CurID )

    SET @Name = ( SELECT Name FROM @Albums WHERE ID = @CurID )

    SET @UserName = ( SELECT UserName FROM @Albums WHERE ID = @CurID )

    SET @Url = ( ''Albums/Album.aspx?AlbumID='' + CONVERT(varchar(10), @AlbumID) +
    ''&UserName='' + @UserName )


    -- PRINT ''Name = '' + @Name

    -- PRINT ''UserName = '' + @UserName

    -- PRINT ''Url = '' + @Url


    EXEC sm_InsertSiteMapNode @AlbumsNodeID, @Url, @Name, 2, @AlbumNodeID OUTPUT


    SET @CurID = @CurID + 1

    END


    SET NOCOUNT OFF

    GO


    GRANT EXEC ON sm_RepopulateSiteMapNodes TO PUBLIC

    GO

    ```


    我 have a few lines commented out so they are not included when the stored procedure
    is used normally, but when I need to make updates to it, I find it is helpful
    to re-enable those lines. As for the `TRUNCATE` command that is commented out,
    that requires increased privileges that you may not allow on a production system,
    so I have it set to use the `DELETE` command instead. The truncate alternative
    is useful because when it runs, it does not bother generating audit logs, which
    can save you time and disk space.


    As the `@CurID` is used to loop over the table variable, the `@Url` is assembled
    and the new node is inserted into the `sm_SiteMapNodes` table by using `sm_InsertSiteMapNode`.
    The script to create this stored procedure is shown in Listing 5-25.


    ## Listing 5-25. sm_InsertSiteMapNode.sql


    ```sql

    IF EXISTS (SELECT * FROM sysobjects WHERE type = ''P''

    AND name = ''sm_InsertSiteMapNode'')

    BEGIN

    DROP Procedure sm_InsertSiteMapNode

    END

    GO


    CREATE Procedure dbo.sm_InsertSiteMapNode

    (

    @ParentID bigint,

    @Url nvarchar(150),

    @Title nvarchar(50),

    @Depth int,

    @ID bigint OUTPUT

    )

    AS

    IF NOT EXISTS (SELECT * FROM sm_SiteMapNodes WHERE Url = @Url)

    BEGIN

    INSERT INTO sm_SiteMapNodes (ParentID, Url, Title, Depth, Creation, Modified)

    VALUES (

    @ParentID,

    @Url,

    @Title,

    @Depth,

    GETDATE(),

    GETDATE()

    )


    SET @ID = @@IDENTITY

    END

    ELSE

    BEGIN

    SET @ID = ( SELECT ID FROM sm_SiteMapNodes WHERE Url = @Url )

    END

    GO


    GRANT EXEC ON sm_InsertSiteMapNode TO PUBLIC

    GO

    ```


