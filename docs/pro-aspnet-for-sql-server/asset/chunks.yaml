- fmt: "# CHAPTER 8: GENERATED DATA ACCESS LAYER\n\nOpening up a class for extensibility\
    \ can be done with partial classes. Such a feature is very helpful when much of\
    \ the code is generated. The generated files can remain separate from the manually\
    \ edited files so that your changes are not lost when you generate updates to\
    \ the code.\n\nEach of the classes that the `SubSonic` generator creates is marked\
    \ as a partial class. If you want to add functionality to the generated classes,\
    \ you can create a new partial class with additional methods and properties. Assume\
    \ you have a table called `Person` that has a couple of fields named `FirstName`\
    \ and `LastName`. When the `Person` class is generated with `SubSonic`, you will\
    \ get properties for these table columns. You could create a partial class to\
    \ add a property called `FullName` as shown in **Listing 8-17**.\n\n**Listing\
    \ 8-17.** `FullName` Property\n\n```csharp\nnamespace Chapter08.SubSonicDAL\n\
    {\n    public partial class Person : ActiveRecord<Person>\n    {\n        ///\
    \ <summary>\n        /// FirstName and LastName combined\n        /// </summary>\n\
    \        public string FullName {\n            get {\n                return this.FirstName\
    \ + \" \" + this.LastName;\n            }\n        }\n    }\n}\n```\n\nWith the\
    \ `FirstName` and `LastName` properties already defined, you can access them as\
    \ a part of the same class despite the fact that they are defined in another source\
    \ file. You can also add a method to provide behavior that `SubSonic` does not\
    \ provide natively. One standard method is the `FetchByID` method, which takes\
    \ the primary key of the target table. It simply queries the database for the\
    \ single record. The `FetchByID` method is defined in the `PersonController` class.\n\
    \nWhat you could do is add caching behavior to the class with a nearly identical\
    \ method signature. Instead of just passing in the `ID` parameter, you will add\
    \ a Boolean value called `cached`. When it is true, it will use caching as shown\
    \ in **Listing 8-18**.\n\n**Listing 8-18.** `FetchByID` with Caching\n\n```csharp\n\
    namespace Chapter08.SubSonicDAL\n{\n    public partial class PersonController\n\
    \    {\n        public PersonCollection FetchByID(object ID, bool cached)\n  \
    \      {\n            if (!cached)\n            {\n                return FetchByID(ID);\n\
    \            }\n            string cacheKey = (typeof(Person)).ToString() + \"\
    -\" + ID;\n            Cache cache = HttpRuntime.Cache;\n            if (cache[cacheKey]\
    \ != null) {\n                return cache[cacheKey] as PersonCollection;\n  \
    \          }\n            PersonCollection coll = new PersonCollection().Where(Person.Columns.ID,\
    \ ID).Load();\n            cache.Insert(cacheKey, coll, null,\n              \
    \  DateTime.Now.AddMinutes(5), TimeSpan.Zero);\n            return coll;\n   \
    \     }\n    }\n}\n```\n\nCaching the `Person` record in this way may eliminate\
    \ a bottleneck in your application, but you will want to also ensure that as a\
    \ `Person` record is updated, it is removed from the cache. The `ClearCachedItem`\
    \ in **Listing 8-19** takes care of removing the item from the cache.\n\n**Listing\
    \ 8-19.** `ClearCachedItem` Method\n\n```csharp\npublic void ClearCachedItem(object\
    \ ID)\n{\n    string cacheKey = (typeof(Person)).ToString() + \"-\" + ID;\n  \
    \  Cache cache = HttpRuntime.Cache;\n    cache.Remove(cacheKey);\n}\n```\n\nEach\
    \ time you call into the `Insert` and `Update` methods, you can ensure the `ClearCachedItem`\
    \ method is called. Adding functionality in this way is a great way to optimize\
    \ the application using this data access layer.\n\n## Query Tool\n\n`SubSonic`\
    \ uses a built-in query tool that generates the SQL used to get, save, and delete\
    \ data in the database. This query tool was developed long before the `LINQ` technology\
    \ was released as a Community Technology Preview (CTP), yet it has a significant\
    \ amount in common.\n\nThe query tool uses a class named `Query`. It is constructed\
    \ through a series of calls from many methods that refine the query. The goal\
    \ is to allow the `C#` code to look much like a query written with SQL. **Listing\
    \ 8-20** shows an example method that loads all `Person` records by `LocationID`.\n\
    \n**Listing 8-20.** `FetchPersonsByLocationID` Method\n\n```csharp\npublic PersonCollection\
    \ FetchPersonsByLocationID(object LocationID)\n{\n    return new PersonCollection().\n\
    \        Where(Person.Columns.LocationID, LocationID).\n        OrderByAsc(Person.Columns.LastName).Load();\n\
    }\n```\n\nThere are a couple of important details about the `FetchPersonsByLocationID`\
    \ method. The first detail is that the method is completely type safe. A strong\
    \ reason for using Typed `DataSets` is for type safety, but because the code generated\
    \ by `SubSonic` is based directly on the database, it automatically creates type-aware\
    \ code. And in this method the call to the `Where` method could use a literal\
    \ string, but instead the constant defined for the `LocationID` column is used.\n\
    \nThe second detail is the fact that the query is completely constructed transparently\
    \ by the query tool using the `Person` table with the `LocationID` column. It\
    \ is extremely easy to write this query in `C#` with additional refinements as\
    \ they are needed. The resulting query constructs a parameterized query that will\
    \ be tuned nicely by `SQL Server` as the query is used repeatedly.\n\n## Scaffolding\n\
    \nOne last major benefit to a generated data access layer is the ability to automatically\
    \ hook up a scaffolding system to the generated code. *Scaffolding* is a set of\
    \ interfaces that you can use to add sample data to your database without writing\
    \ a single line of code. Many developers find this very useful, especially when\
    \ the scaffolding is intelligent about relationships among tables. `SubSonic`\
    \ includes an automatic scaffolding system that was inspired by work done on `Ruby\
    \ on Rails`, a popular web framework built on the `Ruby` scripting language. `SubSonic`\
    \ actually borrows several concepts from `Ruby on Rails`.\n\nFor `SubSonic`, you\
    \ can use the `AutoScaffold` page that is in the `SubSonicCentral` website, which\
    \ is a part of the downloadable source code. You can copy this page and the dependencies\
    \ to the administrative section of your own website, and it will give you an interface\
    \ for your database. Figure 8-5 shows the `AutoScaffold` page editing the `Person`\
    \ table.\n\n**Figure 8-5.** `AutoScaffold` page\n\nWhile the `AutoScaffold` page\
    \ will not be perfect, as the sole editor for your application it does provide\
    \ automatic access to your data with very minimal work. And as you update your\
    \ database and regenerate the data access layer, the `AutoScaffold` page will\
    \ adapt to match the changes. No effort will be necessary on your part to keep\
    \ it up to date.\n\nIn addition to simply wrapping an editor around tables, the\
    \ `AutoScaffold` system is aware of relationships as well. The `Person` table\
    \ has a foreign key reference to the `Location` table. This simple reference is\
    \ enough for the `AutoScaffold` page to provide a drop-down list to select a location\
    \ while editing a `Person` record. Figure 8-6 shows a `Person` record while in\
    \ edit mode.\n\n**Figure 8-6.** Editing a `Person` record with location reference\n\
    \nWith all of the features that `SubSonic` offers, you should be able to get up\
    \ and running very quickly. The generated data access layer and development experience\
    \ made possible by `SubSonic` is dramatically different from what you get with\
    \ Typed `DataSets`, which also generate a great deal of code but are extremely\
    \ rigid and difficult to update as the database changes. As you start building\
    \ an application and as changes happen, you should be able to adapt with ease.\
    \ When you add a new column to a database, you can simply run the generate command\
    \ to update your data access layer. And with partial classes and the code generating\
    \ templates, you can easily modify the code generation process to fit your unique\
    \ needs.\n\n**Blinq**"
