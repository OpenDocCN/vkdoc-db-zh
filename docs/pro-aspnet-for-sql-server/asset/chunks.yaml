- fmt: '# Chapter 10: A Sample Application


    If you focus your efforts on the usual suspects when troubleshooting bottlenecks,
    you may be overlooking other areas that are the real bottlenecks, the true gatekeepers
    to scalability. Years ago a report that came out compared the scalability of the
    Apache web server on Linux to IIS on Windows NT. It showed that IIS could handle
    many more requests under high load. Many developers questioned the accuracy of
    the report because at the time the Apache web server was the most popular and
    most efficient web server around, and IIS was seen as a new kid on the block that
    had been plagued with various problems. It turns out that the bottleneck had little
    to do with the web server. The source of Apache’s problem was that Linux internals
    used a locking mechanism allowing only a limited number of concurrent network
    connections into the Apache web server, while Windows NT used a threaded model
    allowing many more concurrent requests into IIS. So no matter how you configured
    the Apache web server, there was no way you could possibly make it faster than
    IIS. It simply was not the weakest link.


    In the same way, you may find that your website is not the weakest link in an
    application. It could be the database or perhaps even the network. The quality
    of the networking equipment may be to blame or the quality of the network cables
    between the servers. I once had a computer that used a network card that I bought
    for $15. I could have purchased the $100 network card, but I did not see a difference
    at the time because they were both rated for the same speed. I used the cheap
    network card, which worked fine most of the time, but when I tried to transfer
    multiple large files over the network, the card failed and lost the connection.
    It turns out the more expensive card was more capable; because it had more buffers,
    it could handle the kind of load of many large files being copied to a remote
    computer. That experience taught me that sometimes I can speed up an application
    by changing out a $15 piece of hardware instead of getting a new $10,000 server
    that leaves the true bottleneck in place.


    To find your bottlenecks, you will need to measure the performance of each part
    of your system. You may be pleasantly surprised that you can boost performance
    with the simplest of adjustments.


    ## Traffic Spikes


    The average time between requests shown in Table 10-1 does not truly represent
    traffic patterns. Nothing can ensure that the requests on your web server are
    so conveniently spaced apart. In reality, the vast majority of web traffic looks
    like a bell-shaped curve. With a 24-hour clock, you will surely get most of your
    traffic during the day if your site is primarily used by people in your nearby
    time zones (which is normally the case). In the United States, the traffic to
    your website will start to increase when it is 6 a.m. on the East Coast and start
    to drop off after it is 10 p.m. on the West Coast. And at noon you will typically
    see your most traffic, depending on what your website provides. Sites such as
    news sites get dramatically high spikes of traffic during the lunch hour, when
    people check the headlines during their lunch breaks.


    In light of these traffic spikes, you cannot assume that a website getting a total
    of 100,000 hits in a day will have 0.86 seconds to process each request before
    scalability becomes an issue. Your web server may be brought to its knees at a
    few key points in the day due to regular traffic spikes or in response to your
    actions. If you are running an informational site that sends out an e-mail newsletter
    to millions of readers, you may suddenly get a surge of traffic over the hours
    and days following the newsletter’s release. Websites such as Digg (`www.digg.com`)
    and Slashdot (`http://slashdot.org`) have millions of readers who are all directed
    to the headlines placed on their home pages. This results in unsuspecting websites,
    the ones that Digg and Slashdot link to, getting a massive amount of traffic in
    a very short period of time. That effect has been dubbed the *Slashdot effect,*
    and it''s known for taking sites offline that are not prepared for large surges
    in traffic. More recently, Digg has become extremely popular, so your website
    may also be hit by the *Digg effect*. You may simply have posted an interesting
    blog entry or photo that enough Digg users found worthwhile. There really is no
    warning that such an event is about to happen.


    ## Surviving the Digg Effect


    I have had my websites hit by Slashdot and Digg twice and was able to weather
    the storm by making some adjustments in response to the initial surge. In both
    instances, the content was hosted on an Apache web server, and I simply had to
    adjust the configuration for the newly increased load on my modestly powered server.
    The content was already ready to go because it was set up as static content that
    Apache could serve from memory, much like output caching for ASP.NET. In the case
    of the Apache web server, the bottleneck was created by the number of forked children
    I was allowing to be created to handle requests. With IIS this is not a concern
    because IIS is fully threaded, as is a modern Apache 2.0 installation, which can
    at least scale for the number of incoming requests. But if each request hits a
    database multiple times, you may see that the bottleneck is not the web server.


    These times when you get a massive surge of traffic require an emergency response
    plan.


    I remember the tragic day of the 9/11 attacks and how everybody was desperately
    looking for any news they could find to tell them what was happening. One of the
    websites I was viewing was CNN.com. I watched as the website went from the full
    website we usually see with busy links and ads all over the home page in the first
    part of the day, to just a few links and one headline. They were clearly trying
    to handle the surge of traffic, which they surely had not experienced before.
    They successfully kept their website online and got that critical news to their
    readers.


    Other times you know there will be a surge of traffic. During the Super Bowl,
    the NFL website is under a great deal of load. The people running the website
    can plan for this all year and typically set up a special website for the Super
    Bowl for that year, where all traffic is directed leading up to and during the
    game. The traffic on this website can be intense as football fans watch the game
    on their TV screens while also getting the latest stats from the website. Interactive
    applications show a diagram of the field and provide all the details about the
    game, updated continually. Each time the web application hits the server, it gets
    information about...'
