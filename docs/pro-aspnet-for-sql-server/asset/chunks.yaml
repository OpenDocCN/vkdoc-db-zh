    a specific need. And as you build your own provider, you can have it interact
    with the interfaces of the standard providers for a seamless integration. Creating
    your own custom provider allows for multiple implementations. More than one implementation
    may not be necessary for an internal application, at least not initially.


    You could build a component that is used by multiple applications. If you build
    it by using the provider model, you allow for multiple implementations. This component
    could interact with a custom order-fulfillment system. Later your company might
    purchase an order-fulfillment system package that handles the same features. Instead
    of tightly coupling your applications to this new package, you could create a
    provider implementation for it.


